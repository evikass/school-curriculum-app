name: Build Android APK

on:
  push:
    tags:
      - "apk-v*"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version for APK"
        required: true
        default: "3.795"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Init Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@^6 @capacitor/android@^6
          npm install -D @capacitor/cli@^6

      - name: Create Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "ru.inetshkola.app",
            "appName": "INETSHKOLA",
            "webDir": ".",
            "server": { "androidScheme": "https" }
          }
          EOF
          sed -i 's|/school-curriculum-app/|/|g' manifest.json 2>/dev/null || true
          find . -name "*.html" -exec sed -i 's|/school-curriculum-app/|/|g' {} + 2>/dev/null || true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Add Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Configure signing
        run: |
          sed -i '/android {/a\    signingConfigs {\n        release {\n            storeFile file("release.keystore")\n            storePassword "${{ secrets.KEYSTORE_PASSWORD }}"\n            keyAlias "${{ secrets.KEY_ALIAS }}"\n            keyPassword "${{ secrets.KEY_PASSWORD }}"\n        }\n    }' android/app/build.gradle
          sed -i '/release {/a\            signingConfig signingConfigs.release' android/app/build.gradle

      - name: Restore keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Copy icons
        run: |
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "android/app/src/main/res/$dir"
          done
          ICON_SRC=""
          [ -f "icon-512.png" ] && ICON_SRC="icon-512.png"
          [ -z "$ICON_SRC" ] && [ -f "favicon.png" ] && ICON_SRC="favicon.png"
          if [ -n "$ICON_SRC" ]; then
            SIZES_MDPI=48; SIZES_HDPI=72; SIZES_XHDPI=96; SIZES_XXHDPI=144; SIZES_XXXHDPI=192
            for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              eval "SIZE=\$SIZES_$(echo $dpi | tr '[:lower:]' '[:upper:]')"
              DIR="android/app/src/main/res/mipmap-$dpi"
              LOGO_SIZE=$(python3 -c "print(int($SIZE * 0.66))")
              OFFSET=$(python3 -c "print(int(($SIZE - $LOGO_SIZE) / 2))")
              convert -size "${SIZE}x${SIZE}" xc:"#1e1b4b" "$DIR/ic_launcher_background.png"
              convert -size "${SIZE}x${SIZE}" xc:none \( "$ICON_SRC" -resize "${LOGO_SIZE}x${LOGO_SIZE}" \) -geometry "+${OFFSET}+${OFFSET}" -composite "$DIR/ic_launcher_foreground.png"
              convert "$DIR/ic_launcher_background.png" \( "$ICON_SRC" -resize "${LOGO_SIZE}x${LOGO_SIZE}" \) -geometry "+${OFFSET}+${OFFSET}" -composite "$DIR/ic_launcher.png"
              cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"
            done
          fi

      - name: Set version
        run: |
          PKG_VERSION="${{ inputs.version_name || '3.795' }}"
          VERSION_CODE=$(echo "$PKG_VERSION" | tr -d '.')
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$PKG_VERSION\"/" android/app/build.gradle

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Check APK size
        run: |
          APK="android/app/build/outputs/apk/release/app-release.apk"
          echo "APK size: $(du -h $APK | cut -f1)"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name || '3.795' }}
          name: "v${{ inputs.version_name || '3.795' }} APK for RuStore"
          files: android/app/build/outputs/apk/release/app-release.apk
          body: APK for RuStore upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: inetshkola-apk
          path: android/app/build/outputs/apk/release/app-release.apk
