name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. v3.727)'
        required: false
        default: ''

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: site

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (without basePath for Capacitor)
        run: npm run build:capacitor

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools (API 36)
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Remove Expo Android project (if exists)
        run: |
          rm -rf android/

      - name: Initialize Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            VNAME="${{ github.event.inputs.version_name }}"
            VNUM=$(echo "$VNAME" | sed 's/v//')
          else
            VNUM=$(node -p "require('./package.json').version")
            VNAME="v${VNUM}"
          fi
          # versionCode: убираем точку → 3.726 → 3726 (всегда больше предыдущей)
          VCODE=$(echo "$VNUM" | sed 's/\.//g')
          echo "name=$VNAME" >> $GITHUB_OUTPUT
          echo "num=$VNUM" >> $GITHUB_OUTPUT
          echo "code=$VCODE" >> $GITHUB_OUTPUT
          echo "Version: $VNAME, versionName: $VNUM, versionCode: $VCODE"

      - name: Set Android versionCode and versionName
        run: |
          # Заменить versionCode и versionName в build.gradle
          sed -i "s/versionCode [0-9]*/versionCode ${{ steps.version.outputs.code }}/" android/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"${{ steps.version.outputs.num }}\"/" android/app/build.gradle
          # Проверка
          grep -E "versionCode|versionName" android/app/build.gradle

      - name: Add Kotlin version resolution strategy
        run: |
          sed -i '/android {/a\
          \
              configurations.all {\
                  resolutionStrategy {\
                      force '\''org.jetbrains.kotlin:kotlin-stdlib:1.9.25'\''\
                      force '\''org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.25'\''\
                  }\
              }' android/app/build.gradle

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure Android signing
        run: |
          sed -i '/android {/a\
          \
              signingConfigs {\
                  release {\
                      storeFile file("release.keystore")\
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"\
                      keyAlias "${{ secrets.KEY_ALIAS }}"\
                      keyPassword "${{ secrets.KEY_PASSWORD }}"\
                  }\
              }' android/app/build.gradle

          sed -i '/buildTypes {/,/}/ {
            /release {/a\
                  signingConfig signingConfigs.release
          }' android/app/build.gradle

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Copy app icons (replace all icon resources including adaptive)
        run: |
          ICON_SRC=""
          if [ -f "public/icon-512.png" ]; then
            ICON_SRC="public/icon-512.png"
          elif [ -f "public/favicon.png" ]; then
            ICON_SRC="public/favicon.png"
          fi

          if [ -n "$ICON_SRC" ]; then
            declare -A SIZES=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )

            for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              SIZE=${SIZES[$dpi]}
              DIR="android/app/src/main/res/mipmap-$dpi"
              mkdir -p "$DIR"

              # Legacy icons (Android < 8) — полная иконка на весь квадрат
              convert "$ICON_SRC" -resize ${SIZE}x${SIZE} "$DIR/ic_launcher.png"
              cp "$DIR/ic_launcher.png" "$DIR/ic_launcher_round.png"

              # Adaptive icon foreground — иконка по центру на прозрачном фоне
              LOGO_SIZE=$(python3 -c "print(int($SIZE * 0.72))")
              OFFSET=$(python3 -c "print(int(($SIZE - $LOGO_SIZE) / 2))")
              convert -size ${SIZE}x${SIZE} xc:none \
                \( "$ICON_SRC" -resize ${LOGO_SIZE}x${LOGO_SIZE} \) \
                -geometry +${OFFSET}+${OFFSET} -composite "$DIR/ic_launcher_foreground.png"

              # Adaptive icon background — фиолетовый фон
              convert -size ${SIZE}x${SIZE} xc:"#8B1AD3" "$DIR/ic_launcher_background.png"
            done

            # Удалить XML adaptive icons от Capacitor — используем PNG
            rm -rf android/app/src/main/res/mipmap-anydpi-v26/
          fi

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/inetshkola-${{ steps.version.outputs.num }}-rustore.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          name: ${{ steps.version.outputs.name }} — Версия для RuStore
          files: android/app/build/outputs/apk/release/inetshkola-${{ steps.version.outputs.num }}-rustore.apk
          body: |
            ## ИНЕТШКОЛА ${{ steps.version.outputs.name }} — APK для RuStore

            ### Файлы
            - `inetshkola-${{ steps.version.outputs.num }}-rustore.apk` — подписанный release APK для загрузки в RuStore

            ### Установка
            1. Скачайте `inetshkola-${{ steps.version.outputs.num }}-rustore.apk` на Android-устройство
            2. Разрешите установку из неизвестных источников
            3. Установите APK

            ### Публикация в RuStore
            Загрузите `inetshkola-${{ steps.version.outputs.num }}-rustore.apk` на https://rustore.ru/

            ⚠️ **Keystore пароль**: `inetshkola2024`, alias: `inetshkola`. Сохраните keystore файл — без него невозможно обновлять приложение!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: inetshkola-apk
          path: android/app/build/outputs/apk/release/inetshkola-${{ steps.version.outputs.num }}-rustore.apk
