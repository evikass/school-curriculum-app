name: Build and Deploy
on:
  push:
    branches: [site]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd school-curriculum-app && npm ci
      - name: Build
        run: cd school-curriculum-app && npm run build
      - name: Deploy to gh-pages
        run: cd school-curriculum-app && npx gh-pages -d out -t
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
