name: Build and Deploy
on:
  push:
    branches: [site, site-new]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout site-new branch
        uses: actions/checkout@v4
        with:
          ref: site-new
          path: app
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: cd app && npm install
      - name: Build
        run: cd app && npm run build
      - name: Deploy to gh-pages
        run: cd app && npx gh-pages -d out -t
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
