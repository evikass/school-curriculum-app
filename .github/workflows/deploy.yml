name: Build and Deploy
on:
  push:
    branches: [site]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout site-new branch
        uses: actions/checkout@v4
        with:
          ref: site-new
          path: app
      - name: Checkout site branch
        uses: actions/checkout@v4
        with:
          ref: site
          path: data
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Copy data files to app
        run: |
          cp -r data/school-curriculum-app/public/data app/public/
          cp -r data/school-curriculum-app/public/images app/public/
      - name: Install dependencies
        run: cd app && npm install
      - name: Build
        run: cd app && npm run build
      - name: Deploy to gh-pages
        run: |
          cd app
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npx gh-pages -d out -t
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
