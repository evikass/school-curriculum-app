name: Build and Deploy
on:
  push:
    branches: [site-new]
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout site-new branch (app code + TypeScript data)
        uses: actions/checkout@v4
        with:
          ref: site-new
          path: app
      - name: Checkout site branch (SVG images)
        uses: actions/checkout@v4
        with:
          ref: site
          path: images-data
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Copy SVG images from site branch
        run: |
          # Copy SVG images from site branch to app public directory
          if [ -d "images-data/school-curriculum-app/public/images" ]; then
            mkdir -p app/public/images
            cp -r images-data/school-curriculum-app/public/images/* app/public/images/ 2>/dev/null || true
          fi
      - name: Install dependencies
        run: cd app && npm install
      - name: Build
        run: cd app && npm run build
      - name: Deploy to gh-pages
        run: |
          cd app
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npx gh-pages -d out -t -r "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
