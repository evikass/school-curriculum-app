<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @keyframes glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
      .vowel { animation: pulse 2s ease-in-out infinite; }
      .consonant { animation: float 2.5s ease-in-out infinite; }
      .title { animation: glow 3s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fef2f2"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#dc2626" class="title">Звуки речи</text>
  
  <!-- Vowels Section -->
  <rect x="20" y="50" width="220" height="140" fill="#fee2e2" rx="12"/>
  <text x="130" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#dc2626">Гласные звуки</text>
  <text x="130" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ef4444">Можно пропеть 🎵</text>
  
  <!-- Vowel letters -->
  <g class="vowel">
    <circle cx="55" cy="130" r="20" fill="#ef4444"/>
    <text x="55" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">А</text>
  </g>
  <g class="vowel" style="animation-delay: 0.2s">
    <circle cx="100" cy="130" r="20" fill="#f97316"/>
    <text x="100" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">О</text>
  </g>
  <g class="vowel" style="animation-delay: 0.4s">
    <circle cx="145" cy="130" r="20" fill="#eab308"/>
    <text x="145" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">У</text>
  </g>
  <g class="vowel" style="animation-delay: 0.6s">
    <circle cx="190" cy="130" r="20" fill="#22c55e"/>
    <text x="190" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">И</text>
  </g>
  
  <text x="130" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#991b1b">6 звуков: [а] [о] [у] [ы] [э] [и]</text>
  
  <!-- Consonants Section -->
  <rect x="260" y="50" width="220" height="140" fill="#dbeafe" rx="12"/>
  <text x="370" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563eb">Согласные звуки</text>
  <text x="370" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3b82f6">Воздух встречает преграду</text>
  
  <!-- Consonant letters -->
  <g class="consonant">
    <rect x="280" y="110" width="35" height="35" fill="#3b82f6" rx="5"/>
    <text x="297" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">М</text>
  </g>
  <g class="consonant" style="animation-delay: 0.3s">
    <rect x="325" y="110" width="35" height="35" fill="#6366f1" rx="5"/>
    <text x="342" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">П</text>
  </g>
  <g class="consonant" style="animation-delay: 0.6s">
    <rect x="370" y="110" width="35" height="35" fill="#8b5cf6" rx="5"/>
    <text x="387" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">К</text>
  </g>
  <g class="consonant" style="animation-delay: 0.9s">
    <rect x="415" y="110" width="35" height="35" fill="#a855f7" rx="5"/>
    <text x="432" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">С</text>
  </g>
  
  <text x="370" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e40af">Звонкие и глухие</text>
  
  <!-- Hard/Soft Section -->
  <rect x="20" y="210" width="460" height="130" fill="#f0fdf4" rx="12"/>
  <text x="250" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#15803d">Твёрдые и мягкие согласные</text>
  
  <!-- Hard consonants -->
  <rect x="40" y="255" width="200" height="70" fill="#fef3c7" rx="8"/>
  <text x="140" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#b45309">Твёрдые</text>
  <text x="140" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#92400e">МА, МО, МУ, МЫ</text>
  <text x="140" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a16207">Всегда твёрдые: Ж, Ш, Ц</text>
  
  <!-- Soft consonants -->
  <rect x="260" y="255" width="200" height="70" fill="#ecfdf5" rx="8"/>
  <text x="360" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#059669">Мягкие</text>
  <text x="360" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#047857">МЯ, МЁ, МЮ, МИ</text>
  <text x="360" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#059669">Всегда мягкие: Ч, Щ, Й</text>
</svg>