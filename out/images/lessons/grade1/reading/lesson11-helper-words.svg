<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00796b" text-anchor="middle">Слова-помощники</text>
  
  <!-- Box -->
  <rect x="170" y="120" width="60" height="50" fill="#8d6e63" rx="3"/>
  <rect x="172" y="122" width="56" height="46" fill="#a1887f"/>
  
  <!-- ON (НА) -->
  <circle cx="200" cy="105" r="18" fill="#ff7043">
    <animate attributeName="cy" values="105;100;105" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="110" font-family="Arial" font-size="12" fill="white" text-anchor="middle">🐱</text>
  <text x="200" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#d84315" text-anchor="middle">НА (on)</text>
  <text x="200" y="95" font-family="Arial" font-size="10" fill="#bf360c" text-anchor="middle">на коробке</text>
  
  <!-- IN (В) -->
  <circle cx="185" cy="145" r="15" fill="#42a5f5">
    <animate attributeName="r" values="15;17;15" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="185" y="150" font-family="Arial" font-size="10" fill="white" text-anchor="middle">🐱</text>
  <text x="120" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">В (in)</text>
  <text x="120" y="160" font-family="Arial" font-size="10" fill="#0d47a1" text-anchor="middle">в коробке</text>
  
  <!-- UNDER (ПОД) -->
  <circle cx="200" cy="195" r="18" fill="#66bb6a">
    <animate attributeName="cy" values="195;200;195" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="200" y="200" font-family="Arial" font-size="12" fill="white" text-anchor="middle">🐱</text>
  <text x="280" y="190" font-family="Arial" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">ПОД (under)</text>
  <text x="280" y="205" font-family="Arial" font-size="10" fill="#1b5e20" text-anchor="middle">под коробкой</text>
  
  <!-- Arrow showing relationship -->
  <path d="M140 230 Q200 250 260 230" stroke="#00796b" stroke-width="2" fill="none" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="1s" repeatCount="indefinite"/>
  </path>
  
  <text x="200" y="280" font-family="Arial" font-size="12" fill="#546e7a" text-anchor="middle">Предлоги связывают слова</text>
</svg>