<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" rx="8" fill="url(#bg4)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Типы химических реакций</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 4</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- Panel: Reaction types by number of substances -->
  <rect x="14" y="54" width="472" height="155" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Классификация по числу веществ</text>
  <!-- Connection -->
  <rect x="24" y="80" width="105" height="60" rx="6" fill="#A5D6A7" fill-opacity="0.3" stroke="#00897B" stroke-width="1"/>
  <text x="76" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Соединение</text>
  <text x="76" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">A + B = AB</text>
  <text x="76" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">2H2 + O2 = 2H2O</text>
  <text x="76" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">+Q экзотермическая</text>
  <!-- Decomposition -->
  <rect x="139" y="80" width="105" height="60" rx="6" fill="#FFCC80" fill-opacity="0.3" stroke="#00897B" stroke-width="1"/>
  <text x="191" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Разложение</text>
  <text x="191" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">AB = A + B</text>
  <text x="191" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">2H2O = 2H2 + O2</text>
  <text x="191" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">-Q эндотермическая</text>
  <!-- Substitution -->
  <rect x="254" y="80" width="105" height="60" rx="6" fill="#90CAF9" fill-opacity="0.3" stroke="#00897B" stroke-width="1"/>
  <text x="306" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Замещение</text>
  <text x="306" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">A + BC = AC + B</text>
  <text x="306" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Zn + 2HCl = ZnCl2 + H2</text>
  <text x="306" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">ОВР</text>
  <!-- Exchange -->
  <rect x="369" y="80" width="105" height="60" rx="6" fill="#CE93D8" fill-opacity="0.3" stroke="#00897B" stroke-width="1"/>
  <text x="421" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Обмен</text>
  <text x="421" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">AB + CD = AD + CB</text>
  <text x="421" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">NaCl+AgNO3=AgCl+NaNO3</text>
  <text x="421" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">РИО</text>
  <!-- Signs of chemical reactions -->
  <text x="250" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Признаки химических реакций</text>
  <text x="100" y="175" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Изменение цвета</text>
  <text x="200" y="175" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Выделение газа</text>
  <text x="300" y="175" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Выпадение осадка</text>
  <text x="410" y="175" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Тепловой эффект</text>
  <!-- OVR panel -->
  <rect x="14" y="218" width="472" height="118" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="236" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Окислительно-восстановительные реакции (ОВР)</text>
  <text x="250" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Пример: 2Na + Cl2 = 2NaCl</text>
  <!-- Oxidation -->
  <rect x="24" y="260" width="220" height="65" rx="6" fill="#FFCDD2" fill-opacity="0.3" stroke="#C62828" stroke-width="1"/>
  <text x="134" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Окисление (отдача e-)</text>
  <text x="134" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Na0 = Na+1 + e-</text>
  <text x="134" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828">Na — восстановитель</text>
  <text x="134" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#607D8B">Степень окисления повышается</text>
  <!-- Reduction -->
  <rect x="256" y="260" width="220" height="65" rx="6" fill="#C8E6C9" fill-opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
  <text x="366" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32">Восстановление (приём e-)</text>
  <text x="366" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Cl20 + 2e- = 2Cl-1</text>
  <text x="366" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Cl2 — окислитель</text>
  <text x="366" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#607D8B">Степень окисления понижается</text>
</svg>