<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <marker id="arrB" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1565C0"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="serif">Скалярное произведение векторов</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 3</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1E88E5" stroke-width="1" opacity="0.3"/>

  <!-- Two Vectors with Angle Panel -->
  <rect x="15" y="58" width="225" height="145" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="127" y="74" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">Определение</text>
  <!-- Vector a -->
  <line x1="65" y1="170" x2="170" y2="105" stroke="#C62828" stroke-width="2.2" marker-end="url(#arrB)"/>
  <text x="125" y="100" font-size="11" fill="#C62828" font-weight="bold" font-style="italic">a</text>
  <!-- Vector b -->
  <line x1="65" y1="170" x2="200" y2="155" stroke="#1565C0" stroke-width="2.2" marker-end="url(#arrB)"/>
  <text x="205" y="155" font-size="11" fill="#1565C0" font-weight="bold" font-style="italic">b</text>
  <!-- Angle arc -->
  <path d="M95,158 A35,35 0 0,1 100,142" fill="none" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="103" y="150" font-size="9" fill="#FF8F00" font-weight="bold">&#x03B1;</text>
  <circle cx="65" cy="170" r="2.5" fill="#333"/>
  <!-- Formula -->
  <text x="30" y="190" font-size="10" fill="#1565C0" font-weight="bold">a&#x00B7;b = |a|&#x00B7;|b|&#x00B7;cos&#x03B1;</text>

  <!-- Coordinate Form Panel -->
  <rect x="250" y="58" width="235" height="90" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="367" y="74" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">В координатах</text>
  <text x="260" y="93" font-size="9.5" fill="#333">a = (x&#x2081;, y&#x2081;, z&#x2081;)</text>
  <text x="260" y="108" font-size="9.5" fill="#333">b = (x&#x2082;, y&#x2082;, z&#x2082;)</text>
  <text x="260" y="125" font-size="10.5" fill="#C62828" font-weight="bold">a&#x00B7;b = x&#x2081;x&#x2082;+y&#x2081;y&#x2082;+z&#x2081;z&#x2082;</text>
  <text x="260" y="140" font-size="9" fill="#1565C0">|a| = &#x221A;(x&#x2081;&#x00B2;+y&#x2081;&#x00B2;+z&#x2081;&#x00B2;)</text>

  <!-- Angle and Perpendicularity Panel -->
  <rect x="250" y="155" width="235" height="98" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="367" y="171" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">Угол и перпендикулярность</text>
  <text x="260" y="189" font-size="9.5" fill="#333">cos&#x03B1; = (a&#x00B7;b)/(|a|&#x00B7;|b|)</text>
  <text x="260" y="205" font-size="9" fill="#666">= (x&#x2081;x&#x2082;+y&#x2081;y&#x2082;+z&#x2081;z&#x2082;)/</text>
  <text x="280" y="218" font-size="9" fill="#666">(&#x221A;(&#x2211;x&#x2081;&#x00B2;)&#x00B7;&#x221A;(&#x2211;x&#x2082;&#x00B2;))</text>
  <line x1="260" y1="224" x2="470" y2="224" stroke="#1E88E5" stroke-width="0.8" opacity="0.4"/>
  <text x="260" y="238" font-size="10" fill="#C62828" font-weight="bold">a &#x22A5; b  &#x21D4;  a&#x00B7;b = 0</text>
  <text x="260" y="250" font-size="8.5" fill="#1565C0">&#x21D4; x&#x2081;x&#x2082;+y&#x2081;y&#x2082;+z&#x2081;z&#x2082; = 0</text>

  <!-- Properties Panel -->
  <rect x="15" y="210" width="225" height="100" rx="6" fill="white" opacity="0.88" stroke="#1E88E5" stroke-width="1"/>
  <text x="127" y="226" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">Свойства</text>
  <text x="25" y="243" font-size="9" fill="#333">1. a&#x00B7;b = b&#x00B7;a  (коммутативность)</text>
  <text x="25" y="258" font-size="9" fill="#333">2. (&#x03BB;a)&#x00B7;b = &#x03BB;(a&#x00B7;b)</text>
  <text x="25" y="273" font-size="9" fill="#333">3. (a+b)&#x00B7;c = a&#x00B7;c + b&#x00B7;c</text>
  <text x="25" y="288" font-size="9" fill="#333">4. a&#x00B7;a = |a|&#x00B2; &#x2265; 0</text>
  <text x="25" y="303" font-size="9" fill="#333">5. a&#x00B7;a = 0 &#x21D4; a = 0</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#1565C0" opacity="0.85"/>
  <text x="250" y="336" font-size="10" fill="white" text-anchor="middle" font-weight="bold">a&#x00B7;b = |a||b|cos&#x03B1; = x&#x2081;x&#x2082;+y&#x2081;y&#x2082;+z&#x2081;z&#x2082;;   a&#x22A5;b &#x21D4; a&#x00B7;b=0</text>
</svg>