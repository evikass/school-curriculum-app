<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#EF5350" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#C62828" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#C62828" stop-opacity="0.22"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#B71C1C" text-anchor="middle" font-family="serif">Объём шара</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 15</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#EF5350" stroke-width="1" opacity="0.3"/>

  <!-- Ball in Cylinder Diagram -->
  <rect x="15" y="58" width="235" height="210" rx="6" fill="white" opacity="0.9" stroke="#EF5350" stroke-width="1.2"/>
  <text x="132" y="74" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Шар в цилиндре (Архимед)</text>
  <!-- Cylinder -->
  <ellipse cx="132" cy="230" rx="70" ry="20" fill="none" stroke="#795548" stroke-width="1.2"/>
  <path d="M62,230 A70,20 0 0,0 202,230" fill="none" stroke="#795548" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="62" y1="230" x2="62" y2="110" stroke="#795548" stroke-width="1.2"/>
  <line x1="202" y1="230" x2="202" y2="110" stroke="#795548" stroke-width="1.2"/>
  <ellipse cx="132" cy="110" rx="70" ry="20" fill="none" stroke="#795548" stroke-width="1.2"/>
  <!-- Ball inside -->
  <circle cx="132" cy="170" r="60" fill="url(#ballGrad)" stroke="#C62828" stroke-width="2"/>
  <!-- Radius -->
  <line x1="132" y1="170" x2="192" y2="170" stroke="#C62828" stroke-width="1.5"/>
  <text x="158" y="167" font-size="9" fill="#C62828" font-weight="bold" font-style="italic">R</text>
  <circle cx="132" cy="170" r="2" fill="#C62828"/>
  <text x="136" y="178" font-size="8" fill="#C62828">O</text>
  <!-- Cylinder dimensions -->
  <text x="132" y="105" font-size="7.5" fill="#795548">R (цил.) = R (шара)</text>
  <text x="132" y="252" font-size="7.5" fill="#795548">h (цил.) = 2R</text>

  <!-- Volume Formula Panel -->
  <rect x="260" y="58" width="227" height="100" rx="6" fill="white" opacity="0.9" stroke="#EF5350" stroke-width="1.2"/>
  <text x="373" y="74" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Объём шара</text>
  <rect x="270" y="82" width="207" height="28" rx="3" fill="#C62828" opacity="0.08"/>
  <text x="373" y="101" font-size="14" fill="#C62828" font-weight="bold" text-anchor="middle">V = <tspan font-size="11">4/3</tspan>&#x03C0;R&#x00B3;</text>
  <text x="270" y="120" font-size="9" fill="#333">V_цилиндра = &#x03C0;R&#x00B2;&#x00B7;2R = 2&#x03C0;R&#x00B3;</text>
  <text x="270" y="136" font-size="9" fill="#333">V_шара / V_цилиндра = 2/3</text>
  <text x="270" y="152" font-size="9" fill="#C62828" font-weight="bold">V_шара = <tspan font-size="8">2/3</tspan>&#x00B7;V_цилиндра</text>

  <!-- Archimedes Panel -->
  <rect x="260" y="165" width="227" height="103" rx="6" fill="white" opacity="0.88" stroke="#EF5350" stroke-width="1"/>
  <text x="373" y="181" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Результат Архимеда</text>
  <!-- Ratio diagram -->
  <rect x="275" y="190" width="80" height="18" rx="2" fill="#C62828" opacity="0.15" stroke="#C62828" stroke-width="1"/>
  <text x="315" y="203" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">Шар: 2</text>
  <rect x="365" y="190" width="110" height="18" rx="2" fill="#795548" opacity="0.1" stroke="#795548" stroke-width="1"/>
  <text x="420" y="203" font-size="8" fill="#795548" font-weight="bold" text-anchor="middle">Цилиндр: 3</text>
  <!-- Cone addition -->
  <text x="373" y="224" font-size="9" fill="#333">V_цил = V_шара + V_конуса</text>
  <text x="373" y="240" font-size="9" fill="#333">2&#x03C0;R&#x00B3; = <tspan font-size="8">4/3</tspan>&#x03C0;R&#x00B3; + <tspan font-size="8">2/3</tspan>&#x03C0;R&#x00B3;</text>
  <text x="373" y="258" font-size="8.5" fill="#795548" font-style="italic">V_конуса = <tspan font-size="7.5">2/3</tspan>&#x03C0;R&#x00B3;</text>

  <!-- Comparison panel -->
  <rect x="15" y="275" width="235" height="35" rx="4" fill="white" opacity="0.85" stroke="#EF5350" stroke-width="0.8"/>
  <text x="132" y="290" font-size="8" fill="#333" text-anchor="middle">Круг: S=&#x03C0;R&#x00B2;  |  Шар: V=4/3&#x03C0;R&#x00B3;</text>
  <text x="132" y="303" font-size="8" fill="#C62828" text-anchor="middle">R=1: V = 4/3&#x03C0; &#x2248; 4.189</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="336" font-size="10" fill="white" text-anchor="middle" font-weight="bold">V_шара = 4/3 &#x00B7; &#x03C0;R&#x00B3;;   V_шара : V_цилиндра = 2 : 3  (Архимед)</text>
</svg>