<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
    <linearGradient id="coneGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E91E63" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#E91E63" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#E91E63" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AD1457" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle" font-family="serif">Конус</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 8</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#E91E63" stroke-width="1" opacity="0.3"/>

  <!-- 3D Cone -->
  <rect x="15" y="58" width="250" height="215" rx="6" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1.2"/>
  <text x="140" y="74" font-size="10" font-weight="bold" fill="#AD1457" text-anchor="middle">Конус вращения</text>
  <!-- Base ellipse -->
  <ellipse cx="140" cy="235" rx="75" ry="24" fill="url(#coneGrad)" stroke="#AD1457" stroke-width="1.5"/>
  <!-- Back half dashed -->
  <path d="M65,235 A75,24 0 0,0 215,235" fill="none" stroke="#AD1457" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Apex -->
  <circle cx="140" cy="95" r="3" fill="#AD1457"/>
  <text x="148" y="92" font-size="9" fill="#AD1457" font-weight="bold">S (вершина)</text>
  <!-- Side lines -->
  <line x1="65" y1="235" x2="140" y2="95" stroke="#AD1457" stroke-width="1.8"/>
  <line x1="215" y1="235" x2="140" y2="95" stroke="#AD1457" stroke-width="1.8"/>
  <!-- Axis (dashed) -->
  <line x1="140" y1="260" x2="140" y2="90" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="146" y="270" font-size="8" fill="#666">SO — ось</text>
  <!-- Height -->
  <line x1="50" y1="235" x2="50" y2="95" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="45" y1="235" x2="55" y2="235" stroke="#1565C0" stroke-width="1"/>
  <line x1="45" y1="95" x2="55" y2="95" stroke="#1565C0" stroke-width="1"/>
  <text x="30" y="168" font-size="9" fill="#1565C0" font-weight="bold" font-style="italic">h</text>
  <!-- Radius -->
  <line x1="140" y1="235" x2="215" y2="235" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="175" y="232" font-size="9" fill="#2E7D32" font-weight="bold" font-style="italic">R</text>
  <!-- Slant height (generatrix) -->
  <line x1="215" y1="235" x2="140" y2="95" stroke="#FF8F00" stroke-width="2.5"/>
  <text x="200" y="155" font-size="9" fill="#FF8F00" font-weight="bold" font-style="italic">l</text>
  <!-- Right angle mark at center -->
  <rect x="140" y="230" width="8" height="8" fill="none" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Center of base -->
  <circle cx="140" cy="235" r="2" fill="#2E7D32"/>

  <!-- Sections Panel -->
  <rect x="275" y="58" width="212" height="130" rx="6" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1.2"/>
  <text x="381" y="74" font-size="10" font-weight="bold" fill="#AD1457" text-anchor="middle">Сечения конуса</text>
  <!-- Axial section (triangle) -->
  <polygon points="295,170 340,90 385,170" fill="#AD1457" opacity="0.08" stroke="#AD1457" stroke-width="1.3"/>
  <text x="340" y="183" font-size="7.5" fill="#AD1457" text-anchor="middle">Осевое сечение</text>
  <text x="340" y="193" font-size="7" fill="#666" text-anchor="middle">&#x25B3; (равнобедр.)</text>
  <!-- Circular section -->
  <ellipse cx="440" cy="130" rx="25" ry="25" fill="#2E7D32" opacity="0.06" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="440" y="168" font-size="7.5" fill="#2E7D32" text-anchor="middle">&#x22A5; оси</text>
  <text x="440" y="178" font-size="7" fill="#666" text-anchor="middle">круг</text>

  <!-- Elements Panel -->
  <rect x="275" y="195" width="212" height="78" rx="6" fill="white" opacity="0.88" stroke="#E91E63" stroke-width="1"/>
  <text x="381" y="211" font-size="10" font-weight="bold" fill="#AD1457" text-anchor="middle">Элементы и формулы</text>
  <text x="285" y="227" font-size="8.5" fill="#333">h — высота (SO)</text>
  <text x="285" y="240" font-size="8.5" fill="#333">R — радиус основания</text>
  <text x="285" y="253" font-size="8.5" fill="#333">l — образующая</text>
  <text x="285" y="266" font-size="9" fill="#C62828" font-weight="bold">l&#x00B2; = h&#x00B2; + R&#x00B2;</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#AD1457" opacity="0.85"/>
  <text x="250" y="336" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Конус: S<sub>бок</sub>=&#x03C0;Rl;  S<sub>полн</sub>=&#x03C0;R(l+R);  l&#x00B2;=h&#x00B2;+R&#x00B2;</text>
</svg>