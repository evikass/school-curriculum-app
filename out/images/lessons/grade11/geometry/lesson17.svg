<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="prismG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1565C0" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="13" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="serif">Понятие многогранника. Призма</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 17</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1E88E5" stroke-width="1" opacity="0.3"/>

  <!-- 3D Hexagonal Prism Panel -->
  <rect x="15" y="58" width="200" height="200" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="115" y="74" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">Призма (6-угольная)</text>
  <!-- Bottom hexagon -->
  <polygon points="60,220 90,230 140,230 170,220 140,210 90,210" fill="url(#prismG)" stroke="#1565C0" stroke-width="1.3"/>
  <!-- Top hexagon -->
  <polygon points="75,130 105,140 155,140 185,130 155,120 105,120" fill="url(#prismG)" stroke="#1565C0" stroke-width="1.3"/>
  <!-- Side edges -->
  <line x1="60" y1="220" x2="75" y2="130" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="90" y1="230" x2="105" y2="140" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="140" y1="230" x2="155" y2="140" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="170" y1="220" x2="185" y2="130" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Hidden edges -->
  <line x1="90" y1="210" x2="105" y2="120" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="140" y1="210" x2="155" y2="120" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Height -->
  <line x1="40" y1="220" x2="40" y2="130" stroke="#C62828" stroke-width="1.5"/>
  <text x="28" y="178" font-size="9" fill="#C62828" font-weight="bold" font-style="italic">h</text>
  <!-- Labels -->
  <text x="115" y="248" font-size="8" fill="#1565C0" text-anchor="middle">основание</text>

  <!-- Triangular Prism Panel -->
  <rect x="225" y="58" width="130" height="130" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="290" y="74" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">3-угольная</text>
  <!-- Bottom triangle -->
  <polygon points="250,170 310,170 330,155" fill="url(#prismG)" stroke="#1565C0" stroke-width="1.2"/>
  <!-- Top triangle -->
  <polygon points="260,95 320,95 340,80" fill="url(#prismG)" stroke="#1565C0" stroke-width="1.2"/>
  <!-- Edges -->
  <line x1="250" y1="170" x2="260" y2="95" stroke="#1565C0" stroke-width="1.3"/>
  <line x1="310" y1="170" x2="320" y2="95" stroke="#1565C0" stroke-width="1.3"/>
  <line x1="330" y1="155" x2="340" y2="80" stroke="#1565C0" stroke-width="1.3"/>

  <!-- Formulas Panel -->
  <rect x="225" y="195" width="130" height="63" rx="6" fill="white" opacity="0.88" stroke="#1E88E5" stroke-width="1"/>
  <text x="290" y="210" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Формулы</text>
  <text x="235" y="225" font-size="8.5" fill="#333">S<sub>бок</sub> = P&#x00B7;h</text>
  <text x="235" y="238" font-size="8.5" fill="#333">S<sub>полн</sub> = S<sub>бок</sub>+2S<sub>осн</sub></text>
  <text x="235" y="251" font-size="8.5" fill="#C62828" font-weight="bold">V = S<sub>осн</sub>&#x00B7;h</text>

  <!-- Euler's Formula & Polyhedron Info -->
  <rect x="365" y="58" width="122" height="200" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="426" y="74" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Формула Эйлера</text>
  <rect x="375" y="80" width="102" height="24" rx="3" fill="#1565C0" opacity="0.08"/>
  <text x="426" y="97" font-size="12" fill="#C62828" font-weight="bold" text-anchor="middle">V - E + F = 2</text>
  <text x="376" y="118" font-size="8" fill="#333">V — вершины</text>
  <text x="376" y="131" font-size="8" fill="#333">E — рёбра</text>
  <text x="376" y="144" font-size="8" fill="#333">F — грани</text>
  <line x1="375" y1="150" x2="477" y2="150" stroke="#1E88E5" stroke-width="0.5" opacity="0.4"/>
  <text x="426" y="165" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">Призма:</text>
  <text x="376" y="178" font-size="8" fill="#333">V = 2n</text>
  <text x="376" y="191" font-size="8" fill="#333">E = 3n</text>
  <text x="376" y="204" font-size="8" fill="#333">F = n+2</text>
  <text x="376" y="220" font-size="7.5" fill="#666">(n-угольная)</text>
  <text x="376" y="238" font-size="8" fill="#2E7D32" font-weight="bold">2n-3n+(n+2)=2</text>

  <!-- Definition panel -->
  <rect x="15" y="264" width="340" height="46" rx="6" fill="white" opacity="0.85" stroke="#1E88E5" stroke-width="0.8"/>
  <text x="185" y="279" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Определение</text>
  <text x="25" y="293" font-size="8.5" fill="#333">Многогранник — поверхность, составленная из многоугольников и ограничивающая</text>
  <text x="25" y="305" font-size="8.5" fill="#333">некоторое геометрическое тело. Призма — многогранник с двумя равными основаниями.</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#1565C0" opacity="0.85"/>
  <text x="250" y="336" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold">V=S<sub>осн</sub>h;  S<sub>бок</sub>=Ph;  Формула Эйлера: V-E+F=2</text>
</svg>