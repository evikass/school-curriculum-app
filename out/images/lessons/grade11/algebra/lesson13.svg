<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Построение графиков с помощью производной</text>

  <!-- Top-left card: Research scheme -->
  <rect x="15" y="52" width="155" height="195" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="92" y="68" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">Схема исследования</text>

  <rect x="25" y="74" width="135" height="15" rx="5" fill="#E3F2FD"/>
  <text x="92" y="85" text-anchor="middle" fill="#0D47A1" font-size="7">1. D(f) - область опред.</text>

  <rect x="25" y="92" width="135" height="15" rx="5" fill="#E3F2FD"/>
  <text x="92" y="103" text-anchor="middle" fill="#0D47A1" font-size="7">2. Чётность / нечётность</text>

  <rect x="25" y="110" width="135" height="15" rx="5" fill="#E3F2FD"/>
  <text x="92" y="121" text-anchor="middle" fill="#0D47A1" font-size="7">3. Нули функции</text>

  <rect x="25" y="128" width="135" height="15" rx="5" fill="#FFF3E0"/>
  <text x="92" y="139" text-anchor="middle" fill="#E65100" font-size="7">4. f'(x), критич. точки</text>

  <rect x="25" y="146" width="135" height="15" rx="5" fill="#FFF3E0"/>
  <text x="92" y="157" text-anchor="middle" fill="#E65100" font-size="7">5. Монотонность</text>

  <rect x="25" y="164" width="135" height="15" rx="5" fill="#FFEBEE"/>
  <text x="92" y="175" text-anchor="middle" fill="#C62828" font-size="7">6. Экстремумы</text>

  <rect x="25" y="182" width="135" height="15" rx="5" fill="#F3E5F5"/>
  <text x="92" y="193" text-anchor="middle" fill="#6A1B9A" font-size="7">7. f''(x), выпуклость</text>

  <rect x="25" y="200" width="135" height="15" rx="5" fill="#E8F5E9"/>
  <text x="92" y="211" text-anchor="middle" fill="#2E7D32" font-size="7">8. Асимптоты</text>

  <rect x="25" y="218" width="135" height="15" rx="5" fill="#BBDEFB"/>
  <text x="92" y="229" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">9. Построить график</text>

  <!-- Top-right card: Example graph f(x)=x^3-3x -->
  <rect x="180" y="52" width="305" height="120" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="332" y="68" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">f(x) = x^3 - 3x (нечётная)</text>

  <!-- Axes -->
  <line x1="210" y1="140" x2="460" y2="140" stroke="#455A64" stroke-width="1"/>
  <line x1="335" y1="75" x2="335" y2="160" stroke="#455A64" stroke-width="1"/>

  <!-- Curve -->
  <path d="M 220,90 C 240,75 260,75 280,90 C 300,110 315,130 335,140 C 355,150 370,170 390,180 C 410,190 430,190 450,175" fill="none" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Max point -->
  <circle cx="280" cy="90" r="3.5" fill="#E53935"/>
  <text x="283" y="84" fill="#E53935" font-size="8" font-weight="bold">max</text>

  <!-- Min point -->
  <circle cx="390" cy="180" r="3.5" fill="#2E7D32"/>
  <text x="393" y="178" fill="#2E7D32" font-size="8" font-weight="bold">min</text>

  <!-- Inflection point -->
  <circle cx="335" cy="140" r="3" fill="#6A1B9A"/>
  <text x="310" y="137" fill="#6A1B9A" font-size="7">перегиб</text>

  <!-- Zeros -->
  <circle cx="260" cy="140" r="2.5" fill="#455A64"/>
  <circle cx="335" cy="140" r="2.5" fill="#455A64"/>
  <circle cx="410" cy="140" r="2.5" fill="#455A64"/>

  <!-- Bottom-right card: Asymptotes & convexity -->
  <rect x="180" y="180" width="305" height="67" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="332" y="196" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">Дополнительные свойства</text>

  <!-- Convexity pills -->
  <rect x="195" y="202" width="90" height="18" rx="8" fill="#FFEBEE"/>
  <text x="240" y="215" text-anchor="middle" fill="#C62828" font-size="8" font-weight="bold">f''&lt;0 : вып. вверх</text>

  <rect x="295" y="202" width="90" height="18" rx="8" fill="#E8F5E9"/>
  <text x="340" y="215" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">f''&gt;0 : вып. вниз</text>

  <!-- Asymptote pills -->
  <rect x="195" y="224" width="90" height="18" rx="8" fill="#FFF3E0"/>
  <text x="240" y="237" text-anchor="middle" fill="#E65100" font-size="8" font-weight="bold">Вертик. x=x0</text>

  <rect x="295" y="224" width="90" height="18" rx="8" fill="#F3E5F5"/>
  <text x="340" y="237" text-anchor="middle" fill="#6A1B9A" font-size="8" font-weight="bold">Наклон. y=kx+b</text>

  <!-- Bottom card -->
  <rect x="15" y="253" width="470" height="67" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="271" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Ключевые результаты для f(x) = x^3 - 3x</text>

  <!-- Result pills row -->
  <rect x="25" y="278" width="105" height="18" rx="8" fill="#BBDEFB"/>
  <text x="77" y="291" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">D(f) = R, нечётная</text>

  <rect x="137" y="278" width="100" height="18" rx="8" fill="#FFEBEE"/>
  <text x="187" y="291" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">max при x=-1, f=2</text>

  <rect x="244" y="278" width="100" height="18" rx="8" fill="#E8F5E9"/>
  <text x="294" y="291" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">min при x=1, f=-2</text>

  <rect x="351" y="278" width="125" height="18" rx="8" fill="#F3E5F5"/>
  <text x="413" y="291" text-anchor="middle" fill="#6A1B9A" font-size="7" font-weight="bold">перегиб: x=0, асимпт. нет</text>

  <rect x="25" y="300" width="110" height="14" rx="6" fill="#FFF9C4"/>
  <text x="80" y="311" text-anchor="middle" fill="#F57F17" font-size="7">Нули: x=0, +-sqrt(3)</text>

  <rect x="145" y="300" width="115" height="14" rx="6" fill="#E3F2FD"/>
  <text x="202" y="311" text-anchor="middle" fill="#0D47A1" font-size="7">Возр.: (-inf;-1)U(1;+inf)</text>

  <rect x="270" y="300" width="90" height="14" rx="6" fill="#FFEBEE"/>
  <text x="315" y="311" text-anchor="middle" fill="#C62828" font-size="7">Убыв.: (-1;1)</text>

  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Полная схема: D(f) -> чётность -> нули -> f'(x) -> экстремумы -> график</text>
</svg>