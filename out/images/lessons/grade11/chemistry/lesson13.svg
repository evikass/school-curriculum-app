<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Окислительно-восстановительные реакции</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Oxidation state rules -->
<rect x="12" y="58" width="160" height="120" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
<text x="92" y="75" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Степени окисления</text>
<line x1="22" y1="80" x2="162" y2="80" stroke="#2E7D32" stroke-width="0.5"/>
<text x="22" y="93" font-family="Arial,sans-serif" font-size="7" fill="#333">H = +1 (гидриды: -1)</text>
<text x="22" y="106" font-family="Arial,sans-serif" font-size="7" fill="#333">O = -2 (пероксиды: -1)</text>
<text x="22" y="119" font-family="Arial,sans-serif" font-size="7" fill="#333">Простое вещество = 0</text>
<text x="22" y="132" font-family="Arial,sans-serif" font-size="7" fill="#333">Ион = заряд иона</text>
<text x="22" y="145" font-family="Arial,sans-serif" font-size="7" fill="#333">Сумма в молекуле = 0</text>
<text x="22" y="158" font-family="Arial,sans-serif" font-size="7" fill="#333">Сумма в ионе = заряд</text>

<!-- Electron balance method -->
<rect x="185" y="58" width="155" height="120" rx="8" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
<text x="262" y="75" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Метод эл. баланса</text>
<text x="195" y="90" font-family="Arial,sans-serif" font-size="7" fill="#333">1. Найти элементы с изм. с.о.</text>
<text x="195" y="103" font-family="Arial,sans-serif" font-size="7" fill="#333">2. Составить полуреакции</text>
<text x="195" y="116" font-family="Arial,sans-serif" font-size="7" fill="#333">3. НОК = 6, коэфф. 3 и 2</text>
<text x="195" y="129" font-family="Arial,sans-serif" font-size="7" fill="#333">4. Уравнять кислород (H2O)</text>
<text x="195" y="142" font-family="Arial,sans-serif" font-size="7" fill="#333">5. Уравнять водород (H+)</text>
<text x="195" y="158" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">6. Расставить коэффициенты</text>

<!-- Redox types -->
<rect x="350" y="58" width="138" height="120" rx="8" fill="white" stroke="#9C27B0" stroke-width="1.5" filter="url(#sh)"/>
<text x="419" y="75" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Типы ОВР</text>
<text x="360" y="90" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0">Межмолекулярная:</text>
<text x="360" y="103" font-family="Arial,sans-serif" font-size="6" fill="#333">О и В в разных молекулах</text>
<text x="360" y="118" font-family="Arial,sans-serif" font-size="7" fill="#FF9800">Внутримолекулярная:</text>
<text x="360" y="131" font-family="Arial,sans-serif" font-size="6" fill="#333">О и В в одной молекуле</text>
<text x="360" y="146" font-family="Arial,sans-serif" font-size="7" fill="#F44336">Диспропорционирование:</text>
<text x="360" y="159" font-family="Arial,sans-serif" font-size="6" fill="#333">Один элемент О и В</text>

<!-- Oxidizer/Reducer -->
<rect x="12" y="190" width="235" height="60" rx="8" fill="white" stroke="#C62828" stroke-width="1.5" filter="url(#sh)"/>
<text x="130" y="208" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Окислитель и Восстановитель</text>
<text x="22" y="223" font-family="Arial,sans-serif" font-size="7" fill="#C62828">Окислитель: принимает e-, с.о. понижается</text>
<text x="22" y="236" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50">Восстановитель: отдаёт e-, с.о. повышается</text>
<text x="22" y="249" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Процесс: Окисление + Восстановление</text>

<!-- Examples -->
<rect x="258" y="190" width="230" height="60" rx="8" fill="white" stroke="#1B5E20" stroke-width="1" filter="url(#sh)"/>
<text x="373" y="208" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Примеры ОВР</text>
<text x="268" y="223" font-family="Arial,sans-serif" font-size="6" fill="#333">Cu + 4HNO3(конц) -> Cu(NO3)2 + 2NO2 + 2H2O</text>
<text x="268" y="236" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Cu — восстановитель, HNO3 — окислитель</text>
<text x="268" y="249" font-family="Arial,sans-serif" font-size="6" fill="#333">2KMnO4 + 5H2S + 3H2SO4 -> 2MnSO4 + K2SO4 + 5S + 8H2O</text>

<!-- Key note -->
<text x="250" y="270" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Окисление и восстановление всегда протекают одновременно!</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>