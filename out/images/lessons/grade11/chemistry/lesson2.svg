<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
<defs>
  <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E8F5E9"/>
    <stop offset="100%" stop-color="#C8E6C9"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="500" height="350" fill="url(#bg)"/>

<!-- Title bar -->
<rect x="0" y="0" width="500" height="42" fill="#1B5E20" rx="8"/>
<rect x="0" y="20" width="500" height="22" fill="#1B5E20"/>
<text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Аминокислоты: строение и свойства</text>

<!-- Card 1: Amino acid structure -->
<rect x="10" y="50" width="225" height="130" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
<text x="122" y="67" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">Строение аминокислоты</text>

<!-- General formula drawn -->
<text x="30" y="100" text-anchor="middle" fill="#C62828" font-size="11" font-weight="bold">H&#8322;N</text>
<line x1="48" y1="97" x2="68" y2="97" stroke="#555" stroke-width="1.3"/>
<!-- NH2 highlight rect -->
<rect x="14" y="86" width="42" height="18" rx="4" fill="#EF9A9A" opacity="0.3" stroke="#C62828" stroke-width="0.5"/>

<text x="78" y="100" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">CH</text>
<line x1="90" y1="97" x2="110" y2="97" stroke="#555" stroke-width="1.3"/>

<!-- COOH group -->
<text x="142" y="100" text-anchor="middle" fill="#1565C0" font-size="11" font-weight="bold">COOH</text>
<!-- COOH highlight rect -->
<rect x="114" y="86" width="56" height="18" rx="4" fill="#90CAF9" opacity="0.3" stroke="#1565C0" stroke-width="0.5"/>

<!-- R group -->
<line x1="78" y1="105" x2="78" y2="118" stroke="#555" stroke-width="1.3"/>
<text x="78" y="128" text-anchor="middle" fill="#FF8F00" font-size="11" font-weight="bold">R</text>
<rect x="64" y="117" width="28" height="16" rx="4" fill="#FFE082" opacity="0.4" stroke="#FF8F00" stroke-width="0.5"/>

<!-- Labels -->
<text x="35" y="152" text-anchor="middle" fill="#C62828" font-size="7">аминогруппа</text>
<text x="35" y="161" text-anchor="middle" fill="#C62828" font-size="7">(основная)</text>

<text x="142" y="152" text-anchor="middle" fill="#1565C0" font-size="7">карбоксильная</text>
<text x="142" y="161" text-anchor="middle" fill="#1565C0" font-size="7">группа (кислая)</text>

<text x="78" y="148" text-anchor="middle" fill="#FF8F00" font-size="7">радикал</text>
<text x="78" y="157" text-anchor="middle" fill="#FF8F00" font-size="7">(боковая цепь)</text>

<!-- Zwitterion note -->
<rect x="15" y="165" width="215" height="10" rx="5" fill="#E8F5E9"/>
<text x="122" y="173" text-anchor="middle" fill="#2E7D32" font-size="6">В растворе: H&#8323;N&#8314;-CH(R)-COO&#8315; (цвиттер-ион)</text>

<!-- Card 2: Amphoteric nature -->
<rect x="245" y="50" width="243" height="130" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
<text x="366" y="67" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">Амфотерность аминокислот</text>

<!-- Left: reaction with acid -->
<rect x="255" y="74" width="112" height="55" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
<text x="311" y="86" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">+ Кислота (HCl)</text>
<text x="268" y="100" fill="#333" font-size="7">H&#8322;N-CH&#8322;-COOH</text>
<text x="300" y="108" fill="#333" font-size="7">+</text>
<text x="310" y="108" fill="#C62828" font-size="7">HCl</text>
<line x1="268" y1="112" x2="310" y2="112" stroke="#C62828" stroke-width="0.8"/>
<text x="268" y="121" fill="#1B5E20" font-size="6.5">[H&#8323;N&#8314;-CH&#8322;-COOH]Cl&#8315;</text>

<!-- Right: reaction with base -->
<rect x="375" y="74" width="107" height="55" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
<text x="428" y="86" text-anchor="middle" fill="#1565C0" font-size="7" font-weight="bold">+ Щёлочь (NaOH)</text>
<text x="385" y="100" fill="#333" font-size="7">H&#8322;N-CH&#8322;-COOH</text>
<text x="417" y="108" fill="#333" font-size="7">+</text>
<text x="427" y="108" fill="#1565C0" font-size="7">NaOH</text>
<line x1="385" y1="112" x2="427" y2="112" stroke="#1565C0" stroke-width="0.8"/>
<text x="385" y="121" fill="#1B5E20" font-size="6.5">H&#8322;N-CH&#8322;-COO&#8315;Na&#8314;</text>

<!-- Dashed line connecting both -->
<line x1="367" y1="100" x2="375" y2="100" stroke="#66BB6A" stroke-width="1" stroke-dasharray="3,2"/>

<!-- Amphoteric symbol -->
<rect x="310" y="135" width="110" height="16" rx="8" fill="#4CAF50"/>
<text x="365" y="146" text-anchor="middle" fill="white" font-size="7" font-weight="bold">АМФОТЕРНОСТЬ</text>

<!-- Properties pills -->
<rect x="255" y="156" width="50" height="14" rx="7" fill="#EF5350"/>
<text x="280" y="166" text-anchor="middle" fill="white" font-size="6" font-weight="bold">кислота</text>
<rect x="310" y="156" width="50" height="14" rx="7" fill="#42A5F5"/>
<text x="335" y="166" text-anchor="middle" fill="white" font-size="6" font-weight="bold">основание</text>
<rect x="365" y="156" width="55" height="14" rx="7" fill="#66BB6A"/>
<text x="392" y="166" text-anchor="middle" fill="white" font-size="6" font-weight="bold">2 характера</text>

<!-- Card 3: Peptide bond formation -->
<rect x="10" y="188" width="320" height="125" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
<text x="170" y="205" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">Образование пептидной связи</text>

<!-- First amino acid -->
<rect x="18" y="212" width="100" height="40" rx="5" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<text x="30" y="228" fill="#C62828" font-size="8" font-weight="bold">H&#8322;N</text>
<text x="58" y="228" fill="#333" font-size="8">-CH-</text>
<text x="30" y="244" fill="#1565C0" font-size="8" font-weight="bold">COOH</text>
<text x="68" y="244" fill="#FF8F00" font-size="7">R&#8321;</text>

<!-- H2O leaving -->
<rect x="120" y="220" width="32" height="20" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
<text x="136" y="233" text-anchor="middle" fill="#1565C0" font-size="7" font-weight="bold">H&#8322;O</text>
<text x="136" y="215" text-anchor="middle" fill="#1565C0" font-size="6">-вода</text>

<!-- Arrow -->
<line x1="118" y1="232" x2="120" y2="232" stroke="#4CAF50" stroke-width="1"/>
<line x1="152" y1="232" x2="156" y2="232" stroke="#4CAF50" stroke-width="1"/>

<!-- Second amino acid -->
<rect x="156" y="212" width="100" height="40" rx="5" fill="#E8F5E9" stroke="#388E3C" stroke-width="1"/>
<text x="168" y="228" fill="#C62828" font-size="8" font-weight="bold">H&#8322;N</text>
<text x="196" y="228" fill="#333" font-size="8">-CH-</text>
<text x="168" y="244" fill="#1565C0" font-size="8" font-weight="bold">COOH</text>
<text x="206" y="244" fill="#FF8F00" font-size="7">R&#8322;</text>

<!-- Result: dipeptide -->
<rect x="18" y="260" width="300" height="22" rx="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
<text x="28" y="274" fill="#C62828" font-size="7" font-weight="bold">H&#8322;N</text>
<text x="52" y="274" fill="#333" font-size="7">-CH(R&#8321;)-</text>
<!-- Peptide bond highlighted -->
<rect x="104" y="262" width="50" height="16" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<text x="129" y="274" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">CO-NH</text>
<text x="160" y="274" fill="#333" font-size="7">-CH(R&#8322;)-</text>
<text x="222" y="274" fill="#1565C0" font-size="7" font-weight="bold">COOH</text>

<!-- Arrow pointing to bond -->
<line x1="129" y1="280" x2="129" y2="290" stroke="#C62828" stroke-width="0.8" stroke-dasharray="2,1"/>
<text x="129" y="298" text-anchor="middle" fill="#C62828" font-size="6" font-weight="bold">пептидная связь</text>

<!-- Condensation label -->
<rect x="245" y="214" width="78" height="14" rx="7" fill="#388E3C"/>
<text x="284" y="224" text-anchor="middle" fill="white" font-size="6" font-weight="bold">конденсация</text>

<!-- Card 4: Essential amino acids -->
<rect x="340" y="188" width="148" height="125" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
<text x="414" y="205" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">Незаменимые</text>
<text x="414" y="215" text-anchor="middle" fill="#1B5E20" font-size="8">аминокислоты</text>

<!-- Essential amino acid pills -->
<rect x="350" y="222" width="58" height="14" rx="7" fill="#43A047"/>
<text x="379" y="232" text-anchor="middle" fill="white" font-size="6" font-weight="bold">валин</text>
<rect x="412" y="222" width="68" height="14" rx="7" fill="#388E3C"/>
<text x="446" y="232" text-anchor="middle" fill="white" font-size="6" font-weight="bold">лейцин</text>

<rect x="350" y="240" width="68" height="14" rx="7" fill="#2E7D32"/>
<text x="384" y="250" text-anchor="middle" fill="white" font-size="6" font-weight="bold">изолейцин</text>
<rect x="422" y="240" width="58" height="14" rx="7" fill="#4CAF50"/>
<text x="451" y="250" text-anchor="middle" fill="white" font-size="6" font-weight="bold">лизин</text>

<rect x="350" y="258" width="72" height="14" rx="7" fill="#66BB6A"/>
<text x="386" y="268" text-anchor="middle" fill="white" font-size="6" font-weight="bold">метионин</text>
<rect x="426" y="258" width="56" height="14" rx="7" fill="#81C784"/>
<text x="454" y="268" text-anchor="middle" fill="#1B5E20" font-size="6" font-weight="bold">треонин</text>

<rect x="350" y="276" width="80" height="14" rx="7" fill="#A5D6A7"/>
<text x="390" y="286" text-anchor="middle" fill="#1B5E20" font-size="6" font-weight="bold">фенилаланин</text>
<rect x="434" y="276" width="48" height="14" rx="7" fill="#43A047"/>
<text x="458" y="286" text-anchor="middle" fill="white" font-size="6" font-weight="bold">триптофан</text>

<!-- Dashed line between cards -->
<line x1="235" y1="255" x2="245" y2="255" stroke="#66BB6A" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="330" y1="255" x2="340" y2="255" stroke="#66BB6A" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- Bottom accent bar -->
<rect x="0" y="330" width="500" height="20" fill="#1B5E20"/>
<text x="250" y="343" text-anchor="middle" fill="#A5D6A7" font-size="8">Аминокислоты &#8212; амфотерные соединения; пептидная связь: -CO-NH-</text>
</svg>