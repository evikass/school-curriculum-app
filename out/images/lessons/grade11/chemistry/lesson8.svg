<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Химические волокна</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Natural fibers -->
<rect x="12" y="58" width="150" height="75" rx="8" fill="white" stroke="#8D6E63" stroke-width="1.5" filter="url(#sh)"/>
<text x="87" y="75" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-weight="bold">Натуральные</text>
<text x="22" y="90" font-family="Arial,sans-serif" font-size="7" fill="#333">Хлопок: гигроскопичный</text>
<text x="22" y="102" font-family="Arial,sans-serif" font-size="7" fill="#333">Шёлк: белок (фиброин)</text>
<text x="22" y="114" font-family="Arial,sans-serif" font-size="7" fill="#333">Шерсть: тёплая, упругая</text>
<text x="22" y="126" font-family="Arial,sans-serif" font-size="7" fill="#8D6E63">Из целлюлозы / белка</text>

<!-- Artificial fibers -->
<rect x="175" y="58" width="150" height="75" rx="8" fill="white" stroke="#FF9800" stroke-width="1.5" filter="url(#sh)"/>
<text x="250" y="75" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Искусственные</text>
<text x="185" y="90" font-family="Arial,sans-serif" font-size="7" fill="#333">Вискоза: мягкая, гигроскопичная</text>
<text x="185" y="102" font-family="Arial,sans-serif" font-size="7" fill="#333">Ацетат: эластичная, драпируется</text>
<text x="185" y="114" font-family="Arial,sans-serif" font-size="7" fill="#FF9800">Из химически изменённой</text>
<text x="185" y="126" font-family="Arial,sans-serif" font-size="7" fill="#FF9800">природной целлюлозы</text>

<!-- Synthetic fibers -->
<rect x="338" y="58" width="150" height="75" rx="8" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
<text x="413" y="75" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Синтетические</text>
<text x="348" y="90" font-family="Arial,sans-serif" font-size="7" fill="#333">Капрон: полиамид, прочнейший</text>
<text x="348" y="102" font-family="Arial,sans-serif" font-size="7" fill="#333">Лавсан: полиэфир, светостоек</text>
<text x="348" y="114" font-family="Arial,sans-serif" font-size="7" fill="#333">Нитрон: искусственная шерсть</text>
<text x="348" y="126" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Из продуктов нефтехимии</text>

<!-- Properties comparison table -->
<rect x="12" y="145" width="476" height="155" rx="8" fill="white" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="250" y="163" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Сравнение свойств волокон</text>
<line x1="12" y1="170" x2="488" y2="170" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Headers -->
<text x="80" y="183" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Свойство</text>
<text x="170" y="183" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle" font-weight="bold">Хлопок</text>
<text x="250" y="183" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Вискоза</text>
<text x="330" y="183" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Капрон</text>
<text x="410" y="183" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Лавсан</text>
<line x1="12" y1="188" x2="488" y2="188" stroke="#ccc" stroke-width="0.5"/>
<!-- Rows -->
<text x="80" y="201" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Прочность</text>
<text x="170" y="201" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Средняя</text>
<text x="250" y="201" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Средняя</text>
<text x="330" y="201" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Очень высокая</text>
<text x="410" y="201" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Высокая</text>

<text x="80" y="217" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Гигроскопичность</text>
<text x="170" y="217" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle" font-weight="bold">Хорошая</text>
<text x="250" y="217" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle" font-weight="bold">Хорошая</text>
<text x="330" y="217" font-family="Arial,sans-serif" font-size="7" fill="#F44336" text-anchor="middle">Низкая</text>
<text x="410" y="217" font-family="Arial,sans-serif" font-size="7" fill="#F44336" text-anchor="middle">Низкая</text>

<text x="80" y="233" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Светостойкость</text>
<text x="170" y="233" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Средняя</text>
<text x="250" y="233" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Средняя</text>
<text x="330" y="233" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Средняя</text>
<text x="410" y="233" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle" font-weight="bold">Отличная</text>

<text x="80" y="249" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Усадка при намокании</text>
<text x="170" y="249" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Умеренная</text>
<text x="250" y="249" font-family="Arial,sans-serif" font-size="7" fill="#FF9800" text-anchor="middle">Сильная</text>
<text x="330" y="249" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle">Нет</text>
<text x="410" y="249" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle">Нет</text>

<!-- Fact -->
<text x="250" y="275" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Капрон прочнее стали равного сечения! Бутылки ПЭТ = волокно лавсан</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>