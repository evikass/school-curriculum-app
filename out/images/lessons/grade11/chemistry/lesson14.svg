<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Электролиз</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Electrolysis cell diagram -->
<rect x="12" y="58" width="235" height="140" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
<text x="130" y="75" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ячейка для электролиза (NaCl р-р)</text>
<!-- Cathode -->
<rect x="30" y="85" width="12" height="70" rx="2" fill="#1565C0"/>
<text x="36" y="165" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">(-)</text>
<text x="36" y="175" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Катод</text>
<text x="60" y="100" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">2H2O + 2e-</text>
<text x="60" y="110" font-family="Arial,sans-serif" font-size="6" fill="#1565C0"> -> H2 + 2OH-</text>
<!-- Anode -->
<rect x="195" y="85" width="12" height="70" rx="2" fill="#F44336"/>
<text x="201" y="165" font-family="Arial,sans-serif" font-size="6" fill="#F44336" text-anchor="middle">(+)</text>
<text x="201" y="175" font-family="Arial,sans-serif" font-size="5" fill="#F44336" text-anchor="middle">Анод</text>
<text x="120" y="100" font-family="Arial,sans-serif" font-size="6" fill="#F44336">2Cl- - 2e-</text>
<text x="120" y="110" font-family="Arial,sans-serif" font-size="6" fill="#F44336"> -> Cl2</text>
<!-- DC source -->
<rect x="70" y="85" width="80" height="15" rx="3" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="0.8"/>
<text x="110" y="96" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Источник тока</text>
<!-- Arrows -->
<path d="M42,125 L42,135 L36,130 Z" fill="#1565C0"/>
<text x="50" y="133" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">восст.</text>
<path d="M195,125 L195,135 L201,130 Z" fill="#F44336"/>
<text x="188" y="133" font-family="Arial,sans-serif" font-size="5" fill="#F44336">окисл.</text>

<!-- Rules -->
<rect x="258" y="58" width="230" height="140" rx="8" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="75" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Правила электролиза</text>
<line x1="268" y1="80" x2="478" y2="80" stroke="#1565C0" stroke-width="0.5"/>
<text x="268" y="93" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">Катод (-) восстановление:</text>
<text x="278" y="106" font-family="Arial,sans-serif" font-size="7" fill="#333">После H2 (Cu,Ag,Au): металл</text>
<text x="278" y="119" font-family="Arial,sans-serif" font-size="7" fill="#333">До Al: вода -> H2</text>
<text x="278" y="132" font-family="Arial,sans-serif" font-size="7" fill="#333">Zn-Pb: металл + H2</text>
<text x="268" y="148" font-family="Arial,sans-serif" font-size="7" fill="#F44336" font-weight="bold">Анод (+) окисление (инертный):</text>
<text x="278" y="161" font-family="Arial,sans-serif" font-size="7" fill="#333">Cl-, Br-, I-, S2-: анион окисляется</text>
<text x="278" y="174" font-family="Arial,sans-serif" font-size="7" fill="#333">SO4 2-, NO3-: вода -> O2</text>
<text x="278" y="187" font-family="Arial,sans-serif" font-size="7" fill="#333">Растворимый анод: растворяется!</text>

<!-- Faraday's Laws -->
<rect x="12" y="210" width="235" height="100" rx="8" fill="white" stroke="#FF9800" stroke-width="1.5" filter="url(#sh)"/>
<text x="130" y="228" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Законы Фарадея</text>
<text x="130" y="245" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">m = M * I * t / (n * F)</text>
<text x="22" y="260" font-family="Arial,sans-serif" font-size="7" fill="#333">m — масса (г), M — молярная масса</text>
<text x="22" y="273" font-family="Arial,sans-serif" font-size="7" fill="#333">I — сила тока (А), t — время (с)</text>
<text x="22" y="286" font-family="Arial,sans-serif" font-size="7" fill="#333">n — число перенесённых электронов</text>
<text x="22" y="299" font-family="Arial,sans-serif" font-size="7" fill="#E65100">F = 96500 Кл/моль (постоянная Фарадея)</text>

<!-- Applications -->
<rect x="258" y="210" width="230" height="100" rx="8" fill="white" stroke="#9C27B0" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="228" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Применение</text>
<circle cx="268" cy="245" r="3" fill="#4CAF50"/><text x="278" y="248" font-family="Arial,sans-serif" font-size="7" fill="#333">Гальванопластика — получение копий</text>
<circle cx="268" cy="260" r="3" fill="#2196F3"/><text x="278" y="263" font-family="Arial,sans-serif" font-size="7" fill="#333">Гальваностегия — покрытие металлами</text>
<circle cx="268" cy="275" r="3" fill="#FF9800"/><text x="278" y="278" font-family="Arial,sans-serif" font-size="7" fill="#333">Получение Al, Na, Cl2, NaOH</text>
<circle cx="268" cy="290" r="3" fill="#9C27B0"/><text x="278" y="293" font-family="Arial,sans-serif" font-size="7" fill="#333">Очистка металлов (рафинирование Cu)</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>