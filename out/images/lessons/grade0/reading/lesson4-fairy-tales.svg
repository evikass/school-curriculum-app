<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes open { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
      .book { animation: open 3s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fef3c7"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#b45309">Слушание сказок 📚</text>
  
  <!-- Book icon -->
  <g class="book">
    <rect x="180" y="50" width="140" height="100" fill="#8b5cf6" rx="10"/>
    <rect x="190" y="60" width="120" height="80" fill="#f5f3ff" rx="5"/>
    <text x="250" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">📖</text>
    <text x="250" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7c3aed">СКАЗКИ</text>
  </g>
  
  <!-- Fairy tales list -->
  <rect x="20" y="165" width="220" height="160" fill="#dbeafe" rx="15"/>
  <text x="130" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8">Русские народные сказки</text>
  
  <text x="40" y="220" font-family="Arial, sans-serif" font-size="12" fill="#374151">🟡 Колобок</text>
  <text x="40" y="245" font-family="Arial, sans-serif" font-size="12" fill="#374151">🏠 Теремок</text>
  <text x="40" y="270" font-family="Arial, sans-serif" font-size="12" fill="#374151">🥕 Репка</text>
  <text x="40" y="295" font-family="Arial, sans-serif" font-size="12" fill="#374151">🐔 Курочка Ряба</text>
  <text x="40" y="320" font-family="Arial, sans-serif" font-size="12" fill="#374151">🐻 Три медведя</text>
  
  <!-- Listening tips -->
  <rect x="260" y="165" width="220" height="160" fill="#dcfce7" rx="15"/>
  <text x="370" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">Как слушать сказку</text>
  
  <text x="280" y="220" font-family="Arial, sans-serif" font-size="11" fill="#374151">1. Сядь удобно 👀</text>
  <text x="280" y="245" font-family="Arial, sans-serif" font-size="11" fill="#374151">2. Слушай внимательно 👂</text>
  <text x="280" y="270" font-family="Arial, sans-serif" font-size="11" fill="#374151">3. Запоминай героев 🦸</text>
  <text x="280" y="295" font-family="Arial, sans-serif" font-size="11" fill="#374151">4. Представляй картинки 🖼️</text>
  <text x="280" y="320" font-family="Arial, sans-serif" font-size="11" fill="#374151">5. Чему учит сказка? 💡</text>
</svg>
