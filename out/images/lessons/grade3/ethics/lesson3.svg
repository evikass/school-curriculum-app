<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD9"/>
    </linearGradient>
    <radialGradient id="heartGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4081"/>
      <stop offset="100%" stop-color="#E91E63"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg3)"/>
  
  <!-- Sun with rays -->
  <circle cx="450" cy="50" r="22" fill="#FFD54F">
    <animate attributeName="r" values="20;24;20" dur="2s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#FFD54F" stroke-width="2">
    <line x1="450" y1="20" x2="450" y2="10"/>
    <line x1="470" y1="30" x2="480" y2="20"/>
    <line x1="480" y1="50" x2="490" y2="50"/>
    <line x1="470" y1="70" x2="480" y2="80"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C2185B" text-anchor="middle">💖 Доброта</text>
  <rect x="120" y="42" width="260" height="2" rx="1" fill="#E91E63" opacity="0.6"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="325" rx="270" ry="35" fill="#F48FB1" opacity="0.4"/>
  
  <!-- Big animated heart -->
  <g transform="translate(180, 70)">
    <path d="M70,30 C70,10 55,0 40,0 C25,0 10,15 10,30 C10,55 70,90 70,90 C70,90 130,55 130,30 C130,15 115,0 100,0 C85,0 70,10 70,30" fill="url(#heartGrad)">
      <animate attributeName="d" 
        values="M70,30 C70,10 55,0 40,0 C25,0 10,15 10,30 C10,55 70,90 70,90 C70,90 130,55 130,30 C130,15 115,0 100,0 C85,0 70,10 70,30;
                M70,25 C70,5 55,-5 40,-5 C25,-5 10,10 10,25 C10,50 70,85 70,85 C70,85 130,50 130,25 C130,10 115,-5 100,-5 C85,-5 70,5 70,25;
                M70,30 C70,10 55,0 40,0 C25,0 10,15 10,30 C10,55 70,90 70,90 C70,90 130,55 130,30 C130,15 115,0 100,0 C85,0 70,10 70,30"
        dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Small hearts floating -->
  <g fill="#F48FB1">
    <path d="M25,180 C25,175 20,172 17,172 C14,172 12,175 12,178 C12,185 25,192 25,192 C25,192 38,185 38,178 C38,175 36,172 33,172 C30,172 25,175 25,180">
      <animate attributeName="transform" type="translate" values="0,0;5,-10;0,0" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M470,200 C470,195 465,192 462,192 C459,192 457,195 457,198 C457,205 470,212 470,212 C470,212 483,205 483,198 C483,195 481,192 478,192 C475,192 470,195 470,200">
      <animate attributeName="transform" type="translate" values="0,0;-5,-15;0,0" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Kind deeds -->
  <g transform="translate(30, 180)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="140" height="100" fill="#FFF" rx="10" stroke="#E91E63"/>
    <text x="70" y="25" font-size="12" font-weight="bold" fill="#C2185B" text-anchor="middle">Добрые дела</text>
    <text x="15" y="45" font-size="10" fill="#E91E63">• Помочь другу</text>
    <text x="15" y="60" font-size="10" fill="#E91E63">• Пожалеть кого-то</text>
    <text x="15" y="75" font-size="10" fill="#E91E63">• Поделиться</text>
    <text x="15" y="90" font-size="10" fill="#E91E63">• Сказать комплимент</text>
  </g>
  
  <!-- Kindness flower -->
  <g transform="translate(330, 180)">
    <line x1="35" y1="100" x2="35" y2="50" stroke="#4CAF50" stroke-width="3"/>
    <circle cx="35" cy="40" r="15" fill="#FF80AB">
      <animate attributeName="r" values="13;16;13" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="20" cy="50" r="12" fill="#FF4081">
      <animate attributeName="r" values="10;13;10" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="12" fill="#FF4081">
      <animate attributeName="r" values="10;13;10" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="25" cy="65" r="10" fill="#F48FB1"/>
    <circle cx="45" cy="65" r="10" fill="#F48FB1"/>
    <circle cx="35" cy="50" r="8" fill="#FFC107"/>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(40, 280)">
    <rect x="0" y="0" width="420" height="50" fill="#FFF" rx="8" stroke="#E91E63"/>
    <text x="210" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C2185B" text-anchor="middle">💡 Доброта — это солнце, которое согревает сердце!</text>
    <text x="210" y="38" font-family="Arial, sans-serif" font-size="10" fill="#E91E63" text-anchor="middle">Добрый человек делает мир лучше своими поступками</text>
  </g>
</svg>