<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DCEDC8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#F1F8E9;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky14)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#33691E" text-anchor="middle">🔢 Число прилагательных</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#8BC34A" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#C5E1A5" opacity="0.5"/>
  
  <!-- Two columns -->
  <g transform="translate(30, 80)" font-family="Arial, sans-serif">
    <!-- Singular -->
    <rect x="0" y="0" width="200" height="130" fill="#DCEDC8" rx="10" stroke="#7CB342"/>
    <text x="100" y="25" font-size="14" font-weight="bold" fill="#33691E" text-anchor="middle">Единственное число</text>
    <text x="100" y="50" font-size="11" fill="#558B2F" text-anchor="middle">Один предмет</text>
    <text x="100" y="75" font-size="11" fill="#689F38" text-anchor="middle">красивый дом</text>
    <text x="100" y="95" font-size="11" fill="#689F38" text-anchor="middle">красивая машина</text>
    <text x="100" y="115" font-size="11" fill="#689F38" text-anchor="middle">красивое дерево</text>
    
    <!-- Plural -->
    <rect x="220" y="0" width="200" height="130" fill="#B3E5FC" rx="10" stroke="#0288D1"/>
    <text x="320" y="25" font-size="14" font-weight="bold" fill="#01579B" text-anchor="middle">Множественное число</text>
    <text x="320" y="50" font-size="11" fill="#0277BD" text-anchor="middle">Несколько предметов</text>
    <text x="320" y="75" font-size="11" fill="#039BE5" text-anchor="middle">красивые дома</text>
    <text x="320" y="95" font-size="11" fill="#039BE5" text-anchor="middle">красивые машины</text>
    <text x="320" y="115" font-size="11" fill="#039BE5" text-anchor="middle">красивые деревья</text>
  </g>
  
  <!-- Arrow -->
  <g>
    <path d="M230,145 L270,145" stroke="#7CB342" stroke-width="3" fill="none"/>
    <polygon points="270,145 260,140 260,150" fill="#7CB342"/>
  </g>
  
  <!-- Endings -->
  <g transform="translate(50, 230)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="50" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="20" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">Окончания множественного числа</text>
    <text x="200" y="40" font-size="11" fill="#F57C00" text-anchor="middle">-ые (после твёрдых согласных): красивые, большие</text>
    <text x="200" y="55" font-size="11" fill="#F57C00" text-anchor="middle">-ие (после мягких согласных): синие, ранние</text>
  </g>
  
  <!-- Important note -->
  <g transform="translate(100, 290)">
    <rect x="0" y="0" width="300" height="25" fill="#FCE4EC" rx="5" stroke="#E91E63"/>
    <text x="150" y="18" font-family="Arial, sans-serif" font-size="11" fill="#C2185B" text-anchor="middle">💡 Во множественном числе род НЕ различается!</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="130" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="370" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>