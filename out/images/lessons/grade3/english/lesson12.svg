<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5"/>
      <stop offset="100%" style="stop-color:#E1BEE7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad12)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7B1FA2" text-anchor="middle">📅 Months</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#9C27B0" opacity="0.6"/>
  
  <!-- Months grid -->
  <g font-family="Arial, sans-serif" font-size="10" font-weight="bold">
    <!-- Row 1 -->
    <rect x="15" y="60" width="75" height="45" fill="#E8F5E9" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="52" y="78" fill="#2E7D32" text-anchor="middle">January</text>
    <text x="52" y="93" fill="#4CAF50" text-anchor="middle" font-size="8">январь</text>
    
    <rect x="95" y="60" width="75" height="45" fill="#E3F2FD" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="132" y="78" fill="#1565C0" text-anchor="middle">February</text>
    <text x="132" y="93" fill="#2196F3" text-anchor="middle" font-size="8">февраль</text>
    
    <rect x="175" y="60" width="75" height="45" fill="#FCE4EC" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="212" y="78" fill="#C2185B" text-anchor="middle">March</text>
    <text x="212" y="93" fill="#E91E63" text-anchor="middle" font-size="8">март</text>
    
    <rect x="255" y="60" width="75" height="45" fill="#FFF8E1" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="5.5s" repeatCount="indefinite"/>
    </rect>
    <text x="292" y="78" fill="#F57F17" text-anchor="middle">April</text>
    <text x="292" y="93" fill="#FFC107" text-anchor="middle" font-size="8">апрель</text>
    
    <rect x="335" y="60" width="75" height="45" fill="#C8E6C9" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="6s" repeatCount="indefinite"/>
    </rect>
    <text x="372" y="78" fill="#2E7D32" text-anchor="middle">May</text>
    <text x="372" y="93" fill="#4CAF50" text-anchor="middle" font-size="8">май</text>
    
    <rect x="415" y="60" width="70" height="45" fill="#FFECB3" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="6.5s" repeatCount="indefinite"/>
    </rect>
    <text x="450" y="78" fill="#E65100" text-anchor="middle">June</text>
    <text x="450" y="93" fill="#FF9800" text-anchor="middle" font-size="8">июнь</text>
    
    <!-- Row 2 -->
    <rect x="15" y="115" width="75" height="45" fill="#B3E5FC" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="52" y="133" fill="#0277BD" text-anchor="middle">July</text>
    <text x="52" y="148" fill="#03A9F4" text-anchor="middle" font-size="8">июль</text>
    
    <rect x="95" y="115" width="75" height="45" fill="#FFCDD2" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="4.7s" repeatCount="indefinite"/>
    </rect>
    <text x="132" y="133" fill="#C62828" text-anchor="middle">August</text>
    <text x="132" y="148" fill="#F44336" text-anchor="middle" font-size="8">август</text>
    
    <rect x="175" y="115" width="75" height="45" fill="#FFE0B2" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="5.2s" repeatCount="indefinite"/>
    </rect>
    <text x="212" y="133" fill="#E65100" text-anchor="middle">September</text>
    <text x="212" y="148" fill="#FF9800" text-anchor="middle" font-size="8">сентябрь</text>
    
    <rect x="255" y="115" width="75" height="45" fill="#D7CCC8" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="5.7s" repeatCount="indefinite"/>
    </rect>
    <text x="292" y="133" fill="#5D4037" text-anchor="middle">October</text>
    <text x="292" y="148" fill="#795548" text-anchor="middle" font-size="8">октябрь</text>
    
    <rect x="335" y="115" width="75" height="45" fill="#ECEFF1" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="6.2s" repeatCount="indefinite"/>
    </rect>
    <text x="372" y="133" fill="#455A64" text-anchor="middle">November</text>
    <text x="372" y="148" fill="#607D8B" text-anchor="middle" font-size="8">ноябрь</text>
    
    <rect x="415" y="115" width="70" height="45" fill="#E0F7FA" rx="8">
      <animate attributeName="opacity" values="1;0.85;1" dur="6.7s" repeatCount="indefinite"/>
    </rect>
    <text x="450" y="133" fill="#00838F" text-anchor="middle">December</text>
    <text x="450" y="148" fill="#00BCD4" text-anchor="middle" font-size="8">декабрь</text>
  </g>
  
  <!-- Seasons indicator -->
  <g font-family="Arial, sans-serif" font-size="10">
    <rect x="20" y="175" width="460" height="35" fill="white" rx="8" opacity="0.5"/>
    <text x="70" y="197" fill="#E91E63" text-anchor="middle" font-weight="bold">🌸 Mar-May</text>
    <text x="180" y="197" fill="#FF9800" text-anchor="middle" font-weight="bold">☀️ Jun-Aug</text>
    <text x="290" y="197" fill="#795548" text-anchor="middle" font-weight="bold">🍂 Sep-Nov</text>
    <text x="400" y="197" fill="#2196F3" text-anchor="middle" font-weight="bold">❄️ Dec-Feb</text>
  </g>
  
  <!-- Calendar icon -->
  <g transform="translate(220, 230)">
    <rect x="0" y="10" width="60" height="50" fill="#FF5252" rx="5"/>
    <rect x="5" y="25" width="50" height="30" fill="white" rx="3"/>
    <rect x="15" y="5" width="8" height="15" fill="#795548" rx="2"/>
    <rect x="37" y="5" width="8" height="15" fill="#795548" rx="2"/>
    <text x="30" y="45" font-family="Arial" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">12</text>
  </g>
  
  <!-- Text -->
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="14" fill="#7B1FA2" text-anchor="middle">There are 12 months in a year</text>
  
  <!-- Lesson number -->
  <circle cx="30" cy="320" r="20" fill="#9C27B0" opacity="0.9"/>
  <text x="30" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">12</text>
</svg>