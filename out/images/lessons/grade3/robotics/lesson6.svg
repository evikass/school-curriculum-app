<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECEFF1"/>
      <stop offset="100%" stop-color="#CFD8DC"/>
    </linearGradient>
    <linearGradient id="gear1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <linearGradient id="gear2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="gear3Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="gear4Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg6)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#37474F" text-anchor="middle">⚙️ Шестерёнки</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#607D8B" opacity="0.5"/>
  
  <!-- Gear Function - Create toothed gears -->
  
  <!-- Big Orange Gear (driver) -->
  <g transform="translate(130, 150)">
    <animateTransform attributeName="transform" type="rotate" from="0 130 150" to="360 130 150" dur="6s" repeatCount="indefinite" additive="sum"/>
    <circle cx="0" cy="0" r="50" fill="url(#gear1Grad)"/>
    <circle cx="0" cy="0" r="15" fill="#FFCCBC"/>
    <circle cx="0" cy="0" r="8" fill="#BF360C"/>
    <!-- Teeth -->
    <g fill="#FF5722">
      <rect x="-8" y="-58" width="16" height="12" rx="2"/>
      <rect x="-8" y="46" width="16" height="12" rx="2"/>
      <rect x="-58" y="-8" width="12" height="16" rx="2"/>
      <rect x="46" y="-8" width="12" height="16" rx="2"/>
      <rect x="30" y="-45" width="16" height="12" rx="2" transform="rotate(45)"/>
      <rect x="-46" y="-8" width="16" height="12" rx="2" transform="rotate(45)"/>
      <rect x="-46" y="-8" width="16" height="12" rx="2" transform="rotate(135)"/>
      <rect x="-8" y="30" width="16" height="12" rx="2" transform="rotate(45 0 0)"/>
    </g>
    <text x="0" y="85" font-size="10" fill="#BF360C" text-anchor="middle" font-family="Arial">Ведущая</text>
  </g>
  
  <!-- Medium Blue Gear (driven) -->
  <g transform="translate(220, 120)">
    <animateTransform attributeName="transform" type="rotate" from="360 220 120" to="0 220 120" dur="4s" repeatCount="indefinite" additive="sum"/>
    <circle cx="0" cy="0" r="35" fill="url(#gear2Grad)"/>
    <circle cx="0" cy="0" r="12" fill="#BBDEFB"/>
    <circle cx="0" cy="0" r="5" fill="#0D47A1"/>
    <!-- Teeth -->
    <g fill="#2196F3">
      <rect x="-6" y="-42" width="12" height="10" rx="2"/>
      <rect x="-6" y="32" width="12" height="10" rx="2"/>
      <rect x="-42" y="-6" width="10" height="12" rx="2"/>
      <rect x="32" y="-6" width="10" height="12" rx="2"/>
      <rect x="20" y="-32" width="12" height="10" rx="2" transform="rotate(45)"/>
      <rect x="-32" y="-6" width="12" height="10" rx="2" transform="rotate(135)"/>
    </g>
    <text x="0" y="60" font-size="10" fill="#0D47A1" text-anchor="middle" font-family="Arial">Ведомая</text>
  </g>
  
  <!-- Small Green Gear -->
  <g transform="translate(290, 165)">
    <animateTransform attributeName="transform" type="rotate" from="0 290 165" to="360 290 165" dur="2s" repeatCount="indefinite" additive="sum"/>
    <circle cx="0" cy="0" r="25" fill="url(#gear3Grad)"/>
    <circle cx="0" cy="0" r="8" fill="#C8E6C9"/>
    <circle cx="0" cy="0" r="4" fill="#1B5E20"/>
    <!-- Teeth -->
    <g fill="#4CAF50">
      <rect x="-5" y="-32" width="10" height="9" rx="2"/>
      <rect x="-5" y="23" width="10" height="9" rx="2"/>
      <rect x="-32" y="-5" width="9" height="10" rx="2"/>
      <rect x="23" y="-5" width="9" height="10" rx="2"/>
    </g>
    <text x="0" y="48" font-size="10" fill="#1B5E20" text-anchor="middle" font-family="Arial">Маленькая</text>
  </g>
  
  <!-- Tiny Purple Gear -->
  <g transform="translate(340, 130)">
    <animateTransform attributeName="transform" type="rotate" from="360 340 130" to="0 340 130" dur="1.5s" repeatCount="indefinite" additive="sum"/>
    <circle cx="0" cy="0" r="18" fill="url(#gear4Grad)"/>
    <circle cx="0" cy="0" r="6" fill="#E1BEE7"/>
    <circle cx="0" cy="0" r="3" fill="#4A148C"/>
    <!-- Teeth -->
    <g fill="#9C27B0">
      <rect x="-4" y="-24" width="8" height="8" rx="1"/>
      <rect x="-4" y="16" width="8" height="8" rx="1"/>
      <rect x="-24" y="-4" width="8" height="8" rx="1"/>
      <rect x="16" y="-4" width="8" height="8" rx="1"/>
    </g>
  </g>
  
  <!-- Gear Ratio Explanation -->
  <g transform="translate(380, 80)">
    <rect x="0" y="0" width="100" height="80" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="50" y="18" font-size="9" font-weight="bold" fill="#F57C00" text-anchor="middle" font-family="Arial">Передача</text>
    <text x="50" y="35" font-size="8" fill="#FF8F00" text-anchor="middle" font-family="Arial">Большая → Маленькая</text>
    <text x="50" y="48" font-size="8" fill="#FF8F00" text-anchor="middle" font-family="Arial">= Увеличение</text>
    <text x="50" y="60" font-size="8" fill="#FF8F00" text-anchor="middle" font-family="Arial">скорости!</text>
    <g transform="translate(50, 72)">
      <polygon points="-10,0 10,0 0,-8" fill="#FF9800">
        <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>
  
  <!-- Info Box -->
  <g transform="translate(30, 250)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="70" fill="#ECEFF1" rx="8" stroke="#607D8B"/>
    <text x="220" y="18" font-size="12" font-weight="bold" fill="#37474F" text-anchor="middle">Шестерёнки передают вращение!</text>
    <text x="220" y="35" font-size="10" fill="#546E7A" text-anchor="middle">🔴 Ведущая шестерёнка — вращается от мотора</text>
    <text x="220" y="50" font-size="10" fill="#546E7A" text-anchor="middle">🔵 Ведомая шестерёнка — получает вращение</text>
    <text x="220" y="65" font-size="10" fill="#546E7A" text-anchor="middle">📐 Чем меньше шестерёнка, тем быстрее она крутится!</text>
  </g>
  
  <!-- Decorative arrows showing direction -->
  <g transform="translate(175, 100)">
    <path d="M0,0 A30,30 0 0,1 30,20" fill="none" stroke="#BF360C" stroke-width="2" stroke-linecap="round">
      <animate attributeName="stroke-dasharray" values="0,100;50,50;0,100" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>