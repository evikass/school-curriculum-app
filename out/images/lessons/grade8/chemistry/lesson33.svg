<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <g opacity="0.04">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#10b981" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#10b981" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#10b981" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#10b981" stroke-width="0.5"/>
  </g>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="55" fill="url(#headerGrad)" opacity="0.9"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="white">Соединения галогенов</text>

  <!-- ===== PANEL 1: FLUORINE (F) ===== -->
  <g transform="translate(10, 65)">
    <rect width="190" height="420" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>

    <!-- Header -->
    <rect x="0" y="0" width="190" height="40" rx="10" fill="#10b981" opacity="0.2"/>
    <rect x="0" y="20" width="190" height="20" fill="#10b981" opacity="0.2"/>
    <circle cx="28" cy="20" r="15" fill="#10b981" opacity="0.4"/>
    <text x="28" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fef9c3">F</text>
    <text x="100" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#10b981">Фтор</text>

    <!-- HF -->
    <g transform="translate(10, 52)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">HF</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Фтороводород</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Травление стекла</text>
    </g>

    <!-- CaF₂ -->
    <g transform="translate(10, 115)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">CaF₂</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Флюорит (плавиковый шпат)</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Металлургия, оптика</text>
    </g>

    <!-- Teflon -->
    <g transform="translate(10, 178)">
      <rect width="170" height="70" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">(-CF₂-CF₂-)ₙ</text>
      <text x="85" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Тефлон (Фторопласт)</text>
      <!-- Teflon pan icon -->
      <ellipse cx="45" cy="55" rx="18" ry="10" fill="none" stroke="#94a3b8" stroke-width="1"/>
      <line x1="63" y1="55" x2="80" y2="55" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="105" y="60" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Антипригарные</text>
      <text x="105" y="72" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">покрытия</text>
    </g>

    <!-- Freon note -->
    <g transform="translate(10, 258)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">NaF</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Фторид натрия</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Зубные пасты (против кариеса)</text>
    </g>

    <!-- F2 note -->
    <g transform="translate(10, 320)">
      <rect width="170" height="45" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="0.8" opacity="0.5"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24">⚠ F₂ — самый реакционно-</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24">способный галоген</text>
    </g>

    <!-- Nuclear note -->
    <g transform="translate(10, 372)">
      <rect width="170" height="40" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">UF₆ — обогащение урана</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Ядерная энергетика</text>
    </g>
  </g>

  <!-- ===== PANEL 2: CHLORINE (Cl) ===== -->
  <g transform="translate(208, 65)">
    <rect width="190" height="420" rx="10" fill="#1e293b" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>

    <!-- Header -->
    <rect x="0" y="0" width="190" height="40" rx="10" fill="#0d9488" opacity="0.2"/>
    <rect x="0" y="20" width="190" height="20" fill="#0d9488" opacity="0.2"/>
    <circle cx="28" cy="20" r="15" fill="#0d9488" opacity="0.4"/>
    <text x="28" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#bbf7d0">Cl</text>
    <text x="105" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0d9488">Хлор</text>

    <!-- NaCl -->
    <g transform="translate(10, 52)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">NaCl</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Поваренная соль</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Пищевая промышленность</text>
    </g>

    <!-- HCl -->
    <g transform="translate(10, 115)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">HCl</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Соляная кислота</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Металлургия, пищевая пром.</text>
    </g>

    <!-- PVC -->
    <g transform="translate(10, 178)">
      <rect width="170" height="70" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">(-CH₂-CHCl-)ₙ</text>
      <text x="85" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">ПВХ (Поливинилхлорид)</text>
      <!-- Pipe icon -->
      <rect x="30" y="48" width="40" height="12" rx="6" fill="none" stroke="#94a3b8" stroke-width="1"/>
      <text x="95" y="58" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Трубы, окна,</text>
      <text x="95" y="70" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">изоляция</text>
    </g>

    <!-- Cl₂ for disinfection -->
    <g transform="translate(10, 258)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Cl₂ / NaOCl</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Хлорная известь, белизна</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Дезинфекция, отбеливание</text>
    </g>

    <!-- KCl -->
    <g transform="translate(10, 320)">
      <rect width="170" height="45" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">KCl</text>
      <text x="85" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Калийные удобрения</text>
    </g>

    <!-- Chlorination note -->
    <g transform="translate(10, 372)">
      <rect width="170" height="40" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Хлорирование воды</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Очистка питьевой воды</text>
    </g>
  </g>

  <!-- ===== PANEL 3: BROMINE (Br) ===== -->
  <g transform="translate(406, 65)">
    <rect width="190" height="420" rx="10" fill="#1e293b" stroke="#059669" stroke-width="1.5" opacity="0.9"/>

    <!-- Header -->
    <rect x="0" y="0" width="190" height="40" rx="10" fill="#059669" opacity="0.2"/>
    <rect x="0" y="20" width="190" height="20" fill="#059669" opacity="0.2"/>
    <circle cx="28" cy="20" r="15" fill="#059669" opacity="0.4"/>
    <text x="28" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">Br</text>
    <text x="105" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#059669">Бром</text>

    <!-- KBr -->
    <g transform="translate(10, 52)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669">KBr</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Бромид калия</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Успокоительное средство</text>
    </g>

    <!-- NaBr -->
    <g transform="translate(10, 115)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669">NaBr</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Бромид натрия</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Медицина, седативные</text>
    </g>

    <!-- HBr -->
    <g transform="translate(10, 178)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#059669">HBr</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Бромоводород</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Органический синтез</text>
    </g>

    <!-- Br₂ -->
    <g transform="translate(10, 241)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f59e0b">Br₂</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Жидкий бром</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Аналитическая химия</text>
    </g>

    <!-- Photo note -->
    <g transform="translate(10, 304)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">AgBr</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Бромид серебра</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Фотография (плёнка)</text>
    </g>

    <!-- Bromine warning -->
    <g transform="translate(10, 367)">
      <rect width="170" height="45" rx="6" fill="#0f172a" stroke="#fbbf24" stroke-width="0.8" opacity="0.5"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24">⚠ Br₂ — жидкость,</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fbbf24">опасные пары!</text>
    </g>
  </g>

  <!-- ===== PANEL 4: IODINE (I) ===== -->
  <g transform="translate(604, 65)">
    <rect width="190" height="420" rx="10" fill="#1e293b" stroke="#0f766e" stroke-width="1.5" opacity="0.9"/>

    <!-- Header -->
    <rect x="0" y="0" width="190" height="40" rx="10" fill="#0f766e" opacity="0.2"/>
    <rect x="0" y="20" width="190" height="20" fill="#0f766e" opacity="0.2"/>
    <circle cx="28" cy="20" r="15" fill="#0f766e" opacity="0.4"/>
    <text x="28" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">I</text>
    <text x="105" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0f766e">Йод</text>

    <!-- I₂ -->
    <g transform="translate(10, 52)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#a78bfa">I₂</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Кристаллический йод</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Дезинфекция, антисептик</text>
    </g>

    <!-- KI -->
    <g transform="translate(10, 115)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f766e">KI</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Йодид калия</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Профилактика зоба</text>
    </g>

    <!-- AgI -->
    <g transform="translate(10, 178)">
      <rect width="170" height="55" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f766e">AgI</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Йодид серебра</text>
      <text x="85" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Искусственные осадки</text>
    </g>

    <!-- Qualitative reaction -->
    <g transform="translate(10, 241)">
      <rect width="170" height="70" rx="6" fill="#0f172a" stroke="#a78bfa" stroke-width="1" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a78bfa">Кач. реакция на I⁻</text>
      <text x="85" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">I₂ + крахмал</text>
      <!-- Starch test visual -->
      <rect x="45" y="45" width="80" height="18" rx="3" fill="#1e1b4b" opacity="0.7"/>
      <text x="85" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">СИНИЙ цвет</text>
    </g>

    <!-- Iodine tincture -->
    <g transform="translate(10, 320)">
      <rect width="170" height="45" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Спиртовая настойка I₂</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Медицина (антисептик)</text>
    </g>

    <!-- Sublimation -->
    <g transform="translate(10, 372)">
      <rect width="170" height="40" rx="6" fill="#0f172a" stroke="#14b8a6" stroke-width="0.8" opacity="0.7"/>
      <text x="85" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Сублимация I₂ (возгонка)</text>
      <text x="85" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Фиолетовые пары</text>
    </g>
  </g>

  <!-- Lesson badge -->
  <rect x="720" y="475" width="70" height="22" rx="11" fill="#059669" opacity="0.6"/>
  <text x="755" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Урок 33</text>
</svg>