<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="metal5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="20%" style="stop-color:#e2e8f0"/>
      <stop offset="40%" style="stop-color:#cbd5e1"/>
      <stop offset="60%" style="stop-color:#f1f5f9"/>
      <stop offset="80%" style="stop-color:#cbd5e1"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <linearGradient id="metalSide5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <linearGradient id="metalTop5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cbd5e1"/>
      <stop offset="50%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="mercury5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9"/>
      <stop offset="20%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
    <filter id="metalGlow5">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow5">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg5)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Простые вещества — металлы</text>

  <!-- Divider line -->
  <line x1="50" y1="65" x2="750" y2="65" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

  <!-- ===== METAL INGOT (center-left) ===== -->
  <g transform="translate(250, 200)" filter="url(#shadow5)">
    <!-- Ingot front face -->
    <path d="M-80,0 L80,0 L65,50 L-65,50 Z" fill="url(#metal5)" stroke="#64748b" stroke-width="1"/>
    <!-- Ingot top face -->
    <path d="M-80,0 L-55,-25 L95,-25 L80,0 Z" fill="url(#metalTop5)" stroke="#94a3b8" stroke-width="1"/>
    <!-- Ingot right face -->
    <path d="M80,0 L95,-25 L80,25 L65,50 Z" fill="url(#metalSide5)" stroke="#64748b" stroke-width="1"/>
    <!-- Shiny reflection on top -->
    <path d="M-45,-20 L-20,-20 L-15,-10 L-40,-10 Z" fill="white" opacity="0.5"/>
    <path d="M10,-18 L50,-18 L45,-8 L15,-8 Z" fill="white" opacity="0.3"/>
    <!-- Small sparkle -->
    <g transform="translate(20,-35)" fill="#fbbf24" opacity="0.7">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#fbbf24" stroke-width="1.5"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#fbbf24" stroke-width="1.5"/>
      <line x1="-5" y1="-5" x2="5" y2="5" stroke="#fbbf24" stroke-width="1"/>
      <line x1="5" y1="-5" x2="-5" y2="5" stroke="#fbbf24" stroke-width="1"/>
    </g>
  </g>

  <!-- "Me" label on ingot -->
  <text x="250" y="235" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#475569" text-anchor="middle" opacity="0.5">Me</text>

  <!-- ===== PROPERTY ICONS ===== -->

  <!-- LUSTER (Блеск) - Sun ray icon -->
  <g transform="translate(550, 120)">
    <!-- Icon background circle -->
    <circle cx="0" cy="0" r="40" fill="#10b981" opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
    <!-- Sun center -->
    <circle cx="0" cy="0" r="12" fill="#10b981" opacity="0.8"/>
    <!-- Sun rays -->
    <line x1="0" y1="-18" x2="0" y2="-28" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="0" y2="28" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-18" y1="0" x2="-28" y2="0" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="0" x2="28" y2="0" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-13" y1="-13" x2="-20" y2="-20" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <line x1="13" y1="-13" x2="20" y2="-20" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <line x1="-13" y1="13" x2="-20" y2="20" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <line x1="13" y1="13" x2="20" y2="20" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <!-- Label -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Блеск</text>
  </g>

  <!-- MALLEABILITY (Пластичность) - Hammer icon -->
  <g transform="translate(700, 120)">
    <!-- Icon background circle -->
    <circle cx="0" cy="0" r="40" fill="#059669" opacity="0.1" stroke="#059669" stroke-width="1.5"/>
    <!-- Hammer handle -->
    <rect x="-3" y="5" width="6" height="28" rx="2" fill="#059669" transform="rotate(-30, 0, 15)"/>
    <!-- Hammer head -->
    <rect x="-18" y="-18" width="36" height="14" rx="3" fill="#059669" opacity="0.9"/>
    <!-- Hammer face -->
    <rect x="-20" y="-16" width="4" height="10" rx="1" fill="#0d9488"/>
    <!-- Impact lines -->
    <line x1="-25" y1="8" x2="-30" y2="12" stroke="#059669" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-22" y1="12" x2="-25" y2="18" stroke="#059669" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Пластичность</text>
  </g>

  <!-- CONDUCTIVITY (Электропроводность) - Lightning bolt icon -->
  <g transform="translate(550, 280)">
    <!-- Icon background circle -->
    <circle cx="0" cy="0" r="40" fill="#0d9488" opacity="0.1" stroke="#0d9488" stroke-width="1.5"/>
    <!-- Lightning bolt -->
    <path d="M5,-25 L-8,-2 L2,-2 L-5,25 L15,-5 L5,-5 Z" fill="#0d9488" stroke="#14b8a6" stroke-width="1" stroke-linejoin="round"/>
    <!-- Spark effects -->
    <circle cx="12" cy="-18" r="2" fill="#14b8a6" opacity="0.5"/>
    <circle cx="-12" cy="20" r="1.5" fill="#14b8a6" opacity="0.4"/>
    <!-- Label -->
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Электро-</text>
    <text x="0" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">проводность</text>
  </g>

  <!-- ===== MERCURY THERMOMETER ===== -->
  <g transform="translate(700, 280)">
    <!-- Label above -->
    <text x="0" y="-48" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Ртуть (Hg)</text>
    <text x="0" y="-32" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">жидкий металл</text>

    <!-- Thermometer body -->
    <rect x="-10" y="-25" width="20" height="75" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
    <!-- Mercury column -->
    <rect x="-6" y="5" width="12" height="40" rx="6" fill="url(#mercury5)"/>
    <!-- Mercury bulb at bottom -->
    <circle cx="0" cy="52" r="12" fill="url(#mercury5)" stroke="#475569" stroke-width="1"/>
    <!-- Bulb highlight -->
    <circle cx="-3" cy="49" r="4" fill="white" opacity="0.4"/>
    <!-- Scale marks -->
    <line x1="12" y1="0" x2="18" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="12" y1="12" x2="18" y2="12" stroke="#94a3b8" stroke-width="1"/>
    <line x1="12" y1="24" x2="18" y2="24" stroke="#94a3b8" stroke-width="1"/>
    <line x1="12" y1="36" x2="16" y2="36" stroke="#94a3b8" stroke-width="0.8"/>

    <!-- Hg label -->
    <text x="0" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6" text-anchor="middle">Hg</text>
  </g>

  <!-- ===== Properties summary box ===== -->
  <rect x="80" y="380" width="640" height="85" rx="10" fill="#0d9488" opacity="0.08" stroke="#0d9488" stroke-width="1"/>

  <!-- Properties list -->
  <text x="400" y="405" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">Свойства металлов:</text>

  <g transform="translate(0, 425)">
    <!-- Row of property pills -->
    <rect x="100" y="0" width="100" height="25" rx="12" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
    <text x="150" y="17" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Блеск</text>

    <rect x="220" y="0" width="120" height="25" rx="12" fill="#059669" opacity="0.2" stroke="#059669" stroke-width="1"/>
    <text x="280" y="17" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Пластичность</text>

    <rect x="360" y="0" width="140" height="25" rx="12" fill="#0d9488" opacity="0.2" stroke="#0d9488" stroke-width="1"/>
    <text x="430" y="17" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Электропроводность</text>

    <rect x="520" y="0" width="120" height="25" rx="12" fill="#14b8a6" opacity="0.2" stroke="#14b8a6" stroke-width="1"/>
    <text x="580" y="17" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">Теплопроводн.</text>
  </g>

  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>