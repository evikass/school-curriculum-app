<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="sh12">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="ar12" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0d9488"/>
    </marker>
    <marker id="ar12r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" fill="url(#bg12)" rx="12"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="bold" fill="#0d9488">Генетическая связь между классами неорганических веществ</text>
  <text x="410" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6">Каждый класс веществ является звеном в генетическом ряду</text>

  <!-- ===== METAL ROW (top) ===== -->
  <rect x="25" y="75" width="770" height="165" rx="10" fill="white" fill-opacity="0.5" stroke="#2dd4bf" stroke-width="1"/>
  <text x="50" y="95" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488">Генетический ряд металла:</text>

  <!-- Metal box -->
  <rect x="40" y="110" width="150" height="65" rx="10" fill="#0d9488" fill-opacity="0.15" stroke="#0d9488" stroke-width="2" filter="url(#sh12)"/>
  <text x="115" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Металл</text>
  <text x="115" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#065f46">Ca</text>

  <!-- Arrow 1 -->
  <line x1="195" y1="142" x2="245" y2="142" stroke="#0d9488" stroke-width="2.5" marker-end="url(#ar12)"/>
  <text x="220" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">+O₂</text>

  <!-- Basic oxide box -->
  <rect x="250" y="110" width="150" height="65" rx="10" fill="#0d9488" fill-opacity="0.15" stroke="#0d9488" stroke-width="2" filter="url(#sh12)"/>
  <text x="325" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Основный оксид</text>
  <text x="325" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#065f46">CaO</text>

  <!-- Arrow 2 -->
  <line x1="405" y1="142" x2="455" y2="142" stroke="#0d9488" stroke-width="2.5" marker-end="url(#ar12)"/>
  <text x="430" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">+H₂O</text>

  <!-- Base box -->
  <rect x="460" y="110" width="150" height="65" rx="10" fill="#0d9488" fill-opacity="0.15" stroke="#0d9488" stroke-width="2" filter="url(#sh12)"/>
  <text x="535" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Основание</text>
  <text x="535" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#065f46">Ca(OH)₂</text>

  <!-- Arrow 3 -->
  <line x1="615" y1="142" x2="665" y2="142" stroke="#0d9488" stroke-width="2.5" marker-end="url(#ar12)"/>
  <text x="640" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">+кислота</text>

  <!-- Salt box -->
  <rect x="670" y="110" width="120" height="65" rx="10" fill="#0d9488" fill-opacity="0.15" stroke="#0d9488" stroke-width="2" filter="url(#sh12)"/>
  <text x="730" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Соль</text>
  <text x="730" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#065f46">CaCl₂</text>

  <!-- Reaction equations for metal row -->
  <text x="410" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#0f766e">2Ca + O₂ → 2CaO  |  CaO + H₂O → Ca(OH)₂  |  Ca(OH)₂ + 2HCl → CaCl₂ + 2H₂O</text>

  <!-- ===== NONMETAL ROW (bottom) ===== -->
  <rect x="25" y="250" width="770" height="165" rx="10" fill="white" fill-opacity="0.5" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="50" y="270" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d97706">Генетический ряд неметалла:</text>

  <!-- Nonmetal box -->
  <rect x="40" y="285" width="150" height="65" rx="10" fill="#f59e0b" fill-opacity="0.12" stroke="#d97706" stroke-width="2" filter="url(#sh12)"/>
  <text x="115" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d97706">Неметалл</text>
  <text x="115" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400e">S</text>

  <!-- Arrow 1 -->
  <line x1="195" y1="317" x2="245" y2="317" stroke="#d97706" stroke-width="2.5" marker-end="url(#ar12)"/>
  <text x="220" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">+O₂</text>

  <!-- Acidic oxide box -->
  <rect x="250" y="285" width="150" height="65" rx="10" fill="#f59e0b" fill-opacity="0.12" stroke="#d97706" stroke-width="2" filter="url(#sh12)"/>
  <text x="325" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d97706">Кислотный оксид</text>
  <text x="325" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400e">SO₃</text>

  <!-- Arrow 2 -->
  <line x1="405" y1="317" x2="455" y2="317" stroke="#d97706" stroke-width="2.5" marker-end="url(#ar12)"/>
  <text x="430" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">+H₂O</text>

  <!-- Acid box -->
  <rect x="460" y="285" width="150" height="65" rx="10" fill="#f59e0b" fill-opacity="0.12" stroke="#d97706" stroke-width="2" filter="url(#sh12)"/>
  <text x="535" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d97706">Кислота</text>
  <text x="535" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400e">H₂SO₄</text>

  <!-- Arrow 3 -->
  <line x1="615" y1="317" x2="665" y2="317" stroke="#d97706" stroke-width="2.5" marker-end="url(#ar12)"/>
  <text x="640" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b45309">+основание</text>

  <!-- Salt box -->
  <rect x="670" y="285" width="120" height="65" rx="10" fill="#f59e0b" fill-opacity="0.12" stroke="#d97706" stroke-width="2" filter="url(#sh12)"/>
  <text x="730" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d97706">Соль</text>
  <text x="730" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#92400e">Na₂SO₄</text>

  <!-- Reaction equations for nonmetal row -->
  <text x="410" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="10.5" fill="#92400e">2S + 3O₂ → 2SO₃  |  SO₃ + H₂O → H₂SO₄  |  H₂SO₄ + 2NaOH → Na₂SO₄ + 2H₂O</text>

  <!-- ===== VERTICAL CONNECTIONS (Cross-links) ===== -->
  <!-- Base + Acid → Salt (center) -->
  <line x1="535" y1="180" x2="535" y2="280" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ar12r)"/>
  <rect x="545" y="215" width="100" height="30" rx="5" fill="white" stroke="#dc2626" stroke-width="1"/>
  <text x="595" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#dc2626">Реакция</text>
  <text x="595" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#dc2626">нейтрализации</text>

  <!-- Basic oxide + Acid → Salt + H₂O -->
  <line x1="325" y1="180" x2="325" y2="280" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="305" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#dc2626">CaO + 2HCl</text>

  <!-- Salt meets at right -->
  <path d="M 730 175 Q 770 230 730 280" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="782" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7c3aed">Общая</text>
  <text x="782" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#7c3aed">точка</text>

  <!-- ===== BOTTOM SUMMARY ===== -->
  <rect x="40" y="430" width="740" height="120" rx="10" fill="white" fill-opacity="0.85" stroke="#2dd4bf" stroke-width="1.5" filter="url(#sh12)"/>
  <text x="410" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Генетический ряд — цепочка превращений веществ одного элемента</text>

  <text x="60" y="478" font-family="Arial, sans-serif" font-size="11.5" fill="#0f766e">• Металл → Основный оксид → Основание → Соль</text>
  <text x="60" y="498" font-family="Arial, sans-serif" font-size="11.5" fill="#92400e">• Неметалл → Кислотный оксид → Кислота → Соль</text>
  <text x="60" y="518" font-family="Arial, sans-serif" font-size="11.5" fill="#7c3aed">• Соль — общее звено обоих рядов (основание + кислота → соль + вода)</text>
  <text x="60" y="538" font-family="Arial, sans-serif" font-size="11.5" fill="#0f766e">• Генетическая связь — связь между веществами разных классов на основе их превращений</text>
</svg>
