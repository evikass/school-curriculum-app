, sans-serif">ударная установка, синтезатор</text><text x="48" y="512" font-size="12.5" fill="#4C1D95" font-weight="bold" text-anchor="start" font-family="Arial, sans-serif">Общие:</text><text x="110" y="512" font-size="12.5" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">гитара, ударные, клавишные</text><text x="110" y="537" font-size="12.5" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">вокал, духовые</text><rect x="410" y="360" width="360" height="215" fill="#FFFFFF" rx="12" opacity="0.95" stroke="#A78BFA" stroke-width="1.5"/><rect x="410" y="360" width="360" height="36" fill="#7C3AED" rx="12 12 0 0" opacity="1.0"/><text x="590" y="385" font-size="15" fill="#FFFFFF" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">Общие черты и различия</text><circle cx="428" cy="408" r="3" fill="#7C3AED" opacity="1.0"/><text x="438" y="412" font-size="12.5" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">Общее: импровизация, ритмичность</text><circle cx="428" cy="431" r="3" fill="#7C3AED" opacity="1.0"/><text x="438" y="435" font-size="12.5" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">Общее: выражение эмоций</text><circle cx="428" cy="454" r="3" fill="#7C3AED" opacity="1.0"/><text x="438" y="458" font-size="12.5" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">Общее: африканские корни</text><circle cx="428" cy="477" r="3" fill="#7C3AED" opacity="1.0"/><text x="438" y="481" font-size="12.5" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">Различие: джаз — свинг и синкопы</text><circle cx="428" cy="500" r="3" fill="#7C3AED" opacity="1.0"/><text x="438" y="504" font-size="12.5" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">Различие: рок — прямая бит-пульсация</text><circle cx="