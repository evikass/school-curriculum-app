<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#FFF1F2"/><rect x="0" y="0" width="800" height="48" fill="#EC4899"/>
<text x="400" y="32" font-size="22" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Наречие как часть речи</text><circle cx="40" cy="30" r="20" fill="#BE185D"/>
    <text x="40" y="36" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">6</text><rect x="20" y="60" width="760" height="50" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><text x="400" y="90" font-size="14" fill="#1F2937" text-anchor="middle" font-weight="normal" font-family="Arial, sans-serif">Наречие — неизменяемая часть речи, обозначающая признак действия, предмета или другого признака</text><rect x="20" y="120" width="760" height="50" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="128" width="174" height="28" rx="14" fill="#EC4899"/>
<text x="117" y="147" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Вопросы наречий</text><text x="400" y="155" font-size="14" fill="#BE185D" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">как? куда? откуда? где? когда? зачем? почему? насколько?</text><rect x="20" y="180" width="760" height="240" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="188" width="294" height="28" rx="14" fill="#BE185D"/>
<text x="177" y="207" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Разряды наречий по значению</text><rect x="35" y="218" width="730" height="30" rx="4" fill="#FDF2F8"/><rect x="38" y="221" width="132" height="24" rx="12" fill="#EC4899"/><text x="104" y="238" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Образа действия</text><text x="200" y="238" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">как?</text><text x="430" y="238" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">быстро, медленно, громко, тихо, внимательно</text><rect x="35" y="250" width="730" height="30" rx="4" fill="#FFFFFF"/><rect x="38" y="253" width="124" height="24" rx="12" fill="#8B5CF6"/><text x="100" y="270" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Меры и степени</text><text x="200" y="270" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">насколько? в какой степени?</text><text x="430" y="270" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">очень, слишком, почти, вдвое, совсем</text><rect x="35" y="282" width="730" height="30" rx="4" fill="#FDF2F8"/><rect x="38" y="285" width="52" height="24" rx="12" fill="#10B981"/><text x="64" y="302" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Места</text><text x="200" y="302" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">где? куда? откуда?</text><text x="430" y="302" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">здесь, там, внизу, вперёд, издалека</text><rect x="35" y="314" width="730" height="30" rx="4" fill="#FFFFFF"/><rect x="38" y="317" width="68" height="24" rx="12" fill="#3B82F6"/><text x="72" y="334" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Времени</text><text x="200" y="334" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">когда? с каких пор? до каких пор?</text><text x="430" y="334" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">сегодня, вчера, утром, давно, всегда</text><rect x="35" y="346" width="730" height="30" rx="4" fill="#FDF2F8"/><rect x="38" y="349" width="68" height="24" rx="12" fill="#F59E0B"/><text x="72" y="366" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Причины</text><text x="200" y="366" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">почему? отчего?</text><text x="430" y="366" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">сослепу, сгоряча, поневоле, случайно</text><rect x="35" y="378" width="730" height="30" rx="4" fill="#FFFFFF"/><rect x="38" y="381" width="44" height="24" rx="12" fill="#EF4444"/><text x="60" y="398" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Цели</text><text x="200" y="398" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">зачем? для чего?</text><text x="430" y="398" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">нарочно, специально, назло, напоказ</text><rect x="20" y="430" width="760" height="80" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="438" width="274" height="28" rx="14" fill="#10B981"/>
<text x="167" y="457" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Степени сравнения наречий</text><text x="40" y="470" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Сравнительная: быстрее, громче, более внимательно</text><text x="40" y="488" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Превосходная: быстрее всех, громче всего</text><text x="450" y="470" font-size="12" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Образуется от наречий на -о/-е</text><text x="450" y="488" font-size="12" fill="#EF4444" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Сравнит. = прил. сравнит. форма!</text><rect x="20" y="520" width="760" height="70" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="528" width="214" height="28" rx="14" fill="#8B5CF6"/>
<text x="137" y="547" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Синтаксическая роль</text><text x="40" y="556" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Обстоятельство: Мальчик бежал быстро. (как? — быстро)</text><text x="40" y="574" font-size="12" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Определение (редко): Пальто навырост. (какое? — навырост)</text></svg>