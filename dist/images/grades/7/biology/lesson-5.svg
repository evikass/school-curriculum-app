<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">Водоросли</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 7</text>
<rect x="20" y="72" width="370" height="280" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="205" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Типы водорослей</text><rect x="35" y="108" width="340" height="50" rx="6" fill="#D1FAE5" opacity="0.5"/><text x="50" y="127" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Зелёные водоросли</text><text x="50" y="142" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Хлорофилл a + b, хроматофоры</text><circle cx="310" cy="130" r="12" fill="#22C55E" stroke="#15803D" stroke-width="1.5"/><circle cx="340" cy="125" r="10" fill="#22C55E" stroke="#15803D" stroke-width="1.5"/><line x1="310" y1="142" x2="310" y2="155" stroke="#15803D" stroke-width="1"/><line x1="340" y1="135" x2="340" y2="150" stroke="#15803D" stroke-width="1"/><rect x="35" y="165" width="340" height="50" rx="6" fill="#FEF3C7" opacity="0.5"/><text x="50" y="184" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#D97706" font-weight="bold">Бурые водоросли</text><text x="50" y="199" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Фукоксантин, многоклеточные, морские</text><path d="M300,175 Q310,170 305,195 Q315,200 300,210 Q290,205 295,195 Q285,190 300,175Z" fill="#92400E" stroke="#78350F" stroke-width="1.5"/><path d="M325,175 Q335,172 330,190 Q340,195 330,205 Q320,200 323,190 Q313,185 325,175Z" fill="#92400E" stroke="#78350F" stroke-width="1.5"/><rect x="35" y="222" width="340" height="50" rx="6" fill="#FEE2E2" opacity="0.5"/><text x="50" y="241" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#EF4444" font-weight="bold">Красные водоросли</text><text x="50" y="256" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Фикоэритрин, глубоководные (до 200 м)</text><path d="M310,235 Q320,230 325,240 Q330,250 320,255 Q310,250 305,245Z" fill="#DC2626" stroke="#991B1B" stroke-width="1.5"/><path d="M335,238 Q342,233 345,243 Q348,253 340,255 Q333,250 330,245Z" fill="#DC2626" stroke="#991B1B" stroke-width="1.5"/><rect x="35" y="279" width="340" height="50" rx="6" fill="#DBEAFE" opacity="0.5"/><text x="50" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6" font-weight="bold">Диатомеи</text><text x="50" y="313" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Кремниевый панцирь, планктон</text><ellipse cx="320" cy="300" rx="18" ry="8" fill="none" stroke="#3B82F6" stroke-width="2"/><ellipse cx="345" cy="302" rx="15" ry="7" fill="none" stroke="#3B82F6" stroke-width="2"/><rect x="405" y="72" width="390" height="175" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="600" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Одноклеточная водоросль</text><ellipse cx="540" cy="170" rx="40" ry="30" fill="#D1FAE5" stroke="#15803D" stroke-width="2"/><path d="M515,160 Q520,185 540,190 Q560,185 565,160 Q555,155 540,152 Q525,155 515,160Z" fill="#22C55E" stroke="#15803D" stroke-width="1"/><circle cx="540" cy="170" r="8" fill="#FFFFFF" stroke="#065F46" stroke-width="1.5"/><text x="540" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#065F46" font-weight="bold">Ядро</text><circle cx="525" cy="158" r="4" fill="#EF4444" stroke="#991B1B" stroke-width="0.8"/><path d="M520,145 Q510,125 515,110" fill="none" stroke="#6B7280" stroke-width="1.5"/><path d="M530,143 Q525,120 535,108" fill="none" stroke="#6B7280" stroke-width="1.5"/><line x1="540" y1="145" x2="600" y2="125" stroke="#059669" stroke-width="1.5"/><circle cx="600" cy="125" r="3" fill="#059669"/><text x="605" y="128" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Жгутики</text><line x1="525" y1="158" x2="480" y2="140" stroke="#059669" stroke-width="1.5"/><circle cx="480" cy="140" r="3" fill="#059669"/><text x="435" y="143" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Стигма (глазок)</text><line x1="510" y1="175" x2="450" y2="180" stroke="#059669" stroke-width="1.5"/><circle cx="450" cy="180" r="3" fill="#059669"/><text x="410" y="183" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Хроматофор</text><line x1="560" y1="195" x2="620" y2="195" stroke="#059669" stroke-width="1.5"/><circle cx="620" cy="195" r="3" fill="#059669"/><text x="625" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="bold">Хламидомонада</text><rect x="405" y="260" width="390" height="120" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="600" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Многоклеточные водоросли</text><text x="420" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Спирогира — нитчатая водоросль</text><rect x="435" y="310" width="28" height="20" rx="4" fill="#D1FAE5" stroke="#15803D" stroke-width="1.2"/><path d="M438,318 Q443,312 449,318 Q455,324 460,318" fill="none" stroke="#22C55E" stroke-width="1.5"/><rect x="467" y="310" width="28" height="20" rx="4" fill="#D1FAE5" stroke="#15803D" stroke-width="1.2"/><path d="M470,318 Q475,312 481,318 Q487,324 492,318" fill="none" stroke="#22C55E" stroke-width="1.5"/><rect x="499" y="310" width="28" height="20" rx="4" fill="#D1FAE5" stroke="#15803D" stroke-width="1.2"/><path d="M502,318 Q507,312 513,318 Q519,324 524,318" fill="none" stroke="#22C55E" stroke-width="1.5"/><rect x="531" y="310" width="28" height="20" rx="4" fill="#D1FAE5" stroke="#15803D" stroke-width="1.2"/><path d="M534,318 Q539,312 545,318 Q551,324 556,318" fill="none" stroke="#22C55E" stroke-width="1.5"/><rect x="563" y="310" width="28" height="20" rx="4" fill="#D1FAE5" stroke="#15803D" stroke-width="1.2"/><path d="M566,318 Q571,312 577,318 Q583,324 588,318" fill="none" stroke="#22C55E" stroke-width="1.5"/><text x="420" y="345" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Ламинария (морская капуста) — до 20 м</text><text x="420" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Саргассум — образует плавучие леса</text><rect x="20" y="365" width="770" height="220" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="400" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Ключевые особенности водорослей</text><text x="35" y="408" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Общая характеристика:</text><text x="35" y="425" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Низшие растения — нет корней, стеблей, листьев</text><text x="35" y="441" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Тело — слоевище (таллом)</text><text x="35" y="457" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Орган движения — жгутики (у одноклеточных)</text><text x="35" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Хроматофоры — пластиды с пигментами</text><text x="35" y="489" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Размножение: вегетативное, бесполое, половое</text><text x="420" y="408" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Значение водорослей:</text><text x="420" y="425" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Фотосинтез — 80% кислорода атмосферы!</text><text x="420" y="441" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Начало пищевых цепей в водоёмах</text><text x="420" y="457" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Пища: морская капуста, нори, агар-агар</text><text x="420" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Агар-агар — из красных водорослей</text><text x="420" y="489" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Альгинаты — загустители в промышленности</text><text x="420" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• «Цветение» воды — массовое размножение</text><text x="420" y="521" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">  водорослей → ухудшает качество воды</text><rect x="35" y="510" width="740" height="60" rx="4" fill="#ECFDF5"/><text x="400" y="527" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Пигменты водорослей:</text><rect x="50" y="537" width="30" height="14" rx="3" fill="#22C55E"/><text x="85" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Зелёные: хлорофилл a+b</text><rect x="270" y="537" width="30" height="14" rx="3" fill="#92400E"/><text x="305" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Бурые: хлорофилл + фукоксантин</text><rect x="520" y="537" width="30" height="14" rx="3" fill="#DC2626"/><text x="555" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Красные: хлорофилл + фикоэритрин</text>  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Урок 5</text>
</svg>