)"/><text x="210" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Вегетативные органы растения</text><rect x="35" y="450" width="12" height="12" rx="2" fill="#059669" stroke="#6B7280" stroke-width="0.5"/><text x="55" y="459" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Корень</text><text x="120" y="459" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Закрепление, всасывание воды</text><text x="120" y="471" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">и минеральных веществ,</text><text x="120" y="483" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">запасание</text><rect x="35" y="486" width="12" height="12" rx="2" fill="#15803D" stroke="#6B7280" stroke-width="0.5"/><text x="55" y="495" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Стебель</text><text x="120" y="495" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Опора, транспорт веществ</text><text x="120" y="507" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">(вверх — вода и минералы,</text><text x="120" y="519" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">вниз — органические)</text><rect x="35" y="522" width="12" height="12" rx="2" fill="#22C55E" stroke="#6B7280" stroke-width="0.5"/><text x="55" y="531" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Лист</text><text x="120" y="531" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Фотосинтез, газообмен,</text><text x="120" y="543" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">транспирация</text><rect x="35" y="558" width="12" height="12" rx="2" fill="#D1FAE5" stroke="#6B7280" stroke-width="0.5"/><text x="55" y="567" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Почка</text><text x="120" y="567" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Зачаточный побег,</text><text x="120" y="579" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">обеспечивает рост</text><rect x="420" y="415" width="370" height="172" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="605" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Функции корня</text><circle cx="440" cy="455" r="4" fill="#10B981" opacity="0.5"/><text x="450" y="459" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Анкорная: Закрепление растения в почве</text><circle cx="440" cy="475" r="4" fill="#10B981" opacity="0.5"/><text x="450" y="479" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Всасывающая: Вода и минеральные соли</text><circle cx="440" cy="495" r="4" fill="#10B981" opacity="0.5"/><text x="450" y="499" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Проводящая: Транспорт веществ к стеблю</text><circle cx="440" cy="515" r="4" fill="#10B981" opacity="0.5"/><text x="450" y="519" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Запасающая: Накопление питательных веществ</text><text x="450" y="531" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(корнеплоды: морковь, свёкла)</text><circle cx="440" cy="549" r="4" fill="#10B981" opacity="0.5"/><text x="450" y="553" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Симбиотическая: Микориза и клубеньки</text><text x="450" y="565" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(азотфиксация)</text>  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Урок 7</text>
