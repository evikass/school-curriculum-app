<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F5F3FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EDE9FE;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5B21B6" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#5B21B6" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="50" cy="550" r="60" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="400" cy="600" r="100" fill="#A78BFA" opacity="0.04"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="0"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Периодический закон Д.И. Менделеева</text>
  <!-- Small decorative line under header -->
  <rect x="300" y="54" width="200" height="3" fill="#C4B5FD" rx="1.5" opacity="0.7"/>
  <rect x="20" y="75" width="760" height="80" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="100" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Периодический закон (1869 г.)</text>
  <text x="40" y="120" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#6B7280">Свойства химических элементов и образованных ими веществ находятся в периодической</text>
  <text x="40" y="136" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#6B7280">зависимости от величины зарядов их атомных ядер.</text>
  <text x="400" y="155" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="#5B21B6">Закон: свойства ~ Z (заряд ядра)</text>
  <rect x="20" y="165" width="400" height="250" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="190" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Фрагмент периодической таблицы</text>
  <rect x="40" y="200" width="55" height="40" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="8"/>
  <text x="48" y="216" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#3B82F6">1 H</text>
  <text x="55" y="232" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#6B7280">1</text>
  <rect x="325" y="200" width="55" height="40" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" rx="8"/>
  <text x="333" y="216" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#F59E0B">2 He</text>
  <text x="340" y="232" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#6B7280">2</text>
  <rect x="40" y="248" width="55" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="50" y="264" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#EF4444">3 Li</text>
  <text x="55" y="280" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="9" fill="#6B7280">3</text>
  <rect x="95" y="248" width="55" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="103" y="264" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#EF4444">4 Be</text>
  <rect x="155" y="248" width="55" height="40" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="167" y="264" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#10B981">5 B</text>
  <rect x="210" y="248" width="55" height="40" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="216" y="264" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#10B981">6 C</text>
  <rect x="265" y="248" width="55" height="40" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="273" y="264" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#10B981">7 N</text>
  <rect x="325" y="248" width="55" height="40" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" rx="8"/>
  <text x="333" y="264" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#F59E0B">8 O</text>
  <rect x="40" y="296" width="55" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="48" y="312" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#EF4444">11 Na</text>
  <rect x="95" y="296" width="55" height="40" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="103" y="312" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#EF4444">12 Mg</text>
  <rect x="155" y="296" width="55" height="40" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="167" y="312" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#10B981">13 Al</text>
  <rect x="210" y="296" width="55" height="40" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="220" y="312" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#10B981">14 Si</text>
  <rect x="265" y="296" width="55" height="40" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="273" y="312" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#10B981">15 P</text>
  <rect x="325" y="296" width="55" height="40" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" rx="8"/>
  <text x="333" y="312" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#F59E0B">16 S</text>
  <rect x="40" y="345" width="12" height="12" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="58" y="355" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#EF4444">Металлы</text>
  <rect x="120" y="345" width="12" height="12" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="138" y="355" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#10B981">Неметаллы</text>
  <rect x="215" y="345" width="12" height="12" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" rx="8"/>
  <text x="233" y="355" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#F59E0B">Благородные газы</text>
  <rect x="430" y="165" width="350" height="250" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="450" y="190" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Структура таблицы</text>
  <rect x="450" y="202" width="310" height="45" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="460" y="220" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">7 периодов (горизонтальные ряды)</text>
  <text x="460" y="238" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">Номер периода = число энергоуровней</text>
  <rect x="450" y="257" width="310" height="45" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="8"/>
  <text x="460" y="275" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3B82F6">8 групп (вертикальные столбцы)</text>
  <text x="460" y="293" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">Номер группы = число электронов на</text>
  <text x="460" y="308" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">внешнем уровне (для главных подгрупп)</text>
  <rect x="450" y="322" width="310" height="40" fill="#EDE9FE" stroke="#8B5CF6" stroke-width="1" rx="8"/>
  <text x="460" y="340" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">Главные подгруппы (A) и побочные (B)</text>
  <text x="460" y="356" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">s-, p-, d-, f- элементы</text>
  <rect x="20" y="425" width="760" height="145" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="450" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Закономерности изменения свойств</text>
  <rect x="40" y="460" width="350" height="100" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1" rx="8"/>
  <text x="55" y="480" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">В периоде (слева направо):</text>
  <text x="55" y="498" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Металлические свойства убывают</text>
  <text x="55" y="516" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">Неметаллические свойства возрастают</text>
  <text x="55" y="534" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3B82F6">Электроотрицательность возрастает</text>
  <line x1="300" y1="540" x2="370" y2="540" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowR)"/>
  <defs><marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#8B5CF6"/></marker></defs>
  <rect x="410" y="460" width="350" height="100" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1" rx="8"/>
  <text x="425" y="480" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">В группе (сверху вниз):</text>
  <text x="425" y="498" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Металлические свойства возрастают</text>
  <text x="425" y="516" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">Неметаллические свойства убывают</text>
  <text x="425" y="534" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3B82F6">Радиус атома увеличивается</text>
  <line x1="720" y1="480" x2="720" y2="545" stroke="#8B5CF6" stroke-width="2" marker-end="url(#arrowD)"/>
  <defs><marker id="arrowD" markerWidth="6" markerHeight="8" refX="3" refY="8" orient="auto"><path d="M0,0 L6,0 L3,8 Z" fill="#8B5CF6"/></marker></defs>
  <!-- Footer -->
  <rect x="0" y="580" width="800" height="20" fill="#7C3AED" opacity="0.1"/>
  <text x="400" y="594" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">Химия — 8 класс</text>
</svg>