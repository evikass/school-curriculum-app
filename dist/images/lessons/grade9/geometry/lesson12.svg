<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="headerGrad12" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow12" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#FAFAFA" rx="8"/>
  <!-- Header bar -->
  <rect width="500" height="52" fill="url(#headerGrad12)" rx="8"/>
  <rect y="40" width="500" height="12" fill="url(#headerGrad12)"/>
  <!-- Decorative elements -->
  <circle cx="470" cy="26" r="15" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="445" cy="18" r="8" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="30" cy="26" r="12" fill="#FFFFFF" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Урок 12: Параллельный перенос и поворот</text>
  <!-- Parallel translation -->
  <g transform="translate(20,62)">
    <rect x="0" y="0" width="225" height="155" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow12)"/>
    <text x="112" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Параллельный перенос</text>
    <!-- Original triangle -->
    <polygon points="30,80 55,50 70,95" fill="#7E57C2" fill-opacity="0.3" stroke="#7E57C2" stroke-width="2"/>
    <text x="22" y="80" font-family="Arial,sans-serif" font-size="8" fill="#7E57C2">A</text>
    <text x="50" y="45" font-family="Arial,sans-serif" font-size="8" fill="#7E57C2">B</text>
    <text x="72" y="102" font-family="Arial,sans-serif" font-size="8" fill="#7E57C2">C</text>
    <!-- Translated triangle -->
    <polygon points="110,55 135,25 150,70" fill="#4CAF50" fill-opacity="0.3" stroke="#4CAF50" stroke-width="2"/>
    <text x="102" y="55" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50">A₁</text>
    <text x="130" y="20" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50">B₁</text>
    <text x="152" y="77" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50">C₁</text>
    <!-- Translation vectors -->
    <defs><marker id="arr12" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#FF7043"/></marker></defs>
    <line x1="35" y1="80" x2="108" y2="55" stroke="#FF7043" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr12)"/>
    <line x1="60" y1="50" x2="133" y2="25" stroke="#FF7043" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr12)"/>
    <!-- Vector label -->
    <text x="80" y="60" font-family="Arial,sans-serif" font-size="10" fill="#FF7043">a⃗</text>
    <text x="112" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#757575">→MM₁ = a⃗ для всех точек</text>
    <rect x="8" y="136" width="210" height="16" rx="3" fill="#EDE7F6"/>
    <text x="112" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4A2F8A">M(x;y) → M₁(x+m; y+n) при a⃗{m;n}</text>
  </g>
  <!-- Rotation -->
  <g transform="translate(260,62)">
    <rect x="0" y="0" width="220" height="155" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow12)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Поворот вокруг точки O</text>
    <!-- Center -->
    <circle cx="100" cy="85" r="3" fill="#FF7043"/>
    <text x="104" y="82" font-family="Arial,sans-serif" font-size="8" fill="#FF7043">O</text>
    <!-- Original point -->
    <circle cx="145" cy="85" r="3" fill="#7E57C2"/>
    <text x="150" y="82" font-family="Arial,sans-serif" font-size="8" fill="#7E57C2">M</text>
    <!-- Rotated point (90 degrees CCW) -->
    <circle cx="100" cy="40" r="3" fill="#4CAF50"/>
    <text x="104" y="37" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50">M₁</text>
    <!-- Lines from center -->
    <line x1="100" y1="85" x2="145" y2="85" stroke="#7E57C2" stroke-width="1.5"/>
    <line x1="100" y1="85" x2="100" y2="40" stroke="#4CAF50" stroke-width="1.5"/>
    <!-- Arc -->
    <path d="M 135 80 A 35 35 0 0 0 105 50" fill="none" stroke="#FF7043" stroke-width="1.5"/>
    <text x="125" y="55" font-family="Arial,sans-serif" font-size="10" fill="#FF7043">90°</text>
    <!-- Arc path -->
    <path d="M 145 85 A 45 45 0 0 0 100 40" fill="none" stroke="#B39DDB" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="112" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#757575">OM = OM₁, ∠MOM₁ = α</text>
    <text x="112" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#757575">M(1;0) → M₁(0;1) при 90°</text>
  </g>
  <!-- Properties comparison -->
  <g transform="translate(20,228)">
    <rect x="0" y="0" width="225" height="105" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow12)"/>
    <text x="112" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Свойства переноса</text>
    <line x1="10" y1="24" x2="215" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="12" y="40" font-family="Arial,sans-serif" font-size="10" fill="#212121">1. Является движением</text>
    <text x="12" y="56" font-family="Arial,sans-serif" font-size="10" fill="#212121">2. Прямая → параллельная</text>
    <text x="12" y="72" font-family="Arial,sans-serif" font-size="10" fill="#212121">3. Отрезок → равный</text>
    <text x="12" y="88" font-family="Arial,sans-serif" font-size="10" fill="#212121">4. Угол → равный</text>
    <text x="12" y="100" font-family="Arial,sans-serif" font-size="9" fill="#7E57C2">Пример: a⃗{3;2}: (1;4)→(4;6)</text>
  </g>
  <!-- Rotation properties -->
  <g transform="translate(260,228)">
    <rect x="0" y="0" width="220" height="105" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow12)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Свойства поворота</text>
    <line x1="10" y1="24" x2="210" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="12" y="40" font-family="Arial,sans-serif" font-size="10" fill="#212121">1. Является движением</text>
    <text x="12" y="56" font-family="Arial,sans-serif" font-size="10" fill="#212121">2. Прямая → прямая</text>
    <text x="12" y="72" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">3. Против часовой → α &gt; 0</text>
    <text x="12" y="88" font-family="Arial,sans-serif" font-size="10" fill="#FF7043">4. По часовой → α &lt; 0</text>
    <rect x="8" y="94" width="204" height="10" rx="2" fill="#EDE7F6"/>
    <text x="110" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4A2F8A">180° = центр. симм. | 360° = тождество</text>
  </g>
</svg>