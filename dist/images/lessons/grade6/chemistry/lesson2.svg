<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="water1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="ice1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Вещества и тела</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Three states of water -->
  <rect x="25" y="88" width="450" height="130" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="250" y="103" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Состояния воды: одно вещество - разные агрегатные состояния</text>

  <!-- Ice cube -->
  <rect x="40" y="115" width="90" height="90" rx="4" fill="none" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="85" y="130" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">ТВЁРДОЕ</text>
  <text x="85" y="142" font-family="Arial,sans-serif" font-size="9" fill="#777" text-anchor="middle">Лёд</text>
  <!-- 3D ice cube -->
  <polygon points="65,165 95,155 115,170 85,180" fill="url(#ice1)" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="65,165 65,195 85,205 85,180" fill="#90CAF9" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="85,180 85,205 115,195 115,170" fill="#64B5F6" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Crystal lattice dots on ice -->
  <circle cx="75" cy="172" r="2" fill="#1565C0" opacity="0.4"/>
  <circle cx="82" cy="178" r="2" fill="#1565C0" opacity="0.4"/>
  <circle cx="90" cy="172" r="2" fill="#1565C0" opacity="0.4"/>
  <circle cx="100" cy="175" r="2" fill="#1565C0" opacity="0.4"/>
  <circle cx="108" cy="180" r="2" fill="#1565C0" opacity="0.4"/>
  <circle cx="75" cy="185" r="2" fill="#1565C0" opacity="0.3"/>
  <circle cx="83" cy="190" r="2" fill="#1565C0" opacity="0.3"/>

  <!-- Arrow -->
  <path d="M135,170 L155,170" fill="none" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Water drop (liquid) -->
  <rect x="160" y="115" width="90" height="90" rx="4" fill="none" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="205" y="130" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">ЖИДКОЕ</text>
  <text x="205" y="142" font-family="Arial,sans-serif" font-size="9" fill="#777" text-anchor="middle">Вода</text>
  <!-- Beaker with water -->
  <path d="M175,155 L175,200 L235,200 L235,155" fill="none" stroke="#546E7A" stroke-width="2"/>
  <path d="M175,175 Q190,172 205,175 Q220,178 235,175 L235,200 L175,200 Z" fill="url(#water1)" opacity="0.5"/>
  <!-- Water surface -->
  <path d="M175,175 Q190,172 205,175 Q220,178 235,175" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Moving particles -->
  <circle cx="190" cy="185" r="2.5" fill="#1565C0" opacity="0.5"/>
  <circle cx="205" cy="190" r="2.5" fill="#1565C0" opacity="0.4"/>
  <circle cx="215" cy="183" r="2.5" fill="#1565C0" opacity="0.45"/>
  <circle cx="200" cy="195" r="2.5" fill="#1565C0" opacity="0.35"/>
  <circle cx="225" cy="192" r="2.5" fill="#1565C0" opacity="0.5"/>

  <!-- Arrow -->
  <path d="M255,170 L275,170" fill="none" stroke="#7B1FA2" stroke-width="2"/>

  <!-- Steam (gas) -->
  <rect x="280" y="115" width="90" height="90" rx="4" fill="none" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="325" y="130" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">ГАЗООБРАЗНОЕ</text>
  <text x="325" y="142" font-family="Arial,sans-serif" font-size="9" fill="#777" text-anchor="middle">Пар</text>
  <!-- Clouds of steam -->
  <ellipse cx="310" cy="165" rx="18" ry="12" fill="#E0E0E0" opacity="0.4" stroke="#aaa" stroke-width="0.5"/>
  <ellipse cx="335" cy="160" rx="15" ry="10" fill="#E0E0E0" opacity="0.35" stroke="#aaa" stroke-width="0.5"/>
  <ellipse cx="320" cy="175" rx="20" ry="14" fill="#EEEEEE" opacity="0.3" stroke="#aaa" stroke-width="0.5"/>
  <!-- Scattered particles -->
  <circle cx="300" cy="155" r="2" fill="#9E9E9E" opacity="0.4"/>
  <circle cx="315" cy="170" r="2" fill="#9E9E9E" opacity="0.35"/>
  <circle cx="340" cy="158" r="2" fill="#9E9E9E" opacity="0.4"/>
  <circle cx="328" cy="185" r="2" fill="#9E9E9E" opacity="0.3"/>
  <circle cx="345" cy="175" r="2" fill="#9E9E9E" opacity="0.35"/>
  <circle cx="305" cy="190" r="2" fill="#9E9E9E" opacity="0.25"/>
  <circle cx="350" cy="185" r="2" fill="#9E9E9E" opacity="0.3"/>
  <circle cx="295" cy="175" r="2" fill="#9E9E9E" opacity="0.3"/>
  <circle cx="355" cy="168" r="2" fill="#9E9E9E" opacity="0.2"/>

  <!-- H2O label -->
  <rect x="385" y="140" width="80" height="50" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="425" y="162" font-family="Arial,sans-serif" font-size="18" fill="#1565C0" text-anchor="middle" font-weight="bold">H</text>
  <text x="436" y="167" font-family="Arial,sans-serif" font-size="12" fill="#1565C0">2</text>
  <text x="448" y="162" font-family="Arial,sans-serif" font-size="18" fill="#C62828" text-anchor="middle" font-weight="bold">O</text>
  <text x="425" y="180" font-family="Arial,sans-serif" font-size="9" fill="#777" text-anchor="middle">одно вещество</text>

  <!-- Bottom panels: Body vs Substance -->
  <rect x="25" y="225" width="220" height="75" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="135" y="240" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Тело и вещество (железо)</text>
  <!-- Iron nail -->
  <rect x="40" y="248" width="8" height="42" rx="1" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <polygon points="44,248 36,258 52,258" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <text x="44" y="300" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Гвоздь</text>
  <text x="44" y="310" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">(тело)</text>
  <!-- Iron rod -->
  <rect x="80" y="258" width="55" height="12" rx="2" fill="#90A4AE" stroke="#546E7A" stroke-width="1"/>
  <text x="107" y="288" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Пруток</text>
  <text x="107" y="298" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">(тело)</text>
  <!-- Arrow to substance -->
  <path d="M160,270 L175,270" fill="none" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <rect x="180" y="255" width="55" height="35" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="207" y="272" font-family="Arial,sans-serif" font-size="9" fill="#546E7A" text-anchor="middle" font-weight="bold">Fe</text>
  <text x="207" y="284" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">вещество</text>

  <!-- Wood panel -->
  <rect x="260" y="225" width="215" height="75" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="367" y="240" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Тело и вещество (дерево)</text>
  <!-- Table shape -->
  <rect x="275" y="260" width="60" height="30" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="1.5"/>
  <rect x="282" y="290" width="6" height="12" rx="1" fill="#8D6E63"/>
  <rect x="322" y="290" width="6" height="12" rx="1" fill="#8D6E63"/>
  <text x="305" y="310" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Стол (тело)</text>
  <!-- Plank -->
  <rect x="355" y="265" width="50" height="10" rx="2" fill="#A1887F" stroke="#5D4037" stroke-width="1"/>
  <!-- Wood grain lines -->
  <line x1="358" y1="268" x2="400" y2="268" stroke="#8D6E63" stroke-width="0.5"/>
  <line x1="358" y1="272" x2="400" y2="272" stroke="#8D6E63" stroke-width="0.5"/>
  <text x="380" y="290" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Доска (тело)</text>
  <!-- Arrow to substance -->
  <path d="M410,275 L425,275" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <rect x="430" y="260" width="38" height="35" rx="4" fill="#EFEBE9" stroke="#5D4037" stroke-width="1"/>
  <text x="449" y="277" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-weight="bold">C</text>
  <text x="449" y="290" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">вещество</text>

  <rect x="15" y="310" width="470" height="30" rx="4" fill="#2E7D32" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Вещества и тела</text>
</svg>