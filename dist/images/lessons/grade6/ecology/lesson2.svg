<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="smog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9E9E9E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E0E0E0" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Загрязнение атмосферы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Экология - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Left panel: Factory with chimneys -->
  <rect x="30" y="90" width="220" height="200" rx="5" fill="white" stroke="#757575" stroke-width="1.5" opacity="0.9"/>
  <text x="140" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#757575" text-anchor="middle">ПРОМЫШЛЕННЫЕ ВЫБРОСЫ</text>
  
  <!-- Ground -->
  <rect x="30" y="270" width="220" height="20" fill="#8D6E63" rx="0"/>
  
  <!-- Factory building -->
  <rect x="50" y="200" width="80" height="70" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
  <!-- Windows -->
  <rect x="60" y="215" width="12" height="12" fill="#B3E5FC" stroke="#546E7A" stroke-width="0.5"/>
  <rect x="78" y="215" width="12" height="12" fill="#B3E5FC" stroke="#546E7A" stroke-width="0.5"/>
  <rect x="96" y="215" width="12" height="12" fill="#B3E5FC" stroke="#546E7A" stroke-width="0.5"/>
  <rect x="60" y="240" width="12" height="12" fill="#B3E5FC" stroke="#546E7A" stroke-width="0.5"/>
  <rect x="78" y="240" width="12" height="12" fill="#B3E5FC" stroke="#546E7A" stroke-width="0.5"/>
  <rect x="96" y="240" width="12" height="12" fill="#B3E5FC" stroke="#546E7A" stroke-width="0.5"/>
  
  <!-- Chimney 1 -->
  <rect x="65" y="150" width="14" height="55" fill="#90A4AE" stroke="#546E7A" stroke-width="1"/>
  <!-- Chimney 2 -->
  <rect x="100" y="140" width="14" height="65" fill="#90A4AE" stroke="#546E7A" stroke-width="1"/>
  <!-- Chimney 3 -->
  <rect x="135" y="155" width="10" height="50" fill="#90A4AE" stroke="#546E7A" stroke-width="1"/>
  
  <!-- Dark smoke -->
  <ellipse cx="72" cy="142" rx="12" ry="8" fill="#616161" opacity="0.7"/>
  <ellipse cx="64" cy="130" rx="15" ry="9" fill="#757575" opacity="0.5"/>
  <ellipse cx="78" cy="120" rx="18" ry="10" fill="#9E9E9E" opacity="0.4"/>
  
  <ellipse cx="107" cy="132" rx="14" ry="9" fill="#616161" opacity="0.6"/>
  <ellipse cx="100" cy="118" rx="18" ry="10" fill="#757575" opacity="0.4"/>
  <ellipse cx="115" cy="110" rx="16" ry="9" fill="#9E9E9E" opacity="0.3"/>
  
  <ellipse cx="140" cy="148" rx="10" ry="7" fill="#757575" opacity="0.5"/>
  <ellipse cx="135" cy="138" rx="12" ry="8" fill="#9E9E9E" opacity="0.3"/>

  <!-- City skyline behind factory -->
  <rect x="155" y="220" width="18" height="50" fill="#B0BEC5" stroke="#78909C" stroke-width="0.5"/>
  <rect x="178" y="210" width="15" height="60" fill="#90A4AE" stroke="#78909C" stroke-width="0.5"/>
  <rect x="198" y="230" width="20" height="40" fill="#B0BEC5" stroke="#78909C" stroke-width="0.5"/>
  <rect x="222" y="215" width="14" height="55" fill="#90A4AE" stroke="#78909C" stroke-width="0.5"/>
  
  <!-- Smog overlay -->
  <rect x="155" y="220" width="90" height="50" fill="url(#smog)"/>

  <!-- Sun partially blocked -->
  <circle cx="210" cy="110" r="18" fill="#F9A825" opacity="0.4"/>
  <circle cx="210" cy="110" r="18" fill="none" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Smog over sun -->
  <ellipse cx="205" cy="120" rx="30" ry="10" fill="#9E9E9E" opacity="0.3"/>

  <!-- Right panel: Greenhouse effect diagram -->
  <rect x="260" y="90" width="210" height="200" rx="5" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="365" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F9A825" text-anchor="middle">ПАРНИКОВЫЙ ЭФФЕКТ</text>
  
  <!-- Earth surface -->
  <rect x="270" y="255" width="190" height="30" rx="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Trees on earth -->
  <rect x="285" y="240" width="4" height="15" fill="#795548"/>
  <circle cx="287" cy="233" r="10" fill="#43A047"/>
  <rect x="340" y="240" width="4" height="15" fill="#795548"/>
  <circle cx="342" cy="233" r="10" fill="#66BB6A"/>
  <rect x="420" y="240" width="4" height="15" fill="#795548"/>
  <circle cx="422" cy="233" r="10" fill="#2E7D32"/>
  
  <!-- Atmosphere layer -->
  <rect x="270" y="170" width="190" height="20" rx="3" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="365" y="184" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">АТМОСФЕРА CO2</text>
  
  <!-- Sun rays coming in -->
  <line x1="290" y1="115" x2="310" y2="168" stroke="#F9A825" stroke-width="1.5" marker-end="none"/>
  <polygon points="310,168 306,160 314,160" fill="#F9A825"/>
  <line x1="350" y1="115" x2="355" y2="168" stroke="#F9A825" stroke-width="1.5"/>
  <polygon points="355,168 351,160 359,160" fill="#F9A825"/>
  <line x1="410" y1="115" x2="400" y2="168" stroke="#F9A825" stroke-width="1.5"/>
  <polygon points="400,168 396,160 404,160" fill="#F9A825"/>
  
  <!-- Heat trapped (bouncing back) -->
  <line x1="300" y1="195" x2="280" y2="170" stroke="#E53935" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="365" y1="195" x2="365" y2="170" stroke="#E53935" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="430" y1="195" x2="450" y2="170" stroke="#E53935" stroke-width="1" stroke-dasharray="3,2"/>
  
  <!-- Trapped heat label -->
  <text x="445" y="183" font-family="Arial,sans-serif" font-size="7" fill="#E53935" font-weight="bold">ТЕПЛО</text>
  <text x="445" y="191" font-family="Arial,sans-serif" font-size="6" fill="#E53935">удерж.</text>

  <!-- Sun icon top -->
  <circle cx="365" cy="120" r="15" fill="#F9A825"/>
  <line x1="365" y1="100" x2="365" y2="103" stroke="#F9A825" stroke-width="2"/>
  <line x1="365" y1="137" x2="365" y2="140" stroke="#F9A825" stroke-width="2"/>
  <line x1="345" y1="120" x2="348" y2="120" stroke="#F9A825" stroke-width="2"/>
  <line x1="382" y1="120" x2="385" y2="120" stroke="#F9A825" stroke-width="2"/>
  <line x1="351" y1="106" x2="353" y2="108" stroke="#F9A825" stroke-width="2"/>
  <line x1="377" y1="132" x2="379" y2="134" stroke="#F9A825" stroke-width="2"/>
  <line x1="379" y1="106" x2="377" y2="108" stroke="#F9A825" stroke-width="2"/>
  <line x1="353" y1="132" x2="351" y2="134" stroke="#F9A825" stroke-width="2"/>

  <!-- CO2 molecule -->
  <circle cx="280" cy="130" r="5" fill="#757575"/>
  <text x="280" y="133" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">C</text>
  <circle cx="268" cy="126" r="4" fill="#E53935"/>
  <text x="268" y="129" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">O</text>
  <circle cx="292" cy="126" r="4" fill="#E53935"/>
  <text x="292" y="129" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">O</text>
  
  <!-- Acid rain on left -->
  <path d="M165,160 Q170,170 165,180 Q160,190 165,200" stroke="#1565C0" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M180,165 Q185,175 180,185" stroke="#1565C0" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M145,170 Q150,180 145,190" stroke="#1565C0" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Rain drops -->
  <text x="163" y="203" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">H+</text>
  <text x="178" y="188" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">H+</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Загрязнение атмосферы</text>
</svg>