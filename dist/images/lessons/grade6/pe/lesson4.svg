family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0">Стойка на руках</text><text x="200" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Упор, баланс,</text><text x="200" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">стойка у стены</text><rect x="266" y="228" width="105" height="68" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1" opacity="0.8"/><text x="318" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F57F17">Мостик</text><text x="318" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Прогибание назад,</text><text x="318" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">гибкость спины</text><rect x="384" y="228" width="105" height="68" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" opacity="0.8"/><text x="436" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">Колесо</text><text x="436" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Перекат боком,</text><text x="436" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">координация</text><rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/><text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Акробатические упражнения</text></svg>