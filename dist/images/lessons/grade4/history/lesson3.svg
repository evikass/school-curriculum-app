<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="85" fill="#F5E6C8" opacity="0.9"/>
  <line x1="0" y1="85" x2="500" y2="85" stroke="#C41E3A" stroke-width="3"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Князь Игорь и Ольга</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">Правление, месть и реформы княгини</text>

  <!-- Bottom panel -->
  <rect x="0" y="315" width="500" height="35" fill="#C41E3A" opacity="0.85"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" font-weight="bold">История России - 4 класс</text>

  <!-- Background -->
  <rect x="0" y="85" width="500" height="230" fill="#F5E6C8"/>

  <!-- Decorative top band -->
  <line x1="0" y1="90" x2="500" y2="90" stroke="#D4A843" stroke-width="1" opacity="0.5"/>

  <!-- Left figure: Prince Igor -->
  <!-- Head -->
  <circle cx="120" cy="140" r="20" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Helmet -->
  <path d="M100,135 Q120,108 140,135" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="118" y="105" width="4" height="12" fill="#D4A843"/>
  <!-- Body/armor -->
  <rect x="102" y="160" width="36" height="55" fill="#2B4C7E" rx="3" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Chain mail pattern -->
  <line x1="108" y1="175" x2="132" y2="175" stroke="#D4A843" stroke-width="0.5" opacity="0.6"/>
  <line x1="108" y1="185" x2="132" y2="185" stroke="#D4A843" stroke-width="0.5" opacity="0.6"/>
  <line x1="108" y1="195" x2="132" y2="195" stroke="#D4A843" stroke-width="0.5" opacity="0.6"/>
  <!-- Sword -->
  <line x1="140" y1="155" x2="165" y2="130" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="133" y="150" width="14" height="4" fill="#D4A843"/>
  <!-- Legs -->
  <rect x="108" y="215" width="12" height="30" fill="#8B6914"/>
  <rect x="122" y="215" width="12" height="30" fill="#8B6914"/>

  <!-- Right figure: Princess Olga -->
  <!-- Head -->
  <circle cx="370" cy="140" r="20" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Headdress/kokoshnik -->
  <path d="M348,138 Q355,110 370,108 Q385,110 392,138" fill="#D4A843" stroke="#C41E3A" stroke-width="1"/>
  <circle cx="370" cy="108" r="4" fill="#C41E3A"/>
  <!-- Dress -->
  <path d="M348,160 L340,260 L370,260 L370,160" fill="#C41E3A" opacity="0.8"/>
  <path d="M392,160 L400,260 L370,260 L370,160" fill="#C41E3A" opacity="0.7"/>
  <!-- Collar -->
  <ellipse cx="370" cy="165" rx="18" ry="6" fill="#D4A843" opacity="0.7"/>
  <!-- Crown detail -->
  <path d="M355,155 L370,148 L385,155" fill="none" stroke="#D4A843" stroke-width="1.5"/>

  <!-- Center: Scales of justice (Olga's reforms) -->
  <line x1="250" y1="100" x2="250" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="220" y1="130" x2="280" y2="130" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Left pan -->
  <path d="M220,130 L210,160 L230,160 Z" fill="#D4A843" opacity="0.6"/>
  <line x1="220" y1="130" x2="210" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="220" y1="130" x2="230" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Right pan -->
  <path d="M280,130 L270,160 L290,160 Z" fill="#D4A843" opacity="0.6"/>
  <line x1="280" y1="130" x2="270" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="280" y1="130" x2="290" y2="160" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Base -->
  <rect x="235" y="200" width="30" height="5" fill="#1a1a1a"/>
  <!-- Labels on scales -->
  <text x="220" y="178" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">Уроки</text>
  <text x="280" y="178" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">Погосты</text>

  <!-- Fire at bottom (burning of Iskorosten) -->
  <polygon points="245,260 250,235 255,260" fill="#C41E3A" opacity="0.8"/>
  <polygon points="240,260 248,240 256,260" fill="#D4A843" opacity="0.7"/>
  <polygon points="250,260 253,238 260,260" fill="#E85D75" opacity="0.6"/>
  <polygon points="243,260 250,245 257,260" fill="#D4A843" opacity="0.5"/>
  <!-- More fire elements -->
  <polygon points="195,265 200,245 205,265" fill="#C41E3A" opacity="0.6"/>
  <polygon points="295,265 300,245 305,265" fill="#C41E3A" opacity="0.6"/>

  <!-- Decorative elements -->
  <rect x="20" y="100" width="40" height="2" fill="#C41E3A" opacity="0.5"/>
  <rect x="440" y="100" width="40" height="2" fill="#C41E3A" opacity="0.5"/>
  <circle cx="30" cy="280" r="5" fill="#D4A843" opacity="0.4"/>
  <circle cx="470" cy="280" r="5" fill="#D4A843" opacity="0.4"/>

  <!-- Year -->
  <rect x="190" y="290" width="120" height="20" fill="#C41E3A" opacity="0.15" rx="3"/>
  <text x="250" y="304" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A" text-anchor="middle" font-weight="bold">945 год</text>

</svg>