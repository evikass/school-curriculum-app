<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Увеличение и уменьшение чисел</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Изменение чисел в 10, 100, 1000 раз</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Increasing section (left) -->
  <rect x="30" y="90" width="200" height="210" fill="#C41E3A" opacity="0.06" rx="8" />
  <text x="130" y="115" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold">УВЕЛИЧЕНИЕ</text>
  
  <!-- Scale up visual -->
  <circle cx="80" cy="170" r="18" fill="#2B4C7E" opacity="0.3" />
  <text x="80" y="176" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">5</text>
  <text x="130" y="175" text-anchor="middle" fill="#C41E3A" font-size="22" font-weight="bold">x</text>
  <text x="130" y="195" text-anchor="middle" fill="#C41E3A" font-size="12">10</text>
  <text x="180" y="175" text-anchor="middle" fill="#C41E3A" font-size="22" font-weight="bold">=</text>
  <circle cx="210" cy="170" r="25" fill="#2B4C7E" opacity="0.3" />
  <text x="210" y="176" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">50</text>
  
  <!-- Arrow showing growth -->
  <polygon points="115,145 125,135 120,145" fill="#C41E3A" />
  <polygon points="115,145 125,155 120,145" fill="#C41E3A" />
  
  <text x="130" y="225" text-anchor="middle" fill="#1a1a1a" font-size="14">5 x 100 = 500</text>
  <text x="130" y="250" text-anchor="middle" fill="#1a1a1a" font-size="14">5 x 1000 = 5000</text>
  <text x="130" y="275" text-anchor="middle" fill="#D4A843" font-size="11">Приписываем нули!</text>
  <text x="130" y="293" text-anchor="middle" fill="#C41E3A" font-size="20">>>>></text>

  <!-- Decreasing section (right) -->
  <rect x="270" y="90" width="200" height="210" fill="#2B4C7E" opacity="0.06" rx="8" />
  <text x="370" y="115" text-anchor="middle" fill="#2B4C7E" font-size="14" font-weight="bold">УМЕНЬШЕНИЕ</text>
  
  <!-- Scale down visual -->
  <circle cx="310" cy="170" r="25" fill="#C41E3A" opacity="0.3" />
  <text x="310" y="176" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">500</text>
  <text x="370" y="175" text-anchor="middle" fill="#2B4C7E" font-size="22" font-weight="bold">:</text>
  <text x="370" y="195" text-anchor="middle" fill="#2B4C7E" font-size="12">100</text>
  <text x="420" y="175" text-anchor="middle" fill="#2B4C7E" font-size="22" font-weight="bold">=</text>
  <circle cx="450" cy="170" r="18" fill="#C41E3A" opacity="0.3" />
  <text x="450" y="176" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">5</text>
  
  <text x="370" y="225" text-anchor="middle" fill="#1a1a1a" font-size="14">50 : 10 = 5</text>
  <text x="370" y="250" text-anchor="middle" fill="#1a1a1a" font-size="14">5000 : 1000 = 5</text>
  <text x="370" y="275" text-anchor="middle" fill="#D4A843" font-size="11">Отбрасываем нули!</text>
  <text x="370" y="293" text-anchor="middle" fill="#2B4C7E" font-size="20"><<<<</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>