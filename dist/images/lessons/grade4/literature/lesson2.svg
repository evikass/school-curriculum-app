<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843" opacity="0.6"/>
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Волшебные сказки</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" opacity="0.7">Чудеса и волшебные превращения</text>
  <!-- Gold decorative line under subtitle -->
  <line x1="120" y1="78" x2="380" y2="78" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom bar -->
  <rect y="320" width="500" height="30" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.4"/>
  <text x="250" y="340" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Литературное чтение — 4 класс</text>
  <!-- Bauhaus background -->
  <circle cx="80" cy="180" r="70" fill="#C41E3A" opacity="0.08"/>
  <circle cx="420" cy="170" r="80" fill="#6A1B9A" opacity="0.07"/>
  <rect x="30" y="100" width="440" height="200" rx="4" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
  <!-- Magic carpet (center) -->
  <path d="M170,240 L200,220 L300,220 L330,240 L300,260 L200,260Z" fill="#6A1B9A" opacity="0.8"/>
  <path d="M180,240 L200,230 L300,230 L320,240 L300,250 L200,250Z" fill="#D4A843" opacity="0.5"/>
  <path d="M190,240 L200,235 L300,235 L310,240 L300,245 L200,245Z" fill="#C41E3A" opacity="0.4"/>
  <line x1="170" y1="240" x2="162" y2="255" stroke="#6A1B9A" stroke-width="1.5"/>
  <line x1="175" y1="240" x2="168" y2="258" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="325" y1="240" x2="332" y2="255" stroke="#6A1B9A" stroke-width="1.5"/>
  <line x1="330" y1="240" x2="337" y2="258" stroke="#D4A843" stroke-width="1.5"/>
  <circle cx="195" cy="210" r="2.5" fill="#D4A843" opacity="0.7"/>
  <circle cx="305" cy="210" r="2.5" fill="#D4A843" opacity="0.7"/>
  <circle cx="250" cy="205" r="3" fill="#D4A843" opacity="0.6"/>
  <circle cx="165" cy="225" r="2" fill="#D4A843" opacity="0.5"/>
  <circle cx="335" cy="225" r="2" fill="#D4A843" opacity="0.5"/>
