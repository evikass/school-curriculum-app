  <circle cx="393" cy="210" r="2.5" fill="#D4A843" opacity="0.6"/>
  <circle cx="408" cy="220" r="2" fill="#D4A843" opacity="0.5"/>
  <!-- Magic mirror (top right) -->
  <ellipse cx="430" cy="140" rx="22" ry="28" fill="#E8E8E8" stroke="#D4A843" stroke-width="2"/>
  <ellipse cx="430" cy="140" rx="17" ry="23" fill="#D5E8F0" opacity="0.5"/>
  <path d="M430,112 L430,95" stroke="#D4A843" stroke-width="2.5"/>
  <circle cx="430" cy="93" r="3" fill="#D4A843"/>
  <!-- Wand with sparkle (top center) -->
  <line x1="220" y1="100" x2="260" y2="140" stroke="#D4A843" stroke-width="3"/>
  <polygon points="260,130 272,138 264,148 258,140" fill="#D4A843" opacity="0.8"/>
  <line x1="268" y1="120" x2="275" y2="110" stroke="#D4A843" stroke-width="1" opacity="0.7"/>
  <line x1="278" y1="132" x2="288" y2="128" stroke="#D4A843" stroke-width="1" opacity="0.6"/>
  <line x1="272" y1="148" x2="282" y2="155" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <line x1="256" y1="150" x2="250" y2="160" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <!-- Tablecloth-self-set (bottom center) -->
  <ellipse cx="250" cy="295" rx="80" ry="12" fill="#C41E3A" opacity="0.6"/>
  <ellipse cx="250" cy="292" rx="75" ry="10" fill="#D4A843" opacity="0.4"/>
  <circle cx="220" cy="288" r="6" fill="#C41E3A" opacity="0.5"/>
  <circle cx="250" cy="286" r="7" fill="#D4A843" opacity="0.5"/>
  <circle cx="280" cy="288" r="5" fill="#6A1B9A" opacity="0.4"/>
