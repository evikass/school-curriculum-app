  <path d="M75,240 L75,270 Q75,280 85,280 L105,280 Q115,280 115,270 L115,260 L95,260 L95,240Z" fill="#C41E3A" opacity="0.85" transform="rotate(-10 95 260)"/>
  <path d="M120,240 L120,270 Q120,280 130,280 L150,280 Q160,280 160,270 L160,260 L140,260 L140,240Z" fill="#C41E3A" opacity="0.85" transform="rotate(-10 140 260)"/>
  <line x1="85" y1="265" x2="115" y2="265" stroke="#D4A843" stroke-width="1.5" transform="rotate(-10 95 260)"/>
  <line x1="130" y1="265" x2="160" y2="265" stroke="#D4A843" stroke-width="1.5" transform="rotate(-10 140 260)"/>
  <line x1="60" y1="245" x2="45" y2="240" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="255" x2="40" y2="255" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="265" x2="45" y2="270" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
  <!-- Hat of invisibility (right) -->
  <path d="M380,270 L400,150 L420,270Z" fill="#6A1B9A" opacity="0.75"/>
  <ellipse cx="400" cy="272" rx="35" ry="10" fill="#6A1B9A" opacity="0.6"/>
