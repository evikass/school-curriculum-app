<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Сергей Сергеевич Прокофьев</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Изучаем творчество композитора XX века</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- forest trees (Bauhaus triangles) -->
  <polygon points="100,250 120,120 140,250" fill="#2B4C7E" opacity="0.3"/>
  <polygon points="130,250 150,130 170,250" fill="#2B4C7E" opacity="0.25"/>
  <!-- wolf (geometric) -->
  <circle cx="300" cy="170" r="18" fill="#1a1a1a" opacity="0.7"/>
  <!-- ears -->
  <polygon points="285,155 280,135 295,150" fill="#1a1a1a" opacity="0.7"/>
  <polygon points="315,155 320,135 305,150" fill="#1a1a1a" opacity="0.7"/>
  <!-- eyes -->
  <circle cx="293" cy="167" r="3" fill="#D4A843"/>
  <circle cx="307" cy="167" r="3" fill="#D4A843"/>
  <!-- snout -->
  <ellipse cx="300" cy="180" rx="8" ry="5" fill="#1a1a1a" opacity="0.8"/>
  <!-- body -->
  <ellipse cx="310" cy="210" rx="30" ry="22" fill="#1a1a1a" opacity="0.65"/>
  <!-- tail -->
  <path d="M340,200 Q365,185 355,175" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- bird (flute) -->
  <circle cx="200" cy="130" r="6" fill="#D4A843"/>
  <polygon points="206,128 215,125 206,132" fill="#D4A843"/>
  <path d="M194,136 Q190,140 195,142" stroke="#D4A843" stroke-width="1" fill="none"/>
  <!-- cat (clarinet) -->
  <ellipse cx="180" cy="210" rx="15" ry="12" fill="#D4A843" opacity="0.6"/>
  <circle cx="170" cy="200" r="7" fill="#D4A843" opacity="0.7"/>
  <!-- Peter (violin) small figure -->
  <circle cx="390" cy="160" r="9" fill="#C41E3A"/>
  <line x1="390" y1="169" x2="390" y2="210" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="390" y1="180" x2="375" y2="170" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="390" y1="180" x2="410" y2="165" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="390" y1="210" x2="380" y2="240" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="390" y1="210" x2="400" y2="240" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- small violin in hand -->
  <rect x="405" y="160" width="20" height="5" rx="2" fill="#D4A843" transform="rotate(-20,415,163)"/>
  <!-- ground -->
  <line x1="80" y1="250" x2="420" y2="250" stroke="#D4A843" stroke-width="1.5"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>