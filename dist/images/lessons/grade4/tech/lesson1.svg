<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Свойства бумаги</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Работа с бумагой</text>
  <!-- Illustration area -->
  <rect x="150" y="110" width="200" height="130" rx="2" fill="#fff" stroke="#999" stroke-width="1"/><rect x="150" y="122" width="200" height="130" rx="2" fill="#f5f0e0" stroke="#999" stroke-width="1"/><rect x="150" y="134" width="200" height="130" rx="2" fill="#e8e0d0" stroke="#999" stroke-width="1"/><rect x="150" y="146" width="200" height="130" rx="2" fill="#d8d0c0" stroke="#999" stroke-width="1"/><rect x="150" y="158" width="200" height="130" rx="2" fill="#c8c0b0" stroke="#999" stroke-width="1"/><text x="250" y="180" text-anchor="middle" font-size="14" fill="#1a1a1a" font-family="Arial" font-weight="bold">А4</text><text x="250" y="210" text-anchor="middle" font-size="10" fill="#666" font-family="Arial">Писчая бумага</text><text x="250" y="230" text-anchor="middle" font-size="10" fill="#666" font-family="Arial">Картон, цветная, гофре</text><text x="250" y="290" text-anchor="middle" font-size="10" fill="#228B22" font-family="Arial">Изобретена в Китае</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>