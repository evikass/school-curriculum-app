<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 14:  Мой дом</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">My house</text>

  
  <!-- House outline -->
  <polygon points="80,180 250,100 420,180" fill="#C41E3A" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="80" y="180" width="340" height="130" fill="#F0E4D0" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Roof window -->
  <circle cx="250" cy="140" r="12" fill="#B3E5FC" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="250" y1="128" x2="250" y2="152" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="238" y1="140" x2="262" y2="140" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Room dividers -->
  <line x1="200" y1="180" x2="200" y2="310" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="310" y1="180" x2="310" y2="310" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="80" y1="245" x2="420" y2="245" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Room labels -->
  <text x="140" y="215" font-family="Arial" font-size="10" fill="#C41E3A" text-anchor="middle" font-weight="bold">BEDROOM</text>
  <text x="140" y="230" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle">bed, wardrobe</text>
  <text x="255" y="215" font-family="Arial" font-size="10" fill="#C41E3A" text-anchor="middle" font-weight="bold">LIVING</text>
  <text x="255" y="230" font-family="Arial" font-size="10" fill="#C41E3A" text-anchor="middle" font-weight="bold">ROOM</text>
  <text x="255" y="240" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle">sofa, TV</text>
  <text x="365" y="215" font-family="Arial" font-size="10" fill="#C41E3A" text-anchor="middle" font-weight="bold">KITCHEN</text>
  <text x="365" y="230" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle">fridge, table</text>
  <text x="140" y="275" font-family="Arial" font-size="10" fill="#2B4C7E" text-anchor="middle" font-weight="bold">BATH</text>
  <text x="255" y="275" font-family="Arial" font-size="10" fill="#2B4C7E" text-anchor="middle" font-weight="bold">HALL</text>
  <text x="365" y="275" font-family="Arial" font-size="10" fill="#2B4C7E" text-anchor="middle" font-weight="bold">BEDROOM</text>
  <!-- Door -->
  <rect x="100" y="260" width="18" height="50" rx="1" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="114" cy="287" r="2" fill="#1a1a1a"/>
  <!-- Windows -->
  <rect x="320" y="190" width="30" height="25" rx="2" fill="#B3E5FC" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="335" y1="190" x2="335" y2="215" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Chimney -->
  <rect x="340" y="105" width="20" height="40" fill="#795548" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Garden -->
  <rect x="80" y="310" width="340" height="5" fill="#43A047" opacity="0.5"/>
  <text x="440" y="180" font-family="Arial" font-size="9" fill="#D4A843" font-weight="bold">garden</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>