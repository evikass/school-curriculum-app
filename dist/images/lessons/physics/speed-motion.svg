<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7c3aed">Скорость и движение</text>
  
  <!-- Speed formula -->
  <rect x="10" y="40" width="120" height="70" fill="#ede9fe" rx="8"/>
  <text x="70" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#7c3aed">Скорость</text>
  <text x="70" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6d28d9">v = S/t</text>
  <text x="70" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5b21b6">Единица: м/с</text>
  
  <!-- Path formula -->
  <rect x="140" y="40" width="120" height="70" fill="#dcfce7" rx="8"/>
  <text x="200" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#16a34a">Путь</text>
  <text x="200" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#15803d">S = v·t</text>
  <text x="200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#166534">Единица: м</text>
  
  <!-- Time formula -->
  <rect x="270" y="40" width="120" height="70" fill="#fef3c7" rx="8"/>
  <text x="330" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d97706">Время</text>
  <text x="330" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#b45309">t = S/v</text>
  <text x="330" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400e">Единица: с</text>
  
  <!-- Motion types -->
  <rect x="10" y="120" width="185" height="85" fill="#dbeafe" rx="8"/>
  <text x="102" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2563eb">Равномерное движение</text>
  
  <!-- Graph line -->
  <line x1="30" y1="190" x2="80" y2="145" stroke="#3b82f6" stroke-width="2"/>
  <line x1="80" y1="145" x2="130" y2="100" stroke="#3b82f6" stroke-width="2"/>
  <line x1="130" y1="100" x2="180" y2="55" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Axes -->
  <line x1="30" y1="190" x2="180" y2="190" stroke="#64748b" stroke-width="1"/>
  <line x1="30" y1="190" x2="30" y2="50" stroke="#64748b" stroke-width="1"/>
  <text x="105" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#64748b">t (время)</text>
  <text x="25" y="70" font-family="Arial, sans-serif" font-size="8" fill="#64748b" transform="rotate(-90, 25, 70)">S (путь)</text>
  
  <text x="102" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1e40af">v = const — прямая линия</text>
  
  <!-- Non-uniform motion -->
  <rect x="205" y="120" width="185" height="85" fill="#fee2e2" rx="8"/>
  <text x="297" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#dc2626">Неравномерное движение</text>
  
  <!-- Curved line -->
  <path d="M 225 190 Q 270 170 297 150 Q 330 120 380 80" fill="none" stroke="#ef4444" stroke-width="2"/>
  
  <!-- Axes -->
  <line x1="225" y1="190" x2="380" y2="190" stroke="#64748b" stroke-width="1"/>
  <line x1="225" y1="190" x2="225" y2="50" stroke="#64748b" stroke-width="1"/>
  <text x="300" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#64748b">t (время)</text>
  
  <text x="297" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#991b1b">v меняется — кривая</text>
  
  <!-- Unit conversion -->
  <rect x="10" y="225" width="380" height="65" fill="#f1f5f9" rx="8"/>
  <text x="200" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#334155">Перевод единиц скорости</text>
  
  <rect x="30" y="255" width="150" height="30" fill="#dbeafe" rx="5"/>
  <text x="105" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1d4ed8">1 м/с = 3,6 км/ч</text>
  
  <rect x="220" y="255" width="150" height="30" fill="#dcfce7" rx="5"/>
  <text x="295" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#16a34a">1 км/ч ≈ 0,28 м/с</text>
</svg>