<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="engBg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#engBg3)"/>
  
  <!-- Sun -->
  <circle cx="450" cy="55" r="26" fill="#FFD700" opacity="0.9">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.75">
    <ellipse cx="110" cy="45" rx="30" ry="18" fill="white"/>
    <ellipse cx="140" cy="40" rx="24" ry="14" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="35" cy="280" rx="22" ry="35" fill="#228B22"/>
    <rect x="30" y="280" width="10" height="20" fill="#5D4037"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#4CAF50"/>
    <circle cx="47" cy="320" r="4" fill="#81C784"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#8BC34A"/>
    <circle cx="458" cy="320" r="4" fill="#AED581"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2E7D32" text-anchor="middle">🌸 Seasons</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#2E7D32" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.92" stroke="#4CAF50" stroke-width="2"/>
  
  <!-- Seasons grid -->
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Времена года / Seasons</text>
  
  <g transform="translate(50, 95)">
    <!-- Spring -->
    <rect x="0" y="0" width="200" height="70" rx="10" fill="#FCE4EC" stroke="#E91E63"/>
    <text x="100" y="22" font-size="11" font-weight="bold" fill="#C2185B" text-anchor="middle">🌸 spring — весна</text>
    <text x="100" y="45" font-size="24" text-anchor="middle">🌷🌱🌸</text>
    <text x="100" y="62" font-size="8" fill="#333" text-anchor="middle">March, April, May</text>
    
    <!-- Summer -->
    <rect x="210" y="0" width="200" height="70" rx="10" fill="#FFF3E0" stroke="#FF9800"/>
    <text x="310" y="22" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">☀️ summer — лето</text>
    <text x="310" y="45" font-size="24" text-anchor="middle">🌻🌞🍉</text>
    <text x="310" y="62" font-size="8" fill="#333" text-anchor="middle">June, July, August</text>
  </g>
  
  <g transform="translate(50, 180)">
    <!-- Autumn -->
    <rect x="0" y="0" width="200" height="70" rx="10" fill="#FFEBEE" stroke="#F44336"/>
    <text x="100" y="22" font-size="11" font-weight="bold" fill="#D32F2F" text-anchor="middle">🍂 autumn — осень</text>
    <text x="100" y="45" font-size="24" text-anchor="middle">🍁🍂🌰</text>
    <text x="100" y="62" font-size="8" fill="#333" text-anchor="middle">September, October, November</text>
    
    <!-- Winter -->
    <rect x="210" y="0" width="200" height="70" rx="10" fill="#E3F2FD" stroke="#2196F3"/>
    <text x="310" y="22" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">❄️ winter — зима</text>
    <text x="310" y="45" font-size="24" text-anchor="middle">⛄️❄️🎿</text>
    <text x="310" y="62" font-size="8" fill="#333" text-anchor="middle">December, January, February</text>
  </g>
  
  <!-- Sentence -->
  <rect x="80" y="265" width="340" height="40" rx="8" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="250" y="282" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Example: I like summer. It's hot and sunny!</text>
  <text x="250" y="296" font-size="9" fill="#333" text-anchor="middle">Пример: Я люблю лето. Жарко и солнечно!</text>
  
  <!-- Decorative -->
  <g transform="translate(55, 280)" opacity="0.5">
    <text font-size="18">🌍</text>
  </g>
</svg>