<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7E57C2" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#7E57C2" text-anchor="middle">Жизненный цикл звёзд</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Астрономия - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#7E57C2" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.3"/>
    
    <!-- Stellar evolution flow -->
    
    <!-- Nebula -->
    <circle cx="65" cy="150" r="30" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1"/>
    <circle cx="55" cy="140" r="5" fill="#E1BEE7" opacity="0.6"/>
    <circle cx="75" cy="145" r="4" fill="#E1BEE7" opacity="0.6"/>
    <circle cx="65" cy="160" r="6" fill="#E1BEE7" opacity="0.5"/>
    <text x="65" y="190" font-family="Arial,sans-serif" font-size="8" fill="#4527A0" text-anchor="middle">Туманность</text>
    
    <!-- Arrow -->
    <line x1="100" y1="150" x2="120" y2="150" stroke="#555" stroke-width="1.5"/>
    <polygon points="120,145 130,150 120,155" fill="#555"/>
    
    <!-- Protostar -->
    <circle cx="155" cy="150" r="18" fill="#FF8A65" stroke="#D84315" stroke-width="1"/>
    <text x="155" y="153" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Ps</text>
    <text x="155" y="178" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">Протозвезда</text>
    
    <!-- Arrow -->
    <line x1="178" y1="150" x2="198" y2="150" stroke="#555" stroke-width="1.5"/>
    <polygon points="198,145 208,150 198,155" fill="#555"/>
    
    <!-- Main sequence star -->
    <circle cx="240" cy="150" r="22" fill="#FDD835" stroke="#F9A825" stroke-width="2"/>
    <text x="240" y="154" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle">*</text>
    <text x="240" y="182" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">Гл. послед.</text>
    <text x="240" y="193" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">(млрд лет)</text>
    
    <!-- Two paths -->
    <!-- Upper path: Low mass star -->
    <line x1="265" y1="135" x2="290" y2="115" stroke="#555" stroke-width="1.5"/>
    <polygon points="288,110 298,112 290,120" fill="#555"/>
    <text x="275" y="118" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">M &lt; 8 Msol</text>
    
    <!-- Lower path: High mass star -->
    <line x1="265" y1="165" x2="290" y2="190" stroke="#555" stroke-width="1.5"/>
    <polygon points="288,192 298,188 290,180" fill="#555"/>
    <text x="275" y="182" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">M &gt; 8 Msol</text>
    
    <!-- Red giant (upper path) -->
    <circle cx="330" cy="110" r="18" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="330" y="113" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">RG</text>
    <text x="330" y="135" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Красный</text>
    <text x="330" y="145" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">гигант</text>
    
    <!-- Arrow to planetary nebula -->
    <line x1="352" y1="105" x2="370" y2="98" stroke="#555" stroke-width="1"/>
    <polygon points="368,93 378,96 370,103" fill="#555"/>
    
    <!-- Planetary nebula -->
    <circle cx="400" cy="95" r="14" fill="none" stroke="#CE93D8" stroke-width="1.5"/>
    <circle cx="400" cy="95" r="5" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="0.5"/>
    <text x="400" y="118" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">Планетарная</text>
    <text x="400" y="128" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">туманность</text>
    
    <!-- Arrow to white dwarf -->
    <line x1="415" y1="92" x2="435" y2="90" stroke="#555" stroke-width="1"/>
    
    <!-- White dwarf -->
    <circle cx="455" cy="88" r="6" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
    <text x="455" y="78" font-family="Arial,sans-serif" font-size="6" fill="#9E9E9E" text-anchor="middle">Белый</text>
    <text x="455" y="87" font-family="Arial,sans-serif" font-size="6" fill="#9E9E9E" text-anchor="middle">карлик</text>
    
    <!-- Red supergiant (lower path) -->
    <circle cx="330" cy="200" r="22" fill="#EF5350" stroke="#B71C1C" stroke-width="2"/>
    <text x="330" y="204" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">RSG</text>
    <text x="330" y="230" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C" text-anchor="middle">Красный</text>
    <text x="330" y="240" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C" text-anchor="middle">сверхгигант</text>
    
    <!-- Arrow to supernova -->
    <line x1="355" y1="205" x2="375" y2="210" stroke="#555" stroke-width="1.5"/>
    <polygon points="375,205 385,210 375,215" fill="#555"/>
    
    <!-- Supernova -->
    <polygon points="400,195 405,205 415,200 410,212 420,215 410,218 415,230 405,225 400,235 395,225 385,230 390,218 380,215 390,212 385,200 395,205" fill="#FDD835" stroke="#F9A825" stroke-width="0.5"/>
    <text x="400" y="248" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Сверхновая!</text>
    
    <!-- Arrow to neutron star / black hole -->
    <line x1="400" y1="252" x2="400" y2="262" stroke="#555" stroke-width="1"/>
    
    <!-- Neutron star -->
    <circle cx="380" cy="278" r="5" fill="#B0BEC5" stroke="#546E7A" stroke-width="1"/>
    <text x="380" y="293" font-family="Arial,sans-serif" font-size="6" fill="#546E7A" text-anchor="middle">Нейтронная</text>
    <text x="380" y="302" font-family="Arial,sans-serif" font-size="6" fill="#546E7A" text-anchor="middle">звезда</text>
    
    <!-- Black hole -->
    <circle cx="430" cy="278" r="7" fill="#212121" stroke="#000" stroke-width="1.5"/>
    <circle cx="430" cy="278" r="11" fill="none" stroke="#F48FB1" stroke-width="0.5" stroke-dasharray="2,1"/>
    <text x="430" y="293" font-family="Arial,sans-serif" font-size="6" fill="#424242" text-anchor="middle">Чёрная</text>
    <text x="430" y="302" font-family="Arial,sans-serif" font-size="6" fill="#424242" text-anchor="middle">дыра</text>
    
    <!-- Division line for mass -->
    <line x1="280" y1="155" x2="280" y2="295" stroke="#7E57C2" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text x="280" y="162" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">M&lt;8</text>
    <text x="280" y="198" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">M&gt;8</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Астрономия</text>
</svg>