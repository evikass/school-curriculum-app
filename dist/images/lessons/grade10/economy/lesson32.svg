  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Государство и экономика</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 32</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">32</text>
  <rect x="20" y="72" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Экономические функции государства</text>
  <text x="28" y="100" class="box-text">1. Обеспечение правовой базы    2. Защита конкуренции (антимонопольная политика)</text>
  <text x="28" y="113" class="box-text">3. Перераспределение доходов    4. Корректировка внешних эффектов    5. Стабилизация экономики</text>
  <rect x="20" y="138" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="138" x2="234" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="152" class="box-title">Фискальная политика</text>
  <text x="28" y="166" class="box-text">Стимулирующая: G↑, T↓ → AD↑</text>
  <text x="28" y="179" class="box-text">Сдерживающая: G↓, T↑ → AD↓</text>
  <text x="28" y="192" class="box-text">Мультипликатор:</text>
  <text x="28" y="205" class="box-text">ΔY = k·ΔG, k = 1/(1−MPC)</text>
  <text x="28" y="218" class="box-text">Дефицит бюджета → займ</text>
  <rect x="260" y="138" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="138" x2="474" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="152" class="box-title">Внешние эффекты (экстерналии)</text>
  <text x="268" y="166" class="box-text">Положительные: образование →</text>
  <text x="268" y="179" class="box-text">  выгоды для общества</text>
  <text x="268" y="192" class="box-text">Отрицательные: загрязнение →</text>
  <text x="268" y="205" class="box-text">  ущерб для общества</text>
  <text x="268" y="218" class="box-text">Решение: налоги Пигу, субсидии</text>
  <rect x="20" y="238" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="238" x2="234" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="252" class="box-title">Общественные блага</text>
  <text x="28" y="266" class="box-text">Неисключаемость</text>
  <text x="28" y="279" class="box-text">Неконкурентность</text>
  <text x="28" y="292" class="box-text">Оборона, уличное освещение</text>
  <text x="28" y="305" class="box-text">Проблема безбилетника</text>
  <text x="28" y="318" class="box-text">Гос. производство/финансир.</text>
  <rect x="260" y="238" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="238" x2="474" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="252" class="box-title">Провалы государства</text>
  <text x="268" y="266" class="box-text">Бюрократия и неэффективность</text>
  <text x="268" y="279" class="box-text">Лоббизм и коррупция</text>
  <text x="268" y="292" class="box-text">Информационная асимметрия</text>
  <text x="268" y="305" class="box-text">Отсутствие мотивации</text>
  <text x="268" y="318" class="box-text">Дилемма: рынок ↔ гос-во</text>
