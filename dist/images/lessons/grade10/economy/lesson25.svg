<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Деньги и денежное обращение</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 25</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">25</text>
  <rect x="20" y="72" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="234" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Функции денег</text>
  <text x="28" y="100" class="box-text">1. Мера стоимости (цена)</text>
  <text x="28" y="113" class="box-text">2. Средство обращения</text>
  <text x="28" y="126" class="box-text">3. Средство сбережения</text>
  <text x="28" y="139" class="box-text">4. Средство платежа (кредит)</text>
  <text x="28" y="152" class="box-text">5. Мировые деньги</text>
  <rect x="260" y="72" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="86" class="box-title">Денежные агрегаты</text>
  <text x="268" y="100" class="box-text">M₀ = наличные деньги</text>
  <text x="268" y="113" class="box-text">M₁ = M₀ + чеки + тек. счета</text>
  <text x="268" y="126" class="box-text">M₂ = M₁ + сроч. вклады</text>
  <text x="268" y="139" class="box-text">M₃ = M₂ + крупные вклады</text>
  <text x="268" y="152" class="box-text">L = M₃ + ценные бумаги</text>
  <rect x="20" y="170" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="170" x2="474" y2="170" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="184" class="box-title">Уравнение количественной теории денег</text>
  <text x="28" y="198" class="box-text">M · V = P · Y    (уравнение Фишера)</text>
  <text x="28" y="211" class="box-text">M — денежная масса, V — скорость обращения, P — уровень цен, Y — реальный ВВП</text>
  <rect x="20" y="242" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="242" x2="234" y2="242" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="256" class="box-title">Виды денег</text>
  <text x="28" y="270" class="box-text">Товарные (золото, серебро)</text>
  <text x="28" y="283" class="box-text">Бумажные (казначейские)</text>
  <text x="28" y="296" class="box-text">Кредитные (банкноты)</text>
  <text x="28" y="309" class="box-text">Электронные (безнал.)</text>
  <text x="28" y="322" class="box-text">Криптовалюта (Bitcoin)</text>
  <rect x="260" y="242" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="242" x2="474" y2="242" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="256" class="box-title">Закон денежного обращения</text>
  <text x="268" y="270" class="box-text">M = (P·Q − К + П − ВП) / V</text>
  <text x="268" y="283" class="box-text">К — сумма цен в кредит</text>
  <text x="268" y="296" class="box-text">П — платежи по кредитам</text>
  <text x="268" y="309" class="box-text">ВП — взаимопогашаемые</text>
  <text x="268" y="322" class="box-text">V — скорость обращения</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>