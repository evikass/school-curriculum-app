<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Логарифмические уравнения</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Log graph -->
    <line x1="55" y1="280" x2="230" y2="280" stroke="#3F51B5" stroke-width="1.5"/>
    <line x1="55" y1="280" x2="55" y2="100" stroke="#3F51B5" stroke-width="1.5"/>
    <polygon points="230,277 238,280 230,283" fill="#3F51B5"/>
    <polygon points="52,100 55,92 58,100" fill="#3F51B5"/>
    <text x="232" y="275" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5">x</text>
    <text x="45" y="97" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5">y</text>
    <!-- Grid -->
    <line x1="55" y1="255" x2="225" y2="255" stroke="#ddd" stroke-width="0.5"/>
    <line x1="55" y1="230" x2="225" y2="230" stroke="#ddd" stroke-width="0.5"/>
    <line x1="55" y1="205" x2="225" y2="205" stroke="#ddd" stroke-width="0.5"/>
    <line x1="55" y1="180" x2="225" y2="180" stroke="#ddd" stroke-width="0.5"/>
    <line x1="55" y1="155" x2="225" y2="155" stroke="#ddd" stroke-width="0.5"/>
    <text x="47" y="258" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="end">1</text>
    <!-- Vertical asymptote x=0 -->
    <line x1="55" y1="95" x2="55" y2="280" stroke="#E91E63" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
    <!-- y=log2(x) curve -->
    <path d="M58,278 Q68,270 78,255 Q88,238 100,225 Q115,208 130,195 Q150,178 170,165 Q190,154 215,142" fill="none" stroke="#5C6BC0" stroke-width="2.5"/>
    <text x="175" y="135" font-family="Arial,sans-serif" font-size="11" fill="#5C6BC0" font-weight="bold">y=log2 x</text>
    <!-- Key point (1,0) -->
    <circle cx="55" cy="255" r="3" fill="#5C6BC0"/>
    <text x="60" y="268" font-family="Arial,sans-serif" font-size="9" fill="#5C6BC0">(1,0)</text>
    <!-- Solution method -->
    <rect x="248" y="90" width="237" height="100" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="258" y="108" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Метод решения:</text>
    <line x1="258" y1="113" x2="475" y2="113" stroke="#5C6BC0" stroke-width="0.5"/>
    <text x="258" y="130" font-family="Arial,sans-serif" font-size="11" fill="#444">loga f(x) = loga g(x)</text>
    <line x1="258" y1="135" x2="440" y2="135" stroke="#5C6BC0" stroke-width="1.5"/>
    <text x="258" y="153" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" font-weight="bold">f(x) = g(x)</text>
    <text x="258" y="170" font-family="Arial,sans-serif" font-size="10" fill="#E91E63">+ проверка: f(x)&gt;0, g(x)&gt;0</text>
    <text x="258" y="185" font-family="Arial,sans-serif" font-size="10" fill="#E91E63">(ОДЗ!)</text>
    <!-- Example -->
    <rect x="248" y="198" width="237" height="95" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="258" y="216" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Пример:</text>
    <text x="258" y="235" font-family="Arial,sans-serif" font-size="11" fill="#444">log2(x+3) = log2(2x-1)</text>
    <text x="258" y="253" font-family="Arial,sans-serif" font-size="11" fill="#444">x + 3 = 2x - 1</text>
    <text x="258" y="271" font-family="Arial,sans-serif" font-size="11" fill="#444">x = 4</text>
    <text x="258" y="289" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50" font-weight="bold">Проверка: log2 7 = log2 7 - верно</text>
    <!-- Asymptote label on graph -->
    <text x="25" y="175" font-family="Arial,sans-serif" font-size="8" fill="#E91E63" transform="rotate(-90,25,175)">асимптота x=0</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>