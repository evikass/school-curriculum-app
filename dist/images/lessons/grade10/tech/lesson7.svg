<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#ECEFF1" stroke="#37474F" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="1" y="1" width="498" height="48" rx="12" ry="12" fill="#37474F"/>
  <rect x="1" y="25" width="498" height="24" fill="#37474F"/>
  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Подготовка к печати</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 7</text>

  <!-- Left: Slicer workflow -->
  <rect x="30" y="60" width="210" height="145" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="135" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Слайсер: STL → G-код</text>

  <!-- Step 1 -->
  <rect x="42" y="90" width="186" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="52" y="105" fill="#1565C0" font-size="9" font-weight="600">1.</text>
  <text x="67" y="105" fill="#1565C0" font-size="8">Импорт STL-файла</text>

  <line x1="135" y1="112" x2="135" y2="118" stroke="#546E7A" stroke-width="1"/>

  <!-- Step 2 -->
  <rect x="42" y="118" width="186" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="52" y="133" fill="#E65100" font-size="9" font-weight="600">2.</text>
  <text x="67" y="133" fill="#E65100" font-size="8">Настройка параметров печати</text>

  <line x1="135" y1="140" x2="135" y2="146" stroke="#546E7A" stroke-width="1"/>

  <!-- Step 3 -->
  <rect x="42" y="146" width="186" height="22" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="52" y="161" fill="#00897B" font-size="9" font-weight="600">3.</text>
  <text x="67" y="161" fill="#00897B" font-size="8">Нарезка на слои (срезы)</text>

  <line x1="135" y1="168" x2="135" y2="174" stroke="#546E7A" stroke-width="1"/>

  <!-- Step 4 -->
  <rect x="42" y="174" width="186" height="22" rx="4" fill="#37474F" opacity="0.12" stroke="#37474F" stroke-width="1"/>
  <text x="52" y="189" fill="#37474F" font-size="9" font-weight="600">4.</text>
  <text x="67" y="189" fill="#37474F" font-size="8">Генерация G-кода</text>

  <!-- Right: Print parameters -->
  <rect x="260" y="60" width="210" height="145" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="365" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Параметры печати</text>

  <text x="275" y="98" fill="#1565C0" font-size="8" font-weight="600">Высота слоя:</text>
  <text x="455" y="98" text-anchor="end" fill="#546E7A" font-size="8">0.1 — 0.3 мм</text>

  <line x1="275" y1="105" x2="455" y2="105" stroke="#B0BEC5" stroke-width="0.5"/>

  <text x="275" y="118" fill="#E65100" font-size="8" font-weight="600">Заполнение:</text>
  <text x="455" y="118" text-anchor="end" fill="#546E7A" font-size="8">15% — 100%</text>

  <line x1="275" y1="125" x2="455" y2="125" stroke="#B0BEC5" stroke-width="0.5"/>

  <text x="275" y="138" fill="#00897B" font-size="8" font-weight="600">Температура:</text>
  <text x="455" y="138" text-anchor="end" fill="#546E7A" font-size="8">190 — 220 °C</text>

  <line x1="275" y1="145" x2="455" y2="145" stroke="#B0BEC5" stroke-width="0.5"/>

  <text x="275" y="158" fill="#37474F" font-size="8" font-weight="600">Скорость:</text>
  <text x="455" y="158" text-anchor="end" fill="#546E7A" font-size="8">40 — 80 мм/с</text>

  <line x1="275" y1="165" x2="455" y2="165" stroke="#B0BEC5" stroke-width="0.5"/>

  <text x="275" y="178" fill="#78909C" font-size="8" font-weight="600">Поддержки:</text>
  <text x="455" y="178" text-anchor="end" fill="#546E7A" font-size="8">Авто / Вручную</text>

  <line x1="275" y1="185" x2="455" y2="185" stroke="#B0BEC5" stroke-width="0.5"/>

  <text x="275" y="198" fill="#78909C" font-size="8" font-weight="600">Рафт / Брим:</text>
  <text x="455" y="198" text-anchor="end" fill="#546E7A" font-size="8">Адгезия к столу</text>

  <!-- Bottom: Infill patterns -->
  <rect x="30" y="217" width="440" height="95" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="236" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Типы заполнения (Infill)</text>

  <!-- Pattern boxes -->
  <rect x="45" y="248" width="78" height="52" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <!-- Grid pattern lines -->
  <line x1="55" y1="258" x2="113" y2="258" stroke="#1565C0" stroke-width="0.7"/>
  <line x1="55" y1="268" x2="113" y2="268" stroke="#1565C0" stroke-width="0.7"/>
  <line x1="55" y1="278" x2="113" y2="278" stroke="#1565C0" stroke-width="0.7"/>
  <line x1="65" y1="253" x2="65" y2="290" stroke="#1565C0" stroke-width="0.7"/>
  <line x1="80" y1="253" x2="80" y2="290" stroke="#1565C0" stroke-width="0.7"/>
  <line x1="95" y1="253" x2="95" y2="290" stroke="#1565C0" stroke-width="0.7"/>
  <text x="84" y="302" text-anchor="middle" fill="#1565C0" font-size="7" font-weight="500">Сетка</text>

  <rect x="140" y="248" width="78" height="52" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <!-- Honeycomb pattern -->
  <line x1="155" y1="265" x2="165" y2="255" stroke="#E65100" stroke-width="0.7"/>
  <line x1="165" y1="255" x2="185" y2="255" stroke="#E65100" stroke-width="0.7"/>
  <line x1="185" y1="255" x2="195" y2="265" stroke="#E65100" stroke-width="0.7"/>
  <line x1="195" y1="265" x2="185" y2="275" stroke="#E65100" stroke-width="0.7"/>
  <line x1="185" y1="275" x2="165" y2="275" stroke="#E65100" stroke-width="0.7"/>
  <line x1="165" y1="275" x2="155" y2="265" stroke="#E65100" stroke-width="0.7"/>
  <text x="179" y="302" text-anchor="middle" fill="#E65100" font-size="7" font-weight="500">Соты</text>

  <rect x="235" y="248" width="78" height="52" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <!-- Triangle pattern -->
  <polygon points="260,275 280,258 300,275" fill="none" stroke="#00897B" stroke-width="0.7"/>
  <polygon points="270,285 290,268 300,280" fill="none" stroke="#00897B" stroke-width="0.7"/>
  <text x="274" y="302" text-anchor="middle" fill="#00897B" font-size="7" font-weight="500">Треугольники</text>

  <rect x="330" y="248" width="78" height="52" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <!-- Gyroid lines -->
  <path d="M345,270 Q360,255 375,270 Q390,285 405,270" fill="none" stroke="#546E7A" stroke-width="1"/>
  <path d="M345,280 Q360,265 375,280 Q390,295 405,280" fill="none" stroke="#546E7A" stroke-width="0.7"/>
  <text x="369" y="302" text-anchor="middle" fill="#546E7A" font-size="7" font-weight="500">Гироид</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
</svg>