<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0" />
      <stop offset="100%" stop-color="#3F51B5" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgGrad)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="2.5" />
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.25" />
  <polygon points="10,10 30,10 10,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,10 470,10 490,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="10,340 30,340 10,320" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,340 470,340 490,320" fill="#5C6BC0" opacity="0.10" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#283593" text-anchor="middle">Векторы в пространстве</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" text-anchor="middle">Геометрия — Урок 11</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#5C6BC0" stroke-width="2" opacity="0.3" />
  <rect x="30" y="69" width="50" height="5" fill="#5C6BC0" opacity="0.15" rx="1" />
  <rect x="420" y="69" width="50" height="5" fill="#3F51B5" opacity="0.10" rx="1" />
  <rect x="18" y="82" width="225" height="100" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="82" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="94" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Определение</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Вектор — направленный отрезок.</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10" fill="#37474F">a⃗ = AB⃗, где A — начало, B — конец</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10" fill="#37474F" />
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Координаты: a⃗ = (x, y, z)</text>
  <text x="26" y="172" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Длина: |a⃗| = √(x² + y² + z²)</text>
  <text x="26" y="187" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Нулевой вектор: 0⃗ = (0, 0, 0)</text>
  <rect x="255" y="82" width="225" height="100" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="255" y="82" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="255" y="94" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="367" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Операции</text>
  <text x="263" y="114" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">a⃗+b⃗ = (x₁+x₂, y₁+y₂, z₁+z₂)</text>
  <text x="263" y="130" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">a⃗−b⃗ = (x₁−x₂, y₁−y₂, z₁−z₂)</text>
  <text x="263" y="146" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">k·a⃗ = (kx, ky, kz)</text>
  <text x="263" y="162" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">a⃗·b⃗ = x₁x₂+y₁y₂+z₁z₂</text>
  <text x="263" y="178" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">cosα = (a⃗·b⃗)/(|a⃗|·|b⃗|)</text>
  <rect x="18" y="190" width="225" height="95" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="190" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="202" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="203" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Свойства</text>
  <text x="26" y="220" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Коммутативность: a⃗+b⃗ = b⃗+a⃗</text>
  <text x="26" y="235" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Ассоциативность: (a⃗+b⃗)+c⃗ = a⃗+(b⃗+c⃗)</text>
  <text x="26" y="250" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• a⃗⊥b⃗ ⟺ a⃗·b⃗ = 0</text>
  <text x="26" y="265" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• a⃗∥b⃗ ⟺ a⃗ = k·b⃗</text>
  <text x="26" y="280" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Коллинеарные векторы</text>
  <rect x="255" y="190" width="225" height="95" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="255" y="190" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="255" y="202" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="367" y="203" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Векторное произведение</text>
  <text x="263" y="222" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">a⃗ × b⃗ — вектор ⊥ a⃗ и ⊥ b⃗</text>
  <text x="263" y="238" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">|a⃗ × b⃗| = |a⃗|·|b⃗|·sinα</text>
  <text x="263" y="254" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">S_парал = |a⃗ × b⃗|</text>
  <text x="263" y="270" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">S_треуг = ½|a⃗ × b⃗|</text>
  <text x="263" y="286" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Смешанное: (a⃗×b⃗)·c⃗ = V_парал</text>
  <rect x="10" y="305" width="480" height="35" fill="url(#panelGrad)" opacity="0.08" rx="5" />
  <text x="250" y="327" font-family="Arial,sans-serif" font-size="11" fill="#5C6BC0" text-anchor="middle" opacity="0.65">Геометрия · 11 класс</text>
</svg>