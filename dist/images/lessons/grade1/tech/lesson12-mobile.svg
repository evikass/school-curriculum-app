<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <style>
      @keyframes rotate1 {
        0% { transform: rotate(-10deg); }
        100% { transform: rotate(10deg); }
      }
      @keyframes rotate2 {
        0% { transform: rotate(8deg); }
        100% { transform: rotate(-8deg); }
      }
      @keyframes rotate3 {
        0% { transform: rotate(-6deg); }
        100% { transform: rotate(6deg); }
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .swing1 { animation: rotate1 4s ease-in-out infinite alternate; transform-origin: 200px 40px; }
      .swing2 { animation: rotate2 3.5s ease-in-out infinite alternate; transform-origin: 200px 40px; }
      .star-spin { animation: spin 8s linear infinite; transform-origin: center; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#F3E5F5"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#7B1FA2">
    Мобиле
  </text>
  
  <!-- Ceiling mount -->
  <rect x="185" y="35" width="30" height="10" fill="#5D4037"/>
  <circle cx="200" cy="40" r="5" fill="#795548"/>
  
  <!-- Main support bar -->
  <g class="swing1">
    <line x1="200" y1="45" x2="200" y2="70" stroke="#8D6E63" stroke-width="3"/>
    <line x1="130" y1="70" x2="270" y2="70" stroke="#8D6E63" stroke-width="4"/>
    
    <!-- Left side decorations -->
    <g class="swing2">
      <!-- Star -->
      <line x1="130" y1="70" x2="130" y2="100" stroke="#BDB76B" stroke-width="1"/>
      <g transform="translate(130, 115)">
        <polygon points="0,-15 4,-5 15,-5 6,2 10,12 0,6 -10,12 -6,2 -15,-5 -4,-5" fill="#FFD700" class="star-spin"/>
      </g>
      
      <!-- Moon -->
      <line x1="150" y1="70" x2="150" y2="130" stroke="#BDB76B" stroke-width="1"/>
      <g transform="translate(150, 145)">
        <circle cx="0" cy="0" r="12" fill="#FFE082"/>
        <circle cx="5" cy="-3" r="10" fill="#F3E5F5"/>
      </g>
    </g>
    
    <!-- Right side decorations -->
    <g class="swing2">
      <!-- Heart -->
      <line x1="270" y1="70" x2="270" y2="95" stroke="#BDB76B" stroke-width="1"/>
      <g transform="translate(270, 110)">
        <path d="M0,-8 C0,-18 -25,-18 -25,0 C-25,15 0,25 0,25 C0,25 25,15 25,0 C25,-18 0,-18 0,-8" fill="#F48FB1" transform="scale(0.7)"/>
      </g>
      
      <!-- Cloud -->
      <line x1="250" y1="70" x2="250" y2="130" stroke="#BDB76B" stroke-width="1"/>
      <g transform="translate(250, 145)">
        <ellipse cx="-10" cy="0" rx="10" ry="8" fill="#FFF"/>
        <ellipse cx="5" cy="-3" rx="12" ry="10" fill="#FFF"/>
        <ellipse cx="15" cy="2" rx="8" ry="6" fill="#FFF"/>
      </g>
    </g>
    
    <!-- Center decorations -->
    <g>
      <line x1="200" y1="70" x2="200" y2="90" stroke="#8D6E63" stroke-width="2"/>
      
      <!-- Second level bar -->
      <line x1="160" y1="90" x2="240" y2="90" stroke="#8D6E63" stroke-width="3"/>
      
      <!-- Airplane -->
      <line x1="160" y1="90" x2="160" y2="115" stroke="#BDB76B" stroke-width="1"/>
      <g transform="translate(160, 125)">
        <ellipse cx="0" cy="0" rx="12" ry="4" fill="#64B5F6"/>
        <polygon points="-15,0 -8,-8 -8,8" fill="#64B5F6"/>
        <polygon points="5,-6 12,-6 8,0" fill="#1976D2"/>
      </g>
      
      <!-- Bird -->
      <line x1="240" y1="90" x2="240" y2="110" stroke="#BDB76B" stroke-width="1"/>
      <g transform="translate(240, 125)">
        <ellipse cx="0" cy="0" rx="10" ry="6" fill="#FF9800"/>
        <circle cx="-7" cy="-2" r="4" fill="#FF9800"/>
        <polygon points="-12,-2 -16,0 -12,0" fill="#FF5722"/>
        <circle cx="-8" cy="-3" r="1.5" fill="#333"/>
        <polygon points="5,-5 15,-10 10,0" fill="#FFB74D"/>
        <polygon points="5,5 15,10 10,0" fill="#FFB74D"/>
      </g>
    </g>
  </g>
  
  <!-- Materials section -->
  <g transform="translate(20, 170)">
    <text x="0" y="0" font-family="'Comic Sans MS', cursive" font-size="11" font-weight="bold" fill="#7B1FA2">Материалы:</text>
    
    <!-- Sticks -->
    <line x1="10" y1="20" x2="70" y2="20" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="35" x2="50" y2="35" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
    <text x="40" y="55" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Палочки</text>
  </g>
  
  <!-- Thread -->
  <g transform="translate(100, 170)">
    <path d="M10,15 Q20,5 30,15 Q40,25 50,15" stroke="#BDB76B" stroke-width="2" fill="none"/>
    <path d="M10,30 Q20,20 30,30 Q40,40 50,30" stroke="#BDB76B" stroke-width="2" fill="none"/>
    <text x="30" y="55" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Нитки</text>
  </g>
  
  <!-- Decorations pieces -->
  <g transform="translate(170, 170)">
    <!-- Star piece -->
    <polygon points="15,10 17,17 25,17 19,22 21,30 15,25 9,30 11,22 5,17 13,17" fill="#FFD700"/>
    <!-- Heart piece -->
    <path d="M45,18 C45,12 35,10 35,18 C35,25 45,32 45,32 C45,32 55,25 55,18 C55,10 45,12 45,18" fill="#F48FB1"/>
    <!-- Cloud piece -->
    <ellipse cx="75" cy="18" rx="8" ry="6" fill="#E3F2FD"/>
    <ellipse cx="85" cy="15" rx="10" ry="8" fill="#E3F2FD"/>
    <text x="50" y="55" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Фигурки</text>
  </g>
  
  <!-- Steps -->
  <g transform="translate(280, 170)">
    <text x="0" y="0" font-family="'Comic Sans MS', cursive" font-size="10" fill="#7B1FA2">1. Сделай фигурки</text>
    <text x="0" y="15" font-family="'Comic Sans MS', cursive" font-size="10" fill="#7B1FA2">2. Соедини палочки</text>
    <text x="0" y="30" font-family="'Comic Sans MS', cursive" font-size="10" fill="#7B1FA2">3. Привяжи нитки</text>
    <text x="0" y="45" font-family="'Comic Sans MS', cursive" font-size="10" fill="#7B1FA2">4. Сбалансируй</text>
  </g>
  
  <!-- Tools -->
  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="25" height="30" fill="#4CAF50" rx="3"/>
    <rect x="8" y="-6" width="9" height="8" fill="#81C784"/>
    <text x="12" y="45" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Клей</text>
  </g>
  
  <g transform="translate(130, 255)">
    <rect x="0" y="0" width="40" height="30" fill="#FFE082" rx="2"/>
    <rect x="45" y="0" width="40" height="30" fill="#FFCC80" rx="2"/>
    <text x="42" y="45" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Картон</text>
  </g>
  
  <g transform="translate(230, 260)">
    <!-- Hole punch -->
    <rect x="0" y="0" width="25" height="20" fill="#607D8B" rx="3"/>
    <circle cx="12" cy="10" r="4" fill="#455A64"/>
    <rect x="10" y="20" width="5" height="10" fill="#607D8B"/>
    <text x="12" y="45" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Дырокол</text>
  </g>
  
  <g transform="translate(290, 255)">
    <!-- Thread spool -->
    <ellipse cx="15" cy="20" rx="15" ry="5" fill="#FF9800"/>
    <rect x="0" y="10" width="30" height="20" fill="#FFB74D"/>
    <ellipse cx="15" cy="10" rx="15" ry="5" fill="#FFCC80"/>
    <ellipse cx="15" cy="10" rx="5" ry="2" fill="#FFF"/>
    <text x="15" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Нитки</text>
  </g>
</svg>
