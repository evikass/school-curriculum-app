<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#FFF1F2"/><rect x="0" y="0" width="800" height="48" fill="#EC4899"/>
<text x="400" y="32" font-size="22" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Состав слова</text><circle cx="40" cy="30" r="20" fill="#BE185D"/>
    <text x="40" y="36" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">2</text><rect x="20" y="60" width="760" height="150" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="68" width="244" height="28" rx="14" fill="#EC4899"/>
<text x="152" y="87" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Морфемный разбор слова</text><text x="250" y="118" font-size="26" fill="#1F2937" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">пере  +  лес  +  ов  +  ый</text><rect x="50" y="132" width="160" height="36" rx="6" fill="#EC4899" opacity="0.15" stroke="#EC4899" stroke-width="1.5"/><text x="130" y="155" font-size="16" fill="#EC4899" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">пере-</text><text x="130" y="176" font-size="12" fill="#EC4899" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">приставка</text><rect x="235" y="132" width="160" height="36" rx="6" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/><text x="315" y="155" font-size="16" fill="#10B981" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">лес</text><text x="315" y="176" font-size="12" fill="#10B981" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">корень</text><rect x="420" y="132" width="160" height="36" rx="6" fill="#8B5CF6" opacity="0.15" stroke="#8B5CF6" stroke-width="1.5"/><text x="500" y="155" font-size="16" fill="#8B5CF6" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">-ов-</text><text x="500" y="176" font-size="12" fill="#8B5CF6" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">суффикс</text><rect x="605" y="132" width="160" height="36" rx="6" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/><text x="685" y="155" font-size="16" fill="#F59E0B" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">-ый</text><text x="685" y="176" font-size="12" fill="#F59E0B" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">окончание</text><rect x="20" y="220" width="760" height="180" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="228" width="244" height="28" rx="14" fill="#BE185D"/>
<text x="152" y="247" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Морфемы русского языка</text><rect x="30" y="260" width="175" height="128" rx="8" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5"/><rect x="30" y="260" width="175" height="28" rx="8" fill="#10B981"/><text x="117" y="280" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Корень</text><text x="38" y="302" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Главная значимая часть слова.</text><text x="38" y="320" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Однокоренные слова: лес, лесной, лесник</text><rect x="218" y="260" width="175" height="128" rx="8" fill="#FFFFFF" stroke="#EC4899" stroke-width="1.5"/><rect x="218" y="260" width="175" height="28" rx="8" fill="#EC4899"/><text x="305" y="280" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Приставка</text><text x="226" y="302" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Стоит перед корнем.</text><text x="226" y="320" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Образует новые слова: бежать → прибежать</text><rect x="406" y="260" width="175" height="128" rx="8" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="1.5"/><rect x="406" y="260" width="175" height="28" rx="8" fill="#8B5CF6"/><text x="493" y="280" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Суффикс</text><text x="414" y="302" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Стоит после корня.</text><text x="414" y="320" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Образует новые слова: лес → лесной</text><rect x="594" y="260" width="175" height="128" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5"/><rect x="594" y="260" width="175" height="28" rx="8" fill="#F59E0B"/><text x="681" y="280" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Окончание</text><text x="602" y="302" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Изменяемая часть слова.</text><text x="602" y="320" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Связывает слова: лес, леса, лесу</text><rect x="20" y="410" width="760" height="80" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="418" width="264" height="28" rx="14" fill="#8B5CF6"/>
<text x="162" y="437" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Способы словообразования</text><rect x="30" y="452" width="240" height="30" rx="6" fill="#EC4899" opacity="0.12"/><text x="38" y="462" font-size="12" fill="#EC4899" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Приставочный</text><text x="38" y="478" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">читать → прочитать</text><rect x="283" y="452" width="240" height="30" rx="6" fill="#10B981" opacity="0.12"/><text x="291" y="462" font-size="12" fill="#10B981" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Суффиксальный</text><text x="291" y="478" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">дом → домик</text><rect x="536" y="452" width="240" height="30" rx="6" fill="#8B5CF6" opacity="0.12"/><text x="544" y="462" font-size="12" fill="#8B5CF6" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Приставочно- суффиксальный</text><text x="544" y="478" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">под + окно → подоконник</text><rect x="20" y="500" width="760" height="90" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="508" width="104" height="28" rx="14" fill="#EF4444"/>
<text x="82" y="527" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Запомни!</text><text x="40" y="544" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Нулевое окончание — есть в слове, но не выражено звуком: столØ, читалØ</text><text x="40" y="562" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Основа — часть слова без окончания: пере-лес-ов- (ый — окончание)</text><text x="40" y="580" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Соединительная гласная о/е — не морфема: лес-о-руб, земл-е-мер</text></svg>