  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Лёгкая атлетика: королева спорта</text><rect x="20" y="80" width="245" height="180" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="20" y="80" width="245" height="28" fill="#22C55E" rx="8"/>
<rect x="20" y="100" width="245" height="8" fill="#22C55E"/>
<text x="142" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Бег</text>
<text x="32" y="124" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Спринт (60м, 100м, 200м)</text>
<text x="32" y="142" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Средние дистанции (800м, 1500м)</text>
<text x="32" y="160" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Длинные дистанции (5000м, 10000м)</text>
<text x="32" y="178" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Эстафета (4х100м, 4х400м)</text>
<text x="32" y="196" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Барьерный бег</text>
<text x="32" y="214" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Марафон (42 195 м)</text><rect x="277" y="80" width="245" height="180" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="277" y="80" width="245" height="28" fill="#EF4444" rx="8"/>
<rect x="277" y="100" width="245" height="8" fill="#EF4444"/>
<text x="399" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Прыжки</text>
<text x="289" y="124" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Прыжок в длину с разбега</text>
<text x="289" y="142" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Тройной прыжок</text>
<text x="289" y="160" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Прыжок в высоту</text>
<text x="289" y="178" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Прыжок с шестом</text>
<text x="289" y="196" font-family="Arial, sans-serif" font-size="12" fill="#1E293B"></text>
<text x="289" y="214" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Фаза: разбег -&gt; толчок -&gt;</text>
<text x="289" y="232" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  полёт -&gt; приземление</text><rect x="535" y="80" width="245" height="180" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="535" y="80" width="245" height="28" fill="#22C55E" rx="8"/>
<rect x="535" y="100" width="245" height="8" fill="#22C55E"/>
<text x="657" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Метания</text>
<text x="547" y="124" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Толкание ядра</text>
<text x="547" y="142" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Метание копья</text>
<text x="547" y="160" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Метание диска</text>
<text x="547" y="178" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Метание молота</text>
<text x="547" y="196" font-family="Arial, sans-serif" font-size="12" fill="#1E293B"></text>
<text x="547" y="214" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Техника: хват -&gt; разбег -&gt;</text>
<text x="547" y="232" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  финальное усилие -&gt; выпуск</text>
  <rect x="20" y="275" width="760" height="36" fill="#16A34A" rx="8"/>
  <text x="400" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Беговая дорожка — схема</text>
