<line x1="303.0" y1="368.0" x2="290.0" y2="388.0" stroke="#DC2626" stroke-width="2.0"/>
<line x1="303.0" y1="368.0" x2="316.0" y2="384.0" stroke="#DC2626" stroke-width="2.0"/><rect x="20" y="440" width="370" height="110" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="20" y="440" width="370" height="28" fill="#EF4444" rx="8"/>
<rect x="20" y="460" width="370" height="8" fill="#EF4444"/>
<text x="205" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Почему «королева спорта»?</text>
<text x="32" y="484" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Самый древний вид соревнований</text>
<text x="32" y="502" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Входит в программу Олимпиад с 776 г. до н.э.</text>
<text x="32" y="520" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Наиболее массовый вид спорта</text>
<text x="32" y="538" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Базовая подготовка для всех видов</text><rect x="410" y="440" width="370" height="110" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="410" y="440" width="370" height="28" fill="#22C55E" rx="8"/>
<rect x="410" y="460" width="370" height="8" fill="#22C55E"/>
<text x="595" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Мировые рекорды (муж.)</text>
<text x="422" y="484" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 100 м — 9,58 с (У. Болт)</text>
<text x="422" y="502" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 200 м — 19,19 с (У. Болт)</text>
<text x="422" y="520" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Прыжок в длину — 8,95 м</text>
<text x="422" y="538" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Прыжок в высоту — 2,45 м</text>
