<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">Значение грибов</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 7</text>
<rect x="20" y="72" width="385" height="260" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="212" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Съедобные и ядовитые грибы</text><rect x="35" y="105" width="165" height="20" rx="4" fill="#10B981" opacity="0.2"/><text x="117" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#059669" font-weight="bold">Съедобные</text><path d="M55,143 Q63,135 71,143 Z" fill="#D97706" stroke="#92400E" stroke-width="0.8"/><rect x="61" y="143" width="4" height="8" fill="#FDE68A" stroke="#D97706" stroke-width="0.5"/><text x="82" y="147" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Белый гриб</text><path d="M55,167 Q63,159 71,167 Z" fill="#B45309" stroke="#92400E" stroke-width="0.8"/><rect x="61" y="167" width="4" height="8" fill="#FDE68A" stroke="#D97706" stroke-width="0.5"/><text x="82" y="171" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Подберёзовик</text><path d="M55,191 Q63,183 71,191 Z" fill="#F59E0B" stroke="#92400E" stroke-width="0.8"/><rect x="61" y="191" width="4" height="8" fill="#FDE68A" stroke="#D97706" stroke-width="0.5"/><text x="82" y="195" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Лисичка</text><path d="M55,215 Q63,207 71,215 Z" fill="#F5F5DC" stroke="#92400E" stroke-width="0.8"/><rect x="61" y="215" width="4" height="8" fill="#FDE68A" stroke="#D97706" stroke-width="0.5"/><text x="82" y="219" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Шампиньон</text><path d="M55,239 Q63,231 71,239 Z" fill="#D97706" stroke="#92400E" stroke-width="0.8"/><rect x="61" y="239" width="4" height="8" fill="#FDE68A" stroke="#D97706" stroke-width="0.5"/><text x="82" y="243" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Опёнок</text><rect x="210" y="105" width="175" height="20" rx="4" fill="#FEE2E2"/><text x="297" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" font-weight="bold">Ядовитые</text><path d="M230,143 Q238,135 246,143 Z" fill="#E5E5E5" stroke="#EF4444" stroke-width="0.8"/><rect x="236" y="143" width="4" height="8" fill="#FDE68A" stroke="#EF4444" stroke-width="0.5"/><text x="255" y="147" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="normal">Бледная поганка ☠</text><path d="M230,167 Q238,159 246,167 Z" fill="#EF4444" stroke="#EF4444" stroke-width="0.8"/><rect x="236" y="167" width="4" height="8" fill="#FDE68A" stroke="#EF4444" stroke-width="0.5"/><text x="255" y="171" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="normal">Мухомор красный ☠</text><path d="M230,191 Q238,183 246,191 Z" fill="#B45309" stroke="#EF4444" stroke-width="0.8"/><rect x="236" y="191" width="4" height="8" fill="#FDE68A" stroke="#EF4444" stroke-width="0.5"/><text x="255" y="195" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="normal">Ложный опёнок ☠</text><path d="M230,215 Q238,207 246,215 Z" fill="#DC2626" stroke="#EF4444" stroke-width="0.8"/><rect x="236" y="215" width="4" height="8" fill="#FDE68A" stroke="#EF4444" stroke-width="0.5"/><text x="255" y="219" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="normal">Сатанинский гриб ☠</text><rect x="35" y="275" width="355" height="45" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/><text x="212" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" font-weight="bold">Бледная поганка — смертельно ядовита!</text><text x="212" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Не имеет неприятного запаха или вкуса!</text><rect x="420" y="72" width="370" height="130" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="605" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Антибиотики</text><text x="435" y="115" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Пенициллин — первый антибиотик</text><text x="435" y="132" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Открыт А. Флемингом в 1928 г.</text><text x="435" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Получен из плесневого гриба</text><text x="435" y="164" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">Penicillium notatum</text><text x="435" y="182" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Спас миллионы жизней от бактериальных</text><text x="435" y="195" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">инфекций (пневмония, сепсис и др.)</text><rect x="420" y="213" width="370" height="119" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="605" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Роль в природе</text><text x="435" y="255" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Редуценты — разрушают органические</text><text x="435" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">остатки, возвращают вещества в почву</text><text x="435" y="290" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Участвуют в круговороте углерода</text><text x="435" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">и азота в природе</text><text x="435" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="normal">Без грибов Земля покрылась бы</text><text x="435" y="335" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="normal">слоем мёртвых остатков!</text><rect x="20" y="345" width="385" height="240" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="212" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Микориза (грибокорень)</text><path d="M80,420 Q120,400 160,410 Q200,420 240,415 Q280,405 320,410" fill="none" stroke="#92400E" stroke-width="4"/><path d="M120,415 Q130,440 125,460" fill="none" stroke="#92400E" stroke-width="2"/><path d="M200,420 Q210,445 205,465" fill="none" stroke="#92400E" stroke-width="2"/><path d="M280,412 Q290,435 285,455" fill="none" stroke="#92400E" stroke-width="2"/><path d="M100,415 Q105,430 97,445 Q102,460 95,475" fill="none" stroke="#10B981" stroke-width="1.5"/><path d="M110,418 Q115,432 108,448" fill="none" stroke="#10B981" stroke-width="1"/><path d="M140,415 Q145,430 137,445 Q142,460 135,475" fill="none" stroke="#10B981" stroke-width="1.5"/><path d="M150,418 Q155,432 148,448" fill="none" stroke="#10B981" stroke-width="1"/><path d="M190,415 Q195,430 187,445 Q192,460 185,475" fill="none" stroke="#10B981" stroke-width="1.5"/><path d="M200,418 Q205,432 198,448" fill="none" stroke="#10B981" stroke-width="1"/><path d="M230,415 Q235,430 227,445 Q232,460 225,475" fill="none" stroke="#10B981" stroke-width="1.5"/><path d="M240,418 Q245,432 238,448" fill="none" stroke="#10B981" stroke-width="1"/><path d="M270,415 Q275,430 267,445 Q272,460 265,475" fill="none" stroke="#10B981" stroke-width="1.5"/><path d="M280,418 Q285,432 278,448" fill="none" stroke="#10B981" stroke-width="1"/><line x1="120" y1="460" x2="50" y2="480" stroke="#059669" stroke-width="1.5"/><circle cx="50" cy="480" r="3" fill="#059669"/><text x="30" y="493" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="bold">Гифы гриба</text><line x1="200" y1="420" x2="50" y2="420" stroke="#059669" stroke-width="1.5"/><circle cx="50" cy="420" r="3" fill="#059669"/><text x="30" y="423" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#92400E" font-weight="bold">Корень растения</text><text x="35" y="510" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Симбиоз: гриб даёт воду и минералы,</text><text x="35" y="525" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">растение — органические вещества</text><text x="35" y="545" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="normal">80% растений образуют микоризу!</text><text x="35" y="565" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Белый гриб, подберёзовик —</text><text x="35" y="578" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">микоризообразователи</text><rect x="420" y="345" width="370" height="240" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="605" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Использование грибов</text><rect x="435" y="380" width="10" height="10" rx="2" fill="#10B981" opacity="0.5"/><text x="452" y="388" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Пищевое</text><text x="520" y="388" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Шампиньоны, вешенки — выращивание</text><text x="440" y="401" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">на фермах во всём мире</text><rect x="435" y="410" width="10" height="10" rx="2" fill="#3B82F6" opacity="0.5"/><text x="452" y="418" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Медицина</text><text x="520" y="418" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Антибиотики, иммуностимуляторы</text><text x="440" y="431" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(шиитаке, рейши, чага)</text><rect x="435" y="440" width="10" height="10" rx="2" fill="#F97316" opacity="0.5"/><text x="452" y="448" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Хлебопечение</text><text x="520" y="448" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Дрожжи (Saccharomyces cerevisiae)</text><text x="440" y="461" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">— брожение теста</text><rect x="435" y="470" width="10" height="10" rx="2" fill="#F59E0B" opacity="0.5"/><text x="452" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Пивоварение</text><text x="520" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Дрожжи — спиртовое брожение:</text><text x="440" y="491" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">глюкоза → этанол + CO₂</text><rect x="435" y="500" width="10" height="10" rx="2" fill="#10B981" opacity="0.5"/><text x="452" y="508" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Сыроделие</text><text x="520" y="508" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Плесневые грибы (Penicillium)</text><text x="440" y="521" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">для сыров с плесенью</text><rect x="435" y="530" width="10" height="10" rx="2" fill="#8B5CF6" opacity="0.5"/><text x="452" y="538" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Биотехнология</text><text x="520" y="538" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Получение лимонной кислоты,</text><text x="440" y="551" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">ферментов, витаминов</text>  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Урок 4</text>
</svg>