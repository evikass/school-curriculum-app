  <text x="42" y="47" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">8</text>
  <text x="78" y="38" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">Правовое государство</text>
  <text x="78" y="58" fill="#FEF3C7" font-size="13" font-family="Arial, sans-serif">Разделение властей, права и обязанности, конституция</text>
  <rect x="17" y="92" width="500" height="280" rx="8" fill="#E5E7EB" opacity="0.5" />
