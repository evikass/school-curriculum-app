  <text x="657" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Признаки правового гос-ва</text>
  <text x="545" y="126" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Верховенство закона</text>
  <text x="545" y="143" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Разделение властей</text>
  <text x="545" y="160" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Взаимная ответственность</text>
  <text x="545" y="177" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">  государства и личности</text>
  <text x="545" y="194" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Права и свободы человека</text>
  <text x="545" y="211" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Независимый суд</text>
  <text x="545" y="228" text-anchor="start" fill="#1C1917" font-size="11" font-weight="normal" font-family="Arial, sans-serif">• Гражданское общество</text>
  <rect x="17" y="382" width="385" height="130" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="15" y="380" width="385" height="130" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5" />
  <rect x="15" y="380" width="385" height="26" rx="8" fill="#3B82F6" />
  <rect x="15" y="398" width="385" height="8" fill="#3B82F6" />
  <text x="207" y="398" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Права и обязанности гражданина</text>
  <text x="30" y="415" text-anchor="start" fill="#3B82F6" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Права:</text>
  <text x="30" y="433" text-anchor="start" fill="#1C1917" font-size="10" font-weight="normal" font-family="Arial, sans-serif">• На жизнь, свободу, личную неприкосновенность</text>
  <text x="30" y="448" text-anchor="start" fill="#1C1917" font-size="10" font-weight="normal" font-family="Arial, sans-serif">• На образование, труд, отдых</text>
  <text x="30" y="463" text-anchor="start" fill="#1C1917" font-size="10" font-weight="normal" font-family="Arial, sans-serif">• Свобода слова, собраний, религии</text>
  <text x="30" y="483" text-anchor="start" fill="#EF4444" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Обязанности:</text>
  <text x="30" y="498" text-anchor="start" fill="#1C1917" font-size="10" font-weight="normal" font-family="Arial, sans-serif">• Соблюдать законы, платить налоги,</text>
  <text x="40" y="512" text-anchor="start" fill="#92400E" font-size="10" font-weight="normal" font-family="Arial, sans-serif">защищать Родину</text>
  <rect x="417" y="382" width="370" height="130" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="415" y="380" width="370" height="130" rx="8" fill="#FFFFFF" stroke="#92400E" stroke-width="1.5" />
  <rect x="415" y="380" width="370" height="26" rx="8" fill="#92400E" />
  <rect x="415" y="398" width="370" height="8" fill="#92400E" />
  <text x="600" y="398" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Конституция РФ</text>
  <text x="430" y="418" text-anchor="start" fill="#1C1917" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Конституция — Основной закон</text>
  <text x="430" y="438" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">государства, обладающий высшей</text>
  <text x="430" y="458" text-anchor="start" fill="#92400E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">юридической силой.</text>
  <text x="430" y="483" text-anchor="start" fill="#78716C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">Принята 12 декабря 1993 г.</text>
  <text x="430" y="500" text-anchor="start" fill="#92400E" font-size="11" font-weight="normal" font-family="Arial, sans-serif">День Конституции — 12 декабря</text>
  <rect x="0" y="570" width="800" height="30" fill="#92400E" />
  <text x="400" y="590" text-anchor="middle" fill="#FEF3C7" font-size="11" font-family="Arial, sans-serif">Обществознание • 8 класс • Интернет-Школа</text>
