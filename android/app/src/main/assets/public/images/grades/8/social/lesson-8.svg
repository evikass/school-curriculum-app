  <text x="265" y="108" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Разделение властей</text>
  <rect x="195" y="125" width="140" height="35" rx="8" fill="#EF4444" stroke="#EF4444" stroke-width="2" />
