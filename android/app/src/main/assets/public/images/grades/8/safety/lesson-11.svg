<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C" />
      <stop offset="100%" style="stop-color:#DC2626" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030" />
    </filter>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626" />
      <stop offset="100%" style="stop-color:#991B1B" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#F3F4F6" />
  <rect width="800" height="70" fill="url(#headerGrad)" />
  <text x="400" y="35" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Основы первой помощи</text>
  <text x="400" y="58" text-anchor="middle" fill="#FEE2E2" font-size="13" font-family="Arial, sans-serif">АВС, кровотечения, ожоги, переломы</text>
  <rect x="10" y="8" width="50" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.3" />
  <text x="35" y="25" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">ОБЖ</text>
  <rect x="0" y="70" width="800" height="3" fill="#EAB308" />
  <text x="20" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Алгоритм АВС первой помощи</text>
  <line x1="20" y1="99" x2="228" y2="99" stroke="#EA580C" stroke-width="2" />
  <circle cx="40" cy="127" r="18" fill="#DC2626" />
  <text x="40" y="134" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" font-family="Arial, sans-serif">A</text>
  <text x="68" y="124" fill="#DC2626" font-size="13" font-weight="bold" font-family="Arial, sans-serif">A — Airway</text>
  <text x="68" y="140" fill="#374151" font-size="11" font-family="Arial, sans-serif">Воздух — обеспечить проходимость дыхательных путей</text>
  <circle cx="40" cy="177" r="18" fill="#2563EB" />
  <text x="40" y="184" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" font-family="Arial, sans-serif">B</text>
  <text x="68" y="174" fill="#2563EB" font-size="13" font-weight="bold" font-family="Arial, sans-serif">B — Breathing</text>
  <text x="68" y="190" fill="#374151" font-size="11" font-family="Arial, sans-serif">Дыхание — проверить наличие дыхания</text>
  <circle cx="40" cy="227" r="18" fill="#16A34A" />
  <text x="40" y="234" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" font-family="Arial, sans-serif">C</text>
  <text x="68" y="224" fill="#16A34A" font-size="13" font-weight="bold" font-family="Arial, sans-serif">C — Circulation</text>
  <text x="68" y="240" fill="#374151" font-size="11" font-family="Arial, sans-serif">Кровообращение — проверить пульс, остановить кровотечение</text>
  <text x="20" y="275" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Виды кровотечений</text>
  <line x1="20" y1="279" x2="156" y2="279" stroke="#EA580C" stroke-width="2" />
  <rect x="25" y="292" width="370" height="48" rx="4" fill="#EA580C" fill-opacity="0.1" stroke="#EA580C" stroke-width="1.5" />
  <circle cx="45" cy="307" r="8" fill="#EA580C" />
  <text x="60" y="310" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Капиллярное</text>
  <text x="170" y="310" fill="#374151" font-size="10" font-family="Arial, sans-serif">Кровь сочится каплями</text>
  <text x="35" y="330" fill="#374151" font-size="10" font-family="Arial, sans-serif">Действие: Промыть, наложить повязку</text>
  <rect x="25" y="347" width="370" height="48" rx="4" fill="#2563EB" fill-opacity="0.1" stroke="#2563EB" stroke-width="1.5" />
  <circle cx="45" cy="362" r="8" fill="#2563EB" />
  <text x="60" y="365" fill="#2563EB" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Венозное</text>
  <text x="170" y="365" fill="#374151" font-size="10" font-family="Arial, sans-serif">Тёмная кровь, течёт равномерно</text>
  <text x="35" y="385" fill="#374151" font-size="10" font-family="Arial, sans-serif">Действие: Давящая повязка, приподнять</text>
  <rect x="25" y="402" width="370" height="48" rx="4" fill="#DC2626" fill-opacity="0.1" stroke="#DC2626" stroke-width="1.5" />
  <circle cx="45" cy="417" r="8" fill="#DC2626" />
  <text x="60" y="420" fill="#DC2626" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Артериальное</text>
  <text x="170" y="420" fill="#374151" font-size="10" font-family="Arial, sans-serif">Алая кровь, пульсирует</text>
  <text x="35" y="440" fill="#374151" font-size="10" font-family="Arial, sans-serif">Действие: Жгут выше раны, записать время!</text>
  <text x="420" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Ожоги и первая помощь</text>
  <line x1="420" y1="99" x2="588" y2="99" stroke="#EA580C" stroke-width="2" />
  <rect x="425" y="112" width="345" height="42" rx="4" fill="#EAB308" fill-opacity="0.1" stroke="#EAB308" stroke-width="1.5" />
  <text x="435" y="146" fill="#EAB308" font-size="12" font-weight="bold" font-family="Arial, sans-serif">I степень</text>
  <text x="535" y="128" fill="#374151" font-size="10" font-family="Arial, sans-serif">Покраснение, боль</text>
  <text x="435" y="146" fill="#374151" font-size="10" font-family="Arial, sans-serif">Охладить водой 10-15 мин</text>
  <rect x="425" y="160" width="345" height="42" rx="4" fill="#EA580C" fill-opacity="0.1" stroke="#EA580C" stroke-width="1.5" />
  <text x="435" y="194" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">II степень</text>
  <text x="535" y="176" fill="#374151" font-size="10" font-family="Arial, sans-serif">Пузыри, сильная боль</text>
  <text x="435" y="194" fill="#374151" font-size="10" font-family="Arial, sans-serif">Охладить, не вскрывать пузыри</text>
  <rect x="425" y="208" width="345" height="42" rx="4" fill="#DC2626" fill-opacity="0.1" stroke="#DC2626" stroke-width="1.5" />
  <text x="435" y="242" fill="#DC2626" font-size="12" font-weight="bold" font-family="Arial, sans-serif">III степень</text>
  <text x="535" y="224" fill="#374151" font-size="10" font-family="Arial, sans-serif">Омертвение кожи</text>
  <text x="435" y="242" fill="#374151" font-size="10" font-family="Arial, sans-serif">Накрыть чистой тканью, скорую!</text>
  <text x="420" y="270" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Переломы</text>
  <line x1="420" y1="274" x2="484" y2="274" stroke="#EA580C" stroke-width="2" />
  <g transform="translate(425,280)">
    <polygon points="7,0 14,14 0,14" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="7" y="10" text-anchor="middle" fill="#111827" font-size="7" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="445" y="292" fill="#374151" font-size="10" font-family="Arial, sans-serif">Признаки: боль, отёк, деформация</text>
  <g transform="translate(425,302)">
    <polygon points="7,0 14,14 0,14" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="7" y="10" text-anchor="middle" fill="#111827" font-size="7" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="445" y="314" fill="#374151" font-size="10" font-family="Arial, sans-serif">Открытый: кость видна, кровотечение</text>
  <g transform="translate(425,324)">
    <polygon points="7,0 14,14 0,14" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="7" y="10" text-anchor="middle" fill="#111827" font-size="7" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="445" y="336" fill="#374151" font-size="10" font-family="Arial, sans-serif">Закрытый: без повреждения кожи</text>
  <g transform="translate(425,346)">
    <polygon points="7,0 14,14 0,14" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="7" y="10" text-anchor="middle" fill="#111827" font-size="7" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="445" y="358" fill="#374151" font-size="10" font-family="Arial, sans-serif">Действие: обездвижить (иммобилизация)</text>
  <g transform="translate(425,368)">
    <polygon points="7,0 14,14 0,14" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="7" y="10" text-anchor="middle" fill="#111827" font-size="7" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="445" y="380" fill="#374151" font-size="10" font-family="Arial, sans-serif">Не пытайтесь вправить кость!</text>
  <g transform="translate(425,390)">
    <polygon points="7,0 14,14 0,14" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="7" y="10" text-anchor="middle" fill="#111827" font-size="7" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="445" y="402" fill="#374151" font-size="10" font-family="Arial, sans-serif">Наложите шину из подручных средств</text>
  <g transform="translate(425,412)">
    <polygon points="7,0 14,14 0,14" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="7" y="10" text-anchor="middle" fill="#111827" font-size="7" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="445" y="424" fill="#374151" font-size="10" font-family="Arial, sans-serif">При открытом — остановите кровь сначала</text>
  <rect x="20" y="470" width="375" height="78" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
  <g>
    <circle cx="33" cy="483" r="8" fill="#16A34A" />
    <text x="33" y="488" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="46" y="488" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ПРАВИЛЬНО</text>
  <text x="30" y="504" fill="#374151" font-size="11" font-family="Arial, sans-serif">Перед оказанием помощи убедитесь в безопасности</text>
  <text x="30" y="520" fill="#374151" font-size="11" font-family="Arial, sans-serif">Вызовите скорую: 103 или 112</text>
  <text x="30" y="536" fill="#374151" font-size="11" font-family="Arial, sans-serif">Действуйте спокойно и чётко</text>
  <rect x="420" y="470" width="355" height="78" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" />
  <g>
    <circle cx="433" cy="483" r="8" fill="#DC2626" />
    <text x="433" y="488" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">X</text>
  </g>
  <text x="446" y="488" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ОПАСНО</text>
  <text x="430" y="504" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не давайте таблетки без назначения</text>
  <text x="430" y="520" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не прикладывайте лёд к ожогу напрямую</text>
  <text x="430" y="536" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не перемещайте человека с переломом позвоночника</text>
</svg>