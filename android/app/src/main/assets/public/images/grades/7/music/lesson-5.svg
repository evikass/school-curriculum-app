D9" font-weight="normal" text-anchor="middle" font-family="Arial, sans-serif">1756—1791</text><circle cx="301" cy="176" r="3" fill="#7C3AED" opacity="1.0"/><text x="311" y="180" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">Вундеркинд, гений</text><circle cx="301" cy="198" r="3" fill="#7C3AED" opacity="1.0"/><text x="311" y="202" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">Более 600 произведений</text><circle cx="301" cy="220" r="3" fill="#7C3AED" opacity="1.0"/><text x="311" y="224" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">«Реквием» — незаконченный</text><circle cx="301" cy="242" r="3" fill="#7C3AED" opacity="1.0"/><text x="311" y="246" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">«Свадьба Фигаро» — опера</text><circle cx="301" cy="264" r="3" fill="#7C3AED" opacity="1.0"/><text x="311" y="268" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">«Дон Жуан» — опера</text><circle cx="301" cy="286" r="3" fill="#7C3AED" opacity="1.0"/><text x="311" y="290" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">«Волшебная флейта» — опера</text><circle cx="301" cy="308" r="3" fill="#7C3AED" opacity="1.0"/><text x="311" y="312" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">41 симфония, 27 концертов</text><rect x="535" y="105" width="235" height="240" fill="#FFFFFF" rx="12" opacity="0.95" stroke="#7C3AED" stroke-width="1.5"/><rect x="535" y="105" width="235" height="40" fill="#5B21B6" rx="12 12 0 0" opacity="1.0"/><text x="652" y="131" font-size="17" fill="#FFFFFF" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">Л. Бетховен</text><text x="652" y="162" font-size="13" fill="#6D28D9" font-weight="normal" text-anchor="middle" font-family="Arial, sans-serif">1770—1827</text><circle cx="553" cy="176" r="3" fill="#7C3AED" opacity="1.0"/><text x="563" y="180" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">Мост классики и романтизма</text><circle cx="553" cy="198" r="3" fill="#7C3AED" opacity="1.0"/><text x="563" y="202" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">9 симфоний (Девятая — с хором)</text><circle cx="553" cy="220" r="3" fill="#7C3AED" opacity="1.0"/><text x="563" y="224" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">32 фортепианные сонаты</text><circle cx="553" cy="242" r="3" fill="#7C3AED" opacity="1.0"/><text x="563" y="246" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">«Лунная соната» №14</text><circle cx="553" cy="264" r="3" fill="#7C3AED" opacity="1.0"/><text x="563" y="268" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">«К Элизе» — ф-п миниатюра</text><circle cx="553" cy="286" r="3" fill="#7C3AED" opacity="1.0"/><text x="563" y="290" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">Глухота не остановила творчество</text><circle cx="553" cy="308" r="3" fill="#7C3AED" opacity="1.0"/><text x="563" y="312" font-size="12" fill="#1E1B4B" font-weight="normal" text-anchor="start" font-family="Arial, sans-serif">«Ода к радости» — гимн ЕС</text><rect x="30" y="365" width="740" height="210" fill="#FFFFFF" rx="12" opacity="0.95" stroke="#A78BFA" stroke-width="1.5"/><rect x="30" y="365" width="740" height="36" fill="#5B21B6" rx="12 12 0 0" opacity="1.0"/><text x="400" y="390" font-size="15" fill="#FFFFFF" font-weight="bold" text-anchor="middle" font-family="Arial, sans-serif">Достижения венской кла