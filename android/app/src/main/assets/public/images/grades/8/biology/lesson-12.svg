<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Головной мозг</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 8</text>
<rect x="20" y="72" width="420" height="320" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="230" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Головной мозг человека</text><path d="M160,180 Q120,180 110,200 Q100,220 110,250 Q120,280 150,300 Q170,310 200,310 Q230,310 260,300 Q300,280 310,250 Q320,220 310,200 Q300,180 270,175 Q250,170 230,170 Q210,165 190,170 Q175,172 160,180 Z" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/><line x1="210" y1="170" x2="210" y2="300" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,2"/><path d="M160,180 Q140,180 130,195 Q125,210 135,235" fill="none" stroke="#3B82F6" stroke-width="1.5"/><text x="145" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3B82F6" font-weight="bold">Лобная</text><path d="M135,235 Q130,260 150,280" fill="none" stroke="#8B5CF6" stroke-width="1.5"/><text x="135" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B5CF6" font-weight="bold">Теменная</text><path d="M135,235 Q155,240 165,225" fill="none" stroke="#F97316" stroke-width="1.5"/><text x="115" y="240" text-anchor="end" font-family="Arial, sans-serif" font-size="7" fill="#F97316" font-weight="bold">Височная</text><path d="M150,280 Q175,295 210,300 Q245,295 270,280" fill="none" stroke="#EF4444" stroke-width="1.5"/><text x="210" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#EF4444" font-weight="bold">Затылочная</text><ellipse cx="280" cy="290" rx="30" ry="18" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/><text x="280" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1F2937" font-weight="bold">Мозжечок</text><rect x="195" y="300" width="25" height="30" rx="4" fill="#FECACA" stroke="#EF4444" stroke-width="1.5"/><text x="240" y="315" text-anchor="start" font-family="Arial, sans-serif" font-size="7" fill="#EF4444" font-weight="normal">Ствол мозга</text><line x1="210" y1="200" x2="100" y2="140" stroke="#059669" stroke-width="1.5"/><circle cx="100" cy="140" r="3" fill="#059669"/><text x="55" y="138" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Большие полушария</text><text x="55" y="152" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(кора ~2-4 мм, извилины)</text><text x="230" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Масса: ~1400 г (2% массы тела)</text><text x="230" y="380" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Потребляет 20% O₂ и глюкозы</text><rect x="460" y="72" width="325" height="320" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="622" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Функции отделов мозга</text><rect x="475" y="107" width="10" height="14" rx="2" fill="#D1FAE5" stroke="#10B981" stroke-width="0.5"/><text x="490" y="117" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#10B981" font-weight="bold">Большие полушария</text><text x="490" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Мышление, речь, память,</text><text x="490" y="142" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">произвольные движения,</text><text x="490" y="154" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">органы чувств</text><rect x="475" y="168" width="10" height="14" rx="2" fill="#FDE68A" stroke="#D97706" stroke-width="0.5"/><text x="490" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#D97706" font-weight="bold">Мозжечок</text><text x="490" y="191" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Координация движений,</text><text x="490" y="203" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">равновесие, мышечный тонус</text><rect x="475" y="217" width="10" height="14" rx="2" fill="#FECACA" stroke="#EF4444" stroke-width="0.5"/><text x="490" y="227" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="bold">Ствол мозга:</text><rect x="475" y="234" width="10" height="14" rx="2" fill="#FECACA" stroke="#EF4444" stroke-width="0.5"/><text x="490" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="bold">  Промежуточный мозг</text><text x="490" y="257" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Таламус (ретранслятор),</text><text x="490" y="269" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">гипоталамус (гомеостаз)</text><rect x="475" y="283" width="10" height="14" rx="2" fill="#FECACA" stroke="#EF4444" stroke-width="0.5"/><text x="490" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="bold">  Средний мозг</text><text x="490" y="306" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Рефлексы на свет/звук,</text><text x="490" y="318" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">мышечный тонус</text><rect x="475" y="332" width="10" height="14" rx="2" fill="#FECACA" stroke="#EF4444" stroke-width="0.5"/><text x="490" y="342" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="bold">  Мост</text><text x="490" y="355" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Связь полушарий мозжечка</text><rect x="475" y="369" width="10" height="14" rx="2" fill="#FECACA" stroke="#EF4444" stroke-width="0.5"/><text x="490" y="379" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="bold">  Продолговатый мозг</text><text x="490" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Дыхание, сердцебиение,</text><text x="490" y="404" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">глотание, чихание, рвота</text><rect x="20" y="405" width="765" height="180" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="400" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Доли коры больших полушарий и их зоны</text><rect x="35" y="440" width="175" height="130" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="122" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">Лобная доля</text><text x="45" y="475" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Мышление, планирование,</text><text x="45" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">речь (зона Брока),</text><text x="45" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">произвольные движения</text><text x="45" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">(моторная зона)</text><rect x="220" y="440" width="175" height="130" rx="6" fill="#E9D5FF" stroke="#8B5CF6" stroke-width="1.5"/><text x="307" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" font-weight="bold">Теменная доля</text><text x="230" y="475" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Осязание, температура,</text><text x="230" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">боль, проприоцепция</text><text x="230" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">(сенсорная зона),</text><text x="230" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">пространственное восприятие</text><rect x="405" y="440" width="175" height="130" rx="6" fill="#FEF3C7" stroke="#F97316" stroke-width="1.5"/><text x="492" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#F97316" font-weight="bold">Височная доля</text><text x="415" y="475" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Слух, память,</text><text x="415" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">узнавание лиц,</text><text x="415" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">речь (зона Вернике),</text><text x="415" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">эмоции</text><rect x="590" y="440" width="175" height="130" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/><text x="677" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" font-weight="bold">Затылочная доля</text><text x="600" y="475" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Зрение,</text><text x="600" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">обработка</text><text x="600" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">зрительной</text><text x="600" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">информации</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 12</text></svg>