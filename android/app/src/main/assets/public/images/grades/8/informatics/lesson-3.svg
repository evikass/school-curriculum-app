  <text x="35" y="95" text-anchor="start" fill="#0284C7" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Алгоритм</text>
  <text x="120" y="95" text-anchor="start" fill="#0C4A6E" font-size="12" font-weight="normal" font-family="Arial, sans-serif">- конечная последовательность точно определённых действий, приводящая к результату</text>
  <text x="35" y="115" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Слово происходит от имени математика аль-Хорезми (IX век)</text>
