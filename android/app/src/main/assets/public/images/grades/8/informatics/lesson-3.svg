  <text x="400" y="38" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Урок 3: Понятие алгоритма</text>
  <line x1="50" y1="52" x2="750" y2="52" stroke="#38BDF8" stroke-width="2" />
  <rect x="22" y="70" width="760" height="60" fill="#94A3B8" rx="8" opacity="0.15" />
