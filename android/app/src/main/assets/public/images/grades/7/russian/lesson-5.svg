<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#FFF1F2"/><rect x="0" y="0" width="800" height="48" fill="#EC4899"/>
<text x="400" y="32" font-size="22" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Деепричастие как часть речи</text><circle cx="40" cy="30" r="20" fill="#BE185D"/>
    <text x="40" y="36" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">5</text><rect x="20" y="60" width="760" height="60" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><text x="400" y="84" font-size="14" fill="#1F2937" text-anchor="middle" font-weight="normal" font-family="Arial, sans-serif">Деепричастие — особая форма глагола, которая обозначает добавочное действие</text><text x="400" y="104" font-size="14" fill="#BE185D" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">и совмещает свойства глагола и наречия</text><rect x="20" y="130" width="370" height="150" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="138" width="184" height="28" rx="14" fill="#EC4899"/>
<text x="122" y="157" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Свойства глагола</text><text x="40" y="172" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Вид: совершенный / несовершенный</text><text x="40" y="190" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Переходность / непереходность</text><text x="40" y="208" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Возвратность: -ся / -сь</text><text x="40" y="226" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Управляет тем же падежом,</text><text x="40" y="244" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">  что и глагол: читать (что?) книгу</text><text x="40" y="262" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">  → читая книгу</text><rect x="410" y="130" width="370" height="150" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="420" y="138" width="184" height="28" rx="14" fill="#8B5CF6"/>
<text x="512" y="157" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Свойства наречия</text><text x="430" y="172" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Не изменяется (не спрягается,</text><text x="430" y="190" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">  не склоняется)</text><text x="430" y="208" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• В предложении — обстоятельство</text><text x="430" y="226" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Отвечает на вопрос: что делая?</text><text x="430" y="244" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">  что сделав?</text><text x="430" y="262" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Зависит от глагола-сказуемого</text><rect x="20" y="290" width="760" height="115" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="298" width="264" height="28" rx="14" fill="#10B981"/>
<text x="162" y="317" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Образование деепричастий</text><rect x="35" y="332" width="355" height="60" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="1"/><text x="212" y="350" font-size="13" fill="#BE185D" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Несовершенный вид</text><text x="45" y="368" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">читать → читая, рисовать → рисуя, думать → думая</text><text x="45" y="384" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Основа наст. вр. + -а/-я</text><rect x="410" y="332" width="355" height="60" rx="8" fill="#EEF2FF" stroke="#8B5CF6" stroke-width="1"/><text x="587" y="350" font-size="13" fill="#8B5CF6" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Совершенный вид</text><text x="420" y="368" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">прочитать → прочитав, решить → решив</text><text x="420" y="384" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Основа прош. вр. + -в / -вши / -ши</text><rect x="20" y="415" width="760" height="80" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="423" width="224" height="28" rx="14" fill="#F59E0B"/>
<text x="142" y="442" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Деепричастный оборот</text><text x="35" y="455" font-size="13" fill="#1F2937" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Деепричастный оборот = деепричастие + зависимые слова</text><text x="35" y="475" font-size="12" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Мальчик, читая книгу, сидел у окна.    [читая книгу] — деепричастный оборот</text><text x="35" y="492" font-size="12" fill="#EF4444" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">На письме выделяется запятыми!</text><rect x="20" y="505" width="760" height="85" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="513" width="84" height="28" rx="14" fill="#EF4444"/>
<text x="72" y="532" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Важно!</text><text x="40" y="543" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Деепричастие и сказуемое должны обозначать действия одного и того же лица:</text><text x="40" y="560" font-size="11" fill="#EF4444" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">  Правильно: Читая книгу, я отдыхал.    Неправильно: Читая книгу, шёл дождь.</text><text x="40" y="577" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• НЕ с деепричастиями пишется раздельно: не прочитав, не думая</text></svg>