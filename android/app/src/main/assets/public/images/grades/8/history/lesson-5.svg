  <text x="35" y="253" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">немцы, поляки, итальянцы...</text>
  <text x="35" y="273" font-size="9" fill="#EF4444" text-anchor="start" font-family="sans-serif" font-weight="bold">12 июня 1812 — переход реки</text>
  <text x="35" y="287" font-size="9" fill="#EF4444" text-anchor="start" font-family="sans-serif" font-weight="bold">Неман — начало войны</text>
