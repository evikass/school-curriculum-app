  <text x="405" y="474" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">✦ Из ~600 000 вернулось ~30 000</text>
  <text x="405" y="488" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">✦ Россия сохранила независимость</text>
  <text x="405" y="502" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">✦ Начало заграничных походов русской армии</text>
  <text x="405" y="516" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">✦ Победа стала символом единства нации</text>
  <rect x="25" y="530" width="750" height="30" fill="#FEE2E2" stroke="#FCA5A5" rx="6" ry="6" />
  <text x="400" y="549" font-size="10" fill="#B91C1C" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-style="italic">«Французы показали себя достойными победы, а русские заслужили быть непобедимыми» — Кутузов</text>
  <rect x="0" y="570" width="800" height="30" fill="#B91C1C" opacity="0.15" />
