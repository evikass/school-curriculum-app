  <text x="145" y="195" font-size="10" fill="#1E40AF" text-anchor="middle" font-family="sans-serif" font-weight="bold">Великая армия: ~600 000 чел.</text>
  <text x="35" y="211" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">Армия Наполеона — крупнейшая</text>
  <text x="35" y="225" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">в истории Европы. Многонацио-</text>
