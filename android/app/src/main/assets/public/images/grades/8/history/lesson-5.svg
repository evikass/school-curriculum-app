  <text x="667" y="172" font-size="11" fill="#FFFFFF" text-anchor="middle" font-family="sans-serif" font-weight="bold">Пожар Москвы и отступление</text>
  <text x="560" y="193" font-size="8.5" fill="#1F2937" text-anchor="start" font-family="sans-serif">Наполеон вошёл в Москву 14 сент.</text>
  <text x="560" y="206" font-size="8.5" fill="#1F2937" text-anchor="start" font-family="sans-serif">Москва горела 5 дней</text>
  <text x="560" y="219" font-size="8.5" fill="#1F2937" text-anchor="start" font-family="sans-serif">Уничтожено 3/4 зданий</text>
  <text x="560" y="232" font-size="8.5" fill="#1F2937" text-anchor="start" font-family="sans-serif">Отсутствие провизии</text>
  <text x="560" y="245" font-size="8.5" fill="#1F2937" text-anchor="start" font-family="sans-serif">19 октября — уход из Москвы</text>
  <text x="560" y="258" font-size="8.5" fill="#1F2937" text-anchor="start" font-family="sans-serif">Кутузов: тактика заманивания</text>
  <text x="560" y="271" font-size="8.5" fill="#1F2937" text-anchor="start" font-family="sans-serif">Переправа через Березину —</text>
  <text x="560" y="284" font-size="8.5" fill="#1F2937" text-anchor="start" font-family="sans-serif">катастрофа для французов</text>
