<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C" />
      <stop offset="100%" style="stop-color:#DC2626" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030" />
    </filter>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626" />
      <stop offset="100%" style="stop-color:#991B1B" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#F3F4F6" />
  <rect width="800" height="70" fill="url(#headerGrad)" />
  <text x="400" y="35" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Действия при пожаре</text>
  <text x="400" y="58" text-anchor="middle" fill="#FEE2E2" font-size="13" font-family="Arial, sans-serif">Эвакуация и вызов экстренных служб</text>
  <rect x="10" y="8" width="50" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.3" />
  <text x="35" y="25" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">ОБЖ</text>
  <rect x="0" y="70" width="800" height="3" fill="#EAB308" />
  <text x="20" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Порядок действий при пожаре</text>
  <line x1="20" y1="99" x2="236" y2="99" stroke="#EA580C" stroke-width="2" />
  <circle cx="32" cy="122" r="12" fill="#EA580C" />
  <text x="32" y="126" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">1</text>
  <text x="50" y="126" fill="#374151" font-size="12" font-family="Arial, sans-serif">Оцените обстановку и не паникуйте</text>
  <circle cx="32" cy="150" r="12" fill="#16A34A" />
  <text x="32" y="154" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <text x="50" y="154" fill="#374151" font-size="12" font-family="Arial, sans-serif">Вызовите пожарную охрану: 101 или 112</text>
  <circle cx="32" cy="178" r="12" fill="#EA580C" />
  <text x="32" y="182" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">3</text>
  <text x="50" y="182" fill="#374151" font-size="12" font-family="Arial, sans-serif">Предупредите окружающих о пожаре</text>
  <circle cx="32" cy="206" r="12" fill="#EA580C" />
  <text x="32" y="210" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">4</text>
  <text x="50" y="210" fill="#374151" font-size="12" font-family="Arial, sans-serif">Попробуйте потушить огонь (если безопасно)</text>
  <circle cx="32" cy="234" r="12" fill="#EA580C" />
  <text x="32" y="238" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">5</text>
  <text x="50" y="238" fill="#374151" font-size="12" font-family="Arial, sans-serif">Эвакуируйтесь по плану эвакуации</text>
  <circle cx="32" cy="262" r="12" fill="#DC2626" />
  <text x="32" y="266" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">6</text>
  <text x="50" y="266" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не пользуйтесь лифтом!</text>
  <circle cx="32" cy="290" r="12" fill="#EA580C" />
  <text x="32" y="294" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">7</text>
  <text x="50" y="294" fill="#374151" font-size="12" font-family="Arial, sans-serif">Прикройте нос и рот влажной тканью</text>
  <circle cx="32" cy="318" r="12" fill="#EA580C" />
  <text x="32" y="322" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">8</text>
  <text x="50" y="322" fill="#374151" font-size="12" font-family="Arial, sans-serif">Двигайтесь пригнувшись или ползком</text>
  <circle cx="32" cy="346" r="12" fill="#EA580C" />
  <text x="32" y="350" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">9</text>
  <text x="50" y="350" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не возвращайтесь в горящее помещение</text>
  <text x="420" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Как звонить в 101/112</text>
  <line x1="420" y1="99" x2="588" y2="99" stroke="#EA580C" stroke-width="2" />
  <rect x="425" y="108" width="350" height="145" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="2" filter="url(#shadow)" />
  <g transform="translate(435,118)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="458" y="130" fill="#374151" font-size="11" font-family="Arial, sans-serif">Назовите: ЧТО горит</text>
  <g transform="translate(435,140)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="458" y="152" fill="#374151" font-size="11" font-family="Arial, sans-serif">Назовите: АДРЕС (улица, дом, квартира)</text>
  <g transform="translate(435,162)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="458" y="174" fill="#374151" font-size="11" font-family="Arial, sans-serif">Назовите: ЕСТЬ ЛИ люди в опасности</text>
  <g transform="translate(435,184)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="458" y="196" fill="#374151" font-size="11" font-family="Arial, sans-serif">Назовите: СВОЁ ИМЯ и фамилию</text>
  <g transform="translate(435,206)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="458" y="218" fill="#374151" font-size="11" font-family="Arial, sans-serif">Ответьте на вопросы диспетчера</text>
  <g transform="translate(435,228)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="458" y="240" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не вешайте трубку первыми!</text>
  <text x="420" y="270" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Если путь в дыму</text>
  <line x1="420" y1="274" x2="548" y2="274" stroke="#EA580C" stroke-width="2" />
  <rect x="425" y="283" width="350" height="120" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2" filter="url(#shadow)" />
  <text x="435" y="303" fill="#DC2626" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Правила движения в дыму:</text>
  <text x="435" y="321" fill="#374151" font-size="11" font-family="Arial, sans-serif">1. Смочите ткань водой и прикройте рот и нос</text>
  <text x="435" y="338" fill="#374151" font-size="11" font-family="Arial, sans-serif">2. Двигайтесь пригнувшись или ползком</text>
  <text x="435" y="355" fill="#374151" font-size="11" font-family="Arial, sans-serif">3. Держитесь за стены для ориентации</text>
  <text x="435" y="372" fill="#374151" font-size="11" font-family="Arial, sans-serif">4. Двигайтесь к выходу против ветра</text>
  <text x="435" y="389" fill="#374151" font-size="11" font-family="Arial, sans-serif">5. Если одежда загорелась — упадите и катитесь</text>
  <text x="435" y="406" fill="#374151" font-size="11" font-family="Arial, sans-serif">6. Не прячьтесь под кровать или в шкаф!</text>
  <text x="20" y="390" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">План эвакуации</text>
  <line x1="20" y1="394" x2="132" y2="394" stroke="#EA580C" stroke-width="2" />
  <rect x="30" y="410" width="360" height="170" rx="4" fill="#FFFFFF" stroke="#374151" stroke-width="2" />
  <rect x="35" y="415" width="350" height="50" rx="3" fill="#DC2626" fill-opacity="0.1" stroke="#DC2626" stroke-width="1" />
  <text x="45" y="445" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">3 этаж</text>
  <text x="200" y="445" fill="#DC2626" font-size="16" font-family="Arial, sans-serif">&gt;&gt;&gt; ВЫХОД</text>
  <rect x="35" y="470" width="350" height="50" rx="3" fill="#EA580C" fill-opacity="0.1" stroke="#EA580C" stroke-width="1" />
  <text x="45" y="500" fill="#EA580C" font-size="11" font-weight="bold" font-family="Arial, sans-serif">2 этаж</text>
  <text x="200" y="500" fill="#EA580C" font-size="16" font-family="Arial, sans-serif">&gt;&gt;&gt; ВЫХОД</text>
  <rect x="35" y="525" width="350" height="50" rx="3" fill="#16A34A" fill-opacity="0.1" stroke="#16A34A" stroke-width="1" />
  <text x="45" y="555" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">1 этаж</text>
  <text x="200" y="555" fill="#16A34A" font-size="16" font-family="Arial, sans-serif">&gt;&gt;&gt; ВЫХОД</text>
  <rect x="320" y="520" width="60" height="25" rx="4" fill="#16A34A" />
  <text x="350" y="537" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">ВЫХОД</text>
  <rect x="420" y="420" width="350" height="78" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" />
  <g>
    <circle cx="433" cy="433" r="8" fill="#DC2626" />
    <text x="433" y="438" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">X</text>
  </g>
  <text x="446" y="438" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ОПАСНО</text>
  <text x="430" y="454" fill="#374151" font-size="11" font-family="Arial, sans-serif">Используйте лестницу, НЕ ЛИФТ</text>
  <text x="430" y="470" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не берите вещи — спасайте жизнь!</text>
  <text x="430" y="486" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не открывайте горящую дверь настежь</text>
  <rect x="420" y="510" width="350" height="78" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
  <g>
    <circle cx="433" cy="523" r="8" fill="#16A34A" />
    <text x="433" y="528" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="446" y="528" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ПРАВИЛЬНО</text>
  <text x="430" y="544" fill="#374151" font-size="11" font-family="Arial, sans-serif">Предупредите соседей</text>
  <text x="430" y="560" fill="#374151" font-size="11" font-family="Arial, sans-serif">Помогите детям и пожилым</text>
  <text x="430" y="576" fill="#374151" font-size="11" font-family="Arial, sans-serif">Встретьте пожарных и укажите путь</text>
</svg>