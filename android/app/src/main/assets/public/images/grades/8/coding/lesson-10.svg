<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <filter id="glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0" />
  <rect x="0" y="70" width="800" height="3" fill="#34D399" />
  <circle cx="45" cy="35" r="25" fill="#1E293B" stroke="#34D399" stroke-width="2" />
  <text x="45" y="42" fill="#34D399" font-size="20" font-weight="bold" text-anchor="middle" font-family="monospace">10</text>
  <text x="85" y="32" fill="white" font-size="22" font-weight="bold">Функции</text>
  <text x="85" y="54" fill="#CBD5E1" font-size="14">def, параметры, return, область видимости, docstrings</text>
  <circle cx="760" cy="35" r="20" fill="#1E293B" stroke="#10B981" stroke-width="1.5" />
  <text x="760" y="42" fill="#10B981" font-size="18" font-weight="bold" text-anchor="middle" font-family="monospace">Py</text>
  <rect x="20" y="85" width="380" height="200" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="85" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="105" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="99" r="5" fill="#EF4444" />
  <circle cx="56" cy="99" r="5" fill="#FBBF24" />
  <circle cx="76" cy="99" r="5" fill="#10B981" />
  <text x="210" y="104" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Функции в Python</text>
  <text x="34" y="129" fill="#64748B" font-size="13" font-family="monospace"># Определение функции</text>
  <text x="34" y="149" fill="#10B981" font-size="13" font-family="monospace">def</text>
  <text x="57.4" y="149" fill="#60A5FA" font-size="13" font-family="monospace"> greet</text>
  <text x="104.19999999999999" y="149" fill="#E2E8F0" font-size="13" font-family="monospace">(name):</text>
  <text x="34" y="169" fill="#F59E0B" font-size="13" font-family="monospace">    &amp;quot;&amp;quot;&amp;quot;Приветствие пользователя&amp;quot;&amp;quot;&amp;quot;</text>
  <text x="34" y="189" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="104.2" y="189" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="112.0" y="189" fill="#F59E0B" font-size="13" font-family="monospace">f</text>
  <text x="119.8" y="189" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Привет, {name}!&amp;quot;</text>
  <text x="252.39999999999998" y="189" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="209" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="229" fill="#60A5FA" font-size="13" font-family="monospace">greet</text>
  <text x="73.0" y="229" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="80.8" y="229" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Алиса&amp;quot;</text>
  <text x="135.4" y="229" fill="#E2E8F0" font-size="13" font-family="monospace">)  </text>
  <text x="158.8" y="229" fill="#64748B" font-size="13" font-family="monospace"># Привет, Алиса!</text>
  <text x="34" y="249" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="269" fill="#64748B" font-size="13" font-family="monospace"># Функция с возвратом</text>
  <text x="34" y="289" fill="#10B981" font-size="13" font-family="monospace">def</text>
  <text x="57.4" y="289" fill="#60A5FA" font-size="13" font-family="monospace"> add</text>
  <text x="88.6" y="289" fill="#E2E8F0" font-size="13" font-family="monospace">(a, b):</text>
  <text x="34" y="309" fill="#10B981" font-size="13" font-family="monospace">    return</text>
  <text x="112.0" y="309" fill="#E2E8F0" font-size="13" font-family="monospace"> a + b</text>
  <text x="34" y="329" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="349" fill="#60A5FA" font-size="13" font-family="monospace">result = add</text>
  <text x="127.6" y="349" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="135.4" y="349" fill="#C084FC" font-size="13" font-family="monospace">3</text>
  <text x="143.20000000000002" y="349" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="158.8" y="349" fill="#C084FC" font-size="13" font-family="monospace">5</text>
  <text x="166.60000000000002" y="349" fill="#E2E8F0" font-size="13" font-family="monospace">)  </text>
  <text x="190.00000000000003" y="349" fill="#64748B" font-size="13" font-family="monospace"># 8</text>
  <rect x="420" y="85" width="360" height="200" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#shadow)" />
  <rect x="420" y="85" width="4" height="200" rx="2" fill="#10B981" />
  <text x="436" y="107" fill="#10B981" font-size="14" font-weight="bold">Типы параметров</text>
  <text x="436" y="125" fill="#CBD5E1" font-size="12">• Обязательные: def f(a, b):</text>
  <text x="436" y="143" fill="#CBD5E1" font-size="12">• По умолчанию: def f(a, b=10):</text>
  <text x="436" y="161" fill="#CBD5E1" font-size="12">• Именованные: f(a=1, b=2)</text>
  <text x="436" y="179" fill="#CBD5E1" font-size="12">• *args — произвольное кол-во</text>
  <text x="436" y="197" fill="#CBD5E1" font-size="12">• **kwargs — именованные аргументы</text>
  <text x="436" y="215" fill="#CBD5E1" font-size="12">• </text>
  <text x="436" y="233" fill="#CBD5E1" font-size="12">• def f(a, b=0, *args, **kwargs):</text>
  <text x="436" y="251" fill="#CBD5E1" font-size="12">•   порядок важен!</text>
  <rect x="20" y="300" width="380" height="150" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="300" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="320" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="314" r="5" fill="#EF4444" />
  <circle cx="56" cy="314" r="5" fill="#FBBF24" />
  <circle cx="76" cy="314" r="5" fill="#10B981" />
  <text x="210" y="319" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Область видимости (scope)</text>
  <text x="34" y="344" fill="#64748B" font-size="13" font-family="monospace"># Область видимости</text>
  <text x="34" y="364" fill="#E2E8F0" font-size="13" font-family="monospace">x = </text>
  <text x="65.2" y="364" fill="#C084FC" font-size="13" font-family="monospace">10</text>
  <text x="80.8" y="364" fill="#64748B" font-size="13" font-family="monospace">  # глобальная</text>
  <text x="34" y="384" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="404" fill="#10B981" font-size="13" font-family="monospace">def</text>
  <text x="57.4" y="404" fill="#60A5FA" font-size="13" font-family="monospace"> my_func</text>
  <text x="119.8" y="404" fill="#E2E8F0" font-size="13" font-family="monospace">():</text>
  <text x="34" y="424" fill="#E2E8F0" font-size="13" font-family="monospace">    x = </text>
  <text x="96.4" y="424" fill="#C084FC" font-size="13" font-family="monospace">20</text>
  <text x="112.0" y="424" fill="#64748B" font-size="13" font-family="monospace">  # локальная</text>
  <text x="34" y="444" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="104.2" y="444" fill="#E2E8F0" font-size="13" font-family="monospace">(x)  </text>
  <text x="143.2" y="444" fill="#64748B" font-size="13" font-family="monospace"># 20 (локальная)</text>
  <text x="34" y="464" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="484" fill="#60A5FA" font-size="13" font-family="monospace">my_func</text>
  <text x="88.6" y="484" fill="#E2E8F0" font-size="13" font-family="monospace">()</text>
  <text x="34" y="504" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="504" fill="#E2E8F0" font-size="13" font-family="monospace">(x)  </text>
  <text x="112.0" y="504" fill="#64748B" font-size="13" font-family="monospace"># 10 (глобальная)</text>
  <text x="420" y="300" fill="#34D399" font-size="13" font-weight="bold">Области видимости:</text>
  <rect x="420" y="315" width="360" height="55" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="2" />
  <text x="430" y="335" fill="#10B981" font-size="11" font-weight="bold">Глобальная область (Global)</text>
  <text x="430" y="355" fill="#CBD5E1" font-size="10" font-weight="normal">x = 10, доступна везде</text>
  <rect x="445" y="375" width="310" height="55" rx="8" fill="#0F172A" stroke="#3B82F6" stroke-width="2" />
  <text x="455" y="395" fill="#3B82F6" font-size="11" font-weight="bold">Локальная область (Local)</text>
  <text x="455" y="415" fill="#CBD5E1" font-size="10" font-weight="normal">x = 20, только внутри функции</text>
  <rect x="470" y="435" width="260" height="40" rx="8" fill="#0F172A" stroke="#8B5CF6" stroke-width="2" />
  <text x="480" y="460" fill="#8B5CF6" font-size="10" font-weight="normal">Встроенная (Built-in): print, len, ...</text>
  <rect x="20" y="465" width="380" height="105" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="465" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="485" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="479" r="5" fill="#EF4444" />
  <circle cx="56" cy="479" r="5" fill="#FBBF24" />
  <circle cx="76" cy="479" r="5" fill="#10B981" />
  <text x="210" y="484" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Docstrings — документация</text>
  <text x="34" y="509" fill="#10B981" font-size="13" font-family="monospace">def</text>
  <text x="57.4" y="509" fill="#60A5FA" font-size="13" font-family="monospace"> calculate_area</text>
  <text x="174.4" y="509" fill="#E2E8F0" font-size="13" font-family="monospace">(radius):</text>
  <text x="34" y="529" fill="#F59E0B" font-size="13" font-family="monospace">    &amp;quot;&amp;quot;&amp;quot;Вычисляет площадь круга.</text>
  <text x="34" y="549" fill="#F59E0B" font-size="13" font-family="monospace">    Args: radius (float): радиус</text>
  <text x="34" y="569" fill="#F59E0B" font-size="13" font-family="monospace">    Returns: float: площадь круга&amp;quot;&amp;quot;&amp;quot;</text>
  <text x="34" y="589" fill="#10B981" font-size="13" font-family="monospace">    import</text>
  <text x="112.0" y="589" fill="#E2E8F0" font-size="13" font-family="monospace"> math</text>
  <text x="34" y="609" fill="#10B981" font-size="13" font-family="monospace">    return</text>
  <text x="112.0" y="609" fill="#C084FC" font-size="13" font-family="monospace"> math.pi * radius**</text>
  <text x="260.2" y="609" fill="#C084FC" font-size="13" font-family="monospace">2</text>
  <rect x="420" y="490" width="360" height="85" rx="8" fill="#0F172A" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)" />
  <rect x="420" y="490" width="4" height="85" rx="2" fill="#F59E0B" />
  <text x="436" y="512" fill="#F59E0B" font-size="14" font-weight="bold">Зачем функции?</text>
  <text x="436" y="530" fill="#CBD5E1" font-size="12">• DRY — Don&amp;apos;t Repeat Yourself</text>
  <text x="436" y="548" fill="#CBD5E1" font-size="12">• Переиспользование кода</text>
  <text x="436" y="566" fill="#CBD5E1" font-size="12">• Читаемость и организация</text>
  <text x="436" y="584" fill="#CBD5E1" font-size="12">• Тестирование по отдельности</text>
  <rect x="0" y="582" width="800" height="18" fill="#334155" rx="0" />
  <text x="400" y="595" fill="#94A3B8" font-size="10" text-anchor="middle">8 класс • Кодирование • Python</text>
</svg>
