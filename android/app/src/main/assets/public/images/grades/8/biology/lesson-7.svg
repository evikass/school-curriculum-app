<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Строение дыхательной системы</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 8</text>
<rect x="20" y="72" width="380" height="410" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="210" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#065F46" font-weight="bold">Органы дыхания</text><path d="M180,120 Q170,120 170,140 L170,170 L220,170 L220,140 Q220,120 210,120 Z" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/><text x="195" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="bold">Носовая полость</text><rect x="188" y="170" width="24" height="30" rx="4" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/><text x="230" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Глотка</text><path d="M185,200 L215,200 L210,240 L190,240 Z" fill="#FECACA" stroke="#EF4444" stroke-width="1.5"/><text x="230" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Гортань</text><line x1="193" y1="215" x2="207" y2="215" stroke="#EF4444" stroke-width="1"/><line x1="193" y1="220" x2="207" y2="220" stroke="#EF4444" stroke-width="1"/><text x="230" y="240" text-anchor="start" font-family="Arial, sans-serif" font-size="7" fill="#6B7280" font-weight="normal">↖ Голосовые связки</text><rect x="190" y="240" width="20" height="80" rx="4" fill="#E0F2FE" stroke="#3B82F6" stroke-width="1.5"/><line x1="190" y1="250" x2="210" y2="250" stroke="#3B82F6" stroke-width="1" opacity="0.5"/><line x1="190" y1="264" x2="210" y2="264" stroke="#3B82F6" stroke-width="1" opacity="0.5"/><line x1="190" y1="278" x2="210" y2="278" stroke="#3B82F6" stroke-width="1" opacity="0.5"/><line x1="190" y1="292" x2="210" y2="292" stroke="#3B82F6" stroke-width="1" opacity="0.5"/><line x1="190" y1="306" x2="210" y2="306" stroke="#3B82F6" stroke-width="1" opacity="0.5"/><text x="230" y="280" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Трахея</text><path d="M195,320 L160,370" stroke="#3B82F6" stroke-width="3" fill="none"/><path d="M205,320 L240,370" stroke="#3B82F6" stroke-width="3" fill="none"/><text x="140" y="355" text-anchor="end" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Левый бронх</text><text x="255" y="355" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Правый бронх</text><ellipse cx="145" cy="390" rx="65" ry="70" fill="#D1FAE5" stroke="#10B981" stroke-width="2" opacity="0.7"/><ellipse cx="255" cy="390" rx="65" ry="70" fill="#D1FAE5" stroke="#10B981" stroke-width="2" opacity="0.7"/><path d="M160,370 L130,400 L110,430" stroke="#059669" stroke-width="1.5" fill="none"/><path d="M130,400 L150,435" stroke="#059669" stroke-width="1" fill="none"/><path d="M240,370 L270,400 L290,430" stroke="#059669" stroke-width="1.5" fill="none"/><path d="M270,400 L250,435" stroke="#059669" stroke-width="1" fill="none"/><text x="145" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Левое</text><text x="145" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">лёгкое</text><text x="255" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Правое</text><text x="255" y="413" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">лёгкое</text><path d="M80,460 Q200,480 320,460" fill="none" stroke="#D97706" stroke-width="2.5" stroke-dasharray="6,3"/><text x="340" y="462" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#D97706" font-weight="normal">Диафрагма</text><rect x="420" y="72" width="365" height="200" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Альвеола — газообмен</text><circle cx="520" cy="185" r="40" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/><path d="M480,175 Q470,185 480,195 Q490,205 510,210 Q530,215 550,210 Q570,205 575,195 Q580,185 570,175 Q560,165 540,162 Q520,158 500,162 Q485,165 480,175" fill="none" stroke="#EF4444" stroke-width="2"/><path d="M485,185 Q510,170 530,185 Q550,200 565,185" fill="none" stroke="#3B82F6" stroke-width="1.5"/><line x1="520" y1="145" x2="520" y2="112" stroke="#059669" stroke-width="1.5"/><circle cx="520" cy="112" r="3" fill="#059669"/><text x="520" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Воздух (O₂)</text><text x="580" y="170" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#3B82F6" font-weight="normal">→ CO₂</text><text x="452" y="170" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="normal">O₂ →</text><text x="580" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#3B82F6" font-weight="normal">Кровь</text><text x="452" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#EF4444" font-weight="normal">Кровь</text><text x="440" y="235" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">300 млн альвеол, площадь ~100 м²</text><text x="440" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Стенка альвеолы — 1 слой клеток</text><text x="440" y="267" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Сурфактант — не даёт спадаться</text><rect x="420" y="285" width="365" height="200" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Механизм дыхания</text><text x="435" y="328" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Вдох (инспирация):</text><text x="435" y="344" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Диафрагма сокращается (опускается)</text><text x="435" y="358" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Мышцы грудной клетки сокращаются</text><text x="435" y="372" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Объём грудной полости ↑</text><text x="435" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Давление в лёгких ↓ → воздух входит</text><text x="435" y="408" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Выдох (экспирация):</text><text x="435" y="424" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Диафрагма расслабляется (поднимается)</text><text x="435" y="438" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Мышцы расслабляются</text><text x="435" y="452" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Объём грудной полости ↓</text><text x="435" y="466" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Давление в лёгких ↑ → воздух выходит</text><rect x="20" y="495" width="765" height="90" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="400" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Жизненная ёмкость лёгких (ЖЁЛ)</text><text x="40" y="538" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">ЖЁЛ = ДО + РОвд + РОвыд</text><text x="40" y="555" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">ДО (дыхательный объём) ≈ 500 мл</text><text x="350" y="538" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">РОвд (резерв вдоха) ≈ 1500 мл</text><text x="350" y="555" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">РОвыд (резерв выдоха) ≈ 1500 мл</text><text x="650" y="538" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">ЖЁЛ ≈ 3500 мл</text><text x="650" y="555" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">Остаточный объём ≈ 1200 мл</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 7</text></svg>