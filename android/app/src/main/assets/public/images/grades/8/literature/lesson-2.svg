  <text x="400" y="32" fontSize="21" fill="#FFFFFF" textAnchor="middle" fontFamily="sans-serif" fontWeight="bold">Роман «Капитанская дочка»</text>
  <text x="400" y="56" fontSize="12" fill="#FEF3C7" textAnchor="middle" fontFamily="sans-serif">А.С. Пушкин — исторический роман о чести и долге</text>
  <rect x="0" y="580" width="800" height="20" fill="#78350F" rx="0" />
  <rect x="0" y="578" width="800" height="2" fill="#D4A017" />
  <text x="400" y="594" fontSize="10" fill="#FEFCE8" textAnchor="middle" fontFamily="sans-serif">8 класс · Литература · Урок 2</text>
  <g>
