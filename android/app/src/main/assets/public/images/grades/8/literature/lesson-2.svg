  <polygon points="150,254 146.0,246.0 154.0,246.0" fill="#A16207" />
  <line x1="220" y1="185" x2="225" y2="254" stroke="#D97706" strokeWidth="1" />
  <polygon points="225,254 220.43226673144068,246.31001867445073 228.4113450993038,245.731824589823" fill="#D97706" />
  <text x="85" y="150" fontSize="8" fill="#A16207" fontFamily="sans-serif">любовь</text>
  <text x="200" y="150" fontSize="8" fill="#A16207" fontFamily="sans-serif">милость</text>
  <text x="50" y="198" fontSize="8" fill="#B91C1C" fontFamily="sans-serif">вражда</text>
  <g>
    <rect x="295" y="82" width="240" height="235" fill="#FEFCE8" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
    <rect x="295" y="82" width="240" height="4" fill="url(#amberGrad)" rx="6" />
    <rect x="295" y="84" width="240" height="2" fill="url(#amberGrad)" />
    <text x="305" y="100" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Основные темы</text>
    <text x="309" y="116" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Честь и достоинство</text>
    <text x="309" y="131" fontSize="11" fill="#78350F" fontFamily="sans-serif">  «Береги честь смолоду»</text>
    <text x="309" y="146" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="309" y="161" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Долг перед Родиной</text>
    <text x="309" y="176" fontSize="11" fill="#78350F" fontFamily="sans-serif">  Верность присяге</text>
    <text x="309" y="191" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="309" y="206" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Любовь и верность</text>
    <text x="309" y="221" fontSize="11" fill="#78350F" fontFamily="sans-serif">  Маша спасает Гринёва</text>
    <text x="309" y="236" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="309" y="251" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Милосердие</text>
    <text x="309" y="266" fontSize="11" fill="#78350F" fontFamily="sans-serif">  Пугачёв помиловал Гринёва</text>
    <text x="309" y="281" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="309" y="296" fontSize="11" fill="#78350F" fontFamily="sans-serif">♦ Народ и власть</text>
    <text x="309" y="311" fontSize="11" fill="#78350F" fontFamily="sans-serif">  Пугачёвщина — бунт</text>
  </g>
  <g>
    <rect x="550" y="82" width="230" height="235" fill="#FFF7ED" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
