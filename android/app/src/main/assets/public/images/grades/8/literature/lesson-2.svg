  <ellipse cx="150" cy="122" rx="55" ry="20" fill="#FEF3C7" stroke="#92400E" strokeWidth="1.5" />
  <text x="150" y="126" fontSize="11" fill="#44260A" textAnchor="middle" fontFamily="sans-serif" fontWeight="bold">Гринёв П.А.</text>
  <ellipse cx="70" cy="168" rx="55" ry="20" fill="#FEFCE8" stroke="#D97706" strokeWidth="1.5" />
  <text x="70" y="172" fontSize="11" fill="#44260A" textAnchor="middle" fontFamily="sans-serif" fontWeight="bold">Маша Миронова</text>
  <ellipse cx="230" cy="168" rx="55" ry="20" fill="#FDE68A" stroke="#B45309" strokeWidth="1.5" />
  <text x="230" y="172" fontSize="11" fill="#44260A" textAnchor="middle" fontFamily="sans-serif" fontWeight="bold">Пугачёв</text>
  <ellipse cx="70" cy="220" rx="55" ry="20" fill="#FFFBEB" stroke="#B91C1C" strokeWidth="1.5" />
  <text x="70" y="224" fontSize="11" fill="#44260A" textAnchor="middle" fontFamily="sans-serif" fontWeight="bold">Швабрин</text>
  <ellipse cx="150" cy="270" rx="60" ry="20" fill="#FEFCE8" stroke="#A16207" strokeWidth="1.5" />
  <text x="150" y="274" fontSize="11" fill="#44260A" textAnchor="middle" fontFamily="sans-serif" fontWeight="bold">Семья Гринёвых</text>
  <ellipse cx="240" cy="270" rx="55" ry="20" fill="#FEF3C7" stroke="#D97706" strokeWidth="1.5" />
  <text x="240" y="274" fontSize="11" fill="#44260A" textAnchor="middle" fontFamily="sans-serif" fontWeight="bold">Екатерина II</text>
  <line x1="120" y1="138" x2="90" y2="152" stroke="#D97706" strokeWidth="1.5" />
