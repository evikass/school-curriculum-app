    <text x="560" y="100" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Структура романа</text>
    <text x="564" y="116" fontSize="11" fill="#78350F" fontFamily="sans-serif">Эпиграф: пословица</text>
    <text x="564" y="131" fontSize="11" fill="#78350F" fontFamily="sans-serif">  «Береги честь смолоду»</text>
    <text x="564" y="146" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="564" y="161" fontSize="11" fill="#78350F" fontFamily="sans-serif">I. Детство Гринёва</text>
    <text x="564" y="176" fontSize="11" fill="#78350F" fontFamily="sans-serif">   Савельич, подарок, дуэль</text>
    <text x="564" y="191" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="564" y="206" fontSize="11" fill="#78350F" fontFamily="sans-serif">II. Служба в крепости</text>
    <text x="564" y="221" fontSize="11" fill="#78350F" fontFamily="sans-serif">   Маша, Швабрин, любовь</text>
    <text x="564" y="236" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="564" y="251" fontSize="11" fill="#78350F" fontFamily="sans-serif">III. Пугачёвский бунт</text>
    <text x="564" y="266" fontSize="11" fill="#78350F" fontFamily="sans-serif">   Захват крепости, суд</text>
    <text x="564" y="281" fontSize="11" fill="#78350F" fontFamily="sans-serif" />
    <text x="564" y="296" fontSize="11" fill="#78350F" fontFamily="sans-serif">IV. Освобождение Маши</text>
    <text x="564" y="311" fontSize="11" fill="#78350F" fontFamily="sans-serif">   Екатерина II, финал</text>
  </g>
  <g>
    <rect x="20" y="328" width="760" height="60" fill="#FEF3C7" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
    <rect x="20" y="328" width="760" height="4" fill="url(#amberGrad)" rx="6" />
    <rect x="20" y="330" width="760" height="2" fill="url(#amberGrad)" />
  </g>
  <text x="400" y="352" fontSize="14" fill="#92400E" textAnchor="middle" fontFamily="sans-serif" fontStyle="italic" fontWeight="bold">«Береги платье снову, а честь смолоду»</text>
  <text x="400" y="372" fontSize="10" fill="#A16207" textAnchor="middle" fontFamily="sans-serif">— Эпиграф к роману (народная пословица)</text>
  <g>
    <rect x="20" y="398" width="380" height="88" fill="#FEFCE8" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
    <rect x="20" y="398" width="380" height="4" fill="url(#amberGrad)" rx="6" />
    <rect x="20" y="400" width="380" height="2" fill="url(#amberGrad)" />
    <text x="30" y="416" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Гринёв — Честь</text>
    <text x="34" y="432" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Верность присяге и долгу</text>
    <text x="34" y="447" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Благородство к врагам</text>
    <text x="34" y="462" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Искренняя любовь к Маше</text>
    <text x="34" y="477" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Честность перед судом</text>
  </g>
  <g>
    <rect x="400" y="398" width="380" height="88" fill="#FFFBEB" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
    <rect x="400" y="398" width="380" height="4" fill="url(#amberGrad)" rx="6" />
    <rect x="400" y="400" width="380" height="2" fill="url(#amberGrad)" />
    <text x="410" y="416" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Швабрин — Бесчестие</text>
    <text x="414" y="432" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Переход на сторону бунта</text>
    <text x="414" y="447" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Клевета и предательство</text>
    <text x="414" y="462" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Насилие над Машей</text>
    <text x="414" y="477" fontSize="11" fill="#78350F" fontFamily="sans-serif">• Утрата человеческого облика</text>
  </g>
  <g>
    <rect x="20" y="496" width="760" height="76" fill="#FFF7ED" stroke="#D97706" strokeWidth="1" rx="6" filter="url(#cardShadow)" />
    <rect x="20" y="496" width="760" height="4" fill="url(#amberGrad)" rx="6" />
    <rect x="20" y="498" width="760" height="2" fill="url(#amberGrad)" />
    <text x="30" y="514" fontSize="13" fill="#92400E" fontFamily="sans-serif" fontWeight="bold">Исторический контекст</text>
    <text x="34" y="530" fontSize="11" fill="#78350F" fontFamily="sans-serif">Крестьянская война 1773–1775 гг. под предводительством Емельяна Пугачёва. Пушкин изучал</text>
    <text x="34" y="545" fontSize="11" fill="#78350F" fontFamily="sans-serif">архивные документы и создал художественное произведение, где переплетаются история и личная</text>
    <text x="34" y="560" fontSize="11" fill="#78350F" fontFamily="sans-serif">судьба. Роман написан в форме мемуаров Петра Гринёва — воспоминания очевидца событий.</text>
  </g>
