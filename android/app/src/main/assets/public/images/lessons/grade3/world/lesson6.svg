<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5"/>
      <stop offset="100%" style="stop-color:#E1BEE7"/>
    </linearGradient>
    <linearGradient id="bone6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#E0E0E0"/>
    </linearGradient>
    <linearGradient id="muscle6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF9A9A"/>
      <stop offset="100%" style="stop-color:#E57373"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg6)"/>

  <!-- Title -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6A1B9A" text-anchor="middle">🦴 Опорно-двигательная система</text>
  <rect x="80" y="38" width="340" height="2" rx="1" fill="#8E24AA" opacity="0.5"/>

  <!-- Skeleton -->
  <g transform="translate(80, 60)">
    <!-- Skull -->
    <ellipse cx="50" cy="25" rx="22" ry="25" fill="url(#bone6)" stroke="#BDBDBD" stroke-width="2">
      <animate attributeName="stroke" values="#BDBDBD;#9E9E9E;#BDBDBD" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <circle cx="42" cy="22" r="4" fill="#BDBDBD"/>
    <circle cx="58" cy="22" r="4" fill="#BDBDBD"/>
    <path d="M42,35 L50,40 L58,35" stroke="#BDBDBD" stroke-width="2" fill="none"/>

    <!-- Spine -->
    <g>
      <rect x="45" y="50" width="10" height="12" rx="2" fill="url(#bone6)" stroke="#BDBDBD">
        <animate attributeName="y" values="50;52;50" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="45" y="64" width="10" height="12" rx="2" fill="url(#bone6)" stroke="#BDBDBD">
        <animate attributeName="y" values="64;66;64" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="45" y="78" width="10" height="12" rx="2" fill="url(#bone6)" stroke="#BDBDBD">
        <animate attributeName="y" values="78;80;78" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="45" y="92" width="10" height="12" rx="2" fill="url(#bone6)" stroke="#BDBDBD">
        <animate attributeName="y" values="92;94;92" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="45" y="106" width="10" height="12" rx="2" fill="url(#bone6)" stroke="#BDBDBD">
        <animate attributeName="y" values="106;108;106" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Ribcage -->
    <path d="M30,65 Q20,70 20,80 Q20,90 30,95" stroke="url(#bone6)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M70,65 Q80,70 80,80 Q80,90 70,95" stroke="url(#bone6)" stroke-width="4" fill="none" stroke-linecap="round"/>
    <line x1="30" y1="70" x2="70" y2="70" stroke="url(#bone6)" stroke-width="3"/>
    <line x1="30" y1="80" x2="70" y2="80" stroke="url(#bone6)" stroke-width="3"/>
    <line x1="30" y1="90" x2="70" y2="90" stroke="url(#bone6)" stroke-width="3"/>

    <!-- Pelvis -->
    <path d="M25,120 Q50,140 75,120" stroke="url(#bone6)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <ellipse cx="30" cy="125" rx="12" ry="8" fill="url(#bone6)" stroke="#BDBDBD"/>
    <ellipse cx="70" cy="125" rx="12" ry="8" fill="url(#bone6)" stroke="#BDBDBD"/>

    <!-- Arms -->
    <rect x="5" y="55" width="8" height="35" rx="4" fill="url(#bone6)" stroke="#BDBDBD"/>
    <rect x="87" y="55" width="8" height="35" rx="4" fill="url(#bone6)" stroke="#BDBDBD"/>
    <circle cx="9" cy="90" r="5" fill="url(#bone6)" stroke="#BDBDBD"/>
    <circle cx="91" cy="90" r="5" fill="url(#bone6)" stroke="#BDBDBD"/>
    <rect x="5" y="95" width="8" height="30" rx="4" fill="url(#bone6)" stroke="#BDBDBD"/>
    <rect x="87" y="95" width="8" height="30" rx="4" fill="url(#bone6)" stroke="#BDBDBD"/>

    <!-- Legs -->
    <rect x="30" y="130" width="10" height="40" rx="5" fill="url(#bone6)" stroke="#BDBDBD"/>
    <rect x="60" y="130" width="10" height="40" rx="5" fill="url(#bone6)" stroke="#BDBDBD"/>
    <circle cx="35" cy="170" r="5" fill="url(#bone6)" stroke="#BDBDBD"/>
    <circle cx="65" cy="170" r="5" fill="url(#bone6)" stroke="#BDBDBD"/>
    <rect x="30" y="175" width="10" height="40" rx="5" fill="url(#bone6)" stroke="#BDBDBD"/>
    <rect x="60" y="175" width="10" height="40" rx="5" fill="url(#bone6)" stroke="#BDBDBD"/>
  </g>

  <!-- Muscle diagram -->
  <g transform="translate(300, 80)">
    <text x="50" y="0" font-family="Arial, sans-serif" font-size="12" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Мышцы</text>
    
    <!-- Body with muscles -->
    <ellipse cx="50" cy="30" rx="18" ry="22" fill="url(#muscle6)" stroke="#C62828" stroke-width="1.5"/>
    
    <!-- Neck muscle -->
    <rect x="42" y="50" width="16" height="15" rx="3" fill="url(#muscle6)" stroke="#C62828"/>
    
    <!-- Torso muscles -->
    <path d="M20,65 L80,65 L85,130 L15,130 Z" fill="url(#muscle6)" stroke="#C62828" stroke-width="1.5"/>
    
    <!-- Pectoral muscles -->
    <ellipse cx="35" cy="80" rx="12" ry="8" fill="#EF5350" opacity="0.5"/>
    <ellipse cx="65" cy="80" rx="12" ry="8" fill="#EF5350" opacity="0.5"/>
    
    <!-- Abs -->
    <rect x="35" y="95" width="12" height="8" rx="2" fill="#EF5350" opacity="0.5"/>
    <rect x="53" y="95" width="12" height="8" rx="2" fill="#EF5350" opacity="0.5"/>
    <rect x="35" y="108" width="12" height="8" rx="2" fill="#EF5350" opacity="0.5"/>
    <rect x="53" y="108" width="12" height="8" rx="2" fill="#EF5350" opacity="0.5"/>
    
    <!-- Arm muscles -->
    <ellipse cx="10" cy="85" rx="8" ry="20" fill="url(#muscle6)" stroke="#C62828"/>
    <ellipse cx="90" cy="85" rx="8" ry="20" fill="url(#muscle6)" stroke="#C62828"/>
    
    <!-- Leg muscles -->
    <ellipse cx="35" cy="160" rx="10" ry="30" fill="url(#muscle6)" stroke="#C62828"/>
    <ellipse cx="65" cy="160" rx="10" ry="30" fill="url(#muscle6)" stroke="#C62828"/>
    
    <!-- Flexing animation -->
    <animateTransform attributeName="transform" type="scale" values="1 1;1.02 1;1 1" dur="1.5s" repeatCount="indefinite"/>
  </g>

  <!-- Info boxes -->
  <g font-family="Arial, sans-serif">
    <rect x="15" y="220" width="140" height="70" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#8E24AA"/>
    <text x="85" y="238" font-size="11" fill="#6A1B9A" text-anchor="middle" font-weight="bold">🦴 Скелет</text>
    <text x="85" y="255" font-size="9" fill="#7B1FA2" text-anchor="middle">• 206 костей</text>
    <text x="85" y="270" font-size="9" fill="#7B1FA2" text-anchor="middle">• Опора тела</text>
    <text x="85" y="285" font-size="9" fill="#7B1FA2" text-anchor="middle">• Защита органов</text>

    <rect x="180" y="220" width="140" height="70" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#C62828"/>
    <text x="250" y="238" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">💪 Мышцы</text>
    <text x="250" y="255" font-size="9" fill="#D32F2F" text-anchor="middle">• 600+ мышц</text>
    <text x="250" y="270" font-size="9" fill="#D32F2F" text-anchor="middle">• Движение</text>
    <text x="250" y="285" font-size="9" fill="#D32F2F" text-anchor="middle">• Защита скелета</text>
  </g>

  <!-- Joint illustration -->
  <g transform="translate(370, 230)">
    <rect x="0" y="0" width="110" height="80" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#8E24AA"/>
    <text x="55" y="18" font-family="Arial, sans-serif" font-size="10" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Сустав</text>
    
    <!-- Joint bones -->
    <ellipse cx="35" cy="45" rx="20" ry="12" fill="url(#bone6)" stroke="#BDBDBD"/>
    <ellipse cx="75" cy="45" rx="20" ry="12" fill="url(#bone6)" stroke="#BDBDBD"/>
    <ellipse cx="55" cy="45" rx="8" ry="6" fill="#90CAF9" stroke="#42A5F5">
      <animate attributeName="rx" values="8;10;8" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <text x="55" y="72" font-family="Arial, sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle">хрящ</text>
  </g>

  <!-- Bottom text -->
  <text x="250" y="340" font-family="Arial, sans-serif" font-size="10" fill="#6A1B9A" text-anchor="middle">
    Кости и мышцы работают вместе для движения
  </text>
</svg>