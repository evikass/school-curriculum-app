<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#7f8c8d" stroke-width="1" rx="3"/>
  
  <!-- Заголовок и класс -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="bold" fill="#2c3e50">ГЕОГРАФИЯ · 11 КЛАСС</text>
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" font-weight="bold" fill="#2c3e50">Урок 1: Понятие вектора в пространстве</text>
  
  <!-- Номер урока -->
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">№1</text>
  
  <!-- Система координат -->
  <g transform="translate(100, 200)">
    <!-- Ось X -->
    <line x1="0" y1="0" x2="150" y2="0" stroke="#34495e" stroke-width="2" marker-end="url(#arrowX)"/>
    <text x="155" y="5" font-family="Arial, sans-serif" font-size="14" fill="#34495e">x</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="-150" stroke="#34495e" stroke-width="2" marker-end="url(#arrowY)"/>
    <text x="5" y="-155" font-family="Arial, sans-serif" font-size="14" fill="#34495e">y</text>
    
    <!-- Ось Z -->
    <line x1="0" y1="0" x2="-50" y2="-50" stroke="#34495e" stroke-width="2" marker-end="url(#arrowZ)"/>
    <text x="-55" y="-55" font-family="Arial, sans-serif" font-size="14" fill="#34495e">z</text>
    
    <!-- Вектор a -->
    <line x1="0" y1="0" x2="80" y2="-60" stroke="#3498db" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <text x="85" y="-65" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2980b9">a</text>
    
    <!-- Вектор b -->
    <line x1="0" y1="0" x2="50" y2="-90" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowRed)"/>
    <text x="55" y="-95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#c0392b">b</text>
    
    <!-- Вектор a+b (сумма) -->
    <line x1="0" y1="0" x2="130" y2="-150" stroke="#2ecc71" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <text x="135" y="-155" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#27ae60">a+b</text>
    
    <!-- Параллелограмм для сложения -->
    <path d="M0,0 L80,-60 L130,-150 L50,-90 Z" fill="none" stroke="#95a5a6" stroke-width="1" stroke-dasharray="4,2"/>
    
    <!-- Точка начала координат -->
    <circle cx="0" cy="0" r="3" fill="#34495e"/>
    <text x="-20" y="15" font-family="Arial, sans-serif" font-size="12" fill="#34495e">O</text>
  </g>
  
  <!-- Определение вектора -->
  <g transform="translate(300, 120)">
    <rect x="0" y="0" width="180" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#2c3e50">Вектор</text>
    <text x="90" y="45" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e">Направленный отрезок</text>
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e">с началом и концом</text>
  </g>
  
  <!-- Формулы -->
  <g transform="translate(50, 280)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">1. Равенство векторов:</text>
    <text x="120" y="0" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">a = b</text>
    
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">2. Сложение векторов:</text>
    <text x="120" y="25" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">a + b = c</text>
    
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">3. Умножение на число:</text>
    <text x="120" y="50" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">λa = b</text>
  </g>
  
  <!-- Примеры умножения на число -->
  <g transform="translate(300, 250)">
    <line x1="0" y1="0" x2="60" y2="-40" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowPurple)"/>
    <text x="65" y="-45" font-family="Arial, sans-serif" font-size="14" fill="#8e44ad">a</text>
    
    <line x1="0" y1="30" x2="120" y2="-80" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="125" y="-85" font-family="Arial, sans-serif" font-size="14" fill="#d68910">2a</text>
    
    <line x1="0" y1="60" x2="-30" y2="20" stroke="#16a085" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <text x="-35" y="25" font-family="Arial, sans-serif" font-size="14" fill="#138d75">-0.5a</text>
    
    <text x="0" y="90" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Примеры умножения на число</text>
  </g>
  
  <!-- Стрелки для маркеров -->
  <defs>
    <marker id="arrowX" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#34495e"/>
    </marker>
    <marker id="arrowY" markerWidth="10" markerHeight="10" refX="3" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,0 L3,9 z" fill="#34495e"/>
    </marker>
    <marker id="arrowZ" markerWidth="10" markerHeight="10" refX="8" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,0 L9,9 z" fill="#34495e"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3498db"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2ecc71"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#9b59b6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#f39c12"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a085"/>
    </marker>
  </defs>
</svg>