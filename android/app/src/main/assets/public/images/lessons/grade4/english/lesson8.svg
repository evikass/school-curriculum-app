<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 8:  Одежда</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Clothes</text>

  
  <!-- Coat hanger rack -->
  <line x1="80" y1="110" x2="420" y2="110" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Hangers and items -->
  <!-- T-shirt -->
  <line x1="130" y1="110" x2="130" y2="130" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M105 150 L120 130 L140 130 L155 150 L145 150 L135 140 L130 145 L125 140 L115 150 Z" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1"/>
  <text x="130" y="172" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">T-shirt</text>
  <!-- Dress -->
  <line x1="220" y1="110" x2="220" y2="125" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M205 140 L215 125 L225 125 L235 140 L240 200 Q220 205 200 200 Z" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1"/>
  <text x="220" y="218" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">dress</text>
  <!-- Jacket -->
  <line x1="310" y1="110" x2="310" y2="125" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M285 145 L300 125 L320 125 L335 145 L330 200 Q310 205 290 200 Z" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="310" y1="130" x2="310" y2="200" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <text x="310" y="218" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">jacket</text>
  <!-- Hat -->
  <line x1="400" y1="110" x2="400" y2="135" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="400" cy="148" rx="28" ry="5" fill="#1a1a1a"/>
  <rect x="380" y="130" width="40" height="20" rx="5" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1"/>
  <text x="400" y="172" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">hat</text>
  <!-- Bottom row - scattered items -->
  <!-- Trousers -->
  <rect x="70" y="240" width="45" height="55" rx="3" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="92" y1="240" x2="92" y2="280" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
  <text x="92" y="310" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">trousers</text>
  <!-- Shoes -->
  <ellipse cx="195" cy="285" rx="25" ry="10" fill="#1a1a1a"/>
  <text x="195" y="310" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">shoes</text>
  <!-- Skirt -->
  <path d="M280 245 L310 245 L320 290 L270 290 Z" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <text x="295" y="310" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">skirt</text>
  <!-- Scarf -->
  <path d="M385 240 Q395 240 405 250 L405 290 L395 290 L395 255 L385 245 Z" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1"/>
  <text x="400" y="310" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">scarf</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>