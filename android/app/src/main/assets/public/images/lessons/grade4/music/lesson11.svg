<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Русские народные инструменты</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Изучаем традиционные русские инструменты</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- balalaika (large) -->
  <polygon points="180,120 170,180 190,260 250,260 270,180 260,120" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- sound holes -->
  <ellipse cx="205" cy="200" rx="12" ry="16" fill="#1a1a1a" opacity="0.3"/>
  <ellipse cx="225" cy="200" rx="12" ry="16" fill="#1a1a1a" opacity="0.3"/>
  <!-- strings -->
  <line x1="210" y1="125" x2="210" y2="255" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
  <line x1="220" y1="125" x2="220" y2="255" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
  <line x1="230" y1="125" x2="230" y2="255" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
  <!-- tuning pegs -->
  <circle cx="205" cy="118" r="3" fill="#1a1a1a"/>
  <circle cx="220" cy="115" r="3" fill="#1a1a1a"/>
  <circle cx="235" cy="118" r="3" fill="#1a1a1a"/>
  <!-- bayan (accordion) -->
  <rect x="310" y="140" width="35" height="100" rx="5" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="345" y="140" width="35" height="100" rx="5" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- bellows in between -->
  <path d="M345,145 L355,150 L345,155 L355,160 L345,165 L355,170 L345,175 L355,180 L345,185 L355,190 L345,195 L355,200 L345,205 L355,210 L345,215 L355,220 L345,225 L355,230 L345,235" stroke="#D4A843" stroke-width="1" fill="none"/>
  <!-- keys on left -->
  <circle cx="322" cy="160" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="332" cy="160" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="322" cy="175" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="332" cy="175" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="322" cy="190" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="332" cy="190" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="322" cy="205" r="3" fill="#FFFFFF" opacity="0.6"/>
  <!-- buttons on right -->
  <circle cx="358" cy="160" r="2.5" fill="#D4A843"/>
  <circle cx="368" cy="160" r="2.5" fill="#D4A843"/>
  <circle cx="358" cy="175" r="2.5" fill="#D4A843"/>
  <circle cx="368" cy="175" r="2.5" fill="#D4A843"/>
  <circle cx="358" cy="190" r="2.5" fill="#D4A843"/>
  <circle cx="368" cy="190" r="2.5" fill="#D4A843"/>
  <circle cx="358" cy="205" r="2.5" fill="#D4A843"/>
  <!-- decorative notes -->
  <text x="280" y="120" font-size="16" fill="#C41E3A" opacity="0.4">&#9835;</text>
  <text x="150" y="110" font-size="14" fill="#D4A843" opacity="0.4">&#9834;</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>