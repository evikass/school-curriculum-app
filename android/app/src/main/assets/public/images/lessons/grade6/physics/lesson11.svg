<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Момент силы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Door with hinge - close to hinge -->
  <rect x="35" y="95" width="145" height="125" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="107" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Близко к петле</text>
  <!-- Door frame -->
  <rect x="50" y="125" width="4" height="80" fill="#8D6E63"/>
  <!-- Door -->
  <rect x="54" y="125" width="60" height="80" rx="1" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
  <!-- Hinge -->
  <circle cx="54" cy="140" r="3" fill="#5D4037"/>
  <circle cx="54" cy="185" r="3" fill="#5D4037"/>
  <!-- Force applied close to hinge -->
  <line x1="80" y1="150" x2="80" y2="130" stroke="#C62828" stroke-width="2"/>
  <polygon points="80,130 77,136 83,136" fill="#C62828"/>
  <text x="86" y="132" font-family="Arial,sans-serif" font-size="7" fill="#C62828">F</text>
  <!-- Distance mark -->
  <line x1="54" y1="120" x2="80" y2="120" stroke="#1565C0" stroke-width="1"/>
  <line x1="54" y1="117" x2="54" y2="123" stroke="#1565C0" stroke-width="0.8"/>
  <line x1="80" y1="117" x2="80" y2="123" stroke="#1565C0" stroke-width="0.8"/>
  <text x="67" y="118" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">d (мал.)</text>
  <!-- Result: hard to open -->
  <text x="107" y="200" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">M мал.</text>
  <text x="107" y="212" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Тяжело открыть!</text>

  <!-- Door with hinge - far from hinge -->
  <rect x="190" y="95" width="145" height="125" rx="4" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="262" y="110" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Далеко от петли</text>
  <!-- Door frame -->
  <rect x="205" y="125" width="4" height="80" fill="#8D6E63"/>
  <!-- Door -->
  <rect x="209" y="125" width="80" height="80" rx="1" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
  <!-- Hinge -->
  <circle cx="209" cy="140" r="3" fill="#5D4037"/>
  <circle cx="209" cy="185" r="3" fill="#5D4037"/>
  <!-- Force applied far from hinge -->
  <line x1="282" y1="150" x2="282" y2="130" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="282,130 279,136 285,136" fill="#2E7D32"/>
  <text x="288" y="132" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">F</text>
  <!-- Distance mark -->
  <line x1="209" y1="120" x2="282" y2="120" stroke="#2E7D32" stroke-width="1"/>
  <line x1="209" y1="117" x2="209" y2="123" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="282" y1="117" x2="282" y2="123" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="245" y="118" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">d (бол.)</text>
  <!-- Result: easy to open -->
  <text x="262" y="200" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">M бол.</text>
  <text x="262" y="212" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Легко открыть!</text>

  <!-- Wrench tightening bolt -->
  <rect x="345" y="95" width="120" height="125" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="405" y="110" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Гаечный ключ</text>
  <!-- Bolt head (center) -->
  <polygon points="405,170 395,164 395,176" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Wrench -->
  <rect x="370" y="166" width="70" height="8" rx="2" fill="none" stroke="#5D4037" stroke-width="2.5"/>
  <!-- Open end of wrench on bolt -->
  <path d="M370,166 L365,164 L365,176 L370,174" fill="none" stroke="#5D4037" stroke-width="2"/>
  <!-- Short wrench -->
  <line x1="440" y1="170" x2="445" y2="170" stroke="#C62828" stroke-width="2"/>
  <polygon points="445,170 441,167 441,173" fill="#C62828"/>
  <text x="440" y="163" font-family="Arial,sans-serif" font-size="6" fill="#C62828">F</text>
  <!-- Short distance label -->
  <line x1="405" y1="182" x2="440" y2="182" stroke="#C62828" stroke-width="0.8"/>
  <text x="422" y="192" font-family="Arial,sans-serif" font-size="6" fill="#C62828">d1 (мал.)</text>
  <!-- Long wrench below -->
  <text x="405" y="203" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Длинный ключ =</text>
  <text x="405" y="213" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">большой момент</text>

  <!-- Formula and seesaw person -->
  <rect x="35" y="200" width="225" height="85" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="147" y="218" font-family="Arial,sans-serif" font-size="11" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Формула момента силы</text>

  <!-- Large formula -->
  <rect x="60" y="225" width="175" height="30" rx="5" fill="white" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="147" y="247" font-family="Arial,sans-serif" font-size="20" fill="#7B1FA2" text-anchor="middle" font-weight="bold">M = F * d</text>

  <text x="147" y="275" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">M (Н*м) - момент силы</text>

  <!-- Person on seesaw illustration -->
  <rect x="270" y="200" width="195" height="85" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="367" y="218" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Пример: качели</text>
  <!-- Fulcrum -->
  <polygon points="367,270 358,280 376,280" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <!-- Beam -->
  <line x1="280" y1="260" x2="455" y2="255" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
  <!-- Person on left (close, heavy) -->
  <circle cx="310" cy="242" r="5" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
  <line x1="310" y1="247" x2="310" y2="258" stroke="#C62828" stroke-width="1.5"/>
  <line x1="310" y1="250" x2="303" y2="255" stroke="#C62828" stroke-width="1.2"/>
  <line x1="310" y1="250" x2="317" y2="255" stroke="#C62828" stroke-width="1.2"/>
  <!-- Person on right (far, light) -->
  <circle cx="430" cy="238" r="5" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
  <line x1="430" y1="243" x2="430" y2="254" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="430" y1="246" x2="423" y2="251" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="430" y1="246" x2="437" y2="251" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Distance labels -->
  <line x1="367" y1="268" x2="310" y2="261" stroke="#C62828" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="367" y1="264" x2="430" y2="258" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="330" y="275" font-family="Arial,sans-serif" font-size="7" fill="#C62828">d1</text>
  <text x="405" y="268" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">d2</text>
  <!-- Equilibrium condition -->
  <text x="367" y="283" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">M1 = M2 при равновесии</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Момент силы</text>
</svg>