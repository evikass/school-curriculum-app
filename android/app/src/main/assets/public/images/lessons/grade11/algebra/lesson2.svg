<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sinGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="cosGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="url(#borderGradient)" stroke-width="3" rx="10" ry="10"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#ecf0f1" stroke-width="1" rx="8" ry="8"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#34495e">Урок 2: Чётность, нечётность, периодичность</text>
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#7f8c8d">№2</text>
  
  <!-- Координатная система -->
  <line x1="100" y1="250" x2="400" y2="250" stroke="#34495e" stroke-width="2"/>
  <line x1="250" y1="100" x2="250" y2="300" stroke="#34495e" stroke-width="2"/>
  <line x1="245" y1="105" x2="255" y2="105" stroke="#34495e" stroke-width="1"/>
  <line x1="245" y1="150" x2="255" y2="150" stroke="#34495e" stroke-width="1"/>
  <line x1="245" y1="200" x2="255" y2="200" stroke="#34495e" stroke-width="1"/>
  <line x1="300" y1="245" x2="300" y2="255" stroke="#34495e" stroke-width="1"/>
  <line x1="350" y1="245" x2="350" y2="255" stroke="#34495e" stroke-width="1"/>
  <line x1="200" y1="245" x2="200" y2="255" stroke="#34495e" stroke-width="1"/>
  <line x1="150" y1="245" x2="150" y2="255" stroke="#34495e" stroke-width="1"/>
  
  <!-- Оси -->
  <text x="260" y="105" font-family="Arial, sans-serif" font-size="12" fill="#34495e">1</text>
  <text x="260" y="155" font-family="Arial, sans-serif" font-size="12" fill="#34495e">0.5</text>
  <text x="260" y="205" font-family="Arial, sans-serif" font-size="12" fill="#34495e">-0.5</text>
  <text x="305" y="270" font-family="Arial, sans-serif" font-size="12" fill="#34495e">π/2</text>
  <text x="355" y="270" font-family="Arial, sans-serif" font-size="12" fill="#34495e">π</text>
  <text x="255" y="270" font-family="Arial, sans-serif" font-size="12" fill="#34495e">-π/2</text>
  <text x="205" y="270" font-family="Arial, sans-serif" font-size="12" fill="#34495e">-π</text>
  
  <text x="410" y="255" font-family="Arial, sans-serif" font-size="14" fill="#34495e">x</text>
  <text x="255" y="90" font-family="Arial, sans-serif" font-size="14" fill="#34495e">y</text>
  <text x="255" y="265" font-family="Arial, sans-serif" font-size="14" fill="#34495e">O</text>
  
  <!-- График sin(x) -->
  <path d="M 100 250 Q 125 200, 150 150 T 200 150 T 250 150 T 300 250 T 350 250 T 400 250" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <path d="M 100 250 Q 125 200, 150 150 T 200 150 T 250 150 T 300 250 T 350 250 T 400 250 L 400 250 L 100 250 Z" fill="url(#sinGradient)" opacity="0.3"/>
  
  <!-- График cos(x) -->
  <path d="M 100 150 T 150 150 T 200 250 T 250 250 T 300 150 T 350 150 T 400 150" fill="none" stroke="#3498db" stroke-width="2"/>
  <path d="M 100 150 T 150 150 T 200 250 T 250 250 T 300 150 T 350 150 T 400 150 L 400 250 L 100 250 Z" fill="url(#cosGradient)" opacity="0.3"/>
  
  <!-- Периодичность обозначения -->
  <line x1="100" y1="300" x2="400" y2="300" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="100" y1="295" x2="100" y2="305" stroke="#95a5a6" stroke-width="2"/>
  <line x1="400" y1="295" x2="400" y2="305" stroke="#95a5a6" stroke-width="2"/>
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#7f8c8d">Основной период T = 2π</text>
  
  <!-- Чётность/Нечётность таблица -->
  <rect x="20" y="100" width="150" height="120" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" ry="5"/>
  <text x="95" y="120" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#2c3e50">Свойства</text>
  
  <text x="30" y="145" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">sin(-x) = -sin(x)</text>
  <text x="30" y="165" font-family="Arial, sans-serif" font-size="12" fill="#34495e">- функция нечётная</text>
  
  <text x="30" y="190" font-family="Arial, sans-serif" font-size="12" fill="#3498db">cos(-x) = cos(x)</text>
  <text x="30" y="210" font-family="Arial, sans-serif" font-size="12" fill="#34495e">- функция чётная</text>
  
  <!-- Формулы периодичности -->
  <rect x="330" y="100" width="150" height="120" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" ry="5"/>
  <text x="405" y="120" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold" fill="#2c3e50">Периодичность</text>
  
  <text x="340" y="145" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">sin(x + 2π) = sin(x)</text>
  <text x="340" y="165" font-family="Arial, sans-serif" font-size="12" fill="#3498db">cos(x + 2π) = cos(x)</text>
  <text x="340" y="190" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6">tan(x + π) = tan(x)</text>
  <text x="340" y="210" font-family="Arial, sans-serif" font-size="12" fill="#34495e">ctg(x + π) = ctg(x)</text>
  
  <!-- Обозначения на графике -->
  <circle cx="100" cy="250" r="3" fill="#e74c3c"/>
  <text x="105" y="245" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">(-π, 0)</text>
  
  <circle cx="250" cy="150" r="3" fill="#e74c3c"/>
  <text x="255" y="145" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">(0, 1)</text>
  
  <circle cx="400" cy="250" r="3" fill="#e74c3c"/>
  <text x="380" y="245" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">(π, 0)</text>
  
  <circle cx="100" cy="150" r="3" fill="#3498db"/>
  <text x="105" y="145" font-family="Arial, sans-serif" font-size="10" fill="#3498db">(-π, 1)</text>
  
  <circle cx="250" cy="250" r="3" fill="#3498db"/>
  <text x="255" y="270" font-family="Arial, sans-serif" font-size="10" fill="#3498db">(0, 1)</text>
  
  <circle cx="400" cy="150" r="3" fill="#3498db"/>
  <text x="380" y="145" font-family="Arial, sans-serif" font-size="10" fill="#3498db">(π, 1)</text>
  
  <!-- Точки симметрии -->
  <circle cx="175" cy="200" r="2" fill="#e67e22"/>
  <line x1="175" y1="200" x2="175" y2="300" stroke="#e67e22" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="175" y="315" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e67e22">π/2</text>
  
  <!-- Стрелки для периодичности -->
  <path d="M 110 280 L 390 280" stroke="#16a085" stroke-width="2" marker-end="url(#arrowhead)" marker-start="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a085"/>
    </marker>
  </defs>
  
  <!-- Дополнительные элементы декора -->
  <circle cx="30" cy="30" r="5" fill="#e74c3c" opacity="0.3"/>
  <circle cx="470" cy="30" r="5" fill="#3498db" opacity="0.3"/>
  <circle cx="30" cy="320" r="5" fill="#9b59b6" opacity="0.3"/>
  <circle cx="470" cy="320" r="5" fill="#16a085" opacity="0.3"/>
</svg>