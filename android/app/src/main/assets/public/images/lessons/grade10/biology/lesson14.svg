<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Органоиды клетки</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 13</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Eukaryotic cell with organelles -->
    <ellipse cx="250" cy="195" rx="220" ry="95" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2"/>
    
    <!-- Nucleus -->
    <ellipse cx="250" cy="195" rx="55" ry="45" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2"/>
    <ellipse cx="250" cy="195" rx="18" ry="13" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
    <text x="250" y="198" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Ядрышко</text>
    <text x="250" y="225" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">Ядро</text>
    
    <!-- Mitochondria -->
    <ellipse cx="120" cy="160" rx="30" ry="14" fill="#81C784" stroke="#2E7D32" stroke-width="1.5" transform="rotate(-20,120,160)"/>
    <path d="M100,158 Q110,152 120,158 Q130,164 140,158" fill="none" stroke="#2E7D32" stroke-width="1"/>
    <text x="120" y="143" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Митохондрия</text>
    
    <!-- ER (rough) -->
    <path d="M330,140 Q360,150 330,160 Q360,170 330,180" fill="none" stroke="#66BB6A" stroke-width="2"/>
    <circle cx="325" cy="148" r="3" fill="#4CAF50"/>
    <circle cx="335" cy="158" r="3" fill="#4CAF50"/>
    <circle cx="325" cy="168" r="3" fill="#4CAF50"/>
    <text x="365" y="163" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">ЭПС</text>
    
    <!-- Golgi -->
    <path d="M370,210 Q390,205 410,210 Q390,215 370,210" fill="none" stroke="#43A047" stroke-width="2"/>
    <path d="M372,218 Q390,213 408,218 Q390,223 372,218" fill="none" stroke="#43A047" stroke-width="2"/>
    <path d="M374,226 Q390,221 406,226 Q390,231 374,226" fill="none" stroke="#43A047" stroke-width="2"/>
    <text x="390" y="240" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Гольджи</text>
    
    <!-- Ribosomes -->
    <circle cx="140" cy="230" r="5" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
    <circle cx="155" cy="235" r="5" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
    <circle cx="170" cy="230" r="5" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
    <text x="155" y="252" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Рибосомы</text>
    
    <!-- Lysosome -->
    <circle cx="100" cy="200" r="14" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1"/>
    <text x="100" y="203" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Лиз</text>
    
    <!-- Cytoskeleton lines -->
    <line x1="180" y1="130" x2="200" y2="150" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="310" y1="240" x2="330" y2="260" stroke="#A5D6A7" stroke-width="1" stroke-dasharray="3,2"/>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Клеточный уровень организации</text>
</svg>