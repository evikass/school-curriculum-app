<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Выбор темы исследования</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Исследовательские проекты</text>
  <!-- Illustration area -->
  <ellipse cx="250" cy="170" rx="45" ry="50" fill="#D4A843" opacity="0.2" stroke="#D4A843" stroke-width="2"/><rect x="232" y="218" width="36" height="18" rx="4" fill="#D4A843" stroke="#8B6914" stroke-width="1.5"/><line x1="232" y1="225" x2="268" y2="225" stroke="#8B6914" stroke-width="1"/><line x1="232" y1="230" x2="268" y2="230" stroke="#8B6914" stroke-width="1"/><text x="250" y="175" text-anchor="middle" font-size="30" fill="#D4A843" font-family="Arial">?</text><!-- Idea sparks --><circle cx="185" cy="140" r="5" fill="#C41E3A" opacity="0.7"/><circle cx="320" cy="145" r="4" fill="#2B4C7E" opacity="0.7"/><circle cx="310" cy="190" r="6" fill="#228B22" opacity="0.7"/><circle cx="195" cy="200" r="4" fill="#D4A843" opacity="0.7"/><circle cx="290" cy="135" r="3" fill="#C41E3A" opacity="0.5"/><text x="250" y="265" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Почему? Как? Что если?</text><text x="250" y="285" text-anchor="middle" font-size="10" fill="#C41E3A" font-family="Arial">Мозговой штурм</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Проектная деятельность</text>
</svg>