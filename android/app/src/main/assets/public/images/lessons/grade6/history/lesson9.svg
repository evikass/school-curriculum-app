<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Александр Невский</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Alexander Nevsky on horseback -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="200" height="200" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Sky -->
    <rect x="3" y="3" width="194" height="60" rx="4" fill="#BBDEFB" opacity="0.3"/>
    <!-- Sun/light behind -->
    <circle cx="160" cy="30" r="25" fill="#F9A825" opacity="0.08"/>
    <!-- Horse -->
    <g transform="translate(30,70)">
      <!-- Horse body -->
      <ellipse cx="50" cy="35" rx="30" ry="15" fill="#8D6E63"/>
      <!-- Horse neck and head -->
      <path d="M75,25 Q90,15 95,25 Q97,30 92,35" fill="#8D6E63"/>
      <circle cx="95" cy="20" r="2" fill="#333"/>
      <!-- Horse ear -->
      <path d="M90,16 L87,8 L92,14" fill="#8D6E63"/>
      <!-- Horse legs (rearing pose) -->
      <line x1="30" y1="48" x2="25" y2="80" stroke="#8D6E63" stroke-width="3.5"/>
      <line x1="40" y1="48" x2="38" y2="80" stroke="#8D6E63" stroke-width="3.5"/>
      <line x1="62" y1="48" x2="70" y2="75" stroke="#8D6E63" stroke-width="3.5"/>
      <line x1="70" y1="45" x2="82" y2="70" stroke="#8D6E63" stroke-width="3.5"/>
      <!-- Hooves -->
      <rect x="21" y="78" width="8" height="4" rx="1" fill="#5D4037"/>
      <rect x="34" y="78" width="8" height="4" rx="1" fill="#5D4037"/>
      <!-- Tail (flowing) -->
      <path d="M20,30 Q8,25 5,40 Q3,50 10,55" stroke="#5D4037" stroke-width="2.5" fill="none"/>
      <!-- Mane -->
      <path d="M78,22 Q75,15 78,10 Q82,15 80,20" stroke="#5D4037" stroke-width="2" fill="none"/>
      <!-- Rider: Alexander Nevsky -->
      <!-- Head -->
      <circle cx="55" cy="8" r="10" fill="#F9A825"/>
      <!-- Helmet -->
      <path d="M45,5 Q47,-8 55,-10 Q63,-8 65,5" fill="#B0BEC5" stroke="#78909C" stroke-width="1"/>
      <!-- Helmet visor -->
      <rect x="48" y="2" width="14" height="3" rx="1" fill="#78909C"/>
      <!-- Chain mail/armor -->
      <rect x="45" y="18" width="20" height="28" rx="3" fill="#90A4AE" stroke="#78909C" stroke-width="0.5"/>
      <!-- Armor detail -->
      <line x1="55" y1="18" x2="55" y2="46" stroke="#78909C" stroke-width="0.3"/>
      <line x1="45" y1="28" x2="65" y2="28" stroke="#78909C" stroke-width="0.3"/>
      <line x1="45" y1="38" x2="65" y2="38" stroke="#78909C" stroke-width="0.3"/>
      <!-- Shield -->
      <ellipse cx="35" cy="32" rx="12" ry="16" fill="#C62828" stroke="#F9A825" stroke-width="1.5"/>
      <!-- Cross on shield -->
      <line x1="35" y1="18" x2="35" y2="46" stroke="#F9A825" stroke-width="2"/>
      <line x1="25" y1="32" x2="45" y2="32" stroke="#F9A825" stroke-width="2"/>
      <!-- Raised sword -->
      <line x1="68" y1="20" x2="80" y2="-10" stroke="#B0BEC5" stroke-width="2.5"/>
      <rect x="77" y="-14" width="8" height="2" rx="1" fill="#F9A825"/>
      <!-- Cape flowing -->
      <path d="M45,20 Q30,35 25,50 Q30,55 40,48" fill="#C62828" opacity="0.6"/>
      <!-- Spear in other hand -->
      <line x1="30" y1="20" x2="5" y2="-5" stroke="#8D6E63" stroke-width="1.5"/>
    </g>
    <!-- Ground -->
    <rect x="0" y="150" width="200" height="50" fill="#8D6E63" opacity="0.1"/>
    <!-- Fallen enemy knights on ground -->
    <circle cx="150" cy="160" r="4" fill="#B0BEC5"/>
    <line x1="145" y1="164" x2="155" y2="170" stroke="#B0BEC5" stroke-width="2"/>
    <circle cx="170" cy="165" r="3.5" fill="#B0BEC5"/>
    <line x1="165" y1="168" x2="175" y2="174" stroke="#B0BEC5" stroke-width="2"/>
    <!-- Text -->
    <text x="100" y="180" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Александр Невский</text>
    <text x="100" y="192" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Святой покровитель России</text>
  </g>

  <!-- Battle on the Ice -->
  <g transform="translate(245,88)">
    <rect x="0" y="0" width="225" height="100" rx="6" fill="#E8F5E9" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Ice field -->
    <rect x="5" y="5" width="215" height="90" rx="4" fill="#E3F2FD" opacity="0.6"/>
    <!-- Ice cracks -->
    <path d="M20,40 L60,35 L100,42 L140,38 L180,45" stroke="#90CAF9" stroke-width="1" fill="none"/>
    <path d="M40,60 L80,55 L120,62 L160,58 L200,60" stroke="#90CAF9" stroke-width="1" fill="none"/>
    <!-- Chudo lake label -->
    <text x="112" y="20" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Ледовое побоище</text>
    <text x="112" y="30" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Чудское озеро, 1242 г.</text>
    <!-- Russian warriors (left) -->
    <rect x="15" y="40" width="50" height="4" fill="#C62828" opacity="0.3"/>
    <circle cx="25" cy="50" r="4" fill="#F9A825"/>
    <rect x="22" y="54" width="6" height="10" rx="1" fill="#C62828" opacity="0.6"/>
    <circle cx="35" cy="50" r="4" fill="#F9A825"/>
    <rect x="32" y="54" width="6" height="10" rx="1" fill="#C62828" opacity="0.6"/>
    <circle cx="45" cy="50" r="4" fill="#F9A825"/>
    <rect x="42" y="54" width="6" height="10" rx="1" fill="#C62828" opacity="0.6"/>
    <circle cx="55" cy="50" r="4" fill="#F9A825"/>
    <rect x="52" y="54" width="6" height="10" rx="1" fill="#C62828" opacity="0.6"/>
    <text x="40" y="75" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Русские войска</text>
    <!-- Teutonic knights (right) -->
    <rect x="160" y="40" width="50" height="4" fill="#B0BEC5" opacity="0.3"/>
    <circle cx="170" cy="50" r="4" fill="#B0BEC5"/>
    <rect x="167" y="54" width="6" height="10" rx="1" fill="#78909C" opacity="0.6"/>
    <circle cx="180" cy="50" r="4" fill="#B0BEC5"/>
    <rect x="177" y="54" width="6" height="10" rx="1" fill="#78909C" opacity="0.6"/>
    <circle cx="190" cy="50" r="4" fill="#B0BEC5"/>
    <rect x="187" y="54" width="6" height="10" rx="1" fill="#78909C" opacity="0.6"/>
    <circle cx="200" cy="50" r="4" fill="#B0BEC5"/>
    <rect x="197" y="54" width="6" height="10" rx="1" fill="#78909C" opacity="0.6"/>
    <text x="185" y="75" font-family="Arial,sans-serif" font-size="6" fill="#78909C" text-anchor="middle">Ливонский орден</text>
    <!-- Crossed swords in center -->
    <line x1="100" y1="35" x2="120" y2="70" stroke="#B0BEC5" stroke-width="2"/>
    <line x1="120" y1="35" x2="100" y2="70" stroke="#C62828" stroke-width="2"/>
    <!-- Knights falling through ice -->
    <circle cx="140" cy="80" r="3" fill="#B0BEC5" opacity="0.5"/>
    <rect x="137" y="83" width="6" height="5" rx="1" fill="#78909C" opacity="0.3"/>
    <path d="M130,88 Q140,92 150,88" stroke="#90CAF9" stroke-width="1" fill="#90CAF9" opacity="0.4"/>
    <!-- Result -->
    <text x="112" y="90" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Тактика: клин копий в центре</text>
  </g>

  <!-- Key achievements -->
  <g transform="translate(245,195)">
    <rect x="0" y="0" width="225" height="93" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
    <text x="112" y="14" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Главные победы</text>

    <rect x="10" y="22" width="100" height="28" rx="3" fill="#1565C0" opacity="0.08"/>
    <text x="60" y="34" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Невская битва</text>
    <text x="60" y="44" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">1240 г. - шведы</text>

    <rect x="115" y="22" width="100" height="28" rx="3" fill="#2E7D32" opacity="0.08"/>
    <text x="165" y="34" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Ледовое побоище</text>
    <text x="165" y="44" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">1242 г. - крестоносцы</text>

    <rect x="10" y="55" width="205" height="28" rx="3" fill="#C62828" opacity="0.08"/>
    <text x="112" y="67" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">Дипломатия с Золотой Ордой</text>
    <text x="112" y="77" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">предотвратил объединение Ордена и монголов</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Александр Невский</text>
</svg>