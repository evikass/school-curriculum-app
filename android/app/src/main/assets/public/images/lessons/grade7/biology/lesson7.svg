<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Корень и побег</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Root system -->
  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#8D6E63" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#8D6E63" font-weight="bold" text-anchor="middle">Корневая система</text>
  <!-- Soil -->
  <rect x="35" y="170" width="200" height="110" rx="3" fill="#D7CCC8" opacity="0.4"/>
  <!-- Stem above ground -->
  <rect x="128" y="110" width="14" height="60" rx="3" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="135" cy="110" r="15" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Taproot -->
  <line x1="135" y1="170" x2="135" y2="270" stroke="#795548" stroke-width="4" stroke-linecap="round"/>
  <line x1="135" y1="200" x2="100" y2="220" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <line x1="135" y1="220" x2="110" y2="245" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <line x1="135" y1="240" x2="165" y2="260" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <line x1="135" y1="200" x2="170" y2="215" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
  <!-- Root tip -->
  <path d="M135,270 L130,278 L140,278 Z" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <text x="165" y="278" font-family="Arial,sans-serif" font-size="7" fill="#E65100">корневой чехлик</text>
  <text x="65" y="195" font-family="Arial,sans-serif" font-size="7" fill="#795548">стержневая</text>

  <!-- Shoot system -->
  <rect x="260" y="90" width="215" height="200" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">Побег</text>
  <!-- Stem -->
  <rect x="360" y="120" width="14" height="150" rx="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Nodes and internodes -->
  <line x1="350" y1="155" x2="384" y2="155" stroke="#2E7D32" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="400" y="158" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">узел</text>
  <line x1="350" y1="200" x2="384" y2="200" stroke="#2E7D32" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="400" y="203" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">узел</text>
  <text x="400" y="180" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">междоузлие</text>
  <!-- Leaves on nodes -->
  <ellipse cx="345" cy="155" rx="18" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="1" transform="rotate(-30,345,155)"/>
  <ellipse cx="389" cy="155" rx="18" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="1" transform="rotate(30,389,155)"/>
  <ellipse cx="345" cy="200" rx="18" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="1" transform="rotate(-30,345,200)"/>
  <ellipse cx="389" cy="200" rx="18" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="1" transform="rotate(30,389,200)"/>
  <!-- Buds -->
  <ellipse cx="350" cy="140" rx="5" ry="7" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
  <ellipse cx="384" cy="140" rx="5" ry="7" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
  <text x="290" y="143" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">почки</text>
  <!-- Flower at top -->
  <circle cx="367" cy="118" r="8" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
  <circle cx="367" cy="118" r="4" fill="#F9A825"/>
  <text x="290" y="118" font-family="Arial,sans-serif" font-size="7" fill="#C62828">цветок</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>