<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8BBD9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#F48FB1;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math4)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#AD1457" text-anchor="middle">✖️ Умножение числа 5</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#E91E63" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#F48FB1" opacity="0.5"/>
  
  <!-- Multiplication table -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif" font-size="13">
    <text x="220" y="0" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle">Таблица умножения на 5</text>
    
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="140" height="25" fill="#F8BBD9" rx="3"/>
      <text x="70" y="18" fill="#880E4F" text-anchor="middle">5 × 1 = 5</text>
      
      <rect x="150" y="0" width="140" height="25" fill="#FCE4EC" rx="3"/>
      <text x="220" y="18" fill="#880E4F" text-anchor="middle">5 × 2 = 10</text>
      
      <rect x="300" y="0" width="140" height="25" fill="#F8BBD9" rx="3"/>
      <text x="370" y="18" fill="#880E4F" text-anchor="middle">5 × 3 = 15</text>
      
      <rect x="0" y="30" width="140" height="25" fill="#FCE4EC" rx="3"/>
      <text x="70" y="48" fill="#880E4F" text-anchor="middle">5 × 4 = 20</text>
      
      <rect x="150" y="30" width="140" height="25" fill="#F8BBD9" rx="3"/>
      <text x="220" y="48" fill="#880E4F" text-anchor="middle">5 × 5 = 25</text>
      
      <rect x="300" y="30" width="140" height="25" fill="#FCE4EC" rx="3"/>
      <text x="370" y="48" fill="#880E4F" text-anchor="middle">5 × 6 = 30</text>
      
      <rect x="0" y="60" width="140" height="25" fill="#F8BBD9" rx="3"/>
      <text x="70" y="78" fill="#880E4F" text-anchor="middle">5 × 7 = 35</text>
      
      <rect x="150" y="60" width="140" height="25" fill="#FCE4EC" rx="3"/>
      <text x="220" y="78" fill="#880E4F" text-anchor="middle">5 × 8 = 40</text>
      
      <rect x="300" y="60" width="140" height="25" fill="#F8BBD9" rx="3"/>
      <text x="370" y="78" fill="#880E4F" text-anchor="middle">5 × 9 = 45</text>
      
      <rect x="150" y="90" width="140" height="25" fill="#FCE4EC" rx="3"/>
      <text x="220" y="108" fill="#880E4F" text-anchor="middle">5 × 10 = 50</text>
    </g>
  </g>
  
  <!-- Hand visual -->
  <g transform="translate(50, 250)">
    <ellipse cx="60" cy="50" rx="55" ry="45" fill="#FFCCBC" stroke="#E64A19" stroke-width="2"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="11" fill="#BF360C" text-anchor="middle">5 пальцев</text>
    <text x="60" y="60" font-family="Arial, sans-serif" font-size="10" fill="#E64A19" text-anchor="middle">на руке!</text>
  </g>
  
  <!-- Tip -->
  <g transform="translate(180, 250)">
    <rect x="0" y="0" width="270" height="55" fill="#FFF8E1" rx="5" stroke="#FFC107"/>
    <text x="135" y="20" font-family="Arial, sans-serif" font-size="11" fill="#E65100" text-anchor="middle">💡 Закономерность!</text>
    <text x="135" y="35" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">Чётное × 5 = оканчивается на 0</text>
    <text x="135" y="48" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">Нечётное × 5 = оканчивается на 5</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>