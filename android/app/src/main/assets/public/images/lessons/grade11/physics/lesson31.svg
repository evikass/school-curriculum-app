<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2C3E50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495E" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2C3E50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">Урок 31: Постулаты Бора. Квантовая модель атома</text>
  <text x="470" y="335" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7F8C8D">№ 31</text>
  
  <!-- Атом водорода -->
  <g transform="translate(100, 200)">
    <!-- Ядро -->
    <circle cx="0" cy="0" r="12" fill="#E74C3C"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">p+</text>
    
    <!-- Орбитали -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#3498DB" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#1ABC9C" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    
    <!-- Электрон -->
    <circle cx="30" cy="0" r="4" fill="#3498DB">
      <animate attributeName="cx" from="30" to="30" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" from="0" to="0" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Уровни энергии -->
    <line x1="-40" y1="30" x2="-40" y2="90" stroke="#95A5A6" stroke-width="1"/>
    <line x1="40" y1="30" x2="40" y2="90" stroke="#95A5A6" stroke-width="1"/>
    <line x1="-40" y1="60" x2="40" y2="60" stroke="#95A5A6" stroke-width="1"/>
    <line x1="-40" y1="90" x2="40" y2="90" stroke="#95A5A6" stroke-width="1"/>
    
    <text x="0" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">Атом водорода</text>
    <text x="0" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">n = 1, 2, 3</text>
  </g>
  
  <!-- Уравнение Шрёдингера -->
  <g transform="translate(300, 100)">
    <rect x="-80" y="-20" width="160" height="60" fill="#ECF0F1" stroke="#34495E" stroke-width="1" rx="5"/>
    <text x="0" y="0" text-anchor="middle" font-family="Times New Roman, serif" font-size="14" fill="#2C3E50">Ĥψ = Eψ</text>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">Уравнение Шрёдингера</text>
  </g>
  
  <!-- Квантовые числа -->
  <g transform="translate(350, 200)">
    <!-- n -->
    <rect x="-60" y="-40" width="50" height="35" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
    <text x="-35" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50">n</text>
    <text x="-35" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4CAF50">главное</text>
    <text x="-35" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">1,2,3...</text>
    
    <!-- l -->
    <rect x="10" y="-40" width="50" height="35" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
    <text x="35" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50">l</text>
    <text x="35" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2196F3">орбитальное</text>
    <text x="35" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">0,...,n-1</text>
    
    <!-- m -->
    <rect x="-60" y="10" width="50" height="35" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
    <text x="-35" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50">m</text>
    <text x="-35" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FF9800">магнитное</text>
    <text x="-35" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">-l,...,+l</text>
    
    <!-- s -->
    <rect x="10" y="10" width="50" height="35" fill="#FCE4EC" stroke="#E91E63" stroke-width="1"/>
    <text x="35" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50">s</text>
    <text x="35" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E91E63">спин</text>
    <text x="35" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">±1/2</text>
  </g>
  
  <!-- Волновая функция -->
  <g transform="translate(100, 280)">
    <path d="M 0,0 Q 25,-20 50,0 T 100,0" fill="none" stroke="#9B59B6" stroke-width="2"/>
    <path d="M 0,10 Q 25,-10 50,10 T 100,10" fill="none" stroke="#3498DB" stroke-width="2"/>
    <path d="M 0,20 Q 25,0 50,20 T 100,20" fill="none" stroke="#1ABC9C" stroke-width="2"/>
    <text x="50" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">Волновая функция ψ</text>
  </g>
  
  <!-- Постулаты Бора -->
  <g transform="translate(250, 280)">
    <rect x="-100" y="-5" width="200" height="70" fill="#F5F5F5" stroke="#BDC3C7" stroke-width="1" rx="3"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">1. Электроны движутся по стационарным орбитам</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">2. E<sub>n</sub> = -13.6/n<sup>2</sup> эВ</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">3. ΔE = hν</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">Постулаты Бора (1913)</text>
  </g>
  
  <!-- Энергетические уровни -->
  <g transform="translate(50, 100)">
    <line x1="0" y1="0" x2="0" y2="120" stroke="#34495E" stroke-width="2"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#34495E" stroke-width="2"/>
    <line x1="-5" y1="30" x2="5" y2="30" stroke="#34495E" stroke-width="2"/>
    <line x1="-5" y1="60" x2="5" y2="60" stroke="#34495E" stroke-width="2"/>
    <line x1="-5" y1="90" x2="5" y2="90" stroke="#34495E" stroke-width="2"/>
    <line x1="-5" y1="120" x2="5" y2="120" stroke="#34495E" stroke-width="2"/>
    
    <text x="-15" y="5" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">n=∞</text>
    <text x="-15" y="35" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">n=3</text>
    <text x="-15" y="65" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">n=2</text>
    <text x="-15" y="95" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">n=1</text>
    
    <!-- Стрелки переходов -->
    <path d="M 10,30 L 10,60" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    <path d="M 10,90 L 10,120" stroke="#E74C3C" stroke-width="1.5" marker-end="url(#arrowhead)"/>
    
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="9" fill="#E74C3C">hν</text>
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="9" fill="#E74C3C">hν</text>
    
    <text x="-40" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">Энергетические</text>
    <text x="-40" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">уровни</text>
  </g>
  
  <!-- Определитель орбиталей -->
  <g transform="translate(300, 180)">
    <rect x="-25" y="-25" width="20" height="20" fill="#E3F2FD" stroke="#2196F3" stroke-width="1"/>
    <rect x="5" y="-25" width="20" height="20" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
    <rect x="-25" y="-5" width="20" height="20" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
    <rect x="5" y="-5" width="20" height="20" fill="#FCE4EC" stroke="#E91E63" stroke-width="1"/>
    
    <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">s, p, d, f</text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">типы орбиталей</text>
  </g>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0.3" />
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
  </defs>
  
  <!-- Дополнительные элементы -->
  <circle cx="400" cy="80" r="15" fill="url(#grad1)" stroke="#3498DB" stroke-width="1"/>
  <text x="400" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">ψ</text>
  
  <text x="50" y="30" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">Квантовая</text>
  <text x="50" y="45" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">механика</text>
</svg>