<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c4d7c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#34495e">Урок 23: Сочетания</text>
  
  <!-- Номер урока -->
  <circle cx="450" cy="30" r="15" fill="url(#grad1)"/>
  <text x="450" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">23</text>
  
  <!-- Секция 1: Определение сочетаний -->
  <text x="30" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Определение сочетаний:</text>
  <text x="30" y="115" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Сочетанием из n элементов по k элементов называется</text>
  <text x="30" y="130" font-family="Arial, sans-serif" font-size="12" fill="#34495e">количество подмножеств мощности k множества мощности n.</text>
  
  <!-- Секция 2: Формула сочетаний -->
  <text x="30" y="160" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Формула сочетаний:</text>
  <rect x="30" y="170" width="120" height="30" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="90" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Cₙᵏ = n!</text>
  <text x="170" y="190" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">/</text>
  <rect x="185" y="170" width="80" height="30" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
  <text x="225" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">k!(n-k)!</text>
  
  <!-- Секция 3: Свойства сочетаний -->
  <text x="30" y="220" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Свойства:</text>
  <circle cx="40" cy="235" r="3" fill="url(#grad2)"/>
  <text x="50" y="240" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Cₙ⁰ = Cₙⁿ = 1</text>
  <circle cx="40" cy="255" r="3" fill="url(#grad2)"/>
  <text x="50" y="260" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Cₙᵏ = Cₙⁿ⁻ᵏ (симметричность)</text>
  <circle cx="40" cy="275" r="3" fill="url(#grad2)"/>
  <text x="50" y="280" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Cₙᵏ + Cₙᵏ⁻¹ = Cₙ₊₁ᵏ (формула Паскаля)</text>
  
  <!-- Секция 4: Треугольник Паскаля -->
  <text x="270" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Треугольник Паскаля:</text>
  
  <!-- Треугольник Паскаля -->
  <g transform="translate(270, 110)">
    <!-- Строка 0 -->
    <rect x="0" y="0" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="15" y="17" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
    
    <!-- Строка 1 -->
    <rect x="0" y="35" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="15" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
    <rect x="40" y="35" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="55" y="52" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
    
    <!-- Строка 2 -->
    <rect x="0" y="70" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="15" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
    <rect x="40" y="70" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="55" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">2</text>
    <rect x="80" y="70" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="95" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
    
    <!-- Строка 3 -->
    <rect x="0" y="105" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="15" y="122" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
    <rect x="40" y="105" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="55" y="122" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">3</text>
    <rect x="80" y="105" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="95" y="122" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">3</text>
    <rect x="120" y="105" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="135" y="122" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
    
    <!-- Строка 4 -->
    <rect x="0" y="140" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="15" y="157" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
    <rect x="40" y="140" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="55" y="157" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">4</text>
    <rect x="80" y="140" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="95" y="157" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">6</text>
    <rect x="120" y="140" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="135" y="157" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">4</text>
    <rect x="160" y="140" width="30" height="25" fill="url(#grad3)" rx="5"/>
    <text x="175" y="157" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">1</text>
  </g>
  
  <!-- Подписи к треугольнику Паскаля -->
  <text x="270" y="285" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">n=0</text>
  <text x="270" y="320" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">k=0 1 2 3 4</text>
  
  <!-- Секция 5: Примеры расчета -->
  <text x="30" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Примеры:</text>
  <rect x="30" y="320" width="100" height="20" fill="#e8f4fd" stroke="#bee5eb" stroke-width="1" rx="3"/>
  <text x="80" y="335" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#0c5460">C⁵₂ = 10</text>
  
  <rect x="140" y="320" width="100" height="20" fill="#fff3cd" stroke="#ffeaa7" stroke-width="1" rx="3"/>
  <text x="190" y="335" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#856404">C⁷₃ = 35</text>
  
  <rect x="250" y="320" width="100" height="20" fill="#d4edda" stroke="#c3e6cb" stroke-width="1" rx="3"/>
  <text x="300" y="335" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#155724">C⁶² = 15</text>
  
  <rect x="360" y="320" width="100" height="20" fill="#f8d7da" stroke="#f5c6cb" stroke-width="1" rx="3"/>
  <text x="410" y="335" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#721c24">C⁸₄ = 70</text>
</svg>