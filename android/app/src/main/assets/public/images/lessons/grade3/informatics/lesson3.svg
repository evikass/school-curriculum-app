<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="folder3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg3)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">📁 Файлы и папки</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#FF9800"/>
  
  <!-- Main Folder Structure -->
  <g transform="translate(50, 70)">
    <!-- Root folder -->
    <g>
      <path d="M0,20 L0,80 Q0,90 10,90 L140,90 Q150,90 150,80 L150,30 L70,30 L60,20 Z" fill="url(#folder3)">
        <animate attributeName="opacity" values="1;0.8;1" dur="3s" repeatCount="indefinite"/>
      </path>
      <text x="75" y="60" font-family="Arial" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">Документы</text>
    </g>
    
    <!-- Subfolders -->
    <g transform="translate(170, 15)">
      <path d="M0,20 L0,70 Q0,80 8,80 L100,80 Q108,80 108,70 L108,30 L50,30 L42,20 Z" fill="#66BB6A">
        <animate attributeName="fill" values="#66BB6A;#81C784;#66BB6A" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <text x="54" y="55" font-family="Arial" font-size="10" fill="#FFF" text-anchor="middle">Рисунки</text>
    </g>
    
    <g transform="translate(170, 100)">
      <path d="M0,20 L0,70 Q0,80 8,80 L100,80 Q108,80 108,70 L108,30 L50,30 L42,20 Z" fill="#42A5F5">
        <animate attributeName="fill" values="#42A5F5;#64B5F6;#42A5F5" dur="3s" repeatCount="indefinite"/>
      </path>
      <text x="54" y="55" font-family="Arial" font-size="10" fill="#FFF" text-anchor="middle">Тексты</text>
    </g>
    
    <g transform="translate(290, 55)">
      <path d="M0,20 L0,70 Q0,80 8,80 L100,80 Q108,80 108,70 L108,30 L50,30 L42,20 Z" fill="#AB47BC">
        <animate attributeName="fill" values="#AB47BC;#BA68C8;#AB47BC" dur="2s" repeatCount="indefinite"/>
      </path>
      <text x="54" y="55" font-family="Arial" font-size="10" fill="#FFF" text-anchor="middle">Музыка</text>
    </g>
  </g>
  
  <!-- File icons -->
  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="40" height="50" fill="#E3F2FD" rx="3" stroke="#2196F3"/>
    <rect x="0" y="0" width="40" height="15" fill="#2196F3" rx="3"/>
    <text x="20" y="30" font-family="Arial" font-size="8" fill="#1565C0" text-anchor="middle">.txt</text>
    
    <rect x="60" y="0" width="40" height="50" fill="#E8F5E9" rx="3" stroke="#4CAF50"/>
    <rect x="60" y="0" width="40" height="15" fill="#4CAF50" rx="3"/>
    <text x="80" y="30" font-family="Arial" font-size="8" fill="#2E7D32" text-anchor="middle">.png</text>
    
    <rect x="120" y="0" width="40" height="50" fill="#FFF3E0" rx="3" stroke="#FF9800"/>
    <rect x="120" y="0" width="40" height="15" fill="#FF9800" rx="3"/>
    <text x="140" y="30" font-family="Arial" font-size="8" fill="#E65100" text-anchor="middle">.doc</text>
    
    <rect x="180" y="0" width="40" height="50" fill="#F3E5F5" rx="3" stroke="#9C27B0"/>
    <rect x="180" y="0" width="40" height="15" fill="#9C27B0" rx="3"/>
    <text x="200" y="30" font-family="Arial" font-size="8" fill="#6A1B9A" text-anchor="middle">.mp3</text>
  </g>
  
  <!-- Info box -->
  <rect x="300" y="250" width="180" height="70" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
  <text x="390" y="275" font-family="Arial" font-size="11" fill="#F57F17" text-anchor="middle" font-weight="bold">Имя файла:</text>
  <text x="390" y="295" font-family="Arial" font-size="10" fill="#FF8F00" text-anchor="middle">имя + расширение</text>
  <text x="390" y="312" font-family="Arial" font-size="9" fill="#FFA000" text-anchor="middle">пример: файл.txt</text>
  
  <!-- Connecting lines -->
  <line x1="200" y1="150" x2="280" y2="170" stroke="#FF9800" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="200" y1="180" x2="280" y2="195" stroke="#2196F3" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="200" y1="195" x2="350" y2="140" stroke="#9C27B0" stroke-width="2" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;8" dur="1s" repeatCount="indefinite"/>
  </line>
</svg>