<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Хромосомная теория</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>
    
    <!-- Chromosome structure -->
    <text x="100" y="100" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Структура хромосомы</text>
    
    <!-- X-shaped chromosome -->
    <path d="M80,115 L95,150 L80,185" fill="none" stroke="#2E7D32" stroke-width="4" stroke-linecap="round"/>
    <path d="M120,115 L105,150 L120,185" fill="none" stroke="#2E7D32" stroke-width="4" stroke-linecap="round"/>
    <!-- Centromere -->
    <ellipse cx="100" cy="150" rx="10" ry="5" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
    <text x="100" y="195" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Центромера</text>
    <text x="100" y="206" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Хроматида</text>
    <text x="75" y="120" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Теломера</text>
    <text x="115" y="120" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Теломера</text>
    
    <!-- DNA in chromosome -->
    <path d="M60,220 C65,215 75,225 80,220 C85,215 90,225 95,220" fill="none" stroke="#1565C0" stroke-width="1.5"/>
    <path d="M60,225 C65,220 75,230 80,225 C85,220 90,230 95,225" fill="none" stroke="#EF5350" stroke-width="1.5"/>
    <text x="78" y="242" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">ДНК + белки</text>
    <text x="78" y="253" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(хроматин)</text>
    
    <!-- Karyotype (right side) -->
    <text x="340" y="100" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Кариотип человека</text>
    <text x="340" y="113" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">2n = 46</text>
    
    <!-- Simplified chromosome pairs -->
    <!-- Row 1 -->
    <line x1="255" y1="125" x2="255" y2="140" stroke="#42A5F5" stroke-width="3"/>
    <line x1="262" y1="125" x2="262" y2="140" stroke="#42A5F5" stroke-width="3"/>
    <line x1="275" y1="125" x2="275" y2="138" stroke="#42A5F5" stroke-width="3"/>
    <line x1="282" y1="125" x2="282" y2="138" stroke="#42A5F5" stroke-width="3"/>
    <line x1="295" y1="125" x2="295" y2="135" stroke="#42A5F5" stroke-width="2.5"/>
    <line x1="302" y1="125" x2="302" y2="135" stroke="#42A5F5" stroke-width="2.5"/>
    <line x1="315" y1="125" x2="315" y2="132" stroke="#42A5F5" stroke-width="2"/>
    <line x1="322" y1="125" x2="322" y2="132" stroke="#42A5F5" stroke-width="2"/>
    <!-- Row 2 -->
    <line x1="255" y1="148" x2="255" y2="160" stroke="#66BB6A" stroke-width="2.5"/>
    <line x1="262" y1="148" x2="262" y2="160" stroke="#66BB6A" stroke-width="2.5"/>
    <line x1="275" y1="148" x2="275" y2="157" stroke="#66BB6A" stroke-width="2.5"/>
    <line x1="282" y1="148" x2="282" y2="157" stroke="#66BB6A" stroke-width="2.5"/>
    <line x1="295" y1="148" x2="295" y2="155" stroke="#66BB6A" stroke-width="2"/>
    <line x1="302" y1="148" x2="302" y2="155" stroke="#66BB6A" stroke-width="2"/>
    <line x1="315" y1="148" x2="315" y2="153" stroke="#66BB6A" stroke-width="2"/>
    <line x1="322" y1="148" x2="322" y2="153" stroke="#66BB6A" stroke-width="2"/>
    <!-- Row 3 -->
    <line x1="335" y1="125" x2="335" y2="130" stroke="#AB47BC" stroke-width="2"/>
    <line x1="342" y1="125" x2="342" y2="130" stroke="#AB47BC" stroke-width="2"/>
    <line x1="355" y1="125" x2="355" y2="128" stroke="#AB47BC" stroke-width="1.5"/>
    <line x1="362" y1="125" x2="362" y2="128" stroke="#AB47BC" stroke-width="1.5"/>
    <line x1="375" y1="125" x2="375" y2="127" stroke="#AB47BC" stroke-width="1.5"/>
    <line x1="382" y1="125" x2="382" y2="127" stroke="#AB47BC" stroke-width="1.5"/>
    <!-- Sex chromosomes -->
    <line x1="395" y1="148" x2="395" y2="162" stroke="#EF5350" stroke-width="3"/>
    <line x1="405" y1="148" x2="405" y2="162" stroke="#EF5350" stroke-width="3"/>
    <text x="400" y="175" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">XX (ж)</text>
    <!-- Male option -->
    <line x1="420" y1="148" x2="420" y2="162" stroke="#EF5350" stroke-width="3"/>
    <line x1="428" y1="150" x2="428" y2="158" stroke="#1565C0" stroke-width="2"/>
    <text x="424" y="175" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">XY (м)</text>
    
    <!-- Crossing over diagram (bottom) -->
    <rect x="180" y="200" width="300" height="90" rx="4" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="330" y="215" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Кроссинговер</text>
    
    <!-- Two homologous chromosomes -->
    <line x1="210" y1="228" x2="210" y2="275" stroke="#EF5350" stroke-width="3"/>
    <line x1="225" y1="228" x2="225" y2="275" stroke="#42A5F5" stroke-width="3"/>
    
    <!-- Cross -->
    <line x1="210" y1="250" x2="225" y2="250" stroke="#333" stroke-width="2"/>
    
    <!-- After crossing -->
    <line x1="260" y1="228" x2="260" y2="250" stroke="#EF5350" stroke-width="3"/>
    <line x1="260" y1="250" x2="260" y2="275" stroke="#42A5F5" stroke-width="3"/>
    <line x1="275" y1="228" x2="275" y2="250" stroke="#42A5F5" stroke-width="3"/>
    <line x1="275" y1="250" x2="275" y2="275" stroke="#EF5350" stroke-width="3"/>
    
    <!-- Labels -->
    <text x="217" y="285" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">До</text>
    <text x="267" y="285" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">После</text>
    <line x1="235" y1="250" x2="255" y2="250" stroke="#555" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="310" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Обмен участками</text>
    <text x="310" y="252" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">между гомологичными</text>
    <text x="310" y="264" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">хромосомами</text>
    <text x="310" y="280" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Рекомбинация генов</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>