<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">
    Урок 19: Применение интеграла в физике
  </text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">
    АЛГЕБРА · 11 КЛАСС
  </text>
  <text x="460" y="25" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">19</text>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2980b9" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#27ae60" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  
  <!-- Раздел 1: Работа -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="140" height="90" fill="none" stroke="#3498db" stroke-width="1.5" rx="5"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2980b9">Работа</text>
    
    <!-- График силы -->
    <line x1="20" y1="70" x2="120" y2="70" stroke="#2c3e50" stroke-width="1"/>
    <line x1="20" y1="30" x2="20" y2="70" stroke="#2c3e50" stroke-width="1"/>
    
    <path d="M 20 60 Q 40 45, 60 50 T 100 40" fill="none" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Штриховка под кривой -->
    <path d="M 20 60 Q 40 45, 60 50 T 100 40 L 100 70 L 20 70 Z" fill="url(#grad2)" opacity="0.3"/>
    
    <!-- Формула работы -->
    <text x="70" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">A = ∫F(x)dx</text>
  </g>
  
  <!-- Раздел 2: Масса -->
  <g transform="translate(190, 80)">
    <rect x="0" y="0" width="140" height="90" fill="none" stroke="#2ecc71" stroke-width="1.5" rx="5"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#27ae60">Масса</text>
    
    <!-- Изображение стержня -->
    <line x1="20" y1="50" x2="120" y2="50" stroke="#34495e" stroke-width="4"/>
    
    <!-- Маркировка точек -->
    <circle cx="20" cy="50" r="3" fill="#e74c3c"/>
    <circle cx="120" cy="50" r="3" fill="#e74c3c"/>
    <text x="20" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">a</text>
    <text x="120" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">b</text>
    
    <!-- Формула массы -->
    <text x="70" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">m = ∫ρ(x)dx</text>
    <text x="70" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">ρ(x) - плотность</text>
  </g>
  
  <!-- Раздел 3: Путь -->
  <g transform="translate(350, 80)">
    <rect x="0" y="0" width="140" height="90" fill="none" stroke="#9b59b6" stroke-width="1.5" rx="5"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8e44ad">Путь</text>
    
    <!-- График скорости -->
    <line x1="20" y1="70" x2="120" y2="70" stroke="#2c3e50" stroke-width="1"/>
    <line x1="20" y1="30" x2="20" y2="70" stroke="#2c3e50" stroke-width="1"/>
    
    <path d="M 20 60 L 40 50 L 60 40 L 80 45 L 100 35" fill="none" stroke="#3498db" stroke-width="2"/>
    
    <!-- Штриховка под кривой -->
    <path d="M 20 60 L 40 50 L 60 40 L 80 45 L 100 35 L 100 70 L 20 70 Z" fill="url(#grad1)" opacity="0.3"/>
    
    <!-- Формула пути -->
    <text x="70" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">S = ∫v(t)dt</text>
  </g>
  
  <!-- Раздел 4: Объем -->
  <g transform="translate(110, 190)">
    <rect x="0" y="0" width="280" height="130" fill="none" stroke="#f39c12" stroke-width="1.5" rx="5"/>
    <text x="140" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#d68910">Объем тела вращения</text>
    
    <!-- Оси координат -->
    <line x1="30" y1="100" x2="250" y2="100" stroke="#2c3e50" stroke-width="1"/>
    <line x1="30" y1="30" x2="30" y2="100" stroke="#2c3e50" stroke-width="1"/>
    
    <!-- Кривая функции -->
    <path d="M 50 90 Q 80 60, 110 50 T 170 40 T 230 45" fill="none" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Элемент вращения -->
    <line x1="100" y1="100" x2="100" y2="55" stroke="#3498db" stroke-width="1" stroke-dasharray="2,2"/>
    <ellipse cx="100" cy="100" rx="2" ry="5" fill="#3498db" opacity="0.5"/>
    <ellipse cx="100" cy="100" rx="2" ry="5" fill="#3498db" opacity="0.3" transform="translate(0, -40)"/>
    
    <!-- Формулы объема -->
    <text x="140" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">V = π∫[f(x)]²dx</text>
    <text x="140" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">(метод дисков)</text>
    <text x="140" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">V = 2π∫x·f(x)dx</text>
    <text x="140" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">(метод цилиндров)</text>
  </g>
  
  <!-- Иконки -->
  <g transform="translate(50, 180)">
    <circle cx="0" cy="0" r="12" fill="#3498db" opacity="0.7"/>
    <path d="M -6 -2 L 0 4 L 6 -6" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <g transform="translate(50, 220)">
    <circle cx="0" cy="0" r="12" fill="#2ecc71" opacity="0.7"/>
    <rect x="-6" y="-4" width="12" height="8" fill="none" stroke="white" stroke-width="2" rx="1"/>
    <line x1="-3" y1="0" x2="3" y2="0" stroke="white" stroke-width="2"/>
  </g>
  
  <g transform="translate(50, 260)">
    <circle cx="0" cy="0" r="12" fill="#e74c3c" opacity="0.7"/>
    <polygon points="0,-6 6,6 -6,6" fill="none" stroke="white" stroke-width="2"/>
    <line x1="0" y1="-2" x2="0" y2="4" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Дополнительные элементы оформления -->
  <circle cx="460" cy="330" r="3" fill="#3498db" opacity="0.5"/>
  <circle cx="450" cy="320" r="2" fill="#2ecc71" opacity="0.5"/>
  <circle cx="470" cy="320" r="2" fill="#e74c3c" opacity="0.5"/>
  
  <!-- Легенда -->
  <g transform="translate(400, 200)">
    <rect x="0" y="0" width="80" height="60" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="40" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">Физические величины</text>
    <line x1="10" y1="25" x2="30" y2="25" stroke="#3498db" stroke-width="2"/>
    <text x="35" y="28" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Сила</text>
    <line x1="10" y1="35" x2="30" y2="35" stroke="#2ecc71" stroke-width="2"/>
    <text x="35" y="38" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Плотность</text>
    <line x1="10" y1="45" x2="30" y2="45" stroke="#e74c3c" stroke-width="2"/>
    <text x="35" y="48" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Скорость</text>
  </g>
</svg>