<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2C3E50" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#3498DB" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2C3E50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#34495E">Урок 15: Звуковые волны</text>
  
  <!-- Номер урока в углу -->
  <rect x="440" y="15" width="40" height="25" fill="#3498DB" rx="5"/>
  <text x="460" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">15</text>
  
  <!-- Источники звука -->
  <text x="50" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Источники звука</text>
  
  <!-- Колокол -->
  <g transform="translate(50, 100)">
    <ellipse cx="25" cy="40" rx="20" ry="25" fill="#E74C3C" stroke="#C0392B" stroke-width="1"/>
    <rect x="20" y="15" width="10" height="10" fill="#34495E"/>
    <path d="M15,10 Q25,5 35,10" fill="none" stroke="#34495E" stroke-width="2"/>
    <text x="25" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Колокол</text>
  </g>
  
  <!-- Гитара -->
  <g transform="translate(120, 100)">
    <path d="M10,20 L10,50 Q10,60 20,60 L30,60 Q40,60 40,50 L40,20 Z" fill="#D35400" stroke="#A04000" stroke-width="1"/>
    <circle cx="25" cy="45" r="5" fill="#7F8C8D"/>
    <line x1="25" y1="20" x2="25" y2="10" stroke="#34495E" stroke-width="1"/>
    <text x="25" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Гитара</text>
  </g>
  
  <!-- Губная гармошка -->
  <g transform="translate(190, 100)">
    <rect x="5" y="20" width="40" height="20" rx="5" fill="#9B59B6" stroke="#8E44AD" stroke-width="1"/>
    <rect x="10" y="25" width="8" height="10" fill="#8E44AD"/>
    <rect x="20" y="25" width="8" height="10" fill="#8E44AD"/>
    <rect x="30" y="25" width="8" height="10" fill="#8E44AD"/>
    <text x="25" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Гармошка</text>
  </g>
  
  <!-- Характеристики звука -->
  <text x="50" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Характеристики звука</text>
  
  <!-- График частота-громкость -->
  <g transform="translate(50, 195)">
    <rect x="0" y="0" width="120" height="80" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <line x1="10" y1="70" x2="110" y2="70" stroke="#34495E" stroke-width="1"/>
    <line x1="10" y1="70" x2="10" y2="10" stroke="#34495E" stroke-width="1"/>
    <path d="M10,60 Q30,30 50,40 T90,20" fill="none" stroke="#E74C3C" stroke-width="2"/>
    <text x="60" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">Частота, Гц</text>
    <text x="5" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50" transform="rotate(-90,5,40)">Громкость</text>
    <text x="60" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">Амплитуда и частота</text>
  </g>
  
  <!-- Тембр -->
  <g transform="translate(190, 195)">
    <rect x="0" y="0" width="120" height="80" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <line x1="10" y1="70" x2="110" y2="70" stroke="#34495E" stroke-width="1"/>
    <line x1="10" y1="70" x2="10" y2="10" stroke="#34495E" stroke-width="1"/>
    <path d="M10,50 Q20,30 30,50 T50,50 T70,50 T90,50 T110,50" fill="none" stroke="#3498DB" stroke-width="1.5"/>
    <path d="M10,55 Q15,45 20,55 T30,55 T40,55 T50,55 T60,55 T70,55 T80,55 T90,55 T100,55 T110,55" fill="none" stroke="#9B59B6" stroke-width="1"/>
    <text x="60" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">Время</text>
    <text x="5" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50" transform="rotate(-90,5,40)">Амплитуда</text>
    <text x="60" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">Тембр</text>
  </g>
  
  <!-- Акустический резонанс -->
  <text x="320" y="85" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Акустический резонанс</text>
  
  <!-- Резонирующая труба -->
  <g transform="translate(320, 100)">
    <rect x="0" y="30" width="120" height="40" fill="none" stroke="#3498DB" stroke-width="2"/>
    <circle cx="60" cy="50" r="5" fill="#E74C3C"/>
    <path d="M5,50 Q30,30 60,50 T115,50" fill="none" stroke="#E74C3C" stroke-width="2" opacity="0.7"/>
    <path d="M5,50 Q30,70 60,50 T115,50" fill="none" stroke="#E74C3C" stroke-width="2" opacity="0.7"/>
    <text x="60" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Резонирующая труба</text>
  </g>
  
  <!-- Формула резонанса -->
  <g transform="translate(320, 195)">
    <rect x="0" y="0" width="150" height="60" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1" rx="5"/>
    <text x="75" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">f = n·c/(2L)</text>
    <text x="75" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">где n = 1,2,3...</text>
    <text x="75" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">f - частота резонанса</text>
    <text x="75" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">L - длина трубы</text>
  </g>
  
  <!-- Схема звуковой волны -->
  <text x="50" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Звуковая волна</text>
  <g transform="translate(50, 305)">
    <line x1="0" y1="15" x2="200" y2="15" stroke="#34495E" stroke-width="1"/>
    <path d="M0,15 Q10,5 20,15 T40,15 T60,15 T80,15 T100,15 T120,15 T140,15 T160,15 T180,15 T200,15" fill="none" stroke="#3498DB" stroke-width="2"/>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">λ</text>
    <text x="90" y="5" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">Амплитуда</text>
    <text x="180" y="30" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">Длина волны</text>
  </g>
  
  <!-- Диаграмма слышимости -->
  <g transform="translate(270, 295)">
    <rect x="0" y="0" width="200" height="35" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <rect x="10" y="15" width="15" height="15" fill="#E74C3C" opacity="0.8"/>
    <rect x="30" y="10" width="15" height="20" fill="#E74C3C" opacity="0.8"/>
    <rect x="50" y="5" width="15" height="25" fill="#E74C3C" opacity="0.8"/>
    <rect x="70" y="8" width="15" height="22" fill="#E74C3C" opacity="0.8"/>
    <rect x="90" y="12" width="15" height="18" fill="#E74C3C" opacity="0.8"/>
    <rect x="110" y="15" width="15" height="15" fill="#E74C3C" opacity="0.8"/>
    <rect x="130" y="18" width="15" height="12" fill="#E74C3C" opacity="0.8"/>
    <rect x="150" y="20" width="15" height="10" fill="#E74C3C" opacity="0.8"/>
    <rect x="170" y="22" width="15" height="8" fill="#E74C3C" opacity="0.8"/>
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">20 Гц - 20 кГц</text>
    <text x="100" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">Диапазон слышимости человека</text>
  </g>
  
  <!-- Градиент для волн -->
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:0.3" />
    </linearGradient>
  </defs>
</svg>