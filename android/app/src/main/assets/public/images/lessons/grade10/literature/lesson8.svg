<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8ddd0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="portraitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c5b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0826d;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGradient)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="8"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#8b4513" stroke-width="1" opacity="0.5"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#2c1810">ЛИТЕРАТУРА · 10 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#3d2817">Уильям Шекспир</text>
  <text x="50" y="35" font-family="Arial, sans-serif" font-size="14" fill="#8b4513">Урок 12</text>
  
  <!-- Портрет Шекспира -->
  <circle cx="120" cy="150" r="45" fill="url(#portraitGradient)" filter="url(#shadow)"/>
  <circle cx="110" cy="140" r="3" fill="#3d2817"/>
  <circle cx="130" cy="140" r="3" fill="#3d2817"/>
  <path d="M100 160 Q120 170 140 160" stroke="#3d2817" stroke-width="2" fill="none"/>
  <rect x="95" y="170" width="50" height="30" rx="5" fill="url(#portraitGradient)"/>
  <text x="120" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3d2817">1564-1616</text>
  
  <!-- Биографическая информация -->
  <rect x="180" y="100" width="150" height="120" rx="5" fill="#f5f0e6" stroke="#8b4513" stroke-width="1" opacity="0.8"/>
  <text x="255" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3d2817">Биография</text>
  <text x="190" y="140" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• Родился в Стратфорде</text>
  <text x="190" y="155" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• Работал в театре "Глобус"</text>
  <text x="190" y="170" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• Написал 38 пьес</text>
  <text x="190" y="185" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• 154 сонета</text>
  <text x="190" y="200" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• Считается величайшим</text>
  <text x="190" y="215" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">  драматургом мира</text>
  
  <!-- Основные произведения -->
  <rect x="340" y="100" width="140" height="120" rx="5" fill="#f5f0e6" stroke="#8b4513" stroke-width="1" opacity="0.8"/>
  <text x="410" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3d2817">Основные трагедии</text>
  <text x="350" y="140" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• Гамлет</text>
  <text x="350" y="155" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• Ромео и Джульетта</text>
  <text x="350" y="170" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• Отелло</text>
  <text x="350" y="185" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• Король Лир</text>
  <text x="350" y="200" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">• Макбет</text>
  
  <!-- Диаграмма "Быть или не быть?" -->
  <rect x="50" y="240" width="400" height="80" rx="5" fill="#e8ddd0" stroke="#8b4513" stroke-width="1" opacity="0.8"/>
  <text x="250" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#3d2817">Философская проблема в "Гамлете"</text>
  
  <!-- Схема выбора -->
  <circle cx="100" cy="290" r="15" fill="#8b4513"/>
  <text x="100" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Быть</text>
  <line x1="115" y1="290" x2="185" y2="290" stroke="#3d2817" stroke-width="2"/>
  <polygon points="185,285 195,290 185,295" fill="#3d2817"/>
  
  <circle cx="250" cy="290" r="15" fill="#8b4513"/>
  <text x="250" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">?</text>
  <line x1="265" y1="290" x2="335" y2="290" stroke="#3d2817" stroke-width="2"/>
  <polygon points="335,285 345,290 335,295" fill="#3d2817"/>
  
  <circle cx="400" cy="290" r="15" fill="#8b4513"/>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Не быть</text>
  
  <!-- Ключевые темы -->
  <text x="150" y="315" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">Месть</text>
  <text x="250" y="315" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">Выбор</text>
  <text x="350" y="315" font-family="Arial, sans-serif" font-size="11" fill="#3d2817">Справедливость</text>
  
  <!-- Декоративные элементы -->
  <path d="M30 30 Q50 20 70 30" stroke="#8b4513" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M430 30 Q450 20 470 30" stroke="#8b4513" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Книжная полка -->
  <rect x="30" y="230" width="15" height="100" fill="#8b4513"/>
  <rect x="455" y="230" width="15" height="100" fill="#8b4513"/>
  
  <!-- Книги на полке -->
  <rect x="35" y="235" width="8" height="15" fill="#a0826d" transform="rotate(-5 39 242)"/>
  <rect x="35" y="255" width="8" height="15" fill="#8b4513" transform="rotate(3 39 262)"/>
  <rect x="35" y="275" width="8" height="15" fill="#654321" transform="rotate(-2 39 282)"/>
  <rect x="35" y="295" width="8" height="15" fill="#a0826d" transform="rotate(4 39 302)"/>
  <rect x="35" y="315" width="8" height="15" fill="#8b4513"/>
  
  <rect x="457" y="235" width="8" height="15" fill="#654321" transform="rotate(5 461 242)"/>
  <rect x="457" y="255" width="8" height="15" fill="#a0826d" transform="rotate(-3 461 262)"/>
  <rect x="457" y="275" width="8" height="15" fill="#8b4513" transform="rotate(2 461 282)"/>
  <rect x="457" y="295" width="8" height="15" fill="#654321" transform="rotate(-4 461 302)"/>
  <rect x="457" y="315" width="8" height="15" fill="#a0826d"/>
  
  <!-- Формула трагедии -->
  <text x="250" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3d2817">Трагедия = Герой + Фатум + Бунт</text>
</svg>