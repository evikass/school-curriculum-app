<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#FFEBEE"/>
  
  <!-- Table -->
  <rect x="20" y="200" width="360" height="80" fill="#8D6E63"/>
  <rect x="20" y="195" width="360" height="10" fill="#A1887F"/>
  
  <!-- Paper pieces being cut -->
  
  <!-- Straight cut -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="60" height="50" fill="#FFF9C4"/>
    <rect x="30" y="0" width="30" height="50" fill="#FFF9C4" stroke="#FBC02D" stroke-width="1"/>
    <!-- Cut line -->
    <line x1="30" y1="0" x2="30" y2="50" stroke="#F44336" stroke-width="2" stroke-dasharray="5,3"/>
    <!-- Scissors -->
    <g transform="translate(30, 25)">
      <circle cx="-12" cy="-8" r="8" fill="none" stroke="#FF5722" stroke-width="3"/>
      <circle cx="-12" cy="8" r="8" fill="none" stroke="#FF5722" stroke-width="3"/>
      <polygon points="0,-6 20,-3 0,6" fill="#78909C"/>
      <circle cx="0" cy="0" r="3" fill="#546E7A"/>
    </g>
    <text x="30" y="75" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">По прямой</text>
  </g>
  
  <!-- Curved cut -->
  <g transform="translate(150, 80)">
    <rect x="0" y="0" width="60" height="50" fill="#B2EBF2"/>
    <path d="M30,0 L60,0 L60,50 L30,50 Q40,25 30,0" fill="#B2EBF2" stroke="#00BCD4" stroke-width="1"/>
    <!-- Cut curve -->
    <path d="M30,0 Q40,25 30,50" stroke="#F44336" stroke-width="2" stroke-dasharray="5,3" fill="none"/>
    <text x="30" y="75" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">По кривой</text>
  </g>
  
  <!-- Shape cut - circle -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="60" height="50" fill="#C8E6C9"/>
    <circle cx="30" cy="25" r="20" fill="#4CAF50"/>
    <!-- Cut circle -->
    <circle cx="30" cy="25" r="20" stroke="#F44336" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
    <text x="30" y="75" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">Фигуры</text>
  </g>
  
  <!-- Safety rules -->
  <g transform="translate(50, 40)">
    <rect x="0" y="0" width="120" height="35" fill="#FFEBEE" stroke="#F44336" stroke-width="2" rx="5"/>
    <text x="60" y="15" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#C62828">⚠️ Правила:</text>
    <text x="60" y="28" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="8" fill="#C62828">Не бегать с ножницами!</text>
  </g>
  
  <!-- Correct scissors grip -->
  <g transform="translate(200, 40)">
    <rect x="0" y="0" width="100" height="35" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="5"/>
    <text x="50" y="15" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#2E7D32">✓ Держи правильно:</text>
    <text x="50" y="28" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="8" fill="#2E7D32">большой палец сверху</text>
  </g>
  
  <!-- Scissors types -->
  
  <!-- Small scissors -->
  <g transform="translate(80, 230)">
    <ellipse cx="-10" cy="-12" r="8" fill="none" stroke="#FF5722" stroke-width="3"/>
    <ellipse cx="-10" cy="2" r="8" fill="none" stroke="#FF5722" stroke-width="3"/>
    <polygon points="0,-6 25,-3 0,6" fill="#78909C"/>
    <circle cx="0" cy="0" r="2" fill="#546E7A"/>
    <text x="5" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Маленькие</text>
  </g>
  
  <!-- School scissors (with rounded ends) -->
  <g transform="translate(180, 230)">
    <ellipse cx="-12" cy="-15" r="10" fill="none" stroke="#2196F3" stroke-width="3"/>
    <ellipse cx="-12" cy="5" r="10" fill="none" stroke="#2196F3" stroke-width="3"/>
    <polygon points="0,-8 35,-4 0,8" fill="#90A4AE"/>
    <circle cx="0" cy="0" r="3" fill="#607D8B"/>
    <!-- Rounded end -->
    <circle cx="35" cy="0" r="5" fill="#B0BEC5"/>
    <text x="10" y="35" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Школьные</text>
  </g>
  
  <!-- Correct hand position -->
  <g transform="translate(300, 210)">
    <!-- Hand outline -->
    <ellipse cx="0" cy="15" rx="20" ry="25" fill="#FFCC80"/>
    <!-- Fingers -->
    <rect x="-18" y="-10" width="6" height="20" fill="#FFCC80" rx="3"/>
    <rect x="-10" y="-18" width="5" height="25" fill="#FFCC80" rx="2"/>
    <rect x="-3" y="-20" width="5" height="28" fill="#FFCC80" rx="2"/>
    <rect x="5" y="-15" width="5" height="22" fill="#FFCC80" rx="2"/>
    
    <!-- Scissors in hand -->
    <g transform="translate(15, 0) scale(0.7)">
      <ellipse cx="0" cy="-10" r="8" fill="none" stroke="#FF5722" stroke-width="2"/>
      <ellipse cx="0" cy="5" r="8" fill="none" stroke="#FF5722" stroke-width="2"/>
      <polygon points="5,-5 25,-2 5,5" fill="#78909C"/>
    </g>
    <text x="5" y="55" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Правильно</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="20" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#1565C0">
    Резание ножницами
  </text>
</svg>