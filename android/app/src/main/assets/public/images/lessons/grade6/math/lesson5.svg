<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Основное свойство дроби</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Fraction bars showing equivalence -->
  <rect x="20" y="88" width="225" height="105" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="132" y="104" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Дробные полосы: эквивалентность</text>
  <line x1="28" y1="108" x2="237" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Bar 1: 1/2 -->
  <text x="38" y="126" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">1/2</text>
  <rect x="50" y="117" width="185" height="14" rx="2" fill="#E0E0E0" stroke="#999" stroke-width="0.5"/>
  <rect x="50" y="117" width="92.5" height="14" rx="2" fill="#1565C0" opacity="0.4"/>
  <line x1="142.5" y1="117" x2="142.5" y2="131" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Bar 2: 2/4 -->
  <text x="38" y="148" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">2/4</text>
  <rect x="50" y="139" width="185" height="14" rx="2" fill="#E0E0E0" stroke="#999" stroke-width="0.5"/>
  <rect x="50" y="139" width="92.5" height="14" rx="2" fill="#C62828" opacity="0.3"/>
  <line x1="96.25" y1="139" x2="96.25" y2="153" stroke="#999" stroke-width="0.5"/>
  <line x1="142.5" y1="139" x2="142.5" y2="153" stroke="#C62828" stroke-width="1"/>
  <line x1="188.75" y1="139" x2="188.75" y2="153" stroke="#999" stroke-width="0.5"/>
  <!-- Bar 3: 3/6 -->
  <text x="38" y="170" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">3/6</text>
  <rect x="50" y="161" width="185" height="14" rx="2" fill="#E0E0E0" stroke="#999" stroke-width="0.5"/>
  <rect x="50" y="161" width="92.5" height="14" rx="2" fill="#2E7D32" opacity="0.3"/>
  <line x1="80.83" y1="161" x2="80.83" y2="175" stroke="#999" stroke-width="0.5"/>
  <line x1="111.67" y1="161" x2="111.67" y2="175" stroke="#2E7D32" stroke-width="1"/>
  <line x1="142.5" y1="161" x2="142.5" y2="175" stroke="#999" stroke-width="0.5"/>
  <line x1="173.33" y1="161" x2="173.33" y2="175" stroke="#999" stroke-width="0.5"/>
  <line x1="204.17" y1="161" x2="204.17" y2="175" stroke="#999" stroke-width="0.5"/>
  <!-- Equals sign -->
  <text x="132" y="188" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">1/2 = 2/4 = 3/6 = 4/8</text>

  <!-- Card 2: Pie charts showing equivalence -->
  <rect x="253" y="88" width="228" height="105" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="367" y="104" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Круговые диаграммы</text>
  <line x1="261" y1="108" x2="473" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Pie 1: 1/2 -->
  <circle cx="300" cy="155" r="28" fill="#E0E0E0" stroke="#999" stroke-width="0.5"/>
  <path d="M300,155 L300,127 A28,28 0 0,1 328,155 Z" fill="#1565C0" opacity="0.4"/>
  <line x1="300" y1="155" x2="300" y2="127" stroke="#999" stroke-width="0.5"/>
  <line x1="300" y1="155" x2="328" y2="155" stroke="#999" stroke-width="0.5"/>
  <text x="300" y="192" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">1/2</text>
  <!-- Equals -->
  <text x="342" y="158" font-family="Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle">=</text>
  <!-- Pie 2: 2/4 -->
  <circle cx="385" cy="155" r="28" fill="#E0E0E0" stroke="#999" stroke-width="0.5"/>
  <path d="M385,155 L385,127 A28,28 0 0,1 413,155 Z" fill="#C62828" opacity="0.35"/>
  <line x1="385" y1="155" x2="385" y2="127" stroke="#999" stroke-width="0.5"/>
  <line x1="385" y1="155" x2="413" y2="155" stroke="#999" stroke-width="0.5"/>
  <line x1="405" y1="131" x2="405" y2="179" stroke="#999" stroke-width="0.5"/>
  <line x1="365" y1="131" x2="365" y2="179" stroke="#999" stroke-width="0.5"/>
  <text x="385" y="192" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">2/4</text>
  <!-- Equals -->
  <text x="430" y="158" font-family="Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle">=</text>
  <!-- Pie 3: 3/6 -->
  <circle cx="462" cy="155" r="20" fill="#E0E0E0" stroke="#999" stroke-width="0.5"/>
  <path d="M462,155 L462,135 A20,20 0 0,1 479,155 Z" fill="#2E7D32" opacity="0.35"/>
  <line x1="462" y1="155" x2="462" y2="135" stroke="#999" stroke-width="0.5"/>
  <line x1="462" y1="155" x2="479" y2="155" stroke="#999" stroke-width="0.5"/>
  <text x="462" y="183" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">3/6</text>

  <!-- Card 3: The rule formula -->
  <rect x="20" y="200" width="460" height="98" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="218" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Основное свойство дроби</text>
  <line x1="28" y1="222" x2="472" y2="222" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Formula box -->
  <rect x="100" y="230" width="300" height="30" rx="5" fill="#2E7D32" opacity="0.06" stroke="#2E7D32" stroke-width="1"/>
  <text x="250" y="250" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">a/b = (a x n) / (b x n)</text>
  <!-- Examples -->
  <rect x="35" y="266" width="130" height="26" rx="4" fill="#1565C0" opacity="0.06"/>
  <text x="100" y="278" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">2/3 = 4/6 = 6/9</text>
  <text x="100" y="289" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">x2, x3</text>
  <rect x="185" y="266" width="130" height="26" rx="4" fill="#C62828" opacity="0.06"/>
  <text x="250" y="278" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">3/4 = 9/12 = 15/20</text>
  <text x="250" y="289" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">x3, x5</text>
  <rect x="335" y="266" width="130" height="26" rx="4" fill="#F9A825" opacity="0.06"/>
  <text x="400" y="278" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle">5/6 = 10/12 = 25/30</text>
  <text x="400" y="289" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">x2, x5</text>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Основное свойство дроби</text>
</svg>