<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#8B4513" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#A0522D" stroke-width="1"/>
  
  <!-- Номер урока -->
  <text x="470" y="25" font-family="Arial, sans-serif" font-size="14" fill="#8B4513" text-anchor="end">Урок 5</text>
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="11" fill="#8B4513" text-anchor="middle">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8B4513" text-anchor="middle">Военные действия 1914-1915</text>
  
  <!-- Восточный фронт - фон карты -->
  <rect x="30" y="70" width="300" height="180" fill="#F5DEB3" opacity="0.5"/>
  
  <!-- Реки -->
  <path d="M 50 150 Q 100 140, 150 160 T 250 180" fill="none" stroke="#4682B4" stroke-width="3"/>
  <path d="M 80 200 Q 130 190, 180 210" fill="none" stroke="#4682B4" stroke-width="2"/>
  
  <!-- Города и позиции армий -->
  <circle cx="80" cy="120" r="4" fill="#8B0000"/>
  <text x="85" y="115" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">Львов</text>
  
  <circle cx="150" cy="140" r="4" fill="#00008B"/>
  <text x="155" y="135" font-family="Arial, sans-serif" font-size="10" fill="#00008B">Перемышль</text>
  
  <circle cx="220" cy="160" r="4" fill="#8B0000"/>
  <text x="225" y="155" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">Тарнополь</text>
  
  <circle cx="180" cy="200" r="4" fill="#00008B"/>
  <text x="185" y="195" font-family="Arial, sans-serif" font-size="10" fill="#00008B">Люблин</text>
  
  <!-- Линии фронта -->
  <path d="M 70 130 L 120 125 L 170 135 L 220 145" fill="none" stroke="#8B0000" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M 90 180 L 140 175 L 190 185" fill="none" stroke="#00008B" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Галицийская битва - стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B0000"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00008B"/>
    </marker>
  </defs>
  
  <path d="M 100 150 L 130 140" fill="none" stroke="#8B0000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 140 150 L 110 160" fill="none" stroke="#00008B" stroke-width="2" marker-end="url(#arrowhead2)"/>
  
  <!-- Легенда -->
  <rect x="350" y="70" width="130" height="100" fill="white" stroke="#8B4513" stroke-width="1"/>
  <text x="415" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B4513" text-anchor="middle">Легенда</text>
  
  <rect x="360" y="100" width="15" height="10" fill="#8B0000"/>
  <text x="380" y="108" font-family="Arial, sans-serif" font-size="10" fill="#333">Австро-венгерские войска</text>
  
  <rect x="360" y="120" width="15" height="10" fill="#00008B"/>
  <text x="380" y="128" font-family="Arial, sans-serif" font-size="10" fill="#333">Русские войска</text>
  
  <line x1="360" y1="145" x2="375" y2="145" stroke="#8B0000" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="380" y="148" font-family="Arial, sans-serif" font-size="10" fill="#333">Фронт</text>
  
  <!-- Хронологическая лента -->
  <rect x="30" y="260" width="440" height="50" fill="#F0E68C" stroke="#8B4513" stroke-width="1"/>
  
  <!-- Даты на хронологической ленте -->
  <text x="50" y="285" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B4513">Август 1914</text>
  <text x="150" y="285" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B4513">Сентябрь 1914</text>
  <text x="250" y="285" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B4513">Май 1915</text>
  <text x="350" y="285" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B4513">Июнь 1915</text>
  
  <!-- События на ленте -->
  <circle cx="60" cy="300" r="3" fill="#8B0000"/>
  <text x="70" y="305" font-family="Arial, sans-serif" font-size="9" fill="#333">Начало Галицийской битвы</text>
  
  <circle cx="170" y="300" r="3" fill="#8B0000"/>
  <text x="180" y="305" font-family="Arial, sans-serif" font-size="9" fill="#333">Победа русских</text>
  
  <circle cx="270" y="300" r="3" fill="#00008B"/>
  <text x="280" y="305" font-family="Arial, sans-serif" font-size="9" fill="#333">Начало отступления</text>
  
  <circle cx="370" y="300" r="3" fill="#00008B"/>
  <text x="380" y="305" font-family="Arial, sans-serif" font-size="9" fill="#333">Завершение отступления</text>
  
  <!-- Портеры командующих -->
  <g transform="translate(30, 100)">
    <circle cx="20" cy="20" r="15" fill="#D2B48C"/>
    <circle cx="20" cy="15" r="5" fill="#000"/>
    <path d="M 15 20 Q 20 25, 25 20 L 25 28 L 15 28 Z" fill="#000"/>
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Брусилов</text>
  </g>
  
  <g transform="translate(350, 120)">
    <circle cx="20" cy="20" r="15" fill="#D2B48C"/>
    <circle cx="20" cy="15" r="5" fill="#000"/>
    <path d="M 15 20 Q 20 25, 25 20 L 25 28 L 15 28 Z" fill="#000"/>
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="8" fill="#333" text-anchor="middle">Конрад</text>
  </g>
  
  <!-- График потерь -->
  <g transform="translate(350, 190)">
    <rect x="0" y="0" width="130" height="80" fill="white" stroke="#8B4513" stroke-width="1"/>
    <text x="65" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#8B4513" text-anchor="middle">Потери в Галиции</text>
    
    <!-- Оси -->
    <line x1="15" y1="65" x2="115" y2="65" stroke="#333" stroke-width="1"/>
    <line x1="15" y1="20" x2="15" y2="65" stroke="#333" stroke-width="1"/>
    
    <!-- Столбцы -->
    <rect x="25" y="40" width="15" height="25" fill="#8B0000" opacity="0.7"/>
    <rect x="45" y="30" width="15" height="35" fill="#00008B" opacity="0.7"/>
    <rect x="65" y="45" width="15" height="20" fill="#8B0000" opacity="0.7"/>
    <rect x="85" y="35" width="15" height="30" fill="#00008B" opacity="0.7"/>
    
    <text x="32" y="75" font-family="Arial, sans-serif" font-size="7" fill="#333" text-anchor="middle">Авг</text>
    <text x="52" y="75" font-family="Arial, sans-serif" font-size="7" fill="#333" text-anchor="middle">Сен</text>
    <text x="72" y="75" font-family="Arial, sans-serif" font-size="7" fill="#333" text-anchor="middle">Окт</text>
    <text x="92" y="75" font-family="Arial, sans-serif" font-size="7" fill="#333" text-anchor="middle">Ноя</text>
    
    <text x="10" y="25" font-family="Arial, sans-serif" font-size="7" fill="#333">тыс.</text>
  </g>
  
  <!-- Участки сражений -->
  <ellipse cx="100" cy="150" rx="30" ry="20" fill="none" stroke="#8B0000" stroke-width="1" opacity="0.5"/>
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="9" fill="#8B0000" text-anchor="middle">Галицийское сражение</text>
  
  <!-- Карта маршрута отступления -->
  <path d="M 200 200 Q 180 180, 160 170 Q 140 160, 120 150" fill="none" stroke="#8B4513" stroke-width="2" stroke-dasharray="3,2" opacity="0.7"/>
  <text x="160" y="185" font-family="Arial, sans-serif" font-size="9" fill="#8B4513" text-anchor="middle">Маршрут отступления</text>
  
  <!-- Надпись о великом отступлении -->
  <rect x="30" y="320" width="200" height="20" fill="#F0E68C" stroke="#8B4513" stroke-width="1" rx="5"/>
  <text x="130" y="335" font-family="Arial, sans-serif" font-size="10" fill="#8B4513" text-anchor="middle">Великое отступление 1915 г.</text>
</svg>