<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#E3F2FD"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#1565C0">
    Аппликация «Домик»
  </text>
  
  <!-- Table -->
  <rect x="20" y="200" width="360" height="80" fill="#8D6E63"/>
  <rect x="20" y="195" width="360" height="10" fill="#A1887F"/>
  
  <!-- Finished house -->
  <g transform="translate(250, 60)">
    <!-- House body (square) -->
    <rect x="0" y="50" width="80" height="70" fill="#FFCC80" stroke="#E65100" stroke-width="2"/>
    
    <!-- Roof (triangle) -->
    <polygon points="0,50 40,0 80,50" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
    
    <!-- Window (square) -->
    <rect x="15" y="70" width="25" height="25" fill="#81D4FA" stroke="#0288D1" stroke-width="2"/>
    <line x1="27.5" y1="70" x2="27.5" y2="95" stroke="#0288D1" stroke-width="2"/>
    <line x1="15" y1="82.5" x2="40" y2="82.5" stroke="#0288D1" stroke-width="2"/>
    
    <!-- Door (rectangle) -->
    <rect x="50" y="85" width="20" height="35" fill="#795548" stroke="#5D4037" stroke-width="2"/>
    <circle cx="65" cy="102" r="2" fill="#FFD600"/>
    
    <!-- Chimney -->
    <rect x="55" y="10" width="15" height="30" fill="#8D6E63"/>
    
    <!-- Smoke -->
    <ellipse cx="62" cy="5" rx="6" ry="4" fill="#ECEFF1" opacity="0.8">
      <animate attributeName="cy" values="5;-5;-15" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.5;0" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Shapes for the house -->
  
  <!-- Square -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="50" height="50" fill="#FFCC80" stroke="#E65100" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="25" y="70" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#E65100">Квадрат</text>
    <text x="25" y="82" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">(стена)</text>
  </g>
  
  <!-- Triangle -->
  <g transform="translate(140, 60)">
    <polygon points="30,0 60,50 0,50" fill="#D32F2F" stroke="#B71C1C" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="30" y="70" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#B71C1C">Треугольник</text>
    <text x="30" y="82" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">(крыша)</text>
  </g>
  
  <!-- Rectangle -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="30" height="50" fill="#795548" stroke="#5D4037" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="15" y="65" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#5D4037">Прямоугольник</text>
    <text x="15" y="77" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">(дверь)</text>
  </g>
  
  <!-- Small square -->
  <g transform="translate(140, 150)">
    <rect x="0" y="0" width="35" height="35" fill="#81D4FA" stroke="#0288D1" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="17.5" y1="0" x2="17.5" y2="35" stroke="#0288D1" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="0" y1="17.5" x2="35" y2="17.5" stroke="#0288D1" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="17" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#0288D1">Квадрат</text>
    <text x="17" y="62" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">(окно)</text>
  </g>
  
  <!-- Tools -->
  <g transform="translate(100, 230)">
    <rect x="0" y="0" width="30" height="25" fill="#FFCC80"/>
    <rect x="40" y="0" width="30" height="25" fill="#EF5350"/>
    <rect x="80" y="0" width="30" height="25" fill="#64B5F6"/>
    <rect x="120" y="0" width="30" height="25" fill="#795548"/>
    <text x="75" y="45" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Бумага для домика</text>
  </g>
  
  <g transform="translate(280, 230)">
    <rect x="0" y="0" width="20" height="30" fill="#4CAF50" rx="3"/>
    <text x="10" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Клей</text>
  </g>
</svg>