<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fca5a5;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fca5a5;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  <rect width="500" height="350" fill="url(#centerGlow)"/>
  
  <!-- Decorative circles -->
  <circle cx="250" cy="175" r="120" fill="none" stroke="#fca5a5" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>
  <circle cx="250" cy="175" r="80" fill="none" stroke="#fca5a5" stroke-width="1.5" opacity="0.6"/>
  <circle cx="250" cy="175" r="40" fill="#fca5a5" opacity="0.3"/>
  
  <!-- Lesson number in center -->
  <text x="250" y="195" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#fee2e2" text-anchor="middle">35</text>
  
  <!-- Chapter label at top -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fee2e2" text-anchor="middle" opacity="0.8">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Lesson title at bottom -->
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fee2e2" text-anchor="middle">Урок 35: Ядерные реакции. Деление и синтез ядер</text>
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5" text-anchor="middle" opacity="0.8">Урок 35 из 35</text>
  
  <!-- Decorative elements based on chapter -->
  <circle cx="240" cy="170" r="14" fill="#fca5a5" opacity="0.8"/><circle cx="265" cy="180" r="14" fill="#fee2e2" opacity="0.8"/><circle cx="250" cy="155" r="14" fill="#fca5a5" opacity="0.8"/><circle cx="235" cy="195" r="14" fill="#fee2e2" opacity="0.8"/><circle cx="260" cy="165" r="14" fill="#fca5a5" opacity="0.8"/>
