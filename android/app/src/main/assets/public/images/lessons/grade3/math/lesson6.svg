<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B2DFDB;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#80CBC4;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math6)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#00695C" text-anchor="middle">➗ Смысл деления</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#009688" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#80CBC4" opacity="0.5"/>
  
  <!-- Division concept -->
  <g transform="translate(50, 80)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="70" fill="#E0F2F1" rx="10" stroke="#009688"/>
    <text x="200" y="25" font-size="14" font-weight="bold" fill="#00695C" text-anchor="middle">Деление — обратное умножению</text>
    <text x="200" y="45" font-size="12" fill="#00796B" text-anchor="middle">3 × 4 = 12 → 12 ÷ 3 = 4 → 12 ÷ 4 = 3</text>
    <text x="200" y="60" font-size="11" fill="#009688" text-anchor="middle">Делимое ÷ Делитель = Частное</text>
  </g>
  
  <!-- Visual example -->
  <g transform="translate(50, 170)">
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00695C" text-anchor="middle">12 конфет ÷ 3 друга = 4 каждому</text>
    
    <!-- Candies divided -->
    <g transform="translate(0, 20)">
      <!-- Person 1 -->
      <circle cx="40" cy="30" r="15" fill="#FF7043"/>
      <text x="40" y="35" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">😊</text>
      <circle cx="25" cy="60" r="10" fill="#E91E63"/>
      <circle cx="45" cy="60" r="10" fill="#E91E63"/>
      <circle cx="35" cy="80" r="10" fill="#E91E63"/>
      <circle cx="55" cy="80" r="10" fill="#E91E63"/>
      
      <!-- Person 2 -->
      <circle cx="140" cy="30" r="15" fill="#FF7043"/>
      <text x="140" y="35" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">😊</text>
      <circle cx="125" cy="60" r="10" fill="#E91E63"/>
      <circle cx="145" cy="60" r="10" fill="#E91E63"/>
      <circle cx="135" cy="80" r="10" fill="#E91E63"/>
      <circle cx="155" cy="80" r="10" fill="#E91E63"/>
      
      <!-- Person 3 -->
      <circle cx="240" cy="30" r="15" fill="#FF7043"/>
      <text x="240" y="35" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">😊</text>
      <circle cx="225" cy="60" r="10" fill="#E91E63"/>
      <circle cx="245" cy="60" r="10" fill="#E91E63"/>
      <circle cx="235" cy="80" r="10" fill="#E91E63"/>
      <circle cx="255" cy="80" r="10" fill="#E91E63"/>
    </g>
  </g>
  
  <!-- Warning -->
  <g transform="translate(280, 200)">
    <rect x="0" y="0" width="170" height="50" fill="#FFEBEE" rx="5" stroke="#F44336"/>
    <text x="85" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C62828" text-anchor="middle">⚠️ Важно!</text>
    <text x="85" y="35" font-family="Arial, sans-serif" font-size="10" fill="#D32F2F" text-anchor="middle">Делить на 0 нельзя!</text>
    <text x="85" y="47" font-family="Arial, sans-serif" font-size="9" fill="#EF5350" text-anchor="middle">Это математическое правило</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>