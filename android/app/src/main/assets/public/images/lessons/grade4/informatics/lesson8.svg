<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Редактирование рисунка</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Графический редактор</text>
  <!-- Illustration area -->
  <rect x="130" y="110" width="100" height="80" rx="2" fill="#87CEEB" opacity="0.4" stroke="#2B4C7E" stroke-width="2" stroke-dasharray="6,3"/><rect x="130" y="110" width="100" height="80" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1"/><rect x="145" y="125" width="30" height="25" fill="#C41E3A" opacity="0.6" rx="2"/><circle cx="200" cy="160" r="15" fill="#D4A843" opacity="0.6"/><!-- Scissors --><polygon points="310,120 330,160 325,165 305,125" fill="#C0C0C0" stroke="#888" stroke-width="1"/><polygon points="315,120 295,160 290,165 310,125" fill="#C0C0C0" stroke="#888" stroke-width="1"/><circle cx="313" cy="125" r="4" fill="#888"/><text x="320" y="185" font-size="10" fill="#1a1a1a" font-family="Arial">Ctrl+X</text><!-- Copy arrows --><rect x="145" y="210" width="80" height="50" rx="3" fill="{CREAM}" stroke="#D4A843" stroke-width="2" stroke-dasharray="5,3"/><line x1="240" y1="235" x2="280" y2="235" stroke="#C41E3A" stroke-width="2" marker-end="url(#ar2)"/><rect x="290" y="210" width="80" height="50" rx="3" fill="{CREAM}" stroke="#2B4C7E" stroke-width="2"/><text x="330" y="240" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Ctrl+V</text><text x="185" y="240" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Ctrl+C</text><defs><marker id="ar2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#C41E3A"/></marker></defs>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
</svg>