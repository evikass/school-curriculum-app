<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Выручка и прибыль</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 11</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">11</text>
  <rect x="20" y="72" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="234" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Выручка (Revenue)</text>
  <text x="28" y="100" class="box-text">TR = P · Q — общая выручка</text>
  <text x="28" y="113" class="box-text">AR = TR/Q = P — средняя</text>
  <text x="28" y="126" class="box-text">MR = ΔTR/ΔQ — предельная</text>
  <text x="28" y="139" class="box-text">При соверш. конкур.: MR = P</text>
  <rect x="260" y="72" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="86" class="box-title">Прибыль (Profit)</text>
  <text x="268" y="100" class="box-text">π = TR − TC — бухгалтерская</text>
  <text x="268" y="113" class="box-text">πэк = TR − TC(эк) — эконом.</text>
  <text x="268" y="126" class="box-text">π &gt; 0 — сверхприбыль</text>
  <text x="268" y="139" class="box-text">π = 0 — нормальная прибыль</text>
  <rect x="20" y="160" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="160" x2="474" y2="160" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="174" class="box-title">Виды прибыли</text>
  <text x="28" y="188" class="box-text">Бухгалтерская = TR − явные издержки    |    Экономическая = TR − (явные + неявные)</text>
  <text x="28" y="201" class="box-text">Нормальная прибыль = неявные издержки (минимальный доход предпринимателя)</text>
  <rect x="20" y="230" width="220" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="230" x2="234" y2="230" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="244" class="box-title">Рентабельность</text>
  <text x="28" y="258" class="box-text">R = π / TC · 100%</text>
  <text x="28" y="271" class="box-text">Рентаб. продаж = π/TR · 100%</text>
  <text x="28" y="284" class="box-text">Рентаб. активов = π/А · 100%</text>
  <text x="28" y="297" class="box-text">Показывает эффективность</text>
  <text x="28" y="310" class="box-text">использования ресурсов</text>
  <rect x="260" y="230" width="220" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="230" x2="474" y2="230" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="244" class="box-title">Точка безубыточности</text>
  <text x="268" y="258" class="box-text">TR = TC → π = 0</text>
  <text x="268" y="271" class="box-text">Q* = FC / (P − AVC)</text>
  <text x="268" y="284" class="box-text">Q &lt; Q* — убыток</text>
  <text x="268" y="297" class="box-text">Q &gt; Q* — прибыль</text>
  <text x="268" y="310" class="box-text">Запас прочности = (Q−Q*)/Q</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>