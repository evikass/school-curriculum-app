<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9e2ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="electronGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81c784;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#388e3c;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="cyclotron">
      <stop offset="0%" style="stop-color:#ffb74d;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:0.9" />
    </radialGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d32f2f" />
    </marker>
    <marker id="arrowheadB" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388e3c" />
    </marker>
    <marker id="arrowheadF" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7b1fa2" />
    </marker>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bg)" />
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#455a64" stroke-width="2" />
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#607d8b" stroke-width="1" />
  
  <!-- Заголовок -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#263238">Сила Лоренца</text>
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#455a64">ФИЗИКА · 11 КЛАСС</text>
  <text x="460" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#455a64">Урок 15</text>
  
  <!-- Основная иллюстрация: электрон в магнитном поле -->
  <g transform="translate(100, 180)">
    <!-- Магнитное поле (вектор B) -->
    <g id="magneticField">
      <rect x="-20" y="-60" width="140" height="120" fill="url(#fieldGrad)" opacity="0.5" />
      <!-- Символы B -->
      <text x="-10" y="-40" font-family="Arial" font-size="14" fill="#388e3c" font-weight="bold">B</text>
      <text x="30" y="-20" font-family="Arial" font-size="14" fill="#388e3c" font-weight="bold">B</text>
      <text x="70" y="0" font-family="Arial" font-size="14" fill="#388e3c" font-weight="bold">B</text>
      <text x="90" y="30" font-family="Arial" font-size="14" fill="#388e3c" font-weight="bold">B</text>
      <text x="20" y="40" font-family="Arial" font-size="14" fill="#388e3c" font-weight="bold">B</text>
      <text x="-10" y="20" font-family="Arial" font-size="14" fill="#388e3c" font-weight="bold">B</text>
    </g>
    
    <!-- Спиральная траектория электрона -->
    <path d="M 0,0 Q 30,-20 60,-10 T 120,0 T 150,20 T 140,60 T 80,80 T 20,70 T -10,40 T -20,0 T 0,-30 T 40,-40 T 80,-30 T 100,0" 
          fill="none" stroke="#1e88e5" stroke-width="2" stroke-dasharray="2,2" />
    
    <!-- Электрон -->
    <circle cx="100" cy="0" r="6" fill="url(#electronGrad)" />
    <text x="100" y="5" text-anchor="middle" font-family="Arial" font-size="8" fill="white">e⁻</text>
    
    <!-- Вектор скорости v -->
    <line x1="100" y1="0" x2="140" y2="-10" stroke="#d32f2f" stroke-width="2" marker-end="url(#arrowhead)" />
    <text x="145" y="-5" font-family="Arial" font-size="12" fill="#d32f2f">v</text>
    
    <!-- Вектор силы F (перпендикулярен v и B) -->
    <line x1="100" y1="0" x2="70" y2="30" stroke="#7b1fa2" stroke-width="2" marker-end="url(#arrowheadF)" />
    <text x="55" y="40" font-family="Arial" font-size="12" fill="#7b1fa2">F</text>
    
    <!-- Угол α между v и B -->
    <path d="M 100,0 L 130,0" stroke="#455a64" stroke-width="1" />
    <path d="M 100,0 L 140,-10" stroke="#455a64" stroke-width="1" />
    <path d="M 110,0 A 10,10 0 0,0 115,-5" fill="none" stroke="#455a64" stroke-width="1" />
    <text x="120" y="-5" font-family="Arial" font-size="10" fill="#455a64">α</text>
  </g>
  
  <!-- Формулы -->
  <text x="320" y="120" font-family="Arial" font-size="12" fill="#263238">F = qvB sin α</text>
  <text x="320" y="140" font-family="Arial" font-size="12" fill="#263238">R = mv/(qB)</text>
  <text x="320" y="160" font-family="Arial" font-size="12" fill="#263238">T = 2πm/(qB)</text>
  
  <!-- Циклотрон -->
  <g transform="translate(100, 280)">
    <text x="50" y="-10" text-anchor="middle" font-family="Arial" font-size="14" fill="#263238" font-weight="bold">Циклотрон</text>
    
    <!-- Деэлектрические камеры -->
    <ellipse cx="50" cy="40" rx="45" ry="30" fill="none" stroke="#ffb74d" stroke-width="2" />
    <ellipse cx="50" cy="40" rx="35" ry="25" fill="none" stroke="#ffb74d" stroke-width="2" />
    
    <!-- Разрез между камерами -->
    <line x1="50" y1="10" x2="50" y2="70" stroke="#f57c00" stroke-width="1" stroke-dasharray="3,3" />
    
    <!-- Источник частиц -->
    <circle cx="50" cy="40" r="3" fill="#f57c00" />
    <text x="50" y="55" text-anchor="middle" font-family="Arial" font-size="8" fill="#f57c00">источник</text>
    
    <!-- Электроды -->
    <text x="10" y="40" font-family="Arial" font-size="10" fill="#f57c00">+</text>
    <text x="85" y="40" font-family="Arial" font-size="10" fill="#f57c00">−</text>
    
    <!-- Траектория частицы -->
    <path d="M 50,40 Q 80,30 90,40 T 95,50 T 90,60 T 80,70 T 60,75 T 40,70 T 20,60 T 15,50 T 20,40 T 30,35 T 40,30 T 50,25" 
          fill="none" stroke="#1e88e5" stroke-width="1.5" stroke-dasharray="2,2" />
  </g>
  
  <!-- Масс-спектрометр -->
  <g transform="translate(280, 220)">
    <text x="60" y="-10" text-anchor="middle" font-family="Arial" font-size="14" fill="#263238" font-weight="bold">Масс-спектрометр</text>
    
    <!-- Камера ионизации -->
    <rect x="0" y="20" width="30" height="40" fill="none" stroke="#64b5f6" stroke-width="2" />
    <text x="15" y="15" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">ионизация</text>
    
    <!-- Ускоряющий электрод -->
    <line x1="30" y1="30" x2="30" y2="50" stroke="#64b5f6" stroke-width="3" />
    <text x="25" y="60" text-anchor="middle" font-family="Arial" font-size="8" fill="#1976d2">+</text>
    
    <!-- Магнитная область -->
    <rect x="30" y="20" width="80" height="40" fill="url(#fieldGrad)" opacity="0.3" />
    <text x="70" y="15" text-anchor="middle" font-family="Arial" font-size="8" fill="#388e3c">магнитное поле B</text>
    
    <!-- Детектор -->
    <rect x="110" y="10" width="20" height="60" fill="none" stroke="#9e9e9e" stroke-width="2" />
    <text x="120" y="85" text-anchor="middle" font-family="Arial" font-size="8" fill="#616161">детектор</text>
    
    <!-- Траектории ионов -->
    <path d="M 30,40 Q 50,30 70,40" fill="none" stroke="#f44336" stroke-width="1.5" />
    <path d="M 30,40 Q 50,35 70,40" fill="none" stroke="#ff9800" stroke-width="1.5" />
    <path d="M 30,40 Q 50,45 70,40" fill="none" stroke="#4caf50" stroke-width="1.5" />
    
    <!-- Разные радиусы кривизны -->
    <text x="35" y="35" font-family="Arial" font-size="8" fill="#f44336">m₁</text>
    <text x="35" y="45" font-family="Arial" font-size="8" fill="#ff9800">m₂</text>
    <text x="35" y="55" font-family="Arial" font-size="8" fill="#4caf50">m₃</text>
  </g>
  
  <!-- Легенда -->
  <g transform="translate(350, 280)">
    <rect x="0" y="0" width="130" height="60" fill="white" stroke="#9e9e9e" stroke-width="1" opacity="0.9" />
    <text x="65" y="15" text-anchor="middle" font-family="Arial" font-size="10" fill="#263238" font-weight="bold">Легенда:</text>
    <circle cx="10" cy="25" r="3" fill="#1e88e5" />
    <text x="18" y="29" font-family="Arial" font-size="8" fill="#455a64">электрон</text>
    <line x1="5" y1="40" x2="15" y2="40" stroke="#d32f2f" stroke-width="2" />
    <text x="18" y="44" font-family="Arial" font-size="8" fill="#455a64">вектор скорости</text>
    <line x1="5" y1="50" x2="15" y2="50" stroke="#7b1fa2" stroke-width="2" />
    <text x="18" y="54" font-family="Arial" font-size="8" fill="#455a64">сила Лоренца</text>
  </g>
  
  <!-- Дополнительные подписи -->
  <text x="50" y="350" font-family="Arial" font-size="8" fill="#455a64">Сила Лоренца действует перпендикулярно скорости частицы и магнитному полю</text>
  <text x="350" y="200" font-family="Arial" font-size="8" fill="#455a64">В циклотроне частицы ускоряются переменным электрическим полем</text>
</svg>