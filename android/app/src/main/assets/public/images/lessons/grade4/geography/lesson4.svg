<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Города-миллионники</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Крупные города России</text>

  <!-- Sky -->
  <rect x="20" y="92" width="460" height="145" rx="4" fill="#2B4C7E" opacity="0.06" />

  <!-- City skyline row - various building shapes -->
  <!-- Moscow group -->
  <rect x="30" y="140" width="15" height="95" fill="#1a1a1a" />
  <rect x="47" y="120" width="18" height="115" fill="#1a1a1a" />
  <polygon points="47,120 56,105 65,120" fill="#C41E3A" />
  <rect x="67" y="130" width="14" height="105" fill="#1a1a1a" />
  <rect x="83" y="145" width="12" height="90" fill="#1a1a1a" />
  <rect x="97" y="135" width="16" height="100" fill="#1a1a1a" />
  <rect x="115" y="150" width="10" height="85" fill="#1a1a1a" />

  <!-- St Petersburg group -->
  <rect x="140" y="155" width="20" height="80" fill="#2B4C7E" opacity="0.7" />
  <rect x="162" y="140" width="15" height="95" fill="#2B4C7E" opacity="0.7" />
  <rect x="179" y="130" width="25" height="105" fill="#2B4C7E" opacity="0.7" />
  <!-- Spire -->
  <line x1="191" y1="105" x2="191" y2="130" stroke="#D4A843" stroke-width="2" />
  <circle cx="191" cy="103" r="3" fill="#D4A843" />
  <rect x="206" y="148" width="18" height="87" fill="#2B4C7E" opacity="0.7" />
  <rect x="226" y="158" width="14" height="77" fill="#2B4C7E" opacity="0.7" />

  <!-- Novosibirsk / Yekaterinburg group -->
  <rect x="260" y="160" width="18" height="75" fill="#1a1a1a" opacity="0.7" />
  <rect x="280" y="145" width="14" height="90" fill="#1a1a1a" opacity="0.7" />
  <rect x="296" y="155" width="20" height="80" fill="#1a1a1a" opacity="0.7" />
  <rect x="318" y="165" width="12" height="70" fill="#1a1a1a" opacity="0.7" />
  <rect x="332" y="150" width="16" height="85" fill="#1a1a1a" opacity="0.7" />

  <!-- Kazan / Samara group -->
  <rect x="360" y="158" width="16" height="77" fill="#C41E3A" opacity="0.6" />
  <!-- Minaret shape -->
  <rect x="378" y="140" width="10" height="95" fill="#C41E3A" opacity="0.6" />
  <polygon points="378,140 383,125 388,140" fill="#D4A843" />
  <rect x="390" y="162" width="14" height="73" fill="#C41E3A" opacity="0.6" />
  <rect x="406" y="155" width="18" height="80" fill="#C41E3A" opacity="0.6" />
  <rect x="426" y="168" width="12" height="67" fill="#C41E3A" opacity="0.6" />
  <rect x="440" y="160" width="16" height="75" fill="#C41E3A" opacity="0.6" />

  <!-- Ground line -->
  <rect x="20" y="235" width="460" height="3" fill="#1a1a1a" opacity="0.3" />

  <!-- City labels below skyline -->
  <text x="80" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Москва</text>
  <text x="185" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Санкт-Петербург</text>
  <text x="300" y="250" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">Новосибирск, Екатеринбург</text>
  <text x="400" y="250" text-anchor="middle" font-size="9" fill="#C41E3A" font-family="Arial, sans-serif">Казань, Самара...</text>

  <!-- Stat boxes -->
  <rect x="30" y="265" width="130" height="35" rx="4" fill="white" stroke="#C41E3A" stroke-width="1.5" />
  <text x="95" y="282" text-anchor="middle" font-size="18" font-weight="bold" fill="#C41E3A" font-family="Arial, sans-serif">15</text>
  <text x="95" y="295" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">городов-миллионников</text>

  <rect x="180" y="265" width="130" height="35" rx="4" fill="white" stroke="#2B4C7E" stroke-width="1.5" />
  <text x="245" y="282" text-anchor="middle" font-size="18" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">13 млн</text>
  <text x="245" y="295" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">население Москвы</text>

  <rect x="330" y="265" width="140" height="35" rx="4" fill="white" stroke="#D4A843" stroke-width="1.5" />
  <text x="400" y="282" text-anchor="middle" font-size="18" font-weight="bold" fill="#D4A843" font-family="Arial, sans-serif">5,6 млн</text>
  <text x="400" y="295" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">население Санкт-Петербурга</text>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 4</text>
</svg>