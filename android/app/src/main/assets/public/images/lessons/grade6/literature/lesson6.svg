<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Пословицы и поговорки</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Scroll with proverbs -->
  <rect x="25" y="90" width="250" height="200" rx="6" fill="white" stroke="#8D6E63" stroke-width="1.5" opacity="0.9"/>
  <text x="150" y="104" font-family="Arial,sans-serif" font-size="8" fill="#5D4037" font-weight="bold" text-anchor="middle">СВИТОК ПОСЛОВИЦ</text>
  <!-- Scroll shape -->
  <rect x="45" y="112" width="210" height="168" fill="#FFCC80" stroke="#8D6E63" stroke-width="1" rx="2"/>
  <!-- Scroll top roll -->
  <ellipse cx="45" cy="112" rx="8" ry="12" fill="#D4A574" stroke="#8D6E63" stroke-width="1"/>
  <ellipse cx="255" cy="112" rx="8" ry="12" fill="#D4A574" stroke="#8D6E63" stroke-width="1"/>
  <!-- Scroll bottom roll -->
  <ellipse cx="45" cy="280" rx="8" ry="12" fill="#D4A574" stroke="#8D6E63" stroke-width="1"/>
  <ellipse cx="255" cy="280" rx="8" ry="12" fill="#D4A574" stroke="#8D6E63" stroke-width="1"/>
  <!-- Decorative top border -->
  <line x1="60" y1="118" x2="240" y2="118" stroke="#8D6E63" stroke-width="0.8"/>
  <line x1="60" y1="122" x2="240" y2="122" stroke="#8D6E63" stroke-width="0.5" opacity="0.5"/>
  <!-- Decorative bottom border -->
  <line x1="60" y1="272" x2="240" y2="272" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Proverbs text -->
  <text x="150" y="140" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-style="italic">Без труда не вытащишь</text>
  <text x="150" y="153" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-style="italic">и рыбку из пруда.</text>
  <line x1="80" y1="162" x2="220" y2="162" stroke="#8D6E63" stroke-width="0.5" opacity="0.4"/>
  <text x="150" y="178" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-style="italic">Семь раз отмерь -</text>
  <text x="150" y="191" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-style="italic">один раз отрежь.</text>
  <line x1="80" y1="200" x2="220" y2="200" stroke="#8D6E63" stroke-width="0.5" opacity="0.4"/>
  <text x="150" y="216" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-style="italic">Терпение и труд</text>
  <text x="150" y="229" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-style="italic">всё перетрут.</text>
  <line x1="80" y1="238" x2="220" y2="238" stroke="#8D6E63" stroke-width="0.5" opacity="0.4"/>
  <text x="150" y="254" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-style="italic">Ученье - свет,</text>
  <text x="150" y="267" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-style="italic">а неученье - тьма.</text>

  <!-- Card 2: People in traditional dress -->
  <rect x="287" y="90" width="188" height="130" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="381" y="104" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">НАРОДНАЯ МУДРОСТЬ</text>
  <!-- Old wise man (storyteller) -->
  <!-- Head -->
  <circle cx="340" cy="132" r="12" fill="#FFCC80" stroke="#C62828" stroke-width="1"/>
  <!-- Beard -->
  <path d="M328,140 Q330,158 340,162 Q350,158 352,140" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Fur hat -->
  <path d="M328,126 Q334,116 340,114 Q346,116 352,126" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <rect x="325" y="124" width="30" height="5" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Eyes -->
  <circle cx="335" cy="130" r="1.5" fill="#C62828"/>
  <circle cx="345" cy="130" r="1.5" fill="#C62828"/>
  <!-- Traditional shirt -->
  <path d="M330,148 Q328,165 326,190 L354,190 Q352,165 350,148 Z" fill="white" stroke="#C62828" stroke-width="0.8"/>
  <!-- Embroidery -->
  <line x1="330" y1="155" x2="350" y2="155" stroke="#C62828" stroke-width="0.8"/>
  <line x1="329" y1="158" x2="351" y2="158" stroke="#C62828" stroke-width="0.5" opacity="0.5"/>
  <!-- Belt -->
  <rect x="327" y="168" width="26" height="4" rx="1" fill="#2E7D32"/>
  <!-- Arms gesturing -->
  <line x1="330" y1="155" x2="310" y2="175" stroke="#C62828" stroke-width="2" stroke-linecap="round"/>
  <line x1="350" y1="155" x2="370" y2="170" stroke="#C62828" stroke-width="2" stroke-linecap="round"/>
  <!-- Speech lines -->
  <path d="M372,168 Q382,160 395,162" stroke="#C62828" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M375,172 Q388,165 400,168" stroke="#C62828" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Old woman listener -->
  <circle cx="420" cy="138" r="10" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <!-- Headscarf -->
  <path d="M410,132 Q415,122 420,120 Q425,122 430,132 L432,140 L408,140 Z" fill="#C62828" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Eyes -->
  <circle cx="417" cy="137" r="1.2" fill="#C62828"/>
  <circle cx="423" cy="137" r="1.2" fill="#C62828"/>
  <!-- Body -->
  <path d="M412,148 Q410,165 408,190 L432,190 Q430,165 428,148 Z" fill="#1565C0" stroke="#0D47A1" stroke-width="0.8"/>
  <!-- Apron -->
  <path d="M414,165 L414,190 L426,190 L426,165 Z" fill="white" stroke="#0D47A1" stroke-width="0.5" opacity="0.7"/>
  <text x="381" y="208" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle">мудрость поколений в слове</text>

  <!-- Card 3: Proverb categories -->
  <rect x="287" y="228" width="188" height="62" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="381" y="242" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">ТЕМЫ ПОСЛОВИЦ</text>
  <!-- Category icons -->
  <!-- Book (wisdom) -->
  <rect x="305" y="250" width="18" height="14" rx="1" fill="#FFCC80" stroke="#8D6E63" stroke-width="0.8"/>
  <line x1="314" y1="250" x2="314" y2="264" stroke="#8D6E63" stroke-width="0.8"/>
  <rect x="305" y="248" width="18" height="3" rx="1" fill="#C62828"/>
  <text x="314" y="278" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Мудрость</text>
  <!-- House (family) -->
  <rect x="352" y="255" width="18" height="12" fill="#FFCC80" stroke="#8D6E63" stroke-width="0.8"/>
  <polygon points="350,255 361,246 372,255" fill="#C62828" stroke="#8D6E63" stroke-width="0.5"/>
  <rect x="358" y="260" width="6" height="7" fill="#8D6E63"/>
  <text x="361" y="278" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Семья</text>
  <!-- Shield (friendship) -->
  <path d="M398,250 Q410,248 422,250 L420,260 Q410,268 398,260 Z" fill="#1565C0" stroke="#0D47A1" stroke-width="0.8"/>
  <circle cx="410" cy="255" r="3" fill="#F9A825"/>
  <text x="410" y="278" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Дружба</text>
  <!-- Wrench (work) -->
  <path d="M445,250 L450,255 L445,260 L440,255 Z" fill="#9E9E9E" stroke="#616161" stroke-width="0.8"/>
  <line x1="442" y1="260" x2="445" y2="268" stroke="#9E9E9E" stroke-width="2"/>
  <text x="445" y="278" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Труд</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Пословицы и поговорки</text>
</svg>