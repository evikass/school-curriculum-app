<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Энергетический обмен</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 16</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Three stages flow -->
    <!-- Stage 1: Glycolysis -->
    <rect x="20" y="95" width="145" height="190" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <rect x="30" y="102" width="125" height="22" rx="4" fill="#42A5F5"/>
    <text x="92" y="117" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">I. Гликолиз</text>
    <text x="92" y="140" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">В цитоплазме</text>
    <text x="92" y="158" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">C6H12O6</text>
    <text x="92" y="172" font-family="Arial,sans-serif" font-size="10" fill="#FF7043" text-anchor="middle">&#x2193;</text>
    <text x="92" y="188" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">2 пирувата</text>
    <text x="92" y="205" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">2 АТФ</text>
    <text x="92" y="220" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">2 НАДH2</text>
    <text x="92" y="240" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Без O2</text>
    <text x="92" y="253" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Анаэробный</text>
    
    <!-- Arrow -->
    <text x="178" y="195" font-family="Arial,sans-serif" font-size="16" fill="#66BB6A" text-anchor="middle">&#x2192;</text>
    
    <!-- Stage 2: Krebs cycle -->
    <rect x="190" y="95" width="145" height="190" rx="6" fill="#FFF3E0" stroke="#FFA726" stroke-width="1"/>
    <rect x="200" y="102" width="125" height="22" rx="4" fill="#FFA726"/>
    <text x="262" y="117" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">II. Цикл Кребса</text>
    <text x="262" y="140" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">В митохондриях</text>
    <text x="262" y="158" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">Пируват</text>
    <text x="262" y="172" font-family="Arial,sans-serif" font-size="10" fill="#FF7043" text-anchor="middle">&#x2193;</text>
    <text x="262" y="188" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">CO2 + H2O</text>
    <text x="262" y="205" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">2 АТФ</text>
    <text x="262" y="220" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">НАДH2, ФАДH2</text>
    <text x="262" y="240" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">С O2</text>
    <text x="262" y="253" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Аэробный</text>
    
    <!-- Arrow -->
    <text x="348" y="195" font-family="Arial,sans-serif" font-size="16" fill="#66BB6A" text-anchor="middle">&#x2192;</text>
    
    <!-- Stage 3: ETC -->
    <rect x="360" y="95" width="120" height="190" rx="6" fill="#FCE4EC" stroke="#EF5350" stroke-width="1"/>
    <rect x="365" y="102" width="110" height="22" rx="4" fill="#EF5350"/>
    <text x="420" y="117" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">III. Дых.цепь</text>
    <text x="420" y="140" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Кристы митох.</text>
    <text x="420" y="158" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">НАДH2, ФАДH2</text>
    <text x="420" y="172" font-family="Arial,sans-serif" font-size="10" fill="#FF7043" text-anchor="middle">&#x2193;</text>
    <text x="420" y="188" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">H2O + CO2</text>
    <text x="420" y="205" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">34 АТФ</text>
    <text x="420" y="225" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Окислительное</text>
    <text x="420" y="238" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">фосфорилирование</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Три этапа расщепления глюкозы</text>
</svg>