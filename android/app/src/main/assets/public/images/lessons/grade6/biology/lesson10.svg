<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="heartGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="artery" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="vein" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <radialGradient id="cellGrad" cx="0.4" cy="0.35">
      <stop offset="0%" stop-color="#FF8A80"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)"/>
  <rect x="2" y="2" width="496" height="346" rx="11" fill="none" stroke="#EF9A9A" stroke-width="1.5"/>
  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#B71C1C">Кровеносная система</text>
  <!-- Arteries (red) - branching from heart -->
  <path d="M250,140 Q250,100 230,75 Q215,55 180,50" fill="none" stroke="url(#artery)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M230,75 Q240,60 250,45" fill="none" stroke="url(#artery)" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M250,140 Q250,105 270,80 Q285,60 320,50" fill="none" stroke="url(#artery)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M270,80 Q265,60 260,45" fill="none" stroke="url(#artery)" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Arteries going down -->
  <path d="M250,190 Q250,220 245,250 Q240,275 235,300" fill="none" stroke="url(#artery)" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  <path d="M245,250 Q225,260 200,270" fill="none" stroke="url(#artery)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <path d="M245,250 Q265,260 290,270" fill="none" stroke="url(#artery)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <!-- Veins (blue) - returning to heart -->
  <path d="M175,55 Q150,70 140,95 Q130,120 135,145 Q140,160 155,170" fill="none" stroke="url(#vein)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M325,55 Q350,70 360,95 Q370,120 365,145 Q360,160 345,170" fill="none" stroke="url(#vein)" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <path d="M200,275 Q180,285 170,300 Q160,310 155,300 Q145,280 140,260 Q135,240 140,220 Q145,200 155,190" fill="none" stroke="url(#vein)" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <path d="M290,275 Q310,285 320,300 Q330,310 335,300 Q345,280 350,260 Q355,240 350,220 Q345,200 340,190" fill="none" stroke="url(#vein)" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Heart - center -->
  <path d="M250,135 C250,120 230,105 215,115 C200,125 200,145 215,160 L250,190 L285,160 C300,145 300,125 285,115 C270,105 250,120 250,135Z" fill="url(#heartGrad)" stroke="#880E4F" stroke-width="1.5"/>
  <!-- Heart inner detail -->
  <path d="M250,145 C250,138 240,132 234,137 C228,142 228,150 234,156 L250,170 L266,156 C272,150 272,142 266,137 C260,132 250,138 250,145Z" fill="#E57373" opacity="0.5"/>
  <!-- Heart chambers -->
  <line x1="250" y1="130" x2="250" y2="185" stroke="#880E4F" stroke-width="0.8" opacity="0.5"/>
  <line x1="222" y1="150" x2="278" y2="150" stroke="#880E4F" stroke-width="0.8" opacity="0.5"/>
  <!-- Aorta arc on top of heart -->
  <path d="M250,130 Q250,115 260,112 Q270,109 275,118" fill="none" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <!-- Red blood cells floating around -->
  <ellipse cx="120" cy="120" rx="10" ry="7" fill="url(#cellGrad)" stroke="#C62828" stroke-width="0.8" transform="rotate(-20,120,120)"/>
  <ellipse cx="120" cy="120" rx="4" ry="3" fill="#FFCDD2" opacity="0.6" transform="rotate(-20,120,120)"/>
  <ellipse cx="380" cy="110" rx="10" ry="7" fill="url(#cellGrad)" stroke="#C62828" stroke-width="0.8" transform="rotate(15,380,110)"/>
  <ellipse cx="380" cy="110" rx="4" ry="3" fill="#FFCDD2" opacity="0.6" transform="rotate(15,380,110)"/>
  <ellipse cx="100" cy="230" rx="9" ry="6" fill="url(#cellGrad)" stroke="#C62828" stroke-width="0.8" transform="rotate(30,100,230)"/>
  <ellipse cx="100" cy="230" rx="3.5" ry="2.5" fill="#FFCDD2" opacity="0.6" transform="rotate(30,100,230)"/>
  <ellipse cx="400" cy="240" rx="9" ry="6" fill="url(#cellGrad)" stroke="#C62828" stroke-width="0.8" transform="rotate(-10,400,240)"/>
  <ellipse cx="400" cy="240" rx="3.5" ry="2.5" fill="#FFCDD2" opacity="0.6" transform="rotate(-10,400,240)"/>
  <ellipse cx="160" cy="300" rx="8" ry="5.5" fill="url(#cellGrad)" stroke="#C62828" stroke-width="0.8"/>
  <ellipse cx="340" cy="290" rx="8" ry="5.5" fill="url(#cellGrad)" stroke="#C62828" stroke-width="0.8" transform="rotate(25,340,290)"/>
  <ellipse cx="250" cy="80" rx="9" ry="6" fill="url(#cellGrad)" stroke="#C62828" stroke-width="0.8" transform="rotate(-5,250,80)"/>
  <!-- Labels -->
  <line x1="250" y1="165" x2="380" y2="60" stroke="#880E4F" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="385" y="58" font-family="Arial,sans-serif" font-size="12" fill="#880E4F" font-weight="bold">Сердце</text>
  <line x1="190" y1="50" x2="120" y2="60" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="55" y="64" font-family="Arial,sans-serif" font-size="11" fill="#C62828" font-weight="bold">Артерии</text>
  <line x1="360" y1="95" x2="410" y2="95" stroke="#283593" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="415" y="99" font-family="Arial,sans-serif" font-size="11" fill="#283593" font-weight="bold">Вены</text>
  <line x1="120" y1="120" x2="65" y2="145" stroke="#D32F2F" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="20" y="150" font-family="Arial,sans-serif" font-size="10" fill="#D32F2F" font-weight="bold">Эритроциты</text>
  <!-- Blood flow arrows -->
  <path d="M232,68 L228,58 L236,62" fill="#E53935" stroke="none"/>
  <path d="M268,68 L272,58 L264,62" fill="#E53935" stroke="none"/>
  <path d="M242,275 L238,285 L246,281" fill="#E53935" stroke="none"/>
  <!-- Decorative elements -->
  <circle cx="50" cy="45" r="20" fill="#FFCDD2" opacity="0.25"/>
  <circle cx="450" cy="300" r="25" fill="#FFCDD2" opacity="0.2"/>
  <circle cx="430" cy="55" r="14" fill="#E8EAF6" opacity="0.3"/>
  <circle cx="55" cy="300" r="16" fill="#E8EAF6" opacity="0.25"/>
  <!-- Pulse line decorative -->
  <path d="M60,330 L120,330 L130,310 L140,345 L150,325 L160,330 L440,330" fill="none" stroke="#EF9A9A" stroke-width="1.5" opacity="0.5"/>
  <!-- Bottom info -->
  <rect x="115" y="332" width="270" height="14" rx="7" fill="#EF9A9A" opacity="0.35"/>
  <text x="250" y="343" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#880E4F">Артерии • Вены • Капилляры • Эритроциты</text>
</svg>