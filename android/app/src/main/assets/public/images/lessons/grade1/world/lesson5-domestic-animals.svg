<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    @keyframes eat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(3px); }
    }
    @keyframes wag {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }
    @keyframes moo {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .eat { animation: eat 1s ease-in-out infinite; }
    .wag { animation: wag 0.5s ease-in-out infinite; transform-origin: left center; }
    .moo { animation: moo 2s ease-in-out infinite; }
  </style>
  <!-- Background - farm -->
  <rect width="400" height="400" fill="#fef3c7" rx="20"/>
  <!-- Sky -->
  <rect width="400" height="100" fill="#7dd3fc" rx="20"/>
  <!-- Sun -->
  <circle cx="350" cy="40" r="25" fill="#fbbf24"/>
  <!-- Barn -->
  <g transform="translate(250, 60)">
    <polygon points="0,50 40,0 80,50" fill="#dc2626"/>
    <rect x="5" y="50" width="70" height="50" fill="#fef3c7" stroke="#dc2626" stroke-width="2"/>
    <rect x="30" y="60" width="20" height="40" fill="#78350f"/>
  </g>
  <!-- Title -->
  <text x="200" y="30" font-size="16" fill="#166534" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ДОМАШНИЕ ЖИВОТНЫЕ</text>
  <!-- Cow -->
  <g class="moo" transform="translate(20, 100)">
    <ellipse cx="50" cy="60" rx="40" ry="30" fill="#f5f5f4"/>
    <circle cx="80" cy="45" r="22" fill="#f5f5f4"/>
    <ellipse cx="45" cy="60" rx="8" ry="6" fill="#1e293b"/>
    <ellipse cx="55" cy="55" rx="6" ry="5" fill="#1e293b"/>
    <ellipse cx="70" cy="65" rx="5" ry="4" fill="#1e293b"/>
    <!-- Ears -->
    <ellipse cx="68" cy="28" rx="8" ry="5" fill="#f5f5f4"/>
    <ellipse cx="92" cy="28" rx="8" ry="5" fill="#f5f5f4"/>
    <!-- Horns -->
    <path d="M 65 28 Q 55 15 60 5" stroke="#fef3c7" stroke-width="4" fill="none"/>
    <path d="M 95 28 Q 105 15 100 5" stroke="#fef3c7" stroke-width="4" fill="none"/>
    <!-- Udder -->
    <ellipse cx="50" cy="85" rx="12" ry="8" fill="#fda4af"/>
    <!-- Legs -->
    <rect x="20" y="85" width="8" height="25" fill="#f5f5f4"/>
    <rect x="70" y="85" width="8" height="25" fill="#f5f5f4"/>
    <!-- Milk bucket -->
    <ellipse cx="50" cy="115" rx="15" ry="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="50" y="145" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">Корова 🐄</text>
    <text x="50" y="157" font-size="8" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif">Даёт молоко</text>
  </g>
  <!-- Pig -->
  <g class="eat" transform="translate(130, 130)">
    <ellipse cx="30" cy="40" rx="28" ry="22" fill="#f9a8d4"/>
    <ellipse cx="30" cy="25" rx="18" ry="15" fill="#f9a8d4"/>
    <ellipse cx="30" cy="30" rx="8" ry="6" fill="#fda4af"/>
    <circle cx="25" cy="28" r="2" fill="#1e293b"/>
    <circle cx="35" cy="28" r="2" fill="#1e293b"/>
    <!-- Ears -->
    <ellipse cx="15" cy="12" rx="8" ry="10" fill="#f9a8d4"/>
    <ellipse cx="45" cy="12" rx="8" ry="10" fill="#f9a8d4"/>
    <!-- Curly tail -->
    <path d="M 58 40 Q 70 35 65 50 Q 72 55 75 45" stroke="#f9a8d4" stroke-width="3" fill="none"/>
    <!-- Legs -->
    <rect x="12" y="58" width="6" height="15" fill="#f9a8d4"/>
    <rect x="42" y="58" width="6" height="15" fill="#f9a8d4"/>
    <text x="30" y="90" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">Свинья 🐷</text>
    <text x="30" y="102" font-size="8" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif">Даёт мясо</text>
  </g>
  <!-- Chicken -->
  <g class="eat" style="animation-delay: 0.5s" transform="translate(240, 130)">
    <ellipse cx="25" cy="45" rx="20" ry="15" fill="#fef3c7"/>
    <circle cx="25" cy="25" r="15" fill="#fef3c7"/>
    <polygon points="25,20 35,25 25,30" fill="#f97316"/>
    <circle cx="20" cy="22" r="3" fill="#1e293b"/>
    <circle cx="30" cy="22" r="3" fill="#1e293b"/>
    <!-- Comb -->
    <path d="M 20 10 Q 22 0 25 10 Q 28 0 30 10" stroke="#dc2626" stroke-width="3" fill="none"/>
    <!-- Tail -->
    <polygon points="5,40 -5,25 10,35" fill="#a8a29e"/>
    <!-- Legs -->
    <line x1="20" y1="58" x2="18" y2="75" stroke="#f97316" stroke-width="2"/>
    <line x1="30" y1="58" x2="32" y2="75" stroke="#f97316" stroke-width="2"/>
    <!-- Egg -->
    <ellipse cx="55" cy="70" rx="8" ry="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="25" y="95" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">Курица 🐔</text>
    <text x="25" y="107" font-size="8" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif">Несёт яйца</text>
  </g>
  <!-- Dog -->
  <g transform="translate(30, 250)">
    <ellipse cx="30" cy="50" rx="25" ry="18" fill="#a16207"/>
    <circle cx="45" cy="35" r="18" fill="#a16207"/>
    <ellipse cx="55" cy="25" rx="10" ry="12" fill="#a16207"/>
    <circle cx="40" cy="30" r="4" fill="#1e293b"/>
    <circle cx="52" cy="32" r="4" fill="#1e293b"/>
    <ellipse cx="48" cy="42" rx="4" ry="3" fill="#1e293b"/>
    <!-- Tongue -->
    <ellipse cx="52" cy="50" rx="5" ry="7" fill="#ec4899"/>
    <!-- Tail -->
    <g class="wag">
      <path d="M 5 45 Q -10 30 -5 20" stroke="#a16207" stroke-width="8" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Legs -->
    <rect x="15" y="62" width="6" height="20" fill="#a16207"/>
    <rect x="35" y="62" width="6" height="20" fill="#a16207"/>
    <text x="30" y="100" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">Собака 🐕</text>
    <text x="30" y="112" font-size="8" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif">Охраняет дом</text>
  </g>
  <!-- Cat -->
  <g transform="translate(120, 260)">
    <ellipse cx="25" cy="50" rx="20" ry="15" fill="#fb923c"/>
    <circle cx="25" cy="30" r="18" fill="#fb923c"/>
    <polygon points="10,15 5,0 18,12" fill="#fb923c"/>
    <polygon points="40,15 45,0 32,12" fill="#fb923c"/>
    <ellipse cx="18" cy="28" rx="4" ry="5" fill="#fef3c7"/>
    <ellipse cx="32" cy="28" rx="4" ry="5" fill="#fef3c7"/>
    <ellipse cx="18" cy="28" rx="2" ry="4" fill="#1e293b"/>
    <ellipse cx="32" cy="28" rx="2" ry="4" fill="#1e293b"/>
    <ellipse cx="25" cy="38" rx="3" ry="2" fill="#f472b6"/>
    <!-- Whiskers -->
    <line x1="5" y1="38" x2="15" y2="36" stroke="#fef3c7" stroke-width="1"/>
    <line x1="5" y1="42" x2="15" y2="42" stroke="#fef3c7" stroke-width="1"/>
    <line x1="35" y1="36" x2="45" y2="38" stroke="#fef3c7" stroke-width="1"/>
    <line x1="35" y1="42" x2="45" y2="42" stroke="#fef3c7" stroke-width="1"/>
    <!-- Tail -->
    <path d="M 45 50 Q 60 40 55 60" stroke="#fb923c" stroke-width="6" fill="none"/>
    <text x="25" y="90" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">Кошка 🐱</text>
    <text x="25" y="102" font-size="8" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif">Ловит мышей</text>
  </g>
  <!-- Sheep -->
  <g class="moo" style="animation-delay: 1s" transform="translate(220, 250)">
    <ellipse cx="30" cy="50" rx="28" ry="20" fill="#f8fafc"/>
    <!-- Fluffy wool -->
    <circle cx="20" cy="45" r="10" fill="#f8fafc"/>
    <circle cx="40" cy="45" r="10" fill="#f8fafc"/>
    <circle cx="30" cy="35" r="10" fill="#f8fafc"/>
    <circle cx="30" cy="55" r="10" fill="#f8fafc"/>
    <circle cx="50" cy="35" r="18" fill="#1e293b"/>
    <circle cx="42" cy="32" r="3" fill="#1e293b"/>
    <circle cx="55" cy="32" r="3" fill="#1e293b"/>
    <!-- Legs -->
    <rect x="15" y="65" width="5" height="18" fill="#1e293b"/>
    <rect x="40" y="65" width="5" height="18" fill="#1e293b"/>
    <text x="30" y="100" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">Овца 🐑</text>
    <text x="30" y="112" font-size="8" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif">Даёт шерсть</text>
  </g>
  <!-- Horse -->
  <g transform="translate(310, 240)">
    <ellipse cx="30" cy="55" rx="25" ry="18" fill="#78350f"/>
    <ellipse cx="55" cy="40" rx="15" ry="12" fill="#78350f"/>
    <polygon points="60,30 75,15 65,35" fill="#78350f"/>
    <!-- Mane -->
    <path d="M 45 25 L 40 35 L 50 30 L 45 40 L 55 35" fill="#1e293b"/>
    <circle cx="60" cy="35" r="3" fill="#1e293b"/>
    <!-- Tail -->
    <path d="M 5 55 Q -10 70 0 85" stroke="#1e293b" stroke-width="4" fill="none"/>
    <!-- Legs -->
    <rect x="15" y="70" width="6" height="25" fill="#78350f"/>
    <rect x="40" y="70" width="6" height="25" fill="#78350f"/>
    <text x="30" y="110" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">Лошадь 🐴</text>
    <text x="30" y="122" font-size="8" fill="#0369a1" text-anchor="middle" font-family="Arial, sans-serif">Перевозит грузы</text>
  </g>
  <!-- Ground -->
  <ellipse cx="200" cy="385" rx="190" ry="15" fill="#84cc16"/>
  <!-- Label -->
  <text x="200" y="400" font-size="9" fill="#422006" text-anchor="middle" font-family="Arial, sans-serif">🏠 Живут с человеком и приносят пользу</text>
</svg>