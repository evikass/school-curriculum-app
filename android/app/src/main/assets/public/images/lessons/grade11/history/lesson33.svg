<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="spaceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1551;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3c72;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="earthGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#43a047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b5e20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rocketGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c62828;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#8e24aa" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#5e35b1" stroke-width="1"/>
  
  <!-- Заголовок и номер урока -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1a237e">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="50" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#3f51b5">Советская наука и космос</text>
  <text x="470" y="340" text-anchor="end" font-family="Arial" font-size="12" fill="#3f51b5">Урок 15</text>
  
  <!-- Хронологическая линия -->
  <line x1="50" y1="320" x2="450" y2="320" stroke="#3f51b5" stroke-width="2"/>
  <circle cx="80" cy="320" r="4" fill="#3f51b5"/>
  <circle cx="170" cy="320" r="4" fill="#3f51b5"/>
  <circle cx="260" cy="320" r="4" fill="#3f51b5"/>
  <circle cx="350" cy="320" r="4" fill="#3f51b5"/>
  <circle cx="420" cy="320" r="4" fill="#3f51b5"/>
  
  <!-- Даты на хронологической линии -->
  <text x="80" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">1949</text>
  <text x="170" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">1954</text>
  <text x="260" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">1957</text>
  <text x="350" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">1959</text>
  <text x="420" y="310" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">1961</text>
  
  <!-- Атомная бомба 1949 -->
  <g transform="translate(80, 100)">
    <rect x="-20" y="-15" width="40" height="30" rx="5" fill="#f44336" stroke="#b71c1c" stroke-width="1"/>
    <rect x="-5" y="-20" width="10" height="10" fill="#ffeb3b"/>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">Атомная бомба</text>
    <text x="0" y="37" text-anchor="middle" font-family="Arial" font-size="9" fill="#3f51b5">1949 г.</text>
  </g>
  
  <!-- АЭС Обнинск 1954 -->
  <g transform="translate(170, 100)">
    <rect x="-20" y="-20" width="40" height="40" fill="#9e9e9e" stroke="#424242" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="#e0e0e0" stroke="#616161" stroke-width="1"/>
    <rect x="-3" y="-20" width="6" height="10" fill="#757575"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">АЭС Обнинск</text>
    <text x="0" y="42" text-anchor="middle" font-family="Arial" font-size="9" fill="#3f51b5">1954 г.</text>
  </g>
  
  <!-- Королёв -->
  <g transform="translate(260, 120)">
    <circle cx="0" cy="-10" r="15" fill="#ffb74d" stroke="#f57c00" stroke-width="1"/>
    <path d="M -10,-10 Q -10,-20 0,-20 Q 10,-20 10,-10" fill="none" stroke="#f57c00" stroke-width="1"/>
    <circle cx="-5" cy="-10" r="2" fill="#000"/>
    <circle cx="5" cy="-10" r="2" fill="#000"/>
    <path d="M -5,-5 Q 0,-2 5,-5" fill="none" stroke="#000" stroke-width="1"/>
    <text x="0" y="20" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">С.П. Королёв</text>
    <text x="0" y="32" text-anchor="middle" font-family="Arial" font-size="9" fill="#3f51b5">Главный конструктор</text>
  </g>
  
  <!-- Спутник -->
  <g transform="translate(350, 100)">
    <ellipse cx="0" cy="0" rx="15" ry="10" fill="#cfd8dc" stroke="#78909c" stroke-width="1"/>
    <rect x="-3" y="-15" width="6" height="5" fill="#78909c"/>
    <circle cx="-10" cy="0" r="3" fill="#37474f"/>
    <circle cx="10" cy="0" r="3" fill="#37474f"/>
    <path d="M -10,0 Q -5,-5 0,0 Q 5,-5 10,0" fill="none" stroke="#37474f" stroke-width="1"/>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">Спутник-1</text>
    <text x="0" y="37" text-anchor="middle" font-family="Arial" font-size="9" fill="#3f51b5">4 октября 1957</text>
  </g>
  
  <!-- Луна-3 -->
  <g transform="translate(420, 100)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#eceff1" stroke="#90a4ae" stroke-width="1"/>
    <rect x="-2" y="-12" width="4" height="4" fill="#78909c"/>
    <path d="M -8,-2 Q -5,0 -8,2" fill="none" stroke="#546e7a" stroke-width="1"/>
    <path d="M 8,-2 Q 5,0 8,2" fill="none" stroke="#546e7a" stroke-width="1"/>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">Луна-3</text>
    <text x="0" y="37" text-anchor="middle" font-family="Arial" font-size="9" fill="#3f51b5">7 октября 1959</text>
  </g>
  
  <!-- Гагарин -->
  <g transform="translate(250, 220)">
    <circle cx="0" cy="-15" r="18" fill="#ffccbc" stroke="#d84315" stroke-width="1"/>
    <rect x="-12" y="-5" width="24" height="20" fill="#1e88e5" stroke="#1565c0" stroke-width="1"/>
    <rect x="-15" y="15" width="30" height="8" fill="#d32f2f" stroke="#b71c1c" stroke-width="1"/>
    <text x="0" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">Ю.А. Гагарин</text>
    <text x="0" y="52" text-anchor="middle" font-family="Arial" font-size="9" fill="#3f51b5">12 апреля 1961</text>
  </g>
  
  <!-- Ракета с Гагариным -->
  <g transform="translate(250, 180)">
    <path d="M 0,20 L -8,5 L -8,0 L -5,-15 L 0,-20 L 5,-15 L 8,0 L 8,5 Z" fill="url(#rocketGradient)" stroke="#b71c1c" stroke-width="1"/>
    <rect x="-3" y="-15" width="6" height="10" fill="#ffeb3b"/>
    <ellipse cx="-10" cy="10" rx="5" ry="3" fill="#ff9800" opacity="0.8"/>
    <ellipse cx="10" cy="10" rx="5" ry="3" fill="#ff9800" opacity="0.8"/>
    <ellipse cx="0" cy="25" rx="8" ry="4" fill="#ff5722" opacity="0.8"/>
  </g>
  
  <!-- Карта СССР -->
  <g transform="translate(80, 240)">
    <path d="M 0,0 Q 20,-5 40,-10 Q 60,-15 80,-10 Q 100,-5 120,5 Q 110,15 90,20 Q 70,25 50,20 Q 30,15 10,10 Q 0,5 0,0" fill="#c5e1a5" stroke="#558b2f" stroke-width="1"/>
    <text x="60" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">СССР</text>
  </g>
  
  <!-- Космическая схема -->
  <g transform="translate(380, 220)">
    <circle cx="0" cy="0" r="25" fill="url(#spaceGradient)" stroke="#3f51b5" stroke-width="1"/>
    <circle cx="0" cy="0" r="20" fill="none" stroke="#7986cb" stroke-width="1"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#7986cb" stroke-width="1"/>
    <circle cx="0" cy="0" r="10" fill="url(#earthGradient)" stroke="#2e7d32" stroke-width="1"/>
    <ellipse cx="35" cy="0" rx="8" ry="4" fill="url(#spaceGradient)" stroke="#3f51b5" stroke-width="1"/>
    <line x1="25" y1="0" x2="35" y2="0" stroke="#c5cae9" stroke-width="1"/>
    <text x="0" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#3f51b5">Орбиты спутников</text>
  </g>
  
  <!-- Формула Эйнштейна -->
  <g transform="translate(380, 120)">
    <rect x="-30" y="-15" width="60" height="30" fill="#fff9c4" stroke="#f57f17" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="#3f51b5">E = mc²</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial" font-size="9" fill="#3f51b5">Формула Эйнштейна</text>
  </g>
  
  <!-- График достижений -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="120" height="60" fill="#e1f5fe" stroke="#0277bd" stroke-width="1"/>
    <line x1="10" y1="50" x2="110" y2="50" stroke="#0277bd" stroke-width="1"/>
    <line x1="10" y1="10" x2="10" y2="50" stroke="#0277bd" stroke-width="1"/>
    <polyline points="10,45 30,40 50,35 70,25 90,15 110,10" fill="none" stroke="#01579b" stroke-width="2"/>
    <circle cx="30" cy="40" r="2" fill="#01579b"/>
    <circle cx="50" cy="35" r="2" fill="#01579b"/>
    <circle cx="70" cy="25" r="2" fill="#01579b"/>
    <circle cx="90" cy="15" r="2" fill="#01579b"/>
    <text x="60" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#0277bd">Научные достижения</text>
  </g>
  
  <!-- Звёзды -->
  <circle cx="100" cy="80" r="1" fill="#fff59d"/>
  <circle cx="150" cy="70" r="1.5" fill="#fff59d"/>
  <circle cx="200" cy="90" r="1" fill="#fff59d"/>
  <circle cx="300" cy="75" r="1" fill="#fff59d"/>
  <circle cx="400" cy="85" r="1.5" fill="#fff59d"/>
  <circle cx="450" cy="95" r="1" fill="#fff59d"/>
  
  <!-- Советский флаг -->
  <g transform="translate(450, 250)">
    <rect x="0" y="0" width="30" height="20" fill="#d32f2f"/>
    <rect x="0" y="0" width="30" height="7" fill="#fff"/>
    <circle cx="5" cy="3.5" r="2" fill="#d32f2f"/>
    <path d="M 5,3.5 L 7,5 L 6,2.5 L 8,2.5 L 6,1 L 7,3.5 Z" fill="#d32f2f"/>
    <path d="M 8,3.5 L 10,5 L 9,2.5 L 11,2.5 L 9,1 L 10,3.5 Z" fill="#d32f2f"/>
    <path d="M 11,3.5 L 13,5 L 12,2.5 L 14,2.5 L 12,1 L 13,3.5 Z" fill="#d32f2f"/>
    <path d="M 14,3.5 L 16,5 L 15,2.5 L 17,2.5 L 15,1 L 16,3.5 Z" fill="#d32f2f"/>
  </g>
</svg>