<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="85" fill="#F5E6C8" opacity="0.9"/>
  <line x1="0" y1="85" x2="500" y2="85" stroke="#C41E3A" stroke-width="3"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Культура Древней Руси</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">Архитектура, иконопись, летописание</text>

  <!-- Bottom panel -->
  <rect x="0" y="315" width="500" height="35" fill="#C41E3A" opacity="0.85"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" font-weight="bold">История России - 4 класс</text>

  <!-- Background -->
  <rect x="0" y="85" width="500" height="230" fill="#F5E6C8"/>

  <!-- Large Sofia Cathedral (center) -->
  <!-- Base -->
  <rect x="180" y="170" width="140" height="120" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Central dome (large) -->
  <circle cx="250" cy="145" r="28" fill="#D4A843" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="250" y1="117" x2="250" y2="107" stroke="#D4A843" stroke-width="3"/>
  <line x1="244" y1="112" x2="256" y2="112" stroke="#D4A843" stroke-width="3"/>
  <!-- Side domes -->
  <circle cx="205" cy="155" r="16" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="295" cy="155" r="16" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Small domes -->
  <circle cx="190" cy="165" r="10" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="310" cy="165" r="10" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Crosses -->
  <line x1="205" y1="139" x2="205" y2="133" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="295" y1="139" x2="295" y2="133" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="237" y="258" width="26" height="32" fill="#8B6914" rx="13"/>
  <!-- Arched windows -->
  <path d="M200,210 L200,230 L215,230 L215,210 Q207,200 200,210" fill="#A8C4E0" opacity="0.5"/>
  <path d="M270,210 L270,230 L285,230 L285,210 Q277,200 270,210" fill="#A8C4E0" opacity="0.5"/>
  <!-- Central window (round) -->
  <circle cx="250" cy="210" r="12" fill="#A8C4E0" opacity="0.5" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Fresco colors inside -->
  <rect x="195" y="195" width="20" height="30" fill="#C41E3A" opacity="0.15"/>
  <rect x="285" y="195" width="20" height="30" fill="#2B4C7E" opacity="0.15"/>

  <!-- Icon with ornate frame (left) -->
  <rect x="20" y="110" width="80" height="100" fill="#D4A843" stroke="#1a1a1a" stroke-width="2" rx="3"/>
  <rect x="28" y="118" width="64" height="84" fill="#2B4C7E" opacity="0.2"/>
  <!-- Icon scene: Madonna and child simplified -->
  <circle cx="60" cy="148" r="12" fill="#D4A843" opacity="0.5"/>
  <circle cx="60" cy="148" r="15" fill="none" stroke="#D4A843" stroke-width="1"/>
  <path d="M45,165 Q60,178 75,165 L78,198 L42,198 Z" fill="#C41E3A" opacity="0.6"/>
  <circle cx="72" cy="168" r="6" fill="#D4A843" opacity="0.4"/>
  <!-- Decorative corners on icon -->
  <circle cx="35" cy="125" r="3" fill="#C41E3A"/>
  <circle cx="85" cy="125" r="3" fill="#C41E3A"/>
  <circle cx="35" cy="195" r="3" fill="#C41E3A"/>
  <circle cx="85" cy="195" r="3" fill="#C41E3A"/>
  <text x="60" y="230" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">Икона</text>

  <!-- Artisan tools (bottom left) -->
  <!-- Hammer -->
  <rect x="25" y="260" width="30" height="6" fill="#1a1a1a" rx="1"/>
  <rect x="50" y="255" width="12" height="16" fill="#1a1a1a" rx="1"/>
  <!-- Chisel -->
  <line x1="80" y1="268" x2="120" y2="260" stroke="#1a1a1a" stroke-width="3"/>
  <polygon points="120,260 128,257 128,263" fill="#1a1a1a"/>
  <!-- Pottery vessel -->
  <path d="M140,295 L145,265 L165,265 L170,295" fill="#8B6914" opacity="0.6" stroke="#1a1a1a" stroke-width="1"/>
  <ellipse cx="155" cy="265" rx="10" ry="3" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Mosaic pattern (right side) -->
  <rect x="390" y="105" width="95" height="95" fill="none" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Mosaic tiles -->
  <rect x="395" y="110" width="15" height="15" fill="#C41E3A" opacity="0.6"/>
  <rect x="412" y="110" width="15" height="15" fill="#D4A843" opacity="0.6"/>
  <rect x="429" y="110" width="15" height="15" fill="#2B4C7E" opacity="0.6"/>
  <rect x="446" y="110" width="15" height="15" fill="#D4A843" opacity="0.5"/>
  <rect x="463" y="110" width="15" height="15" fill="#C41E3A" opacity="0.5"/>
  <rect x="395" y="127" width="15" height="15" fill="#D4A843" opacity="0.5"/>
  <rect x="412" y="127" width="15" height="15" fill="#2B4C7E" opacity="0.5"/>
  <rect x="429" y="127" width="15" height="15" fill="#C41E3A" opacity="0.6"/>
  <rect x="446" y="127" width="15" height="15" fill="#D4A843" opacity="0.6"/>
  <rect x="463" y="127" width="15" height="15" fill="#2B4C7E" opacity="0.4"/>
  <rect x="395" y="144" width="15" height="15" fill="#2B4C7E" opacity="0.5"/>
  <rect x="412" y="144" width="15" height="15" fill="#C41E3A" opacity="0.5"/>
  <rect x="429" y="144" width="15" height="15" fill="#D4A843" opacity="0.7"/>
  <rect x="446" y="144" width="15" height="15" fill="#2B4C7E" opacity="0.6"/>
  <rect x="463" y="144" width="15" height="15" fill="#D4A843" opacity="0.5"/>
  <rect x="395" y="161" width="15" height="15" fill="#D4A843" opacity="0.6"/>
  <rect x="412" y="161" width="15" height="15" fill="#D4A843" opacity="0.4"/>
  <rect x="429" y="161" width="15" height="15" fill="#2B4C7E" opacity="0.5"/>
  <rect x="446" y="161" width="15" height="15" fill="#C41E3A" opacity="0.5"/>
  <rect x="463" y="161" width="15" height="15" fill="#D4A843" opacity="0.6"/>
  <rect x="395" y="178" width="15" height="15" fill="#C41E3A" opacity="0.5"/>
  <rect x="412" y="178" width="15" height="15" fill="#2B4C7E" opacity="0.6"/>
  <rect x="429" y="178" width="15" height="15" fill="#D4A843" opacity="0.5"/>
  <rect x="446" y="178" width="15" height="15" fill="#D4A843" opacity="0.4"/>
  <rect x="463" y="178" width="15" height="15" fill="#C41E3A" opacity="0.6"/>
  <text x="437" y="210" font-family="Arial, sans-serif" font-size="8" fill="#1a1a1a" text-anchor="middle">Мозаика</text>

  <!-- Quill and ink (bottom right) -->
  <line x1="420" y1="290" x2="450" y2="225" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="450,225 455,218 452,227" fill="#1a1a1a"/>
  <ellipse cx="410" cy="295" rx="12" ry="8" fill="#1a1a1a" opacity="0.7"/>

  <!-- Label -->
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="10" fill="#C41E3A" text-anchor="middle" opacity="0.7">Повесть временных лет</text>

</svg>