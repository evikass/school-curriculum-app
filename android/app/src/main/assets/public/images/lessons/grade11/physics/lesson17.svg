<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Темный фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#16213e" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#0f3460" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#e94560" font-weight="bold">Радиосвязь</text>
  
  <!-- Передатчик -->
  <g id="transmitter">
    <rect x="50" y="80" width="120" height="80" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="5"/>
    <text x="110" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">Передатчик</text>
    
    <!-- Антенна передатчика -->
    <line x1="110" y1="80" x2="110" y2="50" stroke="#e94560" stroke-width="3"/>
    <circle cx="110" cy="50" r="5" fill="#e94560"/>
    
    <!-- Внутренние элементы передатчика -->
    <rect x="70" y="110" width="20" height="15" fill="#e94560" rx="2"/>
    <rect x="100" y="110" width="20" height="15" fill="#e94560" rx="2"/>
    <rect x="130" y="110" width="20" height="15" fill="#e94560" rx="2"/>
    
    <!-- Волновый символ -->
    <path d="M 90 125 Q 100 115, 110 125 T 130 125" stroke="#00d9ff" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Радиоволны -->
  <g id="radio-waves">
    <path d="M 110 50 Q 150 40, 190 50 T 270 50" stroke="#00d9ff" stroke-width="2" fill="none" opacity="0.8" filter="url(#glow)">
      <animate attributeName="d" 
               values="M 110 50 Q 150 40, 190 50 T 270 50;
                       M 110 50 Q 150 60, 190 50 T 270 50;
                       M 110 50 Q 150 40, 190 50 T 270 50"
               dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M 110 50 Q 150 30, 190 40 T 270 50" stroke="#00d9ff" stroke-width="1.5" fill="none" opacity="0.6">
      <animate attributeName="d" 
               values="M 110 50 Q 150 30, 190 40 T 270 50;
                       M 110 50 Q 150 50, 190 40 T 270 50;
                       M 110 50 Q 150 30, 190 40 T 270 50"
               dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Приёмник -->
  <g id="receiver">
    <rect x="330" y="80" width="120" height="80" fill="#0f3460" stroke="#e94560" stroke-width="2" rx="5"/>
    <text x="390" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">Приёмник</text>
    
    <!-- Антенна приёмника -->
    <line x1="390" y1="80" x2="390" y2="50" stroke="#e94560" stroke-width="3"/>
    <circle cx="390" cy="50" r="5" fill="#e94560"/>
    
    <!-- Внутренние элементы приёмника -->
    <rect x="350" y="110" width="20" height="15" fill="#e94560" rx="2"/>
    <rect x="380" y="110" width="20" height="15" fill="#e94560" rx="2"/>
    <rect x="410" y="110" width="20" height="15" fill="#e94560" rx="2"/>
    
    <!-- Дисплей приёмника -->
    <rect x="360" y="130" width="60" height="20" fill="#16213e" stroke="#00d9ff" stroke-width="1"/>
    <text x="390" y="144" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d9ff">RX</text>
  </g>
  
  <!-- Формула расстояния -->
  <g id="formula">
    <rect x="150" y="200" width="200" height="60" fill="#0f3460" stroke="#e94560" stroke-width="1" rx="5"/>
    <text x="250" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#fff">Расстояние до объекта</text>
    <text x="250" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#00d9ff" font-style="italic">s = ct/2</text>
  </g>
  
  <!-- Обозначения в формуле -->
  <text x="360" y="235" font-family="Arial, sans-serif" font-size="12" fill="#fff">s - расстояние</text>
  <text x="360" y="250" font-family="Arial, sans-serif" font-size="12" fill="#fff">c - скорость света</text>
  <text x="360" y="265" font-family="Arial, sans-serif" font-size="12" fill="#fff">t - время отражения</text>
  
  <!-- Пояснение -->
  <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ccc">Радиоволны проходят путь до объекта и обратно</text>
  
  <!-- Дополнительные элементы -->
  <circle cx="250" cy="50" r="3" fill="#00d9ff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Сетка для научного вида -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="500" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="500" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="500" y2="250" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="500" y2="300" stroke="#fff" stroke-width="0.5"/>
    
    <line x1="100" y1="0" x2="100" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="350" stroke="#fff" stroke-width="0.5"/>
  </g>
</svg>