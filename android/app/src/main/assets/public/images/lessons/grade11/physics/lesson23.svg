<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f3ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#1e90ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1e90ff;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="lightGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeb3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffc107;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#3498db" stroke-width="1" rx="3" stroke-dasharray="5,3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Урок 23: Интерференция света</text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495e">ФИЗИКА · 11 КЛАСС</text>
  <text x="470" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">23</text>
  
  <!-- Схема опыта Юнга -->
  <g transform="translate(50, 80)">
    <!-- Источник света -->
    <circle cx="0" cy="50" r="8" fill="url(#lightGradient)"/>
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Источник</text>
    
    <!-- Щель S0 -->
    <line x1="0" y1="40" x2="0" y2="60" stroke="#34495e" stroke-width="2"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">S₀</text>
    
    <!-- Две щели S1 и S2 -->
    <line x1="80" y1="35" x2="80" y2="65" stroke="#34495e" stroke-width="2"/>
    <line x1="80" y1="35" x2="80" y2="65" stroke="#34495e" stroke-width="2" transform="translate(20,0)"/>
    <text x="80" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">S₁</text>
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">S₂</text>
    
    <!-- Волны от источника -->
    <path d="M 0,50 Q 20,40 40,50 T 80,50" fill="none" stroke="#1e90ff" stroke-width="1" opacity="0.6"/>
    <path d="M 0,50 Q 20,60 40,50 T 80,50" fill="none" stroke="#1e90ff" stroke-width="1" opacity="0.6"/>
    
    <!-- Волны от щелей -->
    <path d="M 80,50 Q 100,40 120,50 T 160,50" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
    <path d="M 80,50 Q 100,60 120,50 T 160,50" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
    <path d="M 100,50 Q 120,40 140,50 T 180,50" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
    <path d="M 100,50 Q 120,60 140,50 T 180,50" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.6"/>
    
    <!-- Экран -->
    <line x1="200" y1="20" x2="200" y2="80" stroke="#2c3e50" stroke-width="3"/>
    <text x="200" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Экран</text>
    
    <!-- Интерференционная картина -->
    <rect x="195" y="30" width="10" height="3" fill="#ffeb3b" opacity="0.8"/>
    <rect x="195" y="38" width="10" height="3" fill="#ffeb3b" opacity="0.3"/>
    <rect x="195" y="46" width="10" height="3" fill="#ffeb3b" opacity="0.8"/>
    <rect x="195" y="54" width="10" height="3" fill="#ffeb3b" opacity="0.3"/>
    <rect x="195" y="62" width="10" height="3" fill="#ffeb3b" opacity="0.8"/>
    <rect x="195" y="70" width="10" height="3" fill="#ffeb3b" opacity="0.3"/>
  </g>
  
  <!-- Когерентные источники -->
  <g transform="translate(300, 80)">
    <text x="0" y="-10" font-family="Arial, син-serif" font-size="14" font-weight="bold" fill="#2c3e50">Когерентные источники</text>
    
    <!-- Источник 1 -->
    <circle cx="20" cy="20" r="6" fill="#e74c3c"/>
    <text x="20" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">S₁</text>
    
    <!-- Источник 2 -->
    <circle cx="80" cy="20" r="6" fill="#e74c3c"/>
    <text x="80" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">S₂</text>
    
    <!-- Синхронные волны -->
    <path d="M 20,20 Q 30,15 40,20 T 60,20" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.7"/>
    <path d="M 20,20 Q 30,25 40,20 T 60,20" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.7"/>
    <path d="M 80,20 Q 90,15 100,20 T 120,20" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.7"/>
    <path d="M 80,20 Q 90,25 100,20 T 120,20" fill="none" stroke="#3498db" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Условие когерентности -->
    <text x="50" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Δφ = const</text>
    <text x="50" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Фазовый разность постоянен</text>
  </g>
  
  <!-- Формула для интерференции -->
  <g transform="translate(50, 220)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Формула интерференционной картины:</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Δ = d·sinθ = k·λ</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">где d — расстояние между щелями, θ — угол дифракции,</text>
    <text x="0" y="55" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">k — порядок максимума, λ — длина волны</text>
  </g>
  
  <!-- График зависимости интенсивности от координаты -->
  <g transform="translate(300, 220)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Зависимость интенсивности</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#34495e">I(x) = I₀·cos²(π·d·x/(L·λ))</text>
    
    <!-- Ось X -->
    <line x1="0" y1="60" x2="150" y2="60" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="75" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">x</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="20" x2="0" y2="60" stroke="#2c3e50" stroke-width="1.5"/>
    <text x="-10" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">I</text>
    
    <!-- График интенсивности -->
    <path d="M 0,40 Q 10,25 20,40 T 40,40 Q 50,25 60,40 T 80,40 Q 90,25 100,40 T 120,40 Q 130,25 140,40 T 150,40" 
          fill="none" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Максимумы и минимумы -->
    <circle cx="0" cy="40" r="2" fill="#e74c3c"/>
    <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">0</text>
    <circle cx="30" cy="40" r="2" fill="#e74c3c"/>
    <text x="30" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">λL/d</text>
    <circle cx="60" cy="40" r="2" fill="#e74c3c"/>
    <text x="60" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">2λL/d</text>
    <circle cx="90" cy="40" r="2" fill="#e74c3c"/>
    <text x="90" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">3λL/d</text>
    <circle cx="120" cy="40" r="2" fill="#e74c3c"/>
    <text x="120" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">4λL/d</text>
  </g>
  
  <!-- Дополнительные поясняющие элементы -->
  <g transform="translate(50, 310)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Когерентность: постоянство фазового соотношения между волнами</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Условие наблюдения интерференции: источники должны быть когерентными</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="480" cy="320" r="5" fill="#3498db" opacity="0.5"/>
  <circle cx="470" cy="330" r="3" fill="#e74c3c" opacity="0.5"/>
  <circle cx="490" cy="330" r="4" fill="#2ecc71" opacity="0.5"/>
</svg>