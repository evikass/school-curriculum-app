  <text x="330" y="214" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#C62828" text-anchor="middle">Свойства древесины</text>
  <line x1="200" y1="220" x2="460" y2="220" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>

