<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a69bd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3799;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0984e3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#74b9ff;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b894;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#55efc4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="3" rx="5" />
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#dfe6e9" stroke-width="1" rx="3" />
  
  <!-- Номер урока в углу -->
  <rect x="440" y="20" width="35" height="25" fill="#e17055" rx="3" />
  <text x="457" y="37" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">21</text>
  
  <!-- "АЛГЕБРА · 11 КЛАСС" -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="14" fill="#2d3436" text-anchor="middle" font-style="italic">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2d3436" text-anchor="middle">Урок 21: Перестановки</text>
  
  <!-- Определение перестановки -->
  <rect x="30" y="80" width="440" height="50" fill="#dff0fe" rx="5" />
  <text x="250" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a237e" text-anchor="middle">Определение:</text>
  <text x="250" y="120" font-family="Arial, sans-serif" font-size="12" fill="#283593" text-anchor="middle">Перестановка - это упорядоченный набор из n различных элементов</text>
  
  <!-- Схема с элементами -->
  <g transform="translate(40, 150)">
    <!-- Элементы -->
    <rect x="0" y="0" width="40" height="40" fill="url(#blueGrad)" rx="5" />
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="1">1</text>
    
    <rect x="50" y="0" width="40" height="40" fill="url(#blueGrad)" rx="5" />
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">2</text>
    
    <rect x="100" y="0" width="40" height="40" fill="url(#blueGrad)" rx="5" />
    <text x="120" y="25" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">3</text>
    
    <text x="160" y="25" font-family="Arial, sans-serif" font-size="20" fill="#2d3436">→</text>
    
    <!-- Перестановки -->
    <rect x="190" y="0" width="40" height="40" fill="url(#greenGrad)" rx="5" />
    <text x="210" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">2</text>
    
    <rect x="240" y="0" width="40" height="40" fill="url(#greenGrad)" rx="5" />
    <text x="260" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
    
    <rect x="290" y="0" width="40" height="40" fill="url(#greenGrad)" rx="5" />
    <text x="310" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">3</text>
    
    <text x="350" y="25" font-family="Arial, sans-serif" font-size="20" fill="#2d3436">→</text>
    
    <rect x="380" y="0" width="40" height="40" fill="url(#blueGrad)" rx="5" />
    <text x="400" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">1</text>
    
    <rect x="430" y="0" width="40" height="40" fill="url(#blueGrad)" rx="5" />
    <text x="450" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">2</text>
    
    <rect x="480" y="0" width="40" height="40" fill="url(#blueGrad)" rx="5" />
    <text x="500" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">3</text>
  </g>
  
  <!-- Подпись к схеме -->
  <text x="250" y="210" font-family="Arial, sans-serif" font-size="12" fill="#636e72" text-anchor="middle">Пример перестановки элементов</text>
  
  <!-- Формула Pn = n! -->
  <rect x="150" y="225" width="200" height="40" fill="#fff3e0" rx="5" />
  <text x="250" y="250" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e65100" text-anchor="middle">P<sub>n</sub> = n!</text>
  
  <!-- Объяснение формулы -->
  <text x="40" y="285" font-family="Arial, sans-serif" font-size="12" fill="#37474f">P<sub>n</sub> - число перестановок из n элементов</text>
  <text x="40" y="305" font-family="Arial, sans-serif" font-size="12" fill="#37474f">n! = 1 · 2 · 3 · ... · n - факториал числа n</text>
  
  <!-- Примеры вычислений -->
  <text x="40" y="330" font-family="Arial, sans-serif" font-size="12" fill="#37474f">Примеры:</text>
  <text x="90" y="330" font-family="Arial, sans-serif" font-size="12" fill="#37474f">P<sub>3</sub> = 3! = 6</text>
  <text x="160" y="330" font-family="Arial, sans-serif" font-size="12" fill="#37474f">P<sub>4</sub> = 4! = 24</text>
  <text x="230" y="330" font-family="Arial, sans-serif" font-size="12" fill="#37474f">P<sub>5</sub> = 5! = 120</text>
  
  <!-- Дополнительные элементы для объема -->
  <circle cx="30" cy="250" r="3" fill="#e74c3c" />
  <circle cx="30" cy="265" r="3" fill="#e74c3c" />
  <circle cx="30" cy="280" r="3" fill="#e74c3c" />
  <circle cx="30" cy="295" r="3" fill="#e74c3c" />
  <circle cx="30" cy="310" r="3" fill="#e74c3c" />
  
  <circle cx="470" cy="250" r="3" fill="#e74c3c" />
  <circle cx="470" cy="265" r="3" fill="#e74c3c" />
  <circle cx="470" cy="280" r="3" fill="#e74c3c" />
  <circle cx="470" cy="295" r="3" fill="#e74c3c" />
  <circle cx="470" cy="310" r="3" fill="#e74c3c" />
  
  <!-- Декоративные линии -->
  <line x1="50" y1="235" x2="450" y2="235" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="5,5" />
</svg>