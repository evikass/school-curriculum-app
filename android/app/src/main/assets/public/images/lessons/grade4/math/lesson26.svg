<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Задачи на противоположное движение</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Движение в противоположных направлениях</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Road with center point -->
  <rect x="30" y="150" width="440" height="30" fill="#1a1a1a" opacity="0.1" rx="4" />
  
  <!-- Center point -->
  <circle cx="250" cy="165" r="5" fill="#C41E3A" />
  <text x="250" y="145" text-anchor="middle" fill="#C41E3A" font-size="10" font-weight="bold">Пункт А</text>
  
  <!-- Left car -->
  <rect x="60" y="142" width="45" height="20" fill="#2B4C7E" opacity="0.7" rx="4" />
  <circle cx="72" cy="165" r="5" fill="#1a1a1a" />
  <circle cx="95" cy="165" r="5" fill="#1a1a1a" />
  <line x1="110" y1="152" x2="70" y2="152" stroke="#2B4C7E" stroke-width="2" />
  <polygon points="70,152 80,147 80,157" fill="#2B4C7E" />
  
  <!-- Right car -->
  <rect x="395" y="142" width="45" height="20" fill="#C41E3A" opacity="0.7" rx="4" />
  <circle cx="407" cy="165" r="5" fill="#1a1a1a" />
  <circle cx="430" cy="165" r="5" fill="#1a1a1a" />
  <line x1="390" y1="152" x2="430" y2="152" stroke="#C41E3A" stroke-width="2" />
  <polygon points="430,152 420,147 420,157" fill="#C41E3A" />
  
  <!-- Distance labels -->
  <text x="80" y="200" text-anchor="middle" fill="#2B4C7E" font-size="12" font-weight="bold">50 км/ч</text>
  <text x="420" y="200" text-anchor="middle" fill="#C41E3A" font-size="12" font-weight="bold">60 км/ч</text>
  
  <!-- Expanding distance arrows -->
  <line x1="60" y1="215" x2="240" y2="215" stroke="#2B4C7E" stroke-width="2" />
  <polygon points="60,215 70,210 70,220" fill="#2B4C7E" />
  <line x1="260" y1="215" x2="440" y2="215" stroke="#C41E3A" stroke-width="2" />
  <polygon points="440,215 430,210 430,220" fill="#C41E3A" />
  <text x="150" y="232" text-anchor="middle" fill="#2B4C7E" font-size="11">50 x 2 = 100 км</text>
  <text x="350" y="232" text-anchor="middle" fill="#C41E3A" font-size="11">60 x 2 = 120 км</text>
  
  <!-- Total distance -->
  <rect x="100" y="245" width="300" height="55" fill="#D4A843" opacity="0.2" rx="6" stroke="#D4A843" stroke-width="2" />
  <text x="250" y="268" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">d = (v1 + v2) x t</text>
  <text x="250" y="290" text-anchor="middle" fill="#1a1a1a" font-size="13">d = (50 + 60) x 2 = 220 км</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>