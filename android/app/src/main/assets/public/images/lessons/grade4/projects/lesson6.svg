<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Работа с материалами</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Создание макетов</text>
  <!-- Illustration area -->
  <rect x="120" y="140" width="100" height="120" rx="3" fill="#b0a080" stroke="#8a7a60" stroke-width="2"/><text x="170" y="210" text-anchor="middle" font-size="12" fill="#5a4a30" font-family="Arial">Картон</text><rect x="280" y="150" width="80" height="100" rx="2" fill="#fff" stroke="#999" stroke-width="1.5"/><text x="320" y="210" text-anchor="middle" font-size="11" fill="#666" font-family="Arial">Бумага</text><!-- Scissors --><polygon points="160,120 180,155 175,160 155,125" fill="#C0C0C0" stroke="#888" stroke-width="1"/><polygon points="165,120 145,155 140,160 160,125" fill="#C0C0C0" stroke="#888" stroke-width="1"/><circle cx="160" cy="125" r="3" fill="#888"/><!-- Glue bottle --><rect x="310" y="110" width="20" height="35" rx="4" fill="#fff" stroke="#ddd" stroke-width="1"/><rect x="314" y="105" width="12" height="10" rx="3" fill="#87CEEB"/><rect x="317" y="100" width="6" height="8" rx="2" fill="#87CEEB"/><text x="250" y="290" text-anchor="middle" font-size="11" fill="#C41E3A" font-weight="bold" font-family="Arial">Режь от себя!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Проектная деятельность</text>
</svg>