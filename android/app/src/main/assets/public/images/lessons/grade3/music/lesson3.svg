<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="musicBg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#musicBg3)"/>
  
  <!-- Sun -->
  <circle cx="445" cy="50" r="24" fill="#FFD700" opacity="0.85">
    <animate attributeName="r" values="24;28;24" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.75">
    <ellipse cx="110" cy="45" rx="28" ry="16" fill="white"/>
    <ellipse cx="135" cy="40" rx="22" ry="13" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="35" cy="280" rx="22" ry="35" fill="#228B22"/>
    <rect x="30" y="280" width="10" height="20" fill="#5D4037"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#FF9800"/>
    <circle cx="47" cy="320" r="4" fill="#FFB74D"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E65100" text-anchor="middle">🎼 Ноты и нотный стан</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#E65100" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.92" stroke="#FF9800" stroke-width="2"/>
  
  <!-- Staff -->
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Нотный стан / Musical staff</text>
  
  <!-- Staff lines -->
  <g transform="translate(60, 95)">
    <line x1="0" y1="0" x2="380" y2="0" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="12" x2="380" y2="12" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="24" x2="380" y2="24" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="36" x2="380" y2="36" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="48" x2="380" y2="48" stroke="#333" stroke-width="1"/>
    
    <!-- Treble clef -->
    <text x="15" y="35" font-size="45" fill="#E65100">𝄞</text>
    
    <!-- Notes -->
    <ellipse cx="100" cy="48" rx="8" ry="6" fill="#E91E63"/>
    <text x="100" y="68" font-size="10" fill="#E91E63" text-anchor="middle">ДО</text>
    
    <ellipse cx="150" cy="42" rx="8" ry="6" fill="#FF5722"/>
    <text x="150" y="68" font-size="10" fill="#FF5722" text-anchor="middle">РЕ</text>
    
    <ellipse cx="200" cy="36" rx="8" ry="6" fill="#FFC107"/>
    <text x="200" y="68" font-size="10" fill="#FFC107" text-anchor="middle">МИ</text>
    
    <ellipse cx="250" cy="30" rx="8" ry="6" fill="#4CAF50"/>
    <text x="250" y="68" font-size="10" fill="#4CAF50" text-anchor="middle">ФА</text>
    
    <ellipse cx="300" cy="24" rx="8" ry="6" fill="#2196F3"/>
    <text x="300" y="68" font-size="10" fill="#2196F3" text-anchor="middle">СОЛЬ</text>
    
    <ellipse cx="350" cy="18" rx="8" ry="6" fill="#9C27B0"/>
    <text x="350" y="68" font-size="10" fill="#9C27B0" text-anchor="middle">ЛЯ</text>
  </g>
  
  <!-- Note names -->
  <rect x="50" y="175" width="400" height="55" rx="10" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="250" y="195" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">🎵 Названия нот / Note names</text>
  <g transform="translate(70, 210)">
    <text x="0" y="12" font-size="9" fill="#E91E63">ДО (C)</text>
    <text x="60" y="12" font-size="9" fill="#FF5722">РЕ (D)</text>
    <text x="120" y="12" font-size="9" fill="#FFC107">МИ (E)</text>
    <text x="180" y="12" font-size="9" fill="#4CAF50">ФА (F)</text>
    <text x="240" y="12" font-size="9" fill="#2196F3">СОЛЬ (G)</text>
    <text x="310" y="12" font-size="9" fill="#9C27B0">ЛЯ (A)</text>
    <text x="0" y="28" font-size="9" fill="#E91E63">СИ (B)</text>
  </g>
  
  <!-- Memory helper -->
  <rect x="80" y="240" width="340" height="65" rx="10" fill="#FCE4EC" stroke="#E91E63"/>
  <text x="250" y="260" font-size="10" font-weight="bold" fill="#C2185B" text-anchor="middle">💡 Как запомнить:</text>
  <text x="250" y="280" font-size="10" fill="#333" text-anchor="middle">"ДО Ре МИ Фа СОЛЬ Ля СИ"</text>
  <text x="250" y="296" font-size="9" fill="#666" text-anchor="middle">— Первые слоги гимна святому Иоанну</text>
  
  <!-- Decorative notes -->
  <g transform="translate(55, 275)" opacity="0.5">
    <text font-size="18">🎵🎶</text>
  </g>
</svg>