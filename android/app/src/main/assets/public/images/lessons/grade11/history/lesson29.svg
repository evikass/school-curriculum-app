<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#8B4513" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#A0522D" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2C3E50">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#34495E">Россия 2000-х: Эпоха роста</text>
  <text x="470" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7F8C8D">Урок 15</text>
  
  <!-- Градиент для фона -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D1E7F5;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980B9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="bridgeGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7F8C8D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect x="15" y="65" width="470" height="270" fill="url(#bgGradient)" rx="5"/>
  
  <!-- Портрет Путина -->
  <circle cx="80" cy="120" r="25" fill="#FDBCB4"/>
  <path d="M80 95 C70 95, 65 105, 65 115 C65 120, 70 125, 75 125 L85 125 C90 125, 95 120, 95 115 C95 105, 90 95, 80 95 Z" fill="#2C3E50"/>
  <circle cx="73" cy="115" r="2" fill="#2C3E50"/>
  <circle cx="87" cy="115" r="2" fill="#2C3E50"/>
  <path d="M75 125 Q80 128, 85 125" fill="none" stroke="#2C3E50" stroke-width="1.5" stroke-linecap="round"/>
  <text x="80" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">В. Путин</text>
  
  <!-- График роста ВВП -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="120" height="80" fill="white" stroke="#BDC3C7" stroke-width="1" rx="3"/>
    <line x1="10" y1="70" x2="110" y2="70" stroke="#7F8C8D" stroke-width="1"/>
    <line x1="10" y1="10" x2="10" y2="70" stroke="#7F8C8D" stroke-width="1"/>
    
    <!-- График роста -->
    <path d="M15,65 L30,60 L45,50 L60,40 L75,25 L90,15 L105,10" fill="none" stroke="url(#chartGradient)" stroke-width="2"/>
    <polyline points="15,65 30,60 45,50 60,40 75,25 90,15 105,10" fill="none" stroke="#2980B9" stroke-width="2"/>
    
    <!-- Точки на графике -->
    <circle cx="15" cy="65" r="2" fill="#3498DB"/>
    <circle cx="30" cy="60" r="2" fill="#3498DB"/>
    <circle cx="45" cy="50" r="2" fill="#3498DB"/>
    <circle cx="60" cy="40" r="2" fill="#3498DB"/>
    <circle cx="75" cy="25" r="2" fill="#3498DB"/>
    <circle cx="90" cy="15" r="2" fill="#3498DB"/>
    <circle cx="105" cy="10" r="2" fill="#3498DB"/>
    
    <text x="60" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Рост ВВП: 7%</text>
  </g>
  
  <!-- Карта России с Крымским мостом -->
  <g transform="translate(300, 100)">
    <!-- Карта России -->
    <path d="M20,30 Q40,25 60,28 Q80,30 100,35 Q110,40 105,50 Q100,55 90,58 Q80,60 70,58 Q60,55 50,52 Q40,50 30,48 Q25,40 20,30" fill="#E8F6F3" stroke="#27AE60" stroke-width="1.5"/>
    
    <!-- Крым -->
    <path d="M110,50 Q115,45 120,48 Q125,52 122,58 Q118,60 112,58 Q108,55 110,50" fill="#E8F6F3" stroke="#27AE60" stroke-width="1.5"/>
    
    <!-- Мост -->
    <line x1="100" y1="35" x2="110" y2="50" stroke="url(#bridgeGradient)" stroke-width="3"/>
    <line x1="102" y1="38" x2="112" y2="53" stroke="#ECF0F1" stroke-width="1"/>
    <line x1="98" y1="32" x2="108" y2="47" stroke="#ECF0F1" stroke-width="1"/>
    
    <text x="60" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Крымский мост</text>
    <text x="60" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">2018 г.</text>
  </g>
  
  <!-- Хронологическая лента -->
  <g transform="translate(50, 210)">
    <rect x="0" y="0" width="400" height="30" fill="#F8C471" stroke="#E67E22" stroke-width="1" rx="5"/>
    
    <!-- Годы -->
    <circle cx="40" cy="15" r="8" fill="#E74C3C"/>
    <text x="40" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">2000</text>
    
    <circle cx="120" cy="15" r="8" fill="#E74C3C"/>
    <text x="120" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">2004</text>
    
    <circle cx="200" cy="15" r="8" fill="#E74C3C"/>
    <text x="200" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">2008</text>
    
    <circle cx="280" cy="15" r="8" fill="#E74C3C"/>
    <text x="280" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">2012</text>
    
    <circle cx="360" cy="15" r="8" fill="#E74C3C"/>
    <text x="360" y="19" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" font-weight="bold">2014</text>
    
    <text x="200" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">Хронология событий</text>
  </g>
  
  <!-- Нацпроекты -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="100" height="40" fill="#F5B7B1" stroke="#E74C3C" stroke-width="1" rx="3"/>
    <text x="50" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Национальные</text>
    <text x="50" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">проекты</text>
    
    <rect x="120" y="0" width="100" height="40" fill="#ABEBC6" stroke="#27AE60" stroke-width="1" rx="3"/>
    <text x="170" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Стабильность</text>
    <text x="170" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">общества</text>
    
    <rect x="240" y="0" width="100" height="40" fill="#D5DBDB" stroke="#7F8C8D" stroke-width="1" rx="3"/>
    <text x="290" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Экономический</text>
    <text x="290" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">рост</text>
    
    <rect x="360" y="0" width="100" height="40" fill="#D6EAF8" stroke="#3498DB" stroke-width="1" rx="3"/>
    <text x="410" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Международное</text>
    <text x="410" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">влияние</text>
  </g>
  
  <!-- Декоративные элементы -->
  <path d="M30,65 L35,70 L40,65" fill="none" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M460,65 L465,70 L470,65" fill="none" stroke="#E74C3C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Формула роста -->
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">ВВП = В₀ × (1 + r)ᵗ, где r = 7%</text>
  
  <!-- Даты ключевых событий -->
  <text x="50" y="340" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">2000-2014: Эпоха стабильного роста</text>
</svg>