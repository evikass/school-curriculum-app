<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="graphGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="funcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="url(#frameGrad)" stroke-width="4" rx="10"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#ecf0f1" stroke-width="1" rx="8"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#34495e">Урок 9: Производная сложной функции</text>
  
  <!-- Номер урока в углу -->
  <circle cx="30" cy="30" r="18" fill="#3498db"/>
  <text x="30" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">9</text>
  
  <!-- Система координат -->
  <line x1="80" y1="250" x2="420" y2="250" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="80" y1="100" x2="80" y2="250" stroke="#7f8c8d" stroke-width="2"/>
  
  <!-- Стрелки на осях -->
  <polygon points="420,250 410,245 410,255" fill="#7f8c8d"/>
  <polygon points="80,100 75,110 85,110" fill="#7f8c8d"/>
  
  <!-- Подписи осей -->
  <text x="430" y="255" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">x</text>
  <text x="70" y="95" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">y</text>
  
  <!-- Цепное правило - формула -->
  <rect x="90" y="85" width="150" height="40" fill="#ecf0f1" stroke="#3498db" stroke-width="1" rx="5"/>
  <text x="165" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">(f∘g)'(x) = f'(g(x))·g'(x)</text>
  
  <!-- График сложной функции -->
  <path d="M 100,240 Q 150,220 200,180 T 300,150 Q 350,140 400,130" fill="none" stroke="url(#funcGrad)" stroke-width="3"/>
  
  <!-- Точки на графике -->
  <circle cx="150" cy="210" r="5" fill="#e74c3c"/>
  <circle cx="250" cy="170" r="5" fill="#e74c3c"/>
  <circle cx="350" cy="140" r="5" fill="#e74c3c"/>
  
  <!-- Подписи точек -->
  <text x="150" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">x</text>
  <text x="250" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">x+h</text>
  
  <!-- Вертикальные линии -->
  <line x1="150" y1="210" x2="150" y2="250" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="250" y1="170" x2="250" y2="250" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Вспомогательный график -->
  <rect x="260" y="85" width="230" height="140" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="5"/>
  <text x="375" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Внутренняя функция g(x)</text>
  
  <!-- Ось для g(x) -->
  <line x1="280" y1="200" x2="470" y2="200" stroke="#7f8c8d" stroke-width="1.5"/>
  <line x1="280" y1="120" x2="280" y2="200" stroke="#7f8c8d" stroke-width="1.5"/>
  
  <!-- График g(x) -->
  <path d="M 300,190 Q 340,170 380,150 T 450,130" fill="none" stroke="#9b59b6" stroke-width="2.5"/>
  
  <!-- Точки на g(x) -->
  <circle cx="340" cy="170" r="4" fill="#e74c3c"/>
  <circle cx="400" cy="140" r="4" fill="#e74c3c"/>
  
  <!-- Формула для производной -->
  <rect x="90" y="140" width="160" height="35" fill="#e8f4f8" stroke="#3498db" stroke-width="1" rx="5"/>
  <text x="170" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2c3e50">f'(x) = lim(h→0) [f(x+h)-f(x)]/h</text>
  
  <!-- Поясняющая диаграмма -->
  <rect x="270" y="240" width="210" height="80" fill="#fef5e7" stroke="#f39c12" stroke-width="1" rx="5"/>
  <text x="375" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Правило дифференцирования</text>
  <text x="375" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">1. Найти производную внешней функции</text>
  <text x="375" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">2. Умножить на производную внутренней функции</text>
  
  <!-- Стрелки, показывающие процесс -->
  <path d="M 170,180 L 170,220" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 340,180 L 280,220" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Определение стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Примеры функций -->
  <rect x="90" y="180" width="150" height="50" fill="#eaf2f8" stroke="#3498db" stroke-width="1" rx="5"/>
  <text x="165" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Примеры:</text>
  <text x="165" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">y = sin(x²)</text>
  <text x="165" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">y = e^(3x+1)</text>
  
  <!-- Значения производных -->
  <rect x="260" y="140" width="100" height="40" fill="#fadbd8" stroke="#e74c3c" stroke-width="1" rx="5"/>
  <text x="310" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">f'(x) = 2x·cos(x²)</text>
  
  <!-- Схема композиции функций -->
  <rect x="90" y="270" width="80" height="30" fill="#d5f4e6" stroke="#27ae60" stroke-width="1" rx="5"/>
  <text x="130" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">f(g(x))</text>
  
  <path d="M 170,285 L 190,285" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead2)"/>
  
  <rect x="190" y="270" width="40" height="30" fill="#d5f4e6" stroke="#27ae60" stroke-width="1" rx="5"/>
  <text x="210" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">f(u)</text>
  
  <path d="M 230,285 L 250,285" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead2)"/>
  
  <rect x="250" y="270" width="40" height="30" fill="#d5f4e6" stroke="#27ae60" stroke-width="1" rx="5"/>
  <text x="270" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">u=g(x)</text>
  
  <!-- Определение стрелки 2 -->
  <defs>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34495e"/>
    </marker>
  </defs>
  
  <!-- Подпись "Производная" -->
  <text x="310" y="285" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" transform="rotate(-90, 310, 285)">Производная</text>
  
  <!-- Дополнительные элементы оформления -->
  <circle cx="450" cy="30" r="8" fill="#e74c3c" opacity="0.3"/>
  <circle cx="470" cy="40" r="6" fill="#3498db" opacity="0.3"/>
  <circle cx="460" cy="50" r="4" fill="#2ecc71" opacity="0.3"/>
  
  <!-- Легенда -->
  <rect x="360" y="240" width="120" height="60" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="5"/>
  <text x="420" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Легенда:</text>
  <line x1="370" y1="275" x2="390" y2="275" stroke="url(#funcGrad)" stroke-width="3"/>
  <text x="395" y="280" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">f(g(x))</text>
  <line x1="370" y1="290" x2="390" y2="290" stroke="#9b59b6" stroke-width="2.5"/>
  <text x="395" y="295" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">g(x)</text>
</svg>