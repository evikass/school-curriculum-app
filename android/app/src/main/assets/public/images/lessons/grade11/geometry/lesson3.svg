<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="axisGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="pointGrad">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a24;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1e3c72">Урок 3: Прямоугольная система координат в пространстве</text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">Координаты точки, расстояние, середина</text>
  
  <!-- Номер урока -->
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e3c72">№3</text>
  <text x="30" y="50" font-family="Arial, sans-serif" font-size="12" fill="#666">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Оси координат -->
  <line x1="80" y1="280" x2="420" y2="280" stroke="url(#axisGrad)" stroke-width="2" marker-end="url(#arrowX)"/>
  <line x1="80" y1="280" x2="80" y2="80" stroke="url(#axisGrad)" stroke-width="2" marker-end="url(#arrowY)"/>
  <line x1="80" y1="280" x2="60" y2="300" stroke="url(#axisGrad)" stroke-width="2" marker-end="url(#arrowZ)"/>
  
  <!-- Стрелки для осей -->
  <defs>
    <marker id="arrowX" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <marker id="arrowY" markerWidth="10" markerHeight="10" refX="3" refY="0" orient="auto" markerUnits="strokeWidth">
      <path d="M0,9 L6,9 L3,0 z" fill="#333"/>
    </marker>
    <marker id="arrowZ" markerWidth="10" markerHeight="10" refX="3" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,0 L3,9 z" fill="#333"/>
    </marker>
  </defs>
  
  <!-- Подписи осей -->
  <text x="425" y="285" font-family="Arial, sans-serif" font-size="14" fill="#333">x</text>
  <text x="75" y="75" font-family="Arial, sans-serif" font-size="14" fill="#333">y</text>
  <text x="45" y="305" font-family="Arial, sans-serif" font-size="14" fill="#333">z</text>
  
  <!-- Шкалы на осях -->
  <g stroke="#999" stroke-width="1">
    <line x1="140" y1="275" x2="140" y2="285"/>
    <line x1="200" y1="275" x2="200" y2="285"/>
    <line x1="260" y1="275" x2="260" y2="285"/>
    <line x1="320" y1="275" x2="320" y2="285"/>
    <line x1="380" y1="275" x2="380" y2="285"/>
    
    <line x1="75" y1="240" x2="85" y2="240"/>
    <line x1="75" y1="200" x2="85" y2="200"/>
    <line x1="75" y1="160" x2="85" y2="160"/>
    <line x1="75" y1="120" x2="85" y2="120"/>
  </g>
  
  <!-- Подписи шкал -->
  <g font-family="Arial, sans-serif" font-size="10" fill="#666">
    <text x="135" y="295" text-anchor="middle">1</text>
    <text x="195" y="295" text-anchor="middle">2</text>
    <text x="255" y="295" text-anchor="middle">3</text>
    <text x="315" y="295" text-anchor="middle">4</text>
    <text x="375" y="295" text-anchor="middle">5</text>
    
    <text x="70" y="244" text-anchor="end">1</text>
    <text x="70" y="204" text-anchor="end">2</text>
    <text x="70" y="164" text-anchor="end">3</text>
    <text x="70" y="124" text-anchor="end">4</text>
  </g>
  
  <!-- Точка в пространстве -->
  <circle cx="290" cy="150" r="6" fill="url(#pointGrad)"/>
  
  <!-- Проекции точки на оси -->
  <line x1="290" y1="150" x2="290" y2="280" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="80" y1="150" x2="290" y2="150" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="290" y1="150" x2="290" y2="280" stroke="#4ecdc4" stroke-width="1" stroke-dasharray="3,2"/>
  
  <!-- Координаты точки -->
  <text x="295" y="145" font-family="Arial, sans-serif" font-size="12" fill="#333">M(x,y,z)</text>
  
  <!-- Прямоугольник для визуализации координат -->
  <rect x="80" y="150" width="210" height="130" fill="none" stroke="#95e1d3" stroke-width="1" opacity="0.5"/>
  
  <!-- Формулы -->
  <g transform="translate(320, 100)">
    <rect x="0" y="0" width="160" height="120" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="5"/>
    <text x="80" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Формулы:</text>
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="11" fill="#333">Координаты точки:</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="11" fill="#333">M(x,y,z)</text>
    
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="11" fill="#333">Расстояние:</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="11" fill="#333">d = √((x₂-x₁)² + (y₂-y₁)² + (z₂-z₁)²)</text>
    
    <text x="10" y="110" font-family="Arial, sans-serif" font-size="11" fill="#333">Середина:</text>
    <text x="10" y="125" font-family="Arial, sans-serif" font-size="11" fill="#333">M((x₁+x₂)/2, (y₁+y₂)/2, (z₁+z₂)/2)</text>
  </g>
  
  <!-- Примеры точек -->
  <g transform="translate(100, 100)">
    <circle cx="0" cy="0" r="4" fill="#a29bfe"/>
    <text x="10" y="5" font-family="Arial, sans-serif" font-size="10" fill="#333">A(1,3,2)</text>
    
    <circle cx="50" cy="30" r="4" fill="#6c5ce7"/>
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333">B(4,1,1)</text>
    
    <line x1="0" y1="0" x2="50" y2="30" stroke="#74b9ff" stroke-width="1" stroke-dasharray="2,2"/>
    
    <text x="25" y="15" font-family="Arial, sans-serif" font-size="9" fill="#333">d(A,B)</text>
  </g>
  
  <!-- Вспомогательные линии для примера -->
  <g stroke="#74b9ff" stroke-width="1" stroke-dasharray="2,2" fill="none">
    <line x1="180" y1="130" x2="230" y2="130"/>
    <line x1="230" y1="130" x2="230" y2="180"/>
    <line x1="230" y1="180" x2="150" y2="180"/>
  </g>
  
  <!-- Дополнительные элементы оформления -->
  <g opacity="0.3">
    <circle cx="150" cy="220" r="20" fill="none" stroke="#ffeaa7" stroke-width="1"/>
    <circle cx="350" cy="120" r="15" fill="none" stroke="#fab1a0" stroke-width="1"/>
    <circle cx="120" cy="170" r="10" fill="none" stroke="#81ecec" stroke-width="1"/>
  </g>
  
  <!-- Примечание -->
  <text x="250" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666" font-style="italic">
    Прямоугольная система координат позволяет точно определять положение объектов в пространстве
  </text>
  
  <!-- Сетка для наглядности -->
  <g stroke="#eee" stroke-width="0.5">
    <line x1="140" y1="80" x2="140" y2="280"/>
    <line x1="200" y1="80" x2="200" y2="280"/>
    <line x1="260" y1="80" x2="260" y2="280"/>
    <line x1="320" y1="80" x2="320" y2="280"/>
    <line x1="380" y1="80" x2="380" y2="280"/>
    
    <line x1="80" y1="240" x2="420" y2="240"/>
    <line x1="80" y1="200" x2="420" y2="200"/>
    <line x1="80" y1="160" x2="420" y2="160"/>
    <line x1="80" y1="120" x2="420" y2="120"/>
  </g>
</svg>