<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="factoryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9E9E9E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#616161;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="tankGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#795548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D4037;stop-opacity:1" />
    </linearGradient>
    
    <!-- Тень -->
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#8B4513" stroke-width="4" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#A0522D" stroke-width="2" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495E">Урок 12</text>
  
  <!-- Основной заголовок -->
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#8B4513">Советский тыл в войне</text>
  
  <!-- Карта эвакуации -->
  <g transform="translate(20, 90)">
    <rect x="0" y="0" width="180" height="120" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5" rx="5"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2E7D32">Карта эвакуации</text>
    
    <!-- Западная граница -->
    <path d="M20,60 L40,60" stroke="#F44336" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="30" y="55" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#D32F2F">Запад</text>
    
    <!-- Стрелка эвакуации -->
    <path d="M30,40 Q60,50 90,40" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M90,40 Q120,50 150,40" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
    <!-- Урал -->
    <rect x="140" y="35" width="30" height="50" fill="#81C784" stroke="#388E3C" stroke-width="1"/>
    <text x="155" y="65" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#1B5E20">Урал</text>
  </g>
  
  <!-- Схема завода -->
  <g transform="translate(220, 90)">
    <rect x="0" y="0" width="260" height="120" fill="#E3F2FD" stroke="#1976D2" stroke-width="1.5" rx="5"/>
    <text x="130" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#0D47A1">Завод в Урбаше</text>
    
    <!-- Конвейер с танками -->
    <rect x="20" y="40" width="220" height="20" fill="url(#factoryGrad)" stroke="#424242" stroke-width="1"/>
    
    <!-- Танк 1 -->
    <g transform="translate(40, 35)">
      <rect x="0" y="0" width="35" height="15" fill="url(#tankGrad)" rx="2"/>
      <circle cx="8" cy="12" r="3" fill="#424242"/>
      <circle cx="27" cy="12" r="3" fill="#424242"/>
      <rect x="10" y="-5" width="15" height="8" fill="url(#tankGrad)" rx="1"/>
      <text x="17.5" y="30" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#5D4037">Т-34</text>
    </g>
    
    <!-- Танк 2 -->
    <g transform="translate(100, 35)">
      <rect x="0" y="0" width="35" height="15" fill="url(#tankGrad)" rx="2"/>
      <circle cx="8" cy="12" r="3" fill="#424242"/>
      <circle cx="27" cy="12" r="3" fill="#424242"/>
      <rect x="10" y="-5" width="15" height="8" fill="url(#tankGrad)" rx="1"/>
      <text x="17.5" y="30" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#5D4037">Т-34</text>
    </g>
    
    <!-- Танк 3 -->
    <g transform="translate(160, 35)">
      <rect x="0" y="0" width="35" height="15" fill="url(#tankGrad)" rx="2"/>
      <circle cx="8" cy="12" r="3" fill="#424242"/>
      <circle cx="27" cy="12" r="3" fill="#424242"/>
      <rect x="10" y="-5" width="15" height="8" fill="url(#tankGrad)" rx="1"/>
      <text x="17.5" y="30" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#5D4037">Т-34</text>
    </g>
    
    <!-- Женщины у станков -->
    <g transform="translate(20, 75)">
      <circle cx="10" cy="5" r="5" fill="#FFAB91"/>
      <path d="M5,10 L5,20 L15,20 L15,10" fill="#9C27B0"/>
      <path d="M10,10 L10,5" stroke="#795548" stroke-width="1"/>
      <rect x="0" y="20" width="20" height="15" fill="#9E9E9E"/>
      <text x="10" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#616161">рабочая</text>
    </g>
    
    <g transform="translate(50, 75)">
      <circle cx="10" cy="5" r="5" fill="#FFAB91"/>
      <path d="M5,10 L5,20 L15,20 L15,10" fill="#673AB7"/>
      <path d="M10,10 L10,5" stroke="#795548" stroke-width="1"/>
      <rect x="0" y="20" width="20" height="15" fill="#9E9E9E"/>
      <text x="10" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#616161">рабочая</text>
    </g>
  </g>
  
  <!-- Хронология -->
  <g transform="translate(20, 230)">
    <rect x="0" y="0" width="460" height="100" fill="#FFF8E1" stroke="#FFA000" stroke-width="1.5" rx="5"/>
    <text x="230" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#E65100">Хронология событий</text>
    
    <!-- Лента времени -->
    <line x1="30" y1="50" x2="430" y2="50" stroke="#FF6F00" stroke-width="3"/>
    
    <!-- 1941 -->
    <circle cx="80" cy="50" r="5" fill="#FF6F00"/>
    <text x="80" y="35" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#E65100">1941</text>
    <text x="80" y="70" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#BF360C">Начало эвакуации</text>
    
    <!-- 1942 -->
    <circle cx="180" cy="50" r="5" fill="#FF6F00"/>
    <text x="180" y="35" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#E65100">1942</text>
    <text x="180" y="70" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#BF360C">Пик производства</text>
    
    <!-- 1943 -->
    <circle cx="280" cy="50" r="5" fill="#FF6F00"/>
    <text x="280" y="35" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#E65100">1943</text>
    <text x="280" y="70" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#BF360C">Рост ленд-лиза</text>
    
    <!-- 1944 -->
    <circle cx="380" cy="50" r="5" fill="#FF6F00"/>
    <text x="380" y="35" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#E65100">1944</text>
    <text x="380" y="70" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#BF360C">Массовое производство</text>
  </g>
  
  <!-- График производства -->
  <g transform="translate(30, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#E65100">Танков в месяц:</text>
    <polyline points="0,20 50,15 100,10 150,5 200,3 250,2" fill="none" stroke="#F44336" stroke-width="2"/>
    <circle cx="0" cy="20" r="2" fill="#F44336"/>
    <circle cx="50" cy="15" r="2" fill="#F44336"/>
    <circle cx="100" cy="10" r="2" fill="#F44336"/>
    <circle cx="150" cy="5" r="2" fill="#F44336"/>
    <circle cx="200" cy="3" r="2" fill="#F44336"/>
    <circle cx="250" cy="2" r="2" fill="#F44336"/>
  </g>
  
  <!-- Ленд-лиз информация -->
  <g transform="translate(300, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#0D47A1">Ленд-лиз:</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#1565C0">1941-1945: 17.5 млн тонн</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="9" fill="#1565C0">оборудования и материалов</text>
  </g>
  
  <!-- Формула производства -->
  <g transform="translate(30, 290)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32">Формула производства:</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#388E3C">P = W × H × E</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20">P - продукция, W - женщины, H - часы, E - оборудование</text>
  </g>
  
  <!-- Статистика -->
  <g transform="translate(200, 290)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#6A1B9A">Женщины в промышленности:</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#7B1FA2">1941: 31%</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="9" fill="#7B1FA2">1945: 53%</text>
  </g>
  
  <!-- Дополнительные элементы -->
  <g transform="translate(400, 280)">
    <circle cx="0" cy="0" r="15" fill="#FFD54F" stroke="#F57C00" stroke-width="1"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#E65100">1945</text>
  </g>
  
  <!-- Символ победы -->
  <g transform="translate(420, 250)">
    <path d="M0,10 L5,0 L10,5 L15,0 L20,10 L10,15 Z" fill="#FFD700" stroke="#FFA000" stroke-width="1"/>
    <text x="10" y="25" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#E65100">Победа</text>
  </g>
  
  <!-- Маркер стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2196F3"/>
    </marker>
  </defs>
</svg>