<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#1a3a5f" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3a5a80" stroke-width="1" rx="3"/>
  
  <!-- Номер урока -->
  <circle cx="460" cy="30" r="15" fill="#1a3a5f"/>
  <text x="460" y="35" text-anchor="middle" fill="white" font-size="14" font-weight="bold">30</text>
  
  <!-- Заголовок класса -->
  <text x="250" y="30" text-anchor="middle" font-size="16" fill="#1a3a5f" font-weight="bold">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" text-anchor="middle" font-size="20" fill="#1a3a5f" font-weight="bold">Урок 30: Определение комплексных чисел</text>
  <text x="250" y="75" text-anchor="middle" font-size="16" fill="#3a5a80">Алгебраическая форма</text>
  
  <!-- Система координат -->
  <g transform="translate(100, 200)">
    <!-- Ось X -->
    <line x1="0" y1="0" x2="150" y2="0" stroke="#1a3a5f" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="-150" stroke="#1a3a5f" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Метки осей -->
    <text x="155" y="5" font-size="14" fill="#1a3a5f">Re</text>
    <text x="5" y="-155" font-size="14" fill="#1a3a5f">Im</text>
    
    <!-- Деления на оси X -->
    <g stroke="#1a3a5f" stroke-width="1">
      <line x1="50" y1="-3" x2="50" y2="3"/>
      <line x1="100" y1="-3" x2="100" y2="3"/>
      <text x="50" y="15" text-anchor="middle" font-size="12" fill="#1a3a5f">1</text>
      <text x="100" y="15" text-anchor="middle" font-size="12" fill="#1a3a5f">2</text>
    </g>
    
    <!-- Деления на оси Y -->
    <g stroke="#1a3a5f" stroke-width="1">
      <line x1="-3" y1="-50" x2="3" y2="-50"/>
      <line x1="-3" y1="-100" x2="3" y2="-100"/>
      <text x="-15" y="-47" text-anchor="middle" font-size="12" fill="#1a3a5f">i</text>
      <text x="-15" y="-97" text-anchor="middle" font-size="12" fill="#1a3a5f">2i</text>
    </g>
    
    <!-- Комплексное число z -->
    <line x1="0" y1="0" x2="75" y2="-100" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="75" cy="-100" r="4" fill="#e74c3c"/>
    
    <!-- Векторы a и bi -->
    <line x1="0" y1="0" x2="75" y2="0" stroke="#3498db" stroke-width="2" stroke-dasharray="5,3"/>
    <line x1="75" y1="0" x2="75" y2="-100" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- Прямоугольник для комплексного числа -->
    <rect x="0" y="-100" width="75" height="100" fill="none" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- Подписи -->
    <text x="40" y="-5" font-size="14" fill="#3498db">a</text>
    <text x="80" y="-50" font-size="14" fill="#27ae60">bi</text>
    <text x="80" y="-105" font-size="14" fill="#e74c3c">z = a + bi</text>
  </g>
  
  <!-- Формула комплексного числа -->
  <g transform="translate(300, 120)">
    <rect x="-10" y="-20" width="180" height="40" fill="#ecf0f1" stroke="#1a3a5f" stroke-width="1" rx="3"/>
    <text x="80" y="5" text-anchor="middle" font-size="16" fill="#1a3a5f">z = a + bi</text>
  </g>
  
  <!-- Определение комплексного числа -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="200" height="100" fill="#e8f4f8" stroke="#1a3a5f" stroke-width="1" rx="5"/>
    <text x="100" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a3a5f">Комплексное число</text>
    <text x="10" y="40" font-size="12" fill="#1a3a5f">Число вида</text>
    <text x="10" y="60" font-size="14" fill="#1a3a5f">z = a + bi,</text>
    <text x="10" y="80" font-size="12" fill="#1a3a5f">где a, b ∈ R, i² = -1</text>
  </g>
  
  <!-- Равенство комплексных чисел -->
  <g transform="translate(300, 190)">
    <rect x="0" y="0" width="190" height="100" fill="#f0e8f8" stroke="#1a3a5f" stroke-width="1" rx="5"/>
    <text x="95" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a3a5f">Равенство</text>
    <text x="10" y="40" font-size="12" fill="#1a3a5f">z₁ = z₂ ⇔ a₁ = a₂</text>
    <text x="10" y="60" font-size="12" fill="#1a3a5f">и</text>
    <text x="10" y="80" font-size="12" fill="#1a3a5f">b₁ = b₂</text>
  </g>
  
  <!-- Примеры комплексных чисел -->
  <g transform="translate(30, 270)">
    <text x="0" y="0" font-size="14" font-weight="bold" fill="#1a3a5f">Примеры:</text>
    <text x="0" y="20" font-size="12" fill="#1a3a5f">3 + 2i (действительное число 3, мнимое 2i)</text>
    <text x="0" y="40" font-size="12" fill="#1a3a5f">4 - 5i (действительное число 4, мнимое -5i)</text>
    <text x="0" y="60" font-size="12" fill="#1a3a5f">7 (действительное число 7, мнимое 0i)</text>
  </g>
  
  <!-- Мнимая единица -->
  <g transform="translate(300, 300)">
    <rect x="0" y="0" width="170" height="40" fill="#fef0e8" stroke="#1a3a5f" stroke-width="1" rx="3"/>
    <text x="85" y="25" text-anchor="middle" font-size="14" fill="#1a3a5f">i² = -1</text>
  </g>
  
  <!-- Градиентные элементы -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:0" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a3a5f" />
    </marker>
  </defs>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="30" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="470" cy="320" r="3" fill="#e74c3c" opacity="0.7"/>
  <circle cx="450" cy="50" r="2" fill="#3498db" opacity="0.7"/>
  <circle cx="50" cy="320" r="2" fill="#3498db" opacity="0.7"/>
  
  <!-- Подписи для векторов -->
  <text x="160" y="180" font-size="12" fill="#3498db">действительная часть</text>
  <text x="190" y="120" font-size="12" fill="#27ae60">мнимая часть</text>
  
  <!-- Дополнительная формула -->
  <g transform="translate(300, 140)">
    <text x="0" y="0" font-size="12" fill="#1a3a5f">где:</text>
    <text x="0" y="20" font-size="12" fill="#1a3a5f">a = Re(z) - действительная часть</text>
    <text x="0" y="40" font-size="12" fill="#1a3a5f">b = Im(z) - мнимая часть</text>
  </g>
</svg>