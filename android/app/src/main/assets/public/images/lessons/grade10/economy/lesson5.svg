<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Индивидуальный и рыночный спрос</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 5</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">5</text>
  <rect x="20" y="72" width="220" height="80" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="234" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Индивидуальный спрос</text>
  <text x="28" y="100" class="box-text">Qd = f(P) при прочих равных</text>
  <text x="28" y="113" class="box-text">Закон спроса: P↑ → Qd↓</text>
  <text x="28" y="126" class="box-text">Исключение: товар Гиффена</text>
  <text x="28" y="139" class="box-text">Эффект Веблена (престиж)</text>
  <rect x="260" y="72" width="220" height="80" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="86" class="box-title">Рыночный спрос</text>
  <text x="268" y="100" class="box-text">Qd(рын) = Σ Qdᵢ</text>
  <text x="268" y="113" class="box-text">Горизонтальное суммирование</text>
  <text x="268" y="126" class="box-text">кривых инд. спроса</text>
  <text x="268" y="139" class="box-text">Более пологая кривая</text>
  <rect x="20" y="168" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="168" x2="474" y2="168" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="182" class="box-title">Сдвиг спроса vs движение по кривой</text>
  <text x="28" y="196" class="box-text">Движение: изменение P → движение вдоль D</text>
  <text x="28" y="209" class="box-text">Сдвиг: изменение неценовых факторов → D → D&apos;</text>
  <rect x="20" y="238" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="238" x2="234" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="252" class="box-title">Неценовые факторы</text>
  <text x="28" y="266" class="box-text">• Доход потребителей</text>
  <text x="28" y="279" class="box-text">• Вкусы и предпочтения</text>
  <text x="28" y="292" class="box-text">• Цены зам./допол.</text>
  <text x="28" y="305" class="box-text">• Ожидания</text>
  <rect x="260" y="238" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="238" x2="474" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="252" class="box-title">Функция спроса</text>
  <text x="268" y="266" class="box-text">Qd = a − b·P (линейная)</text>
  <text x="268" y="279" class="box-text">a — максимальный спрос</text>
  <text x="268" y="292" class="box-text">b — чувствительность</text>
  <text x="268" y="305" class="box-text">P = a/b — цена «отказа»</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>