<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#33691E"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#33691E" stroke-width="2.5"/>
  <text x="250" y="40" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#33691E" text-anchor="middle">Биосфера</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#777" text-anchor="middle">Биология — Урок 8</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#33691E" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="72" width="470" height="230" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="72" width="470" height="230" fill="#F1F8E9" opacity="0.5"/>

    <!-- Earth circle -->
    <circle cx="135" cy="180" r="65" fill="#E3F2FD" stroke="#33691E" stroke-width="1.5"/>
    <!-- Continents hint -->
    <ellipse cx="120" cy="165" rx="25" ry="20" fill="#8BC34A" opacity="0.4" stroke="#558B2F" stroke-width="0.8"/>
    <ellipse cx="150" cy="190" rx="15" ry="18" fill="#8BC34A" opacity="0.4" stroke="#558B2F" stroke-width="0.8"/>
    <ellipse cx="110" cy="200" rx="12" ry="10" fill="#A5D6A7" opacity="0.5" stroke="#558B2F" stroke-width="0.8"/>
    <text x="135" y="180" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Биосфера</text>

    <!-- Concentric shells around Earth -->
    <circle cx="135" cy="180" r="80" fill="none" stroke="#33691E" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="135" cy="180" r="95" fill="none" stroke="#33691E" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.3"/>

    <!-- Shells labels -->
    <rect x="225" y="85" width="240" height="80" rx="5" fill="white" stroke="#33691E" stroke-width="1"/>
    <text x="345" y="100" font-family="Arial,sans-serif" font-size="8.5" font-weight="bold" fill="#33691E" text-anchor="middle">Оболочки биосферы (В.И. Вернадский)</text>
    
    <rect x="235" y="108" width="220" height="14" rx="3" fill="#A5D6A7" opacity="0.3"/>
    <text x="345" y="118" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Атмосфера — газовая оболочка (до 20 км)</text>
    
    <rect x="235" y="124" width="220" height="14" rx="3" fill="#81D4FA" opacity="0.25"/>
    <text x="345" y="134" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Гидросфера — водная оболочка (до 11 км глуб.)</text>
    
    <rect x="235" y="140" width="220" height="14" rx="3" fill="#F1F8E9" stroke="#33691E" stroke-width="0.5"/>
    <text x="345" y="150" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Литосфера — твёрдая оболочка (до 5 км глуб.)</text>

    <text x="345" y="162" font-family="Arial,sans-serif" font-size="6.5" fill="#777" text-anchor="middle">Живое вещество — ~0.01% массы, но главная сила</text>

    <!-- Vernadsky's teachings -->
    <rect x="25" y="260" width="215" height="40" rx="5" fill="white" stroke="#33691E" stroke-width="1"/>
    <text x="132" y="274" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#33691E" text-anchor="middle">Учение Вернадского</text>
    <text x="35" y="286" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">• Биогенная миграция атомов</text>
    <text x="35" y="296" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">• Живое вещество — геохимическая сила</text>

    <!-- Functions -->
    <rect x="250" y="175" width="215" height="110" rx="5" fill="white" stroke="#33691E" stroke-width="1"/>
    <text x="357" y="190" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Функции живого вещества</text>
    <text x="260" y="205" font-family="Arial,sans-serif" font-size="7" fill="#33691E">🍃 Энергетическая — фотосинтез</text>
    <text x="260" y="218" font-family="Arial,sans-serif" font-size="7" fill="#33691E">🔄 Газовая — круговорот O₂ и CO₂</text>
    <text x="260" y="231" font-family="Arial,sans-serif" font-size="7" fill="#33691E">🧪 Концентрационная — накопление</text>
    <text x="270" y="242" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">элементов (Ca, P, Si)</text>
    <text x="260" y="255" font-family="Arial,sans-serif" font-size="7" fill="#33691E">🏗 Окислительно-восстановительная</text>
    <text x="260" y="268" font-family="Arial,sans-serif" font-size="7" fill="#33691E">🏗 Деструктивная — разложение</text>
    <text x="260" y="281" font-family="Arial,sans-serif" font-size="7" fill="#33691E">📊 Средообразующая — почвообразование</text>
  </g>
  <line x1="30" y1="308" x2="470" y2="308" stroke="#33691E" stroke-width="1.5" opacity="0.25"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="11" fill="#33691E" text-anchor="middle">Биология · 11 класс</text>
</svg>