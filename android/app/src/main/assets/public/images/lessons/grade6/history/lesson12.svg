<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Образование единого Русского государства</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 12</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- United Rus map with Ivan III -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="210" height="200" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- United territory -->
    <path d="M35,25 L175,20 L195,55 L190,120 L175,170 L130,185 L65,180 L25,145 L20,65 Z" fill="#2E7D32" opacity="0.12" stroke="#2E7D32" stroke-width="2"/>
    <!-- Moscow (center, prominent) -->
    <circle cx="105" cy="85" r="7" fill="#C62828"/>
    <text x="105" y="78" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Москва</text>
    <!-- Other cities -->
    <circle cx="50" cy="40" r="4" fill="#1565C0"/>
    <text x="50" y="33" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Новгород</text>
    <circle cx="60" cy="100" r="3.5" fill="#2E7D32"/>
    <text x="45" y="103" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Тверь</text>
    <circle cx="145" cy="50" r="3.5" fill="#2E7D32"/>
    <text x="160" y="48" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Нижний</text>
    <circle cx="155" cy="95" r="3.5" fill="#2E7D32"/>
    <text x="168" y="98" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Рязань</text>
    <circle cx="130" cy="60" r="3.5" fill="#2E7D32"/>
    <text x="130" y="53" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Владимир</text>
    <circle cx="80" cy="55" r="3" fill="#2E7D32"/>
    <text x="80" y="48" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Ярославль</text>
    <circle cx="155" cy="140" r="3.5" fill="#2E7D32"/>
    <text x="155" y="153" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Псков</text>
    <circle cx="90" cy="130" r="3" fill="#2E7D32"/>
    <text x="75" y="133" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Калуга</text>
    <!-- Connection lines from Moscow to cities -->
    <line x1="105" y1="85" x2="50" y2="40" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
    <line x1="105" y1="85" x2="60" y2="100" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
    <line x1="105" y1="85" x2="145" y2="50" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
    <line x1="105" y1="85" x2="155" y2="95" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
    <line x1="105" y1="85" x2="130" y2="60" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
    <!-- Border with Golden Horde (faded line) -->
    <path d="M20,145 Q50,160 80,165 Q120,170 160,175 Q180,178 195,170" stroke="#8D6E63" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>
    <text x="130" y="178" font-family="Arial,sans-serif" font-size="5" fill="#8D6E63" text-anchor="middle" opacity="0.6">Граница с Ордой</text>
    <!-- Label -->
    <text x="105" y="195" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Единое Русское государство (XV в.)</text>
  </g>

  <!-- Ivan III and double-headed eagle -->
  <g transform="translate(255,88)">
    <rect x="0" y="0" width="215" height="100" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <!-- Ivan III figure -->
    <g transform="translate(15,5)">
      <!-- Head -->
      <circle cx="25" cy="20" r="12" fill="#F9A825" stroke="#8D6E63" stroke-width="0.8"/>
      <!-- Crown (Imperial) -->
      <path d="M13,12 L15,0 L21,8 L25,-2 L29,8 L35,0 L37,12" fill="#F9A825" stroke="#C62828" stroke-width="1"/>
      <rect x="12" y="10" width="26" height="5" rx="1" fill="#F9A825" stroke="#C62828" stroke-width="0.5"/>
      <path d="M12,15 Q15,20 18,15 Q21,20 24,15 Q27,20 30,15 Q33,20 36,15" fill="#FFF8E1" stroke="#A1887F" stroke-width="0.5"/>
      <!-- Eyes -->
      <ellipse cx="20" cy="20" rx="2.5" ry="1.5" fill="#FFF8E1"/>
      <circle cx="20" cy="20" r="1" fill="#3E2723"/>
      <ellipse cx="30" cy="20" rx="2.5" ry="1.5" fill="#FFF8E1"/>
      <circle cx="30" cy="20" r="1" fill="#3E2723"/>
      <!-- Beard -->
      <path d="M15,28 Q17,42 25,45 Q33,42 35,28" fill="#8D6E63"/>
      <!-- Body -->
      <rect x="14" y="45" width="22" height="30" rx="3" fill="#7B1FA2" opacity="0.8"/>
      <!-- Collar -->
      <path d="M18,45 L25,52 L32,45" fill="none" stroke="#F9A825" stroke-width="1.5"/>
      <!-- Orb -->
      <circle cx="8" cy="65" r="6" fill="#F9A825" stroke="#C62828" stroke-width="0.8"/>
      <line x1="8" y1="59" x2="8" y2="48" stroke="#C62828" stroke-width="1.5"/>
      <!-- Scepter -->
      <line x1="40" y1="50" x2="40" y2="75" stroke="#F9A825" stroke-width="2"/>
      <circle cx="40" cy="48" r="4" fill="#F9A825" stroke="#C62828" stroke-width="0.8"/>
    </g>

    <!-- Double-headed eagle -->
    <g transform="translate(90,10)">
      <rect x="10" y="0" width="95" height="80" rx="3" fill="#C62828" opacity="0.06"/>
      <!-- Eagle body -->
      <ellipse cx="57" cy="45" rx="15" ry="12" fill="#F9A825" stroke="#C62828" stroke-width="0.8"/>
      <!-- Left head -->
      <ellipse cx="35" cy="30" rx="8" ry="10" fill="#F9A825" stroke="#C62828" stroke-width="0.8"/>
      <circle cx="33" cy="27" r="1.5" fill="#C62828"/>
      <line x1="30" y1="30" x2="25" y2="30" stroke="#F9A825" stroke-width="1.5"/>
      <!-- Right head -->
      <ellipse cx="79" cy="30" rx="8" ry="10" fill="#F9A825" stroke="#C62828" stroke-width="0.8"/>
      <circle cx="81" cy="27" r="1.5" fill="#C62828"/>
      <line x1="84" y1="30" x2="89" y2="30" stroke="#F9A825" stroke-width="1.5"/>
      <!-- Crowns on heads -->
      <rect x="31" y="18" width="8" height="4" rx="1" fill="#C62828" opacity="0.5"/>
      <rect x="75" y="18" width="8" height="4" rx="1" fill="#C62828" opacity="0.5"/>
      <!-- Left wing -->
      <path d="M42,35 Q25,25 15,30 Q20,40 30,42 Q25,48 20,55 Q30,50 42,48" fill="#F9A825" stroke="#C62828" stroke-width="0.5"/>
      <!-- Right wing -->
      <path d="M72,35 Q89,25 99,30 Q94,40 84,42 Q89,48 94,55 Q84,50 72,48" fill="#F9A825" stroke="#C62828" stroke-width="0.5"/>
      <!-- Tail feathers -->
      <path d="M50,55 Q45,70 40,75 M57,55 L57,75 M64,55 Q69,70 74,75" stroke="#F9A825" stroke-width="1.5" fill="none"/>
      <!-- Talons -->
      <path d="M45,55 L40,65 L43,63 L45,68 L48,64" fill="#F9A825" stroke="#C62828" stroke-width="0.3"/>
      <path d="M69,55 L74,65 L71,63 L69,68 L66,64" fill="#F9A825" stroke="#C62828" stroke-width="0.3"/>
      <!-- Scepter in right talon -->
      <line x1="69" y1="55" x2="80" y2="60" stroke="#C62828" stroke-width="1.5"/>
      <circle cx="82" cy="59" r="3" fill="#F9A825"/>
      <!-- Orb in left talon -->
      <circle cx="35" cy="60" r="4" fill="#F9A825" stroke="#C62828" stroke-width="0.5"/>
    </g>
    <!-- Labels -->
    <text x="30" y="88" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Иван III</text>
    <text x="145" y="88" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Герб России</text>
  </g>

  <!-- Key events panel -->
  <g transform="translate(255,195)">
    <rect x="0" y="0" width="215" height="93" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
    <text x="107" y="14" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Путь к единству</text>

    <rect x="5" y="20" width="205" height="15" rx="2" fill="#C62828" opacity="0.08"/>
    <text x="10" y="30" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold">1462-1505</text>
    <text x="75" y="30" font-family="Arial,sans-serif" font-size="6" fill="#555">Правление Ивана III Великого</text>

    <rect x="5" y="38" width="205" height="15" rx="2" fill="#1565C0" opacity="0.08"/>
    <text x="10" y="48" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">1478</text>
    <text x="75" y="48" font-family="Arial,sans-serif" font-size="6" fill="#555">Присоединение Новгорода</text>

    <rect x="5" y="56" width="205" height="15" rx="2" fill="#2E7D32" opacity="0.08"/>
    <text x="10" y="66" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" font-weight="bold">1480</text>
    <text x="75" y="66" font-family="Arial,sans-serif" font-size="6" fill="#555">Стояние на р. Угре - конец ига</text>

    <rect x="5" y="74" width="205" height="15" rx="2" fill="#F9A825" opacity="0.08"/>
    <text x="10" y="84" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">1497</text>
    <text x="75" y="84" font-family="Arial,sans-serif" font-size="6" fill="#555">Судебник - первый свод законов</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Образование единого Русского государства</text>
</svg>