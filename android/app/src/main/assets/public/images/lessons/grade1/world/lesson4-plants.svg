<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F7FA"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#5D4037"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50"/>
      <stop offset="100%" style="stop-color:#2E7D32"/>
    </linearGradient>
    <linearGradient id="flowerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="100%" style="stop-color:#E53935"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#skyGrad)"/>
  
  <!-- Ground -->
  <rect x="0" y="220" width="400" height="80" fill="#8B4513"/>
  <rect x="0" y="220" width="400" height="20" fill="#A0522D"/>
  
  <!-- Soil cross-section -->
  <rect x="50" y="220" width="300" height="60" fill="url(#groundGrad)" opacity="0.9"/>
  
  <!-- Labels -->
  <style>
    .label { font-family: 'Comic Sans MS', cursive; font-size: 12px; font-weight: bold; }
    .label-root { fill: #FFE082; }
    .label-stem { fill: #4CAF50; }
    .label-leaf { fill: #2E7D32; }
    .label-flower { fill: #E91E63; }
    .label-fruit { fill: #FF9800; }
  </style>
  
  <!-- ROOT -->
  <g id="root">
    <path d="M200 220 Q180 250 160 270 M200 220 Q200 250 200 275 M200 220 Q220 250 240 270" 
          stroke="#8D6E63" stroke-width="6" fill="none" stroke-linecap="round">
      <animate attributeName="stroke-width" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Small root hairs -->
    <g opacity="0.7">
      <line x1="160" y1="260" x2="150" y2="265" stroke="#A1887F" stroke-width="2"/>
      <line x1="240" y1="260" x2="250" y2="265" stroke="#A1887F" stroke-width="2"/>
      <line x1="200" y1="265" x2="200" y2="272" stroke="#A1887F" stroke-width="2"/>
    </g>
    <text x="85" y="265" class="label label-root">КОРЕНЬ</text>
    <line x1="130" y1="260" x2="155" y2="260" stroke="#FFE082" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- STEM -->
  <g id="stem">
    <rect x="194" y="130" width="12" height="90" fill="#66BB6A" rx="3">
      <animate attributeName="height" values="90;92;90" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="220" y="180" class="label label-stem">СТЕБЕЛЬ</text>
    <line x1="215" y1="175" x2="206" y2="170" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- LEAVES -->
  <g id="leaves">
    <!-- Left leaf -->
    <ellipse cx="150" cy="140" rx="40" ry="20" fill="url(#leafGrad)" transform="rotate(-30 150 140)">
      <animate attributeName="rx" values="40;42;40" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="-30 150 140;-32 150 140;-30 150 140" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <line x1="170" y1="150" x2="120" y2="130" stroke="#2E7D32" stroke-width="2"/>
    
    <!-- Right leaf -->
    <ellipse cx="250" cy="140" rx="40" ry="20" fill="url(#leafGrad)" transform="rotate(30 250 140)">
      <animate attributeName="rx" values="40;42;40" dur="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="30 250 140;32 250 140;30 250 140" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <line x1="230" y1="150" x2="280" y2="130" stroke="#2E7D32" stroke-width="2"/>
    
    <text x="40" y="130" class="label label-leaf">ЛИСТЬЯ</text>
    <line x1="75" y1="130" x2="115" y2="140" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- FLOWER -->
  <g id="flower">
    <!-- Petals -->
    <g transform="translate(200, 70)">
      <ellipse cx="0" cy="-25" rx="15" ry="25" fill="url(#flowerGrad)">
        <animateTransform attributeName="transform" type="scale" values="1;1.05;1" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="0" cy="-25" rx="15" ry="25" fill="url(#flowerGrad)" transform="rotate(72)"/>
      <ellipse cx="0" cy="-25" rx="15" ry="25" fill="url(#flowerGrad)" transform="rotate(144)"/>
      <ellipse cx="0" cy="-25" rx="15" ry="25" fill="url(#flowerGrad)" transform="rotate(216)"/>
      <ellipse cx="0" cy="-25" rx="15" ry="25" fill="url(#flowerGrad)" transform="rotate(288)"/>
      
      <!-- Center -->
      <circle cx="0" cy="0" r="12" fill="#FFD54F">
        <animate attributeName="r" values="12;14;12" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-3" cy="-3" r="2" fill="#FF8F00"/>
      <circle cx="3" cy="2" r="2" fill="#FF8F00"/>
      <circle cx="-2" cy="3" r="2" fill="#FF8F00"/>
    </g>
    
    <text x="270" y="60" class="label label-flower">ЦВЕТОК</text>
    <line x1="265" y1="65" x2="235" y2="70" stroke="#E91E63" stroke-width="1" stroke-dasharray="3,2"/>
  </g>
  
  <!-- FRUIT (apple) -->
  <g id="fruit" transform="translate(320, 120)">
    <circle cx="0" cy="0" r="25" fill="#E53935">
      <animate attributeName="r" values="25;27;25" dur="2s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="-8" cy="-8" rx="8" ry="5" fill="#EF5350" opacity="0.6"/>
    <rect x="-3" y="-30" width="6" height="10" fill="#795548" rx="2"/>
    <ellipse cx="5" cy="-28" rx="8" ry="5" fill="#4CAF50" transform="rotate(45 5 -28)"/>
    
    <text x="20" y="5" class="label label-fruit">ПЛОД</text>
  </g>
  
  <!-- Sun -->
  <g transform="translate(350, 40)">
    <circle cx="0" cy="0" r="20" fill="#FFD600">
      <animate attributeName="r" values="20;22;20" dur="2s" repeatCount="indefinite"/>
    </circle>
    <g stroke="#FFD600" stroke-width="3">
      <line x1="0" y1="-30" x2="0" y2="-38"/>
      <line x1="25" y1="-25" x2="30" y2="-30"/>
      <line x1="30" y1="0" x2="38" y2="0"/>
      <line x1="25" y1="25" x2="30" y2="30"/>
      <line x1="-25" y1="-25" x2="-30" y2="-30"/>
    </g>
  </g>
  
  <!-- Water drops -->
  <g>
    <ellipse cx="80" cy="100" rx="5" ry="8" fill="#64B5F6" opacity="0.8">
      <animate attributeName="cy" values="100;220;100" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="100" cy="80" rx="4" ry="6" fill="#64B5F6" opacity="0.7">
      <animate attributeName="cy" values="80;220;80" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </ellipse>
  </g>
  
  <!-- Title -->
  <text x="200" y="295" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="14" font-weight="bold" fill="#33691E">
    Части растения
  </text>
</svg>