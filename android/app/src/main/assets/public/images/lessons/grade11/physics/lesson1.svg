<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a90e2" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#4a90e2" stroke-width="1" rx="3" opacity="0.5"/>
  
  <!-- Тёмный фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" font-weight="bold">
    Магнитное поле прямого проводника с током
  </text>
  
  <!-- Провод с током -->
  <line x1="250" y1="100" x2="250" y2="250" stroke="#ff6b6b" stroke-width="6"/>
  <text x="265" y="180" font-family="Arial, sans-serif" font-size="16" fill="#ff6b6b">I</text>
  
  <!-- Стрелка направления тока -->
  <path d="M250,100 L250,85 L245,90 M250,85 L255,90" stroke="#ff6b6b" stroke-width="2" fill="none"/>
  
  <!-- Круговые линии магнитной индукции -->
  <circle cx="250" cy="175" r="40" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.8"/>
  <circle cx="250" cy="175" r="60" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.8"/>
  <circle cx="250" cy="175" r="80" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.8"/>
  <circle cx="250" cy="175" r="100" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.8"/>
  <circle cx="250" cy="175" r="120" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Стрелки направления (правило буравчика) -->
  <path d="M290,175 L295,170 M295,170 L290,165" stroke="#4ecdc4" stroke-width="2" fill="none" transform="rotate(90 290 175)"/>
  <path d="M290,175 L295,170 M295,170 L290,165" stroke="#4ecdc4" stroke-width="2" fill="none" transform="rotate(180 290 175)"/>
  <path d="M290,175 L295,170 M295,170 L290,165" stroke="#4ecdc4" stroke-width="2" fill="none" transform="rotate(270 290 175)"/>
  <path d="M290,175 L295,170 M295,170 L290,165" stroke="#4ecdc4" stroke-width="2" fill="none" transform="rotate(0 290 175)"/>
  
  <path d="M330,175 L335,170 M335,170 L330,165" stroke="#4ecdc4" stroke-width="2" fill="none" transform="rotate(45 330 175)"/>
  <path d="M330,175 L335,170 M335,170 L330,165" stroke="#4ecdc4" stroke-width="2" fill="none" transform="rotate(135 330 175)"/>
  <path d="M330,175 L335,170 M335,170 L330,165" stroke="#4ecdc4" stroke-width="2" fill="none" transform="rotate(225 330 175)"/>
  <path d="M330,175 L335,170 M335,170 L330,165" stroke="#4ecdc4" stroke-width="2" fill="none" transform="rotate(315 330 175)"/>
  
  <!-- Вектор B -->
  <line x1="350" y1="175" x2="380" y2="175" stroke="#ffd93d" stroke-width="2.5"/>
  <polygon points="380,175 375,172 375,178" fill="#ffd93d"/>
  <text x="385" y="180" font-family="Arial, sans-serif" font-size="16" fill="#ffd93d">B</text>
  
  <!-- Радиус R -->
  <line x1="250" y1="175" x2="330" y2="175" stroke="#ffffff" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="285" y="170" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">R</text>
  
  <!-- Формула -->
  <text x="250" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">
    B = μ₀I/(2πR)
  </text>
  
  <!-- Подписи к символам -->
  <text x="260" y="305" font-family="Arial, sans-serif" font-size="12" fill="#cccccc">
    где B - магнитная индукция, μ₀ - магнитная постоянная, I - сила тока, R - расстояние
  </text>
  
  <!-- Дополнительные элементы -->
  <circle cx="250" cy="175" r="3" fill="#ff6b6b"/>
  <circle cx="250" cy="175" r="8" fill="none" stroke="#ff6b6b" stroke-width="1" opacity="0.5"/>
  
  <!-- Точки на проводе -->
  <circle cx="250" cy="130" r="2" fill="#ff6b6b"/>
  <circle cx="250" cy="150" r="2" fill="#ff6b6b"/>
  <circle cx="250" cy="170" r="2" fill="#ff6b6b"/>
  <circle cx="250" cy="190" r="2" fill="#ff6b6b"/>
  <circle cx="250" cy="210" r="2" fill="#ff6b6b"/>
  <circle cx="250" cy="230" r="2" fill="#ff6b6b"/>
  
  <!-- Указатель направления поля -->
  <text x="420" y="175" font-family="Arial, sans-serif" font-size="14" fill="#4ecdc4">
    →
  </text>
  
  <!-- Легенда -->
  <rect x="20" y="270" width="120" height="60" fill="#16213e" stroke="#4a90e2" stroke-width="1" rx="3" opacity="0.8"/>
  <text x="25" y="285" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Правило буравчика:</text>
  <text x="25" y="300" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">Если винч前进,</text>
  <text x="25" y="315" font-family="Arial, sans-serif" font-size="11" fill="#cccccc">то поле закручивается</text>
</svg>