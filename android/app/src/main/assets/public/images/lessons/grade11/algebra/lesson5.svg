<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="ctgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="2" rx="5" />
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#7f8c8d" stroke-width="1" rx="3" />
  
  <!-- Заголовок и класс -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">Урок 5: Свойства функций</text>
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">y = tg x и y = ctg x</text>
  
  <!-- Номер урока в углу -->
  <text x="25" y="330" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">№5</text>
  
  <!-- Координатная система -->
  <g transform="translate(250, 200)">
    <!-- Оси -->
    <line x1="-200" y1="0" x2="200" y2="0" stroke="#34495e" stroke-width="2" />
    <line x1="0" y1="-150" x2="0" y2="150" stroke="#34495e" stroke-width="2" />
    
    <!-- Стрелки на осях -->
    <polygon points="200,0 195,-3 195,3" fill="#34495e" />
    <polygon points="0,-150 -3,-145 3,-145" fill="#34495e" />
    
    <!-- Подписи осей -->
    <text x="210" y="5" font-family="Arial, sans-serif" font-size="14" fill="#34495e">x</text>
    <text x="5" y="-155" font-family="Arial, sans-serif" font-size="14" fill="#34495e">y</text>
    
    <!-- Единичные отрезки -->
    <line x1="50" y1="-3" x2="50" y2="3" stroke="#34495e" stroke-width="1" />
    <line x1="-50" y1="-3" x2="-50" y2="3" stroke="#34495e" stroke-width="1" />
    <line x1="100" y1="-3" x2="100" y2="3" stroke="#34495e" stroke-width="1" />
    <line x1="-100" y1="-3" x2="-100" y2="3" stroke="#34495e" stroke-width="1" />
    
    <line x1="-3" y1="-50" x2="3" y2="-50" stroke="#34495e" stroke-width="1" />
    <line x1="-3" y1="50" x2="3" y2="50" stroke="#34495e" stroke-width="1" />
    
    <!-- Подписи единичных отрезков -->
    <text x="45" y="20" font-family="Arial, sans-serif" font-size="12" fill="#34495e">π/2</text>
    <text x="-55" y="20" font-family="Arial, sans-serif" font-size="12" fill="#34495e">-π/2</text>
    <text x="95" y="20" font-family="Arial, sans-serif" font-size="12" fill="#34495e">π</text>
    <text x="-105" y="20" font-family="Arial, sans-serif" font-size="12" fill="#34495e">-π</text>
    
    <text x="10" y="-45" font-family="Arial, sans-serif" font-size="12" fill="#34495e">1</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="12" fill="#34495e">-1</text>
    
    <!-- Асимптоты для tg x -->
    <line x1="-100" y1="-150" x2="-100" y2="150" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5" />
    <line x1="-50" y1="-150" x2="-50" y2="150" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5" />
    <line x1="50" y1="-150" x2="50" y2="150" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5" />
    <line x1="100" y1="-150" x2="100" y2="150" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5" />
    
    <!-- График tg x -->
    <path d="M -100,-10 C -90,-20 -80,-40 -70,-60 C -60,-80 -50,-100 -50,-150 M -50,150 C -40,100 -30,80 -20,60 C -10,40 0,20 0,0 M 0,0 C 10,-20 20,-40 30,-60 C 40,-80 50,-100 50,-150 M 50,150 C 60,100 70,80 80,60 C 90,40 100,20 100,0" 
          fill="none" stroke="url(#tgGrad)" stroke-width="3" />
    
    <!-- График ctg x -->
    <path d="M -150,50 C -130,40 -110,30 -90,20 C -70,10 -50,0 -50,-150 M -50,150 C -30,140 -10,130 10,120 C 30,110 50,100 50,50 M 50,-50 C 70,-60 90,-70 110,-80 C 130,-90 150,-100 150,-150 M 150,150 C 130,140 110,130 90,120 C 70,110 50,100 50,50" 
          fill="none" stroke="url(#ctgGrad)" stroke-width="3" />
    
    <!-- Точки на графике tg x -->
    <circle cx="-100" cy="-10" r="3" fill="#2980b9" />
    <circle cx="-50" cy="-150" r="3" fill="#2980b9" />
    <circle cx="0" cy="0" r="3" fill="#2980b9" />
    <circle cx="50" cy="-150" r="3" fill="#2980b9" />
    <circle cx="100" cy="-10" r="3" fill="#2980b9" />
    
    <!-- Точки на графике ctg x -->
    <circle cx="-50" cy="150" r="3" fill="#c0392b" />
    <circle cx="0" cy="50" r="3" fill="#c0392b" />
    <circle cx="50" cy="50" r="3" fill="#c0392b" />
    <circle cx="100" cy="-50" r="3" fill="#c0392b" />
    <circle cx="150" cy="-150" r="3" fill="#c0392b" />
  </g>
  
  <!-- Легенда -->
  <rect x="20" y="280" width="120" height="50" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" />
  <line x1="30" y1="295" x2="50" y2="295" stroke="#3498db" stroke-width="3" />
  <text x="55" y="300" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">y = tg x</text>
  <line x1="30" y1="315" x2="50" y2="315" stroke="#e74c3c" stroke-width="3" />
  <text x="55" y="320" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">y = ctg x</text>
  
  <!-- Свойства функций -->
  <rect x="360" y="280" width="120" height="50" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3" />
  <text x="370" y="295" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Область:</text>
  <text x="370" y="305" font-family="Arial, sans-serif" font-size="9" fill="#34495e">D ≠ π/2 + πk</text>
  <text x="370" y="318" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Период: π</text>
  
  <!-- Формулы -->
  <text x="250" y="105" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">tg x = sin x / cos x</text>
  <text x="250" y="125" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">ctg x = cos x / sin x</text>
  
  <!-- Указатели на асимптоты -->
  <g transform="translate(250, 200)">
    <line x1="-100" y1="-140" x2="-100" y2="-100" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="2,2" />
    <text x="-100" y="-90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">асимптота</text>
    
    <line x1="50" y1="-140" x2="50" y2="-100" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="2,2" />
    <text x="50" y="-90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">асимптота</text>
  </g>
  
  <!-- Обозначения интервалов монотонности -->
  <g transform="translate(250, 200)">
    <text x="-75" y="-130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#3498db">↗</text>
    <text x="-25" y="-130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#3498db">↗</text>
    <text x="25" y="-130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#3498db">↗</text>
    <text x="75" y="-130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#3498db">↗</text>
    
    <text x="-125" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">↘</text>
    <text x="-75" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">↘</text>
    <text x="-25" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">↘</text>
    <text x="25" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">↘</text>
    <text x="75" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">↘</text>
  </g>
  
  <!-- Дополнительные маркеры на графике -->
  <g transform="translate(250, 200)">
    <circle cx="-75" cy="-75" r="2" fill="#3498db" />
    <circle cx="-25" cy="-25" r="2" fill="#3498db" />
    <circle cx="25" cy="-25" r="2" fill="#3498db" />
    <circle cx="75" cy="-75" r="2" fill="#3498db" />
    
    <circle cx="-125" cy="75" r="2" fill="#e74c3c" />
    <circle cx="-75" cy="25" r="2" fill="#e74c3c" />
    <circle cx="25" cy="25" r="2" fill="#e74c3c" />
    <circle cx="75" cy="-25" r="2" fill="#e74c3c" />
  </g>
  
  <!-- Подписи для интервалов -->
  <text x="110" y="260" font-family="Arial, sans-serif" font-size="10" fill="#34495e">(-π/2, π/2)</text>
  <text x="110" y="275" font-family="Arial, sans-serif" font-size="10" fill="#34495e">(-3π/2, -π/2)</text>
  <text x="110" y="290" font-family="Arial, sans-serif" font-size="10" fill="#34495e">(π/2, 3π/2)</text>
  
  <!-- Подпись нуля функции -->
  <text x="255" y="205" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">0</text>
  
  <!-- Дополнительные элементы декора -->
  <circle cx="30" cy="30" r="3" fill="#3498db" opacity="0.5" />
  <circle cx="470" cy="30" r="3" fill="#e74c3c" opacity="0.5" />
  <circle cx="30" cy="320" r="3" fill="#e74c3c" opacity="0.5" />
  <circle cx="470" cy="320" r="3" fill="#3498db" opacity="0.5" />
</svg>