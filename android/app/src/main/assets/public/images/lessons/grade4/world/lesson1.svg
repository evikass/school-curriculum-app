<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Карта природных зон</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">От ледяной Арктики до жарких пустынь</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Soviet-style Russia map silhouette with zone bands -->
  <!-- Background map shape -->
  <rect x="120" y="90" width="260" height="210" rx="8" fill="#E8D5C8" opacity="0.4"/>
  <!-- Natural zone color bands (north to south) -->
  <rect x="140" y="95" width="220" height="24" fill="#B8D4E8" rx="2"/>  <!-- Arctic - icy blue -->
  <rect x="140" y="120" width="220" height="24" fill="#C8D8B0" rx="2"/> <!-- Tundra - pale green -->
  <rect x="140" y="145" width="220" height="30" fill="#4A7A3A" rx="2"/> <!-- Taiga - dark green -->
  <rect x="140" y="176" width="220" height="26" fill="#6B9E5A" rx="2"/> <!-- Mixed forest -->
  <rect x="140" y="203" width="220" height="22" fill="#A8C46A" rx="2"/> <!-- Forest-steppe -->
  <rect x="140" y="226" width="220" height="22" fill="#D4C85A" rx="2"/> <!-- Steppe - golden -->
  <rect x="140" y="249" width="220" height="22" fill="#D4A843" rx="2"/> <!-- Semi-desert -->
  <rect x="140" y="272" width="220" height="22" fill="#C49040" rx="2"/> <!-- Desert - sandy -->
  <!-- Zone labels on right side -->
  <text x="368" y="112" font-family="Arial" font-size="8" fill="#1a1a1a">Арктика</text>
  <text x="368" y="137" font-family="Arial" font-size="8" fill="#1a1a1a">Тундра</text>
  <text x="368" y="164" font-family="Arial" font-size="8" fill="#1a1a1a">Тайга</text>
  <text x="368" y="193" font-family="Arial" font-size="8" fill="#1a1a1a">Смеш. лес</text>
  <text x="368" y="218" font-family="Arial" font-size="8" fill="#1a1a1a">Лесостепь</text>
  <text x="368" y="241" font-family="Arial" font-size="8" fill="#1a1a1a">Степь</text>
  <text x="368" y="264" font-family="Arial" font-size="8" fill="#1a1a1a">Полупустыня</text>
  <text x="368" y="287" font-family="Arial" font-size="8" fill="#1a1a1a">Пустыня</text>
  <!-- Pointer arrows (Bauhaus geometric) -->
  <polygon points="105,165 115,160 115,170" fill="#C41E3A"/>
  <text x="65" y="155" font-family="Arial" font-size="9" font-weight="bold" fill="#C41E3A" text-anchor="middle">СЕВЕР</text>
  <polygon points="105,250 115,245 115,255" fill="#C41E3A"/>
  <text x="65" y="260" font-family="Arial" font-size="9" font-weight="bold" fill="#C41E3A" text-anchor="middle">ЮГ</text>
  <!-- Vertical arrow -->
  <line x1="110" y1="130" x2="110" y2="285" stroke="#C41E3A" stroke-width="1.5" opacity="0.5"/>
  <!-- Small compass rose -->
  <polygon points="85,95 90,105 80,105" fill="#1a1a1a"/>
  <text x="85" y="92" font-family="Arial" font-size="8" font-weight="bold" fill="#1a1a1a" text-anchor="middle">N</text>
</svg>