  <rect x="120" y="220" width="260" height="60" rx="3" fill="#8B6914" stroke="#6B4914" stroke-width="2"/><rect x="120" y="220" width="260" height="10" fill="#D4A843"/><rect x="115" y="278" width="270" height="8" rx="2" fill="#6B4914"/><rect x="140" y="250" width="50" height="30" rx="2" fill="#333" stroke="#222" stroke-width="1"/><rect x="215" y="250" width="50" height="30" rx="2" fill="#333" stroke="#222" stroke-width="1"/><rect x="290" y="250" width="50" height="30" rx="2" fill="#333" stroke="#222" stroke-width="1"/><!-- Trophy --><rect x="235" y="115" width="30" height="8" rx="2" fill="#D4A843"/><rect x="240" y="123" width="20" height="30" rx="5" fill="#D4A843" stroke="#8B6914" stroke-width="1.5"/><path d="M238,130 Q225,135 230,150 Q235,158 240,150 L240,135" fill="#D4A843" stroke="#8B6914" stroke-width="1"/><path d="M262,130 Q275,135 270,150 Q265,158 260,150 L260,135" fill="#D4A843" stroke="#8B6914" stroke-width="1"/><rect x="240" y="153" width="20" height="12" fill="#D4A843" stroke="#8B6914" stroke-width="1"/><rect x="235" y="165" width="30" height="6" rx="2" fill="#D4A843" stroke="#8B6914" stroke-width="1"/><rect x="233" y="171" width="34" height="4" rx="1" fill="#8B6914"/><text x="250" y="298" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Участие - это победа!</text>
