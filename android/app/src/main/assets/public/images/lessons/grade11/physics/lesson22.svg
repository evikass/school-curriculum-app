<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495e" stroke-width="1" rx="3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3498db">Урок 22: Оптические приборы</text>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">Лупа, микроскоп, телескоп</text>
  
  <!-- Номер урока в углу -->
  <text x="470" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">Урок 22</text>
  
  <!-- Лупа -->
  <g transform="translate(80, 120)">
    <!-- Ручка лупы -->
    <rect x="35" y="45" width="40" height="8" fill="#8b4513" rx="2"/>
    <rect x="70" y="43" width="15" height="12" fill="#654321" rx="2"/>
    
    <!-- Линза лупы -->
    <ellipse cx="30" cy="50" rx="25" ry="30" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
    <ellipse cx="30" cy="50" rx="23" ry="28" fill="none" stroke="#2980b9" stroke-width="1" opacity="0.5"/>
    
    <!-- Объект перед лупой -->
    <text x="-15" y="55" font-family="Arial" font-size="12" fill="#2c3e50">AB</text>
    <line x1="-10" y1="50" x2="-10" y2="60" stroke="#2c3e50" stroke-width="1"/>
    <line x1="-10" y1="60" x2="5" y2="60" stroke="#2c3e50" stroke-width="1"/>
    <line x1="5" y1="50" x2="5" y2="60" stroke="#2c3e50" stroke-width="1"/>
    
    <!-- Изображение через лупу -->
    <text x="60" y="25" font-family="Arial" font-size="16" fill="#2c3e50">A'B'</text>
    <line x1="65" y1="30" x2="65" y2="15" stroke="#2c3e50" stroke-width="1"/>
    <line x1="65" y1="15" x2="80" y2="15" stroke="#2c3e50" stroke-width="1"/>
    <line x1="80" y1="30" x2="80" y2="15" stroke="#2c3e50" stroke-width="1"/>
    
    <!-- Фокусные точки -->
    <line x1="5" y1="50" x2="5" y2="52" stroke="#e74c3c" stroke-width="1"/>
    <line x1="55" y1="50" x2="55" y2="52" stroke="#e74c3c" stroke-width="1"/>
    <text x="0" y="65" font-family="Arial" font-size="10" fill="#e74c3c">F</text>
    <text x="50" y="65" font-family="Arial" font-size="10" fill="#e74c3c">F</text>
    
    <!-- Подпись -->
    <text x="25" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Лупа</text>
  </g>
  
  <!-- Микроскоп -->
  <g transform="translate(200, 100)">
    <!-- Труба -->
    <rect x="30" y="20" width="80" height="25" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="2"/>
    <rect x="110" y="35" width="60" height="15" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="2"/>
    
    <!-- Окуляр -->
    <ellipse cx="40" cy="32" rx="12" ry="10" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
    <ellipse cx="40" cy="32" rx="10" ry="8" fill="#d5e8f0" stroke="#2980b9" stroke-width="1"/>
    
    <!-- Объектив -->
    <ellipse cx="140" cy="42" rx="10" ry="8" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
    <ellipse cx="140" cy="42" rx="8" ry="6" fill="#d5e8f0" stroke="#2980b9" stroke-width="1"/>
    
    <!-- Подставка -->
    <path d="M35,45 L35,65 L155,65 L155,45" fill="none" stroke="#7f8c8d" stroke-width="2"/>
    <rect x="40" y="65" width="8" height="20" fill="#7f8c8d" rx="1"/>
    <rect x="70" y="65" width="8" height="20" fill="#7f8c8d" rx="1"/>
    <rect x="142" y="65" width="8" height="20" fill="#7f8c8d" rx="1"/>
    <rect x="172" y="65" width="8" height="20" fill="#7f8c8d" rx="1"/>
    
    <!-- Предметный столик -->
    <rect x="90" y="45" width="60" height="3" fill="#95a5a6"/>
    
    <!-- Объект -->
    <circle cx="120" cy="48" r="2" fill="#e74c3c"/>
    
    <!-- Изображение -->
    <circle cx="140" cy="20" r="4" fill="#e74c3c"/>
    
    <!-- Подписи -->
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Окуляр</text>
    <text x="115" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Объектив</text>
    <text x="80" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Микроскоп</text>
  </g>
  
  <!-- Телескоп-рефрактор -->
  <g transform="translate(320, 120)">
    <!-- Труба -->
    <rect x="20" y="30" width="100" height="20" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="2"/>
    <rect x="120" y="35" width="80" height="15" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="2"/>
    
    <!-- Объектив -->
    <ellipse cx="25" cy="40" rx="10" ry="10" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
    <ellipse cx="25" cy="40" rx="8" ry="8" fill="#d5e8f0" stroke="#2980b9" stroke-width="1"/>
    
    <!-- Окуляр -->
    <ellipse cx="195" cy="42" rx="8" ry="7" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
    <ellipse cx="195" cy="42" rx="6" ry="5" fill="#d5e8f0" stroke="#2980b9" stroke-width="1"/>
    
    <!-- Подставка -->
    <rect x="55" y="50" width="60" height="3" fill="#95a5a6"/>
    <rect x="80" y="53" width="10" height="25" fill="#7f8c8d" rx="1"/>
    
    <!-- Световые лучи -->
    <line x1="0" y1="35" x2="15" y2="37" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="40" x2="15" y2="40" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="45" x2="15" y2="43" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    
    <line x1="15" y1="37" x2="180" y2="42" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    <line x1="15" y1="40" x2="180" y2="42" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    <line x1="15" y1="43" x2="180" y2="42" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    
    <line x1="200" y1="42" x2="215" y2="40" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    <line x1="200" y1="42" x2="215" y2="42" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    <line x1="200" y1="42" x2="215" y2="44" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    
    <!-- Подпись -->
    <text x="75" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Телескоп-рефрактор</text>
  </g>
  
  <!-- Телескоп-рефлектор -->
  <g transform="translate(80, 230)">
    <!-- Труба -->
    <rect x="20" y="30" width="120" height="25" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="2"/>
    
    <!-- Главное зеркало -->
    <ellipse cx="135" cy="42" rx="15" ry="12" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    <line x1="120" y1="42" x2="150" y2="42" stroke="#34495e" stroke-width="1"/>
    <line x1="127" y1="37" x2="143" y2="47" stroke="#34495e" stroke-width="1"/>
    <line x1="127" y1="47" x2="143" y2="37" stroke="#34495e" stroke-width="1"/>
    
    <!-- Вторичное зеркало -->
    <ellipse cx="45" cy="42" rx="8" ry="6" fill="#ecf0f1" stroke="#34495e" stroke-width="2"/>
    <line x1="39" y1="40" x2="51" y2="44" stroke="#34495e" stroke-width="1"/>
    <line x1="51" y1="40" x2="39" y2="44" stroke="#34495e" stroke-width="1"/>
    
    <!-- Окуляр -->
    <rect x="35" y="55" width="20" height="10" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1" rx="1"/>
    <ellipse cx="45" cy="60" rx="6" ry="4" fill="#e8f4f8" stroke="#3498db" stroke-width="2"/>
    
    <!-- Подставка -->
    <rect x="60" y="55" width="60" height="3" fill="#95a5a6"/>
    <rect x="85" y="58" width="10" height="25" fill="#7f8c8d" rx="1"/>
    
    <!-- Световые лучи -->
    <line x1="0" y1="35" x2="20" y2="38" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="40" x2="20" y2="40" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="45" x2="20" y2="42" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    
    <line x1="20" y1="38" x2="135" y2="42" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    <line x1="20" y1="40" x2="135" y2="42" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    <line x1="20" y1="42" x2="135" y2="42" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    
    <line x1="135" y1="42" x2="135" y2="42" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    <line x1="135" y1="42" x2="45" y2="42" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    <line x1="45" y1="42" x2="45" y2="55" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    
    <line x1="45" y1="65" x2="60" y2="65" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    
    <!-- Подпись -->
    <text x="75" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Телескоп-рефлектор</text>
  </g>
  
  <!-- Формула увеличения лупы -->
  <g transform="translate(320, 240)">
    <rect x="0" y="0" width="150" height="50" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="75" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Увеличение лупы:</text>
    <text x="75" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3498db">Γ = D/ф</text>
    <text x="75" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">D - расстояние четкого видения</text>
  </g>
  
  <!-- Формула увеличения микроскопа -->
  <g transform="translate(320, 300)">
    <rect x="0" y="0" width="150" height="50" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="75" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Увеличение микроскопа:</text>
    <text x="75" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3498db">Γ = -Δ·D/ф₁·ф₂</text>
    <text x="75" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Δ - расстояние между фокусами</text>
  </g>
  
  <!-- Легенда -->
  <g transform="translate(20, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Легенда:</text>
    <line x1="0" y1="10" x2="15" y2="10" stroke="#f39c12" stroke-width="1" opacity="0.7"/>
    <text x="20" y="13" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Световой луч</text>
    <line x1="0" y1="25" x2="15" y2="25" stroke="#f39c12" stroke-width="0.5" opacity="0.5" stroke-dasharray="2,2"/>
    <text x="20" y="28" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Луч после отражения/преломления</text>
  </g>
</svg>