<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow6" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <linearGradient id="beaker6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">Урок 6: Массовая доля вещества</text>

  <!-- Main formula box -->
  <rect x="15" y="58" width="470" height="68" rx="10" fill="white" opacity="0.95" filter="url(#shadow6)"/>
  <rect x="15" y="58" width="470" height="22" rx="10" fill="#66BB6A" opacity="0.3"/>
  <rect x="15" y="74" width="470" height="6" fill="#66BB6A" opacity="0.3"/>
  <text x="250" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#388E3C">Главная формула</text>
  <!-- Large formula -->
  <text x="250" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#2E7D32">ω = m(в-ва) / m(р-ра) × 100%</text>
  <text x="250" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#555">где m(р-ра) = m(в-ва) + m(растворителя)</text>

  <!-- Formula components diagram: beaker visual -->
  <g transform="translate(15,130)">
    <rect width="85" height="68" rx="6" fill="white" opacity="0.9" filter="url(#shadow6)"/>
    <text x="42" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#388E3C">Схема раствора</text>
    <!-- Beaker -->
    <path d="M10,22 L10,58 Q10,63 15,63 L70,63 Q75,63 75,58 L75,22 Z" fill="url(#beaker6)" stroke="#1565C0" stroke-width="1"/>
    <rect x="8" y="18" width="69" height="6" rx="1" fill="none" stroke="#1565C0" stroke-width="1"/>
    <!-- Dissolved particles -->
    <circle cx="25" cy="35" r="4" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
    <circle cx="50" cy="40" r="3" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
    <circle cx="38" cy="50" r="4" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
    <circle cx="60" cy="30" r="3" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
    <!-- Labels -->
    <text x="42" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">H₂O</text>
    <line x1="60" y1="32" x2="82" y2="28" stroke="#F9A825" stroke-width="0.5"/>
    <text x="82" y="26" font-family="Arial,sans-serif" font-size="5" fill="#F9A825">в-во</text>
  </g>

  <!-- Example 1 -->
  <rect x="110" y="130" width="185" height="68" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <rect x="110" y="130" width="185" height="16" rx="8" fill="#43A047" opacity="0.8"/>
  <rect x="110" y="140" width="185" height="6" fill="#43A047" opacity="0.8"/>
  <text x="202" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Задача 1: Сахар в воде</text>
  <text x="118" y="162" font-family="Arial,sans-serif" font-size="8" fill="#333">m(сахара)=20 г, m(H₂O)=200 г</text>
  <text x="118" y="174" font-family="Arial,sans-serif" font-size="8" fill="#333">m(р-ра)=220 г</text>
  <text x="118" y="186" font-family="Arial,sans-serif" font-size="8" fill="#333">ω = 20/220 × 100%</text>
  <text x="118" y="196" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">ω = 9,1%</text>

  <!-- Example 2 -->
  <rect x="305" y="130" width="180" height="68" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <rect x="305" y="130" width="180" height="16" rx="8" fill="#1565C0" opacity="0.8"/>
  <rect x="305" y="140" width="180" height="6" fill="#1565C0" opacity="0.8"/>
  <text x="395" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Задача 2: 10% раствор соли</text>
  <text x="313" y="162" font-family="Arial,sans-serif" font-size="8" fill="#333">m(H₂O)=300 г, ω=10%</text>
  <text x="313" y="174" font-family="Arial,sans-serif" font-size="8" fill="#333">x/(x+300) = 0,1</text>
  <text x="313" y="186" font-family="Arial,sans-serif" font-size="8" fill="#333">0,9x = 30</text>
  <text x="313" y="196" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0">m(соли) = 33,3 г</text>

  <!-- Example 3: evaporation -->
  <rect x="15" y="205" width="235" height="80" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <rect x="15" y="205" width="235" height="16" rx="8" fill="#E65100" opacity="0.8"/>
  <rect x="15" y="215" width="235" height="6" fill="#E65100" opacity="0.8"/>
  <text x="132" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Задача 3: Выпаривание воды</text>
  <text x="25" y="237" font-family="Arial,sans-serif" font-size="8" fill="#333">Дано: 500 г 20% р-ра, выпарили 100 г H₂O</text>
  <text x="25" y="250" font-family="Arial,sans-serif" font-size="8" fill="#333">m(в-ва) = 500 × 0,2 = 100 г (не меняется!)</text>
  <text x="25" y="263" font-family="Arial,sans-serif" font-size="8" fill="#333">m(р-ра)₂ = 500 - 100 = 400 г</text>
  <text x="25" y="280" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100">ω₂ = (100/400) × 100% = 25%</text>

  <!-- Key rules -->
  <rect x="260" y="205" width="225" height="80" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <text x="372" y="223" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Ключевые правила</text>
  <line x1="270" y1="228" x2="475" y2="228" stroke="#A5D6A7" stroke-width="1"/>
  <text x="270" y="244" font-family="Arial,sans-serif" font-size="9" fill="#C62828">• Выпаривание H₂O → ω ↑ увеличивается</text>
  <text x="270" y="258" font-family="Arial,sans-serif" font-size="9" fill="#1565C0">• Добавление H₂O → ω ↓ уменьшается</text>
  <text x="270" y="272" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32">• Добавление в-ва → ω ↑ увеличивается</text>

  <!-- Derived formulas box -->
  <rect x="15" y="292" width="470" height="52" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <text x="250" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Производные формулы</text>
  <line x1="25" y1="316" x2="475" y2="316" stroke="#A5D6A7" stroke-width="1"/>
  <text x="25" y="332" font-family="Arial,sans-serif" font-size="9" fill="#333">m(в-ва) = ω × m(р-ра) / 100%</text>
  <text x="250" y="332" font-family="Arial,sans-serif" font-size="9" fill="#333">m(р-ра) = m(в-ва) / ω × 100%</text>
  <text x="25" y="340" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-style="italic">ω всегда в %, 0% &lt; ω &lt; 100%</text>
</svg>