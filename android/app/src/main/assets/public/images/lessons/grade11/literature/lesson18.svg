<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f4e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dcc0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a0522d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8956a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect x="0" y="0" width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="4" />
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#8b4513" stroke-width="1" />
  
  <!-- Заголовок класса -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#5c4033" font-weight="bold">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#3e2723" font-weight="bold">Урок 18: И. Ильф и Е. Петров. Сатира 1920-1930-х</text>
  
  <!-- Номер урока -->
  <text x="40" y="330" font-family="Arial, sans-serif" font-size="16" fill="#5c4033" font-weight="bold">Урок №18</text>
  
  <!-- Портреты авторов -->
  <g transform="translate(50, 80)">
    <!-- Ильин -->
    <circle cx="25" cy="25" r="20" fill="#d4a574" />
    <circle cx="25" cy="15" r="8" fill="#3e2723" />
    <path d="M15,30 Q25,25 35,30 L35,40 L15,40 Z" fill="#3e2723" />
    <text x="25" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3e2723">И. Ильф</text>
    
    <!-- Петров -->
    <circle cx="75" cy="25" r="20" fill="#b8956a" />
    <circle cx="75" cy="15" r="8" fill="#3e2723" />
    <path d="M65,30 Q75,25 85,30 L85,40 L65,40 Z" fill="#3e2723" />
    <text x="75" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3e2723">Е. Петров</text>
  </g>
  
  <!-- Книга "Двенадцать стульев" -->
  <g transform="translate(180, 80)">
    <rect x="0" y="0" width="60" height="80" fill="url(#bookGradient)" />
    <rect x="5" y="5" width="50" height="70" fill="#f5deb3" />
    <text x="30" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3e2723" font-weight="bold">ДВЕНАДЦАТЬ</text>
    <text x="30" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3e2723" font-weight="bold">СТУЛЬЕВ</text>
    <text x="30" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3e2723">1928</text>
    <text x="30" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3e2723">Первая книга</text>
  </g>
  
  <!-- Книга "Золотой телёнок" -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="60" height="80" fill="url(#bookGradient)" />
    <rect x="5" y="5" width="50" height="70" fill="#f5deb3" />
    <text x="30" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3e2723" font-weight="bold">ЗОЛОТОЙ</text>
    <text x="30" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3e2723" font-weight="bold">ТЕЛЁНОК</text>
    <text x="30" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3e2723">1931</text>
    <text x="30" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3e2723">Вторая книга</text>
  </g>
  
  <!-- Схема сатиры -->
  <g transform="translate(50, 190)">
    <rect x="0" y="0" width="400" height="120" fill="#f0e6d2" stroke="#8b4513" stroke-width="1" rx="5" />
    <text x="200" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3e2723" font-weight="bold">Объекты сатиры Ильфа и Петрова</text>
    
    <!-- Колонка 1 -->
    <line x1="50" y1="30" x2="50" y2="100" stroke="#8b4513" stroke-width="2" />
    <text x="50" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" font-weight="bold">Советская</text>
    <text x="50" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" font-weight="bold">бюрократия</text>
    <text x="50" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">— Остап Бендер</text>
    <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">— Киса Воробьянин</text>
    
    <!-- Колонка 2 -->
    <line x1="150" y1="30" x2="150" y2="100" stroke="#8b4513" stroke-width="2" />
    <text x="150" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" font-weight="bold">НЭП и</text>
    <text x="150" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" font-weight="bold">предприниматели</text>
    <text x="150" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">— отец Фёдор</text>
    <text x="150" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">— инженер Брунс</text>
    
    <!-- Колонка 3 -->
    <line x1="250" y1="30" x2="250" y2="100" stroke="#8b4513" stroke-width="2" />
    <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" font-weight="bold">Советская</text>
    <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" font-weight="bold">интеллигенция</text>
    <text x="250" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">— Паниковский</text>
    <text x="250" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">— Зося Синцова</text>
    
    <!-- Колонка 4 -->
    <line x1="350" y1="30" x2="350" y2="100" stroke="#8b4513" stroke-width="2" />
    <text x="350" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" font-weight="bold">Советская</text>
    <text x="350" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" font-weight="bold">идеология</text>
    <text x="350" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">—"Контрабандисты"</text>
    <text x="350" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">—"Энтузиасты"</text>
  </g>
  
  <!-- Даты жизни авторов -->
  <text x="420" y="330" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">Ильф: 1897-1937</text>
  <text x="420" y="345" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">Петров: 1903-1942</text>
  
  <!-- Ключевые термины -->
  <text x="20" y="170" font-family="Arial, sans-serif" font-size="10" fill="#5c4033" font-weight="bold">Сатирический дуэт:</text>
  <text x="120" y="170" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">Илья Файнзильберг</text>
  <text x="230" y="170" font-family="Arial, sans-serif" font-size="10" fill="#5c4033">Ева Кватер</text>
</svg>