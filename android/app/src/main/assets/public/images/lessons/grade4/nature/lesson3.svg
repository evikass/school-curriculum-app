<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Сезоны года</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">Зима, весна, лето, осень</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Four season panels -->
  <!-- Winter panel -->
  <rect x="30" y="88" width="100" height="90" rx="5" fill="#2B4C7E" opacity="0.08" stroke="#2B4C7E" stroke-width="1"/>
  <!-- Snowflakes -->
  <text x="80" y="112" font-family="Arial" font-size="16" fill="#2B4C7E" text-anchor="middle" opacity="0.7">*</text>
  <text x="60" y="130" font-family="Arial" font-size="12" fill="#2B4C7E" text-anchor="middle" opacity="0.5">*</text>
  <text x="100" y="125" font-family="Arial" font-size="14" fill="#2B4C7E" text-anchor="middle" opacity="0.6">*</text>
  <text x="75" y="148" font-family="Arial" font-size="10" fill="#2B4C7E" text-anchor="middle" opacity="0.4">*</text>
  <!-- Snow ground -->
  <path d="M30,170 Q55,162 80,168 Q105,160 130,170 L130,178 L30,178 Z" fill="white" opacity="0.7"/>
  <!-- Bare tree -->
  <line x1="80" y1="155" x2="80" y2="135" stroke="#5D4037" stroke-width="2"/>
  <line x1="80" y1="140" x2="68" y2="130" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="80" y1="138" x2="92" y2="128" stroke="#5D4037" stroke-width="1.5"/>
  <text x="80" y="175" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Зима</text>
  
  <!-- Spring panel -->
  <rect x="145" y="88" width="100" height="90" rx="5" fill="#2E7D32" opacity="0.08" stroke="#2E7D32" stroke-width="1"/>
  <!-- Green tree with blossoms -->
  <line x1="195" y1="155" x2="195" y2="125" stroke="#5D4037" stroke-width="2.5"/>
  <circle cx="195" cy="118" r="16" fill="#2E7D32" opacity="0.5"/>
  <circle cx="185" cy="122" r="10" fill="#2E7D32" opacity="0.4"/>
  <circle cx="205" cy="120" r="12" fill="#2E7D32" opacity="0.45"/>
  <!-- Small flowers -->
  <circle cx="170" cy="165" r="3" fill="#C41E3A" opacity="0.6"/>
  <circle cx="210" cy="168" r="3" fill="#D4A843" opacity="0.6"/>
  <circle cx="190" cy="170" r="2.5" fill="#C41E3A" opacity="0.5"/>
  <!-- Ground -->
  <path d="M145,170 Q170,165 195,168 Q220,163 245,170 L245,178 L145,178 Z" fill="#2E7D32" opacity="0.15"/>
  <text x="195" y="175" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Весна</text>
  
  <!-- Summer panel -->
  <rect x="260" y="88" width="100" height="90" rx="5" fill="#D4A843" opacity="0.1" stroke="#D4A843" stroke-width="1"/>
  <!-- Big sun -->
  <circle cx="310" cy="110" r="14" fill="#D4A843" opacity="0.8"/>
  <line x1="310" y1="92" x2="310" y2="88" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="310" y1="128" x2="310" y2="132" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="292" y1="110" x2="288" y2="110" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="328" y1="110" x2="332" y2="110" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Full green tree -->
  <line x1="310" y1="158" x2="310" y2="132" stroke="#5D4037" stroke-width="3"/>
  <circle cx="310" cy="126" r="18" fill="#2E7D32" opacity="0.7"/>
  <circle cx="298" cy="130" r="13" fill="#2E7D32" opacity="0.6"/>
  <circle cx="322" cy="128" r="14" fill="#2E7D32" opacity="0.65"/>
  <!-- Green ground -->
  <path d="M260,170 Q285,165 310,168 Q335,163 360,170 L360,178 L260,178 Z" fill="#2E7D32" opacity="0.2"/>
  <text x="310" y="175" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Лето</text>
  
  <!-- Autumn panel -->
  <rect x="375" y="88" width="100" height="90" rx="5" fill="#EF6C00" opacity="0.08" stroke="#EF6C00" stroke-width="1"/>
  <!-- Autumn tree -->
  <line x1="425" y1="155" x2="425" y2="125" stroke="#5D4037" stroke-width="2.5"/>
  <circle cx="425" cy="118" r="16" fill="#EF6C00" opacity="0.45"/>
  <circle cx="415" cy="122" r="11" fill="#FF8F00" opacity="0.5"/>
  <circle cx="435" cy="120" r="12" fill="#C41E3A" opacity="0.3"/>
  <!-- Falling leaves -->
  <ellipse cx="410" cy="145" rx="4" ry="2" fill="#EF6C00" opacity="0.6" transform="rotate(30,410,145)"/>
  <ellipse cx="440" cy="150" rx="4" ry="2" fill="#C41E3A" opacity="0.5" transform="rotate(-20,440,150)"/>
  <ellipse cx="420" cy="158" rx="3" ry="1.5" fill="#D4A843" opacity="0.5" transform="rotate(45,420,158)"/>
  <text x="425" y="175" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Осень</text>
  
  <!-- Circular arrows showing cycle -->
  <g transform="translate(250, 260)">
    <!-- Orbit circle -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.2" stroke-dasharray="4,3"/>
    <!-- Arrow heads -->
    <polygon points="40,0 32,-5 32,5" fill="#1a1a1a" opacity="0.3"/>
    <polygon points="-40,0 -32,-5 -32,5" fill="#1a1a1a" opacity="0.3"/>
    <polygon points="0,40 -5,32 5,32" fill="#1a1a1a" opacity="0.3"/>
    <polygon points="0,-40 -5,-32 5,-32" fill="#1a1a1a" opacity="0.3"/>
    <!-- Season icons in orbit -->
    <text x="0" y="-48" font-family="Arial" font-size="9" fill="#2B4C7E" text-anchor="middle">X</text>
    <text x="55" y="4" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle">P</text>
    <text x="0" y="55" font-family="Arial" font-size="9" fill="#D4A843" text-anchor="middle">Л</text>
    <text x="-55" y="4" font-family="Arial" font-size="9" fill="#EF6C00" text-anchor="middle">О</text>
  </g>
  <text x="250" y="300" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">Круговорот сезонов</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>