<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="500" height="32" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Бизнес-идея</text>
  <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE082">Бизнес — Урок 2</text>

  <!-- Lesson number badge -->
  <circle cx="30" cy="26" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="30" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>

  <!-- Section: Источники идей -->
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Источники идей</text>
  <rect x="20" y="65" width="148" height="68" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="20" y="65" width="148" height="20" rx="8" ry="8" fill="#FFB300" opacity="0.2"/>
  <rect x="20" y="77" width="148" height="8" fill="#FFB300" opacity="0.2"/>
  <text x="94" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3E2723">Личный опыт</text>
  <text x="94" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Реши свою</text>
  <text x="94" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">собственную</text>
  <text x="94" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">проблему</text>
  <rect x="176" y="65" width="148" height="68" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="176" y="65" width="148" height="20" rx="8" ry="8" fill="#FFB300" opacity="0.2"/>
  <rect x="176" y="77" width="148" height="8" fill="#FFB300" opacity="0.2"/>
  <text x="250" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3E2723">Наблюдение</text>
  <text x="250" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Изучай тренды</text>
  <text x="250" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">и поведение</text>
  <text x="250" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">людей</text>
  <rect x="332" y="65" width="148" height="68" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="332" y="65" width="148" height="20" rx="8" ry="8" fill="#FFB300" opacity="0.2"/>
  <rect x="332" y="77" width="148" height="8" fill="#FFB300" opacity="0.2"/>
  <text x="406" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#3E2723">Кросс-индустрия</text>
  <text x="406" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Перенеси решение</text>
  <text x="406" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">из одной сферы</text>
  <text x="406" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">в другую</text>
  <!-- Section: Критерии оценки идеи -->
  <text x="20" y="141" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Критерии оценки идеи</text>
  <rect x="20" y="146" width="460" height="18" rx="4" ry="4" fill="#FFB300" opacity="0.3"/>
  <text x="30" y="159" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Критерий</text>
  <text x="430" y="159" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Оценка</text>
  <rect x="20" y="166" width="460" height="18" rx="2" ry="2" fill="#FF6F00" opacity="0.06"/>
  <text x="30" y="179" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Решает ли проблему?</text>
  <text x="430" y="179" font-family="Arial, sans-serif" font-size="9" fill="#FF6F00">★★★★★</text>
  <rect x="20" y="184" width="460" height="18" rx="2" ry="2" fill="#FF6F00" opacity="0.02"/>
  <text x="30" y="197" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Есть ли рынок?</text>
  <text x="430" y="197" font-family="Arial, sans-serif" font-size="9" fill="#FF6F00">★★★★☆</text>
  <rect x="20" y="202" width="460" height="18" rx="2" ry="2" fill="#FF6F00" opacity="0.06"/>
  <text x="30" y="215" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Реализуема ли?</text>
  <text x="430" y="215" font-family="Arial, sans-serif" font-size="9" fill="#FF6F00">★★★☆☆</text>
  <rect x="20" y="220" width="460" height="18" rx="2" ry="2" fill="#FF6F00" opacity="0.02"/>
  <text x="30" y="233" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Уникальна ли?</text>
  <text x="430" y="233" font-family="Arial, sans-serif" font-size="9" fill="#FF6F00">★★★★☆</text>
  <!-- Tip -->
  <rect x="15" y="325" width="470" height="18" rx="9" ry="9" fill="#FF6F00" opacity="0.1"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-style="italic" fill="#3E2723">Совет: Идея без реализации — это фантазия. Тестируй идею на реальных людях!</text>

  <!-- Footer -->
  <line x1="20" y1="343" x2="480" y2="343" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" opacity="0.7">Бизнес · 10 класс</text>
</svg>