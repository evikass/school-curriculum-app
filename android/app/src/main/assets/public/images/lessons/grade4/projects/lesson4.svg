<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Анализ и выводы</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Исследовательские проекты</text>
  <!-- Illustration area -->
  <rect x="140" y="270" width="220" height="2" fill="#1a1a1a"/><rect x="140" y="150" width="2" height="120" fill="#1a1a1a"/><rect x="170" y="200" width="30" height="70" fill="#C41E3A" opacity="0.8"/><rect x="220" y="170" width="30" height="100" fill="#2B4C7E" opacity="0.8"/><rect x="270" y="190" width="30" height="80" fill="#D4A843" opacity="0.8"/><rect x="320" y="155" width="30" height="115" fill="#228B22" opacity="0.8"/><text x="185" y="295" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">А</text><text x="235" y="295" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">Б</text><text x="285" y="295" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">В</text><text x="335" y="295" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">Г</text><text x="250" y="135" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Что мы узнали?</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Проектная деятельность</text>
</svg>