<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FADBD8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#F5B7B1;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#85C1E9"/>
      <stop offset="100%" style="stop-color:#3498DB"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit14)"/>
  <rect width="500" height="350" fill="#FDEDEC" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="25" fill="#F4D03F" opacity="0.8">
    <animate attributeName="r" values="23;27;23" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#922B21" text-anchor="middle">🌍 Сказки народов мира</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#E74C3C" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="270" ry="50" fill="#ABEBC6" opacity="0.5"/>
  
  <!-- Globe -->
  <g transform="translate(200, 70)">
    <circle cx="50" cy="60" r="50" fill="url(#globe)" stroke="#2980B9" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0 50 60;360 50 60" dur="20s" repeatCount="indefinite"/>
    </circle>
    <!-- Continents -->
    <ellipse cx="35" cy="45" rx="15" ry="20" fill="#27AE60" opacity="0.8"/>
    <ellipse cx="70" cy="55" rx="12" ry="15" fill="#27AE60" opacity="0.8"/>
    <ellipse cx="50" cy="80" rx="10" ry="8" fill="#27AE60" opacity="0.8"/>
  </g>
  
  <!-- Books from different countries -->
  <!-- Russian book -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="40" height="50" fill="#E74C3C" rx="3">
      <animate attributeName="y" values="0;-3;0" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="20" y="30" font-size="8" fill="#FFF" text-anchor="middle">РУС</text>
  </g>
  
  <!-- French book -->
  <g transform="translate(80, 110)">
    <rect x="0" y="0" width="35" height="45" fill="#3498DB" rx="3">
      <animate attributeName="y" values="0;-4;0" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="17" y="28" font-size="7" fill="#FFF" text-anchor="middle">FRA</text>
  </g>
  
  <!-- German book -->
  <g transform="translate(380, 90)">
    <rect x="0" y="0" width="38" height="48" fill="#F39C12" rx="3">
      <animate attributeName="y" values="0;-3;0" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <text x="19" y="28" font-size="7" fill="#FFF" text-anchor="middle">DEU</text>
  </g>
  
  <!-- Persian book -->
  <g transform="translate(430, 105)">
    <rect x="0" y="0" width="35" height="45" fill="#9B59B6" rx="3">
      <animate attributeName="y" values="0;-4;0" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <text x="17" y="28" font-size="7" fill="#FFF" text-anchor="middle">PER</text>
  </g>
  
  <!-- Magic lamp (Aladdin) -->
  <g transform="translate(130, 150)">
    <ellipse cx="20" cy="30" rx="18" ry="12" fill="#F1C40F"/>
    <ellipse cx="20" cy="20" rx="10" ry="8" fill="#F39C12"/>
    <path d="M30,25 Q45,15 40,5" fill="none" stroke="#BDC3C7" stroke-width="3" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Magic carpet -->
  <g transform="translate(320, 150)">
    <path d="M0,20 Q30,0 60,20 Q90,40 120,20" fill="#E74C3C" stroke="#C0392B" stroke-width="2">
      <animate attributeName="d" values="M0,20 Q30,0 60,20 Q90,40 120,20;M0,25 Q30,10 60,25 Q90,40 120,25;M0,20 Q30,0 60,20 Q90,40 120,20" dur="2s" repeatCount="indefinite"/>
    </path>
    <line x1="20" y1="15" x2="20" y2="25" stroke="#F1C40F" stroke-width="2"/>
    <line x1="60" y1="15" x2="60" y2="25" stroke="#F1C40F" stroke-width="2"/>
    <line x1="100" y1="15" x2="100" y2="25" stroke="#F1C40F" stroke-width="2"/>
  </g>
  
  <!-- Info -->
  <g transform="translate(30, 230)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="80" fill="#F9EBEA" rx="8" stroke="#E74C3C"/>
    <text x="220" y="22" font-size="12" font-weight="bold" fill="#922B21" text-anchor="middle">Сказки со всего света</text>
    <text x="220" y="42" font-size="10" fill="#C0392B" text-anchor="middle">«Тысяча и одна ночь» • Братья Гримм • Ганс Христиан Андерсен</text>
    <text x="220" y="58" font-size="10" fill="#E74C3C" text-anchor="middle">Каждая страна имеет свои уникальные сказки</text>
    <text x="220" y="73" font-size="9" fill="#F1948A" text-anchor="middle">Сказки учат добру и мудрости!</text>
  </g>
  
  <!-- Stars -->
  <polygon points="50,60 52,66 58,66 53,70 55,76 50,72 45,76 47,70 42,66 48,66" fill="#F1C40F" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="460,80 462,86 468,86 463,90 465,96 460,92 455,96 457,90 452,86 458,86" fill="#F1C40F" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
</svg>