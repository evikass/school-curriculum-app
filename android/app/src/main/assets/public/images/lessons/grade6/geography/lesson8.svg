<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="therm8" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="40%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Температура воздуха</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Thermometer -->
  <rect x="30" y="92" width="100" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Thermometer body -->
  <rect x="65" y="105" width="12" height="130" rx="6" fill="white" stroke="#BDBDBD" stroke-width="1.5"/>
  <!-- Mercury column -->
  <rect x="68" y="150" width="6" height="80" rx="3" fill="url(#therm8)"/>
  <!-- Bulb -->
  <circle cx="71" cy="232" r="10" fill="#EF5350" stroke="#BDBDBD" stroke-width="1.5"/>
  <circle cx="71" cy="232" r="5" fill="#EF5350" opacity="0.6"/>
  <!-- Scale marks -->
  <line x1="77" y1="110" x2="83" y2="110" stroke="#999" stroke-width="0.8"/>
  <text x="87" y="113" font-family="Arial,sans-serif" font-size="7" fill="#C62828">+40</text>
  <line x1="77" y1="135" x2="83" y2="135" stroke="#999" stroke-width="0.8"/>
  <text x="87" y="138" font-family="Arial,sans-serif" font-size="7" fill="#999">+20</text>
  <line x1="77" y1="160" x2="83" y2="160" stroke="#999" stroke-width="0.8"/>
  <text x="87" y="163" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">0</text>
  <line x1="77" y1="185" x2="83" y2="185" stroke="#999" stroke-width="0.8"/>
  <text x="87" y="188" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">-20</text>
  <!-- Current temp pointer -->
  <line x1="57" y1="150" x2="65" y2="150" stroke="#E65100" stroke-width="1.5"/>
  <text x="50" y="153" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="end">+15</text>
  <text x="80" y="270" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Термометр</text>

  <!-- Card 2: Temperature by latitude -->
  <rect x="140" y="92" width="170" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="225" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Изменение от широты</text>
  <!-- Graph -->
  <line x1="160" y1="120" x2="160" y2="270" stroke="#999" stroke-width="1"/>
  <line x1="160" y1="270" x2="295" y2="270" stroke="#999" stroke-width="1"/>
  <!-- Y-axis -->
  <text x="155" y="130" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">+30</text>
  <text x="155" y="160" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">+20</text>
  <text x="155" y="195" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">+10</text>
  <text x="155" y="225" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">0</text>
  <text x="155" y="255" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">-10</text>
  <!-- Grid lines -->
  <line x1="160" y1="128" x2="295" y2="128" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="160" y1="158" x2="295" y2="158" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="160" y1="193" x2="295" y2="193" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="160" y1="223" x2="295" y2="223" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- X-axis labels -->
  <text x="175" y="280" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">90 N</text>
  <text x="225" y="280" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">0 экв.</text>
  <text x="280" y="280" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">90 S</text>
  <!-- Temperature curve (bell shape - warm at equator, cold at poles) -->
  <path d="M175,252 Q185,235 195,210 Q205,175 215,140 Q225,125 235,140 Q245,175 255,210 Q265,235 280,252" fill="none" stroke="#EF5350" stroke-width="2"/>
  <path d="M175,252 Q185,240 195,220 Q205,190 215,155 Q225,140 235,155 Q245,190 255,220 Q265,240 280,252" fill="#EF5350" opacity="0.1"/>
  <!-- Points -->
  <circle cx="175" cy="252" r="3" fill="#1565C0"/>
  <circle cx="225" cy="125" r="3" fill="#EF5350"/>
  <circle cx="280" cy="252" r="3" fill="#1565C0"/>

  <!-- Card 3: Temperature by altitude -->
  <rect x="320" y="92" width="150" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="395" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Понижение с высотой</text>
  <!-- Mountain -->
  <polygon points="340,280 395,140 450,280" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <!-- Snow cap -->
  <polygon points="380,155 395,140 410,155" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Altitude markers -->
  <line x1="335" y1="280" x2="330" y2="280" stroke="#999" stroke-width="0.8"/>
  <text x="325" y="283" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">0 м</text>
  <text x="370" y="280" font-family="Arial,sans-serif" font-size="7" fill="#EF5350" text-anchor="middle">+25 C</text>
  <line x1="365" y1="230" x2="330" y2="230" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="325" y="233" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">1 км</text>
  <text x="390" y="230" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">+10 C</text>
  <line x1="385" y1="195" x2="330" y2="195" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="325" y="198" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">2 км</text>
  <text x="400" y="195" font-family="Arial,sans-serif" font-size="7" fill="#42A5F5" text-anchor="middle">-5 C</text>
  <line x1="395" y1="165" x2="330" y2="165" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="325" y="168" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">3 км</text>
  <text x="410" y="165" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">-20 C</text>
  <!-- Formula -->
  <text x="395" y="295" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">6 C на 1 км высоты</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Температура воздуха</text>
</svg>