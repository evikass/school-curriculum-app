<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect x="0" y="0" width="500" height="6" fill="#C41E3A"/>
  <rect x="0" y="310" width="500" height="4" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Главные члены предложения</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">Подлежащее и сказуемое -- грамматическая основа</text>
  <!-- Large diagram frame -->
  <rect x="40" y="90" width="420" height="200" rx="6" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="2"/>
  <!-- Sentence at top of diagram -->
  <text x="250" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#1a1a1a">Мальчик читает интересную книгу.</text>
  <!-- Underlines showing members -->
  <!-- Подлежащее - single underline (boy) -->
  <line x1="130" y1="126" x2="195" y2="126" stroke="#C41E3A" stroke-width="3"/>
  <!-- Сказуемое - double underline (reads) -->
  <line x1="200" y1="125" x2="268" y2="125" stroke="#2B4C7E" stroke-width="2.5"/>
  <line x1="200" y1="130" x2="268" y2="130" stroke="#2B4C7E" stroke-width="2.5"/>
  <!-- Arrows down from words -->
  <line x1="162" y1="133" x2="162" y2="155" stroke="#C41E3A" stroke-width="1.5"/>
  <polygon points="158,152 162,160 166,152" fill="#C41E3A"/>
  <line x1="234" y1="133" x2="234" y2="155" stroke="#2B4C7E" stroke-width="1.5"/>
  <polygon points="230,152 234,160 238,152" fill="#2B4C7E"/>
  <!-- Labels for subject and predicate -->
  <rect x="90" y="162" width="145" height="30" rx="5" fill="#C41E3A" opacity="0.9"/>
  <text x="162" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">ПОДЛЕЖАЩЕЕ</text>
  <rect x="265" y="162" width="145" height="30" rx="5" fill="#2B4C7E" opacity="0.9"/>
  <text x="337" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">СКАЗУЕМОЕ</text>
  <!-- Questions -->
  <text x="162" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C41E3A" font-weight="bold">Кто? Что?</text>
  <text x="337" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2B4C7E" font-weight="bold">Что делает?</text>
  <!-- Example words -->
  <text x="162" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">мальчик (кто?)</text>
  <text x="337" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#1a1a1a">читает (что делает?)</text>
  <!-- Second example -->
  <line x1="60" y1="245" x2="440" y2="245" stroke="#D4A843" stroke-width="1.5"/>
  <text x="250" y="265" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">Птицы летят на юг.</text>
  <!-- Underlines for second example -->
  <line x1="185" y1="270" x2="228" y2="270" stroke="#C41E3A" stroke-width="2.5"/>
  <line x1="233" y1="269" x2="272" y2="269" stroke="#2B4C7E" stroke-width="2"/>
  <line x1="233" y1="274" x2="272" y2="274" stroke="#2B4C7E" stroke-width="2"/>
  <!-- Legend at bottom -->
  <line x1="120" y1="298" x2="150" y2="298" stroke="#C41E3A" stroke-width="3"/>
  <text x="158" y="302" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a">одна черта</text>
  <line x1="280" y1="296" x2="310" y2="296" stroke="#2B4C7E" stroke-width="2"/>
  <line x1="280" y1="300" x2="310" y2="300" stroke="#2B4C7E" stroke-width="2"/>
  <text x="318" y="302" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a">две черты</text>
  <!-- Subject name -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a">Русский язык -- 4 класс</text>
</svg>
