<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Свойства логарифмов</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Property 1: Product rule -->
    <rect x="25" y="90" width="460" height="42" rx="5" fill="white" opacity="0.8" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="25" y="90" width="5" height="42" rx="2" fill="#5C6BC0"/>
    <text x="40" y="107" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">1. Логарифм произведения:</text>
    <text x="280" y="107" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0" font-weight="bold">loga(b*c) = loga b + loga c</text>
    <text x="40" y="125" font-family="Arial,sans-serif" font-size="10" fill="#888">Пример: log2 12 = log2 4 + log2 3 = 2 + log2 3</text>
    <!-- Property 2: Quotient rule -->
    <rect x="25" y="138" width="460" height="42" rx="5" fill="white" opacity="0.8" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="25" y="138" width="5" height="42" rx="2" fill="#E91E63"/>
    <text x="40" y="155" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">2. Логарифм частного:</text>
    <text x="280" y="155" font-family="Arial,sans-serif" font-size="13" fill="#E91E63" font-weight="bold">loga(b/c) = loga b - loga c</text>
    <text x="40" y="173" font-family="Arial,sans-serif" font-size="10" fill="#888">Пример: log3 9/3 = log3 9 - log3 3 = 2 - 1 = 1</text>
    <!-- Property 3: Power rule -->
    <rect x="25" y="186" width="460" height="42" rx="5" fill="white" opacity="0.8" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="25" y="186" width="5" height="42" rx="2" fill="#4CAF50"/>
    <text x="40" y="203" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">3. Логарифм степени:</text>
    <text x="280" y="203" font-family="Arial,sans-serif" font-size="13" fill="#4CAF50" font-weight="bold">loga b^k = k * loga b</text>
    <text x="40" y="221" font-family="Arial,sans-serif" font-size="10" fill="#888">Пример: log2 8^2 = 2 * log2 8 = 2 * 3 = 6</text>
    <!-- Property 4: Change of base & special -->
    <rect x="25" y="234" width="225" height="62" rx="5" fill="white" opacity="0.8" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="25" y="234" width="5" height="62" rx="2" fill="#FF9800"/>
    <text x="40" y="251" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">4. Переход к новому основанию:</text>
    <text x="40" y="270" font-family="Arial,sans-serif" font-size="12" fill="#FF9800" font-weight="bold">loga b = logc b / logc a</text>
    <text x="40" y="289" font-family="Arial,sans-serif" font-size="10" fill="#888">Следствие: loga b = 1/logb a</text>
    <!-- Special cases -->
    <rect x="260" y="234" width="225" height="62" rx="5" fill="white" opacity="0.8" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="260" y="234" width="5" height="62" rx="2" fill="#3F51B5"/>
    <text x="275" y="251" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">Частные случаи:</text>
    <text x="275" y="270" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">loga a = 1 ;  loga 1 = 0</text>
    <text x="275" y="289" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">a^(loga b) = b</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>