<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">At the Airport</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Иностранный язык - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Airplane -->
  <g transform="translate(15, 88)">
    <!-- Fuselage -->
    <ellipse cx="80" cy="40" rx="55" ry="12" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1"/>
    <!-- Nose -->
    <path d="M135,40 L145,38 L145,42 Z" fill="#B0BEC5" stroke="#90A4AE" stroke-width="0.5"/>
    <!-- Tail -->
    <polygon points="28,40 20,25 35,35" fill="#C62828" stroke="#B71C1C" stroke-width="0.5"/>
    <polygon points="28,40 20,55 35,45" fill="#C62828" stroke="#B71C1C" stroke-width="0.5"/>
    <!-- Wings -->
    <path d="M60,40 L45,20 L90,28 L70,40" fill="#B0BEC5" stroke="#90A4AE" stroke-width="0.8"/>
    <path d="M60,40 L45,60 L90,52 L70,40" fill="#B0BEC5" stroke="#90A4AE" stroke-width="0.8"/>
    <!-- Windows -->
    <circle cx="65" cy="38" r="2" fill="#42A5F5"/>
    <circle cx="73" cy="38" r="2" fill="#42A5F5"/>
    <circle cx="81" cy="38" r="2" fill="#42A5F5"/>
    <circle cx="89" cy="38" r="2" fill="#42A5F5"/>
    <circle cx="97" cy="38" r="2" fill="#42A5F5"/>
    <circle cx="105" cy="38" r="2" fill="#42A5F5"/>
    <!-- Stripe -->
    <line x1="30" y1="42" x2="140" y2="42" stroke="#C62828" stroke-width="1.5"/>
  </g>
  <text x="100" y="152" font-family="Arial,sans-serif" font-size="9" fill="#546E7A" text-anchor="middle" font-weight="bold">airplane</text>

  <!-- Passport -->
  <g transform="translate(175, 88)">
    <rect x="0" y="0" width="42" height="55" rx="3" fill="#1565C0" stroke="#0D47A1" stroke-width="1.2"/>
    <!-- Gold border -->
    <rect x="4" y="4" width="34" height="47" rx="2" fill="none" stroke="#FDD835" stroke-width="1"/>
    <!-- Emblem -->
    <circle cx="21" cy="20" r="10" fill="none" stroke="#FDD835" stroke-width="0.8"/>
    <text x="21" y="24" font-family="Arial,sans-serif" font-size="8" fill="#FDD835" text-anchor="middle" font-weight="bold">RU</text>
    <!-- Lines -->
    <line x1="8" y1="35" x2="34" y2="35" stroke="#FDD835" stroke-width="0.5" opacity="0.6"/>
    <line x1="8" y1="39" x2="34" y2="39" stroke="#FDD835" stroke-width="0.5" opacity="0.6"/>
    <line x1="8" y1="43" x2="34" y2="43" stroke="#FDD835" stroke-width="0.5" opacity="0.6"/>
  </g>
  <text x="196" y="152" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">passport</text>

  <!-- Boarding Pass -->
  <g transform="translate(230, 88)">
    <rect x="0" y="0" width="75" height="55" rx="3" fill="white" stroke="#90A4AE" stroke-width="1"/>
    <!-- Tear line -->
    <line x1="55" y1="0" x2="55" y2="55" stroke="#BDBDBD" stroke-width="0.8" stroke-dasharray="2,2"/>
    <!-- Bar code -->
    <rect x="58" y="15" width="2" height="25" fill="#333"/>
    <rect x="62" y="15" width="1" height="25" fill="#333"/>
    <rect x="65" y="15" width="3" height="25" fill="#333"/>
    <rect x="70" y="15" width="1" height="25" fill="#333"/>
    <!-- Flight info -->
    <text x="8" y="14" font-family="monospace" font-size="6" fill="#C62828" font-weight="bold">FLIGHT</text>
    <text x="8" y="24" font-family="monospace" font-size="8" fill="#333" font-weight="bold">SU 1234</text>
    <text x="8" y="32" font-family="monospace" font-size="5" fill="#777">MOW - LON</text>
    <text x="8" y="40" font-family="monospace" font-size="5" fill="#777">GATE B12</text>
    <text x="8" y="48" font-family="monospace" font-size="5" fill="#777">SEAT 14A</text>
  </g>
  <text x="267" y="152" font-family="Arial,sans-serif" font-size="9" fill="#90A4AE" text-anchor="middle" font-weight="bold">boarding pass</text>

  <!-- Luggage -->
  <g transform="translate(320, 88)">
    <rect x="5" y="8" width="38" height="42" rx="4" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
    <!-- Handle -->
    <path d="M18,8 L18,2 Q18,0 24,0 Q30,0 30,2 L30,8" fill="none" stroke="#5D4037" stroke-width="2"/>
    <!-- Zipper -->
    <line x1="24" y1="15" x2="24" y2="40" stroke="#FDD835" stroke-width="1.5"/>
    <!-- Wheels -->
    <circle cx="14" cy="52" r="4" fill="#555"/>
    <circle cx="34" cy="52" r="4" fill="#555"/>
    <circle cx="14" cy="52" r="2" fill="#999"/>
    <circle cx="34" cy="52" r="2" fill="#999"/>
    <!-- Tag -->
    <rect x="32" y="18" width="10" height="12" rx="1" fill="#C62828"/>
    <rect x="34" y="20" width="6" height="8" rx="0.5" fill="white"/>
    <text x="37" y="26" font-family="Arial,sans-serif" font-size="4" fill="#C62828" text-anchor="middle">ID</text>
  </g>
  <text x="340" y="152" font-family="Arial,sans-serif" font-size="9" fill="#8D6E63" text-anchor="middle" font-weight="bold">luggage</text>

  <!-- Control Tower -->
  <g transform="translate(390, 88)">
    <rect x="10" y="30" width="25" height="25" rx="1" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1"/>
    <rect x="5" y="8" width="35" height="25" rx="2" fill="#B3E5FC" stroke="#90A4AE" stroke-width="1"/>
    <!-- Windows -->
    <rect x="9" y="12" width="8" height="6" rx="1" fill="#42A5F5"/>
    <rect x="20" y="12" width="8" height="6" rx="1" fill="#42A5F5"/>
    <rect x="9" y="20" width="8" height="6" rx="1" fill="#42A5F5"/>
    <rect x="20" y="20" width="8" height="6" rx="1" fill="#42A5F5"/>
    <!-- Antenna -->
    <line x1="22" y1="8" x2="22" y2="2" stroke="#555" stroke-width="1.5"/>
    <circle cx="22" cy="1" r="2" fill="#C62828"/>
    <!-- Light blink -->
    <circle cx="22" cy="1" r="4" fill="#C62828" opacity="0.2"/>
  </g>
  <text x="408" y="152" font-family="Arial,sans-serif" font-size="9" fill="#546E7A" text-anchor="middle" font-weight="bold">control tower</text>

  <!-- Departure Board -->
  <g transform="translate(30, 162)">
    <rect x="0" y="0" width="440" height="58" rx="4" fill="#263238" stroke="#37474F" stroke-width="2"/>
    <!-- Title -->
    <rect x="5" y="3" width="430" height="16" rx="2" fill="#37474F"/>
    <text x="220" y="15" font-family="monospace" font-size="9" fill="#FDD835" text-anchor="middle" font-weight="bold">DEPARTURES</text>
    <!-- Column headers -->
    <text x="50" y="30" font-family="monospace" font-size="7" fill="#90CAF9" text-anchor="middle">FLIGHT</text>
    <text x="120" y="30" font-family="monospace" font-size="7" fill="#90CAF9" text-anchor="middle">TO</text>
    <text x="200" y="30" font-family="monospace" font-size="7" fill="#90CAF9" text-anchor="middle">TIME</text>
    <text x="280" y="30" font-family="monospace" font-size="7" fill="#90CAF9" text-anchor="middle">GATE</text>
    <text x="360" y="30" font-family="monospace" font-size="7" fill="#90CAF9" text-anchor="middle">STATUS</text>
    <line x1="10" y1="33" x2="430" y2="33" stroke="#455A64" stroke-width="0.5"/>
    <!-- Row 1 -->
    <text x="50" y="44" font-family="monospace" font-size="8" fill="#4FC3F7" text-anchor="middle">SU 201</text>
    <text x="120" y="44" font-family="monospace" font-size="8" fill="white" text-anchor="middle">London</text>
    <text x="200" y="44" font-family="monospace" font-size="8" fill="white" text-anchor="middle">08:30</text>
    <text x="280" y="44" font-family="monospace" font-size="8" fill="white" text-anchor="middle">A12</text>
    <text x="360" y="44" font-family="monospace" font-size="8" fill="#66BB6A" text-anchor="middle">ON TIME</text>
    <!-- Row 2 -->
    <text x="50" y="54" font-family="monospace" font-size="8" fill="#4FC3F7" text-anchor="middle">BA 515</text>
    <text x="120" y="54" font-family="monospace" font-size="8" fill="white" text-anchor="middle">Paris</text>
    <text x="200" y="54" font-family="monospace" font-size="8" fill="white" text-anchor="middle">10:15</text>
    <text x="280" y="54" font-family="monospace" font-size="8" fill="white" text-anchor="middle">B05</text>
    <text x="360" y="54" font-family="monospace" font-size="8" fill="#FDD835" text-anchor="middle">DELAYED</text>
  </g>

  <!-- Vocabulary tags -->
  <g transform="translate(30, 232)">
    <rect x="0" y="0" width="60" height="18" rx="9" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
    <text x="30" y="13" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">check-in</text>
  </g>
  <g transform="translate(100, 232)">
    <rect x="0" y="0" width="60" height="18" rx="9" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
    <text x="30" y="13" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">departure</text>
  </g>
  <g transform="translate(170, 232)">
    <rect x="0" y="0" width="55" height="18" rx="9" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
    <text x="27" y="13" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">arrival</text>
  </g>
  <g transform="translate(235, 232)">
    <rect x="0" y="0" width="70" height="18" rx="9" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8"/>
    <text x="35" y="13" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">security</text>
  </g>
  <g transform="translate(315, 232)">
    <rect x="0" y="0" width="60" height="18" rx="9" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
    <text x="30" y="13" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">gate</text>
  </g>
  <g transform="translate(385, 232)">
    <rect x="0" y="0" width="75" height="18" rx="9" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
    <text x="37" y="13" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">customs</text>
  </g>

  <!-- Phrase examples -->
  <g transform="translate(45, 262)">
    <text x="0" y="12" font-family="Arial,sans-serif" font-size="9" fill="#555">
      <tspan font-weight="bold" fill="#1565C0">Where</tspan> is the check-in desk?
    </text>
  </g>
  <g transform="translate(45, 280)">
    <text x="0" y="12" font-family="Arial,sans-serif" font-size="9" fill="#555">
      <tspan font-weight="bold" fill="#1565C0">What time</tspan> does the flight leave?
    </text>
  </g>
  <g transform="translate(280, 262)">
    <text x="0" y="12" font-family="Arial,sans-serif" font-size="9" fill="#555">
      <tspan font-weight="bold" fill="#2E7D32">I have a</tspan> boarding pass.
    </text>
  </g>
  <g transform="translate(280, 280)">
    <text x="0" y="12" font-family="Arial,sans-serif" font-size="9" fill="#555">
      <tspan font-weight="bold" fill="#2E7D32">Show me your</tspan> passport.
    </text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">At the Airport</text>
</svg>