<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Творческий проект</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Создание собственной работы</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- finished painting on easel -->
  <line x1="340" y1="100" x2="340" y2="270" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="340" y1="100" x2="310" y2="270" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="340" y1="100" x2="370" y2="270" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="300" y="110" width="80" height="100" fill="#FFFFFF" opacity="0.6" stroke="#1a1a1a" stroke-width="1"/>
  <!-- little painting inside - abstract -->
  <rect x="305" y="115" width="70" height="30" fill="#2B4C7E" opacity="0.25"/>
  <polygon points="305,195 340,150 375,195" fill="#2E7D32" opacity="0.3"/>
  <circle cx="365" cy="130" r="10" fill="#D4A843" opacity="0.4"/>
  <rect x="305" y="180" width="70" height="25" fill="#2E7D32" opacity="0.2"/>
  <!-- large palette -->
  <ellipse cx="180" cy="220" rx="70" ry="45" fill="#D4A843" opacity="0.35" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="180" cy="220" rx="60" ry="38" fill="#D4A843" opacity="0.15"/>
  <!-- paint blobs on palette -->
  <circle cx="145" cy="205" r="8" fill="#C41E3A" opacity="0.7"/>
  <circle cx="170" cy="195" r="8" fill="#2B4C7E" opacity="0.7"/>
  <circle cx="200" cy="200" r="8" fill="#D4A843" opacity="0.7"/>
  <circle cx="220" cy="215" r="7" fill="#2E7D32" opacity="0.7"/>
  <circle cx="210" cy="235" r="7" fill="#8B008B" opacity="0.7"/>
  <circle cx="155" cy="235" r="6" fill="#1a1a1a" opacity="0.5"/>
  <!-- mixed paint -->
  <circle cx="185" cy="220" r="10" fill="#C41E3A" opacity="0.15"/>
  <!-- brushes -->
  <line x1="110" y1="260" x2="160" y2="170" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="265" x2="175" y2="180" stroke="#8B4513" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="245" y1="260" x2="200" y2="190" stroke="#8B4513" stroke-width="2.5" stroke-linecap="round"/>
  <!-- brush tips -->
  <circle cx="160" cy="170" r="4" fill="#C41E3A" opacity="0.6"/>
  <circle cx="175" cy="180" r="3.5" fill="#2B4C7E" opacity="0.6"/>
  <circle cx="200" cy="190" r="3.5" fill="#D4A843" opacity="0.6"/>
  <!-- sparkle/inspiration -->
  <polygon points="90,140 93,148 102,148 95,153 98,162 90,157 82,162 85,153 78,148 87,148" fill="#D4A843" opacity="0.4"/>
  <polygon points="250,130 252,135 258,135 254,138 255,144 250,141 245,144 246,138 242,135 248,135" fill="#C41E3A" opacity="0.3"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Изобразительное искусство</text>
</svg>