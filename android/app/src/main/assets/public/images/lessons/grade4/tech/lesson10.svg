<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Модели из природного материала</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Моделирование</text>
  <!-- Illustration area -->
  <ellipse cx="160" cy="180" rx="25" ry="35" fill="#8B4513" stroke="#5a2d0a" stroke-width="1.5"/><line x1="145" y1="155" x2="175" y2="155" stroke="#5a2d0a" stroke-width="1.5"/><line x1="140" y1="170" x2="180" y2="170" stroke="#5a2d0a" stroke-width="1"/><line x1="140" y1="185" x2="180" y2="185" stroke="#5a2d0a" stroke-width="1"/><line x1="145" y1="200" x2="175" y2="200" stroke="#5a2d0a" stroke-width="1.5"/><text x="160" y="235" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Шишка</text><ellipse cx="250" cy="195" rx="15" ry="20" fill="#8B6914" stroke="#5a4a0a" stroke-width="1.5"/><ellipse cx="250" cy="175" rx="18" ry="8" fill="#DEB887" stroke="#8B6914" stroke-width="1.5"/><rect x="248" y="165" width="4" height="8" fill="#5a4a0a"/><text x="250" y="235" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Жёлудь</text><ellipse cx="340" cy="185" rx="22" ry="15" fill="#228B22" stroke="#1a6b1a" stroke-width="1.5" transform="rotate(-20 340 185)"/><line x1="340" y1="200" x2="340" y2="215" stroke="#8B6914" stroke-width="2"/><text x="340" y="235" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Лист</text><text x="250" y="275" text-anchor="middle" font-size="11" fill="#C41E3A" font-weight="bold" font-family="Arial">Очисти и высуши!</text><text x="250" y="295" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Соедини пластилином или клеем</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>