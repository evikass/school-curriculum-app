<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Загрязнение почвы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Экология - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Left panel: Soil cross-section -->
  <rect x="30" y="90" width="220" height="205" rx="5" fill="white" stroke="#8D6E63" stroke-width="1.5" opacity="0.9"/>
  <text x="140" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#8D6E63" text-anchor="middle">РАЗРЕЗ ПОЧВЫ</text>
  
  <!-- Sky above ground -->
  <rect x="35" y="110" width="210" height="30" fill="#B3E5FC"/>
  
  <!-- Grass layer -->
  <rect x="35" y="138" width="210" height="10" fill="#66BB6A"/>
  <!-- Grass blades -->
  <line x1="45" y1="138" x2="42" y2="128" stroke="#43A047" stroke-width="1.5"/>
  <line x1="55" y1="138" x2="58" y2="126" stroke="#43A047" stroke-width="1.5"/>
  <line x1="90" y1="138" x2="87" y2="127" stroke="#43A047" stroke-width="1.5"/>
  <line x1="200" y1="138" x2="203" y2="128" stroke="#43A047" stroke-width="1.5"/>
  <line x1="230" y1="138" x2="227" y2="129" stroke="#43A047" stroke-width="1.5"/>
  
  <!-- Topsoil (dark) -->
  <rect x="35" y="148" width="210" height="40" fill="#795548"/>
  <text x="45" y="170" font-family="Arial,sans-serif" font-size="7" fill="#D7CCC8">Гумусовый слой</text>
  
  <!-- Subsoil -->
  <rect x="35" y="188" width="210" height="35" fill="#A1887F"/>
  <text x="45" y="210" font-family="Arial,sans-serif" font-size="7" fill="#D7CCC8">Подпочва</text>
  
  <!-- Bedrock -->
  <rect x="35" y="223" width="210" height="67" fill="#BCAAA4" rx="0"/>
  <text x="45" y="248" font-family="Arial,sans-serif" font-size="7" fill="#8D6E63">Горная порода</text>

  <!-- Buried trash in soil -->
  <!-- Plastic bag -->
  <path d="M80,160 Q75,155 78,150 L95,150 Q98,155 93,160 Z" fill="#E53935" opacity="0.6" stroke="#C62828" stroke-width="0.5"/>
  <!-- Can -->
  <rect x="120" y="155" width="10" height="14" rx="2" fill="#78909C" stroke="#546E7A" stroke-width="0.5"/>
  <!-- Battery -->
  <rect x="155" y="162" width="14" height="8" rx="1" fill="#757575" stroke="#5D4037" stroke-width="0.5"/>
  <rect x="155" y="160" width="4" height="2" fill="#F9A825"/>
  
  <!-- Chemical container deeper -->
  <rect x="100" y="198" width="16" height="22" rx="2" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <text x="108" y="212" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">!</text>
  <!-- Toxic leakage -->
  <path d="M108,220 Q112,228 108,235" stroke="#F9A825" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Dead roots -->
  <path d="M65,148 Q60,165 55,185 Q52,195 58,210" stroke="#5D4037" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M65,160 Q50,170 45,185" stroke="#5D4037" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Right top panel: Sunflower (phytoremediation) -->
  <rect x="260" y="90" width="115" height="120" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="317" y="106" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">ФИТОРЕМЕДИАЦИЯ</text>
  
  <!-- Clean soil -->
  <rect x="265" y="175" width="105" height="30" fill="#795548" rx="0"/>
  <rect x="265" y="173" width="105" height="5" fill="#66BB6A"/>
  
  <!-- Sunflower -->
  <rect x="314" y="130" width="6" height="45" fill="#66BB6A" stroke="#43A047" stroke-width="1"/>
  <!-- Leaves -->
  <ellipse cx="304" cy="155" rx="12" ry="5" fill="#43A047" transform="rotate(-20,304,155)"/>
  <ellipse cx="330" cy="148" rx="12" ry="5" fill="#66BB6A" transform="rotate(15,330,148)"/>
  <!-- Flower head -->
  <circle cx="317" cy="125" r="15" fill="#F9A825"/>
  <circle cx="317" cy="125" r="8" fill="#795548"/>
  <!-- Seeds pattern -->
  <circle cx="314" cy="122" r="1.5" fill="#5D4037"/>
  <circle cx="320" cy="122" r="1.5" fill="#5D4037"/>
  <circle cx="317" cy="127" r="1.5" fill="#5D4037"/>
  <circle cx="312" cy="126" r="1.5" fill="#5D4037"/>
  <circle cx="322" cy="126" r="1.5" fill="#5D4037"/>
  
  <!-- Downward arrows from roots -->
  <line x1="314" y1="175" x2="305" y2="185" stroke="#2E7D32" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="317" y1="175" x2="317" y2="188" stroke="#2E7D32" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="320" y1="175" x2="330" y2="185" stroke="#2E7D32" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="317" y="198" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">очистка</text>

  <!-- Sun -->
  <circle cx="370" cy="115" r="10" fill="#F9A825" opacity="0.6"/>
  
  <!-- Right bottom panel: Erosion -->
  <rect x="260" y="220" width="210" height="75" rx="5" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="365" y="236" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F9A825" text-anchor="middle">ЭРОЗИЯ ПОЧВЫ</text>
  
  <!-- Ground with erosion -->
  <rect x="270" y="265" width="190" height="22" fill="#795548" rx="0"/>
  <rect x="270" y="262" width="190" height="5" fill="#66BB6A"/>
  
  <!-- Wind arrows -->
  <path d="M285,250 L340,250" stroke="#1565C0" stroke-width="1.5" fill="none"/>
  <polygon points="340,250 335,247 335,253" fill="#1565C0"/>
  <path d="M290,258 L345,258" stroke="#1565C0" stroke-width="1" fill="none" opacity="0.7"/>
  <polygon points="345,258 340,255 340,261" fill="#1565C0" opacity="0.7"/>
  
  <!-- Soil particles blown away -->
  <circle cx="350" cy="248" r="2" fill="#8D6E63" opacity="0.6"/>
  <circle cx="365" cy="252" r="1.5" fill="#8D6E63" opacity="0.5"/>
  <circle cx="380" cy="247" r="2" fill="#8D6E63" opacity="0.4"/>
  <circle cx="395" cy="253" r="1.5" fill="#8D6E63" opacity="0.3"/>
  <circle cx="410" cy="249" r="2" fill="#8D6E63" opacity="0.2"/>
  <circle cx="425" cy="251" r="1.5" fill="#8D6E63" opacity="0.15"/>
  
  <!-- Eroded cliff -->
  <path d="M280,262 L285,250 L300,262" fill="#A1887F"/>
  <path d="M300,262 L310,255 L325,262" fill="#8D6E63"/>
  
  <!-- Remaining soil patches -->
  <rect x="340" y="262" width="30" height="5" fill="#66BB6A" opacity="0.5"/>
  <rect x="390" y="262" width="20" height="3" fill="#66BB6A" opacity="0.3"/>
  <rect x="430" y="262" width="15" height="2" fill="#66BB6A" opacity="0.2"/>
  
  <!-- Wind label -->
  <text x="310" y="246" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">ВЕТЕР</text>

  <!-- Right side: Dead tree -->
  <rect x="385" y="90" width="85" height="120" rx="5" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="427" y="106" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">ПОЧВА УБИТА</text>
  
  <!-- Dead tree -->
  <rect x="424" y="130" width="6" height="65" fill="#5D4037"/>
  <line x1="427" y1="145" x2="410" y2="125" stroke="#5D4037" stroke-width="3"/>
  <line x1="410" y1="125" x2="400" y2="118" stroke="#5D4037" stroke-width="2"/>
  <line x1="427" y1="135" x2="445" y2="120" stroke="#5D4037" stroke-width="3"/>
  <line x1="445" y1="120" x2="455" y2="112" stroke="#5D4037" stroke-width="2"/>
  <!-- No leaves, just X marks -->
  <text x="400" y="116" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">X</text>
  <text x="455" y="110" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">X</text>
  
  <!-- Chemical drums under dead tree -->
  <rect x="405" y="180" width="14" height="18" rx="2" fill="#F9A825" stroke="#F57F17" stroke-width="0.5"/>
  <rect x="435" y="178" width="14" height="20" rx="2" fill="#E53935" stroke="#C62828" stroke-width="0.5"/>
  
  <!-- Skull on ground -->
  <circle cx="427" cy="198" r="6" fill="white" stroke="#C62828" stroke-width="0.8"/>
  <circle cx="425" cy="196" r="1.5" fill="#C62828"/>
  <circle cx="430" cy="196" r="1.5" fill="#C62828"/>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Загрязнение почвы</text>
</svg>