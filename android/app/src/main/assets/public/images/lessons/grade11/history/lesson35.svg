<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#8B4513" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#D2691E" stroke-width="1"/>
  
  <!-- Номер урока в углу -->
  <text x="470" y="30" font-family="Arial" font-size="14" fill="#8B4513" text-anchor="end">№12</text>
  
  <!-- Заголовок класса -->
  <text x="250" y="35" font-family="Arial" font-size="16" fill="#8B4513" text-anchor="middle" font-weight="bold">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="60" font-family="Arial" font-size="20" fill="#8B4513" text-anchor="middle" font-weight="bold">Итоги XX-XXI веков</text>
  
  <!-- Градиент для ленты времени -->
  <defs>
    <linearGradient id="tapeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CD853F;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DEB887;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CD853F;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="worldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#4682B4;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <!-- Лента времени -->
  <rect x="50" y="90" width="400" height="40" fill="url(#tapeGradient)" rx="5"/>
  <text x="250" y="115" font-family="Arial" font-size="14" fill="#8B4513" text-anchor="middle" font-weight="bold">1914 - 2020</text>
  
  <!-- Ключевые даты на ленте -->
  <line x1="70" y1="90" x2="70" y2="130" stroke="#8B4513" stroke-width="2"/>
  <text x="70" y="145" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">1914</text>
  
  <line x1="150" y1="90" x2="150" y2="130" stroke="#8B4513" stroke-width="2"/>
  <text x="150" y="145" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">1945</text>
  
  <line x1="250" y1="90" x2="250" y2="130" stroke="#8B4513" stroke-width="2"/>
  <text x="250" y="145" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">1991</text>
  
  <line x1="350" y1="90" x2="350" y2="130" stroke="#8B4513" stroke-width="2"/>
  <text x="350" y="145" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">2001</text>
  
  <line x1="430" y1="90" x2="430" y2="130" stroke="#8B4513" stroke-width="2"/>
  <text x="430" y="145" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">2020</text>
  
  <!-- Карта мира -->
  <ellipse cx="120" cy="190" rx="60" ry="40" fill="url(#worldGradient)" stroke="#4682B4" stroke-width="1"/>
  <path d="M90,190 Q110,180 130,190 T170,190" fill="none" stroke="#228B22" stroke-width="2"/>
  <path d="M100,200 Q120,210 140,200 T160,200" fill="none" stroke="#228B22" stroke-width="2"/>
  <text x="120" y="240" font-family="Arial" font-size="12" fill="#8B4513" text-anchor="middle">Карта мира</text>
  
  <!-- График населения -->
  <rect x="220" y="160" width="150" height="80" fill="#F5F5DC" stroke="#8B4513" stroke-width="1"/>
  <polyline points="230,230 250,220 270,210 290,195 310,180 330,170 350,160" fill="none" stroke="#4682B4" stroke-width="2"/>
  <text x="295" y="155" font-family="Arial" font-size="12" fill="#8B4513" text-anchor="middle">Население мира</text>
  <text x="230" y="245" font-family="Arial" font-size="10" fill="#8B4513">1914</text>
  <text x="350" y="245" font-family="Arial" font-size="10" fill="#8B4513">2020</text>
  
  <!-- Портреты нобелевских лауреатов -->
  <!-- 1. Мария Кюри -->
  <circle cx="100" cy="280" r="20" fill="#F0E68C" stroke="#8B4513" stroke-width="1"/>
  <circle cx="100" cy="275" r="8" fill="#8B4513"/>
  <path d="M90,285 Q100,290 110,285" fill="none" stroke="#8B4513" stroke-width="1"/>
  <text x="100" y="310" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">М. Кюри</text>
  <text x="100" y="322" font-family="Arial" font-size="9" fill="#8B4513" text-anchor="middle">1911</text>
  
  <!-- 2. Альберт Эйнштейн -->
  <circle cx="180" cy="280" r="20" fill="#F0E68C" stroke="#8B4513" stroke-width="1"/>
  <path d="M170,275 Q180,270 190,275" fill="none" stroke="#8B4513" stroke-width="1"/>
  <circle cx="175" cy="280" r="2" fill="#8B4513"/>
  <circle cx="185" cy="280" r="2" fill="#8B4513"/>
  <text x="180" y="310" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">А. Эйнштейн</text>
  <text x="180" y="322" font-family="Arial" font-size="9" fill="#8B4513" text-anchor="middle">1921</text>
  
  <!-- 3. Мартин Лютер Кинг -->
  <circle cx="260" cy="280" r="20" fill="#F0E68C" stroke="#8B4513" stroke-width="1"/>
  <rect x="250" y="270" width="20" height="15" fill="#8B4513" rx="2"/>
  <circle cx="260" cy="275" r="5" fill="#F0E68C"/>
  <text x="260" y="310" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">М. Л. Кинг</text>
  <text x="260" y="322" font-family="Arial" font-size="9" fill="#8B4513" text-anchor="middle">1964</text>
  
  <!-- 4. Малала Юсуфзай -->
  <circle cx="340" cy="280" r="20" fill="#F0E68C" stroke="#8B4513" stroke-width="1"/>
  <path d="M330,275 Q340,270 350,275" fill="none" stroke="#8B4513" stroke-width="1"/>
  <path d="M335,285 Q340,288 345,285" fill="none" stroke="#8B4513" stroke-width="1"/>
  <text x="340" y="310" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">М. Юсуфзай</text>
  <text x="340" y="322" font-family="Arial" font-size="9" fill="#8B4513" text-anchor="middle">2014</text>
  
  <!-- 5. Боб Дилан -->
  <circle cx="420" cy="280" r="20" fill="#F0E68C" stroke="#8B4513" stroke-width="1"/>
  <path d="M410,275 Q420,270 430,275" fill="none" stroke="#8B4513" stroke-width="1"/>
  <path d="M415,285 Q420,288 425,285" fill="none" stroke="#8B4513" stroke-width="1"/>
  <text x="420" y="310" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">Б. Дилан</text>
  <text x="420" y="322" font-family="Arial" font-size="9" fill="#8B4513" text-anchor="middle">2016</text>
  
  <!-- Ключевые события -->
  <text x="70" y="175" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">Первая мировая война</text>
  
  <text x="150" y="175" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">Вторая мировая война</text>
  
  <text x="250" y="175" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">Распад СССР</text>
  
  <text x="350" y="175" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">Теракты 11 сентября</text>
  
  <text x="430" y="175" font-family="Arial" font-size="10" fill="#8B4513" text-anchor="middle">Пандемия COVID-19</text>
  
  <!-- Формула энергии Эйнштейна -->
  <rect x="190" y="250" width="70" height="25" fill="#F5F5DC" stroke="#8B4513" stroke-width="1"/>
  <text x="225" y="267" font-family="Arial" font-size="12" fill="#8B4513" text-anchor="middle">E=mc²</text>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="50" r="3" fill="#8B4513"/>
  <circle cx="470" cy="50" r="3" fill="#8B4513"/>
  <circle cx="30" cy="320" r="3" fill="#8B4513"/>
  <circle cx="470" cy="320" r="3" fill="#8B4513"/>
  
  <!-- Линия соединяющая ленту и события -->
  <polyline points="70,130 70,175" fill="none" stroke="#8B4513" stroke-width="1" stroke-dasharray="2,2"/>
  <polyline points="150,130 150,175" fill="none" stroke="#8B4513" stroke-width="1" stroke-dasharray="2,2"/>
  <polyline points="250,130 250,175" fill="none" stroke="#8B4513" stroke-width="1" stroke-dasharray="2,2"/>
  <polyline points="350,130 350,175" fill="none" stroke="#8B4513" stroke-width="1" stroke-dasharray="2,2"/>
  <polyline points="430,130 430,175" fill="none" stroke="#8B4513" stroke-width="1" stroke-dasharray="2,2"/>
</svg>