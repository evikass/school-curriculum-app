<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#16213e" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#0f3460" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" fill="#e94560" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Самоиндукция. Индуктивность</text>
  
  <!-- Катушка индуктивности -->
  <g transform="translate(250, 180)">
    <!-- Витки катушки -->
    <path d="M -60,0 Q -55,-20 -45,-20 T -25,-20 T -5,-20 T 15,-20 T 35,-20 T 55,-20" fill="none" stroke="#4fbdba" stroke-width="3"/>
    <path d="M -60,0 Q -55,20 -45,20 T -25,20 T -5,20 T 15,20 T 35,20 T 55,20" fill="none" stroke="#4fbdba" stroke-width="3"/>
    <path d="M -60,0 Q -55,-20 -45,-20 T -25,-20 T -5,-20 T 15,-20 T 35,-20 T 55,-20" fill="none" stroke="#4fbdba" stroke-width="3"/>
    <path d="M -60,0 Q -55,20 -45,20 T -25,20 T -5,20 T 15,20 T 35,20 T 55,20" fill="none" stroke="#4fbdba" stroke-width="3"/>
    <path d="M -60,0 Q -55,-20 -45,-20 T -25,-20 T -5,-20 T 15,-20 T 35,-20 T 55,-20" fill="none" stroke="#4fbdba" stroke-width="3"/>
    <path d="M -60,0 Q -55,20 -45,20 T -25,20 T -5,20 T 15,20 T 35,20 T 55,20" fill="none" stroke="#4fbdba" stroke-width="3"/>
    
    <!-- Соединения -->
    <line x1="-60" y1="0" x2="-80" y2="0" stroke="#4fbdba" stroke-width="3"/>
    <line x1="60" y1="0" x2="80" y2="0" stroke="#4fbdba" stroke-width="3"/>
  </g>
  
  <!-- Направление тока -->
  <g transform="translate(250, 180)">
    <path d="M -70,-10 Q -60,-15 -50,-10" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="-75" y="-12" fill="#7ec8e3" font-family="Arial, sans-serif" font-size="14">I</text>
  </g>
  
  <!-- ЭДС самоиндукции -->
  <g transform="translate(250, 180)">
    <path d="M 70,10 Q 80,15 90,10" fill="none" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead2)"/>
    <text x="92" y="12" fill="#f39c12" font-family="Arial, sans-serif" font-size="14">ε</text>
  </g>
  
  <!-- Формула ЭДС самоиндукции -->
  <text x="250" y="120" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18">
    ε = -L·dI/dt
  </text>
  
  <!-- Формула энергии магнитного поля -->
  <text x="250" y="280" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18">
    W = LI²/2
  </text>
  
  <!-- Символы и пояснения -->
  <text x="80" y="220" fill="#7ec8e3" font-family="Arial, sans-serif" font-size="14">I - ток</text>
  <text x="80" y="240" fill="#f39c12" font-family="Arial, sans-serif" font-size="14">ε - ЭДС самоиндукции</text>
  <text x="80" y="260" fill="#4fbdba" font-family="Arial, sans-serif" font-size="14">L - индуктивность</text>
  
  <!-- Магнитные линии -->
  <g transform="translate(250, 180)">
    <ellipse cx="0" cy="0" rx="90" ry="40" fill="none" stroke="#e94560" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="110" ry="50" fill="none" stroke="#e94560" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="50" cy="80" r="3" fill="#4fbdba" opacity="0.7"/>
  <circle cx="450" cy="80" r="3" fill="#4fbdba" opacity="0.7"/>
  <circle cx="50" cy="270" r="3" fill="#4fbdba" opacity="0.7"/>
  <circle cx="450" cy="270" r="3" fill="#4fbdba" opacity="0.7"/>
  
  <!-- Определение индуктивности -->
  <text x="250" y="310" text-anchor="middle" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="12">
    Индуктивность L = Φ/I
  </text>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3"/>
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
  </defs>
</svg>