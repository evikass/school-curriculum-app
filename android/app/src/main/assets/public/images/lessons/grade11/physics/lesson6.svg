<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3498db">Урок 6: Самоиндукция. Индуктивность</text>
  <text x="460" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">6</text>
  
  <!-- Схема катушки -->
  <g transform="translate(50, 80)">
    <!-- Провода -->
    <line x1="0" y1="50" x2="0" y2="150" stroke="#e74c3c" stroke-width="2"/>
    <line x1="100" y1="50" x2="100" y2="150" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Катушка -->
    <g id="coil">
      <ellipse cx="10" cy="60" rx="8" ry="3" fill="none" stroke="#34495e" stroke-width="1.5"/>
      <ellipse cx="20" cy="70" rx="8" ry="3" fill="none" stroke="#34495e" stroke-width="1.5"/>
      <ellipse cx="30" cy="80" rx="8" ry="3" fill="none" stroke="#34495e" stroke-width="1.5"/>
      <ellipse cx="40" cy="90" rx="8" ry="3" fill="none" stroke="#34495e" stroke-width="1.5"/>
      <ellipse cx="50" cy="100" rx="8" ry="3" fill="none" stroke="#34495e" stroke-width="1.5"/>
      <ellipse cx="60" cy="110" rx="8" ry="3" fill="none" stroke="#34495e" stroke-width="1.5"/>
      <ellipse cx="70" cy="120" rx="8" ry="3" fill="none" stroke="#34495e" stroke-width="1.5"/>
      <ellipse cx="80" cy="130" rx="8" ry="3" fill="none" stroke="#34495e" stroke-width="1.5"/>
      <ellipse cx="90" cy="140" rx="8" ry="3" fill="none" stroke="#34495e" stroke-width="1.5"/>
    </g>
    
    <!-- Обозначения -->
    <text x="50" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Катушка индуктивности</text>
    <text x="-10" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">I</text>
    <text x="110" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">I</text>
  </g>
  
  <!-- Сила тока и направления -->
  <g transform="translate(100, 130)">
    <path d="M-30,0 L-20,0" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowred)"/>
    <path d="M30,0 L20,0" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowred)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">Направление тока</text>
  </g>
  
  <!-- Стрелки -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrowblue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- Формула ЭДС самоиндукции -->
  <g transform="translate(200, 90)">
    <rect x="0" y="0" width="200" height="60" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Формула ЭДС самоиндукции</text>
    <text x="100" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50">ε = -L·(ΔI/Δt)</text>
    <text x="100" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">где L - индуктивность</text>
  </g>
  
  <!-- Магнитное поле катушки -->
  <g transform="translate(150, 200)">
    <!-- Линии магнитного поля -->
    <path d="M-50,0 Q-25,-20 0,0 Q25,20 50,0" fill="none" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,2"/>
    <path d="M-50,10 Q-25,-10 0,10 Q25,30 50,10" fill="none" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,2"/>
    <path d="M-50,-10 Q-25,-30 0,-10 Q25,10 50,-10" fill="none" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- Обозначение поля -->
    <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6">Линии магнитного поля</text>
    
    <!-- Стрелки поля -->
    <path d="M-20,0 L-15,-3" stroke="#9b59b6" stroke-width="1" marker-end="url(#arrowblue)"/>
    <path d="M20,0 L15,3" stroke="#9b59b6" stroke-width="1" marker-end="url(#arrowblue)"/>
  </g>
  
  <!-- Индуктивность единицы измерения -->
  <g transform="translate(380, 100)">
    <rect x="0" y="0" width="100" height="80" fill="#e8f4f8" stroke="#3498db" stroke-width="1" rx="5"/>
    <text x="50" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Единицы измерения</text>
    <text x="50" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">L = [Гн]</text>
    <text x="50" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">генри (Гн)</text>
    <text x="50" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">1 мкГн = 10⁻⁶ Гн</text>
  </g>
  
  <!-- График зависимости ЭДС от времени -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="200" height="80" fill="#f9f9f9" stroke="#2c3e50" stroke-width="1"/>
    <line x1="20" y1="60" x2="180" y2="60" stroke="#2c3e50" stroke-width="1"/>
    <line x1="20" y1="10" x2="20" y2="60" stroke="#2c3e50" stroke-width="1"/>
    
    <!-- График -->
    <path d="M20,40 L60,40 L100,20 L140,20 L180,40" fill="none" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Подписи -->
    <text x="100" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">t</text>
    <text x="5" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">ε</text>
    <text x="100" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">Зависимость ε(t)</text>
  </g>
  
  <!-- Формула энергии магнитного поля -->
  <g transform="translate(270, 250)">
    <rect x="0" y="0" width="200" height="80" fill="#f0f8ff" stroke="#2980b9" stroke-width="1" rx="5"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Энергия магнитного поля</text>
    <text x="100" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50">W = (L·I²)/2</text>
    <text x="100" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">где W - энергия, Дж</text>
    <text x="100" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">I - сила тока, А</text>
  </g>
  
  <!-- Дополнительные элементы оформления -->
  <circle cx="30" cy="30" r="5" fill="#3498db"/>
  <circle cx="470" cy="320" r="5" fill="#e74c3c"/>
  
  <!-- Ключевые термины -->
  <g transform="translate(250, 140)">
    <rect x="0" y="0" width="200" height="40" fill="#fff" stroke="#27ae60" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="100" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#27ae60">Самоиндукция</text>
    <text x="100" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Электромагнитная индукция в самом проводнике</text>
  </g>
  
  <!-- Индуктивность длинного соленоида -->
  <g transform="translate(250, 190)">
    <rect x="0" y="0" width="200" height="50" fill="#fff" stroke="#f39c12" stroke-width="1" rx="3"/>
    <text x="100" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f39c12">Индуктивность соленоида</text>
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">L = μ₀·μ·n²·V</text>
    <text x="100" y="43" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">n - число витков на единицу длины</text>
  </g>
</svg>