<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты и определения -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9e2ec;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coilGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a365d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="resistorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d69e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b7791f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="batteryGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38a169;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f855a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGradient)"/>
  
  <!-- Двойная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2d3748" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Заголовок и подзаголовок -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">САМОИНДУКЦИЯ. ИНДУКТИВНОСТЬ</text>
  <text x="250" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4a5568">ФИЗИКА · 11 КЛАСС</text>
  <text x="470" y="25" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#718096">Урок 14</text>
  
  <!-- Основная схема RL-цепи -->
  <g transform="translate(80, 80)">
    <!-- Батарея -->
    <line x1="0" y1="60" x2="0" y2="80" stroke="#38a169" stroke-width="3"/>
    <line x1="-5" y1="80" x2="5" y2="80" stroke="#38a169" stroke-width="2"/>
    <line x1="-3" y1="85" x2="3" y2="85" stroke="#38a169" stroke-width="1"/>
    <text x="-15" y="75" font-family="Arial" font-size="10" fill="#2d3748">E</text>
    
    <!-- Провода -->
    <line x1="0" y1="60" x2="100" y2="60" stroke="#2d3748" stroke-width="2"/>
    <line x1="150" y1="60" x2="200" y2="60" stroke="#2d3748" stroke-width="2"/>
    <line x1="250" y1="60" x2="300" y2="60" stroke="#2d3748" stroke-width="2"/>
    <line x1="300" y1="60" x2="300" y2="100" stroke="#2d3748" stroke-width="2"/>
    <line x1="300" y1="100" x2="0" y2="100" stroke="#2d3748" stroke-width="2"/>
    <line x1="0" y1="100" x2="0" y2="85" stroke="#2d3748" stroke-width="2"/>
    
    <!-- Катушка индуктивности -->
    <g transform="translate(100, 50)">
      <path d="M 0,10 C 5,10 5,0 10,0 C 15,0 15,10 20,10 C 25,10 25,0 30,0 C 35,0 35,10 40,0 C 45,0 45,10 50,10" 
            stroke="url(#coilGradient)" stroke-width="3" fill="none" filter="url(#shadow)"/>
      <text x="25" y="-5" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3748">L</text>
    </g>
    
    <!-- Резистор -->
    <g transform="translate(200, 50)">
      <rect x="0" y="5" width="50" height="10" fill="url(#resistorGradient)" stroke="#975a16" stroke-width="1" rx="2"/>
      <text x="25" y="-5" text-anchor="middle" font-family="Arial" font-size="10" fill="#2d3748">R</text>
    </g>
    
    <!-- Стрелка тока -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#e53e3e"/>
      </marker>
    </defs>
    <line x1="50" y1="40" x2="90" y2="40" stroke="#e53e3e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="70" y="35" text-anchor="middle" font-family="Arial" font-size="10" fill="#e53e3e">I</text>
  </g>
  
  <!-- Формулы -->
  <g transform="translate(50, 200)">
    <rect x="-10" y="-10" width="220" height="80" fill="white" stroke="#cbd5e0" stroke-width="1" rx="5" opacity="0.9"/>
    <text x="0" y="5" font-family="Arial" font-size="12" fill="#2d3748">ЭДС самоиндукции:</text>
    <text x="0" y="25" font-family="Arial" font-size="14" fill="#2d3748">ε = -L·dI/dt</text>
    <text x="0" y="45" font-family="Arial" font-size="12" fill="#2d3748">Энергия магнитного поля:</text>
    <text x="0" y="65" font-family="Arial" font-size="14" fill="#2d3748">W = LI²/2</text>
  </g>
  
  <!-- График нарастания тока -->
  <g transform="translate(300, 200)">
    <rect x="-10" y="-10" width="200" height="120" fill="white" stroke="#cbd5e0" stroke-width="1" rx="5" opacity="0.9"/>
    <text x="90" y="5" text-anchor="middle" font-family="Arial" font-size="12" fill="#2d3748">Нарастание тока в RL-цепи</text>
    
    <!-- Ось X -->
    <line x1="10" y1="90" x2="180" y2="90" stroke="#4a5568" stroke-width="1"/>
    <text x="190" y="95" font-family="Arial" font-size="10" fill="#4a5568">t</text>
    
    <!-- Ось Y -->
    <line x1="10" y1="90" x2="10" y2="20" stroke="#4a5568" stroke-width="1"/>
    <text x="0" y="15" font-family="Arial" font-size="10" fill="#4a5568">I</text>
    
    <!-- Кривая нарастания тока -->
    <path d="M 10,90 C 30,90 40,80 60,70 C 80,60 90,55 110,52 C 130,50 140,49 170,49" 
          stroke="#3182ce" stroke-width="2" fill="none"/>
    
    <!-- Постоянная времени -->
    <line x1="10" y1="90" x2="10" y2="20" stroke="#e53e3e" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="10" y1="70" x2="90" y2="70" stroke="#e53e3e" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="95" y="75" font-family="Arial" font-size="10" fill="#e53e3e">τ</text>
    
    <!-- Обозначение постоянной времени -->
    <text x="20" y="105" font-family="Arial" font-size="10" fill="#2d3748">τ = L/R</text>
  </g>
  
  <!-- Легенда -->
  <g transform="translate(50, 310)">
    <rect x="-10" y="-5" width="420" height="35" fill="white" stroke="#cbd5e0" stroke-width="1" rx="3" opacity="0.9"/>
    <text x="0" y="10" font-family="Arial" font-size="10" fill="#2d3748">L - индуктивность (Гн), R - сопротивление (Ом), E - ЭДС источника (В), τ - постоянная времени (с)</text>
    <text x="0" y="22" font-family="Arial" font-size="10" fill="#2d3748">ЭДС самоиндукции препятствует изменению тока в цепи</text>
  </g>
  
  <!-- Дополнительные элементы схемы -->
  <!-- Магнитное поле катушки -->
  <g transform="translate(180, 130)" opacity="0.3">
    <ellipse cx="0" cy="0" rx="40" ry="20" fill="none" stroke="#805ad5" stroke-width="1" stroke-dasharray="2,2"/>
    <ellipse cx="0" cy="0" rx="30" ry="15" fill="none" stroke="#805ad5" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="0" y="-25" text-anchor="middle" font-family="Arial" font-size="9" fill="#805ad5">B</text>
  </g>
  
  <!-- Индикатор направления ЭДС самоиндукции -->
  <g transform="translate(200, 140)">
    <path d="M 0,0 L 10,5 L 10,3 L 20,3 L 20,7 L 10,7 L 10,5" stroke="#d53f8c" stroke-width="1.5" fill="none"/>
    <text x="25" y="5" font-family="Arial" font-size="8" fill="#d53f8c">ε</text>
  </g>
</svg>