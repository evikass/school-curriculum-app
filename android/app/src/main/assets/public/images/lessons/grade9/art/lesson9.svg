<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#EC407A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#EC407A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 9. Психология цвета в искусстве</text>
  <rect x="15" y="60" width="230" height="125" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#FF9800" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#FF9800"/>
  <text x="130" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Тёплые цвета</text>
  <rect x="25" y="93" width="38" height="18" fill="#E53935" rx="4"/>
  <text x="70" y="105" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Красный — энергия, страсть</text>
  <rect x="25" y="115" width="38" height="18" fill="#FF9800" rx="4"/>
  <text x="70" y="127" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Оранжевый — радость, тепло</text>
  <rect x="25" y="137" width="38" height="18" fill="#FDD835" rx="4"/>
  <text x="70" y="149" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Жёлтый — свет, оптимизм</text>
  <text x="25" y="168" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Активность, движение, приближение</text>
  <text x="25" y="180" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Визуально расширяют пространство</text>
  <rect x="255" y="60" width="230" height="125" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#1565C0" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#1565C0"/>
  <text x="370" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Холодные цвета</text>
  <rect x="265" y="93" width="38" height="18" fill="#1E88E5" rx="4"/>
  <text x="310" y="105" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Синий — покой, грусть</text>
  <rect x="265" y="115" width="38" height="18" fill="#43A047" rx="4"/>
  <text x="310" y="127" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Зелёный — природа, гармония</text>
  <rect x="265" y="137" width="38" height="18" fill="#7B1FA2" rx="4"/>
  <text x="310" y="149" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Фиолетовый — тайна, роскошь</text>
  <text x="265" y="168" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Спокойствие, удаление, отдых</text>
  <text x="265" y="180" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Визуально сужают, углубляют</text>
  <rect x="15" y="195" width="230" height="135" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="195" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="15" y="212" width="230" height="8" fill="#AD1457"/>
  <text x="130" y="212" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Символика цвета</text>
  <text x="25" y="230" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">🔴 Красный — кровь, любовь, опасн.</text>
  <text x="25" y="243" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">⚪ Белый — чистота, невинность</text>
  <text x="25" y="256" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">⚫ Чёрный — смерть, тайна, элег.</text>
  <text x="25" y="269" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">🔵 Синий — вера, мудрость, покой</text>
  <text x="25" y="282" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">🟡 Золотой — божество, величие</text>
  <text x="25" y="295" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">🟢 Зелёный — жизнь, надежда</text>
  <text x="25" y="308" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">🟣 Фиолет. — власть, духовность</text>
  <text x="25" y="321" fill="#666" font-size="7" font-weight="normal" font-family="Arial,sans-serif"> Cultural context varies!</text>
  <rect x="255" y="195" width="230" height="135" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="195" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="255" y="212" width="230" height="8" fill="#AD1457"/>
  <text x="370" y="212" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Цвет и эмоции</text>
  <text x="265" y="230" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Тёплые — возбуждают, радуют</text>
  <text x="265" y="243" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Холодные — успокаивают, грусть</text>
  <text x="265" y="256" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Яркие — привлекают внимание</text>
  <text x="265" y="269" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Пастельные — расслабляют</text>
  <text x="265" y="285" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">В искусстве:</text>
  <text x="265" y="298" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Цвет создаёт настроение</text>
  <text x="265" y="311" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Цвет — средство выразительности</text>
  <text x="265" y="324" fill="#666" font-size="7" font-weight="normal" font-family="Arial,sans-serif">• Пример: «Чёрный квадрат» Малевича</text>
</svg>