<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="headerGrad10" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow10" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#FAFAFA" rx="8"/>
  <!-- Header bar -->
  <rect width="500" height="52" fill="url(#headerGrad10)" rx="8"/>
  <rect y="40" width="500" height="12" fill="url(#headerGrad10)"/>
  <!-- Decorative elements -->
  <circle cx="470" cy="26" r="15" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="445" cy="18" r="8" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="30" cy="26" r="12" fill="#FFFFFF" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Урок 10: Площадь круга и его частей</text>
  <!-- Circle area -->
  <g transform="translate(20,62)">
    <rect x="0" y="0" width="150" height="145" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow10)"/>
    <text x="75" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Круг</text>
    <!-- Filled circle -->
    <circle cx="75" cy="78" r="42" fill="#D1C4E9" fill-opacity="0.4" stroke="#7E57C2" stroke-width="2"/>
    <!-- Center -->
    <circle cx="75" cy="78" r="3" fill="#FF7043"/>
    <!-- Radius -->
    <line x1="75" y1="78" x2="117" y2="78" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="92" y="74" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">R</text>
    <!-- Formula -->
    <rect x="8" y="124" width="135" height="18" rx="3" fill="#EDE7F6"/>
    <text x="75" y="137" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A2F8A">S = πR²</text>
  </g>
  <!-- Sector -->
  <g transform="translate(180,62)">
    <rect x="0" y="0" width="150" height="145" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow10)"/>
    <text x="75" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Сектор</text>
    <!-- Sector (pie slice) -->
    <path d="M 75 78 L 117 78 A 42 42 0 0 1 75 120 Z" fill="#B39DDB" fill-opacity="0.4" stroke="#7E57C2" stroke-width="2"/>
    <!-- Angle -->
    <path d="M 85 78 A 10 10 0 0 1 75 88" fill="none" stroke="#FF7043" stroke-width="1.5"/>
    <text x="88" y="86" font-family="Arial,sans-serif" font-size="9" fill="#FF7043">n°</text>
    <!-- Formula -->
    <rect x="8" y="124" width="135" height="18" rx="3" fill="#E8F5E9"/>
    <text x="75" y="137" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">S = πR²n/360</text>
  </g>
  <!-- Segment -->
  <g transform="translate(340,62)">
    <rect x="0" y="0" width="140" height="145" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow10)"/>
    <text x="70" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Сегмент</text>
    <!-- Segment -->
    <path d="M 45 95 A 42 42 0 0 1 95 95 L 45 95 Z" fill="#D1C4E9" fill-opacity="0.5" stroke="#7E57C2" stroke-width="2"/>
    <!-- Chord -->
    <line x1="45" y1="95" x2="95" y2="95" stroke="#FF7043" stroke-width="1.5"/>
    <text x="65" y="105" font-family="Arial,sans-serif" font-size="8" fill="#FF7043">хорда</text>
    <!-- Arc -->
    <text x="70" y="82" font-family="Arial,sans-serif" font-size="8" fill="#7E57C2">дуга</text>
    <!-- Formula -->
    <text x="70" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#212121">S = πR²n/360</text>
    <text x="70" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#212121">  - (R²/2)sin(n°)</text>
  </g>
  <!-- Examples -->
  <g transform="translate(20,218)">
    <rect x="0" y="0" width="460" height="115" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow10)"/>
    <text x="230" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Примеры задач</text>
    <line x1="10" y1="24" x2="450" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <!-- Four examples in grid -->
    <text x="115" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#212121">Круг R=4 см:</text>
    <text x="115" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">S = π·16 = 16π ≈ 50,3 см²</text>
    <text x="345" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#212121">Сектор 60°, R=6 см:</text>
    <text x="345" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">S = π·36·60/360 = 6π ≈ 18,8 см²</text>
    <text x="115" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#212121">Полукруг R=10 см:</text>
    <text x="115" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">S = π·100·180/360 = 50π ≈ 157</text>
    <text x="345" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#212121">S = 100π, найти R:</text>
    <text x="345" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">πR² = 100π → R² = 100 → R = 10</text>
    <!-- Key formula -->
    <rect x="10" y="96" width="440" height="16" rx="3" fill="#EDE7F6"/>
    <text x="230" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#4A2F8A">S = πR² = πD²/4  |  Сектор: S = πR²n/360 = R²α/2  |  Сегмент: S = πR²n/360 - (R²/2)sin(n°)</text>
  </g>
</svg>