<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Сбор информации</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Исследовательские проекты</text>
  <!-- Illustration area -->
  <rect x="130" y="130" width="50" height="70" rx="3" fill="#8B4513" stroke="#1a1a1a" stroke-width="1.5"/><rect x="130" y="128" width="50" height="8" rx="2" fill="#6B3410"/><rect x="195" y="125" width="50" height="75" rx="3" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1.5"/><rect x="195" y="123" width="50" height="8" rx="2" fill="#1a3a5e"/><rect x="260" y="128" width="50" height="72" rx="3" fill="#228B22" stroke="#1a1a1a" stroke-width="1.5"/><rect x="260" y="126" width="50" height="8" rx="2" fill="#1a6b1a"/><circle cx="345" cy="200" r="30" fill="none" stroke="#D4A843" stroke-width="4"/><circle cx="345" cy="200" r="30" fill="#D4A843" opacity="0.1"/><line x1="367" y1="222" x2="395" y2="250" stroke="#D4A843" stroke-width="6" stroke-linecap="round"/><text x="250" y="245" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Книги, интернет, энциклопедии</text><text x="250" y="270" text-anchor="middle" font-size="10" fill="#C41E3A" font-family="Arial">Проверяй источники!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Проектная деятельность</text>
</svg>