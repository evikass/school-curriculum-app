<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Структура презентации</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Презентация и защита</text>
  <!-- Illustration area -->
  <rect x="130" y="105" width="55" height="40" rx="3" fill="#C41E3A" opacity="0.85" stroke="#8B0000" stroke-width="1"/><text x="157" y="130" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial">Введение</text><line x1="188" y1="125" x2="210" y2="125" stroke="#D4A843" stroke-width="2" marker-end="url(#ar3)"/><rect x="215" y="105" width="70" height="40" rx="3" fill="#2B4C7E" opacity="0.85" stroke="#1a3a5e" stroke-width="1"/><text x="250" y="130" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial">Основная</text><line x1="288" y1="125" x2="310" y2="125" stroke="#D4A843" stroke-width="2" marker-end="url(#ar3)"/><rect x="315" y="105" width="55" height="40" rx="3" fill="#228B22" opacity="0.85" stroke="#1a6b1a" stroke-width="1"/><text x="342" y="130" text-anchor="middle" font-size="9" fill="#fff" font-family="Arial">Выводы</text><text x="157" y="155" text-anchor="middle" font-size="8" fill="#888" font-family="Arial">10-15%</text><text x="250" y="155" text-anchor="middle" font-size="8" fill="#888" font-family="Arial">70-80%</text><text x="342" y="155" text-anchor="middle" font-size="8" fill="#888" font-family="Arial">10-15%</text><rect x="150" y="180" width="200" height="100" rx="4" fill="#fff" stroke="#ddd" stroke-width="2"/><rect x="150" y="180" width="200" height="20" rx="4" fill="#333"/><text x="250" y="195" text-anchor="middle" font-size="10" fill="#fff" font-family="Arial">Слайд 1</text><line x1="170" y1="215" x2="330" y2="215" stroke="#eee" stroke-width="1.5"/><line x1="170" y1="230" x2="310" y2="230" stroke="#eee" stroke-width="1.5"/><line x1="170" y1="245" x2="320" y2="245" stroke="#eee" stroke-width="1.5"/><line x1="170" y1="260" x2="300" y2="260" stroke="#eee" stroke-width="1.5"/><defs><marker id="ar3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#D4A843"/></marker></defs>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Проектная деятельность</text>
</svg>