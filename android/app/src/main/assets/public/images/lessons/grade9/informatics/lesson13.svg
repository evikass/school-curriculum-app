<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#42A5F5" text-anchor="middle">Архитектура компьютера</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Информатика — Урок 13</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Архитектура —</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">устройство и принципы работы</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Схема:</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Процессор (CPU) — вычисления</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Оперативная память (RAM) — временно</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Жёсткий диск (HDD/SSD) — постоянно</text>
  <text x="32" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Видеокарта (GPU) — графика</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="262" y="88" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Процессор:</text>
  <text x="325" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">Тактовая частота — ГГц</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Ядра — параллельные вычисления</text>
  <text x="262" y="128" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Память:</text>
  <text x="325" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">RAM — быстрая, энергозависимая</text>
  <text x="272" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">SSD — быстрая, энергонезависимая</text>
  <text x="262" y="168" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Шина:</text>
  <text x="325" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Данные, адрес, управление</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#42A5F5" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">CPU + RAM + Диск = Компьютер</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#42A5F5" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Принцип фон Неймана</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Информатика · Архитектура компьюте</text>
</svg>