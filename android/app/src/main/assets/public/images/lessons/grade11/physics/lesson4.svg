<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <!-- Градиент для фона -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Градиент для катушки -->
    <linearGradient id="coilGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#718096;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a5568;stop-opacity:1" />
    </linearGradient>
    
    <!-- Градиент для магнита -->
    <linearGradient id="magnetGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e53e3e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fc8181;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:1" />
    </linearGradient>
    
    <!-- Градиент для стрелки гальванометра -->
    <linearGradient id="arrowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38a169;stop-opacity:1" />
    </linearGradient>
    
    <!-- Паттерн для линий поля -->
    <pattern id="fieldPattern" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="2" cy="5" r="0.5" fill="#805ad5" opacity="0.3"/>
      <circle cx="7" cy="5" r="0.5" fill="#805ad5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGradient)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2d3748" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#4a5568" stroke-width="1"/>
  
  <!-- Заголовок и подзаголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#1a202c" font-weight="bold">ЭЛЕКТРОМАГНИТНАЯ ИНДУКЦИЯ</text>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a5568" font-style="italic">ФИЗИКА · 11 КЛАСС</text>
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#718096">Урок №12</text>
  
  <!-- Первый опыт - магнит входит в катушку -->
  <g id="experiment1">
    <text x="50" y="100" font-family="Arial, sans-serif" font-size="12" fill="#2d3748" font-weight="bold">Опыт 1: Магнит входит в катушку</text>
    
    <!-- Катушка -->
    <ellipse cx="100" cy="150" rx="30" ry="50" fill="none" stroke="url(#coilGradient)" stroke-width="3"/>
    <ellipse cx="100" cy="150" rx="25" ry="45" fill="none" stroke="url(#coilGradient)" stroke-width="2"/>
    <ellipse cx="100" cy="150" rx="20" ry="40" fill="none" stroke="url(#coilGradient)" stroke-width="2"/>
    
    <!-- Магнит (входит) -->
    <rect x="60" y="130" width="20" height="40" rx="2" fill="url(#magnetGradient)"/>
    <text x="70" y="145" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">N</text>
    <text x="70" y="160" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">S</text>
    
    <!-- Линии магнитного поля -->
    <path d="M 80 140 Q 120 120, 140 140" stroke="#805ad5" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    <path d="M 80 150 Q 120 130, 140 150" stroke="#805ad5" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    <path d="M 80 160 Q 120 140, 140 160" stroke="#805ad5" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    
    <!-- Гальванометр -->
    <circle cx="160" cy="150" r="15" fill="#edf2f7" stroke="#4a5568" stroke-width="1"/>
    <line x1="160" y1="150" x2="170" y2="145" stroke="#e53e3e" stroke-width="2"/>
    <polygon points="168,143 175,143 171,148" fill="#e53e3e"/>
    <text x="160" y="175" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Гальванометр</text>
    <text x="160" y="188" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">→ (отклонение)</text>
  </g>
  
  <!-- Второй опыт - магнит покоится в катушке -->
  <g id="experiment2">
    <text x="250" y="100" font-family="Arial, sans-serif" font-size="12" fill="#2d3748" font-weight="bold">Опыт 2: Магнит покоится в катушке</text>
    
    <!-- Катушка -->
    <ellipse cx="300" cy="150" rx="30" ry="50" fill="none" stroke="url(#coilGradient)" stroke-width="3"/>
    <ellipse cx="300" cy="150" rx="25" ry="45" fill="none" stroke="url(#coilGradient)" stroke-width="2"/>
    <ellipse cx="300" cy="150" rx="20" ry="40" fill="none" stroke="url(#coilGradient)" stroke-width="2"/>
    
    <!-- Магнит (покоится) -->
    <rect x="290" y="130" width="20" height="40" rx="2" fill="url(#magnetGradient)"/>
    <text x="300" y="145" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">N</text>
    <text x="300" y="160" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">S</text>
    
    <!-- Гальванометр (нулевое отклонение) -->
    <circle cx="360" cy="150" r="15" fill="#edf2f7" stroke="#4a5568" stroke-width="1"/>
    <line x1="360" y1="150" x2="360" y2="135" stroke="#718096" stroke-width="1"/>
    <text x="360" y="175" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Гальванометр</text>
    <text x="360" y="188" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">0 (отклонения нет)</text>
  </g>
  
  <!-- Третий опыт - магнит выходит из катушки -->
  <g id="experiment3">
    <text x="50" y="230" font-family="Arial, sans-serif" font-size="12" fill="#2d3748" font-weight="bold">Опыт 3: Магнит выходит из катушки</text>
    
    <!-- Катушка -->
    <ellipse cx="100" cy="280" rx="30" ry="50" fill="none" stroke="url(#coilGradient)" stroke-width="3"/>
    <ellipse cx="100" cy="280" rx="25" ry="45" fill="none" stroke="url(#coilGradient)" stroke-width="2"/>
    <ellipse cx="100" cy="280" rx="20" ry="40" fill="none" stroke="url(#coilGradient)" stroke-width="2"/>
    
    <!-- Магнит (выходит) -->
    <rect x="120" y="260" width="20" height="40" rx="2" fill="url(#magnetGradient)"/>
    <text x="130" y="275" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">N</text>
    <text x="130" y="290" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">S</text>
    
    <!-- Линии магнитного поля (обратные) -->
    <path d="M 120 270 Q 80 250, 60 270" stroke="#805ad5" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    <path d="M 120 280 Q 80 260, 60 280" stroke="#805ad5" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    <path d="M 120 290 Q 80 270, 60 290" stroke="#805ad5" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    
    <!-- Гальванометр (обратное отклонение) -->
    <circle cx="160" cy="280" r="15" fill="#edf2f7" stroke="#4a5568" stroke-width="1"/>
    <line x1="160" y1="280" x2="150" y2="285" stroke="#3182ce" stroke-width="2"/>
    <polygon points="152,283 145,283 149,288" fill="#3182ce"/>
    <text x="160" y="305" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">Гальванометр</text>
    <text x="160" y="318" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4a5568">← (обратное отклонение)</text>
  </g>
  
  <!-- Формула электромагнитной индукции -->
  <g id="formula">
    <rect x="250" y="230" width="220" height="100" rx="5" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1"/>
    <text x="360" y="255" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2d3748" font-weight="bold">Закон электромагнитной индукции Фарадея</text>
    <text x="360" y="280" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#1a202c">ε = -ΔΦ/Δt</text>
    <text x="360" y="300" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">где ε - ЭДС индукции,</text>
    <text x="360" y="315" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#4a5568">Φ - магнитный поток</text>
  </g>
  
  <!-- Легенда -->
  <g id="legend">
    <rect x="230" y="90" width="150" height="80" rx="3" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1"/>
    <text x="305" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3748" font-weight="bold">Легенда</text>
    <circle cx="245" cy="125" r="3" fill="#e53e3e"/>
    <text x="255" y="130" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Северный полюс магнита</text>
    <circle cx="245" cy="145" r="3" fill="#3182ce"/>
    <text x="255" y="150" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Южный полюс магнита</text>
    <line x1="240" y1="160" x2="250" y2="160" stroke="#805ad5" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="255" y="165" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">Линии магнитного поля</text>
  </g>
  
  <!-- Пояснения -->
  <g id="explanation">
    <text x="50" y="90" font-family="Arial, sans-serif" font-size="11" fill="#718098">При движении магнита изменяется магнитный поток через катушку,</text>
    <text x="50" y="105" font-family="Arial, sans-serif" font-size="11" fill="#718098">что вызывает ЭДС индукции.</text>
  </g>
</svg>