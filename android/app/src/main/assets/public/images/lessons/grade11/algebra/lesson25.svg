<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2C3E50" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498DB" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#2C3E50" font-weight="bold">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3498DB">Урок 25: Случайные события. Классическое определение вероятности</text>
  <text x="460" y="25" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#E74C3C" font-weight="bold">25</text>
  
  <!-- Левая часть: Пример с кубиком -->
  <g id="dice-example">
    <text x="30" y="85" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50" font-weight="bold">Пример с кубиком:</text>
    
    <!-- Изображение кубика -->
    <rect x="30" y="95" width="60" height="60" fill="url(#diceGradient)" stroke="#2C3E50" stroke-width="2" rx="5"/>
    <circle cx="45" cy="110" r="4" fill="#2C3E50"/>
    <circle cx="60" cy="110" r="4" fill="#2C3E50"/>
    <circle cx="75" cy="110" r="4" fill="#2C3E50"/>
    <circle cx="45" cy="125" r="4" fill="#2C3E50"/>
    <circle cx="75" cy="125" r="4" fill="#2C3E50"/>
    <circle cx="45" cy="140" r="4" fill="#2C3E50"/>
    <circle cx="60" cy="140" r="4" fill="#2C3E50"/>
    <circle cx="75" cy="140" r="4" fill="#2C3E50"/>
    
    <!-- Все возможные исходы -->
    <text x="30" y="175" font-family="Arial, sans-serif" font-size="12" fill="#34495E">Все возможные исходы (n):</text>
    <rect x="30" y="185" width="30" height="25" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="45" y="202" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2C3E50">1</text>
    
    <rect x="65" y="185" width="30" height="25" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="80" y="202" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2C3E50">2</text>
    
    <rect x="100" y="185" width="30" height="25" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="115" y="202" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2C3E50">3</text>
    
    <rect x="135" y="185" width="30" height="25" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="150" y="202" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2C3E50">4</text>
    
    <rect x="170" y="185" width="30" height="25" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="185" y="202" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2C3E50">5</text>
    
    <rect x="205" y="185" width="30" height="25" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="220" y="202" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2C3E50">6</text>
    
    <text x="30" y="230" font-family="Arial, sans-serif" font-size="12" fill="#34495E">Благоприятные исходы (m):</text>
    <text x="30" y="245" font-family="Arial, sans-serif" font-size="11" fill="#7F8C8D">Четные числа: 2, 4, 6</text>
    <rect x="30" y="250" width="30" height="20" fill="#E74C3C" stroke="#C0392B" stroke-width="1" opacity="0.7"/>
    <text x="45" y="264" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">2</text>
    
    <rect x="65" y="250" width="30" height="20" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="80" y="264" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2C3E50">3</text>
    
    <rect x="100" y="250" width="30" height="20" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="115" y="264" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2C3E50">4</text>
    
    <rect x="135" y="250" width="30" height="20" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="150" y="264" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2C3E50">5</text>
    
    <rect x="170" y="250" width="30" height="20" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1"/>
    <text x="185" y="264" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2C3E50">6</text>
    
    <rect x="205" y="250" width="30" height="20" fill="#E74C3C" stroke="#C0392B" stroke-width="1" opacity="0.7"/>
    <text x="220" y="264" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">6</text>
    
    <!-- Итог -->
    <text x="30" y="290" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50" font-weight="bold">P(четное) = m/n = 3/6 = 1/2</text>
  </g>
  
  <!-- Правая часть: Теория -->
  <g id="theory">
    <text x="270" y="85" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50" font-weight="bold">Классическое определение вероятности:</text>
    
    <!-- Формула -->
    <rect x="270" y="95" width="210" height="50" fill="url(#formulaGradient)" stroke="#3498DB" stroke-width="2" rx="5"/>
    <text x="375" y="125" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#2C3E50" font-weight="bold">P(A) = m/n</text>
    
    <!-- Определения -->
    <text x="270" y="165" font-family="Arial, sans-serif" font-size="12" fill="#34495E">Где:</text>
    <text x="280" y="185" font-family="Arial, sans-serif" font-size="11" fill="#34495E">P(A) - вероятность события A</text>
    <text x="280" y="205" font-family="Arial, sans-serif" font-size="11" fill="#34495E">n - общее число равновозможных исходов</text>
    <text x="280" y="225" font-family="Arial, sans-serif" font-size="11" fill="#34495E">m - число исходов, благоприятствующих событию A</text>
    
    <!-- Диаграмма вероятности -->
    <text x="270" y="255" font-family="Arial, sans-serif" font-size="12" fill="#34495E" font-weight="bold">Интервал значений вероятности:</text>
    
    <!-- Ось -->
    <line x1="270" y1="280" x2="480" y2="280" stroke="#34495E" stroke-width="2"/>
    <line x1="270" y1="275" x2="270" y2="285" stroke="#34495E" stroke-width="2"/>
    <line x1="375" y1="275" x2="375" y2="285" stroke="#34495E" stroke-width="2"/>
    <line x1="480" y1="275" x2="480" y2="285" stroke="#34495E" stroke-width="2"/>
    
    <!-- Отметки -->
    <text x="270" y="298" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495E">0</text>
    <text x="375" y="298" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495E">0.5</text>
    <text x="480" y="298" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495E">1</text>
    
    <!-- Подписи -->
    <text x="270" y="305" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7F8C8D">Невозможно</text>
    <text x="375" y="305" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7F8C8D">Случай</text>
    <text x="480" y="305" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7F8C8D">Достоверно</text>
    
    <!-- Подсветка интервала -->
    <rect x="270" y="265" width="210" height="15" fill="#E8F6F3" stroke="#1ABC9C" stroke-width="1" opacity="0.5"/>
    
    <!-- Вероятности -->
    <circle cx="270" cy="272" r="3" fill="#E74C3C"/>
    <circle cx="322" cy="272" r="3" fill="#F39C12"/>
    <circle cx="375" cy="272" r="3" fill="#F1C40F"/>
    <circle cx="428" cy="272" r="3" fill="#2ECC71"/>
    <circle cx="480" cy="272" r="3" fill="#3498DB"/>
    
    <!-- Условные обозначения -->
    <rect x="270" y="315" width="15" height="10" fill="#E74C3C"/>
    <text x="290" y="324" font-family="Arial, sans-serif" font-size="9" fill="#34495E">P=0</text>
    
    <rect x="340" y="315" width="15" height="10" fill="#F39C12"/>
    <text x="360" y="324" font-family="Arial, sans-serif" font-size="9" fill="#34495E">0&lt;P&lt;0.5</text>
    
    <rect x="410" y="315" width="15" height="10" fill="#F1C40F"/>
    <text x="430" y="324" font-family="Arial, sans-serif" font-size="9" fill="#34495E">P=0.5</text>
    
    <rect x="460" y="315" width="15" height="10" fill="#2ECC71"/>
    <text x="480" y="324" font-family="Arial, sans-serif" font-size="9" fill="#34495E">P&gt;0.5</text>
  </g>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="diceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECF0F1"/>
      <stop offset="100%" stop-color="#BDC3C7"/>
    </linearGradient>
    
    <linearGradient id="formulaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EBF5FB"/>
      <stop offset="100%" stop-color="#D6EAF8"/>
    </linearGradient>
  </defs>
</svg>