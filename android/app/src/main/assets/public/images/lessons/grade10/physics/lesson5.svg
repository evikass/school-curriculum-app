<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="ballGrad">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Фоновая область -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#334155" stroke-width="3" rx="5" />
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#64748b" stroke-width="1" rx="3" />
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b">Импульс и закон сохранения импульса</text>
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">ФИЗИКА · 10 КЛАСС</text>
  
  <!-- Номер урока -->
  <circle cx="460" cy="30" r="15" fill="#3b82f6" />
  <text x="460" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">12</text>
  
  <!-- Раздел 1: Импульс тела -->
  <g transform="translate(30, 70)">
    <!-- Заголовок раздела -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">Импульс тела:</text>
    
    <!-- Формула -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">p = mv</text>
    
    <!-- Объяснение переменных -->
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="11" fill="#475569">где m — масса, v — скорость</text>
    
    <!-- Единица измерения -->
    <rect x="0" y="50" width="120" height="20" fill="#dbeafe" stroke="#3b82f6" stroke-width="1" rx="3" />
    <text x="60" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e40af">Единица: кг·м/с</text>
    
    <!-- Визуализация импульса -->
    <circle cx="50" cy="100" r="20" fill="url(#ballGrad)" />
    <line x1="70" y1="100" x2="120" y2="100" stroke="url(#arrowGrad)" stroke-width="3" marker-end="url(#arrowhead)" />
    <text x="95" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1e40af">v</text>
    <text x="50" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">m</text>
    <text x="95" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#334155">p</text>
  </g>
  
  <!-- Стрелка -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1d4ed8" />
    </marker>
  </defs>
  
  <!-- Раздел 2: Импульс силы -->
  <g transform="translate(270, 70)">
    <!-- Заголовок раздела -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">Импульс силы:</text>
    
    <!-- Формула -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Ft = Δp</text>
    
    <!-- Объяснение -->
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="11" fill="#475569">Импульс силы равен изменению</text>
    <text x="0" y="52" font-family="Arial, sans-serif" font-size="11" fill="#475569">импульса тела</text>
    
    <!-- Визуализация импульса силы -->
    <rect x="20" y="70" width="40" height="20" fill="#fbbf24" stroke="#f59e0b" stroke-width="1" rx="3" />
    <text x="40" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400e">F</text>
    
    <line x1="60" y1="80" x2="90" y2="80" stroke="#f59e0b" stroke-width="2" />
    <text x="75" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#92400e">t</text>
    
    <line x1="90" y1="80" x2="120" y2="80" stroke="#10b981" stroke-width="3" />
    <text x="105" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#065f46">Δp</text>
  </g>
  
  <!-- Раздел 3: Закон сохранения импульса -->
  <g transform="translate(30, 170)">
    <!-- Заголовок раздела -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">Закон сохранения импульса:</text>
    
    <!-- Текст закона -->
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#475569">Если на систему тел не действуют</text>
    <text x="0" y="32" font-family="Arial, sans-serif" font-size="11" fill="#475569">внешние силы или их сумма равна нулю,</text>
    <text x="0" y="44" font-family="Arial, sans-serif" font-size="11" fill="#475569">то суммарный импульс системы сохраняется</text>
    
    <!-- Схема сохранения импульса -->
    <!-- Левое состояние -->
    <g transform="translate(0, 60)">
      <circle cx="30" cy="20" r="15" fill="url(#ballGrad)" />
      <circle cx="70" cy="20" r="10" fill="#8b5cf6" />
      <line x1="45" y1="20" x2="55" y2="20" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" />
      <text x="50" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">до</text>
    </g>
    
    <!-- Стрелка -->
    <line x1="90" y1="80" x2="110" y2="80" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead2)" />
    
    <!-- Правое состояние -->
    <g transform="translate(120, 60)">
      <circle cx="30" cy="20" r="10" fill="#8b5cf6" />
      <circle cx="70" cy="20" r="15" fill="url(#ballGrad)" />
      <line x1="45" y1="20" x2="55" y2="20" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3" />
      <text x="50" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748b">после</text>
    </g>
    
    <!-- Формула сохранения -->
    <rect x="30" y="120" width="140" height="25" fill="#ecfdf5" stroke="#10b981" stroke-width="1" rx="3" />
    <text x="100" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065f46">p₁ + p₂ = p₁' + p₂'</text>
  </g>
  
  <!-- Вторая стрелка -->
  <defs>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>
  
  <!-- График зависимости импульса от скорости -->
  <g transform="translate(270, 170)">
    <!-- Заголовок -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">График: p(v)</text>
    
    <!-- Ось X -->
    <line x1="20" y1="100" x2="160" y2="100" stroke="#64748b" stroke-width="2" />
    <text x="90" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">v, м/с</text>
    
    <!-- Ось Y -->
    <line x1="20" y1="20" x2="20" y2="100" stroke="#64748b" stroke-width="2" />
    <text x="10" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569" transform="rotate(-90, 10, 60)">p, кг·м/с</text>
    
    <!-- График линии -->
    <line x1="20" y1="100" x2="160" y2="20" stroke="#3b82f6" stroke-width="2" />
    
    <!-- Точки на графике -->
    <circle cx="60" cy="70" r="3" fill="#3b82f6" />
    <circle cx="100" cy="45" r="3" fill="#3b82f6" />
    <circle cx="140" cy="25" r="3" fill="#3b82f6" />
    
    <!-- Подписи точек -->
    <text x="60" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">v₁</text>
    <text x="100" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">v₂</text>
    <text x="140" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">v₃</text>
  </g>
  
  <!-- Пример задачи -->
  <g transform="translate(30, 280)">
    <rect x="0" y="0" width="440" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="1" rx="5" />
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">Пример:</text>
    <text x="10" y="30" font-family="Arial, sans-serif" font-size="10" fill="#78350f">Шар массой 2 кг движется со скоростью 3 м/с. Какой импульс он имеет?</text>
    <text x="10" y="42" font-family="Arial, sans-serif" font-size="10" fill="#78350f">Решение: p = mv = 2 кг · 3 м/с = 6 кг·м/с</text>
  </g>
</svg>