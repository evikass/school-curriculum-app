<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes grow { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
      .item { animation: bounce 2s ease-in-out infinite; }
      .number-box { animation: grow 1.5s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#dcfce7"/>
  
  <!-- Title -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#15803d">Счёт до 10 🎯</text>
  
  <!-- Numbers 6-10 -->
  <g class="number-box" style="animation-delay: 0s">
    <rect x="30" y="60" width="80" height="80" fill="#8b5cf6" rx="15"/>
    <text x="70" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white">6</text>
  </g>
  
  <g class="number-box" style="animation-delay: 0.1s">
    <rect x="120" y="60" width="80" height="80" fill="#ec4899" rx="15"/>
    <text x="160" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white">7</text>
  </g>
  
  <g class="number-box" style="animation-delay: 0.2s">
    <rect x="210" y="60" width="80" height="80" fill="#f43f5e" rx="15"/>
    <text x="250" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white">8</text>
  </g>
  
  <g class="number-box" style="animation-delay: 0.3s">
    <rect x="300" y="60" width="80" height="80" fill="#f97316" rx="15"/>
    <text x="340" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white">9</text>
  </g>
  
  <g class="number-box" style="animation-delay: 0.4s">
    <rect x="390" y="60" width="80" height="80" fill="#eab308" rx="15"/>
    <text x="430" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">10</text>
  </g>
  
  <!-- Examples row -->
  <g class="item">
    <text x="70" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🌸🌸🌸🌸🌸🌸</text>
    <text x="70" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">шесть</text>
  </g>
  
  <g class="item" style="animation-delay: 0.2s">
    <text x="160" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🌟🌟🌟🌟🌟🌟🌟</text>
    <text x="160" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">семь</text>
  </g>
  
  <g class="item" style="animation-delay: 0.3s">
    <text x="250" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🎈🎈🎈🎈🎈🎈🎈🎈</text>
    <text x="250" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">восемь</text>
  </g>
  
  <g class="item" style="animation-delay: 0.4s">
    <text x="340" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🍎🍎🍎🍎🍎🍎🍎🍎🍎</text>
    <text x="340" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">девять</text>
  </g>
  
  <g class="item" style="animation-delay: 0.5s">
    <text x="430" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">✋✋</text>
    <text x="430" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">десять</text>
  </g>
  
  <!-- Two hands -->
  <rect x="100" y="220" width="300" height="110" fill="#fef3c7" rx="20"/>
  <text x="250" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#92400e">10 пальцев на двух руках! ✋✋</text>
  <text x="250" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#78716c">5 + 5 = 10</text>
  <text x="250" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#15803d">Давай посчитаем вместе! 🎉</text>
</svg>
