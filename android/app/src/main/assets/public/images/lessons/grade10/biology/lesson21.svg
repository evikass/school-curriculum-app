<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Мейоз</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 21</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Meiosis I and II -->
    <rect x="20" y="95" width="225" height="195" rx="5" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <text x="132" y="112" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">Мейоз I (редукционный)</text>
    
    <!-- Before: 2n cell -->
    <ellipse cx="70" cy="170" rx="30" ry="25" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="60" y1="162" x2="60" y2="178" stroke="#1565C0" stroke-width="2"/>
    <line x1="80" y1="162" x2="80" y2="178" stroke="#1565C0" stroke-width="2"/>
    <text x="70" y="205" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">2n (4n ДНК)</text>
    
    <text x="118" y="170" font-family="Arial,sans-serif" font-size="14" fill="#42A5F5" text-anchor="middle">&#x2192;</text>
    
    <!-- After: two n cells -->
    <ellipse cx="160" cy="160" rx="22" ry="18" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1"/>
    <line x1="155" y1="155" x2="155" y2="165" stroke="#1565C0" stroke-width="1.5"/>
    <text x="160" y="150" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">n</text>
    
    <ellipse cx="200" cy="160" rx="22" ry="18" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1"/>
    <line x1="195" y1="155" x2="195" y2="165" stroke="#1565C0" stroke-width="1.5"/>
    <text x="200" y="150" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">n</text>
    
    <text x="132" y="225" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Кроссинговер!</text>
    <text x="132" y="240" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Гомологичные хромосомы</text>
    <text x="132" y="253" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">расходятся</text>
    
    <!-- Meiosis II -->
    <rect x="260" y="95" width="220" height="195" rx="5" fill="#FCE4EC" stroke="#EF5350" stroke-width="1"/>
    <text x="370" y="112" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Мейоз II (эквационный)</text>
    
    <!-- Two cells entering -->
    <ellipse cx="310" cy="160" rx="22" ry="18" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <line x1="305" y1="155" x2="305" y2="165" stroke="#C62828" stroke-width="1.5"/>
    <text x="310" y="150" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">n</text>
    
    <ellipse cx="430" cy="160" rx="22" ry="18" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <line x1="425" y1="155" x2="425" y2="165" stroke="#C62828" stroke-width="1.5"/>
    <text x="430" y="150" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">n</text>
    
    <text x="370" y="170" font-family="Arial,sans-serif" font-size="14" fill="#EF5350" text-anchor="middle">&#x2193;</text>
    
    <!-- Four haploid cells -->
    <ellipse cx="310" cy="220" rx="18" ry="14" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <text x="310" y="223" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">n</text>
    <ellipse cx="370" cy="220" rx="18" ry="14" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <text x="370" y="223" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">n</text>
    <ellipse cx="400" cy="220" rx="18" ry="14" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <text x="400" y="223" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">n</text>
    <ellipse cx="430" cy="220" rx="18" ry="14" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <text x="430" y="223" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">n</text>
    
    <text x="370" y="250" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">4 гаплоидные клетки</text>
    <text x="370" y="263" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Как митоз (хроматиды)</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Редукционное деление клетки</text>
</svg>