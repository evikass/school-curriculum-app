<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="36" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#283593" text-anchor="middle">Inversion</text>
  <text x="250" y="54" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Английский язык — Урок 2</text>
  <line x1="30" y1="62" x2="470" y2="62" stroke="#283593" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="70" width="460" height="30" rx="5" fill="#283593" opacity="0.10"/>
  <text x="250" y="90" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Инверсия — изменение порядка слов для эмфазы и стилистической выразительности речи</text>
  <rect x="20" y="108" width="460" height="64" rx="5" fill="#283593" opacity="0.06"/>
  <text x="30" y="124" font-family="Arial,sans-serif" font-size="11.5" fill="#283593" font-weight="bold">Отрицательная инверсия</text>
  <text x="30" y="140" font-family="Arial,sans-serif" font-size="9.5" fill="#C62828">Never / Rarely / Hardly + вспом. глагол + подлежащее</text>
  <text x="30" y="155" font-family="Arial,sans-serif" font-size="9.5" fill="#333333" font-style="italic">Never have I seen such beauty</text>
  <text x="475" y="166" font-family="Arial,sans-serif" font-size="7.5" fill="#999999" text-anchor="end">Вынесение отрицания на первое место</text>
  <rect x="20" y="178" width="460" height="64" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="194" font-family="Arial,sans-serif" font-size="11.5" fill="#283593" font-weight="bold">Инверсия с So / Such</text>
  <text x="30" y="210" font-family="Arial,sans-serif" font-size="9.5" fill="#C62828">So + прил./нареч. + вспом. глагол + подл.</text>
  <text x="30" y="225" font-family="Arial,sans-serif" font-size="9.5" fill="#333333" font-style="italic">So impressive was the view that we stopped</text>
  <text x="475" y="236" font-family="Arial,sans-serif" font-size="7.5" fill="#999999" text-anchor="end">Акцент на степени качества</text>
  <rect x="20" y="248" width="460" height="64" rx="5" fill="#283593" opacity="0.06"/>
  <text x="30" y="264" font-family="Arial,sans-serif" font-size="11.5" fill="#283593" font-weight="bold">Условная инверсия</text>
  <text x="30" y="280" font-family="Arial,sans-serif" font-size="9.5" fill="#C62828">Had / Were / Should + подлежащее + ...</text>
  <text x="30" y="295" font-family="Arial,sans-serif" font-size="9.5" fill="#333333" font-style="italic">Had I known, I would have acted differently</text>
  <text x="475" y="306" font-family="Arial,sans-serif" font-size="7.5" fill="#999999" text-anchor="end">Замена if в условных 2 и 3 типа</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#283593" opacity="0.06"/>
  <text x="250" y="342" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-style="italic">English · Grade 11</text>
</svg>