<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c8ebf;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d35400;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34495e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e50;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">РОДЫ И ЖАНРЫ ЛИТЕРАТУРЫ</text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">ЛИТЕРАТУРА · 10 КЛАСС</text>
  
  <!-- Номер урока -->
  <circle cx="460" cy="30" r="15" fill="#3498db"/>
  <text x="460" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">15</text>
  
  <!-- Эпос -->
  <g transform="translate(50, 90)">
    <rect x="0" y="0" width="130" height="200" fill="url(#grad1)" rx="5" opacity="0.2"/>
    <rect x="0" y="0" width="130" height="40" fill="url(#grad1)" rx="5"/>
    <text x="65" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">ЭПОС</text>
    
    <!-- Иконка книги -->
    <rect x="45" y="55" width="40" height="30" fill="#4a6fa5" rx="2"/>
    <rect x="48" y="58" width="34" height="24" fill="white"/>
    <line x1="50" y1="62" x2="80" y2="62" stroke="#4a6fa5" stroke-width="1"/>
    <line x1="50" y1="66" x2="75" y2="66" stroke="#4a6fa5" stroke-width="1"/>
    <line x1="50" y1="70" x2="80" y2="70" stroke="#4a6fa5" stroke-width="1"/>
    <line x1="50" y1="74" x2="70" y2="74" stroke="#4a6fa5" stroke-width="1"/>
    
    <!-- Подписи -->
    <text x="65" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Повествовательный</text>
    <text x="65" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">род</text>
    
    <!-- Жанры -->
    <text x="65" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Жанры:</text>
    <rect x="15" y="155" width="25" height="15" fill="#5d8cc6" rx="2"/>
    <text x="27" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Роман</text>
    <rect x="45" y="155" width="25" height="15" fill="#5d8cc6" rx="2"/>
    <text x="57" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Повесть</text>
    <rect x="75" y="155" width="25" height="15" fill="#5d8cc6" rx="2"/>
    <text x="87" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Рассказ</text>
    
    <!-- Признаки -->
    <text x="65" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Объективность</text>
    <text x="65" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Сюжетность</text>
  </g>
  
  <!-- Лирика -->
  <g transform="translate(185, 90)">
    <rect x="0" y="0" width="130" height="200" fill="url(#grad2)" rx="5" opacity="0.2"/>
    <rect x="0" y="0" width="130" height="40" fill="url(#grad2)" rx="5"/>
    <text x="65" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">ЛИРИКА</text>
    
    <!-- Иконка стихотворения -->
    <path d="M45,55 Q45,65 55,65 Q65,65 65,55 L65,75 Q65,85 55,85 Q45,85 45,75 Z" fill="#d35400"/>
    <circle cx="50" cy="60" r="2" fill="white"/>
    <circle cx="60" cy="65" r="2" fill="white"/>
    <circle cx="55" cy="70" r="2" fill="white"/>
    
    <!-- Подписи -->
    <text x="65" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Поэтический</text>
    <text x="65" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">род</text>
    
    <!-- Жанры -->
    <text x="65" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Жанры:</text>
    <rect x="15" y="155" width="25" height="15" fill="#e67e22" rx="2"/>
    <text x="27" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Ода</text>
    <rect x="45" y="155" width="25" height="15" fill="#e67e22" rx="2"/>
    <text x="57" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Элегия</text>
    <rect x="75" y="155" width="25" height="15" fill="#e67e22" rx="2"/>
    <text x="87" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Стих.</text>
    
    <!-- Признаки -->
    <text x="65" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Субъективность</text>
    <text x="65" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Эмоциональность</text>
  </g>
  
  <!-- Драма -->
  <g transform="translate(320, 90)">
    <rect x="0" y="0" width="130" height="200" fill="url(#grad3)" rx="5" opacity="0.2"/>
    <rect x="0" y="0" width="130" height="40" fill="url(#grad3)" rx="5"/>
    <text x="65" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">ДРАМА</text>
    
    <!-- Иконка театра -->
    <rect x="45" y="55" width="40" height="30" fill="#27ae60" rx="2"/>
    <path d="M50,65 Q55,60 60,65 Q65,60 70,65" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="55" cy="70" r="2" fill="white"/>
    <circle cx="65" cy="70" r="2" fill="white"/>
    
    <!-- Подписи -->
    <text x="65" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Сценический</text>
    <text x="65" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">род</text>
    
    <!-- Жанры -->
    <text x="65" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Жанры:</text>
    <rect x="15" y="155" width="25" height="15" fill="#2ecc71" rx="2"/>
    <text x="27" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Трагедия</text>
    <rect x="45" y="155" width="25" height="15" fill="#2ecc71" rx="2"/>
    <text x="57" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Комедия</text>
    <rect x="75" y="155" width="25" height="15" fill="#2ecc71" rx="2"/>
    <text x="87" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Драма</text>
    
    <!-- Признаки -->
    <text x="65" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Диалогичность</text>
    <text x="65" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Действенность</text>
  </g>
  
  <!-- Связующие элементы -->
  <path d="M180,140 Q250,130 320,140" fill="none" stroke="#95a5a6" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="180" cy="140" r="3" fill="#95a5a6"/>
  <circle cx="320" cy="140" r="3" fill="#95a5a6"/>
  
  <!-- Формула взаимодействия -->
  <rect x="150" y="310" width="200" height="30" fill="#ecf0f1" rx="5"/>
  <text x="250" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Эпос + Лирика + Драма = Литература</text>
  
  <!-- Дополнительные элементы -->
  <path d="M20,200 L480,200" stroke="#bdc3c7" stroke-width="1"/>
  <circle cx="50" cy="200" r="5" fill="#4a6fa5"/>
  <circle cx="185" cy="200" r="5" fill="#d35400"/>
  <circle cx="320" cy="200" r="5" fill="#27ae60"/>
  <circle cx="450" cy="200" r="5" fill="#9b59b6"/>
</svg>