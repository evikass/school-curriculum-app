<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="engBg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#engBg2)"/>
  
  <!-- Sun -->
  <circle cx="70" cy="55" r="25" fill="#FFD700" opacity="0.9">
    <animate attributeName="r" values="25;28;25" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.75">
    <ellipse cx="200" cy="45" rx="30" ry="18" fill="white"/>
    <ellipse cx="230" cy="40" rx="24" ry="14" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="470" cy="280" rx="25" ry="38" fill="#228B22"/>
    <rect x="465" y="280" width="10" height="22" fill="#5D4037"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#FF9800"/>
    <circle cx="47" cy="320" r="4" fill="#FFB74D"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#FF5722"/>
    <circle cx="458" cy="320" r="4" fill="#FF8A65"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E65100" text-anchor="middle">🏫 School</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#E65100" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.92" stroke="#FF9800" stroke-width="2"/>
  
  <!-- School items -->
  <text x="250" y="85" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Школьные принадлежности / School supplies</text>
  
  <g transform="translate(50, 95)">
    <!-- Book -->
    <rect x="0" y="0" width="90" height="70" rx="8" fill="#FFF3E0" stroke="#FF9800"/>
    <text x="45" y="35" font-size="28" text-anchor="middle">📚</text>
    <text x="45" y="55" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">book</text>
    <text x="45" y="66" font-size="8" fill="#333" text-anchor="middle">книга</text>
    
    <!-- Pen -->
    <rect x="100" y="0" width="90" height="70" rx="8" fill="#FFE0B2" stroke="#FFA726"/>
    <text x="145" y="35" font-size="28" text-anchor="middle">🖊️</text>
    <text x="145" y="55" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">pen</text>
    <text x="145" y="66" font-size="8" fill="#333" text-anchor="middle">ручка</text>
    
    <!-- Pencil -->
    <rect x="200" y="0" width="90" height="70" rx="8" fill="#FFECB3" stroke="#FFB74D"/>
    <text x="245" y="35" font-size="28" text-anchor="middle">✏️</text>
    <text x="245" y="55" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">pencil</text>
    <text x="245" y="66" font-size="8" fill="#333" text-anchor="middle">карандаш</text>
    
    <!-- Ruler -->
    <rect x="300" y="0" width="90" height="70" rx="8" fill="#FFF8E1" stroke="#FFC107"/>
    <text x="345" y="35" font-size="28" text-anchor="middle">📏</text>
    <text x="345" y="55" font-size="11" font-weight="bold" fill="#F57C00" text-anchor="middle">ruler</text>
    <text x="345" y="66" font-size="8" fill="#333" text-anchor="middle">линейка</text>
  </g>
  
  <!-- More items -->
  <g transform="translate(50, 175)">
    <!-- Desk -->
    <rect x="0" y="0" width="90" height="70" rx="8" fill="#E3F2FD" stroke="#2196F3"/>
    <text x="45" y="35" font-size="28" text-anchor="middle">🪑</text>
    <text x="45" y="55" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">desk</text>
    <text x="45" y="66" font-size="8" fill="#333" text-anchor="middle">парта</text>
    
    <!-- Bag -->
    <rect x="100" y="0" width="90" height="70" rx="8" fill="#E8F5E9" stroke="#4CAF50"/>
    <text x="145" y="35" font-size="28" text-anchor="middle">🎒</text>
    <text x="145" y="55" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">bag</text>
    <text x="145" y="66" font-size="8" fill="#333" text-anchor="middle">рюкзак</text>
    
    <!-- Notebook -->
    <rect x="200" y="0" width="90" height="70" rx="8" fill="#F3E5F5" stroke="#9C27B0"/>
    <text x="245" y="35" font-size="28" text-anchor="middle">📓</text>
    <text x="245" y="55" font-size="11" font-weight="bold" fill="#7B1FA2" text-anchor="middle">notebook</text>
    <text x="245" y="66" font-size="8" fill="#333" text-anchor="middle">тетрадь</text>
    
    <!-- Eraser -->
    <rect x="300" y="0" width="90" height="70" rx="8" fill="#FCE4EC" stroke="#E91E63"/>
    <text x="345" y="35" font-size="28" text-anchor="middle">🧽</text>
    <text x="345" y="55" font-size="11" font-weight="bold" fill="#C2185B" text-anchor="middle">eraser</text>
    <text x="345" y="66" font-size="8" fill="#333" text-anchor="middle">ластик</text>
  </g>
  
  <!-- Sentence -->
  <rect x="80" y="260" width="340" height="45" rx="8" fill="#FFF3E0" stroke="#FF9800"/>
  <text x="250" y="280" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Example: I have a pen and a pencil.</text>
  <text x="250" y="295" font-size="9" fill="#333" text-anchor="middle">Пример: У меня есть ручка и карандаш.</text>
  
  <!-- School icon -->
  <g transform="translate(55, 280)" opacity="0.5">
    <text font-size="20">🏫</text>
  </g>
</svg>