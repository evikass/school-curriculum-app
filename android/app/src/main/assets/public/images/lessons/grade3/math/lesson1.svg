<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math1)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0" text-anchor="middle">✖️ Умножение числа 2</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#2196F3" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#90CAF9" opacity="0.5"/>
  
  <!-- Multiplication table -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif" font-size="13">
    <text x="220" y="0" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Таблица умножения на 2</text>
    
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="140" height="25" fill="#BBDEFB" rx="3"/>
      <text x="70" y="18" fill="#0D47A1" text-anchor="middle">2 × 1 = 2</text>
      
      <rect x="150" y="0" width="140" height="25" fill="#E3F2FD" rx="3"/>
      <text x="220" y="18" fill="#0D47A1" text-anchor="middle">2 × 2 = 4</text>
      
      <rect x="300" y="0" width="140" height="25" fill="#BBDEFB" rx="3"/>
      <text x="370" y="18" fill="#0D47A1" text-anchor="middle">2 × 3 = 6</text>
      
      <rect x="0" y="30" width="140" height="25" fill="#E3F2FD" rx="3"/>
      <text x="70" y="48" fill="#0D47A1" text-anchor="middle">2 × 4 = 8</text>
      
      <rect x="150" y="30" width="140" height="25" fill="#BBDEFB" rx="3"/>
      <text x="220" y="48" fill="#0D47A1" text-anchor="middle">2 × 5 = 10</text>
      
      <rect x="300" y="30" width="140" height="25" fill="#E3F2FD" rx="3"/>
      <text x="370" y="48" fill="#0D47A1" text-anchor="middle">2 × 6 = 12</text>
      
      <rect x="0" y="60" width="140" height="25" fill="#BBDEFB" rx="3"/>
      <text x="70" y="78" fill="#0D47A1" text-anchor="middle">2 × 7 = 14</text>
      
      <rect x="150" y="60" width="140" height="25" fill="#E3F2FD" rx="3"/>
      <text x="220" y="78" fill="#0D47A1" text-anchor="middle">2 × 8 = 16</text>
      
      <rect x="300" y="60" width="140" height="25" fill="#BBDEFB" rx="3"/>
      <text x="370" y="78" fill="#0D47A1" text-anchor="middle">2 × 9 = 18</text>
      
      <rect x="150" y="90" width="140" height="25" fill="#E3F2FD" rx="3"/>
      <text x="220" y="108" fill="#0D47A1" text-anchor="middle">2 × 10 = 20</text>
    </g>
  </g>
  
  <!-- Visual representation -->
  <g transform="translate(50, 240)" font-family="Arial, sans-serif">
    <text x="200" y="0" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">2 × 4 = 8 (две группы по 4)</text>
    
    <g transform="translate(70, 15)">
      <circle cx="20" cy="15" r="12" fill="#FF7043">
        <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="55" cy="15" r="12" fill="#FF7043"/>
      <circle cx="90" cy="15" r="12" fill="#FF7043"/>
      <circle cx="125" cy="15" r="12" fill="#FF7043"/>
      
      <circle cx="20" cy="50" r="12" fill="#66BB6A">
        <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <circle cx="55" cy="50" r="12" fill="#66BB6A"/>
      <circle cx="90" cy="50" r="12" fill="#66BB6A"/>
      <circle cx="125" cy="50" r="12" fill="#66BB6A"/>
    </g>
  </g>
  
  <!-- Tip -->
  <g transform="translate(300, 250)">
    <rect x="0" y="0" width="150" height="50" fill="#FFF8E1" rx="5" stroke="#FFC107"/>
    <text x="75" y="20" font-family="Arial, sans-serif" font-size="10" fill="#E65100" text-anchor="middle">💡 Секрет!</text>
    <text x="75" y="35" font-family="Arial, sans-serif" font-size="9" fill="#F57C00" text-anchor="middle">Все ответы —</text>
    <text x="75" y="47" font-family="Arial, sans-serif" font-size="9" fill="#F57C00" text-anchor="middle">чётные числа!</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>