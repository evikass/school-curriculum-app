<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Кривые безразличия</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 3</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>
  <rect x="20" y="72" width="220" height="95" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="234" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Кривая безразличия (IC)</text>
  <text x="28" y="100" class="box-text">Наборы с равной TU</text>
  <text x="28" y="113" class="box-text">IC₁, IC₂, IC₃ — карта КБ</text>
  <text x="28" y="126" class="box-text">Чем правее/выше IC, тем ↑ U</text>
  <text x="28" y="139" class="box-text">Форма: выпукла к началу</text>
  <text x="28" y="152" class="box-text">MRS = |ΔY/ΔX| = MUx/MUy</text>
  <rect x="260" y="72" width="220" height="95" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="86" class="box-title">Свойства КБ</text>
  <text x="268" y="100" class="box-text">1. Не пересекаются</text>
  <text x="268" y="113" class="box-text">2. Отриц. наклон (MRS&gt;0)</text>
  <text x="268" y="126" class="box-text">3. Выпуклы к началу коорд.</text>
  <text x="268" y="139" class="box-text">4. Чем дальше от (0,0),</text>
  <text x="268" y="152" class="box-text">   тем выше полезность</text>
  <rect x="20" y="182" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="182" x2="474" y2="182" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="196" class="box-title">Бюджетное ограничение</text>
  <text x="28" y="210" class="box-text">I = Px·X + Py·Y    →    Y = I/Py − (Px/Py)·X</text>
  <text x="28" y="223" class="box-text">Наклон бюджетной линии = −Px/Py</text>
  <rect x="20" y="248" width="460" height="60" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="248" x2="474" y2="248" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="262" class="box-title">Равновесие потребителя</text>
  <text x="28" y="276" class="box-text">IC касается бюджетной линии: MRS = Px/Py</text>
  <text x="28" y="289" class="box-text">Точка касания — оптимальный набор (X*, Y*)</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>