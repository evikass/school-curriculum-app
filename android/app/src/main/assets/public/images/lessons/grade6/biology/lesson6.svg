  <rect x="20" y="236" width="220" height="65" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="130" y="250" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">СЕМЯ И ПРОРОСТОК</text>

  <!-- Seed -->
  <ellipse cx="55" cy="278" rx="10" ry="7" fill="#A1887F" stroke="#5D4037" stroke-width="1"/>
