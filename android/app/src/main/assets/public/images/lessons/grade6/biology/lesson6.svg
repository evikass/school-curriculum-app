  <path d="M121,178 Q112,172 108,168" stroke="#43A047" stroke-width="1.5" fill="none"/>
  <ellipse cx="106" cy="168" rx="5" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8" transform="rotate(-20,106,168)"/>
  <path d="M121,178 Q130,172 134,168" stroke="#43A047" stroke-width="1.5" fill="none"/>
  <ellipse cx="136" cy="168" rx="5" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8" transform="rotate(20,136,168)"/>

  <!-- Petals -->
  <ellipse cx="100" cy="155" rx="14" ry="8" fill="#FF8A80" stroke="#E53935" stroke-width="0.8" transform="rotate(-50,100,155)"/>
  <ellipse cx="150" cy="155" rx="14" ry="8" fill="#FF8A80" stroke="#E53935" stroke-width="0.8" transform="rotate(50,150,155)"/>
  <ellipse cx="92" cy="145" rx="14" ry="8" fill="#FFAB91" stroke="#E53935" stroke-width="0.8" transform="rotate(-25,92,145)"/>
