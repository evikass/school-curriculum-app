  <circle cx="55" cy="278" r="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="55" y="295" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">семя</text>

  <!-- Arrow -->
