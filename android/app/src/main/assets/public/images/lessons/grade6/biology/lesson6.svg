  <ellipse cx="99" cy="258" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
  <ellipse cx="111" cy="256" rx="5" ry="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="105" y="295" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">проросток</text>

  <!-- Arrow -->
  <line x1="118" y1="278" x2="133" y2="278" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="133,275 138,278 133,281" fill="#C62828"/>

  <!-- Small plant -->
  <line x1="155" y1="290" x2="155" y2="258" stroke="#81C784" stroke-width="2"/>
  <ellipse cx="148" cy="258" rx="8" ry="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.7"/>
  <ellipse cx="162" cy="255" rx="8" ry="4" fill="#81C784" stroke="#2E7D32" stroke-width="0.7"/>
  <ellipse cx="155" cy="250" rx="6" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.7"/>
  <circle cx="155" cy="243" r="4" fill="#F9A825"/>
  <ellipse cx="150" cy="240" rx="3" ry="3.5" fill="#FF8A80"/>
  <ellipse cx="160" cy="240" rx="3" ry="3.5" fill="#FF8A80"/>
  <text x="155" y="295" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">растение</text>

  <!-- Cycle label -->
  <rect x="175" y="252" width="55" height="30" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="202" y="264" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Цикл:</text>
  <text x="202" y="274" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">цветок</text>
  <text x="202" y="282" font-family="Arial,sans-serif" font-size="5" fill="#999" text-anchor="middle">семя - росток</text>

  <!-- Life cycle card -->
  <rect x="252" y="236" width="228" height="65" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="366" y="250" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">ЖИЗНЕННЫЙ ЦИКЛ</text>

  <!-- Circular arrows showing cycle -->
  <!-- Pollination -->
  <circle cx="300" cy="278" r="10" fill="#FFCDD2" stroke="#E53935" stroke-width="0.8"/>
  <text x="300" y="281" font-family="Arial,sans-serif" font-size="6" fill="#E53935" text-anchor="middle">1</text>
  <!-- Arrow 1->2 -->
  <path d="M310,278 L325,278" stroke="#999" stroke-width="1"/>
  <polygon points="325,276 329,278 325,280" fill="#999"/>
  <!-- Fertilization -->
  <circle cx="340" cy="278" r="10" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="340" y="281" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">2</text>
  <!-- Arrow 2->3 -->
  <path d="M350,278 L365,278" stroke="#999" stroke-width="1"/>
  <polygon points="365,276 369,278 365,280" fill="#999"/>
  <!-- Seed -->
  <circle cx="380" cy="278" r="10" fill="#EFEBE9" stroke="#795548" stroke-width="0.8"/>
  <text x="380" y="281" font-family="Arial,sans-serif" font-size="6" fill="#795548" text-anchor="middle">3</text>
  <!-- Arrow 3->4 -->
  <path d="M390,278 L405,278" stroke="#999" stroke-width="1"/>
  <polygon points="405,276 409,278 405,280" fill="#999"/>
  <!-- Sprout -->
  <circle cx="420" cy="278" r="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="420" y="281" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">4</text>
  <!-- Return arrow 4->1 -->
  <path d="M420,268 Q360,255 300,268" stroke="#999" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <polygon points="300,268 302,263 305,269" fill="#999"/>

  <!-- Labels under numbers -->
  <text x="300" y="296" font-family="Arial,sans-serif" font-size="5" fill="#E53935" text-anchor="middle">опыление</text>
  <text x="340" y="296" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2" text-anchor="middle">оплодот.</text>
  <text x="380" y="296" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">семя</text>
  <text x="420" y="296" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">росток</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Размножение растений</text>
</svg>