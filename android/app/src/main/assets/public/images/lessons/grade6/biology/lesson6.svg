  <!-- Filaments -->
  <line x1="115" y1="155" x2="105" y2="138" stroke="#FDD835" stroke-width="1.2"/>
  <line x1="127" y1="155" x2="137" y2="138" stroke="#FDD835" stroke-width="1.2"/>
