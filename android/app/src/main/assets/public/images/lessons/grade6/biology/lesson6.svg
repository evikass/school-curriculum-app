  <line x1="340" y1="175" x2="340" y2="140" stroke="#81C784" stroke-width="1.5"/>
  <ellipse cx="332" cy="138" rx="8" ry="5" fill="#FF8A80" stroke="#E53935" stroke-width="0.7"/>
  <ellipse cx="348" cy="138" rx="8" ry="5" fill="#FF8A80" stroke="#E53935" stroke-width="0.7"/>
  <ellipse cx="328" cy="145" rx="8" ry="5" fill="#FFAB91" stroke="#E53935" stroke-width="0.7"/>
  <ellipse cx="352" cy="145" rx="8" ry="5" fill="#FFAB91" stroke="#E53935" stroke-width="0.7"/>
