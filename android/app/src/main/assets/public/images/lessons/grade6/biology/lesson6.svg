  <!-- Bee -->
  <!-- Body -->
  <ellipse cx="295" cy="148" rx="10" ry="7" fill="#FDD835" stroke="#F57F17" stroke-width="1"/>
  <!-- Stripes -->
  <line x1="290" y1="148" x2="290" y2="141" stroke="#333" stroke-width="1.5"/>
  <line x1="295" y1="148" x2="295" y2="141" stroke="#333" stroke-width="1.5"/>
  <line x1="300" y1="148" x2="300" y2="141" stroke="#333" stroke-width="1.5"/>
  <!-- Head -->
  <circle cx="285" cy="147" r="4" fill="#333"/>
  <!-- Eyes -->
  <circle cx="283" cy="146" r="1.5" fill="white"/>
  <circle cx="283" cy="146" r="0.8" fill="#333"/>
  <!-- Wings -->
  <ellipse cx="292" cy="137" rx="12" ry="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="0.5" opacity="0.6"/>
  <ellipse cx="300" cy="137" rx="10" ry="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="0.5" opacity="0.6"/>
  <!-- Antennae -->
  <path d="M283,143 Q278,138 275,135" stroke="#333" stroke-width="0.6" fill="none"/>
  <path d="M285,143 Q283,137 280,134" stroke="#333" stroke-width="0.6" fill="none"/>
  <!-- Legs -->
  <line x1="290" y1="155" x2="286" y2="160" stroke="#333" stroke-width="0.6"/>
  <line x1="295" y1="155" x2="293" y2="161" stroke="#333" stroke-width="0.6"/>
  <line x1="300" y1="155" x2="303" y2="160" stroke="#333" stroke-width="0.6"/>
  <!-- Flight path -->
  <path d="M260,155 Q268,152 275,155" stroke="#F9A825" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <path d="M255,158 Q262,155 270,158" stroke="#F9A825" stroke-width="0.7" fill="none" stroke-dasharray="2,2"/>

  <!-- Pollen grains on bee -->
  <circle cx="293" cy="157" r="2" fill="#FDD835"/>
  <circle cx="297" cy="158" r="2" fill="#FDD835"/>
  <circle cx="290" cy="159" r="1.5" fill="#FDD835"/>

