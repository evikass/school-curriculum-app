  <circle cx="106" cy="131" r="1.5" fill="#FDD835"/>
  <circle cx="136" cy="130" r="1.5" fill="#FDD835"/>
  <circle cx="142" cy="131" r="1.5" fill="#FDD835"/>

  <!-- Pistil -->
  <line x1="121" y1="165" x2="121" y2="128" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Stigma -->
  <ellipse cx="121" cy="125" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Ovary -->
  <ellipse cx="121" cy="168" rx="7" ry="5" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>

  <!-- Labels -->
  <line x1="103" y1="136" x2="48" y2="120" stroke="#F57F17" stroke-width="0.7" stroke-dasharray="2,1"/>
  <text x="46" y="118" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="end">Тычинка</text>
  <line x1="121" y1="125" x2="46" y2="108" stroke="#2E7D32" stroke-width="0.7" stroke-dasharray="2,1"/>
  <text x="44" y="106" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="end">Пестик</text>
  <line x1="92" y1="145" x2="40" y2="138" stroke="#E53935" stroke-width="0.7" stroke-dasharray="2,1"/>
  <text x="38" y="136" font-family="Arial,sans-serif" font-size="6" fill="#E53935" text-anchor="end">Лепесток</text>
  <line x1="121" y1="170" x2="165" y2="185" stroke="#2E7D32" stroke-width="0.7" stroke-dasharray="2,1"/>
  <text x="167" y="187" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Завязь</text>
  <line x1="106" y1="168" x2="165" y2="175" stroke="#43A047" stroke-width="0.7" stroke-dasharray="2,1"/>
  <text x="167" y="173" font-family="Arial,sans-serif" font-size="6" fill="#43A047">Чашелистик</text>

  <!-- Pollination card -->
  <rect x="242" y="88" width="238" height="140" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
