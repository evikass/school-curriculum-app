  <text x="305" y="185" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" font-weight="bold" text-anchor="middle">Индийский</text>
  <text x="305" y="195" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">океан</text>
  <text x="240" y="105" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" font-weight="bold" text-anchor="middle">Северный Ледовитый</text>
  <text x="240" y="115" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">океан</text>

