  <text x="300" y="280" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">76,2 млн км2</text>

  <rect x="360" y="245" width="110" height="48" rx="5" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="360" y="245" width="110" height="4" rx="2" fill="#64B5F6"/>
  <text x="415" y="266" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Сев. Ледовитый</text>
  <text x="415" y="280" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">14,8 млн км2</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Мировой океан</text>
