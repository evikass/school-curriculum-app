  <rect x="30" y="245" width="100" height="4" rx="2" fill="#1565C0"/>
  <text x="80" y="266" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Тихий океан</text>
  <text x="80" y="280" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">178,7 млн км2</text>

  <rect x="140" y="245" width="100" height="48" rx="5" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="140" y="245" width="100" height="4" rx="2" fill="#1976D2"/>
  <text x="190" y="266" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Атлантический</text>
  <text x="190" y="280" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">91,6 млн км2</text>

  <rect x="250" y="245" width="100" height="48" rx="5" fill="white" stroke="#E0E0E0" stroke-width="1"/>
