  <text x="150" y="135" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" font-weight="bold" text-anchor="middle">Тихий</text>
  <text x="150" y="145" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">океан</text>
