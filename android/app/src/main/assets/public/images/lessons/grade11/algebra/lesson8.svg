<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Урок 8: Определение производной</text>
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">№8</text>
  
  <!-- Градиент для графиков -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Геометрический смысл производной -->
  <g transform="translate(20, 70)">
    <!-- Ось координат -->
    <line x1="0" y1="80" x2="200" y2="80" stroke="#34495e" stroke-width="2"/>
    <line x1="100" y1="0" x2="100" y2="160" stroke="#34495e" stroke-width="2"/>
    <polygon points="200,80 210,75 210,85" fill="#34495e"/>
    <polygon points="100,0 95,10 105,10" fill="#34495e"/>
    
    <!-- График функции -->
    <path d="M 20,120 Q 50,100 80,90 T 120,85 T 160,70 T 200,50" fill="none" stroke="url(#grad1)" stroke-width="2"/>
    
    <!-- Точка на графике -->
    <circle cx="100" cy="85" r="4" fill="#e74c3c"/>
    <circle cx="140" cy="75" r="4" fill="#e74c3c"/>
    
    <!-- Секущая -->
    <line x1="100" y1="85" x2="140" y2="75" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Касательная -->
    <line x1="60" y1="95" x2="140" y2="75" stroke="#2ecc71" stroke-width="2" stroke-dasharray="5,3"/>
    
    <!-- Подписи -->
    <text x="210" y="85" font-family="Arial" font-size="10" fill="#34495e">x</text>
    <text x="100" y="-5" font-family="Arial" font-size="10" fill="#34495e">y</text>
    <text x="95" y="75" font-family="Arial" font-size="8" fill="#34495e">A</text>
    <text x="135" y="65" font-family="Arial" font-size="8" fill="#34495e">B</text>
    <text x="145" y="80" font-family="Arial" font-size="8" fill="#34495e">Δx</text>
    <text x="115" y="90" font-family="Arial" font-size="8" fill="#34495e">Δy</text>
    
    <!-- Название блока -->
    <text x="100" y="-20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Геометрический смысл</text>
    <text x="100" y="-5" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">tg(α) = k</text>
  </g>
  
  <!-- Физический смысл производной -->
  <g transform="translate(240, 70)">
    <!-- Ось времени -->
    <line x1="0" y1="80" x2="200" y2="80" stroke="#34495e" stroke-width="2"/>
    <polygon points="200,80 210,75 210,85" fill="#34495e"/>
    <text x="210" y="85" font-family="Arial" font-size="10" fill="#34495e">t</text>
    
    <!-- График зависимости S(t) -->
    <path d="M 20,140 Q 50,120 80,100 T 120,70 T 160,50 T 200,40" fill="none" stroke="url(#grad2)" stroke-width="2"/>
    
    <!-- График зависимости v(t) -->
    <path d="M 20,80 Q 50,70 80,60 T 120,50 T 160,45 T 200,40" fill="none" stroke="#9b59b6" stroke-width="2"/>
    
    <!-- Подписи -->
    <text x="10" y="140" font-family="Arial" font-size="10" fill="#34495e">S(t)</text>
    <text x="10" y="80" font-family="Arial" font-size="10" fill="#34495e">v(t)</text>
    
    <!-- Название блока -->
    <text x="100" y="-20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Физический смысл</text>
    <text x="100" y="-5" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">v = dS/dt</text>
  </g>
  
  <!-- Определение производной -->
  <g transform="translate(20, 250)">
    <rect x="0" y="0" width="220" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="110" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Определение производной</text>
    <text x="110" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">f'(x₀) = lim</text>
    <text x="110" y="55" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">Δx→0 [f(x₀+Δx) - f(x₀)]/Δx</text>
    <text x="110" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">или f'(x₀) = lim</text>
    <text x="110" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">h→0 [f(x₀+h) - f(x₀)]/h</text>
  </g>
  
  <!-- Правила дифференцирования -->
  <g transform="translate(260, 250)">
    <rect x="0" y="0" width="220" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="110" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Правила дифференцирования</text>
    <text x="110" y="40" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">(u+v)' = u' + v'</text>
    <text x="110" y="55" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">(C·u)' = C·u'</text>
    <text x="110" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">(u·v)' = u'·v + u·v'</text>
    <text x="110" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">(u/v)' = (u'·v - u·v')/v²</text>
  </g>
  
  <!-- Производные основных функций -->
  <g transform="translate(20, 150)">
    <rect x="0" y="0" width="220" height="80" fill="#e8f4f8" stroke="#aed6f1" stroke-width="1" rx="5"/>
    <text x="110" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Основные производные</text>
    <text x="10" y="40" font-family="Arial" font-size="10" fill="#34495e">(xⁿ)' = n·xⁿ⁻¹</text>
    <text x="10" y="55" font-family="Arial" font-size="10" fill="#34495e">(sin x)' = cos x</text>
    <text x="10" y="70" font-family="Arial" font-size="10" fill="#34495e">(cos x)' = -sin x</text>
    <text x="10" y="85" font-family="Arial" font-size="10" fill="#34495e">(eˣ)' = eˣ</text>
    <text x="120" y="40" font-family="Arial" font-size="10" fill="#34495e">(ln x)' = 1/x</text>
    <text x="120" y="55" font-family="Arial" font-size="10" fill="#34495e">(aˣ)' = aˣ·ln a</text>
    <text x="120" y="70" font-family="Arial" font-size="10" fill="#34495e">(logₐx)' = 1/(x·ln a)</text>
    <text x="120" y="85" font-family="Arial" font-size="10" fill="#34495e">(tg x)' = 1/cos²x</text>
  </g>
  
  <!-- Производные сложных функций -->
  <g transform="translate(260, 150)">
    <rect x="0" y="0" width="220" height="80" fill="#fdf2e9" stroke="#fad7a0" stroke-width="1" rx="5"/>
    <text x="110" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Производная сложной функции</text>
    <text x="110" y="45" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">y = f(g(x))</text>
    <text x="110" y="65" text-anchor="middle" font-family="Arial" font-size="10" fill="#34495e">y' = f'(g(x))·g'(x)</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="450" cy="320" r="15" fill="#3498db" opacity="0.2"/>
  <circle cx="450" cy="320" r="10" fill="#2ecc71" opacity="0.3"/>
  <circle cx="450" cy="320" r="5" fill="#e74c3c" opacity="0.4"/>
  
  <!-- Стрелки указатели -->
  <path d="M 230,160 L 250,160" stroke="#7f8c8d" stroke-width="1" marker-end="url(#arrowhead)"/>
  <path d="M 230,260 L 250,260" stroke="#7f8c8d" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7f8c8d"/>
    </marker>
  </defs>
</svg>