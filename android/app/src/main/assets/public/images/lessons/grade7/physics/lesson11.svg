<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFFDE7"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Расчёт пути и времени движения 📚</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="135" y="115" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Расчёт пути и времени движения 📚</text>
  <!-- Car on road -->
  <rect x="55" y="145" width="50" height="22" rx="6" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
  <circle cx="67" cy="170" r="6" fill="#333" stroke="#555" stroke-width="1"/>
  <circle cx="97" cy="170" r="6" fill="#333" stroke="#555" stroke-width="1"/>
  <line x1="35" y1="176" x2="120" y2="176" stroke="#888" stroke-width="1.5"/>
  <line x1="40" y1="176" x2="40" y2="185" stroke="#888" stroke-width="1"/>
  <line x1="60" y1="176" x2="60" y2="183" stroke="#888" stroke-width="1"/>
  <line x1="80" y1="176" x2="80" y2="185" stroke="#888" stroke-width="1"/>
  <line x1="100" y1="176" x2="100" y2="183" stroke="#888" stroke-width="1"/>
  <!-- Speed arrow -->
  <line x1="115" y1="155" x2="150" y2="155" stroke="#C62828" stroke-width="2"/>
  <polygon points="148,152 155,155 148,158" fill="#C62828"/>
  <text x="135" y="148" font-family="Arial,sans-serif" font-size="9" fill="#C62828">v</text>
  <!-- Stopwatch -->
  <circle cx="190" cy="210" r="25" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <circle cx="190" cy="210" r="20" fill="white" stroke="#90CAF9" stroke-width="1"/>
  <line x1="190" y1="195" x2="190" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="190" y1="225" x2="190" y2="230" stroke="#333" stroke-width="1.5"/>
  <line x1="175" y1="210" x2="180" y2="210" stroke="#333" stroke-width="1.5"/>
  <line x1="200" y1="210" x2="205" y2="210" stroke="#333" stroke-width="1.5"/>
  <line x1="190" y1="210" x2="200" y2="205" stroke="#C62828" stroke-width="1.5"/>
  <line x1="190" y1="210" x2="190" y2="200" stroke="#333" stroke-width="1"/>
  <circle cx="190" cy="210" r="2" fill="#333"/>
  <text x="135" y="270" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">v = S / t</text>

  <rect x="260" y="90" width="215" height="200" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="367" y="115" font-family="Arial,sans-serif" font-size="12" fill="#F9A825" text-anchor="middle" font-weight="bold">Формулы</text>
  <text x="367" y="150" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle">v = S / t</text>
  <text x="367" y="175" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">S = v x t</text>
  <text x="367" y="200" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">t = S / v</text>
  <!-- Graph -->
  <rect x="290" y="220" width="155" height="55" rx="3" fill="#FFF8E1"/>
  <line x1="310" y1="265" x2="310" y2="225" stroke="#333" stroke-width="1.5"/>
  <line x1="310" y1="265" x2="430" y2="265" stroke="#333" stroke-width="1.5"/>
  <line x1="310" y1="260" x2="430" y2="230" stroke="#C62828" stroke-width="2"/>
  <text x="430" y="260" font-family="Arial,sans-serif" font-size="7" fill="#888">t</text>
  <text x="315" y="232" font-family="Arial,sans-serif" font-size="7" fill="#888">S</text>
  <text x="380" y="258" font-family="Arial,sans-serif" font-size="7" fill="#C62828">равномерное</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>