<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg15" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="trophyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg15)"/>
  
  <!-- Confetti -->
  <g>
    <rect x="30" y="100" width="8" height="8" fill="#E91E63" transform="rotate(45 34 104)">
      <animate attributeName="y" values="100;120;100" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="450" y="80" width="6" height="6" fill="#2196F3" transform="rotate(30 453 83)">
      <animate attributeName="y" values="80;95;80" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="60" width="7" height="7" fill="#4CAF50" transform="rotate(60 83.5 63.5)">
      <animate attributeName="y" values="60;75;60" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="420" y="120" width="5" height="5" fill="#FF9800" transform="rotate(20 422.5 122.5)">
      <animate attributeName="y" values="120;130;120" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0" text-anchor="middle">🏆 Итоговый урок</text>
  <rect x="140" y="42" width="220" height="2" rx="1" fill="#2196F3" opacity="0.6"/>
  
  <!-- Sun -->
  <circle cx="50" cy="50" r="25" fill="#FFD54F">
    <animate attributeName="r" values="23;28;23" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Ground -->
  <ellipse cx="250" cy="330" rx="270" ry="35" fill="#90CAF9" opacity="0.4"/>
  
  <!-- Trophy -->
  <g transform="translate(180, 60)">
    <!-- Trophy cup -->
    <path d="M40,0 L120,0 L110,70 L50,70 Z" fill="url(#trophyGrad)" stroke="#E65100" stroke-width="2"/>
    <!-- Handles -->
    <ellipse cx="30" cy="25" rx="15" ry="20" fill="none" stroke="#FFD54F" stroke-width="8"/>
    <ellipse cx="130" cy="25" rx="15" ry="20" fill="none" stroke="#FFD54F" stroke-width="8"/>
    <!-- Base -->
    <rect x="55" y="70" width="50" height="15" fill="#FFD54F"/>
    <rect x="45" y="85" width="70" height="10" fill="#FFA000"/>
    <rect x="50" y="95" width="60" height="25" fill="#FFD54F" stroke="#E65100" stroke-width="2"/>
    <!-- Star on trophy -->
    <polygon points="80,25 85,38 100,38 88,47 93,60 80,52 67,60 72,47 60,38 75,38" fill="#FFF">
      <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
    <animate attributeName="opacity" values="1;0.95;1" dur="4s" repeatCount="indefinite"/>
  </g>
  
  <!-- Stars around -->
  <g fill="url(#starGrad)">
    <polygon points="50,120 53,130 63,130 55,137 58,147 50,141 42,147 45,137 37,130 47,130">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="450,100 453,110 463,110 455,117 458,127 450,121 442,127 445,117 437,110 447,110">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="100,80 102,87 110,87 104,92 106,99 100,95 94,99 96,92 90,87 98,87">
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- What we learned -->
  <g transform="translate(30, 130)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="150" height="150" fill="#FFF" rx="10" stroke="#2196F3"/>
    <text x="75" y="22" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">📚 Мы изучили:</text>
    <text x="15" y="45" font-size="9" fill="#1976D2">💚 Добро и зло</text>
    <text x="15" y="60" font-size="9" fill="#1976D2">🎩 Вежливость</text>
    <text x="15" y="75" font-size="9" fill="#1976D2">💖 Доброта</text>
    <text x="15" y="90" font-size="9" fill="#1976D2">🛡️ Честность</text>
    <text x="15" y="105" font-size="9" fill="#1976D2">📋 Ответственность</text>
    <text x="15" y="120" font-size="9" fill="#1976D2">👫 Дружба</text>
    <text x="15" y="135" font-size="9" fill="#1976D2">🏠 Семья и школа</text>
    <text x="15" y="150" font-size="9" fill="#1976D2">🌱 Экология</text>
  </g>
  
  <!-- Skills gained -->
  <g transform="translate(320, 130)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="150" height="150" fill="#FFF" rx="10" stroke="#2196F3"/>
    <text x="75" y="22" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">🌟 Мы научились:</text>
    <text x="15" y="45" font-size="9" fill="#1976D2">✓ Быть вежливыми</text>
    <text x="15" y="60" font-size="9" fill="#1976D2">✓ Дружить и помогать</text>
    <text x="15" y="75" font-size="9" fill="#1976D2">✓ Говорить правду</text>
    <text x="15" y="90" font-size="9" fill="#1976D2">✓ Быть ответственными</text>
    <text x="15" y="105" font-size="9" fill="#1976D2">✓ Уважать семью</text>
    <text x="15" y="120" font-size="9" fill="#1976D2">✓ Вести себя в гостях</text>
    <text x="15" y="135" font-size="9" fill="#1976D2">✓ Беречь природу</text>
    <text x="15" y="150" font-size="9" fill="#1976D2">✓ Быть хорошими людьми</text>
  </g>
  
  <!-- Medal ribbons -->
  <g transform="translate(200, 180)">
    <polygon points="0,0 20,0 30,50 10,50" fill="#E91E63"/>
    <polygon points="100,0 80,0 70,50 90,50" fill="#2196F3"/>
    <animate attributeName="opacity" values="1;0.9;1" dur="3s" repeatCount="indefinite"/>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(50, 290)">
    <rect x="0" y="0" width="400" height="50" fill="#E3F2FD" rx="8" stroke="#2196F3"/>
    <text x="200" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0D47A1" text-anchor="middle">💡 Поздравляем! Ты стал лучше в этом году!</text>
    <text x="200" y="38" font-family="Arial, sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">Продолжай быть добрым, честным и ответственным человеком!</text>
  </g>
  
  <!-- Happy faces -->
  <text x="30" y="300" font-size="20">😊</text>
  <text x="460" y="290" font-size="18">🌟</text>
</svg>