<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f3ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="curveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="swingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4dabf7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#339af0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="axisGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#495057;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#495057;stop-opacity:0.5" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Фоновая панель -->
  <rect width="500" height="350" fill="url(#bgGradient)"/>
  
  <!-- Двойная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#495057" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#868e96" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#212529">РЕЗОНАНС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#495057">ФИЗИКА · 11 КЛАСС</text>
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#868e96">Урок №23</text>
  
  <!-- График резонансной кривой -->
  <g transform="translate(80, 100)">
    <!-- Оси координат -->
    <line x1="0" y1="150" x2="280" y2="150" stroke="url(#axisGradient)" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="150" stroke="url(#axisGradient)" stroke-width="2"/>
    
    <!-- Стрелки осей -->
    <polygon points="280,150 270,145 270,155" fill="#495057"/>
    <polygon points="0,0 -5,10 5,10" fill="#495057"/>
    
    <!-- Подписи осей -->
    <text x="290" y="155" font-family="Arial, sans-serif" font-size="14" fill="#495057">ω</text>
    <text x="-15" y="-5" font-family="Arial, sans-serif" font-size="14" fill="#495057">A</text>
    
    <!-- Деления на оси X -->
    <line x1="70" y1="150" x2="70" y2="155" stroke="#495057" stroke-width="1"/>
    <line x1="140" y1="150" x2="140" y2="155" stroke="#495057" stroke-width="1"/>
    <line x1="210" y1="150" x2="210" y2="155" stroke="#495057" stroke-width="1"/>
    
    <!-- Подписи делений на оси X -->
    <text x="65" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#495057">ω₀-Δω</text>
    <text x="135" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#495057">ω₀</text>
    <text x="205" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#495057">ω₀+Δω</text>
    
    <!-- Деления на оси Y -->
    <line x1="-5" y1="50" x2="0" y2="50" stroke="#495057" stroke-width="1"/>
    <line x1="-5" y1="100" x2="0" y2="100" stroke="#495057" stroke-width="1"/>
    
    <!-- Подписи делений на оси Y -->
    <text x="-15" y="55" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#495057">A/2</text>
    <text x="-15" y="105" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#495057">A/4</text>
    
    <!-- Резонансная кривая -->
    <path d="M0,148 Q30,140 60,120 Q90,80 120,30 Q140,15 140,15 Q140,15 160,30 Q190,80 220,120 Q250,140 280,148" 
          fill="none" stroke="#ff6b6b" stroke-width="3"/>
    
    <!-- Заливка под кривой -->
    <path d="M0,150 L0,148 Q30,140 60,120 Q90,80 120,30 Q140,15 140,15 Q140,15 160,30 Q190,80 220,120 Q250,140 280,148 L280,150 Z" 
          fill="url(#curveGradient)" opacity="0.5"/>
    
    <!-- Точка резонанса -->
    <circle cx="140" cy="15" r="5" fill="#ff6b6b" filter="url(#shadow)"/>
    
    <!-- Вертикальная линия от точки резонанса -->
    <line x1="140" y1="15" x2="140" y2="150" stroke="#ff6b6b" stroke-width="1" stroke-dasharray="5,5"/>
    
    <!-- Подпись резонансной частоты -->
    <text x="145" y="10" font-family="Arial, sans-serif" font-size="12" fill="#495057">ω₀ - резонансная частота</text>
    
    <!-- Ширина резонанса -->
    <line x1="70" y1="140" x2="210" y2="140" stroke="#495057" stroke-width="1"/>
    <line x1="70" y1="135" x2="70" y2="145" stroke="#495057" stroke-width="1"/>
    <line x1="210" y1="135" x2="210" y2="145" stroke="#495057" stroke-width="1"/>
    <text x="140" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#495057">Δω</text>
  </g>
  
  <!-- Формула резонансной амплитуды -->
  <g transform="translate(80, 280)">
    <rect x="0" y="0" width="280" height="40" fill="#fff" stroke="#dee2e6" stroke-width="1" rx="5"/>
    <text x="140" y="25" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#212529">
      A<sub>рез</sub> = F<sub>0</sub>/m√((ω₀²-ω²)²+(2γω)²)
    </text>
  </g>
  
  <!-- Пример с качелями -->
  <g transform="translate(370, 80)">
    <!-- Опора -->
    <rect x="45" y="0" width="10" height="20" fill="#868e96"/>
    <rect x="35" y="15" width="30" height="5" fill="#495057"/>
    
    <!-- Качели -->
    <g transform="translate(50, 20)">
      <!-- Тросы -->
      <line x1="0" y1="0" x2="-15" y2="80" stroke="#adb5bd" stroke-width="2"/>
      <line x1="0" y1="0" x2="15" y2="80" stroke="#adb5bd" stroke-width="2"/>
      
      <!-- Сиденье -->
      <rect x="-20" y="75" width="40" height="8" fill="url(#swingGradient)" rx="2"/>
      
      <!-- Человек -->
      <ellipse cx="0" cy="70" rx="12" ry="15" fill="#ffa8a8"/>
      <circle cx="0" cy="55" r="8" fill="#ffa8a8"/>
    </g>
    
    <!-- Движение качелей -->
    <path d="M20,50 Q25,45 30,50 Q35,55 30,60 Q25,65 20,60 Q15,55 20,50" fill="none" stroke="#4dabf7" stroke-width="2" opacity="0.5"/>
    <path d="M50,50 Q55,45 60,50 Q65,55 60,60 Q55,65 50,60 Q45,55 50,50" fill="none" stroke="#4dabf7" stroke-width="2" opacity="0.5"/>
    <path d="M80,50 Q85,45 90,50 Q95,55 90,60 Q85,65 80,60 Q75,55 80,50" fill="none" stroke="#4dabf7" stroke-width="2" opacity="0.5"/>
    
    <!-- Подпись -->
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#495057">Качели как пример резонанса</text>
  </g>
  
  <!-- Легенда -->
  <g transform="translate(370, 200)">
    <rect x="0" y="0" width="110" height="120" fill="#fff" stroke="#dee2e6" stroke-width="1" rx="5"/>
    <text x="55" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#212529">Легенда</text>
    
    <!-- Условные обозначения -->
    <circle cx="15" cy="40" r="5" fill="#ff6b6b"/>
    <text x="30" y="45" font-family="Arial, sans-serif" font-size="12" fill="#495057">Резонансная частота</text>
    
    <rect x="10" y="55" width="10" height="10" fill="url(#swingGradient)"/>
    <text x="30" y="65" font-family="Arial, sans-serif" font-size="12" fill="#495057">Система</text>
    
    <line x1="10" y1="80" x2="20" y2="80" stroke="#ff6b6b" stroke-width="3"/>
    <text x="30" y="85" font-family="Arial, sans-serif" font-size="12" fill="#495057">Амплитуда колебаний</text>
    
    <line x1="10" y1="100" x2="20" y2="100" stroke="#495057" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="30" y="105" font-family="Arial, sans-serif" font-size="12" fill="#495057">Ширина резонанса</text>
  </g>
  
  <!-- Дополнительные пояснения -->
  <g transform="translate(20, 300)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#868e96">
      Резонанс - явление резкого увеличения амплитуды колебаний системы при совпадении
    </text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#868e96">
      частоты внешнего воздействия с собственной частотой системы
    </text>
  </g>
</svg>