<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Урок 38</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 38</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>
  <rect x="25" y="90" width="220" height="100" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Сила тяжести</text>
  <line x1="33" y1="110" x2="237" y2="110" stroke="#E0E0E0" stroke-width="1"/>
  <text x="135" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">F = m * g</text>
  <text x="135" y="141" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">g = 9.8 м/с'2</text>
  <text x="135" y="157" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Вес: P = mg</text>
  <text x="135" y="173" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">масса измеряется в кг</text>
  <rect x="255" y="90" width="220" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="365" y="106" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Давление</text>
  <line x1="263" y1="110" x2="467" y2="110" stroke="#E0E0E0" stroke-width="1"/>
  <text x="365" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">p = F / S</text>
  <text x="365" y="141" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Паскаль (Па)</text>
  <text x="365" y="157" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">1 Па = 1 Н/м'2</text>
  <text x="365" y="173" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">F - сила, S - площадь</text>
  <rect x="25" y="200" width="450" height="95" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="250" y="216" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">Закон Ньютона</text>
  <line x1="33" y1="220" x2="467" y2="220" stroke="#E0E0E0" stroke-width="1"/>
  <text x="250" y="235" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">F1 = -F2 (III закон)</text>
  <text x="250" y="251" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">F = ma (II закон)</text>
  <text x="250" y="267" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">a = F/m</text>

  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика - Урок 38</text>
</svg>