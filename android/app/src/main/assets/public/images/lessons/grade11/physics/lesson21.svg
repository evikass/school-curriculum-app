<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">Урок 21: Линзы. Построение изображений</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <rect x="15" y="15" width="35" height="25" fill="#3498db" rx="3"/>
  <text x="32.5" y="32" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">21</text>
  
  <!-- Тонкая линза (собирающая) -->
  <g transform="translate(150, 100)">
    <!-- Ось оптическая -->
    <line x1="-80" y1="50" x2="80" y2="50" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Линза -->
    <path d="M 0 0 Q -20 50 0 100 Q 20 50 0 0" fill="#3498db" fill-opacity="0.3" stroke="#2980b9" stroke-width="2"/>
    
    <!-- Оптический центр -->
    <circle cx="0" cy="50" r="3" fill="#e74c3c"/>
    
    <!-- Фокусы -->
    <circle cx="-30" cy="50" r="2" fill="#e74c3c"/>
    <circle cx="30" cy="50" r="2" fill="#e74c3c"/>
    
    <!-- Фокусные расстояния -->
    <line x1="-30" y1="45" x2="-30" y2="55" stroke="#e74c3c" stroke-width="1"/>
    <line x1="30" y1="45" x2="30" y2="55" stroke="#e74c3c" stroke-width="1"/>
    
    <!-- Объект -->
    <line x1="-50" y1="50" x2="-50" y2="20" stroke="#27ae60" stroke-width="2"/>
    <polygon points="-50,20 -45,25 -55,25" fill="#27ae60"/>
    
    <!-- Изображение -->
    <line x1="50" y1="50" x2="50" y2="5" stroke="#27ae60" stroke-width="2"/>
    <polygon points="50,5 45,10 55,10" fill="#27ae60"/>
    
    <!-- Лучи -->
    <line x1="-50" y1="20" x2="0" y2="20" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,1"/>
    <line x1="0" y1="20" x2="50" y2="5" stroke="#f39c12" stroke-width="1"/>
    
    <line x1="-50" y1="20" x2="-30" y2="50" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,1"/>
    <line x1="-30" y1="50" x2="50" y2="5" stroke="#f39c12" stroke-width="1"/>
    
    <!-- Подписи -->
    <text x="0" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Собирающая линза</text>
    <text x="-50" y="15" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27ae60">Объект</text>
    <text x="50" y="-5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27ae60">Изображение</text>
    <text x="-30" y="45" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">F</text>
    <text x="30" y="45" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#e74c3c">F</text>
  </g>
  
  <!-- Тонкая линза (рассеивающая) -->
  <g transform="translate(350, 100)">
    <!-- Ось оптическая -->
    <line x1="-80" y1="50" x2="80" y2="50" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Линза -->
    <path d="M 0 0 Q 20 50 0 100 Q -20 50 0 0" fill="#e74c3c" fill-opacity="0.3" stroke="#c0392b" stroke-width="2"/>
    
    <!-- Оптический центр -->
    <circle cx="0" cy="50" r="3" fill="#2980b9"/>
    
    <!-- Фокусы -->
    <circle cx="-30" cy="50" r="2" fill="#2980b9"/>
    <circle cx="30" cy="50" r="2" fill="#2980b9"/>
    
    <!-- Фокусные расстояния -->
    <line x1="-30" y1="45" x2="-30" y2="55" stroke="#2980b9" stroke-width="1"/>
    <line x1="30" y1="45" x2="30" y2="55" stroke="#2980b9" stroke-width="1"/>
    
    <!-- Объект -->
    <line x1="-50" y1="50" x2="-50" y2="20" stroke="#27ae60" stroke-width="2"/>
    <polygon points="-50,20 -45,25 -55,25" fill="#27ae60"/>
    
    <!-- Изображение (виртуальное) -->
    <line x1="50" y1="50" x2="50" y2="95" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,1"/>
    <polygon points="50,95 45,90 55,90" fill="#27ae60"/>
    
    <!-- Лучи -->
    <line x1="-50" y1="20" x2="0" y2="20" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,1"/>
    <line x1="0" y1="20" x2="50" y2="95" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,1"/>
    
    <line x1="-50" y1="20" x2="30" y2="50" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,1"/>
    <line x1="30" y1="50" x2="50" y2="95" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,1"/>
    
    <!-- Подписи -->
    <text x="0" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Рассеивающая линза</text>
    <text x="-50" y="15" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27ae60">Объект</text>
    <text x="50" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27ae60">Изображение</text>
    <text x="-30" y="45" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2980b9">F</text>
    <text x="30" y="45" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2980b9">F</text>
  </g>
  
  <!-- Формула тонкой линзы -->
  <g transform="translate(250, 200)">
    <rect x="-80" y="-15" width="160" height="40" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="3"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">1/F = 1/d + 1/f</text>
    <text x="-80" y="35" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">где:</text>
    <text x="-80" y="50" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">F - фокусное расстояние</text>
    <text x="-80" y="65" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">d - расстояние до объекта</text>
    <text x="-80" y="80" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">f - расстояние до изображения</text>
  </g>
  
  <!-- Типы изображений -->
  <g transform="translate(100, 280)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Типы изображений:</text>
    <circle cx="0" cy="15" r="2" fill="#3498db"/>
    <text x="10" y="19" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Действительные</text>
    
    <circle cx="100" cy="15" r="2" fill="#e74c3c"/>
    <text x="110" y="19" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Виртуальные</text>
    
    <circle cx="200" cy="15" r="2" fill="#27ae60"/>
    <text x="210" y="19" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Прямые</text>
    
    <circle cx="280" cy="15" r="2" fill="#f39c12"/>
    <text x="290" y="19" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Перевернутые</text>
  </g>
  
  <!-- Построение изображений - таблица -->
  <g transform="translate(320, 280)">
    <rect x="0" y="0" width="160" height="60" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="3"/>
    <text x="80" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#2c3e50">Построение изображений</text>
    <text x="5" y="30" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">1. Параллельный луч → через фокус</text>
    <text x="5" y="42" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">2. Через оптический центр → без отклонения</text>
    <text x="5" y="54" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">3. Через фокус → параллельно оси</text>
  </g>
  
  <!-- Условия для разных типов изображений -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="120" height="40" fill="#e8f6f3" stroke="#27ae60" stroke-width="1" rx="3"/>
    <text x="60" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#27ae60">Собирающая линза</text>
    <text x="60" y="28" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#27ae60">d > F: действительное</text>
    <text x="60" y="38" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#27ae60">d < F: виртуальное</text>
  </g>
</svg>