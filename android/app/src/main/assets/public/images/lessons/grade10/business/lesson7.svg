<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="500" height="32" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Продвижение</text>
  <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE082">Бизнес — Урок 7</text>

  <!-- Lesson number badge -->
  <circle cx="30" cy="26" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="30" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">7</text>

  <!-- Section: Каналы продвижения -->
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Каналы продвижения</text>
  <rect x="20" y="65" width="105" height="55" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="20" y="65" width="105" height="18" rx="8" ry="8" fill="#FFB300" opacity="0.2"/>
  <rect x="20" y="75" width="105" height="8" fill="#FFB300" opacity="0.2"/>
  <text x="72" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FF6F00">SMM</text>
  <text x="72" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Соцсети,</text>
  <text x="72" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">контент,</text>
  <text x="72" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">вовлечение</text>
  <rect x="137" y="65" width="105" height="55" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="137" y="65" width="105" height="18" rx="8" ry="8" fill="#FFB300" opacity="0.2"/>
  <rect x="137" y="75" width="105" height="8" fill="#FFB300" opacity="0.2"/>
  <text x="189" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FF6F00">SEO/SEM</text>
  <text x="189" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Поисковая</text>
  <text x="189" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">оптимизация,</text>
  <text x="189" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">реклама</text>
  <rect x="20" y="128" width="105" height="55" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="20" y="128" width="105" height="18" rx="8" ry="8" fill="#FFB300" opacity="0.2"/>
  <rect x="20" y="138" width="105" height="8" fill="#FFB300" opacity="0.2"/>
  <text x="72" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FF6F00">PR</text>
  <text x="72" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Статьи,</text>
  <text x="72" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">интервью,</text>
  <text x="72" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">мероприятия</text>
  <rect x="137" y="128" width="105" height="55" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="137" y="128" width="105" height="18" rx="8" ry="8" fill="#FFB300" opacity="0.2"/>
  <rect x="137" y="138" width="105" height="8" fill="#FFB300" opacity="0.2"/>
  <text x="189" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FF6F00">Реферали</text>
  <text x="189" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Сарафанное</text>
  <text x="189" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">радио,</text>
  <text x="189" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">партнёрства</text>
  <!-- Section: Воронка продаж -->
  <text x="20" y="195" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Воронка продаж</text>
  <rect x="144" y="203" width="252" height="22" rx="4" ry="4" fill="#FF6F00" opacity="0.15"/>
  <text x="270" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Осведомлённость</text>
  <rect x="172" y="228" width="196" height="22" rx="4" ry="4" fill="#FF6F00" opacity="0.27"/>
  <text x="270" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">Интерес</text>
  <rect x="207" y="253" width="126" height="22" rx="4" ry="4" fill="#FF6F00" opacity="0.39"/>
  <text x="270" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">Желание</text>
  <rect x="235" y="278" width="70" height="22" rx="4" ry="4" fill="#FF6F00" opacity="0.51"/>
  <text x="270" y="293" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">Действие</text>
  <!-- Tip -->
  <rect x="15" y="325" width="470" height="18" rx="9" ry="9" fill="#FF6F00" opacity="0.1"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-style="italic" fill="#3E2723">Совет: Измеряй каждый канал. Отключай то, что не работает, усиливай то, что приносит клиентов!</text>

  <!-- Footer -->
  <line x1="20" y1="343" x2="480" y2="343" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" opacity="0.7">Бизнес · 10 класс</text>
</svg>