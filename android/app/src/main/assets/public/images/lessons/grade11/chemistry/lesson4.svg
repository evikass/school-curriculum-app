    <text x="367" y="104" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">РНК (RNA)</text>
    <text x="367" y="122" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Рибонуклеиновая</text>
    <text x="367" y="136" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Сахар: рибоза</text>
    <text x="367" y="150" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Основания: A, U, G, C</text>
