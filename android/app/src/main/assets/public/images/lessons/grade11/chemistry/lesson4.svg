    <text x="367" y="178" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="normal">U вместо T</text>
    <text x="367" y="192" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="normal">иРНК, тРНК, рРНК</text>
    <rect x="25" y="215" width="450" height="82" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="250" y="233" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Структура нуклеотида</text>
    <rect x="60" y="248" width="90" height="30" fill="#FFCDD2" rx="4" stroke="#E53935" stroke-width="1" />
    <text x="105" y="268" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="normal">Фосфат</text>
    <text x="165" y="268" font-family="Arial,sans-serif" font-size="14" fill="#333333" text-anchor="middle" font-weight="normal">—</text>
    <rect x="185" y="248" width="90" height="30" fill="#C8E6C9" rx="4" stroke="#2E7D32" stroke-width="1" />
    <text x="230" y="268" font-family="Arial,sans-serif" font-size="11" fill="#1B5E20" text-anchor="middle" font-weight="normal">Сахар</text>
    <text x="290" y="268" font-family="Arial,sans-serif" font-size="14" fill="#333333" text-anchor="middle" font-weight="normal">—</text>
    <rect x="310" y="248" width="110" height="30" fill="#BBDEFB" rx="4" stroke="#1565C0" stroke-width="1" />
    <text x="365" y="268" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="normal">Азот. основание</text>
    <text x="250" y="292" font-family="Arial,sans-serif" font-size="10" fill="#777777" text-anchor="middle" font-weight="normal">Правило Чаргаффа: [A]=[T], [G]=[C] (в ДНК)</text>
  </g>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#777777" text-anchor="middle">Химия · 11 класс</text>
