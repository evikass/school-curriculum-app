  </defs>
  <g clip-path="url(#ill)">
    <rect x="15" y="80" width="470" height="225" fill="#F1F8E9" rx="6" opacity="0.5" />
    <rect x="25" y="88" width="215" height="120" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="132" y="104" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">ДНК (DNA)</text>
    <text x="132" y="122" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Дезоксирибонуклеиновая</text>
    <text x="132" y="136" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Сахар: дезоксирибоза</text>
    <text x="132" y="150" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Основания: A, T, G, C</text>
    <text x="132" y="164" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Двойная спираль</text>
