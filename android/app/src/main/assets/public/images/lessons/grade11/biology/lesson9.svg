<rect x="30" y="240" width="440" height="55" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="254" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ароморфоз: повышение организации (теплокровность, хлорофилл)</text>
<text x="250" y="265" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Идиоадаптация: частные приспособления без повышения организации</text>
<text x="250" y="276" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Дегенерация: утрата органов при паразитическом образе жизни</text>
<text x="250" y="287" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Правило Ч. Дарвина: дивергенция — расхождение признаков у потомков</text>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#2E7D32" opacity="0.85"/>
