    <line x1="-1" y1="-18" x2="5" y2="-18" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- Seat -->
    <line x1="0" y1="-12" x2="0" y2="-18" stroke="#2E7D32" stroke-width="1"/>
    <line x1="-3" y1="-18" x2="3" y2="-18" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- Pedals -->
