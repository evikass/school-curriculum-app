  <circle cx="431" cy="258" r="2.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="431" y1="258" x2="431" y2="248" stroke="#B3E5FC" stroke-width="2" stroke-linecap="round"/>
  <line x1="431" y1="258" x2="439" y2="262" stroke="#B3E5FC" stroke-width="2" stroke-linecap="round"/>
  <line x1="431" y1="258" x2="423" y2="262" stroke="#B3E5FC" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Green hills -->
  <path d="M325,287 Q350,270 375,287 Q400,272 425,287 Q445,278 470,287" fill="#A5D6A7" opacity="0.5"/>
  
  <!-- Sun -->
  <circle cx="455" cy="240" r="8" fill="#F9A825" opacity="0.6"/>
  <line x1="455" y1="229" x2="455" y2="231" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="466" y1="240" x2="464" y2="240" stroke="#F9A825" stroke-width="1.5"/>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Зелёные технологии</text>
</svg>