  <rect x="260" y="195" width="14" height="14" fill="#B3E5FC" stroke="#43A047" stroke-width="0.5"/>
  <rect x="220" y="220" width="14" height="14" fill="#B3E5FC" stroke="#43A047" stroke-width="0.5"/>
  <rect x="240" y="220" width="14" height="14" fill="#B3E5FC" stroke="#43A047" stroke-width="0.5"/>
  <rect x="260" y="220" width="14" height="14" fill="#B3E5FC" stroke="#43A047" stroke-width="0.5"/>
  
