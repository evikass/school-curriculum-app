  <text x="397" y="243" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#43A047" text-anchor="middle">ВОЗОБНОВЛЯЕМАЯ ЭНЕРГИЯ</text>
  
  <!-- Small wind turbines -->
  <!-- Turbine 1 -->
  <rect x="355" y="252" width="3" height="35" fill="#757575"/>
  <circle cx="356" cy="252" r="3" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="356" y1="252" x2="356" y2="238" stroke="#B3E5FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="356" y1="252" x2="367" y2="258" stroke="#B3E5FC" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="356" y1="252" x2="345" y2="258" stroke="#B3E5FC" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Turbine 2 (bigger, behind) -->
  <rect x="390" y="245" width="4" height="42" fill="#757575"/>
  <circle cx="392" cy="245" r="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="392" y1="245" x2="392" y2="228" stroke="#B3E5FC" stroke-width="3" stroke-linecap="round"/>
  <line x1="392" y1="245" x2="406" y2="252" stroke="#B3E5FC" stroke-width="3" stroke-linecap="round"/>
  <line x1="392" y1="245" x2="378" y2="252" stroke="#B3E5FC" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Turbine 3 (smaller, far) -->
