  <circle cx="212" cy="198" r="3" fill="#43A047"/>
  <circle cx="212" cy="208" r="3" fill="#66BB6A"/>
  <circle cx="212" cy="218" r="3" fill="#43A047"/>
  <circle cx="212" cy="228" r="3" fill="#81C784"/>
  <circle cx="212" cy="238" r="3" fill="#43A047"/>
  
