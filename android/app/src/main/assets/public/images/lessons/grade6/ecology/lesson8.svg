    <line x1="0" y1="0" x2="8" y2="-5" stroke="#757575" stroke-width="1"/>
  </g>
  
  <text x="410" y="180" font-family="Arial,sans-serif" font-size="7" fill="#43A047" font-weight="bold">ЭЛЕКТРО</text>
  <text x="410" y="200" font-family="Arial,sans-serif" font-size="7" fill="#43A047" font-weight="bold">ВЕЛОСИПЕД</text>

  <!-- Right bottom: Wind turbines background -->
