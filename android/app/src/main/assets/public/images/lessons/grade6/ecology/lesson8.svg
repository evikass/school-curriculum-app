    <line x1="0" y1="-12" x2="15" y2="0" stroke="#2E7D32" stroke-width="1.5"/>
    <line x1="0" y1="-12" x2="5" y2="-12" stroke="#2E7D32" stroke-width="1.5"/>
    <line x1="5" y1="-12" x2="15" y2="0" stroke="#2E7D32" stroke-width="1"/>
    <!-- Handlebar -->
