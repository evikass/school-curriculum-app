<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Перекрёстная эластичность</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 7</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">7</text>
  <rect x="20" y="72" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Формула перекрёстной эластичности</text>
  <text x="28" y="100" class="box-text">Exy = (ΔQx/Qx) / (ΔPy/Py) = (ΔQx/ΔPy) · (Py/Qx)</text>
  <text x="28" y="113" class="box-text">Показывает, как изменится спрос на X при изменении цены Y</text>
  <rect x="20" y="142" width="145" height="75" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="142" x2="159" y2="142" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="156" class="box-title">Субституты</text>
  <text x="28" y="170" class="box-text">Exy &gt; 0</text>
  <text x="28" y="183" class="box-text">Pчай↑ → Qкофе↑</text>
  <text x="28" y="196" class="box-text">Прямая связь</text>
  <text x="28" y="209" class="box-text">Чай ↔ Кофе</text>
  <rect x="175" y="142" width="145" height="75" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="181" y1="142" x2="314" y2="142" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="183" y="156" class="box-title">Комплементы</text>
  <text x="183" y="170" class="box-text">Exy &lt; 0</text>
  <text x="183" y="183" class="box-text">Pбензин↑ → Qавто↓</text>
  <text x="183" y="196" class="box-text">Обратная связь</text>
  <text x="183" y="209" class="box-text">Бензин ↔ Авто</text>
  <rect x="330" y="142" width="150" height="75" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="336" y1="142" x2="474" y2="142" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="338" y="156" class="box-title">Независимые</text>
  <text x="338" y="170" class="box-text">Exy = 0</text>
  <text x="338" y="183" class="box-text">Изменение Py</text>
  <text x="338" y="196" class="box-text">не влияет на Qx</text>
  <text x="338" y="209" class="box-text">Хлеб ↔ Обувь</text>
  <rect x="20" y="232" width="460" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="232" x2="474" y2="232" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="246" class="box-title">Применение на практике</text>
  <text x="28" y="260" class="box-text">• Антимонопольная политика: высокий Exy → товары в одной группе</text>
  <text x="28" y="273" class="box-text">• Ценообразование: замещающие товары требуют согласования цен</text>
  <text x="28" y="286" class="box-text">• Прогнозирование: рост цен на сырьё → прогноз спроса на готовую продукцию</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>