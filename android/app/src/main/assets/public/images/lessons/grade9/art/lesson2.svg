<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#EC407A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#EC407A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 2. Архитектура и дизайн</text>
  <rect x="15" y="60" width="230" height="140" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#EC407A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#EC407A"/>
  <text x="130" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Стили архитектуры</text>
  <polygon points="50,98 90,85 130,98" fill="#FCE4EC" stroke="#EC407A" stroke-width="1.5"/>
  <rect x="58" y="98" width="4" height="18" fill="#EC407A" opacity="0.6"/>
  <rect x="73" y="98" width="4" height="18" fill="#EC407A" opacity="0.6"/>
  <rect x="88" y="98" width="4" height="18" fill="#EC407A" opacity="0.6"/>
  <rect x="103" y="98" width="4" height="18" fill="#EC407A" opacity="0.6"/>
  <rect x="118" y="98" width="4" height="18" fill="#EC407A" opacity="0.6"/>
  <rect x="50" y="116" width="80" height="4" fill="#EC407A" opacity="0.4"/>
  <text x="145" y="95" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Античность — ордер, колонны</text>
  <text x="145" y="108" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Романский — арки, своды</text>
  <text x="145" y="121" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Готика — витражи, шпили</text>
  <text x="25" y="138" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Ренессанс — гармония, пропорции</text>
  <text x="25" y="151" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Барокко — пышность, динамика</text>
  <text x="25" y="164" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Классицизм — строгость, порядок</text>
  <text x="25" y="177" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Модерн — плавность, растит.</text>
  <text x="25" y="190" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Конструктивизм — функция</text>
  <rect x="255" y="60" width="230" height="140" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#EC407A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#EC407A"/>
  <text x="370" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Принципы дизайна</text>
  <text x="265" y="95" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Единство и целостность</text>
  <text x="265" y="108" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Баланс (симметрия / асимметрия)</text>
  <text x="265" y="121" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Пропорции и масштабность</text>
  <text x="265" y="134" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Ритм и повтор элементов</text>
  <text x="265" y="147" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Контраст и нюанс</text>
  <text x="265" y="160" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Доминанта — главный акцент</text>
  <text x="265" y="173" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Функциональность формы</text>
  <text x="265" y="186" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Иерархия визуальных элементов</text>
  <text x="265" y="199" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Стилевое единство</text>
  <rect x="15" y="210" width="230" height="120" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="210" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="15" y="227" width="230" height="8" fill="#AD1457"/>
  <text x="130" y="227" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Элементы архитектуры</text>
  <text x="25" y="245" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Фундамент, стены, перекрытия</text>
  <text x="25" y="258" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Колонны, пилястры, капители</text>
  <text x="25" y="271" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Арки, своды, купола, нефы</text>
  <text x="25" y="284" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Фасад, портик, фронтон</text>
  <text x="25" y="297" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Карниз, антаблемент, база</text>
  <text x="25" y="310" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Витражи, розы, контрфорсы</text>
  <text x="25" y="323" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Портал, апсида, трансепт</text>
  <rect x="255" y="210" width="230" height="120" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="210" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="255" y="227" width="230" height="8" fill="#AD1457"/>
  <text x="370" y="227" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Виды дизайна</text>
  <text x="265" y="245" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Промышленный (предметный)</text>
  <text x="265" y="258" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Графический дизайн</text>
  <text x="265" y="271" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Интерьерный дизайн</text>
  <text x="265" y="284" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Ландшафтный дизайн</text>
  <text x="265" y="297" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Дизайн одежды и текстиля</text>
  <text x="265" y="310" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Веб-дизайн, UX/UI</text>
  <text x="265" y="323" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Средовой дизайн</text>
</svg>