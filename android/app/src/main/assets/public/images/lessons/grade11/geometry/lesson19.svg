<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#3a5f8a" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#7a9fb8" stroke-width="1" rx="3"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3a5f8a" font-weight="bold">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <rect x="460" y="15" width="30" height="20" fill="#7a9fb8" rx="3"/>
  <text x="475" y="29" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">19</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" font-weight="bold">Площади поверхностей тел вращения</text>
  
  <!-- Определения -->
  <rect x="20" y="70" width="220" height="120" fill="#e8f4f8" stroke="#7a9fb8" stroke-width="1" rx="5"/>
  <text x="30" y="90" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Определения:</text>
  <text x="30" y="110" font-family="Arial, sans-serif" font-size="12" fill="#34495e">S_бок - боковая поверхность</text>
  <text x="30" y="130" font-family="Arial, sans-serif" font-size="12" fill="#34495e">S_полн - полная поверхность</text>
  <text x="30" y="150" font-family="Arial, sans-serif" font-size="12" fill="#34495e">S_полн = S_бок + 2S_основ</text>
  <text x="30" y="170" font-family="Arial, sans-serif" font-size="12" fill="#34495e">r - радиус, h - высота, l - образующая</text>
  
  <!-- Цилиндр -->
  <g transform="translate(260, 120)">
    <!-- Тело цилиндра -->
    <ellipse cx="50" cy="0" rx="40" ry="10" fill="#a8d8ea" stroke="#3a5f8a" stroke-width="1.5"/>
    <rect x="10" y="0" width="80" height="60" fill="#a8d8ea" stroke="#3a5f8a" stroke-width="1.5"/>
    <ellipse cx="50" cy="60" rx="40" ry="10" fill="#a8d8ea" stroke="#3a5f8a" stroke-width="1.5"/>
    <line x1="10" y1="0" x2="10" y2="60" stroke="#3a5f8a" stroke-width="1.5"/>
    <line x1="90" y1="0" x2="90" y2="60" stroke="#3a5f8a" stroke-width="1.5"/>
    
    <!-- Радиус и высота -->
    <line x1="50" y1="0" x2="50" y2="60" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="2,2"/>
    <line x1="50" y1="30" x2="90" y2="30" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">r</text>
    <text x="75" y="25" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">h</text>
    
    <!-- Подпись -->
    <text x="50" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Цилиндр</text>
  </g>
  
  <!-- Формула для цилиндра -->
  <rect x="260" y="230" width="180" height="60" fill="#f5f5f5" stroke="#7a9fb8" stroke-width="1" rx="5"/>
  <text x="350" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Цилиндр:</text>
  <text x="350" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">S_бок = 2πrh</text>
  <text x="350" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">S_полн = 2πr(r + h)</text>
  
  <!-- Конус -->
  <g transform="translate(80, 220)">
    <!-- Тело конуса -->
    <ellipse cx="30" cy="40" rx="30" ry="8" fill="#ffd6a5" stroke="#e67e22" stroke-width="1.5"/>
    <path d="M0,40 L30,0 L60,40 Z" fill="#ffd6a5" stroke="#e67e22" stroke-width="1.5"/>
    <line x1="0" y1="40" x2="60" y2="40" stroke="#e67e22" stroke-width="1.5"/>
    
    <!-- Радиус, высота, образующая -->
    <line x1="30" y1="40" x2="30" y2="0" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="2,2"/>
    <line x1="30" y1="40" x2="60" y2="40" stroke="#e74c3c" stroke-width="1.5"/>
    <line x1="30" y1="40" x2="55" y2="25" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="2,2"/>
    <text x="35" y="20" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">h</text>
    <text x="45" y="45" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">r</text>
    <text x="40" y="30" font-family="Arial, sans-serif" font-size="10" fill="#9b59b6">l</text>
    
    <!-- Подпись -->
    <text x="30" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Конус</text>
  </g>
  
  <!-- Формула для конуса -->
  <rect x="50" y="300" width="140" height="50" fill="#f5f5f5" stroke="#7a9fb8" stroke-width="1" rx="5"/>
  <text x="120" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Конус:</text>
  <text x="120" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">S_бок = πrl</text>
  
  <!-- Шар -->
  <g transform="translate(260, 240)">
    <!-- Тело шара -->
    <circle cx="50" cy="40" r="40" fill="#c7ecee" stroke="#3a5f8a" stroke-width="1.5"/>
    <ellipse cx="50" cy="40" rx="40" ry="15" fill="none" stroke="#3a5f8a" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="10" y1="40" x2="90" y2="40" stroke="#3a5f8a" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="80" stroke="#3a5f8a" stroke-width="1"/>
    
    <!-- Радиус -->
    <line x1="50" y1="40" x2="90" y2="40" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="65" y="35" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">r</text>
    
    <!-- Подпись -->
    <text x="50" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Шар</text>
  </g>
  
  <!-- Формула для шара -->
  <rect x="260" y="350" width="180" height="50" fill="#f5f5f5" stroke="#7a9fb8" stroke-width="1" rx="5"/>
  <text x="350" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Шар:</text>
  <text x="350" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">S_полн = 4πr²</text>
  
  <!-- Тора (бублик) -->
  <g transform="translate(420, 200)">
    <!-- Тело тора -->
    <ellipse cx="30" cy="30" rx="45" ry="15" fill="#d4e6f1" stroke="#3a5f8a" stroke-width="1.5"/>
    <ellipse cx="30" cy="30" rx="15" ry="45" fill="#d4e6f1" stroke="#3a5f8a" stroke-width="1.5"/>
    <ellipse cx="30" cy="30" rx="45" ry="15" fill="none" stroke="#3a5f8a" stroke-width="1.5"/>
    <ellipse cx="30" cy="30" rx="15" ry="45" fill="none" stroke="#3a5f8a" stroke-width="1.5"/>
    
    <!-- Радиусы -->
    <line x1="30" y1="30" x2="60" y2="30" stroke="#e74c3c" stroke-width="1.5"/>
    <line x1="30" y1="30" x2="45" y2="60" stroke="#9b59b6" stroke-width="1.5" stroke-dasharray="2,2"/>
    <text x="45" y="25" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">R</text>
    <text x="35" y="50" font-family="Arial, sans-serif" font-size="10" fill="#9b59b6">r</text>
    
    <!-- Подпись -->
    <text x="30" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Тор</text>
  </g>
  
  <!-- Формула для тора -->
  <rect x="350" y="310" width="140" height="50" fill="#f5f5f5" stroke="#7a9fb8" stroke-width="1" rx="5"/>
  <text x="420" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Тор:</text>
  <text x="420" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">S_полн = 4π²Rr</text>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8d8ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a9fb8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd6a5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Дополнительные элементы -->
  <circle cx="30" cy="30" r="5" fill="#e74c3c"/>
  <circle cx="470" cy="30" r="5" fill="#e74c3c"/>
  <circle cx="30" cy="320" r="5" fill="#e74c3c"/>
  <circle cx="470" cy="320" r="5" fill="#e74c3c"/>
</svg>