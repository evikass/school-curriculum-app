<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#e74c3c" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">АНГЛИЙСКИЙ · 10 КЛАСС</text>
  <text x="250" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c3e50">Урок 8: Reading Strategies</text>
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3498db">#8</text>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad3">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Стратегии чтения -->
  <rect x="30" y="85" width="210" height="250" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="5"/>
  <text x="135" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Стратегии чтения</text>
  
  <!-- Skimming -->
  <rect x="45" y="125" width="180" height="45" fill="#3498db" rx="5"/>
  <text x="135" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Skimming</text>
  <text x="135" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Просмотр текста</text>
  <path d="M60 152 L80 142 L80 162 Z" fill="white"/>
  <path d="M210 152 L230 142 L230 162 Z" fill="white"/>
  
  <!-- Scanning -->
  <rect x="45" y="180" width="180" height="45" fill="#e74c3c" rx="5"/>
  <text x="135" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Scanning</text>
  <text x="135" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Поиск информации</text>
  <line x1="60" y1="202" x2="80" y2="202" stroke="white" stroke-width="2"/>
  <line x1="60" y1="207" x2="80" y2="207" stroke="white" stroke-width="2"/>
  <line x1="60" y1="212" x2="80" y2="212" stroke="white" stroke-width="2"/>
  <line x1="210" y1="202" x2="230" y2="202" stroke="white" stroke-width="2"/>
  <line x1="210" y1="207" x2="230" y2="207" stroke="white" stroke-width="2"/>
  <line x1="210" y1="212" x2="230" y2="212" stroke="white" stroke-width="2"/>
  
  <!-- Intensive Reading -->
  <rect x="45" y="235" width="180" height="45" fill="#9b59b6" rx="5"/>
  <text x="135" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Intensive Reading</text>
  <text x="135" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Детальное чтение</text>
  <circle cx="70" cy="257" r="3" fill="white"/>
  <circle cx="220" cy="257" r="3" fill="white"/>
  
  <!-- Extensive Reading -->
  <rect x="45" y="290" width="180" height="35" fill="#f39c12" rx="5"/>
  <text x="135" y="307" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Extensive Reading</text>
  <text x="135" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Широкое чтение</text>
  
  <!-- Практические техники -->
  <rect x="260" y="85" width="210" height="250" fill="#ecf0f1" stroke="#34495e" stroke-width="2" rx="5"/>
  <text x="365" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Практические техники</text>
  
  <!-- Техника 1 -->
  <rect x="275" y="125" width="180" height="40" fill="url(#grad1)" rx="5"/>
  <text x="365" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Заголовки и подзаголовки</text>
  <text x="365" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Анализ структуры</text>
  
  <!-- Техника 2 -->
  <rect x="275" y="175" width="180" height="40" fill="url(#grad2)" rx="5"/>
  <text x="365" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Ключевые слова</text>
  <text x="365" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Выделение важного</text>
  
  <!-- Техника 3 -->
  <rect x="275" y="225" width="180" height="40" fill="url(#grad3)" rx="5"/>
  <text x="365" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Вопросы к тексту</text>
  <text x="365" y="257" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Понимание содержания</text>
  
  <!-- Техника 4 -->
  <rect x="275" y="275" width="180" height="35" fill="#1abc9c" rx="5"/>
  <text x="365" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Резюмирование</text>
  <text x="365" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Краткое изложение</text>
  
  <!-- Стрелки между секциями -->
  <path d="M245 157 L260 157" stroke="#3498db" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M245 202 L260 202" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M245 257 L260 257" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M245 307 L260 307" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
  </defs>
  
  <!-- Иконка книги -->
  <rect x="225" y="170" width="20" height="25" fill="#3498db" rx="2"/>
  <rect x="227" y="172" width="16" height="21" fill="white"/>
  <line x1="230" y1="175" x2="240" y2="175" stroke="#3498db" stroke-width="1"/>
  <line x1="230" y1="179" x2="240" y2="179" stroke="#3498db" stroke-width="1"/>
  <line x1="230" y1="183" x2="240" y2="183" stroke="#3498db" stroke-width="1"/>
  <line x1="230" y1="187" x2="235" y2="187" stroke="#3498db" stroke-width="1"/>
  
  <!-- Формула скорости чтения -->
  <rect x="30" y="70" width="440" height="12" fill="#34495e" rx="3"/>
  <text x="250" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Скорость чтения (слов/мин) = Количество слов / Время чтения (мин)</text>
  
  <!-- График эффективности -->
  <text x="135" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Эффективность</text>
  <text x="365" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Практическое применение</text>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="340" r="3" fill="#3498db"/>
  <circle cx="35" cy="340" r="3" fill="#e74c3c"/>
  <circle cx="40" cy="340" r="3" fill="#f39c12"/>
  <circle cx="45" cy="340" r="3" fill="#9b59b6"/>
  <circle cx="460" cy="340" r="3" fill="#3498db"/>
  <circle cx="455" cy="340" r="3" fill="#e74c3c"/>
  <circle cx="450" cy="340" r="3" fill="#f39c12"/>
  <circle cx="445" cy="340" r="3" fill="#9b59b6"/>
</svg>