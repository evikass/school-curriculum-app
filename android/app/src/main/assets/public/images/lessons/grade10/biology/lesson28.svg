<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Хромосомная теория</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 25</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Chromosome with genes -->
    <text x="250" y="103" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сцепление генов (Морган)</text>
    
    <!-- Chromosome pair -->
    <rect x="60" y="115" width="20" height="80" rx="10" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
    <rect x="85" y="115" width="20" height="80" rx="10" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
    <!-- Gene markers -->
    <circle cx="70" cy="135" r="6" fill="#FFEE58" stroke="#F9A825" stroke-width="1"/>
    <text x="70" y="138" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">A</text>
    <circle cx="95" cy="135" r="6" fill="#FFEE58" stroke="#F9A825" stroke-width="1"/>
    <text x="95" y="138" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">a</text>
    <circle cx="70" cy="170" r="6" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1"/>
    <text x="70" y="173" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">B</text>
    <circle cx="95" cy="170" r="6" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1"/>
    <text x="95" y="173" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">b</text>
    
    <text x="80" y="210" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Гены в одной</text>
    <text x="80" y="222" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">хромосоме</text>
    
    <!-- Crossing over -->
    <text x="200" y="140" font-family="Arial,sans-serif" font-size="10" fill="#FF7043" text-anchor="middle">&#x2192;</text>
    
    <!-- Crossing over diagram -->
    <rect x="220" y="115" width="20" height="80" rx="10" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
    <rect x="245" y="115" width="20" height="80" rx="10" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
    <!-- Cross -->
    <line x1="240" y1="160" x2="245" y2="165" stroke="#FF7043" stroke-width="2"/>
    <line x1="245" y1="160" x2="240" y2="165" stroke="#FF7043" stroke-width="2"/>
    <!-- Swapped genes -->
    <circle cx="230" cy="135" r="6" fill="#FFEE58" stroke="#F9A825" stroke-width="1"/>
    <text x="230" y="138" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">A</text>
    <circle cx="255" cy="135" r="6" fill="#FFEE58" stroke="#F9A825" stroke-width="1"/>
    <text x="255" y="138" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">a</text>
    <circle cx="230" cy="170" r="6" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1"/>
    <text x="230" y="173" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">b</text>
    <circle cx="255" cy="170" r="6" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1"/>
    <text x="255" y="173" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">B</text>
    
    <text x="245" y="210" font-family="Arial,sans-serif" font-size="8" fill="#FF7043" text-anchor="middle">Кроссинговер!</text>
    <text x="245" y="222" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Обмен участками</text>
    
    <!-- Results -->
    <rect x="340" y="115" width="135" height="125" rx="5" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="407" y="132" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Результат</text>
    <text x="407" y="150" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Некроссоверы:</text>
    <text x="407" y="163" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">AB и ab (большинство)</text>
    <text x="407" y="183" font-family="Arial,sans-serif" font-size="8" fill="#FF7043" text-anchor="middle">Кроссоверы:</text>
    <text x="407" y="196" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Ab и aB (меньшинство)</text>
    <text x="407" y="220" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Дальше гены &#x2192;</text>
    <text x="407" y="232" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">больше кроссинговер</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Сцепление генов и кроссинговер</text>
</svg>