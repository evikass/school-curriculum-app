<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 1:  Приветствие</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Greetings</text>

  
  <!-- Left person silhouette -->
  <circle cx="160" cy="170" r="22" fill="#2B4C7E"/>
  <rect x="145" y="195" width="30" height="50" rx="5" fill="#2B4C7E"/>
  <!-- Right person silhouette -->
  <circle cx="340" cy="170" r="22" fill="#C41E3A"/>
  <rect x="325" y="195" width="30" height="50" rx="5" fill="#C41E3A"/>
  <!-- Speech bubbles -->
  <ellipse cx="215" cy="120" rx="60" ry="28" fill="#FFFFFF" stroke="#C41E3A" stroke-width="2"/>
  <polygon points="195,145 205,145 185,160" fill="#FFFFFF" stroke="#C41E3A" stroke-width="2"/>
  <text x="215" y="125" font-family="Arial" font-size="16" font-weight="bold" fill="#C41E3A" text-anchor="middle">Hello!</text>
  <ellipse cx="290" cy="110" rx="55" ry="25" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="2"/>
  <polygon points="305,132 295,132 315,148" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="2"/>
  <text x="290" y="115" font-family="Arial" font-size="16" font-weight="bold" fill="#2B4C7E" text-anchor="middle">Hi!</text>
  <!-- Bottom speech -->
  <ellipse cx="250" cy="280" rx="80" ry="22" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="1.5"/>
  <text x="250" y="285" font-family="Arial" font-size="14" fill="#1a1a1a" text-anchor="middle">Goodbye! See you!</text>
  <!-- Small waves -->
  <path d="M130 165 Q140 155 150 165" fill="none" stroke="#D4A843" stroke-width="2"/>
  <path d="M350 165 Q360 155 370 165" fill="none" stroke="#D4A843" stroke-width="2"/>
  <!-- Decorative lines -->
  <line x1="40" y1="90" x2="100" y2="90" stroke="#C41E3A" stroke-width="1" opacity="0.3"/>
  <line x1="400" y1="90" x2="460" y2="90" stroke="#2B4C7E" stroke-width="1" opacity="0.3"/>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>