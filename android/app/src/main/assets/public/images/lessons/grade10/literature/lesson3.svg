<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dcc6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="portraitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c4b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a89b8d;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c4b5a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b7355;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="4" rx="5" ry="5" />
  <rect x="20" y="20" width="460" height="310" fill="none" stroke="#8b7355" stroke-width="1" stroke-dasharray="3,3" opacity="0.5" />
  
  <!-- Заголовок класса -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="14" fill="#5d4e37" text-anchor="middle" font-weight="bold">ЛИТЕРАТУРА · 10 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="470" y="40" font-family="Arial, sans-serif" font-size="12" fill="#5d4e37" text-anchor="end">Урок 15</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="20" fill="#3e2723" text-anchor="middle" font-weight="bold">Николай Васильевич Гоголь</text>
  <text x="250" y="85" font-family="Arial, sans-serif" font-size="14" fill="#5d4e37" text-anchor="middle">(1809-1852)</text>
  
  <!-- Портрет Гоголя -->
  <ellipse cx="100" cy="160" rx="60" ry="80" fill="url(#portraitGradient)" />
  <ellipse cx="100" cy="140" rx="40" ry="45" fill="url(#portraitGradient)" />
  <rect x="70" y="155" width="60" height="50" fill="url(#portraitGradient)" rx="10" ry="10" />
  <path d="M 70 155 Q 100 140 130 155" fill="none" stroke="#3e2723" stroke-width="2" />
  <circle cx="85" cy="135" r="3" fill="#3e2723" />
  <circle cx="115" cy="135" r="3" fill="#3e2723" />
  <path d="M 90 150 Q 100 155 110 150" fill="none" stroke="#3e2723" stroke-width="1.5" />
  <path d="M 70 130 Q 100 125 130 130" fill="none" stroke="#3e2723" stroke-width="2" />
  <path d="M 75 170 L 80 175 M 80 175 L 85 170 M 115 170 L 120 175 M 120 175 L 125 170" stroke="#3e2723" stroke-width="1.5" />
  <text x="100" y="260" font-family="Arial, sans-serif" font-size="12" fill="#5d4e37" text-anchor="middle">Портрет Гоголя</text>
  
  <!-- Основные произведения -->
  <text x="250" y="110" font-family="Arial, sans-serif" font-size="14" fill="#5d4e37" text-anchor="middle" font-weight="bold">Основные произведения</text>
  
  <!-- "Мёртвые души" -->
  <rect x="180" y="120" width="140" height="30" fill="#d7ccc8" stroke="#5d4e37" stroke-width="1" rx="3" ry="3" />
  <text x="250" y="140" font-family="Arial, sans-serif" font-size="12" fill="#3e2723" text-anchor="middle">"Мёртвые души"</text>
  <text x="250" y="155" font-family="Arial, sans-serif" font-size="10" fill="#5d4e37" text-anchor="middle">поэма-роман</text>
  
  <!-- "Ревизор" -->
  <rect x="180" y="160" width="140" height="30" fill="#d7ccc8" stroke="#5d4e37" stroke-width="1" rx="3" ry="3" />
  <text x="250" y="180" font-family="Arial, sans-serif" font-size="12" fill="#3e2723" text-anchor="middle">"Ревизор"</text>
  <text x="250" y="195" font-family="Arial, sans-serif" font-size="10" fill="#5d4e37" text-anchor="middle">комедия</text>
  
  <!-- "Шинель" -->
  <rect x="180" y="200" width="140" height="30" fill="#d7ccc8" stroke="#5d4e37" stroke-width="1" rx="3" ry="3" />
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="12" fill="#3e2723" text-anchor="middle">"Шинель"</text>
  <text x="250" y="235" font-family="Arial, sans-serif" font-size="10" fill="#5d4e37" text-anchor="middle">повесть</text>
  
  <!-- "Тарас Бульба" -->
  <rect x="180" y="240" width="140" height="30" fill="#d7ccc8" stroke="#5d4e37" stroke-width="1" rx="3" ry="3" />
  <text x="250" y="260" font-family="Arial, sans-serif" font-size="12" fill="#3e2723" text-anchor="middle">"Тарас Бульба"</text>
  <text x="250" y="275" font-family="Arial, sans-serif" font-size="10" fill="#5d4e37" text-anchor="middle">повесть</text>
  
  <!-- Тема "маленького человека" -->
  <text x="380" y="110" font-family="Arial, sans-serif" font-size="14" fill="#5d4e37" text-anchor="middle" font-weight="bold">Тема "маленького человека"</text>
  
  <!-- Схема "маленького человека" -->
  <rect x="340" y="125" width="80" height="100" fill="#efebe9" stroke="#5d4e37" stroke-width="1" rx="5" ry="5" />
  <text x="380" y="145" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" text-anchor="middle">Акакий</text>
  <text x="380" y="158" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" text-anchor="middle">Акакиевич</text>
  <text x="380" y="171" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" text-anchor="middle">Башмачкин</text>
  
  <!-- Стрелка вниз -->
  <path d="M 380 180 L 380 190" stroke="#5d4e37" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- Трагедия -->
  <text x="380" y="205" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" text-anchor="middle">Трагедия</text>
  <text x="380" y="218" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" text-anchor="middle">ничтожности</text>
  
  <!-- Гуманизм -->
  <rect x="340" y="230" width="80" height="30" fill="#d7ccc8" stroke="#5d4e37" stroke-width="1" rx="3" ry="3" />
  <text x="380" y="250" font-family="Arial, sans-serif" font-size="11" fill="#3e2723" text-anchor="middle">Гуманизм</text>
  
  <!-- Определение стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d4e37" />
    </marker>
  </defs>
  
  <!-- График творчества -->
  <text x="60" y="300" font-family="Arial, sans-serif" font-size="12" fill="#5d4e37" text-anchor="middle" font-weight="bold">Эволюция творчества</text>
  
  <!-- Ось X -->
  <line x1="20" y1="320" x2="140" y2="320" stroke="#5d4e37" stroke-width="1" />
  
  <!-- Ось Y -->
  <line x1="20" y1="320" x2="20" y2="290" stroke="#5d4e37" stroke-width="1" />
  
  <!-- Точки на графике -->
  <circle cx="40" cy="310" r="3" fill="#8d6e63" />
  <circle cx="60" cy="305" r="3" fill="#8d6e63" />
  <circle cx="80" cy="300" r="3" fill="#8d6e63" />
  <circle cx="100" cy="295" r="3" fill="#8d6e63" />
  <circle cx="120" cy="290" r="3" fill="#8d6e63" />
  
  <!-- Подписи точек -->
  <text x="40" y="325" font-family="Arial, sans-serif" font-size="8" fill="#5d4e37" text-anchor="middle">1829</text>
  <text x="60" y="325" font-family="Arial, sans-serif" font-size="8" fill="#5d4e37" text-anchor="middle">1832</text>
  <text x="80" y="325" font-family="Arial, sans-serif" font-size="8" fill="#5d4e37" text-anchor="middle">1836</text>
  <text x="100" y="325" font-family="Arial, sans-serif" font-size="8" fill="#5d4e37" text-anchor="middle">1842</text>
  <text x="120" y="325" font-family="Arial, sans-serif" font-size="8" fill="#5d4e37" text-anchor="middle">1852</text>
  
  <!-- Временная шкала -->
  <text x="340" y="300" font-family="Arial, sans-serif" font-size="12" fill="#5d4e37" text-anchor="middle" font-weight="bold">Периоды творчества</text>
  
  <!-- Период 1 -->
  <rect x="260" y="310" width="60" height="15" fill="#a1887f" rx="2" ry="2" />
  <text x="290" y="322" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Ранний</text>
  
  <!-- Период 2 -->
  <rect x="330" y="310" width="60" height="15" fill="#8d6e63" rx="2" ry="2" />
  <text x="360" y="322" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Зрелый</text>
  
  <!-- Период 3 -->
  <rect x="400" y="310" width="60" height="15" fill="#6d4c41" rx="2" ry="2" />
  <text x="430" y="322" font-family="Arial, sans-serif" font-size="9" fill="white" text-anchor="middle">Поздний</text>
  
  <!-- Декоративные элементы -->
  <path d="M 30 50 Q 40 40 50 50" fill="none" stroke="#8b7355" stroke-width="1" opacity="0.5" />
  <path d="M 450 50 Q 460 40 470 50" fill="none" stroke="#8b7355" stroke-width="1" opacity="0.5" />
  
  <!-- Ключевые даты -->
  <text x="20" y="90" font-family="Arial, sans-serif" font-size="9" fill="#8b7355">1809 - родился</text>
  <text x="20" y="105" font-family="Arial, sans-serif" font-size="9" fill="#8b7355">1852 - умер</text>
  
  <!-- Формула творчества -->
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="11" fill="#5d4e37" text-anchor="middle">Сатира + Фантастика = Гоголь</text>
</svg>