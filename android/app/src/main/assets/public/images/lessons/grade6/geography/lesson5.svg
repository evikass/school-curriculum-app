<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="wave5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Движение вод океана</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Ocean currents -->
  <rect x="30" y="92" width="210" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="35" y="97" width="200" height="130" rx="3" fill="#E3F2FD"/>
  <!-- Simplified ocean map -->
  <rect x="35" y="97" width="200" height="130" rx="3" fill="url(#wave5)" opacity="0.15"/>
  <!-- Warm currents (red arrows) -->
  <path d="M60,130 Q90,110 120,120 Q150,130 170,115" fill="none" stroke="#EF5350" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <polygon points="170,115 163,111 164,120" fill="#EF5350"/>
  <path d="M100,150 Q130,135 160,140 Q180,145 195,135" fill="none" stroke="#EF5350" stroke-width="2" marker-end="url(#arrowRed)"/>
  <polygon points="195,135 188,131 189,140" fill="#EF5350"/>
  <!-- Cold currents (blue arrows) -->
  <path d="M190,170 Q160,180 130,175 Q100,170 70,178" fill="none" stroke="#42A5F5" stroke-width="2.5"/>
  <polygon points="70,178 77,174 77,183" fill="#42A5F5"/>
  <path d="M50,160 Q65,170 80,165" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <polygon points="80,165 73,161 74,170" fill="#42A5F5"/>
  <!-- Land masses hint -->
  <rect x="45" y="195" width="30" height="25" rx="3" fill="#A5D6A7" opacity="0.6"/>
  <rect x="195" y="190" width="30" height="30" rx="3" fill="#A5D6A7" opacity="0.6"/>
  <!-- Legend -->
  <line x1="45" y1="240" x2="65" y2="240" stroke="#EF5350" stroke-width="2.5"/>
  <text x="70" y="243" font-family="Arial,sans-serif" font-size="8" fill="#555">Тёплые течения</text>
  <line x1="45" y1="255" x2="65" y2="255" stroke="#42A5F5" stroke-width="2.5"/>
  <text x="70" y="258" font-family="Arial,sans-serif" font-size="8" fill="#555">Холодные течения</text>
  <text x="135" y="280" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Океанские течения</text>

  <!-- Card 2: Tide cycle -->
  <rect x="250" y="92" width="110" height="95" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="305" y="110" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Приливы</text>
  <!-- Moon -->
  <circle cx="305" cy="120" r="8" fill="#BDBDBD" stroke="#757575" stroke-width="0.5"/>
  <circle cx="303" cy="118" r="2" fill="#9E9E9E" opacity="0.5"/>
  <circle cx="307" cy="122" r="1.5" fill="#9E9E9E" opacity="0.4"/>
  <!-- Water level 1 - high tide -->
  <rect x="260" y="135" width="40" height="10" rx="2" fill="#42A5F5" opacity="0.3"/>
  <rect x="260" y="145" width="40" height="25" rx="2" fill="#42A5F5" opacity="0.5"/>
  <text x="280" y="175" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Прилив</text>
  <!-- Water level 2 - low tide -->
  <rect x="310" y="145" width="40" height="25" rx="2" fill="#42A5F5" opacity="0.3"/>
  <text x="330" y="175" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Отлив</text>
  <!-- Arrow up/down -->
  <line x1="290" y1="140" x2="310" y2="140" stroke="#E65100" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Card 3: Wave diagram -->
  <rect x="370" y="92" width="100" height="95" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="420" y="110" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Волны</text>
  <!-- Wave -->
  <path d="M380,145 Q390,120 400,145 Q410,170 420,145 Q430,120 440,145" fill="none" stroke="#1565C0" stroke-width="2"/>
  <!-- Crest / Trough labels -->
  <text x="390" y="117" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle">гребень</text>
  <text x="410" y="180" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle">ложбина</text>
  <!-- Wavelength -->
  <line x1="380" y1="150" x2="420" y2="150" stroke="#E65100" stroke-width="0.8"/>
  <polygon points="380,150 384,148 384,152" fill="#E65100"/>
  <polygon points="420,150 416,148 416,152" fill="#E65100"/>
  <text x="400" y="160" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">длина волны</text>

  <!-- Card 4: Tsunami info -->
  <rect x="250" y="195" width="220" height="97" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="250" y="195" width="220" height="4" rx="2" fill="#1565C0"/>
  <text x="360" y="215" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Ключевые понятия</text>
  <!-- Items -->
  <circle cx="265" cy="232" r="3" fill="#EF5350"/>
  <text x="275" y="235" font-family="Arial,sans-serif" font-size="8" fill="#555">Тёплые течения - от экватора к полюсам</text>
  <circle cx="265" cy="250" r="3" fill="#42A5F5"/>
  <text x="275" y="253" font-family="Arial,sans-serif" font-size="8" fill="#555">Холодные течения - от полюсов к экватору</text>
  <circle cx="265" cy="268" r="3" fill="#F9A825"/>
  <text x="275" y="271" font-family="Arial,sans-serif" font-size="8" fill="#555">Приливы - притяжение Луны и Солнца</text>
  <circle cx="265" cy="286" r="3" fill="#2E7D32"/>
  <text x="275" y="289" font-family="Arial,sans-serif" font-size="8" fill="#555">Волны - ветер создаёт волны на поверхности</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Движение вод океана</text>
</svg>