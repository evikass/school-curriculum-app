<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Николай Андреевич Римский-Корсаков</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Изучаем творчество сказочника музыки</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- sea waves -->
  <path d="M80,230 Q130,215 180,230 Q230,245 280,230 Q330,215 380,230 Q405,238 420,230" stroke="#2B4C7E" stroke-width="2" fill="none"/>
  <path d="M80,245 Q130,230 180,245 Q230,260 280,245 Q330,230 380,245 Q405,253 420,245" stroke="#2B4C7E" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- ship -->
  <path d="M160,220 L200,190 L340,190 L360,220 Z" fill="#1a1a1a" opacity="0.7"/>
  <rect x="195" y="170" width="8" height="25" fill="#D4A843"/>
  <!-- sail -->
  <path d="M203,175 L250,175 L230,195 Z" fill="{CREAM}" stroke="#D4A843" stroke-width="1"/>
  <path d="M203,175 Q220,185 230,195" stroke="#D4A843" stroke-width="0.5" fill="none"/>
  <!-- flag -->
  <path d="M199,170 L215,165 L199,160 Z" fill="#C41E3A"/>
  <!-- stars ( Scheherazade theme) -->
  <polygon points="380,120 383,128 392,128 385,133 388,142 380,137 372,142 375,133 368,128 377,128" fill="#D4A843" opacity="0.7"/>
  <polygon points="410,105 412,110 418,110 414,114 415,120 410,117 405,120 406,114 402,110 408,110" fill="#D4A843" opacity="0.5"/>
  <polygon points="350,110 352,115 358,115 354,118 355,124 350,121 345,124 346,118 342,115 348,115" fill="#D4A843" opacity="0.6"/>
  <!-- moon crescent -->
  <circle cx="130" cy="120" r="18" fill="#D4A843" opacity="0.6"/>
  <circle cx="137" cy="115" r="15" fill="{CREAM}"/>
  <!-- sea foam -->
  <circle cx="120" cy="252" r="3" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="250" cy="248" r="2" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="390" cy="253" r="3" fill="#FFFFFF" opacity="0.4"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>