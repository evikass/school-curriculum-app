<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Доли и дроби</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Что такое дробь: числитель и знаменатель</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Pie chart showing 3/4 -->
  <circle cx="130" cy="180" r="70" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="2" />
  <!-- Quarter 1 filled -->
  <path d="M130,180 L130,110 A70,70 0 0,1 199.5,145 Z" fill="#C41E3A" opacity="0.8" />
  <!-- Quarter 2 filled -->
  <path d="M130,180 L199.5,145 A70,70 0 0,1 199.5,215 Z" fill="#C41E3A" opacity="0.8" />
  <!-- Quarter 3 filled -->
  <path d="M130,180 L199.5,215 A70,70 0 0,1 130,250 Z" fill="#C41E3A" opacity="0.8" />
  <!-- Quarter 4 not filled -->
  <path d="M130,180 L130,250 A70,70 0 0,1 130,110 Z" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="1" />
  <!-- Division lines -->
  <line x1="130" y1="110" x2="130" y2="250" stroke="#1a1a1a" stroke-width="1.5" />
  <line x1="60.5" y1="180" x2="199.5" y2="180" stroke="#1a1a1a" stroke-width="1" />
  <line x1="130" y1="180" x2="199.5" y2="145" stroke="#1a1a1a" stroke-width="1" />
  <line x1="130" y1="180" x2="199.5" y2="215" stroke="#1a1a1a" stroke-width="1" />
  
  <!-- Fraction label -->
  <text x="250" y="130" text-anchor="middle" fill="#1a1a1a" font-size="48" font-weight="bold">3</text>
  <line x1="225" y1="140" x2="275" y2="140" stroke="#1a1a1a" stroke-width="3" />
  <text x="250" y="185" text-anchor="middle" fill="#1a1a1a" font-size="48" font-weight="bold">4</text>
  
  <!-- Labels -->
  <text x="250" y="210" text-anchor="middle" fill="#C41E3A" font-size="11" font-weight="bold">числитель</text>
  <text x="250" y="230" text-anchor="middle" fill="#2B4C7E" font-size="11" font-weight="bold">(сколько взяли)</text>
  <text x="250" y="260" text-anchor="middle" fill="#2B4C7E" font-size="11" font-weight="bold">знаменатель</text>
  <text x="250" y="280" text-anchor="middle" fill="#C41E3A" font-size="11" font-weight="bold">(на сколько разделили)</text>
  
  <!-- Small fraction examples -->
  <text x="390" y="120" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">1/2 - половина</text>
  <text x="390" y="145" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">1/3 - треть</text>
  <text x="390" y="170" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">1/4 - четверть</text>
  <text x="390" y="195" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">2/5 - две пятых</text>
  <text x="390" y="220" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">3/8 - три восьмых</text>
  
  <!-- Small pies for examples -->
  <circle cx="350" cy="115" r="8" fill="#C41E3A" opacity="0.6" />
  <path d="M350,107 A8,8 0 0,1 350,123 L350,115 Z" fill="#F5E6C8" />
  <circle cx="350" cy="140" r="8" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="1" />
  <path d="M350,132 L350,148 L350,140" stroke="#1a1a1a" stroke-width="1" />
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>