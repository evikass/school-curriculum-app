<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CD853F;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F3FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CCE7FF;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0039A6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D52B1E;stop-opacity:1" />
    </linearGradient>
    
    <!-- Тень для текста -->
    <filter id="textShadow">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="url(#frameGrad)" stroke-width="8" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#D2691E" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2C3E50" filter="url(#textShadow)">РАСПАД СССР</text>
  <text x="250" y="52" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495E">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="470" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end" fill="#8B4513">УРОК 24</text>
  
  <!-- Карта СССР -->
  <g transform="translate(50, 70)">
    <!-- Карта контура -->
    <path d="M20,50 L40,30 L70,25 L100,20 L130,15 L160,20 L190,30 L220,40 L250,50 L280,60 L300,80 L290,100 L270,120 L240,130 L210,125 L180,110 L150,100 L120,90 L90,85 L60,90 L30,100 L20,80 Z" 
          fill="url(#mapGrad)" stroke="#4682B4" stroke-width="1.5"/>
    
    <!-- Линия разделения -->
    <line x1="150" y1="20" x2="150" y2="130" stroke="#FF6347" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="155" y="75" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">8 декабря 1991</text>
  </g>
  
  <!-- Флаг Российской Федерации -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="120" height="25" fill="white" stroke="#333" stroke-width="0.5"/>
    <rect x="0" y="25" width="120" height="25" fill="#0039A6" stroke="#333" stroke-width="0.5"/>
    <rect x="0" y="50" width="120" height="25" fill="#D52B1E" stroke="#333" stroke-width="0.5"/>
    <text x="60" y="40" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">Флаг РФ</text>
  </g>
  
  <!-- Хронологическая лента -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="440" height="40" fill="#F5F5DC" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="220" y="25" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">1991-1992</text>
    
    <!-- Даты -->
    <circle cx="50" cy="20" r="8" fill="#8B4513"/>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">91</text>
    
    <circle cx="150" cy="20" r="8" fill="#8B4513"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">91.12</text>
    
    <circle cx="250" cy="20" r="8" fill="#8B4513"/>
    <text x="250" y="25" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">92.01</text>
    
    <circle cx="350" cy="20" r="8" fill="#8B4513"/>
    <text x="350" y="25" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">92.12</text>
  </g>
  
  <!-- Список республик -->
  <g transform="translate(30, 250)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C3E50">15 независимых государств:</text>
    
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="9" fill="#333">1. Россия</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="9" fill="#333">2. Украина</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="9" fill="#333">3. Беларусь</text>
    
    <text x="120" y="20" font-family="Arial, sans-serif" font-size="9" fill="#333">4. Казахстан</text>
    <text x="120" y="35" font-family="Arial, sans-serif" font-size="9" fill="#333">5. Узбекистан</text>
    <text x="120" y="50" font-family="Arial, sans-serif" font-size="9" fill="#333">6. Азербайджан</text>
    
    <text x="240" y="20" font-family="Arial, sans-serif" font-size="9" fill="#333">7. Грузия</text>
    <text x="240" y="35" font-family="Arial, sans-serif" font-size="9" fill="#333">8. Армения</text>
    <text x="240" y="50" font-family="Arial, sans-serif" font-size="9" fill="#333">9. Таджикистан</text>
    
    <text x="360" y="20" font-family="Arial, sans-serif" font-size="9" fill="#333">10. Туркменистан</text>
    <text x="360" y="35" font-family="Arial, sans-serif" font-size="9" fill="#333">11. Кыргызстан</text>
    <text x="360" y="50" font-family="Arial, sans-serif" font-size="9" fill="#333">12. Молдова</text>
  </g>
  
  <!-- Дополнительная информация -->
  <g transform="translate(30, 310)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#555">Беловежские соглашения</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#666">8 декабря 1991 г. — прекращение существования СССР</text>
  </g>
  
  <!-- График распада -->
  <g transform="translate(380, 250)">
    <polyline points="0,0 10,5 20,15 30,30 40,45 50,60 60,70 70,75 80,78 90,79 100,80" 
              fill="none" stroke="#FF6347" stroke-width="2"/>
    <polyline points="0,80 10,75 20,65 30,50 40,35 50,20 60,10 70,5 80,2 90,1 100,0" 
              fill="none" stroke="#4682B4" stroke-width="2"/>
    <text x="50" y="-5" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">Процесс распада</text>
    <text x="0" y="95" font-family="Arial, sans-serif" font-size="7" fill="#333">1990</text>
    <text x="100" y="95" font-family="Arial, sans-serif" font-size="7" text-anchor="end" fill="#333">1992</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="470" cy="320" r="8" fill="#CD853F" opacity="0.7"/>
  <rect x="460" y="310" width="20" height="20" fill="none" stroke="#8B4513" stroke-width="1" transform="rotate(45 470 320)"/>
</svg>