<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a4f7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect x="0" y="0" width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="4" />
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#e0e6ed" stroke-width="1" />
  
  <!-- Заголовок урока -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">Урок 34: Литература русского зарубежья</text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c5282">И.С. Шмелёв, Б.К. Зайцев, М.А. Алданов</text>
  
  <!-- Номер урока -->
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#4a6fa5">№34</text>
  
  <!-- ЛИТЕРАТУРА · 11 КЛАСС -->
  <text x="250" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4a6fa5">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Карта маршрутов эмиграции -->
  <g transform="translate(30, 100)">
    <!-- Карта контуров -->
    <path d="M0,50 Q20,30 40,40 T80,30 T120,50 T160,40 T200,50" fill="none" stroke="#c5d5e4" stroke-width="1" />
    <circle cx="0" cy="50" r="3" fill="#4a6fa5" />
    <circle cx="200" cy="50" r="3" fill="#4a6fa5" />
    <!-- Метки -->
    <text x="0" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">Россия</text>
    <text x="200" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">Европа</text>
    <!-- Стрелки -->
    <path d="M10,45 L40,45" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <path d="M120,45 L160,45" stroke="#4a6fa5" stroke-width="1.5" marker-end="url(#arrowhead)" />
    <text x="25" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1917</text>
    <text x="140" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1920-е</text>
  </g>
  
  <!-- Стрелка определение -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a6fa5" />
    </marker>
  </defs>
  
  <!-- Портреты писателей -->
  <!-- Шмелёв -->
  <g transform="translate(30, 150)">
    <circle cx="30" cy="30" r="25" fill="#e6f0ff" stroke="#4a6fa5" stroke-width="1" />
    <circle cx="30" cy="25" r="8" fill="#4a6fa5" />
    <path d="M15,40 Q30,35 45,40" fill="none" stroke="#4a6fa5" stroke-width="2" />
    <text x="30" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">И.С. Шмелёв</text>
    <text x="30" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1873-1950</text>
  </g>
  
  <!-- Зайцев -->
  <g transform="translate(120, 150)">
    <circle cx="30" cy="30" r="25" fill="#e6f0ff" stroke="#4a6fa5" stroke-width="1" />
    <circle cx="30" cy="25" r="8" fill="#4a6fa5" />
    <path d="M15,40 Q30,35 45,40" fill="none" stroke="#4a6fa5" stroke-width="2" />
    <text x="30" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">Б.К. Зайцев</text>
    <text x="30" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1881-1972</text>
  </g>
  
  <!-- Алданов -->
  <g transform="translate(210, 150)">
    <circle cx="30" cy="30" r="25" fill="#e6f0ff" stroke="#4a6fa5" stroke-width="1" />
    <circle cx="30" cy="25" r="8" fill="#4a6fa5" />
    <path d="M15,40 Q30,35 45,40" fill="none" stroke="#4a6fa5" stroke-width="2" />
    <text x="30" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c5282">М.А. Алданов</text>
    <text x="30" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1886-1957</text>
  </g>
  
  <!-- Основные произведения -->
  <!-- Шмелёв -->
  <g transform="translate(30, 240)">
    <rect x="0" y="0" width="200" height="80" fill="#f0f7ff" stroke="#4a6fa5" stroke-width="1" rx="5" />
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c5282">Произведения</text>
    <text x="10" y="38" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Лето Господне"</text>
    <text x="10" y="52" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Чёрный монах"</text>
    <text x="10" y="66" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Богомолье"</text>
    <text x="110" y="38" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Солнце мёртвых"</text>
    <text x="110" y="52" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Старая Россия"</text>
    <text x="110" y="66" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Пути небесные"</text>
  </g>
  
  <!-- Зайцев -->
  <g transform="translate(250, 150)">
    <rect x="0" y="0" width="220" height="170" fill="#f0f7ff" stroke="#4a6fa5" stroke-width="1" rx="5" />
    <text x="110" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c5282">Творчество Зайцева</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">Основные темы:</text>
    <text x="10" y="54" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">• Православие</text>
    <text x="10" y="68" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">• Провинциальная жизнь</text>
    <text x="10" y="82" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">• История России</text>
    <text x="10" y="96" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">Известные произведения:</text>
    <text x="10" y="110" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Афанасий Буздеев"</text>
    <text x="10" y="124" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Гора"</text>
    <text x="10" y="138" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Орлиное гнездо"</text>
    <text x="10" y="152" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Тихое утро"</text>
  </g>
  
  <!-- Алданов -->
  <g transform="translate(30, 150)">
    <!-- Связь с Шмелёвым и Зайцевым -->
    <line x1="60" y1="60" x2="120" y2="60" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="3,3" />
    <line x1="150" y1="60" x2="210" y2="60" stroke="#4a6fa5" stroke-width="1" stroke-dasharray="3,3" />
  </g>
  
  <!-- Хронологическая шкала -->
  <g transform="translate(30, 260)">
    <rect x="0" y="0" width="440" height="70" fill="#e6f0ff" stroke="#4a6fa5" stroke-width="1" rx="5" />
    <text x="220" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c5282">Первая волна эмиграции</text>
    <line x1="20" y1="40" x2="420" y2="40" stroke="#4a6fa5" stroke-width="1" />
    <!-- Даты -->
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1917</text>
    <text x="120" y="55" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1920</text>
    <text x="220" y="55" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1930</text>
    <text x="320" y="55" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1940</text>
    <text x="420" y="55" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">1950</text>
    <!-- События -->
    <circle cx="20" cy="40" r="3" fill="#4a6fa5" />
    <text x="20" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#2c5282">Революция</text>
    <circle cx="120" cy="40" r="3" fill="#4a6fa5" />
    <text x="120" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#2c5282">Массовая эмиграция</text>
    <circle cx="220" cy="40" r="3" fill="#4a6fa5" />
    <text x="220" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#2c5282">Пик творчества</text>
    <circle cx="320" cy="40" r="3" fill="#4a6fa5" />
    <text x="320" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#2c5282">Вторая мировая</text>
  </g>
  
  <!-- Декоративные элементы -->
  <g transform="translate(470, 30)">
    <path d="M0,0 L10,10 L0,20 L-10,10 Z" fill="#4a6fa5" opacity="0.3" />
    <path d="M0,5 L5,10 L0,15 L-5,10 Z" fill="#2c5282" opacity="0.5" />
  </g>
  
  <g transform="translate(460, 320)">
    <path d="M0,0 L10,10 L0,20 L-10,10 Z" fill="#4a6fa5" opacity="0.3" />
    <path d="M0,5 L5,10 L0,15 L-5,10 Z" fill="#2c5282" opacity="0.5" />
  </g>
  
  <!-- Ключевые термины -->
  <g transform="translate(300, 240)">
    <rect x="0" y="0" width="170" height="80" fill="#f0f7ff" stroke="#4a6fa5" stroke-width="1" rx="5" />
    <text x="85" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c5282">Ключевые термины</text>
    <text x="10" y="38" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Белая эмиграция"</text>
    <text x="10" y="52" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Русское зарубежье"</text>
    <text x="10" y="66" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">"Парижская нота"</text>
  </g>
  
  <!-- Стилевые особенности -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="200" height="40" fill="#e6f0ff" stroke="#4a6fa5" stroke-width="1" rx="5" />
    <text x="100" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#2c5282">Стилевые особенности</text>
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4a6fa5">Традиции реализма + символизма</text>
  </g>
</svg>