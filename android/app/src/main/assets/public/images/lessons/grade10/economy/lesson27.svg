<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Денежно-кредитная политика ЦБ</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 27</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">27</text>
  <rect x="20" y="72" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Цели ДКП</text>
  <text x="28" y="100" class="box-text">1. Стабильность цен (инфляция таргетируется)    2. Полная занятость</text>
  <text x="28" y="113" class="box-text">3. Стабильный экономический рост    4. Равновесие платёжного баланса</text>
  <rect x="20" y="138" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="138" x2="234" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="152" class="box-title">Инструменты ДКП</text>
  <text x="28" y="166" class="box-text">1. Ключевая ставка (%)</text>
  <text x="28" y="179" class="box-text">2. Норма обяз. резервов (rr)</text>
  <text x="28" y="192" class="box-text">3. Операции на открытом рынке</text>
  <text x="28" y="205" class="box-text">4. Рефинансирование банков</text>
  <text x="28" y="218" class="box-text">5. Валютные интервенции</text>
  <rect x="260" y="138" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="138" x2="474" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="152" class="box-title">Политика дорогих денег</text>
  <text x="268" y="166" class="box-text">Цель: ↓ инфляции</text>
  <text x="268" y="179" class="box-text">r↑ → I↓ → AD↓ → P↓, Y↓</text>
  <text x="268" y="192" class="box-text">rr↑ → M↓ → кредит ↓</text>
  <text x="268" y="205" class="box-text">Продажа гос. облигаций</text>
  <text x="268" y="218" class="box-text">Жёсткая ДКП</text>
  <rect x="20" y="238" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="238" x2="234" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="252" class="box-title">Политика дешёвых денег</text>
  <text x="28" y="266" class="box-text">Цель: ↑ роста, ↓ безработ.</text>
  <text x="28" y="279" class="box-text">r↓ → I↑ → AD↑ → Y↑</text>
  <text x="28" y="292" class="box-text">rr↓ → M↑ → кредит ↑</text>
  <text x="28" y="305" class="box-text">Покупка гос. облигаций</text>
  <text x="28" y="318" class="box-text">Мягкая ДКП</text>
  <rect x="260" y="238" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="238" x2="474" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="252" class="box-title">Передаточный механизм</text>
  <text x="268" y="266" class="box-text">r↑ → I↓ → AD↓ → Y↓, P↓</text>
  <text x="268" y="279" class="box-text">r↓ → I↑ → AD↑ → Y↑</text>
  <text x="268" y="292" class="box-text">Лаг: 6-18 мес до эффекта</text>
  <text x="268" y="305" class="box-text">Проблема: неоднозначность</text>
  <text x="268" y="318" class="box-text">Канал: % → кредит → ВВП</text>
