<rect x="365" y="122" width="110" height="22" rx="4" fill="#9C27B0" stroke="#6A1B9A" stroke-width="0.8"/>
<text x="420" y="137" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">касается мяча?</text>
