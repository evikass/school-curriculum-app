  <path d="M-5,8 Q0,13 5,8" fill="none" stroke="#E8941E" stroke-width="1"/>
</g>
<!-- Motion arrow from cat to ball -->
<line x1="150" y1="185" x2="220" y2="175" stroke="#F5A623" stroke-width="2" stroke-dasharray="5,3"/>
<polygon points="220,175 212,170 214,179" fill="#F5A623"/>
<!-- Ball (collectible) -->
<circle cx="260" cy="165" r="18" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
<circle cx="254" cy="158" r="5" fill="#FFCDD2" opacity="0.6"/>
<!-- Star burst around ball on collision -->
<g opacity="0.4">
  <line x1="260" y1="142" x2="260" y2="135" stroke="#F9A825" stroke-width="2"/>
  <line x1="276" y1="149" x2="282" y2="145" stroke="#F9A825" stroke-width="2"/>
  <line x1="283" y1="165" x2="290" y2="165" stroke="#F9A825" stroke-width="2"/>
  <line x1="276" y1="181" x2="282" y2="185" stroke="#F9A825" stroke-width="2"/>
  <line x1="260" y1="188" x2="260" y2="195" stroke="#F9A825" stroke-width="2"/>
  <line x1="244" y1="181" x2="238" y2="185" stroke="#F9A825" stroke-width="2"/>
  <line x1="237" y1="165" x2="230" y2="165" stroke="#F9A825" stroke-width="2"/>
  <line x1="244" y1="149" x2="238" y2="145" stroke="#F9A825" stroke-width="2"/>
</g>
<!-- Sensor/detection area -->
<circle cx="260" cy="165" r="30" fill="none" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
<text x="260" y="200" font-family="Arial,sans-serif" font-size="8" fill="#F9A825" text-anchor="middle">зона касания</text>
