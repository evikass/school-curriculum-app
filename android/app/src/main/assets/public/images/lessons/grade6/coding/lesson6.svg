<text x="420" y="257" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">скройся</text>
<!-- Connection arrow from code to stage -->
<path d="M355,190 L340,190" fill="none" stroke="#FF8F00" stroke-width="1.2" stroke-dasharray="3,2"/>
<rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/><text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Взаимодействие спрайтов</text></svg>