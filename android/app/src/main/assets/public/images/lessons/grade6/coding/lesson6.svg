<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFFDE7"/></linearGradient></defs><rect width="500" height="350" fill="url(#bg)" rx="10"/><rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/><rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/><polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/><polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/><polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/><polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/><circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/><circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/><text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Взаимодействие спрайтов</text><text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Основы программирования - Урок 6</text><line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/><rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/><rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>
<!-- Stage area -->
<rect x="40" y="92" width="300" height="200" rx="5" fill="white" stroke="#555" stroke-width="1.5"/>
<rect x="42" y="94" width="296" height="196" rx="4" fill="#E3F2FD"/>
<!-- Cat sprite moving toward ball -->
<g transform="translate(120,185)">
  <ellipse cx="0" cy="0" rx="22" ry="18" fill="#F5A623" stroke="#E8941E" stroke-width="1.2"/>
  <polygon points="-14,-13 -9,-28 -3,-12" fill="#F5A623" stroke="#E8941E" stroke-width="0.8"/>
  <polygon points="14,-13 9,-28 3,-12" fill="#F5A623" stroke="#E8941E" stroke-width="0.8"/>
  <circle cx="-7" cy="-3" r="4" fill="white"/><circle cx="-6" cy="-3" r="2" fill="#2E7D32"/>
  <circle cx="7" cy="-3" r="4" fill="white"/><circle cx="8" cy="-3" r="2" fill="#2E7D32"/>
