<rect x="365" y="152" width="110" height="22" rx="4" fill="#9C27B0" stroke="#6A1B9A" stroke-width="0.8"/>
<text x="420" y="167" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">расстояние до</text>
<!-- If touching block -->
<rect x="365" y="182" width="110" height="22" rx="4" fill="#FFC107" stroke="#FF8F00" stroke-width="0.8"/>
<polygon points="365,182 373,182 365,190" fill="#FFC107"/>
<text x="420" y="197" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">если касание</text>
