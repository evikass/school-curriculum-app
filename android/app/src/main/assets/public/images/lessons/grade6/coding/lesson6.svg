  <polygon points="0,-14 12,0 6,0 6,14 -6,14 -6,0 -12,0" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
</g>
<!-- Code blocks on right -->
<rect x="355" y="92" width="130" height="200" rx="5" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.2"/>
<text x="420" y="108" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Сенсоры</text>
<line x1="365" y1="114" x2="475" y2="114" stroke="#FF8F00" stroke-width="0.6"/>
