<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.05); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
      @keyframes color { 0% { fill: #FF6B6B; } 33% { fill: #4ECDC4; } 66% { fill: #FFE66D; } 100% { fill: #FF6B6B; } }
      @keyframes glow { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
      .animate { animation: bounce 2s ease-in-out infinite; }
      .pulse { animation: pulse 1.5s ease-in-out infinite; }
      .color { animation: color 3s ease-in-out infinite; }
      .glow { animation: glow 1.5s ease-in-out infinite; }
    </style>
  </defs>
  <rect width="500" height="350" fill="#E8F5E9"/>
  
  <!-- Background decoration -->
  <circle cx="40" cy="40" r="25" fill="#81C784" opacity="0.4"/>
  <circle cx="460" cy="310" r="30" fill="#A5D6A7" opacity="0.5"/>
  <circle cx="480" cy="60" r="20" fill="#81C784" opacity="0.3"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2E7D32" text-anchor="middle">🎨 Слова-признаки</text>
  <rect x="100" y="55" width="300" height="3" rx="2" fill="#4CAF50" opacity="0.6"/>
  
  <!-- Explanation -->
  <rect x="30" y="75" width="440" height="40" rx="8" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2"/>
  <text x="250" y="100" font-family="Arial" font-size="13" fill="#2E7D32" text-anchor="middle">Слова-признаки отвечают на вопросы: КАКОЙ? КАКАЯ? КАКОЕ?</text>
  
  <!-- Color attributes -->
  <rect x="30" y="125" width="140" height="130" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="100" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">🎨 Цвет</text>
  
  <g transform="translate(45, 155)">
    <circle class="glow" cx="20" cy="20" r="18" fill="#F44336"/>
    <text x="20" y="25" font-family="Arial" font-size="10" fill="white" text-anchor="middle">красный</text>
    <circle class="glow" style="animation-delay: 0.3s" cx="70" cy="20" r="18" fill="#2196F3"/>
    <text x="70" y="25" font-family="Arial" font-size="10" fill="white" text-anchor="middle">синий</text>
    <circle class="glow" style="animation-delay: 0.6s" cx="20" cy="65" r="18" fill="#FFEB3B"/>
    <text x="20" y="70" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">жёлтый</text>
    <circle class="glow" style="animation-delay: 0.9s" cx="70" cy="65" r="18" fill="#4CAF50"/>
    <text x="70" y="70" font-family="Arial" font-size="10" fill="white" text-anchor="middle">зелёный</text>
  </g>
  
  <!-- Size attributes -->
  <rect x="180" y="125" width="140" height="130" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="250" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">📏 Размер</text>
  
  <g transform="translate(195, 160)">
    <!-- Big -->
    <g class="pulse">
      <circle cx="35" cy="30" r="30" fill="#81C784"/>
      <text x="35" y="35" font-family="Arial" font-size="14" fill="white" text-anchor="middle">большой</text>
    </g>
    <!-- Small -->
    <g class="pulse" style="animation-delay: 0.5s">
      <circle cx="95" cy="40" r="15" fill="#A5D6A7"/>
      <text x="95" y="44" font-family="Arial" font-size="8" fill="white" text-anchor="middle">маленький</text>
    </g>
  </g>
  
  <!-- Other attributes -->
  <rect x="330" y="125" width="140" height="130" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="400" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">✨ Другие</text>
  
  <g transform="translate(340, 155)">
    <rect x="0" y="0" width="55" height="35" rx="5" fill="#81C784"/>
    <text x="27" y="15" font-family="Arial" font-size="9" fill="white" text-anchor="middle">вкусный</text>
    <text x="27" y="27" font-family="Arial" font-size="14" text-anchor="middle">🍰</text>
    
    <rect x="60" y="0" width="55" height="35" rx="5" fill="#A5D6A7"/>
    <text x="87" y="15" font-family="Arial" font-size="9" fill="white" text-anchor="middle">добрый</text>
    <text x="87" y="27" font-family="Arial" font-size="14" text-anchor="middle">😊</text>
    
    <rect x="0" y="45" width="55" height="35" rx="5" fill="#66BB6A"/>
    <text x="27" y="60" font-family="Arial" font-size="9" fill="white" text-anchor="middle">быстрый</text>
    <text x="27" y="72" font-family="Arial" font-size="14" text-anchor="middle">⚡</text>
    
    <rect x="60" y="45" width="55" height="35" rx="5" fill="#4CAF50"/>
    <text x="87" y="60" font-family="Arial" font-size="9" fill="white" text-anchor="middle">умный</text>
    <text x="87" y="72" font-family="Arial" font-size="14" text-anchor="middle">🧠</text>
  </g>
  
  <!-- Example sentence -->
  <rect x="30" y="265" width="440" height="50" rx="10" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2"/>
  <text x="250" y="285" font-family="Arial" font-size="13" fill="#2E7D32" text-anchor="middle">📝 Пример: Большой красный мяч лежит на столе.</text>
  <text x="250" y="305" font-family="Arial" font-size="11" fill="#4CAF50" text-anchor="middle">Какой? — большой, красный — это слова-признаки!</text>
  
  <!-- Tip box -->
  <rect x="20" y="320" width="460" height="25" rx="10" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <text x="250" y="338" font-family="Arial" font-size="12" fill="#2E7D32" text-anchor="middle">💡 Слова-признаки — это прилагательные! Они описывают предметы.</text>
</svg>