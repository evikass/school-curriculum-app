<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#66ff66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009900;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect x="0" y="0" width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#0066cc" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#4da6ff" stroke-width="1" rx="3"/>
  
  <!-- Номер урока -->
  <text x="30" y="40" font-family="Arial, sans-serif" font-size="14" fill="#0066cc" font-weight="bold">Урок 10</text>
  
  <!-- Заголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="16" fill="#0066cc" text-anchor="middle" font-weight="bold">Превращения энергии при колебаниях. Затухающие колебания</text>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- График затухающих колебаний -->
  <g transform="translate(50, 90)">
    <!-- Ось X -->
    <line x1="0" y1="80" x2="180" y2="80" stroke="#333" stroke-width="1.5"/>
    <path d="M175,75 L180,80 L175,85" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="185" y="85" font-family="Arial, sans-serif" font-size="10" fill="#333">t</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="#333" stroke-width="1.5"/>
    <path d="M-5,5 L0,0 L5,5" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="-15" y="5" font-family="Arial, sans-serif" font-size="10" fill="#333">x</text>
    
    <!-- Кривая затухающих колебаний -->
    <path d="M0,40 Q15,10 30,15 Q45,45 60,40 Q75,10 90,15 Q105,45 120,40 Q135,10 150,15 Q165,45 180,40" 
          fill="none" stroke="url(#blueGrad)" stroke-width="2"/>
    
    <!-- Подписи на графике -->
    <text x="90" y="95" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">Затухающие колебания</text>
    
    <!-- Пунктирные линии для амплитуд -->
    <line x1="0" y1="15" x2="180" y2="15" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="0" y1="65" x2="180" y2="65" stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="-20" y="20" font-family="Arial, sans-serif" font-size="9" fill="#666">A₀</text>
    <text x="-20" y="70" font-family="Arial, sans-serif" font-size="9" fill="#666">A</text>
  </g>
  
  <!-- Формула логарифмического декремента -->
  <g transform="translate(260, 90)">
    <rect x="0" y="0" width="200" height="80" fill="#f9f9f9" stroke="#0066cc" stroke-width="1" rx="5"/>
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">Логарифмический декремент</text>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle">δ = ln(A₀/A) = πβ/ω₀</text>
    <text x="100" y="65" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">где β - коэффициент затухания</text>
  </g>
  
  <!-- График энергии -->
  <g transform="translate(50, 210)">
    <!-- Ось X -->
    <line x1="0" y1="80" x2="180" y2="80" stroke="#333" stroke-width="1.5"/>
    <path d="M175,75 L180,80 L175,85" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="185" y="85" font-family="Arial, sans-serif" font-size="10" fill="#333">t</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="80" stroke="#333" stroke-width="1.5"/>
    <path d="M-5,5 L0,0 L5,5" fill="none" stroke="#333" stroke-width="1.5"/>
    <text x="-15" y="5" font-family="Arial, sans-serif" font-size="10" fill="#333">E</text>
    
    <!-- Кривая полной энергии -->
    <path d="M0,10 Q30,15 60,20 Q90,30 120,40 Q150,55 180,70" 
          fill="none" stroke="#ff6666" stroke-width="2"/>
    
    <!-- Кривая кинетической энергии -->
    <path d="M0,20 Q15,25 30,30 Q45,35 60,40 Q75,45 90,50 Q105,55 120,60 Q135,65 150,68 Q165,69 180,70" 
          fill="none" stroke="#66ff66" stroke-width="1.5" stroke-dasharray="5,3"/>
    
    <!-- Кривая потенциальной энергии -->
    <path d="M0,15 Q15,20 30,25 Q45,30 60,35 Q75,40 90,45 Q105,50 120,55 Q135,60 150,63 Q165,67 180,70" 
          fill="none" stroke="#4da6ff" stroke-width="1.5" stroke-dasharray="2,2"/>
    
    <!-- Подписи на графике -->
    <text x="90" y="95" font-family="Arial, sans-serif" font-size="11" fill="#333" text-anchor="middle">Превращения энергии</text>
    
    <!-- Легенда -->
    <rect x="5" y="5" width="15" height="3" fill="#ff6666"/>
    <text x="25" y="10" font-family="Arial, sans-serif" font-size="9" fill="#333">Eполн</text>
    
    <rect x="5" y="15" width="15" height="3" fill="#66ff66" stroke-dasharray="5,3"/>
    <text x="25" y="20" font-family="Arial, sans-serif" font-size="9" fill="#333">Eкин</text>
    
    <rect x="5" y="25" width="15" height="3" fill="#4da6ff" stroke-dasharray="2,2"/>
    <text x="25" y="30" font-family="Arial, sans-serif" font-size="9" fill="#333">Eпот</text>
  </g>
  
  <!-- Формула добротности -->
  <g transform="translate(260, 210)">
    <rect x="0" y="0" width="200" height="80" fill="#f9f9f9" stroke="#0066cc" stroke-width="1" rx="5"/>
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">Добротность</text>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle">Q = ω₀/(2β) = π/δ</text>
    <text x="100" y="65" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Характеризует качество колебаний</text>
  </g>
  
  <!-- Закон сохранения энергии -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="410" height="40" fill="#e6f2ff" stroke="#0066cc" stroke-width="1" rx="5"/>
    <text x="205" y="15" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">Закон сохранения энергии для затухающих колебаний</text>
    <text x="205" y="30" font-family="Arial, sans-serif" font-size="11" fill="#0066cc" text-anchor="middle">ΔE = -γΔx²/dt (энергия теряется на преодоление сил сопротивления)</text>
  </g>
  
  <!-- Дополнительные элементы для объема -->
  <circle cx="450" cy="30" r="8" fill="#ffcc00" opacity="0.7"/>
  <circle cx="440" cy="40" r="5" fill="#ffcc00" opacity="0.5"/>
  <circle cx="460" cy="40" r="5" fill="#ffcc00" opacity="0.5"/>
</svg>