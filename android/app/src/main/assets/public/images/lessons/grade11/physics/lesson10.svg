<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#eee" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#eee" stroke-width="1" rx="3" opacity="0.5"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Затухающие колебания</text>
  
  <!-- Система координат -->
  <g id="coordinates">
    <!-- Ось X -->
    <line x1="50" y1="250" x2="450" y2="250" stroke="#aaa" stroke-width="2"/>
    <polygon points="450,250 440,245 440,255" fill="#aaa"/>
    
    <!-- Ось Y -->
    <line x1="50" y1="250" x2="50" y2="50" stroke="#aaa" stroke-width="2"/>
    <polygon points="50,50 45,60 55,60" fill="#aaa"/>
    
    <!-- Подписи осей -->
    <text x="460" y="255" fill="#aaa" font-family="Arial" font-size="14">t</text>
    <text x="35" y="45" fill="#aaa" font-family="Arial" font-size="14">A</text>
    
    <!-- Шкала времени -->
    <text x="50" y="270" fill="#aaa" font-family="Arial" font-size="12">0</text>
    <text x="150" y="270" fill="#aaa" font-family="Arial" font-size="12">T</text>
    <text x="250" y="270" fill="#aaa" font-family="Arial" font-size="12">2T</text>
    <text x="350" y="270" fill="#aaa" font-family="Arial" font-size="12">3T</text>
    <text x="420" y="270" fill="#aaa" font-family="Arial" font-size="12">4T</text>
    
    <!-- Шкала амплитуды -->
    <text x="35" y="255" fill="#aaa" font-family="Arial" font-size="12">0</text>
    <text x="30" y="200" fill="#aaa" font-family="Arial" font-size="12">A₀</text>
    <text x="30" y="150" fill="#aaa" font-family="Arial" font-size="12">A₀/2</text>
  </g>
  
  <!-- Огибающая e^(-βt) -->
  <path d="M 50,150 Q 100,160 150,180 T 250,210 Q 300,225 350,235 T 450,245" 
        fill="none" stroke="#4cc9f0" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  
  <path d="M 50,150 Q 100,140 150,120 T 250,90 Q 300,75 350,65 T 450,55" 
        fill="none" stroke="#4cc9f0" stroke-width="2" stroke-dasharray="5,3" opacity="0.8"/>
  
  <!-- Формула огибающей -->
  <text x="380" y="100" fill="#4cc9f0" font-family="Arial" font-size="14">A₀·e^(-βt)</text>
  
  <!-- График затухающих колебаний -->
  <path d="M 50,150 
           C 60,130 70,170 80,150
           C 90,130 100,170 110,150
           C 120,130 130,170 140,150
           C 150,130 160,170 170,150
           C 180,130 190,170 200,150
           C 210,130 220,170 230,150
           C 240,130 250,170 260,150
           C 270,130 280,170 290,150
           C 300,130 310,170 320,150
           C 330,130 340,170 350,150
           C 360,130 370,170 380,150
           C 390,130 400,170 410,150
           C 420,130 430,170 440,150" 
        fill="none" stroke="#f72585" stroke-width="3"/>
  
  <!-- Периодические отметки -->
  <circle cx="150" cy="150" r="3" fill="#f72585"/>
  <circle cx="250" cy="150" r="3" fill="#f72585"/>
  <circle cx="350" cy="150" r="3" fill="#f72585"/>
  
  <!-- Декоративные элементы -->
  <g opacity="0.3">
    <circle cx="80" cy="80" r="2" fill="#4cc9f0"/>
    <circle cx="120" cy="90" r="2" fill="#4cc9f0"/>
    <circle cx="160" cy="70" r="2" fill="#4cc9f0"/>
    <circle cx="200" cy="85" r="2" fill="#4cc9f0"/>
    <circle cx="240" cy="75" r="2" fill="#4cc9f0"/>
    <circle cx="280" cy="95" r="2" fill="#4cc9f0"/>
    <circle cx="320" cy="80" r="2" fill="#4cc9f0"/>
    <circle cx="360" cy="90" r="2" fill="#4cc9f0"/>
    <circle cx="400" cy="85" r="2" fill="#4cc9f0"/>
  </g>
  
  <!-- Поясняющий текст -->
  <text x="250" y="300" text-anchor="middle" fill="#aaa" font-family="Arial" font-size="12">Закон затухания: A(t) = A₀·e^(-βt)·cos(ωt)</text>
  
  <!-- Указатель на β -->
  <line x1="380" y1="100" x2="350" y2="120" stroke="#4cc9f0" stroke-width="1"/>
  <text x="345" y="115" fill="#4cc9f0" font-family="Arial" font-size="12">β</text>
</svg>