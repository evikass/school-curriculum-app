<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Музыкальные инструменты</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Знакомимся с разнообразием инструментов</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- piano keys -->
  <rect x="100" y="160" width="160" height="90" rx="3" fill="#1a1a1a"/>
  <rect x="102" y="162" width="20" height="85" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="123" y="162" width="20" height="85" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="144" y="162" width="20" height="85" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="165" y="162" width="20" height="85" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="186" y="162" width="20" height="85" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="207" y="162" width="20" height="85" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="228" y="162" width="20" height="85" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- black keys -->
  <rect x="115" y="162" width="14" height="50" fill="#1a1a1a"/>
  <rect x="136" y="162" width="14" height="50" fill="#1a1a1a"/>
  <rect x="178" y="162" width="14" height="50" fill="#1a1a1a"/>
  <rect x="199" y="162" width="14" height="50" fill="#1a1a1a"/>
  <rect x="220" y="162" width="14" height="50" fill="#1a1a1a"/>
  <!-- violin -->
  <ellipse cx="350" cy="160" rx="18" ry="28" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="350" cy="210" rx="22" ry="30" fill="#D4A843" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="350" y1="135" x2="350" y2="185" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="346" y="120" width="8" height="18" rx="1" fill="#1a1a1a"/>
  <line x1="350" y1="120" x2="380" y2="105" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
  <line x1="350" y1="120" x2="380" y2="115" stroke="#1a1a1a" stroke-width="0.5" opacity="0.4"/>
  <!-- drum -->
  <ellipse cx="430" cy="230" rx="30" ry="10" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="400" y="200" width="60" height="30" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="430" cy="200" rx="30" ry="10" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="400" y1="215" x2="460" y2="215" stroke="#D4A843" stroke-width="1.5"/>
  <!-- drumsticks -->
  <line x1="410" y1="170" x2="420" y2="200" stroke="#D4A843" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="450" y1="170" x2="440" y2="200" stroke="#D4A843" stroke-width="2.5" stroke-linecap="round"/>
  <!-- floating notes -->
  <text x="120" y="130" font-size="20" fill="#C41E3A">&#9835;</text>
  <text x="290" y="110" font-size="16" fill="#D4A843">&#9834;</text>
  <text x="395" y="140" font-size="18" fill="#2B4C7E">&#9833;</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>