<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Цикличность развития экономики</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 31</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">31</text>
  <rect x="20" y="72" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Экономический цикл</text>
  <text x="28" y="100" class="box-text">Периодические колебания ВВП: Пик → Спад (рецессия) → Дно (депрессия) → Подъём (окупация) → Пик</text>
  <text x="28" y="113" class="box-text">Рецессия — 2 квартала подряд ↓ ВВП    |    Депрессия — длительная рецессия</text>
  <rect x="20" y="142" width="145" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="142" x2="159" y2="142" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="156" class="box-title">Фазы цикла</text>
  <text x="28" y="170" class="box-text">Пик: max Y, полн. занят.</text>
  <text x="28" y="183" class="box-text">Спад: Y↓, u↑, π↓</text>
  <text x="28" y="196" class="box-text">Дно: min Y, max u</text>
  <text x="28" y="209" class="box-text">Подъём: Y↑, u↓, I↑</text>
  <text x="28" y="222" class="box-text">Волна ~ 7-12 лет</text>
  <rect x="175" y="142" width="145" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="181" y1="142" x2="314" y2="142" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="183" y="156" class="box-title">Виды циклов</text>
  <text x="183" y="170" class="box-text">Китчин: 3-4 года (запасы)</text>
  <text x="183" y="183" class="box-text">Жуглар: 7-12 лет (I)</text>
  <text x="183" y="196" class="box-text">Кузнец: 15-25 лет (стр-во)</text>
  <text x="183" y="209" class="box-text">Кондратьев: 45-60 лет</text>
  <text x="183" y="222" class="box-text">(технологич. уклады)</text>
  <rect x="330" y="142" width="150" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="336" y1="142" x2="474" y2="142" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="338" y="156" class="box-title">Причины циклов</text>
  <text x="338" y="170" class="box-text">Шоки спроса/предлож.</text>
  <text x="338" y="183" class="box-text">Монетарные факторы</text>
  <text x="338" y="196" class="box-text">Инновационные волны</text>
  <text x="338" y="209" class="box-text">Психология (ожидания)</text>
  <text x="338" y="222" class="box-text">Перепроизводство</text>
  <rect x="20" y="230" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="230" x2="234" y2="230" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="244" class="box-title">Проциклические показатели</text>
  <text x="28" y="258" class="box-text">ВВП, инвестиции, прибыль</text>
  <text x="28" y="271" class="box-text">Занятость, загрузка мощностей</text>
  <text x="28" y="284" class="box-text">Импорт, цены акций</text>
  <text x="28" y="297" class="box-text">Растут в фазе подъёма</text>
  <text x="28" y="310" class="box-text">Падают при спаде</text>
  <rect x="260" y="230" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="230" x2="474" y2="230" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="244" class="box-title">Контрциклические показатели</text>
  <text x="268" y="258" class="box-text">Безработица, банкротства</text>
  <text x="268" y="271" class="box-text">Запасы готовой продукции</text>
  <text x="268" y="284" class="box-text">Дефицит госбюджета</text>
  <text x="268" y="297" class="box-text">Растут при спаде</text>
  <text x="268" y="310" class="box-text">Антициклическая политика</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>