<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Проектирование макета</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Создание макетов</text>
  <!-- Illustration area -->
  <rect x="120" y="105" width="260" height="175" rx="2" fill="#1a3a5e" stroke="#0d2240" stroke-width="2"/><line x1="120" y1="140" x2="380" y2="140" stroke="#3a6a9e" stroke-width="0.5" opacity="0.5"/><line x1="120" y1="175" x2="380" y2="175" stroke="#3a6a9e" stroke-width="0.5" opacity="0.5"/><line x1="120" y1="210" x2="380" y2="210" stroke="#3a6a9e" stroke-width="0.5" opacity="0.5"/><line x1="120" y1="245" x2="380" y2="245" stroke="#3a6a9e" stroke-width="0.5" opacity="0.5"/><line x1="180" y1="105" x2="180" y2="280" stroke="#3a6a9e" stroke-width="0.5" opacity="0.5"/><line x1="240" y1="105" x2="240" y2="280" stroke="#3a6a9e" stroke-width="0.5" opacity="0.5"/><line x1="300" y1="105" x2="300" y2="280" stroke="#3a6a9e" stroke-width="0.5" opacity="0.5"/><rect x="160" y="150" width="100" height="70" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,2"/><text x="210" y="190" text-anchor="middle" font-size="10" fill="#87CEEB" font-family="Arial">1:10</text><line x1="160" y1="220" x2="260" y2="220" stroke="#fff" stroke-width="1"/><text x="160" y="233" font-size="8" fill="#fff" font-family="Arial">10 см</text><line x1="160" y1="150" x2="160" y2="220" stroke="#fff" stroke-width="1"/><text x="145" y="190" text-anchor="middle" font-size="8" fill="#fff" font-family="Arial" transform="rotate(-90 145 190)">7 см</text><text x="340" y="270" text-anchor="middle" font-size="10" fill="#87CEEB" font-family="Arial">Масштаб</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Проектная деятельность</text>
</svg>