<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#D32F2F" text-anchor="middle">Простое предложение</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Русский язык — Урок 9</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#D32F2F" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="50" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="250" y="90" font-family="Arial,sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Подлежащее + Сказуемое = Грамматическая основа</text>
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Двусоставное предложение имеет оба главных члена</text>
  <rect x="20" y="128" width="460" height="55" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="30" y="148" font-family="Arial,sans-serif" font-size="13" fill="#333333" text-anchor="start" font-weight="bold" font-style="">Мальчик читает интересную книгу</text>
  <line x1="30" y1="152" x2="85" y2="152" stroke="#D32F2F" stroke-width="2"/>
  <text x="30" y="165" font-family="Arial,sans-serif" font-size="8" fill="#D32F2F" text-anchor="start" font-weight="normal" font-style="">подлежащее</text>
  <line x1="100" y1="152" x2="150" y2="152" stroke="#1565C0" stroke-width="2"/>
  <text x="100" y="165" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="start" font-weight="normal" font-style="">сказуемое</text>
  <line x1="160" y1="152" x2="310" y2="152" stroke="#2E7D32" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="170" y="178" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="start" font-weight="normal" font-style="">дополнение</text>
  <rect x="20" y="190" width="225" height="80" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="30" y="208" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Виды по составу</text>
  <text x="30" y="225" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">Двусоставные: Мальчик читает.</text>
  <text x="30" y="240" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">Односоставные: Темнеет. Холодно.</text>
  <text x="30" y="255" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">Неполные: — Что делаешь? — Читаю.</text>
  <rect x="255" y="190" width="225" height="80" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="265" y="208" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Виды по интонации</text>
  <text x="265" y="225" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">Повествовательные: Идёт дождь.</text>
  <text x="265" y="240" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">Вопросительные: Идёт дождь?</text>
  <text x="265" y="255" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">Побудительные: Иди домой!</text>
  <rect x="20" y="278" width="460" height="35" rx="5" fill="#D32F2F" opacity="0.06"/>
  <text x="30" y="298" font-family="Arial,sans-serif" font-size="10" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Второстепенные члены:</text>
  <text x="175" y="298" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal" font-style="">дополнение, определение, обстоятельство</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#D32F2F" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle" font-style="italic">Русский язык · 10 класс</text>
</svg>