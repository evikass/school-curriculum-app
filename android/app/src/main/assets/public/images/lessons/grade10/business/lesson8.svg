<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="500" height="32" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Продажи</text>
  <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE082">Бизнес — Урок 8</text>

  <!-- Lesson number badge -->
  <circle cx="30" cy="26" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="30" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">8</text>

  <!-- Section: Процесс продажи -->
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Процесс продажи</text>
  <rect x="25" y="59" width="450" height="18" rx="4" ry="4" fill="#FFB300" opacity="0.12"/>
  <text x="35" y="68" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">1. Установление контакта</text>
  <rect x="25" y="80" width="450" height="18" rx="4" ry="4" fill="#FFB300" opacity="0.16999999999999998"/>
  <text x="35" y="89" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">2. Выявление потребностей</text>
  <rect x="25" y="101" width="450" height="18" rx="4" ry="4" fill="#FFB300" opacity="0.22"/>
  <text x="35" y="110" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">3. Презентация решения</text>
  <rect x="25" y="122" width="450" height="18" rx="4" ry="4" fill="#FFB300" opacity="0.27"/>
  <text x="35" y="131" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">4. Работа с возражениями</text>
  <rect x="25" y="143" width="450" height="18" rx="4" ry="4" fill="#FFB300" opacity="0.32"/>
  <text x="35" y="152" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">5. Закрытие сделки</text>
  <rect x="25" y="164" width="450" height="18" rx="4" ry="4" fill="#FFB300" opacity="0.37"/>
  <text x="35" y="173" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">6. Последующие продажи</text>
  <!-- Section: Топ возражений и ответы -->
  <text x="20" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Топ возражений и ответы</text>
  <rect x="16" y="199" width="148" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="16" y="199" width="148" height="20" rx="8" ry="8" fill="#E65100" opacity="0.15"/>
  <rect x="16" y="211" width="148" height="8" fill="#E65100" opacity="0.15"/>
  <text x="90" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#C62828">«Дорого»</text>
  <text x="90" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">Покажи ценность</text>
  <text x="90" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">и возврат инвестиций</text>
  <rect x="172" y="199" width="148" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="172" y="199" width="148" height="20" rx="8" ry="8" fill="#E65100" opacity="0.15"/>
  <rect x="172" y="211" width="148" height="8" fill="#E65100" opacity="0.15"/>
  <text x="246" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#C62828">«Подумаю»</text>
  <text x="246" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">Уточни сомнения</text>
  <text x="246" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">и дай дедлайн</text>
  <rect x="328" y="199" width="148" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="328" y="199" width="148" height="20" rx="8" ry="8" fill="#E65100" opacity="0.15"/>
  <rect x="328" y="211" width="148" height="8" fill="#E65100" opacity="0.15"/>
  <text x="402" y="213" text-anchor="middle" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#C62828">«У конкурентов дешевле»</text>
  <text x="402" y="231" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">Объясни отличия</text>
  <text x="402" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">и преимущества</text>
  <!-- Tip -->
  <rect x="15" y="325" width="470" height="18" rx="9" ry="9" fill="#FF6F00" opacity="0.1"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-style="italic" fill="#3E2723">Совет: Продажи — это не уговоры, а помощь клиенту принять правильное решение!</text>

  <!-- Footer -->
  <line x1="20" y1="343" x2="480" y2="343" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" opacity="0.7">Бизнес · 10 класс</text>
</svg>