<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky18" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCDD2;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#FFEBEE;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky18)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C62828" text-anchor="middle">❌ НЕ с глаголами</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#E53935" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#EF9A9A" opacity="0.4"/>
  
  <!-- Main rule -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="400" height="80" fill="#FFEBEE" rx="10" stroke="#E53935"/>
    <text x="200" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#B71C1C" text-anchor="middle">НЕ с глаголами пишется</text>
    <text x="200" y="65" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#C62828" text-anchor="middle">РАЗДЕЛЬНО!</text>
  </g>
  
  <!-- Examples -->
  <g transform="translate(50, 180)" font-family="Arial, sans-serif">
    <text x="200" y="0" font-size="14" font-weight="bold" fill="#C62828" text-anchor="middle">Примеры</text>
    
    <rect x="30" y="15" width="120" height="35" fill="#C8E6C9" rx="5"/>
    <text x="90" y="38" font-size="13" fill="#2E7D32" text-anchor="middle">не читал</text>
    
    <rect x="170" y="15" width="120" height="35" fill="#C8E6C9" rx="5"/>
    <text x="230" y="38" font-size="13" fill="#2E7D32" text-anchor="middle">не писал</text>
    
    <rect x="310" y="15" width="120" height="35" fill="#C8E6C9" rx="5"/>
    <text x="370" y="38" font-size="13" fill="#2E7D32" text-anchor="middle">не знает</text>
  </g>
  
  <!-- Exceptions -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="400" height="55" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">⚠️ Исключения (без НЕ не употребляются)</text>
    <text x="200" y="42" font-family="Arial, sans-serif" font-size="11" fill="#F57C00" text-anchor="middle">ненавидеть, негодовать, нездоровиться, недоумевать</text>
  </g>
  
  <!-- Check yourself -->
  <g transform="translate(100, 290)" font-family="Arial, sans-serif" font-size="11">
    <rect x="0" y="0" width="130" height="22" fill="#FFCDD2" rx="3"/>
    <text x="65" y="16" fill="#B71C1C" text-anchor="middle">❌ непишет</text>
    
    <rect x="150" y="0" width="130" height="22" fill="#C8E6C9" rx="3"/>
    <text x="215" y="16" fill="#2E7D32" text-anchor="middle">✓ не пишет</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>