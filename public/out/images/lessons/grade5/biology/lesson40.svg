<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="24" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Природные сообщества</text>
  <text x="250" y="37" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 40</text>
  <line x1="30" y1="43" x2="470" y2="43" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

  <!-- Forest layers (left side) -->
  <text x="115" y="58" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ярусы леса</text>

  <!-- Sky -->
  <rect x="20" y="62" width="190" height="28" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="0.5"/>

  <!-- Layer 1: Trees (canopy) -->
  <rect x="20" y="90" width="190" height="50" rx="0" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="30" y="100" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">I ярус — Деревья</text>
  <!-- Trees -->
  <rect x="40" y="108" width="6" height="30" fill="#795548" rx="1"/>
  <ellipse cx="43" cy="102" rx="15" ry="10" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  <rect x="90" y="105" width="5" height="33" fill="#795548" rx="1"/>
  <ellipse cx="92" cy="100" rx="13" ry="9" fill="#388E3C" stroke="#1B5E20" stroke-width="0.5"/>
  <rect x="145" y="108" width="6" height="30" fill="#795548" rx="1"/>
  <ellipse cx="148" cy="103" rx="14" ry="9" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  <rect x="185" y="106" width="4" height="32" fill="#795548" rx="1"/>
  <ellipse cx="187" cy="101" rx="10" ry="8" fill="#388E3C" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="30" y="135" font-family="Arial,sans-serif" font-size="5" fill="#666">дуб, берёза, ель (20-30 м)</text>

  <!-- Layer 2: Shrubs -->
  <rect x="20" y="140" width="190" height="35" rx="0" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="30" y="150" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">II ярус — Кустарники</text>
  <ellipse cx="55" cy="160" rx="15" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <ellipse cx="110" cy="162" rx="12" ry="7" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <ellipse cx="165" cy="160" rx="14" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="30" y="172" font-family="Arial,sans-serif" font-size="5" fill="#666">лещина, шиповник (1-5 м)</text>

  <!-- Layer 3: Herbs -->
  <rect x="20" y="175" width="190" height="30" rx="0" fill="#F1F8E9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="30" y="185" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">III ярус — Травы</text>
  <!-- Small herbs -->
  <line x1="50" y1="200" x2="50" y2="192" stroke="#66BB6A" stroke-width="1"/>
  <circle cx="50" cy="190" r="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="80" y1="200" x2="80" y2="194" stroke="#66BB6A" stroke-width="1"/>
  <circle cx="80" cy="192" r="2.5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="115" y1="200" x2="115" y2="193" stroke="#66BB6A" stroke-width="1"/>
  <circle cx="115" cy="191" r="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="150" y1="200" x2="150" y2="195" stroke="#66BB6A" stroke-width="1"/>
  <circle cx="150" cy="193" r="2.5" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.3"/>
  <text x="30" y="200" font-family="Arial,sans-serif" font-size="5" fill="#666">папоротник, кислица</text>

  <!-- Layer 4: Mosses -->
  <rect x="20" y="205" width="190" height="20" rx="0" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="30" y="217" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">IV ярус — Мхи</text>
  <text x="115" y="217" font-family="Arial,sans-serif" font-size="5" fill="#666">кукушкин лён, сфагнум</text>

  <!-- Layer 5: Underground -->
  <rect x="20" y="225" width="190" height="20" rx="0" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
  <text x="30" y="237" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">Подземный ярус</text>
  <text x="130" y="237" font-family="Arial,sans-serif" font-size="5" fill="#FFCCBC">корни, грибы, бактерии</text>

  <!-- Trophic levels (center) -->
  <text x="340" y="58" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Трофические уровни</text>

  <!-- Producers -->
  <rect x="270" y="65" width="140" height="28" rx="4" fill="#4CAF50" stroke="#1B5E20" stroke-width="1"/>
  <text x="340" y="78" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Продуценты (растения)</text>
  <text x="340" y="88" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Создают органику из CO₂ и H₂O</text>

  <!-- Arrow down -->
  <path d="M340 93 L340 100" fill="none" stroke="#1B5E20" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Consumers I -->
  <rect x="280" y="102" width="120" height="26" rx="4" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <text x="340" y="114" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Консументы I</text>
  <text x="340" y="124" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Травоядные (заяц, олень)</text>

  <!-- Arrow down -->
  <path d="M340 128 L340 135" fill="none" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Consumers II -->
  <rect x="285" y="137" width="110" height="26" rx="4" fill="#F44336" stroke="#B71C1C" stroke-width="1"/>
  <text x="340" y="149" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Консументы II</text>
  <text x="340" y="159" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Хищники (лиса, волк)</text>

  <!-- Arrow down -->
  <path d="M340 163 L340 170" fill="none" stroke="#B71C1C" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Consumers III -->
  <rect x="290" y="172" width="100" height="24" rx="4" fill="#9C27B0" stroke="#6A1B9A" stroke-width="1"/>
  <text x="340" y="183" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Консументы III</text>
  <text x="340" y="192" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Сверххищники (орёл)</text>

  <!-- Arrow down -->
  <path d="M340 196 L340 203" fill="none" stroke="#6A1B9A" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Decomposers -->
  <rect x="275" y="205" width="130" height="28" rx="4" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
  <text x="340" y="218" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Редуценты</text>
  <text x="340" y="228" font-family="Arial,sans-serif" font-size="5.5" fill="#FFCCBC" text-anchor="middle">Бактерии, грибы → минерализация</text>

  <!-- Ecological pyramid (right side) -->
  <text x="460" y="58" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Экологическая</text>
  <text x="460" y="68" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">пирамида</text>

  <!-- Pyramid levels (energy/biomass) -->
  <!-- Top: tertiary consumers -->
  <polygon points="460,80 445,110 475,110" fill="#9C27B0" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="460" y="103" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">III</text>

  <!-- Second: secondary consumers -->
  <polygon points="460,112 435,142 485,142" fill="#F44336" stroke="#B71C1C" stroke-width="0.8"/>
  <text x="460" y="136" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">II</text>

  <!-- Third: primary consumers -->
  <polygon points="460,144 425,174 495,174" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  <text x="460" y="168" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">I</text>

  <!-- Bottom: producers -->
  <polygon points="460,176 415,210 505,210" fill="#4CAF50" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="460" y="202" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Продуценты</text>

  <!-- Energy labels -->
  <text x="460" y="225" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Энергия: 100% → 10% → 1% → 0.1%</text>
  <text x="460" y="235" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Биомасса уменьшается</text>

  <!-- Bottom section: community types -->
  <text x="250" y="252" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Типы природных сообществ</text>

  <rect x="20" y="260" width="90" height="50" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="65" y="275" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Лес</text>
  <text x="65" y="285" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">деревья, кустарники</text>
  <text x="65" y="294" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">травы, мхи</text>
  <text x="65" y="303" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">ярусность</text>

  <rect x="118" y="260" width="90" height="50" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="163" y="275" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Луг</text>
  <text x="163" y="285" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">злаки, бобовые</text>
  <text x="163" y="294" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">насекомые, птицы</text>
  <text x="163" y="303" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">много света</text>

  <rect x="216" y="260" width="90" height="50" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="261" y="275" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle" font-weight="bold">Водоём</text>
  <text x="261" y="285" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">водоросли, рыбы</text>
  <text x="261" y="294" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">амфибии, моллюски</text>
  <text x="261" y="303" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">планктон</text>

  <rect x="314" y="260" width="90" height="50" rx="4" fill="#FFE0B2" stroke="#E65100" stroke-width="0.8"/>
  <text x="359" y="275" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">Степь</text>
  <text x="359" y="285" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">злаки, ковыль</text>
  <text x="359" y="294" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">суслики, орлы</text>
  <text x="359" y="303" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">засушливость</text>

  <rect x="412" y="260" width="70" height="50" rx="4" fill="#EFEBE9" stroke="#5D4037" stroke-width="0.8"/>
  <text x="447" y="275" font-family="Arial,sans-serif" font-size="6" fill="#3E2723" text-anchor="middle" font-weight="bold">Болото</text>
  <text x="447" y="285" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">мхи, осоки</text>
  <text x="447" y="294" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">лягушки, цапли</text>
  <text x="447" y="303" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">избыток воды</text>

  <!-- Key definitions -->
  <rect x="20" y="318" width="460" height="22" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.5"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Биоценоз — сообщество организмов • Биогеоценоз = биоценоз + экотоп (среда) • Сукцессия — смена сообществ</text>
  <text x="250" y="338" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">Агроценоз — искусственное сообщество (поле, сад) — мало видов, требует удобрений</text>

  <defs>
    <marker id="arrD" markerWidth="6" markerHeight="4" refX="3" refY="4" orient="auto">
      <path d="M0,0 L6,0 L3,4 Z" fill="#1B5E20"/>
    </marker>
  </defs>
</svg>