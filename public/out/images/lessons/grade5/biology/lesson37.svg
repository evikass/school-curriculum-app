<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="24" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Беспозвоночные животные</text>
  <text x="250" y="37" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 37</text>
  <line x1="30" y1="43" x2="470" y2="43" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

  <!-- 6 Phyla grid: 3 columns x 2 rows -->
  <!-- Type 1: Губки (Sponges) -->
  <rect x="20" y="50" width="150" height="140" rx="5" fill="white" stroke="#FF7043" stroke-width="1" opacity="0.85"/>
  <rect x="20" y="50" width="150" height="18" rx="5" fill="#FF7043"/>
  <text x="95" y="63" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Тип Губки</text>
  <!-- Sponge drawing -->
  <path d="M60 80 Q55 85 55 100 Q55 115 60 120 Q65 125 75 125 Q85 125 90 120 Q95 115 95 100 Q95 85 90 80 Q85 75 75 75 Q65 75 60 80Z" fill="#FFAB91" stroke="#E64A19" stroke-width="1"/>
  <!-- Pores -->
  <circle cx="70" cy="95" r="2" fill="#FFE0B2" stroke="#E64A19" stroke-width="0.3"/>
  <circle cx="82" cy="90" r="2" fill="#FFE0B2" stroke="#E64A19" stroke-width="0.3"/>
  <circle cx="75" cy="108" r="2.5" fill="#FFE0B2" stroke="#E64A19" stroke-width="0.3"/>
  <circle cx="85" cy="105" r="2" fill="#FFE0B2" stroke="#E64A19" stroke-width="0.3"/>
  <!-- Osculum -->
  <ellipse cx="75" cy="78" rx="5" ry="3" fill="#FFE0B2" stroke="#E64A19" stroke-width="0.5"/>
  <text x="75" y="80" font-family="Arial,sans-serif" font-size="3.5" fill="#E64A19" text-anchor="middle">оскулюм</text>
  <!-- Water flow arrows -->
  <path d="M55 100 L50 100" fill="none" stroke="#2196F3" stroke-width="0.5" marker-end="url(#arr)"/>
  <path d="M75 80 L75 72" fill="none" stroke="#90CAF9" stroke-width="0.5" marker-end="url(#arr)"/>
  <text x="95" y="140" font-family="Arial,sans-serif" font-size="5" fill="#333">• ~5000 видов</text>
  <text x="95" y="148" font-family="Arial,sans-serif" font-size="5" fill="#333">• Донные, прикреплённые</text>
  <text x="95" y="156" font-family="Arial,sans-serif" font-size="5" fill="#333">• Фильтраторы</text>
  <text x="95" y="164" font-family="Arial,sans-serif" font-size="5" fill="#333">• Двуслойные</text>
  <text x="95" y="172" font-family="Arial,sans-serif" font-size="5" fill="#333">• Без тканей и органов</text>
  <text x="95" y="180" font-family="Arial,sans-serif" font-size="5" fill="#E64A19">Пример: бадяга</text>

  <!-- Type 2: Кишечнополостные -->
  <rect x="175" y="50" width="150" height="140" rx="5" fill="white" stroke="#E91E63" stroke-width="1" opacity="0.85"/>
  <rect x="175" y="50" width="150" height="18" rx="5" fill="#E91E63"/>
  <text x="250" y="63" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Тип Кишечнополостные</text>
  <!-- Jellyfish -->
  <path d="M225 85 Q235 78 250 78 Q265 78 275 85 Q280 95 275 100 Q265 95 250 95 Q235 95 225 100 Q220 95 225 85Z" fill="#F48FB1" stroke="#C2185B" stroke-width="1"/>
  <!-- Tentacles -->
  <path d="M230 100 Q228 115 225 120" fill="none" stroke="#F48FB1" stroke-width="1"/>
  <path d="M240 100 Q238 118 240 125" fill="none" stroke="#F48FB1" stroke-width="1"/>
  <path d="M260 100 Q262 118 260 125" fill="none" stroke="#F48FB1" stroke-width="1"/>
  <path d="M270 100 Q272 115 275 120" fill="none" stroke="#F48FB1" stroke-width="1"/>
  <!-- Oral cavity -->
  <ellipse cx="250" cy="92" rx="6" ry="3" fill="#E91E63" stroke="#880E4F" stroke-width="0.5"/>
  <text x="250" y="140" font-family="Arial,sans-serif" font-size="5" fill="#333">• ~11 000 видов</text>
  <text x="250" y="148" font-family="Arial,sans-serif" font-size="5" fill="#333">• Медузы, гидры, кораллы</text>
  <text x="250" y="156" font-family="Arial,sans-serif" font-size="5" fill="#333">• Кишечная полость</text>
  <text x="250" y="164" font-family="Arial,sans-serif" font-size="5" fill="#333">• Стрекательные клетки</text>
  <text x="250" y="172" font-family="Arial,sans-serif" font-size="5" fill="#333">• Лучевая симметрия</text>
  <text x="250" y="180" font-family="Arial,sans-serif" font-size="5" fill="#C2185B">Пример: гидра, медуза</text>

  <!-- Type 3: Черви -->
  <rect x="330" y="50" width="150" height="140" rx="5" fill="white" stroke="#795548" stroke-width="1" opacity="0.85"/>
  <rect x="330" y="50" width="150" height="18" rx="5" fill="#795548"/>
  <text x="405" y="63" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Тип Черви</text>
  <!-- Earthworm -->
  <path d="M360 95 Q370 88 390 88 Q410 88 430 88 Q440 88 445 93 Q440 98 430 98 Q410 98 390 98 Q370 98 360 98 Q355 96 360 95Z" fill="#BCAAA4" stroke="#5D4037" stroke-width="1"/>
  <!-- Segments -->
  <line x1="375" y1="88" x2="375" y2="98" stroke="#8D6E63" stroke-width="0.3"/>
  <line x1="385" y1="88" x2="385" y2="98" stroke="#8D6E63" stroke-width="0.3"/>
  <line x1="395" y1="88" x2="395" y2="98" stroke="#8D6E63" stroke-width="0.3"/>
  <line x1="405" y1="88" x2="405" y2="98" stroke="#8D6E63" stroke-width="0.3"/>
  <line x1="415" y1="88" x2="415" y2="98" stroke="#8D6E63" stroke-width="0.3"/>
  <line x1="425" y1="88" x2="425" y2="98" stroke="#8D6E63" stroke-width="0.3"/>
  <!-- Clitellum -->
  <rect x="390" y="87" width="20" height="12" rx="2" fill="#D7CCC8" stroke="#8D6E63" stroke-width="0.5"/>
  <text x="405" y="140" font-family="Arial,sans-serif" font-size="5" fill="#333">• Плоские, круглые, кольчатые</text>
  <text x="405" y="148" font-family="Arial,sans-serif" font-size="5" fill="#333">• Двусторонняя симметрия</text>
  <text x="405" y="156" font-family="Arial,sans-serif" font-size="5" fill="#333">• 3 зародышевых листка</text>
  <text x="405" y="164" font-family="Arial,sans-serif" font-size="5" fill="#333">• Паразиты и свободножив.</text>
  <text x="405" y="172" font-family="Arial,sans-serif" font-size="5" fill="#333">• Кольчатые — сегментация</text>
  <text x="405" y="180" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">Пример: дождевой червь</text>

  <!-- Type 4: Моллюски -->
  <rect x="20" y="195" width="150" height="140" rx="5" fill="white" stroke="#9C27B0" stroke-width="1" opacity="0.85"/>
  <rect x="20" y="195" width="150" height="18" rx="5" fill="#9C27B0"/>
  <text x="95" y="208" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Тип Моллюски</text>
  <!-- Snail shell -->
  <path d="M65 230 Q75 220 85 225 Q95 230 90 240 Q85 248 75 250 Q65 250 62 242 Q60 235 65 230Z" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1"/>
  <path d="M75 225 Q80 222 85 225" fill="none" stroke="#7B1FA2" stroke-width="0.5"/>
  <path d="M70 232 Q75 228 80 232" fill="none" stroke="#7B1FA2" stroke-width="0.5"/>
  <!-- Body -->
  <path d="M62 242 Q55 248 50 245 Q45 242 42 238" fill="none" stroke="#CE93D8" stroke-width="2.5"/>
  <!-- Tentacles -->
  <line x1="45" y1="235" x2="38" y2="225" stroke="#CE93D8" stroke-width="1"/>
  <circle cx="37" cy="224" r="1.5" fill="#333"/>
  <line x1="48" y1="233" x2="43" y2="222" stroke="#CE93D8" stroke-width="1"/>
  <circle cx="42" cy="221" r="1.5" fill="#333"/>
  <text x="95" y="260" font-family="Arial,sans-serif" font-size="5" fill="#333">• ~130 000 видов</text>
  <text x="95" y="268" font-family="Arial,sans-serif" font-size="5" fill="#333">• Раковина (большинство)</text>
  <text x="95" y="276" font-family="Arial,sans-serif" font-size="5" fill="#333">• Мантия и мантийная полость</text>
  <text x="95" y="284" font-family="Arial,sans-serif" font-size="5" fill="#333">• Нога для движения</text>
  <text x="95" y="292" font-family="Arial,sans-serif" font-size="5" fill="#333">• Гаструподы, двустворчатые</text>
  <text x="95" y="300" font-family="Arial,sans-serif" font-size="5" fill="#333">• Головоногие (осьминоги)</text>
  <text x="95" y="310" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2">Пример: улитка, кальмар</text>

  <!-- Type 5: Членистоногие -->
  <rect x="175" y="195" width="150" height="140" rx="5" fill="white" stroke="#F44336" stroke-width="1" opacity="0.85"/>
  <rect x="175" y="195" width="150" height="18" rx="5" fill="#F44336"/>
  <text x="250" y="208" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Тип Членистоногие</text>
  <!-- Beetle/insect -->
  <ellipse cx="250" cy="235" rx="12" ry="7" fill="#EF9A9A" stroke="#C62828" stroke-width="0.8"/>
  <line x1="250" y1="228" x2="250" y2="242" stroke="#C62828" stroke-width="0.5"/>
  <ellipse cx="250" cy="222" rx="8" ry="6" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <!-- Antennae -->
  <path d="M245 218 L235 210" fill="none" stroke="#C62828" stroke-width="0.5"/>
  <path d="M255 218 L265 210" fill="none" stroke="#C62828" stroke-width="0.5"/>
  <!-- Legs -->
  <line x1="240" y1="230" x2="230" y2="238" stroke="#C62828" stroke-width="0.5"/>
  <line x1="240" y1="235" x2="228" y2="242" stroke="#C62828" stroke-width="0.5"/>
  <line x1="240" y1="240" x2="232" y2="250" stroke="#C62828" stroke-width="0.5"/>
  <line x1="260" y1="230" x2="270" y2="238" stroke="#C62828" stroke-width="0.5"/>
  <line x1="260" y1="235" x2="272" y2="242" stroke="#C62828" stroke-width="0.5"/>
  <line x1="260" y1="240" x2="268" y2="250" stroke="#C62828" stroke-width="0.5"/>
  <text x="250" y="260" font-family="Arial,sans-serif" font-size="5" fill="#333">• ~1 500 000 видов!</text>
  <text x="250" y="268" font-family="Arial,sans-serif" font-size="5" fill="#333">• Хитиновый экзоскелет</text>
  <text x="250" y="276" font-family="Arial,sans-serif" font-size="5" fill="#333">• Членистые конечности</text>
  <text x="250" y="284" font-family="Arial,sans-serif" font-size="5" fill="#333">• Насекомые, паукообразн.</text>
  <text x="250" y="292" font-family="Arial,sans-serif" font-size="5" fill="#333">• Ракообразные</text>
  <text x="250" y="300" font-family="Arial,sans-serif" font-size="5" fill="#333">• Линька при росте</text>
  <text x="250" y="310" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Пример: жук, паук, краб</text>

  <!-- Type 6: Иглокожие -->
  <rect x="330" y="195" width="150" height="140" rx="5" fill="white" stroke="#FF9800" stroke-width="1" opacity="0.85"/>
  <rect x="330" y="195" width="150" height="18" rx="5" fill="#FF9800"/>
  <text x="405" y="208" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Тип Иглокожие</text>
  <!-- Starfish -->
  <path d="M405 225 L395 230 L385 218 L378 228 L390 235 L378 242 L385 252 L395 240 L405 245 L415 240 L425 252 L432 242 L420 235 L432 228 L425 218 L415 230Z" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <!-- Central disc -->
  <circle cx="405" cy="235" r="5" fill="#FFE0B2" stroke="#E65100" stroke-width="0.5"/>
  <!-- Tube feet -->
  <line x1="395" y1="234" x2="390" y2="234" stroke="#E65100" stroke-width="0.3"/>
  <line x1="420" y1="234" x2="425" y2="234" stroke="#E65100" stroke-width="0.3"/>
  <text x="405" y="260" font-family="Arial,sans-serif" font-size="5" fill="#333">• ~7 000 видов</text>
  <text x="405" y="268" font-family="Arial,sans-serif" font-size="5" fill="#333">• Морские обитатели</text>
  <text x="405" y="276" font-family="Arial,sans-serif" font-size="5" fill="#333">• Лучевая (5-лучевая) симм.</text>
  <text x="405" y="284" font-family="Arial,sans-serif" font-size="5" fill="#333">• Известковый скелет</text>
  <text x="405" y="292" font-family="Arial,sans-serif" font-size="5" fill="#333">• Амбулакральная система</text>
  <text x="405" y="300" font-family="Arial,sans-serif" font-size="5" fill="#333">• Регенерация конечностей</text>
  <text x="405" y="310" font-family="Arial,sans-serif" font-size="5" fill="#E65100">Пример: морская звезда</text>
</svg>