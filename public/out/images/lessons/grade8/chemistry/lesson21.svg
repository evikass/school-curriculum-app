<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="ionGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="electronGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#10b981">Металлическая связь</text>
  <line x1="250" y1="52" x2="550" y2="52" stroke="#0d9488" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Metal Lattice Section -->
  <text x="280" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a7f3d0">Кристаллическая решётка металла</text>

  <!-- Electron gas cloud (background) -->
  <ellipse cx="280" cy="220" rx="210" ry="140" fill="#10b981" opacity="0.06" filter="url(#softGlow)"/>
  <ellipse cx="280" cy="220" rx="180" ry="120" fill="#14b8a6" opacity="0.08"/>

  <!-- Label: Электронный газ -->
  <text x="280" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#14b8a6">«Электронный газ»</text>
  <text x="280" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5eead4">обобществлённые электроны</text>

  <!-- Row 1 of ions -->
  <circle cx="140" cy="140" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="140" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="140" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <circle cx="220" cy="140" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="220" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="220" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <circle cx="300" cy="140" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="300" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="300" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <circle cx="380" cy="140" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="380" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="380" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <!-- Row 2 of ions -->
  <circle cx="140" cy="230" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="140" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="140" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <circle cx="220" cy="230" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="220" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="220" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <circle cx="300" cy="230" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="300" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="300" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <circle cx="380" cy="230" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="380" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="380" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <!-- Row 3 of ions -->
  <circle cx="140" cy="320" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="140" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="140" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <circle cx="220" cy="320" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="220" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="220" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <circle cx="300" cy="320" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="300" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="300" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <circle cx="380" cy="320" r="22" fill="url(#ionGrad)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="380" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Me</text>
  <text x="380" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">⁺</text>

  <!-- Delocalized electrons (e⁻) floating between ions -->
  <circle cx="180" cy="170" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="180" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="260" cy="185" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="260" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="340" cy="165" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="340" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="160" cy="260" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="160" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="250" cy="275" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="250" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="350" cy="255" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="350" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="190" cy="350" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="190" y="354" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="270" cy="345" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="270" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="340" cy="355" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="340" y="359" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="115" cy="195" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="115" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <circle cx="400" cy="200" r="7" fill="url(#electronGrad)" filter="url(#glow)"/>
  <text x="400" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <!-- Properties Section -->
  <text x="610" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#10b981">Свойства металлов</text>

  <!-- Conductivity icon -->
  <rect x="520" y="100" width="180" height="80" rx="10" fill="#0f766e" fill-opacity="0.3" stroke="#0d9488" stroke-width="1"/>
  <!-- Lightning bolt -->
  <polygon points="570,115 580,115 575,130 585,130 565,155 572,137 562,137" fill="#14b8a6" filter="url(#glow)"/>
  <text x="630" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f0fdf4">Электро-</text>
  <text x="630" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f0fdf4">проводность</text>
  <text x="610" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5eead4">электроны переносят заряд</text>

  <!-- Malleability icon -->
  <rect x="520" y="195" width="180" height="80" rx="10" fill="#0f766e" fill-opacity="0.3" stroke="#0d9488" stroke-width="1"/>
  <!-- Hammer icon -->
  <rect x="555" y="215" width="30" height="12" rx="3" fill="#14b8a6"/>
  <rect x="567" y="227" width="6" height="20" rx="1" fill="#0d9488"/>
  <rect x="555" y="247" width="30" height="6" rx="2" fill="#10b981" opacity="0.5"/>
  <text x="640" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f0fdf4">Пластич-</text>
  <text x="640" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f0fdf4">ность</text>
  <text x="610" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5eead4">ионы смещаются без разрыва</text>

  <!-- Luster icon -->
  <rect x="520" y="290" width="180" height="80" rx="10" fill="#0f766e" fill-opacity="0.3" stroke="#0d9488" stroke-width="1"/>
  <!-- Shine/star icon -->
  <polygon points="570,310 573,320 583,320 575,326 578,336 570,330 562,336 565,326 557,320 567,320" fill="#14b8a6" filter="url(#glow)"/>
  <text x="640" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f0fdf4">Металлический</text>
  <text x="640" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f0fdf4">блеск</text>
  <text x="610" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#5eead4">отражение света</text>

  <!-- Bottom definition -->
  <rect x="520" y="390" width="240" height="70" rx="10" fill="#059669" fill-opacity="0.15" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="640" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a7f3d0">Металлическая связь —</text>
  <text x="640" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ccfbf1">связь между атомами в</text>
  <text x="640" y="449" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ccfbf1">металлах за счёт электронного газа</text>

  <!-- Lesson number -->
  <text x="780" y="490" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" opacity="0.6">Урок 21</text>
</svg>