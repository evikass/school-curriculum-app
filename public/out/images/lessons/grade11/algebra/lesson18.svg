<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Равносильные уравнения и неравенства</text>

  <!-- Left card: Equivalence symbol -->
  <rect x="15" y="52" width="225" height="100" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="127" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Равносильность</text>

  <!-- Equation boxes with double arrow -->
  <rect x="25" y="78" width="85" height="30" rx="6" fill="#E3F2FD"/>
  <text x="67" y="97" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">f(x)=g(x)</text>

  <text x="130" y="98" text-anchor="middle" fill="#2E7D32" font-size="16" font-weight="bold">&lt;=&gt;</text>

  <rect x="150" y="78" width="85" height="30" rx="6" fill="#E8F5E9"/>
  <text x="192" y="97" text-anchor="middle" fill="#2E7D32" font-size="9" font-weight="bold">h(x)=k(x)</text>

  <!-- Definition pill -->
  <rect x="25" y="115" width="205" height="28" rx="8" fill="#0D47A1"/>
  <text x="127" y="128" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Равносильны = одинаковые множества решений</text>
  <text x="127" y="139" text-anchor="middle" fill="#90CAF9" font-size="7">Каждый корень одного = корень другого</text>

  <!-- Right card: Equivalent transformations table -->
  <rect x="250" y="52" width="235" height="100" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="367" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Равносильные преобразования</text>

  <!-- Table rows -->
  <rect x="260" y="78" width="215" height="14" rx="3" fill="#E8F5E9"/>
  <text x="367" y="89" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">+ c к обеим частям (равносильно)</text>

  <rect x="260" y="95" width="215" height="14" rx="3" fill="#E8F5E9"/>
  <text x="367" y="106" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">* c (c != 0) на обе части (равносильно)</text>

  <rect x="260" y="112" width="215" height="14" rx="3" fill="#E8F5E9"/>
  <text x="367" y="123" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">Перенос слагаемого с изменением знака</text>

  <rect x="260" y="129" width="215" height="14" rx="3" fill="#E8F5E9"/>
  <text x="367" y="140" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">Замена тождественно равным выражением</text>

  <!-- Bottom-left card: Warning - Lost roots -->
  <rect x="15" y="160" width="225" height="75" rx="10" fill="white" filter="url(#shadow1)"/>
  <!-- Red warning header -->
  <rect x="15" y="160" width="225" height="22" rx="10" fill="#E53935"/>
  <rect x="15" y="172" width="225" height="10" fill="#E53935"/>
  <text x="127" y="176" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Потеря корней!</text>

  <rect x="25" y="188" width="205" height="14" rx="4" fill="#FFEBEE"/>
  <text x="127" y="199" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">Деление на выражение, обращающееся в 0</text>

  <rect x="25" y="205" width="205" height="14" rx="4" fill="#FFEBEE"/>
  <text x="127" y="216" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">Сужение ОДЗ при преобразовании</text>

  <!-- Bottom-right card: Warning - Extraneous roots -->
  <rect x="250" y="160" width="235" height="75" rx="10" fill="white" filter="url(#shadow1)"/>
  <!-- Orange warning header -->
  <rect x="250" y="160" width="235" height="22" rx="10" fill="#E65100"/>
  <rect x="250" y="172" width="235" height="10" fill="#E65100"/>
  <text x="367" y="176" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Посторонние корни</text>

  <rect x="260" y="188" width="215" height="14" rx="4" fill="#FFF3E0"/>
  <text x="367" y="199" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">Возведение в чётную степень</text>

  <rect x="260" y="205" width="215" height="14" rx="4" fill="#FFF3E0"/>
  <text x="367" y="216" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">Умножение на выражение с переменной</text>

  <!-- Bottom card: ODZ and rule -->
  <rect x="15" y="243" width="470" height="75" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="261" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Правила равносильных переходов</text>

  <rect x="25" y="268" width="220" height="16" rx="5" fill="#E8F5E9"/>
  <text x="135" y="280" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">Равносильный переход: сохраняет решения</text>

  <rect x="255" y="268" width="220" height="16" rx="5" fill="#FFF3E0"/>
  <text x="365" y="280" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">Следствие: может добавить корни</text>

  <rect x="25" y="290" width="450" height="20" rx="8" fill="#0D47A1"/>
  <text x="250" y="304" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Правило: предпочитай равносильные переходы; если следствие - проверяй корни!</text>

  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Равносильность - ключ к правильному решению уравнений</text>
</svg>