<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Возрастание и убывание функции</text>
  <!-- Axes -->
  <line x1="50" y1="230" x2="470" y2="230" stroke="#90CAF9" stroke-width="1"/>
  <line x1="70" y1="65" x2="70" y2="245" stroke="#90CAF9" stroke-width="1"/>
  <!-- Curve with colored regions -->
  <path d="M 70 240 Q 100 230, 130 170 Q 155 130, 175 115" fill="none" stroke="#2E7D32" stroke-width="3"/>
  <path d="M 175 115 Q 195 100, 220 120 Q 245 145, 270 170" fill="none" stroke="#C62828" stroke-width="3"/>
  <path d="M 270 170 Q 300 200, 330 160 Q 370 100, 440 70" fill="none" stroke="#2E7D32" stroke-width="3"/>
  <!-- Critical points -->
  <circle cx="175" cy="115" r="6" fill="#0D47A1" stroke="white" stroke-width="2"/>
  <circle cx="270" cy="170" r="6" fill="#0D47A1" stroke="white" stroke-width="2"/>
  <text x="175" y="105" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">x1</text>
  <text x="270" y="160" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">x2</text>
  <!-- f'(x) > 
  <text x="120" y="150" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="bold">f'(x) &gt; 0</text>
  <text x="120" y="165" text-anchor="middle" fill="#2E7D32" font-size="10">возрастает</text>
  <text x="380" y="115" text-anchor="middle" fill="#2E7D32" font-size="12" font-weight="bold">f'(x) &gt; 0</text>
  <text x="380" y="130" text-anchor="middle" fill="#2E7D32" font-size="10">возрастает</text>
  <!-- f'(x) < 0 label -->
  <text x="222" y="140" text-anchor="middle" fill="#C62828" font-size="12" font-weight="bold">f'(x) &lt; 0</text>
  <text x="222" y="155" text-anchor="middle" fill="#C62828" font-size="10">убывает</text>
  <!-- Sign chart below -->
  <rect x="50" y="248" width="420" height="42" rx="10" fill="white" stroke="#1565C0" stroke-width="1" filter="url(#shadow1)"/>
  <line x1="70" y1="265" x2="450" y2="265" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="120" y="262" text-anchor="middle" fill="#2E7D32" font-size="14" font-weight="bold">+</text>
  <text x="220" y="262" text-anchor="middle" fill="#C62828" font-size="14" font-weight="bold">-</text>
  <text x="360" y="262" text-anchor="middle" fill="#2E7D32" font-size="14" font-weight="bold">+</text>
  <circle cx="175" cy="265" r="3" fill="#0D47A1"/>
  <circle cx="270" cy="265" r="3" fill="#0D47A1"/>
  <text x="175" y="282" text-anchor="middle" fill="#0D47A1" font-size="9">x1</text>
  <text x="270" y="282" text-anchor="middle" fill="#0D47A1" font-size="9">x2</text>
  <!-- Key theorems card -->
  <rect x="15" y="52" width="220" height="55" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="125" y="68" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Достаточные признаки</text>
  <text x="25" y="82" fill="#2E7D32" font-size="10">f'(x) &gt; 0 =&gt; f(x) возрастает</text>
  <text x="25" y="97" fill="#C62828" font-size="10">f'(x) &lt; 0 =&gt; f(x) убывает</text>
  <!-- Critical points definition pill -->
  <rect x="250" y="52" width="235" height="55" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="367" y="68" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Критические точки</text>
  <text x="260" y="82" fill="#1565C0" font-size="10">f'(x) = 0 или f'(x) не существует</text>
  <text x="260" y="97" fill="#42A5F5" font-size="9">кандидаты на смену монотонности</text>
  <!-- Algorithm pill -->
  <rect x="100" y="300" width="300" height="22" rx="11" fill="#1976D2"/>
  <text x="250" y="315" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Алгоритм: f'(x) - крит. точки - знаки - ответ</text>
  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Знак производной определяет монотонность функции</text>
</svg>