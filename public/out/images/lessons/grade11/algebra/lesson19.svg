<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Иррациональные уравнения и неравенства</text>

  <!-- Left card: Radical equation with squaring steps -->
  <rect x="15" y="52" width="225" height="140" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="127" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Метод возведения в степень</text>

  <!-- Step 1: Original equation -->
  <rect x="25" y="78" width="205" height="18" rx="4" fill="#E3F2FD"/>
  <text x="127" y="91" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">sqrt(f(x)) = g(x)</text>

  <!-- Arrow down -->
  <line x1="127" y1="97" x2="127" y2="105" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="155" y="103" fill="#0D47A1" font-size="7">возводим в квадрат</text>

  <!-- Step 2: After squaring -->
  <rect x="25" y="107" width="205" height="18" rx="4" fill="#FFF3E0"/>
  <text x="127" y="120" text-anchor="middle" fill="#E65100" font-size="8" font-weight="bold">f(x) = g(x)^2  (следствие!)</text>

  <!-- Arrow down -->
  <line x1="127" y1="126" x2="127" y2="134" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="155" y="132" fill="#2E7D32" font-size="7">+ условие</text>

  <!-- Step 3: Equiv transition -->
  <rect x="25" y="136" width="205" height="20" rx="4" fill="#E8F5E9"/>
  <text x="127" y="150" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">f(x) = g(x)^2  И  g(x) &gt;= 0</text>

  <!-- Checkmark / X for verification -->
  <rect x="25" y="162" width="100" height="18" rx="8" fill="#E8F5E9"/>
  <text x="75" y="175" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">V Проверка</text>

  <rect x="130" y="162" width="100" height="18" rx="8" fill="#FFEBEE"/>
  <text x="180" y="175" text-anchor="middle" fill="#C62828" font-size="8" font-weight="bold">X Посторонние</text>

  <!-- Right card: Inequality schemes -->
  <rect x="250" y="52" width="235" height="140" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="367" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Схемы неравенств</text>

  <!-- Scheme 1: sqrt(f) > g -->
  <rect x="260" y="78" width="215" height="28" rx="5" fill="#E3F2FD"/>
  <text x="367" y="90" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">sqrt(f(x)) &gt; g(x):</text>
  <text x="367" y="101" text-anchor="middle" fill="#0D47A1" font-size="6">[g&lt;0 и f&gt;=0] ИЛИ [g&gt;=0 и f&gt;g^2]</text>

  <!-- Scheme 2: sqrt(f) < g -->
  <rect x="260" y="112" width="215" height="28" rx="5" fill="#FFF3E0"/>
  <text x="367" y="124" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">sqrt(f(x)) &lt; g(x):</text>
  <text x="367" y="135" text-anchor="middle" fill="#E65100" font-size="6">f&gt;=0 И g&gt;0 И f&lt;g^2</text>

  <!-- ODZ reminder -->
  <rect x="260" y="148" width="215" height="16" rx="6" fill="#FFEBEE"/>
  <text x="367" y="160" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">ОДЗ: подкоренное выражение &gt;= 0</text>

  <!-- Interval diagram -->
  <rect x="260" y="168" width="215" height="16" rx="6" fill="#F3E5F5"/>
  <text x="367" y="180" text-anchor="middle" fill="#6A1B9A" font-size="7" font-weight="bold">Разбивать на случаи по знаку g(x)!</text>

  <!-- Bottom card: Examples -->
  <rect x="15" y="200" width="470" height="118" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="218" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Примеры решения</text>

  <!-- Example 1 -->
  <rect x="25" y="225" width="220" height="32" rx="5" fill="#E3F2FD"/>
  <text x="135" y="237" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">sqrt(3x-2) = 4</text>
  <text x="135" y="249" text-anchor="middle" fill="#0D47A1" font-size="7">3x - 2 = 16, x = 6. Проверка: V</text>

  <!-- Example 2 -->
  <rect x="255" y="225" width="220" height="32" rx="5" fill="#E8F5E9"/>
  <text x="365" y="237" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">sqrt(x) = -1</text>
  <text x="365" y="249" text-anchor="middle" fill="#2E7D32" font-size="7">x = 1, но sqrt(1) = 1 != -1. X</text>

  <!-- Example 3 -->
  <rect x="25" y="263" width="220" height="32" rx="5" fill="#FFF3E0"/>
  <text x="135" y="275" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">sqrt(x) &lt; 3</text>
  <text x="135" y="287" text-anchor="middle" fill="#E65100" font-size="7">0 &lt;= x &lt; 9 (ОДЗ + возведение)</text>

  <!-- Example 4 -->
  <rect x="255" y="263" width="220" height="32" rx="5" fill="#F3E5F5"/>
  <text x="365" y="275" text-anchor="middle" fill="#6A1B9A" font-size="7" font-weight="bold">sqrt(x+1) = x - 1</text>
  <text x="365" y="287" text-anchor="middle" fill="#6A1B9A" font-size="7">x+1=(x-1)^2 И x&gt;=1: x = корень(3)</text>

  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Возведи в степень + проверка = решение иррационального уравнения</text>
</svg>