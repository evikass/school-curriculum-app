<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#D7CCC8"/>
    </linearGradient>
    <linearGradient id="cylGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#795548" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#795548" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#795548" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4E342E" stroke-width="2.5"/>
  <text x="250" y="28" font-size="13" font-weight="bold" fill="#3E2723" text-anchor="middle" font-family="serif">Объём прямой призмы и цилиндра</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 13</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#795548" stroke-width="1" opacity="0.3"/>

  <!-- 3D Prism Panel -->
  <rect x="15" y="58" width="220" height="195" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1.2"/>
  <text x="125" y="74" font-size="10" font-weight="bold" fill="#4E342E" text-anchor="middle">Прямая призма</text>
  <!-- Front face (triangle) -->
  <polygon points="65,220 65,130 130,130" fill="#795548" opacity="0.08" stroke="#4E342E" stroke-width="1.5"/>
  <!-- Top face -->
  <polygon points="65,130 130,130 195,95 130,95" fill="#795548" opacity="0.05" stroke="#4E342E" stroke-width="1.2"/>
  <!-- Right face -->
  <polygon points="130,130 195,95 195,185 130,220" fill="#4E342E" opacity="0.03" stroke="#4E342E" stroke-width="1.2"/>
  <!-- Hidden edges -->
  <line x1="65" y1="220" x2="130" y2="185" stroke="#4E342E" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="130" y1="185" x2="195" y2="185" stroke="#4E342E" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="130" y1="185" x2="130" y2="95" stroke="#4E342E" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Height -->
  <line x1="48" y1="220" x2="48" y2="130" stroke="#1565C0" stroke-width="1.5"/>
  <text x="32" y="178" font-size="9" fill="#1565C0" font-weight="bold" font-style="italic">h</text>
  <!-- Base label -->
  <text x="85" y="185" font-size="9" fill="#795548" font-weight="bold">S<sub>осн</sub></text>

  <!-- 3D Cylinder Panel -->
  <rect x="245" y="58" width="242" height="120" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1.2"/>
  <text x="366" y="74" font-size="10" font-weight="bold" fill="#4E342E" text-anchor="middle">Цилиндр</text>
  <!-- Bottom ellipse -->
  <ellipse cx="360" cy="155" rx="55" ry="14" fill="url(#cylGrad)" stroke="#4E342E" stroke-width="1.3"/>
  <path d="M305,155 A55,14 0 0,0 415,155" fill="none" stroke="#4E342E" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Sides -->
  <line x1="305" y1="155" x2="305" y2="95" stroke="#4E342E" stroke-width="1.5"/>
  <line x1="415" y1="155" x2="415" y2="95" stroke="#4E342E" stroke-width="1.5"/>
  <!-- Top ellipse -->
  <ellipse cx="360" cy="95" rx="55" ry="14" fill="url(#cylGrad)" stroke="#4E342E" stroke-width="1.5"/>
  <!-- Radius -->
  <line x1="360" y1="95" x2="415" y2="95" stroke="#C62828" stroke-width="1.2"/>
  <text x="385" y="92" font-size="8" fill="#C62828" font-weight="bold">R</text>
  <!-- Height -->
  <text x="290" y="128" font-size="9" fill="#1565C0" font-weight="bold">h</text>

  <!-- Formulas Panel -->
  <rect x="245" y="185" width="242" height="68" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1.2"/>
  <text x="366" y="201" font-size="10" font-weight="bold" fill="#4E342E" text-anchor="middle">Формулы объёма</text>
  <rect x="255" y="208" width="112" height="22" rx="3" fill="#795548" opacity="0.06"/>
  <text x="311" y="223" font-size="10" fill="#4E342E" font-weight="bold" text-anchor="middle">V = S<sub>осн</sub>&#x00B7;h</text>
  <rect x="375" y="208" width="102" height="22" rx="3" fill="#795548" opacity="0.06"/>
  <text x="426" y="223" font-size="10" fill="#4E342E" font-weight="bold" text-anchor="middle">V = &#x03C0;R&#x00B2;h</text>
  <text x="366" y="246" font-size="8.5" fill="#666" text-anchor="middle">Призма          Цилиндр</text>

  <!-- Cavalieri Panel -->
  <rect x="15" y="260" width="470" height="50" rx="6" fill="white" opacity="0.88" stroke="#795548" stroke-width="1"/>
  <text x="250" y="276" font-size="10" font-weight="bold" fill="#4E342E" text-anchor="middle">Принцип Кавальери</text>
  <text x="250" y="293" font-size="9" fill="#333" text-anchor="middle">Если два тела заключены между параллельными плоскостями и сечения равны, то V&#x2081;=V&#x2082;</text>
  <!-- Two shapes with same cross-section -->
  <rect x="50" y="275" width="35" height="25" rx="2" fill="#795548" opacity="0.1" stroke="#795548" stroke-width="0.8"/>
  <ellipse cx="435" cy="287" rx="18" ry="12" fill="#795548" opacity="0.1" stroke="#795548" stroke-width="0.8"/>
  <text x="67" y="296" font-size="7" fill="#795548">S<sub>1</sub></text>
  <text x="435" y="296" font-size="7" fill="#795548">S<sub>2</sub></text>
  <text x="67" y="285" font-size="7" fill="#795548">=</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#4E342E" opacity="0.85"/>
  <text x="250" y="336" font-size="10" fill="white" text-anchor="middle" font-weight="bold">V<sub>призмы</sub>=S<sub>осн</sub>&#x00B7;h;   V<sub>цилиндра</sub>=&#x03C0;R&#x00B2;h;   Принцип Кавальери</text>
</svg>