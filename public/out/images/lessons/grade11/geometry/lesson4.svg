<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <marker id="arrO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="250" y="28" font-size="13" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="serif">Вычисление углов между прямыми и плоскостями</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 4</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#F57F17" stroke-width="1" opacity="0.3"/>

  <!-- Angle between two lines Panel -->
  <rect x="15" y="58" width="152" height="160" rx="6" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="91" y="73" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Угол между прямыми</text>
  <!-- Two lines -->
  <line x1="30" y1="155" x2="140" y2="95" stroke="#1565C0" stroke-width="2" marker-end="url(#arrO)"/>
  <line x1="30" y1="155" x2="145" y2="160" stroke="#C62828" stroke-width="2" marker-end="url(#arrO)"/>
  <path d="M58,147 A25,25 0 0,1 60,135" fill="none" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="62" y="143" font-size="9" fill="#E65100" font-weight="bold">&#x03C6;</text>
  <circle cx="30" cy="155" r="2" fill="#333"/>
  <text x="20" y="195" font-size="8" fill="#333" font-style="italic">a = (l&#x2081;,m&#x2081;,n&#x2081;)</text>
  <text x="20" y="208" font-size="8" fill="#333" font-style="italic">b = (l&#x2082;,m&#x2082;,n&#x2082;)</text>

  <!-- Angle between line and plane Panel -->
  <rect x="175" y="58" width="152" height="160" rx="6" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="251" y="73" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Прямая и плоскость</text>
  <!-- Plane -->
  <rect x="200" y="140" width="110" height="55" rx="2" fill="#F57F17" opacity="0.12" stroke="#E65100" stroke-width="1"/>
  <text x="255" y="198" font-size="7" fill="#E65100" font-style="italic">&#x03B1;</text>
  <!-- Line through plane -->
  <line x1="225" y1="90" x2="265" y2="180" stroke="#1565C0" stroke-width="2" marker-end="url(#arrO)"/>
  <text x="212" y="88" font-size="8" fill="#1565C0" font-weight="bold">l</text>
  <!-- Normal -->
  <line x1="255" y1="165" x2="255" y2="100" stroke="#C62828" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrO)"/>
  <text x="260" y="105" font-size="8" fill="#C62828" font-weight="bold">n</text>
  <!-- Angle -->
  <path d="M250,170 A18,18 0 0,0 252,155" fill="none" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="240" y="160" font-size="8" fill="#E65100" font-weight="bold">&#x03B8;</text>
  <text x="185" y="210" font-size="8" fill="#333">&#x03B8; = 90&#x00B0; - &#x03C6;(l,n)</text>

  <!-- Angle between two planes Panel -->
  <rect x="335" y="58" width="152" height="160" rx="6" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="411" y="73" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Между плоскостями</text>
  <!-- Two planes -->
  <path d="M370,130 L430,130 L450,175 L380,175 Z" fill="#F57F17" opacity="0.1" stroke="#E65100" stroke-width="1"/>
  <path d="M370,130 L420,110 L460,155 L430,130" fill="#1565C0" opacity="0.08" stroke="#1565C0" stroke-width="1"/>
  <!-- Normals -->
  <line x1="400" y1="150" x2="400" y2="95" stroke="#C62828" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrO)"/>
  <text x="405" y="95" font-size="7" fill="#C62828" font-weight="bold">n&#x2081;</text>
  <line x1="420" y1="130" x2="445" y2="100" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrO)"/>
  <text x="448" y="98" font-size="7" fill="#2E7D32" font-weight="bold">n&#x2082;</text>
  <path d="M410,105 A12,12 0 0,1 435,103" fill="none" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="420" y="98" font-size="8" fill="#E65100" font-weight="bold">&#x03C6;</text>
  <text x="350" y="210" font-size="8" fill="#333">&#x03C6; = &#x2220;(n&#x2081;, n&#x2082;)</text>

  <!-- Formula Panel -->
  <rect x="15" y="225" width="220" height="85" rx="6" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="125" y="241" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Формулы</text>
  <text x="25" y="257" font-size="8.5" fill="#333">cos&#x03C6; = |a&#x00B7;b|/(|a|&#x00B7;|b|)</text>
  <text x="25" y="272" font-size="8.5" fill="#333">sin&#x03B8; = |a&#x00B7;n|/(|a|&#x00B7;|n|)</text>
  <text x="25" y="287" font-size="8.5" fill="#333">cos&#x03C6; = |n&#x2081;&#x00B7;n&#x2082;|/(|n&#x2081;|&#x00B7;|n&#x2082;|)</text>
  <text x="25" y="303" font-size="8" fill="#C62828">0 &#x2264; &#x03C6; &#x2264; 90&#x00B0;</text>

  <!-- Direction vectors panel -->
  <rect x="245" y="225" width="242" height="85" rx="6" fill="white" opacity="0.88" stroke="#F57F17" stroke-width="1"/>
  <text x="366" y="241" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Направляющие векторы</text>
  <text x="255" y="258" font-size="8.5" fill="#333">Прямая: направляющий вектор d</text>
  <text x="255" y="273" font-size="8.5" fill="#333">Плоскость: нормальный вектор n</text>
  <text x="255" y="290" font-size="8.5" fill="#1565C0" font-weight="bold">l &#x22A5; &#x03B1; &#x21D4; d &#x2225; n</text>
  <text x="255" y="303" font-size="8.5" fill="#C62828" font-weight="bold">&#x03B1; &#x2225; &#x03B2; &#x21D4; n&#x2081; &#x2225; n&#x2082;</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#E65100" opacity="0.85"/>
  <text x="250" y="336" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold">cos&#x03C6;=|a&#x00B7;b|/(|a||b|);  sin&#x03B8;=|a&#x00B7;n|/(|a||n|);  cos&#x03C8;=|n&#x2081;&#x00B7;n&#x2082;|/(|n&#x2081;||n&#x2082;|)</text>
</svg>