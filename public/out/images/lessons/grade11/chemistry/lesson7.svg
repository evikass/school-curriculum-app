<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Каучуки и резины</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Natural rubber card -->
<rect x="12" y="58" width="235" height="90" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
<text x="130" y="75" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Натуральный каучук</text>
<text x="22" y="90" font-family="monospace" font-size="8" fill="#333">Мономер: изопрен</text>
<text x="22" y="103" font-family="monospace" font-size="8" fill="#2E7D32">n CH2=C(CH3)-CH=CH2</text>
<text x="22" y="118" font-family="Arial,sans-serif" font-size="8" fill="#555">цис-1,4-полиизопрен</text>
<text x="22" y="131" font-family="Arial,sans-serif" font-size="8" fill="#555">Эластичный, резина</text>
<text x="22" y="141" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Источник: сок гевеи (каучуконосы)</text>

<!-- Gutta-percha card -->
<rect x="258" y="58" width="230" height="90" rx="8" fill="white" stroke="#795548" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="75" font-family="Arial,sans-serif" font-size="10" fill="#5D4037" text-anchor="middle" font-weight="bold">Гуттаперча</text>
<text x="268" y="90" font-family="monospace" font-size="8" fill="#333">Тот же мономер: изопрен</text>
<text x="268" y="103" font-family="monospace" font-size="8" fill="#795548">транс-1,4-полиизопрен</text>
<text x="268" y="118" font-family="Arial,sans-serif" font-size="8" fill="#555">Жёсткая, хрупкая</text>
<text x="268" y="131" font-family="Arial,sans-serif" font-size="8" fill="#555">Применение: стоматология</text>

<!-- Vulcanization -->
<rect x="12" y="160" width="235" height="80" rx="8" fill="white" stroke="#FF9800" stroke-width="1.5" filter="url(#sh)"/>
<text x="130" y="178" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Вулканизация</text>
<text x="22" y="193" font-family="Arial,sans-serif" font-size="8" fill="#333">Сшивка серой (S):</text>
<text x="22" y="206" font-family="Arial,sans-serif" font-size="8" fill="#333">Мягкая резина: 2-5% S</text>
<text x="22" y="219" font-family="Arial,sans-serif" font-size="8" fill="#333">Эбонит: 30% S</text>
<text x="22" y="232" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Вулканизированный каучук = резина</text>

<!-- Synthetic rubber -->
<rect x="258" y="160" width="230" height="80" rx="8" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="178" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Синтетический каучук</text>
<text x="268" y="193" font-family="Arial,sans-serif" font-size="8" fill="#333">Реакция Лебедева (1932):</text>
<text x="268" y="206" font-family="monospace" font-size="7" fill="#333">2 C2H5OH -> CH2=CH-CH=CH2</text>
<text x="268" y="219" font-family="Arial,sans-serif" font-size="7" fill="#555">Катализатор: ZnO/Al2O3, 450-500 C</text>
<text x="268" y="232" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">С.В. Лебедев — первый промышленный синтетический каучук</text>

<!-- Applications -->
<rect x="12" y="252" width="476" height="60" rx="8" fill="white" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="250" y="270" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Применение резин</text>
<rect x="20" y="278" width="70" height="20" rx="8" fill="#2E7D32"/>
<text x="55" y="292" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Шины</text>
<rect x="96" y="278" width="75" height="20" rx="8" fill="#388E3C"/>
<text x="133" y="292" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Прокладки</text>
<rect x="177" y="278" width="75" height="20" rx="8" fill="#43A047"/>
<text x="214" y="292" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Обувь</text>
<rect x="258" y="278" width="75" height="20" rx="8" fill="#4CAF50"/>
<text x="295" y="292" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Рукава</text>
<rect x="339" y="278" width="75" height="20" rx="8" fill="#66BB6A"/>
<text x="376" y="292" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Изоляция</text>
<rect x="420" y="278" width="60" height="20" rx="8" fill="#81C784"/>
<text x="450" y="292" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Клеи</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>