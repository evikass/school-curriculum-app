<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="pill1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="50%" stop-color="#E53935"/>
      <stop offset="50%" stop-color="white"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="50%" stop-color="#1E88E5"/>
      <stop offset="50%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <linearGradient id="aspirinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <!-- Title bar -->
  <rect width="500" height="44" fill="#1B5E20" rx="8"/>
  <rect y="20" width="500" height="24" fill="#1B5E20"/>
  <text x="250" y="29" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="15" font-weight="bold">Лекарственные вещества и их классификация</text>

  <!-- Drug classification cards -->
  <!-- Card 1: Analgesics -->
  <rect x="15" y="55" width="150" height="55" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <rect x="15" y="55" width="150" height="20" rx="10" fill="#2E7D32"/>
  <rect x="15" y="65" width="150" height="10" fill="#2E7D32"/>
  <text x="90" y="70" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="9" font-weight="bold">💊 Анальгетики</text>
  <text x="25" y="90" fill="#555" font-family="Arial,sans-serif" font-size="8">Обезболивание: аспирин,</text>
  <text x="25" y="102" fill="#555" font-family="Arial,sans-serif" font-size="8">парацетамол, ибупрофен</text>

  <!-- Card 2: Antibiotics -->
  <rect x="175" y="55" width="150" height="55" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <rect x="175" y="55" width="150" height="20" rx="10" fill="#2E7D32"/>
  <rect x="175" y="65" width="150" height="10" fill="#2E7D32"/>
  <text x="250" y="70" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="9" font-weight="bold">🦠 Антибиотики</text>
  <text x="185" y="90" fill="#555" font-family="Arial,sans-serif" font-size="8">Убивают бактерии: пеницил-</text>
  <text x="185" y="102" fill="#555" font-family="Arial,sans-serif" font-size="8">лин, цефалоспорины, тетрациклин</text>

  <!-- Card 3: Antiseptics -->
  <rect x="335" y="55" width="150" height="55" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <rect x="335" y="55" width="150" height="20" rx="10" fill="#2E7D32"/>
  <rect x="335" y="65" width="150" height="10" fill="#2E7D32"/>
  <text x="410" y="70" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="9" font-weight="bold">🧴 Антисептики</text>
  <text x="345" y="90" fill="#555" font-family="Arial,sans-serif" font-size="8">Наружное обеззараживание:</text>
  <text x="345" y="102" fill="#555" font-family="Arial,sans-serif" font-size="8">H₂O₂, хлоргексидин, йод</text>

  <!-- Aspirin molecular structure card -->
  <rect x="15" y="120" width="225" height="105" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="127" y="138" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Аспирин (C₉H₈O₄)</text>
  <!-- Simplified aspirin structure -->
  <!-- Benzene ring -->
  <polygon points="80,168 92,158 106,163 106,177 92,182 80,177" fill="none" stroke="#333" stroke-width="1.5"/>
  <circle cx="93" cy="170" r="8" fill="none" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- COOH group -->
  <line x1="106" y1="170" x2="120" y2="170" stroke="#333" stroke-width="1.5"/>
  <text x="122" y="174" fill="#E53935" font-family="Arial,sans-serif" font-size="9" font-weight="bold">COOH</text>
  <!-- OCOCH3 group -->
  <line x1="80" y1="170" x2="66" y2="170" stroke="#333" stroke-width="1.5"/>
  <text x="28" y="174" fill="#1565C0" font-family="Arial,sans-serif" font-size="8" font-weight="bold">H₃COCO</text>
  <!-- Mechanism -->
  <text x="25" y="198" fill="#555" font-family="Arial,sans-serif" font-size="8">Механизм: ингибирует циклооксигеназу</text>
  <text x="25" y="210" fill="#555" font-family="Arial,sans-serif" font-size="8">→ снижает синтез простагландинов</text>
  <text x="25" y="222" fill="#2E7D32" font-family="Arial,sans-serif" font-size="8" font-weight="bold">→ боль ↓ жар ↓ воспаление ↓</text>

  <!-- Antibiotic mechanism card -->
  <rect x="250" y="120" width="235" height="105" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="367" y="138" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Пенициллин (C₁₆H₁₈N₂O₄S)</text>
  <!-- Bacterium cell wall -->
  <ellipse cx="310" cy="168" rx="22" ry="16" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="310" y="165" text-anchor="middle" fill="#2E7D32" font-family="Arial,sans-serif" font-size="7">Клет.</text>
  <text x="310" y="175" text-anchor="middle" fill="#2E7D32" font-family="Arial,sans-serif" font-size="7">стенка</text>
  <!-- Arrow -->
  <line x1="338" y1="168" x2="355" y2="168" stroke="#E53935" stroke-width="2"/>
  <polygon points="355,165 362,168 355,171" fill="#E53935"/>
  <!-- Broken cell -->
  <ellipse cx="385" cy="168" rx="22" ry="16" fill="#FFCDD2" stroke="#E53935" stroke-width="2" stroke-dasharray="2,4"/>
  <text x="385" y="171" text-anchor="middle" fill="#E53935" font-family="Arial,sans-serif" font-size="8">💀</text>
  <!-- Explanation -->
  <text x="260" y="198" fill="#555" font-family="Arial,sans-serif" font-size="8">β-лактамное кольцо связывает</text>
  <text x="260" y="210" fill="#555" font-family="Arial,sans-serif" font-size="8">транспептидазу → стенка не сшивается</text>
  <text x="260" y="222" fill="#E53935" font-family="Arial,sans-serif" font-size="8" font-weight="bold">→ бактерия лопается (лизис)</text>

  <!-- Side effects card -->
  <rect x="15" y="235" width="225" height="105" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="127" y="253" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Побочные эффекты</text>
  <text x="25" y="272" fill="#E53935" font-family="Arial,sans-serif" font-size="8">⚠ Аллергические реакции</text>
  <text x="25" y="287" fill="#E53935" font-family="Arial,sans-serif" font-size="8">⚠ Токсичность (печень, почки)</text>
  <text x="25" y="302" fill="#E53935" font-family="Arial,sans-serif" font-size="8">⚠ Дисбактериоз (антибиотики)</text>
  <text x="25" y="317" fill="#E53935" font-family="Arial,sans-serif" font-size="8">⚠ Антибиотикорезистентность</text>
  <text x="25" y="332" fill="#E65100" font-family="Arial,sans-serif" font-size="8">⚠ Парацетамол: поражение печени!</text>

  <!-- Safety rules pills -->
  <rect x="250" y="235" width="235" height="105" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="367" y="253" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Правила приёма лекарств</text>

  <rect x="260" y="262" width="105" height="20" rx="10" fill="#2E7D32" filter="url(#shadow1)"/>
  <text x="312" y="276" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Дозировка врача</text>

  <rect x="372" y="262" width="105" height="20" rx="10" fill="#388E3C" filter="url(#shadow1)"/>
  <text x="424" y="276" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Весь курс!</text>

  <rect x="260" y="288" width="105" height="20" rx="10" fill="#43A047" filter="url(#shadow1)"/>
  <text x="312" y="302" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Читать инструкцию</text>

  <rect x="372" y="288" width="105" height="20" rx="10" fill="#4CAF50" filter="url(#shadow1)"/>
  <text x="424" y="302" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Срок годности</text>

  <rect x="260" y="314" width="217" height="20" rx="10" fill="#66BB6A" filter="url(#shadow1)"/>
  <text x="368" y="328" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">🚫 Не запивать грейпфрутовым соком!</text>
</svg>