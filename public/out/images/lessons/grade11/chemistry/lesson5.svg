<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Полимеры: классификация и свойства</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Classification diagram -->
<rect x="160" y="55" width="180" height="30" rx="8" fill="#1B5E20"/>
<text x="250" y="75" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Полимеры</text>

<!-- Natural -->
<rect x="30" y="100" width="130" height="25" rx="6" fill="#2E7D32"/>
<text x="95" y="117" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Природные</text>
<line x1="160" y1="85" x2="95" y2="100" stroke="#2E7D32" stroke-width="1.5"/>
<rect x="15" y="135" width="80" height="22" rx="4" fill="white" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="55" y="150" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Белки</text>
<rect x="100" y="135" width="80" height="22" rx="4" fill="white" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="140" y="150" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Целлюлоза</text>
<rect x="15" y="162" width="80" height="22" rx="4" fill="white" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="55" y="177" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Крахмал</text>
<rect x="100" y="162" width="80" height="22" rx="4" fill="white" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="140" y="177" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Каучук</text>

<!-- Synthetic -->
<rect x="340" y="100" width="130" height="25" rx="6" fill="#1565C0"/>
<text x="405" y="117" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Синтетические</text>
<line x1="340" y1="85" x2="405" y2="100" stroke="#1565C0" stroke-width="1.5"/>
<rect x="310" y="135" width="80" height="22" rx="4" fill="white" stroke="#1565C0" stroke-width="1" filter="url(#sh)"/>
<text x="350" y="150" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Полиэтилен</text>
<rect x="395" y="135" width="80" height="22" rx="4" fill="white" stroke="#1565C0" stroke-width="1" filter="url(#sh)"/>
<text x="435" y="150" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Полипропилен</text>
<rect x="310" y="162" width="80" height="22" rx="4" fill="white" stroke="#1565C0" stroke-width="1" filter="url(#sh)"/>
<text x="350" y="177" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">ПВХ</text>
<rect x="395" y="162" width="80" height="22" rx="4" fill="white" stroke="#1565C0" stroke-width="1" filter="url(#sh)"/>
<text x="435" y="177" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Полистирол</text>

<!-- Artificial -->
<rect x="185" y="100" width="130" height="25" rx="6" fill="#FF9800"/>
<text x="250" y="117" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Искусственные</text>
<line x1="250" y1="85" x2="250" y2="100" stroke="#FF9800" stroke-width="1.5"/>
<rect x="170" y="135" width="80" height="22" rx="4" fill="white" stroke="#FF9800" stroke-width="1" filter="url(#sh)"/>
<text x="210" y="150" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Вискоза</text>
<rect x="255" y="135" width="80" height="22" rx="4" fill="white" stroke="#FF9800" stroke-width="1" filter="url(#sh)"/>
<text x="295" y="150" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Ацетатное волокно</text>
<rect x="170" y="162" width="80" height="22" rx="4" fill="white" stroke="#FF9800" stroke-width="1" filter="url(#sh)"/>
<text x="210" y="177" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Нитрошёлк</text>
<rect x="255" y="162" width="80" height="22" rx="4" fill="white" stroke="#FF9800" stroke-width="1" filter="url(#sh)"/>
<text x="295" y="177" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Этрол</text>

<!-- Properties panel -->
<rect x="30" y="200" width="220" height="115" rx="8" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="140" y="218" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Свойства полимеров</text>
<line x1="40" y1="224" x2="240" y2="224" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="45" cy="237" r="3" fill="#4CAF50"/><text x="55" y="240" font-family="Arial,sans-serif" font-size="7" fill="#333">Пластичность — способность деформироваться</text>
<circle cx="45" cy="252" r="3" fill="#4CAF50"/><text x="55" y="255" font-family="Arial,sans-serif" font-size="7" fill="#333">Эластичность — восстанавливать форму</text>
<circle cx="45" cy="267" r="3" fill="#4CAF50"/><text x="55" y="270" font-family="Arial,sans-serif" font-size="7" fill="#333">Прочность — сопротивление разрушению</text>
<circle cx="45" cy="282" r="3" fill="#4CAF50"/><text x="55" y="285" font-family="Arial,sans-serif" font-size="7" fill="#333">Химическая стойкость</text>
<circle cx="45" cy="297" r="3" fill="#4CAF50"/><text x="55" y="300" font-family="Arial,sans-serif" font-size="7" fill="#333">Низкая теплопроводность</text>

<!-- Polymerization types -->
<rect x="270" y="200" width="200" height="115" rx="8" fill="white" opacity="0.9" stroke="#1565C0" stroke-width="1" filter="url(#sh)"/>
<text x="370" y="218" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Типы реакций</text>
<line x1="280" y1="224" x2="460" y2="224" stroke="#1565C0" stroke-width="0.5"/>
<rect x="280" y="230" width="85" height="35" rx="4" fill="#1565C0" opacity="0.1" stroke="#1565C0" stroke-width="0.8"/>
<text x="322" y="244" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Полимеризация</text>
<text x="322" y="257" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">n CH2=CH2 -> (-CH2-CH2-)n</text>
<rect x="375" y="230" width="85" height="35" rx="4" fill="#C62828" opacity="0.1" stroke="#C62828" stroke-width="0.8"/>
<text x="417" y="244" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Поликонденсация</text>
<text x="417" y="257" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Мономер + Мономер -> П + H2O</text>

<text x="370" y="280" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Степень полимеризации n</text>
<text x="370" y="293" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">определяет длину цепи и свойства</text>
<text x="370" y="306" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">n = M(полимера) / M(звена)</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>