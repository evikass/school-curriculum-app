<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Коррозия металлов и гальванические элементы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Electrochemical corrosion -->
<rect x="12" y="58" width="235" height="100" rx="8" fill="white" stroke="#F44336" stroke-width="1.5" filter="url(#sh)"/>
<text x="130" y="75" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Электрохимическая коррозия</text>
<!-- Fe-Cu cell -->
<rect x="25" y="85" width="40" height="50" rx="3" fill="#78909C" opacity="0.4" stroke="#455A64" stroke-width="1"/>
<text x="45" y="115" font-family="Arial,sans-serif" font-size="7" fill="#455A64" text-anchor="middle">Fe</text>
<text x="45" y="125" font-family="Arial,sans-serif" font-size="5" fill="#F44336" text-anchor="middle">Анод</text>
<rect x="80" y="85" width="40" height="50" rx="3" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="1"/>
<text x="100" y="115" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Cu</text>
<text x="100" y="125" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Катод</text>
<!-- Arrows -->
<path d="M65,100 L80,100" stroke="#F44336" stroke-width="1" marker-end="url(#arr)"/>
<text x="140" y="92" font-family="Arial,sans-serif" font-size="6" fill="#F44336">Fe -> Fe2+ + 2e-</text>
<text x="140" y="104" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">O2 + 2H2O + 4e- -> 4OH-</text>
<text x="140" y="120" font-family="Arial,sans-serif" font-size="6" fill="#795548">Fe2+ + 2OH- -> Fe(OH)2</text>
<text x="140" y="132" font-family="Arial,sans-serif" font-size="6" fill="#795548">-> ржавчина (Fe2O3 * nH2O)</text>

<!-- Protection methods -->
<rect x="258" y="58" width="230" height="100" rx="8" fill="white" stroke="#4CAF50" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="75" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Методы защиты</text>
<circle cx="268" cy="90" r="3" fill="#4CAF50"/><text x="278" y="93" font-family="Arial,sans-serif" font-size="7" fill="#333">Покрытия (краска, лак)</text>
<circle cx="268" cy="105" r="3" fill="#2196F3"/><text x="278" y="108" font-family="Arial,sans-serif" font-size="7" fill="#333">Металлопокрытие (Zn, Cr)</text>
<circle cx="268" cy="120" r="3" fill="#FF9800"/><text x="278" y="123" font-family="Arial,sans-serif" font-size="7" fill="#333">Легирование (нержавеющая сталь)</text>
<circle cx="268" cy="135" r="3" fill="#9C27B0"/><text x="278" y="138" font-family="Arial,sans-serif" font-size="7" fill="#333">Протектор (Mg) — жертвенный анод</text>
<circle cx="268" cy="150" r="3" fill="#795548"/><text x="278" y="153" font-family="Arial,sans-serif" font-size="7" fill="#333">Ингибиторы (NaNO2, фосфаты)</text>

<!-- Galvanic cell -->
<rect x="12" y="170" width="235" height="140" rx="8" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
<text x="130" y="188" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Гальванический элемент</text>
<text x="130" y="200" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Даниэля-Якоби</text>
<!-- Zn electrode -->
<rect x="25" y="208" width="40" height="40" rx="3" fill="#78909C" opacity="0.4" stroke="#455A64" stroke-width="1"/>
<text x="45" y="232" font-family="Arial,sans-serif" font-size="7" fill="#455A64" text-anchor="middle">Zn</text>
<text x="45" y="254" font-family="Arial,sans-serif" font-size="6" fill="#F44336" text-anchor="middle">Анод (-)</text>
<text x="70" y="265" font-family="Arial,sans-serif" font-size="6" fill="#455A64">Zn -> Zn2+ + 2e-</text>
<!-- Cu electrode -->
<rect x="170" y="208" width="40" height="40" rx="3" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="1"/>
<text x="190" y="232" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Cu</text>
<text x="190" y="254" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Катод (+)</text>
<text x="75" y="278" font-family="Arial,sans-serif" font-size="6" fill="#E65100">Cu2+ + 2e- -> Cu</text>
<!-- Wire -->
<line x1="45" y1="208" x2="190" y2="208" stroke="#666" stroke-width="1"/>
<text x="117" y="204" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">e-</text>

<!-- Voltage series -->
<rect x="258" y="170" width="230" height="140" rx="8" fill="white" stroke="#FF9800" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="188" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Ряд напряжений металлов</text>
<text x="373" y="203" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Li K Ca Na Mg Al Zn Fe Ni Sn Pb H Cu Hg Ag Pt Au</text>
<line x1="268" y1="210" x2="478" y2="210" stroke="#E65100" stroke-width="0.5"/>
<text x="268" y="225" font-family="Arial,sans-serif" font-size="7" fill="#F44336">Левее H: вытесняют H2 из кислот</text>
<text x="268" y="240" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50">Правее H: НЕ вытесняют H2</text>
<text x="268" y="258" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">ЭДС = фи(катод) - фи(анод) &gt; 0</text>
<text x="268" y="273" font-family="Arial,sans-serif" font-size="7" fill="#333">для самопроизвольного процесса</text>
<text x="268" y="290" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0">Протектор: активный металл</text>
<text x="268" y="303" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0">(Mg, Zn) корродирует вместо Fe</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>