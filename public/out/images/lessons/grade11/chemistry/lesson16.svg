<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="furnace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#616161"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78909C"/>
      <stop offset="100%" stop-color="#546E7A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <!-- Title bar -->
  <rect width="500" height="44" fill="#1B5E20" rx="8"/>
  <rect y="20" width="500" height="24" fill="#1B5E20"/>
  <text x="250" y="29" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="16" font-weight="bold">Металлургия: получение металлов</text>

  <!-- Blast furnace diagram -->
  <rect x="15" y="55" width="170" height="165" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="100" y="73" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Доменная печь</text>
  <!-- Furnace body -->
  <path d="M55,85 L55,195 Q55,205 65,205 L135,205 Q145,205 145,195 L145,85 Z" fill="url(#furnace)" stroke="#333" stroke-width="1"/>
  <!-- Top opening -->
  <rect x="75" y="80" width="50" height="8" fill="#757575" rx="2"/>
  <!-- Inner glow -->
  <path d="M65,130 Q100,125 135,130 L130,195 Q100,200 70,195 Z" fill="url(#hot)" opacity="0.7"/>
  <!-- Labels -->
  <text x="100" y="150" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Fe₂O₃+C</text>
  <text x="100" y="162" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="8">→ Fe+CO₂</text>
  <!-- Arrow down for output -->
  <polygon points="95,205 105,205 100,215" fill="#E65100"/>
  <text x="100" y="228" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Чугун</text>
  <!-- Input arrows -->
  <line x1="30" y1="95" x2="53" y2="95" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="30" y="92" text-anchor="middle" fill="#2E7D32" font-family="Arial,sans-serif" font-size="7">Руда</text>
  <line x1="30" y1="120" x2="53" y2="120" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="30" y="117" text-anchor="middle" fill="#2E7D32" font-family="Arial,sans-serif" font-size="7">Кокс</text>
  <line x1="30" y1="145" x2="53" y2="145" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="30" y="142" text-anchor="middle" fill="#2E7D32" font-family="Arial,sans-serif" font-size="7">Флюс</text>

  <!-- Three method cards -->
  <!-- Pyrometallurgy -->
  <rect x="195" y="55" width="140" height="75" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <rect x="195" y="55" width="140" height="22" rx="10" fill="#2E7D32"/>
  <rect x="195" y="67" width="140" height="10" fill="#2E7D32"/>
  <text x="265" y="71" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="10" font-weight="bold">🔥 Пирометаллургия</text>
  <text x="205" y="95" fill="#333" font-family="Arial,sans-serif" font-size="8">T &gt; 1000°C</text>
  <text x="205" y="108" fill="#555" font-family="Arial,sans-serif" font-size="8">Восстановление C, CO, H₂</text>
  <text x="205" y="121" fill="#555" font-family="Arial,sans-serif" font-size="8">Fe, Cu, Zn, W, Cr</text>

  <!-- Hydrometallurgy -->
  <rect x="345" y="55" width="140" height="75" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <rect x="345" y="55" width="140" height="22" rx="10" fill="#2E7D32"/>
  <rect x="345" y="67" width="140" height="10" fill="#2E7D32"/>
  <text x="415" y="71" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="10" font-weight="bold">💧 Гидрометаллургия</text>
  <text x="355" y="95" fill="#333" font-family="Arial,sans-serif" font-size="8">Из растворов солей</text>
  <text x="355" y="108" fill="#555" font-family="Arial,sans-serif" font-size="8">CuSO₄ + Fe → Cu + FeSO₄</text>
  <text x="355" y="121" fill="#555" font-family="Arial,sans-serif" font-size="8">Cu, Au, Ag, Zn</text>

  <!-- Electrometallurgy -->
  <rect x="195" y="138" width="140" height="75" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <rect x="195" y="138" width="140" height="22" rx="10" fill="#2E7D32"/>
  <rect x="195" y="150" width="140" height="10" fill="#2E7D32"/>
  <text x="265" y="154" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="10" font-weight="bold">⚡ Электрометаллургия</text>
  <text x="205" y="178" fill="#333" font-family="Arial,sans-serif" font-size="8">Электролиз расплавов</text>
  <text x="205" y="191" fill="#555" font-family="Arial,sans-serif" font-size="8">2Al₂O₃ → 4Al + 3O₂</text>
  <text x="205" y="204" fill="#555" font-family="Arial,sans-serif" font-size="8">Al, Na, Mg, Ca</text>

  <!-- Steel production flow -->
  <rect x="345" y="138" width="140" height="75" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <rect x="345" y="138" width="140" height="22" rx="10" fill="#2E7D32"/>
  <rect x="345" y="150" width="140" height="10" fill="#2E7D32"/>
  <text x="415" y="154" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="10" font-weight="bold">🏭 Конвертер</text>
  <text x="355" y="175" fill="#333" font-family="Arial,sans-serif" font-size="8">Чугун + O₂ → Сталь</text>
  <text x="355" y="188" fill="#555" font-family="Arial,sans-serif" font-size="8">C: 3-4,5% → &lt;2%</text>
  <text x="355" y="201" fill="#555" font-family="Arial,sans-serif" font-size="8">15-20 мин / плавка</text>

  <!-- Alloy pills at bottom -->
  <rect x="15" y="225" width="470" height="115" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="244" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="11" font-weight="bold">Важнейшие сплавы</text>

  <!-- Alloy pill 1: Steel -->
  <rect x="25" y="254" width="85" height="38" rx="19" fill="url(#steel)" filter="url(#shadow1)"/>
  <text x="67" y="270" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Сталь</text>
  <text x="67" y="283" text-anchor="middle" fill="#E0E0E0" font-family="Arial,sans-serif" font-size="7">Fe + C &lt;2%</text>

  <!-- Alloy pill 2: Bronze -->
  <rect x="120" y="254" width="85" height="38" rx="19" fill="#8D6E63" filter="url(#shadow1)"/>
  <text x="162" y="270" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Бронза</text>
  <text x="162" y="283" text-anchor="middle" fill="#EFEBE9" font-family="Arial,sans-serif" font-size="7">Cu + Sn</text>

  <!-- Alloy pill 3: Brass -->
  <rect x="215" y="254" width="85" height="38" rx="19" fill="#FFC107" filter="url(#shadow1)"/>
  <text x="257" y="270" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Латунь</text>
  <text x="257" y="283" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="7">Cu + Zn</text>

  <!-- Alloy pill 4: Duralumin -->
  <rect x="310" y="254" width="85" height="38" rx="19" fill="#B0BEC5" filter="url(#shadow1)"/>
  <text x="352" y="270" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Дюралюминий</text>
  <text x="352" y="283" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="7">Al+Cu+Mg</text>

  <!-- Alloy pill 5: Cast iron -->
  <rect x="405" y="254" width="70" height="38" rx="19" fill="#455A64" filter="url(#shadow1)"/>
  <text x="440" y="270" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Чугун</text>
  <text x="440" y="283" text-anchor="middle" fill="#CFD8DC" font-family="Arial,sans-serif" font-size="7">Fe+C 3-4,5%</text>

  <!-- Bottom info text -->
  <text x="250" y="310" text-anchor="middle" fill="#2E7D32" font-family="Arial,sans-serif" font-size="9">Применение: строительство · транспорт · авиация · электроника · медицина</text>
  <text x="250" y="326" text-anchor="middle" fill="#555" font-family="Arial,sans-serif" font-size="8">Алюминотермия: Fe₂O₃ + 2Al → 2Fe + Al₂O₃ (T до 3000°C)</text>
</svg>