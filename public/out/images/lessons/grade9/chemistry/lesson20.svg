<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient></defs>
  <rect width="500" height="350" rx="8" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Кремний и его соединения</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 20</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <rect x="14" y="54" width="230" height="80" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="129" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Si — Кремний</text>
  <text x="129" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Z = 14, Ar = 28</text>
  <text x="129" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">IVA группа, аналог углерода</text>
  <text x="129" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Кристаллический и аморфный</text>
  <text x="129" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Полупроводник</text>
  <rect x="256" y="54" width="230" height="80" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="371" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Химические свойства Si</text>
  <text x="270" y="88" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Si + O2 = SiO2 (нагревание)</text>
  <text x="270" y="102" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Si + 2F2 = SiF4 (без нагрев.)</text>
  <text x="270" y="116" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Si + 2NaOH + H2O =</text>
  <text x="270" y="128" font-family="Arial,sans-serif" font-size="6" fill="#004D40">  Na2SiO3 + 2H2</text>
  <text x="270" y="142" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Малоактивен при обычных условиях</text>
  <!-- SiO2 -->
  <rect x="14" y="142" width="230" height="105" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="129" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">SiO2 — Диоксид кремния</text>
  <text x="129" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Кварц, песок, горный хрусталь</text>
  <text x="129" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Атомная кристаллическая решётка</text>
  <text x="129" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Очень твёрдый, t пл. = 1710 C</text>
  <text x="129" y="216" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Не растворяется в воде!</text>
  <text x="129" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">SiO2 + 2NaOH = Na2SiO3 + H2O</text>
  <text x="129" y="242" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Реагирует с HF: SiO2 + 4HF = SiF4 + 2H2O</text>
  <!-- Silicates -->
  <rect x="256" y="142" width="230" height="105" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="371" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Силикаты</text>
  <text x="270" y="174" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Na2SiO3 — жидкое стекло</text>
  <text x="270" y="188" font-family="Arial,sans-serif" font-size="6" fill="#004D40">CaSiO3 — силикат кальция</text>
  <text x="270" y="202" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Стекло: Na2O x CaO x 6SiO2</text>
  <text x="270" y="216" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Цемент, керамика, фарфор</text>
  <text x="270" y="230" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Кач. реакция: силикат + кислота =</text>
  <text x="270" y="242" font-family="Arial,sans-serif" font-size="6" fill="#00897B">  гель H2SiO3 (желеобразный)</text>
  <!-- Si production -->
  <rect x="14" y="256" width="230" height="78" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Получение кремния</text>
  <text x="129" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">SiO2 + 2C = Si + 2CO</text>
  <text x="129" y="302" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">В электропечи при высокой t</text>
  <text x="129" y="316" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Полупроводники, солнечные батареи</text>
  <rect x="256" y="256" width="230" height="78" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Стекло и его виды</text>
  <text x="270" y="288" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Оконное: Na2O x CaO x 6SiO2</text>
  <text x="270" y="302" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Лабораторное: K2O x PbO x 6SiO2</text>
  <text x="270" y="316" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Кварцевое: SiO2 (термостойкое)</text>
  <text x="270" y="330" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Силикатная промышленность</text>
</svg>