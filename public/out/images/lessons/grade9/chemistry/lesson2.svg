<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" rx="8" fill="url(#bg2)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Периодический закон</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 2</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- Mini periodic table -->
  <rect x="30" y="56" width="440" height="155" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="250" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Периодическая система Д.И. Менделеева</text>
  <!-- Period labels -->
  <text x="48" y="90" font-family="Arial,sans-serif" font-size="6" fill="#00897B">I</text>
  <text x="48" y="106" font-family="Arial,sans-serif" font-size="6" fill="#00897B">II</text>
  <text x="48" y="122" font-family="Arial,sans-serif" font-size="6" fill="#00897B">III</text>
  <text x="44" y="138" font-family="Arial,sans-serif" font-size="6" fill="#00897B">IV</text>
  <text x="44" y="154" font-family="Arial,sans-serif" font-size="6" fill="#00897B">V</text>
  <text x="45" y="170" font-family="Arial,sans-serif" font-size="6" fill="#00897B">VI</text>
  <text x="46" y="186" font-family="Arial,sans-serif" font-size="6" fill="#00897B">VII</text>
  <!-- Simplified element cells - metals (left side) -->
  <rect x="60" y="84" width="22" height="14" rx="2" fill="#80CBC4" opacity="0.6" stroke="#00897B" stroke-width="0.5"/>
  <text x="71" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">H</text>
  <rect x="60" y="100" width="22" height="14" rx="2" fill="#A5D6A7" opacity="0.6" stroke="#00897B" stroke-width="0.5"/>
  <text x="71" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Li</text>
  <rect x="60" y="116" width="22" height="14" rx="2" fill="#A5D6A7" opacity="0.6" stroke="#00897B" stroke-width="0.5"/>
  <text x="71" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Na</text>
  <rect x="60" y="132" width="22" height="14" rx="2" fill="#A5D6A7" opacity="0.6" stroke="#00897B" stroke-width="0.5"/>
  <text x="71" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">K</text>
  <!-- More cells - nonmetals (right side) -->
  <rect x="170" y="100" width="22" height="14" rx="2" fill="#FFCC80" opacity="0.6" stroke="#00897B" stroke-width="0.5"/>
  <text x="181" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">B</text>
  <rect x="196" y="100" width="22" height="14" rx="2" fill="#EF9A9A" opacity="0.6" stroke="#00897B" stroke-width="0.5"/>
  <text x="207" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">C</text>
  <rect x="222" y="100" width="22" height="14" rx="2" fill="#EF9A9A" opacity="0.6" stroke="#00897B" stroke-width="0.5"/>
  <text x="233" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">N</text>
  <rect x="248" y="100" width="22" height="14" rx="2" fill="#EF9A9A" opacity="0.6" stroke="#00897B" stroke-width="0.5"/>
  <text x="259" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">O</text>
  <rect x="274" y="100" width="22" height="14" rx="2" fill="#EF9A9A" opacity="0.6" stroke="#00897B" stroke-width="0.5"/>
  <text x="285" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">F</text>
  <rect x="300" y="100" width="22" height="14" rx="2" fill="#CE93D8" opacity="0.5" stroke="#00897B" stroke-width="0.5"/>
  <text x="311" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Ne</text>
  <!-- Arrow showing period direction -->
  <line x1="62" y1="152" x2="320" y2="152" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <defs><marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00695C"/></marker></defs>
  <text x="190" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">Металлические свойства ослабевают</text>
  <!-- Group arrow -->
  <line x1="335" y1="87" x2="335" y2="195" stroke="#00695C" stroke-width="1.5" marker-end="url(#arrowD)"/>
  <defs><marker id="arrowD" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto"><path d="M0,0 L4,6 L8,0" fill="#00695C"/></marker></defs>
  <text x="385" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C" transform="rotate(90,385,140)">Металлические свойства усиливаются</text>
  <!-- Legend -->
  <rect x="360" y="86" width="100" height="68" rx="4" fill="white" fill-opacity="0.85" stroke="#80CBC4" stroke-width="0.5"/>
  <rect x="368" y="94" width="10" height="8" rx="1" fill="#A5D6A7" opacity="0.6"/>
  <text x="384" y="101" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Металлы</text>
  <rect x="368" y="108" width="10" height="8" rx="1" fill="#EF9A9A" opacity="0.6"/>
  <text x="384" y="115" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Неметаллы</text>
  <rect x="368" y="122" width="10" height="8" rx="1" fill="#CE93D8" opacity="0.5"/>
  <text x="384" y="129" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Благородные газы</text>
  <rect x="368" y="136" width="10" height="8" rx="1" fill="#FFCC80" opacity="0.6"/>
  <text x="384" y="143" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Полуметаллы</text>
  <!-- Bottom panel: Law statement -->
  <rect x="14" y="220" width="472" height="115" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">Периодический закон (1869 г.)</text>
  <text x="250" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Свойства элементов периодически зависят от зарядов атомных ядер</text>
  <line x1="30" y1="268" x2="470" y2="268" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="150" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00897B">В периоде (слева направо):</text>
  <text x="150" y="298" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Заряд ядра увеличивается</text>
  <text x="150" y="310" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Радиус атома уменьшается</text>
  <text x="150" y="322" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Неметаллические свойства усиливаются</text>
  <text x="350" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00897B">В группе (сверху вниз):</text>
  <text x="350" y="298" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Число слоёв увеличивается</text>
  <text x="350" y="310" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Радиус атома увеличивается</text>
  <text x="350" y="322" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Металлические свойства усиливаются</text>
</svg>