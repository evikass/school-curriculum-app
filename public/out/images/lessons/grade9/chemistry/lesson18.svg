<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient></defs>
  <rect width="500" height="350" rx="8" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Фосфор и его соединения</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 18</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- White and Red P -->
  <rect x="14" y="54" width="230" height="115" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="129" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Аллотропия фосфора</text>
  <rect x="24" y="78" width="105" height="80" rx="4" fill="#FFF9C4" fill-opacity="0.4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="76" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17">Белый P</text>
  <text x="76" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Воскоподобный</text>
  <text x="76" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Самовоспламеняется</text>
  <text x="76" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Очень ядовит!</text>
  <text x="76" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Хранят под водой</text>
  <rect x="138" y="78" width="98" height="80" rx="4" fill="#C62828" fill-opacity="0.1" stroke="#C62828" stroke-width="0.8"/>
  <text x="187" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828">Красный P</text>
  <text x="187" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Порошок</text>
  <text x="187" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Не ядовит</text>
  <text x="187" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Не самовосплам.</text>
  <text x="187" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Спички, удобрения</text>
  <!-- P2O5 and H3PO4 -->
  <rect x="256" y="54" width="230" height="115" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="371" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Соединения фосфора</text>
  <text x="270" y="88" font-family="Arial,sans-serif" font-size="6" fill="#004D40">4P + 5O2 = 2P2O5</text>
  <text x="270" y="102" font-family="Arial,sans-serif" font-size="6" fill="#004D40">P2O5 + 3H2O = 2H3PO4</text>
  <text x="270" y="116" font-family="Arial,sans-serif" font-size="6" fill="#004D40">H3PO4 — фосфорная кислота</text>
  <text x="270" y="130" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Трёхосновная кислота</text>
  <text x="270" y="144" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Диссоциирует ступенчато</text>
  <text x="270" y="158" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">P2O5 — лучший водоотниматель</text>
  <!-- Phosphates -->
  <rect x="14" y="178" width="230" height="85" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Фосфаты</text>
  <text x="129" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Na3PO4 — фосфат натрия</text>
  <text x="129" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Ca3(PO4)2 — фосфат кальция</text>
  <text x="129" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">CaHPO4 — гидрофосфат</text>
  <text x="129" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Минеральные удобрения</text>
  <!-- Fertilizers -->
  <rect x="256" y="178" width="230" height="85" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Фосфорные удобрения</text>
  <text x="270" y="210" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Простой суперфосфат:</text>
  <text x="270" y="224" font-family="Arial,sans-serif" font-size="6" fill="#004D40">  Ca(H2PO4)2 + CaSO4</text>
  <text x="270" y="238" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Двойной суперфосфат:</text>
  <text x="270" y="252" font-family="Arial,sans-serif" font-size="6" fill="#004D40">  Ca(H2PO4)2</text>
  <!-- Qualitative reaction -->
  <rect x="14" y="272" width="472" height="63" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Качественная реакция на фосфат-ион</text>
  <text x="250" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">PO4(3-) + 3Ag+ = Ag3PO4 (жёлтый осадок)</text>
  <text x="250" y="324" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Жёлтое окрашивание отличает от других анионов</text>
</svg>