<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" rx="8" fill="url(#bg8)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#00695C">Реакции ионного обмена</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 8</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- Conditions box -->
  <rect x="14" y="54" width="472" height="42" rx="8" fill="white" fill-opacity="0.95" stroke="#00897B" stroke-width="1.5"/>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">РИО идут до конца, если образуется: осадок, газ или вода</text>
  <text x="250" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Ag+ + Cl- = AgCl (осадок) | CO3(2-) + 2H+ = CO2 (газ) + H2O | H+ + OH- = H2O (вода)</text>
  <!-- Example 1: Precipitate -->
  <rect x="14" y="104" width="152" height="148" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <rect x="24" y="110" width="132" height="18" rx="4" fill="#CE93D8" fill-opacity="0.4"/>
  <text x="90" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A">Образование осадка</text>
  <text x="90" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">AgNO3 + NaCl</text>
  <text x="90" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">= AgCl + NaNO3</text>
  <line x1="24" y1="162" x2="156" y2="162" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="90" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#6A1B9A">Полное ионное:</text>
  <text x="90" y="186" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Ag+ + NO3- + Na+ + Cl-</text>
  <text x="90" y="196" font-family="Arial,sans-serif" font-size="5" fill="#004D40">= AgCl + Na+ + NO3-</text>
  <line x1="24" y1="202" x2="156" y2="202" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="90" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00695C">Сокращённое:</text>
  <text x="90" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A">Ag+ + Cl- = AgCl</text>
  <text x="90" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#607D8B">Белый осадок</text>
  <!-- Example 2: Gas -->
  <rect x="174" y="104" width="152" height="148" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <rect x="184" y="110" width="132" height="18" rx="4" fill="#90CAF9" fill-opacity="0.4"/>
  <text x="250" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1">Образование газа</text>
  <text x="250" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Na2CO3 + 2HCl</text>
  <text x="250" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">= 2NaCl + CO2 + H2O</text>
  <line x1="184" y1="162" x2="316" y2="162" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="250" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1">Полное ионное:</text>
  <text x="250" y="186" font-family="Arial,sans-serif" font-size="5" fill="#004D40">2Na+ + CO3(2-) + 2H+ + 2Cl-</text>
  <text x="250" y="196" font-family="Arial,sans-serif" font-size="5" fill="#004D40">= 2Na+ + 2Cl- + CO2 + H2O</text>
  <line x1="184" y1="202" x2="316" y2="202" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="250" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00695C">Сокращённое:</text>
  <text x="250" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1">CO3(2-) + 2H+ =</text>
  <text x="250" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1">CO2 + H2O</text>
  <!-- Example 3: Water (Neutralization) -->
  <rect x="334" y="104" width="152" height="148" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <rect x="344" y="110" width="132" height="18" rx="4" fill="#A5D6A7" fill-opacity="0.4"/>
  <text x="410" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32">Образование воды</text>
  <text x="410" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaOH + HCl</text>
  <text x="410" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">= NaCl + H2O</text>
  <line x1="344" y1="162" x2="476" y2="162" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="410" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Полное ионное:</text>
  <text x="410" y="186" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Na+ + OH- + H+ + Cl-</text>
  <text x="410" y="196" font-family="Arial,sans-serif" font-size="5" fill="#004D40">= Na+ + Cl- + H2O</text>
  <line x1="344" y1="202" x2="476" y2="202" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="410" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00695C">Сокращённое:</text>
  <text x="410" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32">H+ + OH- = H2O</text>
  <text x="410" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#607D8B">Нейтрализация</text>
  <!-- Rules box -->
  <rect x="14" y="260" width="472" height="78" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Правила составления ионных уравнений</text>
  <text x="150" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">1. Записать молекулярное уравнение</text>
  <text x="150" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">2. Сильные электролиты расписать на ионы</text>
  <text x="150" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">3. Оставить в молекулярном виде осадки, газы, слабые эл-ты</text>
  <text x="365" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">4. Сократить одинаковые ионы слева и справа</text>
  <text x="365" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">5. Получить сокращённое ионное уравнение</text>
  <text x="365" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00897B">H2O, NH3 x H2O — слабые электролиты</text>
</svg>