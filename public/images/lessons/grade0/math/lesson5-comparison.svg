<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      .compare { animation: pulse 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fef2f2"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#dc2626">Сравнение групп ⚖️</text>
  
  <!-- Greater than -->
  <g class="compare">
    <rect x="20" y="50" width="150" height="80" fill="#dcfce7" rx="10"/>
    <text x="95" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="28">🍎🍎🍎</text>
    <text x="95" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#15803d">3 яблока</text>
  </g>
  
  <text x="185" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#ef4444" font-weight="bold">&gt;</text>
  
  <g class="compare" style="animation-delay: 0.3s">
    <rect x="210" y="50" width="150" height="80" fill="#fef3c7" rx="10"/>
    <text x="285" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="28">🍎🍎</text>
    <text x="285" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#d97706">2 яблока</text>
  </g>
  
  <text x="400" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#15803d">3 БОЛЬШЕ 2</text>
  
  <!-- Less than -->
  <g class="compare" style="animation-delay: 0.6s">
    <rect x="20" y="150" width="150" height="80" fill="#fef3c7" rx="10"/>
    <text x="95" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="28">🍎🍎</text>
    <text x="95" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#d97706">2 яблока</text>
  </g>
  
  <text x="185" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#3b82f6" font-weight="bold">&lt;</text>
  
  <g class="compare" style="animation-delay: 0.9s">
    <rect x="210" y="150" width="150" height="80" fill="#dcfce7" rx="10"/>
    <text x="285" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="28">🍎🍎🍎</text>
    <text x="285" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#15803d">3 яблока</text>
  </g>
  
  <text x="400" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3b82f6">2 МЕНЬШЕ 3</text>
  
  <!-- Equal -->
  <g class="compare" style="animation-delay: 1.2s">
    <rect x="20" y="250" width="150" height="70" fill="#dbeafe" rx="10"/>
    <text x="95" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="28">🍎🍎🍎</text>
    <text x="95" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">3 яблока</text>
  </g>
  
  <text x="185" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#22c55e" font-weight="bold">=</text>
  
  <g class="compare" style="animation-delay: 1.5s">
    <rect x="210" y="250" width="150" height="70" fill="#dbeafe" rx="10"/>
    <text x="285" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="28">🍎🍎🍎</text>
    <text x="285" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">3 яблока</text>
  </g>
  
  <text x="400" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#22c55e">3 РАВНО 3</text>
  
  <!-- Tip -->
  <rect x="380" y="50" width="110" height="180" fill="#f9fafb" rx="10" stroke="#e5e7eb" stroke-width="1"/>
  <text x="435" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151" font-weight="bold">Знаки:</text>
  <text x="435" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ef4444">&gt; больше</text>
  <text x="435" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">"клювик"</text>
  <text x="435" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">открыт</text>
  <text x="435" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#3b82f6">&lt; меньше</text>
  <text x="435" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#22c55e">= равно</text>
</svg>
