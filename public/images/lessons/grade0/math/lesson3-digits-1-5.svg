<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      @keyframes write { 0%, 100% { stroke-dashoffset: 0; } 50% { stroke-dashoffset: 50; } }
      .digit { animation: bounce 2s ease-in-out infinite; }
      .trace { stroke-dasharray: 100; animation: write 3s linear infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fef3c7"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#b45309">Цифры 1-5 ✏️</text>
  
  <!-- Digit 1 -->
  <g class="digit">
    <rect x="20" y="50" width="90" height="120" fill="#dbeafe" rx="10" stroke="#3b82f6" stroke-width="2"/>
    <text x="65" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#1d4ed8">1</text>
  </g>
  <text x="65" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">один</text>
  
  <!-- Digit 2 -->
  <g class="digit" style="animation-delay: 0.2s">
    <rect x="120" y="50" width="90" height="120" fill="#fce7f3" rx="10" stroke="#ec4899" stroke-width="2"/>
    <text x="165" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#be185d">2</text>
  </g>
  <text x="165" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">два</text>
  
  <!-- Digit 3 -->
  <g class="digit" style="animation-delay: 0.3s">
    <rect x="220" y="50" width="90" height="120" fill="#dcfce7" rx="10" stroke="#22c55e" stroke-width="2"/>
    <text x="265" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#15803d">3</text>
  </g>
  <text x="265" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">три</text>
  
  <!-- Digit 4 -->
  <g class="digit" style="animation-delay: 0.4s">
    <rect x="320" y="50" width="90" height="120" fill="#f3e8ff" rx="10" stroke="#a855f7" stroke-width="2"/>
    <text x="365" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#7c3aed">4</text>
  </g>
  <text x="365" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">четыре</text>
  
  <!-- Digit 5 -->
  <g class="digit" style="animation-delay: 0.5s">
    <rect x="420" y="50" width="60" height="120" fill="#fef2f2" rx="10" stroke="#ef4444" stroke-width="2"/>
    <text x="450" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="55" font-weight="bold" fill="#dc2626">5</text>
  </g>
  <text x="450" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6b7280">пять</text>
  
  <!-- Tracing line -->
  <path class="trace" d="M 30 250 L 470 250" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- Writing practice area -->
  <rect x="20" y="210" width="460" height="100" fill="white" rx="10" stroke="#d1d5db" stroke-width="2"/>
  <line x1="20" y1="260" x2="480" y2="260" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Example numbers to trace -->
  <text x="70" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1">1</text>
  <text x="150" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1">2</text>
  <text x="230" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1">3</text>
  <text x="310" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1">4</text>
  <text x="390" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" fill="#e5e7eb" stroke="#94a3b8" stroke-width="1">5</text>
  <text x="450" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9ca3af">✏️</text>
  
  <text x="250" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">Обведи цифры по образцу!</text>
</svg>
