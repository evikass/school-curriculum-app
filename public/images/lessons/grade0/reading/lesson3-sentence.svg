<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
      .capital { animation: blink 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#f0fdf4"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#15803d">Предложение 📝</text>
  
  <!-- Sentence structure -->
  <rect x="20" y="50" width="460" height="80" fill="#fef3c7" rx="15"/>
  <text x="250" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#b45309" font-weight="bold">Правила предложения:</text>
  <text x="250" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">1️⃣ Первое слово пишется с большой буквы</text>
  <text x="250" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">2️⃣ В конце ставится точка (.), знак (?) или (!)</text>
  
  <!-- Example sentence -->
  <rect x="20" y="145" width="460" height="70" fill="#dbeafe" rx="10"/>
  <g class="capital">
    <text x="80" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1d4ed8">М</text>
  </g>
  <text x="160" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#374151">ама готовит обед</text>
  <text x="380" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ef4444">.</text>
  
  <text x="250" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Большая буква в начале + точка в конце</text>
  
  <!-- Sentence types -->
  <rect x="20" y="230" width="145" height="100" fill="#dcfce7" rx="10"/>
  <text x="92" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">Повествовательное</text>
  <text x="92" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#22c55e">Мама дома.</text>
  <text x="92" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">.</text>
  <text x="92" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Рассказывает</text>
  
  <rect x="175" y="230" width="145" height="100" fill="#fef3c7" rx="10"/>
  <text x="247" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#b45309">Вопросительное</text>
  <text x="247" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d97706">Где мама?</text>
  <text x="247" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">?</text>
  <text x="247" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Спрашивает</text>
  
  <rect x="330" y="230" width="150" height="100" fill="#fce7f3" rx="10"/>
  <text x="405" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#be185d">Восклицательное</text>
  <text x="405" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#ec4899">Как красиво!</text>
  <text x="405" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="20">!</text>
  <text x="405" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Восклицает</text>
</svg>
