<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
      .word { animation: bounce 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#fef2f2"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#dc2626">Слова-предметы и слова-действия 📝</text>
  
  <!-- Words-objects -->
  <rect x="20" y="50" width="220" height="140" fill="#dbeafe" rx="15"/>
  <text x="130" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8">Слова-предметы</text>
  <text x="130" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3b82f6">Отвечают на КТО? ЧТО?</text>
  
  <g class="word">
    <text x="60" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🐕</text>
    <text x="60" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">собака</text>
    <text x="60" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">КТО?</text>
  </g>
  
  <g class="word" style="animation-delay: 0.2s">
    <text x="130" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">📚</text>
    <text x="130" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">книга</text>
    <text x="130" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">ЧТО?</text>
  </g>
  
  <g class="word" style="animation-delay: 0.4s">
    <text x="200" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🏠</text>
    <text x="200" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">дом</text>
    <text x="200" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">ЧТО?</text>
  </g>
  
  <!-- Words-actions -->
  <rect x="260" y="50" width="220" height="140" fill="#dcfce7" rx="15"/>
  <text x="370" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">Слова-действия</text>
  <text x="370" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#22c55e">Отвечают на ЧТО ДЕЛАЕТ?</text>
  
  <g class="word" style="animation-delay: 0.6s">
    <text x="300" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🏃</text>
    <text x="300" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">бежать</text>
  </g>
  
  <g class="word" style="animation-delay: 0.8s">
    <text x="370" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">📖</text>
    <text x="370" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">читать</text>
  </g>
  
  <g class="word" style="animation-delay: 1s">
    <text x="440" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24">🎮</text>
    <text x="440" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#374151">играть</text>
  </g>
  
  <!-- Connection -->
  <rect x="20" y="205" width="460" height="130" fill="#fef3c7" rx="15"/>
  <text x="250" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#b45309">Связь слов в предложении 🔗</text>
  
  <text x="130" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">🐕 Собака</text>
  <text x="250" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#d97706">➡️</text>
  <text x="370" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">бежать 🏃</text>
  
  <text x="250" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6b7280">КТО? — собака, ЧТО ДЕЛАЕТ? — бежит</text>
  <text x="250" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">Собака бежит.</text>
</svg>
