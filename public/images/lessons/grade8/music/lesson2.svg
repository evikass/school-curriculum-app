<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="stageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1A1A"/>
      <stop offset="100%" stop-color="#1A0A0A"/>
    </linearGradient>
    <radialGradient id="stageLight" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#FFE4B5" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFE4B5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Stage background -->
  <rect width="500" height="350" fill="url(#stageBg)"/>
  <rect width="500" height="350" fill="url(#stageLight)"/>
  
  <!-- Stage floor -->
  <path d="M0 250 L500 250 L500 350 L0 350 Z" fill="#3A2A1A"/>
  <!-- Stage floor lines -->
  <g stroke="#4A3A2A" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="260" x2="500" y2="260"/>
    <line x1="0" y1="280" x2="500" y2="280"/>
    <line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="0" y1="320" x2="500" y2="320"/>
  </g>
  
  <!-- Conductor podium (center back) -->
  <rect x="225" y="220" width="50" height="30" fill="#4A3020" stroke="#5A4030" stroke-width="1"/>
  <rect x="220" y="215" width="60" height="8" rx="2" fill="#5A4030"/>
  <!-- Music stand -->
  <line x1="250" y1="195" x2="250" y2="215" stroke="#333" stroke-width="2"/>
  <rect x="235" y="185" width="30" height="15" rx="1" fill="#2A2A2A" stroke="#444" stroke-width="0.5"/>
  
  <!-- Orchestra layout - semi-circular arrangement -->
  <!-- Row labels -->
  
  <!-- === STRINGS (front, semicircle) === -->
  <!-- Section label -->
  <text x="250" y="245" text-anchor="middle" font-size="6" fill="#8A6A4A" font-family="sans-serif">Струнные</text>
  
  <!-- Violins - small violin shapes -->
  <g transform="translate(120,240)">
    <ellipse cx="0" cy="0" rx="6" ry="5" fill="#8B6914"/>
    <line x1="6" y1="-2" x2="10" y2="-8" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="-3" r="2" fill="#6B4E12"/>
    <!-- Player silhouette -->
    <circle cx="0" cy="-12" r="4" fill="#2A2A2A" opacity="0.5"/>
    <line x1="0" y1="-8" x2="0" y2="-5" stroke="#2A2A2A" stroke-width="2" opacity="0.5"/>
  </g>
  <g transform="translate(155,235)">
    <ellipse cx="0" cy="0" rx="6" ry="5" fill="#8B6914"/>
    <line x1="6" y1="-2" x2="10" y2="-8" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="-3" r="2" fill="#6B4E12"/>
    <circle cx="0" cy="-12" r="4" fill="#2A2A2A" opacity="0.5"/>
    <line x1="0" y1="-8" x2="0" y2="-5" stroke="#2A2A2A" stroke-width="2" opacity="0.5"/>
  </g>
  <g transform="translate(190,232)">
    <ellipse cx="0" cy="0" rx="6" ry="5" fill="#8B6914"/>
    <line x1="6" y1="-2" x2="10" y2="-8" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="-3" r="2" fill="#6B4E12"/>
    <circle cx="0" cy="-12" r="4" fill="#2A2A2A" opacity="0.5"/>
    <line x1="0" y1="-8" x2="0" y2="-5" stroke="#2A2A2A" stroke-width="2" opacity="0.5"/>
  </g>
  <g transform="translate(310,232)">
    <ellipse cx="0" cy="0" rx="6" ry="5" fill="#8B6914"/>
    <line x1="6" y1="-2" x2="10" y2="-8" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="-3" r="2" fill="#6B4E12"/>
    <circle cx="0" cy="-12" r="4" fill="#2A2A2A" opacity="0.5"/>
    <line x1="0" y1="-8" x2="0" y2="-5" stroke="#2A2A2A" stroke-width="2" opacity="0.5"/>
  </g>
  <g transform="translate(345,235)">
    <ellipse cx="0" cy="0" rx="6" ry="5" fill="#8B6914"/>
    <line x1="6" y1="-2" x2="10" y2="-8" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="-3" r="2" fill="#6B4E12"/>
    <circle cx="0" cy="-12" r="4" fill="#2A2A2A" opacity="0.5"/>
    <line x1="0" y1="-8" x2="0" y2="-5" stroke="#2A2A2A" stroke-width="2" opacity="0.5"/>
  </g>
  <g transform="translate(380,240)">
    <ellipse cx="0" cy="0" rx="6" ry="5" fill="#8B6914"/>
    <line x1="6" y1="-2" x2="10" y2="-8" stroke="#8B6914" stroke-width="1"/>
    <circle cx="0" cy="-3" r="2" fill="#6B4E12"/>
    <circle cx="0" cy="-12" r="4" fill="#2A2A2A" opacity="0.5"/>
    <line x1="0" y1="-8" x2="0" y2="-5" stroke="#2A2A2A" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Cellos (larger, slightly behind) -->
  <g transform="translate(170,210)">
    <ellipse cx="0" cy="0" rx="5" ry="8" fill="#6B4E12"/>
    <line x1="5" y1="-5" x2="8" y2="-14" stroke="#6B4E12" stroke-width="1"/>
    <circle cx="0" cy="-16" r="4" fill="#2A2A2A" opacity="0.5"/>
  </g>
  <g transform="translate(330,210)">
    <ellipse cx="0" cy="0" rx="5" ry="8" fill="#6B4E12"/>
    <line x1="5" y1="-5" x2="8" y2="-14" stroke="#6B4E12" stroke-width="1"/>
    <circle cx="0" cy="-16" r="4" fill="#2A2A2A" opacity="0.5"/>
  </g>
  
  <!-- === WOODWIND (middle row) === -->
  <text x="250" y="200" text-anchor="middle" font-size="6" fill="#6A8A6A" font-family="sans-serif">Деревянные духовые</text>
  
  <!-- Flute -->
  <g transform="translate(200,190)">
    <line x1="0" y1="0" x2="25" y2="-3" stroke="#C0C0C0" stroke-width="2"/>
    <circle cx="5" cy="-1" r="1.5" fill="#A0A0A0"/>
    <circle cx="10" cy="-2" r="1.5" fill="#A0A0A0"/>
    <circle cx="15" cy="-2" r="1.5" fill="#A0A0A0"/>
    <circle cx="-3" cy="2" r="3" fill="#2A2A2A" opacity="0.4"/>
  </g>
  <!-- Clarinet -->
  <g transform="translate(240,185)">
    <line x1="0" y1="0" x2="3" y2="20" stroke="#2A1A0A" stroke-width="3"/>
    <rect x="-2" y="4" width="5" height="2" rx="0.5" fill="#C0C0C0"/>
    <circle cx="-4" cy="5" r="2" fill="#E8E8E8"/>
    <circle cx="-5" cy="2" r="3" fill="#2A2A2A" opacity="0.4"/>
  </g>
  <!-- Oboe -->
  <g transform="translate(275,188)">
    <line x1="0" y1="0" x2="2" y2="18" stroke="#2A1A0A" stroke-width="2.5"/>
    <circle cx="0" cy="5" r="1.5" fill="#C0C0C0"/>
    <circle cx="1" cy="10" r="1.5" fill="#C0C0C0"/>
    <circle cx="-4" cy="2" r="3" fill="#2A2A2A" opacity="0.4"/>
  </g>
  
  <!-- === BRASS (back left) === -->
  <text x="100" y="170" text-anchor="middle" font-size="6" fill="#AA8A4A" font-family="sans-serif">Медные духовые</text>
  
  <!-- Trumpet -->
  <g transform="translate(60,160)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#DAA520" stroke-width="3"/>
    <path d="M22 0 L30 -5 L30 5 Z" fill="#DAA520"/>
    <circle cx="6" cy="-2" r="1.5" fill="#B8860B"/>
    <circle cx="10" cy="-2" r="1.5" fill="#B8860B"/>
    <circle cx="14" cy="-2" r="1.5" fill="#B8860B"/>
    <circle cx="-3" cy="2" r="3" fill="#2A2A2A" opacity="0.4"/>
  </g>
  <!-- French horn -->
  <g transform="translate(100,155)">
    <path d="M0 0 Q10 -10 15 -5 Q20 0 15 5 Q10 10 0 5" fill="none" stroke="#DAA520" stroke-width="2.5"/>
    <circle cx="18" cy="0" r="6" fill="none" stroke="#DAA520" stroke-width="2"/>
    <circle cx="-3" cy="3" r="3" fill="#2A2A2A" opacity="0.4"/>
  </g>
  
  <!-- === PERCUSSION (back right) === -->
  <text x="400" y="170" text-anchor="middle" font-size="6" fill="#8A4A4A" font-family="sans-serif">Ударные</text>
  
  <!-- Timpani -->
  <g transform="translate(380,170)">
    <ellipse cx="0" cy="5" rx="15" ry="5" fill="#8B4513"/>
    <ellipse cx="0" cy="0" rx="15" ry="5" fill="#C8A878"/>
    <ellipse cx="0" cy="0" rx="13" ry="4" fill="#E8D8B8"/>
    <path d="M-15 5 L-18 18 L18 18 L15 5" fill="#6B3E12" stroke="#5A3010" stroke-width="0.5"/>
  </g>
  <!-- Snare drum -->
  <g transform="translate(420,175)">
    <ellipse cx="0" cy="0" rx="10" ry="4" fill="#E8D8C8"/>
    <rect x="-10" y="0" width="20" height="8" fill="#C8B898"/>
    <ellipse cx="0" cy="8" rx="10" ry="4" fill="#B8A888"/>
    <line x1="-8" y1="2" x2="8" y2="2" stroke="#A09070" stroke-width="0.5"/>
    <line x1="-8" y1="4" x2="8" y2="4" stroke="#A09070" stroke-width="0.5"/>
  </g>
  <!-- Cymbal -->
  <g transform="translate(450,165)">
    <ellipse cx="0" cy="0" rx="12" ry="3" fill="#DAA520"/>
    <ellipse cx="0" cy="0" rx="10" ry="2" fill="#C8A020"/>
    <line x1="0" y1="3" x2="0" y2="18" stroke="#8B6914" stroke-width="2"/>
  </g>
  
  <!-- === KEYBOARD (center back) === -->
  <text x="250" y="160" text-anchor="middle" font-size="6" fill="#7A7AAA" font-family="sans-serif">Клавишные</text>
  <!-- Piano (top view) -->
  <g transform="translate(220,130)">
    <!-- White keys -->
    <rect x="0" y="0" width="60" height="20" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.3"/>
    <!-- Black keys -->
    <rect x="8" y="0" width="4" height="12" fill="#222"/>
    <rect x="18" y="0" width="4" height="12" fill="#222"/>
    <rect x="28" y="0" width="4" height="12" fill="#222"/>
    <rect x="38" y="0" width="4" height="12" fill="#222"/>
    <rect x="48" y="0" width="4" height="12" fill="#222"/>
  </g>
  
  <!-- Conductor silhouette -->
  <circle cx="250" cy="205" r="5" fill="#1A1A1A"/>
  <line x1="250" y1="210" x2="250" y2="225" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Baton -->
  <line x1="252" y1="212" x2="270" y2="198" stroke="#FFF" stroke-width="1"/>
  
  <!-- Semicircle layout guide -->
  <path d="M80 250 Q250 170 420 250" fill="none" stroke="#4A3A2A" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.4"/>
  
  <text x="250" y="340" text-anchor="middle" font-size="9" opacity="0.5" font-family="sans-serif" fill="#AAA">Музыкальные инструменты</text>
</svg>