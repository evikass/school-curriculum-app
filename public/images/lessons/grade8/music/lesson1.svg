<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgMusic" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A1A3A"/>
      <stop offset="100%" stop-color="#1A0A2A"/>
    </linearGradient>
    <radialGradient id="spotOp" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#5A0000"/>
    </radialGradient>
    <radialGradient id="spotJazz" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <rect width="500" height="350" fill="url(#bgMusic)"/>
  
  <!-- Musical staff lines in background -->
  <g stroke="#4A3A5A" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="110" x2="500" y2="110"/>
    <line x1="0" y1="120" x2="500" y2="120"/>
    <line x1="0" y1="130" x2="500" y2="130"/>
    <line x1="0" y1="140" x2="500" y2="140"/>
  </g>
  
  <!-- === OPERA (left) === -->
  <!-- Spotlight circle -->
  <circle cx="130" cy="140" r="80" fill="url(#spotOp)" opacity="0.3"/>
  <!-- Opera masks -->
  <!-- Happy mask (left) -->
  <path d="M60 100 Q70 80 90 80 Q110 80 120 100 Q115 130 90 140 Q65 130 60 100 Z" fill="#F0E8D8" stroke="#C8B898" stroke-width="1"/>
  <ellipse cx="78" cy="105" rx="6" ry="8" fill="#2A1A0A"/>
  <ellipse cx="102" cy="105" rx="6" ry="8" fill="#2A1A0A"/>
  <path d="M78 120 Q90 132 102 120" fill="none" stroke="#C89888" stroke-width="1.5"/>
  <!-- Sad mask (right, tilted) -->
  <g transform="translate(170,130) rotate(15)">
    <path d="M-30 -20 Q-20 -40 0 -40 Q20 -40 30 -20 Q25 10 0 20 Q-25 10 -30 -20 Z" fill="#E8E0D0" stroke="#B8A888" stroke-width="1"/>
    <ellipse cx="-10" cy="-12" rx="5" ry="7" fill="#2A1A0A"/>
    <ellipse cx="10" cy="-12" rx="5" ry="7" fill="#2A1A0A"/>
    <path d="M-10 5 Q0 -5 10 5" fill="none" stroke="#B88878" stroke-width="1.5"/>
  </g>
  <!-- Opera label -->
  <text x="120" y="175" text-anchor="middle" font-size="10" fill="#CC8888" font-family="serif">Опера</text>
  
  <!-- === SYMPHONY (center) === -->
  <circle cx="250" cy="140" r="80" fill="#1A3A5A" opacity="0.3"/>
  <!-- Symphony score -->
  <rect x="210" y="70" width="80" height="110" rx="3" fill="#FFF8DC" stroke="#B8A878" stroke-width="1" transform="rotate(-5 250 125)"/>
  <!-- Staff lines on score -->
  <g stroke="#333" stroke-width="0.3" transform="rotate(-5 250 125)">
    <line x1="218" y1="85" x2="282" y2="85"/>
    <line x1="218" y1="90" x2="282" y2="90"/>
    <line x1="218" y1="95" x2="282" y2="95"/>
    <line x1="218" y1="100" x2="282" y2="100"/>
    <line x1="218" y1="105" x2="282" y2="105"/>
    <line x1="218" y1="120" x2="282" y2="120"/>
    <line x1="218" y1="125" x2="282" y2="125"/>
    <line x1="218" y1="130" x2="282" y2="130"/>
    <line x1="218" y1="135" x2="282" y2="135"/>
    <line x1="218" y1="140" x2="282" y2="140"/>
  </g>
  <!-- Notes on score -->
  <g transform="rotate(-5 250 125)" fill="#333">
    <ellipse cx="230" cy="93" rx="3" ry="2.5" transform="rotate(-15 230 93)"/>
    <line x1="233" y1="93" x2="233" y2="78" stroke="#333" stroke-width="1"/>
    <ellipse cx="245" cy="98" rx="3" ry="2.5" transform="rotate(-15 245 98)"/>
    <line x1="248" y1="98" x2="248" y2="83" stroke="#333" stroke-width="1"/>
    <ellipse cx="260" cy="88" rx="3" ry="2.5" transform="rotate(-15 260 88)"/>
    <line x1="263" y1="88" x2="263" y2="73" stroke="#333" stroke-width="1"/>
    <ellipse cx="235" cy="133" rx="3" ry="2.5" transform="rotate(-15 235 133)"/>
    <line x1="238" y1="133" x2="238" y2="118" stroke="#333" stroke-width="1"/>
    <ellipse cx="255" cy="128" rx="3" ry="2.5" transform="rotate(-15 255 128)"/>
    <line x1="258" y1="128" x2="258" y2="113" stroke="#333" stroke-width="1"/>
    <ellipse cx="270" cy="138" rx="3" ry="2.5" transform="rotate(-15 270 138)"/>
    <line x1="273" y1="138" x2="273" y2="123" stroke="#333" stroke-width="1"/>
  </g>
  <!-- Treble clef suggestion -->
  <path d="M218 95 Q215 85 220 75 Q225 70 228 80 Q230 90 225 95 Q220 100 218 95" fill="none" stroke="#5A4A3A" stroke-width="1.5" transform="rotate(-5 250 125)"/>
  <!-- Symphony label -->
  <text x="250" y="195" text-anchor="middle" font-size="10" fill="#88AACC" font-family="serif">Симфония</text>
  
  <!-- === JAZZ (right) === -->
  <circle cx="390" cy="140" r="80" fill="url(#spotJazz)" opacity="0.3"/>
  <!-- Saxophone -->
  <g transform="translate(370, 80)">
    <!-- Mouthpiece -->
    <path d="M10 0 L8 15 L12 15 Z" fill="#DAA520"/>
    <!-- Neck -->
    <path d="M8 15 Q5 30 10 50" stroke="#C8A020" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M10 50 Q8 70 15 90 Q25 110 35 120" stroke="#C8A020" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Bell -->
    <path d="M35 120 Q45 135 55 130 Q60 125 50 115" stroke="#C8A020" stroke-width="6" fill="#DAA520" fill-opacity="0.3"/>
    <ellipse cx="48" cy="128" rx="15" ry="10" fill="none" stroke="#C8A020" stroke-width="3"/>
    <!-- Keys -->
    <circle cx="12" cy="40" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="11" cy="55" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="12" cy="70" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="17" cy="85" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="25" cy="100" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
  </g>
  <!-- Jazz label -->
  <text x="390" y="195" text-anchor="middle" font-size="10" fill="#DAA520" font-family="serif">Джаз</text>
  
  <!-- Musical notes floating -->
  <g fill="#8A6AAA" opacity="0.4">
    <!-- Note 1 -->
    <ellipse cx="30" cy="50" rx="5" ry="4" transform="rotate(-20 30 50)"/>
    <line x1="35" y1="50" x2="35" y2="30" stroke="#8A6AAA" stroke-width="1.5"/>
    <path d="M35 30 Q42 33 35 37" fill="#8A6AAA"/>
    <!-- Note 2 -->
    <ellipse cx="460" cy="40" rx="4" ry="3" transform="rotate(-15 460 40)"/>
    <line x1="464" y1="40" x2="464" y2="22" stroke="#8A6AAA" stroke-width="1.5"/>
    <!-- Note 3 -->
    <ellipse cx="470" cy="260" rx="5" ry="4" transform="rotate(-20 470 260)"/>
    <line x1="475" y1="260" x2="475" y2="240" stroke="#8A6AAA" stroke-width="1.5"/>
    <path d="M475 240 Q482 243 475 247" fill="#8A6AAA"/>
  </g>
  
  <!-- Decorative sound waves -->
  <g stroke="#6A5A8A" stroke-width="1" fill="none" opacity="0.3">
    <path d="M250 220 Q260 230 250 240 Q240 250 250 260"/>
    <path d="M260 215 Q275 230 260 245 Q245 260 260 275"/>
    <path d="M270 210 Q290 230 270 250 Q250 270 270 290"/>
  </g>
  
  <!-- Bottom decorative bar -->
  <rect x="50" y="290" width="400" height="2" rx="1" fill="#6A5A8A" opacity="0.3"/>
  
  <!-- Genre descriptions -->
  <text x="120" y="310" text-anchor="middle" font-size="7" fill="#8A6A7A" font-family="sans-serif">Драма • Ария • Хор</text>
  <text x="250" y="310" text-anchor="middle" font-size="7" fill="#7A8A9A" font-family="sans-serif">Оркестр • Партитура</text>
  <text x="390" y="310" text-anchor="middle" font-size="7" fill="#9A8A5A" font-family="sans-serif">Импровизация • Свинг</text>
  
  <text x="250" y="340" text-anchor="middle" font-size="9" opacity="0.5" font-family="sans-serif" fill="#AAA">Музыкальные жанры</text>
</svg>