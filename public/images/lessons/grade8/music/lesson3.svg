<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="folkSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A7AAA"/>
      <stop offset="100%" stop-color="#87CEEB"/>
    </linearGradient>
    <radialGradient id="sunFolk" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="500" height="350" fill="url(#folkSky)"/>
  
  <!-- Fields -->
  <path d="M0 200 Q100 180 200 195 Q300 175 400 190 Q450 185 500 200 L500 350 L0 350 Z" fill="#6A9A4A"/>
  <path d="M0 230 Q150 215 250 225 Q350 210 500 230 L500 350 L0 350 Z" fill="#5A8A3A"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="30" fill="url(#sunFolk)"/>
  <!-- Sun rays -->
  <g stroke="#FFD700" stroke-width="2" opacity="0.6">
    <line x1="420" y1="15" x2="420" y2="5"/>
    <line x1="445" y1="30" x2="455" y2="22"/>
    <line x1="455" y1="50" x2="465" y2="50"/>
    <line x1="445" y1="70" x2="455" y2="78"/>
    <line x1="395" y1="30" x2="385" y2="22"/>
    <line x1="385" y1="50" x2="375" y2="50"/>
    <line x1="395" y1="70" x2="385" y2="78"/>
  </g>
  
  <!-- Khokhloma-style decorative border at top -->
  <g fill="none" stroke="#CC0000" stroke-width="1.5" opacity="0.4">
    <path d="M0 10 Q25 0 50 10 Q75 20 100 10 Q125 0 150 10 Q175 20 200 10 Q225 0 250 10 Q275 20 300 10 Q325 0 350 10 Q375 20 400 10 Q425 0 450 10 Q475 20 500 10"/>
  </g>
  <!-- Khokhloma flowers -->
  <g opacity="0.3">
    <circle cx="50" cy="8" r="4" fill="#CC0000"/>
    <circle cx="150" cy="12" r="4" fill="#CC0000"/>
    <circle cx="250" cy="8" r="4" fill="#CC0000"/>
    <circle cx="350" cy="12" r="4" fill="#CC0000"/>
    <circle cx="450" cy="8" r="4" fill="#CC0000"/>
  </g>
  
  <!-- Balalaika (center-left) -->
  <g transform="translate(100, 100) rotate(-15)">
    <!-- Neck -->
    <rect x="22" y="-50" width="6" height="60" fill="#8B6914" rx="1"/>
    <!-- Frets -->
    <line x1="22" y1="-40" x2="28" y2="-40" stroke="#C8A878" stroke-width="0.5"/>
    <line x1="22" y1="-30" x2="28" y2="-30" stroke="#C8A878" stroke-width="0.5"/>
    <line x1="22" y1="-20" x2="28" y2="-20" stroke="#C8A878" stroke-width="0.5"/>
    <!-- Headstock -->
    <path d="M22 -50 L18 -65 L32 -65 L28 -50" fill="#6B4E12"/>
    <!-- Tuning pegs -->
    <circle cx="19" cy="-60" r="2" fill="#C8A878"/>
    <circle cx="19" cy="-52" r="2" fill="#C8A878"/>
    <circle cx="31" cy="-56" r="2" fill="#C8A878"/>
    <!-- Body (triangular) -->
    <polygon points="15,10 35,10 25,70" fill="#DEB887" stroke="#8B6914" stroke-width="1.5"/>
    <!-- Sound hole -->
    <circle cx="25" cy="35" r="8" fill="#C8A878" stroke="#8B6914" stroke-width="1"/>
    <!-- Rosette -->
    <circle cx="25" cy="35" r="10" fill="none" stroke="#B8860B" stroke-width="0.5"/>
    <!-- Strings -->
    <line x1="23" y1="-45" x2="21" y2="65" stroke="#C0C0C0" stroke-width="0.5"/>
    <line x1="25" y1="-45" x2="25" y2="68" stroke="#C0C0C0" stroke-width="0.5"/>
    <line x1="27" y1="-45" x2="29" y2="65" stroke="#C0C0C0" stroke-width="0.5"/>
    <!-- Bridge -->
    <rect x="20" y="55" width="10" height="2" rx="1" fill="#6B4E12"/>
  </g>
  
  <!-- Bayan/Accordion (center-right) -->
  <g transform="translate(300, 120)">
    <!-- Left keyboard -->
    <rect x="0" y="0" width="30" height="80" rx="3" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
    <!-- Bass buttons -->
    <g fill="#C8C8C8">
      <circle cx="10" cy="15" r="3"/>
      <circle cx="20" cy="15" r="3"/>
      <circle cx="10" cy="25" r="3"/>
      <circle cx="20" cy="25" r="3"/>
      <circle cx="10" cy="35" r="3"/>
      <circle cx="20" cy="35" r="3"/>
      <circle cx="10" cy="45" r="3"/>
      <circle cx="20" cy="45" r="3"/>
      <circle cx="10" cy="55" r="3"/>
      <circle cx="20" cy="55" r="3"/>
      <circle cx="10" cy="65" r="3"/>
      <circle cx="20" cy="65" r="3"/>
    </g>
    <!-- Bellows -->
    <g stroke="#8B6914" stroke-width="1" fill="none">
      <path d="M30 0 L50 0 L50 80 L30 80"/>
      <line x1="33" y1="0" x2="33" y2="80" stroke="#A08040"/>
      <line x1="36" y1="0" x2="36" y2="80" stroke="#8B6914"/>
      <line x1="39" y1="0" x2="39" y2="80" stroke="#A08040"/>
      <line x1="42" y1="0" x2="42" y2="80" stroke="#8B6914"/>
      <line x1="45" y1="0" x2="45" y2="80" stroke="#A08040"/>
      <line x1="48" y1="0" x2="48" y2="80" stroke="#8B6914"/>
    </g>
    <rect x="30" y="0" width="20" height="80" fill="#C8A050" opacity="0.3"/>
    <!-- Right keyboard -->
    <rect x="50" y="0" width="50" height="80" rx="3" fill="#2A2A2A" stroke="#444" stroke-width="1"/>
    <!-- Piano keys on right side -->
    <g fill="#FFF" stroke="#CCC" stroke-width="0.3">
      <rect x="54" y="5" width="6" height="15"/>
      <rect x="61" y="5" width="6" height="15"/>
      <rect x="68" y="5" width="6" height="15"/>
      <rect x="75" y="5" width="6" height="15"/>
      <rect x="82" y="5" width="6" height="15"/>
      <rect x="89" y="5" width="6" height="15"/>
    </g>
    <g fill="#222">
      <rect x="58" y="5" width="4" height="9"/>
      <rect x="65" y="5" width="4" height="9"/>
      <rect x="79" y="5" width="4" height="9"/>
      <rect x="86" y="5" width="4" height="9"/>
    </g>
    <!-- Shoulder strap -->
    <path d="M15 0 Q40 -20 65 0" fill="none" stroke="#5A3A1A" stroke-width="2"/>
  </g>
  
  <!-- Female figure in traditional dress (right) -->
  <g transform="translate(430, 100)">
    <!-- Kokoshnik (headdress) -->
    <path d="M-20 -25 Q0 -55 20 -25" fill="#CC0000" stroke="#FFD700" stroke-width="1"/>
    <!-- Decoration on kokoshnik -->
    <circle cx="0" cy="-40" r="3" fill="#FFD700"/>
    <circle cx="-8" cy="-32" r="2" fill="#FFD700"/>
    <circle cx="8" cy="-32" r="2" fill="#FFD700"/>
    <!-- Face -->
    <ellipse cx="0" cy="-15" rx="10" ry="12" fill="#DEB887"/>
    <!-- Hair -->
    <path d="M-10 -18 Q-12 -25 -5 -28" fill="#C8A040" stroke="#A08030" stroke-width="0.5"/>
    <path d="M10 -18 Q12 -25 5 -28" fill="#C8A040" stroke="#A08030" stroke-width="0.5"/>
    <!-- Braids -->
    <path d="M-8 -5 Q-15 10 -12 30" stroke="#C8A040" stroke-width="3" fill="none"/>
    <path d="M8 -5 Q15 10 12 30" stroke="#C8A040" stroke-width="3" fill="none"/>
    <!-- Sarafan (dress) -->
    <path d="M-15 -3 L-25 60 L25 60 L15 -3 Z" fill="#0000AA"/>
    <!-- Dress decoration -->
    <line x1="-15" y1="-3" x2="15" y2="-3" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="-20" y1="20" x2="20" y2="20" stroke="#FFD700" stroke-width="0.5" stroke-dasharray="2,2"/>
    <!-- Sleeves -->
    <path d="M-15 -3 L-25 10 L-20 15 L-10 5" fill="#FFF0E0"/>
    <path d="M15 -3 L25 10 L20 15 L10 5" fill="#FFF0E0"/>
  </g>
  
  <!-- Village houses in background -->
  <g transform="translate(0, 0)">
    <!-- House 1 -->
    <rect x="350" y="185" width="30" height="20" fill="#8B6914"/>
    <polygon points="345,185 365,170 385,185" fill="#6B3E12"/>
    <rect x="360" y="192" width="8" height="13" fill="#5A3A1A"/>
    
    <!-- House 2 -->
    <rect x="30" y="195" width="25" height="18" fill="#8B6914"/>
    <polygon points="25,195 42,180 60,195" fill="#6B3E12"/>
    <rect x="38" y="200" width="6" height="13" fill="#5A3A1A"/>
  </g>
  
  <!-- Birch trees -->
  <rect x="460" y="150" width="5" height="50" fill="#E8E0D8"/>
  <g stroke="#333" stroke-width="0.5" opacity="0.3">
    <line x1="461" y1="155" x2="464" y2="158"/>
    <line x1="462" y1="165" x2="465" y2="168"/>
    <line x1="461" y1="175" x2="464" y2="178"/>
  </g>
  <ellipse cx="462" cy="145" rx="10" ry="8" fill="#4A8A3A" opacity="0.7"/>
  
  <!-- Musical notes floating -->
  <g fill="#8B0000" opacity="0.5">
    <ellipse cx="180" cy="140" rx="5" ry="4" transform="rotate(-15 180 140)"/>
    <line x1="185" y1="140" x2="185" y2="120" stroke="#8B0000" stroke-width="1.5"/>
    <path d="M185 120 Q192 123 185 127" fill="#8B0000"/>
    
    <ellipse cx="250" cy="100" rx="4" ry="3" transform="rotate(-15 250 100)"/>
    <line x1="254" y1="100" x2="254" y2="82" stroke="#8B0000" stroke-width="1.5"/>
  </g>
  
  <text x="250" y="340" text-anchor="middle" font-size="9" opacity="0.5" font-family="sans-serif">Русская народная музыка</text>
</svg>