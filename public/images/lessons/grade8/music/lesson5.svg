<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="tchaikBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1A2A48"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0F0FF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#C0C0E0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8080A0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lakeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2A4A"/>
      <stop offset="50%" stop-color="#2A3A5A"/>
      <stop offset="100%" stop-color="#1A2040"/>
    </linearGradient>
  </defs>
  <!-- Night sky background -->
  <rect width="500" height="350" fill="url(#tchaikBg)"/>
  
  <!-- Moon -->
  <circle cx="400" cy="50" r="50" fill="url(#moonGlow)"/>
  <circle cx="400" cy="50" r="18" fill="#F0F0FF" opacity="0.9"/>
  
  <!-- Stars -->
  <g fill="#FFF" opacity="0.5">
    <circle cx="50" cy="30" r="1"/>
    <circle cx="120" cy="55" r="1.2"/>
    <circle cx="200" cy="20" r="0.8"/>
    <circle cx="280" cy="40" r="1"/>
    <circle cx="330" cy="25" r="0.8"/>
    <circle cx="450" cy="35" r="1"/>
    <circle cx="80" cy="80" r="0.8"/>
    <circle cx="470" cy="80" r="1"/>
    <circle cx="30" cy="100" r="0.7"/>
    <circle cx="160" cy="70" r="0.9"/>
  </g>
  
  <!-- Lake water -->
  <path d="M0 200 Q50 195 100 200 Q200 190 300 200 Q400 195 500 200 L500 350 L0 350 Z" fill="url(#lakeGrad)"/>
  
  <!-- Water reflections -->
  <g opacity="0.15">
    <path d="M100 220 Q110 225 100 230" stroke="#C0C0E0" stroke-width="0.5" fill="none"/>
    <path d="M200 215 Q210 220 200 225" stroke="#C0C0E0" stroke-width="0.5" fill="none"/>
    <path d="M300 220 Q310 225 300 230" stroke="#C0C0E0" stroke-width="0.5" fill="none"/>
    <path d="M400 215 Q410 220 400 225" stroke="#C0C0E0" stroke-width="0.5" fill="none"/>
    <!-- Moon reflection -->
    <ellipse cx="400" cy="240" rx="8" ry="20" fill="#C0C0E0" opacity="0.3"/>
  </g>
  
  <!-- Reeds on left -->
  <g stroke="#2A4A2A" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M30 200 L25 150"/>
    <path d="M40 200 L42 145"/>
    <path d="M50 200 L48 155"/>
    <path d="M35 200 L30 160"/>
  </g>
  <!-- Reed tops -->
  <ellipse cx="25" cy="148" rx="2" ry="5" fill="#4A3A2A" opacity="0.6"/>
  <ellipse cx="42" cy="143" rx="2" ry="5" fill="#4A3A2A" opacity="0.6"/>
  
  <!-- Reeds on right -->
  <g stroke="#2A4A2A" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M450 200 L455 160"/>
    <path d="M460 200 L458 150"/>
    <path d="M470 200 L472 155"/>
  </g>
  
  <!-- SWAN on the lake -->
  <g transform="translate(230, 195)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="30" ry="12" fill="#FFF" opacity="0.9"/>
    <!-- Neck -->
    <path d="M-20 -5 Q-28 -25 -25 -40 Q-22 -50 -18 -48" fill="none" stroke="#FFF" stroke-width="5" stroke-linecap="round"/>
    <!-- Head -->
    <ellipse cx="-18" cy="-50" rx="6" ry="5" fill="#FFF"/>
    <!-- Beak -->
    <path d="M-24 -50 L-30 -48 L-24 -46" fill="#E88020"/>
    <!-- Eye -->
    <circle cx="-20" cy="-51" r="1" fill="#111"/>
    <!-- Wing detail -->
    <path d="M-5 -8 Q5 -12 15 -8 Q25 -5 30 -2" fill="none" stroke="#E0E0E0" stroke-width="1"/>
    <path d="M-8 -5 Q5 -10 20 -5 Q28 -2 32 0" fill="none" stroke="#E0E0E0" stroke-width="0.8"/>
    <!-- Tail -->
    <path d="M28 -8 L38 -15 L35 -5" fill="#FFF"/>
    <!-- Water ripple -->
    <ellipse cx="0" cy="12" rx="35" ry="3" fill="none" stroke="#C0C0E0" stroke-width="0.5" opacity="0.3"/>
  </g>
  
  <!-- Second swan (smaller, further) -->
  <g transform="translate(340, 210) scale(0.6)">
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="#FFF" opacity="0.7"/>
    <path d="M-15 -4 Q-22 -20 -20 -35 Q-18 -42 -14 -40" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="-14" cy="-42" rx="5" ry="4" fill="#FFF" opacity="0.7"/>
    <path d="M-19 -42 L-24 -40 L-19 -38" fill="#E88020"/>
    <circle cx="-16" cy="-43" r="0.8" fill="#111"/>
    <ellipse cx="0" cy="10" rx="28" ry="2.5" fill="none" stroke="#C0C0E0" stroke-width="0.5" opacity="0.2"/>
  </g>
  
  <!-- Grand piano (bottom left) -->
  <g transform="translate(30, 250)">
    <!-- Piano body (top view / angled) -->
    <path d="M0 0 L60 0 L80 -15 Q90 -30 80 -50 L60 -60 L0 -60 Z" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
    <!-- Piano lid (open) -->
    <path d="M0 0 L60 0 L80 -15 Q90 -30 80 -50 L60 -60 L0 -60 Z" fill="#222" stroke="#333" stroke-width="0.5" transform="translate(0,-30) skewX(-5)"/>
    <!-- Lid prop -->
    <line x1="65" y1="-30" x2="65" y2="-55" stroke="#333" stroke-width="1"/>
    <!-- Keyboard -->
    <rect x="0" y="0" width="50" height="8" fill="#F8F8F0"/>
    <!-- White keys -->
    <g stroke="#CCC" stroke-width="0.3">
      <line x1="7" y1="0" x2="7" y2="8"/>
      <line x1="14" y1="0" x2="14" y2="8"/>
      <line x1="21" y1="0" x2="21" y2="8"/>
      <line x1="28" y1="0" x2="28" y2="8"/>
      <line x1="35" y1="0" x2="35" y2="8"/>
      <line x1="42" y1="0" x2="42" y2="8"/>
    </g>
    <!-- Black keys -->
    <g fill="#111">
      <rect x="5" y="0" width="4" height="5"/>
      <rect x="12" y="0" width="4" height="5"/>
      <rect x="26" y="0" width="4" height="5"/>
      <rect x="33" y="0" width="4" height="5"/>
      <rect x="40" y="0" width="4" height="5"/>
    </g>
    <!-- Piano legs -->
    <line x1="5" y1="8" x2="5" y2="35" stroke="#1A1A1A" stroke-width="3"/>
    <line x1="75" y1="8" x2="75" y2="35" stroke="#1A1A1A" stroke-width="3"/>
    <line x1="40" y1="8" x2="40" y2="35" stroke="#1A1A1A" stroke-width="3"/>
    <!-- Pedals -->
    <rect x="30" y="33" width="8" height="3" rx="1" fill="#DAA520"/>
    <rect x="40" y="33" width="8" height="3" rx="1" fill="#DAA520"/>
    <rect x="50" y="33" width="8" height="3" rx="1" fill="#DAA520"/>
  </g>
  
  <!-- Musical notes floating -->
  <g opacity="0.4">
    <ellipse cx="150" cy="140" rx="5" ry="4" fill="#8090C0" transform="rotate(-15 150 140)"/>
    <line x1="155" y1="140" x2="155" y2="118" stroke="#8090C0" stroke-width="1.5"/>
    <path d="M155 118 Q162 122 155 126" fill="#8090C0"/>
    
    <ellipse cx="350" cy="120" rx="4" ry="3" fill="#8090C0" transform="rotate(-15 350 120)"/>
    <line x1="354" y1="120" x2="354" y2="102" stroke="#8090C0" stroke-width="1.5"/>
    
    <ellipse cx="180" cy="100" rx="4" ry="3" fill="#8090C0" transform="rotate(-15 180 100)"/>
    <line x1="184" y1="100" x2="184" y2="82" stroke="#8090C0" stroke-width="1.5"/>
    <path d="M184 82 Q191 86 184 90" fill="#8090C0"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="310" text-anchor="middle" font-size="14" fill="#8090C0" font-family="serif" opacity="0.7">П.И. Чайковский</text>
  <text x="250" y="325" text-anchor="middle" font-size="8" fill="#607090" font-family="sans-serif" opacity="0.5">«Лебединое озеро»</text>
  
  <text x="250" y="340" text-anchor="middle" font-size="9" opacity="0.5" font-family="sans-serif" fill="#AAA">П.И. Чайковский</text>
</svg>