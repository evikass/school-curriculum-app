<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="jazzBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1008"/>
      <stop offset="100%" stop-color="#0A0804"/>
    </linearGradient>
    <radialGradient id="jazzSpot" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#DAA520" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#DAA520" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueSpot" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#1A3A6A" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A3A6A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brassGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <!-- Dark jazz club background -->
  <rect width="500" height="350" fill="url(#jazzBg)"/>
  <rect width="500" height="350" fill="url(#jazzSpot)"/>
  <rect width="500" height="350" fill="url(#blueSpot)"/>
  
  <!-- Stage floor -->
  <path d="M0 250 L500 250 L500 350 L0 350 Z" fill="#2A1A0A"/>
  <g stroke="#3A2A1A" stroke-width="0.3" opacity="0.5">
    <line x1="0" y1="270" x2="500" y2="270"/>
    <line x1="0" y1="290" x2="500" y2="290"/>
    <line x1="0" y1="310" x2="500" y2="310"/>
    <line x1="0" y1="330" x2="500" y2="330"/>
  </g>
  
  <!-- Spotlight -->
  <circle cx="150" cy="15" r="5" fill="#444"/>
  <path d="M140 18 L100 60 L200 60 L160 18" fill="#FFE4B5" opacity="0.08"/>
  <circle cx="370" cy="15" r="5" fill="#444"/>
  <path d="M360 18 L320 60 L420 60 L380 18" fill="#FFE4B5" opacity="0.06"/>
  
  <!-- === SAXOPHONE (left) === -->
  <g transform="translate(120, 80)">
    <!-- Mouthpiece -->
    <path d="M8 -5 L6 10 L12 10 Z" fill="#2A1A0A"/>
    <!-- Reed -->
    <line x1="9" y1="-5" x2="9" y2="-15" stroke="#C8A040" stroke-width="2"/>
    <!-- Neck (curved) -->
    <path d="M9 10 Q5 25 12 45" stroke="url(#brassGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Body (curved tube) -->
    <path d="M12 45 Q10 65 18 85 Q30 105 42 115" stroke="url(#brassGrad)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Bell (flared end) -->
    <path d="M42 115 Q50 130 62 125 Q68 120 60 110" fill="url(#brassGrad)" stroke="#B8860B" stroke-width="1"/>
    <ellipse cx="56" cy="122" rx="18" ry="12" fill="url(#brassGrad)" stroke="#B8860B" stroke-width="1.5" opacity="0.8"/>
    <!-- Inner bell -->
    <ellipse cx="56" cy="122" rx="12" ry="8" fill="#1A1008" opacity="0.5"/>
    <!-- Keys -->
    <g fill="#FFD700" stroke="#B8860B" stroke-width="0.5">
      <circle cx="10" cy="30" r="3.5"/>
      <circle cx="8" cy="45" r="3.5"/>
      <circle cx="10" cy="60" r="3.5"/>
      <circle cx="14" cy="75" r="3.5"/>
      <circle cx="22" cy="90" r="3.5"/>
      <circle cx="32" cy="102" r="3.5"/>
    </g>
    <!-- Key rods -->
    <g stroke="#DAA520" stroke-width="0.8">
      <line x1="14" y1="30" x2="20" y2="28"/>
      <line x1="12" y1="45" x2="18" y2="43"/>
      <line x1="14" y1="60" x2="20" y2="58"/>
      <line x1="18" y1="75" x2="24" y2="73"/>
    </g>
    
    <!-- Player silhouette -->
    <circle cx="-8" cy="-25" r="10" fill="#1A1A1A" opacity="0.7"/>
    <path d="M-18 -15 L-18 30 L2 30 L2 -15" fill="#1A1A1A" opacity="0.7"/>
    <!-- Hat (fedora) -->
    <path d="M-20 -28 Q-8 -40 4 -28" fill="#1A1A1A" opacity="0.7"/>
    <rect x="-22" y="-30" width="28" height="3" rx="1" fill="#1A1A1A" opacity="0.7"/>
  </g>
  
  <!-- === TRUMPET (center-right) === -->
  <g transform="translate(290, 110)">
    <!-- Mouthpiece -->
    <ellipse cx="0" cy="0" rx="3" ry="4" fill="#2A1A0A"/>
    <!-- Lead pipe -->
    <line x1="3" y1="0" x2="25" y2="0" stroke="url(#brassGrad)" stroke-width="4"/>
    <!-- Valve casings -->
    <rect x="25" y="-8" width="8" height="16" rx="2" fill="url(#brassGrad)" stroke="#B8860B" stroke-width="0.5"/>
    <rect x="35" y="-8" width="8" height="16" rx="2" fill="url(#brassGrad)" stroke="#B8860B" stroke-width="0.5"/>
    <rect x="45" y="-8" width="8" height="16" rx="2" fill="url(#brassGrad)" stroke="#B8860B" stroke-width="0.5"/>
    <!-- Valve buttons -->
    <circle cx="29" cy="-9" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="39" cy="-9" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <circle cx="49" cy="-9" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
    <!-- Tuning slide -->
    <path d="M25 8 Q25 18 35 18 Q45 18 45 8" fill="none" stroke="url(#brassGrad)" stroke-width="3"/>
    <!-- Bell tubing -->
    <path d="M53 0 L65 0" stroke="url(#brassGrad)" stroke-width="5"/>
    <!-- Bell -->
    <path d="M65 0 Q75 -12 80 -20 L80 20 Q75 12 65 0" fill="url(#brassGrad)" stroke="#B8860B" stroke-width="1"/>
    <ellipse cx="80" cy="0" rx="5" ry="20" fill="url(#brassGrad)" stroke="#B8860B" stroke-width="1"/>
    <!-- Inner bell -->
    <ellipse cx="82" cy="0" rx="3" ry="16" fill="#1A1008" opacity="0.4"/>
    
    <!-- Player silhouette -->
    <circle cx="-15" cy="-5" r="10" fill="#1A1A1A" opacity="0.7"/>
    <path d="M-25 5 L-25 40 L-5 40 L-5 5" fill="#1A1A1A" opacity="0.7"/>
    <!-- Beret -->
    <path d="M-25 -10 Q-15 -20 -5 -10" fill="#1A1A1A" opacity="0.7"/>
  </g>
  
  <!-- === DRUM KIT (right) === -->
  <g transform="translate(380, 180)">
    <!-- Bass drum -->
    <ellipse cx="25" cy="30" rx="30" ry="25" fill="#8B0000" stroke="#5A0000" stroke-width="1.5"/>
    <ellipse cx="25" cy="30" rx="25" ry="20" fill="#C8B898" stroke="#8B6914" stroke-width="0.5"/>
    <!-- Bass drum head -->
    <ellipse cx="25" cy="30" rx="22" ry="17" fill="#E8DCC8"/>
    <!-- Bass drum pedal -->
    <rect x="18" y="52" width="14" height="5" rx="1" fill="#C0C0C0"/>
    <line x1="25" y1="57" x2="25" y2="65" stroke="#999" stroke-width="2"/>
    
    <!-- Snare drum -->
    <ellipse cx="55" cy="15" rx="15" ry="5" fill="#E8E0D8"/>
    <rect x="40" y="15" width="30" height="12" fill="#C0B8A8"/>
    <ellipse cx="55" cy="27" rx="15" ry="5" fill="#B0A898"/>
    
    <!-- Hi-hat -->
    <line x1="75" y1="0" x2="75" y2="55" stroke="#8B6914" stroke-width="2"/>
    <ellipse cx="75" cy="0" rx="12" ry="3" fill="#DAA520"/>
    <ellipse cx="75" cy="3" rx="12" ry="3" fill="#C8A020"/>
    
    <!-- Tom tom 1 -->
    <ellipse cx="20" cy="5" rx="10" ry="4" fill="#8B0000" stroke="#5A0000" stroke-width="0.5"/>
    <rect x="10" y="5" width="20" height="8" fill="#8B0000"/>
    <ellipse cx="20" cy="13" rx="10" ry="4" fill="#5A0000"/>
    
    <!-- Tom tom 2 -->
    <ellipse cx="45" cy="0" rx="12" ry="4" fill="#8B0000" stroke="#5A0000" stroke-width="0.5"/>
    <rect x="33" y="0" width="24" height="8" fill="#8B0000"/>
    <ellipse cx="45" cy="8" rx="12" ry="4" fill="#5A0000"/>
    
    <!-- Cymbal (ride) -->
    <line x1="-5" y1="-5" x2="-5" y2="55" stroke="#8B6914" stroke-width="1.5"/>
    <ellipse cx="-5" cy="-5" rx="16" ry="4" fill="#DAA520"/>
    <ellipse cx="-5" cy="-5" rx="12" ry="3" fill="#C8A020"/>
    
    <!-- Drum sticks -->
    <line x1="40" y1="0" x2="60" y2="10" stroke="#D2B48C" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="0" x2="45" y2="15" stroke="#D2B48C" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Musical notes floating -->
  <g fill="#DAA520" opacity="0.3">
    <ellipse cx="50" cy="60" rx="5" ry="4" transform="rotate(-15 50 60)"/>
    <line x1="55" y1="60" x2="55" y2="38" stroke="#DAA520" stroke-width="1.5"/>
    <path d="M55 38 Q63 42 55 46" fill="#DAA520"/>
    
    <ellipse cx="450" cy="50" rx="4" ry="3" transform="rotate(-15 450 50)"/>
    <line x1="454" y1="50" x2="454" y2="32" stroke="#DAA520" stroke-width="1.5"/>
    <path d="M454 32 Q461 36 454 40" fill="#DAA520"/>
    
    <ellipse cx="220" cy="40" rx="4" ry="3" transform="rotate(-15 220 40)"/>
    <line x1="224" y1="40" x2="224" y2="24" stroke="#DAA520" stroke-width="1.5"/>
  </g>
  
  <!-- "JAZZ" text effect -->
  <text x="250" y="290" text-anchor="middle" font-size="28" fill="#DAA520" font-family="serif" font-style="italic" opacity="0.3">Jazz</text>
  
  <!-- Jazz club tables/audience suggestion at bottom -->
  <g fill="#1A1008" opacity="0.5">
    <circle cx="440" cy="260" r="15" stroke="#2A1A0A" stroke-width="0.5"/>
    <circle cx="60" cy="260" r="15" stroke="#2A1A0A" stroke-width="0.5"/>
  </g>
  <!-- Candle on table -->
  <rect x="56" y="250" width="2" height="6" fill="#FFF8DC"/>
  <ellipse cx="57" cy="249" rx="2" ry="3" fill="#FFD700" opacity="0.5"/>
  
  <text x="250" y="340" text-anchor="middle" font-size="9" opacity="0.5" font-family="sans-serif" fill="#AAA">Джаз</text>
</svg>