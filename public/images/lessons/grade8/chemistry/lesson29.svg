<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#10b981"/>
    </marker>
    <marker id="arrowD" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#0d9488"/>
    </marker>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#f0fdf4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981">Тепловой эффект химических реакций</text>
  <line x1="100" y1="46" x2="700" y2="46" stroke="#0d9488" stroke-width="2" stroke-opacity="0.6"/>

  <!-- ====== LEFT: Exothermic energy diagram ====== -->
  <rect x="20" y="58" width="370" height="220" rx="10" fill="#059669" fill-opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
  <text x="205" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">Экзотермическая реакция (+Q)</text>

  <!-- Axes -->
  <line x1="60" y1="90" x2="60" y2="260" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="60" y1="260" x2="360" y2="260" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Axis labels -->
  <text x="35" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" transform="rotate(-90,35,175)">Энергия</text>
  <text x="210" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Ход реакции</text>

  <!-- Reactants level (higher) -->
  <line x1="80" y1="120" x2="160" y2="120" stroke="#14b8a6" stroke-width="3"/>
  <text x="120" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">Реагенты</text>

  <!-- Activation energy hump -->
  <path d="M160,120 Q200,85 230,120" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="195" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Eакт</text>

  <!-- Products level (lower) -->
  <line x1="230" y1="210" x2="340" y2="210" stroke="#10b981" stroke-width="3"/>
  <text x="285" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#10b981">Продукты</text>

  <!-- Connecting curve -->
  <path d="M160,120 C180,120 210,100 230,120 C240,145 240,180 230,210" fill="none" stroke="#10b981" stroke-width="2"/>

  <!-- +Q arrow down -->
  <line x1="350" y1="120" x2="350" y2="210" stroke="#f0fdf4" stroke-width="2.5" marker-end="url(#arrowW)"/>
  <rect x="335" y="152" width="40" height="22" rx="4" fill="#059669" fill-opacity="0.5" stroke="#10b981" stroke-width="1"/>
  <text x="355" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">+Q</text>

  <!-- Heat released indicator -->
  <text x="205" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">🔥 Тепло выделяется</text>

  <!-- ====== RIGHT: Endothermic energy diagram ====== -->
  <rect x="410" y="58" width="370" height="220" rx="10" fill="#0d9488" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="595" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Эндотермическая реакция (−Q)</text>

  <!-- Axes -->
  <line x1="450" y1="90" x2="450" y2="260" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="450" y1="260" x2="750" y2="260" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Axis labels -->
  <text x="425" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" transform="rotate(-90,425,175)">Энергия</text>
  <text x="600" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Ход реакции</text>

  <!-- Reactants level (lower) -->
  <line x1="470" y1="210" x2="550" y2="210" stroke="#0d9488" stroke-width="3"/>
  <text x="510" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0d9488">Реагенты</text>

  <!-- Activation energy hump -->
  <path d="M550,210 Q590,85 620,120" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="585" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Eакт</text>

  <!-- Products level (higher) -->
  <line x1="620" y1="120" x2="730" y2="120" stroke="#14b8a6" stroke-width="3"/>
  <text x="675" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">Продукты</text>

  <!-- Connecting curve -->
  <path d="M550,210 C570,210 595,180 620,120 C625,108 625,120 620,120" fill="none" stroke="#14b8a6" stroke-width="2"/>
  <path d="M550,210 C570,190 590,140 620,120" fill="none" stroke="#14b8a6" stroke-width="2"/>

  <!-- -Q arrow up -->
  <line x1="740" y1="210" x2="740" y2="120" stroke="#f0fdf4" stroke-width="2.5" marker-end="url(#arrowW)"/>
  <rect x="725" y="152" width="40" height="22" rx="4" fill="#0d9488" fill-opacity="0.5" stroke="#14b8a6" stroke-width="1"/>
  <text x="745" y="167" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">−Q</text>

  <!-- Heat absorbed indicator -->
  <text x="595" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa">❄ Тепло поглощается</text>

  <!-- ====== MIDDLE: Thermochemical equations ====== -->
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#10b981">Термохимические уравнения</text>
  <line x1="120" y1="308" x2="680" y2="308" stroke="#0d9488" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Exothermic example: Combustion -->
  <rect x="20" y="318" width="380" height="80" rx="8" fill="#059669" fill-opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
  <text x="210" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Горение (экзотермическая)</text>

  <rect x="35" y="345" width="350" height="22" rx="4" fill="#0f766e" fill-opacity="0.25" stroke="#0d9488" stroke-width="0.5"/>
  <text x="210" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f0fdf4">CH₄ + 2O₂ → CO₂ + 2H₂O + 890 кДж</text>

  <text x="210" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Q &gt; 0: тепло выделяется в окружающую среду</text>

  <!-- Endothermic example: Decomposition -->
  <rect x="410" y="318" width="370" height="80" rx="8" fill="#0d9488" fill-opacity="0.12" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="595" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">Разложение (эндотермическая)</text>

  <rect x="425" y="345" width="340" height="22" rx="4" fill="#0f766e" fill-opacity="0.25" stroke="#0d9488" stroke-width="0.5"/>
  <text x="595" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f0fdf4">CaCO₃ → CaO + CO₂ − 157 кДж</text>

  <text x="595" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Q &lt; 0: тепло поглощается из окружающей среды</text>

  <!-- ====== BOTTOM: More examples and law ====== -->
  <rect x="20" y="408" width="380" height="82" rx="8" fill="#0f766e" fill-opacity="0.1" stroke="#0d9488" stroke-width="1"/>
  <text x="210" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">Примеры реакций</text>

  <text x="35" y="446" font-family="Arial, sans-serif" font-size="11" fill="#10b981">+Q:</text>
  <text x="60" y="446" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">Горение, нейтрализация,</text>
  <text x="60" y="460" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">соединение металлов с неметаллами</text>

  <text x="35" y="480" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">−Q:</text>
  <text x="60" y="480" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">Разложение, дегидратация,</text>

  <!-- Law of Hess -->
  <rect x="410" y="408" width="370" height="82" rx="8" fill="#059669" fill-opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
  <text x="595" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Закон Гесса</text>

  <rect x="430" y="436" width="330" height="22" rx="4" fill="#0f766e" fill-opacity="0.25" stroke="#10b981" stroke-width="0.5"/>
  <text x="595" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">Q не зависит от пути реакции,</text>
  <text x="595" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">а определяется начальным и</text>
  <text x="595" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f0fdf4">конечным состоянием системы</text>
</svg>