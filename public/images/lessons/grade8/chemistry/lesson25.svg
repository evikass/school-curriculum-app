<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="znGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="hGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="clGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#f97316"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981">Окислительно-восстановительные реакции (ОВР)</text>
  <line x1="100" y1="48" x2="700" y2="48" stroke="#0d9488" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Main reaction equation -->
  <rect x="100" y="58" width="600" height="45" rx="8" fill="#0f766e" fill-opacity="0.2" stroke="#0d9488" stroke-width="1"/>
  <text x="400" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#f0fdf4">Zn + 2HCl → ZnCl₂ + H₂↑</text>

  <!-- ====== Left side: Oxidation (Zn → Zn²⁺) ====== -->
  <rect x="30" y="120" width="340" height="200" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Oxidation label -->
  <text x="200" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f97316">Окисление</text>

  <!-- Zn atom -->
  <circle cx="100" cy="210" r="32" fill="url(#znGrad)" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <text x="100" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdf4">Zn</text>
  <text x="100" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">ст.ок. 0</text>

  <!-- Arrow -->
  <line x1="140" y1="210" x2="230" y2="210" stroke="#f97316" stroke-width="2.5" marker-end="url(#arrowOrange)"/>

  <!-- Electrons leaving (shown as small circles with e⁻) -->
  <circle cx="175" cy="190" r="9" fill="#10b981" opacity="0.6" filter="url(#glow)"/>
  <text x="175" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>
  <circle cx="200" cy="195" r="9" fill="#10b981" opacity="0.6" filter="url(#glow)"/>
  <text x="200" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <!-- Zn²⁺ ion -->
  <circle cx="280" cy="210" r="32" fill="url(#znGrad)" stroke="#f97316" stroke-width="2" filter="url(#glow)"/>
  <text x="280" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">Zn²⁺</text>
  <text x="280" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fed7aa">ст.ок. +2</text>

  <!-- Half-equation -->
  <rect x="60" y="255" width="260" height="30" rx="5" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-width="0.5"/>
  <text x="190" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fed7aa">Zn⁰ → Zn²⁺ + 2e⁻</text>

  <!-- Восстановитель label -->
  <rect x="100" y="292" width="170" height="22" rx="4" fill="#f97316" fill-opacity="0.2" stroke="#f97316" stroke-width="0.8"/>
  <text x="185" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fb923c">Восстановитель</text>
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fdba74">(отдаёт электроны)</text>

  <!-- ====== Right side: Reduction (2H⁺ → H₂) ====== -->
  <rect x="430" y="120" width="340" height="200" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Reduction label -->
  <text x="600" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3b82f6">Восстановление</text>

  <!-- 2H⁺ ions -->
  <circle cx="500" cy="195" r="24" fill="url(#hGrad)" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
  <text x="500" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f0fdf4">H⁺</text>
  <text x="500" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bfdbfe">ст.ок. +1</text>

  <circle cx="500" cy="260" r="24" fill="url(#hGrad)" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
  <text x="500" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f0fdf4">H⁺</text>

  <!-- Electrons arriving -->
  <circle cx="540" cy="200" r="9" fill="#3b82f6" opacity="0.6" filter="url(#glow)"/>
  <text x="540" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>
  <circle cx="540" cy="255" r="9" fill="#3b82f6" opacity="0.6" filter="url(#glow)"/>
  <text x="540" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">e⁻</text>

  <!-- Arrow -->
  <line x1="555" y1="230" x2="625" y2="230" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- H₂ molecule -->
  <circle cx="670" cy="218" r="20" fill="url(#hGrad)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="670" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0fdf4">H</text>
  <circle cx="700" cy="238" r="20" fill="url(#hGrad)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="700" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0fdf4">H</text>
  <line x1="680" y1="232" x2="690" y2="236" stroke="#5eead4" stroke-width="2.5"/>

  <!-- Half-equation -->
  <rect x="460" y="275" width="260" height="30" rx="5" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="590" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#bfdbfe">2H⁺ + 2e⁻ → H₂⁰</text>

  <!-- Окислитель label -->
  <rect x="500" y="310" width="150" height="22" rx="4" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="575" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">Окислитель</text>

  <!-- ====== Electron transfer arrow (center) ====== -->
  <path d="M200,340 C200,370 590,370 590,340" stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrowR)" filter="url(#glow)"/>
  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10b981">2e⁻ — передача электронов</text>

  <!-- ====== Bottom: Summary rules ====== -->
  <rect x="30" y="410" width="740" height="80" rx="10" fill="#059669" fill-opacity="0.1" stroke="#10b981" stroke-width="1"/>

  <!-- Oxidation rule -->
  <rect x="50" y="420" width="340" height="60" rx="6" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-width="0.8"/>
  <text x="220" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fb923c">Окисление</text>
  <text x="220" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fdba74">отдача e⁻ → степень ок. растёт</text>
  <text x="220" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fed7aa">Восстановитель — отдаёт e⁻</text>

  <!-- Reduction rule -->
  <rect x="410" y="420" width="340" height="60" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="580" y="442" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#60a5fa">Восстановление</text>
  <text x="580" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#93c5fd">приём e⁻ → степень ок. убывает</text>
  <text x="580" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bfdbfe">Окислитель — принимает e⁻</text>

  <!-- Lesson number -->
  <text x="780" y="498" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" opacity="0.6">Урок 25</text>
</svg>