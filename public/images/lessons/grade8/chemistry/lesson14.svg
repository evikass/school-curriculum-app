<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <radialGradient id="nucleusGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#dc2626;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#991b1b;stop-opacity:0.1"/>
    </radialGradient>
    <radialGradient id="protonGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#fca5a5"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </radialGradient>
    <radialGradient id="neutronGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </radialGradient>
    <radialGradient id="electronGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </radialGradient>
    <radialGradient id="orbitGlow14" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow14">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow14">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="particleGlow14">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cellShadow14">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg14)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Строение атома: ядро, протоны, нейтроны</text>

  <!-- Subtitle divider -->
  <line x1="100" y1="48" x2="700" y2="48" stroke="#0d9488" stroke-width="1" opacity="0.4"/>

  <!-- ===== ATOM MODEL (left side) ===== -->
  <g transform="translate(230, 270)">
    <!-- Background glow -->
    <circle cx="0" cy="0" r="130" fill="url(#orbitGlow14)"/>

    <!-- Orbit 1 (K shell) -->
    <ellipse cx="0" cy="0" rx="60" ry="50" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
    <!-- Orbit 2 (L shell) -->
    <ellipse cx="0" cy="0" rx="100" ry="85" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.3" stroke-dasharray="4,3"/>
    <!-- Orbit 3 (M shell) -->
    <ellipse cx="0" cy="0" rx="140" ry="115" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.2" stroke-dasharray="4,3"/>

    <!-- Nucleus glow -->
    <circle cx="0" cy="0" r="30" fill="url(#nucleusGrad)" filter="url(#strongGlow14)"/>

    <!-- Protons in nucleus -->
    <circle cx="-8" cy="-6" r="9" fill="url(#protonGrad)" stroke="#fca5a5" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="-8" y="-2" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">p⁺</text>

    <circle cx="8" cy="-4" r="9" fill="url(#protonGrad)" stroke="#fca5a5" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="8" y="0" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">p⁺</text>

    <circle cx="0" cy="8" r="9" fill="url(#protonGrad)" stroke="#fca5a5" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">p⁺</text>

    <!-- Neutrons in nucleus -->
    <circle cx="-10" cy="6" r="9" fill="url(#neutronGrad)" stroke="#93c5fd" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="-10" y="10" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">n⁰</text>

    <circle cx="10" cy="6" r="9" fill="url(#neutronGrad)" stroke="#93c5fd" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="10" y="10" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">n⁰</text>

    <circle cx="-1" cy="-14" r="9" fill="url(#neutronGrad)" stroke="#93c5fd" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="-1" y="-10" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">n⁰</text>

    <!-- Electrons on K shell -->
    <circle cx="55" cy="-22" r="6" fill="url(#electronGrad)" stroke="#67e8f9" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="55" y="-19" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#0f172a" text-anchor="middle">e⁻</text>

    <circle cx="-55" cy="22" r="6" fill="url(#electronGrad)" stroke="#67e8f9" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="-55" y="25" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#0f172a" text-anchor="middle">e⁻</text>

    <!-- Electrons on L shell -->
    <circle cx="88" cy="-32" r="6" fill="url(#electronGrad)" stroke="#67e8f9" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="88" y="-29" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#0f172a" text-anchor="middle">e⁻</text>

    <circle cx="-88" cy="32" r="6" fill="url(#electronGrad)" stroke="#67e8f9" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="-88" y="35" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#0f172a" text-anchor="middle">e⁻</text>

    <circle cx="0" cy="-82" r="6" fill="url(#electronGrad)" stroke="#67e8f9" stroke-width="1" filter="url(#particleGlow14)"/>
    <text x="0" y="-79" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#0f172a" text-anchor="middle">e⁻</text>

    <!-- Shell labels -->
    <text x="72" y="-35" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" opacity="0.7">K</text>
    <text x="112" y="-45" font-family="Arial, sans-serif" font-size="9" fill="#0d9488" opacity="0.6">L</text>
    <text x="152" y="-55" font-family="Arial, sans-serif" font-size="9" fill="#0d9488" opacity="0.5">M</text>
  </g>

  <!-- ===== PARTICLE PROPERTIES TABLE (right side) ===== -->
  <g transform="translate(430, 65)">
    <!-- Table container -->
    <rect x="0" y="0" width="340" height="200" rx="10" fill="#0f172a" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>

    <!-- Table header -->
    <rect x="0" y="0" width="340" height="32" rx="10" fill="#0d9488" fill-opacity="0.2"/>
    <rect x="0" y="20" width="340" height="12" fill="#0d9488" fill-opacity="0.2"/>
    <text x="170" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6" text-anchor="middle">Частицы в атоме</text>

    <!-- Column headers -->
    <text x="45" y="50" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#94a3b8" text-anchor="middle">Частица</text>
    <text x="140" y="50" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#94a3b8" text-anchor="middle">Заряд</text>
    <text x="230" y="50" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#94a3b8" text-anchor="middle">Масса (а.е.м.)</text>
    <text x="315" y="50" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#94a3b8" text-anchor="middle">Обозн.</text>

    <!-- Separator line -->
    <line x1="10" y1="58" x2="330" y2="58" stroke="#334155" stroke-width="1"/>

    <!-- Proton row -->
    <rect x="5" y="62" width="330" height="36" rx="4" fill="#dc2626" fill-opacity="0.08"/>
    <circle cx="25" cy="80" r="8" fill="url(#protonGrad)" stroke="#fca5a5" stroke-width="1"/>
    <text x="25" y="83" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#fff" text-anchor="middle">p⁺</text>
    <text x="45" y="84" font-family="Arial, sans-serif" font-size="12" fill="#fca5a5">Протон</text>
    <text x="140" y="84" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">+1</text>
    <text x="230" y="84" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">1,0073</text>
    <text x="315" y="84" font-family="Arial, sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">p⁺</text>

    <!-- Neutron row -->
    <rect x="5" y="102" width="330" height="36" rx="4" fill="#2563eb" fill-opacity="0.08"/>
    <circle cx="25" cy="120" r="8" fill="url(#neutronGrad)" stroke="#93c5fd" stroke-width="1"/>
    <text x="25" y="123" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#fff" text-anchor="middle">n⁰</text>
    <text x="45" y="124" font-family="Arial, sans-serif" font-size="12" fill="#93c5fd">Нейтрон</text>
    <text x="140" y="124" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">0</text>
    <text x="230" y="124" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">1,0087</text>
    <text x="315" y="124" font-family="Arial, sans-serif" font-size="12" fill="#93c5fd" text-anchor="middle">n⁰</text>

    <!-- Electron row -->
    <rect x="5" y="142" width="330" height="36" rx="4" fill="#06b6d4" fill-opacity="0.08"/>
    <circle cx="25" cy="160" r="8" fill="url(#electronGrad)" stroke="#67e8f9" stroke-width="1"/>
    <text x="25" y="163" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#0f172a" text-anchor="middle">e⁻</text>
    <text x="45" y="164" font-family="Arial, sans-serif" font-size="12" fill="#67e8f9">Электрон</text>
    <text x="140" y="164" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">−1</text>
    <text x="230" y="164" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">0,00055</text>
    <text x="315" y="164" font-family="Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle">e⁻</text>

    <!-- Separator -->
    <line x1="10" y1="185" x2="330" y2="185" stroke="#334155" stroke-width="0.5"/>
    <text x="170" y="197" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">1 а.е.м. ≈ 1,66 × 10⁻²⁴ г</text>
  </g>

  <!-- ===== FORMULA BOX ===== -->
  <g transform="translate(430, 280)">
    <rect x="0" y="0" width="340" height="80" rx="10" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9" filter="url(#cellShadow14)"/>
    <!-- Inner border -->
    <rect x="3" y="3" width="334" height="74" rx="8" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>

    <!-- Formula -->
    <text x="170" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Массовое число</text>
    <text x="170" y="58" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#14b8a6" text-anchor="middle" filter="url(#glow14)">A = Z + N</text>
    <text x="50" y="72" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">A — масс. число</text>
    <text x="170" y="72" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Z — протоны</text>
    <text x="290" y="72" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">N — нейтроны</text>
  </g>

  <!-- ===== KEY FACTS ===== -->
  <g transform="translate(430, 375)">
    <!-- Fact box 1 -->
    <rect x="0" y="0" width="165" height="105" rx="8" fill="#0f172a" stroke="#0d9488" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="165" height="25" rx="8" fill="#0d9488" fill-opacity="0.15"/>
    <text x="82" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6" text-anchor="middle">Ядро атома</text>
    <text x="12" y="42" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">• Содержит протоны</text>
    <text x="12" y="57" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">• Содержит нейтроны</text>
    <text x="12" y="72" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">• Заряд ядра = +Z</text>
    <text x="12" y="87" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">• Почти вся масса</text>
    <text x="12" y="100" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">  атома в ядре</text>

    <!-- Fact box 2 -->
    <rect x="175" y="0" width="165" height="105" rx="8" fill="#0f172a" stroke="#8b5cf6" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="0" width="165" height="25" rx="8" fill="#8b5cf6" fill-opacity="0.15" transform="translate(175,0)"/>
    <text x="257" y="18" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#a78bfa" text-anchor="middle">Электронная оболочка</text>
    <text x="187" y="42" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">• Электроны e⁻</text>
    <text x="187" y="57" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">• Заряд оболочки = −Z</text>
    <text x="187" y="72" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">• Атом нейтрален:</text>
    <text x="187" y="87" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">  число p⁺ = числу e⁻</text>
    <text x="187" y="100" font-family="Arial, sans-serif" font-size="10" fill="#cbd5e1">• Масса ≈ 0 а.е.м.</text>
  </g>

  <!-- Atom label -->
  <g transform="translate(230, 420)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Модель атома</text>
    <text x="0" y="18" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">(планетарная модель Резерфорда)</text>
  </g>

  <!-- Connecting line from atom to table -->
  <line x1="370" y1="200" x2="430" y2="140" stroke="#334155" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Legend for particles -->
  <g transform="translate(30, 440)">
    <circle cx="10" cy="0" r="6" fill="url(#protonGrad)" stroke="#fca5a5" stroke-width="1"/>
    <text x="22" y="4" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Протон (p⁺)</text>

    <circle cx="120" cy="0" r="6" fill="url(#neutronGrad)" stroke="#93c5fd" stroke-width="1"/>
    <text x="132" y="4" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Нейтрон (n⁰)</text>

    <circle cx="240" cy="0" r="6" fill="url(#electronGrad)" stroke="#67e8f9" stroke-width="1"/>
    <text x="252" y="4" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Электрон (e⁻)</text>
  </g>

  <!-- Decorative corner elements -->
  <circle cx="20" cy="20" r="3" fill="#0d9488" opacity="0.3"/>
  <circle cx="780" cy="20" r="3" fill="#0d9488" opacity="0.3"/>
  <circle cx="20" cy="480" r="3" fill="#0d9488" opacity="0.3"/>
  <circle cx="780" cy="480" r="3" fill="#0d9488" opacity="0.3"/>
</svg>