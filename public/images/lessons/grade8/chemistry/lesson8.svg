<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg8)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981" filter="url(#glow8)">Оксиды</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Классификация оксидов по химическим свойствам</text>

  <!-- Decorative line -->
  <line x1="100" y1="76" x2="700" y2="76" stroke="#0d9488" stroke-width="1" opacity="0.5"/>

  <!-- General formula badge -->
  <rect x="310" y="84" width="180" height="28" rx="14" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="1"/>
  <text x="400" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Общая формула: ЭₓOᵧ</text>

  <!-- === ОСНОВНЫЕ ОКСИДЫ === -->
  <g transform="translate(133, 200)">
    <!-- Card -->
    <rect x="-105" y="-80" width="210" height="270" rx="10" fill="#059669" opacity="0.08" stroke="#059669" stroke-width="1.5"/>
    <!-- Header -->
    <rect x="-105" y="-80" width="210" height="40" rx="10" fill="#059669" opacity="0.2"/>
    <rect x="-105" y="-50" width="210" height="10" fill="#059669" opacity="0.2"/>
    <text x="0" y="-52" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#059669">Основные оксиды</text>
    <!-- Icon: metal + O -->
    <circle cx="-20" cy="0" r="16" fill="#059669" opacity="0.3" stroke="#059669" stroke-width="1.5"/>
    <text x="-20" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Me</text>
    <text x="5" y="5" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">+</text>
    <circle cx="25" cy="0" r="14" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1.2"/>
    <text x="25" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fca5a5">O</text>

    <!-- Examples -->
    <text x="0" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Примеры:</text>
    <!-- CaO -->
    <rect x="-70" y="52" width="140" height="30" rx="6" fill="#059669" opacity="0.12"/>
    <text x="0" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10b981">CaO</text>
    <text x="0" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">оксид кальция</text>
    <!-- MgO -->
    <rect x="-70" y="94" width="140" height="30" rx="6" fill="#059669" opacity="0.12"/>
    <text x="0" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10b981">MgO</text>
    <text x="0" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">оксид магния</text>
    <!-- Fe2O3 -->
    <rect x="-70" y="136" width="140" height="30" rx="6" fill="#059669" opacity="0.12"/>
    <text x="0" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10b981">Fe₂O₃</text>
    <text x="0" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">оксид железа(III)</text>
  </g>

  <!-- === КИСЛОТНЫЕ ОКСИДЫ === -->
  <g transform="translate(400, 200)">
    <!-- Card -->
    <rect x="-105" y="-80" width="210" height="270" rx="10" fill="#0d9488" opacity="0.08" stroke="#0d9488" stroke-width="1.5"/>
    <!-- Header -->
    <rect x="-105" y="-80" width="210" height="40" rx="10" fill="#0d9488" opacity="0.2"/>
    <rect x="-105" y="-50" width="210" height="10" fill="#0d9488" opacity="0.2"/>
    <text x="0" y="-52" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#14b8a6">Кислотные оксиды</text>
    <!-- Icon: nonmetal + O -->
    <circle cx="-20" cy="0" r="16" fill="#0d9488" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
    <text x="-20" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">НеМе</text>
    <text x="5" y="5" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">+</text>
    <circle cx="25" cy="0" r="14" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1.2"/>
    <text x="25" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fca5a5">O</text>

    <!-- Examples -->
    <text x="0" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Примеры:</text>
    <!-- SO3 -->
    <rect x="-70" y="52" width="140" height="30" rx="6" fill="#0d9488" opacity="0.12"/>
    <text x="0" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#14b8a6">SO₃</text>
    <text x="0" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">оксид серы(VI)</text>
    <!-- CO2 -->
    <rect x="-70" y="94" width="140" height="30" rx="6" fill="#0d9488" opacity="0.12"/>
    <text x="0" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#14b8a6">CO₂</text>
    <text x="0" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">оксид углерода(IV)</text>
    <!-- P2O5 -->
    <rect x="-70" y="136" width="140" height="30" rx="6" fill="#0d9488" opacity="0.12"/>
    <text x="0" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#14b8a6">P₂O₅</text>
    <text x="0" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">оксид фосфора(V)</text>
  </g>

  <!-- === АМФОТЕРНЫЕ ОКСИДЫ === -->
  <g transform="translate(667, 200)">
    <!-- Card -->
    <rect x="-105" y="-80" width="210" height="270" rx="10" fill="#0f766e" opacity="0.08" stroke="#0f766e" stroke-width="1.5"/>
    <!-- Header -->
    <rect x="-105" y="-80" width="210" height="40" rx="10" fill="#0f766e" opacity="0.2"/>
    <rect x="-105" y="-50" width="210" height="10" fill="#0f766e" opacity="0.2"/>
    <text x="0" y="-52" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f766e">Амфотерные оксиды</text>
    <!-- Icon: dual nature -->
    <circle cx="-20" cy="0" r="16" fill="#0f766e" opacity="0.3" stroke="#0f766e" stroke-width="1.5"/>
    <text x="-20" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f766e">Me</text>
    <text x="5" y="5" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">+</text>
    <circle cx="25" cy="0" r="14" fill="#ef4444" opacity="0.25" stroke="#ef4444" stroke-width="1.2"/>
    <text x="25" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fca5a5">O</text>
    <!-- Dual arrow -->
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">↔ основный + кислотный</text>

    <!-- Examples -->
    <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Примеры:</text>
    <!-- Al2O3 -->
    <rect x="-70" y="58" width="140" height="30" rx="6" fill="#0f766e" opacity="0.12"/>
    <text x="0" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f766e">Al₂O₃</text>
    <text x="0" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">оксид алюминия</text>
    <!-- ZnO -->
    <rect x="-70" y="100" width="140" height="30" rx="6" fill="#0f766e" opacity="0.12"/>
    <text x="0" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f766e">ZnO</text>
    <text x="0" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">оксид цинка</text>
    <!-- Extra space note -->
    <text x="0" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Проявляют свойства</text>
    <text x="0" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">и оснований, и кислот</text>
  </g>

  <!-- Footer -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Оксиды — сложные вещества, состоящие из двух элементов, один из которых — кислород со степенью окисления −2</text>
</svg>