<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Mendeleev portrait outline (silhouette) -->
  <path d="M130,70 Q140,50 160,45 Q175,42 185,50 Q195,55 198,70 Q200,80 195,90 Q200,95 205,100 L210,120 L200,130 L195,140 L210,160 L200,170 L180,180 L160,185 L140,180 L125,170 L115,160 L130,140 L125,130 L115,120 L120,100 Q125,95 130,90 Q125,80 130,70Z" fill="none" stroke="#c77dff" stroke-width="1.5"/>
  <!-- Glasses -->
  <circle cx="165" cy="75" r="8" fill="none" stroke="#ffd166" stroke-width="1"/>
  <circle cx="182" cy="75" r="8" fill="none" stroke="#ffd166" stroke-width="1"/>
  <line x1="173" y1="75" x2="174" y2="75" stroke="#ffd166" stroke-width="1"/>
  <!-- Beard -->
  <path d="M160,90 Q170,105 180,90" fill="none" stroke="#c77dff" stroke-width="1"/>
  <text x="130" y="210" fill="#c77dff" font-size="11">Д.И. Менделеев</text>
  <!-- Periodic table fragment -->
  <rect x="230" y="40" width="250" height="180" rx="5" fill="none" stroke="#7b2cbf" stroke-width="1.5"/>
  <text x="290" y="35" fill="#7b2cbf" font-size="11" font-weight="bold">Фрагмент таблицы</text>
  <!-- Row 1: H, He -->
  <rect x="235" y="48" width="28" height="28" rx="2" fill="#e94560" fill-opacity="0.15" stroke="#e94560" stroke-width="1"/>
  <text x="240" y="58" fill="#e94560" font-size="8">1</text>
  <text x="243" y="72" fill="#ffd166" font-size="10" font-weight="bold">H</text>
  <rect x="448" y="48" width="28" height="28" rx="2" fill="#4cc9f0" fill-opacity="0.15" stroke="#4cc9f0" stroke-width="1"/>
  <text x="453" y="58" fill="#4cc9f0" font-size="8">2</text>
  <text x="453" y="72" fill="#ffd166" font-size="10" font-weight="bold">He</text>
  <!-- Row 2: Li, Be, B, C, N, O, F, Ne -->
  <rect x="235" y="80" width="28" height="28" rx="2" fill="#e94560" fill-opacity="0.1" stroke="#e94560" stroke-width="0.8"/>
  <text x="240" y="100" fill="#ffd166" font-size="9">Li</text>
  <rect x="266" y="80" width="28" height="28" rx="2" fill="#f77f00" fill-opacity="0.1" stroke="#f77f00" stroke-width="0.8"/>
  <text x="272" y="100" fill="#ffd166" font-size="9">Be</text>
  <rect x="328" y="80" width="28" height="28" rx="2" fill="#2a9d8f" fill-opacity="0.1" stroke="#2a9d8f" stroke-width="0.8"/>
  <text x="334" y="100" fill="#ffd166" font-size="9">B</text>
  <rect x="359" y="80" width="28" height="28" rx="2" fill="#2a9d8f" fill-opacity="0.1" stroke="#2a9d8f" stroke-width="0.8"/>
  <text x="363" y="100" fill="#ffd166" font-size="9">C</text>
  <rect x="390" y="80" width="28" height="28" rx="2" fill="#2a9d8f" fill-opacity="0.1" stroke="#2a9d8f" stroke-width="0.8"/>
  <text x="396" y="100" fill="#ffd166" font-size="9">N</text>
  <rect x="417" y="80" width="28" height="28" rx="2" fill="#2a9d8f" fill-opacity="0.1" stroke="#2a9d8f" stroke-width="0.8"/>
  <text x="422" y="100" fill="#ffd166" font-size="9">O</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Периодический закон</text>
  <!-- Law statement -->
  <text x="30" y="240" fill="#e0aaff" font-size="13" font-weight="bold">Периодический закон (1869):</text>
  <text x="30" y="260" fill="#c9d1d9" font-size="11">Свойства элементов и их соединений</text>
  <text x="30" y="278" fill="#c9d1d9" font-size="11">находятся в периодической зависимости</text>
  <text x="30" y="296" fill="#c9d1d9" font-size="11">от величины атомных масс (зарядов ядер)</text>
  <!-- Periods and groups labels -->
  <text x="237" y="125" fill="#7f8c8d" font-size="8">периоды →</text>
  <text x="220" y="58" fill="#7f8c8d" font-size="8" transform="rotate(-90,220,58)">группы</text>
  <!-- Legend -->
  <rect x="240" y="145" width="10" height="10" rx="1" fill="#e94560" fill-opacity="0.2"/>
  <text x="255" y="154" fill="#7f8c8d" font-size="9">металлы</text>
  <rect x="310" y="145" width="10" height="10" rx="1" fill="#2a9d8f" fill-opacity="0.2"/>
  <text x="325" y="154" fill="#7f8c8d" font-size="9">неметаллы</text>
  <rect x="390" y="145" width="10" height="10" rx="1" fill="#4cc9f0" fill-opacity="0.2"/>
  <text x="405" y="154" fill="#7f8c8d" font-size="9">благородные газы</text>
</svg>