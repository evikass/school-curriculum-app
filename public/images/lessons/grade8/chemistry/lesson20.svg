<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="atomNa" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="atomCl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="ionNaPlus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="ionClMinus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.4"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowW" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f0fdf4"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fbbf24"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="20" font-weight="bold" filter="url(#glow)">Ионная связь</text>
  <text x="400" y="48" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Образование ионной связи на примере NaCl</text>

  <!-- ===== STAGE 1: Neutral Atoms ===== -->
  <rect x="15" y="58" width="235" height="150" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1" opacity="0.8"/>
  <text x="132" y="76" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" font-weight="bold">1. Нейтральные атомы</text>

  <!-- Na atom -->
  <circle cx="70" cy="135" r="35" fill="url(#atomNa)" stroke="#3b82f6" stroke-width="2"/>
  <text x="70" y="132" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Na</text>
  <text x="70" y="148" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="9">11e⁻ / 11p⁺</text>
  <!-- Outer electron -->
  <circle cx="100" cy="110" r="5" fill="#fbbf24" opacity="0.9"/>
  <text x="108" y="107" fill="#fbbf24" font-family="Arial, sans-serif" font-size="8">e⁻</text>

  <!-- Cl atom -->
  <circle cx="195" cy="135" r="38" fill="url(#atomCl)" stroke="#10b981" stroke-width="2"/>
  <text x="195" y="132" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Cl</text>
  <text x="195" y="148" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="9">17e⁻ / 17p⁺</text>
  <!-- Vacant spot for electron -->
  <circle cx="168" cy="112" r="5" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="2,1"/>
  <text x="155" y="108" fill="#fbbf24" font-family="Arial, sans-serif" font-size="7">?</text>

  <text x="132" y="195" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="8">Na: 2,8,1 | Cl: 2,8,7</text>

  <!-- Arrow to stage 2 -->
  <line x1="255" y1="135" x2="280" y2="135" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowYellow)"/>

  <!-- ===== STAGE 2: Electron Transfer ===== -->
  <rect x="285" y="58" width="230" height="150" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" opacity="0.8"/>
  <text x="400" y="76" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="11" font-weight="bold">2. Передача электрона</text>

  <!-- Na atom losing electron -->
  <circle cx="340" cy="130" r="30" fill="url(#atomNa)" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <text x="340" y="127" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Na</text>
  <text x="340" y="142" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="9">→ Na⁺ + e⁻</text>

  <!-- Electron transfer arrow -->
  <path d="M365,115 Q400,90 435,115" fill="none" stroke="#fbbf24" stroke-width="2.5" marker-end="url(#arrowYellow)"/>
  <circle cx="400" cy="100" r="5" fill="#fbbf24" opacity="0.9"/>
  <text x="400" y="95" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="9" font-weight="bold">e⁻</text>

  <!-- Cl atom gaining electron -->
  <circle cx="460" cy="130" r="33" fill="url(#atomCl)" stroke="#10b981" stroke-width="1.5" opacity="0.6"/>
  <text x="460" y="127" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Cl</text>
  <text x="460" y="142" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="9">+ e⁻ → Cl⁻</text>

  <!-- Ionic charges result -->
  <rect x="310" y="165" width="80" height="30" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="350" y="184" text-anchor="middle" fill="#93c5fd" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Na⁺</text>
  <text x="350" y="195" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="7">2,8</text>

  <rect x="410" y="165" width="80" height="30" rx="6" fill="#1e3a2f" stroke="#10b981" stroke-width="1"/>
  <text x="450" y="184" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Cl⁻</text>
  <text x="450" y="195" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="7">2,8,8</text>

  <!-- Arrow to stage 3 -->
  <line x1="520" y1="135" x2="545" y2="135" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ===== STAGE 3: Ionic Bond ===== -->
  <rect x="550" y="58" width="235" height="150" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.8"/>
  <text x="667" y="76" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="11" font-weight="bold">3. Ионная связь</text>

  <!-- Na+ ion -->
  <circle cx="625" cy="135" r="26" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="2"/>
  <text x="625" y="132" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Na⁺</text>
  <text x="625" y="146" text-anchor="middle" fill="#bfdbfe" font-family="Arial, sans-serif" font-size="8">катион</text>

  <!-- Cl- ion -->
  <circle cx="715" cy="135" r="30" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="2"/>
  <text x="715" y="132" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Cl⁻</text>
  <text x="715" y="146" text-anchor="middle" fill="#bbf7d0" font-family="Arial, sans-serif" font-size="8">анион</text>

  <!-- Electrostatic attraction -->
  <line x1="648" y1="128" x2="688" y2="128" stroke="#f0fdf4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="648" y1="138" x2="688" y2="138" stroke="#f0fdf4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="668" y="122" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="7">+ ← → −</text>

  <!-- Plus/minus symbols -->
  <text x="605" y="118" fill="#f87171" font-family="Arial, sans-serif" font-size="14">+</text>
  <text x="738" y="118" fill="#60a5fa" font-family="Arial, sans-serif" font-size="14">−</text>

  <text x="667" y="175" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="9">Электростатическое</text>
  <text x="667" y="188" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="9">притяжение ионов</text>
  <text x="667" y="203" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Na⁺Cl⁻</text>

  <!-- ===== BOTTOM: Crystal Lattice ===== -->
  <rect x="30" y="225" width="460" height="260" rx="10" fill="#1e293b" stroke="#0f766e" stroke-width="1.5" opacity="0.8"/>
  <text x="260" y="248" text-anchor="middle" fill="#0f766e" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Кристаллическая решётка NaCl</text>
  <text x="260" y="264" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">Чередование катионов Na⁺ и анионов Cl⁻</text>

  <!-- Crystal lattice grid - 5x4 pattern -->
  <!-- Row 1 -->
  <circle cx="90" cy="295" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="299" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>
  <circle cx="170" cy="295" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="170" y="299" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>
  <circle cx="250" cy="295" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="299" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>
  <circle cx="330" cy="295" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="330" y="299" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>
  <circle cx="410" cy="295" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="410" y="299" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>

  <!-- Row 2 -->
  <circle cx="90" cy="355" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="90" y="359" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>
  <circle cx="170" cy="355" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="170" y="359" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>
  <circle cx="250" cy="355" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="250" y="359" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>
  <circle cx="330" cy="355" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="330" y="359" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>
  <circle cx="410" cy="355" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="410" y="359" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>

  <!-- Row 3 -->
  <circle cx="90" cy="415" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="90" y="419" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>
  <circle cx="170" cy="415" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="170" y="419" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>
  <circle cx="250" cy="415" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="419" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>
  <circle cx="330" cy="415" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="330" y="419" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>
  <circle cx="410" cy="415" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="410" y="419" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>

  <!-- Row 4 -->
  <circle cx="90" cy="465" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="90" y="469" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>
  <circle cx="170" cy="465" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="170" y="469" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>
  <circle cx="250" cy="465" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="250" y="469" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>
  <circle cx="330" cy="465" r="18" fill="url(#ionClMinus)" stroke="#34d399" stroke-width="1.5"/>
  <text x="330" y="469" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cl⁻</text>
  <circle cx="410" cy="465" r="14" fill="url(#ionNaPlus)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="410" y="469" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">Na⁺</text>

  <!-- Bond lines between ions in lattice -->
  <g stroke="#475569" stroke-width="0.8" opacity="0.5">
    <!-- Horizontal bonds row 1-2 -->
    <line x1="104" y1="295" x2="156" y2="295"/>
    <line x1="184" y1="295" x2="236" y2="295"/>
    <line x1="264" y1="295" x2="316" y2="295"/>
    <line x1="344" y1="295" x2="396" y2="295"/>
    <!-- Vertical bonds -->
    <line x1="90" y1="313" x2="90" y2="341"/>
    <line x1="170" y1="313" x2="170" y2="337"/>
    <line x1="250" y1="313" x2="250" y2="341"/>
    <line x1="330" y1="313" x2="330" y2="337"/>
    <line x1="410" y1="313" x2="410" y2="341"/>
    <!-- Horizontal bonds row 2-3 -->
    <line x1="104" y1="355" x2="156" y2="355"/>
    <line x1="184" y1="355" x2="236" y2="355"/>
    <line x1="264" y1="355" x2="316" y2="355"/>
    <line x1="344" y1="355" x2="396" y2="355"/>
    <!-- Vertical bonds row 2-3 -->
    <line x1="90" y1="369" x2="90" y2="397"/>
    <line x1="170" y1="373" x2="170" y2="397"/>
    <line x1="250" y1="369" x2="250" y2="397"/>
    <line x1="330" y1="373" x2="330" y2="397"/>
    <line x1="410" y1="369" x2="410" y2="397"/>
    <!-- Horizontal bonds row 3 -->
    <line x1="104" y1="415" x2="156" y2="415"/>
    <line x1="184" y1="415" x2="236" y2="415"/>
    <line x1="264" y1="415" x2="316" y2="415"/>
    <line x1="344" y1="415" x2="396" y2="415"/>
    <!-- Vertical bonds row 3-4 -->
    <line x1="90" y1="433" x2="90" y2="451"/>
    <line x1="170" y1="433" x2="170" y2="451"/>
    <line x1="250" y1="433" x2="250" y2="451"/>
    <line x1="330" y1="433" x2="330" y2="451"/>
    <line x1="410" y1="433" x2="410" y2="451"/>
  </g>

  <!-- ===== RIGHT BOTTOM: Properties ===== -->
  <rect x="510" y="225" width="270" height="260" rx="10" fill="#1e293b" stroke="#0d9488" stroke-width="1.5" opacity="0.8"/>
  <text x="645" y="248" text-anchor="middle" fill="#0d9488" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Свойства ионных веществ</text>

  <!-- Property list -->
  <rect x="530" y="262" width="230" height="30" rx="5" fill="#0f766e" opacity="0.15"/>
  <text x="540" y="281" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="10">🔹 Высокая температура плавления</text>

  <rect x="530" y="298" width="230" height="30" rx="5" fill="#0f766e" opacity="0.15"/>
  <text x="540" y="317" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="10">🔹 Твёрдые, хрупкие</text>

  <rect x="530" y="334" width="230" height="30" rx="5" fill="#0f766e" opacity="0.15"/>
  <text x="540" y="353" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="10">🔹 Растворимы в воде</text>

  <rect x="530" y="370" width="230" height="30" rx="5" fill="#0f766e" opacity="0.15"/>
  <text x="540" y="389" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="10">🔹 Расплавы проводят ток</text>

  <rect x="530" y="406" width="230" height="30" rx="5" fill="#0f766e" opacity="0.15"/>
  <text x="540" y="425" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="10">🔹 Растворы проводят ток</text>

  <!-- Formation equation -->
  <rect x="530" y="445" width="230" height="30" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="1"/>
  <text x="645" y="464" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Na + Cl → Na⁺Cl⁻</text>

  <!-- Decorative border -->
  <rect x="2" y="2" width="796" height="496" rx="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>

  <!-- Lesson number -->
  <text x="780" y="490" text-anchor="end" fill="#475569" font-family="Arial, sans-serif" font-size="9">Урок 20</text>
</svg>