<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <text x="30" y="35" fill="#e94560" font-size="14" font-weight="bold">Типы химической связи</text>
  <!-- Covalent bond (H₂) -->
  <rect x="20" y="50" width="150" height="130" rx="6" fill="none" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="35" y="72" fill="#4cc9f0" font-size="12" font-weight="bold">Ковалентная</text>
  <!-- Two H atoms sharing electrons -->
  <circle cx="65" cy="120" r="18" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="60" y="125" fill="#ffd166" font-size="12" font-weight="bold">H</text>
  <circle cx="120" cy="120" r="18" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="115" y="125" fill="#ffd166" font-size="12" font-weight="bold">H</text>
  <!-- Shared pair -->
  <circle cx="88" cy="115" r="3" fill="#4cc9f0"/>
  <circle cx="98" cy="115" r="3" fill="#4cc9f0"/>
  <text x="40" y="165" fill="#7f8c8d" font-size="9">Общие электронные пары</text>
  <!-- Ionic bond (NaCl) -->
  <rect x="180" y="50" width="150" height="130" rx="6" fill="none" stroke="#e94560" stroke-width="1.5"/>
  <text x="200" y="72" fill="#e94560" font-size="12" font-weight="bold">Ионная</text>
  <!-- Na+ cation -->
  <circle cx="225" cy="120" r="18" fill="#ffd166" fill-opacity="0.15" stroke="#ffd166" stroke-width="1.5"/>
  <text x="215" y="124" fill="#ffd166" font-size="11" font-weight="bold">Na⁺</text>
  <!-- Cl- anion -->
  <circle cx="285" cy="120" r="22" fill="#4cc9f0" fill-opacity="0.15" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="272" y="124" fill="#4cc9f0" font-size="11" font-weight="bold">Cl⁻</text>
  <!-- Electron transfer arrow -->
  <path d="M245,115 L260,115" stroke="#e94560" stroke-width="1.5" fill="none"/>
  <circle cx="255" cy="110" r="3" fill="#e94560"/>
  <text x="200" y="165" fill="#7f8c8d" font-size="9">Переход электрона (металл → неметалл)</text>
  <!-- Metallic bond -->
  <rect x="340" y="50" width="150" height="130" rx="6" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="355" y="72" fill="#ffd166" font-size="12" font-weight="bold">Металлическая</text>
  <!-- Metal cations in grid -->
  <circle cx="380" cy="110" r="10" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="376" y="114" fill="#ffd166" font-size="9">+</text>
  <circle cx="420" cy="110" r="10" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="416" y="114" fill="#ffd166" font-size="9">+</text>
  <circle cx="460" cy="110" r="10" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="456" y="114" fill="#ffd166" font-size="9">+</text>
  <circle cx="400" cy="140" r="10" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="396" y="144" fill="#ffd166" font-size="9">+</text>
  <circle cx="440" cy="140" r="10" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="436" y="144" fill="#ffd166" font-size="9">+</text>
  <!-- Free electrons (sea) -->
  <circle cx="395" cy="110" r="2" fill="#e94560"/>
  <circle cx="415" cy="125" r="2" fill="#e94560"/>
  <circle cx="445" cy="125" r="2" fill="#e94560"/>
  <circle cx="425" cy="140" r="2" fill="#e94560"/>
  <circle cx="385" cy="135" r="2" fill="#e94560"/>
  <text x="355" y="165" fill="#7f8c8d" font-size="9">«Электронный газ» между ионами</text>
  <!-- Comparison table -->
  <text x="30" y="210" fill="#a8d8ea" font-size="12" font-weight="bold">Сравнение:</text>
  <rect x="20" y="220" width="470" height="100" rx="4" fill="none" stroke="#533483" stroke-width="1"/>
  <!-- Headers -->
  <text x="70" y="238" fill="#e94560" font-size="10" font-weight="bold">Свойство</text>
  <text x="160" y="238" fill="#4cc9f0" font-size="10" font-weight="bold">Ковалентная</text>
  <text x="270" y="238" fill="#e94560" font-size="10" font-weight="bold">Ионная</text>
  <text x="370" y="238" fill="#ffd166" font-size="10" font-weight="bold">Металлическая</text>
  <line x1="20" y1="243" x2="490" y2="243" stroke="#533483" stroke-width="0.5"/>
  <text x="30" y="258" fill="#c9d1d9" font-size="9">Образуют</text>
  <text x="160" y="258" fill="#c9d1d9" font-size="9">неметаллы</text>
  <text x="270" y="258" fill="#c9d1d9" font-size="9">металл+неметалл</text>
  <text x="370" y="258" fill="#c9d1d9" font-size="9">металлы</text>
  <text x="30" y="275" fill="#c9d1d9" font-size="9">Темп. плавл.</text>
  <text x="160" y="275" fill="#c9d1d9" font-size="9">низкая/высокая</text>
  <text x="270" y="275" fill="#c9d1d9" font-size="9">высокая</text>
  <text x="370" y="275" fill="#c9d1d9" font-size="9">разная</text>
  <text x="30" y="292" fill="#c9d1d9" font-size="9">Электропров.</text>
  <text x="160" y="292" fill="#c9d1d9" font-size="9">нет (кроме мет.)</text>
  <text x="270" y="292" fill="#c9d1d9" font-size="9">расплавы</text>
  <text x="370" y="292" fill="#c9d1d9" font-size="9">да</text>
  <text x="30" y="309" fill="#c9d1d9" font-size="9">Пример</text>
  <text x="160" y="309" fill="#c9d1d9" font-size="9">H₂O, CO₂</text>
  <text x="270" y="309" fill="#c9d1d9" font-size="9">NaCl, CaO</text>
  <text x="370" y="309" fill="#c9d1d9" font-size="9">Fe, Cu, Al</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Типы химической связи</text>
</svg>