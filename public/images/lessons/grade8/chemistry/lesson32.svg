<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="waterGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <g opacity="0.04">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#10b981" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#10b981" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#10b981" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#10b981" stroke-width="0.5"/>
  </g>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="55" fill="url(#headerGrad)" opacity="0.9"/>
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white">Хлороводород. Соляная кислота</text>

  <!-- ===== TOP LEFT: HCl MOLECULE ===== -->
  <g transform="translate(20, 65)">
    <rect width="240" height="130" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.85"/>
    <text x="120" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6">Молекула HCl</text>

    <!-- H atom -->
    <circle cx="70" cy="75" r="22" fill="#059669" opacity="0.5" stroke="#10b981" stroke-width="1.5"/>
    <text x="70" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">H</text>

    <!-- Bond -->
    <line x1="92" y1="75" x2="128" y2="75" stroke="#10b981" stroke-width="3"/>

    <!-- Cl atom -->
    <circle cx="155" cy="75" r="28" fill="#0d9488" opacity="0.5" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="155" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">Cl</text>

    <!-- Polarity arrow -->
    <line x1="85" y1="110" x2="145" y2="110" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrowY)"/>
    <text x="115" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">δ+ → δ− (полярная)</text>
  </g>

  <!-- ===== TOP CENTER: DISSOLUTION ===== -->
  <g transform="translate(270, 65)">
    <rect width="260" height="130" rx="10" fill="#1e293b" stroke="#0d9488" stroke-width="1" opacity="0.85"/>
    <text x="130" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6">Растворение в воде</text>

    <!-- Beaker -->
    <rect x="30" y="40" width="80" height="70" rx="3" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <rect x="32" y="65" width="76" height="43" fill="url(#waterGrad)"/>
    <!-- Water line -->
    <line x1="32" y1="65" x2="108" y2="65" stroke="#14b8a6" stroke-width="1" opacity="0.5"/>

    <!-- HCl gas going in -->
    <text x="70" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#10b981">HCl↑</text>
    <line x1="70" y1="40" x2="70" y2="60" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Ions in solution -->
    <text x="50" y="82" font-family="Arial, sans-serif" font-size="11" fill="#10b981">H⁺</text>
    <text x="82" y="95" font-family="Arial, sans-serif" font-size="11" fill="#0d9488">Cl⁻</text>
    <text x="50" y="100" font-family="Arial, sans-serif" font-size="11" fill="#10b981">H⁺</text>
    <text x="82" y="82" font-family="Arial, sans-serif" font-size="11" fill="#0d9488">Cl⁻</text>

    <!-- Arrow and label -->
    <text x="140" y="60" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">HCl → H⁺ + Cl⁻</text>
    <text x="140" y="80" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">Соляная кислота</text>
    <text x="140" y="96" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Сильная кислота,</text>
    <text x="140" y="112" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">диссоциирует</text>
    <text x="140" y="125" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">полностью</text>
  </g>

  <!-- ===== TOP RIGHT: LABORATORY PREPARATION ===== -->
  <g transform="translate(540, 65)">
    <rect width="245" height="130" rx="10" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" opacity="0.85"/>
    <rect x="5" y="5" width="130" height="18" rx="9" fill="#fbbf24" opacity="0.15"/>
    <text x="70" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fbbf24">Лаб. получение</text>

    <text x="15" y="48" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0">NaCl + H₂SO₄</text>
    <text x="180" y="48" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">(конц.)</text>

    <!-- Arrow -->
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="16" fill="#14b8a6" text-anchor="middle">↓ t°</text>

    <text x="15" y="88" font-family="Arial, sans-serif" font-size="14" fill="#10b981" font-weight="bold">NaHSO₄ + HCl↑</text>

    <text x="15" y="112" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">При сильном нагревании:</text>
    <text x="15" y="128" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">2NaCl + H₂SO₄ →</text>
    <text x="60" y="128" font-family="Arial, sans-serif" font-size="0" fill="#e2e8f0"> </text>
  </g>
  <!-- Second line of the equation below the box -->
  <text x="608" y="195" font-family="Arial, sans-serif" font-size="12" fill="#10b981">Na₂SO₄ + 2HCl↑</text>

  <!-- ===== BOTTOM: 4 CHEMICAL PROPERTIES ===== -->
  <g transform="translate(20, 210)">
    <text x="380" y="16" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#10b981">Химические свойства соляной кислоты</text>

    <!-- Property 1: with metals -->
    <g transform="translate(0, 28)">
      <rect width="380" height="60" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.85"/>
      <rect x="5" y="5" width="22" height="22" rx="11" fill="#10b981" opacity="0.3"/>
      <text x="16" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10b981">1</text>
      <text x="35" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">С металлами (до H)</text>
      <text x="15" y="42" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">Zn + 2HCl → ZnCl₂ + H₂↑</text>
      <text x="270" y="42" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">(замещение)</text>
    </g>

    <!-- Property 2: with oxides -->
    <g transform="translate(0, 98)">
      <rect width="380" height="60" rx="8" fill="#1e293b" stroke="#0d9488" stroke-width="1" opacity="0.85"/>
      <rect x="5" y="5" width="22" height="22" rx="11" fill="#0d9488" opacity="0.3"/>
      <text x="16" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">2</text>
      <text x="35" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">С основными оксидами</text>
      <text x="15" y="42" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">CuO + 2HCl → CuCl₂ + H₂O</text>
      <text x="290" y="42" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">(обмен)</text>
    </g>

    <!-- Property 3: with bases -->
    <g transform="translate(0, 168)">
      <rect width="380" height="60" rx="8" fill="#1e293b" stroke="#059669" stroke-width="1" opacity="0.85"/>
      <rect x="5" y="5" width="22" height="22" rx="11" fill="#059669" opacity="0.3"/>
      <text x="16" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#059669">3</text>
      <text x="35" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">С основаниями (нейтрализация)</text>
      <text x="15" y="42" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">NaOH + HCl → NaCl + H₂O</text>
      <text x="275" y="42" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">(обмен)</text>
    </g>

    <!-- Property 4: with salts -->
    <g transform="translate(0, 238)">
      <rect width="380" height="60" rx="8" fill="#1e293b" stroke="#0f766e" stroke-width="1" opacity="0.85"/>
      <rect x="5" y="5" width="22" height="22" rx="11" fill="#0f766e" opacity="0.3"/>
      <text x="16" y="21" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0f766e">4</text>
      <text x="35" y="22" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">С солями (карбонатами)</text>
      <text x="15" y="42" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">Na₂CO₃ + 2HCl →</text>
      <text x="180" y="42" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">2NaCl + H₂O + CO₂↑</text>
    </g>
  </g>

  <!-- ===== RIGHT SIDE: ADDITIONAL INFO ===== -->
  <g transform="translate(420, 250)">
    <rect width="365" height="120" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.85"/>
    <text x="182" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10b981">Качественная реакция на Cl⁻</text>

    <text x="15" y="48" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">HCl + AgNO₃ → AgCl↓ + HNO₃</text>

    <!-- White precipitate -->
    <rect x="290" y="32" width="60" height="40" rx="5" fill="#1e293b" stroke="#94a3b8" stroke-width="0.8"/>
    <g opacity="0.8">
      <circle cx="305" cy="52" r="3" fill="white" opacity="0.7"/>
      <circle cx="318" cy="56" r="3.5" fill="white" opacity="0.6"/>
      <circle cx="335" cy="50" r="2.5" fill="white" opacity="0.5"/>
      <circle cx="312" cy="64" r="2.5" fill="white" opacity="0.6"/>
      <circle cx="328" cy="62" r="2" fill="white" opacity="0.5"/>
    </g>
    <text x="320" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">AgCl↓</text>

    <text x="15" y="72" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">Белый творожистый осадок</text>
    <text x="15" y="90" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Не растворяется в HNO₃</text>
    <text x="15" y="108" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Разлагается на свету: 2AgCl → 2Ag + Cl₂</text>
  </g>

  <!-- HCl gas properties -->
  <g transform="translate(420, 385)">
    <rect width="365" height="95" rx="10" fill="#1e293b" stroke="#059669" stroke-width="1" opacity="0.85"/>
    <text x="182" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10b981">Свойства хлороводорода</text>

    <text x="15" y="46" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">• Газ без цвета, резкий запах</text>
    <text x="15" y="64" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">• Легче воздуха (M = 36,5 г/моль)</text>
    <text x="15" y="82" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">• «Дымит» во влажном воздухе</text>
  </g>

  <!-- Lesson badge -->
  <rect x="720" y="475" width="70" height="22" rx="11" fill="#059669" opacity="0.6"/>
  <text x="755" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Урок 32</text>
</svg>