<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981">Скорость химических реакций</text>
  <line x1="100" y1="46" x2="700" y2="46" stroke="#0d9488" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Van't Hoff rule banner -->
  <rect x="150" y="52" width="500" height="32" rx="16" fill="#059669" fill-opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">Правило Вант-Гоффа: v × 2 при ΔT = 10°C</text>

  <!-- ====== Factor 1: Concentration ====== -->
  <rect x="20" y="95" width="148" height="185" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
  <text x="94" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Концентрация</text>

  <!-- Low concentration beaker -->
  <path d="M38,130 L38,180 L82,180 L82,130" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="33" y1="130" x2="87" y2="130" stroke="#14b8a6" stroke-width="2"/>
  <rect x="40" y="155" width="40" height="25" rx="2" fill="#10b981" fill-opacity="0.15"/>
  <!-- Few particles -->
  <circle cx="50" cy="165" r="4" fill="#10b981" fill-opacity="0.7"/>
  <circle cx="68" cy="170" r="4" fill="#14b8a6" fill-opacity="0.7"/>
  <circle cx="58" cy="175" r="3" fill="#0d9488" fill-opacity="0.7"/>
  <text x="60" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">низкая</text>

  <!-- Arrow -->
  <line x1="94" y1="175" x2="94" y2="205" stroke="#10b981" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="110" y="195" font-family="Arial, sans-serif" font-size="10" fill="#10b981">v↑</text>

  <!-- High concentration beaker -->
  <path d="M38,215 L38,265 L82,265 L82,215" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="33" y1="215" x2="87" y2="215" stroke="#14b8a6" stroke-width="2"/>
  <rect x="40" y="228" width="40" height="37" rx="2" fill="#10b981" fill-opacity="0.25"/>
  <!-- Many particles -->
  <circle cx="48" cy="238" r="4" fill="#10b981" fill-opacity="0.7"/>
  <circle cx="62" cy="235" r="4" fill="#14b8a6" fill-opacity="0.7"/>
  <circle cx="74" cy="240" r="4" fill="#10b981" fill-opacity="0.7"/>
  <circle cx="52" cy="250" r="4" fill="#0d9488" fill-opacity="0.7"/>
  <circle cx="66" cy="252" r="4" fill="#14b8a6" fill-opacity="0.7"/>
  <circle cx="78" cy="255" r="3" fill="#10b981" fill-opacity="0.7"/>
  <circle cx="55" cy="260" r="3" fill="#0d9488" fill-opacity="0.7"/>
  <circle cx="70" cy="262" r="3" fill="#10b981" fill-opacity="0.7"/>
  <text x="60" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">высокая</text>

  <!-- ====== Factor 2: Temperature ====== -->
  <rect x="178" y="95" width="148" height="185" rx="10" fill="#0d9488" fill-opacity="0.12" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="252" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Температура</text>

  <!-- Thermometer -->
  <rect x="232" y="125" width="12" height="80" rx="6" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="234" y="155" width="8" height="50" rx="4" fill="#10b981" fill-opacity="0.5"/>
  <circle cx="238" cy="215" r="12" fill="#059669" fill-opacity="0.5" stroke="#14b8a6" stroke-width="1.5"/>
  <!-- Mercury bulb -->
  <circle cx="238" cy="215" r="8" fill="#10b981" filter="url(#glow)"/>

  <!-- Temperature marks -->
  <line x1="244" y1="140" x2="250" y2="140" stroke="#94a3b8" stroke-width="1"/>
  <text x="255" y="143" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">100°</text>
  <line x1="244" y1="170" x2="250" y2="170" stroke="#94a3b8" stroke-width="1"/>
  <text x="255" y="173" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">50°</text>
  <line x1="244" y1="200" x2="250" y2="200" stroke="#94a3b8" stroke-width="1"/>
  <text x="255" y="203" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">0°</text>

  <!-- Flame -->
  <path d="M225,230 Q230,218 238,212 Q246,218 251,230 Q245,225 238,228 Q231,225 225,230Z" fill="#f97316" fill-opacity="0.7" filter="url(#glow)"/>
  <path d="M230,228 Q234,220 238,216 Q242,220 246,228 Q242,225 238,226 Q234,225 230,228Z" fill="#fbbf24" fill-opacity="0.8"/>

  <text x="252" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">T↑ → v↑</text>
  <text x="252" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">×2 на 10°C</text>

  <!-- ====== Factor 3: Surface area ====== -->
  <rect x="336" y="95" width="148" height="185" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0d9488" stroke-width="1.5"/>
  <text x="410" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d9488">Площадь поверхности</text>

  <!-- Big chunk -->
  <rect x="355" y="128" width="45" height="35" rx="4" fill="#059669" fill-opacity="0.4" stroke="#10b981" stroke-width="1.5"/>
  <text x="377" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f0fdf4">кусок</text>
  <text x="377" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">S — мала</text>

  <!-- Arrow -->
  <line x1="410" y1="182" x2="410" y2="200" stroke="#10b981" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Powder (many small pieces) -->
  <rect x="353" y="210" width="50" height="35" rx="3" fill="#0d9488" fill-opacity="0.15" stroke="#14b8a6" stroke-width="1"/>
  <rect x="358" y="215" width="8" height="6" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="370" y="213" width="7" height="7" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="382" y="216" width="6" height="5" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="390" y="213" width="7" height="7" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="356" y="225" width="7" height="6" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="368" y="224" width="8" height="5" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="380" y="226" width="6" height="6" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="389" y="224" width="7" height="5" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="360" y="234" width="7" height="5" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="373" y="233" width="6" height="6" rx="1" fill="#059669" fill-opacity="0.5"/>
  <rect x="385" y="235" width="8" height="5" rx="1" fill="#059669" fill-opacity="0.5"/>
  <text x="377" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">S — велика</text>
  <text x="410" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#10b981" font-weight="bold">S↑ → v↑</text>

  <!-- ====== Factor 4: Catalyst ====== -->
  <rect x="494" y="95" width="148" height="185" rx="10" fill="#0d9488" fill-opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
  <text x="568" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Катализатор</text>

  <!-- Key icon -->
  <circle cx="558" cy="165" r="18" fill="none" stroke="#14b8a6" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="558" cy="165" r="8" fill="#0f766e" fill-opacity="0.3"/>
  <line x1="576" y1="165" x2="610" y2="165" stroke="#14b8a6" stroke-width="2.5"/>
  <line x1="600" y1="165" x2="600" y2="155" stroke="#14b8a6" stroke-width="2"/>
  <line x1="610" y1="165" x2="610" y2="155" stroke="#14b8a6" stroke-width="2"/>

  <text x="568" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">Ускоряет реакцию</text>
  <text x="568" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">Не расходуется</text>

  <!-- Energy diagram mini -->
  <line x1="520" y1="260" x2="520" y2="235" stroke="#94a3b8" stroke-width="1"/>
  <line x1="520" y1="260" x2="620" y2="260" stroke="#94a3b8" stroke-width="1"/>
  <text x="515" y="238" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">E</text>

  <!-- Without catalyst curve (higher) -->
  <path d="M530,255 Q550,225 570,255" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="530" y="253" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8">без кат.</text>

  <!-- With catalyst curve (lower) -->
  <path d="M530,255 Q550,240 570,255" fill="none" stroke="#10b981" stroke-width="2"/>
  <text x="580" y="248" font-family="Arial, sans-serif" font-size="7" fill="#10b981">с кат.</text>

  <text x="568" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0d9488">Eакт ↓ → v↑</text>

  <!-- ====== Factor 5: Nature of reactants ====== -->
  <rect x="652" y="95" width="128" height="185" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="716" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Природа</text>

  <!-- Different elements -->
  <!-- Na - reactive -->
  <circle cx="690" cy="150" r="18" fill="#10b981" fill-opacity="0.4" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <text x="690" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0fdf4">Na</text>
  <text x="690" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#10b981">очень акт.</text>

  <!-- Fe - less reactive -->
  <circle cx="742" cy="150" r="18" fill="#0d9488" fill-opacity="0.4" stroke="#0d9488" stroke-width="2"/>
  <text x="742" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0fdf4">Fe</text>
  <text x="742" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0d9488">менее акт.</text>

  <!-- Au - unreactive -->
  <circle cx="716" cy="210" r="18" fill="#94a3b8" fill-opacity="0.3" stroke="#64748b" stroke-width="2"/>
  <text x="716" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">Au</text>
  <text x="716" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#64748b">инертный</text>

  <text x="716" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">Тип вещества</text>
  <text x="716" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ccfbf1">определяет v</text>

  <!-- ====== BOTTOM: Van't Hoff rule detailed ====== -->
  <rect x="20" y="290" width="760" height="95" rx="10" fill="#059669" fill-opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">Правило Вант-Гоффа</text>

  <text x="400" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f0fdf4">При повышении температуры на каждые 10°C скорость реакции увеличивается в 2–4 раза</text>

  <!-- Formula -->
  <rect x="230" y="342" width="340" height="35" rx="6" fill="#0f766e" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ccfbf1">v₂ = v₁ · γ^(ΔT/10)</text>

  <text x="580" y="356" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">γ — температурный</text>
  <text x="580" y="370" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">коэффициент (2–4)</text>

  <!-- ====== BOTTOM: Speed formula ====== -->
  <rect x="20" y="395" width="360" height="95" rx="10" fill="#0d9488" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1"/>
  <text x="200" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">Формула скорости</text>

  <rect x="60" y="425" width="280" height="30" rx="6" fill="#0f766e" fill-opacity="0.3" stroke="#0d9488" stroke-width="1"/>
  <text x="200" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ccfbf1">v = Δc / Δt</text>

  <text x="200" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Δc — изменение концентрации (моль/л)</text>
  <text x="200" y="483" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Δt — изменение времени (с)</text>

  <!-- ====== BOTTOM RIGHT: Summary ====== -->
  <rect x="400" y="395" width="380" height="95" rx="10" fill="#0f766e" fill-opacity="0.1" stroke="#10b981" stroke-width="1"/>
  <text x="590" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">Итог: факторы скорости</text>

  <text x="420" y="440" font-family="Arial, sans-serif" font-size="11" fill="#f0fdf4">↑ Концентрация → ↑ Скорость</text>
  <text x="420" y="458" font-family="Arial, sans-serif" font-size="11" fill="#f0fdf4">↑ Температура → ↑ Скорость</text>
  <text x="420" y="476" font-family="Arial, sans-serif" font-size="11" fill="#f0fdf4">↑ Площадь поверхности → ↑ Скорость</text>
  <text x="420" y="494" font-family="Arial, sans-serif" font-size="11" fill="#f0fdf4">+ Катализатор → ↑ Скорость</text>
</svg>