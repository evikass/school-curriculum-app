<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg4)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Химические уравнения</text>

  <!-- Divider line -->
  <line x1="50" y1="65" x2="750" y2="65" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Строение химического уравнения</text>

  <!-- ===== MAIN EQUATION ===== -->
  <g transform="translate(400, 165)">
    <!-- Equation background box -->
    <rect x="-340" y="-35" width="680" height="70" rx="12" fill="#0d9488" opacity="0.08" stroke="#0d9488" stroke-width="1"/>

    <!-- "2" coefficient (highlighted) -->
    <text x="-280" y="12" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#fbbf24" filter="url(#glow4)">2</text>
    <!-- H₂ -->
    <text x="-250" y="12" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#e2e8f0">H</text>
    <text x="-222" y="18" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f472b6">₂</text>

    <!-- "+" sign -->
    <text x="-185" y="12" font-family="Arial, sans-serif" font-size="36" fill="#94a3b8">+</text>

    <!-- O₂ -->
    <text x="-140" y="12" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#e2e8f0">O</text>
    <text x="-108" y="18" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f472b6">₂</text>

    <!-- Arrow "→" (highlighted) -->
    <text x="-55" y="12" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#10b981" filter="url(#glow4)">→</text>

    <!-- "2" coefficient (highlighted) -->
    <text x="25" y="12" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#fbbf24" filter="url(#glow4)">2</text>

    <!-- H₂O -->
    <text x="55" y="12" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#e2e8f0">H</text>
    <text x="83" y="18" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f472b6">₂</text>
    <text x="100" y="12" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#e2e8f0">O</text>
  </g>

  <!-- ===== ANNOTATION ARROWS AND LABELS ===== -->

  <!-- COEFFICIENT annotation -->
  <!-- Bracket/line pointing to the first "2" -->
  <g>
    <!-- Vertical line from "2" down -->
    <line x1="120" y1="200" x2="120" y2="260" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Horizontal connector -->
    <line x1="120" y1="260" x2="200" y2="260" stroke="#fbbf24" stroke-width="2"/>
    <!-- Label box -->
    <rect x="200" y="240" width="160" height="45" rx="8" fill="#fbbf24" opacity="0.15" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="280" y="260" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">Коэффициент</text>
    <text x="280" y="278" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Число перед формулой</text>
  </g>

  <!-- INDEX annotation -->
  <!-- Line pointing to the "₂" after H -->
  <g>
    <!-- Vertical line from "₂" down -->
    <line x1="188" y1="195" x2="188" y2="310" stroke="#f472b6" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Horizontal connector -->
    <line x1="188" y1="310" x2="300" y2="310" stroke="#f472b6" stroke-width="2"/>
    <!-- Label box -->
    <rect x="300" y="290" width="150" height="45" rx="8" fill="#f472b6" opacity="0.15" stroke="#f472b6" stroke-width="1.5"/>
    <text x="375" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f472b6" text-anchor="middle">Индекс</text>
    <text x="375" y="328" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Число внутри формулы</text>
  </g>

  <!-- ARROW annotation -->
  <!-- Line pointing to the "→" -->
  <g>
    <!-- Vertical line from arrow down -->
    <line x1="345" y1="200" x2="345" y2="365" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Horizontal connector -->
    <line x1="345" y1="365" x2="430" y2="365" stroke="#10b981" stroke-width="2"/>
    <!-- Label box -->
    <rect x="430" y="345" width="150" height="45" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
    <text x="505" y="365" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981" text-anchor="middle">Стрелка</text>
    <text x="505" y="383" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Направление реакции</text>
  </g>

  <!-- ===== LEGEND BOX ===== -->
  <rect x="100" y="410" width="600" height="70" rx="10" fill="#0d9488" opacity="0.08" stroke="#0d9488" stroke-width="1"/>

  <!-- Reactants side label -->
  <text x="220" y="438" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Исходные вещества</text>
  <text x="220" y="458" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">(до стрелки)</text>

  <!-- Arrow in legend -->
  <text x="400" y="443" font-family="Arial, sans-serif" font-size="22" fill="#10b981" text-anchor="middle">→</text>

  <!-- Products side label -->
  <text x="580" y="438" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Продукты реакции</text>
  <text x="580" y="458" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">(после стрелки)</text>

  <!-- Color legend dots -->
  <circle cx="150" cy="470" r="5" fill="#fbbf24"/>
  <text x="165" y="474" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Коэффициент</text>
  <circle cx="310" cy="470" r="5" fill="#f472b6"/>
  <text x="325" y="474" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Индекс</text>
  <circle cx="440" cy="470" r="5" fill="#10b981"/>
  <text x="455" y="474" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Стрелка</text>

  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>