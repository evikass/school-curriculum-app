<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Title -->
  <text x="30" y="35" fill="#e94560" font-size="14" font-weight="bold">Строение электронной оболочки</text>
  <!-- Shell diagrams for several elements -->
  <!-- H: 1 -->
  <circle cx="70" cy="100" r="20" fill="none" stroke="#4cc9f0" stroke-width="1"/>
  <text x="55" y="105" fill="#ffd166" font-size="10" font-weight="bold">H</text>
  <circle cx="70" cy="72" r="3" fill="#4cc9f0"/>
  <text x="55" y="135" fill="#a8d8ea" font-size="9">1</text>
  <!-- He: 2 -->
  <circle cx="140" cy="100" r="20" fill="none" stroke="#4cc9f0" stroke-width="1"/>
  <text x="124" y="105" fill="#ffd166" font-size="10" font-weight="bold">He</text>
  <circle cx="130" cy="78" r="3" fill="#4cc9f0"/>
  <circle cx="150" cy="78" r="3" fill="#4cc9f0"/>
  <text x="123" y="135" fill="#a8d8ea" font-size="9">2</text>
  <!-- Li: 2,1 -->
  <circle cx="210" cy="100" r="18" fill="none" stroke="#4cc9f0" stroke-width="0.8"/>
  <circle cx="210" cy="100" r="32" fill="none" stroke="#4cc9f0" stroke-width="0.8"/>
  <text x="198" y="105" fill="#ffd166" font-size="10" font-weight="bold">Li</text>
  <circle cx="198" cy="82" r="3" fill="#4cc9f0"/>
  <circle cx="222" cy="82" r="3" fill="#4cc9f0"/>
  <circle cx="210" cy="67" r="3" fill="#ffd166"/>
  <text x="192" y="135" fill="#a8d8ea" font-size="9">2, 1</text>
  <!-- C: 2,4 -->
  <circle cx="290" cy="100" r="18" fill="none" stroke="#4cc9f0" stroke-width="0.8"/>
  <circle cx="290" cy="100" r="32" fill="none" stroke="#4cc9f0" stroke-width="0.8"/>
  <text x="281" y="105" fill="#ffd166" font-size="10" font-weight="bold">C</text>
  <circle cx="280" cy="82" r="3" fill="#4cc9f0"/>
  <circle cx="300" cy="82" r="3" fill="#4cc9f0"/>
  <circle cx="278" cy="100" r="3" fill="#ffd166"/>
  <circle cx="302" cy="100" r="3" fill="#ffd166"/>
  <circle cx="290" cy="67" r="3" fill="#ffd166"/>
  <circle cx="272" cy="75" r="3" fill="#ffd166"/>
  <text x="275" y="135" fill="#a8d8ea" font-size="9">2, 4</text>
  <!-- Ne: 2,8 -->
  <circle cx="380" cy="100" r="18" fill="none" stroke="#4cc9f0" stroke-width="0.8"/>
  <circle cx="380" cy="100" r="32" fill="none" stroke="#4cc9f0" stroke-width="0.8"/>
  <text x="365" y="105" fill="#ffd166" font-size="10" font-weight="bold">Ne</text>
  <circle cx="368" cy="82" r="3" fill="#4cc9f0"/>
  <circle cx="392" cy="82" r="3" fill="#4cc9f0"/>
  <circle cx="364" cy="94" r="3" fill="#4cc9f0"/>
  <circle cx="396" cy="94" r="3" fill="#4cc9f0"/>
  <circle cx="364" cy="108" r="3" fill="#4cc9f0"/>
  <circle cx="396" cy="108" r="3" fill="#4cc9f0"/>
  <circle cx="368" cy="120" r="3" fill="#4cc9f0"/>
  <circle cx="392" cy="120" r="3" fill="#4cc9f0"/>
  <text x="367" y="135" fill="#a8d8ea" font-size="9">2, 8</text>
  <!-- 2-8-8 rule -->
  <text x="30" y="170" fill="#e94560" font-size="14" font-weight="bold">Правило заполнения оболочек:</text>
  <!-- Shell capacity diagram -->
  <circle cx="70" cy="230" r="35" fill="none" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="55" y="235" fill="#4cc9f0" font-size="12" font-weight="bold">2e⁻</text>
  <text x="45" y="250" fill="#7f8c8d" font-size="9">I оболочка</text>
  <circle cx="70" cy="230" r="55" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="90" y="195" fill="#ffd166" font-size="12" font-weight="bold">8e⁻</text>
  <text x="83" y="210" fill="#7f8c8d" font-size="9">II оболочка</text>
  <circle cx="70" cy="230" r="75" fill="none" stroke="#e94560" stroke-width="1.5"/>
  <text x="105" y="168" fill="#e94560" font-size="12" font-weight="bold">8e⁻</text>
  <text x="98" y="183" fill="#7f8c8d" font-size="9">III оболочка</text>
  <!-- Rules text -->
  <text x="220" y="185" fill="#a8d8ea" font-size="12">Максимум электронов:</text>
  <text x="220" y="205" fill="#4cc9f0" font-size="13" font-family="serif">I: 2e⁻</text>
  <text x="220" y="225" fill="#ffd166" font-size="13" font-family="serif">II: 8e⁻</text>
  <text x="220" y="245" fill="#e94560" font-size="13" font-family="serif">III: 8e⁻</text>
  <text x="220" y="270" fill="#a8d8ea" font-size="11">Общая формула: 2n²</text>
  <!-- Stable configuration -->
  <text x="220" y="295" fill="#ffd166" font-size="12" font-weight="bold">Устойчивая оболочка:</text>
  <text x="220" y="312" fill="#c9d1d9" font-size="11">8e⁻ на внешнем уровне (как у благородных газов)</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Строение электронной оболочки</text>
</svg>