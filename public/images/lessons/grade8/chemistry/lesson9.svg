<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <text x="30" y="35" fill="#e94560" font-size="14" font-weight="bold">Оксиды</text>
  <!-- Formation: Element + O₂ → Oxide -->
  <text x="30" y="65" fill="#a8d8ea" font-size="12">Образование:</text>
  <text x="30" y="85" fill="#4cc9f0" font-size="14" font-family="serif">Элемент + O₂ → Оксид</text>
  <!-- Metal oxides (basic) -->
  <rect x="20" y="100" width="230" height="130" rx="6" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <text x="30" y="120" fill="#ffd166" font-size="12" font-weight="bold">Оксиды металлов (основные)</text>
  <!-- MgO formation -->
  <circle cx="60" cy="155" r="14" fill="#ffd166" fill-opacity="0.15" stroke="#ffd166" stroke-width="1.5"/>
  <text x="52" y="159" fill="#ffd166" font-size="10">Mg</text>
  <text x="80" y="159" fill="#a8d8ea" font-size="14">+</text>
  <circle cx="110" cy="155" r="14" fill="#e94560" fill-opacity="0.15" stroke="#e94560" stroke-width="1.5"/>
  <text x="102" y="159" fill="#e94560" font-size="10">O₂</text>
  <text x="132" y="159" fill="#a8d8ea" font-size="14">→</text>
  <rect x="150" y="142" width="60" height="26" rx="4" fill="#ffd166" fill-opacity="0.08" stroke="#ffd166" stroke-width="1"/>
  <text x="157" y="160" fill="#ffd166" font-size="11">MgO</text>
  <!-- More examples -->
  <text x="35" y="190" fill="#7f8c8d" font-size="10">2Mg + O₂ → 2MgO</text>
  <text x="35" y="205" fill="#7f8c8d" font-size="10">4Na + O₂ → 2Na₂O</text>
  <text x="35" y="220" fill="#7f8c8d" font-size="10">2Ca + O₂ → 2CaO</text>
  <!-- Nonmetal oxides (acidic) -->
  <rect x="260" y="100" width="230" height="130" rx="6" fill="none" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="270" y="120" fill="#4cc9f0" font-size="12" font-weight="bold">Оксиды неметаллов (кислотные)</text>
  <!-- CO₂ formation -->
  <circle cx="300" cy="155" r="14" fill="#4cc9f0" fill-opacity="0.15" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="293" y="159" fill="#4cc9f0" font-size="10">C</text>
  <text x="320" y="159" fill="#a8d8ea" font-size="14">+</text>
  <circle cx="350" cy="155" r="14" fill="#e94560" fill-opacity="0.15" stroke="#e94560" stroke-width="1.5"/>
  <text x="342" y="159" fill="#e94560" font-size="10">O₂</text>
  <text x="372" y="159" fill="#a8d8ea" font-size="14">→</text>
  <rect x="390" y="142" width="60" height="26" rx="4" fill="#4cc9f0" fill-opacity="0.08" stroke="#4cc9f0" stroke-width="1"/>
  <text x="394" y="160" fill="#4cc9f0" font-size="11">CO₂</text>
  <!-- More examples -->
  <text x="275" y="190" fill="#7f8c8d" font-size="10">C + O₂ → CO₂</text>
  <text x="275" y="205" fill="#7f8c8d" font-size="10">S + O₂ → SO₂</text>
  <text x="275" y="220" fill="#7f8c8d" font-size="10">N₂ + O₂ → 2NO</text>
  <!-- Naming rules -->
  <text x="30" y="255" fill="#e94560" font-size="12" font-weight="bold">Названия оксидов:</text>
  <text x="30" y="275" fill="#a8d8ea" font-size="11">Na₂O — оксид натрия (I)</text>
  <text x="30" y="292" fill="#a8d8ea" font-size="11">Fe₂O₃ — оксид железа (III)</text>
  <text x="260" y="275" fill="#a8d8ea" font-size="11">CO₂ — оксид углерода (IV)</text>
  <text x="260" y="292" fill="#a8d8ea" font-size="11">SO₃ — оксид серы (VI)</text>
  <!-- Amphoteric -->
  <text x="30" y="320" fill="#2a9d8f" font-size="11">Амфотерные оксиды: ZnO, Al₂O₃, BeO</text>
  <text x="30" y="335" fill="#7f8c8d" font-size="10">(реагируют и с кислотами, и с основаниями)</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Оксиды</text>
</svg>