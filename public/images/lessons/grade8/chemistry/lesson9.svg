<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="acid9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="80%" stop-color="#059669" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg9)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981" filter="url(#glow9)">Кислоты</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Индикаторы и молекулярные модели</text>

  <!-- Decorative line -->
  <line x1="100" y1="76" x2="700" y2="76" stroke="#0d9488" stroke-width="1" opacity="0.5"/>

  <!-- === BEAKER WITH ACID === -->
  <g transform="translate(100, 100)">
    <!-- Beaker outline -->
    <path d="M0,0 L0,150 Q0,170 20,180 L80,180 Q100,170 100,150 L100,0" fill="url(#acid9)" stroke="#14b8a6" stroke-width="2"/>
    <!-- Beaker rim -->
    <line x1="-5" y1="0" x2="105" y2="0" stroke="#14b8a6" stroke-width="2.5"/>
    <!-- Spout -->
    <path d="M0,0 Q-8,-2 -5,-8" fill="none" stroke="#14b8a6" stroke-width="2"/>
    <!-- Liquid surface -->
    <path d="M5,50 Q50,45 95,50" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <!-- Bubbles -->
    <circle cx="30" cy="100" r="4" fill="none" stroke="#14b8a6" stroke-width="0.8" opacity="0.5"/>
    <circle cx="60" cy="120" r="3" fill="none" stroke="#14b8a6" stroke-width="0.8" opacity="0.5"/>
    <circle cx="75" cy="90" r="5" fill="none" stroke="#10b981" stroke-width="0.8" opacity="0.4"/>
    <!-- H+ label -->
    <text x="50" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#10b981" opacity="0.6">H⁺</text>
    <!-- Label -->
    <text x="50" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6">Кислота</text>
    <text x="50" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">[H⁺] &gt; [OH⁻]</text>
  </g>

  <!-- === INDICATOR STRIPS === -->
  <g transform="translate(250, 95)">
    <text x="120" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f766e">Индикаторы в кислой среде</text>

    <!-- Лакмус -->
    <g transform="translate(0, 30)">
      <rect x="0" y="0" width="80" height="155" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <rect x="5" y="5" width="70" height="50" rx="3" fill="#334155"/>
      <text x="40" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Лакмус</text>
      <text x="40" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">(лакмусовая бумажка)</text>
      <!-- Color swatch - red -->
      <rect x="15" y="65" width="50" height="55" rx="6" fill="#dc2626" opacity="0.85"/>
      <text x="40" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Красный</text>
      <!-- Arrow -->
      <text x="40" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#dc2626">▼</text>
      <text x="40" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">красный</text>
    </g>

    <!-- Фенолфталеин -->
    <g transform="translate(90, 30)">
      <rect x="0" y="0" width="80" height="155" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <rect x="5" y="5" width="70" height="50" rx="3" fill="#334155"/>
      <text x="40" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Фенол-</text>
      <text x="40" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">фталеин</text>
      <!-- Color swatch - colorless -->
      <rect x="15" y="65" width="50" height="55" rx="6" fill="#e2e8f0" opacity="0.15" stroke="#475569" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="40" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Бес-</text>
      <text x="40" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">цветный</text>
      <!-- Arrow -->
      <text x="40" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#64748b">▼</text>
      <text x="40" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">бесцветный</text>
    </g>

    <!-- Метилоранж -->
    <g transform="translate(180, 30)">
      <rect x="0" y="0" width="80" height="155" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <rect x="5" y="5" width="70" height="50" rx="3" fill="#334155"/>
      <text x="40" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Метил-</text>
      <text x="40" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">оранж</text>
      <!-- Color swatch - red-orange -->
      <rect x="15" y="65" width="50" height="55" rx="6" fill="#ea580c" opacity="0.85"/>
      <text x="40" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Красный</text>
      <!-- Arrow -->
      <text x="40" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ea580c">▼</text>
      <text x="40" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">красный</text>
    </g>
  </g>

  <!-- === MOLECULAR MODELS === -->
  <g transform="translate(570, 100)">
    <text x="110" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f766e">Молекулярные модели</text>

    <!-- HCl molecule -->
    <g transform="translate(55, 55)">
      <text x="0" y="-25" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#10b981">HCl</text>
      <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">соляная кислота</text>
      <!-- H atom (highlighted) -->
      <circle cx="-22" cy="20" r="16" fill="#10b981" opacity="0.8" stroke="#34d399" stroke-width="2"/>
      <text x="-22" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">H</text>
      <!-- Bond -->
      <line x1="-6" y1="20" x2="16" y2="20" stroke="#94a3b8" stroke-width="3"/>
      <!-- Cl atom -->
      <circle cx="32" cy="20" r="22" fill="#0d9488" opacity="0.7" stroke="#14b8a6" stroke-width="1.5"/>
      <text x="32" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Cl</text>
    </g>

    <!-- H2SO4 molecule -->
    <g transform="translate(55, 140)">
      <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#10b981">H₂SO₄</text>
      <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">серная кислота</text>
      <!-- S center -->
      <circle cx="0" cy="40" r="20" fill="#059669" opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
      <text x="0" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">S</text>
      <!-- O top -->
      <circle cx="0" cy="5" r="14" fill="#ef4444" opacity="0.4" stroke="#f87171" stroke-width="1"/>
      <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fca5a5">O</text>
      <line x1="0" y1="20" x2="0" y2="19" stroke="#94a3b8" stroke-width="2"/>
      <!-- O left with H -->
      <circle cx="-45" cy="35" r="14" fill="#ef4444" opacity="0.4" stroke="#f87171" stroke-width="1"/>
      <text x="-45" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fca5a5">O</text>
      <line x1="-20" y1="38" x2="-31" y2="36" stroke="#94a3b8" stroke-width="2"/>
      <!-- H left (highlighted) -->
      <circle cx="-70" cy="25" r="12" fill="#10b981" opacity="0.8" stroke="#34d399" stroke-width="2"/>
      <text x="-70" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">H</text>
      <line x1="-59" y1="30" x2="-58" y2="33" stroke="#94a3b8" stroke-width="2"/>
      <!-- O right with H -->
      <circle cx="45" cy="35" r="14" fill="#ef4444" opacity="0.4" stroke="#f87171" stroke-width="1"/>
      <text x="45" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fca5a5">O</text>
      <line x1="20" y1="38" x2="31" y2="36" stroke="#94a3b8" stroke-width="2"/>
      <!-- H right (highlighted) -->
      <circle cx="70" cy="25" r="12" fill="#10b981" opacity="0.8" stroke="#34d399" stroke-width="2"/>
      <text x="70" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">H</text>
      <line x1="59" y1="30" x2="58" y2="33" stroke="#94a3b8" stroke-width="2"/>
      <!-- O bottom -->
      <circle cx="0" cy="75" r="14" fill="#ef4444" opacity="0.4" stroke="#f87171" stroke-width="1"/>
      <text x="0" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fca5a5">O</text>
      <line x1="0" y1="60" x2="0" y2="61" stroke="#94a3b8" stroke-width="2"/>
    </g>
  </g>

  <!-- === COMMON ACIDS LIST === -->
  <g transform="translate(570, 340)">
    <text x="110" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0f766e">Кислоты</text>
    <rect x="0" y="10" width="220" height="120" rx="8" fill="#0d9488" opacity="0.08" stroke="#0d9488" stroke-width="1"/>
    <text x="15" y="32" font-family="Arial, sans-serif" font-size="12" fill="#10b981">HCl</text>
    <text x="60" y="32" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">— соляная</text>
    <text x="15" y="52" font-family="Arial, sans-serif" font-size="12" fill="#10b981">H₂SO₄</text>
    <text x="70" y="52" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">— серная</text>
    <text x="15" y="72" font-family="Arial, sans-serif" font-size="12" fill="#10b981">HNO₃</text>
    <text x="65" y="72" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">— азотная</text>
    <text x="15" y="92" font-family="Arial, sans-serif" font-size="12" fill="#10b981">H₃PO₄</text>
    <text x="70" y="92" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">— фосфорная</text>
    <text x="15" y="112" font-family="Arial, sans-serif" font-size="12" fill="#10b981">H₂CO₃</text>
    <text x="70" y="112" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">— угольная</text>
  </g>

  <!-- H atom highlight legend -->
  <g transform="translate(250, 460)">
    <circle cx="0" cy="0" r="8" fill="#10b981" opacity="0.8" stroke="#34d399" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">H</text>
    <text x="15" y="4" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">— атом водорода (выделен)</text>
  </g>

  <!-- Footer -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Кислоты — сложные вещества, содержащие атомы водорода, способные замещаться на металл</text>
</svg>