<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="predictGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="discoverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#f0fdf4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="20" font-weight="bold" filter="url(#glow)">Значение периодического закона</text>
  <text x="400" y="55" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Предсказания Д.И. Менделеева и их подтверждение</text>

  <!-- Mendeleev portrait silhouette -->
  <ellipse cx="95" cy="160" rx="35" ry="45" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <!-- Head -->
  <ellipse cx="95" cy="130" rx="22" ry="26" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <!-- Shoulders -->
  <path d="M60,175 Q60,195 95,200 Q130,195 130,175" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
  <!-- Hair/beard suggestion -->
  <path d="M80,110 Q78,95 95,90 Q112,95 110,110" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  <path d="M85,145 Q80,165 85,175" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
  <path d="M105,145 Q110,165 105,175" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>

  <!-- Year -->
  <text x="95" y="225" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="24" font-weight="bold" filter="url(#softGlow)">1869</text>
  <text x="95" y="242" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">год открытия</text>
  <text x="95" y="256" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">периодического закона</text>

  <!-- Column headers -->
  <text x="310" y="80" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Предсказанный</text>
  <text x="310" y="95" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">(экабор, экаалюминий, экасилиций)</text>
  <text x="580" y="80" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Открытый</text>
  <text x="580" y="95" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="9">(подтверждение предсказаний)</text>

  <!-- Prediction 1: Eka-boron → Scandium -->
  <rect x="220" y="115" width="180" height="80" rx="8" fill="url(#predictGrad)" opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
  <text x="310" y="138" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Экабор</text>
  <text x="310" y="155" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Атомная масса: ~44</text>
  <text x="310" y="170" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Оксид: Eb₂O₃</text>
  <text x="310" y="185" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Плотность: ~3.5 г/см³</text>

  <!-- Arrow 1 -->
  <line x1="405" y1="155" x2="490" y2="155" stroke="#f0fdf4" stroke-width="2" marker-end="url(#arrowW)"/>
  <text x="448" y="148" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">1879</text>

  <rect x="500" y="115" width="180" height="80" rx="8" fill="url(#discoverGrad)" opacity="0.25" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="590" y="138" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Скандий (Sc)</text>
  <text x="590" y="155" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Атомная масса: 44.96</text>
  <text x="590" y="170" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Оксид: Sc₂O₃</text>
  <text x="590" y="185" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Плотность: 3.0 г/см³</text>

  <!-- Prediction 2: Eka-aluminium → Gallium -->
  <rect x="220" y="215" width="180" height="80" rx="8" fill="url(#predictGrad)" opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
  <text x="310" y="238" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Экаалюминий</text>
  <text x="310" y="255" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Атомная масса: ~68</text>
  <text x="310" y="270" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Оксид: Ea₂O₃</text>
  <text x="310" y="285" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Плотность: ~5.9 г/см³</text>

  <!-- Arrow 2 -->
  <line x1="405" y1="255" x2="490" y2="255" stroke="#f0fdf4" stroke-width="2" marker-end="url(#arrowW)"/>
  <text x="448" y="248" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">1875</text>

  <rect x="500" y="215" width="180" height="80" rx="8" fill="url(#discoverGrad)" opacity="0.25" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="590" y="238" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Галлий (Ga)</text>
  <text x="590" y="255" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Атомная масса: 69.72</text>
  <text x="590" y="270" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Оксид: Ga₂O₃</text>
  <text x="590" y="285" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Плотность: 5.91 г/см³</text>

  <!-- Prediction 3: Eka-silicon → Germanium -->
  <rect x="220" y="315" width="180" height="80" rx="8" fill="url(#predictGrad)" opacity="0.25" stroke="#10b981" stroke-width="1.5"/>
  <text x="310" y="338" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Экасилиций</text>
  <text x="310" y="355" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Атомная масса: ~72</text>
  <text x="310" y="370" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Оксид: EsO₂</text>
  <text x="310" y="385" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Плотность: ~5.5 г/см³</text>

  <!-- Arrow 3 -->
  <line x1="405" y1="355" x2="490" y2="355" stroke="#f0fdf4" stroke-width="2" marker-end="url(#arrowW)"/>
  <text x="448" y="348" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">1886</text>

  <rect x="500" y="315" width="180" height="80" rx="8" fill="url(#discoverGrad)" opacity="0.25" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="590" y="338" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Германий (Ge)</text>
  <text x="590" y="355" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Атомная масса: 72.59</text>
  <text x="590" y="370" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Оксид: GeO₂</text>
  <text x="590" y="385" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Плотность: 5.35 г/см³</text>

  <!-- Bottom significance box -->
  <rect x="30" y="415" width="740" height="65" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.8"/>
  <text x="400" y="437" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Значение периодического закона</text>
  <text x="400" y="455" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">1. Упорядочил все известные элементы  2. Предсказал свойства неоткрытых элементов</text>
  <text x="400" y="470" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">3. Исправил атомные массы  4. Стал основой современной химии</text>

  <!-- Decorative checkmarks on arrows -->
  <text x="448" y="162" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">✓</text>
  <text x="448" y="262" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">✓</text>
  <text x="448" y="362" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold">✓</text>

  <!-- Decorative border -->
  <rect x="2" y="2" width="796" height="496" rx="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>

  <!-- Lesson number -->
  <text x="780" y="490" text-anchor="end" fill="#475569" font-family="Arial, sans-serif" font-size="9">Урок 17</text>
</svg>