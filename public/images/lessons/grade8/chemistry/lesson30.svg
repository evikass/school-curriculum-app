<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="arrowGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="arrowGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="100" x2="800" y2="100" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="#10b981" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke="#10b981" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="500" stroke="#10b981" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="500" stroke="#10b981" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="#10b981" stroke-width="0.5"/>
  </g>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" opacity="0.9"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white">Галогены: общая характеристика</text>

  <!-- Subtitle label -->
  <rect x="250" y="68" width="300" height="28" rx="14" fill="#0d9488" opacity="0.3"/>
  <text x="400" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#14b8a6" font-weight="bold">Подгруппа галогенов (VIIA)</text>

  <!-- Common electron config label -->
  <rect x="570" y="68" width="200" height="28" rx="14" fill="#059669" opacity="0.25"/>
  <text x="670" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#10b981">ns²np⁵ — 7 электронов</text>

  <!-- ===== HALOGEN COLUMN ===== -->

  <!-- F₂ - Fluorine -->
  <g transform="translate(80, 110)">
    <!-- Element card -->
    <rect width="320" height="75" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.9"/>
    <!-- State indicator - pale yellow -->
    <rect x="8" y="8" width="60" height="60" rx="8" fill="#fef9c3" opacity="0.2" stroke="#fef9c3" stroke-width="1"/>
    <text x="38" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fef9c3">Газ</text>
    <text x="38" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fef9c3" opacity="0.7">бледно-</text>
    <text x="38" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fef9c3" opacity="0.7">жёлтый</text>
    <!-- Element info -->
    <text x="80" y="22" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Z = 9</text>
    <text x="80" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981" filter="url(#glow)">F₂</text>
    <text x="130" y="42" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Фтор</text>
    <text x="80" y="62" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">1s²2s²2p⁵</text>
    <!-- Electronegativity -->
    <text x="280" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">ЭО = 4.0</text>
    <text x="280" y="48" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">r = 0.071 нм</text>
    <text x="280" y="65" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">2s²2p⁵</text>
  </g>

  <!-- Cl₂ - Chlorine -->
  <g transform="translate(80, 195)">
    <rect width="320" height="75" rx="10" fill="#1e293b" stroke="#0d9488" stroke-width="1.5" opacity="0.9"/>
    <!-- State indicator - yellow-green -->
    <rect x="8" y="8" width="60" height="60" rx="8" fill="#bbf7d0" opacity="0.2" stroke="#bbf7d0" stroke-width="1"/>
    <text x="38" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbf7d0">Газ</text>
    <text x="38" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bbf7d0" opacity="0.7">жёлто-</text>
    <text x="38" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bbf7d0" opacity="0.7">зелёный</text>
    <text x="80" y="22" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Z = 17</text>
    <text x="80" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488" filter="url(#glow)">Cl₂</text>
    <text x="140" y="42" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Хлор</text>
    <text x="80" y="62" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">[Ne]3s²3p⁵</text>
    <text x="280" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">ЭО = 3.0</text>
    <text x="280" y="48" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">r = 0.099 нм</text>
    <text x="280" y="65" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">3s²3p⁵</text>
  </g>

  <!-- Br₂ - Bromine -->
  <g transform="translate(80, 280)">
    <rect width="320" height="75" rx="10" fill="#1e293b" stroke="#059669" stroke-width="1.5" opacity="0.9"/>
    <!-- State indicator - red-brown liquid -->
    <rect x="8" y="8" width="60" height="60" rx="8" fill="#dc6b3a" opacity="0.25" stroke="#dc6b3a" stroke-width="1"/>
    <text x="38" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">Жид-</text>
    <text x="38" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">кость</text>
    <text x="38" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" opacity="0.7">красно-</text>
    <text x="38" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" opacity="0.7">бурый</text>
    <text x="80" y="22" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Z = 35</text>
    <text x="80" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#059669" filter="url(#glow)">Br₂</text>
    <text x="140" y="42" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Бром</text>
    <text x="80" y="62" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">[Ar]4s²4p⁵</text>
    <text x="280" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">ЭО = 2.8</text>
    <text x="280" y="48" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">r = 0.114 нм</text>
    <text x="280" y="65" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">4s²4p⁵</text>
  </g>

  <!-- I₂ - Iodine -->
  <g transform="translate(80, 365)">
    <rect width="320" height="75" rx="10" fill="#1e293b" stroke="#0f766e" stroke-width="1.5" opacity="0.9"/>
    <!-- State indicator - dark purple solid -->
    <rect x="8" y="8" width="60" height="60" rx="8" fill="#7c3aed" opacity="0.25" stroke="#7c3aed" stroke-width="1"/>
    <text x="38" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa">Твёрд.</text>
    <text x="38" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa">вещ-во</text>
    <text x="38" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" opacity="0.7">тёмно-</text>
    <text x="38" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a78bfa" opacity="0.7">фиолет.</text>
    <text x="80" y="22" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Z = 53</text>
    <text x="80" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0f766e" filter="url(#glow)">I₂</text>
    <text x="120" y="42" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Йод</text>
    <text x="80" y="62" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">[Kr]5s²5p⁵</text>
    <text x="280" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">ЭО = 2.5</text>
    <text x="280" y="48" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">r = 0.133 нм</text>
    <text x="280" y="65" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">5s²5p⁵</text>
  </g>

  <!-- Connecting line between elements -->
  <line x1="240" y1="185" x2="240" y2="195" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="240" y1="270" x2="240" y2="280" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="240" y1="355" x2="240" y2="365" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== TREND ARROWS (Right side) ===== -->

  <!-- Reactivity arrow (decreasing) -->
  <g transform="translate(440, 115)">
    <rect width="170" height="155" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <text x="85" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10b981">Реакционная</text>
    <text x="85" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10b981">способность</text>

    <!-- Arrow pointing down -->
    <line x1="50" y1="52" x2="50" y2="138" stroke="#10b981" stroke-width="2.5"/>
    <polygon points="50,145 42,130 58,130" fill="#10b981"/>

    <!-- Labels on arrow -->
    <text x="65" y="72" font-family="Arial, sans-serif" font-size="11" fill="#fef9c3">F — самый активный</text>
    <text x="65" y="95" font-family="Arial, sans-serif" font-size="11" fill="#bbf7d0">Cl — высокой акт.</text>
    <text x="65" y="118" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">Br — умеренной</text>
    <text x="65" y="140" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa">I — низкой акт.</text>
  </g>

  <!-- Atomic radius arrow (increasing) -->
  <g transform="translate(630, 115)">
    <rect width="155" height="155" rx="10" fill="#1e293b" stroke="#0d9488" stroke-width="1" opacity="0.7"/>
    <text x="78" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6">Атомный</text>
    <text x="78" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6">радиус</text>

    <!-- Arrow pointing down -->
    <line x1="30" y1="52" x2="30" y2="138" stroke="#14b8a6" stroke-width="2.5"/>
    <polygon points="30,145 22,130 38,130" fill="#14b8a6"/>

    <!-- Labels -->
    <text x="42" y="72" font-family="Arial, sans-serif" font-size="11" fill="#fef9c3">0.071 нм</text>
    <text x="42" y="95" font-family="Arial, sans-serif" font-size="11" fill="#bbf7d0">0.099 нм</text>
    <text x="42" y="118" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">0.114 нм</text>
    <text x="42" y="140" font-family="Arial, sans-serif" font-size="11" fill="#a78bfa">0.133 нм</text>
  </g>

  <!-- ===== BOTTOM INFO SECTION ===== -->
  <g transform="translate(440, 290)">
    <rect width="345" height="155" rx="10" fill="#1e293b" stroke="#059669" stroke-width="1" opacity="0.7"/>
    <text x="172" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#10b981">Общие свойства галогенов</text>

    <text x="15" y="46" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">• Высшая валентность: I (−1)</text>
    <text x="15" y="66" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">• На внешнем уровне: 7 электронов</text>
    <text x="15" y="86" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">• Сильные окислители</text>
    <text x="15" y="106" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">• Образуют галогениды (галогенид-ионы)</text>
    <text x="15" y="126" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">• Молекулы двухатомные: Э₂</text>
    <text x="15" y="146" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6">• Вытеснение: F₂ → Cl₂ → Br₂ → I₂</text>
  </g>

  <!-- Electron shell diagram (small) for ns²np⁵ -->
  <g transform="translate(80, 455)">
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">ns²np⁵ = ■■■■■■■ (7 из 8) → стремятся получить 1 электрон</text>
  </g>

  <!-- Lesson number badge -->
  <rect x="720" y="470" width="70" height="24" rx="12" fill="#059669" opacity="0.6"/>
  <text x="755" y="486" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Урок 30</text>
</svg>