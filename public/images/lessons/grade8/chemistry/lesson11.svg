<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="50%" style="stop-color:#f1f8e9"/>
      <stop offset="100%" style="stop-color:#e0f2f1"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897b"/>
      <stop offset="100%" style="stop-color:#004d40"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b2ebf2;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4dd0e1;stop-opacity:0.8"/>
    </linearGradient>
    <linearGradient id="ionNa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#2e7d32"/>
    </linearGradient>
    <linearGradient id="ionCl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef5350"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#004d40">Соли</text>
  <line x1="300" y1="46" x2="500" y2="46" stroke="#00897b" stroke-width="2" opacity="0.5"/>

  <!-- NaCl Crystal Lattice -->
  <rect x="30" y="60" width="250" height="200" rx="10" fill="white" fill-opacity="0.5" stroke="#00897b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="155" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00695c">Кристаллическая решётка NaCl</text>
  <!-- Lattice grid lines -->
  <g stroke="#b2dfdb" stroke-width="0.5" opacity="0.5">
    <line x1="55" y1="105" x2="255" y2="105"/><line x1="55" y1="140" x2="255" y2="140"/>
    <line x1="55" y1="175" x2="255" y2="175"/><line x1="55" y1="210" x2="255" y2="210"/>
    <line x1="55" y1="245" x2="255" y2="245"/>
    <line x1="55" y1="95" x2="55" y2="250"/><line x1="95" y1="95" x2="95" y2="250"/>
    <line x1="135" y1="95" x2="135" y2="250"/><line x1="175" y1="95" x2="175" y2="250"/>
    <line x1="215" y1="95" x2="215" y2="250"/><line x1="255" y1="95" x2="255" y2="250"/>
  </g>
  <!-- Na+ ions (green, smaller) -->
  <circle cx="55" cy="105" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="55" y="109" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="135" cy="105" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="135" y="109" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="215" cy="105" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="215" y="109" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="95" cy="140" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="95" y="144" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="175" cy="140" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="175" y="144" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="255" cy="140" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="255" y="144" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="55" cy="175" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="55" y="179" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="135" cy="175" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="135" y="179" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="215" cy="175" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="215" y="179" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="95" cy="210" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="95" y="214" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <circle cx="175" cy="210" r="10" fill="url(#ionNa)" opacity="0.9"/><text x="175" y="214" text-anchor="middle" font-size="7" fill="white" font-weight="bold">Na⁺</text>
  <!-- Cl- ions (red, larger) -->
  <circle cx="95" cy="105" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="95" y="109" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="175" cy="105" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="175" y="109" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="255" cy="105" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="255" y="109" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="55" cy="140" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="55" y="144" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="135" cy="140" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="135" y="144" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="215" cy="140" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="215" y="144" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="95" cy="175" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="95" y="179" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="175" cy="175" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="175" y="179" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="255" cy="175" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="255" y="179" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="55" cy="210" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="55" y="214" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="135" cy="210" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="135" y="214" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <circle cx="215" cy="210" r="14" fill="url(#ionCl)" opacity="0.85"/><text x="215" y="214" text-anchor="middle" font-size="8" fill="white" font-weight="bold">Cl⁻</text>
  <text x="155" y="248" text-anchor="middle" font-size="9" fill="#555" font-style="italic">Чередование ионов Na⁺ и Cl⁻</text>

  <!-- Salt Formulas Section -->
  <rect x="310" y="60" width="210" height="200" rx="10" fill="white" fill-opacity="0.5" stroke="#00897b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="415" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00695c">Типы солей</text>
  <!-- Normal salts -->
  <rect x="325" y="92" width="180" height="42" rx="5" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="335" y="107" font-family="sans-serif" font-size="11" font-weight="bold" fill="#2e7d32">Средние соли</text>
  <text x="335" y="125" font-family="sans-serif" font-size="12" fill="#333">NaCl, KNO₃, CaSO₄</text>
  <!-- Acid salts -->
  <rect x="325" y="140" width="180" height="42" rx="5" fill="#fff3e0" stroke="#ffcc80" stroke-width="1"/>
  <text x="335" y="155" font-family="sans-serif" font-size="11" font-weight="bold" fill="#e65100">Кислые соли</text>
  <text x="335" y="173" font-family="sans-serif" font-size="12" fill="#333">NaHCO₃, KHSO₄</text>
  <!-- Basic salts -->
  <rect x="325" y="188" width="180" height="42" rx="5" fill="#fce4ec" stroke="#f48fb1" stroke-width="1"/>
  <text x="335" y="203" font-family="sans-serif" font-size="11" font-weight="bold" fill="#880e4f">Основные соли</text>
  <text x="335" y="221" font-family="sans-serif" font-size="12" fill="#333">Mg(OH)Cl, Cu₂(OH)₂CO₃</text>
  <!-- Double salts -->
  <rect x="325" y="236" width="180" height="18" rx="5" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1"/>
  <text x="335" y="250" font-family="sans-serif" font-size="10" fill="#333">Двойные: KAl(SO₄)₂</text>

  <!-- Salt Crystal Shapes -->
  <rect x="550" y="60" width="220" height="200" rx="10" fill="white" fill-opacity="0.5" stroke="#00897b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="660" y="82" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00695c">Кристаллы солей</text>
  <!-- NaCl cube -->
  <g transform="translate(585,130)">
    <polygon points="0,0 35,-15 70,0 35,15" fill="#b2dfdb" stroke="#00897b" stroke-width="1"/>
    <polygon points="0,0 0,40 35,55 35,15" fill="#80cbc4" stroke="#00897b" stroke-width="1"/>
    <polygon points="70,0 70,40 35,55 35,15" fill="#4db6ac" stroke="#00897b" stroke-width="1"/>
    <text x="35" y="75" text-anchor="middle" font-size="10" fill="#333">NaCl (куб)</text>
  </g>
  <!-- Rhombic crystal -->
  <g transform="translate(700,115)">
    <polygon points="0,25 25,0 50,25 25,50" fill="#ffe0b2" stroke="#ff8f00" stroke-width="1.5"/>
    <text x="25" y="70" text-anchor="middle" font-size="10" fill="#333">KNO₃</text>
  </g>
  <!-- Prismatic crystal -->
  <g transform="translate(580,190)">
    <rect x="5" y="5" width="50" height="30" fill="#d1c4e9" stroke="#7e57c2" stroke-width="1.5"/>
    <polygon points="5,5 15,-5 65,-5 55,5" fill="#b39ddb" stroke="#7e57c2" stroke-width="1"/>
    <polygon points="55,5 65,-5 65,25 55,35" fill="#9575cd" stroke="#7e57c2" stroke-width="1"/>
    <text x="35" y="52" text-anchor="middle" font-size="10" fill="#333">CaSO₄</text>
  </g>
  <text x="660" y="253" text-anchor="middle" font-size="9" fill="#555" font-style="italic">Форма кристаллов зависит от состава</text>

  <!-- Salt Dissolution in Water -->
  <rect x="30" y="275" width="350" height="210" rx="10" fill="white" fill-opacity="0.5" stroke="#00897b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="297" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00695c">Растворение соли в воде</text>
  <!-- Water beaker -->
  <rect x="50" y="310" width="120" height="140" rx="3" fill="none" stroke="#546e7a" stroke-width="2"/>
  <rect x="50" y="350" width="120" height="100" fill="url(#water)" opacity="0.7"/>
  <!-- Water line wave -->
  <path d="M50,350 Q80,345 110,350 Q140,355 170,350" fill="none" stroke="#4dd0e1" stroke-width="1.5"/>
  <!-- Dissolving ions in water -->
  <circle cx="80" cy="380" r="8" fill="url(#ionNa)" opacity="0.8"/><text x="80" y="383" text-anchor="middle" font-size="6" fill="white">Na⁺</text>
  <circle cx="120" cy="400" r="8" fill="url(#ionNa)" opacity="0.8"/><text x="120" y="403" text-anchor="middle" font-size="6" fill="white">Na⁺</text>
  <circle cx="100" cy="420" r="8" fill="url(#ionNa)" opacity="0.8"/><text x="100" y="423" text-anchor="middle" font-size="6" fill="white">Na⁺</text>
  <circle cx="90" cy="395" r="12" fill="url(#ionCl)" opacity="0.7"/><text x="90" y="398" text-anchor="middle" font-size="6" fill="white">Cl⁻</text>
  <circle cx="130" cy="375" r="12" fill="url(#ionCl)" opacity="0.7"/><text x="130" y="378" text-anchor="middle" font-size="6" fill="white">Cl⁻</text>
  <circle cx="140" cy="430" r="12" fill="url(#ionCl)" opacity="0.7"/><text x="140" y="433" text-anchor="middle" font-size="6" fill="white">Cl⁻</text>
  <!-- Water molecules -->
  <text x="60" y="365" font-size="8" fill="#0288d1" opacity="0.6">H₂O</text>
  <text x="135" y="445" font-size="8" fill="#0288d1" opacity="0.6">H₂O</text>
  <text x="75" y="440" font-size="8" fill="#0288d1" opacity="0.6">H₂O</text>
  <!-- Arrow and equation -->
  <text x="190" y="360" font-family="sans-serif" font-size="11" fill="#004d40">NaCl → Na⁺ + Cl⁻</text>
  <text x="190" y="385" font-family="sans-serif" font-size="10" fill="#555">Диссоциация в воде</text>
  <!-- Steps -->
  <text x="190" y="410" font-family="sans-serif" font-size="10" fill="#2e7d32">1. Разрушение решётки</text>
  <text x="190" y="428" font-family="sans-serif" font-size="10" fill="#2e7d32">2. Гидратация ионов</text>
  <text x="190" y="446" font-family="sans-serif" font-size="10" fill="#2e7d32">3. Растворение</text>
  <text x="190" y="470" font-family="sans-serif" font-size="9" fill="#777" font-style="italic">Раствор — однородная система</text>

  <!-- Chemical Properties Section -->
  <rect x="410" y="275" width="360" height="210" rx="10" fill="white" fill-opacity="0.5" stroke="#00897b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="590" y="297" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#00695c">Химические свойства солей</text>
  <!-- Property boxes -->
  <rect x="425" y="308" width="165" height="35" rx="5" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
  <text x="435" y="322" font-size="9" font-weight="bold" fill="#1b5e20">Соль + Кислота</text>
  <text x="435" y="336" font-size="9" fill="#333">NaCl + H₂SO₄ →</text>

  <rect x="600" y="308" width="160" height="35" rx="5" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
  <text x="610" y="322" font-size="9" font-weight="bold" fill="#1b5e20">Соль + Щёлочь</text>
  <text x="610" y="336" font-size="9" fill="#333">CuSO₄ + 2NaOH →</text>

  <rect x="425" y="350" width="165" height="35" rx="5" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
  <text x="435" y="364" font-size="9" font-weight="bold" fill="#1b5e20">Соль + Соль</text>
  <text x="435" y="378" font-size="9" fill="#333">AgNO₃ + NaCl →</text>

  <rect x="600" y="350" width="160" height="35" rx="5" fill="#e8f5e9" stroke="#81c784" stroke-width="1"/>
  <text x="610" y="364" font-size="9" font-weight="bold" fill="#1b5e20">Соль + Металл</text>
  <text x="610" y="378" font-size="9" fill="#333">Fe + CuSO₄ →</text>

  <!-- General formula -->
  <rect x="425" y="395" width="335" height="45" rx="8" fill="#004d40" fill-opacity="0.1" stroke="#00897b" stroke-width="1.5"/>
  <text x="592" y="414" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#004d40">Общая формула: Meₓ(An)ᵧ</text>
  <text x="592" y="432" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">Me — металл, An — кислотный остаток</text>

  <!-- Solubility hint -->
  <text x="592" y="465" text-anchor="middle" font-size="9" fill="#777" font-style="italic">Таблица растворимости — ключ к реакциям солей</text>
  <rect x="530" y="472" width="124" height="8" rx="4" fill="#00897b" opacity="0.2"/>
</svg>