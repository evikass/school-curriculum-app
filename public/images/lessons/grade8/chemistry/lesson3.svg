<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0c10"/>
      <stop offset="100%" stop-color="#1f2833"/>
    </linearGradient>
    <radialGradient id="nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0.05"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Large atom model -->
  <!-- Electron orbits -->
  <ellipse cx="250" cy="180" rx="180" ry="60" fill="none" stroke="#45a29e" stroke-width="0.8" stroke-dasharray="4,3" transform="rotate(20,250,180)"/>
  <ellipse cx="250" cy="180" rx="140" ry="50" fill="none" stroke="#45a29e" stroke-width="0.8" stroke-dasharray="4,3" transform="rotate(-15,250,180)"/>
  <ellipse cx="250" cy="180" rx="100" ry="45" fill="none" stroke="#45a29e" stroke-width="0.8" stroke-dasharray="4,3" transform="rotate(5,250,180)"/>
  <!-- Nucleus -->
  <circle cx="250" cy="180" r="28" fill="url(#nucleus)" stroke="#e94560" stroke-width="1.5"/>
  <!-- Protons in nucleus -->
  <circle cx="242" cy="172" r="6" fill="#e94560" opacity="0.6"/>
  <text x="239" y="175" fill="#fff" font-size="7">p⁺</text>
  <circle cx="258" cy="172" r="6" fill="#e94560" opacity="0.6"/>
  <text x="255" y="175" fill="#fff" font-size="7">p⁺</text>
  <circle cx="250" cy="188" r="6" fill="#e94560" opacity="0.6"/>
  <text x="247" y="191" fill="#fff" font-size="7">p⁺</text>
  <!-- Neutrons in nucleus -->
  <circle cx="244" cy="184" r="6" fill="#45a29e" opacity="0.5"/>
  <text x="240" y="187" fill="#fff" font-size="7">n⁰</text>
  <circle cx="256" cy="184" r="6" fill="#45a29e" opacity="0.5"/>
  <text x="252" y="187" fill="#fff" font-size="7">n⁰</text>
  <circle cx="250" cy="172" r="6" fill="#45a29e" opacity="0.5"/>
  <text x="246" y="175" fill="#fff" font-size="7">n⁰</text>
  <!-- Electrons -->
  <circle cx="80" cy="160" r="5" fill="#66fcf1"/>
  <circle cx="420" cy="200" r="5" fill="#66fcf1"/>
  <circle cx="160" cy="135" r="5" fill="#66fcf1"/>
  <circle cx="340" cy="225" r="5" fill="#66fcf1"/>
  <circle cx="330" cy="130" r="5" fill="#66fcf1"/>
  <circle cx="170" cy="230" r="5" fill="#66fcf1"/>
  <!-- Title and labels -->
  <text x="30" y="35" fill="#c5c6c7" font-size="14" font-weight="bold">Состав атома</text>
  <!-- Legend -->
  <circle cx="40" cy="60" r="6" fill="#e94560" opacity="0.6"/>
  <text x="52" y="64" fill="#c5c6c7" font-size="11">Протон (p⁺) — заряд +1</text>
  <circle cx="40" cy="82" r="6" fill="#45a29e" opacity="0.5"/>
  <text x="52" y="86" fill="#c5c6c7" font-size="11">Нейтрон (n⁰) — заряд 0</text>
  <circle cx="40" cy="104" r="5" fill="#66fcf1"/>
  <text x="52" y="108" fill="#c5c6c7" font-size="11">Электрон (e⁻) — заряд −1</text>
  <!-- Key facts -->
  <text x="30" y="280" fill="#66fcf1" font-size="12" font-weight="bold">Ядро атома:</text>
  <text x="30" y="298" fill="#c5c6c7" font-size="11">• Состоит из протонов и нейтронов (нуклоны)</text>
  <text x="30" y="314" fill="#c5c6c7" font-size="11">• Заряд ядра = число протонов = порядковый номер</text>
  <text x="30" y="330" fill="#c5c6c7" font-size="11">• Масса атома сосредоточена в ядре</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Состав атома</text>
</svg>