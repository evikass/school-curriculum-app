<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="candle2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0e0"/>
      <stop offset="100%" style="stop-color:#d4d4c0"/>
    </linearGradient>
    <linearGradient id="flame2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="40%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="flameInner2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="ice2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a5f3fc"/>
      <stop offset="50%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="water2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#14b8a6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Физические и химические явления</text>

  <!-- Divider line -->
  <line x1="50" y1="65" x2="750" y2="65" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

  <!-- Center divider -->
  <line x1="400" y1="80" x2="400" y2="460" stroke="#0d9488" stroke-width="1" stroke-dasharray="8,4" opacity="0.3"/>

  <!-- ===== LEFT SIDE: CHEMICAL PHENOMENON (Burning Candle) ===== -->
  <g transform="translate(200, 100)">
    <!-- Section label background -->
    <rect x="-100" y="0" width="200" height="30" rx="5" fill="#0d9488" opacity="0.2"/>
    <text x="0" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#14b8a6" text-anchor="middle">Химическое явление</text>

    <!-- Candle holder/plate -->
    <ellipse cx="0" cy="250" rx="45" ry="10" fill="#374151" stroke="#4b5563" stroke-width="1"/>

    <!-- Candle body -->
    <rect x="-15" y="130" width="30" height="120" rx="3" fill="url(#candle2)" stroke="#d1d5db" stroke-width="1"/>
    <!-- Dripping wax -->
    <path d="M15,145 Q22,150 18,165 Q15,170 15,160 Z" fill="#e5e5d5" opacity="0.8"/>
    <path d="M-15,155 Q-22,160 -18,172 Q-15,176 -15,168 Z" fill="#e5e5d5" opacity="0.7"/>

    <!-- Wick -->
    <line x1="0" y1="130" x2="0" y2="115" stroke="#374151" stroke-width="2"/>

    <!-- Flame outer -->
    <path d="M0,70 Q-18,90 -15,110 Q-12,120 0,125 Q12,120 15,110 Q18,90 0,70 Z" fill="url(#flame2)" filter="url(#glow2)" opacity="0.9"/>
    <!-- Flame inner -->
    <path d="M0,85 Q-8,95 -7,108 Q-5,115 0,118 Q5,115 7,108 Q8,95 0,85 Z" fill="url(#flameInner2)" opacity="0.8"/>

    <!-- Smoke -->
    <path d="M0,68 Q-5,55 -2,42 Q2,30 -3,18" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.3"/>
    <path d="M3,65 Q8,50 5,38 Q2,28 6,15" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>

    <!-- Transformation arrows and labels -->
    <g transform="translate(0, 285)">
      <!-- Arrow down from candle -->
      <path d="M0,0 L0,35" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowHead2)"/>
      <!-- Product labels -->
      <text x="0" y="55" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Воск + O₂</text>
      <text x="0" y="75" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">↓</text>
      <text x="0" y="93" font-family="Arial, sans-serif" font-size="13" fill="#10b981" text-anchor="middle">CO₂ + H₂O + тепло</text>
    </g>
  </g>

  <!-- ===== RIGHT SIDE: PHYSICAL PHENOMENON (Melting Ice) ===== -->
  <g transform="translate(600, 100)">
    <!-- Section label background -->
    <rect x="-100" y="0" width="200" height="30" rx="5" fill="#0d9488" opacity="0.2"/>
    <text x="0" y="22" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#14b8a6" text-anchor="middle">Физическое явление</text>

    <!-- Ice cube (left portion) -->
    <g transform="translate(-30, 130)">
      <!-- Main ice body -->
      <path d="M-25,-25 L25,-25 L25,25 L-25,25 Z" fill="url(#ice2)" stroke="#a5f3fc" stroke-width="1.5" opacity="0.8" rx="3"/>
      <!-- Ice highlight/reflection -->
      <path d="M-20,-22 L5,-22 L5,-5 L-20,-5 Z" fill="white" opacity="0.3" rx="2"/>
      <!-- Crack lines -->
      <line x1="-10" y1="-25" x2="0" y2="5" stroke="#a5f3fc" stroke-width="0.8" opacity="0.5"/>
      <line x1="5" y1="-25" x2="15" y2="10" stroke="#a5f3fc" stroke-width="0.5" opacity="0.4"/>
    </g>

    <!-- Water puddle (right portion) -->
    <ellipse cx="40" cy="155" rx="45" ry="12" fill="url(#water2)" stroke="#0d9488" stroke-width="1" opacity="0.7"/>
    <!-- Water drops -->
    <ellipse cx="30" cy="145" rx="3" ry="4" fill="#14b8a6" opacity="0.5"/>
    <ellipse cx="50" cy="148" rx="2" ry="3" fill="#14b8a6" opacity="0.4"/>

    <!-- Dripping water from ice -->
    <path d="M-5,155 Q-5,165 -8,172" stroke="#14b8a6" stroke-width="2" fill="none" opacity="0.6"/>
    <circle cx="-8" cy="174" r="2.5" fill="#14b8a6" opacity="0.6"/>

    <!-- Transformation arrows and labels -->
    <g transform="translate(0, 285)">
      <!-- Arrow -->
      <path d="M0,0 L0,35" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowHead2)"/>
      <!-- Process labels -->
      <text x="0" y="55" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Лёд (H₂O тв.)</text>
      <text x="0" y="75" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">↓ нагревание</text>
      <text x="0" y="93" font-family="Arial, sans-serif" font-size="13" fill="#10b981" text-anchor="middle">Вода (H₂O жидк.)</text>
    </g>
  </g>

  <!-- Key difference box at bottom center -->
  <g transform="translate(400, 460)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle" opacity="0.8">Химическое = новое вещество  |  Физическое = то же вещество, другая форма</text>
  </g>

  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>