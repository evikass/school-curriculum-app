<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#162447"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Element card (like in periodic table) -->
  <rect x="50" y="40" width="140" height="170" rx="8" fill="#1e293b" stroke="#4cc9f0" stroke-width="2"/>
  <!-- Atomic number -->
  <text x="65" y="65" fill="#4cc9f0" font-size="16" font-weight="bold">11</text>
  <!-- Element symbol -->
  <text x="85" y="130" fill="#ffd166" font-size="52" font-family="serif" font-weight="bold">Na</text>
  <!-- Element name -->
  <text x="75" y="160" fill="#a8d8ea" font-size="13">Натрий</text>
  <!-- Atomic mass -->
  <text x="120" y="65" fill="#7f8c8d" font-size="12">22,99</text>
  <!-- Period/Group -->
  <text x="65" y="195" fill="#7f8c8d" font-size="10">III период, I группа</text>
  <!-- Atom structure breakdown -->
  <text x="240" y="50" fill="#e94560" font-size="14" font-weight="bold">Строение атома Na:</text>
  <!-- Nucleus -->
  <circle cx="330" cy="130" r="25" fill="#e94560" fill-opacity="0.15" stroke="#e94560" stroke-width="1.5"/>
  <text x="315" y="128" fill="#ffd166" font-size="10">p⁺ = 11</text>
  <text x="315" y="142" fill="#4cc9f0" font-size="10">n⁰ = 12</text>
  <!-- Electron shells -->
  <circle cx="330" cy="130" r="50" fill="none" stroke="#4cc9f0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <circle cx="330" cy="130" r="70" fill="none" stroke="#4cc9f0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <circle cx="330" cy="130" r="90" fill="none" stroke="#4cc9f0" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Electrons on shells -->
  <!-- Shell 1: 2 electrons -->
  <circle cx="280" cy="130" r="4" fill="#4cc9f0"/>
  <circle cx="380" cy="130" r="4" fill="#4cc9f0"/>
  <!-- Shell 2: 8 electrons -->
  <circle cx="310" cy="72" r="4" fill="#4cc9f0"/>
  <circle cx="350" cy="72" r="4" fill="#4cc9f0"/>
  <circle cx="368" cy="95" r="4" fill="#4cc9f0"/>
  <circle cx="292" cy="95" r="4" fill="#4cc9f0"/>
  <circle cx="368" cy="165" r="4" fill="#4cc9f0"/>
  <circle cx="292" cy="165" r="4" fill="#4cc9f0"/>
  <circle cx="310" cy="188" r="4" fill="#4cc9f0"/>
  <circle cx="350" cy="188" r="4" fill="#4cc9f0"/>
  <!-- Shell 3: 1 electron -->
  <circle cx="240" cy="130" r="5" fill="#ffd166"/>
  <!-- Shell labels -->
  <text x="260" y="120" fill="#4cc9f0" font-size="8">2e⁻</text>
  <text x="364" y="82" fill="#4cc9f0" font-size="8">8e⁻</text>
  <text x="218" y="130" fill="#ffd166" font-size="8">1e⁻</text>
  <!-- Electron configuration -->
  <text x="30" y="240" fill="#ffd166" font-size="13" font-weight="bold">Электронная конфигурация:</text>
  <text x="30" y="262" fill="#a8d8ea" font-size="14" font-family="serif">Na: 2, 8, 1</text>
  <!-- Key info -->
  <text x="30" y="290" fill="#7f8c8d" font-size="11">Порядковый номер = заряд ядра = число протонов = число электронов</text>
  <text x="30" y="310" fill="#7f8c8d" font-size="11">Массовое число A = p + n</text>
  <text x="30" y="328" fill="#7f8c8d" font-size="11">Число нейтронов: n = A − Z</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Характеристика элемента</text>
</svg>