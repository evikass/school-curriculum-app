<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Periodic table fragment with EN values -->
  <text x="30" y="35" fill="#e94560" font-size="14" font-weight="bold">Электроотрицательность</text>
  <!-- Mini periodic table with EN values -->
  <!-- Row 1: H(2.1), ... He -->
  <rect x="30" y="50" width="45" height="35" rx="3" fill="#1b2838" stroke="#4cc9f0" stroke-width="1"/>
  <text x="40" y="63" fill="#4cc9f0" font-size="10" font-weight="bold">H</text>
  <text x="40" y="78" fill="#ffd166" font-size="9">2,1</text>
  <!-- Row 2: Li, Be, B, C, N, O, F -->
  <rect x="30" y="90" width="45" height="35" rx="3" fill="#1b2838" stroke="#e94560" stroke-width="1"/>
  <text x="40" y="103" fill="#e94560" font-size="10" font-weight="bold">Li</text>
  <text x="40" y="118" fill="#ffd166" font-size="9">1,0</text>
  <rect x="80" y="90" width="45" height="35" rx="3" fill="#1b2838" stroke="#e94560" stroke-width="1"/>
  <text x="90" y="103" fill="#e94560" font-size="10" font-weight="bold">Be</text>
  <text x="90" y="118" fill="#ffd166" font-size="9">1,5</text>
  <rect x="180" y="90" width="45" height="35" rx="3" fill="#1b2838" stroke="#2a9d8f" stroke-width="1"/>
  <text x="192" y="103" fill="#2a9d8f" font-size="10" font-weight="bold">B</text>
  <text x="192" y="118" fill="#ffd166" font-size="9">2,0</text>
  <rect x="230" y="90" width="45" height="35" rx="3" fill="#1b2838" stroke="#2a9d8f" stroke-width="1"/>
  <text x="240" y="103" fill="#2a9d8f" font-size="10" font-weight="bold">C</text>
  <text x="240" y="118" fill="#ffd166" font-size="9">2,5</text>
  <rect x="280" y="90" width="45" height="35" rx="3" fill="#1b2838" stroke="#2a9d8f" stroke-width="1"/>
  <text x="292" y="103" fill="#2a9d8f" font-size="10" font-weight="bold">N</text>
  <text x="292" y="118" fill="#ffd166" font-size="9">3,0</text>
  <rect x="330" y="90" width="45" height="35" rx="3" fill="#1b2838" stroke="#4cc9f0" stroke-width="1"/>
  <text x="342" y="103" fill="#4cc9f0" font-size="10" font-weight="bold">O</text>
  <text x="342" y="118" fill="#ffd166" font-size="9">3,5</text>
  <rect x="380" y="90" width="45" height="35" rx="3" fill="#1b2838" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="392" y="103" fill="#4cc9f0" font-size="10" font-weight="bold">F</text>
  <text x="392" y="118" fill="#ffd166" font-size="9" font-weight="bold">4,0</text>
  <!-- Arrow showing EN increases -->
  <path d="M35,135 L415,135" stroke="#ffd166" stroke-width="1.5" fill="none"/>
  <polygon points="415,135 408,131 408,139" fill="#ffd166"/>
  <text x="180" y="150" fill="#ffd166" font-size="10">ЭО увеличивается →</text>
  <!-- Arrow down showing EN decreases -->
  <path d="M52,55 L52,125" stroke="#e94560" stroke-width="1.5" fill="none"/>
  <polygon points="52,55 48,62 56,62" fill="#e94560"/>
  <text x="15" y="95" fill="#e94560" font-size="8" transform="rotate(-90,15,95)">ЭО уменьшается ↓</text>
  <!-- Bond type diagram -->
  <text x="30" y="185" fill="#e94560" font-size="13" font-weight="bold">Разность ЭО → тип связи:</text>
  <!-- Scale -->
  <line x1="30" y1="210" x2="470" y2="210" stroke="#a8d8ea" stroke-width="2"/>
  <!-- Regions -->
  <rect x="30" y="200" width="120" height="20" rx="3" fill="#4cc9f0" fill-opacity="0.15"/>
  <text x="45" y="215" fill="#4cc9f0" font-size="10">Ковалентная неполярная</text>
  <rect x="155" y="200" width="130" height="20" rx="3" fill="#ffd166" fill-opacity="0.15"/>
  <text x="165" y="215" fill="#ffd166" font-size="10">Ковалентная полярная</text>
  <rect x="290" y="200" width="100" height="20" rx="3" fill="#e94560" fill-opacity="0.15"/>
  <text x="300" y="215" fill="#e94560" font-size="10">Ионная</text>
  <!-- Tick marks -->
  <line x1="30" y1="205" x2="30" y2="215" stroke="#a8d8ea" stroke-width="1"/>
  <text x="25" y="228" fill="#7f8c8d" font-size="9">ΔЭО=0</text>
  <line x1="155" y1="205" x2="155" y2="215" stroke="#a8d8ea" stroke-width="1"/>
  <text x="140" y="228" fill="#7f8c8d" font-size="9">~0,4</text>
  <line x1="290" y1="205" x2="290" y2="215" stroke="#a8d8ea" stroke-width="1"/>
  <text x="275" y="228" fill="#7f8c8d" font-size="9">~1,7</text>
  <line x1="470" y1="205" x2="470" y2="215" stroke="#a8d8ea" stroke-width="1"/>
  <text x="455" y="228" fill="#7f8c8d" font-size="9">~3,0</text>
  <!-- Electron pull visualization -->
  <text x="30" y="260" fill="#ffd166" font-size="12" font-weight="bold">Перетягивание электронов:</text>
  <!-- H-Cl molecule -->
  <circle cx="100" cy="290" r="15" fill="none" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="94" y="294" fill="#4cc9f0" font-size="10">H</text>
  <circle cx="170" cy="290" r="20" fill="none" stroke="#e94560" stroke-width="1.5"/>
  <text x="160" y="294" fill="#e94560" font-size="10">Cl</text>
  <!-- Shared pair shifted toward Cl -->
  <circle cx="130" cy="285" r="3" fill="#ffd166"/>
  <circle cx="137" cy="285" r="3" fill="#ffd166"/>
  <!-- Arrow showing shift -->
  <path d="M132,295 L142,295" stroke="#ffd166" stroke-width="1.5" fill="none"/>
  <text x="120" y="320" fill="#7f8c8d" font-size="9">δ+ H—Cl δ−</text>
  <!-- Most EN elements -->
  <text x="280" y="260" fill="#4cc9f0" font-size="12" font-weight="bold">Самые ЭО элементы:</text>
  <text x="280" y="280" fill="#4cc9f0" font-size="11">F (4,0) &gt; O (3,5) &gt; N (3,0) &gt; Cl (3,0)</text>
  <text x="280" y="300" fill="#e94560" font-size="12" font-weight="bold">Наименее ЭО:</text>
  <text x="280" y="318" fill="#e94560" font-size="11">Fr (0,7) &lt; Cs (0,8) &lt; Rb (0,9)</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Электроотрицательность</text>
</svg>