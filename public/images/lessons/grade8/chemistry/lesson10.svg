<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="base10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.15"/>
      <stop offset="80%" stop-color="#14b8a6" stop-opacity="0.45"/>
    </linearGradient>
    <filter id="glow10">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg10)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981" filter="url(#glow10)">Основания</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Щёлочи и нерастворимые основания</text>

  <!-- Decorative line -->
  <line x1="100" y1="76" x2="700" y2="76" stroke="#0d9488" stroke-width="1" opacity="0.5"/>

  <!-- === BEAKER WITH BASE === -->
  <g transform="translate(80, 100)">
    <!-- Beaker outline -->
    <path d="M0,0 L0,150 Q0,170 20,180 L80,180 Q100,170 100,150 L100,0" fill="url(#base10)" stroke="#14b8a6" stroke-width="2"/>
    <!-- Beaker rim -->
    <line x1="-5" y1="0" x2="105" y2="0" stroke="#14b8a6" stroke-width="2.5"/>
    <!-- Spout -->
    <path d="M0,0 Q-8,-2 -5,-8" fill="none" stroke="#14b8a6" stroke-width="2"/>
    <!-- Liquid surface -->
    <path d="M5,45 Q50,40 95,45" fill="none" stroke="#10b981" stroke-width="1" opacity="0.5"/>
    <!-- OH- label -->
    <text x="50" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981" opacity="0.6">OH⁻</text>
    <!-- Label -->
    <text x="50" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6">Основание</text>
    <text x="50" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">[OH⁻] &gt; [H⁺]</text>
  </g>

  <!-- === INDICATOR STRIPS === -->
  <g transform="translate(230, 90)">
    <text x="130" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f766e">Индикаторы в щелочной среде</text>

    <!-- Лакмус -->
    <g transform="translate(0, 28)">
      <rect x="0" y="0" width="85" height="155" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <rect x="5" y="5" width="75" height="45" rx="3" fill="#334155"/>
      <text x="42" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0">Лакмус</text>
      <!-- Color swatch - blue -->
      <rect x="12" y="60" width="60" height="55" rx="6" fill="#2563eb" opacity="0.85"/>
      <text x="42" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">Синий</text>
      <!-- Arrow -->
      <text x="42" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#3b82f6">▼</text>
      <text x="42" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">синий</text>
    </g>

    <!-- Фенолфталеин -->
    <g transform="translate(95, 28)">
      <rect x="0" y="0" width="85" height="155" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <rect x="5" y="5" width="75" height="45" rx="3" fill="#334155"/>
      <text x="42" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Фенол-</text>
      <text x="42" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">фталеин</text>
      <!-- Color swatch - crimson/magenta -->
      <rect x="12" y="60" width="60" height="55" rx="6" fill="#db2777" opacity="0.85"/>
      <text x="42" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Мали-</text>
      <text x="42" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">новый</text>
      <!-- Arrow -->
      <text x="42" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#db2777">▼</text>
      <text x="42" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">малиновый</text>
    </g>

    <!-- Метилоранж -->
    <g transform="translate(190, 28)">
      <rect x="0" y="0" width="85" height="155" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
      <rect x="5" y="5" width="75" height="45" rx="3" fill="#334155"/>
      <text x="42" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">Метил-</text>
      <text x="42" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">оранж</text>
      <!-- Color swatch - yellow -->
      <rect x="12" y="60" width="60" height="55" rx="6" fill="#eab308" opacity="0.85"/>
      <text x="42" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1e293b">Жёлтый</text>
      <!-- Arrow -->
      <text x="42" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#eab308">▼</text>
      <text x="42" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">жёлтый</text>
    </g>
  </g>

  <!-- === OH⁻ ION MODEL (highlighted) === -->
  <g transform="translate(570, 110)">
    <text x="110" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0f766e">Гидроксид-ион</text>

    <!-- O atom -->
    <circle cx="85" cy="55" r="28" fill="#ef4444" opacity="0.4" stroke="#f87171" stroke-width="2"/>
    <text x="85" y="61" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fca5a5">O</text>

    <!-- H atom (highlighted) -->
    <circle cx="125" cy="40" r="18" fill="#10b981" opacity="0.8" stroke="#34d399" stroke-width="2"/>
    <text x="125" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">H</text>

    <!-- Bond -->
    <line x1="110" y1="48" x2="113" y2="44" stroke="#94a3b8" stroke-width="3"/>

    <!-- Charge label -->
    <text x="145" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#10b981">⁻</text>

    <!-- Bracket notation -->
    <text x="40" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#14b8a6">[</text>
    <text x="155" y="60" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#14b8a6">]⁻</text>
  </g>

  <!-- === FORMULAS: NaOH and Ca(OH)2 === -->
  <g transform="translate(530, 195)">
    <!-- NaOH -->
    <rect x="0" y="0" width="220" height="55" rx="8" fill="#0d9488" opacity="0.1" stroke="#0d9488" stroke-width="1"/>
    <text x="15" y="20" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Щёлочь:</text>
    <text x="110" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981">NaOH</text>
    <text x="195" y="35" font-family="Arial, sans-serif" font-size="9" fill="#64748b">едкий</text>
    <text x="195" y="47" font-family="Arial, sans-serif" font-size="9" fill="#64748b">натр</text>

    <!-- Ca(OH)2 -->
    <rect x="0" y="65" width="220" height="55" rx="8" fill="#14b8a6" opacity="0.1" stroke="#14b8a6" stroke-width="1"/>
    <text x="15" y="85" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Щёлочь:</text>
    <text x="110" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#14b8a6">Ca(OH)₂</text>
    <text x="200" y="100" font-family="Arial, sans-serif" font-size="9" fill="#64748b">гашёная</text>
    <text x="200" y="112" font-family="Arial, sans-serif" font-size="9" fill="#64748b">известь</text>
  </g>

  <!-- === CLASSIFICATION: Щёлочи vs Нерастворимые === -->
  <g transform="translate(530, 340)">
    <!-- Щёлочи -->
    <rect x="0" y="0" width="105" height="130" rx="8" fill="#059669" opacity="0.1" stroke="#059669" stroke-width="1.5"/>
    <rect x="0" y="0" width="105" height="30" rx="8" fill="#059669" opacity="0.2"/>
    <rect x="0" y="22" width="105" height="8" fill="#059669" opacity="0.2"/>
    <text x="52" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#059669">Щёлочи</text>
    <text x="52" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#10b981">NaOH</text>
    <text x="52" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#10b981">KOH</text>
    <text x="52" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#10b981">Ca(OH)₂</text>
    <text x="52" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#10b981">Ba(OH)₂</text>
    <text x="52" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">растворимые</text>

    <!-- Нерастворимые основания -->
    <rect x="115" y="0" width="125" height="130" rx="8" fill="#0f766e" opacity="0.1" stroke="#0f766e" stroke-width="1.5"/>
    <rect x="115" y="0" width="125" height="30" rx="8" fill="#0f766e" opacity="0.2"/>
    <rect x="115" y="22" width="125" height="8" fill="#0f766e" opacity="0.2"/>
    <text x="177" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0f766e">Нерастворимые</text>
    <text x="177" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">Cu(OH)₂</text>
    <text x="177" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">Fe(OH)₃</text>
    <text x="177" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">Al(OH)₃</text>
    <text x="177" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">Zn(OH)₂</text>
    <text x="177" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#64748b">нерастворимые</text>
  </g>

  <!-- Footer -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Основания — сложные вещества, содержащие гидроксид-ионы OH⁻ и ионы металла</text>
</svg>