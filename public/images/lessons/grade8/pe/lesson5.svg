<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="court5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a76a"/>
      <stop offset="100%" stop-color="#c4965a"/>
    </linearGradient>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#3f51b5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky5)"/>
  
  <!-- Indoor court floor -->
  <rect x="20" y="140" width="460" height="180" rx="3" fill="url(#court5)"/>
  
  <!-- Court markings -->
  <rect x="40" y="150" width="420" height="160" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <line x1="250" y1="150" x2="250" y2="310" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <circle cx="250" cy="230" r="30" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <!-- Three-point arcs -->
  <path d="M40,180 A60,60 0 0,1 40,280" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <path d="M460,180 A60,60 0 0,0 460,280" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <!-- Free throw areas -->
  <rect x="40" y="195" width="45" height="70" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <rect x="415" y="195" width="45" height="70" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Basketball hoop (right) -->
  <g transform="translate(445,200)">
    <!-- Backboard -->
    <rect x="-3" y="-30" width="6" height="45" rx="1" fill="#ccc" stroke="#999" stroke-width="1"/>
    <rect x="-3" y="-20" width="6" height="25" rx="1" fill="#eee" stroke="#bbb" stroke-width="1"/>
    <!-- Hoop -->
    <ellipse cx="-18" cy="0" rx="15" ry="5" fill="none" stroke="#e65100" stroke-width="3"/>
    <!-- Net -->
    <path d="M-33,0 Q-30,12 -25,20 Q-20,12 -18,0" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.6"/>
    <path d="M-28,0 Q-26,10 -22,16 Q-18,10 -15,0" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.6"/>
    <path d="M-25,18 L-22,16 L-18,18" stroke="#fff" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Player dribbling -->
  <g transform="translate(200,200)">
    <!-- Shadow -->
    <ellipse cx="0" cy="60" rx="18" ry="5" fill="rgba(0,0,0,0.3)"/>
    <!-- Body -->
    <circle cx="0" cy="-25" r="11" fill="#ffb57c"/>
    <path d="M-11,-25 Q0,-34 11,-25" fill="#333"/>
    <!-- Jersey -->
    <path d="M-8,-14 L-12,8 L12,8 L8,-14 Z" fill="#1565c0"/>
    <text x="0" y="-1" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">23</text>
    <!-- Shorts -->
    <path d="M-12,8 L-14,22 L0,22 L0,8 Z" fill="#fff"/>
    <path d="M0,8 L0,22 L14,22 L12,8 Z" fill="#fff"/>
    <!-- Legs running -->
    <path d="M-8,22 L-15,45" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M8,22 L18,42" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Shoes -->
    <path d="M-15,45 L-20,46" stroke="#e53935" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M18,42 L23,43" stroke="#e53935" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Dribbling arm -->
    <path d="M8,-8 Q20,5 22,20" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Other arm -->
    <path d="M-8,-8 Q-20,0 -22,8" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Basketball bouncing -->
  <g transform="translate(222,265)">
    <circle r="9" fill="#e87d2f"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#8B4513" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="9" ry="3" fill="none" stroke="#8B4513" stroke-width="1"/>
    <!-- Bounce lines -->
    <path d="M-3,9 Q0,14 3,9" stroke="#e87d2f" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  <!-- Bounce shadow -->
  <ellipse cx="222" cy="278" rx="9" ry="3" fill="rgba(0,0,0,0.15)"/>
  
  <!-- Defender -->
  <g transform="translate(270,205)">
    <circle cx="0" cy="-22" r="10" fill="#c9a87c"/>
    <path d="M-10,-22 Q0,-30 10,-22" fill="#553300"/>
    <path d="M-7,-12 L-10,8 L10,8 L7,-12 Z" fill="#c62828"/>
    <path d="M-10,8 L-12,22 L0,22 L0,8 Z" fill="#333"/>
    <path d="M0,8 L0,22 L12,22 L10,8 Z" fill="#333"/>
    <!-- Defensive stance arms out -->
    <path d="M-7,-5 Q-22,2 -25,10" stroke="#c9a87c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M7,-5 Q22,2 25,10" stroke="#c9a87c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M-12,22 L-16,40" stroke="#c9a87c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M10,22 L14,38" stroke="#c9a87c" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Scoreboard -->
  <rect x="210" y="8" width="80" height="40" rx="5" fill="#1a1a1a" stroke="#444" stroke-width="2"/>
  <text x="250" y="26" text-anchor="middle" font-size="10" fill="#ff0" font-family="monospace">24 : 18</text>
  <text x="250" y="40" text-anchor="middle" font-size="7" fill="#0f0" font-family="monospace">03:42</text>
  
  <!-- Spectator silhouettes at top -->
  <g opacity="0.15">
    <circle cx="50" cy="120" r="8" fill="#fff"/>
    <circle cx="80" cy="115" r="8" fill="#fff"/>
    <circle cx="110" cy="118" r="8" fill="#fff"/>
    <circle cx="140" cy="112" r="8" fill="#fff"/>
    <circle cx="170" cy="116" r="8" fill="#fff"/>
    <circle cx="330" cy="114" r="8" fill="#fff"/>
    <circle cx="360" cy="118" r="8" fill="#fff"/>
    <circle cx="390" cy="112" r="8" fill="#fff"/>
    <circle cx="420" cy="116" r="8" fill="#fff"/>
    <circle cx="450" cy="120" r="8" fill="#fff"/>
  </g>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#ccc" font-family="Arial, sans-serif">Баскетбол: техника и тактика</text>
</svg>