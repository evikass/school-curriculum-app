<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <radialGradient id="torch12" cx="0.5" cy="0.3">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg12)"/>
  
  <!-- Olympic Rings (center) -->
  <g transform="translate(250,75)">
    <!-- Blue ring -->
    <circle cx="-55" cy="0" r="20" fill="none" stroke="#0085C7" stroke-width="4.5"/>
    <!-- Yellow ring -->
    <circle cx="-27" cy="18" r="20" fill="none" stroke="#F4C300" stroke-width="4.5"/>
    <!-- Black ring -->
    <circle cx="1" cy="0" r="20" fill="none" stroke="#000" stroke-width="4.5"/>
    <!-- Green ring -->
    <circle cx="29" cy="18" r="20" fill="none" stroke="#009F3D" stroke-width="4.5"/>
    <!-- Red ring -->
    <circle cx="57" cy="0" r="20" fill="none" stroke="#DF0024" stroke-width="4.5"/>
  </g>
  
  <!-- Olympic Torch (right) -->
  <g transform="translate(420,100)">
    <!-- Torch body -->
    <path d="M-8,40 L-5,0 L5,0 L8,40 Z" fill="#c0c0c0" stroke="#999" stroke-width="1"/>
    <path d="M-10,40 L-12,50 L12,50 L10,40 Z" fill="#d4af37" stroke="#b8860b" stroke-width="1"/>
    <!-- Torch top rim -->
    <ellipse cx="0" cy="0" rx="8" ry="3" fill="#d4af37"/>
    <!-- Flame -->
    <path d="M0,-5 Q-10,-25 -5,-45 Q0,-55 5,-40 Q8,-30 3,-20 Q0,-15 0,-5 Z" fill="url(#torch12)"/>
    <path d="M0,-8 Q-5,-22 -2,-35 Q0,-40 2,-30 Q4,-22 0,-8 Z" fill="#fff9c4" opacity="0.8"/>
    <!-- Flame glow -->
    <ellipse cx="0" cy="-25" rx="15" ry="20" fill="#ff9800" opacity="0.1"/>
  </g>
  
  <!-- Podium (bottom center) -->
  <g transform="translate(200,260)">
    <!-- 2nd place (left) -->
    <rect x="-60" y="-30" width="50" height="50" rx="3" fill="#bdbdbd"/>
    <rect x="-60" y="-35" width="50" height="8" rx="2" fill="#9e9e9e"/>
    <text x="-35" y="-5" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold" font-family="Arial">2</text>
    
    <!-- 1st place (center, tallest) -->
    <rect x="-5" y="-55" width="50" height="75" rx="3" fill="#ffd54f"/>
    <rect x="-5" y="-60" width="50" height="8" rx="2" fill="#ffb300"/>
    <text x="20" y="-18" text-anchor="middle" font-size="20" fill="#fff" font-weight="bold" font-family="Arial">1</text>
    
    <!-- 3rd place (right) -->
    <rect x="50" y="-15" width="50" height="35" rx="3" fill="#a1887f"/>
    <rect x="50" y="-20" width="50" height="8" rx="2" fill="#8d6e63"/>
    <text x="75" y="5" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold" font-family="Arial">3</text>
    
    <!-- Gold medal on 1st place figure -->
    <circle cx="20" cy="-75" r="12" fill="#ffd54f" stroke="#ffb300" stroke-width="2"/>
    <path d="M16,-79 L18,-83 L22,-83 L20,-80 L22,-77 L18,-77 Z" fill="#ff6f00"/>
    <!-- Ribbon -->
    <path d="M10,-87 L5,-100 L15,-95" fill="#1e88e5" stroke="#1565c0" stroke-width="0.5"/>
    <path d="M30,-87 L35,-100 L25,-95" fill="#c62828" stroke="#b71c1c" stroke-width="0.5"/>
  </g>
  
  <!-- Ancient Greek figure (left) -->
  <g transform="translate(70,160)">
    <!-- Column -->
    <rect x="-8" y="20" width="16" height="60" fill="#d7ccc8" stroke="#bcaaa4" stroke-width="1"/>
    <rect x="-12" y="18" width="24" height="6" fill="#d7ccc8" stroke="#bcaaa4" stroke-width="1"/>
    <rect x="-12" y="78" width="24" height="6" fill="#d7ccc8" stroke="#bcaaa4" stroke-width="1"/>
    <!-- Fluting -->
    <line x1="-3" y1="24" x2="-3" y2="78" stroke="#bcaaa4" stroke-width="0.8"/>
    <line x1="3" y1="24" x2="3" y2="78" stroke="#bcaaa4" stroke-width="0.8"/>
    
    <!-- Greek athlete (discus thrower inspired) -->
    <circle cx="0" cy="-20" r="10" fill="#d7ccc8"/>
    <!-- Laurel wreath -->
    <path d="M-10,-22 Q-12,-28 -6,-30 Q0,-32 6,-30 Q12,-28 10,-22" fill="none" stroke="#4caf50" stroke-width="2"/>
    <circle cx="-8" cy="-28" r="2" fill="#66bb6a"/>
    <circle cx="-3" cy="-30" r="2" fill="#81c784"/>
    <circle cx="3" cy="-30" r="2" fill="#81c784"/>
    <circle cx="8" cy="-28" r="2" fill="#66bb6a"/>
    <!-- Body -->
    <path d="M0,-10 L-3,15" stroke="#d7ccc8" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Arms with discus -->
    <path d="M-2,-5 Q-20,-15 -25,-5" stroke="#d7ccc8" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M-2,-3 Q10,5 18,0" stroke="#d7ccc8" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Discus -->
    <ellipse cx="-27" cy="-5" rx="8" ry="3" fill="#a1887f"/>
    <!-- Legs -->
    <path d="M-3,15 L-12,35" stroke="#d7ccc8" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M-3,15 L8,33" stroke="#d7ccc8" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Chiton (toga) -->
    <path d="M-5,-5 Q-10,5 -8,15 L5,15 Q3,5 5,-5 Z" fill="#e0e0e0" opacity="0.5"/>
  </g>
  
  <!-- Olive branch -->
  <g transform="translate(440,50)" opacity="0.4">
    <path d="M0,0 Q-10,10 -5,25" stroke="#4caf50" stroke-width="2" fill="none"/>
    <ellipse cx="-8" cy="8" rx="4" ry="2" fill="#66bb6a" transform="rotate(-30,-8,8)"/>
    <ellipse cx="-10" cy="15" rx="4" ry="2" fill="#81c784" transform="rotate(-20,-10,15)"/>
    <ellipse cx="-7" cy="22" rx="4" ry="2" fill="#66bb6a" transform="rotate(-10,-7,22)"/>
  </g>
  
  <!-- Citius Altius Fortius text -->
  <text x="250" y="155" text-anchor="middle" font-size="7" fill="#c62828" opacity="0.5" font-style="italic" font-family="serif">Citius • Altius • Fortius</text>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Олимпийское движение</text>
</svg>