<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="plate10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg10)"/>
  
  <!-- Balanced plate (center-top) -->
  <g transform="translate(250,90)">
    <!-- Plate -->
    <ellipse cx="0" cy="0" rx="65" ry="25" fill="url(#plate10)" stroke="#bbb" stroke-width="2"/>
    <ellipse cx="0" cy="-2" rx="55" ry="20" fill="none" stroke="#ddd" stroke-width="1"/>
    <!-- Food sections -->
    <!-- Vegetables (green - half) -->
    <path d="M-50,-5 A50,18 0 0,1 0,-18 L0,0 A50,18 0 0,0 -50,-5 Z" fill="#66bb6a" opacity="0.8"/>
    <ellipse cx="-25" cy="-10" rx="8" ry="4" fill="#43a047"/>
    <ellipse cx="-10" cy="-14" rx="6" ry="3" fill="#81c784"/>
    <!-- Proteins (red - quarter) -->
    <path d="M0,-18 A50,18 0 0,1 40,-5 L0,0 Z" fill="#ef5350" opacity="0.7"/>
    <rect x="10" y="-14" width="15" height="6" rx="2" fill="#c62828"/>
    <!-- Grains (amber - quarter) -->
    <path d="M40,-5 A50,18 0 0,1 -50,-5 L0,0 Z" fill="#ffb74d" opacity="0.7"/>
    <circle cx="-20" cy="8" r="3" fill="#f57c00"/>
    <circle cx="-8" cy="10" r="2.5" fill="#fb8c00"/>
    <circle cx="5" cy="9" r="3" fill="#f57c00"/>
    <circle cx="18" cy="8" r="2.5" fill="#fb8c00"/>
    <text x="0" y="40" text-anchor="middle" font-size="8" fill="#555" font-family="Arial">Сбалансированное питание</text>
  </g>
  
  <!-- Exercise (left) -->
  <g transform="translate(90,200)">
    <!-- Running figure -->
    <circle cx="0" cy="-25" r="10" fill="#ffb57c"/>
    <path d="M-10,-25 Q0,-34 10,-25" fill="#333"/>
    <!-- Body -->
    <path d="M0,-15 L-5,8" stroke="#4caf50" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Legs running -->
    <path d="M-5,8 L-18,25" stroke="#ffb57c" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <path d="M-5,8 L8,28" stroke="#ffb57c" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <!-- Shoes -->
    <path d="M-18,25 L-22,27" stroke="#e53935" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M8,28 L12,30" stroke="#e53935" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Arms -->
    <path d="M-2,-8 Q-18,-2 -20,8" stroke="#ffb57c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M-2,-8 Q12,-15 18,-5" stroke="#ffb57c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Heart beating -->
    <path d="M-30,-15 Q-25,-25 -18,-15 Q-11,-5 -5,-15" fill="#e53935" opacity="0.6"/>
    <text x="0" y="50" text-anchor="middle" font-size="8" fill="#4caf50" font-family="Arial">Физическая активность</text>
  </g>
  
  <!-- Sleep (center-bottom) -->
  <g transform="translate(250,230)">
    <!-- Moon -->
    <path d="M-15,-25 A20,20 0 1,0 15,-25 A15,15 0 0,1 -15,-25 Z" fill="#fdd835"/>
    <!-- Stars -->
    <polygon points="25,-30 27,-25 32,-25 28,-22 30,-17 25,-20 20,-17 22,-22 18,-25 23,-25" fill="#fdd835" opacity="0.8"/>
    <polygon points="35,-15 36,-12 39,-12 37,-10 38,-7 35,-9 32,-7 33,-10 31,-12 34,-12" fill="#fdd835" opacity="0.6"/>
    <!-- Bed -->
    <rect x="-40" y="-5" width="80" height="35" rx="5" fill="#8d6e63"/>
    <rect x="-38" y="-3" width="76" height="28" rx="3" fill="#a1887f"/>
    <!-- Pillow -->
    <rect x="-35" y="-8" width="22" height="12" rx="5" fill="#fff"/>
    <!-- Blanket -->
    <rect x="-10" y="-5" width="45" height="30" rx="4" fill="#42a5f5" opacity="0.7"/>
    <!-- Person sleeping -->
    <circle cx="-24" cy="-8" r="7" fill="#ffb57c"/>
    <path d="M-31,-8 Q-24,-14 -17,-8" fill="#333"/>
    <!-- Zzz -->
    <text x="-5" y="-18" font-size="10" fill="#1565c0" opacity="0.7" font-family="Arial">z</text>
    <text x="5" y="-25" font-size="12" fill="#1565c0" opacity="0.5" font-family="Arial">z</text>
    <text x="15" y="-33" font-size="14" fill="#1565c0" opacity="0.3" font-family="Arial">z</text>
    <text x="0" y="50" text-anchor="middle" font-size="8" fill="#1565c0" font-family="Arial">Здоровый сон</text>
  </g>
  
  <!-- No smoking (right) -->
  <g transform="translate(410,200)">
    <!-- Cigarette with red prohibition circle -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#e53935" stroke-width="4"/>
    <line x1="-25" y1="25" x2="25" y2="-25" stroke="#e53935" stroke-width="4"/>
    <!-- Cigarette -->
    <rect x="-22" y="-4" width="30" height="8" rx="1" fill="#fff" stroke="#ccc" stroke-width="0.5"/>
    <rect x="8" y="-4" width="8" height="8" rx="1" fill="#ff8a65"/>
    <!-- Smoke crossed out -->
    <path d="M-5,-8 Q-8,-15 -2,-20" stroke="#999" stroke-width="1.5" fill="none"/>
    <path d="M0,-8 Q3,-18 -2,-25" stroke="#999" stroke-width="1.5" fill="none"/>
    <text x="0" y="50" text-anchor="middle" font-size="8" fill="#e53935" font-family="Arial">Без вредных привычек</text>
  </g>
  
  <!-- Decorative connecting elements -->
  <path d="M155,120 Q175,140 200,130" stroke="#66bb6a" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M340,120 Q360,140 385,150" stroke="#66bb6a" stroke-width="1" fill="none" opacity="0.4"/>
  
  <!-- Leaf decorations -->
  <g opacity="0.3">
    <path d="M20,20 Q30,5 45,15 Q35,25 20,20 Z" fill="#4caf50"/>
    <path d="M460,15 Q470,5 480,18 Q468,25 460,15 Z" fill="#4caf50"/>
  </g>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Здоровый образ жизни</text>
</svg>