  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физическая культура - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#E65100" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="5" fill="#E65100" opacity="0.18" rx="1"/>
  <rect x="410" y="75" width="60" height="5" fill="#1565C0" opacity="0.12" rx="1"/>
  <!-- ILLUSTRATION AREA: x=15..485, y=85..300 -->
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
  <rect x="15" y="85" width="470" height="215" fill="#E3F2FD"/><g transform="translate(150,190) scale(1.0)">
      <rect x="-30" y="-12" width="10" height="24" rx="2" fill="#455A64"/>
      <rect x="20" y="-12" width="10" height="24" rx="2" fill="#455A64"/>
      <rect x="-28" y="-8" width="6" height="16" rx="1" fill="#607D8B"/>
      <rect x="22" y="-8" width="6" height="16" rx="1" fill="#607D8B"/>
      <rect x="-20" y="-3" width="40" height="6" rx="2" fill="#78909C"/>
    </g><g transform="translate(280,185) scale(0.8)">
      <circle cx="0" cy="0" r="18" fill="white" stroke="#333" stroke-width="1.5"/>
      <polygon points="0,-10 -8,-4 -5,6 5,6 8,-4" fill="#333"/>
      <polygon points="-12,-8 -8,-4" fill="none" stroke="#333" stroke-width="0.8"/>
      <polygon points="12,-8 8,-4" fill="none" stroke="#333" stroke-width="0.8"/>
      <polygon points="-10,10 -5,6" fill="none" stroke="#333" stroke-width="0.8"/>
      <polygon points="10,10 5,6" fill="none" stroke="#333" stroke-width="0.8"/>
    </g><circle cx="370" cy="190" r="12" fill="white" stroke="#333" stroke-width="1.5"/><line x1="370" y1="178" x2="370" y2="168" stroke="#333" stroke-width="1.5"/><rect x="360" y="165" width="20" height="4" rx="2" fill="#999"/><text x="250" y="270" font-family="Arial,sans-serif" font-size="12" fill="#333" text-anchor="middle" font-weight="bold">Спортивный инвентарь</text>
  </g>
  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физическая культура</text>
