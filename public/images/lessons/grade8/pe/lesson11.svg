<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg11)"/>
  
  <!-- Warm-up stretch (left area) -->
  <g transform="translate(110,120)">
    <!-- Stretching figure -->
    <circle cx="0" cy="-40" r="11" fill="#ffb57c"/>
    <path d="M-11,-40 Q0,-48 11,-40" fill="#333"/>
    <!-- Body stretching sideways -->
    <path d="M0,-29 L5,-5" stroke="#1e88e5" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Legs apart -->
    <path d="M5,-5 L-18,25" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M5,-5 L28,25" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Arms stretching up and to side -->
    <path d="M-2,-20 Q-20,-35 -15,-50" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M3,-20 Q18,-30 25,-20" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Stretch arrows -->
    <path d="M-25,-48 L-35,-55" stroke="#f57c00" stroke-width="1.5" fill="none" marker-end="url(#arr11)"/>
    <path d="M30,-18 L40,-15" stroke="#f57c00" stroke-width="1.5" fill="none" marker-end="url(#arr11)"/>
    <defs>
      <marker id="arr11" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
        <polygon points="0,0 6,2 0,4" fill="#f57c00"/>
      </marker>
    </defs>
    <!-- Warm-up label -->
    <text x="0" y="42" text-anchor="middle" font-size="8" fill="#e65100" font-family="Arial">Разминка</text>
  </g>
  
  <!-- Equipment (center) -->
  <g transform="translate(250,140)">
    <!-- Mat -->
    <rect x="-50" y="10" width="100" height="15" rx="4" fill="#42a5f5" opacity="0.8"/>
    <rect x="-50" y="8" width="100" height="4" rx="2" fill="#64b5f6"/>
    <!-- Knee pad -->
    <ellipse cx="-30" cy="0" rx="10" ry="8" fill="#ff7043" opacity="0.8"/>
    <ellipse cx="-30" cy="-2" rx="8" ry="5" fill="#ff8a65"/>
    <!-- Helmet -->
    <path d="M15,-15 A15,15 0 0,1 45,-15 L42,-8 A12,12 0 0,0 18,-8 Z" fill="#f44336"/>
    <rect x="17" y="-12" width="26" height="4" rx="2" fill="#e53935"/>
    <!-- Wrist guard -->
    <rect x="-10" y="0" width="18" height="8" rx="3" fill="#78909c"/>
    <line x1="-6" y1="1" x2="-6" y2="7" stroke="#546e7a" stroke-width="1"/>
    <line x1="-2" y1="1" x2="-2" y2="7" stroke="#546e7a" stroke-width="1"/>
    <line x1="2" y1="1" x2="2" y2="7" stroke="#546e7a" stroke-width="1"/>
    <!-- Shin guard -->
    <path d="M50,-5 L55,15 L45,15 Z" fill="#ffeb3b" stroke="#f9a825" stroke-width="1"/>
    <text x="0" y="40" text-anchor="middle" font-size="8" fill="#1565c0" font-family="Arial">Экипировка</text>
  </g>
  
  <!-- First aid kit (right) -->
  <g transform="translate(400,130)">
    <!-- Kit box -->
    <rect x="-40" y="-20" width="80" height="50" rx="5" fill="#f44336"/>
    <rect x="-38" y="-18" width="76" height="46" rx="4" fill="#ef5350"/>
    <!-- White cross -->
    <rect x="-6" y="-10" width="12" height="30" rx="2" fill="white"/>
    <rect x="-15" y="0" width="30" height="10" rx="2" fill="white"/>
    <!-- Handle -->
    <path d="M-15,-20 Q-15,-35 0,-35 Q15,-35 15,-20" fill="none" stroke="#c62828" stroke-width="3"/>
    <!-- Clasp -->
    <rect x="-5" y="26" width="10" height="4" rx="1" fill="#c62828"/>
    
    <!-- Medical items around -->
    <!-- Bandage roll -->
    <g transform="translate(-55,20)">
      <ellipse cx="0" cy="0" rx="8" ry="5" fill="#f5f5f5" stroke="#ccc" stroke-width="1"/>
      <circle cx="0" cy="0" r="2.5" fill="#e0e0e0"/>
    </g>
    <!-- Ice pack -->
    <g transform="translate(55,15)">
      <rect x="-8" y="-6" width="16" height="12" rx="2" fill="#b3e5fc"/>
      <text x="0" y="3" text-anchor="middle" font-size="5" fill="#0277bd" font-family="Arial">❄</text>
    </g>
    <!-- Antiseptic -->
    <g transform="translate(55,-15)">
      <rect x="-5" y="-8" width="10" height="16" rx="2" fill="#ff8a65"/>
      <rect x="-4" y="-8" width="8" height="5" rx="1" fill="#a1887f"/>
    </g>
    <text x="0" y="45" text-anchor="middle" font-size="8" fill="#c62828" font-family="Arial">Аптечка</text>
  </g>
  
  <!-- Warning triangle -->
  <g transform="translate(250,270)">
    <polygon points="0,-25 -22,15 22,15" fill="#ff9800" stroke="#e65100" stroke-width="2"/>
    <text x="0" y="12" text-anchor="middle" font-size="18" fill="#fff" font-weight="bold" font-family="Arial">!</text>
    <text x="0" y="30" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold" font-family="Arial">Осторожно</text>
  </g>
  
  <!-- Bandage on ankle illustration -->
  <g transform="translate(90,250)">
    <!-- Foot shape -->
    <path d="M-15,5 L-15,-5 Q-15,-15 -5,-15 L15,-15 Q25,-15 25,-5 L25,5" fill="#ffb57c" stroke="#e8a060" stroke-width="1"/>
    <!-- Bandage wrapping -->
    <path d="M-18,0 L-12,-5 L-5,0 L2,-5 L9,0 L16,-5 L22,0 L28,-5" stroke="white" stroke-width="6" fill="none" opacity="0.8"/>
    <path d="M-18,0 L-12,-5 L-5,0 L2,-5 L9,0 L16,-5 L22,0 L28,-5" stroke="#e0e0e0" stroke-width="1" fill="none"/>
    <text x="5" y="20" text-anchor="middle" font-size="7" fill="#666" font-family="Arial">Перевязка</text>
  </g>
  
  <!-- Ice pack on knee -->
  <g transform="translate(410,260)">
    <!-- Knee shape -->
    <ellipse cx="0" cy="0" rx="15" ry="12" fill="#ffb57c"/>
    <!-- Ice pack -->
    <rect x="-12" y="-8" width="24" height="16" rx="4" fill="#b3e5fc" opacity="0.8" stroke="#4fc3f7" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" font-size="6" fill="#0277bd" font-family="Arial">ЛЁД</text>
    <text x="0" y="22" text-anchor="middle" font-size="7" fill="#0277bd" font-family="Arial">Охлаждение</text>
  </g>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Профилактика травм</text>
</svg>