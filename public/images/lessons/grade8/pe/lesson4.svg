<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="field4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky4)"/>
  
  <!-- Field -->
  <rect x="0" y="160" width="500" height="190" fill="url(#field4)"/>
  
  <!-- Football field markings -->
  <rect x="30" y="170" width="440" height="160" rx="3" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="250" y1="170" x2="250" y2="330" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <circle cx="250" cy="250" r="35" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <circle cx="250" cy="250" r="3" fill="rgba(255,255,255,0.6)"/>
  <!-- Penalty areas -->
  <rect x="30" y="210" width="60" height="80" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <rect x="30" y="225" width="25" height="50" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <rect x="410" y="210" width="60" height="80" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <rect x="445" y="225" width="25" height="50" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <!-- Penalty spots -->
  <circle cx="72" cy="250" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="428" cy="250" r="2" fill="rgba(255,255,255,0.6)"/>
  
  <!-- Goal (left) -->
  <rect x="28" y="228" width="8" height="44" fill="none" stroke="#fff" stroke-width="3"/>
  <line x1="36" y1="228" x2="36" y2="272" stroke="#fff" stroke-width="2"/>
  <!-- Net -->
  <g opacity="0.3">
    <line x1="28" y1="233" x2="36" y2="233" stroke="#fff" stroke-width="0.5"/>
    <line x1="28" y1="238" x2="36" y2="238" stroke="#fff" stroke-width="0.5"/>
    <line x1="28" y1="243" x2="36" y2="243" stroke="#fff" stroke-width="0.5"/>
    <line x1="28" y1="248" x2="36" y2="248" stroke="#fff" stroke-width="0.5"/>
    <line x1="28" y1="253" x2="36" y2="253" stroke="#fff" stroke-width="0.5"/>
    <line x1="28" y1="258" x2="36" y2="258" stroke="#fff" stroke-width="0.5"/>
    <line x1="28" y1="263" x2="36" y2="263" stroke="#fff" stroke-width="0.5"/>
    <line x1="31" y1="228" x2="31" y2="272" stroke="#fff" stroke-width="0.5"/>
    <line x1="33" y1="228" x2="33" y2="272" stroke="#fff" stroke-width="0.5"/>
  </g>
  
  <!-- Player kicking ball (center-left) -->
  <g transform="translate(180,235)">
    <!-- Shadow -->
    <ellipse cx="0" cy="45" rx="15" ry="4" fill="rgba(0,0,0,0.2)"/>
    <!-- Body -->
    <circle cx="5" cy="-30" r="10" fill="#ffb57c"/>
    <path d="M-5,-30 Q5,-38 15,-30" fill="#333"/>
    <!-- Jersey -->
    <path d="M-2,-20 L-8,0 L18,0 L12,-20 Z" fill="#e53935"/>
    <text x="5" y="-8" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold">10</text>
    <!-- Shorts -->
    <path d="M-8,0 L-10,12 L5,12 L5,0 Z" fill="#fff"/>
    <path d="M5,0 L5,12 L20,12 L18,0 Z" fill="#fff"/>
    <!-- Kicking leg -->
    <path d="M5,12 L-15,30" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M-15,30 L-20,28" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Standing leg -->
    <path d="M14,12 L18,32" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M18,32 L22,34" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Arms -->
    <path d="M-2,-15 Q-20,-8 -22,0" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M12,-15 Q25,-5 28,5" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Football -->
  <g transform="translate(155,268)">
    <circle r="10" fill="#444"/>
    <polygon points="0,-5 5,-2 3,4 -3,4 -5,-2" fill="#333" stroke="#555" stroke-width="0.3"/>
    <!-- Motion -->
    <path d="M-18,-3 Q-14,-8 -10,-3" stroke="#fff" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M-20,2 Q-16,-3 -12,2" stroke="#fff" stroke-width="1" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Goalkeeper diving (right goal area) -->
  <g transform="translate(400,240)">
    <circle cx="15" cy="-25" r="8" fill="#ffb57c"/>
    <path d="M7,-25 Q15,-32 23,-25" fill="#f9a825"/>
    <!-- Body horizontal/dive -->
    <path d="M15,-17 L0,-5" stroke="#f9a825" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Arms stretched -->
    <path d="M5,-12 Q-10,-20 -18,-18" stroke="#ffb57c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M5,-8 Q-5,0 -8,8" stroke="#ffb57c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M0,-5 L-5,10" stroke="#ffb57c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0,-5 L8,8" stroke="#ffb57c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Gloves -->
    <rect x="-22" y="-22" width="8" height="6" rx="2" fill="#f9a825"/>
  </g>
  
  <!-- Ball trajectory arc -->
  <path d="M155,265 Q200,220 250,230 Q300,240 390,220" stroke="#ff0" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.5"/>
  
  <!-- Teammates in formation -->
  <g opacity="0.5">
    <circle cx="120" cy="280" r="4" fill="#e53935"/>
    <circle cx="160" cy="290" r="4" fill="#e53935"/>
    <circle cx="220" cy="275" r="4" fill="#e53935"/>
    <circle cx="280" cy="285" r="4" fill="#e53935"/>
    <circle cx="330" cy="270" r="4" fill="#e53935"/>
    <circle cx="350" cy="290" r="4" fill="#e53935"/>
    <!-- Opposing team -->
    <circle cx="140" cy="260" r="4" fill="#1565c0"/>
    <circle cx="200" cy="250" r="4" fill="#1565c0"/>
    <circle cx="260" cy="255" r="4" fill="#1565c0"/>
    <circle cx="310" cy="250" r="4" fill="#1565c0"/>
    <circle cx="370" cy="260" r="4" fill="#1565c0"/>
  </g>
  
  <!-- Corner flag -->
  <line x1="30" y1="170" x2="30" y2="155" stroke="#ff0" stroke-width="2"/>
  <polygon points="30,155 45,158 30,161" fill="#ff0"/>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#fff" font-family="Arial, sans-serif">Футбол: техника и тактика</text>
</svg>