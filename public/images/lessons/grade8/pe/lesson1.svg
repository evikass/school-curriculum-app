<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#c3d7f9"/>
    </linearGradient>
    <linearGradient id="beam1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#C49A2B"/>
    </linearGradient>
    <linearGradient id="mat1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2c5f9e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)"/>
  <!-- Floor -->
  <rect x="0" y="290" width="500" height="60" fill="#d4c4a8" rx="2"/>
  <line x1="0" y1="290" x2="500" y2="290" stroke="#b8a88c" stroke-width="1"/>
  
  <!-- Gymnast on balance beam (left) -->
  <rect x="30" y="230" width="120" height="8" rx="2" fill="url(#beam1)"/>
  <!-- Beam legs -->
  <rect x="40" y="238" width="8" height="52" fill="#777"/>
  <rect x="132" y="238" width="8" height="52" fill="#777"/>
  <!-- Gymnast body -->
  <circle cx="90" cy="175" r="12" fill="#ffb57c"/>
  <path d="M78 175 Q90 165 102 175" fill="#333"/>
  <!-- Hair bun -->
  <circle cx="90" cy="167" r="6" fill="#4a2800"/>
  <!-- Leotard -->
  <path d="M82 187 L78 220 L102 220 L98 187 Z" fill="#e04080" stroke="#c03060" stroke-width="1"/>
  <!-- Arms raised -->
  <path d="M82 190 Q65 170 60 155" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M98 190 Q115 170 120 155" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Leg on beam -->
  <path d="M85 220 L82 230" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M95 220 L100 230" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
  
  <!-- Vault (center) -->
  <rect x="200" y="245" width="90" height="45" rx="8" fill="#5cb85c" stroke="#3d8b3d" stroke-width="2"/>
  <rect x="195" y="240" width="100" height="12" rx="6" fill="#6ecf6e"/>
  <!-- Vault legs -->
  <rect x="210" y="290" width="8" height="10" fill="#555"/>
  <rect x="272" y="290" width="8" height="10" fill="#555"/>
  <!-- Gymnast vaulting -->
  <circle cx="245" cy="170" r="11" fill="#ffb57c"/>
  <path d="M234 170 Q245 160 256 170" fill="#553300"/>
  <!-- Body arched over vault -->
  <path d="M245 181 Q260 210 270 230" stroke="#2070d0" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M245 181 Q230 210 220 225" stroke="#2070d0" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Arms reaching -->
  <path d="M242 190 Q225 175 215 168" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M250 190 Q265 180 275 175" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Motion lines -->
  <path d="M200 195 Q210 185 220 190" stroke="#999" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M195 210 Q205 200 215 205" stroke="#999" stroke-width="1" fill="none" opacity="0.5"/>
  
  <!-- Floor exercise (right) -->
  <rect x="340" y="270" width="140" height="20" rx="3" fill="url(#mat1)" opacity="0.8"/>
  <rect x="340" y="268" width="140" height="4" rx="2" fill="#5aa0e9"/>
  <!-- Gymnast doing split leap -->
  <circle cx="410" cy="175" r="11" fill="#ffb57c"/>
  <path d="M399 175 Q410 165 421 175" fill="#992200"/>
  <!-- Body -->
  <path d="M410 186 L408 215" stroke="#d040d0" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Split legs -->
  <path d="M408 215 L370 245" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M408 215 L445 245" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Arms out -->
  <path d="M410 195 Q380 188 365 195" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M410 195 Q440 188 455 195" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Motion arc -->
  <path d="M350 260 Q380 240 410 250 Q440 260 470 240" stroke="#e04080" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.6"/>
  
  <!-- Ribbon decoration -->
  <path d="M370 160 Q390 140 410 155 Q430 170 450 150 Q470 130 490 145" stroke="#ff6090" stroke-width="2" fill="none" opacity="0.7"/>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Гимнастика: виды и значение</text>
</svg>