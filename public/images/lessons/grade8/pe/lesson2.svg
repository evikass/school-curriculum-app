<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#e0f0ff"/>
    </linearGradient>
    <linearGradient id="track2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#922b21"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky2)"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="50" rx="40" ry="18" fill="white" opacity="0.7"/>
  <ellipse cx="110" cy="45" rx="35" ry="15" fill="white" opacity="0.7"/>
  <ellipse cx="350" cy="65" rx="30" ry="14" fill="white" opacity="0.6"/>
  
  <!-- Ground/field -->
  <rect x="0" y="220" width="500" height="130" fill="#7cb342"/>
  
  <!-- Running track - perspective -->
  <path d="M0 230 L500 230 L500 300 L0 300 Z" fill="#c0392b"/>
  <!-- Lane lines -->
  <line x1="0" y1="244" x2="500" y2="244" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="258" x2="500" y2="258" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="272" x2="500" y2="272" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="286" x2="500" y2="286" stroke="white" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Sprinter -->
  <circle cx="180" cy="200" r="12" fill="#ffb57c"/>
  <path d="M168 200 Q180 190 192 200" fill="#333"/>
  <!-- Body leaning forward -->
  <path d="M180 212 L170 240" stroke="#2070d0" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Back leg extended -->
  <path d="M170 240 L140 260" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M140 260 L130 258" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Front leg -->
  <path d="M170 240 L195 252" stroke="#ffb57c" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M195 252 L200 248" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Arms pumping -->
  <path d="M175 218 Q160 225 150 218" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M175 218 Q190 230 200 225" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Speed lines -->
  <line x1="145" y1="210" x2="120" y2="210" stroke="#999" stroke-width="1.5" opacity="0.5"/>
  <line x1="148" y1="220" x2="125" y2="220" stroke="#999" stroke-width="1.5" opacity="0.5"/>
  <line x1="150" y1="230" x2="130" y2="230" stroke="#999" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Hurdles -->
  <rect x="290" y="235" width="4" height="35" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <rect x="310" y="235" width="4" height="35" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <rect x="288" y="235" width="28" height="4" rx="1" fill="#f39c12"/>
  
  <rect x="370" y="249" width="4" height="35" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <rect x="390" y="249" width="4" height="35" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <rect x="368" y="249" width="28" height="4" rx="1" fill="#f39c12"/>
  
  <rect x="440" y="263" width="4" height="35" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <rect x="460" y="263" width="4" height="35" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <rect x="438" y="263" width="28" height="4" rx="1" fill="#f39c12"/>
  
  <!-- Javelin (top right area) -->
  <line x1="340" y1="100" x2="480" y2="160" stroke="#8B6914" stroke-width="3"/>
  <polygon points="480,160 495,167 482,163" fill="#ccc"/>
  <!-- Javelin thrower silhouette -->
  <circle cx="320" cy="120" r="10" fill="#444"/>
  <path d="M320 130 L315 160" stroke="#444" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M315 160 L310 190" stroke="#444" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M315 160 L325 188" stroke="#444" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M318 138 Q335 130 345 128" stroke="#444" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M318 142 Q305 155 300 165" stroke="#444" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Starting blocks -->
  <rect x="60" y="265" width="20" height="6" rx="2" fill="#555" transform="rotate(-20,70,268)"/>
  <rect x="85" y="268" width="20" height="6" rx="2" fill="#555" transform="rotate(10,95,271)"/>
  
  <!-- Finish line flag -->
  <rect x="470" y="210" width="3" height="50" fill="#888"/>
  <rect x="473" y="210" width="25" height="18" fill="#eee" stroke="#333" stroke-width="1"/>
  <line x1="473" y1="219" x2="498" y2="219" stroke="#333" stroke-width="1"/>
  <line x1="485" y1="210" x2="485" y2="228" stroke="#333" stroke-width="1"/>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Лёгкая атлетика</text>
</svg>