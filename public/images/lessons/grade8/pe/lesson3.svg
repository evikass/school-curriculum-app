<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
    <radialGradient id="ball3" cx="0.35" cy="0.35">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ddd"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg3)"/>
  
  <!-- Football -->
  <g transform="translate(70,80)">
    <circle cx="0" cy="0" r="35" fill="#444"/>
    <!-- Pentagon pattern -->
    <polygon points="0,-15 14,-5 9,12 -9,12 -14,-5" fill="#222" stroke="#555" stroke-width="0.5"/>
    <polygon points="0,-30 8,-25 14,-15 5,-12 -5,-12 -14,-15 -8,-25" fill="#333" stroke="#555" stroke-width="0.5" transform="translate(0,-2)"/>
    <!-- Shine -->
    <ellipse cx="-10" cy="-12" rx="8" ry="5" fill="white" opacity="0.15" transform="rotate(-30)"/>
    <text x="0" y="55" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Футбол</text>
  </g>
  
  <!-- Basketball -->
  <g transform="translate(190,80)">
    <circle cx="0" cy="0" r="35" fill="#e87d2f"/>
    <!-- Lines -->
    <ellipse cx="0" cy="0" rx="35" ry="12" fill="none" stroke="#8B4513" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="12" ry="35" fill="none" stroke="#8B4513" stroke-width="1.5"/>
    <line x1="-35" y1="0" x2="35" y2="0" stroke="#8B4513" stroke-width="1.5"/>
    <!-- Shine -->
    <ellipse cx="-10" cy="-12" rx="8" ry="5" fill="white" opacity="0.2" transform="rotate(-30)"/>
    <text x="0" y="55" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Баскетбол</text>
  </g>
  
  <!-- Volleyball -->
  <g transform="translate(310,80)">
    <circle cx="0" cy="0" r="35" fill="#f5f0e0" stroke="#ccc" stroke-width="1"/>
    <!-- Volleyball seam lines -->
    <path d="M-20,-28 Q5,-15 -10,5 Q-25,25 -5,33" fill="none" stroke="#3498db" stroke-width="2"/>
    <path d="M20,-28 Q-5,-15 10,5 Q25,25 5,33" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <path d="M-35,-2 Q-10,10 -15,30" fill="none" stroke="#f1c40f" stroke-width="2"/>
    <!-- Shine -->
    <ellipse cx="-10" cy="-12" rx="8" ry="5" fill="white" opacity="0.3" transform="rotate(-30)"/>
    <text x="0" y="55" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Волейбол</text>
  </g>
  
  <!-- Tennis ball -->
  <g transform="translate(430,80)">
    <circle cx="0" cy="0" r="28" fill="#c8e620"/>
    <!-- Seam -->
    <path d="M-22,-15 Q-5,-25 5,-8 Q15,10 22,15" fill="none" stroke="#fff" stroke-width="2.5"/>
    <path d="M22,-15 Q5,-25 -5,-8 Q-15,10 -22,15" fill="none" stroke="#fff" stroke-width="2.5"/>
    <!-- Shine -->
    <ellipse cx="-8" cy="-10" rx="6" ry="4" fill="white" opacity="0.25" transform="rotate(-30)"/>
    <text x="0" y="45" text-anchor="middle" font-size="11" fill="#555" font-family="Arial">Теннис</text>
  </g>
  
  <!-- Court/field representation at bottom -->
  <!-- Football field -->
  <rect x="20" y="170" width="120" height="80" rx="3" fill="#4caf50" stroke="#388e3c" stroke-width="2"/>
  <line x1="80" y1="170" x2="80" y2="250" stroke="white" stroke-width="1"/>
  <circle cx="80" cy="210" r="15" fill="none" stroke="white" stroke-width="1"/>
  <rect x="20" y="190" width="20" height="40" fill="none" stroke="white" stroke-width="1"/>
  <rect x="120" y="190" width="20" height="40" fill="none" stroke="white" stroke-width="1"/>
  
  <!-- Basketball court -->
  <rect x="160" y="170" width="80" height="80" rx="3" fill="#d4a76a" stroke="#8B6914" stroke-width="2"/>
  <line x1="200" y1="170" x2="200" y2="250" stroke="white" stroke-width="1"/>
  <circle cx="200" cy="210" r="15" fill="none" stroke="white" stroke-width="1"/>
  <path d="M160 200 A15 15 0 0 1 160 220" fill="none" stroke="white" stroke-width="1"/>
  <path d="M240 200 A15 15 0 0 0 240 220" fill="none" stroke="white" stroke-width="1"/>
  
  <!-- Volleyball court -->
  <rect x="260" y="170" width="80" height="80" rx="3" fill="#e8d5a0" stroke="#b8a060" stroke-width="2"/>
  <line x1="300" y1="170" x2="300" y2="250" stroke="#333" stroke-width="2"/>
  
  <!-- Tennis court -->
  <rect x="360" y="170" width="120" height="80" rx="3" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <line x1="420" y1="170" x2="420" y2="250" stroke="white" stroke-width="1.5"/>
  <rect x="380" y="170" width="80" height="80" fill="none" stroke="white" stroke-width="1"/>
  <line x1="360" y1="210" x2="480" y2="210" stroke="white" stroke-width="1"/>
  
  <!-- Decorative players silhouette -->
  <!-- Football player -->
  <g transform="translate(60,280)" opacity="0.6">
    <circle cx="0" cy="0" r="6" fill="#333"/>
    <path d="M0 6 L-2 20 L-8 35 M-2 20 L5 35 M0 8 Q-10 12 -12 18 M0 8 Q10 5 14 10" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Basketball player -->
  <g transform="translate(190,280)" opacity="0.6">
    <circle cx="0" cy="0" r="6" fill="#c0392b"/>
    <path d="M0 6 L0 20 L-5 35 M0 20 L7 35 M0 8 Q8 0 12 -5 M0 8 Q-8 15 -10 20" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Volleyball player -->
  <g transform="translate(300,280)" opacity="0.6">
    <circle cx="0" cy="0" r="6" fill="#2980b9"/>
    <path d="M0 6 L-1 20 L-6 35 M-1 20 L6 35 M0 8 Q12 2 18 5 M0 8 Q-10 4 -15 8" stroke="#2980b9" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Tennis player -->
  <g transform="translate(420,280)" opacity="0.6">
    <circle cx="0" cy="0" r="6" fill="#7b1fa2"/>
    <path d="M0 6 L0 20 L-5 35 M0 20 L6 35 M0 8 Q10 -2 16 -8 M0 8 Q-8 12 -5 20" stroke="#7b1fa2" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Racket -->
    <ellipse cx="18" cy="-12" rx="5" ry="8" fill="none" stroke="#7b1fa2" stroke-width="1.5" transform="rotate(30,18,-12)"/>
    <line x1="14" y1="-6" x2="10" y2="0" stroke="#7b1fa2" stroke-width="2"/>
  </g>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Спортивные игры</text>
</svg>