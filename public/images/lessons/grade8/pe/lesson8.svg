<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#e0e8ee"/>
    </linearGradient>
    <linearGradient id="snow8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="trail8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="100%" stop-color="#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky8)"/>
  
  <!-- Snowy mountains background -->
  <polygon points="0,160 80,40 160,160" fill="#90a4ae"/>
  <polygon points="60,160 140,30 220,160" fill="#78909c"/>
  <polygon points="150,160 250,20 350,160" fill="#607d8b"/>
  <polygon points="280,160 370,50 460,160" fill="#78909c"/>
  <polygon points="380,160 450,60 500,160" fill="#90a4ae"/>
  <!-- Snow caps -->
  <polygon points="80,40 65,65 95,65" fill="white"/>
  <polygon points="140,30 125,55 155,55" fill="white"/>
  <polygon points="250,20 230,50 270,50" fill="white"/>
  <polygon points="370,50 355,72 385,72" fill="white"/>
  <polygon points="450,60 438,78 462,78" fill="white"/>
  
  <!-- Snow ground -->
  <rect x="0" y="160" width="500" height="190" fill="url(#snow8)"/>
  
  <!-- Ski trail -->
  <path d="M0,260 Q50,250 100,240 Q150,230 200,225 Q250,220 300,225 Q350,230 400,240 Q450,250 500,260" fill="none" stroke="url(#trail8)" stroke-width="40" opacity="0.6"/>
  <path d="M0,260 Q50,250 100,240 Q150,230 200,225 Q250,220 300,225 Q350,230 400,240 Q450,250 500,260" fill="none" stroke="#b0bec5" stroke-width="2" stroke-dasharray="8,6"/>
  
  <!-- Pine trees -->
  <g transform="translate(50,185)">
    <rect x="-3" y="0" width="6" height="15" fill="#5d4037"/>
    <polygon points="0,-35 -18,0 18,0" fill="#2e7d32"/>
    <polygon points="0,-25 -14,-5 14,-5" fill="#388e3c"/>
    <!-- Snow on trees -->
    <path d="M-12,-5 Q0,-10 12,-5" fill="white" opacity="0.7"/>
    <path d="M-16,0 Q0,-6 16,0" fill="white" opacity="0.7"/>
  </g>
  <g transform="translate(120,195)">
    <rect x="-2" y="0" width="4" height="12" fill="#5d4037"/>
    <polygon points="0,-28 -14,0 14,0" fill="#2e7d32"/>
    <polygon points="0,-20 -10,-4 10,-4" fill="#388e3c"/>
    <path d="M-10,-4 Q0,-8 10,-4" fill="white" opacity="0.7"/>
  </g>
  <g transform="translate(430,190)">
    <rect x="-3" y="0" width="6" height="14" fill="#5d4037"/>
    <polygon points="0,-32 -16,0 16,0" fill="#2e7d32"/>
    <polygon points="0,-22 -12,-4 12,-4" fill="#388e3c"/>
    <path d="M-12,-4 Q0,-8 12,-4" fill="white" opacity="0.7"/>
  </g>
  <g transform="translate(470,200)">
    <rect x="-2" y="0" width="4" height="10" fill="#5d4037"/>
    <polygon points="0,-22 -11,0 11,0" fill="#2e7d32"/>
    <path d="M-8,0 Q0,-4 8,0" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Skier in diagonal stride -->
  <g transform="translate(260,215)">
    <!-- Shadow -->
    <ellipse cx="5" cy="42" rx="25" ry="4" fill="rgba(0,0,0,0.1)"/>
    <!-- Skis -->
    <line x1="-25" y1="40" x2="30" y2="38" stroke="#5d4037" stroke-width="3" stroke-linecap="round"/>
    <line x1="-15" y1="42" x2="40" y2="40" stroke="#5d4037" stroke-width="3" stroke-linecap="round"/>
    <!-- Back leg (pushing) -->
    <path d="M0,15 L-20,35" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Front leg -->
    <path d="M10,15 L25,35" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <path d="M5,15 L0,-10" stroke="#1565c0" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="-2" cy="-18" r="9" fill="#ffb57c"/>
    <!-- Hat -->
    <path d="M-11,-20 Q-2,-28 7,-20 L5,-16 Q-2,-22 -9,-16 Z" fill="#c62828"/>
    <circle cx="-2" cy="-28" r="3" fill="#c62828"/>
    <!-- Goggles -->
    <rect x="-7" y="-20" width="10" height="5" rx="2" fill="#333" opacity="0.6"/>
    <!-- Push-off arm with pole -->
    <path d="M-2,-5 Q-15,5 -22,20" stroke="#ffb57c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <line x1="-22" y1="20" x2="-30" y2="38" stroke="#888" stroke-width="2"/>
    <circle cx="-30" cy="38" r="2" fill="#555"/>
    <!-- Forward arm with pole -->
    <path d="M0,-5 Q10,0 18,10" stroke="#ffb57c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <line x1="18" y1="10" x2="25" y2="38" stroke="#888" stroke-width="2"/>
    <circle cx="25" cy="38" r="2" fill="#555"/>
    <!-- Pole baskets -->
    <ellipse cx="-30" cy="39" rx="4" ry="1.5" fill="#555"/>
    <ellipse cx="25" cy="39" rx="4" ry="1.5" fill="#555"/>
  </g>
  
  <!-- Snowflakes -->
  <g fill="white" opacity="0.6">
    <circle cx="30" cy="100" r="2"/>
    <circle cx="100" cy="120" r="1.5"/>
    <circle cx="180" cy="80" r="2.5"/>
    <circle cx="250" cy="110" r="1.5"/>
    <circle cx="320" cy="90" r="2"/>
    <circle cx="400" cy="130" r="1.5"/>
    <circle cx="460" cy="100" r="2"/>
    <circle cx="60" cy="150" r="1"/>
    <circle cx="200" cy="140" r="1.5"/>
    <circle cx="350" cy="155" r="1"/>
    <circle cx="150" cy="105" r="2"/>
    <circle cx="480" cy="145" r="1.5"/>
  </g>
  
  <!-- Other skier in distance -->
  <g transform="translate(380,210)" opacity="0.4">
    <line x1="-10" y1="20" x2="12" y2="19" stroke="#5d4037" stroke-width="2"/>
    <line x1="-5" y1="21" x2="17" y2="20" stroke="#5d4037" stroke-width="2"/>
    <path d="M2,8 L0,-5" stroke="#1565c0" stroke-width="4" fill="none"/>
    <circle cx="0" cy="-9" r="5" fill="#bbb"/>
    <path d="M-1,8 L-8,18" stroke="#666" stroke-width="3" fill="none"/>
    <path d="M3,8 L10,17" stroke="#666" stroke-width="3" fill="none"/>
  </g>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#455a64" font-family="Arial, sans-serif">Лыжная подготовка</text>
</svg>