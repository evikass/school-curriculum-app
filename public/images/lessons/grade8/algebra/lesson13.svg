<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="50%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="Arial">Линейные неравенства</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 13</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#FF8F00" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">ax + b &gt; 0 (или &lt;, ≥, ≤)</text>
  <text x="250" y="98" font-size="9" fill="#555" text-anchor="middle">Перенести → привести → разделить → записать промежутком</text>
  <rect x="12" y="116" width="230" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="127" y="131" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Пример 1</text>
  <text x="127" y="150" font-size="9" fill="#FF8F00" font-family="monospace">2x - 6 &gt; 0</text>
  <text x="127" y="165" font-size="9" fill="#FF8F00" font-family="monospace">2x &gt; 6</text>
  <text x="127" y="180" font-size="9" fill="#E65100" font-weight="bold" font-family="monospace">x &gt; 3</text>
  <text x="127" y="200" font-size="9" fill="#FF8F00" font-family="monospace">(3; +∞)</text>
  <rect x="252" y="116" width="236" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="370" y="131" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Пример 2 (знак меняется!)</text>
  <text x="370" y="150" font-size="9" fill="#FF8F00" font-family="monospace">-3x + 9 ≤ 0</text>
  <text x="370" y="165" font-size="9" fill="#FF8F00" font-family="monospace">-3x ≤ -9</text>
  <text x="370" y="180" font-size="9" fill="#C62828" font-weight="bold" font-family="monospace">x ≥ 3</text>
  <text x="370" y="200" font-size="9" fill="#FF8F00" font-family="monospace">[3; +∞)</text>
  <rect x="12" y="224" width="476" height="80" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="250" y="239" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Системы неравенств</text>
  <text x="250" y="258" font-size="8" fill="#555" text-anchor="middle">Решение системы = пересечение решений</text>
  <text x="250" y="274" font-size="8" fill="#555" text-anchor="middle">x&gt;2 и x&lt;7 → (2; 7)</text>
  <text x="250" y="292" font-size="8" fill="#C62828" font-weight="bold">При делении на отрицательное — знак меняется!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#FF8F00" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Линейные неравенства — Макарычев Ю.Н., 8 класс</text>
</svg>