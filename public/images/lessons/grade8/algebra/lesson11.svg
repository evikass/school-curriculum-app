<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="50%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFB300" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="Arial">Числовые неравенства</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 11</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#FF8F00" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">a &gt; b, если a - b &gt; 0</text>
  <text x="250" y="98" font-size="9" fill="#555" text-anchor="middle">Свойства: прибавление, умножение, сложение</text>
  <rect x="12" y="116" width="155" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="87" y="131" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">c &gt; 0</text>
  <text x="87" y="155" font-size="8" fill="#2E7D32" text-anchor="middle">Знак НЕ меняется</text>
  <rect x="175" y="116" width="155" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="252" y="131" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">c &lt; 0</text>
  <text x="252" y="155" font-size="8" fill="#C62828" text-anchor="middle">Знак МЕНЯЕТСЯ!</text>
  <rect x="338" y="116" width="150" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="413" y="131" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Сложение</text>
  <text x="413" y="155" font-size="8" fill="#555" text-anchor="middle">a&gt;b+c&gt;d→a+c&gt;b+d</text>
  <rect x="12" y="179" width="476" height="125" rx="6" fill="white" fill-opacity="0.9" stroke="#FF8F00" stroke-width="1"/>
  <text x="250" y="194" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Примеры</text>
  <text x="30" y="214" font-size="9" fill="#FF8F00" font-family="monospace">5&gt;3 → 5+2&gt;3+2 → 7&gt;5</text>
  <text x="30" y="232" font-size="9" fill="#FF8F00" font-family="monospace">4&gt;2, умн. на 3: 12&gt;6</text>
  <text x="30" y="250" font-size="9" fill="#C62828" font-family="monospace">4&gt;2, умн. на -1: -4&lt;-2</text>
  <text x="30" y="268" font-size="9" fill="#FF8F00" font-family="monospace">3&gt;1, 5&gt;2 → 8&gt;3</text>
  <text x="250" y="292" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">При умножении на отрицательное — знак меняется!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#FF8F00" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Числовые неравенства — Макарычев Ю.Н., 8 класс</text>
</svg>