  <text x="302" y="238" font-size="8" fill="#555">1. R = max - min</text>
  <text x="302" y="253" font-size="8" fill="#555">2. k интервалов</text>
  <text x="302" y="268" font-size="8" fill="#555">3. h = R/k</text>
