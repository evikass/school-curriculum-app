<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2838"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Main fraction -->
  <text x="80" y="90" fill="#48cae4" font-size="32" font-family="serif" font-weight="bold">3</text>
  <line x1="70" y1="100" x2="115" y2="100" stroke="#48cae4" stroke-width="3"/>
  <text x="80" y="130" fill="#48cae4" font-size="32" font-family="serif" font-weight="bold">5</text>
  <!-- Multiply arrow -->
  <text x="130" y="115" fill="#f77f00" font-size="28">·</text>
  <!-- Factor -->
  <rect x="155" y="75" width="45" height="65" rx="5" fill="none" stroke="#f77f00" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="168" y="95" fill="#f77f00" font-size="24" font-family="serif">2</text>
  <line x1="155" y1="100" x2="200" y2="100" stroke="#f77f00" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="168" y="128" fill="#f77f00" font-size="24" font-family="serif">2</text>
  <!-- Equals -->
  <text x="215" y="115" fill="#90be6d" font-size="28">=</text>
  <!-- Result fraction -->
  <text x="250" y="90" fill="#f9c74f" font-size="32" font-family="serif" font-weight="bold">6</text>
  <line x1="240" y1="100" x2="290" y2="100" stroke="#f9c74f" stroke-width="3"/>
  <text x="250" y="130" fill="#f9c74f" font-size="32" font-family="serif" font-weight="bold">10</text>
  <!-- Simplify arrow -->
  <path d="M300,110 C330,110 340,70 370,70" stroke="#90be6d" stroke-width="1.5" fill="none"/>
  <text x="340" y="60" fill="#90be6d" font-size="11">сокращение</text>
  <!-- Back to original -->
  <text x="380" y="90" fill="#48cae4" font-size="32" font-family="serif" font-weight="bold">3</text>
  <line x1="370" y1="100" x2="415" y2="100" stroke="#48cae4" stroke-width="3"/>
  <text x="380" y="130" fill="#48cae4" font-size="32" font-family="serif" font-weight="bold">5</text>
  <!-- Variable example -->
  <text x="60" y="200" fill="#a8dadc" font-size="22" font-family="serif">ax</text>
  <line x1="50" y1="210" x2="120" y2="210" stroke="#a8dadc" stroke-width="2"/>
  <text x="70" y="235" fill="#a8dadc" font-size="22" font-family="serif">ay</text>
  <text x="135" y="220" fill="#f77f00" font-size="20">=</text>
  <text x="165" y="200" fill="#a8dadc" font-size="22" font-family="serif">x</text>
  <line x1="158" y1="210" x2="205" y2="210" stroke="#a8dadc" stroke-width="2"/>
  <text x="175" y="235" fill="#a8dadc" font-size="22" font-family="serif">y</text>
  <!-- Bracket showing same factor -->
  <path d="M140,190 C145,185 145,185 150,190" stroke="#f77f00" stroke-width="1.5" fill="none"/>
  <path d="M140,245 C145,250 145,250 150,245" stroke="#f77f00" stroke-width="1.5" fill="none"/>
  <text x="140" y="265" fill="#f77f00" font-size="12">a≠0</text>
  <!-- Visual bars showing equal parts -->
  <rect x="260" y="170" width="200" height="25" rx="3" fill="none" stroke="#48cae4" stroke-width="1"/>
  <rect x="260" y="170" width="40" height="25" fill="#48cae4" opacity="0.3"/>
  <rect x="300" y="170" width="40" height="25" fill="#48cae4" opacity="0.3"/>
  <rect x="340" y="170" width="40" height="25" fill="#48cae4" opacity="0.3"/>
  <rect x="380" y="170" width="40" height="25" fill="#48cae4" opacity="0.3"/>
  <rect x="420" y="170" width="40" height="25" fill="#48cae4" opacity="0.3"/>
  <text x="360" y="215" fill="#7f8c8d" font-size="11">3 из 5 частей</text>
  <rect x="260" y="230" width="200" height="25" rx="3" fill="none" stroke="#f9c74f" stroke-width="1"/>
  <rect x="260" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <rect x="280" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <rect x="300" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <rect x="320" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <rect x="340" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <rect x="360" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <rect x="380" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <rect x="400" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <rect x="420" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <rect x="440" y="230" width="20" height="25" fill="#f9c74f" opacity="0.3"/>
  <text x="360" y="275" fill="#7f8c8d" font-size="11">6 из 10 = то же самое</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Основное свойство дроби</text>
</svg>