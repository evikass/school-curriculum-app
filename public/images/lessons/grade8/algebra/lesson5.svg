<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corner accents -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1565C0" text-anchor="middle">Квадратные корни</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="5" fill="#1565C0" opacity="0.18" rx="1"/>
  <rect x="410" y="75" width="60" height="5" fill="#1565C0" opacity="0.12" rx="1"/>
  <!-- ILLUSTRATION AREA: x=15..485, y=85..300 -->
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
  <rect x="15" y="85" width="470" height="215" fill="#E3F2FD"/><text x="250" y="170" font-family="Arial" font-size="48" fill="#1565C0" text-anchor="middle" font-weight="bold">√(a x b) = √a x √b</text><rect x="100" y="200" width="80" height="40" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/><text x="140" y="225" font-family="Arial" font-size="14" fill="#1565C0" text-anchor="middle">9 = 3</text><rect x="210" y="200" width="80" height="40" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/><text x="250" y="225" font-family="Arial" font-size="14" fill="#C62828" text-anchor="middle">16 = 4</text><rect x="320" y="200" width="80" height="40" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/><text x="360" y="225" font-family="Arial" font-size="14" fill="#2E7D32" text-anchor="middle">25 = 5</text>
  </g>
  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>