<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#5bc0be" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect width="500" height="350" fill="url(#glow)"/>
  <!-- Large square root symbol -->
  <path d="M140,200 L148,200 L155,240 L170,100 L300,100" stroke="#5bc0be" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="175" y="145" fill="#f72585" font-size="36" font-family="serif" font-weight="bold">49</text>
  <text x="310" y="140" fill="#5bc0be" font-size="28">= 7</text>
  <!-- Perfect squares grid -->
  <text x="40" y="50" fill="#6fffe9" font-size="14" font-weight="bold">Полные квадраты:</text>
  <rect x="30" y="60" width="55" height="35" rx="4" fill="#1c2541" stroke="#5bc0be" stroke-width="1"/>
  <text x="45" y="72" fill="#6fffe9" font-size="11">1²=1</text>
  <text x="42" y="88" fill="#3a506b" font-size="10">√1=1</text>
  <rect x="90" y="60" width="55" height="35" rx="4" fill="#1c2541" stroke="#5bc0be" stroke-width="1"/>
  <text x="102" y="72" fill="#6fffe9" font-size="11">2²=4</text>
  <text x="100" y="88" fill="#3a506b" font-size="10">√4=2</text>
  <rect x="150" y="60" width="55" height="35" rx="4" fill="#1c2541" stroke="#5bc0be" stroke-width="1"/>
  <text x="159" y="72" fill="#6fffe9" font-size="11">3²=9</text>
  <text x="158" y="88" fill="#3a506b" font-size="10">√9=3</text>
  <rect x="210" y="60" width="55" height="35" rx="4" fill="#1c2541" stroke="#5bc0be" stroke-width="1"/>
  <text x="217" y="72" fill="#6fffe9" font-size="11">4²=16</text>
  <text x="217" y="88" fill="#3a506b" font-size="10">√16=4</text>
  <rect x="270" y="60" width="55" height="35" rx="4" fill="#1c2541" stroke="#5bc0be" stroke-width="1"/>
  <text x="277" y="72" fill="#6fffe9" font-size="11">5²=25</text>
  <text x="277" y="88" fill="#3a506b" font-size="10">√25=5</text>
  <rect x="330" y="60" width="55" height="35" rx="4" fill="#1c2541" stroke="#5bc0be" stroke-width="1"/>
  <text x="440" y="60" fill="#6fffe9" font-size="14" font-weight="bold">...</text>
  <text x="337" y="72" fill="#6fffe9" font-size="11">6²=36</text>
  <text x="337" y="88" fill="#3a506b" font-size="10">√36=6</text>
  <rect x="390" y="60" width="55" height="35" rx="4" fill="#1c2541" stroke="#5bc0be" stroke-width="1"/>
  <text x="397" y="72" fill="#6fffe9" font-size="11">7²=49</text>
  <text x="397" y="88" fill="#3a506b" font-size="10">√49=7</text>
  <!-- Number line -->
  <line x1="30" y1="260" x2="470" y2="260" stroke="#3a506b" stroke-width="2"/>
  <!-- Ticks and values -->
  <line x1="50" y1="255" x2="50" y2="265" stroke="#5bc0be" stroke-width="1.5"/>
  <text x="44" y="280" fill="#6fffe9" font-size="10">0</text>
  <line x1="110" y1="255" x2="110" y2="265" stroke="#5bc0be" stroke-width="1.5"/>
  <text x="104" y="280" fill="#6fffe9" font-size="10">1</text>
  <line x1="170" y1="255" x2="170" y2="265" stroke="#5bc0be" stroke-width="1.5"/>
  <text x="164" y="280" fill="#6fffe9" font-size="10">2</text>
  <line x1="230" y1="255" x2="230" y2="265" stroke="#5bc0be" stroke-width="1.5"/>
  <text x="224" y="280" fill="#6fffe9" font-size="10">3</text>
  <line x1="290" y1="255" x2="290" y2="265" stroke="#5bc0be" stroke-width="1.5"/>
  <text x="284" y="280" fill="#6fffe9" font-size="10">4</text>
  <line x1="350" y1="255" x2="350" y2="265" stroke="#5bc0be" stroke-width="1.5"/>
  <text x="344" y="280" fill="#6fffe9" font-size="10">5</text>
  <line x1="410" y1="255" x2="410" y2="265" stroke="#5bc0be" stroke-width="1.5"/>
  <text x="404" y="280" fill="#6fffe9" font-size="10">6</text>
  <line x1="460" y1="255" x2="460" y2="265" stroke="#5bc0be" stroke-width="1.5"/>
  <text x="454" y="280" fill="#6fffe9" font-size="10">7</text>
  <!-- Square root points highlighted -->
  <circle cx="110" cy="260" r="5" fill="#f72585" opacity="0.8"/>
  <circle cx="170" cy="260" r="5" fill="#f72585" opacity="0.8"/>
  <circle cx="230" cy="260" r="5" fill="#f72585" opacity="0.8"/>
  <circle cx="290" cy="260" r="5" fill="#f72585" opacity="0.8"/>
  <circle cx="350" cy="260" r="5" fill="#f72585" opacity="0.8"/>
  <circle cx="410" cy="260" r="5" fill="#f72585" opacity="0.8"/>
  <circle cx="460" cy="260" r="5" fill="#f72585" opacity="0.8"/>
  <!-- √2 approx mark -->
  <line x1="153" y1="255" x2="153" y2="265" stroke="#f77f00" stroke-width="1" stroke-dasharray="2,1"/>
  <circle cx="153" cy="260" r="3" fill="#f77f00" opacity="0.8"/>
  <text x="137" y="295" fill="#f77f00" font-size="9">√2≈1.41</text>
  <!-- √3 approx mark -->
  <line x1="207" y1="255" x2="207" y2="265" stroke="#f77f00" stroke-width="1" stroke-dasharray="2,1"/>
  <circle cx="207" cy="260" r="3" fill="#f77f00" opacity="0.8"/>
  <text x="192" y="308" fill="#f77f00" font-size="9">√3≈1.73</text>
  <!-- √5 approx mark -->
  <line x1="277" y1="255" x2="277" y2="265" stroke="#f77f00" stroke-width="1" stroke-dasharray="2,1"/>
  <circle cx="277" cy="260" r="3" fill="#f77f00" opacity="0.8"/>
  <text x="265" y="295" fill="#f77f00" font-size="9">√5≈2.24</text>
  <!-- Definition -->
  <text x="350" y="230" fill="#3a506b" font-size="11">√a = b, если b² = a</text>
  <text x="350" y="245" fill="#3a506b" font-size="11">и b ≥ 0</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Арифметический квадратный корень</text>
</svg>