<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0e17"/>
      <stop offset="100%" stop-color="#1a1832"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Simplification steps -->
  <text x="30" y="35" fill="#ff8906" font-size="14" font-weight="bold">Вынесение множителя из-под корня:</text>
  <!-- Step 1: √50 -->
  <path d="M40,60 L43,60 L45,78 L51,48 L100,48" stroke="#e53170" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="58" y="68" fill="#fffffe" font-size="20" font-family="serif">50</text>
  <text x="110" y="65" fill="#ff8906" font-size="18">=</text>
  <!-- Step 2: √(25·2) -->
  <path d="M128,60 L130,60 L132,78 L137,48 L185,48" stroke="#e53170" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="140" y="68" fill="#fffffe" font-size="18" font-family="serif">25·2</text>
  <text x="195" y="65" fill="#ff8906" font-size="18">=</text>
  <!-- Step 3: √25 · √2 -->
  <path d="M213,48 L215,48 L217,58 L220,42 L238,42" stroke="#e53170" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="224" y="52" fill="#f9c74f" font-size="14" font-family="serif">25</text>
  <text x="244" y="55" fill="#ff8906" font-size="14">·</text>
  <path d="M258,48 L260,48 L262,58 L265,42 L283,42" stroke="#e53170" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="269" y="52" fill="#fffffe" font-size="14" font-family="serif">2</text>
  <text x="293" y="55" fill="#ff8906" font-size="18">=</text>
  <!-- Step 4: 5√2 -->
  <text x="315" y="55" fill="#f9c74f" font-size="20" font-weight="bold">5</text>
  <path d="M335,42 L337,42 L339,55 L342,38 L370,38" stroke="#e53170" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="350" y="52" fill="#fffffe" font-size="18" font-family="serif">2</text>
  <!-- Arrows showing steps -->
  <path d="M60,80 C60,85 60,85 60,90" stroke="#7f5af0" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Second example: √72 -->
  <text x="30" y="125" fill="#7f5af0" font-size="14" font-weight="bold">Внесение под корень:</text>
  <text x="40" y="155" fill="#f9c74f" font-size="20" font-weight="bold">3</text>
  <path d="M60,138 L62,138 L64,155 L68,132 L100,132" stroke="#e53170" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="75" y="148" fill="#fffffe" font-size="18" font-family="serif">5</text>
  <text x="110" y="148" fill="#ff8906" font-size="18">=</text>
  <path d="M128,140 L130,140 L132,158 L137,128 L185,128" stroke="#e53170" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="140" y="150" fill="#fffffe" font-size="18" font-family="serif">9·5</text>
  <text x="195" y="148" fill="#ff8906" font-size="18">=</text>
  <path d="M213,140 L215,140 L217,158 L222,128 L270,128" stroke="#e53170" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="225" y="150" fill="#fffffe" font-size="18" font-family="serif">45</text>
  <!-- Factoring out squares visualization -->
  <text x="30" y="200" fill="#2cb67d" font-size="13" font-weight="bold">Разложение на множители:</text>
  <!-- √48 step by step -->
  <text x="40" y="225" fill="#72757e" font-size="12">√48 = √(16·3) = 4√3</text>
  <text x="40" y="245" fill="#72757e" font-size="12">√98 = √(49·2) = 7√2</text>
  <text x="40" y="265" fill="#72757e" font-size="12">√128 = √(64·2) = 8√2</text>
  <text x="40" y="285" fill="#72757e" font-size="12">√200 = √(100·2) = 10√2</text>
  <!-- Like radicals addition -->
  <text x="280" y="200" fill="#2cb67d" font-size="13" font-weight="bold">Подобные корни:</text>
  <text x="280" y="225" fill="#72757e" font-size="12">3√2 + 5√2 = 8√2</text>
  <text x="280" y="245" fill="#72757e" font-size="12">√3 + 2√3 = 3√3</text>
  <text x="280" y="265" fill="#72757e" font-size="12">4√5 − √5 = 3√5</text>
  <!-- Visual: perfect square factor extraction -->
  <rect x="280" y="280" width="190" height="40" rx="5" fill="none" stroke="#7f5af0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="290" y="295" fill="#7f5af0" font-size="10">Выделяем полный квадрат</text>
  <text x="290" y="310" fill="#7f5af0" font-size="10">и выносим его из-под корня</text>
  <!-- Decorative squares -->
  <rect x="420" y="60" width="40" height="40" fill="none" stroke="#e53170" stroke-width="0.8" opacity="0.3" transform="rotate(15,440,80)"/>
  <rect x="440" y="90" width="30" height="30" fill="none" stroke="#2cb67d" stroke-width="0.8" opacity="0.3" transform="rotate(-10,455,105)"/>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Преобразование выражений с корнями</text>
</svg>