<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="50%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#00897B" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#004D40" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="Arial">Применение свойств корня</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 6</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00695C" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#004D40" text-anchor="middle" font-weight="bold">Освобождение от иррациональности</text>
  <text x="250" y="100" font-size="9" fill="#555" text-anchor="middle">Преобразование дроби так, чтобы знаменатель не содержал √</text>
  <rect x="12" y="121" width="230" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1"/>
  <text x="127" y="136" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Тип a/√b</text>
  <text x="127" y="155" font-size="9" fill="#00695C" font-family="monospace">6/√3 = (6√3)/3 = 2√3</text>
  <text x="127" y="175" font-size="8" fill="#555" text-anchor="middle">Умножить на √b/√b</text>
  <text x="127" y="190" font-size="8" fill="#555" text-anchor="middle">√b · √b = b</text>
  <rect x="252" y="121" width="236" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1"/>
  <text x="370" y="136" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Тип a/(√b+√c)</text>
  <text x="370" y="155" font-size="8" fill="#00695C" font-family="monospace">1/(√5+√3) =</text>
  <text x="370" y="170" font-size="8" fill="#00695C" font-family="monospace">(√5-√3)/((√5)²-(√3)²)</text>
  <text x="370" y="185" font-size="8" fill="#004D40" font-weight="bold">= (√5-√3)/2</text>
  <text x="370" y="205" font-size="8" fill="#555" text-anchor="middle">Умножить на сопряжённое</text>
  <rect x="12" y="229" width="476" height="75" rx="6" fill="white" fill-opacity="0.9" stroke="#00695C" stroke-width="1"/>
  <text x="250" y="244" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Подобные корни и преобразования</text>
  <text x="250" y="262" font-size="9" fill="#00695C" font-family="monospace">3√2 + 5√2 = 8√2</text>
  <text x="250" y="280" font-size="8" fill="#555" text-anchor="middle">Сопряжённое: (√a+√b) и (√a-√b)</text>
  <text x="250" y="294" font-size="8" fill="#004D40" font-weight="bold">(√a+√b)(√a-√b) = a - b</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#00695C" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Применение свойств корня — Макарычев Ю.Н., 8 класс</text>
</svg>