<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1A237E" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Дробные рациональные уравнения</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 10</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3949AB" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#1A237E" text-anchor="middle" font-weight="bold">Дробные рациональные уравнения</text>
  <text x="250" y="100" font-size="9" fill="#555" text-anchor="middle">Умножить на общий знаменатель → решить → исключить посторонние</text>
  <rect x="12" y="121" width="476" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="136" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Посторонние корни!</text>
  <text x="250" y="155" font-size="8" fill="#555" text-anchor="middle">x/(x-2) = 2/(x-2) → Умножаем: x = 2</text>
  <text x="250" y="170" font-size="8" fill="#555" text-anchor="middle">Но при x=2 знаменатель = 0!</text>
  <text x="250" y="185" font-size="8" fill="#C62828" font-weight="bold">Ответ: корней нет!</text>
  <rect x="12" y="219" width="476" height="85" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="234" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle">Алгоритм</text>
  <text x="30" y="252" font-size="8" fill="#555">1. Найти общий знаменатель</text>
  <text x="30" y="266" font-size="8" fill="#555">2. Умножить обе части на него</text>
  <text x="30" y="280" font-size="8" fill="#555">3. Решить целое уравнение</text>
  <text x="270" y="252" font-size="8" fill="#1A237E" font-weight="bold">4. Проверить каждый корень!</text>
  <text x="270" y="270" font-size="8" fill="#555">Исключить те, что</text>
  <text x="270" y="284" font-size="8" fill="#C62828">обращают знаменатель в 0</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#3949AB" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Дробные рациональные уравнения — Макарычев Ю.Н., 8 класс</text>
</svg>