<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#023047"/>
      <stop offset="100%" stop-color="#14213d"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Title -->
  <text x="30" y="35" fill="#ffb703" font-size="14" font-weight="bold">Линейные неравенства</text>
  <!-- Example: 2x + 5 > 11 -->
  <text x="30" y="65" fill="#8ecae6" font-size="15" font-family="serif">2x + 5 &gt; 11</text>
  <!-- Solving steps -->
  <text x="30" y="90" fill="#219ebc" font-size="13">2x &gt; 11 − 5</text>
  <text x="30" y="110" fill="#219ebc" font-size="13">2x &gt; 6</text>
  <text x="30" y="130" fill="#fb8500" font-size="15" font-weight="bold">x &gt; 3</text>
  <!-- Number line with shaded region -->
  <line x1="30" y1="175" x2="470" y2="175" stroke="#8ecae6" stroke-width="2"/>
  <polygon points="470,175 462,171 462,179" fill="#8ecae6"/>
  <!-- Tick marks -->
  <line x1="100" y1="170" x2="100" y2="180" stroke="#8ecae6" stroke-width="1.5"/>
  <text x="96" y="195" fill="#8ecae6" font-size="11">0</text>
  <line x1="200" y1="170" x2="200" y2="180" stroke="#8ecae6" stroke-width="1.5"/>
  <text x="193" y="195" fill="#8ecae6" font-size="11">1</text>
  <line x1="300" y1="170" x2="300" y2="180" stroke="#8ecae6" stroke-width="1.5"/>
  <text x="293" y="195" fill="#8ecae6" font-size="11">2</text>
  <line x1="400" y1="170" x2="400" y2="180" stroke="#8ecae6" stroke-width="1.5"/>
  <text x="393" y="195" fill="#8ecae6" font-size="11">3</text>
  <!-- Open circle at x=3 -->
  <circle cx="400" cy="175" r="6" fill="#023047" stroke="#fb8500" stroke-width="2.5"/>
  <!-- Shaded region x > 3 -->
  <rect x="406" y="171" width="64" height="8" rx="2" fill="#fb8500" opacity="0.4"/>
  <text x="430" y="160" fill="#fb8500" font-size="12">x &gt; 3</text>
  <!-- Second example: -3x ≤ 9 -->
  <text x="30" y="230" fill="#ffb703" font-size="14" font-weight="bold">Пример с делением на отрицательное:</text>
  <text x="30" y="255" fill="#8ecae6" font-size="15" font-family="serif">−3x ≤ 9</text>
  <text x="30" y="278" fill="#219ebc" font-size="13">x ≥ 9/(−3)</text>
  <text x="30" y="300" fill="#e63946" font-size="15" font-weight="bold">x ≥ −3</text>
  <text x="170" y="278" fill="#e63946" font-size="11">← знак меняется!</text>
  <!-- Number line for second example -->
  <line x1="250" y1="290" x2="470" y2="290" stroke="#8ecae6" stroke-width="1.5"/>
  <!-- Closed circle at x=-3 -->
  <circle cx="310" cy="290" r="5" fill="#e63946"/>
  <text x="302" y="310" fill="#8ecae6" font-size="10">−3</text>
  <circle cx="360" cy="290" r="3" fill="#8ecae6"/>
  <text x="356" y="310" fill="#8ecae6" font-size="10">0</text>
  <circle cx="410" cy="290" r="3" fill="#8ecae6"/>
  <text x="405" y="310" fill="#8ecae6" font-size="10">3</text>
  <!-- Shaded region x ≥ -3 -->
  <rect x="310" y="286" width="5" height="8" rx="1" fill="#e63946" opacity="0.5"/>
  <rect x="315" y="287" width="155" height="6" rx="2" fill="#e63946" opacity="0.3"/>
  <!-- Key rule -->
  <rect x="250" y="225" width="230" height="30" rx="5" fill="none" stroke="#ffb703" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="260" y="244" fill="#ffb703" font-size="11">÷ на отриц. → знак неравенства</text>
  <text x="260" y="254" fill="#ffb703" font-size="11">меняется на противоположный</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Линейные неравенства</text>
</svg>