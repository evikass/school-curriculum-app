<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10002b"/>
      <stop offset="100%" stop-color="#240046"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Discriminant formula -->
  <text x="30" y="40" fill="#e0aaff" font-size="14" font-weight="bold">Дискриминант:</text>
  <text x="30" y="70" fill="#c77dff" font-size="22" font-family="serif" font-weight="bold">D = b² − 4ac</text>
  <!-- Three cases -->
  <!-- D > 0 -->
  <rect x="20" y="85" width="150" height="70" rx="5" fill="none" stroke="#7b2cbf" stroke-width="1.5"/>
  <text x="35" y="105" fill="#7b2cbf" font-size="13" font-weight="bold">D &gt; 0</text>
  <text x="30" y="125" fill="#e0aaff" font-size="11">Два корня:</text>
  <text x="30" y="142" fill="#c77dff" font-size="11" font-family="serif">x = (−b±√D) / 2a</text>
  <!-- D = 0 -->
  <rect x="180" y="85" width="150" height="70" rx="5" fill="none" stroke="#9d4edd" stroke-width="1.5"/>
  <text x="195" y="105" fill="#9d4edd" font-size="13" font-weight="bold">D = 0</text>
  <text x="190" y="125" fill="#e0aaff" font-size="11">Один корень:</text>
  <text x="190" y="142" fill="#c77dff" font-size="11" font-family="serif">x = −b / 2a</text>
  <!-- D < 0 -->
  <rect x="340" y="85" width="150" height="70" rx="5" fill="none" stroke="#e05780" stroke-width="1.5"/>
  <text x="355" y="105" fill="#e05780" font-size="13" font-weight="bold">D &lt; 0</text>
  <text x="350" y="125" fill="#e0aaff" font-size="11">Нет действительных</text>
  <text x="350" y="142" fill="#e0aaff" font-size="11">корней</text>
  <!-- Parabola with D > 0 (two roots) -->
  <text x="20" y="180" fill="#7b2cbf" font-size="12" font-weight="bold">D &gt; 0</text>
  <line x1="30" y1="280" x2="170" y2="280" stroke="#5a189a" stroke-width="1"/>
  <path d="M40,280 Q50,230 70,200 Q90,175 100,190 Q110,175 130,200 Q150,230 160,280" stroke="#c77dff" stroke-width="2" fill="none"/>
  <circle cx="60" cy="280" r="4" fill="#7b2cbf"/>
  <circle cx="140" cy="280" r="4" fill="#7b2cbf"/>
  <text x="52" y="298" fill="#c77dff" font-size="10">x₁</text>
  <text x="132" y="298" fill="#c77dff" font-size="10">x₂</text>
  <!-- Parabola with D = 0 (one root) -->
  <text x="190" y="180" fill="#9d4edd" font-size="12" font-weight="bold">D = 0</text>
  <line x1="200" y1="280" x2="340" y2="280" stroke="#5a189a" stroke-width="1"/>
  <path d="M210,280 Q220,250 240,220 Q260,200 270,220 Q280,200 300,220 Q320,250 330,280" stroke="#e0aaff" stroke-width="2" fill="none"/>
  <circle cx="270" cy="280" r="4" fill="#9d4edd"/>
  <text x="262" y="298" fill="#e0aaff" font-size="10">x₀</text>
  <!-- Parabola with D < 0 (no roots) -->
  <text x="360" y="180" fill="#e05780" font-size="12" font-weight="bold">D &lt; 0</text>
  <line x1="370" y1="280" x2="490" y2="280" stroke="#5a189a" stroke-width="1"/>
  <path d="M380,250 Q400,220 420,210 Q440,200 450,210 Q460,200 470,220 Q480,250 490,260" stroke="#e05780" stroke-width="2" fill="none"/>
  <!-- Dashed line showing parabola doesn't reach x-axis -->
  <text x="420" y="298" fill="#e05780" font-size="10">нет корней</text>
  <!-- Formula for roots -->
  <text x="30" y="330" fill="#c77dff" font-size="13" font-family="serif">x = (−b ± √D) / 2a</text>
  <text x="280" y="330" fill="#5a189a" font-size="11">где D = b² − 4ac</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Формула корней квадратного уравнения</text>
</svg>