<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="50%" stop-color="#D1C4E9"/>
      <stop offset="100%" stop-color="#7E57C2" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#311B92" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#311B92" text-anchor="middle" font-family="Arial">Свойства степени с целым показателем</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 8 класс — Урок 16</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#5E35B1" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="230" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="127" y="73" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Умножение</text>
  <text x="127" y="98" font-size="10" fill="#5E35B1" text-anchor="middle" font-family="monospace">aⁿ · aᵐ = aⁿ⁺ᵐ</text>
  <rect x="252" y="58" width="236" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="370" y="73" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Деление</text>
  <text x="370" y="98" font-size="10" fill="#5E35B1" text-anchor="middle" font-family="monospace">aⁿ : aᵐ = aⁿ⁻ᵐ</text>
  <rect x="12" y="121" width="230" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="127" y="136" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Степень в степени</text>
  <text x="127" y="158" font-size="10" fill="#5E35B1" text-anchor="middle" font-family="monospace">(aⁿ)ᵐ = aⁿᵐ</text>
  <rect x="252" y="121" width="236" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="370" y="136" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Произведение в степени</text>
  <text x="370" y="158" font-size="10" fill="#5E35B1" text-anchor="middle" font-family="monospace">(ab)ⁿ = aⁿbⁿ</text>
  <rect x="12" y="184" width="476" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#5E35B1" stroke-width="1"/>
  <text x="250" y="199" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Примеры с отрицательными показателями</text>
  <text x="30" y="218" font-size="9" fill="#5E35B1" font-family="monospace">x³·x⁻⁵ = x⁻² = 1/x²</text>
  <text x="270" y="218" font-size="9" fill="#5E35B1" font-family="monospace">a⁷:a⁻² = a⁹</text>
  <text x="30" y="238" font-size="9" fill="#5E35B1" font-family="monospace">(x⁻²)³ = x⁻⁶ = 1/x⁶</text>
  <text x="270" y="238" font-size="9" fill="#5E35B1" font-family="monospace">(2x)⁻³ = 1/(8x³)</text>
  <text x="250" y="262" font-size="9" fill="#311B92" font-weight="bold" font-family="monospace">(3⁻²·3⁵)/3 = 3² = 9</text>
  <text x="250" y="284" font-size="8" fill="#555" text-anchor="middle">Отрицательный показатель → обратная дробь → положительный</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#5E35B1" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Свойства степени с целым показателем — Макарычев Ю.Н., 8 класс</text>
</svg>