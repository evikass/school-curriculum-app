<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#g1)"/>
  <!-- Fraction diagrams -->
  <text x="60" y="80" fill="#e94560" font-size="28" font-family="serif" font-weight="bold">P(x)</text>
  <line x1="45" y1="90" x2="140" y2="90" stroke="#e94560" stroke-width="3"/>
  <text x="70" y="120" fill="#e94560" font-size="28" font-family="serif" font-weight="bold">Q(x)</text>
  <!-- Arrow -->
  <path d="M155,100 L190,100" stroke="#0f3460" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#0f3460"/></marker></defs>
  <!-- Rational expression tree -->
  <rect x="210" y="50" width="260" height="200" rx="10" fill="none" stroke="#0f3460" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="250" y="80" fill="#533483" font-size="16" font-weight="bold">Рациональные выражения</text>
  <line x1="340" y1="90" x2="340" y2="240" stroke="#533483" stroke-width="1"/>
  <!-- Left branch: Целые -->
  <circle cx="280" cy="120" r="4" fill="#e94560"/>
  <text x="250" y="135" fill="#a8d8ea" font-size="13">Целые</text>
  <text x="240" y="155" fill="#7f8c8d" font-size="11">3x² + 2x - 1</text>
  <text x="240" y="175" fill="#7f8c8d" font-size="11">5a + 7b</text>
  <!-- Right branch: Дробные -->
  <circle cx="400" cy="120" r="4" fill="#0f3460"/>
  <text x="360" y="135" fill="#a8d8ea" font-size="13">Дробные</text>
  <text x="355" y="155" fill="#7f8c8d" font-size="11">x+1 / x-2</text>
  <text x="355" y="175" fill="#7f8c8d" font-size="11">a²-1 / a+3</text>
  <!-- Example fraction with variables -->
  <text x="60" y="180" fill="#a8d8ea" font-size="20" font-family="serif">x² - 4</text>
  <line x1="55" y1="188" x2="155" y2="188" stroke="#a8d8ea" stroke-width="2"/>
  <text x="80" y="212" fill="#a8d8ea" font-size="20" font-family="serif">x + 2</text>
  <!-- Equals sign -->
  <text x="165" y="200" fill="#e94560" font-size="22">=</text>
  <text x="190" y="200" fill="#a8d8ea" font-size="20" font-family="serif">x - 2</text>
  <!-- Decorative circles -->
  <circle cx="30" cy="280" r="20" fill="none" stroke="#533483" stroke-width="0.5" opacity="0.3"/>
  <circle cx="470" cy="300" r="30" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.3"/>
  <circle cx="450" cy="50" r="15" fill="none" stroke="#0f3460" stroke-width="0.5" opacity="0.4"/>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Рациональные выражения</text>
</svg>