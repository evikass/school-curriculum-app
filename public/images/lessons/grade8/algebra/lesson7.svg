<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d3557"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Three types of incomplete quadratic equations -->
  <!-- Type 1: ax² = 0 -->
  <rect x="20" y="20" width="150" height="145" rx="8" fill="none" stroke="#e63946" stroke-width="1.5"/>
  <text x="40" y="45" fill="#e63946" font-size="14" font-weight="bold">Тип 1</text>
  <text x="45" y="70" fill="#a8dadc" font-size="18" font-family="serif">ax² = 0</text>
  <line x1="35" y1="78" x2="155" y2="78" stroke="#457b9d" stroke-width="0.5"/>
  <text x="40" y="98" fill="#f1faee" font-size="13">x² = 0</text>
  <text x="40" y="118" fill="#f1faee" font-size="13">x = 0</text>
  <!-- Mini parabola touching origin -->
  <path d="M70,155 Q70,130 85,125 Q100,130 100,155" stroke="#e63946" stroke-width="1.5" fill="none"/>
  <circle cx="85" cy="155" r="3" fill="#e63946"/>
  <line x1="60" y1="155" x2="110" y2="155" stroke="#457b9d" stroke-width="0.8"/>
  <!-- Type 2: ax² + bx = 0 -->
  <rect x="180" y="20" width="150" height="145" rx="8" fill="none" stroke="#f4a261" stroke-width="1.5"/>
  <text x="200" y="45" fill="#f4a261" font-size="14" font-weight="bold">Тип 2</text>
  <text x="195" y="70" fill="#a8dadc" font-size="18" font-family="serif">ax²+bx=0</text>
  <line x1="195" y1="78" x2="315" y2="78" stroke="#457b9d" stroke-width="0.5"/>
  <text x="195" y="98" fill="#f1faee" font-size="13">x(ax+b)=0</text>
  <text x="195" y="118" fill="#f1faee" font-size="13">x=0 или x=−b/a</text>
  <!-- Mini parabola through origin and another point -->
  <path d="M215,155 Q220,120 240,115 Q260,120 265,155" stroke="#f4a261" stroke-width="1.5" fill="none"/>
  <circle cx="225" cy="155" r="3" fill="#f4a261"/>
  <circle cx="255" cy="155" r="3" fill="#f4a261"/>
  <line x1="210" y1="155" x2="270" y2="155" stroke="#457b9d" stroke-width="0.8"/>
  <!-- Type 3: ax² + c = 0 -->
  <rect x="340" y="20" width="150" height="145" rx="8" fill="none" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="360" y="45" fill="#2a9d8f" font-size="14" font-weight="bold">Тип 3</text>
  <text x="355" y="70" fill="#a8dadc" font-size="18" font-family="serif">ax²+c=0</text>
  <line x1="355" y1="78" x2="475" y2="78" stroke="#457b9d" stroke-width="0.5"/>
  <text x="355" y="98" fill="#f1faee" font-size="13">x² = −c/a</text>
  <text x="355" y="118" fill="#e63946" font-size="12">если −c/a&lt;0: нет корней</text>
  <text x="355" y="135" fill="#2a9d8f" font-size="12">если −c/a&gt;0: x=±√</text>
  <!-- No roots case: parabola above axis -->
  <path d="M385,155 Q390,125 410,120 Q430,125 435,155" stroke="#2a9d8f" stroke-width="1.5" fill="none"/>
  <line x1="375" y1="155" x2="445" y2="155" stroke="#457b9d" stroke-width="0.8"/>
  <!-- Full example: 2x² - 8 = 0 -->
  <text x="30" y="200" fill="#e9c46a" font-size="14" font-weight="bold">Пример:</text>
  <text x="30" y="225" fill="#a8dadc" font-size="16" font-family="serif">2x² − 8 = 0</text>
  <text x="30" y="250" fill="#f1faee" font-size="14">2x² = 8</text>
  <text x="30" y="270" fill="#f1faee" font-size="14">x² = 4</text>
  <text x="30" y="290" fill="#2a9d8f" font-size="14" font-weight="bold">x = ±2</text>
  <!-- Another example: x² + 3x = 0 -->
  <text x="250" y="200" fill="#e9c46a" font-size="14" font-weight="bold">Пример:</text>
  <text x="250" y="225" fill="#a8dadc" font-size="16" font-family="serif">x² + 3x = 0</text>
  <text x="250" y="250" fill="#f1faee" font-size="14">x(x + 3) = 0</text>
  <text x="250" y="270" fill="#f1faee" font-size="14">x = 0 или x = −3</text>
  <!-- Decorative -->
  <path d="M430,210 Q435,230 440,250 Q445,270 450,290" stroke="#457b9d" stroke-width="0.5" fill="none" opacity="0.3"/>
  <path d="M445,210 Q450,230 455,250 Q460,270 465,290" stroke="#457b9d" stroke-width="0.5" fill="none" opacity="0.3"/>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Неполные квадратные уравнения</text>
</svg>