<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#132a13"/>
      <stop offset="100%" stop-color="#1a3a1a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Number line comparisons -->
  <text x="30" y="35" fill="#b7e4c7" font-size="14" font-weight="bold">Числовые неравенства</text>
  <!-- Number line 1 -->
  <line x1="30" y1="65" x2="470" y2="65" stroke="#52b788" stroke-width="2"/>
  <polygon points="470,65 462,61 462,69" fill="#52b788"/>
  <!-- Points a and b -->
  <circle cx="150" cy="65" r="5" fill="#ff6b6b"/>
  <text x="143" y="55" fill="#ff6b6b" font-size="13" font-weight="bold">a</text>
  <circle cx="280" cy="65" r="5" fill="#4cc9f0"/>
  <text x="273" y="55" fill="#4cc9f0" font-size="13" font-weight="bold">b</text>
  <text x="200" y="55" fill="#b7e4c7" font-size="12">a &lt; b</text>
  <!-- Shaded region between -->
  <line x1="155" y1="65" x2="275" y2="65" stroke="#ffd166" stroke-width="4" opacity="0.5"/>
  <!-- Properties -->
  <text x="30" y="110" fill="#95d5b2" font-size="13" font-weight="bold">Свойства:</text>
  <!-- Property 1 -->
  <rect x="25" y="120" width="220" height="30" rx="4" fill="#1a3a1a" stroke="#52b788" stroke-width="1"/>
  <text x="35" y="140" fill="#b7e4c7" font-size="12">Если a &lt; b, то a+c &lt; b+c</text>
  <!-- Property 2 -->
  <rect x="25" y="155" width="220" height="30" rx="4" fill="#1a3a1a" stroke="#52b788" stroke-width="1"/>
  <text x="35" y="175" fill="#b7e4c7" font-size="12">Если a &lt; b и c&gt;0, то ac &lt; bc</text>
  <!-- Property 3 -->
  <rect x="25" y="190" width="220" height="30" rx="4" fill="#1a3a1a" stroke="#ffd166" stroke-width="1"/>
  <text x="35" y="210" fill="#ffd166" font-size="12">Если a &lt; b и c&lt;0, то ac &gt; bc</text>
  <!-- Property 4 -->
  <rect x="25" y="225" width="220" height="30" rx="4" fill="#1a3a1a" stroke="#52b788" stroke-width="1"/>
  <text x="35" y="245" fill="#b7e4c7" font-size="12">Если a &lt; b и b &lt; c, то a &lt; c</text>
  <!-- Visual: sign change when multiplying by negative -->
  <text x="270" y="110" fill="#ff6b6b" font-size="13" font-weight="bold">Знак меняется!</text>
  <!-- Before: 3 < 5 -->
  <text x="280" y="140" fill="#4cc9f0" font-size="16" font-family="serif">3 &lt; 5</text>
  <!-- Multiply by -2 -->
  <text x="280" y="165" fill="#b7e4c7" font-size="12">умножим на (−2):</text>
  <!-- After: -6 > -10 -->
  <text x="280" y="190" fill="#ff6b6b" font-size="16" font-family="serif" font-weight="bold">−6 &gt; −10</text>
  <!-- Visual number line showing this -->
  <line x1="270" y1="220" x2="460" y2="220" stroke="#52b788" stroke-width="1.5"/>
  <circle cx="310" cy="220" r="4" fill="#ff6b6b"/>
  <text x="298" y="237" fill="#ff6b6b" font-size="10">−10</text>
  <circle cx="390" cy="220" r="4" fill="#4cc9f0"/>
  <text x="383" y="237" fill="#4cc9f0" font-size="10">−6</text>
  <circle cx="430" cy="220" r="3" fill="#52b788"/>
  <text x="425" y="237" fill="#52b788" font-size="10">0</text>
  <!-- Comparison signs -->
  <text x="30" y="290" fill="#95d5b2" font-size="20" font-weight="bold">&lt;  &gt;  ≤  ≥</text>
  <!-- Example -->
  <text x="200" y="290" fill="#7f8c8d" font-size="12">5 &lt; 7 → 5+3 &lt; 7+3 → 8 &lt; 10</text>
  <text x="200" y="310" fill="#7f8c8d" font-size="12">5 &lt; 7 → 5·(−1) &gt; 7·(−1) → −5 &gt; −7</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Числовые неравенства</text>
</svg>