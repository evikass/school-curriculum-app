<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Addition of fractions with common denominator -->
  <text x="40" y="60" fill="#4cc9f0" font-size="20" font-family="serif">a</text>
  <line x1="35" y1="66" x2="65" y2="66" stroke="#4cc9f0" stroke-width="2"/>
  <text x="45" y="85" fill="#4cc9f0" font-size="20" font-family="serif">c</text>
  <text x="75" y="75" fill="#f77f00" font-size="22">+</text>
  <text x="105" y="60" fill="#4cc9f0" font-size="20" font-family="serif">b</text>
  <line x1="100" y1="66" x2="130" y2="66" stroke="#4cc9f0" stroke-width="2"/>
  <text x="110" y="85" fill="#4cc9f0" font-size="20" font-family="serif">c</text>
  <text x="145" y="75" fill="#90be6d" font-size="22">=</text>
  <text x="175" y="60" fill="#f9c74f" font-size="20" font-family="serif">a+b</text>
  <line x1="170" y1="66" x2="230" y2="66" stroke="#f9c74f" stroke-width="2"/>
  <text x="190" y="85" fill="#f9c74f" font-size="20" font-family="serif">c</text>
  <!-- Subtraction -->
  <text x="280" y="60" fill="#4cc9f0" font-size="20" font-family="serif">a</text>
  <line x1="275" y1="66" x2="305" y2="66" stroke="#4cc9f0" stroke-width="2"/>
  <text x="285" y="85" fill="#4cc9f0" font-size="20" font-family="serif">c</text>
  <text x="315" y="75" fill="#f77f00" font-size="22">−</text>
  <text x="345" y="60" fill="#4cc9f0" font-size="20" font-family="serif">b</text>
  <line x1="340" y1="66" x2="370" y2="66" stroke="#4cc9f0" stroke-width="2"/>
  <text x="350" y="85" fill="#4cc9f0" font-size="20" font-family="serif">c</text>
  <text x="385" y="75" fill="#90be6d" font-size="22">=</text>
  <text x="415" y="60" fill="#f9c74f" font-size="20" font-family="serif">a−b</text>
  <line x1="410" y1="66" x2="470" y2="66" stroke="#f9c74f" stroke-width="2"/>
  <text x="430" y="85" fill="#f9c74f" font-size="20" font-family="serif">c</text>
  <!-- Common denominator visualization -->
  <text x="100" y="130" fill="#a8dadc" font-size="14" font-weight="bold">Общий знаменатель:</text>
  <!-- Fraction 1: 1/3 -->
  <rect x="40" y="150" width="100" height="35" rx="5" fill="none" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="70" y="155" fill="#4cc9f0" font-size="16" font-family="serif">1</text>
  <line x1="55" y1="160" x2="95" y2="160" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="72" y="180" fill="#4cc9f0" font-size="16" font-family="serif">3</text>
  <!-- + -->
  <text x="150" y="172" fill="#f77f00" font-size="20">+</text>
  <!-- Fraction 2: 1/6 -->
  <rect x="175" y="150" width="100" height="35" rx="5" fill="none" stroke="#e76f51" stroke-width="1.5"/>
  <text x="205" y="155" fill="#e76f51" font-size="16" font-family="serif">1</text>
  <line x1="190" y1="160" x2="230" y2="160" stroke="#e76f51" stroke-width="1.5"/>
  <text x="206" y="180" fill="#e76f51" font-size="16" font-family="serif">6</text>
  <!-- Arrow down -->
  <path d="M140,195 C140,210 120,215 120,225" stroke="#90be6d" stroke-width="1.5" fill="none"/>
  <text x="80" y="220" fill="#90be6d" font-size="11">НОК(3,6)=6</text>
  <!-- Converted fractions -->
  <text x="55" y="255" fill="#4cc9f0" font-size="16" font-family="serif">2</text>
  <line x1="50" y1="260" x2="80" y2="260" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="62" y="278" fill="#4cc9f0" font-size="16" font-family="serif">6</text>
  <text x="90" y="268" fill="#f77f00" font-size="18">+</text>
  <text x="115" y="255" fill="#e76f51" font-size="16" font-family="serif">1</text>
  <line x1="110" y1="260" x2="140" y2="260" stroke="#e76f51" stroke-width="1.5"/>
  <text x="122" y="278" fill="#e76f51" font-size="16" font-family="serif">6</text>
  <text x="152" y="268" fill="#90be6d" font-size="18">=</text>
  <text x="180" y="255" fill="#f9c74f" font-size="16" font-family="serif" font-weight="bold">3</text>
  <line x1="175" y1="260" x2="205" y2="260" stroke="#f9c74f" stroke-width="1.5"/>
  <text x="187" y="278" fill="#f9c74f" font-size="16" font-family="serif" font-weight="bold">6</text>
  <text x="215" y="268" fill="#90be6d" font-size="18">=</text>
  <text x="240" y="268" fill="#90be6d" font-size="18" font-weight="bold">1/2</text>
  <!-- Visual bar for common denominator -->
  <rect x="280" y="150" width="200" height="120" rx="8" fill="none" stroke="#533483" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Bar model 1/3 = 2/6 -->
  <rect x="295" y="165" width="170" height="20" rx="2" fill="#1b2838" stroke="#4cc9f0" stroke-width="1"/>
  <rect x="295" y="165" width="57" height="20" rx="2" fill="#4cc9f0" opacity="0.4"/>
  <text x="365" y="180" fill="#7f8c8d" font-size="10">1/3 = 2/6</text>
  <!-- Bar model 1/6 -->
  <rect x="295" y="195" width="170" height="20" rx="2" fill="#1b2838" stroke="#e76f51" stroke-width="1"/>
  <rect x="295" y="195" width="28" height="20" rx="2" fill="#e76f51" opacity="0.4"/>
  <text x="365" y="210" fill="#7f8c8d" font-size="10">1/6</text>
  <!-- Combined -->
  <rect x="295" y="230" width="170" height="20" rx="2" fill="#1b2838" stroke="#f9c74f" stroke-width="1"/>
  <rect x="295" y="230" width="85" height="20" rx="2" fill="#f9c74f" opacity="0.4"/>
  <text x="365" y="245" fill="#7f8c8d" font-size="10">3/6 = 1/2</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Сложение и вычитание дробей</text>
</svg>