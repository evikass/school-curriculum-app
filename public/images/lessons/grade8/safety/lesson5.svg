<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="road5s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#616161"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#e3f2fd"/>
  
  <!-- Sky with clouds -->
  <ellipse cx="100" cy="40" rx="50" ry="18" fill="white" opacity="0.6"/>
  <ellipse cx="140" cy="35" rx="40" ry="15" fill="white" opacity="0.6"/>
  <ellipse cx="380" cy="50" rx="35" ry="14" fill="white" opacity="0.5"/>
  
  <!-- Sidewalks -->
  <rect x="0" y="120" width="500" height="35" fill="#bdbdbd"/>
  <rect x="0" y="230" width="500" height="35" fill="#bdbdbd"/>
  
  <!-- Road -->
  <rect x="0" y="155" width="500" height="75" fill="url(#road5s)"/>
  <!-- Center line -->
  <line x1="0" y1="192" x2="500" y2="192" stroke="#fdd835" stroke-width="2" stroke-dasharray="25,18"/>
  <!-- Edge lines -->
  <line x1="0" y1="158" x2="500" y2="158" stroke="#fff" stroke-width="2"/>
  <line x1="0" y1="227" x2="500" y2="227" stroke="#fff" stroke-width="2"/>
  
  <!-- Crosswalk (zebra) -->
  <g fill="#fff">
    <rect x="180" y="155" width="12" height="75"/>
    <rect x="198" y="155" width="12" height="75"/>
    <rect x="216" y="155" width="12" height="75"/>
    <rect x="234" y="155" width="12" height="75"/>
    <rect x="252" y="155" width="12" height="75"/>
    <rect x="270" y="155" width="12" height="75"/>
    <rect x="288" y="155" width="12" height="75"/>
  </g>
  
  <!-- Traffic light -->
  <g transform="translate(80,80)">
    <!-- Pole -->
    <rect x="-3" y="40" width="6" height="100" fill="#666"/>
    <!-- Housing -->
    <rect x="-15" y="-35" width="30" height="75" rx="5" fill="#333" stroke="#222" stroke-width="2"/>
    <!-- Red light (active) -->
    <circle cx="0" cy="-22" r="10" fill="#f44336"/>
    <circle cx="0" cy="-22" r="7" fill="#ff5252" opacity="0.8"/>
    <circle cx="0" cy="-22" r="12" fill="#f44336" opacity="0.2"/>
    <!-- Yellow light -->
    <circle cx="0" cy="0" r="10" fill="#424242"/>
    <circle cx="0" cy="0" r="6" fill="#555"/>
    <!-- Green light -->
    <circle cx="0" cy="22" r="10" fill="#424242"/>
    <circle cx="0" cy="22" r="6" fill="#555"/>
    <!-- Visor -->
    <path d="M-15,-32 L-20,-28 L-15,-28 Z" fill="#333"/>
    <path d="M15,-32 L20,-28 L15,-28 Z" fill="#333"/>
  </g>
  
  <!-- Pedestrian waiting at red -->
  <g transform="translate(150,108)">
    <circle cx="0" cy="-10" r="7" fill="#ffb57c"/>
    <path d="M-7,-10 Q0,-16 7,-10" fill="#333"/>
    <path d="M0,-3 L-2,15" stroke="#1e88e5" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M-2,15 L-6,25" stroke="#ffb57c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M-2,15 L2,25" stroke="#ffb57c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M0,0 Q-8,3 -10,8" stroke="#ffb57c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0,0 Q8,3 10,8" stroke="#ffb57c" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Road signs -->
  <!-- "No entry" sign -->
  <g transform="translate(420,90)">
    <circle r="20" fill="#e53935"/>
    <circle r="16" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="-12" y="-3" width="24" height="6" rx="2" fill="#fff"/>
  </g>
  
  <!-- "Pedestrian crossing" sign -->
  <g transform="translate(350,85)">
    <polygon points="0,-22 22,0 0,22 -22,0" fill="#fdd835" stroke="#333" stroke-width="2"/>
    <!-- Walking person icon -->
    <circle cx="0" cy="-8" r="3" fill="#333"/>
    <path d="M0,-5 L0,3 M0,3 L-4,10 M0,3 L4,10 M0,-2 Q-5,-1 -7,2 M0,-2 Q5,0 6,-1" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- "Speed limit" sign -->
  <g transform="translate(460,120)">
    <circle r="16" fill="#fff" stroke="#e53935" stroke-width="3"/>
    <text x="0" y="4" text-anchor="middle" font-size="9" fill="#333" font-weight="bold" font-family="Arial">60</text>
  </g>
  
  <!-- Car on road -->
  <g transform="translate(400,185)">
    <!-- Car body -->
    <rect x="-35" y="-15" width="70" height="22" rx="5" fill="#1565c0"/>
    <!-- Car top -->
    <path d="M-18,-15 L-10,-28 L15,-28 L25,-15" fill="#1976d2" stroke="#1565c0" stroke-width="1"/>
    <!-- Windows -->
    <path d="M-15,-15 L-8,-25 L2,-25 L2,-15" fill="#b3e5fc" opacity="0.8"/>
    <path d="M5,-15 L5,-25 L14,-25 L22,-15" fill="#b3e5fc" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="-20" cy="8" r="7" fill="#333"/>
    <circle cx="-20" cy="8" r="4" fill="#666"/>
    <circle cx="20" cy="8" r="7" fill="#333"/>
    <circle cx="20" cy="8" r="4" fill="#666"/>
    <!-- Headlights -->
    <rect x="32" y="-10" width="5" height="6" rx="1" fill="#ffeb3b"/>
    <!-- Brake lights -->
    <rect x="-38" y="-10" width="5" height="6" rx="1" fill="#f44336"/>
  </g>
  
  <!-- Stop line before crosswalk -->
  <line x1="165" y1="158" x2="165" y2="227" stroke="#fff" stroke-width="3"/>
  
  <!-- Trees along sidewalk -->
  <g transform="translate(30,115)" opacity="0.6">
    <rect x="-2" y="-15" width="4" height="15" fill="#5d4037"/>
    <circle cx="0" cy="-20" r="10" fill="#4caf50"/>
  </g>
  <g transform="translate(470,225)" opacity="0.6">
    <rect x="-2" y="-15" width="4" height="15" fill="#5d4037"/>
    <circle cx="0" cy="-20" r="10" fill="#4caf50"/>
  </g>
  
  <!-- Crosswalk sign on road surface -->
  <rect x="215" y="195" width="45" height="12" rx="2" fill="none" stroke="#fff" stroke-width="1" opacity="0.4"/>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Правила дорожного движения</text>
</svg>