  <rect x="15" y="85" width="470" height="215" fill="#E3F2FD"/><path d="M80,240 Q120,200 160,220 Q200,180 250,200 Q280,185 310,210 Q350,180 380,200 L380,270 L80,270Z" fill="#B3E5FC" stroke="#1565C0" stroke-width="1.5"/><circle cx="150" cy="140" r="25" fill="#B0BEC5"/><path d="M135,140 L150,115 L165,140" fill="white" stroke="#999" stroke-width="1"/><text x="250" y="290" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Землетрясения, наводнения</text>
