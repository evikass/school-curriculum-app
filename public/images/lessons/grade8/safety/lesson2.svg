<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky2s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#e1f5fe"/>
    </linearGradient>
    <linearGradient id="sidewalk2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bdbdbd"/>
      <stop offset="100%" stop-color="#9e9e9e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky2s)"/>
  
  <!-- Buildings background -->
  <rect x="0" y="60" width="80" height="200" fill="#90a4ae"/>
  <rect x="85" y="100" width="60" height="160" fill="#78909c"/>
  <rect x="150" y="80" width="70" height="180" fill="#90a4ae"/>
  <rect x="350" y="70" width="70" height="190" fill="#78909c"/>
  <rect x="425" y="90" width="75" height="170" fill="#90a4ae"/>
  <!-- Windows -->
  <g fill="#b3e5fc" opacity="0.6">
    <rect x="10" y="80" width="15" height="18" rx="1"/>
    <rect x="35" y="80" width="15" height="18" rx="1"/>
    <rect x="60" y="80" width="15" height="18" rx="1"/>
    <rect x="10" y="110" width="15" height="18" rx="1"/>
    <rect x="35" y="110" width="15" height="18" rx="1"/>
    <rect x="60" y="110" width="15" height="18" rx="1"/>
    <rect x="95" y="120" width="12" height="15" rx="1"/>
    <rect x="115" y="120" width="12" height="15" rx="1"/>
    <rect x="165" y="100" width="12" height="15" rx="1"/>
    <rect x="185" y="100" width="12" height="15" rx="1"/>
    <rect x="360" y="90" width="12" height="15" rx="1"/>
    <rect x="380" y="90" width="12" height="15" rx="1"/>
    <rect x="400" y="90" width="12" height="15" rx="1"/>
    <rect x="440" y="110" width="12" height="15" rx="1"/>
    <rect x="465" y="110" width="12" height="15" rx="1"/>
  </g>
  
  <!-- Road -->
  <rect x="0" y="260" width="500" height="40" fill="#616161"/>
  <line x1="0" y1="280" x2="500" y2="280" stroke="#fdd835" stroke-width="2" stroke-dasharray="20,15"/>
  
  <!-- Sidewalk -->
  <rect x="0" y="230" width="500" height="30" fill="url(#sidewalk2)"/>
  <line x1="0" y1="230" x2="500" y2="230" stroke="#999" stroke-width="1"/>
  
  <!-- Child (left) -->
  <g transform="translate(150,195)">
    <circle cx="0" cy="-20" r="10" fill="#ffb57c"/>
    <path d="M-10,-20 Q0,-28 10,-20" fill="#333"/>
    <!-- Body -->
    <path d="M0,-10 L0,8" stroke="#4caf50" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M0,8 L-5,25" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M0,8 L5,25" stroke="#ffb57c" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Shoes -->
    <ellipse cx="-6" cy="26" rx="5" ry="2.5" fill="#e53935"/>
    <ellipse cx="6" cy="26" rx="5" ry="2.5" fill="#e53935"/>
    <!-- Arms at sides -->
    <path d="M0,-5 Q-12,0 -14,8" stroke="#ffb57c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M0,-5 Q12,0 14,8" stroke="#ffb57c" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Backpack -->
    <rect x="-6" y="-8" width="12" height="14" rx="3" fill="#ff9800"/>
  </g>
  
  <!-- Stranger (right) -->
  <g transform="translate(320,185)">
    <circle cx="0" cy="-22" r="12" fill="#c9a87c"/>
    <!-- Hat -->
    <rect x="-14" y="-35" width="28" height="5" rx="1" fill="#333"/>
    <rect x="-8" y="-42" width="16" height="10" rx="2" fill="#333"/>
    <!-- Sunglasses -->
    <rect x="-9" y="-25" width="8" height="4" rx="1" fill="#333"/>
    <rect x="1" y="-25" width="8" height="4" rx="1" fill="#333"/>
    <line x1="-1" y1="-23" x2="1" y2="-23" stroke="#333" stroke-width="1"/>
    <!-- Dark coat -->
    <path d="M-12,-10 L-15,20 L15,20 L12,-10 Z" fill="#37474f"/>
    <!-- Hands in pockets -->
    <path d="M-10,5 L-15,15" stroke="#37474f" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M10,5 L15,15" stroke="#37474f" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <path d="M-6,20 L-8,38" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M6,20 L8,38" stroke="#333" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Safe distance indicator -->
  <line x1="165" y1="225" x2="305" y2="225" stroke="#4caf50" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Distance arrows -->
  <polygon points="165,225 172,222 172,228" fill="#4caf50"/>
  <polygon points="305,225 298,222 298,228" fill="#4caf50"/>
  <text x="235" y="220" text-anchor="middle" font-size="8" fill="#2e7d32" font-family="Arial">Безопасная дистанция</text>
  
  <!-- Stop hand gesture (between them) -->
  <g transform="translate(230,210)">
    <!-- Hand -->
    <rect x="-5" y="-12" width="10" height="14" rx="2" fill="#ffb57c"/>
    <!-- Fingers -->
    <rect x="-5" y="-20" width="2.5" height="10" rx="1" fill="#ffb57c"/>
    <rect x="-1" y="-22" width="2.5" height="12" rx="1" fill="#ffb57c"/>
    <rect x="3" y="-21" width="2.5" height="11" rx="1" fill="#ffb57c"/>
    <!-- Thumb -->
    <rect x="-8" y="-14" width="3" height="7" rx="1.5" fill="#ffb57c" transform="rotate(-20,-8,-14)"/>
  </g>
  
  <!-- No-go zone (red zone near stranger) -->
  <rect x="290" y="230" width="50" height="30" fill="#f44336" opacity="0.1" rx="3"/>
  <text x="315" y="244" text-anchor="middle" font-size="7" fill="#c62828" opacity="0.7" font-family="Arial">ОПАСНО</text>
  
  <!-- Safe zone (green near child) -->
  <rect x="120" y="230" width="50" height="30" fill="#4caf50" opacity="0.1" rx="3"/>
  <text x="145" y="244" text-anchor="middle" font-size="7" fill="#2e7d32" opacity="0.7" font-family="Arial">БЕЗОПАСНО</text>
  
  <!-- Phone icon for calling help -->
  <g transform="translate(90,170)">
    <rect x="-10" y="-15" width="20" height="30" rx="3" fill="#333"/>
    <rect x="-7" y="-10" width="14" height="20" rx="1" fill="#4fc3f7"/>
    <circle cx="0" cy="12" r="2" fill="#666"/>
    <text x="0" y="-12" text-anchor="middle" font-size="4" fill="#fff" font-family="Arial">112</text>
  </g>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Безопасность при общении с незнакомцами</text>
</svg>