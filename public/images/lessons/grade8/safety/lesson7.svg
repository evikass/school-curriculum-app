<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="water7s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="50%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <linearGradient id="sand7s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe082"/>
      <stop offset="100%" stop-color="#ffd54f"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#e1f5fe"/>
  
  <!-- Beach sand -->
  <path d="M0,200 Q100,190 200,195 Q300,200 400,193 Q450,190 500,195 L500,350 L0,350 Z" fill="url(#sand7s)"/>
  
  <!-- Water -->
  <path d="M0,210 Q80,200 160,208 Q240,216 320,205 Q400,195 500,208 L500,350 L0,350 Z" fill="url(#water7s)"/>
  
  <!-- Waves -->
  <g stroke="#b3e5fc" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M0,215 Q30,210 60,215 Q90,220 120,215"/>
    <path d="M150,205 Q180,200 210,205 Q240,210 270,205"/>
    <path d="M300,215 Q330,210 360,215 Q390,220 420,215"/>
    <path d="M50,240 Q80,235 110,240 Q140,245 170,240"/>
    <path d="M200,235 Q230,230 260,235 Q290,240 320,235"/>
  </g>
  
  <!-- Swimming flags (left) -->
  <g transform="translate(100,140)">
    <rect x="-2" y="-5" width="4" height="70" fill="#888"/>
    <!-- Red flag -->
    <rect x="2" y="-5" width="30" height="20" fill="#f44336"/>
    <text x="17" y="9" text-anchor="middle" font-size="7" fill="#fff" font-weight="bold" font-family="Arial">СТОП</text>
    <text x="15" y="78" text-anchor="middle" font-size="6" fill="#c62828" font-family="Arial">Купаться запрещено</text>
  </g>
  
  <!-- Green flag (right) -->
  <g transform="translate(350,145)">
    <rect x="-2" y="-5" width="4" height="65" fill="#888"/>
    <!-- Green flag -->
    <rect x="2" y="-5" width="30" height="20" fill="#4caf50"/>
    <text x="17" y="9" text-anchor="middle" font-size="6" fill="#fff" font-weight="bold" font-family="Arial">OK</text>
    <text x="15" y="73" text-anchor="middle" font-size="6" fill="#2e7d32" font-family="Arial">Купаться разрешено</text>
  </g>
  
  <!-- No diving sign -->
  <g transform="translate(230,150)">
    <rect x="-2" y="-5" width="4" height="55" fill="#888"/>
    <!-- Sign -->
    <circle cx="25" cy="10" r="20" fill="#fff" stroke="#e53935" stroke-width="3"/>
    <line x1="11" y1="24" x2="39" y2="-4" stroke="#e53935" stroke-width="3"/>
    <!-- Diver silhouette -->
    <g transform="translate(25,10)">
      <circle cx="-3" cy="-8" r="3" fill="#333"/>
      <path d="M-3,-5 L-3,3 M-3,3 L-7,9 M-3,3 L2,8 M-3,-2 Q-8,0 -10,4 M-3,-2 Q2,0 5,3" stroke="#333" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </g>
    <text x="25" y="42" text-anchor="middle" font-size="6" fill="#c62828" font-family="Arial">Нырять запрещено!</text>
  </g>
  
  <!-- Life buoy (bottom-right) -->
  <g transform="translate(430,270)">
    <circle r="30" fill="none" stroke="#e53935" stroke-width="8"/>
    <circle r="30" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="15,15"/>
    <circle r="15" fill="#4fc3f7" opacity="0.3"/>
    <!-- Rope -->
    <path d="M-25,-20 Q-35,-25 -30,-15" stroke="#8d6e63" stroke-width="2" fill="none"/>
    <path d="M25,20 Q35,25 30,15" stroke="#8d6e63" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Depth marker -->
  <g transform="translate(30,220)">
    <rect x="-8" y="-40" width="16" height="80" rx="2" fill="#1565c0"/>
    <text x="0" y="-28" text-anchor="middle" font-size="6" fill="#fff" font-family="Arial">1.5м</text>
    <line x1="-8" y1="-20" x2="8" y2="-20" stroke="#fff" stroke-width="1"/>
    <text x="0" y="-5" text-anchor="middle" font-size="6" fill="#fff" font-family="Arial">1.0м</text>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#fff" stroke-width="1"/>
    <text x="0" y="18" text-anchor="middle" font-size="6" fill="#fff" font-family="Arial">0.5м</text>
    <line x1="-8" y1="22" x2="8" y2="22" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Buoy boundary markers -->
  <g fill="#ff9800">
    <circle cx="160" cy="210" r="5"/>
    <circle cx="180" cy="212" r="5"/>
    <circle cx="200" cy="210" r="5"/>
    <circle cx="220" cy="212" r="5"/>
    <circle cx="240" cy="210" r="5"/>
    <circle cx="260" cy="212" r="5"/>
    <circle cx="280" cy="210" r="5"/>
    <circle cx="300" cy="212" r="5"/>
  </g>
  <line x1="160" y1="210" x2="300" y2="212" stroke="#ff9800" stroke-width="2" opacity="0.5"/>
  
  <!-- Swimmer in safe zone -->
  <g transform="translate(230,225)">
    <circle cx="0" cy="-5" r="5" fill="#ffb57c"/>
    <ellipse cx="0" cy="3" rx="12" ry="4" fill="#ffb57c" opacity="0.7"/>
    <path d="M8,0 Q15,-5 12,3" stroke="#ffb57c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Children playing on beach -->
  <g transform="translate(440,175)" opacity="0.6">
    <circle cx="0" cy="-8" r="5" fill="#ffb57c"/>
    <path d="M0,-3 L-2,8 M-2,8 L-5,15 M-2,8 L2,14" stroke="#ffb57c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#01579b" font-family="Arial, sans-serif">Правила поведения на воде</text>
</svg>