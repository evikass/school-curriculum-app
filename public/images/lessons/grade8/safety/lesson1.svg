<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="wall1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efebe9"/>
      <stop offset="100%" stop-color="#d7ccc8"/>
    </linearGradient>
    <linearGradient id="floor1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#wall1)"/>
  
  <!-- Floor -->
  <rect x="0" y="270" width="500" height="80" fill="url(#floor1)"/>
  <!-- Baseboard -->
  <rect x="0" y="268" width="500" height="5" fill="#5d4037"/>
  
  <!-- Door (left) -->
  <g transform="translate(80,110)">
    <!-- Door frame -->
    <rect x="-38" y="-10" width="76" height="145" rx="2" fill="#5d4037"/>
    <!-- Door panel -->
    <rect x="-34" y="-6" width="68" height="137" rx="1" fill="#8d6e63"/>
    <!-- Door panels -->
    <rect x="-28" y="0" width="56" height="50" rx="2" fill="#a1887f" stroke="#795548" stroke-width="1"/>
    <rect x="-28" y="58" width="56" height="65" rx="2" fill="#a1887f" stroke="#795548" stroke-width="1"/>
    <!-- Doorknob -->
    <circle cx="24" cy="75" r="5" fill="#ffd54f" stroke="#ffb300" stroke-width="1"/>
    <rect x="20" y="72" width="3" height="6" rx="1" fill="#ffb300"/>
    <!-- Lock indicator -->
    <rect x="18" y="65" width="12" height="6" rx="1" fill="#4caf50"/>
    <text x="24" y="70" text-anchor="middle" font-size="4" fill="#fff" font-family="Arial">LOCK</text>
    <!-- Keyhole -->
    <circle cx="24" cy="80" r="2" fill="#333"/>
    <!-- Deadbolt -->
    <rect x="28" y="72" width="8" height="3" rx="1" fill="#ffd54f"/>
  </g>
  
  <!-- Gas valve (center) -->
  <g transform="translate(250,200)">
    <!-- Gas pipe -->
    <rect x="-60" y="-5" width="120" height="10" rx="3" fill="#ffeb3b" stroke="#f9a825" stroke-width="1"/>
    <!-- Valve body -->
    <rect x="-15" y="-20" width="30" height="40" rx="4" fill="#ffeb3b" stroke="#f9a825" stroke-width="2"/>
    <!-- Valve handle -->
    <rect x="-20" y="-35" width="40" height="12" rx="3" fill="#f44336"/>
    <rect x="-3" y="-25" width="6" height="8" fill="#d32f2f"/>
    <!-- OFF indicator -->
    <circle cx="0" cy="-28" r="4" fill="#fff"/>
    <text x="0" y="-26" text-anchor="middle" font-size="5" fill="#f44336" font-weight="bold" font-family="Arial">OFF</text>
    <!-- Pipe connections -->
    <circle cx="-55" cy="0" r="6" fill="#f9a825" stroke="#f57f17" stroke-width="1"/>
    <circle cx="55" cy="0" r="6" fill="#f9a825" stroke="#f57f17" stroke-width="1"/>
    <!-- Gas indicator icon -->
    <g transform="translate(0,30)">
      <polygon points="0,-8 -7,5 7,5" fill="none" stroke="#f57f17" stroke-width="2"/>
      <text x="0" y="3" text-anchor="middle" font-size="9" fill="#f57f17" font-weight="bold" font-family="Arial">!</text>
      <text x="0" y="18" text-anchor="middle" font-size="7" fill="#e65100" font-family="Arial">Газ</text>
    </g>
  </g>
  
  <!-- Electrical panel (right) -->
  <g transform="translate(410,170)">
    <!-- Panel box -->
    <rect x="-40" y="-40" width="80" height="100" rx="4" fill="#78909c" stroke="#546e7a" stroke-width="2"/>
    <!-- Panel door -->
    <rect x="-36" y="-36" width="72" height="92" rx="2" fill="#90a4ae" stroke="#78909c" stroke-width="1"/>
    <!-- Circuit breakers -->
    <g fill="#f5f5f5" stroke="#bbb" stroke-width="0.5">
      <rect x="-28" y="-28" width="18" height="10" rx="1"/>
      <rect x="-6" y="-28" width="18" height="10" rx="1"/>
      <rect x="16" y="-28" width="18" height="10" rx="1"/>
      <rect x="-28" y="-14" width="18" height="10" rx="1"/>
      <rect x="-6" y="-14" width="18" height="10" rx="1"/>
      <rect x="16" y="-14" width="18" height="10" rx="1"/>
      <rect x="-28" y="0" width="18" height="10" rx="1"/>
      <rect x="-6" y="0" width="18" height="10" rx="1"/>
      <rect x="16" y="0" width="18" height="10" rx="1"/>
    </g>
    <!-- Switch indicators (some up, some down/tripped) -->
    <rect x="-24" y="-26" width="5" height="6" rx="1" fill="#4caf50"/>
    <rect x="-2" y="-26" width="5" height="6" rx="1" fill="#4caf50"/>
    <rect x="20" y="-26" width="5" height="6" rx="1" fill="#f44336"/>
    <rect x="-24" y="-12" width="5" height="6" rx="1" fill="#4caf50"/>
    <rect x="-2" y="-12" width="5" height="6" rx="1" fill="#4caf50"/>
    <rect x="20" y="-12" width="5" height="6" rx="1" fill="#4caf50"/>
    <rect x="-24" y="2" width="5" height="6" rx="1" fill="#4caf50"/>
    <rect x="-2" y="2" width="5" height="6" rx="1" fill="#f44336"/>
    <rect x="20" y="2" width="5" height="6" rx="1" fill="#4caf50"/>
    <!-- Warning sign -->
    <polygon points="0,-50 -8,-40 8,-40" fill="#fdd835" stroke="#f9a825" stroke-width="1"/>
    <text x="0" y="-43" text-anchor="middle" font-size="7" fill="#333" font-weight="bold" font-family="Arial">⚡</text>
    <!-- Main switch -->
    <rect x="-8" y="22" width="16" height="8" rx="2" fill="#e53935"/>
    <text x="0" y="29" text-anchor="middle" font-size="5" fill="#fff" font-family="Arial">MAIN</text>
    <text x="0" y="55" text-anchor="middle" font-size="7" fill="#e65100" font-family="Arial">Электрощиток</text>
  </g>
  
  <!-- Window with lock check (top-right) -->
  <g transform="translate(400,50)">
    <rect x="-30" y="-30" width="60" height="50" rx="2" fill="#b3e5fc" stroke="#5d4037" stroke-width="3"/>
    <line x1="0" y1="-30" x2="0" y2="20" stroke="#5d4037" stroke-width="2"/>
    <line x1="-30" y1="-5" x2="30" y2="-5" stroke="#5d4037" stroke-width="2"/>
    <!-- Window latch -->
    <rect x="-5" y="-8" width="10" height="5" rx="1" fill="#4caf50"/>
    <text x="0" y="32" text-anchor="middle" font-size="6" fill="#4caf50" font-family="Arial">✓</text>
  </g>
  
  <!-- Smoke detector on ceiling -->
  <g transform="translate(250,20)">
    <ellipse cx="0" cy="0" rx="18" ry="6" fill="#f5f5f5" stroke="#bbb" stroke-width="1"/>
    <circle cx="0" cy="-1" r="4" fill="#4caf50"/>
    <circle cx="0" cy="-1" r="2" fill="#81c784"/>
  </g>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Безопасность в квартире</text>
</svg>