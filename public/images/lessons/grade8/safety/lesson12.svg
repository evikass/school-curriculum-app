<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12s" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="ice12s" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg12s)"/>
  
  <!-- R.I.C.E. method sections -->
  
  <!-- R - Rest (top-left) -->
  <g transform="translate(80,75)">
    <rect x="-60" y="-50" width="120" height="100" rx="10" fill="white" opacity="0.9" stroke="#e53935" stroke-width="2"/>
    <circle r="18" fill="#e53935"/>
    <text x="0" y="7" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold" font-family="Arial">R</text>
    <!-- Resting foot icon -->
    <g transform="translate(0,28)">
      <path d="M-15,-5 Q-10,-12 0,-12 Q15,-12 20,-5 L20,5 Q15,10 0,10 Q-15,10 -15,5 Z" fill="#ffb57c" opacity="0.7"/>
      <!-- Crutch -->
      <line x1="25" y1="-15" x2="30" y2="10" stroke="#78909c" stroke-width="3"/>
      <path d="M22,-15 Q25,-20 30,-15" stroke="#78909c" stroke-width="3" fill="none"/>
      <rect x="28" y="8" width="5" height="3" rx="1" fill="#78909c"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-size="8" fill="#c62828" font-weight="bold" font-family="Arial">Покой</text>
  </g>
  
  <!-- I - Ice (top-right) -->
  <g transform="translate(250,75)">
    <rect x="-60" y="-50" width="120" height="100" rx="10" fill="white" opacity="0.9" stroke="#2196f3" stroke-width="2"/>
    <circle r="18" fill="#2196f3"/>
    <text x="0" y="7" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold" font-family="Arial">I</text>
    <!-- Ice pack on knee -->
    <g transform="translate(0,25)">
      <!-- Knee -->
      <ellipse cx="0" cy="0" rx="18" ry="12" fill="#ffb57c" opacity="0.7"/>
      <!-- Ice pack -->
      <rect x="-14" y="-8" width="28" height="16" rx="5" fill="url(#ice12s)" stroke="#4fc3f7" stroke-width="1.5"/>
      <!-- Ice crystals -->
      <text x="-5" y="2" font-size="6" fill="#0288d1" font-family="Arial">❄</text>
      <text x="3" y="-2" font-size="5" fill="#0288d1" font-family="Arial">❄</text>
    </g>
    <text x="0" y="55" text-anchor="middle" font-size="8" fill="#1565c0" font-weight="bold" font-family="Arial">Лёд</text>
  </g>
  
  <!-- C - Compression (bottom-left) -->
  <g transform="translate(80,230)">
    <rect x="-60" y="-50" width="120" height="100" rx="10" fill="white" opacity="0.9" stroke="#4caf50" stroke-width="2"/>
    <circle r="18" fill="#4caf50"/>
    <text x="0" y="7" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold" font-family="Arial">C</text>
    <!-- Bandage wrapping ankle -->
    <g transform="translate(0,25)">
      <!-- Ankle/foot -->
      <path d="M-12,-5 Q-8,-10 0,-10 Q12,-10 18,-5 L18,5 Q12,10 0,10 Q-12,10 -12,5 Z" fill="#ffb57c" opacity="0.7"/>
      <!-- Bandage wrap pattern -->
      <path d="M-14,0 L-8,-7 L0,0 L8,-7 L14,0" stroke="#eee" stroke-width="5" fill="none" stroke-linecap="round"/>
      <path d="M-14,4 L-8,-3 L0,4 L8,-3 L14,4" stroke="#e0e0e0" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Bandage end -->
      <path d="M14,2 L22,5" stroke="#eee" stroke-width="3"/>
    </g>
    <text x="0" y="55" text-anchor="middle" font-size="8" fill="#2e7d32" font-weight="bold" font-family="Arial">Давление</text>
  </g>
  
  <!-- E - Elevation (bottom-right) -->
  <g transform="translate(250,230)">
    <rect x="-60" y="-50" width="120" height="100" rx="10" fill="white" opacity="0.9" stroke="#ff9800" stroke-width="2"/>
    <circle r="18" fill="#ff9800"/>
    <text x="0" y="7" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold" font-family="Arial">E</text>
    <!-- Elevated leg -->
    <g transform="translate(0,20)">
      <!-- Pillow -->
      <ellipse cx="15" cy="10" rx="18" ry="8" fill="#e0e0e0" stroke="#bbb" stroke-width="1"/>
      <!-- Leg elevated on pillow -->
      <path d="M-25,5 L15,0" stroke="#ffb57c" stroke-width="7" fill="none" stroke-linecap="round"/>
      <!-- Foot -->
      <path d="M15,0 L22,-2" stroke="#ffb57c" stroke-width="6" fill="none" stroke-linecap="round"/>
      <!-- Up arrow showing elevation -->
      <path d="M25,-10 L25,-25" stroke="#ff9800" stroke-width="2" marker-end="url(#elevArr)"/>
      <defs>
        <marker id="elevArr" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
          <polygon points="0,6 4,0 8,6" fill="#ff9800"/>
        </marker>
      </defs>
    </g>
    <text x="0" y="55" text-anchor="middle" font-size="8" fill="#e65100" font-weight="bold" font-family="Arial">Возвышение</text>
  </g>
  
  <!-- Splint detail (far right) -->
  <g transform="translate(420,130)">
    <rect x="-55" y="-80" width="110" height="160" rx="8" fill="white" opacity="0.85" stroke="#795548" stroke-width="1.5"/>
    <text x="0" y="-65" text-anchor="middle" font-size="8" fill="#5d4037" font-weight="bold" font-family="Arial">ШИНИРОВАНИЕ</text>
    
    <!-- Arm with splint -->
    <g transform="translate(0,-20)">
      <!-- Arm -->
      <path d="M-30,10 L30,-10" stroke="#ffb57c" stroke-width="8" fill="none" stroke-linecap="round"/>
      <!-- Splint (board) -->
      <rect x="-35" y="12" width="70" height="8" rx="2" fill="#a1887f" stroke="#795548" stroke-width="1"/>
      <!-- Wrapping/ties -->
      <rect x="-20" y="10" width="6" height="12" rx="1" fill="#eee" opacity="0.8"/>
      <rect x="0" y="10" width="6" height="12" rx="1" fill="#eee" opacity="0.8"/>
      <rect x="20" y="10" width="6" height="12" rx="1" fill="#eee" opacity="0.8"/>
      <!-- Sling -->
      <path d="M-20,-15 Q0,-25 30,-5" stroke="#42a5f5" stroke-width="3" fill="none"/>
    </g>
  </g>
  
  <!-- Additional: bleeding control -->
  <g transform="translate(420,275)">
    <rect x="-50" y="-20" width="100" height="40" rx="5" fill="white" opacity="0.85" stroke="#e53935" stroke-width="1"/>
    <text x="0" y="-5" text-anchor="middle" font-size="7" fill="#c62828" font-weight="bold" font-family="Arial">При кровотечении:</text>
    <text x="0" y="8" text-anchor="middle" font-size="6" fill="#333" font-family="Arial">Давящая повязка</text>
    <text x="0" y="16" text-anchor="middle" font-size="6" fill="#333" font-family="Arial">Жгут выше раны</text>
  </g>
  
  <text x="250" y="342" text-anchor="middle" font-size="9" opacity="0.5" fill="#333" font-family="Arial, sans-serif">Первая помощь при травмах</text>
</svg>