    <rect x="-5" y="12" width="10" height="15" rx="2" fill="#42a5f5"/>
  </g>
  <g transform="translate(130,145)">
    <circle cx="0" cy="0" r="10" fill="#8d6e63"/>
    <circle cx="-3" cy="-2" r="1" fill="#333"/>
    <circle cx="3" cy="-2" r="1" fill="#333"/>
    <path d="M-3,3 Q0,6 3,3" fill="none" stroke="#333" stroke-width="0.8"/>
    <rect x="-5" y="12" width="10" height="15" rx="2" fill="#66bb6a"/>
  </g>
  <g transform="translate(180,145)">
    <circle cx="0" cy="0" r="10" fill="#ffe0b2"/>
    <circle cx="-3" cy="-2" r="1" fill="#333"/>
    <circle cx="3" cy="-2" r="1" fill="#333"/>
    <path d="M-3,3 Q0,6 3,3" fill="none" stroke="#333" stroke-width="0.8"/>
    <rect x="-5" y="12" width="10" height="15" rx="2" fill="#ffa726"/>
  </g>
  <g transform="translate(370,145)">
    <circle cx="0" cy="0" r="10" fill="#ffcc80"/>
    <circle cx="-3" cy="-2" r="1" fill="#333"/>
    <circle cx="3" cy="-2" r="1" fill="#333"/>
    <path d="M-3,3 Q0,6 3,3" fill="none" stroke="#333" stroke-width="0.8"/>
    <rect x="-5" y="12" width="10" height="15" rx="2" fill="#ef5350"/>
  </g>
  <g transform="translate(420,145)">
    <circle cx="0" cy="0" r="10" fill="#a1887f"/>
    <circle cx="-3" cy="-2" r="1" fill="#333"/>
    <circle cx="3" cy="-2" r="1" fill="#333"/>
    <path d="M-3,3 Q0,6 3,3" fill="none" stroke="#333" stroke-width="0.8"/>
