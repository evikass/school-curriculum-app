    <text x="0" y="18" font-size="6" fill="#333" text-anchor="middle">Защита от насилия</text>
  </g>
  <g transform="translate(130,268)">
    <circle r="8" fill="#7b1fa2" opacity="0.7"/>
    <text x="0" y="3" font-size="7" fill="#fff" text-anchor="middle">💊</text>
    <text x="0" y="18" font-size="6" fill="#333" text-anchor="middle">Право на здоровье</text>
  </g>
  <g transform="translate(270,268)">
    <circle r="8" fill="#00695c" opacity="0.7"/>
    <text x="0" y="3" font-size="7" fill="#fff" text-anchor="middle">🎭</text>
    <text x="0" y="18" font-size="6" fill="#333" text-anchor="middle">Право на отдых</text>
  </g>
  <g transform="translate(400,268)">
