  <text x="250" y="315" font-size="6" fill="#ffd600" text-anchor="middle">Ребёнок — каждый человек до 18 лет (Ст. 1)</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Конвенция о правах ребёнка</text>
