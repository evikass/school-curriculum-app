<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- UN logo (top center) -->
  <g transform="translate(250,55)">
    <circle r="35" fill="#1565c0" opacity="0.15" stroke="#1565c0" stroke-width="1.5"/>
    <!-- Simplified globe -->
    <circle r="22" fill="none" stroke="#1565c0" stroke-width="0.8" opacity="0.5"/>
    <ellipse rx="22" ry="8" fill="none" stroke="#1565c0" stroke-width="0.5" opacity="0.4"/>
    <ellipse rx="8" ry="22" fill="none" stroke="#1565c0" stroke-width="0.5" opacity="0.4"/>
    <!-- Olive branches -->
    <path d="M-28,10 Q-35,0 -28,-10" fill="none" stroke="#4caf50" stroke-width="1.5"/>
    <path d="M28,10 Q35,0 28,-10" fill="none" stroke="#4caf50" stroke-width="1.5"/>
    <text x="0" y="48" font-size="7" fill="#1565c0" text-anchor="middle" font-weight="bold">КОНВЕНЦИЯ О ПРАВАХ РЕБЁНКА</text>
    <text x="0" y="58" font-size="5" fill="#78909c" text-anchor="middle">ООН, 20 ноября 1989 г.</text>
  </g>
  <!-- Children of different backgrounds -->
  <g transform="translate(80,145)">
