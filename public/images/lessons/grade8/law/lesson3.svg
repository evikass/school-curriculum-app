<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="100%" stop-color="#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Passport (center, large) -->
  <g transform="translate(155,20)">
    <!-- Cover -->
    <rect x="0" y="0" width="190" height="240" rx="6" fill="#1a237e" stroke="#0d47a1" stroke-width="2"/>
    <!-- Cover text -->
    <text x="95" y="30" font-size="8" fill="#ffd600" text-anchor="middle" font-weight="bold">РОССИЙСКАЯ ФЕДЕРАЦИЯ</text>
    <!-- Coat of arms (simplified) -->
    <g transform="translate(95,70)">
      <path d="M-12,-12 L12,-12 L12,8 Q0,16 -12,8 Z" fill="#ffd600" stroke="#f57f17" stroke-width="1"/>
      <path d="M-15,-8 Q-22,-18 -12,-13" fill="#ffd600" opacity="0.7"/>
      <path d="M15,-8 Q22,-18 12,-13" fill="#ffd600" opacity="0.7"/>
      <circle cx="-8" cy="-18" r="2.5" fill="#ffd600"/>
      <circle cx="8" cy="-18" r="2.5" fill="#ffd600"/>
    </g>
    <text x="95" y="110" font-size="14" fill="#ffd600" text-anchor="middle" font-weight="bold">ПАСПОРТ</text>
    <line x1="30" y1="120" x2="160" y2="120" stroke="#ffd600" stroke-width="0.8"/>
    <text x="95" y="138" font-size="7" fill="#bbdefb" text-anchor="middle">Гражданина Российской</text>
    <text x="95" y="150" font-size="7" fill="#bbdefb" text-anchor="middle">Федерации</text>
    <!-- Passport lines -->
    <line x1="30" y1="165" x2="160" y2="165" stroke="#ffd600" stroke-width="0.3" opacity="0.5"/>
    <line x1="30" y1="175" x2="160" y2="175" stroke="#ffd600" stroke-width="0.3" opacity="0.5"/>
    <line x1="30" y1="185" x2="160" y2="185" stroke="#ffd600" stroke-width="0.3" opacity="0.5"/>
    <!-- MRZ hint -->
    <text x="95" y="210" font-size="4" fill="#546e7a" text-anchor="middle" letter-spacing="2">P&lt;RUSXXXXXXXXXXX</text>
    <text x="95" y="220" font-size="4" fill="#546e7a" text-anchor="middle" letter-spacing="2">XXXXXXXXXXXXXXX</text>
  </g>
  <!-- Citizenship criteria (left) -->
  <g transform="translate(50,290)">
    <rect x="-40" y="-12" width="80" height="24" rx="4" fill="#2e7d32" opacity="0.8"/>
    <text x="0" y="2" font-size="6" fill="#fff" text-anchor="middle">По рождению</text>
  </g>
  <g transform="translate(170,290)">
    <rect x="-50" y="-12" width="100" height="24" rx="4" fill="#c62828" opacity="0.8"/>
    <text x="0" y="2" font-size="6" fill="#fff" text-anchor="middle">По приёму (натурализация)</text>
  </g>
  <g transform="translate(310,290)">
    <rect x="-40" y="-12" width="80" height="24" rx="4" fill="#1565c0" opacity="0.8"/>
    <text x="0" y="2" font-size="6" fill="#fff" text-anchor="middle">Восстановление</text>
  </g>
  <g transform="translate(430,290)">
    <rect x="-40" y="-12" width="80" height="24" rx="4" fill="#ff6f00" opacity="0.8"/>
    <text x="0" y="2" font-size="6" fill="#fff" text-anchor="middle">Оптация</text>
  </g>
  <!-- Rights and duties (right side) -->
  <g transform="translate(430,50)">
    <rect x="-65" y="-25" width="130" height="180" rx="6" fill="#fff" opacity="0.85" stroke="#1a237e"/>
    <text x="0" y="-10" font-size="7" fill="#1a237e" text-anchor="middle" font-weight="bold">Права гражданина</text>
    <line x1="-55" y1="-3" x2="55" y2="-3" stroke="#1a237e" stroke-width="0.5"/>
    <text x="-50" y="10" font-size="5" fill="#2e7d32">✓ Избирать и быть избранным</text>
    <text x="-50" y="22" font-size="5" fill="#2e7d32">✓ Служить в гос. органах</text>
    <text x="-50" y="34" font-size="5" fill="#2e7d32">✓ Участвовать в управлении</text>
    <text x="-50" y="46" font-size="5" fill="#2e7d32">✓ Свобода передвижения</text>
    <text x="-50" y="58" font-size="5" fill="#2e7d32">✓ Право на защиту</text>
    <line x1="-55" y1="65" x2="55" y2="65" stroke="#1a237e" stroke-width="0.5"/>
    <text x="0" y="78" font-size="7" fill="#c62828" text-anchor="middle" font-weight="bold">Обязанности</text>
    <text x="-50" y="92" font-size="5" fill="#c62828">• Соблюдать законы</text>
    <text x="-50" y="104" font-size="5" fill="#c62828">• Платить налоги</text>
    <text x="-50" y="116" font-size="5" fill="#c62828">• Защищать Отечество</text>
    <text x="-50" y="128" font-size="5" fill="#c62828">• Беречь природу</text>
    <text x="-50" y="140" font-size="5" fill="#c62828">• Получать образование</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Гражданство РФ</text>
</svg>