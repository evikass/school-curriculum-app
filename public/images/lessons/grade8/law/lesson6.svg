<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efebe9"/>
      <stop offset="100%" stop-color="#d7ccc8"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Title -->
  <text x="250" y="22" font-size="9" fill="#3e2723" text-anchor="middle" font-weight="bold">ВИДЫ ЮРИДИЧЕСКОЙ ОТВЕТСТВЕННОСТИ</text>
  <!-- Criminal (left) -->
  <g transform="translate(75,130)">
    <rect x="-65" y="-70" width="130" height="175" rx="10" fill="#c62828" stroke="#880e4f" stroke-width="2"/>
    <rect x="-60" y="-65" width="120" height="25" rx="5" fill="#880e4f"/>
    <text x="0" y="-48" font-size="8" fill="#ffd600" text-anchor="middle" font-weight="bold">УГОЛОВНАЯ</text>
    <!-- Handcuffs icon -->
    <circle cx="-15" cy="-20" r="10" fill="none" stroke="#ffd600" stroke-width="2"/>
    <circle cx="15" cy="-20" r="10" fill="none" stroke="#ffd600" stroke-width="2"/>
    <line x1="-5" y1="-20" x2="5" y2="-20" stroke="#ffd600" stroke-width="2"/>
    <!-- Content -->
    <text x="0" y="5" font-size="6" fill="#fff" text-anchor="middle">За преступления</text>
    <line x1="-50" y1="12" x2="50" y2="12" stroke="#880e4f" stroke-width="0.5"/>
    <text x="0" y="25" font-size="5" fill="#ffcdd2">• Лишение свободы</text>
    <text x="0" y="36" font-size="5" fill="#ffcdd2">• Исправительные работы</text>
    <text x="0" y="47" font-size="5" fill="#ffcdd2">• Штраф</text>
    <text x="0" y="58" font-size="5" fill="#ffcdd2">• Обязательные работы</text>
    <text x="0" y="69" font-size="5" fill="#ffcdd2">• Ограничение свободы</text>
    <rect x="-40" y="76" width="80" height="14" rx="3" fill="#880e4f"/>
    <text x="0" y="86" font-size="5" fill="#ffd600" text-anchor="middle">Уголовный кодекс РФ</text>
  </g>
  <!-- Administrative (center-left) -->
  <g transform="translate(225,130)">
    <rect x="-65" y="-70" width="130" height="175" rx="10" fill="#ff6f00" stroke="#e65100" stroke-width="2"/>
    <rect x="-60" y="-65" width="120" height="25" rx="5" fill="#e65100"/>
    <text x="0" y="-48" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">АДМИНИСТРАТИВНАЯ</text>
    <!-- Warning icon -->
    <polygon points="0,-25 -12,-5 12,-5" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="0" y="-9" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">!</text>
    <!-- Content -->
    <text x="0" y="5" font-size="6" fill="#fff" text-anchor="middle">За правонарушения</text>
    <line x1="-50" y1="12" x2="50" y2="12" stroke="#e65100" stroke-width="0.5"/>
    <text x="0" y="25" font-size="5" fill="#fff3e0">• Предупреждение</text>
    <text x="0" y="36" font-size="5" fill="#fff3e0">• Административный штраф</text>
    <text x="0" y="47" font-size="5" fill="#fff3e0">• Лишение спец. права</text>
    <text x="0" y="58" font-size="5" fill="#fff3e0">• Административный арест</text>
    <text x="0" y="69" font-size="5" fill="#fff3e0">• Общественные работы</text>
    <rect x="-40" y="76" width="80" height="14" rx="3" fill="#e65100"/>
    <text x="0" y="86" font-size="5" fill="#fff" text-anchor="middle">КоАП РФ</text>
  </g>
  <!-- Civil (center-right) -->
  <g transform="translate(375,130)">
    <rect x="-65" y="-70" width="130" height="175" rx="10" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
    <rect x="-60" y="-65" width="120" height="25" rx="5" fill="#0d47a1"/>
    <text x="0" y="-48" font-size="8" fill="#ffd600" text-anchor="middle" font-weight="bold">ГРАЖДАНСКАЯ</text>
    <!-- Scales icon -->
    <line x1="0" y1="-25" x2="0" y2="-10" stroke="#ffd600" stroke-width="1.5"/>
    <line x1="-12" y1="-15" x2="12" y2="-15" stroke="#ffd600" stroke-width="1.5"/>
    <path d="M-12,-15 L-15,-5 Q-12,0 -9,-5 Z" fill="#ffd600" opacity="0.7"/>
    <path d="M12,-15 L9,-5 Q12,0 15,-5 Z" fill="#ffd600" opacity="0.7"/>
    <!-- Content -->
    <text x="0" y="5" font-size="6" fill="#fff" text-anchor="middle">За причинение вреда</text>
    <line x1="-50" y1="12" x2="50" y2="12" stroke="#0d47a1" stroke-width="0.5"/>
    <text x="0" y="25" font-size="5" fill="#bbdefb">• Возмещение убытков</text>
    <text x="0" y="36" font-size="5" fill="#bbdefb">• Неустойка</text>
    <text x="0" y="47" font-size="5" fill="#bbdefb">• Компенсация вреда</text>
    <text x="0" y="58" font-size="5" fill="#bbdefb">• Возврат имущества</text>
    <text x="0" y="69" font-size="5" fill="#bbdefb">• Исполнение обяз-ва</text>
    <rect x="-40" y="76" width="80" height="14" rx="3" fill="#0d47a1"/>
    <text x="0" y="86" font-size="5" fill="#ffd600" text-anchor="middle">Гражданский кодекс РФ</text>
  </g>
  <!-- Disciplinary (smaller, bottom) -->
  <g transform="translate(250,290)">
    <rect x="-80" y="-15" width="160" height="35" rx="6" fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="0" y="-2" font-size="7" fill="#ffd600" text-anchor="middle" font-weight="bold">ДИСЦИПЛИНАРНАЯ</text>
    <text x="0" y="10" font-size="5" fill="#c8e6c9" text-anchor="middle">Замечание • Выговор • Увольнение</text>
  </g>
  <!-- Severity indicator -->
  <rect x="30" y="320" width="440" height="12" rx="3" fill="none" stroke="#546e7a" stroke-width="0.5"/>
  <rect x="30" y="320" width="110" height="12" rx="3" fill="#1565c0" opacity="0.5"/>
  <rect x="140" y="320" width="110" height="12" fill="#ff6f00" opacity="0.5"/>
  <rect x="250" y="320" width="110" height="12" fill="#c62828" opacity="0.5"/>
  <rect x="360" y="320" width="110" height="12" rx="3" fill="#880e4f" opacity="0.5"/>
  <text x="85" y="329" font-size="5" fill="#fff" text-anchor="middle">Гражданская</text>
  <text x="195" y="329" font-size="5" fill="#fff" text-anchor="middle">Дисциплинарная</text>
  <text x="305" y="329" font-size="5" fill="#fff" text-anchor="middle">Административная</text>
  <text x="415" y="329" font-size="5" fill="#ffd600" text-anchor="middle">Уголовная</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Виды юридической ответственности</text>
</svg>