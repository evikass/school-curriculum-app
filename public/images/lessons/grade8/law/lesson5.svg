      <line x1="25" y1="-25" x2="25" y2="-10" stroke="#F9A825" stroke-width="1"/>
      <path d="M-35,-10 Q-25,-5 -15,-10" fill="none" stroke="#F9A825" stroke-width="1.5"/>
