  <text x="250" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#455A64" text-anchor="middle">Конституция РФ</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Основы права - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#455A64" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="5" fill="#455A64" opacity="0.18" rx="1"/>
  <rect x="410" y="75" width="60" height="5" fill="#1565C0" opacity="0.12" rx="1"/>
  <!-- ILLUSTRATION AREA: x=15..485, y=85..300 -->
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
  <rect x="15" y="85" width="470" height="215" fill="#FFF8E1"/><rect x="130" y="110" width="240" height="160" rx="5" fill="white" stroke="#F57F17" stroke-width="2"/><text x="250" y="140" font-family="Arial" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">КОНСТИТУЦИЯ</text><text x="250" y="160" font-family="Arial" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">РОССИЙСКОЙ ФЕДЕРАЦИИ</text><line x1="160" y1="170" x2="340" y2="170" stroke="#F57F17" stroke-width="1.5"/><g transform="translate(170,210) scale(1.0)"><line x1="0" y1="-25" x2="0" y2="20" stroke="#8D6E63" stroke-width="2.5"/><rect x="3" y="-20" width="28" height="7" fill="#fff"/><rect x="3" y="-13" width="28" height="7" fill="#1565C0"/><rect x="3" y="-6" width="28" height="7" fill="#C62828"/><circle cx="0" cy="-25" r="2" fill="#F9A825"/></g><text x="320" y="200" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">1993 год</text><text x="250" y="240" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Основной закон государства</text><text x="250" y="285" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Высший закон</text>
  </g>
