<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Title -->
  <text x="250" y="22" font-size="10" fill="#1b5e20" text-anchor="middle" font-weight="bold">СЕМЕЙНЫЙ БЮДЖЕТ</text>
  <!-- Balance beam -->
  <line x1="250" y1="40" x2="250" y2="60" stroke="#5d4037" stroke-width="3"/>
  <line x1="80" y1="55" x2="420" y2="55" stroke="#5d4037" stroke-width="2"/>
  <!-- Income side (left) -->
  <g transform="translate(0,0)">
    <text x="140" y="80" font-size="9" fill="#2e7d32" text-anchor="middle" font-weight="bold">ДОХОДЫ</text>
    <!-- Pie chart - income -->
    <circle cx="140" cy="155" r="60" fill="#fff" stroke="#90a4ae" stroke-width="1"/>
    <!-- Salary slice (largest) -->
    <path d="M140,155 L140,95 A60,60 0 0,1 192,120 Z" fill="#2e7d32"/>
    <!-- Bonus -->
    <path d="M140,155 L192,120 A60,60 0 0,1 200,155 Z" fill="#4caf50"/>
    <!-- Benefits -->
    <path d="M140,155 L200,155 A60,60 0 0,1 170,205 Z" fill="#81c784"/>
    <!-- Other -->
    <path d="M140,155 L170,205 A60,60 0 0,1 110,205 Z" fill="#a5d6a7"/>
    <!-- Pension/benefits -->
    <path d="M140,155 L110,205 A60,60 0 0,1 80,155 Z" fill="#c8e6c9"/>
    <!-- Passive income -->
    <path d="M140,155 L80,155 A60,60 0 0,1 88,120 Z" fill="#e8f5e9"/>
    <!-- Rest -->
    <path d="M140,155 L88,120 A60,60 0 0,1 140,95 Z" fill="#fff" stroke="#90a4ae" stroke-width="0.5"/>
    <!-- Labels -->
    <text x="170" y="115" font-size="6" fill="#fff">Зарплата</text>
    <text x="190" y="150" font-size="5" fill="#fff">Премия</text>
  </g>
  <!-- Expense side (right) -->
  <g transform="translate(0,0)">
    <text x="360" y="80" font-size="9" fill="#c62828" text-anchor="middle" font-weight="bold">РАСХОДЫ</text>
    <!-- Pie chart - expenses -->
    <circle cx="360" cy="155" r="60" fill="#fff" stroke="#90a4ae" stroke-width="1"/>
    <!-- Housing (largest) -->
    <path d="M360,155 L360,95 A60,60 0 0,1 412,120 Z" fill="#c62828"/>
    <!-- Food -->
    <path d="M360,155 L412,120 A60,60 0 0,1 420,155 Z" fill="#ef5350"/>
    <!-- Transport -->
    <path d="M360,155 L420,155 A60,60 0 0,1 400,200 Z" fill="#e57373"/>
    <!-- Clothing -->
    <path d="M360,155 L400,200 A60,60 0 0,1 370,212 Z" fill="#ef9a9a"/>
    <!-- Entertainment -->
    <path d="M360,155 L370,212 A60,60 0 0,1 340,212 Z" fill="#ffcdd2"/>
    <!-- Education -->
    <path d="M360,155 L340,212 A60,60 0 0,1 310,200 Z" fill="#ff8a80"/>
    <!-- Other -->
    <path d="M360,155 L310,200 A60,60 0 0,1 300,155 Z" fill="#ff5252"/>
    <!-- Savings -->
    <path d="M360,155 L300,155 A60,60 0 0,1 308,120 Z" fill="#ffd600"/>
    <!-- Rest -->
    <path d="M360,155 L308,120 A60,60 0 0,1 360,95 Z" fill="#fff" stroke="#90a4ae" stroke-width="0.5"/>
    <!-- Labels -->
    <text x="388" y="115" font-size="6" fill="#fff">Жильё</text>
    <text x="405" y="150" font-size="5" fill="#fff">Еда</text>
  </g>
  <!-- Balance indicator -->
  <rect x="150" y="225" width="200" height="30" rx="6" fill="#1a237e" opacity="0.85"/>
  <text x="250" y="244" font-size="8" fill="#ffd600" text-anchor="middle" font-weight="bold">БАЛАНС: ДОХОДЫ = РАСХОДЫ</text>
  <!-- Income categories legend -->
  <g transform="translate(20,270)">
    <circle cx="0" cy="0" r="4" fill="#2e7d32"/><text x="8" y="3" font-size="5" fill="#333">Зарплата</text>
    <circle cx="65" cy="0" r="4" fill="#4caf50"/><text x="73" y="3" font-size="5" fill="#333">Премия</text>
    <circle cx="120" cy="0" r="4" fill="#81c784"/><text x="128" y="3" font-size="5" fill="#333">Пособия</text>
    <circle cx="180" cy="0" r="4" fill="#a5d6a7"/><text x="188" y="3" font-size="5" fill="#333">Подработка</text>
  </g>
  <!-- Expense categories legend -->
  <g transform="translate(20,285)">
    <circle cx="0" cy="0" r="4" fill="#c62828"/><text x="8" y="3" font-size="5" fill="#333">Жильё</text>
    <circle cx="55" cy="0" r="4" fill="#ef5350"/><text x="63" y="3" font-size="5" fill="#333">Еда</text>
    <circle cx="95" cy="0" r="4" fill="#e57373"/><text x="103" y="3" font-size="5" fill="#333">Транспорт</text>
    <circle cx="170" cy="0" r="4" fill="#ffd600"/><text x="178" y="3" font-size="5" fill="#333">Сбережения</text>
  </g>
  <!-- Savings tip -->
  <rect x="250" y="270" width="230" height="35" rx="5" fill="#fff" opacity="0.8" stroke="#1a237e"/>
  <text x="365" y="283" font-size="6" fill="#1a237e" text-anchor="middle" font-weight="bold">Правило бюджета:</text>
  <text x="365" y="295" font-size="6" fill="#1a237e" text-anchor="middle">50% нужды • 30% желания • 20% сбережения</text>
  <!-- Budget types -->
  <rect x="250" y="310" width="70" height="18" rx="3" fill="#2e7d32" opacity="0.7"/>
  <text x="285" y="323" font-size="6" fill="#fff" text-anchor="middle">Профицит</text>
  <rect x="330" y="310" width="70" height="18" rx="3" fill="#78909c" opacity="0.7"/>
  <text x="365" y="323" font-size="6" fill="#fff" text-anchor="middle">Сбалансир.</text>
  <rect x="410" y="310" width="70" height="18" rx="3" fill="#c62828" opacity="0.7"/>
  <text x="445" y="323" font-size="6" fill="#fff" text-anchor="middle">Дефицит</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Семейный бюджет</text>
</svg>