<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Central Bank (top center) -->
  <rect x="160" y="15" width="180" height="65" rx="8" fill="#1a237e" stroke="#0d47a1" stroke-width="2"/>
  <text x="250" y="40" font-size="9" fill="#ffd600" text-anchor="middle" font-weight="bold">ЦЕНТРАЛЬНЫЙ БАНК</text>
  <text x="250" y="55" font-size="6" fill="#bbdefb" text-anchor="middle">Эмиссия денег • Регулирование</text>
  <text x="250" y="65" font-size="6" fill="#bbdefb" text-anchor="middle">Кредитная политика</text>
  <!-- Building icon -->
  <rect x="170" y="22" width="20" height="15" fill="#1a237e" stroke="#ffd600" stroke-width="0.5" opacity="0.5"/>
  <polygon points="168,22 180,16 192,22" fill="#1a237e" stroke="#ffd600" stroke-width="0.5" opacity="0.5"/>
  <!-- Arrow down to commercial banks -->
  <path d="M250,80 L250,110" stroke="#1a237e" stroke-width="2"/>
  <polygon points="250,110 246,103 254,103" fill="#1a237e"/>
  <text x="275" y="100" font-size="6" fill="#1a237e">Ставка рефинансирования</text>
  <!-- Commercial Banks row -->
  <rect x="30" y="115" width="120" height="50" rx="6" fill="#1565c0" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="90" y="138" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Сбербанк</text>
  <text x="90" y="152" font-size="5" fill="#bbdefb" text-anchor="middle">Коммерческий банк</text>
  <rect x="190" y="115" width="120" height="50" rx="6" fill="#1565c0" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="250" y="138" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">ВТБ</text>
  <text x="250" y="152" font-size="5" fill="#bbdefb" text-anchor="middle">Коммерческий банк</text>
  <rect x="350" y="115" width="120" height="50" rx="6" fill="#1565c0" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="410" y="138" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Альфа-Банк</text>
  <text x="410" y="152" font-size="5" fill="#bbdefb" text-anchor="middle">Коммерческий банк</text>
  <!-- Arrows down to depositors -->
  <path d="M90,165 L90,195" stroke="#2e7d32" stroke-width="1.5"/>
  <polygon points="90,195 86,188 94,188" fill="#2e7d32"/>
  <path d="M250,165 L250,195" stroke="#2e7d32" stroke-width="1.5"/>
  <polygon points="250,195 246,188 254,188" fill="#2e7d32"/>
  <path d="M410,165 L410,195" stroke="#2e7d32" stroke-width="1.5"/>
  <polygon points="410,195 406,188 414,188" fill="#2e7d32"/>
  <!-- Depositors / Loans (bottom) -->
  <!-- Depositor -->
  <rect x="25" y="200" width="130" height="55" rx="6" fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="90" y="218" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Вкладчики</text>
  <text x="90" y="230" font-size="5" fill="#c8e6c9" text-anchor="middle">Депозиты → Проценты</text>
  <!-- Bank building icon -->
  <rect x="35" y="235" width="15" height="10" fill="#4caf50" opacity="0.4"/>
  <polygon points="33,235 42,229 52,235" fill="#4caf50" opacity="0.4"/>
  <!-- Borrower -->
  <rect x="185" y="200" width="130" height="55" rx="6" fill="#c62828" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="250" y="218" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Заёмщики</text>
  <text x="250" y="230" font-size="5" fill="#ffcdd2" text-anchor="middle">Кредиты → Проценты</text>
  <!-- Money icon -->
  <circle cx="260" cy="240" r="8" fill="#ffd600" opacity="0.4"/>
  <text x="260" y="243" font-size="7" fill="#fff" text-anchor="middle">₽</text>
  <!-- Enterprise -->
  <rect x="345" y="200" width="130" height="55" rx="6" fill="#ff6f00" stroke="#e65100" stroke-width="1.5"/>
  <text x="410" y="218" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Предприятия</text>
  <text x="410" y="230" font-size="5" fill="#fff3e0" text-anchor="middle">Инвестиции → Прибыль</text>
  <!-- Factory icon -->
  <rect x="370" y="237" width="20" height="8" fill="#ffa726" opacity="0.4"/>
  <rect x="375" y="232" width="5" height="6" fill="#ffa726" opacity="0.4"/>
  <!-- Flow arrows between bottom entities -->
  <path d="M155,225 L185,225" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M315,225 L345,225" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Bidirectional interest flow -->
  <path d="M80,200 Q80,180 90,165" fill="none" stroke="#ffd600" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M100,165 Q110,180 100,200" fill="none" stroke="#c62828" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="50" y="185" font-size="4" fill="#ffd600">%</text>
  <text x="115" y="185" font-size="4" fill="#c62828">%</text>
  <!-- Key terms -->
  <rect x="40" y="270" width="420" height="50" rx="6" fill="#fff" opacity="0.8" stroke="#90a4ae"/>
  <text x="250" y="287" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">Двухуровневая банковская система</text>
  <text x="130" y="302" font-size="6" fill="#1a237e">ЦБ → регулирование</text>
  <text x="300" y="302" font-size="6" fill="#1565c0">КБ → обслуживание</text>
  <text x="130" y="314" font-size="6" fill="#2e7d32">Депозит = привлечение средств</text>
  <text x="330" y="314" font-size="6" fill="#c62828">Кредит = размещение средств</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Банковская система</text>
</svg>