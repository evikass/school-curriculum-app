<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#ffecb3"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Factory building (center) -->
  <rect x="150" y="100" width="200" height="120" fill="#546e7a" stroke="#37474f" stroke-width="2" rx="3"/>
  <!-- Roof with smokestacks -->
  <rect x="170" y="60" width="20" height="40" fill="#455a64" stroke="#37474f" stroke-width="1"/>
  <rect x="210" y="70" width="20" height="30" fill="#455a64" stroke="#37474f" stroke-width="1"/>
  <rect x="260" y="55" width="20" height="45" fill="#455a64" stroke="#37474f" stroke-width="1"/>
  <rect x="310" y="65" width="20" height="35" fill="#455a64" stroke="#37474f" stroke-width="1"/>
  <!-- Smoke -->
  <circle cx="180" cy="50" r="6" fill="#bdbdbd" opacity="0.4"/>
  <circle cx="175" cy="40" r="5" fill="#bdbdbd" opacity="0.3"/>
  <circle cx="270" cy="42" r="7" fill="#bdbdbd" opacity="0.35"/>
  <circle cx="265" cy="30" r="5" fill="#bdbdbd" opacity="0.25"/>
  <!-- Windows -->
  <g fill="#ffcc80" opacity="0.6">
    <rect x="165" y="115" width="20" height="15" rx="1"/>
    <rect x="195" y="115" width="20" height="15" rx="1"/>
    <rect x="225" y="115" width="20" height="15" rx="1"/>
    <rect x="255" y="115" width="20" height="15" rx="1"/>
    <rect x="285" y="115" width="20" height="15" rx="1"/>
    <rect x="315" y="115" width="20" height="15" rx="1"/>
    <rect x="165" y="145" width="20" height="15" rx="1"/>
    <rect x="195" y="145" width="20" height="15" rx="1"/>
    <rect x="225" y="145" width="20" height="15" rx="1"/>
    <rect x="255" y="145" width="20" height="15" rx="1"/>
    <rect x="285" y="145" width="20" height="15" rx="1"/>
    <rect x="315" y="145" width="20" height="15" rx="1"/>
  </g>
  <!-- Door -->
  <rect x="230" y="180" width="40" height="40" rx="2" fill="#37474f"/>
  <circle cx="262" cy="200" r="3" fill="#ffd600"/>
  <!-- Input arrow (left) -->
  <path d="M20,160 L130,160" stroke="#2e7d32" stroke-width="2.5"/>
  <polygon points="130,160 122,155 122,165" fill="#2e7d32"/>
  <!-- Input items -->
  <g transform="translate(30,120)">
    <rect x="-10" y="-10" width="20" height="20" rx="3" fill="#8d6e63" opacity="0.7"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Сырьё</text>
  </g>
  <g transform="translate(70,120)">
    <circle r="10" fill="#ff9800" opacity="0.7"/>
    <text x="0" y="3" font-size="5" fill="#fff" text-anchor="middle">Труд</text>
  </g>
  <g transform="translate(50,185)">
    <path d="M-8,-5 L8,-5 L8,5 Q0,10 -8,5 Z" fill="#1565c0" opacity="0.7"/>
    <text x="0" y="3" font-size="5" fill="#fff" text-anchor="middle">Капитал</text>
  </g>
  <text x="75" y="140" font-size="6" fill="#2e7d32" text-anchor="middle">ВХОДЫ</text>
  <!-- Output arrow (right) -->
  <path d="M370,160 L480,160" stroke="#c62828" stroke-width="2.5"/>
  <polygon points="480,160 472,155 472,165" fill="#c62828"/>
  <!-- Output items -->
  <g transform="translate(440,120)">
    <rect x="-12" y="-10" width="24" height="20" rx="2" fill="#2e7d32" opacity="0.7"/>
    <text x="0" y="3" font-size="5" fill="#fff" text-anchor="middle">Продукт</text>
  </g>
  <g transform="translate(470,120)">
    <rect x="-10" y="-10" width="20" height="20" rx="2" fill="#ff9800" opacity="0.7"/>
    <text x="0" y="3" font-size="5" fill="#fff" text-anchor="middle">Услуга</text>
  </g>
  <text x="450" y="140" font-size="6" fill="#c62828" text-anchor="middle">ВЫХОДЫ</text>
  <!-- Processing label inside factory -->
  <text x="250" y="195" font-size="7" fill="#fff" text-anchor="middle">ПРОИЗВОДСТВО</text>
  <!-- Profit formula (bottom) -->
  <rect x="100" y="240" width="300" height="45" rx="8" fill="#1a237e" opacity="0.85"/>
  <text x="250" y="260" font-size="10" fill="#ffd600" text-anchor="middle" font-weight="bold">ПРИБЫЛЬ = ВЫРУЧКА − ИЗДЕРЖКИ</text>
  <text x="250" y="278" font-size="7" fill="#bbdefb" text-anchor="middle">P = TR − TC</text>
  <!-- Cost breakdown -->
  <g transform="translate(50,300)">
    <rect x="-40" y="-8" width="80" height="16" rx="3" fill="#c62828" opacity="0.7"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Постоянные затраты</text>
  </g>
  <g transform="translate(180,300)">
    <rect x="-40" y="-8" width="80" height="16" rx="3" fill="#ff6f00" opacity="0.7"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Переменные затраты</text>
  </g>
  <g transform="translate(320,300)">
    <rect x="-45" y="-8" width="90" height="16" rx="3" fill="#2e7d32" opacity="0.7"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Валовая выручка</text>
  </g>
  <g transform="translate(445,300)">
    <rect x="-35" y="-8" width="70" height="16" rx="3" fill="#1a237e" opacity="0.85"/>
    <text x="0" y="3" font-size="6" fill="#ffd600" text-anchor="middle">Чистая прибыль</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Производство и прибыль</text>
</svg>