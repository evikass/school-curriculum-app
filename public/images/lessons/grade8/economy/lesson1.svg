<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Supply-Demand diagram (center) -->
  <rect x="60" y="20" width="250" height="220" fill="#fff" stroke="#90a4ae" stroke-width="1" rx="4"/>
  <!-- Axes -->
  <line x1="100" y1="30" x2="100" y2="220" stroke="#333" stroke-width="1.5"/>
  <line x1="80" y1="200" x2="300" y2="200" stroke="#333" stroke-width="1.5"/>
  <!-- Axis labels -->
  <text x="85" y="35" font-size="7" fill="#333">P</text>
  <text x="295" y="215" font-size="7" fill="#333">Q</text>
  <!-- Supply curve (upward) -->
  <path d="M120,190 Q170,160 200,130 Q230,100 270,60" fill="none" stroke="#1a237e" stroke-width="2.5"/>
  <text x="275" y="55" font-size="7" fill="#1a237e" font-weight="bold">S</text>
  <!-- Demand curve (downward) -->
  <path d="M120,60 Q160,90 200,120 Q240,150 270,185" fill="none" stroke="#c62828" stroke-width="2.5"/>
  <text x="275" y="190" font-size="7" fill="#c62828" font-weight="bold">D</text>
  <!-- Equilibrium point -->
  <circle cx="200" cy="120" r="5" fill="#ffd600" stroke="#f57f17" stroke-width="1.5"/>
  <line x1="200" y1="120" x2="100" y2="120" stroke="#f57f17" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="200" y1="120" x2="200" y2="200" stroke="#f57f17" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="85" y="123" font-size="6" fill="#f57f17">P*</text>
  <text x="196" y="215" font-size="6" fill="#f57f17">Q*</text>
  <text x="210" y="115" font-size="6" fill="#f57f17">E</text>
  <!-- Money icon (right) -->
  <g transform="translate(370,50)">
    <circle r="30" fill="#ffd600" opacity="0.3"/>
    <circle r="25" fill="#ffd600" opacity="0.5"/>
    <text x="0" y="8" font-size="24" fill="#f57f17" text-anchor="middle" font-weight="bold">₽</text>
    <text x="0" y="45" font-size="7" fill="#f57f17" text-anchor="middle">Деньги</text>
  </g>
  <!-- Goods icon (bottom right) -->
  <g transform="translate(380,160)">
    <rect x="-25" y="-20" width="50" height="40" rx="5" fill="#2e7d32" opacity="0.2"/>
    <rect x="-15" y="-10" width="12" height="12" rx="2" fill="#4caf50" opacity="0.6"/>
    <rect x="5" y="-10" width="12" height="12" rx="2" fill="#66bb6a" opacity="0.6"/>
    <rect x="-5" y="5" width="12" height="8" rx="2" fill="#81c784" opacity="0.6"/>
    <text x="0" y="35" font-size="7" fill="#2e7d32" text-anchor="middle">Товары</text>
  </g>
  <!-- Services icon -->
  <g transform="translate(460,160)">
    <circle r="15" fill="#1565c0" opacity="0.2"/>
    <circle r="10" fill="#42a5f5" opacity="0.4"/>
    <path d="M-5,0 L0,5 L8,-5" fill="none" stroke="#fff" stroke-width="2"/>
    <text x="0" y="28" font-size="7" fill="#1565c0" text-anchor="middle">Услуги</text>
  </g>
  <!-- Circular flow -->
  <!-- Producers -->
  <rect x="340" y="220" width="130" height="35" rx="6" fill="#1a237e" opacity="0.8"/>
  <text x="405" y="242" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Производители</text>
  <!-- Consumers -->
  <rect x="30" y="260" width="130" height="35" rx="6" fill="#c62828" opacity="0.8"/>
  <text x="95" y="282" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Потребители</text>
  <!-- Flow arrows -->
  <path d="M160,270 Q250,250 340,235" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="250" y="250" font-size="5" fill="#2e7d32" text-anchor="middle">Товары и услуги</text>
  <path d="M340,245 Q250,270 160,278" fill="none" stroke="#f57f17" stroke-width="1.5"/>
  <text x="250" y="275" font-size="5" fill="#f57f17" text-anchor="middle">Деньги</text>
  <!-- Title -->
  <text x="250" y="320" font-size="8" fill="#1a237e" text-anchor="middle" font-weight="bold">Что такое экономика</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Что такое экономика</text>
</svg>