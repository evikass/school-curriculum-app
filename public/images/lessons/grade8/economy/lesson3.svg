<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#b2ebf2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Chart area -->
  <rect x="60" y="20" width="400" height="260" fill="#fff" stroke="#90a4ae" stroke-width="1" rx="3"/>
  <!-- Grid -->
  <g stroke="#e0e0e0" stroke-width="0.5">
    <line x1="60" y1="72" x2="460" y2="72"/>
    <line x1="60" y1="124" x2="460" y2="124"/>
    <line x1="60" y1="176" x2="460" y2="176"/>
    <line x1="60" y1="228" x2="460" y2="228"/>
  </g>
  <!-- Axes -->
  <line x1="100" y1="20" x2="100" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="60" y1="260" x2="460" y2="260" stroke="#333" stroke-width="2"/>
  <!-- Axis arrows -->
  <polygon points="100,20 96,30 104,30" fill="#333"/>
  <polygon points="460,260 450,256 450,264" fill="#333"/>
  <!-- Axis labels -->
  <text x="90" y="18" font-size="9" fill="#333" font-weight="bold">P</text>
  <text x="462" y="275" font-size="9" fill="#333" font-weight="bold">Q</text>
  <text x="45" y="35" font-size="7" fill="#78909c">Цена</text>
  <text x="430" y="290" font-size="7" fill="#78909c">Количество</text>
  <!-- Supply curve (blue, upward) -->
  <path d="M130,250 Q200,220 260,180 Q320,140 400,60" fill="none" stroke="#1565c0" stroke-width="3"/>
  <text x="405" y="55" font-size="10" fill="#1565c0" font-weight="bold">S</text>
  <text x="415" y="65" font-size="6" fill="#1565c0">Предложение</text>
  <!-- Demand curve (red, downward) -->
  <path d="M130,50 Q200,100 260,150 Q320,200 400,250" fill="none" stroke="#c62828" stroke-width="3"/>
  <text x="405" y="250" font-size="10" fill="#c62828" font-weight="bold">D</text>
  <text x="415" y="260" font-size="6" fill="#c62828">Спрос</text>
  <!-- Equilibrium point -->
  <circle cx="260" cy="155" r="7" fill="#ffd600" stroke="#f57f17" stroke-width="2"/>
  <text x="272" y="148" font-size="8" fill="#f57f17" font-weight="bold">E</text>
  <!-- Dashed lines to axes -->
  <line x1="260" y1="155" x2="100" y2="155" stroke="#f57f17" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="260" y1="155" x2="260" y2="260" stroke="#f57f17" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="88" y="158" font-size="7" fill="#f57f17" font-weight="bold">P*</text>
  <text x="256" y="275" font-size="7" fill="#f57f17" font-weight="bold">Q*</text>
  <!-- Price above equilibrium -->
  <line x1="100" y1="100" x2="200" y2="100" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="88" y="103" font-size="6" fill="#ef5350">P₁</text>
  <!-- Surplus area -->
  <rect x="200" y="100" width="55" height="55" fill="#ef5350" opacity="0.1" stroke="#ef5350" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="228" y="130" font-size="6" fill="#c62828" text-anchor="middle">Избыток</text>
  <!-- Price below equilibrium -->
  <line x1="100" y1="210" x2="320" y2="210" stroke="#42a5f5" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="88" y="213" font-size="6" fill="#1565c0">P₂</text>
  <!-- Shortage area -->
  <rect x="200" y="155" width="120" height="55" fill="#42a5f5" opacity="0.1" stroke="#1565c0" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="260" y="185" font-size="6" fill="#1565c0" text-anchor="middle">Дефицит</text>
  <!-- Explanation box -->
  <rect x="30" y="295" width="440" height="30" rx="5" fill="#fff" opacity="0.8" stroke="#90a4ae"/>
  <text x="250" y="312" font-size="7" fill="#333" text-anchor="middle">Рыночное равновесие: цена, при которой объём спроса = объёму предложения</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Рыночный механизм</text>
</svg>