<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#f9a825"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Four functions of money -->
  <!-- Function 1: Medium of exchange (top-left) -->
  <rect x="25" y="20" width="210" height="130" rx="10" fill="#fff" stroke="#c62828" stroke-width="1.5"/>
  <circle cx="70" cy="65" r="28" fill="url(#coin)" stroke="#f57f17" stroke-width="1.5"/>
  <text x="70" y="70" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">₽</text>
  <!-- Exchange arrows -->
  <path d="M105,55 L140,45" stroke="#c62828" stroke-width="1.5"/>
  <polygon points="140,45 133,44 135,51" fill="#c62828"/>
  <rect x="140" y="35" width="15" height="15" rx="2" fill="#66bb6a" opacity="0.6"/>
  <path d="M105,80 L140,90" stroke="#c62828" stroke-width="1.5"/>
  <polygon points="140,90 133,89 135,96" fill="#c62828"/>
  <rect x="140" y="82" width="15" height="15" rx="2" fill="#42a5f5" opacity="0.6"/>
  <text x="165" y="55" font-size="7" fill="#c62828" font-weight="bold">Средство</text>
  <text x="165" y="65" font-size="7" fill="#c62828" font-weight="bold">обращения</text>
  <text x="165" y="78" font-size="5" fill="#78909c">Товар → Деньги → Товар</text>
  <text x="165" y="88" font-size="5" fill="#78909c">Т — Д — Т</text>
  <!-- Coin evolution -->
  <g transform="translate(55,110)">
    <circle r="8" fill="#ff9800" opacity="0.5"/>
    <text x="0" y="3" font-size="5" fill="#fff" text-anchor="middle">☿</text>
  </g>
  <text x="70" y="113" font-size="5" fill="#78909c">→</text>
  <g transform="translate(85,110)">
    <circle r="8" fill="url(#coin)" opacity="0.6"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">$</text>
  </g>
  <text x="100" y="113" font-size="5" fill="#78909c">→</text>
  <g transform="translate(115,110)">
    <rect x="-10" y="-6" width="20" height="12" rx="2" fill="#4caf50" opacity="0.6"/>
    <text x="0" y="3" font-size="5" fill="#fff" text-anchor="middle">₽</text>
  </g>
  <!-- Function 2: Measure of value (top-right) -->
  <rect x="265" y="20" width="210" height="130" rx="10" fill="#fff" stroke="#1565c0" stroke-width="1.5"/>
  <text x="370" y="45" font-size="8" fill="#1565c0" font-weight="bold">Мера стоимости</text>
  <!-- Price tags -->
  <g transform="translate(320,75)">
    <rect x="-18" y="-12" width="36" height="24" rx="3" fill="#42a5f5" opacity="0.3" stroke="#1565c0" stroke-width="1"/>
    <text x="0" y="5" font-size="8" fill="#1565c0" text-anchor="middle">100₽</text>
  </g>
  <g transform="translate(395,75)">
    <rect x="-18" y="-12" width="36" height="24" rx="3" fill="#42a5f5" opacity="0.3" stroke="#1565c0" stroke-width="1"/>
    <text x="0" y="5" font-size="8" fill="#1565c0" text-anchor="middle">500₽</text>
  </g>
  <!-- Ruler/scale -->
  <rect x="290" y="105" width="160" height="6" rx="2" fill="#1565c0" opacity="0.3"/>
  <g stroke="#1565c0" stroke-width="0.8">
    <line x1="300" y1="105" x2="300" y2="115"/>
    <line x1="340" y1="105" x2="340" y2="112"/>
    <line x1="380" y1="105" x2="380" y2="115"/>
    <line x1="420" y1="105" x2="420" y2="112"/>
  </g>
  <text x="370" y="128" font-size="5" fill="#78909c">Деньги измеряют ценность товаров</text>
  <!-- Function 3: Store of value (bottom-left) -->
  <rect x="25" y="170" width="210" height="130" rx="10" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="130" y="195" font-size="8" fill="#2e7d32" font-weight="bold">Средство накопления</text>
  <!-- Safe/vault -->
  <rect x="55" y="210" width="50" height="45" rx="4" fill="#5d4037" stroke="#3e2723" stroke-width="1.5"/>
  <circle cx="80" cy="232" r="8" fill="#78909c" stroke="#546e7a" stroke-width="1"/>
  <circle cx="80" cy="232" r="3" fill="#37474f"/>
  <!-- Gold bars inside -->
  <rect x="120" y="215" width="20" height="8" rx="1" fill="#ffd600" opacity="0.7"/>
  <rect x="120" y="225" width="20" height="8" rx="1" fill="#f9a825" opacity="0.7"/>
  <rect x="120" y="235" width="20" height="8" rx="1" fill="#ffd600" opacity="0.7"/>
  <!-- Piggy bank -->
  <ellipse cx="185" cy="232" rx="22" ry="16" fill="#ef9a9a" stroke="#e57373" stroke-width="1"/>
  <circle cx="200" cy="225" r="3" fill="#e57373"/>
  <rect x="180" y="218" width="5" height="5" fill="#5d4037"/>
  <text x="130" y="270" font-size="5" fill="#78909c">Сбережения на будущее</text>
  <!-- Function 4: World money (bottom-right) -->
  <rect x="265" y="170" width="210" height="130" rx="10" fill="#fff" stroke="#ff6f00" stroke-width="1.5"/>
  <text x="370" y="195" font-size="8" fill="#ff6f00" font-weight="bold">Мировые деньги</text>
  <!-- Globe -->
  <circle cx="340" cy="240" r="25" fill="#42a5f5" opacity="0.3" stroke="#1565c0" stroke-width="1"/>
  <ellipse cx="340" cy="240" rx="25" ry="8" fill="none" stroke="#1565c0" stroke-width="0.5" opacity="0.5"/>
  <ellipse cx="340" cy="240" rx="8" ry="25" fill="none" stroke="#1565c0" stroke-width="0.5" opacity="0.5"/>
  <!-- Currency symbols -->
  <text x="310" y="225" font-size="10" fill="#c62828">$</text>
  <text x="355" y="230" font-size="10" fill="#1a237e">€</text>
  <text x="335" y="260" font-size="10" fill="#2e7d32">¥</text>
  <text x="370" y="255" font-size="10" fill="#ff6f00">₽</text>
  <!-- Exchange arrows -->
  <path d="M385,220 Q410,210 420,225" fill="none" stroke="#ff6f00" stroke-width="1"/>
  <polygon points="420,225 414,220 416,228" fill="#ff6f00"/>
  <path d="M420,250 Q405,260 385,255" fill="none" stroke="#ff6f00" stroke-width="1"/>
  <polygon points="385,255 391,260 389,252" fill="#ff6f00"/>
  <text x="370" y="280" font-size="5" fill="#78909c">Международные расчёты</text>
  <!-- Evolution timeline -->
  <rect x="50" y="310" width="400" height="22" rx="5" fill="#fff" opacity="0.7" stroke="#90a4ae"/>
  <text x="250" y="325" font-size="6" fill="#546e7a" text-anchor="middle">Бартер → Раковины → Металл → Монеты → Банкноты → Электронные деньги</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Функции денег</text>
</svg>