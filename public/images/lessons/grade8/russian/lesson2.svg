<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="membersBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#membersBg)"/>
  <text x="250" y="28" font-family="Georgia" font-size="13" fill="#BF360C" text-anchor="middle" font-weight="bold">Главные и второстепенные члены предложения</text>
  <!-- Sentence -->
  <text x="250" y="65" font-family="Georgia" font-size="16" fill="#333" text-anchor="middle">
    Вчера старый кот быстро поймал маленькую мышь.
  </text>
  <!-- Underlines for each word -->
  <!-- Главные: подлежащее and сказуемое -->
  <!-- "кот" - подлежащее -->
  <line x1="155" y1="69" x2="185" y2="69" stroke="#D32F2F" stroke-width="3"/>
  <text x="170" y="85" font-family="Arial" font-size="9" fill="#D32F2F" text-anchor="middle">подлежащее</text>
  <!-- "поймал" - сказуемое -->
  <line x1="252" y1="69" x2="300" y2="69" stroke="#1565C0" stroke-width="3"/>
  <text x="276" y="85" font-family="Arial" font-size="9" fill="#1565C0" text-anchor="middle">сказуемое</text>
  <!-- Второстепенные -->
  <!-- "Вчера" - обстоятельство времени -->
  <line x1="215" y1="69" x2="247" y2="69" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="231" y="100" font-family="Arial" font-size="8" fill="#2E7D32" text-anchor="middle">обстоятельство</text>
  <!-- "старый" - определение -->
  <line x1="115" y1="69" x2="152" y2="69" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="133" y="100" font-family="Arial" font-size="8" fill="#7B1FA2" text-anchor="middle">определение</text>
  <!-- "быстро" - обстоятельство образа действия -->
  <line x1="305" y1="69" x2="340" y2="69" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="322" y="100" font-family="Arial" font-size="8" fill="#2E7D32" text-anchor="middle">обстоятельство</text>
  <!-- "маленькую" - определение -->
  <line x1="355" y1="69" x2="420" y2="69" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="387" y="100" font-family="Arial" font-size="8" fill="#7B1FA2" text-anchor="middle">определение</text>
  <!-- "мышь" - дополнение -->
  <line x1="425" y1="69" x2="460" y2="69" stroke="#FF6F00" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="442" y="100" font-family="Arial" font-size="8" fill="#E65100" text-anchor="middle">дополнение</text>
  <!-- Legend boxes -->
  <!-- Главные члены -->
  <rect x="20" y="120" width="220" height="100" rx="10" fill="#FFF" stroke="#D32F2F" stroke-width="2"/>
  <text x="130" y="142" font-family="Georgia" font-size="12" fill="#D32F2F" text-anchor="middle" font-weight="bold">ГЛАВНЫЕ ЧЛЕНЫ</text>
  <text x="130" y="162" font-family="Arial" font-size="10" fill="#D32F2F" text-anchor="middle">
    <tspan font-weight="bold">Подлежащее</tspan> — кто? что?
  </text>
  <text x="130" y="178" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle">
    <tspan font-weight="bold">Сказуемое</tspan> — что делает?
  </text>
  <text x="130" y="200" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Грамматическая основа предложения</text>
  <!-- Второстепенные члены -->
  <rect x="260" y="120" width="225" height="100" rx="10" fill="#FFF" stroke="#4CAF50" stroke-width="2"/>
  <text x="372" y="142" font-family="Georgia" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">ВТОРОСТЕПЕННЫЕ</text>
  <g font-family="Arial" font-size="10">
    <text x="280" y="162" fill="#9C27B0"><tspan font-weight="bold">Определение</tspan> — какой?</text>
    <text x="280" y="178" fill="#4CAF50"><tspan font-weight="bold">Обстоятельство</tspan> — где? как?</text>
    <text x="280" y="194" fill="#FF6F00"><tspan font-weight="bold">Дополнение</tspan> — кого? чего?</text>
  </g>
  <!-- Diagram showing connections -->
  <g transform="translate(250,280)">
    <!-- Central: кот поймал -->
    <rect x="-50" y="-15" width="100" height="30" rx="8" fill="#FFF" stroke="#333" stroke-width="1.5"/>
    <text x="0" y="5" font-family="Georgia" font-size="11" fill="#333" text-anchor="middle" font-weight="bold">кот поймал</text>
    <!-- Branches out -->
    <line x1="-50" y1="0" x2="-100" y2="-20" stroke="#9C27B0" stroke-width="1"/>
    <text x="-110" y="-22" font-family="Arial" font-size="9" fill="#7B1FA2" text-anchor="end">старый</text>
    <line x1="50" y1="0" x2="100" y2="-20" stroke="#FF6F00" stroke-width="1"/>
    <text x="110" y="-22" font-family="Arial" font-size="9" fill="#E65100" text-anchor="start">мышь</text>
    <line x1="0" y1="15" x2="-70" y2="35" stroke="#4CAF50" stroke-width="1"/>
    <text x="-80" y="38" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="end">вчера, быстро</text>
    <line x1="100" y1="-20" x2="140" y2="-35" stroke="#9C27B0" stroke-width="1"/>
    <text x="145" y="-33" font-family="Arial" font-size="9" fill="#7B1FA2" text-anchor="start">маленькую</text>
  </g>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Главные и второстепенные члены</text>
</svg>