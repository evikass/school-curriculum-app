<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="isolBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#isolBg)"/>
  <text x="250" y="28" font-family="Georgia" font-size="14" fill="#880E4F" text-anchor="middle" font-weight="bold">Обособленные члены предложения</text>
  <!-- Large comma illustrations -->
  <g transform="translate(60,80)">
    <text x="0" y="0" font-family="Georgia" font-size="60" fill="#880E4F" opacity="0.15">,</text>
  </g>
  <g transform="translate(420,80)">
    <text x="0" y="0" font-family="Georgia" font-size="60" fill="#880E4F" opacity="0.15">,</text>
  </g>
  <!-- Sentence with isolated members highlighted -->
  <rect x="25" y="50" width="450" height="45" rx="8" fill="#FFF" opacity="0.8"/>
  <text x="250" y="77" font-family="Georgia" font-size="13" fill="#333" text-anchor="middle">
    Мальчик,
    <tspan fill="#880E4F" font-weight="bold" font-style="italic">уставший от дороги</tspan>,
    сел отдыхать.
  </text>
  <!-- Bracket visualization showing isolation -->
  <g transform="translate(250,130)">
    <!-- Base sentence bar -->
    <rect x="-200" y="0" width="400" height="25" rx="5" fill="#E0E0E0"/>
    <text x="-150" y="17" font-family="Arial" font-size="10" fill="#333">Мальчик</text>
    <!-- Isolated phrase floating above with commas -->
    <rect x="-80" y="-40" width="160" height="28" rx="8" fill="#880E4F" opacity="0.15" stroke="#880E4F" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="0" y="-22" font-family="Georgia" font-size="10" fill="#880E4F" text-anchor="middle" font-style="italic">уставший от дороги</text>
    <!-- Commas on sides -->
    <text x="-85" y="-20" font-family="Georgia" font-size="18" fill="#880E4F">,</text>
    <text x="80" y="-20" font-family="Georgia" font-size="18" fill="#880E4F">,</text>
    <!-- Connection lines -->
    <line x1="-40" y1="-12" x2="-40" y2="0" stroke="#880E4F" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="40" y1="-12" x2="40" y2="0" stroke="#880E4F" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="100" y="17" font-family="Arial" font-size="10" fill="#333">сел отдыхать</text>
  </g>
  <!-- Types of isolated members -->
  <g transform="translate(0,195)">
    <!-- Обособленные определения -->
    <rect x="20" y="0" width="220" height="55" rx="8" fill="#FFF" stroke="#880E4F" stroke-width="1.5"/>
    <text x="130" y="18" font-family="Georgia" font-size="10" fill="#880E4F" text-anchor="middle" font-weight="bold">Обособленные определения</text>
    <text x="130" y="33" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Причастный оборот после</text>
    <text x="130" y="46" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">определяемого слова</text>
    <!-- Обособленные обстоятельства -->
    <rect x="260" y="0" width="220" height="55" rx="8" fill="#FFF" stroke="#6A1B9A" stroke-width="1.5"/>
    <text x="370" y="18" font-family="Georgia" font-size="10" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Обособленные обстоятельства</text>
    <text x="370" y="33" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Деепричастный оборот,</text>
    <text x="370" y="46" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">сравнительный оборот</text>
    <!-- Обособленные дополнения -->
    <rect x="140" y="65" width="220" height="55" rx="8" fill="#FFF" stroke="#1565C0" stroke-width="1.5"/>
    <text x="250" y="83" font-family="Georgia" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Обособленные дополнения</text>
    <text x="250" y="98" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">С предлогами кроме, помимо,</text>
    <text x="250" y="111" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">вместо, сверх, за исключением</text>
  </g>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Обособленные члены</text>
</svg>