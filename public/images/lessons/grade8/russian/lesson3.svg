<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="homogBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="100%" stop-color="#B2EBF2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#homogBg)"/>
  <text x="250" y="28" font-family="Georgia" font-size="14" fill="#006064" text-anchor="middle" font-weight="bold">Однородные члены предложения</text>
  <!-- Example sentence with highlighted homogeneous members -->
  <rect x="30" y="45" width="440" height="50" rx="10" fill="#FFF" opacity="0.8"/>
  <text x="250" y="72" font-family="Georgia" font-size="15" fill="#333" text-anchor="middle">
    В саду росли
    <tspan fill="#D32F2F" font-weight="bold">яблони</tspan>,
    <tspan fill="#D32F2F" font-weight="bold">груши</tspan>
    и
    <tspan fill="#D32F2F" font-weight="bold">вишни</tspan>.
  </text>
  <!-- Parallel bars symbolizing homogeneous members -->
  <g transform="translate(250,140)">
    <!-- Parallel vertical bars (same height = same type) -->
    <rect x="-80" y="-40" width="30" height="80" rx="5" fill="#D32F2F" opacity="0.2" stroke="#D32F2F" stroke-width="2"/>
    <text x="-65" y="5" font-family="Georgia" font-size="12" fill="#D32F2F" text-anchor="middle" font-weight="bold">Я</text>
    <rect x="-35" y="-40" width="30" height="80" rx="5" fill="#D32F2F" opacity="0.2" stroke="#D32F2F" stroke-width="2"/>
    <text x="-20" y="5" font-family="Georgia" font-size="12" fill="#D32F2F" text-anchor="middle" font-weight="bold">Г</text>
    <rect x="10" y="-40" width="30" height="80" rx="5" fill="#D32F2F" opacity="0.2" stroke="#D32F2F" stroke-width="2"/>
    <text x="25" y="5" font-family="Georgia" font-size="12" fill="#D32F2F" text-anchor="middle" font-weight="bold">В</text>
    <!-- Connecting symbols between them -->
    <text x="-48" y="5" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">,</text>
    <text x="-3" y="5" font-family="Arial" font-size="14" fill="#666" text-anchor="middle">,</text>
    <!-- "и" connector -->
    <text x="50" y="5" font-family="Georgia" font-size="12" fill="#1565C0" text-anchor="middle">и</text>
    <!-- Equal signs (they're the same type) -->
    <text x="-65" y="-50" font-family="Arial" font-size="12" fill="#D32F2F" text-anchor="middle">=</text>
    <text x="-20" y="-50" font-family="Arial" font-size="12" fill="#D32F2F" text-anchor="middle">=</text>
    <text x="25" y="-50" font-family="Arial" font-size="12" fill="#D32F2F" text-anchor="middle">=</text>
  </g>
  <!-- Conjunctions section -->
  <rect x="30" y="200" width="440" height="70" rx="10" fill="#FFF" opacity="0.8"/>
  <text x="250" y="220" font-family="Georgia" font-size="11" fill="#333" text-anchor="middle" font-weight="bold">Союзы при однородных членах:</text>
  <g font-family="Arial" font-size="11">
    <!-- Соединительные -->
    <text x="70" y="242" fill="#1565C0" font-weight="bold">Соединительные:</text>
    <text x="70" y="258" fill="#333">и, да (=и), ни…ни</text>
    <!-- Противительные -->
    <text x="270" y="242" fill="#D32F2F" font-weight="bold">Противительные:</text>
    <text x="270" y="258" fill="#333">а, но, да (=но), однако</text>
  </g>
  <!-- More examples -->
  <rect x="30" y="280" width="210" height="45" rx="8" fill="#E3F2FD" opacity="0.7"/>
  <text x="135" y="298" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">С перечислением:</text>
  <text x="135" y="315" font-family="Georgia" font-size="10" fill="#333" text-anchor="middle">Р, Р, Р и Р</text>
  <rect x="260" y="280" width="210" height="45" rx="8" fill="#FFEBEE" opacity="0.7"/>
  <text x="365" y="298" font-family="Arial" font-size="10" fill="#D32F2F" text-anchor="middle" font-weight="bold">С противением:</text>
  <text x="365" y="315" font-family="Georgia" font-size="10" fill="#333" text-anchor="middle">Р, а Р / Р, но Р</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Однородные члены</text>
</svg>