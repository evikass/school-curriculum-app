<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sscBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sscBg)"/>
  <text x="250" y="28" font-family="Georgia" font-size="12" fill="#004D40" text-anchor="middle" font-weight="bold">Сложносочинённые и сложноподчинённые предложения</text>
  <!-- Сложносочинённое (left) -->
  <rect x="15" y="45" width="235" height="170" rx="10" fill="#FFF" stroke="#1565C0" stroke-width="2.5"/>
  <rect x="15" y="45" width="235" height="30" rx="10" fill="#1565C0"/>
  <rect x="15" y="65" width="235" height="10" fill="#1565C0"/>
  <text x="132" y="68" font-family="Georgia" font-size="10" fill="#FFF" text-anchor="middle" font-weight="bold">СЛОЖНОСОЧИНЁННОЕ (ССП)</text>
  <!-- Two equal boxes side by side -->
  <rect x="25" y="85" width="95" height="50" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="72" y="105" font-family="Georgia" font-size="9" fill="#1565C0" text-anchor="middle">Ветер дул,</text>
  <text x="72" y="118" font-family="Arial" font-size="7" fill="#999" text-anchor="middle">1-я часть</text>
  <!-- Equal sign -->
  <text x="132" y="113" font-family="Arial" font-size="16" fill="#FF6F00" text-anchor="middle" font-weight="bold">=</text>
  <rect x="145" y="85" width="95" height="50" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="192" y="105" font-family="Georgia" font-size="9" fill="#1565C0" text-anchor="middle">но дождя не было.</text>
  <text x="192" y="118" font-family="Arial" font-size="7" fill="#999" text-anchor="middle">2-я часть</text>
  <!-- Conjunction label -->
  <rect x="85" y="140" width="95" height="25" rx="6" fill="#FF6F00" opacity="0.15" stroke="#FF6F00" stroke-width="1"/>
  <text x="132" y="157" font-family="Arial" font-size="9" fill="#E65100" text-anchor="middle">Союз: но, а, и, или</text>
  <!-- Key point -->
  <text x="132" y="182" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Части равноправны,</text>
  <text x="132" y="195" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">можно поменять местами</text>
  <text x="132" y="210" font-family="Arial" font-size="8" fill="#1565C0" text-anchor="middle" font-style="italic">Дождя не было, но ветер дул. ✓</text>
  <!-- Сложноподчинённое (right) -->
  <rect x="265" y="45" width="225" height="170" rx="10" fill="#FFF" stroke="#2E7D32" stroke-width="2.5"/>
  <rect x="265" y="45" width="225" height="30" rx="10" fill="#2E7D32"/>
  <rect x="265" y="65" width="225" height="10" fill="#2E7D32"/>
  <text x="377" y="68" font-family="Georgia" font-size="10" fill="#FFF" text-anchor="middle" font-weight="bold">СЛОЖНОПОДЧИНЁННОЕ (СПП)</text>
  <!-- Main clause big, subordinate small -->
  <rect x="275" y="85" width="205" height="40" rx="8" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <text x="377" y="108" font-family="Georgia" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Я знаю,</text>
  <text x="377" y="118" font-family="Arial" font-size="7" fill="#999" text-anchor="middle">Главная часть</text>
  <!-- Arrow down to subordinate -->
  <path d="M377,125 L377,135" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrSub)"/>
  <defs>
    <marker id="arrSub" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#2E7D32"/>
    </marker>
  </defs>
  <!-- Subordinate clause -->
  <rect x="285" y="140" width="185" height="40" rx="8" fill="#FFF" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="377" y="160" font-family="Georgia" font-size="10" fill="#E65100" text-anchor="middle">что он прав.</text>
  <text x="377" y="172" font-family="Arial" font-size="7" fill="#999" text-anchor="middle">Придаточная часть</text>
  <!-- Conjunction label -->
  <rect x="310" y="185" width="135" height="25" rx="6" fill="#FF9800" opacity="0.15" stroke="#FF9800" stroke-width="1"/>
  <text x="377" y="202" font-family="Arial" font-size="9" fill="#E65100" text-anchor="middle">Союз: что, чтобы, если...</text>
  <!-- Key point -->
  <text x="377" y="218" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Главная + придаточная</text>
  <text x="377" y="210" font-family="Arial" font-size="8" fill="#2E7D32" text-anchor="middle" font-style="italic">✗ Что он прав, я знаю.</text>
  <!-- Comparison table -->
  <rect x="20" y="230" width="460" height="80" rx="10" fill="#FFF" opacity="0.9"/>
  <line x1="250" y1="235" x2="250" y2="305" stroke="#DDD" stroke-width="1"/>
  <text x="135" y="250" font-family="Georgia" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">ССП</text>
  <text x="365" y="250" font-family="Georgia" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">СПП</text>
  <text x="135" y="268" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Части = равноправны</text>
  <text x="365" y="268" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Главная → придаточная</text>
  <text x="135" y="285" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Союзы: и, а, но, или</text>
  <text x="365" y="285" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Союзы: что, чтобы, если</text>
  <text x="135" y="302" font-family="Arial" font-size="9" fill="#FF6F00" text-anchor="middle">Можно поменять местами</text>
  <text x="365" y="302" font-family="Arial" font-size="9" fill="#FF6F00" text-anchor="middle">Нельзя поменять местами</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Сложносочинённые и сложноподчинённые</text>
</svg>