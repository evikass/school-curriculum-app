<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="speechBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#speechBg)"/>
  <text x="250" y="28" font-family="Georgia" font-size="14" fill="#E65100" text-anchor="middle" font-weight="bold">Прямая и косвенная речь</text>
  <!-- Direct speech (left) -->
  <rect x="15" y="45" width="235" height="160" rx="10" fill="#FFF" stroke="#E65100" stroke-width="2"/>
  <rect x="15" y="45" width="235" height="28" rx="10" fill="#E65100"/>
  <rect x="15" y="62" width="235" height="11" fill="#E65100"/>
  <text x="132" y="66" font-family="Georgia" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">ПРЯМАЯ РЕЧЬ</text>
  <!-- Speech bubble with quote -->
  <path d="M40,90 Q40,85 45,85 L210,85 Q215,85 215,90 L215,135 Q215,140 210,140 L120,140 L110,155 L115,140 L45,140 Q40,140 40,135Z" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="127" y="108" font-family="Georgia" font-size="12" fill="#333" text-anchor="middle">
    <tspan fill="#C62828">«Я люблю читать»</tspan>
  </text>
  <text x="127" y="125" font-family="Georgia" font-size="10" fill="#666" text-anchor="middle">— сказал Петя.</text>
  <!-- Format -->
  <rect x="30" y="160" width="205" height="30" rx="5" fill="#FFF3E0"/>
  <text x="132" y="180" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle">А: «П».</text>
  <!-- Arrow between the two -->
  <g transform="translate(250,130)">
    <path d="M0,-15 L25,0 L0,15" fill="#1565C0"/>
    <text x="12" y="-20" font-family="Arial" font-size="9" fill="#1565C0" text-anchor="middle">→</text>
  </g>
  <!-- Indirect speech (right) -->
  <rect x="265" y="45" width="225" height="160" rx="10" fill="#FFF" stroke="#1565C0" stroke-width="2"/>
  <rect x="265" y="45" width="225" height="28" rx="10" fill="#1565C0"/>
  <rect x="265" y="62" width="225" height="11" fill="#1565C0"/>
  <text x="377" y="66" font-family="Georgia" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">КОСВЕННАЯ РЕЧЬ</text>
  <!-- Converted sentence -->
  <rect x="280" y="85" width="195" height="55" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="377" y="108" font-family="Georgia" font-size="12" fill="#333" text-anchor="middle">
    Петя сказал,
  </text>
  <text x="377" y="125" font-family="Georgia" font-size="12" fill="#1565C0" text-anchor="middle">
    что он любит читать.
  </text>
  <!-- Format -->
  <rect x="280" y="160" width="195" height="30" rx="5" fill="#E3F2FD"/>
  <text x="377" y="180" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle">А сказал, что П.</text>
  <!-- Conversion rules -->
  <rect x="20" y="220" width="460" height="95" rx="10" fill="#FFF" opacity="0.9"/>
  <text x="250" y="240" font-family="Georgia" font-size="11" fill="#333" text-anchor="middle" font-weight="bold">Правила замены при переводе в косвенную речь:</text>
  <g font-family="Arial" font-size="10">
    <text x="40" y="260" fill="#E65100">«Я» → <tspan fill="#1565C0">он / она</tspan></text>
    <text x="40" y="278" fill="#E65100">«Мой» → <tspan fill="#1565C0">его / её</tspan></text>
    <text x="260" y="260" fill="#E65100">«Мы» → <tspan fill="#1565C0">они</tspan></text>
    <text x="260" y="278" fill="#E65100">«Этот» → <tspan fill="#1565C0">тот</tspan></text>
    <text x="40" y="296" fill="#E65100">«Сейчас» → <tspan fill="#1565C0">тогда</tspan></text>
    <text x="260" y="296" fill="#E65100">«Здесь» → <tspan fill="#1565C0">там</tspan></text>
  </g>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Прямая и косвенная речь</text>
</svg>