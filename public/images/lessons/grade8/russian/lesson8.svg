<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="complexBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#complexBg)"/>
  <text x="250" y="28" font-family="Georgia" font-size="14" fill="#0D47A1" text-anchor="middle" font-weight="bold">Сложное предложение</text>
  <!-- Two clause boxes connected -->
  <!-- Clause 1 -->
  <rect x="30" y="50" width="195" height="65" rx="10" fill="#FFF" stroke="#1565C0" stroke-width="2.5"/>
  <text x="127" y="72" font-family="Georgia" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Первая часть</text>
  <text x="127" y="90" font-family="Georgia" font-size="12" fill="#333" text-anchor="middle">Наступил вечер,</text>
  <text x="127" y="106" font-family="Arial" font-size="8" fill="#999" text-anchor="middle">(простое предложение)</text>
  <!-- Conjunction connector -->
  <g transform="translate(250,82)">
    <rect x="-20" y="-15" width="40" height="30" rx="15" fill="#FF6F00" stroke="#E65100" stroke-width="2"/>
    <text x="0" y="5" font-family="Georgia" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">и</text>
  </g>
  <line x1="225" y1="82" x2="230" y2="82" stroke="#FF6F00" stroke-width="2"/>
  <line x1="270" y1="82" x2="275" y2="82" stroke="#FF6F00" stroke-width="2"/>
  <!-- Clause 2 -->
  <rect x="275" y="50" width="195" height="65" rx="10" fill="#FFF" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="372" y="72" font-family="Georgia" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Вторая часть</text>
  <text x="372" y="90" font-family="Georgia" font-size="12" fill="#333" text-anchor="middle">зазвёзды зажглись.</text>
  <text x="372" y="106" font-family="Arial" font-size="8" fill="#999" text-anchor="middle">(простое предложение)</text>
  <!-- Full sentence -->
  <rect x="50" y="130" width="400" height="30" rx="8" fill="#FFF" opacity="0.8"/>
  <text x="250" y="150" font-family="Georgia" font-size="13" fill="#333" text-anchor="middle">
    Наступил вечер,<tspan fill="#FF6F00" font-weight="bold"> и </tspan>звёзды зажглись.
  </text>
  <!-- Types of complex sentences -->
  <!-- Союзные -->
  <rect x="30" y="175" width="215" height="145" rx="10" fill="#FFF" stroke="#1565C0" stroke-width="2"/>
  <text x="137" y="195" font-family="Georgia" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">СОЮЗНЫЕ</text>
  <!-- Сочинительные -->
  <rect x="40" y="205" width="90" height="50" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <text x="85" y="222" font-family="Georgia" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Сочинительные</text>
  <text x="85" y="240" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">и, а, но, или</text>
  <!-- Подчинительные -->
  <rect x="140" y="205" width="95" height="50" rx="6" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="187" y="222" font-family="Georgia" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Подчинительные</text>
  <text x="187" y="240" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">что, потому что</text>
  <!-- Examples -->
  <text x="85" y="275" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Равноправные части</text>
  <text x="187" y="275" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Главная + придаточная</text>
  <text x="85" y="290" font-family="Georgia" font-size="8" fill="#333" text-anchor="middle" font-style="italic">Ветер дул,</text>
  <text x="85" y="302" font-family="Georgia" font-size="8" fill="#333" text-anchor="middle" font-style="italic">но дождя не было.</text>
  <text x="187" y="290" font-family="Georgia" font-size="8" fill="#333" text-anchor="middle" font-style="italic">Я знаю,</text>
  <text x="187" y="302" font-family="Georgia" font-size="8" fill="#333" text-anchor="middle" font-style="italic">что он прав.</text>
  <!-- Бессоюзные -->
  <rect x="265" y="175" width="215" height="145" rx="10" fill="#FFF" stroke="#7B1FA2" stroke-width="2"/>
  <text x="372" y="195" font-family="Georgia" font-size="12" fill="#7B1FA2" text-anchor="middle" font-weight="bold">БЕССОЮЗНЫЕ</text>
  <text x="372" y="215" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Части связаны только</text>
  <text x="372" y="228" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">по смыслу и интонации</text>
  <rect x="290" y="240" width="165" height="50" rx="6" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="372" y="258" font-family="Georgia" font-size="9" fill="#6A1B9A" text-anchor="middle" font-style="italic">Ударил мороз,</text>
  <text x="372" y="275" font-family="Georgia" font-size="9" fill="#6A1B9A" text-anchor="middle" font-style="italic">река замёрзла.</text>
  <text x="372" y="300" font-family="Arial" font-size="8" fill="#999" text-anchor="middle">Знаки: , — :</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Сложное предложение</text>
</svg>