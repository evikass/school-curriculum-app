<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="syntaxBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#syntaxBg)"/>
  <!-- Title -->
  <text x="250" y="30" font-family="Georgia" font-size="14" fill="#283593" text-anchor="middle" font-weight="bold">Синтаксис простого предложения</text>
  <!-- Tree trunk -->
  <rect x="240" y="200" width="20" height="80" fill="#795548"/>
  <!-- Tree root branches -->
  <path d="M250,280 Q220,300 190,310" stroke="#795548" stroke-width="4" fill="none"/>
  <path d="M250,280 Q280,300 310,310" stroke="#795548" stroke-width="4" fill="none"/>
  <path d="M250,280 Q250,305 250,320" stroke="#795548" stroke-width="4" fill="none"/>
  <!-- Main sentence node -->
  <ellipse cx="250" cy="170" rx="55" ry="22" fill="#283593" opacity="0.9"/>
  <text x="250" y="175" font-family="Arial" font-size="11" fill="#FFF" text-anchor="middle" font-weight="bold">ПРЕДЛОЖЕНИЕ</text>
  <!-- Branches from main node -->
  <line x1="200" y1="185" x2="130" y2="215" stroke="#283593" stroke-width="2"/>
  <line x1="300" y1="185" x2="370" y2="215" stroke="#283593" stroke-width="2"/>
  <!-- Подлежащее node -->
  <ellipse cx="120" cy="225" rx="55" ry="20" fill="#4CAF50" opacity="0.85"/>
  <text x="120" y="230" font-family="Arial" font-size="10" fill="#FFF" text-anchor="middle" font-weight="bold">ПОДЛЕЖАЩЕЕ</text>
  <!-- Сказуемое node -->
  <ellipse cx="380" cy="225" rx="55" ry="20" fill="#F44336" opacity="0.85"/>
  <text x="380" y="230" font-family="Arial" font-size="10" fill="#FFF" text-anchor="middle" font-weight="bold">СКАЗУЕМОЕ</text>
  <!-- Sub-branches: Подлежащее details -->
  <line x1="120" y1="245" x2="70" y2="265" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="120" y1="245" x2="170" y2="265" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="30" y="265" width="80" height="22" rx="6" fill="#C8E6C9"/>
  <text x="70" y="280" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle">Им. падеж</text>
  <rect x="130" y="265" width="80" height="22" rx="6" fill="#C8E6C9"/>
  <text x="170" y="280" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle">Кто? Что?</text>
  <!-- Sub-branches: Сказуемое details -->
  <line x1="380" y1="245" x2="330" y2="265" stroke="#F44336" stroke-width="1.5"/>
  <line x1="380" y1="245" x2="430" y2="265" stroke="#F44336" stroke-width="1.5"/>
  <rect x="290" y="265" width="80" height="22" rx="6" fill="#FFCDD2"/>
  <text x="330" y="280" font-family="Arial" font-size="9" fill="#C62828" text-anchor="middle">Глагол</text>
  <rect x="390" y="265" width="80" height="22" rx="6" fill="#FFCDD2"/>
  <text x="430" y="280" font-family="Arial" font-size="9" fill="#C62828" text-anchor="middle">Что делает?</text>
  <!-- Example sentence -->
  <rect x="40" y="300" width="420" height="30" rx="8" fill="#FFF" opacity="0.8"/>
  <text x="250" y="320" font-family="Georgia" font-size="12" fill="#333" text-anchor="middle">
    <tspan fill="#4CAF50" font-weight="bold" text-decoration="underline">Мальчик</tspan>
    <tspan fill="#333"> </tspan>
    <tspan fill="#F44336" font-weight="underline">читает</tspan>
    <tspan fill="#333"> книгу.</tspan>
  </text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Синтаксис простого предложения</text>
</svg>