<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="imagBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="dreamGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7B1FA2" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#imagBg)"/>
  <!-- Title -->
  <text x="250" y="30" font-family="Georgia" font-size="15" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Second &amp; Third Conditionals</text>
  <text x="250" y="46" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">Imaginary / Unreal Situations</text>
  <!-- SECOND CONDITIONAL -->
  <rect x="15" y="55" width="230" height="155" rx="12" fill="#FFF" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="15" y="55" width="230" height="28" rx="12" fill="#7B1FA2"/>
  <rect x="15" y="72" width="230" height="11" fill="#7B1FA2"/>
  <text x="130" y="76" font-family="Georgia" font-size="11" fill="#FFF" text-anchor="middle" font-weight="bold">2nd CONDITIONAL</text>
  <!-- Dream cloud -->
  <g transform="translate(130,125)">
    <ellipse cx="0" cy="0" rx="45" ry="25" fill="url(#dreamGrad)" stroke="#CE93D8" stroke-width="1.5" stroke-dasharray="4,2"/>
    <!-- Wings (flying) -->
    <path d="M-30,5 Q-50,-10 -35,-5 Q-45,0 -30,0" fill="#CE93D8" opacity="0.4"/>
    <path d="M30,5 Q50,-10 35,-5 Q45,0 30,0" fill="#CE93D8" opacity="0.4"/>
    <!-- Person flying -->
    <circle cx="0" cy="-5" r="5" fill="#FFDAB9"/>
    <rect x="-3" y="0" width="6" height="8" fill="#7B1FA2" rx="1"/>
  </g>
  <!-- Formula -->
  <rect x="30" y="160" width="200" height="18" rx="4" fill="#F3E5F5"/>
  <text x="130" y="173" font-family="Arial" font-size="9" fill="#6A1B9A" text-anchor="middle">If + Past Simple → would + verb</text>
  <text x="130" y="195" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">If I had wings, I would fly.</text>
  <text x="130" y="208" font-family="Arial" font-size="8" fill="#999" text-anchor="middle">= unreal / imaginary NOW</text>
  <!-- THIRD CONDITIONAL -->
  <rect x="260" y="55" width="230" height="155" rx="12" fill="#FFF" stroke="#4A148C" stroke-width="2"/>
  <rect x="260" y="55" width="230" height="28" rx="12" fill="#4A148C"/>
  <rect x="260" y="72" width="230" height="11" fill="#4A148C"/>
  <text x="375" y="76" font-family="Georgia" font-size="11" fill="#FFF" text-anchor="middle" font-weight="bold">3rd CONDITIONAL</text>
  <!-- Time machine / past regret -->
  <g transform="translate(375,120)">
    <!-- Clock going backward -->
    <circle cx="0" cy="0" r="25" fill="#FFF" stroke="#4A148C" stroke-width="2"/>
    <circle cx="0" cy="0" r="22" fill="#F3E5F5"/>
    <!-- Backward arrow on clock -->
    <path d="M0,-15 A15,15 0 1,0 13,7" fill="none" stroke="#4A148C" stroke-width="2"/>
    <polygon points="13,3 17,8 10,8" fill="#4A148C"/>
    <!-- X mark -->
    <line x1="-8" y1="-8" x2="8" y2="8" stroke="#E53935" stroke-width="2.5"/>
    <line x1="8" y1="-8" x2="-8" y2="8" stroke="#E53935" stroke-width="2.5"/>
  </g>
  <!-- Formula -->
  <rect x="275" y="160" width="200" height="18" rx="4" fill="#EDE7F6"/>
  <text x="375" y="173" font-family="Arial" font-size="9" fill="#4A148C" text-anchor="middle">If + Past Perfect → would have + V3</text>
  <text x="375" y="195" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">If I had studied, I would have passed.</text>
  <text x="375" y="208" font-family="Arial" font-size="8" fill="#999" text-anchor="middle">= unreal PAST (too late!)</text>
  <!-- Comparison -->
  <rect x="30" y="225" width="440" height="55" rx="10" fill="#FFF" opacity="0.7"/>
  <line x1="250" y1="230" x2="250" y2="275" stroke="#DDD" stroke-width="1"/>
  <text x="140" y="248" font-family="Georgia" font-size="11" fill="#7B1FA2" text-anchor="middle" font-weight="bold">2nd: unreal NOW</text>
  <text x="140" y="266" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">"If I were rich, I would buy a castle."</text>
  <text x="360" y="248" font-family="Georgia" font-size="11" fill="#4A148C" text-anchor="middle" font-weight="bold">3rd: unreal PAST</text>
  <text x="360" y="266" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">"If I had known, I would have helped."</text>
  <!-- Key difference -->
  <rect x="100" y="290" width="300" height="22" rx="6" fill="#6A1B9A" opacity="0.1"/>
  <text x="250" y="305" font-family="Arial" font-size="9" fill="#6A1B9A" text-anchor="middle">Key: 2nd = present imaginary | 3rd = past regret (can't change it!)</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Conditionals: Second and Third</text>
</svg>