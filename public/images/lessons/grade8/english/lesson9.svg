<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="advBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#advBg)"/>
  <!-- SHOULD section - Advice/Doctor -->
  <rect x="20" y="20" width="150" height="195" rx="12" fill="#FFF" stroke="#4CAF50" stroke-width="2.5"/>
  <rect x="20" y="20" width="150" height="35" rx="12" fill="#4CAF50"/>
  <rect x="20" y="43" width="150" height="12" fill="#4CAF50"/>
  <text x="95" y="44" font-family="Georgia" font-size="14" fill="#FFF" text-anchor="middle" font-weight="bold">SHOULD</text>
  <!-- Doctor figure -->
  <g transform="translate(95,110)">
    <circle cx="0" cy="-25" r="14" fill="#FFDAB9"/>
    <path d="M-14,-30 Q0,-45 14,-30" fill="#FFF" stroke="#DDD" stroke-width="1"/>
    <rect x="-12" y="-12" width="24" height="30" rx="3" fill="#FFF"/>
    <line x1="0" y1="-12" x2="0" y2="18" stroke="#E0E0E0" stroke-width="1"/>
    <!-- Stethoscope -->
    <path d="M-8,-5 Q-15,5 -10,15" stroke="#333" stroke-width="2" fill="none"/>
    <circle cx="-10" cy="17" r="4" fill="#333"/>
    <!-- Cross on pocket -->
    <rect x="-3" y="0" width="6" height="2" fill="#F44336"/>
    <rect x="-1" y="-2" width="2" height="6" fill="#F44336"/>
  </g>
  <text x="95" y="165" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle">= advice</text>
  <text x="95" y="182" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">You should rest.</text>
  <text x="95" y="198" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">You should see</text>
  <text x="95" y="210" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">a doctor.</text>
  <!-- MAY section - Permission -->
  <rect x="185" y="20" width="150" height="195" rx="12" fill="#FFF" stroke="#2196F3" stroke-width="2.5"/>
  <rect x="185" y="20" width="150" height="35" rx="12" fill="#2196F3"/>
  <rect x="185" y="43" width="150" height="12" fill="#2196F3"/>
  <text x="260" y="44" font-family="Georgia" font-size="14" fill="#FFF" text-anchor="middle" font-weight="bold">MAY</text>
  <!-- Door/entrance scene -->
  <g transform="translate(260,105)">
    <!-- Door frame -->
    <rect x="-25" y="-40" width="50" height="60" rx="2" fill="#8D6E63"/>
    <rect x="-20" y="-35" width="40" height="50" rx="1" fill="#5D4037"/>
    <!-- Door open -->
    <path d="M-20,-35 L-20,15 L5,10 L5,-30Z" fill="#6D4C41"/>
    <!-- Person at door -->
    <circle cx="12" cy="-20" r="7" fill="#FFDAB9"/>
    <rect x="7" y="-14" width="10" height="15" rx="2" fill="#2196F3"/>
    <!-- Door handle -->
    <circle cx="-8" cy="-10" r="2" fill="#FFD700"/>
    <!-- Keyhole -->
    <ellipse cx="-10" cy="-5" rx="2" ry="3" fill="#333"/>
  </g>
  <text x="260" y="165" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle">= permission</text>
  <text x="260" y="182" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">May I come in?</text>
  <text x="260" y="198" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">May I use your</text>
  <text x="260" y="210" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">phone?</text>
  <!-- MIGHT section - Possibility -->
  <rect x="350" y="20" width="135" height="195" rx="12" fill="#FFF" stroke="#FF9800" stroke-width="2.5"/>
  <rect x="350" y="20" width="135" height="35" rx="12" fill="#FF9800"/>
  <rect x="350" y="43" width="135" height="12" fill="#FF9800"/>
  <text x="417" y="44" font-family="Georgia" font-size="14" fill="#FFF" text-anchor="middle" font-weight="bold">MIGHT</text>
  <!-- Weather/clouds (possibility) -->
  <g transform="translate(417,100)">
    <!-- Sun behind cloud -->
    <circle cx="20" cy="-15" r="15" fill="#FFD700" opacity="0.5"/>
    <!-- Cloud -->
    <ellipse cx="0" cy="0" rx="25" ry="12" fill="#90A4AE"/>
    <ellipse cx="-12" cy="-5" rx="15" ry="10" fill="#B0BEC5"/>
    <ellipse cx="10" cy="-3" rx="18" ry="11" fill="#B0BEC5"/>
    <!-- Rain drops -->
    <line x1="-8" y1="12" x2="-10" y2="22" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="-2" y2="22" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="6" y2="22" stroke="#42A5F5" stroke-width="1.5"/>
  </g>
  <!-- Question mark -->
  <text x="417" y="145" font-family="Georgia" font-size="24" fill="#FF9800" text-anchor="middle" opacity="0.4">?</text>
  <text x="417" y="165" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle">= possibility</text>
  <text x="417" y="182" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">It might rain.</text>
  <text x="417" y="198" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">She might come.</text>
  <!-- Bottom comparison bar -->
  <rect x="20" y="230" width="465" height="50" rx="10" fill="#FFF" opacity="0.8" stroke="#DDD" stroke-width="1"/>
  <text x="250" y="250" font-family="Georgia" font-size="11" fill="#333" text-anchor="middle">
    <tspan fill="#4CAF50" font-weight="bold">Should</tspan> = advice  |
    <tspan fill="#2196F3" font-weight="bold">May</tspan> = permission  |
    <tspan fill="#FF9800" font-weight="bold">Might</tspan> = possibility
  </text>
  <text x="250" y="270" font-family="Arial" font-size="9" fill="#999" text-anchor="middle">All are modal verbs — followed by bare infinitive (without "to")</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Modal Verbs: Should, May, Might</text>
</svg>