<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="roadBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90A4AE"/>
      <stop offset="100%" stop-color="#607D8B"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#roadBg)"/>
  <!-- Road -->
  <polygon points="200,350 300,350 270,0 230,0" fill="#37474F"/>
  <g fill="#FFD700" opacity="0.8">
    <rect x="247" y="30" width="6" height="20" rx="2"/>
    <rect x="247" y="70" width="6" height="20" rx="2"/>
    <rect x="247" y="110" width="6" height="20" rx="2"/>
    <rect x="247" y="150" width="6" height="20" rx="2"/>
    <rect x="247" y="190" width="6" height="20" rx="2"/>
    <rect x="247" y="230" width="6" height="20" rx="2"/>
    <rect x="247" y="270" width="6" height="20" rx="2"/>
    <rect x="247" y="310" width="6" height="20" rx="2"/>
  </g>
  <!-- Traffic light pole -->
  <rect x="70" y="30" width="8" height="260" fill="#546E7A"/>
  <rect x="50" y="280" width="48" height="10" rx="3" fill="#546E7A"/>
  <!-- Traffic light housing -->
  <rect x="48" y="30" width="52" height="150" rx="8" fill="#263238" stroke="#37474F" stroke-width="2"/>
  <!-- Red light - CAN (ability) -->
  <circle cx="74" cy="65" r="18" fill="#F44336">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="74" cy="65" r="14" fill="#FF8A80" opacity="0.5"/>
  <text x="74" y="70" font-family="Georgia" font-size="10" fill="#FFF" text-anchor="middle" font-weight="bold">CAN</text>
  <!-- Yellow light - COULD (past ability) -->
  <circle cx="74" cy="105" r="18" fill="#FFC107">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="74" cy="105" r="14" fill="#FFE082" opacity="0.5"/>
  <text x="74" y="110" font-family="Georgia" font-size="8" fill="#333" text-anchor="middle" font-weight="bold">COULD</text>
  <!-- Green light - MUST (obligation) -->
  <circle cx="74" cy="145" r="18" fill="#4CAF50">
    <animate attributeName="opacity" values="0.4;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="74" cy="145" r="14" fill="#A5D6A7" opacity="0.5"/>
  <text x="74" y="150" font-family="Georgia" font-size="8" fill="#FFF" text-anchor="middle" font-weight="bold">MUST</text>
  <!-- Explanation boxes -->
  <!-- CAN box -->
  <rect x="140" y="40" width="150" height="55" rx="8" fill="#F44336" opacity="0.15" stroke="#F44336" stroke-width="1.5"/>
  <text x="215" y="58" font-family="Georgia" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">CAN = ability</text>
  <text x="215" y="78" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">I can swim.</text>
  <text x="215" y="90" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">present ability</text>
  <!-- COULD box -->
  <rect x="310" y="40" width="165" height="55" rx="8" fill="#FFC107" opacity="0.15" stroke="#FFC107" stroke-width="1.5"/>
  <text x="392" y="58" font-family="Georgia" font-size="12" fill="#F57F17" text-anchor="middle" font-weight="bold">COULD = past ability</text>
  <text x="392" y="78" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">I could run fast then.</text>
  <text x="392" y="90" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">past ability / polite request</text>
  <!-- MUST box -->
  <rect x="140" y="110" width="200" height="55" rx="8" fill="#4CAF50" opacity="0.15" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="240" y="128" font-family="Georgia" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">MUST = obligation</text>
  <text x="240" y="148" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">You must wear a seatbelt.</text>
  <text x="240" y="160" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">strong necessity / rule</text>
  <!-- Car on road -->
  <g transform="translate(250,220)">
    <rect x="-30" y="-15" width="60" height="20" rx="8" fill="#1565C0"/>
    <rect x="-20" y="-25" width="40" height="15" rx="4" fill="#42A5F5"/>
    <rect x="-17" y="-23" width="13" height="10" rx="2" fill="#BBDEFB"/>
    <rect x="4" y="-23" width="13" height="10" rx="2" fill="#BBDEFB"/>
    <circle cx="-18" cy="8" r="7" fill="#333"/><circle cx="-18" cy="8" r="4" fill="#666"/>
    <circle cx="18" cy="8" r="7" fill="#333"/><circle cx="18" cy="8" r="4" fill="#666"/>
  </g>
  <!-- Stop sign -->
  <g transform="translate(360,180)">
    <polygon points="0,-22 16,-16 22,0 16,16 0,22 -16,16 -22,0 -16,-16" fill="#D32F2F" stroke="#FFF" stroke-width="2"/>
    <text x="0" y="4" font-family="Arial" font-size="8" fill="#FFF" text-anchor="middle" font-weight="bold">STOP</text>
  </g>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#FFF" opacity="0.5" text-anchor="middle">Modal Verbs: Can, Could, Must</text>
</svg>