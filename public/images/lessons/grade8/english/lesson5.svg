<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="rainBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#708090"/>
      <stop offset="100%" stop-color="#B0C4DE"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#rainBg)"/>
  <!-- Rain drops -->
  <g stroke="#87CEEB" stroke-width="1.5" opacity="0.4">
    <line x1="50" y1="30" x2="45" y2="50"/><line x1="100" y1="60" x2="95" y2="80"/>
    <line x1="150" y1="20" x2="145" y2="40"/><line x1="200" y1="50" x2="195" y2="70"/>
    <line x1="300" y1="30" x2="295" y2="50"/><line x1="350" y1="55" x2="345" y2="75"/>
    <line x1="420" y1="25" x2="415" y2="45"/><line x1="460" y1="60" x2="455" y2="80"/>
    <line x1="70" y1="90" x2="65" y2="110"/><line x1="180" y1="100" x2="175" y2="120"/>
    <line x1="330" y1="85" x2="325" y2="105"/><line x1="450" y1="95" x2="445" y2="115"/>
  </g>
  <!-- Window frame -->
  <rect x="80" y="40" width="200" height="200" rx="5" fill="#87CEEB" opacity="0.3" stroke="#8B7355" stroke-width="6"/>
  <line x1="180" y1="40" x2="180" y2="240" stroke="#8B7355" stroke-width="4"/>
  <line x1="80" y1="140" x2="280" y2="140" stroke="#8B7355" stroke-width="4"/>
  <!-- Person reading by window (was reading) -->
  <g transform="translate(180,160)">
    <!-- Armchair -->
    <path d="M-30,20 Q-35,-10 -20,-15 L20,-15 Q35,-10 30,20 L30,40 L-30,40Z" fill="#8B4513" opacity="0.8"/>
    <rect x="-35" y="-5" width="8" height="45" rx="3" fill="#8B4513" opacity="0.8"/>
    <rect x="27" y="-5" width="8" height="45" rx="3" fill="#8B4513" opacity="0.8"/>
    <!-- Person sitting -->
    <circle cx="0" cy="-25" r="12" fill="#FFDAB9"/>
    <rect x="-8" y="-14" width="16" height="20" rx="3" fill="#2E8B57"/>
    <!-- Book in hands -->
    <rect x="-18" y="-5" width="36" height="24" rx="2" fill="#4169E1" transform="rotate(-5)"/>
    <line x1="0" y1="-5" x2="0" y2="19" stroke="#FFF" stroke-width="1" transform="rotate(-5)"/>
  </g>
  <!-- Lightning bolt (interruption!) -->
  <polygon points="380,30 360,90 380,90 350,160 400,80 375,80 400,30" fill="#FFD700" stroke="#FFA500" stroke-width="1.5" opacity="0.9"/>
  <!-- Sound waves -->
  <g stroke="#FFD700" stroke-width="2" fill="none" opacity="0.6">
    <path d="M415,70 Q425,60 415,50"/>
    <path d="M425,80 Q440,60 425,40"/>
    <path d="M435,90 Q455,60 435,30"/>
  </g>
  <!-- Phone ringing (interruption) -->
  <rect x="370" y="170" width="35" height="55" rx="5" fill="#333" stroke="#666" stroke-width="1"/>
  <rect x="373" y="175" width="29" height="38" rx="2" fill="#4FC3F7"/>
  <text x="387" y="198" font-family="Arial" font-size="8" fill="#FFF" text-anchor="middle">CALL</text>
  <circle cx="387" cy="215" r="5" fill="#4CAF50"/>
  <!-- Vibration lines -->
  <g stroke="#4CAF50" stroke-width="1.5" opacity="0.7">
    <line x1="362" y1="185" x2="355" y2="180"/><line x1="362" y1="195" x2="355" y2="195"/>
    <line x1="362" y1="205" x2="355" y2="210"/>
    <line x1="413" y1="185" x2="420" y2="180"/><line x1="413" y1="195" x2="420" y2="195"/>
    <line x1="413" y1="205" x2="420" y2="210"/>
  </g>
  <!-- Grammar explanation -->
  <rect x="30" y="260" width="440" height="55" rx="8" fill="#FFF" opacity="0.9"/>
  <text x="250" y="280" font-family="Georgia" font-size="12" fill="#333" text-anchor="middle">
    I <tspan fill="#2E8B57" font-weight="bold">was reading</tspan> when the phone <tspan fill="#DC143C" font-weight="bold">rang</tspan>.
  </text>
  <text x="250" y="300" font-family="Arial" font-size="10" fill="#888" text-anchor="middle">
    was/were + V-ing (long action) + when + Past Simple (interruption)
  </text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#FFF" opacity="0.5" text-anchor="middle">Past Continuous</text>
</svg>