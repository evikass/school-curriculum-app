<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="dailyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#dailyBg)"/>
  <!-- Day timeline bar -->
  <rect x="30" y="60" width="440" height="5" rx="2" fill="#8D6E63"/>
  <!-- Timeline dots and activities -->
  <!-- 7:00 - Wake up -->
  <circle cx="60" cy="62" r="8" fill="#FF9800"/>
  <text x="60" y="66" font-family="Arial" font-size="7" fill="#FFF" text-anchor="middle">7</text>
  <text x="60" y="85" font-family="Arial" font-size="8" fill="#E65100" text-anchor="middle">Wake up</text>
  <!-- Icon: alarm clock -->
  <g transform="translate(60,105)">
    <circle cx="0" cy="0" r="12" fill="#FFF" stroke="#FF9800" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="0" y2="-7" stroke="#333" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="5" y2="2" stroke="#333" stroke-width="1"/>
    <circle cx="0" cy="0" r="1.5" fill="#333"/>
    <!-- Bells -->
    <circle cx="-10" cy="-10" r="4" fill="#FF9800" opacity="0.7"/>
    <circle cx="10" cy="-10" r="4" fill="#FF9800" opacity="0.7"/>
  </g>
  <!-- 8:00 - Breakfast -->
  <circle cx="125" cy="62" r="8" fill="#F44336"/>
  <text x="125" y="66" font-family="Arial" font-size="7" fill="#FFF" text-anchor="middle">8</text>
  <text x="125" y="85" font-family="Arial" font-size="8" fill="#C62828" text-anchor="middle">Breakfast</text>
  <!-- Icon: plate with eggs -->
  <g transform="translate(125,105)">
    <ellipse cx="0" cy="0" rx="14" ry="8" fill="#FFF" stroke="#F44336" stroke-width="1"/>
    <ellipse cx="0" cy="-1" rx="8" ry="5" fill="#FFECB3"/>
    <circle cx="0" cy="-1" r="4" fill="#FFF9C4" stroke="#FFD54F" stroke-width="0.5"/>
  </g>
  <!-- 9:00 - School -->
  <circle cx="195" cy="62" r="8" fill="#2196F3"/>
  <text x="195" y="66" font-family="Arial" font-size="7" fill="#FFF" text-anchor="middle">9</text>
  <text x="195" y="85" font-family="Arial" font-size="8" fill="#1565C0" text-anchor="middle">School</text>
  <!-- Icon: school building -->
  <g transform="translate(195,105)">
    <rect x="-12" y="-10" width="24" height="18" fill="#2196F3" opacity="0.3" stroke="#2196F3" stroke-width="1"/>
    <polygon points="-14,-10 0,-18 14,-10" fill="#2196F3" opacity="0.4"/>
    <rect x="-3" y="0" width="6" height="8" fill="#1565C0" opacity="0.4"/>
    <rect x="-8" y="-5" width="4" height="4" fill="#FFF" opacity="0.6"/>
    <rect x="4" y="-5" width="4" height="4" fill="#FFF" opacity="0.6"/>
  </g>
  <!-- 13:00 - Lunch -->
  <circle cx="270" cy="62" r="8" fill="#4CAF50"/>
  <text x="270" y="66" font-family="Arial" font-size="7" fill="#FFF" text-anchor="middle">1</text>
  <text x="270" y="85" font-family="Arial" font-size="8" fill="#2E7D32" text-anchor="middle">Lunch</text>
  <!-- Icon: sandwich -->
  <g transform="translate(270,105)">
    <path d="M-12,2 L-10,-4 L10,-4 L12,2Z" fill="#F5DEB3"/>
    <rect x="-10" y="-6" width="20" height="3" rx="1" fill="#4CAF50" opacity="0.6"/>
    <rect x="-10" y="-3" width="20" height="3" rx="1" fill="#FF7043" opacity="0.5"/>
    <path d="M-12,2 L12,2 L10,6 L-10,6Z" fill="#F5DEB3"/>
  </g>
  <!-- 16:00 - Homework -->
  <circle cx="340" cy="62" r="8" fill="#9C27B0"/>
  <text x="340" y="66" font-family="Arial" font-size="7" fill="#FFF" text-anchor="middle">4</text>
  <text x="340" y="85" font-family="Arial" font-size="8" fill="#6A1B9A" text-anchor="middle">Homework</text>
  <!-- Icon: book and pencil -->
  <g transform="translate(340,105)">
    <rect x="-10" y="-8" width="14" height="18" rx="1" fill="#9C27B0" opacity="0.3" stroke="#9C27B0" stroke-width="1"/>
    <line x1="-3" y1="-8" x2="-3" y2="10" stroke="#9C27B0" stroke-width="0.5"/>
    <rect x="5" y="-6" width="3" height="16" fill="#FFD54F" transform="rotate(10)"/>
    <polygon points="6,10 7,14 8,10" fill="#FFB74D" transform="rotate(10)"/>
  </g>
  <!-- 20:00 - Dinner -->
  <circle cx="410" cy="62" r="8" fill="#FF5722"/>
  <text x="410" y="66" font-family="Arial" font-size="7" fill="#FFF" text-anchor="middle">8</text>
  <text x="410" y="85" font-family="Arial" font-size="8" fill="#BF360C" text-anchor="middle">Dinner</text>
  <!-- Icon: fork and knife -->
  <g transform="translate(410,105)">
    <line x1="-5" y1="-10" x2="-5" y2="8" stroke="#FF5722" stroke-width="1.5"/>
    <line x1="-8" y1="-10" x2="-8" y2="-3" stroke="#FF5722" stroke-width="1"/>
    <line x1="-2" y1="-10" x2="-2" y2="-3" stroke="#FF5722" stroke-width="1"/>
    <path d="M5,-10 Q5,-3 3,0 L3,8" stroke="#FF5722" stroke-width="1.5" fill="none"/>
  </g>
  <!-- 22:00 - Sleep -->
  <circle cx="460" cy="62" r="8" fill="#1A237E"/>
  <text x="460" y="66" font-family="Arial" font-size="7" fill="#FFF" text-anchor="middle">10</text>
  <text x="460" y="85" font-family="Arial" font-size="8" fill="#1A237E" text-anchor="middle">Sleep</text>
  <!-- Icon: moon and stars -->
  <g transform="translate(460,105)">
    <path d="M-5,-8 A8,8 0 1,1 -5,8 A6,6 0 1,0 -5,-8" fill="#1A237E" opacity="0.5"/>
    <text x="5" y="-5" font-family="Arial" font-size="6" fill="#FFD700">★</text>
    <text x="-10" y="-8" font-family="Arial" font-size="4" fill="#FFD700">★</text>
  </g>
  <!-- Example sentences -->
  <rect x="30" y="145" width="440" height="145" rx="10" fill="#FFF" opacity="0.7"/>
  <text x="250" y="168" font-family="Georgia" font-size="12" fill="#5D4037" text-anchor="middle" font-weight="bold">Daily Routine in English</text>
  <g font-family="Arial" font-size="10" fill="#555">
    <text x="60" y="190">🕐 I <tspan fill="#FF9800" font-weight="bold">wake up</tspan> at 7 o'clock.</text>
    <text x="60" y="208">🍳 I <tspan fill="#F44336" font-weight="bold">have breakfast</tspan> at 8.</text>
    <text x="60" y="226">🏫 I <tspan fill="#2196F3" font-weight="bold">go to school</tspan> at 9.</text>
    <text x="270" y="190">🥪 I <tspan fill="#4CAF50" font-weight="bold">have lunch</tspan> at 1 PM.</text>
    <text x="270" y="208">📚 I <tspan fill="#9C27B0" font-weight="bold">do homework</tspan> at 4 PM.</text>
    <text x="270" y="226">🌙 I <tspan fill="#1A237E" font-weight="bold">go to bed</tspan> at 10 PM.</text>
  </g>
  <text x="250" y="258" font-family="Arial" font-size="9" fill="#999" text-anchor="middle">Use Present Simple for daily routines: I get up, I brush my teeth, I go to school...</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Daily Routine</text>
</svg>