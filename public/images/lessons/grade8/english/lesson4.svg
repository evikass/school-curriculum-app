<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="yesterdaySky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A4A6A"/>
      <stop offset="100%" stop-color="#6B6B8D"/>
    </linearGradient>
    <linearGradient id="calGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#yesterdaySky)"/>
  <!-- Large Calendar page -->
  <rect x="120" y="20" width="260" height="220" rx="8" fill="url(#calGrad)" stroke="#999" stroke-width="2"/>
  <!-- Calendar header -->
  <rect x="120" y="20" width="260" height="40" rx="8" fill="#DC143C"/>
  <rect x="120" y="45" width="260" height="15" fill="#DC143C"/>
  <text x="250" y="47" font-family="Georgia" font-size="18" fill="#FFF" text-anchor="middle" font-weight="bold">YESTERDAY</text>
  <!-- Calendar grid -->
  <g font-family="Arial" font-size="9" fill="#999" text-anchor="middle">
    <text x="150" y="82">Mon</text><text x="190" y="82">Tue</text><text x="230" y="82">Wed</text>
    <text x="270" y="82">Thu</text><text x="310" y="82">Fri</text><text x="350" y="82">Sat</text>
  </g>
  <line x1="130" y1="87" x2="370" y2="87" stroke="#DDD" stroke-width="1"/>
  <!-- Date numbers -->
  <g font-family="Arial" font-size="12" fill="#555" text-anchor="middle">
    <text x="150" y="108">12</text><text x="190" y="108">13</text><text x="230" y="108">14</text>
    <text x="270" y="108">15</text><text x="310" y="108">16</text><text x="350" y="108">17</text>
    <text x="150" y="133">19</text><text x="190" y="133">20</text><text x="230" y="133">21</text>
    <text x="270" y="133">22</text><text x="310" y="133">23</text><text x="350" y="133">24</text>
  </g>
  <!-- Circled date (yesterday) -->
  <circle cx="230" cy="104" r="14" fill="none" stroke="#DC143C" stroke-width="2.5"/>
  <text x="230" y="108" font-family="Arial" font-size="12" fill="#DC143C" text-anchor="middle" font-weight="bold">14</text>
  <!-- Torn edge -->
  <path d="M120,240 L130,235 L140,242 L150,237 L160,243 L170,236 L180,241 L190,238 L200,244 L210,236 L220,242 L230,237 L240,243 L250,236 L260,241 L270,238 L280,244 L290,236 L300,242 L310,237 L320,243 L330,236 L340,241 L350,238 L360,244 L370,236 L380,240 L380,240 L120,240Z" fill="#E8E8E8"/>
  <!-- -ed rules box -->
  <rect x="30" y="260" width="200" height="70" rx="8" fill="#FFF" stroke="#4169E1" stroke-width="2"/>
  <text x="130" y="280" font-family="Georgia" font-size="12" fill="#4169E1" text-anchor="middle" font-weight="bold">Regular: + -ed</text>
  <g font-family="Arial" font-size="10" fill="#555" text-anchor="middle">
    <text x="80" y="298">played</text><text x="150" y="298">watched</text>
    <text x="90" y="316">studied</text><text x="170" y="316">stopped</text>
  </g>
  <!-- Irregular box -->
  <rect x="260" y="260" width="210" height="70" rx="8" fill="#FFF" stroke="#DC143C" stroke-width="2"/>
  <text x="365" y="280" font-family="Georgia" font-size="12" fill="#DC143C" text-anchor="middle" font-weight="bold">Irregular: V2 form</text>
  <g font-family="Arial" font-size="10" fill="#555" text-anchor="middle">
    <text x="310" y="298">go → went</text><text x="410" y="298">eat → ate</text>
    <text x="310" y="316">see → saw</text><text x="410" y="316">do → did</text>
  </g>
  <!-- Arrow from calendar to boxes -->
  <path d="M200,240 L130,258" stroke="#4169E1" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  <path d="M300,240 L365,258" stroke="#DC143C" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#FFF" opacity="0.5" text-anchor="middle">Past Simple</text>
</svg>