<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <radialGradient id="crystalGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E1F5FE" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#81D4FA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A237E" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#E1BEE7" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#7B1FA2" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4A148C" stop-opacity="0.8"/>
    </radialGradient>
    <linearGradient id="nightSky6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D0D2B"/>
      <stop offset="100%" stop-color="#1A1A4E"/>
    </linearGradient>
    <filter id="fuzzGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#nightSky6)"/>
  <!-- Stars -->
  <g fill="#FFF">
    <circle cx="30" cy="20" r="1" opacity="0.6"/><circle cx="80" cy="45" r="1.5" opacity="0.4"/>
    <circle cx="140" cy="15" r="1" opacity="0.5"/><circle cx="200" cy="50" r="1" opacity="0.3"/>
    <circle cx="350" cy="25" r="1.5" opacity="0.5"/><circle cx="440" cy="40" r="1" opacity="0.4"/>
    <circle cx="470" cy="15" r="1" opacity="0.6"/><circle cx="60" cy="70" r="1" opacity="0.3"/>
    <circle cx="400" cy="65" r="1.2" opacity="0.5"/>
  </g>
  <!-- Table surface -->
  <rect x="100" y="260" width="300" height="10" rx="3" fill="#5D4037"/>
  <rect x="110" y="270" width="10" height="50" fill="#4E342E"/>
  <rect x="380" y="270" width="10" height="50" fill="#4E342E"/>
  <!-- Cloth/drape -->
  <path d="M120,260 Q200,265 250,260 Q300,265 380,260 L380,270 Q300,275 250,270 Q200,275 120,270Z" fill="#4A148C" opacity="0.5"/>
  <!-- Crystal ball -->
  <ellipse cx="250" cy="235" rx="8" ry="3" fill="#333" opacity="0.3"/>
  <circle cx="250" cy="180" r="65" fill="url(#orbGlow)" stroke="#9C27B0" stroke-width="2"/>
  <!-- Glow around ball -->
  <circle cx="250" cy="180" r="80" fill="none" stroke="#CE93D8" stroke-width="1" opacity="0.3" filter="url(#fuzzGlow)"/>
  <!-- Visions inside crystal ball -->
  <g opacity="0.6">
    <!-- House -->
    <polygon points="200,175 215,160 230,175" fill="#FFF" opacity="0.4"/>
    <rect x="205" y="175" width="20" height="15" fill="#FFF" opacity="0.3"/>
    <!-- Person silhouette -->
    <circle cx="250" cy="155" r="5" fill="#FFF" opacity="0.4"/>
    <rect x="246" y="160" width="8" height="12" rx="2" fill="#FFF" opacity="0.3"/>
    <!-- Airplane -->
    <path d="M265,170 L280,165 L285,170 L280,172 L265,172Z" fill="#FFF" opacity="0.4"/>
    <path d="M272,165 L275,158 L278,165" fill="#FFF" opacity="0.3"/>
    <!-- Dollar sign -->
    <text x="220" y="200" font-family="Georgia" font-size="14" fill="#FFD700" opacity="0.5">$</text>
  </g>
  <!-- Highlight on ball -->
  <ellipse cx="230" cy="155" rx="15" ry="10" fill="#FFF" opacity="0.2" transform="rotate(-30,230,155)"/>
  <!-- Hands on sides of ball -->
  <!-- Left hand -->
  <g transform="translate(155,200)">
    <path d="M0,0 Q5,-15 15,-10 Q20,-8 18,0 L15,10 Q10,15 5,12Z" fill="#FFDAB9" opacity="0.8"/>
    <path d="M5,-2 L3,-12 Q5,-16 8,-13 L8,-2" fill="#FFDAB9" opacity="0.8"/>
    <path d="M10,-2 L10,-14 Q13,-17 15,-13 L12,-2" fill="#FFDAB9" opacity="0.8"/>
  </g>
  <!-- Right hand -->
  <g transform="translate(315,200) scale(-1,1)">
    <path d="M0,0 Q5,-15 15,-10 Q20,-8 18,0 L15,10 Q10,15 5,12Z" fill="#FFDAB9" opacity="0.8"/>
    <path d="M5,-2 L3,-12 Q5,-16 8,-13 L8,-2" fill="#FFDAB9" opacity="0.8"/>
    <path d="M10,-2 L10,-14 Q13,-17 15,-13 L12,-2" fill="#FFDAB9" opacity="0.8"/>
  </g>
  <!-- Future predictions -->
  <g font-family="Georgia" font-size="12">
    <rect x="30" y="90" width="110" height="28" rx="12" fill="#7B1FA2" opacity="0.3"/>
    <text x="85" y="108" fill="#CE93D8" text-anchor="middle">will + verb</text>
    <rect x="360" y="90" width="110" height="28" rx="12" fill="#7B1FA2" opacity="0.3"/>
    <text x="415" y="108" fill="#CE93D8" text-anchor="middle">will go</text>
  </g>
  <!-- Example at bottom -->
  <rect x="100" y="310" width="300" height="25" rx="8" fill="#FFF" opacity="0.1"/>
  <text x="250" y="327" font-family="Arial" font-size="11" fill="#CE93D8" text-anchor="middle">
    I <tspan font-weight="bold">will travel</tspan> the world. / She <tspan font-weight="bold">will succeed</tspan>.
  </text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#FFF" opacity="0.5" text-anchor="middle">Future Simple</text>
</svg>