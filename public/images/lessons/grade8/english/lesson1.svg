<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F0FF"/>
    </linearGradient>
    <linearGradient id="clock1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#F5DEB3"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky1)"/>
  <!-- Ground -->
  <ellipse cx="250" cy="310" rx="240" ry="40" fill="#90EE90"/>
  <!-- Sun -->
  <circle cx="420" cy="60" r="35" fill="#FFD700" opacity="0.8"/>
  <g stroke="#FFD700" stroke-width="2" opacity="0.5">
    <line x1="420" y1="15" x2="420" y2="5"/><line x1="420" y1="105" x2="420" y2="115"/>
    <line x1="375" y1="60" x2="365" y2="60"/><line x1="465" y1="60" x2="475" y2="60"/>
    <line x1="390" y1="30" x2="383" y2="23"/><line x1="450" y1="90" x2="457" y2="97"/>
    <line x1="450" y1="30" x2="457" y2="23"/><line x1="390" y1="90" x2="383" y2="97"/>
  </g>
  <!-- Large Clock -->
  <circle cx="140" cy="130" r="75" fill="url(#clock1)" stroke="#8B7355" stroke-width="4"/>
  <circle cx="140" cy="130" r="70" fill="none" stroke="#8B7355" stroke-width="1"/>
  <!-- Clock numbers -->
  <g font-family="Georgia" font-size="12" fill="#5C4033" text-anchor="middle">
    <text x="140" y="72">12</text><text x="195" y="135">3</text>
    <text x="140" y="198">6</text><text x="85" y="135">9</text>
  </g>
  <!-- Clock hands (7:00) -->
  <line x1="140" y1="130" x2="140" y2="80" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="140" y1="130" x2="180" y2="130" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  <circle cx="140" cy="130" r="4" fill="#333"/>
  <!-- Person waking up -->
  <g transform="translate(280,140)">
    <!-- Bed -->
    <rect x="-40" y="30" width="80" height="25" rx="3" fill="#8B4513"/>
    <rect x="-45" y="25" width="12" height="35" rx="2" fill="#A0522D"/>
    <rect x="28" y="10" width="15" height="50" rx="2" fill="#A0522D"/>
    <!-- Pillow -->
    <rect x="-35" y="20" width="30" height="12" rx="5" fill="#FFF8DC"/>
    <!-- Person sitting up -->
    <circle cx="0" cy="5" r="12" fill="#FFDAB9"/>
    <rect x="-8" y="15" width="16" height="20" rx="3" fill="#4169E1"/>
    <!-- Arms stretching -->
    <line x1="8" y1="20" x2="25" y2="5" stroke="#FFDAB9" stroke-width="3" stroke-linecap="round"/>
    <line x1="-8" y1="20" x2="-25" y2="5" stroke="#FFDAB9" stroke-width="3" stroke-linecap="round"/>
    <!-- Zzz -->
    <text x="18" y="-5" font-size="10" fill="#4169E1" opacity="0.6" font-style="italic">Z</text>
    <text x="25" y="-12" font-size="8" fill="#4169E1" opacity="0.4" font-style="italic">z</text>
  </g>
  <!-- Routine icons row -->
  <g transform="translate(50,240)">
    <!-- Toothbrush -->
    <rect x="0" y="0" width="25" height="4" rx="2" fill="#87CEEB"/>
    <rect x="22" y="-2" width="8" height="8" rx="1" fill="#FFF"/>
    <!-- Breakfast -->
    <ellipse cx="70" cy="5" rx="15" ry="8" fill="#F5DEB3"/>
    <ellipse cx="70" cy="2" rx="10" ry="5" fill="#D2691E"/>
    <!-- School bag -->
    <rect x="120" y="-5" width="20" height="22" rx="3" fill="#DC143C"/>
    <rect x="125" y="-10" width="10" height="8" rx="2" fill="#DC143C" stroke="#8B0000" stroke-width="1"/>
    <!-- Football -->
    <circle cx="190" cy="5" r="10" fill="#FFF" stroke="#333" stroke-width="1"/>
    <path d="M185,0 L190,-3 L195,0 L193,5 L187,5Z" fill="#333"/>
    <!-- Book -->
    <rect x="230" y="-5" width="18" height="22" rx="1" fill="#4169E1"/>
    <line x1="239" y1="-5" x2="239" y2="17" stroke="#FFF" stroke-width="1"/>
    <!-- Bed moon -->
    <path d="M280,-5 A8,8 0 1,1 280,11 A6,6 0 1,0 280,-5" fill="#FFD700"/>
  </g>
  <!-- Labels -->
  <g font-family="Arial" font-size="11" fill="#2F4F4F">
    <text x="140" y="230" text-anchor="middle">7:00 AM</text>
  </g>
  <!-- Speech bubbles -->
  <g>
    <rect x="30" y="80" width="70" height="24" rx="10" fill="#FFF" stroke="#4169E1" stroke-width="1"/>
    <text x="65" y="96" font-family="Arial" font-size="10" fill="#4169E1" text-anchor="middle">I play</text>
    <rect x="290" y="80" width="85" height="24" rx="10" fill="#FFF" stroke="#DC143C" stroke-width="1"/>
    <text x="332" y="96" font-family="Arial" font-size="10" fill="#DC143C" text-anchor="middle">He plays</text>
  </g>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Present Simple</text>
</svg>