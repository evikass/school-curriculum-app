<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="condBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#condBg)"/>
  <!-- Title -->
  <text x="250" y="35" font-family="Georgia" font-size="16" fill="#1B5E20" text-anchor="middle" font-weight="bold">Zero &amp; First Conditionals</text>
  <text x="250" y="52" font-family="Arial" font-size="10" fill="#666" text-anchor="middle">If + present → result</text>
  <!-- ZERO CONDITIONAL -->
  <rect x="20" y="65" width="225" height="170" rx="12" fill="#FFF" stroke="#2E7D32" stroke-width="2"/>
  <rect x="20" y="65" width="225" height="30" rx="12" fill="#2E7D32"/>
  <rect x="20" y="82" width="225" height="13" fill="#2E7D32"/>
  <text x="132" y="87" font-family="Georgia" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">ZERO CONDITIONAL</text>
  <!-- If clause box -->
  <rect x="35" y="105" width="90" height="40" rx="6" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1"/>
  <text x="80" y="122" font-family="Arial" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">IF + Present</text>
  <text x="80" y="138" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">If you heat ice</text>
  <!-- Arrow -->
  <path d="M130,125 L155,125" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arr0)"/>
  <defs>
    <marker id="arr0" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#2E7D32"/>
    </marker>
  </defs>
  <!-- Result box -->
  <rect x="160" y="105" width="70" height="40" rx="6" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1"/>
  <text x="195" y="122" font-family="Arial" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Present</text>
  <text x="195" y="138" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">it melts</text>
  <!-- Ice melting illustration -->
  <g transform="translate(80,180)">
    <!-- Ice cube -->
    <rect x="-20" y="-15" width="25" height="25" rx="2" fill="#B3E5FC" stroke="#4FC3F7" stroke-width="1"/>
    <!-- Water drops -->
    <ellipse cx="15" cy="10" rx="8" ry="3" fill="#4FC3F7" opacity="0.5"/>
    <ellipse cx="25" cy="8" rx="6" ry="2" fill="#4FC3F7" opacity="0.4"/>
    <path d="M5,-2 Q8,5 4,10" stroke="#4FC3F7" stroke-width="1" fill="none"/>
  </g>
  <text x="132" y="215" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">= general truths, facts</text>
  <!-- FIRST CONDITIONAL -->
  <rect x="260" y="65" width="225" height="170" rx="12" fill="#FFF" stroke="#FF6F00" stroke-width="2"/>
  <rect x="260" y="65" width="225" height="30" rx="12" fill="#FF6F00"/>
  <rect x="260" y="82" width="225" height="13" fill="#FF6F00"/>
  <text x="372" y="87" font-family="Georgia" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">FIRST CONDITIONAL</text>
  <!-- If clause box -->
  <rect x="275" y="105" width="90" height="40" rx="6" fill="#FFE0B2" stroke="#FFB74D" stroke-width="1"/>
  <text x="320" y="122" font-family="Arial" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">IF + Present</text>
  <text x="320" y="138" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">If it rains</text>
  <!-- Arrow -->
  <path d="M370,125 L395,125" stroke="#FF6F00" stroke-width="2" fill="none"/>
  <polygon points="395,122 401,125 395,128" fill="#FF6F00"/>
  <!-- Result box -->
  <rect x="405" y="105" width="65" height="40" rx="6" fill="#FFCC80" stroke="#FFB74D" stroke-width="1"/>
  <text x="437" y="122" font-family="Arial" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Future</text>
  <text x="437" y="138" font-family="Arial" font-size="8" fill="#333" text-anchor="middle">I'll stay</text>
  <!-- Rain illustration -->
  <g transform="translate(372,175)">
    <ellipse cx="0" cy="-10" rx="20" ry="10" fill="#90A4AE"/>
    <ellipse cx="-10" cy="-15" rx="12" ry="8" fill="#B0BEC5"/>
    <ellipse cx="10" cy="-12" rx="14" ry="9" fill="#B0BEC5"/>
    <line x1="-8" y1="0" x2="-10" y2="12" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-2" y2="12" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="8" y1="0" x2="6" y2="12" stroke="#42A5F5" stroke-width="1.5"/>
  </g>
  <text x="372" y="215" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">= real/possible situations</text>
  <!-- Bottom examples -->
  <rect x="20" y="250" width="465" height="60" rx="10" fill="#FFF" opacity="0.8"/>
  <text x="250" y="270" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">
    <tspan fill="#2E7D32" font-weight="bold">Zero:</tspan> If you heat water to 100°C, it boils.
  </text>
  <text x="250" y="290" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">
    <tspan fill="#FF6F00" font-weight="bold">First:</tspan> If you study hard, you will pass the exam.
  </text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Conditionals: Zero and First</text>
</svg>