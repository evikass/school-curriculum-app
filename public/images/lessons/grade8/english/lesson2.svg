<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="runsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="60%" stop-color="#FFA07A"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#CD853F"/>
      <stop offset="100%" stop-color="#DEB887"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#runsky)"/>
  <!-- Track -->
  <rect x="0" y="250" width="500" height="60" fill="url(#track)"/>
  <rect x="0" y="248" width="500" height="4" fill="#FFF" opacity="0.6"/>
  <line x1="0" y1="270" x2="500" y2="270" stroke="#FFF" stroke-width="1" stroke-dasharray="10,10" opacity="0.4"/>
  <line x1="0" y1="290" x2="500" y2="290" stroke="#FFF" stroke-width="1" stroke-dasharray="10,10" opacity="0.4"/>
  <!-- Motion lines -->
  <g stroke="#FFF" stroke-width="2" opacity="0.5">
    <line x1="50" y1="200" x2="120" y2="200"/>
    <line x1="40" y1="215" x2="115" y2="215"/>
    <line x1="55" y1="230" x2="110" y2="230"/>
    <line x1="30" y1="245" x2="105" y2="245"/>
  </g>
  <!-- Running figure -->
  <g transform="translate(250,150)">
    <!-- Head -->
    <circle cx="0" cy="0" r="16" fill="#FFDAB9"/>
    <!-- Hair flowing -->
    <path d="M-12,-10 Q-20,-20 -10,-18 Q-18,-15 -8,-14" fill="#8B4513"/>
    <!-- Body leaning forward -->
    <rect x="-10" y="14" width="20" height="35" rx="5" fill="#FF4500" transform="rotate(-10,0,30)"/>
    <!-- Left arm forward -->
    <line x1="-5" y1="22" x2="30" y2="10" stroke="#FFDAB9" stroke-width="5" stroke-linecap="round"/>
    <!-- Right arm back -->
    <line x1="5" y1="22" x2="-25" y2="35" stroke="#FFDAB9" stroke-width="5" stroke-linecap="round"/>
    <!-- Left leg forward (bent) -->
    <path d="M-3,48 L20,60 L10,75" stroke="#2F4F4F" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right leg back (extended) -->
    <path d="M3,48 L-25,65 L-35,55" stroke="#2F4F4F" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Shoes -->
    <ellipse cx="10" cy="77" rx="10" ry="4" fill="#4169E1"/>
    <ellipse cx="-35" cy="54" rx="10" ry="4" fill="#4169E1"/>
  </g>
  <!-- Dust particles behind runner -->
  <g fill="#DEB887" opacity="0.6">
    <circle cx="140" cy="260" r="4"/><circle cx="150" cy="250" r="3"/>
    <circle cx="160" cy="265" r="5"/><circle cx="135" cy="255" r="3"/>
    <circle cx="170" cy="258" r="2"/>
  </g>
  <!-- Finish line in distance -->
  <rect x="420" y="220" width="3" height="50" fill="#8B8B8B"/>
  <g fill="none" stroke="#000" stroke-width="1">
    <rect x="410" y="220" width="10" height="8" fill="#000"/><rect x="420" y="220" width="10" height="8" fill="#FFF"/>
    <rect x="410" y="228" width="10" height="8" fill="#FFF"/><rect x="420" y="228" width="10" height="8" fill="#000"/>
  </g>
  <!-- Speech bubble -->
  <rect x="290" y="80" width="140" height="35" rx="15" fill="#FFF" stroke="#FF4500" stroke-width="2"/>
  <text x="360" y="102" font-family="Georgia" font-size="14" fill="#FF4500" text-anchor="middle" font-weight="bold">I am running!</text>
  <polygon points="300,115 310,115 295,130" fill="#FFF" stroke="#FF4500" stroke-width="2"/>
  <!-- -ing emphasis -->
  <rect x="70" y="130" width="90" height="40" rx="8" fill="#FF4500" opacity="0.15"/>
  <text x="115" y="156" font-family="Arial" font-size="20" fill="#FF4500" text-anchor="middle" font-weight="bold">-ing</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Present Continuous</text>
</svg>