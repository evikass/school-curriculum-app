<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="timelineBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="timelineArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#timelineBg)"/>
  <!-- Stars -->
  <g fill="#FFF" opacity="0.3">
    <circle cx="50" cy="30" r="1"/><circle cx="120" cy="60" r="1.5"/>
    <circle cx="200" cy="25" r="1"/><circle cx="350" cy="45" r="1"/>
    <circle cx="430" cy="20" r="1.5"/><circle cx="470" cy="70" r="1"/>
    <circle cx="80" cy="80" r="1"/><circle cx="300" cy="15" r="1.2"/>
  </g>
  <!-- Title area -->
  <text x="250" y="45" font-family="Georgia" font-size="18" fill="#FFD700" text-anchor="middle" font-weight="bold" filter="url(#glow)">Present Perfect</text>
  <text x="250" y="65" font-family="Arial" font-size="12" fill="#e94560" text-anchor="middle">have / has + V3 (Past Participle)</text>
  <!-- Timeline arrow -->
  <line x1="40" y1="160" x2="450" y2="160" stroke="url(#timelineArrow)" stroke-width="3"/>
  <polygon points="450,160 440,155 440,165" fill="#FFD700"/>
  <!-- Past zone -->
  <rect x="40" y="100" width="200" height="120" rx="5" fill="#e94560" opacity="0.1"/>
  <text x="140" y="95" font-family="Arial" font-size="11" fill="#e94560" text-anchor="middle">PAST</text>
  <!-- Now zone -->
  <rect x="350" y="100" width="100" height="120" rx="5" fill="#FFD700" opacity="0.15"/>
  <text x="400" y="95" font-family="Arial" font-size="11" fill="#FFD700" text-anchor="middle">NOW</text>
  <!-- Timeline events -->
  <g>
    <!-- Event 1 -->
    <circle cx="100" cy="160" r="6" fill="#e94560" filter="url(#glow)"/>
    <text x="100" y="185" font-family="Arial" font-size="9" fill="#AAA" text-anchor="middle">2020</text>
    <text x="100" y="140" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">started</text>
    <text x="100" y="150" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">learning</text>
    <!-- Event 2 -->
    <circle cx="200" cy="160" r="6" fill="#FF6347" filter="url(#glow)"/>
    <text x="200" y="185" font-family="Arial" font-size="9" fill="#AAA" text-anchor="middle">2023</text>
    <text x="200" y="140" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">visited</text>
    <text x="200" y="150" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">London</text>
    <!-- Event 3 -->
    <circle cx="300" cy="160" r="6" fill="#FFA500" filter="url(#glow)"/>
    <text x="300" y="185" font-family="Arial" font-size="9" fill="#AAA" text-anchor="middle">2025</text>
    <text x="300" y="140" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">read 50</text>
    <text x="300" y="150" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">books</text>
    <!-- NOW marker -->
    <line x1="400" y1="110" x2="400" y2="210" stroke="#FFD700" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="400" cy="160" r="8" fill="#FFD700" filter="url(#glow)"/>
  </g>
  <!-- Connection line from past events to now -->
  <path d="M100,165 Q250,200 400,165" stroke="#FFD700" stroke-width="1.5" fill="none" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Example sentences -->
  <g font-family="Arial" font-size="11">
    <rect x="40" y="230" width="200" height="25" rx="5" fill="#e94560" opacity="0.2"/>
    <text x="140" y="247" fill="#FFF" text-anchor="middle">I <tspan fill="#FFD700">have visited</tspan> London.</text>
    <rect x="260" y="230" width="200" height="25" rx="5" fill="#e94560" opacity="0.2"/>
    <text x="360" y="247" fill="#FFF" text-anchor="middle">She <tspan fill="#FFD700">has read</tspan> 50 books.</text>
  </g>
  <!-- V3 examples -->
  <g font-family="Arial" font-size="10" fill="#AAA">
    <text x="70" y="285">go → gone</text>
    <text x="180" y="285">eat → eaten</text>
    <text x="300" y="285">write → written</text>
    <text x="410" y="285">see → seen</text>
  </g>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#FFF" opacity="0.5" text-anchor="middle">Present Perfect</text>
</svg>