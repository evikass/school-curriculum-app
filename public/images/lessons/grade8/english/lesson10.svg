<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="passBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <marker id="arrowPass" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#1565C0"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#passBg)"/>
  <!-- Active Voice (left) -->
  <rect x="30" y="25" width="200" height="140" rx="10" fill="#FFF" stroke="#4CAF50" stroke-width="2"/>
  <text x="130" y="48" font-family="Georgia" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">ACTIVE VOICE</text>
  <text x="130" y="66" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Subject does the action</text>
  <!-- Subject (doer) - big circle -->
  <circle cx="80" cy="100" r="22" fill="#4CAF50" opacity="0.2" stroke="#4CAF50" stroke-width="2"/>
  <text x="80" y="104" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Cat</text>
  <!-- Arrow -->
  <line x1="105" y1="100" x2="145" y2="100" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arrowPass)"/>
  <text x="125" y="92" font-family="Arial" font-size="8" fill="#4CAF50" text-anchor="middle">chased</text>
  <!-- Object (receiver) -->
  <circle cx="180" cy="100" r="22" fill="#FF9800" opacity="0.2" stroke="#FF9800" stroke-width="2"/>
  <text x="180" y="104" font-family="Arial" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Mouse</text>
  <text x="130" y="148" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">The cat chased the mouse.</text>
  <!-- Big arrow down -->
  <path d="M130,170 L130,195 L120,195 L130,210 L140,195 L130,195" fill="#1565C0"/>
  <text x="155" y="195" font-family="Arial" font-size="9" fill="#1565C0">PASSIVE</text>
  <!-- Passive Voice (right side) -->
  <rect x="270" y="25" width="205" height="140" rx="10" fill="#FFF" stroke="#1565C0" stroke-width="2"/>
  <text x="372" y="48" font-family="Georgia" font-size="13" fill="#0D47A1" text-anchor="middle" font-weight="bold">PASSIVE VOICE</text>
  <text x="372" y="66" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Action happens to subject</text>
  <!-- Receiver becomes subject -->
  <circle cx="320" cy="100" r="22" fill="#FF9800" opacity="0.2" stroke="#FF9800" stroke-width="2"/>
  <text x="320" y="104" font-family="Arial" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Mouse</text>
  <!-- Arrow -->
  <line x1="345" y1="100" x2="385" y2="100" stroke="#1565C0" stroke-width="2.5" marker-end="url(#arrowPass)"/>
  <text x="365" y="92" font-family="Arial" font-size="8" fill="#1565C0" text-anchor="middle">was chased</text>
  <!-- Doer becomes "by" -->
  <circle cx="420" cy="100" r="22" fill="#4CAF50" opacity="0.15" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="420" y="104" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle">by cat</text>
  <text x="372" y="148" font-family="Arial" font-size="10" fill="#333" text-anchor="middle">The mouse was chased by the cat.</text>
  <!-- Formula -->
  <rect x="50" y="225" width="400" height="45" rx="10" fill="#1565C0" opacity="0.1" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="252" font-family="Georgia" font-size="14" fill="#0D47A1" text-anchor="middle" font-weight="bold">
    PASSIVE = be + V3 (Past Participle)
  </text>
  <!-- Examples -->
  <g font-family="Arial" font-size="10" fill="#555">
    <text x="50" y="290">• The book <tspan fill="#1565C0" font-weight="bold">was written</tspan> by Pushkin.</text>
    <text x="50" y="306">• English <tspan fill="#1565C0" font-weight="bold">is spoken</tspan> worldwide.</text>
    <text x="50" y="322">• The cake <tspan fill="#1565C0" font-weight="bold">will be baked</tspan> tomorrow.</text>
  </g>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Passive Voice</text>
</svg>