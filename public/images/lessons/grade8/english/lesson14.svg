  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
  <rect x="15" y="85" width="470" height="215" fill="#E3F2FD"/><rect x="150" y="110" width="200" height="140" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/><line x1="170" y1="130" x2="330" y2="130" stroke="#ddd" stroke-width="1"/><line x1="170" y1="145" x2="330" y2="145" stroke="#ddd" stroke-width="1"/><line x1="170" y1="160" x2="330" y2="160" stroke="#ddd" stroke-width="1"/><line x1="170" y1="175" x2="330" y2="175" stroke="#ddd" stroke-width="1"/><line x1="170" y1="190" x2="330" y2="190" stroke="#ddd" stroke-width="1"/><line x1="170" y1="205" x2="280" y2="205" stroke="#ddd" stroke-width="1"/><text x="250" y="145" font-family="Arial" font-size="11" fill="#333">Dear friend,</text><text x="250" y="175" font-family="Arial" font-size="11" fill="#333">How are you? I am writing...</text><text x="250" y="195" font-family="Arial" font-size="11" fill="#333">Best wishes, Alex</text><text x="250" y="280" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Essay / Letter Writing</text>
  </g>
