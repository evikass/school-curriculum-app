<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="hobbyBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="guitarWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#D2691E"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#hobbyBg)"/>
  <!-- Title -->
  <text x="250" y="30" font-family="Georgia" font-size="16" fill="#283593" text-anchor="middle" font-weight="bold">Hobbies &amp; Free Time</text>
  <!-- GUITAR section -->
  <g transform="translate(90,130)">
    <!-- Guitar body -->
    <ellipse cx="0" cy="15" rx="30" ry="35" fill="url(#guitarWood)"/>
    <ellipse cx="0" cy="-15" rx="22" ry="25" fill="url(#guitarWood)"/>
    <!-- Sound hole -->
    <circle cx="0" cy="10" r="10" fill="#5D3A1A"/>
    <!-- Strings -->
    <line x1="-3" y1="-35" x2="-3" y2="45" stroke="#FFD700" stroke-width="0.5"/>
    <line x1="0" y1="-35" x2="0" y2="45" stroke="#FFD700" stroke-width="0.5"/>
    <line x1="3" y1="-35" x2="3" y2="45" stroke="#FFD700" stroke-width="0.5"/>
    <!-- Neck -->
    <rect x="-5" y="-80" width="10" height="50" rx="2" fill="#5D3A1A"/>
    <!-- Headstock -->
    <rect x="-7" y="-90" width="14" height="15" rx="3" fill="#3E2723"/>
    <!-- Tuning pegs -->
    <circle cx="-8" cy="-85" r="2" fill="#FFD700"/>
    <circle cx="-8" cy="-80" r="2" fill="#FFD700"/>
    <circle cx="8" cy="-85" r="2" fill="#FFD700"/>
    <circle cx="8" cy="-80" r="2" fill="#FFD700"/>
    <!-- Bridge -->
    <rect x="-8" y="30" width="16" height="3" rx="1" fill="#3E2723"/>
    <!-- Sound waves -->
    <path d="M32,5 Q38,-2 32,-8" stroke="#FF9800" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M36,8 Q44,-3 36,-12" stroke="#FF9800" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M40,10 Q50,-5 40,-15" stroke="#FF9800" stroke-width="1.5" fill="none" opacity="0.2"/>
  </g>
  <text x="90" y="210" font-family="Arial" font-size="10" fill="#5D4037" text-anchor="middle">Playing guitar</text>
  <!-- BOOK section -->
  <g transform="translate(250,130)">
    <!-- Open book -->
    <rect x="-35" y="-30" width="32" height="45" rx="2" fill="#1565C0" transform="rotate(-5,-19,-30)"/>
    <rect x="3" y="-30" width="32" height="45" rx="2" fill="#1976D2" transform="rotate(5,19,-30)"/>
    <!-- Pages -->
    <rect x="-33" y="-28" width="28" height="41" fill="#FFF" transform="rotate(-5,-19,-28)"/>
    <rect x="5" y="-28" width="28" height="41" fill="#FFF" transform="rotate(5,19,-28)"/>
    <!-- Text lines -->
    <g stroke="#BDBDBD" stroke-width="0.5" opacity="0.6">
      <line x1="-28" y1="-20" x2="-10" y2="-20"/>
      <line x1="-28" y1="-15" x2="-10" y2="-15"/>
      <line x1="-28" y1="-10" x2="-10" y2="-10"/>
      <line x1="10" y1="-20" x2="28" y2="-20"/>
      <line x1="10" y1="-15" x2="28" y2="-15"/>
      <line x1="10" y1="-10" x2="28" y2="-10"/>
    </g>
    <!-- Bookmark -->
    <polygon points="-15,-28 -12,-28 -12,10 -13.5,5 -15,10" fill="#F44336"/>
    <!-- Reading glasses on book -->
    <circle cx="-22" cy="-35" r="7" fill="none" stroke="#795548" stroke-width="1.5"/>
    <circle cx="-8" cy="-35" r="7" fill="none" stroke="#795548" stroke-width="1.5"/>
    <line x1="-15" y1="-35" x2="-15" y2="-35" stroke="#795548" stroke-width="1.5"/>
    <path d="M-15,-35 Q-13.5,-33 -15,-35" stroke="#795548" stroke-width="1.5" fill="none"/>
  </g>
  <text x="250" y="210" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle">Reading books</text>
  <!-- SPORTS section -->
  <g transform="translate(380,120)">
    <!-- Basketball -->
    <circle cx="0" cy="-5" r="25" fill="#FF6F00"/>
    <circle cx="0" cy="-5" r="25" fill="none" stroke="#E65100" stroke-width="1"/>
    <!-- Basketball lines -->
    <line x1="0" y1="-30" x2="0" y2="20" stroke="#5D4037" stroke-width="1"/>
    <ellipse cx="0" cy="-5" rx="25" ry="8" fill="none" stroke="#5D4037" stroke-width="1"/>
    <path d="M-20,-20 Q0,-15 20,-20" stroke="#5D4037" stroke-width="1" fill="none"/>
    <path d="M-20,10 Q0,5 20,10" stroke="#5D4037" stroke-width="1" fill="none"/>
    <!-- Whistle -->
    <ellipse cx="15" cy="30" rx="10" ry="6" fill="#FFD700"/>
    <rect x="20" y="25" width="15" height="3" rx="1" fill="#FFD700"/>
    <circle cx="22" cy="32" r="2" fill="#F9A825"/>
  </g>
  <text x="380" y="210" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle">Playing sports</text>
  <!-- ART section -->
  <g transform="translate(165,265)">
    <!-- Easel -->
    <line x1="-15" y1="-40" x2="-25" y2="20" stroke="#8D6E63" stroke-width="2"/>
    <line x1="15" y1="-40" x2="25" y2="20" stroke="#8D6E63" stroke-width="2"/>
    <line x1="0" y1="-40" x2="0" y2="25" stroke="#8D6E63" stroke-width="2"/>
    <!-- Canvas -->
    <rect x="-20" y="-40" width="40" height="30" fill="#FFF" stroke="#8D6E63" stroke-width="1"/>
    <!-- Paint on canvas (abstract) -->
    <circle cx="-8" cy="-28" r="5" fill="#F44336"/>
    <circle cx="5" cy="-22" r="4" fill="#2196F3"/>
    <rect x="-5" y="-18" width="10" height="6" fill="#4CAF50"/>
    <!-- Palette -->
    <ellipse cx="40" cy="-15" rx="15" ry="10" fill="#F5DEB3" stroke="#8D6E63" stroke-width="1"/>
    <circle cx="35" cy="-18" r="2.5" fill="#F44336"/>
    <circle cx="42" cy="-20" r="2.5" fill="#2196F3"/>
    <circle cx="48" cy="-15" r="2.5" fill="#FFEB3B"/>
    <circle cx="40" cy="-10" r="2.5" fill="#4CAF50"/>
    <!-- Brush -->
    <line x1="55" y1="-25" x2="40" y2="-5" stroke="#8D6E63" stroke-width="2"/>
    <rect x="38" y="-7" width="5" height="8" rx="1" fill="#8D6E63"/>
    <rect x="37" y="0" width="7" height="4" rx="1" fill="#4CAF50"/>
  </g>
  <text x="165" y="310" font-family="Arial" font-size="10" fill="#4A148C" text-anchor="middle">Drawing &amp; painting</text>
  <!-- Games/Music section -->
  <g transform="translate(370,265)">
    <!-- Headphones -->
    <path d="M-18,-5 Q-18,-25 0,-25 Q18,-25 18,-5" stroke="#333" stroke-width="3" fill="none"/>
    <rect x="-22" y="-8" width="10" height="16" rx="4" fill="#333"/>
    <rect x="12" y="-8" width="10" height="16" rx="4" fill="#333"/>
    <!-- Music notes -->
    <g fill="#E91E63">
      <circle cx="30" cy="-20" r="3"/>
      <line x1="33" y1="-20" x2="33" y2="-35" stroke="#E91E63" stroke-width="1.5"/>
      <circle cx="40" cy="-15" r="3"/>
      <line x1="43" y1="-15" x2="43" y2="-30" stroke="#E91E63" stroke-width="1.5"/>
      <path d="M33,-35 Q38,-38 43,-30" stroke="#E91E63" stroke-width="1" fill="none"/>
    </g>
  </g>
  <text x="370" y="310" font-family="Arial" font-size="10" fill="#880E4F" text-anchor="middle">Listening to music</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Hobbies and Free Time</text>
</svg>