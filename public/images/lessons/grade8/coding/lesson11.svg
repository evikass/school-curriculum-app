<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="fileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#dee2e6"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg11)"/>
  <!-- File icon left (reading) -->
  <g transform="translate(40, 40)">
    <path d="M0,10 L0,200 Q0,210 10,210 L100,210 Q110,210 110,200 L110,40 L80,10 Z" fill="url(#fileGrad)" stroke="#adb5bd" stroke-width="1.5"/>
    <path d="M80,10 L80,40 L110,40" fill="#dee2e6" stroke="#adb5bd" stroke-width="1"/>
    <!-- Text lines on file -->
    <line x1="15" y1="60" x2="90" y2="60" stroke="#adb5bd" stroke-width="2"/>
    <line x1="15" y1="75" x2="85" y2="75" stroke="#adb5bd" stroke-width="2"/>
    <line x1="15" y1="90" x2="70" y2="90" stroke="#adb5bd" stroke-width="2"/>
    <line x1="15" y1="105" x2="95" y2="105" stroke="#adb5bd" stroke-width="2"/>
    <line x1="15" y1="120" x2="60" y2="120" stroke="#adb5bd" stroke-width="2"/>
    <line x1="15" y1="135" x2="88" y2="135" stroke="#adb5bd" stroke-width="2"/>
    <line x1="15" y1="150" x2="75" y2="150" stroke="#adb5bd" stroke-width="2"/>
    <line x1="15" y1="165" x2="50" y2="165" stroke="#adb5bd" stroke-width="2"/>
    <text x="55" y="230" fill="#79c0ff" font-size="11" font-family="monospace" text-anchor="middle">data.txt</text>
  </g>
  <!-- Read arrow -->
  <g transform="translate(170, 110)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#00b894" stroke-width="2.5"/>
    <polygon points="50,-5 60,0 50,5" fill="#00b894"/>
    <text x="30" y="-10" fill="#00b894" font-size="10" font-family="monospace">.read()</text>
  </g>
  <!-- Write arrow -->
  <g transform="translate(170, 160)">
    <line x1="60" y1="0" x2="10" y2="0" stroke="#e17055" stroke-width="2.5"/>
    <polygon points="10,-5 0,0 10,5" fill="#e17055"/>
    <text x="30" y="-10" fill="#e17055" font-size="10" font-family="monospace">.write()</text>
  </g>
  <!-- Python program in center -->
  <rect x="230" y="50" width="170" height="200" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <rect x="230" y="50" width="170" height="22" rx="8" fill="#161b22"/>
  <circle cx="245" cy="61" r="4" fill="#ff5f56"/>
  <circle cx="257" cy="61" r="4" fill="#ffbd2e"/>
  <circle cx="269" cy="61" r="4" fill="#27c93f"/>
  <text x="315" y="65" fill="#8b949e" font-size="9" font-family="monospace" text-anchor="middle">file_io.py</text>
  <text fill="#c9d1d9" font-size="10" font-family="monospace">
    <tspan x="240" y="88" fill="#ff7b72">with</tspan><tspan fill="#79c0ff"> open(</tspan><tspan fill="#a5d6ff">"data.txt"</tspan><tspan fill="#79c0ff">,</tspan>
    <tspan x="240" y="104" fill="#79c0ff">  </tspan><tspan fill="#a5d6ff">"r"</tspan><tspan fill="#79c0ff">) </tspan><tspan fill="#ff7b72">as</tspan><tspan fill="#79c0ff"> f:</tspan>
    <tspan x="240" y="120" fill="#c9d1d9">    text = f.read()</tspan>
    <tspan x="240" y="148" fill="#ff7b72">with</tspan><tspan fill="#79c0ff"> open(</tspan><tspan fill="#a5d6ff">"out.txt"</tspan><tspan fill="#79c0ff">,</tspan>
    <tspan x="240" y="164" fill="#79c0ff">  </tspan><tspan fill="#a5d6ff">"w"</tspan><tspan fill="#79c0ff">) </tspan><tspan fill="#ff7b72">as</tspan><tspan fill="#79c0ff"> f:</tspan>
    <tspan x="240" y="180" fill="#c9d1d9">    f.write(text)</tspan>
    <tspan x="240" y="208" fill="#6e7681"># режимы:</tspan>
    <tspan x="240" y="224" fill="#6e7681"># "r" "w" "a" "r+"</tspan>
    <tspan x="240" y="240" fill="#6e7681"># "rb" "wb"</tspan>
  </text>
  <!-- File icon right (writing) -->
  <g transform="translate(415, 40)">
    <path d="M0,10 L0,200 Q0,210 10,210 L60,210 Q70,210 70,200 L70,40 L50,10 Z" fill="#00b894" opacity="0.2" stroke="#00b894" stroke-width="1"/>
    <path d="M50,10 L50,40 L70,40" fill="#00b894" opacity="0.15" stroke="#00b894" stroke-width="1"/>
    <text x="35" y="120" fill="#00b894" font-size="11" font-family="monospace" text-anchor="middle" transform="rotate(90,35,120)">output</text>
    <text x="35" y="230" fill="#00b894" font-size="11" font-family="monospace" text-anchor="middle">out.txt</text>
  </g>
  <!-- Disk/HDD icon -->
  <g transform="translate(200, 270)" opacity="0.25">
    <ellipse cx="50" cy="20" rx="50" ry="15" fill="none" stroke="#6c5ce7" stroke-width="2"/>
    <ellipse cx="50" cy="20" rx="25" ry="8" fill="none" stroke="#6c5ce7" stroke-width="1.5"/>
    <ellipse cx="50" cy="20" rx="8" ry="3" fill="#6c5ce7"/>
    <line x1="50" y1="5" x2="50" y2="35" stroke="#6c5ce7" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Работа с файлами</text>
</svg>