<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a28"/>
      <stop offset="100%" stop-color="#2d1654"/>
    </linearGradient>
    <marker id="arrow9" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ffd93d"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg9)"/>
  <!-- Dictionary title -->
  <text x="250" y="30" fill="#79c0ff" font-size="13" font-family="monospace" text-anchor="middle">student = {"имя": "Иван", "возраст": 14, "класс": "8А"}</text>
  <!-- Key-value pairs as connected boxes -->
  <!-- Pair 1 -->
  <g transform="translate(40, 55)">
    <!-- Key box -->
    <rect x="0" y="0" width="120" height="45" rx="6" fill="#6c5ce7" opacity="0.9"/>
    <text x="60" y="15" fill="#ddd" font-size="9" font-family="monospace" text-anchor="middle">ключ</text>
    <text x="60" y="33" fill="white" font-size="14" font-family="monospace" text-anchor="middle">"имя"</text>
    <!-- Arrow -->
    <line x1="125" y1="22" x2="155" y2="22" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrow9)"/>
    <!-- Value box -->
    <rect x="160" y="0" width="120" height="45" rx="6" fill="#00b894" opacity="0.9"/>
    <text x="220" y="15" fill="#ddd" font-size="9" font-family="monospace" text-anchor="middle">значение</text>
    <text x="220" y="33" fill="white" font-size="14" font-family="monospace" text-anchor="middle">"Иван"</text>
  </g>
  <!-- Pair 2 -->
  <g transform="translate(40, 115)">
    <rect x="0" y="0" width="120" height="45" rx="6" fill="#6c5ce7" opacity="0.9"/>
    <text x="60" y="15" fill="#ddd" font-size="9" font-family="monospace" text-anchor="middle">ключ</text>
    <text x="60" y="33" fill="white" font-size="14" font-family="monospace" text-anchor="middle">"возраст"</text>
    <line x1="125" y1="22" x2="155" y2="22" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrow9)"/>
    <rect x="160" y="0" width="120" height="45" rx="6" fill="#e17055" opacity="0.9"/>
    <text x="220" y="15" fill="#ddd" font-size="9" font-family="monospace" text-anchor="middle">значение</text>
    <text x="220" y="33" fill="white" font-size="14" font-family="monospace" text-anchor="middle">14</text>
  </g>
  <!-- Pair 3 -->
  <g transform="translate(40, 175)">
    <rect x="0" y="0" width="120" height="45" rx="6" fill="#6c5ce7" opacity="0.9"/>
    <text x="60" y="15" fill="#ddd" font-size="9" font-family="monospace" text-anchor="middle">ключ</text>
    <text x="60" y="33" fill="white" font-size="14" font-family="monospace" text-anchor="middle">"класс"</text>
    <line x1="125" y1="22" x2="155" y2="22" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrow9)"/>
    <rect x="160" y="0" width="120" height="45" rx="6" fill="#fdcb6e" opacity="0.9"/>
    <text x="220" y="15" fill="#666" font-size="9" font-family="monospace" text-anchor="middle">значение</text>
    <text x="220" y="33" fill="#333" font-size="14" font-family="monospace" text-anchor="middle">"8А"</text>
  </g>
  <!-- Curly braces decoration -->
  <text x="18" y="100" fill="#6c5ce7" font-size="50" font-family="monospace" opacity="0.3">{</text>
  <text x="310" y="100" fill="#6c5ce7" font-size="50" font-family="monospace" opacity="0.3">}</text>
  <!-- Access methods -->
  <g transform="translate(330, 55)">
    <rect width="150" height="120" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="75" y="18" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">Доступ</text>
    <text x="10" y="38" fill="#7ee787" font-size="10" font-family="monospace">student["имя"]</text>
    <text x="10" y="54" fill="#aaa" font-size="9" font-family="monospace">  → "Иван"</text>
    <text x="10" y="74" fill="#7ee787" font-size="10" font-family="monospace">student.get("тель")</text>
    <text x="10" y="90" fill="#aaa" font-size="9" font-family="monospace">  → None</text>
    <text x="10" y="110" fill="#79c0ff" font-size="10" font-family="monospace">"имя" in student</text>
    <text x="10" y="120" fill="#aaa" font-size="9" font-family="monospace">  → True</text>
  </g>
  <!-- Methods -->
  <g transform="translate(330, 190)">
    <rect width="150" height="110" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="75" y="18" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">Методы</text>
    <text x="10" y="38" fill="#79c0ff" font-size="10" font-family="monospace">.keys()</text>
    <text x="10" y="54" fill="#79c0ff" font-size="10" font-family="monospace">.values()</text>
    <text x="10" y="70" fill="#79c0ff" font-size="10" font-family="monospace">.items()</text>
    <text x="10" y="90" fill="#ff7b72" font-size="10" font-family="monospace">.pop("класс")</text>
    <text x="10" y="106" fill="#7ee787" font-size="10" font-family="monospace">.update({...})</text>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Словари</text>
</svg>