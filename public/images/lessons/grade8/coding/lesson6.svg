<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d1b4e"/>
    </linearGradient>
    <marker id="arrow6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e0e0e0"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg6)"/>
  <!-- Circular loop diagram -->
  <!-- Start node -->
  <rect x="175" y="20" width="150" height="40" rx="8" fill="#6c5ce7" stroke="#8b7be8" stroke-width="1.5"/>
  <text x="250" y="45" fill="white" font-size="13" font-family="monospace" text-anchor="middle">n = 10</text>
  <!-- Arrow down to condition -->
  <line x1="250" y1="60" x2="250" y2="85" stroke="#e0e0e0" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <!-- Diamond condition -->
  <polygon points="250,90 370,140 250,190 130,140" fill="#fdcb6e" stroke="#f0b429" stroke-width="1.5"/>
  <text x="250" y="136" fill="#333" font-size="11" font-family="monospace" text-anchor="middle">while</text>
  <text x="250" y="152" fill="#333" font-size="11" font-family="monospace" text-anchor="middle">n &gt; 0 ?</text>
  <!-- True arrow right -->
  <line x1="370" y1="140" x2="430" y2="140" stroke="#00b894" stroke-width="1.5"/>
  <text x="395" y="134" fill="#00b894" font-size="10">Да</text>
  <!-- Action box right -->
  <rect x="400" y="120" width="85" height="40" rx="6" fill="#00b894" stroke="#00a381" stroke-width="1.5"/>
  <text x="442" y="138" fill="white" font-size="10" font-family="monospace" text-anchor="middle">print(n)</text>
  <text x="442" y="152" fill="white" font-size="10" font-family="monospace" text-anchor="middle">n -= 1</text>
  <!-- Loop back arrow from action to condition -->
  <path d="M442,160 L442,210 Q442,230 422,230 L270,230 Q250,230 250,210 L250,190" fill="none" stroke="#ffd93d" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow6)"/>
  <text x="350" y="225" fill="#ffd93d" font-size="9" font-family="monospace">итерация</text>
  <!-- False arrow down -->
  <line x1="250" y1="190" x2="250" y2="255" stroke="#e17055" stroke-width="1.5" marker-end="url(#arrow6)"/>
  <text x="260" y="215" fill="#e17055" font-size="10">Нет</text>
  <!-- End box -->
  <rect x="190" y="260" width="120" height="35" rx="8" fill="#e17055" stroke="#d63031" stroke-width="1.5"/>
  <text x="250" y="282" fill="white" font-size="12" font-family="monospace" text-anchor="middle">Конец цикла</text>
  <!-- Countdown visualization -->
  <g transform="translate(20, 80)" opacity="0.6">
    <text fill="#6c5ce7" font-size="28" font-family="monospace" font-weight="bold">10</text>
    <text y="35" fill="#6c5ce7" font-size="24" font-family="monospace">9</text>
    <text y="65" fill="#6c5ce7" font-size="20" font-family="monospace">8</text>
    <text y="92" fill="#6c5ce7" font-size="17" font-family="monospace">7</text>
    <text y="116" fill="#6c5ce7" font-size="14" font-family="monospace">6</text>
    <text y="137" fill="#6c5ce7" font-size="11" font-family="monospace">5</text>
    <text y="155" fill="#6c5ce7" font-size="9" font-family="monospace">4</text>
    <text y="170" fill="#6c5ce7" font-size="7" font-family="monospace">3</text>
    <text y="183" fill="#6c5ce7" font-size="6" font-family="monospace">2</text>
    <text y="194" fill="#6c5ce7" font-size="5" font-family="monospace">1</text>
    <text y="204" fill="#e17055" font-size="5" font-family="monospace">0!</text>
  </g>
  <!-- Infinity symbol hint -->
  <g transform="translate(410, 260)" opacity="0.15">
    <path d="M20,20 C20,10 35,0 45,10 C55,20 55,30 45,30 C35,30 20,20 20,20 C20,20 5,30 -5,20 C-15,10 -5,0 5,10 C15,20 20,20 20,20 Z" fill="#ffd93d" transform="scale(1.5)"/>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Цикл while</text>
</svg>