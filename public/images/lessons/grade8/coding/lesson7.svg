<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#2a3f5f"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg7)"/>
  <!-- String visualization -->
  <text x="250" y="40" fill="#7ee787" font-size="14" font-family="monospace" text-anchor="middle">s = "ПРИВЕТ"</text>
  <!-- Character boxes -->
  <g transform="translate(55, 55)">
    <!-- П -->
    <rect x="0" y="0" width="55" height="55" rx="4" fill="#e17055" opacity="0.9"/>
    <text x="27" y="37" fill="white" font-size="22" font-family="monospace" text-anchor="middle">П</text>
    <text x="27" y="72" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">0</text>
    <text x="27" y="-8" fill="#6c5ce7" font-size="9" font-family="monospace" text-anchor="middle">-6</text>
    <!-- Р -->
    <rect x="60" y="0" width="55" height="55" rx="4" fill="#6c5ce7" opacity="0.9"/>
    <text x="87" y="37" fill="white" font-size="22" font-family="monospace" text-anchor="middle">Р</text>
    <text x="87" y="72" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">1</text>
    <text x="87" y="-8" fill="#6c5ce7" font-size="9" font-family="monospace" text-anchor="middle">-5</text>
    <!-- И -->
    <rect x="120" y="0" width="55" height="55" rx="4" fill="#00b894" opacity="0.9"/>
    <text x="147" y="37" fill="white" font-size="22" font-family="monospace" text-anchor="middle">И</text>
    <text x="147" y="72" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">2</text>
    <text x="147" y="-8" fill="#6c5ce7" font-size="9" font-family="monospace" text-anchor="middle">-4</text>
    <!-- В -->
    <rect x="180" y="0" width="55" height="55" rx="4" fill="#fdcb6e" opacity="0.9"/>
    <text x="207" y="37" fill="#333" font-size="22" font-family="monospace" text-anchor="middle">В</text>
    <text x="207" y="72" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">3</text>
    <text x="207" y="-8" fill="#6c5ce7" font-size="9" font-family="monospace" text-anchor="middle">-3</text>
    <!-- Е -->
    <rect x="240" y="0" width="55" height="55" rx="4" fill="#e17055" opacity="0.9"/>
    <text x="267" y="37" fill="white" font-size="22" font-family="monospace" text-anchor="middle">Е</text>
    <text x="267" y="72" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">4</text>
    <text x="267" y="-8" fill="#6c5ce7" font-size="9" font-family="monospace" text-anchor="middle">-2</text>
    <!-- Т -->
    <rect x="300" y="0" width="55" height="55" rx="4" fill="#6c5ce7" opacity="0.9"/>
    <text x="327" y="37" fill="white" font-size="22" font-family="monospace" text-anchor="middle">Т</text>
    <text x="327" y="72" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">5</text>
    <text x="327" y="-8" fill="#6c5ce7" font-size="9" font-family="monospace" text-anchor="middle">-1</text>
  </g>
  <!-- Slicing visualization -->
  <g transform="translate(55, 150)">
    <!-- Slice bracket -->
    <path d="M0,0 L-5,-10 L-5,30 L0,20" fill="none" stroke="#ffd93d" stroke-width="2"/>
    <path d="M175,0 L180,-10 L180,30 L175,20" fill="none" stroke="#ffd93d" stroke-width="2"/>
    <text x="87" y="35" fill="#ffd93d" font-size="11" font-family="monospace" text-anchor="middle">s[0:3] → "ПРИ"</text>
  </g>
  <!-- Second slice -->
  <g transform="translate(55, 200)">
    <path d="M120,0 L115,-10 L115,30 L120,20" fill="none" stroke="#00b894" stroke-width="2"/>
    <path d="M355,0 L360,-10 L360,30 L355,20" fill="none" stroke="#00b894" stroke-width="2"/>
    <text x="237" y="35" fill="#00b894" font-size="11" font-family="monospace" text-anchor="middle">s[2:] → "ИВЕТ"</text>
  </g>
  <!-- String methods -->
  <g transform="translate(30, 270)">
    <rect width="440" height="50" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text fill="#79c0ff" font-size="11" font-family="monospace">
      <tspan x="10" y="18">s.upper()  s.lower()  s.replace("П","О")</tspan>
      <tspan x="10" y="36">len(s) → 6    s.find("И") → 2    s[::-1] → "ТЕВИРП"</tspan>
    </text>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Строки</text>
</svg>