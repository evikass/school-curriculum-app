<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="boxInt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#00a381"/>
    </linearGradient>
    <linearGradient id="boxStr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e17055"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
    <linearGradient id="boxFloat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#5f3dc4"/>
    </linearGradient>
    <linearGradient id="boxBool" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdcb6e"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg2)"/>
  <!-- Memory shelf -->
  <rect x="30" y="280" width="440" height="6" rx="3" fill="#444" opacity="0.5"/>
  <!-- Variable boxes -->
  <!-- int box -->
  <g transform="translate(40, 60)">
    <rect width="120" height="100" rx="8" fill="url(#boxInt)" opacity="0.9"/>
    <rect x="5" y="5" width="110" height="25" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="60" y="22" fill="white" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">int</text>
    <text x="60" y="55" fill="white" font-size="14" font-family="monospace" text-anchor="middle">x = 5</text>
    <text x="60" y="80" fill="rgba(255,255,255,0.7)" font-size="10" font-family="monospace" text-anchor="middle">целое число</text>
    <!-- Address tag -->
    <rect x="80" y="-15" width="45" height="15" rx="3" fill="#00b894"/>
    <text x="102" y="-4" fill="white" font-size="8" font-family="monospace" text-anchor="middle">0x3A</text>
    <line x1="90" y1="0" x2="90" y2="5" stroke="#00b894" stroke-width="1"/>
  </g>
  <!-- str box -->
  <g transform="translate(190, 60)">
    <rect width="120" height="100" rx="8" fill="url(#boxStr)" opacity="0.9"/>
    <rect x="5" y="5" width="110" height="25" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="60" y="22" fill="white" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">str</text>
    <text x="60" y="52" fill="white" font-size="12" font-family="monospace" text-anchor="middle">name=</text>
    <text x="60" y="72" fill="white" font-size="13" font-family="monospace" text-anchor="middle">"Anna"</text>
    <text x="60" y="92" fill="rgba(255,255,255,0.7)" font-size="10" font-family="monospace" text-anchor="middle">строка</text>
    <rect x="80" y="-15" width="45" height="15" rx="3" fill="#e17055"/>
    <text x="102" y="-4" fill="white" font-size="8" font-family="monospace" text-anchor="middle">0x7F</text>
  </g>
  <!-- float box -->
  <g transform="translate(340, 60)">
    <rect width="120" height="100" rx="8" fill="url(#boxFloat)" opacity="0.9"/>
    <rect x="5" y="5" width="110" height="25" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="60" y="22" fill="white" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">float</text>
    <text x="60" y="55" fill="white" font-size="14" font-family="monospace" text-anchor="middle">pi=3.14</text>
    <text x="60" y="80" fill="rgba(255,255,255,0.7)" font-size="10" font-family="monospace" text-anchor="middle">вещественное</text>
    <rect x="80" y="-15" width="45" height="15" rx="3" fill="#6c5ce7"/>
    <text x="102" y="-4" fill="white" font-size="8" font-family="monospace" text-anchor="middle">0xB2</text>
  </g>
  <!-- bool box -->
  <g transform="translate(120, 185)">
    <rect width="120" height="80" rx="8" fill="url(#boxBool)" opacity="0.9"/>
    <rect x="5" y="5" width="110" height="22" rx="4" fill="rgba(0,0,0,0.2)"/>
    <text x="60" y="20" fill="#333" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">bool</text>
    <text x="60" y="48" fill="#333" font-size="14" font-family="monospace" text-anchor="middle">ok=True</text>
    <text x="60" y="68" fill="rgba(0,0,0,0.5)" font-size="10" font-family="monospace" text-anchor="middle">логический</text>
  </g>
  <!-- Assignment arrows -->
  <g stroke="#aaa" stroke-width="1.5" fill="none" opacity="0.4">
    <path d="M60,50 L60,58" marker-end="url(#arrow2)"/>
    <path d="M250,50 L250,58"/>
    <path d="M400,50 L400,58"/>
  </g>
  <!-- Type conversion arrows -->
  <g stroke="#ffd93d" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="4,3">
    <path d="M160,110 Q175,140 190,110"/>
    <path d="M310,110 Q325,140 340,110"/>
    <text x="175" y="135" fill="#ffd93d" font-size="8" opacity="0.5">int()</text>
    <text x="325" y="135" fill="#ffd93d" font-size="8" opacity="0.5">float()</text>
  </g>
  <!-- Memory icon -->
  <g transform="translate(370, 200)" opacity="0.3">
    <rect width="80" height="55" rx="4" fill="none" stroke="#6c5ce7" stroke-width="1.5"/>
    <line x1="0" y1="18" x2="80" y2="18" stroke="#6c5ce7" stroke-width="0.5"/>
    <line x1="0" y1="36" x2="80" y2="36" stroke="#6c5ce7" stroke-width="0.5"/>
    <text x="40" y="14" fill="#6c5ce7" font-size="9" font-family="monospace" text-anchor="middle">RAM</text>
    <rect x="5" y="22" width="15" height="10" fill="#6c5ce7" opacity="0.4"/>
    <rect x="25" y="22" width="15" height="10" fill="#00b894" opacity="0.4"/>
    <rect x="45" y="22" width="15" height="10" fill="#e17055" opacity="0.4"/>
    <rect x="5" y="40" width="15" height="10" fill="#fdcb6e" opacity="0.4"/>
    <rect x="25" y="40" width="15" height="10" fill="#6c5ce7" opacity="0.2"/>
  </g>
  <!-- Decorative = signs -->
  <text x="25" y="310" fill="#00b894" font-size="18" font-family="monospace" opacity="0.15">=</text>
  <text x="470" y="300" fill="#e17055" font-size="22" font-family="monospace" opacity="0.15">=</text>
  <text x="280" y="320" fill="#6c5ce7" font-size="16" font-family="monospace" opacity="0.12">=</text>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Переменные и типы данных</text>
</svg>