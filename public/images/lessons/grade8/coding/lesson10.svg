<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a3045"/>
    </linearGradient>
    <marker id="arrow10" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd93d"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg10)"/>
  <!-- Machine body -->
  <rect x="120" y="70" width="260" height="160" rx="16" fill="#2a3f5f" stroke="#4a6f9f" stroke-width="2"/>
  <!-- Machine top label -->
  <rect x="180" y="55" width="140" height="30" rx="6" fill="#6c5ce7"/>
  <text x="250" y="75" fill="white" font-size="14" font-family="monospace" text-anchor="middle" font-weight="bold">def f(x):</text>
  <!-- Input funnel -->
  <polygon points="40,120 120,90 120,150" fill="#e17055" opacity="0.8"/>
  <rect x="20" y="110" width="30" height="30" rx="4" fill="#e17055"/>
  <text x="35" y="130" fill="white" font-size="10" font-family="monospace" text-anchor="middle">x</text>
  <text x="65" y="155" fill="#e17055" font-size="11" font-family="monospace" text-anchor="middle">аргументы</text>
  <!-- Output pipe -->
  <polygon points="380,90 460,120 380,150" fill="#00b894" opacity="0.8"/>
  <rect x="450" y="110" width="30" height="30" rx="4" fill="#00b894"/>
  <text x="465" y="130" fill="white" font-size="10" font-family="monospace" text-anchor="middle">y</text>
  <text x="420" y="155" fill="#00b894" font-size="11" font-family="monospace" text-anchor="middle">результат</text>
  <!-- Gears inside machine -->
  <g transform="translate(200, 140)" opacity="0.5">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#ffd93d" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#ffd93d"/>
    <line x1="0" y1="-25" x2="0" y2="-18" stroke="#ffd93d" stroke-width="3"/>
    <line x1="0" y1="25" x2="0" y2="18" stroke="#ffd93d" stroke-width="3"/>
    <line x1="-25" y1="0" x2="-18" y2="0" stroke="#ffd93d" stroke-width="3"/>
    <line x1="25" y1="0" x2="18" y2="0" stroke="#ffd93d" stroke-width="3"/>
  </g>
  <g transform="translate(280, 155)" opacity="0.5">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#79c0ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#79c0ff"/>
    <line x1="0" y1="-18" x2="0" y2="-12" stroke="#79c0ff" stroke-width="2.5"/>
    <line x1="0" y1="18" x2="0" y2="12" stroke="#79c0ff" stroke-width="2.5"/>
    <line x1="-18" y1="0" x2="-12" y2="0" stroke="#79c0ff" stroke-width="2.5"/>
    <line x1="18" y1="0" x2="12" y2="0" stroke="#79c0ff" stroke-width="2.5"/>
  </g>
  <!-- Flow arrows -->
  <line x1="52" y1="125" x2="115" y2="125" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrow10)"/>
  <line x1="380" y1="125" x2="445" y2="125" stroke="#ffd93d" stroke-width="2" marker-end="url(#arrow10)"/>
  <!-- Code example -->
  <rect x="30" y="245" width="440" height="75" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text fill="#79c0ff" font-size="11" font-family="monospace">
    <tspan x="45" y="267" fill="#ff7b72">def</tspan><tspan fill="#79c0ff"> square(n):</tspan>
    <tspan x="45" y="285" fill="#7ee787">    return n ** 2</tspan>
    <tspan x="45" y="305" fill="#79c0ff">result = square(5)  </tspan><tspan fill="#aaa"># → 25</tspan>
  </text>
  <!-- Return arrow inside machine -->
  <path d="M150,190 Q250,210 350,190" fill="none" stroke="#ffd93d" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <text x="250" y="210" fill="#ffd93d" font-size="8" font-family="monospace" text-anchor="middle" opacity="0.5">return</text>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Функции</text>
</svg>