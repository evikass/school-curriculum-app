<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b1464"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
    <linearGradient id="calcBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d3d5c"/>
      <stop offset="100%" stop-color="#2a2a40"/>
    </linearGradient>
    <linearGradient id="screen3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8e6cf"/>
      <stop offset="100%" stop-color="#88d8b0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg3)"/>
  <!-- Calculator body -->
  <rect x="140" y="30" width="220" height="290" rx="16" fill="url(#calcBody)" stroke="#555" stroke-width="2"/>
  <rect x="148" y="38" width="204" height="60" rx="8" fill="url(#screen3)" opacity="0.9"/>
  <!-- Screen text -->
  <text x="340" y="62" fill="#1b1464" font-size="20" font-family="monospace" text-anchor="end">42 + 58</text>
  <text x="340" y="86" fill="#1b1464" font-size="28" font-family="monospace" text-anchor="end" font-weight="bold">= 100</text>
  <!-- Buttons row 1 -->
  <rect x="155" y="112" width="44" height="36" rx="6" fill="#6c5ce7"/>
  <text x="177" y="135" fill="white" font-size="18" font-family="sans-serif" text-anchor="middle">+</text>
  <rect x="205" y="112" width="44" height="36" rx="6" fill="#6c5ce7"/>
  <text x="227" y="135" fill="white" font-size="18" font-family="sans-serif" text-anchor="middle">−</text>
  <rect x="255" y="112" width="44" height="36" rx="6" fill="#6c5ce7"/>
  <text x="277" y="135" fill="white" font-size="18" font-family="sans-serif" text-anchor="middle">×</text>
  <rect x="305" y="112" width="44" height="36" rx="6" fill="#6c5ce7"/>
  <text x="327" y="135" fill="white" font-size="18" font-family="sans-serif" text-anchor="middle">÷</text>
  <!-- Numbers -->
  <rect x="155" y="155" width="44" height="32" rx="5" fill="#4a4a6a"/>
  <text x="177" y="176" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">7</text>
  <rect x="205" y="155" width="44" height="32" rx="5" fill="#4a4a6a"/>
  <text x="227" y="176" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">8</text>
  <rect x="255" y="155" width="44" height="32" rx="5" fill="#4a4a6a"/>
  <text x="277" y="176" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">9</text>
  <rect x="305" y="155" width="44" height="32" rx="5" fill="#e17055"/>
  <text x="327" y="176" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">%</text>
  <rect x="155" y="194" width="44" height="32" rx="5" fill="#4a4a6a"/>
  <text x="177" y="215" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">4</text>
  <rect x="205" y="194" width="44" height="32" rx="5" fill="#4a4a6a"/>
  <text x="227" y="215" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">5</text>
  <rect x="255" y="194" width="44" height="32" rx="5" fill="#4a4a6a"/>
  <text x="277" y="215" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">6</text>
  <rect x="305" y="194" width="44" height="32" rx="5" fill="#fdcb6e"/>
  <text x="327" y="215" fill="#333" font-size="12" font-family="sans-serif" text-anchor="middle">**</text>
  <rect x="155" y="233" width="44" height="32" rx="5" fill="#4a4a6a"/>
  <text x="177" y="254" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">1</text>
  <rect x="205" y="233" width="44" height="32" rx="5" fill="#4a4a6a"/>
  <text x="227" y="254" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">2</text>
  <rect x="255" y="233" width="44" height="32" rx="5" fill="#4a4a6a"/>
  <text x="277" y="254" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">3</text>
  <rect x="305" y="233" width="44" height="32" rx="5" fill="#fdcb6e"/>
  <text x="327" y="254" fill="#333" font-size="12" font-family="sans-serif" text-anchor="middle">//</text>
  <rect x="155" y="272" width="94" height="32" rx="5" fill="#4a4a6a"/>
  <text x="202" y="293" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">0</text>
  <rect x="255" y="272" width="44" height="32" rx="5" fill="#00b894"/>
  <text x="277" y="293" fill="white" font-size="14" font-family="sans-serif" text-anchor="middle">=</text>
  <rect x="305" y="272" width="44" height="32" rx="5" fill="#fdcb6e"/>
  <text x="327" y="293" fill="#333" font-size="11" font-family="monospace" text-anchor="middle">divmod</text>
  <!-- Left side - operation examples -->
  <g transform="translate(20, 50)" opacity="0.7">
    <text x="0" y="0" fill="#6c5ce7" font-size="13" font-family="monospace">10 + 3 = 13</text>
    <text x="0" y="24" fill="#6c5ce7" font-size="13" font-family="monospace">10 - 3 = 7</text>
    <text x="0" y="48" fill="#6c5ce7" font-size="13" font-family="monospace">10 * 3 = 30</text>
    <text x="0" y="72" fill="#6c5ce7" font-size="13" font-family="monospace">10 / 3 = 3.33</text>
    <text x="0" y="96" fill="#e17055" font-size="13" font-family="monospace">10 // 3 = 3</text>
    <text x="0" y="120" fill="#e17055" font-size="13" font-family="monospace">10 % 3 = 1</text>
    <text x="0" y="144" fill="#fdcb6e" font-size="13" font-family="monospace">10 ** 3 = 1000</text>
  </g>
  <!-- Right side - operator symbols floating -->
  <g opacity="0.2">
    <text x="395" y="80" fill="#6c5ce7" font-size="40" font-family="sans-serif">+</text>
    <text x="420" y="150" fill="#e17055" font-size="36" font-family="sans-serif">−</text>
    <text x="400" y="220" fill="#fdcb6e" font-size="38" font-family="sans-serif">×</text>
    <text x="430" y="290" fill="#00b894" font-size="34" font-family="sans-serif">÷</text>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Арифметические операции</text>
</svg>