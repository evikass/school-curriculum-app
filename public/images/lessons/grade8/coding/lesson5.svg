<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b263b"/>
    </linearGradient>
    <marker id="arrow5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ffd93d"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg5)"/>
  <!-- Conveyor belt -->
  <rect x="30" y="150" width="440" height="12" rx="6" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Belt marks -->
  <g stroke="#555" stroke-width="1">
    <line x1="50" y1="150" x2="50" y2="162"/>
    <line x1="80" y1="150" x2="80" y2="162"/>
    <line x1="110" y1="150" x2="110" y2="162"/>
    <line x1="140" y1="150" x2="140" y2="162"/>
    <line x1="170" y1="150" x2="170" y2="162"/>
    <line x1="200" y1="150" x2="200" y2="162"/>
    <line x1="230" y1="150" x2="230" y2="162"/>
    <line x1="260" y1="150" x2="260" y2="162"/>
    <line x1="290" y1="150" x2="290" y2="162"/>
    <line x1="320" y1="150" x2="320" y2="162"/>
    <line x1="350" y1="150" x2="350" y2="162"/>
    <line x1="380" y1="150" x2="380" y2="162"/>
    <line x1="410" y1="150" x2="410" y2="162"/>
    <line x1="440" y1="150" x2="440" y2="162"/>
  </g>
  <!-- Belt rollers -->
  <circle cx="45" cy="156" r="10" fill="#444" stroke="#666" stroke-width="1.5"/>
  <circle cx="455" cy="156" r="10" fill="#444" stroke="#666" stroke-width="1.5"/>
  <!-- List items on conveyor -->
  <g>
    <rect x="70" y="108" width="60" height="40" rx="6" fill="#e17055"/>
    <text x="100" y="133" fill="white" font-size="13" font-family="monospace" text-anchor="middle">"яб"</text>
    <text x="100" y="98" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">[0]</text>
  </g>
  <g>
    <rect x="160" y="108" width="60" height="40" rx="6" fill="#6c5ce7"/>
    <text x="190" y="133" fill="white" font-size="13" font-family="monospace" text-anchor="middle">"ап"</text>
    <text x="190" y="98" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">[1]</text>
  </g>
  <g>
    <rect x="250" y="108" width="60" height="40" rx="6" fill="#00b894"/>
    <text x="280" y="133" fill="white" font-size="13" font-family="monospace" text-anchor="middle">"вш"</text>
    <text x="280" y="98" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">[2]</text>
  </g>
  <g>
    <rect x="340" y="108" width="60" height="40" rx="6" fill="#fdcb6e"/>
    <text x="370" y="133" fill="#333" font-size="13" font-family="monospace" text-anchor="middle">"сл"</text>
    <text x="370" y="98" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">[3]</text>
  </g>
  <!-- Loop variable pointer -->
  <g>
    <rect x="240" y="175" width="80" height="28" rx="5" fill="#ffd93d"/>
    <text x="280" y="194" fill="#333" font-size="12" font-family="monospace" text-anchor="middle" font-weight="bold">fruit</text>
    <line x1="280" y1="148" x2="280" y2="175" stroke="#ffd93d" stroke-width="2" stroke-dasharray="4,2"/>
    <polygon points="280,148 276,155 284,155" fill="#ffd93d"/>
  </g>
  <!-- Arrow showing iteration direction -->
  <line x1="100" y1="170" x2="220" y2="170" stroke="#ffd93d" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow5)"/>
  <!-- Code box -->
  <rect x="30" y="220" width="200" height="100" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text fill="#79c0ff" font-size="11" font-family="monospace">
    <tspan x="42" y="242">fruits = ["яб","ап",</tspan>
    <tspan x="42" y="258">           "вш","сл"]</tspan>
    <tspan x="42" y="278" fill="#ff7b72">for</tspan><tspan fill="#79c0ff"> fruit </tspan><tspan fill="#ff7b72">in</tspan><tspan fill="#79c0ff"> fruits:</tspan>
    <tspan x="42" y="294" fill="#7ee787">    print(fruit)</tspan>
  </text>
  <!-- Output box -->
  <rect x="270" y="220" width="200" height="100" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="280" y="236" fill="#8b949e" font-size="9" font-family="monospace">Вывод:</text>
  <text fill="#7ee787" font-size="11" font-family="monospace">
    <tspan x="280" y="254">яб</tspan>
    <tspan x="280" y="270">ап</tspan>
    <tspan x="280" y="286">вш</tspan>
    <tspan x="280" y="302">сл</tspan>
  </text>
  <!-- Step counter -->
  <g transform="translate(440, 220)" opacity="0.4">
    <text fill="#ffd93d" font-size="10" font-family="monospace">i=0</text>
    <text y="14" fill="#ffd93d" font-size="10" font-family="monospace">i=1</text>
    <text y="28" fill="#ffd93d" font-size="10" font-family="monospace">i=2</text>
    <text y="42" fill="#ffd93d" font-size="10" font-family="monospace">i=3</text>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Цикл for</text>
</svg>