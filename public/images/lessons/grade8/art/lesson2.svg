<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#6B4E12"/>
      <stop offset="100%" stop-color="#5A3E0E"/>
    </linearGradient>
    <radialGradient id="goldenHalo" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#FFD700"/>
      <stop offset="80%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#B8860B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="robeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#5C0000"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#F0E68C"/>
    </linearGradient>
  </defs>
  <!-- Background - warm dark -->
  <rect width="500" height="350" fill="#2A1F14"/>
  <!-- Wooden board frame -->
  <rect x="80" y="15" width="340" height="310" rx="8" fill="url(#woodGrad)" stroke="#4A3010" stroke-width="3"/>
  <!-- Inner recessed area -->
  <rect x="95" y="30" width="310" height="280" rx="5" fill="#3A2A18" stroke="#5A4020" stroke-width="1"/>
  <!-- Icon painting surface -->
  <rect x="105" y="40" width="290" height="260" rx="3" fill="url(#innerGlow)"/>
  <!-- Golden halo -->
  <circle cx="250" cy="120" r="65" fill="url(#goldenHalo)"/>
  <!-- Halo inner ring -->
  <circle cx="250" cy="120" r="55" fill="none" stroke="#DAA520" stroke-width="2"/>
  <circle cx="250" cy="120" r="50" fill="none" stroke="#B8860B" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Face -->
  <ellipse cx="250" cy="115" rx="28" ry="34" fill="#DEB887"/>
  <!-- Eyes -->
  <ellipse cx="240" cy="108" rx="5" ry="3" fill="#2A1F14"/>
  <ellipse cx="260" cy="108" rx="5" ry="3" fill="#2A1F14"/>
  <circle cx="241" cy="107" r="1.2" fill="#111"/>
  <circle cx="261" cy="107" r="1.2" fill="#111"/>
  <!-- Nose -->
  <path d="M250 110 L247 122 L253 122" fill="none" stroke="#B8876B" stroke-width="1"/>
  <!-- Mouth -->
  <path d="M243 130 Q250 133 257 130" fill="none" stroke="#A0705A" stroke-width="1.2"/>
  <!-- Beard -->
  <path d="M232 125 Q230 145 235 160 Q240 168 250 170 Q260 168 265 160 Q270 145 268 125" fill="#8B7355" stroke="#6B5A40" stroke-width="0.5"/>
  <!-- Hair -->
  <path d="M222 95 Q225 75 250 72 Q275 75 278 95" fill="#6B5A40" stroke="#5A4A30" stroke-width="0.5"/>
  <path d="M222 95 Q218 105 220 115" fill="#6B5A40"/>
  <path d="M278 95 Q282 105 280 115" fill="#6B5A40"/>
  <!-- Robe -->
  <path d="M210 150 Q200 200 195 280 L305 280 Q300 200 290 150 Q270 145 250 148 Q230 145 210 150 Z" fill="url(#robeGrad)"/>
  <!-- Robe decoration - gold trim -->
  <path d="M215 155 L285 155" stroke="#DAA520" stroke-width="1.5"/>
  <path d="M205 200 L295 200" stroke="#DAA520" stroke-width="0.8" opacity="0.5"/>
  <!-- Cross on robe -->
  <rect x="240" y="185" width="20" height="30" fill="none" stroke="#DAA520" stroke-width="1.5" rx="1"/>
  <line x1="250" y1="185" x2="250" y2="215" stroke="#DAA520" stroke-width="1.5"/>
  <line x1="240" y1="195" x2="260" y2="195" stroke="#DAA520" stroke-width="1.5"/>
  <!-- Hands holding scroll -->
  <ellipse cx="225" cy="230" rx="10" ry="7" fill="#DEB887"/>
  <ellipse cx="275" cy="230" rx="10" ry="7" fill="#DEB887"/>
  <!-- Scroll -->
  <rect x="220" y="220" width="60" height="25" rx="3" fill="#FFF8DC" stroke="#B8860B" stroke-width="1"/>
  <line x1="228" y1="228" x2="272" y2="228" stroke="#8B6914" stroke-width="0.5"/>
  <line x1="228" y1="233" x2="272" y2="233" stroke="#8B6914" stroke-width="0.5"/>
  <line x1="228" y1="238" x2="260" y2="238" stroke="#8B6914" stroke-width="0.5"/>
  <!-- Inscription at top (МР ОУ - traditional) -->
  <text x="185" y="62" font-size="14" fill="#DAA520" font-family="serif" font-weight="bold">МР</text>
  <text x="290" y="62" font-size="14" fill="#DAA520" font-family="serif" font-weight="bold">ОУ</text>
  <!-- Border decoration -->
  <rect x="105" y="40" width="290" height="260" rx="3" fill="none" stroke="#B8860B" stroke-width="2"/>
  <rect x="100" y="35" width="300" height="270" rx="4" fill="none" stroke="#8B6914" stroke-width="1"/>
  <!-- Corner ornaments -->
  <g fill="#DAA520" opacity="0.7">
    <circle cx="110" cy="45" r="3"/>
    <circle cx="390" cy="45" r="3"/>
    <circle cx="110" cy="295" r="3"/>
    <circle cx="390" cy="295" r="3"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" opacity="0.5" font-family="sans-serif" fill="#AAA">Русская икона</text>
</svg>