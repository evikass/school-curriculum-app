<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="waterGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6AAC8A"/>
      <stop offset="100%" stop-color="#4A8A6A"/>
    </linearGradient>
    <linearGradient id="lilyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8A0B8"/>
      <stop offset="100%" stop-color="#D06088"/>
    </linearGradient>
  </defs>
  <!-- Water/pond background - Monet style with dabs of color -->
  <rect width="500" height="350" fill="#5A9A7A"/>
  
  <!-- Water reflections - dabs of color technique -->
  <g opacity="0.6">
    <!-- Blue reflections -->
    <ellipse cx="50" cy="80" rx="18" ry="8" fill="#4A7AAA" transform="rotate(-5 50 80)"/>
    <ellipse cx="150" cy="60" rx="22" ry="7" fill="#5A8ABB"/>
    <ellipse cx="280" cy="50" rx="15" ry="6" fill="#4A7AAA"/>
    <ellipse cx="400" cy="70" rx="20" ry="8" fill="#5A8ABB"/>
    <ellipse cx="450" cy="100" rx="16" ry="6" fill="#4A7AAA"/>
    
    <!-- Green reflections -->
    <ellipse cx="100" cy="120" rx="20" ry="8" fill="#4A8A5A" transform="rotate(8 100 120)"/>
    <ellipse cx="200" cy="100" rx="25" ry="7" fill="#5A9A6A"/>
    <ellipse cx="350" cy="90" rx="18" ry="7" fill="#4A8A5A"/>
    <ellipse cx="60" cy="160" rx="22" ry="8" fill="#5A9A6A"/>
    <ellipse cx="450" cy="150" rx="20" ry="7" fill="#4A8A5A"/>
    
    <!-- Purple/lavender reflections -->
    <ellipse cx="130" cy="150" rx="15" ry="6" fill="#8A6AAA" transform="rotate(-10 130 150)"/>
    <ellipse cx="320" cy="130" rx="18" ry="6" fill="#7A5A9A"/>
    <ellipse cx="470" cy="180" rx="14" ry="5" fill="#8A6AAA"/>
  </g>
  
  <!-- Bridge (Japanese style) -->
  <path d="M50 200 Q250 130 450 200" fill="none" stroke="#6A8A5A" stroke-width="8"/>
  <path d="M50 200 Q250 130 450 200" fill="none" stroke="#5A7A4A" stroke-width="5"/>
  <!-- Bridge railings -->
  <g stroke="#5A7A4A" stroke-width="1.5">
    <line x1="80" y1="195" x2="80" y2="182"/>
    <line x1="120" y1="182" x2="120" y2="170"/>
    <line x1="160" y1="172" x2="160" y2="160"/>
    <line x1="200" y1="165" x2="200" y2="153"/>
    <line x1="240" y1="162" x2="240" y2="150"/>
    <line x1="280" y1="162" x2="280" y2="150"/>
    <line x1="320" y1="165" x2="320" y2="153"/>
    <line x1="360" y1="172" x2="360" y2="160"/>
    <line x1="400" y1="182" x2="400" y2="170"/>
    <line x1="440" y1="195" x2="440" y2="182"/>
  </g>
  <!-- Railing top rail -->
  <path d="M80 182 Q250 115 440 182" fill="none" stroke="#5A7A4A" stroke-width="1.5"/>
  
  <!-- Water lilies - various dabs of color -->
  <!-- Lily pad 1 -->
  <ellipse cx="100" cy="230" rx="20" ry="12" fill="#3A7A4A"/>
  <path d="M100 218 L100 230" stroke="#5A9A6A" stroke-width="0.5"/>
  <!-- Flower on pad 1 -->
  <g transform="translate(100,225)">
    <ellipse cx="-5" cy="-5" rx="5" ry="3" fill="#E8A0B8" transform="rotate(-30)"/>
    <ellipse cx="5" cy="-5" rx="5" ry="3" fill="#E8A0B8" transform="rotate(30)"/>
    <ellipse cx="-6" cy="2" rx="5" ry="3" fill="#D880A0" transform="rotate(-60)"/>
    <ellipse cx="6" cy="2" rx="5" ry="3" fill="#D880A0" transform="rotate(60)"/>
    <ellipse cx="0" cy="-6" rx="5" ry="3" fill="#F0B0C8"/>
    <circle cx="0" cy="0" r="3" fill="#F0D040"/>
  </g>
  
  <!-- Lily pad 2 -->
  <ellipse cx="200" cy="260" rx="22" ry="13" fill="#3A8A4A"/>
  <ellipse cx="200" cy="260" rx="22" ry="13" fill="#4A9A5A" opacity="0.5"/>
  <!-- Flower on pad 2 -->
  <g transform="translate(205,255)">
    <ellipse cx="-5" cy="-5" rx="6" ry="3" fill="#F0C0D0" transform="rotate(-20)"/>
    <ellipse cx="5" cy="-5" rx="6" ry="3" fill="#F0C0D0" transform="rotate(20)"/>
    <ellipse cx="-7" cy="2" rx="6" ry="3" fill="#E0A0B8" transform="rotate(-50)"/>
    <ellipse cx="7" cy="2" rx="6" ry="3" fill="#E0A0B8" transform="rotate(50)"/>
    <ellipse cx="0" cy="-7" rx="6" ry="3" fill="#F8D0E0"/>
    <ellipse cx="0" cy="5" rx="5" ry="3" fill="#D890A8"/>
    <circle cx="0" cy="0" r="3.5" fill="#F0D040"/>
  </g>
  
  <!-- Lily pad 3 - white lily -->
  <ellipse cx="330" cy="240" rx="18" ry="11" fill="#3A7A4A"/>
  <g transform="translate(330,236)">
    <ellipse cx="0" cy="-6" rx="5" ry="3" fill="#FFF0F0" transform="rotate(0)"/>
    <ellipse cx="-5" cy="-3" rx="5" ry="3" fill="#FFE8E8" transform="rotate(-40)"/>
    <ellipse cx="5" cy="-3" rx="5" ry="3" fill="#FFE8E8" transform="rotate(40)"/>
    <ellipse cx="-6" cy="3" rx="5" ry="3" fill="#FFD8D8" transform="rotate(-70)"/>
    <ellipse cx="6" cy="3" rx="5" ry="3" fill="#FFD8D8" transform="rotate(70)"/>
    <circle cx="0" cy="0" r="3" fill="#F0C040"/>
  </g>
  
  <!-- More lily pads (distant) -->
  <ellipse cx="420" cy="220" rx="12" ry="7" fill="#3A7A4A" opacity="0.7"/>
  <ellipse cx="60" cy="270" rx="14" ry="8" fill="#3A7A4A" opacity="0.6"/>
  <ellipse cx="380" cy="280" rx="15" ry="9" fill="#3A8A4A" opacity="0.5"/>
  <ellipse cx="260" cy="290" rx="13" ry="8" fill="#3A7A4A" opacity="0.6"/>
  
  <!-- Small flower dabs on distant pads -->
  <g opacity="0.6">
    <circle cx="420" cy="217" r="4" fill="#E8A0B8"/>
    <circle cx="60" cy="267" r="3.5" fill="#F0C0D0"/>
    <circle cx="380" cy="277" r="4" fill="#FFF0F0"/>
  </g>
  
  <!-- Water surface dabs (impressionist technique) -->
  <g opacity="0.4">
    <ellipse cx="150" cy="280" rx="10" ry="4" fill="#6AAC8A"/>
    <ellipse cx="300" cy="300" rx="12" ry="4" fill="#5A9A7A"/>
    <ellipse cx="440" cy="270" rx="10" ry="3" fill="#6AAC8A"/>
    <ellipse cx="70" cy="300" rx="8" ry="3" fill="#5A8A6A"/>
    <ellipse cx="250" cy="310" rx="14" ry="4" fill="#4A8A6A"/>
    <ellipse cx="170" cy="320" rx="10" ry="3" fill="#6AAC8A"/>
    <ellipse cx="400" cy="310" rx="12" ry="4" fill="#5A9A7A"/>
  </g>
  
  <!-- Willow branches hanging from top -->
  <g stroke="#5A8A4A" stroke-width="1" fill="none" opacity="0.5">
    <path d="M20 0 Q30 40 15 80 Q10 100 20 130"/>
    <path d="M35 0 Q40 50 25 100 Q20 130 30 160"/>
    <path d="M470 0 Q460 50 475 100 Q480 130 470 160"/>
    <path d="M485 0 Q480 40 490 80 Q495 110 485 140"/>
  </g>
  <!-- Willow leaves -->
  <g fill="#5A8A4A" opacity="0.4">
    <ellipse cx="18" cy="100" rx="4" ry="8" transform="rotate(-15 18 100)"/>
    <ellipse cx="22" cy="120" rx="4" ry="8" transform="rotate(10 22 120)"/>
    <ellipse cx="28" cy="140" rx="4" ry="8" transform="rotate(-5 28 140)"/>
    <ellipse cx="478" cy="100" rx="4" ry="8" transform="rotate(15 478 100)"/>
    <ellipse cx="472" cy="120" rx="4" ry="8" transform="rotate(-10 472 120)"/>
    <ellipse cx="488" cy="130" rx="4" ry="8" transform="rotate(5 488 130)"/>
  </g>
  
  <text x="250" y="340" text-anchor="middle" font-size="9" opacity="0.5" font-family="sans-serif" fill="#2A4A3A">Импрессионизм</text>
</svg>