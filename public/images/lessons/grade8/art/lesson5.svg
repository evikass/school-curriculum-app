<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="skyLandscape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A8AC0"/>
      <stop offset="40%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#B0E0E6"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6AACDA"/>
      <stop offset="100%" stop-color="#4080B0"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="50%" stop-color="#FFD700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hillFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7AAA6A"/>
      <stop offset="100%" stop-color="#5A8A4A"/>
    </linearGradient>
    <linearGradient id="hillNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A8A3A"/>
      <stop offset="100%" stop-color="#4A7A2A"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="500" height="350" fill="url(#skyLandscape)"/>
  
  <!-- Sun -->
  <circle cx="400" cy="60" r="50" fill="url(#sunGlow)"/>
  <circle cx="400" cy="60" r="22" fill="#FFD700"/>
  
  <!-- Clouds -->
  <g fill="#FFF" opacity="0.8">
    <ellipse cx="100" cy="50" rx="40" ry="15"/>
    <ellipse cx="120" cy="45" rx="30" ry="12"/>
    <ellipse cx="80" cy="48" rx="25" ry="10"/>
  </g>
  <g fill="#FFF" opacity="0.6">
    <ellipse cx="300" cy="80" rx="35" ry="12"/>
    <ellipse cx="325" cy="75" rx="25" ry="10"/>
  </g>
  
  <!-- Far hills -->
  <path d="M0 180 Q50 140 120 160 Q180 130 250 155 Q320 120 380 150 Q440 130 500 160 L500 220 L0 220 Z" fill="url(#hillFar)" opacity="0.7"/>
  
  <!-- Mid hills -->
  <path d="M0 210 Q80 170 150 195 Q220 165 300 190 Q370 160 440 185 Q470 175 500 195 L500 240 L0 240 Z" fill="#5A9A4A" opacity="0.8"/>
  
  <!-- River -->
  <path d="M200 210 Q220 230 215 260 Q210 280 230 300 Q250 320 240 350" fill="none" stroke="url(#waterGrad)" stroke-width="25" stroke-linecap="round"/>
  <!-- River reflections -->
  <path d="M200 210 Q220 230 215 260 Q210 280 230 300 Q250 320 240 350" fill="none" stroke="#B0E0E6" stroke-width="3" stroke-linecap="round" opacity="0.4" stroke-dasharray="8,12"/>
  
  <!-- Near hills / foreground -->
  <path d="M0 250 Q60 230 130 245 Q200 225 270 240 Q340 220 410 238 Q460 225 500 240 L500 350 L0 350 Z" fill="url(#hillNear)"/>
  
  <!-- Foreground grass -->
  <path d="M0 270 Q100 258 200 268 Q300 255 400 265 Q450 260 500 268 L500 350 L0 350 Z" fill="#4A7A2A"/>
  
  <!-- Trees on left -->
  <rect x="55" y="220" width="8" height="50" fill="#5A3A1A"/>
  <polygon points="30,225 59,160 88,225" fill="#2E6A1E"/>
  <polygon points="35,210 59,150 83,210" fill="#3A7A2A"/>
  <polygon points="40,195 59,145 78,195" fill="#2E6A1E"/>
  
  <rect x="110" y="230" width="6" height="40" fill="#5A3A1A"/>
  <polygon points="90,235 113,180 136,235" fill="#3A7A2A"/>
  <polygon points="95,220 113,170 131,220" fill="#2E6A1E"/>
  
  <!-- Trees on right -->
  <rect x="410" y="215" width="8" height="55" fill="#5A3A1A"/>
  <polygon points="385,220 414,155 443,220" fill="#2E6A1E"/>
  <polygon points="390,205 414,145 438,205" fill="#3A7A2A"/>
  <polygon points="395,190 414,140 433,190" fill="#2E6A1E"/>
  
  <rect x="455" y="230" width="6" height="40" fill="#5A3A1A"/>
  <polygon points="438,235 458,185 478,235" fill="#3A7A2A"/>
  
  <!-- Small house -->
  <rect x="330" y="240" width="35" height="25" fill="#C8A878"/>
  <polygon points="325,240 347,220 370,240" fill="#8B4513"/>
  <rect x="341" y="250" width="10" height="15" fill="#5A3A1A"/>
  <rect x="333" y="247" width="7" height="7" fill="#87CEEB" stroke="#8B6914" stroke-width="0.5"/>
  
  <!-- Grass tufts -->
  <g stroke="#3A6A1A" stroke-width="1" fill="none" opacity="0.7">
    <path d="M20 290 Q22 280 24 290"/>
    <path d="M24 290 Q26 278 28 290"/>
    <path d="M150 280 Q152 270 154 280"/>
    <path d="M154 280 Q156 268 158 280"/>
    <path d="M470 285 Q472 275 474 285"/>
    <path d="M474 285 Q476 273 478 285"/>
  </g>
  
  <!-- Birds -->
  <path d="M160 90 Q165 85 170 90" fill="none" stroke="#333" stroke-width="1"/>
  <path d="M175 95 Q180 90 185 95" fill="none" stroke="#333" stroke-width="1"/>
  <path d="M140 100 Q145 95 150 100" fill="none" stroke="#333" stroke-width="1"/>
  
  <text x="250" y="340" text-anchor="middle" font-size="9" opacity="0.5" font-family="sans-serif">Пейзаж в искусстве</text>
</svg>