<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="100%" stop-color="#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Parliament building (top center) -->
  <rect x="170" y="15" width="160" height="65" fill="#546e7a" stroke="#37474f" stroke-width="1.5"/>
  <polygon points="165,15 250,-5 335,15" fill="#455a64" stroke="#37474f" stroke-width="1"/>
  <!-- Columns -->
  <g fill="#78909c">
    <rect x="180" y="20" width="6" height="55"/>
    <rect x="195" y="20" width="6" height="55"/>
    <rect x="210" y="20" width="6" height="55"/>
    <rect x="225" y="20" width="6" height="55"/>
    <rect x="240" y="20" width="6" height="55"/>
    <rect x="255" y="20" width="6" height="55"/>
    <rect x="270" y="20" width="6" height="55"/>
    <rect x="285" y="20" width="6" height="55"/>
    <rect x="300" y="20" width="6" height="55"/>
    <rect x="315" y="20" width="6" height="55"/>
  </g>
  <text x="250" y="52" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">ПАРЛАМЕНТ</text>
  <text x="250" y="64" font-size="5" fill="#cfd8dc" text-anchor="middle">Законодательная власть</text>
  <!-- Government (center left) -->
  <rect x="30" y="120" width="150" height="55" rx="8" fill="#1a237e" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="105" y="143" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">ПРАВИТЕЛЬСТВО</text>
  <text x="105" y="157" font-size="5" fill="#bbdefb" text-anchor="middle">Исполнительная власть</text>
  <!-- Government icon (desk) -->
  <rect x="55" y="162" width="40" height="4" fill="#42a5f5" opacity="0.3"/>
  <!-- Courts (center right) -->
  <rect x="320" y="120" width="150" height="55" rx="8" fill="#b71c1c" stroke="#880e4f" stroke-width="1.5"/>
  <text x="395" y="143" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">СУДЫ</text>
  <text x="395" y="157" font-size="5" fill="#ffcdd2" text-anchor="middle">Судебная власть</text>
  <!-- Scales of justice icon -->
  <line x1="395" y1="160" x2="395" y2="170" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <line x1="382" y1="163" x2="408" y2="163" stroke="#fff" stroke-width="1" opacity="0.5"/>
  <path d="M380,170 Q382,163 384,170" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <path d="M406,170 Q408,163 410,170" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <!-- Political parties (bottom center) -->
  <rect x="150" y="220" width="200" height="45" rx="8" fill="#e65100" stroke="#bf360c" stroke-width="1.5"/>
  <text x="250" y="240" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">ПОЛИТИЧЕСКИЕ ПАРТИИ</text>
  <text x="250" y="254" font-size="5" fill="#ffcc80" text-anchor="middle">Выражение интересов групп</text>
  <!-- Party icons -->
  <rect x="170" y="258" width="15" height="3" fill="#c62828" opacity="0.5"/>
  <rect x="195" y="258" width="15" height="3" fill="#1a237e" opacity="0.5"/>
  <rect x="220" y="258" width="15" height="3" fill="#2e7d32" opacity="0.5"/>
  <rect x="245" y="258" width="15" height="3" fill="#ff6f00" opacity="0.5"/>
  <rect x="270" y="258" width="15" height="3" fill="#7b1fa2" opacity="0.5"/>
  <!-- Media (bottom left) -->
  <rect x="20" y="220" width="115" height="45" rx="8" fill="#00695c" stroke="#004d40" stroke-width="1.5"/>
  <text x="77" y="240" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">СМИ</text>
  <text x="77" y="254" font-size="5" fill="#b2dfdb" text-anchor="middle">Информационная функция</text>
  <!-- Civil society (bottom right) -->
  <rect x="365" y="220" width="115" height="45" rx="8" fill="#4527a0" stroke="#311b92" stroke-width="1.5"/>
  <text x="422" y="237" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Гражданское</text>
  <text x="422" y="249" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">общество</text>
  <text x="422" y="260" font-size="5" fill="#d1c4e9" text-anchor="middle">Общественные организации</text>
  <!-- Connections -->
  <line x1="250" y1="80" x2="105" y2="120" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="250" y1="80" x2="395" y2="120" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="105" y1="175" x2="200" y2="220" stroke="#546e7a" stroke-width="1"/>
  <line x1="395" y1="175" x2="300" y2="220" stroke="#546e7a" stroke-width="1"/>
  <line x1="77" y1="220" x2="180" y2="220" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="420" y1="220" x2="350" y2="220" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Citizens at very bottom -->
  <g transform="translate(100,290)">
    <circle cx="0" cy="0" r="5" fill="#ffcc80"/>
    <rect x="-4" y="6" width="8" height="12" rx="1" fill="#42a5f5"/>
  </g>
  <g transform="translate(150,290)">
    <circle cx="0" cy="0" r="5" fill="#ffcc80"/>
    <rect x="-4" y="6" width="8" height="12" rx="1" fill="#66bb6a"/>
  </g>
  <g transform="translate(200,290)">
    <circle cx="0" cy="0" r="5" fill="#ffcc80"/>
    <rect x="-4" y="6" width="8" height="12" rx="1" fill="#ffa726"/>
  </g>
  <g transform="translate(300,290)">
    <circle cx="0" cy="0" r="5" fill="#ffcc80"/>
    <rect x="-4" y="6" width="8" height="12" rx="1" fill="#ef5350"/>
  </g>
  <g transform="translate(350,290)">
    <circle cx="0" cy="0" r="5" fill="#ffcc80"/>
    <rect x="-4" y="6" width="8" height="12" rx="1" fill="#ab47bc"/>
  </g>
  <g transform="translate(400,290)">
    <circle cx="0" cy="0" r="5" fill="#ffcc80"/>
    <rect x="-4" y="6" width="8" height="12" rx="1" fill="#26a69a"/>
  </g>
  <text x="250" y="320" font-size="7" fill="#546e7a" text-anchor="middle">Граждане — основа политической системы</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Политическая система общества</text>
</svg>