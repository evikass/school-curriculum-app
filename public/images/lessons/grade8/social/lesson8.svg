<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Balance scales (center) -->
  <line x1="250" y1="30" x2="250" y2="100" stroke="#37474f" stroke-width="3"/>
  <polygon points="250,25 242,38 258,38" fill="#546e7a"/>
  <line x1="170" y1="70" x2="330" y2="70" stroke="#37474f" stroke-width="2.5"/>
  <!-- Left pan - Law -->
  <line x1="170" y1="70" x2="170" y2="90" stroke="#37474f" stroke-width="1.5"/>
  <path d="M150,90 Q160,100 170,90 Q180,100 190,90" fill="none" stroke="#1a237e" stroke-width="2"/>
  <rect x="150" y="90" width="40" height="5" rx="2" fill="#1a237e"/>
  <!-- Law book in left pan -->
  <rect x="155" y="72" width="30" height="20" rx="2" fill="#1a237e" opacity="0.7"/>
  <text x="170" y="86" font-size="5" fill="#fff" text-anchor="middle">ЗАКОН</text>
  <!-- Right pan - Rights -->
  <line x1="330" y1="70" x2="330" y2="90" stroke="#37474f" stroke-width="1.5"/>
  <path d="M310,90 Q320,100 330,90 Q340,100 350,90" fill="none" stroke="#c62828" stroke-width="2"/>
  <rect x="310" y="90" width="40" height="5" rx="2" fill="#c62828"/>
  <!-- Shield in right pan -->
  <path d="M315,72 L330,68 L345,72 L345,85 L330,92 L315,85 Z" fill="#c62828" opacity="0.7"/>
  <text x="330" y="83" font-size="5" fill="#fff" text-anchor="middle">ПРАВА</text>
  <!-- Constitution book (large, below scales) -->
  <g transform="translate(160,110)">
    <rect x="0" y="0" width="180" height="80" rx="4" fill="#b71c1c" stroke="#880e4f" stroke-width="2"/>
    <rect x="5" y="5" width="170" height="70" rx="2" fill="#c62828"/>
    <!-- Cross on cover -->
    <line x1="90" y1="10" x2="90" y2="70" stroke="#ffd600" stroke-width="1.5"/>
    <!-- Text -->
    <text x="90" y="28" font-size="10" fill="#ffd600" text-anchor="middle" font-weight="bold">КОНСТИТУЦИЯ</text>
    <text x="90" y="42" font-size="7" fill="#fff" text-anchor="middle">Российской Федерации</text>
    <line x1="30" y1="48" x2="150" y2="48" stroke="#ffd600" stroke-width="0.5"/>
    <text x="90" y="60" font-size="6" fill="#ffcdd2" text-anchor="middle">Основной закон государства</text>
    <text x="90" y="70" font-size="5" fill="#ffcdd2" text-anchor="middle">1993 г.</text>
  </g>
  <!-- Three branches of power -->
  <!-- Legislative -->
  <g transform="translate(70,230)">
    <rect x="-50" y="-20" width="100" height="50" rx="6" fill="#1a237e" opacity="0.85"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Законодательная</text>
    <text x="0" y="10" font-size="6" fill="#bbdefb" text-anchor="middle">Федеральное</text>
    <text x="0" y="20" font-size="6" fill="#bbdefb" text-anchor="middle">Собрание</text>
  </g>
  <!-- Executive -->
  <g transform="translate(250,230)">
    <rect x="-50" y="-20" width="100" height="50" rx="6" fill="#2e7d32" opacity="0.85"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Исполнительная</text>
    <text x="0" y="10" font-size="6" fill="#c8e6c9" text-anchor="middle">Правительство</text>
    <text x="0" y="20" font-size="6" fill="#c8e6c9" text-anchor="middle">РФ</text>
  </g>
  <!-- Judicial -->
  <g transform="translate(430,230)">
    <rect x="-50" y="-20" width="100" height="50" rx="6" fill="#c62828" opacity="0.85"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Судебная</text>
    <text x="0" y="10" font-size="6" fill="#ffcdd2" text-anchor="middle">Конституционный</text>
    <text x="0" y="20" font-size="6" fill="#ffcdd2" text-anchor="middle">Суд</text>
  </g>
  <!-- Checks and balances arrows -->
  <path d="M120,230 Q180,200 200,220" fill="none" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M300,230 Q350,200 380,220" fill="none" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M380,250 Q310,270 120,250" fill="none" stroke="#546e7a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="250" y="210" font-size="5" fill="#546e7a" text-anchor="middle">Система сдержек и противовесов</text>
  <!-- Citizen rights icons (bottom) -->
  <g transform="translate(80,300)">
    <circle r="8" fill="#fff" stroke="#1a237e" stroke-width="1"/>
    <text x="0" y="3" font-size="7" fill="#1a237e" text-anchor="middle">⚖</text>
    <text x="0" y="18" font-size="5" fill="#333" text-anchor="middle">Равенство</text>
  </g>
  <g transform="translate(180,300)">
    <circle r="8" fill="#fff" stroke="#c62828" stroke-width="1"/>
    <text x="0" y="3" font-size="7" fill="#c62828" text-anchor="middle">✋</text>
    <text x="0" y="18" font-size="5" fill="#333" text-anchor="middle">Свобода</text>
  </g>
  <g transform="translate(280,300)">
    <circle r="8" fill="#fff" stroke="#2e7d32" stroke-width="1"/>
    <text x="0" y="3" font-size="7" fill="#2e7d32" text-anchor="middle">🏠</text>
    <text x="0" y="18" font-size="5" fill="#333" text-anchor="middle">Собственность</text>
  </g>
  <g transform="translate(380,300)">
    <circle r="8" fill="#fff" stroke="#ff6f00" stroke-width="1"/>
    <text x="0" y="3" font-size="7" fill="#ff6f00" text-anchor="middle">🎓</text>
    <text x="0" y="18" font-size="5" fill="#333" text-anchor="middle">Образование</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Правовое государство</text>
</svg>