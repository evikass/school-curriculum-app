<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2f1"/>
      <stop offset="100%" stop-color="#b2dfdb"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Central circular flow diagram -->
  <!-- Production (top) -->
  <rect x="185" y="20" width="130" height="60" rx="10" fill="#2e7d32" stroke="#1b5e20" stroke-width="2"/>
  <text x="250" y="48" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">ПРОИЗВОДСТВО</text>
  <text x="250" y="62" font-size="6" fill="#c8e6c9" text-anchor="middle">создание благ</text>
  <!-- Factory icon inside -->
  <rect x="265" y="30" width="15" height="10" fill="#4caf50" opacity="0.4"/>
  <rect x="268" y="25" width="4" height="7" fill="#4caf50" opacity="0.4"/>
  <!-- Distribution (right) -->
  <rect x="360" y="130" width="120" height="60" rx="10" fill="#1565c0" stroke="#0d47a1" stroke-width="2"/>
  <text x="420" y="155" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">РАСПРЕДЕ-</text>
  <text x="420" y="167" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">ЛЕНИЕ</text>
  <!-- Exchange (bottom) -->
  <rect x="185" y="250" width="130" height="60" rx="10" fill="#e65100" stroke="#bf360c" stroke-width="2"/>
  <text x="250" y="278" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">ОБМЕН</text>
  <text x="250" y="292" font-size="6" fill="#ffcc80" text-anchor="middle">торговля, рынок</text>
  <!-- Money icon -->
  <circle cx="290" cy="268" r="7" fill="#ffd600" opacity="0.5"/>
  <text x="290" y="271" font-size="7" fill="#fff" text-anchor="middle">₽</text>
  <!-- Consumption (left) -->
  <rect x="20" y="130" width="120" height="60" rx="10" fill="#c62828" stroke="#b71c1c" stroke-width="2"/>
  <text x="80" y="158" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">ПОТРЕБЛЕНИЕ</text>
  <text x="80" y="172" font-size="6" fill="#ffcdd2" text-anchor="middle">использование благ</text>
  <!-- Circular arrows -->
  <path d="M315,65 Q370,65 380,130" fill="none" stroke="#546e7a" stroke-width="2"/>
  <polygon points="380,130 376,122 384,124" fill="#546e7a"/>
  <path d="M440,190 Q440,250 315,275" fill="none" stroke="#546e7a" stroke-width="2"/>
  <polygon points="315,275 323,271 321,279" fill="#546e7a"/>
  <path d="M185,275 Q120,250 120,190" fill="none" stroke="#546e7a" stroke-width="2"/>
  <polygon points="120,190 116,198 124,196" fill="#546e7a"/>
  <path d="M60,130 Q60,65 185,50" fill="none" stroke="#546e7a" stroke-width="2"/>
  <polygon points="185,50 177,54 179,46" fill="#546e7a"/>
  <!-- Central label -->
  <circle cx="250" cy="165" r="30" fill="#fff" stroke="#546e7a" stroke-width="1.5"/>
  <text x="250" y="160" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">ЭКОНО-</text>
  <text x="250" y="172" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">МИКА</text>
  <!-- Resources flowing in -->
  <g opacity="0.6">
    <text x="250" y="100" font-size="6" fill="#2e7d32" text-anchor="middle">ресурсы ↓</text>
    <text x="340" y="145" font-size="6" fill="#1565c0" text-anchor="end">доходы →</text>
    <text x="250" y="235" font-size="6" fill="#e65100" text-anchor="middle">↑ товары</text>
    <text x="160" y="145" font-size="6" fill="#c62828">← спрос</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Экономика и её структура</text>
</svg>