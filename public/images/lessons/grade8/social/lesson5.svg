<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Social pyramid -->
  <!-- Top: Elite -->
  <polygon points="250,30 210,80 290,80" fill="#b71c1c" stroke="#880e4f" stroke-width="1.5"/>
  <text x="250" y="65" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Элита</text>
  <!-- Upper middle -->
  <polygon points="210,80 185,130 315,130 290,80" fill="#c62828" stroke="#b71c1c" stroke-width="1"/>
  <text x="250" y="112" font-size="7" fill="#fff" text-anchor="middle">Высший средний класс</text>
  <!-- Middle -->
  <polygon points="185,130 155,185 345,185 315,130" fill="#e53935" stroke="#c62828" stroke-width="1"/>
  <text x="250" y="163" font-size="8" fill="#fff" text-anchor="middle">Средний класс</text>
  <!-- Lower middle -->
  <polygon points="155,185 125,240 375,240 345,185" fill="#ef5350" stroke="#e53935" stroke-width="1"/>
  <text x="250" y="218" font-size="8" fill="#fff" text-anchor="middle">Низший средний класс</text>
  <!-- Bottom: Working class / poor -->
  <polygon points="125,240 95,300 405,300 375,240" fill="#ef9a9a" stroke="#ef5350" stroke-width="1"/>
  <text x="250" y="275" font-size="8" fill="#b71c1c" text-anchor="middle">Рабочий класс / Малоимущие</text>
  <!-- Social mobility arrows (left: upward) -->
  <path d="M80,280 Q60,230 70,180 Q60,130 80,80" fill="none" stroke="#2e7d32" stroke-width="2"/>
  <polygon points="80,80 75,88 83,87" fill="#2e7d32"/>
  <text x="50" y="180" font-size="6" fill="#2e7d32" transform="rotate(-90,50,180)">Восходящая мобильность</text>
  <!-- Social mobility arrows (right: downward) -->
  <path d="M420,80 Q440,130 430,180 Q440,230 420,280" fill="none" stroke="#c62828" stroke-width="2"/>
  <polygon points="420,280 425,272 417,273" fill="#c62828"/>
  <text x="450" y="180" font-size="6" fill="#c62828" transform="rotate(90,450,180)">Нисходящая мобильность</text>
  <!-- Strata labels on the side -->
  <text x="95" y="305" font-size="5" fill="#5d4037">Низший</text>
  <text x="95" y="312" font-size="5" fill="#5d4037">слой</text>
  <text x="250" y="35" font-size="5" fill="#5d4037">Высший</text>
  <text x="250" y="42" font-size="5" fill="#5d4037">слой</text>
  <!-- Status indicators -->
  <g transform="translate(330,50)" opacity="0.7">
    <circle r="5" fill="#ffd600"/><text x="10" y="3" font-size="5" fill="#333">Богатство</text>
  </g>
  <g transform="translate(330,68)" opacity="0.7">
    <circle r="5" fill="#1a237e"/><text x="10" y="3" font-size="5" fill="#333">Власть</text>
  </g>
  <g transform="translate(330,86)" opacity="0.7">
    <circle r="5" fill="#4caf50"/><text x="10" y="3" font-size="5" fill="#333">Престиж</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Социальная структура общества</text>
</svg>