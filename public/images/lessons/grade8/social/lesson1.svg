<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="100%" stop-color="#cfd8dc"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Central node: Society -->
  <circle cx="250" cy="155" r="40" fill="#1a237e" stroke="#0d47a1" stroke-width="2"/>
  <text x="250" y="152" font-size="9" fill="#fff" text-anchor="middle" font-weight="bold">ОБЩЕСТВО</text>
  <text x="250" y="163" font-size="6" fill="#bbdefb" text-anchor="middle">динамическая</text>
  <text x="250" y="172" font-size="6" fill="#bbdefb" text-anchor="middle">система</text>
  <!-- Economic sphere (top-left) -->
  <circle cx="110" cy="70" r="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="110" y="65" font-size="8" fill="#2e7d32" text-anchor="middle" font-weight="bold">Экономика</text>
  <text x="110" y="78" font-size="6" fill="#4caf50" text-anchor="middle">производство</text>
  <text x="110" y="88" font-size="6" fill="#4caf50" text-anchor="middle">распределение</text>
  <!-- Factory icon -->
  <rect x="85" y="92" width="20" height="12" fill="#66bb6a" opacity="0.5"/>
  <rect x="90" y="86" width="5" height="8" fill="#66bb6a" opacity="0.5"/>
  <rect x="100" y="82" width="5" height="12" fill="#66bb6a" opacity="0.5"/>
  <!-- Political sphere (top-right) -->
  <circle cx="390" cy="70" r="50" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="390" y="65" font-size="8" fill="#c62828" text-anchor="middle" font-weight="bold">Политика</text>
  <text x="390" y="78" font-size="6" fill="#e53935" text-anchor="middle">власть</text>
  <text x="390" y="88" font-size="6" fill="#e53935" text-anchor="middle">государство</text>
  <!-- Government icon -->
  <rect x="375" y="92" width="20" height="4" fill="#ef9a9a" opacity="0.5"/>
  <polygon points="375,92 385,84 395,92" fill="#ef9a9a" opacity="0.5"/>
  <!-- Social sphere (bottom-left) -->
  <circle cx="110" cy="245" r="50" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="110" y="240" font-size="8" fill="#1565c0" text-anchor="middle" font-weight="bold">Социальная</text>
  <text x="110" y="253" font-size="6" fill="#1e88e5" text-anchor="middle">классы</text>
  <text x="110" y="263" font-size="6" fill="#1e88e5" text-anchor="middle">группы</text>
  <!-- People icons -->
  <circle cx="95" cy="275" r="4" fill="#90caf9" opacity="0.5"/>
  <circle cx="110" cy="272" r="4" fill="#90caf9" opacity="0.5"/>
  <circle cx="125" cy="275" r="4" fill="#90caf9" opacity="0.5"/>
  <!-- Spiritual/Cultural sphere (bottom-right) -->
  <circle cx="390" cy="245" r="50" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="390" y="238" font-size="8" fill="#e65100" text-anchor="middle" font-weight="bold">Духовная</text>
  <text x="390" y="251" font-size="6" fill="#f57c00" text-anchor="middle">культура</text>
  <text x="390" y="261" font-size="6" fill="#f57c00" text-anchor="middle">ценности</text>
  <!-- Book icon -->
  <rect x="378" y="270" width="16" height="12" rx="1" fill="#ffcc80" opacity="0.5"/>
  <line x1="386" y1="270" x2="386" y2="282" stroke="#e65100" stroke-width="0.5" opacity="0.5"/>
  <!-- Connecting arrows -->
  <line x1="155" y1="95" x2="215" y2="135" stroke="#546e7a" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="345" y1="95" x2="285" y2="135" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="155" y1="220" x2="215" y2="180" stroke="#546e7a" stroke-width="1.5"/>
  <line x1="345" y1="220" x2="285" y2="180" stroke="#546e7a" stroke-width="1.5"/>
  <!-- Cross connections (dashed) -->
  <path d="M150,100 Q250,50 350,100" fill="none" stroke="#78909c" stroke-width="0.8" stroke-dasharray="4,3"/>
  <path d="M350,215 Q250,265 150,215" fill="none" stroke="#78909c" stroke-width="0.8" stroke-dasharray="4,3"/>
  <path d="M130,115 Q100,155 130,200" fill="none" stroke="#78909c" stroke-width="0.8" stroke-dasharray="4,3"/>
  <path d="M370,115 Q400,155 370,200" fill="none" stroke="#78909c" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Dynamic arrows (rotation) -->
  <path d="M250,110 Q260,100 270,108" fill="none" stroke="#ff6f00" stroke-width="1.5"/>
  <polygon points="270,108 265,105 268,112" fill="#ff6f00"/>
  <path d="M280,165 Q290,170 285,180" fill="none" stroke="#ff6f00" stroke-width="1.5"/>
  <path d="M250,200 Q240,210 230,202" fill="none" stroke="#ff6f00" stroke-width="1.5"/>
  <path d="M220,148 Q210,142 215,132" fill="none" stroke="#ff6f00" stroke-width="1.5"/>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Общество как динамическая система</text>
</svg>