<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8eaf6"/>
      <stop offset="100%" stop-color="#c5cae9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Progress arrow (main) -->
  <path d="M30,175 L430,175" stroke="#1a237e" stroke-width="4"/>
  <polygon points="430,175 415,165 415,185" fill="#1a237e"/>
  <!-- Timeline stages -->
  <!-- Stage 1: Primitive -->
  <rect x="50" y="80" width="70" height="80" rx="8" fill="#8d6e63" opacity="0.8"/>
  <text x="85" y="100" font-size="6" fill="#fff" text-anchor="middle">Первобытное</text>
  <text x="85" y="110" font-size="6" fill="#fff" text-anchor="middle">общество</text>
  <!-- Spear icon -->
  <line x1="75" y1="130" x2="95" y2="120" stroke="#ffcc80" stroke-width="2"/>
  <polygon points="95,120 92,115 98,118" fill="#bdbdbd"/>
  <!-- Stone tool -->
  <polygon points="80,140 90,135 85,148" fill="#78909c" opacity="0.7"/>
  <circle cx="85" cy="160" r="10" fill="none" stroke="#ffcc80" stroke-width="1.5" opacity="0.5"/>
  <!-- Stage 2: Agrarian -->
  <rect x="150" y="80" width="70" height="80" rx="8" fill="#2e7d32" opacity="0.8"/>
  <text x="185" y="100" font-size="6" fill="#fff" text-anchor="middle">Аграрное</text>
  <text x="185" y="110" font-size="6" fill="#fff" text-anchor="middle">общество</text>
  <!-- Plow icon -->
  <line x1="170" y1="140" x2="200" y2="130" stroke="#795548" stroke-width="2"/>
  <path d="M170,140 L168,148 L175,145" fill="#795548"/>
  <!-- Wheat -->
  <line x1="185" y1="125" x2="185" y2="145" stroke="#f9a825" stroke-width="1"/>
  <ellipse cx="185" cy="122" rx="4" ry="6" fill="#f9a825" opacity="0.7"/>
  <!-- Stage 3: Industrial -->
  <rect x="250" y="80" width="70" height="80" rx="8" fill="#546e7a" opacity="0.8"/>
  <text x="285" y="100" font-size="6" fill="#fff" text-anchor="middle">Индустриальное</text>
  <text x="285" y="110" font-size="6" fill="#fff" text-anchor="middle">общество</text>
  <!-- Factory -->
  <rect x="270" y="125" width="30" height="20" fill="#78909c" opacity="0.6"/>
  <rect x="275" y="118" width="6" height="10" fill="#78909c" opacity="0.6"/>
  <rect x="285" y="115" width="6" height="13" fill="#78909c" opacity="0.6"/>
  <!-- Gear -->
  <circle cx="300" cy="148" r="6" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
  <!-- Stage 4: Post-industrial -->
  <rect x="350" y="80" width="70" height="80" rx="8" fill="#1a237e" opacity="0.85"/>
  <text x="385" y="100" font-size="6" fill="#fff" text-anchor="middle">Постин-</text>
  <text x="385" y="110" font-size="6" fill="#fff" text-anchor="middle">дустриальное</text>
  <!-- Computer icon -->
  <rect x="370" y="120" width="20" height="14" rx="2" fill="#42a5f5" opacity="0.5"/>
  <rect x="375" y="136" width="10" height="3" fill="#42a5f5" opacity="0.4"/>
  <!-- Atom/info -->
  <circle cx="385" cy="148" r="3" fill="#64b5f6" opacity="0.5"/>
  <ellipse cx="385" cy="148" rx="7" ry="3" fill="none" stroke="#64b5f6" stroke-width="0.5" opacity="0.5"/>
  <!-- Arrow connectors -->
  <path d="M120,120 L150,120" stroke="#1a237e" stroke-width="1.5"/>
  <polygon points="150,120 145,117 145,123" fill="#1a237e"/>
  <path d="M220,120 L250,120" stroke="#1a237e" stroke-width="1.5"/>
  <polygon points="250,120 245,117 245,123" fill="#1a237e"/>
  <path d="M320,120 L350,120" stroke="#1a237e" stroke-width="1.5"/>
  <polygon points="350,120 345,117 345,123" fill="#1a237e"/>
  <!-- Progress arrow below -->
  <text x="250" y="195" font-size="8" fill="#1a237e" text-anchor="middle" font-weight="bold">Общественный прогресс</text>
  <!-- Innovation timeline (bottom) -->
  <line x1="50" y1="230" x2="450" y2="230" stroke="#546e7a" stroke-width="1"/>
  <circle cx="85" cy="230" r="5" fill="#8d6e63"/>
  <text x="85" y="245" font-size="5" fill="#5d4037" text-anchor="middle">Огонь</text>
  <circle cx="165" cy="230" r="5" fill="#2e7d32"/>
  <text x="165" y="245" font-size="5" fill="#2e7d32" text-anchor="middle">Земледелие</text>
  <circle cx="245" cy="230" r="5" fill="#ff6f00"/>
  <text x="245" y="245" font-size="5" fill="#e65100" text-anchor="middle">Письменность</text>
  <circle cx="325" cy="230" r="5" fill="#546e7a"/>
  <text x="325" y="245" font-size="5" fill="#37474f" text-anchor="middle">Паровой</text>
  <text x="325" y="253" font-size="5" fill="#37474f" text-anchor="middle">двигатель</text>
  <circle cx="405" cy="230" r="5" fill="#1a237e"/>
  <text x="405" y="245" font-size="5" fill="#1a237e" text-anchor="middle">Интернет</text>
  <!-- Complexity indicator -->
  <text x="40" y="280" font-size="6" fill="#78909c">Простое</text>
  <text x="420" y="280" font-size="6" fill="#1a237e">Сложное</text>
  <line x1="80" y1="278" x2="410" y2="278" stroke="#1a237e" stroke-width="1"/>
  <polygon points="410,278 405,275 405,281" fill="#1a237e"/>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Общественный прогресс</text>
</svg>