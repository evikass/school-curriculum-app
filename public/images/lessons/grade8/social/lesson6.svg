<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="escalate" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="50%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="resolve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="50%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Conflict escalation (top row) -->
  <text x="250" y="20" font-size="9" fill="#c62828" text-anchor="middle" font-weight="bold">Эскалация конфликта</text>
  <rect x="30" y="28" width="440" height="15" rx="3" fill="url(#escalate)" opacity="0.6"/>
  <!-- Stage 1: Latent -->
  <g transform="translate(70,70)">
    <rect x="-40" y="-25" width="80" height="50" rx="8" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
    <text x="0" y="-8" font-size="7" fill="#f57f17" text-anchor="middle" font-weight="bold">1. Скрытый</text>
    <text x="0" y="5" font-size="5" fill="#795548" text-anchor="middle">противоречия</text>
    <text x="0" y="14" font-size="5" fill="#795548" text-anchor="middle">накапливаются</text>
    <!-- Tension dots -->
    <circle cx="-20" cy="20" r="2" fill="#ff9800" opacity="0.5"/>
    <circle cx="-10" cy="22" r="2" fill="#ff9800" opacity="0.4"/>
    <circle cx="0" cy="20" r="2" fill="#ff9800" opacity="0.6"/>
  </g>
  <!-- Arrow -->
  <path d="M115,70 L155,70" stroke="#e65100" stroke-width="1.5"/>
  <polygon points="155,70 149,67 149,73" fill="#e65100"/>
  <!-- Stage 2: Open -->
  <g transform="translate(200,70)">
    <rect x="-40" y="-25" width="80" height="50" rx="8" fill="#ffe0b2" stroke="#e65100" stroke-width="1.5"/>
    <text x="0" y="-8" font-size="7" fill="#e65100" text-anchor="middle" font-weight="bold">2. Открытый</text>
    <text x="0" y="5" font-size="5" fill="#795548" text-anchor="middle">столкновение</text>
    <text x="0" y="14" font-size="5" fill="#795548" text-anchor="middle">сторон</text>
    <!-- Lightning -->
    <path d="M-5,18 L-2,22 L2,18 L5,22" fill="none" stroke="#e65100" stroke-width="1.5"/>
  </g>
  <!-- Arrow -->
  <path d="M245,70 L285,70" stroke="#c62828" stroke-width="1.5"/>
  <polygon points="285,70 279,67 279,73" fill="#c62828"/>
  <!-- Stage 3: Crisis -->
  <g transform="translate(330,70)">
    <rect x="-40" y="-25" width="80" height="50" rx="8" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
    <text x="0" y="-8" font-size="7" fill="#c62828" text-anchor="middle" font-weight="bold">3. Кризис</text>
    <text x="0" y="5" font-size="5" fill="#795548" text-anchor="middle">максимальное</text>
    <text x="0" y="14" font-size="5" fill="#795548" text-anchor="middle">обострение</text>
    <!-- Explosion -->
    <path d="M0,18 L-5,24 L0,20 L5,24 Z" fill="#c62828" opacity="0.5"/>
  </g>
  <!-- Arrow -->
  <path d="M375,70 L415,70" stroke="#c62828" stroke-width="1.5"/>
  <polygon points="415,70 409,67 409,73" fill="#c62828"/>
  <!-- Stage 4: Peak -->
  <g transform="translate(450,70)">
    <rect x="-30" y="-25" width="60" height="50" rx="8" fill="#ef9a9a" stroke="#b71c1c" stroke-width="2"/>
    <text x="0" y="-8" font-size="7" fill="#b71c1c" text-anchor="middle" font-weight="bold">4. Пик</text>
    <text x="0" y="5" font-size="5" fill="#5d4037" text-anchor="middle">кульминация</text>
  </g>
  <!-- Turning point arrow down -->
  <path d="M250,100 L250,140" stroke="#546e7a" stroke-width="2"/>
  <polygon points="250,140 246,133 254,133" fill="#546e7a"/>
  <text x="270" y="125" font-size="6" fill="#546e7a">Поворот</text>
  <!-- Resolution (bottom row) -->
  <text x="250" y="160" font-size="9" fill="#2e7d32" text-anchor="middle" font-weight="bold">Разрешение конфликта</text>
  <rect x="30" y="168" width="440" height="15" rx="3" fill="url(#resolve)" opacity="0.6"/>
  <!-- Resolution steps -->
  <g transform="translate(90,220)">
    <rect x="-45" y="-25" width="90" height="50" rx="8" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="0" y="-8" font-size="7" fill="#2e7d32" text-anchor="middle" font-weight="bold">Переговоры</text>
    <text x="0" y="5" font-size="5" fill="#5d4037" text-anchor="middle">диалог сторон</text>
    <!-- Handshake icon -->
    <path d="M-10,14 Q0,10 10,14" fill="none" stroke="#2e7d32" stroke-width="1.5"/>
  </g>
  <path d="M140,220 L180,220" stroke="#2e7d32" stroke-width="1.5"/>
  <polygon points="180,220 174,217 174,223" fill="#2e7d32"/>
  <g transform="translate(230,220)">
    <rect x="-45" y="-25" width="90" height="50" rx="8" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="0" y="-8" font-size="7" fill="#2e7d32" text-anchor="middle" font-weight="bold">Компромисс</text>
    <text x="0" y="5" font-size="5" fill="#5d4037" text-anchor="middle">взаимные уступки</text>
    <!-- Balance -->
    <line x1="-10" y1="14" x2="10" y2="14" stroke="#2e7d32" stroke-width="1.5"/>
    <path d="M-10,12 Q0,18 10,12" fill="none" stroke="#2e7d32" stroke-width="1"/>
  </g>
  <path d="M280,220 L320,220" stroke="#2e7d32" stroke-width="1.5"/>
  <polygon points="320,220 314,217 314,223" fill="#2e7d32"/>
  <g transform="translate(370,220)">
    <rect x="-45" y="-25" width="90" height="50" rx="8" fill="#81c784" stroke="#1b5e20" stroke-width="1.5"/>
    <text x="0" y="-8" font-size="7" fill="#1b5e20" text-anchor="middle" font-weight="bold">Сотрудничество</text>
    <text x="0" y="5" font-size="5" fill="#5d4037" text-anchor="middle">совместное решение</text>
    <!-- Circle of unity -->
    <circle cx="0" cy="15" r="5" fill="none" stroke="#1b5e20" stroke-width="1.5"/>
  </g>
  <!-- Possible outcomes -->
  <text x="250" y="275" font-size="7" fill="#546e7a" text-anchor="middle">Возможные исходы:</text>
  <g transform="translate(100,300)">
    <rect x="-45" y="-10" width="90" height="20" rx="4" fill="#4caf50" opacity="0.7"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Интеграция</text>
  </g>
  <g transform="translate(250,300)">
    <rect x="-45" y="-10" width="90" height="20" rx="4" fill="#ff9800" opacity="0.7"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Компромисс</text>
  </g>
  <g transform="translate(400,300)">
    <rect x="-45" y="-10" width="90" height="20" rx="4" fill="#c62828" opacity="0.7"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Подавление</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Социальный конфликт и его решение</text>
</svg>