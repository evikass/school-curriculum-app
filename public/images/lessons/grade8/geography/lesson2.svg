<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#ocean)"/>
  <!-- Simplified Russia coastline -->
  <path d="M50,40 L80,35 L120,30 L160,28 L200,32 L240,25 L280,22 L320,28 L360,22 L400,30 L440,25 L480,35 L490,60 L480,80 L460,90 L440,105 L420,100 L400,110 L380,105 L360,115 L340,108 L320,120 L300,115 L280,125 L260,118 L240,130 L220,125 L200,135 L180,128 L160,140 L140,135 L120,145 L100,138 L80,150 L60,145 L50,130 L40,100 L45,70 Z" fill="#c8e6c9" stroke="#4caf50" stroke-width="1"/>
  <!-- Barents Sea -->
  <ellipse cx="130" cy="55" rx="45" ry="25" fill="#42a5f5" opacity="0.6"/>
  <text x="130" y="58" font-size="7" fill="#fff" text-anchor="middle">Баренцево</text>
  <!-- Baltic Sea -->
  <ellipse cx="60" cy="105" rx="25" ry="18" fill="#42a5f5" opacity="0.6"/>
  <text x="60" y="108" font-size="6" fill="#fff" text-anchor="middle">Балтийское</text>
  <!-- Black Sea -->
  <ellipse cx="85" cy="165" rx="30" ry="15" fill="#42a5f5" opacity="0.6"/>
  <text x="85" y="168" font-size="6" fill="#fff" text-anchor="middle">Чёрное</text>
  <!-- Sea of Okhotsk -->
  <ellipse cx="380" cy="130" rx="40" ry="22" fill="#42a5f5" opacity="0.6"/>
  <text x="380" y="133" font-size="6" fill="#fff" text-anchor="middle">Охотское</text>
  <!-- Bering Sea -->
  <ellipse cx="460" cy="80" rx="30" ry="20" fill="#42a5f5" opacity="0.6"/>
  <text x="460" y="83" font-size="6" fill="#fff" text-anchor="middle">Берингово</text>
  <!-- Caspian Sea -->
  <ellipse cx="130" cy="200" rx="20" ry="30" fill="#42a5f5" opacity="0.6"/>
  <text x="130" y="203" font-size="6" fill="#fff" text-anchor="middle">Каспийское</text>
  <!-- Islands -->
  <!-- Novaya Zemlya -->
  <ellipse cx="190" cy="42" rx="8" ry="18" fill="#a5d6a7" stroke="#4caf50" stroke-width="0.8"/>
  <text x="190" y="36" font-size="5" fill="#fff">Новая Земля</text>
  <!-- Sakhalin -->
  <ellipse cx="415" cy="145" rx="6" ry="18" fill="#a5d6a7" stroke="#4caf50" stroke-width="0.8"/>
  <text x="415" y="140" font-size="5" fill="#fff">Сахалин</text>
  <!-- Kuril Islands -->
  <g fill="#a5d6a7" stroke="#4caf50" stroke-width="0.5">
    <ellipse cx="430" cy="170" rx="4" ry="6"/>
    <ellipse cx="438" cy="180" rx="3" ry="5"/>
    <ellipse cx="444" cy="190" rx="3" ry="5"/>
    <ellipse cx="448" cy="200" rx="3" ry="4"/>
  </g>
  <text x="445" y="215" font-size="5" fill="#fff">Курилы</text>
  <!-- Franz Josef Land -->
  <circle cx="160" cy="28" r="5" fill="#a5d6a7" stroke="#4caf50" stroke-width="0.5"/>
  <text x="160" y="22" font-size="4" fill="#fff">Земля Франца</text>
  <!-- Wave decorations -->
  <path d="M20,280 Q60,270 100,280 Q140,290 180,280 Q220,270 260,280 Q300,290 340,280 Q380,270 420,280 Q460,290 500,280" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <path d="M20,295 Q60,285 100,295 Q140,305 180,295 Q220,285 260,295 Q300,305 340,295 Q380,285 420,295 Q460,305 500,295" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
  <text x="250" y="340" font-size="9" fill="#fff" opacity="0.5" text-anchor="middle">Моря и острова России</text>
</svg>