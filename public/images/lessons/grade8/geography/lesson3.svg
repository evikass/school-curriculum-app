<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="60%" stop-color="#bbdefb"/>
      <stop offset="100%" stop-color="#8d6e63"/>
    </linearGradient>
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="30%" stop-color="#9e9e9e"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
    <linearGradient id="volc" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="80%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#e53935"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky)"/>
  <!-- Plains (West Siberian) -->
  <ellipse cx="250" cy="280" rx="220" ry="40" fill="#a5d6a7" opacity="0.6"/>
  <path d="M30,260 Q100,250 170,260 Q250,255 330,260 Q400,250 470,260 L470,310 L30,310 Z" fill="#c8e6c9"/>
  <!-- Ural Mountains -->
  <path d="M120,260 L125,200 L130,180 L135,190 L140,170 L145,185 L150,195 L155,260" fill="url(#mtn)" stroke="#424242" stroke-width="1"/>
  <path d="M130,180 L132,170 L135,165 L138,170" fill="#f5f5f5" opacity="0.8"/>
  <text x="137" y="158" font-size="7" fill="#333" text-anchor="middle">Урал</text>
  <!-- Caucasus Mountains -->
  <path d="M170,260 L175,210 L180,190 L185,175 L190,165 L195,170 L200,180 L205,195 L210,260" fill="url(#mtn)" stroke="#424242" stroke-width="1"/>
  <path d="M188,175 L190,160 L192,165 L195,155 L197,162" fill="#f5f5f5" opacity="0.8"/>
  <text x="192" y="150" font-size="7" fill="#333" text-anchor="middle">Кавказ</text>
  <!-- Elbrus peak -->
  <polygon points="190,150 186,165 194,165" fill="#fff"/>
  <!-- Altai Mountains -->
  <path d="M250,260 L255,220 L260,200 L265,190 L270,195 L275,210 L280,260" fill="url(#mtn)" stroke="#424242" stroke-width="1"/>
  <text x="265" y="182" font-size="7" fill="#333" text-anchor="middle">Алтай</text>
  <!-- Sayan Mountains -->
  <path d="M290,260 L295,225 L300,210 L305,215 L310,260" fill="url(#mtn)" stroke="#424242" stroke-width="1"/>
  <text x="300" y="202" font-size="6" fill="#333" text-anchor="middle">Саяны</text>
  <!-- Kamchatka Volcanoes -->
  <path d="M410,260 L415,180 L420,160 L425,170 L430,260" fill="url(#volc)" stroke="#424242" stroke-width="1"/>
  <!-- Volcano eruption -->
  <ellipse cx="420" cy="158" rx="8" ry="5" fill="#ff5722" opacity="0.7"/>
  <path d="M418,155 Q416,140 420,130 Q424,140 422,155" fill="#ff9800" opacity="0.5"/>
  <path d="M416,155 Q412,135 418,125 Q422,138 420,155" fill="#ffcc80" opacity="0.3"/>
  <text x="420" y="148" font-size="6" fill="#fff" text-anchor="middle">Камчатка</text>
  <!-- Second volcano -->
  <path d="M440,260 L445,195 L450,180 L455,190 L460,260" fill="url(#volc)" stroke="#424242" stroke-width="1"/>
  <ellipse cx="450" cy="178" rx="6" ry="4" fill="#ff5722" opacity="0.6"/>
  <!-- Siberian plain label -->
  <text x="220" y="285" font-size="8" fill="#2e7d32" text-anchor="middle">Западно-Сибирская равнина</text>
  <text x="360" y="285" font-size="7" fill="#2e7d32" text-anchor="middle">Среднесибирское плоскогорье</text>
  <!-- East European plain -->
  <text x="70" y="285" font-size="7" fill="#2e7d32" text-anchor="middle">Восточно-</text>
  <text x="70" y="295" font-size="7" fill="#2e7d32" text-anchor="middle">Европейская</text>
  <text x="70" y="305" font-size="7" fill="#2e7d32" text-anchor="middle">равнина</text>
  <!-- Direction arrow -->
  <line x1="50" y1="310" x2="460" y2="310" stroke="#795548" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="50" y="325" font-size="6" fill="#795548">Запад</text>
  <text x="450" y="325" font-size="6" fill="#795548">Восток</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Рельеф России</text>
</svg>