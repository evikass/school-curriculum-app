<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="50%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#ffcc80"/>
    </linearGradient>
    <linearGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#ffb300"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="420" cy="50" r="35" fill="#ffb300"/>
  <g stroke="#ffb300" stroke-width="2" opacity="0.7">
    <line x1="420" y1="5" x2="420" y2="-5"/>
    <line x1="420" y1="95" x2="420" y2="105"/>
    <line x1="375" y1="50" x2="365" y2="50"/>
    <line x1="465" y1="50" x2="475" y2="50"/>
    <line x1="390" y1="20" x2="383" y2="13"/>
    <line x1="450" y1="20" x2="457" y2="13"/>
    <line x1="390" y1="80" x2="383" y2="87"/>
    <line x1="450" y1="80" x2="457" y2="87"/>
  </g>
  <!-- Sun rays hitting Earth at different angles -->
  <!-- Northern lat (acute angle) -->
  <line x1="350" y1="65" x2="100" y2="115" stroke="#ffcc80" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="350" y1="65" x2="100" y2="125" stroke="#ffcc80" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- Equator (perpendicular) -->
  <line x1="380" y1="60" x2="250" y2="180" stroke="#ff8f00" stroke-width="2"/>
  <line x1="380" y1="60" x2="260" y2="180" stroke="#ff8f00" stroke-width="2"/>
  <!-- Earth surface (curved) -->
  <path d="M30,180 Q150,200 250,180 Q350,160 470,180" fill="none" stroke="#4caf50" stroke-width="2"/>
  <path d="M30,180 Q150,200 250,180 Q350,160 470,180 L470,350 L30,350 Z" fill="#a5d6a7" opacity="0.4"/>
  <!-- Latitude lines -->
  <line x1="80" y1="140" x2="120" y2="140" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="70" y="143" font-size="7" fill="#1565c0">70°с.ш.</text>
  <line x1="230" y1="165" x2="270" y2="165" stroke="#1565c0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="215" y="168" font-size="7" fill="#1565c0">45°с.ш.</text>
  <!-- Angle indicators -->
  <path d="M100,115 Q95,120 100,125" fill="none" stroke="#e65100" stroke-width="1.5"/>
  <text x="85" y="135" font-size="6" fill="#e65100">малый угол</text>
  <!-- Ocean currents -->
  <path d="M30,220 Q80,200 130,215 Q180,230 230,215" fill="none" stroke="#00bcd4" stroke-width="2" opacity="0.7"/>
  <polygon points="230,215 224,211 226,218" fill="#00bcd4" opacity="0.7"/>
  <text x="130" y="240" font-size="6" fill="#00838f">Тёплое течение</text>
  <path d="M250,250 Q300,265 350,252 Q400,240 450,255" fill="none" stroke="#1565c0" stroke-width="2" opacity="0.7"/>
  <polygon points="450,255 444,251 446,258" fill="#1565c0" opacity="0.7"/>
  <text x="350" y="275" font-size="6" fill="#0d47a1">Холодное течение</text>
  <!-- Wind arrows -->
  <path d="M200,130 Q180,145 160,140" fill="none" stroke="#fff" stroke-width="1.5"/>
  <polygon points="160,140 167,137 164,144" fill="#fff" opacity="0.8"/>
  <text x="195" y="128" font-size="6" fill="#fff">Западные ветры</text>
  <!-- Label sections -->
  <rect x="15" y="290" width="150" height="25" rx="4" fill="#1565c0" opacity="0.8"/>
  <text x="90" y="307" font-size="7" fill="#fff" text-anchor="middle">Широта → угол падения</text>
  <rect x="175" y="290" width="150" height="25" rx="4" fill="#00838f" opacity="0.8"/>
  <text x="250" y="307" font-size="7" fill="#fff" text-anchor="middle">Океанические течения</text>
  <rect x="335" y="290" width="150" height="25" rx="4" fill="#4e342e" opacity="0.8"/>
  <text x="410" y="307" font-size="7" fill="#fff" text-anchor="middle">Преобладающие ветры</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Климатообразующие факторы</text>
</svg>