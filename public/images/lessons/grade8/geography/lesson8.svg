<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky)"/>
  <!-- Baikal depth profile (left side) -->
  <text x="120" y="20" font-size="9" fill="#01579b" text-anchor="middle" font-weight="bold">Озеро Байкал</text>
  <!-- Surface water line -->
  <line x1="30" y1="40" x2="210" y2="40" stroke="#0288d1" stroke-width="2"/>
  <!-- Depth profile -->
  <path d="M50,40 L55,50 L65,70 L80,100 L95,130 L110,155 L120,170 L130,180 L140,175 L150,165 L160,145 L170,120 L180,90 L190,60 L200,40" fill="url(#water)" stroke="#01579b" stroke-width="1.5" opacity="0.7"/>
  <!-- Depth markers -->
  <line x1="130" y1="40" x2="130" y2="180" stroke="#fff" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="140" y="80" font-size="6" fill="#fff">500м</text>
  <text x="140" y="120" font-size="6" fill="#fff">1000м</text>
  <text x="140" y="155" font-size="6" fill="#fff">1500м</text>
  <text x="120" y="190" font-size="7" fill="#01579b" text-anchor="middle">1642 м</text>
  <!-- Lake shape surface view -->
  <ellipse cx="120" cy="38" rx="75" ry="8" fill="#4fc3f7" opacity="0.5"/>
  <!-- Ladoga Lake (right side) -->
  <text x="360" y="20" font-size="9" fill="#01579b" text-anchor="middle" font-weight="bold">Ладожское озеро</text>
  <ellipse cx="360" cy="70" rx="70" ry="40" fill="#4fc3f7" opacity="0.6" stroke="#0288d1" stroke-width="1.5"/>
  <ellipse cx="360" cy="70" rx="55" ry="30" fill="#0288d1" opacity="0.4"/>
  <text x="360" y="75" font-size="7" fill="#fff" text-anchor="middle">17 700 км²</text>
  <!-- Onega Lake -->
  <ellipse cx="360" cy="135" rx="45" ry="25" fill="#4fc3f7" opacity="0.5" stroke="#0288d1" stroke-width="1"/>
  <text x="360" y="140" font-size="6" fill="#01579b" text-anchor="middle">Онежское</text>
  <!-- Reservoir with dam (bottom) -->
  <text x="250" y="200" font-size="9" fill="#01579b" text-anchor="middle" font-weight="bold">Водохранилище</text>
  <!-- Dam structure -->
  <rect x="230" y="210" width="40" height="60" fill="#78909c" stroke="#455a64" stroke-width="1.5"/>
  <rect x="225" y="210" width="50" height="5" fill="#546e7a"/>
  <!-- Dam slots -->
  <rect x="237" y="220" width="6" height="10" fill="#4fc3f7"/>
  <rect x="248" y="220" width="6" height="10" fill="#4fc3f7"/>
  <rect x="259" y="220" width="6" height="10" fill="#4fc3f7"/>
  <!-- Water behind dam -->
  <path d="M30,220 Q80,215 130,218 Q180,220 225,220 L225,270 Q180,275 130,272 Q80,270 30,275 Z" fill="#4fc3f7" opacity="0.5"/>
  <!-- Water flow from dam -->
  <path d="M270,240 Q280,255 285,270 Q290,280 295,285" fill="none" stroke="#4fc3f7" stroke-width="2"/>
  <path d="M270,245 Q278,260 282,275" fill="none" stroke="#29b6f6" stroke-width="1.5"/>
  <!-- Downstream river -->
  <path d="M280,260 Q310,265 340,258 Q380,248 420,255 Q450,260 470,255" fill="none" stroke="#4fc3f7" stroke-width="3"/>
  <!-- Power lines -->
  <line x1="235" y1="210" x2="235" y2="195" stroke="#455a64" stroke-width="1"/>
  <line x1="265" y1="210" x2="265" y2="195" stroke="#455a64" stroke-width="1"/>
  <line x1="235" y1="195" x2="265" y2="195" stroke="#455a64" stroke-width="1"/>
  <!-- Fish in lake -->
  <path d="M70,55 Q78,50 85,55 Q78,60 70,55" fill="#ff9800" opacity="0.6"/>
  <circle cx="83" cy="54" r="1" fill="#333"/>
  <!-- Splash -->
  <circle cx="275" cy="265" r="2" fill="#4fc3f7" opacity="0.5"/>
  <circle cx="280" cy="270" r="1.5" fill="#4fc3f7" opacity="0.4"/>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Озёра и водохранилища</text>
</svg>