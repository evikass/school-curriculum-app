<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Simplified Russia outline -->
  <path d="M60,60 L90,50 L130,45 L170,50 L210,42 L250,40 L290,44 L330,40 L370,45 L400,42 L430,50 L450,60 L460,80 L450,100 L430,110 L410,105 L390,115 L370,108 L350,118 L330,112 L310,120 L280,115 L260,125 L240,120 L220,130 L200,125 L180,135 L150,128 L120,138 L100,132 L80,140 L60,135 L50,110 L45,85 Z" fill="#d7ccc8" stroke="#8d6e63" stroke-width="1.5"/>
  <!-- Oil (West Siberia) -->
  <g transform="translate(280,80)">
    <polygon points="0,-15 5,-5 3,-5 3,5 -3,5 -3,-5 -5,-5" fill="#1b5e20" stroke="#000" stroke-width="0.5"/>
    <rect x="-6" y="5" width="12" height="3" rx="1" fill="#795548"/>
    <text x="0" y="20" font-size="6" fill="#1b5e20" text-anchor="middle">Нефть</text>
  </g>
  <!-- Gas (West Siberia) -->
  <g transform="translate(310,100)">
    <circle r="8" fill="#f44336" opacity="0.7"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">🔥</text>
    <text x="0" y="18" font-size="6" fill="#b71c1c" text-anchor="middle">Газ</text>
  </g>
  <!-- Coal (Kuzbass) -->
  <g transform="translate(230,110)">
    <polygon points="-8,5 -5,-5 0,-8 5,-5 8,5" fill="#37474f"/>
    <polygon points="-6,3 -3,-3 0,-5 3,-3 6,3" fill="#263238"/>
    <text x="0" y="16" font-size="6" fill="#37474f" text-anchor="middle">Уголь</text>
  </g>
  <!-- Iron (Kursk) -->
  <g transform="translate(110,95)">
    <rect x="-7" y="-7" width="14" height="14" rx="2" fill="#b0bec5" stroke="#78909c" stroke-width="1"/>
    <rect x="-4" y="-4" width="8" height="8" rx="1" fill="#90a4ae"/>
    <text x="0" y="18" font-size="6" fill="#546e7a" text-anchor="middle">Железо</text>
  </g>
  <!-- Gold (Siberia) -->
  <g transform="translate(350,85)">
    <polygon points="0,-10 3,-4 9,-4 4,1 6,8 0,4 -6,8 -4,1 -9,-4 -3,-4" fill="#ffd600" stroke="#f9a825" stroke-width="0.5"/>
    <text x="0" y="18" font-size="6" fill="#f57f17" text-anchor="middle">Золото</text>
  </g>
  <!-- Diamonds (Yakutia) -->
  <g transform="translate(370,115)">
    <polygon points="0,-12 8,-4 5,8 -5,8 -8,-4" fill="#e1f5fe" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="0" y1="-12" x2="-5" y2="8" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="0" y1="-12" x2="5" y2="8" stroke="#4fc3f7" stroke-width="0.5"/>
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#4fc3f7" stroke-width="0.5"/>
    <text x="0" y="18" font-size="6" fill="#0288d1" text-anchor="middle">Алмазы</text>
  </g>
  <!-- Region labels -->
  <text x="230" y="128" font-size="5" fill="#5d4037">Кузбасс</text>
  <text x="280" y="66" font-size="5" fill="#5d4037">Зап. Сибирь</text>
  <text x="110" y="78" font-size="5" fill="#5d4037">Курская</text>
  <text x="110" y="84" font-size="5" fill="#5d4037">магнитка</text>
  <text x="350" y="70" font-size="5" fill="#5d4037">Якутия</text>
  <!-- Legend box -->
  <rect x="15" y="200" width="470" height="100" rx="8" fill="#fff" opacity="0.7" stroke="#bcaaa4"/>
  <text x="250" y="220" font-size="9" fill="#5d4037" text-anchor="middle" font-weight="bold">Полезные ископаемые России</text>
  <g transform="translate(50,240)">
    <circle r="5" fill="#1b5e20"/><text x="10" y="3" font-size="7" fill="#333">Нефть — Западная Сибирь, Поволжье</text>
  </g>
  <g transform="translate(50,258)">
    <circle r="5" fill="#f44336"/><text x="10" y="3" font-size="7" fill="#333">Газ — Западная Сибирь, Оренбург</text>
  </g>
  <g transform="translate(50,276)">
    <circle r="5" fill="#37474f"/><text x="10" y="3" font-size="7" fill="#333">Уголь — Кузбасс, Донбасс</text>
  </g>
  <g transform="translate(280,240)">
    <circle r="5" fill="#b0bec5"/><text x="10" y="3" font-size="7" fill="#333">Железо — КМА, Урал</text>
  </g>
  <g transform="translate(280,258)">
    <circle r="5" fill="#ffd600"/><text x="10" y="3" font-size="7" fill="#333">Золото — Красноярский край</text>
  </g>
  <g transform="translate(280,276)">
    <circle r="5" fill="#4fc3f7"/><text x="10" y="3" font-size="7" fill="#333">Алмазы — Якутия</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Полезные ископаемые</text>
</svg>