<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eceff1"/>
      <stop offset="100%" stop-color="#cfd8dc"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Chart area -->
  <rect x="70" y="20" width="400" height="250" fill="#fff" stroke="#90a4ae" stroke-width="1"/>
  <!-- Grid lines -->
  <g stroke="#e0e0e0" stroke-width="0.5">
    <line x1="70" y1="70" x2="470" y2="70"/>
    <line x1="70" y1="120" x2="470" y2="120"/>
    <line x1="70" y1="170" x2="470" y2="170"/>
    <line x1="70" y1="220" x2="470" y2="220"/>
  </g>
  <!-- Y axis - Temperature -->
  <line x1="70" y1="20" x2="70" y2="270" stroke="#546e7a" stroke-width="1.5"/>
  <text x="60" y="35" font-size="7" fill="#d32f2f" text-anchor="end">+20°</text>
  <text x="60" y="75" font-size="7" fill="#d32f2f" text-anchor="end">+10°</text>
  <text x="60" y="120" font-size="7" fill="#546e7a" text-anchor="end">0°</text>
  <text x="60" y="170" font-size="7" fill="#1565c0" text-anchor="end">-10°</text>
  <text x="60" y="220" font-size="7" fill="#1565c0" text-anchor="end">-20°</text>
  <text x="60" y="265" font-size="7" fill="#1565c0" text-anchor="end">-30°</text>
  <!-- Y axis - Precipitation -->
  <line x1="470" y1="20" x2="470" y2="270" stroke="#546e7a" stroke-width="1.5"/>
  <text x="478" y="35" font-size="7" fill="#1565c0">80мм</text>
  <text x="478" y="75" font-size="7" fill="#1565c0">60мм</text>
  <text x="478" y="120" font-size="7" fill="#1565c0">40мм</text>
  <text x="478" y="170" font-size="7" fill="#1565c0">20мм</text>
  <text x="478" y="265" font-size="7" fill="#1565c0">0мм</text>
  <!-- 0° line -->
  <line x1="70" y1="115" x2="470" y2="115" stroke="#78909c" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Precipitation bars (blue) - Moscow-like climate -->
  <g fill="#42a5f5" opacity="0.6">
    <rect x="82" y="195" width="18" height="75" rx="1"/>
    <rect x="115" y="180" width="18" height="90" rx="1"/>
    <rect x="148" y="155" width="18" height="115" rx="1"/>
    <rect x="181" y="120" width="18" height="150" rx="1"/>
    <rect x="214" y="90" width="18" height="180" rx="1"/>
    <rect x="247" y="70" width="18" height="200" rx="1"/>
    <rect x="280" y="60" width="18" height="210" rx="1"/>
    <rect x="313" y="70" width="18" height="200" rx="1"/>
    <rect x="346" y="90" width="18" height="180" rx="1"/>
    <rect x="379" y="110" width="18" height="160" rx="1"/>
    <rect x="412" y="150" width="18" height="120" rx="1"/>
    <rect x="445" y="185" width="18" height="85" rx="1"/>
  </g>
  <!-- Temperature curve (red) -->
  <polyline points="91,230 124,215 157,190 190,150 223,100 256,55 289,45 322,55 355,90 388,130 421,175 454,220" fill="none" stroke="#e53935" stroke-width="2.5"/>
  <g fill="#e53935">
    <circle cx="91" cy="230" r="3"/>
    <circle cx="124" cy="215" r="3"/>
    <circle cx="157" cy="190" r="3"/>
    <circle cx="190" cy="150" r="3"/>
    <circle cx="223" cy="100" r="3"/>
    <circle cx="256" cy="55" r="3"/>
    <circle cx="289" cy="45" r="3"/>
    <circle cx="322" cy="55" r="3"/>
    <circle cx="355" cy="90" r="3"/>
    <circle cx="388" cy="130" r="3"/>
    <circle cx="421" cy="175" r="3"/>
    <circle cx="454" cy="220" r="3"/>
  </g>
  <!-- Month labels -->
  <text x="91" y="283" font-size="6" fill="#546e7a" text-anchor="middle">Я</text>
  <text x="124" y="283" font-size="6" fill="#546e7a" text-anchor="middle">Ф</text>
  <text x="157" y="283" font-size="6" fill="#546e7a" text-anchor="middle">М</text>
  <text x="190" y="283" font-size="6" fill="#546e7a" text-anchor="middle">А</text>
  <text x="223" y="283" font-size="6" fill="#546e7a" text-anchor="middle">М</text>
  <text x="256" y="283" font-size="6" fill="#546e7a" text-anchor="middle">И</text>
  <text x="289" y="283" font-size="6" fill="#546e7a" text-anchor="middle">И</text>
  <text x="322" y="283" font-size="6" fill="#546e7a" text-anchor="middle">А</text>
  <text x="355" y="283" font-size="6" fill="#546e7a" text-anchor="middle">С</text>
  <text x="388" y="283" font-size="6" fill="#546e7a" text-anchor="middle">О</text>
  <text x="421" y="283" font-size="6" fill="#546e7a" text-anchor="middle">Н</text>
  <text x="454" y="283" font-size="6" fill="#546e7a" text-anchor="middle">Д</text>
  <!-- Legend -->
  <line x1="120" y1="305" x2="145" y2="305" stroke="#e53935" stroke-width="2.5"/>
  <text x="150" y="308" font-size="7" fill="#546e7a">Температура</text>
  <rect x="250" y="300" width="15" height="10" fill="#42a5f5" opacity="0.6" rx="1"/>
  <text x="270" y="308" font-size="7" fill="#546e7a">Осадки</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Температура и осадки</text>
</svg>