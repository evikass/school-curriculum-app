<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="tundra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#90a4ae"/>
    </linearGradient>
    <linearGradient id="taiga" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="steppe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0ca33"/>
      <stop offset="100%" stop-color="#9e9d24"/>
    </linearGradient>
    <linearGradient id="desert" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#ffa726"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#eceff1"/>
  <!-- Horizontal zone strip (map view) -->
  <!-- Arctic desert -->
  <rect x="30" y="30" width="440" height="35" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="0.5"/>
  <text x="250" y="52" font-size="8" fill="#616161" text-anchor="middle">Арктическая пустыня</text>
  <!-- Snowflake icons -->
  <text x="55" y="48" font-size="10" fill="#90a4ae">❄</text>
  <text x="440" y="48" font-size="10" fill="#90a4ae">❄</text>
  <!-- Tundra -->
  <rect x="30" y="65" width="440" height="45" fill="url(#tundra)"/>
  <text x="250" y="92" font-size="8" fill="#fff" text-anchor="middle">Тундра</text>
  <!-- Moss/lichen -->
  <circle cx="60" cy="85" r="3" fill="#8bc34a" opacity="0.5"/>
  <circle cx="75" cy="80" r="2" fill="#689f38" opacity="0.5"/>
  <circle cx="440" cy="88" r="3" fill="#8bc34a" opacity="0.5"/>
  <circle cx="455" cy="82" r="2" fill="#689f38" opacity="0.5"/>
  <!-- Taiga -->
  <rect x="30" y="110" width="440" height="55" fill="url(#taiga)"/>
  <text x="250" y="142" font-size="9" fill="#fff" text-anchor="middle">Тайга</text>
  <!-- Tree icons -->
  <polygon points="55,135 60,118 65,135" fill="#1b5e20"/>
  <polygon points="80,135 85,120 90,135" fill="#2e7d32"/>
  <polygon points="420,133 425,118 430,133" fill="#1b5e20"/>
  <polygon points="445,135 450,120 455,135" fill="#2e7d32"/>
  <!-- Mixed forest -->
  <rect x="30" y="165" width="440" height="30" fill="#4caf50" stroke="#388e3c" stroke-width="0.5"/>
  <text x="250" y="184" font-size="7" fill="#fff" text-anchor="middle">Смешанные и широколиственные леса</text>
  <polygon points="55,180 58,168 61,180" fill="#388e3c"/>
  <polygon points="440,180 443,168 446,180" fill="#388e3c"/>
  <!-- Steppe -->
  <rect x="30" y="195" width="440" height="40" fill="url(#steppe)"/>
  <text x="250" y="219" font-size="8" fill="#fff" text-anchor="middle">Степь</text>
  <!-- Grass -->
  <line x1="55" y1="225" x2="53" y2="215" stroke="#827717" stroke-width="1"/>
  <line x1="57" y1="225" x2="57" y2="213" stroke="#827717" stroke-width="1"/>
  <line x1="59" y1="225" x2="61" y2="215" stroke="#827717" stroke-width="1"/>
  <line x1="440" y1="225" x2="438" y2="215" stroke="#827717" stroke-width="1"/>
  <line x1="442" y1="225" x2="442" y2="213" stroke="#827717" stroke-width="1"/>
  <line x1="444" y1="225" x2="446" y2="215" stroke="#827717" stroke-width="1"/>
  <!-- Semi-desert -->
  <rect x="30" y="235" width="440" height="25" fill="#d4a55a" stroke="#c49a4a" stroke-width="0.5"/>
  <text x="250" y="252" font-size="7" fill="#5d4037" text-anchor="middle">Полупустыня</text>
  <!-- Desert -->
  <rect x="30" y="260" width="440" height="30" fill="url(#desert)"/>
  <text x="250" y="279" font-size="8" fill="#5d4037" text-anchor="middle">Пустыня</text>
  <!-- Cactus -->
  <rect x="55" y="272" width="4" height="10" rx="2" fill="#8bc34a" opacity="0.6"/>
  <rect x="52" y="275" width="3" height="5" rx="1" fill="#8bc34a" opacity="0.6"/>
  <rect x="440" y="272" width="4" height="10" rx="2" fill="#8bc34a" opacity="0.6"/>
  <!-- Direction label -->
  <text x="15" y="50" font-size="6" fill="#546e7a" transform="rotate(-90,15,50)">Север</text>
  <text x="15" y="260" font-size="6" fill="#546e7a" transform="rotate(-90,15,260)">Юг</text>
  <!-- Temperature scale -->
  <rect x="490" y="30" width="6" height="260" rx="2" fill="none" stroke="#78909c"/>
  <defs>
    <linearGradient id="temp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="50%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#ef5350"/>
    </linearGradient>
  </defs>
  <rect x="491" y="31" width="4" height="258" fill="url(#temp)" opacity="0.7"/>
  <text x="485" y="40" font-size="5" fill="#1565c0" text-anchor="end">-30°</text>
  <text x="485" y="165" font-size="5" fill="#2e7d32" text-anchor="end">0°</text>
  <text x="485" y="290" font-size="5" fill="#c62828" text-anchor="end">+30°</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Природные зоны России</text>
</svg>