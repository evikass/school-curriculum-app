<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Simplified Russia map -->
  <path d="M60,80 L90,70 L130,65 L170,68 L210,60 L250,58 L290,62 L330,58 L370,62 L400,65 L430,72 L450,82 L455,100 L445,115 L425,120 L405,115 L385,125 L365,118 L345,128 L325,120 L300,130 L275,125 L255,135 L235,128 L215,138 L195,132 L170,142 L145,135 L120,145 L100,140 L80,148 L60,142 L50,120 L48,100 Z" fill="#dcedc8" stroke="#689f38" stroke-width="1.2"/>
  <!-- Volga River -->
  <path d="M120,90 Q130,100 125,115 Q120,130 130,145 Q135,155 125,170 Q120,180 130,190 Q138,200 145,210" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <text x="155" y="150" font-size="8" fill="#0d47a1" font-style="italic">Волга</text>
  <!-- Ob River -->
  <path d="M250,65 Q255,80 260,100 Q265,120 270,140 Q272,160 268,180 Q265,200 260,220 Q258,235 262,250" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <text x="275" y="180" font-size="8" fill="#0d47a1" font-style="italic">Обь</text>
  <!-- Yenisei River -->
  <path d="M300,60 Q305,80 308,100 Q312,125 310,150 Q308,175 312,200 Q315,220 310,240 Q308,255 312,268" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <text x="320" y="200" font-size="8" fill="#0d47a1" font-style="italic">Енисей</text>
  <!-- Lena River -->
  <path d="M360,62 Q365,80 362,100 Q358,125 362,150 Q368,175 365,200 Q360,225 365,248 Q368,260 365,275" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <text x="375" y="230" font-size="8" fill="#0d47a1" font-style="italic">Лена</text>
  <!-- Amur River -->
  <path d="M400,110 Q410,115 420,118 Q430,122 440,125 Q448,128 455,130" fill="none" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <text x="425" y="112" font-size="7" fill="#0d47a1" font-style="italic">Амур</text>
  <!-- Don River -->
  <path d="M115,100 Q110,115 108,130 Q106,145 112,160 Q118,172 115,185" fill="none" stroke="#1565c0" stroke-width="1.5" stroke-linecap="round"/>
  <text x="90" y="175" font-size="6" fill="#0d47a1" font-style="italic">Дон</text>
  <!-- Seas labels -->
  <text x="250" y="50" font-size="7" fill="#42a5f5" text-anchor="middle">Северный Ледовитый океан</text>
  <text x="460" y="140" font-size="6" fill="#42a5f5">Тихий</text>
  <!-- River sources markers -->
  <circle cx="250" cy="65" r="3" fill="#0d47a1"/>
  <circle cx="300" cy="60" r="3" fill="#0d47a1"/>
  <circle cx="360" cy="62" r="3" fill="#0d47a1"/>
  <!-- Info panel -->
  <rect x="15" y="280" width="470" height="40" rx="6" fill="#fff" opacity="0.8" stroke="#90a4ae"/>
  <text x="250" y="297" font-size="8" fill="#333" text-anchor="middle" font-weight="bold">Крупнейшие реки России</text>
  <text x="100" y="312" font-size="6" fill="#1565c0">Волга — 3530 км</text>
  <text x="220" y="312" font-size="6" fill="#1565c0">Обь — 3650 км</text>
  <text x="330" y="312" font-size="6" fill="#1565c0">Енисей — 3487 км</text>
  <text x="430" y="312" font-size="6" fill="#1565c0">Лена — 4400 км</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Реки России</text>
</svg>