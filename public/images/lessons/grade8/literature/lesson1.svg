<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="goldenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <filter id="goldenGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#goldenBg)"/>
  <!-- Title -->
  <text x="250" y="32" font-family="Georgia" font-size="14" fill="url(#goldAccent)" text-anchor="middle" font-weight="bold" filter="url(#goldenGlow)">Золотой век русской литературы</text>
  <text x="250" y="48" font-family="Arial" font-size="9" fill="#FFD700" text-anchor="middle" opacity="0.6">XIX век — эпоха великих писателей</text>
  <!-- Pushkin silhouette -->
  <g transform="translate(90,100)">
    <!-- Bust silhouette -->
    <ellipse cx="0" cy="-40" rx="20" ry="24" fill="#2C2C2C"/>
    <!-- Hair curls (Pushkin's signature) -->
    <path d="M-18,-55 Q-22,-60 -18,-65 Q-14,-62 -16,-55" fill="#2C2C2C"/>
    <path d="M18,-55 Q22,-60 18,-65 Q14,-62 16,-55" fill="#2C2C2C"/>
    <!-- Shoulders -->
    <path d="M-25,-18 Q-30,0 -20,15 L20,15 Q30,0 25,-18" fill="#2C2C2C"/>
    <!-- Cravat/necktie -->
    <path d="M-8,-18 L0,-8 L8,-18" fill="#3a3a3a"/>
    <!-- Name -->
    <text x="0" y="35" font-family="Georgia" font-size="11" fill="#FFD700" text-anchor="middle" font-weight="bold">Пушкин</text>
    <text x="0" y="48" font-family="Arial" font-size="8" fill="#FFD700" text-anchor="middle" opacity="0.7">1799–1837</text>
    <!-- Quill pen -->
    <line x1="25" y1="-30" x2="40" y2="-45" stroke="#FFD700" stroke-width="1.5"/>
    <path d="M40,-45 L38,-50 L42,-48 L44,-52 L43,-47 L47,-45 L42,-44Z" fill="#FFD700"/>
    <!-- Ink splatter -->
    <circle cx="35" cy="-25" r="3" fill="#1a1a4e" stroke="#FFD700" stroke-width="0.5"/>
  </g>
  <!-- Lermontov silhouette -->
  <g transform="translate(250,100)">
    <!-- Bust silhouette -->
    <ellipse cx="0" cy="-40" rx="18" ry="23" fill="#2C2C2C"/>
    <!-- Military collar/high collar -->
    <rect x="-18" y="-20" width="36" height="8" rx="2" fill="#333"/>
    <!-- Shoulders (military epaulettes) -->
    <path d="M-22,-18 Q-28,0 -18,15 L18,15 Q28,0 22,-18" fill="#2C2C2C"/>
    <!-- Epaulette details -->
    <rect x="-25" y="-18" width="8" height="4" rx="1" fill="#3a3a3a"/>
    <rect x="17" y="-18" width="8" height="4" rx="1" fill="#3a3a3a"/>
    <!-- Name -->
    <text x="0" y="35" font-family="Georgia" font-size="11" fill="#FFD700" text-anchor="middle" font-weight="bold">Лермонтов</text>
    <text x="0" y="48" font-family="Arial" font-size="8" fill="#FFD700" text-anchor="middle" opacity="0.7">1814–1841</text>
    <!-- Dagger (military) -->
    <line x1="22" y1="-10" x2="38" y2="-25" stroke="#C0C0C0" stroke-width="1.5"/>
    <rect x="20" y="-14" width="6" height="2" fill="#C0C0C0"/>
    <!-- Mountain hint -->
    <polygon points="30,-30 40,-50 50,-30" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Gogol silhouette -->
  <g transform="translate(410,100)">
    <!-- Bust silhouette -->
    <ellipse cx="0" cy="-40" rx="18" ry="22" fill="#2C2C2C"/>
    <!-- Gogol's distinctive nose -->
    <ellipse cx="5" cy="-35" rx="3" ry="5" fill="#2C2C2C"/>
    <!-- Shoulders -->
    <path d="M-22,-18 Q-28,0 -18,15 L18,15 Q28,0 22,-18" fill="#2C2C2C"/>
    <!-- Name -->
    <text x="0" y="35" font-family="Georgia" font-size="11" fill="#FFD700" text-anchor="middle" font-weight="bold">Гоголь</text>
    <text x="0" y="48" font-family="Arial" font-size="8" fill="#FFD700" text-anchor="middle" opacity="0.7">1809–1852</text>
    <!-- Nose (humorous reference) -->
    <ellipse cx="35" cy="-35" rx="6" ry="10" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4"/>
    <!-- Overcoat reference -->
    <path d="M-15,15 L-18,35 L18,35 L15,15" fill="#2C2C2C" stroke="#3a3a3a" stroke-width="0.5"/>
  </g>
  <!-- Famous works -->
  <g transform="translate(0,175)">
    <!-- Pushkin works -->
    <rect x="25" y="0" width="130" height="55" rx="8" fill="#1a1a3e" stroke="#FFD700" stroke-width="1" opacity="0.8"/>
    <text x="90" y="18" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">«Евгений Онегин»</text>
    <text x="90" y="32" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">«Капитанская дочка»</text>
    <text x="90" y="46" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">«Руслан и Людмила»</text>
    <!-- Lermontov works -->
    <rect x="185" y="0" width="130" height="55" rx="8" fill="#1a1a3e" stroke="#FFD700" stroke-width="1" opacity="0.8"/>
    <text x="250" y="18" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">«Герой нашего</text>
    <text x="250" y="28" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">времени»</text>
    <text x="250" y="42" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">«Мцыри»</text>
    <text x="250" y="52" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">«Парус»</text>
    <!-- Gogol works -->
    <rect x="345" y="0" width="130" height="55" rx="8" fill="#1a1a3e" stroke="#FFD700" stroke-width="1" opacity="0.8"/>
    <text x="410" y="18" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">«Мёртвые души»</text>
    <text x="410" y="32" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">«Ревизор»</text>
    <text x="410" y="46" font-family="Georgia" font-size="8" fill="#FFD700" text-anchor="middle" font-style="italic">«Шинель»</text>
  </g>
  <!-- Decorative line -->
  <line x1="50" y1="250" x2="450" y2="250" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
  <!-- Quote -->
  <rect x="40" y="260" width="420" height="55" rx="10" fill="#FFD700" opacity="0.08"/>
  <text x="250" y="282" font-family="Georgia" font-size="11" fill="#FFD700" text-anchor="middle" font-style="italic" opacity="0.8">
    «Умом Россию не понять,
  </text>
  <text x="250" y="298" font-family="Georgia" font-size="11" fill="#FFD700" text-anchor="middle" font-style="italic" opacity="0.8">
    Аршином общим не измерить...»
  </text>
  <text x="250" y="314" font-family="Arial" font-size="8" fill="#FFD700" text-anchor="middle" opacity="0.5">— Ф. Тютчев</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#FFD700" opacity="0.5" text-anchor="middle">Золотой век русской литературы</text>
</svg>