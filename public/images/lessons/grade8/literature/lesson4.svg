<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="revBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#D7CCC8"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#revBg)"/>
  <!-- Room interior -->
  <!-- Back wall -->
  <rect x="30" y="30" width="440" height="220" fill="url(#wallGrad)"/>
  <!-- Wallpaper pattern -->
  <g opacity="0.1">
    <circle cx="60" cy="60" r="5" fill="#8D6E63"/><circle cx="110" cy="60" r="5" fill="#8D6E63"/>
    <circle cx="160" cy="60" r="5" fill="#8D6E63"/><circle cx="210" cy="60" r="5" fill="#8D6E63"/>
    <circle cx="260" cy="60" r="5" fill="#8D6E63"/><circle cx="310" cy="60" r="5" fill="#8D6E63"/>
    <circle cx="360" cy="60" r="5" fill="#8D6E63"/><circle cx="410" cy="60" r="5" fill="#8D6E63"/>
    <circle cx="85" cy="85" r="5" fill="#8D6E63"/><circle cx="135" cy="85" r="5" fill="#8D6E63"/>
    <circle cx="185" cy="85" r="5" fill="#8D6E63"/><circle cx="235" cy="85" r="5" fill="#8D6E63"/>
    <circle cx="285" cy="85" r="5" fill="#8D6E63"/><circle cx="335" cy="85" r="5" fill="#8D6E63"/>
    <circle cx="385" cy="85" r="5" fill="#8D6E63"/>
  </g>
  <!-- Floor -->
  <rect x="30" y="250" width="440" height="80" fill="#8D6E63" opacity="0.3"/>
  <line x1="30" y1="250" x2="470" y2="250" stroke="#8D6E63" stroke-width="2"/>
  <!-- Table -->
  <rect x="140" y="180" width="220" height="12" rx="3" fill="#5D4037"/>
  <rect x="150" y="192" width="8" height="58" fill="#4E342E"/>
  <rect x="342" y="192" width="8" height="58" fill="#4E342E"/>
  <!-- Papers on table -->
  <rect x="160" y="172" width="40" height="10" rx="1" fill="#FFF" transform="rotate(-5,180,177)"/>
  <rect x="210" y="170" width="45" height="10" rx="1" fill="#FFF" transform="rotate(3,232,175)"/>
  <!-- Khlestakov standing arrogantly -->
  <g transform="translate(250,100)">
    <!-- Body -->
    <rect x="-10" y="15" width="20" height="40" rx="3" fill="#2E7D32"/>
    <!-- Coattails -->
    <path d="M-10,45 Q-20,55 -15,60" stroke="#2E7D32" stroke-width="2" fill="none"/>
    <path d="M10,45 Q20,55 15,60" stroke="#2E7D32" stroke-width="2" fill="none"/>
    <!-- Head -->
    <circle cx="0" cy="5" r="14" fill="#FFDAB9"/>
    <!-- Hair (fashionable) -->
    <path d="M-12,-5 Q-14,-12 -8,-14 Q0,-16 8,-14 Q14,-12 12,-5" fill="#654321"/>
    <!-- Proud expression - upturned nose -->
    <circle cx="-4" cy="2" r="1" fill="#333"/>
    <circle cx="5" cy="2" r="1" fill="#333"/>
    <path d="M-2,7 Q0,9 2,7" stroke="#333" stroke-width="0.5" fill="none"/>
    <!-- Arm raised dramatically -->
    <line x1="10" y1="22" x2="30" y2="10" stroke="#FFDAB9" stroke-width="4" stroke-linecap="round"/>
    <line x1="-10" y1="22" x2="-25" y2="15" stroke="#FFDAB9" stroke-width="4" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="-5" y1="55" x2="-8" y2="85" stroke="#2C2C2C" stroke-width="4"/>
    <line x1="5" y1="55" x2="8" y2="85" stroke="#2C2C2C" stroke-width="4"/>
    <!-- Boots -->
    <ellipse cx="-8" cy="87" rx="6" ry="3" fill="#333"/>
    <ellipse cx="8" cy="87" rx="6" ry="3" fill="#333"/>
  </g>
  <!-- Panicking officials around the table -->
  <!-- Official 1 (left) -->
  <g transform="translate(100,130)">
    <circle cx="0" cy="0" r="10" fill="#FFDAB9"/>
    <rect x="-8" y="10" width="16" height="30" rx="3" fill="#1565C0"/>
    <!-- Panicking arms up -->
    <line x1="-8" y1="18" x2="-20" y2="5" stroke="#FFDAB9" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="18" x2="20" y2="5" stroke="#FFDAB9" stroke-width="3" stroke-linecap="round"/>
    <!-- Sweat drops -->
    <circle cx="-12" cy="-8" r="2" fill="#42A5F5" opacity="0.5"/>
    <!-- Legs -->
    <line x1="-4" y1="40" x2="-6" y2="60" stroke="#2C2C2C" stroke-width="3"/>
    <line x1="4" y1="40" x2="6" y2="60" stroke="#2C2C2C" stroke-width="3"/>
  </g>
  <!-- Official 2 (right) -->
  <g transform="translate(400,125)">
    <circle cx="0" cy="0" r="10" fill="#FFDAB9"/>
    <rect x="-8" y="10" width="16" height="30" rx="3" fill="#7B1FA2"/>
    <!-- Bowing/scrambling -->
    <line x1="-8" y1="18" x2="-22" y2="25" stroke="#FFDAB9" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="18" x2="22" y2="12" stroke="#FFDAB9" stroke-width="3" stroke-linecap="round"/>
    <!-- Sweat -->
    <circle cx="10" cy="-10" r="2" fill="#42A5F5" opacity="0.5"/>
    <line x1="-4" y1="40" x2="-6" y2="60" stroke="#2C2C2C" stroke-width="3"/>
    <line x1="4" y1="40" x2="6" y2="60" stroke="#2C2C2C" stroke-width="3"/>
  </g>
  <!-- Official 3 (behind table, peeking) -->
  <g transform="translate(180,155)">
    <circle cx="0" cy="0" r="8" fill="#FFDAB9"/>
    <rect x="-6" y="8" width="12" height="18" rx="2" fill="#C62828"/>
    <!-- Hands wringing -->
    <path d="M-6,16 Q-10,12 -6,10" stroke="#FFDAB9" stroke-width="2" fill="none"/>
    <path d="M6,16 Q10,12 6,10" stroke="#FFDAB9" stroke-width="2" fill="none"/>
  </g>
  <!-- Speech bubble from Khlestakov -->
  <path d="M280,60 Q285,50 295,50 L420,50 Q430,50 430,60 L430,85 Q430,95 420,95 L310,95 L300,110 L305,95 L295,95 Q285,95 285,85Z" fill="#FFF" stroke="#E65100" stroke-width="1.5"/>
  <text x="358" y="72" font-family="Georgia" font-size="9" fill="#E65100" text-anchor="middle" font-style="italic">Я, я... то есть,</text>
  <text x="358" y="84" font-family="Georgia" font-size="9" fill="#E65100" text-anchor="middle" font-style="italic">конечно...</text>
  <!-- Title -->
  <rect x="50" y="290" width="400" height="35" rx="8" fill="#FFF" opacity="0.8"/>
  <text x="250" y="310" font-family="Georgia" font-size="13" fill="#BF360C" text-anchor="middle" font-weight="bold">«Ревизор» — Н.В. Гоголь</text>
  <text x="250" y="323" font-family="Arial" font-size="9" fill="#888" text-anchor="middle">Комедия о чиновниках, принявших проезжего за ревизора</text>
  <text x="250" y="345" font-family="Arial" font-size="9" fill="#000" opacity="0.5" text-anchor="middle">Комедия «Ревизор»</text>
</svg>