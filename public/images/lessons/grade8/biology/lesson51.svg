<text x="135" y="216" font-family="Arial,sans-serif" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Оплодотворение</text>
<line x1="25" y1="220" x2="245" y2="220" stroke="#A5D6A7" stroke-width="0.5"/>

<!-- Sperm -->
<g transform="translate(40,240)">
