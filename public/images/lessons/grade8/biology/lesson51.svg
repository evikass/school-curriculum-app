  <path d="M0,4 Q2,10 -1,16" fill="none" stroke="#1565C0" stroke-width="0.8"/>
  <text x="0" y="2" font-family="Arial,sans-serif" font-size="4" fill="white" text-anchor="middle" font-weight="bold">n</text>
</g>
<text x="40" y="260" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Сперматозоид</text>

<!-- Plus -->
<text x="75" y="241" font-family="Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle">+</text>

<!-- Egg -->
<circle cx="110" cy="237" r="10" fill="#F8BBD0" stroke="#880E4F" stroke-width="0.8"/>
<circle cx="110" cy="237" r="4" fill="#E91E63" fill-opacity="0.4"/>
<text x="110" y="240" font-family="Arial,sans-serif" font-size="5" fill="#880E4F" text-anchor="middle" font-weight="bold">n</text>
<text x="110" y="258" font-family="Arial,sans-serif" font-size="5" fill="#880E4F" text-anchor="middle">Яйцеклетка</text>

<!-- Arrow -->
<line x1="128" y1="237" x2="148" y2="237" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="148,237 144,234 144,240" fill="#2E7D32"/>

<!-- Zygote -->
<circle cx="170" cy="237" r="12" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<text x="170" y="235" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle" font-weight="bold">2n</text>
<text x="170" y="242" font-family="Arial,sans-serif" font-size="4.5" fill="#1B5E20" text-anchor="middle">Зигота</text>

<!-- Arrow to development -->
<line x1="185" y1="237" x2="205" y2="237" stroke="#2E7D32" stroke-width="1"/>
<polygon points="205,237 201,234 201,240" fill="#2E7D32"/>

<!-- Early division -->
<g transform="translate(220,230)">
  <circle cx="-3" cy="3" r="5" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="3" cy="3" r="5" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32" text-anchor="middle">Дробление</text>
</g>

<!-- Puberty panel -->
<rect x="265" y="202" width="226" height="60" fill="white" fill-opacity="0.7" rx="6" stroke="#66BB6A" stroke-width="1"/>
<text x="378" y="216" font-family="Arial,sans-serif" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Половое созревание (пубертат)</text>
<line x1="275" y1="220" x2="481" y2="220" stroke="#A5D6A7" stroke-width="0.5"/>

<text x="275" y="232" font-family="Arial,sans-serif" font-size="5.5" fill="#555">👦 Мальчики: 10–14 лет</text>
<text x="275" y="241" font-family="Arial,sans-serif" font-size="5" fill="#888">Рост тела, ломка голоса, рост волос, сперматогенез</text>

<text x="275" y="252" font-family="Arial,sans-serif" font-size="5.5" fill="#555">👧 Девочки: 9–13 лет</text>
<text x="275" y="261" font-family="Arial,sans-serif" font-size="5" fill="#888">Рост молочных желёз, менархе, формирование фигуры</text>

<!-- Key differences -->
<rect x="15" y="268" width="476" height="44" fill="white" fill-opacity="0.7" rx="6" stroke="#66BB6A" stroke-width="1"/>
<text x="253" y="282" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ключевые различия гаметогенеза</text>
<line x1="25" y1="286" x2="481" y2="286" stroke="#A5D6A7" stroke-width="0.5"/>
<text x="30" y="296" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Сперматогенез: непрерывный с пубертата, 4 сперматозоида из 1 клетки, ~72 дня, миллионы в день</text>
<text x="30" y="306" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Овогенез: начинается до рождения, 1 яйцеклетка из 1 клетки, ~1 в месяц (овуляция), менопауза ~50 лет</text>

<!-- Footer bar -->
<rect x="3" y="318" width="494" height="29" rx="0" fill="#2E7D32"/>
<rect x="3" y="340" width="494" height="7" rx="0 0 8 8" fill="#2E7D32"/>
<text x="250" y="336" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Оплодотворение — слияние сперматозоида (n) и яйцеклетки (n) → зигота (2n)</text>
</svg>