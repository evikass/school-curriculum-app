<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Размножение: строение и функции половой системы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 51</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Male reproductive system -->
<rect x="15" y="56" width="155" height="140" fill="white" fill-opacity="0.7" rx="6" stroke="#42A5F5" stroke-width="1"/>
<text x="92" y="68" font-family="Arial,sans-serif" font-size="7.5" fill="#1565C0" text-anchor="middle" font-weight="bold">Мужская половая система</text>
<line x1="25" y1="72" x2="160" y2="72" stroke="#90CAF9" stroke-width="0.5"/>

<g transform="translate(55,78)">
  <!-- Testes -->
  <ellipse cx="0" cy="55" rx="10" ry="7" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle" font-weight="bold">Яички</text>
  <line x1="12" y1="52" x2="30" y2="45" stroke="#1565C0" stroke-width="0.5"/>
  <text x="32" y="44" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0">Сперматогенез</text>
  <text x="32" y="50" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0">Тестостерон</text>

  <!-- Epididymis -->
  <path d="M10,50 C14,48 16,52 14,56 C12,58 14,62 10,60" fill="none" stroke="#1565C0" stroke-width="0.8"/>
  <text x="-18" y="56" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0" text-anchor="end">Придаток</text>
  <line x1="-17" y1="55" x2="-5" y2="55" stroke="#1565C0" stroke-width="0.4"/>

  <!-- Vas deferens -->
  <path d="M14,52 L25,40 L35,30" fill="none" stroke="#1565C0" stroke-width="1"/>
  <text x="36" y="28" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0">Семявыносящий</text>
  <text x="36" y="33" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0">проток</text>

  <!-- Seminal vesicles -->
  <ellipse cx="35" cy="22" rx="8" ry="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.6"/>
  <text x="35" y="25" font-family="Arial,sans-serif" font-size="4" fill="#0D47A1" text-anchor="middle">Семенные</text>
  <text x="35" y="29" font-family="Arial,sans-serif" font-size="4" fill="#0D47A1" text-anchor="middle" dy="1">пузырьки</text>

  <!-- Prostate -->
  <ellipse cx="25" cy="15" rx="7" ry="5" fill="#64B5F6" fill-opacity="0.5" stroke="#1565C0" stroke-width="0.8"/>
  <text x="25" y="17" font-family="Arial,sans-serif" font-size="4" fill="#0D47A1" text-anchor="middle">Предстательная</text>
  <text x="25" y="21" font-family="Arial,sans-serif" font-size="4" fill="#0D47A1" text-anchor="middle">железа</text>

  <!-- Penis -->
  <rect x="20" y="5" width="8" height="10" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.6" rx="2"/>
  <text x="16" y="2" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0">Половой</text>
  <text x="16" y="6" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0">член</text>
</g>

<!-- Female reproductive system -->
<rect x="178" y="56" width="155" height="140" fill="white" fill-opacity="0.7" rx="6" stroke="#E91E63" stroke-width="1"/>
<text x="255" y="68" font-family="Arial,sans-serif" font-size="7.5" fill="#880E4F" text-anchor="middle" font-weight="bold">Женская половая система</text>
<line x1="188" y1="72" x2="323" y2="72" stroke="#F48FB1" stroke-width="0.5"/>

<g transform="translate(235,85)">
  <!-- Ovaries -->
  <ellipse cx="-25" cy="30" rx="8" ry="6" fill="#F8BBD0" stroke="#880E4F" stroke-width="0.8"/>
  <text x="-25" y="33" font-family="Arial,sans-serif" font-size="4.5" fill="#880E4F" text-anchor="middle" font-weight="bold">Яичник</text>
  <!-- Follicles -->
  <circle cx="-28" cy="28" r="2" fill="#E91E63" fill-opacity="0.3" stroke="#C2185B" stroke-width="0.4"/>
  <circle cx="-22" cy="32" r="1.5" fill="#E91E63" fill-opacity="0.3" stroke="#C2185B" stroke-width="0.4"/>

  <ellipse cx="25" cy="30" rx="8" ry="6" fill="#F8BBD0" stroke="#880E4F" stroke-width="0.8"/>
  <text x="25" y="33" font-family="Arial,sans-serif" font-size="4.5" fill="#880E4F" text-anchor="middle" font-weight="bold">Яичник</text>

  <!-- Fallopian tubes -->
  <path d="M-17,28 C-10,20 -5,15 0,12" fill="none" stroke="#880E4F" stroke-width="0.8"/>
  <path d="M17,28 C10,20 5,15 0,12" fill="none" stroke="#880E4F" stroke-width="0.8"/>
  <!-- Fimbriae -->
  <path d="M-17,26 C-18,24 -16,22 -17,25" fill="none" stroke="#880E4F" stroke-width="0.5"/>
  <path d="M17,26 C18,24 16,22 17,25" fill="none" stroke="#880E4F" stroke-width="0.5"/>
  <text x="-38" y="16" font-family="Arial,sans-serif" font-size="4.5" fill="#880E4F">Маточная</text>
  <text x="-38" y="20" font-family="Arial,sans-serif" font-size="4.5" fill="#880E4F">труба</text>
  <text x="28" y="16" font-family="Arial,sans-serif" font-size="4.5" fill="#880E4F">Маточная</text>
  <text x="28" y="20" font-family="Arial,sans-serif" font-size="4.5" fill="#880E4F">труба</text>

  <!-- Uterus -->
  <path d="M-12,12 C-14,5 -10,0 0,-2 C10,0 14,5 12,12 Z" fill="#FCE4EC" stroke="#880E4F" stroke-width="1"/>
  <text x="0" y="6" font-family="Arial,sans-serif" font-size="5" fill="#880E4F" text-anchor="middle" font-weight="bold">Матка</text>

  <!-- Endometrium layer -->
  <path d="M-10,10 C-11,5 -8,1 0,0 C8,1 11,5 10,10" fill="none" stroke="#E91E63" stroke-width="0.5" stroke-dasharray="1,1"/>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="3.5" fill="#C2185B" text-anchor="middle">эндометрий</text>

  <!-- Vagina -->
  <rect x="-5" y="12" width="10" height="18" fill="#FCE4EC" stroke="#880E4F" stroke-width="0.8" rx="2"/>
  <text x="0" y="24" font-family="Arial,sans-serif" font-size="4" fill="#880E4F" text-anchor="middle" font-weight="bold">Влагали-</text>
  <text x="0" y="28" font-family="Arial,sans-serif" font-size="4" fill="#880E4F" text-anchor="middle" font-weight="bold">ще</text>

  <!-- Cervix label -->
  <line x1="6" y1="12" x2="25" y2="8" stroke="#880E4F" stroke-width="0.4"/>
  <text x="27" y="7" font-family="Arial,sans-serif" font-size="4" fill="#880E4F">Шейка матки</text>
</g>

<!-- Gametogenesis comparison -->
<rect x="341" y="56" width="150" height="140" fill="white" fill-opacity="0.7" rx="6" stroke="#A5D6A7" stroke-width="1"/>
<text x="416" y="68" font-family="Arial,sans-serif" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Гаметогенез</text>
<line x1="351" y1="72" x2="481" y2="72" stroke="#A5D6A7" stroke-width="0.5"/>

<!-- Spermatogenesis -->
<text x="370" y="82" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">Сперматогенез:</text>
<text x="355" y="92" font-family="Arial,sans-serif" font-size="5" fill="#555">Сперматогонии (2n)</text>
<text x="355" y="100" font-family="Arial,sans-serif" font-size="5" fill="#555">  ↓ мейоз I</text>
<text x="355" y="108" font-family="Arial,sans-serif" font-size="5" fill="#555">Сперматоциты I (2n)</text>
<text x="355" y="116" font-family="Arial,sans-serif" font-size="5" fill="#555">  ↓ мейоз II</text>
<text x="355" y="124" font-family="Arial,sans-serif" font-size="5" fill="#555">Сперматиды (n)</text>
<text x="355" y="132" font-family="Arial,sans-serif" font-size="5" fill="#555">  ↓ формирование</text>
<text x="355" y="140" font-family="Arial,sans-serif" font-size="5" fill="#555" font-weight="bold">Сперматозоиды (n) ×4</text>

<!-- Sperm icon -->
<g transform="translate(450,128)">
  <ellipse cx="0" cy="0" rx="3" ry="2" fill="#1565C0"/>
  <path d="M0,2 Q1,5 -1,8" fill="none" stroke="#1565C0" stroke-width="0.5"/>
</g>

<!-- Oogenesis -->
<text x="370" y="155" font-family="Arial,sans-serif" font-size="6" fill="#880E4F" font-weight="bold">Овогенез:</text>
<text x="355" y="164" font-family="Arial,sans-serif" font-size="5" fill="#555">Овогонии (2n)</text>
<text x="355" y="172" font-family="Arial,sans-serif" font-size="5" fill="#555">  ↓ мейоз I</text>
<text x="355" y="180" font-family="Arial,sans-serif" font-size="5" fill="#555">Овоцит I (2n) + полярное тельце</text>
<text x="355" y="188" font-family="Arial,sans-serif" font-size="5" fill="#555" font-weight="bold">  ↓ мейоз II (при оплодотворении)</text>

<!-- Egg icon -->
<circle cx="455" cy="177" r="5" fill="#F8BBD0" stroke="#880E4F" stroke-width="0.6"/>
<circle cx="455" cy="177" r="2" fill="#E91E63" fill-opacity="0.4"/>

