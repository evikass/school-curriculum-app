  <text x="250" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Мышцы и их работа</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="5" fill="#C62828" opacity="0.18" rx="1"/>
  <rect x="410" y="75" width="60" height="5" fill="#1565C0" opacity="0.12" rx="1"/>
  <!-- ILLUSTRATION AREA: x=15..485, y=85..300 -->
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
  <rect x="15" y="85" width="470" height="215" fill="#E3F2FD"/><rect x="15" y="270" width="470" height="30" fill="#8D6E63"/><g transform="translate(180,200) scale(2.2)">
      <path d="M-15,25 Q-20,10 -15,-5 Q-10,-20 0,-25 Q15,-15 20,0 Q25,10 15,25Z" fill="#E57373" stroke="#C62828" stroke-width="1.5"/>
      <path d="M-10,20 Q-15,10 -10,-5 Q-5,-15 5,-15 Q15,-10 15,0 Q15,10 10,20Z" fill="#EF9A9A" opacity="0.6"/>
      <!-- bone inside -->
      <line x1="0" y1="-20" x2="-10" y2="25" stroke="#ECEFF1" stroke-width="3"/>
      <!-- fibers -->
      <line x1="-8" y1="-5" x2="10" y2="-5" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
      <line x1="-10" y1="5" x2="12" y2="5" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
      <line x1="-8" y1="15" x2="10" y2="15" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
    </g><text x="180" y="285" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Поперечнополосатые</text><g transform="translate(350,200) scale(1.4)">
      <path d="M-15,25 Q-20,10 -15,-5 Q-10,-20 0,-25 Q15,-15 20,0 Q25,10 15,25Z" fill="#E57373" stroke="#C62828" stroke-width="1.5"/>
      <path d="M-10,20 Q-15,10 -10,-5 Q-5,-15 5,-15 Q15,-10 15,0 Q15,10 10,20Z" fill="#EF9A9A" opacity="0.6"/>
      <!-- bone inside -->
      <line x1="0" y1="-20" x2="-10" y2="25" stroke="#ECEFF1" stroke-width="3"/>
      <!-- fibers -->
      <line x1="-8" y1="-5" x2="10" y2="-5" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
      <line x1="-10" y1="5" x2="12" y2="5" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
      <line x1="-8" y1="15" x2="10" y2="15" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
    </g><text x="350" y="280" font-family="Arial,sans-serif" font-size="10" fill="#E64A19" text-anchor="middle" font-weight="bold">Гладкие</text><g transform="translate(80,160) scale(0.8)">
      <path d="M0,-15 C-5,-30 -25,-30 -25,-15 C-25,0 0,20 0,25 C0,20 25,0 25,-15 C25,-30 5,-30 0,-15Z" fill="#C62828" opacity="0.8"/>
      <path d="M0,-10 C-3,-20 -15,-20 -15,-10" fill="none" stroke="#E57373" stroke-width="1.5"/>
      <line x1="-8" y1="-5" x2="-18" y2="-20" stroke="#546E7A" stroke-width="2"/>
      <line x1="8" y1="-5" x2="18" y2="-20" stroke="#546E7A" stroke-width="2"/>
      <line x1="0" y1="5" x2="-12" y2="25" stroke="#546E7A" stroke-width="2"/>
      <line x1="0" y1="5" x2="12" y2="25" stroke="#546E7A" stroke-width="2"/>
      <line x1="-5" y1="0" x2="-20" y2="-5" stroke="#546E7A" stroke-width="2"/>
      <line x1="5" y1="0" x2="20" y2="-5" stroke="#546E7A" stroke-width="2"/>
    </g><text x="80" y="200" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Сердечная</text>
  </g>
  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>