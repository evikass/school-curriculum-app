<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="30" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Расы человека</text>
<text x="250" y="46" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 8 класс — Урок 5</text>
<line x1="30" y1="52" x2="470" y2="52" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<g transform="translate(85,160)"><circle cx="0" cy="-15" r="14" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/><ellipse cx="0" cy="15" rx="12" ry="18" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/><text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Монголоидная</text></g>
<g transform="translate(250,160)"><circle cx="0" cy="-15" r="14" fill="#8D6E63" stroke="#4E342E" stroke-width="1.5"/><ellipse cx="0" cy="15" rx="12" ry="18" fill="#A1887F" stroke="#4E342E" stroke-width="1"/><text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Негроидная</text></g>
<g transform="translate(415,160)"><circle cx="0" cy="-15" r="14" fill="#FFECB3" stroke="#F57F17" stroke-width="1.5"/><ellipse cx="0" cy="15" rx="12" ry="18" fill="#FFF9C4" stroke="#F57F17" stroke-width="1"/><text x="0" y="42" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Европеоидная</text></g>
<rect x="30" y="240" width="440" height="50" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="254" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">3 большие расы: европеоидная, монголоидная, негроидная</text>
<text x="250" y="265" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Расы — адаптации к условиям среды (цвет кожи, форма волос, черты лица)</text>
<text x="250" y="276" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Все расы принадлежат к одному виду Homo sapiens | Расизм научно необоснован</text>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Биология 8 класс</text>
</svg>