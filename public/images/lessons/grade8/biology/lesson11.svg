  <g clip-path="url(#ill)">
  <rect x="15" y="85" width="470" height="215" fill="#E8F5E9"/><circle cx="200" cy="180" r="25" fill="#FFCC80" opacity="0.5" stroke="#E65100" stroke-width="2"/><text x="200" y="185" font-family="Arial" font-size="12" fill="#E65100" text-anchor="middle" font-weight="bold">АТФ</text><g transform="translate(350,170) scale(1.2)"><line x1="0" y1="0" x2="-18" y2="8" stroke="#546E7A" stroke-width="2"/><line x1="0" y1="0" x2="18" y2="8" stroke="#546E7A" stroke-width="2"/><line x1="0" y1="0" x2="0" y2="20" stroke="#546E7A" stroke-width="2"/><circle cx="0" cy="0" r="10" fill="#C62828" stroke="#333" stroke-width="0.5"/><circle cx="-18" cy="8" r="7" fill="#1565C0" stroke="#333" stroke-width="0.5"/><circle cx="18" cy="8" r="7" fill="#2E7D32" stroke="#333" stroke-width="0.5"/><circle cx="0" cy="20" r="7" fill="#F9A825" stroke="#333" stroke-width="0.5"/></g><text x="350" y="220" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" text-anchor="middle" font-weight="bold">Ферменты</text><text x="200" y="230" font-family="Arial,sans-serif" font-size="12" fill="#E65100" text-anchor="middle" font-weight="bold">Энергия клетки</text>
  </g>
