<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#ffe0b2"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#4fc3f7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky)"/>
  <!-- Peter I figure (stylized) -->
  <circle cx="120" cy="100" r="22" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
  <!-- Hair -->
  <path d="M100,90 Q105,75 120,72 Q135,75 140,90" fill="#5d4037"/>
  <!-- Eyes -->
  <circle cx="113" cy="97" r="2" fill="#333"/>
  <circle cx="127" cy="97" r="2" fill="#333"/>
  <!-- Mustache -->
  <path d="M108,108 Q112,106 118,108 Q122,106 130,108" fill="none" stroke="#5d4037" stroke-width="1.5"/>
  <!-- Body (European coat) -->
  <path d="M98,122 L95,200 L120,200 L120,140 L125,200 L150,200 L147,122 Z" fill="#1a237e" stroke="#0d47a1" stroke-width="1"/>
  <!-- Coat details -->
  <line x1="120" y1="122" x2="120" y2="200" stroke="#ffd600" stroke-width="1"/>
  <circle cx="115" cy="140" r="2" fill="#ffd600"/>
  <circle cx="115" cy="155" r="2" fill="#ffd600"/>
  <circle cx="115" cy="170" r="2" fill="#ffd600"/>
  <circle cx="125" cy="140" r="2" fill="#ffd600"/>
  <circle cx="125" cy="155" r="2" fill="#ffd600"/>
  <circle cx="125" cy="170" r="2" fill="#ffd600"/>
  <!-- Hat -->
  <path d="M96,88 L96,82 L148,82 L148,88" fill="#1a237e"/>
  <rect x="92" y="80" width="60" height="6" rx="1" fill="#0d47a1"/>
  <!-- Ship building scene (right) -->
  <!-- Ship hull -->
  <path d="M250,220 L260,200 L380,200 L390,220 Q370,230 320,232 Q270,230 250,220" fill="#5d4037" stroke="#3e2723" stroke-width="1.5"/>
  <!-- Deck -->
  <rect x="270" y="195" width="100" height="8" fill="#795548" stroke="#5d4037" stroke-width="0.5"/>
  <!-- Mast -->
  <line x1="320" y1="195" x2="320" y2="110" stroke="#4e342e" stroke-width="3"/>
  <!-- Sails -->
  <path d="M322,115 Q360,140 322,165" fill="#fff" stroke="#bdbdbd" stroke-width="0.5" opacity="0.9"/>
  <path d="M322,140 Q350,155 322,175" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="0.5" opacity="0.8"/>
  <!-- Flag -->
  <rect x="320" y="108" width="20" height="12" fill="#1a237e"/>
  <path d="M320,108 L320,120" stroke="#333" stroke-width="1"/>
  <!-- Second smaller ship -->
  <path d="M420,230 L425,218 L470,218 L475,230 Q460,236 447,237 Q434,236 420,230" fill="#6d4c41" stroke="#4e342e" stroke-width="1"/>
  <line x1="447" y1="218" x2="447" y2="185" stroke="#4e342e" stroke-width="2"/>
  <path d="M449,188 Q465,198 449,208" fill="#fff" opacity="0.8"/>
  <!-- Sea -->
  <path d="M200,225 Q240,220 280,225 Q320,230 360,225 Q400,220 440,225 Q460,228 480,225 L480,260 L200,260 Z" fill="url(#sea)" opacity="0.5"/>
  <path d="M200,240 Q240,235 280,240 Q320,245 360,240 Q400,235 440,240 L480,240 L480,260 L200,260 Z" fill="url(#sea)" opacity="0.3"/>
  <!-- Western reforms text area -->
  <rect x="220" y="40" width="250" height="100" rx="8" fill="#fff" opacity="0.8" stroke="#e65100"/>
  <text x="345" y="60" font-size="9" fill="#1a237e" text-anchor="middle" font-weight="bold">Реформы Петра I</text>
  <text x="235" y="78" font-size="7" fill="#333">• Создание флота</text>
  <text x="235" y="92" font-size="7" fill="#333">• Азовские походы</text>
  <text x="235" y="106" font-size="7" fill="#333">• Великое посольство</text>
  <text x="235" y="120" font-size="7" fill="#333">• Европейские реформы</text>
  <!-- Axe -->
  <line x1="165" y1="155" x2="185" y2="195" stroke="#5d4037" stroke-width="2.5"/>
  <path d="M183,188 L190,180 L195,190 L192,195 Z" fill="#78909c" stroke="#546e7a" stroke-width="0.5"/>
  <!-- Year -->
  <text x="120" y="215" font-size="10" fill="#bf360c" text-anchor="middle" font-weight="bold">1689</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Начало правления Петра I</text>
</svg>