<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="gown" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Empress figure (center) -->
  <circle cx="250" cy="80" r="25" fill="#ffcc80" stroke="#e65100" stroke-width="1"/>
  <!-- Hair -->
  <path d="M225,70 Q230,55 250,50 Q270,55 275,70" fill="#5d4037"/>
  <!-- Crown -->
  <path d="M230,52 L235,38 L242,48 L250,32 L258,48 L265,38 L270,52" fill="#ffd600" stroke="#f57f17" stroke-width="1"/>
  <circle cx="250" cy="36" r="3" fill="#e53935"/>
  <circle cx="238" cy="42" r="2" fill="#4fc3f7"/>
  <circle cx="262" cy="42" r="2" fill="#4fc3f7"/>
  <!-- Face -->
  <circle cx="242" cy="78" r="1.5" fill="#333"/>
  <circle cx="258" cy="78" r="1.5" fill="#333"/>
  <path d="M245,88 Q250,92 255,88" fill="none" stroke="#bf360c" stroke-width="1"/>
  <!-- Gown -->
  <path d="M225,105 L210,230 Q230,240 250,235 Q270,240 290,230 L275,105 Z" fill="url(#gown)" stroke="#0d47a1" stroke-width="1"/>
  <!-- Gown decorations -->
  <path d="M230,120 Q250,115 270,120" fill="none" stroke="#ffd600" stroke-width="1"/>
  <path d="M225,140 Q250,135 275,140" fill="none" stroke="#ffd600" stroke-width="0.8"/>
  <!-- Scepter -->
  <line x1="280" y1="120" x2="295" y2="60" stroke="#ffd600" stroke-width="2"/>
  <circle cx="295" cy="57" r="5" fill="#ffd600" stroke="#f57f17" stroke-width="1"/>
  <circle cx="295" cy="57" r="2" fill="#e53935"/>
  <!-- Orb -->
  <circle cx="210" cy="130" r="8" fill="#ffd600" stroke="#f57f17" stroke-width="1"/>
  <line x1="210" y1="122" x2="210" y2="118" stroke="#ffd600" stroke-width="1.5"/>
  <path d="M207,118 L210,112 L213,118" fill="#ffd600"/>
  <!-- Books (left) -->
  <g transform="translate(40,140)">
    <rect x="0" y="0" width="50" height="65" rx="2" fill="#5d4037" stroke="#3e2723" stroke-width="1"/>
    <rect x="3" y="3" width="44" height="59" rx="1" fill="#8d6e63"/>
    <line x1="8" y1="12" x2="42" y2="12" stroke="#5d4037" stroke-width="0.5"/>
    <line x1="8" y1="18" x2="38" y2="18" stroke="#5d4037" stroke-width="0.5"/>
    <line x1="8" y1="24" x2="40" y2="24" stroke="#5d4037" stroke-width="0.5"/>
    <text x="25" y="45" font-size="5" fill="#fff" text-anchor="middle">Наказ</text>
  </g>
  <g transform="translate(60,135)">
    <rect x="0" y="0" width="45" height="70" rx="2" fill="#1b5e20" stroke="#0d47a1" stroke-width="1"/>
    <rect x="3" y="3" width="39" height="64" rx="1" fill="#4caf50" opacity="0.7"/>
  </g>
  <g transform="translate(80,142)">
    <rect x="0" y="0" width="42" height="58" rx="2" fill="#b71c1c" stroke="#7f0000" stroke-width="1"/>
    <rect x="3" y="3" width="36" height="52" rx="1" fill="#e53935" opacity="0.7"/>
  </g>
  <!-- Legislative Commission (right) -->
  <rect x="340" y="120" width="140" height="90" rx="6" fill="#fff" opacity="0.85" stroke="#c62828"/>
  <text x="410" y="138" font-size="7" fill="#1a237e" text-anchor="middle" font-weight="bold">Уложенная комиссия</text>
  <text x="410" y="152" font-size="6" fill="#333" text-anchor="middle">1767 г.</text>
  <!-- Small figures around table -->
  <g fill="#5d4037" opacity="0.6">
    <circle cx="360" cy="170" r="3"/><rect x="357" y="174" width="6" height="12" rx="1"/>
    <circle cx="380" cy="170" r="3"/><rect x="377" y="174" width="6" height="12" rx="1"/>
    <circle cx="400" cy="170" r="3"/><rect x="397" y="174" width="6" height="12" rx="1"/>
    <circle cx="420" cy="170" r="3"/><rect x="417" y="174" width="6" height="12" rx="1"/>
    <circle cx="440" cy="170" r="3"/><rect x="437" y="174" width="6" height="12" rx="1"/>
    <circle cx="460" cy="170" r="3"/><rect x="457" y="174" width="6" height="12" rx="1"/>
  </g>
  <!-- Table -->
  <rect x="350" y="186" width="120" height="4" rx="1" fill="#795548"/>
  <!-- Title -->
  <text x="250" y="260" font-size="10" fill="#1a237e" text-anchor="middle" font-weight="bold">Просвещённый абсолютизм</text>
  <text x="250" y="275" font-size="7" fill="#4a148c" text-anchor="middle">Екатерина II — 1762–1796</text>
  <!-- Key principles -->
  <g transform="translate(50,280)">
    <circle r="4" fill="#1a237e"/><text x="10" y="3" font-size="6" fill="#333">Законность</text>
  </g>
  <g transform="translate(170,280)">
    <circle r="4" fill="#c62828"/><text x="10" y="3" font-size="6" fill="#333">Свобода</text>
  </g>
  <g transform="translate(280,280)">
    <circle r="4" fill="#2e7d32"/><text x="10" y="3" font-size="6" fill="#333">Просвещение</text>
  </g>
  <g transform="translate(400,280)">
    <circle r="4" fill="#f57f17"/><text x="10" y="3" font-size="6" fill="#333">Собственность</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Екатерина II — просвещённый абсолютизм</text>
</svg>