<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="50%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#ff8a65"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky)"/>
  <!-- Smoke/fire sky -->
  <circle cx="100" cy="50" r="40" fill="#ff6f00" opacity="0.2"/>
  <circle cx="400" cy="40" r="50" fill="#ff6f00" opacity="0.15"/>
  <!-- Ground -->
  <rect x="0" y="250" width="500" height="60" fill="url(#ground)"/>
  <!-- Fortress (left) -->
  <rect x="30" y="160" width="80" height="90" fill="#78909c" stroke="#455a64" stroke-width="1.5"/>
  <rect x="25" y="155" width="90" height="10" fill="#546e7a"/>
  <!-- Tower -->
  <rect x="50" y="120" width="30" height="45" fill="#607d8b" stroke="#455a64" stroke-width="1"/>
  <polygon points="45,120 65,100 85,120" fill="#546e7a" stroke="#455a64" stroke-width="1"/>
  <!-- Flag on tower -->
  <line x1="65" y1="100" x2="65" y2="85" stroke="#333" stroke-width="1"/>
  <rect x="65" y="85" width="15" height="8" fill="#1565c0"/>
  <!-- Fortress gate -->
  <path d="M55,250 L55,215 Q65,205 75,215 L75,250" fill="#3e2723"/>
  <!-- Battle scene (center) -->
  <!-- Russian soldiers -->
  <g transform="translate(200,200)">
    <rect x="0" y="10" width="8" height="25" rx="1" fill="#2e7d32"/>
    <circle cx="4" cy="5" r="5" fill="#ffcc80"/>
    <line x1="4" y1="15" x2="4" y2="35" stroke="#1b5e20" stroke-width="2"/>
    <!-- Bayonet -->
    <line x1="8" y1="5" x2="20" y2="-5" stroke="#bdbdbd" stroke-width="1.5"/>
  </g>
  <g transform="translate(225,195)">
    <rect x="0" y="10" width="8" height="25" rx="1" fill="#2e7d32"/>
    <circle cx="4" cy="5" r="5" fill="#ffcc80"/>
    <line x1="8" y1="5" x2="20" y2="-5" stroke="#bdbdbd" stroke-width="1.5"/>
  </g>
  <g transform="translate(250,198)">
    <rect x="0" y="10" width="8" height="25" rx="1" fill="#2e7d32"/>
    <circle cx="4" cy="5" r="5" fill="#ffcc80"/>
    <line x1="8" y1="5" x2="20" y2="-5" stroke="#bdbdbd" stroke-width="1.5"/>
  </g>
  <!-- Swedish soldiers (blue) -->
  <g transform="translate(310,200)">
    <rect x="0" y="10" width="8" height="25" rx="1" fill="#1565c0"/>
    <circle cx="4" cy="5" r="5" fill="#ffcc80"/>
    <line x1="0" y1="5" x2="-12" y2="-5" stroke="#bdbdbd" stroke-width="1.5"/>
  </g>
  <g transform="translate(335,195)">
    <rect x="0" y="10" width="8" height="25" rx="1" fill="#1565c0"/>
    <circle cx="4" cy="5" r="5" fill="#ffcc80"/>
    <line x1="0" y1="5" x2="-12" y2="-5" stroke="#bdbdbd" stroke-width="1.5"/>
  </g>
  <g transform="translate(355,200)">
    <rect x="0" y="10" width="8" height="25" rx="1" fill="#1565c0"/>
    <circle cx="4" cy="5" r="5" fill="#ffcc80"/>
    <line x1="0" y1="5" x2="-12" y2="-5" stroke="#bdbdbd" stroke-width="1.5"/>
  </g>
  <!-- Cannon -->
  <rect x="170" y="230" width="25" height="10" rx="2" fill="#424242"/>
  <circle cx="175" cy="242" r="5" fill="#333"/>
  <circle cx="190" cy="242" r="5" fill="#333"/>
  <!-- Cannonball trail -->
  <circle cx="300" cy="170" r="4" fill="#424242"/>
  <circle cx="280" cy="180" r="3" fill="#616161"/>
  <!-- Baltic Sea (right) -->
  <path d="M400,250 Q420,240 440,250 Q460,260 480,250 L500,250 L500,310 L400,310 Z" fill="#1565c0" opacity="0.6"/>
  <text x="450" y="280" font-size="8" fill="#fff" text-anchor="middle">Балтика</text>
  <!-- Ship on Baltic -->
  <path d="M420,255 L425,248 L465,248 L470,255 Q455,260 445,261 Q435,260 420,255" fill="#5d4037"/>
  <line x1="445" y1="248" x2="445" y2="220" stroke="#4e342e" stroke-width="1.5"/>
  <path d="M447,222 Q460,232 447,242" fill="#fff" opacity="0.8"/>
  <!-- Year banner -->
  <rect x="140" y="55" width="220" height="35" rx="5" fill="#1a237e" opacity="0.85"/>
  <text x="250" y="72" font-size="11" fill="#ffd600" text-anchor="middle" font-weight="bold">Северная война 1700–1721</text>
  <text x="250" y="84" font-size="7" fill="#fff" text-anchor="middle">Полтавская битва — 1709</text>
  <!-- Battle title -->
  <text x="275" y="160" font-size="8" fill="#ffd600" text-anchor="middle">⚔ ПОЛТАВА ⚔</text>
  <text x="250" y="340" font-size="9" fill="#fff" opacity="0.5" text-anchor="middle">Северная война</text>
</svg>