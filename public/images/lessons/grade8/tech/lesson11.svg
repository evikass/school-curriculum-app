<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgT11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1810"/>
      <stop offset="100%" stop-color="#3a2018"/>
    </linearGradient>
    <linearGradient id="potGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <linearGradient id="liquidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e17055"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgT11)"/>
  <!-- Pot with food -->
  <g transform="translate(40, 50)">
    <!-- Pot body -->
    <ellipse cx="80" cy="130" rx="80" ry="20" fill="#555"/>
    <rect x="0" y="40" width="160" height="90" rx="0" fill="url(#potGrad)" stroke="#888" stroke-width="1.5"/>
    <ellipse cx="80" cy="40" rx="80" ry="18" fill="#b0b0b0" stroke="#888" stroke-width="1.5"/>
    <!-- Liquid inside -->
    <ellipse cx="80" cy="45" rx="70" ry="13" fill="url(#liquidGrad)" opacity="0.7"/>
    <!-- Steam -->
    <g opacity="0.4" fill="none" stroke="#fff" stroke-width="1.5">
      <path d="M50,25 Q45,10 50,0">
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M80,20 Q75,5 80,-5">
        <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M110,25 Q105,10 110,0">
        <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2.5s" repeatCount="indefinite"/>
      </path>
    </g>
    <!-- Handles -->
    <rect x="-20" y="60" width="25" height="12" rx="4" fill="#888" stroke="#666" stroke-width="1"/>
    <rect x="155" y="60" width="25" height="12" rx="4" fill="#888" stroke="#666" stroke-width="1"/>
    <!-- Lid -->
    <ellipse cx="80" cy="30" rx="75" ry="12" fill="#999" stroke="#777" stroke-width="1" opacity="0.5"/>
    <circle cx="80" cy="22" r="6" fill="#888" stroke="#666" stroke-width="1"/>
  </g>
  <!-- Ingredients -->
  <g transform="translate(240, 30)">
    <rect width="240" height="140" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="120" y="18" fill="#ffd93d" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Ингредиенты</text>
    <!-- Ingredient items -->
    <g transform="translate(10, 30)">
      <rect x="0" y="0" width="100" height="22" rx="4" fill="#e17055" opacity="0.3" stroke="#e17055" stroke-width="0.5"/>
      <text x="50" y="15" fill="#c9d1d9" font-size="9" font-family="sans-serif" text-anchor="middle">Картофель 300г</text>
      <rect x="110" y="0" width="100" height="22" rx="4" fill="#fdcb6e" opacity="0.3" stroke="#fdcb6e" stroke-width="0.5"/>
      <text x="160" y="15" fill="#c9d1d9" font-size="9" font-family="sans-serif" text-anchor="middle">Морковь 150г</text>
      <rect x="0" y="28" width="100" height="22" rx="4" fill="#00b894" opacity="0.3" stroke="#00b894" stroke-width="0.5"/>
      <text x="50" y="43" fill="#c9d1d9" font-size="9" font-family="sans-serif" text-anchor="middle">Лук 100г</text>
      <rect x="110" y="28" width="100" height="22" rx="4" fill="#6c5ce7" opacity="0.3" stroke="#6c5ce7" stroke-width="0.5"/>
      <text x="160" y="43" fill="#c9d1d9" font-size="9" font-family="sans-serif" text-anchor="middle">Мясо 400г</text>
      <rect x="0" y="56" width="100" height="22" rx="4" fill="#79c0ff" opacity="0.3" stroke="#79c0ff" stroke-width="0.5"/>
      <text x="50" y="71" fill="#c9d1d9" font-size="9" font-family="sans-serif" text-anchor="middle">Вода 1.5л</text>
      <rect x="110" y="56" width="100" height="22" rx="4" fill="#ff5f56" opacity="0.3" stroke="#ff5f56" stroke-width="0.5"/>
      <text x="160" y="71" fill="#c9d1d9" font-size="9" font-family="sans-serif" text-anchor="middle">Соль, специи</text>
    </g>
    <text x="120" y="128" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">Калорийность: ~180 ккал/порция</text>
  </g>
  <!-- Recipe steps -->
  <g transform="translate(15, 200)">
    <rect width="470" height="120" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="235" y="18" fill="#e0e0e0" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Рецепт: Суп мясной</text>
    <!-- Steps -->
    <g transform="translate(10, 30)">
      <circle cx="10" cy="8" r="8" fill="#6c5ce7"/>
      <text x="10" y="12" fill="white" font-size="8" text-anchor="middle">1</text>
      <text x="25" y="12" fill="#c9d1d9" font-size="9" font-family="sans-serif">Нарезать мясо кубиками, залить водой, варить 40 мин</text>
      <circle cx="10" cy="32" r="8" fill="#00b894"/>
      <text x="10" y="36" fill="white" font-size="8" text-anchor="middle">2</text>
      <text x="25" y="36" fill="#c9d1d9" font-size="9" font-family="sans-serif">Нарезать овощи: картофель — кубиками, морковь — соломкой</text>
      <circle cx="10" cy="56" r="8" fill="#e17055"/>
      <text x="10" y="60" fill="white" font-size="8" text-anchor="middle">3</text>
      <text x="25" y="60" fill="#c9d1d9" font-size="9" font-family="sans-serif">Добавить овощи в бульон, варить 20 мин</text>
      <circle cx="10" cy="80" r="8" fill="#fdcb6e"/>
      <text x="10" y="84" fill="#333" font-size="8" text-anchor="middle">4</text>
      <text x="25" y="84" fill="#c9d1d9" font-size="9" font-family="sans-serif">Посолить, добавить специи, подавать горячим</text>
    </g>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Приготовление блюд</text>
</svg>