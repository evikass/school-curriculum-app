  <rect x="15" y="85" width="470" height="215" fill="#E8F5E9"/><g transform="translate(200,180) scale(1.0)"><ellipse cx="0" cy="-15" rx="18" ry="5" fill="#F9A825" stroke="#F57F17" stroke-width="1"/><ellipse cx="0" cy="-9" rx="18" ry="5" fill="#FFB300" stroke="#F57F17" stroke-width="1"/><ellipse cx="0" cy="-3" rx="18" ry="5" fill="#FFC107" stroke="#F57F17" stroke-width="1"/><ellipse cx="0" cy="3" rx="18" ry="5" fill="#FFD54F" stroke="#F57F17" stroke-width="1"/><text x="0" y="-10" font-family="Arial" font-size="14" fill="#F57F17" text-anchor="middle" font-weight="bold">$</text></g><rect x="280" y="140" width="150" height="100" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5"/><text x="355" y="170" font-family="Arial" font-size="11" fill="#333" text-anchor="middle">Бюджет семьи</text><text x="355" y="190" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Доходы - Расходы</text><text x="355" y="210" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">= Сбережения</text><g transform="translate(130,200) scale(0.5)"><line x1="-30" y1="25" x2="35" y2="25" stroke="#333" stroke-width="1.5"/><line x1="-30" y1="25" x2="-30" y2="-25" stroke="#333" stroke-width="1.5"/><rect x="-28.0" y="-20.0" width="10.5" height="45.0" fill="#C62828" rx="1"/><rect x="-15.5" y="-8.75" width="10.5" height="33.75" fill="#1565C0" rx="1"/><rect x="-3.0" y="2.5" width="10.5" height="22.5" fill="#2E7D32" rx="1"/><rect x="9.5" y="13.75" width="10.5" height="11.25" fill="#F9A825" rx="1"/></g>
  </g>
