<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgT2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgT2)"/>
  <!-- Drawing paper -->
  <rect x="30" y="20" width="320" height="280" rx="4" fill="url(#paperGrad)" stroke="#adb5bd" stroke-width="1.5"/>
  <!-- Border frame on paper -->
  <rect x="50" y="35" width="280" height="250" fill="none" stroke="#333" stroke-width="1"/>
  <rect x="55" y="40" width="270" height="240" fill="none" stroke="#333" stroke-width="0.5"/>
  <!-- Title block (lower right) -->
  <rect x="245" y="240" width="80" height="40" fill="none" stroke="#333" stroke-width="0.8"/>
  <line x1="245" y1="252" x2="325" y2="252" stroke="#333" stroke-width="0.5"/>
  <line x1="245" y1="264" x2="325" y2="264" stroke="#333" stroke-width="0.5"/>
  <text x="285" y="250" fill="#333" font-size="6" font-family="sans-serif" text-anchor="middle">Деталь</text>
  <text x="285" y="262" fill="#333" font-size="6" font-family="sans-serif" text-anchor="middle">Масштаб 1:2</text>
  <text x="285" y="274" fill="#333" font-size="6" font-family="sans-serif" text-anchor="middle">Материал</text>
  <!-- Technical drawing on paper - bracket -->
  <!-- Front view -->
  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <!-- Main rectangle -->
    <rect x="80" y="60" width="100" height="80"/>
    <!-- Cutout -->
    <rect x="100" y="75" width="60" height="50"/>
    <!-- Dimension lines -->
    <line x1="80" y1="50" x2="180" y2="50" stroke="#0066cc" stroke-width="0.5"/>
    <line x1="80" y1="47" x2="80" y2="53" stroke="#0066cc" stroke-width="0.5"/>
    <line x1="180" y1="47" x2="180" y2="53" stroke="#0066cc" stroke-width="0.5"/>
    <text x="130" y="48" fill="#0066cc" font-size="7" font-family="sans-serif" text-anchor="middle">100</text>
    <!-- Vertical dimension -->
    <line x1="190" y1="60" x2="190" y2="140" stroke="#0066cc" stroke-width="0.5"/>
    <line x1="187" y1="60" x2="193" y2="60" stroke="#0066cc" stroke-width="0.5"/>
    <line x1="187" y1="140" x2="193" y2="140" stroke="#0066cc" stroke-width="0.5"/>
    <text x="195" y="105" fill="#0066cc" font-size="7" font-family="sans-serif" transform="rotate(90,195,105)" text-anchor="middle">80</text>
  </g>
  <!-- Side view (right) -->
  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <rect x="210" y="60" width="30" height="80"/>
    <!-- Hatching for cross-section -->
    <line x1="212" y1="62" x2="238" y2="78" stroke="#1a1a1a" stroke-width="0.3"/>
    <line x1="212" y1="70" x2="238" y2="86" stroke="#1a1a1a" stroke-width="0.3"/>
    <line x1="212" y1="78" x2="238" y2="94" stroke="#1a1a1a" stroke-width="0.3"/>
    <line x1="212" y1="86" x2="238" y2="102" stroke="#1a1a1a" stroke-width="0.3"/>
    <line x1="212" y1="94" x2="238" y2="110" stroke="#1a1a1a" stroke-width="0.3"/>
    <line x1="212" y1="102" x2="238" y2="118" stroke="#1a1a1a" stroke-width="0.3"/>
    <line x1="212" y1="110" x2="238" y2="126" stroke="#1a1a1a" stroke-width="0.3"/>
    <line x1="212" y1="118" x2="238" y2="134" stroke="#1a1a1a" stroke-width="0.3"/>
    <!-- Section marker -->
    <text x="205" y="55" fill="#0066cc" font-size="8" font-family="sans-serif" font-weight="bold">A</text>
    <text x="245" y="55" fill="#0066cc" font-size="8" font-family="sans-serif" font-weight="bold">A</text>
  </g>
  <!-- Top view (below) -->
  <g stroke="#1a1a1a" stroke-width="1.5" fill="none">
    <rect x="80" y="160" width="100" height="50"/>
    <!-- Hidden lines (dashed) -->
    <line x1="100" y1="160" x2="100" y2="210" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="4,2"/>
    <line x1="160" y1="160" x2="160" y2="210" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="4,2"/>
    <!-- Center line -->
    <line x1="130" y1="155" x2="130" y2="215" stroke="#0066cc" stroke-width="0.3" stroke-dasharray="8,2,2,2"/>
  </g>
  <!-- Right side panel -->
  <rect x="370" y="20" width="115" height="280" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="427" y="42" fill="#ffd93d" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Типы линий</text>
  <!-- Line types legend -->
  <line x1="380" y1="60" x2="450" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="458" y="63" fill="#c9d1d9" font-size="7" font-family="sans-serif">Сплошная</text>
  <line x1="380" y1="80" x2="450" y2="80" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="4,2"/>
  <text x="458" y="83" fill="#c9d1d9" font-size="7" font-family="sans-serif">Невидимая</text>
  <line x1="380" y1="100" x2="450" y2="100" stroke="#0066cc" stroke-width="0.5" stroke-dasharray="8,2,2,2"/>
  <text x="458" y="103" fill="#c9d1d9" font-size="7" font-family="sans-serif">Осевая</text>
  <line x1="380" y1="120" x2="450" y2="120" stroke="#0066cc" stroke-width="0.5"/>
  <text x="458" y="123" fill="#c9d1d9" font-size="7" font-family="sans-serif">Размерная</text>
  <!-- Projections -->
  <text x="427" y="150" fill="#ffd93d" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">Виды</text>
  <text x="427" y="168" fill="#79c0ff" font-size="8" font-family="sans-serif" text-anchor="middle">Главный вид</text>
  <text x="427" y="184" fill="#79c0ff" font-size="8" font-family="sans-serif" text-anchor="middle">Вид сверху</text>
  <text x="427" y="200" fill="#79c0ff" font-size="8" font-family="sans-serif" text-anchor="middle">Вид слева</text>
  <text x="427" y="216" fill="#e17055" font-size="8" font-family="sans-serif" text-anchor="middle">Разрез A-A</text>
  <!-- Scales -->
  <text x="427" y="242" fill="#ffd93d" font-size="9" font-family="sans-serif" text-anchor="middle" font-weight="bold">Масштабы</text>
  <text x="427" y="258" fill="#c9d1d9" font-size="7" font-family="monospace" text-anchor="middle">1:1  1:2  1:5</text>
  <text x="427" y="272" fill="#c9d1d9" font-size="7" font-family="monospace" text-anchor="middle">2:1  5:1  10:1</text>
  <!-- Standards -->
  <text x="427" y="292" fill="#6c5ce7" font-size="7" font-family="sans-serif" text-anchor="middle">ГОСТ 2.301-68</text>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Графическая документация</text>
</svg>