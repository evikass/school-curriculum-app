<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgT7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a3e"/>
    </linearGradient>
    <linearGradient id="metalT7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d0d0d0"/>
      <stop offset="50%" stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#808080"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgT7)"/>
  <!-- Hacksaw (ножовка по металлу) -->
  <g transform="translate(20, 25)">
    <rect width="220" height="130" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="110" y="18" fill="#e17055" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Ножовка по металлу</text>
    <!-- Frame (C-shape) -->
    <path d="M25,45 L25,100 L160,100 L160,45" fill="none" stroke="url(#metalT7)" stroke-width="4" stroke-linecap="round"/>
    <!-- Handle -->
    <rect x="10" y="38" width="25" height="60" rx="6" fill="#5c3010" stroke="#3a1e0a" stroke-width="1.5"/>
    <!-- Blade -->
    <line x1="25" y1="50" x2="160" y2="50" stroke="#c0c0c0" stroke-width="1.5"/>
    <!-- Fine teeth on blade -->
    <path d="M30,50 L32,54 L34,50 L36,54 L38,50 L40,54 L42,50 L44,54 L46,50 L48,54 L50,50 L52,54 L54,50 L56,54 L58,50 L60,54 L62,50 L64,54 L66,50 L68,54 L70,50 L72,54 L74,50 L76,54 L78,50 L80,54 L82,50 L84,54 L86,50 L88,54 L90,50 L92,54 L94,50 L96,54 L98,50 L100,54 L102,50 L104,54 L106,50 L108,54 L110,50 L112,54 L114,50 L116,54 L118,50 L120,54 L122,50 L124,54 L126,50 L128,54 L130,50 L132,54 L134,50 L136,54 L138,50 L140,54 L142,50 L144,54 L146,50 L148,54 L150,50 L152,54 L154,50 L156,54 L158,50" fill="none" stroke="#999" stroke-width="0.5"/>
    <!-- Wing nut -->
    <circle cx="160" cy="50" r="5" fill="#888" stroke="#666" stroke-width="1"/>
    <text x="110" y="118" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">Резка металлических профилей</text>
  </g>
  <!-- File (напильник) -->
  <g transform="translate(260, 25)">
    <rect width="220" height="130" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="110" y="18" fill="#00b894" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Напильник</text>
    <!-- Handle -->
    <rect x="15" y="55" width="55" height="22" rx="6" fill="#5c3010" stroke="#3a1e0a" stroke-width="1.5"/>
    <!-- Tang -->
    <rect x="65" y="60" width="15" height="12" fill="#999" stroke="#777" stroke-width="0.5"/>
    <!-- Blade body -->
    <rect x="80" y="55" width="120" height="22" rx="2" fill="url(#metalT7)" stroke="#888" stroke-width="1"/>
    <!-- File teeth pattern (cross-hatch) -->
    <g stroke="#777" stroke-width="0.3" opacity="0.6">
      <line x1="85" y1="55" x2="88" y2="77"/><line x1="90" y1="55" x2="93" y2="77"/>
      <line x1="95" y1="55" x2="98" y2="77"/><line x1="100" y1="55" x2="103" y2="77"/>
      <line x1="105" y1="55" x2="108" y2="77"/><line x1="110" y1="55" x2="113" y2="77"/>
      <line x1="115" y1="55" x2="118" y2="77"/><line x1="120" y1="55" x2="123" y2="77"/>
      <line x1="125" y1="55" x2="128" y2="77"/><line x1="130" y1="55" x2="133" y2="77"/>
      <line x1="135" y1="55" x2="138" y2="77"/><line x1="140" y1="55" x2="143" y2="77"/>
      <line x1="145" y1="55" x2="148" y2="77"/><line x1="150" y1="55" x2="153" y2="77"/>
      <line x1="155" y1="55" x2="158" y2="77"/><line x1="160" y1="55" x2="163" y2="77"/>
      <line x1="165" y1="55" x2="168" y2="77"/><line x1="170" y1="55" x2="173" y2="77"/>
      <line x1="175" y1="55" x2="178" y2="77"/><line x1="180" y1="55" x2="183" y2="77"/>
      <line x1="185" y1="55" x2="188" y2="77"/><line x1="190" y1="55" x2="193" y2="77"/>
    </g>
    <!-- Tip -->
    <polygon points="200,60 200,72 205,66" fill="#999"/>
    <!-- Metal filings -->
    <g fill="#aaa" opacity="0.4">
      <circle cx="100" cy="82" r="0.8"/><circle cx="115" cy="84" r="0.6"/>
      <circle cx="130" cy="80" r="0.7"/><circle cx="145" cy="83" r="0.5"/>
    </g>
    <!-- Type labels -->
    <text x="30" y="100" fill="#8b949e" font-size="7" font-family="sans-serif">Личный</text>
    <text x="70" y="100" fill="#8b949e" font-size="7" font-family="sans-serif">Бархатный</text>
    <text x="120" y="100" fill="#8b949e" font-size="7" font-family="sans-serif">Драчевый</text>
    <text x="110" y="118" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">Обработка поверхностей</text>
  </g>
  <!-- Vise (тиски) -->
  <g transform="translate(20, 170)">
    <rect width="220" height="140" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="110" y="18" fill="#6c5ce7" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Тиски слесарные</text>
    <!-- Base plate -->
    <rect x="30" y="110" width="140" height="15" rx="3" fill="#666" stroke="#555" stroke-width="1"/>
    <!-- Fixed jaw -->
    <rect x="30" y="40" width="25" height="75" rx="2" fill="url(#metalT7)" stroke="#888" stroke-width="1.5"/>
    <!-- Moving jaw -->
    <rect x="120" y="40" width="25" height="75" rx="2" fill="url(#metalT7)" stroke="#888" stroke-width="1.5"/>
    <!-- Screw -->
    <rect x="55" y="65" width="65" height="8" rx="2" fill="#999" stroke="#777" stroke-width="1"/>
    <!-- Screw threads -->
    <line x1="60" y1="65" x2="60" y2="73" stroke="#888" stroke-width="0.5"/>
    <line x1="68" y1="65" x2="68" y2="73" stroke="#888" stroke-width="0.5"/>
    <line x1="76" y1="65" x2="76" y2="73" stroke="#888" stroke-width="0.5"/>
    <line x1="84" y1="65" x2="84" y2="73" stroke="#888" stroke-width="0.5"/>
    <line x1="92" y1="65" x2="92" y2="73" stroke="#888" stroke-width="0.5"/>
    <line x1="100" y1="65" x2="100" y2="73" stroke="#888" stroke-width="0.5"/>
    <line x1="108" y1="65" x2="108" y2="73" stroke="#888" stroke-width="0.5"/>
    <!-- Handle -->
    <line x1="145" y1="69" x2="185" y2="69" stroke="#888" stroke-width="4" stroke-linecap="round"/>
    <!-- Workpiece -->
    <rect x="58" y="55" width="60" height="30" rx="2" fill="#c87030" stroke="#a06020" stroke-width="1"/>
    <text x="110" y="130" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">Закрепление заготовок</text>
  </g>
  <!-- Safety & additional tools -->
  <g transform="translate(260, 170)">
    <rect width="220" height="140" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="110" y="18" fill="#ffd93d" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Техника безопасности</text>
    <!-- Safety items -->
    <circle cx="30" cy="45" r="12" fill="#ff5f56" opacity="0.2" stroke="#ff5f56" stroke-width="1"/>
    <text x="30" y="49" fill="#ff5f56" font-size="14" text-anchor="middle">👓</text>
    <text x="60" y="49" fill="#c9d1d9" font-size="9" font-family="sans-serif">Очки защитные</text>
    <circle cx="30" cy="75" r="12" fill="#ff5f56" opacity="0.2" stroke="#ff5f56" stroke-width="1"/>
    <text x="30" y="79" fill="#ff5f56" font-size="14" text-anchor="middle">🧤</text>
    <text x="60" y="79" fill="#c9d1d9" font-size="9" font-family="sans-serif">Перчатки</text>
    <circle cx="30" cy="105" r="12" fill="#27c93f" opacity="0.2" stroke="#27c93f" stroke-width="1"/>
    <text x="30" y="109" fill="#27c93f" font-size="14" text-anchor="middle">🔧</text>
    <text x="60" y="109" fill="#c9d1d9" font-size="9" font-family="sans-serif">Надёжное крепление</text>
    <!-- Rules -->
    <text x="15" y="130" fill="#ff5f56" font-size="8" font-family="sans-serif">⚠ Стружку смахивать щёткой, не рукой!</text>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Ручная обработка металла</text>
</svg>