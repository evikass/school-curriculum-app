<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgT5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d1810"/>
      <stop offset="100%" stop-color="#4a2c20"/>
    </linearGradient>
    <linearGradient id="woodT5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8834a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgT5)"/>
  <!-- Joint 1: На ус (butt joint) -->
  <g transform="translate(15, 20)">
    <rect width="145" height="100" rx="6" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="72" y="18" fill="#e17055" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Встык</text>
    <!-- Two boards end to end -->
    <rect x="15" y="30" width="50" height="50" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <rect x="65" y="30" width="50" height="50" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1" opacity="0.85"/>
    <!-- Gap line -->
    <line x1="65" y1="30" x2="65" y2="80" stroke="#333" stroke-width="1" stroke-dasharray="2,1"/>
    <!-- Nails -->
    <line x1="55" y1="50" x2="75" y2="50" stroke="#aaa" stroke-width="1.5"/>
    <line x1="55" y1="65" x2="75" y2="65" stroke="#aaa" stroke-width="1.5"/>
    <text x="72" y="95" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">Слабое соединение</text>
  </g>
  <!-- Joint 2: Вполдерева (half-lap) -->
  <g transform="translate(170, 20)">
    <rect width="145" height="100" rx="6" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="72" y="18" fill="#00b894" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Вполдерева</text>
    <!-- Horizontal board -->
    <rect x="15" y="35" width="115" height="22" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <!-- Vertical board overlapping -->
    <rect x="55" y="35" width="22" height="50" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1" opacity="0.85"/>
    <!-- Half-cut indicators -->
    <rect x="55" y="35" width="22" height="22" fill="#c4935a" opacity="0.5"/>
    <text x="72" y="95" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">Перекрытие половин</text>
  </g>
  <!-- Joint 3: Шип-паз (tongue and groove) -->
  <g transform="translate(325, 20)">
    <rect width="160" height="100" rx="6" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="80" y="18" fill="#6c5ce7" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Шип-паз</text>
    <!-- Board with tongue -->
    <rect x="15" y="35" width="60" height="45" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <rect x="75" y="45" width="15" height="25" rx="1" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <!-- Board with groove -->
    <rect x="90" y="35" width="60" height="45" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1" opacity="0.85"/>
    <rect x="85" y="45" width="15" height="25" fill="#1e2a3a"/>
    <text x="80" y="95" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">Точное соединение</text>
  </g>
  <!-- Joint 4: Ласточкин хвост (dovetail) -->
  <g transform="translate(15, 130)">
    <rect width="145" height="100" rx="6" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="72" y="18" fill="#fdcb6e" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Ласточкин хвост</text>
    <!-- Board with dovetail pins -->
    <rect x="15" y="35" width="55" height="45" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <!-- Dovetail shape -->
    <polygon points="70,40 80,50 80,65 70,75" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <!-- Board with socket -->
    <rect x="80" y="35" width="55" height="45" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1" opacity="0.85"/>
    <polygon points="80,40 70,50 70,65 80,75" fill="#1e2a3a"/>
    <text x="72" y="95" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">Очень прочное</text>
  </g>
  <!-- Joint 5: Сквозной шип (through tenon) -->
  <g transform="translate(170, 130)">
    <rect width="145" height="100" rx="6" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="72" y="18" fill="#e17055" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Сквозной шип</text>
    <!-- Vertical board with tenon -->
    <rect x="50" y="30" width="30" height="40" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <rect x="55" y="70" width="20" height="20" rx="1" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <!-- Horizontal board with mortise -->
    <rect x="25" y="70" width="80" height="25" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1" opacity="0.85"/>
    <rect x="55" y="72" width="20" height="18" fill="#1e2a3a"/>
    <!-- Wedge -->
    <polygon points="57,90 67,90 62,95" fill="#8B4513" stroke="#5c3010" stroke-width="0.5"/>
    <text x="72" y="95" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">С клином / нагелем</text>
  </g>
  <!-- Joint 6: Угловое (corner bridle) -->
  <g transform="translate(325, 130)">
    <rect width="160" height="100" rx="6" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="80" y="18" fill="#00b4d8" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Угловое врезное</text>
    <!-- Horizontal board -->
    <rect x="15" y="55" width="60" height="20" rx="2" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <!-- Cut in horizontal board -->
    <rect x="55" y="55" width="20" height="20" fill="#1e2a3a"/>
    <!-- Vertical board with tenon -->
    <rect x="55" y="30" width="20" height="28" rx="1" fill="url(#woodT5)" stroke="#a07830" stroke-width="1"/>
    <text x="80" y="95" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">Для рамочных конструкций</text>
  </g>
  <!-- Strength comparison -->
  <rect x="15" y="245" width="470" height="80" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="250" y="265" fill="#e0e0e0" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Прочность соединений</text>
  <!-- Bar chart -->
  <rect x="30" y="280" width="40" height="15" rx="2" fill="#e17055" opacity="0.5"/>
  <text x="50" y="310" fill="#e17055" font-size="7" font-family="sans-serif" text-anchor="middle">Встык</text>
  <rect x="80" y="275" width="40" height="20" rx="2" fill="#00b894" opacity="0.6"/>
  <text x="100" y="310" fill="#00b894" font-size="7" font-family="sans-serif" text-anchor="middle">Вполдерева</text>
  <rect x="130" y="272" width="40" height="23" rx="2" fill="#6c5ce7" opacity="0.7"/>
  <text x="150" y="310" fill="#6c5ce7" font-size="7" font-family="sans-serif" text-anchor="middle">Шип-паз</text>
  <rect x="180" y="270" width="40" height="25" rx="2" fill="#fdcb6e" opacity="0.8"/>
  <text x="200" y="310" fill="#fdcb6e" font-size="7" font-family="sans-serif" text-anchor="middle">Шип</text>
  <rect x="230" y="270" width="40" height="25" rx="2" fill="#e17055" opacity="0.8"/>
  <text x="250" y="310" fill="#e17055" font-size="7" font-family="sans-serif" text-anchor="middle">Сквозной шип</text>
  <rect x="280" y="268" width="40" height="27" rx="2" fill="#00b4d8" opacity="0.8"/>
  <text x="300" y="310" fill="#00b4d8" font-size="7" font-family="sans-serif" text-anchor="middle">Угловое</text>
  <rect x="330" y="265" width="40" height="30" rx="2" fill="#ffd93d" opacity="0.9"/>
  <text x="350" y="310" fill="#ffd93d" font-size="7" font-family="sans-serif" text-anchor="middle">Ласт. хвост</text>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Виды соединений древесины</text>
</svg>