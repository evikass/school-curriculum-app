<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgT8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgT8)"/>
  <!-- Circuit diagram background (schematic paper) -->
  <rect x="30" y="20" width="320" height="250" rx="4" fill="#f8f9fa" opacity="0.08"/>
  <!-- Circuit schematic -->
  <g stroke="#00b894" stroke-width="2" fill="none">
    <!-- Battery -->
    <line x1="80" y1="50" x2="80" y2="70"/>
    <line x1="70" y1="70" x2="90" y2="70" stroke-width="3"/>
    <line x1="75" y1="78" x2="85" y2="78" stroke-width="1.5"/>
    <line x1="80" y1="78" x2="80" y2="95"/>
    <text x="60" y="76" fill="#ffd93d" font-size="9" font-family="sans-serif">+ 9В −</text>
    <!-- Wire from battery to switch -->
    <line x1="80" y1="50" x2="80" y2="35"/>
    <line x1="80" y1="35" x2="160" y2="35"/>
  </g>
  <!-- Switch -->
  <g stroke="#00b894" stroke-width="2" fill="none">
    <circle cx="160" cy="35" r="3" fill="#00b894"/>
    <line x1="163" y1="35" x2="195" y2="25"/>
    <circle cx="200" cy="35" r="3" fill="#00b894"/>
    <line x1="203" y1="35" x2="260" y2="35"/>
  </g>
  <text x="180" y="20" fill="#79c0ff" font-size="8" font-family="sans-serif" text-anchor="middle">S1</text>
  <!-- Resistor R1 -->
  <g stroke="#ffd93d" stroke-width="2" fill="none">
    <line x1="260" y1="35" x2="270" y2="35"/>
    <path d="M270,35 L275,25 L285,45 L295,25 L305,45 L315,25 L320,35"/>
    <line x1="320" y1="35" x2="340" y2="35"/>
  </g>
  <text x="295" y="55" fill="#ffd93d" font-size="8" font-family="sans-serif" text-anchor="middle">R1 = 220Ω</text>
  <!-- LED -->
  <g stroke="#e17055" stroke-width="2" fill="none">
    <line x1="340" y1="35" x2="370" y2="35"/>
    <polygon points="370,25 370,45 390,35" fill="none" stroke="#e17055" stroke-width="2"/>
    <line x1="390" y1="25" x2="390" y2="45" stroke="#e17055" stroke-width="2"/>
    <!-- Light rays -->
    <line x1="385" y1="18" x2="380" y2="10" stroke="#e17055" stroke-width="1" opacity="0.5"/>
    <line x1="390" y1="15" x2="390" y2="5" stroke="#e17055" stroke-width="1" opacity="0.5"/>
    <line x1="395" y1="18" x2="400" y2="10" stroke="#e17055" stroke-width="1" opacity="0.5"/>
    <line x1="390" y1="45" x2="390" y2="70"/>
  </g>
  <text x="380" y="60" fill="#e17055" font-size="8" font-family="sans-serif" text-anchor="middle">LED</text>
  <!-- Second branch - parallel with lamp -->
  <g stroke="#79c0ff" stroke-width="2" fill="none">
    <line x1="200" y1="35" x2="200" y2="100"/>
    <!-- Lamp symbol -->
    <circle cx="200" cy="115" r="12" stroke="#79c0ff" stroke-width="2"/>
    <line x1="191" y1="106" x2="209" y2="124" stroke="#79c0ff" stroke-width="1"/>
    <line x1="209" y1="106" x2="191" y2="124" stroke="#79c0ff" stroke-width="1"/>
    <line x1="200" y1="127" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="390" y2="150"/>
    <line x1="390" y1="70" x2="390" y2="150"/>
  </g>
  <text x="200" y="140" fill="#79c0ff" font-size="8" font-family="sans-serif" text-anchor="middle">L1</text>
  <!-- Ammeter -->
  <g transform="translate(290, 150)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#6c5ce7" stroke-width="2"/>
    <text x="0" y="4" fill="#6c5ce7" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">A</text>
  </g>
  <!-- Return wire to battery -->
  <g stroke="#00b894" stroke-width="2" fill="none">
    <line x1="200" y1="150" x2="200" y2="200"/>
    <line x1="200" y1="200" x2="80" y2="200"/>
    <line x1="80" y1="200" x2="80" y2="95"/>
  </g>
  <!-- GND symbol -->
  <line x1="130" y1="200" x2="150" y2="200" stroke="#00b894" stroke-width="2"/>
  <line x1="134" y1="205" x2="146" y2="205" stroke="#00b894" stroke-width="1.5"/>
  <line x1="137" y1="210" x2="143" y2="210" stroke="#00b894" stroke-width="1"/>
  <!-- Right panel - Ohm's law and formulas -->
  <rect x="370" y="20" width="115" height="250" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="427" y="40" fill="#ffd93d" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Закон Ома</text>
  <!-- Triangle -->
  <polygon points="427,60 380,120 475,120" fill="none" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="427" y="80" fill="#e17055" font-size="14" font-family="monospace" text-anchor="middle" font-weight="bold">U</text>
  <line x1="400" y1="100" x2="455" y2="100" stroke="#ffd93d" stroke-width="1"/>
  <text x="410" y="115" fill="#00b894" font-size="12" font-family="monospace" text-anchor="middle">I</text>
  <text x="444" y="115" fill="#79c0ff" font-size="12" font-family="monospace" text-anchor="middle">R</text>
  <!-- Formulas -->
  <text x="427" y="140" fill="#e17055" font-size="10" font-family="monospace" text-anchor="middle">U = I × R</text>
  <text x="427" y="158" fill="#00b894" font-size="10" font-family="monospace" text-anchor="middle">I = U / R</text>
  <text x="427" y="176" fill="#79c0ff" font-size="10" font-family="monospace" text-anchor="middle">R = U / I</text>
  <!-- Units -->
  <text x="427" y="200" fill="#ffd93d" font-size="9" font-family="sans-serif" text-anchor="middle">Единицы измерения:</text>
  <text x="427" y="216" fill="#e17055" font-size="9" font-family="monospace" text-anchor="middle">U — Вольт (В)</text>
  <text x="427" y="232" fill="#00b894" font-size="9" font-family="monospace" text-anchor="middle">I — Ампер (А)</text>
  <text x="427" y="248" fill="#79c0ff" font-size="9" font-family="monospace" text-anchor="middle">R — Ом (Ω)</text>
  <text x="427" y="264" fill="#8b949e" font-size="8" font-family="monospace" text-anchor="middle">P = U×I (Ватт)</text>
  <!-- Labels on circuit -->
  <text x="140" y="230" fill="#8b949e" font-size="8" font-family="sans-serif">Простая электрическая цепь</text>
  <text x="140" y="248" fill="#8b949e" font-size="8" font-family="sans-serif">Источник → Ключ → Приёмник</text>
  <!-- Nodal labels -->
  <circle cx="80" cy="50" r="3" fill="#ffd93d"/>
  <text x="70" y="48" fill="#ffd93d" font-size="7">+</text>
  <circle cx="80" cy="95" r="3" fill="#79c0ff"/>
  <text x="70" y="98" fill="#79c0ff" font-size="7">−</text>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Основы электротехники</text>
</svg>