<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgT13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgT13)"/>
  <!-- Engineer -->
  <g transform="translate(20, 30)">
    <rect width="145" height="200" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="72" y="18" fill="#6c5ce7" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Инженер</text>
    <!-- Person -->
    <!-- Head -->
    <circle cx="72" cy="45" r="16" fill="#f0d0a0" stroke="#c8a070" stroke-width="1"/>
    <!-- Hard hat -->
    <path d="M56,38 Q72,22 88,38" fill="#ffd93d" stroke="#daa520" stroke-width="1.5"/>
    <rect x="54" y="35" width="36" height="5" rx="2" fill="#ffd93d" stroke="#daa520" stroke-width="1"/>
    <!-- Glasses -->
    <rect x="62" y="42" width="8" height="6" rx="2" fill="none" stroke="#333" stroke-width="1"/>
    <rect x="74" y="42" width="8" height="6" rx="2" fill="none" stroke="#333" stroke-width="1"/>
    <line x1="70" y1="45" x2="74" y2="45" stroke="#333" stroke-width="0.5"/>
    <!-- Body -->
    <rect x="56" y="62" width="32" height="45" rx="4" fill="#4a6fa5" stroke="#3a5f95" stroke-width="1"/>
    <!-- Arms -->
    <rect x="38" y="65" width="18" height="35" rx="5" fill="#4a6fa5" stroke="#3a5f95" stroke-width="1"/>
    <rect x="88" y="65" width="18" height="35" rx="5" fill="#4a6fa5" stroke="#3a5f95" stroke-width="1"/>
    <!-- Hands -->
    <circle cx="47" cy="102" r="5" fill="#f0d0a0" stroke="#c8a070" stroke-width="0.5"/>
    <circle cx="97" cy="102" r="5" fill="#f0d0a0" stroke="#c8a070" stroke-width="0.5"/>
    <!-- Blueprint in hand -->
    <rect x="80" y="88" width="25" height="30" rx="2" fill="#f0f0f0" stroke="#ccc" stroke-width="0.5"/>
    <line x1="83" y1="95" x2="102" y2="95" stroke="#333" stroke-width="0.5"/>
    <line x1="83" y1="100" x2="98" y2="100" stroke="#333" stroke-width="0.5"/>
    <line x1="83" y1="105" x2="102" y2="105" stroke="#333" stroke-width="0.5"/>
    <line x1="83" y1="110" x2="95" y2="110" stroke="#333" stroke-width="0.5"/>
    <!-- Legs -->
    <rect x="60" y="107" width="12" height="35" rx="3" fill="#333"/>
    <rect x="76" y="107" width="12" height="35" rx="3" fill="#333"/>
    <!-- Shoes -->
    <rect x="57" y="138" width="18" height="8" rx="3" fill="#222"/>
    <rect x="73" y="138" width="18" height="8" rx="3" fill="#222"/>
    <!-- Description -->
    <text x="72" y="160" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">Проектирование</text>
    <text x="72" y="170" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">систем и устройств</text>
    <text x="72" y="185" fill="#6c5ce7" font-size="7" font-family="sans-serif" text-anchor="middle">Зарплата:</text>
    <text x="72" y="195" fill="#6c5ce7" font-size="7" font-family="sans-serif" text-anchor="middle">60-150 тыс. ₽</text>
  </g>
  <!-- Welder -->
  <g transform="translate(180, 30)">
    <rect width="145" height="200" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="72" y="18" fill="#e17055" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Сварщик</text>
    <!-- Head -->
    <circle cx="72" cy="45" r="16" fill="#f0d0a0" stroke="#c8a070" stroke-width="1"/>
    <!-- Welding mask (up) -->
    <path d="M54,32 Q72,20 90,32 L88,50 L56,50 Z" fill="#333" stroke="#555" stroke-width="1.5"/>
    <rect x="60" y="38" width="24" height="10" rx="3" fill="#00b894" opacity="0.4" stroke="#555" stroke-width="0.5"/>
    <!-- Body -->
    <rect x="56" y="62" width="32" height="45" rx="4" fill="#8B4513" stroke="#5c3010" stroke-width="1"/>
    <!-- Arms -->
    <rect x="38" y="65" width="18" height="35" rx="5" fill="#8B4513" stroke="#5c3010" stroke-width="1"/>
    <rect x="88" y="65" width="18" height="35" rx="5" fill="#8B4513" stroke="#5c3010" stroke-width="1"/>
    <!-- Hands with gloves -->
    <rect x="40" y="97" width="14" height="12" rx="3" fill="#5c3010"/>
    <rect x="90" y="97" width="14" height="12" rx="3" fill="#5c3010"/>
    <!-- Welding torch in hand -->
    <rect x="97" y="90" width="20" height="5" rx="1" fill="#888"/>
    <line x1="117" y1="92" x2="125" y2="88" stroke="#ffd93d" stroke-width="2"/>
    <circle cx="125" cy="87" r="4" fill="#ffd93d" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="0.3s" repeatCount="indefinite"/>
    </circle>
    <!-- Legs -->
    <rect x="60" y="107" width="12" height="35" rx="3" fill="#333"/>
    <rect x="76" y="107" width="12" height="35" rx="3" fill="#333"/>
    <rect x="57" y="138" width="18" height="8" rx="3" fill="#222"/>
    <rect x="73" y="138" width="18" height="8" rx="3" fill="#222"/>
    <!-- Description -->
    <text x="72" y="160" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">Соединение</text>
    <text x="72" y="170" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">металлических деталей</text>
    <text x="72" y="185" fill="#e17055" font-size="7" font-family="sans-serif" text-anchor="middle">Зарплата:</text>
    <text x="72" y="195" fill="#e17055" font-size="7" font-family="sans-serif" text-anchor="middle">50-120 тыс. ₽</text>
  </g>
  <!-- Programmer -->
  <g transform="translate(340, 30)">
    <rect width="145" height="200" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="72" y="18" fill="#00b894" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Программист</text>
    <!-- Head -->
    <circle cx="72" cy="45" r="16" fill="#f0d0a0" stroke="#c8a070" stroke-width="1"/>
    <!-- Hair -->
    <path d="M56,38 Q60,25 72,28 Q84,25 88,38" fill="#4a3020" stroke="#3a2010" stroke-width="1"/>
    <!-- Glasses -->
    <rect x="62" y="42" width="8" height="6" rx="2" fill="none" stroke="#333" stroke-width="1"/>
    <rect x="74" y="42" width="8" height="6" rx="2" fill="none" stroke="#333" stroke-width="1"/>
    <line x1="70" y1="45" x2="74" y2="45" stroke="#333" stroke-width="0.5"/>
    <!-- Body -->
    <rect x="56" y="62" width="32" height="45" rx="4" fill="#2d5a8a" stroke="#1a4a7a" stroke-width="1"/>
    <!-- Laptop on desk -->
    <rect x="35" y="100" width="75" height="4" rx="1" fill="#888"/>
    <rect x="45" y="80" width="55" height="22" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
    <rect x="48" y="83" width="49" height="16" rx="1" fill="#0d1117"/>
    <!-- Code on screen -->
    <line x1="50" y1="88" x2="70" y2="88" stroke="#7ee787" stroke-width="0.8"/>
    <line x1="50" y1="92" x2="80" y2="92" stroke="#79c0ff" stroke-width="0.8"/>
    <line x1="50" y1="96" x2="65" y2="96" stroke="#ff7b72" stroke-width="0.8"/>
    <!-- Hands typing -->
    <circle cx="50" cy="98" r="4" fill="#f0d0a0" stroke="#c8a070" stroke-width="0.5"/>
    <circle cx="95" cy="98" r="4" fill="#f0d0a0" stroke="#c8a070" stroke-width="0.5"/>
    <!-- Legs -->
    <rect x="60" y="107" width="12" height="35" rx="3" fill="#333"/>
    <rect x="76" y="107" width="12" height="35" rx="3" fill="#333"/>
    <rect x="57" y="138" width="18" height="8" rx="3" fill="#222"/>
    <rect x="73" y="138" width="18" height="8" rx="3" fill="#222"/>
    <!-- Description -->
    <text x="72" y="160" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">Разработка</text>
    <text x="72" y="170" fill="#8b949e" font-size="7" font-family="sans-serif" text-anchor="middle">программного обеспечения</text>
    <text x="72" y="185" fill="#00b894" font-size="7" font-family="sans-serif" text-anchor="middle">Зарплата:</text>
    <text x="72" y="195" fill="#00b894" font-size="7" font-family="sans-serif" text-anchor="middle">80-250 тыс. ₽</text>
  </g>
  <!-- Additional professions -->
  <rect x="15" y="245" width="470" height="75" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="250" y="265" fill="#e0e0e0" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Другие профессии производства</text>
  <g transform="translate(25, 275)">
    <text x="0" y="0" fill="#fdcb6e" font-size="9" font-family="sans-serif">🔧 Техник-технолог</text>
    <text x="0" y="15" fill="#8b949e" font-size="7" font-family="sans-serif">Контроль процессов</text>
    <text x="140" y="0" fill="#79c0ff" font-size="9" font-family="sans-serif">⚙️ Оператор ЧПУ</text>
    <text x="140" y="15" fill="#8b949e" font-size="7" font-family="sans-serif">Управление станками</text>
    <text x="280" y="0" fill="#ff5f56" font-size="9" font-family="sans-serif">🏗️ Строитель</text>
    <text x="280" y="15" fill="#8b949e" font-size="7" font-family="sans-serif">Возведение объектов</text>
    <text x="390" y="0" fill="#7ee787" font-size="9" font-family="sans-serif">🔌 Электрик</text>
    <text x="390" y="15" fill="#8b949e" font-size="7" font-family="sans-serif">Электромонтаж</text>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Профессии современного производства</text>
</svg>