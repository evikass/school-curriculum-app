<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgT10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2a2a3e"/>
    </linearGradient>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8834a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgT10)"/>
  <!-- Cutting board -->
  <g transform="translate(40, 40)">
    <ellipse cx="100" cy="80" rx="100" ry="80" fill="url(#boardGrad)" stroke="#a07830" stroke-width="2"/>
    <!-- Wood grain -->
    <ellipse cx="100" cy="80" rx="80" ry="60" fill="none" stroke="#c4935a" stroke-width="0.5" opacity="0.4"/>
    <ellipse cx="100" cy="80" rx="60" ry="40" fill="none" stroke="#c4935a" stroke-width="0.5" opacity="0.3"/>
    <ellipse cx="100" cy="80" rx="40" ry="25" fill="none" stroke="#c4935a" stroke-width="0.5" opacity="0.2"/>
    <!-- Cut marks -->
    <line x1="70" y1="70" x2="130" y2="75" stroke="#a07830" stroke-width="0.5" opacity="0.3"/>
    <line x1="80" y1="90" x2="120" y2="85" stroke="#a07830" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Chef's knife -->
  <g transform="translate(250, 30)">
    <!-- Blade -->
    <path d="M0,40 L5,35 L130,20 L135,30 L130,32 L5,45 Z" fill="#d0d0d0" stroke="#aaa" stroke-width="1"/>
    <path d="M5,35 L130,20 L130,25 L5,40 Z" fill="#e8e8e8" opacity="0.4"/>
    <!-- Edge -->
    <line x1="5" y1="44" x2="130" y2="31" stroke="#888" stroke-width="0.5"/>
    <!-- Handle -->
    <rect x="-25" y="32" width="30" height="18" rx="4" fill="#5c3010" stroke="#3a1e0a" stroke-width="1.5"/>
    <!-- Rivets -->
    <circle cx="-15" cy="41" r="2" fill="#ffd93d" stroke="#c8a020" stroke-width="0.5"/>
    <circle cx="-5" cy="41" r="2" fill="#ffd93d" stroke="#c8a020" stroke-width="0.5"/>
    <!-- Bolster -->
    <rect x="0" y="30" width="8" height="22" rx="2" fill="#999" stroke="#777" stroke-width="0.5"/>
  </g>
  <!-- Vegetables on board -->
  <!-- Carrot -->
  <g transform="translate(80, 100)">
    <path d="M0,0 L40,-5 L45,0 L40,5 L0,8 Z" fill="#e17055" stroke="#d63031" stroke-width="1"/>
    <line x1="8" y1="1" x2="8" y2="7" stroke="#d63031" stroke-width="0.5" opacity="0.4"/>
    <line x1="18" y1="0" x2="18" y2="6" stroke="#d63031" stroke-width="0.5" opacity="0.4"/>
    <!-- Carrot top -->
    <path d="M0,4 L-10,-8 M0,4 L-5,-12 M0,4 L-12,-4" fill="none" stroke="#00b894" stroke-width="1.5"/>
  </g>
  <!-- Tomato -->
  <g transform="translate(130, 110)">
    <circle cx="0" cy="0" r="15" fill="#ff5f56" stroke="#d63031" stroke-width="1"/>
    <path d="M-5,-12 Q0,-18 5,-12" fill="none" stroke="#00b894" stroke-width="1.5"/>
    <line x1="-4" y1="5" x2="4" y2="5" stroke="#d63031" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Onion -->
  <g transform="translate(100, 130)">
    <ellipse cx="0" cy="0" rx="12" ry="14" fill="#fdcb6e" stroke="#f0b429" stroke-width="1"/>
    <path d="M-3,-14 Q0,-20 3,-14" fill="none" stroke="#00b894" stroke-width="1.5"/>
  </g>
  <!-- Hygiene rules -->
  <g transform="translate(280, 90)">
    <rect width="200" height="230" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="100" y="22" fill="#ffd93d" font-size="11" font-family="sans-serif" text-anchor="middle" font-weight="bold">Правила гигиены</text>
    <!-- Rule items -->
    <circle cx="20" cy="45" r="8" fill="#00b894" opacity="0.2" stroke="#00b894" stroke-width="1"/>
    <text x="20" y="49" fill="#00b894" font-size="10" text-anchor="middle">1</text>
    <text x="35" y="49" fill="#c9d1d9" font-size="9" font-family="sans-serif">Мыть руки с мылом</text>
    <circle cx="20" cy="75" r="8" fill="#00b894" opacity="0.2" stroke="#00b894" stroke-width="1"/>
    <text x="20" y="79" fill="#00b894" font-size="10" text-anchor="middle">2</text>
    <text x="35" y="79" fill="#c9d1d9" font-size="9" font-family="sans-serif">Чистая рабочая поверхность</text>
    <circle cx="20" cy="105" r="8" fill="#00b894" opacity="0.2" stroke="#00b894" stroke-width="1"/>
    <text x="20" y="109" fill="#00b894" font-size="10" text-anchor="middle">3</text>
    <text x="35" y="109" fill="#c9d1d9" font-size="9" font-family="sans-serif">Отдельные доски для мяса</text>
    <text x="35" y="121" fill="#c9d1d9" font-size="9" font-family="sans-serif">и овощей</text>
    <circle cx="20" cy="140" r="8" fill="#ff5f56" opacity="0.2" stroke="#ff5f56" stroke-width="1"/>
    <text x="20" y="144" fill="#ff5f56" font-size="10" text-anchor="middle">4</text>
    <text x="35" y="144" fill="#c9d1d9" font-size="9" font-family="sans-serif">Хранить продукты отдельно</text>
    <circle cx="20" cy="170" r="8" fill="#ff5f56" opacity="0.2" stroke="#ff5f56" stroke-width="1"/>
    <text x="20" y="174" fill="#ff5f56" font-size="10" text-anchor="middle">5</text>
    <text x="35" y="174" fill="#c9d1d9" font-size="9" font-family="sans-serif">Проветривать помещение</text>
    <circle cx="20" cy="200" r="8" fill="#fdcb6e" opacity="0.2" stroke="#fdcb6e" stroke-width="1"/>
    <text x="20" y="204" fill="#fdcb6e" font-size="10" text-anchor="middle">6</text>
    <text x="35" y="204" fill="#c9d1d9" font-size="9" font-family="sans-serif">Фартук и убранные волосы</text>
    <!-- Knife safety -->
    <text x="100" y="225" fill="#ff5f56" font-size="8" font-family="sans-serif" text-anchor="middle">⚠ Нож всегда от себя!</text>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Основы кулинарии</text>
</svg>