<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#081c15"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Grid background -->
  <g stroke="#2d6a4f" stroke-width="0.3" opacity="0.4">
    <line x1="40" y1="40" x2="40" y2="250"/><line x1="80" y1="40" x2="80" y2="250"/>
    <line x1="120" y1="40" x2="120" y2="250"/><line x1="160" y1="40" x2="160" y2="250"/>
    <line x1="200" y1="40" x2="200" y2="250"/><line x1="240" y1="40" x2="240" y2="250"/>
    <line x1="280" y1="40" x2="280" y2="250"/><line x1="320" y1="40" x2="320" y2="250"/>
    <line x1="40" y1="40" x2="320" y2="40"/><line x1="40" y1="80" x2="320" y2="80"/>
    <line x1="40" y1="120" x2="320" y2="120"/><line x1="40" y1="160" x2="320" y2="160"/>
    <line x1="40" y1="200" x2="320" y2="200"/><line x1="40" y1="240" x2="320" y2="240"/>
  </g>
  <!-- Rectangle 4x3 on grid -->
  <rect x="80" y="80" width="160" height="120" fill="#40916c" fill-opacity="0.15" stroke="#52b788" stroke-width="2"/>
  <!-- Side labels -->
  <text x="150" y="72" fill="#95d5b2" font-size="16" font-family="serif" text-anchor="middle">a = 4</text>
  <text x="60" y="145" fill="#95d5b2" font-size="16" font-family="serif">b = 3</text>
  <!-- Formula -->
  <text x="140" y="145" fill="#b7e4c7" font-size="20" font-family="serif" font-weight="bold">S = a·b</text>
  <!-- Square on right side -->
  <g stroke="#2d6a4f" stroke-width="0.3" opacity="0.4">
    <line x1="350" y1="60" x2="350" y2="240"/><line x1="390" y1="60" x2="390" y2="240"/>
    <line x1="430" y1="60" x2="430" y2="240"/><line x1="470" y1="60" x2="470" y2="240"/>
    <line x1="350" y1="60" x2="470" y2="60"/><line x1="350" y1="100" x2="470" y2="100"/>
    <line x1="350" y1="140" x2="470" y2="140"/><line x1="350" y1="180" x2="470" y2="180"/>
    <line x1="350" y1="220" x2="470" y2="220"/>
  </g>
  <rect x="350" y="60" width="120" height="120" fill="#d4a373" fill-opacity="0.1" stroke="#e76f51" stroke-width="2"/>
  <text x="400" y="52" fill="#e76f51" font-size="14" font-family="serif" text-anchor="middle">a = 3</text>
  <text x="335" y="125" fill="#e76f51" font-size="14" font-family="serif">a=3</text>
  <text x="390" y="130" fill="#e9c46a" font-size="18" font-family="serif" font-weight="bold">S = a²</text>
  <!-- Count cells -->
  <text x="130" y="270" fill="#52b788" font-size="12">4 × 3 = 12 клеток</text>
  <text x="360" y="250" fill="#e76f51" font-size="12">3 × 3 = 9 клеток</text>
  <!-- Units -->
  <text x="30" y="310" fill="#7f8c8d" font-size="11">Единицы: мм², см², дм², м², км²</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Площадь прямоугольника и квадрата</text>
</svg>