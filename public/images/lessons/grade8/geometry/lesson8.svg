<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Large triangle ABC -->
  <polygon points="100,260 350,260 250,100" fill="none" stroke="#38bdf8" stroke-width="2"/>
  <!-- Side labels for large triangle -->
  <text x="200" y="278" fill="#38bdf8" font-size="13" font-family="serif">A₁B₁ = ka</text>
  <text x="310" y="180" fill="#38bdf8" font-size="13" font-family="serif">B₁C₁ = kb</text>
  <text x="115" y="180" fill="#38bdf8" font-size="13" font-family="serif">A₁C₁ = kc</text>
  <!-- Vertices large -->
  <text x="85" y="275" fill="#38bdf8" font-size="12" font-weight="bold">A₁</text>
  <text x="345" y="275" fill="#38bdf8" font-size="12" font-weight="bold">B₁</text>
  <text x="245" y="93" fill="#38bdf8" font-size="12" font-weight="bold">C₁</text>
  <!-- Small similar triangle -->
  <polygon points="380,250 460,250 430,190" fill="none" stroke="#f472b6" stroke-width="2"/>
  <!-- Side labels for small triangle -->
  <text x="405" y="268" fill="#f472b6" font-size="11" font-family="serif">a</text>
  <text x="448" y="220" fill="#f472b6" font-size="11" font-family="serif">b</text>
  <text x="383" y="220" fill="#f472b6" font-size="11" font-family="serif">c</text>
  <!-- Vertices small -->
  <text x="370" y="265" fill="#f472b6" font-size="11" font-weight="bold">A</text>
  <text x="462" y="265" fill="#f472b6" font-size="11" font-weight="bold">B</text>
  <text x="432" y="183" fill="#f472b6" font-size="11" font-weight="bold">C</text>
  <!-- Equal angle marks -->
  <path d="M105,258 Q110,250 115,258" stroke="#a78bfa" stroke-width="1" fill="none"/>
  <path d="M385,248 Q388,243 391,248" stroke="#a78bfa" stroke-width="1" fill="none"/>
  <path d="M345,258 Q340,250 335,258" stroke="#fb923c" stroke-width="1" fill="none"/>
  <path d="M455,248 Q452,243 449,248" stroke="#fb923c" stroke-width="1" fill="none"/>
  <!-- Proportionality -->
  <text x="30" y="35" fill="#a78bfa" font-size="14" font-weight="bold">Подобные треугольники</text>
  <text x="30" y="55" fill="#94a3b8" font-size="12">△ABC ~ △A₁B₁C₁</text>
  <text x="30" y="80" fill="#f472b6" font-size="13" font-family="serif">a/ka = b/kb = c/kc = 1/k</text>
  <!-- Properties -->
  <rect x="20" y="95" width="240" height="25" rx="4" fill="#1e293b" stroke="#38bdf8" stroke-width="1"/>
  <text x="30" y="112" fill="#38bdf8" font-size="11">∠A = ∠A₁, ∠B = ∠B₁, ∠C = ∠C₁</text>
  <rect x="20" y="125" width="240" height="25" rx="4" fill="#1e293b" stroke="#f472b6" stroke-width="1"/>
  <text x="30" y="142" fill="#f472b6" font-size="11">Стороны пропорциональны: k</text>
  <!-- k factor arrow -->
  <path d="M370,170 C350,160 340,155 330,150" stroke="#a78bfa" stroke-width="1.5" fill="none" stroke-dasharray="4,2"/>
  <text x="320" y="145" fill="#a78bfa" font-size="14" font-weight="bold">k</text>
  <!-- S ratio -->
  <text x="30" y="175" fill="#94a3b8" font-size="12">S₁/S₂ = k²</text>
  <text x="30" y="195" fill="#94a3b8" font-size="12">P₁/P₂ = k</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Подобные треугольники</text>
</svg>