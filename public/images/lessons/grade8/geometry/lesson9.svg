<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#353b48"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Triangle ABC -->
  <polygon points="100,250 400,250 250,80" fill="none" stroke="#00cec9" stroke-width="2"/>
  <!-- Vertices -->
  <text x="80" y="268" fill="#00cec9" font-size="13" font-weight="bold">A</text>
  <text x="400" y="268" fill="#00cec9" font-size="13" font-weight="bold">B</text>
  <text x="244" y="73" fill="#00cec9" font-size="13" font-weight="bold">C</text>
  <!-- Midpoints M and N -->
  <circle cx="175" cy="165" r="4" fill="#fdcb6e"/>
  <text x="158" y="158" fill="#fdcb6e" font-size="12" font-weight="bold">M</text>
  <circle cx="325" cy="165" r="4" fill="#fdcb6e"/>
  <text x="330" y="158" fill="#fdcb6e" font-size="12" font-weight="bold">N</text>
  <!-- Midline MN -->
  <line x1="175" y1="165" x2="325" y2="165" stroke="#fdcb6e" stroke-width="2.5"/>
  <!-- Dashed connections to show midpoints -->
  <line x1="175" y1="165" x2="100" y2="250" stroke="#636e72" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="175" y1="165" x2="250" y2="80" stroke="#636e72" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="325" y1="165" x2="250" y2="80" stroke="#636e72" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="325" y1="165" x2="400" y2="250" stroke="#636e72" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Base AB label -->
  <text x="235" y="270" fill="#00cec9" font-size="13" font-family="serif">AB</text>
  <!-- Midline label -->
  <text x="225" y="160" fill="#fdcb6e" font-size="12" font-family="serif">MN</text>
  <!-- Parallel marks -->
  <line x1="225" y1="245" x2="230" y2="255" stroke="#e17055" stroke-width="1.5"/>
  <line x1="245" y1="245" x2="250" y2="255" stroke="#e17055" stroke-width="1.5"/>
  <line x1="235" y1="160" x2="240" y2="170" stroke="#e17055" stroke-width="1.5"/>
  <line x1="255" y1="160" x2="260" y2="170" stroke="#e17055" stroke-width="1.5"/>
  <!-- Theorem -->
  <text x="30" y="35" fill="#fdcb6e" font-size="14" font-weight="bold">Теорема о средней линии</text>
  <text x="30" y="58" fill="#dfe6e9" font-size="13">MN || AB</text>
  <text x="30" y="78" fill="#dfe6e9" font-size="13">MN = ½ · AB</text>
  <!-- Third midpoint -->
  <circle cx="250" cy="250" r="3" fill="#e17055"/>
  <text x="253" y="278" fill="#e17055" font-size="10">P (середина AB)</text>
  <!-- All three midlines -->
  <line x1="175" y1="165" x2="250" y2="250" stroke="#e17055" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="325" y1="165" x2="250" y2="250" stroke="#e17055" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Properties box -->
  <rect x="300" y="30" width="180" height="80" rx="6" fill="none" stroke="#636e72" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="310" y="50" fill="#b2bec3" font-size="11">Средняя линия треугольника:</text>
  <text x="310" y="68" fill="#fdcb6e" font-size="11">• параллельна основанию</text>
  <text x="310" y="84" fill="#fdcb6e" font-size="11">• равна половине основания</text>
  <text x="310" y="100" fill="#fdcb6e" font-size="11">• делит треугольник на 2 подобных</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Средняя линия треугольника</text>
</svg>