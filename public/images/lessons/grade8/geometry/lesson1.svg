<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b263b"/>
      <stop offset="100%" stop-color="#243b55"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Triangle -->
  <polygon points="60,140 110,60 160,140" fill="none" stroke="#e76f51" stroke-width="2"/>
  <line x1="110" y1="60" x2="110" y2="140" stroke="#e76f51" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="100" y="155" fill="#e76f51" font-size="10">3</text>
  <!-- Quadrilateral -->
  <polygon points="200,70 280,60 270,130 210,140" fill="none" stroke="#f4a261" stroke-width="2"/>
  <line x1="200" y1="70" x2="270" y2="130" stroke="#f4a261" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="210" y1="140" x2="280" y2="60" stroke="#f4a261" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="230" y="155" fill="#f4a261" font-size="10">4</text>
  <!-- Pentagon -->
  <polygon points="370,65 410,80 400,130 345,130 335,80" fill="none" stroke="#2a9d8f" stroke-width="2"/>
  <line x1="370" y1="65" x2="400" y2="130" stroke="#2a9d8f" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="370" y1="65" x2="345" y2="130" stroke="#2a9d8f" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="355" y="155" fill="#2a9d8f" font-size="10">5</text>
  <!-- Hexagon -->
  <polygon points="80,210 110,195 140,210 140,240 110,255 80,240" fill="none" stroke="#e9c46a" stroke-width="2"/>
  <line x1="80" y1="210" x2="140" y2="240" stroke="#e9c46a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="110" y1="195" x2="110" y2="255" stroke="#e9c46a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="140" y1="210" x2="80" y2="240" stroke="#e9c46a" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="100" y="270" fill="#e9c46a" font-size="10">6</text>
  <!-- Formula -->
  <text x="200" y="210" fill="#a8dadc" font-size="14" font-weight="bold">Формула диагоналей:</text>
  <text x="200" y="235" fill="#e76f51" font-size="16" font-family="serif">D = n(n−3) / 2</text>
  <!-- Table -->
  <text x="200" y="265" fill="#7f8c8d" font-size="11">n=3: 0  n=4: 2  n=5: 5</text>
  <text x="200" y="282" fill="#7f8c8d" font-size="11">n=6: 9  n=7: 14  n=8: 20</text>
  <!-- Sum of angles -->
  <text x="330" y="210" fill="#a8dadc" font-size="13" font-weight="bold">Сумма углов:</text>
  <text x="330" y="235" fill="#2a9d8f" font-size="16" font-family="serif">S = 180°(n−2)</text>
  <text x="330" y="260" fill="#7f8c8d" font-size="11">n=3: 180°</text>
  <text x="330" y="275" fill="#7f8c8d" font-size="11">n=4: 360°</text>
  <text x="330" y="290" fill="#7f8c8d" font-size="11">n=5: 540°</text>
  <!-- Angle arc in triangle -->
  <path d="M70,140 Q75,130 80,135" stroke="#e76f51" stroke-width="1" fill="none"/>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Многоугольники</text>
</svg>