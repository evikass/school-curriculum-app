<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
    <linearGradient id="pentFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80CBC4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4DB6AC" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="8" fill="url(#bg1)"/>
  <!-- Border -->
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <!-- Title -->
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">📐 Многоугольники</text>
  <!-- Subtitle -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Геометрия 8 класс — Урок 1</text>
  <!-- Separator -->
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>

  <!-- Left Panel: Small polygons showcase -->
  <rect x="14" y="54" width="155" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="91" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Виды многоугольников</text>

  <!-- Triangle -->
  <polygon points="38,105 28,132 48,132" fill="#80CBC4" fill-opacity="0.5" stroke="#00695C" stroke-width="1.5"/>
  <text x="38" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">△ n=3</text>

  <!-- Quadrilateral -->
  <polygon points="80,105 72,132 96,132 100,105" fill="#4DB6AC" fill-opacity="0.4" stroke="#00695C" stroke-width="1.5"/>
  <text x="87" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">□ n=4</text>

  <!-- Pentagon -->
  <polygon points="133,102 123,113 127,130 140,130 143,113" fill="#26A69A" fill-opacity="0.35" stroke="#00695C" stroke-width="1.5"/>
  <text x="133" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">⬠ n=5</text>

  <!-- Hexagon -->
  <polygon points="50,172 40,180 40,194 50,202 60,194 60,180" fill="#00897B" fill-opacity="0.3" stroke="#00695C" stroke-width="1.5"/>
  <text x="50" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">⬡ n=6</text>

  <!-- Convex vs Concave labels -->
  <text x="120" y="170" font-family="Arial,sans-serif" font-size="7.5" fill="#00897B">✓ Выпуклый</text>
  <text x="120" y="182" font-family="Arial,sans-serif" font-size="7.5" fill="#E65100">✗ Вогнутый</text>

  <!-- Small concave shape -->
  <polygon points="120,190 112,206 128,202 136,210 136,192" fill="none" stroke="#E65100" stroke-width="1.2" stroke-dasharray="2,1"/>
  <text x="120" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100">невыпуклый</text>

  <!-- Center Panel: Large pentagon with diagonals -->
  <rect x="175" y="54" width="185" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="267" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Диагонали пятиугольника</text>

  <!-- Pentagon ABCDE -->
  <polygon points="267,82 315,108 297,160 237,160 219,108" fill="url(#pentFill)" stroke="#00695C" stroke-width="1.8"/>

  <!-- Diagonals from vertex A -->
  <line x1="267" y1="82" x2="297" y2="160" stroke="#E91E63" stroke-width="1" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="267" y1="82" x2="237" y2="160" stroke="#E91E63" stroke-width="1" stroke-dasharray="4,2" opacity="0.7"/>
  <!-- Diagonal AC -->
  <line x1="267" y1="82" x2="297" y2="160" stroke="#FF5722" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- Diagonal AD -->
  <line x1="267" y1="82" x2="237" y2="160" stroke="#FF5722" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <!-- Other diagonals -->
  <line x1="315" y1="108" x2="237" y2="160" stroke="#9C27B0" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="219" y1="108" x2="297" y2="160" stroke="#9C27B0" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Triangle shading inside -->
  <polygon points="267,82 315,108 297,160" fill="#FF9800" fill-opacity="0.08"/>
  <polygon points="267,82 297,160 237,160" fill="#4CAF50" fill-opacity="0.08"/>
  <polygon points="267,82 237,160 219,108" fill="#2196F3" fill-opacity="0.08"/>

  <!-- Vertex labels -->
  <text x="267" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">A</text>
  <text x="321" y="112" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">B</text>
  <text x="303" y="170" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">C</text>
  <text x="228" y="170" text-anchor="end" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">D</text>
  <text x="213" y="112" text-anchor="end" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">E</text>

  <!-- Triangle count annotation -->
  <text x="267" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#FF5722">↗ Из вершины A: 3 диагонали</text>
  <text x="267" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#4CAF50">→ Делится на 3 треугольника</text>

  <!-- Right Panel: Formula box + Table -->
  <rect x="366" y="54" width="122" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="427" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Формулы</text>

  <!-- Formula: Sum of angles -->
  <rect x="374" y="76" width="106" height="32" rx="5" fill="#E0F2F1" stroke="#00897B" stroke-width="0.8"/>
  <text x="427" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#607D8B">Сумма углов:</text>
  <text x="427" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">S=(n−2)·180°</text>

  <!-- Formula: Diagonals -->
  <rect x="374" y="114" width="106" height="32" rx="5" fill="#E0F2F1" stroke="#00897B" stroke-width="0.8"/>
  <text x="427" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#607D8B">Число диагоналей:</text>
  <text x="427" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">D=n(n−3)/2</text>

  <!-- Table -->
  <text x="427" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00695C">n | S(углов) | D</text>
  <line x1="380" y1="161" x2="474" y2="161" stroke="#00897B" stroke-width="0.5" opacity="0.4"/>
  <text x="395" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">3</text>
  <text x="427" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">180°</text>
  <text x="462" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">0</text>
  <text x="395" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">4</text>
  <text x="427" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">360°</text>
  <text x="462" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">2</text>
  <text x="395" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">5</text>
  <text x="427" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">540°</text>
  <text x="462" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">5</text>
  <text x="395" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">6</text>
  <text x="427" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">720°</text>
  <text x="462" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">9</text>

  <!-- Bottom area: Triangle division visual -->
  <rect x="14" y="225" width="220" height="65" rx="8" fill="white" fill-opacity="0.88" stroke="#00897B" stroke-width="1.2"/>
  <text x="124" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">📐 Разбиение на треугольники</text>

  <!-- Hexagon with triangle divisions -->
  <polygon points="60,270 45,280 45,296 60,306 75,296 75,280" fill="none" stroke="#00695C" stroke-width="1.3"/>
  <line x1="60" y1="270" x2="45" y2="296" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="3,1.5"/>
  <line x1="60" y1="270" x2="75" y2="296" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="3,1.5"/>
  <line x1="60" y1="270" x2="45" y2="280" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="3,1.5"/>
  <line x1="60" y1="270" x2="75" y2="280" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="3,1.5"/>
  <text x="60" y="317" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">n=6 → 4 △</text>

  <!-- Octagon small -->
  <polygon points="155,268 145,274 141,285 145,296 155,302 165,296 169,285 165,274" fill="none" stroke="#00695C" stroke-width="1.3"/>
  <line x1="155" y1="268" x2="141" y2="285" stroke="#FF5722" stroke-width="0.7" stroke-dasharray="2,1.5"/>
  <line x1="155" y1="268" x2="145" y2="296" stroke="#FF5722" stroke-width="0.7" stroke-dasharray="2,1.5"/>
  <line x1="155" y1="268" x2="155" y2="302" stroke="#FF5722" stroke-width="0.7" stroke-dasharray="2,1.5"/>
  <line x1="155" y1="268" x2="165" y2="296" stroke="#FF5722" stroke-width="0.7" stroke-dasharray="2,1.5"/>
  <line x1="155" y1="268" x2="169" y2="285" stroke="#FF5722" stroke-width="0.7" stroke-dasharray="2,1.5"/>
  <line x1="155" y1="268" x2="165" y2="274" stroke="#FF5722" stroke-width="0.7" stroke-dasharray="2,1.5"/>
  <text x="155" y="317" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00695C">n=8 → 6 △</text>

  <!-- Arrow and formula -->
  <text x="210" y="284" font-family="Arial,sans-serif" font-size="8" fill="#00695C">Число △ =</text>
  <text x="210" y="297" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#00695C">n − 2</text>

  <!-- Right bottom panel: Key concepts -->
  <rect x="240" y="225" width="248" height="65" rx="8" fill="white" fill-opacity="0.88" stroke="#00897B" stroke-width="1.2"/>
  <text x="364" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">📝 Ключевые определения</text>
  <circle cx="256" cy="254" r="3" fill="#00897B"/>
  <text x="264" y="257" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">Многоугольник — фигура из n звеньев ломаной</text>
  <circle cx="256" cy="267" r="3" fill="#00897B"/>
  <text x="264" y="270" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">Диагональ — отрезок, соединяющий несоседние вершины</text>
  <circle cx="256" cy="280" r="3" fill="#00897B"/>
  <text x="264" y="283" font-family="Arial,sans-serif" font-size="7.5" fill="#37474F">Выпуклый — лежит по одну сторону от каждой прямой</text>

  <!-- Bottom bar -->
  <rect x="14" y="300" width="474" height="38" rx="6" fill="url(#accent1)" opacity="0.85"/>
  <text x="250" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">📐 Сумма углов выпуклого n-угольника: S = (n − 2) · 180°</text>
  <text x="250" y="332" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E0F2F1">Число диагоналей: D = n(n−3)/2 | Число треугольников из одной вершины: n−2</text>
</svg>