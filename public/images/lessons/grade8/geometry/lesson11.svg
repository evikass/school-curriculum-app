<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E1F5FE"/><stop offset="100%" stop-color="#B3E5FC"/></linearGradient>
<linearGradient id="triGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#039BE5" stop-opacity="0.15"/><stop offset="100%" stop-color="#0277BD" stop-opacity="0.25"/></linearGradient>
<linearGradient id="smallTriGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF9800" stop-opacity="0.2"/><stop offset="100%" stop-color="#FF9800" stop-opacity="0.35"/></linearGradient>
<linearGradient id="trapGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4CAF50" stop-opacity="0.15"/><stop offset="100%" stop-color="#4CAF50" stop-opacity="0.25"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0277BD" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#01579B" text-anchor="middle">Средняя линия треугольника</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 11</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#0277BD" stroke-width="1" opacity="0.3"/>

<!-- Main triangle with midline - left side -->
<g transform="translate(10,55)">
  <!-- Triangle ABC filled -->
  <polygon points="100,20 20,160 180,160" fill="url(#triGrad)" stroke="#0277BD" stroke-width="2"/>
  <!-- Midline MN -->
  <line x1="60" y1="90" x2="140" y2="90" stroke="#E65100" stroke-width="2.5" stroke-dasharray="6,3"/>
  <!-- Side AB -->
  <line x1="100" y1="20" x2="20" y2="160" stroke="#0277BD" stroke-width="1.8"/>
  <!-- Side AC -->
  <line x1="100" y1="20" x2="180" y2="160" stroke="#0277BD" stroke-width="1.8"/>
  <!-- Side BC -->
  <line x1="20" y1="160" x2="180" y2="160" stroke="#0277BD" stroke-width="1.8"/>

  <!-- Midpoint M on AB -->
  <circle cx="60" cy="90" r="4" fill="#E65100" stroke="white" stroke-width="1"/>
  <text x="48" y="82" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">M</text>
  <!-- Midpoint N on AC -->
  <circle cx="140" cy="90" r="4" fill="#E65100" stroke="white" stroke-width="1"/>
  <text x="146" y="82" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">N</text>

  <!-- Vertex labels -->
  <text x="100" y="14" font-family="Arial,sans-serif" font-size="11" fill="#01579B" text-anchor="middle" font-weight="bold">B</text>
  <text x="10" y="170" font-family="Arial,sans-serif" font-size="11" fill="#01579B" font-weight="bold">A</text>
  <text x="186" y="170" font-family="Arial,sans-serif" font-size="11" fill="#01579B" font-weight="bold">C</text>

  <!-- Parallel symbol -->
  <text x="100" y="85" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">MN ∥ AC</text>

  <!-- Small arrows showing parallel -->
  <path d="M75,93 L80,88" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <path d="M85,93 L90,88" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <path d="M65,155 L70,150" fill="none" stroke="#0277BD" stroke-width="0.8"/>
  <path d="M75,155 L80,150" fill="none" stroke="#0277BD" stroke-width="0.8"/>
</g>

<!-- Visual proof: small triangle on top, trapezoid below - right side -->
<g transform="translate(250,60)">
  <text x="110" y="0" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle" font-weight="bold">Визуальное доказательство</text>

  <!-- Full triangle outline (dashed) -->
  <polygon points="110,15 20,165 200,165" fill="none" stroke="#0277BD" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Small similar triangle (top) BMN -->
  <polygon points="110,15 65,90 155,90" fill="url(#smallTriGrad)" stroke="#FF9800" stroke-width="1.8"/>
  <text x="110" y="60" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">△BMN</text>
  <text x="110" y="70" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">k = ½</text>

  <!-- Trapezoid (bottom) AMNC -->
  <polygon points="65,90 20,165 200,165 155,90" fill="url(#trapGrad)" stroke="#4CAF50" stroke-width="1.8"/>
  <text x="110" y="140" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Трапеция AMNC</text>

  <!-- Midline -->
  <line x1="65" y1="90" x2="155" y2="90" stroke="#E65100" stroke-width="2.5"/>

  <!-- Vertices -->
  <text x="110" y="10" font-family="Arial,sans-serif" font-size="9" fill="#01579B" text-anchor="middle" font-weight="bold">B</text>
  <text x="10" y="175" font-family="Arial,sans-serif" font-size="9" fill="#01579B" font-weight="bold">A</text>
  <text x="206" y="175" font-family="Arial,sans-serif" font-size="9" fill="#01579B" font-weight="bold">C</text>
  <circle cx="65" cy="90" r="3" fill="#E65100"/>
  <circle cx="155" cy="90" r="3" fill="#E65100"/>
  <text x="54" y="86" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">M</text>
  <text x="160" y="86" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">N</text>

  <!-- Similarity symbol -->
  <g transform="translate(155,35)">
    <text x="0" y="0" font-family="Arial,sans-serif" font-size="10" fill="#01579B" font-weight="bold">△BMN ~ △BAC</text>
  </g>
</g>

<!-- Properties panel - bottom left -->
<g transform="translate(20,260)">
  <rect x="0" y="0" width="210" height="58" rx="6" fill="white" opacity="0.88" stroke="#0277BD" stroke-width="1"/>
  <text x="105" y="14" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle" font-weight="bold">📋 Свойства средней линии</text>
  <line x1="10" y1="18" x2="200" y2="18" stroke="#0277BD" stroke-width="0.5" opacity="0.4"/>
  <circle cx="15" cy="28" r="2.5" fill="#E65100"/>
  <text x="22" y="31" font-family="Arial,sans-serif" font-size="7" fill="#333">MN ∥ AC (параллельна основанию)</text>
  <circle cx="15" cy="40" r="2.5" fill="#0277BD"/>
  <text x="22" y="43" font-family="Arial,sans-serif" font-size="7" fill="#333">MN = ½ AC (равна половине основания)</text>
  <circle cx="15" cy="52" r="2.5" fill="#4CAF50"/>
  <text x="22" y="55" font-family="Arial,sans-serif" font-size="7" fill="#333">S(△BMN) = ¼ S(△BAC)</text>
</g>

<!-- Formula box - bottom middle -->
<g transform="translate(245,260)">
  <rect x="0" y="0" width="120" height="58" rx="6" fill="white" opacity="0.92" stroke="#0277BD" stroke-width="1.2"/>
  <text x="60" y="14" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle" font-weight="bold">📐 Формула</text>
  <line x1="10" y1="18" x2="110" y2="18" stroke="#0277BD" stroke-width="0.5" opacity="0.4"/>
  <text x="60" y="35" font-family="Arial,sans-serif" font-size="12" fill="#0277BD" text-anchor="middle" font-weight="bold">MN = ½AC</text>
  <text x="60" y="50" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">M — середина AB</text>
  <text x="60" y="57" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">N — середина BC</text>
</g>

<!-- Key fact icon panel - bottom right -->
<g transform="translate(378,260)">
  <rect x="0" y="0" width="105" height="58" rx="6" fill="white" opacity="0.88" stroke="#FF9800" stroke-width="1"/>
  <text x="52" y="14" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">💡 Коэфф.</text>
  <line x1="10" y1="18" x2="95" y2="18" stroke="#FF9800" stroke-width="0.5" opacity="0.4"/>
  <text x="52" y="34" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">Подобие: k = ½</text>
  <text x="52" y="46" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Периметр: P₁=½P</text>
  <text x="52" y="55" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Площадь: S₁=¼S</text>
</g>

<!-- Bottom bar -->
<rect x="10" y="330" width="480" height="16" rx="4" fill="#0277BD" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Теорема: Средняя линия треугольника параллельна основанию и равна его половине</text>
</svg>