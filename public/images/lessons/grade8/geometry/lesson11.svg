<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0032"/>
      <stop offset="100%" stop-color="#190061"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Circle -->
  <circle cx="170" cy="170" r="110" fill="none" stroke="#7b2cbf" stroke-width="2"/>
  <!-- Center O -->
  <circle cx="170" cy="170" r="3" fill="#7b2cbf"/>
  <text x="173" y="165" fill="#7b2cbf" font-size="11" font-weight="bold">O</text>
  <!-- Central angle -->
  <line x1="170" y1="170" x2="170" y2="60" stroke="#e0aaff" stroke-width="2"/>
  <line x1="170" y1="170" x2="275" y2="130" stroke="#e0aaff" stroke-width="2"/>
  <!-- Arc for central angle -->
  <path d="M185,75 Q200,80 210,90" stroke="#e0aaff" stroke-width="1.5" fill="none"/>
  <text x="210" y="85" fill="#e0aaff" font-size="12" font-weight="bold">α</text>
  <!-- Inscribed angle (subtending same arc) -->
  <line x1="90" y1="230" x2="250" y2="230" stroke="#c77dff" stroke-width="1.5"/>
  <line x1="90" y1="230" x2="170" y2="60" stroke="#c77dff" stroke-width="1.5"/>
  <line x1="250" y1="230" x2="275" y2="130" stroke="#c77dff" stroke-width="1.5"/>
  <!-- Arc for inscribed angle -->
  <path d="M105,220 Q115,215 125,215" stroke="#c77dff" stroke-width="1.5" fill="none"/>
  <text x="110" y="212" fill="#c77dff" font-size="12" font-weight="bold">β</text>
  <!-- Points on circle -->
  <circle cx="170" cy="60" r="4" fill="#e0aaff"/>
  <circle cx="275" cy="130" r="4" fill="#e0aaff"/>
  <circle cx="90" cy="230" r="4" fill="#c77dff"/>
  <circle cx="250" cy="230" r="4" fill="#c77dff"/>
  <!-- Same arc highlighted -->
  <path d="M170,60 A110,110 0 0,1 275,130" stroke="#ffd166" stroke-width="3" fill="none" opacity="0.5"/>
  <!-- Labels -->
  <text x="155" y="53" fill="#e0aaff" font-size="10">A</text>
  <text x="280" y="127" fill="#e0aaff" font-size="10">B</text>
  <text x="75" y="235" fill="#c77dff" font-size="10">C</text>
  <text x="255" y="235" fill="#c77dff" font-size="10">D</text>
  <!-- Theorem -->
  <text x="320" y="60" fill="#e0aaff" font-size="13" font-weight="bold">Центральный угол</text>
  <text x="320" y="80" fill="#e0aaff" font-size="11">Вершина — центр окружности</text>
  <text x="320" y="95" fill="#e0aaff" font-size="11">Равен дуге, на которую опирается</text>
  <text x="320" y="125" fill="#c77dff" font-size="13" font-weight="bold">Вписанный угол</text>
  <text x="320" y="145" fill="#c77dff" font-size="11">Вершина — на окружности</text>
  <text x="320" y="160" fill="#c77dff" font-size="11">= ½ дуги, на которую опирается</text>
  <!-- Key relationship -->
  <rect x="310" y="180" width="180" height="50" rx="6" fill="#190061" stroke="#ffd166" stroke-width="1.5"/>
  <text x="320" y="200" fill="#ffd166" font-size="14" font-weight="bold">β = α / 2</text>
  <text x="320" y="220" fill="#ffd166" font-size="11">Вписанный = ½ центрального</text>
  <!-- Inscribed angle subtending diameter -->
  <text x="310" y="260" fill="#7f8c8d" font-size="11">Опирается на диаметр:</text>
  <text x="310" y="278" fill="#7f8c8d" font-size="11">вписанный угол = 90°</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Центральные и вписанные углы</text>
</svg>