<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b2d42"/>
      <stop offset="100%" stop-color="#3d405b"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Parallelogram -->
  <polygon points="120,100 300,100 350,220 170,220" fill="none" stroke="#ef476f" stroke-width="2.5"/>
  <!-- Parallel side marks -->
  <line x1="190" y1="95" x2="195" y2="105" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="225" y1="95" x2="230" y2="105" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="235" y1="215" x2="240" y2="225" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="270" y1="215" x2="275" y2="225" stroke="#ffd166" stroke-width="1.5"/>
  <!-- Opposite angles equal marks -->
  <path d="M125,110 Q130,105 135,110" stroke="#06d6a0" stroke-width="1.5" fill="none"/>
  <path d="M340,210 Q345,215 350,210" stroke="#06d6a0" stroke-width="1.5" fill="none"/>
  <path d="M305,110 Q300,105 295,110" stroke="#118ab2" stroke-width="1.5" fill="none"/>
  <path d="M175,210 Q170,215 165,210" stroke="#118ab2" stroke-width="1.5" fill="none"/>
  <!-- Diagonals -->
  <line x1="120" y1="100" x2="350" y2="220" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="300" y1="100" x2="170" y2="220" stroke="#ffd166" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Intersection point -->
  <circle cx="235" cy="160" r="4" fill="#ffd166"/>
  <!-- Side labels -->
  <text x="195" y="90" fill="#ef476f" font-size="12" font-family="serif">a</text>
  <text x="155" y="168" fill="#ef476f" font-size="12" font-family="serif">b</text>
  <!-- Properties -->
  <text x="30" y="260" fill="#06d6a0" font-size="12">• Противоположные стороны равны</text>
  <text x="30" y="278" fill="#118ab2" font-size="12">• Противоположные углы равны</text>
  <text x="30" y="296" fill="#ffd166" font-size="12">• Диагонали точкой пересечения делятся пополам</text>
  <!-- Small marks on diagonal segments -->
  <line x1="225" y1="155" x2="230" y2="165" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="240" y1="155" x2="245" y2="165" stroke="#ffd166" stroke-width="1.5"/>
  <!-- Height -->
  <line x1="300" y1="100" x2="300" y2="220" stroke="#06d6a0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="305" y="165" fill="#06d6a0" font-size="10">h</text>
  <line x1="295" y1="220" x2="305" y2="220" stroke="#06d6a0" stroke-width="1"/>
  <!-- Angle label -->
  <text x="118" y="120" fill="#06d6a0" font-size="11">α</text>
  <text x="345" y="215" fill="#06d6a0" font-size="11">α</text>
  <text x="290" y="120" fill="#118ab2" font-size="11">β</text>
  <text x="168" y="215" fill="#118ab2" font-size="11">β</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Параллелограмм</text>
</svg>