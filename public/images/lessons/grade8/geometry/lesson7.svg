<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C5CAE9"/>
      <stop offset="100%" style="stop-color:#9FA8DA"/>
    </linearGradient>
    <linearGradient id="sq7a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7986CB"/>
      <stop offset="100%" style="stop-color:#3F51B5"/>
    </linearGradient>
    <linearGradient id="sq7b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9FA8DA"/>
      <stop offset="100%" style="stop-color:#5C6BC0"/>
    </linearGradient>
    <linearGradient id="sq7c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#1A237E"/>
    </linearGradient>
    <filter id="sh7" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg7)"/>
  <rect x="3" y="3" width="494" height="344" rx="10" fill="none" stroke="#283593" stroke-width="2.5"/>
  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#283593">Теорема Пифагора</text>
  <text x="250" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#777">Геометрия 8 класс — Урок 7</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#283593" stroke-width="1" opacity="0.3"/>

  <!-- Main visual proof panel -->
  <rect x="15" y="58" width="280" height="205" rx="8" fill="white" opacity="0.92" stroke="#3F51B5" stroke-width="1.2" filter="url(#sh7)"/>
  <text x="155" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593">📐 Визуальное доказательство</text>

  <!-- Right triangle with squares: 3-4-5 -->
  <!-- Triangle at center -->
  <polygon points="80,230 80,195 125,230" fill="#7986CB" opacity="0.4" stroke="#283593" stroke-width="2"/>
  <!-- Right angle mark -->
  <rect x="80" y="223" width="7" height="7" fill="none" stroke="#283593" stroke-width="1"/>
  <!-- Side labels -->
  <text x="72" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3F51B5">a=3</text>
  <text x="95" y="244" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3F51B5">b=4</text>
  <text x="94" y="208" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593">c=5</text>

  <!-- Square on side a (vertical, side 3) -->
  <rect x="60" y="195" width="20" height="35" rx="1" fill="url(#sq7a)" opacity="0.25" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="70" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3F51B5">a²=9</text>

  <!-- Square on side b (horizontal, side 4) -->
  <rect x="80" y="230" width="45" height="20" rx="1" fill="url(#sq7b)" opacity="0.25" stroke="#5C6BC0" stroke-width="1.5"/>
  <text x="102" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#5C6BC0">b²=16</text>

  <!-- Square on hypotenuse c (side 5) - larger and more prominent -->
  <rect x="125" y="195" width="35" height="35" rx="1" fill="url(#sq7c)" opacity="0.2" stroke="#283593" stroke-width="2"/>
  <text x="142" y="217" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593">c²=25</text>

  <!-- Main formula -->
  <rect x="50" y="248" width="200" height="28" rx="6" fill="#283593" opacity="0.12" stroke="#283593" stroke-width="1.2"/>
  <text x="150" y="267" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#283593">a² + b² = c²</text>

  <!-- Classic 3-4-5 proof illustration (larger) -->
  <rect x="175" y="82" width="108" height="108" rx="2" fill="none" stroke="#3F51B5" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
  <!-- Four triangles forming the proof -->
  <polygon points="175,82 220,82 175,130" fill="#7986CB" opacity="0.3" stroke="#283593" stroke-width="1.2"/>
  <polygon points="220,82 283,82 283,130" fill="#7986CB" opacity="0.3" stroke="#283593" stroke-width="1.2"/>
  <polygon points="283,130 283,190 230,190" fill="#7986CB" opacity="0.3" stroke="#283593" stroke-width="1.2"/>
  <polygon points="175,130 175,190 230,190" fill="#7986CB" opacity="0.3" stroke="#283593" stroke-width="1.2"/>
  <!-- Inner square (c²) -->
  <polygon points="220,82 283,130 230,190 175,130" fill="url(#sq7c)" opacity="0.15" stroke="#283593" stroke-width="1.8"/>
  <text x="228" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#283593">c²</text>

  <!-- Calculation examples panel -->
  <rect x="305" y="58" width="180" height="120" rx="8" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1.2" filter="url(#sh7)"/>
  <text x="395" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593">🔢 Примеры</text>
  <!-- Example 1 -->
  <rect x="315" y="82" width="160" height="22" rx="4" fill="#C5CAE9" opacity="0.4"/>
  <text x="325" y="97" font-family="Arial,sans-serif" font-size="9" fill="#283593">3² + 4² = 9+16 = 25 = 5²</text>
  <!-- Example 2 -->
  <rect x="315" y="108" width="160" height="22" rx="4" fill="#C5CAE9" opacity="0.3"/>
  <text x="325" y="123" font-family="Arial,sans-serif" font-size="9" fill="#283593">5² + 12² = 25+144 = 169 = 13²</text>
  <!-- Example 3 -->
  <rect x="315" y="134" width="160" height="22" rx="4" fill="#C5CAE9" opacity="0.2"/>
  <text x="325" y="149" font-family="Arial,sans-serif" font-size="9" fill="#283593">8² + 15² = 64+225 = 289 = 17²</text>
  <!-- Example 4 -->
  <rect x="315" y="160" width="160" height="14" rx="3" fill="none" stroke="#3F51B5" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="325" y="171" font-family="Arial,sans-serif" font-size="8" fill="#5C6BC0">7² + 24² = 49+576 = 625 = 25²</text>

  <!-- Rearrangement proof panel -->
  <rect x="305" y="186" width="180" height="77" rx="8" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1.2" filter="url(#sh7)"/>
  <text x="395" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#283593">🔀 Перестановка</text>
  <!-- Left: two squares a²+b² -->
  <rect x="318" y="210" width="22" height="22" rx="1" fill="url(#sq7a)" opacity="0.35" stroke="#3F51B5" stroke-width="1.2"/>
  <text x="329" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold">a²</text>
  <rect x="343" y="210" width="30" height="30" rx="1" fill="url(#sq7b)" opacity="0.35" stroke="#5C6BC0" stroke-width="1.2"/>
  <text x="358" y="229" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold">b²</text>
  <!-- Equals -->
  <text x="383" y="228" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#283593">=</text>
  <!-- Right: square c² -->
  <rect x="398" y="210" width="35" height="35" rx="2" fill="url(#sq7c)" opacity="0.35" stroke="#283593" stroke-width="2"/>
  <text x="416" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold">c²</text>
  <text x="395" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#3F51B5">сумма = результат</text>

  <!-- Key fact panel -->
  <rect x="15" y="272" width="470" height="24" rx="6" fill="white" opacity="0.85" stroke="#3F51B5" stroke-width="1"/>
  <text x="250" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#283593">💡 Обратная теорема: если a² + b² = c², то треугольник прямоугольный</text>

  <!-- Bottom bar -->
  <rect x="10" y="306" width="480" height="34" rx="8" fill="#283593" opacity="0.85"/>
  <text x="250" y="327" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Теорема Пифагора: a² + b² = c²  |  Пифагоровы тройки: (3,4,5) (5,12,13) (8,15,17)</text>
</svg>