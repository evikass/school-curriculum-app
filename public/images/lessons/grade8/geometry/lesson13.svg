<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="circGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#43A047" stop-opacity="0.08"/><stop offset="100%" stop-color="#2E7D32" stop-opacity="0.18"/></linearGradient>
<linearGradient id="tanGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#E91E63" stop-opacity="0.6"/><stop offset="100%" stop-color="#E91E63" stop-opacity="0.1"/></linearGradient>
<linearGradient id="secGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FF9800" stop-opacity="0.1"/><stop offset="50%" stop-color="#FF9800" stop-opacity="0.5"/><stop offset="100%" stop-color="#FF9800" stop-opacity="0.1"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Касательная к окружности</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 13</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Main circle with tangent - left illustration -->
<g transform="translate(10,50)">
  <!-- Circle -->
  <circle cx="110" cy="130" r="65" fill="url(#circGrad)" stroke="#2E7D32" stroke-width="2"/>
  <!-- Inner pattern for circle fill -->
  <circle cx="110" cy="130" r="65" fill="none" stroke="#43A047" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Center O -->
  <circle cx="110" cy="130" r="3" fill="#2E7D32"/>
  <text x="100" y="142" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" font-weight="bold">O</text>

  <!-- Radius to tangent point T -->
  <line x1="110" y1="130" x2="175" y2="130" stroke="#2E7D32" stroke-width="2"/>
  <text x="145" y="124" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" font-weight="bold">r</text>

  <!-- Tangent point T -->
  <circle cx="175" cy="130" r="4" fill="#E91E63" stroke="white" stroke-width="1.5"/>
  <text x="180" y="122" font-family="Arial,sans-serif" font-size="10" fill="#E91E63" font-weight="bold">T</text>

  <!-- Tangent line (horizontal through T) -->
  <line x1="130" y1="130" x2="220" y2="130" stroke="#E91E63" stroke-width="2.5"/>
  <!-- Arrow on tangent line -->
  <polygon points="218,126 228,130 218,134" fill="#E91E63"/>
  <text x="210" y="148" font-family="Arial,sans-serif" font-size="7" fill="#E91E63" font-weight="bold">касательная</text>

  <!-- Right angle at T -->
  <rect x="168" y="122" width="8" height="8" fill="none" stroke="#E91E63" stroke-width="1.5"/>

  <!-- Secant line for comparison -->
  <line x1="10" y1="40" x2="155" y2="178" stroke="#FF9800" stroke-width="1.8" stroke-dasharray="6,3"/>
  <text x="30" y="38" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">секущая</text>
  <!-- Secant intersection points -->
  <circle cx="70" cy="97" r="3" fill="#FF9800"/>
  <circle cx="135" cy="163" r="3" fill="#FF9800"/>

  <!-- OT ⊥ tangent label -->
  <text x="140" y="158" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">OT ⊥ ℓ</text>
</g>

<!-- Two tangent segments from external point - right illustration -->
<g transform="translate(260,50)">
  <text x="110" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">🎯 Две касательные из точки P</text>

  <!-- Circle -->
  <circle cx="110" cy="120" r="45" fill="url(#circGrad)" stroke="#2E7D32" stroke-width="1.8"/>
  <!-- Center -->
  <circle cx="110" cy="120" r="2.5" fill="#2E7D32"/>
  <text x="104" y="132" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">O</text>

  <!-- External point P -->
  <circle cx="195" cy="50" r="4" fill="#9C27B0" stroke="white" stroke-width="1.5"/>
  <text x="202" y="48" font-family="Arial,sans-serif" font-size="10" fill="#9C27B0" font-weight="bold">P</text>

  <!-- Tangent from P to T1 -->
  <line x1="195" y1="50" x2="145" y2="82" stroke="#E91E63" stroke-width="2"/>
  <circle cx="145" cy="82" r="3.5" fill="#E91E63" stroke="white" stroke-width="1"/>
  <text x="138" y="76" font-family="Arial,sans-serif" font-size="9" fill="#E91E63" font-weight="bold">A</text>

  <!-- Tangent from P to T2 -->
  <line x1="195" y1="50" x2="132" y2="155" stroke="#2196F3" stroke-width="2"/>
  <circle cx="132" cy="155" r="3.5" fill="#2196F3" stroke="white" stroke-width="1"/>
  <text x="120" y="165" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" font-weight="bold">B</text>

  <!-- Radii to tangent points -->
  <line x1="110" y1="120" x2="145" y2="82" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="110" y1="120" x2="132" y2="155" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Right angles at tangent points -->
  <rect x="141" y="82" width="6" height="6" fill="none" stroke="#E91E63" stroke-width="1" transform="rotate(-36,144,85)"/>
  <rect x="128" y="151" width="6" height="6" fill="none" stroke="#2196F3" stroke-width="1" transform="rotate(50,131,154)"/>

  <!-- Equal segments marks -->
  <line x1="168" y1="62" x2="164" y2="58" stroke="#9C27B0" stroke-width="1.5"/>
  <line x1="163" y1="100" x2="159" y2="96" stroke="#9C27B0" stroke-width="1.5"/>

  <text x="170" y="105" font-family="Arial,sans-serif" font-size="8" fill="#9C27B0" font-weight="bold">PA = PB</text>
</g>

<!-- Definition panel -->
<g transform="translate(15,238)">
  <rect x="0" y="0" width="225" height="82" rx="6" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1"/>
  <text x="112" y="14" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">📖 Определение</text>
  <line x1="10" y1="18" x2="215" y2="18" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>
  <text x="112" y="32" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Касательная — прямая, имеющая</text>
  <text x="112" y="42" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">с окружностью ровно одну общую точку.</text>
  <line x1="10" y1="48" x2="215" y2="48" stroke="#2E7D32" stroke-width="0.3" opacity="0.4"/>
  <text x="112" y="60" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Теорема: Радиус, проведённый в точку</text>
  <text x="112" y="70" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">касания, перпендикулярен касательной</text>
  <text x="112" y="80" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">OT ⊥ ℓ ⟹ ∠OTℓ = 90°</text>
</g>

<!-- Properties panel -->
<g transform="translate(255,238)">
  <rect x="0" y="0" width="225" height="82" rx="6" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="1"/>
  <text x="112" y="14" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">📋 Свойства касательных</text>
  <line x1="10" y1="18" x2="215" y2="18" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>

  <circle cx="15" cy="30" r="2.5" fill="#E91E63"/>
  <text x="22" y="33" font-family="Arial,sans-serif" font-size="7" fill="#333">Касательная ⊥ радиусу в точке касания</text>

  <circle cx="15" cy="44" r="2.5" fill="#9C27B0"/>
  <text x="22" y="47" font-family="Arial,sans-serif" font-size="7" fill="#333">Две касательные из одной точки равны</text>

  <circle cx="15" cy="58" r="2.5" fill="#2196F3"/>
  <text x="22" y="61" font-family="Arial,sans-serif" font-size="7" fill="#333">OP — биссектриса ∠APB</text>

  <circle cx="15" cy="72" r="2.5" fill="#FF9800"/>
  <text x="22" y="75" font-family="Arial,sans-serif" font-size="7" fill="#333">OA ⊥ PA и OB ⊥ PB (прямые углы)</text>
</g>

<!-- Bottom bar -->
<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Касательная ⊥ радиусу | Две касательные из одной точки равны: PA = PB</text>
</svg>