<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg18" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <marker id="arrC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#00695C"/>
    </marker>
    <marker id="arrCL" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#009688"/>
    </marker>
    <marker id="arrRes" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#E65100"/>
    </marker>
    <marker id="arrSub" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#D84315"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg18)" rx="8"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <!-- Title -->
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle">Сложение и вычитание векторов</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 18</text>
  <line x1="30" y1="50" x2="470" y2="50" stroke="#00695C" stroke-width="1" opacity="0.3"/>

  <!-- LEFT PANEL: Triangle rule -->
  <rect x="10" y="58" width="155" height="150" rx="8" fill="white" fill-opacity="0.88" stroke="#00695C" stroke-width="1.2"/>
  <text x="88" y="74" font-size="8" font-weight="bold" fill="#004D40" text-anchor="middle">▲ Правило треугольника</text>

  <!-- Step 1: vector a from P to Q -->
  <line x1="30" y1="170" x2="85" y2="110" stroke="#009688" stroke-width="2.2" marker-end="url(#arrCL)"/>
  <text x="50" y="132" font-size="8" fill="#009688" font-weight="bold" transform="rotate(-50,50,132)">a</text>
  <!-- Step 2: vector b from Q to R (tip to tail) -->
  <line x1="85" y1="110" x2="140" y2="150" stroke="#009688" stroke-width="2.2" marker-end="url(#arrCL)"/>
  <text x="120" y="122" font-size="8" fill="#009688" font-weight="bold" transform="rotate(37,120,122)">b</text>
  <!-- Result: c = a + b from P to R -->
  <line x1="30" y1="170" x2="140" y2="150" stroke="#E65100" stroke-width="2.5" marker-end="url(#arrRes)"/>
  <text x="90" y="172" font-size="9" fill="#E65100" font-weight="bold">c</text>

  <!-- Points -->
  <circle cx="30" cy="170" r="2.5" fill="#00695C"/>
  <circle cx="85" cy="110" r="2.5" fill="#00695C"/>
  <circle cx="140" cy="150" r="2.5" fill="#00695C"/>

  <!-- Step labels -->
  <text x="22" y="183" font-size="6" fill="#00695C">①</text>
  <text x="82" y="103" font-size="6" fill="#00695C">②</text>
  <text x="143" y="158" font-size="6" fill="#E65100">③</text>
  <text x="30" y="198" font-size="6" fill="#004D40">① Отложить a</text>
  <text x="30" y="206" font-size="6" fill="#004D40">② Из конца a — b</text>
  <text x="30" y="214" font-size="6" fill="#E65100">③ c = a + b</text>

  <!-- MIDDLE PANEL: Parallelogram rule -->
  <rect x="172" y="58" width="155" height="150" rx="8" fill="white" fill-opacity="0.88" stroke="#00695C" stroke-width="1.2"/>
  <text x="250" y="74" font-size="8" font-weight="bold" fill="#004D40" text-anchor="middle">▱ Правило параллелограмма</text>

  <!-- Vector a from origin -->
  <line x1="200" y1="180" x2="270" y2="130" stroke="#009688" stroke-width="2.2" marker-end="url(#arrCL)"/>
  <text x="225" y="147" font-size="8" fill="#009688" font-weight="bold" transform="rotate(-37,225,147)">a</text>
  <!-- Vector b from origin -->
  <line x1="200" y1="180" x2="260" y2="185" stroke="#009688" stroke-width="2.2" marker-end="url(#arrCL)"/>
  <text x="230" y="193" font-size="8" fill="#009688" font-weight="bold">b</text>
  <!-- Parallel copies (dashed) -->
  <line x1="270" y1="130" x2="330" y2="135" stroke="#009688" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="260" y1="185" x2="330" y2="135" stroke="#009688" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Result: diagonal -->
  <line x1="200" y1="180" x2="325" y2="133" stroke="#E65100" stroke-width="2.5" marker-end="url(#arrRes)"/>
  <text x="270" y="168" font-size="9" fill="#E65100" font-weight="bold">c</text>
  <!-- Origin point -->
  <circle cx="200" cy="180" r="2.5" fill="#00695C"/>

  <!-- Step labels -->
  <text x="193" y="175" font-size="6" fill="#00695C">①</text>
  <text x="332" y="130" font-size="6" fill="#E65100">③</text>
  <text x="200" y="200" font-size="6" fill="#004D40">① a и b из одной точки</text>
  <text x="200" y="208" font-size="6" fill="#004D40">② Достроить ∥грамм</text>
  <text x="200" y="216" font-size="6" fill="#E65100">③ Диагональ = a+b</text>

  <!-- RIGHT PANEL: Subtraction -->
  <rect x="334" y="58" width="156" height="150" rx="8" fill="white" fill-opacity="0.88" stroke="#00695C" stroke-width="1.2"/>
  <text x="412" y="74" font-size="8" font-weight="bold" fill="#004D40" text-anchor="middle">− Вычитание векторов</text>

  <!-- Vector a -->
  <line x1="355" y1="170" x2="440" y2="120" stroke="#009688" stroke-width="2.2" marker-end="url(#arrCL)"/>
  <text x="400" y="138" font-size="8" fill="#009688" font-weight="bold" transform="rotate(-35,400,138)">a</text>
  <!-- Vector -b (opposite direction) -->
  <line x1="440" y1="120" x2="395" y2="180" stroke="#D84315" stroke-width="2" marker-end="url(#arrSub)"/>
  <text x="425" y="157" font-size="8" fill="#D84315" font-weight="bold">−b</text>
  <!-- Result: a - b -->
  <line x1="355" y1="170" x2="395" y2="180" stroke="#E65100" stroke-width="2.5" marker-end="url(#arrRes)"/>
  <text x="365" y="185" font-size="9" fill="#E65100" font-weight="bold">a−b</text>

  <!-- Points -->
  <circle cx="355" cy="170" r="2.5" fill="#00695C"/>
  <circle cx="440" cy="120" r="2.5" fill="#00695C"/>

  <text x="355" y="200" font-size="6" fill="#004D40">a − b = a + (−b)</text>
  <text x="355" y="210" font-size="6" fill="#D84315">Прибавить противо-</text>
  <text x="355" y="218" font-size="6" fill="#D84315">положный вектор</text>

  <!-- BOTTOM PANEL: Properties & laws -->
  <rect x="10" y="215" width="480" height="88" rx="8" fill="white" fill-opacity="0.88" stroke="#00695C" stroke-width="1.2"/>
  <text x="250" y="232" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Законы сложения векторов</text>

  <!-- Commutative -->
  <rect x="20" y="240" width="145" height="28" rx="4" fill="#E0F2F1" stroke="#009688" stroke-width="0.8"/>
  <text x="92" y="252" font-size="7" fill="#00695C" font-weight="bold" text-anchor="middle">Переместительный</text>
  <text x="92" y="263" font-size="8" fill="#004D40" text-anchor="middle">a + b = b + a</text>

  <!-- Associative -->
  <rect x="175" y="240" width="145" height="28" rx="4" fill="#E0F2F1" stroke="#009688" stroke-width="0.8"/>
  <text x="248" y="252" font-size="7" fill="#00695C" font-weight="bold" text-anchor="middle">Сочетательный</text>
  <text x="248" y="263" font-size="8" fill="#004D40" text-anchor="middle">(a + b) + c = a + (b + c)</text>

  <!-- Zero vector property -->
  <rect x="330" y="240" width="150" height="28" rx="4" fill="#E0F2F1" stroke="#009688" stroke-width="0.8"/>
  <text x="405" y="252" font-size="7" fill="#00695C" font-weight="bold" text-anchor="middle">Нулевой вектор</text>
  <text x="405" y="263" font-size="8" fill="#004D40" text-anchor="middle">a + 0 = a, a + (−a) = 0</text>

  <!-- Visual summary: triangle + parallelogram comparison -->
  <text x="250" y="282" font-size="7" fill="#00695C" text-anchor="middle">Треугольник: конец a → начало b | Параллелограмм: a и b из одной точки → диагональ</text>

  <!-- Bottom bar -->
  <rect x="10" y="308" width="480" height="32" rx="6" fill="#00695C" fill-opacity="0.85"/>
  <text x="250" y="323" font-size="9" font-weight="bold" fill="white" text-anchor="middle">a + b = c  (правило треугольника и параллелограмма)</text>
  <text x="250" y="334" font-size="7" fill="#B2DFDB" text-anchor="middle">Вычитание: a − b = a + (−b) | Сложение коммутативно и ассоциативно</text>
</svg>