<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#162447"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Circle -->
  <circle cx="200" cy="170" r="100" fill="none" stroke="#e94560" stroke-width="2"/>
  <!-- Center O -->
  <circle cx="200" cy="170" r="3" fill="#e94560"/>
  <text x="205" y="168" fill="#e94560" font-size="12" font-weight="bold">O</text>
  <!-- Radius -->
  <line x1="200" y1="170" x2="300" y2="170" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="240" y="165" fill="#e94560" font-size="11">r</text>
  <!-- Tangent line at point T -->
  <line x1="180" y1="50" x2="380" y2="130" stroke="#0f3460" stroke-width="2.5"/>
  <!-- Point of tangency T -->
  <circle cx="290" cy="93" r="4" fill="#ffd166"/>
  <text x="295" y="88" fill="#ffd166" font-size="12" font-weight="bold">T</text>
  <!-- Radius to tangent point (perpendicular) -->
  <line x1="200" y1="170" x2="290" y2="93" stroke="#e94560" stroke-width="2"/>
  <!-- Right angle mark at tangent point -->
  <rect x="280" y="96" width="8" height="8" fill="none" stroke="#ffd166" stroke-width="1" transform="rotate(-50,284,100)"/>
  <!-- 90° label -->
  <text x="265" y="120" fill="#ffd166" font-size="11">90°</text>
  <!-- Tangent label -->
  <text x="300" y="55" fill="#0f3460" font-size="12" font-weight="bold">Касательная</text>
  <!-- Second tangent example -->
  <line x1="50" y1="230" x2="150" y2="280" stroke="#533483" stroke-width="2"/>
  <circle cx="108" cy="256" r="3" fill="#533483"/>
  <line x1="200" y1="170" x2="108" y2="256" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Two tangents from same point -->
  <text x="30" y="35" fill="#ffd166" font-size="13" font-weight="bold">Касательная к окружности</text>
  <!-- Properties -->
  <text x="330" y="170" fill="#e94560" font-size="12" font-weight="bold">Свойства:</text>
  <text x="330" y="190" fill="#a8d8ea" font-size="11">• Радиус ⊥ касательной</text>
  <text x="330" y="208" fill="#a8d8ea" font-size="11">• Касательная имеет</text>
  <text x="340" y="223" fill="#a8d8ea" font-size="11">одну общую точку</text>
  <text x="330" y="243" fill="#a8d8ea" font-size="11">• Отрезки касательных,</text>
  <text x="340" y="258" fill="#a8d8ea" font-size="11">проведённых из одной</text>
  <text x="340" y="273" fill="#a8d8ea" font-size="11">точки, равны</text>
  <!-- Two tangent segments from external point -->
  <circle cx="370" cy="290" r="3" fill="#ffd166"/>
  <text x="375" y="305" fill="#ffd166" font-size="10">AT = BT</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Касательная к окружности</text>
</svg>