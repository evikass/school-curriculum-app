<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCCBC"/>
      <stop offset="100%" style="stop-color:#FFAB91"/>
    </linearGradient>
    <linearGradient id="s1g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5722"/>
      <stop offset="100%" style="stop-color:#BF360C"/>
    </linearGradient>
    <filter id="sh10" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg10)"/>
  <rect x="3" y="3" width="494" height="344" rx="10" fill="none" stroke="#BF360C" stroke-width="2.5"/>
  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#BF360C">Признаки подобия треугольников</text>
  <text x="250" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#777">Геометрия 8 класс — Урок 10</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#BF360C" stroke-width="1" opacity="0.3"/>

  <!-- Sign I panel -->
  <rect x="12" y="58" width="155" height="128" rx="7" fill="white" opacity="0.92" stroke="#FF5722" stroke-width="1.2" filter="url(#sh10)"/>
  <rect x="12" y="58" width="155" height="20" rx="7" fill="#FF5722" opacity="0.15"/>
  <text x="89" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C">I признак</text>
  <text x="89" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#FF5722">По двум углам</text>
  <!-- Mini triangle 1 -->
  <polygon points="35,155 25,110 65,110" fill="none" stroke="#BF360C" stroke-width="1.5"/>
  <!-- Angle arcs -->
  <path d="M 32,148 Q 32,142 38,142" fill="none" stroke="#D32F2F" stroke-width="1.5"/>
  <path d="M 35,118 Q 38,120 35,118" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Mini triangle 2 -->
  <polygon points="95,155 80,115 135,115" fill="none" stroke="#FF5722" stroke-width="1.5" stroke-dasharray="3,2"/>
  <path d="M 92,148 Q 92,143 97,143" fill="none" stroke="#D32F2F" stroke-width="1.5"/>
  <path d="M 88,122 Q 92,124 88,122" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Equal signs on angles -->
  <text x="28" y="107" font-family="Arial,sans-serif" font-size="7" fill="#D32F2F">∠1=∠1₁</text>
  <text x="55" y="107" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">∠2=∠2₁</text>
  <!-- Condition text -->
  <rect x="20" y="160" width="140" height="20" rx="4" fill="#FBE9E7"/>
  <text x="90" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C">2 угла → подобны ✓</text>

  <!-- Sign II panel -->
  <rect x="173" y="58" width="155" height="128" rx="7" fill="white" opacity="0.92" stroke="#FF5722" stroke-width="1.2" filter="url(#sh10)"/>
  <rect x="173" y="58" width="155" height="20" rx="7" fill="#FF5722" opacity="0.15"/>
  <text x="250" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C">II признак</text>
  <text x="250" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#FF5722">По 2 сторонам и углу</text>
  <!-- Mini triangle 1 -->
  <polygon points="195,155 185,110 225,110" fill="none" stroke="#BF360C" stroke-width="1.5"/>
  <!-- Highlighted sides -->
  <line x1="185" y1="110" x2="195" y2="155" stroke="#4CAF50" stroke-width="2.5"/>
  <line x1="185" y1="110" x2="225" y2="110" stroke="#FF9800" stroke-width="2.5"/>
  <!-- Angle arc between -->
  <path d="M 195,118 Q 198,120 195,118" fill="none" stroke="#9C27B0" stroke-width="2"/>
  <!-- Mini triangle 2 -->
  <polygon points="255,155 240,115 295,115" fill="none" stroke="#FF5722" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="240" y1="115" x2="255" y2="155" stroke="#4CAF50" stroke-width="2.5" stroke-dasharray="3,2"/>
  <line x1="240" y1="115" x2="295" y2="115" stroke="#FF9800" stroke-width="2.5" stroke-dasharray="3,2"/>
  <path d="M 248,122 Q 252,124 248,122" fill="none" stroke="#9C27B0" stroke-width="2"/>
  <!-- Labels -->
  <text x="186" y="107" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50">a</text>
  <text x="210" y="107" font-family="Arial,sans-serif" font-size="7" fill="#FF9800">b</text>
  <text x="194" y="130" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0">∠</text>
  <!-- Condition text -->
  <rect x="180" y="160" width="140" height="20" rx="4" fill="#FBE9E7"/>
  <text x="250" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#BF360C">2 стороны + угол → ✓</text>

  <!-- Sign III panel -->
  <rect x="334" y="58" width="155" height="128" rx="7" fill="white" opacity="0.92" stroke="#FF5722" stroke-width="1.2" filter="url(#sh10)"/>
  <rect x="334" y="58" width="155" height="20" rx="7" fill="#FF5722" opacity="0.15"/>
  <text x="411" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C">III признак</text>
  <text x="411" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#FF5722">По трём сторонам</text>
  <!-- Mini triangle 1 -->
  <polygon points="360,155 350,110 395,110" fill="none" stroke="#BF360C" stroke-width="1.5"/>
  <!-- All sides highlighted -->
  <line x1="350" y1="110" x2="360" y2="155" stroke="#4CAF50" stroke-width="2.5"/>
  <line x1="350" y1="110" x2="395" y2="110" stroke="#FF9800" stroke-width="2.5"/>
  <line x1="395" y1="110" x2="360" y2="155" stroke="#2196F3" stroke-width="2.5"/>
  <!-- Mini triangle 2 -->
  <polygon points="430,155 415,115 465,115" fill="none" stroke="#FF5722" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="415" y1="115" x2="430" y2="155" stroke="#4CAF50" stroke-width="2.5" stroke-dasharray="3,2"/>
  <line x1="415" y1="115" x2="465" y2="115" stroke="#FF9800" stroke-width="2.5" stroke-dasharray="3,2"/>
  <line x1="465" y1="115" x2="430" y2="155" stroke="#2196F3" stroke-width="2.5" stroke-dasharray="3,2"/>
  <!-- Proportion labels -->
  <text x="347" y="107" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50">a</text>
  <text x="377" y="107" font-family="Arial,sans-serif" font-size="7" fill="#FF9800">b</text>
  <text x="390" y="140" font-family="Arial,sans-serif" font-size="7" fill="#2196F3">c</text>
  <!-- Condition text -->
  <rect x="342" y="160" width="140" height="20" rx="4" fill="#FBE9E7"/>
  <text x="412" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#BF360C">3 стороны ~ → ✓</text>

  <!-- Comparison table -->
  <rect x="12" y="195" width="295" height="100" rx="8" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1.2" filter="url(#sh10)"/>
  <text x="160" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C">📊 Сравнительная таблица</text>
  <!-- Table header -->
  <rect x="20" y="220" width="75" height="16" rx="3" fill="#FF5722" opacity="0.2"/>
  <text x="57" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C">Признак</text>
  <rect x="98" y="220" width="95" height="16" rx="3" fill="#FF5722" opacity="0.1"/>
  <text x="145" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C">Условие</text>
  <rect x="196" y="220" width="104" height="16" rx="3" fill="#FF5722" opacity="0.1"/>
  <text x="248" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C">Достаточно</text>
  <!-- Row I -->
  <text x="57" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#BF360C">I</text>
  <text x="145" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#555">∠A=∠A₁, ∠B=∠B₁</text>
  <text x="248" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50">2 угла</text>
  <!-- Row II -->
  <text x="57" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#BF360C">II</text>
  <text x="145" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#555">a/a₁=b/b₁, ∠C=∠C₁</text>
  <text x="248" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#FF9800">2 стор.+угол</text>
  <!-- Row III -->
  <text x="57" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#BF360C">III</text>
  <text x="145" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#555">a/a₁=b/b₁=c/c₁</text>
  <text x="248" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#2196F3">3 стороны</text>
  <!-- Separator lines -->
  <line x1="20" y1="237" x2="300" y2="237" stroke="#FF5722" stroke-width="0.5" opacity="0.3"/>
  <line x1="20" y1="253" x2="300" y2="253" stroke="#FF5722" stroke-width="0.5" opacity="0.2"/>
  <line x1="20" y1="268" x2="300" y2="268" stroke="#FF5722" stroke-width="0.5" opacity="0.2"/>

  <!-- Flowchart panel -->
  <rect x="317" y="195" width="172" height="100" rx="8" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1.2" filter="url(#sh10)"/>
  <text x="403" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C">🔀 Как выбрать?</text>
  <!-- Flowchart -->
  <rect x="340" y="220" width="120" height="16" rx="4" fill="#BF360C" opacity="0.15" stroke="#BF360C" stroke-width="0.8"/>
  <text x="400" y="232" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#BF360C">Что известно?</text>
  <!-- Branch 1 -->
  <line x1="360" y1="236" x2="360" y2="246" stroke="#FF5722" stroke-width="1"/>
  <rect x="330" y="246" width="60" height="14" rx="3" fill="#4CAF50" opacity="0.2" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="360" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#388E3C">Углы → I</text>
  <!-- Branch 2 -->
  <line x1="400" y1="236" x2="400" y2="246" stroke="#FF5722" stroke-width="1"/>
  <rect x="370" y="246" width="60" height="14" rx="3" fill="#FF9800" opacity="0.2" stroke="#FF9800" stroke-width="0.8"/>
  <text x="400" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">2 ст.+∠ → II</text>
  <!-- Branch 3 -->
  <line x1="440" y1="236" x2="440" y2="246" stroke="#FF5722" stroke-width="1"/>
  <rect x="410" y="246" width="60" height="14" rx="3" fill="#2196F3" opacity="0.2" stroke="#2196F3" stroke-width="0.8"/>
  <text x="440" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">3 ст. → III</text>
  <!-- Result -->
  <line x1="400" y1="260" x2="400" y2="270" stroke="#BF360C" stroke-width="1"/>
  <rect x="350" y="270" width="100" height="16" rx="4" fill="url(#s1g)" opacity="0.15" stroke="#BF360C" stroke-width="1"/>
  <text x="400" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C">△ ~ △ ✓</text>

  <!-- Bottom bar -->
  <rect x="10" y="306" width="480" height="34" rx="8" fill="#BF360C" opacity="0.85"/>
  <text x="250" y="327" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">I: 2 угла | II: 2 стороны и угол | III: 3 пропорциональные стороны</text>
</svg>