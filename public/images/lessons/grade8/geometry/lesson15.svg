<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#E1BEE7"/></linearGradient>
<linearGradient id="chordGrad1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E91E63" stop-opacity="0.4"/><stop offset="100%" stop-color="#E91E63" stop-opacity="0.7"/></linearGradient>
<linearGradient id="chordGrad2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2196F3" stop-opacity="0.4"/><stop offset="100%" stop-color="#2196F3" stop-opacity="0.7"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#6A1B9A" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle">Свойства хорд и секущих</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Геометрия 8 класс — Урок 15</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#6A1B9A" stroke-width="1" opacity="0.3"/>

<!-- Panel 1: Intersecting chords inside circle -->
<g transform="translate(10,55)">
  <rect x="0" y="0" width="155" height="145" rx="6" fill="white" opacity="0.88" stroke="#6A1B9A" stroke-width="1"/>
  <text x="77" y="14" font-family="Arial,sans-serif" font-size="7" fill="#4A148C" text-anchor="middle" font-weight="bold">🔗 Пересекающиеся хорды</text>
  <line x1="10" y1="18" x2="145" y2="18" stroke="#6A1B9A" stroke-width="0.5" opacity="0.3"/>

  <!-- Circle -->
  <circle cx="77" cy="85" r="45" fill="#6A1B9A" fill-opacity="0.04" stroke="#6A1B9A" stroke-width="1.5"/>

  <!-- Chord AB (red/pink) -->
  <line x1="40" y1="52" x2="125" y2="110" stroke="#E91E63" stroke-width="2"/>
  <!-- Intersection point M -->
  <circle cx="77" cy="77" r="3.5" fill="#6A1B9A" stroke="white" stroke-width="1.5"/>
  <text x="82" y="72" font-family="Arial,sans-serif" font-size="8" fill="#6A1B9A" font-weight="bold">M</text>
  <!-- Points A and B -->
  <circle cx="40" cy="52" r="3" fill="#E91E63"/>
  <text x="30" y="48" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">A</text>
  <circle cx="125" cy="110" r="3" fill="#E91E63"/>
  <text x="130" y="115" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">B</text>

  <!-- Chord CD (blue) -->
  <line x1="35" y1="110" x2="130" y2="55" stroke="#2196F3" stroke-width="2"/>
  <!-- Points C and D -->
  <circle cx="35" cy="110" r="3" fill="#2196F3"/>
  <text x="22" y="115" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold">C</text>
  <circle cx="130" cy="55" r="3" fill="#2196F3"/>
  <text x="134" y="52" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold">D</text>

  <!-- Segment labels -->
  <text x="55" y="68" font-family="Arial,sans-serif" font-size="6" fill="#C62828">AM</text>
  <text x="100" y="100" font-family="Arial,sans-serif" font-size="6" fill="#C62828">MB</text>
  <text x="50" y="100" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">CM</text>
  <text x="105" y="68" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">MD</text>

  <!-- Formula -->
  <rect x="15" y="125" width="125" height="16" rx="3" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="77" y="136" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">AM·MB = CM·MD</text>
</g>

<!-- Panel 2: Intersecting secants from external point -->
<g transform="translate(175,55)">
  <rect x="0" y="0" width="155" height="145" rx="6" fill="white" opacity="0.88" stroke="#6A1B9A" stroke-width="1"/>
  <text x="77" y="14" font-family="Arial,sans-serif" font-size="7" fill="#4A148C" text-anchor="middle" font-weight="bold">📐 Пересекающиеся секущие</text>
  <line x1="10" y1="18" x2="145" y2="18" stroke="#6A1B9A" stroke-width="0.5" opacity="0.3"/>

  <!-- Circle -->
  <circle cx="85" cy="90" r="38" fill="#6A1B9A" fill-opacity="0.04" stroke="#6A1B9A" stroke-width="1.5"/>

  <!-- External point P -->
  <circle cx="25" cy="50" r="3.5" fill="#FF9800" stroke="white" stroke-width="1.5"/>
  <text x="12" y="45" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">P</text>

  <!-- Secant PAB (orange) -->
  <line x1="25" y1="50" x2="115" y2="108" stroke="#FF9800" stroke-width="2"/>
  <circle cx="62" cy="72" r="3" fill="#FF9800"/>
  <text x="55" y="68" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">A</text>
  <circle cx="115" cy="108" r="3" fill="#FF9800"/>
  <text x="118" y="115" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">B</text>

  <!-- Secant PCD (green) -->
  <line x1="25" y1="50" x2="95" y2="125" stroke="#4CAF50" stroke-width="2"/>
  <circle cx="55" cy="82" r="3" fill="#4CAF50"/>
  <text x="42" y="88" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold">C</text>
  <circle cx="95" cy="125" r="3" fill="#4CAF50"/>
  <text x="98" y="132" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold">D</text>

  <!-- Segment labels -->
  <text x="36" y="56" font-family="Arial,sans-serif" font-size="5" fill="#E65100">PA</text>
  <text x="80" y="95" font-family="Arial,sans-serif" font-size="5" fill="#E65100">AB</text>
  <text x="30" y="68" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">PC</text>
  <text x="72" y="110" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">CD</text>

  <!-- Formula -->
  <rect x="15" y="125" width="125" height="16" rx="3" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="77" y="136" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">PA·PB = PC·PD</text>
</g>

<!-- Panel 3: Tangent-secant theorem -->
<g transform="translate(340,55)">
  <rect x="0" y="0" width="150" height="145" rx="6" fill="white" opacity="0.88" stroke="#6A1B9A" stroke-width="1"/>
  <text x="75" y="14" font-family="Arial,sans-serif" font-size="7" fill="#4A148C" text-anchor="middle" font-weight="bold">🎯 Касательная и секущая</text>
  <line x1="10" y1="18" x2="140" y2="18" stroke="#6A1B9A" stroke-width="0.5" opacity="0.3"/>

  <!-- Circle -->
  <circle cx="85" cy="88" r="38" fill="#6A1B9A" fill-opacity="0.04" stroke="#6A1B9A" stroke-width="1.5"/>

  <!-- External point P -->
  <circle cx="18" cy="55" r="3.5" fill="#9C27B0" stroke="white" stroke-width="1.5"/>
  <text x="5" y="50" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" font-weight="bold">P</text>

  <!-- Tangent PT (purple) -->
  <line x1="18" y1="55" x2="52" y2="68" stroke="#9C27B0" stroke-width="2.5"/>
  <circle cx="52" cy="68" r="3" fill="#9C27B0"/>
  <text x="44" y="64" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" font-weight="bold">T</text>
  <!-- Right angle mark at T -->
  <rect x="48" y="64" width="5" height="5" fill="none" stroke="#9C27B0" stroke-width="0.8"/>

  <!-- Secant PAB (teal) -->
  <line x1="18" y1="55" x2="115" y2="115" stroke="#009688" stroke-width="2"/>
  <circle cx="68" cy="80" r="3" fill="#009688"/>
  <text x="60" y="77" font-family="Arial,sans-serif" font-size="8" fill="#00695C" font-weight="bold">A</text>
  <circle cx="115" cy="115" r="3" fill="#009688"/>
  <text x="118" y="122" font-family="Arial,sans-serif" font-size="8" fill="#00695C" font-weight="bold">B</text>

  <!-- Segment labels -->
  <text x="26" y="58" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2">PT</text>
  <text x="35" y="70" font-family="Arial,sans-serif" font-size="5" fill="#00695C">PA</text>
  <text x="88" y="103" font-family="Arial,sans-serif" font-size="5" fill="#00695C">PB</text>

  <!-- Radius to T -->
  <line x1="85" y1="88" x2="52" y2="68" stroke="#6A1B9A" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Formula -->
  <rect x="12" y="125" width="126" height="16" rx="3" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="75" y="136" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">PT² = PA·PB</text>
</g>

<!-- Summary formulas panel - bottom -->
<g transform="translate(15,210)">
  <rect x="0" y="0" width="470" height="112" rx="6" fill="white" opacity="0.9" stroke="#6A1B9A" stroke-width="1"/>
  <text x="235" y="14" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">📋 Все формулы: хорды и секущие</text>
  <line x1="10" y1="18" x2="460" y2="18" stroke="#6A1B9A" stroke-width="0.5" opacity="0.4"/>

  <!-- Three formula boxes side by side -->
  <!-- Box 1: Chords -->
  <rect x="10" y="24" width="145" height="42" rx="4" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.8"/>
  <circle cx="22" cy="34" r="3" fill="#E91E63"/>
  <text x="30" y="37" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Хорды (внутри)</text>
  <text x="82" y="53" font-family="Arial,sans-serif" font-size="10" fill="#4A148C" text-anchor="middle" font-weight="bold">AM·MB = CM·MD</text>
  <text x="82" y="63" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">произведения отрезков равны</text>

  <!-- Box 2: Secants -->
  <rect x="162" y="24" width="145" height="42" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
  <circle cx="174" cy="34" r="3" fill="#4CAF50"/>
  <text x="182" y="37" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Секущие (снаружи)</text>
  <text x="234" y="53" font-family="Arial,sans-serif" font-size="10" fill="#4A148C" text-anchor="middle" font-weight="bold">PA·PB = PC·PD</text>
  <text x="234" y="63" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">целые × внешние части</text>

  <!-- Box 3: Tangent-secant -->
  <rect x="314" y="24" width="145" height="42" rx="4" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
  <circle cx="326" cy="34" r="3" fill="#9C27B0"/>
  <text x="334" y="37" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" font-weight="bold">Касательная-секущая</text>
  <text x="386" y="53" font-family="Arial,sans-serif" font-size="10" fill="#4A148C" text-anchor="middle" font-weight="bold">PT² = PA·PB</text>
  <text x="386" y="63" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">квадрат касательной</text>

  <!-- Key insight -->
  <line x1="10" y1="70" x2="460" y2="70" stroke="#6A1B9A" stroke-width="0.3" opacity="0.4"/>
  <text x="235" y="82" font-family="Arial,sans-serif" font-size="7" fill="#4A148C" text-anchor="middle" font-weight="bold">💡 Общий принцип: степени точки относительно окружности</text>

  <g transform="translate(20,88)">
    <circle cx="0" cy="0" r="2.5" fill="#E91E63"/>
    <text x="7" y="3" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Внутри: AM·MB — произведение отрезков хорды</text>
  </g>
  <g transform="translate(20,100)">
    <circle cx="0" cy="0" r="2.5" fill="#4CAF50"/>
    <text x="7" y="3" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Снаружи: PA·PB — произведение секущей на внешнюю часть</text>
  </g>
</g>

<!-- Bottom bar -->
<rect x="10" y="330" width="480" height="16" rx="4" fill="#6A1B9A" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">AM·MB = CM·MD | PA·PB = PC·PD | PT² = PA·PB</text>
</svg>