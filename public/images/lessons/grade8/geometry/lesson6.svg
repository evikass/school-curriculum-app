<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#233d4d"/>
      <stop offset="100%" stop-color="#2a4a5a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Parallelogram to rectangle transformation -->
  <text x="30" y="35" fill="#fe7f2d" font-size="13" font-weight="bold">Параллелограмм → Прямоугольник</text>
  <!-- Original parallelogram -->
  <polygon points="60,100 220,100 270,200 110,200" fill="#588b8b" fill-opacity="0.15" stroke="#588b8b" stroke-width="2"/>
  <text x="130" y="155" fill="#588b8b" font-size="14" font-family="serif">a</text>
  <!-- Height line -->
  <line x1="220" y1="100" x2="220" y2="200" stroke="#fe7f2d" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="225" y="155" fill="#fe7f2d" font-size="11">h</text>
  <!-- Cut triangle highlighted -->
  <polygon points="60,100 110,200 60,200" fill="#fe7f2d" fill-opacity="0.25" stroke="#fe7f2d" stroke-width="1.5"/>
  <!-- Arrow -->
  <path d="M280,150 L310,150" stroke="#f4f1de" stroke-width="2" fill="none"/>
  <polygon points="310,150 302,145 302,155" fill="#f4f1de"/>
  <!-- Resulting rectangle -->
  <rect x="320" y="100" width="160" height="100" fill="#588b8b" fill-opacity="0.15" stroke="#588b8b" stroke-width="2"/>
  <!-- Moved triangle -->
  <polygon points="480,100 480,200 430,200" fill="#fe7f2d" fill-opacity="0.25" stroke="#fe7f2d" stroke-width="1.5"/>
  <text x="380" y="155" fill="#588b8b" font-size="14" font-family="serif">a</text>
  <text x="420" y="95" fill="#fe7f2d" font-size="11">h</text>
  <!-- Formula -->
  <text x="30" y="240" fill="#fe7f2d" font-size="16" font-family="serif" font-weight="bold">S = a · h</text>
  <!-- Triangle area -->
  <text x="30" y="265" fill="#588b8b" font-size="13" font-weight="bold">Треугольник:</text>
  <!-- Triangle -->
  <polygon points="80,280 200,280 140,215" fill="#588b8b" fill-opacity="0.1" stroke="#588b8b" stroke-width="1.5"/>
  <!-- Base -->
  <text x="125" y="298" fill="#588b8b" font-size="11" font-family="serif">a</text>
  <!-- Height -->
  <line x1="140" y1="215" x2="140" y2="280" stroke="#fe7f2d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="145" y="255" fill="#fe7f2d" font-size="10">h</text>
  <!-- Duplicate triangle (inverted) -->
  <polygon points="80,280 200,280 140,345" fill="#fe7f2d" fill-opacity="0.08" stroke="#fe7f2d" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Arrow showing S = 1/2 of parallelogram -->
  <text x="220" y="280" fill="#fe7f2d" font-size="12">= 1/2 параллелограмма</text>
  <text x="220" y="300" fill="#f4f1de" font-size="16" font-family="serif" font-weight="bold">S = ½ · a · h</text>
  <!-- Right triangle formula -->
  <text x="300" y="240" fill="#7f8c8d" font-size="11">Прямоугольный:</text>
  <text x="300" y="258" fill="#7f8c8d" font-size="12" font-family="serif">S = ½ · a · b</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Площадь параллелограмма и треугольника</text>
</svg>