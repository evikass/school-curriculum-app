<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="accent4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F57F17"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="trapFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCC80" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFB74D" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="midFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F57F17" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E65100" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="8" fill="url(#bg4)"/>
  <!-- Border -->
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#E65100" stroke-width="2.5" opacity="0.7"/>
  <!-- Title -->
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#E65100">⏢ Трапеция</text>
  <!-- Subtitle -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Геометрия 8 класс — Урок 4</text>
  <!-- Separator -->
  <line x1="20" y1="47" x2="480" y2="47" stroke="#E65100" stroke-width="0.8" opacity="0.3"/>

  <!-- Main Panel: Isosceles trapezoid -->
  <rect x="14" y="54" width="230" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="129" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">Равнобедренная трапеция</text>

  <!-- Isosceles trapezoid -->
  <polygon points="70,90 190,90 220,180 40,180" fill="url(#trapFill)" stroke="#E65100" stroke-width="2"/>

  <!-- Parallel marks on bases -->
  <line x1="85" y1="87" x2="95" y2="87" stroke="#E65100" stroke-width="1.5"/>
  <line x1="87" y1="84" x2="97" y2="84" stroke="#E65100" stroke-width="1.5"/>
  <line x1="80" y1="183" x2="90" y2="183" stroke="#E65100" stroke-width="1.5"/>
  <line x1="82" y1="180" x2="92" y2="180" stroke="#E65100" stroke-width="1.5"/>

  <!-- Equal side marks -->
  <line x1="125" y1="128" x2="130" y2="132" stroke="#2E7D32" stroke-width="1.3"/>
  <line x1="127" y1="126" x2="132" y2="130" stroke="#2E7D32" stroke-width="1.3"/>
  <line x1="148" y1="128" x2="143" y2="132" stroke="#2E7D32" stroke-width="1.3"/>
  <line x1="146" y1="126" x2="141" y2="130" stroke="#2E7D32" stroke-width="1.3"/>

  <!-- Diagonals -->
  <line x1="70" y1="90" x2="220" y2="180" stroke="#E91E63" stroke-width="1.2" stroke-dasharray="5,2" opacity="0.65"/>
  <line x1="190" y1="90" x2="40" y2="180" stroke="#1565C0" stroke-width="1.2" stroke-dasharray="5,2" opacity="0.65"/>

  <!-- Equal diagonal marks -->
  <line x1="132" y1="128" x2="138" y2="133" stroke="#E91E63" stroke-width="1.3"/>
  <line x1="134" y1="126" x2="140" y2="131" stroke="#E91E63" stroke-width="1.3"/>

  <!-- Midline -->
  <line x1="55" y1="135" x2="205" y2="135" stroke="#F57F17" stroke-width="2.5" opacity="0.8"/>
  <text x="130" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">MN — средняя линия</text>

  <!-- Angle marks at base -->
  <path d="M48,180 A12,12 0 0,1 52,169" fill="none" stroke="#FF5722" stroke-width="1.2"/>
  <path d="M212,180 A12,12 0 0,0 208,169" fill="none" stroke="#FF5722" stroke-width="1.2"/>

  <!-- Vertex labels -->
  <text x="64" y="86" text-anchor="end" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">A</text>
  <text x="196" y="86" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">B</text>
  <text x="226" y="184" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">C</text>
  <text x="33" y="184" text-anchor="end" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">D</text>

  <!-- Side labels -->
  <text x="130" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-style="italic">a (верх. осн.)</text>
  <text x="130" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-style="italic">b (нижн. осн.)</text>

  <!-- Properties -->
  <text x="24" y="212" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">✓ AB = CD (боковые стороны)</text>
  <text x="24" y="222" font-family="Arial,sans-serif" font-size="7" fill="#FF5722">✓ ∠A = ∠B, ∠D = ∠C (углы при осн.)</text>
  <text x="24" y="232" font-family="Arial,sans-serif" font-size="7" fill="#E91E63">✓ AC = BD (диагонали равны)</text>

  <!-- Right Panel: Types of trapezoids -->
  <rect x="250" y="54" width="238" height="82" rx="8" fill="white" fill-opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="369" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">Виды трапеций</text>

  <!-- Isosceles -->
  <polygon points="280,82 310,82 320,118 270,118" fill="#FFCC80" fill-opacity="0.4" stroke="#E65100" stroke-width="1.3"/>
  <text x="295" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100" font-weight="bold">Равнобокая</text>

  <!-- Right trapezoid -->
  <polygon points="355,82 400,82 400,118 355,118" fill="#A5D6A7" fill-opacity="0.4" stroke="#2E7D32" stroke-width="1.3"/>
  <rect x="394" y="82" width="6" height="6" fill="none" stroke="#E91E63" stroke-width="0.8"/>
  <line x1="355" y1="82" x2="355" y2="118" stroke="#2E7D32" stroke-width="1.3"/>
  <text x="378" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" font-weight="bold">Прямоуг.</text>

  <!-- Arbitrary -->
  <polygon points="430,82 465,85 475,118 420,118" fill="#90CAF9" fill-opacity="0.4" stroke="#1565C0" stroke-width="1.3"/>
  <text x="448" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0" font-weight="bold">Произвольная</text>

  <!-- Right Panel bottom: Midline formula + Thales -->
  <rect x="250" y="142" width="238" height="77" rx="8" fill="white" fill-opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="369" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">📏 Средняя линия</text>

  <!-- Formula box -->
  <rect x="260" y="163" width="100" height="30" rx="5" fill="#FFF3E0" stroke="#F57F17" stroke-width="1"/>
  <text x="310" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#607D8B">Формула:</text>
  <text x="310" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E65100">MN = (a+b)/2</text>

  <!-- Thales theorem visual -->
  <text x="400" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1565C0">Теорема Фалеса</text>
  <!-- Parallel lines -->
  <line x1="375" y1="182" x2="465" y2="182" stroke="#1565C0" stroke-width="0.7" opacity="0.5"/>
  <line x1="375" y1="190" x2="465" y2="190" stroke="#1565C0" stroke-width="0.7" opacity="0.5"/>
  <line x1="375" y1="198" x2="465" y2="198" stroke="#1565C0" stroke-width="0.7" opacity="0.5"/>
  <!-- Transversal -->
  <line x1="390" y1="178" x2="440" y2="202" stroke="#E65100" stroke-width="1.2"/>
  <!-- Equal segments marks -->
  <line x1="394" y1="182" x2="392" y2="186" stroke="#E91E63" stroke-width="1"/>
  <line x1="407" y1="190" x2="405" y2="194" stroke="#E91E63" stroke-width="1"/>
  <line x1="421" y1="198" x2="419" y2="202" stroke="#E91E63" stroke-width="1"/>
  <text x="460" y="195" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">равные</text>
  <text x="460" y="203" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">отрезки</text>

  <!-- Bottom: Right trapezoid detail -->
  <rect x="14" y="225" width="235" height="65" rx="8" fill="white" fill-opacity="0.88" stroke="#F57F17" stroke-width="1.2"/>
  <text x="131" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">📐 Прямоугольная трапеция</text>

  <!-- Right trapezoid detailed -->
  <polygon points="40,260 130,260 150,280 40,280" fill="#FFE0B2" fill-opacity="0.5" stroke="#E65100" stroke-width="1.5"/>
  <!-- Right angle marks -->
  <rect x="40" y="274" width="6" height="6" fill="none" stroke="#E91E63" stroke-width="0.8"/>
  <!-- Height line -->
  <line x1="130" y1="260" x2="130" y2="280" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,1.5"/>
  <text x="134" y="274" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">h</text>
  <!-- Labels -->
  <text x="85" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-style="italic">a</text>
  <text x="95" y="294" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-style="italic">b</text>

  <!-- Right angle side note -->
  <text x="160" y="264" font-family="Arial,sans-serif" font-size="7" fill="#37474F">✓ Один угол = 90°</text>
  <text x="160" y="275" font-family="Arial,sans-serif" font-size="7" fill="#37474F">✓ Боковая сторона ⊥ основаниям</text>
  <text x="160" y="286" font-family="Arial,sans-serif" font-size="7" fill="#37474F">✓ Высота = боковой стороне</text>

  <!-- Bottom right: Key definitions -->
  <rect x="255" y="225" width="233" height="65" rx="8" fill="white" fill-opacity="0.88" stroke="#F57F17" stroke-width="1.2"/>
  <text x="371" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">📝 Определения и свойства</text>

  <circle cx="268" cy="254" r="3" fill="#F57F17"/>
  <text x="276" y="257" font-family="Arial,sans-serif" font-size="7" fill="#37474F">Трапеция — четырёхугольник с одной парой ∥ сторон</text>
  <circle cx="268" cy="266" r="3" fill="#F57F17"/>
  <text x="276" y="269" font-family="Arial,sans-serif" font-size="7" fill="#37474F">Средняя линия ∥ основаниям и = полусумме</text>
  <circle cx="268" cy="278" r="3" fill="#F57F17"/>
  <text x="276" y="281" font-family="Arial,sans-serif" font-size="7" fill="#37474F">Равнобокая: ∠ при основании равны, диагонали равны</text>

  <!-- Bottom bar -->
  <rect x="14" y="300" width="474" height="38" rx="6" fill="url(#accent4)" opacity="0.85"/>
  <text x="250" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">⏢ Средняя линия трапеции: MN = (a + b) / 2</text>
  <text x="250" y="332" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#FFF3E0">Равнобедренная: боковые стороны равны, углы при основаниях равны, диагонали равны</text>
</svg>