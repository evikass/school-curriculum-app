<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d3557"/>
      <stop offset="100%" stop-color="#264653"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Trapezoid -->
  <polygon points="140,80 340,80 400,220 80,220" fill="none" stroke="#e9c46a" stroke-width="2.5"/>
  <!-- Parallel sides (bases) marks -->
  <line x1="200" y1="75" x2="205" y2="85" stroke="#e76f51" stroke-width="1.5"/>
  <line x1="230" y1="75" x2="235" y2="85" stroke="#e76f51" stroke-width="1.5"/>
  <line x1="200" y1="215" x2="205" y2="225" stroke="#e76f51" stroke-width="1.5"/>
  <line x1="230" y1="215" x2="235" y2="225" stroke="#e76f51" stroke-width="1.5"/>
  <!-- Base labels -->
  <text x="220" y="72" fill="#e76f51" font-size="14" font-family="serif">a</text>
  <text x="220" y="245" fill="#e76f51" font-size="14" font-family="serif">b</text>
  <!-- Height -->
  <line x1="340" y1="80" x2="340" y2="220" stroke="#2a9d8f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="335" y1="220" x2="345" y2="220" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="345" y="155" fill="#2a9d8f" font-size="13" font-family="serif">h</text>
  <!-- Right angle mark at height base -->
  <rect x="340" y="210" width="8" height="8" fill="none" stroke="#2a9d8f" stroke-width="0.8"/>
  <!-- Midline -->
  <line x1="110" y1="150" x2="370" y2="150" stroke="#f4a261" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="380" y="148" fill="#f4a261" font-size="12">Средняя линия</text>
  <text x="380" y="163" fill="#f4a261" font-size="11" font-family="serif">m = (a+b)/2</text>
  <!-- Area formula -->
  <text x="30" y="290" fill="#e9c46a" font-size="14" font-weight="bold">Площадь:</text>
  <text x="30" y="310" fill="#a8dadc" font-size="16" font-family="serif">S = (a+b)·h / 2</text>
  <!-- Angles -->
  <path d="M86,215 Q90,210 95,215" stroke="#457b9d" stroke-width="1" fill="none"/>
  <path d="M394,215 Q390,210 385,215" stroke="#457b9d" stroke-width="1" fill="none"/>
  <text x="82" y="235" fill="#457b9d" font-size="10">α</text>
  <text x="395" y="235" fill="#457b9d" font-size="10">β</text>
  <!-- Sides labeled -->
  <text x="50" y="155" fill="#a8dadc" font-size="11">c</text>
  <text x="415" y="155" fill="#a8dadc" font-size="11">d</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Трапеция</text>
</svg>