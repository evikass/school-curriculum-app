<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="rectFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90CAF9" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#64B5F6" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="rhombFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#AB47BC" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="sqFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFD54F" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="8" fill="url(#bg3)"/>
  <!-- Border -->
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#1565C0" stroke-width="2.5" opacity="0.7"/>
  <!-- Title -->
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0">▭ Прямоугольник, ромб, квадрат</text>
  <!-- Subtitle -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Геометрия 8 класс — Урок 3</text>
  <!-- Separator -->
  <line x1="20" y1="47" x2="480" y2="47" stroke="#1565C0" stroke-width="0.8" opacity="0.3"/>

  <!-- Panel 1: Rectangle -->
  <rect x="14" y="54" width="152" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="90" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0">▭ Прямоугольник</text>

  <!-- Rectangle shape -->
  <rect x="34" y="80" width="110" height="70" rx="2" fill="url(#rectFill)" stroke="#1565C0" stroke-width="2"/>

  <!-- Right angle marks -->
  <rect x="34" y="80" width="8" height="8" fill="none" stroke="#E91E63" stroke-width="1"/>
  <rect x="136" y="80" width="8" height="8" fill="none" stroke="#E91E63" stroke-width="1"/>
  <rect x="136" y="142" width="8" height="8" fill="none" stroke="#E91E63" stroke-width="1"/>
  <rect x="34" y="142" width="8" height="8" fill="none" stroke="#E91E63" stroke-width="1"/>

  <!-- Diagonals -->
  <line x1="34" y1="80" x2="144" y2="150" stroke="#E91E63" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="144" y1="80" x2="34" y2="150" stroke="#E91E63" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>

  <!-- Equal diagonal marks -->
  <line x1="82" y1="111" x2="88" y2="116" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="84" y1="109" x2="90" y2="114" stroke="#E91E63" stroke-width="1.5"/>

  <!-- Vertex labels -->
  <text x="28" y="76" text-anchor="end" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0">A</text>
  <text x="150" y="76" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0">B</text>
  <text x="150" y="162" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0">C</text>
  <text x="28" y="162" text-anchor="end" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0">D</text>

  <!-- Properties -->
  <text x="24" y="178" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">✓ Все углы = 90°</text>
  <text x="24" y="189" font-family="Arial,sans-serif" font-size="7" fill="#E91E63">✓ Диагонали равны</text>
  <text x="24" y="200" font-family="Arial,sans-serif" font-size="7" fill="#37474F">✓ AC = BD</text>
  <text x="24" y="211" font-family="Arial,sans-serif" font-size="7" fill="#37474F">✓ AO = BO = CO = DO</text>

  <!-- Panel 2: Rhombus -->
  <rect x="172" y="54" width="152" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="248" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#7B1FA2">◇ Ромб</text>

  <!-- Rhombus shape -->
  <polygon points="248,82 300,120 248,158 196,120" fill="url(#rhombFill)" stroke="#7B1FA2" stroke-width="2"/>

  <!-- Equal side marks -->
  <line x1="268" y1="97" x2="272" y2="102" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="270" y1="95" x2="274" y2="100" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="281" y1="127" x2="277" y2="132" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="283" y1="125" x2="279" y2="130" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="228" y1="143" x2="224" y2="138" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="226" y1="145" x2="222" y2="140" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="215" y1="113" x2="219" y2="108" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="213" y1="115" x2="217" y2="110" stroke="#7B1FA2" stroke-width="1.3"/>

  <!-- Diagonals (perpendicular) -->
  <line x1="248" y1="82" x2="248" y2="158" stroke="#FF5722" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="196" y1="120" x2="300" y2="120" stroke="#FF5722" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>

  <!-- Right angle at center -->
  <rect x="248" y="120" width="6" height="6" fill="none" stroke="#FF5722" stroke-width="0.8"/>

  <!-- Vertex labels -->
  <text x="248" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2">A</text>
  <text x="306" y="122" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2">B</text>
  <text x="248" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2">C</text>
  <text x="189" y="122" text-anchor="end" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#7B1FA2">D</text>

  <!-- Properties -->
  <text x="182" y="178" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">✓ Все стороны равны</text>
  <text x="182" y="189" font-family="Arial,sans-serif" font-size="7" fill="#FF5722">✓ Диагонали ⊥</text>
  <text x="182" y="200" font-family="Arial,sans-serif" font-size="7" fill="#37474F">✓ Диагонали — биссектрисы</text>
  <text x="182" y="211" font-family="Arial,sans-serif" font-size="7" fill="#37474F">✓ AC ⊥ BD</text>

  <!-- Panel 3: Square -->
  <rect x="330" y="54" width="158" height="165" rx="8" fill="white" fill-opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="409" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">□ Квадрат</text>

  <!-- Square shape -->
  <rect x="369" y="80" width="70" height="70" rx="2" fill="url(#sqFill)" stroke="#E65100" stroke-width="2"/>

  <!-- Right angle marks -->
  <rect x="369" y="80" width="7" height="7" fill="none" stroke="#E91E63" stroke-width="0.8"/>
  <rect x="432" y="80" width="7" height="7" fill="none" stroke="#E91E63" stroke-width="0.8"/>
  <rect x="432" y="143" width="7" height="7" fill="none" stroke="#E91E63" stroke-width="0.8"/>
  <rect x="369" y="143" width="7" height="7" fill="none" stroke="#E91E63" stroke-width="0.8"/>

  <!-- Diagonals -->
  <line x1="369" y1="80" x2="439" y2="150" stroke="#E91E63" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>
  <line x1="439" y1="80" x2="369" y2="150" stroke="#E91E63" stroke-width="1.2" stroke-dasharray="4,2" opacity="0.7"/>

  <!-- Right angle at center where diagonals cross -->
  <rect x="404" y="115" width="5" height="5" fill="none" stroke="#FF5722" stroke-width="0.8"/>

  <!-- Equal side marks -->
  <line x1="398" y1="78" x2="398" y2="84" stroke="#E65100" stroke-width="1.3"/>
  <line x1="400" y1="78" x2="400" y2="84" stroke="#E65100" stroke-width="1.3"/>

  <!-- Vertex labels -->
  <text x="363" y="76" text-anchor="end" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">A</text>
  <text x="445" y="76" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">B</text>
  <text x="445" y="162" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">C</text>
  <text x="363" y="162" text-anchor="end" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">D</text>

  <!-- Properties -->
  <text x="338" y="172" font-family="Arial,sans-serif" font-size="7" fill="#E65100">✓ Все стороны равны</text>
  <text x="338" y="183" font-family="Arial,sans-serif" font-size="7" fill="#E91E63">✓ Все углы = 90°</text>
  <text x="338" y="194" font-family="Arial,sans-serif" font-size="7" fill="#FF5722">✓ Диагонали равны и ⊥</text>
  <text x="338" y="205" font-family="Arial,sans-serif" font-size="7" fill="#37474F">✓ = прямоугольник + ромб</text>
  <text x="338" y="214" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#E65100">S = a²</text>

  <!-- Bottom: Hierarchy diagram -->
  <rect x="14" y="225" width="474" height="65" rx="8" fill="white" fill-opacity="0.88" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="250" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0">📊 Иерархия четырёхугольников</text>

  <!-- Parallelogram box -->
  <rect x="185" y="248" width="100" height="20" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="235" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#1565C0">Параллелограмм</text>

  <!-- Rectangle box -->
  <rect x="58" y="275" width="82" height="18" rx="4" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
  <text x="99" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#2E7D32">Прямоугольник</text>

  <!-- Rhombus box -->
  <rect x="195" y="275" width="58" height="18" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="224" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#7B1FA2">Ромб</text>

  <!-- Square box -->
  <rect x="340" y="275" width="60" height="18" rx="4" fill="#FFF8E1" stroke="#E65100" stroke-width="1"/>
  <text x="370" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#E65100">Квадрат</text>

  <!-- Arrows: Parallelogram → Rectangle -->
  <line x1="200" y1="268" x2="110" y2="275" stroke="#1565C0" stroke-width="1" opacity="0.6"/>
  <!-- Parallelogram → Rhombus -->
  <line x1="235" y1="268" x2="224" y2="275" stroke="#1565C0" stroke-width="1" opacity="0.6"/>
  <!-- Rectangle → Square -->
  <line x1="140" y1="284" x2="340" y2="284" stroke="#E65100" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>
  <!-- Rhombus → Square -->
  <line x1="253" y1="284" x2="340" y2="284" stroke="#E65100" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- Subset symbols -->
  <text x="160" y="280" font-family="Arial,sans-serif" font-size="8" fill="#43A047">⊂</text>
  <text x="268" y="280" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2">⊂</text>
  <text x="315" y="282" font-family="Arial,sans-serif" font-size="7" fill="#E65100">⊂</text>

  <!-- Bottom bar -->
  <rect x="14" y="300" width="474" height="38" rx="6" fill="url(#accent3)" opacity="0.85"/>
  <text x="250" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">□ Квадрат — это прямоугольник с равными сторонами и ромб с прямыми углами</text>
  <text x="250" y="332" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E3F2FD">Прямоугольник: все углы 90°, диагонали равны | Ромб: все стороны равны, диагонали ⊥</text>
</svg>