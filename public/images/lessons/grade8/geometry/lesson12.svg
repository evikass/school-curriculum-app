<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14213d"/>
      <stop offset="100%" stop-color="#1b2a4a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Triangle -->
  <polygon points="160,200 340,200 250,70" fill="none" stroke="#4cc9f0" stroke-width="2"/>
  <!-- Inscribed circle (inside triangle) -->
  <circle cx="250" cy="155" r="48" fill="none" stroke="#f72585" stroke-width="2"/>
  <!-- Incircle center I -->
  <circle cx="250" cy="155" r="3" fill="#f72585"/>
  <text x="255" y="152" fill="#f72585" font-size="10" font-weight="bold">I</text>
  <!-- Perpendicular from I to sides -->
  <line x1="250" y1="155" x2="250" y2="200" stroke="#f72585" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="253" y="182" fill="#f72585" font-size="9">r</text>
  <!-- Right angle at tangent point -->
  <rect x="250" y="192" width="6" height="6" fill="none" stroke="#f72585" stroke-width="0.7"/>
  <!-- Circumscribed circle (around triangle) -->
  <circle cx="250" cy="160" r="100" fill="none" stroke="#4361ee" stroke-width="2"/>
  <!-- Circumcenter O -->
  <circle cx="250" cy="160" r="3" fill="#4361ee"/>
  <text x="255" y="157" fill="#4361ee" font-size="10" font-weight="bold">O</text>
  <!-- Vertices on circumscribed circle -->
  <circle cx="160" cy="200" r="4" fill="#4cc9f0"/>
  <circle cx="340" cy="200" r="4" fill="#4cc9f0"/>
  <circle cx="250" cy="70" r="4" fill="#4cc9f0"/>
  <!-- Vertex labels -->
  <text x="143" y="215" fill="#4cc9f0" font-size="11" font-weight="bold">A</text>
  <text x="345" y="215" fill="#4cc9f0" font-size="11" font-weight="bold">B</text>
  <text x="244" y="63" fill="#4cc9f0" font-size="11" font-weight="bold">C</text>
  <!-- Radius of circumscribed -->
  <line x1="250" y1="160" x2="340" y2="200" stroke="#4361ee" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="290" y="172" fill="#4361ee" font-size="9">R</text>
  <!-- Properties panel -->
  <text x="30" y="35" fill="#f72585" font-size="13" font-weight="bold">Вписанная окружность</text>
  <text x="30" y="55" fill="#e0aaff" font-size="11">• Касается всех сторон</text>
  <text x="30" y="70" fill="#e0aaff" font-size="11">• Центр — пересечение биссектрис</text>
  <text x="30" y="85" fill="#e0aaff" font-size="11">• r = S/p (S — площадь, p — полупериметр)</text>
  <text x="30" y="115" fill="#4361ee" font-size="13" font-weight="bold">Описанная окружность</text>
  <text x="30" y="135" fill="#a8d8ea" font-size="11">• Проходит через все вершины</text>
  <text x="30" y="150" fill="#a8d8ea" font-size="11">• Центр — пересечение серединных ⊥</text>
  <text x="30" y="165" fill="#a8d8ea" font-size="11">• R = abc/(4S)</text>
  <!-- Euler formula -->
  <line x1="250" y1="155" x2="250" y2="160" stroke="#ffd166" stroke-width="2"/>
  <text x="380" y="280" fill="#ffd166" font-size="11" font-weight="bold">OI = R² − 2Rr</text>
  <text x="380" y="300" fill="#7f8c8d" font-size="10">Формула Эйлера</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Вписанная и описанная окружности</text>
</svg>