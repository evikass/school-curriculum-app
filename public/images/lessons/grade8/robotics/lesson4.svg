<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgR4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b263b"/>
    </linearGradient>
    <marker id="arrowR4" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ffd93d"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bgR4)"/>
  <!-- Code editor (left) -->
  <rect x="15" y="20" width="210" height="220" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <rect x="15" y="20" width="210" height="22" rx="8" fill="#161b22"/>
  <circle cx="30" cy="31" r="4" fill="#ff5f56"/>
  <circle cx="42" cy="31" r="4" fill="#ffbd2e"/>
  <circle cx="54" cy="31" r="4" fill="#27c93f"/>
  <text x="130" y="35" fill="#8b949e" font-size="9" font-family="monospace" text-anchor="middle">sketch.ino</text>
  <text fill="#c9d1d9" font-size="9" font-family="monospace">
    <tspan x="25" y="58" fill="#ff7b72">void</tspan><tspan fill="#79c0ff"> setup</tspan><tspan fill="#c9d1d9">() {</tspan>
    <tspan x="25" y="72" fill="#7ee787">  pinMode(13, OUTPUT);</tspan>
    <tspan x="25" y="86" fill="#c9d1d9">}</tspan>
    <tspan x="25" y="106" fill="#ff7b72">void</tspan><tspan fill="#79c0ff"> loop</tspan><tspan fill="#c9d1d9">() {</tspan>
    <tspan x="25" y="120" fill="#7ee787">  digitalWrite(13,</tspan>
    <tspan x="25" y="134" fill="#a5d6ff">               HIGH</tspan><tspan fill="#c9d1d9">);</tspan>
    <tspan x="25" y="148" fill="#7ee787">  delay(1000);</tspan>
    <tspan x="25" y="162" fill="#7ee787">  digitalWrite(13,</tspan>
    <tspan x="25" y="176" fill="#a5d6ff">               LOW</tspan><tspan fill="#c9d1d9">);</tspan>
    <tspan x="25" y="190" fill="#7ee787">  delay(1000);</tspan>
    <tspan x="25" y="204" fill="#c9d1d9">}</tspan>
  </text>
  <!-- Upload arrow -->
  <g transform="translate(235, 100)">
    <rect width="40" height="40" rx="8" fill="#00b894" opacity="0.2" stroke="#00b894" stroke-width="1"/>
    <polygon points="20,8 30,22 24,22 24,34 16,34 16,22 10,22" fill="#00b894"/>
    <text x="20" y="50" fill="#00b894" font-size="8" font-family="monospace" text-anchor="middle">Upload</text>
  </g>
  <!-- Arrow from code to board -->
  <path d="M275,120 Q300,120 310,100" fill="none" stroke="#ffd93d" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrowR4)"/>
  <!-- Arduino board (right) -->
  <rect x="300" y="20" width="180" height="140" rx="6" fill="#00695c" stroke="#004d40" stroke-width="1.5"/>
  <!-- Board details -->
  <rect x="340" y="55" width="50" height="40" rx="2" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="365" y="78" fill="#4db6ac" font-size="7" font-family="monospace" text-anchor="middle">ATmega</text>
  <!-- USB -->
  <rect x="360" y="20" width="40" height="14" rx="2" fill="#bbb" stroke="#999" stroke-width="0.5"/>
  <!-- LED on pin 13 -->
  <circle cx="450" cy="50" r="6" fill="#ff5f56">
    <animate attributeName="fill" values="#ff5f56;#333;#ff5f56" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="450" y="68" fill="#ffd93d" font-size="7" font-family="monospace" text-anchor="middle">LED 13</text>
  <!-- Pins -->
  <g fill="#ffd93d">
    <rect x="310" y="25" width="5" height="8"/><rect x="320" y="25" width="5" height="8"/>
    <rect x="330" y="25" width="5" height="8"/><rect x="310" y="145" width="5" height="8"/>
    <rect x="320" y="145" width="5" height="8"/><rect x="330" y="145" width="5" height="8"/>
    <rect x="340" y="145" width="5" height="8"/>
  </g>
  <text x="390" y="125" fill="#4db6ac" font-size="10" font-family="monospace" text-anchor="middle">Arduino UNO</text>
  <!-- Wire from pin 13 to LED -->
  <path d="M465,50 L480,50 L480,85 L450,85" fill="none" stroke="#ff5f56" stroke-width="1.5"/>
  <!-- External LED circuit -->
  <g transform="translate(420, 75)">
    <!-- LED symbol -->
    <polygon points="0,0 20,10 0,20" fill="none" stroke="#ff5f56" stroke-width="1.5"/>
    <line x1="20" y1="0" x2="20" y2="20" stroke="#ff5f56" stroke-width="1.5"/>
    <!-- Resistor -->
    <path d="M20,10 L25,5 L30,15 L35,5 L40,15 L45,5 L50,10" fill="none" stroke="#e17055" stroke-width="1.5"/>
    <line x1="50" y1="10" x2="60" y2="10" stroke="#333" stroke-width="1.5"/>
    <!-- GND symbol -->
    <line x1="55" y1="10" x2="65" y2="10" stroke="#333" stroke-width="1.5"/>
    <line x1="55" y1="14" x2="65" y2="14" stroke="#333" stroke-width="1"/>
    <line x1="57" y1="18" x2="63" y2="18" stroke="#333" stroke-width="0.8"/>
  </g>
  <!-- Flow diagram (bottom) -->
  <rect x="15" y="260" width="470" height="65" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="250" y="278" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">Цикл работы Arduino:</text>
  <!-- Flow steps -->
  <rect x="30" y="286" width="80" height="28" rx="4" fill="#6c5ce7"/>
  <text x="70" y="304" fill="white" font-size="9" font-family="monospace" text-anchor="middle">setup()</text>
  <text x="122" y="304" fill="#aaa" font-size="12">→</text>
  <rect x="140" y="286" width="90" height="28" rx="4" fill="#00b894"/>
  <text x="185" y="304" fill="white" font-size="9" font-family="monospace" text-anchor="middle">loop()</text>
  <text x="242" y="304" fill="#aaa" font-size="12">→</text>
  <rect x="260" y="286" width="90" height="28" rx="4" fill="#e17055"/>
  <text x="305" y="304" fill="white" font-size="9" font-family="monospace" text-anchor="middle">loop()</text>
  <text x="362" y="304" fill="#aaa" font-size="12">→</text>
  <text x="380" y="304" fill="#ffd93d" font-size="14">...</text>
  <text x="410" y="304" fill="#aaa" font-size="9">∞ повтор</text>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Программирование Arduino</text>
</svg>