<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corner accents -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#455A64" text-anchor="middle">Программирование роботов</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Робототехника - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#455A64" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="5" fill="#455A64" opacity="0.18" rx="1"/>
  <rect x="410" y="75" width="60" height="5" fill="#1565C0" opacity="0.12" rx="1"/>
  <!-- ILLUSTRATION AREA: x=15..485, y=85..300 -->
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
  <rect x="15" y="85" width="470" height="215" fill="#F3E5F5"/><g transform="translate(200,190) scale(1.5)">
      <rect x="-18" y="-30" width="36" height="30" rx="5" fill="#78909C" stroke="#455A64" stroke-width="1.5"/>
      <circle cx="-7" cy="-18" r="5" fill="#4FC3F7"/>
      <circle cx="7" cy="-18" r="5" fill="#4FC3F7"/>
      <circle cx="-7" cy="-18" r="2" fill="#1565C0"/>
      <circle cx="7" cy="-18" r="2" fill="#1565C0"/>
      <rect x="-10" y="-8" width="20" height="4" rx="2" fill="#455A64"/>
      <line x1="-8" y1="-1" x2="-18" y2="15" stroke="#78909C" stroke-width="4" stroke-linecap="round"/>
      <line x1="8" y1="-1" x2="18" y2="15" stroke="#78909C" stroke-width="4" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="-8" y2="18" stroke="#78909C" stroke-width="4" stroke-linecap="round"/>
      <line x1="8" y1="0" x2="8" y2="18" stroke="#78909C" stroke-width="4" stroke-linecap="round"/>
      <line x1="-22" y1="-40" x2="-10" y2="-30" stroke="#78909C" stroke-width="2"/>
      <circle cx="-22" cy="-42" r="3" fill="#C62828"/>
    </g><rect x="280" y="130" width="170" height="120" rx="5" fill="#1E1E2E" stroke="#333" stroke-width="1.5"/><text x="295" y="155" font-family="monospace" font-size="10" fill="#81C784">robot.forward(100)</text><text x="295" y="175" font-family="monospace" font-size="10" fill="#81C784">robot.turnRight(90)</text><text x="295" y="195" font-family="monospace" font-size="10" fill="#89DDFF">if</text><text x="310" y="195" font-family="monospace" font-size="10" fill="#C792EA">sensor:</text><text x="305" y="215" font-family="monospace" font-size="10" fill="#82AAFF">robot.stop()</text>
  </g>
  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#F9A825" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Робототехника</text>
</svg>