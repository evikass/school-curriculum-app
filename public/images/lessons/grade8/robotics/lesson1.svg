<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgR1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#162447"/>
    </linearGradient>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8e9aaf"/>
      <stop offset="50%" stop-color="#6b7b8d"/>
      <stop offset="100%" stop-color="#4a5568"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgR1)"/>
  <!-- Robot arm (left) -->
  <g transform="translate(80, 50)">
    <!-- Base -->
    <rect x="10" y="200" width="80" height="20" rx="4" fill="#4a5568"/>
    <rect x="25" y="180" width="50" height="25" rx="3" fill="url(#metalGrad)"/>
    <!-- Lower arm -->
    <rect x="42" y="100" width="16" height="85" rx="4" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <!-- Joint -->
    <circle cx="50" cy="100" r="10" fill="#ffd93d" stroke="#e0b429" stroke-width="1.5"/>
    <!-- Upper arm -->
    <rect x="42" y="40" width="16" height="65" rx="4" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <!-- Shoulder joint -->
    <circle cx="50" cy="40" r="8" fill="#ffd93d" stroke="#e0b429" stroke-width="1.5"/>
    <!-- Gripper -->
    <path d="M35,40 L25,25 L30,20 L42,30 L42,50 L30,60 L25,55 Z" fill="#e17055" stroke="#d63031" stroke-width="1"/>
    <path d="M65,40 L75,25 L70,20 L58,30 L58,50 L70,60 L75,55 Z" fill="#e17055" stroke="#d63031" stroke-width="1"/>
    <text x="50" y="235" fill="#8b949e" font-size="10" font-family="sans-serif" text-anchor="middle">Робот-манипулятор</text>
  </g>
  <!-- Rover (center) -->
  <g transform="translate(190, 110)">
    <!-- Body -->
    <rect x="10" y="30" width="100" height="50" rx="8" fill="#6c5ce7" stroke="#5f3dc4" stroke-width="1.5"/>
    <!-- Solar panel -->
    <rect x="15" y="20" width="40" height="12" rx="2" fill="#2d5a8a" stroke="#4a8ec4" stroke-width="0.5"/>
    <line x1="25" y1="20" x2="25" y2="32" stroke="#4a8ec4" stroke-width="0.5"/>
    <line x1="35" y1="20" x2="35" y2="32" stroke="#4a8ec4" stroke-width="0.5"/>
    <line x1="45" y1="20" x2="45" y2="32" stroke="#4a8ec4" stroke-width="0.5"/>
    <!-- Camera -->
    <rect x="95" y="35" width="20" height="15" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="115" cy="42" r="5" fill="#00b894"/>
    <circle cx="115" cy="42" r="2" fill="#006644"/>
    <!-- Antenna -->
    <line x1="30" y1="20" x2="20" y2="0" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="20" cy="0" r="3" fill="#ff5f56"/>
    <!-- Wheels -->
    <circle cx="30" cy="85" r="12" fill="#333" stroke="#555" stroke-width="2"/>
    <circle cx="30" cy="85" r="5" fill="#555"/>
    <circle cx="90" cy="85" r="12" fill="#333" stroke="#555" stroke-width="2"/>
    <circle cx="90" cy="85" r="5" fill="#555"/>
    <!-- Axle -->
    <line x1="30" y1="80" x2="30" y2="80" stroke="#666" stroke-width="3"/>
    <line x1="90" y1="80" x2="90" y2="80" stroke="#666" stroke-width="3"/>
    <text x="60" y="115" fill="#8b949e" font-size="10" font-family="sans-serif" text-anchor="middle">Марсоход</text>
  </g>
  <!-- Humanoid (right) -->
  <g transform="translate(370, 30)">
    <!-- Head -->
    <rect x="20" y="0" width="40" height="35" rx="10" fill="url(#metalGrad)" stroke="#6b7b8d" stroke-width="1.5"/>
    <!-- Eyes -->
    <circle cx="32" cy="14" r="5" fill="#00b894"/>
    <circle cx="48" cy="14" r="5" fill="#00b894"/>
    <circle cx="33" cy="13" r="2" fill="#006644"/>
    <circle cx="49" cy="13" r="2" fill="#006644"/>
    <!-- Mouth -->
    <rect x="30" y="24" width="20" height="4" rx="2" fill="#333"/>
    <!-- Neck -->
    <rect x="35" y="35" width="10" height="10" fill="#6b7b8d"/>
    <!-- Body -->
    <rect x="15" y="45" width="50" height="65" rx="6" fill="url(#metalGrad)" stroke="#6b7b8d" stroke-width="1"/>
    <!-- Chest light -->
    <circle cx="40" cy="65" r="8" fill="#6c5ce7" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Arms -->
    <rect x="0" y="48" width="15" height="50" rx="5" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <rect x="65" y="48" width="15" height="50" rx="5" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <!-- Hands -->
    <circle cx="7" cy="100" r="7" fill="#ffd93d" stroke="#e0b429" stroke-width="1"/>
    <circle cx="72" cy="100" r="7" fill="#ffd93d" stroke="#e0b429" stroke-width="1"/>
    <!-- Legs -->
    <rect x="20" y="110" width="14" height="55" rx="4" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <rect x="46" y="110" width="14" height="55" rx="4" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <!-- Feet -->
    <rect x="15" y="160" width="24" height="10" rx="3" fill="#4a5568"/>
    <rect x="41" y="160" width="24" height="10" rx="3" fill="#4a5568"/>
    <text x="40" y="190" fill="#8b949e" font-size="10" font-family="sans-serif" text-anchor="middle">Гуманоид</text>
  </g>
  <!-- Connecting circuit lines -->
  <g stroke="#6c5ce7" stroke-width="0.5" opacity="0.2" stroke-dasharray="4,4">
    <line x1="130" y1="150" x2="190" y2="150"/>
    <line x1="300" y1="150" x2="370" y2="150"/>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Что такое робот</text>
</svg>