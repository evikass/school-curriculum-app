<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgR6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a3045"/>
    </linearGradient>
    <linearGradient id="metalR6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="50%" stop-color="#78909c"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgR6)"/>
  <!-- DC Motor (left) -->
  <g transform="translate(20, 25)">
    <rect x="0" y="0" width="150" height="140" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1.5"/>
    <text x="75" y="18" fill="#6c5ce7" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Двигатель постоянного тока</text>
    <!-- Motor body -->
    <rect x="25" y="30" width="70" height="60" rx="6" fill="url(#metalR6)" stroke="#546e7a" stroke-width="1.5"/>
    <circle cx="60" cy="60" r="15" fill="#333" stroke="#555" stroke-width="1.5"/>
    <circle cx="60" cy="60" r="8" fill="#444"/>
    <circle cx="60" cy="60" r="3" fill="#666"/>
    <!-- Shaft -->
    <rect x="95" y="54" width="30" height="12" rx="2" fill="#888" stroke="#666" stroke-width="1"/>
    <!-- Wires -->
    <line x1="30" y1="95" x2="30" y2="115" stroke="#ff5f56" stroke-width="2.5"/>
    <line x1="50" y1="95" x2="50" y2="115" stroke="#3333ff" stroke-width="2.5"/>
    <text x="30" y="130" fill="#ff5f56" font-size="7" font-family="monospace">+</text>
    <text x="50" y="130" fill="#3333ff" font-size="7" font-family="monospace">−</text>
    <!-- Rotation arrow -->
    <path d="M55,40 A10,10 0 1,1 65,40" fill="none" stroke="#ffd93d" stroke-width="1.5"/>
    <polygon points="65,40 62,35 68,37" fill="#ffd93d"/>
    <text x="75" y="130" fill="#8b949e" font-size="8" font-family="monospace" text-anchor="middle">3-12В, 200-10000 об/мин</text>
  </g>
  <!-- Servo motor (center) -->
  <g transform="translate(180, 25)">
    <rect x="0" y="0" width="150" height="140" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1.5"/>
    <text x="75" y="18" fill="#00b894" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Сервопривод</text>
    <!-- Servo body -->
    <rect x="20" y="30" width="85" height="50" rx="6" fill="url(#metalR6)" stroke="#546e7a" stroke-width="1.5"/>
    <!-- Servo top -->
    <rect x="20" y="25" width="85" height="10" rx="3" fill="#333" stroke="#555" stroke-width="1"/>
    <!-- Shaft -->
    <circle cx="70" cy="30" r="6" fill="#888" stroke="#666" stroke-width="1"/>
    <!-- Horn -->
    <rect x="60" y="18" width="25" height="10" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <!-- Wires -->
    <line x1="35" y1="80" x2="35" y2="105" stroke="#ff5f56" stroke-width="2.5"/>
    <line x1="50" y1="80" x2="50" y2="105" stroke="#333" stroke-width="2.5"/>
    <line x1="65" y1="80" x2="65" y2="105" stroke="#ffd93d" stroke-width="2.5"/>
    <text x="35" y="120" fill="#ff5f56" font-size="7" font-family="monospace">VCC</text>
    <text x="50" y="120" fill="#aaa" font-size="7" font-family="monospace">GND</text>
    <text x="65" y="120" fill="#ffd93d" font-size="7" font-family="monospace">SIG</text>
    <!-- Angle arc -->
    <path d="M70,50 A25,25 0 0,1 45,65" fill="none" stroke="#00b894" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="42" y="55" fill="#00b894" font-size="8" font-family="monospace">0°-180°</text>
    <text x="75" y="130" fill="#8b949e" font-size="8" font-family="monospace" text-anchor="middle">Точный угол, ШИМ</text>
  </g>
  <!-- H-Bridge (right) -->
  <g transform="translate(340, 25)">
    <rect x="0" y="0" width="150" height="140" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1.5"/>
    <text x="75" y="18" fill="#e17055" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">H-мост (L298N)</text>
    <!-- H-Bridge chip -->
    <rect x="30" y="30" width="90" height="60" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
    <text x="75" y="60" fill="#e17055" font-size="10" font-family="monospace" text-anchor="middle">L298N</text>
    <text x="75" y="75" fill="#aaa" font-size="7" font-family="monospace" text-anchor="middle">Dual H-Bridge</text>
    <!-- H-bridge circuit diagram -->
    <g transform="translate(40, 100)" stroke="#ffd93d" stroke-width="1" fill="none" opacity="0.6">
      <!-- Switches forming H -->
      <line x1="0" y1="0" x2="0" y2="30"/>
      <line x1="70" y1="0" x2="70" y2="30"/>
      <line x1="0" y1="0" x2="20" y2="0"/>
      <line x1="50" y1="0" x2="70" y2="0"/>
      <line x1="0" y1="30" x2="20" y2="30"/>
      <line x1="50" y1="30" x2="70" y2="30"/>
      <!-- Motor in middle -->
      <circle cx="35" cy="15" r="8" fill="none" stroke="#00b894"/>
      <text x="35" y="18" fill="#00b894" font-size="7" font-family="monospace" text-anchor="middle">M</text>
      <line x1="20" y1="15" x2="27" y2="15"/>
      <line x1="43" y1="15" x2="50" y2="15"/>
      <!-- Switch symbols -->
      <line x1="20" y1="0" x2="30" y2="8" stroke="#e17055" stroke-width="1.5"/>
      <line x1="40" y1="0" x2="50" y2="8" stroke="#e17055" stroke-width="1.5"/>
      <line x1="20" y1="30" x2="30" y2="22" stroke="#e17055" stroke-width="1.5"/>
      <line x1="40" y1="30" x2="50" y2="22" stroke="#e17055" stroke-width="1.5"/>
    </g>
  </g>
  <!-- Driver table -->
  <rect x="15" y="180" width="470" height="140" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="250" y="200" fill="#e0e0e0" font-size="12" font-family="sans-serif" text-anchor="middle" font-weight="bold">Драйверы моторов</text>
  <!-- Table content -->
  <text x="70" y="222" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">Драйвер</text>
  <text x="170" y="222" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">Моторы</text>
  <text x="270" y="222" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">Ток</text>
  <text x="370" y="222" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">Напряж.</text>
  <text x="450" y="222" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">ШИМ</text>
  <line x1="25" y1="228" x2="475" y2="228" stroke="#30363d" stroke-width="1"/>
  <text x="70" y="245" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">L298N</text>
  <text x="170" y="245" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">2 DC</text>
  <text x="270" y="245" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">2A</text>
  <text x="370" y="245" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">5-35В</text>
  <text x="450" y="245" fill="#00b894" font-size="9" font-family="monospace" text-anchor="middle">Да</text>
  <text x="70" y="265" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">L293D</text>
  <text x="170" y="265" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">2 DC</text>
  <text x="270" y="265" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">0.6A</text>
  <text x="370" y="265" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">4.5-36В</text>
  <text x="450" y="265" fill="#00b894" font-size="9" font-family="monospace" text-anchor="middle">Да</text>
  <text x="70" y="285" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">TB6612</text>
  <text x="170" y="285" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">2 DC</text>
  <text x="270" y="285" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">1.2A</text>
  <text x="370" y="285" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">2.5-13В</text>
  <text x="450" y="285" fill="#00b894" font-size="9" font-family="monospace" text-anchor="middle">Да</text>
  <text x="70" y="305" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">Servo lib</text>
  <text x="170" y="305" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">1 Servo</text>
  <text x="270" y="305" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">—</text>
  <text x="370" y="305" fill="#c9d1d9" font-size="9" font-family="monospace" text-anchor="middle">5В</text>
  <text x="450" y="305" fill="#ffd93d" font-size="9" font-family="monospace" text-anchor="middle">ШИМ</text>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Моторы и драйверы</text>
</svg>