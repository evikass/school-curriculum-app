<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgR3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="pcbGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00897b"/>
      <stop offset="100%" stop-color="#00695c"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgR3)"/>
  <!-- Arduino board -->
  <rect x="80" y="30" width="280" height="240" rx="6" fill="url(#pcbGreen)" stroke="#004d40" stroke-width="2"/>
  <!-- PCB traces -->
  <g stroke="#4db6ac" stroke-width="0.5" opacity="0.3">
    <line x1="100" y1="50" x2="100" y2="250"/>
    <line x1="140" y1="50" x2="340" y2="50"/>
    <line x1="140" y1="100" x2="340" y2="100"/>
    <line x1="200" y1="50" x2="200" y2="250"/>
    <line x1="300" y1="50" x2="300" y2="250"/>
    <line x1="100" y1="150" x2="340" y2="150"/>
    <line x1="100" y1="200" x2="340" y2="200"/>
  </g>
  <!-- USB connector -->
  <rect x="170" y="25" width="60" height="20" rx="2" fill="#bbb" stroke="#999" stroke-width="1"/>
  <rect x="178" y="28" width="44" height="14" rx="1" fill="#333"/>
  <text x="200" y="22" fill="#aaa" font-size="7" font-family="monospace" text-anchor="middle">USB</text>
  <!-- Microcontroller chip -->
  <rect x="175" y="100" width="70" height="70" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <circle cx="183" cy="108" r="2" fill="#555"/>
  <!-- Chip pins left -->
  <g fill="#aaa">
    <rect x="168" y="108" width="7" height="3"/><rect x="168" y="116" width="7" height="3"/>
    <rect x="168" y="124" width="7" height="3"/><rect x="168" y="132" width="7" height="3"/>
    <rect x="168" y="140" width="7" height="3"/><rect x="168" y="148" width="7" height="3"/>
    <rect x="168" y="156" width="7" height="3"/>
  </g>
  <!-- Chip pins right -->
  <g fill="#aaa">
    <rect x="245" y="108" width="7" height="3"/><rect x="245" y="116" width="7" height="3"/>
    <rect x="245" y="124" width="7" height="3"/><rect x="245" y="132" width="7" height="3"/>
    <rect x="245" y="140" width="7" height="3"/><rect x="245" y="148" width="7" height="3"/>
    <rect x="245" y="156" width="7" height="3"/>
  </g>
  <text x="210" y="140" fill="#4db6ac" font-size="8" font-family="monospace" text-anchor="middle">ATmega</text>
  <text x="210" y="152" fill="#4db6ac" font-size="8" font-family="monospace" text-anchor="middle">328P</text>
  <!-- Crystal oscillator -->
  <rect x="265" y="105" width="16" height="24" rx="2" fill="#c0c0c0" stroke="#999" stroke-width="0.5"/>
  <text x="273" y="120" fill="#333" font-size="5" font-family="monospace" text-anchor="middle">16M</text>
  <!-- Power LED -->
  <circle cx="145" cy="110" r="4" fill="#00b894">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="145" y="122" fill="#7ee787" font-size="6" font-family="monospace" text-anchor="middle">PWR</text>
  <!-- TX/RX LEDs -->
  <circle cx="145" cy="135" r="3" fill="#ffd93d"/>
  <text x="145" y="145" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">TX</text>
  <circle cx="145" cy="155" r="3" fill="#e17055"/>
  <text x="145" y="165" fill="#e17055" font-size="6" font-family="monospace" text-anchor="middle">RX</text>
  <!-- Digital pins (top) -->
  <g fill="#ffd93d">
    <rect x="100" y="35" width="6" height="10" rx="1"/>
    <rect x="112" y="35" width="6" height="10" rx="1"/>
    <rect x="124" y="35" width="6" height="10" rx="1"/>
    <rect x="136" y="35" width="6" height="10" rx="1"/>
    <rect x="268" y="35" width="6" height="10" rx="1"/>
    <rect x="280" y="35" width="6" height="10" rx="1"/>
    <rect x="292" y="35" width="6" height="10" rx="1"/>
    <rect x="304" y="35" width="6" height="10" rx="1"/>
    <rect x="316" y="35" width="6" height="10" rx="1"/>
    <rect x="328" y="35" width="6" height="10" rx="1"/>
    <rect x="340" y="35" width="6" height="10" rx="1"/>
  </g>
  <!-- Analog pins (bottom) -->
  <g fill="#79c0ff">
    <rect x="100" y="255" width="6" height="10" rx="1"/>
    <rect x="112" y="255" width="6" height="10" rx="1"/>
    <rect x="124" y="255" width="6" height="10" rx="1"/>
    <rect x="136" y="255" width="6" height="10" rx="1"/>
    <rect x="148" y="255" width="6" height="10" rx="1"/>
    <rect x="160" y="255" width="6" height="10" rx="1"/>
  </g>
  <!-- Power pins (bottom right) -->
  <g fill="#e17055">
    <rect x="270" y="255" width="6" height="10" rx="1"/>
    <rect x="282" y="255" width="6" height="10" rx="1"/>
    <rect x="294" y="255" width="6" height="10" rx="1"/>
    <rect x="306" y="255" width="6" height="10" rx="1"/>
    <rect x="318" y="255" width="6" height="10" rx="1"/>
  </g>
  <!-- Pin labels -->
  <text x="103" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D0</text>
  <text x="115" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D1</text>
  <text x="127" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D2</text>
  <text x="139" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D3</text>
  <text x="271" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D8</text>
  <text x="283" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D9</text>
  <text x="295" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D10</text>
  <text x="307" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D11</text>
  <text x="319" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D12</text>
  <text x="331" y="58" fill="#ffd93d" font-size="6" font-family="monospace" text-anchor="middle">D13</text>
  <text x="103" y="274" fill="#79c0ff" font-size="6" font-family="monospace" text-anchor="middle">A0</text>
  <text x="115" y="274" fill="#79c0ff" font-size="6" font-family="monospace" text-anchor="middle">A1</text>
  <text x="127" y="274" fill="#79c0ff" font-size="6" font-family="monospace" text-anchor="middle">A2</text>
  <text x="139" y="274" fill="#79c0ff" font-size="6" font-family="monospace" text-anchor="middle">A3</text>
  <text x="151" y="274" fill="#79c0ff" font-size="6" font-family="monospace" text-anchor="middle">A4</text>
  <text x="163" y="274" fill="#79c0ff" font-size="6" font-family="monospace" text-anchor="middle">A5</text>
  <text x="273" y="274" fill="#e17055" font-size="6" font-family="monospace" text-anchor="middle">5V</text>
  <text x="285" y="274" fill="#e17055" font-size="6" font-family="monospace" text-anchor="middle">3V</text>
  <text x="297" y="274" fill="#e17055" font-size="6" font-family="monospace" text-anchor="middle">GND</text>
  <text x="309" y="274" fill="#e17055" font-size="6" font-family="monospace" text-anchor="middle">VIN</text>
  <!-- Reset button -->
  <circle cx="330" cy="90" r="8" fill="#e17055" stroke="#d63031" stroke-width="1"/>
  <text x="330" y="105" fill="#e17055" font-size="6" font-family="monospace" text-anchor="middle">RST</text>
  <!-- Board name -->
  <text x="220" y="240" fill="#4db6ac" font-size="14" font-family="monospace" text-anchor="middle" font-weight="bold">ARDUINO UNO</text>
  <!-- Side info -->
  <g transform="translate(385, 40)">
    <rect width="100" height="200" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <text x="50" y="18" fill="#ffd93d" font-size="10" font-family="monospace" text-anchor="middle">Характеристики</text>
    <text x="10" y="38" fill="#79c0ff" font-size="9" font-family="monospace">МК: ATmega328</text>
    <text x="10" y="55" fill="#79c0ff" font-size="9" font-family="monospace">Частота: 16 МГц</text>
    <text x="10" y="72" fill="#79c0ff" font-size="9" font-family="monospace">Flash: 32 КБ</text>
    <text x="10" y="89" fill="#79c0ff" font-size="9" font-family="monospace">SRAM: 2 КБ</text>
    <text x="10" y="106" fill="#79c0ff" font-size="9" font-family="monospace">Пины I/O: 14</text>
    <text x="10" y="123" fill="#79c0ff" font-size="9" font-family="monospace">Аналог: 6</text>
    <text x="10" y="140" fill="#79c0ff" font-size="9" font-family="monospace">UART: 1</text>
    <text x="10" y="157" fill="#79c0ff" font-size="9" font-family="monospace">Напряж: 5В</text>
    <text x="10" y="180" fill="#00b894" font-size="9" font-family="monospace">Открытый</text>
    <text x="10" y="195" fill="#00b894" font-size="9" font-family="monospace">исходный код</text>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Знакомство с Arduino</text>
</svg>