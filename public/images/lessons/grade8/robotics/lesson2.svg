<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgR2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgR2)"/>
  <!-- Industrial robot -->
  <g transform="translate(20, 20)">
    <rect x="0" y="120" width="100" height="80" rx="4" fill="#e17055" opacity="0.15" stroke="#e17055" stroke-width="1.5"/>
    <!-- Robot arm on assembly line -->
    <rect x="30" y="60" width="40" height="60" rx="4" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <rect x="40" y="30" width="20" height="35" rx="3" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <circle cx="50" cy="30" r="6" fill="#ffd93d"/>
    <!-- Welding spark -->
    <circle cx="50" cy="100" r="4" fill="#ffd93d">
      <animate attributeName="r" values="4;6;4" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="50" y1="96" x2="50" y2="88" stroke="#ffd93d" stroke-width="1" opacity="0.6"/>
    <line x1="46" y1="100" x2="40" y2="96" stroke="#ffd93d" stroke-width="1" opacity="0.6"/>
    <line x1="54" y1="100" x2="60" y2="96" stroke="#ffd93d" stroke-width="1" opacity="0.6"/>
    <!-- Assembly line -->
    <rect x="5" y="130" width="90" height="6" rx="2" fill="#555"/>
    <rect x="10" y="140" width="20" height="15" rx="2" fill="#e17055" opacity="0.4"/>
    <rect x="40" y="140" width="20" height="15" rx="2" fill="#e17055" opacity="0.4"/>
    <rect x="70" y="140" width="20" height="15" rx="2" fill="#e17055" opacity="0.4"/>
    <text x="50" y="175" fill="#e17055" font-size="10" font-family="sans-serif" text-anchor="middle">Промышленный</text>
  </g>
  <!-- Medical robot -->
  <g transform="translate(140, 20)">
    <rect x="0" y="120" width="100" height="80" rx="4" fill="#00b894" opacity="0.15" stroke="#00b894" stroke-width="1.5"/>
    <!-- Robot arm surgical -->
    <rect x="35" y="25" width="30" height="10" rx="3" fill="#8e9aaf"/>
    <rect x="42" y="35" width="16" height="40" rx="3" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <rect x="38" y="75" width="24" height="8" rx="2" fill="#00b894"/>
    <!-- Scapel tip -->
    <polygon points="45,83 55,83 50,95" fill="#e0e0e0"/>
    <!-- Medical cross -->
    <rect x="42" y="100" width="16" height="5" rx="1" fill="#ff5f56"/>
    <rect x="47" y="95" width="6" height="15" rx="1" fill="#ff5f56"/>
    <text x="50" y="175" fill="#00b894" font-size="10" font-family="sans-serif" text-anchor="middle">Медицинский</text>
  </g>
  <!-- Space robot -->
  <g transform="translate(260, 20)">
    <rect x="0" y="120" width="100" height="80" rx="4" fill="#6c5ce7" opacity="0.15" stroke="#6c5ce7" stroke-width="1.5"/>
    <!-- Satellite body -->
    <rect x="30" y="35" width="40" height="35" rx="4" fill="#8e9aaf" stroke="#6b7b8d" stroke-width="1"/>
    <!-- Solar panels -->
    <rect x="0" y="40" width="28" height="25" rx="2" fill="#2d5a8a" stroke="#4a8ec4" stroke-width="0.5"/>
    <line x1="7" y1="40" x2="7" y2="65" stroke="#4a8ec4" stroke-width="0.5"/>
    <line x1="14" y1="40" x2="14" y2="65" stroke="#4a8ec4" stroke-width="0.5"/>
    <line x1="21" y1="40" x2="21" y2="65" stroke="#4a8ec4" stroke-width="0.5"/>
    <rect x="72" y="40" width="28" height="25" rx="2" fill="#2d5a8a" stroke="#4a8ec4" stroke-width="0.5"/>
    <line x1="79" y1="40" x2="79" y2="65" stroke="#4a8ec4" stroke-width="0.5"/>
    <line x1="86" y1="40" x2="86" y2="65" stroke="#4a8ec4" stroke-width="0.5"/>
    <line x1="93" y1="40" x2="93" y2="65" stroke="#4a8ec4" stroke-width="0.5"/>
    <!-- Antenna -->
    <line x1="50" y1="35" x2="50" y2="18" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="50" cy="15" r="4" fill="#ffd93d"/>
    <!-- Dish -->
    <ellipse cx="60" cy="55" rx="6" ry="8" fill="#ccc" stroke="#999" stroke-width="0.5"/>
    <!-- Stars -->
    <circle cx="10" cy="20" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="85" cy="25" r="1" fill="white" opacity="0.4"/>
    <circle cx="50" cy="8" r="1" fill="white" opacity="0.6"/>
    <text x="50" y="175" fill="#6c5ce7" font-size="10" font-family="sans-serif" text-anchor="middle">Космический</text>
  </g>
  <!-- Underwater robot -->
  <g transform="translate(380, 20)">
    <rect x="0" y="120" width="100" height="80" rx="4" fill="#00b4d8" opacity="0.15" stroke="#00b4d8" stroke-width="1.5"/>
    <!-- Submarine body -->
    <ellipse cx="50" cy="55" rx="35" ry="18" fill="#00b4d8" stroke="#0077b6" stroke-width="1.5"/>
    <!-- Conning tower -->
    <rect x="38" y="35" width="24" height="14" rx="4" fill="#0096c7" stroke="#0077b6" stroke-width="1"/>
    <!-- Propeller -->
    <circle cx="85" cy="55" r="6" fill="none" stroke="#0077b6" stroke-width="1.5"/>
    <line x1="85" y1="49" x2="85" y2="61" stroke="#0077b6" stroke-width="1.5"/>
    <line x1="79" y1="55" x2="91" y2="55" stroke="#0077b6" stroke-width="1.5"/>
    <!-- Window -->
    <circle cx="30" cy="55" r="7" fill="#023e8a" stroke="#0077b6" stroke-width="1"/>
    <circle cx="30" cy="55" r="4" fill="#48cae4" opacity="0.5"/>
    <!-- Bubbles -->
    <circle cx="20" cy="80" r="3" fill="none" stroke="#48cae4" stroke-width="0.5" opacity="0.5"/>
    <circle cx="30" cy="75" r="2" fill="none" stroke="#48cae4" stroke-width="0.5" opacity="0.4"/>
    <circle cx="15" cy="70" r="1.5" fill="none" stroke="#48cae4" stroke-width="0.5" opacity="0.3"/>
    <!-- Light beam -->
    <path d="M15,52 L0,40 L0,70 Z" fill="#ffd93d" opacity="0.15"/>
    <text x="50" y="175" fill="#00b4d8" font-size="10" font-family="sans-serif" text-anchor="middle">Подводный</text>
  </g>
  <!-- Central label -->
  <rect x="130" y="230" width="240" height="90" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="250" y="255" fill="#e0e0e0" font-size="12" font-family="sans-serif" text-anchor="middle" font-weight="bold">Виды роботов:</text>
  <text x="250" y="275" fill="#e17055" font-size="10" font-family="sans-serif" text-anchor="middle">🏭 Промышленные — сварка, сборка</text>
  <text x="250" y="290" fill="#00b894" font-size="10" font-family="sans-serif" text-anchor="middle">🏥 Медицинские — хирургия, диагностика</text>
  <text x="250" y="305" fill="#6c5ce7" font-size="10" font-family="sans-serif" text-anchor="middle">🚀 Космические — исследование планет</text>
  <text x="250" y="320" fill="#00b4d8" font-size="10" font-family="sans-serif" text-anchor="middle">🌊 Подводные — океанские глубины</text>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Виды роботов</text>
</svg>