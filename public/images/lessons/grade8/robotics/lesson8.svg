<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgR8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgR8)"/>
  <!-- Drone (top-left) -->
  <g transform="translate(30, 30)">
    <rect x="-5" y="-5" width="160" height="130" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="75" y="12" fill="#00b894" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Дрон-квадрокоптер</text>
    <!-- Central body -->
    <rect x="55" y="35" width="40" height="20" rx="6" fill="#444" stroke="#666" stroke-width="1"/>
    <!-- Arms -->
    <line x1="55" y1="45" x2="20" y2="30" stroke="#888" stroke-width="3"/>
    <line x1="95" y1="45" x2="130" y2="30" stroke="#888" stroke-width="3"/>
    <line x1="55" y1="45" x2="20" y2="65" stroke="#888" stroke-width="3"/>
    <line x1="95" y1="45" x2="130" y2="65" stroke="#888" stroke-width="3"/>
    <!-- Propellers -->
    <ellipse cx="20" cy="28" rx="18" ry="4" fill="#00b894" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 20 28" to="360 20 28" dur="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="130" cy="28" rx="18" ry="4" fill="#00b894" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 130 28" to="360 130 28" dur="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="20" cy="65" rx="18" ry="4" fill="#00b894" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 20 65" to="360 20 65" dur="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="130" cy="65" rx="18" ry="4" fill="#00b894" opacity="0.4">
      <animateTransform attributeName="transform" type="rotate" from="0 130 65" to="360 130 65" dur="0.3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Motors -->
    <circle cx="20" cy="28" r="5" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="130" cy="28" r="5" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="20" cy="65" r="5" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="130" cy="65" r="5" fill="#333" stroke="#555" stroke-width="1"/>
    <!-- Camera -->
    <circle cx="75" cy="58" r="4" fill="#00b894" stroke="#006644" stroke-width="0.5"/>
    <!-- Landing gear -->
    <line x1="50" y1="55" x2="45" y2="75" stroke="#666" stroke-width="1.5"/>
    <line x1="100" y1="55" x2="105" y2="75" stroke="#666" stroke-width="1.5"/>
    <line x1="40" y1="75" x2="50" y2="75" stroke="#666" stroke-width="1.5"/>
    <line x1="100" y1="75" x2="110" y2="75" stroke="#666" stroke-width="1.5"/>
    <text x="75" y="100" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">GPS + камера + ИИ</text>
    <text x="75" y="115" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">Автопилот</text>
  </g>
  <!-- Self-driving car (bottom-left) -->
  <g transform="translate(20, 175)">
    <rect x="-5" y="-5" width="180" height="145" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="85" y="12" fill="#fdcb6e" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Беспилотный автомобиль</text>
    <!-- Car body -->
    <path d="M20,60 L30,40 L130,40 L145,55 L150,65 L150,85 L15,85 L15,65 Z" fill="#6c5ce7" stroke="#5f3dc4" stroke-width="1.5"/>
    <!-- Windows -->
    <path d="M35,42 L55,42 L55,58 L32,58 Z" fill="#a5d6ff" opacity="0.5"/>
    <path d="M60,42 L100,42 L100,58 L60,58 Z" fill="#a5d6ff" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="40" cy="88" r="10" fill="#333" stroke="#555" stroke-width="2"/>
    <circle cx="40" cy="88" r="4" fill="#555"/>
    <circle cx="125" cy="88" r="10" fill="#333" stroke="#555" stroke-width="2"/>
    <circle cx="125" cy="88" r="4" fill="#555"/>
    <!-- LIDAR on top -->
    <rect x="65" y="30" width="30" height="12" rx="6" fill="#fdcb6e" stroke="#f0b429" stroke-width="1"/>
    <circle cx="80" cy="36" r="3" fill="#333"/>
    <!-- Sensor beams -->
    <path d="M10,55 L-5,35" fill="none" stroke="#fdcb6e" stroke-width="0.5" opacity="0.4"/>
    <path d="M10,55 L-10,45" fill="none" stroke="#fdcb6e" stroke-width="0.5" opacity="0.3"/>
    <path d="M10,55 L-5,55" fill="none" stroke="#fdcb6e" stroke-width="0.5" opacity="0.4"/>
    <path d="M150,60 L165,40" fill="none" stroke="#fdcb6e" stroke-width="0.5" opacity="0.4"/>
    <path d="M150,60 L170,50" fill="none" stroke="#fdcb6e" stroke-width="0.5" opacity="0.3"/>
    <!-- Sensor labels -->
    <text x="85" y="110" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">LiDAR + камера + радар</text>
    <text x="85" y="122" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">Нейросеть навигации</text>
    <text x="85" y="134" fill="#fdcb6e" font-size="8" font-family="monospace" text-anchor="middle">5 уровней автономности</text>
  </g>
  <!-- AI Robot (right) -->
  <g transform="translate(280, 30)">
    <rect x="-5" y="-5" width="210" height="290" rx="8" fill="#1e2a3a" stroke="#30363d" stroke-width="1"/>
    <text x="100" y="12" fill="#e17055" font-size="10" font-family="sans-serif" text-anchor="middle" font-weight="bold">Робот с ИИ</text>
    <!-- Head -->
    <rect x="65" y="25" width="70" height="55" rx="16" fill="#546e7a" stroke="#78909c" stroke-width="1.5"/>
    <!-- Eyes - digital -->
    <rect x="76" y="38" width="18" height="10" rx="3" fill="#00b894"/>
    <rect x="106" y="38" width="18" height="10" rx="3" fill="#00b894"/>
    <!-- Eye pixels -->
    <rect x="78" y="40" width="3" height="3" fill="#006644"/>
    <rect x="84" y="40" width="3" height="3" fill="#006644"/>
    <rect x="90" y="40" width="3" height="3" fill="#006644"/>
    <rect x="108" y="40" width="3" height="3" fill="#006644"/>
    <rect x="114" y="40" width="3" height="3" fill="#006644"/>
    <rect x="120" y="40" width="3" height="3" fill="#006644"/>
    <!-- Mouth - speaker grid -->
    <rect x="82" y="58" width="36" height="8" rx="2" fill="#333" stroke="#444" stroke-width="0.5"/>
    <line x1="88" y1="58" x2="88" y2="66" stroke="#444" stroke-width="0.5"/>
    <line x1="94" y1="58" x2="94" y2="66" stroke="#444" stroke-width="0.5"/>
    <line x1="100" y1="58" x2="100" y2="66" stroke="#444" stroke-width="0.5"/>
    <line x1="106" y1="58" x2="106" y2="66" stroke="#444" stroke-width="0.5"/>
    <line x1="112" y1="58" x2="112" y2="66" stroke="#444" stroke-width="0.5"/>
    <!-- Antenna -->
    <line x1="100" y1="25" x2="100" y2="12" stroke="#aaa" stroke-width="1.5"/>
    <circle cx="100" cy="10" r="4" fill="#e17055">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Neck -->
    <rect x="92" y="80" width="16" height="10" fill="#455a64"/>
    <!-- Body -->
    <rect x="55" y="90" width="90" height="80" rx="8" fill="#546e7a" stroke="#78909c" stroke-width="1.5"/>
    <!-- Chest panel -->
    <rect x="65" y="100" width="70" height="55" rx="4" fill="#263238" stroke="#455a64" stroke-width="1"/>
    <!-- AI chip -->
    <rect x="78" y="108" width="44" height="24" rx="3" fill="#1a1a1a" stroke="#e17055" stroke-width="1"/>
    <text x="100" y="120" fill="#e17055" font-size="8" font-family="monospace" text-anchor="middle">AI CHIP</text>
    <text x="100" y="128" fill="#e17055" font-size="6" font-family="monospace" text-anchor="middle">Neural Net</text>
    <!-- Status LEDs -->
    <circle cx="72" y="115" r="3" fill="#00b894">
      <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="72" cy="130" r="3" fill="#fdcb6e"/>
    <circle cx="128" cy="115" r="3" fill="#6c5ce7"/>
    <circle cx="128" cy="130" r="3" fill="#e17055">
      <animate attributeName="fill" values="#e17055;#00b894;#e17055" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Arms -->
    <rect x="25" y="95" width="30" height="60" rx="8" fill="#546e7a" stroke="#78909c" stroke-width="1"/>
    <rect x="145" y="95" width="30" height="60" rx="8" fill="#546e7a" stroke="#78909c" stroke-width="1"/>
    <!-- Hands -->
    <circle cx="40" cy="160" r="10" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
    <circle cx="160" cy="160" r="10" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
    <!-- Legs -->
    <rect x="68" y="170" width="20" height="55" rx="6" fill="#546e7a" stroke="#78909c" stroke-width="1"/>
    <rect x="112" y="170" width="20" height="55" rx="6" fill="#546e7a" stroke="#78909c" stroke-width="1"/>
    <!-- Feet -->
    <rect x="62" y="220" width="30" height="12" rx="4" fill="#455a64"/>
    <rect x="108" y="220" width="30" height="12" rx="4" fill="#455a64"/>
    <!-- AI thought bubble -->
    <g transform="translate(150, 5)" opacity="0.6">
      <rect width="65" height="30" rx="10" fill="#e17055" opacity="0.2" stroke="#e17055" stroke-width="1"/>
      <text x="32" y="15" fill="#e17055" font-size="7" font-family="monospace" text-anchor="middle">Машинное</text>
      <text x="32" y="25" fill="#e17055" font-size="7" font-family="monospace" text-anchor="middle">обучение</text>
    </g>
    <text x="100" y="252" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">Распознавание речи</text>
    <text x="100" y="264" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">Компьютерное зрение</text>
    <text x="100" y="276" fill="#8b949e" font-size="8" font-family="sans-serif" text-anchor="middle">Навигация и планирование</text>
  </g>
  <text x="250" y="340" fill="#aaa" font-size="9" opacity="0.5" font-family="sans-serif" text-anchor="middle">Современные технологии</text>
</svg>