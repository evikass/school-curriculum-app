<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10002b"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Convex lens (left side) -->
  <ellipse cx="120" cy="150" rx="8" ry="70" fill="#7b2cbf" fill-opacity="0.15" stroke="#7b2cbf" stroke-width="2"/>
  <text x="70" y="30" fill="#7b2cbf" font-size="13" font-weight="bold">Собирающая</text>
  <!-- Parallel rays hitting convex lens -->
  <line x1="30" y1="110" x2="120" y2="110" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="30" y1="150" x2="120" y2="150" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="30" y1="190" x2="120" y2="190" stroke="#ffd166" stroke-width="1.5"/>
  <!-- Converging rays after lens -->
  <line x1="120" y1="110" x2="220" y2="150" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="120" y1="150" x2="220" y2="150" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="120" y1="190" x2="220" y2="150" stroke="#ffd166" stroke-width="1.5"/>
  <!-- Focal point -->
  <circle cx="220" cy="150" r="4" fill="#e94560"/>
  <text x="215" y="170" fill="#e94560" font-size="11" font-weight="bold">F</text>
  <!-- Focal length -->
  <line x1="120" y1="230" x2="220" y2="230" stroke="#e94560" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="155" y="245" fill="#e94560" font-size="10">f</text>
  <!-- Concave lens (right side) -->
  <path d="M340,80 Q330,150 340,220" stroke="#4cc9f0" stroke-width="2" fill="none"/>
  <path d="M356,80 Q366,150 356,220" stroke="#4cc9f0" stroke-width="2" fill="none"/>
  <text x="320" y="30" fill="#4cc9f0" font-size="13" font-weight="bold">Рассеивающая</text>
  <!-- Parallel rays hitting concave lens -->
  <line x1="270" y1="110" x2="348" y2="110" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="270" y1="150" x2="348" y2="150" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="270" y1="190" x2="348" y2="190" stroke="#ffd166" stroke-width="1.5"/>
  <!-- Diverging rays after concave lens -->
  <line x1="348" y1="110" x2="430" y2="85" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="348" y1="150" x2="430" y2="150" stroke="#ffd166" stroke-width="1.5"/>
  <line x1="348" y1="190" x2="430" y2="215" stroke="#ffd166" stroke-width="1.5"/>
  <!-- Virtual focal point (dashed) -->
  <line x1="348" y1="110" x2="290" y2="130" stroke="#4cc9f0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="348" y1="190" x2="290" y2="170" stroke="#4cc9f0" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="290" cy="150" r="4" fill="none" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="278" y="168" fill="#4cc9f0" font-size="11">F (мнимый)</text>
  <!-- Thin lens formula -->
  <text x="30" y="280" fill="#e0aaff" font-size="16" font-family="serif" font-weight="bold">1/f = 1/d + 1/fᵢ</text>
  <text x="30" y="302" fill="#7f8c8d" font-size="11">f — фокусное расстояние, d — расстояние до предмета</text>
  <text x="30" y="320" fill="#7f8c8d" font-size="11">fᵢ — расстояние до изображения</text>
  <!-- Optical power -->
  <text x="350" y="260" fill="#c77dff" font-size="13" font-weight="bold">Оптическая сила:</text>
  <text x="350" y="280" fill="#c77dff" font-size="14" font-family="serif">D = 1/f (диоптрии)</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Линзы и оптические приборы</text>
</svg>