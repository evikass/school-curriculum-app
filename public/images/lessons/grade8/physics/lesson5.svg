<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Battery -->
  <rect x="50" y="120" width="30" height="80" rx="3" fill="none" stroke="#f0883e" stroke-width="2"/>
  <rect x="58" y="112" width="14" height="8" rx="1" fill="#f0883e" opacity="0.6"/>
  <text x="55" y="165" fill="#f0883e" font-size="12">+</text>
  <text x="55" y="190" fill="#f0883e" font-size="12">−</text>
  <!-- Wires -->
  <path d="M80,130 L150,130 L150,80 L350,80 L350,130 L420,130" stroke="#58a6ff" stroke-width="2" fill="none"/>
  <path d="M80,190 L150,190 L150,260 L350,260 L350,190 L420,190" stroke="#58a6ff" stroke-width="2" fill="none"/>
  <!-- Resistor -->
  <path d="M420,130 L420,140 L410,145 L430,155 L410,165 L430,175 L410,185 L420,190" stroke="#f47067" stroke-width="2" fill="none"/>
  <text x="435" y="165" fill="#f47067" font-size="11">R</text>
  <!-- Ammeter (on top wire) -->
  <circle cx="250" cy="80" r="15" fill="none" stroke="#3fb950" stroke-width="1.5"/>
  <text x="243" y="85" fill="#3fb950" font-size="12" font-weight="bold">A</text>
  <!-- Electron flow arrows -->
  <text x="130" y="70" fill="#58a6ff" font-size="10">→ e⁻</text>
  <text x="300" y="70" fill="#58a6ff" font-size="10">→ e⁻</text>
  <!-- Current direction (conventional) -->
  <text x="120" y="100" fill="#ffd166" font-size="10">← I (ток)</text>
  <!-- Bulb in circuit -->
  <circle cx="250" cy="260" r="15" fill="none" stroke="#ffd166" stroke-width="1.5"/>
  <path d="M240,255 L250,265 L260,255 M240,265 L250,255 L260,265" stroke="#ffd166" stroke-width="1"/>
  <!-- Voltmeter (parallel) -->
  <circle cx="420" cy="260" r="12" fill="none" stroke="#bc8cff" stroke-width="1" stroke-dasharray="2,1"/>
  <text x="414" y="264" fill="#bc8cff" font-size="10">V</text>
  <!-- Key/switch -->
  <rect x="145" y="75" width="12" height="10" fill="none" stroke="#58a6ff" stroke-width="1"/>
  <text x="140" y="74" fill="#58a6ff" font-size="8">K</text>
  <!-- Current definition -->
  <text x="30" y="35" fill="#3fb950" font-size="14" font-weight="bold">Электрический ток</text>
  <text x="30" y="55" fill="#58a6ff" font-size="12">I = q / t (Ампер)</text>
  <text x="30" y="75" fill="#c9d1d9" font-size="11">Направленное движение</text>
  <text x="30" y="90" fill="#c9d1d9" font-size="11">заряженных частиц</text>
  <!-- Conditions for current -->
  <text x="250" y="300" fill="#ffd166" font-size="11">Условия: источник тока + замкнутая цепь</text>
  <text x="250" y="320" fill="#7f8c8d" font-size="10">Сила тока (A), Напряжение (V), Сопротивление (Ω)</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Электрический ток</text>
</svg>