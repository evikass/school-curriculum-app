<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Ohm's law triangle -->
  <polygon points="250,40 150,160 350,160" fill="none" stroke="#e94560" stroke-width="2.5"/>
  <line x1="150" y1="120" x2="350" y2="120" stroke="#e94560" stroke-width="2"/>
  <text x="240" y="110" fill="#ffd166" font-size="24" font-family="serif" font-weight="bold">U</text>
  <text x="210" y="150" fill="#4cc9f0" font-size="18" font-family="serif" font-weight="bold">I</text>
  <text x="280" y="150" fill="#3fb950" font-size="18" font-family="serif" font-weight="bold">R</text>
  <!-- I=U/R graph -->
  <line x1="40" y1="300" x2="230" y2="300" stroke="#a8d8ea" stroke-width="1.5"/>
  <line x1="40" y1="300" x2="40" y2="180" stroke="#a8d8ea" stroke-width="1.5"/>
  <polygon points="230,300 222,296 222,304" fill="#a8d8ea"/>
  <polygon points="40,180 36,188 44,188" fill="#a8d8ea"/>
  <text x="215" y="318" fill="#a8d8ea" font-size="10">U, В</text>
  <text x="18" y="185" fill="#a8d8ea" font-size="10">I, А</text>
  <!-- Linear graph I(U) -->
  <line x1="40" y1="300" x2="210" y2="195" stroke="#4cc9f0" stroke-width="2.5"/>
  <circle cx="100" cy="260" r="3" fill="#4cc9f0"/>
  <circle cx="160" cy="228" r="3" fill="#4cc9f0"/>
  <!-- Slope = 1/R -->
  <path d="M60,280 Q70,275 75,270" stroke="#3fb950" stroke-width="1" fill="none"/>
  <text x="75" y="290" fill="#3fb950" font-size="10">tg α = 1/R</text>
  <!-- Formulas -->
  <text x="270" y="200" fill="#e94560" font-size="18" font-family="serif" font-weight="bold">I = U / R</text>
  <text x="270" y="225" fill="#ffd166" font-size="14" font-family="serif">U = I · R</text>
  <text x="270" y="248" fill="#3fb950" font-size="14" font-family="serif">R = U / I</text>
  <!-- Units -->
  <text x="270" y="275" fill="#a8d8ea" font-size="11">I — Ампер (А)</text>
  <text x="270" y="292" fill="#a8d8ea" font-size="11">U — Вольт (В)</text>
  <text x="270" y="309" fill="#a8d8ea" font-size="11">R — Ом (Ω)</text>
  <!-- Resistor symbol -->
  <path d="M390,195 L390,200 L380,205 L400,215 L380,225 L400,235 L380,245 L390,250 L390,255" stroke="#3fb950" stroke-width="2" fill="none"/>
  <text x="405" y="230" fill="#3fb950" font-size="12">R</text>
  <!-- Two resistors comparison -->
  <line x1="375" y1="280" x2="405" y2="280" stroke="#4cc9f0" stroke-width="2.5"/>
  <line x1="375" y1="295" x2="405" y2="295" stroke="#e94560" stroke-width="1.5"/>
  <text x="410" y="284" fill="#4cc9f0" font-size="9">R₁ мал</text>
  <text x="410" y="298" fill="#e94560" font-size="9">R₂ бол.</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Закон Ома</text>
</svg>