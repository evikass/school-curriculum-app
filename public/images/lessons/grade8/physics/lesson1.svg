<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c003e"/>
      <stop offset="100%" stop-color="#3d0066"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Cold container (left) -->
  <rect x="30" y="60" width="150" height="150" rx="8" fill="none" stroke="#4cc9f0" stroke-width="2"/>
  <text x="60" y="50" fill="#4cc9f0" font-size="13" font-weight="bold">Холодное тело</text>
  <!-- Slow molecules (small, sparse) -->
  <circle cx="60" cy="90" r="4" fill="#4cc9f0" opacity="0.6"/>
  <circle cx="120" cy="110" r="4" fill="#4cc9f0" opacity="0.6"/>
  <circle cx="80" cy="150" r="4" fill="#4cc9f0" opacity="0.6"/>
  <circle cx="140" cy="170" r="4" fill="#4cc9f0" opacity="0.6"/>
  <circle cx="100" cy="130" r="4" fill="#4cc9f0" opacity="0.6"/>
  <!-- Slow motion arrows (short) -->
  <line x1="65" y1="90" x2="70" y2="85" stroke="#4cc9f0" stroke-width="1" opacity="0.4"/>
  <line x1="125" y1="110" x2="128" y2="105" stroke="#4cc9f0" stroke-width="1" opacity="0.4"/>
  <line x1="85" y1="150" x2="88" y2="145" stroke="#4cc9f0" stroke-width="1" opacity="0.4"/>
  <!-- Hot container (right) -->
  <rect x="220" y="60" width="150" height="150" rx="8" fill="none" stroke="#e63946" stroke-width="2"/>
  <text x="255" y="50" fill="#e63946" font-size="13" font-weight="bold">Горячее тело</text>
  <!-- Fast molecules (vibrant, dense) -->
  <circle cx="250" cy="90" r="5" fill="#e63946" opacity="0.8"/>
  <circle cx="310" cy="105" r="5" fill="#e63946" opacity="0.8"/>
  <circle cx="270" cy="140" r="5" fill="#e63946" opacity="0.8"/>
  <circle cx="330" cy="160" r="5" fill="#e63946" opacity="0.8"/>
  <circle cx="290" cy="120" r="5" fill="#e63946" opacity="0.8"/>
  <circle cx="250" cy="170" r="5" fill="#e63946" opacity="0.8"/>
  <circle cx="340" cy="130" r="5" fill="#e63946" opacity="0.8"/>
  <!-- Fast motion arrows (long) -->
  <line x1="256" y1="90" x2="268" y2="78" stroke="#e63946" stroke-width="1.5" opacity="0.6"/>
  <line x1="316" y1="105" x2="328" y2="93" stroke="#e63946" stroke-width="1.5" opacity="0.6"/>
  <line x1="276" y1="140" x2="290" y2="128" stroke="#e63946" stroke-width="1.5" opacity="0.6"/>
  <line x1="336" y1="160" x2="348" y2="148" stroke="#e63946" stroke-width="1.5" opacity="0.6"/>
  <line x1="296" y1="120" x2="310" y2="108" stroke="#e63946" stroke-width="1.5" opacity="0.6"/>
  <!-- Heat transfer arrow -->
  <path d="M180,135 L220,135" stroke="#ffd166" stroke-width="3" fill="none"/>
  <polygon points="220,135 212,130 212,140" fill="#ffd166"/>
  <text x="175" y="125" fill="#ffd166" font-size="10">Q</text>
  <!-- Internal energy definition -->
  <text x="30" y="240" fill="#e0aaff" font-size="14" font-weight="bold">Внутренняя энергия</text>
  <text x="30" y="260" fill="#c77dff" font-size="12">U = Eкин + Eпот (молекул)</text>
  <!-- Ways to change -->
  <text x="30" y="290" fill="#4cc9f0" font-size="12">∆U = Q (нагревание)</text>
  <text x="30" y="310" fill="#e63946" font-size="12">∆U = A (работа)</text>
  <!-- Temperature scales -->
  <text x="280" y="240" fill="#ffd166" font-size="12" font-weight="bold">Способы изменения:</text>
  <rect x="280" y="250" width="190" height="22" rx="4" fill="none" stroke="#e63946" stroke-width="1"/>
  <text x="290" y="266" fill="#e63946" font-size="11">Совершение работы (A)</text>
  <rect x="280" y="278" width="190" height="22" rx="4" fill="none" stroke="#4cc9f0" stroke-width="1"/>
  <text x="290" y="294" fill="#4cc9f0" font-size="11">Теплопередача (Q)</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Внутренняя энергия</text>
</svg>