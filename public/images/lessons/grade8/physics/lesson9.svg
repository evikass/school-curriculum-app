<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Mirror surface -->
  <line x1="250" y1="30" x2="250" y2="280" stroke="#a8dadc" stroke-width="3"/>
  <!-- Hatching on mirror (non-reflective side) -->
  <line x1="250" y1="40" x2="260" y2="50" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="60" x2="260" y2="70" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="80" x2="260" y2="90" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="100" x2="260" y2="110" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="120" x2="260" y2="130" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="140" x2="260" y2="150" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="160" x2="260" y2="170" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="180" x2="260" y2="190" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="200" x2="260" y2="210" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="220" x2="260" y2="230" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="240" x2="260" y2="250" stroke="#6c757d" stroke-width="1" opacity="0.4"/>
  <!-- Normal line (perpendicular to mirror) -->
  <line x1="250" y1="140" x2="130" y2="140" stroke="#6c757d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="120" y="138" fill="#6c757d" font-size="10">N</text>
  <!-- Incident ray -->
  <line x1="80" y1="50" x2="250" y2="140" stroke="#ffd166" stroke-width="2.5"/>
  <polygon points="240,135 248,137 242,142" fill="#ffd166"/>
  <!-- Reflected ray -->
  <line x1="250" y1="140" x2="80" y2="230" stroke="#4cc9f0" stroke-width="2.5"/>
  <polygon points="90,225 82,228 86,234" fill="#4cc9f0"/>
  <!-- Angle of incidence -->
  <path d="M210,140 Q210,125 220,120" stroke="#ffd166" stroke-width="1.5" fill="none"/>
  <text x="195" y="118" fill="#ffd166" font-size="12" font-weight="bold">α</text>
  <!-- Angle of reflection -->
  <path d="M210,140 Q210,155 220,160" stroke="#4cc9f0" stroke-width="1.5" fill="none"/>
  <text x="195" y="168" fill="#4cc9f0" font-size="12" font-weight="bold">α</text>
  <!-- Point of incidence -->
  <circle cx="250" cy="140" r="4" fill="#e94560"/>
  <!-- Law statement -->
  <text x="300" y="60" fill="#e94560" font-size="14" font-weight="bold">Закон отражения:</text>
  <text x="300" y="85" fill="#ffd166" font-size="18" font-family="serif" font-weight="bold">α = β</text>
  <text x="300" y="110" fill="#a8dadc" font-size="12">Угол падения = Угол отражения</text>
  <!-- Second example: perpendicular incidence -->
  <line x1="400" y1="170" x2="400" y2="280" stroke="#a8dadc" stroke-width="2"/>
  <line x1="400" y1="210" x2="350" y2="210" stroke="#6c757d" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="400" y1="180" x2="400" y2="210" stroke="#ffd166" stroke-width="2"/>
  <line x1="400" y1="210" x2="400" y2="240" stroke="#4cc9f0" stroke-width="2"/>
  <text x="410" y="195" fill="#ffd166" font-size="9">α=0</text>
  <text x="410" y="235" fill="#4cc9f0" font-size="9">β=0</text>
  <!-- Key properties -->
  <text x="300" y="140" fill="#7f8c8d" font-size="11">• Падающий луч, отражённый луч и</text>
  <text x="310" y="155" fill="#7f8c8d" font-size="11">нормаль лежат в одной плоскости</text>
  <text x="300" y="175" fill="#7f8c8d" font-size="11">• Зеркальное и диффузное отражение</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Законы отражения света</text>
</svg>