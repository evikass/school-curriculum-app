<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Formulas -->
  <text x="30" y="40" fill="#ffd166" font-size="22" font-family="serif" font-weight="bold">A = U · I · t</text>
  <text x="30" y="70" fill="#e94560" font-size="22" font-family="serif" font-weight="bold">P = U · I</text>
  <!-- Units -->
  <text x="30" y="95" fill="#a8d8ea" font-size="11">A — работа (Дж), P — мощность (Вт)</text>
  <text x="30" y="112" fill="#a8d8ea" font-size="11">U — напряжение (В), I — сила тока (А)</text>
  <text x="30" y="129" fill="#a8d8ea" font-size="11">t — время (с)</text>
  <!-- Lightbulb -->
  <circle cx="300" cy="110" r="30" fill="none" stroke="#ffd166" stroke-width="2"/>
  <path d="M285,140 L285,160 M315,140 L315,160 M280,160 L320,160 M280,168 L320,168 M282,175 L318,175" stroke="#ffd166" stroke-width="1.5" fill="none"/>
  <!-- Light rays -->
  <line x1="330" y1="95" x2="355" y2="80" stroke="#ffd166" stroke-width="1" opacity="0.5"/>
  <line x1="335" y1="110" x2="360" y2="110" stroke="#ffd166" stroke-width="1" opacity="0.5"/>
  <line x1="330" y1="125" x2="355" y2="140" stroke="#ffd166" stroke-width="1" opacity="0.5"/>
  <line x1="270" y1="95" x2="245" y2="80" stroke="#ffd166" stroke-width="1" opacity="0.5"/>
  <line x1="265" y1="110" x2="240" y2="110" stroke="#ffd166" stroke-width="1" opacity="0.5"/>
  <!-- Glow -->
  <circle cx="300" cy="110" r="25" fill="#ffd166" fill-opacity="0.08"/>
  <!-- Power formula variants -->
  <text x="30" y="170" fill="#4cc9f0" font-size="14" font-family="serif" font-weight="bold">P = I²R = U²/R</text>
  <!-- Meter/scale -->
  <rect x="380" y="70" width="100" height="80" rx="5" fill="none" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="400" y="90" fill="#4cc9f0" font-size="10">Счётчик</text>
  <text x="395" y="108" fill="#ffd166" font-size="16" font-weight="bold">кВт·ч</text>
  <text x="395" y="130" fill="#a8d8ea" font-size="10">1 кВт·ч = 3,6 МДж</text>
  <!-- Joule-Lenz law -->
  <text x="30" y="210" fill="#e94560" font-size="14" font-weight="bold">Закон Джоуля-Ленца:</text>
  <text x="30" y="235" fill="#e94560" font-size="18" font-family="serif" font-weight="bold">Q = I²Rt</text>
  <!-- Example -->
  <text x="30" y="270" fill="#ffd166" font-size="12" font-weight="bold">Пример:</text>
  <text x="30" y="290" fill="#c9d1d9" font-size="11">Лампа 220В, 0.5А, 1 час</text>
  <text x="30" y="308" fill="#c9d1d9" font-size="11">P = 220·0.5 = 110 Вт</text>
  <text x="30" y="326" fill="#c9d1d9" font-size="11">A = 110·3600 = 396 000 Дж</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Работа и мощность тока</text>
</svg>