<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Phase change graph: Temperature vs Time -->
  <!-- Axes -->
  <line x1="60" y1="280" x2="470" y2="280" stroke="#a8d8ea" stroke-width="1.5"/>
  <line x1="60" y1="280" x2="60" y2="30" stroke="#a8d8ea" stroke-width="1.5"/>
  <polygon points="470,280 462,276 462,284" fill="#a8d8ea"/>
  <polygon points="60,30 56,38 64,38" fill="#a8d8ea"/>
  <!-- Axis labels -->
  <text x="430" y="298" fill="#a8d8ea" font-size="11">Время, t</text>
  <text x="20" y="40" fill="#a8d8ea" font-size="11">T, °C</text>
  <!-- Temperature graph: heating solid → melting → heating liquid → cooling → crystallization → cooling solid -->
  <path d="M60,250 L130,250 L130,180 L200,180 L200,120 L280,120 L280,180 L350,180 L350,250 L420,250" stroke="#e94560" stroke-width="2.5" fill="none"/>
  <!-- Phase regions -->
  <!-- Solid (heating) -->
  <rect x="60" y="250" width="70" height="30" fill="#4cc9f0" fill-opacity="0.08"/>
  <text x="70" y="270" fill="#4cc9f0" font-size="9">Твёрдое</text>
  <!-- Melting -->
  <rect x="130" y="180" width="70" height="100" fill="#ffd166" fill-opacity="0.08"/>
  <text x="140" y="210" fill="#ffd166" font-size="9">Плавление</text>
  <!-- Liquid (heating) -->
  <rect x="200" y="120" width="80" height="160" fill="#e94560" fill-opacity="0.05"/>
  <text x="215" y="140" fill="#e94560" font-size="9">Жидкое</text>
  <!-- Crystallization -->
  <rect x="280" y="180" width="70" height="100" fill="#c77dff" fill-opacity="0.08"/>
  <text x="285" y="210" fill="#c77dff" font-size="9">Кристаллизация</text>
  <!-- Solid (cooling) -->
  <rect x="350" y="250" width="70" height="30" fill="#4cc9f0" fill-opacity="0.08"/>
  <text x="358" y="270" fill="#4cc9f0" font-size="9">Твёрдое</text>
  <!-- Temperature line for melting/crystallization -->
  <line x1="60" y1="180" x2="470" y2="180" stroke="#ffd166" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="475" y="183" fill="#ffd166" font-size="9">Tпл</text>
  <!-- Key points -->
  <circle cx="130" cy="250" r="3" fill="#4cc9f0"/>
  <circle cx="130" cy="180" r="3" fill="#ffd166"/>
  <circle cx="200" cy="180" r="3" fill="#ffd166"/>
  <circle cx="200" cy="120" r="3" fill="#e94560"/>
  <circle cx="280" cy="120" r="3" fill="#e94560"/>
  <circle cx="280" cy="180" r="3" fill="#c77dff"/>
  <circle cx="350" cy="180" r="3" fill="#c77dff"/>
  <circle cx="350" cy="250" r="3" fill="#4cc9f0"/>
  <!-- Formulas -->
  <text x="60" y="310" fill="#ffd166" font-size="12" font-weight="bold">Q = λ·m (плавление)</text>
  <text x="260" y="310" fill="#c77dff" font-size="12" font-weight="bold">Q = −λ·m (кристаллизация)</text>
  <text x="60" y="330" fill="#7f8c8d" font-size="10">λ — удельная теплота плавления (Дж/кг)</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Плавление и кристаллизация</text>
</svg>