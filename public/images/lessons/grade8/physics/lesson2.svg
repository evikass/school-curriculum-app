<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b1b2f"/>
      <stop offset="100%" stop-color="#162447"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Q=cmΔT formula large -->
  <text x="30" y="45" fill="#e94560" font-size="26" font-family="serif" font-weight="bold">Q = c·m·ΔT</text>
  <!-- Formula breakdown -->
  <text x="30" y="70" fill="#a8d8ea" font-size="11">Q — количество теплоты (Дж)</text>
  <text x="30" y="85" fill="#a8d8ea" font-size="11">c — удельная теплоёмкость (Дж/кг·°C)</text>
  <text x="30" y="100" fill="#a8d8ea" font-size="11">m — масса (кг), ΔT — изменение температуры</text>
  <!-- Thermometer -->
  <rect x="420" y="50" width="16" height="150" rx="8" fill="none" stroke="#e94560" stroke-width="1.5"/>
  <circle cx="428" cy="200" r="12" fill="none" stroke="#e94560" stroke-width="1.5"/>
  <rect x="424" y="140" width="8" height="60" rx="3" fill="#e94560" opacity="0.4"/>
  <circle cx="428" cy="200" r="8" fill="#e94560" opacity="0.5"/>
  <!-- Temperature marks -->
  <line x1="436" y1="80" x2="442" y2="80" stroke="#e94560" stroke-width="1"/>
  <text x="444" y="84" fill="#e94560" font-size="8">100°</text>
  <line x1="436" y1="120" x2="442" y2="120" stroke="#e94560" stroke-width="1"/>
  <text x="444" y="124" fill="#e94560" font-size="8">50°</text>
  <line x1="436" y1="160" x2="442" y2="160" stroke="#e94560" stroke-width="1"/>
  <text x="444" y="164" fill="#e94560" font-size="8">0°</text>
  <!-- Heat transfer visualization: hot to cold -->
  <rect x="40" y="130" width="80" height="80" rx="5" fill="#e94560" fill-opacity="0.15" stroke="#e94560" stroke-width="1.5"/>
  <text x="55" y="175" fill="#e94560" font-size="14" font-weight="bold">T₁</text>
  <!-- Arrow -->
  <path d="M130,170 L190,170" stroke="#ffd166" stroke-width="2.5" fill="none"/>
  <polygon points="190,170 182,165 182,175" fill="#ffd166"/>
  <text x="145" y="160" fill="#ffd166" font-size="12">Q</text>
  <rect x="200" y="130" width="80" height="80" rx="5" fill="#4cc9f0" fill-opacity="0.15" stroke="#4cc9f0" stroke-width="1.5"/>
  <text x="215" y="175" fill="#4cc9f0" font-size="14" font-weight="bold">T₂</text>
  <!-- Specific heat values -->
  <text x="300" y="140" fill="#4cc9f0" font-size="12" font-weight="bold">Удельная теплоёмкость:</text>
  <text x="300" y="160" fill="#a8d8ea" font-size="11">Вода: 4200 Дж/(кг·°C)</text>
  <text x="300" y="178" fill="#a8d8ea" font-size="11">Лёд: 2100 Дж/(кг·°C)</text>
  <text x="300" y="196" fill="#a8d8ea" font-size="11">Железо: 460 Дж/(кг·°C)</text>
  <text x="300" y="214" fill="#a8d8ea" font-size="11">Алюминий: 920 Дж/(кг·°C)</text>
  <!-- Example -->
  <text x="30" y="245" fill="#ffd166" font-size="12" font-weight="bold">Пример:</text>
  <text x="30" y="265" fill="#c77dff" font-size="12" font-family="serif">Q = 4200 · 2 · 50 = 420 000 Дж</text>
  <text x="30" y="285" fill="#7f8c8d" font-size="11">Нагрев 2 кг воды на 50°C</text>
  <!-- Calorimetry -->
  <text x="30" y="310" fill="#533483" font-size="12" font-weight="bold">Уравнение теплового баланса:</text>
  <text x="30" y="328" fill="#533483" font-size="13" font-family="serif">Q₁ + Q₂ + ... = 0</text>
  <text x="250" y="340" fill="#fff" font-size="9" opacity="0.5" text-anchor="middle">Количество теплоты</text>
</svg>