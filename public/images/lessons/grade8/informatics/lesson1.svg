<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2f1"/>
      <stop offset="100%" stop-color="#b2dfdb"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Information flow diagram -->
  <!-- Source -->
  <rect x="20" y="60" width="90" height="50" rx="8" fill="#1a237e" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="65" y="82" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">ИСТОЧНИК</text>
  <text x="65" y="95" font-size="5" fill="#bbdefb" text-anchor="middle">Отправитель</text>
  <!-- Arrow -->
  <path d="M110,85 L145,85" stroke="#546e7a" stroke-width="2"/>
  <polygon points="145,85 138,81 138,89" fill="#546e7a"/>
  <!-- Encoder -->
  <rect x="145" y="60" width="80" height="50" rx="8" fill="#1565c0" stroke="#0d47a1" stroke-width="1.5"/>
  <text x="185" y="82" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">КОДИРОВАНИЕ</text>
  <text x="185" y="95" font-size="5" fill="#bbdefb" text-anchor="middle">Преобразование</text>
  <!-- Arrow -->
  <path d="M225,85 L260,85" stroke="#546e7a" stroke-width="2"/>
  <polygon points="260,85 253,81 253,89" fill="#546e7a"/>
  <!-- Channel -->
  <rect x="260" y="60" width="80" height="50" rx="8" fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="300" y="82" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">КАНАЛ СВЯЗИ</text>
  <text x="300" y="95" font-size="5" fill="#c8e6c9" text-anchor="middle">Передача</text>
  <!-- Noise -->
  <rect x="275" y="25" width="50" height="25" rx="4" fill="#c62828" opacity="0.7"/>
  <text x="300" y="40" font-size="6" fill="#fff" text-anchor="middle">ПОМЕХИ</text>
  <path d="M300,50 L300,58" stroke="#c62828" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Arrow -->
  <path d="M340,85 L375,85" stroke="#546e7a" stroke-width="2"/>
  <polygon points="375,85 368,81 368,89" fill="#546e7a"/>
  <!-- Decoder -->
  <rect x="375" y="60" width="80" height="50" rx="8" fill="#ff6f00" stroke="#e65100" stroke-width="1.5"/>
  <text x="415" y="82" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">ДЕКОДИР.</text>
  <text x="415" y="95" font-size="5" fill="#fff3e0" text-anchor="middle">Расшифровка</text>
  <!-- Arrow -->
  <path d="M455,85 L470,85" stroke="#546e7a" stroke-width="2"/>
  <polygon points="470,85 463,81 463,89" fill="#546e7a"/>
  <!-- Receiver -->
  <rect x="410" y="60" width="80" height="50" rx="8" fill="#7b1fa2" stroke="#4a148c" stroke-width="1.5"/>
  <text x="450" y="82" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">ПРИЁМНИК</text>
  <!-- Properties of information -->
  <text x="250" y="135" font-size="9" fill="#1a237e" text-anchor="middle" font-weight="bold">Свойства информации</text>
  <!-- Property cards -->
  <g transform="translate(60,170)">
    <rect x="-45" y="-18" width="90" height="36" rx="6" fill="#c62828" opacity="0.8"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Достоверность</text>
    <text x="0" y="9" font-size="5" fill="#ffcdd2" text-anchor="middle">Без искажений</text>
  </g>
  <g transform="translate(180,170)">
    <rect x="-45" y="-18" width="90" height="36" rx="6" fill="#1565c0" opacity="0.8"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Полнота</text>
    <text x="0" y="9" font-size="5" fill="#bbdefb" text-anchor="middle">Достаточность данных</text>
  </g>
  <g transform="translate(300,170)">
    <rect x="-45" y="-18" width="90" height="36" rx="6" fill="#2e7d32" opacity="0.8"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Своевременность</text>
    <text x="0" y="9" font-size="5" fill="#c8e6c9" text-anchor="middle">В нужный момент</text>
  </g>
  <g transform="translate(420,170)">
    <rect x="-45" y="-18" width="90" height="36" rx="6" fill="#ff6f00" opacity="0.8"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Актуальность</text>
    <text x="0" y="9" font-size="5" fill="#fff3e0" text-anchor="middle">Важность сейчас</text>
  </g>
  <g transform="translate(120,225)">
    <rect x="-45" y="-18" width="90" height="36" rx="6" fill="#7b1fa2" opacity="0.8"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Объективность</text>
    <text x="0" y="9" font-size="5" fill="#d1c4e9" text-anchor="middle">Без субъективности</text>
  </g>
  <g transform="translate(250,225)">
    <rect x="-45" y="-18" width="90" height="36" rx="6" fill="#00695c" opacity="0.8"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Полезность</text>
    <text x="0" y="9" font-size="5" fill="#b2dfdb" text-anchor="middle">Практическая ценность</text>
  </g>
  <g transform="translate(380,225)">
    <rect x="-45" y="-18" width="90" height="36" rx="6" fill="#5d4037" opacity="0.8"/>
    <text x="0" y="-3" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Понятность</text>
    <text x="0" y="9" font-size="5" fill="#d7ccc8" text-anchor="middle">Доступность для понимания</text>
  </g>
  <!-- Information types -->
  <rect x="30" y="265" width="440" height="45" rx="6" fill="#fff" opacity="0.7" stroke="#1a237e"/>
  <text x="250" y="282" font-size="7" fill="#1a237e" text-anchor="middle" font-weight="bold">Виды информации по форме представления</text>
  <text x="250" y="300" font-size="6" fill="#546e7a" text-anchor="middle">Текстовая • Числовая • Графическая • Звуковая • Видеоинформация</text>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Информация и её свойства</text>
</svg>