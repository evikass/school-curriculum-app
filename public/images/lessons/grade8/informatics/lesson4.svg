<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="pyblue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#306998"/>
      <stop offset="100%" stop-color="#4B8BBE"/>
    </linearGradient>
    <linearGradient id="pyyellow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD43B"/>
      <stop offset="100%" stop-color="#FFE873"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Python logo (left) -->
  <g transform="translate(100,110)">
    <!-- Blue snake half -->
    <path d="M0,-50 Q-30,-50 -30,-25 L-30,10 Q-30,30 -10,30 L10,30 Q30,30 30,10 L30,5 L0,5 L0,10 Q0,15 -5,15 L-15,15 Q-20,15 -20,10 L-20,-15 Q-20,-20 -15,-20 L15,-20 Q20,-20 20,-15 L20,-50 Z" fill="url(#pyblue)"/>
    <!-- Yellow snake half -->
    <path d="M0,50 Q30,50 30,25 L30,-10 Q30,-30 10,-30 L-10,-30 Q-30,-30 -30,-10 L-30,-5 L0,-5 L0,-10 Q0,-15 5,-15 L15,-15 Q20,-15 20,-10 L20,15 Q20,20 15,20 L-15,20 Q-20,20 -20,15 L-20,50 Z" fill="url(#pyyellow)"/>
    <!-- Eyes -->
    <circle cx="-10" cy="-35" r="5" fill="#fff" opacity="0.8"/>
    <circle cx="-10" cy="-35" r="2.5" fill="#306998"/>
    <circle cx="10" cy="35" r="5" fill="#fff" opacity="0.8"/>
    <circle cx="10" cy="35" r="2.5" fill="#FFD43B"/>
  </g>
  <!-- Code editor (right) -->
  <rect x="200" y="20" width="280" height="230" rx="6" fill="#263238" stroke="#37474f" stroke-width="2"/>
  <!-- Title bar -->
  <rect x="200" y="20" width="280" height="22" rx="6" fill="#37474f"/>
  <circle cx="218" cy="31" r="4" fill="#ef5350"/>
  <circle cx="232" cy="31" r="4" fill="#ffd600"/>
  <circle cx="246" cy="31" r="4" fill="#4caf50"/>
  <text x="340" y="35" font-size="7" fill="#90a4ae" text-anchor="middle">main.py</text>
  <!-- Line numbers -->
  <text x="210" y="58" font-size="8" fill="#546e7a" font-family="monospace">1</text>
  <text x="210" y="72" font-size="8" fill="#546e7a" font-family="monospace">2</text>
  <text x="210" y="86" font-size="8" fill="#546e7a" font-family="monospace">3</text>
  <text x="210" y="100" font-size="8" fill="#546e7a" font-family="monospace">4</text>
  <text x="210" y="114" font-size="8" fill="#546e4a" font-family="monospace">5</text>
  <text x="210" y="128" font-size="8" fill="#546e7a" font-family="monospace">6</text>
  <text x="210" y="142" font-size="8" fill="#546e7a" font-family="monospace">7</text>
  <text x="210" y="156" font-size="8" fill="#546e7a" font-family="monospace">8</text>
  <!-- Code lines -->
  <!-- Line 1: comment -->
  <text x="225" y="58" font-size="8" fill="#78909c" font-family="monospace"># Привет, мир!</text>
  <!-- Line 2: variable -->
  <text x="225" y="72" font-size="8" font-family="monospace"><tspan fill="#c792ea">name</tspan> <tspan fill="#89ddff">=</tspan> <tspan fill="#c3e88d">"Python"</tspan></text>
  <!-- Line 3: variable -->
  <text x="225" y="86" font-size="8" font-family="monospace"><tspan fill="#c792ea">version</tspan> <tspan fill="#89ddff">=</tspan> <tspan fill="#f78c6c">3</tspan></text>
  <!-- Line 4: print -->
  <text x="225" y="100" font-size="8" font-family="monospace"><tspan fill="#82aaff">print</tspan><tspan fill="#89ddff">(</tspan><tspan fill="#c3e88d">"Hello"</tspan><tspan fill="#89ddff">,</tspan> <tspan fill="#c792ea">name</tspan><tspan fill="#89ddff">)</tspan></text>
  <!-- Line 5: if -->
  <text x="225" y="114" font-size="8" font-family="monospace"><tspan fill="#c792ea">if</tspan> <tspan fill="#c792ea">version</tspan> <tspan fill="#89ddff">>=</tspan> <tspan fill="#f78c6c">3</tspan><tspan fill="#89ddff">:</tspan></text>
  <!-- Line 6: indented -->
  <text x="240" y="128" font-size="8" font-family="monospace"><tspan fill="#82aaff">print</tspan><tspan fill="#89ddff">(</tspan><tspan fill="#c3e88d">"Modern"</tspan><tspan fill="#89ddff">)</tspan></text>
  <!-- Line 7: for -->
  <text x="225" y="142" font-size="8" font-family="monospace"><tspan fill="#c792ea">for</tspan> <tspan fill="#c792ea">i</tspan> <tspan fill="#c792ea">in</tspan> <tspan fill="#82aaff">range</tspan><tspan fill="#89ddff">(</tspan><tspan fill="#f78c6c">5</tspan><tspan fill="#89ddff">):</tspan></text>
  <!-- Line 8: indented -->
  <text x="240" y="156" font-size="8" font-family="monospace"><tspan fill="#82aaff">print</tspan><tspan fill="#89ddff">(</tspan><tspan fill="#c792ea">i</tspan><tspan fill="#89ddff">)</tspan></text>
  <!-- Output console -->
  <rect x="200" y="195" width="280" height="55" rx="0" fill="#1a1a2e"/>
  <text x="210" y="210" font-size="7" fill="#4caf50" font-family="monospace">&gt;&gt;&gt; Hello Python</text>
  <text x="210" y="222" font-size="7" fill="#4caf50" font-family="monospace">&gt;&gt;&gt; Modern</text>
  <text x="210" y="234" font-size="7" fill="#4caf50" font-family="monospace">&gt;&gt;&gt; 0 1 2 3 4</text>
  <!-- Key concepts (bottom) -->
  <rect x="30" y="265" width="440" height="55" rx="6" fill="#fff" opacity="0.85" stroke="#306998"/>
  <text x="250" y="282" font-size="8" fill="#306998" text-anchor="middle" font-weight="bold">Основные концепции Python</text>
  <g transform="translate(80,300)">
    <rect x="-40" y="-8" width="80" height="16" rx="3" fill="#306998" opacity="0.8"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Переменные</text>
  </g>
  <g transform="translate(180,300)">
    <rect x="-40" y="-8" width="80" height="16" rx="3" fill="#4B8BBE" opacity="0.8"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Типы данных</text>
  </g>
  <g transform="translate(280,300)">
    <rect x="-40" y="-8" width="80" height="16" rx="3" fill="#FFD43B" opacity="0.8"/>
    <text x="0" y="3" font-size="6" fill="#333" text-anchor="middle">Условия</text>
  </g>
  <g transform="translate(380,300)">
    <rect x="-40" y="-8" width="80" height="16" rx="3" fill="#306998" opacity="0.8"/>
    <text x="0" y="3" font-size="6" fill="#fff" text-anchor="middle">Циклы</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Программирование на языке Python</text>
</svg>