<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="100%" stop-color="#b2ebf2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Title -->
  <text x="250" y="22" font-size="9" fill="#00695c" text-anchor="middle" font-weight="bold">АЛГОРИТМИЧЕСКИЕ КОНСТРУКЦИИ В PYTHON</text>
  <!-- Three panels -->
  <!-- Sequence (left) -->
  <g transform="translate(90,160)">
    <rect x="-75" y="-110" width="150" height="240" rx="10" fill="#fff" stroke="#1565c0" stroke-width="2"/>
    <rect x="-75" y="-110" width="150" height="25" rx="10" fill="#1565c0"/>
    <rect x="-75" y="-95" width="150" height="10" fill="#1565c0"/>
    <text x="0" y="-92" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">СЛЕДОВАНИЕ</text>
    <!-- Flowchart -->
    <ellipse cx="0" cy="-70" rx="30" ry="10" fill="#4caf50" opacity="0.7"/>
    <text x="0" y="-67" font-size="5" fill="#fff" text-anchor="middle">Начало</text>
    <line x1="0" y1="-60" x2="0" y2="-50" stroke="#546e7a" stroke-width="1"/>
    <polygon points="0,-50 -2,-53 2,-53" fill="#546e7a"/>
    <rect x="-25" y="-50" width="50" height="15" rx="2" fill="#ff6f00" opacity="0.7"/>
    <text x="0" y="-40" font-size="5" fill="#fff" text-anchor="middle">Шаг 1</text>
    <line x1="0" y1="-35" x2="0" y2="-28" stroke="#546e7a" stroke-width="1"/>
    <rect x="-25" y="-28" width="50" height="15" rx="2" fill="#ff6f00" opacity="0.7"/>
    <text x="0" y="-18" font-size="5" fill="#fff" text-anchor="middle">Шаг 2</text>
    <line x1="0" y1="-13" x2="0" y2="-6" stroke="#546e7a" stroke-width="1"/>
    <rect x="-25" y="-6" width="50" height="15" rx="2" fill="#ff6f00" opacity="0.7"/>
    <text x="0" y="4" font-size="5" fill="#fff" text-anchor="middle">Шаг 3</text>
    <line x1="0" y1="9" x2="0" y2="16" stroke="#546e7a" stroke-width="1"/>
    <ellipse cx="0" cy="24" rx="30" ry="10" fill="#c62828" opacity="0.7"/>
    <text x="0" y="27" font-size="5" fill="#fff" text-anchor="middle">Конец</text>
    <!-- Code snippet -->
    <rect x="-65" y="42" width="130" height="55" rx="3" fill="#263238"/>
    <text x="-55" y="55" font-size="6" fill="#c3e88d" font-family="monospace">x = 5</text>
    <text x="-55" y="65" font-size="6" fill="#c3e88d" font-family="monospace">y = 10</text>
    <text x="-55" y="75" font-size="6" fill="#c3e88d" font-family="monospace">z = x + y</text>
    <text x="-55" y="85" font-size="6" fill="#82aaff" font-family="monospace">print(z)</text>
  </g>
  <!-- Branching (center) -->
  <g transform="translate(250,160)">
    <rect x="-75" y="-110" width="150" height="240" rx="10" fill="#fff" stroke="#2e7d32" stroke-width="2"/>
    <rect x="-75" y="-110" width="150" height="25" rx="10" fill="#2e7d32"/>
    <rect x="-75" y="-95" width="150" height="10" fill="#2e7d32"/>
    <text x="0" y="-92" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">ВЕТВЛЕНИЕ</text>
    <!-- Flowchart -->
    <ellipse cx="0" cy="-70" rx="30" ry="10" fill="#4caf50" opacity="0.7"/>
    <text x="0" y="-67" font-size="5" fill="#fff" text-anchor="middle">Начало</text>
    <line x1="0" y1="-60" x2="0" y2="-48" stroke="#546e7a" stroke-width="1"/>
    <!-- Diamond -->
    <polygon points="0,-48 25,-35 0,-22 -25,-35" fill="#c62828" opacity="0.7"/>
    <text x="0" y="-32" font-size="4" fill="#fff" text-anchor="middle">Усл.</text>
    <!-- Yes branch -->
    <line x1="-25" y1="-35" x2="-45" y2="-35" stroke="#2e7d32" stroke-width="1"/>
    <text x="-38" y="-38" font-size="4" fill="#2e7d32">Да</text>
    <rect x="-60" y="-18" width="25" height="12" rx="2" fill="#ff6f00" opacity="0.7"/>
    <text x="-47" y="-10" font-size="4" fill="#fff">А</text>
    <!-- No branch -->
    <line x1="25" y1="-35" x2="45" y2="-35" stroke="#c62828" stroke-width="1"/>
    <text x="38" y="-38" font-size="4" fill="#c62828">Нет</text>
    <rect x="35" y="-18" width="25" height="12" rx="2" fill="#ff6f00" opacity="0.7"/>
    <text x="47" y="-10" font-size="4" fill="#fff">Б</text>
    <!-- Merge -->
    <line x1="-47" y1="-6" x2="0" y2="10" stroke="#546e7a" stroke-width="1"/>
    <line x1="47" y1="-6" x2="0" y2="10" stroke="#546e7a" stroke-width="1"/>
    <ellipse cx="0" cy="24" rx="30" ry="10" fill="#c62828" opacity="0.7"/>
    <text x="0" y="27" font-size="5" fill="#fff" text-anchor="middle">Конец</text>
    <!-- Code snippet -->
    <rect x="-65" y="42" width="130" height="55" rx="3" fill="#263238"/>
    <text x="-55" y="55" font-size="6" fill="#c792ea" font-family="monospace">if</text>
    <text x="-40" y="55" font-size="6" fill="#c3e88d" font-family="monospace"> x &gt; 0:</text>
    <text x="-45" y="65" font-size="6" fill="#82aaff" font-family="monospace">  print("+")</text>
    <text x="-55" y="75" font-size="6" fill="#c792ea" font-family="monospace">else</text>
    <text x="-35" y="75" font-size="6" fill="#c3e88d" font-family="monospace">:</text>
    <text x="-45" y="85" font-size="6" fill="#82aaff" font-family="monospace">  print("-")</text>
  </g>
  <!-- Loop (right) -->
  <g transform="translate(410,160)">
    <rect x="-75" y="-110" width="150" height="240" rx="10" fill="#fff" stroke="#ff6f00" stroke-width="2"/>
    <rect x="-75" y="-110" width="150" height="25" rx="10" fill="#ff6f00"/>
    <rect x="-75" y="-95" width="150" height="10" fill="#ff6f00"/>
    <text x="0" y="-92" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">ЦИКЛ</text>
    <!-- Flowchart -->
    <ellipse cx="0" cy="-70" rx="30" ry="10" fill="#4caf50" opacity="0.7"/>
    <text x="0" y="-67" font-size="5" fill="#fff" text-anchor="middle">Начало</text>
    <line x1="0" y1="-60" x2="0" y2="-48" stroke="#546e7a" stroke-width="1"/>
    <!-- Diamond -->
    <polygon points="0,-48 25,-35 0,-22 -25,-35" fill="#c62828" opacity="0.7"/>
    <text x="0" y="-32" font-size="4" fill="#fff" text-anchor="middle">Усл.</text>
    <!-- Yes: loop body -->
    <line x1="-25" y1="-35" x2="-45" y2="-35" stroke="#2e7d32" stroke-width="1"/>
    <text x="-38" y="-38" font-size="4" fill="#2e7d32">Да</text>
    <rect x="-60" y="-18" width="30" height="12" rx="2" fill="#ff6f00" opacity="0.7"/>
    <text x="-45" y="-10" font-size="4" fill="#fff">Тело</text>
    <!-- Loop back arrow -->
    <path d="M-60,-12 L-65,-12 L-65,-35 L-25,-35" fill="none" stroke="#ff6f00" stroke-width="1"/>
    <!-- No: exit -->
    <line x1="25" y1="-35" x2="40" y2="-35" stroke="#c62828" stroke-width="1"/>
    <text x="33" y="-38" font-size="4" fill="#c62828">Нет</text>
    <line x1="40" y1="-35" x2="40" y2="20" stroke="#546e7a" stroke-width="1"/>
    <line x1="40" y1="20" x2="0" y2="20" stroke="#546e7a" stroke-width="1"/>
    <ellipse cx="0" cy="24" rx="30" ry="10" fill="#c62828" opacity="0.7"/>
    <text x="0" y="27" font-size="5" fill="#fff" text-anchor="middle">Конец</text>
    <!-- Code snippet -->
    <rect x="-65" y="42" width="130" height="55" rx="3" fill="#263238"/>
    <text x="-55" y="55" font-size="6" fill="#c792ea" font-family="monospace">for</text>
    <text x="-38" y="55" font-size="6" fill="#c3e88d" font-family="monospace"> i in</text>
    <text x="-15" y="55" font-size="6" fill="#82aaff" font-family="monospace"> range</text>
    <text x="17" y="55" font-size="6" fill="#c3e88d" font-family="monospace">(5):</text>
    <text x="-45" y="65" font-size="6" fill="#82aaff" font-family="monospace">  print(i)</text>
    <text x="-55" y="80" font-size="6" fill="#c792ea" font-family="monospace">while</text>
    <text x="-28" y="80" font-size="6" fill="#c3e88d" font-family="monospace"> x &gt; 0:</text>
    <text x="-45" y="90" font-size="6" fill="#82aaff" font-family="monospace">  x -= 1</text>
  </g>
  <text x="250" y="340" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Алгоритмические конструкции в Python</text>
</svg>