<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="hdrlab2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6A1B9A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#AB47BC;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bglab2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadowlab2" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bglab2)"/>
  <rect x="2" y="2" width="496" height="346" rx="12" ry="12" fill="none" stroke="#6A1B9A" stroke-width="2.5" opacity="0.6"/>
  <rect x="3" y="3" width="494" height="42" rx="10" ry="10" fill="url(#hdrlab2)"/>
  <rect x="3" y="35" width="494" height="10" fill="url(#hdrlab2)"/>
  <text x="250" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Измерения и погрешности</text>
  <text x="250" y="36" font-family="Arial, sans-serif" font-size="10" fill="#F3E5F5" text-anchor="middle">Лаборатория — Урок 2</text>
  <circle cx="28" cy="24" r="14" fill="#FFFFFF" opacity="0.25"/>
  <text x="28" y="28" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
  <rect x="12" y="52" width="230" height="146" rx="8" ry="8" fill="#FFFFFF" opacity="0.7" filter="url(#shadowlab2)"/>
  <rect x="16" y="55" width="222" height="18" rx="4" ry="4" fill="#6A1B9A" opacity="0.15"/>
  <text x="127" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Виды измерений</text>
  <circle cx="26" cy="77" r="4" fill="#6A1B9A" opacity="0.8"/>
  <text x="36" y="80" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Прямые — результат считывают с прибора (линейка, весы)</text>
  <circle cx="26" cy="99" r="4" fill="#6A1B9A" opacity="0.8"/>
  <text x="36" y="102" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Косвенные — вычисляют по формулам (ρ = m/V)</text>
  <circle cx="26" cy="121" r="4" fill="#6A1B9A" opacity="0.8"/>
  <text x="36" y="124" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Абсолютная погрешность: ΔA = Aизм − Aист</text>
  <circle cx="26" cy="143" r="4" fill="#6A1B9A" opacity="0.8"/>
  <text x="36" y="146" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Относительная погрешность: ε = ΔA / A · 100%</text>
  <circle cx="26" cy="165" r="4" fill="#6A1B9A" opacity="0.8"/>
  <text x="36" y="168" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Систематическая vs случайная погрешность</text>
  <rect x="252" y="52" width="236" height="146" rx="8" ry="8" fill="#FFFFFF" opacity="0.7" filter="url(#shadowlab2)"/>
  <rect x="256" y="55" width="228" height="18" rx="4" ry="4" fill="#6A1B9A" opacity="0.15"/>
  <text x="370" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Правила записи результата</text>
  <circle cx="266" cy="77" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="80" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">1</text>
  <text x="278" y="80" font-family="Arial, sans-serif" font-size="9" fill="#37474F">A = (12,5 ± 0,1) см</text>
  <circle cx="266" cy="99" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="102" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">2</text>
  <text x="278" y="102" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Погрешность записывается с 1–2 значащими цифрами</text>
  <circle cx="266" cy="121" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="124" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">3</text>
  <text x="278" y="124" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Результат округляется до разряда погрешности</text>
  <circle cx="266" cy="143" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="146" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">4</text>
  <text x="278" y="146" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Относительная погрешность: ε = 0,1/12,5 = 0,8%</text>
  <circle cx="266" cy="165" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="168" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">5</text>
  <text x="278" y="168" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Доверительная вероятность: P = 0,95</text>
  <rect x="12" y="206" width="476" height="74" rx="8" ry="8" fill="#FFFFFF" opacity="0.7" filter="url(#shadowlab2)"/>
  <rect x="12" y="206" width="5" height="74" rx="2" ry="0" fill="#6A1B9A" opacity="0.7"/>
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#38006B" text-anchor="middle">Методы уменьшения погрешности</text>
  <rect x="24" y="228" width="452" height="15" rx="3" ry="3" fill="#6A1B9A" opacity="0.06"/>
  <text x="30" y="236" font-family="Arial, sans-serif" font-size="9" fill="#37474F">1. Увеличить число измерений (метод среднего)  2. Использовать более точные приборы</text>
  <rect x="24" y="246" width="452" height="15" rx="3" ry="3" fill="#6A1B9A" opacity="0.06"/>
  <text x="30" y="254" font-family="Arial, sans-serif" font-size="9" fill="#37474F">3. Устранить систематические ошибки (калибровка)</text>
<g transform="translate(440,58)"><line x1="5" y1="40" x2="35" y2="40" stroke="#6A1B9A" stroke-width="1" opacity="0.3"/><line x1="5" y1="40" x2="5" y2="5" stroke="#6A1B9A" stroke-width="1" opacity="0.3"/><polyline points="5,40 12,25 20,30 28,15 35,10" fill="none" stroke="#6A1B9A" stroke-width="1.5" opacity="0.2"/><circle cx="12" cy="25" r="2" fill="#6A1B9A" opacity="0.2"/><circle cx="20" cy="30" r="2" fill="#6A1B9A" opacity="0.2"/><circle cx="28" cy="15" r="2" fill="#6A1B9A" opacity="0.2"/></g>
  <line x1="15" y1="334" x2="485" y2="334" stroke="#6A1B9A" stroke-width="0.5" opacity="0.3"/>
  <text x="250" y="338" font-family="Arial, sans-serif" font-size="8" fill="#9E9E9E" text-anchor="middle">Лаборатория · 10 класс</text>
</svg>