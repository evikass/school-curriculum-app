  <text x="250" y="20" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Химические реакции с нагреванием</text>
  <text x="250" y="36" font-family="Arial, sans-serif" font-size="10" fill="#F3E5F5" text-anchor="middle">Лаборатория — Урок 8</text>
  <circle cx="28" cy="24" r="14" fill="#FFFFFF" opacity="0.25"/>
  <text x="28" y="28" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">8</text>
  <rect x="12" y="52" width="230" height="146" rx="8" ry="8" fill="#FFFFFF" opacity="0.7" filter="url(#shadowlab8)"/>
  <rect x="16" y="55" width="222" height="18" rx="4" ry="4" fill="#6A1B9A" opacity="0.15"/>
  <text x="127" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Правила нагревания</text>
  <circle cx="26" cy="77" r="4" fill="#C62828" opacity="0.8"/>
  <text x="36" y="80" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Используйте держатель — не берите горячее руками!</text>
  <circle cx="26" cy="99" r="4" fill="#C62828" opacity="0.8"/>
  <text x="36" y="102" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Не направляйте отверстие пробирки на людей</text>
  <circle cx="26" cy="121" r="4" fill="#2E7D32" opacity="0.8"/>
  <text x="36" y="124" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Нагревайте равномерно, не только дно</text>
  <circle cx="26" cy="143" r="4" fill="#2E7D32" opacity="0.8"/>
  <text x="36" y="146" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Жидкость — не более 1/3 объёма пробирки</text>
  <circle cx="26" cy="165" r="4" fill="#C62828" opacity="0.8"/>
  <text x="36" y="168" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Горячую посуду ставьте на асбестовую сетку</text>
  <rect x="252" y="52" width="236" height="146" rx="8" ry="8" fill="#FFFFFF" opacity="0.7" filter="url(#shadowlab8)"/>
  <rect x="256" y="55" width="228" height="18" rx="4" ry="4" fill="#6A1B9A" opacity="0.15"/>
  <text x="370" y="68" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Реакции с нагреванием</text>
  <circle cx="266" cy="77" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="80" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">1</text>
  <text x="278" y="80" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Разложение KMnO₄ → K₂MnO₄ + MnO₂ + O₂↑</text>
  <circle cx="266" cy="99" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="102" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">2</text>
  <text x="278" y="102" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Обжиг меди: 2Cu + O₂ → 2CuO</text>
  <circle cx="266" cy="121" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="124" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">3</text>
  <text x="278" y="124" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Разложение карбоната: CaCO₃ → CaO + CO₂↑</text>
  <circle cx="266" cy="143" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="146" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">4</text>
  <text x="278" y="146" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Получение водорода: Zn + 2HCl → ZnCl₂ + H₂↑</text>
  <circle cx="266" cy="165" r="6" fill="#6A1B9A" opacity="0.2"/>
  <text x="266" y="168" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">5</text>
  <text x="278" y="168" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Кристаллогидраты: CuSO₄·5H₂O → CuSO₄ + 5H₂O</text>
  <rect x="12" y="206" width="476" height="56" rx="8" ry="8" fill="#FFFFFF" opacity="0.7" filter="url(#shadowlab8)"/>
  <rect x="12" y="206" width="5" height="56" rx="2" ry="0" fill="#6A1B9A" opacity="0.7"/>
  <text x="250" y="220" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#38006B" text-anchor="middle">Меры безопасности при нагревании</text>
  <rect x="24" y="228" width="452" height="15" rx="3" ry="3" fill="#6A1B9A" opacity="0.06"/>
  <text x="30" y="236" font-family="Arial, sans-serif" font-size="9" fill="#37474F">Уберите легковоспламеняющиеся вещества! Держите рядом соду для тушения</text>
<g transform="translate(440,58)"><path d="M20,5 C25,15 30,20 28,35 C27,40 23,42 20,45 C17,42 13,40 12,35 C10,20 15,15 20,5Z" fill="#6A1B9A" opacity="0.1" stroke="#6A1B9A" stroke-width="1"/><path d="M20,15 C23,22 26,25 24,34 C23,37 21,39 20,41" fill="none" stroke="#AB47BC" stroke-width="1" opacity="0.2"/></g>
