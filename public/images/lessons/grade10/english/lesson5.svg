<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#283593" text-anchor="middle">Phrasal Verbs</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Английский язык — Урок 5</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#283593" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#283593" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Phrasal Verb = глагол + предлог/наречие = новый смысл</text>
  <rect x="20" y="120" width="460" height="24" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="136" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">look for</text>
  <text x="130" y="136" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">искать</text>
  <text x="260" y="136" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="start" font-weight="normal">I'm looking for my keys</text>
  <rect x="20" y="148" width="460" height="24" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="164" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">look after</text>
  <text x="130" y="164" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">заботиться</text>
  <text x="260" y="164" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="start" font-weight="normal">She looks after children</text>
  <rect x="20" y="176" width="460" height="24" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="192" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">give up</text>
  <text x="130" y="192" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">бросить, отказаться</text>
  <text x="260" y="192" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="start" font-weight="normal">Don't give up!</text>
  <rect x="20" y="204" width="460" height="24" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="220" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">take off</text>
  <text x="130" y="220" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">снимать, взлетать</text>
  <text x="260" y="220" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="start" font-weight="normal">The plane took off</text>
  <rect x="20" y="232" width="460" height="24" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="248" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">put on</text>
  <text x="130" y="248" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">надевать</text>
  <text x="260" y="248" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="start" font-weight="normal">Put on your coat</text>
  <rect x="20" y="260" width="460" height="24" rx="5" fill="#283593" opacity="0.04"/>
  <text x="30" y="276" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">turn down</text>
  <text x="130" y="276" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">отклонять</text>
  <text x="260" y="276" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="start" font-weight="normal">They turned down the offer</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#283593" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-style="italic">English · Grade 10</text>
</svg>