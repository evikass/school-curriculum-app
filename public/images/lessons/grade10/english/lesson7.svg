<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#283593" text-anchor="middle">Word Formation</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Английский язык — Урок 7</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#283593" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#283593" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Словообразование — создание новых слов с помощью аффиксов</text>
  <rect x="20" y="120" width="225" height="95" rx="5" fill="#283593" opacity="0.08"/>
  <text x="30" y="138" font-family="Arial,sans-serif" font-size="12" fill="#283593" text-anchor="start" font-weight="bold">Prefixes (приставки)</text>
  <text x="30" y="158" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="bold">un-</text>
  <text x="70" y="158" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">unhappy (несчастный)</text>
  <text x="30" y="174" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="bold">re-</text>
  <text x="70" y="174" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">rewrite (переписать)</text>
  <text x="30" y="190" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="bold">dis-</text>
  <text x="70" y="190" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">disagree (не соглашаться)</text>
  <text x="30" y="206" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="bold">pre-</text>
  <text x="70" y="206" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">preview (предпросмотр)</text>
  <rect x="255" y="120" width="225" height="95" rx="5" fill="#283593" opacity="0.08"/>
  <text x="265" y="138" font-family="Arial,sans-serif" font-size="12" fill="#283593" text-anchor="start" font-weight="bold">Suffixes (суффиксы)</text>
  <text x="265" y="158" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="bold">-tion</text>
  <text x="310" y="158" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">education (образование)</text>
  <text x="265" y="174" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="bold">-ment</text>
  <text x="310" y="174" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">development (развитие)</text>
  <text x="265" y="190" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="bold">-ful</text>
  <text x="310" y="190" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">beautiful (красивый)</text>
  <text x="265" y="206" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="bold">-less</text>
  <text x="310" y="206" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">careless (беззаботный)</text>
  <rect x="20" y="222" width="460" height="55" rx="5" fill="#283593" opacity="0.08"/>
  <text x="30" y="240" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">Схема:</text>
  <text x="30" y="258" font-family="Arial,sans-serif" font-size="8" fill="#333333" text-anchor="start" font-weight="normal">care → careful → carefully  |  use → useful → useless  |  happy → unhappy → unhappiness</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#283593" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-style="italic">English · Grade 10</text>
</svg>