<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#283593" text-anchor="middle">Reported Speech</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Английский язык — Урок 4</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#283593" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#283593" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Косвенная речь — передача чужих слов без цитирования</text>
  <rect x="20" y="120" width="225" height="80" rx="5" fill="#283593" opacity="0.08"/>
  <text x="132" y="138" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Direct Speech</text>
  <text x="35" y="160" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">"I am tired," she said.</text>
  <text x="35" y="178" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">"I will come," he said.</text>
  <rect x="255" y="120" width="225" height="80" rx="5" fill="#283593" opacity="0.08"/>
  <text x="367" y="138" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Reported Speech</text>
  <text x="270" y="160" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">She said she was tired.</text>
  <text x="270" y="178" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">He said he would come.</text>
  <rect x="20" y="208" width="460" height="80" rx="5" fill="#283593" opacity="0.08"/>
  <text x="30" y="226" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="start" font-weight="bold">Сдвиг времён (backshift):</text>
  <text x="30" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Present Simple → Past Simple</text>
  <text x="30" y="259" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Present Perfect → Past Perfect</text>
  <text x="30" y="274" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Future (will) → would</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#283593" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-style="italic">English · Grade 10</text>
</svg>