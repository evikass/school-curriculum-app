<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#283593" text-anchor="middle">Perfect Tenses</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Английский язык — Урок 1</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#283593" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#283593" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Perfect — действие, завершённое к определённому моменту</text>
  <rect x="20" y="120" width="460" height="44" rx="5" fill="#283593" opacity="0.05"/>
  <text x="30" y="136" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="start" font-weight="bold">Present Perfect</text>
  <text x="30" y="152" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="normal">have/has + V3</text>
  <text x="200" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">I have finished my work</text>
  <rect x="20" y="172" width="460" height="44" rx="5" fill="#283593" opacity="0.05"/>
  <text x="30" y="188" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="start" font-weight="bold">Past Perfect</text>
  <text x="30" y="204" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="normal">had + V3</text>
  <text x="200" y="204" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">She had left before he came</text>
  <rect x="20" y="224" width="460" height="44" rx="5" fill="#283593" opacity="0.05"/>
  <text x="30" y="240" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="start" font-weight="bold">Future Perfect</text>
  <text x="30" y="256" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="start" font-weight="normal">will have + V3</text>
  <text x="200" y="256" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">They will have built it by May</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#283593" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#283593" text-anchor="middle" font-style="italic">English · Grade 10</text>
</svg>