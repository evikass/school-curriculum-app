  <text x="268" y="118" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32">• Изометрический: 5-6 сек</text>
  <text x="268" y="132" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32">• Круговая тренировка</text>
  <text x="268" y="146" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32">• Отягощение 60-80% от макс.</text>
