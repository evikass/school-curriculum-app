  <text x="28" y="104" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32">• Сила — преодоление сопротивл.</text>
  <text x="28" y="118" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32">• Быстрота — скорость реакции</text>
