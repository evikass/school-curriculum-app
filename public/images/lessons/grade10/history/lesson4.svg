<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5D4037" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#5D4037" text-anchor="middle">Сталинградская битва</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">История — Урок 4</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#5D4037" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="45" rx="5" fill="#C62828" opacity="0.06"/>
  <text x="250" y="90" font-family="Arial,sans-serif" font-size="12" fill="#5D4037" text-anchor="middle" font-weight="bold">Сталинградская битва (17 июля 1942 — 2 февраля 1943)</text>
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal">Коренной перелом в ходе Великой Отечественной войны</text>
  <rect x="20" y="124" width="225" height="80" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="30" y="142" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="start" font-weight="bold">Оборона Сталинграда</text>
  <text x="30" y="160" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Июль — ноябрь 1942</text>
  <text x="30" y="178" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Уличные бои за каждый дом</text>
  <text x="30" y="194" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Дом Павлова — 58 дней</text>
  <rect x="255" y="124" width="225" height="80" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="265" y="142" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="start" font-weight="bold">Контрнаступление</text>
  <text x="265" y="160" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Операция «Уран» — 19 ноября 1942</text>
  <text x="265" y="178" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Окружение 6-й армии Паулюса</text>
  <text x="265" y="194" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Капитуляция 2 февраля 1943</text>
  <rect x="20" y="212" width="460" height="55" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="30" y="230" font-family="Arial,sans-serif" font-size="12" fill="#5D4037" text-anchor="start" font-weight="bold">Значение победы:</text>
  <text x="30" y="248" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Крупнейшее поражение вермахта — 330 тыс. солдат потеряно</text>
  <text x="30" y="262" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Коренной перелом в войне — стратегическая инициатива перешла к СССР</text>
  <rect x="20" y="274" width="460" height="38" rx="5" fill="#5D4037" opacity="0.06"/>
  <text x="250" y="296" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal">Командующие: Чуйков, Шумилов, Рокоссовский, Васильевский</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#5D4037" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" text-anchor="middle" font-style="italic">История · Великая Отечественная война · 10 класс</text>
</svg>