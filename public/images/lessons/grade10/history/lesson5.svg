<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5D4037" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#5D4037" text-anchor="middle">Курская битва</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">История — Урок 5</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#5D4037" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="45" rx="5" fill="#C62828" opacity="0.06"/>
  <text x="250" y="90" font-family="Arial,sans-serif" font-size="12" fill="#5D4037" text-anchor="middle" font-weight="bold">Курская битва (5 июля — 23 августа 1943)</text>
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal">Крупнейшее танковое сражение — окончательный перелом в войне</text>
  <rect x="20" y="124" width="150" height="95" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="95" y="142" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Оборона</text>
  <text x="30" y="160" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">5–12 июля</text>
  <text x="30" y="178" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Немецкое</text>
  <text x="30" y="192" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">наступление</text>
  <text x="30" y="210" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="start" font-weight="bold">«Цитадель»</text>
  <rect x="180" y="124" width="150" height="95" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="255" y="142" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Контрудар</text>
  <text x="190" y="160" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">12–15 июля</text>
  <text x="190" y="178" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Танковое сражение</text>
  <text x="190" y="192" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">под Прохоровкой</text>
  <text x="190" y="210" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="start" font-weight="bold">1200 танков</text>
  <rect x="340" y="124" width="140" height="95" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="410" y="142" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Наступление</text>
  <text x="350" y="160" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">12 июля — 23 авг.</text>
  <text x="350" y="178" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Освобождение</text>
  <text x="350" y="192" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Орла и Белгорода</text>
  <text x="350" y="210" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="start" font-weight="bold">5 августа — салют</text>
  <rect x="20" y="226" width="460" height="55" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="30" y="244" font-family="Arial,sans-serif" font-size="12" fill="#5D4037" text-anchor="start" font-weight="bold">Значение:</text>
  <text x="30" y="262" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Стратегическая инициатива окончательно перешла к Красной Армии</text>
  <text x="30" y="276" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Крупнейшее танковое сражение в истории — около 1200 танков</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#5D4037" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" text-anchor="middle" font-style="italic">История · Великая Отечественная война · 10 класс</text>
</svg>