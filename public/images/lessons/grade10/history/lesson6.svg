<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5D4037" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#5D4037" text-anchor="middle">Победа над Германией</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">История — Урок 6</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#5D4037" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="50" rx="5" fill="#C62828" opacity="0.06"/>
  <polygon points="250,74 253.08,83.66 264,83.66 255.32,89.68 258.26,102 250,93.32 241.74,102 244.68,89.68 236,83.66 246.92,83.66" fill="#C62828" opacity="0.5"/>
  <text x="250" y="112" font-family="Arial,sans-serif" font-size="16" fill="#C62828" text-anchor="middle" font-weight="bold">9 Мая 1945 года — День Победы</text>
  <rect x="20" y="130" width="225" height="85" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="30" y="148" font-family="Arial,sans-serif" font-size="12" fill="#5D4037" text-anchor="start" font-weight="bold">Завершающие операции</text>
  <text x="30" y="166" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Висло-Одерская операция</text>
  <text x="30" y="182" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Взятие Берлина (16 апр. — 2 мая)</text>
  <text x="30" y="198" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Водружение знамени над Рейхстагом</text>
  <rect x="255" y="130" width="225" height="85" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="265" y="148" font-family="Arial,sans-serif" font-size="12" fill="#5D4037" text-anchor="start" font-weight="bold">Капитуляция</text>
  <text x="265" y="166" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">8 мая — подписание акта</text>
  <text x="265" y="182" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">о безоговорочной капитуляции</text>
  <text x="265" y="198" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">9 мая — объявление в СССР</text>
  <rect x="20" y="222" width="460" height="70" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="30" y="240" font-family="Arial,sans-serif" font-size="12" fill="#5D4037" text-anchor="start" font-weight="bold">Итоги войны:</text>
  <text x="30" y="258" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• 27 млн погибших советских граждан</text>
  <text x="30" y="272" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Освобождение Европы от фашизма</text>
  <text x="30" y="286" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Создание ООН, новый мировой порядок</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#5D4037" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" text-anchor="middle" font-style="italic">История · Великая Отечественная война · 10 класс</text>
</svg>