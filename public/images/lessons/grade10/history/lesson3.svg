  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5D4037" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#5D4037" text-anchor="middle">Битва за Москву</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">История — Урок 3</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#5D4037" stroke-width="2" opacity="0.25"/>
