  <text x="92" y="274" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal">7 ноября 1941</text>
  <rect x="175" y="226" width="145" height="55" rx="5" fill="#5D4037" opacity="0.08"/>
  <text x="247" y="248" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" text-anchor="middle" font-weight="bold">Командующий</text>
  <text x="247" y="264" font-family="Arial,sans-serif" font-size="10" fill="#5D4037" text-anchor="middle" font-weight="normal">Г.К. Жуков</text>
