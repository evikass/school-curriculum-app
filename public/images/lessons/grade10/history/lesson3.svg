  <text x="265" y="160" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Декабрь 1941 — январь 1942</text>
  <text x="265" y="178" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Контрнаступление 5-6 дек.</text>
  <text x="265" y="194" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Отброшены на 100-250 км</text>
  <text x="265" y="210" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Разгром ударных группировок</text>
  <rect x="20" y="226" width="145" height="55" rx="5" fill="#5D4037" opacity="0.08"/>
  <polygon points="92,230 94.2,236.9 102,236.9 95.8,241.2 97.9,250 92,243.8 86.1,250 88.2,241.2 82,236.9 89.8,236.9" fill="#C62828" opacity="0.5"/>
