  <text x="30" y="160" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Октябрь — ноябрь 1941</text>
  <text x="30" y="178" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Операция «Тайфун»</text>
  <text x="30" y="194" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Паника в Москве (16 окт.)</text>
  <text x="30" y="210" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Оборона на ближних подступах</text>
