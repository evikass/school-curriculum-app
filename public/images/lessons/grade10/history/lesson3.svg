  <text x="250" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal">Первое крупное поражение вермахта, развеяние мифа о непобедимости</text>
  <rect x="20" y="124" width="225" height="95" rx="5" fill="#5D4037" opacity="0.08"/>
