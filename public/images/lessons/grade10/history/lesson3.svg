  <text x="405" y="248" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" text-anchor="middle" font-weight="bold">Значение</text>
  <text x="405" y="264" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="normal">Крах блицкрига</text>
  <text x="405" y="278" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal">Развеяние мифа</text>
