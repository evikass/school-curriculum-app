<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Простое предложение</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#E3F2FD" opacity="0.5"/>
    
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Простое предложение</text>
  
  <!-- Sentence diagram -->
  <rect x="50" y="120" rx="6" width="400" height="35" fill="#42A5F5" opacity="0.08" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="143" font-family="Georgia,serif" font-size="15" fill="#1565C0" text-anchor="middle">Мальчик читает интересную книгу</text>
  
  <!-- Parse diagram -->
  <line x1="112" y1="158" x2="112" y2="175" stroke="#1565C0" stroke-width="1" opacity="0.5"/>
  <line x1="240" y1="158" x2="240" y2="175" stroke="#EF5350" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="158" x2="340" y2="175" stroke="#4CAF50" stroke-width="1" opacity="0.5"/>
  <line x1="410" y1="158" x2="410" y2="175" stroke="#FF9800" stroke-width="1" opacity="0.5"/>
  
  <!-- Subject -->
  <rect x="70" y="180" rx="4" width="85" height="25" fill="#1565C0" opacity="0.12" stroke="#1565C0" stroke-width="1"/>
  <text x="112" y="197" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Подлежащее</text>
  <text x="112" y="215" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">кто? что?</text>
  
  <!-- Predicate -->
  <rect x="190" y="180" rx="4" width="100" height="25" fill="#EF5350" opacity="0.12" stroke="#EF5350" stroke-width="1"/>
  <text x="240" y="197" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">Сказуемое</text>
  <text x="240" y="215" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">что делает?</text>
  
  <!-- Object -->
  <rect x="305" y="180" rx="4" width="70" height="25" fill="#4CAF50" opacity="0.12" stroke="#4CAF50" stroke-width="1"/>
  <text x="340" y="197" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">Дополнение</text>
  <text x="340" y="215" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">кого? что?</text>
  
  <!-- Attribute -->
  <rect x="385" y="180" rx="4" width="60" height="25" fill="#FF9800" opacity="0.12" stroke="#FF9800" stroke-width="1"/>
  <text x="415" y="197" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="middle" font-weight="bold">Определение</text>
  <text x="415" y="215" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">какой?</text>
  
  <!-- Grammatical basis -->
  <rect x="50" y="228" rx="6" width="400" height="35" fill="#1565C0" opacity="0.06" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="250" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Грамматическая основа: подлежащее + сказуемое</text>
  
  <!-- Types by purpose -->
  <rect x="30" y="270" rx="6" width="145" height="28" fill="#4CAF50" opacity="0.08" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="102" y="289" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">Повествовательное</text>
  
  <rect x="185" y="270" rx="6" width="130" height="28" fill="#EF5350" opacity="0.08" stroke="#C62828" stroke-width="0.8"/>
  <text x="250" y="289" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">Вопросительное</text>
  
  <rect x="325" y="270" rx="6" width="145" height="28" fill="#FF9800" opacity="0.08" stroke="#E65100" stroke-width="0.8"/>
  <text x="397" y="289" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle">Побудительное</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык</text>
</svg>