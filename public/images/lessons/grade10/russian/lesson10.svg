<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Сложное предложение</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 10</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#E3F2FD" opacity="0.5"/>
    
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Сложное предложение</text>
  
  <!-- Compound sentence diagram -->
  <rect x="30" y="118" rx="8" width="220" height="85" fill="#4CAF50" opacity="0.06" stroke="#2E7D32" stroke-width="1"/>
  <text x="140" y="136" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">Сложносочинённое</text>
  <text x="140" y="152" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">равноправные части</text>
  
  <rect x="40" y="160" rx="3" width="80" height="25" fill="#1565C0" opacity="0.08" stroke="#1565C0" stroke-width="0.8"/>
  <text x="80" y="177" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">[Предл. 1]</text>
  
  <rect x="130" y="160" rx="3" width="30" height="25" fill="#2E7D32" opacity="0.12" stroke="#2E7D32" stroke-width="1"/>
  <text x="145" y="177" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">и</text>
  
  <rect x="170" y="160" rx="3" width="80" height="25" fill="#1565C0" opacity="0.08" stroke="#1565C0" stroke-width="0.8"/>
  <text x="210" y="177" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">[Предл. 2]</text>
  
  <text x="140" y="198" font-family="Georgia,serif" font-size="9" fill="#1565C0" text-anchor="middle" font-style="italic">Ветер дул, и дождь шёл.</text>
  
  <!-- Complex sentence diagram -->
  <rect x="260" y="118" rx="8" width="220" height="85" fill="#EF5350" opacity="0.06" stroke="#C62828" stroke-width="1"/>
  <text x="370" y="136" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">Сложноподчинённое</text>
  <text x="370" y="152" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">главное + придаточное</text>
  
  <rect x="270" y="160" rx="3" width="80" height="25" fill="#C62828" opacity="0.08" stroke="#C62828" stroke-width="0.8"/>
  <text x="310" y="177" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">[Главное]</text>
  
  <rect x="360" y="160" rx="3" width="40" height="25" fill="#EF5350" opacity="0.12" stroke="#C62828" stroke-width="1"/>
  <text x="380" y="177" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">когда</text>
  
  <rect x="410" y="160" rx="3" width="60" height="25" fill="#EF5350" opacity="0.08" stroke="#EF5350" stroke-width="0.8"/>
  <text x="440" y="177" font-family="Arial,sans-serif" font-size="9" fill="#EF5350" text-anchor="middle">(Придат.)</text>
  
  <text x="370" y="198" font-family="Georgia,serif" font-size="9" fill="#1565C0" text-anchor="middle" font-style="italic">Я знал, что он придёт.</text>
  
  <!-- Conjunctions -->
  <rect x="30" y="215" rx="6" width="220" height="85" fill="#E3F2FD" opacity="0.3" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="140" y="235" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Сочинительные союзы</text>
  <text x="140" y="252" font-family="Georgia,serif" font-size="11" fill="#2E7D32" text-anchor="middle">и, а, но, или, да, однако</text>
  <text x="140" y="270" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">соединяют равноправные</text>
  <text x="140" y="282" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">простые предложения</text>
  
  <rect x="260" y="215" rx="6" width="220" height="85" fill="#E3F2FD" opacity="0.3" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="370" y="235" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Подчинительные союзы</text>
  <text x="370" y="252" font-family="Georgia,serif" font-size="11" fill="#C62828" text-anchor="middle">что, чтобы, если, когда</text>
  <text x="370" y="270" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">придаточное зависит</text>
  <text x="370" y="282" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">от главного предложения</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык</text>
</svg>