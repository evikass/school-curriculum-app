<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#D32F2F" text-anchor="middle">Синонимы, антонимы, омонимы</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Русский язык — Урок 6</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#D32F2F" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="150" height="95" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="95" y="90" font-family="Arial,sans-serif" font-size="13" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Синонимы</text>
  <text x="95" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Близкие по значению</text>
  <rect x="30" y="115" width="130" height="20" rx="5" fill="#FFCDD2" opacity="0.5"/>
  <text x="95" y="130" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">большой — огромный</text>
  <rect x="30" y="140" width="130" height="20" rx="5" fill="#FFCDD2" opacity="0.5"/>
  <text x="95" y="155" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">бежать — мчаться</text>
  <rect x="175" y="72" width="150" height="95" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="250" y="90" font-family="Arial,sans-serif" font-size="13" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Антонимы</text>
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Противоположные</text>
  <rect x="185" y="115" width="130" height="20" rx="5" fill="#FFCDD2" opacity="0.5"/>
  <text x="250" y="130" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">большой — маленький</text>
  <rect x="185" y="140" width="130" height="20" rx="5" fill="#FFCDD2" opacity="0.5"/>
  <text x="250" y="155" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">день — ночь</text>
  <rect x="330" y="72" width="150" height="95" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="405" y="90" font-family="Arial,sans-serif" font-size="13" fill="#D32F2F" text-anchor="middle" font-weight="bold" font-style="">Омонимы</text>
  <text x="405" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Одинаковые по звучанию</text>
  <rect x="340" y="115" width="130" height="20" rx="5" fill="#FFCDD2" opacity="0.5"/>
  <text x="405" y="130" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">ключ (родник, дверной)</text>
  <rect x="340" y="140" width="130" height="20" rx="5" fill="#FFCDD2" opacity="0.5"/>
  <text x="405" y="155" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="middle" font-weight="normal" font-style="">лук (оружие, растение)</text>
  <rect x="20" y="175" width="225" height="70" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="30" y="193" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Паронимы</text>
  <text x="30" y="210" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal" font-style="">Похожие, но разные по значению:</text>
  <text x="30" y="228" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal" font-style="">адресат — адресант</text>
  <text x="30" y="242" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal" font-style="">одеть — надеть</text>
  <rect x="255" y="175" width="225" height="70" rx="5" fill="#D32F2F" opacity="0.08"/>
  <text x="265" y="193" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Омофоны / Омографы</text>
  <text x="265" y="210" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">Омофоны: луг — лук (звучат)</text>
  <text x="265" y="228" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">Омографы: зАмок — замОк</text>
  <text x="265" y="242" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">Омоформы: печь (гл./сущ.)</text>
  <rect x="20" y="252" width="460" height="50" rx="5" fill="#D32F2F" opacity="0.06"/>
  <text x="250" y="272" font-family="Arial,sans-serif" font-size="10" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Лексические отношения обогащают речь и помогают точнее выражать мысли</text>
  <text x="250" y="290" font-family="Arial,sans-serif" font-size="9" fill="#888888" text-anchor="middle" font-weight="normal" font-style="">Словари: синонимов, антонимов, омонимов, паронимов</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#D32F2F" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle" font-style="italic">Русский язык · 10 класс</text>
</svg>