<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Синонимы, антонимы, омонимы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#E3F2FD" opacity="0.5"/>
    
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Лексические отношения</text>
  
  <!-- Синонимы -->
  <rect x="30" y="118" rx="8" width="140" height="170" fill="#4CAF50" opacity="0.06" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="100" y="138" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Синонимы</text>
  <text x="100" y="155" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">близкие по значению</text>
  <!-- Equal sign -->
  <text x="100" y="175" font-family="Arial,sans-serif" font-size="20" fill="#2E7D32" text-anchor="middle">=</text>
  <text x="100" y="195" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle" font-style="italic">храбрый</text>
  <text x="100" y="212" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle" font-style="italic">смелый</text>
  <text x="100" y="229" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle" font-style="italic">отважный</text>
  <text x="100" y="246" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle" font-style="italic">бесстрашный</text>
  <text x="100" y="270" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">разные слова,</text>
  <text x="100" y="281" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">одинаковое значение</text>
  
  <!-- Антонимы -->
  <rect x="180" y="118" rx="8" width="140" height="170" fill="#EF5350" opacity="0.06" stroke="#C62828" stroke-width="1.2"/>
  <text x="250" y="138" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">Антонимы</text>
  <text x="250" y="155" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">противоположные</text>
  <!-- Not equal sign -->
  <text x="250" y="175" font-family="Arial,sans-serif" font-size="20" fill="#C62828" text-anchor="middle">&#x2260;</text>
  <text x="220" y="200" font-family="Georgia,serif" font-size="12" fill="#1565C0">горячий</text>
  <text x="280" y="200" font-family="Arial,sans-serif" font-size="14" fill="#C62828">&#x2194;</text>
  <text x="280" y="200" font-family="Georgia,serif" font-size="12" fill="#1565C0">холодный</text>
  <text x="220" y="225" font-family="Georgia,serif" font-size="12" fill="#1565C0">день</text>
  <text x="280" y="225" font-family="Arial,sans-serif" font-size="14" fill="#C62828">&#x2194;</text>
  <text x="280" y="225" font-family="Georgia,serif" font-size="12" fill="#1565C0">ночь</text>
  <text x="220" y="250" font-family="Georgia,serif" font-size="12" fill="#1565C0">добро</text>
  <text x="280" y="250" font-family="Arial,sans-serif" font-size="14" fill="#C62828">&#x2194;</text>
  <text x="280" y="250" font-family="Georgia,serif" font-size="12" fill="#1565C0">зло</text>
  <text x="250" y="270" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">разные слова,</text>
  <text x="250" y="281" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">противоположное значение</text>
  
  <!-- Омонимы -->
  <rect x="330" y="118" rx="8" width="140" height="170" fill="#FF9800" opacity="0.06" stroke="#E65100" stroke-width="1.2"/>
  <text x="400" y="138" font-family="Arial,sans-serif" font-size="13" fill="#E65100" text-anchor="middle" font-weight="bold">Омонимы</text>
  <text x="400" y="155" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">одинаковые по звучанию</text>
  <!-- Same word sign -->
  <text x="400" y="175" font-family="Arial,sans-serif" font-size="20" fill="#E65100" text-anchor="middle">~</text>
  <text x="380" y="200" font-family="Georgia,serif" font-size="14" fill="#1565C0">ключ</text>
  <text x="380" y="215" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5">родник</text>
  <text x="425" y="200" font-family="Georgia,serif" font-size="14" fill="#1565C0">ключ</text>
  <text x="425" y="215" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5">от замка</text>
  <text x="380" y="240" font-family="Georgia,serif" font-size="14" fill="#1565C0">лук</text>
  <text x="380" y="255" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5">оружие</text>
  <text x="425" y="240" font-family="Georgia,serif" font-size="14" fill="#1565C0">лук</text>
  <text x="425" y="255" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5">растение</text>
  <text x="400" y="270" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">одинаково звучат,</text>
  <text x="400" y="281" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">разное значение</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык</text>
</svg>