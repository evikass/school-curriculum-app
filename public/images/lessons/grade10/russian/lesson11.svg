<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Текст и его структура</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#E3F2FD" opacity="0.5"/>
    
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Текст и его структура</text>
  
  <!-- Text structure diagram -->
  <rect x="60" y="120" rx="8" width="380" height="30" fill="#4CAF50" opacity="0.12" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="250" y="140" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">ТЕКСТ</text>
  
  <!-- Three parts -->
  <line x1="150" y1="150" x2="120" y2="168" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="250" y1="150" x2="250" y2="168" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="350" y1="150" x2="380" y2="168" stroke="#1565C0" stroke-width="1.5"/>
  
  <rect x="40" y="168" rx="6" width="160" height="28" fill="#4CAF50" opacity="0.15" stroke="#4CAF50" stroke-width="1"/>
  <text x="120" y="187" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Вступление</text>
  
  <rect x="210" y="168" rx="6" width="80" height="28" fill="#1565C0" opacity="0.15" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="187" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Осн. часть</text>
  
  <rect x="300" y="168" rx="6" width="160" height="28" fill="#EF5350" opacity="0.15" stroke="#EF5350" stroke-width="1"/>
  <text x="380" y="187" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Заключение</text>
  
  <!-- Details for each part -->
  <rect x="40" y="204" rx="4" width="160" height="45" fill="#E8F5E9" opacity="0.3" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="120" y="218" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">подготовка к теме</text>
  <text x="120" y="230" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">обозначение проблемы</text>
  <text x="120" y="242" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">привлечение внимания</text>
  
  <rect x="210" y="204" rx="4" width="80" height="45" fill="#E3F2FD" opacity="0.3" stroke="#1565C0" stroke-width="0.8"/>
  <text x="250" y="218" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">аргументы</text>
  <text x="250" y="230" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">факты</text>
  <text x="250" y="242" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">примеры</text>
  
  <rect x="300" y="204" rx="4" width="160" height="45" fill="#FFEBEE" opacity="0.3" stroke="#EF5350" stroke-width="0.8"/>
  <text x="380" y="218" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">вывод по теме</text>
  <text x="380" y="230" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">итог размышления</text>
  <text x="380" y="242" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">призыв/оценка</text>
  
  <!-- Text properties -->
  <rect x="30" y="260" rx="6" width="440" height="32" fill="#E3F2FD" opacity="0.3" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="250" y="280" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">Свойства текста: связность, цельность, завершённость, членимость</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык</text>
</svg>