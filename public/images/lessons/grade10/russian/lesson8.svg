<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Служебные части речи</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#E3F2FD" opacity="0.5"/>
    
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Служебные части речи</text>
  
  <!-- Предлоги -->
  <rect x="30" y="120" rx="8" width="145" height="155" fill="#FF9800" opacity="0.06" stroke="#E65100" stroke-width="1.2"/>
  <text x="102" y="142" font-family="Arial,sans-serif" font-size="13" fill="#E65100" text-anchor="middle" font-weight="bold">Предлоги</text>
  <text x="102" y="160" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="middle">связь слов в предложении</text>
  <line x1="42" y1="168" x2="162" y2="168" stroke="#E65100" stroke-width="0.5" opacity="0.3"/>
  <text x="102" y="185" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">в, на, с, к, по, от,</text>
  <text x="102" y="202" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">из, за, под, над,</text>
  <text x="102" y="219" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">о, об, при, без,</text>
  <text x="102" y="236" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">для, ради, между</text>
  <text x="102" y="260" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">пришёл из школы</text>
  
  <!-- Союзы -->
  <rect x="185" y="120" rx="8" width="145" height="155" fill="#4CAF50" opacity="0.06" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="257" y="142" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Союзы</text>
  <text x="257" y="160" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="middle">связь однор. членов/предл.</text>
  <line x1="197" y1="168" x2="317" y2="168" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>
  <text x="257" y="182" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Сочинительные:</text>
  <text x="257" y="197" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">и, а, но, или, да</text>
  <text x="257" y="216" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Подчинительные:</text>
  <text x="257" y="231" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">что, чтобы, если,</text>
  <text x="257" y="248" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">когда, потому что</text>
  <text x="257" y="266" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">читал, но не устал</text>
  
  <!-- Частицы -->
  <rect x="340" y="120" rx="8" width="145" height="155" fill="#9C27B0" opacity="0.06" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="412" y="142" font-family="Arial,sans-serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Частицы</text>
  <text x="412" y="160" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="middle">придают оттенки значения</text>
  <line x1="352" y1="168" x2="472" y2="168" stroke="#7B1FA2" stroke-width="0.5" opacity="0.3"/>
  <text x="412" y="182" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Отрицательные:</text>
  <text x="412" y="197" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">не, ни</text>
  <text x="412" y="216" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Вопросительные:</text>
  <text x="412" y="231" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">ли, разве, неужели</text>
  <text x="412" y="250" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Модальные:</text>
  <text x="412" y="265" font-family="Georgia,serif" font-size="12" fill="#1565C0" text-anchor="middle">даже, только, лишь</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык</text>
</svg>