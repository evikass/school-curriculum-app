<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Самостоятельные части речи</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#E3F2FD" opacity="0.5"/>
    
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Самостоятельные части речи</text>
  
  <!-- 6 boxes for parts of speech -->
  <!-- Существительное -->
  <rect x="30" y="118" rx="6" width="145" height="55" fill="#EF5350" opacity="0.08" stroke="#C62828" stroke-width="1"/>
  <text x="102" y="138" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Существительное</text>
  <text x="102" y="153" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">кто? что?</text>
  <text x="102" y="166" font-family="Georgia,serif" font-size="10" fill="#1565C0" text-anchor="middle" font-style="italic">стол, мама, Москва</text>
  
  <!-- Глагол -->
  <rect x="185" y="118" rx="6" width="145" height="55" fill="#4CAF50" opacity="0.08" stroke="#2E7D32" stroke-width="1"/>
  <text x="257" y="138" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Глагол</text>
  <text x="257" y="153" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">что делать? что сделать?</text>
  <text x="257" y="166" font-family="Georgia,serif" font-size="10" fill="#1565C0" text-anchor="middle" font-style="italic">читать, писать</text>
  
  <!-- Прилагательное -->
  <rect x="340" y="118" rx="6" width="145" height="55" fill="#FF9800" opacity="0.08" stroke="#E65100" stroke-width="1"/>
  <text x="412" y="138" font-family="Arial,sans-serif" font-size="12" fill="#E65100" text-anchor="middle" font-weight="bold">Прилагательное</text>
  <text x="412" y="153" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">какой? какая?</text>
  <text x="412" y="166" font-family="Georgia,serif" font-size="10" fill="#1565C0" text-anchor="middle" font-style="italic">красивый, добрый</text>
  
  <!-- Числительное -->
  <rect x="30" y="182" rx="6" width="145" height="55" fill="#9C27B0" opacity="0.08" stroke="#7B1FA2" stroke-width="1"/>
  <text x="102" y="202" font-family="Arial,sans-serif" font-size="12" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Числительное</text>
  <text x="102" y="217" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">сколько? который?</text>
  <text x="102" y="230" font-family="Georgia,serif" font-size="10" fill="#1565C0" text-anchor="middle" font-style="italic">пять, третий</text>
  
  <!-- Местоимение -->
  <rect x="185" y="182" rx="6" width="145" height="55" fill="#42A5F5" opacity="0.08" stroke="#1565C0" stroke-width="1"/>
  <text x="257" y="202" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Местоимение</text>
  <text x="257" y="217" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">указывает на предмет</text>
  <text x="257" y="230" font-family="Georgia,serif" font-size="10" fill="#1565C0" text-anchor="middle" font-style="italic">он, мой, этот</text>
  
  <!-- Наречие -->
  <rect x="340" y="182" rx="6" width="145" height="55" fill="#00897B" opacity="0.08" stroke="#00695C" stroke-width="1"/>
  <text x="412" y="202" font-family="Arial,sans-serif" font-size="12" fill="#00695C" text-anchor="middle" font-weight="bold">Наречие</text>
  <text x="412" y="217" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">как? где? когда?</text>
  <text x="412" y="230" font-family="Georgia,serif" font-size="10" fill="#1565C0" text-anchor="middle" font-style="italic">быстро, вчера</text>
  
  <!-- Bottom note -->
  <rect x="30" y="248" rx="6" width="455" height="40" fill="#E3F2FD" opacity="0.3" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="250" y="268" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">Самостоятельные части речи называют предметы, признаки, действия, количества</text>
  <text x="250" y="282" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="middle">Имеют морфологические признаки и синтаксическую роль</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык</text>
</svg>