<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#D32F2F" text-anchor="middle">Самостоятельные части речи</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Русский язык — Урок 7</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#D32F2F" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="32" rx="5" fill="#D32F2F" opacity="0.05"/>
  <text x="30" y="86" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Имя существительное</text>
  <text x="200" y="86" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal" font-style="">кто? что?</text>
  <text x="320" y="86" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">стол, Москва</text>
  <rect x="20" y="112" width="460" height="32" rx="5" fill="#D32F2F" opacity="0.05"/>
  <text x="30" y="126" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Имя прилагательное</text>
  <text x="200" y="126" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal" font-style="">какой? чей?</text>
  <text x="320" y="126" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">красивый, мамин</text>
  <rect x="20" y="152" width="460" height="32" rx="5" fill="#D32F2F" opacity="0.05"/>
  <text x="30" y="166" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Имя числительное</text>
  <text x="200" y="166" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal" font-style="">сколько? который?</text>
  <text x="320" y="166" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">пять, пятый</text>
  <rect x="20" y="192" width="460" height="32" rx="5" fill="#D32F2F" opacity="0.05"/>
  <text x="30" y="206" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Глагол</text>
  <text x="200" y="206" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal" font-style="">что делать? что сделать?</text>
  <text x="320" y="206" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">читать, прочитать</text>
  <rect x="20" y="232" width="460" height="32" rx="5" fill="#D32F2F" opacity="0.05"/>
  <text x="30" y="246" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Наречие</text>
  <text x="200" y="246" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal" font-style="">как? где? когда?</text>
  <text x="320" y="246" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">быстро, здесь, вчера</text>
  <rect x="20" y="272" width="460" height="32" rx="5" fill="#D32F2F" opacity="0.05"/>
  <text x="30" y="286" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="start" font-weight="bold" font-style="">Местоимение</text>
  <text x="200" y="286" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal" font-style="">кто? что? какой?</text>
  <text x="320" y="286" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal" font-style="">он, этот, мой</text>
  <text x="200" y="84" font-family="Arial,sans-serif" font-size="8" fill="#888888" text-anchor="start" font-weight="normal" font-style="">Вопрос</text>
  <text x="320" y="84" font-family="Arial,sans-serif" font-size="8" fill="#888888" text-anchor="start" font-weight="normal" font-style="">Примеры</text>
  <rect x="20" y="308" width="460" height="22" rx="5" fill="#D32F2F" opacity="0.06"/>
  <text x="250" y="323" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="normal" font-style="">Причастие и деепричастие — особые формы глагола</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#D32F2F" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#D32F2F" text-anchor="middle" font-style="italic">Русский язык · 10 класс</text>
