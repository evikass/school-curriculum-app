<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Звуки и буквы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#E3F2FD" opacity="0.5"/>
    
  <!-- Two columns: Звуки vs Буквы -->
  <rect x="30" y="95" rx="8" width="210" height="195" fill="#42A5F5" opacity="0.08" stroke="#1565C0" stroke-width="1.2"/>
  <rect x="260" y="95" rx="8" width="210" height="195" fill="#1565C0" opacity="0.08" stroke="#1565C0" stroke-width="1.2"/>
  <text x="135" y="118" font-family="Arial,sans-serif" font-size="15" fill="#1565C0" text-anchor="middle" font-weight="bold">Звуки</text>
  <text x="365" y="118" font-family="Arial,sans-serif" font-size="15" fill="#1565C0" text-anchor="middle" font-weight="bold">Буквы</text>
  <!-- Vowels -->
  <rect x="45" y="128" rx="4" width="180" height="35" fill="#EF5350" opacity="0.1" stroke="#EF5350" stroke-width="0.8"/>
  <text x="135" y="142" font-family="Arial,sans-serif" font-size="11" fill="#EF5350" text-anchor="middle" font-weight="bold">Гласные</text>
  <text x="135" y="157" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle">а о у э ы и я ё ю е</text>
  <!-- Consonants -->
  <rect x="45" y="170" rx="4" width="180" height="50" fill="#42A5F5" opacity="0.1" stroke="#42A5F5" stroke-width="0.8"/>
  <text x="135" y="184" font-family="Arial,sans-serif" font-size="11" fill="#42A5F5" text-anchor="middle" font-weight="bold">Согласные</text>
  <text x="80" y="200" font-family="Arial,sans-serif" font-size="9" fill="#1565C0">звонкие: б в г д ж з</text>
  <text x="80" y="212" font-family="Arial,sans-serif" font-size="9" fill="#1565C0">глухие: п ф к т ш с</text>
  <!-- Arrow: 2 sounds for letter -->
  <rect x="45" y="228" rx="4" width="180" height="28" fill="#FFC107" opacity="0.1" stroke="#FFC107" stroke-width="0.8"/>
  <text x="135" y="246" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle">я=й+а, ё=й+о, е=й+э, ю=й+у</text>
  <!-- Letters - 33 letters -->
  <text x="365" y="142" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">33 буквы</text>
  <text x="275" y="162" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">А Б В Г Д Е Ё Ж</text>
  <text x="275" y="176" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">З И Й К Л М Н О</text>
  <text x="275" y="190" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">П Р С Т У Ф Х Ц</text>
  <text x="275" y="204" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">Ч Ш Щ Ъ Ы Ь Э Ю Я</text>
  <!-- Key differences -->
  <rect x="275" y="218" rx="4" width="180" height="60" fill="#42A5F5" opacity="0.08" stroke="#1565C0" stroke-width="0.8"/>
  <text x="365" y="234" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Звук vs Буква</text>
  <text x="365" y="248" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">Звуки слышим</text>
  <text x="365" y="260" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">Буквы пишем</text>
  <!-- Arrow connecting -->
  <path d="M240,190 L260,190" stroke="#1565C0" stroke-width="1.5" marker-end="none"/>
  <path d="M248,185 L260,190 L248,195" fill="#1565C0" opacity="0.5"/>
  <!-- Ъ and Ь signs -->
  <text x="365" y="278" font-family="Arial,sans-serif" font-size="9" fill="#FF9800" text-anchor="middle">Ъ, Ь - не обозначают звуков</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык</text>
</svg>