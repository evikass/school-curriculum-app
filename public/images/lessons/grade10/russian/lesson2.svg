<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Орфоэпические нормы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#E3F2FD" opacity="0.5"/>
    
  <!-- Accent marks on words -->
  <rect x="30" y="92" rx="8" width="440" height="70" fill="#42A5F5" opacity="0.06" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="110" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Ударение в слове</text>
  <!-- Words with accent marks -->
  <text x="70" y="138" font-family="Georgia,serif" font-size="16" fill="#1565C0">д</text>
  <text x="83" y="130" font-family="Arial,sans-serif" font-size="10" fill="#EF5350">&#x301;</text>
  <text x="85" y="138" font-family="Georgia,serif" font-size="16" fill="#1565C0">ом</text>
  
  <text x="140" y="138" font-family="Georgia,serif" font-size="16" fill="#1565C0">звон</text>
  <text x="175" y="130" font-family="Arial,sans-serif" font-size="10" fill="#EF5350">&#x301;</text>
  <text x="178" y="138" font-family="Georgia,serif" font-size="16" fill="#1565C0">ит</text>
  
  <text x="230" y="138" font-family="Georgia,serif" font-size="16" fill="#1565C0">т</text>
  <text x="243" y="130" font-family="Arial,sans-serif" font-size="10" fill="#EF5350">&#x301;</text>
  <text x="245" y="138" font-family="Georgia,serif" font-size="16" fill="#1565C0">ворог</text>
  
  <text x="340" y="138" font-family="Georgia,serif" font-size="16" fill="#1565C0">крас</text>
  <text x="375" y="130" font-family="Arial,sans-serif" font-size="10" fill="#EF5350">&#x301;</text>
  <text x="378" y="138" font-family="Georgia,serif" font-size="16" fill="#1565C0">ивее</text>
  
  <!-- Rules section -->
  <rect x="30" y="172" rx="8" width="210" height="120" fill="#E3F2FD" opacity="0.4" stroke="#42A5F5" stroke-width="1"/>
  <text x="135" y="192" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Правила</text>
  <text x="45" y="210" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">- Звонит, не звонит</text>
  <text x="45" y="225" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">- Красивее, не красивее</text>
  <text x="45" y="240" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">- Каталог, не каталог</text>
  <text x="45" y="255" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">- Договор, не договор</text>
  <text x="45" y="270" font-family="Arial,sans-serif" font-size="10" fill="#1565C0">- Торты, не торты</text>
  
  <!-- Common errors section -->
  <rect x="260" y="172" rx="8" width="210" height="120" fill="#FFEBEE" opacity="0.3" stroke="#EF5350" stroke-width="1"/>
  <text x="365" y="192" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Частые ошибки</text>
  <text x="275" y="210" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-decoration="line-through">звонит</text>
  <text x="340" y="210" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">звонит</text>
  <text x="275" y="228" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-decoration="line-through">красивее</text>
  <text x="355" y="228" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">красивее</text>
  <text x="275" y="246" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-decoration="line-through">каталог</text>
  <text x="340" y="246" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">каталог</text>
  <text x="275" y="264" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-decoration="line-through">торты</text>
  <text x="335" y="264" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">торты</text>
  <text x="275" y="282" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-decoration="line-through">щавель</text>
  <text x="340" y="282" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">щавель</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык</text>
</svg>