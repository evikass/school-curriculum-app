<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Способы словообразования</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#E3F2FD" opacity="0.5"/>
    
  <text x="250" y="108" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Способы словообразования</text>
  
  <!-- Приставочный -->
  <rect x="30" y="118" rx="6" width="220" height="50" fill="#FF9800" opacity="0.08" stroke="#E65100" stroke-width="1"/>
  <text x="140" y="135" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="middle" font-weight="bold">Приставочный</text>
  <text x="100" y="155" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">бежать</text>
  <text x="145" y="155" font-family="Arial,sans-serif" font-size="14" fill="#E65100">-></text>
  <text x="160" y="155" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">при</text>
  <text x="185" y="155" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">бежать</text>
  
  <!-- Суффиксальный -->
  <rect x="260" y="118" rx="6" width="220" height="50" fill="#4CAF50" opacity="0.08" stroke="#2E7D32" stroke-width="1"/>
  <text x="370" y="135" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">Суффиксальный</text>
  <text x="320" y="155" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">дом</text>
  <text x="350" y="155" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32">-></text>
  <text x="365" y="155" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">дом</text>
  <text x="395" y="155" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32">ик</text>
  
  <!-- Приставочно-суффиксальный -->
  <rect x="30" y="178" rx="6" width="220" height="50" fill="#9C27B0" opacity="0.08" stroke="#7B1FA2" stroke-width="1"/>
  <text x="140" y="195" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Приставочно-суффиксальный</text>
  <text x="80" y="215" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">окно</text>
  <text x="115" y="215" font-family="Arial,sans-serif" font-size="14" fill="#7B1FA2">-></text>
  <text x="130" y="215" font-family="Arial,sans-serif" font-size="14" fill="#E65100">под</text>
  <text x="155" y="215" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">окон</text>
  <text x="195" y="215" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32">ник</text>
  
  <!-- Бессуффиксальный -->
  <rect x="260" y="178" rx="6" width="220" height="50" fill="#EF5350" opacity="0.08" stroke="#C62828" stroke-width="1"/>
  <text x="370" y="195" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">Бессуффиксальный</text>
  <text x="320" y="215" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">выходить</text>
  <text x="380" y="215" font-family="Arial,sans-serif" font-size="14" fill="#C62828">-></text>
  <text x="395" y="215" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">выход</text>
  
  <!-- Сложение -->
  <rect x="30" y="238" rx="6" width="220" height="50" fill="#42A5F5" opacity="0.08" stroke="#1565C0" stroke-width="1"/>
  <text x="140" y="255" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Сложение</text>
  <text x="75" y="275" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">пар</text>
  <text x="100" y="275" font-family="Arial,sans-serif" font-size="14" fill="#42A5F5">+</text>
  <text x="115" y="275" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">ход</text>
  <text x="145" y="275" font-family="Arial,sans-serif" font-size="14" fill="#42A5F5">-></text>
  <text x="160" y="275" font-family="Arial,sans-serif" font-size="14" fill="#1565C0">пароход</text>
  
  <!-- Переход из другой части речи -->
  <rect x="260" y="238" rx="6" width="220" height="50" fill="#FFC107" opacity="0.08" stroke="#F57F17" stroke-width="1"/>
  <text x="370" y="255" font-family="Arial,sans-serif" font-size="11" fill="#F57F17" text-anchor="middle" font-weight="bold">Переход части речи</text>
  <text x="300" y="275" font-family="Arial,sans-serif" font-size="13" fill="#1565C0">столовая (прил.)</text>
  <text x="420" y="275" font-family="Arial,sans-serif" font-size="13" fill="#F57F17">-></text>
  <text x="435" y="275" font-family="Arial,sans-serif" font-size="13" fill="#1565C0">сущ.</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык</text>
</svg>