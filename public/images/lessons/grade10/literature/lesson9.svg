<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AB47BC" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#AB47BC" text-anchor="middle">И.В. Гёте</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#AB47BC" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F3E5F5" opacity="0.5"/>
    
  <!-- Faust scene - book and candle -->
  <!-- Large book -->
  <path d="M140,180 Q170,170 200,180 L200,260 Q170,250 140,260 Z" fill="#FFF8E1" opacity="0.6" stroke="#7B1FA2" stroke-width="1.5"/>
  <path d="M200,180 Q230,170 260,180 L260,260 Q230,250 200,260 Z" fill="#FFFDE7" opacity="0.5" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="200" y1="178" x2="200" y2="260" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Pentagram on book -->
  <path d="M185,210 L195,230 L175,218 L195,218 L175,230 Z" fill="none" stroke="#7B1FA2" stroke-width="1" opacity="0.5"/>
  <!-- Candle -->
  <rect x="320" y="180" width="8" height="50" fill="#FFF8E1" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Flame -->
  <path d="M322,180 Q324,165 326,175 Q328,165 324,160 Q320,165 322,180" fill="#FF7043" opacity="0.5"/>
  <path d="M323,178 Q324,168 325,175" fill="#FFC107" opacity="0.4"/>
  <!-- Candle holder -->
  <ellipse cx="324" cy="232" rx="12" ry="4" fill="#7B1FA2" opacity="0.15" stroke="#7B1FA2" stroke-width="1"/>
  <!-- German architecture - Gothic arch -->
  <path d="M380,260 L380,180 Q400,140 420,180 L420,260" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <path d="M385,260 L385,185 Q400,150 415,185 L415,260" fill="none" stroke="#AB47BC" stroke-width="0.8" opacity="0.4"/>
  <!-- Rose window -->
  <circle cx="400" cy="190" r="12" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <line x1="400" y1="178" x2="400" y2="202" stroke="#7B1FA2" stroke-width="0.6" opacity="0.5"/>
  <line x1="388" y1="190" x2="412" y2="190" stroke="#7B1FA2" stroke-width="0.6" opacity="0.5"/>
  <circle cx="400" cy="190" r="6" fill="none" stroke="#7B1FA2" stroke-width="0.6" opacity="0.4"/>
  <!-- Mephistopheles hint - small devil figure -->
  <path d="M80,200 Q85,185 90,200" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <circle cx="85" cy="205" r="6" fill="#AB47BC" opacity="0.15" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Horns -->
  <path d="M80,200 Q78,195 75,192" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <path d="M90,200 Q92,195 95,192" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Tail -->
  <path d="M90,210 Q100,215 95,225" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Key works -->
  <text x="250" y="100" font-family="Georgia,serif" font-size="14" fill="#7B1FA2" text-anchor="middle" font-style="italic">Фауст</text>
  <text x="250" y="118" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Страдания юного Вертера</text>
  <text x="250" y="136" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Лесной царь</text>
  <text x="250" y="280" font-family="Arial,sans-serif" font-size="11" fill="#AB47BC" opacity="0.6">1749-1832</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Литература</text>
</svg>