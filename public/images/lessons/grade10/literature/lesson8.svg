<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AB47BC" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#AB47BC" text-anchor="middle">У. Шекспир</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#AB47BC" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F3E5F5" opacity="0.5"/>
    
  <!-- Globe Theatre -->
  <ellipse cx="250" cy="250" rx="100" ry="30" fill="#AB47BC" opacity="0.08" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Theatre building - circular structure -->
  <path d="M160,200 Q160,140 250,130 Q340,140 340,200" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <path d="M160,200 L340,200" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Stage -->
  <rect x="210" y="200" width="80" height="20" fill="#AB47BC" opacity="0.15" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Pillars -->
  <line x1="190" y1="150" x2="190" y2="200" stroke="#7B1FA2" stroke-width="2"/>
  <line x1="310" y1="150" x2="310" y2="200" stroke="#7B1FA2" stroke-width="2"/>
  <!-- Roof/awning -->
  <path d="M185,150 L250,130 L315,150" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Flag -->
  <line x1="250" y1="130" x2="250" y2="105" stroke="#7B1FA2" stroke-width="1.5"/>
  <path d="M250,105 L270,110 L250,115" fill="#AB47BC" opacity="0.3"/>
  <!-- Skull (Hamlet) -->
  <ellipse cx="100" cy="180" rx="18" ry="22" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Eye sockets -->
  <ellipse cx="94" cy="175" rx="5" ry="6" fill="#7B1FA2" opacity="0.15"/>
  <ellipse cx="106" cy="175" rx="5" ry="6" fill="#7B1FA2" opacity="0.15"/>
  <!-- Nose -->
  <path d="M98,182 L100,186 L102,182" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Teeth -->
  <line x1="92" y1="195" x2="92" y2="200" stroke="#7B1FA2" stroke-width="0.8"/>
  <line x1="96" y1="195" x2="96" y2="200" stroke="#7B1FA2" stroke-width="0.8"/>
  <line x1="100" y1="195" x2="100" y2="200" stroke="#7B1FA2" stroke-width="0.8"/>
  <line x1="104" y1="195" x2="104" y2="200" stroke="#7B1FA2" stroke-width="0.8"/>
  <line x1="108" y1="195" x2="108" y2="200" stroke="#7B1FA2" stroke-width="0.8"/>
  <!-- Jaw line -->
  <path d="M82,190 Q82,202 100,206 Q118,202 118,190" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Rose -->
  <circle cx="420" cy="170" r="10" fill="none" stroke="#EF5350" stroke-width="1.5"/>
  <path d="M412,170 Q416,160 420,170" fill="#EF5350" opacity="0.3"/>
  <path d="M420,170 Q424,160 428,170" fill="#EF5350" opacity="0.3"/>
  <path d="M414,175 Q420,165 426,175" fill="#EF5350" opacity="0.25"/>
  <!-- Stem -->
  <line x1="420" y1="180" x2="420" y2="220" stroke="#66BB6A" stroke-width="1.5"/>
  <!-- Thorn -->
  <path d="M420,195 L425,192 L420,190" fill="none" stroke="#66BB6A" stroke-width="1"/>
  <!-- Leaf -->
  <path d="M420,205 Q430,200 425,210" fill="#66BB6A" opacity="0.3" stroke="#66BB6A" stroke-width="0.8"/>
  <!-- Key works -->
  <text x="250" y="105" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Гамлет</text>
  <text x="250" y="120" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Ромео и Джульетта</text>
  <text x="380" y="260" font-family="Georgia,serif" font-size="11" fill="#7B1FA2" text-anchor="middle" font-style="italic">Отелло</text>
  <text x="120" y="260" font-family="Georgia,serif" font-size="11" fill="#7B1FA2" text-anchor="middle" font-style="italic">Король Лир</text>
  <text x="250" y="280" font-family="Arial,sans-serif" font-size="11" fill="#AB47BC" opacity="0.6">1564-1616</text>
  <!-- "To be or not to be" -->
  <text x="100" y="145" font-family="Georgia,serif" font-size="10" fill="#7B1FA2" font-style="italic" opacity="0.5">To be or not to be...</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Литература</text>
</svg>