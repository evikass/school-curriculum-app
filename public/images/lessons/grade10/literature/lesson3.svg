<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AB47BC" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#AB47BC" text-anchor="middle">Н.В. Гоголь</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#AB47BC" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F3E5F5" opacity="0.5"/>
    
  <!-- Overcoat (Шинель) - the central symbol -->
  <path d="M180,110 Q175,115 172,130 L168,240 Q168,250 180,250 L220,250 Q232,250 232,240 L228,130 Q225,115 220,110 Z" fill="#5D4037" opacity="0.3" stroke="#7B1FA2" stroke-width="1.5"/>
  <path d="M180,110 Q200,105 220,110" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <!-- Collar -->
  <path d="M178,110 Q200,100 222,110 Q220,118 200,115 Q180,118 178,110" fill="#5D4037" opacity="0.4" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Buttons -->
  <circle cx="200" cy="145" r="3" fill="#7B1FA2" opacity="0.5"/>
  <circle cx="200" cy="170" r="3" fill="#7B1FA2" opacity="0.5"/>
  <circle cx="200" cy="195" r="3" fill="#7B1FA2" opacity="0.5"/>
  <circle cx="200" cy="220" r="3" fill="#7B1FA2" opacity="0.5"/>
  <!-- Troika (three-horse sleigh) -->
  <path d="M300,220 L460,220" stroke="#AB47BC" stroke-width="2"/>
  <!-- Sleigh -->
  <path d="M380,210 L420,210 L425,220 L375,220 Z" fill="#AB47BC" opacity="0.2" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Runner -->
  <path d="M370,220 Q365,225 370,228 L430,228 Q435,225 430,220" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Horse 1 (center) -->
  <ellipse cx="330" cy="185" rx="15" ry="10" fill="#AB47BC" opacity="0.2" stroke="#7B1FA2" stroke-width="1"/>
  <path d="M345,180 L355,168 L358,170" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="322" y1="195" x2="320" y2="218" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="338" y1="195" x2="340" y2="218" stroke="#7B1FA2" stroke-width="1.2"/>
  <!-- Horse 2 (left) -->
  <ellipse cx="300" cy="190" rx="12" ry="8" fill="#AB47BC" opacity="0.15" stroke="#7B1FA2" stroke-width="1"/>
  <path d="M312,186 L320,176 L322,178" fill="none" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="294" y1="198" x2="292" y2="218" stroke="#7B1FA2" stroke-width="1"/>
  <line x1="306" y1="198" x2="308" y2="218" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Horse 3 (right) -->
  <ellipse cx="355" cy="188" rx="12" ry="8" fill="#AB47BC" opacity="0.15" stroke="#7B1FA2" stroke-width="1"/>
  <path d="M367,184 L375,174 L377,176" fill="none" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="349" y1="196" x2="347" y2="218" stroke="#7B1FA2" stroke-width="1"/>
  <line x1="361" y1="196" x2="363" y2="218" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Reigns -->
  <path d="M310,188 Q340,200 380,210" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.6"/>
  <path d="M340,185 Q350,200 380,210" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.6"/>
  <!-- Snow particles -->
  <circle cx="280" cy="150" r="1.5" fill="#AB47BC" opacity="0.3"/>
  <circle cx="350" cy="160" r="1" fill="#7B1FA2" opacity="0.25"/>
  <circle cx="420" cy="145" r="1.5" fill="#AB47BC" opacity="0.2"/>
  <circle cx="310" cy="140" r="1" fill="#7B1FA2" opacity="0.3"/>
  <!-- Key works -->
  <text x="200" y="100" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Мёртвые души</text>
  <text x="200" y="270" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Ревизор</text>
  <text x="400" y="270" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Шинель</text>
  <text x="200" y="285" font-family="Arial,sans-serif" font-size="11" fill="#AB47BC" opacity="0.6">1809-1852</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Литература</text>
</svg>