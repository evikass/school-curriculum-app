<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AB47BC" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#AB47BC" text-anchor="middle">Рода и жанры литературы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 10</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#AB47BC" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F3E5F5" opacity="0.5"/>
    
  <!-- Classification tree diagram -->
  <!-- Root: Литература -->
  <rect x="180" y="92" rx="8" width="140" height="28" fill="#AB47BC" opacity="0.2" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="250" y="111" font-family="Arial,sans-serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Литература</text>
  <!-- Lines to 3 branches -->
  <line x1="250" y1="120" x2="100" y2="145" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="250" y1="120" x2="250" y2="145" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="250" y1="120" x2="400" y2="145" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Эпос -->
  <rect x="50" y="145" rx="6" width="100" height="25" fill="#7B1FA2" opacity="0.15" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="100" y="162" font-family="Arial,sans-serif" font-size="12" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Эпос</text>
  <!-- Лирика -->
  <rect x="200" y="145" rx="6" width="100" height="25" fill="#7B1FA2" opacity="0.15" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="250" y="162" font-family="Arial,sans-serif" font-size="12" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Лирика</text>
  <!-- Драма -->
  <rect x="350" y="145" rx="6" width="100" height="25" fill="#7B1FA2" opacity="0.15" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="400" y="162" font-family="Arial,sans-serif" font-size="12" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Драма</text>
  <!-- Sub-genres for Эпос -->
  <line x1="100" y1="170" x2="60" y2="190" stroke="#AB47BC" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="170" x2="100" y2="190" stroke="#AB47BC" stroke-width="1" opacity="0.5"/>
  <line x1="100" y1="170" x2="140" y2="190" stroke="#AB47BC" stroke-width="1" opacity="0.5"/>
  <text x="40" y="202" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">Роман</text>
  <text x="82" y="202" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">Повесть</text>
  <text x="122" y="202" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">Рассказ</text>
  <!-- Sub-genres for Лирика -->
  <line x1="250" y1="170" x2="220" y2="190" stroke="#AB47BC" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="170" x2="260" y2="190" stroke="#AB47BC" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="170" x2="300" y2="190" stroke="#AB47BC" stroke-width="1" opacity="0.5"/>
  <text x="200" y="202" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">Стих</text>
  <text x="245" y="202" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">Ода</text>
  <text x="285" y="202" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">Элегия</text>
  <!-- Sub-genres for Драма -->
  <line x1="400" y1="170" x2="365" y2="190" stroke="#AB47BC" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="170" x2="400" y2="190" stroke="#AB47BC" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="170" x2="440" y2="190" stroke="#AB47BC" stroke-width="1" opacity="0.5"/>
  <text x="348" y="202" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">Трагедия</text>
  <text x="388" y="202" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">Комедия</text>
  <text x="428" y="202" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2">Драма</text>
  <!-- Examples section -->
  <rect x="30" y="218" rx="5" width="440" height="72" fill="#F3E5F5" opacity="0.3" stroke="#AB47BC" stroke-width="0.8"/>
  <text x="250" y="235" font-family="Arial,sans-serif" font-size="11" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Примеры</text>
  <text x="100" y="252" font-family="Georgia,serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-style="italic">Война и мир</text>
  <text x="100" y="265" font-family="Arial,sans-serif" font-size="9" fill="#AB47BC" text-anchor="middle">эпос</text>
  <text x="250" y="252" font-family="Georgia,serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-style="italic">Я помню чудное мгновенье</text>
  <text x="250" y="265" font-family="Arial,sans-serif" font-size="9" fill="#AB47BC" text-anchor="middle">лирика</text>
  <text x="400" y="252" font-family="Georgia,serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-style="italic">Гамлет</text>
  <text x="400" y="265" font-family="Arial,sans-serif" font-size="9" fill="#AB47BC" text-anchor="middle">драма</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Литература</text>
</svg>