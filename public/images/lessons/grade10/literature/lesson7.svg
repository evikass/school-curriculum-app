<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AB47BC" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#AB47BC" text-anchor="middle">М.А. Шолохов</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#AB47BC" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F3E5F5" opacity="0.5"/>
    
  <!-- Steppe landscape -->
  <rect x="15" y="85" width="470" height="215" fill="#FFF8E1" opacity="0.2"/>
  <!-- Sky -->
  <rect x="15" y="85" width="470" height="80" fill="#E3F2FD" opacity="0.3"/>
  <!-- Sun -->
  <circle cx="420" cy="115" r="20" fill="#FFC107" opacity="0.4"/>
  <line x1="420" y1="90" x2="420" y2="85" stroke="#FFC107" stroke-width="1" opacity="0.3"/>
  <line x1="420" y1="140" x2="420" y2="145" stroke="#FFC107" stroke-width="1" opacity="0.3"/>
  <line x1="395" y1="115" x2="390" y2="115" stroke="#FFC107" stroke-width="1" opacity="0.3"/>
  <line x1="445" y1="115" x2="450" y2="115" stroke="#FFC107" stroke-width="1" opacity="0.3"/>
  <!-- River Don curve -->
  <path d="M15,220 Q100,200 200,225 Q300,250 400,220 Q450,210 485,230" fill="none" stroke="#42A5F5" stroke-width="4" opacity="0.5"/>
  <path d="M15,224 Q100,204 200,229 Q300,254 400,224 Q450,214 485,234" fill="none" stroke="#42A5F5" stroke-width="2" opacity="0.3"/>
  <!-- Steppe grass -->
  <path d="M50,245 Q55,230 60,245" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.3"/>
  <path d="M80,242 Q85,228 90,242" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.3"/>
  <path d="M350,240 Q355,226 360,240" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.3"/>
  <path d="M440,243 Q445,229 450,243" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.3"/>
  <!-- Cossack hut (khata) -->
  <rect x="230" y="180" width="40" height="30" fill="#AB47BC" opacity="0.1" stroke="#7B1FA2" stroke-width="1"/>
  <path d="M225,180 L250,160 L275,180" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="244" y="195" width="12" height="15" fill="#7B1FA2" opacity="0.15" stroke="#7B1FA2" stroke-width="0.8"/>
  <!-- Window -->
  <rect x="233" y="188" width="8" height="8" fill="#FFF8E1" opacity="0.5" stroke="#7B1FA2" stroke-width="0.8"/>
  <!-- Horse -->
  <ellipse cx="380" cy="185" rx="25" ry="14" fill="#AB47BC" opacity="0.12" stroke="#7B1FA2" stroke-width="1.2"/>
  <path d="M400,180 Q410,165 405,160" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="362" y1="199" x2="360" y2="218" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="372" y1="199" x2="374" y2="218" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="388" y1="199" x2="386" y2="218" stroke="#7B1FA2" stroke-width="1.2"/>
  <line x1="398" y1="199" x2="400" y2="218" stroke="#7B1FA2" stroke-width="1.2"/>
  <!-- Horse tail -->
  <path d="M355,188 Q345,180 348,170" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Windmill -->
  <line x1="150" y1="250" x2="150" y2="160" stroke="#7B1FA2" stroke-width="2"/>
  <line x1="130" y1="175" x2="170" y2="155" stroke="#7B1FA2" stroke-width="2"/>
  <line x1="170" y1="175" x2="130" y2="155" stroke="#7B1FA2" stroke-width="2"/>
  <!-- Key works -->
  <text x="250" y="100" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Тихий Дон</text>
  <text x="250" y="118" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Судьба человека</text>
  <text x="250" y="136" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Поднятая целина</text>
  <text x="250" y="275" font-family="Arial,sans-serif" font-size="11" fill="#AB47BC" opacity="0.6">1905-1984</text>
  <!-- "Дон" label on river -->
  <text x="200" y="218" font-family="Georgia,serif" font-size="11" fill="#42A5F5" font-style="italic" opacity="0.7">Дон</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Литература</text>
</svg>