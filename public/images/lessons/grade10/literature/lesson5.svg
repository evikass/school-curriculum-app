<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AB47BC" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#AB47BC" text-anchor="middle">А.П. Чехов</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#AB47BC" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F3E5F5" opacity="0.5"/>
    
  <!-- Doctor's bag -->
  <rect x="80" y="170" rx="8" width="60" height="45" fill="#AB47BC" opacity="0.15" stroke="#7B1FA2" stroke-width="1.5"/>
  <path d="M90,170 Q90,160 110,160 Q130,160 130,170" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="95" y1="165" x2="125" y2="165" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Cross on bag -->
  <line x1="110" y1="182" x2="110" y2="198" stroke="#EF5350" stroke-width="2.5"/>
  <line x1="103" y1="190" x2="117" y2="190" stroke="#EF5350" stroke-width="2.5"/>
  <!-- Stethoscope -->
  <path d="M160,180 Q170,160 185,165 Q200,170 195,190 Q190,205 175,200" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <circle cx="175" cy="200" r="5" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <circle cx="160" cy="180" r="3" fill="#7B1FA2" opacity="0.4"/>
  <!-- Tea glass in podstakannik -->
  <path d="M300,175 L305,225 L335,225 L340,175 Z" fill="#FFF8E1" opacity="0.6" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Podstakannik (metal holder) -->
  <path d="M296,180 L300,175 L340,175 L344,180" fill="none" stroke="#9E9E9E" stroke-width="2"/>
  <path d="M303,225 L300,230 L340,230 L337,225" fill="none" stroke="#9E9E9E" stroke-width="2"/>
  <line x1="298" y1="195" x2="342" y2="195" stroke="#9E9E9E" stroke-width="1.5"/>
  <!-- Tea inside -->
  <path d="M304,195 L306,222 L334,222 L336,195" fill="#FF8F00" opacity="0.3"/>
  <!-- Steam -->
  <path d="M315,170 Q312,160 318,150" fill="none" stroke="#AB47BC" stroke-width="1" opacity="0.4"/>
  <path d="M325,170 Q322,155 328,145" fill="none" stroke="#AB47BC" stroke-width="1" opacity="0.3"/>
  <path d="M320,168 Q318,158 323,148" fill="none" stroke="#AB47BC" stroke-width="1" opacity="0.35"/>
  <!-- Pince-nez glasses -->
  <circle cx="430" cy="140" r="12" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <circle cx="455" cy="140" r="12" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="442" y1="140" x2="443" y2="140" stroke="#7B1FA2" stroke-width="1.5"/>
  <path d="M418,138 Q410,135 405,140" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Key works -->
  <text x="250" y="100" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Вишнёвый сад</text>
  <text x="250" y="118" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Чайка</text>
  <text x="250" y="136" font-family="Georgia,serif" font-size="13" fill="#7B1FA2" text-anchor="middle" font-style="italic">Три сестры</text>
  <text x="200" y="260" font-family="Georgia,serif" font-size="11" fill="#7B1FA2" text-anchor="middle" font-style="italic">Человек в футляре</text>
  <text x="250" y="280" font-family="Arial,sans-serif" font-size="11" fill="#AB47BC" opacity="0.6">1860-1904</text>
  <!-- Decorative -->
  <circle cx="50" cy="260" r="3" fill="#AB47BC" opacity="0.15"/>
  <circle cx="460" cy="260" r="4" fill="#7B1FA2" opacity="0.12"/>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Литература</text>
</svg>