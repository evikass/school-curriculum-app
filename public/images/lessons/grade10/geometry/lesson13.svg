<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#D7CCC8"/>
    </linearGradient>
    <linearGradient id="face13" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#BCAAA4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8D6E63" stop-opacity="0.2"/>
    </linearGradient>
    <marker id="arr13" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4E342E"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg13)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4E342E" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#3E2723" text-anchor="middle" font-family="serif">Понятие многогранника. Призма</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 13</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#795548" stroke-width="1" opacity="0.3"/>
  <!-- Triangular Prism Panel -->
  <rect x="12" y="58" width="235" height="175" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1.2"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#4E342E" text-anchor="middle" font-family="serif">Треугольная призма</text>
  <!-- 3D triangular prism -->
  <!-- front triangle ABC -->
  <path d="M80,215 L130,215 L110,160 Z" fill="url(#face13)" stroke="#4E342E" stroke-width="1.2"/>
  <!-- back triangle A1B1C1 -->
  <line x1="80" y1="215" x2="120" y2="185" stroke="#4E342E" stroke-width="1.2"/>
  <line x1="130" y1="215" x2="170" y2="185" stroke="#4E342E" stroke-width="1.2"/>
  <line x1="110" y1="160" x2="150" y2="130" stroke="#4E342E" stroke-width="1.2"/>
  <!-- back face edges -->
  <line x1="120" y1="185" x2="170" y2="185" stroke="#4E342E" stroke-width="1.2"/>
  <line x1="120" y1="185" x2="150" y2="130" stroke="#4E342E" stroke-width="1.2"/>
  <line x1="170" y1="185" x2="150" y2="130" stroke="#4E342E" stroke-width="1.2"/>
  <!-- top face fill -->
  <path d="M80,215 L120,185 L170,185 L130,215 Z" fill="#D7CCC8" fill-opacity="0.4" stroke="#4E342E" stroke-width="1"/>
  <!-- side face fill -->
  <path d="M110,160 L150,130 L170,185 L130,215 Z" fill="#BCAAA4" fill-opacity="0.3" stroke="#4E342E" stroke-width="1"/>
  <!-- Hidden edges (back-bottom) -->
  <line x1="120" y1="185" x2="150" y2="130" stroke="#4E342E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Vertex labels -->
  <text x="72" y="222" font-size="8" fill="#3E2723" font-weight="bold" font-style="italic">A</text>
  <text x="133" y="222" font-size="8" fill="#3E2723" font-weight="bold" font-style="italic">B</text>
  <text x="104" y="155" font-size="8" fill="#3E2723" font-weight="bold" font-style="italic">C</text>
  <text x="112" y="183" font-size="7" fill="#5D4037" font-weight="bold" font-style="italic">A1</text>
  <text x="172" y="183" font-size="7" fill="#5D4037" font-weight="bold" font-style="italic">B1</text>
  <text x="148" y="126" font-size="7" fill="#5D4037" font-weight="bold" font-style="italic">C1</text>
  <!-- Height -->
  <line x1="95" y1="192" x2="115" y2="165" stroke="#E53935" stroke-width="1.5"/>
  <text x="90" y="180" font-size="7" fill="#E53935" font-style="italic">h</text>
  <!-- Stats -->
  <text x="170" y="160" font-size="7" fill="#4E342E" font-family="sans-serif">6 вершин</text>
  <text x="170" y="172" font-size="7" fill="#4E342E" font-family="sans-serif">9 рёбер</text>
  <text x="170" y="184" font-size="7" fill="#4E342E" font-family="sans-serif">5 граней</text>
  <!-- Quadrangular Prism Panel -->
  <rect x="255" y="58" width="233" height="175" rx="6" fill="white" opacity="0.9" stroke="#795548" stroke-width="1.2"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#4E342E" text-anchor="middle" font-family="serif">Четырёхугольная призма</text>
  <!-- 3D quadrangular prism -->
  <!-- front face -->
  <path d="M300,220 L370,220 L370,170 L300,170 Z" fill="url(#face13)" stroke="#4E342E" stroke-width="1.2"/>
  <!-- back edges -->
  <line x1="300" y1="170" x2="325" y2="150" stroke="#4E342E" stroke-width="1.2"/>
  <line x1="370" y1="170" x2="395" y2="150" stroke="#4E342E" stroke-width="1.2"/>
  <line x1="370" y1="220" x2="395" y2="200" stroke="#4E342E" stroke-width="1.2"/>
  <!-- top face -->
  <path d="M300,170 L325,150 L395,150 L370,170 Z" fill="#D7CCC8" fill-opacity="0.4" stroke="#4E342E" stroke-width="1"/>
  <!-- right face -->
  <path d="M370,170 L395,150 L395,200 L370,220 Z" fill="#BCAAA4" fill-opacity="0.3" stroke="#4E342E" stroke-width="1"/>
  <!-- hidden edges -->
  <line x1="300" y1="220" x2="325" y2="200" stroke="#4E342E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="325" y1="200" x2="395" y2="200" stroke="#4E342E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="325" y1="200" x2="325" y2="150" stroke="#4E342E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Vertex labels -->
  <text x="292" y="226" font-size="7" fill="#3E2723" font-weight="bold" font-style="italic">A</text>
  <text x="373" y="226" font-size="7" fill="#3E2723" font-weight="bold" font-style="italic">B</text>
  <text x="373" y="167" font-size="7" fill="#3E2723" font-weight="bold" font-style="italic">A1</text>
  <text x="292" y="167" font-size="7" fill="#3E2723" font-weight="bold" font-style="italic">D1</text>
  <text x="397" y="148" font-size="7" fill="#5D4037" font-weight="bold" font-style="italic">B1</text>
  <text x="397" y="206" font-size="7" fill="#5D4037" font-weight="bold" font-style="italic">C1</text>
  <text x="320" y="148" font-size="7" fill="#5D4037" font-weight="bold" font-style="italic">C</text>
  <text x="320" y="206" font-size="7" fill="#5D4037" font-weight="bold" font-style="italic">D</text>
  <!-- Height -->
  <line x1="308" y1="215" x2="308" y2="170" stroke="#E53935" stroke-width="1.5"/>
  <line x1="308" y1="215" x2="316" y2="215" stroke="#E53935" stroke-width="0.8"/>
  <line x1="308" y1="170" x2="316" y2="170" stroke="#E53935" stroke-width="0.8"/>
  <text x="313" y="195" font-size="7" fill="#E53935" font-style="italic">h</text>
  <!-- Labels -->
  <text x="320" y="100" font-size="7" fill="#795548" font-family="sans-serif">8 вершин</text>
  <text x="320" y="112" font-size="7" fill="#795548" font-family="sans-serif">12 рёбер</text>
  <text x="320" y="124" font-size="7" fill="#795548" font-family="sans-serif">6 граней</text>
  <text x="320" y="140" font-size="7" fill="#4E342E" font-weight="bold" font-family="sans-serif">Правильная: основания —</text>
  <text x="320" y="150" font-size="7" fill="#4E342E" font-weight="bold" font-family="sans-serif">правильные многоугольники</text>
  <!-- Info Panel -->
  <rect x="12" y="242" width="476" height="68" rx="6" fill="white" opacity="0.88" stroke="#795548" stroke-width="1"/>
  <text x="250" y="258" font-size="9" font-weight="bold" fill="#4E342E" text-anchor="middle" font-family="serif">Элементы призмы</text>
  <text x="22" y="272" font-size="7.5" fill="#555" font-family="sans-serif">Основания — равные многоугольники в || плоскостях</text>
  <text x="22" y="284" font-size="7.5" fill="#555" font-family="sans-serif">Боковые грани — параллелограммы. Высота — расстояние между основаниями.</text>
  <text x="260" y="272" font-size="7.5" fill="#4E342E" font-weight="bold" font-family="sans-serif">Прямая призма: боковые рёбра перп. основаниям</text>
  <text x="260" y="284" font-size="7.5" fill="#4E342E" font-weight="bold" font-family="sans-serif">Наклонная призма: боковые рёбра не перп. основаниям</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#795548" opacity="0.85"/>
  <text x="250" y="333" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Призма: два равных основания, боковые грани — параллелограммы, h — высота</text>
</svg>