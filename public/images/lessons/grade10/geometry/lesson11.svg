<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="pl11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80CBC4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4DB6AC" stop-opacity="0.2"/>
    </linearGradient>
    <marker id="arr11" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg11)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="serif">Угол между прямой и плоскостью</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 11</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#009688" stroke-width="1" opacity="0.3"/>
  <!-- Main Diagram Panel -->
  <rect x="12" y="58" width="280" height="200" rx="6" fill="white" opacity="0.9" stroke="#009688" stroke-width="1.2"/>
  <text x="152" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="serif">Определение угла</text>
  <!-- Plane alpha -->
  <path d="M30,245 L60,205 L275,205 L245,245 Z" fill="url(#pl11)" stroke="#009688" stroke-width="1.2"/>
  <text x="210" y="240" font-size="9" fill="#00695C" font-style="italic">alpha</text>
  <!-- Point A above plane -->
  <circle cx="140" cy="95" r="3" fill="#E53935"/>
  <text x="148" y="92" font-size="9" fill="#E53935" font-weight="bold" font-style="italic">A</text>
  <!-- Perpendicular to plane: AO -->
  <line x1="140" y1="95" x2="140" y2="215" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="140" cy="215" r="2.5" fill="#9E9E9E"/>
  <text x="127" y="222" font-size="8" fill="#9E9E9E" font-style="italic">O</text>
  <rect x="140" y="210" width="5" height="5" fill="none" stroke="#9E9E9E" stroke-width="0.7"/>
  <!-- Oblique: AM -->
  <line x1="140" y1="95" x2="200" y2="213" stroke="#E53935" stroke-width="2.2" marker-end="url(#arr11)"/>
  <circle cx="200" cy="215" r="2.5" fill="#00695C"/>
  <text x="205" y="222" font-size="8" fill="#00695C" font-style="italic">M</text>
  <!-- Projection: OM -->
  <line x1="140" y1="215" x2="200" y2="215" stroke="#4CAF50" stroke-width="1.8"/>
  <text x="170" y="228" font-size="7" fill="#4CAF50" font-family="serif">проекция AM</text>
  <!-- Angle phi -->
  <path d="M148,213 A12,12 0 0,0 150,202" fill="none" stroke="#FF6F00" stroke-width="1.5"/>
  <text x="155" y="207" font-size="10" fill="#FF6F00" font-weight="bold" font-style="italic">phi</text>
  <!-- Label -->
  <text x="40" y="100" font-size="7.5" fill="#555" font-family="sans-serif">AO перп. alpha</text>
  <text x="40" y="112" font-size="7.5" fill="#555" font-family="sans-serif">OM — проекция AM</text>
  <text x="40" y="124" font-size="7.5" fill="#00695C" font-weight="bold" font-family="sans-serif">phi = угол(AM, alpha)</text>
  <text x="40" y="140" font-size="7.5" fill="#FF6F00" font-weight="bold" font-family="serif">phi = угол AMO</text>
  <!-- Special Cases Panel -->
  <rect x="302" y="58" width="186" height="200" rx="6" fill="white" opacity="0.9" stroke="#009688" stroke-width="1.2"/>
  <text x="395" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="serif">Частные случаи</text>
  <!-- Case 1: parallel (0 degrees) -->
  <path d="M320,115 L335,100 L460,100 L445,115 Z" fill="url(#pl11)" stroke="#009688" stroke-width="0.8"/>
  <line x1="340" y1="110" x2="435" y2="105" stroke="#E53935" stroke-width="1.5" marker-end="url(#arr11)"/>
  <text x="395" y="102" font-size="7" fill="#E53935" font-style="italic">a || alpha</text>
  <text x="395" y="125" font-size="9" fill="#4CAF50" font-weight="bold" font-family="serif">phi = 0</text>
  <!-- Case 2: perpendicular (90 degrees) -->
  <path d="M320,180 L335,160 L460,160 L445,180 Z" fill="url(#pl11)" stroke="#009688" stroke-width="0.8"/>
  <line x1="395" y1="155" x2="395" y2="130" stroke="#E53935" stroke-width="1.8"/>
  <rect x="395" y="155" width="5" height="5" fill="none" stroke="#E53935" stroke-width="0.7"/>
  <text x="403" y="145" font-size="7" fill="#E53935" font-style="italic">a перп. alpha</text>
  <text x="395" y="192" font-size="9" fill="#E53935" font-weight="bold" font-family="serif">phi = 90</text>
  <!-- Case 3: oblique -->
  <path d="M320,245 L335,228 L460,228 L445,245 Z" fill="url(#pl11)" stroke="#009688" stroke-width="0.8"/>
  <line x1="370" y1="225" x2="420" y2="210" stroke="#E53935" stroke-width="1.5"/>
  <line x1="370" y1="225" x2="410" y2="225" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M375,224 A8,8 0 0,0 377,218" fill="none" stroke="#FF6F00" stroke-width="1"/>
  <text x="430" y="212" font-size="7" fill="#E53935" font-style="italic">a</text>
  <text x="395" y="257" font-size="8" fill="#FF6F00" font-weight="bold" font-family="serif">0 &lt; phi &lt; 90</text>
  <!-- Properties Panel -->
  <rect x="12" y="268" width="476" height="42" rx="6" fill="white" opacity="0.88" stroke="#009688" stroke-width="1"/>
  <text x="250" y="282" font-size="8" fill="#555" font-family="sans-serif">Угол между прямой и плоскостью = угол между прямой и её проекцией на плоскость</text>
  <text x="250" y="295" font-size="8" fill="#555" font-family="sans-serif">Угол phi принимает значения: 0 &lt;= phi &lt;= 90. Наименьший угол между прямой и любой прямой в плоскости.</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#009688" opacity="0.85"/>
  <text x="250" y="333" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Угол(a, alpha) = угол между a и проекцией a на alpha, 0 &lt;= phi &lt;= 90</text>
</svg>