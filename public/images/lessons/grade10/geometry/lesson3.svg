<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00897B" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#00897B" text-anchor="middle">Пирамида</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Геометрия - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#00897B" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
    <!-- Pyramid 3D -->
    <!-- Base -->
    <polygon points="100,260 200,260 240,230 140,230" fill="#00897B" opacity="0.1" stroke="#00897B" stroke-width="2"/>
    <!-- Front left face -->
    <polygon points="100,260 170,120 140,230" fill="#00897B" opacity="0.12" stroke="#00897B" stroke-width="1.5"/>
    <!-- Front right face -->
    <polygon points="100,260 170,120 200,260" fill="#00897B" opacity="0.18" stroke="#00897B" stroke-width="1.5"/>
    <!-- Back right face -->
    <polygon points="200,260 170,120 240,230" fill="#00897B" opacity="0.08" stroke="#00897B" stroke-width="1.5"/>
    <!-- Back left face -->
    <polygon points="140,230 170,120 240,230" fill="#00897B" opacity="0.06" stroke="#00897B" stroke-width="1" stroke-dasharray="4,2"/>
    <!-- Apex -->
    <circle cx="170" cy="120" r="3" fill="#E91E63"/>
    <text x="175" y="115" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">S (вершина)</text>
    <!-- Height -->
    <line x1="170" y1="120" x2="170" y2="248" stroke="#E91E63" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="167,248 170,256 173,248" fill="#E91E63"/>
    <text x="150" y="190" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">H</text>
    <!-- Base center point -->
    <circle cx="170" cy="248" r="2" fill="#E91E63"/>
    <text x="175" y="258" font-family="Arial,sans-serif" font-size="9" fill="#E91E63">O</text>
    <!-- Slant height -->
    <line x1="170" y1="120" x2="150" y2="260" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="145" y="195" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50" font-weight="bold">l</text>
    <!-- Base labels -->
    <text x="85" y="270" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">A</text>
    <text x="200" y="270" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">B</text>
    <text x="242" y="228" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">C</text>
    <text x="128" y="228" font-family="Arial,sans-serif" font-size="10" fill="#00695C" font-weight="bold">D</text>
    <!-- Edge label -->
    <text x="128" y="168" font-family="Arial,sans-serif" font-size="9" fill="#00897B">бок. ребро</text>
    <!-- Properties and formulas -->
    <rect x="280" y="90" width="200" height="205" rx="5" fill="white" opacity="0.85" stroke="#00897B" stroke-width="1"/>
    <text x="290" y="108" font-family="Arial,sans-serif" font-size="12" fill="#00695C" font-weight="bold">Формулы:</text>
    <line x1="290" y1="113" x2="470" y2="113" stroke="#00897B" stroke-width="0.5"/>
    <rect x="290" y="118" width="180" height="22" rx="3" fill="#00897B" opacity="0.08"/>
    <text x="380" y="134" font-family="Arial,sans-serif" font-size="12" fill="#00897B" text-anchor="middle" font-weight="bold">V = 1/3 * Sосн * H</text>
    <text x="290" y="158" font-family="Arial,sans-serif" font-size="11" fill="#444">Sбок = 1/2 * P * l</text>
    <text x="290" y="176" font-family="Arial,sans-serif" font-size="11" fill="#444">Sполн = Sбок + Sосн</text>
    <line x1="290" y1="186" x2="470" y2="186" stroke="#00897B" stroke-width="0.5"/>
    <text x="290" y="204" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">Правильная пирамида:</text>
    <text x="290" y="222" font-family="Arial,sans-serif" font-size="11" fill="#444">- Основание - прав. мн-к</text>
    <text x="290" y="240" font-family="Arial,sans-serif" font-size="11" fill="#444">- Вершина над центром</text>
    <text x="290" y="258" font-family="Arial,sans-serif" font-size="11" fill="#444">- Все бок. ребра равны</text>
    <text x="290" y="276" font-family="Arial,sans-serif" font-size="11" fill="#444">- Все апофемы равны</text>
    <text x="290" y="292" font-family="Arial,sans-serif" font-size="9" fill="#888">l - апофема (высота бок. грани)</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Геометрия</text>
</svg>