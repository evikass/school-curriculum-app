<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00897B" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#00897B" text-anchor="middle">Объёмы многогранников</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Геометрия - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#00897B" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
    <!-- Prism -->
    <polygon points="40,200 95,200 95,265 40,265" fill="#00897B" opacity="0.12" stroke="#00897B" stroke-width="1.5"/>
    <polygon points="40,200 70,175 125,175 95,200" fill="#00897B" opacity="0.15" stroke="#00897B" stroke-width="1.5"/>
    <polygon points="95,200 125,175 125,240 95,265" fill="#00897B" opacity="0.08" stroke="#00897B" stroke-width="1.5"/>
    <line x1="40" y1="265" x2="70" y2="240" stroke="#00897B" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
    <line x1="70" y1="240" x2="125" y2="240" stroke="#00897B" stroke-width="1.5"/>
    <line x1="70" y1="240" x2="70" y2="175" stroke="#00897B" stroke-width="1.5"/>
    <text x="60" y="280" font-family="Arial,sans-serif" font-size="10" fill="#00695C" text-anchor="middle">Призма</text>
    <!-- Prism formula -->
    <rect x="30" y="130" width="120" height="28" rx="4" fill="#00897B" opacity="0.1"/>
    <text x="90" y="148" font-family="Arial,sans-serif" font-size="12" fill="#00897B" text-anchor="middle" font-weight="bold">V = Sосн * H</text>
    <!-- Pyramid -->
    <polygon points="200,265 280,265 310,240 230,240" fill="#00897B" opacity="0.1" stroke="#00897B" stroke-width="1.5"/>
    <polygon points="200,265 255,140 230,240" fill="#00897B" opacity="0.12" stroke="#00897B" stroke-width="1.5"/>
    <polygon points="200,265 255,140 280,265" fill="#00897B" opacity="0.18" stroke="#00897B" stroke-width="1.5"/>
    <polygon points="280,265 255,140 310,240" fill="#00897B" opacity="0.08" stroke="#00897B" stroke-width="1.5"/>
    <line x1="200" y1="265" x2="310" y2="265" stroke="#888" stroke-width="0.5"/>
    <circle cx="255" cy="140" r="2" fill="#E91E63"/>
    <text x="260" y="135" font-family="Arial,sans-serif" font-size="9" fill="#E91E63">S</text>
    <text x="245" y="280" font-family="Arial,sans-serif" font-size="10" fill="#00695C" text-anchor="middle">Пирамида</text>
    <!-- Pyramid formula -->
    <rect x="190" y="130" width="140" height="28" rx="4" fill="#00897B" opacity="0.1"/>
    <text x="260" y="148" font-family="Arial,sans-serif" font-size="12" fill="#00897B" text-anchor="middle" font-weight="bold">V = 1/3 * Sосн * H</text>
    <!-- Summary formulas -->
    <rect x="330" y="90" width="150" height="205" rx="5" fill="white" opacity="0.85" stroke="#00897B" stroke-width="1"/>
    <text x="340" y="108" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">Объёмы:</text>
    <line x1="340" y1="113" x2="470" y2="113" stroke="#00897B" stroke-width="0.5"/>
    <text x="340" y="130" font-family="Arial,sans-serif" font-size="10" fill="#444">Призма:</text>
    <text x="340" y="145" font-family="Arial,sans-serif" font-size="11" fill="#00897B" font-weight="bold">V = S * H</text>
    <text x="340" y="163" font-family="Arial,sans-serif" font-size="10" fill="#444">Параллелепипед:</text>
    <text x="340" y="178" font-family="Arial,sans-serif" font-size="11" fill="#00897B" font-weight="bold">V = a*b*c</text>
    <text x="340" y="196" font-family="Arial,sans-serif" font-size="10" fill="#444">Куб:</text>
    <text x="340" y="211" font-family="Arial,sans-serif" font-size="11" fill="#00897B" font-weight="bold">V = a^3</text>
    <text x="340" y="229" font-family="Arial,sans-serif" font-size="10" fill="#444">Пирамида:</text>
    <text x="340" y="244" font-family="Arial,sans-serif" font-size="11" fill="#00897B" font-weight="bold">V = 1/3 * S * H</text>
    <line x1="340" y1="252" x2="470" y2="252" stroke="#00897B" stroke-width="0.5"/>
    <text x="340" y="268" font-family="Arial,sans-serif" font-size="9" fill="#888">Следствие из пирамиды:</text>
    <text x="340" y="282" font-family="Arial,sans-serif" font-size="9" fill="#888">Vус.пир. = H/3*(S1+</text>
    <text x="340" y="294" font-family="Arial,sans-serif" font-size="9" fill="#888">sqrt(S1*S2)+S2)</text>
    <!-- Height arrows on prism -->
    <line x1="30" y1="200" x2="30" y2="265" stroke="#E91E63" stroke-width="1.5"/>
    <text x="25" y="238" font-family="Arial,sans-serif" font-size="9" fill="#E91E63" text-anchor="end">H</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Геометрия</text>
</svg>