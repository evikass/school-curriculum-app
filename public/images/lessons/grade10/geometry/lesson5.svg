<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00897B" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#00897B" text-anchor="middle">Конус</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Геометрия - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#00897B" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
    <!-- Cone -->
    <!-- Triangle (side view) -->
    <polygon points="140,105 80,270 200,270" fill="#00897B" opacity="0.1" stroke="#00897B" stroke-width="2"/>
    <!-- Base ellipse -->
    <ellipse cx="140" cy="270" rx="60" ry="16" fill="#00897B" opacity="0.06" stroke="#00897B" stroke-width="1.5"/>
    <path d="M80,270 Q140,254 200,270" fill="none" stroke="#00897B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <!-- Apex -->
    <circle cx="140" cy="105" r="3" fill="#E91E63"/>
    <text x="148" y="103" font-family="Arial,sans-serif" font-size="10" fill="#E91E63" font-weight="bold">S</text>
    <!-- Height -->
    <line x1="140" y1="105" x2="140" y2="270" stroke="#E91E63" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="125" y="190" font-family="Arial,sans-serif" font-size="12" fill="#E91E63" font-weight="bold">H</text>
    <!-- Center of base -->
    <circle cx="140" cy="270" r="2" fill="#E91E63"/>
    <text x="145" y="280" font-family="Arial,sans-serif" font-size="9" fill="#E91E63">O</text>
    <!-- Radius -->
    <line x1="140" y1="270" x2="200" y2="270" stroke="#4CAF50" stroke-width="2"/>
    <text x="170" y="265" font-family="Arial,sans-serif" font-size="12" fill="#4CAF50" font-weight="bold">R</text>
    <!-- Generatrix (slant height) -->
    <line x1="140" y1="105" x2="200" y2="270" stroke="#FF9800" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="182" y="188" font-family="Arial,sans-serif" font-size="12" fill="#FF9800" font-weight="bold">l</text>
    <!-- Right angle at center -->
    <rect x="193" y="263" width="7" height="7" fill="none" stroke="#4CAF50" stroke-width="0.5"/>
    <!-- Formulas box -->
    <rect x="250" y="90" width="230" height="205" rx="5" fill="white" opacity="0.85" stroke="#00897B" stroke-width="1"/>
    <text x="260" y="108" font-family="Arial,sans-serif" font-size="12" fill="#00695C" font-weight="bold">Формулы конуса:</text>
    <line x1="260" y1="113" x2="470" y2="113" stroke="#00897B" stroke-width="0.5"/>
    <rect x="260" y="118" width="210" height="22" rx="3" fill="#00897B" opacity="0.08"/>
    <text x="365" y="134" font-family="Arial,sans-serif" font-size="12" fill="#00897B" text-anchor="middle" font-weight="bold">V = 1/3 * pi * R^2 * H</text>
    <text x="260" y="158" font-family="Arial,sans-serif" font-size="12" fill="#444">Sбок = pi * R * l</text>
    <text x="260" y="178" font-family="Arial,sans-serif" font-size="12" fill="#444">Sполн = pi * R * (R + l)</text>
    <line x1="260" y1="188" x2="470" y2="188" stroke="#00897B" stroke-width="0.5"/>
    <text x="260" y="206" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">Связь образующей:</text>
    <rect x="260" y="212" width="210" height="22" rx="3" fill="#FF9800" opacity="0.08"/>
    <text x="365" y="228" font-family="Arial,sans-serif" font-size="13" fill="#FF9800" text-anchor="middle" font-weight="bold">l^2 = R^2 + H^2</text>
    <text x="260" y="252" font-family="Arial,sans-serif" font-size="11" fill="#444">Осевое сечение -</text>
    <text x="260" y="268" font-family="Arial,sans-serif" font-size="11" fill="#444">равнобедренный треуг.</text>
    <text x="260" y="288" font-family="Arial,sans-serif" font-size="10" fill="#888">l - образующая (генератриса)</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Геометрия</text>
</svg>