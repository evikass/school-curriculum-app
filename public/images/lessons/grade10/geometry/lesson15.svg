<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg15" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
    <linearGradient id="face15" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF9A9A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E57373" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg15)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#B71C1C" text-anchor="middle" font-family="serif">Пирамида</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 15</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#EF5350" stroke-width="1" opacity="0.3"/>
  <!-- Main Pyramid Panel -->
  <rect x="12" y="58" width="280" height="200" rx="6" fill="white" opacity="0.9" stroke="#EF5350" stroke-width="1.2"/>
  <text x="152" y="74" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle" font-family="serif">Пирамида SABCD</text>
  <!-- 3D Pyramid -->
  <!-- Base ABCD (parallelogram in perspective) -->
  <path d="M80,230 L180,230 L210,200 L110,200 Z" fill="url(#face15)" stroke="#C62828" stroke-width="1.2"/>
  <!-- Apex S -->
  <circle cx="140" cy="95" r="3" fill="#E53935"/>
  <text x="148" y="90" font-size="9" fill="#E53935" font-weight="bold" font-style="italic">S</text>
  <!-- Lateral edges -->
  <line x1="140" y1="95" x2="80" y2="230" stroke="#C62828" stroke-width="1.5"/>
  <line x1="140" y1="95" x2="180" y2="230" stroke="#C62828" stroke-width="1.5"/>
  <line x1="140" y1="95" x2="210" y2="200" stroke="#C62828" stroke-width="1.5"/>
  <line x1="140" y1="95" x2="110" y2="200" stroke="#C62828" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Face fills -->
  <path d="M140,95 L80,230 L180,230 Z" fill="#FFCDD2" fill-opacity="0.3" stroke="none"/>
  <path d="M140,95 L180,230 L210,200 Z" fill="#EF9A9A" fill-opacity="0.2" stroke="none"/>
  <!-- Vertex labels -->
  <text x="68" y="238" font-size="8" fill="#B71C1C" font-weight="bold" font-style="italic">A</text>
  <text x="183" y="238" font-size="8" fill="#B71C1C" font-weight="bold" font-style="italic">B</text>
  <text x="214" y="198" font-size="8" fill="#B71C1C" font-weight="bold" font-style="italic">C</text>
  <text x="100" y="198" font-size="8" fill="#B71C1C" font-weight="bold" font-style="italic">D</text>
  <!-- Height SO -->
  <line x1="140" y1="95" x2="140" y2="215" stroke="#1565C0" stroke-width="1.8"/>
  <circle cx="140" cy="215" r="2" fill="#1565C0"/>
  <text x="148" y="218" font-size="7" fill="#1565C0" font-style="italic">O</text>
  <rect x="140" y="210" width="5" height="5" fill="none" stroke="#1565C0" stroke-width="0.7"/>
  <text x="150" y="160" font-size="7" fill="#1565C0" font-style="italic">h = SO</text>
  <!-- Lateral edge labels -->
  <text x="95" y="160" font-size="6.5" fill="#C62828" font-style="italic">SA</text>
  <text x="168" y="160" font-size="6.5" fill="#C62828" font-style="italic">SB</text>
  <text x="190" y="145" font-size="6.5" fill="#C62828" font-style="italic">SC</text>
  <!-- Apothem -->
  <line x1="140" y1="95" x2="130" y2="230" stroke="#4CAF50" stroke-width="1.3" stroke-dasharray="4,2"/>
  <text x="120" y="170" font-size="6.5" fill="#4CAF50" font-style="italic">апофема</text>
  <!-- Regular pyramid info -->
  <rect x="302" y="58" width="186" height="200" rx="6" fill="white" opacity="0.9" stroke="#EF5350" stroke-width="1.2"/>
  <text x="395" y="74" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle" font-family="serif">Правильная пирамида</text>
  <text x="312" y="89" font-size="7.5" fill="#555" font-family="sans-serif">Основание — правильный</text>
  <text x="312" y="101" font-size="7.5" fill="#555" font-family="sans-serif">многоугольник</text>
  <text x="312" y="116" font-size="7.5" fill="#555" font-family="sans-serif">Вершина проектируется</text>
  <text x="312" y="128" font-size="7.5" fill="#555" font-family="sans-serif">в центр основания</text>
  <!-- Mini regular pyramid -->
  <path d="M350,235 L410,235 L420,215 L340,215 Z" fill="url(#face15)" stroke="#C62828" stroke-width="1"/>
  <line x1="380" y1="155" x2="350" y2="235" stroke="#C62828" stroke-width="1.2"/>
  <line x1="380" y1="155" x2="410" y2="235" stroke="#C62828" stroke-width="1.2"/>
  <line x1="380" y1="155" x2="420" y2="215" stroke="#C62828" stroke-width="1.2"/>
  <line x1="380" y1="155" x2="340" y2="215" stroke="#C62828" stroke-width="0.8" stroke-dasharray="4,3"/>
  <!-- Height in mini -->
  <line x1="380" y1="155" x2="380" y2="225" stroke="#1565C0" stroke-width="1.3"/>
  <circle cx="380" cy="225" r="1.5" fill="#1565C0"/>
  <text x="385" y="225" font-size="6" fill="#1565C0" font-style="italic">O</text>
  <!-- Apothem in mini -->
  <line x1="380" y1="155" x2="395" y2="225" stroke="#4CAF50" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="400" y="195" font-size="6" fill="#4CAF50" font-style="italic">l (апоф.)</text>
  <!-- Formulas -->
  <text x="312" y="248" font-size="7.5" fill="#C62828" font-weight="bold" font-family="serif">S бок = (1/2) * P * l</text>
  <text x="312" y="260" font-size="7.5" fill="#C62828" font-weight="bold" font-family="serif">S полн = S бок + S осн</text>
  <text x="312" y="275" font-size="7" fill="#555" font-family="sans-serif">l — апофема (высота</text>
  <text x="312" y="285" font-size="7" fill="#555" font-family="sans-serif">боковой грани)</text>
  <text x="312" y="250" font-size="7" fill="#555" font-family="sans-serif">P — периметр основания</text>
  <!-- Elements Panel -->
  <rect x="12" y="268" width="280" height="42" rx="6" fill="white" opacity="0.88" stroke="#EF5350" stroke-width="1"/>
  <text x="152" y="282" font-size="7.5" fill="#555" font-family="sans-serif">Элементы: S — вершина, ABCD — основание, SA,SB,SC,SD — боковые рёбра</text>
  <text x="152" y="295" font-size="7.5" fill="#555" font-family="sans-serif">SO — высота, SAB,SBC,SCD,SDA — боковые грани (треугольники)</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#EF5350" opacity="0.85"/>
  <text x="250" y="333" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Правильная пирамида: S бок = (1/2) * P * l, S полн = S бок + S осн</text>
</svg>