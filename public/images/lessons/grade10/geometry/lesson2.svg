<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="pl2a" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#66BB6A" stop-opacity="0.25"/>
    </linearGradient>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg2)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle" font-family="serif">Следствия из аксиом стереометрии</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 2</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#43A047" stroke-width="1" opacity="0.3"/>
  <!-- Corollary 1 Panel -->
  <rect x="12" y="58" width="235" height="140" rx="6" fill="white" opacity="0.9" stroke="#43A047" stroke-width="1.2"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="serif">Следствие 1</text>
  <text x="130" y="86" font-size="7.5" fill="#555" text-anchor="middle" font-family="sans-serif">Прямая и точка определяют плоскость</text>
  <!-- Visual: line a and point M -->
  <path d="M35,180 L65,148 L210,148 L180,180 Z" fill="url(#pl2a)" stroke="#43A047" stroke-width="1.2"/>
  <text x="145" y="176" font-size="8" fill="#43A047" font-style="italic">alpha</text>
  <line x1="55" y1="168" x2="185" y2="155" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#arrG)"/>
  <text x="125" y="153" font-size="9" fill="#2E7D32" font-style="italic">a</text>
  <!-- Point M outside plane projection -->
  <circle cx="100" cy="140" r="3" fill="#E53935"/>
  <text x="108" y="137" font-size="8" fill="#E53935" font-style="italic">M</text>
  <line x1="100" y1="140" x2="100" y2="161" stroke="#E53935" stroke-width="0.8" stroke-dasharray="3,2"/>
  <circle cx="100" cy="161" r="2" fill="#E53935" opacity="0.4"/>
  <text x="55" y="195" font-size="7" fill="#2E7D32" font-family="serif">a и M not in a =&gt; ! alpha</text>
  <!-- Corollary 2 Panel -->
  <rect x="255" y="58" width="233" height="140" rx="6" fill="white" opacity="0.9" stroke="#43A047" stroke-width="1.2"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="serif">Следствие 2</text>
  <text x="372" y="86" font-size="7.5" fill="#555" text-anchor="middle" font-family="sans-serif">Две пересекающиеся прямые — плоскость</text>
  <!-- Visual: two intersecting lines -->
  <path d="M275,180 L305,145 L470,145 L440,180 Z" fill="url(#pl2a)" stroke="#43A047" stroke-width="1.2"/>
  <text x="400" y="176" font-size="8" fill="#43A047" font-style="italic">alpha</text>
  <line x1="295" y1="170" x2="435" y2="152" stroke="#2E7D32" stroke-width="1.8" marker-end="url(#arrG)"/>
  <line x1="310" y1="158" x2="440" y2="170" stroke="#1565C0" stroke-width="1.8"/>
  <circle cx="370" cy="157" r="3" fill="#FF6F00"/>
  <text x="376" y="153" font-size="8" fill="#FF6F00" font-style="italic">O</text>
  <text x="320" y="155" font-size="9" fill="#2E7D32" font-style="italic">a</text>
  <text x="430" y="168" font-size="9" fill="#1565C0" font-style="italic">b</text>
  <text x="372" y="193" font-size="7" fill="#2E7D32" font-family="serif">a cap b = O =&gt; ! alpha</text>
  <!-- Proof Panel -->
  <rect x="12" y="206" width="235" height="102" rx="6" fill="white" opacity="0.88" stroke="#43A047" stroke-width="1"/>
  <text x="130" y="222" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="serif">Доказательство следствия 1</text>
  <text x="22" y="237" font-size="7.5" fill="#555" font-family="sans-serif">1. Возьмём точки A, B на прямой a</text>
  <text x="22" y="250" font-size="7.5" fill="#555" font-family="sans-serif">2. A, B, M не на одной прямой</text>
  <text x="22" y="263" font-size="7.5" fill="#555" font-family="sans-serif">   (M не лежит на a)</text>
  <text x="22" y="276" font-size="7.5" fill="#555" font-family="sans-serif">3. По C1: через A,B,M — плоскость</text>
  <text x="22" y="289" font-size="7.5" fill="#555" font-family="sans-serif">4. По C2: a лежит в этой плоскости</text>
  <text x="22" y="302" font-size="7.5" fill="#2E7D32" font-weight="bold" font-family="sans-serif">   Единственность: из C1 + C2</text>
  <!-- Applications Panel -->
  <rect x="255" y="206" width="233" height="102" rx="6" fill="white" opacity="0.88" stroke="#43A047" stroke-width="1"/>
  <text x="372" y="222" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle" font-family="serif">Применение на практике</text>
  <!-- Door hinge diagram -->
  <line x1="290" y1="240" x2="290" y2="300" stroke="#795548" stroke-width="3"/>
  <rect x="290" y="250" width="40" height="30" rx="2" fill="#A5D6A7" opacity="0.5" stroke="#43A047" stroke-width="1" transform="rotate(-15,290,250)"/>
  <line x1="290" y1="260" x2="320" y2="255" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="290" cy="255" r="2" fill="#795548"/>
  <circle cx="290" cy="275" r="2" fill="#795548"/>
  <text x="350" y="255" font-size="7" fill="#555" font-family="sans-serif">Дверь закреплена</text>
  <text x="350" y="266" font-size="7" fill="#555" font-family="sans-serif">на двух петлях —</text>
  <text x="350" y="277" font-size="7" fill="#555" font-family="sans-serif">плоскость двери</text>
  <text x="350" y="288" font-size="7" fill="#555" font-family="sans-serif">определена!</text>
  <text x="350" y="302" font-size="7" fill="#2E7D32" font-family="serif">(следствие 1)</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#43A047" opacity="0.85"/>
  <text x="250" y="333" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Следствия: прямая и точка, две пересекающиеся прямые — однозначно определяют плоскость</text>
</svg>