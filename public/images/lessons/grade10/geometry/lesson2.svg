<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00897B" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#00897B" text-anchor="middle">Параллелепипед и куб</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Геометрия - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#00897B" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
    <!-- Parallelepiped -->
    <polygon points="60,210 130,210 130,280 60,280" fill="#00897B" opacity="0.12" stroke="#00897B" stroke-width="2"/>
    <polygon points="60,210 100,175 170,175 130,210" fill="#00897B" opacity="0.15" stroke="#00897B" stroke-width="2"/>
    <polygon points="130,210 170,175 170,245 130,280" fill="#00897B" opacity="0.08" stroke="#00897B" stroke-width="1.5"/>
    <line x1="60" y1="280" x2="100" y2="245" stroke="#00897B" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>
    <line x1="100" y1="245" x2="170" y2="245" stroke="#00897B" stroke-width="1.5"/>
    <line x1="100" y1="245" x2="100" y2="175" stroke="#00897B" stroke-width="1.5"/>
    <!-- Dimension labels for parallelepiped -->
    <text x="90" y="298" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">a</text>
    <text x="138" y="250" font-family="Arial,sans-serif" font-size="11" fill="#4CAF50" font-weight="bold">b</text>
    <line x1="48" y1="210" x2="48" y2="280" stroke="#FF9800" stroke-width="1.5"/>
    <polygon points="45,210 48,202 51,210" fill="#FF9800"/>
    <polygon points="45,280 48,288 51,280" fill="#FF9800"/>
    <text x="35" y="250" font-family="Arial,sans-serif" font-size="11" fill="#FF9800" font-weight="bold">c</text>
    <text x="70" y="300" font-family="Arial,sans-serif" font-size="9" fill="#00695C">Параллелепипед</text>
    <!-- Cube -->
    <polygon points="280,200 340,200 340,260 280,260" fill="#00897B" opacity="0.12" stroke="#00897B" stroke-width="2"/>
    <polygon points="280,200 315,170 375,170 340,200" fill="#00897B" opacity="0.15" stroke="#00897B" stroke-width="2"/>
    <polygon points="340,200 375,170 375,230 340,260" fill="#00897B" opacity="0.08" stroke="#00897B" stroke-width="1.5"/>
    <line x1="280" y1="260" x2="315" y2="230" stroke="#00897B" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>
    <line x1="315" y1="230" x2="375" y2="230" stroke="#00897B" stroke-width="1.5"/>
    <line x1="315" y1="230" x2="315" y2="170" stroke="#00897B" stroke-width="1.5"/>
    <!-- Cube dimension labels -->
    <text x="305" y="277" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">a</text>
    <text x="348" y="234" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">a</text>
    <line x1="270" y1="200" x2="270" y2="260" stroke="#E91E63" stroke-width="1.5"/>
    <polygon points="267,200 270,192 273,200" fill="#E91E63"/>
    <polygon points="267,260 270,268 273,260" fill="#E91E63"/>
    <text x="255" y="235" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">a</text>
    <text x="290" y="277" font-family="Arial,sans-serif" font-size="9" fill="#00695C">Куб</text>
    <!-- Formulas box -->
    <rect x="25" y="92" width="220" height="60" rx="5" fill="white" opacity="0.85" stroke="#00897B" stroke-width="1"/>
    <text x="35" y="108" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">Параллелепипед:</text>
    <text x="35" y="126" font-family="Arial,sans-serif" font-size="11" fill="#444">V = a * b * c</text>
    <text x="35" y="144" font-family="Arial,sans-serif" font-size="11" fill="#444">Sполн = 2(ab + bc + ac)</text>
    <rect x="260" y="92" width="220" height="60" rx="5" fill="white" opacity="0.85" stroke="#00897B" stroke-width="1"/>
    <text x="270" y="108" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">Куб:</text>
    <text x="270" y="126" font-family="Arial,sans-serif" font-size="11" fill="#444">V = a^3</text>
    <text x="270" y="144" font-family="Arial,sans-serif" font-size="11" fill="#444">Sполн = 6a^2 ;  d = a*sqrt(3)</text>
    <!-- Diagonal in parallelepiped -->
    <line x1="60" y1="210" x2="170" y2="245" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="110" y="218" font-family="Arial,sans-serif" font-size="10" fill="#E91E63">d</text>
    <text x="40" y="160" font-family="Arial,sans-serif" font-size="10" fill="#888">d^2 = a^2+b^2+c^2</text>
    <!-- Diagonal in cube -->
    <line x1="280" y1="200" x2="375" y2="230" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="320" y="208" font-family="Arial,sans-serif" font-size="10" fill="#E91E63">d</text>
    <text x="260" y="285" font-family="Arial,sans-serif" font-size="10" fill="#888">d = a*sqrt(3)</text>
    <!-- Property note -->
    <rect x="25" y="158" width="220" height="25" rx="3" fill="#00897B" opacity="0.08"/>
    <text x="135" y="175" font-family="Arial,sans-serif" font-size="10" fill="#00695C" text-anchor="middle">Прямоугольный - все грани прямоуг.</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Геометрия</text>
</svg>