<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg19" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="pl19" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#AB47BC" stop-opacity="0.15"/>
    </linearGradient>
    <marker id="arr19" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#7B1FA2"/>
    </marker>
    <marker id="arr19r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#E53935"/>
    </marker>
    <marker id="arr19b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#1565C0"/>
    </marker>
    <marker id="arr19g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#4CAF50"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg19)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle" font-family="serif">Умножение вектора на число. Компланарные векторы</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 19</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#9C27B0" stroke-width="1" opacity="0.3"/>
  <!-- Scaling Panel -->
  <rect x="12" y="58" width="235" height="120" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">Умножение на число</text>
  <text x="22" y="88" font-size="7.5" fill="#555" font-family="sans-serif">k * a — вектор коллинеарный a,</text>
  <text x="22" y="99" font-size="7.5" fill="#555" font-family="sans-serif">|k*a| = |k| * |a|</text>
  <!-- Visual: scaled vectors -->
  <line x1="30" y1="140" x2="80" y2="118" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arr19)"/>
  <text x="45" y="123" font-size="8" fill="#7B1FA2" font-style="italic">a</text>
  <line x1="30" y1="155" x2="130" y2="111" stroke="#1565C0" stroke-width="2" marker-end="url(#arr19b)"/>
  <text x="80" y="115" font-size="8" fill="#1565C0" font-style="italic">2a</text>
  <line x1="30" y1="168" x2="55" y2="157" stroke="#E53935" stroke-width="2" marker-end="url(#arr19r)"/>
  <text x="33" y="172" font-size="8" fill="#E53935" font-style="italic">0.5a</text>
  <!-- Negative -->
  <line x1="100" y1="155" x2="50" y2="173" stroke="#FF6F00" stroke-width="1.8" marker-end="url(#arr19r)"/>
  <text x="65" y="172" font-size="8" fill="#FF6F00" font-style="italic">-a</text>
  <text x="150" y="140" font-size="7" fill="#7B1FA2" font-family="sans-serif">k > 0: сонаправлен</text>
  <text x="150" y="152" font-size="7" fill="#7B1FA2" font-family="sans-serif">k &lt; 0: противоположен</text>
  <text x="150" y="164" font-size="7" fill="#7B1FA2" font-family="sans-serif">k = 0: нулевой вектор</text>
  <!-- Coplanar vectors Panel -->
  <rect x="255" y="58" width="233" height="120" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">Компланарные векторы</text>
  <text x="265" y="88" font-size="7.5" fill="#555" font-family="sans-serif">Векторы называются компланарными,</text>
  <text x="265" y="100" font-size="7.5" fill="#555" font-family="sans-serif">если при откладывании от одной</text>
  <text x="265" y="112" font-size="7.5" fill="#555" font-family="sans-serif">точки они лежат в одной плоскости.</text>
  <!-- Plane with coplanar vectors -->
  <path d="M280,160 L300,140 L460,140 L440,160 Z" fill="url(#pl19)" stroke="#9C27B0" stroke-width="1"/>
  <line x1="300" y1="155" x2="370" y2="143" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arr19)"/>
  <line x1="300" y1="155" x2="390" y2="153" stroke="#1565C0" stroke-width="2" marker-end="url(#arr19b)"/>
  <line x1="300" y1="155" x2="350" y2="150" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr19g)"/>
  <text x="340" y="140" font-size="7" fill="#7B1FA2" font-style="italic">a</text>
  <text x="380" y="150" font-size="7" fill="#1565C0" font-style="italic">b</text>
  <text x="340" y="148" font-size="7" fill="#4CAF50" font-style="italic">c</text>
  <circle cx="300" cy="155" r="2" fill="#555"/>
  <text x="380" y="165" font-size="7" fill="#7B1FA2" font-weight="bold" font-family="serif">a,b,c — компланарны</text>
  <!-- Non-coplanar Panel -->
  <rect x="12" y="186" width="235" height="120" rx="6" fill="white" opacity="0.88" stroke="#9C27B0" stroke-width="1"/>
  <text x="130" y="202" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">Некомпланарные векторы</text>
  <!-- 3D axes with vectors -->
  <line x1="60" y1="280" x2="60" y2="220" stroke="#555" stroke-width="0.8"/>
  <line x1="60" y1="280" x2="140" y2="295" stroke="#555" stroke-width="0.8"/>
  <line x1="60" y1="280" x2="20" y2="295" stroke="#555" stroke-width="0.8"/>
  <line x1="60" y1="280" x2="100" y2="245" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arr19)"/>
  <line x1="60" y1="280" x2="115" y2="275" stroke="#1565C0" stroke-width="2" marker-end="url(#arr19b)"/>
  <line x1="60" y1="280" x2="70" y2="240" stroke="#E53935" stroke-width="2" marker-end="url(#arr19r)"/>
  <text x="100" y="240" font-size="7" fill="#7B1FA2" font-style="italic">a</text>
  <text x="118" y="273" font-size="7" fill="#1565C0" font-style="italic">b</text>
  <text x="68" y="237" font-size="7" fill="#E53935" font-style="italic">c</text>
  <text x="60" y="215" font-size="7" fill="#555" font-style="italic">z</text>
  <text x="143" y="300" font-size="7" fill="#555" font-style="italic">x</text>
  <text x="14" y="300" font-size="7" fill="#555" font-style="italic">y</text>
  <text x="120" y="295" font-size="7" fill="#7B1FA2" font-weight="bold" font-family="serif">a, b, c — не</text>
  <text x="120" y="305" font-size="7" fill="#7B1FA2" font-weight="bold" font-family="serif">компланарны!</text>
  <!-- Theorem Panel -->
  <rect x="255" y="186" width="233" height="120" rx="6" fill="white" opacity="0.88" stroke="#9C27B0" stroke-width="1"/>
  <text x="372" y="202" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="serif">Признак компланарности</text>
  <text x="265" y="217" font-size="7.5" fill="#555" font-family="sans-serif">Если вектор c можно разложить</text>
  <text x="265" y="229" font-size="7.5" fill="#555" font-family="sans-serif">по векторам a и b:</text>
  <text x="265" y="248" font-size="11" fill="#7B1FA2" font-weight="bold" text-anchor="middle" font-family="serif">c = x*a + y*b</text>
  <text x="265" y="265" font-size="7.5" fill="#555" font-family="sans-serif">то векторы a, b, c</text>
  <text x="265" y="277" font-size="7.5" fill="#7B1FA2" font-weight="bold" font-family="sans-serif">компланарны.</text>
  <line x1="265" y1="284" x2="478" y2="284" stroke="#9C27B0" stroke-width="0.5" opacity="0.3"/>
  <text x="265" y="296" font-size="7.5" fill="#555" font-family="sans-serif">Обратно: если a,b,c компланарны,</text>
  <text x="265" y="305" font-size="7.5" fill="#555" font-family="sans-serif">то c = x*a + y*b (при a непар. b)</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#9C27B0" opacity="0.85"/>
  <text x="250" y="333" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Компланарны: c = x*a + y*b | Некомпланарны: векторы не в одной плоскости</text>
</svg>