<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00897B" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#00897B" text-anchor="middle">Объёмы тел вращения</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Геометрия - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#00897B" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
    <!-- Cylinder (small) -->
    <rect x="30" y="170" width="60" height="70" fill="#00897B" opacity="0.08"/>
    <ellipse cx="60" cy="170" rx="30" ry="10" fill="#00897B" opacity="0.1" stroke="#00897B" stroke-width="1.5"/>
    <ellipse cx="60" cy="240" rx="30" ry="10" fill="#00897B" opacity="0.05" stroke="#00897B" stroke-width="1.5"/>
    <line x1="30" y1="170" x2="30" y2="240" stroke="#00897B" stroke-width="1.5"/>
    <line x1="90" y1="170" x2="90" y2="240" stroke="#00897B" stroke-width="1.5"/>
    <text x="60" y="262" font-family="Arial,sans-serif" font-size="9" fill="#00695C" text-anchor="middle">Цилиндр</text>
    <!-- Cylinder formula -->
    <rect x="25" y="130" width="75" height="28" rx="4" fill="#00897B" opacity="0.1"/>
    <text x="62" y="143" font-family="Arial,sans-serif" font-size="9" fill="#00897B" text-anchor="middle" font-weight="bold">V = pi*R^2*H</text>
    <text x="62" y="155" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">= Sосн * H</text>
    <!-- Cone (small) -->
    <polygon points="170,140 140,240 200,240" fill="#00897B" opacity="0.1" stroke="#00897B" stroke-width="1.5"/>
    <ellipse cx="170" cy="240" rx="30" ry="10" fill="#00897B" opacity="0.05" stroke="#00897B" stroke-width="1.5"/>
    <text x="170" y="262" font-family="Arial,sans-serif" font-size="9" fill="#00695C" text-anchor="middle">Конус</text>
    <!-- Cone formula -->
    <rect x="125" y="130" width="90" height="28" rx="4" fill="#00897B" opacity="0.1"/>
    <text x="170" y="143" font-family="Arial,sans-serif" font-size="9" fill="#00897B" text-anchor="middle" font-weight="bold">V = 1/3*pi*R^2*H</text>
    <text x="170" y="155" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">= 1/3 * Sосн * H</text>
    <!-- Sphere (small) -->
    <circle cx="280" cy="200" r="45" fill="#00897B" opacity="0.06" stroke="#00897B" stroke-width="1.5"/>
    <ellipse cx="280" cy="200" rx="45" ry="14" fill="none" stroke="#00897B" stroke-width="1" stroke-dasharray="3,2"/>
    <ellipse cx="280" cy="200" rx="16" ry="45" fill="none" stroke="#00897B" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
    <text x="280" y="262" font-family="Arial,sans-serif" font-size="9" fill="#00695C" text-anchor="middle">Шар</text>
    <!-- Sphere formula -->
    <rect x="235" y="130" width="90" height="28" rx="4" fill="#00897B" opacity="0.1"/>
    <text x="280" y="143" font-family="Arial,sans-serif" font-size="9" fill="#00897B" text-anchor="middle" font-weight="bold">V = 4/3*pi*R^3</text>
    <text x="280" y="155" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">S = 4*pi*R^2</text>
    <!-- Summary table -->
    <rect x="340" y="90" width="140" height="205" rx="5" fill="white" opacity="0.85" stroke="#00897B" stroke-width="1"/>
    <text x="350" y="108" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">Сводка формул:</text>
    <line x1="350" y1="113" x2="470" y2="113" stroke="#00897B" stroke-width="0.5"/>
    <text x="350" y="130" font-family="Arial,sans-serif" font-size="10" fill="#444" font-weight="bold">Цилиндр:</text>
    <text x="350" y="145" font-family="Arial,sans-serif" font-size="10" fill="#00897B">V = pi*R^2*H</text>
    <line x1="350" y1="152" x2="470" y2="152" stroke="#eee" stroke-width="0.5"/>
    <text x="350" y="167" font-family="Arial,sans-serif" font-size="10" fill="#444" font-weight="bold">Конус:</text>
    <text x="350" y="182" font-family="Arial,sans-serif" font-size="10" fill="#00897B">V = 1/3*pi*R^2*H</text>
    <line x1="350" y1="189" x2="470" y2="189" stroke="#eee" stroke-width="0.5"/>
    <text x="350" y="204" font-family="Arial,sans-serif" font-size="10" fill="#444" font-weight="bold">Шар:</text>
    <text x="350" y="219" font-family="Arial,sans-serif" font-size="10" fill="#00897B">V = 4/3*pi*R^3</text>
    <line x1="350" y1="226" x2="470" y2="226" stroke="#00897B" stroke-width="0.5"/>
    <text x="350" y="242" font-family="Arial,sans-serif" font-size="10" fill="#444" font-weight="bold">Усеч. конус:</text>
    <text x="350" y="257" font-family="Arial,sans-serif" font-size="9" fill="#00897B">V=1/3*pi*H*</text>
    <text x="350" y="270" font-family="Arial,sans-serif" font-size="9" fill="#00897B">(R1^2+R1*R2+R2^2)</text>
    <text x="350" y="288" font-family="Arial,sans-serif" font-size="8" fill="#888">Конус = 1/3 цилиндра</text>
    <!-- Relationship arrow -->
    <text x="200" y="290" font-family="Arial,sans-serif" font-size="9" fill="#00695C" text-anchor="middle">Vцил : Vкон : Vшар</text>
    <text x="200" y="300" font-family="Arial,sans-serif" font-size="9" fill="#00897B" text-anchor="middle">= 3 : 1 : 4/3 * (R/H)</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Геометрия</text>
</svg>