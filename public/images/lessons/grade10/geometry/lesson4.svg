<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="pl4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCC80" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFA726" stop-opacity="0.2"/>
    </linearGradient>
    <marker id="arrO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg4)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="serif">Параллельность прямой и плоскости</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 4</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#F57F17" stroke-width="1" opacity="0.3"/>
  <!-- Definition Panel -->
  <rect x="12" y="58" width="235" height="135" rx="6" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Определение</text>
  <text x="22" y="89" font-size="8" fill="#555" font-family="sans-serif">Прямая параллельна плоскости,</text>
  <text x="22" y="101" font-size="8" fill="#555" font-family="sans-serif">если они не имеют общих точек.</text>
  <!-- 3D visual: line a parallel to plane alpha -->
  <path d="M30,190 L60,155 L215,155 L185,190 Z" fill="url(#pl4)" stroke="#F57F17" stroke-width="1.2"/>
  <text x="155" y="185" font-size="9" fill="#E65100" font-style="italic">alpha</text>
  <line x1="55" y1="140" x2="185" y2="120" stroke="#E65100" stroke-width="2.2" marker-end="url(#arrO)"/>
  <text x="125" y="118" font-size="10" fill="#E65100" font-style="italic">a</text>
  <!-- dashed projection lines -->
  <line x1="80" y1="134" x2="80" y2="163" stroke="#F57F17" stroke-width="0.7" stroke-dasharray="3,2"/>
  <line x1="140" y1="126" x2="140" y2="158" stroke="#F57F17" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="22" y="150" font-size="7.5" fill="#E65100" font-family="serif" font-weight="bold">a || alpha</text>
  <text x="22" y="162" font-size="7" fill="#555" font-family="sans-serif">a cap alpha = пустое мн-во</text>
  <!-- Sign/Theorem Panel -->
  <rect x="255" y="58" width="233" height="135" rx="6" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="1.2"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Признак параллельности</text>
  <text x="265" y="89" font-size="8" fill="#555" font-family="sans-serif">Если прямая параллельна</text>
  <text x="265" y="101" font-size="8" fill="#555" font-family="sans-serif">какой-либо прямой, лежащей</text>
  <text x="265" y="113" font-size="8" fill="#555" font-family="sans-serif">в плоскости, то она</text>
  <text x="265" y="125" font-size="8" fill="#E65100" font-weight="bold" font-family="sans-serif">параллельна этой плоскости.</text>
  <!-- Visual proof -->
  <path d="M280,190 L305,158 L470,158 L445,190 Z" fill="url(#pl4)" stroke="#F57F17" stroke-width="1.2"/>
  <text x="415" y="185" font-size="8" fill="#E65100" font-style="italic">alpha</text>
  <line x1="295" y1="178" x2="440" y2="165" stroke="#1565C0" stroke-width="1.8"/>
  <text x="380" y="163" font-size="8" fill="#1565C0" font-style="italic">b</text>
  <line x1="310" y1="150" x2="445" y2="135" stroke="#E65100" stroke-width="2" marker-end="url(#arrO)"/>
  <text x="390" y="133" font-size="8" fill="#E65100" font-style="italic">a</text>
  <line x1="350" y1="166" x2="350" y2="145" stroke="#F57F17" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="372" y="198" font-size="7" fill="#E65100" font-family="serif">a || b, b in alpha =&gt; a || alpha</text>
  <!-- Theorem about parallel line & plane -->
  <rect x="12" y="200" width="240" height="108" rx="6" fill="white" opacity="0.88" stroke="#F57F17" stroke-width="1"/>
  <text x="132" y="216" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Свойство</text>
  <text x="22" y="231" font-size="7.5" fill="#555" font-family="sans-serif">Если плоскость проходит через</text>
  <text x="22" y="243" font-size="7.5" fill="#555" font-family="sans-serif">прямую, параллельную другой</text>
  <text x="22" y="255" font-size="7.5" fill="#555" font-family="sans-serif">плоскости, и пересекает эту</text>
  <text x="22" y="267" font-size="7.5" fill="#555" font-family="sans-serif">плоскость, то линия пересечения</text>
  <text x="22" y="279" font-size="7.5" fill="#E65100" font-weight="bold" font-family="sans-serif">параллельна данной прямой.</text>
  <!-- mini diagram -->
  <path d="M180,240 L195,228 L230,232 L215,245 Z" fill="url(#pl4)" stroke="#F57F17" stroke-width="0.8"/>
  <line x1="185" y1="242" x2="225" y2="235" stroke="#E65100" stroke-width="1.2"/>
  <line x1="175" y1="254" x2="218" y2="246" stroke="#E65100" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="195" y="256" font-size="6" fill="#E65100" font-style="italic">a||c</text>
  <!-- Additional Panel -->
  <rect x="260" y="200" width="228" height="108" rx="6" fill="white" opacity="0.88" stroke="#F57F17" stroke-width="1"/>
  <text x="374" y="216" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle" font-family="serif">Доказательство признака</text>
  <text x="270" y="231" font-size="7.5" fill="#555" font-family="sans-serif">1. a || b (по условию)</text>
  <text x="270" y="243" font-size="7.5" fill="#555" font-family="sans-serif">2. b лежит в alpha</text>
  <text x="270" y="255" font-size="7.5" fill="#555" font-family="sans-serif">3. Предположим: a cap alpha = M</text>
  <text x="270" y="267" font-size="7.5" fill="#555" font-family="sans-serif">4. Тогда M in alpha и M in a</text>
  <text x="270" y="279" font-size="7.5" fill="#555" font-family="sans-serif">5. Но a,b в одной плоскости</text>
  <text x="270" y="291" font-size="7.5" fill="#555" font-family="sans-serif">   и a||b — противоречие!</text>
  <text x="270" y="303" font-size="7.5" fill="#E65100" font-weight="bold" font-family="sans-serif">   Значит a || alpha.</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#F57F17" opacity="0.85"/>
  <text x="250" y="333" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Признак: a || b, b in alpha =&gt; a || alpha (нет общих точек)</text>
</svg>