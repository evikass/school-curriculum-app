<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00897B"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00897B" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#00897B" text-anchor="middle">Цилиндр</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Геометрия - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#00897B" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
    <!-- Cylinder body -->
    <rect x="80" y="150" width="120" height="120" fill="#00897B" opacity="0.08"/>
    <!-- Top ellipse -->
    <ellipse cx="140" cy="150" rx="60" ry="18" fill="#00897B" opacity="0.12" stroke="#00897B" stroke-width="2"/>
    <!-- Bottom ellipse -->
    <ellipse cx="140" cy="270" rx="60" ry="18" fill="#00897B" opacity="0.06" stroke="#00897B" stroke-width="2"/>
    <!-- Back half of bottom ellipse (dashed) -->
    <path d="M80,270 Q140,252 200,270" fill="none" stroke="#00897B" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <!-- Side lines -->
    <line x1="80" y1="150" x2="80" y2="270" stroke="#00897B" stroke-width="2"/>
    <line x1="200" y1="150" x2="200" y2="270" stroke="#00897B" stroke-width="2"/>
    <!-- Radius -->
    <line x1="140" y1="150" x2="200" y2="150" stroke="#E91E63" stroke-width="2"/>
    <text x="168" y="145" font-family="Arial,sans-serif" font-size="12" fill="#E91E63" font-weight="bold">R</text>
    <!-- Height -->
    <line x1="215" y1="150" x2="215" y2="270" stroke="#4CAF50" stroke-width="2"/>
    <polygon points="212,150 215,142 218,150" fill="#4CAF50"/>
    <polygon points="212,270 215,278 218,270" fill="#4CAF50"/>
    <text x="220" y="215" font-family="Arial,sans-serif" font-size="12" fill="#4CAF50" font-weight="bold">H</text>
    <!-- Center point top -->
    <circle cx="140" cy="150" r="2" fill="#00897B"/>
    <!-- Unfolding diagram -->
    <rect x="280" y="130" width="120" height="90" fill="#00897B" opacity="0.06" stroke="#00897B" stroke-width="1.5"/>
    <text x="340" y="120" font-family="Arial,sans-serif" font-size="10" fill="#00695C" text-anchor="middle">Развертка боковой поверхности</text>
    <!-- Width = 2*pi*R -->
    <line x1="280" y1="230" x2="400" y2="230" stroke="#E91E63" stroke-width="1.5"/>
    <text x="340" y="245" font-family="Arial,sans-serif" font-size="10" fill="#E91E63" text-anchor="middle">2 * pi * R</text>
    <!-- Height of unfolding -->
    <line x1="270" y1="130" x2="270" y2="220" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="265" y="180" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50" text-anchor="end">H</text>
    <!-- Formulas -->
    <rect x="280" y="90" width="200" height="32" rx="5" fill="white" opacity="0.85" stroke="#00897B" stroke-width="1"/>
    <text x="290" y="106" font-family="Arial,sans-serif" font-size="11" fill="#00695C" font-weight="bold">Sбок = 2 * pi * R * H</text>
    <text x="290" y="118" font-family="Arial,sans-serif" font-size="10" fill="#444">V = pi * R^2 * H</text>
    <!-- Bottom formula bar -->
    <rect x="25" y="280" width="220" height="18" rx="3" fill="#00897B" opacity="0.08"/>
    <text x="135" y="293" font-family="Arial,sans-serif" font-size="10" fill="#00695C" text-anchor="middle">Sполн = 2*pi*R*(R + H)</text>
    <!-- Axis line -->
    <line x1="140" y1="130" x2="140" y2="285" stroke="#00897B" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <text x="145" y="290" font-family="Arial,sans-serif" font-size="9" fill="#888">ось</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Геометрия</text>
</svg>