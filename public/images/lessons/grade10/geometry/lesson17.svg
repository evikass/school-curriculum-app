<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg17" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="pl17" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90CAF9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0.15"/>
    </linearGradient>
    <marker id="arr17" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#1565C0"/>
    </marker>
    <marker id="arr17r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#E53935"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg17)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="serif">Понятие вектора в пространстве</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 17</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1E88E5" stroke-width="1" opacity="0.3"/>
  <!-- Main Vector Panel -->
  <rect x="12" y="58" width="280" height="200" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="152" y="74" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="serif">Вектор в пространстве</text>
  <!-- 3D coordinate axes -->
  <line x1="80" y1="230" x2="80" y2="110" stroke="#555" stroke-width="1.5"/>
  <line x1="80" y1="230" x2="200" y2="260" stroke="#555" stroke-width="1.5"/>
  <line x1="80" y1="230" x2="15" y2="260" stroke="#555" stroke-width="1.5"/>
  <text x="80" y="105" font-size="10" fill="#555" font-style="italic">z</text>
  <text x="205" y="265" font-size="10" fill="#555" font-style="italic">x</text>
  <text x="8" y="265" font-size="10" fill="#555" font-style="italic">y</text>
  <!-- Vector AB in 3D -->
  <circle cx="60" cy="200" r="3" fill="#1565C0"/>
  <text x="48" y="198" font-size="9" fill="#1565C0" font-weight="bold" font-style="italic">A</text>
  <circle cx="160" cy="140" r="3" fill="#E53935"/>
  <text x="165" y="137" font-size="9" fill="#E53935" font-weight="bold" font-style="italic">B</text>
  <line x1="60" y1="200" x2="160" y2="140" stroke="#1565C0" stroke-width="2.5" marker-end="url(#arr17)"/>
  <text x="120" y="160" font-size="10" fill="#1565C0" font-style="italic" font-weight="bold">AB</text>
  <!-- Component projections (dashed) -->
  <line x1="60" y1="200" x2="130" y2="215" stroke="#90CAF9" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="130" y1="215" x2="160" y2="140" stroke="#90CAF9" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="30" y="220" font-size="8" fill="#1E88E5" font-family="serif">AB = (x2-x1; y2-y1; z2-z1)</text>
  <text x="30" y="233" font-size="7" fill="#555" font-family="sans-serif">|AB| = sqrt(dx^2+dy^2+dz^2)</text>
  <!-- Equal/Opposite vectors Panel -->
  <rect x="302" y="58" width="186" height="200" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1.2"/>
  <text x="395" y="74" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="serif">Виды векторов</text>
  <!-- Equal vectors -->
  <text x="312" y="92" font-size="7.5" fill="#1565C0" font-weight="bold" font-family="sans-serif">Равные векторы:</text>
  <line x1="315" y1="108" x2="375" y2="100" stroke="#1565C0" stroke-width="2" marker-end="url(#arr17)"/>
  <line x1="390" y1="118" x2="450" y2="110" stroke="#1565C0" stroke-width="2" marker-end="url(#arr17)"/>
  <text x="345" y="96" font-size="7" fill="#1565C0" font-style="italic">a</text>
  <text x="422" y="106" font-size="7" fill="#1565C0" font-style="italic">b</text>
  <text x="460" y="108" font-size="7" fill="#1565C0" font-weight="bold">a = b</text>
  <text x="312" y="125" font-size="6.5" fill="#555" font-family="sans-serif">одинаково направлены, |a|=|b|</text>
  <!-- Opposite vectors -->
  <text x="312" y="142" font-size="7.5" fill="#E53935" font-weight="bold" font-family="sans-serif">Противоположные:</text>
  <line x1="315" y1="158" x2="375" y2="150" stroke="#1565C0" stroke-width="2" marker-end="url(#arr17)"/>
  <line x1="375" y1="165" x2="315" y2="157" stroke="#E53935" stroke-width="2" marker-end="url(#arr17r)"/>
  <text x="345" y="147" font-size="7" fill="#1565C0" font-style="italic">a</text>
  <text x="345" y="178" font-size="7" fill="#E53935" font-style="italic">-a</text>
  <text x="385" y="162" font-size="7" fill="#E53935" font-weight="bold">a и -a</text>
  <!-- Collinear vectors -->
  <text x="312" y="192" font-size="7.5" fill="#4CAF50" font-weight="bold" font-family="sans-serif">Коллинеарные:</text>
  <line x1="315" y1="210" x2="370" y2="205" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arr17)"/>
  <line x1="380" y1="208" x2="455" y2="200" stroke="#4CAF50" stroke-width="2" marker-end="url(#arr17)"/>
  <text x="345" y="202" font-size="7" fill="#4CAF50" font-style="italic">a</text>
  <text x="420" y="197" font-size="7" fill="#4CAF50" font-style="italic">b = ka</text>
  <text x="312" y="225" font-size="6.5" fill="#555" font-family="sans-serif">лежат на || прямых</text>
  <text x="312" y="238" font-size="6.5" fill="#555" font-family="sans-serif">b = k*a (сонаправл. k>0)</text>
  <text x="312" y="250" font-size="6.5" fill="#555" font-family="sans-serif">(противоположн. k&lt;0)</text>
  <!-- Difference from planar -->
  <rect x="12" y="268" width="476" height="42" rx="6" fill="white" opacity="0.88" stroke="#1E88E5" stroke-width="1"/>
  <text x="250" y="283" font-size="8" fill="#555" font-family="sans-serif">Отличие от плоских векторов: в пространстве вектор имеет 3 координаты (x, y, z)</text>
  <text x="250" y="296" font-size="8" fill="#555" font-family="sans-serif">Нулевой вектор: 0 = (0; 0; 0). Длина вектора: |a| = sqrt(x^2 + y^2 + z^2)</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#1E88E5" opacity="0.85"/>
  <text x="250" y="333" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Вектор AB = (x2-x1; y2-y1; z2-z1); |AB| = sqrt(dx^2+dy^2+dz^2)</text>
</svg>