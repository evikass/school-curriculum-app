<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="500" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="pl9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#80CBC4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4DB6AC" stop-opacity="0.18"/>
    </linearGradient>
    <marker id="arrT9" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg9)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="serif">Перпендикуляр и наклонная</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 10 класс — Урок 9</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00897B" stroke-width="1" opacity="0.3"/>
  <!-- Main 3D diagram Panel -->
  <rect x="12" y="58" width="280" height="200" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="152" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="serif">Перпендикуляр, наклонная, проекция</text>
  <!-- Plane alpha -->
  <path d="M30,245 L65,205 L275,205 L240,245 Z" fill="url(#pl9)" stroke="#00897B" stroke-width="1.2"/>
  <text x="210" y="240" font-size="9" fill="#00695C" font-style="italic">alpha</text>
  <!-- Point A outside plane -->
  <circle cx="140" cy="105" r="3.5" fill="#E53935"/>
  <text x="148" y="102" font-size="9" fill="#E53935" font-weight="bold" font-style="italic">A</text>
  <!-- Perpendicular AB -->
  <line x1="140" y1="105" x2="140" y2="218" stroke="#E53935" stroke-width="2.2"/>
  <circle cx="140" cy="218" r="2.5" fill="#E53935"/>
  <text x="128" y="225" font-size="8" fill="#E53935" font-style="italic">B</text>
  <text x="145" y="165" font-size="7" fill="#E53935" font-family="serif">перпендикуляр</text>
  <!-- Oblique AC -->
  <line x1="140" y1="105" x2="210" y2="215" stroke="#1565C0" stroke-width="2"/>
  <circle cx="210" cy="215" r="2.5" fill="#1565C0"/>
  <text x="215" y="225" font-size="8" fill="#1565C0" font-style="italic">C</text>
  <text x="180" y="155" font-size="7" fill="#1565C0" font-family="serif">наклонная</text>
  <!-- Another oblique AD -->
  <line x1="140" y1="105" x2="80" y2="215" stroke="#FF6F00" stroke-width="1.8" stroke-dasharray="5,3"/>
  <circle cx="80" cy="215" r="2.5" fill="#FF6F00"/>
  <text x="72" y="225" font-size="8" fill="#FF6F00" font-style="italic">D</text>
  <text x="95" y="150" font-size="7" fill="#FF6F00" font-family="serif">наклонная</text>
  <!-- Projection BC -->
  <line x1="140" y1="218" x2="210" y2="215" stroke="#4CAF50" stroke-width="1.8"/>
  <text x="170" y="230" font-size="7" fill="#4CAF50" font-family="serif">проекция</text>
  <!-- Projection BD -->
  <line x1="140" y1="218" x2="80" y2="215" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Right angle symbol at B -->
  <rect x="140" y="213" width="6" height="6" fill="none" stroke="#E53935" stroke-width="0.8"/>
  <!-- Length comparison panel -->
  <rect x="302" y="58" width="186" height="200" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="395" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="serif">Сравнение длин</text>
  <!-- Bar chart comparison -->
  <text x="315" y="92" font-size="7.5" fill="#555" font-family="sans-serif">Длины от точки A:</text>
  <!-- AB (shortest) -->
  <rect x="315" y="100" width="60" height="14" rx="2" fill="#E53935" opacity="0.7"/>
  <text x="320" y="110" font-size="7" fill="white" font-family="sans-serif">AB</text>
  <text x="380" y="110" font-size="7" fill="#E53935" font-family="sans-serif">— мин.</text>
  <!-- AC -->
  <rect x="315" y="120" width="90" height="14" rx="2" fill="#1565C0" opacity="0.6"/>
  <text x="320" y="130" font-size="7" fill="white" font-family="sans-serif">AC</text>
  <text x="410" y="130" font-size="7" fill="#1565C0" font-family="sans-serif">накл.</text>
  <!-- AD -->
  <rect x="315" y="140" width="100" height="14" rx="2" fill="#FF6F00" opacity="0.6"/>
  <text x="320" y="150" font-size="7" fill="white" font-family="sans-serif">AD</text>
  <text x="420" y="150" font-size="7" fill="#FF6F00" font-family="sans-serif">накл.</text>
  <line x1="310" y1="162" x2="480" y2="162" stroke="#00897B" stroke-width="0.5" opacity="0.3"/>
  <text x="395" y="176" font-size="8" fill="#00695C" font-weight="bold" font-family="serif">Перпендикуляр —</text>
  <text x="395" y="188" font-size="8" fill="#00695C" font-weight="bold" font-family="serif">наименьшее</text>
  <text x="395" y="200" font-size="8" fill="#00695C" font-weight="bold" font-family="serif">расстояние от</text>
  <text x="395" y="212" font-size="8" fill="#00695C" font-weight="bold" font-family="serif">точки до плоскости</text>
  <text x="395" y="228" font-size="9" fill="#E53935" font-weight="bold" font-family="serif">AB &lt; AC, AB &lt; AD</text>
  <!-- Distance panel -->
  <rect x="395" y="238" width="85" height="16" rx="3" fill="#00897B" opacity="0.15"/>
  <text x="437" y="250" font-size="7" fill="#00695C" text-anchor="middle" font-family="serif">dist(A,alpha)=AB</text>
  <!-- Properties Panel -->
  <rect x="12" y="268" width="476" height="42" rx="6" fill="white" opacity="0.88" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="282" font-size="8" fill="#555" font-family="sans-serif">Расстояние между паралл. плоскостями = длина общего перпендикуляра</text>
  <text x="250" y="295" font-size="8" fill="#555" font-family="sans-serif">Расстояние от точки до прямой в пространстве = длина перпендикуляра из точки на прямую</text>
  <!-- Bottom bar -->
  <rect x="12" y="316" width="476" height="26" rx="4" fill="#00897B" opacity="0.85"/>
  <text x="250" y="333" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold" font-family="serif">Перпендикуляр AB — кратчайшее расстояние от точки A до плоскости alpha</text>
</svg>