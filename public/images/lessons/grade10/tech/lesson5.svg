<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#ECEFF1" stroke="#37474F" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="1" y="1" width="498" height="48" rx="12" ry="12" fill="#37474F"/>
  <rect x="1" y="25" width="498" height="24" fill="#37474F"/>
  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">CAD-системы</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 5</text>

  <!-- Left: CAD software comparison -->
  <rect x="30" y="60" width="210" height="145" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="135" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">CAD-системы</text>

  <rect x="42" y="88" width="92" height="28" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="88" y="102" text-anchor="middle" fill="#1565C0" font-size="9" font-weight="600">FreeCAD</text>
  <text x="88" y="112" text-anchor="middle" fill="#546E7A" font-size="7">Open Source</text>

  <rect x="142" y="88" width="86" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="185" y="102" text-anchor="middle" fill="#E65100" font-size="9" font-weight="600">Tinkercad</text>
  <text x="185" y="112" text-anchor="middle" fill="#546E7A" font-size="7">Web-браузер</text>

  <rect x="42" y="124" width="92" height="28" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="88" y="138" text-anchor="middle" fill="#00897B" font-size="9" font-weight="600">Fusion 360</text>
  <text x="88" y="148" text-anchor="middle" fill="#546E7A" font-size="7">Облачный CAD</text>

  <rect x="142" y="124" width="86" height="28" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="185" y="138" text-anchor="middle" fill="#546E7A" font-size="9" font-weight="600">SolidWorks</text>
  <text x="185" y="148" text-anchor="middle" fill="#546E7A" font-size="7">Профессионал</text>

  <!-- Modeling types -->
  <rect x="42" y="160" width="186" height="30" rx="4" fill="#37474F" opacity="0.1" stroke="#37474F" stroke-width="1"/>
  <text x="135" y="175" text-anchor="middle" fill="#37474F" font-size="8" font-weight="500">Параметрическое моделирование</text>
  <text x="135" y="185" text-anchor="middle" fill="#546E7A" font-size="7">Размер → Форма → Изменение</text>

  <!-- Right: CAD workflow -->
  <rect x="260" y="60" width="210" height="145" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="365" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Рабочий процесс CAD</text>

  <!-- Step boxes -->
  <rect x="275" y="90" width="180" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="285" y="105" fill="#1565C0" font-size="9" font-weight="600">1.</text>
  <text x="300" y="105" fill="#1565C0" font-size="8">Эскиз (2D-контур)</text>

  <line x1="365" y1="112" x2="365" y2="118" stroke="#546E7A" stroke-width="1"/>
  <polygon points="365,122 361,116 369,116" fill="#546E7A"/>

  <rect x="275" y="122" width="180" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="285" y="137" fill="#E65100" font-size="9" font-weight="600">2.</text>
  <text x="300" y="137" fill="#E65100" font-size="8">Выдавливание / Вращение</text>

  <line x1="365" y1="144" x2="365" y2="150" stroke="#546E7A" stroke-width="1"/>
  <polygon points="365,154 361,148 369,148" fill="#546E7A"/>

  <rect x="275" y="154" width="180" height="22" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="285" y="169" fill="#00897B" font-size="9" font-weight="600">3.</text>
  <text x="300" y="169" fill="#00897B" font-size="8">Операции (фаски, скругления)</text>

  <line x1="365" y1="176" x2="365" y2="182" stroke="#546E7A" stroke-width="1"/>
  <polygon points="365,186 361,180 369,180" fill="#546E7A"/>

  <rect x="275" y="186" width="180" height="12" rx="3" fill="#37474F"/>
  <text x="365" y="195" text-anchor="middle" fill="#FFFFFF" font-size="7">4. Экспорт STL / OBJ</text>

  <!-- Bottom: File formats -->
  <rect x="30" y="217" width="440" height="95" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="236" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Форматы файлов 3D-моделей</text>

  <rect x="45" y="248" width="80" height="50" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="85" y="266" text-anchor="middle" fill="#1565C0" font-size="10" font-weight="700">.STL</text>
  <text x="85" y="280" text-anchor="middle" fill="#546E7A" font-size="7">Треугольная</text>
  <text x="85" y="290" text-anchor="middle" fill="#546E7A" font-size="7">сетка</text>

  <rect x="140" y="248" width="80" height="50" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="180" y="266" text-anchor="middle" fill="#E65100" font-size="10" font-weight="700">.OBJ</text>
  <text x="180" y="280" text-anchor="middle" fill="#546E7A" font-size="7">Вершины +</text>
  <text x="180" y="290" text-anchor="middle" fill="#546E7A" font-size="7">текстуры</text>

  <rect x="235" y="248" width="80" height="50" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="275" y="266" text-anchor="middle" fill="#00897B" font-size="10" font-weight="700">.STEP</text>
  <text x="275" y="280" text-anchor="middle" fill="#546E7A" font-size="7">Точные</text>
  <text x="275" y="290" text-anchor="middle" fill="#546E7A" font-size="7">поверхности</text>

  <rect x="330" y="248" width="80" height="50" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="370" y="266" text-anchor="middle" fill="#546E7A" font-size="10" font-weight="700">.3MF</text>
  <text x="370" y="280" text-anchor="middle" fill="#546E7A" font-size="7">Современный</text>
  <text x="370" y="290" text-anchor="middle" fill="#546E7A" font-size="7">формат</text>

  <text x="250" y="308" text-anchor="middle" fill="#546E7A" font-size="8">STL — стандарт для 3D-печати · STEP — для обмена между CAD</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
</svg>