  <text x="207" y="130" text-anchor="middle" fill="#E65100" font-size="8">тестирование</text>

  <rect x="268" y="88" width="105" height="48" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="320" y="104" text-anchor="middle" fill="#00897B" font-size="9" font-weight="600">Документация</text>
