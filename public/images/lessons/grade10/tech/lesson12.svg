  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Итоговый проект</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 12</text>

  <!-- Top: Project requirements -->
  <rect x="30" y="60" width="440" height="85" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Требования к итоговому проекту</text>

  <!-- Requirement columns -->
  <rect x="42" y="88" width="105" height="48" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
