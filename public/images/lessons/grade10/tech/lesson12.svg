  <line x1="60" y1="280" x2="440" y2="280" stroke="#546E7A" stroke-width="2"/>
  <polygon points="440,280 434,276 434,284" fill="#546E7A"/>

  <!-- Milestones -->
  <circle cx="100" cy="280" r="7" fill="#1565C0" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="100" y="283" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="700">1</text>
  <text x="100" y="298" text-anchor="middle" fill="#1565C0" font-size="7">Идея</text>

  <circle cx="170" cy="280" r="7" fill="#E65100" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="170" y="283" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="700">2</text>
  <text x="170" y="298" text-anchor="middle" fill="#E65100" font-size="7">Проект</text>

  <circle cx="240" cy="280" r="7" fill="#00897B" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="240" y="283" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="700">3</text>
  <text x="240" y="298" text-anchor="middle" fill="#00897B" font-size="7">Модель</text>

  <circle cx="310" cy="280" r="7" fill="#78909C" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="310" y="283" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="700">4</text>
  <text x="310" y="298" text-anchor="middle" fill="#546E7A" font-size="7">Печать</text>

  <circle cx="370" cy="280" r="7" fill="#37474F" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="370" y="283" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="700">5</text>
  <text x="370" y="298" text-anchor="middle" fill="#37474F" font-size="7">Сборка</text>

  <circle cx="425" cy="280" r="7" fill="#00897B" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="425" y="283" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="700">6</text>
  <text x="425" y="298" text-anchor="middle" fill="#00897B" font-size="7">Защита</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
