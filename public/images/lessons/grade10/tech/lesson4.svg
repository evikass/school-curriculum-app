<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#ECEFF1" stroke="#37474F" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="1" y="1" width="498" height="48" rx="12" ry="12" fill="#37474F"/>
  <rect x="1" y="25" width="498" height="24" fill="#37474F"/>
  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Проект «Умный дом»</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 4</text>

  <!-- House outline -->
  <rect x="30" y="60" width="220" height="145" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="140" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Архитектура умного дома</text>

  <!-- House shape -->
  <polygon points="140,88 70,130 210,130" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5"/>
  <rect x="85" y="130" width="110" height="60" fill="#ECEFF1" stroke="#00897B" stroke-width="1.5"/>

  <!-- Smart devices in house -->
  <rect x="95" y="138" width="40" height="18" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="115" y="150" text-anchor="middle" fill="#1565C0" font-size="6" font-weight="600">💡 Свет</text>

  <rect x="145" y="138" width="40" height="18" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="165" y="150" text-anchor="middle" fill="#E65100" font-size="6" font-weight="600">🌡 Терм</text>

  <rect x="95" y="164" width="40" height="18" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="115" y="176" text-anchor="middle" fill="#00897B" font-size="6" font-weight="600">🔒 Замок</text>

  <rect x="145" y="164" width="40" height="18" rx="3" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="165" y="176" text-anchor="middle" fill="#546E7A" font-size="6" font-weight="600">📹 Камера</text>

  <!-- Right: IoT Protocols -->
  <rect x="270" y="60" width="200" height="145" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="370" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">IoT протоколы</text>

  <rect x="280" y="88" width="85" height="28" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="322" y="102" text-anchor="middle" fill="#1565C0" font-size="9" font-weight="600">Wi-Fi</text>
  <text x="322" y="112" text-anchor="middle" fill="#546E7A" font-size="7">802.11 b/g/n</text>

  <rect x="375" y="88" width="85" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="417" y="102" text-anchor="middle" fill="#E65100" font-size="9" font-weight="600">ZigBee</text>
  <text x="417" y="112" text-anchor="middle" fill="#546E7A" font-size="7">Mesh-сеть</text>

  <rect x="280" y="124" width="85" height="28" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="322" y="138" text-anchor="middle" fill="#00897B" font-size="9" font-weight="600">Bluetooth</text>
  <text x="322" y="148" text-anchor="middle" fill="#546E7A" font-size="7">BLE 5.0</text>

  <rect x="375" y="124" width="85" height="28" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="417" y="138" text-anchor="middle" fill="#546E7A" font-size="9" font-weight="600">MQTT</text>
  <text x="417" y="148" text-anchor="middle" fill="#546E7A" font-size="7">Pub/Sub</text>

  <!-- Hub -->
  <rect x="300" y="162" width="140" height="24" rx="4" fill="#37474F"/>
  <text x="370" y="178" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="600">Центральный хаб</text>

  <!-- Bottom: Automation rules -->
  <rect x="30" y="217" width="440" height="95" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="236" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Пример автоматизации: ЕСЛИ — ТО</text>

  <!-- Rule 1 -->
  <rect x="45" y="248" width="130" height="50" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="110" y="264" text-anchor="middle" fill="#1565C0" font-size="8" font-weight="600">ЕСЛИ</text>
  <text x="110" y="278" text-anchor="middle" fill="#546E7A" font-size="7">Температура &gt; 25°C</text>
  <text x="110" y="290" text-anchor="middle" fill="#546E7A" font-size="7">Датчик движения = ВКЛ</text>

  <text x="186" y="276" text-anchor="middle" fill="#00897B" font-size="14">→</text>

  <!-- Rule 2 -->
  <rect x="200" y="248" width="130" height="50" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="265" y="264" text-anchor="middle" fill="#E65100" font-size="8" font-weight="600">ТО</text>
  <text x="265" y="278" text-anchor="middle" fill="#546E7A" font-size="7">Включить кондиционер</text>
  <text x="265" y="290" text-anchor="middle" fill="#546E7A" font-size="7">Включить вентилятор</text>

  <!-- Security note -->
  <rect x="350" y="248" width="108" height="50" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="404" y="264" text-anchor="middle" fill="#00897B" font-size="8" font-weight="600">Безопасность</text>
  <text x="404" y="278" text-anchor="middle" fill="#546E7A" font-size="7">Шифрование TLS</text>
  <text x="404" y="290" text-anchor="middle" fill="#546E7A" font-size="7">Аутентификация</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
</svg>