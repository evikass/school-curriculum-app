<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#ECEFF1" stroke="#37474F" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="1" y="1" width="498" height="48" rx="12" ry="12" fill="#37474F"/>
  <rect x="1" y="25" width="498" height="24" fill="#37474F"/>
  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Программирование роботов</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 2</text>

  <!-- Left: Programming flow -->
  <rect x="30" y="60" width="210" height="145" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="135" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Алгоритм управления</text>

  <!-- Flowchart -->
  <rect x="85" y="86" width="100" height="20" rx="10" fill="#00897B" stroke="none"/>
  <text x="135" y="100" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="500">НАЧАЛО</text>

  <line x1="135" y1="106" x2="135" y2="114" stroke="#546E7A" stroke-width="1"/>
  <polygon points="135,118 131,112 139,112" fill="#546E7A"/>

  <rect x="70" y="118" width="130" height="20" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="135" y="132" text-anchor="middle" fill="#1565C0" font-size="8" font-weight="500">Считать датчики</text>

  <line x1="135" y1="138" x2="135" y2="146" stroke="#546E7A" stroke-width="1"/>
  <polygon points="135,150 131,144 139,144" fill="#546E7A"/>

  <polygon points="135,152 185,165 135,178 85,165" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="135" y="168" text-anchor="middle" fill="#E65100" font-size="7" font-weight="600">Условие?</text>

  <line x1="85" y1="165" x2="55" y2="165" stroke="#E65100" stroke-width="1"/>
  <text x="70" y="160" fill="#E65100" font-size="7">Да</text>
  <rect x="38" y="158" width="30" height="16" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="53" y="170" text-anchor="middle" fill="#00897B" font-size="7">Дейст.1</text>

  <line x1="185" y1="165" x2="215" y2="165" stroke="#E65100" stroke-width="1"/>
  <text x="200" y="160" fill="#E65100" font-size="7">Нет</text>
  <rect x="198" y="158" width="30" height="16" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="213" y="170" text-anchor="middle" fill="#00897B" font-size="7">Дейст.2</text>

  <!-- Right: Languages -->
  <rect x="260" y="60" width="210" height="145" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="365" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Языки программирования</text>

  <rect x="270" y="88" width="95" height="32" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="317" y="102" text-anchor="middle" fill="#1565C0" font-size="9" font-weight="600">C / C++</text>
  <text x="317" y="114" text-anchor="middle" fill="#546E7A" font-size="7">Arduino, ROS</text>

  <rect x="375" y="88" width="85" height="32" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="417" y="102" text-anchor="middle" fill="#E65100" font-size="9" font-weight="600">Python</text>
  <text x="417" y="114" text-anchor="middle" fill="#546E7A" font-size="7">Raspberry Pi</text>

  <rect x="270" y="128" width="95" height="32" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="317" y="142" text-anchor="middle" fill="#00897B" font-size="9" font-weight="600">Scratch</text>
  <text x="317" y="154" text-anchor="middle" fill="#546E7A" font-size="7">Визуальное прогр.</text>

  <rect x="375" y="128" width="85" height="32" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="417" y="142" text-anchor="middle" fill="#546E7A" font-size="9" font-weight="600">ROS2</text>
  <text x="417" y="154" text-anchor="middle" fill="#546E7A" font-size="7">Фреймворк</text>

  <!-- Bottom: PID Control -->
  <rect x="30" y="217" width="440" height="95" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="236" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">ПИД-регулятор (PID Controller)</text>

  <!-- PID diagram -->
  <rect x="50" y="250" width="60" height="24" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="80" y="266" text-anchor="middle" fill="#1565C0" font-size="9" font-weight="500">Цель</text>

  <text x="122" y="266" text-anchor="middle" fill="#E65100" font-size="12">→</text>

  <rect x="135" y="250" width="60" height="24" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="165" y="266" text-anchor="middle" fill="#E65100" font-size="9" font-weight="500">Ошибка</text>

  <text x="207" y="266" text-anchor="middle" fill="#00897B" font-size="12">→</text>

  <rect x="220" y="245" width="110" height="34" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5"/>
  <text x="275" y="259" text-anchor="middle" fill="#00897B" font-size="8" font-weight="600">ПИД-регулятор</text>
  <text x="275" y="273" text-anchor="middle" fill="#546E7A" font-size="7">P + I + D</text>

  <text x="342" y="266" text-anchor="middle" fill="#00897B" font-size="12">→</text>

  <rect x="355" y="250" width="60" height="24" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="385" y="266" text-anchor="middle" fill="#1565C0" font-size="9" font-weight="500">Робот</text>

  <text x="250" y="300" text-anchor="middle" fill="#546E7A" font-size="8">P — пропорциональный · I — интегральный · D — дифференциальный</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
</svg>