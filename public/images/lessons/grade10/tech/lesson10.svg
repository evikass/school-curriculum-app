<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#ECEFF1" stroke="#37474F" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="1" y="1" width="498" height="48" rx="12" ry="12" fill="#37474F"/>
  <rect x="1" y="25" width="498" height="24" fill="#37474F"/>
  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Командная работа</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 10</text>

  <!-- Top: Team roles -->
  <rect x="30" y="60" width="440" height="90" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Роли в команде проекта</text>

  <!-- Central hub -->
  <circle cx="250" cy="118" r="18" fill="#00897B" stroke="#FFFFFF" stroke-width="2"/>
  <text x="250" y="122" text-anchor="middle" fill="#FFFFFF" font-size="7" font-weight="700">ЦЕЛЬ</text>

  <!-- Role nodes around -->
  <circle cx="140" cy="100" r="16" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="140" y="103" text-anchor="middle" fill="#1565C0" font-size="6" font-weight="600">Руковод.</text>
  <line x1="156" y1="108" x2="232" y2="115" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="360" cy="100" r="16" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="360" y="103" text-anchor="middle" fill="#E65100" font-size="6" font-weight="600">Дизайнер</text>
  <line x1="344" y1="108" x2="268" y2="115" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="120" cy="132" r="16" fill="#E0F2F1" stroke="#00897B" stroke-width="1.5"/>
  <text x="120" y="135" text-anchor="middle" fill="#00897B" font-size="6" font-weight="600">Инженер</text>
  <line x1="136" y1="126" x2="232" y2="120" stroke="#00897B" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="380" cy="132" r="16" fill="#ECEFF1" stroke="#546E7A" stroke-width="1.5"/>
  <text x="380" y="135" text-anchor="middle" fill="#546E7A" font-size="6" font-weight="600">Программ.</text>
  <line x1="364" y1="126" x2="268" y2="120" stroke="#546E7A" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="180" cy="142" r="16" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="180" y="145" text-anchor="middle" fill="#1565C0" font-size="6" font-weight="600">Тестиров.</text>
  <line x1="196" y1="136" x2="234" y2="126" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>

  <circle cx="320" cy="142" r="16" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="320" y="145" text-anchor="middle" fill="#E65100" font-size="6" font-weight="600">Докумен.</text>
  <line x1="304" y1="136" x2="266" y2="126" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Left: Communication -->
  <rect x="30" y="162" width="210" height="80" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="135" y="180" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Коммуникация</text>

  <text x="42" y="198" fill="#00897B" font-size="8">▸</text>
  <text x="54" y="198" fill="#546E7A" font-size="8">Ежедневные стендапы (Daily)</text>

  <text x="42" y="212" fill="#00897B" font-size="8">▸</text>
  <text x="54" y="212" fill="#546E7A" font-size="8">Канбан-доска задач</text>

  <text x="42" y="226" fill="#00897B" font-size="8">▸</text>
  <text x="54" y="226" fill="#546E7A" font-size="8">Общие документы (Wiki)</text>

  <text x="42" y="240" fill="#00897B" font-size="8">▸</text>
  <text x="54" y="240" fill="#546E7A" font-size="8">Ретроспектива спринта</text>

  <!-- Right: Conflict resolution -->
  <rect x="260" y="162" width="210" height="80" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="365" y="180" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Разрешение конфликтов</text>

  <rect x="275" y="190" width="90" height="20" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="320" y="204" text-anchor="middle" fill="#1565C0" font-size="8" font-weight="500">Слушать</text>

  <rect x="375" y="190" width="80" height="20" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="415" y="204" text-anchor="middle" fill="#E65100" font-size="8" font-weight="500">Понимать</text>

  <rect x="275" y="218" width="90" height="20" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="320" y="232" text-anchor="middle" fill="#00897B" font-size="8" font-weight="500">Обсуждать</text>

  <rect x="375" y="218" width="80" height="20" rx="4" fill="#37474F" opacity="0.12" stroke="#37474F" stroke-width="1"/>
  <text x="415" y="232" text-anchor="middle" fill="#37474F" font-size="8" font-weight="500">Решать</text>

  <!-- Bottom: Rules -->
  <rect x="30" y="254" width="440" height="58" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="272" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Правила эффективной команды</text>

  <rect x="42" y="280" width="130" height="24" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="107" y="296" text-anchor="middle" fill="#00897B" font-size="8">Ответственность</text>

  <rect x="182" y="280" width="130" height="24" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="247" y="296" text-anchor="middle" fill="#1565C0" font-size="8">Взаимопомощь</text>

  <rect x="322" y="280" width="138" height="24" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="391" y="296" text-anchor="middle" fill="#E65100" font-size="8">Конструктивная критика</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
</svg>