<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#ECEFF1" stroke="#37474F" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="1" y="1" width="498" height="48" rx="12" ry="12" fill="#37474F"/>
  <rect x="1" y="25" width="498" height="24" fill="#37474F"/>
  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Продвинутая робототехника</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 1</text>

  <!-- Robot body illustration -->
  <rect x="30" y="60" width="200" height="120" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="130" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Компоненты робота</text>

  <!-- Sensor box -->
  <rect x="40" y="88" width="85" height="36" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="82" y="103" text-anchor="middle" fill="#1565C0" font-size="9" font-weight="600">Датчики</text>
  <text x="82" y="118" text-anchor="middle" fill="#546E7A" font-size="7">УЗ, ИК, LiDAR</text>

  <!-- Actuator box -->
  <rect x="135" y="88" width="85" height="36" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="177" y="103" text-anchor="middle" fill="#E65100" font-size="9" font-weight="600">Приводы</text>
  <text x="177" y="118" text-anchor="middle" fill="#546E7A" font-size="7">Серво, шаговые</text>

  <!-- Controller box -->
  <rect x="40" y="132" width="180" height="36" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="130" y="147" text-anchor="middle" fill="#00897B" font-size="9" font-weight="600">Контроллер (Arduino / Raspberry Pi)</text>
  <text x="130" y="162" text-anchor="middle" fill="#546E7A" font-size="7">Обработка данных и управление</text>

  <!-- Connecting lines -->
  <line x1="82" y1="124" x2="82" y2="132" stroke="#546E7A" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="177" y1="124" x2="177" y2="132" stroke="#546E7A" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Right side: Robot types -->
  <rect x="250" y="60" width="220" height="120" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="360" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Типы роботов</text>

  <rect x="260" y="88" width="100" height="28" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="310" y="106" text-anchor="middle" fill="#1565C0" font-size="9" font-weight="500">Манипуляторы</text>

  <rect x="370" y="88" width="90" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="415" y="106" text-anchor="middle" fill="#E65100" font-size="9" font-weight="500">Колёсные</text>

  <rect x="260" y="124" width="100" height="28" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="310" y="142" text-anchor="middle" fill="#00897B" font-size="9" font-weight="500">Гуманоидные</text>

  <rect x="370" y="124" width="90" height="28" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="415" y="142" text-anchor="middle" fill="#546E7A" font-size="9" font-weight="500">Дроны</text>

  <!-- Bottom: Kinematics -->
  <rect x="30" y="192" width="440" height="120" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="212" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Кинематика роботов: степени свободы (DOF)</text>

  <!-- DOF diagram -->
  <line x1="60" y1="245" x2="440" y2="245" stroke="#546E7A" stroke-width="1.5"/>
  <polygon points="440,245 434,241 434,249" fill="#546E7A"/>

  <!-- DOF markers -->
  <circle cx="100" cy="245" r="8" fill="#00897B" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="100" y="248" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">1</text>
  <text x="100" y="268" text-anchor="middle" fill="#37474F" font-size="8">Поступ.</text>

  <circle cx="190" cy="245" r="8" fill="#00897B" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="190" y="248" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">2</text>
  <text x="190" y="268" text-anchor="middle" fill="#37474F" font-size="8">Вращ.</text>

  <circle cx="280" cy="245" r="8" fill="#00897B" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="280" y="248" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">3</text>
  <text x="280" y="268" text-anchor="middle" fill="#37474F" font-size="8">Наклон</text>

  <circle cx="370" cy="245" r="8" fill="#26A69A" stroke="#FFFFFF" stroke-width="1.5"/>
  <text x="370" y="248" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="700">6</text>
  <text x="370" y="268" text-anchor="middle" fill="#37474F" font-size="8">Полная</text>

  <text x="250" y="295" text-anchor="middle" fill="#546E7A" font-size="8">6 DOF = полный контроль позиции и ориентации в 3D-пространстве</text>

  <!-- Joint illustration -->
  <rect x="60" y="224" width="50" height="12" rx="2" fill="#78909C" opacity="0.5"/>
  <rect x="150" y="224" width="50" height="12" rx="2" fill="#78909C" opacity="0.5"/>
  <rect x="240" y="224" width="50" height="12" rx="2" fill="#78909C" opacity="0.5"/>
  <rect x="330" y="224" width="50" height="12" rx="2" fill="#78909C" opacity="0.5"/>
  <text x="85" y="233" text-anchor="middle" fill="#FFFFFF" font-size="7">Звено 1</text>
  <text x="175" y="233" text-anchor="middle" fill="#FFFFFF" font-size="7">Звено 2</text>
  <text x="265" y="233" text-anchor="middle" fill="#FFFFFF" font-size="7">Звено 3</text>
  <text x="355" y="233" text-anchor="middle" fill="#FFFFFF" font-size="7">Звено N</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
</svg>