<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Inter', 'Segoe UI', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#ECEFF1" stroke="#37474F" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="1" y="1" width="498" height="48" rx="12" ry="12" fill="#37474F"/>
  <rect x="1" y="25" width="498" height="24" fill="#37474F"/>
  <text x="250" y="20" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">Управление проектами</text>
  <text x="250" y="40" text-anchor="middle" fill="#B0BEC5" font-size="10" font-weight="400">Технология — Урок 9</text>

  <!-- Top: Project lifecycle -->
  <rect x="30" y="60" width="440" height="65" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="78" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Жизненный цикл проекта</text>

  <rect x="42" y="88" width="75" height="28" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="79" y="106" text-anchor="middle" fill="#1565C0" font-size="8" font-weight="600">Инициация</text>

  <text x="124" y="106" fill="#546E7A" font-size="10">→</text>

  <rect x="134" y="88" width="75" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="171" y="106" text-anchor="middle" fill="#E65100" font-size="8" font-weight="600">Планирование</text>

  <text x="216" y="106" fill="#546E7A" font-size="10">→</text>

  <rect x="226" y="88" width="75" height="28" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="263" y="106" text-anchor="middle" fill="#00897B" font-size="8" font-weight="600">Реализация</text>

  <text x="308" y="106" fill="#546E7A" font-size="10">→</text>

  <rect x="318" y="88" width="70" height="28" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="1"/>
  <text x="353" y="106" text-anchor="middle" fill="#546E7A" font-size="8" font-weight="600">Мониторинг</text>

  <text x="396" y="106" fill="#546E7A" font-size="10">→</text>

  <rect x="406" y="88" width="52" height="28" rx="4" fill="#37474F"/>
  <text x="432" y="106" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="600">Закрытие</text>

  <!-- Left: Gantt chart -->
  <rect x="30" y="137" width="220" height="105" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="140" y="155" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Диаграмма Ганта</text>

  <!-- Gantt rows -->
  <text x="42" y="172" fill="#546E7A" font-size="7">Проектирование</text>
  <rect x="120" y="163" width="60" height="12" rx="3" fill="#1565C0" opacity="0.7"/>
  <text x="150" y="172" text-anchor="middle" fill="#FFFFFF" font-size="6">Нед 1-2</text>

  <text x="42" y="188" fill="#546E7A" font-size="7">Моделирование</text>
  <rect x="155" y="179" width="55" height="12" rx="3" fill="#E65100" opacity="0.7"/>
  <text x="182" y="188" text-anchor="middle" fill="#FFFFFF" font-size="6">Нед 2-3</text>

  <text x="42" y="204" fill="#546E7A" font-size="7">Печать</text>
  <rect x="180" y="195" width="40" height="12" rx="3" fill="#00897B" opacity="0.7"/>
  <text x="200" y="204" text-anchor="middle" fill="#FFFFFF" font-size="6">Нед 3</text>

  <text x="42" y="220" fill="#546E7A" font-size="7">Сборка</text>
  <rect x="195" y="211" width="45" height="12" rx="3" fill="#78909C" opacity="0.7"/>
  <text x="217" y="220" text-anchor="middle" fill="#FFFFFF" font-size="6">Нед 4</text>

  <text x="42" y="236" fill="#546E7A" font-size="7">Тестирование</text>
  <rect x="215" y="227" width="30" height="12" rx="3" fill="#37474F" opacity="0.7"/>
  <text x="230" y="236" text-anchor="middle" fill="#FFFFFF" font-size="6">Нед 5</text>

  <!-- Right: Key concepts -->
  <rect x="270" y="137" width="200" height="105" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="370" y="155" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Ключевые понятия</text>

  <text x="282" y="172" fill="#1565C0" font-size="8" font-weight="600">WBS</text>
  <text x="315" y="172" fill="#546E7A" font-size="8">— иерархия работ</text>

  <text x="282" y="188" fill="#E65100" font-size="8" font-weight="600">Крит. путь</text>
  <text x="340" y="188" fill="#546E7A" font-size="8">— самая длинная цепь</text>

  <text x="282" y="204" fill="#00897B" font-size="8" font-weight="600">Milestone</text>
  <text x="340" y="204" fill="#546E7A" font-size="8">— контрольная точка</text>

  <text x="282" y="220" fill="#37474F" font-size="8" font-weight="600">Риски</text>
  <text x="315" y="220" fill="#546E7A" font-size="8">— вероятности и влияние</text>

  <text x="282" y="236" fill="#78909C" font-size="8" font-weight="600">Ресурсы</text>
  <text x="328" y="236" fill="#546E7A" font-size="8">— время, бюджет, люди</text>

  <!-- Bottom: Agile vs Waterfall -->
  <rect x="30" y="254" width="440" height="58" rx="6" fill="#FFFFFF" stroke="#546E7A" stroke-width="1.5"/>
  <text x="250" y="272" text-anchor="middle" fill="#37474F" font-size="11" font-weight="600">Методологии: Agile ↔ Waterfall</text>

  <rect x="45" y="280" width="195" height="24" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="1"/>
  <text x="142" y="296" text-anchor="middle" fill="#00897B" font-size="8" font-weight="500">Agile: итерации, гибкость, Scrum</text>

  <rect x="260" y="280" width="195" height="24" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="357" y="296" text-anchor="middle" fill="#1565C0" font-size="8" font-weight="500">Waterfall: каскад, фазы, план</text>

  <!-- Footer -->
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F"/>
  <rect x="1" y="322" width="498" height="27" rx="0" ry="0" fill="#37474F" opacity="0.9"/>
  <text x="250" y="340" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="500">Технология · 10 класс</text>
</svg>