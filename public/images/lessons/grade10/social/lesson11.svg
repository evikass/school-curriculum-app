<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#00695C" text-anchor="middle">Семья как социальный институт</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Обществознание — Урок 11</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#00695C" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#00695C" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="middle" font-weight="bold">Семья — малая группа, основанная на браке или кровном родстве</text>
  <rect x="20" y="120" width="225" height="80" rx="5" fill="#00695C" opacity="0.08"/>
  <text x="132" y="138" font-family="Arial,sans-serif" font-size="12" fill="#00695C" text-anchor="middle" font-weight="bold">Типы семей</text>
  <text x="35" y="158" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Нуклеарная (родители + дети)</text>
  <text x="35" y="174" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Расширенная (несколько поколений)</text>
  <text x="35" y="190" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Полная / Неполная</text>
  <rect x="255" y="120" width="225" height="80" rx="5" fill="#00695C" opacity="0.08"/>
  <text x="367" y="138" font-family="Arial,sans-serif" font-size="12" fill="#00695C" text-anchor="middle" font-weight="bold">Функции семьи</text>
  <text x="270" y="158" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Репродуктивная</text>
  <text x="270" y="174" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Воспитательная / Социализация</text>
  <text x="270" y="190" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Эмоциональная / Хозяйственная</text>
  <rect x="20" y="208" width="460" height="65" rx="5" fill="#00695C" opacity="0.08"/>
  <text x="30" y="226" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="start" font-weight="bold">Современные тенденции:</text>
  <text x="30" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Уменьшение размера семьи (нуклеаризация)</text>
  <text x="30" y="258" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Рост числа разводов и неполных семей</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#00695C" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#00695C" text-anchor="middle" font-style="italic">Обществознание · 10 класс</text>
</svg>