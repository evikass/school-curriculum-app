    <text x="270" y="100" font-family="Arial,sans-serif" font-size="10" fill="#444">delta(V) = 0, поэтому A = 0</text>
    <text x="270" y="116" font-family="Arial,sans-serif" font-size="10" fill="#444">Интегрирование при p = nu*R*T/V</text>
    <rect x="25" y="188" width="445" height="90" rx="5" fill="white" opacity="0.8" stroke="#880E4F" stroke-width="1"/>
    <text x="250" y="205" font-family="Arial,sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">Работа в термодинамике</text>
