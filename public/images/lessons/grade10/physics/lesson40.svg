    <text x="35" y="237" font-family="Arial,sans-serif" font-size="10" fill="#444">Работа внешних сил над газом:</text>
    <text x="35" y="252" font-family="Arial,sans-serif" font-size="10" fill="#444">Как определить работу по графику p(V)?</text>
    <text x="35" y="267" font-family="Arial,sans-serif" font-size="10" fill="#444">Работа при изохорном процессе:</text>
