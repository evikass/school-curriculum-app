  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#880E4F" stroke-width="2.5"/>
  <text x="250" y="30" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#880E4F" text-anchor="middle">Работа в термодинамике</text>
  <text x="250" y="46" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Физика 10 класс — Урок 40</text>
  <line x1="30" y1="54" x2="470" y2="54" stroke="#880E4F" stroke-width="1.5" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="58" width="470" height="232" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="58" width="470" height="232" fill="#FCE4EC" opacity="0.5"/>
    <rect x="25" y="68" width="220" height="110" rx="5" fill="white" opacity="0.8" stroke="#880E4F" stroke-width="1"/>
    <text x="135" y="84" font-family="Arial,sans-serif" font-size="11" fill="#880E4F" font-weight="bold" text-anchor="middle">Основные формулы</text>
