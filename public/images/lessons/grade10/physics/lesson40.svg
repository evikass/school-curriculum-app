    <text x="35" y="116" font-family="Arial,sans-serif" font-size="10" fill="#444">Знаки противоположны</text>
    <text x="35" y="132" font-family="Arial,sans-serif" font-size="10" fill="#444">Геометрический смысл работы</text>
    <rect x="260" y="68" width="210" height="110" rx="5" fill="white" opacity="0.8" stroke="#880E4F" stroke-width="1"/>
