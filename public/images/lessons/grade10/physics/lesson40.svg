  <rect x="12" y="296" width="476" height="42" rx="5" fill="url(#panel)"/>
  <text x="250" y="314" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Термодинамика</text>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" opacity="0.8">Урок 40</text>
