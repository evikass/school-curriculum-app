<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="3" rx="10"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="8"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">Основы МКТ</text>
  <text x="250" y="20" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#7f8c8d">ФИЗИКА · 10 КЛАСС</text>
  <text x="470" y="25" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#95a5a6">урок 12</text>
  
  <!-- Основные положения МКТ -->
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Основные положения МКТ</text>
  
  <!-- Положение 1 -->
  <circle cx="60" cy="90" r="25" fill="#3498db" opacity="0.7"/>
  <circle cx="50" cy="85" r="5" fill="#2980b9"/>
  <circle cx="65" cy="88" r="4" fill="#2980b9"/>
  <circle cx="55" cy="95" r="3" fill="#2980b9"/>
  <circle cx="70" cy="92" r="4" fill="#2980b9"/>
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">1. Все вещества</text>
  <text x="60" y="135" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">состоят из частиц</text>
  
  <!-- Положение 2 -->
  <circle cx="180" cy="90" r="25" fill="#e74c3c" opacity="0.7"/>
  <path d="M170 85 Q175 80, 180 85 T190 85" fill="none" stroke="#c0392b" stroke-width="2"/>
  <path d="M175 95 Q180 90, 185 95 T195 95" fill="none" stroke="#c0392b" stroke-width="2"/>
  <path d="M172 90 Q177 85, 182 90 T192 90" fill="none" stroke="#c0392b" stroke-width="2"/>
  <text x="180" y="120" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">2. Частицы</text>
  <text x="180" y="135" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">непрерывно движутся</text>
  
  <!-- Положение 3 -->
  <circle cx="300" cy="90" r="25" fill="#2ecc71" opacity="0.7"/>
  <line x1="290" y1="85" x2="310" y2="95" stroke="#27ae60" stroke-width="3"/>
  <line x1="310" y1="85" x2="290" y2="95" stroke="#27ae60" stroke-width="3"/>
  <circle cx="295" cy="90" r="3" fill="#27ae60"/>
  <circle cx="305" cy="90" r="3" fill="#27ae60"/>
  <text x="300" y="120" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">3. Частицы</text>
  <text x="300" y="135" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">взаимодействуют</text>
  
  <!-- Броуновское движение -->
  <text x="150" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Броуновское движение</text>
  
  <!-- Контейнер с жидкостью -->
  <rect x="50" y="175" width="200" height="120" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2" rx="5"/>
  <rect x="50" y="175" width="200" height="120" fill="url(#liquidGradient)" opacity="0.5"/>
  
  <!-- Молекулы жидкости -->
  <circle cx="70" cy="190" r="2" fill="#3498db"/>
  <circle cx="90" cy="200" r="2" fill="#3498db"/>
  <circle cx="110" cy="195" r="2" fill="#3498db"/>
  <circle cx="130" cy="205" r="2" fill="#3498db"/>
  <circle cx="150" cy="190" r="2" fill="#3498db"/>
  <circle cx="170" cy="210" r="2" fill="#3498db"/>
  <circle cx="190" cy="200" r="2" fill="#3498db"/>
  <circle cx="210" cy="195" r="2" fill="#3498db"/>
  <circle cx="75" cy="220" r="2" fill="#3498db"/>
  <circle cx="95" cy="230" r="2" fill="#3498db"/>
  <circle cx="115" cy="225" r="2" fill="#3498db"/>
  <circle cx="135" cy="235" r="2" fill="#3498db"/>
  <circle cx="155" cy="220" r="2" fill="#3498db"/>
  <circle cx="175" cy="240" r="2" fill="#3498db"/>
  <circle cx="195" cy="230" r="2" fill="#3498db"/>
  <circle cx="215" cy="225" r="2" fill="#3498db"/>
  
  <!-- Броуновская частица -->
  <circle cx="150" cy="210" r="8" fill="#e74c3c">
    <animate attributeName="cx" values="140;160;150;140" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="210;200;220;210" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Траектория движения -->
  <path d="M150 210 Q160 200 150 220 Q140 200 150 210" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.5" stroke-dasharray="2,2"/>
  
  <!-- Диффузия -->
  <text x="350" y="165" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Диффузия</text>
  
  <!-- Контейнер с газами -->
  <rect x="300" y="175" width="150" height="120" fill="#ecf0f1" stroke="#95a5a6" stroke-width="2" rx="5"/>
  <rect x="300" y="175" width="150" height="60" fill="url(#gasGradient1)" opacity="0.5"/>
  <rect x="300" y="235" width="150" height="60" fill="url(#gasGradient2)" opacity="0.5"/>
  
  <!-- Молекулы газа 1 -->
  <circle cx="320" cy="195" r="3" fill="#3498db">
    <animate attributeName="cx" values="320;380;320" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="205" r="3" fill="#3498db">
    <animate attributeName="cx" values="340;400;340" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="195" r="3" fill="#3498db">
    <animate attributeName="cx" values="360;410;360" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="200" r="3" fill="#3498db">
    <animate attributeName="cx" values="380;430;380" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Молекулы газа 2 -->
  <circle cx="320" cy="265" r="3" fill="#2ecc71">
    <animate attributeName="cx" values="320;270;320" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="255" r="3" fill="#2ecc71">
    <animate attributeName="cx" values="340;290;340" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="360" cy="265" r="3" fill="#2ecc71">
    <animate attributeName="cx" values="360;310;360" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="260" r="3" fill="#2ecc71">
    <animate attributeName="cx" values="380;330;380" dur="6s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Стрелка диффузии -->
  <path d="M375 240 L325 240" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Формула средней кинетической энергии -->
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">E<sub>к</sub> = (3/2)kT</text>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.5"/>
    </linearGradient>
    
    <linearGradient id="gasGradient1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:0.3"/>
    </linearGradient>
    
    <linearGradient id="gasGradient2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:0.5"/>
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>