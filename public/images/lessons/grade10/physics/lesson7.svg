<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Основы МКТ</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Container with molecules -->
    <rect x="40" y="120" width="160" height="130" rx="3" fill="none" stroke="#5C6BC0" stroke-width="2"/>
    <!-- Molecules (small circles in random positions) -->
    <circle cx="70" cy="150" r="5" fill="#E91E63" opacity="0.5"/>
    <circle cx="120" cy="140" r="5" fill="#4CAF50" opacity="0.5"/>
    <circle cx="160" cy="160" r="5" fill="#FF9800" opacity="0.5"/>
    <circle cx="90" cy="180" r="5" fill="#E91E63" opacity="0.5"/>
    <circle cx="140" cy="200" r="5" fill="#4CAF50" opacity="0.5"/>
    <circle cx="75" cy="220" r="5" fill="#FF9800" opacity="0.5"/>
    <circle cx="170" cy="190" r="5" fill="#E91E63" opacity="0.5"/>
    <circle cx="110" cy="230" r="5" fill="#4CAF50" opacity="0.5"/>
    <circle cx="55" cy="190" r="4" fill="#9C27B0" opacity="0.5"/>
    <circle cx="150" cy="230" r="4" fill="#9C27B0" opacity="0.5"/>
    <circle cx="180" cy="130" r="4" fill="#9C27B0" opacity="0.5"/>
    <circle cx="55" cy="135" r="4" fill="#FF9800" opacity="0.5"/>
    <!-- Velocity arrows on some molecules -->
    <line x1="76" y1="148" x2="95" y2="140" stroke="#E91E63" stroke-width="1"/>
    <polygon points="95,137 102,138 94,144" fill="#E91E63"/>
    <line x1="126" y1="138" x2="140" y2="148" stroke="#4CAF50" stroke-width="1"/>
    <polygon points="140,145 147,151 138,152" fill="#4CAF50"/>
    <line x1="85" y1="178" x2="70" y2="168" stroke="#FF9800" stroke-width="1"/>
    <polygon points="70,165 62,162 68,172" fill="#FF9800"/>
    <text x="120" y="262" font-family="Arial,sans-serif" font-size="9" fill="#1A237E" text-anchor="middle">Хаотическое движение молекул</text>
    <!-- Brownian motion path -->
    <path d="M250,160 L260,145 L255,155 L270,150 L265,165 L280,160 L275,175 L290,170" fill="none" stroke="#E91E63" stroke-width="1.5"/>
    <circle cx="290" cy="170" r="3" fill="#E91E63"/>
    <text x="270" y="188" font-family="Arial,sans-serif" font-size="9" fill="#E91E63" text-anchor="middle">Броуновская частица</text>
    <!-- MKT basics -->
    <rect x="230" y="90" width="255" height="65" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="240" y="108" font-family="Arial,sans-serif" font-size="12" fill="#1A237E" font-weight="bold">Основы МКТ:</text>
    <text x="240" y="126" font-family="Arial,sans-serif" font-size="11" fill="#444">1) Все тела из частиц (молекул, атомов)</text>
    <text x="240" y="142" font-family="Arial,sans-serif" font-size="11" fill="#444">2) Частицы непрерывно хаотично движутся</text>
    <text x="240" y="158" font-family="Arial,sans-serif" font-size="11" fill="#444">3) Частицы взаимодействуют (притяж/отталк)</text>
    <!-- Temperature and energy -->
    <rect x="230" y="195" width="255" height="105" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="240" y="213" font-family="Arial,sans-serif" font-size="12" fill="#1A237E" font-weight="bold">Температура:</text>
    <line x1="240" y1="218" x2="475" y2="218" stroke="#5C6BC0" stroke-width="0.5"/>
    <text x="240" y="236" font-family="Arial,sans-serif" font-size="11" fill="#444">E = 3/2 * k * T</text>
    <text x="240" y="254" font-family="Arial,sans-serif" font-size="11" fill="#444">k = 1.38*10^(-23) Дж/К</text>
    <text x="240" y="272" font-family="Arial,sans-serif" font-size="11" fill="#444">v_кв = sqrt(3kT/m0)</text>
    <text x="240" y="290" font-family="Arial,sans-serif" font-size="9" fill="#888">T - термодин. температура (Кельвин)</text>
    <text x="240" y="302" font-family="Arial,sans-serif" font-size="9" fill="#888">T(K) = t(C) + 273</text>
    <!-- Speed distribution curve (small) -->
    <path d="M250,290 Q270,270 290,260 Q310,252 330,258 Q350,270 370,285" fill="none" stroke="#5C6BC0" stroke-width="1.5" opacity="0.3"/>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>