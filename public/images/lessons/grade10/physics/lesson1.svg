<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Равномерное и равноускоренное движение</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- v-t graph -->
    <text x="115" y="98" font-family="Arial,sans-serif" font-size="11" fill="#1A237E" font-weight="bold">График v(t)</text>
    <rect x="30" y="100" width="180" height="100" rx="3" fill="white" opacity="0.5"/>
    <line x1="40" y1="195" x2="200" y2="195" stroke="#1A237E" stroke-width="1"/>
    <line x1="40" y1="195" x2="40" y2="105" stroke="#1A237E" stroke-width="1"/>
    <polygon points="200,192 208,195 200,198" fill="#1A237E"/>
    <polygon points="37,105 40,97 43,105" fill="#1A237E"/>
    <text x="205" y="199" font-family="Arial,sans-serif" font-size="9" fill="#1A237E">t</text>
    <text x="33" y="103" font-family="Arial,sans-serif" font-size="9" fill="#1A237E">v</text>
    <!-- Uniform motion line (horizontal) -->
    <line x1="40" y1="145" x2="180" y2="145" stroke="#4CAF50" stroke-width="2"/>
    <text x="155" y="140" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50">v=const</text>
    <!-- Accelerated motion line (sloped) -->
    <line x1="40" y1="195" x2="170" y2="120" stroke="#E91E63" stroke-width="2"/>
    <text x="130" y="115" font-family="Arial,sans-serif" font-size="8" fill="#E91E63">v=v0+at</text>
    <!-- Shaded area under v-t = displacement -->
    <polygon points="40,195 170,120 170,195" fill="#E91E63" opacity="0.1"/>
    <text x="100" y="185" font-family="Arial,sans-serif" font-size="8" fill="#E91E63">S</text>
    <!-- s-t graph -->
    <text x="330" y="98" font-family="Arial,sans-serif" font-size="11" fill="#1A237E" font-weight="bold">График s(t)</text>
    <rect x="240" y="100" width="180" height="100" rx="3" fill="white" opacity="0.5"/>
    <line x1="250" y1="195" x2="410" y2="195" stroke="#1A237E" stroke-width="1"/>
    <line x1="250" y1="195" x2="250" y2="105" stroke="#1A237E" stroke-width="1"/>
    <polygon points="410,192 418,195 410,198" fill="#1A237E"/>
    <polygon points="247,105 250,97 253,105" fill="#1A237E"/>
    <text x="415" y="199" font-family="Arial,sans-serif" font-size="9" fill="#1A237E">t</text>
    <text x="243" y="103" font-family="Arial,sans-serif" font-size="9" fill="#1A237E">s</text>
    <!-- Uniform s-t (linear) -->
    <line x1="250" y1="190" x2="390" y2="130" stroke="#4CAF50" stroke-width="2"/>
    <text x="380" y="125" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50">s=vt</text>
    <!-- Accelerated s-t (parabola) -->
    <path d="M250,190 Q310,185 340,165 Q370,140 395,110" fill="none" stroke="#E91E63" stroke-width="2"/>
    <text x="390" y="108" font-family="Arial,sans-serif" font-size="8" fill="#E91E63">s=v0t+at^2/2</text>
    <!-- Formulas box -->
    <rect x="25" y="208" width="220" height="88" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="35" y="225" font-family="Arial,sans-serif" font-size="11" fill="#1A237E" font-weight="bold">Равномерное:</text>
    <text x="35" y="242" font-family="Arial,sans-serif" font-size="11" fill="#4CAF50">v = const ;  s = v*t</text>
    <line x1="35" y1="248" x2="235" y2="248" stroke="#5C6BC0" stroke-width="0.5"/>
    <text x="35" y="265" font-family="Arial,sans-serif" font-size="11" fill="#1A237E" font-weight="bold">Равноускоренное:</text>
    <text x="35" y="282" font-family="Arial,sans-serif" font-size="11" fill="#E91E63">v = v0 + a*t</text>
    <text x="35" y="295" font-family="Arial,sans-serif" font-size="11" fill="#E91E63">s = v0*t + a*t^2/2</text>
    <!-- Additional formulas -->
    <rect x="260" y="208" width="220" height="88" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="270" y="225" font-family="Arial,sans-serif" font-size="11" fill="#1A237E" font-weight="bold">Полезные формулы:</text>
    <text x="270" y="245" font-family="Arial,sans-serif" font-size="11" fill="#444">s = (v0+v)/2 * t</text>
    <text x="270" y="262" font-family="Arial,sans-serif" font-size="11" fill="#444">v^2 - v0^2 = 2*a*s</text>
    <text x="270" y="279" font-family="Arial,sans-serif" font-size="11" fill="#444">s = v0*t - a*t^2/2</text>
    <text x="270" y="296" font-family="Arial,sans-serif" font-size="9" fill="#888">(равнозамедленное, a&lt;0)</text>
    <!-- Motion diagram -->
    <rect x="25" y="90" width="5" height="5" rx="2" fill="#5C6BC0"/>
    <line x1="30" y1="92" x2="15" y2="92" stroke="#888" stroke-width="0.5"/>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>