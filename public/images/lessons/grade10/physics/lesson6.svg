<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Закон сохранения энергии</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Height diagram -->
    <!-- Ground level -->
    <line x1="40" y1="280" x2="250" y2="280" stroke="#888" stroke-width="2"/>
    <!-- Hatching -->
    <line x1="50" y1="280" x2="45" y2="287" stroke="#888" stroke-width="0.8"/>
    <line x1="70" y1="280" x2="65" y2="287" stroke="#888" stroke-width="0.8"/>
    <line x1="90" y1="280" x2="85" y2="287" stroke="#888" stroke-width="0.8"/>
    <line x1="110" y1="280" x2="105" y2="287" stroke="#888" stroke-width="0.8"/>
    <line x1="130" y1="280" x2="125" y2="287" stroke="#888" stroke-width="0.8"/>
    <line x1="150" y1="280" x2="145" y2="287" stroke="#888" stroke-width="0.8"/>
    <line x1="170" y1="280" x2="165" y2="287" stroke="#888" stroke-width="0.8"/>
    <line x1="190" y1="280" x2="185" y2="287" stroke="#888" stroke-width="0.8"/>
    <line x1="210" y1="280" x2="205" y2="287" stroke="#888" stroke-width="0.8"/>
    <line x1="230" y1="280" x2="225" y2="287" stroke="#888" stroke-width="0.8"/>
    <!-- Ball at top (PE only) -->
    <circle cx="80" cy="135" r="12" fill="#E91E63" opacity="0.3" stroke="#E91E63" stroke-width="1.5"/>
    <text x="80" y="139" font-family="Arial,sans-serif" font-size="8" fill="#E91E63" text-anchor="middle">m</text>
    <line x1="80" y1="135" x2="80" y2="280" stroke="#E91E63" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="58" y="210" font-family="Arial,sans-serif" font-size="10" fill="#E91E63" font-weight="bold">H</text>
    <!-- PE label at top -->
    <text x="80" y="122" font-family="Arial,sans-serif" font-size="9" fill="#E91E63" text-anchor="middle">E = mgh</text>
    <!-- Ball at middle (PE + KE) -->
    <circle cx="160" cy="195" r="12" fill="#FF9800" opacity="0.3" stroke="#FF9800" stroke-width="1.5"/>
    <text x="160" y="199" font-family="Arial,sans-serif" font-size="8" fill="#FF9800" text-anchor="middle">m</text>
    <line x1="160" y1="195" x2="160" y2="280" stroke="#FF9800" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="140" y="240" font-family="Arial,sans-serif" font-size="9" fill="#FF9800">h/2</text>
    <!-- Velocity arrow at middle -->
    <line x1="174" y1="195" x2="210" y2="220" stroke="#4CAF50" stroke-width="2"/>
    <polygon points="210,217 218,224 207,224" fill="#4CAF50"/>
    <text x="210" y="215" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">v</text>
    <text x="160" y="182" font-family="Arial,sans-serif" font-size="8" fill="#FF9800" text-anchor="middle">E=mgh/2+mv^2/2</text>
    <!-- Ball at bottom (KE only) -->
    <circle cx="220" cy="268" r="12" fill="#4CAF50" opacity="0.3" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="220" y="272" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50" text-anchor="middle">m</text>
    <line x1="234" y1="268" x2="270" y2="240" stroke="#4CAF50" stroke-width="2.5"/>
    <polygon points="270,237 278,238 272,245" fill="#4CAF50"/>
    <text x="258" y="235" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">v!</text>
    <text x="220" y="258" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50" text-anchor="middle">E = mv^2/2</text>
    <!-- Energy bar chart -->
    <rect x="280" y="90" width="205" height="205" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="290" y="108" font-family="Arial,sans-serif" font-size="12" fill="#1A237E" font-weight="bold">Закон сохранения:</text>
    <line x1="290" y1="113" x2="475" y2="113" stroke="#5C6BC0" stroke-width="0.5"/>
    <rect x="290" y="118" width="185" height="25" rx="3" fill="#5C6BC0" opacity="0.1"/>
    <text x="382" y="136" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0" text-anchor="middle" font-weight="bold">Ek + Ep = const</text>
    <text x="290" y="155" font-family="Arial,sans-serif" font-size="11" fill="#444">Кинетическая: Ek = mv^2/2</text>
    <text x="290" y="172" font-family="Arial,sans-serif" font-size="11" fill="#444">Потенциальная: Ep = mgh</text>
    <line x1="290" y1="180" x2="475" y2="180" stroke="#5C6BC0" stroke-width="0.5"/>
    <text x="290" y="196" font-family="Arial,sans-serif" font-size="11" fill="#1A237E" font-weight="bold">Работа силы тяжести:</text>
    <text x="290" y="213" font-family="Arial,sans-serif" font-size="11" fill="#444">A = mg*(h1-h2) = -(Ep2-Ep1)</text>
    <line x1="290" y1="221" x2="475" y2="221" stroke="#5C6BC0" stroke-width="0.5"/>
    <text x="290" y="237" font-family="Arial,sans-serif" font-size="11" fill="#1A237E" font-weight="bold">Работа:</text>
    <text x="290" y="254" font-family="Arial,sans-serif" font-size="11" fill="#444">A = F*s*cos(alpha)</text>
    <text x="290" y="271" font-family="Arial,sans-serif" font-size="11" fill="#444">A = delta(Ek)</text>
    <text x="290" y="289" font-family="Arial,sans-serif" font-size="9" fill="#888">Если Aтр=0: полная энергия сохраняется</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>