<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Силы в механике</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Block on surface -->
    <rect x="100" y="190" width="50" height="35" rx="2" fill="#5C6BC0" opacity="0.2" stroke="#5C6BC0" stroke-width="1.5"/>
    <text x="125" y="212" font-family="Arial,sans-serif" font-size="9" fill="#5C6BC0" text-anchor="middle">m</text>
    <!-- Surface -->
    <line x1="60" y1="225" x2="190" y2="225" stroke="#888" stroke-width="2"/>
    <!-- Hatching for surface -->
    <line x1="70" y1="225" x2="65" y2="232" stroke="#888" stroke-width="0.8"/>
    <line x1="85" y1="225" x2="80" y2="232" stroke="#888" stroke-width="0.8"/>
    <line x1="100" y1="225" x2="95" y2="232" stroke="#888" stroke-width="0.8"/>
    <line x1="115" y1="225" x2="110" y2="232" stroke="#888" stroke-width="0.8"/>
    <line x1="130" y1="225" x2="125" y2="232" stroke="#888" stroke-width="0.8"/>
    <line x1="145" y1="225" x2="140" y2="232" stroke="#888" stroke-width="0.8"/>
    <line x1="160" y1="225" x2="155" y2="232" stroke="#888" stroke-width="0.8"/>
    <line x1="175" y1="225" x2="170" y2="232" stroke="#888" stroke-width="0.8"/>
    <!-- Gravity (down) -->
    <line x1="125" y1="225" x2="125" y2="275" stroke="#E91E63" stroke-width="2.5"/>
    <polygon points="122,275 125,283 128,275" fill="#E91E63"/>
    <text x="133" y="265" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">mg</text>
    <!-- Normal force (up) -->
    <line x1="125" y1="190" x2="125" y2="140" stroke="#4CAF50" stroke-width="2.5"/>
    <polygon points="122,140 125,132 128,140" fill="#4CAF50"/>
    <text x="133" y="148" font-family="Arial,sans-serif" font-size="11" fill="#4CAF50" font-weight="bold">N</text>
    <!-- Friction (left) -->
    <line x1="100" y1="220" x2="60" y2="220" stroke="#FF9800" stroke-width="2.5"/>
    <polygon points="60,217 52,220 60,223" fill="#FF9800"/>
    <text x="68" y="215" font-family="Arial,sans-serif" font-size="11" fill="#FF9800" font-weight="bold">Fтр</text>
    <!-- Applied force (right) -->
    <line x1="150" y1="207" x2="195" y2="207" stroke="#9C27B0" stroke-width="2.5"/>
    <polygon points="195,204 203,207 195,210" fill="#9C27B0"/>
    <text x="170" y="200" font-family="Arial,sans-serif" font-size="11" fill="#9C27B0" font-weight="bold">F</text>
    <!-- Formulas panel -->
    <rect x="230" y="90" width="255" height="210" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="240" y="108" font-family="Arial,sans-serif" font-size="12" fill="#1A237E" font-weight="bold">Силы в механике:</text>
    <line x1="240" y1="113" x2="475" y2="113" stroke="#5C6BC0" stroke-width="0.5"/>
    <!-- Gravity -->
    <rect x="240" y="118" width="4" height="18" rx="1" fill="#E91E63"/>
    <text x="252" y="132" font-family="Arial,sans-serif" font-size="11" fill="#E91E63" font-weight="bold">Сила тяжести:</text>
    <text x="252" y="147" font-family="Arial,sans-serif" font-size="11" fill="#444">F = m*g  (g = 9.8 м/с^2)</text>
    <line x1="240" y1="154" x2="475" y2="154" stroke="#eee" stroke-width="0.5"/>
    <!-- Normal -->
    <rect x="240" y="158" width="4" height="18" rx="1" fill="#4CAF50"/>
    <text x="252" y="172" font-family="Arial,sans-serif" font-size="11" fill="#4CAF50" font-weight="bold">Сила реакции опоры:</text>
    <text x="252" y="187" font-family="Arial,sans-serif" font-size="11" fill="#444">N = mg*cos(alpha)</text>
    <line x1="240" y1="194" x2="475" y2="194" stroke="#eee" stroke-width="0.5"/>
    <!-- Friction -->
    <rect x="240" y="198" width="4" height="18" rx="1" fill="#FF9800"/>
    <text x="252" y="212" font-family="Arial,sans-serif" font-size="11" fill="#FF9800" font-weight="bold">Сила трения:</text>
    <text x="252" y="227" font-family="Arial,sans-serif" font-size="11" fill="#444">Fтр = mu * N</text>
    <text x="252" y="242" font-family="Arial,sans-serif" font-size="10" fill="#888">mu - коэффициент трения</text>
    <line x1="240" y1="248" x2="475" y2="248" stroke="#eee" stroke-width="0.5"/>
    <!-- Tension -->
    <rect x="240" y="252" width="4" height="18" rx="1" fill="#9C27B0"/>
    <text x="252" y="266" font-family="Arial,sans-serif" font-size="11" fill="#9C27B0" font-weight="bold">Сила натяжения (нить):</text>
    <text x="252" y="281" font-family="Arial,sans-serif" font-size="11" fill="#444">T = m*(g+a)  (подъём)</text>
    <text x="252" y="296" font-family="Arial,sans-serif" font-size="11" fill="#444">T = m*(g-a)  (спуск)</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>