<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="500" height="32" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Бизнес-план</text>
  <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE082">Бизнес — Урок 3</text>

  <!-- Lesson number badge -->
  <circle cx="30" cy="26" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="30" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">3</text>

  <!-- Section: Структура бизнес-плана -->
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Структура бизнес-плана</text>
  <rect x="20" y="68" width="78" height="50" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="59" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Резюме</text>
  <polygon points="98,89 106,93 98,97" fill="#FF6F00" opacity="0.6"/>
  <rect x="110" y="68" width="78" height="50" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="149" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Описание</text>
  <text x="149" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">продукта</text>
  <polygon points="188,89 196,93 188,97" fill="#FF6F00" opacity="0.6"/>
  <rect x="200" y="68" width="78" height="50" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="239" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Анализ</text>
  <text x="239" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">рынка</text>
  <polygon points="278,89 286,93 278,97" fill="#FF6F00" opacity="0.6"/>
  <rect x="290" y="68" width="78" height="50" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="329" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Стратегия</text>
  <text x="329" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">маркетинга</text>
  <polygon points="368,89 376,93 368,97" fill="#FF6F00" opacity="0.6"/>
  <rect x="380" y="68" width="78" height="50" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="419" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Финансовый</text>
  <text x="419" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">план</text>
  <!-- Section: Зачем нужен бизнес-план? -->
  <text x="20" y="126" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Зачем нужен бизнес-план?</text>
  <rect x="20" y="125" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <circle cx="32" cy="134" r="4" fill="#FFB300"/>
  <text x="42" y="137" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Структурирует мысли</text>
  <rect x="260" y="125" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <circle cx="272" cy="134" r="4" fill="#FFB300"/>
  <text x="282" y="137" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Помогает привлечь инвестиции</text>
  <rect x="20" y="147" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <circle cx="32" cy="156" r="4" fill="#FFB300"/>
  <text x="42" y="159" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Позволяет оценить риски</text>
  <rect x="260" y="147" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <circle cx="272" cy="156" r="4" fill="#FFB300"/>
  <text x="282" y="159" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Служит дорожной картой</text>
  <!-- Tip -->
  <rect x="15" y="325" width="470" height="18" rx="9" ry="9" fill="#FF6F00" opacity="0.1"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-style="italic" fill="#3E2723">Совет: Бизнес-план — живой документ. Обновляй его по мере получения новых данных!</text>

  <!-- Footer -->
  <line x1="20" y1="343" x2="480" y2="343" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" opacity="0.7">Бизнес · 10 класс</text>
</svg>