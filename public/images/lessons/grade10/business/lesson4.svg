<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="500" height="32" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Юридические основы</text>
  <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE082">Бизнес — Урок 4</text>

  <!-- Lesson number badge -->
  <circle cx="30" cy="26" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="30" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">4</text>

  <!-- Section: Формы бизнеса -->
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Формы бизнеса</text>
  <rect x="16" y="65" width="148" height="68" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="16" y="65" width="148" height="22" rx="8" ry="8" fill="#FFB300" opacity="0.15"/>
  <rect x="16" y="79" width="148" height="8" fill="#FFB300" opacity="0.15"/>
  <text x="90" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FF6F00">ИП</text>
  <text x="90" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Один владелец</text>
  <text x="90" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Простая регистрация</text>
  <text x="90" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Личная ответственность</text>
  <rect x="172" y="65" width="148" height="68" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="172" y="65" width="148" height="22" rx="8" ry="8" fill="#FFB300" opacity="0.10"/>
  <rect x="172" y="79" width="148" height="8" fill="#FFB300" opacity="0.10"/>
  <text x="246" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FF6F00">ООО</text>
  <text x="246" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">От 1 учредителя</text>
  <text x="246" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Уставный капитал</text>
  <text x="246" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Ограниченная ответственность</text>
  <rect x="328" y="65" width="148" height="68" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <rect x="328" y="65" width="148" height="22" rx="8" ry="8" fill="#FFB300" opacity="0.08"/>
  <rect x="328" y="79" width="148" height="8" fill="#FFB300" opacity="0.08"/>
  <text x="402" y="81" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FF6F00">АО</text>
  <text x="402" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Акционеры</text>
  <text x="402" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Акции</text>
  <text x="402" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Сложное управление</text>
  <!-- Section: Что нужно для регистрации -->
  <text x="20" y="141" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Что нужно для регистрации</text>
  <rect x="28" y="140" width="12" height="12" rx="2" ry="2" fill="none" stroke="#FFB300" stroke-width="1.2"/>
  <polyline points="30,146 33,149 38,143" fill="none" stroke="#FF6F00" stroke-width="1.5"/>
  <text x="48" y="149" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">Выбрать форму собственности</text>
  <rect x="28" y="158" width="12" height="12" rx="2" ry="2" fill="none" stroke="#FFB300" stroke-width="1.2"/>
  <polyline points="30,164 33,167 38,161" fill="none" stroke="#FF6F00" stroke-width="1.5"/>
  <text x="48" y="167" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">Определить ОКВЭД</text>
  <rect x="28" y="176" width="12" height="12" rx="2" ry="2" fill="none" stroke="#FFB300" stroke-width="1.2"/>
  <polyline points="30,182 33,185 38,179" fill="none" stroke="#FF6F00" stroke-width="1.5"/>
  <text x="48" y="185" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">Подать документы в налоговую</text>
  <rect x="28" y="194" width="12" height="12" rx="2" ry="2" fill="none" stroke="#FFB300" stroke-width="1.2"/>
  <polyline points="30,200 33,203 38,197" fill="none" stroke="#FF6F00" stroke-width="1.5"/>
  <text x="48" y="203" font-family="Arial, sans-serif" font-size="9.5" fill="#3E2723">Открыть расчётный счёт</text>
  <!-- Tip -->
  <rect x="15" y="325" width="470" height="18" rx="9" ry="9" fill="#FF6F00" opacity="0.1"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-style="italic" fill="#3E2723">Совет: Консультируйся с юристом до подписания любых документов!</text>

  <!-- Footer -->
  <line x1="20" y1="343" x2="480" y2="343" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" opacity="0.7">Бизнес · 10 класс</text>
</svg>