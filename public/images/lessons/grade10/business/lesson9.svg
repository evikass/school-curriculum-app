<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="500" height="32" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Финансовые расчёты</text>
  <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE082">Бизнес — Урок 9</text>

  <!-- Lesson number badge -->
  <circle cx="30" cy="26" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="30" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">9</text>

  <!-- Section: Ключевые формулы -->
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Ключевые формулы</text>
  <rect x="20" y="65" width="220" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="28" y="81" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FF6F00">Прибыль:</text>
  <text x="28" y="81" dx="52" font-family="Arial, sans-serif" font-size="8.5" fill="#3E2723">Доходы − Расходы</text>
  <rect x="256" y="65" width="220" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="264" y="81" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FF6F00">Маржа:</text>
  <text x="264" y="81" dx="40" font-family="Arial, sans-serif" font-size="8.5" fill="#3E2723">(Прибыль / Цена) × 100%</text>
  <rect x="20" y="95" width="220" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="28" y="111" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FF6F00">ROI:</text>
  <text x="28" y="111" dx="28" font-family="Arial, sans-serif" font-size="8.5" fill="#3E2723">(Прибыль / Инвестиции) × 100%</text>
  <rect x="256" y="95" width="220" height="24" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="264" y="111" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FF6F00">Точка безубыточности:</text>
  <text x="264" y="111" dx="130" font-family="Arial, sans-serif" font-size="8.5" fill="#3E2723">Пост.расх. / (Цена − Перем.расх.)</text>
  <!-- Section: Структура расходов стартапа -->
  <text x="20" y="129" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Структура расходов стартапа</text>
  <text x="115" y="150" text-anchor="end" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Разработка</text>
  <rect x="120" y="137" width="300" height="18" rx="4" ry="4" fill="#E65100" opacity="0.7"/>
  <text x="428" y="150" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">35%</text>
  <text x="115" y="172" text-anchor="end" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Маркетинг</text>
  <rect x="120" y="159" width="214" height="18" rx="4" ry="4" fill="#FF8F00" opacity="0.7"/>
  <text x="342" y="172" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">25%</text>
  <text x="115" y="194" text-anchor="end" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Зарплаты</text>
  <rect x="120" y="181" width="214" height="18" rx="4" ry="4" fill="#FFB300" opacity="0.7"/>
  <text x="342" y="194" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">25%</text>
  <text x="115" y="216" text-anchor="end" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Прочее</text>
  <rect x="120" y="203" width="128" height="18" rx="4" ry="4" fill="#FFE082" opacity="0.7"/>
  <text x="256" y="216" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">15%</text>
  <!-- Tip -->
  <rect x="15" y="325" width="470" height="18" rx="9" ry="9" fill="#FF6F00" opacity="0.1"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-style="italic" fill="#3E2723">Совет: Веди учёт с первого дня! Необходимые инструменты: таблицы, 1С, онлайн-бухгалтерия.</text>

  <!-- Footer -->
  <line x1="20" y1="343" x2="480" y2="343" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" opacity="0.7">Бизнес · 10 класс</text>
</svg>