<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="500" height="32" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Защита бизнес-плана</text>
  <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE082">Бизнес — Урок 12</text>

  <!-- Lesson number badge -->
  <circle cx="30" cy="26" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="30" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">12</text>

  <!-- Section: Структура питча -->
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Структура питча</text>
  <rect x="20" y="65" width="220" height="20" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="79" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#FF6F00">Проблема</text>
  <rect x="190" y="68" width="42" height="14" rx="7" ry="7" fill="#FFB300" opacity="0.2"/>
  <text x="211" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FF6F00">1 мин</text>
  <rect x="20" y="89" width="220" height="20" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="103" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#FF6F00">Решение</text>
  <rect x="190" y="92" width="42" height="14" rx="7" ry="7" fill="#FFB300" opacity="0.2"/>
  <text x="211" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FF6F00">1 мин</text>
  <rect x="20" y="113" width="220" height="20" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="30" y="127" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#FF6F00">Рынок</text>
  <rect x="190" y="116" width="42" height="14" rx="7" ry="7" fill="#FFB300" opacity="0.2"/>
  <text x="211" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FF6F00">1 мин</text>
  <rect x="260" y="65" width="220" height="20" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="270" y="79" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#FF6F00">Бизнес-модель</text>
  <rect x="430" y="68" width="42" height="14" rx="7" ry="7" fill="#FFB300" opacity="0.2"/>
  <text x="451" y="79" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FF6F00">1 мин</text>
  <rect x="260" y="89" width="220" height="20" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="270" y="103" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#FF6F00">Команда</text>
  <rect x="430" y="92" width="42" height="14" rx="7" ry="7" fill="#FFB300" opacity="0.2"/>
  <text x="451" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FF6F00">30 сек</text>
  <rect x="260" y="113" width="220" height="20" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1" filter="url(#shadow)"/>
  <text x="270" y="127" font-family="Arial, sans-serif" font-size="9.5" font-weight="bold" fill="#FF6F00">Просьба</text>
  <rect x="430" y="116" width="42" height="14" rx="7" ry="7" fill="#FFB300" opacity="0.2"/>
  <text x="451" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FF6F00">30 сек</text>
  <!-- Section: Секреты успешной защиты -->
  <text x="20" y="145" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Секреты успешной защиты</text>
  <rect x="20" y="144" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <text x="32" y="156" font-family="Arial, sans-serif" font-size="9" fill="#FFB300">★</text>
  <text x="44" y="156" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Говори просто и понятно</text>
  <rect x="260" y="144" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <text x="272" y="156" font-family="Arial, sans-serif" font-size="9" fill="#FFB300">★</text>
  <text x="284" y="156" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Подкрепляй цифрами</text>
  <rect x="20" y="166" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <text x="32" y="178" font-family="Arial, sans-serif" font-size="9" fill="#FFB300">★</text>
  <text x="44" y="178" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Покажи прототип</text>
  <rect x="260" y="166" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <text x="272" y="178" font-family="Arial, sans-serif" font-size="9" fill="#FFB300">★</text>
  <text x="284" y="178" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Будь уверен и честен</text>
  <rect x="20" y="188" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <text x="32" y="200" font-family="Arial, sans-serif" font-size="9" fill="#FFB300">★</text>
  <text x="44" y="200" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Готовься к вопросам</text>
  <!-- Tip -->
  <rect x="15" y="325" width="470" height="18" rx="9" ry="9" fill="#FF6F00" opacity="0.1"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-style="italic" fill="#3E2723">Совет: Инвесторы инвестируют в людей, а не в идеи. Покажи свою команду и мотивацию!</text>

  <!-- Footer -->
  <line x1="20" y1="343" x2="480" y2="343" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" opacity="0.7">Бизнес · 10 класс</text>
</svg>