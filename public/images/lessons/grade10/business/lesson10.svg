<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="500" height="32" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Команда</text>
  <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE082">Бизнес — Урок 10</text>

  <!-- Lesson number badge -->
  <circle cx="30" cy="26" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="30" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">10</text>

  <!-- Section: Ключевые роли в команде -->
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Ключевые роли в команде</text>
  <rect x="20" y="65" width="105" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="72" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">🎯</text>
  <text x="72" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FF6F00">Визионер</text>
  <text x="72" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">Стратегия</text>
  <text x="72" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">и направление</text>
  <rect x="137" y="65" width="105" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="189" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">⚙</text>
  <text x="189" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FF6F00">Технарь</text>
  <text x="189" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">Продукт</text>
  <text x="189" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">и технологии</text>
  <rect x="20" y="133" width="105" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="72" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">📈</text>
  <text x="72" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FF6F00">Продажник</text>
  <text x="72" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">Клиенты</text>
  <text x="72" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">и рост</text>
  <rect x="137" y="133" width="105" height="60" rx="8" ry="8" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="189" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="12">📋</text>
  <text x="189" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FF6F00">Организатор</text>
  <text x="189" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">Процессы</text>
  <text x="189" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037">и финансы</text>
  <!-- Section: Принципы сильной команды -->
  <text x="20" y="205" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Принципы сильной команды</text>
  <rect x="20" y="204" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <circle cx="32" cy="213" r="4" fill="#FFB300"/>
  <text x="42" y="216" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Дополнительные навыки друг друга</text>
  <rect x="260" y="204" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <circle cx="272" cy="213" r="4" fill="#FFB300"/>
  <text x="282" y="216" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Общие ценности и видение</text>
  <rect x="20" y="226" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <circle cx="32" cy="235" r="4" fill="#FFB300"/>
  <text x="42" y="238" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Прозрачная коммуникация</text>
  <rect x="260" y="226" width="230" height="18" rx="9" ry="9" fill="#FFFFFF" stroke="#FFB300" stroke-width="0.8"/>
  <circle cx="272" cy="235" r="4" fill="#FFB300"/>
  <text x="282" y="238" font-family="Arial, sans-serif" font-size="9" fill="#3E2723">Чёткое распределение ролей</text>
  <!-- Tip -->
  <rect x="15" y="325" width="470" height="18" rx="9" ry="9" fill="#FF6F00" opacity="0.1"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-style="italic" fill="#3E2723">Совет: Ищи людей, которые сильны там, где ты слаб. Один в поле не воин!</text>

  <!-- Footer -->
  <line x1="20" y1="343" x2="480" y2="343" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" opacity="0.7">Бизнес · 10 класс</text>
</svg>