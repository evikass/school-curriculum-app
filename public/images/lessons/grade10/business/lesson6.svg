<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="#FFF8E1" stroke="#FF6F00" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="500" height="32" fill="url(#headerGrad)"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Продукт</text>
  <text x="250" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFE082">Бизнес — Урок 6</text>

  <!-- Lesson number badge -->
  <circle cx="30" cy="26" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="30" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">6</text>

  <!-- Section: Уровни продукта -->
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Уровни продукта</text>
  <rect x="80" y="68" width="340" height="24" rx="5" ry="5" fill="#E65100" opacity="0.25" stroke="#E65100" stroke-width="1"/>
  <text x="90" y="84" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Основной</text>
  <text x="410" y="84" text-anchor="end" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Какую проблему решает?</text>
  <rect x="110" y="96" width="280" height="24" rx="5" ry="5" fill="#FF8F00" opacity="0.25" stroke="#FF8F00" stroke-width="1"/>
  <text x="120" y="112" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Реальный</text>
  <text x="380" y="112" text-anchor="end" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Характеристики и дизайн</text>
  <rect x="140" y="124" width="220" height="24" rx="5" ry="5" fill="#FFB300" opacity="0.25" stroke="#FFB300" stroke-width="1"/>
  <text x="150" y="140" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#3E2723">Расширенный</text>
  <text x="350" y="140" text-anchor="end" font-family="Arial, sans-serif" font-size="8.5" fill="#5D4037">Сервис, гарантия, поддержка</text>
  <!-- Section: Цикл создания MVP -->
  <text x="20" y="156" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FF6F00">Цикл создания MVP</text>
  <rect x="214" y="135" width="72" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="250" y="154" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#3E2723">Идея →</text>
  <line x1="272" y1="159" x2="280" y2="178" stroke="#FF6F00" stroke-width="1" opacity="0.4"/>
  <polygon points="280,178 277,172 274,177" fill="#FF6F00" opacity="0.5"/>
  <rect x="266" y="174" width="72" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="302" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#3E2723">MVP →</text>
  <line x1="294" y1="205" x2="290" y2="231" stroke="#FF6F00" stroke-width="1" opacity="0.4"/>
  <polygon points="290,231 294,227 290,225" fill="#FF6F00" opacity="0.5"/>
  <rect x="246" y="229" width="72" height="38" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="282" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#3E2723">Обратная</text>
  <text x="282" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#3E2723">связь →</text>
  <line x1="254" y1="248" x2="246" y2="248" stroke="#FF6F00" stroke-width="1" opacity="0.4"/>
  <polygon points="246,248 252,251 252,245" fill="#FF6F00" opacity="0.5"/>
  <rect x="182" y="234" width="72" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="218" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#3E2723">Улучшение →</text>
  <line x1="210" y1="231" x2="206" y2="205" stroke="#FF6F00" stroke-width="1" opacity="0.4"/>
  <polygon points="206,205 206,211 210,209" fill="#FF6F00" opacity="0.5"/>
  <rect x="162" y="174" width="72" height="28" rx="6" ry="6" fill="#FFFFFF" stroke="#FFB300" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="198" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#3E2723">Идея</text>
  <line x1="220" y1="178" x2="228" y2="159" stroke="#FF6F00" stroke-width="1" opacity="0.4"/>
  <polygon points="228,159 222,160 225,165" fill="#FF6F00" opacity="0.5"/>
  <!-- Tip -->
  <rect x="15" y="325" width="470" height="18" rx="9" ry="9" fill="#FF6F00" opacity="0.1"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-style="italic" fill="#3E2723">Совет: Не создавай идеальный продукт. Создай минимальный и улучшай по отзывам!</text>

  <!-- Footer -->
  <line x1="20" y1="343" x2="480" y2="343" stroke="#FFB300" stroke-width="0.5" opacity="0.5"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" opacity="0.7">Бизнес · 10 класс</text>
</svg>