<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Химический состав клетки</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>
    
    <!-- Cell outline -->
    <ellipse cx="130" cy="195" rx="80" ry="60" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2"/>
    <ellipse cx="130" cy="190" rx="25" ry="18" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="130" y="194" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Ядро</text>
    <!-- Organelles -->
    <ellipse cx="95" cy="210" rx="18" ry="8" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
    <ellipse cx="170" cy="200" rx="15" ry="7" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
    <ellipse cx="140" cy="230" rx="16" ry="7" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
    <text x="130" y="160" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">Клетка</text>
    
    <!-- Chemical elements around cell -->
    <circle cx="60" cy="140" r="12" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="60" y="144" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">O</text>
    <circle cx="200" cy="140" r="12" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
    <text x="200" y="144" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">H</text>
    <circle cx="60" cy="245" r="12" fill="#FFA726" stroke="#E65100" stroke-width="1"/>
    <text x="60" y="249" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">C</text>
    <circle cx="200" cy="245" r="12" fill="#AB47BC" stroke="#6A1B9A" stroke-width="1"/>
    <text x="200" y="249" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">N</text>
    <circle cx="50" cy="192" r="10" fill="#78909C" stroke="#455A64" stroke-width="1"/>
    <text x="50" y="196" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">P</text>
    <circle cx="210" cy="192" r="10" fill="#FFEE58" stroke="#F9A825" stroke-width="1"/>
    <text x="210" y="196" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">S</text>
    
    <!-- Right side: Composition pie chart -->
    <text x="370" y="100" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">Состав клетки</text>
    
    <!-- Pie chart segments (using paths for a pie) -->
    <!-- Water ~70% -->
    <path d="M370,180 L370,120 A60,60 0 0,1 413,224 Z" fill="#42A5F5" stroke="white" stroke-width="1"/>
    <text x="405" y="155" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">H2O</text>
    <text x="405" y="167" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">70-80%</text>
    
    <!-- Proteins ~15% -->
    <path d="M370,180 L413,224 A60,60 0 0,1 340,234 Z" fill="#EF5350" stroke="white" stroke-width="1"/>
    <text x="375" y="225" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Белки</text>
    <text x="375" y="236" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">10-15%</text>
    
    <!-- Lipids ~8% -->
    <path d="M370,180 L340,234 A60,60 0 0,1 318,195 Z" fill="#FFA726" stroke="white" stroke-width="1"/>
    <text x="330" y="210" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Липиды</text>
    <text x="330" y="219" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">5-8%</text>
    
    <!-- Carbs ~3% -->
    <path d="M370,180 L318,195 A60,60 0 0,1 327,148 Z" fill="#66BB6A" stroke="white" stroke-width="1"/>
    <text x="322" y="172" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Углев.</text>
    
    <!-- Nucleic acids etc -->
    <path d="M370,180 L327,148 A60,60 0 0,1 370,120 Z" fill="#AB47BC" stroke="white" stroke-width="1"/>
    <text x="348" y="145" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">НК</text>
    <text x="348" y="155" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">1-3%</text>
    
    <!-- Legend -->
    <rect x="290" y="255" width="180" height="42" rx="3" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
    <circle cx="305" cy="265" r="5" fill="#42A5F5"/>
    <text x="350" y="268" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Вода</text>
    <circle cx="375" cy="265" r="5" fill="#EF5350"/>
    <text x="420" y="268" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Белки</text>
    <circle cx="305" cy="280" r="5" fill="#FFA726"/>
    <text x="350" y="283" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Липиды</text>
    <circle cx="375" cy="280" r="5" fill="#66BB6A"/>
    <text x="420" y="283" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Углеводы</text>
    <circle cx="340" cy="290" r="5" fill="#AB47BC"/>
    <text x="380" y="293" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Нуклеин. к-ты</text>
    
    <!-- Bottom info -->
    <text x="130" y="275" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">Макроэлементы:</text>
    <text x="130" y="288" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">O, C, H, N (98%)</text>
    <text x="130" y="298" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Микроэлементы: Fe, Zn, Cu, I</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>