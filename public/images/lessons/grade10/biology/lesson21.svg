<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="30" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Биосинтез белка</text>
<text x="250" y="46" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 10 класс — Урок 21</text>
<line x1="30" y1="52" x2="470" y2="52" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Central dogma: DNA -> RNA -> Protein -->
<g transform="translate(250,100)">
<rect x="-40" y="-18" width="80" height="36" rx="5" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="1.5"/>
<text x="0" y="-2" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">ДНК</text>
</g>
<line x1="250" y1="118" x2="250" y2="135" stroke="#2E7D32" stroke-width="2"/>
<path d="M250,135 L247,130 M250,135 L253,130" stroke="#2E7D32" stroke-width="1.5"/>
<text x="270" y="130" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Транскрипция</text>
<g transform="translate(250,160)">
<rect x="-40" y="-18" width="80" height="36" rx="5" fill="#9C27B0" opacity="0.2" stroke="#9C27B0" stroke-width="1.5"/>
<text x="0" y="-2" font-family="Arial,sans-serif" font-size="10" fill="#9C27B0" text-anchor="middle" font-weight="bold">и-РНК</text>
</g>
<line x1="250" y1="178" x2="250" y2="195" stroke="#2E7D32" stroke-width="2"/>
<path d="M250,195 L247,190 M250,195 L253,190" stroke="#2E7D32" stroke-width="1.5"/>
<text x="270" y="190" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Трансляция</text>
<g transform="translate(250,225)">
<rect x="-50" y="-18" width="100" height="36" rx="5" fill="#4CAF50" opacity="0.2" stroke="#4CAF50" stroke-width="1.5"/>
<text x="0" y="-2" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50" text-anchor="middle" font-weight="bold">Белок</text>
</g>
<rect x="30" y="265" width="440" height="40" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="279" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Транскрипция: ДНК -> и-РНК (в ядре, РНК-полимераза)</text>
<text x="250" y="290" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Трансляция: и-РНК -> белок (в рибосоме, т-РНК приносит аминокислоты)</text>
<text x="250" y="301" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Кодон: 3 нуклеотида = 1 аминокислота | Генетический код: триплетный, вырожденный, универсальный</text>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Биология 10 класс</text>
</svg>