<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Биогенетический закон</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 30</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Biogenetic law -->
    <text x="250" y="103" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Онтогенез кратко повторяет филогенез</text>
    
    <!-- Embryonic stages comparison -->
    <rect x="20" y="115" width="460" height="95" rx="5" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="250" y="132" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Зародыши на ранних стадиях схожи</text>
    
    <!-- Fish embryo -->
    <ellipse cx="80" cy="175" rx="35" ry="20" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1"/>
    <circle cx="65" cy="172" r="4" fill="#1565C0"/>
    <text x="80" y="200" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Рыба</text>
    
    <!-- Amphibian embryo -->
    <ellipse cx="175" cy="175" rx="35" ry="20" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1"/>
    <circle cx="160" cy="172" r="4" fill="#2E7D32"/>
    <text x="175" y="200" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Земноводное</text>
    
    <!-- Bird embryo -->
    <ellipse cx="270" cy="175" rx="35" ry="20" fill="#FFF3E0" stroke="#FFA726" stroke-width="1"/>
    <circle cx="255" cy="172" r="4" fill="#E65100"/>
    <text x="270" y="200" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Птица</text>
    
    <!-- Mammal embryo -->
    <ellipse cx="370" cy="175" rx="35" ry="20" fill="#FCE4EC" stroke="#EF5350" stroke-width="1"/>
    <circle cx="355" cy="172" r="4" fill="#C62828"/>
    <text x="370" y="200" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Млекопитающее</text>
    
    <text x="440" y="178" font-family="Arial,sans-serif" font-size="7" fill="#66BB6A">Сходство!</text>
    
    <!-- Regulation -->
    <rect x="20" y="220" width="460" height="75" rx="5" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <text x="250" y="238" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Регуляция развития</text>
    
    <rect x="30" y="248" width="130" height="35" rx="4" fill="#BBDEFB"/>
    <text x="95" y="262" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Гены гомеозиса</text>
    <text x="95" y="275" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Управляют планом тела</text>
    
    <rect x="170" y="248" width="140" height="35" rx="4" fill="#90CAF9"/>
    <text x="240" y="262" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Гормоны и ферменты</text>
    <text x="240" y="275" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Химическая регуляция</text>
    
    <rect x="320" y="248" width="150" height="35" rx="4" fill="#64B5F6"/>
    <text x="395" y="262" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Индукция и ингибирование</text>
    <text x="395" y="275" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Взаимодействие тканей</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Закон Геккеля и регуляция развития</text>
</svg>