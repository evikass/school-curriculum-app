<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">АТФ - универсальный аккумулятор</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>
    
    <!-- ATP structure -->
    <text x="200" y="100" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle">Структура АТФ</text>
    
    <!-- Adenine -->
    <rect x="40" y="110" width="55" height="35" rx="4" fill="#AB47BC" stroke="#6A1B9A" stroke-width="1"/>
    <text x="67" y="128" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Аденин</text>
    <text x="67" y="140" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">A</text>
    
    <!-- Ribose -->
    <polygon points="110,115 130,108 145,118 140,135 115,135" fill="#FFA726" stroke="#E65100" stroke-width="1.5"/>
    <text x="127" y="128" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Рибоза</text>
    
    <!-- Bonds between parts -->
    <line x1="95" y1="127" x2="110" y2="127" stroke="#555" stroke-width="2"/>
    
    <!-- Three phosphate groups -->
    <circle cx="170" cy="127" r="16" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="170" y="131" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">P</text>
    <line x1="145" y1="127" x2="154" y2="127" stroke="#555" stroke-width="2"/>
    
    <circle cx="210" cy="127" r="16" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="210" y="131" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">P</text>
    <line x1="186" y1="127" x2="194" y2="127" stroke="#555" stroke-width="2.5"/>
    
    <circle cx="250" cy="127" r="16" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="250" y="131" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">P</text>
    <line x1="226" y1="127" x2="234" y2="127" stroke="#555" stroke-width="2.5"/>
    
    <!-- Energy marker -->
    <line x1="230" y1="145" x2="230" y2="155" stroke="#EF5350" stroke-width="1.5"/>
    <line x1="250" y1="145" x2="250" y2="155" stroke="#EF5350" stroke-width="1.5"/>
    <rect x="220" y="155" width="50" height="16" rx="3" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <text x="245" y="166" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">~30 кДж</text>
    
    <!-- ATP-ADP-AMP labels -->
    <text x="170" y="105" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">АМФ</text>
    <text x="210" y="105" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">АДФ</text>
    <text x="250" y="105" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">АТФ</text>
    
    <!-- ATP <-> ADP cycle -->
    <text x="370" y="100" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">Цикл АТФ/АДФ</text>
    
    <!-- ATP box -->
    <rect x="330" y="115" width="80" height="30" rx="4" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <text x="370" y="135" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle">АТФ</text>
    
    <!-- Arrow down: energy release -->
    <line x1="370" y1="145" x2="370" y2="175" stroke="#EF5350" stroke-width="2.5"/>
    <polygon points="362,175 378,175 370,185" fill="#EF5350"/>
    <text x="425" y="160" font-family="Arial,sans-serif" font-size="8" fill="#EF5350" text-anchor="middle">Энергия</text>
    <text x="425" y="172" font-family="Arial,sans-serif" font-size="8" fill="#EF5350" text-anchor="middle">~30 кДж</text>
    <text x="310" y="160" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">- H2O</text>
    
    <!-- ADP box -->
    <rect x="330" y="185" width="80" height="30" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
    <text x="370" y="205" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="middle">АДФ + Ф</text>
    
    <!-- Arrow up: energy absorption -->
    <line x1="370" y1="215" x2="370" y2="250" stroke="#66BB6A" stroke-width="2.5"/>
    <polygon points="362,250 378,250 370,240" fill="#66BB6A"/>
    <text x="425" y="232" font-family="Arial,sans-serif" font-size="8" fill="#66BB6A" text-anchor="middle">Энергия</text>
    <text x="425" y="244" font-family="Arial,sans-serif" font-size="8" fill="#66BB6A" text-anchor="middle">пищи</text>
    <text x="310" y="232" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">+ H2O</text>
    
    <!-- Back to ATP -->
    <text x="370" y="262" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">АТФ</text>
    
    <!-- Bottom info -->
    <rect x="20" y="210" width="280" height="85" rx="4" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="160" y="226" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Роль АТФ в клетке:</text>
    <text x="160" y="240" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Универсальный переносчик энергии</text>
    <text x="160" y="252" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Синтез: митохондрии, хлоропласты</text>
    <text x="160" y="264" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Расход: все процессы жизнедеят.</text>
    <text x="160" y="278" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">В клетке ~1 млрд молекул АТФ</text>
    <text x="160" y="290" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Обновление: каждые 1-2 мин</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>