<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Пластический и энергетический обмен</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>
    
    <!-- Metabolism central concept -->
    <rect x="160" y="90" width="180" height="30" rx="5" fill="#2E7D32"/>
    <text x="250" y="110" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">Обмен веществ</text>
    
    <!-- Two branches -->
    <!-- Left: Anabolism (Assimilation) -->
    <line x1="200" y1="120" x2="120" y2="145" stroke="#66BB6A" stroke-width="2"/>
    <rect x="25" y="145" width="200" height="145" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="125" y="163" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">Ассимиляция</text>
    <text x="125" y="178" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">(Пластический обмен)</text>
    
    <!-- Anabolism details -->
    <rect x="35" y="188" width="180" height="20" rx="3" fill="#C8E6C9"/>
    <text x="125" y="202" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Простые -&gt; Сложные</text>
    <rect x="35" y="213" width="180" height="20" rx="3" fill="#C8E6C9"/>
    <text x="125" y="227" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Энергия поглощается</text>
    <rect x="35" y="238" width="180" height="20" rx="3" fill="#C8E6C9"/>
    <text x="125" y="252" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">АТФ расходуется</text>
    
    <!-- Examples -->
    <text x="125" y="270" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Примеры:</text>
    <text x="125" y="282" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Фотосинтез, синтез белка</text>
    <text x="125" y="294" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Синтез липидов, гликогена</text>
    
    <!-- Right: Catabolism (Dissimilation) -->
    <line x1="300" y1="120" x2="380" y2="145" stroke="#EF5350" stroke-width="2"/>
    <rect x="275" y="145" width="200" height="145" rx="4" fill="#FFEBEE" stroke="#EF5350" stroke-width="1"/>
    <text x="375" y="163" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle">Диссимиляция</text>
    <text x="375" y="178" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">(Энергетический обмен)</text>
    
    <!-- Catabolism details -->
    <rect x="285" y="188" width="180" height="20" rx="3" fill="#FFCDD2"/>
    <text x="375" y="202" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Сложные -&gt; Простые</text>
    <rect x="285" y="213" width="180" height="20" rx="3" fill="#FFCDD2"/>
    <text x="375" y="227" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Энергия выделяется</text>
    <rect x="285" y="238" width="180" height="20" rx="3" fill="#FFCDD2"/>
    <text x="375" y="252" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">АТФ синтезируется</text>
    
    <!-- Examples -->
    <text x="375" y="270" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Примеры:</text>
    <text x="375" y="282" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Гликолиз, дыхание</text>
    <text x="375" y="294" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Расщепление белков, жиров</text>
    
    <!-- Central arrow showing relationship -->
    <line x1="225" y1="230" x2="275" y2="230" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
    <line x1="275" y1="240" x2="225" y2="240" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="250" y="227" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">АТФ</text>
    <text x="250" y="248" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">В-ва</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>