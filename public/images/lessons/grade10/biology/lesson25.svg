<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Гаметогенез</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 22</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Spermatogenesis (left) -->
    <rect x="20" y="95" width="225" height="195" rx="5" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <text x="132" y="112" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">Сперматогенез</text>
    
    <!-- Stages -->
    <rect x="35" y="122" width="90" height="18" rx="3" fill="#BBDEFB"/>
    <text x="80" y="135" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Сперматогонии (2n)</text>
    <text x="155" y="135" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="middle">&#x2193; рост</text>
    
    <rect x="35" y="146" width="90" height="18" rx="3" fill="#90CAF9"/>
    <text x="80" y="159" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Сперматоцит I (2n)</text>
    <text x="155" y="159" font-family="Arial,sans-serif" font-size="8" fill="#42A5F5" text-anchor="middle">&#x2193; мейоз I</text>
    
    <rect x="35" y="170" width="90" height="18" rx="3" fill="#64B5F6"/>
    <text x="80" y="183" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Сперматоцит II (n)</text>
    <text x="155" y="183" font-family="Arial,sans-serif" font-size="8" fill="#42A5F5" text-anchor="middle">&#x2193; мейоз II</text>
    
    <rect x="35" y="194" width="90" height="18" rx="3" fill="#42A5F5"/>
    <text x="80" y="207" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Сперматиды (n)</text>
    <text x="155" y="207" font-family="Arial,sans-serif" font-size="8" fill="#42A5F5" text-anchor="middle">&#x2193; форм.</text>
    
    <rect x="35" y="218" width="90" height="20" rx="10" fill="#1565C0"/>
    <text x="80" y="232" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Сперматозоиды (n)</text>
    
    <text x="132" y="260" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">4 подвижные клетки</text>
    <text x="132" y="273" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">С жгутиком</text>
    
    <!-- Oogenesis (right) -->
    <rect x="260" y="95" width="220" height="195" rx="5" fill="#FCE4EC" stroke="#EF5350" stroke-width="1"/>
    <text x="370" y="112" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Овогенез</text>
    
    <rect x="275" y="122" width="90" height="18" rx="3" fill="#FFCDD2"/>
    <text x="320" y="135" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Овогонии (2n)</text>
    <text x="395" y="135" font-family="Arial,sans-serif" font-size="10" fill="#EF5350" text-anchor="middle">&#x2193; рост</text>
    
    <rect x="275" y="146" width="90" height="18" rx="3" fill="#EF9A9A"/>
    <text x="320" y="159" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Овоцит I (2n)</text>
    <text x="395" y="159" font-family="Arial,sans-serif" font-size="8" fill="#EF5350" text-anchor="middle">&#x2193; мейоз I</text>
    
    <rect x="275" y="170" width="70" height="18" rx="3" fill="#E57373"/>
    <text x="310" y="183" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Овоцит II (n)</text>
    <rect x="350" y="175" width="40" height="13" rx="2" fill="#FFEBEE" stroke="#EF5350" stroke-width="0.5"/>
    <text x="370" y="185" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Тельце</text>
    <text x="395" y="183" font-family="Arial,sans-serif" font-size="8" fill="#EF5350" text-anchor="middle">&#x2193; м. II</text>
    
    <rect x="275" y="194" width="70" height="20" rx="10" fill="#C62828"/>
    <text x="310" y="208" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Яйцекл. (n)</text>
    <rect x="350" y="197" width="40" height="13" rx="2" fill="#FFEBEE" stroke="#EF5350" stroke-width="0.5"/>
    <text x="370" y="207" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Тельце</text>
    
    <text x="370" y="240" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">1 крупная клетка</text>
    <text x="370" y="253" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">+ 3 полярных тельца</text>
    <text x="370" y="268" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Запас питательных веществ</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Образование половых клеток</text>
</svg>