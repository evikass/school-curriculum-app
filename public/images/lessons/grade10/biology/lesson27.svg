<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Основы генетики</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 24</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Mendel's pea experiment -->
    <text x="250" y="103" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Опыты Менделя с горохом</text>
    
    <!-- P generation -->
    <rect x="50" y="112" width="70" height="30" rx="5" fill="#FFEE58" stroke="#F9A825" stroke-width="1"/>
    <text x="85" y="125" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">AA</text>
    <text x="85" y="137" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Жёлтые</text>
    
    <text x="145" y="130" font-family="Arial,sans-serif" font-size="12" fill="#66BB6A" text-anchor="middle">x</text>
    
    <rect x="160" y="112" width="70" height="30" rx="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <text x="195" y="125" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">aa</text>
    <text x="195" y="137" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Зелёные</text>
    
    <text x="250" y="150" font-family="Arial,sans-serif" font-size="8" fill="#66BB6A" text-anchor="middle">P (родители)</text>
    
    <!-- Arrow -->
    <line x1="140" y1="148" x2="140" y2="162" stroke="#66BB6A" stroke-width="1.5"/>
    
    <!-- F1 -->
    <rect x="80" y="165" width="120" height="28" rx="5" fill="#FFEE58" stroke="#F9A825" stroke-width="1"/>
    <text x="140" y="178" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Aa (все жёлтые)</text>
    <text x="140" y="190" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">F1 — I закон</text>
    
    <!-- Arrow -->
    <line x1="140" y1="198" x2="140" y2="210" stroke="#66BB6A" stroke-width="1.5"/>
    <text x="190" y="208" font-family="Arial,sans-serif" font-size="7" fill="#66BB6A">Aa x Aa</text>
    
    <!-- F2 - Punnett square -->
    <rect x="60" y="215" width="160" height="80" rx="4" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="140" y="230" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">F2 — II закон</text>
    
    <!-- Ratio 1:2:1 genotypes, 3:1 phenotypes -->
    <rect x="75" y="237" width="35" height="18" rx="2" fill="#FFEE58"/>
    <text x="92" y="250" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">AA</text>
    <rect x="115" y="237" width="35" height="18" rx="2" fill="#FFF9C4"/>
    <text x="132" y="250" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Aa</text>
    <rect x="155" y="237" width="35" height="18" rx="2" fill="#FFF9C4"/>
    <text x="172" y="250" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Aa</text>
    <rect x="195" y="237" width="20" height="18" rx="2" fill="#A5D6A7"/>
    <text x="205" y="250" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">aa</text>
    
    <text x="140" y="275" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">3 жёлтых : 1 зелёный</text>
    <text x="140" y="290" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">1AA : 2Aa : 1aa</text>
    
    <!-- Laws on right -->
    <rect x="280" y="112" width="190" height="55" rx="5" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <text x="375" y="130" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">I закон единообразия</text>
    <text x="375" y="145" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">F1: все гибриды одинаковы</text>
    <text x="375" y="158" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Доминирование признака</text>
    
    <rect x="280" y="175" width="190" height="55" rx="5" fill="#FFF3E0" stroke="#FFA726" stroke-width="1"/>
    <text x="375" y="193" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">II закон расщепления</text>
    <text x="375" y="208" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">F2: 3:1 по фенотипу</text>
    <text x="375" y="221" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">1:2:1 по генотипу</text>
    
    <rect x="280" y="238" width="190" height="55" rx="5" fill="#FCE4EC" stroke="#EF5350" stroke-width="1"/>
    <text x="375" y="256" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">III закон независимости</text>
    <text x="375" y="271" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Признаки наследуются</text>
    <text x="375" y="284" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">независимо друг от друга</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Законы Менделя</text>
</svg>