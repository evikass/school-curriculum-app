<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Оплодотворение и размножение</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 23</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Two types: Sexual and Asexual -->
    <!-- Central title -->
    <rect x="170" y="90" width="160" height="25" rx="5" fill="#2E7D32"/>
    <text x="250" y="107" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle">Размножение</text>
    
    <!-- Left: Asexual -->
    <line x1="200" y1="115" x2="120" y2="135" stroke="#66BB6A" stroke-width="2"/>
    <rect x="20" y="135" width="200" height="155" rx="5" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="120" y="153" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Бесполое</text>
    
    <rect x="30" y="162" width="180" height="17" rx="3" fill="#C8E6C9"/>
    <text x="120" y="175" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Деление (простое, митоз)</text>
    <rect x="30" y="183" width="180" height="17" rx="3" fill="#C8E6C9"/>
    <text x="120" y="196" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Почкование (гидра, дрожжи)</text>
    <rect x="30" y="204" width="180" height="17" rx="3" fill="#C8E6C9"/>
    <text x="120" y="217" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Спорообразование (грибы)</text>
    <rect x="30" y="225" width="180" height="17" rx="3" fill="#C8E6C9"/>
    <text x="120" y="238" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Вегетативное (растения)</text>
    <rect x="30" y="246" width="180" height="17" rx="3" fill="#C8E6C9"/>
    <text x="120" y="259" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Фрагментация</text>
    <text x="120" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1 родитель, клон</text>
    
    <!-- Right: Sexual -->
    <line x1="300" y1="115" x2="380" y2="135" stroke="#EF5350" stroke-width="2"/>
    <rect x="280" y="135" width="200" height="155" rx="5" fill="#FFEBEE" stroke="#EF5350" stroke-width="1"/>
    <text x="380" y="153" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Половое</text>
    
    <!-- Sperm + Egg -->
    <circle cx="340" cy="185" r="10" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
    <text x="340" y="188" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">n</text>
    <text x="360" y="185" font-family="Arial,sans-serif" font-size="10" fill="#EF5350">+</text>
    <circle cx="390" cy="185" r="16" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <text x="390" y="188" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">n</text>
    <text x="365" y="205" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">&#x2193;</text>
    
    <circle cx="365" cy="220" r="18" fill="#FFAB91" stroke="#E64A19" stroke-width="1.5"/>
    <text x="365" y="218" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Зигота</text>
    <text x="365" y="228" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">2n</text>
    
    <text x="380" y="260" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">2 родителя</text>
    <text x="380" y="273" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Генетическое разнообразие</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Виды размножения организмов</text>
</svg>