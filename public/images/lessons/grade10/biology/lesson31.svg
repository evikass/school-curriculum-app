<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Взаимодействие генов</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 26</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Gene interactions -->
    <rect x="20" y="95" width="225" height="95" rx="5" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <text x="132" y="112" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle">Взаимодействие генов</text>
    
    <rect x="30" y="120" width="100" height="17" rx="3" fill="#BBDEFB"/>
    <text x="80" y="133" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Комплементарность</text>
    <rect x="135" y="120" width="100" height="17" rx="3" fill="#90CAF9"/>
    <text x="185" y="133" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Эпистаз</text>
    <rect x="30" y="142" width="100" height="17" rx="3" fill="#64B5F6"/>
    <text x="80" y="155" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Полимерия</text>
    <rect x="135" y="142" width="100" height="17" rx="3" fill="#42A5F5"/>
    <text x="185" y="155" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Плейотропия</text>
    
    <!-- Types of variability -->
    <rect x="260" y="95" width="220" height="95" rx="5" fill="#FCE4EC" stroke="#EF5350" stroke-width="1"/>
    <text x="370" y="112" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Изменчивость</text>
    
    <rect x="270" y="120" width="95" height="17" rx="3" fill="#FFCDD2"/>
    <text x="317" y="133" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Наследственная</text>
    <rect x="370" y="120" width="100" height="17" rx="3" fill="#EF9A9A"/>
    <text x="420" y="133" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Ненаследственная</text>
    
    <text x="317" y="150" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Мутации</text>
    <text x="420" y="150" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Модификации</text>
    <text x="317" y="163" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Комбинативная</text>
    <text x="420" y="163" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Норма реакции</text>
    
    <!-- Mutation types -->
    <rect x="20" y="200" width="460" height="95" rx="5" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="250" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Типы мутаций</text>
    
    <rect x="30" y="228" width="135" height="55" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.5"/>
    <text x="97" y="243" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Генные</text>
    <text x="97" y="258" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Точечные изменения ДНК</text>
    <text x="97" y="270" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Замена, вставка, потеря</text>
    
    <rect x="175" y="228" width="135" height="55" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.5"/>
    <text x="242" y="243" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Хромосомные</text>
    <text x="242" y="258" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Структурные изменения</text>
    <text x="242" y="270" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Делеция, дупликация</text>
    
    <rect x="320" y="228" width="150" height="55" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="0.5"/>
    <text x="395" y="243" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Геномные</text>
    <text x="395" y="258" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Изменение числа хромосом</text>
    <text x="395" y="270" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Полиплоидия, анеуплоидия</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Типы взаимодействия и изменчивость</text>
</svg>