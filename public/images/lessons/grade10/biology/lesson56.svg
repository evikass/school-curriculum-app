<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg56" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg56)"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#4caf50" stroke-width="2" rx="6"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="492" height="36" fill="#2e7d32" rx="4"/>
  <text x="250" y="27" text-anchor="middle" fill="#e8f5e9" font-size="10" font-weight="bold" font-family="Arial">Закономерности действия экологических факторов — Урок 56</text>

  <!-- Three types of factors - top row -->
  <!-- ABIOTIC -->
  <rect x="8" y="48" width="158" height="72" fill="#0d2137" stroke="#42a5f5" stroke-width="1" rx="4"/>
  <rect x="8" y="48" width="158" height="14" fill="#1565c0" rx="4"/>
  <text x="87" y="59" text-anchor="middle" fill="#e3f2fd" font-size="7.5" font-weight="bold" font-family="Arial">АБИОТИЧЕСКИЕ</text>
  <!-- Temperature icon -->
  <rect x="18" y="70" width="4" height="20" fill="#ef5350" rx="1"/>
  <circle cx="20" cy="92" r="4" fill="#ef5350" stroke="#c62828" stroke-width="0.5"/>
  <rect x="19" y="75" width="2" height="14" fill="#fff9c4"/>
  <!-- Light icon -->
  <circle cx="50" cy="82" r="8" fill="#ffeb3b" opacity="0.3"/>
  <circle cx="50" cy="82" r="4" fill="#fff176"/>
  <line x1="50" y1="70" x2="50" y2="73" stroke="#ffeb3b" stroke-width="1"/>
  <line x1="50" y1="91" x2="50" y2="94" stroke="#ffeb3b" stroke-width="1"/>
  <line x1="38" y1="82" x2="41" y2="82" stroke="#ffeb3b" stroke-width="1"/>
  <line x1="59" y1="82" x2="62" y2="82" stroke="#ffeb3b" stroke-width="1"/>
  <!-- Water drops -->
  <path d="M80,78 Q83,72 86,78 Q83,83 80,78 Z" fill="#29b6f6"/>
  <path d="M90,82 Q93,76 96,82 Q93,87 90,82 Z" fill="#29b6f6"/>
  <text x="87" y="107" text-anchor="middle" fill="#90caf9" font-size="5.5" font-family="Arial">Температура, свет, вода, солёность</text>

  <!-- BIOTIC -->
  <rect x="172" y="48" width="158" height="72" fill="#1a0d1a" stroke="#ab47bc" stroke-width="1" rx="4"/>
  <rect x="172" y="48" width="158" height="14" fill="#6a1b9a" rx="4"/>
  <text x="251" y="59" text-anchor="middle" fill="#f3e5f5" font-size="7.5" font-weight="bold" font-family="Arial">БИОТИЧЕСКИЕ</text>
  <!-- Competition icon - two arrows pushing -->
  <path d="M185,82 L195,76 L195,79 L205,79 L205,76 L215,82 L205,88 L205,85 L195,85 L195,88 Z" fill="#ce93d8" opacity="0.6"/>
  <!-- Predation icon -->
  <circle cx="237" cy="78" r="5" fill="#ef9a9a" stroke="#e57373" stroke-width="0.5"/>
  <path d="M244,78 L255,74 L252,78 L255,82 Z" fill="#e57373"/>
  <!-- Symbiosis icon -->
  <circle cx="282" cy="80" r="6" fill="#a5d6a7" opacity="0.6" stroke="#66bb6a" stroke-width="0.5"/>
  <circle cx="292" cy="80" r="6" fill="#90caf9" opacity="0.6" stroke="#42a5f5" stroke-width="0.5"/>
  <text x="251" y="107" text-anchor="middle" fill="#ce93d8" font-size="5.5" font-family="Arial">Конкуренция, хищничество, симбиоз</text>

  <!-- ANTHROPOGENIC -->
  <rect x="336" y="48" width="156" height="72" fill="#2a1a0a" stroke="#ff9800" stroke-width="1" rx="4"/>
  <rect x="336" y="48" width="156" height="14" fill="#e65100" rx="4"/>
  <text x="414" y="59" text-anchor="middle" fill="#fff3e0" font-size="7.5" font-weight="bold" font-family="Arial">АНТРОПОГЕННЫЕ</text>
  <!-- Factory -->
  <rect x="350" y="75" width="15" height="18" fill="#78909c"/>
  <rect x="353" y="72" width="4" height="6" fill="#546e7a"/>
  <path d="M353,72 L353,66 M357,72 L357,68" stroke="#78909c" stroke-width="1.5"/>
  <circle cx="353" cy="64" r="2.5" fill="#bdbdbd" opacity="0.4"/>
  <circle cx="357" cy="66" r="3" fill="#bdbdbd" opacity="0.3"/>
  <!-- Tree stump -->
  <rect x="380" y="85" width="5" height="8" fill="#795548"/>
  <line x1="382" y1="85" x2="382" y2="80" stroke="#5d4037" stroke-width="1" stroke-dasharray="1,1"/>
  <!-- City -->
  <rect x="400" y="78" width="8" height="15" fill="#607d8b"/>
  <rect x="412" y="82" width="10" height="11" fill="#78909c"/>
  <rect x="426" y="75" width="7" height="18" fill="#546e7a"/>
  <text x="414" y="107" text-anchor="middle" fill="#ffcc80" font-size="5.5" font-family="Arial">Загрязнение, вырубка, урбанизация</text>

  <!-- OPTIMUM CURVE - main diagram -->
  <rect x="8" y="126" width="290" height="170" fill="#0a1a0a" stroke="#66bb6a" stroke-width="1" rx="4"/>
  <text x="153" y="140" text-anchor="middle" fill="#a5d6a7" font-size="8" font-weight="bold" font-family="Arial">Кривая оптимума экологического фактора</text>
  
  <!-- Axes -->
  <line x1="40" y1="280" x2="275" y2="280" stroke="#81c784" stroke-width="1.5"/>
  <line x1="40" y1="280" x2="40" y2="150" stroke="#81c784" stroke-width="1.5" marker-end="url(#arr56)"/>
  <defs><marker id="arr56" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#81c784"/></marker></defs>
  
  <!-- Axis labels -->
  <text x="155" y="292" text-anchor="middle" fill="#a5d6a7" font-size="6" font-family="Arial">Интенсивность фактора</text>
  <text x="28" y="220" text-anchor="middle" fill="#a5d6a7" font-size="6" font-family="Arial" transform="rotate(-90,28,220)">Жизнедеятельность</text>
  
  <!-- The bell curve -->
  <path d="M50,278 Q65,276 80,270 Q95,260 110,240 Q125,210 140,180 Q155,160 165,155 Q175,160 190,180 Q205,210 220,240 Q235,260 250,270 Q265,276 270,278" stroke="#4caf50" stroke-width="2" fill="#4caf50" fill-opacity="0.15"/>
  
  <!-- Zone labels -->
  <!-- Pessimum left -->
  <line x1="50" y1="278" x2="50" y2="285" stroke="#ef5350" stroke-width="0.8"/>
  <line x1="105" y1="262" x2="105" y2="285" stroke="#ff9800" stroke-width="0.8"/>
  <line x1="210" y1="262" x2="210" y2="285" stroke="#ff9800" stroke-width="0.8"/>
  <line x1="270" y1="278" x2="270" y2="285" stroke="#ef5350" stroke-width="0.8"/>
  
  <text x="77" y="296" text-anchor="middle" fill="#ef5350" font-size="5.5" font-family="Arial">Пессимум</text>
  <text x="77" y="303" text-anchor="middle" fill="#ef5350" font-size="5" font-family="Arial">(минимум)</text>
  <text x="157" y="296" text-anchor="middle" fill="#4caf50" font-size="6" font-weight="bold" font-family="Arial">Оптимум</text>
  <text x="240" y="296" text-anchor="middle" fill="#ef5350" font-size="5.5" font-family="Arial">Пессимум</text>
  <text x="240" y="303" text-anchor="middle" fill="#ef5350" font-size="5" font-family="Arial">(максимум)</text>
  
  <!-- Optimum zone highlight -->
  <rect x="105" y="270" width="105" height="12" fill="#4caf50" opacity="0.15" rx="2"/>
  
  <!-- Critical zones -->
  <text x="50" y="272" fill="#e57373" font-size="4.5" font-family="Arial">Гибель↓</text>
  <text x="262" y="272" fill="#e57373" font-size="4.5" font-family="Arial">↓Гибель</text>

  <!-- Law of limiting factors (Liebig's barrel) -->
  <rect x="306" y="126" width="186" height="170" fill="#1a1a0a" stroke="#ff9800" stroke-width="1" rx="4"/>
  <text x="399" y="140" text-anchor="middle" fill="#ffcc80" font-size="7" font-weight="bold" font-family="Arial">Закон ограничивающего фактора</text>
  <text x="399" y="150" text-anchor="middle" fill="#ffa726" font-size="6" font-family="Arial">(Закон Либиха)</text>
  
  <!-- Barrel illustration -->
  <rect x="360" y="185" width="50" height="70" fill="#5d4037" stroke="#795548" stroke-width="1" rx="3"/>
  <!-- Different height staves -->
  <line x1="365" y1="185" x2="365" y2="255" stroke="#8d6e63" stroke-width="2"/>
  <line x1="375" y1="185" x2="375" y2="255" stroke="#8d6e63" stroke-width="2"/>
  <line x1="385" y1="185" x2="385" y2="220" stroke="#e57373" stroke-width="2"/>
  <line x1="395" y1="185" x2="395" y2="255" stroke="#8d6e63" stroke-width="2"/>
  <line x1="405" y1="185" x2="405" y2="255" stroke="#8d6e63" stroke-width="2"/>
  <!-- Water level at lowest stave -->
  <rect x="362" y="218" width="42" height="37" fill="#29b6f6" opacity="0.3"/>
  <line x1="362" y1="218" x2="404" y2="218" stroke="#29b6f6" stroke-width="0.8" stroke-dasharray="2,1"/>
  
  <!-- Labels for staves -->
  <text x="385" y="178" text-anchor="middle" fill="#ef5350" font-size="5" font-family="Arial">↓Ограничивающий</text>
  <text x="385" y="170" text-anchor="middle" fill="#e57373" font-size="4" font-family="Arial">фактор</text>
  <line x1="385" y1="180" x2="385" y2="184" stroke="#e57373" stroke-width="0.5"/>
  
  <!-- Stave labels -->
  <text x="320" y="195" fill="#bcaaa4" font-size="4.5" font-family="Arial">Свет →</text>
  <text x="320" y="210" fill="#bcaaa4" font-size="4.5" font-family="Arial">Тепло →</text>
  <text x="320" y="228" fill="#e57373" font-size="4.5" font-weight="bold" font-family="Arial">Вода →</text>
  <text x="415" y="200" fill="#bcaaa4" font-size="4.5" font-family="Arial">← Пища</text>
  <text x="415" y="215" fill="#bcaaa4" font-size="4.5" font-family="Arial">← Минер.</text>
  
  <text x="399" y="272" text-anchor="middle" fill="#ffcc80" font-size="5" font-family="Arial">Уровень воды =</text>
  <text x="399" y="280" text-anchor="middle" fill="#ffa726" font-size="5.5" font-weight="bold" font-family="Arial">жизнеспособность</text>
  <text x="399" y="290" text-anchor="middle" fill="#ff8f00" font-size="5" font-family="Arial">определяется наименее</text>
  <text x="399" y="298" text-anchor="middle" fill="#ff8f00" font-size="5" font-family="Arial">выраженным фактором</text>

  <!-- Photoperiodism note at bottom -->
  <rect x="8" y="302" width="484" height="40" fill="#0d1a0d" stroke="#26a69a" stroke-width="1" rx="4"/>
  <text x="250" y="316" text-anchor="middle" fill="#80cbc4" font-size="7" font-weight="bold" font-family="Arial">Фотопериодизм — реакция организмов на смену длины дня и ночи</text>
  <text x="250" y="328" text-anchor="middle" fill="#4db6ac" font-size="6" font-family="Arial">Длинный день → цветение растений летом • Короткий день → листопад осенью • Сезонная миграция птиц</text>
  <text x="250" y="338" text-anchor="middle" fill="#26a69a" font-size="5.5" font-family="Arial">Закон толерантности Шелфорда: ограничивающим может быть как минимум, так и максимум фактора</text>
</svg>