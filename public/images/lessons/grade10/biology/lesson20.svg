<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Фотосинтез и хемосинтез</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 17</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Sun -->
    <circle cx="80" cy="120" r="25" fill="#FFEE58" stroke="#F9A825" stroke-width="2"/>
    <line x1="80" y1="90" x2="80" y2="80" stroke="#FFEE58" stroke-width="2"/>
    <line x1="55" y1="95" x2="48" y2="88" stroke="#FFEE58" stroke-width="2"/>
    <line x1="105" y1="95" x2="112" y2="88" stroke="#FFEE58" stroke-width="2"/>
    <line x1="50" y1="120" x2="40" y2="120" stroke="#FFEE58" stroke-width="2"/>
    <line x1="110" y1="120" x2="120" y2="120" stroke="#FFEE58" stroke-width="2"/>
    <text x="80" y="124" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">Свет</text>
    
    <!-- Chloroplast -->
    <ellipse cx="250" cy="170" rx="90" ry="55" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2"/>
    <!-- Thylakoids -->
    <ellipse cx="220" cy="160" rx="20" ry="10" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
    <ellipse cx="260" cy="155" rx="22" ry="10" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
    <ellipse cx="280" cy="175" rx="18" ry="8" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
    <text x="250" y="200" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Хлоропласт</text>
    
    <!-- Arrow from sun -->
    <line x1="110" y1="130" x2="170" y2="155" stroke="#FFA726" stroke-width="2" marker-end="url(#arr)"/>
    
    <!-- Equation -->
    <rect x="100" y="240" width="300" height="50" rx="5" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="250" y="258" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">6CO2 + 6H2O + свет &#x2192; C6H12O6 + 6O2</text>
    <text x="250" y="275" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Световая и темновая фазы</text>
    
    <!-- CO2 and H2O inputs -->
    <text x="30" y="180" font-family="Arial,sans-serif" font-size="9" fill="#78909C" text-anchor="middle">CO2</text>
    <line x1="50" y1="180" x2="160" y2="170" stroke="#78909C" stroke-width="1.5"/>
    <text x="30" y="200" font-family="Arial,sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">H2O</text>
    <line x1="50" y1="200" x2="160" y2="185" stroke="#42A5F5" stroke-width="1.5"/>
    
    <!-- O2 output -->
    <text x="410" y="150" font-family="Arial,sans-serif" font-size="9" fill="#66BB6A" text-anchor="middle">O2</text>
    <line x1="340" y1="160" x2="400" y2="150" stroke="#66BB6A" stroke-width="1.5"/>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Превращение энергии в живых системах</text>
</svg>