<rect x="-15" y="-35" width="30" height="70" rx="8" fill="#42A5F5" opacity="0.5" stroke="#1565C0" stroke-width="1.5"/>
<text x="0" y="2" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">Белок</text>
</g>
<rect x="30" y="270" width="440" height="35" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="284" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Жидкостно-мозаичная модель: фосфолипидный бислой + белки</text>
<text x="250" y="295" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Транспорт: диффузия, осмос, облегчённая диффузия, активный транспорт</text>
<text x="250" y="306" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Функции: барьерная, транспортная, рецепторная, ферментативная, межклеточная</text>

