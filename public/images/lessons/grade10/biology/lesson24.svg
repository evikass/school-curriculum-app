<rect x="140" y="30" width="35" height="20" rx="5" fill="#FFB74D" stroke="#E65100" stroke-width="1"/>
<text x="157" y="44" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">nc</text>
</g>
<rect x="30" y="280" width="440" height="30" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="294" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Мейоз: 2n -> 4 x nc | Редукционное деление | Гомологичные хромосомы расходятся</text>
