<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Прокариоты и эукариоты</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 14</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Left: Prokaryote -->
    <rect x="20" y="90" width="215" height="200" rx="6" fill="#E3F2FD" opacity="0.4"/>
    <text x="127" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">Прокариоты</text>
    
    <!-- Bacterium shape -->
    <ellipse cx="127" cy="175" rx="65" ry="40" fill="#BBDEFB" stroke="#42A5F5" stroke-width="2"/>
    <!-- Cell wall -->
    <ellipse cx="127" cy="175" rx="65" ry="40" fill="none" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,2"/>
    <!-- Nucleoid -->
    <ellipse cx="127" cy="175" rx="22" ry="15" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/>
    <text x="127" y="178" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">ДНК</text>
    <!-- Ribosomes -->
    <circle cx="100" cy="195" r="3" fill="#64B5F6"/>
    <circle cx="155" cy="190" r="3" fill="#64B5F6"/>
    <circle cx="140" cy="200" r="3" fill="#64B5F6"/>
    <!-- Flagellum -->
    <path d="M192,175 Q210,170 220,180 Q230,190 240,185" fill="none" stroke="#42A5F5" stroke-width="1.5"/>
    <!-- Plasmid -->
    <circle cx="95" cy="165" r="8" fill="none" stroke="#1565C0" stroke-width="1"/>
    <text x="127" y="230" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Нет ядра, 70S рибосомы</text>
    <text x="127" y="242" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Кольцевая ДНК, плазмиды</text>
    <text x="127" y="254" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">0,5-5 мкм</text>
    
    <!-- Right: Eukaryote -->
    <rect x="265" y="90" width="215" height="200" rx="6" fill="#E8F5E9" opacity="0.4"/>
    <text x="372" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#2E7D32" text-anchor="middle">Эукариоты</text>
    
    <!-- Eukaryotic cell -->
    <ellipse cx="372" cy="180" rx="75" ry="50" fill="#C8E6C9" stroke="#66BB6A" stroke-width="2"/>
    <!-- Nucleus -->
    <ellipse cx="372" cy="175" rx="25" ry="20" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2"/>
    <text x="372" y="178" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Ядро</text>
    <!-- Mitochondria -->
    <ellipse cx="330" cy="160" rx="18" ry="8" fill="#81C784" stroke="#2E7D32" stroke-width="1" transform="rotate(-15,330,160)"/>
    <!-- ER -->
    <path d="M400,150 Q415,155 400,160 Q415,165 400,170" fill="none" stroke="#66BB6A" stroke-width="1.5"/>
    <!-- Golgi -->
    <path d="M340,210 Q355,207 370,210 Q355,213 340,210" fill="none" stroke="#43A047" stroke-width="1.5"/>
    <path d="M342,215 Q355,212 368,215" fill="none" stroke="#43A047" stroke-width="1.5"/>
    
    <text x="372" y="230" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Есть ядро, 80S рибосомы</text>
    <text x="372" y="242" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Мембранные органеллы</text>
    <text x="372" y="254" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">10-100 мкм</text>
    
    <!-- VS -->
    <text x="250" y="180" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#FF7043" text-anchor="middle">VS</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Сравнение типов клеток</text>
</svg>