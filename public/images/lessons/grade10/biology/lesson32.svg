<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#66BB6A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#66BB6A" text-anchor="middle">Генетика человека</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 27</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#66BB6A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#F1F8E9" opacity="0.5"/>

    <!-- Human karyotype -->
    <text x="150" y="103" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Кариотип человека 2n=46</text>
    
    <!-- Simplified chromosome rows -->
    <rect x="25" y="112" width="250" height="22" rx="2" fill="#E3F2FD"/>
    <line x1="35" y1="118" x2="35" y2="128" stroke="#42A5F5" stroke-width="2.5"/>
    <line x1="40" y1="118" x2="40" y2="128" stroke="#42A5F5" stroke-width="2.5"/>
    <line x1="55" y1="119" x2="55" y2="127" stroke="#42A5F5" stroke-width="2"/>
    <line x1="60" y1="119" x2="60" y2="127" stroke="#42A5F5" stroke-width="2"/>
    <line x1="75" y1="120" x2="75" y2="126" stroke="#42A5F5" stroke-width="2"/>
    <line x1="80" y1="120" x2="80" y2="126" stroke="#42A5F5" stroke-width="2"/>
    <line x1="95" y1="120" x2="95" y2="125" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="100" y1="120" x2="100" y2="125" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="115" y1="121" x2="115" y2="124" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="120" y1="121" x2="120" y2="124" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="135" y1="121" x2="135" y2="124" stroke="#42A5F5" stroke-width="1.5"/>
    <line x1="140" y1="121" x2="140" y2="124" stroke="#42A5F5" stroke-width="1.5"/>
    <text x="185" y="125" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Аутосомы 1-6</text>
    
    <rect x="25" y="138" width="250" height="22" rx="2" fill="#E8F5E9"/>
    <line x1="35" y1="144" x2="35" y2="154" stroke="#66BB6A" stroke-width="2"/>
    <line x1="40" y1="144" x2="40" y2="154" stroke="#66BB6A" stroke-width="2"/>
    <line x1="55" y1="145" x2="55" y2="153" stroke="#66BB6A" stroke-width="2"/>
    <line x1="60" y1="145" x2="60" y2="153" stroke="#66BB6A" stroke-width="2"/>
    <line x1="75" y1="146" x2="75" y2="152" stroke="#66BB6A" stroke-width="1.5"/>
    <line x1="80" y1="146" x2="80" y2="152" stroke="#66BB6A" stroke-width="1.5"/>
    <line x1="95" y1="147" x2="95" y2="151" stroke="#66BB6A" stroke-width="1.5"/>
    <line x1="100" y1="147" x2="100" y2="151" stroke="#66BB6A" stroke-width="1.5"/>
    <text x="185" y="150" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Аутосомы 7-12</text>
    
    <rect x="25" y="164" width="250" height="22" rx="2" fill="#FFF3E0"/>
    <line x1="35" y1="170" x2="35" y2="180" stroke="#FFA726" stroke-width="1.5"/>
    <line x1="40" y1="170" x2="40" y2="180" stroke="#FFA726" stroke-width="1.5"/>
    <line x1="55" y1="171" x2="55" y2="179" stroke="#FFA726" stroke-width="1.5"/>
    <line x1="60" y1="171" x2="60" y2="179" stroke="#FFA726" stroke-width="1.5"/>
    <line x1="75" y1="172" x2="75" y2="178" stroke="#FFA726" stroke-width="1"/>
    <line x1="80" y1="172" x2="80" y2="178" stroke="#FFA726" stroke-width="1"/>
    <!-- Sex chromosomes -->
    <line x1="95" y1="170" x2="95" y2="180" stroke="#EF5350" stroke-width="2"/>
    <line x1="100" y1="172" x2="100" y2="178" stroke="#EF5350" stroke-width="1.5"/>
    <text x="115" y="177" font-family="Arial,sans-serif" font-size="7" fill="#C62828">XX / XY</text>
    
    <!-- Inheritance patterns -->
    <rect x="300" y="112" width="175" height="180" rx="5" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
    <text x="387" y="128" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Наследование</text>
    
    <rect x="310" y="135" width="155" height="30" rx="3" fill="#C8E6C9"/>
    <text x="387" y="148" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Аутосомно-доминантное</text>
    <text x="387" y="160" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Полидактилия, ахондроплазия</text>
    
    <rect x="310" y="170" width="155" height="30" rx="3" fill="#DCEDC8"/>
    <text x="387" y="183" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Аутосомно-рецессивное</text>
    <text x="387" y="195" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Альбинизм, фенилкетонурия</text>
    
    <rect x="310" y="205" width="155" height="30" rx="3" fill="#A5D6A7"/>
    <text x="387" y="218" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сцепленное с X-хр.</text>
    <text x="387" y="230" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Дальтонизм, гемофилия</text>
    
    <text x="387" y="260" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Медико-генетическое</text>
    <text x="387" y="273" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">консультирование</text>

  </g>
  <text x="250" y="325" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Наследственные заболевания</text>
</svg>