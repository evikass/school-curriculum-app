<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#FF7043" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#FF7043" text-anchor="middle">Механизмы реакций</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 12</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#FF7043" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#FFF8F0" opacity="0.5"/>
    
    <!-- Reaction coordinate diagram -->
    <rect x="20" y="90" width="280" height="120" rx="4" fill="#FFF3E0" stroke="#FF7043" stroke-width="1"/>
    <text x="160" y="105" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">Энергетическая диаграмма</text>
    
    <!-- Axes -->
    <line x1="45" y1="195" x2="45" y2="115" stroke="#555" stroke-width="1.5"/>
    <line x1="45" y1="195" x2="280" y2="195" stroke="#555" stroke-width="1.5"/>
    <text x="28" y="155" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle" transform="rotate(-90,28,155)">Энергия</text>
    <text x="160" y="207" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Ход реакции</text>
    
    <!-- Reaction curve (exothermic) -->
    <path d="M55,175 C80,175 100,160 130,125 C145,110 155,110 170,125 C190,145 210,170 265,185" fill="none" stroke="#FF7043" stroke-width="2.5"/>
    
    <!-- Labels on diagram -->
    <text x="65" y="170" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Реагенты</text>
    <text x="150" y="108" font-family="Arial,sans-serif" font-size="7" fill="#D84315" text-anchor="middle">Переходное</text>
    <text x="150" y="117" font-family="Arial,sans-serif" font-size="7" fill="#D84315" text-anchor="middle">состояние</text>
    <text x="245" y="180" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Продукты</text>
    
    <!-- Activation energy arrow -->
    <line x1="100" y1="175" x2="100" y2="125" stroke="#E53935" stroke-width="1.5"/>
    <line x1="96" y1="175" x2="104" y2="175" stroke="#E53935" stroke-width="1"/>
    <line x1="96" y1="125" x2="104" y2="125" stroke="#E53935" stroke-width="1"/>
    <text x="82" y="150" font-family="Arial,sans-serif" font-size="8" fill="#E53935" text-anchor="middle">Ea</text>
    
    <!-- Energy released -->
    <line x1="220" y1="175" x2="220" y2="185" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="235" y="183" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50" text-anchor="middle">dH</text>
    
    <!-- Radical mechanism (right side) -->
    <rect x="310" y="90" width="175" height="55" rx="4" fill="#FFE0B2" stroke="#FF7043" stroke-width="1"/>
    <text x="397" y="105" font-family="Arial,sans-serif" font-size="10" fill="#D84315" text-anchor="middle">Радикальный</text>
    <text x="397" y="117" font-family="Arial,sans-serif" font-size="10" fill="#D84315" text-anchor="middle">механизм</text>
    <text x="397" y="133" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Cl2 -&gt; 2Cl* (радикалы)</text>
    <text x="397" y="143" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Cl* + CH4 -&gt; CH3* + HCl</text>
    
    <!-- Ionic mechanism -->
    <rect x="310" y="150" width="175" height="55" rx="4" fill="#FFE0B2" stroke="#FF7043" stroke-width="1"/>
    <text x="397" y="165" font-family="Arial,sans-serif" font-size="10" fill="#D84315" text-anchor="middle">Ионный механизм</text>
    <text x="397" y="180" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Электрофильное</text>
    <text x="397" y="190" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">присоединение</text>
    <text x="397" y="200" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">C=C + H+ -&gt; C-C+ + H</text>
    
    <!-- Key concepts -->
    <rect x="20" y="218" width="460" height="80" rx="4" fill="#FFF3E0" stroke="#FF7043" stroke-width="1"/>
    <text x="250" y="233" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">Ключевые понятия:</text>
    <text x="140" y="248" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Ea - энергия активации</text>
    <text x="360" y="248" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Катализатор снижает Ea</text>
    <text x="140" y="263" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50" text-anchor="middle">dH &lt; 0 - экзотермическая</text>
    <text x="360" y="263" font-family="Arial,sans-serif" font-size="9" fill="#E53935" text-anchor="middle">dH &gt; 0 - эндотермическая</text>
    <text x="250" y="280" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Переходное состояние - максимум энергии</text>
    <text x="250" y="293" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Интермедиат - промежуточное соединение</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Химия</text>
</svg>