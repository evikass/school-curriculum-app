<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg)"/>
  <rect y="44" width="400" height="8" fill="url(#tg)"/>
  <text x="200" y="24" text-anchor="middle" fill="#fff" font-family="Arial" font-size="13" font-weight="bold">Амины</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial" font-size="10">Химия 10 класс • Урок 33</text>
  <rect x="10" y="60" width="185" height="110" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh)"/>
  <text x="22" y="78" font-family="Arial" font-size="11" font-weight="bold" fill="#10b981">Классификация аминов</text>
  <circle cx="22" cy="93" r="3" fill="#10b981"/><text x="32" y="97" font-family="Arial" font-size="9.5" fill="#e2e8f0">Первичные: R-NH2 (1 радикал)</text>
  <circle cx="22" cy="108" r="3" fill="#10b981"/><text x="32" y="112" font-family="Arial" font-size="9.5" fill="#e2e8f0">Вторичные: R2NH (2 радикала)</text>
  <circle cx="22" cy="123" r="3" fill="#10b981"/><text x="32" y="127" font-family="Arial" font-size="9.5" fill="#e2e8f0">Третичные: R3N (3 радикала)</text>
  <circle cx="22" cy="138" r="3" fill="#10b981"/><text x="32" y="142" font-family="Arial" font-size="9.5" fill="#e2e8f0">Алифатические: CH3NH2</text>
  <circle cx="22" cy="153" r="3" fill="#10b981"/><text x="32" y="157" font-family="Arial" font-size="9.5" fill="#e2e8f0">Ароматические: C6H5NH2 (анилин)</text>
  <rect x="205" y="60" width="185" height="110" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh)"/>
  <text x="217" y="78" font-family="Arial" font-size="11" font-weight="bold" fill="#a855f7">Химические свойства</text>
  <circle cx="217" cy="93" r="3" fill="#a855f7"/><text x="227" y="97" font-family="Arial" font-size="9.5" fill="#e2e8f0">Основания: R-NH2 + HCl → [RNH3]Cl</text>
  <circle cx="217" cy="108" r="3" fill="#a855f7"/><text x="227" y="112" font-family="Arial" font-size="9.5" fill="#e2e8f0">Горение: 4CH3NH2 + 9O2 → 4CO2+</text>
  <text x="227" y="123" font-family="Arial" font-size="9" fill="#94a3b8">+ 2N2 + 10H2O</text>
  <circle cx="217" cy="138" r="3" fill="#a855f7"/><text x="227" y="142" font-family="Arial" font-size="9.5" fill="#e2e8f0">Ацилирование: + CH3COCl →</text>
  <text x="227" y="153" font-family="Arial" font-size="9" fill="#94a3b8">→ амид R-NH-COCH3</text>
  <rect x="10" y="178" width="185" height="112" rx="6" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1" filter="url(#sh)"/>
  <text x="22" y="196" font-family="Arial" font-size="11" font-weight="bold" fill="#f59e0b">Анилин C6H5NH2</text>
  <circle cx="22" cy="212" r="3" fill="#f59e0b"/><text x="32" y="216" font-family="Arial" font-size="9.5" fill="#e2e8f0">Слабое основание</text>
  <circle cx="22" cy="228" r="3" fill="#f59e0b"/><text x="32" y="232" font-family="Arial" font-size="9.5" fill="#e2e8f0">Бромирование: + 3Br2 →</text>
  <text x="32" y="243" font-family="Arial" font-size="9" fill="#94a3b8">→ 2,4,6-триброманилин (белый)</text>
  <circle cx="22" cy="258" r="3" fill="#f59e0b"/><text x="32" y="262" font-family="Arial" font-size="9.5" fill="#e2e8f0">Реакция Зинина: C6H5NO2 → C6H5NH2</text>
  <text x="32" y="276" font-family="Arial" font-size="9" fill="#10b981">Восстановление нитробензола</text>
  <rect x="205" y="178" width="185" height="112" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh)"/>
  <text x="217" y="196" font-family="Arial" font-size="11" font-weight="bold" fill="#3b82f6">Основность аминов</text>
  <text x="217" y="214" font-family="Arial" font-size="9.5" fill="#e2e8f0">Сила основания зависит от</text>
  <text x="217" y="228" font-family="Arial" font-size="9.5" fill="#e2e8f0">электронодонорности R:</text>
  <text x="217" y="248" font-family="Arial" font-size="10" fill="#f59e0b">R3N > R2NH > RNH2 > NH3</text>
  <text x="217" y="268" font-family="Arial" font-size="10" fill="#ef4444">NH3 > C6H5NH2 (анилин)</text>
  <text x="217" y="284" font-family="Arial" font-size="9" fill="#94a3b8">Бензольное кольцо оттягивает e- пару</text>
</svg>
