<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg13" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <filter id="sh13" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg13)"/>
  <rect y="44" width="400" height="8" fill="url(#tg13)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Спирты: строение, изомерия</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: OH group -->
    <rect x="10" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#ef4444" stroke-width="1" filter="url(#sh13)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Функциональная группа -OH</text>
  <circle cx="105" cy="118" r="14" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="105" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">O</text>
  <line x1="119" y1="118" x2="140" y2="118" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="147" y="122" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">H</text>
  <line x1="91" y1="118" x2="70" y2="118" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="55" y="122" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0">R</text>
    <text x="22" y="148" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Водородная связь H–O</text>
    <text x="22" y="161" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">→ высокие t кип. спиртов</text>

  <!-- Top right: Classification -->
    <rect x="205" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh13)"/>
    <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Классификация спиртов</text>
    <text x="217" y="95" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Первичный:</text>
    <text x="217" y="107" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">R-CH2-OH (1 группа при C)</text>
    <text x="217" y="121" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Вторичный:</text>
    <text x="217" y="133" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">R2CH-OH (2 группы при C)</text>
    <text x="217" y="147" font-family="Arial, sans-serif" font-size="9" fill="#ef4444">Третичный:</text>
    <text x="217" y="159" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">R3C-OH (3 группы при C)</text>

  <!-- Bottom left: Homologs -->
    <rect x="10" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh13)"/>
    <text x="22" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Гомологический ряд</text>
    <text x="22" y="210" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">CH3OH — метанол</text>
    <text x="22" y="222" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">C2H5OH — этанол</text>
    <text x="22" y="234" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">C3H7OH — пропанол</text>
    <text x="22" y="246" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">C4H9OH — бутанол</text>
    <text x="22" y="262" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">CnH2n+1OH — общ. ф-ла</text>
    <text x="22" y="276" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">Суффикс: -ОЛ</text>

  <!-- Bottom right: Isomerism -->
    <rect x="205" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh13)"/>
    <text x="217" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Изомерия спиртов</text>
    <text x="217" y="210" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">C4H9OH — 4 изомера:</text>
    <text x="217" y="223" font-family="Arial, sans-serif" font-size="8.5" fill="#14b8a6">Бутанол-1:</text>
    <text x="217" y="234" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">CH3-CH2-CH2-CH2OH</text>
    <text x="217" y="246" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">Бутанол-2:</text>
    <text x="217" y="257" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">CH3-CH(OH)-CH2-CH3</text>
    <text x="217" y="269" font-family="Arial, sans-serif" font-size="8.5" fill="#ef4444">2-Метилпропанол-1</text>
    <text x="217" y="282" font-family="Arial, sans-serif" font-size="8.5" fill="#ef4444">2-Метилпропанол-2</text>
</svg>