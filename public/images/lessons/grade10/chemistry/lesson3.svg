<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#FF7043" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#FF7043" text-anchor="middle">Классификация и номенклатура</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#FF7043" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#FFF8F0" opacity="0.5"/>
    
    <!-- Classification tree -->
    <!-- Root: Углеводороды -->
    <rect x="170" y="90" width="160" height="24" rx="5" fill="#D84315"/>
    <text x="250" y="107" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">Углеводороды</text>
    
    <!-- Branch lines -->
    <line x1="200" y1="114" x2="80" y2="130" stroke="#FF7043" stroke-width="1.5"/>
    <line x1="250" y1="114" x2="250" y2="130" stroke="#FF7043" stroke-width="1.5"/>
    <line x1="300" y1="114" x2="420" y2="130" stroke="#FF7043" stroke-width="1.5"/>
    
    <!-- Level 2: Предельные, Непредельные, Арены -->
    <rect x="20" y="130" width="120" height="22" rx="4" fill="#FF8A65"/>
    <text x="80" y="145" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">Предельные</text>
    <rect x="190" y="130" width="120" height="22" rx="4" fill="#FF8A65"/>
    <text x="250" y="145" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">Непредельные</text>
    <rect x="360" y="130" width="120" height="22" rx="4" fill="#FF8A65"/>
    <text x="420" y="145" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle">Арены</text>
    
    <!-- Level 3 specifics -->
    <line x1="80" y1="152" x2="55" y2="162" stroke="#aaa" stroke-width="1"/>
    <line x1="80" y1="152" x2="105" y2="162" stroke="#aaa" stroke-width="1"/>
    <rect x="20" y="162" width="70" height="20" rx="3" fill="#FFE0B2"/>
    <text x="55" y="176" font-family="Arial,sans-serif" font-size="9" fill="#D84315" text-anchor="middle">Алканы</text>
    <rect x="70" y="162" width="70" height="20" rx="3" fill="#FFE0B2"/>
    <text x="105" y="176" font-family="Arial,sans-serif" font-size="8" fill="#D84315" text-anchor="middle">Циклоалканы</text>
    
    <line x1="220" y1="152" x2="200" y2="162" stroke="#aaa" stroke-width="1"/>
    <line x1="250" y1="152" x2="250" y2="162" stroke="#aaa" stroke-width="1"/>
    <line x1="280" y1="152" x2="300" y2="162" stroke="#aaa" stroke-width="1"/>
    <rect x="160" y="162" width="80" height="20" rx="3" fill="#FFE0B2"/>
    <text x="200" y="176" font-family="Arial,sans-serif" font-size="9" fill="#D84315" text-anchor="middle">Алкены</text>
    <rect x="210" y="162" width="80" height="20" rx="3" fill="#FFE0B2"/>
    <text x="250" y="176" font-family="Arial,sans-serif" font-size="9" fill="#D84315" text-anchor="middle">Алкадиены</text>
    <rect x="260" y="162" width="80" height="20" rx="3" fill="#FFE0B2"/>
    <text x="300" y="176" font-family="Arial,sans-serif" font-size="9" fill="#D84315" text-anchor="middle">Алкины</text>
    
    <line x1="420" y1="152" x2="420" y2="162" stroke="#aaa" stroke-width="1"/>
    <rect x="370" y="162" width="100" height="20" rx="3" fill="#FFE0B2"/>
    <text x="420" y="176" font-family="Arial,sans-serif" font-size="9" fill="#D84315" text-anchor="middle">Бензол и др.</text>
    
    <!-- IUPAC Nomenclature rules -->
    <rect x="20" y="192" width="460" height="48" rx="4" fill="#FFF3E0" stroke="#FF7043" stroke-width="1"/>
    <text x="250" y="207" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">Правила номенклатуры IUPAC:</text>
    <text x="250" y="220" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">1. Выбрать главную цепь  2. Пронумеровать атомы C</text>
    <text x="250" y="232" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">3. Назвать заместители  4. Составить название</text>
    
    <!-- Example: 2-метилбутан -->
    <text x="250" y="255" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">Пример:</text>
    <!-- C-C(C)-C-C structure -->
    <circle cx="100" cy="278" r="13" fill="#333" opacity="0.85"/>
    <text x="100" y="283" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C1</text>
    <circle cx="150" cy="278" r="13" fill="#333" opacity="0.85"/>
    <text x="150" y="283" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C2</text>
    <circle cx="200" cy="278" r="13" fill="#333" opacity="0.85"/>
    <text x="200" y="283" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C3</text>
    <circle cx="250" cy="278" r="13" fill="#333" opacity="0.85"/>
    <text x="250" y="283" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C4</text>
    <circle cx="150" cy="245" r="13" fill="#E65100" opacity="0.85"/>
    <text x="150" y="250" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <line x1="113" y1="278" x2="137" y2="278" stroke="#555" stroke-width="2.5"/>
    <line x1="163" y1="278" x2="187" y2="278" stroke="#555" stroke-width="2.5"/>
    <line x1="213" y1="278" x2="237" y2="278" stroke="#555" stroke-width="2.5"/>
    <line x1="150" y1="265" x2="150" y2="258" stroke="#555" stroke-width="2.5"/>
    <text x="100" y="298" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">H3C</text>
    <text x="150" y="298" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">CH</text>
    <text x="200" y="298" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">CH2</text>
    <text x="250" y="298" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">CH3</text>
    <text x="168" y="245" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">CH3</text>
    
    <!-- Arrow to name -->
    <line x1="270" y1="278" x2="310" y2="278" stroke="#FF7043" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="320" y="265" width="150" height="28" rx="4" fill="#FFCCBC" stroke="#D84315" stroke-width="1"/>
    <text x="395" y="278" font-family="Arial,sans-serif" font-size="12" fill="#D84315" text-anchor="middle">2-метилбутан</text>
    <text x="395" y="293" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">(IUPAC)</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Химия</text>
</svg>