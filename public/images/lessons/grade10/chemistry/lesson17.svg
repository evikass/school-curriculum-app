<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg17" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ca8a04"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="sh17" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg17)"/>
  <rect y="44" width="400" height="8" fill="url(#tg17)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Сложные эфиры. Жиры</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Ester structure -->
    <rect x="10" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1" filter="url(#sh17)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">Строение сложных эфиров</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Общая формула:</text>
  <rect x="30" y="100" width="100" height="25" rx="4" fill="none" stroke="#f59e0b" stroke-width="1"/>
    <text x="35" y="118" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">R-COO-R'</text>
    <text x="22" y="142" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">R — от кислоты</text>
    <text x="22" y="155" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">R' — от спирта</text>
    <text x="22" y="168" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Приятный запах (фрукты)</text>

  <!-- Top right: Esterification & hydrolysis -->
    <rect x="205" y="60" width="185" height="108" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh17)"/>
    <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Этерификация и гидролиз</text>
    <text x="217" y="94" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Этерификация:</text>
    <text x="217" y="106" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">R-COOH + R'-OH ↔</text>
    <text x="217" y="117" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  R-COO-R' + H2O</text>
    <text x="217" y="133" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Гидролиз (обратная):</text>
    <text x="217" y="145" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">R-COO-R' + H2O →</text>
    <text x="217" y="156" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">  R-COOH + R'-OH</text>

  <!-- Bottom left: Fats -->
    <rect x="10" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#ef4444" stroke-width="1" filter="url(#sh17)"/>
    <text x="22" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Жиры (триглицериды)</text>
    <text x="22" y="210" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Глицерин + 3 жирн. к-ты</text>
    <text x="22" y="224" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Жидкие — масла</text>
    <text x="22" y="236" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">(ненасыщ. жирн. к-ты)</text>
    <text x="22" y="250" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Твёрдые — жиры</text>
    <text x="22" y="262" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">(насыщ. жирн. к-ты)</text>
    <text x="22" y="278" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Гидрирование масел →</text>

  <!-- Bottom right: Saponification -->
    <rect x="205" y="176" width="185" height="114" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh17)"/>
    <text x="217" y="194" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Омыление (мыловарение)</text>
    <text x="217" y="210" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Жир + NaOH →</text>
    <text x="217" y="222" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Глицерин + Мыло</text>
    <text x="217" y="236" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Мыло — натриевая соль</text>
    <text x="217" y="248" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">жирной кислоты</text>
    <text x="217" y="262" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">R-COONa — мыло</text>
    <text x="217" y="276" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">Щелочной гидролиз жиров</text>
</svg>