<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Полимеры: пластмассы, волокна, каучуки</text>

  <!-- Polymerization vs Polycondensation -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="355" height="200" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
    <text x="177" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#60a5fa" text-anchor="middle">Полимеризация</text>

    <!-- Monomers joining -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="35" height="25" rx="4" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
      <text x="17" y="17" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">M</text>
      <text x="42" y="17" font-family="Arial, sans-serif" font-size="14" fill="#60a5fa">+</text>
      <rect x="55" y="0" width="35" height="25" rx="4" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
      <text x="72" y="17" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">M</text>
      <text x="97" y="17" font-family="Arial, sans-serif" font-size="14" fill="#60a5fa">+</text>
      <rect x="110" y="0" width="35" height="25" rx="4" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
      <text x="127" y="17" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">M</text>
      <text x="155" y="17" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0">=</text>
      <rect x="170" y="-5" width="160" height="35" rx="4" fill="#3b82f6" opacity="0.5" stroke="#60a5fa" stroke-width="1.5"/>
      <text x="250" y="17" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">-M-M-M-</text>
    </g>

    <text x="177" y="90" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Без выделения побочных веществ</text>

    <!-- Examples -->
    <g transform="translate(15, 105)">
      <rect x="0" y="0" width="325" height="75" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="0.5"/>
      <text x="162" y="17" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#60a5fa" text-anchor="middle">Примеры:</text>
      <text x="15" y="35" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Полиэтилен (-CH2-CH2-)n</text>
      <text x="15" y="50" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Полипропилен, ПВХ, тефлон</text>
      <text x="15" y="65" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Полистирол, полиизопрен (каучук)</text>
    </g>
  </g>

  <g transform="translate(415, 70)">
    <rect x="0" y="0" width="355" height="200" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <text x="177" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle">Поликонденсация</text>

    <!-- Monomers with byproduct -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="35" height="25" rx="4" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1"/>
      <text x="17" y="17" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">M</text>
      <text x="42" y="17" font-family="Arial, sans-serif" font-size="14" fill="#fbbf24">+</text>
      <rect x="55" y="0" width="35" height="25" rx="4" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="1"/>
      <text x="72" y="17" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">M</text>
      <text x="97" y="17" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0">=</text>
      <rect x="110" y="-5" width="110" height="35" rx="4" fill="#f59e0b" opacity="0.5" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="165" y="17" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">-M-M-</text>
      <text x="230" y="17" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">+ H2O</text>
    </g>

    <text x="177" y="90" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">С выделением побочных веществ (H2O)</text>

    <g transform="translate(15, 105)">
      <rect x="0" y="0" width="325" height="75" rx="4" fill="#0f172a" stroke="#f59e0b" stroke-width="0.5"/>
      <text x="162" y="17" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fbbf24" text-anchor="middle">Примеры:</text>
      <text x="15" y="35" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Нейлон, капрон (полиамиды)</text>
      <text x="15" y="50" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Лавсан (полиэфир)</text>
      <text x="15" y="65" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Фенолформальдегидные смолы</text>
    </g>
  </g>

  <!-- Materials classification -->
  <g transform="translate(30, 290)">
    <rect x="0" y="0" width="220" height="180" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6" text-anchor="middle">Пластмассы</text>
    <circle cx="20" cy="48" r="4" fill="#10b981"/>
    <text x="30" y="52" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Полиэтилен (пакеты)</text>
    <circle cx="20" cy="68" r="4" fill="#10b981"/>
    <text x="30" y="72" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">ПВХ (трубы, негорюч)</text>
    <circle cx="20" cy="88" r="4" fill="#10b981"/>
    <text x="30" y="92" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Тефлон (инертный)</text>
    <circle cx="20" cy="108" r="4" fill="#10b981"/>
    <text x="30" y="112" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Полистирол (изоляция)</text>
    <circle cx="20" cy="128" r="4" fill="#10b981"/>
    <text x="30" y="132" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Органическое стекло</text>
    <text x="110" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Термопластичные и термореактивные</text>
  </g>

  <g transform="translate(270, 290)">
    <rect x="0" y="0" width="220" height="180" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
    <text x="110" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c084fc" text-anchor="middle">Волокна</text>
    <circle cx="20" cy="48" r="4" fill="#a855f7"/>
    <text x="30" y="52" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Нейлон (полиамид)</text>
    <circle cx="20" cy="68" r="4" fill="#a855f7"/>
    <text x="30" y="72" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Капрон (полиамид)</text>
    <circle cx="20" cy="88" r="4" fill="#a855f7"/>
    <text x="30" y="92" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Лавсан (полиэфир)</text>
    <circle cx="20" cy="108" r="4" fill="#a855f7"/>
    <text x="30" y="112" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Натуральные: шёлк, шерсть</text>
    <circle cx="20" cy="128" r="4" fill="#a855f7"/>
    <text x="30" y="132" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Искусственные: вискоза</text>
    <text x="110" y="165" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Синтетические и натуральные</text>
  </g>

  <g transform="translate(510, 290)">
    <rect x="0" y="0" width="260" height="180" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text x="130" y="22" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f87171" text-anchor="middle">Каучуки и резины</text>
    <circle cx="20" cy="48" r="4" fill="#ef4444"/>
    <text x="30" y="52" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Изопрен (природный каучук)</text>
    <circle cx="20" cy="68" r="4" fill="#ef4444"/>
    <text x="30" y="72" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Бутадиен (синтетический)</text>
    <circle cx="20" cy="88" r="4" fill="#ef4444"/>
    <text x="30" y="92" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">Вулканизация + S</text>
    <rect x="15" y="105" width="230" height="30" rx="4" fill="#ef4444" opacity="0.1" stroke="#ef4444" stroke-width="1"/>
    <text x="130" y="124" font-family="Arial, sans-serif" font-size="9" fill="#f87171" text-anchor="middle">Каучук + сера = резина (вулканизация)</text>
    <text x="130" y="160" font-family="Arial, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Сера создаёт дисульфидные мостики</text>
  </g>
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>