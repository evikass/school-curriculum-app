<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg)"/>
  <rect y="44" width="400" height="8" fill="url(#tg)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Задачи на кислоты и эфиры</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс • Урок 29</text>
  <rect x="10" y="60" width="185" height="110" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh)"/>
  <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Формулы для расчётов</text>
  <circle cx="22" cy="93" r="3" fill="#14b8a6"/>
  <text x="32" y="97" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">M(CH3COOH) = 60 г/моль</text>
  <circle cx="22" cy="108" r="3" fill="#14b8a6"/>
  <text x="32" y="112" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">M(C2H5OH) = 46 г/моль</text>
  <circle cx="22" cy="123" r="3" fill="#14b8a6"/>
  <text x="32" y="127" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">w(эл) = n·Ar / Mr</text>
  <circle cx="22" cy="138" r="3" fill="#14b8a6"/>
  <text x="32" y="142" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">η = m(практ)/m(теор)·100%</text>
  <circle cx="22" cy="153" r="3" fill="#14b8a6"/>
  <text x="32" y="157" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">V = Vm · n (Vm = 22,4 л/моль)</text>
  <rect x="205" y="60" width="185" height="110" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh)"/>
  <text x="217" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Этерификация</text>
  <text x="217" y="95" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">CH3COOH + C2H5OH →</text>
  <text x="217" y="110" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">→ CH3COOC2H5 + H2O</text>
  <text x="217" y="128" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Катализатор: H2SO4 (конц.)</text>
  <text x="217" y="143" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Обратимая реакция</text>
  <text x="217" y="158" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Тепловой эффект мал</text>
  <rect x="10" y="178" width="380" height="112" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh)"/>
  <text x="22" y="196" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Типы расчётных задач</text>
  <circle cx="22" cy="212" r="3" fill="#3b82f6"/>
  <text x="32" y="216" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Массовая доля элемента в кислоте: w(C) в CH3COOH</text>
  <circle cx="22" cy="228" r="3" fill="#3b82f6"/>
  <text x="32" y="232" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Выход продукта: m(эфира) при η = 80%</text>
  <circle cx="22" cy="244" r="3" fill="#3b82f6"/>
  <text x="32" y="248" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Избыток-недостаток: какой реагент в избытке?</text>
  <circle cx="22" cy="260" r="3" fill="#3b82f6"/>
  <text x="32" y="264" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Объём газа: V(CO2) при сгорании кислоты</text>
  <circle cx="22" cy="276" r="3" fill="#3b82f6"/>
  <text x="32" y="280" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Масса эфира: m из уравнения реакции</text>
</svg>
