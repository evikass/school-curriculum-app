<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#FF7043" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#FF7043" text-anchor="middle">Алканы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#FF7043" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#FFF8F0" opacity="0.5"/>
    
    <!-- General formula -->
    <rect x="20" y="90" width="200" height="30" rx="5" fill="#D84315"/>
    <text x="120" y="110" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">Общая формула: CnH2n+2</text>
    
    <!-- Methane CH4 -->
    <text x="70" y="140" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">Метан CH4</text>
    <!-- Tetrahedral methane -->
    <circle cx="70" cy="170" r="14" fill="#333" opacity="0.85"/>
    <text x="70" y="175" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <circle cx="40" cy="148" r="9" fill="#888" opacity="0.85"/>
    <text x="40" y="153" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="52" y1="154" x2="60" y2="162" stroke="#555" stroke-width="2.5"/>
    <circle cx="100" cy="148" r="9" fill="#888" opacity="0.85"/>
    <text x="100" y="153" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="88" y1="154" x2="80" y2="162" stroke="#555" stroke-width="2.5"/>
    <circle cx="50" cy="198" r="9" fill="#888" opacity="0.85"/>
    <text x="50" y="203" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="58" y1="190" x2="64" y2="182" stroke="#555" stroke-width="2.5"/>
    <circle cx="90" cy="198" r="9" fill="#888" opacity="0.85"/>
    <text x="90" y="203" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="82" y1="190" x2="76" y2="182" stroke="#555" stroke-width="2.5"/>
    
    <!-- Ethane C2H6 -->
    <text x="180" y="140" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">Этан C2H6</text>
    <circle cx="160" cy="172" r="13" fill="#333" opacity="0.85"/>
    <text x="160" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <circle cx="200" cy="172" r="13" fill="#333" opacity="0.85"/>
    <text x="200" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <line x1="173" y1="172" x2="187" y2="172" stroke="#555" stroke-width="2.5"/>
    <circle cx="140" cy="152" r="9" fill="#888" opacity="0.85"/>
    <text x="140" y="157" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="150" y1="158" x2="154" y2="164" stroke="#555" stroke-width="2.5"/>
    <circle cx="140" cy="192" r="9" fill="#888" opacity="0.85"/>
    <text x="140" y="197" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="150" y1="186" x2="154" y2="180" stroke="#555" stroke-width="2.5"/>
    <circle cx="220" cy="152" r="9" fill="#888" opacity="0.85"/>
    <text x="220" y="157" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="210" y1="158" x2="206" y2="164" stroke="#555" stroke-width="2.5"/>
    <circle cx="220" cy="192" r="9" fill="#888" opacity="0.85"/>
    <text x="220" y="197" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="210" y1="186" x2="206" y2="180" stroke="#555" stroke-width="2.5"/>
    
    <!-- Propane C3H8 -->
    <text x="310" y="140" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">Пропан C3H8</text>
    <circle cx="280" cy="172" r="13" fill="#333" opacity="0.85"/>
    <text x="280" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <circle cx="320" cy="172" r="13" fill="#333" opacity="0.85"/>
    <text x="320" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <circle cx="360" cy="172" r="13" fill="#333" opacity="0.85"/>
    <text x="360" y="177" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <line x1="293" y1="172" x2="307" y2="172" stroke="#555" stroke-width="2.5"/>
    <line x1="333" y1="172" x2="347" y2="172" stroke="#555" stroke-width="2.5"/>
    <text x="280" y="195" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">CH3</text>
    <text x="320" y="195" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">CH2</text>
    <text x="360" y="195" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">CH3</text>
    
    <!-- Properties section -->
    <rect x="20" y="210" width="220" height="80" rx="4" fill="#FFE0B2" stroke="#FF7043" stroke-width="1"/>
    <text x="130" y="226" font-family="Arial,sans-serif" font-size="10" fill="#D84315" text-anchor="middle">Физические свойства:</text>
    <text x="130" y="240" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Газ (C1-C4), жидкость (C5-C16)</text>
    <text x="130" y="252" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Нерастворимы в воде</text>
    <text x="130" y="264" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Tкип. растет с длиной цепи</text>
    <text x="130" y="278" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Плотность &lt; плотности воды</text>
    
    <rect x="260" y="210" width="220" height="80" rx="4" fill="#FFE0B2" stroke="#FF7043" stroke-width="1"/>
    <text x="370" y="226" font-family="Arial,sans-serif" font-size="10" fill="#D84315" text-anchor="middle">Химические свойства:</text>
    <text x="370" y="240" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Горение: CnH2n+2 + O2 -&gt; CO2+H2O</text>
    <text x="370" y="252" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Замещение (с галогенами)</text>
    <text x="370" y="264" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Дегидрирование</text>
    <text x="370" y="278" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Крекинг (расщепление)</text>
    
    <!-- Combustion equation -->
    <text x="250" y="298" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">CH4 + 2O2 -&gt; CO2 + 2H2O</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Химия</text>
</svg>