<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg7" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="sh7" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg7)"/>
  <rect y="44" width="400" height="8" fill="url(#tg7)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Алкены: химические свойства</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Addition reactions -->
    <rect x="10" y="60" width="190" height="128" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh7)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Реакции присоединения</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">+ H2 (кат. Ni, t°):</text>
    <text x="22" y="106" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">CH2=CH2 + H2 → CH3-CH3</text>
    <text x="22" y="120" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">+ HCl:</text>
    <text x="22" y="132" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">CH2=CH2 + HCl → CH3-CH2Cl</text>
    <text x="22" y="146" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">+ H2O (H+, t°):</text>
    <text x="22" y="158" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">CH2=CH2 + H2O → C2H5OH</text>
    <text x="22" y="172" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">+ Br2 (кач. реакция):</text>
    <text x="22" y="184" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">CH2=CH2 + Br2 → CH2Br-CH2Br</text>

  <!-- Top right: Polymerization & Markovnikov -->
    <rect x="210" y="60" width="180" height="128" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh7)"/>
    <text x="222" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Полимеризация</text>
    <text x="222" y="94" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">n CH2=CH2 →</text>
    <text x="222" y="106" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">(-CH2-CH2-)n</text>
    <text x="222" y="118" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">Полиэтилен</text>
    <text x="222" y="134" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f59e0b">Правило Марковникова</text>
    <text x="222" y="148" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">H присоединяется к</text>
    <text x="222" y="159" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">более гидрированному C</text>
    <text x="222" y="175" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">CH3-CH=CH2 + HCl →</text>
    <text x="222" y="186" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">CH3-CHCl-CH3</text>

  <!-- Bottom: Oxidation & uses -->
    <rect x="10" y="196" width="185" height="94" rx="6" fill="#1e1e3a" stroke="#ef4444" stroke-width="1" filter="url(#sh7)"/>
    <text x="22" y="214" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Окисление KMnO4</text>
    <text x="22" y="230" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">3C2H4 + 2KMnO4 + 4H2O</text>
    <text x="22" y="242" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">→ 3CH2OH-CH2OH</text>
    <text x="22" y="254" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">  + 2MnO2 + 2KOH</text>
    <text x="22" y="270" font-family="Arial, sans-serif" font-size="8.5" fill="#14b8a6">Обесцвечивание KMnO4</text>
    <text x="22" y="281" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">— кач. реакция на C=C</text>

    <rect x="205" y="196" width="180" height="94" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh7)"/>
    <text x="217" y="214" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Применение</text>
    <circle cx="217" cy="226" r="3" fill="#14b8a6"/>
  <text x="227" y="230" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Полиэтилен — упаковка</text>
    <circle cx="217" cy="240" r="3" fill="#14b8a6"/>
  <text x="227" y="244" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Полипропилен — трубы</text>
    <circle cx="217" cy="254" r="3" fill="#14b8a6"/>
  <text x="227" y="258" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Поливинилхлорид — трубы</text>
    <circle cx="217" cy="268" r="3" fill="#14b8a6"/>
  <text x="227" y="272" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Этилен — ускоритель</text>
    <text x="227" y="283" font-family="Arial, sans-serif" font-size="8.5" fill="#94a3b8">созревания плодов</text>
</svg>