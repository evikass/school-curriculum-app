<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#D84315"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#FF7043" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#FF7043" text-anchor="middle">Предмет органической химии</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#FF7043" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <!-- Background subtle grid -->
    <rect x="15" y="85" width="470" height="215" fill="#FFF8F0" opacity="0.5"/>
    
    <!-- Title labels -->
    <text x="125" y="105" font-family="Arial,sans-serif" font-size="13" fill="#D84315" text-anchor="middle">Органические</text>
    <text x="125" y="120" font-family="Arial,sans-serif" font-size="13" fill="#D84315" text-anchor="middle">вещества</text>
    <text x="375" y="105" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle">Неорганические</text>
    <text x="375" y="120" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="middle">вещества</text>
    
    <!-- Divider -->
    <line x1="250" y1="100" x2="250" y2="295" stroke="#ccc" stroke-width="1" stroke-dasharray="5,5"/>
    
    <!-- ETHANE molecule (left side) -->
    <circle cx="100" cy="165" r="14" fill="#333" opacity="0.85"/>
    <text x="100" y="170" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <circle cx="150" cy="165" r="14" fill="#333" opacity="0.85"/>
    <text x="150" y="170" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <line x1="114" y1="165" x2="136" y2="165" stroke="#555" stroke-width="2.5"/>
    <!-- H atoms around left C -->
    <circle cx="75" cy="140" r="10" fill="#888" opacity="0.85"/>
    <text x="75" y="145" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="87" y1="148" x2="95" y2="158" stroke="#555" stroke-width="2.5"/>
    <circle cx="75" cy="190" r="10" fill="#888" opacity="0.85"/>
    <text x="75" y="195" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="87" y1="182" x2="95" y2="172" stroke="#555" stroke-width="2.5"/>
    <circle cx="95" cy="210" r="10" fill="#888" opacity="0.85"/>
    <text x="95" y="215" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="98" y1="198" x2="98" y2="180" stroke="#555" stroke-width="2.5"/>
    <!-- H atoms around right C -->
    <circle cx="175" cy="140" r="10" fill="#888" opacity="0.85"/>
    <text x="175" y="145" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="163" y1="148" x2="155" y2="158" stroke="#555" stroke-width="2.5"/>
    <circle cx="175" cy="190" r="10" fill="#888" opacity="0.85"/>
    <text x="175" y="195" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="163" y1="182" x2="155" y2="172" stroke="#555" stroke-width="2.5"/>
    <circle cx="155" cy="210" r="10" fill="#888" opacity="0.85"/>
    <text x="155" y="215" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="152" y1="198" x2="152" y2="180" stroke="#555" stroke-width="2.5"/>
    
    <text x="125" y="235" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">C-H связи</text>
    <text x="125" y="250" font-family="Arial,sans-serif" font-size="11" fill="#D84315" text-anchor="middle">Этан C2H6</text>
    
    <!-- More organic examples -->
    <rect x="50" y="255" width="80" height="25" rx="4" fill="#FFE0B2" stroke="#FF7043" stroke-width="1"/>
    <text x="90" y="272" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">CH4 Метан</text>
    <rect x="140" y="255" width="80" height="25" rx="4" fill="#FFE0B2" stroke="#FF7043" stroke-width="1"/>
    <text x="180" y="272" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">C6H6 Бензол</text>
    
    <!-- Key features box -->
    <rect x="55" y="130" width="40" height="20" rx="3" fill="#FFCCBC"/>
    <text x="75" y="144" font-family="Arial,sans-serif" font-size="8" fill="#D84315" text-anchor="middle">C-C</text>
    
    <!-- Right side: Inorganic examples -->
    <!-- Water molecule -->
    <circle cx="330" cy="155" r="14" fill="#E53935" opacity="0.85"/>
    <text x="330" y="160" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <circle cx="360" cy="170" r="10" fill="#888" opacity="0.85"/>
    <text x="360" y="175" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <circle cx="300" cy="170" r="10" fill="#888" opacity="0.85"/>
    <text x="300" y="175" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="340" y1="162" x2="354" y2="166" stroke="#555" stroke-width="2.5"/>
    <line x1="320" y1="162" x2="306" y2="166" stroke="#555" stroke-width="2.5"/>
    <text x="330" y="195" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">H2O Вода</text>
    
    <!-- NaCl -->
    <circle cx="380" cy="240" r="13" fill="#9C27B0" opacity="0.85"/>
    <text x="380" y="245" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Na</text>
    <circle cx="420" cy="240" r="13" fill="#4CAF50" opacity="0.85"/>
    <text x="420" y="245" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Cl</text>
    <line x1="393" y1="240" x2="407" y2="240" stroke="#555" stroke-width="2.5"/>
    <text x="400" y="265" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">NaCl Соль</text>
    
    <!-- CO2 -->
    <circle cx="290" cy="245" r="12" fill="#E53935" opacity="0.85"/>
    <text x="290" y="250" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <circle cx="320" cy="245" r="12" fill="#333" opacity="0.85"/>
    <text x="320" y="250" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <circle cx="350" cy="245" r="12" fill="#E53935" opacity="0.85"/>
    <text x="350" y="250" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <line x1="302.0" y1="247.5" x2="308.0" y2="247.5" stroke="#555" stroke-width="2"/>
    <line x1="302.0" y1="242.5" x2="308.0" y2="242.5" stroke="#555" stroke-width="2"/>
    <line x1="332.0" y1="247.5" x2="338.0" y2="247.5" stroke="#555" stroke-width="2"/>
    <line x1="332.0" y1="242.5" x2="338.0" y2="242.5" stroke="#555" stroke-width="2"/>
    <text x="320" y="270" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">CO2</text>
    
    <!-- Bottom comparison -->
    <rect x="30" y="280" width="200" height="18" rx="3" fill="#FFF3E0" stroke="#FF7043" stroke-width="1"/>
    <text x="130" y="293" font-family="Arial,sans-serif" font-size="9" fill="#D84315" text-anchor="middle">Углерод - основа жизни</text>
    <rect x="260" y="280" width="200" height="18" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <text x="360" y="293" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">Без углерода</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Химия</text>
</svg>