<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Инфляция и безработица</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 28</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">28</text>
  <rect x="20" y="72" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="234" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Инфляция</text>
  <text x="28" y="100" class="box-text">Рост общего уровня цен</text>
  <text x="28" y="113" class="box-text">ИПЦ = Σ(Pt·Q₀)/Σ(P₀·Q₀)·100%</text>
  <text x="28" y="126" class="box-text">Виды: ползучая (&lt;10%)</text>
  <text x="28" y="139" class="box-text">Галопирующая (10-100%)</text>
  <text x="28" y="152" class="box-text">Гиперинфляция (&gt;50%/мес.)</text>
  <rect x="260" y="72" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="86" class="box-title">Безработица</text>
  <text x="268" y="100" class="box-text">u = U / (U + E) · 100%</text>
  <text x="268" y="113" class="box-text">Фрикционная (поиск работы)</text>
  <text x="268" y="126" class="box-text">Структурная (несоответствие)</text>
  <text x="268" y="139" class="box-text">Циклическая (спад)</text>
  <text x="268" y="152" class="box-text">Естественный уровень: 4-6%</text>
  <rect x="20" y="170" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="170" x2="474" y2="170" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="184" class="box-title">Кривая Филлипса</text>
  <text x="28" y="198" class="box-text">π = πe − β(u − u*) + ε    Обратная связь: u↓ → π↑ и наоборот</text>
  <text x="28" y="211" class="box-text">Краткосрочная: выбор между инфляцией и безработицей; Долгосрочная: вертикальна при u*</text>
  <rect x="20" y="242" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="242" x2="234" y2="242" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="256" class="box-title">Причины инфляции</text>
  <text x="28" y="270" class="box-text">Инфляция спроса (AD↑)</text>
  <text x="28" y="283" class="box-text">Инфляция издержек (AS↓)</text>
  <text x="28" y="296" class="box-text">Монетарная (M↑↑)</text>
  <text x="28" y="309" class="box-text">Инфляционные ожидания</text>
  <text x="28" y="322" class="box-text">Импортируемая инфляция</text>
  <rect x="260" y="242" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="242" x2="474" y2="242" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="256" class="box-title">Последствия</text>
  <text x="268" y="270" class="box-text">Обесценивание сбережений</text>
  <text x="268" y="283" class="box-text">Перераспределение доходов</text>
  <text x="268" y="296" class="box-text">Снижение реальных доходов</text>
  <text x="268" y="309" class="box-text">Стагфляция: π↑ + u↑</text>
  <text x="268" y="322" class="box-text">Закон Оукена: ΔY = −2Δu</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>