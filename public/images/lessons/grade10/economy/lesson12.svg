<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Максимизация прибыли</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 12</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">12</text>
  <rect x="20" y="72" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Условие максимизации прибыли</text>
  <text x="28" y="100" class="box-text">MR = MC — предельная выручка равна предельным издержкам</text>
  <text x="28" y="113" class="box-text">При этом: MC ↗, MR ≤ MC после точки, P ≥ AVC (иначе — закрытие)</text>
  <rect x="20" y="138" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="138" x2="234" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="152" class="box-title">Совершенная конкуренция</text>
  <text x="28" y="166" class="box-text">P = MR = AR (горизонтальн.)</text>
  <text x="28" y="179" class="box-text">MR = MC → Q* — оптимум</text>
  <text x="28" y="192" class="box-text">π = (P − ATC) · Q*</text>
  <text x="28" y="205" class="box-text">P &gt; ATC → π &gt; 0</text>
  <text x="28" y="218" class="box-text">P &lt; AVC → закрытие фирмы</text>
  <rect x="260" y="138" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="138" x2="474" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="152" class="box-title">Монополия</text>
  <text x="268" y="166" class="box-text">D ↘ → MR ↘ круче D</text>
  <text x="268" y="179" class="box-text">MR = MC → Q*, P(Q*) на D</text>
  <text x="268" y="192" class="box-text">P &gt; MC → монопольная власть</text>
  <text x="268" y="205" class="box-text">L = (P−MC)/P — индекс Лернера</text>
  <text x="268" y="218" class="box-text">0 ≤ L &lt; 1</text>
  <rect x="20" y="238" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="238" x2="234" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="252" class="box-title">Краткосрочный период</text>
  <text x="28" y="266" class="box-text">π max: MR = MC</text>
  <text x="28" y="279" class="box-text">π min: MR = MC (левее max)</text>
  <text x="28" y="292" class="box-text">Точка безубыточности:</text>
  <text x="28" y="305" class="box-text">TR = TC (π = 0)</text>
  <rect x="260" y="238" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="238" x2="474" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="252" class="box-title">Долгосрочный период</text>
  <text x="268" y="266" class="box-text">Сов. конк.: P = min ATC, π = 0</text>
  <text x="268" y="279" class="box-text">Монополия: P &gt; ATC, π &gt; 0</text>
  <text x="268" y="292" class="box-text">Барьеры входа сохраняют</text>
  <text x="268" y="305" class="box-text">монопольную прибыль</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>