<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Банковская система</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 26</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">26</text>
  <rect x="20" y="72" width="460" height="45" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Структура банковской системы</text>
  <text x="28" y="100" class="box-text">Центральный банк (эмиссия, надзор) ←→ Коммерческие банки (кредиты, вклады) ←──→ Небанковские финансовые организации</text>
  <rect x="20" y="132" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="132" x2="234" y2="132" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="146" class="box-title">Центральный банк</text>
  <text x="28" y="160" class="box-text">Эмиссия национальной валюты</text>
  <text x="28" y="173" class="box-text">Регулирование кредитной сферы</text>
  <text x="28" y="186" class="box-text">Хранение золотовалютных резервов</text>
  <text x="28" y="199" class="box-text">Кредитор последней инстанции</text>
  <text x="28" y="212" class="box-text">Надзор за коммерч. банками</text>
  <rect x="260" y="132" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="132" x2="474" y2="132" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="146" class="box-title">Коммерческие банки</text>
  <text x="268" y="160" class="box-text">Привлечение вкладов (депозиты)</text>
  <text x="268" y="173" class="box-text">Выдача кредитов</text>
  <text x="268" y="186" class="box-text">Расчётно-кассовое обслуживание</text>
  <text x="268" y="199" class="box-text">Валютные операции</text>
  <text x="268" y="212" class="box-text">Финансовые услуги</text>
  <rect x="20" y="230" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="230" x2="474" y2="230" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="244" class="box-title">Банковский мультипликатор</text>
  <text x="28" y="258" class="box-text">Депозитный мультипликатор: m = 1/rr    (rr — норма резервирования)</text>
  <text x="28" y="271" class="box-text">Пример: rr=10% → m=10 → депозит 1000 → макс. M₁ = 10000</text>
  <rect x="20" y="300" width="460" height="30" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="300" x2="474" y2="300" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="314" class="box-text">Кредит → депозит → кредит → депозит → ... (цепочка создания денег)</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>