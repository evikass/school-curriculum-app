      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Эластичность спроса по доходу</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 8</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">8</text>
  <rect x="20" y="72" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Формула</text>
  <text x="28" y="100" class="box-text">EI = (ΔQ/Q) / (ΔI/I) = (ΔQ/ΔI) · (I/Q)     Показывает реакцию Qd на изменение дохода I</text>
  <rect x="20" y="138" width="145" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="138" x2="159" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="152" class="box-title">Низшие (0 &gt; EI)</text>
  <text x="28" y="166" class="box-text">I↑ → Qd↓</text>
  <text x="28" y="179" class="box-text">Маргарин, лапша</text>
  <text x="28" y="192" class="box-text">Кривая Энгеля ↘</text>
  <text x="28" y="205" class="box-text">Доля в бюджете ↓</text>
  <rect x="175" y="138" width="145" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="181" y1="138" x2="314" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="183" y="152" class="box-title">Необх. (0&lt;EI&lt;1)</text>
  <text x="183" y="166" class="box-text">I↑ → Qd↑ (медлен.)</text>
  <text x="183" y="179" class="box-text">Хлеб, молоко, ЖКХ</text>
  <text x="183" y="192" class="box-text">Доля в бюджете ↓</text>
  <text x="183" y="205" class="box-text">Кривая ↗ (пологая)</text>
  <rect x="330" y="138" width="150" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="336" y1="138" x2="474" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="338" y="152" class="box-title">Роскошь (EI&gt;1)</text>
  <text x="338" y="166" class="box-text">I↑ → Qd↑↑</text>
  <text x="338" y="179" class="box-text">Ювелирные, туризм</text>
  <text x="338" y="192" class="box-text">Доля в бюджете ↑</text>
  <text x="338" y="205" class="box-text">Кривая ↗ (крутая)</text>
  <rect x="20" y="225" width="460" height="45" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="225" x2="474" y2="225" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="239" class="box-title">Закон Энгеля</text>
  <text x="28" y="253" class="box-text">С ростом дохода доля расходов на продовольствие ↓, а на отдых и образование ↑</text>
  <rect x="20" y="285" width="460" height="45" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="285" x2="474" y2="285" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="299" class="box-title">Практическое значение</text>
  <text x="28" y="313" class="box-text">EI помогает прогнозировать структуру потребления и отраслевые сдвиги в экономике</text>
