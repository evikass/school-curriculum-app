<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">ВВП и методы его расчёта</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 21</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">21</text>
  <rect x="20" y="72" width="460" height="45" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">ВВП (GDP)</text>
  <text x="28" y="100" class="box-text">Валовой внутренний продукт — рыночная стоимость всех конечных товаров и услуг за год на территории страны</text>
  <rect x="20" y="132" width="145" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="132" x2="159" y2="132" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="146" class="box-title">По расходам</text>
  <text x="28" y="160" class="box-text">Y = C + I + G + NX</text>
  <text x="28" y="173" class="box-text">C — потребление</text>
  <text x="28" y="186" class="box-text">I — инвестиции</text>
  <text x="28" y="199" class="box-text">G — гос. закупки</text>
  <text x="28" y="212" class="box-text">NX = Ex − Im</text>
  <rect x="175" y="132" width="145" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="181" y1="132" x2="314" y2="132" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="183" y="146" class="box-title">По доходам</text>
  <text x="183" y="160" class="box-text">Y = W + R + i + π</text>
  <text x="183" y="173" class="box-text">W — зарплата</text>
  <text x="183" y="186" class="box-text">R — рента</text>
  <text x="183" y="199" class="box-text">i — процент</text>
  <text x="183" y="212" class="box-text">π — прибыль + аморт. + кос.н.</text>
  <rect x="330" y="132" width="150" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="336" y1="132" x2="474" y2="132" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="338" y="146" class="box-title">По добавл. стоим.</text>
  <text x="338" y="160" class="box-text">Y = Σ ДСᵢ</text>
  <text x="338" y="173" class="box-text">ДС = Выручка −</text>
  <text x="338" y="186" class="box-text">  Промежуточные затраты</text>
  <text x="338" y="199" class="box-text">Исключается двойной</text>
  <text x="338" y="212" class="box-text">счёт</text>
  <rect x="20" y="234" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="234" x2="234" y2="234" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="248" class="box-title">Номинальный vs Реальный</text>
  <text x="28" y="262" class="box-text">ВВП(ном) = Σ Pt·Qt — текущ. цены</text>
  <text x="28" y="275" class="box-text">ВВП(реал) = Σ P₀·Qt — баз. цены</text>
  <text x="28" y="288" class="box-text">Дефлятор = ВВП(ном)/ВВП(реал)·100%</text>
  <text x="28" y="301" class="box-text">Инфляция: ΔДефлятор</text>
  <rect x="260" y="234" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="234" x2="474" y2="234" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="248" class="box-title">Не включается в ВВП</text>
  <text x="268" y="262" class="box-text">Теневая экономика</text>
  <text x="268" y="275" class="box-text">Домашний труд</text>
  <text x="268" y="288" class="box-text">Перепродажа (б/у товары)</text>
  <text x="268" y="301" class="box-text">Трансферты (пенсии, пособия)</text>
  <text x="268" y="314" class="box-text">Промежуточные товары</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>