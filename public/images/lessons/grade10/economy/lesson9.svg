<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Производственная функция</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 9</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">9</text>
  <rect x="20" y="72" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Производственная функция Кобба-Дугласа</text>
  <text x="28" y="100" class="box-text">Q = A · Kᵅ · Lᵝ    где A — технология, K — капитал, L — труд, α+β — отдача от масштаба</text>
  <rect x="20" y="138" width="145" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="138" x2="159" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="152" class="box-title">Краткосрочный период</text>
  <text x="28" y="166" class="box-text">K — const, L — variable</text>
  <text x="28" y="179" class="box-text">Закон убывающей отдачи:</text>
  <text x="28" y="192" class="box-text">MPL↓ при росте L</text>
  <text x="28" y="205" class="box-text">TP: ↗→↘</text>
  <text x="28" y="218" class="box-text">APL = Q/L, MPL = ΔQ/ΔL</text>
  <rect x="175" y="138" width="145" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="181" y1="138" x2="314" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="183" y="152" class="box-title">Долгосрочный период</text>
  <text x="183" y="166" class="box-text">K и L — variable</text>
  <text x="183" y="179" class="box-text">Изокванта = Q=const</text>
  <text x="183" y="192" class="box-text">MRTS = MPL/MPK</text>
  <text x="183" y="205" class="box-text">Отдача от масштаба:</text>
  <text x="183" y="218" class="box-text">α+β≷1</text>
  <rect x="330" y="138" width="150" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="336" y1="138" x2="474" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="338" y="152" class="box-title">Масштаб</text>
  <text x="338" y="166" class="box-text">α+β&gt;1: возрастающая</text>
  <text x="338" y="179" class="box-text">α+β=1: постоянная</text>
  <text x="338" y="192" class="box-text">α+β&lt;1: убывающая</text>
  <text x="338" y="205" class="box-text">Пример: α=0.3, β=0.7</text>
  <text x="338" y="218" class="box-text">→ постоянная отдача</text>
  <rect x="20" y="238" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="238" x2="474" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="252" class="box-title">Три стадии производства</text>
  <text x="28" y="266" class="box-text">I: MPL &gt; APL → APL растёт    |    II: MPL &lt; APL, MPL &gt; 0 → оптимальная    |    III: MPL &lt; 0 → неэффективная</text>
  <rect x="20" y="303" width="460" height="30" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="303" x2="474" y2="303" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="317" class="box-text">Оптимум: MPL/w = MPK/r — условие минимизации издержек</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>