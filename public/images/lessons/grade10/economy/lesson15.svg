  <text x="28" y="100" class="box-text">1. Несколько крупных фирм    2. Взаимозависимость решений    3. Барьеры входа</text>
  <text x="28" y="113" class="box-text">4. Стратегическое поведение    5. Возможна ценовая война</text>
  <rect x="20" y="142" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="142" x2="234" y2="142" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="156" class="box-title">Модель Курно</text>
  <text x="28" y="170" class="box-text">Фирмы выбирают Qi независимо</text>
  <text x="28" y="183" class="box-text">Условие: MR₁ = MC₁</text>
  <text x="28" y="196" class="box-text">Q* = (a−c)/(n+1)·n</text>
  <text x="28" y="209" class="box-text">При n→∞ → соверш. конк.</text>
  <text x="28" y="222" class="box-text">n=1 → монополия</text>
  <rect x="260" y="142" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="142" x2="474" y2="142" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="156" class="box-title">Дилемма заключённого</text>
  <text x="268" y="170" class="box-text">Сотрудничать | Предать</text>
  <text x="268" y="183" class="box-text">Сотр.: (3,3) | (0,5)</text>
  <text x="268" y="196" class="box-text">Предать: (5,0) | (1,1)</text>
  <text x="268" y="209" class="box-text">Равновесие Нэша: оба предают</text>
  <text x="268" y="222" class="box-text">Картель нестабилен</text>
  <rect x="20" y="240" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="240" x2="234" y2="240" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="254" class="box-title">Лидерство в ценах</text>
  <text x="28" y="268" class="box-text">Доминирующая фирма → P</text>
  <text x="28" y="281" class="box-text">Остальные — ценополучатели</text>
  <text x="28" y="294" class="box-text">Модель Штакельберга:</text>
  <text x="28" y="307" class="box-text">Лидер → Q₁, ведомый → Q₂</text>
  <rect x="260" y="240" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
