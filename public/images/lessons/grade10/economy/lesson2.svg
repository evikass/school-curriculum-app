<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Теория предельной полезности</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 2</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">2</text>
  <rect x="20" y="72" width="220" height="80" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="234" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Полезность (U)</text>
  <text x="28" y="100" class="box-text">Общая TU = Σ MUᵢ</text>
  <text x="28" y="113" class="box-text">Предельная MU = ΔTU / ΔQ</text>
  <text x="28" y="126" class="box-text">Закон убывающей MU:</text>
  <text x="28" y="139" class="box-text">MU↓ при росте потребления Q</text>
  <rect x="260" y="72" width="220" height="80" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="86" class="box-title">Парадокс Смита</text>
  <text x="268" y="100" class="box-text">Вода: TU↑↑, MU→0</text>
  <text x="268" y="113" class="box-text">Алмаз: TU↓, MU↑↑</text>
  <text x="268" y="126" class="box-text">Цена = MU, не TU</text>
  <text x="268" y="139" class="box-text">Воде цена↓, алмазу цена↑</text>
  <rect x="20" y="168" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="168" x2="474" y2="168" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="182" class="box-title">Условие равновесия потребителя</text>
  <text x="28" y="196" class="box-text">MUx / Px = MUy / Py = ... = λ    →    Максимизация полезности при бюджете I</text>
  <text x="28" y="209" class="box-text">где λ — предельная полезность денег</text>
  <rect x="20" y="240" width="220" height="70" rx="6" ry="6" fill="#C8E6C9" fill-opacity="0.7" stroke="#A5D6A7" stroke-width="1"/>
  <line x1="30" y1="300" x2="60" y2="255" stroke="#1B5E20" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="60" cy="255" r="2.5" fill="#4CAF50"/>
  <text x="70" y="254" class="box-title">График TU</text>
  <text x="70" y="268" class="box-text">TU ↗→ (S-образная кривая)</text>
  <text x="70" y="281" class="box-text">Сначала растёт быстро,</text>
  <text x="70" y="294" class="box-text">затем рост замедляется</text>
  <rect x="260" y="240" width="220" height="70" rx="6" ry="6" fill="#C8E6C9" fill-opacity="0.7" stroke="#A5D6A7" stroke-width="1"/>
  <line x1="270" y1="300" x2="300" y2="255" stroke="#1B5E20" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="300" cy="255" r="2.5" fill="#4CAF50"/>
  <text x="310" y="254" class="box-title">График MU</text>
  <text x="310" y="268" class="box-text">MU ↘ (нисходящая линия)</text>
  <text x="310" y="281" class="box-text">MU = 0 при max TU</text>
  <text x="310" y="294" class="box-text">MU &lt; 0 — перенасыщение</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>