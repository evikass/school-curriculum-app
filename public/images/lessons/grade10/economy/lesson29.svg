  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Факторы экономического роста</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 29</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">29</text>
  <rect x="20" y="72" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Экономический рост</text>
  <text x="28" y="100" class="box-text">ΔY/Y = (Y₁−Y₀)/Y₀ · 100% — темп роста реального ВВП</text>
  <text x="28" y="113" class="box-text">Экстенсивный: рост за счёт ↑ факторов    |    Интенсивный: рост за счёт ↑ эффективности</text>
  <rect x="20" y="138" width="145" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="138" x2="159" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="152" class="box-title">Труд (L)</text>
  <text x="28" y="166" class="box-text">Численность занятых</text>
  <text x="28" y="179" class="box-text">Качество рабочей силы</text>
  <text x="28" y="192" class="box-text">Образование и здоровье</text>
  <text x="28" y="205" class="box-text">Миграция рабочей силы</text>
  <text x="28" y="218" class="box-text">Производительность</text>
  <rect x="175" y="138" width="145" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="181" y1="138" x2="314" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="183" y="152" class="box-title">Капитал (K)</text>
  <text x="183" y="166" class="box-text">Инвестиции в основной К</text>
  <text x="183" y="179" class="box-text">Накопление капитала</text>
  <text x="183" y="192" class="box-text">Норма сбережений (s)</text>
  <text x="183" y="205" class="box-text">Амортизация (δ)</text>
  <text x="183" y="218" class="box-text">I = S = s·Y</text>
  <rect x="330" y="138" width="150" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="336" y1="138" x2="474" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="338" y="152" class="box-title">Технология (A)</text>
  <text x="338" y="166" class="box-text">НТП — главный фактор</text>
  <text x="338" y="179" class="box-text">НИОКР и инновации</text>
  <text x="338" y="192" class="box-text">Организация производства</text>
  <text x="338" y="205" class="box-text">Институты и права собств.</text>
  <text x="338" y="218" class="box-text">Человеческий капитал</text>
  <rect x="20" y="238" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="238" x2="234" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="252" class="box-title">Факторы спроса</text>
  <text x="28" y="266" class="box-text">AD = C + I + G + NX</text>
  <text x="28" y="279" class="box-text">Рост спроса → рост произв.</text>
  <text x="28" y="292" class="box-text">Доходы населения</text>
  <text x="28" y="305" class="box-text">Государственные закупки</text>
  <text x="28" y="318" class="box-text">Экспортный спрос</text>
  <rect x="260" y="238" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="238" x2="474" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="252" class="box-title">Препятствия росту</text>
  <text x="268" y="266" class="box-text">Низкие сбережения → мало I</text>
  <text x="268" y="279" class="box-text">Коррупция и слабые институты</text>
  <text x="268" y="292" class="box-text">Дефицит бюджета</text>
  <text x="268" y="305" class="box-text">Внешний долг</text>
  <text x="268" y="318" class="box-text">Демографический кризис</text>
