<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Рынок труда</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 17</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">17</text>
  <rect x="20" y="72" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="234" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Спрос на труд</text>
  <text x="28" y="100" class="box-text">DL = MRPL — предельный продукт</text>
  <text x="28" y="113" class="box-text">в денежном выражении</text>
  <text x="28" y="126" class="box-text">MRPL = MPL · MR</text>
  <text x="28" y="139" class="box-text">DL ↘: MPL↓ при росте L</text>
  <text x="28" y="152" class="box-text">Закон убывающей отдачи</text>
  <rect x="260" y="72" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="86" class="box-title">Предложение труда</text>
  <text x="268" y="100" class="box-text">SL: выбор труд/досуг</text>
  <text x="268" y="113" class="box-text">Эффект замещения: w↑ → ↑L</text>
  <text x="268" y="126" class="box-text">Эффект дохода: w↑ → ↓L</text>
  <text x="268" y="139" class="box-text">Кривая SL может загибаться</text>
  <text x="268" y="152" class="box-text">Индивидуальная SL: ↗→↘</text>
  <rect x="20" y="170" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="170" x2="474" y2="170" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="184" class="box-title">Равновесие на рынке труда</text>
  <text x="28" y="198" class="box-text">DL = SL → w*, L* — равновесная зарплата и занятость</text>
  <text x="28" y="211" class="box-text">Миним. зарплата &gt; w* → безработица (избыток SL)</text>
  <rect x="20" y="238" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="238" x2="234" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="252" class="box-title">Монопсония</text>
  <text x="28" y="266" class="box-text">Единственный покупатель труда</text>
  <text x="28" y="279" class="box-text">MCL &gt; SL (кривая издержек)</text>
  <text x="28" y="292" class="box-text">L* монопс. &lt; L* конкур.</text>
  <text x="28" y="305" class="box-text">w* монопс. &lt; w* конкур.</text>
  <text x="28" y="318" class="box-text">Пример: градообразующее предпр.</text>
  <rect x="260" y="238" width="220" height="82" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="238" x2="474" y2="238" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="252" class="box-title">Профсоюзы</text>
  <text x="268" y="266" class="box-text">Закрытый магазин (только члены)</text>
  <text x="268" y="279" class="box-text">Переговоры о повышении w</text>
  <text x="268" y="292" class="box-text">Ограничение предложения труда</text>
  <text x="268" y="305" class="box-text">w↑ → L↓ (побочный эффект)</text>
  <text x="268" y="318" class="box-text">Двусторонняя монополия</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>