<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Модель экономического роста Солоу</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 30</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">30</text>
  <rect x="20" y="72" width="460" height="50" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Базовые предпосылки</text>
  <text x="28" y="100" class="box-text">Y = Kᵅ · (A·L)¹⁻ᵅ    |    α ≈ 1/3 (доля капитала)    |    A — экзогенный НТП</text>
  <text x="28" y="113" class="box-text">s — норма сбережений, δ — норма амортизации, n — темп роста населения, g — темп НТП</text>
  <rect x="20" y="138" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="138" x2="234" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="152" class="box-title">Устойчивое состояние</text>
  <text x="28" y="166" class="box-text">Δk = s·f(k) − (n+g+δ)·k = 0</text>
  <text x="28" y="179" class="box-text">k* — устойчивый уровень</text>
  <text x="28" y="192" class="box-text">k↑ при s↑ (но не рост ↑↑)</text>
  <text x="28" y="205" class="box-text">Золотое правило:</text>
  <text x="28" y="218" class="box-text">max c* → f&apos;(k*) = n+g+δ</text>
  <rect x="260" y="138" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="138" x2="474" y2="138" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="152" class="box-title">Конвергенция</text>
  <text x="268" y="166" class="box-text">Бедные страны растут быстрее?</text>
  <text x="268" y="179" class="box-text">Условная конвергенция: при</text>
  <text x="268" y="192" class="box-text">одинаковых s, n, g, δ</text>
  <text x="268" y="205" class="box-text">Абсолютная — не подтверждена</text>
  <text x="268" y="218" class="box-text">Остаток Солоу = A (НТП)</text>
  <rect x="20" y="225" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="225" x2="474" y2="225" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="239" class="box-title">Золотое правило накопления</text>
  <text x="28" y="253" class="box-text">Максимизация потребления на душу населения в устойчивом состоянии</text>
  <text x="28" y="266" class="box-text">Условие: MPK = n + g + δ    →    c* = f(k*) − (n+g+δ)·k*</text>
  <rect x="20" y="296" width="460" height="40" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="296" x2="474" y2="296" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="310" class="box-title">Вывод модели</text>
  <text x="28" y="324" class="box-text">Долгосрочный рост ≡ g (НТП), s влияет только на уровень k*, но не на долгосрочный темп роста</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>