<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <style>
      .title { font: bold 14px "Segoe UI", Arial, sans-serif; fill: #FFFFFF; }
      .lesson-num { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #81C784; }
      .box-title { font: bold 11px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .box-text { font: 10px "Segoe UI", Arial, sans-serif; fill: #1B5E20; }
      .footer { font: 10px "Segoe UI", Arial, sans-serif; fill: #2E7D32; }
    </style>
  </defs>
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
  <rect x="0" y="0" width="500" height="52" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="20" width="500" height="32" fill="#1B5E20"/>
  <text x="15" y="24" class="title">Эффект дохода и эффект замещения</text>
  <text x="15" y="42" class="lesson-num">Экономика — Урок 4</text>
  <circle cx="475" cy="26" r="18" fill="#0D3B0F" stroke="#81C784" stroke-width="1.5"/>
  <text x="475" y="31" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">4</text>
  <rect x="20" y="72" width="220" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="72" x2="234" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="86" class="box-title">Эффект замещения (SE)</text>
  <text x="28" y="100" class="box-text">При ↓Px товар X дешевле</text>
  <text x="28" y="113" class="box-text">относительно товара Y</text>
  <text x="28" y="126" class="box-text">→ потребитель заменяет Y на X</text>
  <text x="28" y="139" class="box-text">SE всегда действует в сторону</text>
  <text x="28" y="152" class="box-text">увеличения потребления подешевевшего</text>
  <rect x="260" y="72" width="220" height="85" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="72" x2="474" y2="72" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="86" class="box-title">Эффект дохода (IE)</text>
  <text x="268" y="100" class="box-text">При ↓Px реальный доход ↑</text>
  <text x="268" y="113" class="box-text">→ покупательная способность ↑</text>
  <text x="268" y="126" class="box-text">Норм. товар: IE → ↑Qd</text>
  <text x="268" y="139" class="box-text">Низший товар: IE → ↓Qd</text>
  <text x="268" y="152" class="box-text">Товар Гиффена: |IE| &gt; |SE|</text>
  <rect x="20" y="172" width="460" height="55" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="172" x2="474" y2="172" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="186" class="box-title">Общий эффект (по Слуцкому)</text>
  <text x="28" y="200" class="box-text">ΔX = SE + IE</text>
  <text x="28" y="213" class="box-text">Компенсированный спрос — при постоянной полезности</text>
  <text x="28" y="226" class="box-text">Некомпенсированный — при постоянном доходе</text>
  <rect x="20" y="242" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="26" y1="242" x2="234" y2="242" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="28" y="256" class="box-title">Нормальный товар</text>
  <text x="28" y="270" class="box-text">Px↓ → SE(X↑) + IE(X↑)</text>
  <text x="28" y="283" class="box-text">Общий эффект: X↑↑</text>
  <text x="28" y="296" class="box-text">Кривая спроса ↘ (обычная)</text>
  <rect x="260" y="242" width="220" height="72" rx="6" ry="6" fill="#FFFFFF" fill-opacity="0.9" stroke="#A5D6A7" stroke-width="1.2"/>
  <line x1="266" y1="242" x2="474" y2="242" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <text x="268" y="256" class="box-title">Товар Гиффена</text>
  <text x="268" y="270" class="box-text">Px↓ → SE(X↑) + IE(X↓↓)</text>
  <text x="268" y="283" class="box-text">Общий эффект: X↓</text>
  <text x="268" y="296" class="box-text">Кривая спроса ↗ (аномальная)</text>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="325" width="500" height="25" rx="0" ry="0" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="20" rx="12" ry="12" fill="#1B5E20"/>
  <rect x="0" y="330" width="500" height="10" fill="#1B5E20"/>
  <text x="250" y="343" text-anchor="middle" class="footer">Экономика · 10 класс</text>
</svg>