<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7E57C2" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#7E57C2" text-anchor="middle">Космические технологии</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Астрономия - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#7E57C2" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.3"/>
    
    <!-- Rocket -->
    <rect x="20" y="90" width="145" height="105" rx="4" fill="#F3E5F5" stroke="#7E57C2" stroke-width="1"/>
    <text x="92" y="108" font-family="Arial,sans-serif" font-size="9" fill="#4527A0" text-anchor="middle">Ракета-носитель</text>
    <!-- Rocket body -->
    <rect x="75" y="120" width="20" height="55" rx="3" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
    <!-- Nose cone -->
    <polygon points="75,120 85,108 95,120" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <!-- Fins -->
    <polygon points="75,165 65,178 75,175" fill="#EF5350" stroke="#C62828" stroke-width="0.5"/>
    <polygon points="95,165 105,178 95,175" fill="#EF5350" stroke="#C62828" stroke-width="0.5"/>
    <!-- Flame -->
    <path d="M78,175 L82,190 L85,180 L88,192 L92,175" fill="#FDD835" stroke="#FF8F00" stroke-width="0.5"/>
    <!-- Window -->
    <circle cx="85" cy="132" r="4" fill="#42A5F5" stroke="#1565C0" stroke-width="0.8"/>
    <text x="92" y="185" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">V &gt; 7.9 км/с</text>
    <text x="92" y="195" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">1-я косм. скорость</text>
    
    <!-- Satellite -->
    <rect x="175" y="90" width="145" height="105" rx="4" fill="#E8EAF6" stroke="#7E57C2" stroke-width="1"/>
    <text x="247" y="108" font-family="Arial,sans-serif" font-size="9" fill="#4527A0" text-anchor="middle">Спутник</text>
    <!-- Satellite body -->
    <rect x="232" y="128" width="22" height="16" rx="2" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
    <!-- Solar panels -->
    <rect x="200" y="130" width="30" height="12" fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>
    <line x1="207" y1="130" x2="207" y2="142" stroke="#42A5F5" stroke-width="0.3"/>
    <line x1="214" y1="130" x2="214" y2="142" stroke="#42A5F5" stroke-width="0.3"/>
    <line x1="221" y1="130" x2="221" y2="142" stroke="#42A5F5" stroke-width="0.3"/>
    <rect x="256" y="130" width="30" height="12" fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>
    <line x1="263" y1="130" x2="263" y2="142" stroke="#42A5F5" stroke-width="0.3"/>
    <line x1="270" y1="130" x2="270" y2="142" stroke="#42A5F5" stroke-width="0.3"/>
    <line x1="277" y1="130" x2="277" y2="142" stroke="#42A5F5" stroke-width="0.3"/>
    <!-- Antenna -->
    <line x1="243" y1="128" x2="243" y2="118" stroke="#9E9E9E" stroke-width="1"/>
    <circle cx="243" cy="116" r="3" fill="none" stroke="#9E9E9E" stroke-width="0.8"/>
    <text x="247" y="160" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">GPS, метео, связь</text>
    <text x="247" y="170" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">НИСЗ - навигация</text>
    <text x="247" y="180" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">GEO: 35786 км</text>
    <text x="247" y="190" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">LEO: 200-2000 км</text>
    
    <!-- Space station -->
    <rect x="330" y="90" width="145" height="105" rx="4" fill="#F3E5F5" stroke="#7E57C2" stroke-width="1"/>
    <text x="402" y="108" font-family="Arial,sans-serif" font-size="9" fill="#4527A0" text-anchor="middle">Станция (МКС)</text>
    <!-- Station body -->
    <rect x="375" y="135" width="50" height="14" rx="2" fill="#B0BEC5" stroke="#78909C" stroke-width="1"/>
    <!-- Modules -->
    <rect x="360" y="137" width="14" height="10" rx="2" fill="#90A4AE" stroke="#78909C" stroke-width="0.5"/>
    <rect x="427" y="137" width="14" height="10" rx="2" fill="#90A4AE" stroke="#78909C" stroke-width="0.5"/>
    <!-- Solar arrays -->
    <rect x="365" y="128" width="30" height="6" fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>
    <rect x="410" y="128" width="30" height="6" fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>
    <rect x="365" y="150" width="30" height="6" fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>
    <rect x="410" y="150" width="30" height="6" fill="#1565C0" stroke="#0D47A1" stroke-width="0.5"/>
    <text x="402" y="172" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">H = 408 км</text>
    <text x="402" y="182" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">V = 7.66 км/с</text>
    <text x="402" y="192" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Оборот: 92 мин</text>
    
    <!-- Timeline of space exploration -->
    <rect x="20" y="202" width="460" height="98" rx="3" fill="#F3E5F5" stroke="#7E57C2" stroke-width="1"/>
    <text x="250" y="218" font-family="Arial,sans-serif" font-size="10" fill="#4527A0" text-anchor="middle">История космонавтики</text>
    
    <!-- Timeline -->
    <line x1="30" y1="240" x2="470" y2="240" stroke="#7E57C2" stroke-width="1.5"/>
    
    <circle cx="60" cy="240" r="4" fill="#EF5350"/>
    <text x="60" y="253" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">1957</text>
    <text x="60" y="263" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Спутник</text>
    
    <circle cx="120" cy="240" r="4" fill="#42A5F5"/>
    <text x="120" y="253" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">1961</text>
    <text x="120" y="263" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Гагарин</text>
    
    <circle cx="180" cy="240" r="4" fill="#66BB6A"/>
    <text x="180" y="253" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">1969</text>
    <text x="180" y="263" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Армстронг</text>
    
    <circle cx="250" cy="240" r="4" fill="#FDD835"/>
    <text x="250" y="253" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">1971</text>
    <text x="250" y="263" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Салют-1</text>
    
    <circle cx="320" cy="240" r="4" fill="#7E57C2"/>
    <text x="320" y="253" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">1990</text>
    <text x="320" y="263" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Хаббл</text>
    
    <circle cx="380" cy="240" r="4" fill="#FF8A65"/>
    <text x="380" y="253" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">1998</text>
    <text x="380" y="263" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">МКС</text>
    
    <circle cx="440" cy="240" r="4" fill="#AB47BC"/>
    <text x="440" y="253" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">2021</text>
    <text x="440" y="263" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Джеймс Уэбб</text>
    
    <!-- Velocity info -->
    <text x="250" y="285" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1-я косм.: 7.9 км/с | 2-я косм.: 11.2 км/с | 3-я косм.: 16.7 км/с</text>
    <text x="250" y="297" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">4-я космическая: 550 км/с (вылет из Галактики)</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Астрономия</text>
</svg>