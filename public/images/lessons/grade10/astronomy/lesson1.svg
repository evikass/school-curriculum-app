<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7E57C2" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#7E57C2" text-anchor="middle">Строение Солнечной системы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Астрономия - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#7E57C2" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#F3E5F5" opacity="0.3"/>
    
    <!-- Sun -->
    <circle cx="60" cy="195" r="28" fill="#FDD835" stroke="#F9A825" stroke-width="2"/>
    <text x="60" y="199" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">Sol</text>
    <!-- Sun rays -->
    <line x1="60" y1="162" x2="60" y2="152" stroke="#FDD835" stroke-width="2"/>
    <line x1="85" y1="170" x2="95" y2="162" stroke="#FDD835" stroke-width="2"/>
    <line x1="88" y1="195" x2="98" y2="195" stroke="#FDD835" stroke-width="2"/>
    <line x1="85" y1="220" x2="95" y2="228" stroke="#FDD835" stroke-width="2"/>
    <line x1="60" y1="228" x2="60" y2="238" stroke="#FDD835" stroke-width="2"/>
    <line x1="35" y1="220" x2="25" y2="228" stroke="#FDD835" stroke-width="2"/>
    <line x1="32" y1="195" x2="22" y2="195" stroke="#FDD835" stroke-width="2"/>
    <line x1="35" y1="170" x2="25" y2="162" stroke="#FDD835" stroke-width="2"/>
    
    <!-- Orbital paths -->
    <ellipse cx="60" cy="195" rx="55" ry="40" fill="none" stroke="#D1C4E9" stroke-width="0.5" stroke-dasharray="3,2"/>
    <ellipse cx="60" cy="195" rx="80" ry="55" fill="none" stroke="#D1C4E9" stroke-width="0.5" stroke-dasharray="3,2"/>
    <ellipse cx="60" cy="195" rx="108" ry="68" fill="none" stroke="#D1C4E9" stroke-width="0.5" stroke-dasharray="3,2"/>
    <ellipse cx="60" cy="195" rx="140" ry="80" fill="none" stroke="#D1C4E9" stroke-width="0.5" stroke-dasharray="3,2"/>
    
    <!-- Planets on orbits -->
    <circle cx="105" cy="175" r="4" fill="#8D6E63"/><text x="105" y="188" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Меркурий</text>
    <circle cx="130" cy="165" r="6" fill="#FF8A65"/><text x="130" y="180" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Венера</text>
    <circle cx="155" cy="175" r="6" fill="#42A5F5"/><text x="155" y="190" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Земля</text>
    <circle cx="185" cy="155" r="5" fill="#EF5350"/><text x="185" y="169" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Марс</text>
    
    <!-- Asteroid belt -->
    <line x1="200" y1="130" x2="210" y2="135" stroke="#9E9E9E" stroke-width="0.5"/>
    <line x1="215" y1="128" x2="225" y2="132" stroke="#9E9E9E" stroke-width="0.5"/>
    <line x1="230" y1="130" x2="240" y2="128" stroke="#9E9E9E" stroke-width="0.5"/>
    <text x="225" y="145" font-family="Arial,sans-serif" font-size="6" fill="#9E9E9E" text-anchor="middle">Пояс астероидов</text>
    
    <!-- Outer planets (right side list) -->
    <rect x="265" y="90" width="220" height="210" rx="4" fill="#F3E5F5" stroke="#7E57C2" stroke-width="1"/>
    <text x="375" y="106" font-family="Arial,sans-serif" font-size="12" fill="#4527A0" text-anchor="middle">Планеты-гиганты</text>
    
    <circle cx="295" cy="135" r="14" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
    <text x="320" y="135" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Юпитер</text>
    <text x="385" y="135" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Крупнейшая, газовый</text>
    
    <circle cx="295" cy="165" r="12" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
    <text x="320" y="165" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Сатурн</text>
    <!-- Saturn ring -->
    <ellipse cx="295" cy="165" rx="20" ry="4" fill="none" stroke="#F9A825" stroke-width="1"/>
    <text x="385" y="165" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Кольца, газовый</text>
    
    <circle cx="295" cy="195" r="9" fill="#80DEEA" stroke="#00838F" stroke-width="1"/>
    <text x="320" y="195" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Уран</text>
    <text x="385" y="195" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Ледяной гигант</text>
    
    <circle cx="295" cy="225" r="9" fill="#5C6BC0" stroke="#283593" stroke-width="1"/>
    <text x="320" y="225" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Нептун</text>
    <text x="385" y="225" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Ледяной гигант</text>
    
    <!-- Dwarf planet -->
    <circle cx="295" cy="255" r="4" fill="#BCAAA4" stroke="#795548" stroke-width="1"/>
    <text x="320" y="255" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Плутон</text>
    <text x="385" y="255" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Карликовая планета</text>
    
    <!-- Scale info -->
    <text x="375" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">8 планет, 5 карликовых</text>
    <text x="375" y="292" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">Порядок: М В З М Ю С У Н</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Астрономия</text>
</svg>