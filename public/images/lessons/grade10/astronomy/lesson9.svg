<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7E57C2" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#7E57C2" text-anchor="middle">Происхождение Вселенной</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Астрономия - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#7E57C2" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.3"/>
    
    <!-- Big Bang timeline -->
    <rect x="20" y="90" width="460" height="28" rx="5" fill="#4527A0"/>
    <text x="250" y="109" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle">Теория Большого Взрыва</text>
    
    <!-- Timeline arrow -->
    <line x1="30" y1="160" x2="470" y2="160" stroke="#7E57C2" stroke-width="2"/>
    <polygon points="470,155 480,160 470,165" fill="#7E57C2"/>
    <text x="460" y="155" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">t</text>
    
    <!-- Timeline events -->
    <!-- Big Bang -->
    <circle cx="45" cy="160" r="8" fill="#EF5350" stroke="#C62828" stroke-width="2"/>
    <text x="45" y="180" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Большой</text>
    <text x="45" y="189" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Взрыв</text>
    <text x="45" y="199" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">t=0</text>
    
    <!-- Inflation -->
    <circle cx="100" cy="160" r="5" fill="#FF8A65" stroke="#D84315" stroke-width="1"/>
    <text x="100" y="180" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">Инфляция</text>
    <text x="100" y="190" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">10^-36 с</text>
    
    <!-- Nucleosynthesis -->
    <circle cx="155" cy="160" r="5" fill="#FFA726" stroke="#E65100" stroke-width="1"/>
    <text x="155" y="180" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">Нуклео-</text>
    <text x="155" y="190" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">синтез</text>
    <text x="155" y="200" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">3 мин</text>
    <!-- H, He formed -->
    <text x="155" y="145" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">H, He</text>
    
    <!-- Recombination / CMB -->
    <circle cx="215" cy="160" r="6" fill="#FDD835" stroke="#F9A825" stroke-width="1"/>
    <text x="215" y="180" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">Рекомби-</text>
    <text x="215" y="190" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">нация</text>
    <text x="215" y="200" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">380 000 лет</text>
    <text x="215" y="145" font-family="Arial,sans-serif" font-size="5" fill="#F9A825" text-anchor="middle">CMB</text>
    
    <!-- First stars -->
    <circle cx="275" cy="160" r="5" fill="#FDD835" stroke="#E65100" stroke-width="1"/>
    <text x="275" y="180" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">Первые</text>
    <text x="275" y="190" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">звёзды</text>
    <text x="275" y="200" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">~200 млн л.</text>
    
    <!-- Galaxy formation -->
    <circle cx="340" cy="160" r="5" fill="{MAIN}" stroke="#4527A0" stroke-width="1"/>
    <text x="340" y="180" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">Галактики</text>
    <text x="340" y="190" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">~1 млрд л.</text>
    
    <!-- Now -->
    <circle cx="435" cy="160" r="7" fill="#42A5F5" stroke="#1565C0" stroke-width="2"/>
    <text x="435" y="180" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Сегодня</text>
    <text x="435" y="190" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">13.8 млрд</text>
    <text x="435" y="199" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">лет</text>
    
    <!-- CMB explanation -->
    <rect x="20" y="210" width="220" height="90" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
    <text x="130" y="226" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle">Реликтовое излучение</text>
    <text x="130" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(CMB - Cosmic Microwave</text>
    <text x="130" y="251" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Background Radiation)</text>
    <text x="130" y="265" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">T = 2.725 K</text>
    <text x="130" y="278" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">Открыто: Пензиас и Вилсон</text>
    <text x="130" y="289" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">1965 г. (Нобелевская премия)</text>
    
    <!-- Evidence -->
    <rect x="250" y="210" width="230" height="90" rx="4" fill="#F3E5F5" stroke="#7E57C2" stroke-width="1"/>
    <text x="365" y="226" font-family="Arial,sans-serif" font-size="10" fill="#4527A0" text-anchor="middle">Доказательства:</text>
    <text x="365" y="241" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1. Расширение Вселенной</text>
    <text x="365" y="253" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">  (закон Хаббла: v=H*d)</text>
    <text x="365" y="265" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2. Реликтовое излучение</text>
    <text x="365" y="277" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">3. Хим. состав (75%H, 25%He)</text>
    <text x="365" y="289" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">4. Темная материя и энергия</text>
    <text x="365" y="299" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">  (68% темн.эн., 27% темн.м.)</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Астрономия</text>
</svg>