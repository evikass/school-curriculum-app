<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7E57C2" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#7E57C2" text-anchor="middle">Внеземная жизнь</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Астрономия - Урок 12</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#7E57C2" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">

    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.3"/>
    
    <!-- Drake equation -->
    <rect x="20" y="90" width="280" height="65" rx="4" fill="#F3E5F5" stroke="#7E57C2" stroke-width="1"/>
    <text x="160" y="106" font-family="Arial,sans-serif" font-size="12" fill="#4527A0" text-anchor="middle">Уравнение Дрейка</text>
    <text x="160" y="122" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">N = R* x fp x ne x fl x fi x fc x L</text>
    <text x="160" y="138" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">N - число цивилизаций в Галактике</text>
    <text x="160" y="148" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">с которыми возможен контакт</text>
    
    <!-- Drake parameters -->
    <rect x="310" y="90" width="170" height="65" rx="3" fill="#E8EAF6" stroke="#7E57C2" stroke-width="1"/>
    <text x="395" y="104" font-family="Arial,sans-serif" font-size="9" fill="#4527A0" text-anchor="middle">Параметры:</text>
    <text x="395" y="115" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">R* - скорость образ. звёзд</text>
    <text x="395" y="125" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">fp - доля звёзд с планетами</text>
    <text x="395" y="135" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">ne - планеты в зоне жизни</text>
    <text x="395" y="145" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">fl, fi, fc - вероятности</text>
    <text x="395" y="155" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">L - время существования</text>
    
    <!-- Habitable zone -->
    <rect x="20" y="162" width="225" height="138" rx="3" fill="#F3E5F5" stroke="#7E57C2" stroke-width="1"/>
    <text x="132" y="178" font-family="Arial,sans-serif" font-size="11" fill="#4527A0" text-anchor="middle">Обитаемая зона</text>
    
    <!-- Star -->
    <circle cx="132" cy="230" r="15" fill="#FDD835" stroke="#F9A825" stroke-width="1"/>
    
    <!-- Habitable zone ring -->
    <ellipse cx="132" cy="230" rx="45" ry="35" fill="none" stroke="#66BB6A" stroke-width="8" opacity="0.3"/>
    <ellipse cx="132" cy="230" rx="45" ry="35" fill="none" stroke="#66BB6A" stroke-width="1.5"/>
    
    <!-- Too hot zone -->
    <ellipse cx="132" cy="230" rx="25" ry="18" fill="none" stroke="#EF5350" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="132" y="212" font-family="Arial,sans-serif" font-size="5" fill="#EF5350" text-anchor="middle">Слишком</text>
    <text x="132" y="220" font-family="Arial,sans-serif" font-size="5" fill="#EF5350" text-anchor="middle">горячо</text>
    
    <!-- Just right label -->
    <text x="90" y="255" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Обитаемо!</text>
    
    <!-- Too cold -->
    <ellipse cx="132" cy="230" rx="65" ry="48" fill="none" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="155" y="270" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Холодно</text>
    
    <!-- Earth in zone -->
    <circle cx="150" cy="218" r="3" fill="#42A5F5" stroke="#1565C0" stroke-width="0.5"/>
    <text x="165" y="218" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Земля</text>
    
    <!-- Exoplanets -->
    <rect x="255" y="162" width="225" height="138" rx="3" fill="#E8EAF6" stroke="#7E57C2" stroke-width="1"/>
    <text x="367" y="178" font-family="Arial,sans-serif" font-size="11" fill="#4527A0" text-anchor="middle">Экзопланеты</text>
    
    <!-- Methods -->
    <text x="367" y="195" font-family="Arial,sans-serif" font-size="8" fill="#4527A0" text-anchor="middle">Методы обнаружения:</text>
    <text x="367" y="207" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1. Транзитный (затмение)</text>
    <text x="367" y="218" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2. Лучевые скорости</text>
    <text x="367" y="229" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">3. Прямое наблюдение</text>
    <text x="367" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">4. Гравитационное линзир.</text>
    
    <!-- Transit method illustration -->
    <circle cx="310" cy="270" r="10" fill="#FDD835" stroke="#F9A825" stroke-width="0.5"/>
    <circle cx="318" cy="265" r="3" fill="#8D6E63"/>
    <text x="310" y="287" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Транзит</text>
    
    <!-- Light curve -->
    <line x1="340" y1="270" x2="460" y2="270" stroke="#555" stroke-width="0.5"/>
    <path d="M340,260 L370,260 L378,270 L385,260 L460,260" fill="none" stroke="#7E57C2" stroke-width="1.5"/>
    <text x="400" y="287" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Кривая блеска</text>
    
    <!-- Kepler mission -->
    <text x="367" y="295" font-family="Arial,sans-serif" font-size="7" fill="#4527A0" text-anchor="middle">Kepler: &gt;5000 экзопланет</text>
      </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Астрономия</text>
</svg>