<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#1565C0" text-anchor="middle">Измерение информации</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Информатика — Урок 1</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Информация измеряется в битах и байтах</text>
  <rect x="20" y="120" width="460" height="60" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="30" y="138" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Единицы измерения:</text>
  <text x="30" y="158" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="start" font-weight="bold">1 бит</text>
  <text x="145" y="158" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="start" font-weight="bold">1 байт = 8 бит</text>
  <text x="260" y="158" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="start" font-weight="bold">1 Кбайт = 1024 байт</text>
  <text x="375" y="158" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="start" font-weight="bold">1 Мбайт = 1024 Кбайт</text>
  <rect x="20" y="188" width="225" height="70" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="30" y="206" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Формула Хартли:</text>
  <text x="30" y="226" font-family="Arial,sans-serif" font-size="16" fill="#0D47A1" text-anchor="start" font-weight="bold">N = 2^i</text>
  <text x="30" y="248" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="start" font-weight="normal">N — кол-во вариантов</text>
  <text x="30" y="258" font-family="Arial,sans-serif" font-size="8" fill="#555555" text-anchor="start" font-weight="normal">i — инф. объём (бит)</text>
  <rect x="255" y="188" width="225" height="70" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="265" y="206" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Пример:</text>
  <text x="265" y="224" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Алфавит из 32 букв:</text>
  <text x="265" y="240" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">32 = 2^5 → i = 5 бит</text>
  <text x="265" y="256" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">1 символ = 5 бит информации</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#1565C0" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-style="italic">Информатика · 10 класс</text>
</svg>