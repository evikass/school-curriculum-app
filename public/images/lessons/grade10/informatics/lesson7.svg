<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#1565C0" text-anchor="middle">Основы программирования</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Информатика — Урок 7</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="200" height="108" rx="4" fill="#1E1E1E" opacity="0.9"/>
  <text x="28" y="86" font-family="monospace" font-size="9" fill="#D4D4D4" text-anchor="start" font-weight="normal">program hello;</text>
  <text x="28" y="100" font-family="monospace" font-size="9" fill="#D4D4D4" text-anchor="start" font-weight="normal">var a, b: integer;</text>
  <text x="28" y="114" font-family="monospace" font-size="9" fill="#D4D4D4" text-anchor="start" font-weight="normal">begin</text>
  <text x="28" y="128" font-family="monospace" font-size="9" fill="#D4D4D4" text-anchor="start" font-weight="normal">  a := 5;</text>
  <text x="28" y="142" font-family="monospace" font-size="9" fill="#D4D4D4" text-anchor="start" font-weight="normal">  b := a * 2;</text>
  <text x="28" y="156" font-family="monospace" font-size="9" fill="#D4D4D4" text-anchor="start" font-weight="normal">  writeln(b);</text>
  <text x="28" y="170" font-family="monospace" font-size="9" fill="#D4D4D4" text-anchor="start" font-weight="normal">end.</text>
  <rect x="235" y="72" width="245" height="125" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="245" y="90" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">Основные понятия</text>
  <text x="245" y="110" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Переменная — имя ячейки памяти</text>
  <text x="245" y="126" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Тип данных: integer, real, string</text>
  <text x="245" y="142" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Оператор присваивания :=</text>
  <text x="245" y="158" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Ввод: readln()</text>
  <text x="245" y="174" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Вывод: writeln()</text>
  <rect x="20" y="208" width="460" height="70" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="30" y="226" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Структура программы:</text>
  <text x="30" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">1. Заголовок (program)  2. Раздел описаний (var, const)  3. Тело (begin...end)</text>
  <text x="30" y="260" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Языки: Pascal, Python, C++, Java — каждый со своим синтаксисом</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#1565C0" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-style="italic">Информатика · 10 класс</text>
</svg>