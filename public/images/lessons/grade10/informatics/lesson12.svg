<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#1565C0" text-anchor="middle">Защита информации</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Информатика — Урок 12</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="225" height="85" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="132" y="90" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Шифрование</text>
  <text x="35" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="start" font-weight="bold">Симметричное:</text>
  <text x="35" y="124" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">1 ключ для шифровки и расшифровки</text>
  <text x="35" y="142" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="start" font-weight="bold">Асимметричное:</text>
  <text x="35" y="156" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Открытый + закрытый ключ</text>
  <rect x="255" y="72" width="225" height="85" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="367" y="90" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">ЭЦП и аутентификация</text>
  <text x="270" y="110" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Электронная цифровая</text>
  <text x="270" y="124" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">подпись — подтверждение</text>
  <text x="270" y="142" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Аутентификация —</text>
  <text x="270" y="156" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">проверка подлинности</text>
  <rect x="20" y="165" width="460" height="100" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="30" y="183" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">Уровни защиты:</text>
  <circle cx="35" cy="202" r="3" fill="#1565C0" opacity="0.5"/>
  <text x="45" y="206" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Физический — ограничение доступа к оборудованию</text>
  <circle cx="35" cy="218" r="3" fill="#1565C0" opacity="0.5"/>
  <text x="45" y="222" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Программный — антивирусы, межсетевые экраны (firewall)</text>
  <circle cx="35" cy="234" r="3" fill="#1565C0" opacity="0.5"/>
  <text x="45" y="238" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Организационный — правила и политики безопасности</text>
  <circle cx="35" cy="250" r="3" fill="#1565C0" opacity="0.5"/>
  <text x="45" y="254" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Законодательный — законы о защите персональных данных</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#1565C0" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-style="italic">Информатика · 10 класс</text>
</svg>