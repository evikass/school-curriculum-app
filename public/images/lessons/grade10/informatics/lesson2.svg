<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#1565C0" text-anchor="middle">Кодирование информации</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Информатика — Урок 2</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Кодирование — преобразование информации в удобную форму</text>
  <rect x="20" y="120" width="225" height="80" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="132" y="138" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Двоичный код</text>
  <text x="35" y="158" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">A → 01000001</text>
  <text x="35" y="174" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">Б → 11000001</text>
  <text x="35" y="190" font-family="monospace" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">0 → 00110000</text>
  <rect x="255" y="120" width="225" height="80" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="367" y="138" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Виды кодирования</text>
  <text x="270" y="158" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Текстовое (ASCII, Unicode)</text>
  <text x="270" y="174" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Графическое (RGB, CMYK)</text>
  <text x="270" y="190" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Звуковое (частота, амплитуда)</text>
  <rect x="20" y="208" width="460" height="70" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="30" y="226" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Кодировки:</text>
  <text x="30" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">ASCII — 128 символов (7 бит) | Unicode — 143 000+ символов (до 4 байт)</text>
  <text x="30" y="260" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">UTF-8: переменная длина (1-4 байта) — стандарт Интернета</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#1565C0" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-style="italic">Информатика · 10 класс</text>
</svg>