<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#1565C0" text-anchor="middle">Локальные и глобальные сети</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Информатика — Урок 9</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="225" height="100" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="132" y="90" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Локальная сеть (LAN)</text>
  <text x="35" y="110" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Ограниченная территория:</text>
  <text x="35" y="126" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Офис, школа, дом</text>
  <text x="35" y="142" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Высокая скорость</text>
  <text x="35" y="158" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Топология: звезда, кольцо, шина</text>
  <rect x="255" y="72" width="225" height="100" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="367" y="90" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Глобальная сеть (WAN)</text>
  <text x="270" y="110" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Неограниченная территория:</text>
  <text x="270" y="126" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Интернет — сеть сетей</text>
  <text x="270" y="142" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• TCP/IP — базовые протоколы</text>
  <text x="270" y="158" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">• Маршрутизация пакетов</text>
  <rect x="20" y="180" width="460" height="80" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="30" y="198" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Аппаратные компоненты:</text>
  <text x="30" y="216" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Сервер — предоставляет ресурсы | Клиент — использует ресурсы</text>
  <text x="30" y="232" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Маршрутизатор — направляет пакеты | Коммутатор — соединяет в LAN</text>
  <text x="30" y="248" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">Сетевая карта, кабель (витая пара, оптоволокно), Wi-Fi</text>
  <ellipse cx="250" cy="330" rx="200" ry="10" fill="#1565C0" opacity="0.06"/>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-style="italic">Информатика · 10 класс</text>
</svg>