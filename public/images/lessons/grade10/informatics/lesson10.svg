<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#1565C0" text-anchor="middle">Интернет и его сервисы</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Информатика — Урок 10</text>
  <line x1="30" y1="64" x2="470" y2="64" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="72" width="460" height="40" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="250" y="96" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Интернет — глобальная сеть, основанная на протоколе TCP/IP</text>
  <rect x="20" y="120" width="112" height="50" rx="5" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="76" y="140" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">WWW</text>
  <text x="76" y="158" font-family="Arial,sans-serif" font-size="7" fill="#555555" text-anchor="middle" font-weight="normal">Всемирная паутина, гипертекст</text>
  <rect x="138" y="120" width="112" height="50" rx="5" fill="white" stroke="#E65100" stroke-width="1.5"/>
