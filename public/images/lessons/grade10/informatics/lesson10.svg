  <text x="194" y="158" font-family="Arial,sans-serif" font-size="7" fill="#555555" text-anchor="middle" font-weight="normal">Электронная почта</text>
  <rect x="256" y="120" width="112" height="50" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="312" y="140" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">FTP</text>
  <text x="312" y="158" font-family="Arial,sans-serif" font-size="7" fill="#555555" text-anchor="middle" font-weight="normal">Передача файлов</text>
  <rect x="374" y="120" width="112" height="50" rx="5" fill="white" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="430" y="140" font-family="Arial,sans-serif" font-size="12" fill="#6A1B9A" text-anchor="middle" font-weight="bold">DNS</text>
  <text x="430" y="158" font-family="Arial,sans-serif" font-size="7" fill="#555555" text-anchor="middle" font-weight="normal">Доменные имена</text>
  <rect x="20" y="178" width="225" height="85" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="30" y="196" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Адресация в Интернете</text>
  <text x="30" y="214" font-family="monospace" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">IP-адрес: 192.168.1.1</text>
  <text x="30" y="230" font-family="monospace" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">URL: https://site.ru/path</text>
  <text x="30" y="246" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">DNS: имя → IP-адрес</text>
  <rect x="255" y="178" width="225" height="85" rx="5" fill="#1565C0" opacity="0.08"/>
  <text x="265" y="196" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Протоколы</text>
  <text x="265" y="214" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">HTTP/HTTPS — веб-страницы</text>
  <text x="265" y="230" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">SMTP/POP3 — почта</text>
  <text x="265" y="246" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">FTP — файлы</text>
