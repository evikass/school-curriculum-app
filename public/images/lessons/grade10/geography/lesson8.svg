<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#26A69A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#26A69A" text-anchor="middle">Воспроизводство и структура населения</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#26A69A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
<rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00796B" text-anchor="middle">Воспроизводство и структура населения</text>

<!-- Population pyramid - left side (male) -->
<text x="140" y="115" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1565C0" text-anchor="middle">Мужчины</text>
<text x="260" y="115" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E53935" text-anchor="middle">Женщины</text>

<!-- Age labels -->
<text x="200" y="130" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">0-14</text>
<text x="200" y="145" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">15-29</text>
<text x="200" y="160" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">30-44</text>
<text x="200" y="175" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">45-59</text>
<text x="200" y="190" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">60-74</text>
<text x="200" y="205" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">75+</text>

<!-- Male bars (left, growing left) -->
<rect x="120" y="124" width="75" height="10" rx="1" fill="#64B5F6"/>
<rect x="130" y="139" width="65" height="10" rx="1" fill="#64B5F6"/>
<rect x="135" y="154" width="60" height="10" rx="1" fill="#64B5F6"/>
<rect x="145" y="169" width="50" height="10" rx="1" fill="#64B5F6"/>
<rect x="155" y="184" width="40" height="10" rx="1" fill="#64B5F6"/>
<rect x="170" y="199" width="25" height="10" rx="1" fill="#64B5F6"/>

<!-- Female bars (right, growing right) -->
<rect x="205" y="124" width="70" height="10" rx="1" fill="#EF9A9A"/>
<rect x="205" y="139" width="65" height="10" rx="1" fill="#EF9A9A"/>
<rect x="205" y="154" width="60" height="10" rx="1" fill="#EF9A9A"/>
<rect x="205" y="169" width="50" height="10" rx="1" fill="#EF9A9A"/>
<rect x="205" y="184" width="45" height="10" rx="1" fill="#EF9A9A"/>
<rect x="205" y="199" width="30" height="10" rx="1" fill="#EF9A9A"/>

<!-- Center line -->
<line x1="200" y1="120" x2="200" y2="212" stroke="#333" stroke-width="0.8"/>

<!-- Demographic transition diagram - right side -->
<rect x="290" y="110" width="190" height="115" rx="5" fill="white" stroke="#00796B" stroke-width="1"/>
<text x="385" y="124" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00796B" text-anchor="middle">Демографический переход</text>
<!-- Axes -->
<line x1="310" y1="215" x2="465" y2="215" stroke="#333" stroke-width="0.8"/>
<line x1="310" y1="135" x2="310" y2="215" stroke="#333" stroke-width="0.8"/>
<text x="388" y="222" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Этапы</text>
<!-- Birth rate line (declining) -->
<path d="M315,145 L340,148 L365,155 L390,170 L415,185 L440,195 L460,200" fill="none" stroke="#1565C0" stroke-width="1.5"/>
<!-- Death rate line (declining faster) -->
<path d="M315,170 L340,168 L365,175 L390,195 L415,205 L440,208 L460,210" fill="none" stroke="#E53935" stroke-width="1.5"/>
<!-- Labels -->
<text x="465" y="198" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">рожд.</text>
<text x="465" y="210" font-family="Arial,sans-serif" font-size="5" fill="#E53935">смерт.</text>
<!-- Stage labels -->
<text x="325" y="220" font-family="Arial,sans-serif" font-size="4" fill="#333">I</text>
<text x="350" y="220" font-family="Arial,sans-serif" font-size="4" fill="#333">II</text>
<text x="380" y="220" font-family="Arial,sans-serif" font-size="4" fill="#333">III</text>
<text x="410" y="220" font-family="Arial,sans-serif" font-size="4" fill="#333">IV</text>
<text x="440" y="220" font-family="Arial,sans-serif" font-size="4" fill="#333">V</text>
<!-- Growth arrow in stage II -->
<path d="M358,140 L365,140 L365,135" fill="none" stroke="#2E7D32" stroke-width="1"/>
<text x="358" y="138" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32">рост</text>

<!-- Bottom info -->
<rect x="25" y="225" width="450" height="68" rx="5" fill="white" opacity="0.8" stroke="#00796B" stroke-width="0.5"/>
<text x="250" y="240" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00796B" text-anchor="middle">Показатели воспроизводства населения</text>
<text x="60" y="255" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">Рождаемость</text>
<text x="60" y="265" font-family="Arial,sans-serif" font-size="5" fill="#555">Высокая: Африка (35-50%)</text>
<text x="60" y="275" font-family="Arial,sans-serif" font-size="5" fill="#555">Низкая: Европа (8-12%)</text>
<text x="250" y="255" font-family="Arial,sans-serif" font-size="6" fill="#E53935">Смертность</text>
<text x="250" y="265" font-family="Arial,sans-serif" font-size="5" fill="#555">Высокая: Африка (10-20%)</text>
<text x="250" y="275" font-family="Arial,sans-serif" font-size="5" fill="#555">Низкая: Европа (8-12%)</text>
<text x="400" y="255" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Естеств. прирост</text>
<text x="400" y="265" font-family="Arial,sans-serif" font-size="5" fill="#555">Африка: +2.5%</text>
<text x="400" y="275" font-family="Arial,sans-serif" font-size="5" fill="#555">Европа: -0.1%</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">География</text>
</svg>