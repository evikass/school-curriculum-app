<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#26A69A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#26A69A" text-anchor="middle">Международные организации</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#26A69A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
<rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
<!-- UN -->
<circle cx="250" cy="170" r="40" fill="white" stroke="#00796B" stroke-width="2"/>
<circle cx="250" cy="170" r="35" fill="none" stroke="#26A69A" stroke-width="1"/>
<!-- UN olive branches -->
<path d="M220,155 Q215,170 220,185" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<path d="M280,155 Q285,170 280,185" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<text x="250" y="168" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#00796B" text-anchor="middle">OOH</text>
<text x="250" y="180" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Организация Объединённых Наций</text>

<!-- WTO -->
<rect x="30" y="100" width="90" height="65" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
<circle cx="75" cy="122" r="15" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
<path d="M65,122 Q70,115 75,122 Q80,129 85,122" fill="none" stroke="#1565C0" stroke-width="1.2"/>
<path d="M65,122 Q70,129 75,122 Q80,115 85,122" fill="none" stroke="#1565C0" stroke-width="1.2"/>
<text x="75" y="150" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0" text-anchor="middle">ВТО</text>
<text x="75" y="160" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Всемирная торговая орг.</text>

<!-- NATO -->
<rect x="380" y="100" width="90" height="65" rx="5" fill="white" stroke="#0D47A1" stroke-width="1.5"/>
<circle cx="425" cy="122" r="15" fill="#E3F2FD" stroke="#0D47A1" stroke-width="1"/>
<!-- Compass rose -->
<path d="M425,110 L428,120 L425,118 L422,120 Z" fill="#0D47A1"/>
<path d="M425,134 L428,124 L425,126 L422,124 Z" fill="#0D47A1" opacity="0.6"/>
<line x1="413" y1="122" x2="437" y2="122" stroke="#0D47A1" stroke-width="0.7"/>
<text x="425" y="150" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1" text-anchor="middle">НАТО</text>
<text x="425" y="160" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Военный союз</text>

<!-- EU -->
<rect x="30" y="220" width="90" height="65" rx="5" fill="white" stroke="#1B5E20" stroke-width="1.5"/>
<!-- EU stars circle -->
<circle cx="75" cy="240" r="12" fill="none" stroke="#1B5E20" stroke-width="0.5"/>
<text x="75" y="243" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle">&#9733;&#9733;&#9733;</text>
<text x="75" y="265" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">ЕС</text>
<text x="75" y="275" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Европейский союз</text>

<!-- BRICS -->
<rect x="380" y="220" width="90" height="65" rx="5" fill="white" stroke="#E65100" stroke-width="1.5"/>
<text x="425" y="245" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">BRICS</text>
<text x="425" y="258" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">BR I C S</text>
<text x="425" y="275" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Бразилия, Россия, Индия,</text>
<text x="425" y="282" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Китай, ЮАР</text>

<!-- Connection lines from organizations to UN -->
<line x1="120" y1="132" x2="215" y2="158" stroke="#26A69A" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="380" y1="132" x2="285" y2="158" stroke="#26A69A" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="120" y1="252" x2="215" y2="185" stroke="#26A69A" stroke-width="1" stroke-dasharray="3,2"/>
<line x1="380" y1="252" x2="285" y2="185" stroke="#26A69A" stroke-width="1" stroke-dasharray="3,2"/>

<!-- UNESCO label -->
<rect x="155" y="95" width="80" height="25" rx="3" fill="white" stroke="#00796B" stroke-width="0.8"/>
<text x="195" y="108" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00796B" text-anchor="middle">ЮНЕСКО</text>
<text x="195" y="117" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Культура, наука</text>
<line x1="195" y1="120" x2="225" y2="140" stroke="#00796B" stroke-width="0.7" stroke-dasharray="2,2"/>

<!-- IMF label -->
<rect x="265" y="95" width="80" height="25" rx="3" fill="white" stroke="#00796B" stroke-width="0.8"/>
<text x="305" y="108" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00796B" text-anchor="middle">МВФ</text>
<text x="305" y="117" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Финансы</text>
<line x1="305" y1="120" x2="275" y2="140" stroke="#00796B" stroke-width="0.7" stroke-dasharray="2,2"/>

<!-- Info text -->
<text x="250" y="295" font-family="Arial,sans-serif" font-size="6" fill="#00796B" text-anchor="middle">Международные организации способствуют сотрудничеству между государствами</text>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">География</text>
</svg>