<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00796B"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#26A69A" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#26A69A" text-anchor="middle">Миграции населения</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#26A69A" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
<rect x="15" y="85" width="470" height="215" fill="#E0F2F1" opacity="0.5"/>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00796B" text-anchor="middle">Миграции населения</text>

<!-- Simplified world map with migration arrows -->
<!-- Regions -->
<rect x="50" y="115" width="60" height="40" rx="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
<text x="80" y="138" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">США</text>

<rect x="120" y="115" width="55" height="40" rx="5" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<text x="147" y="138" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">ЕС</text>

<rect x="190" y="115" width="55" height="40" rx="5" fill="#FFCCBC" stroke="#E65100" stroke-width="1"/>
<text x="217" y="133" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Сев.</text>
<text x="217" y="142" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Африка</text>

<rect x="260" y="115" width="55" height="40" rx="5" fill="#FFE0B2" stroke="#F57F17" stroke-width="1"/>
<text x="287" y="133" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">Юго-	ext-anchor="middle">Зап.</text>
<text x="287" y="142" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">Азия</text>

<rect x="330" y="115" width="55" height="40" rx="5" fill="#F8BBD0" stroke="#C2185B" stroke-width="1"/>
<text x="357" y="133" font-family="Arial,sans-serif" font-size="6" fill="#C2185B" text-anchor="middle">Центр.</text>
<text x="357" y="142" font-family="Arial,sans-serif" font-size="6" fill="#C2185B" text-anchor="middle">Азия</text>

<rect x="400" y="115" width="55" height="40" rx="5" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1"/>
<text x="427" y="133" font-family="Arial,sans-serif" font-size="6" fill="#6A1B9A" text-anchor="middle">Вост.</text>
<text x="427" y="142" font-family="Arial,sans-serif" font-size="6" fill="#6A1B9A" text-anchor="middle">Азия</text>

<!-- Migration arrows (major flows) -->
<path d="M210,155 C210,170 80,170 80,155" fill="none" stroke="#D32F2F" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="145" y="172" font-family="Arial,sans-serif" font-size="5" fill="#D32F2F">Африка - США</text>

<path d="M210,160 C210,180 147,180 147,160" fill="none" stroke="#FF6F00" stroke-width="1.5"/>
<text x="178" y="185" font-family="Arial,sans-serif" font-size="5" fill="#FF6F00">Африка - ЕС</text>

<path d="M287,155 C287,175 427,175 427,155" fill="none" stroke="#1565C0" stroke-width="1"/>
<text x="357" y="180" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">ЮЗ Азия - Вост. Азия</text>

<path d="M357,155 C357,168 147,168 147,155" fill="none" stroke="#6A1B9A" stroke-width="1" stroke-dasharray="3,2"/>
<text x="250" y="166" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A">Центр. Азия - ЕС</text>

<!-- Push/Pull factors -->
<rect x="25" y="200" width="215" height="90" rx="5" fill="white" stroke="#D32F2F" stroke-width="1"/>
<text x="132" y="215" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#D32F2F" text-anchor="middle">Факторы выталкивания (Push)</text>
<!-- Push factors -->
<text x="40" y="230" font-family="Arial,sans-serif" font-size="6" fill="#333">- Бедность и безработица</text>
<text x="40" y="242" font-family="Arial,sans-serif" font-size="6" fill="#333">- Войны и конфликты</text>
<text x="40" y="254" font-family="Arial,sans-serif" font-size="6" fill="#333">- Экологические катастрофы</text>
<text x="40" y="266" font-family="Arial,sans-serif" font-size="6" fill="#333">- Политическая нестабильность</text>
<text x="40" y="278" font-family="Arial,sans-serif" font-size="6" fill="#333">- Недостаток образования</text>
<!-- Push icon -->
<path d="M210,225 L195,240 L210,240 L195,255" fill="none" stroke="#D32F2F" stroke-width="1.5"/>

<rect x="260" y="200" width="215" height="90" rx="5" fill="white" stroke="#2E7D32" stroke-width="1"/>
<text x="367" y="215" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Факторы притяжения (Pull)</text>
<text x="275" y="230" font-family="Arial,sans-serif" font-size="6" fill="#333">- Высокий уровень жизни</text>
<text x="275" y="242" font-family="Arial,sans-serif" font-size="6" fill="#333">- Рабочие места</text>
<text x="275" y="254" font-family="Arial,sans-serif" font-size="6" fill="#333">- Политическая стабильность</text>
<text x="275" y="266" font-family="Arial,sans-serif" font-size="6" fill="#333">- Образование и медицина</text>
<text x="275" y="278" font-family="Arial,sans-serif" font-size="6" fill="#333">- Свобода прав человека</text>
<!-- Pull icon -->
<path d="M445,225 L460,240 L445,240 L460,255" fill="none" stroke="#2E7D32" stroke-width="1.5"/>

<!-- Arrow between push and pull -->
<path d="M240,245 L255,245" fill="none" stroke="#00796B" stroke-width="2"/>
<polygon points="255,242 260,245 255,248" fill="#00796B"/>

  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">География</text>
</svg>