<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#FFF"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
<text x="250" y="38" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#0D47A1" text-anchor="middle">NoSQL базы данных</text>
<text x="250" y="56" font-family="Arial,sans-serif" font-size="11" fill="#888888" text-anchor="middle">Программирование — Урок 11</text>
<line x1="30" y1="64" x2="470" y2="64" stroke="#0D47A1" stroke-width="2" opacity="0.25"/>
<rect x="20" y="72" width="460" height="48" rx="5" fill="#0D47A1" opacity="0.08"/>
<text x="30" y="90" font-family="Arial,sans-serif" font-size="12" fill="#0D47A1" text-anchor="start" font-weight="bold">NoSQL:</text>
<text x="30" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Нереляционные БД для специфических задач и масштабирования</text>
<rect x="20" y="128" width="460" height="46" rx="5" fill="#0D47A1" opacity="0.04"/>
<text x="30" y="144" font-family="Arial,sans-serif" font-size="10" fill="#0D47A1" text-anchor="start" font-weight="bold">Типы:</text>
<text x="30" y="162" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Документные (MongoDB), Ключ-значение (Redis), Колоночные, Графовые</text>
<rect x="20" y="180" width="460" height="46" rx="5" fill="#0D47A1" opacity="0.05"/>
<text x="30" y="196" font-family="Arial,sans-serif" font-size="10" fill="#0D47A1" text-anchor="start" font-weight="bold">Преимущества:</text>
<text x="30" y="214" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Гибкая схема, горизонтальное масштабирование, высокая скорость</text>
<rect x="20" y="232" width="460" height="46" rx="5" fill="#0D47A1" opacity="0.06"/>
<text x="30" y="248" font-family="Arial,sans-serif" font-size="10" fill="#0D47A1" text-anchor="start" font-weight="bold">Недостатки:</text>
<text x="30" y="266" font-family="Arial,sans-serif" font-size="9" fill="#555555" text-anchor="start" font-weight="normal">Нет стандарта SQL, слабая консистентность, меньше инструментов</text>
<ellipse cx="250" cy="330" rx="200" ry="10" fill="#0D47A1" opacity="0.06"/>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#0D47A1" text-anchor="middle" font-style="italic">Программирование · 10 класс</text>
</svg>