<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80000022"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#800000"/>
      <stop offset="100%" stop-color="#800000BB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#800000" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#800000" text-anchor="middle">Опричнина</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История России — Урок 23</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#800000" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="85" width="470" height="215" fill="#80000011" opacity="0.5"/>
    
    <!-- Central emblem -->
    <circle cx="140" cy="195" r="65" fill="#80000022" stroke="#800000" stroke-width="2" opacity="0.6"/>
    <circle cx="140" cy="195" r="45" fill="#80000033" stroke="#800000" stroke-width="1.5"/>
    <text x="140" y="185" font-family="Arial,sans-serif" font-size="28" text-anchor="middle" fill="#800000">23</text>
    <text x="140" y="210" font-family="Arial,sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#800000">УРОК</text>
    
    <!-- Subtitle -->
    <text x="140" y="270" font-family="Arial,sans-serif" font-size="11" fill="#800000" text-anchor="middle" font-weight="bold">1565–1572</text>
    
    <!-- Key points on the right -->
    <rect x="230" y="95" width="245" height="195" rx="5" fill="white" stroke="#800000" stroke-width="1" opacity="0.8"/>
    <circle cx="245" cy="115" r="4" fill="#800000"/>
    <text x="258" y="119" font-family="Arial,sans-serif" font-size="11" fill="#333">1565 — введение опричнины</text>
    <circle cx="245" cy="160" r="4" fill="#800000"/>
    <text x="258" y="164" font-family="Arial,sans-serif" font-size="11" fill="#333">Собачья голова и метла</text>
    <circle cx="245" cy="205" r="4" fill="#800000"/>
    <text x="258" y="209" font-family="Arial,sans-serif" font-size="11" fill="#333">1570 — разгром Новгорода</text>
    <circle cx="245" cy="250" r="4" fill="#800000"/>
    <text x="258" y="254" font-family="Arial,sans-serif" font-size="11" fill="#333">1571 — Крым сжёг Москву</text>
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">История России</text>
</svg>