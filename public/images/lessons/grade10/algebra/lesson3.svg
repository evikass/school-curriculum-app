<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0D47A1" text-anchor="middle">Обратная функция</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Алгебра 10 класс — Урок 3</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#0D47A1" stroke-width="1" opacity="0.3"/>

<!-- y=x line (bisector) -->
<g transform="translate(160,175)">
  <line x1="-70" y1="70" x2="70" y2="-70" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="65" y="-58" font-family="Arial,sans-serif" font-size="8" fill="#999" font-weight="bold">y = x</text>

  <!-- Axes -->
  <line x1="-75" y1="0" x2="80" y2="0" stroke="#666" stroke-width="1"/>
  <line x1="0" y1="-75" x2="0" y2="80" stroke="#666" stroke-width="1"/>
  <text x="80" y="12" font-family="Arial,sans-serif" font-size="8" fill="#666">x</text>
  <text x="5" y="-70" font-family="Arial,sans-serif" font-size="8" fill="#666">y</text>

  <!-- f(x) curve -->
  <path d="M-50,60 Q-20,30 0,0 Q20,-30 60,-60" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="55" y="-52" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold">y = f(x)</text>

  <!-- f⁻¹(x) curve (mirror) -->
  <path d="M-60,50 Q-30,20 0,0 Q30,-20 50,-60" fill="none" stroke="#E91E63" stroke-width="2.5"/>
  <text x="-60" y="60" font-family="Arial,sans-serif" font-size="8" fill="#E91E63" font-weight="bold">y = f⁻¹(x)</text>

  <!-- Symmetry arrows -->
  <g opacity="0.5">
    <line x1="30" y1="-20" x2="20" y2="-30" stroke="#4CAF50" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="-20" y1="30" x2="-30" y2="20" stroke="#4CAF50" stroke-width="1" stroke-dasharray="2,2"/>
  </g>
  <text x="50" y="25" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50" text-anchor="middle" font-weight="bold">Симметрия</text>
  <text x="50" y="33" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50" text-anchor="middle">отн. y = x</text>
</g>

<!-- Properties panel -->
<g transform="translate(380,120)">
  <rect x="-60" y="-50" width="120" height="100" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="1"/>
  <text x="0" y="-34" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">Свойства</text>
  <line x1="-50" y1="-28" x2="50" y2="-28" stroke="#1565C0" stroke-width="0.5"/>

  <circle cx="-40" cy="-16" r="3" fill="#1565C0"/>
  <text x="-30" y="-13" font-family="Arial,sans-serif" font-size="6" fill="#333">D(f⁻¹) = E(f)</text>

  <circle cx="-40" cy="0" r="3" fill="#E91E63"/>
  <text x="-30" y="3" font-family="Arial,sans-serif" font-size="6" fill="#333">E(f⁻¹) = D(f)</text>

  <circle cx="-40" cy="16" r="3" fill="#4CAF50"/>
  <text x="-30" y="19" font-family="Arial,sans-serif" font-size="6" fill="#333">f(f⁻¹(x)) = x</text>

  <circle cx="-40" cy="32" r="3" fill="#FF9800"/>
  <text x="-30" y="35" font-family="Arial,sans-serif" font-size="6" fill="#333">f⁻¹(f(x)) = x</text>

  <text x="0" y="46" font-family="Arial,sans-serif" font-size="5" fill="#F44336" text-anchor="middle" font-weight="bold">f⁻¹ ≠ 1/f !</text>
</g>

<!-- Examples panel -->
<g transform="translate(100,280)">
  <rect x="-80" y="-30" width="160" height="55" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="1"/>
  <text x="0" y="-16" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">Примеры обратных</text>
  <text x="0" y="-2" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">2x+3 ↔ (x−3)/2</text>
  <text x="0" y="10" font-family="Arial,sans-serif" font-size="7" fill="#E91E63" text-anchor="middle">x³ ↔ ∛x</text>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle">eˣ ↔ ln x</text>
</g>

<!-- How to find -->
<g transform="translate(340,280)">
  <rect x="-120" y="-30" width="240" height="55" rx="5" fill="white" opacity="0.85" stroke="#1565C0" stroke-width="1"/>
  <text x="0" y="-16" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">Как найти f⁻¹:</text>
  <text x="0" y="-2" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">1. Записать y = f(x)   2. Выразить x через y</text>
  <text x="0" y="10" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">3. Поменять x ↔ y   4. Записать y = f⁻¹(x)</text>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#F44336" text-anchor="middle" font-weight="bold">Монотонная функция всегда обратима!</text>
</g>

<rect x="10" y="320" width="480" height="22" rx="4" fill="#0D47A1" opacity="0.85"/>
<text x="250" y="335" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="white" font-weight="bold">Графики f(x) и f⁻¹(x) симметричны относительно y = x</text>
</svg>