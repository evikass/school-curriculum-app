<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Основные тригонометрические тождества</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Unit circle -->
    <circle cx="135" cy="210" r="75" fill="none" stroke="#5C6BC0" stroke-width="2"/>
    <!-- Axes through center -->
    <line x1="50" y1="210" x2="220" y2="210" stroke="#3F51B5" stroke-width="1"/>
    <line x1="135" y1="125" x2="135" y2="295" stroke="#3F51B5" stroke-width="1"/>
    <text x="225" y="213" font-family="Arial,sans-serif" font-size="9" fill="#3F51B5">x</text>
    <text x="138" y="123" font-family="Arial,sans-serif" font-size="9" fill="#3F51B5">y</text>
    <!-- Angle arc -->
    <path d="M155,210 A20,20 0 0,0 148,196" fill="none" stroke="#E91E63" stroke-width="1.5"/>
    <text x="155" y="198" font-family="Arial,sans-serif" font-size="11" fill="#E91E63">a</text>
    <!-- Point on circle -->
    <line x1="135" y1="210" x2="185" y2="155" stroke="#5C6BC0" stroke-width="2"/>
    <circle cx="185" cy="155" r="3" fill="#5C6BC0"/>
    <!-- sin projection -->
    <line x1="185" y1="155" x2="185" y2="210" stroke="#E91E63" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="190" y="185" font-family="Arial,sans-serif" font-size="10" fill="#E91E63" font-weight="bold">sin a</text>
    <!-- cos projection -->
    <line x1="135" y1="210" x2="185" y2="210" stroke="#4CAF50" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="150" y="225" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50" font-weight="bold">cos a</text>
    <!-- Labels on circle -->
    <text x="138" y="140" font-family="Arial,sans-serif" font-size="9" fill="#888">1</text>
    <text x="205" y="213" font-family="Arial,sans-serif" font-size="9" fill="#888">1</text>
    <text x="55" y="213" font-family="Arial,sans-serif" font-size="9" fill="#888">-1</text>
    <!-- Right angle marker -->
    <rect x="182" y="207" width="6" height="6" fill="none" stroke="#888" stroke-width="0.5"/>
    <!-- Identities panel -->
    <rect x="235" y="90" width="250" height="205" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <text x="245" y="108" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Основные тождества:</text>
    <line x1="245" y1="113" x2="475" y2="113" stroke="#5C6BC0" stroke-width="0.5"/>
    <!-- Main identity highlighted -->
    <rect x="250" y="118" width="220" height="22" rx="3" fill="#5C6BC0" opacity="0.1"/>
    <text x="360" y="134" font-family="Arial,sans-serif" font-size="14" fill="#5C6BC0" text-anchor="middle" font-weight="bold">sin^2 a + cos^2 a = 1</text>
    <!-- Other identities -->
    <text x="245" y="158" font-family="Arial,sans-serif" font-size="12" fill="#444">1 + tg^2 a = 1/cos^2 a</text>
    <text x="245" y="178" font-family="Arial,sans-serif" font-size="12" fill="#444">1 + ctg^2 a = 1/sin^2 a</text>
    <line x1="245" y1="186" x2="475" y2="186" stroke="#ccc" stroke-width="0.5"/>
    <text x="245" y="200" font-family="Arial,sans-serif" font-size="12" fill="#444">tg a = sin a / cos a</text>
    <text x="245" y="218" font-family="Arial,sans-serif" font-size="12" fill="#444">ctg a = cos a / sin a</text>
    <text x="245" y="236" font-family="Arial,sans-serif" font-size="12" fill="#444">tg a * ctg a = 1</text>
    <line x1="245" y1="244" x2="475" y2="244" stroke="#ccc" stroke-width="0.5"/>
    <text x="245" y="258" font-family="Arial,sans-serif" font-size="11" fill="#888">Знаки по четвертям:</text>
    <text x="285" y="275" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">I: ++</text>
    <text x="330" y="275" font-family="Arial,sans-serif" font-size="10" fill="#E91E63">II: +-</text>
    <text x="375" y="275" font-family="Arial,sans-serif" font-size="10" fill="#E91E63">III: --</text>
    <text x="420" y="275" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">IV: -+</text>
    <text x="245" y="292" font-family="Arial,sans-serif" font-size="9" fill="#aaa">(sin, cos)</text>
    <!-- Circle label -->
    <text x="135" y="298" font-family="Arial,sans-serif" font-size="10" fill="#5C6BC0" text-anchor="middle">Единичная окружность</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>