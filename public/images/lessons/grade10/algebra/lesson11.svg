<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Правила дифференцирования</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Rule 1: Sum rule -->
    <rect x="25" y="90" width="460" height="36" rx="4" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="25" y="90" width="5" height="36" rx="2" fill="#5C6BC0"/>
    <text x="40" y="108" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">1. Сумма:</text>
    <text x="120" y="108" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0" font-weight="bold">(u + v)' = u' + v'</text>
    <text x="330" y="108" font-family="Arial,sans-serif" font-size="10" fill="#888">Производная суммы = сумме производных</text>
    <!-- Rule 2: Product rule -->
    <rect x="25" y="132" width="460" height="36" rx="4" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="25" y="132" width="5" height="36" rx="2" fill="#E91E63"/>
    <text x="40" y="150" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">2. Произведение:</text>
    <text x="160" y="150" font-family="Arial,sans-serif" font-size="13" fill="#E91E63" font-weight="bold">(uv)' = u'v + uv'</text>
    <text x="330" y="150" font-family="Arial,sans-serif" font-size="10" fill="#888">Первый дифф. + второй дифф.</text>
    <!-- Rule 3: Quotient rule -->
    <rect x="25" y="174" width="460" height="36" rx="4" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="25" y="174" width="5" height="36" rx="2" fill="#4CAF50"/>
    <text x="40" y="192" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">3. Частное:</text>
    <text x="120" y="185" font-family="Arial,sans-serif" font-size="11" fill="#4CAF50" font-weight="bold">u'v - uv'</text>
    <line x1="115" y1="188" x2="205" y2="188" stroke="#4CAF50" stroke-width="1"/>
    <text x="145" y="200" font-family="Arial,sans-serif" font-size="11" fill="#4CAF50" font-weight="bold">v^2</text>
    <text x="230" y="192" font-family="Arial,sans-serif" font-size="10" fill="#888">(u/v)' = (u'v - uv') / v^2</text>
    <!-- Rule 4: Chain rule -->
    <rect x="25" y="216" width="460" height="36" rx="4" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="25" y="216" width="5" height="36" rx="2" fill="#FF9800"/>
    <text x="40" y="234" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">4. Цепное правило:</text>
    <text x="175" y="234" font-family="Arial,sans-serif" font-size="13" fill="#FF9800" font-weight="bold">[f(g(x))]' = f'(g(x)) * g'(x)</text>
    <text x="405" y="234" font-family="Arial,sans-serif" font-size="10" fill="#888">Сложная функция</text>
    <!-- Basic derivatives table -->
    <rect x="25" y="258" width="460" height="40" rx="4" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="25" y="258" width="5" height="40" rx="2" fill="#3F51B5"/>
    <text x="40" y="275" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5" font-weight="bold">Таблица:</text>
    <text x="100" y="275" font-family="Arial,sans-serif" font-size="10" fill="#444">(x^n)' = nx^(n-1)</text>
    <text x="220" y="275" font-family="Arial,sans-serif" font-size="10" fill="#444">(sin x)' = cos x</text>
    <text x="330" y="275" font-family="Arial,sans-serif" font-size="10" fill="#444">(cos x)' = -sin x</text>
    <text x="100" y="293" font-family="Arial,sans-serif" font-size="10" fill="#444">(e^x)' = e^x</text>
    <text x="220" y="293" font-family="Arial,sans-serif" font-size="10" fill="#444">(ln x)' = 1/x</text>
    <text x="330" y="293" font-family="Arial,sans-serif" font-size="10" fill="#444">(C)' = 0</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>