<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="13" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Синус и косинус суммы и разности</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 11</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="230" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="127" y="74" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Синус</text>
  <text x="127" y="92" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">sin(α+β) = sinα cosβ + cosα sinβ</text>
  <text x="127" y="107" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">sin(α−β) = sinα cosβ − cosα sinβ</text>
  <text x="127" y="125" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Смешанные произведения</text>
  <text x="127" y="140" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Знак совпадает с аргументом</text>
  <text x="127" y="155" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">(+ → +, − → −)</text>
  <rect x="252" y="58" width="236" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="370" y="74" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Косинус</text>
  <text x="370" y="92" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">cos(α+β) = cosα cosβ − sinα sinβ</text>
  <text x="370" y="107" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">cos(α−β) = cosα cosβ + sinα sinβ</text>
  <text x="370" y="125" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Однородные произведения</text>
  <text x="370" y="140" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Знак противоположен аргументу</text>
  <text x="370" y="155" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">(+ → −, − → +)</text>
  <rect x="12" y="166" width="476" height="65" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="183" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Примеры</text>
  <text x="250" y="200" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">sin 75° = sin(45°+30°) = (√6+√2)/4</text>
  <text x="250" y="215" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">cos 15° = cos(45°−30°) = (√6+√2)/4</text>
  <text x="250" y="227" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">sin(α+β)+sin(α−β) = 2sinα cosβ</text>
  <rect x="12" y="239" width="476" height="72" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="256" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Мнемоника</text>
  <text x="250" y="273" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Синус — «смешанное»: sin·cos + cos·sin</text>
  <text x="250" y="288" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Косинус — «однородное»: cos·cos − sin·sin</text>
  <text x="250" y="305" font-size="8" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Синус сохраняет знак, косинус меняет!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Формулы сложения — Мордкович А.Г., 10 класс</text>
</svg>