<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="13" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Формулы понижения степени</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 13</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="70" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="75" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Понижение степени: квадрат → первая степень</text>
  <text x="250" y="95" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold" font-family="Arial">sin²α = (1 − cos 2α)/2</text>
  <text x="250" y="115" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold" font-family="Arial">cos²α = (1 + cos 2α)/2</text>
  <text x="250" y="125" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Знаки: sin² → минус, cos² → плюс</text>
  <rect x="12" y="136" width="476" height="75" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="153" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Формулы половинного угла</text>
  <text x="250" y="170" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">tg α/2 = sin α/(1 + cos α)</text>
  <text x="250" y="185" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">tg α/2 = (1 − cos α)/sin α</text>
  <text x="250" y="205" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Две формы — выбирайте удобную!</text>
  <rect x="12" y="219" width="476" height="60" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="236" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Примеры</text>
  <text x="250" y="253" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">sin²(π/8) = (1 − cos(π/4))/2 = (2−√2)/4</text>
  <text x="250" y="268" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">(1 − cos α)/sin α = tg α/2 — сразу!</text>
  <rect x="12" y="287" width="476" height="25" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="304" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Не забывайте делить на 2! Аргумент: 2α, не α</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Понижение степени — Мордкович А.Г., 10 класс</text>
</svg>