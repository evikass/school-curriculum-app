<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="13" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Правила дифференцирования</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 17</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="74" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Четыре правила</text>
  <text x="250" y="93" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">1. Сумма: (f+g)' = f' + g'</text>
  <text x="250" y="110" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">2. Произведение: (fg)' = f'g + fg'</text>
  <text x="250" y="127" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">3. Частное: (f/g)' = (f'g − fg')/g²</text>
  <text x="250" y="144" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">4. Цепное: (f(g(x)))' = f'(g(x)) · g'(x)</text>
  <text x="250" y="162" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">+ Константа: (Cf)' = Cf'</text>
  <text x="250" y="175" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">(fg)' НЕ равно f'g'!</text>
  <rect x="12" y="186" width="476" height="80" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="203" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Примеры</text>
  <text x="250" y="220" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">(x²sinx)' = 2x·sinx + x²·cosx — произведение</text>
  <text x="250" y="236" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">(x/(x+1))' = 1/(x+1)² — частное</text>
  <text x="250" y="252" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">(sin3x)' = cos3x·3 = 3cos3x — цепное</text>
  <text x="250" y="263" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Цепное правило — самое важное!</text>
  <rect x="12" y="274" width="476" height="38" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="290" font-size="8" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Осторожно!</text>
  <text x="250" y="307" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">(fg)' ≠ f'g' | Не забывать внутреннюю производную в цепном правиле</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Правила дифференцирования — Мордкович А.Г., 10 класс</text>
</svg>