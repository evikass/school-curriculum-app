<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Уравнение касательной</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 19</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold" font-family="Arial">y = f(x₀) + f'(x₀)(x − x₀)</text>
  <text x="250" y="102" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">f(x₀) — значение | f'(x₀) — угловой коэффициент | x₀ — точка касания</text>
  <rect x="12" y="116" width="476" height="65" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="133" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Алгоритм</text>
  <text x="250" y="150" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">1. Найти f(x₀) — значение функции</text>
  <text x="250" y="163" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">2. Найти f'(x) и f'(x₀) — производную и её значение</text>
  <text x="250" y="176" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">3. Подставить в формулу y = f(x₀) + f'(x₀)(x − x₀)</text>
  <rect x="12" y="189" width="476" height="72" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="206" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Примеры</text>
  <text x="250" y="223" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">y = x², x₀ = 2: y = 4 + 4(x−2) = 4x − 4</text>
  <text x="250" y="238" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">y = sinx, x₀ = 0: y = 0 + 1·x = x</text>
  <text x="250" y="253" font-size="8" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">При малых x: sin x ≈ x</text>
  <rect x="12" y="269" width="476" height="43" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="285" font-size="8" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Приближённые вычисления</text>
  <text x="250" y="302" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">√4,1 ≈ √4 + (1/4)·0,1 = 2,025</text>
  <text x="250" y="310" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">f(x₀+Δx) ≈ f(x₀) + f'(x₀)·Δx</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Касательная — Мордкович А.Г., 10 класс</text>
</svg>