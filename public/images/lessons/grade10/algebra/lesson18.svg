<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="13" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Производная сложной функции</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 18</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="75" font-size="10" fill="#0D47A1" text-anchor="middle" font-weight="bold" font-family="Arial">Цепное правило</text>
  <text x="250" y="95" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold" font-family="Arial">(f(g(x)))' = f'(g(x)) · g'(x)</text>
  <text x="250" y="110" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Внешняя производная × внутренняя производная</text>
  <rect x="12" y="121" width="476" height="40" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="138" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold" font-family="Arial">Как определить? Что делается последним — внешняя!</text>
  <text x="250" y="155" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">sin(2x): внешняя = sin, внутренняя = 2x</text>
  <rect x="12" y="169" width="476" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="185" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Примеры</text>
  <text x="250" y="203" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">(cos3x)' = −sin3x · 3 = −3sin3x</text>
  <text x="250" y="218" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">(sin³x)' = 3sin²x · cosx</text>
  <text x="250" y="233" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">(ln(sinx))' = cosx/sinx = ctgx</text>
  <text x="250" y="248" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">(√(3x+1))' = 3/(2√(3x+1))</text>
  <text x="250" y="255" font-size="7" fill="#555" text-anchor="middle" font-family="Arial"></text>
  <rect x="12" y="267" width="476" height="45" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="283" font-size="8" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Двойное вложение</text>
  <text x="250" y="300" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">e^(sin²x): eᵘ · 2sinx · cosx — три множителя!</text>
  <text x="250" y="310" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Каждое вложение добавляет множитель</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Сложная функция — Мордкович А.Г., 10 класс</text>
</svg>