<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Корень n-й степени</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Large radical sign -->
    <path d="M60,140 L75,200 L90,120 L200,120" fill="none" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round"/>
    <text x="95" y="115" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">n</text>
    <text x="115" y="160" font-family="Arial,sans-serif" font-size="28" fill="#5C6BC0" font-weight="bold">a</text>
    <text x="210" y="155" font-family="Arial,sans-serif" font-size="14" fill="#3F51B5">= b</text>
    <!-- Arrow showing relationship -->
    <line x1="250" y1="140" x2="310" y2="140" stroke="#5C6BC0" stroke-width="2" marker-end="url(#arr1)"/>
    <text x="270" y="133" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5">b^n = a</text>
    <!-- Definition box -->
    <rect x="25" y="95" width="210" height="75" rx="5" fill="white" opacity="0.7" stroke="#5C6BC0" stroke-width="1"/>
    <text x="35" y="112" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Определение:</text>
    <text x="35" y="130" font-family="Arial,sans-serif" font-size="11" fill="#444">Если b^n = a, то b = n-й корень из a</text>
    <text x="35" y="146" font-family="Arial,sans-serif" font-size="10" fill="#666">n - показатель корня, a - подкоренное</text>
    <!-- Examples -->
    <rect x="25" y="180" width="140" height="105" rx="5" fill="white" opacity="0.7" stroke="#5C6BC0" stroke-width="1"/>
    <text x="35" y="198" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Примеры:</text>
    <text x="35" y="218" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0">2 = 3</text>
    <text x="35" y="215" font-family="Arial,sans-serif" font-size="8" fill="#3F51B5">3</text>
    <text x="47" y="218" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0">27 = 3</text>
    <text x="35" y="238" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0">16 = 4</text>
    <text x="35" y="235" font-family="Arial,sans-serif" font-size="8" fill="#3F51B5">2</text>
    <text x="47" y="238" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0">16 = 4</text>
    <text x="35" y="258" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0">32 = 2</text>
    <text x="35" y="255" font-family="Arial,sans-serif" font-size="8" fill="#3F51B5">5</text>
    <text x="47" y="258" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0">32 = 2</text>
    <text x="35" y="276" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0">81 = 3</text>
    <text x="35" y="273" font-family="Arial,sans-serif" font-size="8" fill="#3F51B5">4</text>
    <text x="47" y="276" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0">81 = 3</text>
    <!-- Properties box -->
    <rect x="180" y="180" width="295" height="105" rx="5" fill="white" opacity="0.7" stroke="#5C6BC0" stroke-width="1"/>
    <text x="190" y="198" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Свойства:</text>
    <text x="190" y="218" font-family="Arial,sans-serif" font-size="11" fill="#444">1) (n-a)^n = a</text>
    <text x="190" y="236" font-family="Arial,sans-serif" font-size="11" fill="#444">2) n-(a*b) = n-a * n-b</text>
    <text x="190" y="254" font-family="Arial,sans-serif" font-size="11" fill="#444">3) n-(a/b) = n-a / n-b</text>
    <text x="190" y="272" font-family="Arial,sans-serif" font-size="11" fill="#444">4) n-(a^k) = (n-a)^k</text>
    <!-- Inverse diagram -->
    <rect x="330" y="95" width="145" height="75" rx="5" fill="white" opacity="0.7" stroke="#5C6BC0" stroke-width="1"/>
    <text x="340" y="112" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Обратная операция</text>
    <rect x="350" y="122" width="50" height="22" rx="3" fill="#5C6BC0" opacity="0.15"/>
    <text x="375" y="137" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5" text-anchor="middle">Степень</text>
    <line x1="405" y1="133" x2="425" y2="133" stroke="#5C6BC0" stroke-width="1.5"/>
    <polygon points="425,130 431,133 425,136" fill="#5C6BC0"/>
    <rect x="425" y="122" width="45" height="22" rx="3" fill="#5C6BC0" opacity="0.15"/>
    <text x="447" y="137" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5" text-anchor="middle">Корень</text>
    <line x1="350" y1="150" x2="425" y2="150" stroke="#3F51B5" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="425" y1="150" x2="350" y2="150" stroke="#3F51B5" stroke-width="1.5"/>
    <polygon points="350,147 344,150 350,153" fill="#3F51B5"/>
    <text x="387" y="162" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">взаимно обратные</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>