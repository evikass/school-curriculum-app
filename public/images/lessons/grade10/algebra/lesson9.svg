<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Формулы сложения</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Angle diagram -->
    <line x1="60" y1="230" x2="180" y2="230" stroke="#3F51B5" stroke-width="1.5"/>
    <path d="M100,230 A40,40 0 0,0 93,210" fill="none" stroke="#E91E63" stroke-width="2"/>
    <text x="100" y="215" font-family="Arial,sans-serif" font-size="12" fill="#E91E63" font-weight="bold">a</text>
    <line x1="60" y1="230" x2="160" y2="170" stroke="#5C6BC0" stroke-width="2"/>
    <path d="M90,222 A30,30 0 0,1 90,208" fill="none" stroke="#4CAF50" stroke-width="2"/>
    <text x="82" y="200" font-family="Arial,sans-serif" font-size="12" fill="#4CAF50" font-weight="bold">b</text>
    <path d="M110,228 A50,50 0 0,0 100,195" fill="none" stroke="#FF9800" stroke-width="2"/>
    <text x="112" y="205" font-family="Arial,sans-serif" font-size="12" fill="#FF9800" font-weight="bold">a+b</text>
    <!-- Formulas for sin -->
    <rect x="200" y="90" width="285" height="95" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="200" y="90" width="5" height="95" rx="2" fill="#5C6BC0"/>
    <text x="215" y="108" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Формулы синуса:</text>
    <line x1="215" y1="113" x2="475" y2="113" stroke="#5C6BC0" stroke-width="0.5"/>
    <rect x="210" y="117" width="265" height="22" rx="3" fill="#5C6BC0" opacity="0.08"/>
    <text x="215" y="133" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" font-weight="bold">sin(a+b) = sin a cos b + cos a sin b</text>
    <rect x="210" y="142" width="265" height="22" rx="3" fill="#5C6BC0" opacity="0.08"/>
    <text x="215" y="158" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" font-weight="bold">sin(a-b) = sin a cos b - cos a sin b</text>
    <text x="215" y="178" font-family="Arial,sans-serif" font-size="10" fill="#888">Формулы сложения для синуса</text>
    <!-- Formulas for cos -->
    <rect x="200" y="192" width="285" height="95" rx="5" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="1"/>
    <rect x="200" y="192" width="5" height="95" rx="2" fill="#4CAF50"/>
    <text x="215" y="210" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Формулы косинуса:</text>
    <line x1="215" y1="215" x2="475" y2="215" stroke="#4CAF50" stroke-width="0.5"/>
    <rect x="210" y="219" width="265" height="22" rx="3" fill="#4CAF50" opacity="0.08"/>
    <text x="215" y="235" font-family="Arial,sans-serif" font-size="12" fill="#4CAF50" font-weight="bold">cos(a+b) = cos a cos b - sin a sin b</text>
    <rect x="210" y="244" width="265" height="22" rx="3" fill="#4CAF50" opacity="0.08"/>
    <text x="215" y="260" font-family="Arial,sans-serif" font-size="12" fill="#4CAF50" font-weight="bold">cos(a-b) = cos a cos b + sin a sin b</text>
    <text x="215" y="280" font-family="Arial,sans-serif" font-size="10" fill="#888">Косинус: знаки чередуются!</text>
    <!-- tg formulas (smaller) -->
    <rect x="25" y="90" width="165" height="105" rx="5" fill="white" opacity="0.8" stroke="#5C6BC0" stroke-width="1"/>
    <text x="35" y="108" font-family="Arial,sans-serif" font-size="11" fill="#3F51B5" font-weight="bold">Тангенс:</text>
    <text x="35" y="126" font-family="Arial,sans-serif" font-size="10" fill="#444">tg(a+b) =</text>
    <text x="55" y="142" font-family="Arial,sans-serif" font-size="10" fill="#444">(tg a + tg b)</text>
    <line x1="50" y1="145" x2="145" y2="145" stroke="#444" stroke-width="0.5"/>
    <text x="70" y="156" font-family="Arial,sans-serif" font-size="10" fill="#444">1 - tg a tg b</text>
    <text x="35" y="175" font-family="Arial,sans-serif" font-size="10" fill="#444">tg(a-b) - аналогично</text>
    <text x="35" y="190" font-family="Arial,sans-serif" font-size="10" fill="#444">(знак минус в числ. и знам.)</text>
    <!-- Point at origin -->
    <circle cx="60" cy="230" r="2" fill="#3F51B5"/>
    <text x="48" y="242" font-family="Arial,sans-serif" font-size="9" fill="#888">O</text>
    <!-- Tip -->
    <rect x="25" y="260" width="165" height="32" rx="4" fill="#5C6BC0" opacity="0.08"/>
    <text x="107" y="280" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5" text-anchor="middle">Мнемоника: син-кос, кос-син</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>