<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <text x="250" y="48" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Степень с рациональным показателем</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Алгебра - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="85" width="470" height="215" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    
    <rect x="15" y="85" width="470" height="215" fill="#E8EAF6" opacity="0.5"/>
    <!-- Main formula -->
    <rect x="25" y="90" width="220" height="60" rx="5" fill="white" opacity="0.8" stroke="#5C6BC0" stroke-width="1.5"/>
    <text x="35" y="108" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Главная формула:</text>
    <text x="55" y="137" font-family="Arial,sans-serif" font-size="20" fill="#5C6BC0" font-weight="bold">a</text>
    <text x="70" y="127" font-family="Arial,sans-serif" font-size="13" fill="#5C6BC0" font-weight="bold">m/n</text>
    <text x="105" y="137" font-family="Arial,sans-serif" font-size="18" fill="#3F51B5">=</text>
    <text x="125" y="128" font-family="Arial,sans-serif" font-size="14" fill="#5C6BC0" font-weight="bold">n</text>
    <line x1="120" y1="131" x2="215" y2="131" stroke="#5C6BC0" stroke-width="1.5"/>
    <text x="120" y="148" font-family="Arial,sans-serif" font-size="14" fill="#5C6BC0" font-weight="bold"> a</text>
    <text x="150" y="148" font-family="Arial,sans-serif" font-size="11" fill="#5C6BC0">m</text>
    <!-- Conversion examples -->
    <rect x="260" y="90" width="215" height="60" rx="5" fill="white" opacity="0.8" stroke="#5C6BC0" stroke-width="1.5"/>
    <text x="270" y="108" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Примеры:</text>
    <text x="270" y="128" font-family="Arial,sans-serif" font-size="12" fill="#444">8^(2/3) = (8^(1/3))^2 = 2^2 = 4</text>
    <text x="270" y="145" font-family="Arial,sans-serif" font-size="12" fill="#444">27^(1/3) = 3;  16^(3/4) = 8</text>
    <!-- Properties section -->
    <rect x="25" y="160" width="220" height="130" rx="5" fill="white" opacity="0.7" stroke="#5C6BC0" stroke-width="1"/>
    <text x="35" y="178" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Свойства степеней:</text>
    <line x1="35" y1="183" x2="230" y2="183" stroke="#5C6BC0" stroke-width="0.5"/>
    <text x="35" y="200" font-family="Arial,sans-serif" font-size="11" fill="#444">a^(r) * a^(s) = a^(r+s)</text>
    <text x="35" y="218" font-family="Arial,sans-serif" font-size="11" fill="#444">a^(r) / a^(s) = a^(r-s)</text>
    <text x="35" y="236" font-family="Arial,sans-serif" font-size="11" fill="#444">(a^(r))^(s) = a^(r*s)</text>
    <text x="35" y="254" font-family="Arial,sans-serif" font-size="11" fill="#444">(a*b)^(r) = a^(r) * b^(r)</text>
    <text x="35" y="272" font-family="Arial,sans-serif" font-size="11" fill="#444">(a/b)^(r) = a^(r) / b^(r)</text>
    <text x="35" y="287" font-family="Arial,sans-serif" font-size="9" fill="#888">r, s - рациональные числа; a &gt; 0, b &gt; 0</text>
    <!-- Visual: number line showing rational exponents -->
    <rect x="260" y="160" width="215" height="130" rx="5" fill="white" opacity="0.7" stroke="#5C6BC0" stroke-width="1"/>
    <text x="270" y="178" font-family="Arial,sans-serif" font-size="12" fill="#3F51B5" font-weight="bold">Схема перевода:</text>
    <rect x="275" y="188" width="80" height="25" rx="4" fill="#5C6BC0" opacity="0.12"/>
    <text x="315" y="205" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5" text-anchor="middle">Корень</text>
    <line x1="360" y1="200" x2="400" y2="200" stroke="#5C6BC0" stroke-width="1.5"/>
    <polygon points="400,197 406,200 400,203" fill="#5C6BC0"/>
    <rect x="405" y="188" width="55" height="25" rx="4" fill="#5C6BC0" opacity="0.12"/>
    <text x="432" y="205" font-family="Arial,sans-serif" font-size="10" fill="#3F51B5" text-anchor="middle">Степень</text>
    <!-- Key conditions -->
    <text x="270" y="232" font-family="Arial,sans-serif" font-size="11" fill="#444" font-weight="bold">Условия:</text>
    <text x="270" y="250" font-family="Arial,sans-serif" font-size="11" fill="#444">a &gt; 0 (для дробных показателей)</text>
    <text x="270" y="268" font-family="Arial,sans-serif" font-size="11" fill="#444">a^(1/n) = n-a (по определению)</text>
    <text x="270" y="286" font-family="Arial,sans-serif" font-size="11" fill="#444">a^(m/n) = (n-a)^m</text>
    <!-- Decorative formula -->
    <text x="340" y="96" font-family="Arial,sans-serif" font-size="30" fill="#5C6BC0" opacity="0.08" font-weight="bold">x^y</text>
    
  </g>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра</text>
</svg>