<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#2c1810"/><stop offset="100%" style="stop-color:#1a1a2e"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <text x="250" y="28" text-anchor="middle" fill="#d4a574" font-size="14" font-weight="bold">Жанры древнерусской литературы</text>
  <text x="250" y="48" text-anchor="middle" fill="white" font-size="10">XI–XVII века</text>
  <rect x="15" y="60" width="90" height="55" rx="6" fill="#8e44ad" opacity="0.8"/>
  <text x="60" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Летопись</text>
  <text x="60" y="100" text-anchor="middle" fill="white" font-size="8">Погодные записи</text>
  <rect x="115" y="60" width="90" height="55" rx="6" fill="#9b59b6" opacity="0.8"/>
  <text x="160" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Житие</text>
  <text x="160" y="100" text-anchor="middle" fill="white" font-size="8">Жизнь святого</text>
  <rect x="215" y="60" width="90" height="55" rx="6" fill="#6c3483" opacity="0.8"/>
  <text x="260" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Хождение</text>
  <text x="260" y="100" text-anchor="middle" fill="white" font-size="8">Путешествия</text>
  <rect x="315" y="60" width="80" height="55" rx="6" fill="#8e44ad" opacity="0.7"/>
  <text x="355" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Слово</text>
  <text x="355" y="100" text-anchor="middle" fill="white" font-size="8">Речь</text>
  <rect x="405" y="60" width="80" height="55" rx="6" fill="#9b59b6" opacity="0.7"/>
  <text x="445" y="82" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Поучение</text>
  <text x="445" y="100" text-anchor="middle" fill="white" font-size="8">Нравоуч.</text>
  <!-- Timeline -->
  <line x1="30" y1="145" x2="470" y2="145" stroke="#d4a574" stroke-width="2"/>
  <circle cx="100" cy="145" r="8" fill="#8e44ad"/><text x="100" y="138" text-anchor="middle" fill="#d4a574" font-size="9">XI-XIII</text>
  <circle cx="250" cy="145" r="8" fill="#9b59b6"/><text x="250" y="138" text-anchor="middle" fill="#d4a574" font-size="9">XIV-XV</text>
  <circle cx="400" cy="145" r="8" fill="#6c3483"/><text x="400" y="138" text-anchor="middle" fill="#d4a574" font-size="9">XVI-XVII</text>
  <text x="100" y="168" text-anchor="middle" fill="white" font-size="8">Летописание</text>
  <text x="250" y="168" text-anchor="middle" fill="white" font-size="8">Московская Русь</text>
  <text x="400" y="168" text-anchor="middle" fill="white" font-size="8">Светская лит.</text>
  <!-- Key works -->
  <rect x="20" y="185" width="460" height="130" rx="8" fill="#1a1a2e" stroke="#8e44ad" stroke-width="1"/>
  <text x="250" y="210" text-anchor="middle" fill="#9b59b6" font-size="12" font-weight="bold">Ключевые произведения</text>
  <text x="250" y="230" text-anchor="middle" fill="white" font-size="10">«Повесть временных лет» — Нестор</text>
  <text x="250" y="248" text-anchor="middle" fill="white" font-size="10">«Хождение за три моря» — Афанасий Никитин</text>
  <text x="250" y="266" text-anchor="middle" fill="white" font-size="10">«Житие Бориса и Глеба»</text>
  <text x="250" y="284" text-anchor="middle" fill="white" font-size="10">«Повесть о Горе-Злочастии»</text>
  <text x="250" y="302" text-anchor="middle" fill="white" font-size="10">«Поучение Владимира Мономаха»</text>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="9" opacity="0.5">Жанры древнерусской литературы</text>
</svg>