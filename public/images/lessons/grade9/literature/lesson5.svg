<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#2c1810"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <text x="250" y="25" text-anchor="middle" fill="#e74c3c" font-size="14" font-weight="bold">«Горе от ума» (1824)</text>
  <!-- Conflict: two eras -->
  <rect x="20" y="40" width="220" height="80" rx="8" fill="#27ae60" opacity="0.7"/>
  <text x="130" y="65" text-anchor="middle" fill="white" font-size="12" font-weight="bold">«Век нынешний»</text>
  <text x="130" y="85" text-anchor="middle" fill="white" font-size="10">Чацкий</text>
  <text x="130" y="102" text-anchor="middle" fill="white" font-size="9">Свобода, просвещение</text>
  <rect x="260" y="40" width="220" height="80" rx="8" fill="#c0392b" opacity="0.7"/>
  <text x="370" y="65" text-anchor="middle" fill="white" font-size="12" font-weight="bold">«Век минувший»</text>
  <text x="370" y="85" text-anchor="middle" fill="white" font-size="10">Фамусов, Молчалин</text>
  <text x="370" y="102" text-anchor="middle" fill="white" font-size="9">Чины, богатство, рабство</text>
  <!-- Lightning between -->
  <text x="250" y="88" text-anchor="middle" fill="#f1c40f" font-size="24">⚡</text>
  <!-- Characters -->
  <rect x="20" y="135" width="145" height="55" rx="6" fill="#9b59b6" opacity="0.7"/>
  <text x="92" y="158" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Чацкий</text>
  <text x="92" y="175" text-anchor="middle" fill="white" font-size="8">Одинокий борец</text>
  <rect x="175" y="135" width="145" height="55" rx="6" fill="#e74c3c" opacity="0.7"/>
  <text x="247" y="158" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Фамусов</text>
  <text x="247" y="175" text-anchor="middle" fill="white" font-size="8">Московский барин</text>
  <rect x="330" y="135" width="145" height="55" rx="6" fill="#c0392b" opacity="0.7"/>
  <text x="402" y="158" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Молчалин</text>
  <text x="402" y="175" text-anchor="middle" fill="white" font-size="8">Карьерист-лжец</text>
  <!-- Aphorisms -->
  <rect x="20" y="205" width="460" height="100" rx="6" fill="#1a1a2e" stroke="#d4a574" stroke-width="1"/>
  <text x="250" y="228" text-anchor="middle" fill="#d4a574" font-size="11" font-weight="bold">Крылатые фразы</text>
  <text x="250" y="250" text-anchor="middle" fill="white" font-size="9" font-style="italic">«А судьи кто?»</text>
  <text x="250" y="268" text-anchor="middle" fill="white" font-size="9" font-style="italic">«Служить бы рад, прислуживаться тошно»</text>
  <text x="250" y="286" text-anchor="middle" fill="white" font-size="9" font-style="italic">«Счастливые часов не наблюдают»</text>
  <text x="250" y="304" text-anchor="middle" fill="white" font-size="9" font-style="italic">«Горе от ума» = трагедия ума в невежественной среде</text>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="9" opacity="0.5">Грибоедов «Горе от ума»</text>
</svg>