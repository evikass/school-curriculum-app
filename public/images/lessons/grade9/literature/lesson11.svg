<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#2c3e50"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <text x="250" y="22" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="bold">А.И. Солженицын (1918–2008)</text>
  <text x="250" y="40" text-anchor="middle" fill="white" font-size="10">Нобелевская премия по литературе (1970)</text>
  <!-- Two main works -->
  <rect x="15" y="55" width="230" height="140" rx="8" fill="#2c3e50" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="130" y="80" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="bold">«Один день Ивана</text>
  <text x="130" y="95" text-anchor="middle" fill="#4fc3f7" font-size="11" font-weight="bold">Денисовича» (1962)</text>
  <text x="130" y="118" text-anchor="middle" fill="white" font-size="9">Первое описание ГУЛАГа</text>
  <text x="130" y="138" text-anchor="middle" fill="white" font-size="9">Шухов — простой крестьянин</text>
  <text x="130" y="158" text-anchor="middle" fill="white" font-size="9">Сохраняет человечность</text>
  <text x="130" y="178" text-anchor="middle" fill="white" font-size="9">«Почти счастлив»</text>
  <rect x="255" y="55" width="230" height="140" rx="8" fill="#2c3e50" stroke="#27ae60" stroke-width="1.5"/>
  <text x="370" y="80" text-anchor="middle" fill="#27ae60" font-size="11" font-weight="bold">«Матрёнин двор» (1963)</text>
  <text x="370" y="118" text-anchor="middle" fill="white" font-size="9">Образ праведницы</text>
  <text x="370" y="138" text-anchor="middle" fill="white" font-size="9">Живёт для других</text>
  <text x="370" y="158" text-anchor="middle" fill="white" font-size="9">Гибнет, помогая людям</text>
  <text x="370" y="178" text-anchor="middle" fill="white" font-size="9">Нравственная основа</text>
  <!-- Biography timeline -->
  <line x1="30" y1="215" x2="470" y2="215" stroke="#4fc3f7" stroke-width="2"/>
  <circle cx="80" cy="215" r="6" fill="#e74c3c"/><text x="80" y="232" text-anchor="middle" fill="white" font-size="8">1945</text><text x="80" y="242" text-anchor="middle" fill="#e74c3c" font-size="7">Арест</text>
  <circle cx="180" cy="215" r="6" fill="#f39c12"/><text x="180" y="232" text-anchor="middle" fill="white" font-size="8">1953</text><text x="180" y="242" text-anchor="middle" fill="#f39c12" font-size="7">Освобождён</text>
  <circle cx="260" cy="215" r="6" fill="#27ae60"/><text x="260" y="232" text-anchor="middle" fill="white" font-size="8">1962</text><text x="260" y="242" text-anchor="middle" fill="#27ae60" font-size="7">«Иван Денисович»</text>
  <circle cx="350" cy="215" r="6" fill="#9b59b6"/><text x="350" y="232" text-anchor="middle" fill="white" font-size="8">1970</text><text x="350" y="242" text-anchor="middle" fill="#9b59b6" font-size="7">Нобелевская</text>
  <circle cx="430" cy="215" r="6" fill="#4fc3f7"/><text x="430" y="232" text-anchor="middle" fill="white" font-size="8">1994</text><text x="430" y="242" text-anchor="middle" fill="#4fc3f7" font-size="7">Возвращение</text>
  <!-- Quote -->
  <rect x="20" y="260" width="460" height="55" rx="6" fill="#1a1a2e" stroke="#d4a574" stroke-width="1"/>
  <text x="250" y="283" text-anchor="middle" fill="#d4a574" font-size="10" font-style="italic">«Она и есть тот самый праведник, без которого</text>
  <text x="250" y="300" text-anchor="middle" fill="#d4a574" font-size="10" font-style="italic">не стоит село» — о Матрёне</text>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="9" opacity="0.5">А.И. Солженицын</text>
</svg>