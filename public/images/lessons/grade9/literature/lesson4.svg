<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#2c1810"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <text x="250" y="25" text-anchor="middle" fill="#e74c3c" font-size="14" font-weight="bold">«Недоросль» (1782)</text>
  <text x="250" y="43" text-anchor="middle" fill="white" font-size="10">Д.И. Фонвизин — первая русская социальная комедия</text>
  <!-- Stage/theater -->
  <rect x="40" y="55" width="420" height="170" rx="8" fill="#1a1a2e" stroke="#d4a574" stroke-width="2"/>
  <text x="250" y="75" text-anchor="middle" fill="#d4a574" font-size="10">Действующие лица</text>
  <!-- Negative characters -->
  <rect x="55" y="85" width="130" height="55" rx="5" fill="#c0392b" opacity="0.7"/>
  <text x="120" y="105" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Простакова</text>
  <text x="120" y="120" text-anchor="middle" fill="white" font-size="8">Деспот, самодурка</text>
  <rect x="195" y="85" width="110" height="55" rx="5" fill="#c0392b" opacity="0.6"/>
  <text x="250" y="105" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Митрофан</text>
  <text x="250" y="120" text-anchor="middle" fill="white" font-size="8">Ленивый невежда</text>
  <rect x="315" y="85" width="130" height="55" rx="5" fill="#c0392b" opacity="0.5"/>
  <text x="380" y="105" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Скотинин</text>
  <text x="380" y="120" text-anchor="middle" fill="white" font-size="8">Примитивные интересы</text>
  <!-- Positive characters -->
  <rect x="55" y="150" width="130" height="55" rx="5" fill="#27ae60" opacity="0.7"/>
  <text x="120" y="170" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Стародум</text>
  <text x="120" y="185" text-anchor="middle" fill="white" font-size="8">Просвещённый идеал</text>
  <rect x="195" y="150" width="110" height="55" rx="5" fill="#27ae60" opacity="0.6"/>
  <text x="250" y="170" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Софья</text>
  <text x="250" y="185" text-anchor="middle" fill="white" font-size="8">Добродетельная</text>
  <rect x="315" y="150" width="130" height="55" rx="5" fill="#27ae60" opacity="0.5"/>
  <text x="380" y="170" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Правдин</text>
  <text x="380" y="185" text-anchor="middle" fill="white" font-size="8">Честный чиновник</text>
  <!-- Key phrases -->
  <rect x="30" y="240" width="440" height="70" rx="6" fill="#2c1810" stroke="#e74c3c" stroke-width="1"/>
  <text x="250" y="262" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">Крылатые фразы</text>
  <text x="250" y="282" text-anchor="middle" fill="white" font-size="10" font-style="italic">«Не хочу учиться, хочу жениться» — Митрофан</text>
  <text x="250" y="300" text-anchor="middle" fill="white" font-size="10" font-style="italic">«Вот злонравия достойные плоды» — Стародум</text>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="9" opacity="0.5">Фонвизин «Недоросль»</text>
</svg>