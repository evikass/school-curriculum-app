<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#0f3460"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <text x="250" y="28" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="bold">М.В. Ломоносов (1711–1765)</text>
  <!-- Three styles pyramid -->
  <polygon points="250,50 370,120 130,120" fill="#e74c3c" opacity="0.6" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="250" y="82" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Высокий</text>
  <text x="250" y="98" text-anchor="middle" fill="white" font-size="9">Ода, поэма</text>
  <rect x="130" y="125" width="240" height="40" rx="4" fill="#f39c12" opacity="0.5" stroke="#f39c12" stroke-width="1"/>
  <text x="250" y="148" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Средний — драма, послание</text>
  <rect x="130" y="170" width="240" height="40" rx="4" fill="#27ae60" opacity="0.5" stroke="#27ae60" stroke-width="1"/>
  <text x="250" y="193" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Низкий — комедия, басня</text>
  <!-- Key achievements -->
  <rect x="20" y="225" width="150" height="85" rx="6" fill="#0f3460" stroke="#4fc3f7" stroke-width="1"/>
  <text x="95" y="248" text-anchor="middle" fill="#4fc3f7" font-size="10" font-weight="bold">Реформа стиха</text>
  <text x="95" y="268" text-anchor="middle" fill="white" font-size="9">Силлабо-тоника</text>
  <text x="95" y="285" text-anchor="middle" fill="white" font-size="9">Ямб и хорей</text>
  <text x="95" y="302" text-anchor="middle" fill="white" font-size="9">вместо силлабики</text>
  <rect x="180" y="225" width="140" height="85" rx="6" fill="#0f3460" stroke="#e74c3c" stroke-width="1"/>
  <text x="250" y="248" text-anchor="middle" fill="#e74c3c" font-size="10" font-weight="bold">Университет</text>
  <text x="250" y="268" text-anchor="middle" fill="white" font-size="9">МГУ (1755)</text>
  <text x="250" y="285" text-anchor="middle" fill="white" font-size="9">Центр просвещения</text>
  <text x="250" y="302" text-anchor="middle" fill="white" font-size="9">России</text>
  <rect x="330" y="225" width="150" height="85" rx="6" fill="#0f3460" stroke="#9b59b6" stroke-width="1"/>
  <text x="405" y="248" text-anchor="middle" fill="#9b59b6" font-size="10" font-weight="bold">Три штиля</text>
  <text x="405" y="268" text-anchor="middle" fill="white" font-size="9">Высокий → Ода</text>
  <text x="405" y="285" text-anchor="middle" fill="white" font-size="9">Средний → Драма</text>
  <text x="405" y="302" text-anchor="middle" fill="white" font-size="9">Низкий → Комедия</text>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="9" opacity="0.5">М.В. Ломоносов</text>
</svg>