<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7B1FA2"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3E5F5"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <rect width="500" height="44" fill="url(#hdr)" rx="8"/>
  <rect y="36" width="500" height="8" fill="url(#hdr)"/>
  <text x="250" y="18" text-anchor="middle" font-size="13" fill="#FFFFFF" font-weight="bold" font-family="Arial">Урок 3. М.В. Ломоносов</text>
  <text x="250" y="34" text-anchor="middle" font-size="9" fill="#E1BEE7" font-family="Arial">Учёный-поэт, реформатор русского языка (1711-1765)</text>
  <!-- Portrait area -->
  <rect x="10" y="52" width="130" height="90" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1.2"/>
  <circle cx="75" cy="82" r="22" fill="#E1BEE7" stroke="#AB47BC" stroke-width="1"/>
  <text x="75" y="88" text-anchor="middle" font-size="20" fill="#7B1FA2" font-family="Arial">&#128100;</text>
  <text x="75" y="112" text-anchor="middle" font-size="7.5" fill="#7B1FA2" font-family="Arial">Михайло Васильевич</text>
  <text x="75" y="123" text-anchor="middle" font-size="8" fill="#7B1FA2" font-weight="bold" font-family="Arial">Ломоносов</text>
  <text x="75" y="134" text-anchor="middle" font-size="7" fill="#757575" font-family="Arial">1711-1765 • «Российский Колумб»</text>
  <!-- Contribution to language -->
  <rect x="150" y="52" width="340" height="42" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1.2"/>
  <text x="320" y="66" text-anchor="middle" font-size="9.5" fill="#7B1FA2" font-weight="bold" font-family="Arial">Реформа русского языка и литературы</text>
  <text x="158" y="79" font-size="8" fill="#212121" font-family="Arial">«Теория трёх штилей» — разделение стилей речи:</text>
  <text x="158" y="90" font-size="8" fill="#757575" font-family="Arial">высокий (ода, поэма) • средний (элегия, сатира) • низкий (комедия, басня)</text>
  <!-- Odes section -->
  <rect x="150" y="100" width="340" height="42" rx="5" fill="#E1BEE7" opacity="0.5"/>
  <text x="320" y="114" text-anchor="middle" font-size="9.5" fill="#7B1FA2" font-weight="bold" font-family="Arial">Ода как жанр</text>
  <text x="158" y="127" font-size="8" fill="#212121" font-family="Arial">Торжественное стихотворение, прославляющее важное лицо или событие</text>
  <text x="158" y="138" font-size="8" fill="#757575" font-family="Arial">Главная: «Ода на день восшествия... 1747 года» — прославление Елизаветы</text>
  <!-- Key themes of odes -->
  <rect x="10" y="148" width="235" height="52" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1"/>
  <text x="127" y="162" text-anchor="middle" font-size="9" fill="#7B1FA2" font-weight="bold" font-family="Arial">Темы од Ломоносова</text>
  <text x="18" y="175" font-size="8" fill="#212121" font-family="Arial">• Прославление монарха и государства</text>
  <text x="18" y="187" font-size="8" fill="#212121" font-family="Arial">• Наука и просвещение</text>
  <text x="18" y="199" font-size="8" fill="#212121" font-family="Arial">• Величие России и природные богатства</text>
  <!-- Scientific achievements -->
  <rect x="255" y="148" width="235" height="52" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1"/>
  <text x="372" y="162" text-anchor="middle" font-size="9" fill="#7B1FA2" font-weight="bold" font-family="Arial">Научные достижения</text>
  <text x="263" y="175" font-size="8" fill="#212121" font-family="Arial">• Открытие атмосферы Венеры</text>
  <text x="263" y="187" font-size="8" fill="#212121" font-family="Arial">• Мозаичное дело, химическая лаборатория</text>
  <text x="263" y="199" font-size="8" fill="#212121" font-family="Arial">• Московский университет (1755 г.)</text>
  <!-- Famous quote -->
  <rect x="10" y="206" width="480" height="30" rx="5" fill="#7B1FA2" opacity="0.1"/>
  <text x="250" y="220" text-anchor="middle" font-size="8.5" fill="#7B1FA2" font-style="italic" font-family="Arial">«Науки юношей питают, отраду старым подают,</text>
  <text x="250" y="232" text-anchor="middle" font-size="8.5" fill="#7B1FA2" font-style="italic" font-family="Arial">в счастливой жизни украшают, в несчастной берегут»</text>
  <!-- Three styles diagram - High -->
  <rect x="10" y="242" width="155" height="84" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1"/>
  <text x="87" y="256" text-anchor="middle" font-size="8.5" fill="#7B1FA2" font-weight="bold" font-family="Arial">Высокий стиль</text>
  <rect x="18" y="260" width="139" height="3" fill="#7B1FA2"/>
  <text x="87" y="274" font-size="7.5" fill="#212121" font-family="Arial">Церковнославянские слова</text>
  <text x="87" y="286" font-size="7.5" fill="#757575" font-family="Arial">Ода, героическая поэма</text>
  <text x="87" y="298" font-size="7.5" fill="#757575" font-family="Arial">Роскошные метафоры</text>
  <text x="87" y="310" font-size="7.5" fill="#757575" font-family="Arial">Возвышенные образы</text>
  <text x="87" y="322" font-size="7" fill="#7B1FA2" font-weight="bold" font-family="Arial">&#8593; Возвышенность</text>
  <!-- Three styles diagram - Medium -->
  <rect x="173" y="242" width="155" height="84" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1"/>
  <text x="250" y="256" text-anchor="middle" font-size="8.5" fill="#AB47BC" font-weight="bold" font-family="Arial">Средний стиль</text>
  <rect x="181" y="260" width="139" height="3" fill="#AB47BC"/>
  <text x="250" y="274" font-size="7.5" fill="#212121" font-family="Arial">Смесь славянских и русских</text>
  <text x="250" y="286" font-size="7.5" fill="#757575" font-family="Arial">Элегия, сатира, эклога</text>
  <text x="250" y="298" font-size="7.5" fill="#757575" font-family="Arial">Умеренные украшения</text>
  <text x="250" y="310" font-size="7.5" fill="#757575" font-family="Arial">Баланс содержания и формы</text>
  <text x="250" y="322" font-size="7" fill="#AB47BC" font-weight="bold" font-family="Arial">&#8596; Сдержанность</text>
  <!-- Three styles diagram - Low -->
  <rect x="336" y="242" width="154" height="84" rx="5" fill="#FFFFFF" stroke="#AB47BC" stroke-width="1"/>
  <text x="413" y="256" text-anchor="middle" font-size="8.5" fill="#E1BEE7" font-weight="bold" font-family="Arial">Низкий стиль</text>
  <rect x="344" y="260" width="139" height="3" fill="#E1BEE7"/>
  <text x="413" y="274" font-size="7.5" fill="#212121" font-family="Arial">Простые русские слова</text>
  <text x="413" y="286" font-size="7.5" fill="#757575" font-family="Arial">Комедия, басня, эпиграмма</text>
  <text x="413" y="298" font-size="7.5" fill="#757575" font-family="Arial">Просторечия допустимы</text>
  <text x="413" y="310" font-size="7.5" fill="#757575" font-family="Arial">Насмешка и юмор</text>
  <text x="413" y="322" font-size="7" fill="#E1BEE7" font-weight="bold" font-family="Arial">&#8595; Простота</text>
  <rect y="338" width="500" height="12" fill="#7B1FA2" rx="0"/>
  <rect y="338" width="500" height="12" fill="url(#hdr)" rx="0"/>
  <text x="250" y="348" text-anchor="middle" font-size="8" fill="#FFFFFF" font-family="Arial">Литература 9 класс</text>
</svg>