<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7E57C2" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#7E57C2" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#7E57C2" text-anchor="middle">Математика ОГЭ</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">ОГЭ — Урок 3</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#7E57C2" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#7E57C2" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#4527A0" font-weight="bold">Структура:</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">2 части, 25 заданий</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#4527A0" font-weight="bold">Часть 1:</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Задания 1-19 (с кратким ответом)</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Алгебра, геометрия, реальная математика</text>
  <text x="22" y="148" font-family="Arial,sans-serif" font-size="10" fill="#4527A0" font-weight="bold">Часть 2:</text>
  <text x="85" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Задания 20-25 (с развёрнутым ответом)</text>
  <text x="32" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">21-23 — алгебра, 24-25 — геометрия</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#7E57C2" opacity="0.05"/>
  <text x="262" y="88" font-family="Arial,sans-serif" font-size="10" fill="#4527A0" font-weight="bold">Темы:</text>
  <text x="325" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">Числа, дроби, проценты</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Уравнения, неравенства</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Функции и графики</text>
  <text x="272" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Прогрессии, вероятность</text>
  <text x="262" y="168" font-family="Arial,sans-serif" font-size="10" fill="#4527A0" font-weight="bold">Совет:</text>
  <text x="325" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Решайте типовые задания!</text>
  <text x="272" y="188" font-family="Arial,sans-serif" font-size="10" fill="#333">Время: 3 часа 55 минут</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#7E57C2" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#4527A0" text-anchor="middle" font-weight="bold">Математика — обязательный предмет</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#7E57C2" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#4527A0" text-anchor="middle" font-weight="bold">Часть 2 — за каждый балл борьба</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">ОГЭ · Математика ОГЭ</text>
</svg>