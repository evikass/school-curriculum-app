<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <radialGradient id="spotlight" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ffd93d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd93d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="#0a0a0a"/>
  <!-- Spotlight -->
  <rect width="500" height="350" fill="url(#spotlight)"/>
  <!-- Stage curtain left -->
  <path d="M0 0 L60 0 Q50 50 55 100 Q45 150 50 200 Q40 250 45 300 L0 300 Z" fill="#8b0000" opacity="0.4"/>
  <path d="M60 0 Q50 50 55 100 Q45 150 50 200 Q40 250 45 300" fill="none" stroke="#c44d3e" stroke-width="1" opacity="0.4"/>
  <!-- Stage curtain right -->
  <path d="M500 0 L440 0 Q450 50 445 100 Q455 150 450 200 Q460 250 455 300 L500 300 Z" fill="#8b0000" opacity="0.4"/>
  <path d="M440 0 Q450 50 445 100 Q455 150 450 200 Q460 250 455 300" fill="none" stroke="#c44d3e" stroke-width="1" opacity="0.4"/>
  <!-- Curtain top -->
  <path d="M0 0 Q250 40 500 0" fill="#8b0000" opacity="0.3"/>
  <!-- Opera singer on stage -->
  <circle cx="250" cy="130" r="18" fill="#e8dcc8" opacity="0.35"/>
  <path d="M232 148 Q250 142 268 148 L262 230 L238 230 Z" fill="#9b59b6" opacity="0.25"/>
  <!-- Arms outstretched -->
  <line x1="232" y1="165" x2="195" y2="155" stroke="#e8dcc8" stroke-width="2.5" opacity="0.25"/>
  <line x1="268" y1="165" x2="305" y2="155" stroke="#e8dcc8" stroke-width="2.5" opacity="0.25"/>
  <!-- Sound waves from singer -->
  <path d="M270 120 Q285 115 280 105" fill="none" stroke="#ffd93d" stroke-width="1.5" opacity="0.3"/>
  <path d="M278 125 Q298 118 290 105" fill="none" stroke="#ffd93d" stroke-width="1" opacity="0.25"/>
  <path d="M285 130 Q310 120 300 108" fill="none" stroke="#ffd93d" stroke-width="1" opacity="0.2"/>
  <!-- Orchestra pit (below stage) -->
  <rect x="120" y="240" width="260" height="30" fill="#1a1a1a" opacity="0.6"/>
  <text x="250" y="260" font-size="7" fill="#ffd93d" opacity="0.3" text-anchor="middle" font-family="sans-serif">Оркестровая яма</text>
  <!-- Small instrument suggestions in pit -->
  <rect x="150" y="252" width="15" height="3" rx="1" fill="#c49535" opacity="0.3"/>
  <rect x="180" y="252" width="15" height="3" rx="1" fill="#c49535" opacity="0.3"/>
  <rect x="210" y="252" width="15" height="3" rx="1" fill="#c49535" opacity="0.3"/>
  <rect x="280" y="252" width="15" height="3" rx="1" fill="#c49535" opacity="0.3"/>
  <rect x="310" y="252" width="15" height="3" rx="1" fill="#c49535" opacity="0.3"/>
  <rect x="340" y="252" width="15" height="3" rx="1" fill="#c49535" opacity="0.3"/>
  <!-- Audience heads (silhouettes) -->
  <circle cx="140" cy="300" r="8" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="165" cy="305" r="8" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="190" cy="300" r="8" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="215" cy="305" r="8" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="240" cy="300" r="8" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="265" cy="305" r="8" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="290" cy="300" r="8" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="315" cy="305" r="8" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="340" cy="300" r="8" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="365" cy="305" r="8" fill="#1a1a2e" opacity="0.5"/>
  <!-- Opera mask (comedy/tragedy) -->
  <path d="M380 100 Q400 85 420 100" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="390" cy="95" r="3" fill="#ffffff" opacity="0.2"/>
  <circle cx="410" cy="95" r="3" fill="#ffffff" opacity="0.2"/>
  <path d="M395 105 Q400 108 405 105" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <path d="M380 70 Q400 55 420 70" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
  <circle cx="390" cy="65" r="3" fill="#ffffff" opacity="0.15"/>
  <circle cx="410" cy="65" r="3" fill="#ffffff" opacity="0.15"/>
  <path d="M395 58 Q400 54 405 58" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.25"/>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Оперное искусство</text>
</svg>