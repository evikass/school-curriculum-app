<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <radialGradient id="glowM4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd93d" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffd93d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="#0d0d1a"/>
  <circle cx="250" cy="170" r="100" fill="url(#glowM4)"/>
  <!-- Orthodox church outline -->
  <rect x="180" y="160" width="80" height="90" fill="#1a1a3e" opacity="0.5"/>
  <!-- Onion dome -->
  <path d="M200 160 Q200 130 220 110 Q240 130 240 160" fill="#ffd93d" opacity="0.4"/>
  <line x1="220" y1="110" x2="220" y2="95" stroke="#ffd93d" stroke-width="2" opacity="0.4"/>
  <path d="M215 97 L220 90 L225 97" fill="#ffd93d" opacity="0.4"/>
  <!-- Cross -->
  <line x1="220" y1="88" x2="220" y2="78" stroke="#ffd93d" stroke-width="2" opacity="0.5"/>
  <line x1="215" y1="83" x2="225" y2="83" stroke="#ffd93d" stroke-width="2" opacity="0.5"/>
  <!-- Church windows with light -->
  <rect x="200" y="190" width="12" height="18" rx="6" fill="#ffd93d" opacity="0.15"/>
  <rect x="228" y="190" width="12" height="18" rx="6" fill="#ffd93d" opacity="0.15"/>
  <!-- Kruki (neumes) - ancient notation -->
  <g opacity="0.5" transform="translate(300,80)">
    <path d="M0 0 Q10 -15 20 0" fill="none" stroke="#ffd93d" stroke-width="1.5"/>
    <path d="M25 5 Q35 -10 45 5" fill="none" stroke="#ffd93d" stroke-width="1.5"/>
    <path d="M50 0 L50 -10 L55 -10" fill="none" stroke="#ffd93d" stroke-width="1.5"/>
    <path d="M60 5 Q70 -5 80 5" fill="none" stroke="#ffd93d" stroke-width="1.5"/>
    <path d="M85 0 L85 -8 Q90 -12 95 -8" fill="none" stroke="#ffd93d" stroke-width="1.5"/>
  </g>
  <text x="355" y="110" font-size="7" fill="#ffd93d" opacity="0.4" text-anchor="middle" font-family="sans-serif">Крюковая запись</text>
  <!-- Choir singers -->
  <circle cx="110" cy="140" r="10" fill="#e8dcc8" opacity="0.3"/>
  <circle cx="135" cy="140" r="10" fill="#e8dcc8" opacity="0.3"/>
  <circle cx="160" cy="140" r="10" fill="#e8dcc8" opacity="0.3"/>
  <rect x="100" y="152" width="70" height="25" rx="3" fill="#4d7355" opacity="0.2"/>
  <!-- Sound waves from choir -->
  <path d="M90 135 Q80 125 85 115" fill="none" stroke="#ffd93d" stroke-width="1" opacity="0.3"/>
  <path d="M85 140 Q70 130 78 118" fill="none" stroke="#ffd93d" stroke-width="1" opacity="0.25"/>
  <path d="M170 135 Q180 125 175 115" fill="none" stroke="#ffd93d" stroke-width="1" opacity="0.3"/>
  <path d="M175 140 Q190 130 182 118" fill="none" stroke="#ffd93d" stroke-width="1" opacity="0.25"/>
  <!-- A cappella text -->
  <text x="135" y="195" font-size="8" fill="#ffd93d" opacity="0.4" text-anchor="middle" font-family="sans-serif">a cappella</text>
  <!-- Open book with notes -->
  <rect x="300" y="190" width="60" height="45" fill="#e8dcc8" opacity="0.2" rx="2"/>
  <line x1="330" y1="190" x2="330" y2="235" stroke="#8b5e3c" stroke-width="1" opacity="0.3"/>
  <line x1="310" y1="200" x2="325" y2="200" stroke="#8b5e3c" stroke-width="0.5" opacity="0.3"/>
  <line x1="310" y1="210" x2="325" y2="210" stroke="#8b5e3c" stroke-width="0.5" opacity="0.3"/>
  <line x1="310" y1="220" x2="325" y2="220" stroke="#8b5e3c" stroke-width="0.5" opacity="0.3"/>
  <line x1="335" y1="200" x2="350" y2="200" stroke="#8b5e3c" stroke-width="0.5" opacity="0.3"/>
  <line x1="335" y1="210" x2="350" y2="210" stroke="#8b5e3c" stroke-width="0.5" opacity="0.3"/>
  <line x1="335" y1="220" x2="350" y2="220" stroke="#8b5e3c" stroke-width="0.5" opacity="0.3"/>
  <!-- Candle -->
  <rect x="395" y="170" width="6" height="30" fill="#e8dcc8" opacity="0.3"/>
  <ellipse cx="398" cy="168" rx="4" ry="6" fill="#ffd93d" opacity="0.4"/>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Русская духовная музыка</text>
</svg>