<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0a0a0a"/>
  <!-- Jazz club atmosphere - dark, smoky -->
  <!-- Spotlight -->
  <circle cx="180" cy="100" r="80" fill="#ffd93d" opacity="0.05"/>
  <circle cx="180" cy="100" r="40" fill="#ffd93d" opacity="0.08"/>
  <!-- Saxophone player silhouette -->
  <circle cx="160" cy="95" r="18" fill="#e8dcc8" opacity="0.3"/>
  <path d="M142 113 Q160 108 178 113 L174 190 L146 190 Z" fill="#1a1a2e" opacity="0.5"/>
  <!-- Saxophone -->
  <path d="M175 130 Q190 140 195 160 Q198 180 185 190 Q175 195 170 185" fill="none" stroke="#ffd93d" stroke-width="3" opacity="0.5"/>
  <ellipse cx="170" cy="187" rx="8" ry="5" fill="#ffd93d" opacity="0.3"/>
  <line x1="175" y1="130" x2="185" y2="100" stroke="#ffd93d" stroke-width="2.5" opacity="0.4"/>
  <!-- Piano player -->
  <circle cx="320" cy="110" r="15" fill="#e8dcc8" opacity="0.25"/>
  <rect x="308" y="125" width="24" height="35" rx="3" fill="#1a1a2e" opacity="0.4"/>
  <!-- Upright piano -->
  <rect x="290" y="140" width="70" height="80" fill="#1a1a2e" stroke="#ffd93d" stroke-width="1" opacity="0.3"/>
  <!-- Piano keys -->
  <g opacity="0.3">
    <rect x="295" y="200" width="5" height="10" fill="#fff"/>
    <rect x="302" y="200" width="5" height="10" fill="#fff"/>
    <rect x="309" y="200" width="5" height="10" fill="#fff"/>
    <rect x="316" y="200" width="5" height="10" fill="#fff"/>
    <rect x="323" y="200" width="5" height="10" fill="#fff"/>
    <rect x="330" y="200" width="5" height="10" fill="#fff"/>
    <rect x="337" y="200" width="5" height="10" fill="#fff"/>
    <rect x="344" y="200" width="5" height="10" fill="#fff"/>
    <rect x="351" y="200" width="5" height="10" fill="#fff"/>
  </g>
  <!-- Double bass -->
  <ellipse cx="430" cy="200" rx="15" ry="10" fill="#c49535" opacity="0.3"/>
  <line x1="430" y1="190" x2="430" y2="120" stroke="#8b5e3c" stroke-width="2" opacity="0.3"/>
  <line x1="430" y1="120" x2="425" y2="105" stroke="#8b5e3c" stroke-width="1.5" opacity="0.3"/>
  <line x1="430" y1="120" x2="435" y2="105" stroke="#8b5e3c" stroke-width="1.5" opacity="0.3"/>
  <!-- Drum kit -->
  <ellipse cx="90" cy="200" rx="25" ry="10" fill="#8b0000" opacity="0.3"/>
  <ellipse cx="90" cy="195" rx="25" ry="10" fill="#c44d3e" opacity="0.15"/>
  <circle cx="55" cy="185" r="10" fill="#c0c0c0" opacity="0.15"/>
  <circle cx="125" cy="185" r="10" fill="#c0c0c0" opacity="0.15"/>
  <!-- Cymbal -->
  <ellipse cx="70" cy="170" rx="15" ry="3" fill="#ffd93d" opacity="0.2"/>
  <ellipse cx="115" cy="175" rx="12" ry="2.5" fill="#ffd93d" opacity="0.2"/>
  <!-- Musical notes floating -->
  <ellipse cx="220" cy="80" rx="8" ry="5" fill="#ff6b6b" opacity="0.4" transform="rotate(-15,220,80)"/>
  <line x1="227" y1="78" x2="227" y2="55" stroke="#ff6b6b" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="260" cy="70" rx="8" ry="5" fill="#6bcb77" opacity="0.4" transform="rotate(-15,260,70)"/>
  <line x1="267" y1="68" x2="267" y2="45" stroke="#6bcb77" stroke-width="1.5" opacity="0.4"/>
  <!-- Swing rhythm notation -->
  <text x="250" y="260" font-size="12" fill="#ffd93d" opacity="0.3" text-anchor="middle" font-family="sans-serif">♪ swing ♫</text>
  <!-- Small tables (jazz club) -->
  <circle cx="70" cy="260" r="12" fill="#2a2a3e" opacity="0.3"/>
  <circle cx="250" cy="270" r="12" fill="#2a2a3e" opacity="0.3"/>
  <circle cx="420" cy="260" r="12" fill="#2a2a3e" opacity="0.3"/>
  <!-- Glasses on tables -->
  <rect x="65" y="255" width="4" height="6" rx="1" fill="#00d2ff" opacity="0.2"/>
  <rect x="245" y="265" width="4" height="6" rx="1" fill="#00d2ff" opacity="0.2"/>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Джаз</text>
</svg>