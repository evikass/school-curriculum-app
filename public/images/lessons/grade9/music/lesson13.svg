<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0a0a14"/>
  <!-- Digital wave / frequency visualization -->
  <path d="M0 175 L30 175 L35 140 L40 210 L45 120 L50 230 L55 100 L60 250 L65 130 L70 200 L75 155 L80 175 L110 175 L115 145 L120 205 L125 135 L130 215 L135 110 L140 240 L145 150 L150 190 L155 175 L185 175 L190 150 L195 200 L200 140 L205 210 L210 130 L215 220 L220 160 L225 185 L230 175" fill="none" stroke="#4d96ff" stroke-width="2" opacity="0.5"/>
  <!-- Second wave (offset) -->
  <path d="M230 175 L260 175 L265 155 L270 195 L275 140 L280 210 L285 125 L290 225 L295 160 L300 190 L305 175 L335 175 L340 160 L345 190 L350 150 L355 200 L360 140 L365 210 L370 165 L375 185 L380 175 L410 175 L415 150 L420 200 L425 135 L430 215 L435 120 L440 230 L445 155 L450 195 L455 175 L500 175" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.35"/>
  <!-- Laptop/computer -->
  <rect x="150" y="50" width="120" height="75" rx="3" fill="#1a1a2e" stroke="#4d96ff" stroke-width="1" opacity="0.5"/>
  <rect x="155" y="55" width="110" height="60" fill="#0a0a14"/>
  <!-- DAW interface on screen -->
  <g opacity="0.4">
    <rect x="160" y="60" width="100" height="10" fill="#1a1a2e"/>
    <rect x="160" y="73" width="40" height="5" fill="#4d96ff" opacity="0.5"/>
    <rect x="160" y="80" width="55" height="5" fill="#ff6b6b" opacity="0.5"/>
    <rect x="160" y="87" width="35" height="5" fill="#6bcb77" opacity="0.5"/>
    <rect x="160" y="94" width="70" height="5" fill="#ffd93d" opacity="0.5"/>
    <rect x="160" y="101" width="45" height="5" fill="#9b59b6" opacity="0.5"/>
  </g>
  <rect x="140" y="125" width="140" height="6" rx="2" fill="#2a2a3e" opacity="0.4"/>
  <!-- Headphones -->
  <path d="M200 45 Q200 20 225 15 Q250 10 275 15 Q300 20 300 45" fill="none" stroke="#c0c0c0" stroke-width="3" opacity="0.3"/>
  <rect x="195" y="40" width="10" height="15" rx="3" fill="#c0c0c0" opacity="0.25"/>
  <rect x="295" y="40" width="10" height="15" rx="3" fill="#c0c0c0" opacity="0.25"/>
  <!-- Synthesizer -->
  <rect x="330" y="50" width="130" height="55" rx="3" fill="#1a1a2e" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
  <!-- Synth knobs -->
  <circle cx="350" cy="70" r="6" fill="#2a2a3e" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
  <circle cx="375" cy="70" r="6" fill="#2a2a3e" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
  <circle cx="400" cy="70" r="6" fill="#2a2a3e" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
  <circle cx="425" cy="70" r="6" fill="#2a2a3e" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
  <!-- Synth keys -->
  <g opacity="0.3">
    <rect x="340" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="350" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="360" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="370" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="380" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="390" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="400" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="410" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="420" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="430" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
    <rect x="440" y="82" width="8" height="15" fill="#fff" opacity="0.3"/>
  </g>
  <!-- Streaming icon -->
  <circle cx="80" cy="80" r="25" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.3"/>
  <polygon points="73,68 93,80 73,92" fill="#ff6b6b" opacity="0.3"/>
  <!-- WiFi/signal waves -->
  <path d="M55 55 Q80 35 105 55" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.2"/>
  <path d="M45 45 Q80 15 115 45" fill="none" stroke="#ff6b6b" stroke-width="1.5" opacity="0.15"/>
  <!-- Genre icons at bottom -->
  <text x="80" y="280" font-size="8" fill="#ff6b6b" opacity="0.3" text-anchor="middle" font-family="sans-serif">Электронная</text>
  <text x="180" y="280" font-size="8" fill="#4d96ff" opacity="0.3" text-anchor="middle" font-family="sans-serif">Хип-хоп</text>
  <text x="280" y="280" font-size="8" fill="#6bcb77" opacity="0.3" text-anchor="middle" font-family="sans-serif">Инди</text>
  <text x="380" y="280" font-size="8" fill="#9b59b6" opacity="0.3" text-anchor="middle" font-family="sans-serif">EDM</text>
  <!-- Small genre symbols -->
  <rect x="65" y="255" width="30" height="15" rx="2" fill="#ff6b6b" opacity="0.1"/>
  <circle cx="180" cy="262" r="8" fill="#4d96ff" opacity="0.1"/>
  <path d="M268 255 Q280 248 292 255 L288 270 L272 270 Z" fill="#6bcb77" opacity="0.1"/>
  <path d="M370 250 Q380 245 390 250 L388 270 L372 270 Z" fill="#9b59b6" opacity="0.1"/>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Современная музыка</text>
</svg>