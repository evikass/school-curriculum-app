<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#1a0a0a"/>
  <!-- Birch forest background -->
  <rect x="40" y="30" width="8" height="280" fill="#e8dcc8" opacity="0.3"/>
  <rect x="45" y="30" width="3" height="280" fill="#1a0a0a" opacity="0.2"/>
  <rect x="90" y="20" width="8" height="290" fill="#e8dcc8" opacity="0.25"/>
  <rect x="95" y="20" width="3" height="290" fill="#1a0a0a" opacity="0.2"/>
  <rect x="390" y="25" width="8" height="285" fill="#e8dcc8" opacity="0.25"/>
  <rect x="395" y="25" width="3" height="285" fill="#1a0a0a" opacity="0.2"/>
  <rect x="450" y="35" width="8" height="275" fill="#e8dcc8" opacity="0.2"/>
  <!-- Balalaika -->
  <polygon points="200,80 175,160 225,160" fill="#c49535" opacity="0.6"/>
  <rect x="195" y="50" width="10" height="35" fill="#8b5e3c" opacity="0.6"/>
  <line x1="197" y1="85" x2="197" y2="155" stroke="#ffd93d" stroke-width="0.8" opacity="0.4"/>
  <line x1="203" y1="85" x2="203" y2="155" stroke="#ffd93d" stroke-width="0.8" opacity="0.4"/>
  <line x1="200" y1="85" x2="200" y2="155" stroke="#ffd93d" stroke-width="0.8" opacity="0.4"/>
  <!-- Gusli -->
  <rect x="300" y="80" width="70" height="15" rx="3" fill="#8b5e3c" opacity="0.5"/>
  <line x1="310" y1="80" x2="310" y2="40" stroke="#ffd93d" stroke-width="0.8" opacity="0.4"/>
  <line x1="320" y1="80" x2="320" y2="40" stroke="#ffd93d" stroke-width="0.8" opacity="0.4"/>
  <line x1="330" y1="80" x2="330" y2="40" stroke="#ffd93d" stroke-width="0.8" opacity="0.4"/>
  <line x1="340" y1="80" x2="340" y2="40" stroke="#ffd93d" stroke-width="0.8" opacity="0.4"/>
  <line x1="350" y1="80" x2="350" y2="40" stroke="#ffd93d" stroke-width="0.8" opacity="0.4"/>
  <line x1="360" y1="80" x2="360" y2="40" stroke="#ffd93d" stroke-width="0.8" opacity="0.4"/>
  <!-- Accordion/garmon -->
  <rect x="55" y="180" width="35" height="50" rx="3" fill="#c44d3e" opacity="0.4"/>
  <rect x="120" y="180" width="35" height="50" rx="3" fill="#c44d3e" opacity="0.4"/>
  <path d="M90 185 L120 185 L115 195 L95 195 L90 205 L120 205 L115 215 L95 215 L90 225 L120 225" fill="none" stroke="#ffd93d" stroke-width="1.5" opacity="0.4"/>
  <!-- Horn -->
  <path d="M420 180 Q440 160 460 170 Q475 180 460 195 Q445 205 435 195" fill="none" stroke="#c49535" stroke-width="3" opacity="0.5"/>
  <circle cx="420" cy="178" r="8" fill="#c49535" opacity="0.4"/>
  <!-- Folk dancers -->
  <circle cx="220" cy="210" r="10" fill="#e8dcc8" opacity="0.4"/>
  <path d="M210 220 Q220 215 230 220 L225 260 L215 260 Z" fill="#c44d3e" opacity="0.3"/>
  <circle cx="270" cy="210" r="10" fill="#e8dcc8" opacity="0.4"/>
  <path d="M260 220 Q270 215 280 220 L275 260 L265 260 Z" fill="#4d7355" opacity="0.3"/>
  <!-- Dancing arms up -->
  <line x1="210" y1="225" x2="195" y2="205" stroke="#e8dcc8" stroke-width="2" opacity="0.3"/>
  <line x1="280" y1="225" x2="295" y2="205" stroke="#e8dcc8" stroke-width="2" opacity="0.3"/>
  <!-- Kokoshnik (headdress) -->
  <path d="M210 200 Q220 180 230 200" fill="#ffd93d" opacity="0.3"/>
  <path d="M260 200 Q270 180 280 200" fill="#ffd93d" opacity="0.3"/>
  <!-- Sun with rays (Khokhloma style) -->
  <circle cx="250" cy="60" r="20" fill="#ffd93d" opacity="0.3"/>
  <line x1="250" y1="35" x2="250" y2="25" stroke="#ffd93d" stroke-width="2" opacity="0.3"/>
  <line x1="275" y1="60" x2="285" y2="60" stroke="#ffd93d" stroke-width="2" opacity="0.3"/>
  <line x1="225" y1="60" x2="215" y2="60" stroke="#ffd93d" stroke-width="2" opacity="0.3"/>
  <line x1="270" y1="40" x2="278" y2="32" stroke="#ffd93d" stroke-width="2" opacity="0.3"/>
  <line x1="230" y1="40" x2="222" y2="32" stroke="#ffd93d" stroke-width="2" opacity="0.3"/>
  <!-- Khokhloma flowers -->
  <circle cx="150" cy="290" r="8" fill="#ff6b6b" opacity="0.3"/>
  <circle cx="142" cy="282" r="6" fill="#ffd93d" opacity="0.25"/>
  <circle cx="158" cy="282" r="6" fill="#ffd93d" opacity="0.25"/>
  <circle cx="142" cy="298" r="6" fill="#ffd93d" opacity="0.25"/>
  <circle cx="158" cy="298" r="6" fill="#ffd93d" opacity="0.25"/>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Народная музыка</text>
</svg>