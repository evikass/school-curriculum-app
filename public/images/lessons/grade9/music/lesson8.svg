<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <radialGradient id="candle8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd93d" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd93d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="#0d0d1a"/>
  <!-- Intimate room atmosphere -->
  <circle cx="250" cy="180" r="120" fill="url(#candle8)"/>
  <!-- String quartet -->
  <!-- Player 1 - Violin -->
  <circle cx="130" cy="150" r="12" fill="#e8dcc8" opacity="0.25"/>
