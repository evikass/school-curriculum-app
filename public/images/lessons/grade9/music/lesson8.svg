  <line x1="316" y1="168" x2="316" y2="148" stroke="#8b5e3c" stroke-width="1" opacity="0.35"/>
  <!-- Player 4 - Cello -->
  <circle cx="370" cy="145" r="12" fill="#e8dcc8" opacity="0.25"/>
  <rect x="360" y="157" width="20" height="35" rx="3" fill="#1a1a2e" opacity="0.3"/>
  <ellipse cx="385" cy="175" rx="15" ry="10" fill="#c49535" opacity="0.35"/>
  <line x1="399" y1="172" x2="399" y2="145" stroke="#8b5e3c" stroke-width="1.5" opacity="0.35"/>
  <!-- Music stands -->
  <line x1="155" y1="155" x2="155" y2="120" stroke="#c0c0c0" stroke-width="1" opacity="0.3"/>
  <rect x="145" y="110" width="20" height="14" fill="#2a2a3e" opacity="0.3"/>
  <line x1="225" y1="155" x2="225" y2="120" stroke="#c0c0c0" stroke-width="1" opacity="0.3"/>
  <rect x="215" y="110" width="20" height="14" fill="#2a2a3e" opacity="0.3"/>
  <line x1="310" y1="155" x2="310" y2="120" stroke="#c0c0c0" stroke-width="1" opacity="0.3"/>
  <rect x="300" y="110" width="20" height="14" fill="#2a2a3e" opacity="0.3"/>
  <!-- Candles on stands -->
  <rect x="153" y="107" width="4" height="8" fill="#e8dcc8" opacity="0.3"/>
  <ellipse cx="155" cy="105" rx="3" ry="5" fill="#ffd93d" opacity="0.35"/>
  <rect x="223" y="107" width="4" height="8" fill="#e8dcc8" opacity="0.3"/>
  <ellipse cx="225" cy="105" rx="3" ry="5" fill="#ffd93d" opacity="0.35"/>
  <!-- Chamber hall suggestion -->
  <rect x="80" y="70" width="340" height="160" fill="none" stroke="#2a2a3e" stroke-width="1" opacity="0.3" rx="5"/>
  <!-- Small audience -->
  <circle cx="150" cy="260" r="7" fill="#1a1a2e" opacity="0.4"/>
  <circle cx="175" cy="262" r="7" fill="#1a1a2e" opacity="0.4"/>
  <circle cx="200" cy="260" r="7" fill="#1a1a2e" opacity="0.4"/>
  <circle cx="300" cy="260" r="7" fill="#1a1a2e" opacity="0.4"/>
  <circle cx="325" cy="262" r="7" fill="#1a1a2e" opacity="0.4"/>
  <circle cx="350" cy="260" r="7" fill="#1a1a2e" opacity="0.4"/>
  <!-- Flowing musical line -->
  <path d="M120 220 Q180 210 250 225 Q320 240 380 220" fill="none" stroke="#00d2ff" stroke-width="1.5" opacity="0.25"/>
  <!-- Label -->
  <text x="250" y="245" font-size="8" fill="#ffd93d" opacity="0.4" text-anchor="middle" font-family="sans-serif">Квартет</text>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Камерная музыка</text>
