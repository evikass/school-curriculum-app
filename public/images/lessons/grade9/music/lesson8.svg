  <ellipse cx="145" cy="170" rx="10" ry="7" fill="#c49535" opacity="0.4"/>
  <line x1="154" y1="168" x2="154" y2="150" stroke="#8b5e3c" stroke-width="1" opacity="0.4"/>
  <!-- Player 2 - Violin -->
  <circle cx="200" cy="150" r="12" fill="#e8dcc8" opacity="0.25"/>
  <rect x="190" y="162" width="20" height="30" rx="3" fill="#1a1a2e" opacity="0.3"/>
