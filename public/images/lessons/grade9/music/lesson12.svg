<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#9C27B0" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#9C27B0" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#9C27B0" text-anchor="middle">Джаз и блюз</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Музыка — Урок 12</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#9C27B0" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#9C27B0" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">Джаз —</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">импровизационная музыка XX века</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">Истоки:</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Африканские ритмы + европейская гармония</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Нью-Орлеан — родина джаза</text>
  <text x="22" y="148" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">Особенности:</text>
  <text x="85" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Свинг — особый ритмический рисунок</text>
  <text x="32" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Импровизация — сольная игра</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#9C27B0" opacity="0.05"/>
  <text x="272" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">Синкопа — акцент на слабую долю</text>
  <text x="262" y="108" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">Блюз:</text>
  <text x="325" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">12-тактовая форма</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Блюзовый лад — «голубые ноты»</text>
  <text x="262" y="148" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" font-weight="bold">Легенды:</text>
  <text x="325" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Луи Армстронг — труба и вокал</text>
  <text x="272" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Дюк Эллингтон, Майлс Дэвис</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#9C27B0" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Джаз — музыка свободы</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#9C27B0" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Импровизация — душа джаза</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Музыка · Джаз и блюз</text>
