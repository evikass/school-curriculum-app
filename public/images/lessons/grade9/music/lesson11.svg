<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0a0a14"/>
  <!-- Concert stage lights -->
  <circle cx="100" cy="0" r="30" fill="#ff6b6b" opacity="0.1"/>
  <circle cx="250" cy="0" r="30" fill="#4d96ff" opacity="0.1"/>
  <circle cx="400" cy="0" r="30" fill="#6bcb77" opacity="0.1"/>
  <!-- Light beams -->
  <polygon points="85,0 115,0 180,200 20,200" fill="#ff6b6b" opacity="0.04"/>
  <polygon points="235,0 265,0 330,200 170,200" fill="#4d96ff" opacity="0.04"/>
  <polygon points="385,0 415,0 480,200 320,200" fill="#6bcb77" opacity="0.04"/>
  <!-- Singer on stage -->
  <circle cx="250" cy="120" r="20" fill="#e8dcc8" opacity="0.3"/>
  <path d="M230 140 Q250 133 270 140 L265 210 L235 210 Z" fill="#ff6b6b" opacity="0.2"/>
  <!-- Microphone -->
  <rect x="247" y="135" width="6" height="35" fill="#4a4a4a" opacity="0.4"/>
  <circle cx="250" cy="132" r="8" fill="#4a4a4a" opacity="0.4"/>
  <rect x="245" y="168" width="10" height="30" rx="2" fill="#4a4a4a" opacity="0.3"/>
  <!-- Backup dancers -->
  <circle cx="170" cy="140" r="12" fill="#e8dcc8" opacity="0.2"/>
  <path d="M158 152 Q170 147 182 152 L179 200 L161 200 Z" fill="#4d96ff" opacity="0.15"/>
  <circle cx="330" cy="140" r="12" fill="#e8dcc8" opacity="0.2"/>
  <path d="M318 152 Q330 147 342 152 L339 200 L321 200 Z" fill="#9b59b6" opacity="0.15"/>
  <!-- Stage -->
  <rect x="30" y="210" width="440" height="10" fill="#2a2a3e" opacity="0.5"/>
  <!-- Speakers -->
  <rect x="40" y="140" width="40" height="70" rx="3" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="60" cy="160" r="10" fill="#2a2a3e" stroke="#4d96ff" stroke-width="1" opacity="0.3"/>
  <circle cx="60" cy="185" r="8" fill="#2a2a3e" stroke="#4d96ff" stroke-width="1" opacity="0.3"/>
  <rect x="420" y="140" width="40" height="70" rx="3" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="440" cy="160" r="10" fill="#2a2a3e" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  <circle cx="440" cy="185" r="8" fill="#2a2a3e" stroke="#ff6b6b" stroke-width="1" opacity="0.3"/>
  <!-- Screen/LED display -->
  <rect x="190" y="50" width="120" height="50" fill="#0a0a14" stroke="#4d96ff" stroke-width="1" opacity="0.3"/>
  <rect x="195" y="55" width="110" height="40" fill="#4d96ff" opacity="0.05"/>
  <!-- Light dots on screen -->
  <circle cx="220" cy="70" r="3" fill="#ff6b6b" opacity="0.2"/>
  <circle cx="240" cy="75" r="3" fill="#ffd93d" opacity="0.2"/>
  <circle cx="260" cy="70" r="3" fill="#6bcb77" opacity="0.2"/>
  <circle cx="280" cy="75" r="3" fill="#4d96ff" opacity="0.2"/>
  <!-- Audience -->
  <g opacity="0.3">
    <circle cx="70" cy="250" r="8" fill="#1a1a2e"/>
    <circle cx="100" cy="255" r="8" fill="#1a1a2e"/>
    <circle cx="130" cy="250" r="8" fill="#1a1a2e"/>
    <circle cx="160" cy="255" r="8" fill="#1a1a2e"/>
    <circle cx="190" cy="250" r="8" fill="#1a1a2e"/>
    <circle cx="220" cy="255" r="8" fill="#1a1a2e"/>
    <circle cx="250" cy="250" r="8" fill="#1a1a2e"/>
    <circle cx="280" cy="255" r="8" fill="#1a1a2e"/>
    <circle cx="310" cy="250" r="8" fill="#1a1a2e"/>
    <circle cx="340" cy="255" r="8" fill="#1a1a2e"/>
    <circle cx="370" cy="250" r="8" fill="#1a1a2e"/>
    <circle cx="400" cy="255" r="8" fill="#1a1a2e"/>
    <circle cx="430" cy="250" r="8" fill="#1a1a2e"/>
  </g>
  <!-- Raised hands -->
  <line x1="100" y1="245" x2="95" y2="225" stroke="#e8dcc8" stroke-width="1.5" opacity="0.15"/>
  <line x1="250" y1="242" x2="250" y2="222" stroke="#e8dcc8" stroke-width="1.5" opacity="0.15"/>
  <line x1="400" y1="245" x2="405" y2="225" stroke="#e8dcc8" stroke-width="1.5" opacity="0.15"/>
  <!-- Stars/sparkles -->
  <circle cx="150" cy="50" r="2" fill="#ffd93d" opacity="0.3"/>
  <circle cx="350" cy="40" r="2" fill="#ffd93d" opacity="0.3"/>
  <circle cx="450" cy="60" r="2" fill="#ffd93d" opacity="0.3"/>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Эстрадная музыка</text>
</svg>