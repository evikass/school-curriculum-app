<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0a0a1a"/>
  <!-- Staff lines -->
  <g opacity="0.4">
    <line x1="30" y1="100" x2="470" y2="100" stroke="#ffffff" stroke-width="1"/>
    <line x1="30" y1="115" x2="470" y2="115" stroke="#ffffff" stroke-width="1"/>
    <line x1="30" y1="130" x2="470" y2="130" stroke="#ffffff" stroke-width="1"/>
    <line x1="30" y1="145" x2="470" y2="145" stroke="#ffffff" stroke-width="1"/>
    <line x1="30" y1="160" x2="470" y2="160" stroke="#ffffff" stroke-width="1"/>
  </g>
  <!-- Treble clef -->
  <path d="M60 170 Q55 140 70 120 Q85 100 80 130 Q75 160 65 175 Q55 190 70 185 Q85 180 80 165" fill="none" stroke="#00d2ff" stroke-width="3" opacity="0.7"/>
  <line x1="80" y1="185" x2="80" y2="90" stroke="#00d2ff" stroke-width="2" opacity="0.4"/>
  <circle cx="80" cy="88" r="4" fill="#00d2ff" opacity="0.5"/>
  <!-- Notes on staff -->
  <ellipse cx="130" cy="130" rx="8" ry="6" fill="#ffd93d" opacity="0.7" transform="rotate(-15,130,130)"/>
  <line x1="137" y1="128" x2="137" y2="95" stroke="#ffd93d" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="170" cy="145" rx="8" ry="6" fill="#ff6b6b" opacity="0.7" transform="rotate(-15,170,145)"/>
  <line x1="177" y1="143" x2="177" y2="110" stroke="#ff6b6b" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="210" cy="115" rx="8" ry="6" fill="#6bcb77" opacity="0.7" transform="rotate(-15,210,115)"/>
  <line x1="217" y1="113" x2="217" y2="80" stroke="#6bcb77" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="250" cy="160" rx="8" ry="6" fill="#9b59b6" opacity="0.7" transform="rotate(-15,250,160)"/>
  <line x1="257" y1="158" x2="257" y2="125" stroke="#9b59b6" stroke-width="1.5" opacity="0.7"/>
  <!-- Time signature 4/4 -->
  <text x="105" y="125" font-size="16" fill="#ffffff" opacity="0.5" font-family="sans-serif">4</text>
  <text x="105" y="148" font-size="16" fill="#ffffff" opacity="0.5" font-family="sans-serif">4</text>
  <!-- Note durations comparison -->
  <text x="50" y="220" font-size="9" fill="#ffffff" opacity="0.5" font-family="sans-serif">Длительности нот:</text>
  <!-- Whole note -->
  <ellipse cx="80" cy="248" rx="14" ry="10" fill="none" stroke="#00d2ff" stroke-width="2" opacity="0.6"/>
  <text x="80" y="275" font-size="7" fill="#00d2ff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Целая</text>
  <!-- Half note -->
  <ellipse cx="140" cy="248" rx="10" ry="7" fill="none" stroke="#ffd93d" stroke-width="2" opacity="0.6"/>
  <line x1="149" y1="246" x2="149" y2="220" stroke="#ffd93d" stroke-width="1.5" opacity="0.6"/>
  <text x="140" y="275" font-size="7" fill="#ffd93d" opacity="0.5" text-anchor="middle" font-family="sans-serif">Половинная</text>
  <!-- Quarter note -->
  <ellipse cx="210" cy="248" rx="10" ry="7" fill="#ff6b6b" opacity="0.6"/>
  <line x1="219" y1="246" x2="219" y2="220" stroke="#ff6b6b" stroke-width="1.5" opacity="0.6"/>
  <text x="210" y="275" font-size="7" fill="#ff6b6b" opacity="0.5" text-anchor="middle" font-family="sans-serif">Четвертная</text>
  <!-- Eighth note -->
  <ellipse cx="280" cy="248" rx="10" ry="7" fill="#6bcb77" opacity="0.6"/>
  <line x1="289" y1="246" x2="289" y2="220" stroke="#6bcb77" stroke-width="1.5" opacity="0.6"/>
  <path d="M289 220 Q300 225 297 235" fill="none" stroke="#6bcb77" stroke-width="1.5" opacity="0.6"/>
  <text x="280" y="275" font-size="7" fill="#6bcb77" opacity="0.5" text-anchor="middle" font-family="sans-serif">Восьмая</text>
  <!-- Sixteenth note -->
  <ellipse cx="350" cy="248" rx="10" ry="7" fill="#9b59b6" opacity="0.6"/>
  <line x1="359" y1="246" x2="359" y2="220" stroke="#9b59b6" stroke-width="1.5" opacity="0.6"/>
  <path d="M359 220 Q370 225 367 235" fill="none" stroke="#9b59b6" stroke-width="1.5" opacity="0.6"/>
  <path d="M359 228 Q370 233 367 243" fill="none" stroke="#9b59b6" stroke-width="1.5" opacity="0.6"/>
  <text x="350" y="275" font-size="7" fill="#9b59b6" opacity="0.5" text-anchor="middle" font-family="sans-serif">Шестнадцатая</text>
  <!-- Sharp/Flat/Natural signs -->
  <text x="420" y="130" font-size="20" fill="#ff6b6b" opacity="0.4" font-family="sans-serif">#</text>
  <text x="440" y="130" font-size="18" fill="#00d2ff" opacity="0.4" font-family="sans-serif">♭</text>
  <text x="460" y="130" font-size="18" fill="#6bcb77" opacity="0.4" font-family="sans-serif">♮</text>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Музыкальный язык</text>
</svg>