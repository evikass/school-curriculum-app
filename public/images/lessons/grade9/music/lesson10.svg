<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0a0a0a"/>
  <!-- Electric guitar -->
  <path d="M100 120 Q120 100 140 120 L135 160 Q120 180 100 160 Q80 180 65 160 L60 120 Q80 100 100 120" fill="#c44d3e" opacity="0.5"/>
  <rect x="90" y="60" width="10" height="65" fill="#8b5e3c" opacity="0.5"/>
  <!-- Guitar headstock -->
  <rect x="86" y="40" width="18" height="22" rx="3" fill="#1a1a2e" opacity="0.6"/>
  <circle cx="89" cy="48" r="2" fill="#ffd93d" opacity="0.4"/>
  <circle cx="89" cy="55" r="2" fill="#ffd93d" opacity="0.4"/>
  <circle cx="101" cy="48" r="2" fill="#ffd93d" opacity="0.4"/>
  <circle cx="101" cy="55" r="2" fill="#ffd93d" opacity="0.4"/>
  <!-- Guitar strings -->
  <line x1="92" y1="60" x2="92" y2="165" stroke="#c0c0c0" stroke-width="0.5" opacity="0.4"/>
  <line x1="95" y1="60" x2="95" y2="165" stroke="#c0c0c0" stroke-width="0.5" opacity="0.4"/>
  <line x1="98" y1="60" x2="98" y2="165" stroke="#c0c0c0" stroke-width="0.5" opacity="0.4"/>
  <!-- Amplifier -->
  <rect x="60" y="195" width="80" height="65" rx="3" fill="#1a1a2e" opacity="0.5"/>
  <circle cx="85" cy="220" r="12" fill="#2a2a3e" stroke="#4d96ff" stroke-width="1" opacity="0.4"/>
  <circle cx="115" cy="220" r="12" fill="#2a2a3e" stroke="#4d96ff" stroke-width="1" opacity="0.4"/>
  <rect x="75" y="245" width="50" height="5" rx="2" fill="#4d96ff" opacity="0.3"/>
  <!-- Sound waves from amp -->
  <path d="M145 220 Q155 210 150 200" fill="none" stroke="#4d96ff" stroke-width="1.5" opacity="0.3"/>
  <path d="M150 225 Q165 210 158 195" fill="none" stroke="#4d96ff" stroke-width="1" opacity="0.25"/>
  <path d="M155 230 Q175 210 165 190" fill="none" stroke="#4d96ff" stroke-width="1" opacity="0.2"/>
  <!-- Drum kit -->
  <ellipse cx="320" cy="200" rx="40" ry="15" fill="#8b0000" opacity="0.3"/>
  <ellipse cx="320" cy="195" rx="40" ry="15" fill="#c44d3e" opacity="0.15"/>
  <!-- Snare -->
  <ellipse cx="280" cy="185" rx="18" ry="7" fill="#c0c0c0" opacity="0.2"/>
  <!-- Cymbals -->
  <ellipse cx="360" cy="170" rx="20" ry="4" fill="#ffd93d" opacity="0.2"/>
  <ellipse cx="280" cy="168" rx="15" ry="3" fill="#ffd93d" opacity="0.2"/>
  <!-- Drum sticks -->
  <line x1="300" y1="160" x2="340" y2="175" stroke="#c49535" stroke-width="2" opacity="0.3"/>
  <line x1="340" y1="160" x2="300" y2="175" stroke="#c49535" stroke-width="2" opacity="0.3"/>
  <!-- Microphone -->
  <rect x="230" y="80" width="6" height="40" fill="#4a4a4a" opacity="0.4"/>
  <circle cx="233" cy="75" r="10" fill="#4a4a4a" opacity="0.4"/>
  <line x1="233" y1="85" x2="233" y2="120" stroke="#4a4a4a" stroke-width="2" opacity="0.3"/>
  <rect x="228" y="118" width="10" height="25" rx="2" fill="#4a4a4a" opacity="0.3"/>
  <!-- Singer silhouette -->
  <circle cx="233" cy="60" r="14" fill="#e8dcc8" opacity="0.2"/>
  <path d="M219 74 Q233 68 247 74 L243 120 L223 120 Z" fill="#1a1a2e" opacity="0.3"/>
  <!-- Lightning bolt (energy) -->
  <polygon points="400,50 410,90 405,90 415,130 395,85 400,85 390,50" fill="#ffd93d" opacity="0.3"/>
  <!-- Stars (rock energy) -->
  <polygon points="440,60 443,70 453,70 445,76 448,86 440,80 432,86 435,76 427,70 437,70" fill="#ff6b6b" opacity="0.3"/>
  <polygon points="470,100 472,107 479,107 473,111 475,118 470,114 465,118 467,111 461,107 468,107" fill="#ffd93d" opacity="0.25"/>
  <!-- Music notes (electric style) -->
  <ellipse cx="180" cy="130" rx="8" ry="6" fill="#ff6b6b" opacity="0.5" transform="rotate(-15,180,130)"/>
  <line x1="187" y1="128" x2="187" y2="100" stroke="#ff6b6b" stroke-width="2" opacity="0.5"/>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Рок-музыка</text>
</svg>