  <text x="265" y="245" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Фронтальная (плоская)</text>
  <text x="265" y="258" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Объёмная (трёхмерная)</text>
  <text x="265" y="271" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Глубинно-пространственная</text>
  <text x="265" y="284" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Симметричная / асимметричная</text>
