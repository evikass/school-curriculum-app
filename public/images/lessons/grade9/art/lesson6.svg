  <text x="130" y="227" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Центр композиции</text>
  <text x="25" y="245" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Композиционный центр — гл. элемент</text>
  <text x="25" y="258" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Правило третей: 9 равных частей</text>
  <text x="25" y="271" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Золотое сечение (1 : 1.618)</text>
  <text x="25" y="284" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Диагонали, линии взора</text>
  <text x="25" y="297" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Световой и цветовой акцент</text>
  <text x="25" y="310" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Контраст, изоляция, размер</text>
  <text x="25" y="323" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">• Направляющие линии</text>
  <rect x="255" y="210" width="230" height="120" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="210" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="255" y="227" width="230" height="8" fill="#AD1457"/>
