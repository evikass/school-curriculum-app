  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 6. Композиция в изобразительном искусстве</text>
  <rect x="15" y="60" width="155" height="140" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
