  <text x="25" y="98" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Целостность</text>
  <text x="25" y="111" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Подчинённость главному</text>
  <text x="25" y="124" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Пропорциональность</text>
