  <text x="265" y="310" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Открытая / замкнутая</text>
  <text x="265" y="323" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">• Диагональная / фронтальная</text>
