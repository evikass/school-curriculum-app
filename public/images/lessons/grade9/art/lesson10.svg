<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Digital art grid -->
  <g opacity="0.2">
    <line x1="0" y1="50" x2="500" y2="50" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="500" y2="100" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="500" y2="150" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="500" y2="250" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="350" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="350" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="350" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="350" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="350" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="350" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="350" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="350" stroke="#4d96ff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="350" stroke="#4d96ff" stroke-width="0.5"/>
  </g>
  <!-- Monitor/screen -->
  <rect x="60" y="50" width="180" height="130" rx="5" fill="#1a1a3e" stroke="#4d96ff" stroke-width="2" opacity="0.7"/>
  <rect x="70" y="60" width="160" height="105" fill="#0a0a14"/>
  <!-- Pixel art on screen -->
  <rect x="80" y="70" width="10" height="10" fill="#ff6b6b" opacity="0.6"/>
  <rect x="90" y="70" width="10" height="10" fill="#ffd93d" opacity="0.6"/>
  <rect x="100" y="70" width="10" height="10" fill="#6bcb77" opacity="0.6"/>
  <rect x="80" y="80" width="10" height="10" fill="#4d96ff" opacity="0.6"/>
  <rect x="90" y="80" width="10" height="10" fill="#9b59b6" opacity="0.6"/>
  <rect x="100" y="80" width="10" height="10" fill="#ff6b6b" opacity="0.6"/>
  <rect x="110" y="80" width="10" height="10" fill="#ffd93d" opacity="0.6"/>
  <!-- Digital brush cursor on screen -->
  <circle cx="180" cy="120" r="8" fill="#ff6b6b" opacity="0.4"/>
  <line x1="180" y1="112" x2="180" y2="128" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <line x1="172" y1="120" x2="188" y2="120" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
  <!-- Monitor stand -->
  <rect x="130" y="180" width="40" height="8" fill="#4d96ff" opacity="0.4"/>
  <rect x="120" y="188" width="60" height="4" rx="2" fill="#4d96ff" opacity="0.3"/>
  <!-- 3D printed object -->
  <path d="M310 120 L350 100 L390 120 L350 140 Z" fill="#6bcb77" opacity="0.3"/>
  <path d="M310 120 L310 160 L350 180 L350 140 Z" fill="#6bcb77" opacity="0.25"/>
  <path d="M390 120 L390 160 L350 180 L350 140 Z" fill="#6bcb77" opacity="0.2"/>
  <!-- Layer lines (3D printing) -->
  <line x1="315" y1="130" x2="345" y2="145" stroke="#6bcb77" stroke-width="0.5" opacity="0.4"/>
  <line x1="318" y1="140" x2="348" y2="150" stroke="#6bcb77" stroke-width="0.5" opacity="0.4"/>
  <line x1="320" y1="150" x2="348" y2="158" stroke="#6bcb77" stroke-width="0.5" opacity="0.4"/>
  <!-- Installation art -->
  <rect x="300" y="210" width="60" height="60" fill="none" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
  <circle cx="320" cy="230" r="8" fill="#ff6b6b" opacity="0.3"/>
  <circle cx="340" cy="250" r="6" fill="#ffd93d" opacity="0.3"/>
  <rect x="330" y="225" width="15" height="15" fill="#4d96ff" opacity="0.2"/>
  <!-- Neon art -->
  <path d="M60 250 Q100 220 140 250" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.6"/>
  <path d="M65 260 Q100 235 135 260" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.3"/>
  <path d="M160 240 Q200 210 240 240" fill="none" stroke="#6bcb77" stroke-width="3" opacity="0.6"/>
  <path d="M165 250 Q200 225 235 250" fill="none" stroke="#6bcb77" stroke-width="2" opacity="0.3"/>
  <!-- VR headset -->
  <rect x="400" y="50" width="60" height="35" rx="8" fill="#2a2a3e" stroke="#4d96ff" stroke-width="1.5" opacity="0.6"/>
  <circle cx="418" cy="67" r="8" fill="#4d96ff" opacity="0.15"/>
  <circle cx="442" cy="67" r="8" fill="#4d96ff" opacity="0.15"/>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Современное искусство</text>
</svg>