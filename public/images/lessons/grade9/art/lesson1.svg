  <line x1="250" y1="98" x2="250" y2="125" stroke="#555" stroke-width="3"/>
  <polygon points="247,125 253,125 250,132" fill="#FDD835"/>
  <line x1="250" y1="98" x2="250" y2="103" stroke="#E53935" stroke-width="3"/>
  <text x="185" y="148" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Виды:</text>
  <text x="185" y="162" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Рисунок, набросок</text>
  <text x="185" y="175" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Станковая графика</text>
  <text x="185" y="188" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Книжная (иллюстрация)</text>
  <text x="185" y="201" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Плакат, афиша</text>
  <text x="185" y="214" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Прикладная графика</text>
  <text x="185" y="231" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Техники:</text>
  <text x="185" y="245" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Карандаш, уголь, соус</text>
  <text x="185" y="258" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Сангина, пастель</text>
  <text x="185" y="271" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Перо, тушь, акварель</text>
  <text x="185" y="288" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Линогравюра, офорт</text>
  <text x="185" y="301" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Приёмы:</text>
  <text x="185" y="314" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Штрих, штриховка, тон</text>
  <rect x="335" y="60" width="150" height="270" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="335" y="60" width="150" height="25" fill="#EC407A" rx="8"/>
  <rect x="335" y="77" width="150" height="8" fill="#EC407A"/>
