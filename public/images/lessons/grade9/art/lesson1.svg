  <rect x="15" y="77" width="150" height="8" fill="#EC407A"/>
  <text x="90" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">🎨 Живопись</text>
  <ellipse cx="90" cy="118" rx="25" ry="18" fill="#FCE4EC" stroke="#EC407A" stroke-width="1.5"/>
  <circle cx="80" cy="112" r="3.5" fill="#E53935"/>
  <circle cx="90" cy="106" r="3.5" fill="#1E88E5"/>
  <circle cx="100" cy="112" r="3.5" fill="#FDD835"/>
  <circle cx="95" cy="124" r="3.5" fill="#43A047"/>
  <text x="25" y="148" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Виды:</text>
  <text x="25" y="162" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Станковая (картины)</text>
  <text x="25" y="175" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Монументальная (стены)</text>
  <text x="25" y="188" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Театр.-декорационная</text>
  <text x="25" y="201" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Иконопись, миниатюра</text>
  <text x="25" y="218" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Материалы:</text>
  <text x="25" y="232" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Масло, акварель, гуашь</text>
  <text x="25" y="245" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Темпера, энкаустика</text>
  <text x="25" y="258" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Акрил, аэрограф</text>
  <text x="25" y="275" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Холст, бумага, дерево</text>
  <text x="25" y="288" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Основы:</text>
  <text x="25" y="301" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Колорит, тон, мазок</text>
  <text x="25" y="314" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Светотень, рефлекс</text>
  <rect x="175" y="60" width="150" height="270" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="175" y="60" width="150" height="25" fill="#EC407A" rx="8"/>
  <rect x="175" y="77" width="150" height="8" fill="#EC407A"/>
