<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)"/>
  <!-- Eye/iris symbolizing art as cognition -->
  <ellipse cx="250" cy="150" rx="100" ry="60" fill="none" stroke="#e94560" stroke-width="2" opacity="0.8"/>
  <circle cx="250" cy="150" r="35" fill="#e94560" opacity="0.3"/>
  <circle cx="250" cy="150" r="18" fill="#1a1a2e"/>
  <circle cx="250" cy="150" r="8" fill="#e94560" opacity="0.9"/>
  <circle cx="244" cy="144" r="3" fill="white" opacity="0.7"/>
  <!-- Light rays from eye -->
  <line x1="250" y1="90" x2="250" y2="40" stroke="#ffd93d" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="110" x2="150" y2="70" stroke="#ffd93d" stroke-width="1.5" opacity="0.5"/>
  <line x1="310" y1="110" x2="350" y2="70" stroke="#ffd93d" stroke-width="1.5" opacity="0.5"/>
  <line x1="165" y1="150" x2="100" y2="150" stroke="#ffd93d" stroke-width="1.5" opacity="0.4"/>
  <line x1="335" y1="150" x2="400" y2="150" stroke="#ffd93d" stroke-width="1.5" opacity="0.4"/>
  <!-- Paint palette -->
  <ellipse cx="120" cy="250" rx="50" ry="35" fill="#4a3728" opacity="0.8" transform="rotate(-15,120,250)"/>
  <circle cx="105" cy="240" r="6" fill="#e94560"/>
  <circle cx="120" cy="232" r="6" fill="#ffd93d"/>
  <circle cx="137" cy="238" r="6" fill="#6bcb77"/>
  <circle cx="142" cy="255" r="6" fill="#4d96ff"/>
  <circle cx="120" cy="260" r="5" fill="#ff922b"/>
  <!-- Brush -->
  <line x1="155" y1="270" x2="220" y2="220" stroke="#c4a882" stroke-width="3"/>
  <rect x="220" y="215" width="35" height="8" rx="2" fill="#8b7355" transform="rotate(-30,237,219)"/>
  <rect x="250" y="210" width="15" height="10" rx="1" fill="#e94560" transform="rotate(-30,257,215)"/>
  <!-- Sculpture bust -->
  <ellipse cx="400" cy="270" rx="30" ry="8" fill="#d4c5b0" opacity="0.6"/>
  <path d="M380 270 Q385 240 400 230 Q415 240 420 270" fill="#d4c5b0" opacity="0.7"/>
  <ellipse cx="400" cy="230" rx="18" ry="22" fill="#e8dcc8" opacity="0.7"/>
  <path d="M385 225 Q400 205 415 225" fill="#e8dcc8" opacity="0.7"/>
  <!-- Musical note (temporal art) -->
  <ellipse cx="80" cy="150" rx="10" ry="7" fill="#6bcb77" opacity="0.6" transform="rotate(-20,80,150)"/>
  <line x1="89" y1="148" x2="89" y2="110" stroke="#6bcb77" stroke-width="2" opacity="0.6"/>
  <path d="M89 110 Q100 115 95 125" fill="none" stroke="#6bcb77" stroke-width="2" opacity="0.6"/>
  <!-- Glow effect -->
  <circle cx="250" cy="150" r="80" fill="url(#glow1)"/>
  <!-- Title -->
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Искусство как способ познания</text>
</svg>