  <ellipse cx="410" cy="115" rx="10" ry="13" fill="#FCE4EC" stroke="#EC407A" stroke-width="1.5"/>
  <rect x="405" y="128" width="10" height="7" fill="#FCE4EC" stroke="#EC407A" stroke-width="1"/>
  <rect x="398" y="135" width="24" height="3" fill="#EC407A" opacity="0.4" rx="1"/>
  <text x="345" y="155" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Виды:</text>
  <text x="345" y="169" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Круглая (объёмная)</text>
  <text x="345" y="182" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Рельеф (барельеф)</text>
  <text x="345" y="195" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Горельеф, контррельеф</text>
  <text x="345" y="208" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Станковая, монумент.</text>
  <text x="345" y="225" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Материалы:</text>
  <text x="345" y="239" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Глина, пластилин</text>
  <text x="345" y="252" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Мрамор, гранит, камень</text>
  <text x="345" y="265" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Дерево, кость, металл</text>
  <text x="345" y="278" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Бронза, гипс, стекло</text>
  <text x="345" y="295" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Способы:</text>
  <text x="345" y="308" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Лепка, резьба, литьё</text>
  <text x="345" y="321" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Ковка, чеканка, сборка</text>
