<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="200">
      <stop offset="0%" stop-color="#4d96ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0f0f1a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#0f0f1a"/>
  <rect width="500" height="200" fill="url(#sky4)"/>
  <!-- Parthenon -->
  <rect x="100" y="180" width="300" height="120" fill="#d4c5b0" opacity="0.6"/>
  <!-- Steps -->
  <rect x="90" y="295" width="320" height="6" rx="1" fill="#d4c5b0" opacity="0.5"/>
  <rect x="95" y="303" width="310" height="6" rx="1" fill="#d4c5b0" opacity="0.4"/>
  <rect x="100" y="311" width="300" height="6" rx="1" fill="#d4c5b0" opacity="0.3"/>
  <!-- Columns (Doric) -->
  <rect x="120" y="180" width="14" height="115" fill="#e8dcc8" opacity="0.7"/>
  <rect x="160" y="180" width="14" height="115" fill="#e8dcc8" opacity="0.7"/>
  <rect x="200" y="180" width="14" height="115" fill="#e8dcc8" opacity="0.7"/>
  <rect x="290" y="180" width="14" height="115" fill="#e8dcc8" opacity="0.7"/>
  <rect x="330" y="180" width="14" height="115" fill="#e8dcc8" opacity="0.7"/>
  <rect x="370" y="180" width="14" height="115" fill="#e8dcc8" opacity="0.7"/>
  <!-- Column fluting lines -->
  <line x1="126" y1="185" x2="126" y2="290" stroke="#c4b8a4" stroke-width="0.5" opacity="0.4"/>
  <line x1="166" y1="185" x2="166" y2="290" stroke="#c4b8a4" stroke-width="0.5" opacity="0.4"/>
  <line x1="206" y1="185" x2="206" y2="290" stroke="#c4b8a4" stroke-width="0.5" opacity="0.4"/>
  <line x1="296" y1="185" x2="296" y2="290" stroke="#c4b8a4" stroke-width="0.5" opacity="0.4"/>
  <line x1="336" y1="185" x2="336" y2="290" stroke="#c4b8a4" stroke-width="0.5" opacity="0.4"/>
  <line x1="376" y1="185" x2="376" y2="290" stroke="#c4b8a4" stroke-width="0.5" opacity="0.4"/>
  <!-- Entablature -->
  <rect x="100" y="170" width="300" height="12" fill="#e8dcc8" opacity="0.7"/>
  <!-- Pediment (triangular) -->
  <polygon points="100,170 250,100 400,170" fill="none" stroke="#e8dcc8" stroke-width="2" opacity="0.7"/>
  <polygon points="105,170 250,105 395,170" fill="#d4c5b0" opacity="0.3"/>
  <!-- Ionic capital detail -->
  <ellipse cx="70" cy="100" rx="15" ry="25" fill="none" stroke="#4d96ff" stroke-width="1.5" opacity="0.7"/>
  <path d="M55 100 Q70 85 85 100" fill="none" stroke="#4d96ff" stroke-width="2" opacity="0.7"/>
  <path d="M55 100 Q70 115 85 100" fill="none" stroke="#4d96ff" stroke-width="2" opacity="0.7"/>
  <rect x="63" y="115" width="14" height="30" fill="#4d96ff" opacity="0.3"/>
  <text x="70" y="160" font-size="7" fill="#4d96ff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Ионический</text>
  <!-- Doric capital detail -->
  <rect x="420" y="80" width="20" height="5" fill="#ff6b6b" opacity="0.5"/>
  <rect x="418" y="85" width="24" height="8" rx="2" fill="#ff6b6b" opacity="0.4"/>
  <rect x="425" y="93" width="10" height="40" fill="#ff6b6b" opacity="0.3"/>
  <text x="430" y="145" font-size="7" fill="#ff6b6b" opacity="0.5" text-anchor="middle" font-family="sans-serif">Дорический</text>
  <!-- Corinthian capital detail -->
  <path d="M55 230 Q40 210 50 200 Q60 195 65 205 Q70 195 80 200 Q90 210 75 230" fill="#6bcb77" opacity="0.4"/>
  <rect x="60" y="230" width="10" height="30" fill="#6bcb77" opacity="0.3"/>
  <text x="65" y="275" font-size="7" fill="#6bcb77" opacity="0.5" text-anchor="middle" font-family="sans-serif">Коринфский</text>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Античное искусство</text>
</svg>