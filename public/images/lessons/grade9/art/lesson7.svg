<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#EC407A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#EC407A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 7. Виды перспективы</text>
  <rect x="15" y="60" width="230" height="140" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#EC407A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#EC407A"/>
  <text x="130" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Линейная перспектива</text>
  <circle cx="130" cy="100" r="4" fill="#EC407A"/>
  <text x="145" y="103" fill="#AD1457" font-size="8" font-weight="normal" font-family="Arial,sans-serif">точка схода</text>
  <line x1="40" y1="178" x2="130" y2="100" stroke="#999" stroke-width="1"/>
  <line x1="220" y1="178" x2="130" y2="100" stroke="#999" stroke-width="1"/>
  <line x1="30" y1="152" x2="130" y2="100" stroke="#BBB" stroke-width="0.7" stroke-dasharray="3,2"/>
  <line x1="230" y1="152" x2="130" y2="100" stroke="#BBB" stroke-width="0.7" stroke-dasharray="3,2"/>
  <line x1="30" y1="178" x2="230" y2="178" stroke="#999" stroke-width="1"/>
  <rect x="115" y="110" width="30" height="22" fill="#EC407A" opacity="0.15" stroke="#EC407A" stroke-width="0.5"/>
  <rect x="95" y="128" width="70" height="50" fill="#EC407A" opacity="0.08" stroke="#EC407A" stroke-width="0.5"/>
  <text x="25" y="194" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">1 т. схода — фронтальная</text>
  <text x="25" y="186" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">2 точки — угловая</text>
  <rect x="255" y="60" width="230" height="140" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#EC407A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#EC407A"/>
  <text x="370" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Воздушная перспектива</text>
  <polygon points="265,178 290,108 315,178" fill="#5D4037" opacity="0.9"/>
  <polygon points="300,178 330,100 360,178" fill="#795548" opacity="0.6"/>
  <polygon points="340,178 375,96 410,178" fill="#90A4AE" opacity="0.4"/>
  <polygon points="390,178 425,106 460,178" fill="#B0BEC5" opacity="0.25"/>
  <text x="265" y="192" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Дальше → бледнее, синее, размытее</text>
  <text x="265" y="204" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Ближе → ярче, контрастнее, теплее</text>
  <text x="265" y="218" fill="#666" font-size="7" font-weight="normal" font-family="Arial,sans-serif">Леонардо: атмосфера рассеивает свет</text>
  <rect x="15" y="210" width="230" height="120" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="210" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="15" y="227" width="230" height="8" fill="#AD1457"/>
  <text x="130" y="227" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Обратная перспектива</text>
  <line x1="80" y1="282" x2="110" y2="254" stroke="#EC407A" stroke-width="1.5"/>
  <line x1="180" y1="282" x2="150" y2="254" stroke="#EC407A" stroke-width="1.5"/>
  <rect x="80" y="282" width="100" height="4" fill="#EC407A" opacity="0.3"/>
  <rect x="110" y="254" width="40" height="28" fill="#EC407A" opacity="0.15" stroke="#EC407A" stroke-width="0.8"/>
  <text x="130" y="300" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Расширяется к зрителю</text>
  <text x="25" y="244" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Иконопись, Византия, Русь</text>
  <text x="25" y="257" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Духовное, не натурное простр.</text>
  <text x="25" y="270" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">• Больше = ближе к Богу</text>
  <text x="25" y="323" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Типично для русской иконы</text>
  <rect x="255" y="210" width="230" height="120" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="210" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="255" y="227" width="230" height="8" fill="#AD1457"/>
  <text x="370" y="227" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Законы перспективы</text>
  <text x="265" y="245" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">1. Параллельные линии сходятся</text>
  <text x="265" y="258" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">2. Дальний → меньше размером</text>
  <text x="265" y="271" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">3. Дальний → бледнее, синее</text>
  <text x="265" y="284" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">4. Линия горизонта = уровень глаз</text>
  <text x="265" y="297" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">5. Ближе → выше контраст</text>
  <text x="265" y="310" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">6. Перекрытие: ближнее кроет</text>
  <text x="265" y="323" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">7. Тень и свет усиливают глубину</text>
</svg>