<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky5" x1="0" y1="0" x2="0" y2="350">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky5)"/>
  <!-- Gothic cathedral -->
  <rect x="170" y="100" width="160" height="220" fill="#3d3d5c" opacity="0.7"/>
  <!-- Pointed arch (main entrance) -->
  <path d="M210 320 L210 210 Q250 170 290 210 L290 320" fill="#1a1a3e" opacity="0.8"/>
  <path d="M215 320 L215 215 Q250 178 285 215 L285 320" fill="none" stroke="#6b6b9c" stroke-width="1.5" opacity="0.5"/>
  <!-- Rose window -->
  <circle cx="250" cy="155" r="25" fill="none" stroke="#9b59b6" stroke-width="2" opacity="0.6"/>
  <circle cx="250" cy="155" r="18" fill="none" stroke="#9b59b6" stroke-width="1" opacity="0.4"/>
  <circle cx="250" cy="155" r="10" fill="#9b59b6" opacity="0.15"/>
  <!-- Rose window petals -->
  <line x1="250" y1="130" x2="250" y2="180" stroke="#9b59b6" stroke-width="0.8" opacity="0.4"/>
  <line x1="225" y1="155" x2="275" y2="155" stroke="#9b59b6" stroke-width="0.8" opacity="0.4"/>
  <line x1="233" y1="138" x2="267" y2="172" stroke="#9b59b6" stroke-width="0.8" opacity="0.4"/>
  <line x1="267" y1="138" x2="233" y2="172" stroke="#9b59b6" stroke-width="0.8" opacity="0.4"/>
  <!-- Spire -->
  <polygon points="250,30 240,100 260,100" fill="#4d4d7c" opacity="0.7"/>
  <!-- Flying buttresses -->
  <path d="M170 180 Q130 170 120 200 L120 320" fill="none" stroke="#4d4d7c" stroke-width="3" opacity="0.5"/>
  <path d="M330 180 Q370 170 380 200 L380 320" fill="none" stroke="#4d4d7c" stroke-width="3" opacity="0.5"/>
  <!-- Pointed windows -->
  <path d="M180 280 L180 230 Q190 215 200 230 L200 280" fill="#4d96ff" opacity="0.15"/>
  <path d="M300 280 L300 230 Q310 215 320 230 L320 280" fill="#4d96ff" opacity="0.15"/>
  <!-- Stained glass colors in windows -->
  <rect x="183" y="245" width="14" height="8" fill="#ff6b6b" opacity="0.2"/>
  <rect x="183" y="255" width="14" height="8" fill="#ffd93d" opacity="0.2"/>
  <rect x="303" y="245" width="14" height="8" fill="#6bcb77" opacity="0.2"/>
  <rect x="303" y="255" width="14" height="8" fill="#ff922b" opacity="0.2"/>
  <!-- Small towers -->
  <rect x="165" y="90" width="20" height="230" fill="#3d3d5c" opacity="0.6"/>
  <polygon points="175,60 165,90 185,90" fill="#4d4d7c" opacity="0.7"/>
  <rect x="315" y="90" width="20" height="230" fill="#3d3d5c" opacity="0.6"/>
  <polygon points="325,60 315,90 335,90" fill="#4d4d7c" opacity="0.7"/>
  <!-- Cross on spire -->
  <line x1="250" y1="20" x2="250" y2="35" stroke="#ffd93d" stroke-width="2" opacity="0.6"/>
  <line x1="244" y1="27" x2="256" y2="27" stroke="#ffd93d" stroke-width="2" opacity="0.6"/>
  <!-- Romanesque arch comparison -->
  <path d="M20 280 Q55 240 90 280" fill="none" stroke="#c49535" stroke-width="2" opacity="0.5"/>
  <line x1="20" y1="280" x2="20" y2="260" stroke="#c49535" stroke-width="2" opacity="0.5"/>
  <line x1="90" y1="280" x2="90" y2="260" stroke="#c49535" stroke-width="2" opacity="0.5"/>
  <text x="55" y="295" font-size="7" fill="#c49535" opacity="0.5" text-anchor="middle" font-family="sans-serif">Романская</text>
  <!-- Gothic arch comparison -->
  <path d="M410 280 Q450 230 490 280" fill="none" stroke="#9b59b6" stroke-width="2" opacity="0.5"/>
  <line x1="410" y1="280" x2="410" y2="255" stroke="#9b59b6" stroke-width="2" opacity="0.5"/>
  <line x1="490" y1="280" x2="490" y2="255" stroke="#9b59b6" stroke-width="2" opacity="0.5"/>
  <text x="450" y="295" font-size="7" fill="#9b59b6" opacity="0.5" text-anchor="middle" font-family="sans-serif">Готическая</text>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Средневековое искусство</text>
</svg>