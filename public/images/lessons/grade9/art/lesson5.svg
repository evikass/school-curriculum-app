<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#EC407A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#EC407A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 5. Импрессионизм и постимпрессионизм</text>
  <rect x="15" y="60" width="230" height="138" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#EC407A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#EC407A"/>
  <text x="130" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Импрессионизм</text>
  <line x1="30" y1="98" x2="58" y2="96" stroke="#1E88E5" stroke-width="4" opacity="0.6"/>
  <line x1="35" y1="104" x2="63" y2="102" stroke="#FDD835" stroke-width="3" opacity="0.6"/>
  <line x1="32" y1="110" x2="60" y2="108" stroke="#E53935" stroke-width="3" opacity="0.6"/>
  <text x="75" y="100" fill="#333" font-size="9" font-weight="bold" font-family="Arial,sans-serif">К. Моне</text>
  <text x="75" y="112" fill="#666" font-size="7" font-weight="normal" font-family="Arial,sans-serif">«Впечатление. Восход солнца»</text>
  <text x="25" y="128" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• К. Писсарро, О. Ренуар</text>
  <text x="25" y="141" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Э. Дега, Б. Моризо</text>
  <text x="25" y="157" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Особенности:</text>
  <text x="25" y="170" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Схватить мгновение света</text>
  <text x="25" y="183" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Чистый цвет, раздельные мазки</text>
  <text x="25" y="196" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Работа на пленэре</text>
  <rect x="255" y="60" width="230" height="138" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#EC407A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#EC407A"/>
  <text x="370" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Постимпрессионизм</text>
  <text x="265" y="95" fill="#333" font-size="9" font-weight="bold" font-family="Arial,sans-serif">В. Ван Гог</text>
  <text x="265" y="108" fill="#666" font-size="7" font-weight="normal" font-family="Arial,sans-serif">«Звёздная ночь», спир. мазки</text>
  <text x="265" y="124" fill="#333" font-size="9" font-weight="bold" font-family="Arial,sans-serif">П. Сезанн</text>
  <text x="265" y="137" fill="#666" font-size="7" font-weight="normal" font-family="Arial,sans-serif">Геометрия форм, «Гора Сент-Виктуар»</text>
  <text x="265" y="153" fill="#333" font-size="9" font-weight="bold" font-family="Arial,sans-serif">П. Гоген</text>
  <text x="265" y="166" fill="#666" font-size="7" font-weight="normal" font-family="Arial,sans-serif">Синтетизм, Таити, плоскостн.</text>
  <text x="265" y="182" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Ж. Сёра — пуантилизм (точки)</text>
  <text x="265" y="195" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">А. Тулуз-Лотрек — афиши</text>
  <rect x="15" y="208" width="230" height="122" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="208" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="15" y="225" width="230" height="8" fill="#AD1457"/>
  <text x="130" y="225" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Свет и цвет</text>
  <text x="25" y="243" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Пленэр — работа на открытом воздухе</text>
  <text x="25" y="256" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Цветные тени (а не серые!)</text>
  <text x="25" y="269" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Оптическое смешение цвета</text>
  <text x="25" y="282" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Движение мазка = эмоция</text>
  <text x="25" y="295" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Отказ от чёрного цвета</text>
  <text x="25" y="308" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Этюд важнее картины</text>
  <text x="25" y="321" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Белила — главная краска</text>
  <rect x="255" y="208" width="230" height="122" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="208" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="255" y="225" width="230" height="8" fill="#AD1457"/>
  <text x="370" y="225" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Хронология и влияние</text>
  <text x="265" y="243" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">1874 — 1-я выставка импрессионистов</text>
  <text x="265" y="256" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">1886 — последняя выставка</text>
  <text x="265" y="269" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">1886–1905 — постимпрессионизм</text>
  <text x="265" y="285" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Влияние:</text>
  <text x="265" y="298" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">→ Фовизм, кубизм, экспрессионизм</text>
  <text x="265" y="311" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">→ Абстракция, модернизм</text>
  <text x="265" y="324" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">→ Современная живопись</text>
</svg>