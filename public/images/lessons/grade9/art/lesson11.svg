<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#EC407A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#EC407A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 11. Цифровое искусство</text>
  <rect x="15" y="60" width="230" height="135" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#EC407A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#EC407A"/>
  <text x="130" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Инструменты цифрового художника</text>
  <rect x="30" y="93" width="55" height="38" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" rx="4"/>
  <rect x="35" y="97" width="45" height="24" fill="#BBDEFB" rx="2"/>
  <line x1="43" y1="107" x2="68" y2="112" stroke="#1565C0" stroke-width="1.5"/>
  <text x="95" y="103" fill="#333" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Графический планшет</text>
  <text x="95" y="115" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Wacom, XP-Pen, Huion</text>
  <text x="25" y="145" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Перо, дисплей, тайп-кавер</text>
  <text x="25" y="158" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Слои, маски, фильтры</text>
  <text x="25" y="171" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Векторная и растровая графика</text>
  <text x="25" y="184" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• 3D-моделирование, анимация</text>
  <rect x="255" y="60" width="230" height="135" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#EC407A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#EC407A"/>
  <text x="370" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Программы</text>
  <text x="265" y="95" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Растровые:</text>
  <text x="265" y="108" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Photoshop, Procreate, Krita</text>
  <text x="265" y="121" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Clip Studio Paint, GIMP</text>
  <text x="265" y="137" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Векторные:</text>
  <text x="265" y="150" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Illustrator, Inkscape, Figma</text>
  <text x="265" y="166" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">3D и анимация:</text>
  <text x="265" y="179" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Blender, Maya, After Effects</text>
  <text x="265" y="195" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">ИИ-генерация:</text>
  <text x="265" y="192" fill="#333" font-size="8" font-weight="normal" font-family="Arial,sans-serif">• Midjourney, DALL-E, Stable Diff.</text>
  <rect x="15" y="205" width="230" height="125" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="205" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="15" y="222" width="230" height="8" fill="#AD1457"/>
  <text x="130" y="222" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">NFT и новые медиа</text>
  <text x="25" y="240" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• NFT — невзаимозаменяемый токен</text>
  <text x="25" y="253" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Блокчейн — подтверждение прав</text>
  <text x="25" y="266" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Генеративное искусство</text>
  <text x="25" y="279" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• ИИ-искусство (Midjourney, DALL-E)</text>
  <text x="25" y="292" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• AR/VR — дополн. реальность</text>
  <text x="25" y="305" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Интерактивные инсталляции</text>
  <text x="25" y="318" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">• Нейросети и креативность</text>
  <rect x="255" y="205" width="230" height="125" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="205" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="255" y="222" width="230" height="8" fill="#AD1457"/>
  <text x="370" y="222" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Виды цифрового искусства</text>
  <text x="265" y="240" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Диджитал-иллюстрация</text>
  <text x="265" y="253" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Пиксель-арт, вектор-арт</text>
  <text x="265" y="266" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• 3D-визуализация, рендеринг</text>
  <text x="265" y="279" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Моушн-дизайн, анимация</text>
  <text x="265" y="292" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Гейм-арт, концепт-арт</text>
  <text x="265" y="305" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Кибер-искусство, нет-арт</text>
  <text x="265" y="318" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">• Фотографии и коллажи</text>
</svg>