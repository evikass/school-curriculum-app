  <rect x="15" y="205" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="15" y="222" width="230" height="8" fill="#AD1457"/>
  <text x="130" y="222" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Материалы и техники</text>
  <text x="25" y="240" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Дерево — резьба, роспись</text>
  <text x="25" y="253" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Глина — лепка, обжиг</text>
  <text x="25" y="266" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Металл — чеканка, ковка, литьё</text>
  <text x="25" y="279" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Ткань — вышивка, ткачество</text>
  <text x="25" y="292" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Береста — плетение, тиснение</text>
  <text x="25" y="305" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Кость — резьба, гравировка</text>
  <text x="25" y="318" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Стекло — выдувание, роспись</text>
  <rect x="255" y="205" width="230" height="125" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="205" width="230" height="25" fill="#AD1457" rx="8"/>
  <rect x="255" y="222" width="230" height="8" fill="#AD1457"/>
  <text x="370" y="222" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Символы и традиции</text>
  <text x="265" y="240" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Орнамент — оберег, символ</text>
  <text x="265" y="253" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Солярные знаки ☀, конь 🐴</text>
  <text x="265" y="266" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Цветовая символика</text>
  <text x="265" y="279" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Передача мастерства из пок.</text>
  <text x="265" y="292" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Связь с природой и циклами</text>
  <text x="265" y="305" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Ритуальное и магическое назн.</text>
  <text x="265" y="318" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Каждая вещь уникальна</text>
