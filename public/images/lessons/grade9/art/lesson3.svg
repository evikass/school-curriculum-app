  <text x="370" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Традиционные ремёсла</text>
  <text x="265" y="95" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Палех — лаковая миниатюра</text>
  <text x="265" y="108" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Федоскино — масляная мин.</text>
  <text x="265" y="121" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Жостово — подносы, букеты</text>
  <text x="265" y="134" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Городец — конь-качалка</text>
  <text x="265" y="147" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Вологодское кружево</text>
  <text x="265" y="160" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Тульский самовар</text>
  <text x="265" y="173" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Матрёшка (Сергиев Посад)</text>
  <text x="265" y="186" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">• Береста, резьба по кости</text>
