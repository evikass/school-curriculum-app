<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0d1527"/>
  <!-- Russian church with onion domes -->
  <rect x="150" y="150" width="100" height="130" fill="#c44d3e" opacity="0.5"/>
  <!-- Onion dome 1 (center, large) -->
  <path d="M185 150 Q185 110 200 90 Q215 110 215 150" fill="#ffd93d" opacity="0.6"/>
  <path d="M200 90 L200 70" stroke="#ffd93d" stroke-width="2" opacity="0.6"/>
  <path d="M195 72 L200 65 L205 72" fill="#ffd93d" opacity="0.6"/>
  <!-- Onion dome 2 (left) -->
  <path d="M160 150 Q160 125 170 110 Q180 125 180 150" fill="#ffd93d" opacity="0.5"/>
  <path d="M170 110 L170 98" stroke="#ffd93d" stroke-width="1.5" opacity="0.5"/>
  <path d="M167 100 L170 95 L173 100" fill="#ffd93d" opacity="0.5"/>
  <!-- Onion dome 3 (right) -->
  <path d="M220 150 Q220 125 230 110 Q240 125 240 150" fill="#ffd93d" opacity="0.5"/>
  <path d="M230 110 L230 98" stroke="#ffd93d" stroke-width="1.5" opacity="0.5"/>
  <path d="M227 100 L230 95 L233 100" fill="#ffd93d" opacity="0.5"/>
  <!-- Church windows -->
  <rect x="180" y="200" width="15" height="20" rx="7" fill="#ffd93d" opacity="0.2"/>
  <rect x="205" y="200" width="15" height="20" rx="7" fill="#ffd93d" opacity="0.2"/>
  <!-- Church door -->
  <rect x="190" y="250" width="20" height="30" rx="10" fill="#1a0a3e" opacity="0.5"/>
  <!-- Birch trees (Russian landscape) -->
  <rect x="50" y="100" width="6" height="180" fill="#e8dcc8" opacity="0.6"/>
  <rect x="55" y="100" width="3" height="180" fill="#1a1a2e" opacity="0.3"/>
  <rect x="70" y="130" width="6" height="150" fill="#e8dcc8" opacity="0.5"/>
  <rect x="75" y="130" width="3" height="150" fill="#1a1a2e" opacity="0.3"/>
  <!-- Birch leaves -->
  <circle cx="53" cy="100" r="15" fill="#6bcb77" opacity="0.3"/>
  <circle cx="45" cy="110" r="12" fill="#6bcb77" opacity="0.25"/>
  <circle cx="73" cy="130" r="12" fill="#6bcb77" opacity="0.25"/>
  <!-- Troika (three horses) -->
  <ellipse cx="380" cy="260" rx="15" ry="10" fill="#e8dcc8" opacity="0.4"/>
  <ellipse cx="405" cy="255" rx="12" ry="8" fill="#e8dcc8" opacity="0.4"/>
  <ellipse cx="425" cy="260" rx="15" ry="10" fill="#e8dcc8" opacity="0.4"/>
  <!-- Horse legs -->
  <line x1="375" y1="270" x2="370" y2="285" stroke="#e8dcc8" stroke-width="1.5" opacity="0.3"/>
  <line x1="385" y1="270" x2="390" y2="285" stroke="#e8dcc8" stroke-width="1.5" opacity="0.3"/>
  <line x1="420" y1="270" x2="415" y2="285" stroke="#e8dcc8" stroke-width="1.5" opacity="0.3"/>
  <line x1="430" y1="270" x2="435" y2="285" stroke="#e8dcc8" stroke-width="1.5" opacity="0.3"/>
  <!-- Sleigh -->
  <path d="M360 280 L450 280 L445 290 L355 290 Z" fill="#c44d3e" opacity="0.3"/>
  <!-- Samovar -->
  <ellipse cx="330" cy="200" rx="18" ry="15" fill="#c49535" opacity="0.4"/>
  <rect x="322" y="185" width="16" height="5" rx="2" fill="#c49535" opacity="0.4"/>
  <path d="M330 185 Q330 170 335 165" fill="none" stroke="#c49535" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="348" cy="198" rx="5" ry="8" fill="#c49535" opacity="0.3"/>
  <!-- Balalaika -->
  <path d="M440 120 Q460 100 450 80" fill="none" stroke="#8b5e3c" stroke-width="2" opacity="0.5"/>
  <polygon points="445,125 435,155 455,155" fill="#8b5e3c" opacity="0.4"/>
  <line x1="445" y1="125" x2="445" y2="155" stroke="#ffd93d" stroke-width="0.5" opacity="0.3"/>
  <text x="250" y="340" font-size="9" fill="#ffffff" opacity="0.5" text-anchor="middle" font-family="sans-serif">Русское искусство 18-19 вв</text>
</svg>