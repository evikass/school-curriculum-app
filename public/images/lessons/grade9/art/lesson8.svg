<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#EC407A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#EC407A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 8. Основы теории цвета</text>
  <circle cx="130" cy="175" r="78" fill="none" stroke="#DDD" stroke-width="1"/>
  <circle cx="130" cy="110" r="22" fill="#E53935" stroke="#FFF" stroke-width="2"/>
  <text x="130" y="114" fill="#FFF" font-size="8" font-weight="bold" font-family="Arial,sans-serif">К</text>
  <circle cx="74" cy="208" r="22" fill="#1E88E5" stroke="#FFF" stroke-width="2"/>
  <text x="74" y="212" fill="#FFF" font-size="8" font-weight="bold" font-family="Arial,sans-serif">С</text>
  <circle cx="186" cy="208" r="22" fill="#FDD835" stroke="#FFF" stroke-width="2"/>
  <text x="186" y="212" fill="#333" font-size="8" font-weight="bold" font-family="Arial,sans-serif">Ж</text>
  <circle cx="94" cy="150" r="16" fill="#E040FB" stroke="#FFF" stroke-width="1.5"/>
  <text x="94" y="153" fill="#FFF" font-size="7" font-weight="normal" font-family="Arial,sans-serif">Ф</text>
  <circle cx="166" cy="150" r="16" fill="#FF9800" stroke="#FFF" stroke-width="1.5"/>
  <text x="166" y="153" fill="#FFF" font-size="7" font-weight="normal" font-family="Arial,sans-serif">О</text>
  <circle cx="130" cy="222" r="16" fill="#43A047" stroke="#FFF" stroke-width="1.5"/>
  <text x="130" y="225" fill="#FFF" font-size="7" font-weight="normal" font-family="Arial,sans-serif">З</text>
  <text x="130" y="260" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Цветовой круг</text>
  <text x="130" y="273" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">К-красный С-синий Ж-жёлтый</text>
  <text x="130" y="286" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Ф-фиолет. О-оранж. З-зелёный</text>
  <text x="130" y="302" fill="#AD1457" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Основные = К + С + Ж</text>
  <text x="130" y="315" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Вторичные = К+Ж, К+С, С+Ж</text>
  <rect x="250" y="60" width="235" height="135" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="250" y="60" width="235" height="25" fill="#EC407A" rx="8"/>
  <rect x="250" y="77" width="235" height="8" fill="#EC407A"/>
  <text x="367" y="77" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Свойства цвета</text>
  <text x="260" y="98" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Цветовой тон (оттенок)</text>
  <text x="260" y="111" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">— название: красный, синий...</text>
  <text x="260" y="127" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Насыщенность</text>
  <text x="260" y="140" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">— чистота, интенсивность цвета</text>
  <text x="260" y="156" fill="#AD1457" font-size="10" font-weight="bold" font-family="Arial,sans-serif">Светлота (яркость)</text>
  <text x="260" y="169" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">— светлее/темнее (белила/чёрн.)</text>
  <text x="260" y="185" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Ахроматические: чёрный → серый → белый</text>
  <rect x="250" y="205" width="235" height="125" fill="#FFF" stroke="#EC407A" stroke-width="1.5" rx="8"/>
  <rect x="250" y="205" width="235" height="25" fill="#AD1457" rx="8"/>
  <rect x="250" y="222" width="235" height="8" fill="#AD1457"/>
  <text x="367" y="222" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Дополнительные цвета</text>
  <rect x="265" y="240" width="22" height="14" fill="#E53935" rx="3"/>
  <text x="293" y="251" fill="#333" font-size="8" font-weight="normal" font-family="Arial,sans-serif">←→</text>
  <rect x="313" y="240" width="22" height="14" fill="#43A047" rx="3"/>
  <text x="345" y="251" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Красн. — Зелён.</text>
  <rect x="265" y="260" width="22" height="14" fill="#1E88E5" rx="3"/>
  <text x="293" y="271" fill="#333" font-size="8" font-weight="normal" font-family="Arial,sans-serif">←→</text>
  <rect x="313" y="260" width="22" height="14" fill="#FF9800" rx="3"/>
  <text x="345" y="271" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Синий — Оранж.</text>
  <rect x="265" y="280" width="22" height="14" fill="#FDD835" rx="3"/>
  <text x="293" y="291" fill="#333" font-size="8" font-weight="normal" font-family="Arial,sans-serif">←→</text>
  <rect x="313" y="280" width="22" height="14" fill="#E040FB" rx="3"/>
  <text x="345" y="291" fill="#333" font-size="9" font-weight="normal" font-family="Arial,sans-serif">Жёлт. — Фиолет.</text>
  <text x="260" y="315" fill="#666" font-size="8" font-weight="normal" font-family="Arial,sans-serif">Смешение = серый (ахроматич.)</text>
</svg>