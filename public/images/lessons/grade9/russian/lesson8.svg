<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF9A9A"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#EF5350" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#EF5350" stroke-width="1" opacity="0.3"/>
  <!-- Corner decorations -->
  <polygon points="10,10 30,10 10,30" fill="#EF5350" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#C62828" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#EF5350" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#C62828" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#EF5350" text-anchor="middle">Итоговое повторение: синтаксис и пунктуация</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Русский язык &#8212; Урок 8</text>
  <line x1="30" y1="70" x2="470" y2="70" stroke="#EF5350" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="67" width="60" height="5" fill="#EF5350" opacity="0.18" rx="1"/>
  <rect x="410" y="67" width="60" height="5" fill="#C62828" opacity="0.12" rx="1"/>

  <!-- Illustration area -->
  <rect x="15" y="76" width="470" height="222" rx="6" fill="#FFEBEE" opacity="0.4"/>

  <!-- Overview header -->
  <rect x="22" y="82" width="456" height="28" rx="5" fill="#EF5350" opacity="0.15"/>
  <text x="250" y="101" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#C62828" text-anchor="middle">Сводная таблица: типы сложных предложений и знаки препинания</text>

  <!-- Table header -->
  <rect x="22" y="114" width="110" height="20" rx="3" fill="#EF5350" opacity="0.85"/>
  <text x="77" y="128" font-family="Arial,sans-serif" font-size="9.5" font-weight="bold" fill="white" text-anchor="middle">Тип предложения</text>
  <rect x="134" y="114" width="120" height="20" rx="3" fill="#EF5350" opacity="0.75"/>
  <text x="194" y="128" font-family="Arial,sans-serif" font-size="9.5" font-weight="bold" fill="white" text-anchor="middle">Связь / Союз</text>
  <rect x="256" y="114" width="105" height="20" rx="3" fill="#EF5350" opacity="0.65"/>
  <text x="308" y="128" font-family="Arial,sans-serif" font-size="9.5" font-weight="bold" fill="white" text-anchor="middle">Знак препинания</text>
  <rect x="363" y="114" width="115" height="20" rx="3" fill="#EF5350" opacity="0.55"/>
  <text x="420" y="128" font-family="Arial,sans-serif" font-size="9.5" font-weight="bold" fill="white" text-anchor="middle">Пример</text>

  <!-- Row 1: ССП -->
  <rect x="22" y="136" width="110" height="22" rx="2" fill="#E65100" opacity="0.1"/>
  <text x="77" y="151" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">ССП</text>
  <rect x="134" y="136" width="120" height="22" rx="2" fill="white" opacity="0.6"/>
  <text x="194" y="151" font-family="Arial,sans-serif" font-size="8.5" fill="#333" text-anchor="middle">и, а, но, или, либо</text>
  <rect x="256" y="136" width="105" height="22" rx="2" fill="white" opacity="0.6"/>
  <text x="308" y="151" font-family="Arial,sans-serif" font-size="8.5" fill="#333" text-anchor="middle">, перед союзом</text>
  <rect x="363" y="136" width="115" height="22" rx="2" fill="white" opacity="0.6"/>
  <text x="420" y="151" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Шёл дождь, и дул ветер</text>

  <!-- Row 2: СПП -->
  <rect x="22" y="160" width="110" height="22" rx="2" fill="#7B1FA2" opacity="0.1"/>
  <text x="77" y="175" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" text-anchor="middle" font-weight="bold">СПП</text>
  <rect x="134" y="160" width="120" height="22" rx="2" fill="white" opacity="0.6"/>
  <text x="194" y="175" font-family="Arial,sans-serif" font-size="8.5" fill="#333" text-anchor="middle">что, чтобы, если, когда</text>
  <rect x="256" y="160" width="105" height="22" rx="2" fill="white" opacity="0.6"/>
  <text x="308" y="175" font-family="Arial,sans-serif" font-size="8.5" fill="#333" text-anchor="middle">, выделение придат.</text>
  <rect x="363" y="160" width="115" height="22" rx="2" fill="white" opacity="0.6"/>
  <text x="420" y="175" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Я знаю, что он прав</text>

  <!-- Row 3: БСП -->
  <rect x="22" y="184" width="110" height="22" rx="2" fill="#1565C0" opacity="0.1"/>
  <text x="77" y="199" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">БСП</text>
  <rect x="134" y="184" width="120" height="22" rx="2" fill="white" opacity="0.6"/>
  <text x="194" y="199" font-family="Arial,sans-serif" font-size="8.5" fill="#333" text-anchor="middle">без союзов</text>
  <rect x="256" y="184" width="105" height="22" rx="2" fill="white" opacity="0.6"/>
  <text x="308" y="199" font-family="Arial,sans-serif" font-size="8.5" fill="#333" text-anchor="middle">, ; &#8212; :</text>
  <rect x="363" y="184" width="115" height="22" rx="2" fill="white" opacity="0.6"/>
  <text x="420" y="199" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Лес шумел: шёл дождь</text>

  <!-- Key punctuation rules -->
  <rect x="22" y="212" width="225" height="84" rx="5" fill="white" opacity="0.92" stroke="#EF5350" stroke-width="0.8"/>
  <text x="134" y="230" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#EF5350" text-anchor="middle">Ключевые правила:</text>
  <line x1="32" y1="235" x2="237" y2="235" stroke="#EF5350" stroke-width="0.4" opacity="0.4"/>
  <text x="32" y="250" font-family="Arial,sans-serif" font-size="9" fill="#333">1. Определить тип предложения</text>
  <text x="32" y="263" font-family="Arial,sans-serif" font-size="9" fill="#333">2. Найти грамматические основы</text>
  <text x="32" y="276" font-family="Arial,sans-serif" font-size="9" fill="#333">3. Определить вид связи</text>
  <text x="32" y="289" font-family="Arial,sans-serif" font-size="9" fill="#333">4. Применить правило пунктуации</text>

  <!-- Common mistakes -->
  <rect x="253" y="212" width="225" height="84" rx="5" fill="white" opacity="0.92" stroke="#C62828" stroke-width="0.8"/>
  <text x="365" y="230" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Типичные ошибки:</text>
  <line x1="263" y1="235" x2="468" y2="235" stroke="#C62828" stroke-width="0.4" opacity="0.4"/>
  <text x="263" y="250" font-family="Arial,sans-serif" font-size="9" fill="#333">&#10060; ССП без запятой перед И</text>
  <text x="263" y="263" font-family="Arial,sans-serif" font-size="9" fill="#333">&#10060; СПП: запятая не на месте</text>
  <text x="263" y="276" font-family="Arial,sans-serif" font-size="9" fill="#333">&#10060; БСП: неверный знак (;/&#8212;/:)</text>
  <text x="263" y="289" font-family="Arial,sans-serif" font-size="9" fill="#333">&#10060; Смешение типов связи</text>

  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#EF5350" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#EF5350" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык &#8212; 9 класс</text>
</svg>