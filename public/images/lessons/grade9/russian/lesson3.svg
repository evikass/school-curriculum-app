<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg3)"/>
  <!-- Two sections: противительные and разделительные -->
  <rect x="20" y="20" width="225" height="30" rx="5" fill="#e94560"/>
  <text x="132" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Противительные</text>
  <rect x="255" y="20" width="225" height="30" rx="5" fill="#0f3460"/>
  <text x="367" y="42" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Разделительные</text>
  <!-- Opposition arrows -->
  <rect x="20" y="60" width="100" height="50" rx="8" fill="#533483" opacity="0.85"/>
  <text x="70" y="90" text-anchor="middle" fill="white" font-size="11">Было готово</text>
  <text x="132" y="90" text-anchor="middle" fill="#e94560" font-size="16" font-weight="bold">А</text>
  <rect x="160" y="60" width="85" height="50" rx="8" fill="#533483" opacity="0.85"/>
  <text x="202" y="90" text-anchor="middle" fill="white" font-size="11">Не началось</text>
  <!-- Alternating arrows -->
  <rect x="255" y="60" width="85" height="50" rx="8" fill="#0f3460" opacity="0.9"/>
  <text x="297" y="83" text-anchor="middle" fill="white" font-size="10">Солнце</text>
  <text x="297" y="97" text-anchor="middle" fill="white" font-size="10">светит</text>
  <text x="367" y="90" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="bold">ТО...ТО</text>
  <rect x="400" y="60" width="80" height="50" rx="8" fill="#0f3460" opacity="0.9"/>
  <text x="440" y="83" text-anchor="middle" fill="white" font-size="10">Дождь</text>
  <text x="440" y="97" text-anchor="middle" fill="white" font-size="10">идёт</text>
  <!-- Union lists -->
  <rect x="20" y="125" width="225" height="90" rx="8" fill="#16213e" stroke="#e94560" stroke-width="1"/>
  <text x="132" y="150" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">Противопоставление</text>
  <text x="132" y="172" text-anchor="middle" fill="white" font-size="11">а, но, да (= но)</text>
  <text x="132" y="192" text-anchor="middle" fill="white" font-size="11">однако, же</text>
  <text x="132" y="208" text-anchor="middle" fill="#e94560" font-size="9">Запятая перед «но» — ВСЕГДА!</text>
  <rect x="255" y="125" width="225" height="90" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="1"/>
  <text x="367" y="150" text-anchor="middle" fill="#4fc3f7" font-size="12" font-weight="bold">Взаимоисключение</text>
  <text x="367" y="172" text-anchor="middle" fill="white" font-size="11">или, либо</text>
  <text x="367" y="192" text-anchor="middle" fill="#4fc3f7" font-size="12" font-weight="bold">Чередование</text>
  <text x="367" y="210" text-anchor="middle" fill="white" font-size="11">то — то, не то — не то</text>
  <!-- Punctuation note -->
  <rect x="30" y="230" width="440" height="85" rx="8" fill="#0f3460" opacity="0.8"/>
  <text x="250" y="255" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">Правило пунктуации</text>
  <text x="250" y="278" text-anchor="middle" fill="white" font-size="11">При повторяющихся союзах запятая ставится</text>
  <text x="250" y="296" text-anchor="middle" fill="white" font-size="11">перед КАЖДОЙ частью:</text>
  <text x="250" y="316" text-anchor="middle" fill="#e8e8e8" font-size="11" font-style="italic">То дождь, то снег, то солнце.</text>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="9" opacity="0.5">Противительные и разделительные союзы</text>
</svg>