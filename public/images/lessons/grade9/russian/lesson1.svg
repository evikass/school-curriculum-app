<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)"/>
  <!-- Two boxes connected = two clauses -->
  <rect x="30" y="60" width="180" height="80" rx="10" fill="url(#g1)" opacity="0.9"/>
  <text x="120" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Главная часть</text>
  <text x="120" y="118" text-anchor="middle" fill="white" font-size="11">Подлежащее + сказуемое</text>
  <rect x="290" y="60" width="180" height="80" rx="10" fill="#0f3460" opacity="0.9"/>
  <text x="380" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Зависимая часть</text>
  <text x="380" y="118" text-anchor="middle" fill="white" font-size="11">Придаточное</text>
  <!-- Connection arrows -->
  <line x1="210" y1="100" x2="290" y2="100" stroke="#e94560" stroke-width="3" marker-end="url(#arrow1)"/>
  <defs><marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/></marker></defs>
  <!-- Three types of connection -->
  <rect x="30" y="180" width="140" height="60" rx="8" fill="#533483" opacity="0.85"/>
  <text x="100" y="205" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Сочинительная</text>
  <text x="100" y="225" text-anchor="middle" fill="white" font-size="10">и, а, но</text>
  <rect x="180" y="180" width="140" height="60" rx="8" fill="#e94560" opacity="0.85"/>
  <text x="250" y="205" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Подчинительная</text>
  <text x="250" y="225" text-anchor="middle" fill="white" font-size="10">что, если, когда</text>
  <rect x="330" y="180" width="140" height="60" rx="8" fill="#0f3460" opacity="0.85"/>
  <text x="400" y="205" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Бессоюзная</text>
  <text x="400" y="225" text-anchor="middle" fill="white" font-size="10">Интонация</text>
  <!-- Example sentence -->
  <rect x="30" y="270" width="440" height="50" rx="8" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="250" y="293" text-anchor="middle" fill="#e8e8e8" font-size="12" font-style="italic">Солнце село, и стало прохладно.</text>
  <text x="250" y="310" text-anchor="middle" fill="#e94560" font-size="10">ССП с соединительным союзом</text>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="9" opacity="0.5">Сложное предложение</text>
</svg>