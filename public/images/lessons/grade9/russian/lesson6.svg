<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF9A9A"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#EF5350" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#EF5350" stroke-width="1" opacity="0.3"/>
  <!-- Corner decorations -->
  <polygon points="10,10 30,10 10,30" fill="#EF5350" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#C62828" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#EF5350" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#C62828" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#EF5350" text-anchor="middle">Бессоюзное сложное предложение</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Русский язык &#8212; Урок 6</text>
  <line x1="30" y1="70" x2="470" y2="70" stroke="#EF5350" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="67" width="60" height="5" fill="#EF5350" opacity="0.18" rx="1"/>
  <rect x="410" y="67" width="60" height="5" fill="#C62828" opacity="0.12" rx="1"/>

  <!-- Illustration area -->
  <rect x="15" y="76" width="470" height="222" rx="6" fill="#FFEBEE" opacity="0.4"/>

  <!-- Definition -->
  <rect x="22" y="82" width="456" height="30" rx="5" fill="white" opacity="0.92" stroke="#EF5350" stroke-width="1"/>
  <text x="250" y="102" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#EF5350" text-anchor="middle">БСП &#8212; части связаны только интонацией, без союзов и союзных слов</text>

  <!-- Punctuation rules - 4 cases -->
  <!-- Case 1: Comma -->
  <rect x="22" y="118" width="228" height="55" rx="5" fill="white" opacity="0.92" stroke="#1565C0" stroke-width="1.2"/>
  <circle cx="40" cy="134" r="10" fill="#1565C0" opacity="0.9"/>
  <text x="40" y="138" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">,</text>
  <text x="60" y="138" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0">Запятая</text>
  <text x="32" y="154" font-family="Arial,sans-serif" font-size="9" fill="#333">Одновременность, перечисление:</text>
  <text x="32" y="167" font-family="Arial,sans-serif" font-size="8.5" fill="#555">Лес шумел, дождь лил, ветер крепчал.</text>

  <!-- Case 2: Semicolon -->
  <rect x="260" y="118" width="218" height="55" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1.2"/>
  <circle cx="278" cy="134" r="10" fill="#2E7D32" opacity="0.9"/>
  <text x="278" y="138" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">;</text>
  <text x="298" y="138" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">Точка с запятой</text>
  <text x="270" y="154" font-family="Arial,sans-serif" font-size="9" fill="#333">Более самостоятельные части:</text>
  <text x="270" y="167" font-family="Arial,sans-serif" font-size="8.5" fill="#555">Вдали лес; ближе &#8212; поле; у ног &#8212; ручей.</text>

  <!-- Case 3: Dash -->
  <rect x="22" y="180" width="228" height="72" rx="5" fill="white" opacity="0.92" stroke="#E65100" stroke-width="1.2"/>
  <circle cx="40" cy="196" r="10" fill="#E65100" opacity="0.9"/>
  <text x="40" y="200" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">&#8212;</text>
  <text x="60" y="200" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100">Тире</text>
  <text x="32" y="215" font-family="Arial,sans-serif" font-size="9" fill="#333">&#8226; Противопоставление (= а, но)</text>
  <text x="32" y="228" font-family="Arial,sans-serif" font-size="9" fill="#333">&#8226; Время, условие (= когда, если)</text>
  <text x="32" y="241" font-family="Arial,sans-serif" font-size="9" fill="#333">&#8226; Следствие (= так что)</text>
  <text x="32" y="250" font-family="Arial,sans-serif" font-size="8.5" fill="#555">Мал золотник &#8212; да дорог.</text>

  <!-- Case 4: Colon -->
  <rect x="260" y="180" width="218" height="72" rx="5" fill="white" opacity="0.92" stroke="#7B1FA2" stroke-width="1.2"/>
  <circle cx="278" cy="196" r="10" fill="#7B1FA2" opacity="0.9"/>
  <text x="278" y="200" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">:</text>
  <text x="298" y="200" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2">Двоеточие</text>
  <text x="270" y="215" font-family="Arial,sans-serif" font-size="9" fill="#333">&#8226; Причина (= потому что)</text>
  <text x="270" y="228" font-family="Arial,sans-serif" font-size="9" fill="#333">&#8226; Пояснение (= а именно)</text>
  <text x="270" y="241" font-family="Arial,sans-serif" font-size="9" fill="#333">&#8226; Дополнение (= что, чтобы)</text>
  <text x="270" y="250" font-family="Arial,sans-serif" font-size="8.5" fill="#555">Он сказал: &#171;Я согласен&#187;.</text>

  <!-- Summary table -->
  <rect x="22" y="258" width="456" height="38" rx="5" fill="white" opacity="0.92" stroke="#EF5350" stroke-width="0.8"/>
  <text x="250" y="274" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#EF5350" text-anchor="middle">Алгоритм выбора знака:</text>
  <text x="250" y="290" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">, &#8594; перечисление | ; &#8594; самостоятельность | &#8212; &#8594; против./след./усл. | : &#8594; прич./поясн./доп.</text>

  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#EF5350" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#EF5350" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык &#8212; 9 класс</text>
</svg>