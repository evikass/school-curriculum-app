<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg4)"/>
  <!-- Main box at center top -->
  <rect x="150" y="20" width="200" height="50" rx="10" fill="#e94560"/>
  <text x="250" y="50" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Главная часть</text>
  <!-- Three arrows down to three types -->
  <line x1="100" y1="70" x2="250" y2="70" stroke="#e94560" stroke-width="2"/>
  <line x1="250" y1="70" x2="400" y2="70" stroke="#e94560" stroke-width="2"/>
  <line x1="100" y1="70" x2="100" y2="100" stroke="#e94560" stroke-width="2"/>
  <line x1="250" y1="70" x2="250" y2="100" stroke="#e94560" stroke-width="2"/>
  <line x1="400" y1="70" x2="400" y2="100" stroke="#e94560" stroke-width="2"/>
  <!-- Three types of subordinate clauses -->
  <rect x="20" y="100" width="160" height="60" rx="8" fill="#533483" opacity="0.9"/>
  <text x="100" y="125" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Определительные</text>
  <text x="100" y="145" text-anchor="middle" fill="white" font-size="10">Какой?</text>
  <rect x="190" y="100" width="120" height="60" rx="8" fill="#0f3460" opacity="0.9"/>
  <text x="250" y="125" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Изъяснительные</text>
  <text x="250" y="145" text-anchor="middle" fill="white" font-size="10">Падежные ?</text>
  <rect x="320" y="100" width="160" height="60" rx="8" fill="#e94560" opacity="0.85"/>
  <text x="400" y="125" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Обстоятельственные</text>
  <text x="400" y="145" text-anchor="middle" fill="white" font-size="10">Где? Когда? Почему?</text>
  <!-- Connection means -->
  <rect x="30" y="180" width="210" height="70" rx="8" fill="#16213e" stroke="#e94560" stroke-width="1"/>
  <text x="135" y="205" text-anchor="middle" fill="#e94560" font-size="12" font-weight="bold">Подчинительные союзы</text>
  <text x="135" y="225" text-anchor="middle" fill="white" font-size="10">что, чтобы, если, когда, так как</text>
  <text x="135" y="242" text-anchor="middle" fill="white" font-size="10">Не член предложения</text>
  <rect x="260" y="180" width="210" height="70" rx="8" fill="#16213e" stroke="#4fc3f7" stroke-width="1"/>
  <text x="365" y="205" text-anchor="middle" fill="#4fc3f7" font-size="12" font-weight="bold">Союзные слова</text>
  <text x="365" y="225" text-anchor="middle" fill="white" font-size="10">который, какой, чей, где, куда</text>
  <text x="365" y="242" text-anchor="middle" fill="white" font-size="10">Являются членом предложения</text>
  <!-- Positions -->
  <rect x="30" y="270" width="140" height="50" rx="8" fill="#533483" opacity="0.7"/>
  <text x="100" y="292" text-anchor="middle" fill="white" font-size="10">После главной:</text>
  <text x="100" y="308" text-anchor="middle" fill="white" font-size="9" font-style="italic">[ ], ( )</text>
  <rect x="180" y="270" width="140" height="50" rx="8" fill="#0f3460" opacity="0.7"/>
  <text x="250" y="292" text-anchor="middle" fill="white" font-size="10">Перед главной:</text>
  <text x="250" y="308" text-anchor="middle" fill="white" font-size="9" font-style="italic">( ), [ ]</text>
  <rect x="330" y="270" width="140" height="50" rx="8" fill="#e94560" opacity="0.7"/>
  <text x="400" y="292" text-anchor="middle" fill="white" font-size="10">В середине:</text>
  <text x="400" y="308" text-anchor="middle" fill="white" font-size="9" font-style="italic">[ ], ( ), [ ]</text>
  <text x="250" y="345" text-anchor="middle" fill="white" font-size="9" opacity="0.5">СПП: структура и виды придаточных</text>
</svg>