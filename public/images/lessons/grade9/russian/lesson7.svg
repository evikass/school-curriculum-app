<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF9A9A"/>
      <stop offset="100%" stop-color="#EF5350"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#EF5350" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#EF5350" stroke-width="1" opacity="0.3"/>
  <!-- Corner decorations -->
  <polygon points="10,10 30,10 10,30" fill="#EF5350" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#C62828" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#EF5350" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#C62828" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#EF5350" text-anchor="middle">Предложения с разными видами связи</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Русский язык &#8212; Урок 7</text>
  <line x1="30" y1="70" x2="470" y2="70" stroke="#EF5350" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="67" width="60" height="5" fill="#EF5350" opacity="0.18" rx="1"/>
  <rect x="410" y="67" width="60" height="5" fill="#C62828" opacity="0.12" rx="1"/>

  <!-- Illustration area -->
  <rect x="15" y="76" width="470" height="222" rx="6" fill="#FFEBEE" opacity="0.4"/>

  <!-- Definition -->
  <rect x="22" y="82" width="456" height="35" rx="5" fill="white" opacity="0.92" stroke="#EF5350" stroke-width="1"/>
  <text x="250" y="98" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#EF5350" text-anchor="middle">Смешанные &#8212; сочетание сочинит., подчинит. и бессоюзной связи</text>
  <text x="250" y="112" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">В одном предложении могут сочетаться разные виды связи между частями</text>

  <!-- Visual: Three types with connecting lines -->
  <rect x="22" y="122" width="150" height="30" rx="5" fill="#E65100" opacity="0.85"/>
  <text x="97" y="142" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Сочинение (И, А, НО)</text>
  <rect x="182" y="122" width="136" height="30" rx="5" fill="#7B1FA2" opacity="0.85"/>
  <text x="250" y="142" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Подчинение (что, если)</text>
  <rect x="328" y="122" width="150" height="30" rx="5" fill="#1565C0" opacity="0.85"/>
  <text x="403" y="142" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Бессоюзие (, ; &#8212; :)</text>

  <!-- Connecting brackets -->
  <line x1="97" y1="155" x2="97" y2="160" stroke="#E65100" stroke-width="1.5"/>
  <line x1="250" y1="155" x2="250" y2="160" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="403" y1="155" x2="403" y2="160" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="97" y1="160" x2="403" y2="160" stroke="#EF5350" stroke-width="1.5" opacity="0.4"/>

  <!-- Example 1: Сочинение + Подчинение -->
  <rect x="22" y="166" width="456" height="40" rx="5" fill="white" opacity="0.92" stroke="#E65100" stroke-width="1"/>
  <text x="32" y="182" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100">1. Сочин. + Подчин.:</text>
  <text x="32" y="196" font-family="Arial,sans-serif" font-size="9" fill="#333">[Ветер дул], и [дождь усилился, (потому что тучи сгущались)].</text>
  <text x="410" y="196" font-family="Arial,sans-serif" font-size="7.5" fill="#E65100">1&#8596;2: И, 2&#8596;3: потому что</text>

  <!-- Example 2: Бессоюзие + Подчинение -->
  <rect x="22" y="212" width="456" height="40" rx="5" fill="white" opacity="0.92" stroke="#1565C0" stroke-width="1"/>
  <text x="32" y="228" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0">2. Бессоюз. + Подчин.:</text>
  <text x="32" y="242" font-family="Arial,sans-serif" font-size="9" fill="#333">[Лес стоял тихо]: (когда ветер стих, (что бывает редко)).</text>
  <text x="410" y="242" font-family="Arial,sans-serif" font-size="7.5" fill="#1565C0">1&#8596;2: :, 2&#8596;3: когда</text>

  <!-- Example 3: Все три вида -->
  <rect x="22" y="258" width="456" height="40" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <text x="32" y="274" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">3. Все три вида:</text>
  <text x="32" y="288" font-family="Arial,sans-serif" font-size="8.5" fill="#333">[Небо прояснилось], и [солнце выглянуло]; (хотя тучи висели, (где было мрачно)).</text>

  <!-- Key analysis tip -->
  <rect x="22" y="292" width="456" height="10" rx="3" fill="#EF5350" opacity="0.08"/>
  <text x="250" y="301" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Совет: выделяйте грамматические основы &#8594; определяйте связь между каждой парой &#8594; ставьте знаки</text>

  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#EF5350" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#EF5350" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Русский язык &#8212; 9 класс</text>
</svg>