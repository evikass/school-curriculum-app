<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2B6CB0"/><stop offset="100%" stop-color="#2C7A7B"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#g3)"/>
  <!-- Eye -->
