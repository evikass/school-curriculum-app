    <circle cx="58" cy="0" r="18" fill="#4299E1"/><text x="58" y="4" text-anchor="middle" font-size="7" fill="#FFF">Сужд.</text>
    <line x1="76" y1="0" x2="98" y2="0" stroke="#4299E1" stroke-width="2" opacity="0.6"/>
    <circle cx="116" cy="0" r="18" fill="#3182CE"/><text x="116" y="4" text-anchor="middle" font-size="7" fill="#FFF">Умоз.</text>
