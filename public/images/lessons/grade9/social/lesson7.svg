<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#2D3748"/>
  <!-- Supply and Demand curves -->
  <line x1="80" y1="280" x2="80" y2="40" stroke="#E2E8F0" stroke-width="2" opacity="0.4"/>
  <line x1="80" y1="280" x2="440" y2="280" stroke="#E2E8F0" stroke-width="2" opacity="0.4"/>
  <text x="70" y="38" text-anchor="end" font-size="9" fill="#A0AEC0" opacity="0.5">Цена</text>
  <text x="440" y="295" text-anchor="end" font-size="9" fill="#A0AEC0" opacity="0.5">Кол-во</text>
  <!-- Demand curve (down) -->
  <path d="M120 80 Q250 150 400 250" fill="none" stroke="#63B3ED" stroke-width="3" opacity="0.6"/>
  <text x="130" y="75" font-size="10" fill="#63B3ED" opacity="0.6">Спрос</text>
  <!-- Supply curve (up) -->
  <path d="M120 250 Q250 180 400 80" fill="none" stroke="#FC8181" stroke-width="3" opacity="0.6"/>
  <text x="390" y="75" font-size="10" fill="#FC8181" opacity="0.6">Предл.</text>
  <!-- Equilibrium point -->
  <circle cx="255" cy="165" r="6" fill="#F6E05E" opacity="0.7"/>
  <text x="268" y="160" font-size="9" fill="#F6E05E" opacity="0.7">Равновесие</text>
  <text x="250" y="310" text-anchor="middle" font-size="18" fill="#E2E8F0" font-weight="bold" opacity="0.6">Рыночная экономика</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Рыночная экономика</text>
</svg>