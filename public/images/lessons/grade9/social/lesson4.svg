<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#1A365D"/>
  <!-- Absolute truth - star/sun -->
  <g transform="translate(250,100)">
    <circle cx="0" cy="0" r="25" fill="#F6E05E" opacity="0.4"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#F6E05E" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="55" fill="none" stroke="#F6E05E" stroke-width="1" opacity="0.2"/>
    <g stroke="#F6E05E" stroke-width="1.5" opacity="0.3">
      <line x1="0" y1="-30" x2="0" y2="-50"/><line x1="21" y1="-21" x2="35" y2="-35"/>
      <line x1="30" y1="0" x2="50" y2="0"/><line x1="21" y1="21" x2="35" y2="35"/>
      <line x1="0" y1="30" x2="0" y2="50"/><line x1="-21" y1="21" x2="-35" y2="35"/>
      <line x1="-30" y1="0" x2="-50" y2="0"/><line x1="-21" y1="-21" x2="-35" y2="-35"/>
    </g>
    <text x="0" y="5" text-anchor="middle" font-size="9" fill="#F6E05E" opacity="0.6">Истина</text>
  </g>
  <!-- Relative - growing circles -->
  <g transform="translate(100,200)" opacity="0.4">
    <circle cx="0" cy="0" r="10" fill="#63B3ED"/><circle cx="0" cy="0" r="20" fill="none" stroke="#63B3ED" stroke-width="1"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#63B3ED" stroke-width="1"/>
    <text x="0" y="45" text-anchor="middle" font-size="8" fill="#63B3ED">Относительная</text>
  </g>
  <!-- Practice - anvil -->
  <g transform="translate(380,200)" opacity="0.5">
    <rect x="-25" y="-10" width="50" height="25" rx="3" fill="#A0AEC0"/>
    <rect x="-15" y="15" width="30" height="10" fill="#718096"/>
    <text x="0" y="40" text-anchor="middle" font-size="8" fill="#A0AEC0">Практика</text>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="18" fill="#E2E8F0" font-weight="bold" opacity="0.6">Истина и её критерии</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Истина и её критерии</text>
</svg>