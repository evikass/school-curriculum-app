<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#1A365D"/>
  <!-- Constitution book large -->
  <g transform="translate(250,150)" opacity="0.4">
    <rect x="-60" y="-70" width="120" height="140" rx="5" fill="#E2E8F0"/>
    <line x1="0" y1="-70" x2="0" y2="70" stroke="#1A365D" stroke-width="2"/>
    <text x="-30" y="-30" font-size="10" fill="#1A365D">КОН</text>
    <text x="-30" y="-15" font-size="10" fill="#1A365D">СТИ</text>
    <text x="-30" y="0" font-size="10" fill="#1A365D">ТУ</text>
    <text x="-30" y="15" font-size="10" fill="#1A365D">ЦИЯ</text>
    <text x="-30" y="35" font-size="10" fill="#1A365D">РФ</text>
  </g>
  <!-- Shield -->
  <g transform="translate(380,120)" opacity="0.3">
    <path d="M0 -30 L25 -15 L25 10 Q25 30 0 35 Q-25 30 -25 10 L-25 -15 Z" fill="#F6E05E"/>
  </g>
  <!-- Year -->
  <text x="120" y="110" font-size="30" fill="#F6E05E" font-weight="bold" opacity="0.4">1993</text>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">Конституция</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Конституция</text>
</svg>