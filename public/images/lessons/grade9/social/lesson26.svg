<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#276749"/>
  <!-- Worker with hard hat -->
  <g transform="translate(250,120)" fill="#E2E8F0" opacity="0.4">
    <ellipse cx="0" cy="-35" rx="18" ry="6" fill="#F6E05E" opacity="0.5"/>
    <circle cx="0" cy="-20" r="12"/>
    <rect x="-10" y="-8" width="20" height="30" rx="5"/>
    <line x1="-10" y1="2" x2="-25" y2="20" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="2" x2="25" y2="20" stroke="#E2E8F0" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Work contract -->
  <g transform="translate(350,90)" opacity="0.3">
    <rect x="0" y="0" width="60" height="80" rx="3" fill="#E2E8F0"/>
    <line x1="10" y1="15" x2="50" y2="15" stroke="#276749" stroke-width="1"/>
    <line x1="10" y1="25" x2="45" y2="25" stroke="#276749" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="35" x2="40" y2="35" stroke="#276749" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Labor rights -->
  <g opacity="0.4" font-size="8" fill="#C6F6D5">
    <text x="80" y="200">Зарплата</text><text x="80" y="215">Отпуск 28 дней</text>
    <text x="80" y="230">40-час. неделя</text><text x="80" y="245">Безопасность</text>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="18" fill="#C6F6D5" font-weight="bold" opacity="0.6">Трудовое право</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#C6F6D5" opacity="0.5">Трудовое право</text>
</svg>