  <defs><linearGradient id="g5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#9F7AEA"/><stop offset="100%" stop-color="#6B46C1"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#g5)"/>
