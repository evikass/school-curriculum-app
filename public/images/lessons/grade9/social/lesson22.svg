<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="g22" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C53030"/><stop offset="100%" stop-color="#742A2A"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#g22)"/>
  <!-- Ballot box -->
  <rect x="170" y="130" width="160" height="100" rx="8" fill="#E2E8F0" opacity="0.2"/>
  <rect x="200" y="115" width="100" height="20" rx="5" fill="#E2E8F0" opacity="0.2"/>
  <text x="250" y="190" text-anchor="middle" font-size="16" fill="#F6E05E" opacity="0.5">ВЫБОРЫ</text>
