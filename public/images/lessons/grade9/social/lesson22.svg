    <line x1="140" y1="78" x2="190" y2="120"/><line x1="360" y1="78" x2="310" y2="120"/>
    <line x1="140" y1="98" x2="200" y2="125"/><line x1="360" y1="98" x2="300" y2="125"/>
  </g>
  <text x="250" y="280" text-anchor="middle" font-size="16" fill="#FED7D7" font-weight="bold" opacity="0.6">Избирательное право</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#FED7D7" opacity="0.5">Избирательное право</text>
</svg>