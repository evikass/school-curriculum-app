<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#2D3748"/>
  <!-- System circles -->
  <circle cx="250" cy="140" r="80" fill="none" stroke="#63B3ED" stroke-width="2" opacity="0.4"/>
  <circle cx="250" cy="140" r="55" fill="none" stroke="#63B3ED" stroke-width="1.5" opacity="0.3"/>
  <!-- Subsystem boxes -->
  <rect x="170" y="100" width="60" height="25" rx="5" fill="#E53E3E" opacity="0.5"/><text x="200" y="117" text-anchor="middle" font-size="8" fill="#FFF">Эконом.</text>
  <rect x="270" y="100" width="60" height="25" rx="5" fill="#3182CE" opacity="0.5"/><text x="300" y="117" text-anchor="middle" font-size="8" fill="#FFF">Полит.</text>
  <rect x="170" y="150" width="60" height="25" rx="5" fill="#38A169" opacity="0.5"/><text x="200" y="167" text-anchor="middle" font-size="8" fill="#FFF">Социальн.</text>
  <rect x="270" y="150" width="60" height="25" rx="5" fill="#D69E2E" opacity="0.5"/><text x="300" y="167" text-anchor="middle" font-size="8" fill="#FFF">Духовн.</text>
  <!-- Connections -->
  <g stroke="#A0AEC0" stroke-width="1" opacity="0.3">
    <line x1="230" y1="112" x2="270" y2="112"/><line x1="230" y1="162" x2="270" y2="162"/>
    <line x1="200" y1="125" x2="200" y2="150"/><line x1="300" y1="125" x2="300" y2="150"/>
  </g>
  <!-- Institute icons -->
  <g transform="translate(80,220)" opacity="0.5">
    <rect x="0" y="0" width="30" height="25" rx="3" fill="#9F7AEA"/><text x="15" y="17" text-anchor="middle" font-size="7" fill="#FFF">Семья</text>
  </g>
  <g transform="translate(130,220)" opacity="0.5">
    <rect x="0" y="0" width="30" height="25" rx="3" fill="#E53E3E"/><text x="15" y="17" text-anchor="middle" font-size="7" fill="#FFF">Гос.</text>
  </g>
  <g transform="translate(180,220)" opacity="0.5">
    <rect x="0" y="0" width="30" height="25" rx="3" fill="#3182CE"/><text x="15" y="17" text-anchor="middle" font-size="7" fill="#FFF">Рел.</text>
  </g>
  <g transform="translate(230,220)" opacity="0.5">
    <rect x="0" y="0" width="30" height="25" rx="3" fill="#38A169"/><text x="15" y="17" text-anchor="middle" font-size="7" fill="#FFF">Обр.</text>
  </g>
  <g transform="translate(280,220)" opacity="0.5">
    <rect x="0" y="0" width="30" height="25" rx="3" fill="#D69E2E"/><text x="15" y="17" text-anchor="middle" font-size="7" fill="#FFF">Пр-во</text>
  </g>
  <text x="250" y="290" text-anchor="middle" font-size="18" fill="#E2E8F0" font-weight="bold" opacity="0.6">Общество как система</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Общество как система</text>
</svg>