<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#553C9A"/>
  <!-- Person with status labels -->
  <g transform="translate(250,150)" fill="#E2E8F0" opacity="0.4">
    <circle cx="0" cy="-30" r="20"/><rect x="-14" y="-10" width="28" height="40" rx="6"/>
  </g>
  <!-- Status tags around -->
  <g opacity="0.5">
    <rect x="60" y="60" width="90" height="24" rx="12" fill="#E53E3E"/><text x="105" y="76" text-anchor="middle" font-size="9" fill="#FFF">Пол: мужской</text>
    <rect x="350" y="60" width="95" height="24" rx="12" fill="#3182CE"/><text x="397" y="76" text-anchor="middle" font-size="9" fill="#FFF">Возраст: 15</text>
    <rect x="50" y="120" width="100" height="24" rx="12" fill="#38A169"/><text x="100" y="136" text-anchor="middle" font-size="9" fill="#FFF">Ученик</text>
    <rect x="350" y="120" width="100" height="24" rx="12" fill="#D69E2E"/><text x="400" y="136" text-anchor="middle" font-size="9" fill="#FFF">Спортсмен</text>
    <rect x="50" y="180" width="100" height="24" rx="12" fill="#9F7AEA"/><text x="100" y="196" text-anchor="middle" font-size="9" fill="#FFF">Сын</text>
    <rect x="350" y="180" width="100" height="24" rx="12" fill="#FC8181"/><text x="400" y="196" text-anchor="middle" font-size="9" fill="#FFF">Друг</text>
  </g>
  <!-- Lines connecting -->
  <g stroke="#A0AEC0" stroke-width="1" opacity="0.2">
    <line x1="150" y1="72" x2="230" y2="120"/><line x1="350" y1="72" x2="270" y2="120"/>
    <line x1="150" y1="132" x2="230" y2="140"/><line x1="350" y1="132" x2="270" y2="140"/>
    <line x1="150" y1="192" x2="230" y2="160"/><line x1="350" y1="192" x2="270" y2="160"/>
  </g>
  <text x="250" y="280" text-anchor="middle" font-size="10" fill="#E2E8F0" opacity="0.4">Предписанные → Достигаемые</text>
  <text x="250" y="310" text-anchor="middle" font-size="18" fill="#E2E8F0" font-weight="bold" opacity="0.6">Социальный статус</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Социальный статус</text>
</svg>