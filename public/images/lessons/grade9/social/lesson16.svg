<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="g16" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2B6CB0"/><stop offset="100%" stop-color="#38A169"/></linearGradient></defs>
  <rect width="500" height="350" fill="url(#g16)"/>
  <!-- Voting box -->
  <rect x="190" y="130" width="120" height="80" rx="5" fill="#E2E8F0" opacity="0.3"/>
  <rect x="210" y="120" width="80" height="15" rx="3" fill="#E2E8F0" opacity="0.3"/>
  <!-- Ballot -->
  <rect x="235" y="85" width="30" height="40" fill="#F6E05E" opacity="0.4" rx="2"/>
  <!-- Hand dropping ballot -->
  <g transform="translate(250,80)" fill="#E2E8F0" opacity="0.3">
    <rect x="-8" y="-20" width="16" height="25" rx="4"/>
    <rect x="-12" y="-5" width="4" height="15" rx="2"/>
    <rect x="-4" y="-5" width="4" height="15" rx="2"/>
    <rect x="4" y="-5" width="4" height="15" rx="2"/>
    <rect x="10" y="0" width="4" height="12" rx="2"/>
  </g>
  <!-- Three branches -->
  <g opacity="0.4">
    <rect x="40" y="240" width="120" height="28" rx="5" fill="#E53E3E"/><text x="100" y="259" text-anchor="middle" font-size="9" fill="#FFF">Законодательная</text>
    <rect x="190" y="240" width="120" height="28" rx="5" fill="#3182CE"/><text x="250" y="259" text-anchor="middle" font-size="9" fill="#FFF">Исполнительная</text>
    <rect x="340" y="240" width="120" height="28" rx="5" fill="#D69E2E"/><text x="400" y="259" text-anchor="middle" font-size="9" fill="#FFF">Судебная</text>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">Демократия</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Демократия</text>
</svg>