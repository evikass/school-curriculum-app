<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#2D3748"/>
  <!-- Traffic sign -->
  <g transform="translate(250,100)" opacity="0.5">
    <polygon points="0,-45 40,25 -40,25" fill="none" stroke="#F6E05E" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" font-size="14" fill="#F6E05E">!</text>
  </g>
  <!-- Fine ticket -->
  <g transform="translate(370,80)" opacity="0.3">
    <rect x="0" y="0" width="80" height="60" rx="3" fill="#E2E8F0"/>
    <text x="40" y="20" text-anchor="middle" font-size="8" fill="#2D3748">ШТРАФ</text>
    <line x1="10" y1="30" x2="70" y2="30" stroke="#2D3748" stroke-width="1"/>
    <line x1="10" y1="40" x2="60" y2="40" stroke="#2D3748" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Punishments -->
  <g opacity="0.4">
    <rect x="50" y="190" width="80" height="25" rx="5" fill="#38A169"/><text x="90" y="207" text-anchor="middle" font-size="8" fill="#FFF">Предупрежд.</text>
    <rect x="150" y="190" width="80" height="25" rx="5" fill="#D69E2E"/><text x="190" y="207" text-anchor="middle" font-size="8" fill="#FFF">Штраф</text>
    <rect x="250" y="190" width="80" height="25" rx="5" fill="#E53E3E"/><text x="290" y="207" text-anchor="middle" font-size="8" fill="#FFF">Лишение прав</text>
    <rect x="360" y="190" width="90" height="25" rx="5" fill="#9F7AEA"/><text x="405" y="207" text-anchor="middle" font-size="8" fill="#FFF">Арест 15 сут.</text>
  </g>
  <text x="250" y="280" text-anchor="middle" font-size="14" fill="#E2E8F0" font-weight="bold" opacity="0.6">Административное право</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Административное право</text>
</svg>