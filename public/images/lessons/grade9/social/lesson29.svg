<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#1A202C"/>
  <!-- Prison bars -->
  <g stroke="#4A5568" stroke-width="8" opacity="0.5">
    <line x1="130" y1="20" x2="130" y2="280"/><line x1="180" y1="20" x2="180" y2="280"/>
    <line x1="230" y1="20" x2="230" y2="280"/><line x1="280" y1="20" x2="280" y2="280"/>
    <line x1="330" y1="20" x2="330" y2="280"/><line x1="380" y1="20" x2="380" y2="280"/>
  </g>
  <!-- Handcuffs hint -->
  <g transform="translate(250,150)" opacity="0.3">
    <circle cx="-20" cy="0" r="15" fill="none" stroke="#E2E8F0" stroke-width="2"/>
    <circle cx="20" cy="0" r="15" fill="none" stroke="#E2E8F0" stroke-width="2"/>
    <line x1="-5" y1="-3" x2="5" y2="-3" stroke="#E2E8F0" stroke-width="2"/>
  </g>
  <!-- Crime categories -->
  <g opacity="0.4" font-size="8" fill="#FC8181">
    <text x="60" y="60">Небольшой тяжести</text><text x="60" y="80">Средней тяжести</text>
    <text x="60" y="100">Тяжкие</text><text x="60" y="120">Особо тяжкие</text>
  </g>
  <!-- Scale -->
  <g opacity="0.3">
    <circle cx="420" cy="60" r="5" fill="#F6E05E"/>
    <line x1="420" y1="65" x2="420" y2="120" stroke="#F6E05E" stroke-width="1.5"/>
    <line x1="390" y1="80" x2="450" y2="80" stroke="#F6E05E" stroke-width="1.5"/>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="18" fill="#E2E8F0" font-weight="bold" opacity="0.6">Уголовное право</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Уголовное право</text>
</svg>