  <text x="22" y="168" font-family="Arial,sans-serif" font-size="10" fill="#4E342E" font-weight="bold">Виды:</text>
  <text x="85" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Обыденное — повседневный опыт</text>
