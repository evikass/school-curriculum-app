<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F2F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26A69A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="500" height="350" rx="12" fill="url(#bg)" stroke="#26A69A" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="50" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="25" width="500" height="25" fill="url(#headerGrad)"/>
  <!-- Lesson number badge -->
  <circle cx="28" cy="25" r="18" fill="#FFFFFF" opacity="0.3"/>
  <text x="28" y="31" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
  <!-- Title -->
  <text x="250" y="32" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Народы и религии России</text>
  <!-- Decorative line -->
  <line x1="15" y1="56" x2="485" y2="56" stroke="#80CBC4" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Key fact -->
  <rect x="15" y="62" width="470" height="30" rx="6" fill="#26A69A" opacity="0.15"/>
  <text x="250" y="82" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#26A69A" text-anchor="middle">Более 190 народов и этнических групп в РФ</text>
  <!-- Ethnic composition chart -->
  <g transform="translate(15, 97)">
    <rect x="0" y="0" width="235" height="140" rx="8" fill="#FFFFFF" stroke="#26A69A" stroke-width="1"/>
    <text x="117" y="17" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A" text-anchor="middle">ЭТНИЧЕСКИЙ СОСТАВ</text>
    <!-- Horizontal bar chart -->
    <text x="10" y="35" font-family="Arial,sans-serif" font-size="8" fill="#333">Русские</text>
    <rect x="60" y="27" width="160" height="10" rx="2" fill="#EEEEEE"/>
    <rect x="60" y="27" width="128" height="10" rx="2" fill="#26A69A"/>
    <text x="191" y="35" font-family="Arial,sans-serif" font-size="7" fill="#333">80%</text>
    <text x="10" y="48" font-family="Arial,sans-serif" font-size="8" fill="#333">Татары</text>
    <rect x="60" y="40" width="160" height="10" rx="2" fill="#EEEEEE"/>
    <rect x="60" y="40" width="5.5" height="10" rx="2" fill="#7E57C2"/>
    <text x="68" y="48" font-family="Arial,sans-serif" font-size="7" fill="#333">3,7%</text>
    <text x="10" y="61" font-family="Arial,sans-serif" font-size="8" fill="#333">Чеченцы</text>
    <rect x="60" y="53" width="160" height="10" rx="2" fill="#EEEEEE"/>
    <rect x="60" y="53" width="2" height="10" rx="2" fill="#FF8A65"/>
    <text x="65" y="61" font-family="Arial,sans-serif" font-size="7" fill="#333">1,2%</text>
    <text x="10" y="74" font-family="Arial,sans-serif" font-size="8" fill="#333">Башкиры</text>
    <rect x="60" y="66" width="160" height="10" rx="2" fill="#EEEEEE"/>
    <rect x="60" y="66" width="2" height="10" rx="2" fill="#FFB74D"/>
    <text x="65" y="74" font-family="Arial,sans-serif" font-size="7" fill="#333">1,1%</text>
    <text x="10" y="87" font-family="Arial,sans-serif" font-size="8" fill="#333">Чуваши</text>
    <rect x="60" y="79" width="160" height="10" rx="2" fill="#EEEEEE"/>
    <rect x="60" y="79" width="1.5" height="10" rx="2" fill="#A1887F"/>
    <text x="64" y="87" font-family="Arial,sans-serif" font-size="7" fill="#333">0,9%</text>
    <!-- Language families -->
    <line x1="5" y1="96" x2="230" y2="96" stroke="#80CBC4" stroke-width="0.5"/>
    <text x="117" y="108" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#26A69A" text-anchor="middle">ЯЗЫКОВЫЕ СЕМЬИ</text>
    <text x="10" y="120" font-family="Arial,sans-serif" font-size="7" fill="#333">• Индоевропейская (русские, украинцы, армяне...)</text>
    <text x="10" y="131" font-family="Arial,sans-serif" font-size="7" fill="#333">• Алтайская (татары, башкиры, чуваши, якуты...)</text>
    <text x="10" y="142" font-family="Arial,sans-serif" font-size="7" fill="#333">• Северокавказская (чеченцы, аварцы, дагестанцы...)</text>
  </g>
  <!-- Religion diagram -->
  <g transform="translate(260, 97)">
    <rect x="0" y="0" width="225" height="140" rx="8" fill="#FFFFFF" stroke="#26A69A" stroke-width="1"/>
    <text x="112" y="17" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A" text-anchor="middle">РЕЛИГИОЗНЫЙ СОСТАВ</text>
    <!-- Symbol and text for each religion -->
    <circle cx="30" cy="40" r="12" fill="#26A69A" opacity="0.15"/>
    <text x="30" y="44" font-family="Arial,sans-serif" font-size="12" fill="#26A69A" text-anchor="middle">☦</text>
    <text x="50" y="38" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#333">Православие</text>
    <text x="50" y="48" font-family="Arial,sans-serif" font-size="8" fill="#666">~70% верующих</text>
    <circle cx="30" cy="70" r="12" fill="#7E57C2" opacity="0.15"/>
    <text x="30" y="74" font-family="Arial,sans-serif" font-size="12" fill="#7E57C2" text-anchor="middle">☪</text>
    <text x="50" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#333">Ислам</text>
    <text x="50" y="78" font-family="Arial,sans-serif" font-size="8" fill="#666">~20% верующих</text>
    <circle cx="30" cy="100" r="12" fill="#FF8A65" opacity="0.15"/>
    <text x="30" y="104" font-family="Arial,sans-serif" font-size="10" fill="#FF8A65" text-anchor="middle">☆</text>
    <text x="50" y="98" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#333">Буддизм</text>
    <text x="50" y="108" font-family="Arial,sans-serif" font-size="8" fill="#666">~1% (Бурятия, Калмыкия)</text>
    <circle cx="30" cy="128" r="12" fill="#FFB74D" opacity="0.15"/>
    <text x="30" y="132" font-family="Arial,sans-serif" font-size="10" fill="#FFB74D" text-anchor="middle">✡</text>
    <text x="50" y="126" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#333">Иудаизм и другие</text>
    <text x="50" y="136" font-family="Arial,sans-serif" font-size="8" fill="#666">~1% + неверующие ~9%</text>
  </g>
  <!-- Key points -->
  <rect x="15" y="245" width="470" height="95" rx="6" fill="#E0F2F1" stroke="#26A69A" stroke-width="1"/>
  <text x="25" y="262" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A">ОСОБЕННОСТИ:</text>
  <text x="25" y="277" font-family="Arial,sans-serif" font-size="9" fill="#333">• Россия — многонациональное государство, русский язык — государственный</text>
  <text x="25" y="291" font-family="Arial,sans-serif" font-size="9" fill="#333">• Республики имеют свои государственные языки наряду с русским</text>
  <text x="25" y="305" font-family="Arial,sans-serif" font-size="9" fill="#333">• Ст. 28 Конституции: свобода совести и вероисповедания</text>
  <text x="25" y="319" font-family="Arial,sans-serif" font-size="9" fill="#333">• Урало-Поволжье — зона контакта христианства и ислама</text>
</svg>