<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg5g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg5g)"/>
  <!-- Factory building -->
  <g transform="translate(30,40)">
    <rect x="0" y="40" width="80" height="60" fill="#78909C" stroke="#455A64" stroke-width="1.5"/>
    <!-- Roof -->
    <polygon points="0,40 40,15 80,40" fill="#546E7A" stroke="#37474F" stroke-width="1"/>
    <!-- Chimney -->
    <rect x="55" y="5" width="12" height="35" fill="#455A64"/>
    <!-- Smoke -->
    <circle cx="61" cy="0" r="5" fill="#BDBDBD" opacity="0.5"/>
    <circle cx="56" cy="-8" r="7" fill="#BDBDBD" opacity="0.3"/>
    <circle cx="63" cy="-15" r="9" fill="#BDBDBD" opacity="0.2"/>
    <!-- Windows -->
    <rect x="10" y="50" width="12" height="12" fill="#FFF9C4" opacity="0.6"/>
    <rect x="30" y="50" width="12" height="12" fill="#FFF9C4" opacity="0.6"/>
    <rect x="50" y="50" width="12" height="12" fill="#FFF9C4" opacity="0.6"/>
    <rect x="10" y="72" width="12" height="12" fill="#FFF9C4" opacity="0.6"/>
    <rect x="30" y="72" width="12" height="12" fill="#FFF9C4" opacity="0.6"/>
    <rect x="50" y="72" width="12" height="12" fill="#FFF9C4" opacity="0.6"/>
    <!-- Gear symbol -->
    <circle cx="40" cy="58" r="8" fill="none" stroke="#FF9800" stroke-width="2"/>
    <circle cx="40" cy="58" r="3" fill="#FF9800"/>
  </g>
  <!-- Three sectors visualization -->
  <g transform="translate(10,140)">
    <!-- Primary sector -->
    <rect x="5" y="0" width="145" height="60" rx="5" fill="#8BC34A" opacity="0.2" stroke="#558B2F" stroke-width="1"/>
    <text x="77" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#33691E" font-weight="bold">Первичный сектор</text>
    <!-- Wheat icon -->
    <line x1="25" y1="45" x2="25" y2="25" stroke="#8D6E63" stroke-width="2"/>
    <ellipse cx="22" cy="25" rx="3" ry="6" fill="#FDD835" opacity="0.8"/>
    <ellipse cx="28" cy="28" rx="3" ry="6" fill="#FDD835" opacity="0.8"/>
    <ellipse cx="25" cy="22" rx="3" ry="6" fill="#FDD835" opacity="0.8"/>
    <!-- Pickaxe -->
    <line x1="60" y1="22" x2="75" y2="45" stroke="#795548" stroke-width="2"/>
    <line x1="55" y1="25" x2="72" y2="20" stroke="#9E9E9E" stroke-width="2.5"/>
    <!-- Oil derrick -->
    <line x1="100" y1="45" x2="100" y2="20" stroke="#616161" stroke-width="1.5"/>
    <line x1="92" y1="25" x2="108" y2="25" stroke="#616161" stroke-width="1.5"/>
    <polygon points="95,20 105,20 100,15" fill="#616161"/>
    <text x="77" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#558B2F">Добыча, сельское хоз.</text>
  </g>
  <g transform="translate(170,140)">
    <!-- Secondary sector -->
    <rect x="5" y="0" width="145" height="60" rx="5" fill="#FF9800" opacity="0.2" stroke="#E65100" stroke-width="1"/>
    <text x="77" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#BF360C" font-weight="bold">Вторичный сектор</text>
    <!-- Factory icon -->
    <rect x="25" y="28" width="25" height="18" fill="#FF9800" opacity="0.5"/>
    <rect x="30" y="22" width="5" height="24" fill="#E65100" opacity="0.4"/>
    <rect x="40" y="25" width="5" height="21" fill="#E65100" opacity="0.4"/>
    <!-- Conveyor -->
    <rect x="65" y="35" width="30" height="8" rx="4" fill="#BF360C" opacity="0.3"/>
    <circle cx="68" cy="39" r="3" fill="#E65100" opacity="0.5"/>
    <circle cx="92" cy="39" r="3" fill="#E65100" opacity="0.5"/>
    <!-- Product box -->
    <rect x="105" y="30" width="15" height="15" fill="#FF9800" opacity="0.5" stroke="#E65100" stroke-width="0.5"/>
    <text x="77" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#BF360C">Обрабатывающая пром.</text>
  </g>
  <g transform="translate(330,140)">
    <!-- Tertiary sector -->
    <rect x="5" y="0" width="145" height="60" rx="5" fill="#2196F3" opacity="0.2" stroke="#0D47A1" stroke-width="1"/>
    <text x="77" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" font-weight="bold">Третичный сектор</text>
    <!-- Service person -->
    <circle cx="30" cy="28" r="6" fill="#42A5F5" opacity="0.6"/>
    <line x1="30" y1="34" x2="30" y2="46" stroke="#42A5F5" stroke-width="2"/>
    <line x1="30" y1="38" x2="22" y2="42" stroke="#42A5F5" stroke-width="1.5"/>
    <!-- Computer -->
    <rect x="55" y="30" width="18" height="12" rx="1" fill="#1565C0" opacity="0.4"/>
    <rect x="58" y="42" width="12" height="3" fill="#1565C0" opacity="0.3"/>
    <!-- Bank -->
    <polygon points="95,45 85,30 105,30" fill="#1565C0" opacity="0.4"/>
    <rect x="88" y="30" width="14" height="15" fill="#1565C0" opacity="0.3"/>
    <text x="77" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1">Услуги, торговля, фин.</text>
  </g>
  <!-- GDP comparison -->
  <g transform="translate(20,215)">
    <text x="230" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#333" font-weight="bold">Крупнейшие экономики (ВВП)</text>
    <!-- Bar chart -->
    <rect x="20" y="20" width="70" height="40" rx="2" fill="#1565C0" opacity="0.7"/>
    <text x="55" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold">США</text>
    <text x="55" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">25 трлн $</text>
    <rect x="100" y="28" width="70" height="32" rx="2" fill="#C62828" opacity="0.7"/>
    <text x="135" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold">Китай</text>
    <text x="135" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">18 трлн $</text>
    <rect x="180" y="40" width="55" height="20" rx="2" fill="#FF9800" opacity="0.7"/>
    <text x="207" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Япония</text>
    <rect x="245" y="42" width="55" height="18" rx="2" fill="#4CAF50" opacity="0.7"/>
    <text x="272" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Германия</text>
    <rect x="310" y="45" width="55" height="15" rx="2" fill="#9C27B0" opacity="0.7"/>
    <text x="337" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">Индия</text>
  </g>
  <!-- TNC logos area -->
  <rect x="380" y="40" width="105" height="90" rx="5" fill="white" opacity="0.7"/>
  <text x="432" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#333" font-weight="bold">ТНК</text>
  <!-- Apple shape -->
  <circle cx="400" cy="72" r="8" fill="#333" opacity="0.7"/>
  <path d="M400,64 Q403,58 407,60" stroke="#333" stroke-width="1" fill="none" opacity="0.7"/>
  <text x="400" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Apple</text>
  <!-- Car shape -->
  <rect x="425" y="66" width="18" height="10" rx="3" fill="#E53935" opacity="0.7"/>
  <circle cx="430" cy="78" r="3" fill="#333" opacity="0.5"/>
  <circle cx="440" cy="78" r="3" fill="#333" opacity="0.5"/>
  <text x="436" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Toyota</text>
  <!-- Trade balance -->
  <rect x="380" y="285" width="105" height="45" rx="4" fill="white" opacity="0.8"/>
  <text x="432" y="300" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#333" font-weight="bold">Сальдо</text>
  <text x="432" y="314" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Экспорт − Импорт</text>
  <text x="250" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666" opacity="0.5">Мировое хозяйство</text>
</svg>