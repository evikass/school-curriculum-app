<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#FFF8E1"/>
  <!-- Globe in center -->
  <circle cx="250" cy="150" r="90" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <!-- Latitude lines -->
  <ellipse cx="250" cy="150" rx="90" ry="25" fill="none" stroke="#90CAF9" stroke-width="0.5"/>
  <ellipse cx="250" cy="150" rx="90" ry="50" fill="none" stroke="#90CAF9" stroke-width="0.5"/>
  <ellipse cx="250" cy="150" rx="90" ry="75" fill="none" stroke="#90CAF9" stroke-width="0.5"/>
  <!-- Longitude lines -->
  <ellipse cx="250" cy="150" rx="25" ry="90" fill="none" stroke="#90CAF9" stroke-width="0.5"/>
  <ellipse cx="250" cy="150" rx="55" ry="90" fill="none" stroke="#90CAF9" stroke-width="0.5"/>
  <!-- Trade routes on globe -->
  <path d="M180,120 Q200,100 230,115 Q260,130 290,110" stroke="#F44336" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <path d="M200,170 Q230,160 260,175 Q290,190 320,170" stroke="#4CAF50" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <path d="M220,140 Q250,130 280,145 Q310,155 340,140" stroke="#FF9800" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <!-- Specialization icons around globe -->
  <!-- Saudi Arabia - Oil -->
  <g transform="translate(80,60)">
    <rect x="-20" y="-12" width="40" height="40" rx="5" fill="white" opacity="0.85" stroke="#795548" stroke-width="1"/>
    <!-- Oil derrick -->
    <line x1="0" y1="15" x2="0" y2="-2" stroke="#333" stroke-width="2"/>
    <line x1="-8" y1="2" x2="8" y2="2" stroke="#333" stroke-width="1.5"/>
    <polygon points="-5,-2 5,-2 0,-8" fill="#333"/>
    <!-- Oil drop -->
    <ellipse cx="3" cy="10" rx="3" ry="4" fill="#333" opacity="0.6"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" font-weight="bold">Сауд. Аравия</text>
    <text x="0" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#795548">Нефть</text>
  </g>
  <!-- Brazil - Coffee -->
  <g transform="translate(80,210)">
    <rect x="-20" y="-12" width="40" height="40" rx="5" fill="white" opacity="0.85" stroke="#4CAF50" stroke-width="1"/>
    <!-- Coffee bean -->
    <ellipse cx="0" cy="5" rx="8" ry="11" fill="#795548" opacity="0.7"/>
    <path d="M0,-5 Q3,5 0,15" stroke="#4E342E" stroke-width="1" fill="none"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Бразилия</text>
    <text x="0" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">Кофе</text>
  </g>
  <!-- Japan - Cars/Electronics -->
  <g transform="translate(420,60)">
    <rect x="-22" y="-12" width="44" height="40" rx="5" fill="white" opacity="0.85" stroke="#C62828" stroke-width="1"/>
    <!-- Car -->
    <rect x="-10" y="0" width="20" height="10" rx="3" fill="#C62828" opacity="0.7"/>
    <rect x="-7" y="-4" width="14" height="6" rx="2" fill="#E53935" opacity="0.7"/>
    <circle cx="-5" cy="12" r="3" fill="#333" opacity="0.5"/>
    <circle cx="5" cy="12" r="3" fill="#333" opacity="0.5"/>
    <!-- Chip -->
    <rect x="6" y="-8" width="8" height="8" fill="#1565C0" opacity="0.6"/>
    <line x1="8" y1="-8" x2="8" y2="-11" stroke="#1565C0" stroke-width="0.8"/>
    <line x1="12" y1="-8" x2="12" y2="-11" stroke="#1565C0" stroke-width="0.8"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#B71C1C" font-weight="bold">Япония</text>
    <text x="0" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Авто, электроника</text>
  </g>
  <!-- India - IT -->
  <g transform="translate(420,210)">
    <rect x="-22" y="-12" width="44" height="40" rx="5" fill="white" opacity="0.85" stroke="#FF9800" stroke-width="1"/>
    <!-- Computer screen -->
    <rect x="-10" y="-2" width="20" height="14" rx="2" fill="#1565C0" opacity="0.6"/>
    <rect x="-4" y="12" width="8" height="2" fill="#1565C0" opacity="0.4"/>
    <!-- Code brackets -->
    <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="8" fill="white" opacity="0.8">&lt;/&gt;</text>
    <text x="0" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Индия</text>
    <text x="0" y="43" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#FF9800">IT-услуги</text>
  </g>
  <!-- Switzerland - Watches -->
  <g transform="translate(250,300)">
    <rect x="-22" y="-15" width="44" height="30" rx="5" fill="white" opacity="0.85" stroke="#9C27B0" stroke-width="1"/>
    <!-- Watch -->
    <circle cx="-8" cy="0" r="8" fill="none" stroke="#9C27B0" stroke-width="1.5"/>
    <line x1="-8" y1="0" x2="-8" y2="-5" stroke="#9C27B0" stroke-width="1"/>
    <line x1="-8" y1="0" x2="-4" y2="2" stroke="#9C27B0" stroke-width="1"/>
    <!-- Bank -->
    <polygon points="8,6 2,-6 14,-6" fill="#9C27B0" opacity="0.4"/>
    <rect x="4" y="-6" width="8" height="12" fill="#9C27B0" opacity="0.3"/>
    <text x="0" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" font-weight="bold">Швейцария — часы, банки</text>
  </g>
  <!-- MRT label -->
  <text x="250" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#333" font-weight="bold">Международное разделение труда</text>
  <!-- Connection lines from globe to icons -->
  <line x1="165" y1="100" x2="100" y2="72" stroke="#795548" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="165" y1="200" x2="100" y2="218" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="335" y1="100" x2="400" y2="72" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="335" y1="200" x2="400" y2="218" stroke="#FF9800" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="250" y1="240" x2="250" y2="280" stroke="#9C27B0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="250" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666" opacity="0.5">Международное разделение труда</text>
</svg>