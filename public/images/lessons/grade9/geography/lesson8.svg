<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#FBE9E7"/>
  <!-- Culture columns -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#BF360C" font-weight="bold">Культуры и цивилизации</text>
  <!-- Western civilization -->
  <g transform="translate(70,100)">
    <rect x="-45" y="-50" width="90" height="140" rx="5" fill="white" opacity="0.8" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Parthenon-style columns -->
    <rect x="-35" y="-35" width="8" height="50" fill="#1565C0" opacity="0.4"/>
    <rect x="-15" y="-35" width="8" height="50" fill="#1565C0" opacity="0.4"/>
    <rect x="5" y="-35" width="8" height="50" fill="#1565C0" opacity="0.4"/>
    <rect x="25" y="-35" width="8" height="50" fill="#1565C0" opacity="0.4"/>
    <!-- Pediment -->
    <polygon points="-40,-35 40,-35 0,-48" fill="#1565C0" opacity="0.5"/>
    <!-- Base -->
    <rect x="-38" y="15" width="76" height="5" fill="#1565C0" opacity="0.3"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" font-weight="bold">Западная</text>
    <text x="0" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">Европа, Америка</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">Демократия, права</text>
    <text x="0" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">человека, наука</text>
    <text x="0" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">Христианство</text>
  </g>
  <!-- Islamic civilization -->
  <g transform="translate(185,100)">
    <rect x="-45" y="-50" width="90" height="140" rx="5" fill="white" opacity="0.8" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- Mosque dome -->
    <path d="M-20,-15 Q0,-45 20,-15" fill="#2E7D32" opacity="0.5"/>
    <!-- Minaret -->
    <rect x="22" y="-40" width="8" height="40" fill="#2E7D32" opacity="0.5"/>
    <polygon points="22,-40 26,-48 30,-40" fill="#2E7D32" opacity="0.5"/>
    <!-- Crescent on top -->
    <circle cx="26" cy="-48" r="3" fill="#FFD54F" opacity="0.7"/>
    <!-- Arch -->
    <path d="M-12,-15 Q0,-30 12,-15" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="-12" y="-15" width="24" height="25" fill="none" stroke="#2E7D32" stroke-width="1"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Исламская</text>
    <text x="0" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">Бл. Восток, Африка</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">Шариат, община</text>
    <text x="0" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">традиции</text>
    <text x="0" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Ислам</text>
  </g>
  <!-- East Asian civilization -->
  <g transform="translate(300,100)">
    <rect x="-45" y="-50" width="90" height="140" rx="5" fill="white" opacity="0.8" stroke="#C62828" stroke-width="1.5"/>
    <!-- Pagoda -->
    <polygon points="-20,15 -10,-10 10,-10 20,15" fill="#C62828" opacity="0.3"/>
    <polygon points="-15,-10 -5,-25 5,-25 15,-10" fill="#C62828" opacity="0.4"/>
    <polygon points="-10,-25 0,-38 10,-25" fill="#C62828" opacity="0.5"/>
    <!-- Curved roof lines -->
    <path d="M-22,15 Q-25,10 -20,5" stroke="#C62828" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M22,15 Q25,10 20,5" stroke="#C62828" stroke-width="1" fill="none" opacity="0.5"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C" font-weight="bold">Восточно-азиат.</text>
    <text x="0" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">Китай, Япония</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">Гармония, долг,</text>
    <text x="0" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">коллективизм</text>
    <text x="0" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Буддизм, конфуцианство</text>
  </g>
  <!-- Hindu civilization -->
  <g transform="translate(415,100)">
    <rect x="-45" y="-50" width="90" height="140" rx="5" fill="white" opacity="0.8" stroke="#FF9800" stroke-width="1.5"/>
    <!-- Temple silhouette -->
    <polygon points="-15,15 -5,-10 5,-10 15,15" fill="#FF9800" opacity="0.3"/>
    <polygon points="-10,-10 0,-30 10,-10" fill="#FF9800" opacity="0.4"/>
    <polygon points="-5,-30 0,-42 5,-30" fill="#FF9800" opacity="0.5"/>
    <!-- Decorative circle -->
    <circle cx="0" cy="-5" r="5" fill="#FF9800" opacity="0.3"/>
    <text x="0" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">Индуистская</text>
    <text x="0" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">Индия, Непал</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">Касты, карма,</text>
    <text x="0" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">дхарма</text>
    <text x="0" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#FF9800">Индуизм</text>
  </g>
  <!-- Latin American civilization (bottom) -->
  <g transform="translate(100,280)">
    <rect x="-55" y="-20" width="110" height="45" rx="4" fill="white" opacity="0.7" stroke="#7B1FA2" stroke-width="1"/>
    <!-- Pyramid -->
    <polygon points="-25,15 -10,-8 10,-8 25,15" fill="#7B1FA2" opacity="0.4"/>
    <text x="35" y="-5" font-family="Arial,sans-serif" font-size="7" fill="#6A1B9A" font-weight="bold">Латиноамер.</text>
    <text x="35" y="7" font-family="Arial,sans-serif" font-size="6" fill="#666">Смешение культур</text>
    <text x="35" y="17" font-family="Arial,sans-serif" font-size="6" fill="#666">Католицизм</text>
  </g>
  <!-- African civilization -->
  <g transform="translate(280,280)">
    <rect x="-55" y="-20" width="110" height="45" rx="4" fill="white" opacity="0.7" stroke="#F44336" stroke-width="1"/>
    <!-- African pattern -->
    <rect x="-30" y="-10" width="8" height="8" fill="#F44336" opacity="0.5"/>
    <rect x="-20" y="-10" width="8" height="8" fill="#FF9800" opacity="0.5"/>
    <rect x="-30" y="0" width="8" height="8" fill="#FFEB3B" opacity="0.5"/>
    <rect x="-20" y="0" width="8" height="8" fill="#4CAF50" opacity="0.5"/>
    <text x="25" y="-5" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Африканская</text>
    <text x="25" y="7" font-family="Arial,sans-serif" font-size="6" fill="#666">Племенное разн.</text>
    <text x="25" y="17" font-family="Arial,sans-serif" font-size="6" fill="#666">Традиции, анимизм</text>
  </g>
  <!-- Orthodox civilization -->
  <g transform="translate(440,280)">
    <rect x="-45" y="-20" width="90" height="45" rx="4" fill="white" opacity="0.7" stroke="#FFD54F" stroke-width="1"/>
    <!-- Orthodox cross -->
    <line x1="-20" y1="-10" x2="-20" y2="12" stroke="#FFD54F" stroke-width="2"/>
    <line x1="-28" y1="-2" x2="-12" y2="-2" stroke="#FFD54F" stroke-width="2"/>
    <line x1="-24" y1="-6" x2="-16" y2="-6" stroke="#FFD54F" stroke-width="1.5"/>
    <text x="10" y="-5" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" font-weight="bold">Православная</text>
    <text x="10" y="7" font-family="Arial,sans-serif" font-size="6" fill="#666">Россия, Балканы</text>
    <text x="10" y="17" font-family="Arial,sans-serif" font-size="6" fill="#666">Соборность</text>
  </g>
  <text x="250" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666" opacity="0.5">Культуры и цивилизации</text>
</svg>