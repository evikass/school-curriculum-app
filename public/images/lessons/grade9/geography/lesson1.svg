<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F2F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26A69A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="500" height="350" rx="12" fill="url(#bg)" stroke="#26A69A" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="50" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="25" width="500" height="25" fill="url(#headerGrad)"/>
  <!-- Lesson number badge -->
  <circle cx="28" cy="25" r="18" fill="#FFFFFF" opacity="0.3"/>
  <text x="28" y="31" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <!-- Title -->
  <text x="250" y="32" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Государственное устройство РФ</text>
  <!-- Decorative line -->
  <line x1="15" y1="56" x2="485" y2="56" stroke="#80CBC4" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Section: Definition -->
  <rect x="15" y="62" width="470" height="40" rx="6" fill="#FFFFFF" stroke="#26A69A" stroke-width="1"/>
  <text x="25" y="78" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A">ОПРЕДЕЛЕНИЕ:</text>
  <text x="25" y="93" font-family="Arial,sans-serif" font-size="10" fill="#333333">Россия — федеративное государство (смешанная республика), 89 субъектов федерации</text>
  <!-- Stylized Russia map outline -->
  <g transform="translate(20, 110)">
    <rect x="0" y="0" width="200" height="100" rx="8" fill="#E0F2F1" stroke="#26A69A" stroke-width="1"/>
    <text x="100" y="18" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#26A69A" text-anchor="middle">КАРТА-СХЕМА РФ</text>
    <!-- Simplified Russia shape -->
    <path d="M30,75 L50,35 L70,30 L90,25 L110,28 L130,35 L150,30 L170,40 L185,55 L175,70 L155,75 L135,70 L115,72 L95,68 L75,72 L55,78 L35,80 Z" fill="#26A69A" opacity="0.3" stroke="#26A69A" stroke-width="1"/>
    <!-- Mark Moscow -->
    <circle cx="95" cy="55" r="4" fill="#00796B"/>
    <text x="95" y="53" font-family="Arial,sans-serif" font-size="7" fill="#00796B" text-anchor="middle">М</text>
    <!-- Federal districts markers -->
    <circle cx="85" cy="50" r="2" fill="#E53935"/>
    <circle cx="130" cy="45" r="2" fill="#E53935"/>
    <circle cx="155" cy="55" r="2" fill="#E53935"/>
    <text x="100" y="92" font-family="Arial,sans-serif" font-size="7" fill="#666666" text-anchor="middle">● — центры федеральных округов</text>
  </g>
  <!-- Types of subjects -->
  <g transform="translate(235, 110)">
    <rect x="0" y="0" width="250" height="100" rx="8" fill="#FFFFFF" stroke="#26A69A" stroke-width="1"/>
    <text x="125" y="18" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A" text-anchor="middle">ТИПЫ СУБЪЕКТОВ РФ</text>
    <rect x="10" y="25" width="12" height="10" rx="2" fill="#26A69A"/>
    <text x="28" y="34" font-family="Arial,sans-serif" font-size="9" fill="#333333">Республики — 24</text>
    <rect x="10" y="40" width="12" height="10" rx="2" fill="#80CBC4"/>
    <text x="28" y="49" font-family="Arial,sans-serif" font-size="9" fill="#333333">Края — 9</text>
    <rect x="10" y="55" width="12" height="10" rx="2" fill="#FF8A65"/>
    <text x="28" y="64" font-family="Arial,sans-serif" font-size="9" fill="#333333">Области — 48</text>
    <rect x="130" y="25" width="12" height="10" rx="2" fill="#7E57C2"/>
    <text x="148" y="34" font-family="Arial,sans-serif" font-size="9" fill="#333333">Города фед. знач. — 3</text>
    <rect x="130" y="40" width="12" height="10" rx="2" fill="#FFB74D"/>
    <text x="148" y="49" font-family="Arial,sans-serif" font-size="9" fill="#333333">Авт. область — 1</text>
    <rect x="130" y="55" width="12" height="10" rx="2" fill="#A1887F"/>
    <text x="148" y="64" font-family="Arial,sans-serif" font-size="9" fill="#333333">Авт. округа — 4</text>
    <!-- Bar chart -->
    <rect x="20" y="78" width="96" height="8" rx="2" fill="#26A69A" opacity="0.7"/>
    <rect x="20" y="78" width="72" height="8" rx="2" fill="#80CBC4"/>
    <text x="20" y="93" font-family="Arial,sans-serif" font-size="7" fill="#666666">Состав Конституции РФ, ст. 65</text>
  </g>
  <!-- Key facts -->
  <rect x="15" y="220" width="470" height="55" rx="6" fill="#FFFFFF" stroke="#26A69A" stroke-width="1"/>
  <text x="25" y="237" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A">КЛЮЧЕВЫЕ ФАКТЫ:</text>
  <text x="25" y="252" font-family="Arial,sans-serif" font-size="9" fill="#333333">• Столица — Москва  • Глава государства — Президент  • Парламент — Федеральное Собрание</text>
  <text x="25" y="267" font-family="Arial,sans-serif" font-size="9" fill="#333333">• Конституция принята 12 декабря 1993 г.  • Государственный язык — русский</text>
  <!-- Structure diagram -->
  <rect x="15" y="282" width="470" height="58" rx="6" fill="#E0F2F1" stroke="#26A69A" stroke-width="1"/>
  <text x="250" y="298" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A" text-anchor="middle">СТРУКТУРА ВЛАСТИ</text>
  <!-- President -->
  <rect x="195" y="303" width="110" height="18" rx="4" fill="#26A69A" opacity="0.9"/>
  <text x="250" y="316" font-family="Arial,sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">Президент</text>
  <!-- Branches -->
  <line x1="220" y1="321" x2="120" y2="328" stroke="#26A69A" stroke-width="1"/>
  <line x1="250" y1="321" x2="250" y2="328" stroke="#26A69A" stroke-width="1"/>
  <line x1="280" y1="321" x2="380" y2="328" stroke="#26A69A" stroke-width="1"/>
  <rect x="70" y="326" width="100" height="12" rx="3" fill="#80CBC4"/>
  <text x="120" y="335" font-family="Arial,sans-serif" font-size="7" fill="#333333" text-anchor="middle">Законодательная</text>
  <rect x="195" y="326" width="110" height="12" rx="3" fill="#80CBC4"/>
  <text x="250" y="335" font-family="Arial,sans-serif" font-size="7" fill="#333333" text-anchor="middle">Исполнительная</text>
  <rect x="330" y="326" width="100" height="12" rx="3" fill="#80CBC4"/>
  <text x="380" y="335" font-family="Arial,sans-serif" font-size="7" fill="#333333" text-anchor="middle">Судебная</text>
</svg>