<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F2F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26A69A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00796B;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="0" y="0" width="500" height="350" rx="12" fill="url(#bg)" stroke="#26A69A" stroke-width="2"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="50" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="25" width="500" height="25" fill="url(#headerGrad)"/>
  <!-- Lesson number badge -->
  <circle cx="28" cy="25" r="18" fill="#FFFFFF" opacity="0.3"/>
  <text x="28" y="31" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
  <!-- Title -->
  <text x="250" y="32" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Численность и размещение населения</text>
  <!-- Decorative line -->
  <line x1="15" y1="56" x2="485" y2="56" stroke="#80CBC4" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Key stat -->
  <rect x="15" y="62" width="470" height="30" rx="6" fill="#26A69A" opacity="0.15"/>
  <text x="250" y="82" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#26A69A" text-anchor="middle">Население России: ~146 млн чел. (2024)</text>
  <!-- Population density map concept -->
  <g transform="translate(15, 98)">
    <rect x="0" y="0" width="235" height="130" rx="8" fill="#FFFFFF" stroke="#26A69A" stroke-width="1"/>
    <text x="117" y="17" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A" text-anchor="middle">ПЛОТНОСТЬ НАСЕЛЕНИЯ</text>
    <!-- Density zones -->
    <rect x="10" y="25" width="80" height="25" rx="4" fill="#26A69A" opacity="0.8"/>
    <text x="50" y="38" font-family="Arial,sans-serif" font-size="7" fill="#FFF" text-anchor="middle">Европейская</text>
    <text x="50" y="47" font-family="Arial,sans-serif" font-size="7" fill="#FFF" text-anchor="middle">часть</text>
    <rect x="95" y="25" width="60" height="25" rx="4" fill="#80CBC4"/>
    <text x="125" y="42" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Урал</text>
    <rect x="160" y="25" width="65" height="25" rx="4" fill="#E0E0E0"/>
    <text x="192" y="38" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Сибирь и</text>
    <text x="192" y="47" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Д. Восток</text>
    <!-- Density values -->
    <text x="50" y="65" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#26A69A" text-anchor="middle">27 чел/км²</text>
    <text x="125" y="65" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#00796B" text-anchor="middle">8 чел/км²</text>
    <text x="192" y="65" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#999" text-anchor="middle">2 чел/км²</text>
    <!-- Bar chart -->
    <text x="117" y="85" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#26A69A" text-anchor="middle">Ср. плотность: 8,57 чел/км²</text>
    <rect x="15" y="92" width="205" height="8" rx="3" fill="#EEEEEE"/>
    <rect x="15" y="92" width="120" height="8" rx="3" fill="#26A69A" opacity="0.7"/>
    <rect x="15" y="103" width="205" height="8" rx="3" fill="#EEEEEE"/>
    <rect x="15" y="103" width="35" height="8" rx="3" fill="#80CBC4"/>
    <rect x="15" y="114" width="205" height="8" rx="3" fill="#EEEEEE"/>
    <rect x="15" y="114" width="9" height="8" rx="3" fill="#BDBDBD"/>
    <text x="225" y="99" font-family="Arial,sans-serif" font-size="7" fill="#666">Европа</text>
    <text x="225" y="110" font-family="Arial,sans-serif" font-size="7" fill="#666">Урал</text>
    <text x="225" y="121" font-family="Arial,sans-serif" font-size="7" fill="#666">Азия</text>
  </g>
  <!-- Urban vs Rural -->
  <g transform="translate(260, 98)">
    <rect x="0" y="0" width="225" height="130" rx="8" fill="#FFFFFF" stroke="#26A69A" stroke-width="1"/>
    <text x="112" y="17" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A" text-anchor="middle">ГОРОДСКОЕ И СЕЛЬСКОЕ</text>
    <!-- Pie chart approximation -->
    <circle cx="80" cy="70" r="35" fill="#26A69A" opacity="0.2"/>
    <path d="M80,70 L80,35 A35,35 0 0,1 108,90 Z" fill="#26A69A" opacity="0.8"/>
    <text x="85" y="58" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#FFF" text-anchor="middle">74%</text>
    <text x="70" y="82" font-family="Arial,sans-serif" font-size="9" fill="#00796B" text-anchor="middle">26%</text>
    <!-- Legend -->
    <rect x="130" y="42" width="12" height="10" rx="2" fill="#26A69A" opacity="0.8"/>
    <text x="148" y="51" font-family="Arial,sans-serif" font-size="9" fill="#333">Городское</text>
    <rect x="130" y="60" width="12" height="10" rx="2" fill="#26A69A" opacity="0.2"/>
    <text x="148" y="69" font-family="Arial,sans-serif" font-size="9" fill="#333">Сельское</text>
    <!-- Largest cities -->
    <text x="112" y="100" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#26A69A" text-anchor="middle">Крупнейшие города:</text>
    <text x="112" y="112" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Москва (13 млн) | С.-Петербург (5,6 млн)</text>
    <text x="112" y="123" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Новосибирск (1,6 млн) | Екатеринбург (1,5 млн)</text>
  </g>
  <!-- Key facts -->
  <rect x="15" y="236" width="470" height="104" rx="6" fill="#E0F2F1" stroke="#26A69A" stroke-width="1"/>
  <text x="25" y="253" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#26A69A">ЗАКОНОМЕРНОСТИ РАЗМЕЩЕНИЯ:</text>
  <text x="25" y="269" font-family="Arial,sans-serif" font-size="9" fill="#333">• 80% населения живёт в европейской части (зона благоприятного климата)</text>
  <text x="25" y="283" font-family="Arial,sans-serif" font-size="9" fill="#333">• Главная полоса расселения — треугольник Москва–Сочи–Омск</text>
  <text x="25" y="297" font-family="Arial,sans-serif" font-size="9" fill="#333">• Естественная убыль компенсируется миграционным приростом</text>
  <text x="25" y="311" font-family="Arial,sans-serif" font-size="9" fill="#333">• Демографический кризис: низкая рождаемость, старение населения</text>
  <text x="25" y="325" font-family="Arial,sans-serif" font-size="9" fill="#333">• Коэффициент демографической нагрузки: ~60 зависимых на 100 трудоспособных</text>
</svg>