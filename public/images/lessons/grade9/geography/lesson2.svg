<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#E3F2FD"/>
  <!-- UN Building -->
  <g transform="translate(80,40)">
    <!-- Building tower -->
    <rect x="20" y="30" width="40" height="130" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5"/>
    <!-- Windows grid -->
    <line x1="30" y1="30" x2="30" y2="160" stroke="#B0BEC5" stroke-width="0.5"/>
    <line x1="40" y1="30" x2="40" y2="160" stroke="#B0BEC5" stroke-width="0.5"/>
    <line x1="50" y1="30" x2="50" y2="160" stroke="#B0BEC5" stroke-width="0.5"/>
    <line x1="20" y1="50" x2="60" y2="50" stroke="#B0BEC5" stroke-width="0.5"/>
    <line x1="20" y1="70" x2="60" y2="70" stroke="#B0BEC5" stroke-width="0.5"/>
    <line x1="20" y1="90" x2="60" y2="90" stroke="#B0BEC5" stroke-width="0.5"/>
    <line x1="20" y1="110" x2="60" y2="110" stroke="#B0BEC5" stroke-width="0.5"/>
    <line x1="20" y1="130" x2="60" y2="130" stroke="#B0BEC5" stroke-width="0.5"/>
    <line x1="20" y1="150" x2="60" y2="150" stroke="#B0BEC5" stroke-width="0.5"/>
    <!-- Lower wing -->
    <rect x="-10" y="130" width="100" height="30" fill="#CFD8DC" stroke="#90A4AE" stroke-width="1"/>
    <!-- UN emblem - simplified olive branches -->
    <circle cx="40" cy="20" r="14" fill="#1565C0" opacity="0.9"/>
    <circle cx="40" cy="20" r="10" fill="none" stroke="white" stroke-width="1"/>
    <!-- World map in emblem -->
    <path d="M35,17 Q38,14 42,16 Q44,18 42,22 Q40,24 37,22 Q34,20 35,17" fill="white" opacity="0.8"/>
    <path d="M42,16 Q45,15 46,18" stroke="white" stroke-width="0.8" fill="none" opacity="0.8"/>
    <text x="40" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" font-weight="bold">ООН</text>
    <text x="40" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">193 члена, 1945</text>
  </g>
  <!-- Network of organizations -->
  <!-- Central node -->
  <circle cx="250" cy="80" r="25" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" font-weight="bold">Между-</text>
  <text x="250" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" font-weight="bold">народные</text>
  <!-- EU node -->
  <circle cx="380" cy="50" r="22" fill="#FF9800" opacity="0.2" stroke="#FF9800" stroke-width="1.5"/>
  <text x="380" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">ЕС</text>
  <text x="380" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#888">27 стран</text>
  <line x1="275" y1="72" x2="358" y2="52" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- NATO node -->
  <circle cx="410" cy="120" r="22" fill="#F44336" opacity="0.2" stroke="#F44336" stroke-width="1.5"/>
  <text x="410" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">НАТО</text>
  <text x="410" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#888">32 страны</text>
  <line x1="275" y1="85" x2="388" y2="112" stroke="#F44336" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- WTO node -->
  <circle cx="350" cy="180" r="20" fill="#4CAF50" opacity="0.2" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="350" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">ВТО</text>
  <text x="350" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#888">Торговля</text>
  <line x1="265" y1="95" x2="335" y2="168" stroke="#4CAF50" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- UNESCO node -->
  <circle cx="440" cy="180" r="20" fill="#9C27B0" opacity="0.2" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="440" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" font-weight="bold">ЮНЕСКО</text>
  <text x="440" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#888">Культура</text>
  <line x1="275" y1="90" x2="420" y2="172" stroke="#9C27B0" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- CIS/EAEU node -->
  <circle cx="160" cy="150" r="20" fill="#795548" opacity="0.2" stroke="#795548" stroke-width="1.5"/>
  <text x="160" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#4E342E" font-weight="bold">СНГ</text>
  <text x="160" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#888">ЕАЭС</text>
  <line x1="230" y1="95" x2="175" y2="138" stroke="#795548" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- ASEAN node -->
  <circle cx="180" cy="220" r="20" fill="#00BCD4" opacity="0.2" stroke="#00BCD4" stroke-width="1.5"/>
  <text x="180" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#006064" font-weight="bold">АСЕАН</text>
  <text x="180" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#888">Ю-В Азия</text>
  <line x1="235" y1="100" x2="190" y2="205" stroke="#00BCD4" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- G20 node -->
  <circle cx="290" cy="220" r="20" fill="#FFEB3B" opacity="0.2" stroke="#F9A825" stroke-width="1.5"/>
  <text x="290" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold">G20</text>
  <text x="290" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#888">Экономики</text>
  <line x1="260" y1="100" x2="282" y2="205" stroke="#F9A825" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Categories box -->
  <rect x="20" y="255" width="460" height="70" rx="5" fill="white" opacity="0.85"/>
  <text x="250" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#333" font-weight="bold">Типы организаций</text>
  <circle cx="45" cy="290" r="4" fill="#1565C0"/>
  <text x="55" y="293" font-family="Arial,sans-serif" font-size="7" fill="#333">Универсальные: ООН</text>
  <circle cx="185" cy="290" r="4" fill="#FF9800"/>
  <text x="195" y="293" font-family="Arial,sans-serif" font-size="7" fill="#333">Экономические: ВТО, МВФ, G20</text>
  <circle cx="45" cy="310" r="4" fill="#F44336"/>
  <text x="55" y="313" font-family="Arial,sans-serif" font-size="7" fill="#333">Военные: НАТО, ОДКБ</text>
  <circle cx="185" cy="310" r="4" fill="#00BCD4"/>
  <text x="195" y="313" font-family="Arial,sans-serif" font-size="7" fill="#333">Региональные: ЕС, АСЕАН, АУ</text>
  <circle cx="375" cy="290" r="4" fill="#795548"/>
  <text x="385" y="293" font-family="Arial,sans-serif" font-size="7" fill="#333">СНГ, ЕАЭС</text>
  <text x="250" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666" opacity="0.5">Международные организации</text>
</svg>