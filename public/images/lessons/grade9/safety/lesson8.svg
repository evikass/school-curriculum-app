<circle cx="26" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Половодье — сезонное (весной)</text>
<circle cx="26" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Паводок — от ливней, быстрый подъём</text>
<circle cx="26" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Затор — ледяные пробки на реке</text>
<circle cx="26" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Зажор — подледный затор русла</text>
<circle cx="26" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Ветровой нагон — у морского побережья</text>
<rect x="250" y="55" width="238" height="115" rx="8" ry="8" fill="url(#card8)" filter="url(#sh8)"/>
<rect x="250" y="55" width="238" height="115" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
