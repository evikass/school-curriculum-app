<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0288D1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#01579B;stop-opacity:0.25"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs8)"/>
  <!-- Waves -->
  <path d="M0,120 Q50,100 100,120 Q150,140 200,120 Q250,100 300,120 Q350,140 400,120 Q450,100 500,120" fill="none" stroke="#4FC3F7" stroke-width="2.5" opacity="0.5"/>
  <path d="M0,140 Q50,120 100,140 Q150,160 200,140 Q250,120 300,140 Q350,160 400,140 Q450,120 500,140" fill="#0288D1" opacity="0.12"/>
  <path d="M0,280 Q50,260 100,280 Q150,300 200,280 Q250,260 300,280 Q350,300 400,280 Q450,260 500,280" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.3"/>
  <!-- Swimmer -->
  <g transform="translate(150,70)">
    <circle cx="25" cy="12" r="10" fill="#4FC3F7"/>
    <line x1="18" y1="20" x2="-5" y2="30" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="20" x2="38" y2="8" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
    <path d="M15,25 Q8,45 12,60" fill="none" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Life buoy -->
  <g transform="translate(320,50)">
    <circle cx="35" cy="35" r="30" fill="none" stroke="#F44336" stroke-width="8" opacity="0.3"/>
    <circle cx="35" cy="35" r="18" fill="none" stroke="#fff" stroke-width="2" opacity="0.15"/>
  </g>
  <!-- Warning flag -->
  <g transform="translate(50,170)">
    <rect x="0" y="0" width="4" height="80" fill="#FFC107" opacity="0.4"/>
    <polygon points="4,0 50,15 4,30" fill="#FFC107" opacity="0.3"/>
  </g>
  <!-- Person in water (distress) -->
  <g transform="translate(300,170)">
    <circle cx="20" cy="15" r="8" fill="#FF9800" opacity="0.5"/>
    <line x1="20" y1="23" x2="20" y2="45" stroke="#FF9800" stroke-width="2.5" opacity="0.5"/>
    <line x1="20" y1="30" x2="5" y2="20" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
    <line x1="20" y1="30" x2="35" y2="20" stroke="#FF9800" stroke-width="2" opacity="0.5"/>
    <path d="M0,50 Q20,40 40,50 Q60,60 80,50" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- No diving sign -->
  <g transform="translate(400,200)">
    <circle cx="25" cy="25" r="22" fill="none" stroke="#F44336" stroke-width="2" opacity="0.4"/>
    <line x1="10" y1="10" x2="40" y2="40" stroke="#F44336" stroke-width="2" opacity="0.4"/>
    <path d="M15,30 Q20,15 30,20" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
    <line x1="18" y1="25" x2="25" y2="15" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Безопасность на воде</text>
</svg>