<circle cx="264" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Резкий подъём уровня воды в реке</text>
<circle cx="264" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Ливневые дожди несколько дней подряд</text>
<circle cx="264" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Предупреждения МЧС по ТВ и радио</text>
<circle cx="264" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Быстрое таяние снега в горах выше</text>
<circle cx="264" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Таяние льда на реках весной — опасно</text>
<line x1="15" y1="175" x2="485" y2="175" stroke="#EF5350" stroke-width="0.4" opacity="0.15" stroke-dasharray="4,3"/>
<rect x="12" y="182" width="230" height="145" rx="8" ry="8" fill="url(#card8)" filter="url(#sh8)"/>
<rect x="12" y="182" width="230" height="145" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="185" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="199" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Действия при наводнении</text>
<line x1="22" y1="207" x2="232" y2="207" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="216" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="219" font-family="Arial,sans-serif" font-size="9" fill="#333333">1. Отключите электричество и газ</text>
<circle cx="26" cy="231" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="234" font-family="Arial,sans-serif" font-size="9" fill="#333333">2. Возьмите документы и запас еды</text>
<circle cx="26" cy="246" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="249" font-family="Arial,sans-serif" font-size="9" fill="#333333">3. Поднимитесь на верхние этажи/чердак</text>
<circle cx="26" cy="261" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="264" font-family="Arial,sans-serif" font-size="9" fill="#333333">4. Не пытайтесь плыть самостоятельно!</text>
<circle cx="26" cy="276" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="279" font-family="Arial,sans-serif" font-size="9" fill="#333333">5. Дождитесь помощи спасателей МЧС</text>
<circle cx="26" cy="291" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="294" font-family="Arial,sans-serif" font-size="9" fill="#333333">6. Сигнализируйте о себе (фонарь, ткань)</text>
<circle cx="26" cy="306" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="309" font-family="Arial,sans-serif" font-size="9" fill="#333333">7. Не пейте загрязнённую воду!</text>
<rect x="250" y="182" width="238" height="145" rx="8" ry="8" fill="url(#card8)" filter="url(#sh8)"/>
<rect x="250" y="182" width="238" height="145" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="185" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="199" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">После наводнения</text>
<line x1="260" y1="207" x2="478" y2="207" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="216" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="219" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не возвращайтесь домой без разрешения</text>
<circle cx="264" cy="231" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="234" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не включайте электричество — проверка!</text>
<circle cx="264" cy="246" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="249" font-family="Arial,sans-serif" font-size="9" fill="#333333">Осторожно: ямы, провалы, обрывы дорог</text>
<circle cx="264" cy="261" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="264" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не ешьте продукты из затопленных мест</text>
<circle cx="264" cy="276" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="279" font-family="Arial,sans-serif" font-size="9" fill="#333333">Продезинфицируйте помещение полностью</text>
<circle cx="264" cy="291" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="294" font-family="Arial,sans-serif" font-size="9" fill="#333333">Проверьте фундамент и конструкции дома</text>
<circle cx="264" cy="306" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="309" font-family="Arial,sans-serif" font-size="9" fill="#333333">Обратитесь в МЧС за помощью: 112</text>
