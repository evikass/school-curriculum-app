<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="hdr5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C62828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEBEE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.65"/>
    </linearGradient>
    <filter id="sh5" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow5" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
<rect width="500" height="350" fill="url(#bg5)"/>
<circle cx="0" cy="0" r="60" fill="#EF5350" opacity="0.04"/>
<circle cx="500" cy="350" r="80" fill="#EF5350" opacity="0.04"/>
<circle cx="500" cy="0" r="40" fill="#C62828" opacity="0.03"/>
<rect x="2" y="2" width="496" height="346" rx="12" ry="12" fill="none" stroke="#EF5350" stroke-width="2.5" opacity="0.5"/>
<rect x="3" y="3" width="494" height="44" rx="10" ry="10" fill="url(#hdr5)"/>
<rect x="3" y="37" width="494" height="10" fill="url(#hdr5)"/>
<circle cx="28" cy="25" r="15" fill="#FFFFFF" opacity="0.25"/>
<circle cx="28" cy="25" r="12" fill="#FFFFFF" opacity="0.15"/>
<text x="28" y="29" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
<text x="250" y="22" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Действия при пожаре</text>
<text x="250" y="38" font-family="Arial,sans-serif" font-size="10" fill="#FFEBEE" text-anchor="middle">ОБЖ — Урок 5</text>
<line x1="10" y1="50" x2="490" y2="50" stroke="#EF5350" stroke-width="0.5" opacity="0.3"/>
<rect x="3" y="335" width="494" height="12" rx="0" ry="0" fill="#C62828" opacity="0.08"/>
<text x="250" y="344" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" opacity="0.5">9 класс — Основы безопасности жизнедеятельности</text>
<rect x="452" y="62" width="20" height="16" rx="3" fill="#EF5350" opacity="0.4"/>
<text x="462" y="72" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">112</text>
<rect x="12" y="55" width="230" height="115" rx="8" ry="8" fill="url(#card5)" filter="url(#sh5)"/>
<rect x="12" y="55" width="230" height="115" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="58" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">При обнаружении пожара</text>
<line x1="22" y1="80" x2="232" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">1. Вызовите пожарных: 101 или 112</text>
<circle cx="26" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">2. Оповестите окружающих о пожаре</text>
<circle cx="26" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">3. Не паникуйте — действуйте чётко!</text>
<circle cx="26" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">4. Попробуйте локализовать огонь</text>
<circle cx="26" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">5. Дым опаснее огня — ползите!</text>
<rect x="250" y="55" width="238" height="115" rx="8" ry="8" fill="url(#card5)" filter="url(#sh5)"/>
<rect x="250" y="55" width="238" height="115" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="58" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Эвакуация из здания</text>
<line x1="260" y1="80" x2="478" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Идите к ближайшему выходу спокойно</text>
<circle cx="264" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не пользуйтесь лифтом — никогда!</text>
<circle cx="264" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Прикройте двери за собой</text>
<circle cx="264" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Смочите ткань и дышите через неё</text>
<circle cx="264" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Двигайтесь пригнувшись или ползком</text>
<line x1="15" y1="175" x2="485" y2="175" stroke="#EF5350" stroke-width="0.4" opacity="0.15" stroke-dasharray="4,3"/>
<rect x="12" y="182" width="230" height="145" rx="8" ry="8" fill="url(#card5)" filter="url(#sh5)"/>
<rect x="12" y="182" width="230" height="145" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="185" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="199" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Если выход отрезан огнём</text>
<line x1="22" y1="207" x2="232" y2="207" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="216" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="219" font-family="Arial,sans-serif" font-size="9" fill="#333333">Вернитесь в безопасное помещение</text>
<circle cx="26" cy="231" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="234" font-family="Arial,sans-serif" font-size="9" fill="#333333">Закройте дверь, заткните щели тряпкой</text>
<circle cx="26" cy="246" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="249" font-family="Arial,sans-serif" font-size="9" fill="#333333">Откройте окно — зовите на помощь</text>
<circle cx="26" cy="261" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="264" font-family="Arial,sans-serif" font-size="9" fill="#333333">Мокрая ткань на лицо от угарного газа</text>
<circle cx="26" cy="276" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="279" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не прыгайте из окон (выше 3 этажа)</text>
<circle cx="26" cy="291" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="294" font-family="Arial,sans-serif" font-size="9" fill="#333333">Ждите спасателей у окна на полу</text>
<circle cx="26" cy="306" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="309" font-family="Arial,sans-serif" font-size="9" fill="#333333">Сигнальте: махайте яркой тканью</text>
<rect x="250" y="182" width="238" height="145" rx="8" ry="8" fill="url(#card5)" filter="url(#sh5)"/>
<rect x="250" y="182" width="238" height="145" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="185" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="199" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Звонок в пожарную охрану</text>
<line x1="260" y1="207" x2="478" y2="207" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="216" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="219" font-family="Arial,sans-serif" font-size="9" fill="#333333">Наберите 101 или 112 с мобильного</text>
<circle cx="264" cy="231" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="234" font-family="Arial,sans-serif" font-size="9" fill="#333333">Назовите точный адрес объекта</text>
<circle cx="264" cy="246" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="249" font-family="Arial,sans-serif" font-size="9" fill="#333333">Укажите: что именно горит</text>
<circle cx="264" cy="261" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="264" font-family="Arial,sans-serif" font-size="9" fill="#333333">Есть ли люди в горящем здании?</text>
<circle cx="264" cy="276" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="279" font-family="Arial,sans-serif" font-size="9" fill="#333333">Ваше имя и номер телефона</text>
<circle cx="264" cy="291" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="294" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не вешайте трубку первыми!</text>
<circle cx="264" cy="306" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="309" font-family="Arial,sans-serif" font-size="9" fill="#333333">Встретьте пожарных у входа в здание</text>
</svg>