<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5722;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FF8A65;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs5)"/>
  <!-- Virus/bacteria -->
  <g transform="translate(80,60)">
    <circle cx="35" cy="35" r="25" fill="#FF5722" opacity="0.25" stroke="#FF8A65" stroke-width="2" opacity="0.5"/>
    <circle cx="35" cy="35" r="8" fill="#FF5722" opacity="0.3"/>
    <line x1="35" y1="5" x2="35" y2="0" stroke="#FF8A65" stroke-width="2" opacity="0.4"/>
    <circle cx="35" cy="0" r="3" fill="#FF8A65" opacity="0.3"/>
    <line x1="60" y1="20" x2="65" y2="15" stroke="#FF8A65" stroke-width="2" opacity="0.4"/>
    <circle cx="65" cy="15" r="3" fill="#FF8A65" opacity="0.3"/>
    <line x1="10" y1="50" x2="5" y2="55" stroke="#FF8A65" stroke-width="2" opacity="0.4"/>
    <circle cx="5" cy="55" r="3" fill="#FF8A65" opacity="0.3"/>
  </g>
  <!-- HIV ribbon -->
  <g transform="translate(250,40)">
    <path d="M30,0 L0,60 C0,60 15,50 30,30 C45,50 60,60 60,60Z" fill="#FF5722" opacity="0.3"/>
    <path d="M30,0 L60,60 C60,60 45,50 30,30 C15,50 0,60 0,60Z" fill="#FF8A65" opacity="0.2"/>
  </g>
  <!-- Condom/protection symbol -->
  <g transform="translate(370,50)">
    <path d="M20,0 Q40,0 40,20 L40,40 Q40,55 20,55 Q0,55 0,40 L0,20 Q0,0 20,0Z" fill="none" stroke="#4CAF50" stroke-width="2.5" opacity="0.4"/>
    <circle cx="20" cy="15" r="5" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Microscope -->
  <g transform="translate(200,140)">
    <rect x="15" y="0" width="20" height="60" fill="#FF8A65" opacity="0.25" rx="3"/>
    <circle cx="25" cy="65" r="12" fill="none" stroke="#FF5722" stroke-width="2" opacity="0.3"/>
    <rect x="5" y="75" width="40" height="8" fill="#FF8A65" opacity="0.2" rx="2"/>
    <line x1="35" y1="15" x2="50" y2="25" stroke="#FF8A65" stroke-width="2" opacity="0.3"/>
    <rect x="45" y="20" width="15" height="10" fill="#FF8A65" opacity="0.2" rx="2"/>
  </g>
  <!-- Warning signs -->
  <g transform="translate(60,190)">
    <polygon points="25,0 50,45 0,45" fill="none" stroke="#FFC107" stroke-width="2" opacity="0.5"/>
    <text x="25" y="38" text-anchor="middle" font-size="20" fill="#FFC107" opacity="0.5" font-family="sans-serif">!</text>
  </g>
  <!-- Shield with checkmark -->
  <g transform="translate(350,180)">
    <path d="M30,0 L60,10 L60,35 C60,50 30,60 30,60 C30,60 0,50 0,35 L0,10Z" fill="none" stroke="#4CAF50" stroke-width="2.5" opacity="0.4"/>
    <path d="M18,30 L26,38 L45,18" fill="none" stroke="#4CAF50" stroke-width="3" opacity="0.5"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">ИППП</text>
</svg>