<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B71C1C;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs11)"/>
  <!-- Shield with X -->
  <g transform="translate(30,30)">
    <path d="M50,0 L100,15 L100,55 C100,85 50,100 50,100 C50,100 0,85 0,55 L0,15Z" fill="none" stroke="#EF5350" stroke-width="3" opacity="0.4"/>
    <line x1="25" y1="30" x2="75" y2="70" stroke="#F44336" stroke-width="4" opacity="0.4"/>
    <line x1="75" y1="30" x2="25" y2="70" stroke="#F44336" stroke-width="4" opacity="0.4"/>
  </g>
  <!-- Suspicious package -->
  <g transform="translate(200,50)">
    <rect x="0" y="10" width="60" height="45" fill="#795548" opacity="0.3" rx="3"/>
    <line x1="0" y1="10" x2="60" y2="10" stroke="#5D4037" stroke-width="2" opacity="0.3"/>
    <circle cx="30" cy="35" r="8" fill="none" stroke="#F44336" stroke-width="2" opacity="0.4"/>
    <line x1="22" y1="35" x2="38" y2="35" stroke="#F44336" stroke-width="1.5" opacity="0.4"/>
    <line x1="30" y1="27" x2="30" y2="43" stroke="#F44336" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Hands up (surrender) -->
  <g transform="translate(330,40)">
    <circle cx="30" cy="15" r="12" fill="#EF5350" opacity="0.4"/>
    <line x1="30" y1="27" x2="30" y2="60" stroke="#EF5350" stroke-width="3" opacity="0.4"/>
    <line x1="30" y1="35" x2="10" y2="10" stroke="#EF5350" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="30" y1="35" x2="50" y2="10" stroke="#EF5350" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="30" y1="60" x2="18" y2="80" stroke="#EF5350" stroke-width="2.5" opacity="0.4"/>
    <line x1="30" y1="60" x2="42" y2="80" stroke="#EF5350" stroke-width="2.5" opacity="0.4"/>
  </g>
  <!-- Building -->
  <g transform="translate(80,160)">
    <rect x="0" y="20" width="80" height="80" fill="#455A64" opacity="0.2"/>
    <rect x="10" y="30" width="15" height="12" fill="#64B5F6" opacity="0.15"/>
    <rect x="35" y="30" width="15" height="12" fill="#64B5F6" opacity="0.15"/>
    <rect x="55" y="30" width="15" height="12" fill="#64B5F6" opacity="0.15"/>
    <rect x="10" y="50" width="15" height="12" fill="#64B5F6" opacity="0.15"/>
    <rect x="35" y="50" width="15" height="12" fill="#64B5F6" opacity="0.15"/>
    <rect x="55" y="50" width="15" height="12" fill="#64B5F6" opacity="0.15"/>
    <rect x="30" y="70" width="20" height="30" fill="#455A64" opacity="0.15"/>
  </g>
  <!-- Police badge -->
  <g transform="translate(300,160)">
    <polygon points="30,0 38,20 60,20 42,32 48,55 30,40 12,55 18,32 0,20 22,20" fill="none" stroke="#EF5350" stroke-width="2" opacity="0.4"/>
    <text x="30" y="35" text-anchor="middle" font-size="10" fill="#EF5350" opacity="0.4" font-family="sans-serif">02</text>
  </g>
  <!-- Phone -->
  <g transform="translate(400,170)">
    <rect x="0" y="0" width="35" height="55" fill="#B71C1C" opacity="0.15" rx="5"/>
    <text x="17" y="30" text-anchor="middle" font-size="10" fill="#EF5350" opacity="0.5" font-family="sans-serif">102</text>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Терроризм</text>
</svg>