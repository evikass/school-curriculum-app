<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs7)"/>
  <!-- Traffic light -->
  <g transform="translate(50,30)">
    <rect x="10" y="0" width="30" height="90" fill="#455A64" opacity="0.4" rx="8"/>
    <circle cx="25" cy="18" r="10" fill="#F44336" opacity="0.6"/>
    <circle cx="25" cy="45" r="10" fill="#FFC107" opacity="0.3"/>
    <circle cx="25" cy="72" r="10" fill="#4CAF50" opacity="0.3"/>
    <rect x="22" y="90" width="6" height="60" fill="#455A64" opacity="0.3"/>
  </g>
  <!-- Zebra crossing -->
  <g transform="translate(150,220)">
    <rect x="0" y="0" width="300" height="12" fill="#FFB74D" opacity="0.15"/>
    <rect x="0" y="0" width="35" height="12" fill="#fff" opacity="0.2"/>
    <rect x="50" y="0" width="35" height="12" fill="#fff" opacity="0.2"/>
    <rect x="100" y="0" width="35" height="12" fill="#fff" opacity="0.2"/>
    <rect x="150" y="0" width="35" height="12" fill="#fff" opacity="0.2"/>
    <rect x="200" y="0" width="35" height="12" fill="#fff" opacity="0.2"/>
    <rect x="250" y="0" width="35" height="12" fill="#fff" opacity="0.2"/>
  </g>
  <!-- Pedestrian figure -->
  <g transform="translate(260,150)">
    <circle cx="15" cy="10" r="9" fill="#FF9800"/>
    <line x1="15" y1="19" x2="15" y2="50" stroke="#FF9800" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="30" x2="5" y2="42" stroke="#FF9800" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="30" x2="25" y2="42" stroke="#FF9800" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="50" x2="5" y2="70" stroke="#FF9800" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="15" y1="50" x2="25" y2="70" stroke="#FF9800" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Car -->
  <g transform="translate(140,130)">
    <rect x="0" y="15" width="70" height="30" fill="#FF9800" opacity="0.3" rx="5"/>
    <rect x="10" y="5" width="45" height="18" fill="#FFB74D" opacity="0.25" rx="4"/>
    <circle cx="15" cy="48" r="8" fill="#455A64" opacity="0.3"/>
    <circle cx="55" cy="48" r="8" fill="#455A64" opacity="0.3"/>
  </g>
  <!-- Bicycle -->
  <g transform="translate(360,160)">
    <circle cx="15" cy="40" r="15" fill="none" stroke="#FFB74D" stroke-width="2" opacity="0.4"/>
    <circle cx="55" cy="40" r="15" fill="none" stroke="#FFB74D" stroke-width="2" opacity="0.4"/>
    <line x1="15" y1="40" x2="35" y2="15" stroke="#FFB74D" stroke-width="2" opacity="0.3"/>
    <line x1="35" y1="15" x2="55" y2="40" stroke="#FFB74D" stroke-width="2" opacity="0.3"/>
    <circle cx="35" cy="12" r="5" fill="#FF9800" opacity="0.3"/>
  </g>
  <!-- Stop distance lines -->
  <g transform="translate(150,260)">
    <line x1="0" y1="10" x2="120" y2="10" stroke="#FF9800" stroke-width="2" opacity="0.4"/>
    <polygon points="120,10 112,5 112,15" fill="#FF9800" opacity="0.4"/>
    <text x="60" y="8" text-anchor="middle" font-size="7" fill="#FFB74D" opacity="0.5" font-family="sans-serif">ТОРМОЗНОЙ ПУТЬ</text>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Безопасность на дорогах</text>
</svg>