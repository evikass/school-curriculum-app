<text x="369" y="205" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Пешеходные правила</text>
<line x1="260" y1="213" x2="478" y2="213" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="222" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="225" font-family="Arial,sans-serif" font-size="9" fill="#333333">Идите по тротуару или обочине</text>
<circle cx="264" cy="237" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="240" font-family="Arial,sans-serif" font-size="9" fill="#333333">Нет тротуара — навстречу транспорту</text>
<circle cx="264" cy="252" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="255" font-family="Arial,sans-serif" font-size="9" fill="#333333">Группа детей — только колонной по 2</text>
<circle cx="264" cy="267" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="270" font-family="Arial,sans-serif" font-size="9" fill="#333333">Перекрёсток — не переходить по диагонали</text>
<circle cx="264" cy="282" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="285" font-family="Arial,sans-serif" font-size="9" fill="#333333">Сначала одна сторона, затем другая</text>
<circle cx="264" cy="297" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="300" font-family="Arial,sans-serif" font-size="9" fill="#333333">Велосипедист — тоже участник движения</text>
