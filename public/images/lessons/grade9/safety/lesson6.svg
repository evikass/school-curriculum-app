<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3F51B5;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7986CB;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs6)"/>
  <!-- Shield -->
  <g transform="translate(180,30)">
    <path d="M60,0 L120,15 L120,60 C120,100 60,120 60,120 C60,120 0,100 0,60 L0,15Z" fill="none" stroke="#7986CB" stroke-width="3" opacity="0.5"/>
    <path d="M40,60 L55,75 L85,40" fill="none" stroke="#3F51B5" stroke-width="4" opacity="0.4"/>
  </g>
  <!-- Phone with 112 -->
  <g transform="translate(50,170)">
    <rect x="0" y="0" width="40" height="65" fill="#3F51B5" opacity="0.2" rx="6"/>
    <rect x="5" y="8" width="30" height="42" fill="#7986CB" opacity="0.15" rx="2"/>
    <text x="20" y="35" text-anchor="middle" font-size="12" fill="#7986CB" opacity="0.6" font-family="sans-serif">112</text>
    <circle cx="20" cy="57" r="3" fill="#7986CB" opacity="0.3"/>
  </g>
  <!-- Street scene - person walking -->
  <g transform="translate(200,150)">
    <circle cx="30" cy="10" r="9" fill="#7986CB"/>
    <line x1="30" y1="19" x2="30" y2="50" stroke="#7986CB" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="28" x2="18" y2="42" stroke="#7986CB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="28" x2="42" y2="42" stroke="#7986CB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="50" x2="18" y2="70" stroke="#7986CB" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="50" x2="42" y2="70" stroke="#7986CB" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Streetlight -->
  <g transform="translate(320,100)">
    <rect x="8" y="20" width="4" height="100" fill="#7986CB" opacity="0.3"/>
    <rect x="0" y="10" width="20" height="12" fill="#FFC107" opacity="0.3" rx="3"/>
    <circle cx="10" cy="16" r="4" fill="#FFC107" opacity="0.5"/>
  </g>
  <!-- House with door -->
  <g transform="translate(370,140)">
    <polygon points="40,0 80,30 0,30" fill="#3F51B5" opacity="0.2"/>
    <rect x="5" y="30" width="70" height="50" fill="#3F51B5" opacity="0.15"/>
    <rect x="28" y="45" width="24" height="35" fill="#7986CB" opacity="0.2" rx="2"/>
    <circle cx="48" cy="65" r="2" fill="#7986CB" opacity="0.4"/>
  </g>
  <!-- Eye (vigilance) -->
  <g transform="translate(130,250)">
    <path d="M0,20 Q30,0 60,20 Q30,40 0,20Z" fill="none" stroke="#3F51B5" stroke-width="2" opacity="0.4"/>
    <circle cx="30" cy="20" r="8" fill="#7986CB" opacity="0.3"/>
    <circle cx="30" cy="20" r="3" fill="#3F51B5" opacity="0.5"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Правила безопасного поведения</text>
</svg>