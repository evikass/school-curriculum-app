<circle cx="264" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Красный — стой! Движение запрещено</text>
<circle cx="264" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Жёлтый — внимание! Приготовиться</text>
<circle cx="264" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Зелёный — иди! Но проверь дорогу</text>
<circle cx="264" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Мигающий зелёный — не начинай переход</text>
<circle cx="264" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Таймер — следите за отсчётом секунд</text>
