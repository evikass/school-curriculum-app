<rect x="12" y="188" width="230" height="140" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="191" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="205" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Опасные ситуации на дороге</text>
<line x1="22" y1="213" x2="232" y2="213" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="222" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="225" font-family="Arial,sans-serif" font-size="9" fill="#333333">Обходить автобус — только сзади!</text>
<circle cx="26" cy="237" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="240" font-family="Arial,sans-serif" font-size="9" fill="#333333">Трамвай — обходить спереди</text>
<circle cx="26" cy="252" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="255" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не играйте у проезжей части!</text>
<circle cx="26" cy="267" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="270" font-family="Arial,sans-serif" font-size="9" fill="#333333">Тёмное время — светоотражатели!</text>
<circle cx="26" cy="282" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="285" font-family="Arial,sans-serif" font-size="9" fill="#333333">Видимость ухудшена — будьте бдительны</text>
<circle cx="26" cy="297" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="300" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не выходите из-за препятствий резко</text>
