<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="hdr6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C62828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEBEE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.65"/>
    </linearGradient>
    <filter id="sh6" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow6" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
<rect width="500" height="350" fill="url(#bg6)"/>
<circle cx="0" cy="0" r="60" fill="#EF5350" opacity="0.04"/>
