<text x="36" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Переходите только по зебре или переходу</text>
<circle cx="26" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">На красный — стой, на зелёный — иди</text>
<circle cx="26" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Посмотрите налево, потом направо</text>
<circle cx="26" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не перебегайте дорогу внезапно!</text>
<circle cx="26" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Убедитесь, что машины остановились</text>
