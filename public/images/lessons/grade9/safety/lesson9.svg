<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs9)"/>
  <!-- Trees -->
  <g transform="translate(30,40)">
    <rect x="22" y="70" width="8" height="30" fill="#5D4037" opacity="0.4"/>
    <polygon points="26,0 -5,40 57,40" fill="#2E7D32" opacity="0.35"/>
    <polygon points="26,15 -3,48 55,48" fill="#388E3C" opacity="0.3"/>
    <polygon points="26,30 0,55 52,55" fill="#43A047" opacity="0.25"/>
  </g>
  <g transform="translate(100,60)">
    <rect x="15" y="50" width="6" height="25" fill="#5D4037" opacity="0.35"/>
    <polygon points="18,0 -3,30 39,30" fill="#2E7D32" opacity="0.3"/>
    <polygon points="18,12 -1,38 37,38" fill="#388E3C" opacity="0.25"/>
  </g>
  <!-- Campfire -->
  <g transform="translate(350,170)">
    <path d="M20,50 Q10,30 20,10 Q25,25 30,15 Q35,30 40,10 Q50,30 40,50Z" fill="#FF9800" opacity="0.4"/>
    <path d="M25,50 Q18,35 25,20 Q30,30 35,25 Q38,35 35,50Z" fill="#FFC107" opacity="0.3"/>
    <rect x="10" y="50" width="40" height="5" fill="#795548" opacity="0.3" rx="1"/>
  </g>
  <!-- Tick -->
  <g transform="translate(250,80)">
    <ellipse cx="20" cy="25" rx="12" ry="18" fill="#795548" opacity="0.4"/>
    <line x1="20" y1="7" x2="20" y2="0" stroke="#795548" stroke-width="2" opacity="0.4"/>
    <line x1="20" y1="7" x2="28" y2="2" stroke="#795548" stroke-width="2" opacity="0.4"/>
    <line x1="20" y1="7" x2="12" y2="2" stroke="#795548" stroke-width="2" opacity="0.4"/>
    <circle cx="20" cy="0" r="2" fill="#F44336" opacity="0.4"/>
  </g>
  <!-- Compass -->
  <g transform="translate(200,170)">
    <circle cx="30" cy="30" r="28" fill="none" stroke="#66BB6A" stroke-width="2" opacity="0.4"/>
    <circle cx="30" cy="30" r="3" fill="#66BB6A" opacity="0.5"/>
    <polygon points="30,8 33,28 30,25 27,28" fill="#F44336" opacity="0.4"/>
    <polygon points="30,52 27,32 30,35 33,32" fill="#fff" opacity="0.2"/>
    <text x="30" y="8" text-anchor="middle" font-size="6" fill="#66BB6A" opacity="0.5" font-family="sans-serif">С</text>
    <text x="30" y="56" text-anchor="middle" font-size="6" fill="#66BB6A" opacity="0.5" font-family="sans-serif">Ю</text>
  </g>
  <!-- Mushroom (poisonous) -->
  <g transform="translate(400,70)">
    <rect x="18" y="35" width="10" height="25" fill="#ECEFF1" opacity="0.3"/>
    <ellipse cx="23" cy="35" rx="20" ry="12" fill="#F44336" opacity="0.3"/>
    <circle cx="15" cy="32" r="3" fill="#fff" opacity="0.3"/>
    <circle cx="28" cy="28" r="2.5" fill="#fff" opacity="0.3"/>
  </g>
  <!-- Mosquito/insect -->
  <g transform="translate(380,140)">
    <ellipse cx="15" cy="10" rx="6" ry="4" fill="#795548" opacity="0.3"/>
    <line x1="10" y1="8" x2="3" y2="2" stroke="#795548" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="8" x2="27" y2="2" stroke="#795548" stroke-width="1" opacity="0.3"/>
    <line x1="15" y1="14" x2="15" y2="30" stroke="#795548" stroke-width="1" opacity="0.3"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Безопасность в природе</text>
</svg>