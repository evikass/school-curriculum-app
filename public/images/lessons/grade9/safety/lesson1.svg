<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#81C784;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs1)"/>
  <!-- Heart with pulse -->
  <g transform="translate(180,50)">
    <path d="M60,20 C60,0 30,0 30,25 C30,50 60,70 60,70 C60,70 90,50 90,25 C90,0 60,0 60,20Z" fill="#4CAF50" opacity="0.4"/>
    <polyline points="20,45 35,45 42,25 50,60 58,35 65,45 100,45" fill="none" stroke="#81C784" stroke-width="2" opacity="0.7"/>
  </g>
  <!-- Apple (healthy food) -->
  <g transform="translate(60,100)">
    <circle cx="25" cy="30" r="22" fill="#4CAF50" opacity="0.5"/>
    <path d="M25,8 Q30,0 38,5" fill="none" stroke="#66BB6A" stroke-width="2"/>
    <ellipse cx="30" cy="12" rx="8" ry="5" fill="#66BB6A" opacity="0.4"/>
  </g>
  <!-- Running figure -->
  <g transform="translate(350,100)">
    <circle cx="25" cy="10" r="10" fill="#81C784"/>
    <line x1="25" y1="20" x2="25" y2="55" stroke="#81C784" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="10" y2="45" stroke="#81C784" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="40" y2="20" stroke="#81C784" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="10" y2="75" stroke="#81C784" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="42" y2="72" stroke="#81C784" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Water drop -->
  <g transform="translate(120,200)">
    <path d="M20,0 Q40,30 20,45 Q0,30 20,0Z" fill="#4FC3F7" opacity="0.4"/>
  </g>
  <!-- Bed/sleep icon -->
  <g transform="translate(300,210)">
    <rect x="0" y="15" width="80" height="30" fill="#81C784" opacity="0.3" rx="5"/>
    <rect x="5" y="5" width="25" height="12" fill="#66BB6A" opacity="0.3" rx="4"/>
    <rect x="0" y="0" width="5" height="50" fill="#4CAF50" opacity="0.3" rx="1"/>
  </g>
  <!-- Sun (wake up) -->
  <g transform="translate(430,200)">
    <circle cx="20" cy="20" r="12" fill="#FFC107" opacity="0.4"/>
    <line x1="20" y1="2" x2="20" y2="8" stroke="#FFC107" stroke-width="2" opacity="0.3"/>
    <line x1="20" y1="32" x2="20" y2="38" stroke="#FFC107" stroke-width="2" opacity="0.3"/>
    <line x1="2" y1="20" x2="8" y2="20" stroke="#FFC107" stroke-width="2" opacity="0.3"/>
    <line x1="32" y1="20" x2="38" y2="20" stroke="#FFC107" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Checklist -->
  <g transform="translate(50,270)">
    <rect x="0" y="0" width="50" height="50" fill="#4CAF50" opacity="0.1" rx="3"/>
    <line x1="10" y1="12" x2="40" y2="12" stroke="#81C784" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="25" x2="40" y2="25" stroke="#81C784" stroke-width="1.5" opacity="0.4"/>
    <line x1="10" y1="38" x2="40" y2="38" stroke="#81C784" stroke-width="1.5" opacity="0.4"/>
    <path d="M5,12 L8,15 L14,8" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Здоровый образ жизни</text>
</svg>