<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E63;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F48FB1;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs3)"/>
  <!-- Family silhouettes -->
  <g transform="translate(60,80)">
    <!-- Adult 1 -->
    <circle cx="30" cy="10" r="10" fill="#E91E63" opacity="0.5"/>
    <line x1="30" y1="20" x2="30" y2="50" stroke="#E91E63" stroke-width="3" opacity="0.5"/>
    <line x1="30" y1="28" x2="15" y2="40" stroke="#E91E63" stroke-width="2.5" opacity="0.5"/>
    <line x1="30" y1="28" x2="45" y2="40" stroke="#E91E63" stroke-width="2.5" opacity="0.5"/>
    <line x1="30" y1="50" x2="18" y2="70" stroke="#E91E63" stroke-width="2.5" opacity="0.5"/>
    <line x1="30" y1="50" x2="42" y2="70" stroke="#E91E63" stroke-width="2.5" opacity="0.5"/>
    <!-- Adult 2 -->
    <circle cx="80" cy="10" r="10" fill="#F48FB1" opacity="0.5"/>
    <line x1="80" y1="20" x2="80" y2="50" stroke="#F48FB1" stroke-width="3" opacity="0.5"/>
    <line x1="80" y1="28" x2="65" y2="40" stroke="#F48FB1" stroke-width="2.5" opacity="0.5"/>
    <line x1="80" y1="28" x2="95" y2="40" stroke="#F48FB1" stroke-width="2.5" opacity="0.5"/>
    <line x1="80" y1="50" x2="68" y2="70" stroke="#F48FB1" stroke-width="2.5" opacity="0.5"/>
    <line x1="80" y1="50" x2="92" y2="70" stroke="#F48FB1" stroke-width="2.5" opacity="0.5"/>
    <!-- Child -->
    <circle cx="55" cy="35" r="7" fill="#F06292" opacity="0.4"/>
    <line x1="55" y1="42" x2="55" y2="58" stroke="#F06292" stroke-width="2" opacity="0.4"/>
    <line x1="55" y1="48" x2="45" y2="55" stroke="#F06292" stroke-width="2" opacity="0.4"/>
    <line x1="55" y1="48" x2="65" y2="55" stroke="#F06292" stroke-width="2" opacity="0.4"/>
    <line x1="55" y1="58" x2="48" y2="70" stroke="#F06292" stroke-width="2" opacity="0.4"/>
    <line x1="55" y1="58" x2="62" y2="70" stroke="#F06292" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- Heart with baby -->
  <g transform="translate(250,50)">
    <path d="M50,25 C50,0 20,0 20,30 C20,60 50,80 50,80 C50,80 80,60 80,30 C80,0 50,0 50,25Z" fill="#E91E63" opacity="0.2" stroke="#F48FB1" stroke-width="1.5" opacity="0.4"/>
    <circle cx="50" cy="40" r="10" fill="#F06292" opacity="0.3"/>
  </g>
  <!-- Medical cross -->
  <g transform="translate(380,60)">
    <rect x="15" y="0" width="20" height="60" fill="#F48FB1" opacity="0.3" rx="3"/>
    <rect x="0" y="15" width="50" height="30" fill="#F48FB1" opacity="0.3" rx="3"/>
  </g>
  <!-- Calendar/timeline -->
  <g transform="translate(200,180)">
    <line x1="0" y1="20" x2="250" y2="20" stroke="#E91E63" stroke-width="2" opacity="0.3"/>
    <circle cx="50" cy="20" r="8" fill="#E91E63" opacity="0.3"/>
    <circle cx="130" cy="20" r="8" fill="#F06292" opacity="0.3"/>
    <circle cx="200" cy="20" r="8" fill="#F48FB1" opacity="0.3"/>
    <text x="50" y="42" font-size="7" fill="#F48FB1" opacity="0.5" text-anchor="middle" font-family="sans-serif">20 лет</text>
    <text x="130" y="42" font-size="7" fill="#F48FB1" opacity="0.5" text-anchor="middle" font-family="sans-serif">25 лет</text>
    <text x="200" y="42" font-size="7" fill="#F48FB1" opacity="0.5" text-anchor="middle" font-family="sans-serif">35 лет</text>
  </g>
  <!-- Shield protection -->
  <g transform="translate(380,180)">
    <path d="M30,0 L60,10 L60,35 C60,50 30,60 30,60 C30,60 0,50 0,35 L0,10Z" fill="none" stroke="#E91E63" stroke-width="2" opacity="0.3"/>
    <path d="M20,30 L28,38 L45,18" fill="none" stroke="#F48FB1" stroke-width="2" opacity="0.4"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Репродуктивное здоровье</text>
</svg>