<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="hdr2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C62828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEBEE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.65"/>
    </linearGradient>
    <filter id="sh2" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow2" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
<rect width="500" height="350" fill="url(#bg2)"/>
<circle cx="0" cy="0" r="60" fill="#EF5350" opacity="0.04"/>
<circle cx="500" cy="350" r="80" fill="#EF5350" opacity="0.04"/>
<circle cx="500" cy="0" r="40" fill="#C62828" opacity="0.03"/>
<rect x="2" y="2" width="496" height="346" rx="12" ry="12" fill="none" stroke="#EF5350" stroke-width="2.5" opacity="0.5"/>
<rect x="3" y="3" width="494" height="44" rx="10" ry="10" fill="url(#hdr2)"/>
<rect x="3" y="37" width="494" height="10" fill="url(#hdr2)"/>
<circle cx="28" cy="25" r="15" fill="#FFFFFF" opacity="0.25"/>
<circle cx="28" cy="25" r="12" fill="#FFFFFF" opacity="0.15"/>
<text x="28" y="29" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
<text x="250" y="22" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Бытовой газ и его опасности</text>
<text x="250" y="38" font-family="Arial,sans-serif" font-size="10" fill="#FFEBEE" text-anchor="middle">ОБЖ — Урок 2</text>
<line x1="10" y1="50" x2="490" y2="50" stroke="#EF5350" stroke-width="0.5" opacity="0.3"/>
<rect x="3" y="335" width="494" height="12" rx="0" ry="0" fill="#C62828" opacity="0.08"/>
<text x="250" y="344" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" opacity="0.5">9 класс — Основы безопасности жизнедеятельности</text>
<ellipse cx="465" cy="70" rx="10" ry="16" fill="#FF9800" opacity="0.35"/>
<ellipse cx="465" cy="75" rx="7" ry="12" fill="#FF9800" opacity="0.5"/>
<ellipse cx="465" cy="78" rx="3" ry="7" fill="#FFEB3B" opacity="0.7"/>
<rect x="12" y="55" width="230" height="115" rx="8" ry="8" fill="url(#card2)" filter="url(#sh2)"/>
<rect x="12" y="55" width="230" height="115" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="58" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Свойства бытового газа</text>
<line x1="22" y1="80" x2="232" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Природный газ — без цвета и запаха</text>
<circle cx="26" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Одорант (меркаптан) — добавка для запаха</text>
<circle cx="26" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Метан — легче воздуха (поднимается)</text>
<circle cx="26" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Пропан-бутан — тяжелее воздуха</text>
<circle cx="26" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Взрывоопасен при концентрации 5-15%</text>
<rect x="250" y="55" width="238" height="115" rx="8" ry="8" fill="url(#card2)" filter="url(#sh2)"/>
<rect x="250" y="55" width="238" height="115" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="58" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Признаки утечки газа</text>
<line x1="260" y1="80" x2="478" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Запах тухлых яиц (одорант)</text>
<circle cx="264" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Шум или свист из газовой трубы</text>
<circle cx="264" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Пламя жёлтое, а не голубое</text>
<circle cx="264" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Плачут глаза, тошнота, головокружение</text>
<circle cx="264" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Показания газоанализатора-датчика</text>
<line x1="15" y1="175" x2="485" y2="175" stroke="#EF5350" stroke-width="0.4" opacity="0.15" stroke-dasharray="4,3"/>
<rect x="12" y="182" width="230" height="145" rx="8" ry="8" fill="url(#card2)" filter="url(#sh2)"/>
<rect x="12" y="182" width="230" height="145" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="185" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="199" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">При утечке газа — ДЕЙСТВИЯ</text>
<line x1="22" y1="207" x2="232" y2="207" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="216" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="219" font-family="Arial,sans-serif" font-size="9" fill="#333333">1. Не включайте свет и приборы!</text>
<circle cx="26" cy="231" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="234" font-family="Arial,sans-serif" font-size="9" fill="#333333">2. Откройте окна и двери настежь</text>
<circle cx="26" cy="246" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="249" font-family="Arial,sans-serif" font-size="9" fill="#333333">3. Закройте вентиль газовой трубы</text>
<circle cx="26" cy="261" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="264" font-family="Arial,sans-serif" font-size="9" fill="#333333">4. Выведите людей из помещения</text>
<circle cx="26" cy="276" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="279" font-family="Arial,sans-serif" font-size="9" fill="#333333">5. Вызовите 104 (аварийная газовая)</text>
<circle cx="26" cy="291" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="294" font-family="Arial,sans-serif" font-size="9" fill="#333333">6. Не зажигайте спички и огонь!</text>
<circle cx="26" cy="306" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="309" font-family="Arial,sans-serif" font-size="9" fill="#333333">7. Не пользуйтесь телефоном в доме</text>
<circle cx="26" cy="321" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="324" font-family="Arial,sans-serif" font-size="9" fill="#333333">8. Дождитесь аварийную службу на улице</text>
<rect x="250" y="182" width="238" height="145" rx="8" ry="8" fill="url(#card2)" filter="url(#sh2)"/>
<rect x="250" y="182" width="238" height="145" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="185" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="199" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Профилактика и вентиляция</text>
<line x1="260" y1="207" x2="478" y2="207" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="216" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="219" font-family="Arial,sans-serif" font-size="9" fill="#333333">Регулярно проверяйте гибкие шланги</text>
<circle cx="264" cy="231" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="234" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не загромождайте вентиляционные каналы</text>
<circle cx="264" cy="246" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="249" font-family="Arial,sans-serif" font-size="9" fill="#333333">Установите газоанализатор (датчик)</text>
<circle cx="264" cy="261" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="264" font-family="Arial,sans-serif" font-size="9" fill="#333333">Проветривайте кухню при готовке</text>
<circle cx="264" cy="276" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="279" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не оставляйте газ без присмотра</text>
<circle cx="264" cy="291" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="294" font-family="Arial,sans-serif" font-size="9" fill="#333333">Ежегодный техосмотр оборудования</text>
<circle cx="264" cy="306" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="309" font-family="Arial,sans-serif" font-size="9" fill="#333333">Герметичность соединений — важна!</text>
</svg>