<text x="28" y="29" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">13</text>
<text x="250" y="22" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Остановка кровотечений</text>
<text x="250" y="38" font-family="Arial,sans-serif" font-size="10" fill="#FFEBEE" text-anchor="middle">Первая помощь — Урок 13</text>
<line x1="10" y1="50" x2="490" y2="50" stroke="#EF5350" stroke-width="0.5" opacity="0.3"/>
<rect x="3" y="335" width="494" height="12" rx="0" ry="0" fill="#C62828" opacity="0.08"/>
<text x="250" y="344" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" opacity="0.5">9 класс — Основы безопасности жизнедеятельности</text>
<path d="M462,66 C454,78 452,82 454,86 C456,90 462,92 462,92 C462,92 468,90 470,86 C472,82 470,78 462,66 Z" fill="#EF5350" opacity="0.45"/>
