<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00897B;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#4DB6AC;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs13)"/>
  <!-- Stethoscope -->
  <g transform="translate(60,40)">
    <path d="M10,0 L10,40 Q10,70 40,70 Q70,70 70,40" fill="none" stroke="#4DB6AC" stroke-width="3" opacity="0.4"/>
    <circle cx="10" cy="0" r="6" fill="#00897B" opacity="0.3"/>
    <circle cx="70" cy="0" r="6" fill="#00897B" opacity="0.3"/>
    <circle cx="40" cy="70" r="10" fill="#4DB6AC" opacity="0.2"/>
  </g>
  <!-- Thermometer -->
  <g transform="translate(220,30)">
    <rect x="8" y="0" width="10" height="70" fill="#4DB6AC" opacity="0.2" rx="5"/>
    <circle cx="13" cy="75" r="12" fill="#E53935" opacity="0.25"/>
    <rect x="10" y="30" width="6" height="45" fill="#E53935" opacity="0.2" rx="3"/>
    <line x1="5" y1="10" x2="5" y2="65" stroke="#4DB6AC" stroke-width="0.5" opacity="0.3"/>
    <line x1="5" y1="20" x2="8" y2="20" stroke="#4DB6AC" stroke-width="0.5" opacity="0.3"/>
    <line x1="5" y1="35" x2="8" y2="35" stroke="#4DB6AC" stroke-width="0.5" opacity="0.3"/>
    <line x1="5" y1="50" x2="8" y2="50" stroke="#4DB6AC" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Pills -->
  <g transform="translate(330,40)">
    <ellipse cx="15" cy="10" rx="14" ry="8" fill="#4DB6AC" opacity="0.3"/>
    <ellipse cx="15" cy="10" rx="14" ry="8" fill="#00897B" opacity="0.15"/>
    <line x1="15" y1="2" x2="15" y2="18" stroke="#4DB6AC" stroke-width="1" opacity="0.3"/>
    <ellipse cx="45" cy="25" rx="10" ry="6" fill="#E53935" opacity="0.2" transform="rotate(30,45,25)"/>
    <ellipse cx="35" cy="45" rx="12" ry="7" fill="#FFC107" opacity="0.2" transform="rotate(-20,35,45)"/>
  </g>
  <!-- Medical kit -->
  <g transform="translate(160,150)">
    <rect x="0" y="10" width="80" height="55" fill="#00897B" opacity="0.15" rx="5"/>
    <rect x="25" y="0" width="30" height="15" fill="#00897B" opacity="0.12" rx="3"/>
    <rect x="30" y="25" width="20" height="5" fill="#4DB6AC" opacity="0.3"/>
    <rect x="37" y="18" width="5" height="20" fill="#4DB6AC" opacity="0.3"/>
  </g>
  <!-- Syringe -->
  <g transform="translate(320,150)">
    <rect x="5" y="10" width="8" height="50" fill="#4DB6AC" opacity="0.2" rx="2"/>
    <line x1="9" y1="60" x2="9" y2="75" stroke="#4DB6AC" stroke-width="1.5" opacity="0.3"/>
    <rect x="0" y="0" width="18" height="12" fill="#4DB6AC" opacity="0.15" rx="2"/>
    <line x1="18" y1="6" x2="30" y2="6" stroke="#4DB6AC" stroke-width="2" opacity="0.2"/>
  </g>
  <!-- Blood pressure meter -->
  <g transform="translate(60,240)">
    <circle cx="30" cy="25" r="22" fill="none" stroke="#4DB6AC" stroke-width="2" opacity="0.3"/>
    <text x="30" y="28" text-anchor="middle" font-size="7" fill="#4DB6AC" opacity="0.5" font-family="sans-serif">120/80</text>
    <rect x="50" y="10" width="40" height="8" fill="#00897B" opacity="0.15" rx="2"/>
  </g>
  <!-- Hand washing -->
  <g transform="translate(300,250)">
    <path d="M20,0 Q40,5 35,25 Q30,40 20,35 Q10,40 5,25 Q0,5 20,0Z" fill="#4DB6AC" opacity="0.15"/>
    <path d="M15,15 Q20,10 25,15" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.3"/>
    <path d="M10,20 Q15,15 20,20" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.25"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Основы медицинских знаний</text>
</svg>