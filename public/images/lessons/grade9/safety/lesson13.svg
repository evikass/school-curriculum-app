<rect x="12" y="55" width="230" height="140" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="58" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Виды кровотечений</text>
<line x1="22" y1="80" x2="232" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Артериальное — алая кровь, пульсирует</text>
<circle cx="26" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Венозное — тёмная кровь, течёт ровно</text>
<circle cx="26" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Капиллярное — сочится по всей поверхности</text>
<circle cx="26" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Паренхиматозное — внутреннее, опасно!</text>
<circle cx="26" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Артериальное — самое опасное для жизни!</text>
<circle cx="26" cy="164" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="167" font-family="Arial,sans-serif" font-size="9" fill="#333333">Время: минуты до критической потери крови</text>
<rect x="250" y="55" width="238" height="140" rx="8" ry="8" fill="url(#card13)" filter="url(#sh13)"/>
<rect x="250" y="55" width="238" height="140" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="58" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Наложение жгута (закрутки)</text>
<line x1="260" y1="80" x2="478" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Выше места ранения на 5-10 см</text>
<circle cx="264" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Только при артериальном кровотечении!</text>
<circle cx="264" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Под жгут — записка со временем наложения!</text>
<circle cx="264" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Время: летом не более 1 часа</text>
<circle cx="264" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Время: зимой не более 30 минут!</text>
<circle cx="264" cy="164" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="167" font-family="Arial,sans-serif" font-size="9" fill="#333333">Ослабляйте жгут каждые 20-30 минут</text>
<circle cx="264" cy="179" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="182" font-family="Arial,sans-serif" font-size="9" fill="#333333">Жгут — крайняя мера, когда другое не помогает!</text>
<line x1="15" y1="200" x2="485" y2="200" stroke="#EF5350" stroke-width="0.4" opacity="0.15" stroke-dasharray="4,3"/>
<rect x="12" y="207" width="230" height="121" rx="8" ry="8" fill="url(#card13)" filter="url(#sh13)"/>
<rect x="12" y="207" width="230" height="121" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="210" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="224" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Давящая повязка</text>
<line x1="22" y1="232" x2="232" y2="232" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="241" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333333">Промойте рану чистой водой (если возможно)</text>
<circle cx="26" cy="256" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="259" font-family="Arial,sans-serif" font-size="9" fill="#333333">Наложите стерильную салфетку на рану</text>
<circle cx="26" cy="271" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="274" font-family="Arial,sans-serif" font-size="9" fill="#333333">Туго забинтуйте от периферии к центру</text>
<circle cx="26" cy="286" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="289" font-family="Arial,sans-serif" font-size="9" fill="#333333">Прибинтуйте валик для дополнительного давления</text>
<circle cx="26" cy="301" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="304" font-family="Arial,sans-serif" font-size="9" fill="#333333">Проверьте пульс ниже повязки — должен быть!</text>
<circle cx="26" cy="316" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="319" font-family="Arial,sans-serif" font-size="9" fill="#333333">Поднимите конечность выше уровня сердца</text>
<rect x="250" y="207" width="238" height="121" rx="8" ry="8" fill="url(#card13)" filter="url(#sh13)"/>
<rect x="250" y="207" width="238" height="121" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="210" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="224" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Точки прижатия артерий</text>
<line x1="260" y1="232" x2="478" y2="232" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="241" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333333">Сонная артерия — к позвоночнику (шея)</text>
<circle cx="264" cy="256" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="259" font-family="Arial,sans-serif" font-size="9" fill="#333333">Подключичная — под ключицей (плечо)</text>
<circle cx="264" cy="271" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="274" font-family="Arial,sans-serif" font-size="9" fill="#333333">Плечевая — по внутреннему краю бицепса</text>
<circle cx="264" cy="286" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="289" font-family="Arial,sans-serif" font-size="9" fill="#333333">Бедренная — в паховой складке (нога)</text>
<circle cx="264" cy="301" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="304" font-family="Arial,sans-serif" font-size="9" fill="#333333">Прижимайте до наложения жгута/повязки</text>
