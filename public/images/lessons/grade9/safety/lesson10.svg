<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6F00;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FFA000;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs10)"/>
  <!-- Warning triangle -->
  <g transform="translate(190,20)">
    <polygon points="60,0 120,100 0,100" fill="none" stroke="#FF6F00" stroke-width="3" opacity="0.5"/>
    <text x="60" y="85" text-anchor="middle" font-size="40" fill="#FF6F00" opacity="0.4" font-family="sans-serif">!</text>
  </g>
  <!-- Siren -->
  <g transform="translate(40,40)">
    <path d="M15,40 Q15,10 35,10 Q55,10 55,40Z" fill="#FF6F00" opacity="0.3"/>
    <rect x="10" y="40" width="50" height="10" fill="#FF8F00" opacity="0.25" rx="3"/>
    <circle cx="35" cy="5" r="5" fill="#FFC107" opacity="0.5"/>
  </g>
  <!-- SOS signal -->
  <g transform="translate(320,30)">
    <text x="0" y="30" font-size="28" fill="#FF6F00" opacity="0.5" font-family="monospace" font-weight="bold">SOS</text>
  </g>
  <!-- Cracked earth (earthquake) -->
  <g transform="translate(50,180)">
    <path d="M0,40 L30,30 L60,45 L90,25 L120,40 L150,20 L180,35 L210,15 L240,30 L270,10 L300,25 L330,5 L360,20 L390,35 L420,15 L450,30 L480,20 L500,35" fill="none" stroke="#FF8F00" stroke-width="2" opacity="0.4"/>
    <rect x="0" y="40" width="500" height="80" fill="#FF6F00" opacity="0.06"/>
  </g>
  <!-- Emergency phone -->
  <g transform="translate(60,270)">
    <rect x="0" y="0" width="45" height="60" fill="#FF6F00" opacity="0.15" rx="6"/>
    <rect x="5" y="8" width="35" height="38" fill="#FF8F00" opacity="0.1" rx="2"/>
    <text x="22" y="33" text-anchor="middle" font-size="14" fill="#FF6F00" opacity="0.5" font-family="sans-serif" font-weight="bold">112</text>
  </g>
  <!-- Fire -->
  <g transform="translate(350,260)">
    <path d="M20,50 Q10,30 15,15 Q20,25 25,10 Q30,25 35,5 Q40,25 45,15 Q50,30 40,50Z" fill="#FF6F00" opacity="0.3"/>
    <path d="M25,50 Q18,35 22,20 Q25,30 30,25 Q32,35 35,50Z" fill="#FFC107" opacity="0.2"/>
  </g>
  <!-- Radioactive symbol -->
  <g transform="translate(200,250)">
    <circle cx="25" cy="25" r="22" fill="none" stroke="#FFC107" stroke-width="1" opacity="0.3"/>
    <path d="M25,3 A22,22 0 0,1 44,14 L25,25Z" fill="#FFC107" opacity="0.15"/>
    <path d="M44,36 A22,22 0 0,1 6,36 L25,25Z" fill="#FFC107" opacity="0.15"/>
    <path d="M6,14 A22,22 0 0,1 25,3 L25,25Z" fill="#FFC107" opacity="0.15"/>
    <circle cx="25" cy="25" r="5" fill="#FF6F00" opacity="0.3"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Экстремальные ситуации</text>
</svg>