<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="hdr12" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C62828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEBEE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFCDD2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#FFFFFF;stop-opacity:0.65"/>
    </linearGradient>
    <filter id="sh12" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow12" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
<rect width="500" height="350" fill="url(#bg12)"/>
<circle cx="0" cy="0" r="60" fill="#EF5350" opacity="0.04"/>
<circle cx="500" cy="350" r="80" fill="#EF5350" opacity="0.04"/>
<circle cx="500" cy="0" r="40" fill="#C62828" opacity="0.03"/>
<rect x="2" y="2" width="496" height="346" rx="12" ry="12" fill="none" stroke="#EF5350" stroke-width="2.5" opacity="0.5"/>
<rect x="3" y="3" width="494" height="44" rx="10" ry="10" fill="url(#hdr12)"/>
<rect x="3" y="37" width="494" height="10" fill="url(#hdr12)"/>
<circle cx="28" cy="25" r="15" fill="#FFFFFF" opacity="0.25"/>
<circle cx="28" cy="25" r="12" fill="#FFFFFF" opacity="0.15"/>
<text x="28" y="29" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">12</text>
<text x="250" y="22" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Сердечно-лёгочная реанимация</text>
<text x="250" y="38" font-family="Arial,sans-serif" font-size="10" fill="#FFEBEE" text-anchor="middle">ОБЖ — Урок 12</text>
<line x1="10" y1="50" x2="490" y2="50" stroke="#EF5350" stroke-width="0.5" opacity="0.3"/>
<rect x="3" y="335" width="494" height="12" rx="0" ry="0" fill="#C62828" opacity="0.08"/>
<text x="250" y="344" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" opacity="0.5">9 класс — Основы безопасности жизнедеятельности</text>
<path d="M462,70 C462,62 450,62 450,70 C450,78 462,86 462,86 C462,86 474,78 474,70 C474,62 462,62 462,70 Z" fill="#EF5350" opacity="0.45"/>
<rect x="12" y="55" width="230" height="145" rx="8" ry="8" fill="url(#card12)" filter="url(#sh12)"/>
<rect x="12" y="55" width="230" height="145" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="58" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Алгоритм СЛР (взрослые)</text>
<line x1="22" y1="80" x2="232" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">1. Проверьте сознание и дыхание</text>
<circle cx="26" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">2. Вызовите скорую: 103 или 112</text>
<circle cx="26" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">3. 30 нажатий на грудную клетку</text>
<circle cx="26" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">4. 2 вдоха (голова запрокинута, подбородок поднят)</text>
<circle cx="26" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">5. Продолжайте цикл 30:2 без остановки</text>
<circle cx="26" cy="164" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="167" font-family="Arial,sans-serif" font-size="9" fill="#333333">6. Глубина нажатий: 5-6 см</text>
<circle cx="26" cy="179" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="182" font-family="Arial,sans-serif" font-size="9" fill="#333333">7. Частота: 100-120 нажатий в минуту</text>
<circle cx="26" cy="194" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="197" font-family="Arial,sans-serif" font-size="9" fill="#333333">8. Не прерывайте СЛР более чем на 10 сек</text>
<rect x="250" y="55" width="238" height="145" rx="8" ry="8" fill="url(#card12)" filter="url(#sh12)"/>
<rect x="250" y="55" width="238" height="145" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="58" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Техника непрямого массажа сердца</text>
<line x1="260" y1="80" x2="478" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="89" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="92" font-family="Arial,sans-serif" font-size="9" fill="#333333">Основание ладони — на нижнюю треть грудины</text>
<circle cx="264" cy="104" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="107" font-family="Arial,sans-serif" font-size="9" fill="#333333">Руки прямые, плечи строго над руками</text>
<circle cx="264" cy="119" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333">Давите весом всего тела сверху вниз</text>
<circle cx="264" cy="134" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="137" font-family="Arial,sans-serif" font-size="9" fill="#333333">Полное расправление грудной клетки</text>
<circle cx="264" cy="149" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="152" font-family="Arial,sans-serif" font-size="9" fill="#333333">Не отрывайте руки от грудины между нажатиями</text>
<circle cx="264" cy="164" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="167" font-family="Arial,sans-serif" font-size="9" fill="#333333">Считайте вслух: раз-и-два-и-три-и-...</text>
<circle cx="264" cy="179" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="182" font-family="Arial,sans-serif" font-size="9" fill="#333333">Минимум перерывов между циклами!</text>
<circle cx="264" cy="194" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="197" font-family="Arial,sans-serif" font-size="9" fill="#333333">Продолжайте до прибытия скорой помощи</text>
<line x1="15" y1="205" x2="485" y2="205" stroke="#EF5350" stroke-width="0.4" opacity="0.15" stroke-dasharray="4,3"/>
<rect x="12" y="212" width="230" height="116" rx="8" ry="8" fill="url(#card12)" filter="url(#sh12)"/>
<rect x="12" y="212" width="230" height="116" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="16" y="215" width="222" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="127" y="229" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Использование АВД (дефибриллятор)</text>
<line x1="22" y1="237" x2="232" y2="237" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="26" cy="246" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="249" font-family="Arial,sans-serif" font-size="9" fill="#333333">Включите аппарат и следуйте подсказкам</text>
<circle cx="26" cy="261" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="264" font-family="Arial,sans-serif" font-size="9" fill="#333333">Наклейте электроды на обнажённую грудь</text>
<circle cx="26" cy="276" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="279" font-family="Arial,sans-serif" font-size="9" fill="#333333">Убедитесь: никто не касается пациента!</text>
<circle cx="26" cy="291" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="294" font-family="Arial,sans-serif" font-size="9" fill="#333333">Нажмите кнопку разряда (если указано)</text>
<circle cx="26" cy="306" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="36" y="309" font-family="Arial,sans-serif" font-size="9" fill="#333333">Продолжайте СЛР немедленно после разряда</text>
<rect x="250" y="212" width="238" height="116" rx="8" ry="8" fill="url(#card12)" filter="url(#sh12)"/>
<rect x="250" y="212" width="238" height="116" rx="8" ry="8" fill="none" stroke="#EF5350" stroke-width="0.5" opacity="0.2"/>
<rect x="254" y="215" width="230" height="20" rx="4" ry="4" fill="#C62828" opacity="0.12"/>
<text x="369" y="229" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Особенности СЛР для детей</text>
<line x1="260" y1="237" x2="478" y2="237" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
<circle cx="264" cy="246" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="249" font-family="Arial,sans-serif" font-size="9" fill="#333333">Дети (1-8 лет): 30:2, нажимать одной рукой</text>
<circle cx="264" cy="261" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="264" font-family="Arial,sans-serif" font-size="9" fill="#333333">Младенцы: 2 пальца, глубина нажатия 4 см</text>
<circle cx="264" cy="276" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="279" font-family="Arial,sans-serif" font-size="9" fill="#333333">Без обучения — только массаж сердца!</text>
<circle cx="264" cy="291" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="294" font-family="Arial,sans-serif" font-size="9" fill="#333333">Любая СЛР лучше, чем полное бездействие</text>
<circle cx="264" cy="306" r="3" fill="#D32F2F" opacity="0.7"/>
<text x="274" y="309" font-family="Arial,sans-serif" font-size="9" fill="#333333">Меняйтесь с помощником каждые 2 минуты</text>
</svg>