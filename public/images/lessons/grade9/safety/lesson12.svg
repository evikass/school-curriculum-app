<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#EF9A9A;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs12)"/>
  <!-- Medical cross -->
  <g transform="translate(200,20)">
    <rect x="20" y="0" width="30" height="90" fill="#E53935" opacity="0.3" rx="5"/>
    <rect x="0" y="20" width="70" height="50" fill="#E53935" opacity="0.3" rx="5"/>
  </g>
  <!-- CPR hands on chest -->
  <g transform="translate(60,120)">
    <ellipse cx="40" cy="30" rx="35" ry="25" fill="#EF9A9A" opacity="0.15"/>
    <path d="M25,15 Q25,5 35,5 Q45,5 45,15 L45,30 Q45,40 35,40 Q25,40 25,30Z" fill="#E53935" opacity="0.25"/>
    <path d="M30,20 Q30,12 37,12 Q44,12 44,20 L44,28 Q44,35 37,35 Q30,35 30,28Z" fill="#EF9A9A" opacity="0.2"/>
  </g>
  <!-- Defibrillator/AED -->
  <g transform="translate(300,100)">
    <rect x="0" y="0" width="60" height="50" fill="#E53935" opacity="0.15" rx="5"/>
    <path d="M10,25 L20,15 L25,30 L30,10 L35,25 L50,25" fill="none" stroke="#E53935" stroke-width="2" opacity="0.5"/>
    <text x="30" y="45" text-anchor="middle" font-size="7" fill="#EF9A9A" opacity="0.5" font-family="sans-serif">AED</text>
  </g>
  <!-- Bandage roll -->
  <g transform="translate(380,120)">
    <ellipse cx="20" cy="20" rx="18" ry="15" fill="#fff" opacity="0.1" stroke="#EF9A9A" stroke-width="1.5" opacity="0.3"/>
    <circle cx="20" cy="20" r="6" fill="none" stroke="#EF9A9A" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Tourniquet -->
  <g transform="translate(150,230)">
    <ellipse cx="40" cy="15" rx="40" ry="15" fill="none" stroke="#E53935" stroke-width="4" opacity="0.3"/>
    <rect x="60" y="5" width="15" height="20" fill="#E53935" opacity="0.25" rx="2"/>
    <line x1="75" y1="15" x2="85" y2="15" stroke="#E53935" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Ambulance -->
  <g transform="translate(280,220)">
    <rect x="0" y="10" width="80" height="35" fill="#E53935" opacity="0.2" rx="5"/>
    <rect x="60" y="0" width="30" height="45" fill="#E53935" opacity="0.15" rx="3"/>
    <circle cx="20" cy="48" r="8" fill="#455A64" opacity="0.25"/>
    <circle cx="65" cy="48" r="8" fill="#455A64" opacity="0.25"/>
    <rect x="25" y="18" width="20" height="15" fill="#fff" opacity="0.15" rx="2"/>
    <text x="35" y="30" text-anchor="middle" font-size="8" fill="#E53935" opacity="0.4" font-family="sans-serif">103</text>
  </g>
  <!-- Heart beating -->
  <g transform="translate(40,260)">
    <path d="M25,10 C25,0 10,0 10,12 C10,25 25,35 25,35 C25,35 40,25 40,12 C40,0 25,0 25,10Z" fill="#E53935" opacity="0.3"/>
    <polyline points="0,20 8,20 12,8 18,30 22,15 25,20 50,20" fill="none" stroke="#EF9A9A" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Первая помощь</text>
</svg>