<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgs14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#9FA8DA;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bgs14)"/>
  <!-- Briefcase -->
  <g transform="translate(60,40)">
    <rect x="0" y="20" width="80" height="55" fill="#5C6BC0" opacity="0.2" rx="5"/>
    <rect x="20" y="5" width="40" height="20" fill="none" stroke="#9FA8DA" stroke-width="2" opacity="0.3" rx="4"/>
    <line x1="35" y1="40" x2="45" y2="40" stroke="#9FA8DA" stroke-width="2" opacity="0.4"/>
    <circle cx="40" cy="40" r="5" fill="#9FA8DA" opacity="0.2"/>
  </g>
  <!-- Heart + career arrow up -->
  <g transform="translate(210,30)">
    <path d="M40,20 C40,5 20,5 20,25 C20,45 40,55 40,55 C40,55 60,45 60,25 C60,5 40,5 40,20Z" fill="#5C6BC0" opacity="0.2"/>
    <polygon points="40,0 55,20 47,20 47,60 33,60 33,20 25,20" fill="#9FA8DA" opacity="0.25"/>
  </g>
  <!-- Computer with person -->
  <g transform="translate(340,30)">
    <rect x="0" y="0" width="70" height="50" fill="#5C6BC0" opacity="0.15" rx="4"/>
    <rect x="5" y="5" width="60" height="35" fill="#9FA8DA" opacity="0.1" rx="2"/>
    <rect x="20" y="50" width="30" height="5" fill="#5C6BC0" opacity="0.12" rx="1"/>
    <rect x="10" y="55" width="50" height="3" fill="#5C6BC0" opacity="0.1" rx="1"/>
  </g>
  <!-- Ladder (career growth) -->
  <g transform="translate(100,140)">
    <line x1="0" y1="0" x2="0" y2="130" stroke="#9FA8DA" stroke-width="3" opacity="0.3"/>
    <line x1="40" y1="0" x2="40" y2="130" stroke="#9FA8DA" stroke-width="3" opacity="0.3"/>
    <rect x="0" y="10" width="40" height="5" fill="#9FA8DA" opacity="0.2" rx="1"/>
    <rect x="0" y="35" width="40" height="5" fill="#9FA8DA" opacity="0.2" rx="1"/>
    <rect x="0" y="60" width="40" height="5" fill="#9FA8DA" opacity="0.2" rx="1"/>
    <rect x="0" y="85" width="40" height="5" fill="#9FA8DA" opacity="0.2" rx="1"/>
    <rect x="0" y="110" width="40" height="5" fill="#9FA8DA" opacity="0.2" rx="1"/>
    <!-- Person climbing -->
    <circle cx="55" cy="45" r="7" fill="#5C6BC0" opacity="0.4"/>
    <line x1="55" y1="52" x2="55" y2="75" stroke="#5C6BC0" stroke-width="2.5" opacity="0.4"/>
    <line x1="55" y1="58" x2="42" y2="62" stroke="#5C6BC0" stroke-width="2" opacity="0.4"/>
    <line x1="55" y1="58" x2="68" y2="50" stroke="#5C6BC0" stroke-width="2" opacity="0.4"/>
    <line x1="55" y1="75" x2="45" y2="90" stroke="#5C6BC0" stroke-width="2" opacity="0.4"/>
    <line x1="55" y1="75" x2="65" y2="90" stroke="#5C6BC0" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- Dumbbell with briefcase -->
  <g transform="translate(280,150)">
    <rect x="0" y="8" width="12" height="24" rx="2" fill="#5C6BC0" opacity="0.3"/>
    <rect x="12" y="16" width="40" height="8" rx="1" fill="#9FA8DA" opacity="0.25"/>
    <rect x="52" y="8" width="12" height="24" rx="2" fill="#5C6BC0" opacity="0.3"/>
  </g>
  <!-- Chart going up -->
  <g transform="translate(300,210)">
    <line x1="0" y1="80" x2="150" y2="80" stroke="#9FA8DA" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="0" x2="0" y2="80" stroke="#9FA8DA" stroke-width="1" opacity="0.3"/>
    <polyline points="10,70 40,55 70,45 100,25 130,10" fill="none" stroke="#5C6BC0" stroke-width="2.5" opacity="0.4"/>
    <circle cx="130" cy="10" r="4" fill="#5C6BC0" opacity="0.5"/>
  </g>
  <!-- Hard hat + stethoscope -->
  <g transform="translate(40,280)">
    <path d="M5,15 Q5,0 25,0 Q45,0 45,15Z" fill="#FFC107" opacity="0.3"/>
    <rect x="0" y="13" width="50" height="5" fill="#FFC107" opacity="0.25" rx="1"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Здоровье и карьера</text>
</svg>