<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Reaction types visual -->
  <!-- Connection: A + B → AB -->
  <text x="250" y="25" fill="#f59e0b" font-size="11" font-family="serif" text-anchor="middle">Типы химических реакций</text>
  <circle cx="70" cy="70" r="18" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="70" y="75" fill="#ef4444" font-size="10" font-family="serif" text-anchor="middle">A</text>
  <text x="100" y="70" fill="#9ca3af" font-size="14" font-family="serif">+</text>
  <circle cx="130" cy="70" r="18" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="75" fill="#3b82f6" font-size="10" font-family="serif" text-anchor="middle">B</text>
  <text x="165" y="70" fill="#9ca3af" font-size="14" font-family="serif">→</text>
  <ellipse cx="210" cy="70" rx="28" ry="18" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
  <text x="210" y="75" fill="#22c55e" font-size="10" font-family="serif" text-anchor="middle">AB</text>
  <text x="140" y="100" fill="#f59e0b" font-size="8" font-family="sans-serif" text-anchor="middle">Соединение</text>
  <!-- Decomposition: AB → A + B -->
  <ellipse cx="70" cy="140" rx="28" ry="18" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
  <text x="70" y="145" fill="#22c55e" font-size="10" font-family="serif" text-anchor="middle">AB</text>
  <text x="115" y="140" fill="#9ca3af" font-size="14" font-family="serif">→</text>
  <circle cx="150" cy="130" r="14" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="150" y="135" fill="#ef4444" font-size="9" font-family="serif" text-anchor="middle">A</text>
  <text x="175" y="140" fill="#9ca3af" font-size="14" font-family="serif">+</text>
  <circle cx="205" cy="150" r="14" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="205" y="155" fill="#3b82f6" font-size="9" font-family="serif" text-anchor="middle">B</text>
  <text x="140" y="175" fill="#22d3ee" font-size="8" font-family="sans-serif" text-anchor="middle">Разложение</text>
  <!-- Substitution and Exchange -->
  <circle cx="310" cy="70" r="14" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="310" y="75" fill="#ef4444" font-size="9" font-family="serif" text-anchor="middle">A</text>
  <text x="335" y="70" fill="#9ca3af" font-size="10">+</text>
  <ellipse cx="370" cy="70" rx="22" ry="14" fill="#ec4899" fill-opacity="0.3" stroke="#ec4899" stroke-width="1"/>
  <text x="370" y="75" fill="#ec4899" font-size="8" font-family="serif" text-anchor="middle">BC</text>
  <text x="405" y="70" fill="#9ca3af" font-size="10">→</text>
  <ellipse cx="440" cy="60" rx="22" ry="14" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1"/>
  <text x="440" y="65" fill="#22c55e" font-size="8" font-family="serif" text-anchor="middle">AC</text>
  <circle cx="440" cy="85" r="12" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="440" y="90" fill="#3b82f6" font-size="9" font-family="serif" text-anchor="middle">B</text>
  <text x="370" y="100" fill="#f59e0b" font-size="8" font-family="sans-serif" text-anchor="middle">Замещение</text>
  <!-- OBP -->
  <rect x="250" y="120" width="220" height="70" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1"/>
  <text x="360" y="140" fill="#ef4444" font-size="10" font-family="serif" text-anchor="middle">Окислительно-восстановительные</text>
  <text x="360" y="158" fill="#22c55e" font-size="9" font-family="sans-serif" text-anchor="middle">Окислитель: принимает e⁻ (↓ С.О.)</text>
  <text x="360" y="173" fill="#ef4444" font-size="9" font-family="sans-serif" text-anchor="middle">Восстановитель: отдаёт e⁻ (↑ С.О.)</text>
  <!-- Heat effects -->
  <rect x="30" y="200" width="210" height="60" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="135" y="220" fill="#f59e0b" font-size="10" font-family="serif" text-anchor="middle">Экзотермические (Q &gt; 0)</text>
  <text x="135" y="238" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">Выделяют тепло: горение</text>
  <rect x="260" y="200" width="210" height="60" rx="6" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1"/>
  <text x="365" y="220" fill="#3b82f6" font-size="10" font-family="serif" text-anchor="middle">Эндотермические (Q &lt; 0)</text>
  <text x="365" y="238" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">Поглощают тепло: разложение</text>
  <!-- Signs -->
  <rect x="30" y="275" width="440" height="55" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="295" fill="#6366f1" font-size="10" font-family="sans-serif" text-anchor="middle">Признаки реакций:</text>
  <text x="50" y="318" fill="#9ca3af" font-size="9" font-family="sans-serif">Изменение цвета | Выделение газа | Осадок | Тепло | Запах</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Окислительно-восстановительные реакции</text>
</svg>