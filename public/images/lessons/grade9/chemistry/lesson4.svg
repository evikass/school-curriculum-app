<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow4" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <marker id="arrowG" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#388E3C"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white">Урок 4: Типы химических реакций</text>

  <!-- Signs of reactions -->
  <rect x="15" y="58" width="470" height="30" rx="6" fill="#66BB6A" opacity="0.2"/>
  <text x="250" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Признаки: изменение цвета | выделение газа | выпадение осадка | выделение тепла</text>

  <!-- 1. Соединение -->
  <rect x="15" y="95" width="230" height="58" rx="8" fill="white" opacity="0.9" filter="url(#shadow4)"/>
  <rect x="15" y="95" width="70" height="18" rx="8" fill="#43A047"/>
  <rect x="15" y="105" width="70" height="8" fill="#43A047"/>
  <text x="50" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Соединение</text>
  <text x="25" y="130" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#333">A + B → AB</text>
  <text x="25" y="146" font-family="Arial,sans-serif" font-size="9" fill="#555">2H₂ + O₂ → 2H₂O</text>
  <!-- Visual: two circles merge -->
  <circle cx="160" cy="125" r="10" fill="#81C784" opacity="0.7"/>
  <circle cx="180" cy="125" r="10" fill="#A5D6A7" opacity="0.7"/>
  <line x1="194" y1="125" x2="206" y2="125" stroke="#388E3C" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <ellipse cx="225" cy="125" rx="16" ry="12" fill="#66BB6A" opacity="0.7"/>

  <!-- 2. Разложение -->
  <rect x="255" y="95" width="230" height="58" rx="8" fill="white" opacity="0.9" filter="url(#shadow4)"/>
  <rect x="255" y="95" width="80" height="18" rx="8" fill="#E65100"/>
  <rect x="255" y="105" width="80" height="8" fill="#E65100"/>
  <text x="295" y="111" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Разложение</text>
  <text x="265" y="130" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#333">AB → A + B</text>
  <text x="265" y="146" font-family="Arial,sans-serif" font-size="9" fill="#555">2H₂O → 2H₂ + O₂</text>
  <!-- Visual: ellipse splits -->
  <ellipse cx="410" cy="125" rx="16" ry="12" fill="#FF8A65" opacity="0.7"/>
  <line x1="430" y1="125" x2="442" y2="125" stroke="#388E3C" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <circle cx="455" cy="118" r="8" fill="#FFAB91" opacity="0.7"/>
  <circle cx="462" cy="132" r="8" fill="#FFCCBC" opacity="0.7"/>

  <!-- 3. Замещение -->
  <rect x="15" y="160" width="230" height="58" rx="8" fill="white" opacity="0.9" filter="url(#shadow4)"/>
  <rect x="15" y="160" width="80" height="18" rx="8" fill="#1565C0"/>
  <rect x="15" y="170" width="80" height="8" fill="#1565C0"/>
  <text x="55" y="176" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Замещение</text>
  <text x="25" y="195" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#333">A + BC → AC + B</text>
  <text x="25" y="211" font-family="Arial,sans-serif" font-size="9" fill="#555">Zn + 2HCl → ZnCl₂ + H₂</text>

  <!-- 4. Обмен -->
  <rect x="255" y="160" width="230" height="58" rx="8" fill="white" opacity="0.9" filter="url(#shadow4)"/>
  <rect x="255" y="160" width="60" height="18" rx="8" fill="#6A1B9A"/>
  <rect x="255" y="170" width="60" height="8" fill="#6A1B9A"/>
  <text x="285" y="176" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white">Обмен</text>
  <text x="265" y="195" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#333">AB + CD → AD + CB</text>
  <text x="265" y="211" font-family="Arial,sans-serif" font-size="9" fill="#555">NaCl + AgNO₃ → AgCl↓+ NaNO₃</text>

  <!-- Thermal effects -->
  <rect x="15" y="226" width="230" height="60" rx="8" fill="white" opacity="0.9" filter="url(#shadow4)"/>
  <text x="130" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">По тепловому эффекту</text>
  <line x1="25" y1="250" x2="235" y2="250" stroke="#A5D6A7" stroke-width="1"/>
  <text x="25" y="266" font-family="Arial,sans-serif" font-size="9" fill="#C62828">• Экзотермические (+Q): горение</text>
  <text x="25" y="280" font-family="Arial,sans-serif" font-size="9" fill="#1565C0">• Эндотермические (-Q): разложение</text>

  <!-- OBP -->
  <rect x="255" y="226" width="230" height="60" rx="8" fill="white" opacity="0.9" filter="url(#shadow4)"/>
  <text x="370" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">ОВР</text>
  <line x1="265" y1="250" x2="475" y2="250" stroke="#A5D6A7" stroke-width="1"/>
  <text x="265" y="266" font-family="Arial,sans-serif" font-size="9" fill="#333">Окислительно-восстановительные</text>
  <text x="265" y="280" font-family="Arial,sans-serif" font-size="9" fill="#C62828">Окислитель принимает e⁻</text>
  <text x="265" y="280" font-family="Arial,sans-serif" font-size="9" fill="#C62828">Окислитель принимает e⁻</text>

  <!-- Example OBP -->
  <rect x="15" y="295" width="470" height="48" rx="8" fill="white" opacity="0.9" filter="url(#shadow4)"/>
  <text x="250" y="313" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Пример ОВР: 2Na + Cl₂ → 2NaCl</text>
  <text x="250" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#333">Na⁰ → Na⁺¹ (окисление, восстановитель) | Cl₂⁰ → Cl⁻¹ (восстановление, окислитель)</text>
</svg>