<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh14">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg14)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Железо и его соединения</text>

  <!-- Fe info card -->
  <rect x="12" y="40" width="90" height="68" rx="6" fill="#0f766e" filter="url(#sh14)"/>
  <text x="57" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=26</text>
  <text x="57" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" fill="white" font-weight="bold">Fe</text>
  <text x="57" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">3d&#8310;4s&#178;</text>
  <text x="57" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5eead4">с.о. +2, +3</text>

  <!-- Fe2+ vs Fe3+ -->
  <rect x="110" y="40" width="140" height="68" rx="6" fill="#134e4a" filter="url(#sh14)"/>
  <text x="120" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Две степени окисления:</text>
  <text x="120" y="70" font-family="Arial,sans-serif" font-size="8" fill="#86efac">Fe&#178;&#8314; - зелёный цвет (FeSO&#8324;)</text>
  <text x="120" y="83" font-family="Arial,sans-serif" font-size="8" fill="#fca5a5">Fe&#179;&#8314; - жёлтый/бурый (FeCl&#8323;)</text>
  <text x="120" y="96" font-family="Arial,sans-serif" font-size="8" fill="white">Fe(OH)&#8322; - зелёный осадок</text>
  <text x="120" y="106" font-family="Arial,sans-serif" font-size="8" fill="white">Fe(OH)&#8323; - бурый осадок</text>

  <!-- Rusting -->
  <rect x="258" y="40" width="130" height="68" rx="6" fill="#0f766e" filter="url(#sh14)"/>
  <text x="268" y="56" font-family="Arial,sans-serif" font-size="9" fill="#fca5a5" font-weight="bold">Ржавление:</text>
  <text x="268" y="70" font-family="Arial,sans-serif" font-size="7" fill="white">4Fe + 3O&#8322; = 2Fe&#8322;O&#8323;</text>
  <text x="268" y="82" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Fe&#8322;O&#8323; - ржавчина</text>
  <text x="268" y="94" font-family="Arial,sans-serif" font-size="7" fill="white">Нужны O&#8322; и H&#8322;O</text>
  <text x="268" y="106" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Соли ускоряют коррозию</text>

  <!-- Reactions -->
  <rect x="12" y="116" width="185" height="78" rx="6" fill="#0f766e" filter="url(#sh14)"/>
  <text x="22" y="132" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Химические свойства:</text>
  <text x="22" y="146" font-family="Arial,sans-serif" font-size="8" fill="white">3Fe + 2O&#8322; = Fe&#8323;O&#8324; (FeO*Fe&#8322;O&#8323;)</text>
  <text x="22" y="159" font-family="Arial,sans-serif" font-size="8" fill="white">Fe + 2HCl = FeCl&#8322; + H&#8322;</text>
  <text x="22" y="172" font-family="Arial,sans-serif" font-size="8" fill="white">Fe + CuSO&#8324; = FeSO&#8324; + Cu</text>
  <text x="22" y="185" font-family="Arial,sans-serif" font-size="8" fill="white">2Fe + 3Cl&#8322; = 2FeCl&#8323;</text>
  <text x="22" y="192" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">С Cl&#8322; - с.о. +3!</text>

  <!-- Qualitative analysis -->
  <rect x="203" y="116" width="185" height="78" rx="6" fill="#134e4a" filter="url(#sh14)"/>
  <text x="213" y="132" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Качественные реакции:</text>
  <text x="213" y="146" font-family="Arial,sans-serif" font-size="8" fill="#86efac">Fe&#178;&#8314; + K&#8323;[Fe(CN)&#8326;] =</text>
  <text x="225" y="158" font-family="Arial,sans-serif" font-size="7" fill="#86efac">KFe[Fe(CN)&#8326;] (турнбулева синь)</text>
  <text x="213" y="172" font-family="Arial,sans-serif" font-size="8" fill="#fca5a5">Fe&#179;&#8314; + KSCN =</text>
  <text x="225" y="184" font-family="Arial,sans-serif" font-size="7" fill="#fca5a5">[Fe(SCN)]&#178;&#8314; (кроваво-красный)</text>

  <!-- Cast iron vs steel -->
  <rect x="12" y="202" width="185" height="86" rx="6" fill="#134e4a" filter="url(#sh14)"/>
  <text x="22" y="218" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Сплавы железа:</text>
  <text x="22" y="232" font-family="Arial,sans-serif" font-size="8" fill="white">Чугун: Fe + C (2-4.3%)</text>
  <text x="22" y="245" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Хрупкий, литейный</text>
  <text x="22" y="260" font-family="Arial,sans-serif" font-size="8" fill="white">Сталь: Fe + C (&lt;2%)</text>
  <text x="22" y="273" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Прочная, ковкая</text>
  <text x="22" y="285" font-family="Arial,sans-serif" font-size="7" fill="#5eead4">Легированная сталь: +Cr, Ni, W</text>

  <!-- Iron oxidation states -->
  <rect x="203" y="202" width="185" height="86" rx="6" fill="#0f766e" filter="url(#sh14)"/>
  <text x="213" y="218" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Переход Fe&#178;&#8314; &#8594; Fe&#179;&#8314;:</text>
  <text x="213" y="232" font-family="Arial,sans-serif" font-size="8" fill="white">4Fe(OH)&#8322; + O&#8322; + 2H&#8322;O =</text>
  <text x="225" y="244" font-family="Arial,sans-serif" font-size="8" fill="white">4Fe(OH)&#8323;</text>
  <text x="213" y="258" font-family="Arial,sans-serif" font-size="7" fill="#86efac">зелёный &#8594; бурый</text>
  <text x="213" y="272" font-family="Arial,sans-serif" font-size="8" fill="white">Fe&#178;&#8314; - 1e&#8315; &#8594; Fe&#179;&#8314;</text>
  <text x="213" y="285" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Fe&#179;&#8314; устойчивее Fe&#178;&#8314;</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 14</text>
</svg>