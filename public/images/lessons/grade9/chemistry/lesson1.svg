<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Atom model -->
  <!-- Nucleus (zoomed in) -->
  <circle cx="250" cy="140" r="40" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="2"/>
  <!-- Protons -->
  <circle cx="240" cy="130" r="8" fill="#ef4444" fill-opacity="0.5" stroke="#ef4444" stroke-width="1"/>
  <text x="240" y="134" fill="#ffffff" font-size="7" font-family="serif" text-anchor="middle">p⁺</text>
  <circle cx="260" cy="130" r="8" fill="#ef4444" fill-opacity="0.5" stroke="#ef4444" stroke-width="1"/>
  <text x="260" y="134" fill="#ffffff" font-size="7" font-family="serif" text-anchor="middle">p⁺</text>
  <!-- Neutrons -->
  <circle cx="245" cy="150" r="8" fill="#9ca3af" fill-opacity="0.5" stroke="#9ca3af" stroke-width="1"/>
  <text x="245" y="154" fill="#ffffff" font-size="7" font-family="serif" text-anchor="middle">n⁰</text>
  <circle cx="265" cy="148" r="8" fill="#9ca3af" fill-opacity="0.5" stroke="#9ca3af" stroke-width="1"/>
  <text x="265" y="152" fill="#ffffff" font-size="7" font-family="serif" text-anchor="middle">n⁰</text>
  <!-- Electron shells -->
  <circle cx="250" cy="140" r="75" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="250" cy="140" r="120" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Electrons on shells -->
  <circle cx="325" cy="140" r="5" fill="#22d3ee"/>
  <circle cx="175" cy="140" r="5" fill="#22d3ee"/>
  <circle cx="310" cy="85" r="5" fill="#22d3ee"/>
  <circle cx="190" cy="85" r="5" fill="#22d3ee"/>
  <circle cx="310" cy="195" r="5" fill="#22c55e"/>
  <circle cx="190" cy="195" r="5" fill="#22c55e"/>
  <circle cx="370" cy="140" r="5" fill="#22c55e"/>
  <circle cx="130" cy="140" r="5" fill="#22c55e"/>
  <!-- Labels -->
  <text x="250" y="30" fill="#6366f1" font-size="12" font-family="serif" text-anchor="middle">Модель атома</text>
  <text x="310" y="70" fill="#22d3ee" font-size="9" font-family="serif">e⁻</text>
  <text x="380" y="135" fill="#22c55e" font-size="9" font-family="serif">e⁻</text>
  <!-- Info box -->
  <rect x="30" y="260" width="440" height="70" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="280" fill="#ef4444" font-size="10" font-family="serif" text-anchor="middle">Z = число протонов = порядковый номер</text>
  <text x="250" y="298" fill="#9ca3af" font-size="10" font-family="serif" text-anchor="middle">A = Z + N (массовое число)</text>
  <text x="250" y="316" fill="#22c55e" font-size="10" font-family="serif" text-anchor="middle">N = A − Z (число нейтронов)</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Периодический закон и строение атома</text>
</svg>