<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Dissociation: NaCl → Na⁺ + Cl⁻ -->
  <!-- Crystal on left -->
  <rect x="40" y="70" width="80" height="80" rx="4" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
  <text x="80" y="100" fill="#f59e0b" font-size="12" font-family="serif" text-anchor="middle">NaCl</text>
  <text x="80" y="140" fill="#9ca3af" font-size="8" font-family="serif" text-anchor="middle">кристалл</text>
  <!-- Water molecules around crystal -->
  <circle cx="30" cy="60" r="8" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="130" cy="55" r="8" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="25" cy="160" r="8" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <circle cx="140" cy="165" r="8" fill="#3b82f6" fill-opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <!-- Arrow -->
  <line x1="135" y1="110" x2="195" y2="110" stroke="#9ca3af" stroke-width="2"/>
  <polygon points="195,106 205,110 195,114" fill="#9ca3af"/>
  <text x="170" y="100" fill="#3b82f6" font-size="9" font-family="serif" text-anchor="middle">H₂O</text>
  <!-- Ions on right -->
  <circle cx="240" cy="85" r="22" fill="#ef4444" fill-opacity="0.25" stroke="#ef4444" stroke-width="2"/>
  <text x="240" y="90" fill="#ef4444" font-size="12" font-family="serif" text-anchor="middle">Na⁺</text>
  <circle cx="330" cy="130" r="22" fill="#22c55e" fill-opacity="0.25" stroke="#22c55e" stroke-width="2"/>
  <text x="330" y="135" fill="#22c55e" font-size="12" font-family="serif" text-anchor="middle">Cl⁻</text>
  <!-- HCl dissociation -->
  <rect x="380" y="60" width="100" height="35" rx="4" fill="#1a1a2e" stroke="#ec4899" stroke-width="1"/>
  <text x="430" y="82" fill="#ec4899" font-size="9" font-family="serif" text-anchor="middle">HCl → H⁺+Cl⁻</text>
  <!-- H2SO4 -->
  <rect x="380" y="100" width="110" height="35" rx="4" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="435" y="122" fill="#6366f1" font-size="9" font-family="serif" text-anchor="middle">H₂SO₄→2H⁺+SO₄²⁻</text>
  <!-- Degree of dissociation -->
  <rect x="30" y="170" width="440" height="85" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="250" y="190" fill="#f59e0b" font-size="10" font-family="sans-serif" text-anchor="middle">Степень диссоциации α</text>
  <!-- Strong -->
  <rect x="50" y="200" width="120" height="40" rx="4" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="110" y="215" fill="#ef4444" font-size="9" font-family="sans-serif" text-anchor="middle">Сильные (α≈100%)</text>
  <text x="110" y="230" fill="#9ca3af" font-size="8" font-family="sans-serif" text-anchor="middle">HCl, H₂SO₄, NaOH</text>
  <!-- Medium -->
  <rect x="185" y="200" width="120" height="40" rx="4" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="245" y="215" fill="#f59e0b" font-size="9" font-family="sans-serif" text-anchor="middle">Средние (30-70%)</text>
  <text x="245" y="230" fill="#9ca3af" font-size="8" font-family="sans-serif" text-anchor="middle">H₃PO₄, H₂SO₃</text>
  <!-- Weak -->
  <rect x="320" y="200" width="120" height="40" rx="4" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1"/>
  <text x="380" y="215" fill="#3b82f6" font-size="9" font-family="sans-serif" text-anchor="middle">Слабые (&lt;30%)</text>
  <text x="380" y="230" fill="#9ca3af" font-size="8" font-family="sans-serif" text-anchor="middle">H₂CO₃, NH₃·H₂O</text>
  <!-- Footer -->
  <text x="250" y="280" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">Аррениус, 1887: электролиты распадаются на ионы</text>
  <text x="250" y="300" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">Диссоциация — обратимый процесс (⇌)</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Электролитическая диссоциация</text>
</svg>