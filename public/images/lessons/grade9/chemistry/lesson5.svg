<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Beaker with solution -->
  <path d="M150,60 L150,200 Q150,220 170,220 L350,220 Q370,220 370,200 L370,60" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <!-- Water (blue fill) -->
  <rect x="155" y="80" width="210" height="135" rx="5" fill="#3b82f6" fill-opacity="0.1"/>
  <!-- Solute particles dissolving -->
  <circle cx="220" cy="120" r="4" fill="#f59e0b" opacity="0.7"/><circle cx="280" cy="150" r="3" fill="#f59e0b" opacity="0.5"/>
  <circle cx="250" cy="170" r="3" fill="#f59e0b" opacity="0.4"/><circle cx="300" cy="110" r="3" fill="#f59e0b" opacity="0.6"/>
  <circle cx="200" cy="160" r="3" fill="#f59e0b" opacity="0.3"/><circle cx="330" cy="140" r="3" fill="#f59e0b" opacity="0.5"/>
  <!-- Solid at bottom -->
  <rect x="180" y="195" width="160" height="20" rx="3" fill="#f59e0b" fill-opacity="0.3"/>
  <text x="260" y="210" fill="#f59e0b" font-size="8" font-family="serif" text-anchor="middle">нерастворившийся остаток</text>
  <!-- Labels -->
  <text x="260" y="55" fill="#9ca3af" font-size="9" font-family="serif" text-anchor="middle">насыщенный раствор</text>
  <!-- Water molecule -->
  <circle cx="420" cy="90" r="8" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="420" y="94" fill="#ef4444" font-size="7" font-family="serif" text-anchor="middle">O</text>
  <circle cx="405" cy="100" r="5" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="405" y="104" fill="#3b82f6" font-size="6" font-family="serif" text-anchor="middle">H</text>
  <circle cx="435" cy="100" r="5" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="435" y="104" fill="#3b82f6" font-size="6" font-family="serif" text-anchor="middle">H</text>
  <text x="420" y="75" fill="#3b82f6" font-size="9" font-family="serif" text-anchor="middle">H₂O</text>
  <!-- Thermometer -->
  <rect x="60" y="80" width="10" height="80" rx="5" fill="none" stroke="#ef4444" stroke-width="1"/>
  <rect x="62" y="120" width="6" height="35" rx="3" fill="#ef4444"/>
  <circle cx="65" cy="160" r="6" fill="#ef4444"/>
  <text x="65" y="70" fill="#ef4444" font-size="8" font-family="serif" text-anchor="middle">t°</text>
  <!-- Properties box -->
  <rect x="30" y="250" width="440" height="80" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="270" fill="#6366f1" font-size="10" font-family="sans-serif" text-anchor="middle">Растворы и их свойства</text>
  <text x="50" y="290" fill="#22d3ee" font-size="9" font-family="sans-serif">Электролиты: проводят ток (кислоты, щёлочи, соли)</text>
  <text x="50" y="308" fill="#f59e0b" font-size="9" font-family="sans-serif">Неэлектролиты: не проводят ток (сахар, глицерин)</text>
  <text x="50" y="323" fill="#9ca3af" font-size="9" font-family="sans-serif">t°↑ → растворимость твёрдых↑, газов↓</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Скорость химических реакций</text>
</svg>