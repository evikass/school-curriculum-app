<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" rx="8" fill="url(#bg5)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Растворы и их свойства</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 5</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- Left panel: Solution components -->
  <rect x="14" y="54" width="160" height="160" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="94" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Компоненты раствора</text>
  <line x1="22" y1="75" x2="166" y2="75" stroke="#80CBC4" stroke-width="0.5"/>
  <!-- Solvent -->
  <rect x="24" y="82" width="140" height="35" rx="4" fill="#B3E5FC" fill-opacity="0.4" stroke="#0288D1" stroke-width="0.8"/>
  <text x="94" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#01579B">Растворитель (H2O)</text>
  <text x="94" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0288D1">Самый распространённый</text>
  <!-- Solute -->
  <rect x="24" y="124" width="140" height="35" rx="4" fill="#C8E6C9" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="94" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Растворённое вещество</text>
  <text x="94" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">NaCl, сахар, HCl</text>
  <!-- Product -->
  <rect x="24" y="166" width="140" height="35" rx="4" fill="#FFF9C4" fill-opacity="0.4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="94" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17">Продукты взаимодействия</text>
  <text x="94" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#F9A825">Гидраты, ионы</text>
  <!-- Center: Beaker illustration -->
  <rect x="190" y="60" width="120" height="155" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="250" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Виды растворов</text>
  <!-- Beaker shape -->
  <path d="M220,88 L220,170 Q220,185 235,185 L265,185 Q280,185 280,170 L280,88" fill="#E0F7FA" fill-opacity="0.5" stroke="#00695C" stroke-width="1.5"/>
  <line x1="215" y1="88" x2="285" y2="88" stroke="#00695C" stroke-width="1.5"/>
  <!-- Solute particles -->
  <circle cx="240" cy="130" r="3" fill="#4DB6AC" opacity="0.7"/>
  <circle cx="255" cy="145" r="3" fill="#4DB6AC" opacity="0.7"/>
  <circle cx="265" cy="120" r="3" fill="#4DB6AC" opacity="0.7"/>
  <circle cx="248" cy="160" r="3" fill="#4DB6AC" opacity="0.7"/>
  <circle cx="270" cy="155" r="3" fill="#4DB6AC" opacity="0.7"/>
  <!-- Labels -->
  <text x="250" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Ненасыщенный</text>
  <text x="250" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">можно растворить ещё</text>
  <!-- Right panel: Solubility -->
  <rect x="326" y="54" width="160" height="160" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="406" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Растворимость</text>
  <line x1="334" y1="75" x2="478" y2="75" stroke="#80CBC4" stroke-width="0.5"/>
  <rect x="336" y="82" width="140" height="22" rx="3" fill="#C8E6C9" fill-opacity="0.4"/>
  <text x="406" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Хорошо растворимые</text>
  <rect x="336" y="110" width="140" height="22" rx="3" fill="#FFF9C4" fill-opacity="0.4"/>
  <text x="406" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#F9A825">Малорастворимые</text>
  <rect x="336" y="138" width="140" height="22" rx="3" fill="#FFCDD2" fill-opacity="0.4"/>
  <text x="406" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Практически нерастворимые</text>
  <!-- Temperature effect -->
  <text x="406" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00695C">Температура:</text>
  <text x="406" y="192" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Твёрдые: растворимость</text>
  <text x="406" y="202" font-family="Arial,sans-serif" font-size="6" fill="#004D40">увеличивается</text>
  <text x="406" y="212" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Газы: растворимость</text>
  <text x="406" y="222" font-family="Arial,sans-serif" font-size="6" fill="#004D40">уменьшается</text>
  <!-- Bottom: Electrolytes -->
  <rect x="14" y="225" width="230" height="110" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Электролиты</text>
  <text x="129" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Проводят электрический ток</text>
  <text x="70" y="278" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Кислоты (HCl, H2SO4)</text>
  <text x="70" y="292" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Щёлочи (NaOH, KOH)</text>
  <text x="70" y="306" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Соли (NaCl, K2SO4)</text>
  <text x="70" y="320" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Содержат ионы</text>
  <!-- Bottom right: Non-electrolytes -->
  <rect x="256" y="225" width="230" height="110" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Неэлектролиты</text>
  <text x="371" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Не проводят электрический ток</text>
  <text x="310" y="278" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Сахар (C12H22O11)</text>
  <text x="310" y="292" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Глицерин (C3H8O3)</text>
  <text x="310" y="306" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Спирт (C2H5OH)</text>
  <text x="310" y="320" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Нет ионов</text>
</svg>