<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow5" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <linearGradient id="solGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="white">Урок 5: Растворы и их свойства</text>

  <!-- Solution diagram: beaker -->
  <rect x="15" y="60" width="190" height="155" rx="8" fill="white" opacity="0.9" filter="url(#shadow5)"/>
  <text x="110" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Компоненты раствора</text>
  <!-- Beaker shape -->
  <path d="M55,95 L55,190 Q55,200 65,200 L155,200 Q165,200 165,190 L165,95 Z" fill="url(#waterGrad)" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="50" y="88" width="120" height="10" rx="2" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Dissolved particles -->
  <circle cx="80" cy="130" r="5" fill="url(#solGrad)" stroke="#F9A825" stroke-width="0.8"/>
  <circle cx="110" cy="150" r="4" fill="url(#solGrad)" stroke="#F9A825" stroke-width="0.8"/>
  <circle cx="130" cy="120" r="5" fill="url(#solGrad)" stroke="#F9A825" stroke-width="0.8"/>
  <circle cx="95" cy="170" r="4" fill="url(#solGrad)" stroke="#F9A825" stroke-width="0.8"/>
  <circle cx="140" cy="165" r="5" fill="url(#solGrad)" stroke="#F9A825" stroke-width="0.8"/>
  <circle cx="120" cy="185" r="3" fill="url(#solGrad)" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Labels -->
  <text x="110" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">Растворитель (H₂O)</text>
  <line x1="140" y1="125" x2="185" y2="115" stroke="#F9A825" stroke-width="0.8"/>
  <text x="187" y="115" font-family="Arial,sans-serif" font-size="7" fill="#F9A825">Растворённое</text>
  <text x="187" y="124" font-family="Arial,sans-serif" font-size="7" fill="#F9A825">вещество</text>

  <!-- Types by concentration -->
  <rect x="215" y="60" width="270" height="155" rx="8" fill="white" opacity="0.9" filter="url(#shadow5)"/>
  <text x="350" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Виды растворов</text>
  <line x1="225" y1="86" x2="475" y2="86" stroke="#A5D6A7" stroke-width="1"/>
  <text x="225" y="102" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">По концентрации:</text>
  <!-- Dilute -->
  <rect x="225" y="108" width="80" height="22" rx="4" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="265" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#333">Разбавленный</text>
  <!-- Concentrated -->
  <rect x="315" y="108" width="80" height="22" rx="4" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1"/>
  <text x="355" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#333">Концентрир.</text>
  <!-- Saturated -->
  <rect x="225" y="135" width="80" height="22" rx="4" fill="#66BB6A" stroke="#388E3C" stroke-width="1"/>
  <text x="265" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white">Насыщенный</text>
  <!-- Unsaturated -->
  <rect x="315" y="135" width="80" height="22" rx="4" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1"/>
  <text x="355" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#333">Ненасыщен.</text>
  <!-- Supersaturated -->
  <rect x="405" y="108" width="72" height="49" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
  <text x="441" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#C62828">Пересыщ.</text>
  <text x="441" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828">(неустойч.)</text>
  <text x="225" y="178" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">По агрегатному состоянию:</text>
  <text x="225" y="195" font-family="Arial,sans-serif" font-size="9" fill="#333">Газ (воздух) | Жидкость (сахар+H₂O) | Твёрдое (сплавы)</text>
  <text x="225" y="209" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-style="italic">Насыщенный — вещество больше не растворяется при данной t</text>

  <!-- Solubility -->
  <rect x="15" y="222" width="235" height="60" rx="8" fill="white" opacity="0.9" filter="url(#shadow5)"/>
  <text x="132" y="242" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Растворимость</text>
  <line x1="25" y1="248" x2="240" y2="248" stroke="#A5D6A7" stroke-width="1"/>
  <text x="25" y="263" font-family="Arial,sans-serif" font-size="9" fill="#333">Хорошо: NaCl, сахар</text>
  <text x="25" y="276" font-family="Arial,sans-serif" font-size="9" fill="#333">Мало: CaSO₄ | Нет: AgCl, BaSO₄</text>

  <!-- Temperature effect -->
  <rect x="260" y="222" width="225" height="60" rx="8" fill="white" opacity="0.9" filter="url(#shadow5)"/>
  <text x="372" y="242" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Влияние температуры</text>
  <line x1="270" y1="248" x2="475" y2="248" stroke="#A5D6A7" stroke-width="1"/>
  <text x="270" y="263" font-family="Arial,sans-serif" font-size="9" fill="#C62828">Твёрдые в-ва: растворимость ↑ с t°</text>
  <text x="270" y="276" font-family="Arial,sans-serif" font-size="9" fill="#1565C0">Газы: растворимость ↓ с t°</text>

  <!-- Electrolytes -->
  <rect x="15" y="290" width="470" height="52" rx="8" fill="white" opacity="0.9" filter="url(#shadow5)"/>
  <text x="250" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Электролиты и неэлектролиты</text>
  <line x1="25" y1="316" x2="475" y2="316" stroke="#A5D6A7" stroke-width="1"/>
  <text x="25" y="332" font-family="Arial,sans-serif" font-size="9" fill="#C62828">Электролиты (проводят ток): кислоты, щёлочи, соли — содержат ионы</text>
  <text x="25" y="338" font-family="Arial,sans-serif" font-size="9" fill="#1565C0">Неэлектролиты: сахар, глицерин — нет ионов</text>
</svg>