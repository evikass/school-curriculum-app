<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient></defs>
  <rect width="500" height="350" rx="8" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Щёлочные металлы</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 9</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- Group IA elements -->
  <rect x="14" y="54" width="230" height="135" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="129" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Элементы IA группы</text>
  <rect x="24" y="78" width="100" height="22" rx="4" fill="#A5D6A7" fill-opacity="0.5" stroke="#00897B" stroke-width="0.8"/>
  <text x="74" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Li — Литий</text>
  <rect x="134" y="78" width="100" height="22" rx="4" fill="#A5D6A7" fill-opacity="0.5" stroke="#00897B" stroke-width="0.8"/>
  <text x="184" y="93" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Na — Натрий</text>
  <rect x="24" y="108" width="100" height="22" rx="4" fill="#A5D6A7" fill-opacity="0.5" stroke="#00897B" stroke-width="0.8"/>
  <text x="74" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">K — Калий</text>
  <rect x="134" y="108" width="100" height="22" rx="4" fill="#C8E6C9" fill-opacity="0.5" stroke="#00897B" stroke-width="0.8"/>
  <text x="184" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Rb — Рубидий</text>
  <rect x="24" y="138" width="100" height="22" rx="4" fill="#C8E6C9" fill-opacity="0.5" stroke="#00897B" stroke-width="0.8"/>
  <text x="74" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Cs — Цезий</text>
  <rect x="134" y="138" width="100" height="22" rx="4" fill="#C8E6C9" fill-opacity="0.5" stroke="#00897B" stroke-width="0.8"/>
  <text x="184" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Fr — Франций</text>
  <text x="129" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">1 электрон на внешнем уровне</text>
  <!-- Reactions -->
  <rect x="256" y="54" width="230" height="135" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="371" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Характерные реакции</text>
  <text x="270" y="88" font-family="Arial,sans-serif" font-size="6" fill="#004D40">С водой: 2Me + 2H2O = 2MeOH + H2</text>
  <text x="270" y="102" font-family="Arial,sans-serif" font-size="6" fill="#004D40">С кислородом: 4Li + O2 = 2Li2O</text>
  <text x="270" y="116" font-family="Arial,sans-serif" font-size="6" fill="#004D40">2Na + O2 = Na2O2 (пероксид)</text>
  <text x="270" y="130" font-family="Arial,sans-serif" font-size="6" fill="#004D40">С галогенами: 2Na + Cl2 = 2NaCl</text>
  <text x="270" y="144" font-family="Arial,sans-serif" font-size="6" fill="#004D40">С водородом: 2Na + H2 = 2NaH</text>
  <text x="270" y="158" font-family="Arial,sans-serif" font-size="6" fill="#004D40">С серой: 2Na + S = Na2S</text>
  <text x="270" y="176" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Активность: Li &lt; Na &lt; K &lt; Rb &lt; Cs</text>
  <!-- Properties -->
  <rect x="14" y="198" width="230" height="70" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="214" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Общие свойства</text>
  <text x="24" y="230" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Мягкие, режутся ножом</text>
  <text x="24" y="242" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Низкие t плавления (Na: 98 C)</text>
  <text x="24" y="254" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Сильные восстановители</text>
  <!-- Qualitative reaction -->
  <rect x="256" y="198" width="230" height="70" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="214" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Качественная реакция</text>
  <text x="270" y="232" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Окраска пламени:</text>
  <text x="270" y="246" font-family="Arial,sans-serif" font-size="6" fill="#EF5350">Li — карминово-красный</text>
  <text x="270" y="258" font-family="Arial,sans-serif" font-size="6" fill="#FFA726">Na — жёлтый</text>
  <text x="380" y="246" font-family="Arial,sans-serif" font-size="6" fill="#AB47BC">K — фиолетовый</text>
  <!-- Bottom: NaOH -->
  <rect x="14" y="278" width="472" height="58" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Щёлочи — MeOH (NaOH, KOH)</text>
  <text x="250" y="312" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">NaOH — едкий натр, KOH — едкое кали</text>
  <text x="250" y="326" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Мыло, производство бумаги, алюминия, очистка нефтепродуктов</text>
</svg>