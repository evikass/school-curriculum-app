<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Periodic table simplified -->
  <!-- Row 1 -->
  <rect x="30" y="30" width="30" height="25" rx="2" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="1"/>
  <text x="45" y="47" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">H</text>
  <rect x="420" y="30" width="30" height="25" rx="2" fill="#9ca3af" fill-opacity="0.3" stroke="#9ca3af" stroke-width="1"/>
  <text x="435" y="47" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">He</text>
  <!-- Row 2 -->
  <rect x="30" y="60" width="30" height="25" rx="2" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="1"/>
  <text x="45" y="77" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">Li</text>
  <rect x="60" y="60" width="30" height="25" rx="2" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1"/>
  <text x="75" y="77" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">Be</text>
  <rect x="180" y="60" width="30" height="25" rx="2" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="195" y="77" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">B</text>
  <rect x="210" y="60" width="30" height="25" rx="2" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="225" y="77" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">C</text>
  <rect x="240" y="60" width="30" height="25" rx="2" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="255" y="77" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">N</text>
  <rect x="270" y="60" width="30" height="25" rx="2" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="285" y="77" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">O</text>
  <rect x="300" y="60" width="30" height="25" rx="2" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <text x="315" y="77" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">F</text>
  <rect x="420" y="60" width="30" height="25" rx="2" fill="#9ca3af" fill-opacity="0.3" stroke="#9ca3af" stroke-width="1"/>
  <text x="435" y="77" fill="#ffffff" font-size="8" font-family="sans-serif" text-anchor="middle">Ne</text>
  <!-- Arrow showing properties change in period -->
  <line x1="35" y1="100" x2="330" y2="100" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="330,96 340,100 330,104" fill="#f59e0b"/>
  <text x="180" y="115" fill="#f59e0b" font-size="9" font-family="sans-serif" text-anchor="middle">Металлические ↓ Неметаллические ↑</text>
  <!-- Arrow in group -->
  <line x1="48" y1="90" x2="48" y2="200" stroke="#22d3ee" stroke-width="2"/>
  <polygon points="44,200 48,210 52,200" fill="#22d3ee"/>
  <text x="20" y="160" fill="#22d3ee" font-size="8" font-family="sans-serif" transform="rotate(-90,20,160)">Металлические ↑</text>
  <!-- Trend diagrams -->
  <rect x="60" y="130" width="180" height="80" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="150" y="150" fill="#6366f1" font-size="10" font-family="sans-serif" text-anchor="middle">В периоде (→):</text>
  <text x="150" y="165" fill="#ef4444" font-size="9" font-family="sans-serif" text-anchor="middle">Заряд ядра ↑</text>
  <text x="150" y="178" fill="#3b82f6" font-size="9" font-family="sans-serif" text-anchor="middle">Радиус атома ↓</text>
  <text x="150" y="195" fill="#22c55e" font-size="9" font-family="sans-serif" text-anchor="middle">Неметаллические ↑</text>
  <rect x="260" y="130" width="180" height="80" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="350" y="150" fill="#f59e0b" font-size="10" font-family="sans-serif" text-anchor="middle">В группе (↓):</text>
  <text x="350" y="165" fill="#ef4444" font-size="9" font-family="sans-serif" text-anchor="middle">Число слоёв ↑</text>
  <text x="350" y="178" fill="#3b82f6" font-size="9" font-family="sans-serif" text-anchor="middle">Радиус атома ↑</text>
  <text x="350" y="195" fill="#22c55e" font-size="9" font-family="sans-serif" text-anchor="middle">Металлические ↑</text>
  <!-- Footer -->
  <text x="250" y="240" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">Менделеев, 1869 г. — свойства зависят от заряда ядра</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Периодический закон и строение атома</text>
</svg>