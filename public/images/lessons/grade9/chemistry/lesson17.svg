<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg17" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh17">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg17)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Способы получения металлов</text>

  <!-- Pyrometallurgy -->
  <rect x="12" y="40" width="185" height="78" rx="6" fill="#0f766e" filter="url(#sh17)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#fca5a5" font-weight="bold">Пирометаллургия:</text>
  <text x="22" y="70" font-family="Arial,sans-serif" font-size="8" fill="white">Восстановление при высокой t&#176;</text>
  <text x="22" y="83" font-family="Arial,sans-serif" font-size="8" fill="white">Fe&#8322;O&#8323; + 3CO = 2Fe + 3CO&#8322;</text>
  <text x="22" y="96" font-family="Arial,sans-serif" font-size="8" fill="white">SnO&#8322; + 2C = Sn + 2CO</text>
  <text x="22" y="109" font-family="Arial,sans-serif" font-size="8" fill="white">ZnO + C = Zn + CO</text>
  <text x="22" y="115" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Восстановители: C, CO, H&#8322;, Al</text>

  <!-- Hydrometallurgy -->
  <rect x="203" y="40" width="185" height="78" rx="6" fill="#134e4a" filter="url(#sh17)"/>
  <text x="213" y="56" font-family="Arial,sans-serif" font-size="9" fill="#93c5fd" font-weight="bold">Гидрометаллургия:</text>
  <text x="213" y="70" font-family="Arial,sans-serif" font-size="8" fill="white">Растворение + вытеснение</text>
  <text x="213" y="83" font-family="Arial,sans-serif" font-size="8" fill="white">CuO + H&#8322;SO&#8324; = CuSO&#8324; + H&#8322;O</text>
  <text x="213" y="96" font-family="Arial,sans-serif" font-size="8" fill="white">CuSO&#8324; + Fe = FeSO&#8324; + Cu</text>
  <text x="213" y="109" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Для Me средней активности</text>

  <!-- Electrometallurgy -->
  <rect x="12" y="126" width="376" height="48" rx="6" fill="#0f766e" filter="url(#sh17)"/>
  <text x="22" y="142" font-family="Arial,sans-serif" font-size="9" fill="#c4b5fd" font-weight="bold">Электрометаллургия (электролиз):</text>
  <text x="22" y="156" font-family="Arial,sans-serif" font-size="8" fill="white">2Al&#8322;O&#8323; (расплав) &#8594; 4Al + 3O&#8322; | NaCl (расплав) &#8594; Na + Cl&#8322;</text>
  <text x="22" y="168" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Для активных Me (Al, Na, K, Mg, Ca) - электролиз расплавов</text>

  <!-- Blast furnace -->
  <rect x="12" y="182" width="185" height="106" rx="6" fill="#134e4a" filter="url(#sh17)"/>
  <text x="22" y="198" font-family="Arial,sans-serif" font-size="9" fill="#fca5a5" font-weight="bold">Доменная печь (Fe):</text>
  <text x="22" y="212" font-family="Arial,sans-serif" font-size="8" fill="white">Сырьё: Fe&#8322;O&#8323;, кокс, CaCO&#8323;</text>
  <text x="22" y="225" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">1. C + O&#8322; = CO&#8322;</text>
  <text x="22" y="236" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">2. CO&#8322; + C = 2CO</text>
  <text x="22" y="247" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">3. Fe&#8322;O&#8323; + 3CO = 2Fe + 3CO&#8322;</text>
  <text x="22" y="258" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">4. CaCO&#8323; = CaO + CO&#8322;</text>
  <text x="22" y="269" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">5. CaO + SiO&#8322; = CaSiO&#8323; (шлак)</text>
  <text x="22" y="282" font-family="Arial,sans-serif" font-size="7" fill="#fca5a5">Продукт: чугун (Fe + C)</text>

  <!-- Al electrolysis -->
  <rect x="203" y="182" width="185" height="106" rx="6" fill="#0f766e" filter="url(#sh17)"/>
  <text x="213" y="198" font-family="Arial,sans-serif" font-size="9" fill="#93c5fd" font-weight="bold">Производство Al:</text>
  <text x="213" y="212" font-family="Arial,sans-serif" font-size="8" fill="white">Сырьё: боксит (Al&#8322;O&#8323;)</text>
  <text x="213" y="225" font-family="Arial,sans-serif" font-size="8" fill="white">Электролиз расплава Al&#8322;O&#8323;</text>
  <text x="213" y="238" font-family="Arial,sans-serif" font-size="8" fill="white">в криолите Na&#8323;AlF&#8326;</text>
  <text x="213" y="251" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Катод (-): Al&#179;&#8314; + 3e&#8315; = Al</text>
  <text x="213" y="264" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Анод (+): 2O&#178;&#8315; - 4e&#8315; = O&#8322;</text>
  <text x="213" y="278" font-family="Arial,sans-serif" font-size="7" fill="#fbbf24">Очень энергоёмкий процесс!</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 17</text>
</svg>