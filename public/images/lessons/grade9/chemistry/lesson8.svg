<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FDFA"/>
      <stop offset="100%" stop-color="#CCFBF1"/>
    </linearGradient>
    <filter id="sh8">
      <feDropShadow dx="1" dy="1.5" stdDeviation="2" flood-color="#00000025"/>
    </filter>
    <linearGradient id="waterBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg8)" rx="10"/>
  <rect x="2" y="2" width="396" height="296" rx="9" fill="none" stroke="#0d9488" stroke-width="2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="46" rx="10" fill="#0d9488"/>
  <rect x="0" y="20" width="400" height="26" fill="#0d9488"/>
  <text x="200" y="22" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Электролитическая диссоциация</text>
  <text x="200" y="38" font-family="Arial,sans-serif" font-size="9" fill="#ccfbf1" text-anchor="middle">Химия 9 класс</text>

  <!-- Main equation -->
  <rect x="20" y="54" width="360" height="30" rx="6" fill="white" stroke="#0d9488" stroke-width="1" filter="url(#sh8)"/>
  <text x="200" y="74" font-family="Arial,sans-serif" font-size="13" fill="#1e293b" text-anchor="middle" font-weight="bold">NaCl → Na⁺ + Cl⁻</text>

  <!-- Left: NaCl crystal -->
  <rect x="14" y="96" width="130" height="126" rx="8" fill="white" stroke="#0d9488" stroke-width="1.2" filter="url(#sh8)"/>
  <rect x="14" y="96" width="130" height="20" rx="8" fill="#0d9488" opacity="0.15"/>
  <rect x="14" y="108" width="130" height="8" fill="#0d9488" opacity="0.15"/>
  <text x="79" y="112" font-family="Arial,sans-serif" font-size="8" fill="#0d9488" text-anchor="middle" font-weight="bold">Кристалл NaCl</text>

  <!-- Crystal lattice -->
  <rect x="30" y="126" width="98" height="80" rx="4" fill="url(#waterBg)" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="3,2"/>

  <!-- Na ions in lattice (small red) -->
  <circle cx="48" cy="140" r="8" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="48" y="143" font-family="Arial,sans-serif" font-size="7" fill="#991b1b" text-anchor="middle" font-weight="bold">Na⁺</text>
  <circle cx="88" cy="140" r="8" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="88" y="143" font-family="Arial,sans-serif" font-size="7" fill="#991b1b" text-anchor="middle" font-weight="bold">Na⁺</text>
  <circle cx="68" cy="164" r="8" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="68" y="167" font-family="Arial,sans-serif" font-size="7" fill="#991b1b" text-anchor="middle" font-weight="bold">Na⁺</text>
  <circle cx="108" cy="164" r="8" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="108" y="167" font-family="Arial,sans-serif" font-size="7" fill="#991b1b" text-anchor="middle" font-weight="bold">Na⁺</text>
  <circle cx="48" cy="188" r="8" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="48" y="191" font-family="Arial,sans-serif" font-size="7" fill="#991b1b" text-anchor="middle" font-weight="bold">Na⁺</text>
  <circle cx="88" cy="188" r="8" fill="#fecaca" stroke="#ef4444" stroke-width="1"/>
  <text x="88" y="191" font-family="Arial,sans-serif" font-size="7" fill="#991b1b" text-anchor="middle" font-weight="bold">Na⁺</text>

  <!-- Cl ions in lattice (large blue-green) -->
  <circle cx="68" cy="140" r="10" fill="#a7f3d0" stroke="#059669" stroke-width="1"/>
  <text x="68" y="143" font-family="Arial,sans-serif" font-size="7" fill="#065f46" text-anchor="middle" font-weight="bold">Cl⁻</text>
  <circle cx="108" cy="140" r="10" fill="#a7f3d0" stroke="#059669" stroke-width="1"/>
  <text x="108" y="143" font-family="Arial,sans-serif" font-size="7" fill="#065f46" text-anchor="middle" font-weight="bold">Cl⁻</text>
  <circle cx="48" cy="164" r="10" fill="#a7f3d0" stroke="#059669" stroke-width="1"/>
  <text x="48" y="167" font-family="Arial,sans-serif" font-size="7" fill="#065f46" text-anchor="middle" font-weight="bold">Cl⁻</text>
  <circle cx="88" cy="164" r="10" fill="#a7f3d0" stroke="#059669" stroke-width="1"/>
  <text x="88" y="167" font-family="Arial,sans-serif" font-size="7" fill="#065f46" text-anchor="middle" font-weight="bold">Cl⁻</text>
  <circle cx="68" cy="188" r="10" fill="#a7f3d0" stroke="#059669" stroke-width="1"/>
  <text x="68" y="191" font-family="Arial,sans-serif" font-size="7" fill="#065f46" text-anchor="middle" font-weight="bold">Cl⁻</text>
  <circle cx="108" cy="188" r="10" fill="#a7f3d0" stroke="#059669" stroke-width="1"/>
  <text x="108" y="191" font-family="Arial,sans-serif" font-size="7" fill="#065f46" text-anchor="middle" font-weight="bold">Cl⁻</text>

  <!-- Center arrow -->
  <text x="160" y="162" font-family="Arial,sans-serif" font-size="20" fill="#0d9488" text-anchor="middle" font-weight="bold">→</text>
  <text x="160" y="178" font-family="Arial,sans-serif" font-size="7" fill="#0d9488" text-anchor="middle">H₂O</text>

  <!-- Right: Dissolved ions in water -->
  <rect x="182" y="96" width="204" height="126" rx="8" fill="white" stroke="#0d9488" stroke-width="1.2" filter="url(#sh8)"/>
  <rect x="182" y="96" width="204" height="20" rx="8" fill="#0d9488" opacity="0.15"/>
  <rect x="182" y="108" width="204" height="8" fill="#0d9488" opacity="0.15"/>
  <text x="284" y="112" font-family="Arial,sans-serif" font-size="8" fill="#0d9488" text-anchor="middle" font-weight="bold">Раствор (диссоциация)</text>

  <!-- Water background -->
  <rect x="192" y="120" width="184" height="90" rx="4" fill="#e0f2fe" opacity="0.4"/>

  <!-- Hydrated Na+ with water molecules -->
  <circle cx="230" cy="165" r="14" fill="#fecaca" stroke="#ef4444" stroke-width="1.5"/>
  <text x="230" y="169" font-family="Arial,sans-serif" font-size="9" fill="#991b1b" text-anchor="middle" font-weight="bold">Na⁺</text>
  <!-- Water molecules around Na+ -->
  <circle cx="210" cy="148" r="7" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8" opacity="0.7"/>
  <text x="210" y="151" font-family="Arial,sans-serif" font-size="5" fill="#1e40af" text-anchor="middle">δ⁻</text>
  <circle cx="250" cy="148" r="7" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8" opacity="0.7"/>
  <text x="250" y="151" font-family="Arial,sans-serif" font-size="5" fill="#1e40af" text-anchor="middle">δ⁻</text>
  <circle cx="214" cy="182" r="7" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8" opacity="0.7"/>
  <text x="214" y="185" font-family="Arial,sans-serif" font-size="5" fill="#1e40af" text-anchor="middle">δ⁻</text>
  <circle cx="246" cy="182" r="7" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8" opacity="0.7"/>
  <text x="246" y="185" font-family="Arial,sans-serif" font-size="5" fill="#1e40af" text-anchor="middle">δ⁻</text>

  <!-- Hydrated Cl- with water molecules -->
  <circle cx="340" cy="165" r="16" fill="#a7f3d0" stroke="#059669" stroke-width="1.5"/>
  <text x="340" y="169" font-family="Arial,sans-serif" font-size="9" fill="#065f46" text-anchor="middle" font-weight="bold">Cl⁻</text>
  <!-- Water molecules around Cl- -->
  <circle cx="320" cy="148" r="7" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8" opacity="0.7"/>
  <text x="320" y="151" font-family="Arial,sans-serif" font-size="5" fill="#1e40af" text-anchor="middle">δ⁺</text>
  <circle cx="360" cy="148" r="7" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8" opacity="0.7"/>
  <text x="360" y="151" font-family="Arial,sans-serif" font-size="5" fill="#1e40af" text-anchor="middle">δ⁺</text>
  <circle cx="324" cy="185" r="7" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8" opacity="0.7"/>
  <text x="324" y="185" font-family="Arial,sans-serif" font-size="5" fill="#1e40af" text-anchor="middle">δ⁺</text>
  <circle cx="356" cy="185" r="7" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8" opacity="0.7"/>
  <text x="356" y="185" font-family="Arial,sans-serif" font-size="5" fill="#1e40af" text-anchor="middle">δ⁺</text>

  <!-- Scattered water molecules -->
  <circle cx="280" cy="140" r="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.6" opacity="0.5"/>
  <circle cx="295" cy="185" r="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.6" opacity="0.5"/>
  <circle cx="270" cy="195" r="6" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.6" opacity="0.5"/>

  <!-- Bottom: Electrolyte classification -->
  <rect x="14" y="232" width="372" height="52" rx="8" fill="white" stroke="#0d9488" stroke-width="1" filter="url(#sh8)"/>
  <rect x="14" y="232" width="372" height="18" rx="8" fill="#0d9488" opacity="0.1"/>
  <rect x="14" y="242" width="372" height="8" fill="#0d9488" opacity="0.1"/>
  <text x="200" y="246" font-family="Arial,sans-serif" font-size="8" fill="#0d9488" text-anchor="middle" font-weight="bold">Классификация электролитов</text>

  <!-- Strong -->
  <rect x="24" y="256" width="108" height="20" rx="4" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="0.8"/>
  <text x="78" y="270" font-family="Arial,sans-serif" font-size="7" fill="#0d9488" text-anchor="middle" font-weight="bold">Сильные</text>

  <!-- Medium -->
  <rect x="146" y="256" width="108" height="20" rx="4" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="0.8"/>
  <text x="200" y="270" font-family="Arial,sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle" font-weight="bold">Средние</text>

  <!-- Weak -->
  <rect x="268" y="256" width="108" height="20" rx="4" fill="#2dd4bf" opacity="0.15" stroke="#2dd4bf" stroke-width="0.8"/>
  <text x="322" y="270" font-family="Arial,sans-serif" font-size="7" fill="#0d9488" text-anchor="middle" font-weight="bold">Слабые</text>

  <!-- Examples under each -->
  <text x="78" y="279" font-family="Arial,sans-serif" font-size="6" fill="#64748b" text-anchor="middle">HCl, NaOH, NaCl</text>
  <text x="200" y="279" font-family="Arial,sans-serif" font-size="6" fill="#64748b" text-anchor="middle">H₃PO₄, H₂SO₃</text>
  <text x="322" y="279" font-family="Arial,sans-serif" font-size="6" fill="#64748b" text-anchor="middle">H₂CO₃, NH₃·H₂O</text>
</svg>