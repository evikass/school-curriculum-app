<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Three conditions for RIO -->
  <!-- 1. Precipitate -->
  <rect x="40" y="25" width="130" height="120" rx="8" fill="#1a1a2e" stroke="#ef4444" stroke-width="1.5"/>
  <text x="105" y="45" fill="#ef4444" font-size="10" font-family="serif" text-anchor="middle">Осадок ↓</text>
  <path d="M65,60 L65,110 Q65,120 75,120 L135,120 Q145,120 145,110 L145,60" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="75" y="100" width="60" height="15" rx="2" fill="#ffffff" fill-opacity="0.25"/>
  <text x="105" y="112" fill="#ffffff" font-size="8" font-family="serif" text-anchor="middle">AgCl↓</text>
  <text x="105" y="140" fill="#9ca3af" font-size="7" font-family="serif" text-anchor="middle">Ag⁺+Cl⁻→AgCl↓</text>
  <!-- 2. Gas -->
  <rect x="185" y="25" width="130" height="120" rx="8" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5"/>
  <text x="250" y="45" fill="#22c55e" font-size="10" font-family="serif" text-anchor="middle">Газ ↑</text>
  <path d="M210,60 L210,110 Q210,120 220,120 L280,120 Q290,120 290,110 L290,60" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="240" cy="80" r="3" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="260" cy="70" r="4" fill="none" stroke="#22c55e" stroke-width="1"/>
  <circle cx="250" cy="90" r="2.5" fill="none" stroke="#22c55e" stroke-width="1"/>
  <text x="250" y="110" fill="#22c55e" font-size="8" font-family="serif" text-anchor="middle">CO₂↑</text>
  <text x="250" y="140" fill="#9ca3af" font-size="7" font-family="serif" text-anchor="middle">CO₃²⁻+2H⁺→CO₂↑+H₂O</text>
  <!-- 3. Water -->
  <rect x="330" y="25" width="130" height="120" rx="8" fill="#1a1a2e" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="395" y="45" fill="#3b82f6" font-size="10" font-family="serif" text-anchor="middle">Вода H₂O</text>
  <path d="M355,60 L355,110 Q355,120 365,120 L425,120 Q435,120 435,110 L435,60" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <path d="M390,90 Q395,78 400,90 Q395,97 390,90" fill="#3b82f6" fill-opacity="0.4"/>
  <text x="395" y="112" fill="#3b82f6" font-size="8" font-family="serif" text-anchor="middle">нейтрал.</text>
  <text x="395" y="140" fill="#9ca3af" font-size="7" font-family="serif" text-anchor="middle">H⁺+OH⁻→H₂O</text>
  <!-- Ion equation process -->
  <rect x="30" y="160" width="440" height="110" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="250" y="180" fill="#f59e0b" font-size="10" font-family="sans-serif" text-anchor="middle">Составление ионных уравнений:</text>
  <text x="50" y="200" fill="#9ca3af" font-size="9" font-family="sans-serif">1. Молекулярное: AgNO₃ + NaCl → AgCl↓ + NaNO₃</text>
  <text x="50" y="220" fill="#9ca3af" font-size="9" font-family="sans-serif">2. Полное ионное: Ag⁺+NO₃⁻+Na⁺+Cl⁻→AgCl↓+Na⁺+NO₃⁻</text>
  <text x="50" y="240" fill="#22d3ee" font-size="10" font-family="sans-serif">3. Сокращённое: Ag⁺ + Cl⁻ → AgCl↓</text>
  <text x="50" y="260" fill="#ef4444" font-size="9" font-family="sans-serif">РИО ⇨ осадок ↓ , газ ↑ или вода H₂O</text>
  <text x="250" y="290" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">Сильные электролиты → ионы | Слабые, осадки, газы → молекулы</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Реакции ионного обмена</text>
</svg>