<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg33" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh33">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg33)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">Обобщение: Химия 8-9 классы</text>

  <!-- Central node -->
  <rect x="145" y="38" width="110" height="22" rx="11" fill="#0d9488"/>
  <text x="200" y="53" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white" font-weight="bold">ХИМИЯ</text>

  <!-- 4 branches -->
  <line x1="160" y1="60" x2="80" y2="72" stroke="#5eead4" stroke-width="1"/>
  <line x1="180" y1="60" x2="200" y2="72" stroke="#5eead4" stroke-width="1"/>
  <line x1="220" y1="60" x2="200" y2="72" stroke="#5eead4" stroke-width="1"/>
  <line x1="240" y1="60" x2="320" y2="72" stroke="#5eead4" stroke-width="1"/>

  <!-- Branch 1: Periodic law -->
  <rect x="12" y="72" width="95" height="60" rx="5" fill="#0f766e" filter="url(#sh33)"/>
  <text x="59" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5eead4" font-weight="bold">Периодич.</text>
  <text x="59" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5eead4" font-weight="bold">закон</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="6" fill="white">ПСХЭ Д.И.Менделеев</text>
  <text x="22" y="118" font-family="Arial,sans-serif" font-size="6" fill="white">Периоды, группы</text>
  <text x="22" y="128" font-family="Arial,sans-serif" font-size="6" fill="#99f6e4">Z, Ar, e- конфиг.</text>

  <!-- Branch 2: Chemical bonding -->
  <rect x="115" y="72" width="95" height="60" rx="5" fill="#0f766e" filter="url(#sh33)"/>
  <text x="162" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5eead4" font-weight="bold">Хим. связь</text>
  <text x="125" y="98" font-family="Arial,sans-serif" font-size="6" fill="white">Ковалентная (О/Н)</text>
  <text x="125" y="108" font-family="Arial,sans-serif" font-size="6" fill="white">Ионная</text>
  <text x="125" y="118" font-family="Arial,sans-serif" font-size="6" fill="white">Металлическая</text>
  <text x="125" y="128" font-family="Arial,sans-serif" font-size="6" fill="#99f6e4">ЭО, крист. решётки</text>

  <!-- Branch 3: Reaction types -->
  <rect x="218" y="72" width="95" height="60" rx="5" fill="#0f766e" filter="url(#sh33)"/>
  <text x="265" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5eead4" font-weight="bold">Типы реакц.</text>
  <text x="228" y="98" font-family="Arial,sans-serif" font-size="6" fill="white">Соединения A+B=AB</text>
  <text x="228" y="108" font-family="Arial,sans-serif" font-size="6" fill="white">Разложения AB=A+B</text>
  <text x="228" y="118" font-family="Arial,sans-serif" font-size="6" fill="white">Замещения</text>
  <text x="228" y="128" font-family="Arial,sans-serif" font-size="6" fill="#99f6e4">Обмена, ОВР</text>

  <!-- Branch 4: Classes of substances -->
  <rect x="321" y="72" width="67" height="60" rx="5" fill="#0f766e" filter="url(#sh33)"/>
  <text x="354" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5eead4" font-weight="bold">Классы</text>
  <text x="331" y="98" font-family="Arial,sans-serif" font-size="6" fill="white">Оксиды</text>
  <text x="331" y="108" font-family="Arial,sans-serif" font-size="6" fill="white">Кислоты</text>
  <text x="331" y="118" font-family="Arial,sans-serif" font-size="6" fill="white">Основания</text>
  <text x="331" y="128" font-family="Arial,sans-serif" font-size="6" fill="#99f6e4">Соли</text>

  <!-- Sub-branches detail -->
  <rect x="12" y="140" width="185" height="60" rx="6" fill="#134e4a" filter="url(#sh33)"/>
  <text x="22" y="155" font-family="Arial,sans-serif" font-size="8" fill="#5eead4" font-weight="bold">Металлы vs Неметаллы:</text>
  <text x="22" y="168" font-family="Arial,sans-serif" font-size="7" fill="white">Me: восст-ли, осн. оксиды</text>
  <text x="22" y="179" font-family="Arial,sans-serif" font-size="7" fill="white">НеMe: ок-ли, кисл. оксиды</text>
  <text x="22" y="190" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Электрохим. ряд напряж.</text>

  <rect x="203" y="140" width="185" height="60" rx="6" fill="#134e4a" filter="url(#sh33)"/>
  <text x="213" y="155" font-family="Arial,sans-serif" font-size="8" fill="#5eead4" font-weight="bold">Расчёты:</text>
  <text x="213" y="168" font-family="Arial,sans-serif" font-size="7" fill="white">n=m/M, V=Vm-n, w=m/m</text>
  <text x="213" y="179" font-family="Arial,sans-serif" font-size="7" fill="white">Уравнения реакций</text>
  <text x="213" y="190" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Выход, примеси, р-ры</text>

  <!-- Key concepts summary -->
  <rect x="12" y="208" width="376" height="78" rx="6" fill="#0f766e" filter="url(#sh33)"/>
  <text x="22" y="224" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Ключевые понятия:</text>
  <text x="22" y="238" font-family="Arial,sans-serif" font-size="7" fill="white">Валентность, СО, ОВР, ЭО, аллотропия, кристаллические решётки</text>
  <text x="22" y="251" font-family="Arial,sans-serif" font-size="7" fill="white">Электролитич. диссоциация, рН, индикаторы, гидролиз</text>
  <text x="22" y="264" font-family="Arial,sans-serif" font-size="7" fill="white">Скорость реакций, катализ, хим. равновесие</text>
  <text x="22" y="277" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Производство: чугун, сталь, H&#178;SO&#8308;, HNO&#179;, NH&#179;, стекло, удобрения</text>
  <text x="345" y="224" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 33</text>

</svg>