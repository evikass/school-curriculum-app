<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient></defs>
  <rect width="500" height="350" rx="8" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Кислород и его соединения</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 15</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <rect x="14" y="54" width="155" height="100" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="91" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">O2 — Кислород</text>
  <text x="91" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Z = 8, Ar = 16</text>
  <text x="91" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">21% в воздухе</text>
  <text x="91" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Бесцветный газ</text>
  <text x="91" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Сильный окислитель</text>
  <text x="91" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">t кип. = -183 C</text>
  <rect x="178" y="54" width="155" height="100" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="255" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">O3 — Озон</text>
  <text x="255" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Аллотропная модификация</text>
  <text x="255" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Голубой газ с запахом</text>
  <text x="255" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Сильнейший окислитель</text>
  <text x="255" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Озоновый слой — защита</text>
  <text x="255" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Дезинфекция воды</text>
  <rect x="342" y="54" width="144" height="100" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="414" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Получение O2</text>
  <text x="356" y="88" font-family="Arial,sans-serif" font-size="5" fill="#004D40">2KMnO4 =</text>
  <text x="356" y="98" font-family="Arial,sans-serif" font-size="5" fill="#004D40"> K2MnO4+MnO2+O2</text>
  <text x="356" y="112" font-family="Arial,sans-serif" font-size="5" fill="#004D40">2H2O2 =</text>
  <text x="356" y="122" font-family="Arial,sans-serif" font-size="5" fill="#004D40"> 2H2O + O2 (MnO2 кат.)</text>
  <text x="356" y="138" font-family="Arial,sans-serif" font-size="5" fill="#00897B">Разгонка жидкого воздуха</text>
  <!-- Combustion reactions -->
  <rect x="14" y="162" width="472" height="85" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Горение — реакция с кислородом</text>
  <text x="150" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">C + O2 = CO2</text>
  <text x="150" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">2H2 + O2 = 2H2O</text>
  <text x="150" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">S + O2 = SO2</text>
  <text x="350" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">4Fe + 3O2 = 2Fe2O3</text>
  <text x="350" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">2Mg + O2 = 2MgO (яркая вспышка)</text>
  <text x="350" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">CH4 + 2O2 = CO2 + 2H2O</text>
  <text x="250" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Все реакции горения — экзотермические!</text>
  <!-- Oxides -->
  <rect x="14" y="255" width="230" height="80" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="271" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Оксиды металлов — основные</text>
  <text x="129" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">CaO + H2O = Ca(OH)2</text>
  <text x="129" y="302" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Na2O + H2O = 2NaOH</text>
  <text x="129" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Образуют щёлочи с водой</text>
  <rect x="256" y="255" width="230" height="80" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="271" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Оксиды неметаллов — кислотные</text>
  <text x="270" y="288" font-family="Arial,sans-serif" font-size="6" fill="#004D40">CO2 + H2O = H2CO3</text>
  <text x="270" y="302" font-family="Arial,sans-serif" font-size="6" fill="#004D40">SO3 + H2O = H2SO4</text>
  <text x="270" y="320" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Образуют кислоты с водой</text>
</svg>