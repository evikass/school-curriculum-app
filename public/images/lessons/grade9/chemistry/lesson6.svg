<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Balance scale for mass fraction -->
  <!-- Left pan: solute -->
  <line x1="250" y1="30" x2="250" y2="70" stroke="#9ca3af" stroke-width="2"/>
  <line x1="100" y1="70" x2="400" y2="70" stroke="#9ca3af" stroke-width="2"/>
  <!-- Left pan -->
  <path d="M80,90 Q100,120 120,90" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <line x1="100" y1="70" x2="100" y2="90" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="100" cy="105" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="100" y="110" fill="#f59e0b" font-size="8" font-family="serif" text-anchor="middle">m(в-ва)</text>
  <!-- Right pan -->
  <path d="M360,90 Q400,120 440,90" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <line x1="400" y1="70" x2="400" y2="90" stroke="#9ca3af" stroke-width="1.5"/>
  <rect x="370" y="100" width="60" height="25" rx="3" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="117" fill="#6366f1" font-size="8" font-family="serif" text-anchor="middle">m(р-ра)</text>
  <!-- Formula -->
  <text x="250" y="155" fill="#f59e0b" font-size="14" font-family="serif" text-anchor="middle">ω = m(в-ва) / m(р-ра) × 100%</text>
  <!-- Example calculation -->
  <rect x="30" y="175" width="440" height="100" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="195" fill="#6366f1" font-size="10" font-family="sans-serif" text-anchor="middle">Пример:</text>
  <text x="50" y="215" fill="#9ca3af" font-size="9" font-family="sans-serif">20 г сахара растворили в 200 г воды</text>
  <text x="50" y="233" fill="#22d3ee" font-size="9" font-family="sans-serif">m(р-ра) = 20 + 200 = 220 г</text>
  <text x="50" y="251" fill="#f59e0b" font-size="9" font-family="sans-serif">ω = 20 / 220 × 100% = 9,1%</text>
  <!-- Key facts -->
  <text x="250" y="295" fill="#ef4444" font-size="9" font-family="sans-serif" text-anchor="middle">При выпаривании ω↑ | При добавлении воды ω↓</text>
  <text x="250" y="315" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">m(р-ра) = m(в-ва) + m(растворителя)</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Массовая доля вещества в растворе</text>
</svg>