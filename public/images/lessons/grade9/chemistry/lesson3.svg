<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh3">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg3)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Электроотрицательность</text>

  <!-- Definition -->
  <rect x="12" y="40" width="376" height="42" rx="6" fill="#0f766e" filter="url(#sh3)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Шкала Полинга:</text>
  <text x="22" y="70" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">Способность атома притягивать электроны в химической связи</text>

  <!-- Most electronegative -->
  <rect x="12" y="90" width="376" height="42" rx="6" fill="#134e4a" filter="url(#sh3)"/>
  <text x="22" y="106" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Наиболее э/о элементы:</text>
  <text x="22" y="122" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">F</text>
  <text x="34" y="122" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">= 4.0</text>
  <text x="80" y="122" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">O</text>
  <text x="94" y="122" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">= 3.5</text>
  <text x="140" y="122" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">N</text>
  <text x="153" y="122" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">= 3.0</text>
  <text x="200" y="122" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">Cl</text>
  <text x="217" y="122" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">= 3.0</text>
  <text x="265" y="122" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">C</text>
  <text x="278" y="122" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">= 2.5</text>
  <text x="330" y="122" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">H</text>
  <text x="344" y="122" font-family="Arial,sans-serif" font-size="9" fill="#99f6e4">= 2.1</text>

  <!-- Periodic table trends -->
  <rect x="12" y="140" width="185" height="68" rx="6" fill="#0f766e" filter="url(#sh3)"/>
  <text x="22" y="156" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Тенденции в ПСХЭ:</text>
  <line x1="100" y1="170" x2="170" y2="170" stroke="#14b8a6" stroke-width="1.5"/>
  <polygon points="170,167 176,170 170,173" fill="#14b8a6"/>
  <text x="130" y="166" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#f0fdfa">по периоду</text>
  <text x="130" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#ccfbf1">ЭО возрастает</text>
  <line x1="100" y1="196" x2="30" y2="196" stroke="#f97316" stroke-width="1.5"/>
  <polygon points="30,193 24,196 30,199" fill="#f97316"/>
  <text x="65" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#f0fdfa">по группе</text>
  <text x="65" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fca5a5">ЭО убывает</text>

  <!-- Bond polarity -->
  <rect x="203" y="140" width="185" height="68" rx="6" fill="#0f766e" filter="url(#sh3)"/>
  <text x="213" y="156" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Полярность связи:</text>
  <text x="213" y="172" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">Разность ЭО = 0: ковал. непол.</text>
  <text x="213" y="184" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">Разность ЭО &lt; 2: ковал. полярн.</text>
  <text x="213" y="196" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">Разность ЭО &gt; 2: ионная связь</text>
  <text x="213" y="207" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Na-Cl: 3.0-0.9=2.1 (ионная)</text>

  <!-- Scale bar -->
  <rect x="12" y="216" width="376" height="72" rx="6" fill="#134e4a" filter="url(#sh3)"/>
  <text x="22" y="232" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Шкала электроотрицательности (Полинг):</text>
  <rect x="22" y="240" width="340" height="14" rx="3" fill="#115e59"/>
  <rect x="22" y="240" width="56" height="14" rx="3" fill="#1e3a5f"/>
  <rect x="78" y="240" width="57" height="14" fill="#0f4c5c"/>
  <rect x="135" y="240" width="56" height="14" fill="#0f6464"/>
  <rect x="191" y="240" width="57" height="14" fill="#0d7a6e"/>
  <rect x="248" y="240" width="56" height="14" fill="#0d9488"/>
  <rect x="304" y="240" width="58" height="14" rx="3" fill="#14b8a6"/>
  <text x="50" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">0.7</text>
  <text x="150" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">1.5</text>
  <text x="250" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">2.5</text>
  <text x="340" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">4.0</text>
  <text x="30" y="264" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Me</text>
  <text x="340" y="264" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">NeMe</text>
  <text x="22" y="280" font-family="Arial,sans-serif" font-size="8" fill="#ccfbf1">ЭО металлов мала (0.7-1.5), неметаллов - велика (2.0-4.0)</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 3</text>
</svg>