<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg28" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh28">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg28)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Углерод и его соединения</text>

  <!-- Allotropes -->
  <rect x="12" y="40" width="120" height="65" rx="6" fill="#0f766e" filter="url(#sh28)"/>
  <text x="72" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Алмаз</text>
  <polygon points="55,65 72,60 89,65 89,80 72,85 55,80" fill="#e2e8f0" opacity="0.3" stroke="#e2e8f0" stroke-width="0.5"/>
  <text x="72" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white">sp&#179;</text>
  <text x="72" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">твёрдый, прозрачн.</text>

  <rect x="140" y="40" width="120" height="65" rx="6" fill="#0f766e" filter="url(#sh28)"/>
  <text x="200" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Графит</text>
  <rect x="165" y="62" width="70" height="8" rx="2" fill="#64748b" opacity="0.5"/>
  <rect x="165" y="72" width="70" height="8" rx="2" fill="#475569" opacity="0.5"/>
  <rect x="165" y="82" width="70" height="8" rx="2" fill="#334155" opacity="0.5"/>
  <text x="200" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">sp&#178;, слоистый</text>

  <rect x="268" y="40" width="120" height="65" rx="6" fill="#0f766e" filter="url(#sh28)"/>
  <text x="328" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Фуллерен</text>
  <circle cx="328" cy="78" r="14" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.7"/>
  <polygon points="328,64 340,71 340,85 328,92 316,85 316,71" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.5"/>
  <text x="328" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#a78bfa">C&#8310;&#8320;</text>
  <text x="328" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">сферич. молекула</text>

  <!-- CO vs CO2 -->
  <rect x="12" y="112" width="185" height="50" rx="6" fill="#134e4a" filter="url(#sh28)"/>
  <text x="22" y="128" font-family="Arial,sans-serif" font-size="10" fill="#5eead4" font-weight="bold">CO</text>
  <text x="50" y="128" font-family="Arial,sans-serif" font-size="8" fill="white">угарный газ</text>
  <text x="22" y="143" font-family="Arial,sans-serif" font-size="7" fill="white">C: +2, ядовит!</text>
  <text x="22" y="155" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">2C + O&#178; = 2CO (нед. O&#178;)</text>

  <rect x="203" y="112" width="185" height="50" rx="6" fill="#134e4a" filter="url(#sh28)"/>
  <text x="213" y="128" font-family="Arial,sans-serif" font-size="10" fill="#5eead4" font-weight="bold">CO&#178;</text>
  <text x="248" y="128" font-family="Arial,sans-serif" font-size="8" fill="white">углекислый газ</text>
  <text x="213" y="143" font-family="Arial,sans-serif" font-size="7" fill="white">C: +4, не ядовит</text>
  <text x="213" y="155" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">C + O&#178; = CO&#178;</text>

  <!-- Carbonates -->
  <rect x="12" y="169" width="376" height="48" rx="6" fill="#0f766e" filter="url(#sh28)"/>
  <text x="22" y="185" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Карбонаты:</text>
  <text x="22" y="199" font-family="Arial,sans-serif" font-size="8" fill="white">CaCO&#179; (мел, мрамор, известняк) — нерастворим</text>
  <text x="22" y="211" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">CaCO&#179; + 2HCl = CaCl&#178; + H&#178;O + CO&#178;</text>

  <!-- CaCO3 reactions -->
  <rect x="12" y="224" width="185" height="62" rx="6" fill="#134e4a" filter="url(#sh28)"/>
  <text x="22" y="240" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">CaCO&#179; реакции:</text>
  <text x="22" y="254" font-family="Arial,sans-serif" font-size="7" fill="white">CaCO&#179; =t= CaO + CO&#178;</text>
  <text x="22" y="266" font-family="Arial,sans-serif" font-size="7" fill="white">CaCO&#179;+H&#178;O+CO&#178;=Ca(HCO&#179;)&#178;</text>
  <text x="22" y="278" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">(жёсткость воды)</text>

  <rect x="203" y="224" width="185" height="62" rx="6" fill="#134e4a" filter="url(#sh28)"/>
  <text x="213" y="240" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Кислоты углерода:</text>
  <text x="213" y="254" font-family="Arial,sans-serif" font-size="7" fill="white">H&#178;CO&#179; — угольная (слаб.)</text>
  <text x="213" y="266" font-family="Arial,sans-serif" font-size="7" fill="white">CO&#178; + H&#178;O = H&#178;CO&#179;</text>
  <text x="213" y="278" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">H&#178;CO&#179; = H&#178;O + CO&#178;</text>
  <text x="345" y="240" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 28</text>

</svg>