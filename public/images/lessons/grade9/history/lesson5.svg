<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="nep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="100%" stop-color="#2C7A7B"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#nep)"/>
  <!-- Market stall -->
  <rect x="60" y="160" width="120" height="80" fill="#8B7355" opacity="0.7" rx="3"/>
  <rect x="55" y="150" width="130" height="12" fill="#6B5B3E" opacity="0.8" rx="2"/>
  <!-- Goods on stall -->
  <rect x="75" y="175" width="15" height="20" fill="#F6AD55" opacity="0.8" rx="2"/>
  <rect x="95" y="170" width="12" height="25" fill="#FC8181" opacity="0.8" rx="2"/>
  <rect x="112" y="178" width="18" height="17" fill="#68D391" opacity="0.8" rx="2"/>
  <rect x="135" y="172" width="14" height="23" fill="#F6E05E" opacity="0.8" rx="2"/>
  <rect x="155" y="180" width="16" height="15" fill="#D6BCFA" opacity="0.8" rx="2"/>
  <!-- Chervonets coin -->
  <circle cx="350" cy="140" r="45" fill="#F6E05E" opacity="0.3" stroke="#F6E05E" stroke-width="2" opacity="0.5"/>
  <circle cx="350" cy="140" r="35" fill="none" stroke="#F6E05E" stroke-width="1.5" opacity="0.4"/>
  <text x="350" y="145" text-anchor="middle" font-size="16" fill="#F6E05E" opacity="0.7">1 Ч</text>
  <text x="350" y="195" text-anchor="middle" font-size="10" fill="#F6E05E" opacity="0.5">Червонец</text>
  <!-- USSR formation -->
  <g transform="translate(250,260)">
    <circle cx="-30" cy="0" r="12" fill="#E53E3E" opacity="0.5"/>
    <circle cx="0" cy="0" r="12" fill="#E53E3E" opacity="0.5"/>
    <circle cx="30" cy="0" r="12" fill="#E53E3E" opacity="0.5"/>
    <text x="-30" y="4" text-anchor="middle" font-size="7" fill="#FFF" opacity="0.7">РСФСР</text>
    <text x="0" y="4" text-anchor="middle" font-size="7" fill="#FFF" opacity="0.7">УССР</text>
    <text x="30" y="4" text-anchor="middle" font-size="7" fill="#FFF" opacity="0.7">БССР</text>
  </g>
  <!-- Hammer and sickle -->
  <g transform="translate(250,70)" fill="#F6E05E" opacity="0.4">
    <text x="0" y="0" text-anchor="middle" font-size="40">☭</text>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">1921–1928</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">НЭП</text>
</svg>