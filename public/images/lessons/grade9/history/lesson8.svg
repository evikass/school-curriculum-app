<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#1A202C"/>
  <!-- Bars -->
  <g stroke="#4A5568" stroke-width="6" opacity="0.7">
    <line x1="100" y1="30" x2="100" y2="290"/>
    <line x1="150" y1="30" x2="150" y2="290"/>
    <line x1="200" y1="30" x2="200" y2="290"/>
    <line x1="300" y1="30" x2="300" y2="290"/>
    <line x1="350" y1="30" x2="350" y2="290"/>
    <line x1="400" y1="30" x2="400" y2="290"/>
  </g>
  <!-- Crossbar -->
  <rect x="90" y="100" width="320" height="8" fill="#4A5568" opacity="0.6" rx="2"/>
  <!-- Spotlight -->
  <circle cx="250" cy="50" r="25" fill="#F6E05E" opacity="0.15"/>
  <circle cx="250" cy="50" r="15" fill="#F6E05E" opacity="0.2"/>
  <!-- Silhouette behind bars -->
  <g transform="translate(250,190)" fill="#2D3748" opacity="0.6">
    <circle cx="0" cy="-30" r="18"/>
    <rect x="-12" y="-12" width="24" height="40" rx="5"/>
  </g>
  <!-- Red star - surveillance -->
  <g transform="translate(430,60)">
    <polygon points="0,-15 4,-5 15,-5 6,2 9,13 0,7 -9,13 -6,2 -15,-5 -4,-5" fill="#E53E3E" opacity="0.5"/>
  </g>
  <!-- Shadow -->
  <ellipse cx="250" cy="290" rx="40" ry="8" fill="#000" opacity="0.3"/>
  <!-- Stamp -->
  <rect x="330" y="220" width="80" height="40" fill="#E53E3E" opacity="0.2" rx="3"/>
  <text x="370" y="245" text-anchor="middle" font-size="10" fill="#FC8181" opacity="0.5">Ст. 58</text>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">1930-е</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">СССР в 1930-е: репрессии</text>
</svg>