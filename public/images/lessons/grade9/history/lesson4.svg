<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="civil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C53030"/>
      <stop offset="50%" stop-color="#2D3748"/>
      <stop offset="100%" stop-color="#276749"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#civil)"/>
  <!-- Dividing line -->
  <line x1="250" y1="30" x2="250" y2="300" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  <!-- Red side - star -->
  <g transform="translate(125,120)">
    <polygon points="0,-35 10,-12 35,-12 15,5 22,30 0,15 -22,30 -15,5 -35,-12 -10,-12" fill="#E53E3E" opacity="0.8"/>
  </g>
  <text x="125" y="175" text-anchor="middle" font-size="14" fill="#FED7D7" opacity="0.7">Красные</text>
  <!-- White side - eagle -->
  <g transform="translate(375,110)" fill="#E2E8F0" opacity="0.7">
    <ellipse cx="0" cy="0" rx="25" ry="20"/>
    <polygon points="-25,-5 -40,-20 -20,-10" fill="#E2E8F0"/>
    <polygon points="25,-5 40,-20 20,-10" fill="#E2E8F0"/>
  </g>
  <text x="375" y="175" text-anchor="middle" font-size="14" fill="#E2E8F0" opacity="0.7">Белые</text>
  <!-- Green - at bottom center -->
  <g transform="translate(250,230)">
    <ellipse cx="0" cy="0" rx="30" ry="18" fill="#276749" opacity="0.8"/>
    <text x="0" y="5" text-anchor="middle" font-size="12" fill="#C6F6D5" opacity="0.8">Зелёные</text>
  </g>
  <!-- Crossed swords -->
  <g transform="translate(250,100)" stroke="#CBD5E0" stroke-width="3" opacity="0.5">
    <line x1="-50" y1="50" x2="50" y2="-50"/>
    <line x1="50" y1="50" x2="-50" y2="-50"/>
  </g>
  <!-- Smoke -->
  <ellipse cx="200" cy="60" rx="40" ry="15" fill="#718096" opacity="0.2"/>
  <ellipse cx="320" cy="55" rx="35" ry="12" fill="#718096" opacity="0.15"/>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">1918–1922</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Гражданская война</text>
</svg>