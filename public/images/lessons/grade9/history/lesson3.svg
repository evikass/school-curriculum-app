<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="oct" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C53030"/>
      <stop offset="100%" stop-color="#742A2A"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#oct)"/>
  <!-- Aurora flash -->
  <g transform="translate(80,80)">
    <polygon points="0,-30 8,-8 30,-10 12,5 18,28 0,15 -18,28 -12,5 -30,-10 -8,-8" fill="#F6E05E" opacity="0.8"/>
  </g>
  <text x="80" y="120" text-anchor="middle" font-size="10" fill="#F6E05E" opacity="0.7">Аврора</text>
  <!-- Winter Palace -->
  <rect x="150" y="130" width="220" height="120" fill="#2D3748" opacity="0.6" rx="2"/>
  <rect x="155" y="115" width="210" height="15" fill="#4A5568" opacity="0.6"/>
  <g fill="#F6AD55" opacity="0.5">
    <rect x="165" y="150" width="15" height="22" rx="7"/><rect x="190" y="150" width="15" height="22" rx="7"/>
    <rect x="215" y="150" width="15" height="22" rx="7"/><rect x="240" y="150" width="15" height="22" rx="7"/>
    <rect x="265" y="150" width="15" height="22" rx="7"/><rect x="290" y="150" width="15" height="22" rx="7"/>
    <rect x="315" y="150" width="15" height="22" rx="7"/><rect x="340" y="150" width="15" height="22" rx="7"/>
  </g>
  <!-- Red flag on top -->
  <line x1="260" y1="80" x2="260" y2="115" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="262" y="82" width="35" height="22" fill="#E53E3E" opacity="0.9"/>
  <polygon points="280,93 275,88 285,88" fill="#F6E05E" opacity="0.7"/>
  <!-- Revolutionary crowd -->
  <g fill="#1A202C" opacity="0.5">
    <circle cx="140" cy="278" r="5"/><circle cx="160" cy="275" r="5"/><circle cx="180" cy="280" r="5"/>
    <circle cx="200" cy="276" r="5"/><circle cx="220" cy="278" r="5"/><circle cx="240" cy="274" r="5"/>
    <circle cx="260" cy="278" r="5"/><circle cx="280" cy="276" r="5"/><circle cx="300" cy="280" r="5"/>
    <circle cx="320" cy="275" r="5"/><circle cx="340" cy="278" r="5"/><circle cx="360" cy="276" r="5"/>
  </g>
  <!-- Red banners -->
  <rect x="150" y="255" width="12" height="18" fill="#FC8181" opacity="0.7"/>
  <rect x="250" y="253" width="12" height="18" fill="#FC8181" opacity="0.7"/>
  <rect x="340" y="255" width="12" height="18" fill="#FC8181" opacity="0.7"/>
  <!-- Star -->
  <g transform="translate(400,60)" fill="#F6E05E" opacity="0.6">
    <polygon points="0,-20 5,-7 20,-7 8,3 12,18 0,10 -12,18 -8,3 -20,-7 -5,-7"/>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#FED7D7" font-weight="bold" opacity="0.6">Октябрь 1917</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#FED7D7" opacity="0.5">Октябрьская революция</text>
</svg>