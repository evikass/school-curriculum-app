<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="ind" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A5568"/>
      <stop offset="100%" stop-color="#718096"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#ind)"/>
  <!-- Factory building -->
  <rect x="50" y="130" width="180" height="120" fill="#2D3748" opacity="0.8"/>
  <rect x="55" y="110" width="170" height="20" fill="#4A5568" opacity="0.8"/>
  <!-- Chimneys -->
  <rect x="80" y="60" width="20" height="55" fill="#2D3748" opacity="0.8"/>
  <rect x="130" y="50" width="25" height="65" fill="#2D3748" opacity="0.8"/>
  <rect x="180" y="70" width="18" height="45" fill="#2D3748" opacity="0.8"/>
  <!-- Smoke -->
  <ellipse cx="90" cy="45" rx="20" ry="10" fill="#A0AEC0" opacity="0.3"/>
  <ellipse cx="142" cy="35" rx="25" ry="12" fill="#A0AEC0" opacity="0.25"/>
  <ellipse cx="189" cy="55" rx="18" ry="8" fill="#A0AEC0" opacity="0.2"/>
  <!-- Gear wheel -->
  <g transform="translate(380,160)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#F6E05E" stroke-width="6" opacity="0.5"/>
    <circle cx="0" cy="0" r="35" fill="none" stroke="#F6E05E" stroke-width="4" opacity="0.4"/>
    <circle cx="0" cy="0" r="15" fill="#F6E05E" opacity="0.3"/>
    <!-- Teeth -->
    <rect x="-8" y="-55" width="16" height="12" fill="#F6E05E" opacity="0.5"/>
    <rect x="-8" y="43" width="16" height="12" fill="#F6E05E" opacity="0.5"/>
    <rect x="43" y="-8" width="12" height="16" fill="#F6E05E" opacity="0.5"/>
    <rect x="-55" y="-8" width="12" height="16" fill="#F6E05E" opacity="0.5"/>
  </g>
  <!-- Dnieper Dam silhouette -->
  <path d="M280 250 L300 220 L320 220 L320 250 Z" fill="#4A5568" opacity="0.6"/>
  <path d="M290 220 Q310 190 330 220" fill="#3182CE" opacity="0.3"/>
  <!-- Spark -->
  <g fill="#FC8181" opacity="0.6">
    <circle cx="320" cy="135" r="3"/><circle cx="330" cy="145" r="2"/><circle cx="310" cy="148" r="2.5"/>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">1928–1940</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Индустриализация</text>
</svg>