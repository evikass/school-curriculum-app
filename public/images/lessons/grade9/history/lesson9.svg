<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="vov1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D3748"/>
      <stop offset="100%" stop-color="#4A5568"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#vov1)"/>
  <!-- Red star -->
  <g transform="translate(250,80)">
    <polygon points="0,-40 10,-14 40,-14 16,5 24,35 0,18 -24,35 -16,5 -40,-14 -10,-14" fill="#C53030" opacity="0.7"/>
  </g>
  <!-- Tank -->
  <g transform="translate(160,200)" fill="#2D3748" opacity="0.7">
    <rect x="0" y="-15" width="60" height="20" rx="5"/>
    <rect x="15" y="-30" width="35" height="18" rx="3"/>
    <line x1="50" y1="-25" x2="80" y2="-40" stroke="#2D3748" stroke-width="4"/>
    <ellipse cx="10" cy="10" rx="10" ry="8"/><ellipse cx="30" cy="10" rx="10" ry="8"/>
    <ellipse cx="50" cy="10" rx="10" ry="8"/>
  </g>
  <!-- Explosions -->
  <g transform="translate(350,150)">
    <circle cx="0" cy="0" r="20" fill="#E53E3E" opacity="0.5"/>
    <circle cx="0" cy="0" r="12" fill="#F6AD55" opacity="0.6"/>
    <circle cx="0" cy="0" r="5" fill="#FEFCBF" opacity="0.8"/>
  </g>
  <!-- Smoke -->
  <ellipse cx="320" cy="110" rx="30" ry="15" fill="#718096" opacity="0.2"/>
  <ellipse cx="380" cy="100" rx="25" ry="12" fill="#718096" opacity="0.15"/>
  <!-- Date -->
  <text x="250" y="175" text-anchor="middle" font-size="28" fill="#E2E8F0" font-weight="bold" opacity="0.5">22.06.1941</text>
  <text x="250" y="310" text-anchor="middle" font-size="18" fill="#FC8181" font-weight="bold" opacity="0.6">Великая Отечественная</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Начало войны</text>
</svg>