  <rect x="138" y="225" width="15" height="12" fill="#E53E3E" opacity="0.7"/>
  <rect x="211" y="220" width="15" height="12" fill="#E53E3E" opacity="0.7"/>
  <rect x="298" y="223" width="15" height="12" fill="#E53E3E" opacity="0.7"/>
