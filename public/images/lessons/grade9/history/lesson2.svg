  </defs>
  <rect width="500" height="350" fill="url(#feb)"/>
  <!-- Palace silhouette -->
  <rect x="120" y="120" width="260" height="140" fill="#2D3748" opacity="0.7" rx="2"/>
  <rect x="130" y="100" width="240" height="20" fill="#4A5568" opacity="0.7"/>
  <!-- Windows -->
  <g fill="#F6AD55" opacity="0.6">
    <rect x="145" y="140" width="18" height="25" rx="9"/><rect x="175" y="140" width="18" height="25" rx="9"/>
    <rect x="205" y="140" width="18" height="25" rx="9"/><rect x="235" y="140" width="18" height="25" rx="9"/>
    <rect x="265" y="140" width="18" height="25" rx="9"/><rect x="295" y="140" width="18" height="25" rx="9"/>
    <rect x="325" y="140" width="18" height="25" rx="9"/><rect x="355" y="140" width="18" height="25" rx="9"/>
  </g>
  <!-- Columns -->
  <g fill="#4A5568" opacity="0.8">
    <rect x="155" y="170" width="10" height="70"/><rect x="195" y="170" width="10" height="70"/>
    <rect x="235" y="170" width="10" height="70"/><rect x="275" y="170" width="10" height="70"/>
    <rect x="315" y="170" width="10" height="70"/><rect x="345" y="170" width="10" height="70"/>
