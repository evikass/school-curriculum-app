    <circle cx="160" cy="278" r="6"/><circle cx="180" cy="283" r="6"/><circle cx="200" cy="276" r="6"/>
    <circle cx="220" cy="280" r="6"/><circle cx="240" cy="275" r="6"/><circle cx="260" cy="282" r="6"/>
    <circle cx="280" cy="277" r="6"/><circle cx="300" cy="283" r="6"/><circle cx="320" cy="278" r="6"/>
    <circle cx="340" cy="282" r="6"/><circle cx="360" cy="275" r="6"/><circle cx="380" cy="280" r="6"/>
    <circle cx="400" cy="277" r="6"/><circle cx="420" cy="282" r="6"/>
  </g>
  <!-- Raised fists / banners -->
  <g stroke="#F6E05E" stroke-width="2" opacity="0.8">
    <line x1="150" y1="260" x2="145" y2="240"/>
    <line x1="220" y1="258" x2="218" y2="235"/>
    <line x1="300" y1="260" x2="305" y2="238"/>
