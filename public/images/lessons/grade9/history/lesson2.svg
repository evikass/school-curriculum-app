  <g fill="#E2E8F0" opacity="0.4">
    <circle cx="50" cy="60" r="2"/><circle cx="120" cy="40" r="2"/><circle cx="200" cy="55" r="2"/>
    <circle cx="300" cy="45" r="2"/><circle cx="400" cy="60" r="2"/><circle cx="450" cy="35" r="2"/>
    <circle cx="80" cy="80" r="1.5"/><circle cx="170" cy="70" r="1.5"/><circle cx="350" cy="75" r="1.5"/>
    <circle cx="440" cy="85" r="1.5"/><circle cx="250" cy="65" r="1.5"/>
