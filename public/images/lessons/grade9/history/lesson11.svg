<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="vic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DD6B20"/>
      <stop offset="100%" stop-color="#C53030"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#vic)"/>
  <!-- Reichstag -->
  <rect x="140" y="100" width="220" height="130" fill="#2D3748" opacity="0.6" rx="2"/>
  <rect x="130" y="85" width="240" height="15" fill="#4A5568" opacity="0.6"/>
  <!-- Columns -->
  <g fill="#4A5568" opacity="0.7">
    <rect x="160" y="120" width="8" height="80"/><rect x="185" y="120" width="8" height="80"/>
    <rect x="210" y="120" width="8" height="80"/><rect x="235" y="120" width="8" height="80"/>
    <rect x="260" y="120" width="8" height="80"/><rect x="285" y="120" width="8" height="80"/>
    <rect x="310" y="120" width="8" height="80"/><rect x="335" y="120" width="8" height="80"/>
  </g>
  <!-- Victory flag on Reichstag -->
  <line x1="250" y1="30" x2="250" y2="85" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="252" y="35" width="50" height="30" fill="#C53030" opacity="0.9"/>
  <g stroke="#F6E05E" stroke-width="1.5" opacity="0.7">
    <line x1="252" y1="50" x2="302" y2="50"/>
    <line x1="277" y1="35" x2="277" y2="65"/>
  </g>
  <!-- Soldiers raising flag -->
  <g fill="#1A202C" opacity="0.6">
    <circle cx="240" cy="90" r="6"/><rect x="235" y="96" width="10" height="20" rx="2"/>
    <circle cx="260" cy="88" r="6"/><rect x="255" y="94" width="10" height="20" rx="2"/>
  </g>
  <!-- Fireworks -->
  <g fill="#F6E05E" opacity="0.5">
    <circle cx="80" cy="50" r="3"/><circle cx="90" cy="40" r="2"/><circle cx="70" cy="38" r="2"/>
    <circle cx="420" cy="45" r="3"/><circle cx="430" cy="35" r="2"/><circle cx="410" cy="33" r="2"/>
  </g>
  <g fill="#FC8181" opacity="0.5">
    <circle cx="100" cy="55" r="2"/><circle cx="400" cy="50" r="2"/>
  </g>
  <text x="250" y="290" text-anchor="middle" font-size="24" fill="#FED7D7" font-weight="bold" opacity="0.7">9 МАЯ 1945</text>
  <text x="250" y="315" text-anchor="middle" font-size="16" fill="#FED7D7" opacity="0.6">ПОБЕДА!</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Победа в Великой Отечественной войне</text>
</svg>