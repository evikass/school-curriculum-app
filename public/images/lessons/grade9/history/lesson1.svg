<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#a0aec0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#sky1)"/>
  <!-- Trench lines -->
  <path d="M0 220 Q50 200 100 220 Q150 240 200 220 Q250 200 300 220 Q350 240 400 220 Q450 200 500 220" fill="none" stroke="#8B7355" stroke-width="3"/>
  <path d="M0 240 Q50 220 100 240 Q150 260 200 240 Q250 220 300 240 Q350 260 400 240 Q450 220 500 240" fill="#6B5B3E" opacity="0.6"/>
  <!-- Barbed wire -->
  <line x1="30" y1="195" x2="470" y2="195" stroke="#718096" stroke-width="1.5"/>
  <line x1="30" y1="200" x2="470" y2="200" stroke="#718096" stroke-width="1.5"/>
  <!-- Wire barbs -->
  <g stroke="#718096" stroke-width="1">
    <line x1="60" y1="195" x2="55" y2="190"/><line x1="60" y1="200" x2="55" y2="205"/>
    <line x1="130" y1="195" x2="125" y2="190"/><line x1="130" y1="200" x2="125" y2="205"/>
    <line x1="200" y1="195" x2="195" y2="190"/><line x1="200" y1="200" x2="195" y2="205"/>
    <line x1="270" y1="195" x2="265" y2="190"/><line x1="270" y1="200" x2="265" y2="205"/>
    <line x1="340" y1="195" x2="335" y2="190"/><line x1="340" y1="200" x2="335" y2="205"/>
    <line x1="410" y1="195" x2="405" y2="190"/><line x1="410" y1="200" x2="405" y2="205"/>
  </g>
  <!-- Soldier silhouette left -->
  <g transform="translate(100,130)" fill="#2D3748">
    <ellipse cx="0" cy="0" rx="8" ry="10"/>
    <rect x="-6" y="10" width="12" height="30" rx="3"/>
    <rect x="-8" y="15" width="4" height="20" rx="2"/>
    <rect x="4" y="15" width="4" height="20" rx="2"/>
    <line x1="-3" y1="40" x2="-5" y2="65" stroke="#2D3748" stroke-width="4"/>
    <line x1="3" y1="40" x2="5" y2="65" stroke="#2D3748" stroke-width="4"/>
    <line x1="-5" y1="65" x2="-15" y2="68" stroke="#2D3748" stroke-width="3"/>
    <line x1="5" y1="65" x2="15" y2="68" stroke="#2D3748" stroke-width="3"/>
    <!-- Rifle -->
    <line x1="12" y1="20" x2="35" y2="-15" stroke="#2D3748" stroke-width="2.5"/>
  </g>
  <!-- Soldier silhouette right -->
  <g transform="translate(380,135)" fill="#4A5568">
    <ellipse cx="0" cy="0" rx="8" ry="10"/>
    <rect x="-6" y="10" width="12" height="28" rx="3"/>
    <line x1="-3" y1="38" x2="-5" y2="60" stroke="#4A5568" stroke-width="4"/>
    <line x1="3" y1="38" x2="5" y2="60" stroke="#4A5568" stroke-width="4"/>
    <line x1="-20" y1="20" x2="-5" y2="15" stroke="#4A5568" stroke-width="2.5"/>
  </g>
  <!-- Explosion -->
  <g transform="translate(250,140)">
    <circle cx="0" cy="0" r="18" fill="#E53E3E" opacity="0.7"/>
    <circle cx="0" cy="0" r="12" fill="#F6AD55" opacity="0.8"/>
    <circle cx="0" cy="0" r="6" fill="#FEFCBF"/>
    <line x1="-25" y1="-10" x2="-35" y2="-20" stroke="#E53E3E" stroke-width="2" opacity="0.6"/>
    <line x1="20" y1="-15" x2="30" y2="-25" stroke="#E53E3E" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-22" x2="-5" y2="-35" stroke="#F6AD55" stroke-width="2" opacity="0.6"/>
  </g>
  <!-- Smoke clouds -->
  <ellipse cx="200" cy="100" rx="40" ry="20" fill="#A0AEC0" opacity="0.3"/>
  <ellipse cx="300" cy="90" rx="35" ry="18" fill="#A0AEC0" opacity="0.25"/>
  <ellipse cx="250" cy="80" rx="45" ry="22" fill="#CBD5E0" opacity="0.2"/>
  <!-- Flags -->
  <g transform="translate(50,90)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#4A5568" stroke-width="2"/>
    <rect x="2" y="5" width="25" height="16" fill="#3182CE" opacity="0.8"/>
    <rect x="2" y="5" width="8" height="16" fill="#FC8181" opacity="0.8"/>
  </g>
  <g transform="translate(430,95)">
    <line x1="0" y1="0" x2="0" y2="45" stroke="#4A5568" stroke-width="2"/>
    <rect x="2" y="5" width="25" height="16" fill="#2D3748" opacity="0.8"/>
    <rect x="2" y="5" width="25" height="8" fill="#E2E8F0" opacity="0.7"/>
  </g>
  <!-- Year -->
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">1914–1918</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Первая мировая война</text>
</svg>