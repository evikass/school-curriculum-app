<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="kol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#553C9A"/>
      <stop offset="100%" stop-color="#44337A"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#kol)"/>
  <!-- Wheat field -->
  <path d="M0 280 Q125 260 250 280 Q375 300 500 280 L500 350 L0 350 Z" fill="#68D391" opacity="0.3"/>
  <!-- Wheat stalks -->
  <g stroke="#F6E05E" stroke-width="2" opacity="0.6">
    <line x1="30" y1="280" x2="30" y2="230"/><line x1="60" y1="275" x2="60" y2="225"/>
    <line x1="90" y1="278" x2="90" y2="232"/><line x1="120" y1="273" x2="120" y2="228"/>
    <line x1="150" y1="276" x2="150" y2="230"/><line x1="180" y1="278" x2="180" y2="233"/>
    <line x1="210" y1="275" x2="210" y2="227"/><line x1="240" y1="277" x2="240" y2="231"/>
    <line x1="270" y1="274" x2="270" y2="226"/><line x1="300" y1="276" x2="300" y2="229"/>
    <line x1="330" y1="273" x2="330" y2="228"/><line x1="360" y1="275" x2="360" y2="232"/>
    <line x1="390" y1="277" x2="390" y2="230"/><line x1="420" y1="274" x2="420" y2="227"/>
    <line x1="450" y1="276" x2="450" y2="231"/><line x1="480" y1="273" x2="480" y2="226"/>
  </g>
  <!-- Wheat heads -->
  <g fill="#F6E05E" opacity="0.5">
    <ellipse cx="30" cy="225" rx="4" ry="8"/><ellipse cx="60" cy="220" rx="4" ry="8"/>
    <ellipse cx="90" cy="227" rx="4" ry="8"/><ellipse cx="120" cy="222" rx="4" ry="8"/>
    <ellipse cx="150" cy="225" rx="4" ry="8"/><ellipse cx="180" cy="228" rx="4" ry="8"/>
    <ellipse cx="210" cy="222" rx="4" ry="8"/><ellipse cx="240" cy="226" rx="4" ry="8"/>
    <ellipse cx="270" cy="221" rx="4" ry="8"/><ellipse cx="300" cy="224" rx="4" ry="8"/>
    <ellipse cx="330" cy="222" rx="4" ry="8"/><ellipse cx="360" cy="227" rx="4" ry="8"/>
    <ellipse cx="390" cy="225" rx="4" ry="8"/><ellipse cx="420" cy="221" rx="4" ry="8"/>
    <ellipse cx="450" cy="226" rx="4" ry="8"/><ellipse cx="480" cy="220" rx="4" ry="8"/>
  </g>
  <!-- Tractor -->
  <g transform="translate(200,240)" fill="#4A5568" opacity="0.7">
    <rect x="0" y="-10" width="40" height="20" rx="3"/>
    <circle cx="10" cy="15" r="10" fill="#2D3748"/><circle cx="35" cy="15" r="10" fill="#2D3748"/>
    <rect x="35" y="-25" width="25" height="20" rx="2" fill="#3182CE" opacity="0.5"/>
  </g>
  <!-- Collective farm sign -->
  <rect x="350" y="130" width="100" height="50" fill="#E53E3E" opacity="0.3" rx="5"/>
  <text x="400" y="160" text-anchor="middle" font-size="12" fill="#FED7D7" opacity="0.7">Колхоз</text>
  <!-- Barbed wire -->
  <line x1="50" y1="200" x2="200" y2="200" stroke="#718096" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="200" x2="460" y2="200" stroke="#718096" stroke-width="1" opacity="0.4"/>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">1929–1933</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Коллективизация</text>
</svg>