<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="perest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B46C1"/>
      <stop offset="100%" stop-color="#553C9A"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#perest)"/>
  <!-- Cracking wall -->
  <rect x="50" y="50" width="400" height="220" fill="#4A5568" opacity="0.4" rx="3"/>
  <!-- Cracks -->
  <g stroke="#E2E8F0" stroke-width="2" opacity="0.5">
    <path d="M250 50 L240 100 L260 150 L245 200 L250 270" fill="none"/>
    <path d="M240 100 L200 120" fill="none"/>
    <path d="M260 150 L300 160" fill="none"/>
    <path d="M245 200 L210 210" fill="none"/>
    <path d="M245 200 L280 230" fill="none"/>
  </g>
  <!-- Light through cracks -->
  <g fill="#F6E05E" opacity="0.15">
    <polygon points="240,100 200,120 250,130 260,150"/>
    <polygon points="260,150 300,160 270,180 245,200"/>
  </g>
  <!-- Glasnost word hint -->
  <g transform="translate(100,130)" opacity="0.4">
    <rect x="0" y="0" width="80" height="30" fill="none" stroke="#F6E05E" stroke-width="1" rx="3"/>
    <text x="40" y="20" text-anchor="middle" font-size="12" fill="#F6E05E">Гласность</text>
  </g>
  <!-- Uskorenie word hint -->
  <g transform="translate(320,130)" opacity="0.4">
    <rect x="0" y="0" width="80" height="30" fill="none" stroke="#63B3ED" stroke-width="1" rx="3"/>
    <text x="40" y="20" text-anchor="middle" font-size="11" fill="#63B3ED">Ускорение</text>
  </g>
  <!-- Falling pieces -->
  <g fill="#718096" opacity="0.3">
    <rect x="180" y="280" width="20" height="15" transform="rotate(15,190,287)"/>
    <rect x="280" y="290" width="15" height="12" transform="rotate(-10,287,296)"/>
  </g>
  <!-- Gorbachev birthmark hint -->
  <g transform="translate(250,75)" opacity="0.3">
    <circle cx="0" cy="0" r="20" fill="#FC8181"/>
    <ellipse cx="-5" cy="-3" rx="6" ry="5" fill="#C53030" opacity="0.5"/>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">1985–1991</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Перестройка</text>
</svg>