<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="post" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="100%" stop-color="#2C7A7B"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#post)"/>
  <!-- Rebuilding crane -->
  <line x1="150" y1="40" x2="150" y2="250" stroke="#E2E8F0" stroke-width="4" opacity="0.5"/>
  <line x1="150" y1="50" x2="250" y2="50" stroke="#E2E8F0" stroke-width="3" opacity="0.5"/>
  <line x1="250" y1="50" x2="250" y2="80" stroke="#E2E8F0" stroke-width="1.5" opacity="0.4"/>
  <!-- Hook -->
  <path d="M248 80 Q248 90 255 90 Q262 90 262 85" fill="none" stroke="#E2E8F0" stroke-width="2" opacity="0.4"/>
  <!-- Building under construction -->
  <rect x="280" y="130" width="80" height="120" fill="#4A5568" opacity="0.5" rx="2"/>
  <g fill="#63B3ED" opacity="0.3">
    <rect x="290" y="140" width="15" height="18"/><rect x="315" y="140" width="15" height="18"/>
    <rect x="340" y="140" width="15" height="18"/><rect x="290" y="170" width="15" height="18"/>
    <rect x="315" y="170" width="15" height="18"/><rect x="340" y="170" width="15" height="18"/>
  </g>
  <!-- Scaffolding -->
  <g stroke="#E2E8F0" stroke-width="1" opacity="0.3">
    <line x1="280" y1="130" x2="280" y2="250"/><line x1="360" y1="130" x2="360" y2="250"/>
    <line x1="275" y1="150" x2="365" y2="150"/><line x1="275" y1="190" x2="365" y2="190"/>
  </g>
  <!-- Completed building -->
  <rect x="60" y="150" width="60" height="100" fill="#2D3748" opacity="0.6" rx="2"/>
  <g fill="#F6AD55" opacity="0.4">
    <rect x="68" y="160" width="10" height="12"/><rect x="85" y="160" width="10" height="12"/>
    <rect x="102" y="160" width="10" height="12"/><rect x="68" y="185" width="10" height="12"/>
    <rect x="85" y="185" width="10" height="12"/><rect x="102" y="185" width="10" height="12"/>
  </g>
  <!-- People -->
  <g fill="#1A202C" opacity="0.5">
    <circle cx="180" cy="258" r="5"/><circle cx="200" cy="255" r="5"/><circle cx="220" cy="260" r="5"/>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">1945–1953</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Послевоенное восстановление</text>
</svg>