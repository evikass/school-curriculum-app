<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="cold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#742A2A"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#cold)"/>
  <!-- Globe -->
  <circle cx="250" cy="160" r="80" fill="none" stroke="#E2E8F0" stroke-width="2" opacity="0.3"/>
  <ellipse cx="250" cy="160" rx="80" ry="30" fill="none" stroke="#E2E8F0" stroke-width="1" opacity="0.2"/>
  <ellipse cx="250" cy="160" rx="30" ry="80" fill="none" stroke="#E2E8F0" stroke-width="1" opacity="0.2"/>
  <!-- West side (blue) -->
  <path d="M170 160 A80 80 0 0 1 250 80 L250 160 Z" fill="#3182CE" opacity="0.3"/>
  <!-- East side (red) -->
  <path d="M250 80 A80 80 0 0 1 330 160 L250 160 Z" fill="#C53030" opacity="0.3"/>
  <!-- NATO star -->
  <g transform="translate(195,120)">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,10 0,6 -7,10 -5,2 -12,-4 -3,-4" fill="#63B3ED" opacity="0.5"/>
  </g>
  <!-- USSR star -->
  <g transform="translate(305,120)">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,10 0,6 -7,10 -5,2 -12,-4 -3,-4" fill="#FC8181" opacity="0.5"/>
  </g>
  <!-- Wall / Iron Curtain -->
  <line x1="250" y1="75" x2="250" y2="245" stroke="#E2E8F0" stroke-width="3" stroke-dasharray="5,3" opacity="0.4"/>
  <text x="195" y="250" text-anchor="middle" font-size="10" fill="#63B3ED" opacity="0.6">ЗАПАД</text>
  <text x="305" y="250" text-anchor="middle" font-size="10" fill="#FC8181" opacity="0.6">ВОСТОК</text>
  <!-- Nuclear mushroom cloud small -->
  <g transform="translate(400,80)">
    <ellipse cx="0" cy="0" rx="15" ry="8" fill="#A0AEC0" opacity="0.3"/>
    <rect x="-3" y="-25" width="6" height="25" fill="#A0AEC0" opacity="0.3"/>
    <ellipse cx="0" cy="-25" rx="12" ry="10" fill="#E53E3E" opacity="0.3"/>
  </g>
  <text x="250" y="310" text-anchor="middle" font-size="22" fill="#E2E8F0" font-weight="bold" opacity="0.6">1947–1991</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#E2E8F0" opacity="0.5">Холодная война</text>
</svg>