<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="ebg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#ebg11)" rx="12"/>
  <!-- Essay paper -->
  <rect x="130" y="20" width="240" height="260" rx="4" fill="#e0e7ff" stroke="#818cf8" stroke-width="2"/>
  <rect x="130" y="20" width="240" height="22" rx="4" fill="#6366f1"/>
  <text x="250" y="35" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ESSAY STRUCTURE</text>
  <!-- Introduction section -->
  <rect x="140" y="48" width="220" height="55" rx="3" fill="#c7d2fe"/>
  <text x="250" y="63" font-family="sans-serif" font-size="9" fill="#4338ca" text-anchor="middle" font-weight="bold">INTRODUCTION</text>
  <text x="250" y="76" font-family="sans-serif" font-size="7" fill="#4f46e5" text-anchor="middle">Hook → Background → Thesis</text>
  <line x1="150" y1="82" x2="350" y2="82" stroke="#818cf8" stroke-width="0.5"/>
  <text x="250" y="92" font-family="sans-serif" font-size="6" fill="#6366f1" text-anchor="middle">Thesis: the main argument in 1 sentence</text>
  <!-- Body sections -->
  <rect x="140" y="108" width="220" height="75" rx="3" fill="#a5b4fc" opacity="0.5"/>
  <text x="250" y="123" font-family="sans-serif" font-size="9" fill="#312e81" text-anchor="middle" font-weight="bold">BODY PARAGRAPHS (2-3)</text>
  <text x="250" y="138" font-family="sans-serif" font-size="7" fill="#4338ca" text-anchor="middle">1. Topic sentence</text>
  <text x="250" y="150" font-family="sans-serif" font-size="7" fill="#4338ca" text-anchor="middle">2. Supporting evidence</text>
  <text x="250" y="162" font-family="sans-serif" font-size="7" fill="#4338ca" text-anchor="middle">3. Explanation</text>
  <text x="250" y="174" font-family="sans-serif" font-size="7" fill="#4338ca" text-anchor="middle">4. Linking sentence →</text>
  <!-- Conclusion section -->
  <rect x="140" y="188" width="220" height="55" rx="3" fill="#c7d2fe"/>
  <text x="250" y="203" font-family="sans-serif" font-size="9" fill="#4338ca" text-anchor="middle" font-weight="bold">CONCLUSION</text>
  <text x="250" y="216" font-family="sans-serif" font-size="7" fill="#4f46e5" text-anchor="middle">Restate thesis → Summarise → Final thought</text>
  <text x="250" y="230" font-family="sans-serif" font-size="6" fill="#6366f1" text-anchor="middle">No new arguments in conclusion!</text>
  <!-- Essay types on left -->
  <rect x="10" y="30" width="110" height="130" rx="6" fill="#312e81" stroke="#818cf8" stroke-width="1"/>
  <text x="65" y="50" font-family="sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle" font-weight="bold">Essay Types</text>
  <rect x="18" y="58" width="94" height="22" rx="3" fill="#4338ca"/>
  <text x="65" y="73" font-family="sans-serif" font-size="7" fill="#c7d2fe" text-anchor="middle">Opinion</text>
  <rect x="18" y="86" width="94" height="22" rx="3" fill="#4338ca"/>
  <text x="65" y="101" font-family="sans-serif" font-size="7" fill="#c7d2fe" text-anchor="middle">For &amp; Against</text>
  <rect x="18" y="114" width="94" height="22" rx="3" fill="#4338ca"/>
  <text x="65" y="129" font-family="sans-serif" font-size="7" fill="#c7d2fe" text-anchor="middle">Problem-Solution</text>
  <!-- Linking words on right -->
  <rect x="385" y="30" width="105" height="200" rx="6" fill="#312e81" stroke="#fbbf24" stroke-width="1"/>
  <text x="437" y="50" font-family="sans-serif" font-size="8" fill="#fbbf24" text-anchor="middle" font-weight="bold">Linking Words</text>
  <text x="437" y="68" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">+ furthermore</text>
  <text x="437" y="80" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">+ moreover</text>
  <text x="437" y="92" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">+ in addition</text>
  <line x1="395" y1="100" x2="480" y2="100" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="437" y="114" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">× however</text>
  <text x="437" y="126" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">× nevertheless</text>
  <text x="437" y="138" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">× on the other hand</text>
  <line x1="395" y1="146" x2="480" y2="146" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="437" y="160" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">∴ therefore</text>
  <text x="437" y="172" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">∴ consequently</text>
  <line x1="395" y1="180" x2="480" y2="180" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="437" y="194" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">≡ in conclusion</text>
  <text x="437" y="206" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">≡ to sum up</text>
  <!-- Tips at bottom -->
  <rect x="20" y="290" width="460" height="35" rx="6" fill="#312e81" stroke="#10b981" stroke-width="1"/>
  <text x="250" y="308" font-family="sans-serif" font-size="8" fill="#6ee7b7" text-anchor="middle" font-weight="bold">Tips: Plan first | Use formal language (no contractions) | Vary vocabulary | Check grammar</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Essay Writing</text>
</svg>