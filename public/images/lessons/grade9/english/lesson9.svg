<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#5C6BC0" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#283593" opacity="0.12"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Типы СМИ</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Английский язык — Урок 9</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#5C6BC0" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">Типы:</text>
  <text x="75" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Print media: newspapers, magazines</text>
  <text x="32" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Broadcast: TV, radio</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Digital: websites, blogs</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Social media: platforms</text>
  <text x="22" y="168" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">Словарь:</text>
  <text x="75" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">headline — заголовок</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#5C6BC0" opacity="0.05"/>
  <text x="272" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">article — статья, editor — редактор</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">broadcast — трансляция</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">coverage — освещение</text>
  <text x="262" y="148" font-family="Arial,sans-serif" font-size="10" fill="#283593" text-anchor="start" font-weight="bold">Фразы:</text>
  <text x="315" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">According to the news...</text>
  <text x="272" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">The media reports that...</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#5C6BC0" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#283593" text-anchor="middle" font-weight="bold">Media literacy</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#5C6BC0" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#283593" text-anchor="middle" font-weight="bold">Fake news — фейковые новости</text>
