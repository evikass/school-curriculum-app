<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="ebg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#831843"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#ebg1)" rx="12"/>
  <!-- Four tense boxes -->
  <rect x="20" y="25" width="225" height="130" rx="8" fill="#9d174d" stroke="#f9a8d4" stroke-width="1.5"/>
  <rect x="255" y="25" width="225" height="130" rx="8" fill="#9d174d" stroke="#f9a8d4" stroke-width="1.5"/>
  <rect x="20" y="170" width="225" height="130" rx="8" fill="#831843" stroke="#f9a8d4" stroke-width="1.5"/>
  <rect x="255" y="170" width="225" height="130" rx="8" fill="#831843" stroke="#f9a8d4" stroke-width="1.5"/>
  <!-- Present Simple -->
  <text x="132" y="50" font-family="sans-serif" font-size="12" fill="#f9a8d4" text-anchor="middle" font-weight="bold">Present Simple</text>
  <text x="132" y="70" font-family="sans-serif" font-size="9" fill="#fce7f3" text-anchor="middle">S + V1 / V-s</text>
  <text x="132" y="90" font-family="sans-serif" font-size="8" fill="#fbcfe8" text-anchor="middle">She works every day.</text>
  <text x="132" y="108" font-family="sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Habits, truths, routines</text>
  <rect x="35" y="118" width="55" height="16" rx="4" fill="#be185d"/>
  <text x="62" y="130" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">always</text>
  <rect x="95" y="118" width="55" height="16" rx="4" fill="#be185d"/>
  <text x="122" y="130" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">usually</text>
  <rect x="155" y="118" width="55" height="16" rx="4" fill="#be185d"/>
  <text x="182" y="130" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">never</text>
  <!-- Present Continuous -->
  <text x="367" y="50" font-family="sans-serif" font-size="12" fill="#f9a8d4" text-anchor="middle" font-weight="bold">Present Continuous</text>
  <text x="367" y="70" font-family="sans-serif" font-size="9" fill="#fce7f3" text-anchor="middle">S + am/is/are + V-ing</text>
  <text x="367" y="90" font-family="sans-serif" font-size="8" fill="#fbcfe8" text-anchor="middle">She is working now.</text>
  <text x="367" y="108" font-family="sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Now, temporary, arrangements</text>
  <rect x="270" y="118" width="55" height="16" rx="4" fill="#be185d"/>
  <text x="297" y="130" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">now</text>
  <rect x="330" y="118" width="70" height="16" rx="4" fill="#be185d"/>
  <text x="365" y="130" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">at the moment</text>
  <rect x="405" y="118" width="60" height="16" rx="4" fill="#be185d"/>
  <text x="435" y="130" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">this week</text>
  <!-- Present Perfect -->
  <text x="132" y="195" font-family="sans-serif" font-size="12" fill="#f9a8d4" text-anchor="middle" font-weight="bold">Present Perfect</text>
  <text x="132" y="215" font-family="sans-serif" font-size="9" fill="#fce7f3" text-anchor="middle">S + have/has + V3</text>
  <text x="132" y="235" font-family="sans-serif" font-size="8" fill="#fbcfe8" text-anchor="middle">I have visited Paris.</text>
  <text x="132" y="253" font-family="sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Experience, result, duration</text>
  <rect x="35" y="263" width="55" height="16" rx="4" fill="#9d174d"/>
  <text x="62" y="275" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">already</text>
  <rect x="95" y="263" width="55" height="16" rx="4" fill="#9d174d"/>
  <text x="122" y="275" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">never</text>
  <rect x="155" y="263" width="55" height="16" rx="4" fill="#9d174d"/>
  <text x="182" y="275" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">since</text>
  <!-- Present Perfect Continuous -->
  <text x="367" y="195" font-family="sans-serif" font-size="11" fill="#f9a8d4" text-anchor="middle" font-weight="bold">Present Perfect Cont.</text>
  <text x="367" y="215" font-family="sans-serif" font-size="8" fill="#fce7f3" text-anchor="middle">S + have/has been + V-ing</text>
  <text x="367" y="235" font-family="sans-serif" font-size="8" fill="#fbcfe8" text-anchor="middle">I have been waiting 2h.</text>
  <text x="367" y="253" font-family="sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">Duration emphasis</text>
  <rect x="270" y="263" width="55" height="16" rx="4" fill="#831843"/>
  <text x="297" y="275" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">for</text>
  <rect x="330" y="263" width="55" height="16" rx="4" fill="#831843"/>
  <text x="357" y="275" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">since</text>
  <rect x="390" y="263" width="70" height="16" rx="4" fill="#831843"/>
  <text x="425" y="275" font-family="sans-serif" font-size="7" fill="white" text-anchor="middle">how long</text>
  <!-- Timeline arrow at bottom -->
  <line x1="30" y1="315" x2="470" y2="315" stroke="#f9a8d4" stroke-width="1.5"/>
  <polygon points="470,312 480,315 470,318" fill="#f9a8d4"/>
  <text x="250" y="330" font-family="sans-serif" font-size="8" fill="#fce7f3" text-anchor="middle">← PAST ─────── PRESENT ─────── FUTURE →</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Present Tenses Review</text>
</svg>