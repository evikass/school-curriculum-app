<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="ebg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#ebg4)" rx="12"/>
  <!-- Central modal circle -->
  <circle cx="250" cy="130" r="55" fill="#92400e" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="250" y="125" font-family="sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="bold">MODAL</text>
  <text x="250" y="142" font-family="sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="bold">VERBS</text>
  <!-- Spoke boxes radiating out -->
  <!-- Can/Could -->
  <rect x="30" y="30" width="110" height="55" rx="6" fill="#78350f" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="85" y="50" font-family="sans-serif" font-size="10" fill="#93c5fd" text-anchor="middle" font-weight="bold">can / could</text>
  <text x="85" y="65" font-family="sans-serif" font-size="7" fill="#bfdbfe" text-anchor="middle">ability, permission</text>
  <text x="85" y="78" font-family="sans-serif" font-size="7" fill="#93c5fd" text-anchor="middle">I can swim.</text>
  <!-- Must -->
  <rect x="360" y="30" width="120" height="55" rx="6" fill="#78350f" stroke="#ef4444" stroke-width="1.5"/>
  <text x="420" y="50" font-family="sans-serif" font-size="10" fill="#fca5a5" text-anchor="middle" font-weight="bold">must</text>
  <text x="420" y="65" font-family="sans-serif" font-size="7" fill="#fecaca" text-anchor="middle">obligation, certainty</text>
  <text x="420" y="78" font-family="sans-serif" font-size="7" fill="#fca5a5" text-anchor="middle">You must wear a belt.</text>
  <!-- Should -->
  <rect x="360" y="195" width="120" height="55" rx="6" fill="#78350f" stroke="#10b981" stroke-width="1.5"/>
  <text x="420" y="215" font-family="sans-serif" font-size="10" fill="#6ee7b7" text-anchor="middle" font-weight="bold">should</text>
  <text x="420" y="230" font-family="sans-serif" font-size="7" fill="#a7f3d0" text-anchor="middle">advice, recommendation</text>
  <text x="420" y="243" font-family="sans-serif" font-size="7" fill="#6ee7b7" text-anchor="middle">You should see a doctor.</text>
  <!-- May/Might -->
  <rect x="30" y="195" width="110" height="55" rx="6" fill="#78350f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="85" y="215" font-family="sans-serif" font-size="10" fill="#c4b5fd" text-anchor="middle" font-weight="bold">may / might</text>
  <text x="85" y="230" font-family="sans-serif" font-size="7" fill="#ddd6fe" text-anchor="middle">permission, possibility</text>
  <text x="85" y="243" font-family="sans-serif" font-size="7" fill="#c4b5fd" text-anchor="middle">It might rain later.</text>
  <!-- Have to -->
  <rect x="180" y="230" width="140" height="50" rx="6" fill="#78350f" stroke="#f472b6" stroke-width="1.5"/>
  <text x="250" y="250" font-family="sans-serif" font-size="10" fill="#f9a8d4" text-anchor="middle" font-weight="bold">have to</text>
  <text x="250" y="265" font-family="sans-serif" font-size="7" fill="#fbcfe8" text-anchor="middle">external obligation</text>
  <text x="250" y="278" font-family="sans-serif" font-size="7" fill="#f9a8d4" text-anchor="middle">I have to wear a uniform.</text>
  <!-- Mustn't vs Don't have to -->
  <rect x="30" y="295" width="210" height="35" rx="6" fill="#92400e" stroke="#ef4444" stroke-width="2"/>
  <text x="135" y="312" font-family="sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle" font-weight="bold">mustn't = PROHIBITION</text>
  <text x="135" y="325" font-family="sans-serif" font-size="7" fill="#fecaca" text-anchor="middle">You mustn't smoke here!</text>
  <rect x="260" y="295" width="210" height="35" rx="6" fill="#92400e" stroke="#10b981" stroke-width="2"/>
  <text x="365" y="312" font-family="sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle" font-weight="bold">don't have to = NOT NECESSARY</text>
  <text x="365" y="325" font-family="sans-serif" font-size="7" fill="#a7f3d0" text-anchor="middle">You don't have to come.</text>
  <!-- Connecting lines -->
  <line x1="140" y1="70" x2="200" y2="100" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="360" y1="70" x2="300" y2="100" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="140" y1="220" x2="200" y2="160" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="360" y1="220" x2="300" y2="160" stroke="#10b981" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Modal Verbs Review</text>
</svg>