<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="ebg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#ebg12)" rx="12"/>
  <!-- Open book -->
  <rect x="60" y="30" width="380" height="170" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
  <line x1="250" y1="30" x2="250" y2="200" stroke="#fca5a5" stroke-width="1.5"/>
  <!-- Text lines left page -->
  <rect x="75" y="45" width="155" height="4" rx="2" fill="#fecaca"/>
  <rect x="75" y="55" width="140" height="4" rx="2" fill="#fecaca"/>
  <rect x="75" y="65" width="150" height="4" rx="2" fill="#fecaca"/>
  <rect x="75" y="80" width="155" height="4" rx="2" fill="#fecaca"/>
  <rect x="75" y="90" width="120" height="4" rx="2" fill="#fecaca"/>
  <rect x="75" y="105" width="155" height="4" rx="2" fill="#fecaca"/>
  <rect x="75" y="115" width="145" height="4" rx="2" fill="#fecaca"/>
  <rect x="75" y="125" width="100" height="4" rx="2" fill="#fecaca"/>
  <!-- Highlighted text right page -->
  <rect x="265" y="45" width="155" height="4" rx="2" fill="#fecaca"/>
  <rect x="265" y="55" width="140" height="4" rx="2" fill="#fbbf24" opacity="0.5"/>
  <rect x="265" y="65" width="155" height="4" rx="2" fill="#fecaca"/>
  <rect x="265" y="80" width="120" height="4" rx="2" fill="#10b981" opacity="0.5"/>
  <rect x="265" y="90" width="155" height="4" rx="2" fill="#fecaca"/>
  <rect x="265" y="105" width="140" height="4" rx="2" fill="#60a5fa" opacity="0.5"/>
  <rect x="265" y="115" width="155" height="4" rx="2" fill="#fecaca"/>
  <!-- Reading strategy labels -->
  <text x="342" y="55" font-family="sans-serif" font-size="6" fill="#92400e">← main idea</text>
  <text x="342" y="83" font-family="sans-serif" font-size="6" fill="#065f46">← detail</text>
  <text x="342" y="108" font-family="sans-serif" font-size="6" fill="#1e40af">← inference</text>
  <!-- Magnifying glass -->
  <circle cx="430" cy="80" r="20" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <line x1="444" y1="94" x2="460" y2="110" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Four strategies -->
  <rect x="15" y="210" width="115" height="60" rx="6" fill="#991b1b" stroke="#fca5a5" stroke-width="1"/>
  <text x="72" y="230" font-family="sans-serif" font-size="9" fill="#fca5a5" text-anchor="middle" font-weight="bold">Skimming</text>
  <text x="72" y="244" font-family="sans-serif" font-size="7" fill="#fecaca" text-anchor="middle">Main idea quickly</text>
  <text x="72" y="258" font-family="sans-serif" font-size="6" fill="#fda4af" text-anchor="middle">Headlines, first lines</text>

  <rect x="140" y="210" width="115" height="60" rx="6" fill="#991b1b" stroke="#fbbf24" stroke-width="1"/>
  <text x="197" y="230" font-family="sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="bold">Scanning</text>
  <text x="197" y="244" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">Specific info</text>
  <text x="197" y="258" font-family="sans-serif" font-size="6" fill="#fef3c7" text-anchor="middle">Names, dates, numbers</text>

  <rect x="265" y="210" width="115" height="60" rx="6" fill="#991b1b" stroke="#10b981" stroke-width="1"/>
  <text x="322" y="230" font-family="sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle" font-weight="bold">Intensive</text>
  <text x="322" y="244" font-family="sans-serif" font-size="7" fill="#a7f3d0" text-anchor="middle">Full understanding</text>
  <text x="322" y="258" font-family="sans-serif" font-size="6" fill="#d1fae5" text-anchor="middle">Detailed, careful reading</text>

  <rect x="390" y="210" width="95" height="60" rx="6" fill="#991b1b" stroke="#a78bfa" stroke-width="1"/>
  <text x="437" y="230" font-family="sans-serif" font-size="9" fill="#c4b5fd" text-anchor="middle" font-weight="bold">Extensive</text>
  <text x="437" y="244" font-family="sans-serif" font-size="7" fill="#ddd6fe" text-anchor="middle">Pleasure reading</text>
  <text x="437" y="258" font-family="sans-serif" font-size="6" fill="#ede9fe" text-anchor="middle">Longer texts, general</text>
  <!-- Key skills -->
  <rect x="20" y="280" width="460" height="45" rx="6" fill="#7f1d1d" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="298" font-family="sans-serif" font-size="8" fill="#fca5a5" text-anchor="middle" font-weight="bold">Key Comprehension Skills</text>
  <text x="100" y="315" font-family="sans-serif" font-size="7" fill="#fecaca" text-anchor="middle">Main idea</text>
  <text x="180" y="315" font-family="sans-serif" font-size="7" fill="#fecaca" text-anchor="middle">Details</text>
  <text x="250" y="315" font-family="sans-serif" font-size="7" fill="#fecaca" text-anchor="middle">Inferences</text>
  <text x="330" y="315" font-family="sans-serif" font-size="7" fill="#fecaca" text-anchor="middle">Vocab in context</text>
  <text x="420" y="315" font-family="sans-serif" font-size="7" fill="#fecaca" text-anchor="middle">Author's purpose</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Reading Comprehension</text>
</svg>