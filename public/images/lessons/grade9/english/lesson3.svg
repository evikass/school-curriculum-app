<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="ebg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#ebg3)" rx="12"/>
  <!-- Four future forms -->
  <rect x="20" y="30" width="220" height="70" rx="8" fill="#075985" stroke="#7dd3fc" stroke-width="1.5"/>
  <text x="130" y="52" font-family="sans-serif" font-size="11" fill="#7dd3fc" text-anchor="middle" font-weight="bold">Will + V</text>
  <text x="130" y="68" font-family="sans-serif" font-size="8" fill="#bae6fd" text-anchor="middle">Spontaneous decisions, promises</text>
  <text x="130" y="83" font-family="sans-serif" font-size="7" fill="#e0f2fe" text-anchor="middle">"I'll help you!" "I think it will rain."</text>
  <rect x="260" y="30" width="220" height="70" rx="8" fill="#075985" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="370" y="52" font-family="sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="bold">Be going to + V</text>
  <text x="370" y="68" font-family="sans-serif" font-size="8" fill="#fde68a" text-anchor="middle">Plans, intentions, evidence</text>
  <text x="370" y="83" font-family="sans-serif" font-size="7" fill="#fef3c7" text-anchor="middle">"I'm going to study medicine."</text>
  <rect x="20" y="115" width="220" height="70" rx="8" fill="#075985" stroke="#10b981" stroke-width="1.5"/>
  <text x="130" y="137" font-family="sans-serif" font-size="11" fill="#6ee7b7" text-anchor="middle" font-weight="bold">Present Continuous</text>
  <text x="130" y="153" font-family="sans-serif" font-size="8" fill="#a7f3d0" text-anchor="middle">Fixed arrangements</text>
  <text x="130" y="168" font-family="sans-serif" font-size="7" fill="#d1fae5" text-anchor="middle">"I'm meeting John at 5 pm."</text>
  <rect x="260" y="115" width="220" height="70" rx="8" fill="#075985" stroke="#f472b6" stroke-width="1.5"/>
  <text x="370" y="137" font-family="sans-serif" font-size="11" fill="#f472b6" text-anchor="middle" font-weight="bold">Present Simple</text>
  <text x="370" y="153" font-family="sans-serif" font-size="8" fill="#fbcfe8" text-anchor="middle">Timetables, schedules</text>
  <text x="370" y="168" font-family="sans-serif" font-size="7" fill="#fce7f3" text-anchor="middle">"The train leaves at 9 am."</text>
  <!-- Future timeline -->
  <line x1="30" y1="220" x2="470" y2="220" stroke="#7dd3fc" stroke-width="1.5"/>
  <polygon points="470,217 480,220 470,223" fill="#7dd3fc"/>
  <circle cx="50" cy="220" r="8" fill="#fbbf24"/>
  <text x="50" y="242" font-family="sans-serif" font-size="8" fill="#fde68a" text-anchor="middle">NOW</text>
  <!-- Decision points on timeline -->
  <circle cx="150" cy="220" r="5" fill="#7dd3fc"/>
  <text x="150" y="212" font-family="sans-serif" font-size="7" fill="#7dd3fc" text-anchor="middle">Will! (just decided)</text>
  <rect x="200" y="210" width="60" height="8" rx="2" fill="#fbbf24"/>
  <text x="230" y="242" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">Going to (planned)</text>
  <rect x="290" y="210" width="40" height="8" rx="2" fill="#10b981"/>
  <text x="310" y="242" font-family="sans-serif" font-size="7" fill="#6ee7b7" text-anchor="middle">Arranged</text>
  <line x1="370" y1="210" x2="370" y2="230" stroke="#f472b6" stroke-width="2"/>
  <text x="370" y="242" font-family="sans-serif" font-size="7" fill="#f472b6" text-anchor="middle">Timetable</text>
  <!-- Advanced forms -->
  <rect x="50" y="260" width="190" height="55" rx="6" fill="#0c4a6e" stroke="#7dd3fc" stroke-width="1"/>
  <text x="145" y="280" font-family="sans-serif" font-size="9" fill="#7dd3fc" text-anchor="middle" font-weight="bold">Future Continuous</text>
  <text x="145" y="295" font-family="sans-serif" font-size="7" fill="#bae6fd" text-anchor="middle">will be + V-ing</text>
  <text x="145" y="307" font-family="sans-serif" font-size="7" fill="#e0f2fe" text-anchor="middle">"I'll be lying on the beach"</text>
  <rect x="260" y="260" width="190" height="55" rx="6" fill="#0c4a6e" stroke="#fbbf24" stroke-width="1"/>
  <text x="355" y="280" font-family="sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="bold">Future Perfect</text>
  <text x="355" y="295" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">will have + V3</text>
  <text x="355" y="307" font-family="sans-serif" font-size="7" fill="#fef3c7" text-anchor="middle">"She will have graduated"</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Future Forms</text>
</svg>