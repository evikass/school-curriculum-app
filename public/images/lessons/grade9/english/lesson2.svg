<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="ebg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#3b0764"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#ebg2)" rx="12"/>
  <!-- Timeline arrow -->
  <line x1="30" y1="40" x2="470" y2="40" stroke="#c4b5fd" stroke-width="2"/>
  <polygon points="470,36 480,40 470,44" fill="#c4b5fd"/>
  <text x="250" y="35" font-family="sans-serif" font-size="8" fill="#e9d5ff" text-anchor="middle">← FURTHER PAST ──── PAST ──── NOW →</text>
  <!-- Four tense boxes stacked -->
  <rect x="20" y="55" width="225" height="60" rx="6" fill="#5b21b6" stroke="#a78bfa" stroke-width="1"/>
  <text x="132" y="75" font-family="sans-serif" font-size="10" fill="#e9d5ff" text-anchor="middle" font-weight="bold">Past Simple</text>
  <text x="132" y="90" font-family="sans-serif" font-size="8" fill="#d8b4fe" text-anchor="middle">S + V2 — yesterday, ago, last week</text>
  <text x="132" y="105" font-family="sans-serif" font-size="7" fill="#c4b5fd" text-anchor="middle">She visited London last year.</text>
  <rect x="255" y="55" width="225" height="60" rx="6" fill="#5b21b6" stroke="#a78bfa" stroke-width="1"/>
  <text x="367" y="75" font-family="sans-serif" font-size="10" fill="#e9d5ff" text-anchor="middle" font-weight="bold">Past Continuous</text>
  <text x="367" y="90" font-family="sans-serif" font-size="8" fill="#d8b4fe" text-anchor="middle">S + was/were + V-ing — while, when</text>
  <text x="367" y="105" font-family="sans-serif" font-size="7" fill="#c4b5fd" text-anchor="middle">I was reading when she called.</text>
  <rect x="20" y="125" width="225" height="60" rx="6" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <text x="132" y="145" font-family="sans-serif" font-size="10" fill="#e9d5ff" text-anchor="middle" font-weight="bold">Past Perfect</text>
  <text x="132" y="160" font-family="sans-serif" font-size="8" fill="#d8b4fe" text-anchor="middle">S + had + V3 — before, by the time</text>
  <text x="132" y="175" font-family="sans-serif" font-size="7" fill="#c4b5fd" text-anchor="middle">She had left before I arrived.</text>
  <rect x="255" y="125" width="225" height="60" rx="6" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <text x="367" y="145" font-family="sans-serif" font-size="10" fill="#e9d5ff" text-anchor="middle" font-weight="bold">Past Perfect Continuous</text>
  <text x="367" y="160" font-family="sans-serif" font-size="8" fill="#d8b4fe" text-anchor="middle">S + had been + V-ing — for, since</text>
  <text x="367" y="175" font-family="sans-serif" font-size="7" fill="#c4b5fd" text-anchor="middle">He had been working for 3 hours.</text>
  <!-- Timeline visualization -->
  <line x1="30" y1="220" x2="470" y2="220" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Past Simple dot -->
  <circle cx="200" cy="220" r="6" fill="#a78bfa"/>
  <text x="200" y="240" font-family="sans-serif" font-size="7" fill="#d8b4fe" text-anchor="middle">Simple</text>
  <!-- Past Continuous wavy line -->
  <path d="M100,220 Q130,200 160,220 Q190,240 220,220" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="160" y="255" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">Continuous</text>
  <!-- Past Perfect earlier dot -->
  <circle cx="80" cy="220" r="6" fill="#10b981"/>
  <line x1="80" y1="220" x2="200" y2="220" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="80" y="240" font-family="sans-serif" font-size="7" fill="#6ee7b7" text-anchor="middle">Perfect</text>
  <!-- Past Perf Cont wavy earlier -->
  <path d="M40,220 Q60,195 80,220 Q100,245 120,220" fill="none" stroke="#f97316" stroke-width="2"/>
  <text x="80" y="260" font-family="sans-serif" font-size="7" fill="#fdba74" text-anchor="middle">Perf. Cont.</text>
  <!-- Now marker -->
  <circle cx="420" cy="220" r="8" fill="#fbbf24" stroke="white" stroke-width="1.5"/>
  <text x="420" y="210" font-family="sans-serif" font-size="8" fill="#fbbf24" text-anchor="middle" font-weight="bold">NOW</text>
  <!-- Comparison table -->
  <rect x="30" y="275" width="440" height="55" rx="6" fill="#4c1d95" stroke="#a78bfa" stroke-width="1"/>
  <text x="250" y="293" font-family="sans-serif" font-size="9" fill="#e9d5ff" text-anchor="middle" font-weight="bold">Key Differences</text>
  <text x="140" y="310" font-family="sans-serif" font-size="7" fill="#d8b4fe" text-anchor="middle">Simple = completed action</text>
  <text x="360" y="310" font-family="sans-serif" font-size="7" fill="#d8b4fe" text-anchor="middle">Continuous = in progress</text>
  <text x="140" y="323" font-family="sans-serif" font-size="7" fill="#d8b4fe" text-anchor="middle">Perfect = 'past before past'</text>
  <text x="360" y="323" font-family="sans-serif" font-size="7" fill="#d8b4fe" text-anchor="middle">Perf.Cont. = duration emphasis</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Past Tenses Review</text>
</svg>