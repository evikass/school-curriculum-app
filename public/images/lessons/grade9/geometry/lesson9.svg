<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
    <marker id="ah9" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#AD1457"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AD1457" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle" font-family="Arial">Синус, косинус, тангенс угла</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 9</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#E91E63" stroke-width="1" opacity="0.3"/>

  <!-- Unit circle panel -->
  <rect x="15" y="58" width="210" height="195" rx="6" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1"/>
  <text x="120" y="74" font-size="10" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="Arial">Единичная окружность</text>
  <!-- Axes -->
  <line x1="30" y1="155" x2="210" y2="155" stroke="#AD1457" stroke-width="1" marker-end="url(#ah9)"/>
  <line x1="120" y1="245" x2="120" y2="82" stroke="#AD1457" stroke-width="1" marker-end="url(#ah9)"/>
  <text x="213" y="158" font-size="7" fill="#AD1457" font-family="Arial">x</text>
  <text x="117" y="79" font-size="7" fill="#AD1457" font-family="Arial">y</text>
  <!-- Circle -->
  <circle cx="120" cy="155" r="65" fill="none" stroke="#E91E63" stroke-width="2"/>
  <!-- Angle arc (about 45 degrees) -->
  <path d="M 155 155 A 35 35 0 0 0 145 130" fill="none" stroke="#E91E63" stroke-width="1.5"/>
  <text x="158" y="142" font-size="8" fill="#E91E63" font-family="Arial">a</text>
  <!-- Point on circle at ~45 degrees -->
  <circle cx="166" cy="109" r="3.5" fill="#AD1457"/>
  <text x="170" y="105" font-size="7.5" fill="#AD1457" font-family="Arial">P(cosa,sina)</text>
  <!-- Radius to point -->
  <line x1="120" y1="155" x2="166" y2="109" stroke="#AD1457" stroke-width="1.5"/>
  <!-- sin projection -->
  <line x1="166" y1="109" x2="166" y2="155" stroke="#4CAF50" stroke-width="2"/>
  <text x="173" y="135" font-size="7.5" fill="#4CAF50" font-family="Arial">sin a</text>
  <!-- cos projection -->
  <line x1="120" y1="155" x2="166" y2="155" stroke="#1E88E5" stroke-width="2"/>
  <text x="137" y="165" font-size="7.5" fill="#1E88E5" font-family="Arial">cos a</text>
  <!-- tan line -->
  <line x1="185" y1="155" x2="185" y2="82" stroke="#FF5722" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="120" y1="155" x2="185" y2="155" stroke="#FF5722" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="120" y1="155" x2="185" y2="100" stroke="#FF5722" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="190" y="120" font-size="7" fill="#FF5722" font-family="Arial">tg a</text>
  <!-- Quadrant labels -->
  <text x="140" y="135" font-size="6" fill="#ccc" font-family="Arial">I</text>
  <text x="98" y="135" font-size="6" fill="#ccc" font-family="Arial">II</text>
  <text x="98" y="172" font-size="6" fill="#ccc" font-family="Arial">III</text>
  <text x="140" y="172" font-size="6" fill="#ccc" font-family="Arial">IV</text>

  <!-- Right triangle panel -->
  <rect x="235" y="58" width="250" height="105" rx="6" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1"/>
  <text x="360" y="74" font-size="10" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="Arial">Прямоугольный треугольник</text>
  <!-- Triangle -->
  <polygon points="260,148 380,148 380,92" fill="none" stroke="#AD1457" stroke-width="2"/>
  <!-- Angle arc -->
  <path d="M 275 148 A 15 15 0 0 0 272 138" fill="none" stroke="#E91E63" stroke-width="1.5"/>
  <text x="268" y="135" font-size="8" fill="#E91E63" font-family="Arial">a</text>
  <!-- Labels -->
  <text x="320" y="145" font-size="8" fill="#1E88E5" font-family="Arial" font-weight="bold">Прилежащий</text>
  <text x="385" y="125" font-size="8" fill="#4CAF50" font-family="Arial" font-weight="bold">Противолеж.</text>
  <line x1="375" y1="143" x2="385" y2="143" stroke="#AD1457" stroke-width="0.5"/>
  <line x1="378" y1="148" x2="378" y2="140" stroke="#AD1457" stroke-width="0.5"/>
  <text x="312" y="86" font-size="8" fill="#AD1457" font-family="Arial" font-weight="bold">Гипотенуза</text>
  <!-- Definitions -->
  <text x="450" y="108" font-size="7.5" fill="#4CAF50" text-anchor="middle" font-family="Arial">sin a = пр/гип</text>
  <text x="450" y="120" font-size="7.5" fill="#1E88E5" text-anchor="middle" font-family="Arial">cos a = пр/гип</text>
  <text x="450" y="132" font-size="7.5" fill="#FF5722" text-anchor="middle" font-family="Arial">tg a = пр/пр</text>
  <text x="450" y="144" font-size="7" fill="#9C27B0" text-anchor="middle" font-family="Arial">ctg a = 1/tg a</text>

  <!-- Values table panel -->
  <rect x="235" y="170" width="250" height="83" rx="6" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1"/>
  <text x="360" y="185" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="Arial">Таблица значений</text>
  <!-- Table header -->
  <line x1="245" y1="190" x2="475" y2="190" stroke="#E91E63" stroke-width="0.5"/>
  <line x1="245" y1="204" x2="475" y2="204" stroke="#E91E63" stroke-width="0.5"/>
  <line x1="245" y1="218" x2="475" y2="218" stroke="#E91E63" stroke-width="0.5"/>
  <line x1="245" y1="232" x2="475" y2="232" stroke="#E91E63" stroke-width="0.5"/>
  <line x1="245" y1="246" x2="475" y2="246" stroke="#E91E63" stroke-width="0.5"/>
  <line x1="285" y1="190" x2="285" y2="246" stroke="#E91E63" stroke-width="0.5"/>
  <line x1="340" y1="190" x2="340" y2="246" stroke="#E91E63" stroke-width="0.5"/>
  <line x1="395" y1="190" x2="395" y2="246" stroke="#E91E63" stroke-width="0.5"/>
  <line x1="445" y1="190" x2="445" y2="246" stroke="#E91E63" stroke-width="0.5"/>
  <!-- Headers -->
  <text x="265" y="200" font-size="7.5" fill="#AD1457" text-anchor="middle" font-family="Arial" font-weight="bold">a</text>
  <text x="312" y="200" font-size="7.5" fill="#AD1457" text-anchor="middle" font-family="Arial" font-weight="bold">30</text>
  <text x="367" y="200" font-size="7.5" fill="#AD1457" text-anchor="middle" font-family="Arial" font-weight="bold">45</text>
  <text x="420" y="200" font-size="7.5" fill="#AD1457" text-anchor="middle" font-family="Arial" font-weight="bold">60</text>
  <text x="460" y="200" font-size="7.5" fill="#AD1457" text-anchor="middle" font-family="Arial" font-weight="bold">90</text>
  <!-- sin row -->
  <text x="265" y="214" font-size="7" fill="#4CAF50" text-anchor="middle" font-family="Arial" font-weight="bold">sin</text>
  <text x="312" y="214" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">1/2</text>
  <text x="367" y="214" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">V2/2</text>
  <text x="420" y="214" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">V3/2</text>
  <text x="460" y="214" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">1</text>
  <!-- cos row -->
  <text x="265" y="228" font-size="7" fill="#1E88E5" text-anchor="middle" font-family="Arial" font-weight="bold">cos</text>
  <text x="312" y="228" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">V3/2</text>
  <text x="367" y="228" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">V2/2</text>
  <text x="420" y="228" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">1/2</text>
  <text x="460" y="228" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">0</text>
  <!-- tan row -->
  <text x="265" y="242" font-size="7" fill="#FF5722" text-anchor="middle" font-family="Arial" font-weight="bold">tg</text>
  <text x="312" y="242" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">V3/3</text>
  <text x="367" y="242" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">1</text>
  <text x="420" y="242" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">V3</text>
  <text x="460" y="242" font-size="7" fill="#333" text-anchor="middle" font-family="Arial">-</text>

  <!-- Quadrant signs panel -->
  <rect x="15" y="260" width="200" height="52" rx="6" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1"/>
  <text x="115" y="276" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="Arial">Знаки по четвертям</text>
  <text x="115" y="290" font-size="7.5" fill="#4CAF50" text-anchor="middle" font-family="Arial">sin: I+ II+ III- IV-</text>
  <text x="115" y="302" font-size="7.5" fill="#1E88E5" text-anchor="middle" font-family="Arial">cos: I+ II- III- IV+</text>

  <!-- Identity panel -->
  <rect x="225" y="260" width="260" height="52" rx="6" fill="white" opacity="0.9" stroke="#E91E63" stroke-width="1"/>
  <text x="355" y="276" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="Arial">Основное тождество</text>
  <text x="355" y="292" font-size="10" fill="#880E4F" text-anchor="middle" font-family="Arial" font-weight="bold">sin²a + cos²a = 1</text>
  <text x="355" y="306" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">tg a = sin a / cos a</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#E91E63" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">sin a = пр/гип | cos a = пр/гип | tg a = sin a/cos a | sin²+cos²=1</text>
</svg>