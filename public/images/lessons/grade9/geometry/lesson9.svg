<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Circle -->
  <circle cx="250" cy="170" r="120" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <!-- Center -->
  <circle cx="250" cy="170" r="3" fill="#22d3ee"/>
  <text x="255" y="180" fill="#22d3ee" font-size="10" font-family="serif">O</text>
  <!-- Radius -->
  <line x1="250" y1="170" x2="370" y2="170" stroke="#f59e0b" stroke-width="2"/>
  <text x="310" y="165" fill="#f59e0b" font-size="11" font-family="serif">R</text>
  <!-- Arc highlight (60°) -->
  <path d="M310,65 A120,120 0 0,1 370,170" fill="none" stroke="#ec4899" stroke-width="3"/>
  <text x="360" y="110" fill="#ec4899" font-size="11" font-family="serif">l = πRn/180</text>
  <!-- Angle marker -->
  <path d="M250,170 L280,80" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  <path d="M250,140 A30,30 0 0,1 262,110" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="268" y="120" fill="#22c55e" font-size="10" font-family="serif">n°</text>
  <!-- Radian arc -->
  <path d="M250,170 L310,65" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- Diameter line -->
  <line x1="130" y1="170" x2="370" y2="170" stroke="#9ca3af" stroke-width="0.5" stroke-dasharray="4,4"/>
  <!-- Formulas -->
  <rect x="30" y="260" width="200" height="70" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="130" y="280" fill="#22d3ee" font-size="11" font-family="serif" text-anchor="middle">C = 2πR</text>
  <text x="130" y="298" fill="#ec4899" font-size="11" font-family="serif" text-anchor="middle">l = πRn / 180</text>
  <text x="130" y="318" fill="#22c55e" font-size="11" font-family="serif" text-anchor="middle">l = Rα (в радианах)</text>
  <!-- Radian conversions -->
  <text x="370" y="270" fill="#9ca3af" font-size="9" font-family="sans-serif">180° = π рад</text>
  <text x="370" y="285" fill="#9ca3af" font-size="9" font-family="sans-serif">90° = π/2 рад</text>
  <text x="370" y="300" fill="#9ca3af" font-size="9" font-family="sans-serif">60° = π/3 рад</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Длина окружности и дуги</text>
</svg>