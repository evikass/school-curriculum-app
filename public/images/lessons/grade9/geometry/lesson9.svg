<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="headerGrad9" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow9" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#FAFAFA" rx="8"/>
  <!-- Header bar -->
  <rect width="500" height="52" fill="url(#headerGrad9)" rx="8"/>
  <rect y="40" width="500" height="12" fill="url(#headerGrad9)"/>
  <!-- Decorative elements -->
  <circle cx="470" cy="26" r="15" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="445" cy="18" r="8" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="30" cy="26" r="12" fill="#FFFFFF" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Урок 9: Длина окружности и дуги</text>
  <!-- Circle with circumference -->
  <g transform="translate(20,62)">
    <rect x="0" y="0" width="225" height="145" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow9)"/>
    <text x="112" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Длина окружности</text>
    <!-- Circle -->
    <circle cx="112" cy="82" r="48" fill="none" stroke="#7E57C2" stroke-width="2.5"/>
    <!-- Center -->
    <circle cx="112" cy="82" r="3" fill="#FF7043"/>
    <text x="116" y="79" font-family="Arial,sans-serif" font-size="9" fill="#FF7043">O</text>
    <!-- Radius -->
    <line x1="112" y1="82" x2="160" y2="82" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="132" y="79" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">R</text>
    <!-- Diameter -->
    <line x1="64" y1="82" x2="160" y2="82" stroke="#B39DDB" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="112" y="76" font-family="Arial,sans-serif" font-size="9" fill="#B39DDB">D = 2R</text>
    <!-- Arc highlight -->
    <path d="M 90 36 A 48 48 0 0 1 158 60" fill="none" stroke="#FF7043" stroke-width="3"/>
    <text x="140" y="42" font-family="Arial,sans-serif" font-size="9" fill="#FF7043">дуга</text>
    <!-- Formulas -->
    <rect x="8" y="118" width="100" height="22" rx="3" fill="#EDE7F6"/>
    <text x="58" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A2F8A">C = 2πR</text>
    <rect x="112" y="118" width="105" height="22" rx="3" fill="#E8F5E9"/>
    <text x="164" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">C = πD</text>
  </g>
  <!-- Arc length -->
  <g transform="translate(260,62)">
    <rect x="0" y="0" width="220" height="145" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow9)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Длина дуги окружности</text>
    <!-- Small circle with arc -->
    <circle cx="70" cy="75" r="35" fill="none" stroke="#D1C4E9" stroke-width="1.5"/>
    <!-- Arc n degrees -->
    <path d="M 95 50 A 35 35 0 0 1 105 90" fill="none" stroke="#FF7043" stroke-width="3"/>
    <!-- Angle lines -->
    <line x1="70" y1="75" x2="95" y2="50" stroke="#7E57C2" stroke-width="1"/>
    <line x1="70" y1="75" x2="105" y2="90" stroke="#7E57C2" stroke-width="1"/>
    <!-- Angle arc -->
    <path d="M 80 68 A 12 12 0 0 1 82 80" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="85" y="77" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">n°</text>
    <circle cx="70" cy="75" r="2" fill="#757575"/>
    <!-- Formulas -->
    <text x="155" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">В градусах:</text>
    <rect x="112" y="52" width="100" height="20" rx="3" fill="#EDE7F6"/>
    <text x="162" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A2F8A">l = πRn/180</text>
    <text x="155" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">В радианах:</text>
    <rect x="112" y="90" width="100" height="20" rx="3" fill="#E8F5E9"/>
    <text x="162" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">l = Rα</text>
    <text x="110" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#757575">π ≈ 3,14159...</text>
  </g>
  <!-- Radian measure -->
  <g transform="translate(20,218)">
    <rect x="0" y="0" width="220" height="115" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow9)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Радианная мера угла</text>
    <line x1="10" y1="24" x2="210" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="12" y="40" font-family="Arial,sans-serif" font-size="10" fill="#212121">1 радиан ≈ 57,3°</text>
    <text x="12" y="56" font-family="Arial,sans-serif" font-size="10" fill="#212121">180° = π рад</text>
    <text x="12" y="72" font-family="Arial,sans-serif" font-size="10" fill="#7E57C2">90° = π/2 рад</text>
    <text x="12" y="88" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">60° = π/3 рад</text>
    <text x="12" y="104" font-family="Arial,sans-serif" font-size="10" fill="#FF7043">45° = π/4 рад</text>
  </g>
  <!-- Examples -->
  <g transform="translate(260,218)">
    <rect x="0" y="0" width="220" height="115" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow9)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Примеры задач</text>
    <line x1="10" y1="24" x2="210" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="12" y="42" font-family="Arial,sans-serif" font-size="9" fill="#212121">R=5 см, найти C:</text>
    <text x="12" y="54" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">C = 2π·5 = 10π ≈ 31,4 см</text>
    <text x="12" y="72" font-family="Arial,sans-serif" font-size="9" fill="#212121">R=6 см, дуга 60°:</text>
    <text x="12" y="84" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">l = π·6·60/180 = 2π ≈ 6,3 см</text>
    <text x="12" y="102" font-family="Arial,sans-serif" font-size="9" fill="#212121">Дуга 90° = 8π, найти R:</text>
    <text x="12" y="114" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">8π = πR·90/180 → R = 16</text>
  </g>
</svg>