<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="a2b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22d3ee"/>
    </marker>
    <marker id="a2o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f59e0b"/>
    </marker>
    <marker id="a2g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22c55e"/>
    </marker>
    <marker id="a2p" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#ec4899"/>
    </marker>
  </defs>
  <!-- Triangle rule -->
  <text x="130" y="30" fill="#9ca3af" font-size="11" font-family="serif" text-anchor="middle">Правило треугольника</text>
  <line x1="60" y1="100" x2="160" y2="50" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#a2b)"/>
  <line x1="160" y1="50" x2="220" y2="120" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#a2o)"/>
  <line x1="60" y1="100" x2="220" y2="120" stroke="#22c55e" stroke-width="2.5" marker-end="url(#a2g)"/>
  <text x="100" y="65" fill="#22d3ee" font-size="10" font-family="serif">a⃗</text>
  <text x="195" y="75" fill="#f59e0b" font-size="10" font-family="serif">b⃗</text>
  <text x="145" y="115" fill="#22c55e" font-size="10" font-family="serif">a⃗+b⃗</text>
  <!-- Parallelogram rule -->
  <text x="370" y="30" fill="#9ca3af" font-size="11" font-family="serif" text-anchor="middle">Правило параллелограмма</text>
  <line x1="290" y1="130" x2="390" y2="60" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#a2b)"/>
  <line x1="290" y1="130" x2="370" y2="170" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#a2o)"/>
  <line x1="390" y1="60" x2="460" y2="100" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="370" y1="170" x2="460" y2="100" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="290" y1="130" x2="460" y2="100" stroke="#22c55e" stroke-width="2.5" marker-end="url(#a2g)"/>
  <text x="340" y="85" fill="#22d3ee" font-size="10" font-family="serif">a⃗</text>
  <text x="320" y="160" fill="#f59e0b" font-size="10" font-family="serif">b⃗</text>
  <text x="400" y="115" fill="#22c55e" font-size="10" font-family="serif">a⃗+b⃗</text>
  <!-- Subtraction -->
  <text x="250" y="220" fill="#9ca3af" font-size="11" font-family="serif" text-anchor="middle">Вычитание: a⃗ − b⃗</text>
  <line x1="100" y1="280" x2="250" y2="250" stroke="#22d3ee" stroke-width="2.5" marker-end="url(#a2b)"/>
  <line x1="100" y1="280" x2="200" y2="300" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#a2o)"/>
  <line x1="200" y1="300" x2="250" y2="250" stroke="#ec4899" stroke-width="2.5" marker-end="url(#a2p)"/>
  <text x="180" y="255" fill="#22d3ee" font-size="10" font-family="serif">a⃗</text>
  <text x="140" y="300" fill="#f59e0b" font-size="10" font-family="serif">b⃗</text>
  <text x="235" y="270" fill="#ec4899" font-size="10" font-family="serif">a⃗−b⃗</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Сложение и вычитание векторов</text>
</svg>