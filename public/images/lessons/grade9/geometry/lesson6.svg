<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Right triangle -->
  <polygon points="80,280 80,80 320,280" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <!-- Right angle mark -->
  <rect x="80" y="260" width="20" height="20" fill="none" stroke="#22d3ee" stroke-width="1"/>
  <!-- Angle alpha -->
  <path d="M80,240 A40,40 0 0,1 100,265" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="95" y="240" fill="#f59e0b" font-size="14" font-family="serif">α</text>
  <!-- Labels -->
  <text x="55" y="180" fill="#ec4899" font-size="11" font-family="serif">против.</text>
  <text x="180" y="300" fill="#22c55e" font-size="11" font-family="serif">прилеж.</text>
  <text x="210" y="160" fill="#6366f1" font-size="11" font-family="serif">гипотенуза</text>
  <!-- Formulas -->
  <rect x="300" y="50" width="180" height="140" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="390" y="70" fill="#f59e0b" font-size="11" font-family="serif" text-anchor="middle">sin α = пр./гип.</text>
  <text x="390" y="90" fill="#22d3ee" font-size="11" font-family="serif" text-anchor="middle">cos α = прил./гип.</text>
  <text x="390" y="110" fill="#ec4899" font-size="11" font-family="serif" text-anchor="middle">tg α = пр./прил.</text>
  <text x="390" y="140" fill="#22c55e" font-size="11" font-family="serif" text-anchor="middle">sin²α + cos²α = 1</text>
  <!-- Table -->
  <text x="310" y="170" fill="#9ca3af" font-size="9" font-family="sans-serif">   30°  45°  60°</text>
  <text x="310" y="183" fill="#f59e0b" font-size="9" font-family="sans-serif">sin 1/2  √2/2 √3/2</text>
  <!-- Unit circle hint -->
  <circle cx="390" cy="280" r="40" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="390" y1="280" x2="430" y2="260" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="430" cy="260" r="2" fill="#f59e0b"/>
  <text x="435" y="255" fill="#f59e0b" font-size="8" font-family="serif">(cosα;sinα)</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Синус, косинус, тангенс угла</text>
</svg>