<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <marker id="ah18" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1565C0"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Симметрия относительно точки и прямой</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 18</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1E88E5" stroke-width="1" opacity="0.3"/>

  <!-- Central symmetry panel -->
  <rect x="15" y="58" width="235" height="170" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="132" y="74" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">Центральная симметрия</text>
  <!-- Original triangle -->
  <polygon points="60,110 60,155 100,130" fill="#BBDEFB" fill-opacity="0.5" stroke="#1565C0" stroke-width="2"/>
  <text x="68" y="105" font-size="7" fill="#1565C0" font-family="Arial">A</text>
  <text x="68" y="162" font-size="7" fill="#1565C0" font-family="Arial">B</text>
  <text x="103" y="127" font-size="7" fill="#1565C0" font-family="Arial">C</text>
  <!-- Center point O -->
  <circle cx="132" cy="132" r="3" fill="#E65100"/>
  <text x="132" y="126" font-size="8" fill="#E65100" font-family="Arial" font-weight="bold">O</text>
  <!-- Mapped triangle -->
  <polygon points="204,154 204,109 164,134" fill="#FFCDD2" fill-opacity="0.5" stroke="#C62828" stroke-width="2"/>
  <text x="207" y="158" font-size="7" fill="#C62828" font-family="Arial">A'</text>
  <text x="207" y="106" font-size="7" fill="#C62828" font-family="Arial">B'</text>
  <text x="152" y="140" font-size="7" fill="#C62828" font-family="Arial">C'</text>
  <!-- Connection lines -->
  <line x1="60" y1="110" x2="204" y2="154" stroke="#9E9E9E" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="60" y1="155" x2="204" y2="109" stroke="#9E9E9E" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="100" y1="130" x2="164" y2="134" stroke="#9E9E9E" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Formula -->
  <rect x="30" y="195" width="205" height="22" rx="4" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.8"/>
  <text x="132" y="210" font-size="8.5" fill="#0D47A1" text-anchor="middle" font-family="Arial" font-weight="bold">AO = OA' — O середина AA'</text>
  <text x="132" y="223" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Поворот на 180° вокруг O</text>

  <!-- Axial symmetry panel -->
  <rect x="260" y="58" width="225" height="170" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">Осевая симметрия</text>
  <!-- Axis of symmetry -->
  <line x1="372" y1="82" x2="372" y2="215" stroke="#E65100" stroke-width="2"/>
  <text x="378" y="90" font-size="8" fill="#E65100" font-family="Arial" font-weight="bold">l (ось)</text>
  <!-- Original figure (left) -->
  <polygon points="310,110 310,165 350,140" fill="#BBDEFB" fill-opacity="0.5" stroke="#1565C0" stroke-width="2"/>
  <text x="305" y="107" font-size="7" fill="#1565C0" font-family="Arial">A</text>
  <text x="305" y="172" font-size="7" fill="#1565C0" font-family="Arial">B</text>
  <text x="353" y="137" font-size="7" fill="#1565C0" font-family="Arial">C</text>
  <!-- Mapped figure (right) -->
  <polygon points="434,110 434,165 394,140" fill="#FFCDD2" fill-opacity="0.5" stroke="#C62828" stroke-width="2"/>
  <text x="437" y="107" font-size="7" fill="#C62828" font-family="Arial">A'</text>
  <text x="437" y="172" font-size="7" fill="#C62828" font-family="Arial">B'</text>
  <text x="385" y="137" font-size="7" fill="#C62828" font-family="Arial">C'</text>
  <!-- Perpendicular connections -->
  <line x1="310" y1="110" x2="434" y2="110" stroke="#9E9E9E" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="310" y1="165" x2="434" y2="165" stroke="#9E9E9E" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="350" y1="140" x2="394" y2="140" stroke="#9E9E9E" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Right angle marks -->
  <rect x="370" y="106" width="4" height="4" fill="none" stroke="#9E9E9E" stroke-width="0.5"/>
  <rect x="370" y="161" width="4" height="4" fill="none" stroke="#9E9E9E" stroke-width="0.5"/>
  <!-- Formula -->
  <rect x="275" y="195" width="195" height="22" rx="4" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.8"/>
  <text x="372" y="210" font-size="8.5" fill="#0D47A1" text-anchor="middle" font-family="Arial" font-weight="bold">AA' _|_ l, AM = MA'</text>
  <text x="372" y="223" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Отражение от прямой l</text>

  <!-- Symmetrical figures examples panel -->
  <rect x="15" y="235" width="235" height="77" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="132" y="251" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">Симметричные фигуры</text>
  <!-- Rectangle -->
  <rect x="30" y="260" width="30" height="20" fill="none" stroke="#1E88E5" stroke-width="1.5"/>
  <line x1="45" y1="255" x2="45" y2="285" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Rhombus -->
  <polygon points="90,260 105,270 90,280 75,270" fill="none" stroke="#1E88E5" stroke-width="1.5"/>
  <line x1="90" y1="255" x2="90" y2="285" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="75" y1="270" x2="105" y2="270" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="90" y="295" font-size="6" fill="#555" text-anchor="middle" font-family="Arial">2 оси</text>
  <!-- Circle -->
  <circle cx="145" cy="270" r="10" fill="none" stroke="#1E88E5" stroke-width="1.5"/>
  <circle cx="145" cy="270" r="1.5" fill="#E65100"/>
  <text x="145" y="295" font-size="6" fill="#555" text-anchor="middle" font-family="Arial">Бесконечно</text>
  <!-- Equilateral triangle -->
  <polygon points="190,260 205,280 175,280" fill="none" stroke="#1E88E5" stroke-width="1.5"/>
  <line x1="190" y1="256" x2="190" y2="285" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="190" y="295" font-size="6" fill="#555" text-anchor="middle" font-family="Arial">3 оси</text>
  <!-- Square -->
  <rect x="220" y="260" width="20" height="20" fill="none" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="230" y="295" font-size="6" fill="#555" text-anchor="middle" font-family="Arial">4 оси</text>

  <!-- Properties panel -->
  <rect x="260" y="235" width="225" height="77" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="372" y="251" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">Свойства симметрий</text>
  <text x="372" y="268" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Центральная: поворот на 180°</text>
  <text x="372" y="282" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Осевая: отражение от прямой</text>
  <text x="372" y="296" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Обратное преобразование = само преобразование</text>
  <text x="372" y="308" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">Композиция: S_O = S_l1 ° S_l2 (l1 _|_ l2)</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#1E88E5" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Центральная: AO=OA' | Осевая: AA'_|_l, AM=MA'</text>
</svg>