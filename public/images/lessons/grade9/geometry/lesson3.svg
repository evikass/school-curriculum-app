<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="headerGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#FAFAFA" rx="8"/>
  <!-- Header bar -->
  <rect width="500" height="52" fill="url(#headerGrad3)" rx="8"/>
  <rect y="40" width="500" height="12" fill="url(#headerGrad3)"/>
  <!-- Decorative elements -->
  <circle cx="470" cy="26" r="15" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="445" cy="18" r="8" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="30" cy="26" r="12" fill="#FFFFFF" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Урок 3: Умножение вектора на число</text>
  <!-- Scalar multiplication diagram -->
  <g transform="translate(20,62)">
    <rect x="0" y="0" width="230" height="135" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow3)"/>
    <text x="115" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Умножение вектора на число k</text>
    <defs><marker id="arr3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7E57C2"/></marker></defs>
    <defs><marker id="arr3g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/></marker></defs>
    <defs><marker id="arr3r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF7043"/></marker></defs>
    <!-- Original vector a -->
    <line x1="20" y1="55" x2="80" y2="55" stroke="#7E57C2" stroke-width="2.5" marker-end="url(#arr3)"/>
    <text x="42" y="50" font-family="Arial,sans-serif" font-size="10" fill="#7E57C2">a⃗</text>
    <!-- 2a - same direction, twice longer -->
    <line x1="20" y1="80" x2="140" y2="80" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arr3g)"/>
    <text x="70" y="75" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">2a⃗ (k=2)</text>
    <!-- -3a - opposite direction, 3x longer -->
    <line x1="170" y1="105" x2="20" y2="105" stroke="#FF7043" stroke-width="2.5" marker-end="url(#arr3r)"/>
    <text x="90" y="100" font-family="Arial,sans-serif" font-size="10" fill="#FF7043">-3a⃗ (k=-3)</text>
    <!-- 0.5a - half -->
    <line x1="20" y1="125" x2="50" y2="125" stroke="#B39DDB" stroke-width="2.5" marker-end="url(#arr3)"/>
    <text x="35" y="120" font-family="Arial,sans-serif" font-size="9" fill="#B39DDB">0.5a⃗</text>
  </g>
  <!-- Properties panel -->
  <g transform="translate(265,62)">
    <rect x="0" y="0" width="215" height="135" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow3)"/>
    <text x="107" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Свойства умножения</text>
    <line x1="10" y1="24" x2="205" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="12" y="42" font-family="Arial,sans-serif" font-size="10" fill="#212121">1. (k+m)a⃗ = ka⃗ + ma⃗</text>
    <text x="12" y="58" font-family="Arial,sans-serif" font-size="10" fill="#212121">2. k(a⃗+b⃗) = ka⃗ + kb⃗</text>
    <text x="12" y="74" font-family="Arial,sans-serif" font-size="10" fill="#212121">3. k(ma⃗) = (km)a⃗</text>
    <text x="12" y="90" font-family="Arial,sans-serif" font-size="10" fill="#212121">4. 1·a⃗ = a⃗</text>
    <text x="12" y="106" font-family="Arial,sans-serif" font-size="10" fill="#212121">5. (-1)·a⃗ = -a⃗</text>
    <text x="12" y="122" font-family="Arial,sans-serif" font-size="10" fill="#212121">6. 0·a⃗ = 0⃗</text>
  </g>
  <!-- Direction rules -->
  <g transform="translate(20,208)">
    <rect x="0" y="0" width="225" height="125" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow3)"/>
    <text x="112" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Направление ka⃗</text>
    <line x1="10" y1="24" x2="215" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <rect x="10" y="32" width="200" height="22" rx="3" fill="#E8F5E9"/>
    <text x="110" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">k &gt; 0: ka⃗ ↑↑ a⃗ (сонаправлен)</text>
    <rect x="10" y="58" width="200" height="22" rx="3" fill="#FFF3E0"/>
    <text x="110" y="73" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#E65100">k &lt; 0: ka⃗ ↑↓ a⃗ (противополож.)</text>
    <rect x="10" y="84" width="200" height="22" rx="3" fill="#F3E5F5"/>
    <text x="110" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A">k = 0: ka⃗ = 0⃗ (нулевой)</text>
    <text x="112" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">|ka⃗| = |k| · |a⃗|</text>
  </g>
  <!-- Midpoint formula -->
  <g transform="translate(260,208)">
    <rect x="0" y="0" width="220" height="125" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow3)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Деление отрезка</text>
    <line x1="10" y1="24" x2="210" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="110" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">AM : MB = m : n</text>
    <rect x="8" y="48" width="204" height="24" rx="3" fill="#EDE7F6"/>
    <text x="110" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4A2F8A">→OM = (n→OA + m→OB)/(m+n)</text>
    <text x="110" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">Середина (m = n):</text>
    <rect x="8" y="92" width="204" height="24" rx="3" fill="#E8F5E9"/>
    <text x="110" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">→OM = (→OA + →OB) / 2</text>
  </g>
</svg>