<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="a3c" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22d3ee"/>
    </marker>
    <marker id="a3y" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f59e0b"/>
    </marker>
    <marker id="a3r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#ef4444"/>
    </marker>
    <marker id="a3g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22c55e"/>
    </marker>
  </defs>
  <text x="250" y="30" fill="#ffffff" font-size="13" font-family="serif" text-anchor="middle">Умножение вектора на число</text>
  <!-- Original vector a -->
  <line x1="60" y1="100" x2="180" y2="100" stroke="#22d3ee" stroke-width="3" marker-end="url(#a3c)"/>
  <text x="115" y="90" fill="#22d3ee" font-size="12" font-family="serif" text-anchor="middle">a⃗</text>
  <!-- 2a -->
  <line x1="60" y1="150" x2="300" y2="150" stroke="#f59e0b" stroke-width="3" marker-end="url(#a3y)"/>
  <text x="180" y="140" fill="#f59e0b" font-size="12" font-family="serif" text-anchor="middle">2a⃗</text>
  <!-- -a -->
  <line x1="180" y1="200" x2="60" y2="200" stroke="#ef4444" stroke-width="3" marker-end="url(#a3r)"/>
  <text x="115" y="220" fill="#ef4444" font-size="12" font-family="serif" text-anchor="middle">−a⃗</text>
  <!-- 0.5a -->
  <line x1="60" y1="250" x2="120" y2="250" stroke="#22c55e" stroke-width="3" marker-end="url(#a3g)"/>
  <text x="90" y="270" fill="#22c55e" font-size="12" font-family="serif" text-anchor="middle">0,5a⃗</text>
  <!-- -3a -->
  <line x1="380" y1="250" x2="60" y2="250" stroke="#ec4899" stroke-width="2" marker-end="url(#a3g)" stroke-dasharray="6,3" opacity="0.6"/>
  <!-- Properties box -->
  <rect x="280" y="70" width="200" height="120" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="380" y="90" fill="#6366f1" font-size="10" font-family="sans-serif" text-anchor="middle">Свойства:</text>
  <text x="290" y="108" fill="#9ca3af" font-size="9" font-family="sans-serif">(k+m)a⃗ = ka⃗ + ma⃗</text>
  <text x="290" y="125" fill="#9ca3af" font-size="9" font-family="sans-serif">k(a⃗+b⃗) = ka⃗ + kb⃗</text>
  <text x="290" y="142" fill="#9ca3af" font-size="9" font-family="sans-serif">k(ma⃗) = (km)a⃗</text>
  <text x="290" y="159" fill="#9ca3af" font-size="9" font-family="sans-serif">1·a⃗ = a⃗; 0·a⃗ = 0⃗</text>
  <text x="290" y="176" fill="#9ca3af" font-size="9" font-family="sans-serif">(−1)·a⃗ = −a⃗</text>
  <!-- Midpoint formula -->
  <text x="250" y="310" fill="#f59e0b" font-size="11" font-family="serif" text-anchor="middle">OM = (OA + OB) / 2</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Умножение вектора на число</text>
</svg>