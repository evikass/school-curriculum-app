<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <marker id="ah3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="ah3b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1E88E5"/>
    </marker>
    <marker id="ah3r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C62828"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Вычитание векторов</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 3</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1E88E5" stroke-width="1" opacity="0.3"/>

  <!-- Subtraction as adding opposite panel -->
  <rect x="15" y="58" width="230" height="128" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">a - b = a + (-b)</text>
  <!-- Vector a -->
  <line x1="40" y1="110" x2="140" y2="90" stroke="#1565C0" stroke-width="2.5" marker-end="url(#ah3)"/>
  <text x="80" y="90" font-size="11" fill="#1565C0" font-family="Arial" font-style="italic">a</text>
  <!-- Vector -b (opposite of b) -->
  <line x1="145" y1="90" x2="200" y2="130" stroke="#1E88E5" stroke-width="2.5" marker-end="url(#ah3b)"/>
  <text x="182" y="103" font-size="11" fill="#1E88E5" font-family="Arial">-b</text>
  <!-- Result -->
  <line x1="40" y1="110" x2="200" y2="130" stroke="#C62828" stroke-width="2.5" marker-end="url(#ah3r)"/>
  <text x="110" y="133" font-size="10" fill="#C62828" font-family="Arial">a - b</text>
  <!-- Dashed b vector -->
  <line x1="200" y1="130" x2="145" y2="90" stroke="#1E88E5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="178" y="120" font-size="8" fill="#1E88E5" font-family="Arial">b</text>
  <text x="130" y="172" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Вычитание = сложение с противоположным</text>

  <!-- Triangle rule for subtraction panel -->
  <rect x="255" y="58" width="230" height="128" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="370" y="74" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">Правило треугольника</text>
  <!-- Vectors from same point -->
  <line x1="310" y1="155" x2="420" y2="100" stroke="#1565C0" stroke-width="2.5" marker-end="url(#ah3)"/>
  <text x="375" y="112" font-size="11" fill="#1565C0" font-family="Arial" font-style="italic">a</text>
  <line x1="310" y1="155" x2="380" y2="165" stroke="#1E88E5" stroke-width="2.5" marker-end="url(#ah3b)"/>
  <text x="335" y="172" font-size="11" fill="#1E88E5" font-family="Arial" font-style="italic">b</text>
  <!-- Result: from tip of b to tip of a -->
  <line x1="380" y1="165" x2="420" y2="100" stroke="#C62828" stroke-width="2.5" marker-end="url(#ah3r)"/>
  <text x="408" y="140" font-size="10" fill="#C62828" font-family="Arial">a-b</text>
  <circle cx="310" cy="155" r="2.5" fill="#1565C0"/>
  <text x="300" y="165" font-size="8" fill="#333" font-family="Arial">O</text>
  <text x="370" y="182" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">От конца b к концу a</text>

  <!-- Parallelogram connection panel -->
  <rect x="15" y="194" width="235" height="118" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="132" y="210" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">Связь с параллелограммом</text>
  <!-- Parallelogram -->
  <line x1="40" y1="270" x2="150" y2="230" stroke="#1565C0" stroke-width="2" marker-end="url(#ah3)"/>
  <line x1="40" y1="270" x2="100" y2="285" stroke="#1E88E5" stroke-width="2" marker-end="url(#ah3b)"/>
  <line x1="150" y1="230" x2="210" y2="245" stroke="#1E88E5" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="285" x2="210" y2="245" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Diagonals -->
  <line x1="40" y1="270" x2="210" y2="245" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="100" y1="285" x2="150" y2="230" stroke="#C62828" stroke-width="2.5" marker-end="url(#ah3r)"/>
  <text x="115" y="252" font-size="9" fill="#4CAF50" font-family="Arial">a+b</text>
  <text x="130" y="265" font-size="9" fill="#C62828" font-family="Arial">a-b</text>
  <text x="132" y="302" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Диагонали: a+b и a-b</text>

  <!-- Properties panel -->
  <rect x="260" y="194" width="225" height="118" rx="6" fill="white" opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="372" y="210" font-size="10" font-weight="bold" fill="#1565C0" text-anchor="middle" font-family="Arial">Свойства и координаты</text>
  <!-- Property boxes -->
  <rect x="270" y="218" width="205" height="22" rx="4" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.8"/>
  <text x="372" y="233" font-size="9" fill="#1565C0" text-anchor="middle" font-family="Arial">a - b = {x1-x2; y1-y2}</text>
  <rect x="270" y="246" width="205" height="22" rx="4" fill="#BBDEFB" stroke="#1E88E5" stroke-width="0.8"/>
  <text x="372" y="261" font-size="9" fill="#0D47A1" text-anchor="middle" font-family="Arial">a - a = 0 (нулевой вектор)</text>
  <rect x="270" y="274" width="205" height="22" rx="4" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.8"/>
  <text x="372" y="289" font-size="9" fill="#1565C0" text-anchor="middle" font-family="Arial">Пример: {5;3} - {2;1} = {3;2}</text>
  <text x="372" y="305" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">|a-b| = √(9+4) = √13</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#1E88E5" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">a - b = a + (-b) = {x1-x2; y1-y2} — Правило треугольника</text>
</svg>