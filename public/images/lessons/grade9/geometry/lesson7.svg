<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Triangle -->
  <polygon points="250,50 80,280 420,280" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <!-- Sides -->
  <text x="165" y="165" fill="#ec4899" font-size="12" font-family="serif">a</text>
  <text x="345" y="165" fill="#f59e0b" font-size="12" font-family="serif">b</text>
  <text x="245" y="305" fill="#22c55e" font-size="12" font-family="serif">c</text>
  <!-- Angles -->
  <path d="M250,50 A25,25 0 0,1 230,70" fill="none" stroke="#ec4899" stroke-width="1.5"/>
  <text x="225" y="65" fill="#ec4899" font-size="11" font-family="serif">A</text>
  <path d="M80,280 A25,25 0 0,1 110,270" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="265" fill="#f59e0b" font-size="11" font-family="serif">B</text>
  <path d="M420,280 A25,25 0 0,1 395,268" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="398" y="260" fill="#22c55e" font-size="11" font-family="serif">C</text>
  <!-- Circumscribed circle -->
  <circle cx="250" cy="190" r="150" fill="none" stroke="#6366f1" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="250" cy="190" r="3" fill="#6366f1"/>
  <text x="255" y="185" fill="#6366f1" font-size="10" font-family="serif">O</text>
  <!-- R line -->
  <line x1="250" y1="190" x2="250" y2="50" stroke="#6366f1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="260" y="125" fill="#6366f1" font-size="10" font-family="serif">R</text>
  <!-- Formula -->
  <rect x="130" y="310" width="240" height="30" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="250" y="330" fill="#f59e0b" font-size="12" font-family="serif" text-anchor="middle">a/sinA = b/sinB = c/sinC = 2R</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Теорема синусов</text>
</svg>