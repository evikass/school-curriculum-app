<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="a4x" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22d3ee"/>
    </marker>
    <marker id="a4y" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f59e0b"/>
    </marker>
  </defs>
  <!-- Coordinate grid -->
  <line x1="250" y1="330" x2="250" y2="15" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#a4y)"/>
  <line x1="30" y1="200" x2="470" y2="200" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#a4x)"/>
  <text x="460" y="195" fill="#22d3ee" font-size="11" font-family="serif">x</text>
  <text x="255" y="15" fill="#f59e0b" font-size="11" font-family="serif">y</text>
  <!-- Unit vectors -->
  <line x1="250" y1="200" x2="310" y2="200" stroke="#22d3ee" stroke-width="3" marker-end="url(#a4x)"/>
  <text x="285" y="215" fill="#22d3ee" font-size="12" font-family="serif">i⃗</text>
  <line x1="250" y1="200" x2="250" y2="140" stroke="#f59e0b" stroke-width="3" marker-end="url(#a4y)"/>
  <text x="235" y="145" fill="#f59e0b" font-size="12" font-family="serif">j⃗</text>
  <!-- Vector a {3; 4} -->
  <line x1="250" y1="200" x2="370" y2="80" stroke="#ec4899" stroke-width="2.5" marker-end="url(#a4x)"/>
  <text x="320" y="130" fill="#ec4899" font-size="12" font-family="serif">a⃗{3;4}</text>
  <!-- Dashed projections -->
  <line x1="370" y1="80" x2="370" y2="200" stroke="#ec4899" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="370" y1="80" x2="250" y2="80" stroke="#ec4899" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- Components -->
  <text x="310" y="215" fill="#22d3ee" font-size="9" font-family="serif">3</text>
  <text x="240" y="140" fill="#f59e0b" font-size="9" font-family="serif">4</text>
  <!-- Length calculation -->
  <rect x="320" y="250" width="160" height="60" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="400" y="270" fill="#6366f1" font-size="10" font-family="sans-serif" text-anchor="middle">|a⃗| = √(3²+4²)</text>
  <text x="400" y="288" fill="#6366f1" font-size="10" font-family="sans-serif" text-anchor="middle">= √(9+16) = √25 = 5</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Координаты вектора</text>
</svg>