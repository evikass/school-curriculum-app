<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="headerGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow4" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#FAFAFA" rx="8"/>
  <!-- Header bar -->
  <rect width="500" height="52" fill="url(#headerGrad4)" rx="8"/>
  <rect y="40" width="500" height="12" fill="url(#headerGrad4)"/>
  <!-- Decorative elements -->
  <circle cx="470" cy="26" r="15" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="445" cy="18" r="8" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="30" cy="26" r="12" fill="#FFFFFF" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Урок 4: Координаты вектора</text>
  <!-- Coordinate system with vectors -->
  <g transform="translate(20,62)">
    <rect x="0" y="0" width="230" height="155" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow4)"/>
    <text x="115" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Координатная плоскость</text>
    <!-- Axes -->
    <line x1="40" y1="130" x2="210" y2="130" stroke="#757575" stroke-width="1.5"/>
    <line x1="40" y1="130" x2="40" y2="30" stroke="#757575" stroke-width="1.5"/>
    <text x="215" y="134" font-family="Arial,sans-serif" font-size="10" fill="#757575">x</text>
    <text x="36" y="26" font-family="Arial,sans-serif" font-size="10" fill="#757575">y</text>
    <!-- Grid lines -->
    <line x1="40" y1="130" x2="40" y2="30" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="80" y1="130" x2="80" y2="30" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="120" y1="130" x2="120" y2="30" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="160" y1="130" x2="160" y2="30" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="40" y1="100" x2="210" y2="100" stroke="#E0E0E0" stroke-width="0.5"/>
    <line x1="40" y1="70" x2="210" y2="70" stroke="#E0E0E0" stroke-width="0.5"/>
    <!-- Unit vectors -->
    <defs><marker id="arr4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7E57C2"/></marker></defs>
    <defs><marker id="arr4o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF7043"/></marker></defs>
    <line x1="40" y1="130" x2="80" y2="130" stroke="#7E57C2" stroke-width="2.5" marker-end="url(#arr4)"/>
    <text x="55" y="126" font-family="Arial,sans-serif" font-size="10" fill="#7E57C2">i⃗</text>
    <line x1="40" y1="130" x2="40" y2="90" stroke="#FF7043" stroke-width="2.5" marker-end="url(#arr4o)"/>
    <text x="44" y="108" font-family="Arial,sans-serif" font-size="10" fill="#FF7043">j⃗</text>
    <!-- Vector a = 3i + 2j -->
    <line x1="40" y1="130" x2="160" y2="70" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arr4)"/>
    <defs><marker id="arr4g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4CAF50"/></marker></defs>
    <line x1="40" y1="130" x2="160" y2="70" stroke="#4CAF50" stroke-width="2.5" marker-end="url(#arr4g)"/>
    <text x="105" y="88" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">a⃗ {3;2}</text>
    <!-- Dashed projections -->
    <line x1="160" y1="70" x2="160" y2="130" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="160" y1="70" x2="40" y2="70" stroke="#4CAF50" stroke-width="1" stroke-dasharray="3,3"/>
    <circle cx="40" cy="130" r="3" fill="#757575"/>
    <text x="30" y="140" font-family="Arial,sans-serif" font-size="9" fill="#757575">O</text>
  </g>
  <!-- Formulas -->
  <g transform="translate(265,62)">
    <rect x="0" y="0" width="215" height="155" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow4)"/>
    <text x="107" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Формулы координат</text>
    <line x1="10" y1="24" x2="205" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="107" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">a⃗ = xi⃗ + yj⃗ или a⃗ {x; y}</text>
    <rect x="8" y="48" width="200" height="20" rx="3" fill="#EDE7F6"/>
    <text x="108" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4A2F8A">→AB {x₂-x₁; y₂-y₁}</text>
    <rect x="8" y="72" width="200" height="20" rx="3" fill="#E8F5E9"/>
    <text x="108" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32">|a⃗| = √(x² + y²)</text>
    <text x="107" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">Пример: a⃗ {3; 4}</text>
    <text x="107" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#4CAF50">|a⃗| = √(9+16) = √25 = 5</text>
    <text x="107" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#757575">0⃗ {0; 0} — нулевой вектор</text>
  </g>
  <!-- Operations -->
  <g transform="translate(20,228)">
    <rect x="0" y="0" width="460" height="105" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow4)"/>
    <text x="230" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Действия с векторами в координатах</text>
    <line x1="10" y1="24" x2="450" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <!-- Three columns -->
    <text x="80" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7E57C2">Сложение</text>
    <text x="80" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">a⃗ {x₁;y₁}, b⃗ {x₂;y₂}</text>
    <rect x="15" y="64" width="130" height="18" rx="3" fill="#E8F5E9"/>
    <text x="80" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32">a⃗+b⃗ {x₁+x₂; y₁+y₂}</text>
    <text x="230" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#FF7043">Вычитание</text>
    <text x="230" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">a⃗ {x₁;y₁}, b⃗ {x₂;y₂}</text>
    <rect x="165" y="64" width="130" height="18" rx="3" fill="#FFF3E0"/>
    <text x="230" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#E65100">a⃗-b⃗ {x₁-x₂; y₁-y₂}</text>
    <text x="380" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A2F8A">Умножение</text>
    <text x="380" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">a⃗ {x; y}, число k</text>
    <rect x="315" y="64" width="130" height="18" rx="3" fill="#EDE7F6"/>
    <text x="380" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4A2F8A">ka⃗ {kx; ky}</text>
    <!-- Example -->
    <text x="230" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#757575">a⃗{2;3} + b⃗{1;-2} = {3;1}  |  a⃗{2;3} - b⃗{1;-2} = {1;5}  |  2a⃗ = {4;6}</text>
  </g>
</svg>