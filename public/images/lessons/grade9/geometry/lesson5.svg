<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="headerGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#FAFAFA" rx="8"/>
  <!-- Header bar -->
  <rect width="500" height="52" fill="url(#headerGrad5)" rx="8"/>
  <rect y="40" width="500" height="12" fill="url(#headerGrad5)"/>
  <!-- Decorative elements -->
  <circle cx="470" cy="26" r="15" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="445" cy="18" r="8" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="30" cy="26" r="12" fill="#FFFFFF" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF">Урок 5: Уравнение окружности и прямой</text>
  <!-- Circle equation diagram -->
  <g transform="translate(20,62)">
    <rect x="0" y="0" width="225" height="145" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow5)"/>
    <text x="112" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Уравнение окружности</text>
    <!-- Coordinate axes -->
    <line x1="30" y1="110" x2="200" y2="110" stroke="#BDBDBD" stroke-width="1"/>
    <line x1="30" y1="110" x2="30" y2="30" stroke="#BDBDBD" stroke-width="1"/>
    <text x="205" y="114" font-family="Arial,sans-serif" font-size="8" fill="#9E9E9E">x</text>
    <text x="26" y="28" font-family="Arial,sans-serif" font-size="8" fill="#9E9E9E">y</text>
    <!-- Circle -->
    <circle cx="100" cy="75" r="35" fill="none" stroke="#7E57C2" stroke-width="2"/>
    <!-- Center -->
    <circle cx="100" cy="75" r="3" fill="#FF7043"/>
    <text x="104" y="72" font-family="Arial,sans-serif" font-size="9" fill="#FF7043">A(a;b)</text>
    <!-- Radius line -->
    <line x1="100" y1="75" x2="135" y2="75" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="112" y="72" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">R</text>
    <!-- Point on circle -->
    <circle cx="135" cy="75" r="2" fill="#7E57C2"/>
    <text x="138" y="72" font-family="Arial,sans-serif" font-size="8" fill="#7E57C2">M(x;y)</text>
    <!-- Formula -->
    <rect x="10" y="120" width="205" height="20" rx="3" fill="#EDE7F6"/>
    <text x="112" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A2F8A">(x-a)² + (y-b)² = R²</text>
  </g>
  <!-- Line equation -->
  <g transform="translate(260,62)">
    <rect x="0" y="0" width="220" height="145" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow5)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Уравнение прямой</text>
    <!-- Coordinate axes -->
    <line x1="20" y1="120" x2="200" y2="120" stroke="#BDBDBD" stroke-width="1"/>
    <line x1="20" y1="120" x2="20" y2="30" stroke="#BDBDBD" stroke-width="1"/>
    <!-- Line y = kx + b -->
    <line x1="20" y1="95" x2="190" y2="45" stroke="#7E57C2" stroke-width="2"/>
    <!-- y-intercept -->
    <circle cx="20" cy="95" r="3" fill="#FF7043"/>
    <text x="24" y="92" font-family="Arial,sans-serif" font-size="9" fill="#FF7043">b</text>
    <!-- Angle -->
    <path d="M 55 120 L 55 114 A 6 6 0 0 0 49 114" fill="none" stroke="#4CAF50" stroke-width="1"/>
    <text x="55" y="112" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50">α</text>
    <!-- Formulas -->
    <rect x="8" y="52" width="204" height="18" rx="3" fill="#E8F5E9"/>
    <text x="110" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32">y = kx + b (k = tg α)</text>
    <rect x="8" y="74" width="204" height="18" rx="3" fill="#EDE7F6"/>
    <text x="110" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4A2F8A">Ax + By + C = 0</text>
    <text x="110" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#757575">Через 2 точки M₁,M₂:</text>
    <text x="110" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#757575">(y-y₁)/(y₂-y₁)=(x-x₁)/(x₂-x₁)</text>
    <text x="110" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#757575">⊥ вектору n⃗{A;B}:</text>
    <text x="110" y="146" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#757575">A(x-x₀)+B(y-y₀)=0</text>
  </g>
  <!-- Distance formula and examples -->
  <g transform="translate(20,218)">
    <rect x="0" y="0" width="460" height="115" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow5)"/>
    <text x="230" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Расстояние от точки до прямой и примеры</text>
    <line x1="10" y1="24" x2="450" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <!-- Distance formula -->
    <rect x="10" y="30" width="210" height="28" rx="4" fill="#EDE7F6"/>
    <text x="115" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4A2F8A">Точка M(x₀;y₀), прямая Ax+By+C=0</text>
    <text x="115" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A2F8A">d = |Ax₀+By₀+C| / √(A²+B²)</text>
    <!-- Circle at origin -->
    <rect x="10" y="64" width="210" height="22" rx="3" fill="#E8F5E9"/>
    <text x="115" y="79" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32">Центр O(0;0): x² + y² = R²</text>
    <!-- Examples -->
    <text x="340" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#4A2F8A">Примеры</text>
    <text x="340" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#212121">Окр. центр (2;-3), R=5:</text>
    <text x="340" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#7E57C2">(x-2)² + (y+3)² = 25</text>
    <text x="340" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#212121">d от (1;2) до 3x+4y-5=0:</text>
    <text x="340" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4CAF50">|3+8-5|/√(9+16) = 6/5 = 1.2</text>
  </g>
</svg>