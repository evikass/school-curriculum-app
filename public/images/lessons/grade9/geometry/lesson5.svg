<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="a5x" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="30" y1="200" x2="470" y2="200" stroke="#9ca3af" stroke-width="1" marker-end="url(#a5x)"/>
  <line x1="100" y1="330" x2="100" y2="15" stroke="#9ca3af" stroke-width="1" marker-end="url(#a5x)"/>
  <!-- Circle -->
  <circle cx="220" cy="130" r="80" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <circle cx="220" cy="130" r="3" fill="#22d3ee"/>
  <text x="225" y="145" fill="#22d3ee" font-size="10" font-family="serif">(a;b)</text>
  <!-- Radius line -->
  <line x1="220" y1="130" x2="300" y2="130" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="255" y="125" fill="#f59e0b" font-size="10" font-family="serif">R</text>
  <!-- Equation -->
  <text x="220" y="75" fill="#22d3ee" font-size="11" font-family="serif" text-anchor="middle">(x−a)²+(y−b)²=R²</text>
  <!-- Line -->
  <line x1="50" y1="50" x2="450" y2="280" stroke="#ec4899" stroke-width="2"/>
  <text x="430" y="260" fill="#ec4899" font-size="10" font-family="serif">y = kx+b</text>
  <!-- Perpendicular distance -->
  <line x1="220" y1="130" x2="330" y2="220" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="285" y="165" fill="#22c55e" font-size="9" font-family="serif">d</text>
  <!-- Formulas box -->
  <rect x="300" y="40" width="180" height="65" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="390" y="58" fill="#6366f1" font-size="9" font-family="sans-serif" text-anchor="middle">Ax + By + C = 0</text>
  <text x="390" y="75" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">y = kx + b</text>
  <text x="390" y="95" fill="#22c55e" font-size="9" font-family="sans-serif" text-anchor="middle">d = |Ax₀+By₀+C|/√(A²+B²)</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Уравнение окружности и прямой</text>
</svg>