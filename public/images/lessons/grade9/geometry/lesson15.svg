<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1A237E" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Площадь круга</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 15</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3F51B5" stroke-width="1" opacity="0.3"/>

  <!-- Circle area panel -->
  <rect x="15" y="58" width="230" height="180" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="130" y="74" font-size="10" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Площадь круга</text>
  <!-- Circle -->
  <circle cx="130" cy="155" r="55" fill="#C5CAE9" fill-opacity="0.3" stroke="#3F51B5" stroke-width="2.5"/>
  <!-- Center -->
  <circle cx="130" cy="155" r="2" fill="#1A237E"/>
  <text x="120" y="150" font-size="7" fill="#1A237E" font-family="Arial">O</text>
  <!-- Radius -->
  <line x1="130" y1="155" x2="185" y2="155" stroke="#E65100" stroke-width="1.5"/>
  <text x="158" y="150" font-size="9" fill="#E65100" font-family="Arial" font-weight="bold">R</text>
  <!-- Formula -->
  <rect x="30" y="218" width="200" height="22" rx="4" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.8"/>
  <text x="130" y="233" font-size="12" fill="#0D47A1" text-anchor="middle" font-family="Arial" font-weight="bold">S = πR²</text>

  <!-- Visual proof concept panel -->
  <rect x="255" y="58" width="230" height="110" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="370" y="74" font-size="10" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Идея доказательства</text>
  <!-- Sectors -->
  <path d="M 340 120 L 340 90 A 30 30 0 0 1 367 98 Z" fill="#C5CAE9" stroke="#3F51B5" stroke-width="0.8"/>
  <path d="M 367 98 L 367 128 A 30 30 0 0 1 340 120 Z" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.8"/>
  <path d="M 370 130 L 370 100 A 30 30 0 0 1 397 108 Z" fill="#C5CAE9" stroke="#3F51B5" stroke-width="0.8"/>
  <path d="M 397 108 L 397 138 A 30 30 0 0 1 370 130 Z" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.8"/>
  <path d="M 400 120 L 400 90 A 30 30 0 0 1 427 98 Z" fill="#C5CAE9" stroke="#3F51B5" stroke-width="0.8"/>
  <path d="M 427 98 L 427 128 A 30 30 0 0 1 400 120 Z" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.8"/>
  <text x="387" y="155" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">Разрезаем на секторы → прямоугольник</text>
  <text x="387" y="165" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">Ширина = πR, Высота = R</text>
  <!-- Arrow -->
  <text x="387" y="140" font-size="12" fill="#3F51B5" text-anchor="middle" font-family="Arial">→</text>

  <!-- Annulus panel -->
  <rect x="255" y="175" width="230" height="63" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="370" y="191" font-size="10" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Кольцо (аннulus)</text>
  <!-- Annulus -->
  <circle cx="330" cy="215" r="22" fill="none" stroke="#3F51B5" stroke-width="2"/>
  <circle cx="330" cy="215" r="12" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="310" y="208" font-size="6" fill="#E65100" font-family="Arial">R</text>
  <text x="338" y="210" font-size="6" fill="#1E88E5" font-family="Arial">r</text>
  <rect x="360" y="200" width="115" height="28" rx="3" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.5"/>
  <text x="417" y="213" font-size="9" fill="#0D47A1" text-anchor="middle" font-family="Arial" font-weight="bold">S = π(R²-r²)</text>
  <text x="417" y="224" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Разность площадей кругов</text>

  <!-- Comparison panel -->
  <rect x="15" y="245" width="235" height="67" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="132" y="261" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Сравнение площадей</text>
  <!-- Inscribed square -->
  <rect x="35" y="270" width="28" height="28" fill="none" stroke="#4CAF50" stroke-width="1.5" transform="rotate(45,49,284)"/>
  <text x="49" y="305" font-size="6.5" fill="#4CAF50" text-anchor="middle" font-family="Arial">Sвп = 2R²</text>
  <!-- Circle -->
  <circle cx="95" cy="284" r="14" fill="none" stroke="#3F51B5" stroke-width="1.5"/>
  <text x="95" y="305" font-size="6.5" fill="#3F51B5" text-anchor="middle" font-family="Arial">S = πR²</text>
  <!-- Circumscribed square -->
  <rect x="125" y="270" width="28" height="28" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <text x="139" y="305" font-size="6.5" fill="#E65100" text-anchor="middle" font-family="Arial">Sоп = 4R²</text>
  <!-- Inequality -->
  <text x="205" y="282" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">2R² &lt; πR² &lt; 4R²</text>
  <text x="205" y="295" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">2 &lt; π &lt; 4</text>
  <text x="205" y="305" font-size="7" fill="#3F51B5" text-anchor="middle" font-family="Arial">π ≈ 3.14159...</text>

  <!-- Other formulas panel -->
  <rect x="260" y="245" width="225" height="67" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="372" y="261" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Другие формулы</text>
  <text x="372" y="278" font-size="8.5" fill="#555" text-anchor="middle" font-family="Arial">Через диаметр: S = πd²/4</text>
  <text x="372" y="292" font-size="8.5" fill="#555" text-anchor="middle" font-family="Arial">Через длину окр.: S = C²/(4π)</text>
  <text x="372" y="306" font-size="8.5" fill="#555" text-anchor="middle" font-family="Arial">Через C и R: S = CR/2</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#3F51B5" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">S = πR² | Кольцо: S = π(R²-r²) | 2R² &lt; πR² &lt; 4R²</text>
</svg>