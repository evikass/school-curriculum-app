<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Triangle -->
  <polygon points="250,60 80,280 400,280" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <!-- Sides -->
  <text x="155" y="170" fill="#ec4899" font-size="13" font-family="serif">b</text>
  <text x="340" y="170" fill="#f59e0b" font-size="13" font-family="serif">c</text>
  <text x="235" y="300" fill="#22c55e" font-size="13" font-family="serif">a</text>
  <!-- Angle A between b and c -->
  <path d="M250,60 A30,30 0 0,1 225,85" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="215" y="80" fill="#ef4444" font-size="13" font-family="serif">A</text>
  <!-- Projection lines (dashed) -->
  <line x1="80" y1="280" x2="250" y2="280" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- Height from C to AB -->
  <line x1="400" y1="280" x2="250" y2="280" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- Formula box -->
  <rect x="60" y="20" width="220" height="35" rx="6" fill="#1a1a2e" stroke="#ef4444" stroke-width="1"/>
  <text x="170" y="42" fill="#ef4444" font-size="12" font-family="serif" text-anchor="middle">a² = b² + c² − 2bc·cosA</text>
  <!-- Special cases -->
  <rect x="300" y="50" width="180" height="80" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="390" y="68" fill="#6366f1" font-size="10" font-family="sans-serif" text-anchor="middle">Частные случаи:</text>
  <text x="310" y="85" fill="#22c55e" font-size="9" font-family="sans-serif">∠A &lt; 90°: a² &lt; b²+c²</text>
  <text x="310" y="100" fill="#f59e0b" font-size="9" font-family="sans-serif">∠A = 90°: a² = b²+c²</text>
  <text x="310" y="115" fill="#ef4444" font-size="9" font-family="sans-serif">∠A &gt; 90°: a² &gt; b²+c²</text>
  <!-- Pythagoras reference -->
  <text x="250" y="330" fill="#f59e0b" font-size="11" font-family="serif" text-anchor="middle">Обобщение теоремы Пифагора</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Теорема косинусов</text>
</svg>