<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="100%" stop-color="#FFCCBC"/>
    </linearGradient>
    <marker id="ah8" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#BF360C"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#BF360C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="Arial">Уравнение прямой</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 8</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#FF5722" stroke-width="1" opacity="0.3"/>

  <!-- Line on coordinate plane panel -->
  <rect x="15" y="58" width="265" height="175" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="147" y="74" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="Arial">Прямая на координатной плоскости</text>
  <!-- Grid -->
  <line x1="55" y1="82" x2="55" y2="225" stroke="#eee" stroke-width="0.5"/>
  <line x1="95" y1="82" x2="95" y2="225" stroke="#eee" stroke-width="0.5"/>
  <line x1="135" y1="82" x2="135" y2="225" stroke="#eee" stroke-width="0.5"/>
  <line x1="175" y1="82" x2="175" y2="225" stroke="#eee" stroke-width="0.5"/>
  <line x1="215" y1="82" x2="215" y2="225" stroke="#eee" stroke-width="0.5"/>
  <line x1="35" y1="100" x2="260" y2="100" stroke="#eee" stroke-width="0.5"/>
  <line x1="35" y1="140" x2="260" y2="140" stroke="#eee" stroke-width="0.5"/>
  <line x1="35" y1="180" x2="260" y2="180" stroke="#eee" stroke-width="0.5"/>
  <!-- Axes -->
  <line x1="55" y1="180" x2="265" y2="180" stroke="#BF360C" stroke-width="1.2" marker-end="url(#ah8)"/>
  <line x1="55" y1="225" x2="55" y2="82" stroke="#BF360C" stroke-width="1.2" marker-end="url(#ah8)"/>
  <text x="268" y="183" font-size="8" fill="#BF360C" font-family="Arial">x</text>
  <text x="52" y="79" font-size="8" fill="#BF360C" font-family="Arial">y</text>
  <!-- Line y = kx + b (slope=0.5, b=1) -->
  <line x1="35" y1="155" x2="260" y2="100" stroke="#FF5722" stroke-width="2.5"/>
  <!-- y-intercept -->
  <circle cx="55" cy="145" r="3" fill="#FF5722"/>
  <text x="60" y="143" font-size="7.5" fill="#FF5722" font-family="Arial">b</text>
  <!-- Slope triangle -->
  <line x1="95" y1="135" x2="135" y2="135" stroke="#BF360C" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="135" y1="135" x2="135" y2="125" stroke="#BF360C" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="115" y="148" font-size="7" fill="#BF360C" font-family="Arial">1</text>
  <text x="142" y="132" font-size="7" fill="#BF360C" font-family="Arial">0.5</text>
  <!-- Angle alpha -->
  <path d="M 95 135 A 15 15 0 0 0 103 122" fill="none" stroke="#E65100" stroke-width="1"/>
  <text x="100" y="118" font-size="7" fill="#E65100" font-family="Arial">a</text>
  <!-- Second line (parallel) -->
  <line x1="35" y1="185" x2="260" y2="130" stroke="#9C27B0" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="220" y="128" font-size="7" fill="#9C27B0" font-family="Arial">параллельная</text>

  <!-- Forms and conditions panel -->
  <rect x="290" y="58" width="195" height="175" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="387" y="74" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="Arial">Формы уравнения</text>
  <!-- General form -->
  <rect x="300" y="82" width="175" height="25" rx="4" fill="#FBE9E7" stroke="#FF5722" stroke-width="0.8"/>
  <text x="387" y="92" font-size="8" fill="#888" text-anchor="middle" font-family="Arial">Общий вид:</text>
  <text x="387" y="103" font-size="9.5" fill="#BF360C" text-anchor="middle" font-family="Arial" font-weight="bold">ax + by + c = 0</text>
  <!-- Slope form -->
  <rect x="300" y="112" width="175" height="25" rx="4" fill="#FFCCBC" stroke="#FF5722" stroke-width="0.8"/>
  <text x="387" y="122" font-size="8" fill="#888" text-anchor="middle" font-family="Arial">Угловой коэффициент:</text>
  <text x="387" y="133" font-size="9.5" fill="#BF360C" text-anchor="middle" font-family="Arial" font-weight="bold">y = kx + b</text>
  <!-- Slope definition -->
  <rect x="300" y="142" width="175" height="25" rx="4" fill="#FBE9E7" stroke="#FF5722" stroke-width="0.8"/>
  <text x="387" y="152" font-size="8" fill="#888" text-anchor="middle" font-family="Arial">Угол наклона:</text>
  <text x="387" y="163" font-size="9.5" fill="#E65100" text-anchor="middle" font-family="Arial" font-weight="bold">k = tg(alpha)</text>
  <!-- Parallel condition -->
  <rect x="300" y="172" width="175" height="22" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="387" y="187" font-size="8.5" fill="#2E7D32" text-anchor="middle" font-family="Arial">Параллельность: k1 = k2</text>
  <!-- Perpendicular condition -->
  <rect x="300" y="198" width="175" height="22" rx="4" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.8"/>
  <text x="387" y="213" font-size="8.5" fill="#1565C0" text-anchor="middle" font-family="Arial">Перпенд.: k1 * k2 = -1</text>

  <!-- Angle between lines panel -->
  <rect x="15" y="240" width="150" height="72" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="90" y="256" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="Arial">Угол между прямыми</text>
  <!-- Two intersecting lines -->
  <line x1="30" y1="300" x2="130" y2="260" stroke="#FF5722" stroke-width="1.5"/>
  <line x1="35" y1="270" x2="145" y2="290" stroke="#3F51B5" stroke-width="1.5"/>
  <!-- Angle arc -->
  <path d="M 85 277 A 8 8 0 0 0 80 284" fill="none" stroke="#E65100" stroke-width="1.2"/>
  <text x="88" y="285" font-size="7" fill="#E65100" font-family="Arial">phi</text>
  <text x="90" y="306" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">tg(phi) = |k1-k2|/(1+k1k2)</text>

  <!-- Examples panel -->
  <rect x="175" y="240" width="310" height="72" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="330" y="256" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="Arial">Примеры</text>
  <text x="190" y="272" font-size="8" fill="#555" font-family="Arial">2x + 3y - 6 = 0</text>
  <text x="190" y="284" font-size="8" fill="#555" font-family="Arial">y = -2/3 x + 2, k = -2/3</text>
  <line x1="310" y1="262" x2="310" y2="300" stroke="#FF5722" stroke-width="0.5" opacity="0.3"/>
  <text x="330" y="272" font-size="8" fill="#555" font-family="Arial">y = 2x + 1, k = 2</text>
  <text x="330" y="284" font-size="8" fill="#555" font-family="Arial">y = 2x - 3 || параллельны (k1=k2)</text>
  <text x="190" y="300" font-size="8" fill="#4CAF50" font-family="Arial">y = 2x+1 и y = -0.5x+3 — перпендикулярны (2*(-0.5)=-1)</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#FF5722" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">ax+by+c=0 | y=kx+b, k=tg(alpha) || k1=k2; _|_ k1*k2=-1</text>
</svg>