<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Original triangle -->
  <polygon points="80,200 80,80 200,200" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-width="2"/>
  <!-- Central symmetry: reflected through point (200,180) -->
  <polygon points="320,160 320,280 200,160" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
  <!-- Center of symmetry -->
  <circle cx="200" cy="180" r="4" fill="#ef4444"/>
  <text x="205" y="178" fill="#ef4444" font-size="10" font-family="serif">O</text>
  <!-- Dashed connecting lines -->
  <line x1="80" y1="200" x2="320" y2="160" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="80" y1="80" x2="320" y2="280" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="200" y1="200" x2="200" y2="160" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- Axial symmetry -->
  <line x1="400" y1="30" x2="400" y2="330" stroke="#ec4899" stroke-width="2"/>
  <!-- Original shape -->
  <polygon points="340,100 340,200 390,200" fill="#6366f1" fill-opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Reflected shape -->
  <polygon points="460,100 460,200 410,200" fill="#22c55e" fill-opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
  <text x="410" y="25" fill="#ec4899" font-size="10" font-family="serif">ось l</text>
  <!-- Labels -->
  <text x="100" y="75" fill="#22d3ee" font-size="10" font-family="serif">F</text>
  <text x="310" y="290" fill="#f59e0b" font-size="10" font-family="serif">F'</text>
  <!-- Title -->
  <text x="170" y="310" fill="#9ca3af" font-size="10" font-family="sans-serif">Центральная</text>
  <text x="170" y="325" fill="#9ca3af" font-size="10" font-family="sans-serif">симметрия</text>
  <text x="400" y="320" fill="#9ca3af" font-size="10" font-family="sans-serif" text-anchor="middle">Осевая</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Виды движений</text>
</svg>