<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <marker id="ah20" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7B1FA2"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle" font-family="Arial">Поворот</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 20</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#9C27B0" stroke-width="1" opacity="0.3"/>

  <!-- Rotation concept panel -->
  <rect x="15" y="58" width="235" height="175" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="132" y="74" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="Arial">Поворот вокруг центра O</text>
  <!-- Center O -->
  <circle cx="132" cy="150" r="3" fill="#E65100"/>
  <text x="118" y="148" font-size="8" fill="#E65100" font-family="Arial" font-weight="bold">O</text>
  <!-- Original point -->
  <circle cx="192" cy="150" r="3" fill="#7B1FA2"/>
  <text x="198" y="147" font-size="7" fill="#7B1FA2" font-family="Arial">M</text>
  <!-- Rotated point -->
  <circle cx="167" cy="107" r="3" fill="#C62828"/>
  <text x="173" y="103" font-size="7" fill="#C62828" font-family="Arial">M'</text>
  <!-- Radius lines -->
  <line x1="132" y1="150" x2="192" y2="150" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="132" y1="150" x2="167" y2="107" stroke="#C62828" stroke-width="1.5"/>
  <!-- Angle arc (about 45 degrees counterclockwise) -->
  <path d="M 160 150 A 28 28 0 0 0 152 128" fill="none" stroke="#E91E63" stroke-width="2"/>
  <text x="162" y="135" font-size="9" fill="#E91E63" font-family="Arial" font-weight="bold">a</text>
  <!-- Direction arrow on arc -->
  <path d="M 152 128 L 155 131" stroke="#E91E63" stroke-width="1.5"/>
  <!-- Full circle outline -->
  <circle cx="132" cy="150" r="60" fill="none" stroke="#9C27B0" stroke-width="0.5" stroke-dasharray="4,4"/>
  <!-- Labels -->
  <text x="132" y="222" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">OM = OM' = R</text>
  <text x="132" y="232" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Против часовой: a > 0</text>
  <text x="132" y="228" font-size="7.5" fill="#9C27B0" text-anchor="middle" font-family="Arial">По часовой: a &lt; 0</text>

  <!-- 90/180/270 examples panel -->
  <rect x="260" y="58" width="225" height="175" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="372" y="74" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="Arial">Стандартные углы</text>
  <!-- 90° rotation -->
  <circle cx="320" cy="120" r="2" fill="#E65100"/>
  <text x="310" y="118" font-size="6" fill="#E65100" font-family="Arial">O</text>
  <circle cx="350" cy="120" r="2.5" fill="#7B1FA2"/>
  <circle cx="320" cy="90" r="2.5" fill="#C62828"/>
  <line x1="320" y1="120" x2="350" y2="120" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="320" y1="120" x2="320" y2="90" stroke="#C62828" stroke-width="1.5"/>
  <path d="M 332 120 A 12 12 0 0 0 320 108" fill="none" stroke="#E91E63" stroke-width="1.2"/>
  <text x="340" y="108" font-size="7" fill="#E91E63" font-family="Arial">90°</text>
  <text x="320" y="137" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">(x,y)→(-y,x)</text>

  <!-- 180° rotation -->
  <circle cx="320" cy="170" r="2" fill="#E65100"/>
  <text x="310" y="168" font-size="6" fill="#E65100" font-family="Arial">O</text>
  <circle cx="350" cy="170" r="2.5" fill="#7B1FA2"/>
  <circle cx="290" cy="170" r="2.5" fill="#C62828"/>
  <line x1="320" y1="170" x2="350" y2="170" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="320" y1="170" x2="290" y2="170" stroke="#C62828" stroke-width="1.5"/>
  <path d="M 332 170 A 12 12 0 0 0 308 170" fill="none" stroke="#E91E63" stroke-width="1.2"/>
  <text x="320" y="165" font-size="7" fill="#E91E63" text-anchor="middle" font-family="Arial">180°</text>
  <text x="320" y="187" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">(x,y)→(-x,-y)</text>

  <!-- 270° rotation -->
  <circle cx="320" cy="220" r="2" fill="#E65100"/>
  <text x="310" y="218" font-size="6" fill="#E65100" font-family="Arial">O</text>
  <circle cx="350" cy="220" r="2.5" fill="#7B1FA2"/>
  <circle cx="320" cy="250" r="2.5" fill="#C62828"/>
  <line x1="320" y1="220" x2="350" y2="220" stroke="#7B1FA2" stroke-width="1.5"/>
  <line x1="320" y1="220" x2="320" y2="250" stroke="#C62828" stroke-width="1.5"/>
  <path d="M 332 220 A 12 12 0 0 0 320 232" fill="none" stroke="#E91E63" stroke-width="1.2"/>
  <text x="340" y="238" font-size="7" fill="#E91E63" font-family="Arial">270°</text>
  <text x="320" y="260" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">(x,y)→(y,-x)</text>

  <!-- Rotation of figure -->
  <rect x="395" y="85" width="80" height="85" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="435" y="97" font-size="7.5" fill="#7B1FA2" text-anchor="middle" font-family="Arial">Фигура</text>
  <!-- Original L-shape -->
  <polyline points="415,110 415,140 435,140 435,120 425,120 425,110" fill="#E1BEE7" fill-opacity="0.5" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Rotated L-shape -->
  <polyline points="455,110 445,110 445,130 455,130 455,120 460,120 460,110" fill="#FFCDD2" fill-opacity="0.5" stroke="#C62828" stroke-width="1.5"/>
  <text x="435" y="150" font-size="6.5" fill="#7B1FA2" text-anchor="middle" font-family="Arial">F → F'</text>
  <text x="435" y="162" font-size="6.5" fill="#C62828" text-anchor="middle" font-family="Arial">Поворот 90°</text>

  <!-- Properties panel -->
  <rect x="15" y="240" width="240" height="72" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="135" y="256" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="Arial">Свойства поворота</text>
  <rect x="25" y="262" width="220" height="18" rx="3" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.5"/>
  <text x="135" y="275" font-size="8" fill="#4A148C" text-anchor="middle" font-family="Arial">Является движением (сохраняет расст.)</text>
  <rect x="25" y="283" width="220" height="18" rx="3" fill="#E1BEE7" stroke="#9C27B0" stroke-width="0.5"/>
  <text x="135" y="296" font-size="8" fill="#4A148C" text-anchor="middle" font-family="Arial">OM = OM', угол MOM' = a</text>
  <text x="135" y="310" font-size="7.5" fill="#555" text-anchor="middle" font-family="Arial">Единственная неподвижная точка: O</text>

  <!-- Composition panel -->
  <rect x="265" y="240" width="220" height="72" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="375" y="256" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle" font-family="Arial">Композиция с другими движениями</text>
  <text x="375" y="274" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">R_O(a) ° R_O(b) = R_O(a+b)</text>
  <text x="375" y="288" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Поворот на 180° = центр. симметрия</text>
  <text x="375" y="302" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Поворот + перенос = поворот</text>
  <text x="375" y="310" font-size="7" fill="#9C27B0" text-anchor="middle" font-family="Arial">(с другим центром)</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#9C27B0" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">R_O(a): M → M' | OM=OM' | угол MOM'=a | Движение</text>
</svg>