<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="a12v" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#f59e0b"/>
    </marker>
  </defs>
  <!-- Parallel translation -->
  <!-- Original triangle -->
  <polygon points="60,80 60,160 130,160" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="2"/>
  <!-- Translated triangle -->
  <polygon points="180,140 180,220 250,220" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
  <!-- Translation vector -->
  <line x1="60" y1="80" x2="180" y2="140" stroke="#f59e0b" stroke-width="2" marker-end="url(#a12v)"/>
  <text x="110" y="100" fill="#f59e0b" font-size="11" font-family="serif">a⃗{3;2}</text>
  <text x="60" y="75" fill="#22d3ee" font-size="10" font-family="serif">F</text>
  <text x="250" y="235" fill="#f59e0b" font-size="10" font-family="serif">F'</text>
  <!-- Rotation -->
  <!-- Original point -->
  <circle cx="370" cy="120" r="4" fill="#22d3ee"/>
  <text x="355" y="115" fill="#22d3ee" font-size="10" font-family="serif">M</text>
  <!-- Rotated point (90°) -->
  <circle cx="430" cy="180" r="4" fill="#ec4899"/>
  <text x="435" y="180" fill="#ec4899" font-size="10" font-family="serif">M'</text>
  <!-- Center of rotation -->
  <circle cx="370" cy="180" r="3" fill="#f59e0b"/>
  <text x="355" y="190" fill="#f59e0b" font-size="10" font-family="serif">O</text>
  <!-- Arc showing rotation -->
  <path d="M370,150 A30,30 0 0,1 400,180" fill="none" stroke="#ec4899" stroke-width="2"/>
  <text x="395" y="150" fill="#ec4899" font-size="10" font-family="serif">90°</text>
  <!-- Radius lines -->
  <line x1="370" y1="180" x2="370" y2="120" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="3,3"/>
  <line x1="370" y1="180" x2="430" y2="180" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- Section labels -->
  <text x="150" y="260" fill="#22d3ee" font-size="11" font-family="serif" text-anchor="middle">Параллельный перенос</text>
  <text x="400" y="260" fill="#ec4899" font-size="11" font-family="serif" text-anchor="middle">Поворот</text>
  <!-- Formulas -->
  <text x="150" y="280" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">(x;y) → (x+m; y+n)</text>
  <text x="400" y="280" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">OM = OM', ∠MOM' = α</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Параллельный перенос и поворот</text>
</svg>