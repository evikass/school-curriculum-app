<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Full circle (faded) -->
  <circle cx="250" cy="160" r="110" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-width="1.5"/>
  <!-- Sector (60°) -->
  <path d="M250,160 L250,50 A110,110 0 0,1 345,215 Z" fill="#22d3ee" fill-opacity="0.2" stroke="#22d3ee" stroke-width="2"/>
  <!-- Segment -->
  <path d="M250,160 L145,215 A110,110 0 0,1 250,50 Z" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Center -->
  <circle cx="250" cy="160" r="3" fill="#ffffff"/>
  <!-- Radius lines -->
  <line x1="250" y1="160" x2="250" y2="50" stroke="#22d3ee" stroke-width="1.5"/>
  <line x1="250" y1="160" x2="345" y2="215" stroke="#22d3ee" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="255" y="175" fill="#ffffff" font-size="10" font-family="serif">O</text>
  <text x="255" y="100" fill="#22d3ee" font-size="10" font-family="serif">R</text>
  <!-- Sector label -->
  <text x="310" y="140" fill="#22d3ee" font-size="10" font-family="serif">Сектор</text>
  <!-- Segment label -->
  <text x="175" y="110" fill="#f59e0b" font-size="10" font-family="serif">Сегмент</text>
  <!-- Formulas -->
  <rect x="30" y="260" width="220" height="70" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="140" y="280" fill="#6366f1" font-size="11" font-family="serif" text-anchor="middle">S = πR²</text>
  <text x="140" y="298" fill="#22d3ee" font-size="11" font-family="serif" text-anchor="middle">Sсектор = πR²n / 360</text>
  <text x="140" y="318" fill="#f59e0b" font-size="11" font-family="serif" text-anchor="middle">Sполукруг = πR² / 2</text>
  <!-- Area comparison -->
  <rect x="290" y="260" width="180" height="40" rx="6" fill="#1a1a2e" stroke="#ec4899" stroke-width="1"/>
  <text x="380" y="280" fill="#ec4899" font-size="9" font-family="sans-serif" text-anchor="middle">Круг ≈ 78,5% описанного</text>
  <text x="380" y="295" fill="#ec4899" font-size="9" font-family="sans-serif" text-anchor="middle">квадрата</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Площадь круга и его частей</text>
</svg>