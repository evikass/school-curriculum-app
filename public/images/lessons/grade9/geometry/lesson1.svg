<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <marker id="ah1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00695C"/>
    </marker>
    <marker id="ah1r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="Arial">Понятие вектора</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 9 класс — Урок 1</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00897B" stroke-width="1" opacity="0.3"/>

  <!-- Vector AB panel -->
  <rect x="15" y="58" width="220" height="105" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="125" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="Arial">Вектор AB</text>
  <!-- Vector arrow -->
  <circle cx="45" cy="115" r="3" fill="#00695C"/>
  <text x="38" y="130" font-size="9" fill="#00695C" font-family="Arial">A</text>
  <line x1="48" y1="115" x2="165" y2="115" stroke="#00695C" stroke-width="2.5" marker-end="url(#ah1)"/>
  <circle cx="175" cy="115" r="3" fill="#00897B"/>
  <text x="175" y="130" font-size="9" fill="#00897B" font-family="Arial">B</text>
  <text x="110" y="108" font-size="9" fill="#004D40" font-family="Arial">|AB| — длина (модуль)</text>
  <text x="110" y="150" font-size="8" fill="#555" font-family="Arial">Направление: A → B</text>

  <!-- Types panel -->
  <rect x="245" y="58" width="240" height="105" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="365" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="Arial">Типы векторов</text>
  <!-- Equal vectors -->
  <line x1="260" y1="92" x2="310" y2="92" stroke="#00695C" stroke-width="2" marker-end="url(#ah1)"/>
  <line x1="330" y1="92" x2="380" y2="92" stroke="#00695C" stroke-width="2" marker-end="url(#ah1)"/>
  <text x="395" y="95" font-size="8" fill="#004D40" font-family="Arial">Равные</text>
  <!-- Opposite vectors -->
  <line x1="260" y1="112" x2="310" y2="112" stroke="#00695C" stroke-width="2" marker-end="url(#ah1)"/>
  <line x1="380" y1="112" x2="330" y2="112" stroke="#D32F2F" stroke-width="2" marker-end="url(#ah1r)"/>
  <text x="395" y="115" font-size="8" fill="#004D40" font-family="Arial">Противоположные</text>
  <!-- Zero vector -->
  <circle cx="275" cy="132" r="4" fill="none" stroke="#00695C" stroke-width="1.5"/>
  <circle cx="275" cy="132" r="1" fill="#00695C"/>
  <text x="290" y="135" font-size="8" fill="#555" font-family="Arial">Нулевой вектор: |0| = 0</text>
  <!-- Collinear -->
  <line x1="260" y1="152" x2="300" y2="152" stroke="#00897B" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="310" y1="152" x2="350" y2="152" stroke="#00897B" stroke-width="1.5" marker-end="url(#ah1)"/>
  <text x="365" y="155" font-size="8" fill="#004D40" font-family="Arial">Коллинеарные</text>

  <!-- Coordinate grid panel -->
  <rect x="15" y="170" width="235" height="140" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="132" y="186" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="Arial">Координаты вектора</text>
  <!-- Grid lines -->
  <line x1="45" y1="195" x2="45" y2="295" stroke="#ccc" stroke-width="0.5"/>
  <line x1="75" y1="195" x2="75" y2="295" stroke="#ccc" stroke-width="0.5"/>
  <line x1="105" y1="195" x2="105" y2="295" stroke="#ccc" stroke-width="0.5"/>
  <line x1="135" y1="195" x2="135" y2="295" stroke="#ccc" stroke-width="0.5"/>
  <line x1="165" y1="195" x2="165" y2="295" stroke="#ccc" stroke-width="0.5"/>
  <line x1="195" y1="195" x2="195" y2="295" stroke="#ccc" stroke-width="0.5"/>
  <line x1="25" y1="215" x2="225" y2="215" stroke="#ccc" stroke-width="0.5"/>
  <line x1="25" y1="245" x2="225" y2="245" stroke="#ccc" stroke-width="0.5"/>
  <line x1="25" y1="275" x2="225" y2="275" stroke="#ccc" stroke-width="0.5"/>
  <!-- Axes -->
  <line x1="45" y1="295" x2="225" y2="295" stroke="#00695C" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="45" y1="295" x2="45" y2="195" stroke="#00695C" stroke-width="1.5" marker-end="url(#ah1)"/>
  <text x="228" y="298" font-size="8" fill="#00695C" font-family="Arial">x</text>
  <text x="42" y="192" font-size="8" fill="#00695C" font-family="Arial">y</text>
  <!-- Vector on grid -->
  <line x1="45" y1="295" x2="165" y2="215" stroke="#00897B" stroke-width="2.5" marker-end="url(#ah1)"/>
  <!-- Dashed components -->
  <line x1="45" y1="295" x2="165" y2="295" stroke="#00695C" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="165" y1="295" x2="165" y2="215" stroke="#00695C" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="100" y="290" font-size="8" fill="#D32F2F" font-family="Arial">4</text>
  <text x="170" y="260" font-size="8" fill="#D32F2F" font-family="Arial">3</text>
  <!-- Formula -->
  <rect x="130" y="260" width="110" height="40" rx="4" fill="#E0F2F1" stroke="#00897B" stroke-width="0.8"/>
  <text x="185" y="275" font-size="9" fill="#00695C" text-anchor="middle" font-family="Arial">AB = {4; 3}</text>
  <text x="185" y="290" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">|AB| = √(16+9) = 5</text>

  <!-- Properties panel -->
  <rect x="260" y="170" width="225" height="140" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="372" y="186" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle" font-family="Arial">Свойства векторов</text>
  <!-- Property items with icons -->
  <rect x="270" y="195" width="10" height="10" rx="2" fill="#00897B" opacity="0.5"/>
  <text x="285" y="204" font-size="8.5" fill="#333" font-family="Arial">Равные векторы: одинаковое направление</text>
  <text x="285" y="214" font-size="8" fill="#555" font-family="Arial">и равные длины</text>
  <rect x="270" y="222" width="10" height="10" rx="2" fill="#00897B" opacity="0.5"/>
  <text x="285" y="231" font-size="8.5" fill="#333" font-family="Arial">Противоположные: AB = -BA</text>
  <rect x="270" y="247" width="10" height="10" rx="2" fill="#00897B" opacity="0.5"/>
  <text x="285" y="256" font-size="8.5" fill="#333" font-family="Arial">Коллинеарные: a = k · b</text>
  <rect x="270" y="272" width="10" height="10" rx="2" fill="#00897B" opacity="0.5"/>
  <text x="285" y="281" font-size="8.5" fill="#333" font-family="Arial">Компланарные лежат в одной</text>
  <text x="285" y="291" font-size="8" fill="#555" font-family="Arial">плоскости или параллельны ей</text>

  <!-- Bottom bar -->
  <rect x="15" y="318" width="470" height="26" rx="4" fill="#00897B" opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Вектор — направленный отрезок: AB = {x; y}, |AB| = √(x² + y²)</text>
</svg>