<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="headerGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B39DDB;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow1" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#FAFAFA" rx="8"/>
  <!-- Header bar -->
  <rect width="500" height="52" fill="url(#headerGrad1)" rx="8"/>
  <rect y="40" width="500" height="12" fill="url(#headerGrad1)"/>
  <!-- Decorative elements -->
  <circle cx="470" cy="26" r="15" fill="#FFFFFF" opacity="0.15"/>
  <circle cx="445" cy="18" r="8" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="30" cy="26" r="12" fill="#FFFFFF" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Урок 1: Понятие вектора</text>
  <!-- Vector AB diagram -->
  <g transform="translate(30,70)">
    <rect x="0" y="0" width="200" height="130" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow1)"/>
    <text x="100" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Вектор — направленный отрезок</text>
    <!-- Vector AB -->
    <line x1="30" y1="75" x2="160" y2="40" stroke="#7E57C2" stroke-width="2.5" marker-end="url(#arrow1)"/>
    <defs><marker id="arrow1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7E57C2"/></marker></defs>
    <circle cx="30" cy="75" r="4" fill="#7E57C2"/>
    <circle cx="160" cy="40" r="4" fill="#7E57C2"/>
    <text x="20" y="90" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#7E57C2">A</text>
    <text x="164" y="38" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#7E57C2">B</text>
    <text x="80" y="48" font-family="Arial,sans-serif" font-size="11" fill="#4A2F8A">→AB = a⃗</text>
    <text x="55" y="105" font-family="Arial,sans-serif" font-size="10" fill="#757575">|→AB| — длина (модуль) вектора</text>
  </g>
  <!-- Definitions panel -->
  <g transform="translate(250,70)">
    <rect x="0" y="0" width="220" height="130" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow1)"/>
    <text x="110" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Основные определения</text>
    <line x1="10" y1="24" x2="210" y2="24" stroke="#D1C4E9" stroke-width="1"/>
    <text x="12" y="40" font-family="Arial,sans-serif" font-size="10" fill="#212121">• Нулевой вектор 0⃗: |0⃗| = 0</text>
    <text x="12" y="56" font-family="Arial,sans-serif" font-size="10" fill="#212121">• Начало = Конец</text>
    <text x="12" y="74" font-family="Arial,sans-serif" font-size="10" fill="#212121">• Коллинеарные: на одной</text>
    <text x="16" y="88" font-family="Arial,sans-serif" font-size="10" fill="#212121">или параллельных прямых</text>
    <text x="12" y="106" font-family="Arial,sans-serif" font-size="10" fill="#212121">• Сонаправленные: a⃗ ↑↑ b⃗</text>
    <text x="12" y="122" font-family="Arial,sans-serif" font-size="10" fill="#212121">• Противоположные: a⃗ ↑↓ b⃗</text>
  </g>
  <!-- Collinear vectors diagram -->
  <g transform="translate(30,210)">
    <rect x="0" y="0" width="210" height="120" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow1)"/>
    <text x="105" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Коллинеарные векторы</text>
    <!-- Same direction vectors -->
    <line x1="20" y1="45" x2="80" y2="45" stroke="#7E57C2" stroke-width="2" marker-end="url(#arrow1)"/>
    <text x="90" y="49" font-family="Arial,sans-serif" font-size="10" fill="#7E57C2">a⃗</text>
    <line x1="20" y1="65" x2="80" y2="65" stroke="#B39DDB" stroke-width="2" marker-end="url(#arrow1)"/>
    <text x="90" y="69" font-family="Arial,sans-serif" font-size="10" fill="#B39DDB">b⃗</text>
    <text x="120" y="58" font-family="Arial,sans-serif" font-size="10" fill="#4A2F8A">↑↑ сонапр.</text>
    <!-- Opposite direction -->
    <line x1="80" y1="90" x2="20" y2="90" stroke="#FF7043" stroke-width="2" marker-end="url(#arrow1o)"/>
    <defs><marker id="arrow1o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF7043"/></marker></defs>
    <text x="90" y="94" font-family="Arial,sans-serif" font-size="10" fill="#7E57C2">a⃗</text>
    <line x1="80" y1="108" x2="140" y2="108" stroke="#B39DDB" stroke-width="2" marker-end="url(#arrow1)"/>
    <text x="150" y="112" font-family="Arial,sans-serif" font-size="10" fill="#B39DDB">b⃗</text>
    <text x="120" y="102" font-family="Arial,sans-serif" font-size="9" fill="#FF7043">↑↓ против.</text>
  </g>
  <!-- Equal vectors -->
  <g transform="translate(260,210)">
    <rect x="0" y="0" width="210" height="120" rx="6" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1" filter="url(#shadow1)"/>
    <text x="105" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4A2F8A">Равные векторы</text>
    <text x="105" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#212121">a⃗ = b⃗ ⇔ a⃗ ↑↑ b⃗ и |a⃗| = |b⃗|</text>
    <!-- Two equal vectors -->
    <line x1="20" y1="55" x2="90" y2="55" stroke="#7E57C2" stroke-width="2.5" marker-end="url(#arrow1)"/>
    <text x="50" y="50" font-family="Arial,sans-serif" font-size="10" fill="#7E57C2">a⃗</text>
    <line x1="100" y1="75" x2="170" y2="75" stroke="#7E57C2" stroke-width="2.5" marker-end="url(#arrow1)"/>
    <text x="130" y="70" font-family="Arial,sans-serif" font-size="10" fill="#7E57C2">b⃗</text>
    <!-- Opposite vector -->
    <text x="105" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#FF7043">Противоположный: -a⃗</text>
    <line x1="90" y1="112" x2="20" y2="112" stroke="#FF7043" stroke-width="2" marker-end="url(#arrow1o)"/>
    <text x="50" y="108" font-family="Arial,sans-serif" font-size="10" fill="#FF7043">-a⃗</text>
  </g>
</svg>