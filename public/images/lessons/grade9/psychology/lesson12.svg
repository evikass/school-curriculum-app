<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="pbg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#pbg12)"/>
  <!-- Three people communicating -->
  <!-- Person 1 (left) -->
  <circle cx="130" cy="80" r="18" fill="#4fc3f7" opacity="0.3" stroke="#4fc3f7" stroke-width="2"/>
  <circle cx="124" cy="76" r="2.5" fill="#4fc3f7"/><circle cx="136" cy="76" r="2.5" fill="#4fc3f7"/>
  <path d="M122,86 Q130,93 138,86" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <!-- Person 2 (center) -->
  <circle cx="250" cy="70" r="20" fill="#e040fb" opacity="0.3" stroke="#e040fb" stroke-width="2"/>
  <circle cx="243" cy="66" r="3" fill="#e040fb"/><circle cx="257" cy="66" r="3" fill="#e040fb"/>
  <path d="M240,78 Q250,86 260,78" fill="none" stroke="#e040fb" stroke-width="1.5"/>
  <!-- Person 3 (right) -->
  <circle cx="370" cy="80" r="18" fill="#4caf50" opacity="0.3" stroke="#4caf50" stroke-width="2"/>
  <circle cx="364" cy="76" r="2.5" fill="#4caf50"/><circle cx="376" cy="76" r="2.5" fill="#4caf50"/>
  <path d="M362,86 Q370,93 378,86" fill="none" stroke="#4caf50" stroke-width="1.5"/>
  <!-- Communication lines -->
  <line x1="148" y1="75" x2="230" y2="70" stroke="#ffc107" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="270" y1="70" x2="352" y2="75" stroke="#ffc107" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- Speech bubbles -->
  <g transform="translate(155,40)">
    <ellipse cx="30" cy="12" rx="25" ry="12" fill="#4fc3f7" opacity="0.1" stroke="#4fc3f7" stroke-width="1"/>
    <polygon points="20,22 15,32 28,22" fill="#4fc3f7" opacity="0.1"/>
    <text x="30" y="15" fill="#4fc3f7" font-size="7" text-anchor="middle">Привет!</text>
  </g>
  <g transform="translate(310,40)">
    <ellipse cx="30" cy="12" rx="25" ry="12" fill="#4caf50" opacity="0.1" stroke="#4caf50" stroke-width="1"/>
    <polygon points="40,22 45,32 32,22" fill="#4caf50" opacity="0.1"/>
    <text x="30" y="15" fill="#4caf50" font-size="7" text-anchor="middle">Привет!</text>
  </g>
  <!-- Communication components -->
  <g transform="translate(30,130)">
    <text x="220" y="0" fill="#e040fb" font-size="10" text-anchor="middle" font-weight="bold">Три стороны общения</text>
    <g transform="translate(20,15)">
      <rect x="0" y="0" width="130" height="55" fill="#4fc3f7" opacity="0.08" rx="8" stroke="#4fc3f7" stroke-width="1"/>
      <text x="65" y="20" fill="#4fc3f7" font-size="9" text-anchor="middle">Коммуникативная</text>
      <text x="65" y="35" fill="#78909c" font-size="7" text-anchor="middle">Обмен информацией</text>
      <text x="65" y="47" fill="#78909c" font-size="7" text-anchor="middle">Слова, текст</text>
    </g>
    <g transform="translate(160,15)">
      <rect x="0" y="0" width="130" height="55" fill="#e040fb" opacity="0.08" rx="8" stroke="#e040fb" stroke-width="1"/>
      <text x="65" y="20" fill="#e040fb" font-size="9" text-anchor="middle">Интерактивная</text>
      <text x="65" y="35" fill="#78909c" font-size="7" text-anchor="middle">Взаимодействие</text>
      <text x="65" y="47" fill="#78909c" font-size="7" text-anchor="middle">Действия, поступки</text>
    </g>
    <g transform="translate(300,15)">
      <rect x="0" y="0" width="130" height="55" fill="#ffc107" opacity="0.08" rx="8" stroke="#ffc107" stroke-width="1"/>
      <text x="65" y="20" fill="#ffc107" font-size="9" text-anchor="middle">Перцептивная</text>
      <text x="65" y="35" fill="#78909c" font-size="7" text-anchor="middle">Восприятие</text>
      <text x="65" y="47" fill="#78909c" font-size="7" text-anchor="middle">Понимание</text>
    </g>
  </g>
  <!-- Conflict resolution -->
  <g transform="translate(30,240)">
    <text x="220" y="0" fill="#e040fb" font-size="9" text-anchor="middle" font-weight="bold">Стратегии в конфликте</text>
    <rect x="0" y="10" width="75" height="22" fill="#f44336" opacity="0.1" rx="10" stroke="#f44336" stroke-width="1"/>
    <text x="37" y="25" fill="#f44336" font-size="7" text-anchor="middle">Соперничество</text>
    <rect x="85" y="10" width="65" height="22" fill="#ff9800" opacity="0.1" rx="10" stroke="#ff9800" stroke-width="1"/>
    <text x="117" y="25" fill="#ff9800" font-size="7" text-anchor="middle">Компромисс</text>
    <rect x="160" y="10" width="55" height="22" fill="#9c27b0" opacity="0.1" rx="10" stroke="#9c27b0" stroke-width="1"/>
    <text x="187" y="25" fill="#9c27b0" font-size="7" text-anchor="middle">Избегание</text>
    <rect x="225" y="10" width="55" height="22" fill="#4fc3f7" opacity="0.1" rx="10" stroke="#4fc3f7" stroke-width="1"/>
    <text x="252" y="25" fill="#4fc3f7" font-size="7" text-anchor="middle">Приспособ.</text>
    <rect x="290" y="10" width="80" height="22" fill="#4caf50" opacity="0.1" rx="10" stroke="#4caf50" stroke-width="1.5"/>
    <text x="330" y="25" fill="#4caf50" font-size="7" text-anchor="middle" font-weight="bold">Сотрудничество</text>
  </g>
  <!-- Non-verbal stat -->
  <text x="250" y="300" fill="#b388ff" font-size="8" text-anchor="middle">70% коммуникации — невербальная (мимика, жесты, интонация)</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Межличностные отношения</text>
</svg>