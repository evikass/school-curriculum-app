<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="pbg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#pbg1)"/>
  <!-- Brain outline -->
  <path d="M200,80 Q160,60 140,80 Q110,90 115,120 Q100,140 120,160 Q110,180 135,195 Q130,215 155,220 Q160,240 185,235 Q200,250 225,240 Q245,255 260,240 Q285,250 290,230 Q310,225 310,205 Q330,195 325,175 Q340,155 330,135 Q340,110 320,100 Q320,75 295,70 Q275,55 255,65 Q235,50 210,60 Z" fill="#7c4dff" opacity="0.15" stroke="#b388ff" stroke-width="2"/>
  <!-- Brain hemispheres -->
  <path d="M215,75 Q175,65 155,85 Q130,95 135,125 Q120,145 140,165 Q130,185 155,200 Q150,215 175,218 Q185,235 210,228" fill="none" stroke="#b388ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Neural connections -->
  <g stroke="#e040fb" stroke-width="0.8" opacity="0.5">
    <line x1="170" y1="110" x2="220" y2="130"/><line x1="220" y1="130" x2="260" y2="100"/>
    <line x1="190" y1="150" x2="240" y2="140"/><line x1="240" y1="140" x2="280" y2="160"/>
    <line x1="160" y1="170" x2="210" y2="180"/><line x1="210" y1="180" x2="250" y2="170"/>
    <line x1="200" y1="200" x2="240" y2="190"/><line x1="240" y1="190" x2="270" y2="210"/>
  </g>
  <!-- Neural nodes -->
  <g fill="#e040fb" opacity="0.7">
    <circle cx="170" cy="110" r="4"/><circle cx="220" cy="130" r="4"/>
    <circle cx="260" cy="100" r="4"/><circle cx="190" cy="150" r="4"/>
    <circle cx="240" cy="140" r="4"/><circle cx="280" cy="160" r="4"/>
    <circle cx="160" cy="170" r="4"/><circle cx="210" cy="180" r="4"/>
    <circle cx="250" cy="170" r="4"/><circle cx="200" cy="200" r="4"/>
    <circle cx="240" cy="190" r="4"/><circle cx="270" cy="210" r="4"/>
  </g>
  <!-- Psyche elements orbiting -->
  <text x="80" y="60" fill="#b388ff" font-size="9" opacity="0.7">Процессы</text>
  <text x="370" y="80" fill="#b388ff" font-size="9" opacity="0.7">Состояния</text>
  <text x="350" y="260" fill="#b388ff" font-size="9" opacity="0.7">Свойства</text>
  <!-- Orbit lines -->
  <ellipse cx="215" cy="155" rx="160" ry="120" fill="none" stroke="#b388ff" stroke-width="0.5" opacity="0.2" stroke-dasharray="5,5"/>
  <!-- Branches of psychology -->
  <g transform="translate(30,260)">
    <rect x="0" y="0" width="90" height="22" fill="#7c4dff" opacity="0.2" rx="10" stroke="#b388ff" stroke-width="1"/>
    <text x="45" y="15" fill="#b388ff" font-size="8" text-anchor="middle">Общая</text>
  </g>
  <g transform="translate(130,275)">
    <rect x="0" y="0" width="90" height="22" fill="#7c4dff" opacity="0.2" rx="10" stroke="#e040fb" stroke-width="1"/>
    <text x="45" y="15" fill="#e040fb" font-size="8" text-anchor="middle">Возрастная</text>
  </g>
  <g transform="translate(230,260)">
    <rect x="0" y="0" width="90" height="22" fill="#7c4dff" opacity="0.2" rx="10" stroke="#4fc3f7" stroke-width="1"/>
    <text x="45" y="15" fill="#4fc3f7" font-size="8" text-anchor="middle">Социальная</text>
  </g>
  <g transform="translate(330,275)">
    <rect x="0" y="0" width="90" height="22" fill="#7c4dff" opacity="0.2" rx="10" stroke="#4caf50" stroke-width="1"/>
    <text x="45" y="15" fill="#4caf50" font-size="8" text-anchor="middle">Педагогическая</text>
  </g>
  <!-- Greek letters -->
  <text x="430" y="40" fill="#b388ff" font-size="16" opacity="0.3">Ψ</text>
  <text x="450" y="50" fill="#b388ff" font-size="10" opacity="0.3">psyche</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Что такое психология</text>
</svg>