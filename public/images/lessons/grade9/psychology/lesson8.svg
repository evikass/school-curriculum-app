<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="pbg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#pbg8)"/>
  <!-- Mountain -->
  <polygon points="250,30 80,250 420,250" fill="#7c4dff" opacity="0.15" stroke="#b388ff" stroke-width="2"/>
  <polygon points="250,30 180,130 320,130" fill="white" opacity="0.08"/>
  <!-- Climber path -->
  <path d="M150,230 Q180,200 200,180 Q230,150 250,130 Q270,110 290,90 Q310,70 330,50" fill="none" stroke="#ffc107" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Climber figure -->
  <g transform="translate(290,80)">
    <circle cx="0" cy="0" r="5" fill="#ffc107"/>
    <line x1="0" y1="5" x2="0" y2="18" stroke="#ffc107" stroke-width="2"/>
    <line x1="-8" y1="10" x2="8" y2="10" stroke="#ffc107" stroke-width="2"/>
    <line x1="0" y1="18" x2="-6" y2="28" stroke="#ffc107" stroke-width="2"/>
    <line x1="0" y1="18" x2="6" y2="28" stroke="#ffc107" stroke-width="2"/>
  </g>
  <!-- Flag at top -->
  <line x1="330" y1="50" x2="330" y2="30" stroke="#ffc107" stroke-width="2"/>
  <polygon points="330,30 355,37 330,44" fill="#ffc107" opacity="0.7"/>
  <!-- Obstacles on path -->
  <g fill="#f44336" opacity="0.4">
    <rect x="195" y="178" width="15" height="10" rx="2"/>
    <rect x="250" y="128" width="15" height="10" rx="2"/>
    <rect x="305" y="78" width="15" height="10" rx="2"/>
  </g>
  <text x="230" y="175" fill="#f44336" font-size="6" opacity="0.6">Лень</text>
  <text x="280" y="125" fill="#f44336" font-size="6" opacity="0.6">Страх</text>
  <text x="335" y="75" fill="#f44336" font-size="6" opacity="0.6">Сомнение</text>
  <!-- Volitional act stages -->
  <g transform="translate(30,265)">
    <text x="220" y="0" fill="#e040fb" font-size="9" text-anchor="middle" font-weight="bold">Этапы волевого акта</text>
    <g fill="#7c4dff" opacity="0.15" stroke="#b388ff" stroke-width="1">
      <rect x="0" y="10" width="80" height="25" rx="12"/>
      <rect x="90" y="10" width="80" height="25" rx="12"/>
      <rect x="180" y="10" width="80" height="25" rx="12"/>
      <rect x="270" y="10" width="80" height="25" rx="12"/>
      <rect x="360" y="10" width="80" height="25" rx="12"/>
    </g>
    <text x="40" y="27" fill="#b388ff" font-size="7" text-anchor="middle">Побуждение</text>
    <text x="130" y="27" fill="#b388ff" font-size="7" text-anchor="middle">Борьба</text>
    <text x="220" y="27" fill="#b388ff" font-size="7" text-anchor="middle">Решение</text>
    <text x="310" y="27" fill="#b388ff" font-size="7" text-anchor="middle">Действие</text>
    <text x="400" y="27" fill="#b388ff" font-size="7" text-anchor="middle">Результат</text>
    <!-- Arrows -->
    <line x1="80" y1="22" x2="90" y2="22" stroke="#b388ff" stroke-width="1" opacity="0.5"/>
    <line x1="170" y1="22" x2="180" y2="22" stroke="#b388ff" stroke-width="1" opacity="0.5"/>
    <line x1="260" y1="22" x2="270" y2="22" stroke="#b388ff" stroke-width="1" opacity="0.5"/>
    <line x1="350" y1="22" x2="360" y2="22" stroke="#b388ff" stroke-width="1" opacity="0.5"/>
  </g>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Воля</text>
</svg>