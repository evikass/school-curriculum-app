<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="pbg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#pbg10)"/>
  <!-- Person silhouette -->
  <circle cx="250" cy="60" r="25" fill="#7c4dff" opacity="0.2" stroke="#b388ff" stroke-width="2"/>
  <path d="M220,85 Q220,110 200,130 Q180,150 180,200 L320,200 Q320,150 300,130 Q280,110 280,85" fill="#7c4dff" opacity="0.15" stroke="#b388ff" stroke-width="1.5"/>
  <!-- Character traits radiating out -->
  <g font-size="8">
    <!-- Trait 1: Трудолюбие -->
    <line x1="220" y1="80" x2="60" y2="80" stroke="#ffc107" stroke-width="1" opacity="0.4"/>
    <rect x="10" y="68" width="75" height="22" fill="#ffc107" opacity="0.1" rx="10" stroke="#ffc107" stroke-width="1"/>
    <text x="47" y="83" fill="#ffc107" text-anchor="middle">Трудолюбие</text>
    <!-- Trait 2: Честность -->
    <line x1="225" y1="70" x2="60" y2="40" stroke="#4caf50" stroke-width="1" opacity="0.4"/>
    <rect x="10" y="28" width="75" height="22" fill="#4caf50" opacity="0.1" rx="10" stroke="#4caf50" stroke-width="1"/>
    <text x="47" y="43" fill="#4caf50" text-anchor="middle">Честность</text>
    <!-- Trait 3: Ответственность -->
    <line x1="275" y1="70" x2="440" y2="40" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
    <rect x="415" y="28" width="75" height="22" fill="#4fc3f7" opacity="0.1" rx="10" stroke="#4fc3f7" stroke-width="1"/>
    <text x="452" y="43" fill="#4fc3f7" text-anchor="middle">Ответствен.</text>
    <!-- Trait 4: Доброта -->
    <line x1="280" y1="80" x2="440" y2="80" stroke="#e040fb" stroke-width="1" opacity="0.4"/>
    <rect x="415" y="68" width="75" height="22" fill="#e040fb" opacity="0.1" rx="10" stroke="#e040fb" stroke-width="1"/>
    <text x="452" y="83" fill="#e040fb" text-anchor="middle">Доброта</text>
    <!-- Trait 5: Смелость -->
    <line x1="225" y1="95" x2="60" y2="140" stroke="#f44336" stroke-width="1" opacity="0.4"/>
    <rect x="10" y="128" width="75" height="22" fill="#f44336" opacity="0.1" rx="10" stroke="#f44336" stroke-width="1"/>
    <text x="47" y="143" fill="#f44336" text-anchor="middle">Смелость</text>
    <!-- Trait 6: Упорство -->
    <line x1="275" y1="95" x2="440" y2="140" stroke="#ff9800" stroke-width="1" opacity="0.4"/>
    <rect x="415" y="128" width="75" height="22" fill="#ff9800" opacity="0.1" rx="10" stroke="#ff9800" stroke-width="1"/>
    <text x="452" y="143" fill="#ff9800" text-anchor="middle">Упорство</text>
  </g>
  <!-- Character vs Temperament -->
  <rect x="30" y="220" width="200" height="90" fill="#7c4dff" opacity="0.08" rx="8" stroke="#b388ff" stroke-width="1"/>
  <text x="130" y="242" fill="#e040fb" font-size="10" text-anchor="middle" font-weight="bold">Характер</text>
  <text x="130" y="258" fill="#b388ff" font-size="8" text-anchor="middle">Формируется прижизненно</text>
  <text x="130" y="272" fill="#b388ff" font-size="8" text-anchor="middle">Может изменяться</text>
  <text x="130" y="286" fill="#b388ff" font-size="8" text-anchor="middle">Отношение к миру</text>
  <text x="130" y="300" fill="#78909c" font-size="7" text-anchor="middle">50–60% — среда и воспитание</text>
  <rect x="270" y="220" width="200" height="90" fill="#7c4dff" opacity="0.08" rx="8" stroke="#4fc3f7" stroke-width="1"/>
  <text x="370" y="242" fill="#4fc3f7" font-size="10" text-anchor="middle" font-weight="bold">Темперамент</text>
  <text x="370" y="258" fill="#b388ff" font-size="8" text-anchor="middle">Врождённый</text>
  <text x="370" y="272" fill="#b388ff" font-size="8" text-anchor="middle">Не меняется</text>
  <text x="370" y="286" fill="#b388ff" font-size="8" text-anchor="middle">Динамика поведения</text>
  <text x="370" y="300" fill="#78909c" font-size="7" text-anchor="middle">40–50% — генетика</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Характер</text>
</svg>