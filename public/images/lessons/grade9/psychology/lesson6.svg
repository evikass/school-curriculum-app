<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#AB47BC"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AB47BC" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#AB47BC" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#AB47BC" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#6A1B9A" opacity="0.12"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#AB47BC" text-anchor="middle">Управление стрессом</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Психология — Урок 6</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#AB47BC" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#AB47BC" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="start" font-weight="bold">Стратегии:</text>
  <text x="80" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">1. Изменить ситуацию (если возможно)</text>
  <text x="32" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">2. Изменить отношение к ней</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">3. Принять то, что нельзя изменить</text>
  <text x="22" y="148" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="start" font-weight="bold">Техники:</text>
  <text x="80" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Прогрессивная мышечная релаксация</text>
  <text x="32" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Медитация и осознанность</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#AB47BC" opacity="0.05"/>
  <text x="272" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Физическая нагрузка (спорт)</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Достаточный сон (8-9 часов)</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Питание, прогулки на природе</text>
  <text x="262" y="148" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="start" font-weight="bold">Защита:</text>
  <text x="320" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Социальная поддержка (общение)</text>
  <text x="272" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="start">Хобби, творчество, юмор</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#AB47BC" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Управляй стрессом — не дай ему управлять тобой</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#AB47BC" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Профилактика лучше лечения</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Психология · Управление стрессом</text>
</svg>