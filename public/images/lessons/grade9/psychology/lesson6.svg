<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="pbg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#pbg6)"/>
  <!-- Creative swirl -->
  <path d="M200,120 Q160,80 200,50 Q250,20 280,60 Q310,90 270,120 Q240,140 210,120 Q190,100 210,80 Q230,60 250,80" fill="none" stroke="#e040fb" stroke-width="2.5" opacity="0.6"/>
  <path d="M200,120 Q240,160 280,140 Q320,120 340,160 Q360,200 320,210" fill="none" stroke="#7c4dff" stroke-width="2" opacity="0.5"/>
  <!-- Stars/sparkles -->
  <g fill="#ffc107" opacity="0.7">
    <polygon points="150,90 153,98 161,98 155,103 157,111 150,107 143,111 145,103 139,98 147,98"/>
    <polygon points="300,70 302,76 308,76 303,80 305,86 300,83 295,86 297,80 292,76 298,76"/>
    <polygon points="350,140 352,146 358,146 353,150 355,156 350,153 345,156 347,150 342,146 348,146"/>
    <polygon points="120,160 122,166 128,166 123,170 125,176 120,173 115,176 117,170 112,166 118,166"/>
  </g>
  <!-- Imagination techniques -->
  <g transform="translate(30,200)">
    <text x="210" y="0" fill="#e040fb" font-size="10" text-anchor="middle" font-weight="bold">Приёмы воображения</text>
    <!-- Agglutination -->
    <g transform="translate(0,15)">
      <rect x="0" y="0" width="100" height="45" fill="#7c4dff" opacity="0.1" rx="5" stroke="#e040fb" stroke-width="1"/>
      <!-- Mermaid: human + fish -->
      <circle cx="30" cy="15" r="8" fill="#b388ff" opacity="0.4"/>
      <line x1="30" y1="23" x2="30" y2="28" stroke="#b388ff" stroke-width="2" opacity="0.4"/>
      <path d="M22,28 Q30,40 38,28" fill="#4fc3f7" opacity="0.3" stroke="#4fc3f7" stroke-width="1"/>
      <text x="50" y="17" fill="#e040fb" font-size="7">Агглютинация</text>
      <text x="50" y="28" fill="#78909c" font-size="6">Склеивание</text>
      <text x="50" y="38" fill="#78909c" font-size="6">элементов</text>
    </g>
    <!-- Analogy -->
    <g transform="translate(110,15)">
      <rect x="0" y="0" width="100" height="45" fill="#7c4dff" opacity="0.1" rx="5" stroke="#b388ff" stroke-width="1"/>
      <circle cx="25" cy="22" r="10" fill="#9c27b0" opacity="0.2" stroke="#9c27b0" stroke-width="1"/>
      <circle cx="40" cy="22" r="6" fill="#9c27b0" opacity="0.15" stroke="#9c27b0" stroke-width="1"/>
      <text x="50" y="17" fill="#b388ff" font-size="7">Аналогия</text>
      <text x="50" y="28" fill="#78909c" font-size="6">Сходство с</text>
      <text x="50" y="38" fill="#78909c" font-size="6">другим объектом</text>
    </g>
    <!-- Exaggeration -->
    <g transform="translate(220,15)">
      <rect x="0" y="0" width="100" height="45" fill="#7c4dff" opacity="0.1" rx="5" stroke="#4fc3f7" stroke-width="1"/>
      <circle cx="25" cy="22" r="5" fill="#4fc3f7" opacity="0.3"/>
      <circle cx="45" cy="22" r="14" fill="#4fc3f7" opacity="0.15" stroke="#4fc3f7" stroke-width="1"/>
      <text x="65" y="17" fill="#4fc3f7" font-size="7">Акцентирование</text>
      <text x="65" y="28" fill="#78909c" font-size="6">Увеличение</text>
      <text x="65" y="38" fill="#78909c" font-size="6">или уменьшение</text>
    </g>
    <!-- Typification -->
    <g transform="translate(330,15)">
      <rect x="0" y="0" width="100" height="45" fill="#7c4dff" opacity="0.1" rx="5" stroke="#4caf50" stroke-width="1"/>
      <circle cx="25" cy="15" r="5" fill="#4caf50" opacity="0.3"/>
      <circle cx="35" cy="18" r="5" fill="#4caf50" opacity="0.25"/>
      <circle cx="30" cy="28" r="5" fill="#4caf50" opacity="0.2"/>
      <text x="50" y="17" fill="#4caf50" font-size="7">Типизация</text>
      <text x="50" y="28" fill="#78909c" font-size="6">Обобщение</text>
      <text x="50" y="38" fill="#78909c" font-size="6">в типичный образ</text>
    </g>
  </g>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Воображение</text>
</svg>