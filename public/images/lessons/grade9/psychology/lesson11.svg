<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="pbg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#pbg11)"/>
  <!-- Stars of different sizes representing ability levels -->
  <g fill="#ffc107" opacity="0.2">
    <polygon points="80,60 86,78 105,78 90,89 96,107 80,97 64,107 70,89 55,78 74,78"/>
    <polygon points="180,40 185,55 200,55 188,64 193,79 180,70 167,79 172,64 160,55 175,55"/>
    <polygon points="300,50 306,68 325,68 310,79 316,97 300,87 284,97 290,79 275,68 294,68"/>
    <polygon points="410,45 414,57 427,57 417,65 420,77 410,70 400,77 403,65 393,57 406,57"/>
  </g>
  <!-- Central bright star -->
  <polygon points="250,100 258,125 285,125 264,140 272,165 250,150 228,165 236,140 215,125 242,125" fill="#ffc107" opacity="0.6" stroke="#ffc107" stroke-width="1"/>
  <!-- Sparkles -->
  <g fill="#ffc107" opacity="0.5">
    <circle cx="230" cy="110" r="1.5"/><circle cx="270" cy="115" r="1"/>
    <circle cx="250" cy="90" r="1"/><circle cx="245" cy="170" r="1.5"/>
  </g>
  <!-- Задатки → Способности → Одарённость → Талант → Гениальность -->
  <g transform="translate(20,200)">
    <text x="230" y="0" fill="#e040fb" font-size="10" text-anchor="middle" font-weight="bold">Уровни развития способностей</text>
    <!-- Progression steps -->
    <rect x="0" y="15" width="80" height="40" fill="#7c4dff" opacity="0.15" rx="5" stroke="#b388ff" stroke-width="1"/>
    <text x="40" y="33" fill="#b388ff" font-size="8" text-anchor="middle">Задатки</text>
    <text x="40" y="45" fill="#78909c" font-size="6" text-anchor="middle">Врождённые</text>
    <polygon points="82,35 92,30 92,40" fill="#b388ff" opacity="0.4"/>
    <rect x="95" y="15" width="80" height="40" fill="#7c4dff" opacity="0.15" rx="5" stroke="#4fc3f7" stroke-width="1"/>
    <text x="135" y="33" fill="#4fc3f7" font-size="8" text-anchor="middle">Способности</text>
    <text x="135" y="45" fill="#78909c" font-size="6" text-anchor="middle">Развитые</text>
    <polygon points="177,35 187,30 187,40" fill="#4fc3f7" opacity="0.4"/>
    <rect x="190" y="15" width="80" height="40" fill="#7c4dff" opacity="0.15" rx="5" stroke="#ffc107" stroke-width="1"/>
    <text x="230" y="33" fill="#ffc107" font-size="8" text-anchor="middle">Одарённость</text>
    <text x="230" y="45" fill="#78909c" font-size="6" text-anchor="middle">Высокий уровень</text>
    <polygon points="272,35 282,30 282,40" fill="#ffc107" opacity="0.4"/>
    <rect x="285" y="15" width="80" height="40" fill="#7c4dff" opacity="0.15" rx="5" stroke="#ff9800" stroke-width="1"/>
    <text x="325" y="33" fill="#ff9800" font-size="8" text-anchor="middle">Талант</text>
    <text x="325" y="45" fill="#78909c" font-size="6" text-anchor="middle">Высший уровень</text>
    <polygon points="367,35 377,30 377,40" fill="#ff9800" opacity="0.4"/>
    <rect x="380" y="15" width="80" height="40" fill="#7c4dff" opacity="0.15" rx="5" stroke="#e040fb" stroke-width="1"/>
    <text x="420" y="33" fill="#e040fb" font-size="8" text-anchor="middle">Гениальность</text>
    <text x="420" y="45" fill="#78909c" font-size="6" text-anchor="middle">Уникальность</text>
  </g>
  <!-- 10000 hours rule -->
  <g transform="translate(130,280)">
    <rect x="0" y="0" width="240" height="30" fill="#ffc107" opacity="0.08" rx="15" stroke="#ffc107" stroke-width="1"/>
    <text x="120" y="20" fill="#ffc107" font-size="10" text-anchor="middle">Правило 10 000 часов практики</text>
  </g>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Способности</text>
</svg>