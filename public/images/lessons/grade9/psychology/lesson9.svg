<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="pbg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#pbg9)"/>
  <!-- Four quadrants -->
  <!-- Vertical divider -->
  <line x1="250" y1="30" x2="250" y2="280" stroke="#7c4dff" stroke-width="1" opacity="0.3"/>
  <!-- Horizontal divider -->
  <line x1="30" y1="155" x2="470" y2="155" stroke="#7c4dff" stroke-width="1" opacity="0.3"/>
  <!-- Axes labels -->
  <text x="250" y="25" fill="#b388ff" font-size="8" text-anchor="middle">Сильный</text>
  <text x="250" y="295" fill="#b388ff" font-size="8" text-anchor="middle">Слабый</text>
  <text x="15" y="158" fill="#b388ff" font-size="8" text-anchor="end">Инертный</text>
  <text x="485" y="158" fill="#b388ff" font-size="8">Подвижный</text>
  <!-- Choleric (top-right) -->
  <g transform="translate(300,50)">
    <rect x="0" y="0" width="140" height="85" fill="#f44336" opacity="0.1" rx="8" stroke="#f44336" stroke-width="1.5"/>
    <text x="70" y="20" fill="#f44336" font-size="11" text-anchor="middle" font-weight="bold">Холерик</text>
    <text x="70" y="35" fill="#b388ff" font-size="7" text-anchor="middle">Сильный, неуравновешенный</text>
    <text x="70" y="48" fill="#b388ff" font-size="7" text-anchor="middle">Подвижный</text>
    <!-- Fire icon -->
    <path d="M60,55 Q55,65 60,75 Q65,65 60,55" fill="#f44336" opacity="0.5"/>
    <path d="M70,50 Q63,63 70,75 Q77,63 70,50" fill="#ff9800" opacity="0.4"/>
    <path d="M80,55 Q75,65 80,75 Q85,65 80,55" fill="#f44336" opacity="0.5"/>
    <text x="70" y="80" fill="#78909c" font-size="6" text-anchor="middle">Огонь</text>
  </g>
  <!-- Sanguine (top-left) -->
  <g transform="translate(60,50)">
    <rect x="0" y="0" width="140" height="85" fill="#ffc107" opacity="0.1" rx="8" stroke="#ffc107" stroke-width="1.5"/>
    <text x="70" y="20" fill="#ffc107" font-size="11" text-anchor="middle" font-weight="bold">Сангвиник</text>
    <text x="70" y="35" fill="#b388ff" font-size="7" text-anchor="middle">Сильный, уравновешенный</text>
    <text x="70" y="48" fill="#b388ff" font-size="7" text-anchor="middle">Подвижный</text>
    <!-- Air/wind icon -->
    <path d="M45,65 Q55,55 65,65 Q75,55 85,65" fill="none" stroke="#ffc107" stroke-width="2" opacity="0.5"/>
    <path d="M50,72 Q60,62 70,72 Q80,62 90,72" fill="none" stroke="#ffc107" stroke-width="1.5" opacity="0.4"/>
    <text x="70" y="80" fill="#78909c" font-size="6" text-anchor="middle">Воздух</text>
  </g>
  <!-- Phlegmatic (bottom-left) -->
  <g transform="translate(60,170)">
    <rect x="0" y="0" width="140" height="85" fill="#4fc3f7" opacity="0.1" rx="8" stroke="#4fc3f7" stroke-width="1.5"/>
    <text x="70" y="20" fill="#4fc3f7" font-size="11" text-anchor="middle" font-weight="bold">Флегматик</text>
    <text x="70" y="35" fill="#b388ff" font-size="7" text-anchor="middle">Сильный, уравновешенный</text>
    <text x="70" y="48" fill="#b388ff" font-size="7" text-anchor="middle">Инертный</text>
    <!-- Water drops -->
    <ellipse cx="60" cy="65" rx="6" ry="8" fill="#4fc3f7" opacity="0.3"/>
    <ellipse cx="75" cy="62" rx="5" ry="7" fill="#4fc3f7" opacity="0.25"/>
    <ellipse cx="88" cy="66" rx="4" ry="6" fill="#4fc3f7" opacity="0.2"/>
    <text x="70" y="80" fill="#78909c" font-size="6" text-anchor="middle">Вода</text>
  </g>
  <!-- Melancholic (bottom-right) -->
  <g transform="translate(300,170)">
    <rect x="0" y="0" width="140" height="85" fill="#7c4dff" opacity="0.1" rx="8" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="70" y="20" fill="#9c27b0" font-size="11" text-anchor="middle" font-weight="bold">Меланхолик</text>
    <text x="70" y="35" fill="#b388ff" font-size="7" text-anchor="middle">Слабый, неуравновешенный</text>
    <text x="70" y="48" fill="#b388ff" font-size="7" text-anchor="middle">Инертный</text>
    <!-- Earth icon -->
    <ellipse cx="70" cy="65" rx="15" ry="10" fill="#9c27b0" opacity="0.15" stroke="#9c27b0" stroke-width="1"/>
    <path d="M60,60 L65,55 L70,62 L75,50 L80,58" fill="none" stroke="#9c27b0" stroke-width="1" opacity="0.5"/>
    <text x="70" y="80" fill="#78909c" font-size="6" text-anchor="middle">Земля</text>
  </g>
  <!-- Hippocrates note -->
  <text x="250" y="310" fill="#78909c" font-size="8" text-anchor="middle">По Гиппократу: кровь, жёлчь, чёрная жёлчь, слизь</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Темперамент</text>
</svg>