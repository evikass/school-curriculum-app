<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#42A5F5" text-anchor="middle">Электронные таблицы: основы</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Информатика — Урок 3</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Таблицы —</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">программа для вычислений (Excel)</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Элементы:</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Ячейка — пересечение строки и столбца</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">A1, B5, C10 — адреса ячеек</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Диапазон — A1:D10</text>
  <text x="22" y="168" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Данные:</text>
  <text x="85" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Числа, текст, формулы</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="262" y="88" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Формулы:</text>
  <text x="325" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">Начинаются со знака =</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">=A1+B1 — сложение</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">=SUM(A1:A10) — сумма</text>
  <text x="262" y="148" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Автозаполнение:</text>
  <text x="325" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Протягивание за маркер</text>
  <text x="272" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Копирование формул с адаптацией</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#42A5F5" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Excel — вычисления автоматом</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#42A5F5" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Формула всегда начинается с =</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Информатика · Электронные таблицы:</text>
</svg>