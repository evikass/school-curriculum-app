<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#42A5F5" text-anchor="middle">Алгоритмы обработки массивов</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Информатика — Урок 7</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Задачи:</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">1. Сумма: s = sum(A)</text>
  <text x="32" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">2. Максимум: m = max(A)</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">3. Минимум: m = min(A)</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">4. Поиск: A[i] == x</text>
  <text x="22" y="168" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Сумма:</text>
  <text x="85" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">s = 0; for x in A: s += x</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="262" y="88" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Максимум:</text>
  <text x="325" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">m = A[0]; for x in A: if x&gt;m: m=x</text>
  <text x="262" y="108" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Подсчёт:</text>
  <text x="325" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">count = 0; for x in A:</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">  if x % 2 == 0: count += 1</text>
  <text x="262" y="148" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Сортировка:</text>
  <text x="325" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Пузырьком, выбором, вставками</text>
  <text x="272" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Python: A.sort() — встроенная</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#42A5F5" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Обработка массивов — основа алгоритмики</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#42A5F5" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">O(n) — линейный поиск, O(n log n) — сортировка</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Информатика · Алгоритмы обработки </text>
</svg>