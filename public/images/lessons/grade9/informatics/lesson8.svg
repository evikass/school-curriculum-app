<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#42A5F5" text-anchor="middle">Строки и символы</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Информатика — Урок 8</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Строка —</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">последовательность символов</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Обозначение:</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Python: s = "Привет"</text>
  <text x="22" y="128" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Операции:</text>
  <text x="85" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Длина: len(s)</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Срез: s[1:4], s[:3], s[2:]</text>
  <text x="32" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Конкатенация: s1 + s2</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="262" y="88" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Методы:</text>
  <text x="325" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">s.upper() — в верхний регистр</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">s.lower() — в нижний регистр</text>
  <text x="272" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">s.replace('a','b') — замена</text>
  <text x="272" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">s.find('текст') — поиск позиции</text>
  <text x="262" y="168" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">Цикл:</text>
  <text x="325" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">for ch in s: — перебор символов</text>
  <text x="262" y="188" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold">ASCII:</text>
  <text x="325" y="188" font-family="Arial,sans-serif" font-size="10" fill="#333">ord('A') = 65, chr(65) = 'A'</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#42A5F5" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Строка — неизменяемый массив символов</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#42A5F5" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Срезы — мощный инструмент Python</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Информатика · Строки и символы</text>
</svg>