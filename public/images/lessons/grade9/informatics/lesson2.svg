<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E8EAF6" rx="8"/>
<!-- Title area -->
<text x="250" y="28" font-family="Arial" font-size="14" fill="#1A237E" text-anchor="middle" font-weight="bold">Кодирование информации</text>
<!-- Text encoding -->
<rect x="20" y="45" width="220" height="140" rx="8" fill="white" stroke="#3F51B5" stroke-width="1.5"/>
<text x="130" y="65" font-family="Arial" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Текстовая информация</text>
<text x="130" y="85" font-family="monospace" font-size="11" fill="#333" text-anchor="middle">А → 01000001</text>
<text x="130" y="103" font-family="monospace" font-size="11" fill="#333" text-anchor="middle">Б → 01000010</text>
<text x="130" y="121" font-family="monospace" font-size="11" fill="#333" text-anchor="middle">В → 01000011</text>
<line x1="35" y1="132" x2="225" y2="132" stroke="#C5CAE9" stroke-width="1"/>
<text x="130" y="150" font-family="Arial" font-size="9" fill="#5C6BC0" text-anchor="middle">ASCII — 1 символ = 1 байт</text>
<text x="130" y="165" font-family="Arial" font-size="9" fill="#5C6BC0" text-anchor="middle">Unicode — 1 символ = 2+ байт</text>
<text x="130" y="180" font-family="Arial" font-size="9" fill="#7986CB" text-anchor="middle">UTF-8 — переменная длина</text>
<!-- Image encoding -->
<rect x="260" y="45" width="220" height="140" rx="8" fill="white" stroke="#3F51B5" stroke-width="1.5"/>
<text x="370" y="65" font-family="Arial" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Графическая информация</text>
<!-- Pixel grid -->
<rect x="280" y="75" width="80" height="80" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1"/>
<rect x="280" y="75" width="10" height="10" fill="#E53935"/><rect x="290" y="75" width="10" height="10" fill="#E53935"/>
<rect x="300" y="75" width="10" height="10" fill="#43A047"/><rect x="310" y="75" width="10" height="10" fill="#43A047"/>
<rect x="280" y="85" width="10" height="10" fill="#E53935"/><rect x="290" y="85" width="10" height="10" fill="#1E88E5"/>
<rect x="300" y="85" width="10" height="10" fill="#43A047"/><rect x="310" y="85" width="10" height="10" fill="#43A047"/>
<rect x="280" y="95" width="10" height="10" fill="#1E88E5"/><rect x="290" y="95" width="10" height="10" fill="#1E88E5"/>
<rect x="300" y="95" width="10" height="10" fill="#FB8C00"/><rect x="310" y="95" width="10" height="10" fill="#FB8C00"/>
<rect x="280" y="105" width="10" height="10" fill="#1E88E5"/><rect x="290" y="105" width="10" height="10" fill="#1E88E5"/>
<rect x="300" y="105" width="10" height="10" fill="#FB8C00"/><rect x="310" y="105" width="10" height="10" fill="#FB8C00"/>
<text x="375" y="85" font-family="Arial" font-size="9" fill="#333">Растр: пиксели × RGB</text>
<text x="375" y="102" font-family="Arial" font-size="9" fill="#333">24 бит = 16.7 млн цветов</text>
<text x="375" y="119" font-family="Arial" font-size="9" fill="#333">I = K × i</text>
<text x="375" y="136" font-family="Arial" font-size="9" fill="#7986CB">Вектор: формулы и кривые</text>
<text x="375" y="153" font-family="Arial" font-size="9" fill="#7986CB">Масштаб без потерь</text>
<text x="375" y="170" font-family="Arial" font-size="9" fill="#5C6BC0">Форматы: PNG, JPEG, SVG</text>
<!-- Sound encoding -->
<rect x="20" y="200" width="220" height="130" rx="8" fill="white" stroke="#3F51B5" stroke-width="1.5"/>
<text x="130" y="220" font-family="Arial" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Звуковая информация</text>
<!-- Wave -->
<polyline points="35,260 50,240 65,260 80,280 95,260 110,240 125,260 140,280 155,260 170,240 185,260 200,280 215,260 230,240" fill="none" stroke="#3F51B5" stroke-width="2"/>
<!-- Sampling dots -->
<circle cx="50" cy="240" r="3" fill="#E53935"/><circle cx="80" cy="280" r="3" fill="#E53935"/>
<circle cx="110" cy="240" r="3" fill="#E53935"/><circle cx="140" cy="280" r="3" fill="#E53935"/>
<circle cx="170" cy="240" r="3" fill="#E53935"/><circle cx="200" cy="280" r="3" fill="#E53935"/>
<text x="130" y="300" font-family="Arial" font-size="9" fill="#333" text-anchor="middle">Дискретизация: частота + глубина</text>
<text x="130" y="316" font-family="Arial" font-size="9" fill="#5C6BC0" text-anchor="middle">44100 Гц, 16 бит = CD-качество</text>
<!-- Formulas -->
<rect x="260" y="200" width="220" height="130" rx="8" fill="white" stroke="#3F51B5" stroke-width="1.5"/>
<text x="370" y="220" font-family="Arial" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold">Формулы</text>
<text x="280" y="243" font-family="Arial" font-size="10" fill="#333">N = 2^i</text>
<text x="380" y="243" font-family="Arial" font-size="9" fill="#666">(алфавит и разрядность)</text>
<text x="280" y="263" font-family="Arial" font-size="10" fill="#333">I = K × i</text>
<text x="380" y="263" font-family="Arial" font-size="9" fill="#666">(информ. объём)</text>
<text x="280" y="283" font-family="Arial" font-size="10" fill="#333">I = N × i</text>
<text x="380" y="283" font-family="Arial" font-size="9" fill="#666">(звук: выборки × разрядн.)</text>
<text x="280" y="310" font-family="Arial" font-size="10" fill="#333">Единицы:</text>
<text x="280" y="325" font-family="Arial" font-size="9" fill="#5C6BC0">бит → байт → КБ → МБ → ГБ</text>
<text x="250" y="345" font-family="Arial" font-size="9" fill="#999" text-anchor="middle" opacity="0.5">Кодирование информации — Информатика 9</text>
</svg>
