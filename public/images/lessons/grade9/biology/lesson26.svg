<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg26" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg26)" rx="12"/>
  <rect x="4" y="4" width="492" height="342" fill="none" stroke="#1565C0" stroke-width="2" rx="10"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#0D47A1">Генетика</text>
  <line x1="40" y1="38" x2="460" y2="38" stroke="#1565C0" stroke-width="1.5"/>

  <!-- Mendel portrait area -->
  <rect x="360" y="48" width="125" height="135" rx="8" fill="#ffffff" fill-opacity="0.6" stroke="#1565C0" stroke-width="1.2"/>
  <text x="423" y="66" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">Г. Мендель</text>
  <text x="423" y="79" text-anchor="middle" font-size="8" fill="#1565C0">1822–1884</text>
  <!-- Simplified portrait -->
  <ellipse cx="423" cy="112" rx="22" ry="28" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <circle cx="416" cy="108" r="2.5" fill="#0D47A1"/>
  <circle cx="430" cy="108" r="2.5" fill="#0D47A1"/>
  <path d="M418 120 Q423 124 428 120" fill="none" stroke="#0D47A1" stroke-width="0.8"/>
  <!-- Hair -->
  <path d="M401 100 Q401 85 423 82 Q445 85 445 100" fill="none" stroke="#4E342E" stroke-width="1.5"/>
  <!-- Shoulders -->
  <path d="M405 140 Q395 148 385 150 M441 140 Q451 148 461 150" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="405" y1="140" x2="441" y2="140" stroke="#1565C0" stroke-width="1.5"/>
  <text x="423" y="165" text-anchor="middle" font-size="8" fill="#1565C0">«Отец генетики»</text>
  <text x="423" y="177" text-anchor="middle" font-size="7" fill="#1976D2">Опыты на горохе</text>

  <!-- Key terms with icons -->
  <!-- Ген -->
  <rect x="15" y="48" width="165" height="52" rx="6" fill="#ffffff" fill-opacity="0.7" stroke="#1976D2" stroke-width="1"/>
  <text x="97" y="67" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">Ген</text>
  <text x="97" y="82" text-anchor="middle" font-size="9" fill="#1565C0">участок ДНК, кодирующий признак</text>
  <!-- DNA icon -->
  <path d="M28 58 Q33 62 28 66 Q33 70 28 74 Q33 78 28 82" fill="none" stroke="#1565C0" stroke-width="1.2"/>
  <path d="M38 58 Q33 62 38 66 Q33 70 38 74 Q33 78 38 82" fill="none" stroke="#1565C0" stroke-width="1.2"/>
  <line x1="30" y1="62" x2="36" y2="62" stroke="#0D47A1" stroke-width="0.6"/>
  <line x1="28" y1="70" x2="38" y2="70" stroke="#0D47A1" stroke-width="0.6"/>
  <line x1="30" y1="78" x2="36" y2="78" stroke="#0D47A1" stroke-width="0.6"/>

  <!-- Аллель -->
  <rect x="190" y="48" width="160" height="52" rx="6" fill="#ffffff" fill-opacity="0.7" stroke="#1976D2" stroke-width="1"/>
  <text x="270" y="67" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">Аллель</text>
  <text x="270" y="82" text-anchor="middle" font-size="9" fill="#1565C0">вариант гена (A, a)</text>
  <!-- allele pair icon -->
  <rect x="205" y="60" width="10" height="14" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <text x="210" y="70" text-anchor="middle" font-size="7" fill="#0D47A1">A</text>
  <rect x="218" y="60" width="10" height="14" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8"/>
  <text x="223" y="70" text-anchor="middle" font-size="7" fill="#1565C0">a</text>

  <!-- Генотип -->
  <rect x="15" y="108" width="165" height="52" rx="6" fill="#ffffff" fill-opacity="0.7" stroke="#1976D2" stroke-width="1"/>
  <text x="97" y="127" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">Генотип</text>
  <text x="97" y="142" text-anchor="middle" font-size="9" fill="#1565C0">совокупность всех генов (AaBb)</text>
  <!-- genotype icon -->
  <rect x="25" y="118" width="8" height="10" rx="1.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
  <rect x="34" y="118" width="8" height="10" rx="1.5" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.6"/>
  <rect x="43" y="118" width="8" height="10" rx="1.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
  <rect x="52" y="118" width="8" height="10" rx="1.5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>

  <!-- Фенотип -->
  <rect x="190" y="108" width="160" height="52" rx="6" fill="#ffffff" fill-opacity="0.7" stroke="#1976D2" stroke-width="1"/>
  <text x="270" y="127" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">Фенотип</text>
  <text x="270" y="142" text-anchor="middle" font-size="9" fill="#1565C0">внешние признаки (жёлтый)</text>
  <!-- phenotype icon - pea -->
  <circle cx="208" cy="130" r="6" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <circle cx="220" cy="128" r="6" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>

  <!-- Гомозигота -->
  <rect x="15" y="168" width="232" height="52" rx="6" fill="#ffffff" fill-opacity="0.7" stroke="#1976D2" stroke-width="1"/>
  <text x="131" y="187" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">Гомозигота</text>
  <text x="131" y="202" text-anchor="middle" font-size="9" fill="#1565C0">одинаковые аллели: AA (доминантная) или aa (рецессивная)</text>
  <!-- homozygote icon -->
  <rect x="25" y="180" width="10" height="14" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <text x="30" y="190" text-anchor="middle" font-size="7" fill="#0D47A1">A</text>
  <text x="40" y="190" text-anchor="middle" font-size="9" fill="#1565C0">=</text>
  <rect x="46" y="180" width="10" height="14" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <text x="51" y="190" text-anchor="middle" font-size="7" fill="#0D47A1">A</text>

  <!-- Гетерозигота -->
  <rect x="255" y="168" width="230" height="52" rx="6" fill="#ffffff" fill-opacity="0.7" stroke="#1976D2" stroke-width="1"/>
  <text x="370" y="187" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">Гетерозигота</text>
  <text x="370" y="202" text-anchor="middle" font-size="9" fill="#1565C0">разные аллели: Aa (доминирование A)</text>
  <!-- heterozygote icon -->
  <rect x="268" y="180" width="10" height="14" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <text x="273" y="190" text-anchor="middle" font-size="7" fill="#0D47A1">A</text>
  <text x="283" y="190" text-anchor="middle" font-size="9" fill="#1565C0">≠</text>
  <rect x="289" y="180" width="10" height="14" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8"/>
  <text x="294" y="190" text-anchor="middle" font-size="7" fill="#1565C0">a</text>

  <!-- Dominance concept -->
  <rect x="15" y="228" width="232" height="52" rx="6" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="131" y="247" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">Доминирование</text>
  <text x="131" y="262" text-anchor="middle" font-size="9" fill="#1565C0">A — доминантный, подавляет a</text>
  <text x="131" y="274" text-anchor="middle" font-size="9" fill="#1565C0">a — рецессивный, проявляется в aa</text>

  <!-- Relationship diagram -->
  <rect x="255" y="228" width="230" height="105" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#1976D2" stroke-width="1.2"/>
  <text x="370" y="248" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">Связь понятий</text>

  <rect x="320" y="256" width="100" height="20" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8"/>
  <text x="370" y="270" text-anchor="middle" font-size="9" fill="#0D47A1">Генотип (Aa)</text>

  <line x1="340" y1="276" x2="340" y2="290" stroke="#1565C0" stroke-width="1"/>
  <text x="340" y="288" text-anchor="end" font-size="8" fill="#1565C0">→</text>
  <line x1="400" y1="276" x2="400" y2="290" stroke="#1565C0" stroke-width="1"/>
  <text x="400" y="288" text-anchor="start" font-size="8" fill="#1565C0">→</text>

  <rect x="280" y="292" width="110" height="18" rx="4" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.8"/>
  <text x="335" y="305" text-anchor="middle" font-size="8" fill="#0D47A1">Среда обитания</text>

  <rect x="340" y="312" width="100" height="18" rx="4" fill="#C8E6C9" stroke="#388E3C" stroke-width="0.8"/>
  <text x="390" y="325" text-anchor="middle" font-size="8" fill="#2E7D32">Фенотип (жёлтый)</text>

  <text x="318" y="305" text-anchor="end" font-size="10" fill="#1565C0">+</text>

  <!-- Key formula -->
  <rect x="15" y="288" width="232" height="45" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <text x="131" y="307" text-anchor="middle" font-size="11" font-weight="bold" fill="#0D47A1">Фенотип = Генотип + Среда</text>
  <text x="131" y="324" text-anchor="middle" font-size="9" fill="#1565C0">Норма реакции — пределы модификаций</text>
</svg>