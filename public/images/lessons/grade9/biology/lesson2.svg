<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <linearGradient id="fossilGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="white">Урок 2: Доказательства эволюции</text>

  <!-- 1. Paleontological evidence -->
  <rect x="15" y="60" width="230" height="95" rx="8" fill="white" opacity="0.9" filter="url(#shadow2)"/>
  <rect x="15" y="60" width="230" height="20" rx="8" fill="#795548" opacity="0.85"/>
  <rect x="15" y="72" width="230" height="8" fill="#795548" opacity="0.85"/>
  <text x="130" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Палеонтологические</text>
  <!-- Fossil diagram -->
  <ellipse cx="55" cy="120" rx="25" ry="15" fill="url(#fossilGrad)" opacity="0.7"/>
  <text x="55" y="124" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white">Ископаемые</text>
  <text x="90" y="100" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Окаменелости и отпечатки</text>
  <text x="90" y="113" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Переходные формы</text>
  <text x="90" y="126" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Археоптерикс (птица-рептилия)</text>
  <text x="90" y="139" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Ископаемые ряды (лошадь)</text>
  <text x="25" y="151" font-family="Arial,sans-serif" font-size="7.5" fill="#388E3C" font-style="italic">Показывают смену форм во времени</text>

  <!-- 2. Embryological evidence -->
  <rect x="255" y="60" width="230" height="95" rx="8" fill="white" opacity="0.9" filter="url(#shadow2)"/>
  <rect x="255" y="60" width="230" height="20" rx="8" fill="#1565C0" opacity="0.85"/>
  <rect x="255" y="72" width="230" height="8" fill="#1565C0" opacity="0.85"/>
  <text x="370" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Эмбриологические</text>
  <!-- Embryo stages diagram -->
  <ellipse cx="285" cy="105" rx="10" ry="12" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <ellipse cx="310" cy="105" rx="10" ry="12" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <ellipse cx="335" cy="105" rx="10" ry="12" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <text x="285" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">Рыба</text>
  <text x="310" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">Кур.</text>
  <text x="335" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">Чел.</text>
  <text x="350" y="100" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Сходство зародышей</text>
  <text x="350" y="113" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Закон зародышевого сходства</text>
  <text x="265" y="130" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Биогенетический закон Мюллера-Геккеля</text>
  <text x="265" y="143" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Онтогенез повторяет филогенез (кратко)</text>
  <text x="265" y="151" font-family="Arial,sans-serif" font-size="7.5" fill="#1565C0" font-style="italic">Жаберные щели у зародышей всех позвоночных</text>

  <!-- 3. Comparative anatomy evidence -->
  <rect x="15" y="163" width="230" height="105" rx="8" fill="white" opacity="0.9" filter="url(#shadow2)"/>
  <rect x="15" y="163" width="230" height="20" rx="8" fill="#388E3C" opacity="0.85"/>
  <rect x="15" y="175" width="230" height="8" fill="#388E3C" opacity="0.85"/>
  <text x="130" y="179" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Сравнительная анатомия</text>
  <!-- Homologous organs diagram -->
  <line x1="40" y1="220" x2="55" y2="195" stroke="#555" stroke-width="3" stroke-linecap="round"/>
  <line x1="55" y1="195" x2="70" y2="200" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="65" y1="220" x2="80" y2="195" stroke="#666" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="195" x2="95" y2="205" stroke="#666" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90" y1="220" x2="105" y2="195" stroke="#777" stroke-width="3" stroke-linecap="round"/>
  <line x1="105" y1="195" x2="120" y2="198" stroke="#777" stroke-width="2.5" stroke-linecap="round"/>
  <text x="50" y="238" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Крок.</text>
  <text x="78" y="238" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Птица</text>
  <text x="103" y="238" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Чел.</text>
  <text x="140" y="200" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Гомологичные органы</text>
  <text x="140" y="213" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Аналогичные органы</text>
  <text x="140" y="226" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Рудименты и атавизмы</text>
  <text x="25" y="252" font-family="Arial,sans-serif" font-size="8" fill="#388E3C">Гомологи: рука-крыло-ласт (один план)</text>
  <text x="25" y="264" font-family="Arial,sans-serif" font-size="8" fill="#C62828">Аналоги: крыло птицы-бабочки (разные)</text>

  <!-- 4. Molecular biology evidence -->
  <rect x="255" y="163" width="230" height="105" rx="8" fill="white" opacity="0.9" filter="url(#shadow2)"/>
  <rect x="255" y="163" width="230" height="20" rx="8" fill="#6A1B9A" opacity="0.85"/>
  <rect x="255" y="175" width="230" height="8" fill="#6A1B9A" opacity="0.85"/>
  <text x="370" y="179" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white">Молекулярно-биологические</text>
  <!-- DNA helix simplified -->
  <path d="M275,200 Q285,210 295,200 Q305,190 315,200 Q325,210 335,200" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <path d="M275,210 Q285,200 295,210 Q305,220 315,210 Q325,200 335,210" fill="none" stroke="#CE93D8" stroke-width="2"/>
  <!-- Rungs -->
  <line x1="285" y1="204" x2="285" y2="206" stroke="#E1BEE7" stroke-width="2"/>
  <line x1="295" y1="200" x2="295" y2="210" stroke="#E1BEE7" stroke-width="2"/>
  <line x1="315" y1="200" x2="315" y2="210" stroke="#E1BEE7" stroke-width="2"/>
  <line x1="325" y1="206" x2="325" y2="204" stroke="#E1BEE7" stroke-width="2"/>
  <text x="350" y="200" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Сходство ДНК и белков</text>
  <text x="350" y="213" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Универсальный генетич. код</text>
  <text x="265" y="230" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Сходство аминокислотных последовательностей</text>
  <text x="265" y="243" font-family="Arial,sans-serif" font-size="8.5" fill="#333">• Цитохром с: человек-шимпанзе 0 отличий</text>
  <text x="265" y="256" font-family="Arial,sans-serif" font-size="8" fill="#6A1B9A" font-style="italic">Чем ближе организмы, тем больше сходство ДНК</text>
  <text x="265" y="265" font-family="Arial,sans-serif" font-size="7.5" fill="#6A1B9A" font-style="italic">Человек-обезьяна: 98% совпадения ДНК</text>

  <!-- Summary bar -->
  <rect x="15" y="278" width="470" height="62" rx="8" fill="#66BB6A" opacity="0.15"/>
  <text x="250" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Доказательства эволюции подтверждают единство происхождения</text>
  <text x="250" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#333">Палеонтология (окаменелости) + Эмбриология (зародыши) + Анатомия (гомологи)</text>
  <text x="250" y="323" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#333">+ Молекулярная биология (ДНК/белки) + Биогеография (распространение)</text>
  <text x="250" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-style="italic">Рудименты: копчик, аппендикс, мышцы уха | Атавизмы: хвост, многососковость</text>
</svg>