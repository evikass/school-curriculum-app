<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow5" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="white">Урок 5: Решение генетических задач</text>

  <!-- Task description -->
  <rect x="15" y="60" width="470" height="30" rx="6" fill="#66BB6A" opacity="0.2"/>
  <text x="250" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Задача: Моногибридное скрещивание Aa × Aa (жёлтые/зелёные горошины)</text>

  <!-- Parent generation -->
  <rect x="15" y="98" width="470" height="35" rx="6" fill="white" opacity="0.9" filter="url(#shadow5)"/>
  <text x="70" y="115" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">P:</text>
  <circle cx="100" cy="112" r="10" fill="#FFD54F" stroke="#F57F17" stroke-width="1.5"/>
  <text x="100" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100">Aa</text>
  <text x="125" y="116" font-family="Arial,sans-serif" font-size="10" fill="#333">жёлтая</text>
  <text x="175" y="115" font-family="Arial,sans-serif" font-size="12" fill="#999">×</text>
  <circle cx="210" cy="112" r="10" fill="#FFD54F" stroke="#F57F17" stroke-width="1.5"/>
  <text x="210" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100">Aa</text>
  <text x="235" y="116" font-family="Arial,sans-serif" font-size="10" fill="#333">жёлтая</text>
  <text x="310" y="115" font-family="Arial,sans-serif" font-size="9" fill="#666">G (гаметы):</text>
  <circle cx="370" cy="112" r="8" fill="#FFF9C4" stroke="#F57F17" stroke-width="1"/>
  <text x="370" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">A</text>
  <circle cx="395" cy="112" r="8" fill="#FFF9C4" stroke="#F57F17" stroke-width="1"/>
  <text x="395" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">a</text>

  <!-- Punnett square -->
  <rect x="60" y="142" width="180" height="120" rx="4" fill="white" stroke="#388E3C" stroke-width="1.5" filter="url(#shadow5)"/>
  <!-- Grid lines -->
  <line x1="120" y1="142" x2="120" y2="262" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="180" y1="142" x2="180" y2="262" stroke="#388E3C" stroke-width="1.2"/>
  <line x1="240" y1="142" x2="240" y2="262" stroke="#388E3C" stroke-width="1.2"/>
  <line x1="60" y1="182" x2="240" y2="182" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="60" y1="222" x2="240" y2="222" stroke="#388E3C" stroke-width="1.2"/>
  <!-- Column headers (mother gametes) -->
  <text x="90" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#999">♀</text>
  <text x="150" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">A</text>
  <text x="210" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E65100">a</text>
  <!-- Row headers (father gametes) -->
  <text x="75" y="197" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#999">♂</text>
  <text x="90" y="207" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">A</text>
  <text x="90" y="247" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E65100">a</text>
  <!-- Cell contents -->
  <!-- AA -->
  <rect x="121" y="183" width="58" height="38" rx="2" fill="#C8E6C9"/>
  <text x="150" y="207" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#388E3C">AA</text>
  <!-- Aa -->
  <rect x="181" y="183" width="58" height="38" rx="2" fill="#E8F5E9"/>
  <text x="210" y="207" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#388E3C">Aa</text>
  <!-- aA -->
  <rect x="121" y="223" width="58" height="38" rx="2" fill="#E8F5E9"/>
  <text x="150" y="247" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#388E3C">Aa</text>
  <!-- aa -->
  <rect x="181" y="223" width="58" height="38" rx="2" fill="#FFF9C4"/>
  <text x="210" y="247" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#E65100">aa</text>
  <!-- Label -->
  <text x="150" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#388E3C">Решётка Пеннета F₁</text>

  <!-- Results panel -->
  <rect x="260" y="142" width="225" height="120" rx="8" fill="white" opacity="0.9" filter="url(#shadow5)"/>
  <text x="372" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Результаты F₁</text>
  <line x1="270" y1="166" x2="475" y2="166" stroke="#A5D6A7" stroke-width="1"/>
  <!-- Genotype ratio -->
  <text x="270" y="182" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#333">Расщепление по генотипу:</text>
  <rect x="270" y="188" width="45" height="18" rx="3" fill="#388E3C"/>
  <text x="292" y="201" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white">1 AA</text>
  <rect x="320" y="188" width="45" height="18" rx="3" fill="#66BB6A"/>
  <text x="342" y="201" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white">2 Aa</text>
  <rect x="370" y="188" width="45" height="18" rx="3" fill="#FFCC80"/>
  <text x="392" y="201" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#E65100">1 aa</text>
  <text x="430" y="201" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">= 1:2:1</text>
  <!-- Phenotype ratio -->
  <text x="270" y="224" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#333">Расщепление по фенотипу:</text>
  <circle cx="285" cy="240" r="10" fill="#FFD54F" stroke="#F57F17" stroke-width="1.2"/>
  <text x="285" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">3</text>
  <text x="300" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333">жёлтых</text>
  <circle cx="355" cy="240" r="10" fill="#81C784" stroke="#388E3C" stroke-width="1.2"/>
  <text x="355" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">1</text>
  <text x="370" y="244" font-family="Arial,sans-serif" font-size="9" fill="#333">зелёных</text>
  <text x="430" y="244" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#388E3C">= 3:1</text>
  <text x="270" y="258" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-style="italic">II закон Менделя: расщепление 3:1</text>

  <!-- Formulas box -->
  <rect x="15" y="273" width="470" height="67" rx="8" fill="white" opacity="0.9" filter="url(#shadow5)"/>
  <text x="250" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Алгоритм решения задач</text>
  <line x1="25" y1="297" x2="475" y2="297" stroke="#A5D6A7" stroke-width="1"/>
  <text x="25" y="312" font-family="Arial,sans-serif" font-size="9" fill="#333">1. Обозначить доминантный (A) и рецессивный (a) аллели</text>
  <text x="25" y="325" font-family="Arial,sans-serif" font-size="9" fill="#333">2. Записать генотипы родителей P и гаметы G</text>
  <text x="25" y="338" font-family="Arial,sans-serif" font-size="9" fill="#333">3. Построить решётку Пеннета → определить F₁ (генотип и фенотип)</text>
</svg>