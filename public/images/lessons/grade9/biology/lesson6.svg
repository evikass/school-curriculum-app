<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow6" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">Урок 6: Наследование, сцепленное с полом</text>

  <!-- Sex chromosomes diagram -->
  <rect x="15" y="60" width="170" height="95" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <text x="100" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Половые хромосомы</text>
  <line x1="25" y1="84" x2="175" y2="84" stroke="#A5D6A7" stroke-width="1"/>
  <!-- X chromosome -->
  <g transform="translate(45,100)">
    <path d="M0,0 Q10,15 0,30 Q-5,15 0,0" fill="#E91E63" stroke="#880E4F" stroke-width="1.5" opacity="0.8"/>
    <path d="M0,0 Q-10,15 0,30 Q5,15 0,0" fill="#E91E63" stroke="#880E4F" stroke-width="1.5" opacity="0.8"/>
    <text x="0" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#880E4F">X</text>
  </g>
  <!-- Y chromosome -->
  <g transform="translate(100,100)">
    <path d="M0,0 L0,18 L-6,30 M0,18 L6,30" fill="none" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0">Y</text>
  </g>
  <text x="30" y="150" font-family="Arial,sans-serif" font-size="8.5" fill="#E91E63">Женщина: XX</text>
  <text x="110" y="150" font-family="Arial,sans-serif" font-size="8.5" fill="#1565C0">Мужчина: XY</text>

  <!-- Inheritance pattern -->
  <rect x="195" y="60" width="290" height="95" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <text x="340" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Сцепление с X-хромосомой</text>
  <line x1="205" y1="84" x2="475" y2="84" stroke="#A5D6A7" stroke-width="1"/>
  <text x="205" y="100" font-family="Arial,sans-serif" font-size="9" fill="#333">Гены на X-хромосоме передаются:</text>
  <text x="205" y="115" font-family="Arial,sans-serif" font-size="9" fill="#E91E63">Мать → сын и дочь (через X)</text>
  <text x="205" y="130" font-family="Arial,sans-serif" font-size="9" fill="#1565C0">Отец → только дочь (дочери получают X)</text>
  <text x="205" y="145" font-family="Arial,sans-serif" font-size="9" fill="#1565C0">Отец → НЕ сын (Y от отца не содержит ген)</text>
  <text x="205" y="150" font-family="Arial,sans-serif" font-size="1" fill="transparent">.</text>

  <!-- Color blindness example -->
  <rect x="15" y="163" width="235" height="95" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <rect x="15" y="163" width="235" height="18" rx="8" fill="#E91E63" opacity="0.8"/>
  <rect x="15" y="175" width="235" height="6" fill="#E91E63" opacity="0.8"/>
  <text x="132" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" font-weight="bold" fill="white">Дальтонизм (Xᵈ / Xᴰ)</text>
  <!-- Color test circles -->
  <circle cx="40" cy="205" r="10" fill="#4CAF50"/>
  <circle cx="40" cy="205" r="6" fill="#F44336" opacity="0.6"/>
  <circle cx="65" cy="205" r="10" fill="#2196F3"/>
  <text x="80" y="200" font-family="Arial,sans-serif" font-size="8.5" fill="#333">Xᴰ — норм. зрение (домин.)</text>
  <text x="80" y="213" font-family="Arial,sans-serif" font-size="8.5" fill="#333">Xᵈ — дальтонизм (рецесс.)</text>
  <text x="25" y="230" font-family="Arial,sans-serif" font-size="8.5" fill="#333">XᴰXᴰ — здорова</text>
  <text x="25" y="242" font-family="Arial,sans-serif" font-size="8.5" fill="#333">XᴰXᵈ — носитель (здорова)</text>
  <text x="25" y="254" font-family="Arial,sans-serif" font-size="8.5" fill="#C62828">XᵈXᵈ — больна (редко)</text>
  <text x="130" y="254" font-family="Arial,sans-serif" font-size="8.5" fill="#C62828">XᵈY — болен (♂)</text>

  <!-- Hemophilia example -->
  <rect x="260" y="163" width="225" height="95" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <rect x="260" y="163" width="225" height="18" rx="8" fill="#1565C0" opacity="0.8"/>
  <rect x="260" y="175" width="225" height="6" fill="#1565C0" opacity="0.8"/>
  <text x="372" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="9.5" font-weight="bold" fill="white">Гемофилия (Xʰ / Xᴴ)</text>
  <!-- Blood drop -->
  <circle cx="285" cy="205" r="10" fill="#EF5350" opacity="0.7"/>
  <text x="285" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">🩸</text>
  <text x="300" y="200" font-family="Arial,sans-serif" font-size="8.5" fill="#333">Xᴴ — норм. свёртываемость</text>
  <text x="300" y="213" font-family="Arial,sans-serif" font-size="8.5" fill="#333">Xʰ — гемофилия (рецессивн.)</text>
  <text x="270" y="230" font-family="Arial,sans-serif" font-size="8.5" fill="#333">XᴴXᴴ — здорова</text>
  <text x="270" y="242" font-family="Arial,sans-serif" font-size="8.5" fill="#333">XᴴXʰ — носитель</text>
  <text x="270" y="254" font-family="Arial,sans-serif" font-size="8.5" fill="#C62828">XʰY — болен (только ♂)</text>

  <!-- Key rule -->
  <rect x="15" y="266" width="470" height="30" rx="6" fill="#66BB6A" opacity="0.15"/>
  <text x="250" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#388E3C">Мужчины болеют чаще: один рецессивный аллель на X проявляется (нет второго X)</text>

  <!-- Cross example -->
  <rect x="15" y="302" width="470" height="40" rx="8" fill="white" opacity="0.9" filter="url(#shadow6)"/>
  <text x="250" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#388E3C">Пример: XᴰXᵈ × XᴰY → XᴰXᴰ : XᴰXᵈ : XᴰY : XᵈY</text>
  <text x="250" y="334" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#333">Дочери: 50% здоровы, 50% носители | Сыновья: 50% здоровы, 50% дальтоники</text>
</svg>