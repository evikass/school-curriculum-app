<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <linearGradient id="treeGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#81C784"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#E8F5E9"/>
  <rect x="0" y="0" width="500" height="52" rx="12" fill="#388E3C"/>
  <rect x="0" y="20" width="500" height="32" fill="#388E3C"/>
  <!-- Header -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="white">Урок 1: Развитие эволюционных идей</text>
  <!-- Decorative line under header -->
  <line x1="50" y1="50" x2="450" y2="50" stroke="#A5D6A7" stroke-width="0.5" opacity="0.5"/>

  <!-- Evolutionary tree diagram -->
  <g transform="translate(120,200)">
    <!-- Trunk -->
    <rect x="-6" y="20" width="12" height="110" rx="4" fill="url(#treeGrad1)"/>
    <!-- Main branches -->
    <line x1="0" y1="20" x2="-60" y2="-30" stroke="#388E3C" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="50" y2="-20" stroke="#388E3C" stroke-width="4" stroke-linecap="round"/>
    <!-- Secondary branches left -->
    <line x1="-60" y1="-30" x2="-90" y2="-70" stroke="#43A047" stroke-width="3" stroke-linecap="round"/>
    <line x1="-60" y1="-30" x2="-35" y2="-75" stroke="#43A047" stroke-width="3" stroke-linecap="round"/>
    <!-- Secondary branches right -->
    <line x1="50" y1="-20" x2="25" y2="-65" stroke="#43A047" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="-20" x2="80" y2="-60" stroke="#43A047" stroke-width="3" stroke-linecap="round"/>
    <!-- Tertiary branches -->
    <line x1="-90" y1="-70" x2="-100" y2="-90" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
    <line x1="-35" y1="-75" x2="-25" y2="-95" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
    <line x1="25" y1="-65" x2="15" y2="-85" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
    <line x1="80" y1="-60" x2="90" y2="-80" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
    <!-- Species endpoints (leaves) -->
    <circle cx="-100" cy="-93" r="6" fill="#66BB6A"/>
    <text x="-100" y="-90" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="white">А</text>
    <circle cx="-25" cy="-98" r="6" fill="#81C784"/>
    <text x="-25" y="-95" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="white">Б</text>
    <circle cx="15" cy="-88" r="6" fill="#A5D6A7"/>
    <text x="15" y="-85" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">В</text>
    <circle cx="90" cy="-83" r="6" fill="#C8E6C9"/>
    <text x="90" y="-80" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">Г</text>
    <!-- Root label -->
    <text x="0" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-weight="bold">Общий предок</text>
    <!-- Time arrow -->
    <line x1="-115" y1="130" x2="-115" y2="-95" stroke="#999" stroke-width="1" stroke-dasharray="3,2"/>
    <polygon points="-115,-98 -118,-90 -112,-90" fill="#999"/>
    <text x="-118" y="25" text-anchor="end" font-family="Arial,sans-serif" font-size="7" fill="#999" transform="rotate(-90,-118,25)">Время</text>
    <!-- Tree label -->
    <text x="0" y="-100" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#388E3C">Филогенетическое древо</text>
  </g>

  <!-- Lamarck box -->
  <rect x="230" y="60" width="255" height="90" rx="8" fill="white" opacity="0.9" filter="url(#shadow1)"/>
  <rect x="230" y="60" width="255" height="20" rx="8" fill="#795548" opacity="0.85"/>
  <rect x="230" y="72" width="255" height="8" fill="#795548" opacity="0.85"/>
  <text x="357" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Ж.Б. Ламарк (1809)</text>
  <line x1="240" y1="86" x2="475" y2="86" stroke="#BCAAA4" stroke-width="1"/>
  <text x="245" y="100" font-family="Arial,sans-serif" font-size="9" fill="#333">• Творческая роль упражнения органов</text>
  <text x="245" y="113" font-family="Arial,sans-serif" font-size="9" fill="#333">• Наследование благоприобретённых признаков</text>
  <text x="245" y="126" font-family="Arial,sans-serif" font-size="9" fill="#333">• Внутреннее стремление к прогрессу</text>
  <text x="245" y="139" font-family="Arial,sans-serif" font-size="8" fill="#795548" font-style="italic">Пример: шея жирафа удлинилась от вытягивания</text>
  <text x="245" y="148" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828" font-style="italic">Ошибка: приобретённые признаки не наследуются</text>

  <!-- Darwin box -->
  <rect x="230" y="158" width="255" height="100" rx="8" fill="white" opacity="0.9" filter="url(#shadow1)"/>
  <rect x="230" y="158" width="255" height="20" rx="8" fill="#388E3C" opacity="0.9"/>
  <rect x="230" y="170" width="255" height="8" fill="#388E3C" opacity="0.9"/>
  <text x="357" y="174" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">Ч. Дарвин (1859)</text>
  <line x1="240" y1="184" x2="475" y2="184" stroke="#A5D6A7" stroke-width="1"/>
  <text x="245" y="198" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#388E3C">Основные положения:</text>
  <text x="245" y="211" font-family="Arial,sans-serif" font-size="9" fill="#333">1. Изменчивость организмов</text>
  <text x="245" y="224" font-family="Arial,sans-serif" font-size="9" fill="#333">2. Наследственность признаков</text>
  <text x="245" y="237" font-family="Arial,sans-serif" font-size="9" fill="#333">3. Борьба за существование</text>
  <text x="245" y="250" font-family="Arial,sans-serif" font-size="9" fill="#333">4. Естественный отбор — движущая сила</text>

  <!-- Key concept bottom -->
  <rect x="15" y="268" width="470" height="72" rx="8" fill="white" opacity="0.9" filter="url(#shadow1)"/>
  <text x="250" y="286" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#388E3C">Ключевые понятия</text>
  <line x1="25" y1="292" x2="475" y2="292" stroke="#A5D6A7" stroke-width="1"/>
  <text x="25" y="307" font-family="Arial,sans-serif" font-size="9" fill="#333">Эволюция — историческое развитие органического мира</text>
  <text x="25" y="320" font-family="Arial,sans-serif" font-size="9" fill="#333">Естественный отбор — выживание наиболее приспособленных</text>
  <text x="25" y="333" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-style="italic">Дарвин объяснил механизмы эволюции без сверхъестественных сил</text>
  <text x="25" y="340" font-family="Arial,sans-serif" font-size="7" fill="#888">Происхождение видов (1859) — главный труд Дарвина</text>
</svg>