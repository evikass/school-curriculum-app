<rect x="30" y="280" width="440" height="30" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="294" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Центры происхождения культурных растений (Вавилов): 8 центров</text>
<text x="250" y="305" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Закон гомологических рядов: сходные мутации у родственных видов</text>
<text x="250" y="316" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Полиплоидия: увеличение числа хромосомных наборов (3n, 4n)</text>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Биология 9 класс</text>
