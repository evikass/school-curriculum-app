<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b45309"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg8)" rx="12"/>
  <!-- Factory building -->
  <rect x="100" y="100" width="180" height="120" rx="4" fill="#92400e" stroke="#fbbf24" stroke-width="2"/>
  <rect x="100" y="80" width="30" height="50" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
  <rect x="160" y="70" width="25" height="60" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
  <!-- Smoke -->
  <circle cx="115" cy="65" r="8" fill="#d97706" opacity="0.4"/>
  <circle cx="108" cy="55" r="6" fill="#d97706" opacity="0.3"/>
  <circle cx="172" cy="55" r="7" fill="#d97706" opacity="0.4"/>
  <!-- Company name -->
  <text x="190" y="140" font-family="sans-serif" font-size="14" fill="#fbbf24" text-anchor="middle" font-weight="bold">ФИРМА</text>
  <text x="190" y="160" font-family="sans-serif" font-size="9" fill="#fde68a" text-anchor="middle">Цель: максимизация прибыли</text>
  <!-- Profit formula -->
  <rect x="120" y="175" width="140" height="30" rx="4" fill="#78350f"/>
  <text x="190" y="195" font-family="sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">Прибыль = Выручка − Издержки</text>
  <!-- Business forms on right -->
  <rect x="310" y="60" width="170" height="90" rx="8" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
  <text x="395" y="80" font-family="sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Формы фирм</text>
  <rect x="320" y="90" width="50" height="22" rx="4" fill="#b45309"/>
  <text x="345" y="105" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">ИП</text>
  <rect x="380" y="90" width="50" height="22" rx="4" fill="#92400e"/>
  <text x="405" y="105" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">Товарищ.</text>
  <rect x="440" y="90" width="30" height="22" rx="4" fill="#78350f"/>
  <text x="455" y="105" font-family="sans-serif" font-size="8" fill="#fde68a" text-anchor="middle">АО</text>
  <text x="395" y="135" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">1 владелец / партнёры / акционеры</text>
  <!-- Costs diagram -->
  <rect x="30" y="240" width="220" height="90" rx="6" fill="#78350f" stroke="#fbbf24" stroke-width="1"/>
  <text x="140" y="260" font-family="sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle" font-weight="bold">Издержки</text>
  <rect x="40" y="270" width="90" height="22" rx="4" fill="#92400e"/>
  <text x="85" y="285" font-family="sans-serif" font-size="8" fill="#fde68a" text-anchor="middle">Постоянные</text>
  <rect x="140" y="270" width="100" height="22" rx="4" fill="#b45309"/>
  <text x="190" y="285" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">Переменные</text>
  <text x="140" y="315" font-family="sans-serif" font-size="8" fill="#fde68a" text-anchor="middle">Аренда / Сырьё</text>
  <!-- Revenue on right -->
  <rect x="280" y="240" width="200" height="90" rx="6" fill="#78350f" stroke="#10b981" stroke-width="1.5"/>
  <text x="380" y="260" font-family="sans-serif" font-size="10" fill="#10b981" text-anchor="middle" font-weight="bold">Выручка</text>
  <text x="380" y="280" font-family="sans-serif" font-size="9" fill="#6ee7b7" text-anchor="middle">Выручка = Цена × Количество</text>
  <text x="330" y="305" font-family="sans-serif" font-size="8" fill="#86efac">Прибыль &gt; 0 → успех</text>
  <text x="330" y="320" font-family="sans-serif" font-size="8" fill="#fca5a5">Прибыль &lt; 0 → убытки</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Фирма в экономике</text>
</svg>