<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="12"/>
  <!-- Book of knowledge -->
  <rect x="160" y="80" width="180" height="130" rx="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <line x1="250" y1="85" x2="250" y2="205" stroke="#10b981" stroke-width="2"/>
  <line x1="170" y1="110" x2="240" y2="110" stroke="#059669" stroke-width="1.5"/>
  <line x1="170" y1="130" x2="235" y2="130" stroke="#059669" stroke-width="1.5"/>
  <line x1="170" y1="150" x2="230" y2="150" stroke="#059669" stroke-width="1.5"/>
  <line x1="170" y1="170" x2="238" y2="170" stroke="#059669" stroke-width="1.5"/>
  <line x1="170" y1="190" x2="220" y2="190" stroke="#059669" stroke-width="1.5"/>
  <!-- Greek column on right page -->
  <rect x="265" y="110" width="12" height="80" fill="#d1fae5" rx="2"/>
  <rect x="258" y="102" width="26" height="10" fill="#a7f3d0" rx="2"/>
  <rect x="258" y="188" width="26" height="8" fill="#a7f3d0" rx="2"/>
  <text x="280" y="150" font-family="serif" font-size="14" fill="#065f46" text-anchor="middle">οἶκος</text>
  <text x="280" y="170" font-family="serif" font-size="14" fill="#065f46" text-anchor="middle">νόμος</text>
  <!-- Magnifying glass -->
  <circle cx="350" cy="120" r="25" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <line x1="368" y1="138" x2="388" y2="158" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <!-- Micro/macro labels -->
  <rect x="60" y="100" width="80" height="30" rx="15" fill="#34d399" opacity="0.8"/>
  <text x="100" y="120" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Микро</text>
  <rect x="60" y="145" width="80" height="30" rx="15" fill="#059669" opacity="0.8"/>
  <text x="100" y="165" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Макро</text>
  <!-- Graph arrows -->
  <line x1="370" y1="230" x2="450" y2="230" stroke="#a7f3d0" stroke-width="2" marker-end="url(#arrowG)"/>
  <line x1="370" y1="230" x2="370" y2="170" stroke="#a7f3d0" stroke-width="2"/>
  <polyline points="380,225 400,210 420,200 440,180" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <!-- Pie chart -->
  <circle cx="120" cy="260" r="40" fill="#6ee7b7" stroke="white" stroke-width="2"/>
  <path d="M120,260 L120,220 A40,40 0 0,1 154,238 Z" fill="#059669"/>
  <path d="M120,260 L154,238 A40,40 0 0,1 140,296 Z" fill="#34d399"/>
  <!-- People icons -->
  <circle cx="350" cy="260" r="10" fill="#fbbf24"/>
  <rect x="342" y="272" width="16" height="20" rx="4" fill="#fbbf24"/>
  <circle cx="380" cy="255" r="8" fill="#fde68a"/>
  <rect x="374" y="265" width="12" height="16" rx="3" fill="#fde68a"/>
  <circle cx="410" cy="262" r="9" fill="#fcd34d"/>
  <rect x="403" y="273" width="14" height="18" rx="3" fill="#fcd34d"/>
  <!-- Functions list -->
  <text x="200" y="248" font-family="sans-serif" font-size="9" fill="#d1fae5">Познавательная</text>
  <text x="200" y="261" font-family="sans-serif" font-size="9" fill="#d1fae5">Практическая</text>
  <text x="200" y="274" font-family="sans-serif" font-size="9" fill="#d1fae5">Методологическая</text>
  <text x="200" y="287" font-family="sans-serif" font-size="9" fill="#d1fae5">Образовательная</text>
  <text x="200" y="300" font-family="sans-serif" font-size="9" fill="#d1fae5">Прогностическая</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Экономика как наука</text>
</svg>