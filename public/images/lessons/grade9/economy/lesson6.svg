<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#7f1d1d"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg6)" rx="12"/>
  <!-- Supply and demand graph -->
  <line x1="80" y1="280" x2="430" y2="280" stroke="#fca5a5" stroke-width="2"/>
  <line x1="80" y1="280" x2="80" y2="40" stroke="#fca5a5" stroke-width="2"/>
  <text x="440" y="284" font-family="sans-serif" font-size="10" fill="#fca5a5">Q</text>
  <text x="72" y="35" font-family="sans-serif" font-size="10" fill="#fca5a5">P</text>
  <!-- Demand curve (downward) -->
  <path d="M120,60 Q250,160 400,250" fill="none" stroke="#60a5fa" stroke-width="3"/>
  <text x="135" y="55" font-family="sans-serif" font-size="12" fill="#60a5fa" font-weight="bold">D</text>
  <!-- Supply curve (upward) -->
  <path d="M120,250 Q250,160 400,60" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <text x="405" y="55" font-family="sans-serif" font-size="12" fill="#fbbf24" font-weight="bold">S</text>
  <!-- Equilibrium point -->
  <circle cx="255" cy="155" r="8" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
  <text x="270" y="145" font-family="sans-serif" font-size="9" fill="#86efac" font-weight="bold">E (равновесие)</text>
  <!-- Dashed lines to axes -->
  <line x1="255" y1="155" x2="255" y2="280" stroke="#86efac" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="155" x2="255" y2="155" stroke="#86efac" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="60" y="158" font-family="sans-serif" font-size="8" fill="#86efac">P*</text>
  <text x="250" y="295" font-family="sans-serif" font-size="8" fill="#86efac">Q*</text>
  <!-- Surplus zone -->
  <rect x="260" y="85" width="100" height="45" rx="4" fill="#991b1b" opacity="0.5"/>
  <text x="310" y="105" font-family="sans-serif" font-size="8" fill="#fca5a5" text-anchor="middle">Избыток</text>
  <text x="310" y="120" font-family="sans-serif" font-size="7" fill="#fca5a5" text-anchor="middle">(P > P*)</text>
  <!-- Deficit zone -->
  <rect x="260" y="180" width="100" height="45" rx="4" fill="#991b1b" opacity="0.5"/>
  <text x="310" y="200" font-family="sans-serif" font-size="8" fill="#fca5a5" text-anchor="middle">Дефицит</text>
  <text x="310" y="215" font-family="sans-serif" font-size="7" fill="#fca5a5" text-anchor="middle">(P &lt; P*)</text>
  <!-- Elasticity indicator -->
  <rect x="30" y="30" width="130" height="55" rx="6" fill="#7f1d1d" stroke="#fbbf24" stroke-width="1"/>
  <text x="95" y="50" font-family="sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="bold">Эластичность</text>
  <text x="95" y="65" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">Хлеб — неэластичен</text>
  <text x="95" y="78" font-family="sans-serif" font-size="7" fill="#fde68a" text-anchor="middle">Ювелирки — эластичен</text>
  <!-- Laws on right -->
  <rect x="380" y="250" width="110" height="60" rx="6" fill="#7f1d1d" stroke="#60a5fa" stroke-width="1"/>
  <text x="435" y="270" font-family="sans-serif" font-size="8" fill="#93c5fd" text-anchor="middle" font-weight="bold">Законы:</text>
  <text x="435" y="285" font-family="sans-serif" font-size="7" fill="#bfdbfe" text-anchor="middle">↓ P = ↑ D (спрос)</text>
  <text x="435" y="300" font-family="sans-serif" font-size="7" fill="#bfdbfe" text-anchor="middle">↑ P = ↑ S (предлож.)</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Спрос и предложение</text>
</svg>