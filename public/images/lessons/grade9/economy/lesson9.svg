<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15803d"/>
      <stop offset="100%" style="stop-color:#14532d"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg9)" rx="12"/>
  <!-- Central bank building -->
  <rect x="180" y="40" width="140" height="90" rx="4" fill="#166534" stroke="#4ade80" stroke-width="2"/>
  <rect x="210" y="25" width="80" height="20" rx="4" fill="#15803d" stroke="#4ade80" stroke-width="1"/>
  <text x="250" y="39" font-family="sans-serif" font-size="8" fill="#bbf7d0" text-anchor="middle">ЦБ РФ</text>
  <!-- Columns -->
  <rect x="195" y="50" width="12" height="75" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="225" y="50" width="12" height="75" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="255" y="50" width="12" height="75" rx="2" fill="#22c55e" opacity="0.5"/>
  <rect x="285" y="50" width="12" height="75" rx="2" fill="#22c55e" opacity="0.5"/>
  <text x="250" y="85" font-family="sans-serif" font-size="10" fill="#bbf7d0" text-anchor="middle" font-weight="bold">Центральный</text>
  <text x="250" y="100" font-family="sans-serif" font-size="10" fill="#bbf7d0" text-anchor="middle" font-weight="bold">Банк</text>
  <!-- Key rate indicator -->
  <rect x="350" y="40" width="130" height="55" rx="6" fill="#14532d" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="415" y="60" font-family="sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="bold">Ключевая ставка</text>
  <text x="415" y="82" font-family="sans-serif" font-size="16" fill="#fde68a" text-anchor="middle" font-weight="bold">16%</text>
  <!-- Money types -->
  <!-- Cash -->
  <rect x="20" y="150" width="145" height="75" rx="8" fill="#166534" stroke="#4ade80" stroke-width="1"/>
  <text x="92" y="170" font-family="sans-serif" font-size="9" fill="#4ade80" text-anchor="middle" font-weight="bold">Наличные</text>
  <rect x="40" y="180" width="50" height="25" rx="3" fill="#22c55e"/>
  <text x="65" y="196" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">₽ ₽</text>
  <circle cx="120" cy="192" r="12" fill="#16a34a" stroke="#4ade80" stroke-width="1"/>
  <text x="120" y="196" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">₽</text>
  <!-- Cashless -->
  <rect x="180" y="150" width="145" height="75" rx="8" fill="#166534" stroke="#60a5fa" stroke-width="1"/>
  <text x="252" y="170" font-family="sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle" font-weight="bold">Безналичные</text>
  <rect x="200" y="182" width="45" height="28" rx="4" fill="#1e40af"/>
  <rect x="200" y="182" width="45" height="8" rx="2" fill="#3b82f6"/>
  <rect x="208" y="196" width="25" height="3" rx="1" fill="#93c5fd"/>
  <text x="275" y="200" font-family="sans-serif" font-size="7" fill="#bfdbfe">Карты</text>
  <!-- Crypto -->
  <rect x="340" y="150" width="140" height="75" rx="8" fill="#166534" stroke="#fbbf24" stroke-width="1"/>
  <text x="410" y="170" font-family="sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="bold">Криптовалюта</text>
  <circle cx="410" cy="200" r="15" fill="#b45309" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="410" y="205" font-family="sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">₿</text>
  <!-- Functions of money -->
  <rect x="20" y="245" width="460" height="70" rx="8" fill="#14532d" stroke="#4ade80" stroke-width="1"/>
  <text x="250" y="265" font-family="sans-serif" font-size="10" fill="#4ade80" text-anchor="middle" font-weight="bold">5 функций денег</text>
  <rect x="30" y="275" width="82" height="25" rx="4" fill="#166534"/>
  <text x="71" y="292" font-family="sans-serif" font-size="7" fill="#bbf7d0" text-anchor="middle">Мера стоим.</text>
  <rect x="120" y="275" width="82" height="25" rx="4" fill="#166534"/>
  <text x="161" y="292" font-family="sans-serif" font-size="7" fill="#bbf7d0" text-anchor="middle">Средство обращ.</text>
  <rect x="210" y="275" width="82" height="25" rx="4" fill="#166534"/>
  <text x="251" y="292" font-family="sans-serif" font-size="7" fill="#bbf7d0" text-anchor="middle">Накопление</text>
  <rect x="300" y="275" width="82" height="25" rx="4" fill="#166534"/>
  <text x="341" y="292" font-family="sans-serif" font-size="7" fill="#bbf7d0" text-anchor="middle">Средство плат.</text>
  <rect x="390" y="275" width="82" height="25" rx="4" fill="#166534"/>
  <text x="431" y="292" font-family="sans-serif" font-size="7" fill="#bbf7d0" text-anchor="middle">Мировые</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Деньги и банки</text>
</svg>