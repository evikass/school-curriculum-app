<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#9a3412"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg2)" rx="12"/>
  <!-- Maslow pyramid -->
  <polygon points="250,40 310,90 190,90" fill="#fbbf24"/>
  <polygon points="190,90 310,90 325,140 175,140" fill="#fb923c"/>
  <polygon points="175,140 325,140 340,190 160,190" fill="#f97316"/>
  <polygon points="160,190 340,190 355,240 145,240" fill="#ea580c"/>
  <polygon points="145,240 355,240 370,290 130,290" fill="#c2410c"/>
  <text x="250" y="75" font-family="sans-serif" font-size="8" fill="#92400e" text-anchor="middle" font-weight="bold">Самоактуализация</text>
  <text x="250" y="122" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Признание</text>
  <text x="250" y="170" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Социальные</text>
  <text x="250" y="220" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Безопасность</text>
  <text x="250" y="270" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Физиологические</text>
  <!-- Resources icons on left -->
  <circle cx="70" cy="90" r="30" fill="#fdba74" opacity="0.7"/>
  <text x="70" y="85" font-family="sans-serif" font-size="20" text-anchor="middle">🌍</text>
  <text x="70" y="105" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">Природа</text>
  <circle cx="70" cy="170" r="30" fill="#fdba74" opacity="0.7"/>
  <text x="70" y="165" font-family="sans-serif" font-size="20" text-anchor="middle">👷</text>
  <text x="70" y="185" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">Труд</text>
  <circle cx="70" cy="250" r="30" fill="#fdba74" opacity="0.7"/>
  <text x="70" y="245" font-family="sans-serif" font-size="20" text-anchor="middle">🏭</text>
  <text x="70" y="265" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle">Капитал</text>
  <!-- Scarcity vs infinity on right -->
  <rect x="390" y="60" width="90" height="50" rx="8" fill="#7c2d12" opacity="0.6"/>
  <text x="435" y="82" font-family="sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Потребности</text>
  <text x="435" y="98" font-family="sans-serif" font-size="10" fill="#fde68a" text-anchor="middle">∞</text>
  <rect x="390" y="130" width="90" height="50" rx="8" fill="#7c2d12" opacity="0.6"/>
  <text x="435" y="152" font-family="sans-serif" font-size="9" fill="#fbbf24" text-anchor="middle">Ресурсы</text>
  <text x="435" y="168" font-family="sans-serif" font-size="10" fill="#fde68a" text-anchor="middle">limited</text>
  <!-- Choice arrow -->
  <path d="M420,190 Q435,220 420,250" fill="none" stroke="#fbbf24" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="415,250 420,262 425,250" fill="#fbbf24"/>
  <text x="445" y="230" font-family="sans-serif" font-size="9" fill="#fde68a">Выбор!</text>
  <!-- Alternative costs box -->
  <rect x="380" y="270" width="110" height="50" rx="6" fill="#92400e" stroke="#fbbf24" stroke-width="1"/>
  <text x="435" y="290" font-family="sans-serif" font-size="8" fill="#fde68a" text-anchor="middle">Альтернативные</text>
  <text x="435" y="305" font-family="sans-serif" font-size="8" fill="#fde68a" text-anchor="middle">издержки</text>
  <text x="250" y="340" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle" opacity="0.5">Потребности и ресурсы</text>
</svg>