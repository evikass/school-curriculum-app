<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E63;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#F06292;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg3)"/>
  <!-- Soccer player kicking -->
  <g transform="translate(60,70)">
    <circle cx="25" cy="10" r="10" fill="#E91E63"/>
    <line x1="25" y1="20" x2="25" y2="55" stroke="#E91E63" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="10" y2="45" stroke="#E91E63" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="42" y2="18" stroke="#E91E63" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="10" y2="75" stroke="#E91E63" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="45" y2="70" stroke="#E91E63" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="70" r="8" fill="none" stroke="#F06292" stroke-width="2"/>
  </g>
  <!-- Basketball player jumping -->
  <g transform="translate(210,60)">
    <circle cx="25" cy="10" r="10" fill="#F06292"/>
    <line x1="25" y1="20" x2="25" y2="55" stroke="#F06292" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="8" y2="15" stroke="#F06292" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="42" y2="15" stroke="#F06292" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="10" y2="80" stroke="#F06292" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="40" y2="80" stroke="#F06292" stroke-width="3" stroke-linecap="round"/>
    <circle cx="45" cy="12" r="9" fill="#E91E63" opacity="0.6"/>
  </g>
  <!-- Swimmer -->
  <g transform="translate(360,75)">
    <circle cx="20" cy="15" r="10" fill="#EC407A"/>
    <line x1="30" y1="18" x2="50" y2="10" stroke="#EC407A" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="25" x2="20" y2="40" stroke="#EC407A" stroke-width="3" stroke-linecap="round"/>
    <path d="M0,45 Q25,30 50,45 Q75,60 100,45" fill="none" stroke="#F06292" stroke-width="2" opacity="0.5"/>
    <path d="M0,50 Q25,35 50,50 Q75,65 100,50" fill="none" stroke="#F06292" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Target/bullseye -->
  <g transform="translate(180,180)">
    <circle cx="60" cy="60" r="55" fill="none" stroke="#E91E63" stroke-width="2" opacity="0.4"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#E91E63" stroke-width="2" opacity="0.5"/>
    <circle cx="60" cy="60" r="25" fill="none" stroke="#E91E63" stroke-width="2" opacity="0.6"/>
    <circle cx="60" cy="60" r="10" fill="#E91E63" opacity="0.8"/>
  </g>
  <!-- Arrow hitting target -->
  <line x1="340" y1="160" x2="245" y2="235" stroke="#F06292" stroke-width="2"/>
  <polygon points="245,235 252,225 248,237" fill="#F06292"/>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">СФП</text>
</svg>