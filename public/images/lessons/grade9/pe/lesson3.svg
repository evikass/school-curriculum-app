<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#66BB6A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#66BB6A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 3. Самоконтроль и дозирование нагрузки</text>
  <!-- Heart rate panel -->
  <rect x="15" y="60" width="230" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="130" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Пульс (ЧСС)</text>
  <!-- Heart rate graph -->
  <line x1="30" y1="170" x2="220" y2="170" stroke="#999" stroke-width="0.5"/>
  <text x="25" y="105" fill="#666" font-size="7" font-family="Arial,sans-serif">180</text>
  <line x1="30" y1="103" x2="220" y2="103" stroke="#EEE" stroke-width="0.5"/>
  <text x="25" y="125" fill="#666" font-size="7" font-family="Arial,sans-serif">150</text>
  <line x1="30" y1="123" x2="220" y2="123" stroke="#EEE" stroke-width="0.5"/>
  <text x="25" y="147" fill="#666" font-size="7" font-family="Arial,sans-serif">120</text>
  <line x1="30" y1="145" x2="220" y2="145" stroke="#EEE" stroke-width="0.5"/>
  <!-- HR zones -->
  <rect x="35" y="95" width="50" height="8" fill="#E53935" opacity="0.3" rx="2"/>
  <text x="60" y="102" text-anchor="middle" fill="#E53935" font-size="6" font-family="Arial,sans-serif">макс.</text>
  <rect x="90" y="115" width="50" height="8" fill="#FF9800" opacity="0.3" rx="2"/>
  <text x="115" y="122" text-anchor="middle" fill="#FF9800" font-size="6" font-family="Arial,sans-serif">аэробн.</text>
  <rect x="145" y="140" width="50" height="8" fill="#66BB6A" opacity="0.3" rx="2"/>
  <text x="170" y="147" text-anchor="middle" fill="#2E7D32" font-size="6" font-family="Arial,sans-serif">пульс покоя</text>
  <text x="25" y="185" fill="#333" font-size="9" font-family="Arial,sans-serif">Покой: 60–80 уд/мин</text>
  <text x="25" y="198" fill="#333" font-size="9" font-family="Arial,sans-serif">Зона: 130–160 уд/мин (подрост.)</text>

  <!-- Fatigue signs -->
  <rect x="255" y="60" width="230" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="370" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Признаки утомления</text>
  <text x="265" y="100" fill="#E53935" font-size="9" font-weight="bold" font-family="Arial,sans-serif">⚠ Покраснение лица</text>
  <text x="265" y="113" fill="#E53935" font-size="9" font-family="Arial,sans-serif">⚠ Одышка, тяжёлое дыхание</text>
  <text x="265" y="126" fill="#E53935" font-size="9" font-family="Arial,sans-serif">⚠ Потоотделение сильное</text>
  <text x="265" y="139" fill="#E53935" font-size="9" font-family="Arial,sans-serif">⚠ Дрожание рук, ног</text>
  <text x="265" y="152" fill="#E53935" font-size="9" font-family="Arial,sans-serif">⚠ Головокружение, тошнота</text>
  <text x="265" y="165" fill="#E53935" font-size="9" font-family="Arial,sans-serif">⚠ Снижение координации</text>
  <text x="265" y="181" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">→ Прекратить, отдохнуть!</text>
  <text x="265" y="194" fill="#666" font-size="8" font-family="Arial,sans-serif">Восстановление: 3–5 мин</text>

  <!-- Self-monitoring -->
  <rect x="15" y="210" width="230" height="110" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="210" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="15" y="227" width="230" height="8" fill="#2E7D32"/>
  <text x="130" y="228" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Самоконтроль</text>
  <text x="25" y="252" fill="#333" font-size="9" font-family="Arial,sans-serif">• Дневник самоконтроля</text>
  <text x="25" y="265" fill="#333" font-size="9" font-family="Arial,sans-serif">• Пульс утром и после нагр.</text>
  <text x="25" y="278" fill="#333" font-size="9" font-family="Arial,sans-serif">• Вес, аппетит, сон</text>
  <text x="25" y="291" fill="#333" font-size="9" font-family="Arial,sans-serif">• Ортостатическая проба</text>
  <text x="25" y="304" fill="#333" font-size="9" font-family="Arial,sans-serif">• Проба с задержкой дыхания</text>
  <text x="25" y="317" fill="#333" font-size="9" font-family="Arial,sans-serif">• Приседания — ЧСС восст.</text>

  <!-- Dosing panel -->
  <rect x="255" y="210" width="230" height="110" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="210" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="255" y="227" width="230" height="8" fill="#2E7D32"/>
  <text x="370" y="228" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Дозирование нагрузки</text>
  <text x="265" y="252" fill="#333" font-size="9" font-family="Arial,sans-serif">• Постепенное увеличение</text>
  <text x="265" y="265" fill="#333" font-size="9" font-family="Arial,sans-serif">• 10% правило в неделю</text>
  <text x="265" y="278" fill="#333" font-size="9" font-family="Arial,sans-serif">• Чередование: нагр./отдых</text>
  <text x="265" y="291" fill="#333" font-size="9" font-family="Arial,sans-serif">• Индивидуальный подход</text>
  <text x="265" y="304" fill="#333" font-size="9" font-family="Arial,sans-serif">• Учёт возраста и здоровья</text>
  <text x="265" y="317" fill="#333" font-size="9" font-family="Arial,sans-serif">• Разминка → основа → заминка</text>
</svg>