<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5722;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FF8A65;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg5)"/>
  <!-- Running track lanes -->
  <g transform="translate(0,200)">
    <rect x="0" y="0" width="500" height="25" fill="#FF5722" opacity="0.15" rx="2"/>
    <rect x="0" y="28" width="500" height="25" fill="#FF5722" opacity="0.12" rx="2"/>
    <rect x="0" y="56" width="500" height="25" fill="#FF5722" opacity="0.09" rx="2"/>
    <line x1="0" y1="0" x2="500" y2="0" stroke="#FF5722" stroke-width="1" opacity="0.3"/>
    <line x1="0" y1="26" x2="500" y2="26" stroke="#FF5722" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="54" x2="500" y2="54" stroke="#FF5722" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="82" x2="500" y2="82" stroke="#FF5722" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Sprinter -->
  <g transform="translate(80,160)">
    <circle cx="25" cy="10" r="10" fill="#FF5722"/>
    <line x1="25" y1="20" x2="25" y2="55" stroke="#FF5722" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="8" y2="18" stroke="#FF5722" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="42" y2="20" stroke="#FF5722" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="8" y2="78" stroke="#FF5722" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="45" y2="72" stroke="#FF5722" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Speed lines -->
  <line x1="40" y1="190" x2="65" y2="190" stroke="#FF8A65" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="200" x2="60" y2="200" stroke="#FF8A65" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="210" x2="58" y2="210" stroke="#FF8A65" stroke-width="1.5" opacity="0.3"/>
  <!-- High jump bar -->
  <g transform="translate(320,50)">
    <rect x="0" y="50" width="6" height="100" fill="#FF8A65" opacity="0.5"/>
    <rect x="100" y="50" width="6" height="100" fill="#FF8A65" opacity="0.5"/>
    <rect x="0" y="50" width="106" height="4" fill="#FF5722" rx="1"/>
  </g>
  <!-- Javelin/throwing -->
  <line x1="340" y1="200" x2="420" y2="120" stroke="#FF8A65" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="420,120 415,128 425,125" fill="#FF8A65"/>
  <!-- Shot put circle -->
  <circle cx="450" cy="250" r="25" fill="none" stroke="#FF5722" stroke-width="2" opacity="0.4"/>
  <circle cx="450" cy="250" r="8" fill="#FF8A65" opacity="0.6"/>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Лёгкая атлетика</text>
</svg>