<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0277BD;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#01579B;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg10)"/>
  <!-- Water waves -->
  <path d="M0,150 Q50,130 100,150 Q150,170 200,150 Q250,130 300,150 Q350,170 400,150 Q450,130 500,150" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.5"/>
  <path d="M0,165 Q50,145 100,165 Q150,185 200,165 Q250,145 300,165 Q350,185 400,165 Q450,145 500,165" fill="#0277BD" opacity="0.15"/>
  <path d="M0,300 Q50,280 100,300 Q150,320 200,300 Q250,280 300,300 Q350,320 400,300 Q450,280 500,300" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.3"/>
  <!-- Swimmer (freestyle) -->
  <g transform="translate(100,100)">
    <circle cx="50" cy="20" r="12" fill="#4FC3F7"/>
    <line x1="40" y1="25" x2="10" y2="40" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="25" x2="65" y2="15" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
    <path d="M38,30 Q25,50 30,65" fill="none" stroke="#4FC3F7" stroke-width="3" stroke-linecap="round"/>
    <path d="M30,65 Q25,80 35,85" fill="none" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M30,65 Q20,75 15,70" fill="none" stroke="#4FC3F7" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Lane lines -->
  <g transform="translate(0,180)">
    <rect x="0" y="0" width="500" height="2" fill="#4FC3F7" opacity="0.2"/>
    <rect x="0" y="40" width="500" height="2" fill="#4FC3F7" opacity="0.2"/>
    <rect x="0" y="80" width="500" height="2" fill="#4FC3F7" opacity="0.2"/>
  </g>
  <!-- Lane markers (floating) -->
  <circle cx="50" cy="195" r="3" fill="#FF5722" opacity="0.5"/>
  <circle cx="150" cy="195" r="3" fill="#FFC107" opacity="0.5"/>
  <circle cx="250" cy="195" r="3" fill="#FF5722" opacity="0.5"/>
  <circle cx="350" cy="195" r="3" fill="#FFC107" opacity="0.5"/>
  <circle cx="450" cy="195" r="3" fill="#FF5722" opacity="0.5"/>
  <!-- Goggles -->
  <g transform="translate(350,60)">
    <ellipse cx="15" cy="10" rx="14" ry="10" fill="none" stroke="#4FC3F7" stroke-width="2"/>
    <ellipse cx="45" cy="10" rx="14" ry="10" fill="none" stroke="#4FC3F7" stroke-width="2"/>
    <line x1="29" y1="10" x2="31" y2="10" stroke="#4FC3F7" stroke-width="2"/>
    <line x1="0" y1="5" x2="5" y2="5" stroke="#4FC3F7" stroke-width="1.5"/>
    <line x1="59" y1="5" x2="65" y2="5" stroke="#4FC3F7" stroke-width="1.5"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Плавание</text>
</svg>