<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#66BB6A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#66BB6A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 10. Строевые упражнения</text>
  <!-- Formations -->
  <rect x="15" y="60" width="230" height="130" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="130" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Строи и шеренги</text>
  <!-- Single rank -->
  <circle cx="40" cy="105" r="5" fill="#66BB6A"/>
  <circle cx="55" cy="105" r="5" fill="#66BB6A"/>
  <circle cx="70" cy="105" r="5" fill="#66BB6A"/>
  <circle cx="85" cy="105" r="5" fill="#66BB6A"/>
  <text x="100" y="108" fill="#666" font-size="8" font-family="Arial,sans-serif">← шеренга</text>
  <!-- Column -->
  <circle cx="45" cy="130" r="5" fill="#2E7D32"/>
  <circle cx="45" cy="142" r="5" fill="#2E7D32"/>
  <circle cx="45" cy="154" r="5" fill="#2E7D32"/>
  <text x="60" y="143" fill="#666" font-size="8" font-family="Arial,sans-serif">← колонна</text>
  <text x="25" y="173" fill="#333" font-size="9" font-family="Arial,sans-serif">• Дистанция — расстояние вглубь</text>
  <text x="25" y="186" fill="#333" font-size="9" font-family="Arial,sans-serif">• Интервал — расстояние вширь</text>

  <!-- Commands -->
  <rect x="255" y="60" width="230" height="130" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="370" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Строевые команды</text>
  <text x="265" y="100" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Предварительные:</text>
  <text x="265" y="113" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Шагом марш!»</text>
  <text x="265" y="126" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Направо!»</text>
  <text x="265" y="139" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Кругом!»</text>
  <text x="265" y="155" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Исполнительные:</text>
  <text x="265" y="168" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Равняйсь!»</text>
  <text x="265" y="181" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Смирно!»</text>
  <text x="265" y="194" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Вольно!»</text>

  <!-- Turns and movements -->
  <rect x="15" y="200" width="230" height="120" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="200" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="15" y="217" width="230" height="8" fill="#2E7D32"/>
  <text x="130" y="218" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Повороты и перестроения</text>
  <text x="25" y="242" fill="#333" font-size="9" font-family="Arial,sans-serif">• Направо (на правой пятке)</text>
  <text x="25" y="255" fill="#333" font-size="9" font-family="Arial,sans-serif">• Налево (на левой пятке)</text>
  <text x="25" y="268" fill="#333" font-size="9" font-family="Arial,sans-serif">• Кругом (через левое плечо)</text>
  <text x="25" y="281" fill="#333" font-size="9" font-family="Arial,sans-serif">• Перестроение из 1 в 2 шеренги</text>
  <text x="25" y="294" fill="#333" font-size="9" font-family="Arial,sans-serif">• Перестроение в круг</text>
  <text x="25" y="310" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Координация и дисциплина!</text>

  <!-- Coordination -->
  <rect x="255" y="200" width="230" height="120" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="200" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="255" y="217" width="230" height="8" fill="#2E7D32"/>
  <text x="370" y="218" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Ходьба и бег в строю</text>
  <text x="265" y="242" fill="#333" font-size="9" font-family="Arial,sans-serif">• Строевой шаг (высокий)</text>
  <text x="265" y="255" fill="#333" font-size="9" font-family="Arial,sans-serif">• Обычный шаг, на месте</text>
  <text x="265" y="268" fill="#333" font-size="9" font-family="Arial,sans-serif">• Бег в колонну по одному</text>
  <text x="265" y="281" fill="#333" font-size="9" font-family="Arial,sans-serif">• Перемена направления</text>
  <text x="265" y="294" fill="#333" font-size="9" font-family="Arial,sans-serif">• Встречная колонна</text>
  <text x="265" y="310" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Змейка», «Диагональ»</text>
</svg>