<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg12)"/>
  <!-- Two fighters facing each other -->
  <!-- Fighter 1 (left) -->
  <g transform="translate(120,80)">
    <circle cx="25" cy="10" r="11" fill="#F44336"/>
    <line x1="25" y1="21" x2="25" y2="60" stroke="#F44336" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="25" y1="32" x2="45" y2="25" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="32" x2="10" y2="45" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="60" x2="12" y2="85" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="60" x2="40" y2="85" stroke="#F44336" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Fighter 2 (right) -->
  <g transform="translate(290,80)">
    <circle cx="25" cy="10" r="11" fill="#EF5350"/>
    <line x1="25" y1="21" x2="25" y2="60" stroke="#EF5350" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="25" y1="32" x2="5" y2="25" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="32" x2="40" y2="45" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="60" x2="12" y2="85" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="60" x2="40" y2="85" stroke="#EF5350" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Action lines between fighters -->
  <line x1="210" y1="100" x2="235" y2="100" stroke="#F44336" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="110" x2="240" y2="110" stroke="#EF5350" stroke-width="1.5" opacity="0.5"/>
  <line x1="210" y1="120" x2="235" y2="120" stroke="#F44336" stroke-width="1.5" opacity="0.4"/>
  <!-- Tatami/mat -->
  <rect x="60" y="200" width="380" height="80" fill="#F44336" opacity="0.08" rx="5"/>
  <line x1="250" y1="200" x2="250" y2="280" stroke="#F44336" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="240" x2="440" y2="240" stroke="#F44336" stroke-width="1" opacity="0.2"/>
  <!-- Belt -->
  <g transform="translate(170,210)">
    <ellipse cx="80" cy="15" rx="70" ry="20" fill="none" stroke="#FFC107" stroke-width="3" opacity="0.4"/>
    <line x1="80" y1="35" x2="70" y2="50" stroke="#FFC107" stroke-width="2" opacity="0.4"/>
    <line x1="80" y1="35" x2="90" y2="50" stroke="#FFC107" stroke-width="2" opacity="0.4"/>
  </g>
  <!-- Shield icon -->
  <g transform="translate(390,210)">
    <path d="M20,0 L40,8 L40,30 C40,45 20,55 20,55 C20,55 0,45 0,30 L0,8Z" fill="none" stroke="#EF5350" stroke-width="2" opacity="0.4"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Единоборства</text>
</svg>