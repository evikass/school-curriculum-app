<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#607D8B;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#90A4AE;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg15)"/>
  <!-- Gear/cog -->
  <g transform="translate(60,50)">
    <circle cx="40" cy="40" r="25" fill="none" stroke="#90A4AE" stroke-width="3" opacity="0.5"/>
    <circle cx="40" cy="40" r="12" fill="none" stroke="#90A4AE" stroke-width="2" opacity="0.4"/>
    <rect x="36" y="8" width="8" height="12" fill="#90A4AE" opacity="0.4" rx="1"/>
    <rect x="36" y="60" width="8" height="12" fill="#90A4AE" opacity="0.4" rx="1"/>
    <rect x="8" y="36" width="12" height="8" fill="#90A4AE" opacity="0.4" rx="1"/>
    <rect x="60" y="36" width="12" height="8" fill="#90A4AE" opacity="0.4" rx="1"/>
  </g>
  <!-- Briefcase -->
  <g transform="translate(200,50)">
    <rect x="0" y="15" width="60" height="40" fill="#607D8B" opacity="0.4" rx="5"/>
    <rect x="15" y="5" width="30" height="15" fill="none" stroke="#90A4AE" stroke-width="2" rx="3"/>
    <line x1="0" y1="30" x2="60" y2="30" stroke="#90A4AE" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Hard hat (construction) -->
  <g transform="translate(340,40)">
    <path d="M5,35 Q5,5 40,5 Q75,5 75,35Z" fill="#FF9800" opacity="0.5"/>
    <rect x="0" y="33" width="80" height="8" fill="#FF9800" opacity="0.4" rx="2"/>
  </g>
  <!-- Figure with weights (physical work) -->
  <g transform="translate(80,150)">
    <circle cx="30" cy="10" r="10" fill="#90A4AE"/>
    <line x1="30" y1="20" x2="30" y2="55" stroke="#90A4AE" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="10" y2="20" stroke="#90A4AE" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="50" y2="20" stroke="#90A4AE" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="55" x2="15" y2="80" stroke="#90A4AE" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="55" x2="45" y2="80" stroke="#90A4AE" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Weight box -->
    <rect x="0" y="15" width="12" height="10" fill="#607D8B" opacity="0.5" rx="1"/>
    <rect x="48" y="15" width="12" height="10" fill="#607D8B" opacity="0.5" rx="1"/>
  </g>
  <!-- Computer/desk worker -->
  <g transform="translate(250,150)">
    <rect x="0" y="30" width="60" height="40" fill="#607D8B" opacity="0.3" rx="3"/>
    <rect x="5" y="20" width="50" height="12" fill="#90A4AE" opacity="0.3" rx="2"/>
    <circle cx="30" cy="10" r="8" fill="#90A4AE" opacity="0.5"/>
    <line x1="30" y1="18" x2="30" y2="25" stroke="#90A4AE" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Arrow connecting fitness to career -->
  <g transform="translate(180,260)">
    <line x1="0" y1="20" x2="140" y2="20" stroke="#607D8B" stroke-width="2" opacity="0.5"/>
    <polygon points="140,20 130,14 130,26" fill="#607D8B" opacity="0.5"/>
    <text x="20" y="15" font-size="8" fill="#90A4AE" opacity="0.5" font-family="sans-serif">ЗДОРОВЬЕ</text>
    <text x="90" y="15" font-size="8" fill="#90A4AE" opacity="0.5" font-family="sans-serif">КАРЬЕРА</text>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Профессионально-прикладная ФП</text>
</svg>