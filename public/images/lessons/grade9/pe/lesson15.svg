<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#66BB6A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#66BB6A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 15. Формирование правильной осанки</text>
  <!-- Correct posture diagram -->
  <rect x="15" y="60" width="155" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="155" height="25" fill="#66BB6A" rx="8"/>
  <rect x="15" y="77" width="155" height="8" fill="#66BB6A"/>
  <text x="92" y="78" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" font-family="Arial,sans-serif">Правильная осанка</text>
  <!-- Stick figure with correct posture -->
  <circle cx="92" cy="100" r="8" fill="none" stroke="#66BB6A" stroke-width="2"/>
  <line x1="92" y1="108" x2="92" y2="150" stroke="#66BB6A" stroke-width="2"/>
  <line x1="92" y1="120" x2="75" y2="135" stroke="#66BB6A" stroke-width="2"/>
  <line x1="92" y1="120" x2="109" y2="135" stroke="#66BB6A" stroke-width="2"/>
  <line x1="92" y1="150" x2="80" y2="180" stroke="#66BB6A" stroke-width="2"/>
  <line x1="92" y1="150" x2="104" y2="180" stroke="#66BB6A" stroke-width="2"/>
  <text x="92" y="195" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold" font-family="Arial,sans-serif">Голова прямо</text>
  <text x="92" y="205" text-anchor="middle" fill="#666" font-size="7" font-family="Arial,sans-serif">Плечи на уровне</text>
  <text x="92" y="215" text-anchor="middle" fill="#666" font-size="7" font-family="Arial,sans-serif">Лопатки прижаты</text>
  <text x="92" y="225" text-anchor="middle" fill="#666" font-size="7" font-family="Arial,sans-serif">Живот подтянут</text>

  <!-- Posture disorders -->
  <rect x="175" y="60" width="155" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="175" y="60" width="155" height="25" fill="#E53935" rx="8"/>
  <rect x="175" y="77" width="155" height="8" fill="#E53935"/>
  <text x="252" y="78" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" font-family="Arial,sans-serif">Нарушения осанки</text>
  <!-- Slouching figure -->
  <circle cx="230" cy="103" r="7" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <path d="M230,110 Q228,130 230,150" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <text x="245" y="105" fill="#E53935" font-size="8" font-family="Arial,sans-serif">Круглая спина</text>
  <!-- Swayback figure -->
  <circle cx="230" cy="140" r="7" fill="none" stroke="#FF9800" stroke-width="1.5"/>
  <path d="M230,147 Q235,160 230,180" fill="none" stroke="#FF9800" stroke-width="1.5"/>
  <text x="245" y="155" fill="#FF9800" font-size="8" font-family="Arial,sans-serif">Прогнутая спина</text>
  <!-- Scoliosis -->
  <path d="M230,195 Q240,205 235,215 Q230,225 240,230" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <text x="250" y="215" fill="#7B1FA2" font-size="8" font-family="Arial,sans-serif">Сколиоз</text>

  <!-- Prevention exercises -->
  <rect x="335" y="60" width="150" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="335" y="60" width="150" height="25" fill="#66BB6A" rx="8"/>
  <rect x="335" y="77" width="150" height="8" fill="#66BB6A"/>
  <text x="410" y="78" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" font-family="Arial,sans-serif">Профилактика</text>
  <text x="345" y="100" fill="#333" font-size="8" font-family="Arial,sans-serif">• Правильная посадка</text>
  <text x="345" y="112" fill="#333" font-size="8" font-family="Arial,sans-serif">• Мебель по росту</text>
  <text x="345" y="124" fill="#333" font-size="8" font-family="Arial,sans-serif">• Рюкзак на 2 лямках</text>
  <text x="345" y="136" fill="#333" font-size="8" font-family="Arial,sans-serif">• Вес рюкзака до 10%</text>
  <text x="345" y="148" fill="#333" font-size="8" font-family="Arial,sans-serif">• Сон на ровном</text>
  <text x="345" y="160" fill="#333" font-size="8" font-family="Arial,sans-serif">• Контрастный душ</text>
  <text x="345" y="175" fill="#333" font-size="8" font-family="Arial,sans-serif">• Плавание!</text>
  <text x="345" y="190" fill="#333" font-size="8" font-family="Arial,sans-serif">• Двигательный режим</text>

  <!-- Exercises panel -->
  <rect x="15" y="210" width="230" height="110" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="210" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="15" y="227" width="230" height="8" fill="#2E7D32"/>
  <text x="130" y="228" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Упражнения для осанки</text>
  <text x="25" y="252" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Ласточка» — равновесие</text>
  <text x="25" y="265" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Лодочка» — лёжа на животе</text>
  <text x="25" y="278" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Рыбка» — прогиб спины</text>
  <text x="25" y="291" fill="#333" font-size="9" font-family="Arial,sans-serif">• Упор присев-упор лёжа</text>
  <text x="25" y="304" fill="#333" font-size="9" font-family="Arial,sans-serif">• Круги руками назад</text>
  <text x="25" y="317" fill="#333" font-size="9" font-family="Arial,sans-serif">• Ходьба с книгой на голове</text>

  <!-- Self-check -->
  <rect x="255" y="210" width="230" height="110" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="210" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="255" y="227" width="230" height="8" fill="#2E7D32"/>
  <text x="370" y="228" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Самоконтроль осанки</text>
  <text x="265" y="252" fill="#333" font-size="9" font-family="Arial,sans-serif">• У стены: 5 точек касания</text>
  <text x="265" y="265" fill="#333" font-size="9" font-family="Arial,sans-serif">  (затылок, лопатки, ягодицы,</text>
  <text x="265" y="278" fill="#333" font-size="9" font-family="Arial,sans-serif">   икры, пятки)</text>
  <text x="265" y="294" fill="#333" font-size="9" font-family="Arial,sans-serif">• Зеркало: симметрия плеч</text>
  <text x="265" y="307" fill="#333" font-size="9" font-family="Arial,sans-serif">• Фото сбоку: S-кривизна</text>
  <text x="265" y="323" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Обращаться к ортопеду!</text>
</svg>