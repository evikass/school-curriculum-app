<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#66BB6A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#66BB6A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 14. Развитие силы и быстроты</text>
  <!-- Strength exercises -->
  <rect x="15" y="60" width="230" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="130" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Силовые упражнения</text>
  <text x="25" y="100" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Собственным весом:</text>
  <text x="25" y="113" fill="#333" font-size="9" font-family="Arial,sans-serif">• Отжимания (м: 15+, д: 8+)</text>
  <text x="25" y="126" fill="#333" font-size="9" font-family="Arial,sans-serif">• Подтягивания (м: 8+)</text>
  <text x="25" y="139" fill="#333" font-size="9" font-family="Arial,sans-serif">• Приседания (20–30)</text>
  <text x="25" y="152" fill="#333" font-size="9" font-family="Arial,sans-serif">• Планка (60+ сек)</text>
  <text x="25" y="168" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">С отягощением:</text>
  <text x="25" y="181" fill="#333" font-size="9" font-family="Arial,sans-serif">• Гантели (1–3 кг)</text>
  <text x="25" y="194" fill="#333" font-size="9" font-family="Arial,sans-serif">• Набивной мяч (1–2 кг)</text>

  <!-- Speed training -->
  <rect x="255" y="60" width="230" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="370" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Быстрота и скорость</text>
  <text x="265" y="100" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Упражнения на быстроту:</text>
  <text x="265" y="113" fill="#333" font-size="9" font-family="Arial,sans-serif">• Бег 30 м (м: 5.0, д: 5.5)</text>
  <text x="265" y="126" fill="#333" font-size="9" font-family="Arial,sans-serif">• Бег 60 м (м: 8.8, д: 10.0)</text>
  <text x="265" y="139" fill="#333" font-size="9" font-family="Arial,sans-serif">• Челночный бег 3×10 м</text>
  <text x="265" y="155" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Методы развития:</text>
  <text x="265" y="168" fill="#333" font-size="9" font-family="Arial,sans-serif">• Повторный (макс. скорость)</text>
  <text x="265" y="181" fill="#333" font-size="9" font-family="Arial,sans-serif">• Игровой (подвижные игры)</text>
  <text x="265" y="194" fill="#333" font-size="9" font-family="Arial,sans-serif">• Соревновательный метод</text>

  <!-- Training principles -->
  <rect x="15" y="210" width="230" height="110" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="210" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="15" y="227" width="230" height="8" fill="#2E7D32"/>
  <text x="130" y="228" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Принципы тренировки</text>
  <text x="25" y="252" fill="#333" font-size="9" font-family="Arial,sans-serif">1. Постепенность нагрузки</text>
  <text x="25" y="265" fill="#333" font-size="9" font-family="Arial,sans-serif">2. Систематичность (3+ раз/нед)</text>
  <text x="25" y="278" fill="#333" font-size="9" font-family="Arial,sans-serif">3. Последовательность</text>
  <text x="25" y="291" fill="#333" font-size="9" font-family="Arial,sans-serif">4. Разнообразие упражнений</text>
  <text x="25" y="304" fill="#333" font-size="9" font-family="Arial,sans-serif">5. Чередование нагрузки/отдыха</text>
  <text x="25" y="317" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Суперкомпенсация!</text>

  <!-- Norms -->
  <rect x="255" y="210" width="230" height="110" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="210" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="255" y="227" width="230" height="8" fill="#2E7D32"/>
  <text x="370" y="228" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Нормативы 9 класс</text>
  <text x="265" y="249" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Сила (юн./дев.):</text>
  <text x="265" y="262" fill="#333" font-size="9" font-family="Arial,sans-serif">• Подтягивания: 8 / —</text>
  <text x="265" y="275" fill="#333" font-size="9" font-family="Arial,sans-serif">• Отжимания: 15 / 8</text>
  <text x="265" y="288" fill="#333" font-size="9" font-family="Arial,sans-serif">• Планка: 60 / 45 сек</text>
  <text x="265" y="304" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Быстрота:</text>
  <text x="265" y="317" fill="#333" font-size="9" font-family="Arial,sans-serif">• 30 м: 5.0 / 5.5 сек</text>
</svg>