<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3F51B5;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7986CB;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg14)"/>
  <!-- Wheelchair -->
  <g transform="translate(60,100)">
    <circle cx="15" cy="85" r="15" fill="none" stroke="#7986CB" stroke-width="2.5"/>
    <circle cx="75" cy="85" r="15" fill="none" stroke="#7986CB" stroke-width="2.5"/>
    <line x1="15" y1="70" x2="30" y2="30" stroke="#7986CB" stroke-width="2.5"/>
    <line x1="30" y1="30" x2="60" y2="30" stroke="#7986CB" stroke-width="2.5"/>
    <line x1="60" y1="30" x2="75" y2="70" stroke="#7986CB" stroke-width="2.5"/>
    <line x1="30" y1="50" x2="60" y2="50" stroke="#7986CB" stroke-width="2"/>
    <line x1="60" y1="50" x2="75" y2="70" stroke="#7986CB" stroke-width="2"/>
    <!-- Person in wheelchair -->
    <circle cx="45" cy="15" r="10" fill="#7986CB"/>
    <line x1="45" y1="25" x2="45" y2="50" stroke="#7986CB" stroke-width="3" stroke-linecap="round"/>
    <line x1="45" y1="35" x2="60" y2="30" stroke="#7986CB" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Paralympic symbol (3 agitos) -->
  <g transform="translate(250,60)">
    <path d="M30,0 C15,0 5,15 10,30 C15,45 30,50 30,50" fill="none" stroke="#E91E63" stroke-width="3" opacity="0.7"/>
    <path d="M50,0 C65,0 75,15 70,30 C65,45 50,50 50,50" fill="none" stroke="#2196F3" stroke-width="3" opacity="0.7"/>
    <path d="M40,30 C40,45 30,55 20,60 C30,55 40,60 40,60" fill="none" stroke="#4CAF50" stroke-width="3" opacity="0.7"/>
  </g>
  <!-- Accessible ramp -->
  <g transform="translate(250,160)">
    <line x1="0" y1="80" x2="180" y2="20" stroke="#7986CB" stroke-width="3"/>
    <line x1="0" y1="80" x2="180" y2="80" stroke="#7986CB" stroke-width="2" opacity="0.3"/>
    <line x1="180" y1="20" x2="180" y2="80" stroke="#7986CB" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Support/care hands -->
  <g transform="translate(300,240)">
    <path d="M0,30 Q20,0 50,10 Q80,20 100,5" fill="none" stroke="#3F51B5" stroke-width="3" opacity="0.4"/>
    <path d="M0,40 Q25,15 55,25 Q85,35 100,20" fill="none" stroke="#7986CB" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Heart with accessibility -->
  <g transform="translate(100,240)">
    <path d="M25,10 C25,0 10,0 10,12 C10,25 25,35 25,35 C25,35 40,25 40,12 C40,0 25,0 25,10Z" fill="#3F51B5" opacity="0.5"/>
    <circle cx="25" cy="18" r="4" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Адаптивная физическая культура</text>
</svg>