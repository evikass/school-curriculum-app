<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65100;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FF8A65;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg8)"/>
  <!-- Basketball court -->
  <rect x="30" y="40" width="440" height="250" fill="none" stroke="#E65100" stroke-width="2" opacity="0.4"/>
  <line x1="250" y1="40" x2="250" y2="290" stroke="#E65100" stroke-width="1.5" opacity="0.3"/>
  <circle cx="250" cy="165" r="35" fill="none" stroke="#E65100" stroke-width="1.5" opacity="0.3"/>
  <!-- Three-point lines -->
  <path d="M30,100 Q80,165 30,230" fill="none" stroke="#E65100" stroke-width="1" opacity="0.25"/>
  <path d="M470,100 Q420,165 470,230" fill="none" stroke="#E65100" stroke-width="1" opacity="0.25"/>
  <!-- Hoop left -->
  <rect x="25" y="145" width="5" height="40" fill="#FF8A65" opacity="0.6"/>
  <rect x="30" y="155" width="20" height="20" fill="none" stroke="#FF8A65" stroke-width="1.5" opacity="0.5"/>
  <path d="M30,175 L40,195 L50,175" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <!-- Hoop right -->
  <rect x="470" y="145" width="5" height="40" fill="#FF8A65" opacity="0.6"/>
  <rect x="450" y="155" width="20" height="20" fill="none" stroke="#FF8A65" stroke-width="1.5" opacity="0.5"/>
  <path d="M450,175 L460,195 L470,175" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
  <!-- Basketball -->
  <circle cx="250" cy="100" r="22" fill="#E65100" opacity="0.25" stroke="#FF8A65" stroke-width="2"/>
  <path d="M228,100 L272,100" fill="none" stroke="#FF8A65" stroke-width="1.5"/>
  <path d="M250,78 L250,122" fill="none" stroke="#FF8A65" stroke-width="1.5"/>
  <!-- Player jumping -->
  <g transform="translate(170,170)">
    <circle cx="20" cy="8" r="9" fill="#FF8A65"/>
    <line x1="20" y1="17" x2="20" y2="45" stroke="#FF8A65" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="25" x2="5" y2="10" stroke="#FF8A65" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="25" x2="38" y2="10" stroke="#FF8A65" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="45" x2="8" y2="65" stroke="#FF8A65" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="45" x2="35" y2="65" stroke="#FF8A65" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Баскетбол</text>
</svg>