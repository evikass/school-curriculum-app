<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#66BB6A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#66BB6A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 8. Волейбол</text>
  <!-- Rules panel -->
  <rect x="15" y="60" width="230" height="130" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="130" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Правила волейбола</text>
  <!-- Volleyball icon -->
  <circle cx="55" cy="110" r="18" fill="#FFF9C4" stroke="#FDD835" stroke-width="1.5"/>
  <line x1="37" y1="110" x2="73" y2="110" stroke="#FDD835" stroke-width="0.8"/>
  <line x1="55" y1="92" x2="55" y2="128" stroke="#FDD835" stroke-width="0.8"/>
  <line x1="42" y1="97" x2="68" y2="123" stroke="#FDD835" stroke-width="0.8"/>
  <text x="80" y="102" fill="#333" font-size="9" font-family="Arial,sans-serif">• 6 игроков на площадке</text>
  <text x="80" y="115" fill="#333" font-size="9" font-family="Arial,sans-serif">• 3 касания максимум</text>
  <text x="80" y="128" fill="#333" font-size="9" font-family="Arial,sans-serif">• Партия до 25 очков</text>
  <text x="25" y="148" fill="#333" font-size="9" font-family="Arial,sans-serif">• 5 партий (3 — победа)</text>
  <text x="25" y="161" fill="#333" font-size="9" font-family="Arial,sans-serif">• Переход через сетку</text>
  <text x="25" y="174" fill="#333" font-size="9" font-family="Arial,sans-serif">• Либеро — защитник</text>
  <text x="25" y="187" fill="#333" font-size="9" font-family="Arial,sans-serif">• Сетка: 2.43 м (м), 2.24 м (д)</text>

  <!-- Techniques -->
  <rect x="255" y="60" width="230" height="130" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="370" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Технические приёмы</text>
  <text x="265" y="100" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Подача:</text>
  <text x="265" y="113" fill="#333" font-size="9" font-family="Arial,sans-serif">• Нижняя прямая</text>
  <text x="265" y="126" fill="#333" font-size="9" font-family="Arial,sans-serif">• Верхняя прямая</text>
  <text x="265" y="139" fill="#333" font-size="9" font-family="Arial,sans-serif">• В прыжке (силовая)</text>
  <text x="265" y="155" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Приём:</text>
  <text x="265" y="168" fill="#333" font-size="9" font-family="Arial,sans-serif">• Двумя руками снизу</text>
  <text x="265" y="181" fill="#333" font-size="9" font-family="Arial,sans-serif">• Двумя руками сверху</text>
  <text x="265" y="194" fill="#333" font-size="9" font-family="Arial,sans-serif">• Одной рукой (падение)</text>

  <!-- Attack and block -->
  <rect x="15" y="200" width="230" height="120" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="200" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="15" y="217" width="230" height="8" fill="#2E7D32"/>
  <text x="130" y="218" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Нападение и блок</text>
  <text x="25" y="242" fill="#333" font-size="9" font-family="Arial,sans-serif">• Нападающий удар: разбег, прыжок</text>
  <text x="25" y="255" fill="#333" font-size="9" font-family="Arial,sans-serif">• Замах, хлёст кистью</text>
  <text x="25" y="268" fill="#333" font-size="9" font-family="Arial,sans-serif">• Блок: прыжок, руки над сеткой</text>
  <text x="25" y="281" fill="#333" font-size="9" font-family="Arial,sans-serif">• Одиночный и групповой блок</text>
  <text x="25" y="294" fill="#333" font-size="9" font-family="Arial,sans-serif">• Перевод в другую зону</text>
  <text x="25" y="310" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Расстановка: 1-6 зон (роза)</text>

  <!-- Court diagram -->
  <rect x="255" y="200" width="230" height="120" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="200" width="230" height="25" fill="#2E7D32" rx="8"/>
  <rect x="255" y="217" width="230" height="8" fill="#2E7D32"/>
  <text x="370" y="218" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Площадка и зоны</text>
  <rect x="280" y="235" width="180" height="70" fill="none" stroke="#66BB6A" stroke-width="1.5"/>
  <line x1="370" y1="235" x2="370" y2="305" stroke="#66BB6A" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="325" y="260" text-anchor="middle" fill="#666" font-size="8" font-family="Arial,sans-serif">4 3 2</text>
  <text x="325" y="280" text-anchor="middle" fill="#666" font-size="8" font-family="Arial,sans-serif">5 6 1</text>
  <text x="415" y="260" text-anchor="middle" fill="#666" font-size="8" font-family="Arial,sans-serif">4 3 2</text>
  <text x="415" y="280" text-anchor="middle" fill="#666" font-size="8" font-family="Arial,sans-serif">5 6 1</text>
  <text x="370" y="325" text-anchor="middle" fill="#666" font-size="8" font-family="Arial,sans-serif">18 м × 9 м (каждая половина 9×9)</text>
</svg>