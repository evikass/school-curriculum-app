<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#4DD0E1;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg13)"/>
  <!-- Heart rate monitor -->
  <g transform="translate(30,40)">
    <rect x="0" y="0" width="200" height="100" fill="#00BCD4" opacity="0.08" rx="10"/>
    <polyline points="20,60 50,60 60,30 70,90 80,40 90,70 100,55 110,60 140,60 150,30 160,90 170,40 180,60" fill="none" stroke="#4DD0E1" stroke-width="2" opacity="0.8"/>
    <text x="160" y="25" font-size="10" fill="#4DD0E1" opacity="0.6" font-family="sans-serif">BPM</text>
    <text x="160" y="45" font-size="18" fill="#00BCD4" opacity="0.7" font-family="sans-serif">142</text>
  </g>
  <!-- Yoga pose -->
  <g transform="translate(310,50)">
    <circle cx="40" cy="10" r="9" fill="#4DD0E1"/>
    <line x1="40" y1="19" x2="40" y2="50" stroke="#4DD0E1" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="30" x2="25" y2="20" stroke="#4DD0E1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="30" x2="55" y2="20" stroke="#4DD0E1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="50" x2="20" y2="55" stroke="#4DD0E1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="55" x2="40" y2="60" stroke="#4DD0E1" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Dumbbells -->
  <g transform="translate(50,200)">
    <rect x="0" y="8" width="12" height="24" rx="2" fill="#00BCD4" opacity="0.5"/>
    <rect x="12" y="16" width="40" height="8" rx="1" fill="#4DD0E1" opacity="0.4"/>
    <rect x="52" y="8" width="12" height="24" rx="2" fill="#00BCD4" opacity="0.5"/>
  </g>
  <!-- Kettlebell -->
  <g transform="translate(200,195)">
    <circle cx="30" cy="35" r="25" fill="#00838F" opacity="0.4"/>
    <path d="M15,15 Q15,0 30,0 Q45,0 45,15" fill="none" stroke="#4DD0E1" stroke-width="3" opacity="0.5"/>
  </g>
  <!-- Step platform -->
  <rect x="330" y="230" width="120" height="15" fill="#00BCD4" opacity="0.3" rx="3"/>
  <rect x="340" y="245" width="100" height="10" fill="#00838F" opacity="0.25" rx="2"/>
  <!-- Pulse zones chart -->
  <g transform="translate(50,270)">
    <rect x="0" y="0" width="80" height="8" fill="#4CAF50" opacity="0.4" rx="2"/>
    <rect x="0" y="12" width="120" height="8" fill="#00BCD4" opacity="0.4" rx="2"/>
    <rect x="0" y="24" width="160" height="8" fill="#FF9800" opacity="0.4" rx="2"/>
    <rect x="0" y="36" width="200" height="8" fill="#F44336" opacity="0.3" rx="2"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Фитнес</text>
</svg>