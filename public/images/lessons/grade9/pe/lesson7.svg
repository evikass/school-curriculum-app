<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#81C784;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg7)"/>
  <!-- Soccer field -->
  <rect x="30" y="40" width="440" height="240" fill="none" stroke="#4CAF50" stroke-width="2" opacity="0.5"/>
  <line x1="250" y1="40" x2="250" y2="280" stroke="#4CAF50" stroke-width="1.5" opacity="0.4"/>
  <circle cx="250" cy="160" r="40" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.4"/>
  <circle cx="250" cy="160" r="3" fill="#4CAF50" opacity="0.6"/>
  <!-- Penalty areas -->
  <rect x="30" y="100" width="70" height="120" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.3"/>
  <rect x="400" y="100" width="70" height="120" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.3"/>
  <!-- Goals -->
  <rect x="22" y="120" width="10" height="80" fill="none" stroke="#81C784" stroke-width="2" opacity="0.6"/>
  <rect x="468" y="120" width="10" height="80" fill="none" stroke="#81C784" stroke-width="2" opacity="0.6"/>
  <!-- Soccer ball -->
  <circle cx="250" cy="160" r="18" fill="#fff" opacity="0.15" stroke="#4CAF50" stroke-width="1.5"/>
  <path d="M250,142 L258,150 L255,162 L245,162 L242,150Z" fill="#4CAF50" opacity="0.3"/>
  <!-- Players dots -->
  <circle cx="100" cy="130" r="5" fill="#4CAF50" opacity="0.7"/>
  <circle cx="100" cy="190" r="5" fill="#4CAF50" opacity="0.7"/>
  <circle cx="160" cy="110" r="5" fill="#4CAF50" opacity="0.7"/>
  <circle cx="160" cy="160" r="5" fill="#4CAF50" opacity="0.7"/>
  <circle cx="160" cy="210" r="5" fill="#4CAF50" opacity="0.7"/>
  <circle cx="380" cy="130" r="5" fill="#81C784" opacity="0.7"/>
  <circle cx="380" cy="190" r="5" fill="#81C784" opacity="0.7"/>
  <circle cx="340" cy="110" r="5" fill="#81C784" opacity="0.7"/>
  <circle cx="340" cy="160" r="5" fill="#81C784" opacity="0.7"/>
  <circle cx="340" cy="210" r="5" fill="#81C784" opacity="0.7"/>
  <!-- Formation text -->
  <text x="120" y="310" font-size="8" fill="#4CAF50" opacity="0.4" font-family="sans-serif">4-4-2</text>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Футбол</text>
</svg>