<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="0" y="0" width="500" height="50" fill="#66BB6A" rx="12"/>
  <rect x="0" y="25" width="500" height="25" fill="#66BB6A"/>
  <text x="250" y="34" text-anchor="middle" fill="#FFF" font-size="16" font-weight="bold" font-family="Arial,sans-serif">Урок 6. Метание гранаты и мяча</text>
  <!-- Throwing technique -->
  <rect x="15" y="60" width="230" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="15" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="130" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Техника метания</text>
  <!-- Throw trajectory -->
  <path d="M40,170 Q120,80 210,160" fill="none" stroke="#66BB6A" stroke-width="2"/>
  <circle cx="40" cy="170" r="4" fill="#2E7D32"/>
  <circle cx="210" cy="160" r="4" fill="#E53935"/>
  <line x1="30" y1="175" x2="220" y2="175" stroke="#999" stroke-width="0.5"/>
  <text x="30" y="188" fill="#666" font-size="7" font-family="Arial,sans-serif">бросок</text>
  <text x="180" y="188" fill="#666" font-size="7" font-family="Arial,sans-serif">приземл.</text>
  <text x="25" y="200" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Фазы:</text>
  <text x="25" y="200" fill="#333" font-size="9" font-family="Arial,sans-serif">1. Держание (хват сверху)</text>
  <text x="25" y="213" fill="#333" font-size="9" font-family="Arial,sans-serif">2. Разбег (скрестный шаг)</text>
  <text x="25" y="226" fill="#333" font-size="9" font-family="Arial,sans-serif">3. Бросок (хлест кистью)</text>
  <text x="25" y="239" fill="#333" font-size="9" font-family="Arial,sans-serif">4. Торможение (после броска)</text>

  <!-- Key elements -->
  <rect x="255" y="60" width="230" height="140" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="255" y="60" width="230" height="25" fill="#66BB6A" rx="8"/>
  <rect x="255" y="77" width="230" height="8" fill="#66BB6A"/>
  <text x="370" y="78" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">Ключевые элементы</text>
  <text x="265" y="100" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Угол вылета:</text>
  <text x="265" y="113" fill="#333" font-size="9" font-family="Arial,sans-serif">• Мяч: 38–42°</text>
  <text x="265" y="126" fill="#333" font-size="9" font-family="Arial,sans-serif">• Граната: 40–44°</text>
  <text x="265" y="142" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Скорость вылета:</text>
  <text x="265" y="155" fill="#333" font-size="9" font-family="Arial,sans-serif">• Чем выше — тем дальше</text>
  <text x="265" y="171" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Работа тела:</text>
  <text x="265" y="184" fill="#333" font-size="9" font-family="Arial,sans-serif">• «Лук» — прогиб назад</text>
  <text x="265" y="197" fill="#333" font-size="9" font-family="Arial,sans-serif">• Вращение таза → плечи → рука</text>

  <!-- Safety -->
  <rect x="15" y="210" width="470" height="110" fill="#FFF" stroke="#66BB6A" stroke-width="1.5" rx="8"/>
  <rect x="15" y="210" width="470" height="25" fill="#E53935" rx="8"/>
  <rect x="15" y="227" width="470" height="8" fill="#E53935"/>
  <text x="250" y="228" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" font-family="Arial,sans-serif">⚠ Техника безопасности</text>
  <text x="25" y="252" fill="#333" font-size="9" font-family="Arial,sans-serif">• Метание ТОЛЬКО по команде преподавателя в указанном направлении</text>
  <text x="25" y="265" fill="#333" font-size="9" font-family="Arial,sans-serif">• Не стоять в секторе метания! Не подбирать снаряд без разрешения!</text>
  <text x="25" y="278" fill="#333" font-size="9" font-family="Arial,sans-serif">• Разминка: плечи, локти, запястья, пальцы — обязательна!</text>
  <text x="25" y="291" fill="#333" font-size="9" font-family="Arial,sans-serif">• Гранату держать крепко, мяч — удобным хватом</text>
  <text x="25" y="304" fill="#333" font-size="9" font-family="Arial,sans-serif">• После броска — не выходить за линию, тормозить</text>
  <text x="25" y="317" fill="#2E7D32" font-size="9" font-weight="bold" font-family="Arial,sans-serif">Нормативы (9 кл.): мяч 150 г — 40 м (м), 24 м (д); граната — 30 м (м), 18 м (д)</text>
</svg>