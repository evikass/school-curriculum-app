<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#F7931E;stop-opacity:0.08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg1)"/>
  <!-- Olympic rings -->
  <circle cx="170" cy="80" r="22" fill="none" stroke="#0081C8" stroke-width="3"/>
  <circle cx="215" cy="80" r="22" fill="none" stroke="#000" stroke-width="3"/>
  <circle cx="260" cy="80" r="22" fill="none" stroke="#EE334E" stroke-width="3"/>
  <circle cx="192" cy="100" r="22" fill="none" stroke="#FCB131" stroke-width="3"/>
  <circle cx="238" cy="100" r="22" fill="none" stroke="#00A651" stroke-width="3"/>
  <!-- Running figure -->
  <g transform="translate(100,140)">
    <circle cx="20" cy="10" r="12" fill="#FF6B35"/>
    <line x1="20" y1="22" x2="20" y2="65" stroke="#FF6B35" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="35" x2="5" y2="55" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="35" x2="38" y2="25" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="65" x2="5" y2="90" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="65" x2="38" y2="90" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Dumbbell -->
  <g transform="translate(280,160)">
    <rect x="0" y="10" width="15" height="30" rx="3" fill="#F7931E"/>
    <rect x="15" y="20" width="60" height="10" rx="2" fill="#DDD"/>
    <rect x="75" y="10" width="15" height="30" rx="3" fill="#F7931E"/>
  </g>
  <!-- Heart -->
  <g transform="translate(370,140)">
    <path d="M25,10 C25,0 10,0 10,12 C10,25 25,35 25,35 C25,35 40,25 40,12 C40,0 25,0 25,10Z" fill="#EE334E" opacity="0.8"/>
  </g>
  <!-- Trophy -->
  <g transform="translate(350,50)">
    <path d="M20,0 L40,0 L38,20 C38,30 30,35 30,35 L30,40 L22,40 L22,45 L38,45 L38,50 L12,50 L12,45 L28,45 L28,40 L20,40 L20,35 C20,35 12,30 12,20 L10,0Z" fill="#FCB131" opacity="0.9"/>
    <path d="M10,5 C0,5 0,20 10,20" fill="none" stroke="#FCB131" stroke-width="2"/>
    <path d="M40,5 C50,5 50,20 40,20" fill="none" stroke="#FCB131" stroke-width="2"/>
  </g>
  <!-- Stars -->
  <polygon points="80,200 83,210 93,210 85,216 88,226 80,220 72,226 75,216 67,210 77,210" fill="#FCB131" opacity="0.6"/>
  <polygon points="420,100 422,107 430,107 424,111 426,118 420,114 414,118 416,111 410,107 418,107" fill="#FCB131" opacity="0.4"/>
  <!-- Title -->
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">Физическая культура и спорт</text>
</svg>