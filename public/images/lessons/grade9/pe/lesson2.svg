<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:0.06"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="#1a1a2e"/>
  <rect width="500" height="350" fill="url(#bg2)"/>
  <!-- Push-up figure -->
  <g transform="translate(50,80)">
    <circle cx="30" cy="15" r="10" fill="#4CAF50"/>
    <line x1="30" y1="25" x2="30" y2="45" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="30" x2="10" y2="50" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="45" x2="70" y2="45" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="45" x2="70" y2="70" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
    <line x1="70" y1="70" x2="68" y2="70" stroke="#4CAF50" stroke-width="3"/>
  </g>
  <!-- Running figure -->
  <g transform="translate(200,80)">
    <circle cx="25" cy="10" r="10" fill="#8BC34A"/>
    <line x1="25" y1="20" x2="25" y2="55" stroke="#8BC34A" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="10" y2="45" stroke="#8BC34A" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="30" x2="40" y2="20" stroke="#8BC34A" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="10" y2="75" stroke="#8BC34A" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="55" x2="42" y2="75" stroke="#8BC34A" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Stretching figure -->
  <g transform="translate(350,90)">
    <circle cx="20" cy="10" r="10" fill="#66BB6A"/>
    <line x1="20" y1="20" x2="20" y2="55" stroke="#66BB6A" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="55" x2="0" y2="70" stroke="#66BB6A" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="55" x2="40" y2="70" stroke="#66BB6A" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="0" y2="15" stroke="#66BB6A" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="42" y2="20" stroke="#66BB6A" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Bar chart -->
  <g transform="translate(100,200)">
    <rect x="0" y="60" width="30" height="40" fill="#4CAF50" opacity="0.7" rx="2"/>
    <rect x="40" y="30" width="30" height="70" fill="#66BB6A" opacity="0.7" rx="2"/>
    <rect x="80" y="10" width="30" height="90" fill="#8BC34A" opacity="0.7" rx="2"/>
    <rect x="120" y="40" width="30" height="60" fill="#AED581" opacity="0.7" rx="2"/>
    <rect x="160" y="20" width="30" height="80" fill="#4CAF50" opacity="0.7" rx="2"/>
    <line x1="0" y1="100" x2="190" y2="100" stroke="#555" stroke-width="1"/>
  </g>
  <!-- Stop watch -->
  <g transform="translate(350,200)">
    <circle cx="40" cy="45" r="35" fill="none" stroke="#8BC34A" stroke-width="3"/>
    <circle cx="40" cy="45" r="3" fill="#8BC34A"/>
    <line x1="40" y1="45" x2="40" y2="20" stroke="#8BC34A" stroke-width="2" stroke-linecap="round"/>
    <line x1="40" y1="45" x2="55" y2="35" stroke="#66BB6A" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="35" y="5" width="10" height="8" fill="#8BC34A" rx="2"/>
  </g>
  <text x="250" y="340" text-anchor="middle" font-size="9" fill="#aaa" opacity="0.5" font-family="sans-serif">ОФП</text>
</svg>