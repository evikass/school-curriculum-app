<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Начальные сведения из статистики</text>

  <!-- Card 1: Bar chart -->
  <rect x="15" y="52" width="225" height="140" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="127" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Столбчатая диаграмма</text>
  <!-- Coordinate axes -->
  <line x1="40" y1="172" x2="220" y2="172" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="40" y1="172" x2="40" y2="78" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Arrow tips -->
  <polygon points="220,169 220,175 228,172" fill="#1565C0"/>
  <polygon points="37,78 43,78 40,70" fill="#1565C0"/>
  <!-- Grid lines -->
  <line x1="40" y1="150" x2="215" y2="150" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="40" y1="128" x2="215" y2="128" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="40" y1="106" x2="215" y2="106" stroke="#E3F2FD" stroke-width="0.5"/>
  <!-- Y-axis labels -->
  <text x="35" y="153" text-anchor="end" fill="#90CAF9" font-size="7">5</text>
  <text x="35" y="131" text-anchor="end" fill="#90CAF9" font-size="7">10</text>
  <text x="35" y="109" text-anchor="end" fill="#90CAF9" font-size="7">15</text>
  <text x="35" y="87" text-anchor="end" fill="#90CAF9" font-size="7">20</text>
  <!-- Bars -->
  <rect x="52" y="128" width="24" height="44" rx="3" fill="#64B5F6"/>
  <text x="64" y="124" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">10</text>
  <rect x="82" y="106" width="24" height="66" rx="3" fill="#42A5F5"/>
  <text x="94" y="102" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">15</text>
  <rect x="112" y="150" width="24" height="22" rx="3" fill="#1976D2"/>
  <text x="124" y="146" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">5</text>
  <rect x="142" y="84" width="24" height="88" rx="3" fill="#1565C0"/>
  <text x="154" y="80" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">20</text>
  <rect x="172" y="116" width="24" height="56" rx="3" fill="#0D47A1"/>
  <text x="184" y="112" text-anchor="middle" fill="white" font-size="7" font-weight="bold">13</text>
  <!-- X-axis labels -->
  <text x="64" y="183" text-anchor="middle" fill="#1565C0" font-size="7">Пн</text>
  <text x="94" y="183" text-anchor="middle" fill="#1565C0" font-size="7">Вт</text>
  <text x="124" y="183" text-anchor="middle" fill="#1565C0" font-size="7">Ср</text>
  <text x="154" y="183" text-anchor="middle" fill="#1565C0" font-size="7">Чт</text>
  <text x="184" y="183" text-anchor="middle" fill="#1565C0" font-size="7">Пт</text>

  <!-- Card 2: Mean, Median, Mode, Range -->
  <rect x="250" y="52" width="235" height="140" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="367" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Характеристики данных</text>
  <!-- Data set -->
  <text x="265" y="87" fill="#1565C0" font-size="8">Данные: 3, 5, 5, 7, 10</text>
  <!-- Mean -->
  <rect x="260" y="95" width="105" height="22" rx="10" fill="#0D47A1"/>
  <text x="312" y="110" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Среднее = 30/5 = 6</text>
  <!-- Dashed line from mean -->
  <line x1="260" y1="117" x2="475" y2="117" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Median -->
  <rect x="260" y="122" width="115" height="22" rx="10" fill="#1976D2"/>
  <text x="317" y="137" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Медиана = 5 (средний)</text>
  <!-- Mode -->
  <rect x="260" y="149" width="115" height="22" rx="10" fill="#42A5F5"/>
  <text x="317" y="164" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Мода = 5 (частый)</text>
  <!-- Range -->
  <rect x="260" y="176" width="115" height="22" rx="10" fill="#64B5F6"/>
  <text x="317" y="191" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Размах = 10-3 = 7</text>
  <!-- Labels on right -->
  <rect x="385" y="95" width="90" height="22" rx="10" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="430" y="110" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Σxi / n</text>
  <rect x="385" y="122" width="90" height="22" rx="10" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="430" y="137" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">упорядоч. середина</text>
  <rect x="385" y="149" width="90" height="22" rx="10" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="430" y="164" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">max частота</text>
  <rect x="385" y="176" width="90" height="22" rx="10" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="430" y="191" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">xmax - xmin</text>

  <!-- Dashed connecting line -->
  <line x1="240" y1="122" x2="250" y2="122" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Card 3: Number line visual for median -->
  <rect x="15" y="200" width="225" height="120" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="127" y="218" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Числовой ряд и медиана</text>
  <!-- Number line -->
  <line x1="30" y1="252" x2="225" y2="252" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="225,249 225,255 232,252" fill="#1565C0"/>
  <!-- Tick marks and values -->
  <line x1="40" y1="248" x2="40" y2="256" stroke="#1565C0" stroke-width="1"/>
  <text x="40" y="268" text-anchor="middle" fill="#1565C0" font-size="8">3</text>
  <circle cx="40" cy="248" r="4" fill="#64B5F6" stroke="#1565C0" stroke-width="1"/>

  <line x1="75" y1="248" x2="75" y2="256" stroke="#1565C0" stroke-width="1"/>
  <text x="75" y="268" text-anchor="middle" fill="#1565C0" font-size="8">5</text>
  <circle cx="75" cy="248" r="4" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>

  <line x1="110" y1="248" x2="110" y2="256" stroke="#1565C0" stroke-width="1"/>
  <text x="110" y="268" text-anchor="middle" fill="#1565C0" font-size="8">5</text>
  <circle cx="110" cy="248" r="4" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>

  <line x1="150" y1="248" x2="150" y2="256" stroke="#1565C0" stroke-width="1"/>
  <text x="150" y="268" text-anchor="middle" fill="#1565C0" font-size="8">7</text>
  <circle cx="150" cy="248" r="4" fill="#1976D2" stroke="#1565C0" stroke-width="1"/>

  <line x1="195" y1="248" x2="195" y2="256" stroke="#1565C0" stroke-width="1"/>
  <text x="195" y="268" text-anchor="middle" fill="#1565C0" font-size="8">10</text>
  <circle cx="195" cy="248" r="4" fill="#0D47A1" stroke="#1565C0" stroke-width="1"/>

  <!-- Median indicator arrow -->
  <line x1="110" y1="234" x2="110" y2="244" stroke="#0D47A1" stroke-width="2"/>
  <polygon points="107,244 113,244 110,248" fill="#0D47A1"/>
  <text x="110" y="232" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">Медиана = 5</text>
  <!-- Range bracket -->
  <line x1="40" y1="278" x2="195" y2="278" stroke="#42A5F5" stroke-width="1.5"/>
  <line x1="40" y1="275" x2="40" y2="281" stroke="#42A5F5" stroke-width="1.5"/>
  <line x1="195" y1="275" x2="195" y2="281" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="117" y="290" text-anchor="middle" fill="#42A5F5" font-size="8" font-weight="bold">Размах = 7</text>
  <!-- Mean marker -->
  <polygon points="124,296 128,302 120,302" fill="#1976D2"/>
  <text x="128" y="307" fill="#1976D2" font-size="7">Среднее=6</text>

  <!-- Card 4: Data collection process -->
  <rect x="250" y="200" width="235" height="120" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="367" y="218" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Этапы статистики</text>
  <!-- Process flow: circles connected by arrows -->
  <!-- Step 1 -->
  <circle cx="282" cy="245" r="16" fill="#0D47A1" stroke="#1565C0" stroke-width="1.5"/>
  <text x="282" y="249" text-anchor="middle" fill="white" font-size="8" font-weight="bold">1</text>
  <text x="282" y="270" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Сбор</text>
  <!-- Arrow -->
  <line x1="299" y1="245" x2="315" y2="245" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="315,242 315,248 321,245" fill="#42A5F5"/>
  <!-- Step 2 -->
  <circle cx="337" cy="245" r="16" fill="#1565C0" stroke="#1565C0" stroke-width="1.5"/>
  <text x="337" y="249" text-anchor="middle" fill="white" font-size="8" font-weight="bold">2</text>
  <text x="337" y="270" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Обработка</text>
  <!-- Arrow -->
  <line x1="354" y1="245" x2="370" y2="245" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="370,242 370,248 376,245" fill="#42A5F5"/>
  <!-- Step 3 -->
  <circle cx="392" cy="245" r="16" fill="#1976D2" stroke="#1565C0" stroke-width="1.5"/>
  <text x="392" y="249" text-anchor="middle" fill="white" font-size="8" font-weight="bold">3</text>
  <text x="392" y="270" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Анализ</text>
  <!-- Arrow -->
  <line x1="409" y1="245" x2="425" y2="245" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="425,242 425,248 431,245" fill="#42A5F5"/>
  <!-- Step 4 -->
  <circle cx="447" cy="245" r="16" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="447" y="249" text-anchor="middle" fill="white" font-size="8" font-weight="bold">4</text>
  <text x="447" y="270" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Выводы</text>
  <!-- Descriptive pills under steps -->
  <rect x="260" y="283" width="55" height="14" rx="7" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="287" y="293" text-anchor="middle" fill="#0D47A1" font-size="6">опрос</text>
  <rect x="318" y="283" width="55" height="14" rx="7" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="345" y="293" text-anchor="middle" fill="#0D47A1" font-size="6">таблицы</text>
  <rect x="376" y="283" width="55" height="14" rx="7" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="403" y="293" text-anchor="middle" fill="#0D47A1" font-size="6">графики</text>
  <rect x="434" y="283" width="40" height="14" rx="7" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="454" y="293" text-anchor="middle" fill="#0D47A1" font-size="6">решения</text>
  <!-- Key concepts -->
  <rect x="260" y="302" width="215" height="14" rx="7" fill="#0D47A1"/>
  <text x="367" y="313" text-anchor="middle" fill="#90CAF9" font-size="7" font-weight="bold">Выборка · Генеральная совокупность · Частота</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Среднее · Медиана · Мода · Размах — четыре характеристики данных</text>
</svg>