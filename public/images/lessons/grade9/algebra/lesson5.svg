<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Урок 5: Свойства квадратичной функции</text>

  <!-- Central parabola with monotonicity arrows -->
  <g filter="url(#shadow1)">
    <rect x="15" y="52" width="225" height="185" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="128" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Монотонность и экстремум</text>
    <line x1="25" y1="75" x2="230" y2="75" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Coordinate axes -->
    <line x1="35" y1="210" x2="225" y2="210" stroke="#666" stroke-width="1.2"/>
    <line x1="70" y1="82" x2="70" y2="228" stroke="#666" stroke-width="1.2"/>
    <polygon points="225,207 225,213 231,210" fill="#666"/>
    <polygon points="67,82 73,82 70,76" fill="#666"/>
    <text x="228" y="224" font-size="8" fill="#666">x</text>
    <text x="76" y="86" font-size="8" fill="#666">y</text>

    <!-- Parabola a>0 -->
    <path d="M40,215 Q60,185 80,155 Q95,130 110,120 Q125,130 140,155 Q160,185 180,215" fill="none" stroke="#1565C0" stroke-width="2.5"/>

    <!-- Monotonicity arrows on the left branch (decreasing) -->
    <path d="M65,175 L75,190" fill="none" stroke="#F44336" stroke-width="1.5" marker-end="url(#arrowRed)"/>
    <!-- Monotonicity arrows on the right branch (increasing) -->
    <path d="M145,155 L155,140" fill="none" stroke="#4CAF50" stroke-width="1.5"/>

    <!-- Decreasing arrow (left) -->
    <line x1="55" y1="160" x2="65" y2="185" stroke="#F44336" stroke-width="2"/>
    <polygon points="65,185 59,180 63,175" fill="#F44336"/>
    <text x="40" y="175" font-size="7" fill="#F44336" font-weight="bold">↓</text>

    <!-- Increasing arrow (right) -->
    <line x1="155" y1="145" x2="165" y2="120" stroke="#4CAF50" stroke-width="2"/>
    <polygon points="165,120 159,125 163,130" fill="#4CAF50"/>
    <text x="170" y="130" font-size="7" fill="#4CAF50" font-weight="bold">↑</text>

    <!-- Vertex point (minimum) -->
    <circle cx="110" cy="120" r="4" fill="#FF9800" stroke="white" stroke-width="1.5"/>
    <text x="120" y="115" font-size="7" fill="#FF9800" font-weight="bold">min</text>

    <!-- Axis of symmetry -->
    <line x1="110" y1="82" x2="110" y2="228" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="115" y="228" font-size="6" fill="#FF9800">x₀</text>

    <!-- Labels -->
    <text x="60" y="230" font-size="7" fill="#F44336">убывает</text>
    <text x="140" y="230" font-size="7" fill="#4CAF50">возрастает</text>
  </g>

  <!-- Connecting lines -->
  <line x1="240" y1="110" x2="258" y2="95" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="240" y1="180" x2="258" y2="195" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Sign intervals card -->
  <g filter="url(#shadow1)">
    <rect x="258" y="52" width="225" height="92" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="370" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Промежутки знаков</text>
    <line x1="268" y1="75" x2="473" y2="75" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Mini number line for sign intervals -->
    <line x1="275" y1="95" x2="465" y2="95" stroke="#666" stroke-width="1"/>
    <!-- Roots on mini line -->
    <circle cx="335" cy="95" r="3.5" fill="white" stroke="#F44336" stroke-width="1.5"/>
    <circle cx="410" cy="95" r="3.5" fill="white" stroke="#F44336" stroke-width="1.5"/>
    <text x="335" y="88" text-anchor="middle" font-size="7" fill="#F44336">x₁</text>
    <text x="410" y="88" text-anchor="middle" font-size="7" fill="#F44336">x₂</text>

    <!-- Sign labels -->
    <text x="305" y="92" text-anchor="middle" font-size="9" fill="#4CAF50" font-weight="bold">+</text>
    <text x="373" y="92" text-anchor="middle" font-size="9" fill="#F44336" font-weight="bold">-</text>
    <text x="445" y="92" text-anchor="middle" font-size="9" fill="#4CAF50" font-weight="bold">+</text>

    <circle cx="275" cy="112" r="3" fill="#1976D2"/>
    <text x="283" y="115" font-size="8" fill="#333">a>0: f(x)>0 при x&lt;x₁ и x>x₂</text>
    <circle cx="275" cy="128" r="3" fill="#1976D2"/>
    <text x="283" y="131" font-size="8" fill="#333">a>0: f(x)&lt;0 при x₁&lt;x&lt;x₂</text>
  </g>

  <!-- Even/odd & extrema card -->
  <g filter="url(#shadow1)">
    <rect x="258" y="152" width="225" height="85" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="370" y="170" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Чётность и экстремум</text>
    <line x1="268" y1="175" x2="473" y2="175" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Even function icon: symmetric shape -->
    <g transform="translate(278, 183)">
      <path d="M0,15 Q8,5 15,0 Q22,5 30,15" fill="none" stroke="#1565C0" stroke-width="1.5"/>
      <line x1="15" y1="-2" x2="15" y2="18" stroke="#FF9800" stroke-width="0.8" stroke-dasharray="2,2"/>
      <text x="15" y="28" text-anchor="middle" font-size="7" fill="#0D47A1">f(-x)=f(x)</text>
    </g>

    <text x="325" y="195" font-size="8" fill="#333">Не является чётной при b≠0</text>
    <text x="325" y="208" font-size="8" fill="#333">Чётная только при b=0</text>

    <!-- Extremum section -->
    <line x1="275" y1="216" x2="465" y2="216" stroke="#42A5F5" stroke-width="0.3"/>
    <circle cx="278" cy="226" r="3" fill="#FF9800"/>
    <text x="286" y="229" font-size="8" fill="#333">a>0 → минимум в x₀</text>
    <circle cx="278" cy="240" r="3" fill="#FF9800"/>
    <text x="286" y="243" font-size="8" fill="#333">a&lt;0 → максимум в x₀</text>
  </g>

  <!-- Concept pills -->
  <g transform="translate(25,260)">
    <rect x="0" y="0" width="90" height="18" rx="9" fill="#1565C0"/>
    <text x="45" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Монотонность</text>
  </g>
  <g transform="translate(125,260)">
    <rect x="0" y="0" width="85" height="18" rx="9" fill="#1976D2"/>
    <text x="42" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Экстремум</text>
  </g>
  <g transform="translate(220,260)">
    <rect x="0" y="0" width="100" height="18" rx="9" fill="#0D47A1"/>
    <text x="50" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Знакопост.</text>
  </g>
  <g transform="translate(330,260)">
    <rect x="0" y="0" width="75" height="18" rx="9" fill="#42A5F5"/>
    <text x="37" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Чётность</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="292" width="500" height="58" fill="#0D47A1" rx="8"/>
  <rect x="0" y="292" width="500" height="30" fill="#0D47A1"/>

  <!-- Key formulas in bottom bar -->
  <text x="250" y="314" text-anchor="middle" fill="#90CAF9" font-size="9" font-weight="bold">Ключевые свойства:</text>
  <text x="250" y="330" text-anchor="middle" fill="#64B5F6" font-size="8">a>0: убывает при x&lt;x₀, возрастает при x>x₀, min = y₀</text>
  <text x="250" y="344" text-anchor="middle" fill="#64B5F6" font-size="8">a&lt;0: возрастает при x&lt;x₀, убывает при x>x₀, max = y₀</text>
</svg>