<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0"/>
      <stop offset="100%" stop-color="#3F51B5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7986CB"/>
      <stop offset="100%" stop-color="#5C6BC0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.3"/>
  <!-- Corner decorations -->
  <polygon points="10,10 30,10 10,30" fill="#5C6BC0" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#3F51B5" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#5C6BC0" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#3F51B5" opacity="0.12"/>
  <!-- Title -->
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Арифметическая прогрессия</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Алгебра — Урок 5</text>
  <line x1="30" y1="70" x2="470" y2="70" stroke="#5C6BC0" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="67" width="60" height="5" fill="#5C6BC0" opacity="0.18" rx="1"/>
  <rect x="410" y="67" width="60" height="5" fill="#3F51B5" opacity="0.12" rx="1"/>

  <!-- Illustration area -->
  <rect x="15" y="76" width="470" height="222" rx="6" fill="#E8EAF6" opacity="0.4"/>

  <!-- Staircase visualization of arithmetic progression: 3, 7, 11, 15, 19, 23 -->
  <rect x="35" y="230" width="50" height="50" rx="3" fill="#5C6BC0" opacity="0.9"/>
  <text x="60" y="260" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">3</text>
  <text x="60" y="247" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">a₁</text>

  <rect x="95" y="195" width="50" height="85" rx="3" fill="#5C6BC0" opacity="0.8"/>
  <text x="120" y="243" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">7</text>
  <text x="120" y="210" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">a₂</text>

  <rect x="155" y="160" width="50" height="120" rx="3" fill="#5C6BC0" opacity="0.7"/>
  <text x="180" y="226" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">11</text>
  <text x="180" y="175" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">a₃</text>

  <rect x="215" y="125" width="50" height="155" rx="3" fill="#5C6BC0" opacity="0.6"/>
  <text x="240" y="209" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">15</text>
  <text x="240" y="140" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">a₄</text>

  <rect x="275" y="90" width="50" height="190" rx="3" fill="#5C6BC0" opacity="0.5"/>
  <text x="300" y="192" font-family="Arial,sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">19</text>
  <text x="300" y="105" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">a₅</text>

  <!-- d arrows between bars -->
  <line x1="85" y1="245" x2="95" y2="245" stroke="#E91E63" stroke-width="1.5"/>
  <text x="90" y="240" font-family="Arial,sans-serif" font-size="8" fill="#E91E63" text-anchor="middle">+d</text>
  <line x1="145" y1="210" x2="155" y2="210" stroke="#E91E63" stroke-width="1.5"/>
  <text x="150" y="205" font-family="Arial,sans-serif" font-size="8" fill="#E91E63" text-anchor="middle">+d</text>
  <line x1="205" y1="175" x2="215" y2="175" stroke="#E91E63" stroke-width="1.5"/>
  <text x="210" y="170" font-family="Arial,sans-serif" font-size="8" fill="#E91E63" text-anchor="middle">+d</text>
  <line x1="265" y1="140" x2="275" y2="140" stroke="#E91E63" stroke-width="1.5"/>
  <text x="270" y="135" font-family="Arial,sans-serif" font-size="8" fill="#E91E63" text-anchor="middle">+d</text>

  <!-- Trend line through top of bars -->
  <line x1="60" y1="230" x2="300" y2="90" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>

  <!-- d = 4 label -->
  <text x="170" y="88" font-family="Arial,sans-serif" font-size="12" fill="#E91E63" font-weight="bold" text-anchor="middle">d = 4</text>
  <text x="170" y="100" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">(разность)</text>

  <!-- Formulas box -->
  <rect x="338" y="82" width="142" height="105" rx="5" fill="white" opacity="0.92" stroke="#5C6BC0" stroke-width="1"/>
  <text x="409" y="99" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Формулы:</text>
  <line x1="348" y1="104" x2="470" y2="104" stroke="#5C6BC0" stroke-width="0.5" opacity="0.4"/>
  <text x="348" y="120" font-family="Arial,sans-serif" font-size="11" fill="#333">aₙ = a₁ + (n-1)d</text>
  <text x="348" y="138" font-family="Arial,sans-serif" font-size="11" fill="#333">d = aₙ₊₁ - aₙ</text>
  <text x="348" y="156" font-family="Arial,sans-serif" font-size="10" fill="#333">Sₙ = (a₁+aₙ)·n/2</text>
  <text x="348" y="174" font-family="Arial,sans-serif" font-size="9" fill="#888">Sₙ = (2a₁+(n-1)d)·n/2</text>

  <!-- Properties box -->
  <rect x="338" y="195" width="142" height="75" rx="5" fill="white" opacity="0.92" stroke="#5C6BC0" stroke-width="1"/>
  <text x="409" y="212" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#5C6BC0" text-anchor="middle">Свойства:</text>
  <line x1="348" y1="217" x2="470" y2="217" stroke="#5C6BC0" stroke-width="0.5" opacity="0.4"/>
  <text x="348" y="233" font-family="Arial,sans-serif" font-size="9.5" fill="#333">aₙ = (aₙ₋₁+aₙ₊₁)/2</text>
  <text x="348" y="249" font-family="Arial,sans-serif" font-size="9.5" fill="#333">d&gt;0 → возрастающая</text>
  <text x="348" y="263" font-family="Arial,sans-serif" font-size="9.5" fill="#333">d&lt;0 → убывающая</text>

  <!-- Example at bottom left -->
  <rect x="25" y="260" width="220" height="30" rx="4" fill="white" opacity="0.85" stroke="#5C6BC0" stroke-width="0.6"/>
  <text x="135" y="280" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">3, 7, 11, 15, 19, ... d=4</text>

  <!-- Bottom panel -->
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#panel)"/>
  <line x1="20" y1="308" x2="20" y2="334" stroke="#5C6BC0" stroke-width="1.5" opacity="0.6"/>
  <line x1="480" y1="308" x2="480" y2="334" stroke="#5C6BC0" stroke-width="1.5" opacity="0.6"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Алгебра — 9 класс</text>
</svg>