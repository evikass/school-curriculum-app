<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="ah5" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="40" y1="250" x2="470" y2="250" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah5)"/>
  <line x1="100" y1="330" x2="100" y2="15" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah5)"/>
  <!-- First line: y = -x + 5 -->
  <line x1="100" y1="170" x2="300" y2="270" stroke="#22d3ee" stroke-width="2.5"/>
  <!-- Second line: y = x + 1 -->
  <line x1="100" y1="70" x2="350" y2="195" stroke="#f59e0b" stroke-width="2.5"/>
  <!-- Intersection point (2, 3) mapped to pixel -->
  <circle cx="200" cy="170" r="6" fill="#ef4444"/>
  <!-- Bracket notation -->
  <text x="130" y="165" fill="#22d3ee" font-size="10" font-family="serif">{x+y=5</text>
  <text x="130" y="180" fill="#f59e0b" font-size="10" font-family="serif">{x−y=1</text>
  <!-- Dashed lines to axes -->
  <line x1="200" y1="170" x2="200" y2="250" stroke="#ef4444" stroke-width="0.8" stroke-dasharray="4,4"/>
  <line x1="200" y1="170" x2="100" y2="170" stroke="#ef4444" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- Labels on axes -->
  <text x="195" y="268" fill="#ef4444" font-size="11" font-family="serif">2</text>
  <text x="78" y="174" fill="#ef4444" font-size="11" font-family="serif">3</text>
  <text x="195" y="165" fill="#ef4444" font-size="10" font-family="serif">(2;3)</text>
  <!-- Methods -->
  <rect x="310" y="60" width="170" height="90" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="395" y="82" fill="#6366f1" font-size="10" font-family="sans-serif" text-anchor="middle">Способы решения:</text>
  <text x="320" y="100" fill="#22d3ee" font-size="9" font-family="sans-serif">1. Подстановка</text>
  <text x="320" y="115" fill="#f59e0b" font-size="9" font-family="sans-serif">2. Сложение</text>
  <text x="320" y="130" fill="#ec4899" font-size="9" font-family="sans-serif">3. Графический</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Системы уравнений</text>
</svg>