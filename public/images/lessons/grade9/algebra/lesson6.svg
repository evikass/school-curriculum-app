<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="ah6" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="40" y1="280" x2="470" y2="280" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah6)"/>
  <line x1="100" y1="330" x2="100" y2="15" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah6)"/>
  <!-- Parabola: y = x² -->
  <path d="M100,280 Q130,240 160,180 Q180,130 200,80 Q210,50 220,30" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M100,280 Q80,260 60,240 Q40,200 30,140" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Circle: x² + y² = 25, centered at (250,180), r=100 -->
  <circle cx="250" cy="180" r="100" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <!-- Line: y = -x + 5 -->
  <line x1="100" y1="80" x2="400" y2="280" stroke="#f59e0b" stroke-width="2"/>
  <!-- Intersection points -->
  <circle cx="180" cy="130" r="5" fill="#ef4444"/>
  <circle cx="320" cy="130" r="5" fill="#ef4444"/>
  <!-- Labels -->
  <text x="155" y="125" fill="#ef4444" font-size="10" font-family="serif">(2;3)</text>
  <text x="325" y="125" fill="#ef4444" font-size="10" font-family="serif">(3;2)</text>
  <text x="410" y="170" fill="#22d3ee" font-size="10" font-family="serif">x²+y²=25</text>
  <text x="350" y="260" fill="#f59e0b" font-size="10" font-family="serif">x+y=5</text>
  <text x="60" y="30" fill="#6366f1" font-size="9" font-family="serif">y=x²</text>
  <!-- Legend -->
  <rect x="320" y="50" width="160" height="50" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <line x1="330" y1="65" x2="350" y2="65" stroke="#22d3ee" stroke-width="2"/>
  <text x="355" y="68" fill="#ccc" font-size="9" font-family="sans-serif">Окружность</text>
  <line x1="330" y1="85" x2="350" y2="85" stroke="#f59e0b" stroke-width="2"/>
  <text x="355" y="88" fill="#ccc" font-size="9" font-family="sans-serif">Прямая</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Графический метод решения систем</text>
</svg>