<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Комбинаторика: перестановки, размещения, сочетания</text>

  <!-- Card 1: Factorial concept -->
  <rect x="15" y="52" width="145" height="135" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="87" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Факториал</text>
  <!-- Factorial formula pill -->
  <rect x="25" y="78" width="125" height="24" rx="10" fill="#0D47A1"/>
  <text x="87" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">n! = 1·2·3·...·n</text>
  <!-- Factorial values as blocks -->
  <text x="30" y="118" fill="#1565C0" font-size="9" font-weight="bold">1! = 1</text>
  <text x="30" y="132" fill="#1565C0" font-size="9" font-weight="bold">2! = 2</text>
  <text x="30" y="146" fill="#1565C0" font-size="9" font-weight="bold">3! = 6</text>
  <text x="30" y="160" fill="#1565C0" font-size="9" font-weight="bold">4! = 24</text>
  <text x="30" y="174" fill="#1565C0" font-size="9" font-weight="bold">5! = 120</text>
  <!-- Multiplication visualization for 4! -->
  <rect x="100" y="108" width="14" height="12" rx="3" fill="#42A5F5"/>
  <text x="107" y="118" text-anchor="middle" fill="white" font-size="7" font-weight="bold">1</text>
  <text x="116" y="117" fill="#90CAF9" font-size="7">×</text>
  <rect x="121" y="108" width="14" height="12" rx="3" fill="#1976D2"/>
  <text x="128" y="118" text-anchor="middle" fill="white" font-size="7" font-weight="bold">2</text>
  <text x="137" y="117" fill="#90CAF9" font-size="7">×</text>
  <rect x="100" y="124" width="14" height="12" rx="3" fill="#1565C0"/>
  <text x="107" y="134" text-anchor="middle" fill="white" font-size="7" font-weight="bold">3</text>
  <text x="116" y="133" fill="#90CAF9" font-size="7">×</text>
  <rect x="121" y="124" width="14" height="12" rx="3" fill="#0D47A1"/>
  <text x="128" y="134" text-anchor="middle" fill="white" font-size="7" font-weight="bold">4</text>

  <!-- Card 2: Permutations -->
  <rect x="170" y="52" width="155" height="135" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="247" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Перестановки</text>
  <!-- Formula pill -->
  <rect x="180" y="78" width="135" height="24" rx="10" fill="#0D47A1"/>
  <text x="247" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Pn = n!</text>
  <!-- Visual: 3 items rearranged -->
  <!-- Original order ABC -->
  <rect x="182" y="108" width="22" height="18" rx="4" fill="#42A5F5"/>
  <text x="193" y="121" text-anchor="middle" fill="white" font-size="9" font-weight="bold">A</text>
  <rect x="207" y="108" width="22" height="18" rx="4" fill="#1976D2"/>
  <text x="218" y="121" text-anchor="middle" fill="white" font-size="9" font-weight="bold">B</text>
  <rect x="232" y="108" width="22" height="18" rx="4" fill="#1565C0"/>
  <text x="243" y="121" text-anchor="middle" fill="white" font-size="9" font-weight="bold">C</text>
  <!-- Arrow -->
  <text x="247" y="137" text-anchor="middle" fill="#42A5F5" font-size="8">3! = 6 вариантов</text>
  <!-- All 6 permutations mini -->
  <text x="185" y="150" fill="#64B5F6" font-size="7">ABC</text>
  <text x="210" y="150" fill="#64B5F6" font-size="7">ACB</text>
  <text x="235" y="150" fill="#64B5F6" font-size="7">BAC</text>
  <text x="185" y="162" fill="#64B5F6" font-size="7">BCA</text>
  <text x="210" y="162" fill="#64B5F6" font-size="7">CAB</text>
  <text x="235" y="162" fill="#64B5F6" font-size="7">CBA</text>
  <!-- Definition pill -->
  <rect x="180" y="168" width="135" height="14" rx="7" fill="#42A5F5"/>
  <text x="247" y="179" text-anchor="middle" fill="white" font-size="7" font-weight="bold">порядок важен, все n элементов</text>

  <!-- Card 3: Arrangements -->
  <rect x="335" y="52" width="150" height="135" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="410" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Размещения</text>
  <!-- Formula pill -->
  <rect x="345" y="78" width="130" height="24" rx="10" fill="#0D47A1"/>
  <text x="410" y="95" text-anchor="middle" fill="white" font-size="10" font-weight="bold">A(n,k) = n!/(n-k)!</text>
  <!-- Visual: choosing 2 from 4 items -->
  <rect x="350" y="108" width="18" height="16" rx="4" fill="#42A5F5"/>
  <text x="359" y="120" text-anchor="middle" fill="white" font-size="8" font-weight="bold">A</text>
  <rect x="372" y="108" width="18" height="16" rx="4" fill="#1976D2"/>
  <text x="381" y="120" text-anchor="middle" fill="white" font-size="8" font-weight="bold">B</text>
  <rect x="394" y="108" width="18" height="16" rx="4" fill="#1565C0"/>
  <text x="403" y="120" text-anchor="middle" fill="white" font-size="8" font-weight="bold">C</text>
  <rect x="416" y="108" width="18" height="16" rx="4" fill="#0D47A1"/>
  <text x="425" y="120" text-anchor="middle" fill="white" font-size="8" font-weight="bold">D</text>
  <!-- Bracket showing choose 2 -->
  <text x="410" y="137" text-anchor="middle" fill="#42A5F5" font-size="8">из 4 по 2: A=4!/2!=12</text>
  <!-- Some arrangement examples -->
  <text x="355" y="150" fill="#64B5F6" font-size="7">AB BA</text>
  <text x="355" y="160" fill="#64B5F6" font-size="7">AC CA</text>
  <text x="355" y="170" fill="#64B5F6" font-size="7">AD DA</text>
  <text x="395" y="150" fill="#64B5F6" font-size="7">BC CB</text>
  <text x="395" y="160" fill="#64B5F6" font-size="7">BD DB</text>
  <text x="395" y="170" fill="#64B5F6" font-size="7">CD DC</text>
  <!-- Definition pill -->
  <rect x="345" y="178" width="130" height="14" rx="7" fill="#42A5F5"/>
  <text x="410" y="189" text-anchor="middle" fill="white" font-size="7" font-weight="bold">порядок важен, k из n</text>

  <!-- Dashed connecting lines between top cards -->
  <line x1="160" y1="120" x2="170" y2="120" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="325" y1="120" x2="335" y2="120" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Card 4: Combinations -->
  <rect x="15" y="197" width="235" height="123" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="132" y="215" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Сочетания</text>
  <!-- Formula pill -->
  <rect x="25" y="222" width="215" height="28" rx="10" fill="#0D47A1"/>
  <text x="132" y="241" text-anchor="middle" fill="white" font-size="11" font-weight="bold">C(n,k) = n! / (k!(n-k)!)</text>
  <!-- Visual: circles showing combinations -->
  <!-- 3 circles representing choose 2 from 3 -->
  <circle cx="45" cy="270" r="10" fill="#64B5F6" stroke="#1565C0" stroke-width="1"/>
  <text x="45" y="274" text-anchor="middle" fill="white" font-size="8" font-weight="bold">A</text>
  <circle cx="75" cy="270" r="10" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
  <text x="75" y="274" text-anchor="middle" fill="white" font-size="8" font-weight="bold">B</text>
  <circle cx="105" cy="270" r="10" fill="#1976D2" stroke="#1565C0" stroke-width="1"/>
  <text x="105" y="274" text-anchor="middle" fill="white" font-size="8" font-weight="bold">C</text>
  <!-- Dashed lines connecting pairs -->
  <line x1="55" y1="270" x2="65" y2="270" stroke="#42A5F5" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="85" y1="270" x2="95" y2="270" stroke="#42A5F5" stroke-width="1" stroke-dasharray="2,1"/>
  <!-- Pairs listed -->
  <text x="130" y="260" fill="#1565C0" font-size="8" font-weight="bold">Из 3 по 2:</text>
  <rect x="125" y="267" width="30" height="14" rx="7" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="140" y="277" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">AB</text>
  <rect x="160" y="267" width="30" height="14" rx="7" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="175" y="277" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">AC</text>
  <rect x="195" y="267" width="30" height="14" rx="7" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="210" y="277" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">BC</text>
  <text x="155" y="298" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">C(3,2) = 3!/(2!·1!) = 3</text>
  <!-- Definition pill -->
  <rect x="55" y="303" width="150" height="14" rx="7" fill="#42A5F5"/>
  <text x="130" y="313" text-anchor="middle" fill="white" font-size="7" font-weight="bold">порядок НЕ важен, k из n</text>

  <!-- Card 5: Comparison/Summary triangle -->
  <rect x="260" y="197" width="225" height="123" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="372" y="215" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Сравнение формул</text>
  <!-- Triangle diagram -->
  <!-- Top: Pn -->
  <rect x="340" y="225" width="65" height="22" rx="10" fill="#0D47A1"/>
  <text x="372" y="240" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Pn = n!</text>
  <!-- Left: An,k -->
  <rect x="270" y="265" width="85" height="22" rx="10" fill="#1976D2"/>
  <text x="312" y="280" text-anchor="middle" fill="white" font-size="8" font-weight="bold">A=n!/(n-k)!</text>
  <!-- Right: Cn,k -->
  <rect x="368" y="265" width="100" height="22" rx="10" fill="#42A5F5"/>
  <text x="418" y="280" text-anchor="middle" fill="white" font-size="8" font-weight="bold">C=n!/(k!(n-k)!)</text>
  <!-- Triangle connecting lines -->
  <line x1="372" y1="247" x2="312" y2="265" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="372" y1="247" x2="418" y2="265" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="355" y1="276" x2="368" y2="276" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Annotations -->
  <text x="322" y="256" fill="#64B5F6" font-size="7">все n</text>
  <text x="400" y="256" fill="#64B5F6" font-size="7">порядок</text>
  <text x="350" y="296" fill="#64B5F6" font-size="7">+ порядок</text>
  <!-- Key insight -->
  <rect x="270" y="300" width="210" height="14" rx="7" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <text x="375" y="311" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">A = C · k!  (размещение = сочетание × перестановка)</text>

  <!-- Dashed connecting line -->
  <line x1="250" y1="258" x2="260" y2="258" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">P=n! | A=n!/(n-k)! | C=n!/(k!(n-k)!) — порядок важен или нет?</text>
</svg>