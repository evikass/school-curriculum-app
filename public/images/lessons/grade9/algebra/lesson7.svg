<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Number line with progression -->
  <line x1="50" y1="100" x2="450" y2="100" stroke="#9ca3af" stroke-width="1"/>
  <!-- Progression blocks: 3, 7, 11, 15, 19, 23 -->
  <rect x="60" y="80" width="50" height="40" rx="4" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="85" y="105" fill="#ffffff" font-size="14" font-family="serif" text-anchor="middle">3</text>
  <rect x="125" y="80" width="50" height="40" rx="4" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="150" y="105" fill="#ffffff" font-size="14" font-family="serif" text-anchor="middle">7</text>
  <rect x="190" y="80" width="50" height="40" rx="4" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="215" y="105" fill="#ffffff" font-size="14" font-family="serif" text-anchor="middle">11</text>
  <rect x="255" y="80" width="50" height="40" rx="4" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="280" y="105" fill="#ffffff" font-size="14" font-family="serif" text-anchor="middle">15</text>
  <rect x="320" y="80" width="50" height="40" rx="4" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="345" y="105" fill="#ffffff" font-size="14" font-family="serif" text-anchor="middle">19</text>
  <rect x="385" y="80" width="50" height="40" rx="4" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="1.5"/>
  <text x="410" y="105" fill="#ffffff" font-size="14" font-family="serif" text-anchor="middle">23</text>
  <!-- d=4 arrows between blocks -->
  <text x="112" y="70" fill="#f59e0b" font-size="10" font-family="serif" text-anchor="middle">+4</text>
  <text x="177" y="70" fill="#f59e0b" font-size="10" font-family="serif" text-anchor="middle">+4</text>
  <text x="242" y="70" fill="#f59e0b" font-size="10" font-family="serif" text-anchor="middle">+4</text>
  <text x="307" y="70" fill="#f59e0b" font-size="10" font-family="serif" text-anchor="middle">+4</text>
  <text x="372" y="70" fill="#f59e0b" font-size="10" font-family="serif" text-anchor="middle">+4</text>
  <!-- Staircase visualization -->
  <polyline points="85,160 85,200 150,200 150,240 215,240 215,280 280,280 280,300 345,300 345,320 410,320" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="85" cy="160" r="3" fill="#22d3ee"/>
  <circle cx="150" cy="200" r="3" fill="#22d3ee"/>
  <circle cx="215" cy="240" r="3" fill="#22d3ee"/>
  <circle cx="280" cy="280" r="3" fill="#22d3ee"/>
  <circle cx="345" cy="300" r="3" fill="#22d3ee"/>
  <circle cx="410" cy="320" r="3" fill="#22d3ee"/>
  <!-- Formulas -->
  <text x="250" y="180" fill="#ec4899" font-size="12" font-family="serif" text-anchor="middle">aₙ = a₁ + (n−1)d</text>
  <text x="250" y="200" fill="#ec4899" font-size="12" font-family="serif" text-anchor="middle">Sₙ = (a₁ + aₙ)·n / 2</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Арифметическая прогрессия</text>
</svg>