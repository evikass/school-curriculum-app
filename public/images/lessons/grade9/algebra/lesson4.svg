<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Урок 4: Метод интервалов</text>

  <!-- Central number line card -->
  <g filter="url(#shadow1)">
    <rect x="15" y="52" width="470" height="105" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="250" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Числовая прямая и знаки функции</text>
    <line x1="25" y1="75" x2="475" y2="75" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Number line -->
    <line x1="40" y1="110" x2="460" y2="110" stroke="#333" stroke-width="1.5"/>
    <!-- Arrow tips -->
    <polygon points="460,107 460,113 468,110" fill="#333"/>
    <polygon points="40,107 40,113 32,110" fill="#333"/>

    <!-- Critical points (roots) -->
    <circle cx="150" cy="110" r="5" fill="white" stroke="#F44336" stroke-width="2"/>
    <text x="150" y="130" text-anchor="middle" font-size="8" fill="#F44336" font-weight="bold">x₁</text>

    <circle cx="300" cy="110" r="5" fill="white" stroke="#F44336" stroke-width="2"/>
    <text x="300" y="130" text-anchor="middle" font-size="8" fill="#F44336" font-weight="bold">x₂</text>

    <circle cx="400" cy="110" r="5" fill="white" stroke="#F44336" stroke-width="2"/>
    <text x="400" y="130" text-anchor="middle" font-size="8" fill="#F44336" font-weight="bold">x₃</text>

    <!-- Sign labels above intervals -->
    <text x="95" y="102" text-anchor="middle" font-size="10" fill="#4CAF50" font-weight="bold">+</text>
    <text x="225" y="102" text-anchor="middle" font-size="10" fill="#F44336" font-weight="bold">-</text>
    <text x="350" y="102" text-anchor="middle" font-size="10" fill="#4CAF50" font-weight="bold">+</text>
    <text x="440" y="102" text-anchor="middle" font-size="10" fill="#F44336" font-weight="bold">-</text>

    <!-- Interval shading: + green, - red -->
    <rect x="40" y="105" width="110" height="10" rx="2" fill="#4CAF50" opacity="0.2"/>
    <rect x="155" y="105" width="145" height="10" rx="2" fill="#F44336" opacity="0.15"/>
    <rect x="305" y="105" width="95" height="10" rx="2" fill="#4CAF50" opacity="0.2"/>
    <rect x="405" y="105" width="55" height="10" rx="2" fill="#F44336" opacity="0.15"/>

    <!-- Solution bracket for f(x) > 0 -->
    <line x1="40" y1="138" x2="150" y2="138" stroke="#4CAF50" stroke-width="2"/>
    <line x1="300" y1="138" x2="400" y2="138" stroke="#4CAF50" stroke-width="2"/>
    <text x="95" y="148" text-anchor="middle" font-size="7" fill="#4CAF50">x &lt; x₁</text>
    <text x="350" y="148" text-anchor="middle" font-size="7" fill="#4CAF50">x₂ &lt; x &lt; x₃</text>
  </g>

  <!-- Connecting lines to bottom cards -->
  <line x1="130" y1="157" x2="130" y2="172" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="370" y1="157" x2="370" y2="172" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Algorithm card (left) -->
  <g filter="url(#shadow1)">
    <rect x="15" y="172" width="225" height="100" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="128" y="190" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Алгоритм метода</text>
    <line x1="25" y1="195" x2="230" y2="195" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Step numbers -->
    <circle cx="35" cy="210" r="7" fill="#1565C0"/>
    <text x="35" y="213" text-anchor="middle" fill="white" font-size="7" font-weight="bold">1</text>
    <text x="47" y="213" font-size="8" fill="#333">Найти нули функции f(x) = 0</text>

    <circle cx="35" cy="228" r="7" fill="#1976D2"/>
    <text x="35" y="231" text-anchor="middle" fill="white" font-size="7" font-weight="bold">2</text>
    <text x="47" y="231" font-size="8" fill="#333">Отметить нули на числовой прямой</text>

    <circle cx="35" cy="246" r="7" fill="#42A5F5"/>
    <text x="35" y="249" text-anchor="middle" fill="white" font-size="7" font-weight="bold">3</text>
    <text x="47" y="249" font-size="8" fill="#333">Определить знаки в интервалах</text>

    <circle cx="35" cy="264" r="7" fill="#90CAF9"/>
    <text x="35" y="267" text-anchor="middle" fill="white" font-size="7" font-weight="bold">4</text>
    <text x="47" y="267" font-size="8" fill="#333">Выбрать нужные интервалы</text>
  </g>

  <!-- Sign rule card (right) -->
  <g filter="url(#shadow1)">
    <rect x="260" y="172" width="225" height="100" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="373" y="190" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Правило чередования знаков</text>
    <line x1="270" y1="195" x2="475" y2="195" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Visual: sign alternation pattern -->
    <g transform="translate(278, 205)">
      <!-- Simple root -->
      <rect x="0" y="0" width="190" height="16" rx="4" fill="#E3F2FD"/>
      <text x="5" y="12" font-size="8" fill="#0D47A1" font-weight="bold">Нечётная кратность:</text>
      <text x="130" y="12" font-size="9" fill="#4CAF50" font-weight="bold">+ → - → +</text>
    </g>
    <g transform="translate(278, 225)">
      <!-- Double root -->
      <rect x="0" y="0" width="190" height="16" rx="4" fill="#FFF3E0"/>
      <text x="5" y="12" font-size="8" fill="#E65100" font-weight="bold">Чётная кратность:</text>
      <text x="130" y="12" font-size="9" fill="#4CAF50" font-weight="bold">+ → +</text>
    </g>

    <text x="278" y="258" font-size="7" fill="#666">Корень чётной кратности: знак не меняется</text>
    <text x="278" y="268" font-size="7" fill="#666">Корень нечётной кратности: знак меняется</text>
  </g>

  <!-- Concept pills -->
  <g transform="translate(25,290)">
    <rect x="0" y="0" width="85" height="18" rx="9" fill="#1565C0"/>
    <text x="42" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Интервал</text>
  </g>
  <g transform="translate(120,290)">
    <rect x="0" y="0" width="85" height="18" rx="9" fill="#1976D2"/>
    <text x="42" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Нули</text>
  </g>
  <g transform="translate(215,290)">
    <rect x="0" y="0" width="85" height="18" rx="9" fill="#0D47A1"/>
    <text x="42" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Знаки</text>
  </g>
  <g transform="translate(310,290)">
    <rect x="0" y="0" width="120" height="18" rx="9" fill="#42A5F5"/>
    <text x="60" y="13" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Чередование</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="318" width="500" height="32" fill="#0D47A1" rx="8"/>
  <rect x="0" y="318" width="500" height="16" fill="#0D47A1"/>
  <text x="250" y="340" text-anchor="middle" fill="#90CAF9" font-size="9">Ключевое: знаки чередуются при переходе через нуль нечётной кратности</text>
</svg>