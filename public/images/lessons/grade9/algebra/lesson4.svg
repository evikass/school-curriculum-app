<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Number line -->
  <line x1="30" y1="120" x2="470" y2="120" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Points on line -->
  <circle cx="150" cy="120" r="5" fill="#ef4444" stroke="#ef4444"/>
  <circle cx="250" cy="120" r="5" fill="none" stroke="#ef4444" stroke-width="2"/>
  <circle cx="350" cy="120" r="5" fill="#ef4444" stroke="#ef4444"/>
  <!-- Intervals colored -->
  <line x1="30" y1="120" x2="150" y2="120" stroke="#22d3ee" stroke-width="4"/>
  <line x1="150" y1="120" x2="250" y2="120" stroke="#f59e0b" stroke-width="4"/>
  <line x1="250" y1="120" x2="350" y2="120" stroke="#22d3ee" stroke-width="4"/>
  <line x1="350" y1="120" x2="470" y2="120" stroke="#f59e0b" stroke-width="4"/>
  <!-- Signs -->
  <text x="90" y="110" fill="#22d3ee" font-size="14" font-family="serif" text-anchor="middle">+</text>
  <text x="200" y="110" fill="#f59e0b" font-size="14" font-family="serif" text-anchor="middle">−</text>
  <text x="300" y="110" fill="#22d3ee" font-size="14" font-family="serif" text-anchor="middle">+</text>
  <text x="410" y="110" fill="#f59e0b" font-size="14" font-family="serif" text-anchor="middle">−</text>
  <!-- Labels -->
  <text x="150" y="145" fill="#ef4444" font-size="11" font-family="serif" text-anchor="middle">x₁</text>
  <text x="250" y="145" fill="#ef4444" font-size="11" font-family="serif" text-anchor="middle">x₂</text>
  <text x="350" y="145" fill="#ef4444" font-size="11" font-family="serif" text-anchor="middle">x₃</text>
  <!-- Curve sketch -->
  <path d="M50,280 Q100,240 150,200 Q200,230 250,260 Q300,230 350,200 Q400,240 450,280" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Dashed lines from points to curve -->
  <line x1="150" y1="120" x2="150" y2="200" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="250" y1="120" x2="250" y2="260" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="350" y1="120" x2="350" y2="200" stroke="#ef4444" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- Title and formula -->
  <text x="250" y="50" fill="#22d3ee" font-size="14" font-family="serif" text-anchor="middle">Метод интервалов</text>
  <text x="250" y="75" fill="#9ca3af" font-size="11" font-family="serif" text-anchor="middle">(x−x₁)(x−x₂)(x−x₃) &gt; 0</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Метод интервалов</text>
</svg>