<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Сумма n первых членов геометрической прогрессии</text>

  <!-- Card 1: Main formula -->
  <rect x="15" y="52" width="225" height="130" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="127" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Формула суммы (q ≠ 1)</text>
  <!-- Main formula pill -->
  <rect x="25" y="78" width="205" height="30" rx="10" fill="#0D47A1"/>
  <text x="127" y="98" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Sn = b1(1 - q^n)/(1 - q)</text>
  <!-- When q=1 formula -->
  <rect x="25" y="115" width="205" height="24" rx="10" fill="#1976D2"/>
  <text x="127" y="132" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Если q = 1: Sn = n · b1</text>
  <!-- Concept pills -->
  <rect x="25" y="148" width="60" height="18" rx="10" fill="#42A5F5"/>
  <text x="55" y="160" text-anchor="middle" fill="white" font-size="8" font-weight="bold">b1 — 1-й</text>
  <rect x="92" y="148" width="63" height="18" rx="10" fill="#42A5F5"/>
  <text x="123" y="160" text-anchor="middle" fill="white" font-size="8" font-weight="bold">q — знам.</text>
  <rect x="162" y="148" width="68" height="18" rx="10" fill="#42A5F5"/>
  <text x="196" y="160" text-anchor="middle" fill="white" font-size="8" font-weight="bold">n — кол-во</text>

  <!-- Card 2: Derivation method (multiply by q) -->
  <rect x="250" y="52" width="235" height="130" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="367" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Вывод формулы</text>
  <!-- Step 1 -->
  <text x="265" y="88" fill="#1565C0" font-size="8" font-weight="bold">Sn = b1 + b1q + b1q² + ... + b1q^(n-1)</text>
  <!-- Arrow down -->
  <text x="367" y="100" text-anchor="middle" fill="#42A5F5" font-size="9">×q</text>
  <line x1="367" y1="102" x2="367" y2="108" stroke="#42A5F5" stroke-width="1.5"/>
  <polygon points="364,108 370,108 367,113" fill="#42A5F5"/>
  <!-- Step 2 -->
  <text x="265" y="120" fill="#1565C0" font-size="8">qSn = b1q + b1q² + ... + b1q^n</text>
  <!-- Subtraction arrow -->
  <text x="367" y="132" text-anchor="middle" fill="#1976D2" font-size="9" font-weight="bold">Sn - qSn</text>
  <line x1="367" y1="134" x2="367" y2="140" stroke="#1976D2" stroke-width="1.5"/>
  <polygon points="364,140 370,140 367,145" fill="#1976D2"/>
  <!-- Step 3: result -->
  <text x="265" y="155" fill="#0D47A1" font-size="8" font-weight="bold">Sn(1-q) = b1(1 - q^n)</text>
  <text x="265" y="170" fill="#0D47A1" font-size="8" font-weight="bold">Sn = b1(1 - q^n)/(1 - q)</text>

  <!-- Dashed connecting line -->
  <line x1="240" y1="117" x2="250" y2="117" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Card 3: Infinite geometric series |q|<1 -->
  <rect x="15" y="192" width="225" height="128" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="127" y="210" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Бесконечная сумма |q|&lt;1</text>
  <!-- Decay visual: shrinking bars -->
  <rect x="25" y="220" width="50" height="14" rx="3" fill="#0D47A1"/>
  <text x="50" y="231" text-anchor="middle" fill="white" font-size="7">b1</text>
  <rect x="80" y="220" width="35" height="14" rx="3" fill="#1565C0"/>
  <text x="97" y="231" text-anchor="middle" fill="white" font-size="7">b1q</text>
  <rect x="120" y="220" width="25" height="14" rx="3" fill="#1976D2"/>
  <text x="132" y="231" text-anchor="middle" fill="white" font-size="6">b1q²</text>
  <rect x="150" y="220" width="18" height="14" rx="3" fill="#42A5F5"/>
  <rect x="172" y="220" width="12" height="14" rx="3" fill="#64B5F6"/>
  <rect x="188" y="220" width="8" height="14" rx="3" fill="#90CAF9"/>
  <text x="205" y="231" fill="#42A5F5" font-size="8">→ 0</text>
  <!-- Dashed arrow showing convergence -->
  <line x1="25" y1="245" x2="210" y2="245" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="117" y="255" text-anchor="middle" fill="#1976D2" font-size="7">члены стремятся к 0</text>
  <!-- Formula for infinite sum -->
  <rect x="25" y="262" width="205" height="26" rx="10" fill="#0D47A1"/>
  <text x="127" y="280" text-anchor="middle" fill="white" font-size="12" font-weight="bold">S∞ = b1 / (1 - q)</text>
  <!-- Condition pill -->
  <rect x="55" y="295" width="145" height="18" rx="10" fill="#42A5F5"/>
  <text x="127" y="308" text-anchor="middle" fill="white" font-size="9" font-weight="bold">при |q| &lt; 1</text>

  <!-- Card 4: Example calculation -->
  <rect x="250" y="192" width="235" height="128" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="367" y="210" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Пример вычисления</text>
  <!-- Example 1: finite sum -->
  <text x="265" y="228" fill="#1565C0" font-size="8" font-weight="bold">Пример 1: b1=3, q=2, n=5</text>
  <text x="265" y="242" fill="#333" font-size="8">S5 = 3(1 - 2⁵)/(1 - 2)</text>
  <text x="280" y="254" fill="#333" font-size="8">= 3(1 - 32)/(-1)</text>
  <text x="280" y="266" fill="#333" font-size="8">= 3·31 = 93</text>
  <!-- Result pill 1 -->
  <rect x="350" y="256" width="115" height="16" rx="10" fill="#1976D2"/>
  <text x="407" y="268" text-anchor="middle" fill="white" font-size="8" font-weight="bold">S5 = 93</text>
  <!-- Example 2: infinite sum -->
  <text x="265" y="290" fill="#1565C0" font-size="8" font-weight="bold">Пример 2: b1=6, q=1/3</text>
  <text x="265" y="304" fill="#333" font-size="8">S∞ = 6/(1 - 1/3) = 6/(2/3) = 9</text>
  <!-- Result pill 2 -->
  <rect x="350" y="300" width="115" height="16" rx="10" fill="#0D47A1"/>
  <text x="407" y="312" text-anchor="middle" fill="white" font-size="8" font-weight="bold">S∞ = 9</text>

  <!-- Dashed connecting line between cards -->
  <line x1="240" y1="256" x2="250" y2="256" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Sn = b1(1-qⁿ)/(1-q)  |  S∞ = b1/(1-q) при |q|&lt;1</text>
</svg>