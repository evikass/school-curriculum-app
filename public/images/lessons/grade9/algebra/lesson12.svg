<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Системы уравнений второй степени</text>

  <!-- Card 1: Graphical solution — parabola + line intersection -->
  <rect x="15" y="52" width="230" height="138" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="130" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Графическое решение</text>
  <!-- Coordinate axes -->
  <line x1="40" y1="168" x2="225" y2="168" stroke="#90CAF9" stroke-width="1"/>
  <line x1="85" y1="78" x2="85" y2="180" stroke="#90CAF9" stroke-width="1"/>
  <polygon points="225,168 220,165 220,171" fill="#90CAF9"/>
  <polygon points="85,78 82,83 88,83" fill="#90CAF9"/>
  <text x="228" y="172" fill="#64B5F6" font-size="8">x</text>
  <text x="89" y="82" fill="#64B5F6" font-size="8">y</text>
  <!-- Grid -->
  <line x1="55" y1="78" x2="55" y2="180" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="115" y1="78" x2="115" y2="180" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="145" y1="78" x2="145" y2="180" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="175" y1="78" x2="175" y2="180" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="40" y1="148" x2="225" y2="148" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="40" y1="128" x2="225" y2="128" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="40" y1="108" x2="225" y2="108" stroke="#E3F2FD" stroke-width="0.5"/>
  <!-- Parabola y = x² -->
  <path d="M 40,100 Q 65,150 85,168 Q 105,148 115,128 Q 125,105 135,88" fill="none" stroke="#0D47A1" stroke-width="2"/>
  <path d="M 40,100 Q 50,115 55,128" fill="none" stroke="#0D47A1" stroke-width="2"/>
  <!-- Line y = 2x - 3 (rough) -->
  <line x1="50" y1="155" x2="190" y2="88" stroke="#1976D2" stroke-width="2"/>
  <!-- Intersection points -->
  <circle cx="60" cy="145" r="4" fill="#42A5F5" stroke="white" stroke-width="1.5"/>
  <circle cx="155" cy="95" r="4" fill="#42A5F5" stroke="white" stroke-width="1.5"/>
  <!-- Dashed projection lines from intersection points -->
  <line x1="60" y1="145" x2="60" y2="168" stroke="#42A5F5" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="155" y1="95" x2="155" y2="168" stroke="#42A5F5" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Labels -->
  <text x="40" y="180" fill="#1565C0" font-size="7">-2</text>
  <text x="83" y="180" fill="#1565C0" font-size="7">0</text>
  <text x="112" y="180" fill="#1565C0" font-size="7">1</text>
  <text x="142" y="180" fill="#1565C0" font-size="7">2</text>
  <text x="22" y="152" fill="#1565C0" font-size="7">1</text>
  <text x="22" y="132" fill="#1565C0" font-size="7">3</text>
  <text x="22" y="112" fill="#1565C0" font-size="7">5</text>
  <text x="195" y="95" fill="#0D47A1" font-size="8" font-style="italic">y = x²</text>
  <text x="155" y="85" fill="#1976D2" font-size="8" font-style="italic">y = 2x - 3</text>

  <!-- Card 2: Substitution method -->
  <rect x="260" y="52" width="225" height="138" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="372" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Метод подстановки</text>
  <!-- Step 1 -->
  <rect x="275" y="80" width="195" height="26" rx="6" fill="#E3F2FD" stroke="#64B5F6" stroke-width="0.5"/>
  <circle cx="285" cy="93" r="8" fill="#1565C0"/>
  <text x="285" y="97" text-anchor="middle" fill="white" font-size="9" font-weight="bold">1</text>
  <text x="300" y="97" fill="#0D47A1" font-size="9">Выразить y через x</text>
  <!-- Arrow down -->
  <line x1="285" y1="106" x2="285" y2="114" stroke="#42A5F5" stroke-width="1.5"/>
  <polygon points="285,117 282,112 288,112" fill="#42A5F5"/>
  <!-- Step 2 -->
  <rect x="275" y="118" width="195" height="26" rx="6" fill="#E3F2FD" stroke="#64B5F6" stroke-width="0.5"/>
  <circle cx="285" cy="131" r="8" fill="#1976D2"/>
  <text x="285" y="135" text-anchor="middle" fill="white" font-size="9" font-weight="bold">2</text>
  <text x="300" y="135" fill="#0D47A1" font-size="9">Подставить в ур-ние</text>
  <!-- Arrow down -->
  <line x1="285" y1="144" x2="285" y2="152" stroke="#42A5F5" stroke-width="1.5"/>
  <polygon points="285,155 282,150 288,150" fill="#42A5F5"/>
  <!-- Step 3 -->
  <rect x="275" y="156" width="195" height="26" rx="6" fill="#E3F2FD" stroke="#64B5F6" stroke-width="0.5"/>
  <circle cx="285" cy="169" r="8" fill="#42A5F5"/>
  <text x="285" y="173" text-anchor="middle" fill="white" font-size="9" font-weight="bold">3</text>
  <text x="300" y="173" fill="#0D47A1" font-size="9">Решить уравнение</text>

  <!-- Card 3: Example system -->
  <rect x="15" y="200" width="225" height="120" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="127" y="218" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Пример системы</text>
  <!-- System brace -->
  <path d="M 55,232 Q 45,232 45,242 Q 45,252 55,252 Q 45,252 45,262 Q 45,272 55,272" fill="none" stroke="#0D47A1" stroke-width="1.5"/>
  <!-- Equations -->
  <text x="65" y="246" fill="#1565C0" font-size="13" font-style="italic">y = x²</text>
  <text x="65" y="268" fill="#1976D2" font-size="13" font-style="italic">y = 2x - 3</text>
  <!-- Dashed connecting line showing equality -->
  <line x1="145" y1="243" x2="145" y2="265" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="155" y="256" fill="#42A5F5" font-size="9">=</text>
  <!-- Result pills -->
  <rect x="55" y="280" width="75" height="22" rx="10" fill="#0D47A1"/>
  <text x="92" y="295" text-anchor="middle" fill="white" font-size="9" font-weight="bold">(3; 9)</text>
  <rect x="140" y="280" width="90" height="22" rx="10" fill="#1565C0"/>
  <text x="185" y="295" text-anchor="middle" fill="white" font-size="9" font-weight="bold">(-1; 1)</text>
  <!-- Dashed lines to pills -->
  <line x1="92" y1="272" x2="92" y2="280" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="185" y1="272" x2="185" y2="280" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Card 4: Number of solutions concept -->
  <rect x="260" y="200" width="225" height="120" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="372" y="218" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Число решений</text>
  <!-- 0 solutions: line misses parabola -->
  <line x1="280" y1="240" x2="320" y2="240" stroke="#90CAF9" stroke-width="0.5"/>
  <line x1="295" y1="230" x2="295" y2="255" stroke="#90CAF9" stroke-width="0.5"/>
  <path d="M 280,248 Q 288,242 295,240 Q 302,242 310,250" fill="none" stroke="#0D47A1" stroke-width="1.2"/>
  <line x1="280" y1="252" x2="310" y2="252" stroke="#1976D2" stroke-width="1.2"/>
  <rect x="275" y="258" width="45" height="16" rx="8" fill="#1565C0"/>
  <text x="297" y="270" text-anchor="middle" fill="white" font-size="8" font-weight="bold">0</text>
  <!-- 1 solution: tangent -->
  <line x1="350" y1="240" x2="390" y2="240" stroke="#90CAF9" stroke-width="0.5"/>
  <line x1="365" y1="230" x2="365" y2="255" stroke="#90CAF9" stroke-width="0.5"/>
  <path d="M 350,248 Q 358,242 365,240 Q 372,242 380,250" fill="none" stroke="#0D47A1" stroke-width="1.2"/>
  <line x1="355" y1="240" x2="380" y2="240" stroke="#1976D2" stroke-width="1.2"/>
  <circle cx="365" cy="240" r="2.5" fill="#42A5F5"/>
  <rect x="345" y="258" width="45" height="16" rx="8" fill="#1976D2"/>
  <text x="367" y="270" text-anchor="middle" fill="white" font-size="8" font-weight="bold">1</text>
  <!-- 2 solutions: secant -->
  <line x1="420" y1="240" x2="460" y2="240" stroke="#90CAF9" stroke-width="0.5"/>
  <line x1="435" y1="230" x2="435" y2="255" stroke="#90CAF9" stroke-width="0.5"/>
  <path d="M 420,248 Q 428,242 435,240 Q 442,242 450,250" fill="none" stroke="#0D47A1" stroke-width="1.2"/>
  <line x1="422" y1="246" x2="450" y2="248" stroke="#1976D2" stroke-width="1.2"/>
  <circle cx="428" cy="244" r="2" fill="#42A5F5"/>
  <circle cx="445" cy="247" r="2" fill="#42A5F5"/>
  <rect x="415" y="258" width="45" height="16" rx="8" fill="#0D47A1"/>
  <text x="437" y="270" text-anchor="middle" fill="white" font-size="8" font-weight="bold">2</text>
  <!-- Dashed connecting lines -->
  <line x1="297" y1="274" x2="367" y2="274" stroke="#42A5F5" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="367" y1="274" x2="437" y2="274" stroke="#42A5F5" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Summary text -->
  <text x="372" y="306" text-anchor="middle" fill="#1565C0" font-size="9">Прямая и парабола</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Решение системы — общие точки графиков уравнений</text>
</svg>