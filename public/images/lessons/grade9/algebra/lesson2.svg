<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="ah2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <!-- Axes -->
  <line x1="40" y1="200" x2="470" y2="200" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah2)"/>
  <line x1="250" y1="330" x2="250" y2="15" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah2)"/>
  <!-- Parabola y = x² - 4x + 3, vertex (2,-1) mapped: center at (250,200), scale ~60px per unit -->
  <!-- Vertex at x=2 maps to 250+2*60=370... let me recalc -->
  <!-- Origin at (130,200), 60px per unit, vertex (2, -1) -> (250, 260) -->
  <!-- Points: (0,3)->(130,20), (1,0)->(190,200), (2,-1)->(250,260), (3,0)->(310,200), (4,3)->(370,20) -->
  <path d="M130,20 C160,100 190,180 250,260 C310,180 340,100 370,20" fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Symmetry axis -->
  <line x1="250" y1="30" x2="250" y2="270" stroke="#f59e0b" stroke-width="1" stroke-dasharray="5,5"/>
  <!-- Key points -->
  <circle cx="130" cy="20" r="4" fill="#ef4444"/>
  <circle cx="190" cy="200" r="4" fill="#22d3ee"/>
  <circle cx="310" cy="200" r="4" fill="#22d3ee"/>
  <circle cx="370" cy="20" r="4" fill="#ef4444"/>
  <circle cx="250" cy="260" r="5" fill="#f59e0b"/>
  <!-- Labels -->
  <text x="120" y="15" fill="#ef4444" font-size="10" font-family="serif">(0;3)</text>
  <text x="175" y="195" fill="#22d3ee" font-size="10" font-family="serif">(1;0)</text>
  <text x="315" y="195" fill="#22d3ee" font-size="10" font-family="serif">(3;0)</text>
  <text x="375" y="15" fill="#ef4444" font-size="10" font-family="serif">(4;3)</text>
  <text x="260" y="270" fill="#f59e0b" font-size="10" font-family="serif">вершина(2;-1)</text>
  <text x="255" y="50" fill="#f59e0b" font-size="9" font-family="serif">x₀=-b/(2a)</text>
  <text x="420" y="195" fill="#9ca3af" font-size="10" font-family="serif">x</text>
  <text x="255" y="12" fill="#9ca3af" font-size="10" font-family="serif">y</text>
  <!-- Formula -->
  <text x="30" y="320" fill="#6366f1" font-size="12" font-family="serif">y = ax² + bx + c</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">График квадратичной функции</text>
</svg>