<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="ah3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <!-- Coordinate grid -->
  <g stroke="#1a1a2e" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="350"/><line x1="200" y1="0" x2="200" y2="350"/>
    <line x1="300" y1="0" x2="300" y2="350"/><line x1="400" y1="0" x2="400" y2="350"/>
    <line x1="0" y1="70" x2="500" y2="70"/><line x1="0" y1="140" x2="500" y2="140"/>
    <line x1="0" y1="210" x2="500" y2="210"/><line x1="0" y1="280" x2="500" y2="280"/>
  </g>
  <line x1="30" y1="175" x2="480" y2="175" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah3)"/>
  <line x1="250" y1="330" x2="250" y2="15" stroke="#9ca3af" stroke-width="1" marker-end="url(#ah3)"/>
  <!-- Inequality region: x² - 4x + 3 ≤ 0, shaded between x=1 and x=3 -->
  <rect x="190" y="170" width="120" height="10" fill="#6366f1" opacity="0.3"/>
  <!-- Parabola y = x² - 4x + 3 -->
  <path d="M70,40 C120,110 160,160 250,230 C340,160 380,110 430,40" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <!-- Roots at x=1 and x=3 -->
  <circle cx="190" cy="175" r="5" fill="#f59e0b"/>
  <circle cx="310" cy="175" r="5" fill="#f59e0b"/>
  <!-- Shaded area below -->
  <path d="M190,175 C220,210 240,220 250,230 C260,220 280,210 310,175" fill="#6366f1" fill-opacity="0.2" stroke="none"/>
  <!-- Number line -->
  <line x1="100" y1="300" x2="430" y2="300" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="190" cy="300" r="4" fill="#f59e0b" stroke="#f59e0b"/>
  <circle cx="310" cy="300" r="4" fill="#f59e0b" stroke="#f59e0b"/>
  <line x1="190" y1="300" x2="310" y2="300" stroke="#6366f1" stroke-width="4"/>
  <!-- Labels -->
  <text x="183" y="325" fill="#f59e0b" font-size="11" font-family="serif">1</text>
  <text x="303" y="325" fill="#f59e0b" font-size="11" font-family="serif">3</text>
  <text x="100" y="325" fill="#9ca3af" font-size="10" font-family="serif">−</text>
  <text x="420" y="325" fill="#9ca3af" font-size="10" font-family="serif">+</text>
  <text x="240" y="315" fill="#6366f1" font-size="10" font-family="serif">−</text>
  <text x="140" y="60" fill="#22d3ee" font-size="11" font-family="serif">y = x²−4x+3</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Квадратные неравенства</text>
</svg>