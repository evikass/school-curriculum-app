<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Урок 3: Квадратное неравенство и его решение</text>

  <!-- Central graph: parabola with highlighted solution intervals -->
  <g filter="url(#shadow1)">
    <rect x="15" y="52" width="230" height="195" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="130" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Графический метод решения</text>
    <line x1="25" y1="75" x2="235" y2="75" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Coordinate axes -->
    <line x1="30" y1="175" x2="235" y2="175" stroke="#666" stroke-width="1.2"/>
    <line x1="70" y1="82" x2="70" y2="238" stroke="#666" stroke-width="1.2"/>
    <polygon points="235,172 235,178 241,175" fill="#666"/>
    <polygon points="67,82 73,82 70,76" fill="#666"/>
    <text x="238" y="189" font-size="8" fill="#666">x</text>
    <text x="76" y="86" font-size="8" fill="#666">y</text>

    <!-- Solution region highlights -->
    <!-- Left of x1: y>0 (green) -->
    <rect x="35" y="82" width="65" height="93" rx="0" fill="#4CAF50" opacity="0.12"/>
    <!-- Right of x2: y>0 (green) -->
    <rect x="165" y="82" width="75" height="93" rx="0" fill="#4CAF50" opacity="0.12"/>
    <!-- Between roots: y<0 (red) -->
    <rect x="100" y="175" width="65" height="58" rx="0" fill="#F44336" opacity="0.1"/>

    <!-- Parabola a>0 with two x-intercepts -->
    <path d="M60,235 Q80,195 100,175 Q115,155 130,148 Q145,155 160,175 Q180,195 200,235" fill="none" stroke="#1565C0" stroke-width="2.5"/>

    <!-- Root markers -->
    <circle cx="100" cy="175" r="4" fill="white" stroke="#F44336" stroke-width="2"/>
    <circle cx="160" cy="175" r="4" fill="white" stroke="#F44336" stroke-width="2"/>
    <text x="100" y="190" font-size="7" fill="#F44336" text-anchor="middle" font-weight="bold">x₁</text>
    <text x="160" y="190" font-size="7" fill="#F44336" text-anchor="middle" font-weight="bold">x₂</text>

    <!-- Region labels -->
    <text x="58" y="100" font-size="7" fill="#4CAF50" font-weight="bold">y>0</text>
    <text x="192" y="100" font-size="7" fill="#4CAF50" font-weight="bold">y>0</text>
    <text x="118" y="205" font-size="7" fill="#F44336" font-weight="bold">y&lt;0</text>

    <!-- Vertex label -->
    <circle cx="130" cy="148" r="2.5" fill="#FF9800"/>
    <text x="138" y="145" font-size="6" fill="#FF9800">min</text>
  </g>

  <!-- Connecting lines -->
  <line x1="245" y1="120" x2="262" y2="105" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="245" y1="200" x2="262" y2="210" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Solution cases card -->
  <g filter="url(#shadow1)">
    <rect x="262" y="52" width="222" height="95" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="373" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Решение ax²+bx+c > 0</text>
    <line x1="272" y1="75" x2="474" y2="75" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Case a>0 with green background -->
    <rect x="275" y="82" width="200" height="18" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
    <text x="375" y="94" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">a>0: x &lt; x₁ или x > x₂</text>

    <!-- Case a<0 with orange background -->
    <rect x="275" y="104" width="200" height="18" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
    <text x="375" y="116" text-anchor="middle" fill="#E65100" font-size="8" font-weight="bold">a&lt;0: x₁ &lt; x &lt; x₂</text>

    <text x="275" y="138" font-size="7" fill="#666">Условие: D > 0 (два различных корня)</text>
  </g>

  <!-- Types of inequalities card -->
  <g filter="url(#shadow1)">
    <rect x="262" y="157" width="222" height="90" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="373" y="175" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Виды неравенств</text>
    <line x1="272" y1="180" x2="474" y2="180" stroke="#42A5F5" stroke-width="0.5"/>

    <circle cx="278" cy="194" r="3" fill="#1565C0"/>
    <text x="286" y="197" font-size="8" fill="#333">ax²+bx+c > 0 — строгое</text>
    <circle cx="278" cy="210" r="3" fill="#1976D2"/>
    <text x="286" y="213" font-size="8" fill="#333">ax²+bx+c ≥ 0 — нестрогое</text>
    <circle cx="278" cy="226" r="3" fill="#42A5F5"/>
    <text x="286" y="229" font-size="8" fill="#333">ax²+bx+c &lt; 0 — строгое</text>
    <circle cx="278" cy="242" r="3" fill="#90CAF9"/>
    <text x="286" y="245" font-size="8" fill="#333">ax²+bx+c ≤ 0 — нестрогое</text>
  </g>

  <!-- Concept pills -->
  <g transform="translate(25,275)">
    <rect x="0" y="0" width="95" height="20" rx="10" fill="#1565C0"/>
    <text x="47" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Неравенство</text>
  </g>
  <g transform="translate(130,275)">
    <rect x="0" y="0" width="80" height="20" rx="10" fill="#1976D2"/>
    <text x="40" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Корни</text>
  </g>
  <g transform="translate(220,275)">
    <rect x="0" y="0" width="80" height="20" rx="10" fill="#0D47A1"/>
    <text x="40" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Интервал</text>
  </g>
  <g transform="translate(310,275)">
    <rect x="0" y="0" width="100" height="20" rx="10" fill="#42A5F5"/>
    <text x="50" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Графический</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="312" width="500" height="38" fill="#0D47A1" rx="8"/>
  <rect x="0" y="312" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="336" text-anchor="middle" fill="#90CAF9" font-size="9">Ключевая идея: решение — промежутки, где парабола выше/ниже оси x</text>
</svg>