<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <marker id="ah1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Grid lines -->
  <g stroke="#1e1e3a" stroke-width="0.5">
    <line x1="50" y1="0" x2="50" y2="350"/><line x1="150" y1="0" x2="150" y2="350"/>
    <line x1="250" y1="0" x2="250" y2="350"/><line x1="350" y1="0" x2="350" y2="350"/>
    <line x1="450" y1="0" x2="450" y2="350"/>
    <line x1="0" y1="50" x2="500" y2="50"/><line x1="0" y1="150" x2="500" y2="150"/>
    <line x1="0" y1="250" x2="500" y2="250"/>
  </g>
  <!-- Axes -->
  <line x1="50" y1="280" x2="470" y2="280" stroke="#888" stroke-width="1.5" marker-end="url(#ah1)"/>
  <line x1="250" y1="330" x2="250" y2="20" stroke="#888" stroke-width="1.5" marker-end="url(#ah1)"/>
  <!-- y = x² parabola (wide) -->
  <path d="M250,280 Q290,220 330,140 Q350,80 370,30" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M250,280 Q210,220 170,140 Q150,80 130,30" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- y = 2x² (narrower) -->
  <path d="M250,280 Q275,200 300,80 Q310,30 315,20" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3" stroke-linecap="round"/>
  <path d="M250,280 Q225,200 200,80 Q190,30 185,20" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3" stroke-linecap="round"/>
  <!-- y = -x² (inverted) -->
  <path d="M250,280 Q290,320 330,300 Q370,310 400,330" fill="none" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>
  <path d="M250,280 Q210,320 170,300 Q130,310 100,330" fill="none" stroke="#ec4899" stroke-width="2" stroke-linecap="round"/>
  <!-- Vertex dot -->
  <circle cx="250" cy="280" r="4" fill="#f59e0b"/>
  <!-- Labels -->
  <text x="380" y="40" fill="#f59e0b" font-size="11" font-family="serif">y = x²</text>
  <text x="320" y="18" fill="#6366f1" font-size="11" font-family="serif">y = 2x²</text>
  <text x="100" y="328" fill="#ec4899" font-size="11" font-family="serif">y = -x²</text>
  <text x="460" y="278" fill="#888" font-size="10" font-family="serif">x</text>
  <text x="255" y="18" fill="#888" font-size="10" font-family="serif">y</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Квадратичная функция y = ax²</text>
</svg>