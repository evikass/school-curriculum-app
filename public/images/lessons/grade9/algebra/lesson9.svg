<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="12" font-weight="bold">Неравенства второй степени с одной переменной</text>

  <!-- Three case cards in a row -->
  <!-- Case 1: D > 0 -->
  <rect x="10" y="52" width="155" height="178" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <!-- Header pill -->
  <rect x="20" y="58" width="135" height="20" rx="10" fill="#4CAF50"/>
  <text x="87" y="72" text-anchor="middle" fill="white" font-size="10" font-weight="bold">D &gt; 0 (2 корня)</text>

  <!-- Parabola graph -->
  <g transform="translate(87,125)">
    <line x1="-60" y1="35" x2="60" y2="35" stroke="#90CAF9" stroke-width="1"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#90CAF9" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- Parabola a>0 -->
    <path d="M-55,35 Q-35,-10 -20,-30 Q0,-40 20,-30 Q35,-10 55,35" fill="none" stroke="#1976D2" stroke-width="2.5"/>
    <!-- Root points -->
    <circle cx="-28" cy="35" r="4" fill="#F44336" stroke="#C62828" stroke-width="1"/>
    <circle cx="28" cy="35" r="4" fill="#F44336" stroke="#C62828" stroke-width="1"/>
    <text x="-28" y="48" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">x₁</text>
    <text x="28" y="48" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">x₂</text>
    <!-- Sign labels -->
    <text x="-48" y="-10" fill="#4CAF50" font-size="12" font-weight="bold">+</text>
    <text x="0" y="-5" fill="#F44336" font-size="12" font-weight="bold">−</text>
    <text x="48" y="-10" fill="#4CAF50" font-size="12" font-weight="bold">+</text>
    <!-- Fill positive regions -->
    <path d="M-55,35 Q-35,-10 -28,35Z" fill="#4CAF50" opacity="0.12"/>
    <path d="M28,35 Q35,-10 55,35Z" fill="#4CAF50" opacity="0.12"/>
    <path d="M-28,35 Q-20,-30 0,-35 Q20,-30 28,35Z" fill="#F44336" opacity="0.08"/>
  </g>

  <!-- Solution pills -->
  <rect x="18" y="183" width="139" height="14" rx="7" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="87" y="193" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">ax²+bx+c &gt; 0: (−∞;x₁)∪(x₂;+∞)</text>
  <rect x="18" y="200" width="139" height="14" rx="7" fill="#FFEBEE" stroke="#F44336" stroke-width="0.8"/>
  <text x="87" y="210" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">ax²+bx+c &lt; 0: (x₁;x₂)</text>

  <!-- Connecting line from title area -->
  <path d="M87,42 L87,52" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Case 2: D = 0 -->
  <rect x="172" y="52" width="155" height="178" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <!-- Header pill -->
  <rect x="182" y="58" width="135" height="20" rx="10" fill="#FF9800"/>
  <text x="249" y="72" text-anchor="middle" fill="white" font-size="10" font-weight="bold">D = 0 (1 корень)</text>

  <!-- Parabola graph -->
  <g transform="translate(249,125)">
    <line x1="-60" y1="35" x2="60" y2="35" stroke="#90CAF9" stroke-width="1"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#90CAF9" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- Parabola touching x-axis -->
    <path d="M-55,35 Q-30,-5 -10,-25 Q0,-30 10,-25 Q30,-5 55,35" fill="none" stroke="#FF9800" stroke-width="2.5"/>
    <!-- Touch point -->
    <circle cx="0" cy="35" r="4" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
    <text x="0" y="48" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">x₀</text>
    <!-- Sign labels -->
    <text x="-35" y="-5" fill="#4CAF50" font-size="12" font-weight="bold">+</text>
    <text x="35" y="-5" fill="#4CAF50" font-size="12" font-weight="bold">+</text>
    <text x="0" y="28" fill="#FF9800" font-size="8" font-weight="bold">0</text>
    <!-- Fill positive regions -->
    <path d="M-55,35 Q-30,-5 0,35Z" fill="#4CAF50" opacity="0.12"/>
    <path d="M0,35 Q30,-5 55,35Z" fill="#4CAF50" opacity="0.12"/>
  </g>

  <!-- Solution pills -->
  <rect x="180" y="183" width="139" height="14" rx="7" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="249" y="193" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">ax²+bx+c &gt; 0: x ≠ x₀</text>
  <rect x="180" y="200" width="139" height="14" rx="7" fill="#FFEBEE" stroke="#F44336" stroke-width="0.8"/>
  <text x="249" y="210" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">ax²+bx+c &lt; 0: ∅ (нет реш.)</text>

  <!-- Connecting line from title area -->
  <path d="M249,42 L249,52" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Case 3: D < 0 -->
  <rect x="334" y="52" width="156" height="178" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <!-- Header pill -->
  <rect x="344" y="58" width="136" height="20" rx="10" fill="#9C27B0"/>
  <text x="412" y="72" text-anchor="middle" fill="white" font-size="10" font-weight="bold">D &lt; 0 (нет корней)</text>

  <!-- Parabola graph -->
  <g transform="translate(412,125)">
    <line x1="-60" y1="35" x2="60" y2="35" stroke="#90CAF9" stroke-width="1"/>
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#90CAF9" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- Parabola not touching x-axis -->
    <path d="M-55,-5 Q-30,-30 -10,-40 Q0,-45 10,-40 Q30,-30 55,-5" fill="none" stroke="#9C27B0" stroke-width="2.5"/>
    <!-- Sign labels -->
    <text x="-30" y="-20" fill="#4CAF50" font-size="12" font-weight="bold">+</text>
    <text x="30" y="-20" fill="#4CAF50" font-size="12" font-weight="bold">+</text>
  </g>

  <!-- Solution pills -->
  <rect x="342" y="183" width="140" height="14" rx="7" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="412" y="193" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">ax²+bx+c &gt; 0: ∀ x ∈ R</text>
  <rect x="342" y="200" width="140" height="14" rx="7" fill="#FFEBEE" stroke="#F44336" stroke-width="0.8"/>
  <text x="412" y="210" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">ax²+bx+c &lt; 0: ∅ (нет реш.)</text>

  <!-- Connecting line from title area -->
  <path d="M412,42 L412,52" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Dashed connecting lines between cases -->
  <path d="M165,140 L172,140" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M327,140 L334,140" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Bottom section: a<0 note with inverted parabola -->
  <rect x="10" y="238" width="480" height="82" rx="10" fill="white" stroke="#F44336" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="256" text-anchor="middle" fill="#F44336" font-size="10" font-weight="bold">При a &lt; 0 — парабола ветвями вниз, знаки наоборот!</text>
  <line x1="20" y1="262" x2="480" y2="262" stroke="#FFCDD2" stroke-width="0.8"/>

  <!-- Inverted parabola mini graph -->
  <g transform="translate(130,295)">
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#90CAF9" stroke-width="1"/>
    <line x1="0" y1="-25" x2="0" y2="15" stroke="#90CAF9" stroke-width="0.5" stroke-dasharray="3,2"/>
    <path d="M-55,-18 Q-30,5 -10,12 Q0,15 10,12 Q30,5 55,-18" fill="none" stroke="#F44336" stroke-width="2.5"/>
    <circle cx="-28" cy="0" r="3" fill="#F44336"/>
    <circle cx="28" cy="0" r="3" fill="#F44336"/>
    <text x="-48" y="-5" fill="#F44336" font-size="10" font-weight="bold">−</text>
    <text x="0" y="5" fill="#4CAF50" font-size="10" font-weight="bold">+</text>
    <text x="48" y="-5" fill="#F44336" font-size="10" font-weight="bold">−</text>
  </g>

  <!-- Algorithm summary -->
  <g transform="translate(340,290)">
    <rect x="-110" y="-20" width="220" height="38" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <text x="0" y="-6" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">Алгоритм:</text>
    <text x="0" y="6" text-anchor="middle" fill="#1565C0" font-size="7">D → корни → эскиз параболы → знаки → ответ</text>
    <text x="0" y="16" text-anchor="middle" fill="#F44336" font-size="7" font-weight="bold">a&gt;0: +−+ | a&lt;0: −+−</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1" rx="0"/>
  <rect x="0" y="330" width="500" height="10" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Графический метод: D → корни → парабола → выбор знака</text>
</svg>