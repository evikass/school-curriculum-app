<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Метод интервалов: рациональные неравенства</text>

  <!-- Main card: Number line with intervals -->
  <rect x="10" y="52" width="480" height="140" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Пример: (x−1)(x+2)² / (x−3) ≥ 0</text>
  <line x1="20" y1="76" x2="480" y2="76" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Number line -->
  <g transform="translate(250,130)">
    <line x1="-210" y1="0" x2="210" y2="0" stroke="#0D47A1" stroke-width="2"/>
    <polygon points="210,-4 218,0 210,4" fill="#0D47A1"/>
    <polygon points="-210,-4 -218,0 -210,4" fill="#0D47A1"/>

    <!-- Critical points -->
    <!-- x = -2 (double root, even multiplicity) -->
    <circle cx="-90" cy="0" r="6" fill="#0D47A1" stroke="#0D47A1" stroke-width="1.5"/>
    <text x="-90" y="18" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">−2</text>
    <text x="-90" y="28" text-anchor="middle" fill="#9C27B0" font-size="6" font-weight="bold">(x+2)² чётн.</text>

    <!-- x = 1 (simple root, odd multiplicity) -->
    <circle cx="30" cy="0" r="6" fill="#0D47A1" stroke="#0D47A1" stroke-width="1.5"/>
    <text x="30" y="18" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">1</text>
    <text x="30" y="28" text-anchor="middle" fill="#1565C0" font-size="6" font-weight="bold">(x−1) нечётн.</text>

    <!-- x = 3 (excluded - denominator zero) -->
    <circle cx="120" cy="0" r="6" fill="white" stroke="#F44336" stroke-width="2.5"/>
    <text x="120" y="18" text-anchor="middle" fill="#F44336" font-size="8" font-weight="bold">3</text>
    <text x="120" y="28" text-anchor="middle" fill="#F44336" font-size="6" font-weight="bold">знамен. ≠ 0</text>

    <!-- Signs in intervals -->
    <text x="-150" y="-10" text-anchor="middle" fill="#4CAF50" font-size="14" font-weight="bold">+</text>
    <text x="-30" y="-10" text-anchor="middle" fill="#4CAF50" font-size="14" font-weight="bold">+</text>
    <text x="75" y="-10" text-anchor="middle" fill="#F44336" font-size="14" font-weight="bold">−</text>
    <text x="170" y="-10" text-anchor="middle" fill="#4CAF50" font-size="14" font-weight="bold">+</text>

    <!-- Sign change indicators (arrows) -->
    <!-- At -2: even mult → sign does NOT change -->
    <path d="M-100,-20 Q-95,-28 -90,-28 Q-85,-28 -80,-20" fill="none" stroke="#9C27B0" stroke-width="1.5"/>
    <text x="-90" y="-32" text-anchor="middle" fill="#9C27B0" font-size="6" font-weight="bold">не меняется!</text>

    <!-- At 1: odd mult → sign changes -->
    <path d="M20,-20 Q25,-28 30,-28 Q35,-28 40,-20" fill="none" stroke="#4CAF50" stroke-width="1.5"/>

    <!-- At 3: excluded point -->
    <path d="M110,-20 Q115,-28 120,-28 Q125,-28 130,-20" fill="none" stroke="#F44336" stroke-width="1.5"/>

    <!-- Highlighted solution regions (≥0) -->
    <rect x="-210" y="-25" width="120" height="10" rx="3" fill="#4CAF50" opacity="0.2"/>
    <rect x="-84" y="-25" width="108" height="10" rx="3" fill="#4CAF50" opacity="0.2"/>
    <rect x="126" y="-25" width="84" height="10" rx="3" fill="#4CAF50" opacity="0.2"/>
  </g>

  <!-- Answer pill -->
  <rect x="120" y="170" width="260" height="18" rx="9" fill="#0D47A1"/>
  <text x="250" y="183" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Ответ: {−2} ∪ [1; 3) ∪ (3; +∞)</text>

  <!-- Left card: Multiplicity rules -->
  <rect x="10" y="200" width="155" height="120" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="87" y="218" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Кратность корня</text>
  <line x1="20" y1="224" x2="155" y2="224" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Odd multiplicity -->
  <g transform="translate(87,248)">
    <rect x="-68" y="-14" width="136" height="28" rx="6" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
    <text x="0" y="-3" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">Нечётная (1, 3, 5...)</text>
    <text x="0" y="9" text-anchor="middle" fill="#4CAF50" font-size="7">Знак меняется ↔</text>
    <!-- Visual: sign change arrow -->
    <line x1="-55" y1="-14" x2="-55" y2="14" stroke="#4CAF50" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="-55" y="-18" fill="#4CAF50" font-size="7">+</text>
    <text x="-55" y="22" fill="#F44336" font-size="7">−</text>
  </g>

  <!-- Even multiplicity -->
  <g transform="translate(87,290)">
    <rect x="-68" y="-14" width="136" height="28" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
    <text x="0" y="-3" text-anchor="middle" fill="#9C27B0" font-size="8" font-weight="bold">Чётная (2, 4, 6...)</text>
    <text x="0" y="9" text-anchor="middle" fill="#9C27B0" font-size="7">Знак НЕ меняется</text>
    <!-- Visual: no sign change -->
    <line x1="-55" y1="-14" x2="-55" y2="14" stroke="#9C27B0" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="-55" y="-18" fill="#4CAF50" font-size="7">+</text>
    <text x="-55" y="22" fill="#4CAF50" font-size="7">+</text>
  </g>

  <!-- Center card: Point types legend -->
  <rect x="172" y="200" width="156" height="120" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="218" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Типы точек на прямой</text>
  <line x1="182" y1="224" x2="318" y2="224" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Filled point -->
  <g transform="translate(200,244)">
    <circle cx="0" cy="0" r="5" fill="#0D47A1"/>
    <text x="12" y="4" fill="#0D47A1" font-size="7">Числитель = 0 (входит)</text>
  </g>

  <!-- Hollow point -->
  <g transform="translate(200,266)">
    <circle cx="0" cy="0" r="5" fill="white" stroke="#F44336" stroke-width="2"/>
    <text x="12" y="4" fill="#F44336" font-size="7">Знаменатель = 0 (не входит)</text>
  </g>

  <!-- Point with square bracket -->
  <g transform="translate(200,288)">
    <rect x="-4" y="-6" width="3" height="12" fill="#4CAF50"/>
    <circle cx="0" cy="0" r="5" fill="#0D47A1"/>
    <text x="12" y="4" fill="#4CAF50" font-size="7">≥ или ≤ → [скобка]</text>
  </g>

  <!-- With parenthesis -->
  <g transform="translate(200,310)">
    <path d="M4,-6 Q8,0 4,6" fill="none" stroke="#F44336" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="white" stroke="#F44336" stroke-width="2"/>
    <text x="16" y="4" fill="#F44336" font-size="7">&gt; или &lt; → (скобка)</text>
  </g>

  <!-- Right card: Algorithm -->
  <rect x="335" y="200" width="155" height="120" rx="10" fill="white" stroke="#1976D2" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="412" y="218" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Алгоритм</text>
  <line x1="345" y1="224" x2="480" y2="224" stroke="#42A5F5" stroke-width="0.8"/>

  <!-- Step pills -->
  <rect x="343" y="230" width="139" height="16" rx="8" fill="#0D47A1"/>
  <text x="412" y="242" text-anchor="middle" fill="white" font-size="7" font-weight="bold">1. Найти нули числ. и знам.</text>

  <rect x="343" y="250" width="139" height="16" rx="8" fill="#1565C0"/>
  <text x="412" y="262" text-anchor="middle" fill="white" font-size="7" font-weight="bold">2. Отметить точки на прямой</text>

  <rect x="343" y="270" width="139" height="16" rx="8" fill="#1976D2"/>
  <text x="412" y="282" text-anchor="middle" fill="white" font-size="7" font-weight="bold">3. Определить знак справа</text>

  <rect x="343" y="290" width="139" height="16" rx="8" fill="#42A5F5"/>
  <text x="412" y="302" text-anchor="middle" fill="white" font-size="7" font-weight="bold">4. Чередовать знаки ←</text>

  <!-- Warning pill -->
  <rect x="343" y="310" width="139" height="10" rx="5" fill="#FFEBEE" stroke="#F44336" stroke-width="0.8"/>
  <text x="412" y="318" text-anchor="middle" fill="#F44336" font-size="6" font-weight="bold">Чётная кратность → знак тот же!</text>

  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1" rx="0"/>
  <rect x="0" y="330" width="500" height="10" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Чётная кратность → знак не меняется при переходе через корень</text>
</svg>