<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#26A69A" stroke-width="3"/>
  <!-- Header bar -->
  <rect x="8" y="8" width="484" height="52" rx="6" fill="url(#hdr)" opacity="0.9"/>
  <text x="250" y="34" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Составление резюме</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Карьерное консультирование — Урок 6</text>
  <!-- Decorative elements -->
  <circle cx="460" cy="25" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="440" cy="18" r="6" fill="rgba(255,255,255,0.1)"/>
  <!-- Content area -->

  <!-- 3 format cards -->
  <g transform="translate(25,75)">
    <!-- Chronological -->
    <rect x="0" y="0" width="145" height="115" rx="5" fill="white" stroke="#4CAF50" stroke-width="1.5"/>
    <rect x="0" y="0" width="145" height="22" rx="5" fill="#4CAF50"/>
    <rect x="0" y="18" width="145" height="4" fill="#4CAF50"/>
    <text x="72" y="15" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Хронологический</text>
    <text x="10" y="40" font-family="Arial,sans-serif" font-size="7" fill="#333">✓ Опыт в обратном порядке</text>
    <text x="10" y="52" font-family="Arial,sans-serif" font-size="7" fill="#333">✓ Для опытных специалистов</text>
    <rect x="10" y="60" width="125" height="3" rx="1" fill="#4CAF50" opacity="0.3"/>
    <rect x="10" y="67" width="125" height="3" rx="1" fill="#4CAF50" opacity="0.2"/>
    <rect x="10" y="74" width="100" height="3" rx="1" fill="#4CAF50" opacity="0.15"/>
    <rect x="10" y="85" width="40" height="14" rx="3" fill="#4CAF50" opacity="0.15"/>
    <text x="30" y="95" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50" text-anchor="middle">Опыт</text>
    <rect x="55" y="85" width="40" height="14" rx="3" fill="#4CAF50" opacity="0.1"/>
    <text x="75" y="95" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50" text-anchor="middle">Образ.</text>
  </g>
  <g transform="translate(178,75)">
    <!-- Functional -->
    <rect x="0" y="0" width="145" height="115" rx="5" fill="white" stroke="#FF9800" stroke-width="1.5"/>
    <rect x="0" y="0" width="145" height="22" rx="5" fill="#FF9800"/>
    <rect x="0" y="18" width="145" height="4" fill="#FF9800"/>
    <text x="72" y="15" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Функциональный</text>
    <text x="10" y="40" font-family="Arial,sans-serif" font-size="7" fill="#333">✓ Акцент на навыки</text>
    <text x="10" y="52" font-family="Arial,sans-serif" font-size="7" fill="#333">✓ При смене профессии</text>
    <rect x="10" y="60" width="125" height="10" rx="2" fill="#FF9800" opacity="0.15"/>
    <text x="72" y="68" font-family="Arial,sans-serif" font-size="6" fill="#FF9800" text-anchor="middle">Навыки и достижения</text>
    <rect x="10" y="74" width="125" height="10" rx="2" fill="#FF9800" opacity="0.1"/>
    <text x="72" y="82" font-family="Arial,sans-serif" font-size="6" fill="#FF9800" text-anchor="middle">Достижения</text>
    <rect x="10" y="88" width="125" height="10" rx="2" fill="#FF9800" opacity="0.05"/>
    <text x="72" y="96" font-family="Arial,sans-serif" font-size="6" fill="#FF9800" text-anchor="middle">Опыт</text>
  </g>
  <g transform="translate(331,75)">
    <!-- Combined -->
    <rect x="0" y="0" width="145" height="115" rx="5" fill="white" stroke="#7E57C2" stroke-width="1.5"/>
    <rect x="0" y="0" width="145" height="22" rx="5" fill="#7E57C2"/>
    <rect x="0" y="18" width="145" height="4" fill="#7E57C2"/>
    <text x="72" y="15" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Комбинированный</text>
    <text x="10" y="40" font-family="Arial,sans-serif" font-size="7" fill="#333">✓ Хронология + навыки</text>
    <text x="10" y="52" font-family="Arial,sans-serif" font-size="7" fill="#333">✓ Большинству кандидатов</text>
    <rect x="10" y="60" width="60" height="10" rx="2" fill="#7E57C2" opacity="0.15"/>
    <text x="40" y="68" font-family="Arial,sans-serif" font-size="6" fill="#7E57C2" text-anchor="middle">Навыки</text>
    <rect x="75" y="60" width="60" height="10" rx="2" fill="#7E57C2" opacity="0.1"/>
    <text x="105" y="68" font-family="Arial,sans-serif" font-size="6" fill="#7E57C2" text-anchor="middle">Опыт</text>
    <rect x="10" y="88" width="60" height="14" rx="3" fill="#7E57C2" opacity="0.08"/>
    <text x="40" y="98" font-family="Arial,sans-serif" font-size="6" fill="#7E57C2" text-anchor="middle">Образ.</text>
    <rect x="75" y="88" width="60" height="14" rx="3" fill="#7E57C2" opacity="0.08"/>
    <text x="105" y="98" font-family="Arial,sans-serif" font-size="6" fill="#7E57C2" text-anchor="middle">Достиж.</text>
  </g>
  <!-- ATS panel -->
  <g transform="translate(25,200)">
    <rect x="0" y="0" width="450" height="60" rx="5" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="15" y="17" font-family="Arial,sans-serif" font-size="9" fill="{C_DARK}" font-weight="bold">ATS (Applicant Tracking System)</text>
    <rect x="15" y="24" width="420" height="12" rx="3" fill="#eee"/>
    <rect x="15" y="24" width="315" height="12" rx="3" fill="{C_PRI}" opacity="0.5"/>
    <text x="225" y="33" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Ключевые слова из вакансии → Резюме</text>
    <text x="15" y="50" font-family="Arial,sans-serif" font-size="7" fill="#666">98% компаний используют ATS • Включайте ключевые слова • Адаптируйте под каждую вакансию</text>
  </g>
  <!-- Tools -->
  <rect x="25" y="275" width="145" height="22" rx="4" fill="#4CAF50" opacity="0.12"/>
  <text x="97" y="290" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50" text-anchor="middle">hh.ru — конструктор</text>
  <rect x="178" y="275" width="145" height="22" rx="4" fill="#2196F3" opacity="0.12"/>
  <text x="250" y="290" font-family="Arial,sans-serif" font-size="8" fill="#2196F3" text-anchor="middle">Google Docs — шаблоны</text>
  <rect x="331" y="275" width="145" height="22" rx="4" fill="#7E57C2" opacity="0.12"/>
  <text x="403" y="290" font-family="Arial,sans-serif" font-size="8" fill="#7E57C2" text-anchor="middle">LinkedIn — профиль</text>
  <rect x="25" y="305" width="450" height="22" rx="4" fill="{C_PRI}" opacity="0.06"/>
  <text x="250" y="320" font-family="Arial,sans-serif" font-size="8" fill="{C_DARK}" text-anchor="middle">Действие + Объект + Результат + Контекст — формула описания достижений</text>

</svg>