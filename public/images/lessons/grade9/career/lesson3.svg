<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#26A69A" stroke-width="3"/>
  <!-- Header bar -->
  <rect x="8" y="8" width="484" height="52" rx="6" fill="url(#hdr)" opacity="0.9"/>
  <text x="250" y="34" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">IT-профессии</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Карьерное консультирование — Урок 3</text>
  <!-- Decorative elements -->
  <circle cx="460" cy="25" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="440" cy="18" r="6" fill="rgba(255,255,255,0.1)"/>
  <!-- Content area -->

  <!-- IT branches tree -->
  <g transform="translate(30,75)">
    <rect x="0" y="0" width="440" height="245" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
    <!-- Central trunk -->
    <rect x="200" y="10" width="40" height="30" rx="5" fill="url(#hdr)"/>
    <text x="220" y="30" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">IT</text>
    <!-- 4 branches -->
    <line x1="210" y1="40" x2="60" y2="70" stroke="{C_PRI}" stroke-width="2"/>
    <line x1="220" y1="40" x2="170" y2="70" stroke="{C_PRI}" stroke-width="2"/>
    <line x1="230" y1="40" x2="280" y2="70" stroke="{C_PRI}" stroke-width="2"/>
    <line x1="240" y1="40" x2="390" y2="70" stroke="{C_PRI}" stroke-width="2"/>
    
    <!-- Branch 1: Разработка -->
    <rect x="15" y="70" width="90" height="25" rx="4" fill="#4CAF50"/>
    <text x="60" y="87" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Разработка</text>
    <rect x="10" y="100" width="95" height="55" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
    <text x="57" y="113" font-family="Arial,sans-serif" font-size="7" fill="#333">Фронтенд: HTML/CSS/JS</text>
    <text x="57" y="125" font-family="Arial,sans-serif" font-size="7" fill="#333">Бэкенд: Python/Java</text>
    <text x="57" y="137" font-family="Arial,sans-serif" font-size="7" fill="#333">Мобильная: Swift/Kotlin</text>
    <text x="57" y="149" font-family="Arial,sans-serif" font-size="7" fill="#333">Геймдев: Unity/Unreal</text>
    
    <!-- Branch 2: Дизайн -->
    <rect x="120" y="70" width="90" height="25" rx="4" fill="#E91E63"/>
    <text x="165" y="87" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Дизайн</text>
    <rect x="115" y="100" width="95" height="55" rx="3" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.5"/>
    <text x="162" y="113" font-family="Arial,sans-serif" font-size="7" fill="#333">UX: Figma, Sketch</text>
    <text x="162" y="125" font-family="Arial,sans-serif" font-size="7" fill="#333">UI: Adobe XD</text>
    <text x="162" y="137" font-family="Arial,sans-serif" font-size="7" fill="#333">Веб-дизайн: Photoshop</text>
    <text x="162" y="149" font-family="Arial,sans-serif" font-size="7" fill="#333">Графика: Illustrator</text>
    
    <!-- Branch 3: Аналитика -->
    <rect x="230" y="70" width="90" height="25" rx="4" fill="#2196F3"/>
    <text x="275" y="87" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Аналитика</text>
    <rect x="225" y="100" width="95" height="55" rx="3" fill="#E3F2FD" stroke="#2196F3" stroke-width="0.5"/>
    <text x="272" y="113" font-family="Arial,sans-serif" font-size="7" fill="#333">Data Analyst: SQL, Excel</text>
    <text x="272" y="125" font-family="Arial,sans-serif" font-size="7" fill="#333">Data Scientist: ML</text>
    <text x="272" y="137" font-family="Arial,sans-serif" font-size="7" fill="#333">Data Engineer: Cloud</text>
    <text x="272" y="149" font-family="Arial,sans-serif" font-size="7" fill="#333">Business Analyst</text>
    
    <!-- Branch 4: Безопасность -->
    <rect x="340" y="70" width="90" height="25" rx="4" fill="#FF9800"/>
    <text x="385" y="87" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Кибербез</text>
    <rect x="335" y="100" width="95" height="55" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.5"/>
    <text x="382" y="113" font-family="Arial,sans-serif" font-size="7" fill="#333">ИБ: Сети, криптография</text>
    <text x="382" y="125" font-family="Arial,sans-serif" font-size="7" fill="#333">Пен-тестер: Этичный хак</text>
    <text x="382" y="137" font-family="Arial,sans-serif" font-size="7" fill="#333">SOC: SIEM-мониторинг</text>
    <text x="382" y="149" font-family="Arial,sans-serif" font-size="7" fill="#333">Комплаенс: ISO 27001</text>
    
    <!-- Salary bar -->
    <rect x="10" y="170" width="420" height="55" rx="4" fill="{C_PRI}" opacity="0.06"/>
    <text x="20" y="185" font-family="Arial,sans-serif" font-size="9" fill="{C_DARK}" font-weight="bold">Входная зарплата (тыс. руб.):</text>
    <rect x="20" y="195" width="70" height="16" rx="3" fill="#4CAF50" opacity="0.6"/>
    <text x="55" y="206" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">60-100</text>
    <text x="95" y="206" font-family="Arial,sans-serif" font-size="6" fill="#666">Analyst</text>
    <rect x="130" y="195" width="80" height="16" rx="3" fill="#2196F3" opacity="0.6"/>
    <text x="170" y="206" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">80-150</text>
    <text x="215" y="206" font-family="Arial,sans-serif" font-size="6" fill="#666">Sci</text>
    <rect x="235" y="195" width="80" height="16" rx="3" fill="#FF9800" opacity="0.6"/>
    <text x="275" y="206" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">80-140</text>
    <text x="320" y="206" font-family="Arial,sans-serif" font-size="6" fill="#666">Eng</text>
    
    <!-- Shield icon -->
    <g transform="translate(390,180)">
      <path d="M10,0 L20,5 L20,15 Q20,25 10,28 Q0,25 0,15 L0,5 Z" fill="none" stroke="{C_PRI}" stroke-width="1.5"/>
      <text x="10" y="20" font-family="Arial,sans-serif" font-size="10" fill="{C_PRI}" text-anchor="middle">✓</text>
    </g>
  </g>

</svg>