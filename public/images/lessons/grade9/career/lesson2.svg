<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00695C"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#26A69A" stroke-width="3"/>
  <!-- Header bar -->
  <rect x="8" y="8" width="484" height="52" rx="6" fill="url(#hdr)" opacity="0.9"/>
  <text x="250" y="34" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Профессии будущего</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.8)" text-anchor="middle">Карьерное консультирование — Урок 2</text>
  <!-- Decorative elements -->
  <circle cx="460" cy="25" r="12" fill="rgba(255,255,255,0.15)"/>
  <circle cx="440" cy="18" r="6" fill="rgba(255,255,255,0.1)"/>
  <!-- Content area -->

  <!-- Growth trend chart -->
  <g transform="translate(30,80)">
    <rect x="0" y="0" width="220" height="140" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="110" y="16" font-family="Arial,sans-serif" font-size="10" fill="{C_DARK}" text-anchor="middle" font-weight="bold">Тренды рынка труда</text>
    <!-- Axes -->
    <line x1="30" y1="125" x2="210" y2="125" stroke="#aaa" stroke-width="1"/>
    <line x1="30" y1="25" x2="30" y2="125" stroke="#aaa" stroke-width="1"/>
    <!-- Bars -->
    <rect x="42" y="45" width="18" height="80" rx="2" fill="#4CAF50" opacity="0.8"/>
    <text x="51" y="40" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle">IT</text>
    <rect x="68" y="65" width="18" height="60" rx="2" fill="#2196F3" opacity="0.8"/>
    <text x="77" y="60" font-family="Arial,sans-serif" font-size="7" fill="#2196F3" text-anchor="middle">Мед</text>
    <rect x="94" y="75" width="18" height="50" rx="2" fill="#FF9800" opacity="0.8"/>
    <text x="103" y="70" font-family="Arial,sans-serif" font-size="7" fill="#FF9800" text-anchor="middle">Эко</text>
    <rect x="120" y="85" width="18" height="40" rx="2" fill="#9C27B0" opacity="0.8"/>
    <text x="129" y="80" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0" text-anchor="middle">Обр</text>
    <rect x="146" y="55" width="18" height="70" rx="2" fill="#E91E63" opacity="0.8"/>
    <text x="155" y="50" font-family="Arial,sans-serif" font-size="7" fill="#E91E63" text-anchor="middle">AI</text>
    <rect x="172" y="95" width="18" height="30" rx="2" fill="#607D8B" opacity="0.8"/>
    <text x="181" y="90" font-family="Arial,sans-serif" font-size="7" fill="#607D8B" text-anchor="middle">Гиг</text>
  </g>
  <!-- Automation risk panel -->
  <g transform="translate(270,80)">
    <rect x="0" y="0" width="210" height="140" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
    <text x="105" y="16" font-family="Arial,sans-serif" font-size="10" fill="{C_DARK}" text-anchor="middle" font-weight="bold">Риск автоматизации</text>
    <!-- Risk levels -->
    <rect x="10" y="28" width="190" height="20" rx="3" fill="#F44336" opacity="0.2"/>
    <rect x="10" y="28" width="170" height="20" rx="3" fill="#F44336" opacity="0.4"/>
    <text x="15" y="42" font-family="Arial,sans-serif" font-size="8" fill="#C62828">Высокий: кассир, оператор</text>
    <rect x="10" y="52" width="190" height="20" rx="3" fill="#FF9800" opacity="0.2"/>
    <rect x="10" y="52" width="120" height="20" rx="3" fill="#FF9800" opacity="0.4"/>
    <text x="15" y="66" font-family="Arial,sans-serif" font-size="8" fill="#E65100">Средний: бухгалтер, водитель</text>
    <rect x="10" y="76" width="190" height="20" rx="3" fill="#4CAF50" opacity="0.2"/>
    <rect x="10" y="76" width="60" height="20" rx="3" fill="#4CAF50" opacity="0.4"/>
    <text x="15" y="90" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Низкий: психолог, творчество</text>
    <!-- 50% stat -->
    <text x="105" y="120" font-family="Arial,sans-serif" font-size="22" fill="{C_PRI}" text-anchor="middle" font-weight="bold">50%</text>
    <text x="105" y="133" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">профессий под угрозой</text>
  </g>
  <!-- Bottom facts -->
  <rect x="30" y="240" width="440" height="42" rx="5" fill="{C_PRI}" opacity="0.08"/>
  <text x="40" y="258" font-family="Arial,sans-serif" font-size="9" fill="{C_DARK}" font-weight="bold">Ключевые навыки будущего:</text>
  <text x="40" y="272" font-family="Arial,sans-serif" font-size="8" fill="#555">Критическое мышление • Эмоциональный интеллект • Креативность • Lifelong learning</text>
  <!-- Robot icon -->
  <g transform="translate(445,248)">
    <rect x="0" y="5" width="16" height="14" rx="3" fill="none" stroke="{C_PRI}" stroke-width="1.5"/>
    <circle cx="4" cy="12" r="2" fill="{C_PRI}"/>
    <circle cx="12" cy="12" r="2" fill="{C_PRI}"/>
    <line x1="8" y1="5" x2="8" y2="0" stroke="{C_PRI}" stroke-width="1.5"/>
    <circle cx="8" cy="0" r="2" fill="{C_PRI}"/>
  </g>
  <rect x="30" y="290" width="440" height="28" rx="4" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <text x="40" y="308" font-family="Arial,sans-serif" font-size="8" fill="#666">Data Scientist • UX-дизайнер • Биоинженер • AR/VR-разработчик • Урбанист</text>

</svg>