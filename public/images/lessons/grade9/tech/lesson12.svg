<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg12)"/>
  <!-- Central person icon -->
  <circle cx="250" cy="70" r="15" fill="#4fc3f7"/>
  <line x1="250" y1="85" x2="250" y2="110" stroke="#4fc3f7" stroke-width="3"/>
  <line x1="230" y1="95" x2="270" y2="95" stroke="#4fc3f7" stroke-width="3"/>
  <!-- 5 branches from center -->
  <line x1="250" y1="110" x2="80" y2="160" stroke="#4fc3f7" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="110" x2="165" y2="160" stroke="#ff9800" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="110" x2="250" y2="160" stroke="#4caf50" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="110" x2="335" y2="160" stroke="#f44336" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="110" x2="420" y2="160" stroke="#9c27b0" stroke-width="1.5" opacity="0.6"/>
  <!-- Type 1: Человек-Человек -->
  <circle cx="80" cy="175" r="30" fill="#4fc3f7" opacity="0.15" stroke="#4fc3f7" stroke-width="1.5"/>
  <g transform="translate(68,160)">
    <circle cx="6" cy="4" r="4" fill="#4fc3f7"/><circle cx="18" cy="4" r="4" fill="#4fc3f7"/>
    <path d="M2,12 Q12,20 22,12" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  </g>
  <text x="80" y="218" fill="#4fc3f7" font-size="8" text-anchor="middle" font-weight="bold">Человек–</text>
  <text x="80" y="228" fill="#4fc3f7" font-size="8" text-anchor="middle" font-weight="bold">Человек</text>
  <text x="80" y="240" fill="#78909c" font-size="6" text-anchor="middle">Учитель, врач</text>
  <!-- Type 2: Человек-Техника -->
  <circle cx="165" cy="175" r="30" fill="#ff9800" opacity="0.15" stroke="#ff9800" stroke-width="1.5"/>
  <g transform="translate(153,163)">
    <rect x="0" y="5" width="24" height="14" fill="none" stroke="#ff9800" stroke-width="1.5" rx="2"/>
    <circle cx="8" cy="12" r="3" fill="#ff9800"/><circle cx="16" cy="12" r="3" fill="#ff9800"/>
  </g>
  <text x="165" y="218" fill="#ff9800" font-size="8" text-anchor="middle" font-weight="bold">Человек–</text>
  <text x="165" y="228" fill="#ff9800" font-size="8" text-anchor="middle" font-weight="bold">Техника</text>
  <text x="165" y="240" fill="#78909c" font-size="6" text-anchor="middle">Инженер, токарь</text>
  <!-- Type 3: Человек-Знак -->
  <circle cx="250" cy="175" r="30" fill="#4caf50" opacity="0.15" stroke="#4caf50" stroke-width="1.5"/>
  <g transform="translate(238,163)">
    <text x="12" y="14" fill="#4caf50" font-size="18" text-anchor="middle" font-weight="bold">∑</text>
  </g>
  <text x="250" y="218" fill="#4caf50" font-size="8" text-anchor="middle" font-weight="bold">Человек–</text>
  <text x="250" y="228" fill="#4caf50" font-size="8" text-anchor="middle" font-weight="bold">Знак</text>
  <text x="250" y="240" fill="#78909c" font-size="6" text-anchor="middle">Программист, бухгалтер</text>
  <!-- Type 4: Человек-Природа -->
  <circle cx="335" cy="175" r="30" fill="#4caf50" opacity="0.15" stroke="#f44336" stroke-width="1.5"/>
  <g transform="translate(323,160)">
    <path d="M12,20 L12,8" stroke="#f44336" stroke-width="2"/>
    <circle cx="12" cy="6" r="6" fill="#4caf50" opacity="0.6"/>
    <circle cx="6" cy="10" r="5" fill="#4caf50" opacity="0.4"/>
    <circle cx="18" cy="10" r="5" fill="#4caf50" opacity="0.4"/>
  </g>
  <text x="335" y="218" fill="#f44336" font-size="8" text-anchor="middle" font-weight="bold">Человек–</text>
  <text x="335" y="228" fill="#f44336" font-size="8" text-anchor="middle" font-weight="bold">Природа</text>
  <text x="335" y="240" fill="#78909c" font-size="6" text-anchor="middle">Биолог, агроном</text>
  <!-- Type 5: Человек-Художественный образ -->
  <circle cx="420" cy="175" r="30" fill="#9c27b0" opacity="0.15" stroke="#9c27b0" stroke-width="1.5"/>
  <g transform="translate(405,163)">
    <circle cx="8" cy="8" r="5" fill="#9c27b0" opacity="0.5"/>
    <circle cx="18" cy="5" r="4" fill="#e91e63" opacity="0.5"/>
    <circle cx="22" cy="15" r="4" fill="#ff9800" opacity="0.5"/>
    <circle cx="12" cy="16" r="4" fill="#4caf50" opacity="0.5"/>
  </g>
  <text x="420" y="218" fill="#9c27b0" font-size="8" text-anchor="middle" font-weight="bold">Человек–</text>
  <text x="420" y="228" fill="#9c27b0" font-size="8" text-anchor="middle" font-weight="bold">Образ</text>
  <text x="420" y="240" fill="#78909c" font-size="6" text-anchor="middle">Художник, дизайнер</text>
  <!-- Formula -->
  <rect x="100" y="265" width="300" height="40" fill="#0d1b2a" rx="8" stroke="#e2b714" stroke-width="1"/>
  <text x="250" y="290" fill="#e2b714" font-size="12" text-anchor="middle" font-weight="bold">Хочу + Могу + Надо = Профессия</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Профессии и карьера</text>
</svg>