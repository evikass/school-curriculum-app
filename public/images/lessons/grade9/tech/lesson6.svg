<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2838"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg6)"/>
  <!-- Circuit diagram -->
  <g stroke="#4fc3f7" stroke-width="2" fill="none">
    <!-- Battery -->
    <line x1="80" y1="70" x2="80" y2="85"/>
    <line x1="70" y1="85" x2="90" y2="85"/>
    <line x1="74" y1="92" x2="86" y2="92"/>
    <line x1="70" y1="99" x2="90" y2="99"/>
    <line x1="74" y1="106" x2="86" y2="106"/>
    <line x1="70" y1="113" x2="90" y2="113"/>
    <line x1="80" y1="113" x2="80" y2="130"/>
    <text x="95" y="103" fill="#4fc3f7" font-size="9">U</text>
    <!-- Wires -->
    <line x1="80" y1="70" x2="200" y2="70"/>
    <line x1="200" y1="70" x2="200" y2="55"/>
    <line x1="200" y1="55" x2="380" y2="55"/>
    <line x1="380" y1="55" x2="380" y2="80"/>
    <line x1="80" y1="130" x2="200" y2="130"/>
    <line x1="200" y1="130" x2="200" y2="145"/>
    <line x1="200" y1="145" x2="380" y2="145"/>
    <line x1="380" y1="145" x2="380" y2="120"/>
    <!-- Switch -->
    <circle cx="200" cy="55" r="3" fill="#4fc3f7"/>
    <line x1="200" y1="55" x2="225" y2="40" stroke="#4fc3f7" stroke-width="2"/>
    <circle cx="230" cy="55" r="3" fill="#4fc3f7"/>
    <text x="215" y="37" fill="#4fc3f7" font-size="8">Ключ</text>
    <!-- Resistor (zigzag) -->
    <path d="M380,80 L385,85 L375,95 L385,105 L375,115 L380,120"/>
    <text x="395" y="105" fill="#4fc3f7" font-size="9">R</text>
    <!-- Ammeter -->
    <circle cx="290" cy="55" r="12" fill="none" stroke="#ff9800" stroke-width="1.5"/>
    <text x="290" y="59" fill="#ff9800" font-size="10" text-anchor="middle" font-weight="bold">A</text>
    <!-- Voltmeter across resistor -->
    <circle cx="440" cy="100" r="12" fill="none" stroke="#4caf50" stroke-width="1.5"/>
    <text x="440" y="104" fill="#4caf50" font-size="10" text-anchor="middle" font-weight="bold">V</text>
    <line x1="380" y1="80" x2="428" y2="92" stroke="#4caf50" stroke-width="1" stroke-dasharray="3"/>
    <line x1="380" y1="120" x2="428" y2="108" stroke="#4caf50" stroke-width="1" stroke-dasharray="3"/>
  </g>
  <!-- Ohm's law formula -->
  <rect x="100" y="175" width="300" height="55" fill="#0d2137" rx="8" stroke="#4fc3f7" stroke-width="1"/>
  <text x="250" y="200" fill="#4fc3f7" font-size="18" text-anchor="middle" font-weight="bold">I = U / R</text>
  <text x="250" y="220" fill="#78909c" font-size="10" text-anchor="middle">Закон Ома</text>
  <!-- Example calculation -->
  <rect x="60" y="245" width="180" height="65" fill="#0d2137" rx="5" stroke="#ff9800" stroke-width="1"/>
  <text x="150" y="265" fill="#ff9800" font-size="10" text-anchor="middle">U = 12 В, R = 4 Ом</text>
  <text x="150" y="285" fill="#4fc3f7" font-size="12" text-anchor="middle">I = 12 / 4 = 3 А</text>
  <text x="150" y="302" fill="#78909c" font-size="9" text-anchor="middle">Сила тока = 3 Ампера</text>
  <!-- Series vs Parallel -->
  <rect x="260" y="245" width="200" height="65" fill="#0d2137" rx="5" stroke="#4caf50" stroke-width="1"/>
  <!-- Series -->
  <g stroke="#4caf50" stroke-width="1.5" fill="none" transform="translate(270,255)">
    <line x1="0" y1="10" x2="15" y2="10"/>
    <rect x="15" y="5" width="20" height="10" rx="2"/>
    <line x1="35" y1="10" x2="50" y2="10"/>
    <rect x="50" y="5" width="20" height="10" rx="2"/>
    <line x1="70" y1="10" x2="85" y2="10"/>
  </g>
  <text x="312" y="280" fill="#4caf50" font-size="7" text-anchor="middle">Последовательное</text>
  <!-- Parallel -->
  <g stroke="#4caf50" stroke-width="1.5" fill="none" transform="translate(270,290)">
    <line x1="0" y1="10" x2="15" y2="10"/>
    <line x1="15" y1="10" x2="15" y2="0"/>
    <line x1="15" y1="0" x2="35" y2="0"/>
    <rect x="35" y="-5" width="20" height="10" rx="2"/>
    <line x1="55" y1="0" x2="75" y2="0"/>
    <line x1="15" y1="10" x2="15" y2="20"/>
    <line x1="15" y1="20" x2="35" y2="20"/>
    <rect x="35" y="15" width="20" height="10" rx="2"/>
    <line x1="55" y1="20" x2="75" y2="20"/>
    <line x1="75" y1="0" x2="75" y2="20"/>
    <line x1="75" y1="10" x2="90" y2="10"/>
  </g>
  <text x="312" y="310" fill="#4caf50" font-size="7" text-anchor="middle">Параллельное</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Электротехника</text>
</svg>