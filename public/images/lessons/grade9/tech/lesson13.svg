<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg13)"/>
  <!-- Presentation board -->
  <rect x="60" y="30" width="380" height="220" fill="#0d1b2a" rx="5" stroke="#e2b714" stroke-width="2"/>
  <!-- Board content -->
  <text x="250" y="55" fill="#e2b714" font-size="14" text-anchor="middle" font-weight="bold">Мой проект</text>
  <line x1="80" y1="65" x2="420" y2="65" stroke="#e2b714" stroke-width="1" opacity="0.3"/>
  <!-- Project sections -->
  <g fill="#78909c" font-size="8">
    <rect x="80" y="75" width="100" height="12" fill="#4fc3f7" opacity="0.15" rx="2"/>
    <text x="130" y="84" fill="#4fc3f7" font-size="8" text-anchor="middle">1. Проблема</text>
    <rect x="80" y="92" width="100" height="12" fill="#4caf50" opacity="0.15" rx="2"/>
    <text x="130" y="101" fill="#4caf50" font-size="8" text-anchor="middle">2. Цель и задачи</text>
    <rect x="80" y="109" width="100" height="12" fill="#ff9800" opacity="0.15" rx="2"/>
    <text x="130" y="118" fill="#ff9800" font-size="8" text-anchor="middle">3. Исследование</text>
    <rect x="80" y="126" width="100" height="12" fill="#f44336" opacity="0.15" rx="2"/>
    <text x="130" y="135" fill="#f44336" font-size="8" text-anchor="middle">4. Чертежи</text>
    <rect x="80" y="143" width="100" height="12" fill="#9c27b0" opacity="0.15" rx="2"/>
    <text x="130" y="152" fill="#9c27b0" font-size="8" text-anchor="middle">5. Тех. карта</text>
    <rect x="80" y="160" width="100" height="12" fill="#e2b714" opacity="0.15" rx="2"/>
    <text x="130" y="169" fill="#e2b714" font-size="8" text-anchor="middle">6. Расчёт цены</text>
  </g>
  <!-- Right side - sketch -->
  <rect x="200" y="75" width="220" height="130" fill="#1a2337" rx="3" stroke="#78909c" stroke-width="0.5"/>
  <!-- Simple sketch of a shelf -->
  <g stroke="#78909c" stroke-width="1" fill="none">
    <rect x="220" y="90" width="80" height="100" rx="2"/>
    <line x1="220" y1="120" x2="300" y2="120"/>
    <line x1="220" y1="150" x2="300" y2="150"/>
    <!-- Dimension -->
    <line x1="310" y1="90" x2="310" y2="190"/>
    <line x1="305" y1="90" x2="315" y2="90"/>
    <line x1="305" y1="190" x2="315" y2="190"/>
    <text x="320" y="145" fill="#78909c" font-size="8">400</text>
  </g>
  <!-- Cost table -->
  <g transform="translate(340,85)">
    <text x="35" y="0" fill="#e2b714" font-size="8" text-anchor="middle">Стоимость</text>
    <text x="0" y="15" fill="#78909c" font-size="7">Доска: 200₽</text>
    <text x="0" y="28" fill="#78909c" font-size="7">Шурупы: 50₽</text>
    <text x="0" y="41" fill="#78909c" font-size="7">Лак: 150₽</text>
    <text x="0" y="57" fill="#e2b714" font-size="8" font-weight="bold">Итого: 400₽</text>
  </g>
  <!-- Presenter silhouette -->
  <circle cx="80" cy="295" r="12" fill="#e2b714" opacity="0.6"/>
  <line x1="80" y1="307" x2="80" y2="330" stroke="#e2b714" stroke-width="3" opacity="0.6"/>
  <line x1="65" y1="315" x2="95" y2="315" stroke="#e2b714" stroke-width="2" opacity="0.6"/>
  <!-- Pointer -->
  <line x1="95" y1="310" x2="130" y2="260" stroke="#e2b714" stroke-width="1.5" opacity="0.6"/>
  <!-- Audience silhouettes -->
  <g fill="#78909c" opacity="0.3">
    <circle cx="200" cy="310" r="8"/><circle cx="230" cy="315" r="8"/>
    <circle cx="260" cy="310" r="8"/><circle cx="290" cy="315" r="8"/>
    <circle cx="320" cy="310" r="8"/><circle cx="350" cy="315" r="8"/>
    <circle cx="380" cy="310" r="8"/><circle cx="410" cy="315" r="8"/>
  </g>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Итоговый проект</text>
</svg>