<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#263238"/>
      <stop offset="100%" style="stop-color:#37474f"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg5)"/>
  <!-- Lathe schematic -->
  <rect x="40" y="120" width="250" height="20" fill="#546e7a" rx="3"/>
  <!-- Headstock -->
  <rect x="40" y="80" width="50" height="80" fill="#455a64" rx="3"/>
  <circle cx="90" cy="130" r="18" fill="none" stroke="#78909c" stroke-width="3"/>
  <circle cx="90" cy="130" r="5" fill="#78909c"/>
  <!-- Workpiece (cylinder) -->
  <rect x="108" y="118" width="110" height="24" fill="#b0bec5" rx="12"/>
  <ellipse cx="108" cy="130" rx="4" ry="12" fill="#90a4ae"/>
  <ellipse cx="218" cy="130" rx="4" ry="12" fill="#cfd8dc"/>
  <!-- Cutting tool -->
  <polygon points="180,105 185,95 195,100 190,110" fill="#ffc107"/>
  <rect x="185" y="70" width="60" height="15" fill="#795548" rx="2"/>
  <!-- Sparks -->
  <g fill="#ff9800" opacity="0.8">
    <circle cx="185" cy="108" r="1.5"/><circle cx="190" cy="105" r="1"/>
    <circle cx="182" cy="110" r="1"/><circle cx="188" cy="112" r="1.5"/>
    <circle cx="192" cy="108" r="1"/><circle cx="186" cy="115" r="1"/>
  </g>
  <!-- Tailstock -->
  <rect x="230" y="90" width="40" height="70" fill="#455a64" rx="3"/>
  <polygon points="230,120 222,125 222,135 230,140" fill="#546e7a"/>
  <!-- Files set -->
  <text x="380" y="60" fill="#78909c" font-size="10" text-anchor="middle" font-weight="bold">Напильники</text>
  <rect x="340" y="70" width="80" height="8" fill="#546e7a" rx="2"/>
  <rect x="360" y="68" width="4" height="12" fill="#8d6e63"/>
  <rect x="340" y="85" width="80" height="8" fill="#546e7a" rx="2"/>
  <rect x="360" y="83" width="4" height="12" fill="#8d6e63"/>
  <rect x="340" y="100" width="80" height="8" fill="#546e7a" rx="2"/>
  <rect x="360" y="98" width="4" height="12" fill="#8d6e63"/>
  <text x="380" y="128" fill="#78909c" font-size="7" text-anchor="middle">№1 Драчёвый</text>
  <text x="380" y="138" fill="#78909c" font-size="7" text-anchor="middle">№2 Личной</text>
  <text x="380" y="148" fill="#78909c" font-size="7" text-anchor="middle">№3 Бархатный</text>
  <!-- Heat treatment -->
  <text x="120" y="195" fill="#ff5722" font-size="10" text-anchor="middle" font-weight="bold">Термическая обработка</text>
  <!-- Flame -->
  <g transform="translate(80,210)">
    <ellipse cx="25" cy="30" rx="20" ry="25" fill="#ff5722" opacity="0.4"/>
    <ellipse cx="25" cy="25" rx="12" ry="18" fill="#ff9800" opacity="0.6"/>
    <ellipse cx="25" cy="20" rx="6" ry="10" fill="#ffc107" opacity="0.8"/>
  </g>
  <rect x="75" y="240" width="60" height="20" fill="#b0bec5" rx="3" opacity="0.5"/>
  <text x="105" y="275" fill="#78909c" font-size="8" text-anchor="middle">Закалка</text>
  <!-- Water drop -->
  <path d="M200,240 Q205,225 210,240 Q205,248 200,240" fill="#4fc3f7" opacity="0.7"/>
  <path d="M215,245 Q220,230 225,245 Q220,253 215,245" fill="#4fc3f7" opacity="0.5"/>
  <text x="210" y="275" fill="#78909c" font-size="8" text-anchor="middle">Охлаждение</text>
  <!-- Thread cutting -->
  <text x="360" y="195" fill="#78909c" font-size="10" text-anchor="middle" font-weight="bold">Нарезание резьбы</text>
  <rect x="330" y="210" width="80" height="14" fill="#b0bec5" rx="3"/>
  <g stroke="#78909c" stroke-width="1.5">
    <line x1="335" y1="213" x2="335" y2="221"/><line x1="345" y1="213" x2="345" y2="221"/>
    <line x1="355" y1="213" x2="355" y2="221"/><line x1="365" y1="213" x2="365" y2="221"/>
    <line x1="375" y1="213" x2="375" y2="221"/><line x1="385" y1="213" x2="385" y2="221"/>
    <line x1="395" y1="213" x2="395" y2="221"/><line x1="405" y1="213" x2="405" y2="221"/>
  </g>
  <g stroke="#546e7a" stroke-width="1" opacity="0.5">
    <line x1="338" y1="213" x2="338" y2="221"/><line x1="348" y1="213" x2="348" y2="221"/>
    <line x1="358" y1="213" x2="358" y2="221"/><line x1="368" y1="213" x2="368" y2="221"/>
    <line x1="378" y1="213" x2="378" y2="221"/><line x1="388" y1="213" x2="388" y2="221"/>
    <line x1="398" y1="213" x2="398" y2="221"/><line x1="408" y1="213" x2="408" y2="221"/>
  </g>
  <text x="360" y="240" fill="#78909c" font-size="8" text-anchor="middle">Плашка / Метчик</text>
  <!-- Operations list -->
  <text x="250" y="310" fill="#78909c" font-size="9" text-anchor="middle">Разметка → Рубка → Опиливание → Сверление → Нарезание резьбы</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Обработка металла</text>
</svg>