<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d1b3e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg3)"/>
  <!-- Crystal lattice (metal) -->
  <text x="80" y="55" fill="#e2b714" font-size="10" text-anchor="middle" font-weight="bold">Металл</text>
  <g fill="#4fc3f7" stroke="#4fc3f7" stroke-width="1">
    <circle cx="50" cy="80" r="5"/><circle cx="80" cy="80" r="5"/><circle cx="110" cy="80" r="5"/>
    <circle cx="50" cy="110" r="5"/><circle cx="80" cy="110" r="5"/><circle cx="110" cy="110" r="5"/>
    <circle cx="50" cy="140" r="5"/><circle cx="80" cy="140" r="5"/><circle cx="110" cy="140" r="5"/>
    <line x1="50" y1="80" x2="80" y2="80"/><line x1="80" y1="80" x2="110" y2="80"/>
    <line x1="50" y1="110" x2="80" y2="110"/><line x1="80" y1="110" x2="110" y2="110"/>
    <line x1="50" y1="140" x2="80" y2="140"/><line x1="80" y1="140" x2="110" y2="140"/>
    <line x1="50" y1="80" x2="50" y2="110"/><line x1="80" y1="80" x2="80" y2="110"/><line x1="110" y1="80" x2="110" y2="110"/>
    <line x1="50" y1="110" x2="50" y2="140"/><line x1="80" y1="110" x2="80" y2="140"/><line x1="110" y1="110" x2="110" y2="140"/>
  </g>
  <!-- Polymer chains -->
  <text x="250" y="55" fill="#e2b714" font-size="10" text-anchor="middle" font-weight="bold">Полимер</text>
  <g fill="none" stroke="#ff7043" stroke-width="3" stroke-linecap="round">
    <path d="M200,90 Q220,70 240,90 Q260,110 280,90 Q300,70 300,90"/>
    <path d="M200,130 Q220,110 240,130 Q260,150 280,130 Q300,110 300,130"/>
    <circle cx="200" cy="90" r="4" fill="#ff7043"/><circle cx="240" cy="90" r="4" fill="#ff7043"/>
    <circle cx="280" cy="90" r="4" fill="#ff7043"/><circle cx="200" cy="130" r="4" fill="#ff7043"/>
    <circle cx="240" cy="130" r="4" fill="#ff7043"/><circle cx="280" cy="130" r="4" fill="#ff7043"/>
  </g>
  <!-- Wood grain -->
  <text x="420" y="55" fill="#e2b714" font-size="10" text-anchor="middle" font-weight="bold">Древесина</text>
  <rect x="370" y="70" width="100" height="90" fill="#5d4037" rx="3"/>
  <g stroke="#8d6e63" stroke-width="1" fill="none" opacity="0.7">
    <path d="M370,85 Q420,82 470,87"/><path d="M370,100 Q415,96 470,101"/>
    <path d="M370,115 Q425,112 470,116"/><path d="M370,130 Q418,127 470,132"/>
    <path d="M370,145 Q420,142 470,147"/>
  </g>
  <!-- Properties comparison bars -->
  <text x="250" y="195" fill="#e2b714" font-size="11" text-anchor="middle" font-weight="bold">Прочность</text>
  <rect x="40" y="205" width="200" height="14" fill="#4fc3f7" rx="3" opacity="0.8"/>
  <text x="140" y="215" fill="#1a1a2e" font-size="8" text-anchor="middle">Сталь</text>
  <rect x="40" y="225" width="80" height="14" fill="#ff7043" rx="3" opacity="0.8"/>
  <text x="80" y="235" fill="#1a1a2e" font-size="8" text-anchor="middle">Пластик</text>
  <rect x="40" y="245" width="50" height="14" fill="#8d6e63" rx="3" opacity="0.8"/>
  <text x="65" y="255" fill="#1a1a2e" font-size="8" text-anchor="middle">Дерево</text>
  <!-- Density labels -->
  <text x="300" y="215" fill="#4fc3f7" font-size="9">7800 кг/м³</text>
  <text x="300" y="235" fill="#ff7043" font-size="9">1200 кг/м³</text>
  <text x="300" y="255" fill="#8d6e63" font-size="9">600 кг/м³</text>
  <text x="250" y="290" fill="#e2b714" font-size="9" text-anchor="middle">Композит = материал из двух+ компонентов</text>
  <!-- Composite diagram -->
  <rect x="160" y="300" width="180" height="20" fill="#4fc3f7" opacity="0.3" rx="3"/>
  <g fill="#ff7043" opacity="0.7">
    <rect x="165" y="303" width="15" height="14" rx="2"/><rect x="190" y="303" width="15" height="14" rx="2"/>
    <rect x="215" y="303" width="15" height="14" rx="2"/><rect x="240" y="303" width="15" height="14" rx="2"/>
    <rect x="265" y="303" width="15" height="14" rx="2"/><rect x="290" y="303" width="15" height="14" rx="2"/>
    <rect x="315" y="303" width="15" height="14" rx="2"/>
  </g>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Материаловедение</text>
</svg>