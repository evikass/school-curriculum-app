<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b2838"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg2)"/>
  <!-- Blueprint grid -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="50" x2="500" y2="50"/><line x1="0" y1="100" x2="500" y2="100"/>
    <line x1="0" y1="150" x2="500" y2="150"/><line x1="0" y1="200" x2="500" y2="200"/>
    <line x1="0" y1="250" x2="500" y2="250"/><line x1="0" y1="300" x2="500" y2="300"/>
    <line x1="50" y1="0" x2="50" y2="350"/><line x1="100" y1="0" x2="100" y2="350"/>
    <line x1="150" y1="0" x2="150" y2="350"/><line x1="200" y1="0" x2="200" y2="350"/>
    <line x1="250" y1="0" x2="250" y2="350"/><line x1="300" y1="0" x2="300" y2="350"/>
    <line x1="350" y1="0" x2="350" y2="350"/><line x1="400" y1="0" x2="400" y2="350"/>
    <line x1="450" y1="0" x2="450" y2="350"/>
  </g>
  <!-- Technical drawing - simple bracket -->
  <g stroke="#4fc3f7" stroke-width="2" fill="none">
    <rect x="100" y="80" width="150" height="100"/>
    <line x1="100" y1="130" x2="250" y2="130" stroke-dasharray="6,3"/>
    <circle cx="135" cy="115" r="10"/>
    <circle cx="215" cy="115" r="10"/>
    <circle cx="175" cy="155" r="8"/>
    <!-- Dimension lines -->
    <line x1="100" y1="65" x2="250" y2="65"/>
    <line x1="100" y1="60" x2="100" y2="70"/>
    <line x1="250" y1="60" x2="250" y2="70"/>
    <line x1="80" y1="80" x2="80" y2="180"/>
    <line x1="75" y1="80" x2="85" y2="80"/>
    <line x1="75" y1="180" x2="85" y2="180"/>
  </g>
  <text x="175" y="62" fill="#4fc3f7" font-size="9" text-anchor="middle">150</text>
  <text x="72" y="135" fill="#4fc3f7" font-size="9" text-anchor="end">100</text>
  <!-- Document sheet -->
  <rect x="290" y="60" width="170" height="230" fill="#1a3050" stroke="#4fc3f7" stroke-width="1.5" rx="2"/>
  <rect x="290" y="260" width="170" height="30" fill="#4fc3f7" opacity="0.1" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="305" y1="85" x2="445" y2="85" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
  <line x1="305" y1="105" x2="430" y2="105" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
  <line x1="305" y1="125" x2="440" y2="125" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
  <line x1="305" y1="145" x2="420" y2="145" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
  <line x1="305" y1="165" x2="445" y2="165" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
  <line x1="305" y1="185" x2="435" y2="185" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
  <text x="375" y="280" fill="#4fc3f7" font-size="8" text-anchor="middle">Основная надпись</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Технологическая документация</text>
</svg>