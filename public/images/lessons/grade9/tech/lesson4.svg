<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3e2723"/>
      <stop offset="100%" style="stop-color:#4e342e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg4)"/>
  <!-- Wood plank -->
  <rect x="30" y="60" width="200" height="30" fill="#8d6e63" rx="3"/>
  <rect x="30" y="60" width="200" height="30" fill="none" stroke="#a1887f" stroke-width="1" rx="3"/>
  <g stroke="#a1887f" stroke-width="0.5" opacity="0.5">
    <line x1="30" y1="70" x2="230" y2="70"/><line x1="30" y1="80" x2="230" y2="80"/>
  </g>
  <!-- Saw cutting -->
  <path d="M120,55 L120,30 L125,35 L130,28 L135,35 L140,28 L145,35 L150,28 L155,35 L160,28 L165,35 L170,28 L175,35 L180,28 L185,35 L190,30 L190,55" fill="#b0bec5" stroke="#78909c" stroke-width="1"/>
  <rect x="145" y="25" width="80" height="10" fill="#5d4037" rx="2"/>
  <!-- Sawdust particles -->
  <g fill="#d7ccc8" opacity="0.6">
    <circle cx="130" cy="95" r="1.5"/><circle cx="140" cy="98" r="1"/><circle cx="150" cy="92" r="1.5"/>
    <circle cx="160" cy="100" r="1"/><circle cx="145" cy="105" r="1.5"/><circle cx="135" cy="102" r="1"/>
  </g>
  <!-- Plane (рубанок) -->
  <rect x="280" y="55" width="90" height="35" fill="#5d4037" rx="4"/>
  <rect x="280" y="55" width="90" height="10" fill="#795548" rx="2"/>
  <rect x="310" y="65" width="20" height="20" fill="#b0bec5" stroke="#78909c" stroke-width="1"/>
  <text x="325" y="105" fill="#d7ccc8" font-size="9" text-anchor="middle">Рубанок</text>
  <!-- Drill -->
  <rect x="400" y="40" width="12" height="60" fill="#ffc107" rx="2"/>
  <rect x="396" y="35" width="20" height="10" fill="#37474f" rx="2"/>
  <polygon points="406,100 402,120 410,120" fill="#b0bec5"/>
  <circle cx="406" cy="130" r="8" fill="none" stroke="#d7ccc8" stroke-width="1" stroke-dasharray="3"/>
  <text x="406" y="155" fill="#d7ccc8" font-size="9" text-anchor="middle">Сверло</text>
  <!-- Chisel -->
  <rect x="50" y="170" width="10" height="50" fill="#5d4037" rx="2"/>
  <polygon points="55,220 48,250 62,250" fill="#b0bec5" stroke="#78909c" stroke-width="1"/>
  <text x="55" y="268" fill="#d7ccc8" font-size="9" text-anchor="middle">Стамеска</text>
  <!-- Sandpaper texture -->
  <rect x="140" y="175" width="100" height="60" fill="#fff9c4" rx="3"/>
  <g fill="#f9a825" opacity="0.4">
    <circle cx="150" cy="185" r="1"/><circle cx="160" cy="190" r="1"/><circle cx="170" cy="185" r="1"/>
    <circle cx="180" cy="192" r="1"/><circle cx="190" cy="187" r="1"/><circle cx="200" cy="193" r="1"/>
    <circle cx="210" cy="185" r="1"/><circle cx="220" cy="190" r="1"/><circle cx="155" cy="200" r="1"/>
    <circle cx="165" cy="205" r="1"/><circle cx="175" cy="200" r="1"/><circle cx="185" cy="207" r="1"/>
    <circle cx="195" cy="202" r="1"/><circle cx="205" cy="208" r="1"/><circle cx="215" cy="203" r="1"/>
    <circle cx="225" cy="200" r="1"/><circle cx="150" cy="218" r="1"/><circle cx="160" cy="222" r="1"/>
    <circle cx="170" cy="218" r="1"/><circle cx="180" cy="225" r="1"/><circle cx="190" cy="220" r="1"/>
    <circle cx="200" cy="226" r="1"/><circle cx="210" cy="219" r="1"/><circle cx="220" cy="224" r="1"/>
  </g>
  <text x="190" y="250" fill="#d7ccc8" font-size="9" text-anchor="middle">Наждачная бумага</text>
  <!-- Joint diagram: шип-паз -->
  <text x="370" y="175" fill="#e2b714" font-size="10" text-anchor="middle" font-weight="bold">Шип-паз</text>
  <rect x="320" y="185" width="50" height="30" fill="#8d6e63" rx="1"/>
  <rect x="370" y="185" width="50" height="30" fill="#a1887f" rx="1"/>
  <rect x="350" y="188" width="20" height="24" fill="#4e342e" rx="1"/>
  <rect x="370" y="188" width="20" height="24" fill="#4e342e" rx="1" opacity="0"/>
  <!-- Arrow showing connection -->
  <path d="M345,200 L370,200" stroke="#e2b714" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="370" y="235" fill="#d7ccc8" font-size="8" text-anchor="middle">Соединение</text>
  <!-- Processing steps -->
  <text x="250" y="290" fill="#e2b714" font-size="10" text-anchor="middle">Пиление → Строгание → Сверление → Шлифование</text>
  <g fill="#8d6e63" opacity="0.6">
    <rect x="30" y="300" width="440" height="30" rx="3"/>
  </g>
  <g stroke="#a1887f" stroke-width="0.5" opacity="0.4">
    <line x1="30" y1="310" x2="470" y2="310"/><line x1="30" y1="320" x2="470" y2="320"/>
  </g>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Обработка древесины</text>
</svg>