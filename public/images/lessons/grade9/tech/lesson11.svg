<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3e2723"/>
      <stop offset="100%" style="stop-color:#4e342e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg11)"/>
  <!-- Pot with steam -->
  <ellipse cx="150" cy="140" rx="55" ry="15" fill="#5d4037"/>
  <rect x="95" y="140" width="110" height="60" fill="#795548" rx="3"/>
  <ellipse cx="150" cy="200" rx="55" ry="12" fill="#5d4037"/>
  <!-- Handles -->
  <rect x="80" y="155" width="18" height="8" fill="#8d6e63" rx="3"/>
  <rect x="202" y="155" width="18" height="8" fill="#8d6e63" rx="3"/>
  <!-- Steam -->
  <g stroke="#d7ccc8" stroke-width="2" fill="none" opacity="0.5">
    <path d="M130,130 Q125,115 130,100 Q135,85 130,70"/>
    <path d="M150,125 Q145,110 150,95 Q155,80 150,65"/>
    <path d="M170,130 Q165,115 170,100 Q175,85 170,70"/>
  </g>
  <text x="150" y="230" fill="#d7ccc8" font-size="9" text-anchor="middle">Варка 100°C</text>
  <!-- Frying pan -->
  <ellipse cx="340" cy="120" rx="50" ry="12" fill="#37474f"/>
  <ellipse cx="340" cy="118" rx="45" ry="10" fill="#ff9800" opacity="0.3"/>
  <rect x="385" y="112" width="50" height="10" fill="#5d4037" rx="3"/>
  <!-- Oil drops -->
  <g fill="#ffc107" opacity="0.6">
    <circle cx="320" cy="115" r="3"/><circle cx="340" cy="118" r="2.5"/>
    <circle cx="355" cy="113" r="2"/><circle cx="330" cy="120" r="1.5"/>
  </g>
  <text x="340" y="145" fill="#d7ccc8" font-size="9" text-anchor="middle">Жарка 140–180°C</text>
  <!-- Food pyramid -->
  <g transform="translate(200,200)">
    <!-- Pyramid levels -->
    <polygon points="80,10 120,10 115,30 85,30" fill="#4caf50" opacity="0.7"/>
    <polygon points="70,35 130,35 125,60 75,60" fill="#ff9800" opacity="0.7"/>
    <polygon points="60,65 140,65 135,90 65,90" fill="#f44336" opacity="0.7"/>
    <polygon points="50,95 150,95 145,120 55,120" fill="#9c27b0" opacity="0.7"/>
    <!-- Labels -->
    <text x="100" y="25" fill="white" font-size="7" text-anchor="middle">Сладости</text>
    <text x="100" y="52" fill="white" font-size="7" text-anchor="middle">Мясо, рыба</text>
    <text x="100" y="82" fill="white" font-size="7" text-anchor="middle">Овощи, фрукты</text>
    <text x="100" y="112" fill="white" font-size="7" text-anchor="middle">Крупы, хлеб</text>
  </g>
  <!-- Temperature scale -->
  <g transform="translate(40,240)">
    <rect x="0" y="0" width="120" height="15" fill="#0d1b2a" rx="3"/>
    <rect x="0" y="0" width="30" height="15" fill="#4fc3f7" rx="3" opacity="0.6"/>
    <rect x="30" y="0" width="40" height="15" fill="#ff9800" rx="0" opacity="0.6"/>
    <rect x="70" y="0" width="50" height="15" fill="#f44336" rx="3" opacity="0.6"/>
    <text x="15" y="11" fill="white" font-size="7" text-anchor="middle">95°</text>
    <text x="50" y="11" fill="white" font-size="7" text-anchor="middle">140°</text>
    <text x="95" y="11" fill="white" font-size="7" text-anchor="middle">220°</text>
  </g>
  <text x="100" y="270" fill="#d7ccc8" font-size="7" text-anchor="middle">Тушение    Жарка    Запекание</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Кулинария</text>
</svg>