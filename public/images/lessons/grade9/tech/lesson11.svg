<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#FF9800" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#FF9800" stroke-width="1" opacity="0.3"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#FF9800" text-anchor="middle">Автоматизация производства</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Технология — Урок 11</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#FF9800" stroke-width="2" opacity="0.25"/>
  <rect x="15" y="72" width="235" height="225" rx="4" fill="#FF9800" opacity="0.05"/>
  <text x="22" y="88" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">Автоматизация —</text>
  <text x="85" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">замена ручного труда машинным</text>
  <text x="22" y="108" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">Этапы:</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">Механизация — машины вместо мышц</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Автоматизация — программы вместо людей</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Роботизация — роботы вместо операторов</text>
  <text x="22" y="168" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">Роботы:</text>
  <text x="85" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Промышленные — сварка, покраска</text>
  <rect x="255" y="72" width="230" height="225" rx="4" fill="#FF9800" opacity="0.05"/>
  <text x="272" y="88" font-family="Arial,sans-serif" font-size="10" fill="#333">Манипуляторы — перенос грузов</text>
  <text x="272" y="108" font-family="Arial,sans-serif" font-size="10" fill="#333">СЧПУ — станки с программным управлением</text>
  <text x="262" y="128" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">Плюсы:</text>
  <text x="325" y="128" font-family="Arial,sans-serif" font-size="10" fill="#333">Скорость, точность, 24/7</text>
  <text x="272" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">Безопасность для людей</text>
  <text x="262" y="168" font-family="Arial,sans-serif" font-size="10" fill="#E65100" font-weight="bold">Минусы:</text>
  <text x="325" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333">Безработица в ручном труде</text>
  <text x="272" y="188" font-family="Arial,sans-serif" font-size="10" fill="#333">Высокие начальные затраты</text>
  <rect x="15" y="280" width="235" height="18" rx="4" fill="#FF9800" opacity="0.06"/>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Робот — не враг, а помощник</text>
  <rect x="255" y="280" width="230" height="18" rx="4" fill="#FF9800" opacity="0.06"/>
  <text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Индустрия 4.0 — умное производство</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Технология · Автоматизация произв</text>
</svg>