<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d2137"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg10)"/>
  <!-- Robot body -->
  <rect x="160" y="80" width="80" height="90" fill="#455a64" rx="8" stroke="#78909c" stroke-width="2"/>
  <!-- Robot head -->
  <rect x="170" y="40" width="60" height="40" fill="#546e7a" rx="5" stroke="#78909c" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="185" cy="58" r="8" fill="#0d1b2a" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="215" cy="58" r="8" fill="#0d1b2a" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="185" cy="58" r="3" fill="#4fc3f7"/><circle cx="215" cy="58" r="3" fill="#4fc3f7"/>
  <!-- Antenna -->
  <line x1="200" y1="40" x2="200" y2="20" stroke="#78909c" stroke-width="2"/>
  <circle cx="200" cy="16" r="4" fill="#f44336"/>
  <!-- Mouth -->
  <rect x="180" y="68" width="40" height="5" fill="#4fc3f7" opacity="0.4" rx="2"/>
  <!-- Arms -->
  <rect x="130" y="90" width="30" height="12" fill="#546e7a" rx="3" stroke="#78909c" stroke-width="1"/>
  <rect x="240" y="90" width="30" height="12" fill="#546e7a" rx="3" stroke="#78909c" stroke-width="1"/>
  <!-- Wheels -->
  <circle cx="170" cy="185" r="15" fill="#37474f" stroke="#78909c" stroke-width="2"/>
  <circle cx="170" cy="185" r="5" fill="#78909c"/>
  <circle cx="230" cy="185" r="15" fill="#37474f" stroke="#78909c" stroke-width="2"/>
  <circle cx="230" cy="185" r="5" fill="#78909c"/>
  <!-- Ultrasonic sensor -->
  <circle cx="200" cy="110" r="10" fill="#1a237e" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="200" cy="110" r="4" fill="#4fc3f7"/>
  <!-- Sound waves -->
  <path d="M215,105 A15,15 0 0,1 215,115" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.6"/>
  <path d="M222,100 A22,22 0 0,1 222,120" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <path d="M229,95 A29,29 0 0,1 229,125" fill="none" stroke="#4fc3f7" stroke-width="1" opacity="0.2"/>
  <!-- Arduino board -->
  <rect x="330" y="40" width="140" height="100" fill="#1a237e" rx="5" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="400" y="60" fill="#4fc3f7" font-size="12" text-anchor="middle" font-weight="bold">Arduino</text>
  <rect x="345" y="70" width="30" height="20" fill="#37474f" rx="2"/>
  <text x="360" y="84" fill="#4fc3f7" font-size="7" text-anchor="middle">ATmega</text>
  <!-- Pin headers -->
  <g fill="#ffc107">
    <rect x="340" y="100" width="4" height="8"/><rect x="350" y="100" width="4" height="8"/>
    <rect x="360" y="100" width="4" height="8"/><rect x="370" y="100" width="4" height="8"/>
    <rect x="380" y="100" width="4" height="8"/><rect x="390" y="100" width="4" height="8"/>
    <rect x="400" y="100" width="4" height="8"/><rect x="410" y="100" width="4" height="8"/>
    <rect x="420" y="100" width="4" height="8"/><rect x="430" y="100" width="4" height="8"/>
    <rect x="440" y="100" width="4" height="8"/><rect x="450" y="100" width="4" height="8"/>
  </g>
  <text x="395" y="122" fill="#78909c" font-size="7" text-anchor="middle">D2 D3 D4 D5 D6 D7 D8 D9 D10 D11 D12 D13</text>
  <!-- USB port -->
  <rect x="450" y="70" width="20" height="12" fill="#78909c" rx="2"/>
  <text x="460" y="79" fill="#37474f" font-size="6" text-anchor="middle">USB</text>
  <!-- Sensors panel -->
  <rect x="330" y="160" width="140" height="90" fill="#0d2137" rx="5" stroke="#4caf50" stroke-width="1"/>
  <text x="400" y="180" fill="#4caf50" font-size="10" text-anchor="middle" font-weight="bold">Датчики</text>
  <!-- Ultrasonic -->
  <g transform="translate(345,190)">
    <rect x="0" y="0" width="30" height="20" fill="#1a237e" rx="2"/>
    <circle cx="10" cy="10" r="4" fill="none" stroke="#4fc3f7" stroke-width="1"/>
    <circle cx="22" cy="10" r="4" fill="none" stroke="#4fc3f7" stroke-width="1"/>
  </g>
  <text x="360" y="222" fill="#78909c" font-size="7" text-anchor="middle">Ультразвук</text>
  <!-- IR sensor -->
  <g transform="translate(395,190)">
    <rect x="0" y="0" width="30" height="20" fill="#1a237e" rx="2"/>
    <circle cx="15" cy="10" r="5" fill="#f44336" opacity="0.5"/>
  </g>
  <text x="410" y="222" fill="#78909c" font-size="7" text-anchor="middle">ИК-датчик</text>
  <!-- Servo -->
  <g transform="translate(345,228)">
    <rect x="0" y="0" width="30" height="18" fill="#37474f" rx="2"/>
    <circle cx="15" cy="9" r="4" fill="#78909c"/>
  </g>
  <text x="360" y="258" fill="#78909c" font-size="7" text-anchor="middle">Сервопривод</text>
  <!-- Code snippet -->
  <rect x="50" y="220" width="200" height="100" fill="#0d1b2a" rx="5" stroke="#4fc3f7" stroke-width="1"/>
  <text x="60" y="240" fill="#4fc3f7" font-family="monospace" font-size="9">if(dist &lt; 20) {</text>
  <text x="70" y="255" fill="#4caf50" font-family="monospace" font-size="9">robot.turnRight();</text>
  <text x="60" y="270" fill="#4fc3f7" font-family="monospace" font-size="9">} else {</text>
  <text x="70" y="285" fill="#4caf50" font-family="monospace" font-size="9">robot.forward();</text>
  <text x="60" y="300" fill="#4fc3f7" font-family="monospace" font-size="9">}</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Робототехника</text>
</svg>