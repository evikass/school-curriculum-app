<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg8)"/>
  <!-- Binary rain -->
  <g fill="#4fc3f7" font-family="monospace" font-size="11" opacity="0.3">
    <text x="20" y="30">0</text><text x="20" y="50">1</text><text x="20" y="70">0</text>
    <text x="20" y="90">1</text><text x="20" y="110">0</text><text x="20" y="130">1</text>
    <text x="60" y="40">1</text><text x="60" y="60">0</text><text x="60" y="80">1</text>
    <text x="60" y="100">1</text><text x="60" y="120">0</text>
    <text x="440" y="30">1</text><text x="440" y="50">0</text><text x="440" y="70">1</text>
    <text x="440" y="90">0</text><text x="440" y="110">1</text>
    <text x="470" y="40">0</text><text x="470" y="60">1</text><text x="470" y="80">0</text>
    <text x="470" y="100">1</text><text x="470" y="120">0</text>
  </g>
  <!-- Computer monitor -->
  <rect x="120" y="40" width="260" height="160" fill="#0d1b2a" rx="8" stroke="#4fc3f7" stroke-width="2"/>
  <rect x="130" y="50" width="240" height="130" fill="#0a1929" rx="4"/>
  <!-- Screen content - binary to decimal -->
  <text x="150" y="80" fill="#4fc3f7" font-family="monospace" font-size="14">1101₂</text>
  <text x="250" y="80" fill="#78909c" font-size="14">=</text>
  <text x="280" y="80" fill="#4caf50" font-family="monospace" font-size="14">13₁₀</text>
  <!-- Bit representation -->
  <g transform="translate(150,95)">
    <rect x="0" y="0" width="40" height="25" fill="#1a237e" rx="3" stroke="#4fc3f7" stroke-width="1"/>
    <rect x="45" y="0" width="40" height="25" fill="#1a237e" rx="3" stroke="#4fc3f7" stroke-width="1"/>
    <rect x="90" y="0" width="40" height="25" fill="#4fc3f7" rx="3" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
    <rect x="135" y="0" width="40" height="25" fill="#4fc3f7" rx="3" stroke="#4fc3f7" stroke-width="1" opacity="0.3"/>
    <text x="20" y="17" fill="#4fc3f7" font-size="12" text-anchor="middle">1</text>
    <text x="65" y="17" fill="#4fc3f7" font-size="12" text-anchor="middle">1</text>
    <text x="110" y="17" fill="#1a1a3e" font-size="12" text-anchor="middle">0</text>
    <text x="155" y="17" fill="#1a1a3e" font-size="12" text-anchor="middle">1</text>
    <text x="20" y="38" fill="#78909c" font-size="7" text-anchor="middle">2³=8</text>
    <text x="65" y="38" fill="#78909c" font-size="7" text-anchor="middle">2²=4</text>
    <text x="110" y="38" fill="#78909c" font-size="7" text-anchor="middle">2¹=2</text>
    <text x="155" y="38" fill="#78909c" font-size="7" text-anchor="middle">2⁰=1</text>
  </g>
  <text x="250" y="165" fill="#4caf50" font-size="9" text-anchor="middle">8 + 4 + 0 + 1 = 13</text>
  <!-- Monitor stand -->
  <rect x="220" y="200" width="60" height="15" fill="#37474f" rx="2"/>
  <rect x="200" y="215" width="100" height="8" fill="#455a64" rx="3"/>
  <!-- Data units -->
  <text x="250" y="260" fill="#4fc3f7" font-size="10" text-anchor="middle" font-weight="bold">Единицы информации</text>
  <g transform="translate(60,270)">
    <rect x="0" y="0" width="55" height="25" fill="#1a237e" rx="3"/>
    <text x="27" y="17" fill="#4fc3f7" font-size="10" text-anchor="middle">1 бит</text>
    <line x1="55" y1="12" x2="70" y2="12" stroke="#4fc3f7" stroke-width="1"/>
    <rect x="70" y="0" width="55" height="25" fill="#1a237e" rx="3"/>
    <text x="97" y="17" fill="#4fc3f7" font-size="10" text-anchor="middle">1 байт</text>
    <line x1="125" y1="12" x2="140" y2="12" stroke="#4fc3f7" stroke-width="1"/>
    <rect x="140" y="0" width="60" height="25" fill="#1a237e" rx="3"/>
    <text x="170" y="17" fill="#4fc3f7" font-size="9" text-anchor="middle">1 КБайт</text>
    <line x1="200" y1="12" x2="215" y2="12" stroke="#4fc3f7" stroke-width="1"/>
    <rect x="215" y="0" width="60" height="25" fill="#1a237e" rx="3"/>
    <text x="245" y="17" fill="#4fc3f7" font-size="9" text-anchor="middle">1 МБайт</text>
    <line x1="275" y1="12" x2="290" y2="12" stroke="#4fc3f7" stroke-width="1"/>
    <rect x="290" y="0" width="60" height="25" fill="#1a237e" rx="3"/>
    <text x="320" y="17" fill="#4fc3f7" font-size="9" text-anchor="middle">1 ГБайт</text>
  </g>
  <text x="90" y="310" fill="#78909c" font-size="7">×8</text>
  <text x="200" y="310" fill="#78909c" font-size="7">×1024</text>
  <text x="270" y="310" fill="#78909c" font-size="7">×1024</text>
  <text x="340" y="310" fill="#78909c" font-size="7">×1024</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Цифровые технологии</text>
</svg>