<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg9)"/>
  <!-- 3D Wireframe cube -->
  <g stroke="#4fc3f7" stroke-width="2" fill="none">
    <!-- Back face -->
    <polygon points="180,50 280,50 280,150 180,150" stroke-dasharray="5,5" opacity="0.4"/>
    <!-- Front face -->
    <polygon points="140,80 240,80 240,180 140,180"/>
    <!-- Connecting edges -->
    <line x1="140" y1="80" x2="180" y2="50" stroke-dasharray="5,5" opacity="0.4"/>
    <line x1="240" y1="80" x2="280" y2="50"/>
    <line x1="240" y1="180" x2="280" y2="150"/>
    <line x1="140" y1="180" x2="180" y2="150" stroke-dasharray="5,5" opacity="0.4"/>
  </g>
  <!-- Axis labels -->
  <line x1="190" y1="200" x2="290" y2="200" stroke="#ff9800" stroke-width="1.5"/>
  <text x="295" y="205" fill="#ff9800" font-size="10">X</text>
  <line x1="190" y1="200" x2="190" y2="120" stroke="#4caf50" stroke-width="1.5"/>
  <text x="185" y="115" fill="#4caf50" font-size="10">Y</text>
  <line x1="190" y1="200" x2="150" y2="230" stroke="#f44336" stroke-width="1.5"/>
  <text x="140" y="240" fill="#f44336" font-size="10">Z</text>
  <!-- CAD toolbar -->
  <rect x="330" y="30" width="150" height="250" fill="#0d1b2a" rx="5" stroke="#4fc3f7" stroke-width="1"/>
  <text x="405" y="55" fill="#4fc3f7" font-size="10" text-anchor="middle" font-weight="bold">Панель CAD</text>
  <line x1="340" y1="65" x2="470" y2="65" stroke="#4fc3f7" stroke-width="0.5" opacity="0.3"/>
  <!-- Tool buttons -->
  <rect x="340" y="75" width="40" height="30" fill="#1a237e" rx="3" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="350" y1="85" x2="370" y2="85" stroke="#4fc3f7" stroke-width="2"/><line x1="360" y1="80" x2="360" y2="100" stroke="#4fc3f7" stroke-width="2"/>
  <text x="385" y="93" fill="#78909c" font-size="8">Эскиз</text>
  <rect x="340" y="115" width="40" height="30" fill="#1a237e" rx="3" stroke="#4fc3f7" stroke-width="1"/>
  <polygon points="360,122 370,140 350,140" fill="#4fc3f7" opacity="0.6"/>
  <text x="385" y="133" fill="#78909c" font-size="8">Выдавливание</text>
  <rect x="340" y="155" width="40" height="30" fill="#1a237e" rx="3" stroke="#4fc3f7" stroke-width="1"/>
  <circle cx="360" cy="170" r="8" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="385" y="173" fill="#78909c" font-size="8">Вращение</text>
  <rect x="340" y="195" width="40" height="30" fill="#1a237e" rx="3" stroke="#4fc3f7" stroke-width="1"/>
  <path d="M348,210 Q360,200 372,210" fill="none" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="385" y="213" fill="#78909c" font-size="8">Фаска</text>
  <!-- Extrusion visualization -->
  <g transform="translate(40,240)">
    <polygon points="0,30 40,30 40,0 80,0 80,30 40,30" fill="#4fc3f7" opacity="0.15" stroke="#4fc3f7" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="30" stroke="#ff9800" stroke-width="2" stroke-dasharray="3"/>
    <text x="55" y="50" fill="#ff9800" font-size="8">Extrude</text>
  </g>
  <!-- 3D print nozzle -->
  <g transform="translate(160,270)">
    <rect x="30" y="0" width="20" height="15" fill="#78909c" rx="2"/>
    <polygon points="35,15 45,15 42,25 38,25" fill="#78909c"/>
    <rect x="15" y="30" width="50" height="8" fill="#4fc3f7" opacity="0.4" rx="1"/>
    <rect x="10" y="38" width="60" height="8" fill="#4fc3f7" opacity="0.3" rx="1"/>
    <rect x="5" y="46" width="70" height="8" fill="#4fc3f7" opacity="0.2" rx="1"/>
  </g>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">3D-моделирование</text>
</svg>