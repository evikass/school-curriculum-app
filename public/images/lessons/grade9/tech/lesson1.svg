<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <!-- Project flow arrows -->
  <path d="M60,100 L140,100 L140,80 L180,110 L140,140 L140,120 L60,120 Z" fill="#e2b714" opacity="0.8"/>
  <path d="M190,100 L270,100 L270,80 L310,110 L270,140 L270,120 L190,120 Z" fill="#e2b714" opacity="0.7"/>
  <path d="M320,100 L400,100 L400,80 L440,110 L400,140 L400,120 L320,120 Z" fill="#e2b714" opacity="0.6"/>
  <text x="120" y="115" fill="#1a1a2e" font-size="9" text-anchor="middle" font-weight="bold">Проблема</text>
  <text x="250" y="115" fill="#1a1a2e" font-size="9" text-anchor="middle" font-weight="bold">Цель</text>
  <text x="380" y="115" fill="#1a1a2e" font-size="9" text-anchor="middle" font-weight="bold">Исследование</text>
  <!-- Second row arrows -->
  <path d="M60,190 L140,190 L140,170 L180,200 L140,230 L140,210 L60,210 Z" fill="#e2b714" opacity="0.5"/>
  <path d="M190,190 L270,190 L270,170 L310,200 L270,230 L270,210 L190,210 Z" fill="#e2b714" opacity="0.45"/>
  <path d="M320,190 L400,190 L400,170 L440,200 L400,230 L400,210 L320,210 Z" fill="#e2b714" opacity="0.4"/>
  <text x="120" y="205" fill="#1a1a2e" font-size="9" text-anchor="middle" font-weight="bold">Конструирование</text>
  <text x="250" y="205" fill="#1a1a2e" font-size="9" text-anchor="middle" font-weight="bold">Моделирование</text>
  <text x="380" y="205" fill="#1a1a2e" font-size="9" text-anchor="middle" font-weight="bold">Реализация</text>
  <!-- Final step - star -->
  <polygon points="250,280 258,300 280,303 264,318 268,340 250,330 232,340 236,318 220,303 242,300" fill="#e2b714"/>
  <text x="250" y="315" fill="#1a1a2e" font-size="8" text-anchor="middle" font-weight="bold">Защита</text>
  <!-- Connecting curved arrows -->
  <path d="M440,110 Q460,150 440,190" fill="none" stroke="#e2b714" stroke-width="1.5" stroke-dasharray="4"/>
  <path d="M140,230 Q200,260 242,280" fill="none" stroke="#e2b714" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="250" y="60" fill="#e2b714" font-size="14" text-anchor="middle" font-weight="bold">Этапы проекта</text>
  <text x="250" y="345" fill="#aaa" font-size="9" text-anchor="middle" opacity="0.5">Проектная деятельность</text>
</svg>