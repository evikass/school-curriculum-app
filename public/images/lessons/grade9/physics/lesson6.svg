<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Pendulum -->
  <!-- Pivot point -->
  <circle cx="200" cy="50" r="4" fill="#9ca3af"/>
  <line x1="100" y1="50" x2="300" y2="50" stroke="#4a5568" stroke-width="3"/>
  <!-- String -->
  <line x1="200" y1="50" x2="280" y2="200" stroke="#9ca3af" stroke-width="1.5"/>
  <!-- Bob -->
  <circle cx="280" cy="200" r="15" fill="#ef4444" fill-opacity="0.4" stroke="#ef4444" stroke-width="2"/>
  <!-- Equilibrium position (dashed) -->
  <line x1="200" y1="50" x2="200" y2="240" stroke="#9ca3af" stroke-width="0.8" stroke-dasharray="4,4"/>
  <!-- Arc showing amplitude -->
  <path d="M200,230 A30,30 0 0,1 220,215" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="225" y="228" fill="#f59e0b" font-size="10" font-family="serif">A</text>
  <!-- Angle -->
  <path d="M200,80 A30,30 0 0,1 210,90" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="208" y="100" fill="#22d3ee" font-size="9" font-family="serif">l</text>
  <!-- Spring oscillator -->
  <!-- Wall -->
  <rect x="340" y="130" width="10" height="60" fill="#4a5568"/>
  <!-- Spring coils -->
  <path d="M350,160 L360,140 L370,180 L380,140 L390,180 L400,140 L410,180 L420,160" fill="none" stroke="#22d3ee" stroke-width="2"/>
  <!-- Mass -->
  <rect x="420" y="140" width="40" height="40" rx="3" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="2"/>
  <text x="440" y="165" fill="#ffffff" font-size="11" font-family="serif" text-anchor="middle">m</text>
  <!-- Surface -->
  <line x1="340" y1="200" x2="470" y2="200" stroke="#4a5568" stroke-width="1.5"/>
  <!-- Amplitude marker -->
  <line x1="420" y1="210" x2="460" y2="210" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="440" y="225" fill="#f59e0b" font-size="9" font-family="serif">A</text>
  <!-- Wave shape -->
  <path d="M50,290 Q80,270 110,290 Q140,310 170,290 Q200,270 230,290 Q260,310 290,290 Q320,270 350,290 Q380,310 410,290 Q440,270 470,290" fill="none" stroke="#ec4899" stroke-width="2"/>
  <text x="260" y="280" fill="#ec4899" font-size="9" font-family="serif">x(t) = A·cos(ωt)</text>
  <!-- Formulas -->
  <text x="200" y="260" fill="#ef4444" font-size="9" font-family="serif">T=2π√(l/g)</text>
  <text x="380" y="125" fill="#22d3ee" font-size="9" font-family="serif">T=2π√(m/k)</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Механические колебания</text>
</svg>