<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Roller coaster / energy conversion -->
  <!-- Track -->
  <path d="M50,250 Q100,250 150,200 Q200,150 250,80 Q300,150 350,200 Q400,250 450,250" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <!-- Ball at top -->
  <circle cx="250" cy="75" r="10" fill="#ef4444"/>
  <text x="250" y="60" fill="#ef4444" font-size="10" font-family="serif" text-anchor="middle">Eп макс</text>
  <text x="250" y="48" fill="#9ca3af" font-size="9" font-family="serif" text-anchor="middle">Eк = 0</text>
  <!-- Ball at bottom (concept) -->
  <circle cx="150" cy="196" r="8" fill="#3b82f6" opacity="0.6"/>
  <text x="150" y="180" fill="#3b82f6" font-size="9" font-family="serif" text-anchor="middle">Eк↑</text>
  <circle cx="350" cy="196" r="8" fill="#3b82f6" opacity="0.6"/>
  <!-- Energy bars -->
  <rect x="30" y="280" width="40" height="40" rx="3" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
  <text x="50" y="305" fill="#22c55e" font-size="9" font-family="serif" text-anchor="middle">Eп</text>
  <rect x="80" y="295" width="40" height="25" rx="3" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="100" y="312" fill="#ef4444" font-size="9" font-family="serif" text-anchor="middle">Eк</text>
  <text x="75" y="335" fill="#9ca3af" font-size="8" font-family="sans-serif">вверху</text>
  <!-- Bottom bars -->
  <rect x="380" y="295" width="40" height="25" rx="3" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="312" fill="#22c55e" font-size="9" font-family="serif" text-anchor="middle">Eп</text>
  <rect x="430" y="280" width="40" height="40" rx="3" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="1.5"/>
  <text x="450" y="305" fill="#ef4444" font-size="9" font-family="serif" text-anchor="middle">Eк</text>
  <text x="425" y="335" fill="#9ca3af" font-size="8" font-family="sans-serif">внизу</text>
  <!-- Formulas -->
  <rect x="160" y="270" width="180" height="65" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="250" y="288" fill="#ef4444" font-size="10" font-family="serif" text-anchor="middle">Eк = mv²/2</text>
  <text x="250" y="305" fill="#22c55e" font-size="10" font-family="serif" text-anchor="middle">Eп = mgh</text>
  <text x="250" y="325" fill="#f59e0b" font-size="10" font-family="serif" text-anchor="middle">Eк₁+Eп₁ = Eк₂+Eп₂</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Механическая энергия</text>
</svg>