<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#1565C0" opacity="0.12"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Энергия. Закон сохранения энергии</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Физика — Урок 5</text>
  <line x1="30" y1="68" x2="470" y2="68" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="75" width="220" height="65" rx="4" fill="#42A5F5" opacity="0.07"/>
  <text x="30" y="92" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">Кинетическая:</text>
  <text x="30" y="110" font-family="Arial,sans-serif" font-size="15" fill="#E53935" text-anchor="start" font-weight="bold">Eк = mv²/2</text>
  <text x="30" y="130" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">Энергия движения</text>
  <rect x="250" y="75" width="230" height="65" rx="4" fill="#42A5F5" opacity="0.07"/>
  <text x="260" y="92" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">Потенциальная:</text>
  <text x="260" y="110" font-family="Arial,sans-serif" font-size="15" fill="#2E7D32" text-anchor="start" font-weight="bold">Eп = mgh</text>
  <text x="260" y="130" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">Энергия положения</text>
  <rect x="20" y="148" width="460" height="50" rx="4" fill="#E53935" opacity="0.06"/>
  <text x="250" y="168" font-family="Arial,sans-serif" font-size="16" fill="#E53935" text-anchor="middle" font-weight="bold">Eк + Eп = const</text>
  <text x="250" y="188" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Закон сохранения механической энергии</text>
  <rect x="20" y="205" width="460" height="90" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="30" y="222" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">Маятник:</text>
  <line x1="250" y1="220" x2="180" y2="270" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="180" cy="275" r="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="140" y="278" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="start">Eп=max</text>
  <text x="140" y="290" font-family="Arial,sans-serif" font-size="9" fill="#E53935" text-anchor="start">Eк=0</text>
  <line x1="250" y1="220" x2="250" y2="278" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="250" cy="283" r="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="255" y="278" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="start">Eп=0</text>
  <text x="255" y="290" font-family="Arial,sans-serif" font-size="9" fill="#E53935" text-anchor="start">Eк=max</text>
  <line x1="250" y1="220" x2="320" y2="270" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="320" cy="275" r="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="330" y="278" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="start">Eп=max</text>
  <text x="330" y="290" font-family="Arial,sans-serif" font-size="9" fill="#E53935" text-anchor="start">Eк=0</text>
  <rect x="244" y="215" width="12" height="5" rx="2" fill="#555"/>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Физика · Энергия</text>
</svg>