<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#1565C0" opacity="0.12"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Электромагнитная индукция</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Физика — Урок 9</text>
  <line x1="30" y1="68" x2="470" y2="68" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="75" width="460" height="45" rx="4" fill="#42A5F5" opacity="0.07"/>
  <text x="30" y="92" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">Фарадей: изменение магнитного потока</text>
  <text x="30" y="110" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start">создаёт ЭДС индукции в контуре</text>
  <rect x="20" y="125" width="460" height="50" rx="4" fill="#E53935" opacity="0.06"/>
  <text x="250" y="148" font-family="Arial,sans-serif" font-size="18" fill="#E53935" text-anchor="middle" font-weight="bold">ЭДС = −ΔΦ/Δt</text>
  <text x="250" y="168" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Закон Фарадея (минус — правило Ленца)</text>
  <rect x="20" y="182" width="230" height="110" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="30" y="199" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Магнитный поток:</text>
  <text x="30" y="218" font-family="Arial,sans-serif" font-size="14" fill="#42A5F5" text-anchor="start" font-weight="bold">Φ = B · S · cos α</text>
  <text x="30" y="238" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">[Φ] = Вб (Вебер)</text>
  <rect x="100" y="250" width="70" height="30" rx="3" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <line x1="60" y1="265" x2="100" y2="265" stroke="#E53935" stroke-width="1.5"/>
  <line x1="170" y1="265" x2="210" y2="265" stroke="#E53935" stroke-width="1.5"/>
  <text x="50" y="262" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start" font-weight="bold">B</text>
  <text x="210" y="262" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start" font-weight="bold">S</text>
  <rect x="260" y="182" width="220" height="110" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="270" y="199" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Правило Ленца:</text>
  <text x="270" y="218" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">Индукционный ток</text>
  <text x="270" y="233" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">препятствует изменению</text>
  <text x="270" y="248" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">магнитного потока,</text>
  <text x="270" y="263" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">его вызывающего.</text>
  <text x="270" y="284" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">Применение: генераторы,</text>
  <text x="270" y="298" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">трансформаторы, индукционные</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Физика · Электромагнитная индукция</text>
</svg>