<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Coil/solenoid -->
  <path d="M80,120 Q100,90 120,120 Q140,150 160,120 Q180,90 200,120 Q220,150 240,120 Q260,90 280,120 Q300,150 320,120 Q340,90 360,120" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
  <!-- Magnet moving toward coil -->
  <rect x="20" y="100" width="50" height="40" rx="3" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <rect x="50" y="100" width="30" height="40" rx="3" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
  <text x="35" y="125" fill="#ef4444" font-size="12" font-family="serif" text-anchor="middle">N</text>
  <text x="65" y="125" fill="#3b82f6" font-size="12" font-family="serif" text-anchor="middle">S</text>
  <!-- Arrow showing motion -->
  <line x1="55" y1="150" x2="100" y2="150" stroke="#22c55e" stroke-width="2"/>
  <polygon points="100,146 110,150 100,154" fill="#22c55e"/>
  <!-- Galvanometer -->
  <circle cx="430" cy="120" r="30" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="430" y="125" fill="#9ca3af" font-size="10" font-family="serif" text-anchor="middle">G</text>
  <line x1="360" y1="120" x2="400" y2="120" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="460" y1="120" x2="480" y2="120" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="480" y1="120" x2="480" y2="200" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="80" y1="120" x2="80" y2="200" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="80" y1="200" x2="480" y2="200" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Magnetic flux visualization -->
  <g stroke="#22d3ee" stroke-width="1" opacity="0.5">
    <line x1="30" y1="60" x2="30" y2="170"/>
    <line x1="40" y1="60" x2="40" y2="170"/>
    <line x1="50" y1="60" x2="50" y2="170"/>
  </g>
  <!-- Formulas -->
  <rect x="30" y="240" width="440" height="85" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="260" fill="#22d3ee" font-size="11" font-family="serif" text-anchor="middle">Φ = BS cosα — магнитный поток</text>
  <text x="250" y="280" fill="#ef4444" font-size="11" font-family="serif" text-anchor="middle">ε = −ΔΦ/Δt — закон Фарадея</text>
  <text x="250" y="300" fill="#f59e0b" font-size="10" font-family="serif" text-anchor="middle">Правило Ленца: инд. ток препятствует изменению Φ</text>
  <text x="250" y="318" fill="#ec4899" font-size="10" font-family="serif" text-anchor="middle">ε = −LΔI/Δt — самоиндукция</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Электромагнитная индукция</text>
</svg>