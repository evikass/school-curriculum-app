<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Ground -->
  <line x1="30" y1="280" x2="470" y2="280" stroke="#4a5568" stroke-width="2"/>
  <!-- Free fall path -->
  <circle cx="100" cy="80" r="8" fill="#ef4444"/>
  <!-- Dotted fall trajectory -->
  <line x1="100" y1="90" x2="100" y2="270" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6,4"/>
  <circle cx="100" cy="280" r="8" fill="#ef4444" opacity="0.5"/>
  <!-- Velocity arrows -->
  <line x1="115" y1="100" x2="115" y2="140" stroke="#f59e0b" stroke-width="2"/>
  <line x1="115" y1="150" x2="115" y2="210" stroke="#f59e0b" stroke-width="2.5"/>
  <line x1="115" y1="220" x2="115" y2="270" stroke="#f59e0b" stroke-width="3"/>
  <text x="125" y="130" fill="#f59e0b" font-size="9" font-family="serif">v₁</text>
  <text x="125" y="190" fill="#f59e0b" font-size="9" font-family="serif">v₂</text>
  <text x="125" y="255" fill="#f59e0b" font-size="9" font-family="serif">v₃</text>
  <!-- Projectile (parabolic) path -->
  <path d="M250,280 Q250,240 270,200 Q290,160 310,130 Q340,100 380,90 Q420,100 440,130 Q460,180 460,280" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <circle cx="380" cy="90" r="5" fill="#22d3ee"/>
  <text x="385" y="80" fill="#22d3ee" font-size="10" font-family="serif">Hмакс</text>
  <!-- Distance L -->
  <line x1="250" y1="290" x2="460" y2="290" stroke="#22c55e" stroke-width="1.5"/>
  <text x="355" y="305" fill="#22c55e" font-size="10" font-family="serif" text-anchor="middle">L = v₀²sin2α/g</text>
  <!-- Height marker -->
  <line x1="245" y1="280" x2="245" y2="90" stroke="#ec4899" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- Formulas -->
  <rect x="30" y="30" width="180" height="80" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="120" y="50" fill="#ef4444" font-size="10" font-family="sans-serif" text-anchor="middle">g ≈ 9,8 м/с²</text>
  <text x="120" y="68" fill="#ec4899" font-size="10" font-family="sans-serif" text-anchor="middle">H = v₀²/(2g)</text>
  <text x="120" y="86" fill="#22c55e" font-size="10" font-family="sans-serif" text-anchor="middle">L = v₀²sin2α/g</text>
  <text x="120" y="102" fill="#f59e0b" font-size="10" font-family="sans-serif" text-anchor="middle">t = v₀/g</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Свободное падение</text>
</svg>