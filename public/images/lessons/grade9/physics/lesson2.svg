<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#1565C0" opacity="0.12"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Движение под действием силы тяжести</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Физика — Урок 2</text>
  <line x1="30" y1="68" x2="470" y2="68" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="75" width="460" height="50" rx="4" fill="#42A5F5" opacity="0.07"/>
  <text x="30" y="92" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="start" font-weight="bold">Свободное падение: g ≈ 9,8 м/с²</text>
  <text x="30" y="110" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">Все тела падают с одинаковым ускорением (в вакууме)</text>
  <rect x="20" y="130" width="230" height="165" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="30" y="148" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">Свободное падение:</text>
  <circle cx="80" cy="165" r="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="80" cy="195" r="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="80" cy="225" r="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="80" cy="255" r="8" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <line x1="80" y1="173" x2="80" y2="187" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="80" y1="203" x2="80" y2="217" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="80" y1="233" x2="80" y2="247" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="92" y1="165" x2="110" y2="165" stroke="#E53935" stroke-width="2"/>
  <text x="112" y="169" font-family="Arial,sans-serif" font-size="9" fill="#E53935" text-anchor="start">v=0</text>
  <text x="112" y="199" font-family="Arial,sans-serif" font-size="9" fill="#E53935" text-anchor="start">v=gt</text>
  <text x="112" y="229" font-family="Arial,sans-serif" font-size="9" fill="#E53935" text-anchor="start">v=2gt</text>
  <text x="30" y="278" font-family="Arial,sans-serif" font-size="14" fill="#1565C0" text-anchor="start" font-weight="bold">h = gt²/2</text>
  <text x="30" y="292" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start">v = gt</text>
  <rect x="260" y="130" width="220" height="165" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="270" y="148" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Движение тела, брошенного</text>
  <text x="270" y="163" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">горизонтально:</text>
  <path d="M290,190 Q350,190 380,220 Q410,250 420,280" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <line x1="290" y1="190" x2="420" y2="190" stroke="#888" stroke-width="0.5" stroke-dasharray="3,2"/>
  <circle cx="290" cy="190" r="5" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="290" y="200" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start">v₀</text>
  <line x1="290" y1="190" x2="320" y2="190" stroke="#E53935" stroke-width="1.5"/>
  <text x="270" y="220" font-family="Arial,sans-serif" font-size="11" fill="#555" text-anchor="start">x = v₀·t</text>
  <text x="270" y="238" font-family="Arial,sans-serif" font-size="11" fill="#555" text-anchor="start">y = gt²/2</text>
  <text x="270" y="260" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">Движение по инерции +</text>
  <text x="270" y="275" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">свободное падение</text>
  <text x="270" y="292" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start" font-weight="bold">Независимость движений!</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Физика · Сила тяжести</text>
</svg>