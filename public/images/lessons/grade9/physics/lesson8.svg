<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Magnet -->
  <rect x="150" y="80" width="200" height="60" rx="4" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <rect x="150" y="80" width="100" height="60" rx="4" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <rect x="250" y="80" width="100" height="60" rx="4" fill="#3b82f6" fill-opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
  <text x="200" y="115" fill="#ef4444" font-size="14" font-family="serif" text-anchor="middle">N</text>
  <text x="300" y="115" fill="#3b82f6" font-size="14" font-family="serif" text-anchor="middle">S</text>
  <!-- Magnetic field lines -->
  <path d="M200,80 Q200,30 250,20 Q300,30 300,80" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <path d="M190,80 Q185,20 250,10 Q315,20 310,80" fill="none" stroke="#22d3ee" stroke-width="1"/>
  <path d="M210,80 Q210,40 250,35 Q290,40 290,80" fill="none" stroke="#22d3ee" stroke-width="1"/>
  <path d="M200,140 Q200,190 250,200 Q300,190 300,140" fill="none" stroke="#22d3ee" stroke-width="1.5"/>
  <path d="M190,140 Q185,200 250,210 Q315,200 310,140" fill="none" stroke="#22d3ee" stroke-width="1"/>
  <!-- Wire with current -->
  <line x1="50" y1="230" x2="450" y2="230" stroke="#f59e0b" stroke-width="3"/>
  <text x="250" y="225" fill="#f59e0b" font-size="10" font-family="serif" text-anchor="middle">I →</text>
  <!-- Force arrow (up) -->
  <line x1="250" y1="220" x2="250" y2="175" stroke="#ef4444" stroke-width="3"/>
  <polygon points="243,180 250,168 257,180" fill="#ef4444"/>
  <text x="260" y="175" fill="#ef4444" font-size="11" font-family="serif">F</text>
  <!-- B field indicators (dots) -->
  <circle cx="150" cy="230" r="2" fill="#22d3ee"/><circle cx="200" cy="230" r="2" fill="#22d3ee"/>
  <circle cx="300" cy="230" r="2" fill="#22d3ee"/><circle cx="350" cy="230" r="2" fill="#22d3ee"/>
  <!-- Formulas -->
  <rect x="30" y="260" width="440" height="70" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="280" fill="#ef4444" font-size="11" font-family="serif" text-anchor="middle">F = BIl sinα — сила Ампера</text>
  <text x="250" y="300" fill="#f59e0b" font-size="11" font-family="serif" text-anchor="middle">F = qvB sinα — сила Лоренца</text>
  <text x="250" y="320" fill="#22d3ee" font-size="10" font-family="serif" text-anchor="middle">B — магнитная индукция (Тл)</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Магнитное поле</text>
</svg>