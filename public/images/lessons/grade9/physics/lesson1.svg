<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="pf1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#ef4444"/>
    </marker>
    <marker id="pf2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#22c55e"/>
    </marker>
    <marker id="pf3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#3b82f6"/>
    </marker>
  </defs>
  <!-- Block on surface -->
  <rect x="180" y="130" width="80" height="60" rx="4" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="2"/>
  <text x="220" y="165" fill="#ffffff" font-size="11" font-family="serif" text-anchor="middle">m</text>
  <!-- Surface -->
  <line x1="100" y1="190" x2="400" y2="190" stroke="#9ca3af" stroke-width="2"/>
  <!-- Force F -->
  <line x1="260" y1="160" x2="340" y2="160" stroke="#ef4444" stroke-width="3" marker-end="url(#pf1)"/>
  <text x="310" y="153" fill="#ef4444" font-size="12" font-family="serif">F</text>
  <!-- Gravity mg -->
  <line x1="220" y1="190" x2="220" y2="260" stroke="#22c55e" stroke-width="3" marker-end="url(#pf2)"/>
  <text x="230" y="250" fill="#22c55e" font-size="12" font-family="serif">mg</text>
  <!-- Normal force N -->
  <line x1="220" y1="130" x2="220" y2="70" stroke="#3b82f6" stroke-width="3" marker-end="url(#pf3)"/>
  <text x="230" y="75" fill="#3b82f6" font-size="12" font-family="serif">N</text>
  <!-- Acceleration -->
  <line x1="260" y1="120" x2="320" y2="120" stroke="#f59e0b" stroke-width="2" marker-end="url(#pf1)" stroke-dasharray="5,3"/>
  <text x="295" y="113" fill="#f59e0b" font-size="11" font-family="serif">a</text>
  <!-- Newton's laws -->
  <rect x="30" y="250" width="440" height="80" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="50" y="270" fill="#22c55e" font-size="10" font-family="sans-serif">I:  F=0 → v=const (инерция)</text>
  <text x="50" y="290" fill="#ef4444" font-size="10" font-family="sans-serif">II: F = ma (ускорение пропорционально силе)</text>
  <text x="50" y="310" fill="#3b82f6" font-size="10" font-family="sans-serif">III: F₁ = −F₂ (действие = противодействие)</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Законы Ньютона</text>
</svg>