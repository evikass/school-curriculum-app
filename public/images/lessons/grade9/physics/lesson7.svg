<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Transverse wave -->
  <text x="130" y="25" fill="#22d3ee" font-size="11" font-family="serif" text-anchor="middle">Поперечная волна</text>
  <path d="M30,70 Q60,40 90,70 Q120,100 150,70 Q180,40 210,70 Q240,100 270,70 Q300,40 330,70 Q360,100 390,70 Q420,40 450,70 Q480,100 490,70" fill="none" stroke="#22d3ee" stroke-width="2.5"/>
  <!-- Direction arrow -->
  <line x1="50" y1="115" x2="180" y2="115" stroke="#9ca3af" stroke-width="1.5"/>
  <polygon points="180,111 190,115 180,119" fill="#9ca3af"/>
  <text x="120" y="130" fill="#9ca3af" font-size="9" font-family="serif">направление</text>
  <!-- Particle motion arrows (vertical) -->
  <line x1="90" y1="55" x2="90" y2="40" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="150" y1="85" x2="150" y2="100" stroke="#f59e0b" stroke-width="1.5"/>
  <!-- Wavelength marker -->
  <line x1="90" y1="108" x2="210" y2="108" stroke="#ef4444" stroke-width="1.5"/>
  <text x="150" y="105" fill="#ef4444" font-size="10" font-family="serif" text-anchor="middle">λ</text>
  <!-- Longitudinal wave -->
  <text x="350" y="150" fill="#ec4899" font-size="11" font-family="serif" text-anchor="middle">Продольная волна</text>
  <!-- Compressions and rarefactions -->
  <g fill="#ec4899" fill-opacity="0.6">
    <circle cx="260" cy="190" r="3"/><circle cx="270" cy="190" r="3"/><circle cx="278" cy="190" r="2.5"/>
    <circle cx="300" cy="190" r="2"/><circle cx="312" cy="190" r="2"/>
    <circle cx="330" cy="190" r="3"/><circle cx="340" cy="190" r="3"/><circle cx="348" cy="190" r="2.5"/>
    <circle cx="370" cy="190" r="2"/><circle cx="382" cy="190" r="2"/>
    <circle cx="400" cy="190" r="3"/><circle cx="410" cy="190" r="3"/><circle cx="418" cy="190" r="2.5"/>
    <circle cx="440" cy="190" r="2"/><circle cx="452" cy="190" r="2"/>
    <circle cx="470" cy="190" r="3"/>
  </g>
  <text x="280" y="210" fill="#9ca3af" font-size="8" font-family="serif">сжатие</text>
  <text x="360" y="210" fill="#9ca3af" font-size="8" font-family="serif">разрежение</text>
  <!-- Sound info -->
  <rect x="30" y="240" width="440" height="85" rx="8" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="260" fill="#6366f1" font-size="11" font-family="serif" text-anchor="middle">Звуковые волны</text>
  <text x="50" y="280" fill="#22d3ee" font-size="10" font-family="sans-serif">λ = vT = v/ν</text>
  <text x="50" y="298" fill="#f59e0b" font-size="10" font-family="sans-serif">Слышимость: 20 — 20 000 Гц</text>
  <text x="50" y="316" fill="#ec4899" font-size="10" font-family="sans-serif">v звука в воздухе ≈ 340 м/с</text>
  <text x="280" y="280" fill="#22c55e" font-size="10" font-family="sans-serif">Высота тона ~ частота</text>
  <text x="280" y="298" fill="#ef4444" font-size="10" font-family="sans-serif">Громкость ~ амплитуда</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Механические волны</text>
</svg>