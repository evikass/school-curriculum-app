  <text x="30" y="280" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="start" font-weight="bold">v = λ · ν    λ = v · T    v = λ / T</text>
  <text x="30" y="294" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="start">v — скорость (м/с), λ — длина волны (м), ν — частота (Гц)</text>
