  <circle cx="60" cy="238" r="3" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1"/>
  <circle cx="78" cy="238" r="5" fill="#42A5F5" stroke="#42A5F5" stroke-width="1"/>
