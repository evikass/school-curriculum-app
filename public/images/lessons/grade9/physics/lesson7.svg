  <path d="M30,170 Q60,145 90,170 Q120,195 150,170 Q180,145 210,170 Q240,195 270,170 Q300,145 330,170 Q360,195 390,170 Q420,145 450,170" fill="none" stroke="#42A5F5" stroke-width="2"/>
