<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <!-- Atom model (planetary) -->
  <!-- Nucleus -->
  <circle cx="250" cy="170" r="25" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="2"/>
  <text x="250" y="168" fill="#ef4444" font-size="8" font-family="serif" text-anchor="middle">p⁺ n⁰</text>
  <text x="250" y="180" fill="#ef4444" font-size="8" font-family="serif" text-anchor="middle">ядро</text>
  <!-- Electron orbits -->
  <ellipse cx="250" cy="170" rx="90" ry="60" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
  <ellipse cx="250" cy="170" rx="140" ry="90" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Electrons -->
  <circle cx="340" cy="140" r="6" fill="#22d3ee" stroke="#22d3ee" stroke-width="1"/>
  <text x="352" y="140" fill="#22d3ee" font-size="8" font-family="serif">e⁻</text>
  <circle cx="160" cy="200" r="6" fill="#22d3ee" stroke="#22d3ee" stroke-width="1"/>
  <text x="145" y="200" fill="#22d3ee" font-size="8" font-family="serif">e⁻</text>
  <!-- Alpha particle -->
  <circle cx="60" cy="60" r="8" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="2"/>
  <text x="60" y="63" fill="#f59e0b" font-size="7" font-family="serif" text-anchor="middle">α</text>
  <line x1="70" y1="65" x2="100" y2="80" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="100,77 108,82 98,86" fill="#f59e0b"/>
  <!-- Beta particle -->
  <circle cx="430" cy="50" r="5" fill="#ec4899" fill-opacity="0.4" stroke="#ec4899" stroke-width="1.5"/>
  <text x="430" y="53" fill="#ec4899" font-size="7" font-family="serif" text-anchor="middle">β</text>
  <line x1="425" y1="55" x2="410" y2="75" stroke="#ec4899" stroke-width="1"/>
  <!-- Gamma wave -->
  <path d="M430,260 Q440,250 450,260 Q460,270 470,260 Q480,250 490,260" fill="none" stroke="#22c55e" stroke-width="2"/>
  <text x="460" y="280" fill="#22c55e" font-size="8" font-family="serif">γ</text>
  <!-- Penetration diagram -->
  <rect x="30" y="280" width="440" height="50" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="250" y="295" fill="#9ca3af" font-size="9" font-family="sans-serif" text-anchor="middle">Проникающая способность:</text>
  <text x="80" y="318" fill="#f59e0b" font-size="9" font-family="sans-serif">α — бумага</text>
  <text x="200" y="318" fill="#ec4899" font-size="9" font-family="sans-serif">β — фольга</text>
  <text x="330" y="318" fill="#22c55e" font-size="9" font-family="sans-serif">γ — свинец</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Строение атома. Радиоактивность</text>
</svg>