<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#1565C0" opacity="0.12"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Строение атома. Радиоактивность</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Физика — Урок 10</text>
  <line x1="30" y1="68" x2="470" y2="68" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="75" width="230" height="105" rx="4" fill="#42A5F5" opacity="0.07"/>
  <text x="30" y="92" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Модель Резерфорда:</text>
  <circle cx="130" cy="150" r="35" fill="none" stroke="#42A5F5" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="130" cy="150" r="22" fill="none" stroke="#42A5F5" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="130" cy="115" r="5" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="165" cy="150" r="5" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="130" cy="185" r="5" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="130" cy="150" r="6" fill="#E53935" stroke="#B71C1C" stroke-width="1.5"/>
  <text x="130" y="153" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">+</text>
  <text x="115" y="118" font-family="Arial,sans-serif" font-size="8" fill="#42A5F5" text-anchor="start">e⁻</text>
  <text x="168" y="153" font-family="Arial,sans-serif" font-size="8" fill="#42A5F5" text-anchor="start">e⁻</text>
  <text x="115" y="188" font-family="Arial,sans-serif" font-size="8" fill="#42A5F5" text-anchor="start">e⁻</text>
  <text x="30" y="175" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">Ядро: p⁺ + n⁰</text>
  <rect x="260" y="75" width="220" height="105" rx="4" fill="#42A5F5" opacity="0.07"/>
  <text x="270" y="92" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Радиоактивность:</text>
  <text x="270" y="112" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start" font-weight="bold">α-распад:</text>
  <text x="270" y="126" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">ₐX → ₐ₋₂Y + ⁴₂He</text>
  <text x="270" y="146" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="start" font-weight="bold">β-распад:</text>
  <text x="270" y="160" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">ₐX → ₐ₊₁Y + e⁻</text>
  <text x="270" y="180" font-family="Arial,sans-serif" font-size="10" fill="#FF9800" text-anchor="start" font-weight="bold">γ-излучение:</text>
  <text x="270" y="194" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">электромагнитные волны</text>
  <rect x="20" y="188" width="460" height="105" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="30" y="205" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Состав ядра:</text>
  <text x="30" y="225" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">Протон: p⁺ (заряд +1, масса 1 а.е.м.)</text>
  <text x="30" y="242" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">Нейтрон: n⁰ (заряд 0, масса 1 а.е.м.)</text>
  <text x="30" y="259" font-family="Arial,sans-serif" font-size="10" fill="#42A5F5" text-anchor="start">A = Z + N (массовое число = протоны + нейтроны)</text>
  <text x="30" y="279" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">Изотопы — атомы с одинаковым Z,</text>
  <text x="30" y="295" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">но разным A (разное число нейтронов)</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Физика · Атом и радиоактивность</text>
</svg>