<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#42A5F5" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#42A5F5" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.12"/>
  <polygon points="10,340 30,340 10,320" fill="#42A5F5" opacity="0.12"/>
  <polygon points="490,340 470,340 490,320" fill="#1565C0" opacity="0.12"/>
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#42A5F5" text-anchor="middle">Механическая работа и мощность</text>
  <text x="250" y="60" font-family="Arial,sans-serif" font-size="11" fill="#888" text-anchor="middle">Физика — Урок 4</text>
  <line x1="30" y1="68" x2="470" y2="68" stroke="#42A5F5" stroke-width="2" opacity="0.25"/>
  <rect x="20" y="75" width="220" height="55" rx="4" fill="#42A5F5" opacity="0.07"/>
  <text x="30" y="92" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="start" font-weight="bold">Работа: A = F · s · cos α</text>
  <text x="30" y="110" font-family="Arial,sans-serif" font-size="11" fill="#555" text-anchor="start">[A] = Дж (Джоуль)</text>
  <rect x="250" y="75" width="230" height="55" rx="4" fill="#42A5F5" opacity="0.07"/>
  <text x="260" y="92" font-family="Arial,sans-serif" font-size="13" fill="#1565C0" text-anchor="start" font-weight="bold">Мощность: N = A / t</text>
  <text x="260" y="110" font-family="Arial,sans-serif" font-size="11" fill="#555" text-anchor="start">[N] = Вт (Ватт)</text>
  <rect x="20" y="138" width="230" height="155" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="30" y="155" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Зависимость работы от угла:</text>
  <rect x="60" y="200" width="80" height="25" rx="3" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1.5"/>
  <line x1="140" y1="212" x2="210" y2="212" stroke="#E53935" stroke-width="2.5"/>
  <line x1="140" y1="212" x2="200" y2="185" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="145" y="208" font-family="Arial,sans-serif" font-size="11" fill="#E53935" text-anchor="start" font-weight="bold">F</text>
  <text x="175" y="195" font-family="Arial,sans-serif" font-size="12" fill="#555" text-anchor="start">α</text>
  <line x1="140" y1="200" x2="200" y2="200" stroke="#888" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="30" y="248" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="start">α = 0° → A = F·s (макс)</text>
  <text x="30" y="264" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start">α = 90° → A = 0</text>
  <text x="30" y="280" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="start">0° &lt; α &lt; 90° → A &gt; 0</text>
  <text x="30" y="296" font-family="Arial,sans-serif" font-size="10" fill="#E53935" text-anchor="start">90° &lt; α &lt; 180° → A &lt; 0</text>
  <rect x="260" y="138" width="220" height="155" rx="4" fill="#42A5F5" opacity="0.05"/>
  <text x="270" y="155" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="start" font-weight="bold">Формулы мощности:</text>
  <text x="270" y="175" font-family="Arial,sans-serif" font-size="13" fill="#42A5F5" text-anchor="start" font-weight="bold">N = A / t</text>
  <text x="270" y="195" font-family="Arial,sans-serif" font-size="12" fill="#42A5F5" text-anchor="start">N = F · v (равномерно)</text>
  <text x="270" y="218" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">Примеры мощностей:</text>
  <text x="270" y="236" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">Человек: ~75 Вт</text>
  <text x="270" y="250" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">Автомобиль: ~75 кВт</text>
  <text x="270" y="264" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="start">Электростанция: ~1 ГВт</text>
  <text x="270" y="285" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="start">1 кВт = 1000 Вт</text>
  <text x="270" y="300" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="start">1 МВт = 10⁶ Вт</text>
  <rect x="12" y="305" width="476" height="32" rx="5" fill="url(#hdr)"/>
  <text x="250" y="326" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Физика · Работа и мощность</text>
</svg>