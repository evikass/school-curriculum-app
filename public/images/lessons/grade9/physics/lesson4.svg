<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#0f0f1a"/>
  <defs>
    <marker id="p4f" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#ef4444"/>
    </marker>
  </defs>
  <!-- Surface -->
  <line x1="30" y1="250" x2="300" y2="250" stroke="#4a5568" stroke-width="2"/>
  <!-- Box -->
  <rect x="100" y="190" width="70" height="60" rx="3" fill="#6366f1" fill-opacity="0.3" stroke="#6366f1" stroke-width="2"/>
  <text x="135" y="225" fill="#ffffff" font-size="10" font-family="serif" text-anchor="middle">F,s</text>
  <!-- Force arrow -->
  <line x1="170" y1="220" x2="250" y2="220" stroke="#ef4444" stroke-width="3" marker-end="url(#p4f)"/>
  <text x="220" y="213" fill="#ef4444" font-size="12" font-family="serif">F</text>
  <!-- Displacement arrow -->
  <line x1="100" y1="265" x2="250" y2="265" stroke="#22c55e" stroke-width="2" marker-end="url(#p4f)"/>
  <text x="175" y="280" fill="#22c55e" font-size="10" font-family="serif">s</text>
  <!-- Angle alpha -->
  <path d="M170,220 A25,25 0 0,0 185,200" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="190" y="205" fill="#f59e0b" font-size="10" font-family="serif">α</text>
  <!-- Pulley / lifting -->
  <line x1="380" y1="60" x2="380" y2="250" stroke="#9ca3af" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="360" y="180" width="40" height="40" rx="2" fill="#ec4899" fill-opacity="0.3" stroke="#ec4899" stroke-width="2"/>
  <text x="380" y="205" fill="#ec4899" font-size="10" font-family="serif" text-anchor="middle">m</text>
  <line x1="380" y1="180" x2="380" y2="130" stroke="#ef4444" stroke-width="2" marker-end="url(#p4f)"/>
  <text x="395" y="150" fill="#ef4444" font-size="10" font-family="serif">F</text>
  <text x="400" y="230" fill="#9ca3af" font-size="9" font-family="serif">h</text>
  <!-- Formulas -->
  <rect x="30" y="30" width="200" height="95" rx="6" fill="#1a1a2e" stroke="#6366f1" stroke-width="1"/>
  <text x="130" y="50" fill="#ef4444" font-size="11" font-family="serif" text-anchor="middle">A = Fs·cosα</text>
  <text x="130" y="68" fill="#22c55e" font-size="11" font-family="serif" text-anchor="middle">N = A/t</text>
  <text x="130" y="86" fill="#f59e0b" font-size="11" font-family="serif" text-anchor="middle">N = Fv</text>
  <text x="130" y="108" fill="#ec4899" font-size="10" font-family="serif" text-anchor="middle">η = Aпол/Aзат×100%</text>
  <text x="250" y="345" fill="#ffffff" font-size="9" opacity="0.5" text-anchor="middle" font-family="sans-serif">Работа и мощность</text>
</svg>