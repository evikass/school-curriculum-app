<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#1565C0" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#0D47A1" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#0D47A1" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#42A5F5" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#64B5F6" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#0D47A1" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1976D2" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#42A5F5" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#0D47A1" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1976D2" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#64B5F6" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#1565C0" text-anchor="middle">Вычитание натуральных чисел</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#1565C0" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#1565C0" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#42A5F5" opacity="0.12" rx="1"/>

  <rect x="20" y="88" width="220" height="100" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.95"/>
  <text x="130" y="105" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Компоненты</text>
  <line x1="28" y1="110" x2="232" y2="110" stroke="#E0E0E0" stroke-width="1"/>
<g transform="translate(20,88)">
    <rect x="40" y="108" width="75" height="18" rx="3" fill="#C62828" opacity="0.15"/>
<text x="77" y="121" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Уменьшаемое</text>
    <rect x="125" y="108" width="35" height="18" rx="3" fill="#888" opacity="0.15"/>
<text x="142" y="121" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle" font-weight="bold">—</text>
    <rect x="165" y="108" width="65" height="18" rx="3" fill="#EF5350" opacity="0.15"/>
<text x="197" y="121" font-family="Arial,sans-serif" font-size="9" fill="#EF5350" text-anchor="middle" font-weight="bold">Вычитаемое</text>
    <text x="125" y="145" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">= Разность</text>
    <text x="125" y="165" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="normal">8 - 3 = 5</text>
  </g>
  <rect x="260" y="88" width="220" height="100" rx="6" fill="white" stroke="#EF5350" stroke-width="1.5" opacity="0.95"/>
  <text x="370" y="105" font-family="Arial,sans-serif" font-size="10" fill="#EF5350" text-anchor="middle" font-weight="bold">Свойства</text>
  <line x1="268" y1="110" x2="472" y2="110" stroke="#E0E0E0" stroke-width="1"/>
<g transform="translate(260,88)">
    <rect x="40" y="105" width="160" height="18" rx="3" fill="#C62828" opacity="0.15"/>
<text x="120" y="118" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">a - a = 0</text>
    <rect x="40" y="128" width="160" height="18" rx="3" fill="#EF5350" opacity="0.15"/>
<text x="120" y="141" font-family="Arial,sans-serif" font-size="9" fill="#EF5350" text-anchor="middle" font-weight="bold">a - 0 = a</text>
    <rect x="40" y="151" width="160" height="18" rx="3" fill="#FFCDD2" opacity="0.15"/>
<text x="120" y="164" font-family="Arial,sans-serif" font-size="9" fill="#FFCDD2" text-anchor="middle" font-weight="bold">Вычитание обратно сложению</text>
    <text x="125" y="180" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle" font-weight="normal">8-3=5, значит 5+3=8</text>
  </g>
  <rect x="20" y="196" width="220" height="100" rx="6" fill="white" stroke="#EF5350" stroke-width="1.5" opacity="0.95"/>
  <text x="130" y="213" font-family="Arial,sans-serif" font-size="10" fill="#EF5350" text-anchor="middle" font-weight="bold">Столбиком</text>
  <line x1="28" y1="218" x2="232" y2="218" stroke="#E0E0E0" stroke-width="1"/>
<g transform="translate(20,196)">
    <text x="100" y="108" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">391</text>
    <text x="100" y="122" font-family="Arial,sans-serif" font-size="12" fill="#EF5350" text-anchor="middle" font-weight="normal">-157</text>
    <text x="100" y="130" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle" font-weight="normal">────</text>
    <text x="100" y="142" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">234</text>
    <text x="100" y="165" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle" font-weight="normal">Занимаем единицу</text>
  </g>
  <rect x="260" y="196" width="220" height="100" rx="6" fill="white" stroke="#FFCDD2" stroke-width="1.5" opacity="0.95"/>
  <text x="370" y="213" font-family="Arial,sans-serif" font-size="10" fill="#FFCDD2" text-anchor="middle" font-weight="bold">Проверка</text>
  <line x1="268" y1="218" x2="472" y2="218" stroke="#E0E0E0" stroke-width="1"/>
<g transform="translate(260,196)">
    <text x="125" y="108" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle" font-weight="normal">Чтобы проверить вычитание:</text>
    <text x="125" y="122" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle" font-weight="normal">сложим разность и вычитаемое</text>
    <text x="125" y="142" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">8 - 3 = 5</text>
    <text x="125" y="158" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">5 + 3 = 8  ✓</text>
  </g>
  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#1565C0" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Вычитание натуральных чисел</text>
  <line x1="430" y1="100" x2="480" y2="100" stroke="#1565C0" stroke-width="0.5" opacity="0.15"/>
  <line x1="430" y1="120" x2="480" y2="120" stroke="#1565C0" stroke-width="0.5" opacity="0.15"/>
  <line x1="430" y1="140" x2="480" y2="140" stroke="#1565C0" stroke-width="0.5" opacity="0.15"/>
  <line x1="445" y1="90" x2="445" y2="150" stroke="#1565C0" stroke-width="0.5" opacity="0.15"/>
  <line x1="460" y1="90" x2="460" y2="150" stroke="#1565C0" stroke-width="0.5" opacity="0.15"/>
</svg>