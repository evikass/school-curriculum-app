<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#FFF8E7" rx="4"/>
  
<defs>
  <pattern id="mh" x="0" y="0" width="28" height="16" patternUnits="userSpaceOnUse">
    <rect width="28" height="16" fill="#C9A94E"/>
    <path d="M0,0 L28,0 L28,4 L22,4 L22,12 L16,12 L16,4 L10,4 L10,12 L4,12 L4,4 L0,4Z" fill="#8B6914" opacity="0.85"/>
  </pattern>
  <pattern id="mv" x="0" y="0" width="16" height="28" patternUnits="userSpaceOnUse">
    <rect width="16" height="28" fill="#C9A94E"/>
    <path d="M0,0 L16,0 L16,10 L12,10 L12,16 L4,16 L4,10 L0,10Z M0,14 L12,14 L12,20 L4,20 L4,14 L0,14 L0,28 L16,28 L16,24 L4,24 L4,18 L12,18 L12,24 L0,24Z" fill="#8B6914" opacity="0.85"/>
  </pattern>
</defs>
<rect x="16" y="0" width="768" height="16" fill="url(#mh)"/>
<rect x="16" y="484" width="768" height="16" fill="url(#mh)"/>
<rect x="0" y="16" width="16" height="468" fill="url(#mv)"/>
<rect x="784" y="16" width="16" height="468" fill="url(#mv)"/>
<rect x="15" y="15" width="770" height="470" fill="none" stroke="#6B4F12" stroke-width="2"/>
  <text x="400" y="55" font-family="Georgia,serif" font-size="32" font-weight="bold" fill="#5D3A1A" text-anchor="middle">Мифы о происхождении мира</text>
  <line x1="60" y1="68" x2="740" y2="68" stroke="#C49B38" stroke-width="2" opacity="0.5"/>
  
  <!-- Chaos to Gods flow - big -->
  <rect x="280" y="95" width="240" height="55" rx="28" fill="#5D4037" opacity="0.7"/>
  <text x="400" y="130" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="#FFF" text-anchor="middle">ХАОС</text>
  <path d="M400,150 L400,170" stroke="#8B6914" stroke-width="3" marker-end="none"/>
  <!-- Gaia + Uranus -->
  <circle cx="280" cy="220" r="45" fill="#81C784" opacity="0.5" stroke="#388E3C" stroke-width="2.5"/>
  <text x="280" y="215" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#1B5E20" text-anchor="middle">Гея</text>
  <text x="280" y="240" font-family="Georgia,serif" font-size="15" fill="#2E7D32" text-anchor="middle">Земля</text>
  <circle cx="520" cy="220" r="45" fill="#90CAF9" opacity="0.5" stroke="#1565C0" stroke-width="2.5"/>
  <text x="520" y="215" font-family="Georgia,serif" font-size="20" font-weight="bold" fill="#0D47A1" text-anchor="middle">Уран</text>
  <text x="520" y="240" font-family="Georgia,serif" font-size="15" fill="#1565C0" text-anchor="middle">Небо</text>
  <path d="M400,170 L400,180 L320,200" stroke="#8B6914" stroke-width="2" fill="none"/>
  <path d="M400,180 L480,200" stroke="#8B6914" stroke-width="2" fill="none"/>
  <!-- Down arrow -->
  <path d="M400,265 L400,290" stroke="#8B6914" stroke-width="3"/>
  <polygon points="392,288 400,305 408,288" fill="#8B6914"/>
  <!-- Titans -->
  <rect x="180" y="310" width="440" height="50" rx="10" fill="#FFCC80" stroke="#E65100" stroke-width="2" opacity="0.4"/>
  <text x="400" y="343" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#BF360C" text-anchor="middle">ТИТАНЫ: Кронос, Океан, Гипперион, Рея</text>
  <!-- Down arrow -->
  <path d="M400,360 L400,385" stroke="#8B6914" stroke-width="3"/>
  <polygon points="392,383 400,400 408,383" fill="#8B6914"/>
  <!-- Olympians -->
  <rect x="140" y="405" width="520" height="50" rx="10" fill="#FFF3E0" stroke="#D4A853" stroke-width="2.5"/>
  <text x="400" y="438" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="#5D3A1A" text-anchor="middle">БОГИ ОЛИМПА: Зевс, Гера, Посейдон, Афина, Аполлон</text>
  <!-- Tartarus + Pontus on sides -->
  <circle cx="100" cy="370" r="35" fill="#5D4037" opacity="0.35" stroke="#3E2723" stroke-width="2"/>
  <text x="100" y="365" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#FFF" text-anchor="middle">Тартар</text>
  <text x="100" y="385" font-family="Georgia,serif" font-size="13" fill="#D7CCC8" text-anchor="middle">Подземный</text>
  <circle cx="700" cy="370" r="35" fill="#4FC3F7" opacity="0.35" stroke="#0288D1" stroke-width="2"/>
  <text x="700" y="365" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="#01579B" text-anchor="middle">Понт</text>
  <text x="700" y="385" font-family="Georgia,serif" font-size="13" fill="#01579B" text-anchor="middle">Море</text>

</svg>