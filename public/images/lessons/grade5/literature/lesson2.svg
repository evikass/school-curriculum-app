  <text x="400" y="420" font-family="Georgia,serif" font-size="15" fill="#8B6914" text-anchor="middle" opacity="0.6">Немейский лев - Лернейская гидра - Стимфалийские птицы - Керинейская лань</text>
  <text x="400" y="442" font-family="Georgia,serif" font-size="15" fill="#8B6914" text-anchor="middle" opacity="0.6">Эриманфский кабан - Авгиевы конюшни - Критский бык - Кони Диомеда</text>
  <text x="400" y="464" font-family="Georgia,serif" font-size="15" fill="#8B6914" text-anchor="middle" opacity="0.6">Пояс Ипполиты - Коровы Гериона - Яблоки Гесперид - Кербер</text>

