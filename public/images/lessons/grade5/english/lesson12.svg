<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#283593" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#1A237E" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1A237E" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#5C6BC0" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#7986CB" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#1A237E" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#3F51B5" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#5C6BC0" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#1A237E" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#3F51B5" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#7986CB" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#283593" text-anchor="middle">Дом и быт</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">English - Урок 12</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#283593" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#283593" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#5C6BC0" opacity="0.12" rx="1"/>

  <rect x="20" y="88" width="145" height="100" rx="6" fill="white" stroke="#283593" stroke-width="1.5" opacity="0.95"/>
  <rect x="20" y="88" width="145" height="24" rx="6" fill="#283593" opacity="0.9"/>
  <rect x="20" y="104" width="145" height="8" fill="#283593" opacity="0.9"/>
  <text x="92" y="106" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Vocabulary</text>
  <rect x="28" y="118" width="128" height="18" rx="3" fill="#E8EAF6" opacity="0.5"/>
  <text x="35" y="131" font-family="Arial,sans-serif" font-size="9" fill="#283593" font-weight="bold">Hello!</text>
  <text x="150" y="131" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="end">Привет!</text>
  <rect x="28" y="140" width="128" height="18" rx="3" fill="#E8EAF6" opacity="0.5"/>
  <text x="35" y="153" font-family="Arial,sans-serif" font-size="9" fill="#283593" font-weight="bold">Goodbye!</text>
  <text x="150" y="153" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="end">До свидания!</text>
  <rect x="28" y="162" width="128" height="18" rx="3" fill="#E8EAF6" opacity="0.5"/>
  <text x="35" y="175" font-family="Arial,sans-serif" font-size="9" fill="#283593" font-weight="bold">Please</text>
  <text x="150" y="175" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="end">Пожалуйста</text>
  <rect x="178" y="88" width="145" height="100" rx="6" fill="white" stroke="#3F51B5" stroke-width="1.5" opacity="0.95"/>
  <rect x="178" y="88" width="145" height="24" rx="6" fill="#3F51B5" opacity="0.9"/>
  <rect x="178" y="104" width="145" height="8" fill="#3F51B5" opacity="0.9"/>
  <text x="250" y="106" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Grammar</text>
  <text x="250" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Структура фразы:</text>
  <rect x="188" y="133" width="125" height="18" rx="3" fill="#3F51B5" opacity="0.1"/>
  <text x="250" y="146" font-family="Arial,sans-serif" font-size="9" fill="#3F51B5" text-anchor="middle" font-weight="bold">Subject + Verb + Object</text>
  <text x="250" y="168" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">I speak English</text>
  <text x="250" y="180" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">She reads books</text>
  <rect x="336" y="88" width="145" height="100" rx="6" fill="white" stroke="#5C6BC0" stroke-width="1.5" opacity="0.95"/>
  <rect x="336" y="88" width="145" height="24" rx="6" fill="#5C6BC0" opacity="0.9"/>
  <rect x="336" y="104" width="145" height="8" fill="#5C6BC0" opacity="0.9"/>
  <text x="408" y="106" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Practice</text>
  <text x="408" y="128" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Задание:</text>
  <text x="408" y="145" font-family="Arial,sans-serif" font-size="8" fill="#5C6BC0" text-anchor="middle">Составьте 3 фразы</text>
  <text x="408" y="160" font-family="Arial,sans-serif" font-size="8" fill="#5C6BC0" text-anchor="middle">с новыми словами</text>
  <text x="408" y="178" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">и прочитайте вслух</text>
  <rect x="20" y="196" width="460" height="100" rx="6" fill="white" stroke="#7986CB" stroke-width="1.5" opacity="0.95"/>
  <text x="250" y="213" font-family="Arial,sans-serif" font-size="10" fill="#7986CB" text-anchor="middle" font-weight="bold">Key phrases</text>
  <line x1="28" y1="218" x2="472" y2="218" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="30" y="226" width="200" height="18" rx="3" fill="#E8EAF6" opacity="0.4"/>
  <text x="38" y="239" font-family="Arial,sans-serif" font-size="9" fill="#283593" font-weight="bold">How are you?</text>
  <text x="250" y="239" font-family="Arial,sans-serif" font-size="9" fill="#555">— Как дела?</text>
  <rect x="30" y="248" width="200" height="18" rx="3" fill="#E8EAF6" opacity="0.4"/>
  <text x="38" y="261" font-family="Arial,sans-serif" font-size="9" fill="#283593" font-weight="bold">I am fine, thank you</text>
  <text x="250" y="261" font-family="Arial,sans-serif" font-size="9" fill="#555">— Я в порядке, спасибо</text>
  <rect x="30" y="270" width="200" height="18" rx="3" fill="#E8EAF6" opacity="0.4"/>
  <text x="38" y="283" font-family="Arial,sans-serif" font-size="9" fill="#283593" font-weight="bold">What is your name?</text>
  <text x="250" y="283" font-family="Arial,sans-serif" font-size="9" fill="#555">— Как тебя зовут?</text>
  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#283593" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Дом и быт</text>
  <path d="M430,120 Q445,110 460,120 Q475,130 490,120" fill="none" stroke="#283593" stroke-width="1" opacity="0.12"/>
  <path d="M430,135 Q445,125 460,135 Q475,145 490,135" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.1"/>
</svg>