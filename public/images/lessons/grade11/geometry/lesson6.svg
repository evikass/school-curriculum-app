<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0" />
      <stop offset="100%" stop-color="#3F51B5" />
    </linearGradient>
    <clipPath id="ill">
      <rect x="255" y="190" width="225" height="95" rx="6" />
    </clipPath>
  </defs>
  <rect width="500" height="350" fill="url(#bgGrad)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="2.5" />
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.25" />
  <polygon points="10,10 30,10 10,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,10 470,10 490,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="10,340 30,340 10,320" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,340 470,340 490,320" fill="#5C6BC0" opacity="0.10" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#283593" text-anchor="middle">Сфера и шар</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" text-anchor="middle">Геометрия — Урок 6</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#5C6BC0" stroke-width="2" opacity="0.3" />
  <rect x="30" y="69" width="50" height="5" fill="#5C6BC0" opacity="0.15" rx="1" />
  <rect x="420" y="69" width="50" height="5" fill="#3F51B5" opacity="0.10" rx="1" />
  <rect x="18" y="82" width="225" height="100" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="82" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="94" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Определения</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Сфера — поверхность, сост.</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10" fill="#37474F">из точек, равноудалённых от</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10" fill="#37474F">центра на расстояние R.</text>
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10" fill="#37474F" />
  <text x="26" y="172" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Шар — тело, ограниченное</text>
  <text x="26" y="187" font-family="Arial,sans-serif" font-size="10" fill="#37474F">сферой. R — радиус,</text>
  <text x="26" y="202" font-family="Arial,sans-serif" font-size="10" fill="#37474F">d — диаметр, d = 2R</text>
  <rect x="255" y="82" width="225" height="100" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="255" y="82" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="255" y="94" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="367" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Формулы</text>
  <text x="263" y="114" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">S_сф = 4πR²</text>
  <text x="263" y="130" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">V_шар = ⁴⁄₃πR³</text>
  <text x="263" y="146" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">S_сеч = πr²  (r — радиус сеч.)</text>
  <text x="263" y="162" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">r² = R² − d²  (d от центра)</text>
  <text x="263" y="178" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Уравн. сферы: x²+y²+z²=R²</text>
  <rect x="18" y="190" width="225" height="95" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="190" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="202" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="203" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Свойства</text>
  <text x="26" y="220" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Все точки сферы = от центра</text>
  <text x="26" y="235" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Сечение сферы — круг</text>
  <text x="26" y="250" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Большой круг: r = R</text>
  <text x="26" y="265" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Касательная плоскость ⊥ R</text>
  <text x="26" y="280" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Шаровой сегмент, слой, сектор</text>
  <g clip-path="url(#ill)">
    <rect x="255" y="190" width="225" height="95" fill="#E8EAF6" opacity="0.5" />
    <circle cx="370" cy="248" r="35" fill="#5C6BC0" opacity="0.08" stroke="#5C6BC0" stroke-width="2" />
    <ellipse cx="370" cy="248" rx="35" ry="12" fill="none" stroke="#7986CB" stroke-width="1" stroke-dasharray="3,3" />
    <circle cx="370" cy="248" r="2.5" fill="#FF7043" />
    <line x1="370" y1="248" x2="405" y2="248" stroke="#FF7043" stroke-width="1.5" />
    <text x="388" y="244" font-family="Arial,sans-serif" font-size="11" fill="#FF7043" font-style="italic">R</text>
    <line x1="370" y1="210" x2="370" y2="286" stroke="#7986CB" stroke-width="0.8" stroke-dasharray="2,2" />
  </g>
  <rect x="10" y="305" width="480" height="35" fill="url(#panelGrad)" opacity="0.08" rx="5" />
  <text x="250" y="327" font-family="Arial,sans-serif" font-size="11" fill="#5C6BC0" text-anchor="middle" opacity="0.65">Геометрия · 11 класс</text>
</svg>