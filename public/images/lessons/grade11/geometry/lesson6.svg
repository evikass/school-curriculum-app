<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2C3E50" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495E" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2C3E50" font-weight="bold">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="45" y="35" font-family="Arial, sans-serif" font-size="14" fill="#E74C3C" font-weight="bold">Урок 6</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#2C3E50" font-weight="bold">Уравнение плоскости</text>
  
  <!-- Ось X -->
  <line x1="50" y1="250" x2="450" y2="250" stroke="#34495E" stroke-width="2"/>
  <polygon points="450,250 445,245 445,255" fill="#34495E"/>
  
  <!-- Ось Y -->
  <line x1="250" y1="300" x2="250" y2="50" stroke="#34495E" stroke-width="2"/>
  <polygon points="250,50 245,55 255,55" fill="#34495E"/>
  
  <!-- Ось Z -->
  <line x1="250" y1="250" x2="350" y2="150" stroke="#34495E" stroke-width="2"/>
  <polygon points="350,150 345,155 355,152" fill="#34495E"/>
  
  <!-- Плоскость -->
  <path d="M 100 200 L 380 200 L 320 100 L 120 100 Z" fill="#3498DB" fill-opacity="0.3" stroke="#2980B9" stroke-width="2"/>
  
  <!-- Нормальный вектор -->
  <line x1="250" y1="200" x2="250" y2="100" stroke="#E74C3C" stroke-width="3"/>
  <polygon points="250,100 245,110 255,110" fill="#E74C3C"/>
  
  <!-- Точка на плоскости -->
  <circle cx="250" cy="200" r="5" fill="#E74C3C"/>
  
  <!-- Перпендикуляр из точки -->
  <line x1="250" y1="200" x2="250" y2="100" stroke="#E74C3C" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Расстояние d -->
  <path d="M 270 200 Q 280 190 290 200" fill="none" stroke="#27AE60" stroke-width="2"/>
  <text x="300" y="195" font-family="Arial, sans-serif" font-size="14" fill="#27AE60">d</text>
  
  <!-- Подписи осей -->
  <text x="460" y="255" font-family="Arial, sans-serif" font-size="14" fill="#34495E">x</text>
  <text x="255" y="45" font-family="Arial, sans-serif" font-size="14" fill="#34495E">z</text>
  <text x="245" y="315" font-family="Arial, sans-serif" font-size="14" fill="#34495E">y</text>
  
  <!-- Нормальный вектор подпись -->
  <text x="260" y="150" font-family="Arial, sans-serif" font-size="14" fill="#E74C3C">n→</text>
  
  <!-- Уравнение плоскости -->
  <rect x="30" y="270" width="200" height="50" fill="white" stroke="#2C3E50" stroke-width="1" rx="5"/>
  <text x="40" y="290" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Общее уравнение:</text>
  <text x="40" y="310" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50">Ax + By + Cz + D = 0</text>
  
  <!-- Формула нормального вектора -->
  <rect x="250" y="270" width="220" height="50" fill="white" stroke="#2C3E50" stroke-width="1" rx="5"/>
  <text x="260" y="290" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Нормальный вектор:</text>
  <text x="260" y="310" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50">n→(A, B, C)</text>
  
  <!-- Формула расстояния -->
  <rect x="140" y="50" width="220" height="50" fill="white" stroke="#2C3E50" stroke-width="1" rx="5"/>
  <text x="150" y="70" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Расстояние до плоскости:</text>
  <text x="150" y="90" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50">d = |Ax₀+By₀+Cz₀+D|/√(A²+B²+C²)</text>
  
  <!-- Точка M₀ -->
  <text x="255" y="205" font-family="Arial, sans-serif" font-size="12" fill="#34495E">M₀</text>
  
  <!-- Вектор от начала координат -->
  <line x1="250" y1="250" x2="250" y2="200" stroke="#9B59B6" stroke-width="2"/>
  <text x="255" y="225" font-family="Arial, sans-serif" font-size="12" fill="#9B59B6">r₀→</text>
  
  <!-- Точка пересечения с осями -->
  <circle cx="100" cy="200" r="3" fill="#E67E22"/>
  <circle cx="380" cy="200" r="3" fill="#E67E22"/>
  <circle cx="320" cy="100" r="3" fill="#E67E22"/>
  <text x="85" y="195" font-family="Arial, sans-serif" font-size="10" fill="#E67E22">A</text>
  <text x="385" y="195" font-family="Arial, sans-serif" font-size="10" fill="#E67E22">B</text>
  <text x="325" y="95" font-family="Arial, sans-serif" font-size="10" fill="#E67E22">C</text>
  
  <!-- Угол между нормалью и осью -->
  <path d="M 250 200 Q 265 180 280 160" fill="none" stroke="#F39C12" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="285" y="165" font-family="Arial, sans-serif" font-size="10" fill="#F39C12">α</text>
  
  <!-- Подписи для углов -->
  <path d="M 250 200 Q 235 180 220 160" fill="none" stroke="#F39C12" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="205" y="165" font-family="Arial, sans-serif" font-size="10" fill="#F39C12">β</text>
  
  <!-- Легенда -->
  <rect x="30" y="50" width="100" height="120" fill="white" fill-opacity="0.9" stroke="#2C3E50" stroke-width="1" rx="5"/>
  <text x="35" y="70" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50" font-weight="bold">Легенда:</text>
  
  <rect x="35" y="80" width="20" height="10" fill="#3498DB" fill-opacity="0.3" stroke="#2980B9" stroke-width="1"/>
  <text x="60" y="89" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Плоскость</text>
  
  <line x1="35" y1="100" x2="55" y2="100" stroke="#E74C3C" stroke-width="2"/>
  <text x="60" y="104" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Нормаль</text>
  
  <circle cx="45" cy="120" r="3" fill="#E74C3C"/>
  <text x="60" y="124" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Точка M₀</text>
  
  <line x1="35" y1="140" x2="55" y2="140" stroke="#9B59B6" stroke-width="2"/>
  <text x="60" y="144" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Вектор r₀→</text>
  
  <line x1="35" y1="160" x2="55" y2="160" stroke="#27AE60" stroke-width="2"/>
  <text x="60" y="164" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Расстояние d</text>
</svg>