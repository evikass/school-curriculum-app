<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
    <linearGradient id="cylGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E53935" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#E53935" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E53935" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#B71C1C" text-anchor="middle" font-family="serif">Цилиндр</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 6</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#E53935" stroke-width="1" opacity="0.3"/>

  <!-- 3D Cylinder -->
  <rect x="15" y="58" width="250" height="200" rx="6" fill="white" opacity="0.9" stroke="#E53935" stroke-width="1.2"/>
  <text x="140" y="74" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Цилиндр вращения</text>
  <!-- Bottom ellipse -->
  <ellipse cx="140" cy="220" rx="70" ry="22" fill="url(#cylGrad)" stroke="#C62828" stroke-width="1.5"/>
  <!-- Back half of bottom ellipse (dashed) -->
  <path d="M70,220 A70,22 0 0,0 210,220" fill="none" stroke="#C62828" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Side lines -->
  <line x1="70" y1="220" x2="70" y2="115" stroke="#C62828" stroke-width="1.8"/>
  <line x1="210" y1="220" x2="210" y2="115" stroke="#C62828" stroke-width="1.8"/>
  <!-- Top ellipse -->
  <ellipse cx="140" cy="115" rx="70" ry="22" fill="url(#cylGrad)" stroke="#C62828" stroke-width="1.8"/>
  <!-- Axis (dashed) -->
  <line x1="140" y1="250" x2="140" y2="85" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="145" y="82" font-size="9" fill="#666" font-weight="bold">OO&#x2081;</text>
  <!-- Height arrow -->
  <line x1="55" y1="220" x2="55" y2="115" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="50" y1="220" x2="60" y2="220" stroke="#1565C0" stroke-width="1"/>
  <line x1="50" y1="115" x2="60" y2="115" stroke="#1565C0" stroke-width="1"/>
  <text x="35" y="170" font-size="9" fill="#1565C0" font-weight="bold" font-style="italic">h</text>
  <!-- Radius -->
  <line x1="140" y1="115" x2="210" y2="115" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="170" y="112" font-size="9" fill="#2E7D32" font-weight="bold" font-style="italic">R</text>
  <!-- Generatrix -->
  <line x1="210" y1="220" x2="210" y2="115" stroke="#FF8F00" stroke-width="2.5"/>
  <text x="218" y="170" font-size="8" fill="#FF8F00" font-weight="bold" font-style="italic">l (образ.)</text>
  <!-- Labels -->
  <text x="140" y="240" font-size="8" fill="#C62828">основание</text>
  <text x="140" y="108" font-size="8" fill="#C62828">основание</text>
  <!-- Center points -->
  <circle cx="140" cy="115" r="2" fill="#C62828"/>
  <circle cx="140" cy="220" r="2" fill="#C62828"/>

  <!-- Sections Panel -->
  <rect x="275" y="58" width="212" height="115" rx="6" fill="white" opacity="0.9" stroke="#E53935" stroke-width="1.2"/>
  <text x="381" y="74" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Сечения цилиндра</text>
  <!-- Axial section (rectangle) -->
  <rect x="295" y="85" width="45" height="70" rx="1" fill="#E53935" opacity="0.1" stroke="#C62828" stroke-width="1.2"/>
  <text x="317" y="167" font-size="7.5" fill="#C62828" text-anchor="middle">Осевое</text>
  <text x="317" y="177" font-size="7" fill="#666" text-anchor="middle">прямоуг.</text>
  <!-- Perpendicular section (circle) -->
  <ellipse cx="410" cy="120" rx="30" ry="30" fill="#2E7D32" opacity="0.08" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="410" y="167" font-size="7.5" fill="#2E7D32" text-anchor="middle">&#x22A5; оси</text>
  <text x="410" y="177" font-size="7" fill="#666" text-anchor="middle">круг</text>
  <!-- Arbitrary section -->
  <ellipse cx="360" cy="120" rx="35" ry="18" fill="#FF8F00" opacity="0.08" stroke="#FF8F00" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="360" y="155" font-size="7" fill="#FF8F00">Наклонн.</text>

  <!-- Elements Panel -->
  <rect x="275" y="180" width="212" height="78" rx="6" fill="white" opacity="0.88" stroke="#E53935" stroke-width="1"/>
  <text x="381" y="196" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Элементы</text>
  <text x="285" y="212" font-size="8.5" fill="#333">R — радиус основания</text>
  <text x="285" y="225" font-size="8.5" fill="#333">h — высота (OO&#x2081;)</text>
  <text x="285" y="238" font-size="8.5" fill="#333">l — образующая (l = h)</text>
  <text x="285" y="251" font-size="8.5" fill="#C62828" font-weight="bold">Цилиндр = круги + цилиндр. пов-ть</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="336" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Цилиндр: круговые основания, образующие &#x2225; оси.  Осевое сечение — прямоугольник 2R x h</text>
</svg>