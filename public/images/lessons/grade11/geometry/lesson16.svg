<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <radialGradient id="sphereG" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#43A047" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2E7D32" stop-opacity="0.15"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="28" font-size="12" font-weight="bold" fill="#1B5E20" text-anchor="middle" font-family="serif">Объёмы шарового сегмента, слоя и сектора</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 16</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#43A047" stroke-width="1" opacity="0.3"/>

  <!-- Spherical Segment (Cap) Panel -->
  <rect x="15" y="58" width="155" height="195" rx="6" fill="white" opacity="0.9" stroke="#43A047" stroke-width="1.2"/>
  <text x="92" y="74" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Шаровой сегмент</text>
  <!-- Sphere outline -->
  <circle cx="92" cy="175" r="55" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Cap -->
  <path d="M37,140 A55,55 0 0,1 147,140 L147,140 A55,55 0 0,1 37,140 Z" fill="#43A047" opacity="0.15" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Base of cap -->
  <ellipse cx="92" cy="140" rx="55" ry="12" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Height h -->
  <line x1="160" y1="140" x2="160" y2="120" stroke="#C62828" stroke-width="1.5"/>
  <text x="168" y="133" font-size="8" fill="#C62828" font-weight="bold">h</text>
  <!-- Center -->
  <circle cx="92" cy="175" r="2" fill="#2E7D32"/>
  <text x="97" y="182" font-size="7" fill="#2E7D32">O</text>
  <!-- Formula -->
  <text x="92" y="235" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">V = &#x03C0;h&#x00B2;(R-h/3)</text>
  <text x="92" y="248" font-size="7" fill="#666" text-anchor="middle">или V = &#x2153;&#x03C0;h&#x00B2;(3R-h)</text>

  <!-- Spherical Layer (Zone) Panel -->
  <rect x="178" y="58" width="155" height="195" rx="6" fill="white" opacity="0.9" stroke="#43A047" stroke-width="1.2"/>
  <text x="255" y="74" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Шаровой слой</text>
  <!-- Sphere outline -->
  <circle cx="255" cy="175" r="55" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Layer zone -->
  <path d="M205,155 A55,55 0 0,1 305,155 L305,130 A55,55 0 0,0 205,130 Z" fill="#43A047" opacity="0.15" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Top ellipse -->
  <ellipse cx="255" cy="130" rx="40" ry="9" fill="none" stroke="#2E7D32" stroke-width="1"/>
  <!-- Bottom ellipse -->
  <ellipse cx="255" cy="155" rx="50" ry="11" fill="none" stroke="#2E7D32" stroke-width="1"/>
  <!-- Height h -->
  <line x1="320" y1="130" x2="320" y2="155" stroke="#C62828" stroke-width="1.5"/>
  <text x="328" y="145" font-size="8" fill="#C62828" font-weight="bold">h</text>
  <!-- Center -->
  <circle cx="255" cy="175" r="2" fill="#2E7D32"/>
  <!-- Formula -->
  <text x="255" y="235" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">V = &#x2153;&#x03C0;h&#x00B2;(3R-h)</text>
  <text x="255" y="248" font-size="7" fill="#666" text-anchor="middle">(разность сегментов)</text>

  <!-- Spherical Sector Panel -->
  <rect x="341" y="58" width="148" height="195" rx="6" fill="white" opacity="0.9" stroke="#43A047" stroke-width="1.2"/>
  <text x="415" y="74" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Шаровой сектор</text>
  <!-- Sphere outline -->
  <circle cx="415" cy="175" r="55" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Sector (cone + cap) -->
  <path d="M375,150 A55,55 0 0,1 455,150 L415,175 Z" fill="#43A047" opacity="0.12" stroke="#2E7D32" stroke-width="1"/>
  <!-- Cap part -->
  <path d="M375,150 A55,55 0 0,1 455,150" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Cone edges -->
  <line x1="415" y1="175" x2="375" y2="150" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="415" y1="175" x2="455" y2="150" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Height -->
  <line x1="415" y1="175" x2="415" y2="120" stroke="#C62828" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="422" y="148" font-size="8" fill="#C62828" font-weight="bold">h</text>
  <!-- Center -->
  <circle cx="415" cy="175" r="2" fill="#2E7D32"/>
  <!-- Formula -->
  <text x="415" y="235" font-size="8.5" fill="#2E7D32" font-weight="bold" text-anchor="middle">V = &#x2153;&#x03C0;R&#x00B2;h</text>
  <text x="415" y="248" font-size="7" fill="#666" text-anchor="middle">конус + сегмент</text>

  <!-- Common parameters panel -->
  <rect x="15" y="260" width="470" height="50" rx="6" fill="white" opacity="0.88" stroke="#43A047" stroke-width="1"/>
  <text x="250" y="276" font-size="9.5" font-weight="bold" fill="#2E7D32" text-anchor="middle">Общий параметр</text>
  <text x="250" y="293" font-size="9" fill="#333" text-anchor="middle">h — высота (расстояние от основания до поверхности шара);  R — радиус шара</text>
  <text x="250" y="305" font-size="8.5" fill="#C62828" text-anchor="middle">При h=2R: V<sub>сегм</sub> = V<sub>шара</sub> = 4/3 &#x03C0;R&#x00B3;</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#2E7D32" opacity="0.85"/>
  <text x="250" y="336" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Сегмент: V=&#x03C0;h&#x00B2;(R-h/3);  Сектор: V=&#x2153;&#x03C0;R&#x00B2;h;  Слой: разность сегментов</text>
</svg>