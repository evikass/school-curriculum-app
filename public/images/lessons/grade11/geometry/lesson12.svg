<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4527A0" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4527A0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="12.5" font-weight="bold" fill="#311B92" text-anchor="middle" font-family="serif">Объём прямоугольного параллелепипеда</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 12</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#7C4DFF" stroke-width="1" opacity="0.3"/>

  <!-- 3D Parallelepiped -->
  <rect x="15" y="58" width="250" height="220" rx="6" fill="white" opacity="0.9" stroke="#7C4DFF" stroke-width="1.2"/>
  <text x="140" y="74" font-size="10" font-weight="bold" fill="#4527A0" text-anchor="middle">Прямоуг. параллелепипед</text>
  <!-- Front face -->
  <path d="M70,210 L70,110 L190,110 L190,210 Z" fill="url(#boxGrad)" stroke="#4527A0" stroke-width="1.8"/>
  <!-- Top face -->
  <path d="M70,110 L130,75 L250,75 L190,110 Z" fill="#7C4DFF" opacity="0.06" stroke="#4527A0" stroke-width="1.5"/>
  <!-- Right face -->
  <path d="M190,110 L250,75 L250,175 L190,210 Z" fill="#4527A0" opacity="0.04" stroke="#4527A0" stroke-width="1.5"/>
  <!-- Hidden edges -->
  <line x1="70" y1="210" x2="130" y2="175" stroke="#4527A0" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="130" y1="175" x2="250" y2="175" stroke="#4527A0" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="130" y1="175" x2="130" y2="75" stroke="#4527A0" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Dimension a -->
  <line x1="70" y1="225" x2="190" y2="225" stroke="#C62828" stroke-width="1.5"/>
  <line x1="70" y1="220" x2="70" y2="230" stroke="#C62828" stroke-width="1"/>
  <line x1="190" y1="220" x2="190" y2="230" stroke="#C62828" stroke-width="1"/>
  <text x="130" y="238" font-size="10" fill="#C62828" font-weight="bold" font-style="italic">a</text>
  <!-- Dimension b -->
  <line x1="200" y1="110" x2="255" y2="75" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="238" y="87" font-size="10" fill="#2E7D32" font-weight="bold" font-style="italic">b</text>
  <!-- Dimension c -->
  <line x1="55" y1="210" x2="55" y2="110" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="50" y1="210" x2="60" y2="210" stroke="#1565C0" stroke-width="1"/>
  <line x1="50" y1="110" x2="60" y2="110" stroke="#1565C0" stroke-width="1"/>
  <text x="38" y="165" font-size="10" fill="#1565C0" font-weight="bold" font-style="italic">c</text>
  <!-- Volume formula on body -->
  <text x="130" y="168" font-size="12" fill="#4527A0" font-weight="bold" text-anchor="middle">V = abc</text>
  <!-- Vertex labels -->
  <text x="62" y="218" font-size="7" fill="#4527A0">A</text>
  <text x="62" y="107" font-size="7" fill="#4527A0">B</text>
  <text x="193" y="107" font-size="7" fill="#4527A0">C</text>
  <text x="193" y="218" font-size="7" fill="#4527A0">D</text>

  <!-- Special Cases Panel -->
  <rect x="275" y="58" width="212" height="105" rx="6" fill="white" opacity="0.9" stroke="#7C4DFF" stroke-width="1.2"/>
  <text x="381" y="74" font-size="10" font-weight="bold" fill="#4527A0" text-anchor="middle">Частные случаи</text>
  <!-- Cube -->
  <rect x="295" y="82" width="45" height="45" rx="1" fill="#7C4DFF" opacity="0.1" stroke="#4527A0" stroke-width="1.2"/>
  <text x="317" y="140" font-size="8" fill="#4527A0" text-anchor="middle" font-weight="bold">Куб</text>
  <text x="317" y="152" font-size="9" fill="#C62828" font-weight="bold" text-anchor="middle">V = a&#x00B3;</text>
  <!-- Square prism -->
  <rect x="375" y="82" width="50" height="45" rx="1" fill="#7C4DFF" opacity="0.06" stroke="#4527A0" stroke-width="1.2"/>
  <text x="400" y="140" font-size="7" fill="#4527A0" text-anchor="middle">Квадр. призма</text>
  <text x="400" y="152" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">V = a&#x00B2;h</text>

  <!-- Properties Panel -->
  <rect x="275" y="170" width="212" height="108" rx="6" fill="white" opacity="0.88" stroke="#7C4DFF" stroke-width="1"/>
  <text x="381" y="186" font-size="10" font-weight="bold" fill="#4527A0" text-anchor="middle">Свойства объёма</text>
  <text x="285" y="203" font-size="9" fill="#333">1. V &#x2265; 0</text>
  <text x="285" y="218" font-size="9" fill="#333">2. Равные тела: V&#x2081;=V&#x2082;</text>
  <text x="285" y="233" font-size="9" fill="#333">3. Аддитивность:</text>
  <text x="295" y="246" font-size="9" fill="#333">V = V&#x2081; + V&#x2082; (если общ. часть)</text>
  <text x="285" y="261" font-size="9" fill="#333">4. Единичный куб: V=1</text>
  <text x="285" y="274" font-size="9" fill="#C62828" font-weight="bold">d&#x00B2; = a&#x00B2;+b&#x00B2;+c&#x00B2;</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#4527A0" opacity="0.85"/>
  <text x="250" y="336" font-size="10" fill="white" text-anchor="middle" font-weight="bold">V = abc;  Куб: V=a&#x00B3;;  Диагональ: d&#x00B2;=a&#x00B2;+b&#x00B2;+c&#x00B2;</text>
</svg>