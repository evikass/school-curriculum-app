<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#C5CAE9"/>
    </linearGradient>
    <linearGradient id="coneG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3F51B5" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#3F51B5" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3F51B5" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1A237E" stroke-width="2.5"/>
  <text x="250" y="28" font-size="11.5" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="serif">Объём наклонной призмы, пирамиды и конуса</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 14</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3F51B5" stroke-width="1" opacity="0.3"/>

  <!-- 3D Pyramid Panel -->
  <rect x="15" y="58" width="165" height="195" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1.2"/>
  <text x="97" y="74" font-size="10" font-weight="bold" fill="#1A237E" text-anchor="middle">Пирамида</text>
  <!-- Base -->
  <polygon points="45,225 130,225 145,195 60,195" fill="#3F51B5" opacity="0.08" stroke="#1A237E" stroke-width="1.3"/>
  <!-- Apex -->
  <circle cx="95" cy="105" r="2.5" fill="#1A237E"/>
  <text x="100" y="102" font-size="8" fill="#1A237E" font-weight="bold">S</text>
  <!-- Edges -->
  <line x1="45" y1="225" x2="95" y2="105" stroke="#1A237E" stroke-width="1.5"/>
  <line x1="130" y1="225" x2="95" y2="105" stroke="#1A237E" stroke-width="1.5"/>
  <line x1="145" y1="195" x2="95" y2="105" stroke="#1A237E" stroke-width="1.5"/>
  <line x1="60" y1="195" x2="95" y2="105" stroke="#1A237E" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Hidden base edges -->
  <line x1="45" y1="225" x2="60" y2="195" stroke="#1A237E" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="60" y1="195" x2="145" y2="195" stroke="#1A237E" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Height -->
  <line x1="95" y1="105" x2="95" y2="210" stroke="#C62828" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="80" y="165" font-size="9" fill="#C62828" font-weight="bold">h</text>
  <text x="97" y="240" font-size="9" fill="#1A237E" font-weight="bold">V=&#x2153;S<sub>осн</sub>h</text>

  <!-- 3D Cone Panel -->
  <rect x="190" y="58" width="140" height="195" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1.2"/>
  <text x="260" y="74" font-size="10" font-weight="bold" fill="#1A237E" text-anchor="middle">Конус</text>
  <!-- Base ellipse -->
  <ellipse cx="260" cy="225" rx="55" ry="16" fill="url(#coneG)" stroke="#1A237E" stroke-width="1.3"/>
  <path d="M205,225 A55,16 0 0,0 315,225" fill="none" stroke="#1A237E" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Apex -->
  <circle cx="260" cy="100" r="2.5" fill="#1A237E"/>
  <!-- Sides -->
  <line x1="205" y1="225" x2="260" y2="100" stroke="#1A237E" stroke-width="1.5"/>
  <line x1="315" y1="225" x2="260" y2="100" stroke="#1A237E" stroke-width="1.5"/>
  <!-- Height -->
  <line x1="260" y1="100" x2="260" y2="225" stroke="#C62828" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="268" y="168" font-size="9" fill="#C62828" font-weight="bold">h</text>
  <!-- Radius -->
  <line x1="260" y1="225" x2="315" y2="225" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="285" y="222" font-size="8" fill="#2E7D32" font-weight="bold">R</text>
  <text x="260" y="248" font-size="9" fill="#1A237E" font-weight="bold">V=&#x2153;&#x03C0;R&#x00B2;h</text>

  <!-- Oblique Prism Panel -->
  <rect x="340" y="58" width="148" height="195" rx="6" fill="white" opacity="0.9" stroke="#3F51B5" stroke-width="1.2"/>
  <text x="414" y="74" font-size="9" font-weight="bold" fill="#1A237E" text-anchor="middle">Наклонная призма</text>
  <!-- Bottom face -->
  <polygon points="365,225 430,225 445,200 380,200" fill="#3F51B5" opacity="0.06" stroke="#1A237E" stroke-width="1.2"/>
  <!-- Top face (offset for oblique) -->
  <polygon points="375,145 440,145 455,120 390,120" fill="#3F51B5" opacity="0.04" stroke="#1A237E" stroke-width="1.2"/>
  <!-- Side edges (tilted) -->
  <line x1="365" y1="225" x2="375" y2="145" stroke="#1A237E" stroke-width="1.3"/>
  <line x1="430" y1="225" x2="440" y2="145" stroke="#1A237E" stroke-width="1.3"/>
  <line x1="445" y1="200" x2="455" y2="120" stroke="#1A237E" stroke-width="1.3"/>
  <line x1="380" y1="200" x2="390" y2="120" stroke="#1A237E" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Height (vertical, not along edge) -->
  <line x1="350" y1="225" x2="350" y2="145" stroke="#C62828" stroke-width="1.5"/>
  <text x="340" y="188" font-size="9" fill="#C62828" font-weight="bold">h</text>
  <text x="414" y="248" font-size="9" fill="#1A237E" font-weight="bold">V=S<sub>осн</sub>h</text>

  <!-- Visual proof: 3 pyramids = 1 prism -->
  <rect x="15" y="260" width="470" height="50" rx="6" fill="white" opacity="0.88" stroke="#3F51B5" stroke-width="1"/>
  <text x="250" y="276" font-size="9.5" font-weight="bold" fill="#1A237E" text-anchor="middle">Доказательство: 3 пирамиды = призма</text>
  <!-- Three small pyramids -->
  <polygon points="40,295 70,280 100,295" fill="#C62828" opacity="0.12" stroke="#C62828" stroke-width="0.8"/>
  <polygon points="120,295 150,280 180,295" fill="#2E7D32" opacity="0.12" stroke="#2E7D32" stroke-width="0.8"/>
  <polygon points="200,295 230,280 260,295" fill="#1565C0" opacity="0.12" stroke="#1565C0" stroke-width="0.8"/>
  <text x="70" y="305" font-size="8" fill="#C62828">1/3</text>
  <text x="150" y="305" font-size="8" fill="#2E7D32">1/3</text>
  <text x="230" y="305" font-size="8" fill="#1565C0">1/3</text>
  <text x="290" y="295" font-size="12" fill="#1A237E" font-weight="bold">=</text>
  <!-- Prism -->
  <rect x="310" y="275" width="60" height="20" rx="1" fill="#1A237E" opacity="0.08" stroke="#1A237E" stroke-width="1"/>
  <text x="340" y="305" font-size="8" fill="#1A237E">V<sub>призмы</sub></text>
  <text x="395" y="293" font-size="9" fill="#1A237E" font-weight="bold">V<sub>пир</sub>=&#x2153;V<sub>приз</sub></text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#1A237E" opacity="0.85"/>
  <text x="250" y="336" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold">V<sub>призмы</sub>=S<sub>осн</sub>h;  V<sub>пирамиды</sub>=&#x2153;S<sub>осн</sub>h;  V<sub>конуса</sub>=&#x2153;&#x03C0;R&#x00B2;h</text>
</svg>