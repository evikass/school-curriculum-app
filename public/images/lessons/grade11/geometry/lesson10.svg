<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0" />
      <stop offset="100%" stop-color="#3F51B5" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgGrad)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="2.5" />
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.25" />
  <polygon points="10,10 30,10 10,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,10 470,10 490,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="10,340 30,340 10,320" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,340 470,340 490,320" fill="#5C6BC0" opacity="0.10" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#283593" text-anchor="middle">Координаты в пространстве</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" text-anchor="middle">Геометрия — Урок 10</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#5C6BC0" stroke-width="2" opacity="0.3" />
  <rect x="30" y="69" width="50" height="5" fill="#5C6BC0" opacity="0.15" rx="1" />
  <rect x="420" y="69" width="50" height="5" fill="#3F51B5" opacity="0.10" rx="1" />
  <rect x="18" y="82" width="225" height="108" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="82" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="94" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Прямоугольная система</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Oxyz — декартова система</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10" fill="#37474F">координат в пространстве.</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10" fill="#37474F" />
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Точка M(x, y, z):</text>
  <text x="26" y="172" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  x — абсцисса</text>
  <text x="26" y="187" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  y — ордината</text>
  <text x="26" y="202" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  z — аппликата</text>
  <rect x="255" y="82" width="225" height="108" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="255" y="82" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="255" y="94" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="367" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Формулы</text>
  <text x="263" y="114" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">d = √((x₂−x₁)²+(y₂−y₁)²+(z₂−z₁)²)</text>
  <text x="263" y="130" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">M_серед = ((x₁+x₂)/2, (y₁+y₂)/2,</text>
  <text x="263" y="146" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">           (z₁+z₂)/2)</text>
  <text x="263" y="162" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Уравн. плоскости: Ax+By+Cz+D=0</text>
  <text x="263" y="178" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Уравн. сферы:</text>
  <text x="263" y="194" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">  (x−a)²+(y−b)²+(z−c)²=R²</text>
  <rect x="18" y="198" width="225" height="85" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="198" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="210" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="211" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Координаты и плоскости</text>
  <text x="26" y="228" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Плоскость xOy: z = 0</text>
  <text x="26" y="243" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Плоскость xOz: y = 0</text>
  <text x="26" y="258" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Плоскость yOz: x = 0</text>
  <text x="26" y="273" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Ось Ox: y = 0, z = 0</text>
  <text x="26" y="288" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Ось Oy: x = 0, z = 0</text>
  <rect x="255" y="198" width="225" height="85" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="255" y="198" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="255" y="210" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="367" y="211" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Расстояние и угол</text>
  <text x="263" y="228" font-family="Arial,sans-serif" font-size="10" fill="#37474F">От точки до плоскости:</text>
  <text x="263" y="243" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  d = |Ax₀+By₀+Cz₀+D|/√(A²+B²+C²)</text>
  <text x="263" y="258" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Угол между плоскостями:</text>
  <text x="263" y="273" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  cos α = |A₁A₂+B₁B₂+C₁C₂|/</text>
  <text x="263" y="288" font-family="Arial,sans-serif" font-size="10" fill="#37474F">         (√(A₁²+B₁²+C₁²)·√(A₂²+...))</text>
  <rect x="10" y="305" width="480" height="35" fill="url(#panelGrad)" opacity="0.08" rx="5" />
  <text x="250" y="327" font-family="Arial,sans-serif" font-size="11" fill="#5C6BC0" text-anchor="middle" opacity="0.65">Геометрия · 11 класс</text>
</svg>