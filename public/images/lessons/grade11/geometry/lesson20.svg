<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="100%" stop-color="#FFCCBC"/>
    </linearGradient>
    <radialGradient id="sphereG" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#FF5722" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#BF360C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#BF360C" stop-opacity="0.18"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#BF360C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle" font-family="serif">Комбинации тел</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 20</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#FF5722" stroke-width="1" opacity="0.3"/>

  <!-- Sphere inscribed in Cube Panel -->
  <rect x="15" y="58" width="155" height="155" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1.2"/>
  <text x="92" y="73" font-size="8.5" font-weight="bold" fill="#BF360C" text-anchor="middle">Сфера в кубе</text>
  <!-- Cube -->
  <rect x="50" y="95" width="70" height="70" rx="1" fill="none" stroke="#BF360C" stroke-width="1.3"/>
  <path d="M120,95 L140,80 L140,150 L120,165" fill="none" stroke="#BF360C" stroke-width="1"/>
  <line x1="50" y1="95" x2="70" y2="80" stroke="#BF360C" stroke-width="1"/>
  <line x1="70" y1="80" x2="140" y2="80" stroke="#BF360C" stroke-width="1"/>
  <!-- Inscribed sphere -->
  <circle cx="95" cy="130" r="32" fill="url(#sphereG)" stroke="#FF5722" stroke-width="1.5"/>
  <text x="92" y="182" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">r = a/2</text>
  <text x="92" y="195" font-size="7.5" fill="#666" text-anchor="middle">d=a, 2r=a</text>
  <text x="92" y="207" font-size="7" fill="#BF360C" text-anchor="middle">V<sub>куба</sub>=8V<sub>шара</sub>/(&#x03C0;?)</text>

  <!-- Sphere circumscribed about Cube Panel -->
  <rect x="178" y="58" width="155" height="155" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1.2"/>
  <text x="255" y="73" font-size="8.5" font-weight="bold" fill="#BF360C" text-anchor="middle">Сфера около куба</text>
  <!-- Circumscribed sphere -->
  <circle cx="255" cy="130" r="55" fill="url(#sphereG)" stroke="#FF5722" stroke-width="1.5"/>
  <!-- Cube inside -->
  <rect x="225" y="102" width="40" height="40" rx="1" fill="none" stroke="#BF360C" stroke-width="1.2"/>
  <path d="M265,102 L278,90 L278,130 L265,142" fill="none" stroke="#BF360C" stroke-width="0.8"/>
  <line x1="225" y1="102" x2="238" y2="90" stroke="#BF360C" stroke-width="0.8"/>
  <line x1="238" y1="90" x2="278" y2="90" stroke="#BF360C" stroke-width="0.8"/>
  <text x="255" y="182" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">R = a&#x221A;3 / 2</text>
  <text x="255" y="195" font-size="7.5" fill="#666" text-anchor="middle">d = a&#x221A;3</text>
  <text x="255" y="207" font-size="7" fill="#BF360C" text-anchor="middle">d — диагональ куба</text>

  <!-- Cone in Sphere Panel -->
  <rect x="341" y="58" width="148" height="155" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1.2"/>
  <text x="415" y="73" font-size="8.5" font-weight="bold" fill="#BF360C" text-anchor="middle">Конус в сфере</text>
  <!-- Sphere -->
  <circle cx="415" cy="130" r="50" fill="url(#sphereG)" stroke="#FF5722" stroke-width="1.3"/>
  <!-- Cone inside -->
  <ellipse cx="415" cy="160" rx="35" ry="10" fill="none" stroke="#BF360C" stroke-width="1"/>
  <line x1="380" y1="160" x2="415" y2="90" stroke="#BF360C" stroke-width="1.2"/>
  <line x1="450" y1="160" x2="415" y2="90" stroke="#BF360C" stroke-width="1.2"/>
  <text x="415" y="195" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">R&#x00B2; = (H-R)&#x00B2;+r&#x00B2;</text>
  <text x="415" y="208" font-size="7" fill="#BF360C" text-anchor="middle">H — высота конуса</text>

  <!-- Formulas Summary Panel -->
  <rect x="15" y="220" width="470" height="90" rx="6" fill="white" opacity="0.9" stroke="#FF5722" stroke-width="1.2"/>
  <text x="250" y="236" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Ключевые соотношения</text>
  <!-- Column 1 -->
  <text x="25" y="254" font-size="8.5" fill="#C62828" font-weight="bold">Сфера впис. в куб:</text>
  <text x="25" y="266" font-size="8" fill="#333">r = a/2</text>
  <text x="25" y="280" font-size="8.5" fill="#1565C0" font-weight="bold">Цилиндр впис. в сферу:</text>
  <text x="25" y="292" font-size="8" fill="#333">R&#x00B2; = r&#x00B2; + h&#x00B2;/4</text>
  <!-- Column 2 -->
  <text x="180" y="254" font-size="8.5" fill="#2E7D32" font-weight="bold">Сфера опис. около куба:</text>
  <text x="180" y="266" font-size="8" fill="#333">R = a&#x221A;3 / 2</text>
  <text x="180" y="280" font-size="8.5" fill="#7B1FA2" font-weight="bold">Конус впис. в сферу:</text>
  <text x="180" y="292" font-size="8" fill="#333">R&#x00B2; = (H-R<sub>сф</sub>)&#x00B2; + r&#x00B2;</text>
  <!-- Column 3 -->
  <text x="350" y="254" font-size="8.5" fill="#FF8F00" font-weight="bold">Сфера впис. в конус:</text>
  <text x="350" y="266" font-size="8" fill="#333">r<sub>сф</sub> = rH/(l+r)</text>
  <text x="350" y="280" font-size="8.5" fill="#4E342E" font-weight="bold">Сфера в призму:</text>
  <text x="350" y="292" font-size="8" fill="#333">r = S<sub>осн</sub>/p (прав.)</text>
  <text x="350" y="304" font-size="7" fill="#666">p — полупериметр</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#BF360C" opacity="0.85"/>
  <text x="250" y="336" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Сфера в кубе: r=a/2;  Сфера около куба: R=a&#x221A;3/2;  Конус в сфере: R&#x00B2;=(H-R)&#x00B2;+r&#x00B2;</text>
</svg>