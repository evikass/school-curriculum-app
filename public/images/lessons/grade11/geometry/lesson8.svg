<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5C6BC0" />
      <stop offset="100%" stop-color="#3F51B5" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgGrad)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="2.5" />
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.25" />
  <polygon points="10,10 30,10 10,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,10 470,10 490,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="10,340 30,340 10,320" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,340 470,340 490,320" fill="#5C6BC0" opacity="0.10" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#283593" text-anchor="middle">Площади поверхностей</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" text-anchor="middle">Геометрия — Урок 8</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#5C6BC0" stroke-width="2" opacity="0.3" />
  <rect x="30" y="69" width="50" height="5" fill="#5C6BC0" opacity="0.15" rx="1" />
  <rect x="420" y="69" width="50" height="5" fill="#3F51B5" opacity="0.10" rx="1" />
  <rect x="18" y="82" width="225" height="108" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="18" y="82" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="18" y="94" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="130" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Площади боковой поверхности</text>
  <text x="26" y="114" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Призма (прямая): S_бок = P·h</text>
  <text x="26" y="130" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Пирамида (прав.): S_бок = ½P·l</text>
  <text x="26" y="146" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Цилиндр:  S_бок = 2πRh</text>
  <text x="26" y="162" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Конус:    S_бок = πRl</text>
  <text x="26" y="178" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Ус. конус: S_бок = π(R+r)l</text>
  <text x="26" y="194" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Ус. пир.(прав.): S_бок = ½(P₁+P₂)l</text>
  <rect x="255" y="82" width="225" height="108" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="255" y="82" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="255" y="94" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="367" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Площади полной поверхности</text>
  <text x="263" y="114" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Призма: S = S_бок + 2S_осн</text>
  <text x="263" y="130" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Пирамида: S = S_бок + S_осн</text>
  <text x="263" y="146" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Цилиндр: S = 2πR(R + h)</text>
  <text x="263" y="162" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Конус:   S = πR(R + l)</text>
  <text x="263" y="178" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Сфера:   S = 4πR²</text>
  <text x="263" y="194" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">Ус. конус: S = π(R+r)l + πR² + πr²</text>
  <rect x="18" y="198" width="462" height="85" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="198" width="462" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="210" width="462" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="249" y="211" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Развёртки поверхностей</text>
  <text x="26" y="228" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Цилиндр: прямоугольник (2πR × h) + 2 круга (πR²)     •     Конус: сектор (πRl по дуге 2πR) + круг (πR²)</text>
  <text x="26" y="243" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Призма: прямоугольники боковых граней + 2 основания   •     Пирамида: треугольники граней + основание</text>
  <text x="26" y="258" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Сфера: не имеет развёртки на плоскость (теорема)      •     S_сф = 4πR² — вывод через предел</text>
  <rect x="10" y="305" width="480" height="35" fill="url(#panelGrad)" opacity="0.08" rx="5" />
  <text x="250" y="327" font-family="Arial,sans-serif" font-size="11" fill="#5C6BC0" text-anchor="middle" opacity="0.65">Геометрия · 11 класс</text>
</svg>