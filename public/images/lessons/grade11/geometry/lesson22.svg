<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cylinderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e6f7ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#91d5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40a9ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coneGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f6ffed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b7eb8f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52c41a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sphereGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff2e8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffbb96;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fa8c16;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#1890ff" stroke-width="2" rx="5"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="470" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#666">Урок 22</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1890ff">Тела вращения. Обзор</text>
  
  <!-- Цилиндр -->
  <g transform="translate(100, 100)">
    <!-- Основание цилиндра -->
    <ellipse cx="0" cy="80" rx="40" ry="10" fill="#40a9ff" filter="url(#shadow)"/>
    <!-- Тело цилиндра -->
    <rect x="-40" y="0" width="80" height="80" fill="url(#cylinderGradient)" filter="url(#shadow)"/>
    <!-- Верх цилиндра -->
    <ellipse cx="0" cy="0" rx="40" ry="10" fill="#91d5ff" filter="url(#shadow)"/>
    <!-- Подпись -->
    <text x="0" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1890ff">Цилиндр</text>
    <!-- Формулы -->
    <text x="0" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">V = πr²h</text>
    <text x="0" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">S = 2πr(h + r)</text>
    <!-- Обозначения -->
    <text x="-50" y="40" font-family="Arial, sans-serif" font-size="10" fill="#666">r - радиус</text>
    <text x="-50" y="55" font-family="Arial, sans-serif" font-size="10" fill="#666">h - высота</text>
  </g>
  
  <!-- Конус -->
  <g transform="translate(250, 100)">
    <!-- Основание конуса -->
    <ellipse cx="0" cy="80" rx="40" ry="10" fill="#52c41a" filter="url(#shadow)"/>
    <!-- Тело конуса -->
    <path d="M -40 80 L 0 0 L 40 80 Z" fill="url(#coneGradient)" filter="url(#shadow)"/>
    <!-- Подпись -->
    <text x="0" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#52c41a">Конус</text>
    <!-- Формулы -->
    <text x="0" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">V = (1/3)πr²h</text>
    <text x="0" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">S = πr(r + l)</text>
    <!-- Обозначения -->
    <text x="-50" y="40" font-family="Arial, sans-serif" font-size="10" fill="#666">r - радиус</text>
    <text x="-50" y="55" font-family="Arial, sans-serif" font-size="10" fill="#666">h - высота</text>
    <text x="-50" y="70" font-family="Arial, sans-serif" font-size="10" fill="#666">l - образующая</text>
  </g>
  
  <!-- Шар -->
  <g transform="translate(400, 100)">
    <!-- Шар -->
    <circle cx="0" cy="40" r="40" fill="url(#sphereGradient)" filter="url(#shadow)"/>
    <!-- Подпись -->
    <text x="0" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fa8c16">Шар</text>
    <!-- Формулы -->
    <text x="0" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">V = (4/3)πr³</text>
    <text x="0" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">S = 4πr²</text>
    <!-- Обозначения -->
    <text x="-50" y="40" font-family="Arial, sans-serif" font-size="10" fill="#666">r - радиус</text>
  </g>
  
  <!-- Разделительная линия -->
  <line x1="50" y1="180" x2="450" y2="180" stroke="#d9d9d9" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Дополнительные формулы -->
  <text x="50" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">Основные соотношения:</text>
  
  <!-- Формулы для сечений -->
  <g transform="translate(50, 230)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#333">1. Окружность: C = 2πr</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#333">2. Длина дуги: l = αr (α в радианах)</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="11" fill="#333">3. Площадь сектора: S = (1/2)αr²</text>
  </g>
  
  <!-- Формулы для тел вращения -->
  <g transform="translate(280, 230)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#333">1. Объем тела вращения: V = π∫[a,b] f²(x)dx</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#333">2. Площадь поверхности: S = 2π∫[a,b] f(x)√(1 + f'²(x))dx</text>
  </g>
  
  <!-- Дополнительные обозначения -->
  <g transform="translate(50, 300)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#666">V - объем</text>
    <text x="80" y="0" font-family="Arial, sans-serif" font-size="10" fill="#666">S - площадь поверхности</text>
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="10" fill="#666">π - число Пи (≈3.14159)</text>
    <text x="320" y="0" font-family="Arial, sans-serif" font-size="10" fill="#666">∫ - интеграл</text>
  </g>
</svg>