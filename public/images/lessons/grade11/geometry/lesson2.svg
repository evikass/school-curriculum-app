  <text x="130" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Определение</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Пирамида — многогранник,</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10" fill="#37474F">основание — многоугольник,</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10" fill="#37474F">остальные грани — треугольники</text>
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10" fill="#37474F">с общей вершиной.</text>
  <text x="26" y="172" font-family="Arial,sans-serif" font-size="10" fill="#37474F" />
  <text x="26" y="187" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Правильная пирамида: основание</text>
  <text x="26" y="202" font-family="Arial,sans-serif" font-size="10" fill="#37474F">— прав. многоугольник, вершина</text>
  <text x="26" y="217" font-family="Arial,sans-serif" font-size="10" fill="#37474F">проектируется в центр основания.</text>
  <rect x="255" y="82" width="225" height="110" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="255" y="82" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="255" y="94" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="367" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Формулы</text>
  <text x="263" y="114" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">V = ⅓ · S_осн · h</text>
  <text x="263" y="130" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">S_бок = ½ · P_осн · l (прав.)</text>
  <text x="263" y="146" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">S_полн = S_бок + S_осн</text>
  <text x="263" y="162" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">l² = h² + R²  (апофема)</text>
  <rect x="18" y="202" width="225" height="95" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="202" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="214" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="215" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Виды пирамид</text>
  <text x="26" y="232" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Треугольная (тетраэдр)</text>
  <text x="26" y="247" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Четырёхугольная</text>
  <text x="26" y="262" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Правильная пирамида</text>
  <text x="26" y="277" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Усечённая пирамида:</text>
  <text x="26" y="292" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  V = ⅓h(S₁+√(S₁S₂)+S₂)</text>
