  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#283593" text-anchor="middle">Пирамида</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" text-anchor="middle">Геометрия — Урок 2</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#5C6BC0" stroke-width="2" opacity="0.3" />
  <rect x="30" y="69" width="50" height="5" fill="#5C6BC0" opacity="0.15" rx="1" />
  <rect x="420" y="69" width="50" height="5" fill="#3F51B5" opacity="0.10" rx="1" />
