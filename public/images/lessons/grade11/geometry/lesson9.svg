    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bgGrad)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5C6BC0" stroke-width="2.5" />
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#5C6BC0" stroke-width="1" opacity="0.25" />
  <polygon points="10,10 30,10 10,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,10 470,10 490,30" fill="#5C6BC0" opacity="0.10" />
  <polygon points="10,340 30,340 10,320" fill="#5C6BC0" opacity="0.10" />
  <polygon points="490,340 470,340 490,320" fill="#5C6BC0" opacity="0.10" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#283593" text-anchor="middle">Комбинации тел</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#5C6BC0" text-anchor="middle">Геометрия — Урок 9</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#5C6BC0" stroke-width="2" opacity="0.3" />
  <rect x="30" y="69" width="50" height="5" fill="#5C6BC0" opacity="0.15" rx="1" />
  <rect x="420" y="69" width="50" height="5" fill="#3F51B5" opacity="0.10" rx="1" />
  <rect x="18" y="82" width="225" height="108" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="18" y="82" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="18" y="94" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="130" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Шар и многогранник</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Шар вписан в многогранник:</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  касается всех граней</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  R_впис = r (впис. сфера)</text>
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10" fill="#37474F" />
  <text x="26" y="172" font-family="Arial,sans-serif" font-size="10" fill="#37474F">Шар описан около многогран.:</text>
  <text x="26" y="187" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  все вершины на сфере</text>
  <text x="26" y="202" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  R_опис = R (опис. сфера)</text>
  <rect x="255" y="82" width="225" height="108" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="255" y="82" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="255" y="94" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="367" y="95" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Типичные комбинации</text>
  <text x="263" y="112" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Шар вписан в цилиндр: R_ш = R</text>
  <text x="263" y="127" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  h = 2R (равностор. сечение)</text>
  <text x="263" y="142" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Шар вписан в конус:</text>
  <text x="263" y="157" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  r = R·h/(R+l)</text>
  <text x="263" y="172" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Конус вписан в шар:</text>
  <text x="263" y="187" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  R_ш = (h²+R²)/(2h)</text>
  <text x="263" y="202" font-family="Arial,sans-serif" font-size="10" fill="#37474F">• Цилиндр вписан в шар:</text>
  <text x="263" y="217" font-family="Arial,sans-serif" font-size="10" fill="#37474F">  R_ш² = R² + (h/2)²</text>
  <rect x="18" y="198" width="225" height="85" fill="#FFFFFF" rx="6" stroke="#FF7043" stroke-width="1.5" opacity="0.95" />
  <rect x="18" y="198" width="225" height="18" fill="#FF7043" rx="6" opacity="0.2" />
  <rect x="18" y="210" width="225" height="6" fill="#FF7043" opacity="0.2" />
  <text x="130" y="211" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">Ключевые формулы</text>
  <text x="26" y="230" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">R_шара = abc/(4S)  (в ∆)</text>
  <text x="26" y="246" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">r_впис = S/p  (в треугольник)</text>
  <text x="26" y="262" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">R_оп.куб = a√3/2</text>
  <text x="26" y="278" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" font-weight="bold">R_вп.куб = a/2</text>
  <rect x="255" y="198" width="225" height="85" fill="#E8EAF6" rx="6" stroke="#5C6BC0" stroke-width="1" opacity="0.9" />
  <rect x="255" y="198" width="225" height="18" fill="#5C6BC0" rx="6" opacity="0.18" />
  <rect x="255" y="210" width="225" height="6" fill="#5C6BC0" opacity="0.18" />
  <text x="367" y="211" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle">Метод решения</text>
  <text x="263" y="228" font-family="Arial,sans-serif" font-size="10" fill="#37474F">1. Найти осевое сечение</text>
  <text x="263" y="243" font-family="Arial,sans-serif" font-size="10" fill="#37474F">2. Свести к плоской задаче</text>
  <text x="263" y="258" font-family="Arial,sans-serif" font-size="10" fill="#37474F">3. Использовать свойства</text>
  <text x="263" y="273" font-family="Arial,sans-serif" font-size="10" fill="#37474F">   вписанных/описанных фигур</text>
  <text x="263" y="288" font-family="Arial,sans-serif" font-size="10" fill="#37474F">4. Применить теорему Пифагора</text>
  <rect x="10" y="305" width="480" height="35" fill="url(#panelGrad)" opacity="0.08" rx="5" />
  <text x="250" y="327" font-family="Arial,sans-serif" font-size="11" fill="#5C6BC0" text-anchor="middle" opacity="0.65">Геометрия · 11 класс</text>
</svg>