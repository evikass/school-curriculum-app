<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="frustGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00897B" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#00897B" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00897B" stop-opacity="0.25"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="serif">Усечённый конус</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 9</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00897B" stroke-width="1" opacity="0.3"/>

  <!-- 3D Frustum -->
  <rect x="15" y="58" width="260" height="215" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="145" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle">Усечённый конус</text>
  <!-- Bottom ellipse -->
  <ellipse cx="145" cy="235" rx="80" ry="25" fill="url(#frustGrad)" stroke="#00695C" stroke-width="1.5"/>
  <path d="M65,235 A80,25 0 0,0 225,235" fill="none" stroke="#00695C" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Top ellipse -->
  <ellipse cx="145" cy="110" rx="40" ry="13" fill="url(#frustGrad)" stroke="#00695C" stroke-width="1.5"/>
  <!-- Side lines -->
  <line x1="65" y1="235" x2="105" y2="110" stroke="#00695C" stroke-width="1.8"/>
  <line x1="225" y1="235" x2="185" y2="110" stroke="#00695C" stroke-width="1.8"/>
  <!-- Extended lines to apex (dashed) -->
  <line x1="65" y1="235" x2="115" y2="68" stroke="#00695C" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="225" y1="235" x2="175" y2="68" stroke="#00695C" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <circle cx="145" cy="60" r="2" fill="#00695C" opacity="0.5"/>
  <text x="148" y="58" font-size="7" fill="#00695C" opacity="0.5">S</text>
  <!-- Axis -->
  <line x1="145" y1="262" x2="145" y2="85" stroke="#666" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- Height -->
  <line x1="42" y1="235" x2="42" y2="110" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="37" y1="235" x2="47" y2="235" stroke="#1565C0" stroke-width="1"/>
  <line x1="37" y1="110" x2="47" y2="110" stroke="#1565C0" stroke-width="1"/>
  <text x="28" y="175" font-size="9" fill="#1565C0" font-weight="bold" font-style="italic">h</text>
  <!-- Big radius R -->
  <line x1="145" y1="235" x2="225" y2="235" stroke="#C62828" stroke-width="1.5"/>
  <text x="180" y="232" font-size="9" fill="#C62828" font-weight="bold" font-style="italic">R</text>
  <!-- Small radius r -->
  <line x1="145" y1="110" x2="185" y2="110" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="160" y="107" font-size="9" fill="#2E7D32" font-weight="bold" font-style="italic">r</text>
  <!-- Slant height l -->
  <line x1="225" y1="235" x2="185" y2="110" stroke="#FF8F00" stroke-width="2.5"/>
  <text x="218" y="170" font-size="9" fill="#FF8F00" font-weight="bold" font-style="italic">l</text>
  <!-- Center points -->
  <circle cx="145" cy="235" r="2" fill="#00695C"/>
  <circle cx="145" cy="110" r="2" fill="#00695C"/>

  <!-- Formulas Panel -->
  <rect x="285" y="58" width="202" height="135" rx="6" fill="white" opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="386" y="74" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle">Формулы</text>
  <!-- l formula -->
  <rect x="295" y="82" width="182" height="22" rx="3" fill="#00897B" opacity="0.06"/>
  <text x="386" y="97" font-size="10" fill="#00695C" font-weight="bold" text-anchor="middle">l&#x00B2; = h&#x00B2; + (R-r)&#x00B2;</text>
  <!-- Lateral area -->
  <text x="386" y="120" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">S<sub>бок</sub> = &#x03C0;(R+r)l</text>
  <!-- Total area -->
  <text x="386" y="142" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">S<sub>полн</sub> = &#x03C0;(R+r)l + &#x03C0;R&#x00B2; + &#x03C0;r&#x00B2;</text>
  <text x="386" y="162" font-size="8.5" fill="#666" text-anchor="middle">= &#x03C0;(Rl+rl+R&#x00B2;+r&#x00B2;)</text>
  <text x="386" y="182" font-size="9" fill="#00695C" font-weight="bold" text-anchor="middle">V = &#x2153;&#x03C0;h(R&#x00B2;+Rr+r&#x00B2;)</text>

  <!-- Visual proof concept -->
  <rect x="285" y="200" width="202" height="75" rx="6" fill="white" opacity="0.88" stroke="#00897B" stroke-width="1"/>
  <text x="386" y="216" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Из большого конуса</text>
  <!-- Small cone cut off diagram -->
  <polygon points="310,260 350,225 390,260" fill="#00897B" opacity="0.1" stroke="#00695C" stroke-width="1"/>
  <line x1="330" y1="245" x2="390" y2="245" stroke="#C62828" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="350" y="270" font-size="7.5" fill="#666" text-anchor="middle">V = V<sub>больш</sub> - V<sub>мал</sub></text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#00695C" opacity="0.85"/>
  <text x="250" y="336" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold">S<sub>бок</sub>=&#x03C0;(R+r)l;  l&#x00B2;=h&#x00B2;+(R-r)&#x00B2;;  V=&#x2153;&#x03C0;h(R&#x00B2;+Rr+r&#x00B2;)</text>
</svg>