<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c4168;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="2" rx="5" ry="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#7f8c8d" stroke-width="1" rx="3" ry="3"/>
  
  <!-- Номер урока -->
  <text x="460" y="50" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle">№5</text>
  
  <!-- ГЕОГРАФИЯ · 11 КЛАСС -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" fill="#34495e" text-anchor="middle" font-weight="bold">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50" text-anchor="middle" font-weight="bold">Урок 5: Вычисление углов между прямыми и плоскостями</text>
  
  <!-- Основная иллюстрация: Векторная диаграмма -->
  <g transform="translate(250, 180)">
    <!-- Ось X -->
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="155" y="5" font-family="Arial, sans-serif" font-size="14" fill="#34495e">X</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="100" x2="0" y2="-100" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="5" y="-105" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Y</text>
    
    <!-- Ось Z -->
    <line x1="-50" y1="50" x2="50" y2="-50" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="55" y="-55" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Z</text>
    
    <!-- Вектор a -->
    <line x1="0" y1="0" x2="80" y2="-60" stroke="url(#grad1)" stroke-width="3" marker-end="url(#arrowhead-blue)"/>
    <text x="90" y="-65" font-family="Arial, sans-serif" font-size="16" fill="#4a6fa5">a</text>
    
    <!-- Вектор b -->
    <line x1="0" y1="0" x2="100" y2="-30" stroke="url(#grad2)" stroke-width="3" marker-end="url(#arrowhead-red)"/>
    <text x="110" y="-35" font-family="Arial, sans-serif" font-size="16" fill="#e74c3c">b</text>
    
    <!-- Плоскость XY -->
    <path d="M-120,0 L120,0 L120,80 L-120,80 Z" fill="#ecf0f1" stroke="#95a5a6" stroke-width="1" opacity="0.5"/>
    <text x="125" y="85" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">XY</text>
    
    <!-- Угол между векторами -->
    <path d="M 30,0 A 30,30 0 0,1 15,-26" fill="none" stroke="#f39c12" stroke-width="2"/>
    <text x="35" y="-10" font-family="Arial, sans-serif" font-size="14" fill="#d68910">(a,b)</text>
    
    <!-- Дополнительные линии проекций -->
    <line x1="80" y1="-60" x2="80" y2="0" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="100" y1="-30" x2="100" y2="0" stroke="#95a5a6" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Формулы -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="400" height="60" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" ry="5"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">Скалярное произведение:</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">a · b = |a| · |b| · cos(α) = a₁b₁ + a₂b₂ + a₃b₃</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">cos(α) = (a · b) / (|a| · |b|)</text>
  </g>
  
  <!-- Объяснение -->
  <text x="80" y="120" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Применение скалярного произведения в географии:</text>
  <text x="80" y="140" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">• Вычисление угла между направлениями ветра</text>
  <text x="80" y="155" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">• Определение наклона рельефа</text>
  <text x="80" y="170" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">• Расчет солнечной радиации</text>
  
  <!-- Пример задачи -->
  <rect x="320" y="100" width="160" height="120" fill="#fff" stroke="#3498db" stroke-width="1" rx="5" ry="5" filter="url(#shadow)"/>
  <text x="330" y="120" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Пример:</text>
  <text x="330" y="140" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Найти угол между</text>
  <text x="330" y="155" font-family="Arial, sans-serif" font-size="12" fill="#34495e">векторами направления</text>
  <text x="330" y="170" font-family="Arial, sans-serif" font-size="12" fill="#34495e">движения теплого</text>
  <text x="330" y="185" font-family="Arial, sans-serif" font-size="12" fill="#34495e">и холодного воздуха</text>
  <text x="330" y="205" font-family="Arial, sans-serif" font-size="12" fill="#34495e">a = (3, 2, 1)</text>
  <text x="330" y="220" font-family="Arial, sans-serif" font-size="12" fill="#34495e">b = (1, -1, 4)</text>
  
  <!-- Стрелка-маркер -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a6fa5"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Дополнительные элементы оформления -->
  <circle cx="40" cy="40" r="15" fill="none" stroke="#3498db" stroke-width="1" opacity="0.3"/>
  <circle cx="460" cy="310" r="15" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.3"/>
  
  <!-- Подписи к осям -->
  <text x="150" y="240" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Пространство векторов</text>
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Координатная система</text>
</svg>