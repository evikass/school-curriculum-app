<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle" font-family="serif">Правильные многогранники</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="sans-serif">Геометрия 11 класс — Урок 19</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#9C27B0" stroke-width="1" opacity="0.3"/>

  <!-- Tetrahedron -->
  <rect x="15" y="58" width="92" height="120" rx="5" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="61" y="72" font-size="8" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Тетраэдр</text>
  <polygon points="61,78 35,128 87,128" fill="#9C27B0" opacity="0.1" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="61" y1="78" x2="61" y2="128" stroke="#7B1FA2" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.4"/>
  <text x="61" y="143" font-size="7" fill="#333" text-anchor="middle">4 грани</text>
  <text x="61" y="153" font-size="7" fill="#333" text-anchor="middle">&#x25B3; &#x25B3; &#x25B3; &#x25B3;</text>
  <text x="61" y="166" font-size="7" fill="#7B1FA2" text-anchor="middle">V=4 E=6 F=4</text>
  <text x="61" y="176" font-size="6.5" fill="#666" text-anchor="middle">4-6+4=2</text>

  <!-- Cube -->
  <rect x="112" y="58" width="92" height="120" rx="5" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="158" y="72" font-size="8" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Гексаэдр</text>
  <!-- Cube 3D -->
  <rect x="138" y="82" width="30" height="30" rx="1" fill="#9C27B0" opacity="0.08" stroke="#7B1FA2" stroke-width="1.2"/>
  <path d="M168,82 L178,74 L178,104 L168,112" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <line x1="138" y1="82" x2="148" y2="74" stroke="#7B1FA2" stroke-width="1"/>
  <line x1="148" y1="74" x2="178" y2="74" stroke="#7B1FA2" stroke-width="1"/>
  <text x="158" y="143" font-size="7" fill="#333" text-anchor="middle">6 граней</text>
  <text x="158" y="153" font-size="7" fill="#333" text-anchor="middle">&#x25A1;&#x25A1;&#x25A1;&#x25A1;&#x25A1;&#x25A1;</text>
  <text x="158" y="166" font-size="7" fill="#7B1FA2" text-anchor="middle">V=8 E=12 F=6</text>
  <text x="158" y="176" font-size="6.5" fill="#666" text-anchor="middle">8-12+6=2</text>

  <!-- Octahedron -->
  <rect x="209" y="58" width="92" height="120" rx="5" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="255" y="72" font-size="8" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Октаэдр</text>
  <!-- Octahedron shape -->
  <polygon points="255,78 235,108 255,138 275,108" fill="#9C27B0" opacity="0.1" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="255" y1="78" x2="255" y2="138" stroke="#7B1FA2" stroke-width="0.6" stroke-dasharray="2,2" opacity="0.4"/>
  <line x1="235" y1="108" x2="275" y2="108" stroke="#7B1FA2" stroke-width="1"/>
  <text x="255" y="153" font-size="7" fill="#333" text-anchor="middle">8 граней</text>
  <text x="255" y="166" font-size="7" fill="#7B1FA2" text-anchor="middle">V=6 E=12 F=8</text>
  <text x="255" y="176" font-size="6.5" fill="#666" text-anchor="middle">6-12+8=2</text>

  <!-- Dodecahedron -->
  <rect x="306" y="58" width="92" height="120" rx="5" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="352" y="72" font-size="8" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Додекаэдр</text>
  <!-- Simplified dodecahedron (pentagon) -->
  <polygon points="352,80 372,90 368,112 336,112 332,90" fill="#9C27B0" opacity="0.1" stroke="#7B1FA2" stroke-width="1.3"/>
  <line x1="352" y1="80" x2="348" y2="102" stroke="#7B1FA2" stroke-width="0.8"/>
  <line x1="372" y1="90" x2="348" y2="102" stroke="#7B1FA2" stroke-width="0.8"/>
  <line x1="332" y1="90" x2="348" y2="102" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="352" y="130" font-size="7" fill="#333" text-anchor="middle">12 граней</text>
  <text x="352" y="140" font-size="7" fill="#333" text-anchor="middle">5-угольники</text>
  <text x="352" y="153" font-size="7" fill="#7B1FA2" text-anchor="middle">V=20 E=30 F=12</text>
  <text x="352" y="163" font-size="6.5" fill="#666" text-anchor="middle">20-30+12=2</text>

  <!-- Icosahedron -->
  <rect x="403" y="58" width="85" height="120" rx="5" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="445" y="72" font-size="8" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Икосаэдр</text>
  <!-- Simplified icosahedron -->
  <polygon points="445,80 460,95 455,115 435,115 430,95" fill="#9C27B0" opacity="0.1" stroke="#7B1FA2" stroke-width="1.3"/>
  <polygon points="445,80 455,115 435,115" fill="none" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="445" y="130" font-size="7" fill="#333" text-anchor="middle">20 граней</text>
  <text x="445" y="140" font-size="7" fill="#333" text-anchor="middle">&#x25B3; &#x25B3;...</text>
  <text x="445" y="153" font-size="7" fill="#7B1FA2" text-anchor="middle">V=12 E=30 F=20</text>
  <text x="445" y="163" font-size="6.5" fill="#666" text-anchor="middle">12-30+20=2</text>

  <!-- Euler's Formula Panel -->
  <rect x="15" y="185" width="235" height="105" rx="6" fill="white" opacity="0.9" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="132" y="201" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Теорема Эйлера</text>
  <rect x="35" y="208" width="195" height="26" rx="3" fill="#7B1FA2" opacity="0.08"/>
  <text x="132" y="226" font-size="14" fill="#C62828" font-weight="bold" text-anchor="middle">V - E + F = 2</text>
  <text x="25" y="248" font-size="8.5" fill="#333">Для любого выпуклого многогранника:</text>
  <text x="25" y="261" font-size="8.5" fill="#333">число вершин минус число рёбер</text>
  <text x="25" y="274" font-size="8.5" fill="#333">плюс число граней равно двум</text>
  <text x="25" y="286" font-size="8" fill="#7B1FA2" font-weight="bold">Справедливо для всех 5 тел!</text>

  <!-- Why only 5 panel -->
  <rect x="260" y="185" width="228" height="105" rx="6" fill="white" opacity="0.88" stroke="#9C27B0" stroke-width="1"/>
  <text x="374" y="201" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Почему только 5?</text>
  <text x="270" y="218" font-size="8.5" fill="#333">В каждой вершине сходятся k</text>
  <text x="270" y="231" font-size="8.5" fill="#333">одинаковых правильных n-угольников:</text>
  <text x="270" y="248" font-size="8.5" fill="#7B1FA2" font-weight="bold">k &#x00B7; (n-2)/n &lt; 2  (сумма углов &lt; 360&#x00B0;)</text>
  <text x="270" y="264" font-size="8" fill="#333">n=3,k=3: тетраэдр</text>
  <text x="270" y="276" font-size="8" fill="#333">n=4,k=3: гексаэдр (куб)</text>
  <text x="380" y="264" font-size="8" fill="#333">n=3,k=4: октаэдр</text>
  <text x="380" y="276" font-size="8" fill="#333">n=5,k=3: додекаэдр</text>
  <text x="380" y="288" font-size="8" fill="#333">n=3,k=5: икосаэдр</text>

  <!-- Bottom bar -->
  <rect x="10" y="320" width="480" height="24" rx="4" fill="#7B1FA2" opacity="0.85"/>
  <text x="250" y="336" font-size="9.5" fill="white" text-anchor="middle" font-weight="bold">5 правильных многогранников;  Формула Эйлера: V-E+F=2;  Только 5: тетраэдр, куб, октаэдр, додекаэдр, икосаэдр</text>
</svg>