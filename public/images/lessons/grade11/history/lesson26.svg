<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3333;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3399ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="yellowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffdd33;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#666" stroke-width="1"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#000">Перестройка 1985-1991</text>
  
  <!-- Номер урока -->
  <text x="480" y="25" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#666">ур. 24</text>
  
  <!-- Хронологическая линия -->
  <line x1="30" y1="80" x2="470" y2="80" stroke="#666" stroke-width="2"/>
  <circle cx="30" cy="80" r="4" fill="#333"/>
  <circle cx="470" cy="80" r="4" fill="#333"/>
  
  <!-- Даты на хронологической линии -->
  <text x="30" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1985</text>
  <text x="120" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1986</text>
  <text x="210" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1987</text>
  <text x="300" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1989</text>
  <text x="390" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1990</text>
  <text x="470" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1991</text>
  
  <!-- Портрет Горбачёва -->
  <g transform="translate(60, 120)">
    <circle cx="20" cy="20" r="18" fill="#f5deb3"/>
    <circle cx="20" cy="10" r="7" fill="#333"/>
    <path d="M20,17 Q15,22 15,28 Q15,32 20,32 Q25,32 25,28 Q25,22 20,17" fill="#333"/>
    <text x="20" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">М.С. Горбачёв</text>
    <text x="20" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">1985-1991</text>
  </g>
  
  <!-- Схема гласности -->
  <g transform="translate(140, 120)">
    <rect x="0" y="0" width="80" height="50" fill="none" stroke="#0066cc" stroke-width="1.5"/>
    <circle cx="40" cy="25" r="15" fill="none" stroke="#0066cc" stroke-width="1.5"/>
    <path d="M25,25 L40,25 M40,25 L55,25 M40,10 L40,40" stroke="#0066cc" stroke-width="1.5"/>
    <text x="40" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Гласность</text>
    <text x="40" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">открытость информации</text>
  </g>
  
  <!-- Чернобыль -->
  <g transform="translate(240, 120)">
    <rect x="0" y="0" width="40" height="50" fill="#666"/>
    <rect x="10" y="-10" width="20" height="20" fill="#333"/>
    <path d="M10,-10 Q20,-20 30,-10" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M15,0 L15,-25 M25,0 L25,-25" stroke="#ff3333" stroke-width="3"/>
    <path d="M20,-25 L20,-30" stroke="#ff3333" stroke-width="3"/>
    <text x="20" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Чернобыль</text>
    <text x="20" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">26.04.1986</text>
  </g>
  
  <!-- Берлинская стена -->
  <g transform="translate(300, 120)">
    <rect x="0" y="0" width="5" height="50" fill="#333"/>
    <rect x="15" y="0" width="5" height="50" fill="#333"/>
    <line x1="0" y1="10" x2="15" y2="10" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="20" x2="15" y2="20" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="30" x2="15" y2="30" stroke="#333" stroke-width="2"/>
    <line x1="0" y1="40" x2="15" y2="40" stroke="#333" stroke-width="2"/>
    <text x="10" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Берлинская стена</text>
    <text x="10" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">09.11.1989</text>
  </g>
  
  <!-- Беловежские соглашения -->
  <g transform="translate(360, 120)">
    <rect x="0" y="0" width="70" height="40" fill="#f0f0f0" stroke="#333" stroke-width="1"/>
    <line x1="5" y1="10" x2="65" y2="10" stroke="#333" stroke-width="0.5"/>
    <line x1="5" y1="20" x2="65" y2="20" stroke="#333" stroke-width="0.5"/>
    <line x1="5" y1="30" x2="65" y2="30" stroke="#333" stroke-width="0.5"/>
    <text x="35" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Беловежские соглашения</text>
    <text x="35" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#666">08.12.1991</text>
  </g>
  
  <!-- Карта СССР -->
  <g transform="translate(30, 210)">
    <path d="M0,20 Q20,0 50,0 Q80,5 100,15 Q120,10 140,20 Q160,15 180,25 L180,40 Q160,45 140,40 Q120,45 100,40 Q80,45 50,40 Q20,45 0,40 Z" fill="#ffcccc" stroke="#333" stroke-width="1"/>
    <text x="90" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">СССР</text>
    <text x="90" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Распад СССР</text>
  </g>
  
  <!-- График экономических показателей -->
  <g transform="translate(220, 210)">
    <rect x="0" y="0" width="120" height="80" fill="none" stroke="#666" stroke-width="1"/>
    <line x1="0" y1="60" x2="120" y2="60" stroke="#666" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="60" stroke="#666" stroke-width="1"/>
    <polyline points="0,50 20,45 40,40 60,35 80,45 100,50 120,55" fill="none" stroke="#cc0000" stroke-width="2"/>
    <polyline points="0,40 20,35 40,30 60,25 80,30 100,35 120,40" fill="none" stroke="#0066cc" stroke-width="2"/>
    <text x="60" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Экономика</text>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="7" fill="#0066cc">Промышленность</text>
    <text x="10" y="25" font-family="Arial, sans-serif" font-size="7" fill="#cc0000">Сельское хозяйство</text>
  </g>
  
  <!-- Символы перестройки -->
  <g transform="translate(360, 210)">
    <circle cx="30" cy="20" r="18" fill="none" stroke="#ffcc00" stroke-width="2"/>
    <path d="M30,10 L30,30 M20,20 L40,20" stroke="#ffcc00" stroke-width="2"/>
    <text x="30" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Перестройка</text>
  </g>
  
  <!-- Лента времени с ключевыми событиями -->
  <rect x="30" y="295" width="440" height="30" fill="url(#blueGradient)" opacity="0.2"/>
  <text x="50" y="315" font-family="Arial, sans-serif" font-size="9" fill="#333">1985: Горбачёв у власти</text>
  <text x="150" y="315" font-family="Arial, sans-serif" font-size="9" fill="#333">1986: Чернобыль</text>
  <text x="250" y="315" font-family="Arial, sans-serif" font-size="9" fill="#333">1989: Берлинская стена</text>
  <text x="350" y="315" font-family="Arial, sans-serif" font-size="9" fill="#333">1991: Распад СССР</text>
  
  <!-- Дополнительные детали -->
  <circle cx="120" cy="120" r="3" fill="#cc0000"/>
  <circle cx="210" cy="120" r="3" fill="#cc0000"/>
  <circle cx="300" cy="120" r="3" fill="#cc0000"/>
  <circle cx="390" cy="120" r="3" fill="#cc0000"/>
  
  <!-- Линии связи событий -->
  <line x1="78" y1="138" x2="120" y2="138" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="158" y1="138" x2="240" y2="138" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="280" y1="138" x2="300" y2="138" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="340" y1="138" x2="360" y2="138" stroke="#999" stroke-width="0.5" stroke-dasharray="2,2"/>
  
  <!-- Декоративные элементы -->
  <path d="M20,50 Q30,40 40,50" fill="none" stroke="#666" stroke-width="0.5"/>
  <path d="M460,50 Q470,40 480,50" fill="none" stroke="#666" stroke-width="0.5"/>
</svg>