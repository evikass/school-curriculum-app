<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Дефиниции градиентов -->
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d32f2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b71c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whiteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#795548;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="4"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#795548" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#37474f">Гражданская война в России</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#546e7a">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <rect x="440" y="20" width="30" height="20" fill="#1976d2" rx="3"/>
  <text x="455" y="34" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">12</text>
  
  <!-- Карта России -->
  <!-- Красные территории -->
  <path d="M 120,100 L 180,90 L 220,95 L 250,110 L 240,140 L 220,160 L 200,180 L 180,190 L 160,185 L 140,170 L 120,150 L 110,130 L 120,100" 
        fill="url(#redGradient)" stroke="#b71c1c" stroke-width="1"/>
  <text x="170" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Советская Россия</text>
  
  <!-- Белые территории -->
  <path d="M 280,120 L 320,110 L 360,115 L 380,130 L 370,150 L 350,170 L 330,180 L 310,175 L 290,160 L 280,140 L 275,125 L 280,120" 
        fill="url(#whiteGradient)" stroke="#757575" stroke-width="1"/>
  <text x="325" y="150" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#424242">Белое движение</text>
  
  <!-- Территория Колчака -->
  <path d="M 340,80 L 380,70 L 400,85 L 390,110 L 370,125 L 350,120 L 340,100 L 335,85 L 340,80" 
        fill="url(#whiteGradient)" stroke="#757575" stroke-width="1"/>
  <text x="365" y="100" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#424242">Колчак</text>
  
  <!-- Территория Деникина -->
  <path d="M 290,180 L 320,170 L 340,175 L 350,190 L 340,210 L 320,225 L 300,220 L 285,205 L 280,190 L 290,180" 
        fill="url(#whiteGradient)" stroke="#757575" stroke-width="1"/>
  <text x="315" y="200" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#424242">Деникин</text>
  
  <!-- Территория Врангеля -->
  <path d="M 380,200 L 400,190 L 410,205 L 400,220 L 380,225 L 370,210 L 375,195 L 380,200" 
        fill="url(#whiteGradient)" stroke="#757575" stroke-width="1"/>
  <text x="390" y="210" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#424242">Врангель</text>
  
  <!-- Интервенты -->
  <rect x="60" y="80" width="30" height="20" fill="#1976d2" rx="2"/>
  <text x="75" y="94" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Антанта</text>
  
  <rect x="420" y="120" width="30" height="20" fill="#1976d2" rx="2"/>
  <text x="435" y="134" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Германия</text>
  
  <rect x="380" y="160" width="30" height="20" fill="#1976d2" rx="2"/>
  <text x="395" y="174" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Япония</text>
  
  <!-- Хронологическая лента -->
  <rect x="40" y="250" width="420" height="8" fill="#795548" rx="4"/>
  <rect x="40" y="250" width="105" height="8" fill="#d32f2f" rx="4"/>
  <rect x="145" y="250" width="105" height="8" fill="#d32f2f" rx="4"/>
  <rect x="250" y="250" width="105" height="8" fill="#d32f2f" rx="4"/>
  <rect x="355" y="250" width="105" height="8" fill="#d32f2f" rx="4"/>
  
  <!-- Даты на хронологической ленте -->
  <text x="92" y="245" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#37474f">1917</text>
  <text x="197" y="245" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#37474f">1918</text>
  <text x="302" y="245" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#37474f">1919</text>
  <text x="407" y="245" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#37474f">1920</text>
  <text x="457" y="245" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#37474f">1921</text>
  
  <!-- Портреты лидеров -->
  <!-- Ленин -->
  <circle cx="120" cy="120" r="15" fill="#e53935" stroke="#b71c1c" stroke-width="1"/>
  <text x="120" y="124" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Ленин</text>
  
  <!-- Троцкий -->
  <circle cx="150" cy="135" r="15" fill="#e53935" stroke="#b71c1c" stroke-width="1"/>
  <text x="150" y="139" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Троцкий</text>
  
  <!-- Колчак -->
  <circle cx="365" cy="95" r="15" fill="#9e9e9e" stroke="#757575" stroke-width="1"/>
  <text x="365" y="99" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#424242">Колчак</text>
  
  <!-- Деникин -->
  <circle cx="315" cy="195" r="15" fill="#9e9e9e" stroke="#757575" stroke-width="1"/>
  <text x="315" y="199" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#424242">Деникин</text>
  
  <!-- Врангель -->
  <circle cx="390" cy="205" r="15" fill="#9e9e9e" stroke="#757575" stroke-width="1"/>
  <text x="390" y="209" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#424242">Врангель</text>
  
  <!-- График потерь -->
  <rect x="40" y="280" width="120" height="50" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" rx="3"/>
  <text x="100" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#37474f">Потери</text>
  <line x1="50" y1="315" x2="150" y2="315" stroke="#616161" stroke-width="1"/>
  <line x1="50" y1="315" x2="50" y2="305" stroke="#616161" stroke-width="1"/>
  <line x1="75" y1="315" x2="75" y2="305" stroke="#616161" stroke-width="1"/>
  <line x1="100" y1="315" x2="100" y2="305" stroke="#616161" stroke-width="1"/>
  <line x1="125" y1="315" x2="125" y2="305" stroke="#616161" stroke-width="1"/>
  <line x1="150" y1="315" x2="150" y2="305" stroke="#616161" stroke-width="1"/>
  <rect x="50" y="310" width="20" height="5" fill="#d32f2f"/>
  <rect x="75" y="305" width="20" height="10" fill="#d32f2f"/>
  <rect x="100" y="300" width="20" height="15" fill="#d32f2f"/>
  <rect x="125" y="308" width="20" height="7" fill="#d32f2f"/>
  <rect x="150" y="312" width="20" height="3" fill="#d32f2f"/>
  
  <!-- Легенда -->
  <rect x="180" y="280" width="100" height="50" fill="#f5f5f5" stroke="#9e9e9e" stroke-width="1" rx="3"/>
  <text x="230" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#37474f">Легенда</text>
  <rect x="190" y="305" width="15" height="8" fill="url(#redGradient)"/>
  <text x="210" y="312" font-family="Arial, sans-serif" font-size="9" fill="#37474f">Красные</text>
  <rect x="190" y="318" width="15" height="8" fill="url(#whiteGradient)" stroke="#757575" stroke-width="1"/>
  <text x="210" y="325" font-family="Arial, sans-serif" font-size="9" fill="#37474f">Белые</text>
  
  <!-- Информационный блок -->
  <rect x="300" y="280" width="160" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="3"/>
  <text x="380" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1565c0">Ключевые события</text>
  <text x="310" y="310" font-family="Arial, sans-serif" font-size="8" fill="#37474f">• Октябрь 1917 - захват власти</text>
  <text x="310" y="325" font-family="Arial, sans-serif" font-size="8" fill="#37474f">• 1918-1922 - Гражданская война</text>
  
  <!-- Дополнительные элементы декора -->
  <circle cx="30" cy="30" r="3" fill="#1976d2"/>
  <circle cx="470" cy="30" r="3" fill="#1976d2"/>
  <circle cx="30" cy="320" r="3" fill="#1976d2"/>
  <circle cx="470" cy="320" r="3" fill="#1976d2"/>
  
  <!-- Стрелки показывающие направления движения -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#616161"/>
    </marker>
  </defs>
  
  <line x1="120" y1="160" x2="120" y2="190" stroke="#616161" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="140" x2="280" y2="140" stroke="#616161" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="350" y1="120" x2="380" y2="120" stroke="#616161" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <!-- Подписи к стрелкам -->
  <text x="120" y="205" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#616161">южный фронт</text>
  <text x="265" y="135" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#616161">наступление</text>
  <text x="365" y="115" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#616161">восточный фронт</text>
</svg>