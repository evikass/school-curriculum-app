<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8d5b7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d2691e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="url(#frameGrad)" stroke-width="4"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#8b4513" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">Индустриализация в СССР</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="470" y="25" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#8b4513">Урок 8</text>
  
  <!-- График роста промышленности -->
  <g transform="translate(40, 80)">
    <!-- Ось X -->
    <line x1="0" y1="120" x2="200" y2="120" stroke="#2c3e50" stroke-width="2"/>
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="120" stroke="#2c3e50" stroke-width="2"/>
    
    <!-- Подписи осей -->
    <text x="100" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Годы</text>
    <text x="-15" y="60" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50" transform="rotate(-90, -15, 60)">Промышленность</text>
    
    <!-- Деления на оси X -->
    <line x1="0" y1="120" x2="0" y2="125" stroke="#2c3e50" stroke-width="1"/>
    <text x="0" y="130" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">1928</text>
    
    <line x1="50" y1="120" x2="50" y2="125" stroke="#2c3e50" stroke-width="1"/>
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">1932</text>
    
    <line x1="100" y1="120" x2="100" y2="125" stroke="#2c3e50" stroke-width="1"/>
    <text x="100" y="130" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">1937</text>
    
    <line x1="150" y1="120" x2="150" y2="125" stroke="#2c3e50" stroke-width="1"/>
    <text x="150" y="130" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">1941</text>
    
    <line x1="200" y1="120" x2="200" y2="125" stroke="#2c3e50" stroke-width="1"/>
    <text x="200" y="130" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">1945</text>
    
    <!-- График роста -->
    <polyline points="0,100 50,80 100,40 150,20 200,10" fill="none" stroke="url(#chartGrad)" stroke-width="3"/>
    
    <!-- Точки на графике -->
    <circle cx="0" cy="100" r="3" fill="#ff6b6b"/>
    <circle cx="50" cy="80" r="3" fill="#ff6b6b"/>
    <circle cx="100" cy="40" r="3" fill="#ff6b6b"/>
    <circle cx="150" cy="20" r="3" fill="#ff6b6b"/>
    <circle cx="200" cy="10" r="3" fill="#ff6b6b"/>
    
    <!-- Подпись графика -->
    <text x="100" y="-10" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50" font-weight="bold">Рост промышленности</text>
  </g>
  
  <!-- Хронологическая лента -->
  <g transform="translate(260, 70)">
    <rect x="0" y="0" width="200" height="140" fill="#f0f0f0" stroke="#8b4513" stroke-width="1" rx="5"/>
    
    <!-- Пятилетки -->
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50" font-weight="bold">Пятилетки</text>
    
    <!-- Первая пятилетка -->
    <rect x="10" y="30" width="180" height="15" fill="#ffcccb" stroke="#8b4513" stroke-width="1"/>
    <text x="100" y="41" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">I пятилетка: 1928-1932</text>
    
    <!-- Вторая пятилетка -->
    <rect x="10" y="50" width="180" height="15" fill="#add8e6" stroke="#8b4513" stroke-width="1"/>
    <text x="100" y="61" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">II пятилетка: 1933-1937</text>
    
    <!-- Третья пятилетка -->
    <rect x="10" y="70" width="180" height="15" fill="#98fb98" stroke="#8b4513" stroke-width="1"/>
    <text x="100" y="81" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">III пятилетка: 1938-1941</text>
    
    <!-- Ключевые события -->
    <text x="100" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50" font-weight="bold">Ключевые события</text>
    <text x="10" y="120" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">• Днепрогэс: 1932</text>
    <text x="10" y="132" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">• Магнитка: 1932</text>
  </g>
  
  <!-- Днепрогэс -->
  <g transform="translate(40, 230)">
    <rect x="0" y="0" width="150" height="80" fill="#e6f2ff" stroke="#4682b4" stroke-width="2" rx="5"/>
    
    <!-- Схема Днепрогэса -->
    <rect x="20" y="20" width="110" height="35" fill="#4682b4" rx="3"/>
    <rect x="30" y="10" width="90" height="15" fill="#5f9ea0" rx="3"/>
    
    <!-- Турбины -->
    <circle cx="50" cy="37" r="8" fill="#2c3e50"/>
    <circle cx="75" cy="37" r="8" fill="#2c3e50"/>
    <circle cx="100" cy="37" r="8" fill="#2c3e50"/>
    
    <!-- Подпись -->
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50" font-weight="bold">Днепрогэс</text>
    <text x="75" y="75" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Великая стройка</text>
  </g>
  
  <!-- Магнитка -->
  <g transform="translate(210, 230)">
    <rect x="0" y="0" width="150" height="80" fill="#fff0f5" stroke="#cd5c5c" stroke-width="2" rx="5"/>
    
    <!-- Схема завода -->
    <rect x="20" y="20" width="110" height="15" fill="#cd5c5c"/>
    <rect x="30" y="40" width="90" height="15" fill="#dc143c"/>
    <rect x="40" y="60" width="70" height="15" fill="#b22222"/>
    
    <!-- Дымовая труба -->
    <rect x="120" y="10" width="10" height="30" fill="#2c3e50"/>
    <ellipse cx="125" cy="10" rx="8" ry="3" fill="#2c3e50"/>
    
    <!-- Подпись -->
    <text x="75" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50" font-weight="bold">Магнитогорский</text>
    <text x="75" y="75" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">металлургический комбинат</text>
  </g>
  
  <!-- Стахановское движение -->
  <g transform="translate(380, 230)">
    <rect x="0" y="0" width="100" height="80" fill="#f0fff0" stroke="#228b22" stroke-width="2" rx="5"/>
    
    <!-- Портрет Стаханова -->
    <circle cx="50" cy="25" r="12" fill="#fdbcb4"/>
    <rect x="40" y="35" width="20" height="25" fill="#4682b4"/>
    <rect x="35" y="35" width="30" height="5" fill="#2c3e50"/>
    
    <!-- Формула -->
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50" font-weight="bold">7 тонн/смена</text>
    <text x="50" y="80" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Норма: 1 тонна</text>
    
    <!-- Подпись -->
    <text x="50" y="90" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Стаханов А.Г.</text>
  </g>
  
  <!-- Карта СССР -->
  <g transform="translate(30, 320)">
    <rect x="0" y="0" width="440" height="20" fill="#f5f5dc" stroke="#8b4513" stroke-width="1"/>
    
    <!-- Упрощенная карта -->
    <path d="M10,10 L50,8 L100,12 L150,10 L200,14 L250,12 L300,10 L350,12 L400,10 L430,11" 
          fill="none" stroke="#4682b4" stroke-width="2"/>
    
    <!-- Метки -->
    <circle cx="50" cy="10" r="3" fill="#ff6b6b"/>
    <text x="50" y="5" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Днепр</text>
    
    <circle cx="150" cy="10" r="3" fill="#ff6b6b"/>
    <text x="150" y="5" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Урал</text>
    
    <circle cx="250" cy="12" r="3" fill="#ff6b6b"/>
    <text x="250" y="7" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Магнитка</text>
  </g>
  
  <!-- Даты -->
  <text x="450" y="335" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#8b4513">1928-1941</text>
</svg>