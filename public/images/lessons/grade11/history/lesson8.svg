<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#8B4513" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#D2691E" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2C3E50">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#34495E">Урок 15: Брестский мир</text>
  <text x="450" y="25" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#7F8C8D">№15</text>
  
  <!-- Карта территориальных потерь -->
  <g id="territorial-map">
    <rect x="40" y="70" width="180" height="140" fill="#E8F4F8" stroke="#34495E" stroke-width="2" rx="5"/>
    <text x="130" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C3E50">Территориальные потери</text>
    
    <!-- Карта до -->
    <rect x="50" y="100" width="75" height="100" fill="#AED6F1" stroke="#2874A6" stroke-width="1"/>
    <text x="87.5" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1B4F72">До Брестского мира</text>
    
    <!-- Карта после -->
    <rect x="130" y="100" width="40" height="100" fill="#FADBD8" stroke="#C0392B" stroke-width="1"/>
    <text x="150" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#922B21">После</text>
    
    <!-- Потерянные территории -->
    <rect x="175" y="100" width="35" height="100" fill="#F5B7B1" stroke="#C0392B" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="192.5" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#922B21">1 млн км²</text>
  </g>
  
  <!-- Даты -->
  <g id="dates">
    <rect x="40" y="220" width="180" height="60" fill="#FDF2E9" stroke="#E67E22" stroke-width="1" rx="5"/>
    <text x="130" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#D35400">Хронология</text>
    <text x="60" y="260" font-family="Arial, sans-serif" font-size="11" fill="#7E5109">22.12.1917 - Начало переговоров</text>
    <text x="60" y="275" font-family="Arial, sans-serif" font-size="11" fill="#7E5109">03.03.1918 - Подписание договора</text>
  </g>
  
  <!-- Демонстрация делегаций -->
  <g id="delegations">
    <rect x="240" y="70" width="220" height="210" fill="#F8E9D2" stroke="#B7950B" stroke-width="2" rx="5"/>
    <text x="350" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#7D6608">Делегации за столом переговоров</text>
    
    <!-- Стол переговоров -->
    <ellipse cx="350" cy="180" rx="80" ry="30" fill="#8B6F47" stroke="#654321" stroke-width="2"/>
    
    <!-- Советская делегация -->
    <g id="soviet-delegation">
      <rect x="250" y="130" width="60" height="40" fill="#EC7063" stroke="#A93226" stroke-width="1" rx="3"/>
      <circle cx="280" cy="150" r="8" fill="#FADBD8"/>
      <text x="280" y="195" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7B241C">Советская делегация</text>
      <text x="280" y="210" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#7B241C">Троцкий, Каменев</text>
    </g>
    
    <!-- Немецкая делегация -->
    <g id="german-delegation">
      <rect x="390" y="130" width="60" height="40" fill="#5DADE2" stroke="#2874A6" stroke-width="1" rx="3"/>
      <circle cx="420" cy="150" r="8" fill="#EBF5FB"/>
      <text x="420" y="195" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#1B4F72">Немецкая делегация</text>
      <text x="420" y="210" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#1B4F72">Гофман, Кюльман</text>
    </g>
  </g>
  
  <!-- График потерь -->
  <g id="losses-chart">
    <rect x="40" y="290" width="420" height="40" fill="#EBF5FB" stroke="#2874A6" stroke-width="1" rx="3"/>
    <text x="250" y="305" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#1B4F72">Территориальные потери России</text>
    <rect x="80" y="310" width="60" height="15" fill="#E74C3C"/>
    <text x="110" y="322" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#922B21">Польша</text>
    <rect x="150" y="310" width="50" height="15" fill="#E67E22"/>
    <text x="175" y="322" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#BA6317">Прибалтика</text>
    <rect x="220" y="310" width="40" height="15" fill="#F39C12"/>
    <text x="240" y="322" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#BA6317">Украина</text>
    <rect x="270" y="310" width="35" height="15" fill="#27AE60"/>
    <text x="287.5" y="322" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#1E8449">Белоруссия</text>
    <rect x="315" y="310" width="30" height="15" fill="#3498DB"/>
    <text x="330" y="322" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#21618C">Кавказ</text>
    <rect x="365" y="310" width="25" height="15" fill="#9B59B6"/>
    <text x="377.5" y="322" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#6C3483">Финляндия</text>
    <rect x="410" y="310" width="35" height="15" fill="#E74C3C"/>
    <text x="427.5" y="322" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#922B21">Итого: 1 млн км²</text>
  </g>
  
  <!-- Декоративные элементы -->
  <g id="decorative">
    <!-- Геральдический элемент слева -->
    <path d="M20,20 L30,10 L40,20 L30,30 Z" fill="none" stroke="#8B4513" stroke-width="1"/>
    <path d="M20,330 L30,320 L40,330 L30,340 Z" fill="none" stroke="#8B4513" stroke-width="1"/>
    
    <!-- Геральдический элемент справа -->
    <path d="M460,20 L470,10 L480,20 L470,30 Z" fill="none" stroke="#8B4513" stroke-width="1"/>
    <path d="M460,330 L470,320 L480,330 L470,340 Z" fill="none" stroke="#8B4513" stroke-width="1"/>
    
    <!-- Временная шкала -->
    <line x1="60" y1="200" x2="200" y2="200" stroke="#7E5109" stroke-width="2"/>
    <circle cx="80" cy="200" r="4" fill="#E67E22"/>
    <circle cx="130" cy="200" r="4" fill="#E67E22"/>
    <circle cx="180" cy="200" r="4" fill="#E67E22"/>
  </g>
  
  <!-- Формула -->
  <g id="formula">
    <rect x="240" y="240" width="200" height="30" fill="#E8F8F5" stroke="#16A085" stroke-width="1" rx="3"/>
    <text x="340" y="260" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#0E6655">Потеря: 1 000 000 км²</text>
  </g>
</svg>