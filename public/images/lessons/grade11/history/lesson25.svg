<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f4e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8dcc6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d2691e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc143c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="6"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#8b4513" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Эпоха застоя</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495e">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="470" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Урок 15</text>
  
  <!-- Портрет Брежнева -->
  <g transform="translate(30, 70)">
    <circle cx="35" cy="35" r="30" fill="#f0d9b5"/>
    <circle cx="35" cy="30" r="12" fill="#e8c9a0"/>
    <path d="M35,45 C25,45 20,55 20,60 L50,60 C50,55 45,45 35,45" fill="#e8c9a0"/>
    <rect x="20" y="20" width="30" height="25" fill="#2c3e50" rx="2"/>
    <text x="35" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Л.И. Брежнев</text>
  </g>
  
  <!-- Хронологическая лента -->
  <rect x="100" y="75" width="380" height="40" fill="#34495e" rx="20"/>
  <text x="120" y="95" font-family="Arial, sans-serif" font-size="11" fill="white">1965</text>
  <text x="200" y="95" font-family="Arial, sans-serif" font-size="11" fill="white">1970</text>
  <text x="280" y="95" font-family="Arial, sans-serif" font-size="11" fill="white">1975</text>
  <text x="360" y="95" font-family="Arial, sans-serif" font-size="11" fill="white">1980</text>
  <text x="440" y="95" font-family="Arial, sans-serif" font-size="11" fill="white">1985</text>
  
  <!-- События на ленте -->
  <circle cx="120" cy="95" r="8" fill="url(#redGrad)"/>
  <text x="120" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Косыгинская</text>
  <text x="120" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">реформа</text>
  
  <circle cx="240" cy="95" r="8" fill="#2980b9"/>
  <text x="240" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Конституция</text>
  <text x="240" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">СССР 1977</text>
  
  <circle cx="380" cy="95" r="8" fill="#27ae60"/>
  <text x="380" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Олимпиада</text>
  <text x="380" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1980</text>
  
  <circle cx="440" cy="95" r="8" fill="#e74c3c"/>
  <text x="440" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Афганистан</text>
  <text x="440" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">1979-1989</text>
  
  <!-- Карта Афганистана -->
  <g transform="translate(30, 160)">
    <rect x="0" y="0" width="120" height="80" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <path d="M30,20 L50,15 L70,25 L80,40 L70,60 L50,70 L30,65 L20,45 Z" fill="#e74c3c" opacity="0.7"/>
    <text x="60" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Карта Афганистана</text>
    <text x="60" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">1979-1989</text>
  </g>
  
  <!-- График экономики -->
  <g transform="translate(170, 160)">
    <rect x="0" y="0" width="150" height="100" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <line x1="10" y1="90" x2="140" y2="90" stroke="#34495e" stroke-width="1"/>
    <line x1="10" y1="10" x2="10" y2="90" stroke="#34495e" stroke-width="1"/>
    <path d="M10,80 L30,75 L50,78 L70,80 L90,82 L110,85 L130,88 L140,90" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <text x="75" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Темпы роста ВВП</text>
    <text x="15" y="15" font-family="Arial, sans-serif" font-size="8" fill="#7f8c8d">%</text>
  </g>
  
  <!-- Олимпийские кольца -->
  <g transform="translate(340, 160)">
    <circle cx="20" cy="20" r="15" fill="none" stroke="#0085c3" stroke-width="3"/>
    <circle cx="40" cy="20" r="15" fill="none" stroke="#000000" stroke-width="3"/>
    <circle cx="60" cy="20" r="15" fill="none" stroke="#df0024" stroke-width="3"/>
    <circle cx="30" cy="35" r="15" fill="none" stroke="#f4c300" stroke-width="3"/>
    <circle cx="50" cy="35" r="15" fill="none" stroke="#009f3d" stroke-width="3"/>
    <text x="40" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Олимпиада-80</text>
    <text x="40" y="77" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">Москва</text>
  </g>
  
  <!-- Формула Косыгинской реформы -->
  <g transform="translate(30, 270)">
    <rect x="0" y="0" width="200" height="60" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Реформа 1965 г.</text>
    <text x="100" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Прибыль = Доходы - Затраты</text>
  </g>
  
  <!-- Статистика -->
  <g transform="translate(250, 270)">
    <rect x="0" y="0" width="220" height="60" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="110" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Экономическая статистика</text>
    <text x="20" y="40" font-family="Arial, sans-serif" font-size="10" fill="#34495e">ВВП на душу: 6 055 $</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Инфляция: 0.1% (1970-1980)</text>
    <text x="130" y="40" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Промышленность: +4.8%</text>
    <text x="130" y="55" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Сельское хозяйство: +1.9%</text>
  </g>
  
  <!-- Декоративный элемент -->
  <g transform="translate(30, 60)">
    <path d="M0,0 L5,5 L0,10 L-5,5 Z" fill="#d2691e"/>
  </g>
  <g transform="translate(470, 60)">
    <path d="M0,0 L5,5 L0,10 L-5,5 Z" fill="#d2691e"/>
  </g>
  
  <!-- Легенда -->
  <g transform="translate(200, 200)">
    <rect x="0" y="0" width="100" height="50" fill="#f8f4e6" stroke="#8b4513" stroke-width="1" rx="3"/>
    <text x="50" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">Ключевые события:</text>
    <circle cx="10" cy="25" r="3" fill="#e74c3c"/>
    <text x="20" y="29" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Военные</text>
    <circle cx="10" cy="37" r="3" fill="#2980b9"/>
    <text x="20" y="41" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Политика</text>
    <circle cx="60" cy="25" r="3" fill="#27ae60"/>
    <text x="70" y="29" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Спорт</text>
    <circle cx="60" cy="37" r="3" fill="#f39c12"/>
    <text x="70" y="41" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Экономика</text>
  </g>
</svg>