<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5fb4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3584e4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c01c28;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e01b24;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#26a269;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ec27e;stop-opacity:1" />
    </linearGradient>
    
    <!-- Узор для фона -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#d4d4d4" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#1a5fb4" stroke-width="3" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3584e4" stroke-width="1" rx="3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a5fb4">Россия 1990-х</text>
  <text x="250" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3584e4">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <rect x="440" y="15" width="40" height="25" fill="url(#blueGrad)" rx="3"/>
  <text x="460" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Урок 15</text>
  
  <!-- Хронологическая линия -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#1a5fb4" stroke-width="2"/>
  <circle cx="100" cy="80" r="5" fill="#1a5fb4"/>
  <circle cx="200" cy="80" r="5" fill="#1a5fb4"/>
  <circle cx="300" cy="80" r="5" fill="#1a5fb4"/>
  <circle cx="400" cy="80" r="5" fill="#1a5fb4"/>
  
  <!-- Даты на хронологической линии -->
  <text x="100" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a5fb4">1991</text>
  <text x="200" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a5fb4">1992</text>
  <text x="300" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a5fb4">1993</text>
  <text x="400" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a5fb4">1998</text>
  
  <!-- Портрет Ельцина -->
  <ellipse cx="100" cy="150" rx="35" ry="45" fill="#f2f2f2"/>
  <circle cx="100" cy="135" r="15" fill="#f2f2f2"/>
  <path d="M70,170 Q100,160 130,170 L125,185 L75,185 Z" fill="#f2f2f2"/>
  <path d="M85,130 Q90,125 95,125 Q100,125 105,125 Q110,125 115,130" fill="none" stroke="#333" stroke-width="1"/>
  <circle cx="90" cy="135" r="2" fill="#333"/>
  <circle cx="110" cy="135" r="2" fill="#333"/>
  <text x="100" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Б.Н. Ельцин</text>
  
  <!-- Шоковая терапия 1992 -->
  <rect x="170" y="120" width="60" height="80" fill="#fff5f5" stroke="#e01b24" stroke-width="1" rx="3"/>
  <text x="200" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c01c28">Шоковая</text>
  <text x="200" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#c01c28">терапия</text>
  <text x="200" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c01c28">1992</text>
  
  <!-- График шоковой терапии -->
  <line x1="180" y1="185" x2="220" y2="185" stroke="#333" stroke-width="1"/>
  <line x1="180" y2="185" x2="180" y2="170" stroke="#333" stroke-width="1"/>
  <polyline points="180,180 185,175 190,173 195,172 200,171 205,172 210,173 215,175 220,180" fill="none" stroke="#c01c28" stroke-width="2"/>
  <text x="200" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Инфляция</text>
  
  <!-- Ваучер -->
  <rect x="280" y="120" width="60" height="80" fill="#f5f5ff" stroke="#3584e4" stroke-width="1" rx="3"/>
  <rect x="290" y="130" width="40" height="10" fill="url(#blueGrad)" rx="2"/>
  <text x="310" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">ВАУЧЕР</text>
  <text x="310" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">10000 руб.</text>
  <text x="310" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Приватизация</text>
  <circle cx="310" cy="180" r="3" fill="#3584e4"/>
  
  <!-- Конституция 1993 -->
  <rect x="170" y="220" width="60" height="60" fill="#f0fff4" stroke="#26a269" stroke-width="1" rx="3"/>
  <rect x="180" y="230" width="40" height="5" fill="#26a269"/>
  <rect x="180" y="238" width="40" height="5" fill="#26a269"/>
  <rect x="180" y="246" width="40" height="5" fill="#26a269"/>
  <rect x="180" y="254" width="40" height="5" fill="#26a269"/>
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#26a269">Конституция</text>
  <text x="200" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#26a269">1993</text>
  
  <!-- Чечня -->
  <polygon points="380,220 420,220 440,250 420,280 380,280 360,250" fill="#fff5f5" stroke="#e01b24" stroke-width="1"/>
  <path d="M390,240 L400,240 L400,250 L390,250 Z" fill="#e01b24"/>
  <path d="M410,240 L420,240 L420,250 L410,250 Z" fill="#e01b24"/>
  <path d="M385,260 L415,260" stroke="#e01b24" stroke-width="2"/>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c01c28">Чечня</text>
  
  <!-- Дефолт 1998 -->
  <rect x="280" y="220" width="60" height="60" fill="#fff5f5" stroke="#c01c28" stroke-width="1" rx="3"/>
  <text x="310" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c01c28">ДЕФОЛТ</text>
  <text x="310" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#c01c28">17.08.1998</text>
  
  <!-- График дефолта -->
  <line x1="290" y1="270" x2="330" y2="270" stroke="#333" stroke-width="1"/>
  <line x1="290" y2="270" x2="290" y2="255" stroke="#333" stroke-width="1"/>
  <polyline points="290,260 295,258 300,256 305,255 310,255 315,256 320,258 325,260 330,265" fill="none" stroke="#c01c28" stroke-width="2"/>
  <text x="310" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Курс рубля</text>
  
  <!-- Карта России -->
  <rect x="360" y="120" width="80" height="100" fill="#f5f5f5" stroke="#666" stroke-width="1" rx="3"/>
  <path d="M370,140 Q380,130 390,135 Q400,140 410,135 Q420,140 430,145 L430,160 Q420,165 410,160 Q400,165 390,160 Q380,165 370,160 Z" fill="#e0e0e0"/>
  <path d="M375,170 Q385,165 395,170 Q405,165 415,170 Q425,165 435,170 L435,185 Q425,190 415,185 Q405,190 395,185 Q385,190 375,185 Z" fill="#d0d0d0"/>
  <circle cx="400" cy="145" r="3" fill="#c01c28"/>
  <text x="400" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#333">Карта России</text>
  
  <!-- Формула шоковой терапии -->
  <rect x="50" y="300" width="120" height="30" fill="#fff" stroke="#3584e4" stroke-width="1" rx="3"/>
  <text x="110" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Цены = 100%</text>
  
  <!-- Статистика приватизации -->
  <rect x="340" y="300" width="100" height="30" fill="#fff" stroke="#26a269" stroke-width="1" rx="3"/>
  <text x="390" y="318" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">Приватизация: 25%</text>
  
  <!-- Декоративные элементы -->
  <path d="M30,20 Q40,10 50,20" fill="none" stroke="#3584e4" stroke-width="1" opacity="0.5"/>
  <path d="M450,20 Q460,10 470,20" fill="none" stroke="#3584e4" stroke-width="1" opacity="0.5"/>
  
  <!-- Фоновый узор -->
  <rect x="0" y="0" width="500" height="350" fill="url(#dots)" opacity="0.3"/>
  
  <!-- Подписи к событиям -->
  <line x1="100" y1="195" x2="100" y2="210" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="100" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Президент РФ</text>
  
  <line x1="200" y1="200" x2="200" y2="215" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="200" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Экономические</text>
  <text x="200" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">реформы</text>
  
  <line x1="310" y1="200" x2="310" y2="215" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="310" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">Массовая</text>
  <text x="310" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#333">приватизация</text>
  
  <!-- Ключевые события -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1a5fb4">Ключевые события 1990-х:</text>
  
  <!-- Связующие линии -->
  <line x1="135" y1="150" x2="170" y2="160" stroke="#666" stroke-width="1" opacity="0.5"/>
  <line x1="230" y1="160" x2="280" y2="160" stroke="#666" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="200" x2="200" y2="220" stroke="#666" stroke-width="1" opacity="0.5"/>
  <line x1="340" y1="160" x2="380" y2="220" stroke="#666" stroke-width="1" opacity="0.5"/>
  <line x1="230" y1="250" x2="280" y2="250" stroke="#666" stroke-width="1" opacity="0.5"/>
</svg>