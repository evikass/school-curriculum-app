<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Определение производной. Физический и геометрический смысл</text>
  <!-- Curve -->
  <path d="M 60 260 Q 120 80, 180 160 Q 240 240, 300 120 Q 360 0, 440 100" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <!-- Points on curve -->
  <circle cx="180" cy="160" r="5" fill="#0D47A1"/>
  <circle cx="260" cy="178" r="5" fill="#42A5F5"/>
  <!-- Secant line -->
  <line x1="140" y1="200" x2="300" y2="155" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- Tangent line at M -->
  <line x1="100" y1="250" x2="280" y2="80" stroke="#0D47A1" stroke-width="2"/>
  <!-- Delta-x bracket -->
  <line x1="180" y1="170" x2="260" y2="170" stroke="#E65100" stroke-width="1.5"/>
  <text x="220" y="185" text-anchor="middle" fill="#E65100" font-size="11" font-weight="bold">Δx</text>
  <!-- Delta-f vertical -->
  <line x1="260" y1="170" x2="260" y2="178" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="275" y="178" text-anchor="start" fill="#2E7D32" font-size="10" font-weight="bold">Δf</text>
  <!-- Labels -->
  <text x="175" y="155" text-anchor="end" fill="#0D47A1" font-size="11" font-weight="bold">M</text>
  <text x="265" y="173" text-anchor="start" fill="#42A5F5" font-size="11" font-weight="bold">N</text>
  <!-- White card - Definition -->
  <rect x="20" y="52" width="200" height="60" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="120" y="72" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Определение</text>
  <text x="120" y="88" text-anchor="middle" fill="#1565C0" font-size="10">f'(x)=lim Δf/Δx</text>
  <text x="120" y="103" text-anchor="middle" fill="#42A5F5" font-size="9">Δx→0</text>
  <!-- White card - Physical meaning -->
  <rect x="280" y="52" width="200" height="60" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="380" y="72" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Физический смысл</text>
  <text x="380" y="88" text-anchor="middle" fill="#1565C0" font-size="10">v(t) = s'(t)</text>
  <text x="380" y="103" text-anchor="middle" fill="#42A5F5" font-size="9">мгновенная скорость</text>
  <!-- Pill: geometric meaning -->
  <rect x="30" y="290" width="160" height="24" rx="12" fill="#1976D2"/>
  <text x="110" y="306" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Геом.: f'(a) = tg α</text>
  <!-- Pill: differentiability -->
  <rect x="210" y="290" width="170" height="24" rx="12" fill="#42A5F5"/>
  <text x="295" y="306" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Диффер. ⟹ Непрерыв.</text>
  <!-- Connecting lines from cards to curve -->
  <line x1="120" y1="112" x2="150" y2="195" stroke="#90CAF9" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="380" y1="112" x2="300" y2="140" stroke="#90CAF9" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Секущая → Касательная при Δx → 0</text>
</svg>