<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#3498db" stroke-width="1"/>
  
  <!-- Заголовок и класс -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" font-weight="bold" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" font-weight="bold" fill="#1a237e">Урок 7: Предел функции. Непрерывность</text>
  
  <!-- Номер урока в углу -->
  <circle cx="45" cy="45" r="15" fill="#3498db"/>
  <text x="45" y="50" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">7</text>
  
  <!-- Система координат -->
  <line x1="80" y1="280" x2="420" y2="280" stroke="#34495e" stroke-width="2"/>
  <line x1="80" y1="280" x2="80" y2="100" stroke="#34495e" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="420,280 410,275 410,285" fill="#34495e"/>
  <polygon points="80,100 75,110 85,110" fill="#34495e"/>
  
  <!-- Подписи осей -->
  <text x="430" y="285" font-family="Arial, sans-serif" font-size="12" fill="#34495e">x</text>
  <text x="75" y="95" font-family="Arial, sans-serif" font-size="12" fill="#34495e">y</text>
  
  <!-- Деления на оси x -->
  <line x1="140" y1="275" x2="140" y2="285" stroke="#34495e" stroke-width="1"/>
  <line x1="200" y1="275" x2="200" y2="285" stroke="#34495e" stroke-width="1"/>
  <line x1="260" y1="275" x2="260" y2="285" stroke="#34495e" stroke-width="1"/>
  <line x1="320" y1="275" x2="320" y2="285" stroke="#34495e" stroke-width="1"/>
  <line x1="380" y1="275" x2="380" y2="285" stroke="#34495e" stroke-width="1"/>
  
  <!-- Деления на оси y -->
  <line x1="75" y1="240" x2="85" y2="240" stroke="#34495e" stroke-width="1"/>
  <line x1="75" y1="200" x2="85" y2="200" stroke="#34495e" stroke-width="1"/>
  <line x1="75" y1="160" x2="85" y2="160" stroke="#34495e" stroke-width="1"/>
  <line x1="75" y1="120" x2="85" y2="120" stroke="#34495e" stroke-width="1"/>
  
  <!-- Подписи делений -->
  <text x="140" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">-2</text>
  <text x="200" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">-1</text>
  <text x="260" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">0</text>
  <text x="320" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">1</text>
  <text x="380" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">2</text>
  
  <text x="65" y="245" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#34495e">1</text>
  <text x="65" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#34495e">2</text>
  <text x="65" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#34495e">3</text>
  <text x="65" y="125" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#34495e">4</text>
  
  <!-- График функции y = 1/x -->
  <path d="M 100,240 Q 120,220 140,200 T 180,160 Q 200,140 220,130 T 260,120 Q 280,118 300,125 T 340,150 Q 360,170 380,210 T 420,280" 
        fill="none" stroke="#e74c3c" stroke-width="2"/>
  
  <!-- Точка разрыва -->
  <circle cx="260" cy="280" r="4" fill="#e74c3c"/>
  <text x="260" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e74c3c">x=0</text>
  
  <!-- Указатели для пределов -->
  <line x1="120" y1="220" x2="120" y2="210" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="400" y1="220" x2="400" y2="210" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
  
  <!-- Значения пределов -->
  <text x="120" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3498db">lim -∞</text>
  <text x="400" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3498db">lim +∞</text>
  
  <!-- Формула определения предела -->
  <rect x="30" y="305" width="140" height="25" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="3"/>
  <text x="100" y="322" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">lim f(x)=A</text>
  
  <!-- Свойства пределов -->
  <rect x="180" y="305" width="140" height="25" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="3"/>
  <text x="250" y="322" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">Сумма, произведение</text>
  
  <!-- Непрерывность -->
  <rect x="330" y="305" width="140" height="25" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="3"/>
  <text x="400" y="322" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">Непрерывность</text>
  
  <!-- Указатели на точки -->
  <circle cx="140" cy="200" r="3" fill="#3498db"/>
  <circle cx="380" cy="210" r="3" fill="#3498db"/>
  
  <!-- Легенда -->
  <rect x="340" y="100" width="140" height="80" fill="#f8f9fa" stroke="#95a5a6" stroke-width="1" rx="5"/>
  <text x="410" y="120" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" font-weight="bold" fill="#2c3e50">Легенда</text>
  
  <line x1="350" y1="135" x2="370" y2="135" stroke="#e74c3c" stroke-width="2"/>
  <text x="375" y="139" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">f(x) = 1/x</text>
  
  <line x1="350" y1="155" x2="370" y2="155" stroke="#3498db" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="375" y="159" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Предел</text>
  
  <!-- Пример непрерывной функции -->
  <path d="M 90,240 Q 130,230 170,220 T 250,200 Q 290,190 330,180 T 410,160" 
        fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Точки на непрерывной функции -->
  <circle cx="170" cy="220" r="3" fill="#27ae60"/>
  <circle cx="250" cy="200" r="3" fill="#27ae60"/>
  <circle cx="330" cy="180" r="3" fill="#27ae60"/>
  <text x="170" y="210" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#27ae60">a</text>
  <text x="250" y="190" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#27ae60">b</text>
  <text x="330" y="170" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#27ae60">c</text>
  
  <!-- Подпись для непрерывной функции -->
  <text x="90" y="230" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">g(x) = непрерывная</text>
  
  <!-- Определение непрерывности -->
  <rect x="20" y="90" width="160" height="60" fill="#fffde7" stroke="#f9a825" stroke-width="1" rx="5"/>
  <text x="100" y="110" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" font-weight="bold" fill="#f57f17">Непрерывность в точке</text>
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#f57f17">f(x) непрерывна в точке x₀,</text>
  <text x="100" y="140" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#f57f17">если lim f(x)=f(x₀)</text>
  
  <!-- Градиент для заголовка -->
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3949ab;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративные элементы -->
  <circle cx="480" cy="330" r="8" fill="#3498db" opacity="0.3"/>
  <circle cx="470" cy="340" r="5" fill="#e74c3c" opacity="0.3"/>
  <circle cx="490" cy="340" r="6" fill="#27ae60" opacity="0.3"/>
  
  <!-- Указатель на точку разрыва -->
  <line x1="260" y1="280" x2="260" y2="260" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  
  <!-- Стрелка -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
  
  <!-- Примеры пределов -->
  <text x="90" y="260" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Примеры:</text>
  <text x="90" y="275" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">lim x→0 (1/x) - не существует</text>
  <text x="90" y="290" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">lim x→1 (x²+1) = 2</text>
</svg>