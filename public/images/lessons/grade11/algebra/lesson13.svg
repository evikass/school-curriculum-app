<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="3" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3498db">Урок 13: Наибольшее и наименьшее значения функции</text>
  
  <!-- Номер урока в углу -->
  <rect x="420" y="15" width="60" height="25" fill="#3498db" rx="3"/>
  <text x="450" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">№13</text>
  
  <!-- Система координат -->
  <g transform="translate(100, 200)">
    <!-- Ось X -->
    <line x1="0" y1="0" x2="280" y2="0" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="-120" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Стрелки -->
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
      </marker>
    </defs>
    
    <!-- Шкала X -->
    <g font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">
      <line x1="70" y1="-3" x2="70" y2="3" stroke="#2c3e50"/>
      <text x="70" y="18" text-anchor="middle">a</text>
      
      <line x1="140" y1="-3" x2="140" y2="3" stroke="#2c3e50"/>
      <text x="140" y="18" text-anchor="middle">c</text>
      
      <line x1="210" y1="-3" x2="210" y2="3" stroke="#2c3e50"/>
      <text x="210" y="18" text-anchor="middle">b</text>
      
      <text x="280" y="18" text-anchor="middle">x</text>
    </g>
    
    <!-- Шкала Y -->
    <g font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">
      <line x1="-3" y1="-30" x2="3" y2="-30" stroke="#2c3e50"/>
      <text x="-15" y="-27" text-anchor="end">y₁</text>
      
      <line x1="-3" y1="-60" x2="3" y2="-60" stroke="#2c3e50"/>
      <text x="-15" y="-57" text-anchor="end">y₂</text>
      
      <line x1="-3" y1="-90" x2="3" y2="-90" stroke="#2c3e50"/>
      <text x="-15" y="-87" text-anchor="end">y₃</text>
      
      <text x="-15" y="5" text-anchor="end">y</text>
    </g>
    
    <!-- График функции f(x) -->
    <path d="M0,-20 Q35,-40 70,-60 T140,-80 Q175,-85 210,-70 T280,-40" 
          fill="none" stroke="#e74c3c" stroke-width="3"/>
    
    <!-- Точки экстремума -->
    <circle cx="70" cy="-60" r="5" fill="#e74c3c"/>
    <circle cx="210" cy="-70" r="5" fill="#e74c3c"/>
    
    <!-- Точки на концах отрезка -->
    <circle cx="0" cy="-20" r="5" fill="#3498db"/>
    <circle cx="280" cy="-40" r="5" fill="#3498db"/>
    
    <!-- Подписи точек -->
    <text x="0" y="-30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">f(a)</text>
    <text x="70" y="-70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">f(x₁)</text>
    <text x="210" y="-80" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">f(x₂)</text>
    <text x="280" y="-50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">f(b)</text>
    
    <!-- Подпись функции -->
    <text x="140" y="-100" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">f(x)</text>
  </g>
  
  <!-- Формула нахождения экстремумов -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="400" height="40" fill="#ecf0f1" stroke="#bdc3c7" rx="5"/>
    <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
      max{f(a), f(b), f(x₁), f(x₂), ..., f(xₙ)} = M (максимум)
    </text>
  </g>
  
  <!-- Пояснение к графику -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="150" height="80" fill="#f8f9fa" stroke="#dee2e6" rx="5"/>
    <text x="75" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Отрезок [a, b]</text>
    <text x="75" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#495057">Точки экстремума:</text>
    <text x="75" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#495057">x₁, x₂ - критические</text>
  </g>
  
  <!-- Пример задачи -->
  <g transform="translate(320, 80)">
    <rect x="0" y="0" width="170" height="100" fill="#e8f4f8" stroke="#3498db" rx="5"/>
    <text x="85" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Задача оптимизации</text>
    <text x="85" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Найти минимальный</text>
    <text x="85" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">периметр прямоугольника</text>
    <text x="85" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">с площадью 16 см²</text>
    <text x="85" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#34495e">P = 2(x + 16/x)</text>
  </g>
  
  <!-- Алгоритм решения -->
  <g transform="translate(320, 200)">
    <rect x="0" y="0" width="170" height="90" fill="#f8f9fa" stroke="#27ae60" rx="5"/>
    <text x="85" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Алгоритм</text>
    <text x="85" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">1. Найти производную</text>
    <text x="85" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">2. Найти критические точки</text>
    <text x="85" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">3. Вычислить значения</text>
    <text x="85" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">в точках и на концах</text>
  </g>
  
  <!-- Декоративные элементы -->
  <g transform="translate(20, 50)">
    <circle cx="0" cy="0" r="3" fill="#3498db" opacity="0.7"/>
    <circle cx="5" cy="3" r="3" fill="#e74c3c" opacity="0.7"/>
    <circle cx="10" cy="0" r="3" fill="#2ecc71" opacity="0.7"/>
    <circle cx="15" cy="3" r="3" fill="#f39c12" opacity="0.7"/>
  </g>
  
  <!-- Градиент для графика -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.8" />
    </linearGradient>
    
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Вспомогательные линии -->
  <g stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2">
    <line x1="100" y1="200" x2="100" y2="80"/>
    <line x1="170" y1="200" x2="170" y2="80"/>
    <line x1="310" y1="200" x2="310" y2="80"/>
    <line x1="390" y1="200" x2="390" y2="80"/>
  </g>
  
  <!-- Маркеры для минимального и максимального значений -->
  <g transform="translate(100, 200)">
    <polygon points="210,-65 200,-75 220,-75" fill="#27ae60"/>
    <text x="210" y="-85" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">min</text>
    
    <polygon points="70,-55 60,-65 80,-65" fill="#e74c3c"/>
    <text x="70" y="-75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">max</text>
  </g>
  
  <!-- Формула экстремумов -->
  <g transform="translate(50, 330)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">
      f'(x) = 0 → x₁, x₂, ... критические точки
    </text>
  </g>
  
  <!-- Значения функции -->
  <g transform="translate(250, 330)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">
      f(x₁) = y₁, f(x₂) = y₂ → сравнение значений
    </text>
  </g>
  
  <!-- Дополнительная диаграмма -->
  <g transform="translate(50, 150)">
    <rect x="0" y="0" width="80" height="30" fill="#ecf0f1" stroke="#95a5a6" rx="3"/>
    <text x="40" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">y_min</text>
  </g>
  
  <g transform="translate(50, 110)">
    <rect x="0" y="0" width="80" height="30" fill="#ecf0f1" stroke="#95a5a6" rx="3"/>
    <text x="40" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">y_max</text>
  </g>
</svg>