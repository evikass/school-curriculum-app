<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Первообразная и неопределённый интеграл</text>

  <!-- Left card: Antiderivative table -->
  <rect x="15" y="52" width="210" height="195" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="120" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Таблица первообразных</text>

  <!-- Table header -->
  <rect x="25" y="76" width="90" height="16" rx="3" fill="#0D47A1"/>
  <text x="70" y="88" text-anchor="middle" fill="white" font-size="8" font-weight="bold">f(x)</text>
  <rect x="120" y="76" width="95" height="16" rx="3" fill="#1565C0"/>
  <text x="167" y="88" text-anchor="middle" fill="white" font-size="8" font-weight="bold">F(x) + C</text>

  <!-- Table rows -->
  <rect x="25" y="94" width="90" height="14" rx="2" fill="#E3F2FD"/>
  <text x="70" y="105" text-anchor="middle" fill="#0D47A1" font-size="8">x^n</text>
  <rect x="120" y="94" width="95" height="14" rx="2" fill="#BBDEFB"/>
  <text x="167" y="105" text-anchor="middle" fill="#0D47A1" font-size="8">x^(n+1)/(n+1) + C</text>

  <rect x="25" y="110" width="90" height="14" rx="2" fill="#E3F2FD"/>
  <text x="70" y="121" text-anchor="middle" fill="#0D47A1" font-size="8">1/x</text>
  <rect x="120" y="110" width="95" height="14" rx="2" fill="#BBDEFB"/>
  <text x="167" y="121" text-anchor="middle" fill="#0D47A1" font-size="8">ln|x| + C</text>

  <rect x="25" y="126" width="90" height="14" rx="2" fill="#E3F2FD"/>
  <text x="70" y="137" text-anchor="middle" fill="#0D47A1" font-size="8">e^x</text>
  <rect x="120" y="126" width="95" height="14" rx="2" fill="#BBDEFB"/>
  <text x="167" y="137" text-anchor="middle" fill="#0D47A1" font-size="8">e^x + C</text>

  <rect x="25" y="142" width="90" height="14" rx="2" fill="#E3F2FD"/>
  <text x="70" y="153" text-anchor="middle" fill="#0D47A1" font-size="8">sin x</text>
  <rect x="120" y="142" width="95" height="14" rx="2" fill="#BBDEFB"/>
  <text x="167" y="153" text-anchor="middle" fill="#0D47A1" font-size="8">-cos x + C</text>

  <rect x="25" y="158" width="90" height="14" rx="2" fill="#E3F2FD"/>
  <text x="70" y="169" text-anchor="middle" fill="#0D47A1" font-size="8">cos x</text>
  <rect x="120" y="158" width="95" height="14" rx="2" fill="#BBDEFB"/>
  <text x="167" y="169" text-anchor="middle" fill="#0D47A1" font-size="8">sin x + C</text>

  <rect x="25" y="174" width="90" height="14" rx="2" fill="#E3F2FD"/>
  <text x="70" y="185" text-anchor="middle" fill="#0D47A1" font-size="8">1/cos^2 x</text>
  <rect x="120" y="174" width="95" height="14" rx="2" fill="#BBDEFB"/>
  <text x="167" y="185" text-anchor="middle" fill="#0D47A1" font-size="8">tg x + C</text>

  <!-- Note pill -->
  <rect x="30" y="195" width="180" height="18" rx="8" fill="#FFF3E0"/>
  <text x="120" y="208" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">Проверка: (F(x)+C)' = f(x)</text>

  <rect x="30" y="218" width="180" height="18" rx="8" fill="#F3E5F5"/>
  <text x="120" y="231" text-anchor="middle" fill="#6A1B9A" font-size="7" font-weight="bold">При n=-1: x^-1 -> ln|x| + C</text>

  <!-- Right card: F(x)+C family of curves -->
  <rect x="235" y="52" width="250" height="125" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="360" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Семейство F(x) + C</text>

  <!-- Axes -->
  <line x1="265" y1="145" x2="465" y2="145" stroke="#455A64" stroke-width="1"/>
  <line x1="265" y1="75" x2="265" y2="165" stroke="#455A64" stroke-width="1"/>

  <!-- Family of curves: x^2/2 + C -->
  <path d="M 270,165 C 290,140 330,110 365,95 C 400,80 440,78 460,80" fill="none" stroke="#1565C0" stroke-width="1.8" opacity="0.5"/>
  <path d="M 270,155 C 290,130 330,100 365,85 C 400,70 440,68 460,70" fill="none" stroke="#1565C0" stroke-width="1.8"/>
  <path d="M 270,145 C 290,120 330,90 365,75 C 400,60 440,58 460,60" fill="none" stroke="#1565C0" stroke-width="1.8" opacity="0.5"/>

  <!-- C labels -->
  <text x="455" y="82" fill="#1565C0" font-size="7">C=2</text>
  <text x="455" y="72" fill="#1565C0" font-size="7">C=3</text>
  <text x="455" y="93" fill="#1565C0" font-size="7">C=1</text>

  <!-- Arrow showing shift -->
  <line x1="350" y1="95" x2="350" y2="75" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="356" y="87" fill="#E53935" font-size="7">+C</text>

  <!-- Bottom-right card: Differentiation check arrows -->
  <rect x="235" y="185" width="250" height="62" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="360" y="203" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Связь: дифференцирование и интегрирование</text>

  <!-- Forward arrow: F -> f -->
  <rect x="260" y="210" width="80" height="24" rx="6" fill="#E3F2FD"/>
  <text x="300" y="226" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">F(x)</text>
  <line x1="342" y1="222" x2="378" y2="222" stroke="#2E7D32" stroke-width="2"/>
  <text x="360" y="218" text-anchor="middle" fill="#2E7D32" font-size="7">d/dx</text>
  <rect x="382" y="210" width="80" height="24" rx="6" fill="#E8F5E9"/>
  <text x="422" y="226" text-anchor="middle" fill="#2E7D32" font-size="9" font-weight="bold">f(x)</text>

  <!-- Reverse arrow: f -> F -->
  <line x1="378" y1="237" x2="342" y2="237" stroke="#E53935" stroke-width="2"/>
  <text x="360" y="244" text-anchor="middle" fill="#E53935" font-size="7">int dx</text>

  <!-- Bottom card: Key property -->
  <rect x="15" y="253" width="470" height="67" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="271" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Основное свойство первообразной</text>

  <rect x="30" y="278" width="440" height="24" rx="6" fill="#E3F2FD"/>
  <text x="250" y="295" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Если F'(x) = f(x), то все первообразные: F(x) + C</text>

  <rect x="115" y="306" width="130" height="12" rx="5" fill="#C8E6C9"/>
  <text x="180" y="316" text-anchor="middle" fill="#2E7D32" font-size="7">F1(x) - F2(x) = const</text>
  <rect x="260" y="306" width="130" height="12" rx="5" fill="#FFF3E0"/>
  <text x="325" y="316" text-anchor="middle" fill="#E65100" font-size="7">Графики - сдвиг по Oy</text>

  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Интеграл от f(x) dx = F(x) + C — совокупность всех первообразных</text>
</svg>