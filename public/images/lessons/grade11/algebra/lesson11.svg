<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3498db">Урок 11: Геометрический смысл производной</text>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">Уравнение касательной</text>
  
  <!-- Номер урока -->
  <text x="450" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">11</text>
  
  <!-- Система координат -->
  <g transform="translate(100, 200)">
    <!-- Ось X -->
    <line x1="-50" y1="0" x2="300" y2="0" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="310" y="5" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">x</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="100" x2="0" y2="-150" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="5" y="-155" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">y</text>
    
    <!-- Деления на оси X -->
    <g stroke="#7f8c8d" stroke-width="1">
      <line x1="50" y1="-5" x2="50" y2="5"/>
      <line x1="100" y1="-5" x2="100" y2="5"/>
      <line x1="150" y1="-5" x2="150" y2="5"/>
      <line x1="200" y1="-5" x2="200" y2="5"/>
      <line x1="250" y1="-5" x2="250" y2="5"/>
    </g>
    
    <!-- Деления на оси Y -->
    <g stroke="#7f8c8d" stroke-width="1">
      <line x1="-5" y1="-50" x2="5" y2="-50"/>
      <line x1="-5" y1="-100" x2="5" y2="-100"/>
    </g>
    
    <!-- Подписи делений -->
    <text x="50" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">1</text>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">2</text>
    <text x="150" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">3</text>
    <text x="200" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">4</text>
    <text x="250" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">5</text>
    
    <text x="-15" y="-45" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">1</text>
    <text x="-15" y="-95" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">2</text>
  </g>
  
  <!-- Функция f(x) = x²/2 -->
  <path d="M 100,200 Q 125,162.5 150,150 T 200,125 Q 225,112.5 250,100" 
        fill="none" stroke="#e74c3c" stroke-width="3"/>
  
  <!-- Касательная в точке x=3 -->
  <line x1="50" y1="125" x2="250" y2="-25" stroke="#3498db" stroke-width="2.5"/>
  
  <!-- Точка касания -->
  <circle cx="250" cy="100" r="5" fill="#e74c3c"/>
  <text x="260" y="95" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">M(3, 4.5)</text>
  
  <!-- Вектор производной -->
  <line x1="250" y1="100" x2="280" y2="65" stroke="#9b59b6" stroke-width="2" marker-end="url(#arrowhead-purple)"/>
  <text x="285" y="60" font-family="Arial, sans-serif" font-size="12" fill="#9b59b6">f'(3)</text>
  
  <!-- Угол между касательной и осью X -->
  <path d="M 250,100 L 280,100 A 30,30 0 0,1 280,70" fill="none" stroke="#f39c12" stroke-width="1.5"/>
  <text x="290" y="85" font-family="Arial, sans-serif" font-size="12" fill="#f39c12">α</text>
  
  <!-- Вторая функция для угла между кривыми -->
  <path d="M 100,200 Q 150,175 200,150 T 300,75" 
        fill="none" stroke="#16a085" stroke-width="2.5"/>
  
  <!-- Точка пересечения -->
  <circle cx="200" cy="150" r="4" fill="#2c3e50"/>
  <text x="210" y="145" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">P(2, 2)</text>
  
  <!-- Угол между кривыми -->
  <path d="M 200,150 L 220,135 A 25,25 0 0,1 225,160" fill="none" stroke="#f1c40f" stroke-width="1.5"/>
  <text x="235" y="155" font-family="Arial, sans-serif" font-size="12" fill="#f1c40f">φ</text>
  
  <!-- Формулы -->
  <g transform="translate(50, 300)">
    <rect x="0" y="0" width="400" height="40" fill="rgba(236, 240, 241, 0.8)" rx="5"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Формулы:</text>
    <text x="10" y="30" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Уравнение касательной: y = f'(x₀)(x - x₀) + f(x₀)</text>
    <text x="210" y="30" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Угол между кривыми: tanφ = |(k₂ - k₁)/(1 + k₁k₂)|</text>
  </g>
  
  <!-- Объяснения -->
  <text x="380" y="120" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Касательная</text>
  <text x="380" y="135" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">линия</text>
  
  <text x="380" y="170" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">График</text>
  <text x="380" y="185" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">функции</text>
  
  <text x="320" y="220" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">Вторая</text>
  <text x="320" y="235" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">функция</text>
  
  <!-- Градиент для выделения -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:0" />
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c3e50"/>
    </marker>
    
    <marker id="arrowhead-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9b59b6"/>
    </marker>
  </defs>
</svg>