<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Экстремумы функции</text>

  <!-- Left card: Curve with max/min points -->
  <rect x="15" y="52" width="230" height="165" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="130" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">График f(x) = x^3 - 3x</text>

  <!-- Axes -->
  <line x1="40" y1="185" x2="225" y2="185" stroke="#455A64" stroke-width="1.2"/>
  <line x1="130" y1="78" x2="130" y2="205" stroke="#455A64" stroke-width="1.2"/>
  <text x="225" y="196" fill="#455A64" font-size="9">x</text>
  <text x="133" y="78" fill="#455A64" font-size="9">y</text>

  <!-- Curve f(x) = x^3 - 3x (stylized) -->
  <path d="M 40,130 C 55,65 75,60 90,90 C 105,120 115,170 130,185 C 145,200 155,250 170,260 C 185,270 200,230 220,130" fill="none" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Max point -->
  <circle cx="90" cy="90" r="4" fill="#E53935"/>
  <text x="93" y="83" fill="#E53935" font-size="9" font-weight="bold">max</text>
  <line x1="90" y1="90" x2="90" y2="185" stroke="#E53935" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="82" y="197" fill="#E53935" font-size="8">x=-1</text>

  <!-- Min point -->
  <circle cx="170" cy="260" r="4" fill="#2E7D32"/>
  <text x="175" y="258" fill="#2E7D32" font-size="9" font-weight="bold">min</text>
  <line x1="170" y1="260" x2="170" y2="185" stroke="#2E7D32" stroke-width="0.7" stroke-dasharray="3,2"/>
  <text x="162" y="197" fill="#2E7D32" font-size="8">x=1</text>

  <!-- f'(x)=0 label -->
  <text x="130" y="210" text-anchor="middle" fill="#0D47A1" font-size="8" font-style="italic">f'(x)=0 в точках экстремума</text>

  <!-- Right card: Sign chart of f'(x) -->
  <rect x="255" y="52" width="230" height="165" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="370" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Знаки f'(x) = 3x^2 - 3</text>

  <!-- Number line -->
  <line x1="275" y1="110" x2="460" y2="110" stroke="#455A64" stroke-width="1.5"/>
  <circle cx="340" cy="110" r="3" fill="#E53935"/>
  <circle cx="420" cy="110" r="3" fill="#2E7D32"/>
  <text x="340" y="125" text-anchor="middle" fill="#455A64" font-size="8">-1</text>
  <text x="420" y="125" text-anchor="middle" fill="#455A64" font-size="8">1</text>

  <!-- Sign regions -->
  <text x="305" y="100" text-anchor="middle" fill="#2E7D32" font-size="14" font-weight="bold">+</text>
  <text x="380" y="100" text-anchor="middle" fill="#E53935" font-size="14" font-weight="bold">-</text>
  <text x="445" y="100" text-anchor="middle" fill="#2E7D32" font-size="14" font-weight="bold">+</text>

  <!-- Conclusion pills -->
  <rect x="280" y="135" width="50" height="20" rx="10" fill="#E8F5E9"/>
  <text x="305" y="149" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">возр.</text>
  <rect x="348" y="135" width="50" height="20" rx="10" fill="#FFEBEE"/>
  <text x="373" y="149" text-anchor="middle" fill="#E53935" font-size="8" font-weight="bold">убыв.</text>
  <rect x="418" y="135" width="50" height="20" rx="10" fill="#E8F5E9"/>
  <text x="443" y="149" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">возр.</text>

  <!-- Extremum type pills -->
  <rect x="295" y="165" width="85" height="22" rx="10" fill="#FFCDD2"/>
  <text x="337" y="180" text-anchor="middle" fill="#C62828" font-size="9" font-weight="bold">+ -> - : max</text>
  <rect x="390" y="165" width="85" height="22" rx="10" fill="#C8E6C9"/>
  <text x="432" y="180" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">- -> + : min</text>

  <!-- Bottom card: Theorem Fermat -->
  <rect x="15" y="225" width="470" height="95" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="245" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Теорема Ферма (необходимое условие)</text>

  <!-- Formula box -->
  <rect x="35" y="255" width="430" height="28" rx="6" fill="#E3F2FD"/>
  <text x="250" y="274" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Если x0 - точка экстремума и f дифференцируема, то f'(x0) = 0</text>

  <!-- Key point pills -->
  <rect x="30" y="290" width="140" height="20" rx="10" fill="#FFF3E0"/>
  <text x="100" y="304" text-anchor="middle" fill="#E65100" font-size="8" font-weight="bold">f'(x0)=0 - НЕ достаточно!</text>
  <rect x="180" y="290" width="130" height="20" rx="10" fill="#F3E5F5"/>
  <text x="245" y="304" text-anchor="middle" fill="#6A1B9A" font-size="8" font-weight="bold">Пример: x^3 в x=0</text>
  <rect x="320" y="290" width="150" height="20" rx="10" fill="#E8F5E9"/>
  <text x="395" y="304" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">Критич. точки: f'=0 или нет f'</text>

  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Достаточное условие: смена знака f'(x) при переходе через x0</text>
</svg>