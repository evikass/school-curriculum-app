<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Определённый интеграл. Формула Ньютона-Лейбница</text>

  <!-- Left card: Curvilinear trapezoid with Riemann sum -->
  <rect x="15" y="52" width="220" height="145" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="125" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Криволинейная трапеция</text>

  <!-- Axes -->
  <line x1="40" y1="170" x2="220" y2="170" stroke="#455A64" stroke-width="1"/>
  <line x1="40" y1="80" x2="40" y2="175" stroke="#455A64" stroke-width="1"/>
  <text x="38" y="180" fill="#455A64" font-size="7">a</text>
  <text x="200" y="180" fill="#455A64" font-size="7">b</text>

  <!-- Shaded area under curve (curvilinear trapezoid) -->
  <path d="M 55,170 C 70,160 90,130 120,110 C 150,95 175,85 200,82 L 200,170 Z" fill="#1565C0" opacity="0.2"/>
  <!-- Curve -->
  <path d="M 55,155 C 70,145 90,120 120,105 C 150,90 175,80 200,78" fill="none" stroke="#1565C0" stroke-width="2"/>
  <!-- Vertical lines at a and b -->
  <line x1="55" y1="155" x2="55" y2="170" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="200" y1="78" x2="200" y2="170" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Label -->
  <text x="125" y="148" text-anchor="middle" fill="#0D47A1" font-size="8" font-weight="bold">S = int f(x)dx</text>

  <!-- Riemann rectangles overlay -->
  <rect x="55" y="148" width="25" height="22" fill="none" stroke="#E53935" stroke-width="1" rx="1"/>
  <rect x="80" y="132" width="25" height="38" fill="none" stroke="#E53935" stroke-width="1" rx="1"/>
  <rect x="105" y="112" width="25" height="58" fill="none" stroke="#E53935" stroke-width="1" rx="1"/>
  <rect x="130" y="98" width="25" height="72" fill="none" stroke="#E53935" stroke-width="1" rx="1"/>
  <rect x="155" y="88" width="25" height="82" fill="none" stroke="#E53935" stroke-width="1" rx="1"/>
  <rect x="180" y="80" width="20" height="90" fill="none" stroke="#E53935" stroke-width="1" rx="1"/>

  <!-- Pill: Riemann sum -->
  <rect x="25" y="184" width="200" height="10" rx="4" fill="#FFF3E0"/>
  <text x="125" y="192" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">Интегральная сумма: Σ f(x_i) * Δx_i</text>

  <!-- Right card: Newton-Leibniz formula -->
  <rect x="245" y="52" width="240" height="145" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="365" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Формула Ньютона-Лейбница</text>

  <!-- Formula box -->
  <rect x="260" y="78" width="210" height="32" rx="6" fill="#E3F2FD"/>
  <text x="365" y="99" text-anchor="middle" fill="#0D47A1" font-size="13" font-weight="bold">int[a,b] f(x)dx = F(b) - F(a)</text>

  <!-- Step-by-step visual -->
  <rect x="260" y="118" width="95" height="28" rx="6" fill="#E8F5E9"/>
  <text x="308" y="131" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">F(b) =</text>
  <text x="308" y="142" text-anchor="middle" fill="#2E7D32" font-size="8">первообразная</text>

  <line x1="358" y1="132" x2="375" y2="132" stroke="#E53935" stroke-width="2"/>
  <text x="366" y="128" text-anchor="middle" fill="#E53935" font-size="9">-</text>

  <rect x="380" y="118" width="95" height="28" rx="6" fill="#FFF3E0"/>
  <text x="428" y="131" text-anchor="middle" fill="#E65100" font-size="8" font-weight="bold">F(a) =</text>
  <text x="428" y="142" text-anchor="middle" fill="#E65100" font-size="8">первообразная</text>

  <!-- Example -->
  <rect x="260" y="154" width="210" height="34" rx="5" fill="#F3E5F5"/>
  <text x="365" y="167" text-anchor="middle" fill="#6A1B9A" font-size="7" font-weight="bold">Пример: int[0,2] x^2 dx = [x^3/3] = 8/3 - 0 = 8/3</text>
  <text x="365" y="180" text-anchor="middle" fill="#6A1B9A" font-size="7">F(x) = x^3/3, F(2) = 8/3, F(0) = 0</text>

  <!-- Bottom card: Properties -->
  <rect x="15" y="205" width="470" height="115" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="223" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Свойства определённого интеграла</text>

  <!-- Property pills -->
  <rect x="25" y="230" width="215" height="16" rx="6" fill="#E3F2FD"/>
  <text x="132" y="242" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Линейность: int(kf + mg) = k*int f + m*int g</text>

  <rect x="250" y="230" width="225" height="16" rx="6" fill="#BBDEFB"/>
  <text x="362" y="242" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">Аддитивность: int[a,b] = int[a,c] + int[c,b]</text>

  <rect x="25" y="251" width="215" height="16" rx="6" fill="#E8F5E9"/>
  <text x="132" y="263" text-anchor="middle" fill="#2E7D32" font-size="7" font-weight="bold">int[a,a] f(x)dx = 0</text>

  <rect x="250" y="251" width="225" height="16" rx="6" fill="#FFF3E0"/>
  <text x="362" y="263" text-anchor="middle" fill="#E65100" font-size="7" font-weight="bold">int[a,b] = -int[b,a] (перестановка пределов)</text>

  <rect x="25" y="272" width="215" height="16" rx="6" fill="#F3E5F5"/>
  <text x="132" y="284" text-anchor="middle" fill="#6A1B9A" font-size="7" font-weight="bold">int[a,b] 1 dx = b - a</text>

  <rect x="250" y="272" width="225" height="16" rx="6" fill="#E3F2FD"/>
  <text x="362" y="284" text-anchor="middle" fill="#0D47A1" font-size="7" font-weight="bold">m(b-a) &lt;= int[a,b] f(x)dx &lt;= M(b-a)</text>

  <!-- Geometric meaning pill -->
  <rect x="55" y="296" width="390" height="16" rx="8" fill="#0D47A1"/>
  <text x="250" y="308" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Геометрический смысл: интеграл = площадь криволинейной трапеции (при f(x) &gt;= 0)</text>

  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Интеграл = предел интегральной суммы = F(b) - F(a)</text>
</svg>