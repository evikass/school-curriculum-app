<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495e" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#3498db">Урок 16: Площадь криволинейной трапеции</text>
  <text x="30" y="30" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">№16</text>
  
  <!-- Система координат -->
  <line x1="80" y1="250" x2="420" y2="250" stroke="#34495e" stroke-width="2"/>
  <line x1="80" y1="100" x2="80" y2="250" stroke="#34495e" stroke-width="2"/>
  
  <!-- Стрелки осей -->
  <polygon points="415,245 420,250 415,255" fill="#34495e"/>
  <polygon points="75,105 80,100 85,105" fill="#34495e"/>
  
  <!-- Ось X -->
  <text x="430" y="255" font-family="Arial, sans-serif" font-size="14" fill="#34495e">x</text>
  <!-- Ось Y -->
  <text x="75" y="95" font-family="Arial, sans-serif" font-size="14" fill="#34495e">y</text>
  
  <!-- Деления на оси X -->
  <line x1="140" y1="245" x2="140" y2="255" stroke="#34495e" stroke-width="1"/>
  <text x="140" y="270" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e">a</text>
  
  <line x1="200" y1="245" x2="200" y2="255" stroke="#34495e" stroke-width="1"/>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e">b</text>
  
  <line x1="260" y1="245" x2="260" y2="255" stroke="#34495e" stroke-width="1"/>
  <text x="260" y="270" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e">c</text>
  
  <line x1="320" y1="245" x2="320" y2="255" stroke="#34495e" stroke-width="1"/>
  <text x="320" y="270" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#34495e">d</text>
  
  <!-- Деления на оси Y -->
  <line x1="75" y1="200" x2="85" y2="200" stroke="#34495e" stroke-width="1"/>
  <text x="65" y="205" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#34495e">0</text>
  
  <line x1="75" y1="150" x2="85" y2="150" stroke="#34495e" stroke-width="1"/>
  <text x="65" y="155" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#34495e">f(x)</text>
  
  <!-- Функция f(x) -->
  <path d="M 80,180 Q 110,120 140,140 T 200,130 Q 230,125 260,140 T 320,150 Q 350,155 380,170" fill="none" stroke="#e74c3c" stroke-width="3"/>
  
  <!-- Криволинейная трапеция -->
  <path d="M 140,250 L 140,140 Q 170,135 200,130 Q 230,125 260,140 L 320,150 Q 350,155 380,170 L 380,250 Z" fill="#3498db" fill-opacity="0.3" stroke="#2980b9" stroke-width="2"/>
  
  <!-- Вертикальные линии -->
  <line x1="140" y1="140" x2="140" y2="250" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="380" y1="170" x2="380" y2="250" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Точка пересечения с осью X -->
  <circle cx="140" cy="250" r="4" fill="#e74c3c"/>
  <circle cx="380" cy="250" r="4" fill="#e74c3c"/>
  
  <!-- Подписи к точкам -->
  <text x="140" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e74c3c">(a, 0)</text>
  <text x="380" y="165" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e74c3c">(b, 0)</text>
  
  <!-- Обозначение площади -->
  <text x="260" y="210" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2980b9">S</text>
  
  <!-- Формула площади -->
  <rect x="50" y="290" width="400" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <text x="250" y="315" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">S = ∫[a,b] f(x)dx</text>
  
  <!-- Название функции -->
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">y = f(x)</text>
  
  <!-- Обозначение криволинейной трапеции -->
  <path d="M 120,110 L 130,100" stroke="#34495e" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="90" y="95" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Криволинейная трапеция</text>
  
  <!-- Определение -->
  <rect x="50" y="80" width="180" height="30" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1" rx="3"/>
  <text x="140" y="100" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#495057">Фигура, ограниченная</text>
  
  <!-- Компоненты определения -->
  <circle cx="420" cy="140" r="3" fill="#3498db"/>
  <line x1="230" y1="95" x2="417" y2="140" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="420" y="145" font-family="Arial, sans-serif" font-size="11" fill="#495057">графиком функции</text>
  
  <circle cx="420" cy="160" r="3" fill="#3498db"/>
  <line x1="230" y1="105" x2="417" y2="160" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="420" y="165" font-family="Arial, sans-serif" font-size="11" fill="#495057">осью абсцисс</text>
  
  <circle cx="420" cy="180" r="3" fill="#3498db"/>
  <line x1="230" y1="115" x2="417" y2="180" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="420" y="185" font-family="Arial, sans-serif" font-size="11" fill="#495057">прямыми x=a и x=b</text>
  
  <!-- Маркер стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
  </defs>
  
  <!-- Прямоугольники для демонстрации интегрирования -->
  <rect x="140" y="240" width="20" height="10" fill="#f39c12" fill-opacity="0.5"/>
  <rect x="160" y="235" width="20" height="15" fill="#f39c12" fill-opacity="0.5"/>
  <rect x="180" y="230" width="20" height="20" fill="#f39c12" fill-opacity="0.5"/>
  <rect x="200" y="225" width="20" height="25" fill="#f39c12" fill-opacity="0.5"/>
  <rect x="220" y="230" width="20" height="20" fill="#f39c12" fill-opacity="0.5"/>
  <rect x="240" y="235" width="20" height="15" fill="#f39c12" fill-opacity="0.5"/>
  <rect x="260" y="240" width="20" height="10" fill="#f39c12" fill-opacity="0.5"/>
  
  <text x="250" y="285" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#f39c12">Приближенное интегрирование</text>
  
  <!-- Легенда -->
  <rect x="350" y="80" width="120" height="60" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3"/>
  <line x1="360" y1="95" x2="380" y2="95" stroke="#e74c3c" stroke-width="3"/>
  <text x="385" y="100" font-family="Arial, sans-serif" font-size="11" fill="#34495e">f(x)</text>
  
  <rect x="360" y="110" width="20" height="10" fill="#3498db" fill-opacity="0.3"/>
  <text x="385" y="120" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Площадь</text>
  
  <line x1="360" y1="130" x2="380" y2="130" stroke="#27ae60" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="385" y="135" font-family="Arial, sans-serif" font-size="11" fill="#34495e">x=a, x=b</text>
</svg>