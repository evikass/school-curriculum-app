<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Правила нахождения первообразных</text>

  <!-- Rule card 1: Sum -->
  <rect x="15" y="52" width="150" height="85" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="90" y="68" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">Правило 1: Сумма</text>

  <rect x="25" y="74" width="130" height="22" rx="6" fill="#E3F2FD"/>
  <text x="90" y="89" text-anchor="middle" fill="#0D47A1" font-size="9">int(f+g)dx =</text>

  <rect x="25" y="100" width="130" height="22" rx="6" fill="#BBDEFB"/>
  <text x="90" y="115" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">int f dx + int g dx</text>

  <!-- Rule card 2: Constant multiplier -->
  <rect x="175" y="52" width="150" height="85" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="68" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">Правило 2: Множитель</text>

  <rect x="185" y="74" width="130" height="22" rx="6" fill="#E8F5E9"/>
  <text x="250" y="89" text-anchor="middle" fill="#2E7D32" font-size="9">int k*f(x) dx =</text>

  <rect x="185" y="100" width="130" height="22" rx="6" fill="#C8E6C9"/>
  <text x="250" y="115" text-anchor="middle" fill="#2E7D32" font-size="9" font-weight="bold">k * int f(x) dx</text>

  <!-- Rule card 3: f(kx+b) -->
  <rect x="335" y="52" width="150" height="85" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="410" y="68" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">Правило 3: f(kx+b)</text>

  <rect x="345" y="74" width="130" height="22" rx="6" fill="#FFF3E0"/>
  <text x="410" y="89" text-anchor="middle" fill="#E65100" font-size="9">int f(kx+b)dx =</text>

  <rect x="345" y="100" width="130" height="22" rx="6" fill="#FFE0B2"/>
  <text x="410" y="115" text-anchor="middle" fill="#E65100" font-size="9" font-weight="bold">F(kx+b)/k + C</text>

  <!-- Middle card: Substitution method diagram -->
  <rect x="15" y="145" width="310" height="110" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="170" y="163" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Метод подстановки</text>

  <!-- Step flow -->
  <rect x="25" y="170" width="90" height="24" rx="6" fill="#E3F2FD"/>
  <text x="70" y="186" text-anchor="middle" fill="#0D47A1" font-size="8">1. u = g(x)</text>

  <line x1="117" y1="182" x2="125" y2="182" stroke="#0D47A1" stroke-width="1.5"/>

  <rect x="127" y="170" width="90" height="24" rx="6" fill="#BBDEFB"/>
  <text x="172" y="186" text-anchor="middle" fill="#0D47A1" font-size="8">2. du = g'(x)dx</text>

  <line x1="219" y1="182" x2="227" y2="182" stroke="#0D47A1" stroke-width="1.5"/>

  <rect x="229" y="170" width="85" height="24" rx="6" fill="#90CAF9"/>
  <text x="271" y="186" text-anchor="middle" fill="#0D47A1" font-size="8">3. int f(u)du</text>

  <!-- Example -->
  <rect x="25" y="200" width="290" height="22" rx="6" fill="#FFF9C4"/>
  <text x="170" y="215" text-anchor="middle" fill="#F57F17" font-size="8">Пример: int (2x+1)^5 dx</text>

  <rect x="25" y="226" width="290" height="22" rx="6" fill="#F3E5F5"/>
  <text x="170" y="241" text-anchor="middle" fill="#6A1B9A" font-size="8">u=2x+1, du=2dx -> u^6/12 + C = (2x+1)^6/12 + C</text>

  <!-- Right card: Example formulas -->
  <rect x="335" y="145" width="150" height="110" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="410" y="163" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Примеры</text>

  <rect x="345" y="170" width="130" height="18" rx="6" fill="#E8F5E9"/>
  <text x="410" y="183" text-anchor="middle" fill="#2E7D32" font-size="7">int cos(3x)dx = sin(3x)/3+C</text>

  <rect x="345" y="192" width="130" height="18" rx="6" fill="#FFF3E0"/>
  <text x="410" y="205" text-anchor="middle" fill="#E65100" font-size="7">int e^(2x)dx = e^(2x)/2+C</text>

  <rect x="345" y="214" width="130" height="18" rx="6" fill="#FFEBEE"/>
  <text x="410" y="227" text-anchor="middle" fill="#C62828" font-size="7">int sin(5x)dx = -cos(5x)/5+C</text>

  <rect x="345" y="236" width="130" height="14" rx="6" fill="#F3E5F5"/>
  <text x="410" y="247" text-anchor="middle" fill="#6A1B9A" font-size="6">Везде: делим на k!</text>

  <!-- Bottom card: Warning about common mistakes -->
  <rect x="15" y="263" width="470" height="57" rx="10" fill="white" filter="url(#shadow1)"/>
  <text x="250" y="281" text-anchor="middle" fill="#C62828" font-size="10" font-weight="bold">Типичная ошибка: не путайте правила!</text>

  <rect x="25" y="287" width="215" height="24" rx="8" fill="#E8F5E9"/>
  <text x="132" y="303" text-anchor="middle" fill="#2E7D32" font-size="8" font-weight="bold">int k*f(x) dx = k * int f(x) dx</text>

  <text x="248" y="303" text-anchor="middle" fill="#C62828" font-size="12" font-weight="bold">=/=</text>

  <rect x="262" y="287" width="215" height="24" rx="8" fill="#FFEBEE"/>
  <text x="369" y="303" text-anchor="middle" fill="#C62828" font-size="8" font-weight="bold">int f(kx) dx = F(kx)/k + C</text>

  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Проверка дифференцированием: (F(x)+C)' = f(x) - всегда!</text>
</svg>