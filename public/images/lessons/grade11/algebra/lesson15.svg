<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#34495e" stroke-width="2" rx="5" ry="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#7f8c8d" stroke-width="1" rx="3" ry="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">Урок 15: Первообразная</text>
  <text x="40" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3498db">№15</text>
  
  <!-- Определение первообразной -->
  <rect x="20" y="70" width="460" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" ry="5"/>
  <text x="30" y="90" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Определение:</text>
  <text x="30" y="110" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Функция F(x) называется первообразной функции f(x) на промежутке X, если для любого</text>
  <text x="30" y="125" font-family="Arial, sans-serif" font-size="12" fill="#34495e">x ∈ X выполняется равенство F'(x) = f(x).</text>
  <text x="30" y="145" font-family="Arial, sans-serif" font-size="12" fill="#34495e">Пример: F(x) = x³, F'(x) = 3x² ⇒ F(x) — первообразная функции f(x) = 3x²</text>
  
  <!-- Таблица первообразных -->
  <rect x="20" y="160" width="230" height="170" fill="#fff" stroke="#3498db" stroke-width="1" rx="5" ry="5"/>
  <text x="135" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Таблица первообразных</text>
  
  <!-- Строки таблицы -->
  <line x1="30" y1="190" x2="240" y2="190" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="30" y1="210" x2="240" y2="210" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="30" y1="230" x2="240" y2="230" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="30" y1="250" x2="240" y2="250" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="30" y1="270" x2="240" y2="270" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="30" y1="290" x2="240" y2="290" stroke="#bdc3c7" stroke-width="1"/>
  <line x1="30" y1="310" x2="240" y2="310" stroke="#bdc3c7" stroke-width="1"/>
  
  <!-- Вертикальные линии таблицы -->
  <line x1="135" y1="190" x2="135" y2="310" stroke="#bdc3c7" stroke-width="1"/>
  
  <!-- Содержимое таблицы -->
  <text x="80" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">f(x)</text>
  <text x="190" y="205" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">F(x)</text>
  
  <text x="80" y="225" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">k (const)</text>
  <text x="190" y="225" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">kx + C</text>
  
  <text x="80" y="245" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">xⁿ (n≠-1)</text>
  <text x="190" y="245" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">(xⁿ⁺¹)/(n+1) + C</text>
  
  <text x="80" y="265" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">1/x</text>
  <text x="190" y="265" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">ln|x| + C</text>
  
  <text x="80" y="285" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">eˣ</text>
  <text x="190" y="285" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">eˣ + C</text>
  
  <text x="80" y="305" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">sin x</text>
  <text x="190" y="305" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#34495e">-cos x + C</text>
  
  <!-- Правила нахождения первообразных -->
  <rect x="250" y="160" width="230" height="170" fill="#fff" stroke="#e74c3c" stroke-width="1" rx="5" ry="5"/>
  <text x="365" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Правила нахождения</text>
  
  <!-- Правило 1 -->
  <circle cx="265" cy="200" r="3" fill="#e74c3c"/>
  <text x="275" y="205" font-family="Arial, sans-serif" font-size="11" fill="#34495e">1. F(x) + C — первообразная для f(x)</text>
  
  <!-- Правило 2 -->
  <circle cx="265" cy="220" r="3" fill="#e74c3c"/>
  <text x="275" y="225" font-family="Arial, sans-serif" font-size="11" fill="#34495e">2. [k·F(x)]' = k·F'(x) = k·f(x)</text>
  <text x="275" y="238" font-family="Arial, sans-serif" font-size="11" fill="#34495e">   ⇒ k·F(x) — первообразная для k·f(x)</text>
  
  <!-- Правило 3 -->
  <circle cx="265" cy="258" r="3" fill="#e74c3c"/>
  <text x="275" y="263" font-family="Arial, sans-serif" font-size="11" fill="#34495e">3. [F(x) ± G(x)]' = F'(x) ± G'(x)</text>
  <text x="275" y="276" font-family="Arial, sans-serif" font-size="11" fill="#34495e">   = f(x) ± g(x) ⇒ F(x) ± G(x)</text>
  <text x="275" y="289" font-family="Arial, sans-serif" font-size="11" fill="#34495e">   — первообразная для f(x) ± g(x)</text>
  
  <!-- Правило 4 -->
  <circle cx="265" cy="309" r="3" fill="#e74c3c"/>
  <text x="275" y="314" font-family="Arial, sans-serif" font-size="11" fill="#34495e">4. [F(kx + b)]' = k·F'(kx + b)</text>
  <text x="275" y="327" font-family="Arial, sans-serif" font-size="11" fill="#34495e">   = k·f(kx + b)</text>
  
  <!-- График функции и первообразной -->
  <g transform="translate(100, 200)">
    <rect x="-80" y="-120" width="160" height="100" fill="#f8f9fa" stroke="#95a5a6" stroke-width="1" rx="3" ry="3"/>
    <text x="0" y="-105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Пример графика</text>
    
    <!-- Оси -->
    <line x1="-70" y1="0" x2="70" y2="0" stroke="#34495e" stroke-width="1"/>
    <line x1="0" y1="-100" x2="0" y2="20" stroke="#34495e" stroke-width="1"/>
    
    <!-- Стрелки -->
    <path d="M 70,0 L 65,-3 L 65,3 Z" fill="#34495e"/>
    <path d="M 0,-100 L -3,-95 L 3,-95 Z" fill="#34495e"/>
    
    <!-- График f(x) = x² -->
    <path d="M -60,60 Q -30,20 0,-20 Q 30,20 60,60" fill="none" stroke="#3498db" stroke-width="2"/>
    
    <!-- График F(x) = x³/3 -->
    <path d="M -60,-60 Q -30,-20 0,20 Q 30,20 60,60" fill="none" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Подписи -->
    <text x="50" y="5" font-family="Arial, sans-serif" font-size="8" fill="#3498db">f(x)</text>
    <text x="50" y="75" font-family="Arial, sans-serif" font-size="8" fill="#e74c3c">F(x)</text>
  </g>
  
  <!-- Интегральное обозначение -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">∫ f(x)dx = F(x) + C</text>
</svg>