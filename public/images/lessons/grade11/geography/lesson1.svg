<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1e7f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c5282;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3182ce;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGradient)" stroke-width="4" rx="5" />
  
  <!-- Заголовок урока -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a365d">Урок 1: Государства мира</text>
  
  <!-- Подзаголовок -->
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c5282">Многообразие стран</text>
  
  <!-- Надпись "ГЕОГРАФИЯ · 11 КЛАСС" -->
  <text x="250" y="25" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3748" font-style="italic">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <rect x="20" y="20" width="35" height="25" fill="#3182ce" rx="3" filter="url(#shadow)" />
  <text x="37.5" y="37" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">1</text>
  
  <!-- Круговая диаграмма: Распределение стран по континентам -->
  <g transform="translate(120, 180)">
    <!-- Азия -->
    <path d="M 0,0 L 50,0 A 50,50 0 0,1 35.36,35.36 Z" fill="#e53e3e" />
    <text x="25" y="20" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">48%</text>
    
    <!-- Африка -->
    <path d="M 0,0 L 35.36,35.36 A 50,50 0 0,1 -35.36,35.36 Z" fill="#dd6b20" />
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">15%</text>
    
    <!-- Северная Америка -->
    <path d="M 0,0 L -35.36,35.36 A 50,50 0 0,1 -50,0 Z" fill="#38a169" />
    <text x="-35" y="20" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">9%</text>
    
    <!-- Южная Америка -->
    <path d="M 0,0 L -50,0 A 50,50 0 0,1 -35.36,-35.36 Z" fill="#3182ce" />
    <text x="-35" y="-15" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">12%</text>
    
    <!-- Европа -->
    <path d="M 0,0 L -35.36,-35.36 A 50,50 0 0,1 35.36,-35.36 Z" fill="#805ad5" />
    <text x="0" y="-25" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">10%</text>
    
    <!-- Океания -->
    <path d="M 0,0 L 35.36,-35.36 A 50,50 0 0,1 50,0 Z" fill="#d69e2e" />
    <text x="35" y="-15" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">6%</text>
  </g>
  
  <!-- Подпись к круговой диаграмме -->
  <text x="120" y="250" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2d3748">Распределение стран по континентам</text>
  
  <!-- Таблица: Крупнейшие страны -->
  <g transform="translate(250, 120)">
    <!-- Заголовок таблицы -->
    <rect x="0" y="0" width="180" height="25" fill="#3182ce" rx="3" filter="url(#shadow)" />
    <text x="90" y="17" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Крупнейшие страны</text>
    
    <!-- Строка 1 -->
    <rect x="0" y="25" width="180" height="20" fill="#e2e8f0" />
    <text x="10" y="39" font-family="Arial, sans-serif" font-size="10" fill="#2d3748">1. Россия: 17.1 млн км²</text>
    
    <!-- Строка 2 -->
    <rect x="0" y="45" width="180" height="20" fill="#f7fafc" />
    <text x="10" y="59" font-family="Arial, sans-serif" font-size="10" fill="#2d3748">2. Канада: 9.98 млн км²</text>
    
    <!-- Строка 3 -->
    <rect x="0" y="65" width="180" height="20" fill="#e2e8f0" />
    <text x="10" y="79" font-family="Arial, sans-serif" font-size="10" fill="#2d3748">3. Китай: 9.6 млн км²</text>
    
    <!-- Строка 4 -->
    <rect x="0" y="85" width="180" height="20" fill="#f7fafc" />
    <text x="10" y="99" font-family="Arial, sans-serif" font-size="10" fill="#2d3748">4. США: 9.5 млн км²</text>
    
    <!-- Строка 5 -->
    <rect x="0" y="105" width="180" height="20" fill="#e2e8f0" />
    <text x="10" y="119" font-family="Arial, sans-serif" font-size="10" fill="#2d3748">5. Бразилия: 8.5 млн км²</text>
  </g>
  
  <!-- График: Численность населения стран -->
  <g transform="translate(250, 250)">
    <!-- Ось Y -->
    <line x1="20" y1="20" x2="20" y2="100" stroke="#4a5568" stroke-width="1" />
    <!-- Ось X -->
    <line x1="20" y1="100" x2="180" y2="100" stroke="#4a5568" stroke-width="1" />
    
    <!-- Деления по оси Y -->
    <line x1="18" y1="20" x2="22" y2="20" stroke="#4a5568" stroke-width="1" />
    <text x="15" y="24" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#4a5568">1.4 млрд</text>
    
    <line x1="18" y1="40" x2="22" y2="40" stroke="#4a5568" stroke-width="1" />
    <text x="15" y="44" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#4a5568">1.0 млрд</text>
    
    <line x1="18" y1="60" x2="22" y2="60" stroke="#4a5568" stroke-width="1" />
    <text x="15" y="64" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#4a5568">0.6 млрд</text>
    
    <line x1="18" y1="80" x2="22" y2="80" stroke="#4a5568" stroke-width="1" />
    <text x="15" y="84" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#4a5568">0.3 млрд</text>
    
    <line x1="18" y1="100" x2="22" y2="100" stroke="#4a5568" stroke-width="1" />
    <text x="15" y="104" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#4a5568">0</text>
    
    <!-- Столбцы -->
    <rect x="30" y="30" width="25" height="70" fill="#e53e3e" />
    <text x="42.5" y="115" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2d3748">Китай</text>
    
    <rect x="65" y="40" width="25" height="60" fill="#3182ce" />
    <text x="77.5" y="115" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2d3748">Индия</text>
    
    <rect x="100" y="75" width="25" height="25" fill="#38a169" />
    <text x="112.5" y="115" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2d3748">США</text>
    
    <rect x="135" y="85" width="25" height="15" fill="#805ad5" />
    <text x="147.5" y="115" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2d3748">Индонезия</text>
  </g>
  
  <!-- Подпись к графику -->
  <text x="340" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2d3748">Население (млрд чел.)</text>
  
  <!-- Ключевые термины -->
  <g transform="translate(30, 300)">
    <rect x="0" y="0" width="140" height="30" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1" rx="3" />
    <text x="70" y="15" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2d3748">Территория государства</text>
    <text x="70" y="28" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#4a5568">пространство под суверенитетом</text>
  </g>
  
  <!-- Дополнительные элементы -->
  <circle cx="440" cy="320" r="15" fill="#38a169" filter="url(#shadow)" />
  <text x="440" y="325" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">195</text>
  <text x="440" y="340" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2d3748">стран</text>
  
  <!-- Декоративные элементы -->
  <path d="M 470,50 L 480,60 L 470,70 L 480,80" stroke="#3182ce" stroke-width="2" fill="none" />
  <path d="M 30,320 L 20,330 L 30,340 L 20,350" stroke="#3182ce" stroke-width="2" fill="none" />
  
  <!-- Формула: Плотность населения -->
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2d3748">Плотность населения = P/S</text>
  <text x="250" y="345" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#4a5568">P - население, S - площадь</text>
</svg>