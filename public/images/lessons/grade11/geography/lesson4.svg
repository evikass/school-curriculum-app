<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad3">
      <stop offset="0%" style="stop-color:#ffcc00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="3" rx="5" ry="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a90e2" stroke-width="1" rx="3" ry="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">ГЕОГРАФИЯ · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">Урок 4: Размещение и миграции</text>
  <text x="470" y="320" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#7f8c8d">№4</text>
  
  <!-- Карта мира (упрощенная) -->
  <g id="world-map">
    <path d="M50 100 Q80 90 120 95 L150 100 Q180 110 200 130 L220 150 L240 170 L250 180 L270 170 L290 150 L310 130 L340 110 L370 100 L400 110 L420 130 L440 150 L460 170 L480 190" fill="none" stroke="#4a90e2" stroke-width="2"/>
    <circle cx="120" cy="110" r="3" fill="#e74c3c"/>
    <circle cx="200" cy="140" r="3" fill="#e74c3c"/>
    <circle cx="300" cy="140" r="3" fill="#e74c3c"/>
    <circle cx="400" cy="120" r="3" fill="#e74c3c"/>
    <circle cx="460" cy="160" r="3" fill="#e74c3c"/>
  </g>
  
  <!-- График плотности населения -->
  <g id="population-density">
    <rect x="50" y="210" width="380" height="100" fill="url(#grad2)" stroke="#2c3e50" stroke-width="1"/>
    <line x1="70" y1="290" x2="70" y2="230" stroke="#2c3e50" stroke-width="1"/>
    <line x1="70" y1="290" x2="410" y2="290" stroke="#2c3e50" stroke-width="1"/>
    
    <!-- Столбцы графика -->
    <rect x="90" y="270" width="30" height="20" fill="url(#grad1)"/>
    <rect x="130" y="260" width="30" height="30" fill="url(#grad1)"/>
    <rect x="170" y="250" width="30" height="40" fill="url(#grad1)"/>
    <rect x="210" y="240" width="30" height="50" fill="url(#grad1)"/>
    <rect x="250" y="245" width="30" height="45" fill="url(#grad1)"/>
    <rect x="290" y="255" width="30" height="35" fill="url(#grad1)"/>
    <rect x="330" y="265" width="30" height="25" fill="url(#grad1)"/>
    <rect x="370" y="275" width="30" height="15" fill="url(#grad1)"/>
    
    <!-- Подписи графика -->
    <text x="250" y="305" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Регионы</text>
    <text x="50" y="250" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">чел/км²</text>
    <text x="105" y="285" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">15</text>
    <text x="145" y="285" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">25</text>
    <text x="185" y="285" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">35</text>
    <text x="225" y="285" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">45</text>
    <text x="265" y="285" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">40</text>
    <text x="305" y="285" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">30</text>
    <text x="345" y="285" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">20</text>
    <text x="385" y="285" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">10</text>
    
    <text x="250" y="225" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">Плотность населения</text>
  </g>
  
  <!-- Диаграмма миграций -->
  <g id="migration-chart">
    <circle cx="450" cy="80" r="15" fill="url(#grad3)"/>
    <text x="450" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">+5%</text>
    
    <circle cx="450" cy="120" r="15" fill="url(#grad3)"/>
    <text x="450" y="125" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">+3%</text>
    
    <circle cx="450" cy="160" r="15" fill="url(#grad3)"/>
    <text x="450" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">-2%</text>
    
    <circle cx="450" cy="200" r="15" fill="url(#grad3)"/>
    <text x="450" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#fff">-4%</text>
    
    <line x1="420" y1="80" x2="380" y2="100" stroke="#4a90e2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="420" y1="120" x2="380" y2="140" stroke="#4a90e2" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="420" y1="160" x2="380" y2="140" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="420" y1="200" x2="380" y2="180" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <text x="350" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">Въезд</text>
    <text x="350" y="125" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">Въезд</text>
    <text x="350" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">Выезд</text>
    <text x="350" y="185" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c3e50">Выезд</text>
    
    <text x="450" y="60" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">Миграция</text>
  </g>
  
  <!-- Формула плотности населения -->
  <g id="formula">
    <rect x="50" y="80" width="120" height="40" fill="white" stroke="#2c3e50" stroke-width="1" rx="3" ry="3"/>
    <text x="110" y="95" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">P = N/S</text>
    <text x="110" y="110" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">плотность = численность/площадь</text>
  </g>
  
  <!-- Ключевые термины -->
  <g id="terms">
    <rect x="180" y="80" width="230" height="40" fill="white" stroke="#2c3e50" stroke-width="1" rx="3" ry="3"/>
    <text x="295" y="95" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c3e50">Термины</text>
    <text x="295" y="110" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">расселение, миграция, урбанизация, демография</text>
  </g>
  
  <!-- Даты -->
  <g id="dates">
    <rect x="50" y="150" width="80" height="30" fill="white" stroke="#2c3e50" stroke-width="1" rx="3" ry="3"/>
    <text x="90" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">2023</text>
    <text x="90" y="177" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#7f8c8d">текущий год</text>
    
    <rect x="140" y="150" width="80" height="30" fill="white" stroke="#2c3e50" stroke-width="1" rx="3" ry="3"/>
    <text x="180" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">1950-2023</text>
    <text x="180" y="177" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#7f8c8d">динамика</text>
  </g>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90e2"/>
    </marker>
  </defs>
  
  <!-- Легенда карты -->
  <g id="map-legend">
    <rect x="230" y="90" width="10" height="10" fill="#e74c3c"/>
    <text x="245" y="100" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Крупные города</text>
    
    <line x1="230" y1="110" x2="240" y2="110" stroke="#4a90e2" stroke-width="2"/>
    <text x="245" y="115" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Границы регионов</text>
  </g>
  
  <!-- Иконки -->
  <g id="icons">
    <circle cx="30" cy="100" r="8" fill="#4a90e2"/>
    <text x="30" y="105" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">👥</text>
    
    <circle cx="30" cy="130" r="8" fill="#e74c3c"/>
    <text x="30" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">🏙️</text>
    
    <circle cx="30" cy="160" r="8" fill="#2ecc71"/>
    <text x="30" y="165" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">🌍</text>
  </g>
  
  <!-- Дополнительные элементы -->
  <rect x="430" y="90" width="60" height="100" fill="white" stroke="#2c3e50" stroke-width="1" rx="3" ry="3"/>
  <text x="460" y="105" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#2c3e50">Тренды</text>
  <line x1="440" y1="115" x2="480" y2="115" stroke="#2c3e50" stroke-width="1"/>
  <text x="460" y="130" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">+2.1%</text>
  <text x="460" y="145" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Годовой рост</text>
  <text x="460" y="160" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">+15.3 млн</text>
  <text x="460" y="175" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Абсолютный</text>
</svg>