<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7ED321;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5BA517;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D68910;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BD10E0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B0AA5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4A90E2" stroke-width="3"/>
  <rect x="20" y="20" width="460" height="310" fill="none" stroke="#4A90E2" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#4A90E2" font-weight="bold">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <rect x="440" y="25" width="40" height="25" fill="url(#grad1)" rx="5"/>
  <text x="460" y="42" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">7</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#2E5C8A" font-weight="bold">Промышленность мира</text>
  
  <!-- Основные отрасли промышленности -->
  <rect x="30" y="90" width="440" height="220" fill="white" stroke="#4A90E2" stroke-width="1" rx="5"/>
  
  <!-- Легенда -->
  <circle cx="50" cy="110" r="6" fill="url(#grad1)"/>
  <text x="65" y="115" font-family="Arial, sans-serif" font-size="12" fill="#333">Тяжелая промышленность</text>
  
  <circle cx="50" cy="130" r="6" fill="url(#grad2)"/>
  <text x="65" y="135" font-family="Arial, sans-serif" font-size="12" fill="#333">Легкая промышленность</text>
  
  <circle cx="50" cy="150" r="6" fill="url(#grad3)"/>
  <text x="65" y="155" font-family="Arial, sans-serif" font-size="12" fill="#333">Химическая промышленность</text>
  
  <circle cx="50" cy="170" r="6" fill="url(#grad4)"/>
  <text x="65" y="175" font-family="Arial, sans-serif" font-size="12" fill="#333">Высокие технологии</text>
  
  <!-- Схема распределения промышленности -->
  <line x1="250" y1="95" x2="250" y2="300" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Тяжелая промышленность -->
  <rect x="270" y="100" width="180" height="45" fill="url(#grad1)" rx="5"/>
  <text x="360" y="125" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Тяжелая промышленность</text>
  <text x="360" y="140" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Черная цветная металлургия</text>
  
  <!-- Подотрасли тяжелой промышленности -->
  <rect x="280" y="155" width="70" height="25" fill="#4A90E2" rx="3"/>
  <text x="315" y="172" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Машиностроение</text>
  
  <rect x="360" y="155" width="70" height="25" fill="#4A90E2" rx="3"/>
  <text x="395" y="172" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Металлообработка</text>
  
  <!-- Легкая промышленность -->
  <rect x="270" y="190" width="180" height="45" fill="url(#grad2)" rx="5"/>
  <text x="360" y="215" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Легкая промышленность</text>
  <text x="360" y="230" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Текстильная пищевая</text>
  
  <!-- Подотрасли легкой промышленности -->
  <rect x="280" y="245" width="70" height="25" fill="#7ED321" rx="3"/>
  <text x="315" y="262" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Текстиль</text>
  
  <rect x="360" y="245" width="70" height="25" fill="#7ED321" rx="3"/>
  <text x="395" y="262" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Пищевая</text>
  
  <!-- Химическая промышленность -->
  <rect x="40" y="100" width="180" height="45" fill="url(#grad3)" rx="5"/>
  <text x="130" y="125" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Химическая промышленность</text>
  <text x="130" y="140" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">Нефтехимия удобрения</text>
  
  <!-- Подотрасли химической промышленности -->
  <rect x="50" y="155" width="70" height="25" fill="#F5A623" rx="3"/>
  <text x="85" y="172" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Нефтехимия</text>
  
  <rect x="130" y="155" width="70" height="25" fill="#F5A623" rx="3"/>
  <text x="165" y="172" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Фармацевтика</text>
  
  <!-- Высокие технологии -->
  <rect x="40" y="190" width="180" height="45" fill="url(#grad4)" rx="5"/>
  <text x="130" y="215" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Высокие технологии</text>
  <text x="130" y="230" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="white">IT аэрокосмос</text>
  
  <!-- Подотрасли высоких технологий -->
  <rect x="50" y="245" width="70" height="25" fill="#BD10E0" rx="3"/>
  <text x="85" y="262" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">IT</text>
  
  <rect x="130" y="245" width="70" height="25" fill="#BD10E0" rx="3"/>
  <text x="165" y="262" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Биотехнологии</text>
  
  <!-- Статистика -->
  <text x="270" y="285" font-family="Arial, sans-serif" font-size="10" fill="#666">Доля в мировом ВВП: 25%</text>
  <text x="270" y="300" font-family="Arial, sans-serif" font-size="10" fill="#666">Занято: 450 млн человек</text>
  
  <!-- Дополнительные элементы -->
  <circle cx="460" cy="300" r="15" fill="#4A90E2" opacity="0.3"/>
  <text x="460" y="305" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#4A90E2">%</text>
  
  <!-- Стрелки соединения -->
  <path d="M130 145 L130 155" stroke="#F5A623" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M360 145 L360 155" stroke="#4A90E2" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M130 235 L130 245" stroke="#BD10E0" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M360 235 L360 245" stroke="#7ED321" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Стрелка -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Формула -->
  <rect x="30" y="315" width="100" height="10" fill="#E0E0E0" rx="2"/>
  <text x="80" y="324" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#333">Промышленность = Обрабатывающая + Добывающая</text>
</svg>