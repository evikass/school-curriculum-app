<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#33691E"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#33691E" stroke-width="2.5"/>
  <text x="250" y="40" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#33691E" text-anchor="middle">Экологические факторы</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#777" text-anchor="middle">Биология — Урок 5</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#33691E" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="72" width="470" height="230" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="72" width="470" height="230" fill="#F1F8E9" opacity="0.5"/>

    <!-- Central circle -->
    <circle cx="250" cy="165" r="42" fill="#33691E" opacity="0.1" stroke="#33691E" stroke-width="1.5"/>
    <text x="250" y="160" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">Экологические</text>
    <text x="250" y="173" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">факторы</text>

    <!-- Abiotic -->
    <rect x="25" y="80" width="140" height="90" rx="6" fill="white" stroke="#33691E" stroke-width="1.2"/>
    <rect x="25" y="80" width="140" height="16" rx="6" fill="#33691E" opacity="0.15"/>
    <text x="95" y="92" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">Абиотические</text>
    <text x="35" y="108" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">🌡 Температура</text>
    <text x="35" y="119" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">💧 Влажность</text>
    <text x="35" y="130" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">☀️ Освещённость</text>
    <text x="35" y="141" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">💨 Давление, ветер</text>
    <text x="35" y="152" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">🧪 Состав почвы, воды</text>
    <line x1="95" y1="96" x2="220" y2="145" stroke="#33691E" stroke-width="1" opacity="0.5"/>

    <!-- Biotic -->
    <rect x="180" y="215" width="140" height="80" rx="6" fill="white" stroke="#33691E" stroke-width="1.2"/>
    <rect x="180" y="215" width="140" height="16" rx="6" fill="#33691E" opacity="0.15"/>
    <text x="250" y="227" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">Биотические</text>
    <text x="190" y="243" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">🦊 Хищничество</text>
    <text x="190" y="254" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">🤝 Симбиоз</text>
    <text x="190" y="265" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">⚔️ Конкуренция</text>
    <text x="190" y="276" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">🦠 Паразитизм</text>
    <text x="190" y="287" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">🌿 Растительноядность</text>
    <line x1="250" y1="215" x2="250" y2="207" stroke="#33691E" stroke-width="1" opacity="0.5"/>

    <!-- Anthropogenic -->
    <rect x="340" y="80" width="130" height="90" rx="6" fill="white" stroke="#33691E" stroke-width="1.2"/>
    <rect x="340" y="80" width="130" height="16" rx="6" fill="#E53935" opacity="0.12"/>
    <text x="405" y="92" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Антропогенные</text>
    <text x="350" y="108" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">🏭 Загрязнение</text>
    <text x="350" y="119" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">🪓 Вырубка лесов</text>
    <text x="350" y="130" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">🏗️ Разрушение мест</text>
    <text x="355" y="141" font-family="Arial,sans-serif" font-size="7" fill="#33691E">обитания</text>
    <text x="350" y="152" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">☢️ Радиация, шум</text>
    <line x1="340" y1="135" x2="280" y2="150" stroke="#33691E" stroke-width="1" opacity="0.5"/>

    <!-- Limiting factor box -->
    <rect x="30" y="185" width="130" height="22" rx="4" fill="#A5D6A7" stroke="#33691E" stroke-width="0.8" opacity="0.8"/>
    <text x="95" y="200" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#33691E" text-anchor="middle">Закон минимума Либиха</text>

    <!-- Tolerance curve -->
    <rect x="340" y="200" width="130" height="55" rx="4" fill="white" stroke="#33691E" stroke-width="0.8"/>
    <text x="405" y="213" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#33691E" text-anchor="middle">Кривая толерантности</text>
    <path d="M355,245 Q370,225 385,220 Q400,225 415,245 Q425,250 430,248" fill="none" stroke="#33691E" stroke-width="1.5"/>
    <line x1="355" y1="248" x2="445" y2="248" stroke="#777" stroke-width="0.5"/>
    <text x="360" y="254" font-family="Arial,sans-serif" font-size="5.5" fill="#777">мин</text>
    <text x="385" y="254" font-family="Arial,sans-serif" font-size="5.5" fill="#777">оптимум</text>
    <text x="430" y="254" font-family="Arial,sans-serif" font-size="5.5" fill="#777">макс</text>

    <!-- Shelford law -->
    <rect x="340" y="260" width="130" height="20" rx="4" fill="#A5D6A7" stroke="#33691E" stroke-width="0.8" opacity="0.8"/>
    <text x="405" y="274" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#33691E" text-anchor="middle">Закон толерантности Шелфорда</text>
  </g>
  <line x1="30" y1="308" x2="470" y2="308" stroke="#33691E" stroke-width="1.5" opacity="0.25"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="11" fill="#33691E" text-anchor="middle">Биология · 11 класс</text>
</svg>