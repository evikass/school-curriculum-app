<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="sun" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFD54F"/><stop offset="100%" stop-color="#FF8F00"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Функции живого вещества в биосфере</text>

<!-- 1. Энергетическая (Energy) - Sun icon -->
<rect x="15" y="45" width="90" height="120" rx="8" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
<circle cx="60" cy="90" r="18" fill="url(#sun)"/>
<line x1="60" y1="65" x2="60" y2="58" stroke="#FF8F00" stroke-width="2"/>
<line x1="60" y1="115" x2="60" y2="122" stroke="#FF8F00" stroke-width="2"/>
<line x1="35" y1="90" x2="28" y2="90" stroke="#FF8F00" stroke-width="2"/>
<line x1="85" y1="90" x2="92" y2="90" stroke="#FF8F00" stroke-width="2"/>
<line x1="43" y1="73" x2="38" y2="68" stroke="#FF8F00" stroke-width="2"/>
<line x1="77" y1="107" x2="82" y2="112" stroke="#FF8F00" stroke-width="2"/>
<line x1="77" y1="73" x2="82" y2="68" stroke="#FF8F00" stroke-width="2"/>
<line x1="43" y1="107" x2="38" y2="112" stroke="#FF8F00" stroke-width="2"/>
<text x="60" y="140" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Энергети-</text>
<text x="60" y="150" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">ческая</text>
<text x="60" y="162" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Фотосинтез,</text>
<text x="60" y="170" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">преобразование</text>
<text x="60" y="178" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">солн. энергии</text>

<!-- 2. Газовая (Gas) - O2/CO2 -->
<rect x="115" y="45" width="90" height="120" rx="8" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
<text x="160" y="82" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">O₂</text>
<text x="160" y="100" font-family="Arial,sans-serif" font-size="11" fill="#388E3C" text-anchor="middle">↕</text>
<text x="160" y="118" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#C62828" text-anchor="middle">CO₂</text>
<text x="160" y="140" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Газовая</text>
<text x="160" y="155" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Обмен O₂ и CO₂</text>
<text x="160" y="165" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">между организмами</text>
<text x="160" y="175" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">и средой</text>

<!-- 3. Концентрационная - Magnifying glass -->
<rect x="215" y="45" width="90" height="120" rx="8" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
<circle cx="258" cy="88" r="16" fill="none" stroke="#2E7D32" stroke-width="3"/>
<line x1="269" y1="99" x2="282" y2="112" stroke="#2E7D32" stroke-width="3.5" stroke-linecap="round"/>
<text x="258" y="85" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Ca</text>
<text x="258" y="140" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Концентра-</text>
<text x="258" y="150" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">ционная</text>
<text x="258" y="163" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Накопление</text>
<text x="258" y="173" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">хим. элементов</text>
<text x="258" y="183" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">(Ca, P, Fe, Si)</text>

<!-- 4. Окислительно-восстановительная - Arrows -->
<rect x="315" y="45" width="90" height="120" rx="8" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
<text x="360" y="78" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#C62828" text-anchor="middle">↑</text>
<text x="360" y="95" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">окисление</text>
<text x="360" y="108" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#1565C0" text-anchor="middle">↓</text>
<text x="360" y="125" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">восстановление</text>
<text x="360" y="140" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">Окислит.-</text>
<text x="360" y="150" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">восстановит.</text>
<text x="360" y="163" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Хим. превращения</text>
<text x="360" y="173" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">с переносом</text>
<text x="360" y="183" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">электронов</text>

<!-- 5. Деструктивная - Recycling -->
<rect x="415" y="45" width="75" height="120" rx="8" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
<path d="M450 72 L462 82 L456 68 Z" fill="#2E7D32"/>
<path d="M462 82 Q472 95 458 102" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<path d="M458 102 L448 92 L454 106 Z" fill="#2E7D32"/>
<path d="M448 92 Q438 105 432 92" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<path d="M432 92 L442 82 L436 96 Z" fill="#2E7D32"/>
<path d="M442 82 Q438 68 450 72" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="452" y="140" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Деструк-</text>
<text x="452" y="150" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">тивная</text>
<text x="452" y="163" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Разрушение и</text>
<text x="452" y="173" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">минерализация</text>
<text x="452" y="183" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">органики</text>

<!-- Summary section -->
<rect x="15" y="180" width="470" height="80" rx="6" fill="white" opacity="0.5" stroke="#4CAF50" stroke-width="1"/>
<text x="250" y="198" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Живое вещество — движущая сила биосферы</text>

<text x="30" y="215" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Энергетическая: солнечная энергия → химическая (АТФ, органика)</text>
<text x="30" y="228" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Газовая: поддержание состава атмосферы (O₂ — 21%, CO₂ — 0,03%)</text>
<text x="30" y="241" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Концентрационная: организмы концентрируют элементы (раковины, кости)</text>
<text x="30" y="254" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Окислит.-восстановит.: преобразование веществ (Fe²⁺ → Fe³⁺, SO₄²⁻ → H₂S)</text>

<!-- Деструктивная on separate line -->
<text x="30" y="267" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Деструктивная: разложение органики до CO₂, H₂O, минеральных солей</text>

<!-- Bottom info -->
<rect x="15" y="275" width="470" height="55" rx="6" fill="#2E7D32" opacity="0.15"/>
<text x="250" y="293" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Значение функций живого вещества</text>
<text x="30" y="308" font-family="Arial,sans-serif" font-size="7.5" fill="#2E7D32">• Круговорот веществ — основа устойчивости биосферы</text>
<text x="30" y="320" font-family="Arial,sans-serif" font-size="7.5" fill="#2E7D32">• Поток энергии — движущая сила всех биосферных процессов</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="7" fill="#66BB6A" text-anchor="middle">Урок 32 · Функции живого вещества</text>
</svg>