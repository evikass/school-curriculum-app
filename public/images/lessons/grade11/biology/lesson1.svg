<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#33691E"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#33691E" stroke-width="2.5"/>
  <text x="250" y="40" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#33691E" text-anchor="middle">Развитие эволюционных идей</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#777" text-anchor="middle">Биология — Урок 1</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#33691E" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="72" width="470" height="230" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="72" width="470" height="230" fill="#F1F8E9" opacity="0.5"/>

    <!-- Timeline arrow -->
    <line x1="40" y1="180" x2="460" y2="180" stroke="#33691E" stroke-width="2" marker-end="url(#arrowhead)"/>
    <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#33691E"/>
    </marker></defs>
    
    <!-- Aristotle -->
    <circle cx="70" cy="180" r="8" fill="#8BC34A" stroke="#33691E" stroke-width="1.5"/>
    <text x="70" y="170" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">IV в. до н.э.</text>
    <text x="70" y="200" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Аристотель</text>
    <text x="70" y="210" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E" text-anchor="middle">Лестница</text>
    <text x="70" y="219" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E" text-anchor="middle">существ</text>

    <!-- Linnaeus -->
    <circle cx="145" cy="180" r="8" fill="#8BC34A" stroke="#33691E" stroke-width="1.5"/>
    <text x="145" y="170" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">XVIII в.</text>
    <text x="145" y="200" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Линней</text>
    <text x="145" y="210" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E" text-anchor="middle">Классификация</text>
    <text x="145" y="219" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E" text-anchor="middle">креационизм</text>

    <!-- Lamarck -->
    <circle cx="230" cy="180" r="8" fill="#A5D6A7" stroke="#33691E" stroke-width="1.5"/>
    <text x="230" y="170" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">1809</text>
    <text x="230" y="200" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Ламарк</text>
    <text x="230" y="210" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E" text-anchor="middle">Трудовая</text>
    <text x="230" y="219" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E" text-anchor="middle">наследственность</text>

    <!-- Darwin -->
    <circle cx="330" cy="180" r="10" fill="#8BC34A" stroke="#1B5E20" stroke-width="2"/>
    <text x="330" y="168" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">1859</text>
    <text x="330" y="200" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Дарвин</text>
    <text x="330" y="211" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">Естественный</text>
    <text x="330" y="220" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">отбор</text>

    <!-- Modern synthesis -->
    <circle cx="425" cy="180" r="8" fill="#A5D6A7" stroke="#33691E" stroke-width="1.5"/>
    <text x="425" y="170" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">XX в.</text>
    <text x="425" y="200" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Синтетич.</text>
    <text x="425" y="210" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E" text-anchor="middle">теория</text>
    <text x="425" y="219" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E" text-anchor="middle">эволюции</text>

    <!-- Key concepts box -->
    <rect x="30" y="233" width="440" height="58" rx="5" fill="white" stroke="#33691E" stroke-width="1" opacity="0.9"/>
    <text x="250" y="248" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">Ключевые идеи эволюции</text>
    <text x="45" y="262" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Изменчивость — источник разнообразия признаков</text>
    <text x="45" y="274" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Наследственность — передача признаков потомкам</text>
    <text x="45" y="286" font-family="Arial,sans-serif" font-size="7.5" fill="#33691E">• Естественный отбор — выживание наиболее приспособленных</text>

    <!-- Decorative DNA helix hint top-right -->
    <path d="M430,80 Q445,95 430,110 Q415,125 430,140" fill="none" stroke="#8BC34A" stroke-width="2" opacity="0.4"/>
    <path d="M445,80 Q430,95 445,110 Q460,125 445,140" fill="none" stroke="#A5D6A7" stroke-width="2" opacity="0.4"/>
  </g>
  <line x1="30" y1="308" x2="470" y2="308" stroke="#33691E" stroke-width="1.5" opacity="0.25"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="11" fill="#33691E" text-anchor="middle">Биология · 11 класс</text>
</svg>