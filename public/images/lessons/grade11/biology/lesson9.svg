<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#33691E"/>
      <stop offset="100%" stop-color="#558B2F"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#33691E" stroke-width="2.5"/>
  <text x="250" y="40" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#33691E" text-anchor="middle">Человек и биосфера</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="11" fill="#777" text-anchor="middle">Биология — Урок 9</text>
  <line x1="30" y1="66" x2="470" y2="66" stroke="#33691E" stroke-width="2" opacity="0.25"/>
  <clipPath id="ill"><rect x="15" y="72" width="470" height="230" rx="6"/></clipPath>
  <g clip-path="url(#ill)">
    <rect x="15" y="72" width="470" height="230" fill="#F1F8E9" opacity="0.5"/>

    <!-- Central: Human impact diagram -->
    <circle cx="250" cy="140" r="35" fill="#33691E" opacity="0.1" stroke="#33691E" stroke-width="1.5"/>
    <text x="250" y="136" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">Человек</text>
    <text x="250" y="149" font-family="Arial,sans-serif" font-size="7" fill="#33691E" text-anchor="middle">в биосфере</text>

    <!-- Negative impacts (left) -->
    <rect x="25" y="85" width="110" height="150" rx="5" fill="white" stroke="#E53935" stroke-width="1"/>
    <rect x="25" y="85" width="110" height="14" rx="5" fill="#FFCDD2" opacity="0.5"/>
    <text x="80" y="96" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">Отрицательное</text>
    <text x="35" y="113" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🏭 Загрязнение</text>
    <text x="35" y="125" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">   атмосферы, воды</text>
    <text x="35" y="138" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🌳 Обезлесение</text>
    <text x="35" y="150" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🦏 Сокращение</text>
    <text x="40" y="161" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">биоразнообразия</text>
    <text x="35" y="173" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🏜 Опустынивание</text>
    <text x="35" y="185" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🌡 Парниковый эффект</text>
    <text x="35" y="197" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🕳 Озоновые дыры</text>
    <text x="35" y="209" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">☢️ Радиоактивное</text>
    <text x="40" y="220" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">загрязнение</text>

    <!-- Positive actions (right) -->
    <rect x="365" y="85" width="110" height="150" rx="5" fill="white" stroke="#33691E" stroke-width="1"/>
    <rect x="365" y="85" width="110" height="14" rx="5" fill="#A5D6A7" opacity="0.5"/>
    <text x="420" y="96" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Положительное</text>
    <text x="375" y="113" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🏞 Заповедники</text>
    <text x="375" y="125" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🌲 Лесовосстановление</text>
    <text x="375" y="138" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">♻️ Очистка стоков</text>
    <text x="375" y="150" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">📑 Красная книга</text>
    <text x="375" y="163" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🌾 Селекция</text>
    <text x="375" y="175" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🔬 Биотехнологии</text>
    <text x="375" y="188" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">📊 Мониторинг</text>
    <text x="375" y="200" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">🌍 Международные</text>
    <text x="380" y="211" font-family="Arial,sans-serif" font-size="6.5" fill="#33691E">соглашения</text>

    <!-- Noosphere concept -->
    <rect x="25" y="245" width="220" height="55" rx="5" fill="white" stroke="#33691E" stroke-width="1"/>
    <text x="135" y="260" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Ноосфера (Вернадский)</text>
    <text x="35" y="274" font-family="Arial,sans-serif" font-size="7" fill="#33691E">Сфера разума — этап эволюции биосферы,</text>
    <text x="35" y="285" font-family="Arial,sans-serif" font-size="7" fill="#33691E">где разумная деятельность человека</text>
    <text x="35" y="296" font-family="Arial,sans-serif" font-size="7" fill="#33691E">становится главным геохимическим фактором</text>

    <!-- Sustainable development -->
    <rect x="260" y="245" width="215" height="55" rx="5" fill="white" stroke="#33691E" stroke-width="1"/>
    <text x="367" y="260" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#33691E" text-anchor="middle">Устойчивое развитие</text>
    <text x="270" y="274" font-family="Arial,sans-serif" font-size="7" fill="#33691E">📊 Экономика + Экология + Социум</text>
    <text x="270" y="285" font-family="Arial,sans-serif" font-size="7" fill="#33691E">🎯 Цели устойчивого развития ООН</text>
    <text x="270" y="296" font-family="Arial,sans-serif" font-size="7" fill="#33691E">♻️ Рациональное природопользование</text>
  </g>
  <line x1="30" y1="308" x2="470" y2="308" stroke="#33691E" stroke-width="1.5" opacity="0.25"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="11" fill="#33691E" text-anchor="middle">Биология · 11 класс</text>
</svg>