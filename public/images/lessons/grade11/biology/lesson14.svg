<rect x="30" y="230" width="440" height="50" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="244" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Дриопитек(20млн) - Австралопитек(4млн) - Ч.умелый(2млн) - Ч.прямоходящий - Неандерталец(200тыс) - Кроманьонец(40тыс)</text>
<text x="250" y="255" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Биологические: наследственность, изменчивость, борьба за существование, отбор</text>
<text x="250" y="266" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Социальные: труд (орудия), речь (общение), общество (совместная деятельность)</text>

