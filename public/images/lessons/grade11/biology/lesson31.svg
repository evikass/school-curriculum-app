<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EDE7F6"/><stop offset="100%" stop-color="#D1C4E9"/></linearGradient>
<linearGradient id="sil" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5E35B1"/><stop offset="100%" stop-color="#311B92"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5E35B1" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#311B92" text-anchor="middle">В.И. Вернадский — основоположник учения о биосфере</text>

<!-- Portrait silhouette -->
<ellipse cx="90" cy="140" rx="35" ry="42" fill="url(#sil)"/>
<path d="M55 135 Q60 95 90 90 Q120 95 125 135 L128 160 Q128 170 120 172 L60 172 Q52 170 52 160 Z" fill="url(#sil)"/>
<!-- Glasses -->
<circle cx="78" cy="128" r="8" fill="none" stroke="#D1C4E9" stroke-width="1.5"/>
<circle cx="102" cy="128" r="8" fill="none" stroke="#D1C4E9" stroke-width="1.5"/>
<line x1="86" y1="128" x2="94" y2="128" stroke="#D1C4E9" stroke-width="1.2"/>
<!-- Beard -->
<path d="M70 145 Q75 165 90 170 Q105 165 110 145" fill="#4A2B8E" stroke="none"/>

<text x="90" y="195" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#311B92" text-anchor="middle">В.И. Вернадский</text>
<text x="90" y="210" font-family="Arial,sans-serif" font-size="9" fill="#5E35B1" text-anchor="middle">1863–1945</text>

<!-- Биосфера box -->
<rect x="150" y="50" width="140" height="55" rx="8" fill="#7E57C2" opacity="0.85"/>
<text x="220" y="72" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Биосфера</text>
<text x="220" y="88" font-family="Arial,sans-serif" font-size="8" fill="#EDE7F6" text-anchor="middle">Оболочка Земли, заселённая</text>
<text x="220" y="98" font-family="Arial,sans-serif" font-size="8" fill="#EDE7F6" text-anchor="middle">живыми организмами</text>

<!-- Ноосфера box -->
<rect x="310" y="50" width="140" height="55" rx="8" fill="#4527A0" opacity="0.85"/>
<text x="380" y="72" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Ноосфера</text>
<text x="380" y="88" font-family="Arial,sans-serif" font-size="8" fill="#D1C4E9" text-anchor="middle">Сфера разума — этап эволюции</text>
<text x="380" y="98" font-family="Arial,sans-serif" font-size="8" fill="#D1C4E9" text-anchor="middle">биосферы под влиянием разума</text>

<!-- Arrow from Биосфера to Ноосфера -->
<line x1="290" y1="77" x2="308" y2="77" stroke="#311B92" stroke-width="2" marker-end="url(#arrowhead)"/>
<defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#311B92"/></marker></defs>

<!-- Timeline -->
<line x1="25" y1="240" x2="475" y2="240" stroke="#5E35B1" stroke-width="2.5"/>
<!-- Timeline dots and labels -->
<circle cx="55" cy="240" r="5" fill="#7E57C2"/>
<text x="55" y="260" font-family="Arial,sans-serif" font-size="8" fill="#311B92" text-anchor="middle">1863</text>
<text x="55" y="270" font-family="Arial,sans-serif" font-size="7" fill="#5E35B1" text-anchor="middle">Рождение</text>

<circle cx="130" cy="240" r="5" fill="#7E57C2"/>
<text x="130" y="260" font-family="Arial,sans-serif" font-size="8" fill="#311B92" text-anchor="middle">1885</text>
<text x="130" y="270" font-family="Arial,sans-serif" font-size="7" fill="#5E35B1" text-anchor="middle">Минералогия</text>

<circle cx="210" cy="240" r="5" fill="#7E57C2"/>
<text x="210" y="260" font-family="Arial,sans-serif" font-size="8" fill="#311B92" text-anchor="middle">1915</text>
<text x="210" y="270" font-family="Arial,sans-serif" font-size="7" fill="#5E35B1" text-anchor="middle">Биогеохимия</text>

<circle cx="290" cy="240" r="5" fill="#7E57C2"/>
<text x="290" y="260" font-family="Arial,sans-serif" font-size="8" fill="#311B92" text-anchor="middle">1926</text>
<text x="290" y="270" font-family="Arial,sans-serif" font-size="7" fill="#5E35B1" text-anchor="middle">«Биосфера»</text>

<circle cx="370" cy="240" r="5" fill="#7E57C2"/>
<text x="370" y="260" font-family="Arial,sans-serif" font-size="8" fill="#311B92" text-anchor="middle">1938</text>
<text x="370" y="270" font-family="Arial,sans-serif" font-size="7" fill="#5E35B1" text-anchor="middle">«Ноосфера»</text>

<circle cx="440" cy="240" r="5" fill="#7E57C2"/>
<text x="440" y="260" font-family="Arial,sans-serif" font-size="8" fill="#311B92" text-anchor="middle">1945</text>
<text x="440" y="270" font-family="Arial,sans-serif" font-size="7" fill="#5E35B1" text-anchor="middle">Кончина</text>

<!-- Key ideas -->
<rect x="150" y="120" width="310" height="95" rx="6" fill="white" opacity="0.6" stroke="#9575CD" stroke-width="1"/>
<text x="305" y="137" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#311B92" text-anchor="middle">Ключевые идеи</text>
<text x="160" y="153" font-family="Arial,sans-serif" font-size="8.5" fill="#4527A0">• Живое вещество — совокупность всех живых организмов</text>
<text x="160" y="166" font-family="Arial,sans-serif" font-size="8.5" fill="#4527A0">• Биосфера — область распространения жизни на Земле</text>
<text x="160" y="179" font-family="Arial,sans-serif" font-size="8.5" fill="#4527A0">• Космическая роль живого вещества — преобразование энергии</text>
<text x="160" y="192" font-family="Arial,sans-serif" font-size="8.5" fill="#4527A0">• Ноосфера — новое состояние биосферы (сфера разума)</text>
<text x="160" y="205" font-family="Arial,sans-serif" font-size="8.5" fill="#4527A0">• Человечество — мощная геологическая сила</text>

<!-- Bottom quote -->
<text x="250" y="300" font-family="Arial,sans-serif" font-size="8" font-style="italic" fill="#5E35B1" text-anchor="middle">«Биосфера переходит в новое эволюционное состояние — ноосферу»</text>
<text x="250" y="315" font-family="Arial,sans-serif" font-size="7" fill="#7E57C2" text-anchor="middle">В.И. Вернадский</text>

<!-- Decorative Earth circle -->
<circle cx="460" cy="330" r="25" fill="#B39DDB" opacity="0.3"/>
<ellipse cx="460" cy="325" rx="18" ry="12" fill="#7E57C2" opacity="0.3"/>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="7" fill="#9575CD" text-anchor="middle">Урок 31 · Учение В.И. Вернадского о биосфере и ноосфере</text>
</svg>