<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs><linearGradient id="bg24" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
  <rect width="400" height="300" fill="url(#bg24)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Резонанс в электрической цепи</text>
  <!-- Resonance curve -->
  <text x="130" y="48" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Резонансная кривая I(v)</text>
  <line x1="40" y1="200" x2="230" y2="200" stroke="#dfe6e9" stroke-width="1"/>
  <line x1="130" y1="200" x2="130" y2="55" stroke="#dfe6e9" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="235" y="205" fill="#dfe6e9" font-size="8">v</text>
  <text x="25" y="60" fill="#dfe6e9" font-size="8">I</text>
  <!-- High Q -->
  <path d="M45,198 Q70,195 100,150 Q115,110 130,65 Q145,110 160,150 Q190,195 220,198" fill="none" stroke="#55efc4" stroke-width="2.5"/>
  <text x="160" y="95" fill="#55efc4" font-size="8">Q велико</text>
  <!-- Low Q -->
  <path d="M45,195 Q70,190 100,170 Q115,155 130,145 Q145,155 160,170 Q190,190 220,195" fill="none" stroke="#ff7675" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="160" y="160" fill="#ff7675" font-size="8">Q мало</text>
  <!-- v_0 -->
  <text x="130" y="215" text-anchor="middle" fill="#ffd700" font-size="9">v_0 = 1/(2п*sqrt(LC))</text>
  <!-- I_max -->
  <line x1="35" y1="65" x2="45" y2="65" stroke="#55efc4" stroke-width="0.5"/>
  <text x="22" y="68" fill="#55efc4" font-size="7">I_max</text>
  <!-- Conditions at resonance -->
  <rect x="250" y="40" width="140" height="115" rx="8" fill="#2d3436" opacity="0.7"/>
  <text x="320" y="60" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">При резонансе</text>
  <text x="260" y="80" fill="#55efc4" font-size="9">X_L = X_C</text>
  <text x="260" y="95" fill="#ff7675" font-size="9">Z = R (минимум)</text>
  <text x="260" y="110" fill="#74b9ff" font-size="9">I = U/R (максимум)</text>
  <text x="260" y="125" fill="#ffd700" font-size="9">ф = 0</text>
  <text x="260" y="145" fill="#a29bfe" font-size="8">U_L = U_C >> U !</text>
  <!-- Quality factor -->
  <text x="320" y="180" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Добротность</text>
  <text x="320" y="200" text-anchor="middle" fill="#ff7675" font-size="14" font-weight="bold">Q = wL/R</text>
  <text x="320" y="220" text-anchor="middle" fill="#dfe6e9" font-size="9">U_L = Q * U при резонансе</text>
  <!-- Applications -->
  <rect x="20" y="230" width="360" height="60" rx="8" fill="#2d3436" opacity="0.5"/>
  <text x="200" y="250" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Применение</text>
  <text x="100" y="268" text-anchor="middle" fill="#dfe6e9" font-size="9">Настройка радио</text>
  <text x="200" y="268" text-anchor="middle" fill="#dfe6e9" font-size="9">Фильтры частот</text>
  <text x="310" y="268" text-anchor="middle" fill="#dfe6e9" font-size="9">Усилители</text>
  <text x="200" y="285" text-anchor="middle" fill="#636e72" font-size="8">Меняем C -> меняем v_0 -> настраиваемся на станцию</text>
</svg>