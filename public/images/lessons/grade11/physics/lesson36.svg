<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Следствия СТО</text>
<!-- Time dilation -->
<rect x="20" y="38" width="180" height="80" rx="8" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1"/>
<text x="110" y="58" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Замедление времени</text>
<!-- Two clocks -->
<circle cx="60" cy="85" r="15" fill="none" stroke="#ffd700" stroke-width="1.5"/>
<line x1="60" y1="85" x2="60" y2="73" stroke="#ffd700" stroke-width="1.5"/>
<line x1="60" y1="85" x2="68" y2="85" stroke="#ffd700" stroke-width="1"/>
<text x="60" y="108" text-anchor="middle" fill="#ffd700" font-size="8">t0</text>
<circle cx="140" cy="85" r="15" fill="none" stroke="#ff7675" stroke-width="1.5"/>
<line x1="140" y1="85" x2="140" y2="78" stroke="#ff7675" stroke-width="1.5"/>
<text x="140" y="108" text-anchor="middle" fill="#ff7675" font-size="8">t > t0</text>
<text x="110" y="75" text-anchor="middle" fill="#dfe6e9" font-size="7">v -></text>
<!-- Length contraction -->
<rect x="210" y="38" width="180" height="80" rx="8" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1"/>
<text x="300" y="58" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Сокращение длины</text>
<rect x="235" y="72" width="40" height="15" rx="3" fill="#55efc4" opacity="0.5"/>
<text x="255" y="83" text-anchor="middle" fill="#fff" font-size="7">l0</text>
<rect x="300" y="72" width="25" height="15" rx="3" fill="#ff7675" opacity="0.5"/>
<text x="312" y="83" text-anchor="middle" fill="#fff" font-size="7">l&lt;l0</text>
<text x="300" y="100" text-anchor="middle" fill="#636e72" font-size="7">движущийся — короче</text>
<!-- Formulas -->
<text x="200" y="145" text-anchor="middle" fill="#55efc4" font-size="14" font-weight="bold">t = t0 / sqrt(1-v2/c2)</text>
<text x="200" y="170" text-anchor="middle" fill="#ff7675" font-size="14" font-weight="bold">l = l0 * sqrt(1-v2/c2)</text>
<!-- Gamma factor -->
<text x="200" y="195" text-anchor="middle" fill="#ffd700" font-size="11">g = 1/sqrt(1-v2/c2)</text>
<!-- Twin paradox -->
<rect x="20" y="210" width="360" height="80" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="230" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Парадокс близнецов</text>
<!-- Twin A (Earth) -->
<circle cx="80" cy="255" r="12" fill="#55efc4" opacity="0.5"/>
<text x="80" y="258" text-anchor="middle" fill="#fff" font-size="8">A</text>
<text x="80" y="278" text-anchor="middle" fill="#636e72" font-size="7">Земля: старший</text>
<!-- Twin B (Rocket) -->
<circle cx="200" cy="255" r="10" fill="#ff7675" opacity="0.5"/>
<text x="200" y="258" text-anchor="middle" fill="#fff" font-size="8">B</text>
<text x="200" y="278" text-anchor="middle" fill="#636e72" font-size="7">v~c: младший!</text>
<!-- Rocket -->
<path d="M220,250 L240,245 L240,265 L220,260 Z" fill="#74b9ff" opacity="0.5"/>
<text x="260" y="258" fill="#74b9ff" font-size="7">ракета</text>
</svg>