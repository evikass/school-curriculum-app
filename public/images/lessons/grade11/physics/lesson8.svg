<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg8)"/>
  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Правила Кирхгофа</text>
  <!-- Complex circuit -->
  <!-- Node A -->
  <circle cx="80" cy="80" r="4" fill="#ffd700"/>
  <text x="72" y="75" fill="#ffd700" font-size="9">A</text>
  <!-- Node B -->
  <circle cx="300" cy="80" r="4" fill="#ffd700"/>
  <text x="305" y="75" fill="#ffd700" font-size="9">B</text>
  <!-- Node C -->
  <circle cx="300" cy="200" r="4" fill="#ffd700"/>
  <text x="305" y="195" fill="#ffd700" font-size="9">C</text>
  <!-- Node D -->
  <circle cx="80" cy="200" r="4" fill="#ffd700"/>
  <text x="65" y="195" fill="#ffd700" font-size="9">D</text>
  <!-- Top branch: A -> B -->
  <line x1="84" y1="80" x2="140" y2="80" stroke="#dfe6e9" stroke-width="1.5"/>
  <rect x="140" y="70" width="40" height="20" rx="3" fill="#0984e3" opacity="0.5" stroke="#74b9ff" stroke-width="1"/>
  <text x="160" y="84" text-anchor="middle" fill="#74b9ff" font-size="9">R1</text>
  <line x1="180" y1="80" x2="220" y2="80" stroke="#dfe6e9" stroke-width="1.5"/>
  <rect x="220" y="70" width="50" height="20" rx="3" fill="#e17055" opacity="0.5" stroke="#fab1a0" stroke-width="1"/>
  <text x="245" y="84" text-anchor="middle" fill="#fab1a0" font-size="8">E1, r1</text>
  <line x1="270" y1="80" x2="296" y2="80" stroke="#dfe6e9" stroke-width="1.5"/>
  <text x="190" y="72" fill="#55efc4" font-size="8">I1 -></text>
  <!-- Right branch: B -> C -->
  <line x1="300" y1="84" x2="300" y2="110" stroke="#dfe6e9" stroke-width="1.5"/>
  <rect x="290" y="110" width="20" height="40" rx="3" fill="#0984e3" opacity="0.5" stroke="#74b9ff" stroke-width="1"/>
  <text x="300" y="134" text-anchor="middle" fill="#74b9ff" font-size="9">R2</text>
  <line x1="300" y1="150" x2="300" y2="196" stroke="#dfe6e9" stroke-width="1.5"/>
  <text x="315" y="140" fill="#55efc4" font-size="8">I2</text>
  <!-- Bottom branch: C -> D -->
  <line x1="296" y1="200" x2="240" y2="200" stroke="#dfe6e9" stroke-width="1.5"/>
  <rect x="190" y="190" width="50" height="20" rx="3" fill="#e17055" opacity="0.5" stroke="#fab1a0" stroke-width="1"/>
  <text x="215" y="204" text-anchor="middle" fill="#fab1a0" font-size="8">E2, r2</text>
  <line x1="190" y1="200" x2="84" y2="200" stroke="#dfe6e9" stroke-width="1.5"/>
  <text x="150" y="215" fill="#55efc4" font-size="8">I3 <-</text>
  <!-- Left branch: D -> A -->
  <line x1="80" y1="196" x2="80" y2="155" stroke="#dfe6e9" stroke-width="1.5"/>
  <rect x="70" y="110" width="20" height="45" rx="3" fill="#0984e3" opacity="0.5" stroke="#74b9ff" stroke-width="1"/>
  <text x="80" y="137" text-anchor="middle" fill="#74b9ff" font-size="9">R3</text>
  <line x1="80" y1="110" x2="80" y2="84" stroke="#dfe6e9" stroke-width="1.5"/>
  <!-- Loop arrows -->
  <path d="M130,60 Q190,45 250,60" fill="none" stroke="#a29bfe" stroke-width="1.5"/>
  <polygon points="250,57 256,62 248,64" fill="#a29bfe"/>
  <text x="190" y="48" text-anchor="middle" fill="#a29bfe" font-size="8">контур 1</text>
  <!-- Rules text -->
  <rect x="10" y="230" width="185" height="60" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="102" y="248" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">1 правило (узел):</text>
  <text x="102" y="265" text-anchor="middle" fill="#dfe6e9" font-size="9">I1 + I2 + ... = 0</text>
  <text x="102" y="280" text-anchor="middle" fill="#636e72" font-size="8">Закон сохранения заряда</text>
  <rect x="205" y="230" width="185" height="60" rx="5" fill="#2d3436" opacity="0.7"/>
  <text x="297" y="248" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">2 правило (контур):</text>
  <text x="297" y="265" text-anchor="middle" fill="#dfe6e9" font-size="9">Sum(Ei) = Sum(Ii*Ri)</text>
  <text x="297" y="280" text-anchor="middle" fill="#636e72" font-size="8">Закон Ома для контура</text>
</svg>