<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs><linearGradient id="bg21" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
  <rect width="400" height="300" fill="url(#bg21)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Колебательный контур</text>
  <!-- Circuit -->
  <!-- Capacitor -->
  <line x1="80" y1="50" x2="80" y2="80" stroke="#ffd700" stroke-width="2"/>
  <line x1="65" y1="80" x2="95" y2="80" stroke="#74b9ff" stroke-width="3"/>
  <line x1="65" y1="90" x2="95" y2="90" stroke="#74b9ff" stroke-width="3"/>
  <line x1="80" y1="90" x2="80" y2="120" stroke="#ffd700" stroke-width="2"/>
  <text x="105" y="88" fill="#74b9ff" font-size="10">C</text>
  <!-- Wire to coil -->
  <line x1="80" y1="50" x2="200" y2="50" stroke="#ffd700" stroke-width="2"/>
  <line x1="80" y1="120" x2="200" y2="120" stroke="#ffd700" stroke-width="2"/>
  <!-- Coil -->
  <path d="M200,50 C205,40 210,60 215,50 C220,40 225,60 230,50 C235,40 240,60 245,50 C250,40 255,60 260,50 C265,40 270,60 275,50 C280,40 285,60 290,50" fill="none" stroke="#ff7675" stroke-width="2"/>
  <text x="250" y="38" text-anchor="middle" fill="#ff7675" font-size="10">L</text>
  <!-- B field in coil -->
  <line x1="210" y1="55" x2="280" y2="55" stroke="#55efc4" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="245" y="68" text-anchor="middle" fill="#55efc4" font-size="7">B</text>
  <!-- 4 stages -->
  <g transform="translate(0,140)">
    <text x="200" y="10" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Процессы за период</text>
    <!-- Stage 1: C charged, I=0 -->
    <rect x="10" y="20" width="90" height="55" rx="5" fill="#2d3436" opacity="0.6"/>
    <text x="55" y="38" text-anchor="middle" fill="#74b9ff" font-size="8" font-weight="bold">t=0</text>
    <line x1="30" y1="50" x2="30" y2="42" stroke="#74b9ff" stroke-width="2"/>
    <line x1="22" y1="50" x2="38" y2="50" stroke="#74b9ff" stroke-width="2"/>
    <line x1="65" y1="42" x2="65" y2="58" stroke="#74b9ff" stroke-width="2"/>
    <text x="55" y="68" text-anchor="middle" fill="#636e72" font-size="7">C заряжен, I=0</text>
    <!-- Stage 2: C discharging, I grows -->
    <rect x="108" y="20" width="90" height="55" rx="5" fill="#2d3436" opacity="0.6"/>
    <text x="153" y="38" text-anchor="middle" fill="#55efc4" font-size="8" font-weight="bold">t=T/4</text>
    <line x1="130" y1="50" x2="150" y2="50" stroke="#ffd700" stroke-width="1.5"/>
    <polygon points="148,47 155,50 148,53" fill="#ffd700"/>
    <text x="153" y="68" text-anchor="middle" fill="#636e72" font-size="7">I=max, C=0</text>
    <!-- Stage 3: C recharged -->
    <rect x="206" y="20" width="90" height="55" rx="5" fill="#2d3436" opacity="0.6"/>
    <text x="251" y="38" text-anchor="middle" fill="#ff7675" font-size="8" font-weight="bold">t=T/2</text>
    <line x1="230" y1="42" x2="230" y2="58" stroke="#ff7675" stroke-width="2"/>
    <line x1="222" y1="50" x2="238" y2="50" stroke="#ff7675" stroke-width="2"/>
    <line x1="265" y1="50" x2="265" y2="42" stroke="#ff7675" stroke-width="2"/>
    <text x="251" y="68" text-anchor="middle" fill="#636e72" font-size="7">C перезаряжен, I=0</text>
    <!-- Stage 4: C charging back -->
    <rect x="304" y="20" width="90" height="55" rx="5" fill="#2d3436" opacity="0.6"/>
    <text x="349" y="38" text-anchor="middle" fill="#a29bfe" font-size="8" font-weight="bold">t=3T/4</text>
    <line x1="325" y1="50" x2="345" y2="50" stroke="#ffd700" stroke-width="1.5"/>
    <polygon points="327,53 320,50 327,47" fill="#ffd700"/>
    <text x="349" y="68" text-anchor="middle" fill="#636e72" font-size="7">I=max обратн.</text>
  </g>
  <!-- Thomson formula -->
  <text x="200" y="230" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Формула Томсона</text>
  <text x="200" y="255" text-anchor="middle" fill="#55efc4" font-size="18" font-weight="bold">T = 2п*sqrt(LC)</text>
  <text x="200" y="275" text-anchor="middle" fill="#ff7675" font-size="10">w = 1/sqrt(LC)</text>
  <!-- Energy -->
  <text x="200" y="295" text-anchor="middle" fill="#a29bfe" font-size="9">W = q2/(2C) + LI2/2 = const</text>
</svg>