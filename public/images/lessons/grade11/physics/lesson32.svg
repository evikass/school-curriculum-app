<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Интерференция света</text>
<!-- Young's experiment -->
<text x="120" y="48" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Опыт Юнга</text>
<!-- Source -->
<circle cx="30" cy="90" r="5" fill="#ffd700"/>
<text x="30" y="108" text-anchor="middle" fill="#ffd700" font-size="7">S</text>
<!-- Slits -->
<line x1="80" y1="70" x2="80" y2="82" stroke="#dfe6e9" stroke-width="2"/>
<line x1="80" y1="98" x2="80" y2="110" stroke="#dfe6e9" stroke-width="2"/>
<line x1="80" y1="82" x2="80" y2="98" stroke="#636e72" stroke-width="1"/>
<text x="72" y="95" fill="#dfe6e9" font-size="6">S1</text>
<text x="72" y="85" fill="#dfe6e9" font-size="6">S2</text>
<!-- Waves from slits -->
<path d="M80,82 Q110,75 140,82" fill="none" stroke="#55efc4" stroke-width="0.8"/>
<path d="M80,82 Q110,90 140,82" fill="none" stroke="#55efc4" stroke-width="0.8"/>
<path d="M80,98 Q110,92 140,98" fill="none" stroke="#74b9ff" stroke-width="0.8"/>
<path d="M80,98 Q110,105 140,98" fill="none" stroke="#74b9ff" stroke-width="0.8"/>
<!-- Screen with pattern -->
<line x1="185" y1="55" x2="185" y2="125" stroke="#dfe6e9" stroke-width="2"/>
<!-- Interference pattern -->
<rect x="187" y="58" width="8" height="4" rx="1" fill="#ffd700" opacity="0.9"/>
<rect x="187" y="65" width="8" height="3" rx="1" fill="#ffd700" opacity="0.3"/>
<rect x="187" y="70" width="8" height="4" rx="1" fill="#ffd700" opacity="0.8"/>
<rect x="187" y="77" width="8" height="3" rx="1" fill="#ffd700" opacity="0.2"/>
<rect x="187" y="82" width="8" height="5" rx="1" fill="#ffd700" opacity="1"/>
<rect x="187" y="90" width="8" height="3" rx="1" fill="#ffd700" opacity="0.2"/>
<rect x="187" y="95" width="8" height="4" rx="1" fill="#ffd700" opacity="0.8"/>
<rect x="187" y="102" width="8" height="3" rx="1" fill="#ffd700" opacity="0.3"/>
<rect x="187" y="107" width="8" height="4" rx="1" fill="#ffd700" opacity="0.9"/>
<text x="195" y="92" fill="#dfe6e9" font-size="7">max</text>
<text x="195" y="82" fill="#636e72" font-size="6">min</text>
<!-- Formulas -->
<text x="300" y="60" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Максимум:</text>
<text x="300" y="78" text-anchor="middle" fill="#55efc4" font-size="12" font-weight="bold">d = kl</text>
<text x="300" y="100" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Минимум:</text>
<text x="300" y="118" text-anchor="middle" fill="#ff7675" font-size="12" font-weight="bold">d = (2k+1)l/2</text>
<!-- Applications -->
<rect x="20" y="140" width="360" height="150" rx="8" fill="#2d3436" opacity="0.5"/>
<text x="200" y="160" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Применения интерференции</text>
<text x="50" y="185" fill="#55efc4" font-size="9">Просветлённая оптика</text>
<text x="50" y="200" fill="#636e72" font-size="7">Плёнка l/4 гасит отражение</text>
<text x="50" y="220" fill="#74b9ff" font-size="9">Кольца Ньютона</text>
<text x="50" y="235" fill="#636e72" font-size="7">Проверка качества поверхностей</text>
<text x="50" y="255" fill="#ff7675" font-size="9">Интерферометры</text>
<text x="50" y="270" fill="#636e72" font-size="7">Точное измерение расстояний</text>
<text x="220" y="185" fill="#a29bfe" font-size="9">Голография</text>
<text x="220" y="200" fill="#636e72" font-size="7">3D изображения на плёнке</text>
<text x="220" y="220" fill="#ffd700" font-size="9">Тонкие плёнки</text>
<text x="220" y="235" fill="#636e72" font-size="7">Мыльные пузыри, масляные пятна</text>
</svg>