<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Поляризация света</text>
<!-- Natural light -->
<text x="100" y="50" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Естественный</text>
<circle cx="100" cy="80" r="25" fill="none" stroke="#ffd700" stroke-width="1.5"/>
<line x1="100" y1="55" x2="100" y2="105" stroke="#ff7675" stroke-width="1"/>
<line x1="75" y1="80" x2="125" y2="80" stroke="#ff7675" stroke-width="1"/>
<line x1="82" y1="62" x2="118" y2="98" stroke="#ff7675" stroke-width="1"/>
<line x1="118" y1="62" x2="82" y2="98" stroke="#ff7675" stroke-width="1"/>
<text x="100" y="118" text-anchor="middle" fill="#636e72" font-size="7">E во всех направлениях</text>
<!-- Polarized light -->
<text x="300" y="50" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Поляризованный</text>
<circle cx="300" cy="80" r="25" fill="none" stroke="#55efc4" stroke-width="1.5"/>
<line x1="300" y1="55" x2="300" y2="105" stroke="#ff7675" stroke-width="2.5"/>
<text x="300" y="118" text-anchor="middle" fill="#636e72" font-size="7">E в одном направлении</text>
<!-- Arrow between -->
<line x1="130" y1="80" x2="270" y2="80" stroke="#ffd700" stroke-width="1.5"/>
<polygon points="268,77 275,80 268,83" fill="#ffd700"/>
<text x="200" y="75" text-anchor="middle" fill="#ffd700" font-size="7">поляризатор</text>
<!-- Malus law -->
<rect x="20" y="135" width="360" height="60" rx="8" fill="#6c5ce7" opacity="0.2" stroke="#a29bfe" stroke-width="1"/>
<text x="200" y="155" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Закон Малюса</text>
<text x="200" y="178" text-anchor="middle" fill="#ff7675" font-size="18" font-weight="bold">I = I0 * cos2(a)</text>
<!-- Graph -->
<line x1="50" y1="250" x2="350" y2="250" stroke="#dfe6e9" stroke-width="1"/>
<line x1="50" y1="250" x2="50" y2="200" stroke="#dfe6e9" stroke-width="1"/>
<text x="355" y="253" fill="#dfe6e9" font-size="7">a</text>
<text x="35" y="205" fill="#dfe6e9" font-size="7">I</text>
<path d="M50,210 Q80,240 110,250 Q140,255 170,250 Q200,240 230,230 Q260,220 290,215 Q320,212 350,210" fill="none" stroke="#55efc4" stroke-width="2"/>
<text x="55" y="207" fill="#ff7675" font-size="7">I0</text>
<text x="80" y="248" fill="#ffd700" font-size="7">0</text>
<text x="130" y="248" fill="#ffd700" font-size="7">30</text>
<text x="200" y="248" fill="#ffd700" font-size="7">60</text>
<text x="270" y="248" fill="#ffd700" font-size="7">90</text>
<text x="200" y="270" text-anchor="middle" fill="#636e72" font-size="8">a=0: I=I0 | a=90: I=0</text>
<!-- Application -->
<text x="200" y="290" text-anchor="middle" fill="#55efc4" font-size="9">ЖК-экраны, 3D-очки, солнцезащитные очки</text>
</svg>