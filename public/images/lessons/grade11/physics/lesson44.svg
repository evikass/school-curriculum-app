<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Радиоактивность</text>

<!-- Alpha decay -->
<rect x="20" y="40" width="180" height="60" rx="5" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1"/>
<text x="110" y="58" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Альфа-распад</text>
<circle cx="60" cy="78" r="12" fill="#ff7675" opacity="0.5"/>
<text x="60" y="81" text-anchor="middle" fill="#fff" font-size="7">X</text>
<line x1="75" y1="72" x2="100" y2="60" stroke="#ffd700" stroke-width="1.5"/>
<circle cx="110" cy="55" r="6" fill="#ffd700"/>
<text x="110" y="58" text-anchor="middle" fill="#2d3436" font-size="5">He</text>
<circle cx="140" cy="78" r="10" fill="#74b9ff" opacity="0.5"/>
<text x="140" y="81" text-anchor="middle" fill="#fff" font-size="6">Y</text>
<text x="110" y="93" text-anchor="middle" fill="#636e72" font-size="7">Z-2, A-4</text>
<!-- Beta decay -->
<rect x="210" y="40" width="180" height="60" rx="5" fill="#74b9ff" opacity="0.1" stroke="#74b9ff" stroke-width="1"/>
<text x="300" y="58" text-anchor="middle" fill="#74b9ff" font-size="10" font-weight="bold">Бета-распад</text>
<circle cx="250" cy="78" r="12" fill="#74b9ff" opacity="0.5"/>
<text x="250" y="81" text-anchor="middle" fill="#fff" font-size="7">X</text>
<line x1="265" y1="72" x2="290" y2="60" stroke="#55efc4" stroke-width="1"/>
<circle cx="295" cy="55" r="3" fill="#55efc4"/>
<text x="300" y="52" fill="#55efc4" font-size="6">e-</text>
<circle cx="330" cy="78" r="10" fill="#55efc4" opacity="0.5"/>
<text x="330" y="81" text-anchor="middle" fill="#fff" font-size="6">Y</text>
<text x="300" y="93" text-anchor="middle" fill="#636e72" font-size="7">Z+1, A (без изм.)</text>
<!-- Decay law -->
<rect x="20" y="110" width="360" height="70" rx="8" fill="#2d3436" opacity="0.7"/>
<text x="200" y="130" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Закон радиоактивного распада</text>
<text x="200" y="155" text-anchor="middle" fill="#55efc4" font-size="16" font-weight="bold">N = N0 * 2^(-t/T)</text>
<text x="200" y="172" text-anchor="middle" fill="#636e72" font-size="8">T — период полураспада</text>
<!-- Decay curve -->
<line x1="40" y1="260" x2="200" y2="260" stroke="#dfe6e9" stroke-width="1"/>
<line x1="40" y1="260" x2="40" y2="195" stroke="#dfe6e9" stroke-width="1"/>
<text x="205" y="263" fill="#dfe6e9" font-size="7">t</text>
<text x="25" y="198" fill="#dfe6e9" font-size="7">N</text>
<path d="M40,210 Q70,230 100,245 Q140,253 200,258" fill="none" stroke="#55efc4" stroke-width="2"/>
<text x="35" y="210" fill="#ffd700" font-size="6">N0</text>
<line x1="35" y1="235" x2="45" y2="235" stroke="#ff7675" stroke-width="0.5"/>
<text x="22" y="238" fill="#ff7675" font-size="6">N0/2</text>
<line x1="35" y1="247" x2="45" y2="247" stroke="#ff7675" stroke-width="0.5"/>
<text x="22" y="250" fill="#ff7675" font-size="6">N0/4</text>
<!-- T marks -->
<line x1="80" y1="258" x2="80" y2="265" stroke="#ffd700" stroke-width="1"/>
<text x="80" y="275" text-anchor="middle" fill="#ffd700" font-size="7">T</text>
<line x1="120" y1="258" x2="120" y2="265" stroke="#ffd700" stroke-width="1"/>
<text x="120" y="275" text-anchor="middle" fill="#ffd700" font-size="7">2T</text>
<!-- Rules -->
<text x="300" y="205" text-anchor="middle" fill="#ffeaa7" font-size="9" font-weight="bold">Правила смещения</text>
<text x="260" y="225" fill="#ff7675" font-size="8">a: Z-2, A-4</text>
<text x="260" y="242" fill="#74b9ff" font-size="8">B-: Z+1, A</text>
<text x="260" y="259" fill="#55efc4" font-size="8">B+: Z-1, A</text>
<text x="260" y="278" fill="#a29bfe" font-size="7">A = ln(2)*N/T [Бк]</text>

</svg>