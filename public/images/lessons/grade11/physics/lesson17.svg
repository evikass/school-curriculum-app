<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Механические колебания</text>
  <!-- Pendulum -->
  <line x1="100" y1="40" x2="100" y2="50" stroke="#636e72" stroke-width="3"/>
  <line x1="100" y1="50" x2="140" y2="130" stroke="#dfe6e9" stroke-width="1.5"/>
  <circle cx="140" cy="130" r="12" fill="#74b9ff" stroke="#a29bfe" stroke-width="1.5"/>
  <!-- Equilibrium position -->
  <line x1="100" y1="50" x2="100" y2="145" stroke="#636e72" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- Angle -->
  <path d="M100,80 Q105,78 108,82" fill="none" stroke="#ffd700" stroke-width="1"/>
  <text x="112" y="82" fill="#ffd700" font-size="8">a</text>
  <!-- Amplitude -->
  <line x1="60" y1="135" x2="140" y2="135" stroke="#ff7675" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="100" y="150" text-anchor="middle" fill="#ff7675" font-size="8">A</text>
  <!-- x(t) graph -->
  <line x1="30" y1="210" x2="200" y2="210" stroke="#dfe6e9" stroke-width="1"/>
  <line x1="30" y1="210" x2="30" y2="165" stroke="#dfe6e9" stroke-width="1"/>
  <text x="205" y="215" fill="#dfe6e9" font-size="8">t</text>
  <text x="20" y="170" fill="#dfe6e9" font-size="8">x</text>
  <!-- Sinusoidal curve -->
  <path d="M30,210 Q50,175 70,210 Q90,245 110,210 Q130,175 150,210 Q170,245 190,210" fill="none" stroke="#55efc4" stroke-width="2"/>
  <!-- Amplitude markings -->
  <line x1="25" y1="175" x2="35" y2="175" stroke="#ff7675" stroke-width="1"/>
  <text x="18" y="178" fill="#ff7675" font-size="7">A</text>
  <line x1="25" y1="245" x2="35" y2="245" stroke="#74b9ff" stroke-width="1"/>
  <text x="18" y="248" fill="#74b9ff" font-size="7">-A</text>
  <!-- Period -->
  <line x1="70" y1="255" x2="150" y2="255" stroke="#ffd700" stroke-width="1"/>
  <text x="110" y="268" text-anchor="middle" fill="#ffd700" font-size="9">T</text>
  <!-- Parameters -->
  <rect x="220" y="35" width="170" height="115" rx="8" fill="#2d3436" opacity="0.7"/>
  <text x="305" y="55" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Параметры</text>
  <text x="235" y="75" fill="#ff7675" font-size="9">A — амплитуда [м]</text>
  <text x="235" y="92" fill="#55efc4" font-size="9">T — период [с]</text>
  <text x="235" y="109" fill="#74b9ff" font-size="9">v = 1/T — частота [Гц]</text>
  <text x="235" y="126" fill="#a29bfe" font-size="9">w = 2пv — цикл. частота</text>
  <text x="235" y="143" fill="#ffd700" font-size="9">ф = wt + ф0 — фаза</text>
  <!-- Equation -->
  <text x="305" y="175" text-anchor="middle" fill="#55efc4" font-size="14" font-weight="bold">x = A*cos(wt + ф0)</text>
  <!-- Conditions -->
  <rect x="220" y="195" width="170" height="95" rx="8" fill="#2d3436" opacity="0.5"/>
  <text x="305" y="215" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Условия колебаний</text>
  <text x="235" y="235" fill="#55efc4" font-size="9">1. Возвращающая сила</text>
  <text x="235" y="252" fill="#74b9ff" font-size="9">2. Инертность (масса)</text>
  <text x="235" y="269" fill="#ff7675" font-size="9">3. Малое трение</text>
  <text x="235" y="286" fill="#636e72" font-size="8">F = -kx (квазиупругая)</text>
</svg>