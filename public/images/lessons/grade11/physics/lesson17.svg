<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50">Принципы радиосвязи. Радиолокация</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <rect x="420" y="15" width="60" height="25" rx="5" fill="#3498db" opacity="0.2"/>
  <text x="450" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Урок 17</text>
  
  <!-- Радиопередатчик -->
  <g transform="translate(50, 80)">
    <!-- Корпус передатчика -->
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
    <rect x="5" y="5" width="110" height="70" rx="3" fill="#ecf0f1"/>
    
    <!-- Элементы передатчика -->
    <rect x="15" y="15" width="30" height="20" rx="2" fill="#e74c3c" stroke="#c0392b" stroke-width="1"/>
    <text x="30" y="28" text-anchor="middle" font-size="10" fill="white">Генератор</text>
    
    <rect x="55" y="15" width="30" height="20" rx="2" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-size="10" fill="white">Модулятор</text>
    
    <rect x="15" y="45" width="30" height="20" rx="2" fill="#27ae60" stroke="#229954" stroke-width="1"/>
    <text x="30" y="58" text-anchor="middle" font-size="10" fill="white">Усилитель</text>
    
    <rect x="55" y="45" width="30" height="20" rx="2" fill="#8e44ad" stroke="#7d3c98" stroke-width="1"/>
    <text x="70" y="58" text-anchor="middle" font-size="10" fill="white">Антенна</text>
    
    <!-- Подпись -->
    <text x="60" y="95" text-anchor="middle" font-size="12" fill="#2c3e50">Радиопередатчик</text>
  </g>
  
  <!-- Радиоприёмник -->
  <g transform="translate(330, 80)">
    <!-- Корпус приёмника -->
    <rect x="0" y="0" width="120" height="80" rx="5" fill="#34495e" stroke="#2c3e50" stroke-width="2"/>
    <rect x="5" y="5" width="110" height="70" rx="3" fill="#ecf0f1"/>
    
    <!-- Элементы приёмника -->
    <rect x="15" y="15" width="30" height="20" rx="2" fill="#3498db" stroke="#2980b9" stroke-width="1"/>
    <text x="30" y="28" text-anchor="middle" font-size="10" fill="white">Приёмник</text>
    
    <rect x="55" y="15" width="30" height="20" rx="2" fill="#16a085" stroke="#138d75" stroke-width="1"/>
    <text x="70" y="28" text-anchor="middle" font-size="10" fill="white">Демодулятор</text>
    
    <rect x="15" y="45" width="30" height="20" rx="2" fill="#d35400" stroke="#ba6317" stroke-width="1"/>
    <text x="30" y="58" text-anchor="middle" font-size="10" fill="white">Усилитель</text>
    
    <rect x="55" y="45" width="30" height="20" rx="2" fill="#c0392b" stroke="#a93226" stroke-width="1"/>
    <text x="70" y="58" text-anchor="middle" font-size="10" fill="white">Громкоговоритель</text>
    
    <!-- Подпись -->
    <text x="60" y="95" text-anchor="middle" font-size="12" fill="#2c3e50">Радиоприёмник</text>
  </g>
  
  <!-- Радар -->
  <g transform="translate(190, 200)">
    <!-- Экран радара -->
    <circle cx="60" cy="60" r="55" fill="#2c3e50" stroke="#34495e" stroke-width="2"/>
    <circle cx="60" cy="60" r="50" fill="#1a252f"/>
    
    <!-- Сектора радара -->
    <path d="M60,60 L60,10 A50,50 0 0,1 106.6,35 z" fill="#27ae60" opacity="0.6"/>
    <path d="M60,60 L60,10 A50,50 0 0,1 60,110 z" fill="#3498db" opacity="0.4"/>
    <path d="M60,60 L60,10 A50,50 0 0,1 13.4,35 z" fill="#e74c3c" opacity="0.2"/>
    
    <!-- Цели -->
    <circle cx="80" cy="40" r="3" fill="#e74c3c"/>
    <circle cx="45" cy="75" r="3" fill="#f39c12"/>
    <circle cx="90" cy="80" r="3" fill="#27ae60"/>
    
    <!-- Радиолинии -->
    <line x1="60" y1="60" x2="60" y2="10" stroke="#2ecc71" stroke-width="2"/>
    <line x1="60" y1="60" x2="106.6" y2="35" stroke="#2ecc71" stroke-width="2" opacity="0.7"/>
    <line x1="60" y1="60" x2="13.4" y2="35" stroke="#2ecc71" stroke-width="2" opacity="0.7"/>
    
    <!-- Центр -->
    <circle cx="60" cy="60" r="5" fill="#ecf0f1"/>
    
    <!-- Подпись -->
    <text x="60" y="135" text-anchor="middle" font-size="12" fill="#2c3e50">Радар</text>
  </g>
  
  <!-- Схема радиосвязи -->
  <g transform="translate(50, 280)">
    <!-- Волновая линия -->
    <path d="M0,20 Q10,10 20,20 T40,20 T60,20 T80,20 T100,20 T120,20 T140,20 T160,20 T180,20" 
          fill="none" stroke="#3498db" stroke-width="2"/>
    
    <!-- Стрелка направления -->
    <polygon points="175,15 185,20 175,25" fill="#3498db"/>
    
    <!-- Метки -->
    <text x="0" y="40" font-size="10" fill="#2c3e50">Сигнал</text>
    <text x="160" y="40" font-size="10" fill="#2c3e50">Сигнал</text>
  </g>
  
  <!-- Формула модуляции -->
  <g transform="translate(250, 280)">
    <rect x="0" y="0" width="200" height="35" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="100" y="23" text-anchor="middle" font-size="12" fill="#2c3e50">U(t) = U₀[1 + m·cos(Ωt)]·cos(ωt)</text>
    <text x="100" y="50" text-anchor="middle" font-size="10" fill="#7f8c8d">где m - глубина модуляции</text>
  </g>
  
  <!-- График модуляции -->
  <g transform="translate(30, 180)">
    <rect x="0" y="0" width="120" height="60" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Ось X -->
    <line x1="10" y1="50" x2="110" y2="50" stroke="#495057" stroke-width="1"/>
    
    <!-- Ось Y -->
    <line x1="10" y1="10" x2="10" y2="50" stroke="#495057" stroke-width="1"/>
    
    <!-- Несущая -->
    <path d="M20,30 Q30,25 40,30 T60,30 T80,30 T100,30" fill="none" stroke="#3498db" stroke-width="1.5"/>
    
    <!-- Модулирующий сигнал -->
    <path d="M20,30 Q30,20 40,30 T60,30 T80,30 T100,30" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="2,1"/>
    
    <!-- Подписи -->
    <text x="60" y="5" text-anchor="middle" font-size="9" fill="#2c3e50">Модуляция</text>
    <text x="5" y="25" font-size="7" fill="#2c3e50">U</text>
    <text x="115" y="55" font-size="7" fill="#2c3e50">t</text>
  </g>
  
  <!-- Диаграмма спектра -->
  <g transform="translate(350, 180)">
    <rect x="0" y="0" width="120" height="60" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    
    <!-- Ось X -->
    <line x1="10" y1="50" x2="110" y2="50" stroke="#495057" stroke-width="1"/>
    
    <!-- Ось Y -->
    <line x1="10" y1="10" x2="10" y2="50" stroke="#495057" stroke-width="1"/>
    
    <!-- Спектральные линии -->
    <line x1="20" y1="40" x2="20" y2="50" stroke="#2c3e50" stroke-width="2"/>
    <line x1="40" y1="30" x2="40" y2="50" stroke="#3498db" stroke-width="2"/>
    <line x1="60" y1="40" x2="60" y2="50" stroke="#2c3e50" stroke-width="2"/>
    <line x1="80" y1="30" x2="80" y2="50" stroke="#3498db" stroke-width="2"/>
    <line x1="100" y1="40" x2="100" y2="50" stroke="#2c3e50" stroke-width="2"/>
    
    <!-- Подписи -->
    <text x="60" y="5" text-anchor="middle" font-size="9" fill="#2c3e50">Спектр сигнала</text>
    <text x="5" y="25" font-size="7" fill="#2c3e50">A</text>
    <text x="115" y="55" font-size="7" fill="#2c3e50">f</text>
  </g>
  
  <!-- Ключевые термины -->
  <g transform="translate(20, 310)">
    <rect x="0" y="0" width="460" height="30" rx="5" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
    <text x="10" y="20" font-size="10" fill="#2c3e50">Ключевые термины: радиоволны, модуляция, несущая частота, радиолокация, радиолокационная станция, эхо-сигнал</text>
  </g>
</svg>