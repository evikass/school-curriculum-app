<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f3ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coilGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d2691e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4169e1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="energyGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ffd93d;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#6bcf7f;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="2" />
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#34495e" stroke-width="1" />
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Колебательный контур</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">ФИЗИКА · 11 КЛАСС</text>
  <text x="470" y="25" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Урок 24</text>
  
  <!-- Схема LC-контура -->
  <g transform="translate(100, 100)">
    <!-- Контур -->
    <path d="M 0,50 L 0,0 L 200,0 L 200,50" stroke="#2c3e50" stroke-width="2" fill="none" />
    
    <!-- Катушка индуктивности -->
    <g transform="translate(50, 0)">
      <path d="M 0,0 Q 5,10 0,20 Q -5,30 0,40 Q 5,50 0,60" stroke="url(#coilGradient)" stroke-width="3" fill="none" />
      <path d="M 10,0 Q 15,10 10,20 Q 5,30 10,40 Q 15,50 10,60" stroke="url(#coilGradient)" stroke-width="3" fill="none" />
      <path d="M 20,0 Q 25,10 20,20 Q 15,30 20,40 Q 25,50 20,60" stroke="url(#coilGradient)" stroke-width="3" fill="none" />
      <path d="M 30,0 Q 35,10 30,20 Q 25,30 30,40 Q 35,50 30,60" stroke="url(#coilGradient)" stroke-width="3" fill="none" />
      <text x="15" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">L</text>
    </g>
    
    <!-- Конденсатор -->
    <g transform="translate(150, 0)">
      <line x1="0" y1="0" x2="0" y2="60" stroke="#2c3e50" stroke-width="2" />
      <line x1="0" y1="0" x2="0" y2="60" stroke="url(#capGradient)" stroke-width="4" />
      <line x1="10" y1="0" x2="10" y2="60" stroke="url(#capGradient)" stroke-width="4" />
      <line x1="10" y1="0" x2="10" y2="60" stroke="#2c3e50" stroke-width="2" />
      <text x="5" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">C</text>
    </g>
    
    <!-- Стрелки тока -->
    <g>
      <path d="M 20,30 L 40,30 L 35,25 M 40,30 L 35,35" stroke="#e74c3c" stroke-width="2" fill="none" />
      <path d="M 120,30 L 140,30 L 135,25 M 140,30 L 135,35" stroke="#e74c3c" stroke-width="2" fill="none" />
      <text x="30" y="25" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">I</text>
    </g>
    
    <!-- Заряды на конденсаторе -->
    <g>
      <text x="-10" y="25" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">+</text>
      <text x="15" y="25" font-family="Arial, sans-serif" font-size="14" fill="#3498db">−</text>
    </g>
  </g>
  
  <!-- Формулы -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="300" height="80" fill="rgba(255,255,255,0.8)" stroke="#34495e" stroke-width="1" rx="5" />
    <text x="10" y="25" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">Период колебаний: T = 2π√(LC)</text>
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">Энергия в контуре: W = q²/(2C) + LI²/2</text>
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">Частота: f = 1/(2π√(LC))</text>
  </g>
  
  <!-- График энергии -->
  <g transform="translate(320, 100)">
    <rect x="0" y="0" width="170" height="120" fill="rgba(255,255,255,0.9)" stroke="#34495e" stroke-width="1" />
    <text x="85" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Энергия в контуре</text>
    
    <!-- Оси -->
    <line x1="20" y1="100" x2="150" y2="100" stroke="#2c3e50" stroke-width="1" />
    <line x1="20" y1="100" x2="20" y2="30" stroke="#2c3e50" stroke-width="1" />
    
    <!-- Графики энергии -->
    <path d="M 20,80 Q 40,40 60,80 T 100,80 T 140,80" stroke="#e74c3c" stroke-width="2" fill="none" />
    <path d="M 20,90 Q 40,70 60,90 T 100,90 T 140,90" stroke="#3498db" stroke-width="2" fill="none" />
    <path d="M 20,85 Q 40,55 60,85 T 100,85 T 140,85" stroke="#2ecc71" stroke-width="2" fill="none" />
    
    <!-- Легенда графика -->
    <rect x="130" y="35" width="15" height="3" fill="#e74c3c" />
    <text x="145" y="38" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Wc</text>
    
    <rect x="130" y="45" width="15" height="3" fill="#3498db" />
    <text x="145" y="48" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">WL</text>
    
    <rect x="130" y="55" width="15" height="3" fill="#2ecc71" />
    <text x="145" y="58" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">W</text>
    
    <!-- Подписи осей -->
    <text x="10" y="115" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">t</text>
    <text x="155" y="105" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">W</text>
  </g>
  
  <!-- Объяснения в углу -->
  <g transform="translate(20, 220)">
    <rect x="0" y="0" width="180" height="100" fill="rgba(255,255,255,0.9)" stroke="#34495e" stroke-width="1" rx="5" />
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Превращение энергии</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">• W<sub>C</sub> - энергия конденсатора</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="11" fill="#3498db">• W<sub>L</sub> - энергия катушки</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="11" fill="#2ecc71">• W - полная энергия</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">W<sub>C</sub> + W<sub>L</sub> = const</text>
  </g>
  
  <!-- Дополнительные подписи -->
  <g transform="translate(100, 170)">
    <text x="50" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8b4513">Катушка индуктивности</text>
    <text x="155" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1e3a8a">Конденсатор</text>
  </g>
  
  <!-- Указатели процессов -->
  <g>
    <path d="M 250,120 Q 280,110 300,100" stroke="#f39c12" stroke-width="1.5" fill="none" stroke-dasharray="3,3" />
    <text x="310" y="105" font-family="Arial, sans-serif" font-size="10" fill="#f39c12">Заряд</text>
    
    <path d="M 250,140 Q 280,150 300,160" stroke="#f39c12" stroke-width="1.5" fill="none" stroke-dasharray="3,3" />
    <text x="310" y="165" font-family="Arial, sans-serif" font-size="10" fill="#f39c12">Разряд</text>
  </g>
</svg>