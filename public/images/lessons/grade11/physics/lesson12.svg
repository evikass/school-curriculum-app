<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg12)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Сила Лоренца</text>
  <!-- B field going into page (crosses) -->
  <g transform="translate(30,35)">
    <text x="90" y="0" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Заряд в магнитном поле</text>
    <!-- B field symbols (into page) -->
    <g fill="none" stroke="#55efc4" stroke-width="0.8" opacity="0.4">
      <circle cx="30" cy="30" r="6"/><line x1="27" y1="27" x2="33" y2="33"/><line x1="33" y1="27" x2="27" y2="33"/>
      <circle cx="80" cy="30" r="6"/><line x1="77" y1="27" x2="83" y2="33"/><line x1="83" y1="27" x2="77" y2="33"/>
      <circle cx="130" cy="30" r="6"/><line x1="127" y1="27" x2="133" y2="33"/><line x1="133" y1="27" x2="127" y2="33"/>
      <circle cx="30" cy="80" r="6"/><line x1="27" y1="77" x2="33" y2="83"/><line x1="33" y1="77" x2="27" y2="83"/>
      <circle cx="130" cy="80" r="6"/><line x1="127" y1="77" x2="133" y2="83"/><line x1="133" y1="77" x2="127" y2="83"/>
    </g>
    <text x="150" y="35" fill="#55efc4" font-size="8">B (в лист)</text>
    <!-- Circular path of positive charge -->
    <circle cx="80" cy="80" r="30" fill="none" stroke="#ffd700" stroke-width="2" stroke-dasharray="5,3"/>
    <!-- Charge -->
    <circle cx="110" cy="80" r="6" fill="#ff7675"/>
    <text x="110" y="83" text-anchor="middle" fill="#fff" font-size="8">q+</text>
    <!-- Velocity arrow (tangent) -->
    <line x1="110" y1="80" x2="110" y2="55" stroke="#74b9ff" stroke-width="2"/>
    <polygon points="107,55 110,48 113,55" fill="#74b9ff"/>
    <text x="120" y="60" fill="#74b9ff" font-size="8">v</text>
    <!-- Force arrow (centripetal) -->
    <line x1="110" y1="80" x2="90" y2="80" stroke="#ff7675" stroke-width="2"/>
    <polygon points="90,77 83,80 90,83" fill="#ff7675"/>
    <text x="88" y="72" fill="#ff7675" font-size="8">F_Л</text>
    <!-- Radius label -->
    <line x1="80" y1="80" x2="110" y2="80" stroke="#636e72" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="95" y="95" text-anchor="middle" fill="#dfe6e9" font-size="8">r = mv/(qB)</text>
  </g>
  <!-- Left hand rule -->
  <g transform="translate(230,35)">
    <text x="80" y="0" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Правило левой руки</text>
    <!-- Simplified hand -->
    <rect x="40" y="20" width="80" height="50" rx="5" fill="none" stroke="#dfe6e9" stroke-width="1.5"/>
    <line x1="40" y1="45" x2="20" y2="45" stroke="#74b9ff" stroke-width="3"/>
    <text x="10" y="42" fill="#74b9ff" font-size="7">v</text>
    <text x="55" y="38" fill="#55efc4" font-size="8">B в ладонь</text>
    <line x1="120" y1="45" x2="145" y2="45" stroke="#ff7675" stroke-width="3"/>
    <polygon points="145,42 152,45 145,48" fill="#ff7675"/>
    <text x="148" y="38" fill="#ff7675" font-size="7">F_Л</text>
  </g>
  <!-- Formula -->
  <text x="200" y="150" text-anchor="middle" fill="#ffeaa7" font-size="16" font-weight="bold">F_Л = qvB sin(a)</text>
  <!-- Three cases -->
  <g transform="translate(0,165)">
    <text x="200" y="10" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Движение заряда в поле B</text>
    <!-- v perp B: circle -->
    <circle cx="65" cy="60" r="22" fill="none" stroke="#ffd700" stroke-width="1.5"/>
    <circle cx="65" cy="38" r="4" fill="#ff7675"/>
    <text x="65" y="95" text-anchor="middle" fill="#55efc4" font-size="8">v перп. B</text>
    <text x="65" y="108" text-anchor="middle" fill="#dfe6e9" font-size="7">окружность</text>
    <!-- v at angle: spiral -->
    <ellipse cx="200" cy="60" rx="25" ry="15" fill="none" stroke="#ffd700" stroke-width="1.5"/>
    <ellipse cx="200" cy="60" rx="20" ry="10" fill="none" stroke="#ffd700" stroke-width="1" transform="translate(0,-5)"/>
    <ellipse cx="200" cy="60" rx="15" ry="6" fill="none" stroke="#ffd700" stroke-width="0.8" transform="translate(0,-10)"/>
    <text x="200" y="95" text-anchor="middle" fill="#55efc4" font-size="8">v под углом к B</text>
    <text x="200" y="108" text-anchor="middle" fill="#dfe6e9" font-size="7">спираль</text>
    <!-- v parallel: straight -->
    <line x1="320" y1="35" x2="340" y2="80" stroke="#ffd700" stroke-width="1.5"/>
    <circle cx="320" cy="35" r="4" fill="#ff7675"/>
    <polygon points="337,77 340,85 343,77" fill="#ffd700"/>
    <text x="330" y="95" text-anchor="middle" fill="#55efc4" font-size="8">v || B</text>
    <text x="330" y="108" text-anchor="middle" fill="#dfe6e9" font-size="7">прямая (F=0)</text>
  </g>
  <!-- Period -->
  <text x="200" y="290" text-anchor="middle" fill="#a29bfe" font-size="10">T = 2пm/(qB) — не зависит от v!</text>
</svg>