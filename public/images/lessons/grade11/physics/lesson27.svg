<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Звук</text>
<!-- Sound wave -->
<path d="M20,80 Q40,50 60,80 Q80,110 100,80 Q120,50 140,80 Q160,110 180,80 Q200,50 220,80 Q240,110 260,80 Q280,50 300,80 Q320,110 340,80 Q360,50 380,80" fill="none" stroke="#55efc4" stroke-width="2"/>
<!-- Loudness (amplitude) -->
<line x1="100" y1="80" x2="100" y2="50" stroke="#ff7675" stroke-width="1" stroke-dasharray="2,2"/>
<text x="120" y="55" fill="#ff7675" font-size="8">Громкость = A</text>
<!-- Pitch (frequency) -->
<text x="280" y="55" fill="#74b9ff" font-size="8">Высота = v</text>
<!-- Frequency spectrum -->
<rect x="20" y="115" width="360" height="40" rx="5" fill="#2d3436" opacity="0.5"/>
<!-- Infrasound -->
<rect x="30" y="120" width="70" height="30" rx="3" fill="#ff7675" opacity="0.3"/>
<text x="65" y="140" text-anchor="middle" fill="#ff7675" font-size="8">Инфра < 20Гц</text>
<!-- Audible -->
<rect x="110" y="120" width="120" height="30" rx="3" fill="#55efc4" opacity="0.3"/>
<text x="170" y="140" text-anchor="middle" fill="#55efc4" font-size="8">Слышимый 20Гц-20кГц</text>
<!-- Ultrasound -->
<rect x="240" y="120" width="130" height="30" rx="3" fill="#74b9ff" opacity="0.3"/>
<text x="305" y="140" text-anchor="middle" fill="#74b9ff" font-size="8">Ультра > 20кГц</text>
<!-- Speed of sound -->
<text x="200" y="185" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Скорость звука</text>
<text x="100" y="205" text-anchor="middle" fill="#55efc4" font-size="9">Воздух: 340 м/с</text>
<text x="230" y="205" text-anchor="middle" fill="#74b9ff" font-size="9">Вода: 1500 м/с</text>
<text x="350" y="205" text-anchor="middle" fill="#ff7675" font-size="9">Сталь: 6000</text>
<!-- Doppler effect -->
<rect x="20" y="220" width="360" height="70" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="240" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Эффект Доплера</text>
<circle cx="80" cy="265" r="10" fill="#ff7675"/>
<text x="80" y="268" text-anchor="middle" fill="#fff" font-size="7">S</text>
<line x1="90" y1="265" x2="130" y2="265" stroke="#ffd700" stroke-width="1.5"/>
<polygon points="128,262 135,265 128,268" fill="#ffd700"/>
<path d="M95,255 Q100,252 105,255" fill="none" stroke="#55efc4" stroke-width="1"/>
<path d="M100,250 Q108,246 115,250" fill="none" stroke="#55efc4" stroke-width="0.8"/>
<path d="M95,275 Q100,278 105,275" fill="none" stroke="#55efc4" stroke-width="1"/>
<path d="M100,280 Q108,284 115,280" fill="none" stroke="#55efc4" stroke-width="0.8"/>
<text x="160" y="260" fill="#55efc4" font-size="8">спереди: v выше</text>
<text x="160" y="275" fill="#74b9ff" font-size="8">сзади: v ниже</text>
<text x="290" y="268" fill="#636e72" font-size="8">v_набл = v_0*(v+v_н)/(v+v_и)</text>
</svg>