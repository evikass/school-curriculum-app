<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1"/>
  
  <!-- Номер урока -->
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">Урок 27</text>
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#3498db">Фотоэффект. Законы Столетова</text>
  
  <!-- Портрет Столетова -->
  <circle cx="80" cy="100" r="25" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
  <circle cx="80" cy="95" r="8" fill="#34495e"/>
  <path d="M 65 110 Q 80 105 95 110" fill="none" stroke="#34495e" stroke-width="2"/>
  <text x="80" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">А.Г. Столетов</text>
  <text x="80" y="150" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">1839-1896</text>
  
  <!-- Схема опыта Столетова -->
  <g transform="translate(150, 80)">
    <!-- Электрометр -->
    <rect x="0" y="60" width="60" height="40" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <line x1="30" y1="60" x2="30" y2="40" stroke="#34495e" stroke-width="2"/>
    <path d="M 20 40 L 30 30 L 40 40" fill="none" stroke="#34495e" stroke-width="2"/>
    
    <!-- Квадратный цилиндр -->
    <rect x="70" y="50" width="40" height="60" fill="#bdc3c7" stroke="#34495e" stroke-width="1"/>
    
    <!-- Электроды -->
    <rect x="70" y="50" width="5" height="60" fill="#e74c3c"/>
    <rect x="105" y="50" width="5" height="60" fill="#3498db"/>
    
    <!-- Источник света -->
    <circle cx="140" cy="80" r="15" fill="#f1c40f" opacity="0.7"/>
    <path d="M 130 80 L 140 65 L 150 80" fill="#f39c12"/>
    <path d="M 130 80 L 140 95 L 150 80" fill="#f39c12"/>
    <path d="M 125 80 L 140 70 L 155 80" fill="#f39c12"/>
    <path d="M 125 80 L 140 90 L 155 80" fill="#f39c12"/>
    
    <!-- Стрелки фотонов -->
    <line x1="155" y1="80" x2="170" y2="80" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="155" y1="75" x2="170" y2="75" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="155" y1="85" x2="170" y2="85" stroke="#f39c12" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Электрическая цепь -->
    <line x1="75" y1="70" x2="30" y2="70" stroke="#34495e" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="105" y1="70" x2="140" y2="70" stroke="#34495e" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Подписи -->
    <text x="30" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Электрометр</text>
    <text x="90" y="125" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Квадратный цилиндр</text>
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e74c3c">-</text>
    <text x="90" y="100" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3498db">+</text>
    <text x="155" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Источник света</text>
  </g>
  
  <!-- График зависимости силы фото тока от напряжения -->
  <g transform="translate(50, 200)">
    <!-- Ось X -->
    <line x1="0" y1="80" x2="180" y2="80" stroke="#34495e" stroke-width="2"/>
    <path d="M 180 80 L 175 75 L 175 85" fill="#34495e"/>
    <text x="185" y="85" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">U</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="80" x2="0" y2="10" stroke="#34495e" stroke-width="2"/>
    <path d="M 0 10 L -5 15 L 5 15" fill="#34495e"/>
    <text x="-15" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">I</text>
    
    <!-- Кривые для разных частот -->
    <path d="M 0 60 Q 30 55 60 50 Q 90 45 120 40 Q 150 35 180 30" fill="none" stroke="#3498db" stroke-width="2"/>
    <path d="M 0 65 Q 30 62 60 58 Q 90 54 120 50 Q 150 45 180 40" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <path d="M 0 70 Q 30 68 60 65 Q 90 62 120 58 Q 150 54 180 50" fill="none" stroke="#2ecc71" stroke-width="2"/>
    
    <!-- Точки пересечения с осью X -->
    <circle cx="40" cy="80" r="3" fill="#34495e"/>
    <circle cx="70" cy="80" r="3" fill="#34495e"/>
    <circle cx="100" cy="80" r="3" fill="#34495e"/>
    
    <!-- Подписи -->
    <text x="40" y="95" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#3498db">ν₁</text>
    <text x="70" y="95" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#e74c3c">ν₂</text>
    <text x="100" y="95" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2ecc71">ν₃</text>
    <text x="90" y="5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Зависимость I = f(U)</text>
  </g>
  
  <!-- Формула Эйнштейна -->
  <g transform="translate(300, 200)">
    <rect x="0" y="0" width="180" height="100" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">Уравнение Эйнштейна:</text>
    <text x="90" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#3498db">hν = A + Ek_max</text>
    <text x="90" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">h - постоянная Планка</text>
    <text x="90" y="90" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">ν - частота света, A - работа выхода</text>
  </g>
  
  <!-- Законы фотоэффекта -->
  <g transform="translate(50, 320)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Законы фотоэффекта:</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1. Для каждого вещества существует красная граница фотоэффекта ν₀</text>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="10" fill="#34495e">2. Фототок пропорционален интенсивности падающего света</text>
  </g>
  
  <!-- Красная граница -->
  <g transform="translate(300, 250)">
    <rect x="0" y="0" width="180" height="70" fill="#f8d7da" stroke="#dc3545" stroke-width="1" rx="5"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#721c24">Красная граница фотоэффекта:</text>
    <text x="90" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#dc3545">ν₀ = A/h</text>
    <text x="90" y="58" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#721c24">ν₀ - минимальная частота</text>
  </g>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2980b9" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0.8"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
  </defs>
</svg>