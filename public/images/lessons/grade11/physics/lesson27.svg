<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Темный фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4fbdba" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#eaeaea" font-weight="bold">Фотоэффект</text>
  
  <!-- Электроды -->
  <!-- Катод -->
  <rect x="80" y="120" width="20" height="100" fill="#7f8c8d" stroke="#ecf0f1" stroke-width="2"/>
  <text x="90" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1">K</text>
  <text x="90" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">катод</text>
  
  <!-- Анод -->
  <rect x="400" y="120" width="20" height="100" fill="#7f8c8d" stroke="#ecf0f1" stroke-width="2"/>
  <text x="410" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1">A</text>
  <text x="410" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">анод</text>
  
  <!-- Источник света -->
  <circle cx="30" cy="170" r="15" fill="#f39c12" stroke="#ecf0f1" stroke-width="2"/>
  <path d="M30 155 L30 185 M15 170 L45 170 M20 155 L40 185 M40 155 L20 185" stroke="#ecf0f1" stroke-width="2"/>
  
  <!-- Солнечные лучи -->
  <g>
    <line x1="45" y1="170" x2="75" y2="170" stroke="#f39c12" stroke-width="3" opacity="0.8"/>
    <line x1="45" y1="160" x2="75" y2="160" stroke="#f39c12" stroke-width="2" opacity="0.6"/>
    <line x1="45" y1="180" x2="75" y2="180" stroke="#f39c12" stroke-width="2" opacity="0.6"/>
    <line x1="45" y1="150" x2="75" y2="150" stroke="#f39c12" stroke-width="1" opacity="0.4"/>
    <line x1="45" y1="190" x2="75" y2="190" stroke="#f39c12" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Электроны -->
  <g>
    <circle cx="120" cy="170" r="4" fill="#3498db">
      <animate attributeName="cx" from="120" to="380" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="160" r="4" fill="#3498db">
      <animate attributeName="cx" from="120" to="380" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="120" cy="180" r="4" fill="#3498db">
      <animate attributeName="cx" from="120" to="380" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" from="1" to="0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Гальванометр -->
  <rect x="220" y="100" width="60" height="40" fill="none" stroke="#ecf0f1" stroke-width="2" rx="5"/>
  <circle cx="250" cy="120" r="15" fill="none" stroke="#ecf0f1" stroke-width="2"/>
  <line x1="250" y1="120" x2="260" y2="110" stroke="#e74c3c" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="0 250 120" to="30 250 120" dur="1s" repeatCount="indefinite"/>
  </line>
  <text x="250" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">гальванометр</text>
  
  <!-- Подключение к гальванометру -->
  <path d="M100 170 L220 120" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M420 170 L280 120" stroke="#ecf0f1" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Формула фотоэффекта -->
  <rect x="150" y="270" width="200" height="50" fill="#2c3e50" stroke="#4fbdba" stroke-width="1" rx="5"/>
  <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ecf0f1">hν = A + mv²/2</text>
  
  <!-- Подписи к компонентам формулы -->
  <text x="250" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">энергия фотона = работа выхода + кинетическая энергия электрона</text>
  
  <!-- Легенда -->
  <g transform="translate(350, 60)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">ν - частота света</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">h - постоянная Планка</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">A - работа выхода</text>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">m - масса электрона</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">v - скорость электрона</text>
  </g>
  
  <!-- Дополнительные элементы для размера -->
  <circle cx="250" cy="170" r="80" fill="none" stroke="#34495e" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <path d="M250 90 L250 250 M170 170 L330 170" stroke="#34495e" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
</svg>