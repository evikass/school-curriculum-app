<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="chargeGradient">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </radialGradient>
    
    <!-- Тень -->
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#34495e" stroke-width="3" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">
    ФИЗИКА · 11 КЛАСС
  </text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#34495e">
    Урок 3: Сила Лоренца
  </text>
  <text x="450" y="25" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">
    №3
  </text>
  
  <!-- Основная иллюстрация: Действие магнитного поля на движущийся заряд -->
  <g transform="translate(50, 80)">
    <!-- Система координат -->
    <line x1="0" y1="150" x2="400" y2="150" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="200" y1="150" x2="0" y2="0" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
    <line x1="200" y1="150" x2="400" y2="0" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
    
    <!-- Ось X -->
    <text x="410" y="155" font-family="Arial, sans-serif" font-size="14" fill="#34495e">x</text>
    <!-- Ось Y -->
    <text x="205" y="5" font-family="Arial, sans-serif" font-size="14" fill="#34495e">y</text>
    <!-- Ось Z -->
    <text x="5" y="10" font-family="Arial, sans-serif" font-size="14" fill="#34495e">z</text>
    
    <!-- Вектор скорости -->
    <line x1="100" y1="150" x2="100" y2="80" stroke="#3498db" stroke-width="3" marker-end="url(#blueArrow)"/>
    <text x="105" y="75" font-family="Arial, sans-serif" font-size="14" fill="#3498db">v</text>
    
    <!-- Вектор магнитного поля -->
    <g transform="translate(200, 150)">
      <!-- Круг с крестом (вектор B в точке) -->
      <circle cx="0" cy="0" r="15" fill="none" stroke="#e74c3c" stroke-width="2"/>
      <line x1="-8" y1="-8" x2="8" y2="8" stroke="#e74c3c" stroke-width="2"/>
      <line x1="-8" y1="8" x2="8" y2="-8" stroke="#e74c3c" stroke-width="2"/>
    </g>
    <text x="225" y="155" font-family="Arial, sans-serif" font-size="14" fill="#e74c3c">B</text>
    
    <!-- Вектор силы Лоренца -->
    <line x1="100" y1="150" x2="200" y2="150" stroke="#2ecc71" stroke-width="3" marker-end="url(#greenArrow)"/>
    <text x="140" y="145" font-family="Arial, sans-serif" font-size="14" fill="#2ecc71">F</text>
    
    <!-- Заряд -->
    <circle cx="100" cy="150" r="12" fill="url(#chargeGradient)" filter="url(#shadow)"/>
    <text x="95" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">+</text>
    <text x="85" y="175" font-family="Arial, sans-serif" font-size="12" fill="#34495e">q</text>
    
    <!-- Формула силы Лоренца -->
    <rect x="50" y="200" width="300" height="50" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="5"/>
    <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50">
      F = q·v·B·sin(α)
    </text>
  </g>
  
  <!-- Вторая иллюстрация: Движение заряженной частицы в магнитном поле -->
  <g transform="translate(50, 290)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">
      Траектория частицы:
    </text>
    
    <!-- Дуга траектории -->
    <path d="M 20,20 Q 100,0 180,20" fill="none" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,2"/>
    
    <!-- Векторы на траектории -->
    <g transform="translate(50, 10)">
      <line x1="0" y1="0" x2="0" y2="-15" stroke="#3498db" stroke-width="2" marker-end="url(#blueArrowSmall)"/>
      <text x="5" y="-5" font-family="Arial, sans-serif" font-size="10" fill="#3498db">v</text>
    </g>
    
    <g transform="translate(100, 5)">
      <line x1="0" y1="0" x2="0" y2="-15" stroke="#3498db" stroke-width="2" marker-end="url(#blueArrowSmall)"/>
      <text x="5" y="-5" font-family="Arial, sans-serif" font-size="10" fill="#3498db">v</text>
    </g>
    
    <g transform="translate(150, 10)">
      <line x1="0" y1="0" x2="0" y2="-15" stroke="#3498db" stroke-width="2" marker-end="url(#blueArrowSmall)"/>
      <text x="5" y="-5" font-family="Arial, sans-serif" font-size="10" fill="#3498db">v</text>
    </g>
    
    <!-- Центр окружности -->
    <circle cx="100" cy="40" r="2" fill="#e74c3c"/>
    <text x="105" y="45" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">O</text>
    
    <!-- Радиус -->
    <line x1="100" y1="40" x2="50" y2="10" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="65" y="20" font-family="Arial, sans-serif" font-size="10" fill="#95a5a6">R</text>
    
    <!-- Формула для радиуса -->
    <rect x="200" y="0" width="150" height="25" fill="#ecf0f1" stroke="#34495e" stroke-width="1" rx="3"/>
    <text x="275" y="17" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">
      R = mv/(qB)
    </text>
  </g>
  
  <!-- Маркеры стрелок -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
    
    <marker id="blueArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    
    <marker id="greenArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
    
    <marker id="blueArrowSmall" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3498db"/>
    </marker>
  </defs>
  
  <!-- Примечание о направлении силы -->
  <g transform="translate(370, 120)">
    <rect x="0" y="0" width="110" height="60" fill="#f8f9fa" stroke="#34495e" stroke-width="1" rx="3"/>
    <text x="55" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">
      Правило левой руки
    </text>
    <text x="5" y="30" font-family="Arial, sans-serif" font-size="8" fill="#34495e">
      B - в ладонь
    </text>
    <text x="5" y="42" font-family="Arial, sans-serif" font-size="8" fill="#34495e">
      v - по пальцам
    </text>
    <text x="5" y="54" font-family="Arial, sans-serif" font-size="8" fill="#34495e">
      F - от большого
    </text>
  </g>
  
  <!-- Цветовая легенда -->
  <g transform="translate(370, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">
      Цветовая легенда:
    </text>
    <rect x="0" y="10" width="15" height="10" fill="#3498db"/>
    <text x="20" y="19" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Скорость (v)</text>
    
    <rect x="0" y="25" width="15" height="10" fill="#e74c3c"/>
    <text x="20" y="34" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Магнитное поле (B)</text>
    
    <rect x="0" y="40" width="15" height="10" fill="#2ecc71"/>
    <text x="20" y="49" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Сила Лоренца (F)</text>
    
    <rect x="0" y="55" width="15" height="10" fill="#f39c12"/>
    <text x="20" y="64" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Заряд (q)</text>
  </g>
</svg>