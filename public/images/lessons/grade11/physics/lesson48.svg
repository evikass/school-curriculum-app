<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Элементарные частицы</text>

<!-- Particle classification -->
<text x="200" y="42" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Классификация частиц</text>
<!-- Leptons -->
<rect x="15" y="55" width="115" height="50" rx="5" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1"/>
<text x="72" y="72" text-anchor="middle" fill="#55efc4" font-size="9" font-weight="bold">Лептоны</text>
<text x="72" y="88" text-anchor="middle" fill="#636e72" font-size="7">e, mu, tau, v</text>
<text x="72" y="100" text-anchor="middle" fill="#636e72" font-size="6">лёгкие, точечные</text>
<!-- Hadrons -->
<rect x="140" y="55" width="115" height="50" rx="5" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1"/>
<text x="197" y="72" text-anchor="middle" fill="#ff7675" font-size="9" font-weight="bold">Адроны</text>
<text x="197" y="88" text-anchor="middle" fill="#636e72" font-size="7">p, n, pi, K...</text>
<text x="197" y="100" text-anchor="middle" fill="#636e72" font-size="6">из кварков</text>
<!-- Bosons -->
<rect x="265" y="55" width="120" height="50" rx="5" fill="#a29bfe" opacity="0.1" stroke="#a29bfe" stroke-width="1"/>
<text x="325" y="72" text-anchor="middle" fill="#a29bfe" font-size="9" font-weight="bold">Бозоны</text>
<text x="325" y="88" text-anchor="middle" fill="#636e72" font-size="7">фотон, W, Z, g, H</text>
<text x="325" y="100" text-anchor="middle" fill="#636e72" font-size="6">переносчики</text>
<!-- Interactions -->
<text x="200" y="128" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">4 фундаментальных взаимодействия</text>
<rect x="15" y="138" width="85" height="35" rx="3" fill="#ff7675" opacity="0.15"/>
<text x="57" y="155" text-anchor="middle" fill="#ff7675" font-size="8" font-weight="bold">Сильное</text>
<text x="57" y="167" text-anchor="middle" fill="#636e72" font-size="6">~1 фм, 100x</text>
<rect x="110" y="138" width="85" height="35" rx="3" fill="#ffd700" opacity="0.15"/>
<text x="152" y="155" text-anchor="middle" fill="#ffd700" font-size="8" font-weight="bold">ЭМ</text>
<text x="152" y="167" text-anchor="middle" fill="#636e72" font-size="6">дальнодейств.</text>
<rect x="205" y="138" width="85" height="35" rx="3" fill="#74b9ff" opacity="0.15"/>
<text x="247" y="155" text-anchor="middle" fill="#74b9ff" font-size="8" font-weight="bold">Слабое</text>
<text x="247" y="167" text-anchor="middle" fill="#636e72" font-size="6">0,001 фм</text>
<rect x="300" y="138" width="85" height="35" rx="3" fill="#636e72" opacity="0.15"/>
<text x="342" y="155" text-anchor="middle" fill="#dfe6e9" font-size="8" font-weight="bold">Гравитация</text>
<text x="342" y="167" text-anchor="middle" fill="#636e72" font-size="6">самое слабое</text>
<!-- Quarks -->
<rect x="20" y="185" width="360" height="105" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="205" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Кварки</text>
<text x="60" y="225" fill="#ff7675" font-size="10">u</text>
<text x="100" y="225" fill="#55efc4" font-size="10">d</text>
<text x="140" y="225" fill="#74b9ff" font-size="10">s</text>
<text x="180" y="225" fill="#a29bfe" font-size="10">c</text>
<text x="220" y="225" fill="#ffd700" font-size="10">b</text>
<text x="260" y="225" fill="#ff7675" font-size="10">t</text>
<text x="300" y="225" fill="#636e72" font-size="8">6 ароматов</text>
<!-- Proton/Neutron -->
<text x="120" y="250" fill="#dfe6e9" font-size="9">p = uud (заряд +1)</text>
<text x="120" y="267" fill="#dfe6e9" font-size="9">n = udd (заряд 0)</text>
<text x="120" y="284" fill="#ff7675" font-size="8">Конфайнмент: кварки не бывают свободными!</text>

</svg>