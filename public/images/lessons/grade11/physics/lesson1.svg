<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ffd700"/>
    </marker>
  </defs>
  <rect width="400" height="300" fill="url(#bg1)"/>
  <!-- Battery -->
  <rect x="40" y="80" width="60" height="140" rx="5" fill="#2d3436" stroke="#636e72" stroke-width="2"/>
  <rect x="55" y="70" width="30" height="15" rx="3" fill="#636e72"/>
  <text x="70" y="62" text-anchor="middle" fill="#ff6b6b" font-size="14" font-weight="bold">+</text>
  <text x="70" y="235" text-anchor="middle" fill="#74b9ff" font-size="14" font-weight="bold">-</text>
  <text x="70" y="160" text-anchor="middle" fill="#ffeaa7" font-size="11">E</text>
  <!-- Wires -->
  <line x1="70" y1="70" x2="70" y2="40" stroke="#ffd700" stroke-width="2"/>
  <line x1="70" y1="40" x2="300" y2="40" stroke="#ffd700" stroke-width="2"/>
  <line x1="300" y1="40" x2="300" y2="80" stroke="#ffd700" stroke-width="2"/>
  <line x1="300" y1="220" x2="300" y2="260" stroke="#ffd700" stroke-width="2"/>
  <line x1="300" y1="260" x2="70" y2="260" stroke="#ffd700" stroke-width="2"/>
  <line x1="70" y1="260" x2="70" y2="220" stroke="#ffd700" stroke-width="2"/>
  <!-- Light bulb -->
  <circle cx="300" cy="150" r="30" fill="none" stroke="#ffeaa7" stroke-width="2"/>
  <path d="M290,135 L295,150 L305,145 L310,160" fill="none" stroke="#ffeaa7" stroke-width="2"/>
  <text x="300" y="130" text-anchor="middle" fill="#dfe6e9" font-size="9">R</text>
  <!-- Current direction arrows -->
  <line x1="150" y1="37" x2="200" y2="37" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="200" y1="263" x2="150" y2="263" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <!-- Electrons -->
  <circle cx="120" cy="260" r="4" fill="#74b9ff"/>
  <text x="120" y="280" text-anchor="middle" fill="#74b9ff" font-size="8">e-</text>
  <circle cx="220" cy="40" r="4" fill="#74b9ff"/>
  <text x="220" y="30" text-anchor="middle" fill="#74b9ff" font-size="8">e-</text>
  <!-- Current direction label -->
  <text x="185" y="18" text-anchor="middle" fill="#ffd700" font-size="10">I</text>
  <text x="185" y="295" text-anchor="middle" fill="#ffd700" font-size="10">I</text>
  <!-- Conditions -->
  <text x="200" y="145" text-anchor="middle" fill="#dfe6e9" font-size="10">Условия тока:</text>
  <text x="200" y="160" text-anchor="middle" fill="#55efc4" font-size="9">1. Свободные заряды</text>
  <text x="200" y="173" text-anchor="middle" fill="#55efc4" font-size="9">2. Электрич. поле</text>
  <text x="200" y="186" text-anchor="middle" fill="#55efc4" font-size="9">3. Замкнутая цепь</text>
  <!-- Formula -->
  <text x="200" y="210" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">I = dq/dt</text>
</svg>