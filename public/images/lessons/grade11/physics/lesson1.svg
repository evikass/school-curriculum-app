<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="fieldGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4169e1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e90ff;stop-opacity:0.1" />
    </radialGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGradient)" />
  
  <!-- Двойная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2" />
  <rect x="8" y="8" width="484" height="334" fill="none" stroke="#3498db" stroke-width="1" />
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="url(#textGradient)">Магнитное поле и его характеристики</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#7f8c8d">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Урок 25</text>
  
  <!-- Панель 1: Прямой проводник с током -->
  <g transform="translate(80, 100)">
    <!-- Проводник -->
    <line x1="0" y1="50" x2="120" y2="50" stroke="#8b4513" stroke-width="6" />
    <circle cx="0" cy="50" r="8" fill="#8b4513" />
    <circle cx="120" cy="50" r="8" fill="#8b4513" />
    
    <!-- Стрелки направления тока -->
    <polygon points="110,45 120,50 110,55" fill="#ff0000" />
    <text x="125" y="55" font-family="Arial, sans-serif" font-size="14" fill="#ff0000">I</text>
    
    <!-- Линии магнитного поля -->
    <circle cx="60" cy="50" r="20" fill="none" stroke="#4169e1" stroke-width="2" />
    <circle cx="60" cy="50" r="30" fill="none" stroke="#4169e1" stroke-width="2" />
    <circle cx="60" cy="50" r="40" fill="none" stroke="#4169e1" stroke-width="2" />
    <circle cx="60" cy="50" r="50" fill="none" stroke="#4169e1" stroke-width="2" />
    
    <!-- Стрелки направления поля -->
    <polygon points="80,50 75,45 75,55" fill="#4169e1" />
    <polygon points="60,70 55,75 65,75" fill="#4169e1" />
    <polygon points="40,50 45,45 45,55" fill="#4169e1" />
    <polygon points="60,30 55,25 65,25" fill="#4169e1" />
    
    <!-- Вектор B -->
    <line x1="60" y1="50" x2="90" y2="20" stroke="#ff6347" stroke-width="2" />
    <polygon points="90,20 85,25 95,25" fill="#ff6347" />
    <text x="95" y="25" font-family="Arial, sans-serif" font-size="14" fill="#ff6347">B</text>
    
    <!-- Подписи -->
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Прямой проводник</text>
    <text x="60" y="90" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">с током</text>
    
    <!-- Правило буравчика -->
    <rect x="10" y="110" width="100" height="40" fill="#f0f8ff" stroke="#4169e1" stroke-width="1" rx="5" />
    <text x="60" y="125" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Правило буравчика:</text>
    <text x="60" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">поворот рукоятки = ток</text>
  </g>
  
  <!-- Формула B = μ₀I/(2πR) -->
  <g transform="translate(250, 90)">
    <rect x="0" y="0" width="200" height="30" fill="#fff8dc" stroke="#ff8c00" stroke-width="1" rx="5" />
    <text x="100" y="20" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50">B = μ₀I/(2πR)</text>
  </g>
  
  <!-- Панель 2: Круговой виток -->
  <g transform="translate(250, 140)">
    <!-- Виток -->
    <circle cx="60" cy="60" r="40" fill="none" stroke="#8b4513" stroke-width="6" />
    
    <!-- Направление тока -->
    <polygon points="100,60 95,55 95,65" fill="#ff0000" />
    <polygon points="60,20 55,25 65,25" fill="#ff0000" />
    <polygon points="20,60 25,55 25,65" fill="#ff0000" />
    <polygon points="60,100 55,95 65,95" fill="#ff0000" />
    <text x="105" y="65" font-family="Arial, sans-serif" font-size="14" fill="#ff0000">I</text>
    
    <!-- Линии поля -->
    <ellipse cx="60" cy="60" rx="60" ry="30" fill="none" stroke="#4169e1" stroke-width="2" stroke-dasharray="5,3" />
    <ellipse cx="60" cy="60" rx="70" ry="35" fill="none" stroke="#4169e1" stroke-width="2" stroke-dasharray="5,3" />
    
    <!-- Вектор B в центре -->
    <line x1="60" y1="60" x2="60" y2="30" stroke="#ff6347" stroke-width="2" />
    <polygon points="60,30 55,35 65,35" fill="#ff6347" />
    <text x="65" y="35" font-family="Arial, sans-serif" font-size="14" fill="#ff6347">B</text>
    
    <!-- Подписи -->
    <text x="60" y="10" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Круговой виток</text>
    <text x="60" y="120" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">с током</text>
  </g>
  
  <!-- Панель 3: Соленоид -->
  <g transform="translate(80, 200)">
    <!-- Соленоид -->
    <path d="M 0,50 Q 10,40 20,50 T 40,50 T 60,50 T 80,50 T 100,50 T 120,50" 
          fill="none" stroke="#8b4513" stroke-width="3" />
    <path d="M 0,70 Q 10,60 20,70 T 40,70 T 60,70 T 80,70 T 100,70 T 120,70" 
          fill="none" stroke="#8b4513" stroke-width="3" />
    
    <!-- Направление тока -->
    <polygon points="15,55 20,50 15,45" fill="#ff0000" />
    <polygon points="105,65 100,70 105,75" fill="#ff0000" />
    <text x="25" y="55" font-family="Arial, sans-serif" font-size="10" fill="#ff0000">I</text>
    <text x="110" y="65" font-family="Arial, sans-serif" font-size="10" fill="#ff0000">I</text>
    
    <!-- Линии поля внутри соленоида -->
    <line x1="20" y1="60" x2="100" y2="60" stroke="#4169e1" stroke-width="2" />
    <polygon points="100,60 95,55 95,65" fill="#4169e1" />
    <text x="105" y="65" font-family="Arial, sans-serif" font-size="14" fill="#4169e1">B</text>
    
    <!-- Линии поля снаружи -->
    <path d="M 0,30 Q 60,20 120,30" fill="none" stroke="#4169e1" stroke-width="2" stroke-dasharray="5,3" />
    <path d="M 0,90 Q 60,100 120,90" fill="none" stroke="#4169e1" stroke-width="2" stroke-dasharray="5,3" />
    
    <!-- Подписи -->
    <text x="60" y="15" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Соленоид</text>
    <text x="60" y="115" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">с током</text>
  </g>
  
  <!-- Легенда/объяснения -->
  <g transform="translate(340, 200)">
    <rect x="0" y="0" width="150" height="120" fill="#f5f5f5" stroke="#666" stroke-width="1" rx="5" />
    <text x="75" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">Легенда</text>
    
    <circle cx="15" cy="35" r="5" fill="#8b4513" />
    <text x="25" y="40" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Проводник</text>
    
    <line x1="10" y1="50" x2="20" y2="50" stroke="#ff0000" stroke-width="2" />
    <polygon points="20,50 15,47 15,53" fill="#ff0000" />
    <text x="25" y="54" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Направление тока</text>
    
    <line x1="10" y1="65" x2="20" y2="65" stroke="#4169e1" stroke-width="2" />
    <polygon points="20,65 15,62 15,68" fill="#4169e1" />
    <text x="25" y="69" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Линии поля</text>
    
    <line x1="10" y1="80" x2="20" y2="80" stroke="#ff6347" stroke-width="2" />
    <polygon points="20,80 15,77 15,83" fill="#ff6347" />
    <text x="25" y="84" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Вектор B</text>
    
    <text x="75" y="105" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">μ₀ = 4π·10⁻⁷ Гн/м</text>
  </g>
  
  <!-- Дополнительные подписи и пояснения -->
  <g transform="translate(10, 320)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#666">
      Магнитное поле создаётся движущимися зарядами. Направление поля определяется правилом буравчика.
    </text>
  </g>
  
  <!-- Уравнение для соленоида -->
  <g transform="translate(340, 140)">
    <rect x="0" y="0" width="150" height="40" fill="#fff8dc" stroke="#ff8c00" stroke-width="1" rx="5" />
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Для соленоида: B = μ₀nI</text>
    <text x="75" y="30" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">n = число витков/м</text>
  </g>
</svg>