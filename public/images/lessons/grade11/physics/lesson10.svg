<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg10)"/>
  <!-- Title -->
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Электролиз</text>
  <!-- Electrolyte bath -->
  <rect x="80" y="60" width="240" height="130" rx="5" fill="#0984e3" opacity="0.15" stroke="#74b9ff" stroke-width="1.5"/>
  <text x="200" y="185" text-anchor="middle" fill="#74b9ff" font-size="9">CuSO4 раствор</text>
  <!-- Cathode (-) -->
  <rect x="120" y="50" width="12" height="110" rx="2" fill="#636e72" stroke="#a29bfe" stroke-width="1.5"/>
  <text x="126" y="45" text-anchor="middle" fill="#74b9ff" font-size="10" font-weight="bold">-</text>
  <text x="126" y="175" text-anchor="middle" fill="#74b9ff" font-size="9">Катод</text>
  <!-- Copper on cathode -->
  <rect x="112" y="130" width="28" height="25" rx="3" fill="#e17055" opacity="0.6" stroke="#fab1a0" stroke-width="1"/>
  <text x="126" y="146" text-anchor="middle" fill="#fab1a0" font-size="7">Cu</text>
  <!-- Anode (+) -->
  <rect x="268" y="50" width="12" height="110" rx="2" fill="#636e72" stroke="#ff7675" stroke-width="1.5"/>
  <text x="274" y="45" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">+</text>
  <text x="274" y="175" text-anchor="middle" fill="#ff7675" font-size="9">Анод</text>
  <!-- Ions in solution -->
  <circle cx="170" cy="100" r="7" fill="#ff7675" stroke="#fab1a0" stroke-width="1"/>
  <text x="170" y="103" text-anchor="middle" fill="#fff" font-size="6">Cu2+</text>
  <circle cx="220" cy="120" r="7" fill="#ff7675" stroke="#fab1a0" stroke-width="1"/>
  <text x="220" y="123" text-anchor="middle" fill="#fff" font-size="6">Cu2+</text>
  <circle cx="190" cy="140" r="8" fill="#74b9ff" stroke="#a29bfe" stroke-width="1"/>
  <text x="190" y="143" text-anchor="middle" fill="#fff" font-size="5">SO4 2-</text>
  <circle cx="230" cy="90" r="8" fill="#74b9ff" stroke="#a29bfe" stroke-width="1"/>
  <text x="230" y="93" text-anchor="middle" fill="#fff" font-size="5">SO4 2-</text>
  <!-- Ion movement arrows -->
  <line x1="155" y1="100" x2="135" y2="110" stroke="#ff7675" stroke-width="1"/>
  <polygon points="135,110 137,104 141,111" fill="#ff7675"/>
  <line x1="240" y1="100" x2="265" y2="110" stroke="#74b9ff" stroke-width="1"/>
  <polygon points="265,110 263,104 259,111" fill="#74b9ff"/>
  <!-- Battery -->
  <rect x="150" y="15" width="100" height="20" rx="3" fill="#2d3436" stroke="#636e72" stroke-width="1"/>
  <text x="200" y="30" text-anchor="middle" fill="#ffeaa7" font-size="9">E (источник)</text>
  <line x1="150" y1="25" x2="126" y2="50" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="250" y1="25" x2="274" y2="50" stroke="#ffd700" stroke-width="1.5"/>
  <!-- Faraday laws -->
  <rect x="20" y="200" width="360" height="90" rx="8" fill="#2d3436" opacity="0.6"/>
  <text x="200" y="220" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Законы Фарадея</text>
  <text x="120" y="240" text-anchor="middle" fill="#55efc4" font-size="12" font-weight="bold">m = kIt</text>
  <text x="120" y="258" text-anchor="middle" fill="#dfe6e9" font-size="9">1-й закон</text>
  <text x="290" y="240" text-anchor="middle" fill="#ff7675" font-size="12" font-weight="bold">k = M/(nF)</text>
  <text x="290" y="258" text-anchor="middle" fill="#dfe6e9" font-size="9">2-й закон</text>
  <text x="200" y="280" text-anchor="middle" fill="#a29bfe" font-size="10" font-weight="bold">m = MIt/(nF)</text>
  <text x="200" y="290" text-anchor="middle" fill="#636e72" font-size="7">F = 96500 Кл/моль</text>
</svg>