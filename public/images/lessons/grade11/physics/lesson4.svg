<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="magnetGrad">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c0392b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#ecf0f1" stroke-width="1" rx="3"/>
  
  <!-- Заголовки -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Урок 4: Электромагнитная индукция</text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7f8c8d">Опыты Фарадея</text>
  <text x="50" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">ФИЗИКА · 11 КЛАСС</text>
  <text x="450" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#95a5a6">№4</text>
  
  <!-- Портрет Фарадея -->
  <circle cx="80" cy="110" r="25" fill="#bdc3c7" stroke="#7f8c8d" stroke-width="1"/>
  <circle cx="80" cy="105" r="8" fill="#7f8c8d"/>
  <path d="M65,120 Q80,115 95,120 L95,130 L65,130 Z" fill="#7f8c8d"/>
  <text x="80" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">М. Фарадей</text>
  <text x="80" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">1791-1867</text>
  
  <!-- Схема опыта 1 -->
  <text x="200" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Опыт 1</text>
  
  <!-- Катушка -->
  <path d="M160,110 Q165,105 170,110 T180,110 T190,110 T200,110 T210,110 T220,110 T230,110 T240,110 T250,110 T260,110 T270,110 T280,110 T290,110 T300,110 T310,110 T320,110 T330,110 Q335,115 330,120 T320,120 T310,120 T300,120 T290,120 T280,120 T270,120 T260,120 T250,120 T240,120 T230,120 T220,120 T210,120 T200,120 T190,120 T180,120 T170,120 Q165,115 160,110" fill="none" stroke="#34495e" stroke-width="2"/>
  <line x1="160" y1="110" x2="160" y2="130" stroke="#34495e" stroke-width="2"/>
  <line x1="330" y1="110" x2="330" y2="130" stroke="#34495e" stroke-width="2"/>
  
  <!-- Магнит -->
  <rect x="240" y="130" width="40" height="20" fill="url(#magnetGrad)" stroke="#c0392b" stroke-width="1" filter="url(#shadow)"/>
  <text x="250" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">N</text>
  <text x="270" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">S</text>
  
  <!-- Стрелка движения -->
  <line x1="230" y1="140" x2="215" y2="140" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="210" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">движение</text>
  
  <!-- Гальванометр -->
  <circle cx="250" cy="170" r="15" fill="none" stroke="#34495e" stroke-width="2"/>
  <line x1="250" y1="170" x2="265" y2="170" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="250" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Гальванометр</text>
  
  <!-- Схема опыта 2 -->
  <text x="200" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Опыт 2</text>
  
  <!-- Первичная катушка -->
  <path d="M160,245 Q165,240 170,245 T180,245 T190,245 T200,245 T210,245 T220,245 T230,245 T240,245" fill="none" stroke="#34495e" stroke-width="2"/>
  <line x1="160" y1="245" x2="160" y2="255" stroke="#34495e" stroke-width="2"/>
  <line x1="240" y1="245" x2="240" y2="255" stroke="#34495e" stroke-width="2"/>
  
  <!-- Вторичная катушка -->
  <path d="M260,245 Q265,240 270,245 T280,245 T290,245 T300,245 T310,245 T320,245 T330,245 T340,245" fill="none" stroke="#34495e" stroke-width="2"/>
  <line x1="260" y1="245" x2="260" y2="255" stroke="#34495e" stroke-width="2"/>
  <line x1="340" y1="245" x2="340" y2="255" stroke="#34495e" stroke-width="2"/>
  
  <!-- Ядро -->
  <rect x="235" y="248" width="30" height="12" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="250" y1="250" x2="250" y2="258" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Источник тока -->
  <circle cx="200" cy="265" r="8" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <text x="200" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">+</text>
  <circle cx="200" cy="275" r="8" fill="none" stroke="#3498db" stroke-width="2"/>
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#3498db">-</text>
  <line x1="200" y1="257" x2="200" y2="257" stroke="#34495e" stroke-width="2"/>
  <line x1="200" y1="283" x2="200" y2="283" stroke="#34495e" stroke-width="2"/>
  
  <!-- Формулы -->
  <text x="380" y="110" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Магнитный поток:</text>
  <text x="380" y="130" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">Φ = B·S·cos(α)</text>
  
  <text x="380" y="160" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">ЭДС индукции:</text>
  <text x="380" y="180" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">ε = -dΦ/dt</text>
  
  <text x="380" y="210" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Закон Фарадея:</text>
  <text x="380" y="230" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">ε = -N·dΦ/dt</text>
  
  <text x="380" y="260" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">1831 г.</text>
  <text x="380" y="280" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">открытие</text>
  <text x="380" y="300" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">индукции</text>
  
  <!-- Линии магнитного поля -->
  <path d="M100,110 Q150,90 200,110 Q250,130 300,110" fill="none" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <path d="M100,120 Q150,100 200,120 Q250,140 300,120" fill="none" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  <path d="M100,130 Q150,110 200,130 Q250,150 300,130" fill="none" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3" opacity="0.7"/>
  
  <!-- Определения -->
  <rect x="20" y="200" width="120" height="80" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="3" opacity="0.8"/>
  <text x="80" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" font-weight="bold">Ключевые термины:</text>
  <text x="25" y="240" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Индукция</text>
  <text x="25" y="255" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Магнитный поток</text>
  <text x="25" y="270" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• ЭДС индукции</text>
  
  <!-- Стрелка определение -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>