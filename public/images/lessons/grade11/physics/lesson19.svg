<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wheelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a86e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d5fb8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mirrorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6600;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffff00;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffff00;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="spaceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000066;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Двойная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#333" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#666" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" font-weight="bold">Скорость света</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#666">ФИЗИКА · 11 КЛАСС</text>
  <text x="470" y="25" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#666">Урок №24</text>
  
  <!-- Опыт Физо -->
  <g id="fizou">
    <!-- Заголовок опыта -->
    <text x="120" y="85" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Опыт Физо</text>
    
    <!-- Зубчатое колесо -->
    <circle cx="120" cy="130" r="25" fill="url(#wheelGrad)" stroke="#1a4d8c" stroke-width="1"/>
    <path d="M120,105 L120,115 M135,115 L125,125 M145,130 L135,130 M145,145 L135,135 M135,145 L125,135 M120,155 L120,145 M105,145 L115,135 M95,130 L105,130 M95,115 L105,125" stroke="white" stroke-width="1" fill="none"/>
    <text x="120" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Зубчатое колесо</text>
    
    <!-- Источник света -->
    <rect x="70" y="115" width="20" height="30" fill="#ffcc00" stroke="#cc9900" stroke-width="1"/>
    <circle cx="80" cy="130" r="8" fill="#ffff00" stroke="#ffcc00" stroke-width="1"/>
    <text x="80" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Лампа</text>
    
    <!-- Линза -->
    <ellipse cx="170" cy="130" rx="8" ry="25" fill="none" stroke="#0066cc" stroke-width="2"/>
    <text x="170" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Линза</text>
    
    <!-- Световой пучок -->
    <path d="M90,130 L112,130 L168,130 L240,130" stroke="url(#lightGrad)" stroke-width="3" fill="none"/>
    <path d="M90,125 L112,125 L168,125 L240,125" stroke="url(#lightGrad)" stroke-width="1" fill="none"/>
    <path d="M90,135 L112,135 L168,135 L240,135" stroke="url(#lightGrad)" stroke-width="1" fill="none"/>
    <text x="165" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Световой пучок</text>
    
    <!-- Зеркало -->
    <rect x="235" y="110" width="10" height="40" fill="url(#mirrorGrad)" stroke="#cc5200" stroke-width="1"/>
    <text x="240" y="165" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Зеркало</text>
    
    <!-- Расстояние -->
    <line x1="120" y1="190" x2="240" y2="190" stroke="#333" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="120" y1="185" x2="120" y2="195" stroke="#333" stroke-width="1"/>
    <line x1="240" y1="185" x2="240" y2="195" stroke="#333" stroke-width="1"/>
    <text x="180" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">L = 8.6 км</text>
    
    <!-- Формула скорости света -->
    <rect x="70" y="220" width="140" height="50" fill="#f0f8ff" stroke="#999" stroke-width="1" rx="3"/>
    <text x="140" y="240" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">c = 2L·n/Δt</text>
    <text x="140" y="255" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">c ≈ 3·10⁸ м/с</text>
    <text x="140" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">n - число зубьев</text>
  </g>
  
  <!-- Опыт Рёмера -->
  <g id="roemer">
    <!-- Заголовок опыта -->
    <text x="380" y="85" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" font-weight="bold">Опыт Рёмера</text>
    
    <!-- Фоновая область космоса -->
    <rect x="290" y="95" width="180" height="230" fill="url(#spaceGrad)" opacity="0.3"/>
    
    <!-- Солнце -->
    <circle cx="320" cy="180" r="20" fill="#ffff00" stroke="#ffcc00" stroke-width="1"/>
    <path d="M320,160 L320,200 M300,180 L340,180 M308,168 L332,192 M308,192 L332,168" stroke="#ff9900" stroke-width="2"/>
    <text x="320" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle">Солнце</text>
    
    <!-- Орбита Юпитера -->
    <ellipse cx="380" cy="200" rx="60" ry="40" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="380" y="255" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Орбита Юпитера</text>
    
    <!-- Ио -->
    <circle cx="420" cy="200" r="5" fill="#cc9900" stroke="#996600" stroke-width="1"/>
    <text x="420" y="220" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Ио</text>
    
    <!-- Земля -->
    <circle cx="320" cy="140" r="6" fill="#3366ff" stroke="#003399" stroke-width="1"/>
    <text x="320" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Земля</text>
    
    <!-- Световые лучи -->
    <path d="M320,180 L420,200" stroke="#ffff00" stroke-width="2" fill="none" opacity="0.7"/>
    <path d="M420,200 L320,140" stroke="#ffff00" stroke-width="2" fill="none" opacity="0.7"/>
    
    <!-- Затмение -->
    <circle cx="320" cy="260" r="8" fill="#cc9900" stroke="#996600" stroke-width="1"/>
    <circle cx="320" cy="260" r="15" fill="none" stroke="#ff0000" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="320" y="285" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Затмение Ио</text>
    
    <!-- Измерение времени -->
    <rect x="350" y="240" width="100" height="60" fill="#f0f8ff" stroke="#999" stroke-width="1" rx="3"/>
    <text x="400" y="255" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Период Ио:</text>
    <text x="400" y="270" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">T = 42.5 ч</text>
    <text x="400" y="285" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">Δt = 1000 с</text>
    <text x="400" y="295" font-family="Arial, sans-serif" font-size="9" text-anchor="middle">d = 2.98·10⁸ м/с</text>
  </g>
  
  <!-- График зависимости -->
  <g id="graph">
    <rect x="60" y="290" width="380" height="35" fill="#f9f9f9" stroke="#999" stroke-width="1" rx="3"/>
    <text x="250" y="305" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">Зависимость скорости света от среды</text>
    <text x="70" y="318" font-family="Arial, sans-serif" font-size="8">вакуум</text>
    <text x="120" y="318" font-family="Arial, sans-serif" font-size="8">воздух</text>
    <text x="170" y="318" font-family="Arial, sans-serif" font-size="8">вода</text>
    <text x="220" y="318" font-family="Arial, sans-serif" font-size="8">стекло</text>
    <text x="270" y="318" font-family="Arial, sans-serif" font-size="8">алмаз</text>
    <line x1="70" y1="310" x2="70" y2="312" stroke="#333" stroke-width="1"/>
    <line x1="120" y1="310" x2="120" y2="312" stroke="#333" stroke-width="1"/>
    <line x1="170" y1="310" x2="170" y2="312" stroke="#333" stroke-width="1"/>
    <line x1="220" y1="310" x2="220" y2="312" stroke="#333" stroke-width="1"/>
    <line x1="270" y1="310" x2="270" y2="312" stroke="#333" stroke-width="1"/>
    <line x1="70" y1="310" x2="270" y2="310" stroke="#333" stroke-width="1"/>
    <line x1="70" y1="310" x2="70" y2="308" stroke="#333" stroke-width="1"/>
    <line x1="120" y1="310" x2="120" y2="308.5" stroke="#333" stroke-width="1"/>
    <line x1="170" y1="310" x2="170" y2="307" stroke="#333" stroke-width="1"/>
    <line x1="220" y1="310" x2="220" y2="305.5" stroke="#333" stroke-width="1"/>
    <line x1="270" y1="310" x2="270" y2="304" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- Легенда -->
  <g id="legend">
    <rect x="410" y="290" width="70" height="35" fill="#f0f8ff" stroke="#999" stroke-width="1" rx="3"/>
    <text x="445" y="302" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" font-weight="bold">n = 720</text>
    <text x="445" y="313" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">частота = 25 Гц</text>
    <text x="445" y="320" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">Δt = 2.8·10⁻⁴ с</text>
  </g>
</svg>