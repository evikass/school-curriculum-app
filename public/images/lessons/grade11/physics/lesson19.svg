<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs><linearGradient id="bg19" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
  <rect width="400" height="300" fill="url(#bg19)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Затухающие и вынужденные колебания. Резонанс</text>
  <!-- Damped oscillations -->
  <text x="110" y="48" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Затухающие</text>
  <line x1="20" y1="100" x2="200" y2="100" stroke="#636e72" stroke-width="0.5"/>
  <path d="M20,100 Q35,60 50,100 Q65,140 80,100 Q95,72 110,100 Q125,128 140,100 Q155,80 170,100 Q185,118 200,100" fill="none" stroke="#ff7675" stroke-width="1.5"/>
  <!-- Envelope -->
  <path d="M20,60 Q80,50 140,70 Q180,80 200,85" fill="none" stroke="#ff7675" stroke-width="0.5" stroke-dasharray="3,3"/>
  <path d="M20,140 Q80,150 140,130 Q180,120 200,115" fill="none" stroke="#ff7675" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="110" y="158" text-anchor="middle" fill="#636e72" font-size="8">A убывает (трение)</text>
  <!-- Resonance curve -->
  <text x="310" y="48" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Резонансная кривая</text>
  <line x1="230" y1="160" x2="395" y2="160" stroke="#dfe6e9" stroke-width="1"/>
  <line x1="310" y1="160" x2="310" y2="55" stroke="#dfe6e9" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="395" y="155" fill="#dfe6e9" font-size="8">v</text>
  <text x="315" y="50" fill="#dfe6e9" font-size="8">A</text>
  <!-- High Q curve -->
  <path d="M240,158 Q270,155 290,130 Q300,100 310,70 Q320,100 330,130 Q350,155 380,158" fill="none" stroke="#55efc4" stroke-width="2.5"/>
  <text x="335" y="80" fill="#55efc4" font-size="8">мало трения</text>
  <!-- Low Q curve -->
  <path d="M240,155 Q270,148 290,135 Q300,125 310,118 Q320,125 330,135 Q350,148 380,155" fill="none" stroke="#ff7675" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="335" y="115" fill="#ff7675" font-size="8">много трения</text>
  <!-- v_0 mark -->
  <text x="310" y="172" text-anchor="middle" fill="#ffd700" font-size="9">v_0</text>
  <!-- Resonance formula -->
  <text x="310" y="190" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">v_вын = v_собст -> A max!</text>
  <!-- Applications and dangers -->
  <rect x="20" y="200" width="175" height="90" rx="8" fill="#2d3436" opacity="0.6"/>
  <text x="107" y="220" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Применение</text>
  <text x="35" y="238" fill="#dfe6e9" font-size="8">Музыкальные инструменты</text>
  <text x="35" y="253" fill="#dfe6e9" font-size="8">Радиоприёмники</text>
  <text x="35" y="268" fill="#dfe6e9" font-size="8">Сейсмографы</text>
  <text x="35" y="283" fill="#dfe6e9" font-size="8">Ультразвуковая терапия</text>
  <rect x="205" y="200" width="175" height="90" rx="8" fill="#2d3436" opacity="0.6"/>
  <text x="292" y="220" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Опасность</text>
  <text x="220" y="238" fill="#dfe6e9" font-size="8">Разрушение мостов</text>
  <text x="220" y="253" fill="#dfe6e9" font-size="8">Разрушение зданий</text>
  <text x="220" y="268" fill="#dfe6e9" font-size="8">Поломка механизмов</text>
  <text x="220" y="283" fill="#636e72" font-size="7">(Такерманский мост, 1940)</text>
</svg>