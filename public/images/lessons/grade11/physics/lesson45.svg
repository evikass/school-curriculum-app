<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Ядерные реакции</text>

<!-- Fission -->
<rect x="20" y="40" width="180" height="85" rx="5" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1"/>
<text x="110" y="58" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Деление ядер</text>
<!-- U-235 + n -->
<circle cx="55" cy="80" r="14" fill="#ff7675" opacity="0.5"/>
<text x="55" y="77" text-anchor="middle" fill="#fff" font-size="6">U-235</text>
<circle cx="35" cy="70" r="3" fill="#74b9ff"/>
<line x1="38" y1="70" x2="42" y2="75" stroke="#74b9ff" stroke-width="1"/>
<text x="35" y="63" fill="#74b9ff" font-size="6">n</text>
<!-- Arrows to fragments -->
<path d="M70,75 Q85,65 100,72" fill="none" stroke="#ffd700" stroke-width="1.5"/>
<path d="M70,85 Q85,95 100,88" fill="none" stroke="#ffd700" stroke-width="1.5"/>
<circle cx="115" cy="72" r="10" fill="#55efc4" opacity="0.5"/>
<text x="115" y="75" text-anchor="middle" fill="#fff" font-size="5">Ba</text>
<circle cx="115" cy="92" r="9" fill="#74b9ff" opacity="0.5"/>
<text x="115" y="95" text-anchor="middle" fill="#fff" font-size="5">Kr</text>
<!-- 3 neutrons -->
<circle cx="140" cy="65" r="3" fill="#74b9ff"/><circle cx="145" cy="80" r="3" fill="#74b9ff"/><circle cx="135" cy="95" r="3" fill="#74b9ff"/>
<text x="110" y="115" text-anchor="middle" fill="#636e72" font-size="7">+ 3n + ~200 МэВ</text>
<!-- Fusion -->
<rect x="210" y="40" width="180" height="85" rx="5" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1"/>
<text x="300" y="58" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Синтез ядер</text>
<circle cx="250" cy="80" r="8" fill="#74b9ff" opacity="0.6"/>
<text x="250" y="83" text-anchor="middle" fill="#fff" font-size="6">D</text>
<circle cx="280" cy="80" r="8" fill="#ff7675" opacity="0.6"/>
<text x="280" y="83" text-anchor="middle" fill="#fff" font-size="6">T</text>
<line x1="290" y1="80" x2="310" y2="80" stroke="#ffd700" stroke-width="1.5"/>
<circle cx="330" cy="76" r="10" fill="#a29bfe" opacity="0.5"/>
<text x="330" y="79" text-anchor="middle" fill="#fff" font-size="6">He</text>
<circle cx="350" cy="90" r="3" fill="#74b9ff"/>
<text x="355" y="90" fill="#74b9ff" font-size="6">n</text>
<text x="300" y="105" text-anchor="middle" fill="#636e72" font-size="7">+ 17,6 МэВ</text>
<text x="300" y="118" text-anchor="middle" fill="#ff7675" font-size="7">T ~ 10^8 К!</text>
<!-- Energy output -->
<rect x="20" y="135" width="360" height="50" rx="8" fill="#6c5ce7" opacity="0.15" stroke="#a29bfe" stroke-width="1"/>
<text x="200" y="155" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Энергетический выход</text>
<text x="200" y="175" text-anchor="middle" fill="#55efc4" font-size="12" font-weight="bold">Q = (m1+m2-m3-m4)*c2</text>
<!-- Conservation -->
<text x="200" y="210" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Законы сохранения</text>
<text x="110" y="230" fill="#55efc4" font-size="9">Сумма Z = const</text>
<text x="110" y="248" fill="#74b9ff" font-size="9">Сумма A = const</text>
<text x="290" y="230" fill="#ff7675" font-size="9">E = const</text>
<text x="290" y="248" fill="#ffd700" font-size="9">p = const</text>
<!-- Chain reaction -->
<text x="200" y="275" text-anchor="middle" fill="#ff7675" font-size="9" font-weight="bold">Цепная реакция: 1n -> 3n -> 9n -> ...</text>
<text x="200" y="290" text-anchor="middle" fill="#636e72" font-size="8">Критическая масса U-235 ~ 50 кг</text>

</svg>