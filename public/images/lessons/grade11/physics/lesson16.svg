<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg16" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg16)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Самоиндукция. Энергия магнитного поля</text>
  <!-- Self-induction circuit -->
  <text x="110" y="50" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Цепь с индуктивностью</text>
  <!-- Battery -->
  <rect x="30" y="60" width="30" height="50" rx="3" fill="#2d3436" stroke="#636e72" stroke-width="1.5"/>
  <line x1="38" y1="65" x2="38" y2="75" stroke="#ff7675" stroke-width="2"/>
  <line x1="32" y1="70" x2="44" y2="70" stroke="#ff7675" stroke-width="2"/>
  <text x="45" y="100" text-anchor="middle" fill="#ffeaa7" font-size="8">E</text>
  <!-- Wires -->
  <line x1="45" y1="60" x2="45" y2="45" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="45" y1="45" x2="180" y2="45" stroke="#ffd700" stroke-width="1.5"/>
  <!-- Coil/inductor -->
  <path d="M90,45 C95,35 100,55 105,45 C110,35 115,55 120,45 C125,35 130,55 135,45 C140,35 145,55 150,45 C155,35 160,55 165,45 L180,45" fill="none" stroke="#74b9ff" stroke-width="2"/>
  <text x="130" y="30" text-anchor="middle" fill="#74b9ff" font-size="9">L</text>
  <!-- B field inside coil -->
  <line x1="100" y1="55" x2="160" y2="55" stroke="#55efc4" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="130" y="65" text-anchor="middle" fill="#55efc4" font-size="7">B</text>
  <!-- Resistor -->
  <rect x="110" y="80" width="50" height="15" rx="3" fill="#e17055" opacity="0.5" stroke="#fab1a0" stroke-width="1"/>
  <text x="135" y="92" text-anchor="middle" fill="#fab1a0" font-size="8">R</text>
  <line x1="135" y1="95" x2="135" y2="120" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="45" y1="110" x2="45" y2="120" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="45" y1="120" x2="135" y2="120" stroke="#ffd700" stroke-width="1.5"/>
  <!-- Switch -->
  <line x1="180" y1="45" x2="195" y2="45" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="210" y1="45" x2="225" y2="45" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="195" y1="45" x2="208" y2="35" stroke="#ffd700" stroke-width="1.5"/>
  <text x="205" y="28" fill="#ffd700" font-size="7">K</text>
  <!-- Self-induction EMF -->
  <text x="300" y="55" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">ЭДС самоиндукции</text>
  <text x="300" y="80" text-anchor="middle" fill="#ff7675" font-size="16" font-weight="bold">E = -LdI/dt</text>
  <!-- I(t) graph for switch on/off -->
  <text x="300" y="110" text-anchor="middle" fill="#ffeaa7" font-size="9">Ток при замыкании/размыкании</text>
  <!-- Axes -->
  <line x1="230" y1="175" x2="380" y2="175" stroke="#dfe6e9" stroke-width="1"/>
  <line x1="230" y1="175" x2="230" y2="120" stroke="#dfe6e9" stroke-width="1"/>
  <text x="380" y="170" fill="#dfe6e9" font-size="7">t</text>
  <text x="222" y="125" fill="#dfe6e9" font-size="7">I</text>
  <!-- Switch on curve -->
  <path d="M230,175 Q240,172 250,160 Q260,148 280,145 Q310,143 370,142" fill="none" stroke="#55efc4" stroke-width="2"/>
  <text x="350" y="140" fill="#55efc4" font-size="7">замыкание</text>
  <!-- Switch off curve -->
  <path d="M230,142 Q240,143 250,148 Q260,155 280,168 Q310,174 370,175" fill="none" stroke="#ff7675" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="350" y="167" fill="#ff7675" font-size="7">размыкание</text>
  <!-- Formulas -->
  <rect x="20" y="190" width="180" height="100" rx="8" fill="#2d3436" opacity="0.6"/>
  <text x="110" y="210" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Индуктивность</text>
  <text x="110" y="230" text-anchor="middle" fill="#55efc4" font-size="13" font-weight="bold">L = Ф/I</text>
  <text x="110" y="248" text-anchor="middle" fill="#dfe6e9" font-size="9">[L] = Гн (генри)</text>
  <text x="110" y="265" text-anchor="middle" fill="#a29bfe" font-size="8">L соленоида:</text>
  <text x="110" y="280" text-anchor="middle" fill="#a29bfe" font-size="9">L = m0*m*n2*V</text>
  <!-- Energy -->
  <rect x="210" y="190" width="180" height="100" rx="8" fill="#2d3436" opacity="0.6"/>
  <text x="300" y="210" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Энергия магн. поля</text>
  <text x="300" y="235" text-anchor="middle" fill="#ff7675" font-size="16" font-weight="bold">W = LI2/2</text>
  <text x="300" y="255" text-anchor="middle" fill="#dfe6e9" font-size="9">Аналогия: mv2/2</text>
  <text x="300" y="272" text-anchor="middle" fill="#636e72" font-size="8">L ~ m, I ~ v</text>
  <text x="300" y="287" text-anchor="middle" fill="#55efc4" font-size="8">w = B2/(2m0m)</text>
</svg>