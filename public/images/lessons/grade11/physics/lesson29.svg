<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad2">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">Эффект Комптона. Давление света</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#7f8c8d">ФИЗИКА · 11 КЛАСС</text>
  <text x="470" y="330" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#7f8c8d">Урок 29</text>
  
  <!-- Эффект Комптона -->
  <g transform="translate(30, 70)">
    <!-- Заголовок раздела -->
    <text x="80" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Эффект Комптона</text>
    
    <!-- Атом -->
    <circle cx="80" cy="40" r="15" fill="none" stroke="#3498db" stroke-width="2"/>
    <circle cx="80" cy="40" r="3" fill="#3498db"/>
    <text x="80" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Ядро</text>
    
    <!-- Электрон -->
    <circle cx="80" cy="40" r="5" fill="#e74c3c"/>
    <text x="80" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">e⁻</text>
    
    <!-- Входящая фотон -->
    <line x1="20" y1="40" x2="60" y2="40" stroke="url(#grad2)" stroke-width="3"/>
    <polygon points="60,40 55,35 55,45" fill="#e67e22"/>
    <text x="15" y="35" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">ν₀</text>
    
    <!-- Исходящий фотон -->
    <line x1="100" y1="40" x2="140" y2="25" stroke="url(#grad2)" stroke-width="2" stroke-dasharray="3,2"/>
    <polygon points="140,25 135,22 137,27" fill="#e67e22"/>
    <text x="145" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">ν</text>
    
    <!-- Улетевший электрон -->
    <line x1="80" y1="40" x2="120" y2="55" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="120,55 115,53 117,58" fill="#e74c3c"/>
    <text x="125" y="60" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">e⁻</text>
    
    <!-- Формула Комптона -->
    <rect x="20" y="90" width="120" height="50" fill="none" stroke="#2c3e50" stroke-width="1"/>
    <text x="80" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">Δλ = λ - λ₀</text>
    <text x="80" y="125" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">= (h/mₑc)(1 - cosθ)</text>
  </g>
  
  <!-- Давление света -->
  <g transform="translate(270, 70)">
    <!-- Заголовок раздела -->
    <text x="80" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Давление света</text>
    
    <!-- Световой поток -->
    <g transform="translate(0, 20)">
      <!-- Фотоны -->
      <circle cx="10" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="20" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="30" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="40" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="50" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="60" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="70" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="80" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="90" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="100" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="110" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="120" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="130" cy="30" r="2" fill="url(#grad2)"/>
      <circle cx="140" cy="30" r="2" fill="url(#grad2)"/>
      
      <!-- Пластина -->
      <rect x="140" y="20" width="10" height="20" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
      <text x="145" y="55" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Пластина</text>
      
      <!-- Давление -->
      <line x1="150" y1="30" x2="170" y2="30" stroke="#e74c3c" stroke-width="2"/>
      <polygon points="170,30 165,27 165,33" fill="#e74c3c"/>
      <text x="175" y="35" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">P</text>
    </g>
    
    <!-- Формула давления -->
    <rect x="0" y="70" width="160" height="40" fill="none" stroke="#2c3e50" stroke-width="1"/>
    <text x="80" y="90" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">P = W/c</text>
    <text x="80" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">P = 2U/c (для полного отражения)</text>
  </g>
  
  <!-- Опыт Лебедева -->
  <g transform="translate(30, 230)">
    <!-- Заголовок раздела -->
    <text x="200" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Опыт Лебедева (1900 г.)</text>
    
    <!-- Вакуумная камера -->
    <rect x="50" y="20" width="300" height="80" fill="none" stroke="#34495e" stroke-width="2"/>
    <text x="200" y="15" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Вакуумная камера</text>
    
    <!-- Лампа -->
    <rect x="20" y="50" width="30" height="20" fill="#f39c12" stroke="#d68910" stroke-width="1"/>
    <text x="35" y="85" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Лампа</text>
    
    <!-- Световой поток -->
    <g>
      <line x1="50" y1="55" x2="90" y2="55" stroke="url(#grad2)" stroke-width="2" opacity="0.7"/>
      <line x1="50" y1="60" x2="90" y2="60" stroke="url(#grad2)" stroke-width="2" opacity="0.7"/>
      <line x1="50" y1="65" x2="90" y2="65" stroke="url(#grad2)" stroke-width="2" opacity="0.7"/>
    </g>
    
    <!-- Вращающаяся система -->
    <circle cx="200" cy="60" r="30" fill="none" stroke="#3498db" stroke-width="2"/>
    <rect x="185" y="45" width="30" height="30" fill="none" stroke="#3498db" stroke-width="2" transform="rotate(45 200 60)"/>
    <circle cx="200" cy="60" r="5" fill="#3498db"/>
    
    <!-- Тонкие лопасти -->
    <rect x="195" y="30" width="10" height="20" fill="#e74c3c"/>
    <rect x="195" y="70" width="10" height="20" fill="#e74c3c"/>
    <rect x="170" y="55" width="20" height="10" fill="#e74c3c"/>
    <rect x="210" y="55" width="20" height="10" fill="#e74c3c"/>
    
    <!-- Нить -->
    <line x1="200" y1="30" x2="200" y2="10" stroke="#7f8c8d" stroke-width="1"/>
    <text x="200" y="5" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Нить</text>
    
    <!-- Призма -->
    <polygon points="280,50 320,50 300,80" fill="#9b59b6" stroke="#8e44ad" stroke-width="1"/>
    <text x="300" y="95" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Призма</text>
    
    <!-- Микроскоп -->
    <rect x="340" y="50" width="30" height="20" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
    <polygon points="370,55 385,60 370,65" fill="#95a5a6" stroke="#7f8c8d" stroke-width="1"/>
    <text x="355" y="85" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Микроскоп</text>
    
    <!-- Формулы опыта -->
    <text x="50" y="120" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">F = P·S = (W/c)·S</text>
    <text x="50" y="135" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">где S - площадь лопасти</text>
  </g>
  
  <!-- Историческая справка -->
  <g transform="translate(400, 80)">
    <rect x="0" y="0" width="80" height="60" fill="url(#grad1)" opacity="0.2"/>
    <text x="40" y="15" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50" font-weight="bold">1923</text>
    <text x="40" y="30" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Комптон:</text>
    <text x="40" y="42" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">объяснение</text>
    <text x="40" y="54" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">эффекта</text>
  </g>
  
  <!-- Ключевые термины -->
  <g transform="translate(400, 160)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" font-weight="bold">Ключевые термины:</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">• Фотон</text>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">• Комптоновская длина волны</text>
    <text x="0" y="41" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">• Давление излучения</text>
    <text x="0" y="54" font-family="Arial, sans-serif" font-size="9" fill="#2c3e50">• Электромагнитное поле</text>
  </g>
</svg>