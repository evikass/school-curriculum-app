<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <marker id="arrY" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ffd700"/>
    </marker>
    <marker id="arrC" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#55efc4"/>
    </marker>
  </defs>
  <rect width="400" height="300" fill="url(#bg11)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Магнитное взаимодействие токов</text>
  <!-- Two parallel wires - same direction (attract) -->
  <text x="100" y="48" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Однонаправленные</text>
  <line x1="70" y1="60" x2="70" y2="130" stroke="#74b9ff" stroke-width="3"/>
  <line x1="130" y1="60" x2="130" y2="130" stroke="#74b9ff" stroke-width="3"/>
  <polygon points="67,60 70,52 73,60" fill="#74b9ff"/>
  <polygon points="127,60 130,52 133,60" fill="#74b9ff"/>
  <text x="70" y="140" text-anchor="middle" fill="#74b9ff" font-size="8">I1</text>
  <text x="130" y="140" text-anchor="middle" fill="#74b9ff" font-size="8">I2</text>
  <!-- Attraction arrows -->
  <line x1="80" y1="90" x2="118" y2="90" stroke="#ff7675" stroke-width="1.5" marker-end="url(#arrY)"/>
  <line x1="120" y1="100" x2="82" y2="100" stroke="#ff7675" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="100" y="120" text-anchor="middle" fill="#ff7675" font-size="9">притягиваются</text>
  <!-- B field circles around left wire -->
  <circle cx="70" cy="90" r="15" fill="none" stroke="#55efc4" stroke-width="0.8" stroke-dasharray="2,2"/>
  <circle cx="130" cy="90" r="15" fill="none" stroke="#55efc4" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Two parallel wires - opposite direction (repel) -->
  <text x="300" y="48" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Разнонаправленные</text>
  <line x1="270" y1="60" x2="270" y2="130" stroke="#74b9ff" stroke-width="3"/>
  <line x1="330" y1="130" x2="330" y2="60" stroke="#ff7675" stroke-width="3"/>
  <polygon points="267,60 270,52 273,60" fill="#74b9ff"/>
  <polygon points="327,130 330,138 333,130" fill="#ff7675"/>
  <text x="270" y="140" text-anchor="middle" fill="#74b9ff" font-size="8">I1</text>
  <text x="330" y="55" text-anchor="middle" fill="#ff7675" font-size="8">I2</text>
  <!-- Repulsion arrows -->
  <line x1="280" y1="95" x2="260" y2="95" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrY)"/>
  <line x1="320" y1="95" x2="340" y2="95" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arrY)"/>
  <text x="300" y="120" text-anchor="middle" fill="#ffd700" font-size="9">отталкиваются</text>
  <!-- Oersted experiment -->
  <text x="200" y="168" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Опыт Эрстеда (1820)</text>
  <!-- Wire -->
  <line x1="80" y1="200" x2="320" y2="200" stroke="#74b9ff" stroke-width="3"/>
  <polygon points="320,197 328,200 320,203" fill="#74b9ff"/>
  <text x="340" y="204" fill="#74b9ff" font-size="10">I</text>
  <!-- Compass needle below -->
  <circle cx="200" cy="240" r="20" fill="none" stroke="#636e72" stroke-width="1"/>
  <line x1="200" y1="225" x2="200" y2="255" stroke="#ff7675" stroke-width="2"/>
  <line x1="200" y1="255" x2="200" y2="225" stroke="#dfe6e9" stroke-width="1.5"/>
  <text x="200" y="222" text-anchor="middle" fill="#ff7675" font-size="7">N</text>
  <text x="200" y="268" text-anchor="middle" fill="#74b9ff" font-size="7">S</text>
  <!-- Deflection -->
  <line x1="215" y1="240" x2="230" y2="235" stroke="#55efc4" stroke-width="1.5" marker-end="url(#arrC)"/>
  <text x="245" y="233" fill="#55efc4" font-size="8">отклонение!</text>
  <!-- B field direction -->
  <text x="200" y="290" text-anchor="middle" fill="#a29bfe" font-size="9">B = вектор магнитной индукции [Тл]</text>
</svg>