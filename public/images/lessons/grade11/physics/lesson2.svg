<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5C8A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="greenGrad">
      <stop offset="0%" style="stop-color:#2ECC71;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:0.4" />
    </radialGradient>
    
    <!-- Декоративная рамка -->
    <pattern id="dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#34495E"/>
    </pattern>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="#F8F9FA"/>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#34495E" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#dots)" stroke-width="1"/>
  
  <!-- Заголовок и класс -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2C3E50">ФИЗИКА · 11 КЛАСС</text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2C3E50">Урок 2: Сила Ампера</text>
  <text x="40" y="55" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">№2</text>
  
  <!-- Портрет Ампера -->
  <g transform="translate(30, 80)">
    <circle cx="35" cy="35" r="30" fill="url(#blueGrad)" opacity="0.3"/>
    <circle cx="35" cy="35" r="28" fill="#E8E8E8"/>
    <path d="M20,25 C20,15 50,15 50,25 C50,35 45,45 35,45 C25,45 20,35 20,25 Z" fill="#2C3E50"/>
    <circle cx="35" cy="20" r="10" fill="#FDBCB4"/>
    <path d="M25,35 C30,40 40,40 45,35" stroke="#2C3E50" stroke-width="2" fill="none"/>
    <text x="35" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Ампер</text>
    <text x="35" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">1775-1836</text>
  </g>
  
  <!-- Формула закона Ампера -->
  <g transform="translate(120, 100)">
    <rect x="0" y="0" width="150" height="40" fill="white" stroke="#34495E" stroke-width="1" rx="5"/>
    <text x="75" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2C3E50">F = B·I·L·sinα</text>
    <text x="75" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">Закон Ампера</text>
  </g>
  
  <!-- Схема проводника в магнитном поле -->
  <g transform="translate(100, 180)">
    <!-- Магнитные линии -->
    <path d="M50,30 Q40,50 50,70" stroke="#95A5A6" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    <path d="M150,30 Q160,50 150,70" stroke="#95A5A6" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    
    <!-- Магнит N и S -->
    <text x="40" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#E74C3C">N</text>
    <text x="160" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#3498DB">S</text>
    
    <!-- Проводник -->
    <rect x="95" y="45" width="10" height="30" fill="#E67E22" stroke="#D35400" stroke-width="1"/>
    <text x="100" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Проводник</text>
    
    <!-- Сила -->
    <path d="M100,35 L100,20" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowRed)"/>
    <text x="110" y="28" font-family="Arial, sans-serif" font-size="12" fill="#E74C3C">F</text>
    
    <!-- Ток -->
    <path d="M90,50 L85,50" stroke="#3498DB" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="75" y="55" font-family="Arial, sans-serif" font-size="12" fill="#3498DB">I</text>
    
    <!-- Стрелка для тока -->
    <defs>
      <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#3498DB"/>
      </marker>
      <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#E74C3C"/>
      </marker>
    </defs>
  </g>
  
  <!-- Правило левой руки -->
  <g transform="translate(280, 150)">
    <text x="60" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Правило левой руки</text>
    
    <!-- Рука -->
    <path d="M30,20 C30,15 40,10 50,10 C60,10 70,15 70,20 L70,60 C70,65 60,70 50,70 C40,70 30,65 30,60 Z" fill="#FDBCB4" stroke="#E67E22" stroke-width="1"/>
    
    <!-- Пальцы -->
    <rect x="35" y="15" width="8" height="20" fill="#FDBCB4" stroke="#E67E22" stroke-width="1" rx="4"/>
    <rect x="45" y="12" width="8" height="23" fill="#FDBCB4" stroke="#E67E22" stroke-width="1" rx="4"/>
    <rect x="55" y="12" width="8" height="23" fill="#FDBCB4" stroke="#E67E22" stroke-width="1" rx="4"/>
    <rect x="65" y="15" width="8" height="20" fill="#FDBCB4" stroke="#E67E22" stroke-width="1" rx="4"/>
    
    <!-- Направления -->
    <path d="M20,25 L10,25" stroke="#3498DB" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="5" y="28" font-family="Arial, sans-serif" font-size="10" fill="#3498DB">I</text>
    
    <path d="M40,75 Q40,85 50,85 Q60,85 60,75" stroke="#95A5A6" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
    <text x="35" y="95" font-family="Arial, sans-serif" font-size="10" fill="#95A5A6">B</text>
    
    <path d="M75,45 L90,45" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowRed)"/>
    <text x="92" y="48" font-family="Arial, sans-serif" font-size="10" fill="#E74C3C">F</text>
    
    <text x="50" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Ладонь в поле B</text>
    <text x="50" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">4 пальца по току</text>
    <text x="50" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Большой палец - сила</text>
  </g>
  
  <!-- Применение в технике -->
  <g transform="translate(100, 280)">
    <text x="150" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Применение в технике</text>
    
    <!-- Электродвигатель -->
    <g transform="translate(20, 20)">
      <circle cx="30" cy="30" r="25" fill="none" stroke="#34495E" stroke-width="2"/>
      <rect x="25" y="10" width="10" height="40" fill="#E74C3C" rx="5"/>
      <circle cx="30" cy="30" r="8" fill="#95A5A6"/>
      <text x="30" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Двигатель</text>
    </g>
    
    <!-- Динамо -->
    <g transform="translate(100, 20)">
      <rect x="10" y="10" width="40" height="40" fill="none" stroke="#34495E" stroke-width="2" rx="5"/>
      <circle cx="30" cy="30" r="15" fill="#3498DB" opacity="0.5"/>
      <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">D</text>
      <text x="30" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">Динамо</text>
    </g>
    
    <!-- МГД-генератор -->
    <g transform="translate(180, 20)">
      <rect x="10" y="10" width="40" height="40" fill="url(#greenGrad)" stroke="#27AE60" stroke-width="2" rx="5"/>
      <path d="M15,25 L45,25 M15,30 L45,30 M15,35 L45,35" stroke="#27AE60" stroke-width="1"/>
      <text x="30" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">МГД-генератор</text>
    </g>
  </g>
  
  <!-- Дополнительные элементы -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="60" height="60" fill="url(#blueGrad)" opacity="0.2" rx="5"/>
    <text x="30" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Сила</text>
    <text x="30" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Ампера</text>
  </g>
</svg>