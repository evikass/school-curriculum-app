<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg2)"/>
  <!-- Metal lattice -->
  <text x="100" y="25" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Металл</text>
  <g transform="translate(20,35)">
    <!-- Lattice ions -->
    <circle cx="30" cy="30" r="10" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
    <circle cx="80" cy="30" r="10" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
    <circle cx="130" cy="30" r="10" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
    <circle cx="30" cy="80" r="10" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
    <circle cx="80" cy="80" r="10" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
    <circle cx="130" cy="80" r="10" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
    <text x="80" y="83" text-anchor="middle" fill="#fff" font-size="8">+</text>
    <!-- Free electrons -->
    <circle cx="55" cy="55" r="4" fill="#74b9ff"/>
    <circle cx="105" cy="20" r="4" fill="#74b9ff"/>
    <circle cx="20" cy="65" r="4" fill="#74b9ff"/>
    <circle cx="110" cy="65" r="4" fill="#74b9ff"/>
    <circle cx="60" cy="105" r="4" fill="#74b9ff"/>
    <text x="140" y="58" fill="#74b9ff" font-size="8">e-</text>
    <text x="140" y="88" fill="#e17055" font-size="8">ион</text>
    <!-- E field arrow -->
    <line x1="15" y1="115" x2="140" y2="115" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowR)"/>
    <text x="80" y="128" text-anchor="middle" fill="#ffd700" font-size="9">E</text>
  </g>
  <!-- Electrolyte -->
  <text x="300" y="25" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Электролит</text>
  <g transform="translate(230,35)">
    <!-- Water molecules background -->
    <ellipse cx="80" cy="55" rx="60" ry="40" fill="#0984e3" opacity="0.15"/>
    <!-- Cations -->
    <circle cx="30" cy="35" r="8" fill="#ff7675" stroke="#fab1a0" stroke-width="1"/>
    <text x="30" y="38" text-anchor="middle" fill="#fff" font-size="8">+</text>
    <circle cx="120" cy="70" r="8" fill="#ff7675" stroke="#fab1a0" stroke-width="1"/>
    <text x="120" y="73" text-anchor="middle" fill="#fff" font-size="8">+</text>
    <!-- Anions -->
    <circle cx="60" cy="80" r="10" fill="#74b9ff" stroke="#a29bfe" stroke-width="1"/>
    <text x="60" y="83" text-anchor="middle" fill="#fff" font-size="7">-</text>
    <circle cx="110" cy="30" r="10" fill="#74b9ff" stroke="#a29bfe" stroke-width="1"/>
    <text x="110" y="33" text-anchor="middle" fill="#fff" font-size="7">-</text>
    <text x="30" y="22" fill="#ff7675" font-size="8">катион</text>
    <text x="60" y="98" fill="#74b9ff" font-size="8">анион</text>
  </g>
  <!-- Semiconductor -->
  <text x="100" y="195" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Полупроводник</text>
  <g transform="translate(20,200)">
    <!-- Crystal bonds -->
    <circle cx="30" cy="20" r="8" fill="#00b894" stroke="#55efc4" stroke-width="1"/>
    <circle cx="70" cy="20" r="8" fill="#00b894" stroke="#55efc4" stroke-width="1"/>
    <circle cx="110" cy="20" r="8" fill="#00b894" stroke="#55efc4" stroke-width="1"/>
    <circle cx="50" cy="50" r="8" fill="#00b894" stroke="#55efc4" stroke-width="1"/>
    <circle cx="90" cy="50" r="8" fill="#00b894" stroke="#55efc4" stroke-width="1"/>
    <line x1="38" y1="20" x2="62" y2="20" stroke="#55efc4" stroke-width="1"/>
    <line x1="78" y1="20" x2="102" y2="20" stroke="#55efc4" stroke-width="1"/>
    <line x1="30" y1="28" x2="50" y2="42" stroke="#55efc4" stroke-width="1"/>
    <line x1="70" y1="28" x2="50" y2="42" stroke="#55efc4" stroke-width="1"/>
    <line x1="70" y1="28" x2="90" y2="42" stroke="#55efc4" stroke-width="1"/>
    <line x1="110" y1="28" x2="90" y2="42" stroke="#55efc4" stroke-width="1"/>
    <!-- Hole -->
    <circle cx="130" cy="35" r="5" fill="none" stroke="#fdcb6e" stroke-width="1.5" stroke-dasharray="2,2"/>
    <text x="130" y="50" text-anchor="middle" fill="#fdcb6e" font-size="7">дырка</text>
  </g>
  <!-- Gas -->
  <text x="300" y="195" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Газ</text>
  <g transform="translate(230,205)">
    <ellipse cx="70" cy="30" rx="65" ry="30" fill="#6c5ce7" opacity="0.1"/>
    <circle cx="30" cy="20" r="6" fill="#a29bfe"/>
    <circle cx="80" cy="35" r="6" fill="#a29bfe"/>
    <circle cx="55" cy="25" r="3" fill="#74b9ff"/>
    <text x="55" y="20" fill="#74b9ff" font-size="6">e-</text>
    <circle cx="110" cy="20" r="7" fill="#ff7675"/>
    <text x="110" y="23" text-anchor="middle" fill="#fff" font-size="6">+</text>
    <text x="70" y="55" text-anchor="middle" fill="#a29bfe" font-size="8">ионизация</text>
  </g>
  <!-- Bottom summary -->
  <rect x="20" y="272" width="360" height="22" rx="5" fill="#2d3436" opacity="0.8"/>
  <text x="200" y="287" text-anchor="middle" fill="#55efc4" font-size="9">Металл: электроны | Электролит: ионы | Газ: ионы + e-</text>
</svg>