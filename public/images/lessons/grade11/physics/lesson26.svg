<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Механические волны</text>
<!-- Transverse wave -->
<text x="120" y="48" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Поперечная</text>
<path d="M20,80 Q40,50 60,80 Q80,110 100,80 Q120,50 140,80 Q160,110 180,80 Q200,50 220,80" fill="none" stroke="#55efc4" stroke-width="2.5"/>
<!-- Direction arrow -->
<line x1="230" y1="80" x2="260" y2="80" stroke="#ffd700" stroke-width="1.5"/>
<polygon points="258,77 265,80 258,83" fill="#ffd700"/>
<text x="270" y="83" fill="#ffd700" font-size="8">v</text>
<!-- Oscillation arrows -->
<line x1="100" y1="80" x2="100" y2="55" stroke="#ff7675" stroke-width="1"/>
<polygon points="97,57 100,50 103,57" fill="#ff7675"/>
<text x="110" y="55" fill="#ff7675" font-size="7">колебания</text>
<!-- Wavelength -->
<line x1="60" y1="115" x2="140" y2="115" stroke="#ffd700" stroke-width="1"/>
<text x="100" y="128" text-anchor="middle" fill="#ffd700" font-size="9">l (длина волны)</text>
<!-- Longitudinal wave -->
<text x="320" y="48" text-anchor="middle" fill="#74b9ff" font-size="10" font-weight="bold">Продольная</text>
<g transform="translate(250,55)">
<circle cx="10" cy="25" r="5" fill="#74b9ff" opacity="0.9"/>
<circle cx="30" cy="25" r="5" fill="#74b9ff" opacity="0.6"/>
<circle cx="50" cy="25" r="4" fill="#74b9ff" opacity="0.4"/>
<circle cx="70" cy="25" r="3" fill="#74b9ff" opacity="0.3"/>
<circle cx="90" cy="25" r="3" fill="#74b9ff" opacity="0.3"/>
<circle cx="110" cy="25" r="4" fill="#74b9ff" opacity="0.4"/>
<circle cx="130" cy="25" r="5" fill="#74b9ff" opacity="0.6"/>
<circle cx="150" cy="25" r="5" fill="#74b9ff" opacity="0.9"/>
</g>
<text x="320" y="100" text-anchor="middle" fill="#636e72" font-size="7">сжатие-разрежение</text>
<!-- Formula -->
<text x="200" y="140" text-anchor="middle" fill="#ffeaa7" font-size="14" font-weight="bold">v = l * v = l / T</text>
<!-- Properties -->
<rect x="20" y="155" width="360" height="130" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="175" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Свойства волн</text>
<text x="50" y="195" fill="#55efc4" font-size="9">Отражение</text>
<text x="150" y="195" fill="#74b9ff" font-size="9">Преломление</text>
<text x="260" y="195" fill="#ff7675" font-size="9">Интерференция</text>
<text x="50" y="215" fill="#a29bfe" font-size="9">Дифракция</text>
<text x="150" y="215" fill="#ffd700" font-size="9">Поляризация</text>
<text x="260" y="215" fill="#636e72" font-size="8">(только поперечные)</text>
<!-- Wave equation -->
<text x="200" y="245" text-anchor="middle" fill="#dfe6e9" font-size="10">x = A*cos(wt - kx)</text>
<text x="200" y="262" text-anchor="middle" fill="#636e72" font-size="8">k = 2п/l — волновое число</text>
<text x="200" y="278" text-anchor="middle" fill="#636e72" font-size="8">Волна переносит энергию, но не вещество!</text>
</svg>