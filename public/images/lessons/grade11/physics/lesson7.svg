<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Темный фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a7c7e" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#4a7c7e" stroke-width="1" rx="3" opacity="0.5"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Энергия магнитного поля</text>
  
  <!-- Катушка -->
  <g id="coil">
    <!-- Обводки катушки -->
    <ellipse cx="150" cy="150" rx="40" ry="8" fill="none" stroke="#8b7355" stroke-width="2"/>
    <ellipse cx="150" cy="160" rx="40" ry="8" fill="none" stroke="#8b7355" stroke-width="2"/>
    <ellipse cx="150" cy="170" rx="40" ry="8" fill="none" stroke="#8b7355" stroke-width="2"/>
    <ellipse cx="150" cy="180" rx="40" ry="8" fill="none" stroke="#8b7355" stroke-width="2"/>
    <ellipse cx="150" cy="190" rx="40" ry="8" fill="none" stroke="#8b7355" stroke-width="2"/>
    <ellipse cx="150" cy="200" rx="40" ry="8" fill="none" stroke="#8b7355" stroke-width="2"/>
    
    <!-- Провод катушки -->
    <path d="M110,150 Q110,125 150,125 Q190,125 190,150 Q190,175 150,175 Q110,175 110,200 Q110,225 150,225 Q190,225 190,200" 
          fill="none" stroke="#cd853f" stroke-width="3"/>
    
    <!-- Магнитные линии -->
    <g id="field-lines">
      <path d="M190,150 Q220,150 220,175 Q220,200 190,200" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
      <path d="M190,155 Q215,155 215,175 Q215,195 190,195" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
      <path d="M190,160 Q210,160 210,175 Q210,190 190,190" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
      <path d="M190,165 Q205,165 205,175 Q205,185 190,185" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
      <path d="M190,170 Q200,170 200,175 Q200,180 190,180" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
      
      <path d="M110,150 Q80,150 80,175 Q80,200 110,200" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
      <path d="M110,155 Q85,155 85,175 Q85,195 110,195" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
      <path d="M110,160 Q90,160 90,175 Q90,190 110,190" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
      <path d="M110,165 Q95,165 95,175 Q95,185 110,185" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
      <path d="M110,170 Q100,170 100,175 Q100,180 110,180" fill="none" stroke="#00ffff" stroke-width="1.5" opacity="0.7"/>
    </g>
    
    <!-- Стрелки направления поля -->
    <path d="M220,165 L235,165 M230,160 L235,165 L230,170" fill="none" stroke="#00ffff" stroke-width="2"/>
    <path d="M80,185 L65,185 M70,180 L65,185 L70,190" fill="none" stroke="#00ffff" stroke-width="2"/>
  </g>
  
  <!-- Формула энергии -->
  <text x="150" y="270" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="16">w = B²/(2μ₀)</text>
  
  <!-- Петля гистерезиса -->
  <g id="hysteresis" transform="translate(300, 100)">
    <!-- Оси -->
    <line x1="20" y1="150" x2="180" y2="150" stroke="#aaa" stroke-width="1.5"/>
    <line x1="100" y1="20" x2="100" y2="150" stroke="#aaa" stroke-width="1.5"/>
    
    <!-- Стрелки осей -->
    <path d="M175,150 L180,150 L175,145 M175,150 L180,150 L175,155" fill="none" stroke="#aaa" stroke-width="1.5"/>
    <path d="M100,25 L100,20 L95,25 M100,20 L100,25 L105,25" fill="none" stroke="#aaa" stroke-width="1.5"/>
    
    <!-- Петля гистерезиса -->
    <path d="M60,120 Q40,80 60,60 Q100,40 140,60 Q160,80 140,100 Q120,120 100,120 Q80,120 60,120" 
          fill="none" stroke="#ff6b6b" stroke-width="2.5"/>
    
    <!-- Метки осей -->
    <text x="190" y="155" fill="#aaa" font-family="Arial, sans-serif" font-size="12">H</text>
    <text x="105" y="15" fill="#aaa" font-family="Arial, sans-serif" font-size="12">B</text>
    
    <!-- Подписи петли -->
    <text x="70" y="130" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="10">B<sub>r</sub></text>
    <text x="140" y="130" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="10">-B<sub>r</sub></text>
    <text x="50" y="65" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="10">H<sub>c</sub></text>
    <text x="145" y="65" fill="#ff6b6b" font-family="Arial, sans-serif" font-size="10">-H<sub>c</sub></text>
  </g>
  
  <!-- Дополнительные элементы -->
  <g id="annotations">
    <!-- Указатель на катушку -->
    <line x1="250" y1="170" x2="210" y2="170" stroke="#eee" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="255" y="175" fill="#eee" font-family="Arial, sans-serif" font-size="12">Катушка</text>
    
    <!-- Указатель на петлю -->
    <line x1="280" y1="200" x2="380" y2="170" stroke="#eee" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="285" y="205" fill="#eee" font-family="Arial, sans-serif" font-size="12">Петля гистерезиса</text>
  </g>
  
  <!-- Дополнительные формулы -->
  <text x="250" y="300" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="14">W = ∫ w dV = ∫ (B²/2μ₀) dV</text>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="30" r="3" fill="#4a7c7e" opacity="0.5"/>
  <circle cx="470" cy="30" r="3" fill="#4a7c7e" opacity="0.5"/>
  <circle cx="30" cy="320" r="3" fill="#4a7c7e" opacity="0.5"/>
  <circle cx="470" cy="320" r="3" fill="#4a7c7e" opacity="0.5"/>
</svg>