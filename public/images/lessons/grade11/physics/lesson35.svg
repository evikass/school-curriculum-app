<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Постулаты СТО</text>
<!-- Einstein -->
<text x="200" y="50" text-anchor="middle" fill="#a29bfe" font-size="10">А. Эйнштейн, 1905</text>
<!-- Postulate 1 -->
<rect x="20" y="65" width="360" height="55" rx="8" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1.5"/>
<text x="200" y="85" text-anchor="middle" fill="#55efc4" font-size="11" font-weight="bold">1-й постулат: Принцип относительности</text>
<text x="200" y="105" text-anchor="middle" fill="#dfe6e9" font-size="9">Все физические законы одинаковы во всех ИСО</text>
<!-- Postulate 2 -->
<rect x="20" y="130" width="360" height="55" rx="8" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1.5"/>
<text x="200" y="150" text-anchor="middle" fill="#ff7675" font-size="11" font-weight="bold">2-й постулат: Постоянство c</text>
<text x="200" y="170" text-anchor="middle" fill="#dfe6e9" font-size="9">c = 3*10^8 м/с — одинакова во всех ИСО</text>
<!-- Michelson-Morley -->
<rect x="20" y="195" width="360" height="50" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="215" text-anchor="middle" fill="#ffd700" font-size="10" font-weight="bold">Опыт Майкельсона-Морли (1887)</text>
<text x="200" y="235" text-anchor="middle" fill="#dfe6e9" font-size="9">Скорость света не зависит от направления — эфира нет!</text>
<!-- Consequences -->
<rect x="20" y="255" width="175" height="35" rx="5" fill="#2d3436" opacity="0.5"/>
<text x="107" y="270" text-anchor="middle" fill="#74b9ff" font-size="8">Ньютон: время абсолютно</text>
<text x="107" y="283" text-anchor="middle" fill="#636e72" font-size="7">v = v1 + v2</text>
<rect x="205" y="255" width="175" height="35" rx="5" fill="#2d3436" opacity="0.5"/>
<text x="292" y="270" text-anchor="middle" fill="#55efc4" font-size="8">Эйнштейн: время относительно</text>
<text x="292" y="283" text-anchor="middle" fill="#636e72" font-size="7">v = (v1+v2)/(1+v1*v2/c2)</text>
</svg>