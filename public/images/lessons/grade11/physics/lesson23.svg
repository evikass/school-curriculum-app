<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs><linearGradient id="bg23" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
  <rect width="400" height="300" fill="url(#bg23)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Элементы цепи переменного тока</text>
  <!-- Three elements side by side -->
  <!-- Resistor -->
  <rect x="15" y="40" width="115" height="80" rx="8" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1.5"/>
  <text x="72" y="58" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">R (резистор)</text>
  <!-- R symbol -->
  <path d="M45,75 L50,68 L55,82 L60,68 L65,82 L70,68 L75,82 L80,68 L85,75" fill="none" stroke="#ff7675" stroke-width="2"/>
  <!-- Phase diagram: U and I in phase -->
  <line x1="45" y1="100" x2="95" y2="100" stroke="#55efc4" stroke-width="1"/>
  <polygon points="95,97 102,100 95,103" fill="#55efc4"/>
  <line x1="45" y1="107" x2="95" y2="107" stroke="#74b9ff" stroke-width="1"/>
  <polygon points="95,104 102,107 95,110" fill="#74b9ff"/>
  <text x="108" y="102" fill="#55efc4" font-size="7">U</text>
  <text x="108" y="110" fill="#74b9ff" font-size="7">I</text>
  <text x="72" y="125" text-anchor="middle" fill="#dfe6e9" font-size="8">ф = 0</text>
  <text x="72" y="140" text-anchor="middle" fill="#ff7675" font-size="9">X_R = R</text>
  <!-- Capacitor -->
  <rect x="142" y="40" width="115" height="80" rx="8" fill="#74b9ff" opacity="0.1" stroke="#74b9ff" stroke-width="1.5"/>
  <text x="200" y="58" text-anchor="middle" fill="#74b9ff" font-size="10" font-weight="bold">C (конденсатор)</text>
  <!-- C symbol -->
  <line x1="175" y1="68" x2="175" y2="82" stroke="#74b9ff" stroke-width="2"/>
  <line x1="180" y1="68" x2="180" y2="82" stroke="#74b9ff" stroke-width="2"/>
  <line x1="165" y1="75" x2="175" y2="75" stroke="#74b9ff" stroke-width="1.5"/>
  <line x1="180" y1="75" x2="195" y2="75" stroke="#74b9ff" stroke-width="1.5"/>
  <!-- Phase: I leads U by 90 -->
  <line x1="175" y1="100" x2="220" y2="100" stroke="#55efc4" stroke-width="1"/>
  <polygon points="220,97 227,100 220,103" fill="#55efc4"/>
  <line x1="155" y1="107" x2="220" y2="107" stroke="#74b9ff" stroke-width="1"/>
  <polygon points="220,104 227,107 220,110" fill="#74b9ff"/>
  <text x="232" y="102" fill="#55efc4" font-size="7">U</text>
  <text x="232" y="110" fill="#74b9ff" font-size="7">I</text>
  <text x="200" y="125" text-anchor="middle" fill="#dfe6e9" font-size="8">I опереж. U на п/2</text>
  <text x="200" y="140" text-anchor="middle" fill="#74b9ff" font-size="9">X_C = 1/(wC)</text>
  <!-- Inductor -->
  <rect x="270" y="40" width="115" height="80" rx="8" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1.5"/>
  <text x="327" y="58" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">L (катушка)</text>
  <!-- L symbol -->
  <path d="M300,75 C305,65 310,85 315,75 C320,65 325,85 330,75 C335,65 340,85 345,75" fill="none" stroke="#55efc4" stroke-width="2"/>
  <!-- Phase: I lags U by 90 -->
  <line x1="300" y1="100" x2="345" y2="100" stroke="#55efc4" stroke-width="1"/>
  <polygon points="345,97 352,100 345,103" fill="#55efc4"/>
  <line x1="320" y1="107" x2="345" y2="107" stroke="#74b9ff" stroke-width="1"/>
  <polygon points="345,104 352,107 345,110" fill="#74b9ff"/>
  <text x="357" y="102" fill="#55efc4" font-size="7">U</text>
  <text x="357" y="110" fill="#74b9ff" font-size="7">I</text>
  <text x="327" y="125" text-anchor="middle" fill="#dfe6e9" font-size="8">I отстаёт от U на п/2</text>
  <text x="327" y="140" text-anchor="middle" fill="#55efc4" font-size="9">X_L = wL</text>
  <!-- Ohm's law for AC -->
  <rect x="30" y="155" width="340" height="50" rx="8" fill="#6c5ce7" opacity="0.2" stroke="#a29bfe" stroke-width="1"/>
  <text x="200" y="175" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Закон Ома для цепи переменного тока</text>
  <text x="200" y="195" text-anchor="middle" fill="#ff7675" font-size="14" font-weight="bold">I = U/Z, Z = sqrt(R2 + (X_L-X_C)2)</text>
  <!-- Triangle of resistances -->
  <g transform="translate(100,220)">
    <line x1="0" y1="50" x2="120" y2="50" stroke="#ff7675" stroke-width="2"/>
    <text x="60" y="62" text-anchor="middle" fill="#ff7675" font-size="9">R</text>
    <line x1="120" y1="50" x2="120" y2="10" stroke="#55efc4" stroke-width="2"/>
    <text x="135" y="30" fill="#55efc4" font-size="9">X_L-X_C</text>
    <line x1="0" y1="50" x2="120" y2="10" stroke="#ffd700" stroke-width="2.5"/>
    <text x="45" y="25" fill="#ffd700" font-size="10" font-weight="bold">Z</text>
  </g>
  <!-- Phase angle -->
  <text x="200" y="290" text-anchor="middle" fill="#a29bfe" font-size="10">tg(ф) = (X_L - X_C) / R</text>
</svg>