<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Строение Вселенной</text>

<!-- Sun -->
<circle cx="80" cy="85" r="30" fill="#ffd700" opacity="0.4" stroke="#ffd700" stroke-width="1.5"/>
<circle cx="80" cy="85" r="20" fill="#ffd700" opacity="0.6"/>
<text x="80" y="88" text-anchor="middle" fill="#2d3436" font-size="8" font-weight="bold">Солнце</text>
<text x="80" y="128" text-anchor="middle" fill="#636e72" font-size="6">T=5800K, D+T->He</text>
<text x="80" y="138" text-anchor="middle" fill="#636e72" font-size="6">4,6 млрд лет</text>
<!-- Star evolution -->
<text x="270" y="48" text-anchor="middle" fill="#ffeaa7" font-size="9" font-weight="bold">Эволюция звёзд</text>
<!-- Proto -->
<circle cx="180" cy="75" r="8" fill="#a29bfe" opacity="0.4"/>
<text x="180" y="90" text-anchor="middle" fill="#a29bfe" font-size="6">Прото</text>
<!-- Main sequence -->
<line x1="190" y1="75" x2="210" y2="75" stroke="#ffd700" stroke-width="1"/>
<circle cx="225" cy="75" r="10" fill="#ffd700" opacity="0.5"/>
<text x="225" y="90" text-anchor="middle" fill="#ffd700" font-size="5">Главная</text>
<!-- Red giant -->
<line x1="240" y1="75" x2="260" y2="75" stroke="#ff7675" stroke-width="1"/>
<circle cx="280" cy="75" r="15" fill="#ff7675" opacity="0.4"/>
<text x="280" y="95" text-anchor="middle" fill="#ff7675" font-size="5">Красный гигант</text>
<!-- Three endpoints -->
<line x1="300" y1="70" x2="340" y2="55" stroke="#dfe6e9" stroke-width="0.5"/>
<circle cx="350" cy="52" r="6" fill="#dfe6e9" opacity="0.3"/>
<text x="350" y="62" text-anchor="middle" fill="#dfe6e9" font-size="5">Белый карлик</text>
<line x1="300" y1="75" x2="340" y2="75" stroke="#74b9ff" stroke-width="0.5"/>
<circle cx="350" cy="75" r="4" fill="#74b9ff" opacity="0.5"/>
<text x="350" y="85" text-anchor="middle" fill="#74b9ff" font-size="5">Нейтронная</text>
<line x1="300" y1="80" x2="340" y2="95" stroke="#2d3436" stroke-width="0.5"/>
<circle cx="350" cy="95" r="8" fill="#2d3436" stroke="#636e72" stroke-width="1"/>
<text x="350" y="108" text-anchor="middle" fill="#636e72" font-size="5">Чёрная дыра</text>
<!-- Hubble law -->
<rect x="20" y="140" width="360" height="55" rx="8" fill="#6c5ce7" opacity="0.15" stroke="#a29bfe" stroke-width="1"/>
<text x="200" y="160" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Закон Хаббла (1929)</text>
<text x="200" y="180" text-anchor="middle" fill="#55efc4" font-size="14" font-weight="bold">v = H * r</text>
<text x="310" y="178" fill="#636e72" font-size="7">H = 70 км/(с*Мпк)</text>
<!-- Universe facts -->
<rect x="20" y="205" width="175" height="85" rx="5" fill="#2d3436" opacity="0.6"/>
<text x="107" y="225" text-anchor="middle" fill="#ffeaa7" font-size="9" font-weight="bold">Ключевые факты</text>
<text x="35" y="242" fill="#55efc4" font-size="8">Возраст: 13,8 млрд лет</text>
<text x="35" y="258" fill="#ff7675" font-size="8">Большой взрыв</text>
<text x="35" y="274" fill="#74b9ff" font-size="8">Реликтовое изл. 2,7 К</text>
<text x="35" y="288" fill="#636e72" font-size="7">Расширение ускоряется</text>
<!-- Dark matter/energy -->
<rect x="205" y="205" width="175" height="85" rx="5" fill="#2d3436" opacity="0.6"/>
<text x="292" y="225" text-anchor="middle" fill="#ffeaa7" font-size="9" font-weight="bold">Состав Вселенной</text>
<!-- Pie chart simplified -->
<circle cx="292" cy="260" r="22" fill="#2d3436" stroke="#636e72" stroke-width="1"/>
<path d="M292,238 A22,22 0 0,1 310,275 L292,260 Z" fill="#a29bfe" opacity="0.5"/>
<path d="M310,275 A22,22 0 0,1 275,275 L292,260 Z" fill="#636e72" opacity="0.5"/>
<path d="M275,275 A22,22 0 0,1 292,238 L292,260 Z" fill="#ff7675" opacity="0.5"/>
<text x="330" y="250" fill="#a29bfe" font-size="7">Тёмная энергия ~68%</text>
<text x="330" y="265" fill="#636e72" font-size="7">Тёмная материя ~27%</text>
<text x="330" y="280" fill="#ff7675" font-size="7">Обычная материя ~5%</text>

</svg>