<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Регистрация излучений</text>

<!-- Geiger counter -->
<rect x="20" y="40" width="175" height="95" rx="8" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1"/>
<text x="107" y="58" text-anchor="middle" fill="#ff7675" font-size="9" font-weight="bold">Счётчик Гейгера</text>
<!-- Tube -->
<rect x="40" y="70" width="80" height="25" rx="12" fill="#2d3436" stroke="#636e72" stroke-width="1.5"/>
<text x="80" y="86" text-anchor="middle" fill="#636e72" font-size="7">газ</text>
<!-- Particle entering -->
<line x1="25" y1="82" x2="40" y2="82" stroke="#ffd700" stroke-width="1.5"/>
<polygon points="38,79 44,82 38,85" fill="#ffd700"/>
<text x="25" y="78" fill="#ffd700" font-size="6">a,b,g</text>
<!-- Sparks -->
<circle cx="60" cy="82" r="3" fill="#55efc4"/>
<circle cx="75" cy="80" r="2" fill="#55efc4"/>
<circle cx="90" cy="83" r="2" fill="#55efc4"/>
<!-- Counter -->
<rect x="130" y="65" width="50" height="35" rx="3" fill="#2d3436" stroke="#a29bfe" stroke-width="1"/>
<text x="155" y="85" text-anchor="middle" fill="#a29bfe" font-size="8">click!</text>
<!-- Wilson chamber -->
<rect x="205" y="40" width="175" height="95" rx="8" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1"/>
<text x="292" y="58" text-anchor="middle" fill="#55efc4" font-size="9" font-weight="bold">Камера Вильсона</text>
<!-- Chamber -->
<rect x="220" y="65" width="100" height="50" rx="3" fill="#2d3436" opacity="0.5" stroke="#636e72" stroke-width="1"/>
<text x="270" y="78" text-anchor="middle" fill="#636e72" font-size="6">пересыщ. пар</text>
<!-- Tracks -->
<path d="M230,90 L260,88 L290,85 L310,80" fill="none" stroke="#ffd700" stroke-width="1.5"/>
<text x="280" y="105" text-anchor="middle" fill="#636e72" font-size="6">треки частиц</text>
<!-- Dosimetry -->
<rect x="20" y="150" width="360" height="140" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="170" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Дозиметрия</text>
<text x="50" y="195" fill="#55efc4" font-size="9" font-weight="bold">Поглощённая доза</text>
<text x="50" y="210" fill="#dfe6e9" font-size="10">D = E/m [Гр = Дж/кг]</text>
<text x="50" y="235" fill="#74b9ff" font-size="9" font-weight="bold">Эквивалентная доза</text>
<text x="50" y="250" fill="#dfe6e9" font-size="10">H = D*k [Зв]</text>
<text x="250" y="195" fill="#ff7675" font-size="9">Естеств. фон: 2-5 мЗв/год</text>
<text x="250" y="215" fill="#ff7675" font-size="9">Рентген: ~1 мЗв</text>
<text x="250" y="235" fill="#ff7675" font-size="9">КТ: ~10 мЗв</text>
<text x="250" y="255" fill="#ff7675" font-size="9">Персонал: 20 мЗв/год</text>
<text x="200" y="280" text-anchor="middle" fill="#636e72" font-size="8">1 Гр = 1 Дж/кг | 1 Зв = 1 Дж/кг * k</text>

</svg>