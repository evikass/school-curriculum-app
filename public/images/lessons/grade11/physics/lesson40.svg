<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Корпускулярно-волновой дуализм</text>
<!-- Wave side -->
<rect x="20" y="38" width="175" height="80" rx="8" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1"/>
<text x="107" y="55" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Волна</text>
<path d="M30,80 Q50,55 70,80 Q90,105 110,80 Q130,55 150,80 Q170,105 185,80" fill="none" stroke="#55efc4" stroke-width="2"/>
<text x="107" y="110" text-anchor="middle" fill="#636e72" font-size="7">интерференция, дифракция</text>
<!-- Particle side -->
<rect x="205" y="38" width="175" height="80" rx="8" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1"/>
<text x="292" y="55" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Частица</text>
<circle cx="250" cy="80" r="5" fill="#ffd700"/>
<circle cx="280" cy="75" r="4" fill="#ffd700"/>
<circle cx="310" cy="85" r="3" fill="#ffd700"/>
<circle cx="340" cy="78" r="5" fill="#ffd700"/>
<text x="292" y="110" text-anchor="middle" fill="#636e72" font-size="7">фотоэффект, давление света</text>
<!-- de Broglie -->
<rect x="20" y="130" width="360" height="60" rx="8" fill="#6c5ce7" opacity="0.15" stroke="#a29bfe" stroke-width="1.5"/>
<text x="200" y="150" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Гипотеза де Бройля (1924)</text>
<text x="200" y="175" text-anchor="middle" fill="#55efc4" font-size="18" font-weight="bold">l = h/p = h/(mv)</text>
<!-- Comparison -->
<rect x="20" y="200" width="175" height="90" rx="5" fill="#2d3436" opacity="0.6"/>
<text x="107" y="220" text-anchor="middle" fill="#ff7675" font-size="9" font-weight="bold">Макромир</text>
<text x="107" y="240" text-anchor="middle" fill="#dfe6e9" font-size="8">Мяч 1 кг, 10 м/с:</text>
<text x="107" y="258" text-anchor="middle" fill="#636e72" font-size="8">l = 6,6*10^-35 м</text>
<text x="107" y="275" text-anchor="middle" fill="#ff7675" font-size="8">Волновые св-ва незаметны</text>
<rect x="205" y="200" width="175" height="90" rx="5" fill="#2d3436" opacity="0.6"/>
<text x="292" y="220" text-anchor="middle" fill="#55efc4" font-size="9" font-weight="bold">Микромир</text>
<text x="292" y="240" text-anchor="middle" fill="#dfe6e9" font-size="8">Электрон 100 эВ:</text>
<text x="292" y="258" text-anchor="middle" fill="#636e72" font-size="8">l = 0,12 нм</text>
<text x="292" y="275" text-anchor="middle" fill="#55efc4" font-size="8">Дифракция электронов!</text>
</svg>