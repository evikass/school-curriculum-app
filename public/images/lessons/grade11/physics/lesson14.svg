<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Тёмный фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a7c7e" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#4a7c7e" stroke-width="1" opacity="0.5"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="40" text-anchor="middle" fill="#eaeaea" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Механические волны</text>
  
  <!-- Поперечная волна -->
  <g transform="translate(50, 100)">
    <!-- Ось -->
    <line x1="0" y1="50" x2="380" y2="50" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="390" y="55" fill="#eaeaea" font-family="Arial" font-size="12">x</text>
    
    <!-- Волна -->
    <path d="M 0,50 Q 25,20 50,50 T 100,50 T 150,50 T 200,50 T 250,50 T 300,50 T 350,50 T 400,50" 
          fill="none" stroke="#ff6b6b" stroke-width="3"/>
    
    <!-- Частицы среды -->
    <circle cx="0" cy="50" r="4" fill="#ffd166"/>
    <circle cx="50" cy="50" r="4" fill="#ffd166"/>
    <circle cx="100" cy="50" r="4" fill="#ffd166"/>
    <circle cx="150" cy="50" r="4" fill="#ffd166"/>
    <circle cx="200" cy="50" r="4" fill="#ffd166"/>
    <circle cx="250" cy="50" r="4" fill="#ffd166"/>
    <circle cx="300" cy="50" r="4" fill="#ffd166"/>
    <circle cx="350" cy="50" r="4" fill="#ffd166"/>
    <circle cx="400" cy="50" r="4" fill="#ffd166"/>
    
    <!-- Стрелки направления колебаний -->
    <line x1="25" y1="50" x2="25" y2="25" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="75" y1="50" x2="75" y2="75" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="125" y1="50" x2="125" y2="25" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="175" y1="50" x2="175" y2="75" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="225" y1="50" x2="225" y2="25" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="275" y1="50" x2="275" y2="75" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="325" y1="50" x2="325" y2="25" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="375" y1="50" x2="375" y2="75" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Подпись -->
    <text x="200" y="90" text-anchor="middle" fill="#eaeaea" font-family="Arial" font-size="14">Поперечная волна</text>
  </g>
  
  <!-- Продольная волна -->
  <g transform="translate(50, 220)">
    <!-- Ось -->
    <line x1="0" y1="50" x2="380" y2="50" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="390" y="55" fill="#eaeaea" font-family="Arial" font-size="12">x</text>
    
    <!-- Волна -->
    <path d="M 0,50 L 50,50 L 50,30 L 100,50 L 100,70 L 150,50 L 150,30 L 200,50 L 200,70 L 250,50 L 250,30 L 300,50 L 300,70 L 350,50 L 350,30 L 400,50" 
          fill="none" stroke="#4cc9f0" stroke-width="3"/>
    
    <!-- Частицы среды -->
    <circle cx="0" cy="50" r="4" fill="#ffd166"/>
    <circle cx="50" cy="50" r="4" fill="#ffd166"/>
    <circle cx="100" cy="50" r="4" fill="#ffd166"/>
    <circle cx="150" cy="50" r="4" fill="#ffd166"/>
    <circle cx="200" cy="50" r="4" fill="#ffd166"/>
    <circle cx="250" cy="50" r="4" fill="#ffd166"/>
    <circle cx="300" cy="50" r="4" fill="#ffd166"/>
    <circle cx="350" cy="50" r="4" fill="#ffd166"/>
    <circle cx="400" cy="50" r="4" fill="#ffd166"/>
    
    <!-- Стрелки направления колебаний -->
    <line x1="25" y1="50" x2="25" y2="35" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="75" y1="50" x2="75" y2="65" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="125" y1="50" x2="125" y2="35" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="175" y1="50" x2="175" y2="65" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="225" y1="50" x2="225" y2="35" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="275" y1="50" x2="275" y2="65" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="325" y1="50" x2="325" y2="35" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    <line x1="375" y1="50" x2="375" y2="65" stroke="#06d6a0" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Подпись -->
    <text x="200" y="90" text-anchor="middle" fill="#eaeaea" font-family="Arial" font-size="14">Продольная волна</text>
  </g>
  
  <!-- Формула λ = vT -->
  <g transform="translate(250, 310)">
    <rect x="-60" y="-15" width="120" height="30" fill="#2d3561" stroke="#7ec8e3" stroke-width="1" rx="5"/>
    <text x="0" y="5" text-anchor="middle" fill="#eaeaea" font-family="Arial" font-size="16">λ = vT</text>
  </g>
  
  <!-- Обозначения -->
  <g transform="translate(50, 310)">
    <text x="0" y="5" fill="#eaeaea" font-family="Arial" font-size="12">λ - длина волны</text>
    <text x="120" y="5" fill="#eaeaea" font-family="Arial" font-size="12">v - скорость</text>
    <text x="220" y="5" fill="#eaeaea" font-family="Arial" font-size="12">T - период</text>
  </g>
  
  <!-- Стрелка маркер -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06d6a0"/>
    </marker>
  </defs>
</svg>