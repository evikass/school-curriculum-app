<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Лазеры</text>
<!-- Spontaneous -->
<rect x="15" y="38" width="120" height="55" rx="5" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1"/>
<text x="75" y="55" text-anchor="middle" fill="#ff7675" font-size="8" font-weight="bold">Спонтанное</text>
<circle cx="45" cy="75" r="5" fill="#ffd700"/>
<line x1="50" y1="73" x2="80" y2="65" stroke="#ffd700" stroke-width="1"/>
<polygon points="78,62 85,63 79,68" fill="#ffd700"/>
<line x1="50" y1="77" x2="80" y2="85" stroke="#ffd700" stroke-width="1"/>
<polygon points="78,82 85,87 79,83" fill="#ffd700"/>
<text x="75" y="95" text-anchor="middle" fill="#636e72" font-size="6">случайное направление</text>
<!-- Stimulated -->
<rect x="145" y="38" width="120" height="55" rx="5" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1"/>
<text x="205" y="55" text-anchor="middle" fill="#55efc4" font-size="8" font-weight="bold">Вынужденное</text>
<line x1="155" y1="70" x2="175" y2="70" stroke="#ffd700" stroke-width="1"/>
<polygon points="173,67 180,70 173,73" fill="#ffd700"/>
<circle cx="180" cy="75" r="5" fill="#55efc4"/>
<line x1="185" y1="68" x2="215" y2="60" stroke="#ffd700" stroke-width="1.5"/>
<line x1="185" y1="72" x2="255" y2="60" stroke="#ffd700" stroke-width="1.5"/>
<polygon points="253,57 260,58 253,63" fill="#ffd700"/>
<text x="205" y="95" text-anchor="middle" fill="#636e72" font-size="6">фотоны-близнецы!</text>
<!-- Laser setup -->
<text x="200" y="118" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Устройство лазера</text>
<!-- Left mirror -->
<rect x="30" y="135" width="8" height="40" rx="2" fill="#a29bfe" opacity="0.8"/>
<!-- Active medium -->
<rect x="38" y="130" width="200" height="50" rx="3" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1"/>
<text x="138" y="160" text-anchor="middle" fill="#55efc4" font-size="9">Активная среда (инверсия)</text>
<!-- Right mirror (partial) -->
<rect x="238" y="135" width="8" height="40" rx="2" fill="#a29bfe" opacity="0.4"/>
<text x="242" y="128" fill="#a29bfe" font-size="6">R<100%</text>
<!-- Pumping -->
<line x1="138" y1="125" x2="138" y2="130" stroke="#ff7675" stroke-width="2"/>
<polygon points="135,130 138,125 141,130" fill="#ff7675"/>
<text x="138" y="122" text-anchor="middle" fill="#ff7675" font-size="7">Накачка</text>
<!-- Laser beam -->
<line x1="246" y1="155" x2="370" y2="155" stroke="#ff7675" stroke-width="3"/>
<text x="320" y="148" fill="#ff7675" font-size="8">лазерный луч</text>
<!-- Properties -->
<rect x="20" y="195" width="360" height="95" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="215" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Свойства лазерного излучения</text>
<text x="60" y="235" fill="#55efc4" font-size="9">Монохроматичность</text>
<text x="60" y="252" fill="#74b9ff" font-size="9">Когерентность</text>
<text x="60" y="269" fill="#ff7675" font-size="9">Направленность</text>
<text x="60" y="286" fill="#ffd700" font-size="9">Высокая интенсивность</text>
<text x="260" y="235" fill="#636e72" font-size="7">одна длина волны</text>
<text x="260" y="252" fill="#636e72" font-size="7">одинаковая фаза</text>
<text x="260" y="269" fill="#636e72" font-size="7">узкий пучок</text>
<text x="260" y="286" fill="#636e72" font-size="7">огромная мощность</text>
</svg>