<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="3" rx="5"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" font-weight="bold">Урок 20: Законы отражения и преломления света</text>
  
  <!-- Номер урока -->
  <text x="470" y="25" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">№20</text>
  
  <!-- Секция отражения -->
  <g transform="translate(0, 70)">
    <!-- Граница раздела -->
    <line x1="30" y1="0" x2="30" y2="200" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="15" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" transform="rotate(-90 15 100)">ОТРАЖЕНИЕ</text>
    
    <!-- Поверхность отражения -->
    <line x1="30" y1="150" x2="220" y2="150" stroke="#34495e" stroke-width="2"/>
    
    <!-- Нормаль -->
    <line x1="125" y1="50" x2="125" y2="150" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="125" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">Н</text>
    
    <!-- Луч падающего света -->
    <line x1="50" y1="100" x2="125" y2="150" stroke="url(#lightGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="75" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d68910">Луч падающий</text>
    
    <!-- Луч отраженного света -->
    <line x1="125" y1="150" x2="200" y2="100" stroke="url(#lightGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="170" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d68910">Луч отраженный</text>
    
    <!-- Угол падения -->
    <path d="M 125 150 L 125 130 L 105 130 Z" fill="#e74c3c" opacity="0.3"/>
    <text x="105" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">α</text>
    
    <!-- Угол отражения -->
    <path d="M 125 150 L 125 130 L 145 130 Z" fill="#e74c3c" opacity="0.3"/>
    <text x="145" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">β</text>
    
    <!-- Закон отражения -->
    <text x="125" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" font-weight="bold">Закон отражения: α = β</text>
  </g>
  
  <!-- Секция преломления -->
  <g transform="translate(230, 70)">
    <!-- Граница раздела -->
    <line x1="30" y1="0" x2="30" y2="200" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="15" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d" transform="rotate(-90 15 100)">ПРЕЛОМЛЕНИЕ</text>
    
    <!-- Граница сред -->
    <line x1="30" y1="150" x2="220" y2="150" stroke="#34495e" stroke-width="2"/>
    
    <!-- Вода -->
    <rect x="30" y="150" width="190" height="50" fill="url(#waterGrad)"/>
    <text x="125" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2980b9">Вода (n₁ = 1.33)</text>
    
    <!-- Воздух -->
    <text x="125" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Воздух (n₂ = 1.00)</text>
    
    <!-- Нормаль -->
    <line x1="125" y1="50" x2="125" y2="200" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="125" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">Н</text>
    
    <!-- Луч падающего света -->
    <line x1="50" y1="100" x2="125" y2="150" stroke="url(#lightGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="75" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d68910">Луч падающий</text>
    
    <!-- Луч преломленного света -->
    <line x1="125" y1="150" x2="200" y2="180" stroke="url(#lightGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="170" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d68910">Луч преломленный</text>
    
    <!-- Угол падения -->
    <path d="M 125 150 L 125 130 L 105 130 Z" fill="#e74c3c" opacity="0.3"/>
    <text x="105" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">α</text>
    
    <!-- Угол преломления -->
    <path d="M 125 150 L 125 170 L 145 170 Z" fill="#27ae60" opacity="0.3"/>
    <text x="145" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">γ</text>
    
    <!-- Закон Снеллиуса -->
    <text x="125" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" font-weight="bold">Закон Снеллиуса: n₁·sin α = n₂·sin γ</text>
  </g>
  
  <!-- Секция полного отражения -->
  <g transform="translate(0, 280)">
    <!-- Граница раздела -->
    <line x1="30" y1="0" x2="30" y2="20" stroke="#95a5a6" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="15" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d" transform="rotate(-90 15 10)">ПОЛНОЕ ОТРАЖЕНИЕ</text>
    
    <!-- Граница сред -->
    <line x1="50" y1="50" x2="250" y2="50" stroke="#34495e" stroke-width="2"/>
    
    <!-- Стекло -->
    <rect x="50" y="50" width="200" height="40" fill="#d5dbdb" opacity="0.5"/>
    <text x="150" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Стекло (n₁ = 1.5)</text>
    
    <!-- Воздух -->
    <text x="150" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Воздух (n₂ = 1.00)</text>
    
    <!-- Нормаль -->
    <line x1="150" y1="0" x2="150" y2="90" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Луч падающего света (больший угол) -->
    <line x1="80" y1="20" x2="150" y2="50" stroke="url(#lightGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Луч отраженного света -->
    <line x1="150" y1="50" x2="220" y2="20" stroke="url(#lightGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Угол падения (критический) -->
    <path d="M 150 50 L 150 30 L 130 30 Z" fill="#e74c3c" opacity="0.3"/>
    <text x="135" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">αкр</text>
    
    <!-- Угол полного отражения -->
    <text x="150" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" font-weight="bold">Угол полного отражения: sin αкр = n₂/n₁</text>
    <text x="150" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">αкр = arcsin(n₂/n₁)</text>
  </g>
  
  <!-- Критический угол для воды -->
  <g transform="translate(260, 280)">
    <!-- Граница сред -->
    <line x1="50" y1="50" x2="250" y2="50" stroke="#34495e" stroke-width="2"/>
    
    <!-- Вода -->
    <rect x="50" y="50" width="200" height="40" fill="url(#waterGrad)"/>
    <text x="150" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2980b9">Вода (n₁ = 1.33)</text>
    
    <!-- Воздух -->
    <text x="150" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Воздух (n₂ = 1.00)</text>
    
    <!-- Нормаль -->
    <line x1="150" y1="0" x2="150" y2="90" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Угол полного отражения для воды -->
    <path d="M 150 50 L 150 30 L 130 30 Z" fill="#e74c3c" opacity="0.3"/>
    <text x="135" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">αкр</text>
    
    <!-- Расчет критического угла -->
    <text x="150" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">αкр = arcsin(1.00/1.33) ≈ 48.8°</text>
  </g>
  
  <!-- Стрелка для лучей -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
  </defs>
</svg>