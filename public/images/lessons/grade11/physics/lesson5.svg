<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg5)"/>
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" fill="#ffeaa7" font-size="13" font-weight="bold">Работа и мощность тока</text>
  <!-- Work formula -->
  <rect x="20" y="38" width="170" height="70" rx="8" fill="#2d3436" opacity="0.7"/>
  <text x="105" y="58" text-anchor="middle" fill="#55efc4" font-size="11" font-weight="bold">Работа</text>
  <text x="105" y="78" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">A = IUt</text>
  <text x="105" y="98" text-anchor="middle" fill="#dfe6e9" font-size="9">A = I2Rt = U2t/R</text>
  <!-- Power formula -->
  <rect x="210" y="38" width="170" height="70" rx="8" fill="#2d3436" opacity="0.7"/>
  <text x="295" y="58" text-anchor="middle" fill="#ff7675" font-size="11" font-weight="bold">Мощность</text>
  <text x="295" y="78" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">P = IU</text>
  <text x="295" y="98" text-anchor="middle" fill="#dfe6e9" font-size="9">P = I2R = U2/R</text>
  <!-- Joule-Lenz -->
  <rect x="60" y="120" width="280" height="55" rx="8" fill="#6c5ce7" opacity="0.2" stroke="#a29bfe" stroke-width="1"/>
  <text x="200" y="142" text-anchor="middle" fill="#a29bfe" font-size="12" font-weight="bold">Закон Джоуля-Ленца</text>
  <text x="200" y="163" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold">Q = I2Rt</text>
  <!-- Energy conversion diagram -->
  <text x="200" y="200" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Превращения энергии</text>
  <!-- Electric energy box -->
  <rect x="20" y="215" width="80" height="30" rx="5" fill="#0984e3" opacity="0.4" stroke="#74b9ff" stroke-width="1"/>
  <text x="60" y="234" text-anchor="middle" fill="#74b9ff" font-size="8">Электр.</text>
  <!-- Arrow -->
  <line x1="105" y1="230" x2="135" y2="230" stroke="#ffd700" stroke-width="1.5"/>
  <polygon points="135,227 140,230 135,233" fill="#ffd700"/>
  <!-- Heat -->
  <rect x="145" y="215" width="65" height="30" rx="5" fill="#e17055" opacity="0.4" stroke="#fab1a0" stroke-width="1"/>
  <text x="177" y="234" text-anchor="middle" fill="#fab1a0" font-size="8">Тепло</text>
  <!-- Arrow -->
  <line x1="215" y1="230" x2="245" y2="230" stroke="#ffd700" stroke-width="1.5"/>
  <polygon points="245,227 250,230 245,233" fill="#ffd700"/>
  <!-- Light -->
  <rect x="255" y="215" width="55" height="30" rx="5" fill="#ffeaa7" opacity="0.3" stroke="#fdcb6e" stroke-width="1"/>
  <text x="282" y="234" text-anchor="middle" fill="#fdcb6e" font-size="8">Свет</text>
  <!-- Mechanical -->
  <rect x="320" y="215" width="65" height="30" rx="5" fill="#00b894" opacity="0.3" stroke="#55efc4" stroke-width="1"/>
  <text x="352" y="234" text-anchor="middle" fill="#55efc4" font-size="8">Механ.</text>
  <!-- Applications -->
  <text x="100" y="270" text-anchor="middle" fill="#fab1a0" font-size="9">Обогреватель</text>
  <text x="240" y="270" text-anchor="middle" fill="#fdcb6e" font-size="9">Лампа</text>
  <text x="340" y="270" text-anchor="middle" fill="#55efc4" font-size="9">Мотор</text>
  <!-- Efficiency -->
  <text x="200" y="290" text-anchor="middle" fill="#a29bfe" font-size="10">КПД = P_полезн / P_полн * 100%</text>
</svg>