<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg22" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="solutionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#155e75;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="electrodeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="50%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <linearGradient id="batteryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow22">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bubbleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg22)" rx="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Электролиз</text>

  <!-- Divider -->
  <line x1="50" y1="52" x2="750" y2="52" stroke="#0d9488" stroke-width="1" opacity="0.3"/>

  <!-- === BATTERY / POWER SOURCE === -->
  <rect x="320" y="62" width="160" height="45" rx="8" fill="url(#batteryGrad)" stroke="#475569" stroke-width="1.5"/>
  <text x="400" y="89" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" font-weight="bold">⚡ Источник тока</text>
  <!-- + terminal -->
  <text x="340" y="78" font-family="Arial, sans-serif" font-size="16" fill="#ef4444" font-weight="bold">+</text>
  <!-- - terminal -->
  <text x="452" y="78" font-family="Arial, sans-serif" font-size="16" fill="#14b8a6" font-weight="bold">−</text>

  <!-- Wires from battery to electrodes -->
  <!-- Left wire (+) to anode -->
  <path d="M340,85 L340,115 L250,115 L250,150" fill="none" stroke="#ef4444" stroke-width="2.5" filter="url(#glow22)"/>
  <!-- Right wire (-) to cathode -->
  <path d="M460,85 L460,115 L550,115 L550,150" fill="none" stroke="#14b8a6" stroke-width="2.5" filter="url(#glow22)"/>

  <!-- === ELECTROLYTIC CELL (BEAKER) === -->
  <!-- Beaker outline -->
  <path d="M180,150 L180,380 L620,380 L620,150" fill="none" stroke="#475569" stroke-width="2" stroke-linejoin="round"/>
  <!-- Beaker bottom -->
  <line x1="180" y1="380" x2="620" y2="380" stroke="#475569" stroke-width="3"/>
  <!-- Solution fill -->
  <rect x="182" y="175" width="436" height="203" rx="0" fill="url(#solutionGrad)"/>

  <!-- Solution label -->
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="14" fill="#67e8f9" text-anchor="middle" opacity="0.8">CuCl₂ раствор</text>

  <!-- === ANODE (LEFT, +) === -->
  <rect x="240" y="150" width="20" height="230" rx="3" fill="url(#electrodeGrad)" stroke="#94a3b8" stroke-width="1"/>
  <!-- Anode label -->
  <rect x="220" y="385" width="60" height="24" rx="5" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
  <text x="250" y="401" font-family="Arial, sans-serif" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">Анод (+)</text>

  <!-- Gas bubbles at anode (Cl2) -->
  <circle cx="230" cy="280" r="5" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.7" filter="url(#bubbleGlow)"/>
  <circle cx="248" cy="260" r="4" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.6"/>
  <circle cx="235" cy="240" r="6" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
  <circle cx="245" cy="220" r="3.5" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.4"/>
  <circle cx="228" cy="300" r="4.5" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
  <circle cx="240" cy="190" r="5" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3"/>
  <!-- Cl2 gas label -->
  <text x="210" y="170" font-family="Arial, sans-serif" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="bold">Cl₂↑</text>

  <!-- === CATHODE (RIGHT, -) === -->
  <rect x="540" y="150" width="20" height="230" rx="3" fill="url(#electrodeGrad)" stroke="#94a3b8" stroke-width="1"/>
  <!-- Copper deposit on cathode -->
  <rect x="542" y="310" width="16" height="68" rx="2" fill="#f59e0b" opacity="0.6"/>
  <rect x="543" y="280" width="14" height="50" rx="2" fill="#f59e0b" opacity="0.4"/>
  <rect x="544" y="250" width="12" height="40" rx="2" fill="#f59e0b" opacity="0.3"/>

  <!-- Cathode label -->
  <rect x="520" y="385" width="60" height="24" rx="5" fill="rgba(20,184,166,0.2)" stroke="#14b8a6" stroke-width="1"/>
  <text x="550" y="401" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Катод (−)</text>

  <!-- Cu label at cathode -->
  <text x="570" y="170" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Cu↓</text>

  <!-- === ION MOVEMENT === -->
  <!-- Cations (Cu2+) moving toward cathode -->
  <circle cx="450" cy="300" r="10" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="304" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">Cu²⁺</text>

  <circle cx="480" cy="340" r="10" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="480" y="344" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">Cu²⁺</text>

  <circle cx="420" cy="260" r="10" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="420" y="264" font-family="Arial, sans-serif" font-size="8" fill="#c4b5fd" text-anchor="middle">Cu²⁺</text>

  <!-- Cation movement arrows (→ toward cathode) -->
  <path d="M460,295 L510,280" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M490,335 L520,310" fill="none" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Anions (Cl-) moving toward anode -->
  <circle cx="350" cy="310" r="10" fill="rgba(74,222,128,0.3)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="350" y="314" font-family="Arial, sans-serif" font-size="9" fill="#86efac" text-anchor="middle">Cl⁻</text>

  <circle cx="320" cy="260" r="10" fill="rgba(74,222,128,0.3)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="320" y="264" font-family="Arial, sans-serif" font-size="9" fill="#86efac" text-anchor="middle">Cl⁻</text>

  <circle cx="380" cy="350" r="10" fill="rgba(74,222,128,0.3)" stroke="#4ade80" stroke-width="1.5"/>
  <text x="380" y="354" font-family="Arial, sans-serif" font-size="9" fill="#86efac" text-anchor="middle">Cl⁻</text>

  <!-- Anion movement arrows (→ toward anode) -->
  <path d="M340,305 L280,290" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M310,255 L270,240" fill="none" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- === REACTION EQUATIONS === -->
  <!-- Cathode equation -->
  <rect x="30" y="420" width="340" height="32" rx="6" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="1"/>
  <text x="35" y="441" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" font-weight="bold">Катод:</text>
  <text x="95" y="441" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">Cu²⁺ + 2ē → Cu⁰</text>
  <text x="245" y="441" font-family="Arial, sans-serif" font-size="11" fill="#5eead4">(восстановление)</text>

  <!-- Anode equation -->
  <rect x="30" y="458" width="340" height="32" rx="6" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1"/>
  <text x="35" y="479" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" font-weight="bold">Анод:</text>
  <text x="90" y="479" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0">2Cl⁻ → Cl₂↑ + 2ē</text>
  <text x="240" y="479" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5">(окисление)</text>

  <!-- === KEY PRINCIPLES === -->
  <rect x="430" y="420" width="340" height="70" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="bold">Правила электролиза</text>
  <text x="445" y="458" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6">• Катионы → Катод (восстановление)</text>
  <text x="445" y="474" font-family="Arial, sans-serif" font-size="11" fill="#4ade80">• Анионы → Анод (окисление)</text>
  <text x="445" y="490" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b">• Энергия → химическая реакция</text>
</svg>