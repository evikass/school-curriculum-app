<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#2E7D32" text-anchor="middle">Аминокислоты</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#777777" text-anchor="middle">Химия — Урок 2</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#2E7D32" stroke-width="2" opacity="0.25" />
  <defs>
    <clipPath id="ill">
      <rect x="15" y="80" width="470" height="225" rx="6" />
    </clipPath>
  </defs>
  <g clip-path="url(#ill)">
    <rect x="15" y="80" width="470" height="225" fill="#F1F8E9" rx="6" opacity="0.5" />
    <rect x="25" y="88" width="450" height="65" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="250" y="104" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Общая формула аминокислот</text>
    <text x="250" y="124" font-family="Arial,sans-serif" font-size="16" fill="#333333" text-anchor="middle" font-weight="bold">H₂N—CH(R)—COOH</text>
    <text x="250" y="143" font-family="Arial,sans-serif" font-size="10" fill="#777777" text-anchor="middle" font-weight="normal">Аминогруппа (основные св-ва) + Карбоксильная группа (кислотные св-ва)</text>
    <rect x="25" y="160" width="220" height="75" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="135" y="176" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Цвиттер-ион</text>
    <text x="135" y="194" font-family="Arial,sans-serif" font-size="11" fill="#333333" text-anchor="middle" font-weight="bold">H₃N⁺—CH(R)—COO⁻</text>
    <text x="135" y="210" font-family="Arial,sans-serif" font-size="10" fill="#777777" text-anchor="middle" font-weight="normal">Внутренняя соль в растворе</text>
    <text x="135" y="224" font-family="Arial,sans-serif" font-size="10" fill="#777777" text-anchor="middle" font-weight="normal">pH ≠ 7 → изоэлектрическая точка</text>
    <rect x="255" y="160" width="220" height="75" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="365" y="176" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Незаменимые аминокислоты</text>
    <text x="365" y="194" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Валин, Лейцин, Изолейцин</text>
    <text x="365" y="208" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Лизин, Метионин, Треонин</text>
    <text x="365" y="222" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Фенилаланин, Триптофан</text>
    <rect x="25" y="242" width="450" height="58" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="250" y="258" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Пептидная связь (амидная)</text>
    <text x="250" y="275" font-family="Arial,sans-serif" font-size="11" fill="#333333" text-anchor="middle" font-weight="normal">—CO—NH—   образуется при конденсации аминокислот</text>
    <text x="250" y="290" font-family="Arial,sans-serif" font-size="10" fill="#777777" text-anchor="middle" font-weight="normal">n аминокислот → полипептид + (n−1)H₂O</text>
  </g>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#777777" text-anchor="middle">Химия · 11 класс</text>
</svg>