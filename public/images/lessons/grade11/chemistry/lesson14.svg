<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="52" fill="url(#header)" rx="0"/>
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">Урок 14: Кристаллические решётки</text>
  <!-- Card 1: Ionic lattice -->
  <rect x="20" y="64" width="370" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1.5"/>
  <rect x="20" y="64" width="370" height="24" rx="10" fill="#14b8a6" fill-opacity="0.15"/>
  <text x="205" y="82" text-anchor="middle" fill="#14b8a6" font-size="13" font-weight="bold">1. Ионная решётка (NaCl)</text>
  <!-- Mini lattice -->
  <circle cx="80" cy="115" r="8" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="119" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">+</text>
  <circle cx="115" cy="115" r="9" fill="#14b8a6" fill-opacity="0.4" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="115" y="119" text-anchor="middle" fill="#14b8a6" font-size="8" font-weight="bold">−</text>
  <circle cx="150" cy="115" r="8" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="150" y="119" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">+</text>
  <circle cx="185" cy="115" r="9" fill="#14b8a6" fill-opacity="0.4" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="185" y="119" text-anchor="middle" fill="#14b8a6" font-size="8" font-weight="bold">−</text>
  <circle cx="80" cy="145" r="9" fill="#14b8a6" fill-opacity="0.4" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="80" y="149" text-anchor="middle" fill="#14b8a6" font-size="8" font-weight="bold">−</text>
  <circle cx="115" cy="145" r="8" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="115" y="149" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">+</text>
  <circle cx="150" cy="145" r="9" fill="#14b8a6" fill-opacity="0.4" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="150" y="149" text-anchor="middle" fill="#14b8a6" font-size="8" font-weight="bold">−</text>
  <circle cx="185" cy="145" r="8" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="185" y="149" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">+</text>
  <!-- Properties -->
  <text x="230" y="110" fill="#ffffff" font-size="10">Ионы в узлах</text>
  <text x="230" y="125" fill="#94a3b8" font-size="10">• Высокая T плавл.</text>
  <text x="230" y="140" fill="#94a3b8" font-size="10">• Хрупкие</text>
  <text x="230" y="155" fill="#94a3b8" font-size="10">• Растворимы в воде</text>
  <text x="230" y="170" fill="#94a3b8" font-size="10">• Проводят в расплаве</text>
  <text x="230" y="185" fill="#14b8a6" font-size="9">Примеры: NaCl, KBr, CaO</text>
  <!-- Card 2: Atomic lattice -->
  <rect x="410" y="64" width="370" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="410" y="64" width="370" height="24" rx="10" fill="#8b5cf6" fill-opacity="0.15"/>
  <text x="595" y="82" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="bold">2. Атомная решётка (алмаз/C)</text>
  <!-- Diamond lattice (tetrahedral hint) -->
  <circle cx="480" cy="120" r="7" fill="#8b5cf6" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="520" cy="120" r="7" fill="#8b5cf6" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="500" cy="148" r="7" fill="#8b5cf6" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="500" cy="105" r="7" fill="#8b5cf6" fill-opacity="0.5" stroke="#8b5cf6" stroke-width="1.5"/>
  <!-- Bonds between atoms -->
  <line x1="480" y1="120" x2="520" y2="120" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="480" y1="120" x2="500" y2="148" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="520" y1="120" x2="500" y2="148" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="480" y1="120" x2="500" y2="105" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="520" y1="120" x2="500" y2="105" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="500" y="123" text-anchor="middle" fill="#0f172a" font-size="7" font-weight="bold">C</text>
  <text x="520" y="123" text-anchor="middle" fill="#0f172a" font-size="7" font-weight="bold">C</text>
  <text x="500" y="151" text-anchor="middle" fill="#0f172a" font-size="7" font-weight="bold">C</text>
  <text x="500" y="108" text-anchor="middle" fill="#0f172a" font-size="7" font-weight="bold">C</text>
  <!-- Properties -->
  <text x="560" y="110" fill="#ffffff" font-size="10">Атомы в узлах</text>
  <text x="560" y="125" fill="#94a3b8" font-size="10">• Очень твёрдые</text>
  <text x="560" y="140" fill="#94a3b8" font-size="10">• Очень высокая T плавл.</text>
  <text x="560" y="155" fill="#94a3b8" font-size="10">• Нерастворимы</text>
  <text x="560" y="170" fill="#94a3b8" font-size="10">• Не проводят ток</text>
  <text x="560" y="185" fill="#8b5cf6" font-size="9">Примеры: алмаз, Si, SiO₂, Ge</text>
  <!-- Card 3: Molecular lattice -->
  <rect x="20" y="204" width="370" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="20" y="204" width="370" height="24" rx="10" fill="#f59e0b" fill-opacity="0.15"/>
  <text x="205" y="222" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">3. Молекулярная решётка (I₂, CO₂, лёд)</text>
  <!-- Molecular lattice: small groups at nodes -->
  <!-- Molecule 1 -->
  <ellipse cx="80" cy="260" rx="14" ry="10" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="264" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">I₂</text>
  <!-- Weak bonds (dashed) -->
  <line x1="94" y1="260" x2="126" y2="260" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <!-- Molecule 2 -->
  <ellipse cx="140" cy="260" rx="14" ry="10" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="264" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">I₂</text>
  <!-- Weak bonds -->
  <line x1="154" y1="260" x2="186" y2="260" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <!-- Molecule 3 -->
  <ellipse cx="200" cy="260" rx="14" ry="10" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="264" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">I₂</text>
  <!-- Second row -->
  <ellipse cx="110" cy="290" rx="14" ry="10" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="294" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">I₂</text>
  <ellipse cx="170" cy="290" rx="14" ry="10" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="170" y="294" text-anchor="middle" fill="#f59e0b" font-size="8" font-weight="bold">I₂</text>
  <!-- Properties -->
  <text x="250" y="250" fill="#ffffff" font-size="10">Молекулы в узлах</text>
  <text x="250" y="265" fill="#94a3b8" font-size="10">• Низкая T плавл.</text>
  <text x="250" y="280" fill="#94a3b8" font-size="10">• Летучие</text>
  <text x="250" y="295" fill="#94a3b8" font-size="10">• Мягкие</text>
  <text x="250" y="310" fill="#94a3b8" font-size="10">• Не проводят ток</text>
  <text x="250" y="325" fill="#f59e0b" font-size="9">Примеры: I₂, CO₂, H₂O(лёд), S₈</text>
  <!-- Card 4: Metallic lattice -->
  <rect x="410" y="204" width="370" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#eab308" stroke-width="1.5"/>
  <rect x="410" y="204" width="370" height="24" rx="10" fill="#eab308" fill-opacity="0.15"/>
  <text x="595" y="222" text-anchor="middle" fill="#eab308" font-size="13" font-weight="bold">4. Металлическая решётка (Fe, Cu)</text>
  <!-- Metallic lattice with electron sea -->
  <rect x="440" y="240" width="160" height="80" rx="5" fill="#14b8a6" fill-opacity="0.06" stroke="#14b8a6" stroke-width="0.5"/>
  <!-- Electron dots -->
  <circle cx="455" cy="255" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="480" cy="275" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="510" cy="252" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="540" cy="285" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="565" cy="260" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="470" cy="300" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="520" cy="305" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="575" cy="295" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="490" cy="245" r="2" fill="#14b8a6" opacity="0.5"/>
  <circle cx="550" cy="248" r="2" fill="#14b8a6" opacity="0.5"/>
  <!-- Metal ions in rows -->
  <circle cx="465" cy="260" r="9" fill="#eab308" fill-opacity="0.4" stroke="#eab308" stroke-width="1.5"/>
  <text x="465" y="264" text-anchor="middle" fill="#eab308" font-size="8" font-weight="bold">+</text>
  <circle cx="510" cy="280" r="9" fill="#eab308" fill-opacity="0.4" stroke="#eab308" stroke-width="1.5"/>
  <text x="510" y="284" text-anchor="middle" fill="#eab308" font-size="8" font-weight="bold">+</text>
  <circle cx="555" cy="260" r="9" fill="#eab308" fill-opacity="0.4" stroke="#eab308" stroke-width="1.5"/>
  <text x="555" y="264" text-anchor="middle" fill="#eab308" font-size="8" font-weight="bold">+</text>
  <circle cx="480" cy="300" r="9" fill="#eab308" fill-opacity="0.4" stroke="#eab308" stroke-width="1.5"/>
  <text x="480" y="304" text-anchor="middle" fill="#eab308" font-size="8" font-weight="bold">+</text>
  <circle cx="530" cy="300" r="9" fill="#eab308" fill-opacity="0.4" stroke="#eab308" stroke-width="1.5"/>
  <text x="530" y="304" text-anchor="middle" fill="#eab308" font-size="8" font-weight="bold">+</text>
  <circle cx="580" cy="280" r="9" fill="#eab308" fill-opacity="0.4" stroke="#eab308" stroke-width="1.5"/>
  <text x="580" y="284" text-anchor="middle" fill="#eab308" font-size="8" font-weight="bold">+</text>
  <!-- Properties -->
  <text x="620" y="250" fill="#ffffff" font-size="10">Ионы в эл. газе</text>
  <text x="620" y="265" fill="#94a3b8" font-size="10">• Ковкие</text>
  <text x="620" y="280" fill="#94a3b8" font-size="10">• Проводят ток</text>
  <text x="620" y="295" fill="#94a3b8" font-size="10">• Металлич. блеск</text>
  <text x="620" y="310" fill="#94a3b8" font-size="10">• Проводят тепло</text>
  <text x="620" y="325" fill="#eab308" font-size="9">Примеры: Fe, Cu, Al, Au</text>
  <!-- Section 5: Comparison Table -->
  <rect x="20" y="344" width="760" height="148" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="366" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Сравнительная таблица кристаллических решёток</text>
  <!-- Table headers -->
  <rect x="30" y="376" width="120" height="20" rx="3" fill="#94a3b8" fill-opacity="0.1"/>
  <text x="90" y="390" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Свойство</text>
  <rect x="155" y="376" width="145" height="20" rx="3" fill="#14b8a6" fill-opacity="0.1"/>
  <text x="228" y="390" text-anchor="middle" fill="#14b8a6" font-size="11" font-weight="bold">Ионная</text>
  <rect x="305" y="376" width="145" height="20" rx="3" fill="#8b5cf6" fill-opacity="0.1"/>
  <text x="378" y="390" text-anchor="middle" fill="#8b5cf6" font-size="11" font-weight="bold">Атомная</text>
  <rect x="455" y="376" width="145" height="20" rx="3" fill="#f59e0b" fill-opacity="0.1"/>
  <text x="528" y="390" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Молекулярная</text>
  <rect x="605" y="376" width="145" height="20" rx="3" fill="#eab308" fill-opacity="0.1"/>
  <text x="678" y="390" text-anchor="middle" fill="#eab308" font-size="11" font-weight="bold">Металлическая</text>
  <line x1="30" y1="398" x2="750" y2="398" stroke="#94a3b8" stroke-width="0.3"/>
  <!-- Row: Узлы -->
  <text x="90" y="415" text-anchor="middle" fill="#94a3b8" font-size="10">Частицы в узлах</text>
  <text x="228" y="415" text-anchor="middle" fill="#ffffff" font-size="10">Ионы</text>
  <text x="378" y="415" text-anchor="middle" fill="#ffffff" font-size="10">Атомы</text>
  <text x="528" y="415" text-anchor="middle" fill="#ffffff" font-size="10">Молекулы</text>
  <text x="678" y="415" text-anchor="middle" fill="#ffffff" font-size="10">Ионы + e⁻</text>
  <!-- Row: T плавл -->
  <text x="90" y="435" text-anchor="middle" fill="#94a3b8" font-size="10">T плавления</text>
  <text x="228" y="435" text-anchor="middle" fill="#ffffff" font-size="10">Высокая</text>
  <text x="378" y="435" text-anchor="middle" fill="#ffffff" font-size="10">Очень выс.</text>
  <text x="528" y="435" text-anchor="middle" fill="#ffffff" font-size="10">Низкая</text>
  <text x="678" y="435" text-anchor="middle" fill="#ffffff" font-size="10">Разная</text>
  <!-- Row: Твёрдость -->
  <text x="90" y="455" text-anchor="middle" fill="#94a3b8" font-size="10">Твёрдость</text>
  <text x="228" y="455" text-anchor="middle" fill="#ffffff" font-size="10">Твёрдые, хрупк.</text>
  <text x="378" y="455" text-anchor="middle" fill="#ffffff" font-size="10">Самые твёрд.</text>
  <text x="528" y="455" text-anchor="middle" fill="#ffffff" font-size="10">Мягкие</text>
  <text x="678" y="455" text-anchor="middle" fill="#ffffff" font-size="10">Ковкие</text>
  <!-- Row: Электропроводность -->
  <text x="90" y="475" text-anchor="middle" fill="#94a3b8" font-size="10">Электропров.</text>
  <text x="228" y="475" text-anchor="middle" fill="#ffffff" font-size="10">Расплав/р-р</text>
  <text x="378" y="475" text-anchor="middle" fill="#ffffff" font-size="10">Нет</text>
  <text x="528" y="475" text-anchor="middle" fill="#ffffff" font-size="10">Нет</text>
  <text x="678" y="475" text-anchor="middle" fill="#ffffff" font-size="10">Да</text>
  <!-- Column dividers -->
  <line x1="152" y1="376" x2="152" y2="482" stroke="#94a3b8" stroke-width="0.3"/>
  <line x1="302" y1="376" x2="302" y2="482" stroke="#94a3b8" stroke-width="0.3"/>
  <line x1="452" y1="376" x2="452" y2="482" stroke="#94a3b8" stroke-width="0.3"/>
  <line x1="602" y1="376" x2="602" y2="482" stroke="#94a3b8" stroke-width="0.3"/>
  <!-- Row dividers -->
  <line x1="30" y1="422" x2="750" y2="422" stroke="#94a3b8" stroke-width="0.2"/>
  <line x1="30" y1="442" x2="750" y2="442" stroke="#94a3b8" stroke-width="0.2"/>
  <line x1="30" y1="462" x2="750" y2="462" stroke="#94a3b8" stroke-width="0.2"/>
</svg>