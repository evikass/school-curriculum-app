<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#2E7D32" text-anchor="middle">Лекарственные вещества</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#777777" text-anchor="middle">Химия — Урок 9</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#2E7D32" stroke-width="2" opacity="0.25" />
  <defs>
    <clipPath id="ill">
      <rect x="15" y="80" width="470" height="225" rx="6" />
    </clipPath>
  </defs>
  <g clip-path="url(#ill)">
    <rect x="15" y="80" width="470" height="225" fill="#F1F8E9" rx="6" opacity="0.5" />
    <rect x="25" y="88" width="215" height="130" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="132" y="104" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Классификация лекарств</text>
    <text x="132" y="124" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Анальгетики (обезболивание)</text>
    <text x="132" y="138" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Антибиотики (против бактерий)</text>
    <text x="132" y="152" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Антисептики (дезинфекция)</text>
    <text x="132" y="166" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Жаропонижающие</text>
    <text x="132" y="180" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Противовирусные</text>
    <text x="132" y="194" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Витаминные препараты</text>
    <text x="132" y="210" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Седативные, кардио и др.</text>
    <rect x="260" y="88" width="215" height="130" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="367" y="104" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Известные препараты</text>
    <text x="367" y="124" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Аспирин (ацетилсалициловая</text>
    <text x="367" y="138" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">  кислота) — жаропонижающее</text>
    <text x="367" y="156" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Пенициллин — первый антибиотик</text>
    <text x="367" y="170" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">  (открыт А. Флемингом, 1928)</text>
    <text x="367" y="188" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Новокаин — местный анестетик</text>
    <text x="367" y="204" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Йод, перекись H₂O₂ — антисептики</text>
    <rect x="25" y="225" width="450" height="78" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="250" y="243" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">Правила безопасности</text>
    <text x="132" y="262" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• По рецепту врача</text>
    <text x="132" y="276" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Соблюдать дозировку</text>
    <text x="367" y="262" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Проверять срок годности</text>
    <text x="367" y="276" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Хранить в недоступном для детей месте</text>
    <text x="250" y="296" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">Побочные эффекты, аллергия, привыкание — возможные последствия</text>
  </g>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#777777" text-anchor="middle">Химия · 11 класс</text>
</svg>