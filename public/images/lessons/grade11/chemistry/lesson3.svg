<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#2E7D32" text-anchor="middle">Белки</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#777777" text-anchor="middle">Химия — Урок 3</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#2E7D32" stroke-width="2" opacity="0.25" />
  <defs>
    <clipPath id="ill">
      <rect x="15" y="80" width="470" height="225" rx="6" />
    </clipPath>
  </defs>
  <g clip-path="url(#ill)">
    <rect x="15" y="80" width="470" height="225" fill="#F1F8E9" rx="6" opacity="0.5" />
    <rect x="25" y="88" width="220" height="105" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="135" y="104" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Уровни структуры</text>
    <text x="42" y="122" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="start" font-weight="bold">①</text>
    <text x="60" y="122" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">Первичная — последовательность</text>
    <text x="42" y="137" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="start" font-weight="bold">②</text>
    <text x="60" y="137" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">Вторичная — α-спираль, β-слой</text>
    <text x="42" y="152" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="start" font-weight="bold">③</text>
    <text x="60" y="152" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">Третичная — глобула (H-связи)</text>
    <text x="42" y="167" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="start" font-weight="bold">④</text>
    <text x="60" y="167" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">Четвертичная — несколько цепей</text>
    <text x="42" y="182" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="start" font-weight="normal">   Пример: гемоглобин (4 цепи)</text>
    <rect x="255" y="88" width="220" height="105" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="365" y="104" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Денатурация белков</text>
    <text x="365" y="124" font-family="Arial,sans-serif" font-size="11" fill="#333333" text-anchor="middle" font-weight="normal">Нарушение структуры:</text>
    <text x="365" y="140" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Нагревание (t &gt; 60°C)</text>
    <text x="365" y="154" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Кислоты и щёлочи</text>
    <text x="365" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Соли тяжёлых металлов</text>
    <text x="365" y="182" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Радиация, органич. раствор.</text>
    <rect x="25" y="200" width="450" height="98" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="250" y="218" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Качественные реакции на белки</text>
    <text x="135" y="238" font-family="Arial,sans-serif" font-size="11" fill="#333333" text-anchor="middle" font-weight="bold">Биуретовая реакция</text>
    <text x="135" y="254" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">NaOH + CuSO₄ → фиолетовый</text>
    <text x="135" y="268" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">(на пептидные связи)</text>
    <text x="365" y="238" font-family="Arial,sans-serif" font-size="11" fill="#333333" text-anchor="middle" font-weight="bold">Ксантопротеиновая реакция</text>
    <text x="365" y="254" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">HNO₃(конц.) → жёлтый цвет</text>
    <text x="365" y="268" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">(на ароматические радикалы)</text>
    <text x="250" y="290" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="normal">Горение: запах жжёных перьев (N, S в составе)</text>
  </g>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#777777" text-anchor="middle">Химия · 11 класс</text>
</svg>