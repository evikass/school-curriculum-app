<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="level1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="level2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="level3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="level4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="48" fill="url(#headerGrad)"/>
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Урок 3: Электроны в атоме. Энергетические уровни и подуровни</text>
  <!-- Energy Levels Section -->
  <rect x="20" y="58" width="350" height="220" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="195" y="78" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Энергетические уровни</text>
  <!-- Level bars with labels -->
  <!-- K level -->
  <rect x="40" y="92" width="310" height="30" rx="5" fill="url(#level1)" fill-opacity="0.25" stroke="#14b8a6" stroke-width="1"/>
  <text x="55" y="112" fill="#14b8a6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">K (n=1)</text>
  <text x="160" y="112" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Макс: 2e⁻</text>
  <text x="280" y="112" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">2n² = 2</text>
  <!-- L level -->
  <rect x="40" y="130" width="310" height="30" rx="5" fill="url(#level2)" fill-opacity="0.25" stroke="#10b981" stroke-width="1"/>
  <text x="55" y="150" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">L (n=2)</text>
  <text x="160" y="150" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Макс: 8e⁻</text>
  <text x="280" y="150" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">2n² = 8</text>
  <!-- M level -->
  <rect x="40" y="168" width="310" height="30" rx="5" fill="url(#level3)" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="1"/>
  <text x="55" y="188" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">M (n=3)</text>
  <text x="160" y="188" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Макс: 18e⁻</text>
  <text x="280" y="188" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">2n² = 18</text>
  <!-- N level -->
  <rect x="40" y="206" width="310" height="30" rx="5" fill="url(#level4)" fill-opacity="0.25" stroke="#a855f7" stroke-width="1"/>
  <text x="55" y="226" fill="#a855f7" font-family="Arial, sans-serif" font-size="12" font-weight="bold">N (n=4)</text>
  <text x="160" y="226" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Макс: 32e⁻</text>
  <text x="280" y="226" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">2n² = 32</text>
  <!-- Formula -->
  <text x="195" y="260" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Формула: макс. e⁻ = 2n²</text>
  <!-- Sublevels section -->
  <rect x="420" y="58" width="360" height="220" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="600" y="78" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Подуровни и орбитали</text>
  <!-- s sublevel -->
  <rect x="435" y="90" width="330" height="42" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#14b8a6" stroke-width="1"/>
  <text x="450" y="108" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">s</text>
  <text x="475" y="108" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">1 орбиталь → 2e⁻</text>
  <circle cx="700" cy="111" r="12" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1"/>
  <text x="700" y="115" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="8">сфера</text>
  <!-- p sublevel -->
  <rect x="435" y="140" width="330" height="42" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#8b5cf6" stroke-width="1"/>
  <text x="450" y="158" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">p</text>
  <text x="475" y="158" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">3 орбитали → 6e⁻</text>
  <!-- p orbital dumbbell shapes -->
  <ellipse cx="675" cy="158" rx="14" ry="6" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
  <ellipse cx="700" cy="150" rx="6" ry="14" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1"/>
  <ellipse cx="725" cy="158" rx="14" ry="6" fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1" transform="rotate(60,725,158)"/>
  <text x="700" y="176" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="7">px  py  pz</text>
  <!-- d sublevel -->
  <rect x="435" y="190" width="330" height="42" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#f59e0b" stroke-width="1"/>
  <text x="450" y="208" fill="#f59e0b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">d</text>
  <text x="475" y="208" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">5 орбиталей → 10e⁻</text>
  <text x="700" y="208" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="9">4-лепестковые</text>
  <text x="700" y="224" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">+ 1dz²</text>
  <!-- f sublevel -->
  <rect x="435" y="240" width="330" height="30" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="260" fill="#ef4444" font-family="Arial, sans-serif" font-size="13" font-weight="bold">f</text>
  <text x="475" y="260" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">7 орбиталей → 14e⁻</text>
  <text x="700" y="260" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="9">сложная форма</text>
  <!-- Orbital shapes section -->
  <rect x="20" y="288" width="260" height="200" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="150" y="308" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Формы орбиталей</text>
  <!-- s orbital sphere -->
  <circle cx="80" cy="370" r="28" fill="#14b8a6" fill-opacity="0.15" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="80" cy="370" r="14" fill="#14b8a6" fill-opacity="0.25" stroke="#14b8a6" stroke-width="0.8"/>
  <text x="80" y="410" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">s-орбиталь</text>
  <text x="80" y="425" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">сферическая</text>
  <!-- p orbital dumbbell -->
  <ellipse cx="200" cy="358" rx="8" ry="22" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-width="1.5"/>
  <ellipse cx="200" cy="382" rx="8" ry="22" fill="#8b5cf6" fill-opacity="0.2" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="200" y1="335" x2="200" y2="405" stroke="#8b5cf6" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="200" y="420" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">p-орбиталь</text>
  <text x="200" y="435" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">гантель (3 шт: px, py, pz)</text>
  <!-- 3D orientations -->
  <text x="80" y="465" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">1 ориентация</text>
  <text x="200" y="465" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">3 ориентации</text>
  <!-- Quantum numbers section -->
  <rect x="300" y="288" width="480" height="110" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="540" y="308" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Квантовые числа</text>
  <text x="320" y="330" fill="#14b8a6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">n</text>
  <text x="340" y="330" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">— главное (1, 2, 3...)</text>
  <text x="560" y="330" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">l</text>
  <text x="575" y="330" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">— орбитальное (0...n−1)</text>
  <text x="320" y="352" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">mₗ</text>
  <text x="348" y="352" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">— магнитное (−l...+l)</text>
  <text x="560" y="352" fill="#ef4444" font-family="Arial, sans-serif" font-size="11" font-weight="bold">mₛ</text>
  <text x="585" y="352" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">— спиновое (±½)</text>
  <text x="540" y="380" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">l=0(s), l=1(p), l=2(d), l=3(f)</text>
  <!-- Principles section -->
  <rect x="300" y="408" width="480" height="80" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#8b5cf6" stroke-width="1"/>
  <text x="540" y="428" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Принципы и формулы</text>
  <text x="320" y="450" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Принцип неопределённости Гейзенберга:</text>
  <text x="320" y="468" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Δx · Δp ≥ ħ/2</text>
  <text x="560" y="450" fill="#14b8a6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Длина волны де Бройля:</text>
  <text x="560" y="468" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">λ = h/mv</text>
</svg>