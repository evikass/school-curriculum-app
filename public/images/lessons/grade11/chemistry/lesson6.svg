<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Пластмассы: виды и применение</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- PE card -->
<rect x="12" y="58" width="230" height="85" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
<text x="127" y="75" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Полиэтилен (ПЭ)</text>
<text x="22" y="89" font-family="monospace" font-size="9" fill="#333">n CH2=CH2</text>
<text x="22" y="101" font-family="monospace" font-size="9" fill="#2E7D32">  -> (-CH2-CH2-)n</text>
<text x="22" y="115" font-family="Arial,sans-serif" font-size="8" fill="#555">ПНД: трубы, канистры</text>
<text x="22" y="127" font-family="Arial,sans-serif" font-size="8" fill="#555">ПВД: пакеты, плёнки</text>

<!-- PVC card -->
<rect x="258" y="58" width="230" height="85" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="75" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Поливинилхлорид (ПВХ)</text>
<text x="268" y="89" font-family="monospace" font-size="9" fill="#333">n CH2=CHCl</text>
<text x="268" y="101" font-family="monospace" font-size="9" fill="#2E7D32">  -> (-CH2-CHCl-)n</text>
<text x="268" y="115" font-family="Arial,sans-serif" font-size="8" fill="#555">Не горит! Выделяет HCl</text>
<text x="268" y="127" font-family="Arial,sans-serif" font-size="8" fill="#555">Трубы, окна, кабели</text>

<!-- PS card -->
<rect x="12" y="155" width="230" height="85" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
<text x="127" y="172" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Полистирол (ПС)</text>
<text x="22" y="186" font-family="monospace" font-size="9" fill="#333">n C6H5-CH=CH2</text>
<text x="22" y="198" font-family="monospace" font-size="9" fill="#2E7D32">  -> (-CH2-CH(C6H5)-)n</text>
<text x="22" y="212" font-family="Arial,sans-serif" font-size="8" fill="#555">Прозрачный, хрупкий</text>
<text x="22" y="224" font-family="Arial,sans-serif" font-size="8" fill="#555">Пенопласт: теплоизоляция, упаковка</text>

<!-- PP card -->
<rect x="258" y="155" width="230" height="85" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="172" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Полипропилен (ПП)</text>
<text x="268" y="186" font-family="monospace" font-size="9" fill="#333">n CH2=CH-CH3</text>
<text x="268" y="198" font-family="monospace" font-size="9" fill="#2E7D32">  -> (-CH2-CH(CH3)-)n</text>
<text x="268" y="212" font-family="Arial,sans-serif" font-size="8" fill="#555">Тпл 160-170 C, прочный</text>
<text x="268" y="224" font-family="Arial,sans-serif" font-size="8" fill="#555">Контейнеры, шприцы, канаты</text>

<!-- Connecting lines -->
<line x1="127" y1="143" x2="127" y2="155" stroke="#66BB6A" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="373" y1="143" x2="373" y2="155" stroke="#66BB6A" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- Recycling codes -->
<rect x="12" y="252" width="230" height="55" rx="8" fill="white" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="127" y="269" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Коды переработки</text>
<rect x="20" y="276" width="30" height="18" rx="8" fill="#2E7D32"/>
<text x="35" y="289" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">1</text>
<rect x="55" y="276" width="30" height="18" rx="8" fill="#388E3C"/>
<text x="70" y="289" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">2</text>
<rect x="90" y="276" width="30" height="18" rx="8" fill="#43A047"/>
<text x="105" y="289" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">3</text>
<rect x="125" y="276" width="30" height="18" rx="8" fill="#4CAF50"/>
<text x="140" y="289" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">4</text>
<rect x="160" y="276" width="30" height="18" rx="8" fill="#66BB6A"/>
<text x="175" y="289" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">5</text>
<rect x="195" y="276" width="30" height="18" rx="8" fill="#81C784"/>
<text x="210" y="289" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">6</text>

<!-- Applications -->
<rect x="258" y="252" width="230" height="55" rx="8" fill="white" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="373" y="269" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Применение</text>
<rect x="264" y="276" width="48" height="18" rx="8" fill="#2E7D32"/>
<text x="288" y="289" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Трубы</text>
<rect x="317" y="276" width="45" height="18" rx="8" fill="#388E3C"/>
<text x="339" y="289" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Плёнки</text>
<rect x="367" y="276" width="48" height="18" rx="8" fill="#43A047"/>
<text x="391" y="289" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Упаковка</text>
<rect x="420" y="276" width="55" height="18" rx="8" fill="#4CAF50"/>
<text x="447" y="289" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Бутылки</text>

<!-- Bottom note -->
<rect y="316" width="500" height="14" fill="#1B5E20"/>
<text x="250" y="327" text-anchor="middle" fill="#A5D6A7" font-family="Arial,sans-serif" font-size="8">Биоразлагаемые полимеры (ПЛА, ПГБ) разлагаются за месяцы, а ПЭ — столетия</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>