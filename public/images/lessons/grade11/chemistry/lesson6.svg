<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="52" rx="0" fill="url(#headerGrad)" opacity="0.9"/>
  <text x="400" y="34" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">Периодический закон Д.И. Менделеева</text>
  <!-- Mendeleev portrait area -->
  <rect x="30" y="68" width="160" height="180" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.85"/>
  <text x="110" y="98" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Д.И. Менделеев</text>
  <text x="110" y="118" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">1834–1907</text>
  <circle cx="110" cy="175" r="35" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="172" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="28" font-weight="bold">М</text>
  <text x="110" y="192" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Открыватель</text>
  <text x="110" y="238" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">1869 г. — открытие</text>
  <!-- Original formulation -->
  <rect x="210" y="68" width="270" height="120" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" opacity="0.85"/>
  <rect x="210" y="68" width="270" height="28" rx="12" fill="url(#amberGrad)" opacity="0.3"/>
  <text x="345" y="87" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Формулировка 1869 г.</text>
  <text x="225" y="112" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Свойства химических элементов</text>
  <text x="225" y="128" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">находятся в периодической</text>
  <text x="225" y="144" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">зависимости от их атомных масс</text>
  <text x="345" y="176" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">f(A) — атомная масса</text>
  <!-- Modern formulation -->
  <rect x="500" y="68" width="270" height="120" rx="12" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5" opacity="0.85"/>
  <rect x="500" y="68" width="270" height="28" rx="12" fill="url(#tealGrad)" opacity="0.3"/>
  <text x="635" y="87" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Современная формулировка</text>
  <text x="515" y="112" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">Свойства химических элементов</text>
  <text x="515" y="128" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">находятся в периодической</text>
  <text x="515" y="144" fill="#14b8a6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">зависимости от заряда ядра (Z)</text>
  <text x="635" y="176" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">f(Z) — порядковый номер</text>
  <!-- Arrow between formulations -->
  <line x1="480" y1="128" x2="500" y2="128" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
  <polygon points="498,122 510,128 498,134" fill="#10b981"/>
  <!-- Predicted elements section -->
  <rect x="30" y="260" width="740" height="100" rx="12" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.85"/>
  <text x="400" y="284" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="14" font-weight="bold" filter="url(#glow)">Предсказанные Менделеевым элементы</text>
  <!-- Ekaboron → Sc -->
  <rect x="55" y="296" width="200" height="50" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="155" y="315" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Экабор → Sc</text>
  <text x="155" y="333" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Скандий (1879 г.)</text>
  <!-- Ekaaluminium → Ga -->
  <rect x="290" y="296" width="200" height="50" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="390" y="315" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Экаалюминий → Ga</text>
  <text x="390" y="333" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Галлий (1875 г.)</text>
  <!-- Ekasilicon → Ge -->
  <rect x="525" y="296" width="200" height="50" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1"/>
  <text x="625" y="315" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Экакремний → Ge</text>
  <text x="625" y="333" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Германий (1886 г.)</text>
  <!-- Fundamental law section -->
  <rect x="30" y="375" width="740" height="108" rx="12" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5" opacity="0.85"/>
  <rect x="30" y="375" width="740" height="30" rx="12" fill="url(#tealGrad)" opacity="0.2"/>
  <text x="400" y="396" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="14" font-weight="bold" filter="url(#glow)">Периодический закон — фундаментальный закон природы</text>
  <text x="55" y="424" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">• Объединяет все химические элементы в единую систему</text>
  <text x="55" y="442" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">• Подтверждает материальное единство мира</text>
  <text x="55" y="460" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">• Является основой современной химии</text>
  <text x="55" y="478" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Открыт в 1869 г. — одно из величайших открытий в истории науки</text>
</svg>