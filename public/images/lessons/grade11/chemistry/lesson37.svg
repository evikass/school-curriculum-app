<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg37" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="hdr37" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow37">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg37)" rx="12"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="44" fill="url(#hdr37)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#hdr37)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">Химия в промышленности и сельском хозяйстве</text>

  <!-- === INDUSTRY ICONS (TOP) === -->
  <rect x="15" y="54" width="770" height="100" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="72" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Основные отрасли химической промышленности</text>

  <!-- Metallurgy icon -->
  <rect x="30" y="80" width="140" height="62" rx="6" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="0.8"/>
  <!-- Furnace icon -->
  <path d="M70 110 L80 96 L110 96 L120 110 L120 130 L70 130 Z" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <path d="M80 96 L85 88 L105 88 L110 96" fill="none" stroke="#f59e0b" stroke-width="1"/>
  <rect x="85" y="108" width="20" height="10" rx="2" fill="#ef4444" opacity="0.6"/>
  <text x="100" y="135" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">Металлургия</text>
  <text x="100" y="105" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Fe, Cu, Al</text>

  <!-- Fertilizer icon -->
  <rect x="180" y="80" width="140" height="62" rx="6" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="0.8"/>
  <text x="250" y="98" font-family="Arial, sans-serif" font-size="16" fill="#10b981" text-anchor="middle" font-weight="bold">N-P-K</text>
  <text x="220" y="113" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">N</text>
  <text x="245" y="113" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6">P</text>
  <text x="270" y="113" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">K</text>
  <text x="250" y="130" font-family="Arial, sans-serif" font-size="8" fill="#10b981" text-anchor="middle">Удобрения</text>

  <!-- Petrochemical icon -->
  <rect x="330" y="80" width="140" height="62" rx="6" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="0.8"/>
  <!-- Oil drop -->
  <path d="M395 95 Q405 110 405 118 Q405 126 395 126 Q385 126 385 118 Q385 110 395 95 Z" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="395" cy="117" r="4" fill="#f59e0b" opacity="0.3"/>
  <text x="400" y="138" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">Нефтехимия</text>

  <!-- Polymer icon -->
  <rect x="480" y="80" width="140" height="62" rx="6" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="0.8"/>
  <!-- Chain links -->
  <circle cx="520" cy="105" r="6" fill="none" stroke="#14b8a6" stroke-width="1.2"/>
  <circle cx="535" cy="105" r="6" fill="none" stroke="#14b8a6" stroke-width="1.2"/>
  <circle cx="550" cy="105" r="6" fill="none" stroke="#14b8a6" stroke-width="1.2"/>
  <circle cx="565" cy="105" r="6" fill="none" stroke="#14b8a6" stroke-width="1.2"/>
  <text x="550" y="130" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">Полимеры / Пластмассы</text>

  <!-- Pharma icon -->
  <rect x="630" y="80" width="140" height="62" rx="6" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="0.8"/>
  <!-- Capsule -->
  <rect x="685" y="98" width="24" height="10" rx="5" fill="#8b5cf6" opacity="0.4"/>
  <rect x="685" y="98" width="12" height="10" rx="5" fill="#8b5cf6" opacity="0.7"/>
  <text x="700" y="130" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">Фармацевтика</text>

  <!-- === HABER PROCESS (MIDDLE LEFT) === -->
  <rect x="15" y="162" width="385" height="152" rx="8" fill="rgba(30,41,59,0.8)" stroke="#f59e0b" stroke-width="1"/>
  <text x="207" y="180" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="bold">Процесс Габера — Боша (NH₃)</text>
  <!-- Reaction equation -->
  <rect x="25" y="188" width="365" height="26" rx="4" fill="rgba(245,158,11,0.1)"/>
  <text x="207" y="206" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">N₂ + 3H₂ ⇌ 2NH₃ + Q</text>
  <!-- Conditions -->
  <text x="35" y="232" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b">Условия:</text>
  <text x="35" y="248" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• T = 450—550 °C (компромиссная T)</text>
  <text x="35" y="262" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• P = 200—1000 атм (смещение →)</text>
  <text x="35" y="276" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• Катализатор: Fe₃O₄ + Al₂O₃ + K₂O</text>
  <text x="35" y="292" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• Выход NH₃: ~15% за цикл (рецирк.)</text>
  <!-- Flow diagram -->
  <rect x="250" y="228" width="60" height="20" rx="4" fill="rgba(20,184,166,0.2)" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="280" y="242" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">N₂+H₂</text>
  <path d="M310 238 L330 238" stroke="#14b8a6" stroke-width="1" marker-end="url(#arrow37)"/>
  <rect x="330" y="228" width="50" height="20" rx="4" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="355" y="242" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">Реактор</text>
  <rect x="250" y="256" width="60" height="20" rx="4" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="280" y="270" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle">NH₃↑</text>
  <path d="M310 266 L330 266" stroke="#8b5cf6" stroke-width="1"/>
  <rect x="330" y="256" width="50" height="20" rx="4" fill="rgba(16,185,129,0.2)" stroke="#10b981" stroke-width="0.5"/>
  <text x="355" y="270" font-family="Arial, sans-serif" font-size="8" fill="#10b981" text-anchor="middle">Сбор</text>
  <!-- Le Chatelier note -->
  <text x="207" y="308" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">Принцип Ле Шателье: ↑P, ↓T → смещение → к NH₃</text>

  <!-- === CONTACT PROCESS (MIDDLE RIGHT) === -->
  <rect x="410" y="162" width="375" height="152" rx="8" fill="rgba(30,41,59,0.8)" stroke="#14b8a6" stroke-width="1"/>
  <text x="597" y="180" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Контактный процесс (H₂SO₄)</text>
  <!-- Steps -->
  <rect x="420" y="188" width="355" height="22" rx="3" fill="rgba(239,68,68,0.1)"/>
  <text x="430" y="203" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" font-weight="bold">1.</text>
  <text x="445" y="203" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">S + O₂ → SO₂ (обжиг серы / сульфидов)</text>

  <rect x="420" y="214" width="355" height="22" rx="3" fill="rgba(245,158,11,0.1)"/>
  <text x="430" y="229" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" font-weight="bold">2.</text>
  <text x="445" y="229" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">2SO₂ + O₂ ⇌ 2SO₃ (V₂O₅, 450°C)</text>

  <rect x="420" y="240" width="355" height="22" rx="3" fill="rgba(20,184,166,0.1)"/>
  <text x="430" y="255" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" font-weight="bold">3.</text>
  <text x="445" y="255" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">SO₃ + H₂O → H₂SO₄ (через олеум)</text>

  <!-- Applications -->
  <text x="430" y="278" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Применение H₂SO₄:</text>
  <text x="430" y="292" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">удобрения • аккумуляторы • очистка металлов • красители</text>
  <text x="430" y="306" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">H₂SO₄ — «кровь промышленности» (производство №1 в мире)</text>

  <!-- === FERTILIZER TYPES (BOTTOM) === -->
  <rect x="15" y="322" width="770" height="168" rx="8" fill="rgba(30,41,59,0.8)" stroke="#10b981" stroke-width="1"/>
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="12" fill="#10b981" text-anchor="middle" font-weight="bold">Удобрения — основа сельского хозяйства</text>

  <!-- Nitrogen fertilizers -->
  <rect x="25" y="350" width="240" height="128" rx="6" fill="rgba(20,184,166,0.08)" stroke="#14b8a6" stroke-width="0.8"/>
  <text x="145" y="367" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle" font-weight="bold">Азотные удобрения</text>
  <line x1="40" y1="373" x2="250" y2="373" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="35" y="387" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">NH₄NO₃ — аммиачная селитра</text>
  <text x="35" y="401" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">(NH₂)₂CO — карбамид (мочевина)</text>
  <text x="35" y="415" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">(NH₄)₂SO₄ — сульфат аммония</text>
  <text x="35" y="435" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Действие: рост стеблей и листьев</text>
  <text x="35" y="449" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Применяют весной для злаков</text>
  <text x="35" y="468" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">Содержание N: 21—46%</text>

  <!-- Phosphate fertilizers -->
  <rect x="275" y="350" width="240" height="128" rx="6" fill="rgba(139,92,246,0.08)" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="395" y="367" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Фосфорные удобрения</text>
  <line x1="290" y1="373" x2="500" y2="373" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="285" y="387" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Ca(H₂PO₄)₂ — суперфосфат</text>
  <text x="285" y="401" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">Ca₃(PO₄)₂ — фосфоритная мука</text>
  <text x="285" y="415" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">CaHPO₄·2H₂O — преципитат</text>
  <text x="285" y="435" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Действие: развитие корней, плодов</text>
  <text x="285" y="449" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Вносят осенью (медленное усвоение)</text>
  <text x="285" y="468" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6">P₂O₅: 14—20% (простой), 45% (двойной)</text>

  <!-- Potassium fertilizers -->
  <rect x="525" y="350" width="250" height="128" rx="6" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="650" y="367" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="bold">Калийные удобрения</text>
  <line x1="540" y1="373" x2="760" y2="373" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="535" y="387" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">KCl — хлорид калия</text>
  <text x="535" y="401" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">K₂SO₄ — сульфат калия</text>
  <text x="535" y="415" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">K₂CO₃ — поташ</text>
  <text x="535" y="435" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">Действие: устойчивость к болезням,</text>
  <text x="535" y="449" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">зимостойкость, качество плодов</text>
  <text x="535" y="468" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b">K₂O: 40—60%</text>
</svg>