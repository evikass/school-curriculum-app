<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#14b8a6"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="#ef4444"/>
    </marker>
    <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="48" fill="url(#headerGrad)"/>
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Урок 5: Периодическое изменение свойств атомов</text>
  <!-- Simplified Periodic Table -->
  <rect x="20" y="58" width="430" height="240" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="235" y="78" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Периодические тенденции</text>
  <!-- Periodic table grid - simplified -->
  <!-- Row 1 -->
  <rect x="40" y="88" width="28" height="22" rx="3" fill="#f59e0b" fill-opacity="0.25" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="54" y="103" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="8">H</text>
  <rect x="390" y="88" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="404" y="103" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">He</text>
  <!-- Row 2 -->
  <rect x="40" y="114" width="28" height="22" rx="3" fill="#f59e0b" fill-opacity="0.25" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="54" y="129" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="8">Li</text>
  <rect x="70" y="114" width="28" height="22" rx="3" fill="#f59e0b" fill-opacity="0.25" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="84" y="129" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="8">Be</text>
  <rect x="250" y="114" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="264" y="129" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">B</text>
  <rect x="280" y="114" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="294" y="129" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">C</text>
  <rect x="310" y="114" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="324" y="129" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">N</text>
  <rect x="340" y="114" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="354" y="129" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">O</text>
  <rect x="370" y="114" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="384" y="129" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">F</text>
  <rect x="400" y="114" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="414" y="129" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">Ne</text>
  <!-- Row 3 -->
  <rect x="40" y="140" width="28" height="22" rx="3" fill="#f59e0b" fill-opacity="0.25" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="54" y="155" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="8">Na</text>
  <rect x="70" y="140" width="28" height="22" rx="3" fill="#f59e0b" fill-opacity="0.25" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="84" y="155" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="8">Mg</text>
  <rect x="250" y="140" width="28" height="22" rx="3" fill="#f59e0b" fill-opacity="0.15" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="264" y="155" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">Al</text>
  <rect x="280" y="140" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="294" y="155" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">Si</text>
  <rect x="310" y="140" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="324" y="155" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">P</text>
  <rect x="340" y="140" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="354" y="155" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">S</text>
  <rect x="370" y="140" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="384" y="155" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">Cl</text>
  <rect x="400" y="140" width="28" height="22" rx="3" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="414" y="155" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8">Ar</text>
  <!-- Arrows on periodic table -->
  <!-- Atomic radius arrow: increases down and left -->
  <line x1="410" y1="96" x2="55" y2="165" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowR)" opacity="0.7"/>
  <text x="60" y="182" fill="#14b8a6" font-family="Arial, sans-serif" font-size="8" font-weight="bold">↑ Радиус атома</text>
  <!-- Electronegativity arrow: increases up and right -->
  <line x1="55" y1="160" x2="410" y2="96" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)" opacity="0.7"/>
  <text x="280" y="182" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="8" font-weight="bold">↑ Электроотрицательность</text>
  <!-- Legend for table -->
  <rect x="40" y="195" width="12" height="12" rx="2" fill="#f59e0b" fill-opacity="0.25" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="58" y="205" fill="#f59e0b" font-family="Arial, sans-serif" font-size="9">Металлы</text>
  <rect x="120" y="195" width="12" height="12" rx="2" fill="#8b5cf6" fill-opacity="0.25" stroke="#8b5cf6" stroke-width="0.8"/>
  <text x="138" y="205" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="9">Неметаллы</text>
  <!-- Trend arrows summary -->
  <text x="235" y="228" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Тенденция ↑ → усиливается</text>
  <!-- Trend cards -->
  <!-- Atomic radius -->
  <rect x="40" y="238" width="190" height="48" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#14b8a6" stroke-width="1"/>
  <text x="135" y="255" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Радиус атома</text>
  <text x="135" y="270" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">↑ ↓ ← увеличивается</text>
  <text x="135" y="282" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">→ уменьшается</text>
  <!-- Electronegativity -->
  <rect x="240" y="238" width="190" height="48" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#8b5cf6" stroke-width="1"/>
  <text x="335" y="255" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Электроотрицательность</text>
  <text x="335" y="270" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">↑ → увеличивается</text>
  <text x="335" y="282" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">← ↓ уменьшается</text>
  <!-- Right side: detailed trends -->
  <rect x="470" y="58" width="310" height="240" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="625" y="78" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Подробные тенденции</text>
  <!-- Ionization energy -->
  <rect x="485" y="88" width="280" height="40" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#10b981" stroke-width="1"/>
  <text x="500" y="106" fill="#10b981" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Энергия ионизации (Eᵢ)</text>
  <text x="500" y="120" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">→ ↑ увеличивается | ↓ уменьшается</text>
  <!-- Metallic character -->
  <rect x="485" y="135" width="280" height="40" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#f59e0b" stroke-width="1"/>
  <text x="500" y="153" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Металлические свойства</text>
  <text x="500" y="167" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">← ↓ увеличиваются | → ↑ уменьшаются</text>
  <!-- Nonmetallic character -->
  <rect x="485" y="182" width="280" height="40" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#8b5cf6" stroke-width="1"/>
  <text x="500" y="200" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Неметаллические свойства</text>
  <text x="500" y="214" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">→ ↑ увеличиваются | ← ↓ уменьшаются</text>
  <!-- Oxidation -->
  <rect x="485" y="229" width="280" height="40" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#ef4444" stroke-width="1"/>
  <text x="500" y="247" fill="#ef4444" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Восстанов. свойства (отдача e⁻)</text>
  <text x="500" y="261" fill="#ffffff" font-family="Arial, sans-serif" font-size="9">← ↓ усиливаются (металлы)</text>
  <!-- Key concepts bottom -->
  <rect x="20" y="308" width="760" height="182" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="400" y="328" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Ключевые понятия периодичности</text>
  <!-- Shielding effect -->
  <rect x="35" y="340" width="360" height="70" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#10b981" stroke-width="1"/>
  <text x="215" y="358" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Экранирование (shielding effect)</text>
  <text x="50" y="375" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Внутренние электроны ослабляют</text>
  <text x="50" y="390" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">притяжение ядра к внешним e⁻</text>
  <text x="50" y="405" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">↓ в группе: больше уровней → сильнее экранирование</text>
  <!-- Effective nuclear charge -->
  <rect x="415" y="340" width="350" height="70" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#8b5cf6" stroke-width="1"/>
  <text x="590" y="358" text-anchor="middle" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Эффективный заряд ядра (Zэфф)</text>
  <text x="430" y="375" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Zэфф = Z − σ (константа экранирования)</text>
  <text x="430" y="390" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">→ в периоде: Zэфф увеличивается</text>
  <text x="430" y="405" fill="#ffffff" font-family="Arial, sans-serif" font-size="10">↓ в группе: Zэфф почти не меняется</text>
  <!-- Summary relationships -->
  <rect x="35" y="418" width="730" height="62" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="436" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Взаимосвязь свойств</text>
  <text x="55" y="455" fill="#14b8a6" font-family="Arial, sans-serif" font-size="10">Zэфф ↑ → радиус ↓ → Eᵢ ↑ → ЭО ↑ → немет. св-ва ↑</text>
  <text x="55" y="472" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">Zэфф ↓ → радиус ↑ → Eᵢ ↓ → ЭО ↓ → мет. св-ва ↑</text>
  <text x="480" y="465" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">(ЭО = электроотрицательность)</text>
</svg>