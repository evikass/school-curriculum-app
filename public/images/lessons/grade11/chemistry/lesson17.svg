<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="fatSol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="waterSol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="vitA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="vitC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <linearGradient id="vitD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <!-- Title bar -->
  <rect width="500" height="44" fill="#1B5E20" rx="8"/>
  <rect y="20" width="500" height="24" fill="#1B5E20"/>
  <text x="250" y="29" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="16" font-weight="bold">Витамины и их роль в организме</text>

  <!-- Classification table -->
  <rect x="15" y="55" width="225" height="130" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="127" y="73" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Классификация витаминов</text>

  <!-- Fat-soluble header -->
  <rect x="25" y="80" width="205" height="18" rx="4" fill="url(#fatSol)"/>
  <text x="127" y="93" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Жирорастворимые (A, D, E, K)</text>
  <text x="35" y="112" fill="#555" font-family="Arial,sans-serif" font-size="8">• Накапливаются в печени и жировой ткани</text>
  <text x="35" y="125" fill="#555" font-family="Arial,sans-serif" font-size="8">• Опасен гипервитаминоз (A, D)</text>
  <text x="35" y="138" fill="#555" font-family="Arial,sans-serif" font-size="8">• Всасываются с жирами (нужна жёлчь)</text>
  <text x="35" y="151" fill="#555" font-family="Arial,sans-serif" font-size="8">• Запас: недели–месяцы</text>

  <!-- Water-soluble header -->
  <rect x="25" y="158" width="205" height="18" rx="4" fill="url(#waterSol)"/>
  <text x="127" y="171" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Водорастворимые (C, B-группа)</text>

  <!-- Key vitamin cards -->
  <!-- Vitamin A -->
  <rect x="250" y="55" width="115" height="62" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <circle cx="270" cy="75" r="10" fill="url(#vitA)"/>
  <text x="270" y="79" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="9" font-weight="bold">A</text>
  <text x="290" y="76" fill="#1B5E20" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Ретинол</text>
  <text x="260" y="93" fill="#555" font-family="Arial,sans-serif" font-size="7">Зрение, кожа, рост</text>
  <text x="260" y="104" fill="#E65100" font-family="Arial,sans-serif" font-size="7">Дефицит → кур. слепота</text>

  <!-- Vitamin C -->
  <rect x="375" y="55" width="115" height="62" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <circle cx="395" cy="75" r="10" fill="url(#vitC)"/>
  <text x="395" y="79" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="9" font-weight="bold">C</text>
  <text x="415" y="76" fill="#1B5E20" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Аскорбинка</text>
  <text x="385" y="93" fill="#555" font-family="Arial,sans-serif" font-size="7">Коллаген, иммунитет</text>
  <text x="385" y="104" fill="#E65100" font-family="Arial,sans-serif" font-size="7">Дефицит → цинга</text>

  <!-- Vitamin D -->
  <rect x="250" y="125" width="115" height="62" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <circle cx="270" cy="145" r="10" fill="url(#vitD)"/>
  <text x="270" y="149" text-anchor="middle" fill="#333" font-family="Arial,sans-serif" font-size="9" font-weight="bold">D</text>
  <text x="290" y="146" fill="#1B5E20" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Кальциферол</text>
  <text x="260" y="163" fill="#555" font-family="Arial,sans-serif" font-size="7">Обмен Ca²⁺ и P, кости</text>
  <text x="260" y="174" fill="#E65100" font-family="Arial,sans-serif" font-size="7">Дефицит → рахит</text>

  <!-- Vitamin E -->
  <rect x="375" y="125" width="115" height="62" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <circle cx="395" cy="145" r="10" fill="#66BB6A"/>
  <text x="395" y="149" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="9" font-weight="bold">E</text>
  <text x="415" y="146" fill="#1B5E20" font-family="Arial,sans-serif" font-size="9" font-weight="bold">Токоферол</text>
  <text x="385" y="163" fill="#555" font-family="Arial,sans-serif" font-size="7">Антиоксидант, репрод.</text>
  <text x="385" y="174" fill="#E65100" font-family="Arial,sans-serif" font-size="7">Дефицит → мыш. дистр.</text>

  <!-- B-vitamins row -->
  <rect x="15" y="200" width="470" height="50" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="217" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Витамины группы B — коферменты метаболизма</text>

  <circle cx="50" cy="237" r="8" fill="#1565C0"/>
  <text x="50" y="241" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">B1</text>
  <text x="75" y="240" fill="#555" font-family="Arial,sans-serif" font-size="7">Тиамин → бери-бери</text>

  <circle cx="160" cy="237" r="8" fill="#1565C0"/>
  <text x="160" y="241" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">B2</text>
  <text x="185" y="240" fill="#555" font-family="Arial,sans-serif" font-size="7">Рибофлавин → трещины</text>

  <circle cx="280" cy="237" r="8" fill="#1565C0"/>
  <text x="280" y="241" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">B6</text>
  <text x="305" y="240" fill="#555" font-family="Arial,sans-serif" font-size="7">Пиридоксин → анемия</text>

  <circle cx="400" cy="237" r="8" fill="#1565C0"/>
  <text x="400" y="241" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">B12</text>
  <text x="428" y="240" fill="#555" font-family="Arial,sans-serif" font-size="7">Кобаламин → анемия</text>

  <!-- Deficiency disease pills -->
  <rect x="15" y="260" width="470" height="80" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="278" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Авитаминоз — заболевания при полном отсутствии витамина</text>

  <rect x="25" y="288" width="85" height="22" rx="11" fill="#E65100" filter="url(#shadow1)"/>
  <text x="67" y="303" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Цинга (C)</text>

  <rect x="120" y="288" width="85" height="22" rx="11" fill="#8D6E63" filter="url(#shadow1)"/>
  <text x="162" y="303" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Рахит (D)</text>

  <rect x="215" y="288" width="100" height="22" rx="11" fill="#455A64" filter="url(#shadow1)"/>
  <text x="265" y="303" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Бери-бери (B1)</text>

  <rect x="325" y="288" width="110" height="22" rx="11" fill="#5D4037" filter="url(#shadow1)"/>
  <text x="380" y="303" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="8" font-weight="bold">Кур. слепота (A)</text>

  <text x="250" y="328" text-anchor="middle" fill="#2E7D32" font-family="Arial,sans-serif" font-size="9">Гипервитаминоз опасен для A и D — накапливаются в организме!</text>
</svg>