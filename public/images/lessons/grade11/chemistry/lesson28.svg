<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg28" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad28" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow28">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg28)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="44" fill="url(#headerGrad28)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#headerGrad28)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#ffffff" text-anchor="middle">Неметаллы в Периодической системе. Водород</text>

  <!-- === SIMPLIFIED PERIODIC TABLE (LEFT) === -->
  <rect x="15" y="54" width="310" height="220" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="170" y="72" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Неметаллы в ПСХЭ</text>

  <!-- Nonmetal region shading (upper right diagonal) -->
  <polygon points="120,82 300,82 300,260 200,260" fill="url(#purpleGrad)" opacity="0.4"/>

  <!-- Period labels -->
  <text x="50" y="98" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">I</text>
  <text x="50" y="122" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">II</text>
  <text x="50" y="146" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">III</text>
  <text x="42" y="170" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">IV</text>
  <text x="42" y="194" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">V</text>
  <text x="42" y="218" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">VI</text>
  <text x="42" y="242" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">VII</text>

  <!-- Row 1: H, He -->
  <rect x="62" y="84" width="22" height="18" rx="2" fill="rgba(20,184,166,0.4)" stroke="#14b8a6" stroke-width="1"/>
  <text x="73" y="96" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">H</text>
  <rect x="285" y="84" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="296" y="96" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">He</text>

  <!-- Row 2: B, C, N, O, F, Ne -->
  <rect x="115" y="108" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="126" y="120" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">B</text>
  <rect x="155" y="108" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="166" y="120" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">C</text>
  <rect x="195" y="108" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="206" y="120" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">N</text>
  <rect x="215" y="108" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="226" y="120" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">O</text>
  <rect x="255" y="108" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="266" y="120" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">F</text>
  <rect x="285" y="108" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="296" y="120" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Ne</text>

  <!-- Row 3: Si, P, S, Cl, Ar -->
  <rect x="155" y="132" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="166" y="144" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Si</text>
  <rect x="195" y="132" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="206" y="144" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">P</text>
  <rect x="215" y="132" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="226" y="144" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">S</text>
  <rect x="255" y="132" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="266" y="144" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Cl</text>
  <rect x="285" y="132" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="296" y="144" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Ar</text>

  <!-- Row 4: As, Se, Br, Kr -->
  <rect x="195" y="156" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="206" y="168" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">As</text>
  <rect x="215" y="156" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="226" y="168" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Se</text>
  <rect x="255" y="156" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="266" y="168" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Br</text>
  <rect x="285" y="156" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="296" y="168" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Kr</text>

  <!-- Row 5: Te, I, Xe -->
  <rect x="215" y="180" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="226" y="192" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Te</text>
  <rect x="255" y="180" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="266" y="192" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">I</text>
  <rect x="285" y="180" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="296" y="192" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Xe</text>

  <!-- Row 6: At, Rn -->
  <rect x="255" y="204" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="266" y="216" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">At</text>
  <rect x="285" y="204" width="22" height="18" rx="2" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="296" y="216" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Rn</text>

  <!-- Legend for table -->
  <rect x="62" y="240" width="12" height="10" rx="1" fill="rgba(139,92,246,0.4)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="80" y="249" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">неметалл</text>
  <rect x="135" y="240" width="12" height="10" rx="1" fill="rgba(20,184,166,0.4)" stroke="#14b8a6" stroke-width="1"/>
  <text x="153" y="249" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">водород</text>
  <rect x="210" y="240" width="12" height="10" rx="1" fill="rgba(245,158,11,0.2)" stroke="#f59e0b" stroke-width="1"/>
  <text x="228" y="249" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">металл</text>

  <!-- === HYDROGEN PROPERTIES (RIGHT TOP) === -->
  <rect x="340" y="54" width="445" height="125" rx="8" fill="rgba(30,41,59,0.8)" stroke="#14b8a6" stroke-width="1"/>
  <text x="562" y="72" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">Водород — уникальный элемент</text>

  <!-- H atom diagram -->
  <circle cx="390" cy="120" r="25" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.5"/>
  <circle cx="390" cy="120" r="8" fill="#14b8a6" opacity="0.7"/>
  <text x="390" y="124" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">p⁺</text>
  <circle cx="415" cy="108" r="3" fill="#e2e8f0" opacity="0.8"/>
  <text x="390" y="155" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle" font-weight="bold">H</text>
  <text x="390" y="168" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">1e⁻</text>

  <!-- Dual nature -->
  <rect x="435" y="82" width="165" height="42" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="517" y="98" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="bold">H → H⁺ + e⁻</text>
  <text x="517" y="115" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Как металл (отдаёт e⁻)</text>

  <rect x="610" y="82" width="165" height="42" rx="5" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="692" y="98" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">H + e⁻ → H⁻</text>
  <text x="692" y="115" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Как неметалл (принимает e⁻)</text>

  <!-- H₂ molecule -->
  <rect x="435" y="132" width="340" height="38" rx="5" fill="rgba(15,23,42,0.6)" stroke="#334155" stroke-width="0.5"/>
  <text x="605" y="150" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">H₂ — двухатомная молекула, ковалентная неполярная связь</text>
  <text x="605" y="164" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle">Лёгкий газ, t°кип = −253°C</text>

  <!-- === HYDROGEN REACTIONS (RIGHT BOTTOM + MIDDLE) === -->
  <rect x="340" y="188" width="445" height="90" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="562" y="206" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">Реакции H₂</text>

  <!-- Reaction 1: with O2 -->
  <rect x="350" y="214" width="135" height="55" rx="5" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="0.5"/>
  <text x="417" y="230" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">С кислородом</text>
  <text x="417" y="244" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">2H₂ + O₂ → 2H₂O</text>
  <text x="417" y="258" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">горение, Q = −484 кДж</text>

  <!-- Reaction 2: with metals -->
  <rect x="495" y="214" width="135" height="55" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="562" y="230" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">С металлами</text>
  <text x="562" y="244" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">H₂ + 2Na → 2NaH</text>
  <text x="562" y="258" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">гидриды (H⁻)</text>

  <!-- Reaction 3: with nonmetals -->
  <rect x="640" y="214" width="135" height="55" rx="5" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="707" y="230" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">С неметаллами</text>
  <text x="707" y="244" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">H₂ + Cl₂ → 2HCl</text>
  <text x="707" y="258" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">H₂ + S → H₂S</text>

  <!-- === HYDROGEN AS FUEL (BOTTOM) === -->
  <rect x="15" y="284" width="310" height="100" rx="8" fill="rgba(30,41,59,0.8)" stroke="#14b8a6" stroke-width="1" filter="url(#glow28)"/>
  <text x="170" y="304" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Водород — энергоноситель</text>

  <!-- Fuel cell concept -->
  <rect x="30" y="314" width="130" height="55" rx="5" fill="rgba(20,184,166,0.1)" stroke="#14b8a6" stroke-width="0.5"/>
  <text x="95" y="332" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6" text-anchor="middle" font-weight="bold">2H₂ + O₂</text>
  <text x="95" y="348" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0" text-anchor="middle">→ 2H₂O + энергия</text>
  <text x="95" y="362" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Водородное топливо</text>

  <!-- Advantages -->
  <rect x="175" y="314" width="140" height="55" rx="5" fill="rgba(15,23,42,0.6)" stroke="#334155" stroke-width="0.5"/>
  <text x="245" y="330" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">✓ Экологически чистый</text>
  <text x="245" y="344" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">✓ Высокая теплота горения</text>
  <text x="245" y="358" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle">✓ Возобновляемый</text>

  <!-- === NONMETAL PROPERTIES (BOTTOM LEFT) === -->
  <rect x="15" y="394" width="310" height="92" rx="8" fill="rgba(30,41,59,0.8)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="170" y="414" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Общие свойства неметаллов</text>

  <text x="30" y="434" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• Принимают электроны (окислители)</text>
  <text x="30" y="449" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• Высшая электроотрицательность</text>
  <text x="30" y="464" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• Хрупкие, без металлического блеска</text>
  <text x="30" y="479" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• Газ/жидкость/твёрдое (кроме H₂, N₂, O₂, F₂, Cl₂)</text>

  <!-- === HYDROGEN POSITION (BOTTOM RIGHT) === -->
  <rect x="340" y="284" width="445" height="100" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="562" y="304" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Почему H в I группе?</text>

  <rect x="350" y="314" width="210" height="60" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="455" y="330" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="bold">Сходство со щелочными:</text>
  <text x="455" y="346" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">ns¹ — 1 электрон на внешнем уровне</text>
  <text x="455" y="360" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Отдаёт e⁻ → H⁺</text>

  <rect x="570" y="314" width="205" height="60" rx="5" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="0.5"/>
  <text x="672" y="330" font-family="Arial, sans-serif" font-size="9" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Сходство с галогенами:</text>
  <text x="672" y="346" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Не хватает 1e⁻ до octet</text>
  <text x="672" y="360" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0" text-anchor="middle">Принимает e⁻ → H⁻</text>

  <!-- === KEY INSIGHT (BOTTOM) === -->
  <rect x="340" y="394" width="445" height="92" rx="8" fill="rgba(30,41,59,0.8)" stroke="#14b8a6" stroke-width="1" filter="url(#glow28)"/>
  <text x="562" y="414" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Ключевые особенности неметаллов</text>

  <text x="360" y="434" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• 22 неметалла из 118 элементов (≈19%)</text>
  <text x="360" y="449" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• Образуют основу жизни: C, H, O, N, P, S</text>
  <text x="360" y="464" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">• ЭО растёт → вправо и вверх в ПСХЭ</text>
  <text x="360" y="479" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">F — самый электроотрицательный элемент</text>
</svg>