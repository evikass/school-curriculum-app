<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg33" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad33" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="whitePGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#fde68a;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="redPGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="acidGrad33" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="bioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow33">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowWhite33">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg33)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="44" fill="url(#headerGrad33)" rx="12"/>
  <rect x="0" y="22" width="800" height="22" fill="url(#headerGrad33)"/>
  <text x="400" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Фосфор и его соединения</text>

  <!-- === PHOSPHORUS ALLOTROPES (TOP) === -->
  <rect x="15" y="54" width="770" height="155" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="400" y="72" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Аллотропы фосфора</text>

  <!-- White P4 - tetrahedron -->
  <rect x="25" y="82" width="245" height="118" rx="5" fill="url(#whitePGrad)" stroke="#fde68a" stroke-width="1.5"/>
  <text x="147" y="98" font-family="Arial, sans-serif" font-size="10" fill="#fde68a" text-anchor="middle" font-weight="bold">Белый P₄ (тетраэдр)</text>

  <!-- P4 tetrahedron shape -->
  <g filter="url(#glowWhite33)" transform="translate(147,128)">
    <polygon points="0,-22 -20,12 20,12" fill="none" stroke="#fef3c7" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="-22" r="8" fill="rgba(254,243,199,0.4)" stroke="#fef3c7" stroke-width="1.5"/>
    <text x="0" y="-19" font-family="Arial, sans-serif" font-size="7" fill="#fef3c7" text-anchor="middle" font-weight="bold">P</text>
    <circle cx="-20" cy="12" r="8" fill="rgba(254,243,199,0.4)" stroke="#fef3c7" stroke-width="1.5"/>
    <text x="-20" y="15" font-family="Arial, sans-serif" font-size="7" fill="#fef3c7" text-anchor="middle" font-weight="bold">P</text>
    <circle cx="20" cy="12" r="8" fill="rgba(254,243,199,0.4)" stroke="#fef3c7" stroke-width="1.5"/>
    <text x="20" y="15" font-family="Arial, sans-serif" font-size="7" fill="#fef3c7" text-anchor="middle" font-weight="bold">P</text>
    <circle cx="0" cy="4" r="8" fill="rgba(254,243,199,0.4)" stroke="#fef3c7" stroke-width="1.5"/>
    <text x="0" y="7" font-family="Arial, sans-serif" font-size="7" fill="#fef3c7" text-anchor="middle" font-weight="bold">P</text>
  </g>

  <text x="147" y="165" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle" font-weight="bold">⚠ Ядовит! Самовоспламеняется!</text>
  <text x="147" y="177" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Хранят под водой • Хемилюминесценция</text>
  <text x="147" y="189" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Мягкий, воскоподобный, t°пл = 44°C</text>

  <!-- Red P -->
  <rect x="280" y="82" width="245" height="118" rx="5" fill="url(#redPGrad)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="402" y="98" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle" font-weight="bold">Красный P</text>

  <!-- Red P - amorphous structure representation -->
  <g filter="url(#glow33)" transform="translate(402,130)">
    <circle cx="-15" cy="-10" r="7" fill="rgba(239,68,68,0.4)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="-15" y="-7" font-family="Arial, sans-serif" font-size="6" fill="#ef4444" text-anchor="middle" font-weight="bold">P</text>
    <circle cx="5" cy="-15" r="7" fill="rgba(239,68,68,0.4)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="5" y="-12" font-family="Arial, sans-serif" font-size="6" fill="#ef4444" text-anchor="middle" font-weight="bold">P</text>
    <circle cx="20" cy="0" r="7" fill="rgba(239,68,68,0.4)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="20" y="3" font-family="Arial, sans-serif" font-size="6" fill="#ef4444" text-anchor="middle" font-weight="bold">P</text>
    <circle cx="0" cy="8" r="7" fill="rgba(239,68,68,0.4)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="0" y="11" font-family="Arial, sans-serif" font-size="6" fill="#ef4444" text-anchor="middle" font-weight="bold">P</text>
    <circle cx="-20" cy="10" r="7" fill="rgba(239,68,68,0.4)" stroke="#ef4444" stroke-width="1.5"/>
    <text x="-20" y="13" font-family="Arial, sans-serif" font-size="6" fill="#ef4444" text-anchor="middle" font-weight="bold">P</text>
    <line x1="-8" y1="-10" x2="-2" y2="-15" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <line x1="12" y1="-15" x2="14" y2="-6" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <line x1="14" y1="2" x2="7" y2="6" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
    <line x1="-7" y1="8" x2="-13" y2="10" stroke="#ef4444" stroke-width="1" opacity="0.6"/>
  </g>

  <text x="402" y="165" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle" font-weight="bold">✓ Безопасен, не ядовит</text>
  <text x="402" y="177" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Используется в спичках</text>
  <text x="402" y="189" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Порошок тёмно-красного цвета</text>

  <!-- Black P -->
  <rect x="535" y="82" width="245" height="118" rx="5" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="657" y="98" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Чёрный P</text>

  <!-- Layered structure -->
  <g transform="translate(657,130)">
    <line x1="-30" y1="-10" x2="30" y2="-10" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <circle cx="-25" cy="-10" r="4" fill="rgba(139,92,246,0.5)" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="-10" cy="-10" r="4" fill="rgba(139,92,246,0.5)" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="5" cy="-10" r="4" fill="rgba(139,92,246,0.5)" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="20" cy="-10" r="4" fill="rgba(139,92,246,0.5)" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="-30" y1="5" x2="30" y2="5" stroke="#8b5cf6" stroke-width="2" opacity="0.5"/>
    <circle cx="-25" cy="5" r="4" fill="rgba(139,92,246,0.5)" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="-10" cy="5" r="4" fill="rgba(139,92,246,0.5)" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="5" cy="5" r="4" fill="rgba(139,92,246,0.5)" stroke="#8b5cf6" stroke-width="1"/>
    <circle cx="20" cy="5" r="4" fill="rgba(139,92,246,0.5)" stroke="#8b5cf6" stroke-width="1"/>
  </g>

  <text x="657" y="165" font-family="Arial, sans-serif" font-size="7" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Самый стабильный аллотроп</text>
  <text x="657" y="177" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Слоистая структура (как графит)</text>
  <text x="657" y="189" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Полупроводник, P &gt; 1 ГПа</text>

  <!-- === KEY COMPOUNDS (MIDDLE LEFT) === -->
  <rect x="15" y="219" width="380" height="115" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="205" y="237" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Ключевые соединения фосфора</text>

  <!-- P2O5 -->
  <rect x="25" y="247" width="115" height="36" rx="5" fill="rgba(245,158,11,0.1)" stroke="#f59e0b" stroke-width="1"/>
  <text x="82" y="263" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="bold">P₂O₅</text>
  <text x="82" y="278" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">белый порошок, гигроскоп.</text>

  <!-- H3PO4 -->
  <rect x="148" y="247" width="115" height="36" rx="5" fill="url(#acidGrad33)" stroke="#14b8a6" stroke-width="1.5" filter="url(#glow33)"/>
  <text x="205" y="263" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle" font-weight="bold">H₃PO₄</text>
  <text x="205" y="278" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">3-основная кислота</text>

  <!-- Phosphates -->
  <rect x="271" y="247" width="115" height="36" rx="5" fill="rgba(20,184,166,0.1)" stroke="#10b981" stroke-width="1"/>
  <text x="328" y="263" font-family="Arial, sans-serif" font-size="10" fill="#10b981" text-anchor="middle" font-weight="bold">Фосфаты</text>
  <text x="328" y="278" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">PO₄³⁻, HPO₄²⁻, H₂PO₄⁻</text>

  <!-- Reactions -->
  <text x="30" y="300" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">P₂O₅ + 3H₂O → 2H₃PO₄</text>
  <text x="30" y="314" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">4P + 5O₂ → 2P₂O₅ (горение)</text>
  <text x="250" y="300" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8">H₃PO₄ + 3NaOH → Na₃PO₄ + 3H₂O</text>
  <text x="250" y="314" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6">Кач. р-ция PO₄³⁻: +AgNO₃ → Ag₃PO₄↓ (жёлт.)</text>

  <!-- === FERTILIZERS (MIDDLE RIGHT) === -->
  <rect x="405" y="219" width="380" height="115" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="595" y="237" font-family="Arial, sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle" font-weight="bold">Фосфорные удобрения</text>

  <!-- Process chain -->
  <rect x="415" y="250" width="130" height="35" rx="5" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="480" y="265" font-family="Arial, sans-serif" font-size="8" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Ca₃(PO₄)₂</text>
  <text x="480" y="278" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">фосфорит, апатит</text>

  <line x1="548" y1="267" x2="578" y2="267" stroke="#14b8a6" stroke-width="1.5"/>
  <polygon points="578,264 585,267 578,270" fill="#14b8a6"/>
  <text x="563" y="261" font-family="Arial, sans-serif" font-size="6" fill="#94a3b8">+H₂SO₄</text>

  <rect x="588" y="250" width="130" height="35" rx="5" fill="rgba(20,184,166,0.15)" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="653" y="265" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" text-anchor="middle" font-weight="bold">Суперфосфат</text>
  <text x="653" y="278" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Ca(H₂PO₄)₂ + CaSO₄</text>

  <!-- Double superphosphate -->
  <rect x="415" y="295" width="365" height="30" rx="5" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1"/>
  <text x="597" y="314" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">Двойной суперфосфат: Ca₃(PO₄)₂ + 4H₃PO₄ → 3Ca(H₂PO₄)₂ (без CaSO₄)</text>

  <!-- === BIOLOGICAL ROLE (BOTTOM LEFT) === -->
  <rect x="15" y="344" width="285" height="145" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="157" y="362" font-family="Arial, sans-serif" font-size="11" fill="#8b5cf6" text-anchor="middle" font-weight="bold">Биологическая роль P</text>

  <!-- ATP -->
  <rect x="25" y="372" width="125" height="45" rx="5" fill="url(#bioGrad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="87" y="389" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">АТФ</text>
  <text x="87" y="404" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">энергоноситель клетки</text>
  <text x="87" y="414" font-family="Arial, sans-serif" font-size="7" fill="#8b5cf6" text-anchor="middle">3 остатка H₃PO₄</text>

  <!-- DNA -->
  <rect x="160" y="372" width="125" height="45" rx="5" fill="url(#bioGrad)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="222" y="389" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle" font-weight="bold">ДНК / РНК</text>
  <text x="222" y="404" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">фосфатный остов</text>
  <text x="222" y="414" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">генетическая информация</text>

  <!-- Bones/Teeth -->
  <rect x="25" y="425" width="260" height="30" rx="5" fill="rgba(245,158,11,0.08)" stroke="#f59e0b" stroke-width="1"/>
  <text x="155" y="444" font-family="Arial, sans-serif" font-size="8" fill="#f59e0b" text-anchor="middle">🦴 Кости и зубы: Ca₃(PO₄)₂ + CaCO₃</text>
  <text x="155" y="456" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">~85% фосфора организма — в скелете</text>
  <text x="155" y="468" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">Недостаток P → рахит, остеопороз</text>

  <!-- === OXIDATION STATES (BOTTOM MIDDLE) === -->
  <rect x="310" y="344" width="225" height="145" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="422" y="362" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle" font-weight="bold">Степени окисления P</text>

  <text x="325" y="385" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" font-weight="bold">−3</text>
  <text x="355" y="385" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">PH₃ (фосфин)</text>

  <text x="325" y="405" font-family="Arial, sans-serif" font-size="10" fill="#fde68a" font-weight="bold"> 0</text>
  <text x="355" y="405" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">P (простое вещество)</text>

  <text x="325" y="425" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" font-weight="bold">+3</text>
  <text x="355" y="425" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">PCl₃, H₃PO₃</text>

  <text x="325" y="445" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" font-weight="bold">+5</text>
  <text x="355" y="445" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8">P₂O₅, H₃PO₄, фосфаты</text>

  <!-- Transition arrow -->
  <rect x="325" y="458" width="195" height="24" rx="4" fill="rgba(239,68,68,0.08)" stroke="#ef4444" stroke-width="1"/>
  <text x="422" y="474" font-family="Arial, sans-serif" font-size="7" fill="#ef4444" text-anchor="middle">Белый P → Красный P (нагревание, 250–300°C)</text>

  <!-- === MATCH INFO (BOTTOM RIGHT) === -->
  <rect x="545" y="344" width="240" height="145" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
  <text x="665" y="362" font-family="Arial, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="bold">Спички — применение P</text>

  <!-- Match illustration -->
  <rect x="620" y="375" width="8" height="55" rx="2" fill="rgba(180,140,100,0.5)" stroke="#b48c64" stroke-width="1"/>
  <rect x="612" y="370" width="24" height="14" rx="3" fill="rgba(239,68,68,0.5)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="624" y="381" font-family="Arial, sans-serif" font-size="6" fill="#ffffff" text-anchor="middle">P</text>

  <text x="665" y="398" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">← красный P в головке</text>

  <!-- Strike surface -->
  <rect x="600" y="440" width="130" height="12" rx="2" fill="rgba(100,100,100,0.5)" stroke="#666" stroke-width="1"/>
  <text x="665" y="449" font-family="Arial, sans-serif" font-size="7" fill="#94a3b8" text-anchor="middle">тёрочная поверхность</text>

  <text x="665" y="470" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Трение → теплота → P воспламеняется</text>
  <text x="665" y="484" font-family="Arial, sans-serif" font-size="7" fill="#14b8a6" text-anchor="middle">Безопасные спички (с 1855 г.)</text>
</svg>