<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#2E7D32" text-anchor="middle">Витамины</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#777777" text-anchor="middle">Химия — Урок 8</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#2E7D32" stroke-width="2" opacity="0.25" />
  <defs>
    <clipPath id="ill">
      <rect x="15" y="80" width="470" height="225" rx="6" />
    </clipPath>
  </defs>
  <g clip-path="url(#ill)">
    <rect x="15" y="80" width="470" height="225" fill="#F1F8E9" rx="6" opacity="0.5" />
    <rect x="25" y="88" width="215" height="130" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="132" y="104" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Жирорастворимые</text>
    <text x="45" y="122" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="start" font-weight="bold">A</text>
    <text x="62" y="122" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">— зрение, кожа (ретинол)</text>
    <text x="45" y="138" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="start" font-weight="bold">D</text>
    <text x="62" y="138" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">— кальций, кости (кальциферол)</text>
    <text x="45" y="154" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="start" font-weight="bold">E</text>
    <text x="62" y="154" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">— антиоксидант (токоферол)</text>
    <text x="45" y="170" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="start" font-weight="bold">K</text>
    <text x="62" y="170" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="start" font-weight="normal">— свёртывание крови (филлохинон)</text>
    <text x="132" y="190" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">Накапливаются в жировой ткани</text>
    <text x="132" y="204" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="normal">Опасна передозировка!</text>
    <rect x="260" y="88" width="215" height="130" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="367" y="104" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Водорастворимые</text>
    <text x="278" y="122" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="start" font-weight="bold">B₁</text>
    <text x="298" y="122" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">— тиамин (энергетика)</text>
    <text x="278" y="138" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="start" font-weight="bold">B₂</text>
    <text x="298" y="138" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">— рибофлавин (метаболизм)</text>
    <text x="278" y="154" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="start" font-weight="bold">B₆</text>
    <text x="298" y="154" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">— пиридоксин (нервн. сис-ма)</text>
    <text x="278" y="170" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="start" font-weight="bold">B₁₂</text>
    <text x="302" y="170" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">— кобаламин (кроветвор.)</text>
    <text x="278" y="186" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="start" font-weight="bold">C</text>
    <text x="298" y="186" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">— аскорбиновая к-та (иммун.)</text>
    <text x="278" y="202" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="start" font-weight="bold">PP</text>
    <text x="298" y="202" font-family="Arial,sans-serif" font-size="9" fill="#333333" text-anchor="start" font-weight="normal">— ниацин (кожа, нервн. с-ма)</text>
    <text x="367" y="214" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">Не накапливаются, выводятся</text>
    <rect x="25" y="225" width="450" height="78" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="250" y="243" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Заболевания при недостатке витаминов</text>
    <text x="132" y="262" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">C → цинга (кровоточивость)</text>
    <text x="132" y="276" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">D → рахит (деформация костей)</text>
    <text x="367" y="262" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">A → куриная слепота</text>
    <text x="367" y="276" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">B₁ → бери-бери (нервн. с-ма)</text>
    <text x="250" y="296" font-family="Arial,sans-serif" font-size="9" fill="#777777" text-anchor="middle" font-weight="normal">Гиповитаминоз — недостаток, Гипервитаминоз — избыток</text>
  </g>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#777777" text-anchor="middle">Химия · 11 класс</text>
</svg>