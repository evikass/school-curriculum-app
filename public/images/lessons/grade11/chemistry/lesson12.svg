<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="52" fill="url(#header)" rx="0"/>
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="bold">Урок 12: Ионная связь. Металлическая связь</text>
  <!-- Section 1: Ionic Bond - Electron Transfer -->
  <rect x="20" y="64" width="370" height="155" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#ef4444" stroke-width="1"/>
  <text x="205" y="86" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">Ионная связь — перенос электронов</text>
  <!-- Na atom -->
  <circle cx="80" cy="135" r="28" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="80" y="131" text-anchor="middle" fill="#f59e0b" font-size="16" font-weight="bold">Na</text>
  <text x="80" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">(2,8,1)</text>
  <!-- Electron leaving Na -->
  <circle cx="116" cy="125" r="5" fill="#f59e0b" filter="url(#glowSm)"/>
  <text x="150" y="130" text-anchor="middle" fill="#94a3b8" font-size="16">→</text>
  <!-- Cl atom -->
  <circle cx="210" cy="135" r="30" fill="none" stroke="#14b8a6" stroke-width="2"/>
  <text x="210" y="131" text-anchor="middle" fill="#14b8a6" font-size="16" font-weight="bold">Cl</text>
  <text x="210" y="148" text-anchor="middle" fill="#94a3b8" font-size="10">(2,8,7)</text>
  <!-- Arrow -->
  <text x="145" y="160" text-anchor="middle" fill="#ef4444" font-size="12">e⁻ перенос</text>
  <!-- Result -->
  <text x="145" y="185" text-anchor="middle" fill="#94a3b8" font-size="13">↓</text>
  <!-- Na+ ion -->
  <circle cx="80" cy="203" r="24" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
  <text x="80" y="200" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="bold">Na⁺</text>
  <text x="80" y="215" text-anchor="middle" fill="#94a3b8" font-size="9">(2,8)</text>
  <!-- Cl- ion -->
  <circle cx="210" cy="203" r="28" fill="#14b8a6" fill-opacity="0.2" stroke="#14b8a6" stroke-width="2"/>
  <text x="210" y="200" text-anchor="middle" fill="#14b8a6" font-size="15" font-weight="bold">Cl⁻</text>
  <text x="210" y="215" text-anchor="middle" fill="#94a3b8" font-size="9">(2,8,8)</text>
  <!-- Electrostatic attraction -->
  <line x1="104" y1="203" x2="182" y2="203" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Section 2: NaCl Crystal Lattice -->
  <rect x="410" y="64" width="370" height="155" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="595" y="86" text-anchor="middle" fill="#14b8a6" font-size="14" font-weight="bold">Кристаллическая решётка NaCl</text>
  <!-- Simple grid of alternating Na+ and Cl- -->
  <!-- Row 1 -->
  <circle cx="460" cy="115" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="460" y="119" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <circle cx="500" cy="115" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="500" y="119" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <circle cx="540" cy="115" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="540" y="119" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <circle cx="580" cy="115" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="580" y="119" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <circle cx="620" cy="115" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="620" y="119" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <circle cx="660" cy="115" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="660" y="119" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <circle cx="700" cy="115" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="700" y="119" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <!-- Row 2 (offset) -->
  <circle cx="460" cy="155" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="460" y="159" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <circle cx="500" cy="155" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="500" y="159" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <circle cx="540" cy="155" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="540" y="159" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <circle cx="580" cy="155" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="580" y="159" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <circle cx="620" cy="155" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="620" y="159" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <circle cx="660" cy="155" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="660" y="159" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <circle cx="700" cy="155" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="700" y="159" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <!-- Row 3 -->
  <circle cx="460" cy="195" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="460" y="199" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <circle cx="500" cy="195" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="500" y="199" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <circle cx="540" cy="195" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="540" y="199" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <circle cx="580" cy="195" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="580" y="199" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <circle cx="620" cy="195" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="620" y="199" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <circle cx="660" cy="195" r="14" fill="#14b8a6" fill-opacity="0.3" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="660" y="199" text-anchor="middle" fill="#14b8a6" font-size="9">−</text>
  <circle cx="700" cy="195" r="12" fill="#f59e0b" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="700" y="199" text-anchor="middle" fill="#f59e0b" font-size="9">+</text>
  <!-- Legend -->
  <circle cx="430" cy="200" r="6" fill="#f59e0b" fill-opacity="0.5"/>
  <circle cx="430" cy="212" r="7" fill="#14b8a6" fill-opacity="0.5"/>
  <text x="430" y="204" text-anchor="middle" fill="#0f172a" font-size="7" font-weight="bold">+</text>
  <text x="430" y="216" text-anchor="middle" fill="#0f172a" font-size="7" font-weight="bold">−</text>
  <!-- Section 3: Ionic bond properties -->
  <rect x="20" y="228" width="370" height="110" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <text x="205" y="250" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">Свойства ионных соединений</text>
  <text x="40" y="272" fill="#ffffff" font-size="12">• Высокая температура плавления</text>
  <text x="40" y="290" fill="#ffffff" font-size="12">• Растворимы в воде</text>
  <text x="40" y="308" fill="#ffffff" font-size="12">• Проводят ток в расплаве/растворе</text>
  <text x="40" y="326" fill="#ffffff" font-size="12">• Хрупкие кристаллы</text>
  <!-- Section 4: Metallic Bond -->
  <rect x="410" y="228" width="370" height="110" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <text x="595" y="250" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">Металлическая связь — «электронный газ»</text>
  <!-- Metal lattice: positive ions in electron sea -->
  <rect x="430" y="262" width="230" height="68" rx="5" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-width="0.5"/>
  <!-- Electron sea dots -->
  <circle cx="450" cy="280" r="2" fill="#14b8a6" opacity="0.6"/>
  <circle cx="490" cy="300" r="2" fill="#14b8a6" opacity="0.6"/>
  <circle cx="530" cy="275" r="2" fill="#14b8a6" opacity="0.6"/>
  <circle cx="570" cy="295" r="2" fill="#14b8a6" opacity="0.6"/>
  <circle cx="610" cy="278" r="2" fill="#14b8a6" opacity="0.6"/>
  <circle cx="640" cy="310" r="2" fill="#14b8a6" opacity="0.6"/>
  <circle cx="470" cy="310" r="2" fill="#14b8a6" opacity="0.6"/>
  <circle cx="550" cy="318" r="2" fill="#14b8a6" opacity="0.6"/>
  <circle cx="590" cy="270" r="2" fill="#14b8a6" opacity="0.6"/>
  <circle cx="500" cy="270" r="2" fill="#14b8a6" opacity="0.6"/>
  <!-- Positive ions -->
  <circle cx="460" cy="290" r="10" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="460" y="294" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold">+</text>
  <circle cx="510" cy="310" r="10" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="510" y="314" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold">+</text>
  <circle cx="560" cy="285" r="10" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="560" y="289" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold">+</text>
  <circle cx="610" cy="308" r="10" fill="#f59e0b" fill-opacity="0.4" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="610" y="312" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="bold">+</text>
  <!-- Label -->
  <text x="700" y="290" fill="#f59e0b" font-size="10">Me⁺</text>
  <text x="700" y="305" fill="#14b8a6" font-size="10">e⁻ газ</text>
  <!-- Section 5: Metal properties -->
  <rect x="410" y="346" width="370" height="70" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <text x="595" y="366" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">Свойства металлов</text>
  <text x="430" y="386" fill="#ffffff" font-size="11">• Ковкие и пластичные</text>
  <text x="430" y="402" fill="#ffffff" font-size="11">• Проводят тепло и электричество</text>
  <text x="600" y="386" fill="#ffffff" font-size="11">• Металлический блеск</text>
  <text x="600" y="402" fill="#ffffff" font-size="11">• Непрозрачны</text>
  <!-- Section 6: Comparison Table -->
  <rect x="20" y="346" width="370" height="144" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#8b5cf6" stroke-width="1"/>
  <text x="205" y="368" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">Сравнение типов связи</text>
  <!-- Table header -->
  <text x="100" y="390" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">Свойство</text>
  <text x="210" y="390" text-anchor="middle" fill="#10b981" font-size="11" font-weight="bold">Ковалентная</text>
  <text x="320" y="390" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="bold">Ионная</text>
  <text x="380" y="390" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="bold">Металл.</text>
  <line x1="30" y1="396" x2="385" y2="396" stroke="#94a3b8" stroke-width="0.5"/>
  <text x="40" y="412" fill="#94a3b8" font-size="10">Механизм</text>
  <text x="210" y="412" text-anchor="middle" fill="#ffffff" font-size="10">Обмен e⁻</text>
  <text x="320" y="412" text-anchor="middle" fill="#ffffff" font-size="10">Перенос e⁻</text>
  <text x="380" y="412" text-anchor="middle" fill="#ffffff" font-size="10">Общий e⁻</text>
  <text x="40" y="429" fill="#94a3b8" font-size="10">T плавл.</text>
  <text x="210" y="429" text-anchor="middle" fill="#ffffff" font-size="10">Разная</text>
  <text x="320" y="429" text-anchor="middle" fill="#ffffff" font-size="10">Высокая</text>
  <text x="380" y="429" text-anchor="middle" fill="#ffffff" font-size="10">Разная</text>
  <text x="40" y="446" fill="#94a3b8" font-size="10">Электропр.</text>
  <text x="210" y="446" text-anchor="middle" fill="#ffffff" font-size="10">Нет*</text>
  <text x="320" y="446" text-anchor="middle" fill="#ffffff" font-size="10">Расплав</text>
  <text x="380" y="446" text-anchor="middle" fill="#ffffff" font-size="10">Да</text>
  <text x="40" y="463" fill="#94a3b8" font-size="10">Примеры</text>
  <text x="210" y="463" text-anchor="middle" fill="#ffffff" font-size="10">H₂O, CO₂</text>
  <text x="320" y="463" text-anchor="middle" fill="#ffffff" font-size="10">NaCl, KBr</text>
  <text x="380" y="463" text-anchor="middle" fill="#ffffff" font-size="10">Fe, Cu</text>
  <text x="40" y="482" fill="#94a3b8" font-size="9">* кроме ковалентных сетчатых</text>
  <!-- Metal properties label overlap fix -->
  <text x="700" y="366" fill="#14b8a6" font-size="10">электронный</text>
  <text x="700" y="380" fill="#14b8a6" font-size="10">газ</text>
</svg>