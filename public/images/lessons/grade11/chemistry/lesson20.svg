<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="soapGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="eGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#43A047"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <!-- Title bar -->
  <rect width="500" height="44" fill="#1B5E20" rx="8"/>
  <rect y="20" width="500" height="24" fill="#1B5E20"/>
  <text x="250" y="29" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="16" font-weight="bold">Химия и повседневная жизнь</text>

  <!-- Soap & detergent card -->
  <rect x="15" y="55" width="225" height="90" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="127" y="73" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">🧼 Моющие средства</text>
  <!-- Micelle diagram -->
  <circle cx="70" cy="103" r="14" fill="url(#soapGrad)" stroke="#1565C0" stroke-width="1"/>
  <!-- Hydrophobic tails -->
  <line x1="56" y1="103" x2="42" y2="95" stroke="#E65100" stroke-width="1.5"/>
  <line x1="56" y1="106" x2="40" y2="108" stroke="#E65100" stroke-width="1.5"/>
  <line x1="58" y1="112" x2="45" y2="118" stroke="#E65100" stroke-width="1.5"/>
  <!-- Hydrophilic heads -->
  <circle cx="42" cy="95" r="3" fill="#1565C0"/>
  <circle cx="40" cy="108" r="3" fill="#1565C0"/>
  <circle cx="45" cy="118" r="3" fill="#1565C0"/>
  <text x="90" y="90" fill="#555" font-family="Arial,sans-serif" font-size="7">Мицелла: жир внутри</text>
  <text x="90" y="102" fill="#E65100" font-family="Arial,sans-serif" font-size="7">Хвост (C₁₇H₃₅—) → жир</text>
  <text x="90" y="114" fill="#1565C0" font-family="Arial,sans-serif" font-size="7">Головка (—COO⁻) → вода</text>
  <text x="25" y="130" fill="#2E7D32" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Мыло: C₁₇H₃₅COONa | СМС: R—SO₃Na (без осадка в жёсткой воде)</text>
  <text x="25" y="141" fill="#555" font-family="Arial,sans-serif" font-size="7">Омыление: жир + NaOH → мыло + глицерин</text>

  <!-- Food additives E-number card -->
  <rect x="250" y="55" width="235" height="90" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="367" y="73" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">🏷 Пищевые добавки (Е-номера)</text>
  <rect x="260" y="80" width="65" height="16" rx="4" fill="#E53935"/>
  <text x="292" y="92" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">E100-199</text>
  <text x="335" y="92" fill="#555" font-family="Arial,sans-serif" font-size="7">Красители</text>

  <rect x="260" y="100" width="65" height="16" rx="4" fill="#E65100"/>
  <text x="292" y="112" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">E200-299</text>
  <text x="335" y="112" fill="#555" font-family="Arial,sans-serif" font-size="7">Консерванты</text>

  <rect x="260" y="120" width="65" height="16" rx="4" fill="#2E7D32"/>
  <text x="292" y="132" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">E300-399</text>
  <text x="335" y="132" fill="#555" font-family="Arial,sans-serif" font-size="7">Антиоксиданты (E300=вит.C)</text>

  <rect x="395" y="80" width="85" height="16" rx="4" fill="#1565C0"/>
  <text x="437" y="92" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">E400-499</text>
  <text x="395" y="104" fill="#555" font-family="Arial,sans-serif" font-size="7">Стабилизаторы, загустители</text>

  <rect x="395" y="110" width="85" height="16" rx="4" fill="#6A1B9A"/>
  <text x="437" y="122" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">E600-699</text>
  <text x="395" y="134" fill="#555" font-family="Arial,sans-serif" font-size="7">Усилители вкуса (E621=глутамат)</text>

  <!-- Cosmetics card -->
  <rect x="15" y="155" width="155" height="75" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="92" y="173" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="9" font-weight="bold">💄 Косметика</text>
  <text x="25" y="189" fill="#555" font-family="Arial,sans-serif" font-size="7">Кремы — эмульсии (масло/вода)</text>
  <text x="25" y="201" fill="#555" font-family="Arial,sans-serif" font-size="7">Дезодоранты — AlCl₃ (антиперсп.)</text>
  <text x="25" y="213" fill="#555" font-family="Arial,sans-serif" font-size="7">УФ-фильтры: ZnO, TiO₂</text>
  <text x="25" y="225" fill="#555" font-family="Arial,sans-serif" font-size="7">Лаки: нитроцеллюлоза + раствор.</text>

  <!-- Fertilizers card -->
  <rect x="180" y="155" width="155" height="75" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="257" y="173" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="9" font-weight="bold">🌾 Удобрения (NPK)</text>
  <text x="190" y="189" fill="#1565C0" font-family="Arial,sans-serif" font-size="7" font-weight="bold">N: NH₄NO₃, CO(NH₂)₂</text>
  <text x="190" y="201" fill="#E65100" font-family="Arial,sans-serif" font-size="7" font-weight="bold">P: Ca(H₂PO₄)₂</text>
  <text x="190" y="213" fill="#2E7D32" font-family="Arial,sans-serif" font-size="7" font-weight="bold">K: KCl, K₂SO₄</text>
  <text x="190" y="225" fill="#555" font-family="Arial,sans-serif" font-size="7">Комплексные: нитроаммофоска</text>

  <!-- Safety symbols card -->
  <rect x="345" y="155" width="140" height="75" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="415" y="173" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="9" font-weight="bold">⚠ Символы опасности</text>
  <!-- Toxic -->
  <polygon points="395,198 385,213 405,213" fill="none" stroke="#E53935" stroke-width="2"/>
  <text x="395" y="210" text-anchor="middle" fill="#E53935" font-family="Arial,sans-serif" font-size="7" font-weight="bold">!</text>
  <text x="395" y="223" fill="#E53935" font-family="Arial,sans-serif" font-size="6">Токсично</text>
  <!-- Corrosive -->
  <rect x="420" y="188" width="16" height="20" rx="2" fill="none" stroke="#FF8F00" stroke-width="2"/>
  <text x="428" y="202" text-anchor="middle" fill="#FF8F00" font-family="Arial,sans-serif" font-size="10" font-weight="bold">C</text>
  <text x="428" y="223" fill="#FF8F00" font-family="Arial,sans-serif" font-size="6">Едкое</text>
  <!-- Flammable -->
  <path d="M453,210 Q448,200 453,195 Q458,200 453,210" fill="#E65100"/>
  <text x="453" y="223" text-anchor="middle" fill="#E65100" font-family="Arial,sans-serif" font-size="6">Огнео-</text>

  <!-- Safety rules section -->
  <rect x="15" y="240" width="470" height="100" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="258" text-anchor="middle" fill="#1B5E20" font-family="Arial,sans-serif" font-size="10" font-weight="bold">Безопасность бытовой химии</text>

  <!-- Danger reaction -->
  <rect x="25" y="266" width="210" height="30" rx="6" fill="#FFEBEE" stroke="#E53935" stroke-width="1"/>
  <text x="30" y="278" fill="#E53935" font-family="Arial,sans-serif" font-size="8" font-weight="bold">🚫 NaClO + HCl → Cl₂↑ + H₂O</text>
  <text x="30" y="291" fill="#E53935" font-family="Arial,sans-serif" font-size="7">Смешивание = ядовитый хлор!</text>

  <!-- Safety pills -->
  <rect x="25" y="302" width="100" height="22" rx="11" fill="url(#eGreen)" filter="url(#shadow1)"/>
  <text x="75" y="317" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Перчатки 🧤</text>

  <rect x="133" y="302" width="100" height="22" rx="11" fill="#388E3C" filter="url(#shadow1)"/>
  <text x="183" y="317" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Вентиляция 💨</text>

  <rect x="241" y="302" width="100" height="22" rx="11" fill="#43A047" filter="url(#shadow1)"/>
  <text x="291" y="317" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Читать этикетку</text>

  <rect x="349" y="302" width="125" height="22" rx="11" fill="#4CAF50" filter="url(#shadow1)"/>
  <text x="411" y="317" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="7" font-weight="bold">Не смешивать средства</text>

  <text x="250" y="337" text-anchor="middle" fill="#2E7D32" font-family="Arial,sans-serif" font-size="8">E300 = витамин C • E440 = пектин — не все Е-добавки вредны!</text>
</svg>