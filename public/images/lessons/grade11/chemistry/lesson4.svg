<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header -->
  <rect x="0" y="0" width="800" height="48" fill="url(#headerGrad)"/>
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Урок 4: Электронные конфигурации атомов</text>
  <!-- Filling order diagram -->
  <rect x="20" y="58" width="400" height="200" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="220" y="78" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Порядок заполнения (правило Клечковского)</text>
  <!-- Energy level boxes arranged diagonally -->
  <text x="50" y="100" fill="#14b8a6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">1s</text>
  <text x="110" y="115" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2s</text>
  <text x="170" y="130" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">2p</text>
  <text x="230" y="145" fill="#14b8a6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3s</text>
  <text x="290" y="160" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3p</text>
  <text x="350" y="175" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">4s</text>
  <text x="110" y="160" fill="#f59e0b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3d</text>
  <text x="230" y="190" fill="#f59e0b" font-family="Arial, sans-serif" font-size="12" font-weight="bold">4p</text>
  <text x="50" y="190" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">4d</text>
  <text x="170" y="220" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5s</text>
  <text x="290" y="220" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">5p</text>
  <!-- Arrow showing filling order -->
  <path d="M65 98 L125 113 L185 128 L245 143 L305 158 L365 173" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- Filling sequence text -->
  <text x="220" y="245" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">1s→2s→2p→3s→3p→4s→3d→4p→5s→4d→5p...</text>
  <!-- Principles section -->
  <rect x="440" y="58" width="340" height="200" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="610" y="78" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Принципы заполнения</text>
  <!-- Aufbau -->
  <rect x="455" y="90" width="310" height="40" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#14b8a6" stroke-width="1"/>
  <text x="470" y="110" fill="#14b8a6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Принцип наименьшей энергии</text>
  <text x="470" y="124" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Электроны заполняют от низших к высшим</text>
  <!-- Pauli -->
  <rect x="455" y="138" width="310" height="40" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#8b5cf6" stroke-width="1"/>
  <text x="470" y="158" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Принцип Паули</text>
  <text x="470" y="172" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">На одной орбитали — не более 2e⁻ (↑↓)</text>
  <!-- Hund -->
  <rect x="455" y="186" width="310" height="40" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#f59e0b" stroke-width="1"/>
  <text x="470" y="206" fill="#f59e0b" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Правило Гунда</text>
  <text x="470" y="220" fill="#94a3b8" font-family="Arial, sans-serif" font-size="9">Сначала по одному ↑, потом парами ↑↓</text>
  <!-- Example configurations -->
  <rect x="20" y="268" width="500" height="140" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="270" y="288" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Примеры электронных конфигураций</text>
  <!-- H -->
  <text x="40" y="310" fill="#14b8a6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">H:</text>
  <text x="65" y="310" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">1s¹</text>
  <!-- C -->
  <text x="40" y="330" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">C:</text>
  <text x="65" y="330" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">1s² 2s² 2p²</text>
  <text x="195" y="330" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">← валент.</text>
  <!-- Fe -->
  <text x="40" y="350" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Fe:</text>
  <text x="70" y="350" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">1s² 2s² 2p⁶ 3s² 3p⁶ 4s² 3d⁶</text>
  <text x="40" y="367" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">= [Ar] 4s² 3d⁶</text>
  <text x="200" y="367" fill="#f59e0b" font-family="Arial, sans-serif" font-size="10">← валент.</text>
  <!-- Kr -->
  <text x="280" y="310" fill="#a855f7" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Kr:</text>
  <text x="310" y="310" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">[Ar] 4s² 3d¹⁰ 4p⁶</text>
  <!-- Orbital diagram for C -->
  <text x="280" y="335" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Орбитальная диаграмма C:</text>
  <text x="280" y="352" fill="#14b8a6" font-family="Arial, sans-serif" font-size="10">1s:</text>
  <rect x="305" y="342" width="16" height="14" rx="2" fill="none" stroke="#14b8a6" stroke-width="1"/>
  <text x="309" y="353" fill="#14b8a6" font-size="9">↑↓</text>
  <text x="340" y="352" fill="#10b981" font-family="Arial, sans-serif" font-size="10">2s:</text>
  <rect x="365" y="342" width="16" height="14" rx="2" fill="none" stroke="#10b981" stroke-width="1"/>
  <text x="369" y="353" fill="#10b981" font-size="9">↑↓</text>
  <text x="400" y="352" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="10">2p:</text>
  <rect x="425" y="342" width="16" height="14" rx="2" fill="none" stroke="#8b5cf6" stroke-width="1"/>
  <text x="429" y="353" fill="#8b5cf6" font-size="9">↑</text>
  <rect x="445" y="342" width="16" height="14" rx="2" fill="none" stroke="#8b5cf6" stroke-width="1"/>
  <text x="449" y="353" fill="#8b5cf6" font-size="9">↑</text>
  <rect x="465" y="342" width="16" height="14" rx="2" fill="none" stroke="#8b5cf6" stroke-width="1"/>
  <!-- Valence highlight -->
  <rect x="395" y="338" width="93" height="22" rx="3" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="440" y="380" text-anchor="middle" fill="#f59e0b" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Валентные электроны</text>
  <!-- Exceptions section -->
  <rect x="540" y="268" width="240" height="140" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="288" text-anchor="middle" fill="#ef4444" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Исключения</text>
  <!-- Cr -->
  <rect x="555" y="298" width="210" height="45" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#ef4444" stroke-width="1"/>
  <text x="570" y="316" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Cr (Z=24)</text>
  <text x="570" y="334" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">[Ar] 4s¹ 3d⁵</text>
  <text x="570" y="340" fill="#ef4444" font-family="Arial, sans-serif" font-size="8">← не 4s²3d⁴!</text>
  <!-- Cu -->
  <rect x="555" y="350" width="210" height="45" rx="6" fill="#0f172a" fill-opacity="0.8" stroke="#ef4444" stroke-width="1"/>
  <text x="570" y="368" fill="#ef4444" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Cu (Z=29)</text>
  <text x="570" y="386" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">[Ar] 4s¹ 3d¹⁰</text>
  <text x="570" y="392" fill="#ef4444" font-family="Arial, sans-serif" font-size="8">← не 4s²3d⁹!</text>
  <!-- Note -->
  <rect x="20" y="418" width="760" height="72" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="400" y="438" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Ключевые понятия</text>
  <text x="40" y="458" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">• Валентные электроны — электроны на внешнем уровне, участвующие в химических связях</text>
  <text x="40" y="476" fill="#ffffff" font-family="Arial, sans-serif" font-size="11">• Полузаполненные (d⁵) и полностью заполненные (d¹⁰) подуровни особенно устойчивы</text>
</svg>