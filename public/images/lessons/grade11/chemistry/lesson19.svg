<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="48" fill="url(#headerGrad)"/>
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold" filter="url(#glow)">Урок 19: Катализ и катализаторы</text>
  <text x="400" y="68" text-anchor="middle" fill="#94a3b8" font-size="12">Тема 4: Химические реакции</text>

  <!-- Definition -->
  <rect x="20" y="78" width="760" height="40" rx="8" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="400" y="103" text-anchor="middle" fill="#14b8a6" font-size="14" font-weight="bold">Катализатор — ускоряет реакцию, не расходуется, не входит в продукты</text>

  <!-- Activation energy diagram WITH vs WITHOUT catalyst -->
  <rect x="20" y="126" width="760" height="175" rx="8" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <text x="400" y="148" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">Энергия активации: С катализатором vs Без катализатора</text>

  <!-- Energy axis -->
  <line x1="60" y1="165" x2="60" y2="285" stroke="#94a3b8" stroke-width="1"/>
  <text x="55" y="160" text-anchor="middle" fill="#94a3b8" font-size="10">E</text>
  <!-- Reaction progress axis -->
  <line x1="60" y1="285" x2="740" y2="285" stroke="#94a3b8" stroke-width="1"/>
  <text x="740" y="298" text-anchor="middle" fill="#94a3b8" font-size="10">Ход реакции</text>

  <!-- Reactant level -->
  <line x1="80" y1="265" x2="180" y2="265" stroke="#14b8a6" stroke-width="3"/>
  <text x="130" y="280" text-anchor="middle" fill="#14b8a6" font-size="10">Реагенты</text>

  <!-- WITHOUT catalyst — high peak (red) -->
  <path d="M170,265 C210,265 280,170 400,170 C520,170 560,250 620,265" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-dasharray="8,4"/>
  <!-- WITH catalyst — lower peak (teal) -->
  <path d="M170,265 C210,265 280,210 400,210 C520,210 560,250 620,265" fill="none" stroke="#14b8a6" stroke-width="3" filter="url(#glow)"/>

  <!-- Product level -->
  <line x1="600" y1="265" x2="720" y2="265" stroke="#059669" stroke-width="3"/>
  <text x="660" y="280" text-anchor="middle" fill="#059669" font-size="10">Продукты</text>

  <!-- Ea WITHOUT -->
  <line x1="130" y1="262" x2="130" y2="175" stroke="#ef4444" stroke-width="2"/>
  <polygon points="126,178 130,168 134,178" fill="#ef4444"/>
  <text x="100" y="220" fill="#ef4444" font-size="11" font-weight="bold">Ea₁</text>

  <!-- Ea WITH -->
  <line x1="150" y1="262" x2="150" y2="215" stroke="#14b8a6" stroke-width="2"/>
  <polygon points="146,218 150,208 154,218" fill="#14b8a6"/>
  <text x="165" y="240" fill="#14b8a6" font-size="11" font-weight="bold">Ea₂</text>

  <!-- Labels for curves -->
  <text x="420" y="166" fill="#ef4444" font-size="11" font-weight="bold">Без катализатора (Ea₁)</text>
  <text x="420" y="206" fill="#14b8a6" font-size="11" font-weight="bold">С катализатором (Ea₂ &lt; Ea₁)</text>

  <!-- ΔEa arrow -->
  <line x1="140" y1="178" x2="140" y2="212" stroke="#f59e0b" stroke-width="2"/>
  <text x="160" y="198" fill="#f59e0b" font-size="10" font-weight="bold">ΔEa</text>

  <!-- Same products note -->
  <text x="400" y="296" text-anchor="middle" fill="#94a3b8" font-size="10">Продукты те же, но путь реакции через катализатор требует меньше энергии</text>

  <!-- Types of catalysts -->
  <text x="40" y="320" fill="#10b981" font-size="13" font-weight="bold">Типы катализа:</text>

  <rect x="20" y="328" width="240" height="52" rx="8" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1"/>
  <text x="140" y="350" text-anchor="middle" fill="#14b8a6" font-size="12" font-weight="bold">Гомогенный</text>
  <text x="140" y="368" text-anchor="middle" fill="#94a3b8" font-size="10">Одна фаза (газ + газ)</text>

  <rect x="270" y="328" width="250" height="52" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1"/>
  <text x="395" y="350" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="bold">Гетерогенный</text>
  <text x="395" y="368" text-anchor="middle" fill="#94a3b8" font-size="10">Разные фазы (твёрдый + газ)</text>

  <!-- Enzymes -->
  <rect x="530" y="328" width="250" height="52" rx="8" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="655" y="346" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="bold">Ферменты 🧬</text>
  <text x="655" y="362" text-anchor="middle" fill="#94a3b8" font-size="9">Биологические катализаторы</text>
  <text x="655" y="374" text-anchor="middle" fill="#94a3b8" font-size="9">Высокоспецифичные, оптим. T и pH</text>

  <!-- Inhibitors -->
  <rect x="20" y="390" width="180" height="44" rx="8" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="110" y="410" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">Ингибиторы</text>
  <text x="110" y="426" text-anchor="middle" fill="#94a3b8" font-size="10">Замедляют реакцию</text>

  <!-- Catalytic poisoning -->
  <rect x="210" y="390" width="200" height="44" rx="8" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
  <text x="310" y="410" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">Отравление катализатора</text>
  <text x="310" y="426" text-anchor="middle" fill="#94a3b8" font-size="10">Кат. яд → теряет активность</text>

  <!-- Industrial importance -->
  <rect x="420" y="390" width="360" height="44" rx="8" fill="#1e293b" fill-opacity="0.8" stroke="#10b981" stroke-width="1.5"/>
  <text x="600" y="408" text-anchor="middle" fill="#10b981" font-size="12" font-weight="bold">Промышленное значение:</text>
  <text x="540" y="426" text-anchor="middle" fill="#ffffff" font-size="11">Процесс Хабера: Fe</text>
  <text x="700" y="426" text-anchor="middle" fill="#ffffff" font-size="11">Контактный: V₂O₅</text>

  <!-- Bottom line -->
  <line x1="20" y1="450" x2="780" y2="450" stroke="#14b8a6" stroke-width="1" opacity="0.3"/>
  <text x="400" y="470" text-anchor="middle" fill="#94a3b8" font-size="11">Катализатор даёт альтернативный путь с меньшей энергией активации</text>
  <text x="400" y="488" text-anchor="middle" fill="#94a3b8" font-size="10">N₂ + 3H₂ → 2NH₃ (Fe катализатор, 450°C, 200 атм — процесс Хабера)</text>
</svg>