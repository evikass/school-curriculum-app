<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="48" fill="url(#headerGrad)" rx="0"/>
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold" filter="url(#glow)">Урок 16: Классификация химических реакций</text>
  <!-- Subtitle -->
  <text x="400" y="72" text-anchor="middle" fill="#94a3b8" font-size="13">Тема 4: Химические реакции</text>

  <!-- Row 1: By substance composition — 4 cards -->
  <text x="40" y="100" fill="#14b8a6" font-size="13" font-weight="bold">По числу и составу веществ:</text>
  <!-- Combination -->
  <rect x="20" y="108" width="180" height="68" rx="8" fill="#14b8a6" fill-opacity="0.12" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="110" y="128" text-anchor="middle" fill="#14b8a6" font-size="12" font-weight="bold">Соединение</text>
  <text x="110" y="148" text-anchor="middle" fill="#ffffff" font-size="14">A + B → AB</text>
  <text x="110" y="166" text-anchor="middle" fill="#94a3b8" font-size="10">2Na + Cl₂ → 2NaCl</text>
  <!-- Decomposition -->
  <rect x="210" y="108" width="180" height="68" rx="8" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="300" y="128" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">Разложение</text>
  <text x="300" y="148" text-anchor="middle" fill="#ffffff" font-size="14">AB → A + B</text>
  <text x="300" y="166" text-anchor="middle" fill="#94a3b8" font-size="10">2H₂O → 2H₂ + O₂</text>
  <!-- Displacement -->
  <rect x="400" y="108" width="180" height="68" rx="8" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="490" y="128" text-anchor="middle" fill="#8b5cf6" font-size="12" font-weight="bold">Замещение</text>
  <text x="490" y="148" text-anchor="middle" fill="#ffffff" font-size="14">A + BC → AC + B</text>
  <text x="490" y="166" text-anchor="middle" fill="#94a3b8" font-size="10">Zn + 2HCl → ZnCl₂+H₂</text>
  <!-- Exchange -->
  <rect x="590" y="108" width="190" height="68" rx="8" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1.5"/>
  <text x="685" y="128" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">Обмен</text>
  <text x="685" y="148" text-anchor="middle" fill="#ffffff" font-size="13">AB+CD → AD+CB</text>
  <text x="685" y="166" text-anchor="middle" fill="#94a3b8" font-size="10">NaOH+HCl→NaCl+H₂O</text>

  <!-- Row 2: By heat -->
  <text x="40" y="204" fill="#10b981" font-size="13" font-weight="bold">По тепловому эффекту:</text>
  <rect x="20" y="212" width="370" height="52" rx="8" fill="#14b8a6" fill-opacity="0.1" stroke="#14b8a6" stroke-width="1"/>
  <text x="205" y="234" text-anchor="middle" fill="#14b8a6" font-size="13" font-weight="bold">Экзотермические ↑Q</text>
  <text x="205" y="254" text-anchor="middle" fill="#94a3b8" font-size="11">Выделяют тепло: горение, нейтрализация</text>
  <rect x="400" y="212" width="380" height="52" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1"/>
  <text x="590" y="234" text-anchor="middle" fill="#8b5cf6" font-size="13" font-weight="bold">Эндотермические ↓Q</text>
  <text x="590" y="254" text-anchor="middle" fill="#94a3b8" font-size="11">Поглощают тепло: разложение, фотосинтез</text>

  <!-- Row 3: By reversibility -->
  <text x="40" y="292" fill="#10b981" font-size="13" font-weight="bold">По обратимости:</text>
  <rect x="20" y="300" width="370" height="52" rx="8" fill="#059669" fill-opacity="0.1" stroke="#059669" stroke-width="1"/>
  <text x="205" y="322" text-anchor="middle" fill="#14b8a6" font-size="13" font-weight="bold">Обратимые ⇌</text>
  <text x="205" y="342" text-anchor="middle" fill="#94a3b8" font-size="11">N₂ + 3H₂ ⇌ 2NH₃ — идут в обоих направлениях</text>
  <rect x="400" y="300" width="380" height="52" rx="8" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="1"/>
  <text x="590" y="322" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold">Необратимые →</text>
  <text x="590" y="342" text-anchor="middle" fill="#94a3b8" font-size="11">C + O₂ → CO₂ — до конца, нельзя вернуть</text>

  <!-- Row 4: By phase and redox -->
  <text x="40" y="380" fill="#10b981" font-size="13" font-weight="bold">По фазовому составу:</text>
  <rect x="20" y="388" width="370" height="50" rx="8" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="1"/>
  <text x="115" y="410" text-anchor="middle" fill="#14b8a6" font-size="12" font-weight="bold">Гомогенные</text>
  <text x="115" y="428" text-anchor="middle" fill="#94a3b8" font-size="10">Одна фаза (газ+газ)</text>
  <text x="280" y="410" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold">Гетерогенные</text>
  <text x="280" y="428" text-anchor="middle" fill="#94a3b8" font-size="10">Разные фазы (тв+жидк)</text>

  <text x="410" y="380" fill="#10b981" font-size="13" font-weight="bold">По окислительно-восстановительным:</text>
  <rect x="400" y="388" width="380" height="50" rx="8" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="1"/>
  <text x="500" y="410" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">Окислительно-восстанов.</text>
  <text x="500" y="428" text-anchor="middle" fill="#94a3b8" font-size="10">Меняется степень окисления</text>
  <text x="690" y="410" text-anchor="middle" fill="#14b8a6" font-size="12" font-weight="bold">Не окисл.-восст.</text>
  <text x="690" y="428" text-anchor="middle" fill="#94a3b8" font-size="10">Степени окисления не меняются</text>

  <!-- Decorative bottom line -->
  <line x1="20" y1="460" x2="780" y2="460" stroke="#14b8a6" stroke-width="1" opacity="0.3"/>
  <text x="400" y="480" text-anchor="middle" fill="#94a3b8" font-size="11">Все реакции классифицируются по нескольким критериям одновременно</text>
  <!-- Corner accents -->
  <circle cx="20" cy="490" r="3" fill="#14b8a6" opacity="0.5"/>
  <circle cx="780" cy="490" r="3" fill="#14b8a6" opacity="0.5"/>
</svg>