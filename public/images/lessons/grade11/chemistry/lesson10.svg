<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="52" fill="url(#header)" rx="0"/>
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">Урок 10: Химическая связь. Ковалентная связь</text>
  <!-- Section 1: Covalent Bond Formation -->
  <rect x="20" y="64" width="370" height="140" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="205" y="86" text-anchor="middle" fill="#14b8a6" font-size="14" font-weight="bold">Образование ковалентной связи</text>
  <!-- H atoms with electrons -->
  <circle cx="80" cy="130" r="22" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="80" y="136" text-anchor="middle" fill="#f59e0b" font-size="18" font-weight="bold">H</text>
  <circle cx="108" cy="130" r="5" fill="#14b8a6" filter="url(#glowSm)"/>
  <text x="135" y="136" text-anchor="middle" fill="#94a3b8" font-size="22">+</text>
  <circle cx="5" cy="5" r="5" fill="#14b8a6" filter="url(#glowSm)"/>
  <circle cx="180" cy="130" r="22" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="180" y="136" text-anchor="middle" fill="#f59e0b" font-size="18" font-weight="bold">H</text>
  <circle cx="155" cy="130" r="5" fill="#14b8a6" filter="url(#glowSm)"/>
  <text x="225" y="136" text-anchor="middle" fill="#94a3b8" font-size="22">→</text>
  <!-- H-H molecule -->
  <circle cx="280" cy="130" r="22" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="280" y="136" text-anchor="middle" fill="#f59e0b" font-size="18" font-weight="bold">H</text>
  <circle cx="340" cy="130" r="22" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="340" y="136" text-anchor="middle" fill="#f59e0b" font-size="18" font-weight="bold">H</text>
  <!-- Shared electron pair -->
  <circle cx="310" cy="124" r="5" fill="#14b8a6" filter="url(#glowSm)"/>
  <circle cx="310" cy="136" r="5" fill="#14b8a6" filter="url(#glowSm)"/>
  <text x="205" y="185" text-anchor="middle" fill="#94a3b8" font-size="12">Общая электронная пара (ковалентная связь)</text>
  <!-- Section 2: Two types -->
  <rect x="410" y="64" width="370" height="140" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#8b5cf6" stroke-width="1"/>
  <text x="595" y="86" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">Типы ковалентной связи</text>
  <!-- Nonpolar -->
  <text x="440" y="112" fill="#10b981" font-size="13" font-weight="bold">Неполярная</text>
  <text x="440" y="130" fill="#ffffff" font-size="12">H₂, Cl₂, O₂, N₂</text>
  <text x="440" y="148" fill="#94a3b8" font-size="11">— одинаковые элементы</text>
  <text x="440" y="163" fill="#94a3b8" font-size="11">— равное распределение e⁻</text>
  <!-- Polar -->
  <text x="620" y="112" fill="#8b5cf6" font-size="13" font-weight="bold">Полярная</text>
  <text x="620" y="130" fill="#ffffff" font-size="12">HCl, H₂O, NH₃</text>
  <text x="620" y="148" fill="#94a3b8" font-size="11">— разные элементы</text>
  <text x="620" y="163" fill="#94a3b8" font-size="11">— неравное распределение e⁻</text>
  <!-- Section 3: Sigma bond / orbital overlap -->
  <rect x="20" y="216" width="370" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1"/>
  <text x="205" y="238" text-anchor="middle" fill="#14b8a6" font-size="14" font-weight="bold">Σ-связь (сигма)</text>
  <!-- Orbital overlap diagram -->
  <ellipse cx="130" cy="280" rx="50" ry="22" fill="#14b8a6" fill-opacity="0.15" stroke="#14b8a6" stroke-width="1.5"/>
  <ellipse cx="200" cy="280" rx="50" ry="22" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <!-- Overlap region -->
  <ellipse cx="165" cy="280" rx="16" ry="18" fill="#14b8a6" fill-opacity="0.4" filter="url(#glowSm)"/>
  <circle cx="130" cy="280" r="6" fill="#f59e0b" opacity="0.8"/>
  <circle cx="200" cy="280" r="6" fill="#f59e0b" opacity="0.8"/>
  <text x="130" y="284" text-anchor="middle" fill="#0f172a" font-size="8" font-weight="bold">A</text>
  <text x="200" y="284" text-anchor="middle" fill="#0f172a" font-size="8" font-weight="bold">A</text>
  <text x="165" y="310" text-anchor="middle" fill="#94a3b8" font-size="11">Перекрывание орбиталей</text>
  <text x="290" y="265" fill="#ffffff" font-size="11">σ-связь: головное</text>
  <text x="290" y="280" fill="#94a3b8" font-size="11">перекрывание</text>
  <text x="290" y="300" fill="#ffffff" font-size="11">π-связь: боковое</text>
  <text x="290" y="315" fill="#94a3b8" font-size="11">перекрывание</text>
  <!-- Section 4: Lewis structures -->
  <rect x="410" y="216" width="370" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#059669" stroke-width="1"/>
  <text x="595" y="238" text-anchor="middle" fill="#059669" font-size="14" font-weight="bold">Структуры Льюиса</text>
  <!-- H:H -->
  <text x="440" y="270" fill="#f59e0b" font-size="16" font-weight="bold">H</text>
  <text x="460" y="268" fill="#14b8a6" font-size="14" filter="url(#glowSm)">:</text>
  <text x="474" y="270" fill="#f59e0b" font-size="16" font-weight="bold">H</text>
  <text x="440" y="290" fill="#94a3b8" font-size="11">H₂ (неполярная)</text>
  <!-- :Cl-Cl: -->
  <text x="560" y="266" fill="#14b8a6" font-size="14" filter="url(#glowSm)">:</text>
  <text x="572" y="270" fill="#8b5cf6" font-size="16" font-weight="bold">Cl</text>
  <text x="600" y="268" fill="#14b8a6" font-size="14" filter="url(#glowSm)">—</text>
  <text x="620" y="270" fill="#8b5cf6" font-size="16" font-weight="bold">Cl</text>
  <text x="648" y="266" fill="#14b8a6" font-size="14" filter="url(#glowSm)">:</text>
  <text x="575" y="290" fill="#94a3b8" font-size="11">Cl₂ (неполярная)</text>
  <!-- H:Cl: -->
  <text x="440" y="330" fill="#f59e0b" font-size="16" font-weight="bold">H</text>
  <text x="458" y="328" fill="#14b8a6" font-size="14" filter="url(#glowSm)">:</text>
  <text x="470" y="330" fill="#8b5cf6" font-size="16" font-weight="bold">Cl</text>
  <text x="498" y="326" fill="#14b8a6" font-size="14" filter="url(#glowSm)">:</text>
  <text x="440" y="345" fill="#94a3b8" font-size="11">HCl (полярная)</text>
  <!-- Section 5: Bond energy & length -->
  <rect x="20" y="358" width="370" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#f59e0b" stroke-width="1"/>
  <text x="205" y="380" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">Энергия и длина связи</text>
  <!-- Bond energy bar -->
  <text x="40" y="405" fill="#ffffff" font-size="12">Энергия связи (кДж/моль):</text>
  <rect x="40" y="415" width="330" height="16" rx="4" fill="#0f172a"/>
  <rect x="40" y="415" width="60" height="16" rx="4" fill="#14b8a6" opacity="0.8"/>
  <rect x="100" y="415" width="100" height="16" rx="4" fill="#10b981" opacity="0.8"/>
  <rect x="200" y="415" width="170" height="16" rx="4" fill="#059669" opacity="0.8"/>
  <text x="70" y="428" text-anchor="middle" fill="#0f172a" font-size="9" font-weight="bold">C–C</text>
  <text x="150" y="428" text-anchor="middle" fill="#0f172a" font-size="9" font-weight="bold">C=C</text>
  <text x="285" y="428" text-anchor="middle" fill="#0f172a" font-size="9" font-weight="bold">C≡C</text>
  <text x="55" y="447" fill="#94a3b8" font-size="10">348</text>
  <text x="145" y="447" fill="#94a3b8" font-size="10">614</text>
  <text x="280" y="447" fill="#94a3b8" font-size="10">839</text>
  <text x="40" y="468" fill="#94a3b8" font-size="11">Длина связи: C–C 154pm &gt; C=C 134pm &gt; C≡C 120pm</text>
  <!-- Section 6: Mechanism summary -->
  <rect x="410" y="358" width="370" height="130" rx="10" fill="#1e293b" fill-opacity="0.7" stroke="#ef4444" stroke-width="1"/>
  <text x="595" y="380" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">Механизм ковалентной связи</text>
  <text x="430" y="405" fill="#ffffff" font-size="12">1. Обменный механизм</text>
  <text x="450" y="422" fill="#94a3b8" font-size="11">— каждый атом даёт 1e⁻ в общую пару</text>
  <text x="430" y="445" fill="#ffffff" font-size="12">2. Донорно-акцепторный механизм</text>
  <text x="450" y="462" fill="#94a3b8" font-size="11">— один атом (донор) даёт пару e⁻,</text>
  <text x="450" y="477" fill="#94a3b8" font-size="11">другой (акцептор) предоставляет орбиталь</text>
</svg>