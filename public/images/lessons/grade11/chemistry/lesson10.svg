<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#43A047" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10" />
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5" />
  <text x="250" y="42" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#2E7D32" text-anchor="middle">Химия и экология</text>
  <text x="250" y="62" font-family="Arial,sans-serif" font-size="12" fill="#777777" text-anchor="middle">Химия — Урок 10</text>
  <line x1="30" y1="72" x2="470" y2="72" stroke="#2E7D32" stroke-width="2" opacity="0.25" />
  <defs>
    <clipPath id="ill">
      <rect x="15" y="80" width="470" height="225" rx="6" />
    </clipPath>
  </defs>
  <g clip-path="url(#ill)">
    <rect x="15" y="80" width="470" height="225" fill="#F1F8E9" rx="6" opacity="0.5" />
    <rect x="25" y="88" width="215" height="115" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="132" y="104" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Источники загрязнения</text>
    <text x="132" y="124" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• ТЭС — CO₂, SO₂, NOₓ</text>
    <text x="132" y="138" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Хим. заводы — тяжёлые</text>
    <text x="132" y="152" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">  металлы (Pb, Hg, Cd)</text>
    <text x="132" y="166" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Автотранспорт — CO, NOₓ</text>
    <text x="132" y="180" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• С/х — пестициды, нитраты</text>
    <text x="132" y="194" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Бытовые отходы — пластик</text>
    <rect x="260" y="88" width="215" height="115" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="367" y="104" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Глобальные проблемы</text>
    <text x="367" y="124" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="bold">Кислотные дожди:</text>
    <text x="367" y="138" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">SO₂+H₂O → H₂SO₃/H₂SO₄</text>
    <text x="367" y="154" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="bold">Парниковый эффект:</text>
    <text x="367" y="168" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">CO₂, CH₄, N₂O ↑ температуру</text>
    <text x="367" y="184" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="bold">Озоновые дыры:</text>
    <text x="367" y="198" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">Фреоны разрушают O₃ слой</text>
    <rect x="25" y="210" width="450" height="92" fill="#FFFFFF" rx="6" stroke="#2E7D32" stroke-width="1.2" />
    <text x="250" y="228" font-family="Arial,sans-serif" font-size="13" fill="#2E7D32" text-anchor="middle" font-weight="bold">Пути решения</text>
    <text x="132" y="248" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Очистка выбросов (фильтры,</text>
    <text x="132" y="262" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">  скрубберы, электрофильтры)</text>
    <text x="132" y="278" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Безотходные технологии</text>
    <text x="132" y="292" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Переработка отходов</text>
    <text x="367" y="248" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Альтернативная энергетика</text>
    <text x="367" y="262" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">  (солнце, ветер, водород)</text>
    <text x="367" y="278" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Каталитические нейтрализаторы</text>
    <text x="367" y="292" font-family="Arial,sans-serif" font-size="10" fill="#333333" text-anchor="middle" font-weight="normal">• Биоразлагаемые полимеры</text>
  </g>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="11" fill="#777777" text-anchor="middle">Химия · 11 класс</text>
</svg>