<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4682B4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5F9EA0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portraitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D2B48C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5DEB3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновая рамка -->
  <rect x="10" y="10" width="480" height="330" fill="url(#frameGrad)" rx="5"/>
  <rect x="20" y="20" width="460" height="310" fill="url(#bgGrad)" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c3e50">ЛИТЕРАТУРА · 11 КЛАСС</text>
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#8B4513">Урок 23: А.И. Солженицын. Жизнь и творчество</text>
  <text x="45" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B4513">23</text>
  
  <!-- Портрет Солженицына -->
  <g transform="translate(40, 90)">
    <rect x="0" y="0" width="120" height="150" fill="url(#portraitGrad)" rx="5"/>
    <circle cx="60" cy="50" r="25" fill="#D2B48C"/>
    <path d="M35,70 Q60,80 85,70 L85,120 Q60,130 35,120 Z" fill="#D2B48C"/>
    <line x1="50" y1="40" x2="45" y2="50" stroke="#000" stroke-width="1.5"/>
    <line x1="70" y1="40" x2="75" y2="50" stroke="#000" stroke-width="1.5"/>
    <path d="M50,55 Q60,60 70,55" fill="none" stroke="#000" stroke-width="1.5"/>
    <circle cx="55" cy="45" r="2" fill="#000"/>
    <circle cx="65" cy="45" r="2" fill="#000"/>
    <text x="60" y="165" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">А.И. Солженицын</text>
    <text x="60" y="180" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">1918-2008</text>
  </g>
  
  <!-- Хронология -->
  <g transform="translate(180, 90)">
    <rect x="0" y="0" width="300" height="150" fill="white" rx="5" opacity="0.8"/>
    <text x="150" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2c3e50">Ключевые даты жизни</text>
    
    <line x1="20" y1="40" x2="280" y2="40" stroke="#8B4513" stroke-width="2"/>
    
    <circle cx="40" cy="40" r="5" fill="#8B4513"/>
    <text x="40" y="60" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">1918</text>
    <text x="40" y="75" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Рождение</text>
    
    <circle cx="100" cy="40" r="5" fill="#8B4513"/>
    <text x="100" y="60" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">1945</text>
    <text x="100" y="75" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Арест</text>
    
    <circle cx="160" cy="40" r="5" fill="#8B4513"/>
    <text x="160" y="60" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">1970</text>
    <text x="160" y="75" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Нобелевская</text>
    <text x="160" y="87" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">премия</text>
    
    <circle cx="220" cy="40" r="5" fill="#8B4513"/>
    <text x="220" y="60" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">1974</text>
    <text x="220" y="75" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Высылка из</text>
    <text x="220" y="87" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">СССР</text>
    
    <circle cx="260" cy="40" r="5" fill="#8B4513"/>
    <text x="260" y="60" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">2008</text>
    <text x="260" y="75" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Смерть</text>
  </g>
  
  <!-- Книга "Один день Ивана Денисовича" -->
  <g transform="translate(40, 250)">
    <rect x="0" y="0" width="100" height="60" fill="url(#bookGrad)" rx="3"/>
    <rect x="10" y="10" width="80" height="40" fill="white" rx="2"/>
    <text x="50" y="35" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Один день</text>
    <text x="50" y="48" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Ивана Денисовича</text>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">1962</text>
  </g>
  
  <!-- Книга "Архипелаг ГУЛАГ" -->
  <g transform="translate(160, 250)">
    <rect x="0" y="0" width="100" height="60" fill="url(#bookGrad)" rx="3"/>
    <rect x="10" y="10" width="80" height="40" fill="white" rx="2"/>
    <text x="50" y="30" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Архипелаг</text>
    <text x="50" y="43" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">ГУЛАГ</text>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">1973-1978</text>
  </g>
  
  <!-- Нобелевская премия -->
  <g transform="translate(280, 250)">
    <rect x="0" y="0" width="100" height="60" fill="url(#bookGrad)" rx="3"/>
    <rect x="10" y="10" width="80" height="40" fill="white" rx="2"/>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Нобелевская</text>
    <text x="50" y="38" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">премия</text>
    <text x="50" y="51" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">в литературе</text>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">1970</text>
  </g>
  
  <!-- Основные темы творчества -->
  <g transform="translate(40, 100)">
    <text x="0" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Основные темы творчества:</text>
    <text x="0" y="220" font-family="Arial, sans-serif" font-size="10" fill="#666">• Историческая правда</text>
    <text x="0" y="235" font-family="Arial, sans-serif" font-size="10" fill="#666">• ГУЛАГ и репрессии</text>
    <text x="0" y="250" font-family="Arial, sans-serif" font-size="10" fill="#666">• Духовность и вера</text>
    <text x="0" y="265" font-family="Arial, sans-serif" font-size="10" fill="#666">• Русское национальное сознание</text>
  </g>
  
  <!-- Декоративные элементы -->
  <path d="M450,20 Q460,30 450,40 Q440,30 450,20" fill="#8B4513" opacity="0.5"/>
  <path d="M460,40 Q470,50 460,60 Q450,50 460,40" fill="#8B4513" opacity="0.5"/>
  <path d="M440,60 Q450,70 440,80 Q430,70 440,60" fill="#8B4513" opacity="0.5"/>
  
  <!-- Значение творчества -->
  <rect x="180" y="240" width="80" height="70" fill="white" rx="5" opacity="0.8"/>
  <text x="220" y="255" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#2c3e50">Значение</text>
  <text x="220" y="268" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Правдивая</text>
  <text x="220" y="280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">история</text>
  <text x="220" y="295" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Советского</text>
  <text x="220" y="307" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#666">Союза</text>
</svg>