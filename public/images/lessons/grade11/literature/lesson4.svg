<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2C3E50" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#34495E" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E74C3C">ЛИТЕРАТУРА · 11 КЛАСС</text>
  <text x="250" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2C3E50">Урок 4: В.В. Маяковский</text>
  <text x="250" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#7F8C8D">Жизнь и творчество</text>
  
  <!-- Номер урока в углу -->
  <circle cx="45" cy="45" r="15" fill="#E74C3C"/>
  <text x="45" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">4</text>
  
  <!-- Портрет Маяковского -->
  <g transform="translate(40, 110)">
    <rect x="0" y="0" width="100" height="120" fill="#ECF0F1" stroke="#34495E" stroke-width="2"/>
    <ellipse cx="50" cy="40" rx="35" ry="40" fill="#FADBD8"/>
    <rect x="15" y="60" width="70" height="50" fill="#3498DB"/>
    <circle cx="40" cy="35" r="3" fill="#2C3E50"/>
    <circle cx="60" cy="35" r="3" fill="#2C3E50"/>
    <path d="M 30 50 Q 50 60 70 50" fill="none" stroke="#2C3E50" stroke-width="2"/>
    <text x="50" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">Портрет</text>
  </g>
  
  <!-- Биографическая временная линия -->
  <g transform="translate(160, 110)">
    <line x1="0" y1="60" x2="200" y2="60" stroke="#34495E" stroke-width="2"/>
    
    <!-- Точки на линии -->
    <circle cx="0" cy="60" r="5" fill="#E74C3C"/>
    <circle cx="50" cy="60" r="5" fill="#E74C3C"/>
    <circle cx="100" cy="60" r="5" fill="#E74C3C"/>
    <circle cx="150" cy="60" r="5" fill="#E74C3C"/>
    <circle cx="200" cy="60" r="5" fill="#E74C3C"/>
    
    <!-- Даты и события -->
    <text x="0" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">1893</text>
    <text x="0" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">Рождение</text>
    
    <text x="50" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">1911</text>
    <text x="50" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">Первые стихи</text>
    
    <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">1919</text>
    <text x="100" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">Октябрь</text>
    
    <text x="150" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">1925</text>
    <text x="150" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">"Хорошее</text>
    <text x="150" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">о революции"</text>
    
    <text x="200" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">1930</text>
    <text x="200" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">Гибель</text>
    
    <text x="100" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Жизнь и творчество</text>
  </g>
  
  <!-- Стихотворный отрывок -->
  <g transform="translate(40, 250)">
    <rect x="0" y="0" width="140" height="80" fill="#F8F9F9" stroke="#34495E" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#2C3E50">"А вы и дышите,</text>
    <text x="70" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#2C3E50">и дышите,</text>
    <text x="70" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-style="italic" fill="#2C3E50">и дышите!"</text>
    <text x="70" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7F8C8D">"Облако в штанах"</text>
  </g>
  
  <!-- Футуризм - схема -->
  <g transform="translate(200, 250)">
    <text x="70" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Футуризм</text>
    
    <!-- Центральный круг -->
    <circle cx="70" cy="45" r="25" fill="#3498DB" opacity="0.7"/>
    <text x="70" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Футуризм</text>
    
    <!-- Вокруг - элементы -->
    <circle cx="20" cy="25" r="15" fill="#E74C3C" opacity="0.7"/>
    <text x="20" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Новый мир</text>
    
    <circle cx="120" cy="25" r="15" fill="#E74C3C" opacity="0.7"/>
    <text x="120" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Машины</text>
    
    <circle cx="20" cy="65" r="15" fill="#E74C3C" opacity="0.7"/>
    <text x="20" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Динамика</text>
    
    <circle cx="120" cy="65" r="15" fill="#E74C3C" opacity="0.7"/>
    <text x="120" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Урбанизм</text>
    
    <!-- Соединения -->
    <line x1="35" y1="35" x2="50" y2="40" stroke="#34495E" stroke-width="1"/>
    <line x1="105" y1="40" x2="85" y2="40" stroke="#34495E" stroke-width="1"/>
    <line x1="35" y1="55" x2="50" y2="50" stroke="#34495E" stroke-width="1"/>
    <line x1="85" y1="50" x2="105" y2="55" stroke="#34495E" stroke-width="1"/>
  </g>
  
  <!-- Революционная поэзия - список -->
  <g transform="translate(360, 110)">
    <rect x="0" y="0" width="120" height="120" fill="#F8F9F9" stroke="#34495E" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Революционная</text>
    <text x="60" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">поэзия</text>
    
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">• "Левый марш"</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">• "Хорошее о</text>
    <text x="10" y="82" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">  революции"</text>
    <text x="10" y="94" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">• "Владимир</text>
    <text x="10" y="106" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">  Ильич Ленин"</text>
  </g>
  
  <!-- Новаторство формы -->
  <g transform="translate(360, 250)">
    <rect x="0" y="0" width="120" height="80" fill="#F8F9F9" stroke="#34495E" stroke-width="1"/>
    <text x="60" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Новаторство формы</text>
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">• "Лесенка"</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">• Неологизмы</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">• Ритмическая</text>
    <text x="10" y="82" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">  структура</text>
  </g>
  
  <!-- Декоративные элементы -->
  <g opacity="0.3">
    <rect x="20" y="100" width="30" height="3" fill="#E74C3C"/>
    <rect x="420" y="100" width="30" height="3" fill="#E74C3C"/>
    <rect x="20" y="340" width="30" height="3" fill="#E74C3C"/>
    <rect x="420" y="340" width="30" height="3" fill="#E74C3C"/>
  </g>
</svg>