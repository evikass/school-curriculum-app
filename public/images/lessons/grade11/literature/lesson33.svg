<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3748;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a202c;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="portraitGrad">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="4" rx="8"/>
  
  <!-- Внутренняя рамка -->
  <rect x="20" y="20" width="460" height="310" fill="none" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="5,5" rx="4"/>
  
  <!-- Надпись "ЛИТЕРАТУРА · 11 КЛАСС" -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="14" fill="#4a5568" text-anchor="middle" font-weight="bold">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="20" fill="#1a202c" text-anchor="middle" font-weight="bold">Урок 33: Современная русская литература (1990-2020-е)</text>
  
  <!-- Номер урока в углу -->
  <rect x="20" y="20" width="40" height="25" fill="#4299e1" rx="3"/>
  <text x="40" y="37" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">33</text>
  
  <!-- Диаграмма: Основные направления -->
  <text x="40" y="100" font-family="Arial, sans-serif" font-size="14" fill="#2d3748" font-weight="bold">Основные направления:</text>
  
  <!-- Круговая диаграмма направлений -->
  <circle cx="120" cy="150" r="40" fill="#e53e3e" opacity="0.7"/>
  <circle cx="170" cy="120" r="40" fill="#38a169" opacity="0.7"/>
  <circle cx="170" cy="180" r="40" fill="#3182ce" opacity="0.7"/>
  
  <text x="120" y="155" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Постмодернизм</text>
  <text x="170" y="125" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Традиционализм</text>
  <text x="170" y="185" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Неореализм</text>
  
  <!-- Портреты писателей -->
  <!-- Пелевин -->
  <circle cx="280" cy="110" r="25" fill="url(#portraitGrad)"/>
  <text x="280" y="115" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">В. Пелевин</text>
  
  <!-- Сорокин -->
  <circle cx="340" cy="110" r="25" fill="url(#portraitGrad)"/>
  <text x="340" y="115" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">В. Сорокин</text>
  
  <!-- Толстая -->
  <circle cx="280" cy="160" r="25" fill="url(#portraitGrad)"/>
  <text x="280" y="165" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Т. Толстая</text>
  
  <!-- Улицкая -->
  <circle cx="340" cy="160" r="25" fill="url(#portraitGrad)"/>
  <text x="340" y="165" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Л. Улицкая</text>
  
  <!-- Хронология -->
  <text x="40" y="210" font-family="Arial, sans-serif" font-size="14" fill="#2d3748" font-weight="bold">Хронология:</text>
  
  <!-- Линия времени -->
  <line x1="40" y1="230" x2="460" y2="230" stroke="#4a5568" stroke-width="2"/>
  
  <!-- Даты -->
  <circle cx="80" cy="230" r="5" fill="#e53e3e"/>
  <text x="80" y="250" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">1990</text>
  
  <circle cx="160" cy="230" r="5" fill="#e53e3e"/>
  <text x="160" y="250" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">1995</text>
  
  <circle cx="240" cy="230" r="5" fill="#e53e3e"/>
  <text x="240" y="250" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">2000</text>
  
  <circle cx="320" cy="230" r="5" fill="#e53e3e"/>
  <text x="320" y="250" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">2010</text>
  
  <circle cx="400" cy="230" r="5" fill="#e53e3e"/>
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="10" fill="#2d3748" text-anchor="middle">2020</text>
  
  <!-- Ключевые термины -->
  <text x="40" y="280" font-family="Arial, sans-serif" font-size="14" fill="#2d3748" font-weight="bold">Ключевые термины:</text>
  
  <!-- Термины -->
  <rect x="40" y="290" width="100" height="20" fill="#bee3f8" rx="3"/>
  <text x="90" y="303" font-family="Arial, sans-serif" font-size="10" fill="#2c5282" text-anchor="middle">Ирония</text>
  
  <rect x="150" y="290" width="100" height="20" fill="#c6f6d5" rx="3"/>
  <text x="200" y="303" font-family="Arial, sans-serif" font-size="10" fill="#276749" text-anchor="middle">Интертекстуальность</text>
  
  <rect x="260" y="290" width="100" height="20" fill="#fed7d7" rx="3"/>
  <text x="310" y="303" font-family="Arial, sans-serif" font-size="10" fill="#742a2a" text-anchor="middle">Абсурд</text>
  
  <rect x="370" y="290" width="90" height="20" fill="#e9d8fd" rx="3"/>
  <text x="415" y="303" font-family="Arial, sans-serif" font-size="10" fill="#44337a" text-anchor="middle">Цитирование</text>
  
  <!-- Формула постмодернизма -->
  <text x="40" y="330" font-family="Arial, sans-serif" font-size="12" fill="#4a5568" font-weight="bold">Формула постмодернизма:</text>
  <text x="40" y="345" font-family="Arial, sans-serif" font-size="11" fill="#4a5568">Реальность + Ирония + Цитирование + Игра = Постмодернизм</text>
  
  <!-- Дополнительные элементы -->
  <rect x="420" y="100" width="50" height="60" fill="#fef5e7" stroke="#f6ad55" stroke-width="1" rx="3"/>
  <text x="445" y="115" font-family="Arial, sans-serif" font-size="8" fill="#744210" text-anchor="middle">"Generation "П""</text>
  <text x="445" y="128" font-family="Arial, sans-serif" font-size="8" fill="#744210" text-anchor="middle">"Лимониум"</text>
  <text x="445" y="141" font-family="Arial, sans-serif" font-size="8" fill="#744210" text-anchor="middle">"Кысь"</text>
  <text x="445" y="154" font-family="Arial, sans-serif" font-size="8" fill="#744210" text-anchor="middle">"Кукла"</text>
  
  <!-- Схема влияний -->
  <line x1="170" y1="150" x2="255" y2="110" stroke="#718096" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="170" y1="150" x2="315" y2="110" stroke="#718096" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="170" y1="150" x2="255" y2="160" stroke="#718096" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="170" y1="150" x2="315" y2="160" stroke="#718096" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Даты ключевых произведений -->
  <text x="420" y="180" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">1992</text>
  <text x="420" y="195" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">1996</text>
  <text x="420" y="210" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">2000</text>
  <text x="420" y="225" font-family="Arial, sans-serif" font-size="10" fill="#4a5568">2001</text>
</svg>