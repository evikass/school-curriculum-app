<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1c40f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="grad3">
      <stop offset="0%" style="stop-color:#ecf0f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bdc3c7;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#34495e" stroke-width="1"/>
  
  <!-- Заголовок и класс -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">ЛИТЕРАТУРА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1e3c72">Урок 35: Итоги изучения русской литературы XX-XXI веков</text>
  <text x="470" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end" fill="#34495e">35</text>
  
  <!-- Хронологическая ось -->
  <line x1="50" y1="290" x2="450" y2="290" stroke="#34495e" stroke-width="2"/>
  <text x="50" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">1900</text>
  <text x="150" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">1950</text>
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">2000</text>
  <text x="350" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">2020</text>
  <text x="450" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50">2023</text>
  
  <!-- Эпохи литературы -->
  <rect x="50" y="80" width="100" height="40" fill="url(#grad1)" opacity="0.7"/>
  <text x="100" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Серебряный век</text>
  
  <rect x="150" y="80" width="100" height="40" fill="#e74c3c" opacity="0.7"/>
  <text x="200" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Советский период</text>
  
  <rect x="250" y="80" width="100" height="40" fill="#27ae60" opacity="0.7"/>
  <text x="300" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Постсоветский</text>
  
  <rect x="350" y="80" width="100" height="40" fill="#8e44ad" opacity="0.7"/>
  <text x="400" y="105" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Современность</text>
  
  <!-- Основные направления -->
  <text x="60" y="140" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Символизм</text>
  <text x="60" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Акмеизм</text>
  <text x="60" y="170" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Футуризм</text>
  
  <text x="160" y="140" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Социалистический реализм</text>
  <text x="160" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">"Тихий поток"</text>
  <text x="160" y="170" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Диссидентская литература</text>
  
  <text x="260" y="140" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Постмодернизм</text>
  <text x="260" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Неоавангард</text>
  <text x="260" y="170" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">"Новая драма"</text>
  
  <text x="360" y="140" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Цифровая литература</text>
  <text x="360" y="155" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Post-советская проза</text>
  <text x="360" y="170" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">Женская проза</text>
  
  <!-- Ключевые авторы -->
  <circle cx="100" cy="210" r="15" fill="url(#grad3)"/>
  <text x="100" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Ахм.</text>
  <text x="100" y="235" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Блок</text>
  
  <circle cx="200" cy="210" r="15" fill="url(#grad3)"/>
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Пауст.</text>
  <text x="200" y="235" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Солж.</text>
  
  <circle cx="300" cy="210" r="15" fill="url(#grad3)"/>
  <text x="300" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">В.</text>
  <text x="300" y="235" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Петров</text>
  
  <circle cx="400" cy="210" r="15" fill="url(#grad3)"/>
  <text x="400" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Улицк.</text>
  <text x="400" y="235" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Сорок.</text>
  
  <!-- Ключевые произведения -->
  <rect x="70" y="250" width="60" height="25" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
  <text x="100" y="267" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Стихи о Прекр.</text>
  
  <rect x="170" y="250" width="60" height="25" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
  <text x="200" y="267" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Иван Д.</text>
  
  <rect x="270" y="250" width="60" height="25" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
  <text x="300" y="267" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Чапаев</text>
  
  <rect x="370" y="250" width="60" height="25" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
  <text x="400" y="267" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Медея</text>
  
  <!-- Формула развития литературы -->
  <rect x="180" y="180" width="140" height="30" fill="url(#grad2)" opacity="0.8"/>
  <text x="250" y="200" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">Традиции → Поиск → Самовыражение</text>
  
  <!-- Значение для современности -->
  <text x="250" y="140" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e74c3c">Значение для современности</text>
  
  <!-- Современные влияния -->
  <circle cx="80" cy="140" r="20" fill="#3498db" opacity="0.3"/>
  <text x="80" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Формирование</text>
  <text x="80" y="158" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">идентичности</text>
  
  <circle cx="420" cy="140" r="20" fill="#3498db" opacity="0.3"/>
  <text x="420" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Мировой</text>
  <text x="420" y="158" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">диалог</text>
  
  <!-- Декоративные элементы -->
  <path d="M30,30 L40,30 L40,40 Z" fill="#2c3e50"/>
  <path d="M470,30 L460,30 L460,40 Z" fill="#2c3e50"/>
  <path d="M30,320 L40,320 L40,310 Z" fill="#2c3e50"/>
  <path d="M470,320 L460,320 L460,310 Z" fill="#2c3e50"/>
</svg>