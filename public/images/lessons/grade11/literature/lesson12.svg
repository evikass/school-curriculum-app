<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="headerGrad12" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="shadow12" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="56" rx="12" fill="url(#headerGrad12)"/>
  <rect x="0" y="20" width="500" height="36" fill="url(#headerGrad12)"/>

  <!-- Lesson number badge -->
  <circle cx="28" cy="28" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="28" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">12</text>

  <!-- Title -->
  <text x="52" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Итоговое повторение</text>
  <text x="52" y="42" font-family="Arial, sans-serif" font-size="10" fill="#FFF3E0" opacity="0.85">Литература — Урок 12</text>

  <!-- Checklist icon -->
  <rect x="430" y="14" width="28" height="28" rx="4" fill="#FFFFFF" opacity="0.2"/>
  <line x1="438" y1="22" x2="450" y2="22" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="438" y1="28" x2="448" y2="28" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <line x1="438" y1="34" x2="452" y2="34" stroke="#FFFFFF" stroke-width="1.5" opacity="0.6"/>
  <polyline points="434,20 436,22 434,24" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.5"/>

  <text x="250" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">Разделы курса для повторения</text>
  <!-- Section 1: Русская классика XX в. -->
  <rect x="15" y="82" width="225" height="52" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" filter="url(#shadow12)"/>
  <rect x="15" y="82" width="225" height="22" rx="8" fill="#E65100" opacity="0.12"/>
  <rect x="15" y="96" width="225" height="8" fill="#E65100" opacity="0.12"/>
  <circle cx="31" cy="98" r="8" fill="#E65100"/>
  <text x="31" y="101.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">1</text>
  <text x="45" y="101" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BF360C">Русская классика XX в.</text>
  <text x="27" y="122" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Бунин, Куприн, Горький</text>
  <!-- Section 2: Советская литература -->
  <rect x="260" y="82" width="225" height="52" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" filter="url(#shadow12)"/>
  <rect x="260" y="82" width="225" height="22" rx="8" fill="#E65100" opacity="0.12"/>
  <rect x="260" y="96" width="225" height="8" fill="#E65100" opacity="0.12"/>
  <circle cx="276" cy="98" r="8" fill="#E65100"/>
  <text x="276" y="101.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">2</text>
  <text x="290" y="101" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BF360C">Советская литература</text>
  <text x="272" y="122" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Шолохов, Твардовский</text>
  <!-- Section 3: Военная проза -->
  <rect x="15" y="140" width="225" height="52" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" filter="url(#shadow12)"/>
  <rect x="15" y="140" width="225" height="22" rx="8" fill="#E65100" opacity="0.12"/>
  <rect x="15" y="154" width="225" height="8" fill="#E65100" opacity="0.12"/>
  <circle cx="31" cy="156" r="8" fill="#E65100"/>
  <text x="31" y="159.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">3</text>
  <text x="45" y="159" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BF360C">Военная проза</text>
  <text x="27" y="180" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Васильев, Быков</text>
  <!-- Section 4: Деревенская проза -->
  <rect x="260" y="140" width="225" height="52" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" filter="url(#shadow12)"/>
  <rect x="260" y="140" width="225" height="22" rx="8" fill="#E65100" opacity="0.12"/>
  <rect x="260" y="154" width="225" height="8" fill="#E65100" opacity="0.12"/>
  <circle cx="276" cy="156" r="8" fill="#E65100"/>
  <text x="276" y="159.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">4</text>
  <text x="290" y="159" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BF360C">Деревенская проза</text>
  <text x="272" y="180" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Распутин, Солженицын</text>
  <!-- Section 5: Литература и общество -->
  <rect x="15" y="198" width="225" height="52" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" filter="url(#shadow12)"/>
  <rect x="15" y="198" width="225" height="22" rx="8" fill="#E65100" opacity="0.12"/>
  <rect x="15" y="212" width="225" height="8" fill="#E65100" opacity="0.12"/>
  <circle cx="31" cy="214" r="8" fill="#E65100"/>
  <text x="31" y="217.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">5</text>
  <text x="45" y="217" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BF360C">Литература и общество</text>
  <text x="27" y="238" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Булгаков, Солженицын</text>
  <!-- Section 6: Теория литературы -->
  <rect x="260" y="198" width="225" height="52" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" filter="url(#shadow12)"/>
  <rect x="260" y="198" width="225" height="22" rx="8" fill="#E65100" opacity="0.12"/>
  <rect x="260" y="212" width="225" height="8" fill="#E65100" opacity="0.12"/>
  <circle cx="276" cy="214" r="8" fill="#E65100"/>
  <text x="276" y="217.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">6</text>
  <text x="290" y="217" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#BF360C">Теория литературы</text>
  <text x="272" y="238" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Роды, жанры, тропы</text>
  <!-- Significance -->
  <rect x="15" y="264" width="470" height="42" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" filter="url(#shadow12)"/>
  <rect x="15" y="264" width="6" height="42" rx="3" fill="#E65100"/>
  <text x="30" y="279" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#E65100">Значение:</text>
  <text x="30" y="294" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Обобщение и систематизация знаний по курсу литературы 11 класса. Подготовка к итоговой аттестации.</text>

  <!-- Footer -->
  <rect x="0" y="330" width="500" height="20" rx="0" fill="#E65100" opacity="0.08"/>
  <rect x="0" y="338" width="500" height="12" rx="12" fill="#E65100" opacity="0.08"/>
  <text x="250" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8D6E63">Литература · 11 класс</text>
</svg>