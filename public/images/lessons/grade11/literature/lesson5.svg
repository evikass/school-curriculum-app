<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="headerGrad5" x1="0" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BF360C"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <linearGradient id="portraitGrad5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
    <filter id="shadow5" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="500" height="56" rx="12" fill="url(#headerGrad5)"/>
  <rect x="0" y="20" width="500" height="36" fill="url(#headerGrad5)"/>

  <!-- Lesson number badge -->
  <circle cx="28" cy="28" r="16" fill="#FFFFFF" opacity="0.25"/>
  <text x="28" y="33" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">5</text>

  <!-- Title -->
  <text x="52" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">М.А. Шолохов</text>
  <text x="52" y="42" font-family="Arial, sans-serif" font-size="10" fill="#FFF3E0" opacity="0.85">Литература — Урок 5  ·  1905–1984</text>

  <!-- Portrait circle -->
  <circle cx="55" cy="100" r="30" fill="url(#portraitGrad5)" filter="url(#shadow5)"/>
  <circle cx="55" cy="100" r="28" fill="#E65100" stroke="#FFFFFF" stroke-width="2"/>
  <text x="55" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#FFFFFF">Ш</text>

  <!-- Author name next to portrait -->
  <text x="95" y="90" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3E2723">М.А. Шолохов</text>
  <text x="95" y="105" font-family="Arial, sans-serif" font-size="10" fill="#5D4037">1905–1984</text>
  <text x="95" y="120" font-family="Arial, sans-serif" font-size="9" fill="#8D6E63" font-style="italic">Нобелевский лауреат (1965). Эпопея «Тихий Дон» — м...)</text>

  <!-- Separator line -->
  <line x1="15" y1="138" x2="485" y2="138" stroke="#E65100" stroke-width="0.8" opacity="0.3"/>

  <!-- Works section -->
  <rect x="15" y="145" width="225" height="130" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" opacity="0.9" filter="url(#shadow5)"/>
  <rect x="15" y="145" width="225" height="24" rx="8" fill="#E65100" opacity="0.12"/>
  <rect x="15" y="161" width="225" height="8" fill="#E65100" opacity="0.12"/>
  <text x="127" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">Произведения</text>
  <rect x="25" y="176" width="8" height="8" rx="2" fill="#E65100" opacity="0.6"/>
  <text x="39" y="183" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">«Тихий Дон»</text>
  <rect x="25" y="198" width="8" height="8" rx="2" fill="#E65100" opacity="0.6"/>
  <text x="39" y="205" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">«Судьба человека»</text>
  <rect x="25" y="220" width="8" height="8" rx="2" fill="#E65100" opacity="0.6"/>
  <text x="39" y="227" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">«Поднятая целина»</text>
  <rect x="25" y="242" width="8" height="8" rx="2" fill="#E65100" opacity="0.6"/>
  <text x="39" y="249" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">«Донские рассказы»</text>
  <!-- Themes section -->
  <rect x="255" y="145" width="230" height="130" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" opacity="0.9" filter="url(#shadow5)"/>
  <rect x="255" y="145" width="230" height="24" rx="8" fill="#E65100" opacity="0.12"/>
  <rect x="255" y="161" width="230" height="8" fill="#E65100" opacity="0.12"/>
  <text x="370" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100">Темы</text>
  <circle cx="273" cy="180" r="3" fill="#FF8F00"/>
  <text x="282" y="183" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">Казачество и революция</text>
  <circle cx="273" cy="202" r="3" fill="#FF8F00"/>
  <text x="282" y="205" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">Трагедия выбора</text>
  <circle cx="273" cy="224" r="3" fill="#FF8F00"/>
  <text x="282" y="227" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">Человек и война</text>
  <circle cx="273" cy="246" r="3" fill="#FF8F00"/>
  <text x="282" y="249" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">Родина и дом</text>
  <!-- Significance -->
  <rect x="15" y="283" width="470" height="42" rx="8" fill="#FFFFFF" stroke="#E65100" stroke-width="1" filter="url(#shadow5)"/>
  <rect x="15" y="283" width="6" height="42" rx="3" fill="#E65100"/>
  <text x="30" y="298" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#E65100">Значение:</text>
  <text x="30" y="313" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">Нобелевский лауреат (1965). Эпопея «Тихий Дон» — монументальное полотно судьбы донского казачества. Мастер психологического реализма и народной речи.</text>

  <!-- Footer -->
  <rect x="0" y="330" width="500" height="20" rx="0" fill="#E65100" opacity="0.08"/>
  <rect x="0" y="338" width="500" height="12" rx="12" fill="#E65100" opacity="0.08"/>
  <text x="250" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8D6E63">Литература · 11 класс</text>
</svg>