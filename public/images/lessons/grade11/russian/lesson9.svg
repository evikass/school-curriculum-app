  <text x="32" y="34" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D32F2F" text-anchor="middle">9</text>
  <text x="58" y="24" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Изобразительно-выразительные средства</text>
  <text x="58" y="42" font-family="Arial, sans-serif" font-size="10" fill="#FFCDD2">Русский язык — Урок 9</text>
  <line x1="15" y1="60" x2="485" y2="60" stroke="#EF9A9A" stroke-width="0.5" opacity="0.6"/>
  <rect x="15" y="68" width="470" height="52" rx="6" ry="6" fill="#FFFFFF" stroke="#D32F2F" stroke-width="1" opacity="0.95"/>
  <rect x="15" y="68" width="5" height="52" rx="2" ry="0" fill="#D32F2F"/>
  <text x="28" y="81" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#D32F2F">ОПРЕДЕЛЕНИЕ</text>
  <text x="28" y="94" font-family="Arial, sans-serif" font-size="10" fill="#212121">Тропы и фигуры речи — средства</text>
  <text x="28" y="106" font-family="Arial, sans-serif" font-size="10" fill="#212121">художественной выразительности,</text>
  <text x="28" y="118" font-family="Arial, sans-serif" font-size="10" fill="#212121">делающие речь образной.</text>
  <rect x="15" y="128" width="148" height="80" rx="6" ry="6" fill="#FFFFFF" stroke="#D32F2F" stroke-width="1" opacity="0.95"/>
  <rect x="15" y="128" width="148" height="18" rx="6" ry="6" fill="#D32F2F" opacity="0.15"/>
  <rect x="15" y="140" width="148" height="6" fill="#D32F2F" opacity="0.15"/>
  <text x="22" y="141" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#D32F2F">Тропы</text>
  <text x="22" y="156" font-family="Arial, sans-serif" font-size="9" fill="#424242">Метафора — скрытое сравн.</text>
  <text x="22" y="167" font-family="Arial, sans-serif" font-size="9" fill="#424242">Эпитет — образное определ.</text>
  <text x="22" y="178" font-family="Arial, sans-serif" font-size="9" fill="#424242">Олицетворение — неживое</text>
  <text x="22" y="189" font-family="Arial, sans-serif" font-size="9" fill="#424242">как живое</text>
  <rect x="176" y="128" width="148" height="80" rx="6" ry="6" fill="#FFFFFF" stroke="#C62828" stroke-width="1" opacity="0.95"/>
  <rect x="176" y="128" width="148" height="18" rx="6" ry="6" fill="#C62828" opacity="0.15"/>
  <rect x="176" y="140" width="148" height="6" fill="#C62828" opacity="0.15"/>
  <text x="183" y="141" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#C62828">Сравнение</text>
  <text x="183" y="156" font-family="Arial, sans-serif" font-size="9" fill="#424242">Сопоставление двух предметов:</text>
  <text x="183" y="167" font-family="Arial, sans-serif" font-size="9" fill="#424242">как, словно, будто, точно.</text>
  <text x="183" y="178" font-family="Arial, sans-serif" font-size="9" fill="#424242">«Лес как храм»</text>
  <rect x="337" y="128" width="148" height="80" rx="6" ry="6" fill="#FFFFFF" stroke="#B71C1C" stroke-width="1" opacity="0.95"/>
  <rect x="337" y="128" width="148" height="18" rx="6" ry="6" fill="#B71C1C" opacity="0.15"/>
  <rect x="337" y="140" width="148" height="6" fill="#B71C1C" opacity="0.15"/>
  <text x="344" y="141" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#B71C1C">Фигуры речи</text>
  <text x="344" y="156" font-family="Arial, sans-serif" font-size="9" fill="#424242">Инверсия — обратный порядок.</text>
  <text x="344" y="167" font-family="Arial, sans-serif" font-size="9" fill="#424242">Анафора — единоначатие.</text>
  <text x="344" y="178" font-family="Arial, sans-serif" font-size="9" fill="#424242">Антитеза — противопоставл.</text>
  <text x="344" y="189" font-family="Arial, sans-serif" font-size="9" fill="#424242">Градация — усиление</text>
  <line x1="164" y1="168" x2="175" y2="168" stroke="#EF9A9A" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="325" y1="168" x2="336" y2="168" stroke="#EF9A9A" stroke-width="1.5" stroke-dasharray="2,2"/>
  <rect x="15" y="216" width="280" height="72" rx="6" ry="6" fill="#FFFFFF" stroke="#EF9A9A" stroke-width="1" opacity="0.95"/>
  <rect x="15" y="216" width="60" height="14" rx="3" ry="3" fill="#D32F2F" opacity="0.85"/>
  <text x="45" y="227" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFFFFF" text-anchor="middle">ПРИМЕР</text>
  <text x="25" y="242" font-family="Arial, sans-serif" font-size="9" fill="#212121">Метафора: «золотые руки»</text>
  <text x="25" y="253" font-family="Arial, sans-serif" font-size="9" fill="#212121">Эпитет: «мармеладное небо»</text>
  <text x="25" y="264" font-family="Arial, sans-serif" font-size="9" fill="#212121">Олицетв.: «ветер плачет»</text>
  <text x="25" y="275" font-family="Arial, sans-serif" font-size="9" fill="#212121">Антитеза: «Преступление и</text>
  <text x="25" y="286" font-family="Arial, sans-serif" font-size="9" fill="#212121">наказание»</text>
  <rect x="305" y="216" width="180" height="72" rx="6" ry="6" fill="#FFFFFF" stroke="#D32F2F" stroke-width="1.2" opacity="0.95"/>
  <rect x="305" y="216" width="180" height="14" rx="6" ry="6" fill="#D32F2F" opacity="0.12"/>
  <rect x="305" y="224" width="180" height="6" fill="#D32F2F" opacity="0.12"/>
  <text x="312" y="227" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#D32F2F">⚡ ПРАВИЛО</text>
  <text x="312" y="242" font-family="Arial, sans-serif" font-size="9" fill="#212121">Тропы — на основе переносного</text>
  <text x="312" y="253" font-family="Arial, sans-serif" font-size="9" fill="#212121">значения. Фигуры — особый</text>
  <text x="312" y="264" font-family="Arial, sans-serif" font-size="9" fill="#212121">порядок или построение.</text>
  <text x="312" y="275" font-family="Arial, sans-serif" font-size="9" fill="#212121">Метонимия, гипербола, литота.</text>
