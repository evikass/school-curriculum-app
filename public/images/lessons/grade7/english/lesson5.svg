<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1210"/>
  <!-- Polluted river -->
  <rect x="30" y="150" width="200" height="60" rx="4" fill="#1b5e20" stroke="#2e7d32" stroke-width="1" opacity="0.5"/>
  <!-- River (polluted - brown/dark) -->
  <path d="M30,170 Q80,160 130,175 Q180,190 230,170" fill="none" stroke="#5d4037" stroke-width="25" opacity="0.5"/>
  <path d="M30,170 Q80,160 130,175 Q180,190 230,170" fill="none" stroke="#3e2723" stroke-width="15" opacity="0.5"/>
  <!-- Dead fish -->
  <ellipse cx="100" cy="175" rx="10" ry="5" fill="#bdbdbd" opacity="0.5"/>
  <text x="95" y="178" font-size="6" fill="#757575">☠</text>
  <!-- Trash in river -->
  <rect x="140" y="165" width="8" height="6" fill="#78909c" opacity="0.4"/>
  <rect x="170" y="172" width="10" height="5" fill="#ef5350" opacity="0.3"/>
  <text x="60" y="220" font-size="8" fill="#a1887f">Polluted river</text>
  <!-- Factory with smoke -->
  <rect x="280" y="50" width="100" height="80" fill="#37474f" stroke="#546e7a" stroke-width="1.5"/>
  <rect x="290" y="30" width="18" height="25" fill="#455a64"/>
  <rect x="330" y="40" width="14" height="18" fill="#455a64"/>
  <!-- Dark smoke -->
  <circle cx="299" cy="22" r="10" fill="#455a64" opacity="0.4"/>
  <circle cx="310" cy="12" r="14" fill="#455a64" opacity="0.3"/>
  <circle cx="325" cy="5" r="16" fill="#37474f" opacity="0.2"/>
  <!-- Smoke from second chimney -->
  <circle cx="337" cy="30" r="8" fill="#455a64" opacity="0.3"/>
  <circle cx="345" cy="20" r="10" fill="#37474f" opacity="0.2"/>
  <text x="290" y="145" font-size="8" fill="#78909c">Air pollution</text>
  <!-- Deforestation -->
  <rect x="30" y="30" width="200" height="100" rx="6" fill="#1a2a1a" stroke="#2e7d32" stroke-width="1"/>
  <!-- Stumps -->
  <rect x="60" y="90" width="12" height="15" fill="#5d4037"/>
  <rect x="100" y="85" width="10" height="20" fill="#5d4037"/>
  <rect x="140" y="90" width="12" height="15" fill="#5d4037"/>
  <rect x="180" y="88" width="10" height="17" fill="#5d4037"/>
  <!-- One remaining tree -->
  <rect x="210" y="60" width="8" height="40" fill="#5d4037"/>
  <circle cx="214" cy="52" r="16" fill="#2e7d32" opacity="0.6"/>
  <!-- Axe -->
  <rect x="155" y="55" width="4" height="30" fill="#78909c"/>
  <rect x="148" y="52" width="18" height="8" rx="1" fill="#90a4ae"/>
  <text x="60" y="120" font-size="8" fill="#a1887f">Deforestation</text>
  <!-- Problems list -->
  <rect x="270" y="155" width="210" height="150" rx="6" fill="#1a1a1a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="285" y="175" font-size="10" fill="#ef5350" font-weight="bold">Environmental Problems:</text>
  <text x="285" y="195" font-size="8" fill="#ef9a9a">🏭 Air pollution</text>
  <text x="285" y="210" font-size="8" fill="#ef9a9a">🌊 Water pollution</text>
  <text x="285" y="225" font-size="8" fill="#ef9a9a">🌲 Deforestation</text>
  <text x="285" y="240" font-size="8" fill="#ef9a9a">🌡 Global warming</text>
  <text x="285" y="255" font-size="8" fill="#ef9a9a">🗑 Litter / Waste</text>
  <text x="285" y="270" font-size="8" fill="#ef9a9a">🐾 Endangered species</text>
  <text x="285" y="290" font-size="8" fill="#ffcdd2" font-style="italic">"The Earth is our home.</text>
  <text x="285" y="302" font-size="8" fill="#ffcdd2" font-style="italic">We must protect it."</text>
  <text x="140" y="340" font-size="9" fill="#fff" opacity="0.5">Environmental Problems</text>
</svg>