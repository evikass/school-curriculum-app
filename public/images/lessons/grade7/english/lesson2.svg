<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a1510"/>
  <!-- Broom -->
  <rect x="40" y="40" width="10" height="80" rx="3" fill="#8d6e63" stroke="#6d4c41" stroke-width="1"/>
  <rect x="25" y="120" width="40" height="50" rx="2" fill="#fdd835" stroke="#f9a825" stroke-width="1"/>
  <line x1="30" y1="120" x2="30" y2="170" stroke="#e6c200" stroke-width="0.5"/>
  <line x1="35" y1="120" x2="35" y2="170" stroke="#e6c200" stroke-width="0.5"/>
  <line x1="40" y1="120" x2="40" y2="170" stroke="#e6c200" stroke-width="0.5"/>
  <line x1="45" y1="120" x2="45" y2="170" stroke="#e6c200" stroke-width="0.5"/>
  <line x1="50" y1="120" x2="50" y2="170" stroke="#e6c200" stroke-width="0.5"/>
  <line x1="55" y1="120" x2="55" y2="170" stroke="#e6c200" stroke-width="0.5"/>
  <line x1="60" y1="120" x2="60" y2="170" stroke="#e6c200" stroke-width="0.5"/>
  <text x="25" y="185" font-size="9" fill="#fdd835">Broom</text>
  <!-- Mop -->
  <rect x="110" y="40" width="8" height="80" rx="3" fill="#78909c" stroke="#546e7a" stroke-width="1"/>
  <rect x="100" y="120" width="28" height="40" rx="2" fill="#b0bec5" stroke="#90a4ae" stroke-width="1"/>
  <line x1="105" y1="125" x2="105" y2="155" stroke="#90a4ae" stroke-width="1"/>
  <line x1="111" y1="125" x2="111" y2="155" stroke="#90a4ae" stroke-width="1"/>
  <line x1="117" y1="125" x2="117" y2="155" stroke="#90a4ae" stroke-width="1"/>
  <line x1="123" y1="125" x2="123" y2="155" stroke="#90a4ae" stroke-width="1"/>
  <text x="95" y="175" font-size="9" fill="#b0bec5">Mop</text>
  <!-- Dishes -->
  <ellipse cx="200" cy="100" rx="40" ry="12" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
  <ellipse cx="200" cy="95" rx="32" ry="9" fill="#f5f5f5"/>
  <!-- Plate -->
  <circle cx="200" cy="80" r="20" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1"/>
  <circle cx="200" cy="80" r="14" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="0.5"/>
  <!-- Glass -->
  <rect x="240" y="70" width="14" height="25" rx="2" fill="#b3e5fc" opacity="0.4" stroke="#81d4fa" stroke-width="1"/>
  <!-- Soap bubbles -->
  <circle cx="230" cy="65" r="5" fill="none" stroke="#81d4fa" stroke-width="0.8" opacity="0.4"/>
  <circle cx="225" cy="55" r="3" fill="none" stroke="#81d4fa" stroke-width="0.8" opacity="0.3"/>
  <text x="175" y="125" font-size="9" fill="#b0bec5">Do the dishes</text>
  <!-- Laundry basket -->
  <rect x="310" y="70" width="80" height="60" rx="6" fill="#8d6e63" stroke="#6d4c41" stroke-width="1.5"/>
  <line x1="318" y1="78" x2="318" y2="122" stroke="#6d4c41" stroke-width="0.8"/>
  <line x1="330" y1="78" x2="330" y2="122" stroke="#6d4c41" stroke-width="0.8"/>
  <line x1="342" y1="78" x2="342" y2="122" stroke="#6d4c41" stroke-width="0.8"/>
  <line x1="354" y1="78" x2="354" y2="122" stroke="#6d4c41" stroke-width="0.8"/>
  <line x1="366" y1="78" x2="366" y2="122" stroke="#6d4c41" stroke-width="0.8"/>
  <line x1="378" y1="78" x2="378" y2="122" stroke="#6d4c41" stroke-width="0.8"/>
  <!-- Clothes sticking out -->
  <ellipse cx="340" cy="68" rx="30" ry="10" fill="#42a5f5" opacity="0.3"/>
  <ellipse cx="355" cy="65" rx="15" ry="8" fill="#ef5350" opacity="0.2"/>
  <text x="310" y="145" font-size="9" fill="#8d6e63">Laundry basket</text>
  <!-- Vacuum cleaner -->
  <circle cx="430" cy="120" r="25" fill="#546e7a" stroke="#78909c" stroke-width="1.5"/>
  <rect x="435" y="40" width="8" height="60" rx="3" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <rect x="415" y="30" width="50" height="15" rx="4" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <text x="405" y="160" font-size="9" fill="#90a4ae">Vacuum</text>
  <!-- Phrases section -->
  <rect x="30" y="200" width="440" height="115" rx="8" fill="#1a1a2a" stroke="#fdd835" stroke-width="1"/>
  <text x="50" y="222" font-size="10" fill="#fdd835" font-weight="bold">Household Chores Vocabulary:</text>
  <text x="50" y="242" font-size="8" fill="#ffe0b2">• Sweep the floor</text>
  <text x="50" y="258" font-size="8" fill="#ffe0b2">• Mop the floor</text>
  <text x="50" y="274" font-size="8" fill="#ffe0b2">• Do the dishes / Wash up</text>
  <text x="50" y="290" font-size="8" fill="#ffe0b2">• Do the laundry</text>
  <text x="240" y="242" font-size="8" fill="#ffe0b2">• Vacuum the carpet</text>
  <text x="240" y="258" font-size="8" fill="#ffe0b2">• Take out the rubbish</text>
  <text x="240" y="274" font-size="8" fill="#ffe0b2">• Make the bed</text>
  <text x="240" y="290" font-size="8" fill="#ffe0b2">• Dust the furniture</text>
  <text x="50" y="308" font-size="8" fill="#fdd835" font-style="italic">"I have to do the chores every Saturday."</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Household Chores</text>
</svg>