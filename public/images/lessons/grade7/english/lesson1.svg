<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1520"/>
  <!-- Clock face -->
  <circle cx="250" cy="140" r="100" fill="#1a2332" stroke="#4fc3f7" stroke-width="2.5"/>
  <circle cx="250" cy="140" r="90" fill="none" stroke="#37474f" stroke-width="1"/>
  <!-- Hour markers -->
  <line x1="250" y1="55" x2="250" y2="65" stroke="#4fc3f7" stroke-width="2"/>
  <line x1="335" y1="140" x2="325" y2="140" stroke="#4fc3f7" stroke-width="2"/>
  <line x1="250" y1="225" x2="250" y2="215" stroke="#4fc3f7" stroke-width="2"/>
  <line x1="165" y1="140" x2="175" y2="140" stroke="#4fc3f7" stroke-width="2"/>
  <!-- Small markers -->
  <line x1="292" y1="60" x2="288" y2="70" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="330" y1="98" x2="320" y2="102" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="330" y1="182" x2="320" y2="178" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="292" y1="220" x2="288" y2="210" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="208" y1="220" x2="212" y2="210" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="170" y1="182" x2="180" y2="178" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="170" y1="98" x2="180" y2="102" stroke="#4fc3f7" stroke-width="1"/>
  <line x1="208" y1="60" x2="212" y2="70" stroke="#4fc3f7" stroke-width="1"/>
  <!-- Clock hands -->
  <line x1="250" y1="140" x2="250" y2="75" stroke="#e0e0e0" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="140" x2="300" y2="120" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <circle cx="250" cy="140" r="4" fill="#4fc3f7"/>
  <!-- Daily activity icons around clock -->
  <!-- 7:00 - Wake up (top) -->
  <rect x="225" y="20" width="50" height="22" rx="4" fill="#ff9800" opacity="0.3" stroke="#ff9800" stroke-width="1"/>
  <text x="232" y="35" font-size="8" fill="#ffcc80">7:00 ☀</text>
  <text x="225" y="12" font-size="6" fill="#ff9800" opacity="0.7">Wake up</text>
  <!-- 8:00 - Breakfast (top right) -->
  <rect x="330" y="60" width="55" height="22" rx="4" fill="#66bb6a" opacity="0.3" stroke="#66bb6a" stroke-width="1"/>
  <text x="336" y="75" font-size="8" fill="#a5d6a7">8:00 🍳</text>
  <text x="330" y="55" font-size="6" fill="#66bb6a" opacity="0.7">Breakfast</text>
  <!-- 9:00 - Study (right) -->
  <rect x="350" y="120" width="55" height="22" rx="4" fill="#42a5f5" opacity="0.3" stroke="#42a5f5" stroke-width="1"/>
  <text x="356" y="135" font-size="8" fill="#90caf9">9:00 📚</text>
  <text x="350" y="115" font-size="6" fill="#42a5f5" opacity="0.7">Study</text>
  <!-- 13:00 - Lunch (bottom right) -->
  <rect x="330" y="195" width="55" height="22" rx="4" fill="#ab47bc" opacity="0.3" stroke="#ab47bc" stroke-width="1"/>
  <text x="336" y="210" font-size="8" fill="#ce93d8">13:00 🍽</text>
  <text x="330" y="225" font-size="6" fill="#ab47bc" opacity="0.7">Lunch</text>
  <!-- 22:00 - Sleep (bottom left) -->
  <rect x="115" y="195" width="55" height="22" rx="4" fill="#5c6bc0" opacity="0.3" stroke="#5c6bc0" stroke-width="1"/>
  <text x="121" y="210" font-size="8" fill="#9fa8da">22:00 🌙</text>
  <text x="115" y="225" font-size="6" fill="#5c6bc0" opacity="0.7">Sleep</text>
  <!-- 15:00 - Sports (left) -->
  <rect x="95" y="120" width="55" height="22" rx="4" fill="#ef5350" opacity="0.3" stroke="#ef5350" stroke-width="1"/>
  <text x="101" y="135" font-size="8" fill="#ef9a9a">15:00 ⚽</text>
  <text x="95" y="115" font-size="6" fill="#ef5350" opacity="0.7">Sports</text>
  <!-- Key phrases at bottom -->
  <rect x="40" y="270" width="420" height="50" rx="6" fill="#1a2332" stroke="#4fc3f7" stroke-width="1"/>
  <text x="55" y="290" font-size="8" fill="#4fc3f7">I wake up at 7:00</text>
  <text x="55" y="305" font-size="8" fill="#81d4fa">I usually have breakfast at 8:00</text>
  <text x="240" y="290" font-size="8" fill="#4fc3f7">I always study in the morning</text>
  <text x="240" y="305" font-size="8" fill="#81d4fa">I go to bed at 10:00 PM</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Daily Routines and Habits</text>
</svg>