<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1a0d"/>
  <!-- Recycling bins -->
  <!-- Blue bin - paper -->
  <rect x="30" y="60" width="50" height="70" rx="4" fill="#1565c0" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="35" y="82" font-size="7" fill="#90caf9">PAPER</text>
  <!-- Recycling symbol on blue bin -->
  <path d="M45,95 L55,95 L50,85 Z" fill="#90caf9" opacity="0.5"/>
  <path d="M45,95 L50,105 L40,105 Z" fill="#90caf9" opacity="0.4"/>
  <path d="M55,95 L65,105 L55,105 Z" fill="#90caf9" opacity="0.3"/>
  <!-- Yellow bin - plastic -->
  <rect x="90" y="60" width="50" height="70" rx="4" fill="#f9a825" stroke="#fdd835" stroke-width="1.5"/>
  <text x="92" y="82" font-size="7" fill="#fff9c4">PLASTIC</text>
  <path d="M108,95 L118,95 L113,85 Z" fill="#fff9c4" opacity="0.5"/>
  <!-- Green bin - glass -->
  <rect x="150" y="60" width="50" height="70" rx="4" fill="#2e7d32" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="158" y="82" font-size="7" fill="#c8e6c9">GLASS</text>
  <path d="M168,95 L178,95 L173,85 Z" fill="#c8e6c9" opacity="0.5"/>
  <text x="60" y="145" font-size="8" fill="#a5d6a7">Recycling bins</text>
  <!-- Tree planting -->
  <rect x="30" y="170" width="170" height="130" rx="6" fill="#1a2a1a" stroke="#4caf50" stroke-width="1"/>
  <!-- Person planting -->
  <circle cx="80" cy="195" r="10" fill="#e0e0e0" opacity="0.7"/>
  <rect x="73" y="207" width="14" height="30" rx="4" fill="#42a5f5" opacity="0.5"/>
  <!-- Shovel -->
  <rect x="100" y="200" width="4" height="40" fill="#78909c"/>
  <rect x="94" y="238" width="16" height="8" rx="2" fill="#90a4ae"/>
  <!-- Small tree being planted -->
  <rect x="112" y="220" width="6" height="30" fill="#5d4037"/>
  <circle cx="115" cy="210" r="14" fill="#4caf50" opacity="0.7"/>
  <circle cx="108" cy="205" r="8" fill="#66bb6a" opacity="0.5"/>
  <circle cx="122" cy="208" r="7" fill="#388e3c" opacity="0.5"/>
  <!-- Dirt mound -->
  <ellipse cx="115" cy="252" rx="20" ry="6" fill="#5d4037" opacity="0.5"/>
  <text x="55" y="280" font-size="8" fill="#a5d6a7">Plant a tree!</text>
  <text x="40" y="293" font-size="7" fill="#66bb6a" font-style="italic">"Let's make the</text>
  <text x="40" y="303" font-size="7" fill="#66bb6a" font-style="italic">world greener."</text>
  <!-- Solar panel -->
  <rect x="240" y="50" width="90" height="60" rx="3" fill="#1a237e" stroke="#42a5f5" stroke-width="1.5"/>
  <!-- Grid lines on panel -->
  <line x1="265" y1="50" x2="265" y2="110" stroke="#42a5f5" stroke-width="0.5" opacity="0.5"/>
  <line x1="290" y1="50" x2="290" y2="110" stroke="#42a5f5" stroke-width="0.5" opacity="0.5"/>
  <line x1="315" y1="50" x2="315" y2="110" stroke="#42a5f5" stroke-width="0.5" opacity="0.5"/>
  <line x1="240" y1="70" x2="330" y2="70" stroke="#42a5f5" stroke-width="0.5" opacity="0.5"/>
  <line x1="240" y1="90" x2="330" y2="90" stroke="#42a5f5" stroke-width="0.5" opacity="0.5"/>
  <!-- Sun -->
  <circle cx="285" cy="30" r="14" fill="#fdd835" opacity="0.5"/>
  <line x1="285" y1="10" x2="285" y2="5" stroke="#fdd835" stroke-width="1.5" opacity="0.4"/>
  <line x1="285" y1="50" x2="285" y2="55" stroke="#fdd835" stroke-width="1.5" opacity="0.3"/>
  <line x1="265" y1="30" x2="260" y2="30" stroke="#fdd835" stroke-width="1.5" opacity="0.4"/>
  <line x1="305" y1="30" x2="310" y2="30" stroke="#fdd835" stroke-width="1.5" opacity="0.4"/>
  <!-- Panel stand -->
  <rect x="270" y="110" width="6" height="20" fill="#546e7a"/>
  <rect x="295" y="110" width="6" height="20" fill="#546e7a"/>
  <text x="255" y="145" font-size="8" fill="#42a5f5">Solar panel</text>
  <!-- Green Earth -->
  <circle cx="400" cy="170" r="60" fill="#1b5e20" stroke="#4caf50" stroke-width="2"/>
  <!-- Continents -->
  <path d="M380,140 Q390,130 400,135 Q410,130 420,140 Q415,150 400,148 Q385,150 380,140" fill="#2e7d32" stroke="#388e3c" stroke-width="0.5" opacity="0.6"/>
  <path d="M360,170 Q370,160 385,165 Q390,175 380,180 Q365,178 360,170" fill="#2e7d32" stroke="#388e3c" stroke-width="0.5" opacity="0.5"/>
  <path d="M400,185 Q415,180 425,190 Q430,200 420,210 Q405,215 395,205 Q390,195 400,185" fill="#2e7d32" stroke="#388e3c" stroke-width="0.5" opacity="0.5"/>
  <!-- Leaf decorations -->
  <path d="M395,115 Q400,105 410,110 Q405,120 395,115" fill="#66bb6a" opacity="0.5"/>
  <path d="M350,145 Q355,135 365,140 Q360,150 350,145" fill="#66bb6a" opacity="0.4"/>
  <!-- Hands holding earth -->
  <path d="M340,210 Q350,230 370,225" fill="none" stroke="#ffcc80" stroke-width="3" opacity="0.5"/>
  <path d="M460,210 Q450,230 430,225" fill="none" stroke="#ffcc80" stroke-width="3" opacity="0.5"/>
  <!-- Action words -->
  <rect x="240" y="250" width="220" height="65" rx="6" fill="#1a2a1a" stroke="#4caf50" stroke-width="1"/>
  <text x="255" y="270" font-size="9" fill="#4caf50" font-weight="bold">Protecting Nature:</text>
  <text x="255" y="286" font-size="7" fill="#a5d6a7">♻ Reduce, Reuse, Recycle</text>
  <text x="255" y="298" font-size="7" fill="#a5d6a7">🌳 Plant trees • Save water</text>
  <text x="255" y="310" font-size="7" fill="#a5d6a7">☀ Use renewable energy</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Protecting Nature</text>
</svg>