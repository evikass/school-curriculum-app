<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFF8E1"/>
<rect x="20" y="20" width="210" height="300" rx="6" fill="#FFF" stroke="#FF6F00" stroke-width="1.5"/>
<text x="125" y="42" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Быстрая реакция</text>
<polygon points="125,70 145,110 105,110" fill="#FF5722" stroke="#D32F2F" stroke-width="2"/>
<polygon points="125,80 135,100 115,100" fill="#FF8A65"/>
<text x="125" y="130" font-size="8" fill="#BF360C" text-anchor="middle">Взрыв</text>
<text x="125" y="150" font-size="8" fill="#E65100" text-anchor="middle">мгновенно</text>
<text x="125" y="168" font-size="7" fill="#FF8F00" text-anchor="middle">v очень велика</text>
<text x="125" y="186" font-size="7" fill="#BF360C" text-anchor="middle">2H₂ + O₂ → 2H₂O</text>
<rect x="125" y="200" width="1" height="80" fill="#FF8F00" opacity="0.3"/>
<rect x="126" y="200" width="85" height="80" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1" rx="2"/>
<text x="170" y="220" font-size="7" fill="#E65100" text-anchor="middle">Факторы:</text>
<text x="170" y="235" font-size="7" fill="#FF8F00">• температура ↑</text>
<text x="170" y="250" font-size="7" fill="#FF8F00">• концентрация ↑</text>
<text x="170" y="265" font-size="7" fill="#FF8F00">• площадь пов. ↑</text>
<text x="170" y="280" font-size="7" fill="#FF8F00">• катализатор</text>
<rect x="260" y="20" width="220" height="300" rx="6" fill="#FFF" stroke="#795548" stroke-width="1.5"/>
<text x="370" y="42" font-size="9" fill="#4E342E" text-anchor="middle" font-weight="bold">Медленная реакция</text>
<rect x="310" y="60" width="55" height="40" rx="3" fill="#BCAAA4" stroke="#6D4C41" stroke-width="2"/>
<text x="337" y="84" font-size="8" fill="#4E342E" text-anchor="middle">Fe</text>
<circle cx="330" cy="72" r="3" fill="#A1887F"/>
<circle cx="345" cy="75" r="3" fill="#A1887F"/>
<circle cx="355" cy="68" r="3" fill="#A1887F"/>
<text x="337" y="115" font-size="8" fill="#4E342E" text-anchor="middle">Ржавчина</text>
<text x="370" y="138" font-size="8" fill="#6D4C41" text-anchor="middle">годы</text>
<text x="370" y="158" font-size="8" fill="#795548" text-anchor="middle">v очень мала</text>
<text x="370" y="178" font-size="7" fill="#6D4C41" text-anchor="middle">4Fe + 3O₂ → 2Fe₂O₃</text>
<rect x="280" y="195" width="180" height="110" rx="4" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1"/>
<text x="370" y="215" font-size="8" fill="#4E342E" text-anchor="middle" font-weight="bold">Катализатор</text>
<line x1="290" y1="240" x2="380" y2="240" stroke="#795548" stroke-width="2"/>
<line x1="380" y1="240" x2="440" y2="210" stroke="#4CAF50" stroke-width="2"/>
<polygon points="440,207 448,208 442,214" fill="#4CAF50"/>
<text x="440" y="205" font-size="7" fill="#2E7D32">с кат.</text>
<line x1="290" y1="260" x2="440" y2="260" stroke="#795548" stroke-width="2"/>
<text x="440" y="255" font-size="7" fill="#795548">без кат.</text>
<text x="340" y="290" font-size="7" fill="#6D4C41" text-anchor="middle">ускоряет реакцию</text>
<text x="340" y="300" font-size="7" fill="#6D4C41" text-anchor="middle">не расходуется</text>
<text x="250" y="345" font-size="9" fill="#666" text-anchor="middle" opacity="0.5">Скорость химических реакций</text>
</svg>