<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .card-title { font-size: 13px; font-weight: 600; fill: #1e293b; }
    .card-text { font-size: 11px; fill: #475569; }
    .formula { font-size: 15px; fill: #334155; font-weight: 600; }
    .label { font-size: 12px; fill: #475569; }
    .small { font-size: 10px; fill: #94a3b8; }
    .accent-text { font-size: 12px; font-weight: 600; }
  </style>
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#f8fafc" filter="url(#shadow)"/>
  <!-- Accent bar -->
  <rect width="800" height="6" rx="3" fill="#8b5cf6"/>
  <!-- Title -->
  <text x="40" y="42" class="title">Катализаторы и ингибиторы</text>
  <rect x="40" y="50" width="60" height="3" rx="1.5" fill="#8b5cf6" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="40" y="72" class="subtitle">Вещества, изменяющие скорость реакции, но не входящие в продукты</text>

  <!-- Energy Diagram -->
  <g transform="translate(40, 90)">
    <!-- Axes -->
    <line x1="60" y1="300" x2="60" y2="30" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="60" y1="300" x2="500" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
    <!-- Axis labels -->
    <text x="30" y="170" text-anchor="middle" class="label" transform="rotate(-90, 30, 170)">Энергия (E)</text>
    <text x="280" y="325" text-anchor="middle" class="label">Ход реакции →</text>

    <!-- Reactant level -->
    <line x1="70" y1="240" x2="130" y2="240" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="65" y="244" text-anchor="end" class="small">E исх.</text>

    <!-- Product level -->
    <line x1="430" y1="260" x2="490" y2="260" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="495" y="264" class="small">E прод.</text>

    <!-- Without catalyst (tall hill) -->
    <path d="M 100 240 Q 140 240 170 120 Q 200 50 230 55 Q 260 60 280 140 Q 320 240 430 260"
          fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <text x="220" y="45" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">Без катализатора</text>

    <!-- With catalyst (lower hill) -->
    <path d="M 100 240 Q 140 240 175 190 Q 210 150 240 145 Q 270 140 300 180 Q 350 240 430 260"
          fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <text x="265" y="135" text-anchor="middle" font-size="11" fill="#22c55e" font-weight="600">С катализатором</text>

    <!-- Activation energy arrows -->
    <!-- Ea without catalyst -->
    <line x1="200" y1="240" x2="200" y2="55" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="195" y1="55" x2="205" y2="55" stroke="#ef4444" stroke-width="1"/>
    <line x1="195" y1="240" x2="205" y2="240" stroke="#ef4444" stroke-width="1"/>
    <text x="193" y="155" text-anchor="end" font-size="11" fill="#ef4444" font-weight="600">E<tspan baseline-shift="sub" font-size="75%">a1</tspan></text>

    <!-- Ea with catalyst -->
    <line x1="240" y1="240" x2="240" y2="145" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="235" y1="145" x2="245" y2="145" stroke="#22c55e" stroke-width="1"/>
    <line x1="235" y1="240" x2="245" y2="240" stroke="#22c55e" stroke-width="1"/>
    <text x="253" y="200" font-size="11" fill="#22c55e" font-weight="600">E<tspan baseline-shift="sub" font-size="75%">a2</tspan></text>

    <!-- Delta Ea -->
    <line x1="215" y1="55" x2="215" y2="145" stroke="#8b5cf6" stroke-width="1.5"/>
    <polygon points="212,55 218,55 215,48" fill="#8b5cf6"/>
    <polygon points="212,145 218,145 215,152" fill="#8b5cf6"/>
    <text x="225" y="105" font-size="12" fill="#8b5cf6" font-weight="700">ΔE<tspan baseline-shift="sub" font-size="75%">a</tspan></text>

    <!-- Start/End dots -->
    <circle cx="100" cy="240" r="4" fill="#64748b"/>
    <circle cx="430" cy="260" r="4" fill="#64748b"/>
    <text x="100" y="256" text-anchor="middle" class="small">Исходные</text>
    <text x="100" y="268" text-anchor="middle" class="small">вещества</text>
    <text x="430" y="276" text-anchor="middle" class="small">Продукты</text>
  </g>

  <!-- Right panel: Info cards -->
  <g transform="translate(560, 90)">
    <!-- Catalyst card -->
    <rect width="210" height="155" rx="10" fill="white" stroke="#22c55e" stroke-width="1.5"/>
    <rect width="210" height="35" rx="10" fill="#22c55e" opacity="0.1"/>
    <rect width="210" height="18" y="17" fill="#22c55e" opacity="0.1"/>
    <text x="105" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">⚡ Катализатор</text>
    <text x="15" y="55" class="card-text">• Ускоряет реакцию</text>
    <text x="15" y="73" class="card-text">• Снижает E<tspan baseline-shift="sub" font-size="75%">a</tspan> активации</text>
    <text x="15" y="91" class="card-text">• Не расходуется</text>
    <text x="15" y="109" class="card-text">• Входит в промежуточные</text>
    <text x="22" y="124" class="card-text">продукты, выделяется</text>
    <rect x="10" y="133" width="190" height="16" rx="3" fill="#22c55e" opacity="0.07"/>
    <text x="105" y="145" text-anchor="middle" class="small" fill="#22c55e">Пример: MnO<tspan baseline-shift="sub" font-size="75%">2</tspan> для разложения H<tspan baseline-shift="sub" font-size="75%">2</tspan>O<tspan baseline-shift="sub" font-size="75%">2</tspan></text>
  </g>

  <g transform="translate(560, 260)">
    <!-- Inhibitor card -->
    <rect width="210" height="155" rx="10" fill="white" stroke="#ef4444" stroke-width="1.5"/>
    <rect width="210" height="35" rx="10" fill="#ef4444" opacity="0.1"/>
    <rect width="210" height="18" y="17" fill="#ef4444" opacity="0.1"/>
    <text x="105" y="25" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">🛑 Ингибитор</text>
    <text x="15" y="55" class="card-text">• Замедляет реакцию</text>
    <text x="15" y="73" class="card-text">• Повышает E<tspan baseline-shift="sub" font-size="75%">a</tspan> активации</text>
    <text x="15" y="91" class="card-text">• Не расходуется</text>
    <text x="15" y="109" class="card-text">• Блокирует активные</text>
    <text x="22" y="124" class="card-text">центры или связывает радикалы</text>
    <rect x="10" y="133" width="190" height="16" rx="3" fill="#ef4444" opacity="0.07"/>
    <text x="105" y="145" text-anchor="middle" class="small" fill="#ef4444">Пример: антиоксиданты в пище</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="480" text-anchor="middle" class="small">Катализатор не смещает равновесие — он ускоряет достижение равновесного состояния</text>
</svg>
