<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#10b981" rx="3"/>
<text x="400" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#1e3a5f">Химические формулы. Относительная молекулярная масса</text>

<!-- Formula breakdown H2SO4 -->
<rect x="30" y="55" width="740" height="100" rx="14" fill="#fff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
<rect x="30" y="55" width="740" height="6" rx="3" fill="#10b981"/>
<text x="400" y="85" text-anchor="middle" font-size="14" font-weight="600" fill="#10b981">Разбор формулы</text>
<text x="120" y="125" text-anchor="middle" font-size="30" font-weight="700" fill="#1e3a5f">H<tspan font-size="20" baseline-shift="sub">2</tspan>SO<tspan font-size="20" baseline-shift="sub">4</tspan></text>
<text x="220" y="125" text-anchor="middle" font-size="26" fill="#64748b">→</text>
<text x="320" y="125" text-anchor="middle" font-size="20" font-weight="600" fill="#3b82f6">2H</text>
<text x="380" y="125" text-anchor="middle" font-size="20" fill="#64748b">+</text>
<text x="430" y="125" text-anchor="middle" font-size="20" font-weight="600" fill="#10b981">S</text>
<text x="475" y="125" text-anchor="middle" font-size="20" fill="#64748b">+</text>
<text x="540" y="125" text-anchor="middle" font-size="20" font-weight="600" fill="#8b5cf6">4O</text>
<!-- Braces -->
<path d="M295,130 Q295,138 320,140 Q295,142 295,150" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
<text x="320" y="160" text-anchor="middle" font-size="11" fill="#3b82f6">2 атома H</text>
<path d="M415,130 Q415,138 430,140 Q415,142 415,150" fill="none" stroke="#10b981" stroke-width="1.5"/>
<text x="430" y="160" text-anchor="middle" font-size="11" fill="#10b981">1 атом S</text>
<path d="M510,130 Q510,138 540,140 Q510,142 510,150" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="540" y="160" text-anchor="middle" font-size="11" fill="#8b5cf6">4 атома O</text>

<!-- Calculation -->
<rect x="30" y="175" width="400" height="160" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="175" width="400" height="6" rx="3" fill="#3b82f6"/>
<text x="230" y="205" text-anchor="middle" font-size="15" font-weight="700" fill="#3b82f6">Расчёт Mr(H₂SO₄)</text>

<text x="55" y="235" font-size="15" fill="#475569">Mr(H<tspan font-size="11" baseline-shift="sub">2</tspan>SO<tspan font-size="11" baseline-shift="sub">4</tspan>) = 2×Ar(H) + Ar(S) + 4×Ar(O)</text>
<text x="55" y="260" font-size="15" fill="#475569">= 2 × 1 + 32 + 4 × 16</text>
<text x="55" y="285" font-size="15" fill="#475569">= 2 + 32 + 64</text>
<line x1="55" y1="292" x2="410" y2="292" stroke="#3b82f6" stroke-width="1.5"/>
<text x="55" y="318" font-size="20" font-weight="700" fill="#3b82f6">Mr(H<tspan font-size="14" baseline-shift="sub">2</tspan>SO<tspan font-size="14" baseline-shift="sub">4</tspan>) = 98</text>

<!-- Molecular model -->
<rect x="450" y="175" width="320" height="160" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="450" y="175" width="320" height="6" rx="3" fill="#8b5cf6"/>
<text x="610" y="205" text-anchor="middle" font-size="15" font-weight="700" fill="#8b5cf6">Модель молекулы</text>

<!-- Sulfur center -->
<circle cx="610" cy="270" r="20" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
<text x="610" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">S</text>
<!-- Oxygen atoms -->
<circle cx="560" cy="240" r="14" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
<text x="560" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">O</text>
<circle cx="660" cy="240" r="14" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
<text x="660" y="245" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">O</text>
<circle cx="570" cy="310" r="14" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
<text x="570" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">O</text>
<circle cx="650" cy="310" r="14" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
<text x="650" y="315" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">O</text>
<!-- Bonds -->
<line x1="595" y1="260" x2="572" y2="248" stroke="#94a3b8" stroke-width="2"/>
<line x1="625" y1="260" x2="648" y2="248" stroke="#94a3b8" stroke-width="2"/>
<line x1="600" y1="288" x2="580" y2="302" stroke="#94a3b8" stroke-width="2"/>
<line x1="620" y1="288" x2="640" y2="302" stroke="#94a3b8" stroke-width="2"/>
<!-- Hydrogen atoms -->
<circle cx="540" cy="318" r="9" fill="#60a5fa" stroke="#3b82f6" stroke-width="1.5"/>
<text x="540" y="322" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">H</text>
<circle cx="590" cy="332" r="9" fill="#60a5fa" stroke="#3b82f6" stroke-width="1.5"/>
<text x="590" y="336" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">H</text>
<line x1="565" y1="318" x2="548" y2="320" stroke="#94a3b8" stroke-width="1.5"/>
<line x1="575" y1="322" x2="583" y2="328" stroke="#94a3b8" stroke-width="1.5"/>

<!-- Formula notation rules -->
<rect x="30" y="350" width="740" height="100" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="350" width="740" height="6" rx="3" fill="#f59e0b"/>
<text x="400" y="380" text-anchor="middle" font-size="15" font-weight="700" fill="#f59e0b">Правила записи формул</text>
<text x="80" y="408" font-size="14" fill="#475569">• Химические знаки — заглавные латинские буквы (H, O, Na, Fe)</text>
<text x="80" y="428" font-size="14" fill="#475569">• Индексы — маленькие цифры справа внизу — число атомов (H<tspan font-size="10" baseline-shift="sub">2</tspan>O)</text>
<text x="80" y="448" font-size="14" fill="#475569">• Mr — безразмерная величина, показывает во сколько раз масса молекулы больше 1/12 массы атома ¹²C</text>

<!-- Footer -->
<rect x="200" y="465" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="488" text-anchor="middle" font-size="12" fill="#94a3b8">Относительная молекулярная масса — сумма относительных атомных масс</text>
</svg>
