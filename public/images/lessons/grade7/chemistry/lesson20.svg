<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#ef4444" rx="3"/>
<text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Составление формул по валентности</text>

<!-- Method title -->
<rect x="220" y="55" width="360" height="40" rx="20" fill="#fef2f2" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
<text x="400" y="81" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">Метод «крест-накрест»</text>

<!-- Example 1: Al2O3 -->
<rect x="30" y="108" width="240" height="170" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="108" width="240" height="6" rx="3" fill="#3b82f6"/>
<text x="150" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">Пример 1</text>

<text x="150" y="165" text-anchor="middle" font-size="20" font-weight="600" fill="#1e3a5f">Al<tspan font-size="13" baseline-shift="sub" fill="#3b82f6">(III)</tspan> O<tspan font-size="13" baseline-shift="sub" fill="#10b981">(II)</tspan></text>

<!-- Cross arrows -->
<path d="M105,180 L185,210" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
<path d="M185,180 L105,210" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>

<text x="150" y="235" text-anchor="middle" font-size="16" fill="#475569">→ Al<tspan font-size="12" baseline-shift="sub">2</tspan>O<tspan font-size="12" baseline-shift="sub">3</tspan></text>

<rect x="55" y="248" width="190" height="22" rx="6" fill="#dcfce7"/>
<text x="150" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">III × 2 = II × 3 = 6 ✓</text>

<!-- Example 2: CaCl2 -->
<rect x="280" y="108" width="240" height="170" rx="14" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="280" y="108" width="240" height="6" rx="3" fill="#10b981"/>
<text x="400" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#10b981">Пример 2</text>

<text x="400" y="165" text-anchor="middle" font-size="20" font-weight="600" fill="#1e3a5f">Ca<tspan font-size="13" baseline-shift="sub" fill="#3b82f6">(II)</tspan> Cl<tspan font-size="13" baseline-shift="sub" fill="#10b981">(I)</tspan></text>

<path d="M355,180 L435,210" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
<path d="M435,180 L355,210" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>

<text x="400" y="235" text-anchor="middle" font-size="16" fill="#475569">→ CaCl<tspan font-size="12" baseline-shift="sub">2</tspan></text>

<rect x="305" y="248" width="190" height="22" rx="6" fill="#dcfce7"/>
<text x="400" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">II × 1 = I × 2 = 2 ✓</text>

<!-- Example 3: Fe2S3 -->
<rect x="530" y="108" width="240" height="170" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="530" y="108" width="240" height="6" rx="3" fill="#8b5cf6"/>
<text x="650" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#8b5cf6">Пример 3</text>

<text x="650" y="165" text-anchor="middle" font-size="20" font-weight="600" fill="#1e3a5f">Fe<tspan font-size="13" baseline-shift="sub" fill="#3b82f6">(III)</tspan> S<tspan font-size="13" baseline-shift="sub" fill="#10b981">(II)</tspan></text>

<path d="M605,180 L685,210" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>
<path d="M685,180 L605,210" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4,3"/>

<text x="650" y="235" text-anchor="middle" font-size="16" fill="#475569">→ Fe<tspan font-size="12" baseline-shift="sub">2</tspan>S<tspan font-size="12" baseline-shift="sub">3</tspan></text>

<rect x="555" y="248" width="190" height="22" rx="6" fill="#dcfce7"/>
<text x="650" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">III × 2 = II × 3 = 6 ✓</text>

<!-- LCM method -->
<rect x="30" y="292" width="740" height="120" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="292" width="740" height="6" rx="3" fill="#f59e0b"/>
<text x="400" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#f59e0b">Метод наименьшего общего кратного (НОК)</text>

<text x="55" y="348" font-size="14" fill="#475569">1. Найти НОК валентностей элементов</text>
<text x="55" y="370" font-size="14" fill="#475569">2. Разделить НОК на валентность каждого элемента → получить индексы</text>
<text x="55" y="395" font-size="14" fill="#475569">Пример: Al(III) + O(II) → НОК(3,2) = 6 → 6/3=<tspan font-weight="700" fill="#3b82f6">2</tspan>, 6/2=<tspan font-weight="700" fill="#10b981">3</tspan> → Al<tspan font-size="11" baseline-shift="sub">2</tspan>O<tspan font-size="11" baseline-shift="sub">3</tspan></text>

<!-- Simplification note -->
<rect x="30" y="425" width="740" height="40" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1" filter="url(#shadow)"/>
<text x="400" y="450" text-anchor="middle" font-size="14" font-weight="600" fill="#ef4444">⚠ Если индексы имеют общий делитель — сокращаем!  C(IV)O(II) → CO₂ (не C₂O₄)</text>

<!-- Footer -->
<rect x="200" y="472" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="492" text-anchor="middle" font-size="12" fill="#94a3b8">Валентность одного элемента становится индексом другого</text>
</svg>
