<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#ec4899" rx="3"/>
<text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Массовая доля элемента</text>

<!-- Main formula -->
<rect x="150" y="55" width="500" height="50" rx="12" fill="#fdf2f8" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
<text x="400" y="88" text-anchor="middle" font-size="22" font-weight="700" fill="#ec4899">w(E) = n × Ar(E) / Mr × 100%</text>

<!-- H2O example -->
<rect x="30" y="118" width="370" height="170" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="118" width="370" height="6" rx="3" fill="#3b82f6"/>
<text x="215" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#3b82f6">Пример: H<tspan font-size="11" baseline-shift="sub">2</tspan>O (Mr = 18)</text>

<text x="55" y="175" font-size="13" fill="#475569">w(H) = 2×1 / 18 × 100%</text>
<text x="55" y="195" font-size="15" font-weight="700" fill="#3b82f6">= 11,1%</text>

<text x="55" y="225" font-size="13" fill="#475569">w(O) = 1×16 / 18 × 100%</text>
<text x="55" y="245" font-size="15" font-weight="700" fill="#10b981">= 88,9%</text>

<text x="55" y="275" font-size="12" fill="#64748b">Проверка: 11,1 + 88,9 = 100% ✓</text>

<!-- Pie chart H2O -->
<rect x="420" y="118" width="350" height="170" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="420" y="118" width="350" height="6" rx="3" fill="#8b5cf6"/>
<text x="595" y="148" text-anchor="middle" font-size="15" font-weight="700" fill="#8b5cf6">Диаграмма H<tspan font-size="11" baseline-shift="sub">2</tspan>O</text>

<circle cx="560" cy="225" r="55" fill="#3b82f6" stroke="#fff" stroke-width="2"/>
<!-- O slice is 88.9% ~ 320 degrees, H is 11.1% ~ 40 degrees -->
<path d="M560,225 L560,170 A55,55 0 1,1 522,181 Z" fill="#10b981" stroke="#fff" stroke-width="2"/>
<text x="570" y="240" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">O 88,9%</text>
<text x="548" y="190" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">H 11,1%</text>

<!-- Legend -->
<rect x="635" y="190" width="12" height="12" rx="3" fill="#3b82f6"/>
<text x="652" y="201" font-size="12" fill="#475569">H — 11,1%</text>
<rect x="635" y="210" width="12" height="12" rx="3" fill="#10b981"/>
<text x="652" y="221" font-size="12" fill="#475569">O — 88,9%</text>

<!-- CO2 example -->
<rect x="30" y="300" width="370" height="130" rx="14" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="300" width="370" height="6" rx="3" fill="#10b981"/>
<text x="215" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#10b981">Пример: CO<tspan font-size="11" baseline-shift="sub">2</tspan> (Mr = 44)</text>

<text x="55" y="358" font-size="13" fill="#475569">w(C) = 1×12 / 44 × 100% = <tspan font-weight="700" fill="#8b5cf6">27,3%</tspan></text>
<text x="55" y="380" font-size="13" fill="#475569">w(O) = 2×16 / 44 × 100% = <tspan font-weight="700" fill="#10b981">72,7%</tspan></text>
<text x="55" y="405" font-size="12" fill="#64748b">Проверка: 27,3 + 72,7 = 100% ✓</text>

<!-- CO2 pie chart -->
<rect x="420" y="300" width="350" height="130" rx="14" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="420" y="300" width="350" height="6" rx="3" fill="#8b5cf6"/>
<text x="595" y="330" text-anchor="middle" font-size="15" font-weight="700" fill="#8b5cf6">Диаграмма CO<tspan font-size="11" baseline-shift="sub">2</tspan></text>

<circle cx="560" cy="385" r="40" fill="#8b5cf6" stroke="#fff" stroke-width="2"/>
<path d="M560,385 L560,345 A40,40 0 0,1 595,360 Z" fill="#10b981" stroke="#fff" stroke-width="2"/>
<text x="555" y="392" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">O 72,7%</text>
<text x="572" y="356" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">C</text>

<rect x="620" y="360" width="12" height="12" rx="3" fill="#8b5cf6"/>
<text x="637" y="371" font-size="12" fill="#475569">C — 27,3%</text>
<rect x="620" y="380" width="12" height="12" rx="3" fill="#10b981"/>
<text x="637" y="391" font-size="12" fill="#475569">O — 72,7%</text>

<!-- Footer -->
<rect x="200" y="450" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="475" text-anchor="middle" font-size="12" fill="#94a3b8">Сумма массовых долей всех элементов в веществе равна 100%</text>
</svg>
