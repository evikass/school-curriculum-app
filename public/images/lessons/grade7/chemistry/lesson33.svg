  <text x="400" y="120" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#854d0e">CH<tspan baseline-shift="sub" font-size="75%">₃</tspan>COOH, NH<tspan baseline-shift="sub" font-size="75%">₃</tspan>·H<tspan baseline-shift="sub" font-size="75%">₂</tspan>O</text>
