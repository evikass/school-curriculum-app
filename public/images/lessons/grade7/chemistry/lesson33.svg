  <text x="657" y="145" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#991b1b">C<tspan baseline-shift="sub" font-size="75%">₂</tspan>H<tspan baseline-shift="sub" font-size="75%">₅</tspan>OH (спирт)</text>
