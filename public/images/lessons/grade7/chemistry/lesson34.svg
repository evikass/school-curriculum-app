</defs>
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#f8fafc" filter="url(#shadow)"/>
  <rect x="0" y="0" width="800" height="6" rx="3" fill="#6366f1"/>
  <text x="400" y="42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#4338ca">Классификация веществ</text>
  <rect x="330" y="60" width="140" height="40" rx="10" fill="#6366f1"/>
  <text x="400" y="87" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#ffffff">Вещества</text>
  <line x1="400" y1="100" x2="400" y2="125" stroke="#6366f1" stroke-width="2"/>
  <line x1="200" y1="125" x2="600" y2="125" stroke="#6366f1" stroke-width="2"/>
