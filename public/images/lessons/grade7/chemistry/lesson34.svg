  <line x1="600" y1="125" x2="600" y2="145" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowhead-6366f1)"/>
  <rect x="115" y="150" width="170" height="40" rx="10" fill="#8b5cf6"/>
  <text x="200" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#ffffff">Простые</text>
  <rect x="515" y="150" width="170" height="40" rx="10" fill="#a78bfa"/>
  <text x="600" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#ffffff">Сложные</text>
  <line x1="200" y1="190" x2="200" y2="210" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="140" y1="210" x2="260" y2="210" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="140" y1="210" x2="140" y2="225" stroke="#8b5cf6" stroke-width="2"/>
  <line x1="260" y1="210" x2="260" y2="225" stroke="#8b5cf6" stroke-width="2"/>
  <rect x="60" y="228" width="160" height="80" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="140" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#6d28d9">Металлы</text>
  <text x="140" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c3aed">Na, Fe, Cu</text>
  <text x="140" y="296" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#7c3aed">Блеск, ковкость</text>
  <rect x="180" y="228" width="160" height="80" rx="10" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="260" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#6d28d9">Неметаллы</text>
  <text x="260" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#7c3aed">O<tspan baseline-shift="sub" font-size="75%">₂</tspan>, S, Cl<tspan baseline-shift="sub" font-size="75%">₂</tspan></text>
  <text x="260" y="296" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#7c3aed">Хрупкие, тусклые</text>
  <line x1="600" y1="190" x2="600" y2="210" stroke="#a78bfa" stroke-width="2"/>
  <line x1="440" y1="210" x2="760" y2="210" stroke="#a78bfa" stroke-width="2"/>
  <line x1="440" y1="210" x2="440" y2="225" stroke="#a78bfa" stroke-width="2"/>
  <line x1="540" y1="210" x2="540" y2="225" stroke="#a78bfa" stroke-width="2"/>
  <line x1="640" y1="210" x2="640" y2="225" stroke="#a78bfa" stroke-width="2"/>
  <line x1="740" y1="210" x2="740" y2="225" stroke="#a78bfa" stroke-width="2"/>
  <rect x="375" y="228" width="130" height="80" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="440" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7c3aed">Оксиды</text>
  <text x="440" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#8b5cf6">CaO, CO<tspan baseline-shift="sub" font-size="75%">₂</tspan></text>
  <text x="440" y="296" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b5cf6">Эл. + O</text>
  <rect x="475" y="228" width="130" height="80" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="540" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7c3aed">Основания</text>
  <text x="540" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#8b5cf6">NaOH, Cu(OH)<tspan baseline-shift="sub" font-size="75%">₂</tspan></text>
  <text x="540" y="296" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b5cf6">Ме + OH</text>
  <rect x="575" y="228" width="130" height="80" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="640" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7c3aed">Кислоты</text>
  <text x="640" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#8b5cf6">HCl, H<tspan baseline-shift="sub" font-size="75%">₂</tspan>SO<tspan baseline-shift="sub" font-size="75%">₄</tspan></text>
  <text x="640" y="296" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b5cf6">H⁺ + кисл.остаток</text>
  <rect x="675" y="228" width="130" height="80" rx="10" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="740" y="252" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7c3aed">Соли</text>
  <text x="740" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#8b5cf6">NaCl, CaSO<tspan baseline-shift="sub" font-size="75%">₄</tspan></text>
  <text x="740" y="296" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b5cf6">Ме + кисл.остаток</text>
  <rect x="30" y="330" width="740" height="150" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="400" y="358" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600" fill="#6d28d9">Ключевые отличия</text>
  <line x1="400" y1="370" x2="400" y2="470" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="200" y="390" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7c3aed">Простые вещества</text>
  <text x="200" y="410" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6d28d9">Состоят из атомов одного элемента</text>
  <text x="200" y="432" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#8b5cf6">Fe, O<tspan baseline-shift="sub" font-size="75%">₂</tspan>, S, Na</text>
  <text x="200" y="455" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#a78bfa">Нельзя разложить химическим путём</text>
  <text x="600" y="390" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="600" fill="#7c3aed">Сложные вещества</text>
  <text x="600" y="410" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#6d28d9">Состоят из атомов разных элементов</text>
  <text x="600" y="432" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#8b5cf6">H<tspan baseline-shift="sub" font-size="75%">₂</tspan>O, NaCl, H<tspan baseline-shift="sub" font-size="75%">₂</tspan>SO<tspan baseline-shift="sub" font-size="75%">₄</tspan></text>
  <text x="600" y="455" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#a78bfa">Можно разложить на простые вещества</text>
</svg>
