<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .card-title { font-size: 13px; font-weight: 600; fill: #1e293b; }
    .card-text { font-size: 11px; fill: #475569; }
    .formula { font-size: 15px; fill: #334155; font-weight: 600; }
    .label { font-size: 12px; fill: #475569; }
    .small { font-size: 10px; fill: #94a3b8; }
    .accent-text { font-size: 12px; font-weight: 600; }
  </style>
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#f8fafc" filter="url(#shadow)"/>
  <!-- Accent bar -->
  <rect width="800" height="6" rx="3" fill="#0891b2"/>
  <!-- Title -->
  <text x="40" y="42" class="title">Растворимость</text>
  <rect x="40" y="50" width="60" height="3" rx="1.5" fill="#0891b2" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="40" y="72" class="subtitle">Зависимость растворимости от температуры. Кривые растворимости.</text>

  <!-- Solubility Curve Graph -->
  <g transform="translate(50, 85)">
    <!-- Graph background -->
    <rect width="470" height="340" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Grid lines -->
    <line x1="70" y1="30" x2="70" y2="300" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="150" y1="30" x2="150" y2="300" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="230" y1="30" x2="230" y2="300" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="310" y1="30" x2="310" y2="300" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="390" y1="30" x2="390" y2="300" stroke="#f1f5f9" stroke-width="1"/>

    <line x1="70" y1="250" x2="440" y2="250" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="70" y1="200" x2="440" y2="200" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="70" y1="150" x2="440" y2="150" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="70" y1="100" x2="440" y2="100" stroke="#f1f5f9" stroke-width="1"/>
    <line x1="70" y1="50" x2="440" y2="50" stroke="#f1f5f9" stroke-width="1"/>

    <!-- Axes -->
    <line x1="70" y1="300" x2="440" y2="300" stroke="#64748b" stroke-width="1.5"/>
    <line x1="70" y1="30" x2="70" y2="300" stroke="#64748b" stroke-width="1.5"/>

    <!-- Y-axis label -->
    <text x="20" y="170" text-anchor="middle" class="label" transform="rotate(-90, 20, 170)">Растворимость (г/100г H<tspan baseline-shift="sub" font-size="75%">2</tspan>O)</text>

    <!-- X-axis label -->
    <text x="255" y="330" text-anchor="middle" class="label">Температура (°C)</text>

    <!-- Y-axis ticks -->
    <text x="60" y="304" text-anchor="end" class="small">0</text>
    <text x="60" y="254" text-anchor="end" class="small">20</text>
    <text x="60" y="204" text-anchor="end" class="small">40</text>
    <text x="60" y="154" text-anchor="end" class="small">60</text>
    <text x="60" y="104" text-anchor="end" class="small">80</text>
    <text x="60" y="54" text-anchor="end" class="small">100</text>

    <!-- X-axis ticks -->
    <text x="70" y="315" text-anchor="middle" class="small">0</text>
    <text x="150" y="315" text-anchor="middle" class="small">20</text>
    <text x="230" y="315" text-anchor="middle" class="small">40</text>
    <text x="310" y="315" text-anchor="middle" class="small">60</text>
    <text x="390" y="315" text-anchor="middle" class="small">80</text>

    <!-- KNO3 curve (steep rise) -->
    <path d="M 70 285 Q 110 275 150 250 Q 190 220 230 180 Q 270 135 310 85 Q 350 50 390 35"
          fill="none" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="70" cy="285" r="3" fill="#0891b2"/>
    <circle cx="150" cy="250" r="3" fill="#0891b2"/>
    <circle cx="230" cy="180" r="3" fill="#0891b2"/>
    <circle cx="310" cy="85" r="3" fill="#0891b2"/>
    <circle cx="390" cy="35" r="3" fill="#0891b2"/>
    <text x="395" y="42" font-size="12" font-weight="600" fill="#0891b2">KNO<tspan baseline-shift="sub" font-size="75%">3</tspan></text>

    <!-- NaCl curve (nearly flat) -->
    <path d="M 70 240 Q 150 235 230 232 Q 310 228 390 222"
          fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="70" cy="240" r="3" fill="#f59e0b"/>
    <circle cx="150" cy="235" r="3" fill="#f59e0b"/>
    <circle cx="230" cy="232" r="3" fill="#f59e0b"/>
    <circle cx="310" cy="228" r="3" fill="#f59e0b"/>
    <circle cx="390" cy="222" r="3" fill="#f59e0b"/>
    <text x="395" y="228" font-size="12" font-weight="600" fill="#f59e0b">NaCl</text>

    <!-- Shaded regions for categories -->
    <!-- Above KNO3: supersaturated zone label -->
    <text x="200" y="110" class="small" fill="#94a3b8" font-style="italic">пересыщ.</text>
    <!-- Between curves -->
    <text x="200" y="220" class="small" fill="#94a3b8" font-style="italic">ненасыщ. для NaCl</text>
    <!-- Below both -->
    <text x="200" y="270" class="small" fill="#94a3b8" font-style="italic">ненасыщ. для обоих</text>
  </g>

  <!-- Right panel: Categories -->
  <g transform="translate(545, 85)">
    <rect width="220" height="165" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <text x="110" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Категории веществ</text>
    <line x1="15" y1="35" x2="205" y2="35" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Растворимые -->
    <rect x="15" y="45" width="12" height="12" rx="3" fill="#22c55e"/>
    <text x="35" y="55" font-size="12" font-weight="600" fill="#22c55e">Растворимые</text>
    <text x="35" y="70" class="small">> 1 г в 100 г воды</text>
    <text x="35" y="83" class="small">NaCl, KNO<tspan baseline-shift="sub" font-size="75%">3</tspan>, H<tspan baseline-shift="sub" font-size="75%">2</tspan>SO<tspan baseline-shift="sub" font-size="75%">4</tspan></text>

    <!-- Малорастворимые -->
    <rect x="15" y="93" width="12" height="12" rx="3" fill="#f59e0b"/>
    <text x="35" y="103" font-size="12" font-weight="600" fill="#f59e0b">Малорастворимые</text>
    <text x="35" y="118" class="small">0,01–1 г в 100 г воды</text>
    <text x="35" y="131" class="small">CaSO<tspan baseline-shift="sub" font-size="75%">4</tspan>, Ca(OH)<tspan baseline-shift="sub" font-size="75%">2</tspan></text>

    <!-- Нерастворимые -->
    <rect x="15" y="141" width="12" height="12" rx="3" fill="#ef4444"/>
    <text x="35" y="151" font-size="12" font-weight="600" fill="#ef4444">Нерастворимые</text>
    <text x="35" y="165" class="small">&lt; 0,01 г в 100 г воды</text>
  </g>

  <!-- Key insight box -->
  <g transform="translate(545, 265)">
    <rect width="220" height="100" rx="10" fill="#0891b2" opacity="0.07" stroke="#0891b2" stroke-width="1"/>
    <text x="110" y="22" text-anchor="middle" font-size="12" font-weight="600" fill="#0891b2">🔑 Ключевой факт</text>
    <line x1="15" y1="32" x2="205" y2="32" stroke="#0891b2" stroke-width="0.5" opacity="0.3"/>
    <text x="15" y="50" class="card-text">Растворимость большинства</text>
    <text x="15" y="66" class="card-text">твёрдых веществ растёт с</text>
    <text x="15" y="82" class="card-text">температурой, а газов — падает</text>
  </g>

  <!-- Bottom note -->
  <text x="400" y="480" text-anchor="middle" class="small">Кривая растворимости показывает максимальное количество вещества, растворимого при данной температуре</text>
</svg>
