<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#a855f7" rx="3"/>
<text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Типы реакций: замещение и обмен</text>

<!-- Left: Замещение -->
<rect x="20" y="58" width="375" height="260" rx="14" fill="#fff" stroke="#a855f7" stroke-width="2" filter="url(#shadow)"/>
<rect x="20" y="58" width="375" height="6" rx="3" fill="#a855f7"/>
<text x="208" y="88" text-anchor="middle" font-size="20" font-weight="700" fill="#a855f7">Замещение</text>

<!-- Block diagram A + BC → AC + B -->
<rect x="40" y="105" width="55" height="35" rx="8" fill="#e9d5ff" stroke="#a855f7" stroke-width="2"/>
<text x="68" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#a855f7">A</text>
<text x="108" y="128" text-anchor="middle" font-size="20" fill="#475569">+</text>
<rect x="125" y="105" width="75" height="35" rx="8" fill="#d8b4fe" stroke="#a855f7" stroke-width="2"/>
<text x="162" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#6b21a8">BC</text>
<text x="218" y="128" text-anchor="middle" font-size="20" fill="#a855f7">→</text>
<rect x="238" y="105" width="75" height="35" rx="8" fill="#c084fc" stroke="#a855f7" stroke-width="2"/>
<text x="275" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a5f">AC</text>
<text x="328" y="128" text-anchor="middle" font-size="20" fill="#475569">+</text>
<rect x="345" y="105" width="40" height="35" rx="8" fill="#e9d5ff" stroke="#a855f7" stroke-width="2"/>
<text x="365" y="128" text-anchor="middle" font-size="18" font-weight="700" fill="#a855f7">B</text>

<text x="208" y="160" text-anchor="middle" font-size="13" fill="#64748b">Атом вытесняет другой атом из соединения</text>

<!-- Example -->
<rect x="45" y="175" width="340" height="50" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1"/>
<text x="215" y="197" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a5f">Zn + 2HCl → ZnCl<tspan font-size="11" baseline-shift="sub">2</tspan> + H<tspan font-size="11" baseline-shift="sub">2</tspan>↑</text>
<text x="215" y="218" text-anchor="middle" font-size="11" fill="#64748b">цинк вытесняет водород из кислоты</text>

<rect x="45" y="235" width="340" height="50" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1"/>
<text x="215" y="257" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a5f">Fe + CuSO<tspan font-size="11" baseline-shift="sub">4</tspan> → FeSO<tspan font-size="11" baseline-shift="sub">4</tspan> + Cu↓</text>
<text x="215" y="278" text-anchor="middle" font-size="11" fill="#64748b">железо вытесняет медь из соли</text>

<!-- Highlight replaced part -->
<text x="208" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#a855f7">А замещает B в соединении BC</text>

<!-- Right: Обмен -->
<rect x="405" y="58" width="375" height="260" rx="14" fill="#fff" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
<rect x="405" y="58" width="375" height="6" rx="3" fill="#0ea5e9"/>
<text x="593" y="88" text-anchor="middle" font-size="20" font-weight="700" fill="#0ea5e9">Обмен</text>

<!-- Block diagram AB + CD → AD + CB -->
<rect x="420" y="105" width="65" height="35" rx="8" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
<text x="452" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#0ea5e9">AB</text>
<text x="498" y="128" text-anchor="middle" font-size="20" fill="#475569">+</text>
<rect x="515" y="105" width="65" height="35" rx="8" fill="#7dd3fc" stroke="#0ea5e9" stroke-width="2"/>
<text x="547" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#0369a1">CD</text>
<text x="598" y="128" text-anchor="middle" font-size="20" fill="#0ea5e9">→</text>
<rect x="618" y="105" width="65" height="35" rx="8" fill="#38bdf8" stroke="#0ea5e9" stroke-width="2"/>
<text x="650" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a5f">AD</text>
<text x="698" y="128" text-anchor="middle" font-size="20" fill="#475569">+</text>
<rect x="715" y="105" width="50" height="35" rx="8" fill="#bae6fd" stroke="#0ea5e9" stroke-width="2"/>
<text x="740" y="128" text-anchor="middle" font-size="16" font-weight="700" fill="#0ea5e9">CB</text>

<text x="593" y="160" text-anchor="middle" font-size="13" fill="#64748b">Соединения обмениваются частями</text>

<!-- Example -->
<rect x="430" y="175" width="340" height="50" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
<text x="600" y="197" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a5f">NaOH + HCl → NaCl + H<tspan font-size="11" baseline-shift="sub">2</tspan>O</text>
<text x="600" y="218" text-anchor="middle" font-size="11" fill="#64748b">щёлочь + кислота → соль + вода (нейтрализация)</text>

<rect x="430" y="235" width="340" height="50" rx="10" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
<text x="600" y="257" text-anchor="middle" font-size="16" font-weight="600" fill="#1e3a5f">BaCl<tspan font-size="11" baseline-shift="sub">2</tspan> + Na<tspan font-size="11" baseline-shift="sub">2</tspan>SO<tspan font-size="11" baseline-shift="sub">4</tspan> → BaSO<tspan font-size="11" baseline-shift="sub">4</tspan>↓ + 2NaCl</text>
<text x="600" y="278" text-anchor="middle" font-size="11" fill="#64748b">обмен ионами, выпадает осадок</text>

<text x="593" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#0ea5e9">Части соединений меняются местами</text>

<!-- Activity series -->
<rect x="20" y="330" width="760" height="105" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="20" y="330" width="760" height="6" rx="3" fill="#f59e0b"/>
<text x="400" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#f59e0b">Ряд активности металлов (для реакций замещения)</text>

<!-- Activity series bar -->
<rect x="50" y="370" width="700" height="30" rx="8" fill="#fef3c7"/>
<text x="90" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">K</text>
<text x="130" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">Na</text>
<text x="170" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">Ca</text>
<text x="210" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">Mg</text>
<text x="250" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">Al</text>
<text x="290" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">Zn</text>
<text x="330" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#65a30d">Fe</text>
<text x="370" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Ni</text>
<text x="410" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Sn</text>
<text x="450" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Pb</text>
<text x="490" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">H</text>
<text x="530" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#0ea5e9">Cu</text>
<text x="570" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#0ea5e9">Hg</text>
<text x="610" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#0ea5e9">Ag</text>
<text x="650" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#0ea5e9">Pt</text>
<text x="700" y="390" text-anchor="middle" font-size="12" font-weight="600" fill="#0ea5e9">Au</text>

<text x="90" y="410" font-size="10" fill="#dc2626">активные</text>
<text x="490" y="410" font-size="10" fill="#475569">← H →</text>
<text x="680" y="410" font-size="10" fill="#0ea5e9">малоактивные</text>

<!-- Arrow -->
<text x="400" y="430" text-anchor="middle" font-size="11" fill="#64748b">Металл слева от H вытесняет H из кислот  |  Левый металл вытесняет правый из солей</text>

<!-- Footer -->
<rect x="200" y="452" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="478" text-anchor="middle" font-size="12" fill="#94a3b8">Замещение — атом вытесняет атом; обмен — соединения обмениваются частями</text>
</svg>
