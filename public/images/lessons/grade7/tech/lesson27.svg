<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#EDE7F6" rx="12"/>
  
  <!-- Floor -->
  <rect x="0" y="430" width="800" height="70" fill="#D1C4E9" rx="0"/>
  
  <!-- Presentation board / flipchart stand -->
  <!-- Tripod legs -->
  <line x1="250" y1="430" x2="310" y2="380" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>
  <line x1="430" y1="430" x2="370" y2="380" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>
  <line x1="340" y1="430" x2="340" y2="380" stroke="#7B1FA2" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Board frame -->
  <rect x="200" y="50" width="280" height="330" rx="5" fill="#7B1FA2" stroke="#6A1B9A" stroke-width="3"/>
  <!-- Board surface (white) -->
  <rect x="210" y="60" width="260" height="310" rx="3" fill="white" stroke="#E1BEE7" stroke-width="1"/>
  
  <!-- Content on board - lines representing text -->
  <line x1="230" y1="85" x2="400" y2="85" stroke="#9C27B0" stroke-width="3" stroke-linecap="round"/>
  <line x1="230" y1="105" x2="380" y2="105" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="230" y1="118" x2="450" y2="118" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="230" y1="131" x2="420" y2="131" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="230" y1="144" x2="390" y2="144" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Checkmarks on the board -->
  <path d="M 235,170 L 242,180 L 255,162" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="260" y1="172" x2="400" y2="172" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
  
  <path d="M 235,200 L 242,210 L 255,192" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="260" y1="202" x2="420" y2="202" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
  
  <path d="M 235,230 L 242,240 L 255,222" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="260" y1="232" x2="380" y2="232" stroke="#CE93D8" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Star rating on board -->
  <!-- Star 1 (filled) -->
  <polygon points="260,270 265,282 278,282 268,290 271,303 260,295 249,303 252,290 242,282 255,282" fill="#FFC107" stroke="#FFA000" stroke-width="1"/>
  <!-- Star 2 (filled) -->
  <polygon points="305,270 310,282 323,282 313,290 316,303 305,295 294,303 297,290 287,282 300,282" fill="#FFC107" stroke="#FFA000" stroke-width="1"/>
  <!-- Star 3 (filled) -->
  <polygon points="350,270 355,282 368,282 358,290 361,303 350,295 339,303 342,290 332,282 345,282" fill="#FFC107" stroke="#FFA000" stroke-width="1"/>
  <!-- Star 4 (filled) -->
  <polygon points="395,270 400,282 413,282 403,290 406,303 395,295 384,303 387,290 377,282 390,282" fill="#FFC107" stroke="#FFA000" stroke-width="1"/>
  <!-- Star 5 (outline - not fully earned) -->
  <polygon points="440,270 445,282 458,282 448,290 451,303 440,295 429,303 432,290 422,282 435,282" fill="none" stroke="#FFC107" stroke-width="1.5"/>
  
  <!-- Progress bar on board -->
  <rect x="230" y="325" width="230" height="12" rx="6" fill="#E1BEE7"/>
  <rect x="230" y="325" width="185" height="12" rx="6" fill="#7B1FA2"/>
  <circle cx="415" cy="331" r="7" fill="#9C27B0" stroke="white" stroke-width="2"/>
  
  <!-- Person presenting (stick figure pointing at board) -->
  <circle cx="160" cy="300" r="20" fill="none" stroke="#5C6BC0" stroke-width="3"/>
  <!-- Body -->
  <line x1="160" y1="320" x2="160" y2="380" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round"/>
  <!-- Right arm pointing at board -->
  <line x1="160" y1="340" x2="210" y2="310" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round"/>
  <!-- Left arm down -->
  <line x1="160" y1="340" x2="130" y2="370" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="160" y1="380" x2="140" y2="430" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="380" x2="180" y2="430" stroke="#5C6BC0" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Audience / evaluator (sitting stick figure) -->
  <circle cx="600" cy="340" r="18" fill="none" stroke="#7E57C2" stroke-width="2.5"/>
  <line x1="600" y1="358" x2="600" y2="400" stroke="#7E57C2" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arms with clipboard -->
  <line x1="600" y1="375" x2="570" y2="390" stroke="#7E57C2" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="600" y1="375" x2="630" y2="390" stroke="#7E57C2" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs (sitting) -->
  <line x1="600" y1="400" x2="575" y2="425" stroke="#7E57C2" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="600" y1="400" x2="625" y2="425" stroke="#7E57C2" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Clipboard held by evaluator -->
  <rect x="618" y="375" width="30" height="40" rx="2" fill="#F5F0E8" stroke="#BBA880" stroke-width="1.5"/>
  <rect x="625" y="372" width="16" height="8" rx="2" fill="#BBA880"/>
  <line x1="624" y1="390" x2="642" y2="390" stroke="#CCC" stroke-width="1"/>
  <line x1="624" y1="398" x2="642" y2="398" stroke="#CCC" stroke-width="1"/>
  <line x1="624" y1="406" x2="638" y2="406" stroke="#CCC" stroke-width="1"/>
  
  <!-- Second audience member (smaller, in background) -->
  <circle cx="680" cy="355" r="14" fill="none" stroke="#9575CD" stroke-width="2" opacity="0.7"/>
  <line x1="680" y1="369" x2="680" y2="405" stroke="#9575CD" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="680" y1="385" x2="660" y2="400" stroke="#9575CD" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="680" y1="385" x2="700" y2="400" stroke="#9575CD" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="680" y1="405" x2="665" y2="430" stroke="#9575CD" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="680" y1="405" x2="695" y2="430" stroke="#9575CD" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Speech/thought bubble from presenter -->
  <ellipse cx="100" cy="255" rx="40" ry="25" fill="white" stroke="#5C6BC0" stroke-width="1.5" opacity="0.8"/>
  <circle cx="120" cy="272" r="6" fill="white" stroke="#5C6BC0" stroke-width="1" opacity="0.8"/>
  <circle cx="133" cy="282" r="4" fill="white" stroke="#5C6BC0" stroke-width="1" opacity="0.8"/>
  <!-- Exclamation mark in bubble -->
  <line x1="100" y1="245" x2="100" y2="260" stroke="#5C6BC0" stroke-width="2.5"/>
  <circle cx="100" cy="265" r="2" fill="#5C6BC0"/>
</svg>