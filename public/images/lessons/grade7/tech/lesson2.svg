<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a1610"/>
  <!-- Wood piece being worked -->
  <rect x="200" y="120" width="200" height="50" rx="2" fill="#6d4c41" stroke="#8d6e63" stroke-width="1"/>
  <!-- Wood grain -->
  <path d="M205,130 Q300,127 395,132" fill="none" stroke="#795548" stroke-width="0.8" opacity="0.5"/>
  <path d="M205,142 Q300,139 395,144" fill="none" stroke="#795548" stroke-width="0.8" opacity="0.5"/>
  <path d="M205,154 Q300,151 395,156" fill="none" stroke="#795548" stroke-width="0.8" opacity="0.5"/>
  <!-- Saw -->
  <rect x="40" y="30" width="8" height="70" rx="2" fill="#795548" stroke="#5d4037" stroke-width="1"/>
  <rect x="48" y="30" width="100" height="14" rx="2" fill="#b0bec5" stroke="#78909c" stroke-width="1"/>
  <!-- Saw teeth -->
  <polygon points="52,44 56,44 54,50" fill="#90a4ae"/>
  <polygon points="60,44 64,44 62,50" fill="#90a4ae"/>
  <polygon points="68,44 72,44 70,50" fill="#90a4ae"/>
  <polygon points="76,44 80,44 78,50" fill="#90a4ae"/>
  <polygon points="84,44 88,44 86,50" fill="#90a4ae"/>
  <polygon points="92,44 96,44 94,50" fill="#90a4ae"/>
  <polygon points="100,44 104,44 102,50" fill="#90a4ae"/>
  <polygon points="108,44 112,44 110,50" fill="#90a4ae"/>
  <polygon points="116,44 120,44 118,50" fill="#90a4ae"/>
  <polygon points="124,44 128,44 126,50" fill="#90a4ae"/>
  <polygon points="132,44 136,44 134,50" fill="#90a4ae"/>
  <polygon points="140,44 144,44 142,50" fill="#90a4ae"/>
  <!-- Saw label -->
  <text x="65" y="25" font-size="10" fill="#b0bec5">Пила</text>
  <!-- Sawing motion arrow -->
  <path d="M70,58 Q70,65 100,65" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.6"/>
  <polygon points="100,65 94,60 94,70" fill="#ff9800" opacity="0.6"/>
  <!-- Plane -->
  <rect x="40" y="190" width="90" height="30" rx="4" fill="#5d4037" stroke="#8d6e63" stroke-width="1.5"/>
  <rect x="45" y="200" width="30" height="10" rx="2" fill="#b0bec5" stroke="#78909c" stroke-width="1"/>
  <!-- Plane blade -->
  <rect x="75" y="196" width="8" height="18" rx="1" fill="#90a4ae"/>
  <!-- Plane handle -->
  <rect x="110" y="185" width="15" height="40" rx="4" fill="#4e342e" stroke="#5d4037" stroke-width="1"/>
  <text x="50" y="185" font-size="10" fill="#bcaaa4">Рубанок</text>
  <!-- Shavings -->
  <path d="M140,205 Q150,195 145,190 Q155,185 150,195" fill="none" stroke="#a1887f" stroke-width="1.5" opacity="0.5"/>
  <path d="M145,210 Q155,200 152,195 Q162,190 157,200" fill="none" stroke="#a1887f" stroke-width="1.5" opacity="0.4"/>
  <!-- Chisel -->
  <rect x="280" y="30" width="12" height="60" rx="2" fill="#5d4037" stroke="#4e342e" stroke-width="1"/>
  <rect x="282" y="90" width="8" height="30" rx="1" fill="#b0bec5" stroke="#78909c" stroke-width="1"/>
  <!-- Chisel blade angle -->
  <polygon points="282,120 290,120 286,128" fill="#90a4ae"/>
  <text x="270" y="25" font-size="10" fill="#bcaaa4">Стамеска</text>
  <!-- Chisel action -->
  <path d="M286,130 L286,145" stroke="#ff9800" stroke-width="1.5" opacity="0.5"/>
  <polygon points="286,145 282,138 290,138" fill="#ff9800" opacity="0.5"/>
  <!-- Workbench vise -->
  <rect x="300" y="200" width="150" height="15" rx="2" fill="#37474f" stroke="#546e7a" stroke-width="1"/>
  <rect x="310" y="215" width="15" height="40" rx="1" fill="#455a64"/>
  <rect x="425" y="215" width="15" height="40" rx="1" fill="#455a64"/>
  <rect x="305" y="170" width="15" height="30" rx="1" fill="#455a64" stroke="#546e7a" stroke-width="1"/>
  <!-- Safety section -->
  <rect x="30" y="260" width="440" height="60" rx="6" fill="#1a1410" stroke="#ef5350" stroke-width="1"/>
  <text x="50" y="280" font-size="10" fill="#ef5350" font-weight="bold">⚠ Техника безопасности:</text>
  <text x="50" y="298" font-size="8" fill="#ffcdd2">• Надёжно закрепляй заготовку в тисках</text>
  <text x="50" y="312" font-size="8" fill="#ffcdd2">• Инструмент направляй от себя • Не работай тупым инструментом</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Ручная обработка древесины</text>
</svg>