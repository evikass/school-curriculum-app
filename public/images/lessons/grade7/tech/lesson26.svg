<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#FFF8E7" rx="12"/>
  
  <!-- Table surface -->
  <rect x="50" y="350" width="700" height="15" rx="3" fill="#D4C4A0" stroke="#BBA880" stroke-width="1.5"/>
  <rect x="80" y="365" width="15" height="120" rx="2" fill="#C4B48A" stroke="#BBA880" stroke-width="1"/>
  <rect x="705" y="365" width="15" height="120" rx="2" fill="#C4B48A" stroke="#BBA880" stroke-width="1"/>
  
  <!-- Tablecloth -->
  <path d="M 50,350 Q 50,370 60,365 L 740,365 Q 750,370 750,350" fill="#F5ECD5" stroke="#E8DCC0" stroke-width="1"/>
  
  <!-- Large salad bowl -->
  <ellipse cx="400" cy="320" rx="160" ry="40" fill="#8BC34A" opacity="0.15"/>
  <path d="M 240,280 Q 240,350 400,350 Q 560,350 560,280" fill="#F0E8D0" stroke="#D4C4A0" stroke-width="2"/>
  <ellipse cx="400" cy="280" rx="160" ry="35" fill="#F8F0DC" stroke="#D4C4A0" stroke-width="2"/>
  <ellipse cx="400" cy="278" rx="150" ry="28" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
  
  <!-- Lettuce base in bowl -->
  <ellipse cx="400" cy="275" rx="130" ry="22" fill="#81C784" opacity="0.5"/>
  <path d="M 300,270 Q 330,255 350,270" fill="#66BB6A" opacity="0.6"/>
  <path d="M 350,278 Q 380,260 400,275" fill="#81C784" opacity="0.5"/>
  <path d="M 420,268 Q 450,252 470,268" fill="#66BB6A" opacity="0.6"/>
  <path d="M 450,275 Q 475,260 500,275" fill="#81C784" opacity="0.5"/>
  
  <!-- Tomato slices in bowl -->
  <ellipse cx="360" cy="265" rx="20" ry="14" fill="#EF5350" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="360" y1="253" x2="360" y2="278" stroke="#E57373" stroke-width="1"/>
  <line x1="348" y1="258" x2="372" y2="272" stroke="#E57373" stroke-width="0.8"/>
  <line x1="372" y1="258" x2="348" y2="272" stroke="#E57373" stroke-width="0.8"/>
  <ellipse cx="360" cy="265" rx="8" ry="5" fill="#FFCDD2" opacity="0.5"/>
  
  <ellipse cx="430" cy="260" rx="18" ry="12" fill="#EF5350" stroke="#D32F2F" stroke-width="1.5"/>
  <line x1="430" y1="250" x2="430" y2="271" stroke="#E57373" stroke-width="1"/>
  <line x1="419" y1="254" x2="441" y2="266" stroke="#E57373" stroke-width="0.8"/>
  <line x1="441" y1="254" x2="419" y2="266" stroke="#E57373" stroke-width="0.8"/>
  <ellipse cx="430" cy="260" rx="7" ry="4" fill="#FFCDD2" opacity="0.5"/>
  
  <!-- Cucumber slices in bowl -->
  <ellipse cx="390" cy="258" rx="12" ry="10" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1.5"/>
  <ellipse cx="390" cy="258" rx="6" ry="5" fill="#E8F5E9" opacity="0.6"/>
  <circle cx="388" cy="256" r="1" fill="#66BB6A" opacity="0.7"/>
  <circle cx="392" cy="260" r="1" fill="#66BB6A" opacity="0.7"/>
  <circle cx="390" cy="254" r="0.8" fill="#66BB6A" opacity="0.7"/>
  
  <ellipse cx="460" cy="268" rx="11" ry="9" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1.5"/>
  <ellipse cx="460" cy="268" rx="5" ry="4" fill="#E8F5E9" opacity="0.6"/>
  <circle cx="458" cy="266" r="1" fill="#66BB6A" opacity="0.7"/>
  <circle cx="462" cy="270" r="1" fill="#66BB6A" opacity="0.7"/>
  
  <!-- Carrot sticks in bowl -->
  <rect x="330" y="255" width="6" height="30" rx="2" fill="#FF9800" stroke="#F57C00" stroke-width="1" transform="rotate(-15,333,270)"/>
  <rect x="345" y="252" width="6" height="28" rx="2" fill="#FFB74D" stroke="#FF9800" stroke-width="1" transform="rotate(-5,348,266)"/>
  
  <!-- Bell pepper strips in bowl -->
  <path d="M 480,258 Q 485,270 490,258" fill="none" stroke="#FF5722" stroke-width="3" stroke-linecap="round"/>
  <path d="M 495,262 Q 500,272 505,262" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
  <path d="M 510,265 Q 514,274 518,265" fill="none" stroke="#FFC107" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Whole tomato (decorative, on table) -->
  <circle cx="180" cy="335" r="25" fill="#EF5350" stroke="#D32F2F" stroke-width="2"/>
  <path d="M 170,312 Q 180,305 190,312" fill="#4CAF50" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="180" y1="312" x2="180" y2="305" stroke="#388E3C" stroke-width="2"/>
  
  <!-- Whole cucumber (on table) -->
  <rect x="580" y="325" width="80" height="22" rx="11" fill="#7CB342" stroke="#558B2F" stroke-width="2"/>
  <line x1="595" y1="328" x2="595" y2="344" stroke="#689F38" stroke-width="0.8" opacity="0.5"/>
  <line x1="610" y1="327" x2="610" y2="345" stroke="#689F38" stroke-width="0.8" opacity="0.5"/>
  <line x1="625" y1="328" x2="625" y2="344" stroke="#689F38" stroke-width="0.8" opacity="0.5"/>
  <line x1="640" y1="329" x2="640" y2="343" stroke="#689F38" stroke-width="0.8" opacity="0.5"/>
  <!-- Cucumber flower end -->
  <circle cx="580" cy="336" r="3" fill="#8BC34A"/>
  
  <!-- Carrot (on table) -->
  <path d="M 110,345 L 190,340 L 185,355 Z" fill="#FF9800" stroke="#F57C00" stroke-width="1.5"/>
  <path d="M 185,335 Q 190,325 195,335" fill="#4CAF50" stroke="#388E3C" stroke-width="1"/>
  <path d="M 188,333 Q 195,320 198,333" fill="#66BB6A" stroke="#388E3C" stroke-width="1"/>
  <path d="M 182,336 Q 185,328 190,336" fill="#81C784" stroke="#388E3C" stroke-width="1"/>
  <!-- Carrot lines -->
  <line x1="130" y1="343" x2="130" y2="353" stroke="#F57C00" stroke-width="0.8" opacity="0.5"/>
  <line x1="150" y1="342" x2="150" y2="354" stroke="#F57C00" stroke-width="0.8" opacity="0.5"/>
  <line x1="170" y1="341" x2="170" y2="355" stroke="#F57C00" stroke-width="0.8" opacity="0.5"/>
  
  <!-- Bell pepper (on table) -->
  <path d="M 660,340 Q 655,310 670,300 Q 680,295 690,300 Q 705,310 700,340 Q 695,350 680,352 Q 665,350 660,340 Z" fill="#FF5722" stroke="#E64A19" stroke-width="1.5"/>
  <path d="M 675,300 Q 680,290 685,300" fill="#4CAF50" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="680" y1="295" x2="680" y2="288" stroke="#388E3C" stroke-width="2"/>
  
  <!-- Salad servers (fork and spoon crossed) -->
  <g transform="translate(250, 100) rotate(25)">
    <!-- Spoon -->
    <ellipse cx="60" cy="10" rx="12" ry="8" fill="#C4A882" stroke="#A08060" stroke-width="1.5"/>
    <rect x="50" y="14" width="20" height="4" rx="2" fill="#C4A882" stroke="#A08060" stroke-width="1"/>
    <rect x="68" y="11" width="100" height="5" rx="2" fill="#D4B892" stroke="#A08060" stroke-width="1"/>
  </g>
  <g transform="translate(300, 100) rotate(-25)">
    <!-- Fork -->
    <line x1="55" y1="0" x2="55" y2="15" stroke="#C4A882" stroke-width="2"/>
    <line x1="60" y1="-5" x2="60" y2="15" stroke="#C4A882" stroke-width="2"/>
    <line x1="65" y1="0" x2="65" y2="15" stroke="#C4A882" stroke-width="2"/>
    <rect x="53" y="15" width="14" height="4" rx="1" fill="#C4A882" stroke="#A08060" stroke-width="1"/>
    <rect x="68" y="13" width="100" height="5" rx="2" fill="#D4B892" stroke="#A08060" stroke-width="1"/>
  </g>
</svg>