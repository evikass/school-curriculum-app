<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#F5F0E8" rx="12"/>
  
  <!-- Workbench surface -->
  <rect x="50" y="300" width="700" height="25" rx="3" fill="#B8A07A" stroke="#9C8560" stroke-width="2"/>
  <rect x="60" y="325" width="80" height="140" rx="3" fill="#9C8560" stroke="#806D48" stroke-width="1.5"/>
  <rect x="660" y="325" width="80" height="140" rx="3" fill="#9C8560" stroke="#806D48" stroke-width="1.5"/>
  <!-- Workbench cross beam -->
  <rect x="60" y="400" width="680" height="8" rx="2" fill="#9C8560" stroke="#806D48" stroke-width="1"/>
  
  <!-- Vice on workbench -->
  <rect x="100" y="275" width="50" height="25" rx="2" fill="#888" stroke="#666" stroke-width="1.5"/>
  <rect x="105" y="280" width="15" height="15" rx="1" fill="#999" stroke="#777" stroke-width="1"/>
  <rect x="130" y="280" width="15" height="15" rx="1" fill="#999" stroke="#777" stroke-width="1"/>
  <rect x="150" y="265" width="8" height="35" rx="1" fill="#888" stroke="#666" stroke-width="1"/>
  
  <!-- Hacksaw -->
  <g transform="translate(200, 180)">
    <!-- Frame (C-shape) -->
    <path d="M 0,0 L 0,80 Q 0,100 20,100 L 180,100 Q 200,100 200,80 L 200,60" 
          fill="none" stroke="#888" stroke-width="5" stroke-linecap="round"/>
    <!-- Handle -->
    <rect x="-10" y="-20" width="25" height="25" rx="5" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>
    <line x1="5" y1="-15" x2="5" y2="5" stroke="#C4960F" stroke-width="1"/>
    <!-- Blade -->
    <line x1="200" y1="60" x2="0" y2="0" stroke="#B0B0B0" stroke-width="1.5"/>
    <!-- Blade teeth (small marks) -->
    <line x1="40" y1="12" x2="42" y2="8" stroke="#999" stroke-width="0.8"/>
    <line x1="60" y1="24" x2="62" y2="20" stroke="#999" stroke-width="0.8"/>
    <line x1="80" y1="36" x2="82" y2="32" stroke="#999" stroke-width="0.8"/>
    <line x1="100" y1="48" x2="102" y2="44" stroke="#999" stroke-width="0.8"/>
    <line x1="120" y1="60" x2="122" y2="56" stroke="#999" stroke-width="0.8"/>
    <line x1="140" y1="72" x2="142" y2="68" stroke="#999" stroke-width="0.8"/>
    <line x1="160" y1="84" x2="162" y2="80" stroke="#999" stroke-width="0.8"/>
    <!-- Wing nut at blade attachment -->
    <circle cx="200" cy="60" r="5" fill="#AAA" stroke="#888" stroke-width="1"/>
    <circle cx="0" cy="0" r="5" fill="#AAA" stroke="#888" stroke-width="1"/>
  </g>
  
  <!-- File (rasp) -->
  <g transform="translate(420, 200)">
    <!-- Handle -->
    <rect x="0" y="-8" width="80" height="16" rx="6" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>
    <line x1="20" y1="-5" x2="20" y2="5" stroke="#C4960F" stroke-width="1"/>
    <line x1="35" y1="-5" x2="35" y2="5" stroke="#C4960F" stroke-width="1"/>
    <line x1="50" y1="-5" x2="50" y2="5" stroke="#C4960F" stroke-width="1"/>
    <line x1="65" y1="-5" x2="65" y2="5" stroke="#C4960F" stroke-width="1"/>
    <!-- Tang (metal part going into handle) -->
    <rect x="78" y="-3" width="20" height="6" rx="1" fill="#AAA" stroke="#888" stroke-width="1"/>
    <!-- Blade -->
    <path d="M 98,-7 L 280,-5 Q 285,0 280,5 L 98,7 Z" fill="#B8B8B8" stroke="#999" stroke-width="1"/>
    <!-- File teeth pattern (cross-hatching) -->
    <line x1="110" y1="-5" x2="115" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="120" y1="-5" x2="125" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="130" y1="-5" x2="135" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="140" y1="-5" x2="145" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="150" y1="-5" x2="155" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="160" y1="-5" x2="165" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="170" y1="-5" x2="175" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="180" y1="-5" x2="185" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="190" y1="-5" x2="195" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="200" y1="-5" x2="205" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="210" y1="-5" x2="215" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="220" y1="-5" x2="225" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="230" y1="-5" x2="235" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="240" y1="-5" x2="245" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="250" y1="-5" x2="255" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="260" y1="-5" x2="265" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="115" y1="-5" x2="110" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="125" y1="-5" x2="120" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="135" y1="-5" x2="130" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="145" y1="-5" x2="140" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="155" y1="-5" x2="150" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="165" y1="-5" x2="160" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="175" y1="-5" x2="170" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="185" y1="-5" x2="180" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="195" y1="-5" x2="190" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="205" y1="-5" x2="200" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="215" y1="-5" x2="210" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="225" y1="-5" x2="220" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="235" y1="-5" x2="230" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="245" y1="-5" x2="240" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="255" y1="-5" x2="250" y2="5" stroke="#999" stroke-width="0.5"/>
    <line x1="265" y1="-5" x2="260" y2="5" stroke="#999" stroke-width="0.5"/>
  </g>
  
  <!-- Pliers -->
  <g transform="translate(300, 330)">
    <!-- Left jaw -->
    <path d="M 40,0 L 70,-25 L 75,-20 L 50,5 Z" fill="#AAA" stroke="#888" stroke-width="1.5"/>
    <!-- Right jaw -->
    <path d="M 40,0 L 70,25 L 75,20 L 50,-5 Z" fill="#AAA" stroke="#888" stroke-width="1.5"/>
    <!-- Jaw teeth/grip -->
    <line x1="55" y1="-18" x2="58" y2="-15" stroke="#777" stroke-width="1"/>
    <line x1="60" y1="-22" x2="63" y2="-19" stroke="#777" stroke-width="1"/>
    <line x1="65" y1="-25" x2="68" y2="-22" stroke="#777" stroke-width="1"/>
    <line x1="55" y1="18" x2="58" y2="15" stroke="#777" stroke-width="1"/>
    <line x1="60" y1="22" x2="63" y2="19" stroke="#777" stroke-width="1"/>
    <line x1="65" y1="25" x2="68" y2="22" stroke="#777" stroke-width="1"/>
    <!-- Pivot point -->
    <circle cx="40" cy="0" r="5" fill="#999" stroke="#777" stroke-width="1.5"/>
    <circle cx="40" cy="0" r="2" fill="#777"/>
    <!-- Left handle -->
    <path d="M 35,-3 L 0,-15 Q -5,-15 -5,-10 L -5,0 Q -5,3 0,2 L 35,3" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>
    <!-- Right handle -->
    <path d="M 35,3 L 0,15 Q -5,15 -5,10 L -5,0 Q -5,-3 0,-2 L 35,-3" fill="#D4A017" stroke="#B8860B" stroke-width="1.5"/>
  </g>
  
  <!-- Metal piece (being worked on) in the vice -->
  <rect x="115" y="280" width="8" height="40" rx="1" fill="#C0C0C0" stroke="#A0A0A0" stroke-width="1"/>
  
  <!-- Metal shavings on workbench -->
  <path d="M 180,295 Q 185,290 190,295 Q 195,290 200,295" fill="none" stroke="#BBB" stroke-width="1"/>
  <path d="M 450,295 Q 455,290 460,295 Q 465,290 470,295" fill="none" stroke="#BBB" stroke-width="1"/>
  <path d="M 550,298 Q 553,293 556,298 Q 559,293 562,298" fill="none" stroke="#BBB" stroke-width="0.8"/>
  
  <!-- Safety goggles on workbench -->
  <ellipse cx="550" cy="290" rx="25" ry="10" fill="none" stroke="#4A90C4" stroke-width="2"/>
  <ellipse cx="540" cy="288" rx="10" ry="7" fill="#B8D4E8" stroke="#4A90C4" stroke-width="1.5"/>
  <ellipse cx="560" cy="288" rx="10" ry="7" fill="#B8D4E8" stroke="#4A90C4" stroke-width="1.5"/>
  <path d="M 530,288 Q 520,282 515,288" fill="none" stroke="#4A90C4" stroke-width="1.5"/>
  <path d="M 570,288 Q 580,282 585,288" fill="none" stroke="#4A90C4" stroke-width="1.5"/>
</svg>