<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1218"/>
  <!-- Presentation board -->
  <rect x="100" y="30" width="250" height="180" rx="4" fill="#eceff1" stroke="#90a4ae" stroke-width="2"/>
  <!-- Board content -->
  <text x="150" y="55" font-size="12" fill="#37474f" font-weight="bold">Мой проект</text>
  <line x1="120" y1="60" x2="330" y2="60" stroke="#b0bec5" stroke-width="1"/>
  <!-- Charts on board -->
  <rect x="130" y="75" width="15" height="40" fill="#42a5f5" opacity="0.6"/>
  <rect x="155" y="85" width="15" height="30" fill="#66bb6a" opacity="0.6"/>
  <rect x="180" y="70" width="15" height="45" fill="#ff9800" opacity="0.6"/>
  <rect x="205" y="90" width="15" height="25" fill="#ef5350" opacity="0.6"/>
  <!-- Key points on board -->
  <circle cx="130" cy="135" r="3" fill="#37474f"/>
  <text x="140" y="138" font-size="8" fill="#546e7a">Цель проекта</text>
  <circle cx="130" cy="152" r="3" fill="#37474f"/>
  <text x="140" y="155" font-size="8" fill="#546e7a">Ход работы</text>
  <circle cx="130" cy="169" r="3" fill="#37474f"/>
  <text x="140" y="172" font-size="8" fill="#546e7a">Результаты</text>
  <circle cx="130" cy="186" r="3" fill="#37474f"/>
  <text x="140" y="189" font-size="8" fill="#546e7a">Выводы</text>
  <!-- Board stand -->
  <rect x="220" y="210" width="10" height="40" fill="#78909c"/>
  <rect x="195" y="250" width="60" height="6" rx="3" fill="#78909c"/>
  <!-- Presenter (stick figure) -->
  <circle cx="420" cy="100" r="16" fill="#e0e0e0" opacity="0.8"/>
  <line x1="420" y1="116" x2="420" y2="170" stroke="#e0e0e0" stroke-width="3" opacity="0.7"/>
  <!-- Arm pointing to board -->
  <line x1="420" y1="135" x2="380" y2="125" stroke="#e0e0e0" stroke-width="2.5" opacity="0.7"/>
  <line x1="420" y1="135" x2="445" y2="155" stroke="#e0e0e0" stroke-width="2.5" opacity="0.7"/>
  <!-- Legs -->
  <line x1="420" y1="170" x2="405" y2="210" stroke="#e0e0e0" stroke-width="2.5" opacity="0.7"/>
  <line x1="420" y1="170" x2="435" y2="210" stroke="#e0e0e0" stroke-width="2.5" opacity="0.7"/>
  <!-- Audience -->
  <circle cx="60" cy="280" r="10" fill="#546e7a" opacity="0.5"/>
  <circle cx="90" cy="280" r="10" fill="#546e7a" opacity="0.4"/>
  <circle cx="120" cy="280" r="10" fill="#546e7a" opacity="0.5"/>
  <circle cx="150" cy="280" r="10" fill="#546e7a" opacity="0.4"/>
  <circle cx="180" cy="280" r="10" fill="#546e7a" opacity="0.5"/>
  <!-- Evaluation criteria -->
  <rect x="230" y="265" width="240" height="60" rx="6" fill="#1a2332" stroke="#7c4dff" stroke-width="1"/>
  <text x="245" y="283" font-size="10" fill="#b388ff" font-weight="bold">Критерии оценки:</text>
  <text x="245" y="298" font-size="8" fill="#9fa8da">⭐ Оригинальность • Качество • Полнота</text>
  <text x="245" y="313" font-size="8" fill="#9fa8da">⭐ Презентация • Ответы на вопросы</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Защита и оценка проекта</text>
</svg>