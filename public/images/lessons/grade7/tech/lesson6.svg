<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1a0d"/>
  <!-- Cutting board -->
  <rect x="50" y="100" width="160" height="120" rx="6" fill="#8d6e63" stroke="#6d4c41" stroke-width="2"/>
  <!-- Wood grain on board -->
  <line x1="60" y1="120" x2="200" y2="120" stroke="#795548" stroke-width="0.5" opacity="0.4"/>
  <line x1="60" y1="140" x2="200" y2="140" stroke="#795548" stroke-width="0.5" opacity="0.4"/>
  <line x1="60" y1="160" x2="200" y2="160" stroke="#795548" stroke-width="0.5" opacity="0.4"/>
  <line x1="60" y1="180" x2="200" y2="180" stroke="#795548" stroke-width="0.5" opacity="0.4"/>
  <line x1="60" y1="200" x2="200" y2="200" stroke="#795548" stroke-width="0.5" opacity="0.4"/>
  <!-- Vegetables on cutting board -->
  <!-- Tomato -->
  <circle cx="100" cy="140" r="18" fill="#e53935" stroke="#c62828" stroke-width="1"/>
  <path d="M92,124 Q100,118 108,124" fill="none" stroke="#4caf50" stroke-width="2"/>
  <text x="85" y="170" font-size="7" fill="#ef9a9a">Помидор</text>
  <!-- Cucumber -->
  <ellipse cx="160" cy="140" rx="30" ry="10" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
  <ellipse cx="160" cy="138" rx="28" ry="4" fill="#66bb6a" opacity="0.5"/>
  <text x="140" y="162" font-size="7" fill="#a5d6a7">Огурец</text>
  <!-- Carrot -->
  <polygon points="90,185 90,210 110,210" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
  <path d="M85,187 Q90,180 95,187" fill="#4caf50" stroke="none"/>
  <text x="80" y="225" font-size="7" fill="#ffcc80">Морковь</text>
  <!-- Pepper -->
  <path d="M145,190 Q145,180 155,175 Q165,180 165,190 Q165,210 155,215 Q145,210 145,190" fill="#f44336" stroke="#c62828" stroke-width="1"/>
  <rect x="152" y="170" width="6" height="8" rx="2" fill="#4caf50"/>
  <text x="138" y="230" font-size="7" fill="#ef9a9a">Перец</text>
  <!-- Knife -->
  <rect x="225" y="110" width="80" height="6" rx="1" fill="#b0bec5" stroke="#78909c" stroke-width="1"/>
  <polygon points="305,110 320,113 305,116" fill="#90a4ae"/>
  <rect x="215" y="106" width="15" height="14" rx="3" fill="#5d4037" stroke="#4e342e" stroke-width="1"/>
  <text x="225" y="135" font-size="8" fill="#b0bec5">Нож</text>
  <!-- Salad bowl -->
  <ellipse cx="380" cy="160" rx="70" ry="30" fill="#2e7d32" stroke="#4caf50" stroke-width="2"/>
  <path d="M310,160 Q310,220 380,220 Q450,220 450,160" fill="#1b5e20" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- Salad contents visible -->
  <circle cx="360" cy="165" r="8" fill="#e53935" opacity="0.6"/>
  <circle cx="385" cy="158" r="6" fill="#4caf50" opacity="0.6"/>
  <circle cx="400" cy="168" r="7" fill="#ff9800" opacity="0.6"/>
  <ellipse cx="370" cy="175" rx="10" ry="4" fill="#66bb6a" opacity="0.4"/>
  <text x="345" y="240" font-size="9" fill="#a5d6a7">Салат</text>
  <!-- Arrow from board to bowl -->
  <path d="M210,160 Q260,140 310,160" fill="none" stroke="#66bb6a" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <polygon points="310,160 302,155 304,165" fill="#66bb6a" opacity="0.5"/>
  <!-- Nutrition info -->
  <rect x="30" y="260" width="440" height="60" rx="6" fill="#0d1a10" stroke="#2e7d32" stroke-width="1"/>
  <text x="50" y="280" font-size="10" fill="#a5d6a7" font-weight="bold">Польза овощей:</text>
  <text x="50" y="296" font-size="8" fill="#81c784">🥕 Витамины A, C, K • Клетчатка • Минералы • Низкая калорийность</text>
  <text x="50" y="312" font-size="8" fill="#66bb6a">🥗 Ешьте 5 порций овощей и фруктов в день!</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Блюда из овощей и салаты</text>
</svg>