<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a1510"/>
  <!-- Bowl with eggs -->
  <ellipse cx="120" cy="120" rx="55" ry="25" fill="#f5f5dc" stroke="#d7ccc8" stroke-width="1.5"/>
  <path d="M65,120 Q65,160 120,160 Q175,160 175,120" fill="#f5f5dc" stroke="#d7ccc8" stroke-width="1"/>
  <!-- Eggs in bowl -->
  <ellipse cx="105" cy="110" rx="14" ry="18" fill="#fff8e1" stroke="#ffe0b2" stroke-width="1" transform="rotate(-10,105,110)"/>
  <ellipse cx="130" cy="108" rx="14" ry="18" fill="#fff8e1" stroke="#ffe0b2" stroke-width="1" transform="rotate(5,130,108)"/>
  <text x="85" y="180" font-size="9" fill="#ffe0b2">Яйца</text>
  <!-- Whisk -->
  <rect x="200" y="40" width="6" height="50" rx="2" fill="#78909c" stroke="#90a4ae" stroke-width="1"/>
  <path d="M203,90 Q195,130 200,140 Q203,145 206,140 Q211,130 203,90" fill="none" stroke="#90a4ae" stroke-width="1.5"/>
  <path d="M203,90 Q190,125 195,140 Q200,145 205,140 Q210,125 203,90" fill="none" stroke="#b0bec5" stroke-width="0.8"/>
  <path d="M203,90 Q215,125 210,140 Q205,145 200,140 Q195,125 203,90" fill="none" stroke="#b0bec5" stroke-width="0.8"/>
  <!-- Whisking motion -->
  <path d="M215,70 Q225,60 220,50" fill="none" stroke="#ff9800" stroke-width="1" opacity="0.4"/>
  <path d="M220,75 Q230,65 225,55" fill="none" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
  <text x="190" y="160" font-size="8" fill="#b0bec5">Взбивание</text>
  <!-- Rolling pin and dough -->
  <rect x="280" y="80" width="120" height="16" rx="8" fill="#8d6e63" stroke="#6d4c41" stroke-width="1"/>
  <rect x="285" y="82" width="30" height="12" rx="6" fill="#a1887f"/>
  <rect x="365" y="82" width="30" height="12" rx="6" fill="#a1887f"/>
  <!-- Dough -->
  <ellipse cx="340" cy="115" rx="50" ry="12" fill="#ffe0b2" stroke="#ffcc80" stroke-width="1"/>
  <text x="310" y="140" font-size="8" fill="#ffe0b2">Раскатка теста</text>
  <!-- Baked goods -->
  <ellipse cx="80" cy="250" rx="35" ry="18" fill="#e65100" opacity="0.4"/>
  <ellipse cx="80" cy="248" rx="30" ry="14" fill="#ff8f00" opacity="0.6"/>
  <!-- Bun top -->
  <ellipse cx="80" cy="240" rx="28" ry="16" fill="#ff9800" stroke="#e65100" stroke-width="1"/>
  <text x="60" y="275" font-size="8" fill="#ffcc80">Булочка</text>
  <!-- Pancake -->
  <ellipse cx="200" cy="250" rx="40" ry="8" fill="#ffb74d" stroke="#ff9800" stroke-width="1"/>
  <ellipse cx="200" cy="248" rx="38" ry="7" fill="#ffe0b2"/>
  <text x="175" y="275" font-size="8" fill="#ffcc80">Блин</text>
  <!-- Omelet -->
  <ellipse cx="340" cy="248" rx="40" ry="20" fill="#ffc107" stroke="#ff8f00" stroke-width="1"/>
  <ellipse cx="340" cy="246" rx="35" ry="16" fill="#ffeb3b" opacity="0.5"/>
  <text x="310" y="280" font-size="8" fill="#ffcc80">Омлет</text>
  <!-- Recipe steps -->
  <rect x="30" y="295" width="440" height="35" rx="6" fill="#1a1810" stroke="#6d4c41" stroke-width="1"/>
  <text x="45" y="315" font-size="8" fill="#d7ccc8">1. Разбить яйца</text>
  <text x="145" y="315" font-size="8" fill="#d7ccc8">2. Взбить</text>
  <text x="210" y="315" font-size="8" fill="#d7ccc8">3. Замесить тесто</text>
  <text x="325" y="315" font-size="8" fill="#d7ccc8">4. Выпекать</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Приготовление блюд из яиц и теста</text>
</svg>