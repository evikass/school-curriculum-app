<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1218"/>
  <!-- Step-by-step project flow -->
  <!-- Step 1: Idea (lightbulb) -->
  <rect x="20" y="80" width="80" height="80" rx="8" fill="#1a2a3a" stroke="#fdd835" stroke-width="2"/>
  <circle cx="60" cy="105" r="18" fill="none" stroke="#fdd835" stroke-width="2"/>
  <line x1="52" y1="123" x2="68" y2="123" stroke="#fdd835" stroke-width="1.5"/>
  <line x1="54" y1="127" x2="66" y2="127" stroke="#fdd835" stroke-width="1"/>
  <path d="M60,87 L60,82" stroke="#fdd835" stroke-width="1.5"/>
  <path d="M78,105 L83,105" stroke="#fdd835" stroke-width="1.5"/>
  <path d="M37,105 L42,105" stroke="#fdd835" stroke-width="1.5"/>
  <text x="40" y="150" font-size="8" fill="#fdd835">1. Идея</text>
  <!-- Arrow 1→2 -->
  <line x1="105" y1="120" x2="115" y2="120" stroke="#546e7a" stroke-width="2"/>
  <polygon points="115,120 109,115 109,125" fill="#546e7a"/>
  <!-- Step 2: Plan (clipboard) -->
  <rect x="120" y="80" width="80" height="80" rx="8" fill="#1a2a3a" stroke="#42a5f5" stroke-width="2"/>
  <rect x="140" y="92" width="40" height="50" rx="3" fill="#0d1926" stroke="#42a5f5" stroke-width="1"/>
  <rect x="148" y="86" width="24" height="10" rx="3" fill="#42a5f5" opacity="0.3"/>
  <line x1="148" y1="107" x2="172" y2="107" stroke="#42a5f5" stroke-width="1" opacity="0.6"/>
  <line x1="148" y1="115" x2="168" y2="115" stroke="#42a5f5" stroke-width="1" opacity="0.5"/>
  <line x1="148" y1="123" x2="165" y2="123" stroke="#42a5f5" stroke-width="1" opacity="0.4"/>
  <text x="133" y="150" font-size="8" fill="#42a5f5">2. План</text>
  <!-- Arrow 2→3 -->
  <line x1="205" y1="120" x2="215" y2="120" stroke="#546e7a" stroke-width="2"/>
  <polygon points="215,120 209,115 209,125" fill="#546e7a"/>
  <!-- Step 3: Create (tools) -->
  <rect x="220" y="80" width="80" height="80" rx="8" fill="#1a2a3a" stroke="#ff9800" stroke-width="2"/>
  <!-- Hammer -->
  <rect x="242" y="98" width="8" height="30" rx="2" fill="#5d4037"/>
  <rect x="236" y="92" width="20" height="12" rx="2" fill="#78909c"/>
  <!-- Gear -->
  <circle cx="272" cy="118" r="12" fill="none" stroke="#ff9800" stroke-width="1.5"/>
  <circle cx="272" cy="118" r="4" fill="#ff9800" opacity="0.3"/>
  <text x="228" y="150" font-size="8" fill="#ff9800">3. Создание</text>
  <!-- Arrow 3→4 -->
  <line x1="305" y1="120" x2="315" y2="120" stroke="#546e7a" stroke-width="2"/>
  <polygon points="315,120 309,115 309,125" fill="#546e7a"/>
  <!-- Step 4: Test (checkmark) -->
  <rect x="320" y="80" width="80" height="80" rx="8" fill="#1a2a3a" stroke="#66bb6a" stroke-width="2"/>
  <circle cx="360" cy="115" r="20" fill="none" stroke="#66bb6a" stroke-width="2"/>
  <path d="M348,115 L356,123 L374,105" fill="none" stroke="#66bb6a" stroke-width="2.5"/>
  <text x="328" y="150" font-size="8" fill="#66bb6a">4. Тест</text>
  <!-- Arrow 4→5 -->
  <line x1="405" y1="120" x2="415" y2="120" stroke="#546e7a" stroke-width="2"/>
  <polygon points="415,120 409,115 409,125" fill="#546e7a"/>
  <!-- Step 5: Present (megaphone/star) -->
  <rect x="420" y="80" width="65" height="80" rx="8" fill="#1a2a3a" stroke="#7c4dff" stroke-width="2"/>
  <polygon points="452,95 456,108 470,108 459,116 463,130 452,122 441,130 445,116 434,108 448,108" fill="#7c4dff" opacity="0.5"/>
  <text x="423" y="150" font-size="8" fill="#7c4dff">5. Презент.</text>
  <!-- Feedback loop arrow from Test back to Create -->
  <path d="M360,165 L360,185 L260,185 L260,165" fill="none" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="260,165 255,175 265,175" fill="#ef5350" opacity="0.6"/>
  <text x="275" y="198" font-size="7" fill="#ef5350" opacity="0.7">Исправить если нужно</text>
  <!-- Detail section -->
  <rect x="30" y="220" width="440" height="100" rx="8" fill="#141e2a" stroke="#37474f" stroke-width="1"/>
  <text x="50" y="242" font-size="10" fill="#e0e0e0" font-weight="bold">Этапы проекта подробно:</text>
  <text x="50" y="262" font-size="8" fill="#fdd835">💡 Идея → постановка проблемы и цели</text>
  <text x="50" y="278" font-size="8" fill="#42a5f5">📋 План → выбор материалов и инструментов</text>
  <text x="50" y="294" font-size="8" fill="#ff9800">🔨 Создание → изготовление изделия</text>
  <text x="250" y="262" font-size="8" fill="#66bb6a">✅ Тест → проверка работы</text>
  <text x="250" y="278" font-size="8" fill="#7c4dff">⭐ Презентация → показ и оценка</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Этапы проекта</text>
</svg>