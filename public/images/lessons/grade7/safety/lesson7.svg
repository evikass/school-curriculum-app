<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a0d0d"/>
  <!-- Arm with wound and bandage -->
  <!-- Upper arm -->
  <rect x="60" y="90" width="180" height="50" rx="25" fill="#ffcc80" stroke="#e0a050" stroke-width="1.5"/>
  <!-- Forearm -->
  <rect x="180" y="80" width="200" height="50" rx="25" fill="#ffcc80" stroke="#e0a050" stroke-width="1.5"/>
  <!-- Wound (red spot) -->
  <ellipse cx="200" cy="110" rx="20" ry="12" fill="#e53935" stroke="#c62828" stroke-width="1"/>
  <!-- Blood drops -->
  <circle cx="195" cy="122" r="3" fill="#e53935" opacity="0.7"/>
  <circle cx="205" cy="126" r="2" fill="#e53935" opacity="0.5"/>
  <!-- Bandage wrapping -->
  <rect x="175" y="95" width="55" height="40" rx="6" fill="#eceff1" stroke="#cfd8dc" stroke-width="1" opacity="0.8"/>
  <line x1="175" y1="105" x2="230" y2="105" stroke="#b0bec5" stroke-width="1" opacity="0.4"/>
  <line x1="175" y1="115" x2="230" y2="115" stroke="#b0bec5" stroke-width="1" opacity="0.4"/>
  <line x1="175" y1="125" x2="230" y2="125" stroke="#b0bec5" stroke-width="1" opacity="0.4"/>
  <text x="150" y="155" font-size="8" fill="#ffcdd2">Повязка на рану</text>
  <!-- Tourniquet illustration -->
  <rect x="50" y="190" width="220" height="120" rx="6" fill="#1a1a1a" stroke="#ef5350" stroke-width="1.5"/>
  <text x="70" y="210" font-size="10" fill="#ef5350" font-weight="bold">Жгут при сильном кровотечении</text>
  <!-- Arm section -->
  <rect x="70" y="225" width="140" height="30" rx="15" fill="#ffcc80" stroke="#e0a050" stroke-width="1"/>
  <!-- Tourniquet -->
  <rect x="110" y="222" width="60" height="8" rx="2" fill="#c62828" stroke="#e53935" stroke-width="1.5"/>
  <!-- Tourniquet stick -->
  <rect x="160" y="218" width="5" height="20" rx="1" fill="#5d4037"/>
  <text x="80" y="275" font-size="7" fill="#ffcdd2">1. Наложи выше раны</text>
  <text x="80" y="288" font-size="7" fill="#ffcdd2">2. Запиши время!</text>
  <text x="80" y="301" font-size="7" fill="#ffcdd2">3. Ослабь через 1 час (зимой 30 мин)</text>
  <!-- Steps panel -->
  <rect x="290" y="40" width="180" height="270" rx="6" fill="#1a1210" stroke="#546e7a" stroke-width="1"/>
  <text x="305" y="62" font-size="10" fill="#ff9800" font-weight="bold">Первая помощь:</text>
  <!-- Step 1 -->
  <circle cx="315" cy="82" r="10" fill="#ff9800" opacity="0.3"/>
  <text x="311" y="86" font-size="9" fill="#ff9800">1</text>
  <text x="330" y="86" font-size="8" fill="#ffe0b2">Останови кровотечение</text>
  <!-- Step 2 -->
  <circle cx="315" cy="110" r="10" fill="#ff9800" opacity="0.3"/>
  <text x="311" y="114" font-size="9" fill="#ff9800">2</text>
  <text x="330" y="114" font-size="8" fill="#ffe0b2">Наложи повязку / жгут</text>
  <!-- Step 3 -->
  <circle cx="315" cy="138" r="10" fill="#ff9800" opacity="0.3"/>
  <text x="311" y="142" font-size="9" fill="#ff9800">3</text>
  <text x="330" y="142" font-size="8" fill="#ffe0b2">Приподними конечность</text>
  <!-- Step 4 -->
  <circle cx="315" cy="166" r="10" fill="#ff9800" opacity="0.3"/>
  <text x="311" y="170" font-size="9" fill="#ff9800">4</text>
  <text x="330" y="170" font-size="8" fill="#ffe0b2">Прижми артерию к кости</text>
  <!-- Step 5 -->
  <circle cx="315" cy="194" r="10" fill="#ff9800" opacity="0.3"/>
  <text x="311" y="198" font-size="9" fill="#ff9800">5</text>
  <text x="330" y="198" font-size="8" fill="#ffe0b2">Вызови скорую 103</text>
  <!-- Blood types -->
  <rect x="305" y="220" width="150" height="70" rx="4" fill="#1a0d0d" stroke="#c62828" stroke-width="1"/>
  <text x="315" y="238" font-size="8" fill="#ef5350" font-weight="bold">Точки прижатия артерий:</text>
  <text x="315" y="254" font-size="7" fill="#ffcdd2">• Плечевая — внутренняя сторона</text>
  <text x="315" y="267" font-size="7" fill="#ffcdd2">• Бедренная — паховая область</text>
  <text x="315" y="280" font-size="7" fill="#ffcdd2">• Сонная — сбоку на шее</text>
  <text x="100" y="340" font-size="9" fill="#fff" opacity="0.5">Первая помощь при кровотечениях</text>
</svg>