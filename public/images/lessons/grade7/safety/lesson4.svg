<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a0d05"/>
  <!-- Building cross-section -->
  <rect x="50" y="40" width="200" height="250" fill="#263238" stroke="#546e7a" stroke-width="2"/>
  <!-- Floors -->
  <line x1="50" y1="105" x2="250" y2="105" stroke="#455a64" stroke-width="2"/>
  <line x1="50" y1="170" x2="250" y2="105" stroke="#455a64" stroke-width="2"/>
  <line x1="50" y1="170" x2="250" y2="170" stroke="#455a64" stroke-width="2"/>
  <line x1="50" y1="235" x2="250" y2="235" stroke="#455a64" stroke-width="2"/>
  <!-- Fire on 2nd floor -->
  <ellipse cx="150" cy="138" rx="30" ry="20" fill="#ff5722" opacity="0.3"/>
  <ellipse cx="150" cy="130" rx="15" ry="18" fill="#ff9800" opacity="0.5"/>
  <ellipse cx="150" cy="125" rx="8" ry="12" fill="#ffeb3b" opacity="0.6"/>
  <!-- Smoke above fire -->
  <circle cx="140" cy="112" r="8" fill="#546e7a" opacity="0.2"/>
  <circle cx="155" cy="108" r="10" fill="#546e7a" opacity="0.15"/>
  <circle cx="145" cy="100" r="12" fill="#546e7a" opacity="0.1"/>
  <!-- Person on 3rd floor -->
  <circle cx="100" cy="192" r="6" fill="#e0e0e0"/>
  <line x1="100" y1="198" x2="100" y2="215" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Evacuation route - green arrows going down -->
  <path d="M180,190 L180,200 L185,200 L175,210 L165,200 L170,200 L170,190" fill="#66bb6a" opacity="0.6"/>
  <path d="M180,215 L180,225 L185,225 L175,235 L165,225 L170,225 L170,215" fill="#66bb6a" opacity="0.6"/>
  <path d="M180,240 L180,250 L185,250 L175,260 L165,250 L170,250 L170,240" fill="#66bb6a" opacity="0.6"/>
  <!-- Exit door -->
  <rect x="50" y="260" width="30" height="30" fill="#1b5e20" stroke="#4caf50" stroke-width="2"/>
  <text x="55" y="280" font-size="7" fill="#c8e6c9">ВЫХОД</text>
  <!-- Crawl under smoke illustration -->
  <rect x="290" y="40" width="180" height="110" rx="6" fill="#1a1a2a" stroke="#546e7a" stroke-width="1.5"/>
  <text x="310" y="60" font-size="9" fill="#66bb6a" font-weight="bold">Ползи под дымом!</text>
  <!-- Smoke layer -->
  <rect x="300" y="70" width="160" height="30" fill="#546e7a" opacity="0.2"/>
  <rect x="300" y="70" width="160" height="15" fill="#546e7a" opacity="0.15"/>
  <!-- Person crawling -->
  <circle cx="340" cy="110" r="6" fill="#e0e0e0"/>
  <line x1="346" y1="112" x2="370" y2="115" stroke="#e0e0e0" stroke-width="2"/>
  <line x1="340" y1="116" x2="355" y2="118" stroke="#e0e0e0" stroke-width="1.5"/>
  <line x1="340" y1="116" x2="330" y2="120" stroke="#e0e0e0" stroke-width="1.5"/>
  <!-- Arrow showing crawl direction -->
  <path d="M375,115 L390,115" stroke="#66bb6a" stroke-width="1.5"/>
  <polygon points="390,115 384,111 384,119" fill="#66bb6a"/>
  <!-- Clean air zone indicator -->
  <text x="305" y="108" font-size="6" fill="#a5d6a7">чистый воздух</text>
  <text x="305" y="85" font-size="6" fill="#78909c">едкий дым ↑</text>
  <!-- Call 112 -->
  <rect x="290" y="170" width="180" height="60" rx="8" fill="#c62828" stroke="#ef5350" stroke-width="2"/>
  <text x="330" y="195" font-size="22" fill="#fff" font-weight="bold">112</text>
  <text x="310" y="220" font-size="9" fill="#ffcdd2">Единый номер экстренных служб</text>
  <!-- Action steps -->
  <rect x="290" y="245" width="180" height="70" rx="6" fill="#1a1210" stroke="#ff5722" stroke-width="1"/>
  <text x="305" y="263" font-size="9" fill="#ff9800" font-weight="bold">Действия при пожаре:</text>
  <text x="305" y="278" font-size="7" fill="#ffcdd2">1. Вызови 101 или 112</text>
  <text x="305" y="290" font-size="7" fill="#ffcdd2">2. Ползи к выходу</text>
  <text x="305" y="302" font-size="7" fill="#ffcdd2">3. Не пользуйся лифтом!</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Действия при пожаре</text>
</svg>