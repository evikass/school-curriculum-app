<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1210"/>
  <!-- Factory accident -->
  <rect x="30" y="30" width="150" height="120" rx="6" fill="#1a2a1a" stroke="#ff9800" stroke-width="1.5"/>
  <text x="45" y="50" font-size="10" fill="#ff9800" font-weight="bold">Авария на заводе</text>
  <!-- Factory building -->
  <rect x="50" y="70" width="100" height="55" fill="#37474f" stroke="#546e7a" stroke-width="1.5"/>
  <!-- Chimney -->
  <rect x="60" y="50" width="15" height="25" fill="#455a64"/>
  <rect x="90" y="55" width="12" height="20" fill="#455a64"/>
  <!-- Smoke/toxic release -->
  <circle cx="67" cy="42" r="8" fill="#ff9800" opacity="0.15"/>
  <circle cx="75" cy="35" r="10" fill="#ff9800" opacity="0.1"/>
  <circle cx="90" cy="30" r="12" fill="#ff9800" opacity="0.07"/>
  <!-- Warning stripes -->
  <rect x="50" y="110" width="100" height="8" fill="#ff9800" opacity="0.3"/>
  <text x="60" y="140" font-size="7" fill="#b0bec5">Химическое заражение</text>
  <!-- Chemical spill -->
  <rect x="200" y="30" width="140" height="120" rx="6" fill="#1a1a2a" stroke="#ffeb3b" stroke-width="1.5"/>
  <text x="215" y="50" font-size="10" fill="#ffeb3b" font-weight="bold">Химический разлив</text>
  <!-- Barrel -->
  <rect x="240" y="60" width="35" height="45" rx="4" fill="#fdd835" stroke="#f9a825" stroke-width="1.5"/>
  <text x="248" y="82" font-size="7" fill="#5d4037">OПАСНО</text>
  <!-- Spill puddle -->
  <ellipse cx="260" cy="115" rx="40" ry="12" fill="#ffeb3b" opacity="0.2"/>
  <ellipse cx="260" cy="115" rx="25" ry="7" fill="#fdd835" opacity="0.3"/>
  <!-- Fumes -->
  <path d="M250,110 Q245,100 250,95" fill="none" stroke="#fdd835" stroke-width="1" opacity="0.3"/>
  <path d="M265,108 Q270,98 265,92" fill="none" stroke="#fdd835" stroke-width="1" opacity="0.3"/>
  <text x="210" y="140" font-size="7" fill="#b0bec5">Ядовитые вещества (АХОВ)</text>
  <!-- Radiation -->
  <rect x="360" y="30" width="120" height="120" rx="6" fill="#1a2a1a" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="375" y="50" font-size="10" fill="#66bb6a" font-weight="bold">Радиация</text>
  <!-- Radiation symbol -->
  <circle cx="420" cy="90" r="28" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
  <circle cx="420" cy="90" r="5" fill="#66bb6a"/>
  <!-- Three blades -->
  <path d="M420,85 A20,20 0 0,1 420,65" fill="#66bb6a" opacity="0.4"/>
  <path d="M425,90 A20,20 0 0,1 445,90" fill="#66bb6a" opacity="0.4"/>
  <path d="M415,95 A20,20 0 0,1 395,95" fill="#66bb6a" opacity="0.4"/>
  <text x="385" y="130" font-size="7" fill="#a5d6a7">Радиоактивный фон</text>
  <text x="380" y="142" font-size="7" fill="#66bb6a" opacity="0.6">☢ ионизирующее излучение</text>
  <!-- Actions section -->
  <rect x="30" y="175" width="440" height="140" rx="8" fill="#1a1610" stroke="#546e7a" stroke-width="1"/>
  <text x="50" y="198" font-size="11" fill="#ff9800" font-weight="bold">Действия при техногенных ЧС:</text>
  <text x="50" y="218" font-size="8" fill="#ffe0b2">🏭 Хим. авария: закрой окна, влажная марля, не выходи</text>
  <text x="50" y="236" font-size="8" fill="#fff9c4">⚗ Разлив АХОВ: иди перпендикулярно ветру, вверх</text>
  <text x="50" y="254" font-size="8" fill="#c8e6c9">☢ Радиация: оставайся в укрытии, йодная профилактика</text>
  <text x="50" y="275" font-size="9" fill="#ef5350" font-weight="bold">⚠ Общее правило: НЕ паникуй! Жди сигнала «Отбой»</text>
  <!-- Emergency numbers -->
  <rect x="50" y="288" width="80" height="20" rx="4" fill="#c62828"/>
  <text x="58" y="303" font-size="11" fill="#fff" font-weight="bold">112</text>
  <rect x="145" y="288" width="80" height="20" rx="4" fill="#e65100"/>
  <text x="153" y="303" font-size="11" fill="#fff" font-weight="bold">101</text>
  <rect x="240" y="288" width="80" height="20" rx="4" fill="#1565c0"/>
  <text x="248" y="303" font-size="11" fill="#fff" font-weight="bold">102</text>
  <rect x="335" y="288" width="80" height="20" rx="4" fill="#2e7d32"/>
  <text x="343" y="303" font-size="11" fill="#fff" font-weight="bold">103</text>
  <text x="140" y="340" font-size="9" fill="#fff" opacity="0.5">Техногенные ЧС</text>
</svg>