<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a0d05"/>
  <!-- Fire extinguisher -->
  <rect x="350" y="50" width="40" height="90" rx="10" fill="#c62828" stroke="#e53935" stroke-width="2"/>
  <rect x="355" y="40" width="30" height="15" rx="3" fill="#546e7a" stroke="#78909c" stroke-width="1"/>
  <!-- Handle -->
  <rect x="375" y="35" width="20" height="8" rx="2" fill="#78909c"/>
  <rect x="385" y="20" width="8" height="20" rx="2" fill="#78909c"/>
  <!-- Nozzle -->
  <rect x="393" y="20" width="25" height="5" rx="2" fill="#455a64"/>
  <text x="343" y="160" font-size="8" fill="#ef9a9a">Огнетушитель</text>
  <!-- Fire sources -->
  <!-- Wiring fire -->
  <rect x="40" y="40" width="120" height="80" rx="6" fill="#1a1a2a" stroke="#546e7a" stroke-width="1.5"/>
  <text x="50" y="58" font-size="9" fill="#ff9800" font-weight="bold">⚡ Электропроводка</text>
  <!-- Wire with spark -->
  <line x1="60" y1="70" x2="140" y2="70" stroke="#78909c" stroke-width="2"/>
  <line x1="100" y1="70" x2="110" y2="80" stroke="#ff9800" stroke-width="2"/>
  <line x1="110" y1="80" x2="105" y2="90" stroke="#ff5722" stroke-width="1.5"/>
  <!-- Small flame -->
  <ellipse cx="108" cy="88" rx="6" ry="10" fill="#ff5722" opacity="0.6"/>
  <ellipse cx="108" cy="85" rx="3" ry="6" fill="#ffeb3b" opacity="0.7"/>
  <text x="60" y="112" font-size="7" fill="#b0bec5">Короткое замыкание</text>
  <!-- Matches fire -->
  <rect x="180" y="40" width="120" height="80" rx="6" fill="#1a1a2a" stroke="#546e7a" stroke-width="1.5"/>
  <text x="190" y="58" font-size="9" fill="#ff9800" font-weight="bold">🔥 Спички</text>
  <!-- Matchstick -->
  <rect x="215" y="68" width="3" height="30" fill="#8d6e63"/>
  <circle cx="216" cy="65" r="6" fill="#e65100"/>
  <ellipse cx="216" cy="62" rx="4" ry="6" fill="#ff9800" opacity="0.7"/>
  <!-- Second match -->
  <rect x="240" y="72" width="3" height="25" fill="#8d6e63" transform="rotate(20,241,85)"/>
  <!-- Candle -->
  <rect x="265" y="75" width="8" height="25" fill="#fff8e1"/>
  <line x1="269" y1="75" x2="269" y2="65" stroke="#546e7a" stroke-width="1"/>
  <ellipse cx="269" cy="62" rx="4" ry="6" fill="#ff9800" opacity="0.7"/>
  <text x="185" y="112" font-size="7" fill="#b0bec5">Осторожно с огнём!</text>
  <!-- Stove fire -->
  <rect x="40" y="140" width="120" height="80" rx="6" fill="#1a1a2a" stroke="#546e7a" stroke-width="1.5"/>
  <text x="50" y="158" font-size="9" fill="#ff9800" font-weight="bold">🍳 Плита</text>
  <!-- Stove -->
  <rect x="60" y="168" width="80" height="30" rx="3" fill="#37474f" stroke="#546e7a" stroke-width="1"/>
  <circle cx="80" cy="183" r="8" fill="none" stroke="#ff5722" stroke-width="1.5"/>
  <circle cx="120" cy="183" r="8" fill="none" stroke="#ff9800" stroke-width="1"/>
  <!-- Pan on stove -->
  <ellipse cx="80" cy="175" rx="12" ry="3" fill="#546e7a"/>
  <!-- Smoke from pan -->
  <path d="M80,168 Q78,160 82,155" fill="none" stroke="#78909c" stroke-width="1" opacity="0.4"/>
  <text x="55" y="212" font-size="7" fill="#b0bec5">Не оставляй без присмотра</text>
  <!-- Prevention rules -->
  <rect x="180" y="140" width="280" height="100" rx="6" fill="#1a1210" stroke="#ff5722" stroke-width="1"/>
  <text x="195" y="162" font-size="10" fill="#ff5722" font-weight="bold">Предотвращение пожаров:</text>
  <text x="195" y="180" font-size="8" fill="#ffcdd2">• Не перегружай розетки</text>
  <text x="195" y="195" font-size="8" fill="#ffcdd2">• Уходя — гаси свет и плиту</text>
  <text x="195" y="210" font-size="8" fill="#ffcdd2">• Храни спички от детей</text>
  <text x="195" y="225" font-size="8" fill="#ffcdd2">• Не кури в постели</text>
  <!-- Emergency number -->
  <rect x="180" y="260" width="130" height="40" rx="8" fill="#c62828" stroke="#ef5350" stroke-width="2"/>
  <text x="200" y="280" font-size="18" fill="#fff" font-weight="bold">101</text>
  <text x="200" y="295" font-size="8" fill="#ffcdd2">Пожарная служба</text>
  <!-- Smoke alarm icon -->
  <circle cx="400" cy="280" r="20" fill="#1a1a2a" stroke="#ff9800" stroke-width="1.5"/>
  <circle cx="400" cy="280" r="8" fill="#ff9800" opacity="0.3"/>
  <text x="378" y="310" font-size="7" fill="#ffcc80">Датчик дыма</text>
  <text x="130" y="340" font-size="9" fill="#fff" opacity="0.5">Причины пожаров и их предотвращение</text>
</svg>