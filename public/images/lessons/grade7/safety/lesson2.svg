<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a0d0d"/>
  <!-- Warning triangle -->
  <polygon points="250,30 290,100 210,100" fill="none" stroke="#ff9800" stroke-width="3"/>
  <text x="240" y="88" font-size="24" fill="#ff9800">!</text>
  <!-- Car collision -->
  <!-- Car 1 (left) -->
  <rect x="60" y="130" width="80" height="35" rx="8" fill="#42a5f5" stroke="#1e88e5" stroke-width="1.5"/>
  <rect x="70" y="122" width="50" height="16" rx="4" fill="#64b5f6" stroke="#1e88e5" stroke-width="1"/>
  <circle cx="80" cy="170" r="10" fill="#263238" stroke="#546e7a" stroke-width="1.5"/>
  <circle cx="120" cy="170" r="10" fill="#263238" stroke="#546e7a" stroke-width="1.5"/>
  <!-- Car 2 (right) -->
  <rect x="360" y="130" width="80" height="35" rx="8" fill="#ef5350" stroke="#c62828" stroke-width="1.5"/>
  <rect x="380" y="122" width="50" height="16" rx="4" fill="#e57373" stroke="#c62828" stroke-width="1"/>
  <circle cx="380" cy="170" r="10" fill="#263238" stroke="#546e7a" stroke-width="1.5"/>
  <circle cx="420" cy="170" r="10" fill="#263238" stroke="#546e7a" stroke-width="1.5"/>
  <!-- Collision impact -->
  <circle cx="250" cy="145" r="25" fill="#ff9800" opacity="0.15"/>
  <circle cx="250" cy="145" r="15" fill="#ff5722" opacity="0.2"/>
  <text x="237" y="150" font-size="16" fill="#ff5722" opacity="0.7">💥</text>
  <!-- Speed lines -->
  <line x1="40" y1="140" x2="25" y2="140" stroke="#42a5f5" stroke-width="1.5" opacity="0.4"/>
  <line x1="45" y1="150" x2="20" y2="150" stroke="#42a5f5" stroke-width="1.5" opacity="0.3"/>
  <line x1="460" y1="140" x2="480" y2="140" stroke="#ef5350" stroke-width="1.5" opacity="0.4"/>
  <line x1="455" y1="150" x2="475" y2="150" stroke="#ef5350" stroke-width="1.5" opacity="0.3"/>
  <!-- Phone crossed out -->
  <rect x="180" y="210" width="140" height="90" rx="6" fill="#1a1a1a" stroke="#546e7a" stroke-width="1"/>
  <text x="205" y="230" font-size="10" fill="#e0e0e0">📱 Телефон</text>
  <!-- Phone icon -->
  <rect x="230" y="240" width="30" height="45" rx="4" fill="#546e7a" stroke="#78909c" stroke-width="1"/>
  <rect x="233" y="248" width="24" height="30" fill="#1a1a2a"/>
  <circle cx="245" cy="282" r="2" fill="#78909c"/>
  <!-- Cross over phone -->
  <line x1="225" y1="235" x2="270" y2="290" stroke="#ef5350" stroke-width="3"/>
  <line x1="270" y1="235" x2="225" y2="290" stroke="#ef5350" stroke-width="3"/>
  <!-- Causes section -->
  <rect x="30" y="210" width="130" height="90" rx="6" fill="#1a1210" stroke="#ef5350" stroke-width="1"/>
  <text x="40" y="230" font-size="9" fill="#ef5350" font-weight="bold">Причины ДТП:</text>
  <text x="40" y="248" font-size="7" fill="#ffcdd2">• Превышение скорости</text>
  <text x="40" y="260" font-size="7" fill="#ffcdd2">• Телефон за рулём</text>
  <text x="40" y="272" font-size="7" fill="#ffcdd2">• Алкоголь</text>
  <text x="40" y="284" font-size="7" fill="#ffcdd2">• Невнимательность</text>
  <!-- Prevention section -->
  <rect x="340" y="210" width="130" height="90" rx="6" fill="#0d1a0d" stroke="#66bb6a" stroke-width="1"/>
  <text x="350" y="230" font-size="9" fill="#66bb6a" font-weight="bold">Предотвращение:</text>
  <text x="350" y="248" font-size="7" fill="#c8e6c9">• Соблюдай скорость</text>
  <text x="350" y="260" font-size="7" fill="#c8e6c9">• Не отвлекайся</text>
  <text x="350" y="272" font-size="7" fill="#c8e6c9">• Ремень безопасности</text>
  <text x="350" y="284" font-size="7" fill="#c8e6c9">• Дистанция</text>
  <text x="130" y="340" font-size="9" fill="#fff" opacity="0.5">Причины ДТП и их предотвращение</text>
</svg>