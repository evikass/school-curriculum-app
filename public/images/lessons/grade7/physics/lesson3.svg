<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Сила тяжести и вес тела</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Gravity -->
  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">Сила тяжести</text>
  <!-- Earth -->
  <circle cx="135" cy="190" r="50" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <ellipse cx="120" cy="175" rx="15" ry="12" fill="#A5D6A7" opacity="0.6"/>
  <ellipse cx="150" cy="200" rx="12" ry="10" fill="#A5D6A7" opacity="0.6"/>
  <ellipse cx="110" cy="205" rx="8" ry="6" fill="#A5D6A7" opacity="0.6"/>
  <!-- Object falling -->
  <rect x="126" y="115" width="18" height="18" rx="3" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
  <line x1="135" y1="133" x2="135" y2="145" stroke="#C62828" stroke-width="2"/>
  <polygon points="130,143 135,150 140,143" fill="#C62828"/>
  <text x="165" y="125" font-family="Arial,sans-serif" font-size="8" fill="#C62828">F = m x g</text>
  <text x="165" y="140" font-family="Arial,sans-serif" font-size="7" fill="#888">g = 9.8 Н/кг</text>

  <!-- Weight -->
  <rect x="260" y="90" width="215" height="95" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold" text-anchor="middle">Вес тела</text>
  <!-- Spring scale -->
  <rect x="340" y="130" width="50" height="45" rx="3" fill="#E0E0E0" stroke="#999" stroke-width="1"/>
  <line x1="350" y1="130" x2="350" y2="115" stroke="#888" stroke-width="2"/>
  <line x1="345" y1="115" x2="385" y2="115" stroke="#888" stroke-width="2"/>
  <!-- Spring zigzag -->
  <path d="M360,130 L355,138 L365,146 L355,154 L365,162 L360,170" stroke="#C62828" stroke-width="1.5" fill="none"/>
  <rect x="345" y="170" width="30" height="10" rx="2" fill="#B0BEC5"/>
  <text x="365" y="178" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">кг</text>
  <text x="367" y="180" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">P = m x g</text>

  <!-- Spring force -->
  <rect x="260" y="200" width="215" height="90" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="367" y="216" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" font-weight="bold" text-anchor="middle">Сила упругости</text>
  <!-- Spring -->
  <rect x="350" y="230" width="8" height="50" rx="2" fill="#E0E0E0"/>
  <path d="M354,235 L362,240 L346,245 L362,250 L346,255 L362,260 L354,265" stroke="#1565C0" stroke-width="1.5" fill="none"/>
  <rect x="340" y="268" width="28" height="12" rx="2" fill="#B0BEC5"/>
  <line x1="354" y1="225" x2="354" y2="228" stroke="#888" stroke-width="2"/>
  <text x="395" y="255" font-family="Arial,sans-serif" font-size="8" fill="#F9A825">F = -k x</text>
  <text x="395" y="268" font-family="Arial,sans-serif" font-size="7" fill="#888">закон Гука</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>