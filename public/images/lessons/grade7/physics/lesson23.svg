  <rect x="380" y="140" width="40" height="20" rx="3" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <line x1="380" y1="150" x2="370" y2="150" stroke="#FF9800" stroke-width="2"/>
  <polygon points="372,147 370,150 372,153" fill="#FF9800"/>
  <line x1="375" y1="160" x2="425" y2="160" stroke="#888" stroke-width="1"/>
  <text x="400" y="135" font-family="Arial,sans-serif" font-size="7" fill="#FF9800" text-anchor="middle">Fтр</text>
  <!-- Elastic -->
  <line x1="300" y1="210" x2="340" y2="210" stroke="#1565C0" stroke-width="1.5"/>
  <path d="M300,210 L305,205 L315,215 L325,205 L335,215 L340,210" stroke="#1565C0" stroke-width="1.5" fill="none"/>
  <rect x="340" y="205" width="15" height="10" rx="2" fill="#B0BEC5"/>
  <text x="320" y="230" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Fупр</text>
  <!-- Archimedes -->
  <rect x="385" y="200" width="50" height="40" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <rect x="395" y="210" width="30" height="20" rx="3" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <line x1="410" y1="200" x2="410" y2="192" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="407,194 410,189 413,194" fill="#2E7D32"/>
  <text x="410" y="260" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Fарх</text>
  <text x="367" y="280" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Силы в природе</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Физика</text>
</svg>