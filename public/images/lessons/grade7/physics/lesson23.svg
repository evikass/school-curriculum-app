  <path d="M80,145 L90,150 L70,160 L90,170 L70,180 L90,190 L80,195" stroke="#C62828" stroke-width="1.5" fill="none"/>
  <rect x="70" y="195" width="30" height="8" rx="2" fill="#B0BEC5"/>
  <!-- Hook -->
  <path d="M85,203 Q85,210 80,210 Q75,210 75,207" stroke="#555" stroke-width="1.5" fill="none"/>
  <!-- Weight hanging -->
  <rect x="72" y="210" width="26" height="20" rx="3" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <text x="85" y="224" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">m</text>
  <text x="135" y="250" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">F = m x g</text>
  <text x="135" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Н (ньютон)</text>

  <!-- Forces diagram -->
  <rect x="260" y="90" width="215" height="200" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="367" y="115" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Виды сил</text>
