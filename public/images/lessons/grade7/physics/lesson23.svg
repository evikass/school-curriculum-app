  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 23</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="135" y="115" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">Давление жидкостей и газов 📚</text>
  <!-- Spring scale -->
  <rect x="55" y="135" width="60" height="70" rx="4" fill="#E8EAF6" stroke="#7986CB" stroke-width="1.5"/>
  <line x1="85" y1="130" x2="85" y2="135" stroke="#555" stroke-width="2"/>
  <rect x="80" y="125" width="10" height="8" rx="2" fill="#7986CB"/>
