<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1520"/>
  <!-- Exploded view - robot components spread out -->
  <!-- Center body (reference position) -->
  <rect x="200" y="130" width="100" height="80" rx="8" fill="#1a2a3a" stroke="#78909c" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="220" y="175" font-size="9" fill="#546e7a" opacity="0.5">Корпус</text>
  <!-- Sensor module - top left -->
  <rect x="30" y="30" width="90" height="55" rx="6" fill="#1a2a2a" stroke="#66bb6a" stroke-width="2"/>
  <text x="40" y="48" font-size="10" fill="#66bb6a" font-weight="bold">Датчики</text>
  <!-- Sensor icons -->
  <circle cx="55" cy="68" r="10" fill="#2e7d32" stroke="#66bb6a" stroke-width="1"/>
  <path d="M50,68 L55,63 L60,68" fill="none" stroke="#a5d6a7" stroke-width="1.5"/>
  <path d="M48,68 Q55,58 62,68" fill="none" stroke="#66bb6a" stroke-width="1" opacity="0.6"/>
  <text x="75" y="72" font-size="7" fill="#a5d6a7">УЗ, свет</text>
  <!-- Dashed line connecting to body -->
  <line x1="120" y1="65" x2="200" y2="140" stroke="#66bb6a" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Processor - top center -->
  <rect x="190" y="25" width="120" height="55" rx="6" fill="#2a1a2a" stroke="#7c4dff" stroke-width="2"/>
  <text x="200" y="43" font-size="10" fill="#7c4dff" font-weight="bold">Процессор</text>
  <!-- Chip drawing -->
  <rect x="220" y="50" width="40" height="22" rx="2" fill="#1a1030" stroke="#7c4dff" stroke-width="1"/>
  <line x1="225" y1="50" x2="225" y2="46" stroke="#7c4dff" stroke-width="1"/>
  <line x1="235" y1="50" x2="235" y2="46" stroke="#7c4dff" stroke-width="1"/>
  <line x1="245" y1="50" x2="245" y2="46" stroke="#7c4dff" stroke-width="1"/>
  <line x1="255" y1="50" x2="255" y2="46" stroke="#7c4dff" stroke-width="1"/>
  <line x1="225" y1="72" x2="225" y2="76" stroke="#7c4dff" stroke-width="1"/>
  <line x1="235" y1="72" x2="235" y2="76" stroke="#7c4dff" stroke-width="1"/>
  <line x1="245" y1="72" x2="245" y2="76" stroke="#7c4dff" stroke-width="1"/>
  <line x1="255" y1="72" x2="255" y2="76" stroke="#7c4dff" stroke-width="1"/>
  <text x="228" y="65" font-size="6" fill="#b388ff">MCU</text>
  <line x1="250" y1="80" x2="250" y2="130" stroke="#7c4dff" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Motors - right -->
  <rect x="380" y="55" width="90" height="55" rx="6" fill="#2a2a1a" stroke="#ff9800" stroke-width="2"/>
  <text x="390" y="73" font-size="10" fill="#ff9800" font-weight="bold">Моторы</text>
  <!-- Motor drawing -->
  <circle cx="420" cy="95" r="14" fill="#1a1a0a" stroke="#ff9800" stroke-width="1.5"/>
  <circle cx="420" cy="95" r="6" fill="#ff9800" opacity="0.3"/>
  <!-- Gear teeth -->
  <rect x="416" y="78" width="8" height="5" fill="#ff9800" opacity="0.3"/>
  <rect x="416" y="107" width="8" height="5" fill="#ff9800" opacity="0.3"/>
  <rect x="403" y="91" width="5" height="8" fill="#ff9800" opacity="0.3"/>
  <rect x="432" y="91" width="5" height="8" fill="#ff9800" opacity="0.3"/>
  <line x1="380" y1="95" x2="300" y2="150" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Battery - bottom left -->
  <rect x="40" y="230" width="90" height="55" rx="6" fill="#1a1a2a" stroke="#ef5350" stroke-width="2"/>
  <text x="50" y="248" font-size="10" fill="#ef5350" font-weight="bold">Батарея</text>
  <!-- Battery icon -->
  <rect x="55" y="258" width="50" height="20" rx="3" fill="#1a0a0a" stroke="#ef5350" stroke-width="1"/>
  <rect x="105" y="263" width="5" height="10" rx="1" fill="#ef5350" opacity="0.5"/>
  <rect x="58" y="261" width="30" height="14" rx="2" fill="#ef5350" opacity="0.25"/>
  <line x1="130" y1="258" x2="200" y2="210" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Wheels - bottom right -->
  <rect x="360" y="230" width="110" height="55" rx="6" fill="#1a2a1a" stroke="#78909c" stroke-width="2"/>
  <text x="370" y="248" font-size="10" fill="#78909c" font-weight="bold">Колёса/Гусеницы</text>
  <!-- Wheel icon -->
  <circle cx="395" cy="270" r="14" fill="#263238" stroke="#78909c" stroke-width="1.5"/>
  <circle cx="395" cy="270" r="5" fill="#546e7a"/>
  <circle cx="445" cy="270" r="14" fill="#263238" stroke="#78909c" stroke-width="1.5"/>
  <circle cx="445" cy="270" r="5" fill="#546e7a"/>
  <line x1="380" y1="255" x2="300" y2="210" stroke="#78909c" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <!-- Center info -->
  <text x="205" y="150" font-size="8" fill="#546e7a">Сборка</text>
  <text x="210" y="162" font-size="8" fill="#546e7a">робота</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Основные компоненты робота</text>
</svg>