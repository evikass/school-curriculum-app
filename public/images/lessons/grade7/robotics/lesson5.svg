<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1a12"/>
  <!-- Code editor on left -->
  <rect x="20" y="25" width="240" height="220" rx="8" fill="#1a2332" stroke="#4caf50" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="20" y="25" width="240" height="22" rx="8" fill="#263238"/>
  <circle cx="38" cy="36" r="4" fill="#ef5350"/>
  <circle cx="52" cy="36" r="4" fill="#ff9800"/>
  <circle cx="66" cy="36" r="4" fill="#4caf50"/>
  <text x="110" y="40" font-size="8" fill="#81c784">sketch.ino</text>
  <!-- Code content -->
  <text x="35" y="62" font-family="monospace" font-size="9" fill="#7f8c8d">1</text>
  <text x="48" y="62" font-family="monospace" font-size="9" fill="#42a5f5">void</text>
  <text x="75" y="62" font-family="monospace" font-size="9" fill="#e0e0e0"> </text>
  <text x="80" y="62" font-family="monospace" font-size="9" fill="#ffcc80">setup</text>
  <text x="110" y="62" font-family="monospace" font-size="9" fill="#e0e0e0">() {</text>
  <text x="35" y="78" font-family="monospace" font-size="9" fill="#7f8c8d">2</text>
  <text x="48" y="78" font-family="monospace" font-size="9" fill="#e0e0e0">  </text>
  <text x="60" y="78" font-family="monospace" font-size="9" fill="#42a5f5">pinMode</text>
  <text x="112" y="78" font-family="monospace" font-size="9" fill="#e0e0e0">(</text>
  <text x="118" y="78" font-family="monospace" font-size="9" fill="#ff9800">13</text>
  <text x="130" y="78" font-family="monospace" font-size="9" fill="#e0e0e0">, </text>
  <text x="140" y="78" font-family="monospace" font-size="9" fill="#81c784">OUTPUT</text>
  <text x="185" y="78" font-family="monospace" font-size="9" fill="#e0e0e0">);</text>
  <text x="35" y="94" font-family="monospace" font-size="9" fill="#7f8c8d">3</text>
  <text x="48" y="94" font-family="monospace" font-size="9" fill="#e0e0e0">}</text>
  <text x="35" y="114" font-family="monospace" font-size="9" fill="#7f8c8d">4</text>
  <text x="48" y="114" font-family="monospace" font-size="9" fill="#42a5f5">void</text>
  <text x="75" y="114" font-family="monospace" font-size="9" fill="#e0e0e0"> </text>
  <text x="80" y="114" font-family="monospace" font-size="9" fill="#ffcc80">loop</text>
  <text x="105" y="114" font-family="monospace" font-size="9" fill="#e0e0e0">() {</text>
  <text x="35" y="130" font-family="monospace" font-size="9" fill="#7f8c8d">5</text>
  <text x="48" y="130" font-family="monospace" font-size="9" fill="#e0e0e0">  </text>
  <text x="60" y="130" font-family="monospace" font-size="9" fill="#42a5f5">digitalWrite</text>
  <text x="138" y="130" font-family="monospace" font-size="9" fill="#e0e0e0">(</text>
  <text x="144" y="130" font-family="monospace" font-size="9" fill="#ff9800">13</text>
  <text x="156" y="130" font-family="monospace" font-size="9" fill="#e0e0e0">, </text>
  <text x="166" y="130" font-family="monospace" font-size="9" fill="#81c784">HIGH</text>
  <text x="195" y="130" font-family="monospace" font-size="9" fill="#e0e0e0">);</text>
  <text x="35" y="146" font-family="monospace" font-size="9" fill="#7f8c8d">6</text>
  <text x="48" y="146" font-family="monospace" font-size="9" fill="#e0e0e0">  </text>
  <text x="60" y="146" font-family="monospace" font-size="9" fill="#42a5f5">delay</text>
  <text x="92" y="146" font-family="monospace" font-size="9" fill="#e0e0e0">(</text>
  <text x="98" y="146" font-family="monospace" font-size="9" fill="#ff9800">1000</text>
  <text x="128" y="146" font-family="monospace" font-size="9" fill="#e0e0e0">);</text>
  <text x="35" y="162" font-family="monospace" font-size="9" fill="#7f8c8d">7</text>
  <text x="48" y="162" font-family="monospace" font-size="9" fill="#e0e0e0">  </text>
  <text x="60" y="162" font-family="monospace" font-size="9" fill="#42a5f5">digitalWrite</text>
  <text x="138" y="162" font-family="monospace" font-size="9" fill="#e0e0e0">(</text>
  <text x="144" y="162" font-family="monospace" font-size="9" fill="#ff9800">13</text>
  <text x="156" y="162" font-family="monospace" font-size="9" fill="#e0e0e0">, </text>
  <text x="166" y="162" font-family="monospace" font-size="9" fill="#81c784">LOW</text>
  <text x="195" y="162" font-family="monospace" font-size="9" fill="#e0e0e0">);</text>
  <text x="35" y="178" font-family="monospace" font-size="9" fill="#7f8c8d">8</text>
  <text x="48" y="178" font-family="monospace" font-size="9" fill="#e0e0e0">  </text>
  <text x="60" y="178" font-family="monospace" font-size="9" fill="#42a5f5">delay</text>
  <text x="92" y="178" font-family="monospace" font-size="9" fill="#e0e0e0">(</text>
  <text x="98" y="178" font-family="monospace" font-size="9" fill="#ff9800">1000</text>
  <text x="128" y="178" font-family="monospace" font-size="9" fill="#e0e0e0">);</text>
  <text x="35" y="194" font-family="monospace" font-size="9" fill="#7f8c8d">9</text>
  <text x="48" y="194" font-family="monospace" font-size="9" fill="#e0e0e0">}</text>
  <!-- Upload arrow -->
  <path d="M280,120 L320,100 L320,112 L380,112 L380,128 L320,128 L320,140 Z" fill="#4caf50" opacity="0.8"/>
  <text x="305" y="105" font-size="8" fill="#81c784">Upload</text>
  <!-- Arduino board on right -->
  <rect x="320" y="160" width="160" height="100" rx="4" fill="#0a5e2e" stroke="#4caf50" stroke-width="1.5"/>
  <text x="350" y="180" font-size="10" fill="#81c784">Arduino</text>
  <!-- Chip on board -->
  <rect x="370" y="190" width="30" height="25" rx="1" fill="#1a1a1a" stroke="#546e7a" stroke-width="1"/>
  <!-- LED blinking -->
  <circle cx="430" cy="200" r="6" fill="#f44336">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="420" y="220" font-size="7" fill="#81c784">LED 13</text>
  <!-- USB port -->
  <rect x="325" y="240" width="20" height="12" rx="1" fill="#546e7a"/>
  <text x="325" y="256" font-size="6" fill="#66bb6a">USB</text>
  <!-- Dashed line showing upload -->
  <line x1="380" y1="145" x2="380" y2="160" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
  <!-- Status bar -->
  <rect x="20" y="250" width="240" height="20" rx="3" fill="#1a2332" stroke="#37474f" stroke-width="1"/>
  <text x="30" y="264" font-size="8" fill="#81c784">✓ Компиляция завершена</text>
  <text x="170" y="264" font-size="8" fill="#4caf50">↑ Загрузка...</text>
  <!-- Flow labels -->
  <text x="30" y="295" font-size="9" fill="#66bb6a">1. Написать код</text>
  <text x="180" y="295" font-size="9" fill="#66bb6a">2. Проверить</text>
  <text x="330" y="295" font-size="9" fill="#66bb6a">3. Загрузить</text>
  <text x="180" y="340" font-size="9" fill="#fff" opacity="0.5">Основы программирования Arduino</text>
</svg>