<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1520"/>
  <!-- Ultrasonic sensor -->
  <rect x="180" y="60" width="50" height="70" rx="6" fill="#1a2a3a" stroke="#42a5f5" stroke-width="2"/>
  <!-- Sensor eyes (transducers) -->
  <circle cx="196" cy="85" r="10" fill="#0d1926" stroke="#42a5f5" stroke-width="1.5"/>
  <circle cx="196" cy="85" r="4" fill="#42a5f5" opacity="0.5"/>
  <circle cx="216" cy="85" r="10" fill="#0d1926" stroke="#42a5f5" stroke-width="1.5"/>
  <circle cx="216" cy="85" r="4" fill="#42a5f5" opacity="0.5"/>
  <text x="183" y="122" font-size="7" fill="#42a5f5">HC-SR04</text>
  <!-- Sound waves going right -->
  <path d="M230,80 Q240,80 240,85 Q240,90 230,90" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.8"/>
  <path d="M240,75 Q255,75 255,85 Q255,95 240,95" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.6"/>
  <path d="M250,70 Q270,70 270,85 Q270,100 250,100" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.4"/>
  <path d="M260,65 Q285,65 285,85 Q285,105 260,105" fill="none" stroke="#42a5f5" stroke-width="1.5" opacity="0.25"/>
  <!-- Wall -->
  <rect x="350" y="50" width="15" height="100" fill="#37474f" stroke="#78909c" stroke-width="1.5"/>
  <line x1="355" y1="55" x2="365" y2="65" stroke="#546e7a" stroke-width="1"/>
  <line x1="355" y1="75" x2="365" y2="85" stroke="#546e7a" stroke-width="1"/>
  <line x1="355" y1="95" x2="365" y2="105" stroke="#546e7a" stroke-width="1"/>
  <line x1="355" y1="115" x2="365" y2="125" stroke="#546e7a" stroke-width="1"/>
  <!-- Reflected waves coming back -->
  <path d="M350,90 Q340,90 340,85 Q340,80 350,80" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.6"/>
  <path d="M340,95 Q325,95 325,85 Q325,75 340,75" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.4"/>
  <path d="M330,100 Q310,100 310,85 Q310,70 330,70" fill="none" stroke="#ff9800" stroke-width="1.5" opacity="0.25"/>
  <!-- Distance measurement line -->
  <line x1="205" y1="40" x2="355" y2="40" stroke="#ffeb3b" stroke-width="1.5"/>
  <line x1="205" y1="35" x2="205" y2="45" stroke="#ffeb3b" stroke-width="1.5"/>
  <line x1="355" y1="35" x2="355" y2="45" stroke="#ffeb3b" stroke-width="1.5"/>
  <text x="250" y="35" font-size="10" fill="#ffeb3b" font-weight="bold">d = ?</text>
  <!-- Formula -->
  <rect x="40" y="160" width="420" height="55" rx="6" fill="#1a2332" stroke="#546e7a" stroke-width="1"/>
  <text x="60" y="182" font-size="11" fill="#e0e0e0">Расстояние = </text>
  <text x="160" y="182" font-size="11" fill="#42a5f5">(время × скорость звука)</text>
  <text x="360" y="182" font-size="11" fill="#e0e0e0"> / 2</text>
  <text x="60" y="205" font-size="9" fill="#78909c">v = 340 м/с    t = время возврата эха</text>
  <!-- Timing diagram -->
  <rect x="40" y="230" width="420" height="80" rx="6" fill="#1a2332" stroke="#546e7a" stroke-width="1"/>
  <text x="55" y="250" font-size="9" fill="#42a5f5">Trig</text>
  <rect x="90" y="240" width="30" height="12" fill="#42a5f5" opacity="0.5"/>
  <line x1="55" y1="246" x2="90" y2="246" stroke="#42a5f5" stroke-width="1"/>
  <line x1="120" y1="246" x2="440" y2="246" stroke="#42a5f5" stroke-width="1" opacity="0.3"/>
  <text x="55" y="275" font-size="9" fill="#ff9800">Echo</text>
  <line x1="55" y1="271" x2="120" y2="271" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
  <rect x="120" y="265" width="120" height="12" fill="#ff9800" opacity="0.4"/>
  <line x1="240" y1="271" x2="440" y2="271" stroke="#ff9800" stroke-width="1" opacity="0.3"/>
  <!-- Time measurement -->
  <line x1="120" y1="282" x2="120" y2="300" stroke="#ffeb3b" stroke-width="1"/>
  <line x1="240" y1="282" x2="240" y2="300" stroke="#ffeb3b" stroke-width="1"/>
  <line x1="120" y1="296" x2="240" y2="296" stroke="#ffeb3b" stroke-width="1"/>
  <polygon points="240,296 234,293 234,299" fill="#ffeb3b"/>
  <text x="155" y="308" font-size="8" fill="#ffeb3b">Δt (время эха)</text>
  <text x="180" y="340" font-size="9" fill="#fff" opacity="0.5">Ультразвуковой датчик расстояния</text>
</svg>