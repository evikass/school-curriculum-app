<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a1210"/>
  <!-- Motor with gear -->
  <circle cx="130" cy="140" r="50" fill="#2a1a10" stroke="#ff9800" stroke-width="2"/>
  <circle cx="130" cy="140" r="35" fill="#1a1008" stroke="#ff9800" stroke-width="1"/>
  <!-- Gear teeth -->
  <rect x="125" y="85" width="10" height="12" fill="#ff9800" opacity="0.4"/>
  <rect x="125" y="183" width="10" height="12" fill="#ff9800" opacity="0.4"/>
  <rect x="75" y="135" width="12" height="10" fill="#ff9800" opacity="0.4"/>
  <rect x="173" y="135" width="12" height="10" fill="#ff9800" opacity="0.4"/>
  <rect x="93" y="100" width="10" height="12" fill="#ff9800" opacity="0.3" transform="rotate(45,98,106)"/>
  <rect x="155" y="100" width="10" height="12" fill="#ff9800" opacity="0.3" transform="rotate(-45,160,106)"/>
  <rect x="93" y="168" width="10" height="12" fill="#ff9800" opacity="0.3" transform="rotate(-45,98,174)"/>
  <rect x="155" y="168" width="10" height="12" fill="#ff9800" opacity="0.3" transform="rotate(45,160,174)"/>
  <!-- Shaft -->
  <circle cx="130" cy="140" r="10" fill="#ff9800" opacity="0.5"/>
  <circle cx="130" cy="140" r="4" fill="#1a1008"/>
  <!-- Rotation arrow -->
  <path d="M160,110 A40,40 0 0,1 165,150" fill="none" stroke="#ffcc80" stroke-width="2"/>
  <polygon points="165,150 158,142 168,144" fill="#ffcc80"/>
  <!-- M label -->
  <text x="120" y="145" font-size="16" fill="#ff9800" font-weight="bold">M</text>
  <!-- H-Bridge circuit -->
  <rect x="220" y="60" width="180" height="170" rx="6" fill="#1a1a2a" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="260" y="82" font-size="11" fill="#42a5f5" font-weight="bold">H-мост</text>
  <!-- H-bridge diagram -->
  <!-- Top left switch -->
  <rect x="240" y="95" width="30" height="20" rx="2" fill="#2e7d32" stroke="#66bb6a" stroke-width="1"/>
  <text x="248" y="109" font-size="7" fill="#c8e6c9">S1</text>
  <!-- Top right switch -->
  <rect x="340" y="95" width="30" height="20" rx="2" fill="#2e7d32" stroke="#66bb6a" stroke-width="1"/>
  <text x="348" y="109" font-size="7" fill="#c8e6c9">S4</text>
  <!-- Bottom left switch -->
  <rect x="240" y="165" width="30" height="20" rx="2" fill="#c62828" stroke="#ef5350" stroke-width="1"/>
  <text x="248" y="179" font-size="7" fill="#ffcdd2">S2</text>
  <!-- Bottom right switch -->
  <rect x="340" y="165" width="30" height="20" rx="2" fill="#c62828" stroke="#ef5350" stroke-width="1"/>
  <text x="348" y="179" font-size="7" fill="#ffcdd2">S3</text>
  <!-- Motor in center of H -->
  <circle cx="310" cy="140" r="16" fill="#2a1a10" stroke="#ff9800" stroke-width="1.5"/>
  <text x="304" y="145" font-size="9" fill="#ff9800">M</text>
  <!-- H-bridge connections -->
  <line x1="270" y1="105" x2="294" y2="128" stroke="#66bb6a" stroke-width="1.5"/>
  <line x1="340" y1="105" x2="326" y2="128" stroke="#66bb6a" stroke-width="1.5"/>
  <line x1="270" y1="175" x2="294" y2="152" stroke="#ef5350" stroke-width="1.5"/>
  <line x1="340" y1="175" x2="326" y2="152" stroke="#ef5350" stroke-width="1.5"/>
  <!-- V+ and GND -->
  <line x1="255" y1="90" x2="355" y2="90" stroke="#f44336" stroke-width="2"/>
  <text x="290" y="87" font-size="8" fill="#ef5350">V+</text>
  <line x1="255" y1="190" x2="355" y2="190" stroke="#546e7a" stroke-width="2"/>
  <text x="290" y="200" font-size="8" fill="#78909c">GND</text>
  <!-- Direction arrows below -->
  <rect x="50" y="260" width="400" height="60" rx="6" fill="#1a1a2a" stroke="#37474f" stroke-width="1"/>
  <!-- Forward -->
  <rect x="65" y="268" width="110" height="20" rx="4" fill="#2e7d32" stroke="#66bb6a" stroke-width="1"/>
  <text x="78" y="282" font-size="9" fill="#c8e6c9">Вперёд: S1+S4</text>
  <!-- Backward -->
  <rect x="195" y="268" width="110" height="20" rx="4" fill="#c62828" stroke="#ef5350" stroke-width="1"/>
  <text x="208" y="282" font-size="9" fill="#ffcdd2">Назад: S2+S3</text>
  <!-- Stop -->
  <rect x="325" y="268" width="110" height="20" rx="4" fill="#37474f" stroke="#78909c" stroke-width="1"/>
  <text x="345" y="282" font-size="9" fill="#b0bec5">Стоп: все OFF</text>
  <!-- Spinning wheel at bottom right -->
  <circle cx="440" cy="290" r="18" fill="none" stroke="#ff9800" stroke-width="2"/>
  <line x1="440" y1="272" x2="440" y2="308" stroke="#ff9800" stroke-width="1" opacity="0.5"/>
  <line x1="422" y1="290" x2="458" y2="290" stroke="#ff9800" stroke-width="1" opacity="0.5"/>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Управление моторами</text>
</svg>