<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1520"/>
  <!-- Track/path for line follower -->
  <path d="M50,280 Q50,180 120,160 Q190,140 190,180 Q190,240 260,220 Q330,200 350,140 Q360,100 400,90" fill="none" stroke="#37474f" stroke-width="40" opacity="0.3"/>
  <path d="M50,280 Q50,180 120,160 Q190,140 190,180 Q190,240 260,220 Q330,200 350,140 Q360,100 400,90" fill="none" stroke="#1a1a1a" stroke-width="8"/>
  <!-- Robot car on track -->
  <rect x="85" y="140" width="50" height="30" rx="6" fill="#1a2a3a" stroke="#4fc3f7" stroke-width="1.5"/>
  <circle cx="92" cy="175" r="8" fill="#263238" stroke="#4fc3f7" stroke-width="1"/>
  <circle cx="128" cy="175" r="8" fill="#263238" stroke="#4fc3f7" stroke-width="1"/>
  <!-- Line sensor under robot (glowing) -->
  <rect x="100" y="168" width="20" height="5" rx="2" fill="#ff5722" opacity="0.8"/>
  <circle cx="110" cy="170" r="8" fill="#ff5722" opacity="0.15"/>
  <!-- Light sensor section -->
  <rect x="310" y="30" width="170" height="140" rx="8" fill="#1a2332" stroke="#fdd835" stroke-width="1.5"/>
  <text x="340" y="50" font-size="11" fill="#fdd835" font-weight="bold">Датчик света</text>
  <!-- Sun -->
  <circle cx="350" cy="85" r="18" fill="#fdd835" opacity="0.3"/>
  <circle cx="350" cy="85" r="12" fill="#fdd835" opacity="0.5"/>
  <line x1="350" y1="60" x2="350" y2="55" stroke="#fdd835" stroke-width="1.5" opacity="0.4"/>
  <line x1="350" y1="110" x2="350" y2="115" stroke="#fdd835" stroke-width="1.5" opacity="0.4"/>
  <line x1="325" y1="85" x2="320" y2="85" stroke="#fdd835" stroke-width="1.5" opacity="0.4"/>
  <line x1="375" y1="85" x2="380" y2="85" stroke="#fdd835" stroke-width="1.5" opacity="0.4"/>
  <!-- Light rays hitting sensor -->
  <line x1="355" y1="90" x2="400" y2="110" stroke="#fdd835" stroke-width="1" opacity="0.5"/>
  <line x1="355" y1="85" x2="400" y2="100" stroke="#fdd835" stroke-width="1" opacity="0.5"/>
  <line x1="355" y1="80" x2="400" y2="90" stroke="#fdd835" stroke-width="1" opacity="0.5"/>
  <!-- Light sensor component -->
  <rect x="395" y="95" width="30" height="25" rx="3" fill="#1a1a2a" stroke="#fdd835" stroke-width="1"/>
  <circle cx="410" cy="107" r="6" fill="#fdd835" opacity="0.3"/>
  <!-- Cloud (darkness) -->
  <ellipse cx="350" cy="140" rx="20" ry="10" fill="#546e7a" opacity="0.5"/>
  <ellipse cx="340" cy="136" rx="12" ry="8" fill="#455a64" opacity="0.4"/>
  <!-- Value readout -->
  <text x="395" y="130" font-size="8" fill="#fdd835">Ярко: 900</text>
  <text x="395" y="145" font-size="8" fill="#78909c">Тёмно: 200</text>
  <!-- Line sensor section -->
  <rect x="310" y="190" width="170" height="110" rx="8" fill="#1a2332" stroke="#ff5722" stroke-width="1.5"/>
  <text x="330" y="210" font-size="11" fill="#ff5722" font-weight="bold">Датчик линии</text>
  <!-- Line (black on white) -->
  <rect x="330" y="225" width="120" height="25" fill="#e0e0e0" stroke="#9e9e9e" stroke-width="0.5"/>
  <rect x="370" y="225" width="40" height="25" fill="#1a1a1a"/>
  <!-- Sensor above line -->
  <rect x="365" y="215" width="50" height="10" rx="3" fill="#1a1a2a" stroke="#ff5722" stroke-width="1"/>
  <circle cx="380" cy="220" r="2" fill="#ff5722" opacity="0.7"/>
  <circle cx="400" cy="220" r="2" fill="#ff5722" opacity="0.7"/>
  <!-- Value labels -->
  <text x="330" y="268" font-size="8" fill="#ff5722">Чёрная линия: LOW</text>
  <text x="330" y="282" font-size="8" fill="#9e9e9e">Белый фон: HIGH</text>
  <!-- Connection arrows -->
  <text x="150" y="135" font-size="8" fill="#4fc3f7">Робот на линии →</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Датчик линии и датчик света</text>
</svg>