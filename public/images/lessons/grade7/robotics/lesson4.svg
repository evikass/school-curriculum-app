<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0d1a12"/>
  <!-- Arduino board -->
  <rect x="100" y="40" width="300" height="200" rx="6" fill="#0a6e2e" stroke="#4caf50" stroke-width="2"/>
  <!-- PCB traces -->
  <line x1="120" y1="80" x2="200" y2="80" stroke="#2e7d32" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="80" x2="200" y2="140" stroke="#2e7d32" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="140" x2="300" y2="140" stroke="#2e7d32" stroke-width="1" opacity="0.5"/>
  <line x1="300" y1="100" x2="300" y2="180" stroke="#2e7d32" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="160" x2="250" y2="160" stroke="#2e7d32" stroke-width="1" opacity="0.5"/>
  <!-- Microcontroller chip -->
  <rect x="200" y="90" width="60" height="50" rx="2" fill="#1a1a1a" stroke="#546e7a" stroke-width="1.5"/>
  <circle cx="210" cy="100" r="3" fill="#37474f"/>
  <text x="210" y="120" font-size="7" fill="#78909c">ATmega</text>
  <text x="210" y="130" font-size="6" fill="#78909c">328P</text>
  <!-- Chip pins left -->
  <line x1="195" y1="98" x2="200" y2="98" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="195" y1="105" x2="200" y2="105" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="195" y1="112" x2="200" y2="112" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="195" y1="119" x2="200" y2="119" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="195" y1="126" x2="200" y2="126" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="195" y1="133" x2="200" y2="133" stroke="#c0ca33" stroke-width="1.5"/>
  <!-- Chip pins right -->
  <line x1="260" y1="98" x2="265" y2="98" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="260" y1="105" x2="265" y2="105" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="260" y1="112" x2="265" y2="112" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="260" y1="119" x2="265" y2="119" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="260" y1="126" x2="265" y2="126" stroke="#c0ca33" stroke-width="1.5"/>
  <line x1="260" y1="133" x2="265" y2="133" stroke="#c0ca33" stroke-width="1.5"/>
  <!-- USB connector -->
  <rect x="120" y="55" width="30" height="20" rx="2" fill="#546e7a" stroke="#90a4ae" stroke-width="1"/>
  <rect x="125" y="59" width="20" height="12" rx="1" fill="#263238"/>
  <text x="128" y="85" font-size="7" fill="#81c784">USB</text>
  <!-- LED -->
  <circle cx="350" cy="65" r="5" fill="#f44336" opacity="0.8"/>
  <circle cx="350" cy="65" r="8" fill="#f44336" opacity="0.15"/>
  <text x="340" y="85" font-size="7" fill="#81c784">LED</text>
  <!-- Power LED -->
  <circle cx="350" cy="100" r="4" fill="#4caf50" opacity="0.7"/>
  <circle cx="350" cy="100" r="7" fill="#4caf50" opacity="0.1"/>
  <text x="340" y="118" font-size="7" fill="#81c784">PWR</text>
  <!-- Digital pins (top) -->
  <g>
    <rect x="145" y="42" width="4" height="8" fill="#c0ca33" opacity="0.6"/>
    <rect x="155" y="42" width="4" height="8" fill="#c0ca33" opacity="0.6"/>
    <rect x="165" y="42" width="4" height="8" fill="#c0ca33" opacity="0.6"/>
    <rect x="175" y="42" width="4" height="8" fill="#c0ca33" opacity="0.6"/>
    <rect x="185" y="42" width="4" height="8" fill="#c0ca33" opacity="0.6"/>
    <rect x="195" y="42" width="4" height="8" fill="#c0ca33" opacity="0.6"/>
  </g>
  <text x="150" y="40" font-size="6" fill="#81c784">D7 D8 D9 D10 D11 D12</text>
  <!-- Analog pins (bottom) -->
  <g>
    <rect x="145" y="232" width="4" height="8" fill="#42a5f5" opacity="0.6"/>
    <rect x="155" y="232" width="4" height="8" fill="#42a5f5" opacity="0.6"/>
    <rect x="165" y="232" width="4" height="8" fill="#42a5f5" opacity="0.6"/>
    <rect x="175" y="232" width="4" height="8" fill="#42a5f5" opacity="0.6"/>
    <rect x="185" y="232" width="4" height="8" fill="#42a5f5" opacity="0.6"/>
  </g>
  <text x="145" y="250" font-size="6" fill="#81c784">A0 A1 A2 A3 A4 A5</text>
  <!-- Reset button -->
  <circle cx="280" cy="65" r="6" fill="#37474f" stroke="#546e7a" stroke-width="1"/>
  <text x="268" y="80" font-size="6" fill="#81c784">RST</text>
  <!-- Crystal oscillator -->
  <rect x="280" y="155" width="15" height="8" rx="2" fill="#546e7a" opacity="0.6"/>
  <text x="278" y="175" font-size="6" fill="#81c784">16MHz</text>
  <!-- Labels -->
  <text x="200" y="30" font-size="12" fill="#4caf50" font-weight="bold" text-anchor="middle">ARDUINO UNO</text>
  <!-- Legend -->
  <rect x="40" y="275" width="420" height="50" rx="6" fill="#0a2a15" stroke="#2e7d32" stroke-width="1"/>
  <circle cx="65" cy="292" r="5" fill="#c0ca33"/>
  <text x="78" y="296" font-size="8" fill="#a5d6a7">Цифровые пины</text>
  <circle cx="185" cy="292" r="5" fill="#42a5f5"/>
  <text x="198" y="296" font-size="8" fill="#a5d6a7">Аналоговые пины</text>
  <circle cx="325" cy="292" r="5" fill="#f44336"/>
  <text x="338" y="296" font-size="8" fill="#a5d6a7">Светодиоды</text>
  <text x="75" y="315" font-size="7" fill="#66bb6a" opacity="0.6">Открытая платформа для создания электронных проектов</text>
  <text x="180" y="340" font-size="9" fill="#fff" opacity="0.5">Arduino — платформа для роботов</text>
</svg>