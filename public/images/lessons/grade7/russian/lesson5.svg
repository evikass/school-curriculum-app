<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FCE4EC"/>
<!-- Main verb -->
<rect x="180" y="60" width="140" height="50" rx="8" fill="#AD1457" opacity="0.2" stroke="#AD1457" stroke-width="2"/>
<text x="250" y="85" font-family="sans-serif" font-size="14" fill="#880E4F" text-anchor="middle" font-weight="bold">Глагол</text>
<text x="250" y="102" font-family="serif" font-size="13" fill="#AD1457" text-anchor="middle">читал</text>
<!-- Plus deeyerichastie -->
<text x="250" y="140" font-family="sans-serif" font-size="20" fill="#880E4F" text-anchor="middle">+</text>
<!-- Deeyerichastie -->
<rect x="160" y="150" width="180" height="50" rx="8" fill="#E91E63" opacity="0.2" stroke="#E91E63" stroke-width="2.5"/>
<text x="250" y="175" font-family="sans-serif" font-size="14" fill="#880E4F" text-anchor="middle" font-weight="bold">Деепричастие</text>
<text x="250" y="192" font-family="serif" font-size="13" fill="#C2185B" text-anchor="middle">читая</text>
<!-- Combined sentence -->
<rect x="50" y="220" width="400" height="60" rx="8" fill="#F8BBD0" opacity="0.3" stroke="#AD1457" stroke-width="1"/>
<text x="250" y="245" font-family="serif" font-size="15" fill="#880E4F" text-anchor="middle">Читая книгу, он улыбался.</text>
<text x="250" y="268" font-family="sans-serif" font-size="11" fill="#AD1457" text-anchor="middle">добавочное действие + основное</text>
<!-- Properties -->
<rect x="40" y="295" width="200" height="35" rx="5" fill="#FCE4EC" stroke="#E91E63" stroke-width="1"/>
<text x="140" y="317" font-family="sans-serif" font-size="10" fill="#880E4F" text-anchor="middle">не изменяется (не спрягается)</text>
<rect x="260" y="295" width="200" height="35" rx="5" fill="#FCE4EC" stroke="#E91E63" stroke-width="1"/>
<text x="360" y="317" font-family="sans-serif" font-size="10" fill="#880E4F" text-anchor="middle">вид: соверш./несоверш.</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#880E4F" opacity="0.5" text-anchor="middle">Деепричастие как часть речи</text>
</svg>