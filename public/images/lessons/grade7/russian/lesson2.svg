<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFF3E0"/>
<!-- Word: ПЕРЕЛЕСКИ -->
<!-- Morpheme breakdown -->
<rect x="30" y="80" width="60" height="50" rx="4" fill="#FF8A65" opacity="0.3" stroke="#BF360C" stroke-width="1.5"/>
<text x="60" y="112" font-family="serif" font-size="22" fill="#BF360C" text-anchor="middle">пере</text>
<rect x="95" y="80" width="70" height="50" rx="4" fill="#81C784" opacity="0.4" stroke="#1B5E20" stroke-width="2"/>
<text x="130" y="112" font-family="serif" font-size="22" fill="#1B5E20" text-anchor="middle">лес</text>
<rect x="170" y="80" width="60" height="50" rx="4" fill="#64B5F6" opacity="0.3" stroke="#0D47A1" stroke-width="1.5"/>
<text x="200" y="112" font-family="serif" font-size="22" fill="#0D47A1" text-anchor="middle">к</text>
<rect x="235" y="80" width="55" height="50" rx="4" fill="#CE93D8" opacity="0.3" stroke="#6A1B9A" stroke-width="1.5"/>
<text x="262" y="112" font-family="serif" font-size="22" fill="#6A1B9A" text-anchor="middle">и</text>
<!-- Labels -->
<text x="60" y="148" font-family="sans-serif" font-size="10" fill="#BF360C" text-anchor="middle">приставка</text>
<text x="130" y="148" font-family="sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">корень</text>
<text x="200" y="148" font-family="sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle">суффикс</text>
<text x="262" y="148" font-family="sans-serif" font-size="10" fill="#6A1B9A" text-anchor="middle">окончание</text>
<!-- Tree diagram -->
<line x1="250" y1="170" x2="250" y2="190" stroke="#555" stroke-width="1.5"/>
<line x1="250" y1="190" x2="100" y2="220" stroke="#555" stroke-width="1"/>
<line x1="250" y1="190" x2="200" y2="220" stroke="#555" stroke-width="1"/>
<line x1="250" y1="190" x2="300" y2="220" stroke="#555" stroke-width="1"/>
<line x1="250" y1="190" x2="400" y2="220" stroke="#555" stroke-width="1"/>
<rect x="60" y="220" width="80" height="30" rx="4" fill="#FF8A65" opacity="0.3"/>
<text x="100" y="240" font-family="sans-serif" font-size="11" fill="#BF360C" text-anchor="middle">приставка</text>
<rect x="155" y="220" width="90" height="30" rx="4" fill="#81C784" opacity="0.4"/>
<text x="200" y="240" font-family="sans-serif" font-size="11" fill="#1B5E20" text-anchor="middle">корень</text>
<rect x="260" y="220" width="80" height="30" rx="4" fill="#64B5F6" opacity="0.3"/>
<text x="300" y="240" font-family="sans-serif" font-size="11" fill="#0D47A1" text-anchor="middle">суффикс</text>
<rect x="360" y="220" width="80" height="30" rx="4" fill="#CE93D8" opacity="0.3"/>
<text x="400" y="240" font-family="sans-serif" font-size="11" fill="#6A1B9A" text-anchor="middle">окончание</text>
<!-- Another example -->
<rect x="50" y="270" width="400" height="45" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
<text x="70" y="298" font-family="serif" font-size="18" fill="#333">подоконник</text>
<text x="250" y="298" font-family="sans-serif" font-size="11" fill="#BF360C">под-</text>
<text x="280" y="298" font-family="sans-serif" font-size="11" fill="#1B5E20">-окон-</text>
<text x="322" y="298" font-family="sans-serif" font-size="11" fill="#0D47A1">-ник</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#BF360C" opacity="0.5" text-anchor="middle">Состав слова</text>
</svg>