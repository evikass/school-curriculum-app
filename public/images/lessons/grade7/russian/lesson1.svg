<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E3F2FD"/>
<!-- Sound waves -->
<path d="M60 100 Q80 60 100 100 Q120 140 140 100" stroke="#1565C0" stroke-width="2" fill="none"/>
<path d="M50 100 Q80 40 110 100 Q140 160 170 100" stroke="#1976D2" stroke-width="1.5" fill="none" opacity="0.6"/>
<path d="M40 100 Q80 20 120 100 Q160 180 200 100" stroke="#42A5F5" stroke-width="1" fill="none" opacity="0.3"/>
<!-- Letters floating -->
<text x="250" y="60" font-family="serif" font-size="48" fill="#0D47A1" text-anchor="middle" font-weight="bold" opacity="0.8">А</text>
<text x="310" y="90" font-family="serif" font-size="36" fill="#1565C0" opacity="0.6">О</text>
<text x="370" y="55" font-family="serif" font-size="28" fill="#1976D2" opacity="0.5">У</text>
<text x="420" y="80" font-family="serif" font-size="32" fill="#42A5F5" opacity="0.4">И</text>
<!-- Phonetic transcription example -->
<rect x="50" y="140" width="400" height="70" rx="8" fill="#BBDEFB" opacity="0.5"/>
<text x="70" y="170" font-family="sans-serif" font-size="16" fill="#0D47A1">молоко</text>
<text x="70" y="195" font-family="monospace" font-size="14" fill="#1565C0">[малако́]</text>
<text x="220" y="182" font-family="sans-serif" font-size="12" fill="#1976D2">→ оглушение</text>
<!-- Vowels vs consonants -->
<rect x="50" y="230" width="190" height="80" rx="8" fill="#C8E6C9" opacity="0.4" stroke="#2E7D32" stroke-width="1"/>
<text x="145" y="255" font-family="sans-serif" font-size="13" fill="#1B5E20" text-anchor="middle" font-weight="bold">Гласные</text>
<text x="145" y="275" font-family="serif" font-size="14" fill="#2E7D32" text-anchor="middle">а о у э ы и</text>
<text x="145" y="300" font-family="sans-serif" font-size="10" fill="#388E3C" text-anchor="middle">6 звуков</text>
<rect x="260" y="230" width="190" height="80" rx="8" fill="#FFCDD2" opacity="0.4" stroke="#C62828" stroke-width="1"/>
<text x="355" y="255" font-family="sans-serif" font-size="13" fill="#B71C1C" text-anchor="middle" font-weight="bold">Согласные</text>
<text x="355" y="275" font-family="serif" font-size="11" fill="#C62828" text-anchor="middle">звонкие / глухие</text>
<text x="355" y="295" font-family="sans-serif" font-size="10" fill="#D32F2F" text-anchor="middle">твёрдые / мягкие</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#0D47A1" opacity="0.5" text-anchor="middle">Фонетика и графика</text>
</svg>