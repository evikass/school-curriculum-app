<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#F3E5F5"/>
<!-- Verb on left -->
<ellipse cx="100" cy="100" rx="70" ry="35" fill="#7B1FA2" opacity="0.2" stroke="#7B1FA2" stroke-width="2"/>
<text x="100" y="96" font-family="sans-serif" font-size="14" fill="#4A148C" text-anchor="middle" font-weight="bold">Глагол</text>
<text x="100" y="114" font-family="serif" font-size="13" fill="#6A1B9A" text-anchor="middle">читать</text>
<!-- Adjective on right -->
<ellipse cx="400" cy="100" rx="70" ry="35" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="2"/>
<text x="400" y="96" font-family="sans-serif" font-size="14" fill="#0D47A1" text-anchor="middle" font-weight="bold">Прилаг.</text>
<text x="400" y="114" font-family="serif" font-size="13" fill="#1565C0" text-anchor="middle">читающий</text>
<!-- Arrows pointing to center -->
<defs><marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#C62828"/></marker></defs>
<path d="M170 100 L220 100" stroke="#7B1FA2" stroke-width="2" marker-end="url(#ar)"/>
<path d="M330 100 L280 100" stroke="#1565C0" stroke-width="2" marker-end="url(#ar)"/>
<!-- Participle in center -->
<rect x="200" y="75" width="100" height="50" rx="10" fill="#C62828" opacity="0.15" stroke="#C62828" stroke-width="2.5"/>
<text x="250" y="98" font-family="sans-serif" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">Причастие</text>
<text x="250" y="115" font-family="serif" font-size="12" fill="#B71C1C" text-anchor="middle">читающий</text>
<!-- Properties -->
<rect x="50" y="160" width="180" height="70" rx="6" fill="#F8BBD0" opacity="0.3" stroke="#C62828" stroke-width="1"/>
<text x="140" y="182" font-family="sans-serif" font-size="11" fill="#880E4F" text-anchor="middle" font-weight="bold">От глагола:</text>
<text x="140" y="198" font-family="sans-serif" font-size="10" fill="#880E4F" text-anchor="middle">вид, время, возвратность</text>
<text x="140" y="214" font-family="sans-serif" font-size="10" fill="#880E4F" text-anchor="middle">переходность</text>
<rect x="270" y="160" width="180" height="70" rx="6" fill="#BBDEFB" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
<text x="360" y="182" font-family="sans-serif" font-size="11" fill="#0D47A1" text-anchor="middle" font-weight="bold">От прилагательного:</text>
<text x="360" y="198" font-family="sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle">род, число, падеж</text>
<text x="360" y="214" font-family="sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle">полная/краткая форма</text>
<!-- Question -->
<text x="250" y="265" font-family="sans-serif" font-size="14" fill="#4A148C" text-anchor="middle">какой? что делающий? что сделавший?</text>
<!-- Example -->
<rect x="80" y="280" width="340" height="40" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
<text x="250" y="305" font-family="serif" font-size="14" fill="#4A148C" text-anchor="middle">Бегущий мальчик прочитал книгу</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#4A148C" opacity="0.5" text-anchor="middle">Причастие как часть речи</text>
</svg>