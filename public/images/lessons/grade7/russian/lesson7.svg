<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFFDE7"/>
<!-- Verb in center -->
<rect x="190" y="70" width="120" height="45" rx="8" fill="#F57F17" opacity="0.2" stroke="#F57F17" stroke-width="2"/>
<text x="250" y="97" font-family="serif" font-size="18" fill="#E65100" text-anchor="middle">бежал</text>
<!-- Arrow from adverb to verb -->
<rect x="50" y="155" width="140" height="45" rx="8" fill="#00695C" opacity="0.15" stroke="#00695C" stroke-width="2"/>
<text x="120" y="177" font-family="sans-serif" font-size="13" fill="#004D40" text-anchor="middle" font-weight="bold">Наречие</text>
<text x="120" y="194" font-family="serif" font-size="15" fill="#00695C" text-anchor="middle">быстро</text>
<path d="M190 175 L185 175" stroke="#00695C" stroke-width="2"/>
<line x1="140" y1="155" x2="200" y2="115" stroke="#00695C" stroke-width="2" marker-end="url(#ag)"/>
<defs><marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00695C"/></marker></defs>
<!-- Question words -->
<text x="160" y="140" font-family="sans-serif" font-size="11" fill="#004D40" font-style="italic">как?</text>
<!-- More adverb examples -->
<rect x="300" y="155" width="170" height="45" rx="8" fill="#00695C" opacity="0.1" stroke="#00695C" stroke-width="1.5"/>
<text x="385" y="177" font-family="sans-serif" font-size="12" fill="#004D40" text-anchor="middle">вчера, здесь, очень</text>
<text x="385" y="194" font-family="sans-serif" font-size="10" fill="#00695C" text-anchor="middle">когда? где? сколько?</text>
<!-- Properties box -->
<rect x="50" y="225" width="400" height="80" rx="8" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
<text x="250" y="248" font-family="sans-serif" font-size="13" fill="#E65100" text-anchor="middle" font-weight="bold">Признаки наречия</text>
<text x="80" y="268" font-family="sans-serif" font-size="11" fill="#F57F17">• Не изменяется (нет окончания)</text>
<text x="80" y="285" font-family="sans-serif" font-size="11" fill="#F57F17">• Обозначает признак действия</text>
<text x="80" y="302" font-family="sans-serif" font-size="11" fill="#F57F17">• Вопросы: как? где? когда? куда? зачем?</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#E65100" opacity="0.5" text-anchor="middle">Наречие как часть речи</text>
</svg>