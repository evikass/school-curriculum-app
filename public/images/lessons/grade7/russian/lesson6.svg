<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E8EAF6"/>
<!-- Sentence with highlighted gerund phrase -->
<text x="250" y="50" font-family="sans-serif" font-size="14" fill="#1A237E" text-anchor="middle" font-weight="bold">Деепричастный оборот</text>
<!-- Full sentence -->
<text x="60" y="110" font-family="serif" font-size="18" fill="#283593">Мальчик,</text>
<rect x="138" y="90" width="230" height="30" rx="4" fill="#7C4DFF" opacity="0.15"/>
<text x="148" y="110" font-family="serif" font-size="18" fill="#7C4DFF" font-weight="bold">улыбаясь весело,</text>
<text x="375" y="110" font-family="serif" font-size="18" fill="#283593">помахал рукой.</text>
<!-- Bracket showing the phrase -->
<path d="M140 125 L140 135 L365 135 L365 125" stroke="#7C4DFF" stroke-width="1.5" fill="none"/>
<text x="250" y="150" font-family="sans-serif" font-size="11" fill="#7C4DFF" text-anchor="middle">деепричастный оборот</text>
<!-- Breakdown -->
<rect x="50" y="170" width="400" height="90" rx="8" fill="#C5CAE9" opacity="0.3" stroke="#3949AB" stroke-width="1"/>
<text x="70" y="195" font-family="sans-serif" font-size="12" fill="#1A237E">Главное слово:</text>
<text x="170" y="195" font-family="serif" font-size="14" fill="#283593" font-weight="bold">помахал</text>
<text x="250" y="195" font-family="sans-serif" font-size="12" fill="#888">(глагол)</text>
<text x="70" y="220" font-family="sans-serif" font-size="12" fill="#1A237E">Деепричастие:</text>
<text x="170" y="220" font-family="serif" font-size="14" fill="#7C4DFF" font-weight="bold">улыбаясь</text>
<text x="250" y="220" font-family="sans-serif" font-size="12" fill="#888">(несов. вид)</text>
<text x="70" y="245" font-family="sans-serif" font-size="12" fill="#1A237E">Зависимое слово:</text>
<text x="195" y="245" font-family="serif" font-size="14" fill="#7C4DFF" font-weight="bold">весело</text>
<text x="250" y="245" font-family="sans-serif" font-size="12" fill="#888">(наречие)</text>
<!-- Commas reminder -->
<text x="250" y="290" font-family="sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">⚠ Обособляется запятыми!</text>
<text x="250" y="310" font-family="serif" font-size="13" fill="#283593" text-anchor="middle">, деепричастный оборот ,</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#1A237E" opacity="0.5" text-anchor="middle">Деепричастный оборот</text>
</svg>