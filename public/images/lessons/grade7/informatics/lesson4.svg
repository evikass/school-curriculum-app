<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E3F2FD"/>
<!-- Loop arrow cycling through steps -->
<defs><marker id="loopArr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#1565C0"/></marker></defs>
<!-- Central circular arrow -->
<circle cx="250" cy="150" r="80" fill="none" stroke="#1565C0" stroke-width="4" stroke-dasharray="15,5" opacity="0.3"/>
<path d="M320 110 A80 80 0 0 1 330 160" stroke="#1565C0" stroke-width="4" fill="none" marker-end="url(#loopArr)"/>
<!-- Steps around the loop -->
<rect x="200" y="50" width="100" height="30" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
<text x="250" y="70" font-family="monospace" font-size="11" fill="#0D47A1" text-anchor="middle">i = 0</text>
<rect x="340" y="110" width="100" height="30" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
<text x="390" y="130" font-family="monospace" font-size="11" fill="#0D47A1" text-anchor="middle">i < 10?</text>
<rect x="320" y="195" width="100" height="30" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="370" y="215" font-family="monospace" font-size="11" fill="#1B5E20" text-anchor="middle">действие</text>
<rect x="150" y="195" width="100" height="30" rx="6" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
<text x="200" y="215" font-family="monospace" font-size="11" fill="#C62828" text-anchor="middle">i = i + 1</text>
<!-- While loop code -->
<rect x="30" y="260" width="200" height="60" rx="8" fill="#1E1E2E"/>
<text x="45" y="280" font-family="monospace" font-size="11" fill="#C792EA">while</text>
<text x="90" y="280" font-family="monospace" font-size="11" fill="#82AAFF"> i</text>
<text x="100" y="280" font-family="monospace" font-size="11" fill="#89DDFF"> < </text>
<text x="115" y="280" font-family="monospace" font-size="11" fill="#F78C6C">10</text>
<text x="125" y="280" font-family="monospace" font-size="11" fill="#89DDFF">:</text>
<text x="55" y="298" font-family="monospace" font-size="11" fill="#82AAFF">  print</text>
<text x="105" y="298" font-family="monospace" font-size="11" fill="#89DDFF">(</text>
<text x="112" y="298" font-family="monospace" font-size="11" fill="#82AAFF">i</text>
<text x="122" y="298" font-family="monospace" font-size="11" fill="#89DDFF">)</text>
<text x="55" y="314" font-family="monospace" font-size="11" fill="#82AAFF">  i</text>
<text x="68" y="314" font-family="monospace" font-size="11" fill="#89DDFF">+= </text>
<text x="88" y="314" font-family="monospace" font-size="11" fill="#F78C6C">1</text>
<!-- For loop code -->
<rect x="260" y="260" width="220" height="60" rx="8" fill="#1E1E2E"/>
<text x="275" y="280" font-family="monospace" font-size="11" fill="#C792EA">for</text>
<text x="298" y="280" font-family="monospace" font-size="11" fill="#82AAFF"> i</text>
<text x="310" y="280" font-family="monospace" font-size="11" fill="#C792EA"> in</text>
<text x="330" y="280" font-family="monospace" font-size="11" fill="#82AAFF"> range</text>
<text x="378" y="280" font-family="monospace" font-size="11" fill="#89DDFF">(</text>
<text x="385" y="280" font-family="monospace" font-size="11" fill="#F78C6C">10</text>
<text x="400" y="280" font-family="monospace" font-size="11" fill="#89DDFF">):</text>
<text x="285" y="298" font-family="monospace" font-size="11" fill="#82AAFF">  print</text>
<text x="335" y="298" font-family="monospace" font-size="11" fill="#89DDFF">(</text>
<text x="342" y="298" font-family="monospace" font-size="11" fill="#82AAFF">i</text>
<text x="352" y="298" font-family="monospace" font-size="11" fill="#89DDFF">)</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#1565C0" opacity="0.5" text-anchor="middle">Циклы в программировании</text>
</svg>