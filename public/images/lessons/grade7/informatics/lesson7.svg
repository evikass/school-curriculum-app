<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E8EAF6"/>
<!-- Browser window -->
<rect x="30" y="25" width="440" height="290" rx="10" fill="white" stroke="#5C6BC0" stroke-width="2"/>
<!-- Title bar -->
<rect x="30" y="25" width="440" height="28" rx="10" fill="#3F51B5"/>
<rect x="30" y="43" width="440" height="10" fill="#3F51B5"/>
<!-- Browser buttons -->
<circle cx="50" cy="39" r="5" fill="#FF5F56"/>
<circle cx="66" cy="39" r="5" fill="#FFBD2E"/>
<circle cx="82" cy="39" r="5" fill="#27C93F"/>
<!-- URL bar -->
<rect x="100" y="31" width="300" height="16" rx="8" fill="#E8EAF6"/>
<text x="115" y="43" font-family="monospace" font-size="9" fill="#5C6BC0">https://mysite.ru/index.html</text>
<!-- Page content area -->
<rect x="42" y="58" width="416" height="245" rx="4" fill="#FAFAFA"/>
<!-- Header -->
<rect x="52" y="68" width="396" height="40" rx="4" fill="#3F51B5"/>
<text x="250" y="93" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Мой первый сайт</text>
<!-- Navigation -->
<rect x="52" y="115" width="396" height="22" rx="3" fill="#C5CAE9"/>
<text x="90" y="130" font-family="sans-serif" font-size="9" fill="#3F51B5">Главная</text>
<text x="155" y="130" font-family="sans-serif" font-size="9" fill="#3F51B5">О нас</text>
<text x="210" y="130" font-family="sans-serif" font-size="9" fill="#3F51B5">Галерея</text>
<text x="275" y="130" font-family="sans-serif" font-size="9" fill="#3F51B5">Контакты</text>
<!-- Content -->
<rect x="52" y="145" width="250" height="130" rx="3" fill="white" stroke="#E0E0E0" stroke-width="1"/>
<text x="62" y="165" font-family="sans-serif" font-size="11" fill="#333" font-weight="bold">Добро пожаловать!</text>
<line x1="62" y1="172" x2="280" y2="172" stroke="#E0E0E0" stroke-width="0.5"/>
<text x="62" y="190" font-family="sans-serif" font-size="9" fill="#666">Это мой первый сайт,</text>
<text x="62" y="204" font-family="sans-serif" font-size="9" fill="#666">созданный с помощью</text>
<text x="62" y="218" font-family="sans-serif" font-size="9" fill="#666">HTML и CSS.</text>
<!-- Button -->
<rect x="62" y="240" width="80" height="22" rx="11" fill="#3F51B5"/>
<text x="102" y="255" font-family="sans-serif" font-size="9" fill="white" text-anchor="middle">Читать далее</text>
<!-- Sidebar -->
<rect x="312" y="145" width="136" height="130" rx="3" fill="white" stroke="#E0E0E0" stroke-width="1"/>
<text x="322" y="165" font-family="sans-serif" font-size="10" fill="#333" font-weight="bold">Меню</text>
<line x1="322" y1="172" x2="438" y2="172" stroke="#E0E0E0" stroke-width="0.5"/>
<text x="322" y="190" font-family="sans-serif" font-size="9" fill="#5C6BC0">▪ Ссылка 1</text>
<text x="322" y="205" font-family="sans-serif" font-size="9" fill="#5C6BC0">▪ Ссылка 2</text>
<text x="322" y="220" font-family="sans-serif" font-size="9" fill="#5C6BC0">▪ Ссылка 3</text>
<!-- Footer -->
<rect x="52" y="280" width="396" height="16" rx="2" fill="#E8EAF6"/>
<text x="250" y="292" font-family="sans-serif" font-size="8" fill="#5C6BC0" text-anchor="middle">© 2024 Мой сайт</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#3F51B5" opacity="0.5" text-anchor="middle">Создание веб-страницы</text>
</svg>