<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E0F7FA"/>
<!-- Step-by-step instruction blocks -->
<!-- Step 1 -->
<rect x="40" y="40" width="110" height="60" rx="8" fill="#00695C" opacity="0.9"/>
<text x="95" y="65" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Шаг 1</text>
<text x="95" y="82" font-family="sans-serif" font-size="10" fill="#B2DFDB" text-anchor="middle">Входные данные</text>
<!-- Arrow -->
<path d="M150 70 L165 70" stroke="#00695C" stroke-width="2.5" marker-end="url(#stepArr)"/>
<defs><marker id="stepArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00695C"/></marker></defs>
<!-- Step 2 -->
<rect x="175" y="40" width="110" height="60" rx="8" fill="#00897B" opacity="0.9"/>
<text x="230" y="65" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Шаг 2</text>
<text x="230" y="82" font-family="sans-serif" font-size="10" fill="#B2DFDB" text-anchor="middle">Обработка</text>
<!-- Arrow -->
<path d="M285 70 L300 70" stroke="#00695C" stroke-width="2.5" marker-end="url(#stepArr)"/>
<!-- Step 3 -->
<rect x="310" y="40" width="110" height="60" rx="8" fill="#26A69A" opacity="0.9"/>
<text x="365" y="65" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Шаг 3</text>
<text x="365" y="82" font-family="sans-serif" font-size="10" fill="#B2DFDB" text-anchor="middle">Результат</text>
<!-- Recipe example -->
<text x="250" y="135" font-family="sans-serif" font-size="14" fill="#004D40" text-anchor="middle" font-weight="bold">Алгоритм = порядок действий</text>
<!-- Tea making algorithm -->
<rect x="50" y="150" width="180" height="150" rx="8" fill="#B2DFDB" opacity="0.4" stroke="#00695C" stroke-width="1"/>
<text x="140" y="170" font-family="sans-serif" font-size="11" fill="#004D40" text-anchor="middle" font-weight="bold">Приготовление чая</text>
<text x="65" y="192" font-family="sans-serif" font-size="10" fill="#00695C">1. Вскипятить воду</text>
<text x="65" y="210" font-family="sans-serif" font-size="10" fill="#00695C">2. Положить пакетик</text>
<text x="65" y="228" font-family="sans-serif" font-size="10" fill="#00695C">3. Залить водой</text>
<text x="65" y="246" font-family="sans-serif" font-size="10" fill="#00695C">4. Подождать 3 мин</text>
<text x="65" y="264" font-family="sans-serif" font-size="10" fill="#00695C">5. Достать пакетик</text>
<text x="65" y="282" font-family="sans-serif" font-size="10" fill="#00695C">6. Добавить сахар</text>
<!-- Properties -->
<rect x="260" y="150" width="210" height="150" rx="8" fill="#E0F2F1" stroke="#00695C" stroke-width="1"/>
<text x="365" y="170" font-family="sans-serif" font-size="11" fill="#004D40" text-anchor="middle" font-weight="bold">Свойства алгоритма</text>
<circle cx="275" cy="193" r="6" fill="#00695C"/>
<text x="290" y="197" font-family="sans-serif" font-size="10" fill="#004D40">Дискретность</text>
<circle cx="275" cy="218" r="6" fill="#00897B"/>
<text x="290" y="222" font-family="sans-serif" font-size="10" fill="#004D40">Определённость</text>
<circle cx="275" cy="243" r="6" fill="#26A69A"/>
<text x="290" y="247" font-family="sans-serif" font-size="10" fill="#004D40">Результативность</text>
<circle cx="275" cy="268" r="6" fill="#4DB6AC"/>
<text x="290" y="272" font-family="sans-serif" font-size="10" fill="#004D40">Массовость</text>
<circle cx="275" cy="293" r="6" fill="#80CBC4"/>
<text x="290" y="297" font-family="sans-serif" font-size="10" fill="#004D40">Понятность</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#004D40" opacity="0.5" text-anchor="middle">Что такое алгоритм</text>
</svg>