<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#F3E5F5"/>
<!-- Before and After transformation -->
<text x="130" y="30" font-family="sans-serif" font-size="14" fill="#6A1B9A" text-anchor="middle" font-weight="bold">До CSS</text>
<text x="370" y="30" font-family="sans-serif" font-size="14" fill="#6A1B9A" text-anchor="middle" font-weight="bold">После CSS</text>
<!-- Arrow between -->
<path d="M230 25 L270 25" stroke="#6A1B9A" stroke-width="3" marker-end="url(#cssArr)"/>
<defs><marker id="cssArr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#6A1B9A"/></marker></defs>
<!-- Before: plain box -->
<rect x="40" y="50" width="180" height="100" rx="0" fill="white" stroke="#999" stroke-width="1"/>
<text x="130" y="80" font-family="sans-serif" font-size="16" fill="#333" text-anchor="middle">Заголовок</text>
<text x="130" y="105" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle">Обычный текст</text>
<rect x="55" y="115" width="50" height="25" fill="#DDD" stroke="#999" stroke-width="0.5"/>
<text x="80" y="132" font-family="sans-serif" font-size="9" fill="#666" text-anchor="middle">Кнопка</text>
<!-- After: styled box -->
<rect x="280" y="50" width="180" height="100" rx="12" fill="#7B1FA2" stroke="#4A148C" stroke-width="1"/>
<text x="370" y="80" font-family="sans-serif" font-size="16" fill="white" text-anchor="middle">Заголовок</text>
<text x="370" y="100" font-family="sans-serif" font-size="11" fill="#CE93D8" text-anchor="middle">Обычный текст</text>
<rect x="305" y="110" width="60" height="28" rx="14" fill="#FF4081"/>
<text x="335" y="128" font-family="sans-serif" font-size="10" fill="white" text-anchor="middle">Кнопка</text>
<!-- CSS Properties list -->
<rect x="30" y="175" width="440" height="140" rx="8" fill="#1E1E2E"/>
<text x="50" y="200" font-family="monospace" font-size="12" fill="#C792EA">.box</text>
<text x="80" y="200" font-family="monospace" font-size="12" fill="#89DDFF">{</text>
<text x="65" y="220" font-family="monospace" font-size="12" fill="#82AAFF">  background</text>
<text x="165" y="220" font-family="monospace" font-size="12" fill="#89DDFF">:</text>
<text x="175" y="220" font-family="monospace" font-size="12" fill="#C3E88D"> #7B1FA2</text>
<text x="255" y="220" font-family="monospace" font-size="12" fill="#89DDFF">;</text>
<text x="65" y="240" font-family="monospace" font-size="12" fill="#82AAFF">  border-radius</text>
<text x="185" y="240" font-family="monospace" font-size="12" fill="#89DDFF">:</text>
<text x="195" y="240" font-family="monospace" font-size="12" fill="#F78C6C"> 12px</text>
<text x="240" y="240" font-family="monospace" font-size="12" fill="#89DDFF">;</text>
<text x="65" y="260" font-family="monospace" font-size="12" fill="#82AAFF">  color</text>
<text x="120" y="260" font-family="monospace" font-size="12" fill="#89DDFF">:</text>
<text x="130" y="260" font-family="monospace" font-size="12" fill="#C3E88D"> white</text>
<text x="180" y="260" font-family="monospace" font-size="12" fill="#89DDFF">;</text>
<text x="80" y="280" font-family="monospace" font-size="12" fill="#89DDFF">}</text>
<!-- Property labels -->
<text x="280" y="220" font-family="sans-serif" font-size="10" fill="#9C27B0">фон</text>
<text x="280" y="240" font-family="sans-serif" font-size="10" fill="#9C27B0">скругление</text>
<text x="280" y="260" font-family="sans-serif" font-size="10" fill="#9C27B0">цвет текста</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#6A1B9A" opacity="0.5" text-anchor="middle">Основы CSS</text>
</svg>