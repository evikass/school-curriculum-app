<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E8F5E9"/>
<!-- Flowchart -->
<!-- Start oval -->
<ellipse cx="250" cy="40" rx="50" ry="20" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
<text x="250" y="45" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Начало</text>
<!-- Arrow down -->
<line x1="250" y1="60" x2="250" y2="85" stroke="#1B5E20" stroke-width="2"/>
<polygon points="250,90 246,82 254,82" fill="#1B5E20"/>
<!-- Input parallelogram -->
<polygon points="200,95 310,95 300,125 190,125" fill="#FF8F00" opacity="0.2" stroke="#E65100" stroke-width="1.5"/>
<text x="250" y="115" font-family="monospace" font-size="11" fill="#E65100" text-anchor="middle">Ввод x</text>
<!-- Arrow down -->
<line x1="250" y1="125" x2="250" y2="155" stroke="#1B5E20" stroke-width="2"/>
<polygon points="250,160 246,152 254,152" fill="#1B5E20"/>
<!-- Decision diamond -->
<polygon points="250,165 330,200 250,235 170,200" fill="#C62828" opacity="0.15" stroke="#C62828" stroke-width="2"/>
<text x="250" y="198" font-family="monospace" font-size="12" fill="#C62828" text-anchor="middle">x > 0?</text>
<!-- Yes arrow (right) -->
<line x1="330" y1="200" x2="390" y2="200" stroke="#2E7D32" stroke-width="2"/>
<polygon points="395,200 387,196 387,204" fill="#2E7D32"/>
<text x="355" y="192" font-family="sans-serif" font-size="10" fill="#2E7D32">Да</text>
<!-- No arrow (left) -->
<line x1="170" y1="200" x2="110" y2="200" stroke="#C62828" stroke-width="2"/>
<polygon points="105,200 113,196 113,204" fill="#C62828"/>
<text x="140" y="192" font-family="sans-serif" font-size="10" fill="#C62828">Нет</text>
<!-- Yes process -->
<rect x="395" y="185" width="85" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="437" y="205" font-family="monospace" font-size="11" fill="#1B5E20" text-anchor="middle">print(x)</text>
<!-- No process -->
<rect x="20" y="185" width="85" height="30" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
<text x="62" y="205" font-family="monospace" font-size="11" fill="#C62828" text-anchor="middle">print(-x)</text>
<!-- Arrows to end -->
<line x1="437" y1="215" x2="437" y2="265" stroke="#1B5E20" stroke-width="1.5"/>
<line x1="437" y1="265" x2="250" y2="265" stroke="#1B5E20" stroke-width="1.5"/>
<line x1="62" y1="215" x2="62" y2="265" stroke="#1B5E20" stroke-width="1.5"/>
<line x1="62" y1="265" x2="250" y2="265" stroke="#1B5E20" stroke-width="1.5"/>
<!-- End oval -->
<ellipse cx="250" cy="280" rx="50" ry="20" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
<text x="250" y="285" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle">Конец</text>
<line x1="250" y1="265" x2="250" y2="260" stroke="#1B5E20" stroke-width="2"/>
<!-- Code equivalent -->
<rect x="100" y="310" width="300" height="25" rx="4" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1"/>
<text x="250" y="327" font-family="monospace" font-size="10" fill="#E65100" text-anchor="middle">if x > 0: print(x) else: print(-x)</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#1B5E20" opacity="0.5" text-anchor="middle">Условия и ветвления</text>
</svg>