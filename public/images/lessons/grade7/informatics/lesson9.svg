<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FCE4EC"/>
<!-- Photo being edited -->
<rect x="60" y="50" width="220" height="170" rx="4" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5"/>
<!-- Photo content - simple landscape -->
<rect x="62" y="52" width="216" height="166" rx="3" fill="#87CEEB"/>
<!-- Sky -->
<rect x="62" y="52" width="216" height="100" fill="#87CEEB"/>
<!-- Sun -->
<circle cx="230" cy="80" r="20" fill="#FFD54F"/>
<!-- Mountains -->
<polygon points="62,152 120,90 180,152" fill="#78909C"/>
<polygon points="130,152 200,80 278,152" fill="#607D8B"/>
<!-- Ground -->
<rect x="62" y="152" width="216" height="66" fill="#81C784"/>
<!-- Editing overlay: crop marks -->
<rect x="100" y="60" width="140" height="100" fill="none" stroke="#FF1744" stroke-width="2" stroke-dasharray="8,4"/>
<!-- Crop handles -->
<rect x="96" y="56" width="8" height="8" fill="#FF1744"/>
<rect x="236" y="56" width="8" height="8" fill="#FF1744"/>
<rect x="96" y="156" width="8" height="8" fill="#FF1744"/>
<rect x="236" y="156" width="8" height="8" fill="#FF1744"/>
<!-- Tools panel on the right -->
<rect x="310" y="50" width="160" height="220" rx="8" fill="#37474F"/>
<!-- Tool icons -->
<!-- Brush -->
<rect x="325" y="65" width="35" height="35" rx="4" fill="#546E7A"/>
<line x1="337" y1="75" x2="348" y2="92" stroke="#FF4081" stroke-width="3" stroke-linecap="round"/>
<!-- Eraser -->
<rect x="370" y="65" width="35" height="35" rx="4" fill="#546E7A"/>
<rect x="380" y="72" width="15" height="18" rx="2" fill="#FFAB91"/>
<!-- Text -->
<rect x="415" y="65" width="35" height="35" rx="4" fill="#546E7A"/>
<text x="432" y="89" font-family="sans-serif" font-size="18" fill="#82B1FF" text-anchor="middle" font-weight="bold">T</text>
<!-- Crop tool -->
<rect x="325" y="110" width="35" height="35" rx="4" fill="#FF1744" opacity="0.3" stroke="#FF1744" stroke-width="1"/>
<line x1="333" y1="118" x2="352" y2="137" stroke="#FF1744" stroke-width="1.5"/>
<line x1="352" y1="118" x2="333" y2="137" stroke="#FF1744" stroke-width="1.5"/>
<!-- Color picker -->
<rect x="370" y="110" width="35" height="35" rx="4" fill="#546E7A"/>
<circle cx="387" cy="128" r="8" fill="none" stroke="#FF4081" stroke-width="1.5"/>
<circle cx="387" cy="128" r="3" fill="#FF4081"/>
<!-- Filters -->
<rect x="415" y="110" width="35" height="35" rx="4" fill="#546E7A"/>
<text x="432" y="133" font-family="sans-serif" font-size="14" fill="#82B1FF" text-anchor="middle">◐</text>
<!-- Color palette -->
<rect x="325" y="160" width="130" height="30" rx="4" fill="#263238"/>
<rect x="330" y="165" width="15" height="20" fill="#F44336"/>
<rect x="348" y="165" width="15" height="20" fill="#2196F3"/>
<rect x="366" y="165" width="15" height="20" fill="#4CAF50"/>
<rect x="384" y="165" width="15" height="20" fill="#FF9800"/>
<rect x="402" y="165" width="15" height="20" fill="#9C27B0"/>
<rect x="420" y="165" width="15" height="20" fill="#FFFFFF" stroke="#666" stroke-width="0.5"/>
<!-- Slider -->
<text x="330" y="215" font-family="sans-serif" font-size="8" fill="#AAA">Яркость</text>
<rect x="330" y="220" width="120" height="4" rx="2" fill="#546E7A"/>
<rect x="330" y="220" width="80" height="4" rx="2" fill="#82B1FF"/>
<circle cx="410" cy="222" r="6" fill="white" stroke="#82B1FF" stroke-width="1.5"/>
<text x="330" y="245" font-family="sans-serif" font-size="8" fill="#AAA">Контраст</text>
<rect x="330" y="248" width="120" height="4" rx="2" fill="#546E7A"/>
<rect x="330" y="248" width="60" height="4" rx="2" fill="#82B1FF"/>
<circle cx="390" cy="250" r="6" fill="white" stroke="#82B1FF" stroke-width="1.5"/>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#880E4F" opacity="0.5" text-anchor="middle">Обработка изображений</text>
</svg>