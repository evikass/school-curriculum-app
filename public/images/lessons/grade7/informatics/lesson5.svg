<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFF3E0"/>
<!-- HTML angle brackets -->
<text x="40" y="60" font-family="monospace" font-size="40" fill="#E65100" opacity="0.2">&lt;/&gt;</text>
<!-- HTML document structure -->
<!-- DOCTYPE -->
<rect x="40" y="40" width="420" height="260" rx="8" fill="white" stroke="#E65100" stroke-width="1"/>
<!-- html tag -->
<rect x="55" y="55" width="390" height="230" rx="4" fill="#FFF8E1" stroke="#FF8F00" stroke-width="1" stroke-dasharray="4,3"/>
<text x="60" y="52" font-family="monospace" font-size="10" fill="#E65100">&lt;html&gt;</text>
<!-- head tag -->
<rect x="70" y="65" width="360" height="50" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="1" stroke-dasharray="3,2"/>
<text x="75" y="62" font-family="monospace" font-size="10" fill="#1565C0">&lt;head&gt;</text>
<text x="85" y="85" font-family="monospace" font-size="12" fill="#0D47A1">&lt;title&gt;</text>
<text x="165" y="85" font-family="monospace" font-size="12" fill="#333">Моя страница</text>
<text x="310" y="85" font-family="monospace" font-size="12" fill="#0D47A1">&lt;/title&gt;</text>
<text x="75" y="110" font-family="monospace" font-size="10" fill="#1565C0">&lt;/head&gt;</text>
<!-- body tag -->
<rect x="70" y="115" width="360" height="155" rx="3" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1" stroke-dasharray="3,2"/>
<text x="75" y="112" font-family="monospace" font-size="10" fill="#E65100">&lt;body&gt;</text>
<text x="85" y="138" font-family="monospace" font-size="12" fill="#BF360C">&lt;h1&gt;</text>
<text x="135" y="138" font-family="sans-serif" font-size="14" fill="#333" font-weight="bold">Заголовок</text>
<text x="255" y="138" font-family="monospace" font-size="12" fill="#BF360C">&lt;/h1&gt;</text>
<text x="85" y="160" font-family="monospace" font-size="12" fill="#2E7D32">&lt;p&gt;</text>
<text x="125" y="160" font-family="sans-serif" font-size="12" fill="#333">Текст абзаца на странице</text>
<text x="345" y="160" font-family="monospace" font-size="12" fill="#2E7D32">&lt;/p&gt;</text>
<text x="85" y="185" font-family="monospace" font-size="12" fill="#7B1FA2">&lt;ul&gt;</text>
<text x="105" y="205" font-family="monospace" font-size="12" fill="#7B1FA2">&lt;li&gt;</text>
<text x="140" y="205" font-family="sans-serif" font-size="11" fill="#333">Элемент 1</text>
<text x="230" y="205" font-family="monospace" font-size="12" fill="#7B1FA2">&lt;/li&gt;</text>
<text x="105" y="225" font-family="monospace" font-size="12" fill="#7B1FA2">&lt;li&gt;</text>
<text x="140" y="225" font-family="sans-serif" font-size="11" fill="#333">Элемент 2</text>
<text x="230" y="225" font-family="monospace" font-size="12" fill="#7B1FA2">&lt;/li&gt;</text>
<text x="85" y="248" font-family="monospace" font-size="12" fill="#7B1FA2">&lt;/ul&gt;</text>
<text x="75" y="268" font-family="monospace" font-size="10" fill="#E65100">&lt;/body&gt;</text>
<text x="60" y="288" font-family="monospace" font-size="10" fill="#E65100">&lt;/html&gt;</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#E65100" opacity="0.5" text-anchor="middle">Основы HTML</text>
</svg>