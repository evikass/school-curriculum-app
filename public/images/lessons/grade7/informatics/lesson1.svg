<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#1E1E2E"/>
<!-- Code editor window -->
<rect x="40" y="30" width="420" height="260" rx="8" fill="#2D2D3F" stroke="#4A4A6A" stroke-width="1.5"/>
<!-- Title bar -->
<rect x="40" y="30" width="420" height="25" rx="8" fill="#3D3D55"/>
<rect x="40" y="47" width="420" height="8" fill="#3D3D55"/>
<!-- Window buttons -->
<circle cx="62" cy="42" r="5" fill="#FF5F56"/>
<circle cx="80" cy="42" r="5" fill="#FFBD2E"/>
<circle cx="98" cy="42" r="5" fill="#27C93F"/>
<!-- File tab -->
<rect x="120" y="32" width="100" height="20" rx="4" fill="#2D2D3F"/>
<text x="170" y="46" font-family="monospace" font-size="9" fill="#AAA" text-anchor="middle">main.py</text>
<!-- Line numbers -->
<text x="58" y="78" font-family="monospace" font-size="11" fill="#555">1</text>
<text x="58" y="96" font-family="monospace" font-size="11" fill="#555">2</text>
<text x="58" y="114" font-family="monospace" font-size="11" fill="#555">3</text>
<text x="58" y="132" font-family="monospace" font-size="11" fill="#555">4</text>
<text x="58" y="150" font-family="monospace" font-size="11" fill="#555">5</text>
<text x="58" y="168" font-family="monospace" font-size="11" fill="#555">6</text>
<!-- Code content -->
<text x="80" y="78" font-family="monospace" font-size="13" fill="#C792EA"># Привет, мир!</text>
<text x="80" y="96" font-family="monospace" font-size="13" fill="#82AAFF">name</text>
<text x="120" y="96" font-family="monospace" font-size="13" fill="#89DDFF">=</text>
<text x="135" y="96" font-family="monospace" font-size="13" fill="#C3E88D">"Мир"</text>
<text x="80" y="114" font-family="monospace" font-size="13" fill="#82AAFF">print</text>
<text x="120" y="114" font-family="monospace" font-size="13" fill="#89DDFF">(</text>
<text x="128" y="114" font-family="monospace" font-size="13" fill="#C3E88D">"Привет, "</text>
<text x="243" y="114" font-family="monospace" font-size="13" fill="#89DDFF">+</text>
<text x="255" y="114" font-family="monospace" font-size="13" fill="#82AAFF">name</text>
<text x="290" y="114" font-family="monospace" font-size="13" fill="#89DDFF">)</text>
<text x="80" y="132" font-family="monospace" font-size="13" fill="#82AAFF">x</text>
<text x="95" y="132" font-family="monospace" font-size="13" fill="#89DDFF">=</text>
<text x="110" y="132" font-family="monospace" font-size="13" fill="#F78C6C">42</text>
<text x="80" y="150" font-family="monospace" font-size="13" fill="#C792EA">if</text>
<text x="102" y="150" font-family="monospace" font-size="13" fill="#82AAFF">x</text>
<text x="118" y="150" font-family="monospace" font-size="13" fill="#89DDFF">></text>
<text x="133" y="150" font-family="monospace" font-size="13" fill="#F78C6C">0</text>
<text x="145" y="150" font-family="monospace" font-size="13" fill="#89DDFF">:</text>
<text x="100" y="168" font-family="monospace" font-size="13" fill="#82AAFF">print</text>
<text x="140" y="168" font-family="monospace" font-size="13" fill="#89DDFF">(</text>
<text x="148" y="168" font-family="monospace" font-size="13" fill="#82AAFF">x</text>
<text x="162" y="168" font-family="monospace" font-size="13" fill="#89DDFF">)</text>
<!-- Terminal output at bottom -->
<rect x="40" y="265" width="420" height="25" rx="4" fill="#1A1A2A"/>
<text x="55" y="282" font-family="monospace" font-size="11" fill="#27C93F">>>> Привет, Мир</text>
<text x="250" y="330" font-family="sans-serif" font-size="9" fill="#888" opacity="0.5" text-anchor="middle">Введение в программирование</text>
</svg>