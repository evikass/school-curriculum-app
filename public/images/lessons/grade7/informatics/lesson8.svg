<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFF8E1"/>
<!-- Raster side (left) -->
<text x="125" y="30" font-family="sans-serif" font-size="13" fill="#E65100" text-anchor="middle" font-weight="bold">Растровая</text>
<!-- Pixel grid -->
<rect x="30" y="45" width="190" height="190" fill="white" stroke="#E65100" stroke-width="1.5"/>
<!-- Pixel cells - creating a simple heart shape -->
<rect x="30" y="45" width="19" height="19" fill="#FFCDD2"/>
<rect x="49" y="45" width="19" height="19" fill="#FFCDD2"/>
<rect x="68" y="45" width="19" height="19" fill="#E53935"/>
<rect x="87" y="45" width="19" height="19" fill="#E53935"/>
<rect x="106" y="45" width="19" height="19" fill="#FFCDD2"/>
<rect x="125" y="45" width="19" height="19" fill="#FFCDD2"/>
<rect x="144" y="45" width="19" height="19" fill="#E53935"/>
<rect x="163" y="45" width="19" height="19" fill="#E53935"/>
<rect x="182" y="45" width="19" height="19" fill="#FFCDD2"/>
<rect x="201" y="45" width="19" height="19" fill="#FFCDD2"/>
<!-- Row 2 -->
<rect x="30" y="64" width="19" height="19" fill="#FFCDD2"/>
<rect x="49" y="64" width="19" height="19" fill="#E53935"/>
<rect x="68" y="64" width="19" height="19" fill="#EF9A9A"/>
<rect x="87" y="64" width="19" height="19" fill="#E53935"/>
<rect x="106" y="64" width="19" height="19" fill="#E53935"/>
<rect x="125" y="64" width="19" height="19" fill="#E53935"/>
<rect x="144" y="64" width="19" height="19" fill="#EF9A9A"/>
<rect x="163" y="64" width="19" height="19" fill="#E53935"/>
<rect x="182" y="64" width="19" height="19" fill="#E53935"/>
<rect x="201" y="64" width="19" height="19" fill="#FFCDD2"/>
<!-- Row 3 -->
<rect x="30" y="83" width="19" height="19" fill="#FFCDD2"/>
<rect x="49" y="83" width="19" height="19" fill="#E53935"/>
<rect x="68" y="83" width="19" height="19" fill="#E53935"/>
<rect x="87" y="83" width="19" height="19" fill="#EF9A9A"/>
<rect x="106" y="83" width="19" height="19" fill="#E53935"/>
<rect x="125" y="83" width="19" height="19" fill="#E53935"/>
<rect x="144" y="83" width="19" height="19" fill="#E53935"/>
<rect x="163" y="83" width="19" height="19" fill="#E53935"/>
<rect x="182" y="83" width="19" height="19" fill="#E53935"/>
<rect x="201" y="83" width="19" height="19" fill="#FFCDD2"/>
<!-- Rows 4-10 similar pattern - simplified -->
<rect x="49" y="102" width="171" height="19" fill="#FFCDD2"/>
<rect x="49" y="102" width="152" height="19" fill="#E53935" opacity="0.3"/>
<rect x="68" y="121" width="133" height="19" fill="#E53935" opacity="0.2"/>
<rect x="87" y="140" width="95" height="19" fill="#E53935" opacity="0.15"/>
<rect x="106" y="159" width="57" height="19" fill="#E53935" opacity="0.1"/>
<!-- Grid lines -->
<line x1="49" y1="45" x2="49" y2="235" stroke="#E65100" stroke-width="0.3" opacity="0.5"/>
<line x1="68" y1="45" x2="68" y2="235" stroke="#E65100" stroke-width="0.3" opacity="0.5"/>
<line x1="87" y1="45" x2="87" y2="235" stroke="#E65100" stroke-width="0.3" opacity="0.5"/>
<line x1="106" y1="45" x2="106" y2="235" stroke="#E65100" stroke-width="0.3" opacity="0.5"/>
<text x="125" y="260" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">пиксели</text>
<!-- Vector side (right) -->
<text x="370" y="30" font-family="sans-serif" font-size="13" fill="#1565C0" text-anchor="middle" font-weight="bold">Векторная</text>
<!-- Smooth vector heart -->
<path d="M370 200 C370 160 340 100 370 100 C400 100 370 160 370 200 C370 160 340 100 370 100 C400 100 430 160 370 200 Z" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<!-- Smooth curves -->
<path d="M310 150 C310 90 370 70 370 120 C370 70 430 90 430 150 C430 210 370 240 370 260 C370 240 310 210 310 150Z" fill="#BBDEFB" opacity="0.4" stroke="#1565C0" stroke-width="2"/>
<!-- Control points -->
<circle cx="310" cy="90" r="4" fill="#1565C0" opacity="0.6"/>
<circle cx="430" cy="90" r="4" fill="#1565C0" opacity="0.6"/>
<line x1="310" y1="90" x2="370" y2="120" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
<line x1="430" y1="90" x2="370" y2="120" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
<text x="370" y="280" font-family="sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">кривые и точки</text>
<!-- VS -->
<text x="250" y="155" font-family="sans-serif" font-size="22" fill="#333" text-anchor="middle" font-weight="bold">VS</text>
<!-- Properties comparison -->
<rect x="50" y="290" width="180" height="40" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
<text x="140" y="310" font-family="sans-serif" font-size="9" fill="#E65100" text-anchor="middle">Теряет качество при масштаб.</text>
<rect x="270" y="290" width="180" height="40" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
<text x="360" y="310" font-family="sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">Не теряет качество при масшт.</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#333" opacity="0.5" text-anchor="middle">Растровая и векторная графика</text>
</svg>