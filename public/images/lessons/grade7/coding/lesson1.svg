<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a1a2e"/>
  <!-- Person silhouette -->
  <circle cx="160" cy="120" r="30" fill="#e0e0e0" opacity="0.9"/>
  <rect x="130" y="155" width="60" height="80" rx="8" fill="#e0e0e0" opacity="0.9"/>
  <!-- Computer monitor -->
  <rect x="240" y="80" width="160" height="110" rx="6" fill="#16213e" stroke="#4fc3f7" stroke-width="2"/>
  <rect x="248" y="88" width="144" height="86" fill="#0a0a1a"/>
  <!-- Code lines on screen -->
  <text x="255" y="108" font-family="monospace" font-size="9" fill="#4fc3f7">def hello():</text>
  <text x="255" y="122" font-family="monospace" font-size="9" fill="#81c784">    print("Hi!")</text>
  <text x="255" y="136" font-family="monospace" font-size="9" fill="#ffb74d">x = 42</text>
  <text x="255" y="150" font-family="monospace" font-size="9" fill="#e57373">if x &gt; 0:</text>
  <text x="255" y="164" font-family="monospace" font-size="9" fill="#81c784">    hello()</text>
  <!-- Monitor stand -->
  <rect x="300" y="190" width="40" height="12" fill="#4fc3f7" opacity="0.5"/>
  <rect x="280" y="202" width="80" height="5" rx="2" fill="#4fc3f7" opacity="0.4"/>
  <!-- Keyboard -->
  <rect x="260" y="215" width="120" height="20" rx="4" fill="#16213e" stroke="#4fc3f7" stroke-width="1"/>
  <!-- Thought bubble with algorithm -->
  <ellipse cx="120" cy="60" rx="55" ry="30" fill="#ffffff" opacity="0.12"/>
  <circle cx="145" cy="90" r="5" fill="#ffffff" opacity="0.1"/>
  <circle cx="138" cy="105" r="3" fill="#ffffff" opacity="0.08"/>
  <!-- Flowchart in thought bubble -->
  <rect x="85" y="38" width="50" height="18" rx="9" fill="#4fc3f7" opacity="0.3"/>
  <text x="95" y="51" font-size="7" fill="#fff" opacity="0.7">Старт</text>
  <line x1="110" y1="56" x2="110" y2="66" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <polygon points="110,66 100,76 120,76" fill="#ffb74d" opacity="0.3"/>
  <text x="96" y="74" font-size="6" fill="#fff" opacity="0.6">Условие?</text>
  <line x1="110" y1="76" x2="110" y2="86" stroke="#4fc3f7" stroke-width="1" opacity="0.4"/>
  <rect x="85" y="86" width="50" height="14" rx="3" fill="#81c784" opacity="0.3"/>
  <text x="92" y="96" font-size="6" fill="#fff" opacity="0.7">Действие</text>
  <!-- Decorative code symbols -->
  <text x="50" y="280" font-family="monospace" font-size="28" fill="#4fc3f7" opacity="0.08">{</text>
  <text x="440" y="300" font-family="monospace" font-size="28" fill="#4fc3f7" opacity="0.08">}</text>
  <text x="30" y="200" font-family="monospace" font-size="20" fill="#ffb74d" opacity="0.06">&lt;/&gt;</text>
  <text x="420" y="100" font-family="monospace" font-size="16" fill="#81c784" opacity="0.06">01</text>
  <text x="430" y="270" font-size="9" fill="#fff" opacity="0.5">Что такое программирование</text>
</svg>