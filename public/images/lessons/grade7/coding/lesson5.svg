<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#1a1520"/>
  <!-- Road fork illustration -->
  <!-- Main road -->
  <path d="M250,330 L250,200" stroke="#546e7a" stroke-width="40" fill="none"/>
  <path d="M250,330 L250,200" stroke="#fff" stroke-width="2" fill="none" stroke-dasharray="10,8" opacity="0.4"/>
  <!-- Left fork (Yes) -->
  <path d="M250,200 Q250,170 150,120" stroke="#4caf50" stroke-width="35" fill="none" opacity="0.8"/>
  <path d="M250,200 Q250,170 150,120" stroke="#fff" stroke-width="1.5" fill="none" stroke-dasharray="8,6" opacity="0.3"/>
  <!-- Right fork (No) -->
  <path d="M250,200 Q250,170 350,120" stroke="#ef5350" stroke-width="35" fill="none" opacity="0.8"/>
  <path d="M250,200 Q250,170 350,120" stroke="#fff" stroke-width="1.5" fill="none" stroke-dasharray="8,6" opacity="0.3"/>
  <!-- Decision diamond -->
  <polygon points="250,155 290,185 250,215 210,185" fill="#ff9800" stroke="#fff" stroke-width="1.5" opacity="0.9"/>
  <text x="237" y="190" font-family="monospace" font-size="10" fill="#fff" font-weight="bold">if</text>
  <!-- Yes sign -->
  <rect x="110" y="95" width="55" height="24" rx="12" fill="#4caf50"/>
  <text x="122" y="112" font-size="13" fill="#fff" font-weight="bold">Да</text>
  <!-- No sign -->
  <rect x="335" y="95" width="55" height="24" rx="12" fill="#ef5350"/>
  <text x="348" y="112" font-size="13" fill="#fff" font-weight="bold">Нет</text>
  <!-- Left destination: Action A -->
  <rect x="75" y="55" width="120" height="35" rx="6" fill="#2e7d32" stroke="#4caf50" stroke-width="1"/>
  <text x="88" y="77" font-size="11" fill="#c8e6c9">Действие А</text>
  <!-- Right destination: Action B -->
  <rect x="305" y="55" width="120" height="35" rx="6" fill="#c62828" stroke="#ef5350" stroke-width="1"/>
  <text x="318" y="77" font-size="11" fill="#ffcdd2">Действие Б</text>
  <!-- Code snippet at bottom -->
  <rect x="60" y="270" width="380" height="55" rx="5" fill="#1a1a2a" stroke="#546e7a" stroke-width="1"/>
  <text x="78" y="290" font-family="monospace" font-size="10" fill="#ff9800">if</text>
  <text x="95" y="290" font-family="monospace" font-size="10" fill="#e0e0e0"> условие:</text>
  <text x="170" y="290" font-family="monospace" font-size="10" fill="#4caf50">  # Да</text>
  <text x="78" y="308" font-family="monospace" font-size="10" fill="#e0e0e0">    действие_А()</text>
  <text x="78" y="322" font-family="monospace" font-size="10" fill="#ff9800">else</text>
  <text x="105" y="322" font-family="monospace" font-size="10" fill="#e0e0e0">:</text>
  <text x="115" y="322" font-family="monospace" font-size="10" fill="#ef5350">  # Нет</text>
  <!-- Question mark on diamond -->
  <text x="246" y="188" font-size="8" fill="#fff" opacity="0.6">?</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Условный оператор if</text>
</svg>