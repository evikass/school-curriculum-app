<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#12181f"/>
  <!-- int container - rigid box -->
  <rect x="30" y="40" width="100" height="110" rx="4" fill="#1a2a3a" stroke="#42a5f5" stroke-width="2"/>
  <rect x="30" y="40" width="100" height="24" fill="#42a5f5" opacity="0.25" rx="4"/>
  <text x="55" y="57" font-family="monospace" font-size="13" fill="#42a5f5" font-weight="bold">int</text>
  <text x="50" y="95" font-family="monospace" font-size="22" fill="#e3f2fd">42</text>
  <text x="50" y="115" font-size="8" fill="#42a5f5" opacity="0.6">целое число</text>
  <!-- float container - wavy/soft box -->
  <rect x="150" y="40" width="100" height="110" rx="20" fill="#1a2a2a" stroke="#26c6da" stroke-width="2"/>
  <rect x="150" y="40" width="100" height="24" fill="#26c6da" opacity="0.25" rx="20"/>
  <text x="170" y="57" font-family="monospace" font-size="13" fill="#26c6da" font-weight="bold">float</text>
  <text x="165" y="95" font-family="monospace" font-size="20" fill="#e0f7fa">3.14</text>
  <text x="165" y="115" font-size="8" fill="#26c6da" opacity="0.6">дробное число</text>
  <!-- str container - quote-decorated box -->
  <rect x="270" y="40" width="120" height="110" rx="4" fill="#2a1a2a" stroke="#ab47bc" stroke-width="2"/>
  <rect x="270" y="40" width="120" height="24" fill="#ab47bc" opacity="0.25" rx="4"/>
  <text x="290" y="57" font-family="monospace" font-size="13" fill="#ab47bc" font-weight="bold">str</text>
  <text x="290" y="88" font-family="monospace" font-size="14" fill="#f3e5f5">"Hello"</text>
  <text x="290" y="108" font-family="monospace" font-size="10" fill="#ab47bc" opacity="0.5">'мир'</text>
  <text x="290" y="125" font-size="8" fill="#ab47bc" opacity="0.6">строка</text>
  <!-- bool container - toggle switch -->
  <rect x="410" y="40" width="70" height="110" rx="35" fill="#1a2a1a" stroke="#66bb6a" stroke-width="2"/>
  <text x="420" y="57" font-family="monospace" font-size="11" fill="#66bb6a" font-weight="bold">bool</text>
  <circle cx="445" cy="95" r="22" fill="#1b5e20" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="435" y="100" font-family="monospace" font-size="11" fill="#a5d6a7">True</text>
  <text x="422" y="130" font-size="8" fill="#66bb6a" opacity="0.6">логич.</text>
  <!-- Arrows showing type conversion -->
  <path d="M130,140 L150,145" stroke="#ffb74d" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M250,140 L270,145" stroke="#ffb74d" stroke-width="1.5" fill="none"/>
  <!-- Type check example -->
  <rect x="60" y="180" width="380" height="130" rx="8" fill="#1a2028" stroke="#455a64" stroke-width="1"/>
  <text x="80" y="205" font-family="monospace" font-size="12" fill="#ffb74d">type(</text>
  <text x="120" y="205" font-family="monospace" font-size="12" fill="#42a5f5">42</text>
  <text x="140" y="205" font-family="monospace" font-size="12" fill="#ffb74d">)</text>
  <text x="155" y="205" font-family="monospace" font-size="12" fill="#7f8c8d">→</text>
  <text x="175" y="205" font-family="monospace" font-size="12" fill="#42a5f5">&lt;class 'int'&gt;</text>
  <text x="80" y="228" font-family="monospace" font-size="12" fill="#ffb74d">type(</text>
  <text x="120" y="228" font-family="monospace" font-size="12" fill="#26c6da">3.14</text>
  <text x="150" y="228" font-family="monospace" font-size="12" fill="#ffb74d">)</text>
  <text x="165" y="228" font-family="monospace" font-size="12" fill="#7f8c8d">→</text>
  <text x="185" y="228" font-family="monospace" font-size="12" fill="#26c6da">&lt;class 'float'&gt;</text>
  <text x="80" y="251" font-family="monospace" font-size="12" fill="#ffb74d">type(</text>
  <text x="120" y="251" font-family="monospace" font-size="12" fill="#ab47bc">"Hi"</text>
  <text x="148" y="251" font-family="monospace" font-size="12" fill="#ffb74d">)</text>
  <text x="163" y="251" font-family="monospace" font-size="12" fill="#7f8c8d">→</text>
  <text x="183" y="251" font-family="monospace" font-size="12" fill="#ab47bc">&lt;class 'str'&gt;</text>
  <text x="80" y="274" font-family="monospace" font-size="12" fill="#ffb74d">type(</text>
  <text x="120" y="274" font-family="monospace" font-size="12" fill="#66bb6a">True</text>
  <text x="155" y="274" font-family="monospace" font-size="12" fill="#ffb74d">)</text>
  <text x="170" y="274" font-family="monospace" font-size="12" fill="#7f8c8d">→</text>
  <text x="190" y="274" font-family="monospace" font-size="12" fill="#66bb6a">&lt;class 'bool'&gt;</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Типы данных</text>
</svg>