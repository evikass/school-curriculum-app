<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0f1724"/>
  <!-- Loop circle with items -->
  <circle cx="250" cy="155" r="100" fill="none" stroke="#5c6bc0" stroke-width="3" stroke-dasharray="12,6" opacity="0.6"/>
  <!-- Arrow showing loop direction -->
  <path d="M310,80 A100,100 0 0,1 345,140" fill="none" stroke="#7986cb" stroke-width="2.5"/>
  <polygon points="345,140 338,130 348,132" fill="#7986cb"/>
  <!-- Numbered items around the loop -->
  <circle cx="250" cy="55" r="16" fill="#283593" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="244" y="60" font-size="11" fill="#e8eaf6">0</text>
  <circle cx="310" cy="80" r="16" fill="#283593" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="304" y="85" font-size="11" fill="#e8eaf6">1</text>
  <circle cx="345" cy="140" r="16" fill="#283593" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="339" y="145" font-size="11" fill="#e8eaf6">2</text>
  <circle cx="340" cy="210" r="16" fill="#283593" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="334" y="215" font-size="11" fill="#e8eaf6">3</text>
  <circle cx="300" cy="255" r="16" fill="#283593" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="294" y="260" font-size="11" fill="#e8eaf6">4</text>
  <circle cx="200" cy="255" r="16" fill="#283593" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="194" y="260" font-size="11" fill="#e8eaf6">5</text>
  <circle cx="155" cy="210" r="16" fill="#283593" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="149" y="215" font-size="11" fill="#e8eaf6">6</text>
  <circle cx="150" cy="140" r="16" fill="#283593" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="144" y="145" font-size="11" fill="#e8eaf6">7</text>
  <circle cx="190" cy="80" r="16" fill="#283593" stroke="#5c6bc0" stroke-width="1.5"/>
  <text x="184" y="85" font-size="11" fill="#e8eaf6">8</text>
  <circle cx="250" cy="255" r="16" fill="#1a237e" stroke="#7986cb" stroke-width="2"/>
  <text x="244" y="260" font-size="11" fill="#c5cae9">9</text>
  <!-- Highlighted current item (being processed) -->
  <circle cx="310" cy="80" r="20" fill="none" stroke="#ff9800" stroke-width="2.5" opacity="0.8"/>
  <!-- "Processing" arrow -->
  <text x="330" y="68" font-size="8" fill="#ff9800">← текущий</text>
  <!-- Center label -->
  <text x="225" y="150" font-family="monospace" font-size="14" fill="#7986cb" opacity="0.7">for i in</text>
  <text x="225" y="168" font-family="monospace" font-size="14" fill="#5c6bc0" opacity="0.7">range(10)</text>
  <!-- Code example at bottom -->
  <rect x="50" y="285" width="400" height="40" rx="5" fill="#1a2332" stroke="#5c6bc0" stroke-width="1" opacity="0.8"/>
  <text x="65" y="307" font-family="monospace" font-size="10" fill="#7986cb">for</text>
  <text x="88" y="307" font-family="monospace" font-size="10" fill="#e8eaf6"> i </text>
  <text x="105" y="307" font-family="monospace" font-size="10" fill="#7986cb">in</text>
  <text x="120" y="307" font-family="monospace" font-size="10" fill="#e8eaf6"> range(</text>
  <text x="175" y="307" font-family="monospace" font-size="10" fill="#ff9800">10</text>
  <text x="190" y="307" font-family="monospace" font-size="10" fill="#e8eaf6">):</text>
  <text x="210" y="307" font-family="monospace" font-size="10" fill="#8b949e"># i = 0,1,2...9</text>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Цикл for</text>
</svg>