<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="350" fill="#0f1923"/>
  <!-- Variable boxes -->
  <!-- Box 1: x = 5 -->
  <rect x="40" y="50" width="120" height="70" rx="6" fill="#1a3a4a" stroke="#4dd0e1" stroke-width="2"/>
  <rect x="40" y="50" width="120" height="22" rx="6" fill="#4dd0e1" opacity="0.2"/>
  <text x="62" y="66" font-family="monospace" font-size="11" fill="#4dd0e1">x</text>
  <text x="100" y="96" font-family="monospace" font-size="24" fill="#fff" opacity="0.9">5</text>
  <text x="112" y="96" font-size="10" fill="#4dd0e1" opacity="0.5">int</text>
  <!-- Box 2: name = "Анна" -->
  <rect x="190" y="50" width="140" height="70" rx="6" fill="#1a3a2a" stroke="#81c784" stroke-width="2"/>
  <rect x="190" y="50" width="140" height="22" rx="6" fill="#81c784" opacity="0.2"/>
  <text x="212" y="66" font-family="monospace" font-size="11" fill="#81c784">name</text>
  <text x="212" y="96" font-family="monospace" font-size="16" fill="#fff" opacity="0.9">"Анна"</text>
  <text x="286" y="96" font-size="10" fill="#81c784" opacity="0.5">str</text>
  <!-- Box 3: pi = 3.14 -->
  <rect x="360" y="50" width="120" height="70" rx="6" fill="#2a1a3a" stroke="#ce93d8" stroke-width="2"/>
  <rect x="360" y="50" width="120" height="22" rx="6" fill="#ce93d8" opacity="0.2"/>
  <text x="382" y="66" font-family="monospace" font-size="11" fill="#ce93d8">pi</text>
  <text x="380" y="96" font-family="monospace" font-size="18" fill="#fff" opacity="0.9">3.14</text>
  <text x="432" y="96" font-size="10" fill="#ce93d8" opacity="0.5">float</text>
  <!-- Assignment arrows -->
  <text x="170" y="90" font-size="20" fill="#ffb74d" opacity="0.6">=</text>
  <text x="338" y="90" font-size="20" fill="#ffb74d" opacity="0.6">=</text>
  <!-- Python code snippet -->
  <rect x="60" y="160" width="380" height="100" rx="6" fill="#1a2332" stroke="#546e7a" stroke-width="1"/>
  <text x="75" y="182" font-family="monospace" font-size="11" fill="#e57373">x</text>
  <text x="87" y="182" font-family="monospace" font-size="11" fill="#fff"> = </text>
  <text x="110" y="182" font-family="monospace" font-size="11" fill="#4dd0e1">5</text>
  <text x="140" y="182" font-family="monospace" font-size="11" fill="#7f8c8d"># число</text>
  <text x="75" y="200" font-family="monospace" font-size="11" fill="#e57373">name</text>
  <text x="120" y="200" font-family="monospace" font-size="11" fill="#fff"> = </text>
  <text x="143" y="200" font-family="monospace" font-size="11" fill="#81c784">"Анна"</text>
  <text x="200" y="200" font-family="monospace" font-size="11" fill="#7f8c8d"># строка</text>
  <text x="75" y="218" font-family="monospace" font-size="11" fill="#e57373">pi</text>
  <text x="98" y="218" font-family="monospace" font-size="11" fill="#fff"> = </text>
  <text x="121" y="218" font-family="monospace" font-size="11" fill="#ce93d8">3.14</text>
  <text x="165" y="218" font-family="monospace" font-size="11" fill="#7f8c8d"># дробь</text>
  <text x="75" y="236" font-family="monospace" font-size="11" fill="#e57373">flag</text>
  <text x="110" y="236" font-family="monospace" font-size="11" fill="#fff"> = </text>
  <text x="133" y="236" font-family="monospace" font-size="11" fill="#ffb74d">True</text>
  <text x="180" y="236" font-family="monospace" font-size="11" fill="#7f8c8d"># логическое</text>
  <!-- Memory label -->
  <text x="80" y="285" font-size="12" fill="#546e7a" opacity="0.6">Память компьютера — переменные как ячейки</text>
  <!-- Connecting lines from boxes to code -->
  <line x1="100" y1="120" x2="85" y2="168" stroke="#4dd0e1" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="260" y1="120" x2="145" y2="186" stroke="#81c784" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="420" y1="120" x2="120" y2="206" stroke="#ce93d8" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="200" y="340" font-size="9" fill="#fff" opacity="0.5">Переменные в Python</text>
</svg>