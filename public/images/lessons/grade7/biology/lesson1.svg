<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#C62828" text-anchor="middle">Строение и жизнедеятельность бактерий</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Bacteria cell -->
  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">Бактериальная клетка</text>
  <!-- Cell body -->
  <ellipse cx="135" cy="175" rx="80" ry="50" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <!-- Capsule -->
  <ellipse cx="135" cy="175" rx="88" ry="56" fill="none" stroke="#81C784" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="228" y="135" font-family="Arial,sans-serif" font-size="7" fill="#81C784">капсула</text>
  <!-- DNA nucleoid -->
  <ellipse cx="120" cy="165" rx="25" ry="12" fill="none" stroke="#C62828" stroke-width="1.5" stroke-dasharray="3,2" transform="rotate(-15,120,165)"/>
  <text x="100" y="160" font-family="Arial,sans-serif" font-size="7" fill="#C62828">ДНК</text>
  <!-- Ribosomes -->
  <circle cx="155" cy="155" r="2" fill="#1565C0"/><circle cx="162" cy="160" r="2" fill="#1565C0"/>
  <circle cx="148" cy="165" r="2" fill="#1565C0"/><circle cx="160" cy="175" r="2" fill="#1565C0"/>
  <circle cx="150" cy="185" r="2" fill="#1565C0"/><circle cx="158" cy="190" r="2" fill="#1565C0"/>
  <text x="170" y="155" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">рибосомы</text>
  <!-- Flagellum -->
  <path d="M55,175 Q40,160 30,145 Q25,135 20,140" stroke="#F9A825" stroke-width="2" fill="none"/>
  <path d="M55,175 Q35,180 20,170" stroke="#F9A825" stroke-width="2" fill="none"/>
  <text x="30" y="200" font-family="Arial,sans-serif" font-size="7" fill="#F9A825">жгутики</text>
  <!-- Pilli -->
  <line x1="85" y1="210" x2="75" y2="240" stroke="#9C27B0" stroke-width="1"/>
  <line x1="90" y1="212" x2="82" y2="242" stroke="#9C27B0" stroke-width="1"/>
  <line x1="95" y1="213" x2="89" y2="243" stroke="#9C27B0" stroke-width="1"/>
  <text x="65" y="255" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0">пили</text>

  <!-- Bacteria shapes -->
  <rect x="260" y="90" width="215" height="95" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold" text-anchor="middle">Формы бактерий</text>
  <!-- Cocci -->
  <circle cx="300" cy="135" r="12" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
  <circle cx="318" cy="135" r="12" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
  <circle cx="336" cy="135" r="12" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
  <text x="318" y="160" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">кокки</text>
  <!-- Bacillus -->
  <rect x="290" y="168" width="55" height="12" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="318" y="192" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">бациллы</text>
  <!-- Spirillum -->
  <path d="M400,130 Q410,120 420,130 Q430,140 440,130" stroke="#FF9800" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="420" y="148" font-family="Arial,sans-serif" font-size="7" fill="#FF9800" text-anchor="middle">спириллы</text>

  <!-- Division -->
  <rect x="260" y="200" width="215" height="90" rx="6" fill="white" stroke="#E53935" stroke-width="1.5"/>
  <text x="367" y="216" font-family="Arial,sans-serif" font-size="10" fill="#E53935" font-weight="bold" text-anchor="middle">Деление</text>
  <ellipse cx="320" cy="255" rx="30" ry="18" fill="#FFECB3" stroke="#F9A825" stroke-width="1.5"/>
  <ellipse cx="380" cy="255" rx="30" ry="18" fill="#FFECB3" stroke="#F9A825" stroke-width="1.5"/>
  <ellipse cx="350" cy="255" rx="20" ry="18" fill="#FFECB3" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="350" y1="235" x2="350" y2="275" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="350" y="282" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">бинарное деление</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>