<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Водоросли</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Algae types -->
  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" font-weight="bold" text-anchor="middle">Водоросли</text>
  <!-- Water background -->
  <rect x="35" y="115" width="200" height="165" rx="4" fill="#E3F2FD" opacity="0.5"/>
  <!-- Green algae -->
  <path d="M60,270 Q55,240 65,210 Q75,180 60,150 Q50,130 65,120" stroke="#4CAF50" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="60" cy="140" r="3" fill="#81C784"/><circle cx="65" cy="170" r="3" fill="#81C784"/>
  <circle cx="55" cy="200" r="3" fill="#81C784"/><circle cx="62" cy="230" r="3" fill="#81C784"/>
  <text x="60" y="280" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle">зелёные</text>
  <!-- Brown algae -->
  <path d="M120,270 Q115,230 130,200 Q140,170 125,140 Q118,125 130,115" stroke="#8D6E63" stroke-width="4" fill="none" stroke-linecap="round"/>
  <ellipse cx="130" cy="140" rx="8" ry="4" fill="#A1887F" opacity="0.7"/>
  <ellipse cx="125" cy="170" rx="7" ry="3" fill="#A1887F" opacity="0.7"/>
  <text x="128" y="280" font-family="Arial,sans-serif" font-size="7" fill="#8D6E63" text-anchor="middle">бурые</text>
  <!-- Red algae -->
  <path d="M190,270 Q185,245 195,220 Q205,195 190,170 Q182,155 195,140" stroke="#E53935" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="190" cy="160" r="3" fill="#EF9A9A"/><circle cx="195" cy="190" r="3" fill="#EF9A9A"/>
  <circle cx="188" cy="220" r="3" fill="#EF9A9A"/>
  <text x="193" y="280" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle">красные</text>

  <!-- Role -->
  <rect x="260" y="90" width="215" height="95" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">Значение водорослей</text>
  <!-- Oxygen bubbles -->
  <circle cx="300" cy="140" r="6" fill="none" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="300" y="143" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">O2</text>
  <circle cx="315" cy="130" r="4" fill="none" stroke="#90CAF9" stroke-width="1"/>
  <circle cx="290" cy="125" r="3" fill="none" stroke="#90CAF9" stroke-width="1"/>
  <text x="305" y="165" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">кислород</text>
  <!-- Food -->
  <rect x="360" y="130" width="30" height="18" rx="3" fill="#FFECB3" stroke="#F9A825" stroke-width="1"/>
  <text x="375" y="143" font-family="Arial,sans-serif" font-size="6" fill="#F9A825" text-anchor="middle">пища</text>
  <circle cx="410" cy="139" r="8" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <text x="410" y="142" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">йод</text>
  <text x="395" y="165" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">полезные вещества</text>

  <!-- Structure -->
  <rect x="260" y="200" width="215" height="90" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="367" y="216" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" font-weight="bold" text-anchor="middle">Одноклеточная водоросль</text>
  <!-- Chlamydomonas -->
  <ellipse cx="367" cy="252" rx="25" ry="18" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="358" cy="248" r="6" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <line x1="352" y1="248" x2="352" y2="255" stroke="#2E7D32" stroke-width="1"/>
  <line x1="355" y1="248" x2="355" y2="256" stroke="#2E7D32" stroke-width="1"/>
  <circle cx="360" cy="248" r="2" fill="#C62828"/>
  <line x1="390" y1="245" x2="400" y2="238" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="390" y1="252" x2="400" y2="258" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="367" y="282" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle">хламидомонада</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>