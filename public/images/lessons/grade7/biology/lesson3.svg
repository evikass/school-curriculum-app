<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Общая характеристика грибов</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Mushroom structure -->
  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#8D6E63" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#8D6E63" font-weight="bold" text-anchor="middle">Строение гриба</text>
  <!-- Mycelium underground -->
  <rect x="45" y="230" width="180" height="30" rx="2" fill="#D7CCC8"/>
  <line x1="60" y1="235" x2="80" y2="242" stroke="#8D6E63" stroke-width="1"/>
  <line x1="80" y1="242" x2="100" y2="238" stroke="#8D6E63" stroke-width="1"/>
  <line x1="100" y1="238" x2="120" y2="245" stroke="#8D6E63" stroke-width="1"/>
  <line x1="120" y1="245" x2="140" y2="240" stroke="#8D6E63" stroke-width="1"/>
  <line x1="140" y1="240" x2="160" y2="248" stroke="#8D6E63" stroke-width="1"/>
  <line x1="160" y1="248" x2="180" y2="242" stroke="#8D6E63" stroke-width="1"/>
  <line x1="180" y1="242" x2="200" y2="236" stroke="#8D6E63" stroke-width="1"/>
  <text x="135" y="270" font-family="Arial,sans-serif" font-size="7" fill="#8D6E63" text-anchor="middle">грибница (мицелий)</text>
  <!-- Stem -->
  <rect x="120" y="155" width="30" height="75" rx="4" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Ring on stem -->
  <ellipse cx="135" cy="185" rx="22" ry="5" fill="none" stroke="#A1887F" stroke-width="1.5"/>
  <text x="168" y="188" font-family="Arial,sans-serif" font-size="7" fill="#A1887F">кольцо</text>
  <!-- Cap -->
  <path d="M75,155 Q135,115 195,155 Z" fill="#A1887F" stroke="#5D4037" stroke-width="2"/>
  <ellipse cx="135" cy="155" rx="60" ry="8" fill="#D7CCC8" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Gills -->
  <line x1="100" y1="155" x2="105" y2="170" stroke="#BCAAA4" stroke-width="1"/>
  <line x1="115" y1="155" x2="118" y2="168" stroke="#BCAAA4" stroke-width="1"/>
  <line x1="130" y1="155" x2="132" y2="167" stroke="#BCAAA4" stroke-width="1"/>
  <line x1="145" y1="155" x2="147" y2="168" stroke="#BCAAA4" stroke-width="1"/>
  <line x1="160" y1="155" x2="162" y2="170" stroke="#BCAAA4" stroke-width="1"/>
  <text x="95" y="150" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">шляпка</text>
  <text x="148" y="200" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">ножка</text>

  <!-- Types -->
  <rect x="260" y="90" width="215" height="95" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">Виды грибов</text>
  <!-- Cap mushroom -->
  <path d="M290,155 Q310,140 330,155 Z" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <rect x="305" y="155" width="10" height="18" rx="2" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="310" y="180" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">шляпочные</text>
  <!-- Mold -->
  <circle cx="380" cy="150" r="3" fill="#90CAF9"/><circle cx="387" cy="145" r="3" fill="#90CAF9"/>
  <circle cx="373" cy="148" r="3" fill="#90CAF9"/><circle cx="393" cy="152" r="3" fill="#90CAF9"/>
  <circle cx="380" cy="143" r="2" fill="#42A5F5"/><circle cx="387" cy="140" r="2" fill="#42A5F5"/>
  <rect x="372" y="155" width="22" height="12" rx="2" fill="#B0BEC5"/>
  <text x="383" y="178" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">плесневые</text>
  <!-- Yeast -->
  <circle cx="435" cy="148" r="6" fill="#FFCC80" stroke="#FF9800" stroke-width="1"/>
  <circle cx="445" cy="140" r="4" fill="#FFCC80" stroke="#FF9800" stroke-width="1"/>
  <circle cx="448" cy="132" r="3" fill="#FFCC80" stroke="#FF9800" stroke-width="1"/>
  <text x="440" y="168" font-family="Arial,sans-serif" font-size="6" fill="#FF9800" text-anchor="middle">дрожжи</text>

  <!-- Nutrition -->
  <rect x="260" y="200" width="215" height="90" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="367" y="216" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" font-weight="bold" text-anchor="middle">Питание</text>
  <!-- Saprophyte -->
  <rect x="280" y="230" width="30" height="25" rx="3" fill="#D7CCC8"/>
  <path d="M285,230 Q295,220 305,230 Z" fill="#A1887F"/>
  <text x="295" y="265" font-family="Arial,sans-serif" font-size="7" fill="#8D6E63" text-anchor="middle">сапрофиты</text>
  <!-- Parasite -->
  <rect x="360" y="225" width="35" height="35" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="377" y="238" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">хозяин</text>
  <line x1="365" y1="240" x2="350" y2="250" stroke="#C62828" stroke-width="1.5"/>
  <circle cx="345" cy="252" r="5" fill="#EF9A9A" stroke="#C62828" stroke-width="1"/>
  <text x="370" y="275" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">паразиты</text>
  <!-- Symbiont -->
  <circle cx="440" cy="245" r="8" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <path d="M448,245 Q455,238 460,245 Q465,252 458,255" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  <text x="450" y="272" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">симбионты</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>