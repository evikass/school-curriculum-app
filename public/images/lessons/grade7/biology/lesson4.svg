  <text x="62" y="246" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">хлеб</text>
  <!-- Cheese -->
  <rect x="95" y="232" width="30" height="22" rx="3" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
  <circle cx="105" cy="240" r="3" fill="#FFF8E1"/>
  <circle cx="115" cy="238" r="2" fill="#FFF8E1"/>
  <text x="110" y="265" font-family="Arial,sans-serif" font-size="6" fill="#F9A825" text-anchor="middle">сыр</text>
  <!-- Medicine -->
  <rect x="145" y="230" width="20" height="25" rx="3" fill="#E8EAF6" stroke="#3F51B5" stroke-width="1"/>
  <text x="155" y="246" font-family="Arial,sans-serif" font-size="7" fill="#3F51B5" text-anchor="middle">+</text>
  <text x="155" y="265" font-family="Arial,sans-serif" font-size="6" fill="#3F51B5" text-anchor="middle">антибиотики</text>

  <!-- Ecology role -->
  <rect x="260" y="200" width="215" height="90" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="367" y="216" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" font-weight="bold" text-anchor="middle">Экологическая роль</text>
  <!-- Tree -->
  <rect x="290" y="260" width="8" height="20" fill="#795548"/>
  <circle cx="294" cy="245" r="18" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Mushroom near tree -->
  <path d="M280,278 Q290,268 300,278 Z" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
  <rect x="286" y="278" width="8" height="10" fill="#EFEBE9"/>
  <line x1="298" y1="262" x2="310" y2="270" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="340" y="250" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">микориза</text>
  <!-- Decomposer -->
  <rect x="360" y="250" width="40" height="25" rx="3" fill="#D7CCC8"/>
  <path d="M365,250 Q380,238 395,250 Z" fill="#A1887F"/>
  <path d="M375,240 L370,235 M380,237 L380,232 M385,239 L390,234" stroke="#90A4AE" stroke-width="0.8"/>
  <text x="380" y="285" font-family="Arial,sans-serif" font-size="7" fill="#8D6E63" text-anchor="middle">разложение</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>