<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Лист и его функции</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Leaf structure -->
  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">Строение листа</text>
  <!-- Leaf blade -->
  <ellipse cx="135" cy="190" rx="85" ry="55" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>
  <!-- Central vein -->
  <line x1="60" y1="190" x2="220" y2="190" stroke="#1B5E20" stroke-width="3"/>
  <!-- Side veins -->
  <line x1="90" y1="190" x2="75" y2="165" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="90" y1="190" x2="75" y2="215" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="120" y1="190" x2="100" y2="155" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="120" y1="190" x2="100" y2="225" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="155" y1="190" x2="175" y2="155" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="155" y1="190" x2="175" y2="225" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="185" y1="190" x2="200" y2="165" stroke="#388E3C" stroke-width="1.5"/>
  <line x1="185" y1="190" x2="200" y2="215" stroke="#388E3C" stroke-width="1.5"/>
  <!-- Petiole -->
  <rect x="45" y="187" width="20" height="6" rx="2" fill="#795548"/>
  <!-- Labels -->
  <text x="135" y="190" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">жилкование</text>
  <text x="135" y="145" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">листовая пластинка</text>
  <text x="42" y="183" font-family="Arial,sans-serif" font-size="7" fill="#795548">черешок</text>
  <!-- Stomata -->
  <ellipse cx="95" cy="250" rx="8" ry="5" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <ellipse cx="91" cy="250" rx="4" ry="3" fill="#81D4FA" stroke="#1565C0" stroke-width="0.8"/>
  <ellipse cx="99" cy="250" rx="4" ry="3" fill="#81D4FA" stroke="#1565C0" stroke-width="0.8"/>
  <text x="95" y="268" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">устьице</text>

  <!-- Photosynthesis -->
  <rect x="260" y="90" width="215" height="200" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" font-weight="bold" text-anchor="middle">Фотосинтез</text>
  <!-- Sun -->
  <circle cx="320" cy="140" r="15" fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
  <line x1="320" y1="120" x2="320" y2="125" stroke="#F9A825" stroke-width="2"/>
  <line x1="320" y1="155" x2="320" y2="160" stroke="#F9A825" stroke-width="2"/>
  <line x1="300" y1="140" x2="305" y2="140" stroke="#F9A825" stroke-width="2"/>
  <line x1="335" y1="140" x2="340" y2="140" stroke="#F9A825" stroke-width="2"/>
  <text x="320" y="175" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">свет</text>
  <!-- Leaf in center -->
  <ellipse cx="367" cy="200" rx="30" ry="20" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="347" y1="200" x2="387" y2="200" stroke="#1B5E20" stroke-width="2"/>
  <!-- Arrows in: CO2 and H2O -->
  <path d="M310,185 L340,195" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="none"/>
  <text x="300" y="183" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">CO2</text>
  <path d="M360,230 L365,215" stroke="#42A5F5" stroke-width="1.5" fill="none"/>
  <text x="348" y="240" font-family="Arial,sans-serif" font-size="7" fill="#42A5F5">H2O</text>
  <!-- Arrows out: O2 and glucose -->
  <path d="M395,195 L420,185" stroke="#4CAF50" stroke-width="1.5" fill="none"/>
  <text x="422" y="183" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50">O2</text>
  <path d="M367,175 L367,160" stroke="#FF9800" stroke-width="1.5" fill="none"/>
  <text x="367" y="155" font-family="Arial,sans-serif" font-size="7" fill="#FF9800" text-anchor="middle">глюкоза</text>
  <!-- Equation -->
  <text x="367" y="275" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">6CO2 + 6H2O = C6H12O6 + 6O2</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Биология</text>
</svg>