<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFF8E1"/>
<!-- Open book -->
<path d="M80 80 Q250 50 420 80 L420 270 Q250 240 80 270 Z" fill="#FFFDE7" stroke="#8D6E63" stroke-width="2"/>
<path d="M250 55 L250 265" stroke="#8D6E63" stroke-width="1.5"/>
<!-- Left page text lines -->
<line x1="110" y1="110" x2="230" y2="105" stroke="#BDBDBD" stroke-width="1"/>
<line x1="110" y1="125" x2="230" y2="120" stroke="#BDBDBD" stroke-width="1"/>
<line x1="110" y1="140" x2="230" y2="135" stroke="#BDBDBD" stroke-width="1"/>
<line x1="110" y1="155" x2="230" y2="150" stroke="#BDBDBD" stroke-width="1"/>
<!-- Right page text lines -->
<line x1="270" y1="105" x2="390" y2="110" stroke="#BDBDBD" stroke-width="1"/>
<line x1="270" y1="120" x2="390" y2="125" stroke="#BDBDBD" stroke-width="1"/>
<line x1="270" y1="135" x2="390" y2="140" stroke="#BDBDBD" stroke-width="1"/>
<line x1="270" y1="150" x2="390" y2="155" stroke="#BDBDBD" stroke-width="1"/>
<!-- Small world landmarks floating around -->
<!-- Pyramid -->
<polygon points="70,50 90,20 110,50" fill="#FFD54F" opacity="0.5" stroke="#F9A825" stroke-width="1"/>
<!-- Taj Mahal dome -->
<ellipse cx="440" cy="35" rx="15" ry="12" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
<rect x="430" y="35" width="20" height="15" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="1"/>
<!-- Pagoda -->
<rect x="40" y="260" width="30" height="35" rx="2" fill="#FF8A65" opacity="0.4"/>
<polygon points="35,260 55,248 75,260" fill="#FF8A65" opacity="0.4"/>
<!-- Kremlin star -->
<polygon points="460,260 463,250 470,243 477,250 480,260" fill="#C62828" opacity="0.5"/>
<!-- Globe -->
<circle cx="250" cy="300" r="25" fill="#BBDEFB" opacity="0.4" stroke="#1565C0" stroke-width="1.5"/>
<ellipse cx="250" cy="300" rx="25" ry="10" fill="none" stroke="#1565C0" stroke-width="0.8"/>
<line x1="250" y1="275" x2="250" y2="325" stroke="#1565C0" stroke-width="0.8"/>
<!-- Title -->
<text x="250" y="190" font-family="sans-serif" font-size="16" fill="#5D4037" text-anchor="middle" font-weight="bold">Сказки</text>
<text x="250" y="210" font-family="sans-serif" font-size="13" fill="#8D6E63" text-anchor="middle">народов мира</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#8D6E63" opacity="0.5" text-anchor="middle">Сказки народов мира</text>
</svg>