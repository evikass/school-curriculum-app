<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#1B5E20" opacity="0.08"/>
<rect width="500" height="350" fill="#F1F8E9"/>
<!-- Forest background - trees -->
<path d="M0 280 Q50 220 100 260 Q150 200 200 250 Q250 180 300 240 Q350 190 400 230 Q450 200 500 250 L500 350 L0 350Z" fill="#C8E6C9"/>
<path d="M0 300 Q80 260 160 290 Q240 250 320 280 Q400 260 500 290 L500 350 L0 350Z" fill="#A5D6A7"/>
<!-- Path/road -->
<path d="M250 350 Q240 310 230 280 Q220 260 240 240 Q260 220 250 190" stroke="#8D6E63" stroke-width="25" fill="none" stroke-linecap="round" opacity="0.4"/>
<!-- Bogatyr on horse silhouette -->
<ellipse cx="300" cy="180" rx="40" ry="15" fill="#5D4037"/>
<!-- Horse body -->
<path d="M265 170 Q260 140 275 130 Q285 125 290 135 L295 130 Q300 125 305 130 L310 140 Q320 130 330 135 Q340 140 335 155 L325 170 Q315 178 305 180 L280 182 Q268 180 265 170Z" fill="#4E342E"/>
<!-- Horse legs -->
<line x1="275" y1="180" x2="270" y2="210" stroke="#4E342E" stroke-width="4"/>
<line x1="285" y1="182" x2="280" y2="212" stroke="#4E342E" stroke-width="4"/>
<line x1="310" y1="180" x2="315" y2="210" stroke="#4E342E" stroke-width="4"/>
<line x1="320" y1="178" x2="325" y2="208" stroke="#4E342E" stroke-width="4"/>
<!-- Horse head -->
<path d="M260 140 Q250 120 255 110 Q260 105 265 115 Q268 125 265 140" fill="#4E342E"/>
<!-- Rider -->
<circle cx="290" cy="115" r="10" fill="#3E2723"/>
<line x1="290" y1="125" x2="290" y2="155" stroke="#3E2723" stroke-width="5"/>
<line x1="290" y1="135" x2="275" y2="145" stroke="#3E2723" stroke-width="3"/>
<line x1="290" y1="135" x2="305" y2="150" stroke="#3E2723" stroke-width="3"/>
<!-- Helmet -->
<path d="M280 108 Q290 95 300 108" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
<line x1="290" y1="95" x2="290" y2="85" stroke="#FFD54F" stroke-width="2"/>
<!-- Shield -->
<ellipse cx="278" cy="142" rx="8" ry="12" fill="#C62828" stroke="#8D6E63" stroke-width="1"/>
<!-- Spear -->
<line x1="310" y1="148" x2="340" y2="70" stroke="#8D6E63" stroke-width="2"/>
<polygon points="340,70 336,78 344,78" fill="#BDBDBD"/>
<!-- Title area -->
<rect x="30" y="30" width="220" height="55" rx="8" fill="white" opacity="0.85" stroke="#33691E" stroke-width="1"/>
<text x="40" y="52" font-family="sans-serif" font-size="14" fill="#1B5E20" font-weight="bold">Былины</text>
<text x="40" y="72" font-family="serif" font-size="12" fill="#33691E">Илья Муромец и Соловей-разбойник</text>
<!-- Nightingale in tree -->
<circle cx="150" cy="160" r="8" fill="#4E342E"/>
<path d="M158 160 L165 155 L162 162 L170 158" stroke="#4E342E" stroke-width="1.5" fill="none"/>
<!-- Sound waves from nightingale -->
<path d="M172 155 Q180 150 185 155" stroke="#FF6F00" stroke-width="1" fill="none" opacity="0.6"/>
<path d="M175 152 Q185 145 192 152" stroke="#FF6F00" stroke-width="1" fill="none" opacity="0.4"/>
<path d="M178 148 Q190 140 198 148" stroke="#FF6F00" stroke-width="1" fill="none" opacity="0.2"/>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#1B5E20" opacity="0.5" text-anchor="middle">Былины. Илья Муромец и Соловей-разбойник</text>
</svg>