<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FBE9E7"/>
<!-- Tsar's feast hall - arch -->
<path d="M50 60 Q250 20 450 60" fill="none" stroke="#BF360C" stroke-width="2"/>
<line x1="50" y1="60" x2="50" y2="300" stroke="#BF360C" stroke-width="2"/>
<line x1="450" y1="60" x2="450" y2="300" stroke="#BF360C" stroke-width="2"/>
<!-- Table -->
<rect x="100" y="210" width="300" height="8" rx="2" fill="#8D6E63"/>
<!-- Goblets on table -->
<ellipse cx="150" cy="203" rx="8" ry="3" fill="#FFD54F" opacity="0.7"/>
<rect x="147" y="195" width="6" height="8" fill="#FFD54F" opacity="0.7"/>
<ellipse cx="180" cy="203" rx="8" ry="3" fill="#FFD54F" opacity="0.7"/>
<!-- Tsar figure (seated at left) -->
<circle cx="140" cy="155" r="14" fill="#FFCCBC"/>
<!-- Tsar crown -->
<polygon points="126,144 133,128 140,140 147,126 154,144" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
<rect x="128" y="168" width="24" height="35" rx="3" fill="#C62828"/>
<!-- Fur collar -->
<path d="M128 170 Q140 178 152 170" fill="#FAFAFA" opacity="0.8"/>
<!-- Beard -->
<path d="M135 168 Q138 185 140 180 Q142 185 145 168" fill="#5D4037"/>
<!-- Merchant Kalashnikov figure (right, standing taller) -->
<circle cx="340" cy="120" r="14" fill="#FFCCBC"/>
<!-- Merchant hat -->
<rect x="328" y="102" width="24" height="8" rx="2" fill="#4E342E"/>
<rect x="332" y="94" width="16" height="10" rx="2" fill="#5D4037"/>
<!-- Merchant beard -->
<path d="M334 130 Q337 148 340 145 Q343 148 346 130" fill="#5D4037"/>
<!-- Merchant body -->
<rect x="326" y="133" width="28" height="70" rx="3" fill="#1565C0"/>
<!-- Belt -->
<rect x="326" y="170" width="28" height="5" fill="#FFD54F"/>
<!-- Arms -->
<line x1="326" y1="148" x2="310" y2="175" stroke="#FFCCBC" stroke-width="4"/>
<line x1="354" y1="148" x2="370" y2="175" stroke="#FFCCBC" stroke-width="4"/>
<!-- Tsar's guard (background) -->
<rect x="60" y="120" width="18" height="55" rx="2" fill="#333" opacity="0.3"/>
<circle cx="69" cy="112" r="8" fill="#BCAAA4" opacity="0.4"/>
<!-- Spear -->
<line x1="77" y1="80" x2="77" y2="175" stroke="#666" stroke-width="1.5" opacity="0.4"/>
<!-- Title -->
<rect x="140" y="260" width="220" height="55" rx="6" fill="white" opacity="0.85" stroke="#BF360C" stroke-width="1"/>
<text x="250" y="280" font-family="sans-serif" font-size="11" fill="#BF360C" text-anchor="middle" font-weight="bold">М.Ю. Лермонтов</text>
<text x="250" y="300" font-family="serif" font-size="11" fill="#8D6E63" text-anchor="middle">«Песня про царя Ивана Васильевича»</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#BF360C" opacity="0.5" text-anchor="middle">М.Ю. Лермонтов. «Песня про царя Ивана Васильевича»</text>
</svg>