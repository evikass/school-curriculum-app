<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFF3E0"/>
<!-- Battle scene background - smoke -->
<ellipse cx="250" cy="200" rx="200" ry="80" fill="#FFE0B2" opacity="0.3"/>
<!-- Horse with rider (Peter I) -->
<!-- Horse body -->
<ellipse cx="220" cy="180" rx="50" ry="22" fill="#5D4037"/>
<!-- Horse neck -->
<path d="M185 165 Q175 130 185 115 Q190 108 198 115" fill="#5D4037"/>
<!-- Horse head -->
<ellipse cx="190" cy="112" rx="14" ry="10" fill="#5D4037"/>
<circle cx="184" cy="109" r="2" fill="#1B5E20"/>
<!-- Horse legs (rearing) -->
<line x1="200" y1="200" x2="190" y2="240" stroke="#5D4037" stroke-width="5"/>
<line x1="215" y1="198" x2="210" y2="240" stroke="#5D4037" stroke-width="5"/>
<line x1="240" y1="195" x2="255" y2="220" stroke="#5D4037" stroke-width="5"/>
<line x1="250" y1="190" x2="265" y2="215" stroke="#5D4037" stroke-width="5"/>
<!-- Horse tail -->
<path d="M270 175 Q285 180 280 200" stroke="#4E342E" stroke-width="3" fill="none"/>
<!-- Rider (Peter) -->
<circle cx="220" cy="100" r="12" fill="#FFCCBC"/>
<!-- Peter's distinctive face -->
<rect x="206" y="115" width="28" height="45" rx="4" fill="#1B5E20"/>
<!-- Arm raised with sword -->
<line x1="228" y1="120" x2="260" y2="80" stroke="#FFCCBC" stroke-width="4"/>
<line x1="260" y1="80" x2="275" y2="50" stroke="#BDBDBD" stroke-width="2.5"/>
<!-- Hat -->
<path d="M208 92 Q220 78 232 92" fill="#1B5E20"/>
<!-- Cannonballs/smoke in background -->
<circle cx="380" cy="160" r="8" fill="#424242" opacity="0.3"/>
<circle cx="400" cy="190" r="6" fill="#424242" opacity="0.2"/>
<!-- Flags -->
<rect x="140" y="70" width="40" height="25" rx="2" fill="#1565C0" opacity="0.5"/>
<line x1="140" y1="60" x2="140" y2="100" stroke="#5D4037" stroke-width="2"/>
<!-- Swedish flag -->
<rect x="390" y="100" width="35" height="22" rx="2" fill="#FFD54F" opacity="0.5"/>
<line x1="390" y1="90" x2="390" y2="128" stroke="#5D4037" stroke-width="2"/>
<!-- Title -->
<rect x="280" y="240" width="200" height="60" rx="6" fill="white" opacity="0.85" stroke="#E65100" stroke-width="1"/>
<text x="380" y="262" font-family="sans-serif" font-size="13" fill="#BF360C" text-anchor="middle" font-weight="bold">А.С. Пушкин</text>
<text x="380" y="282" font-family="serif" font-size="14" fill="#E65100" text-anchor="middle">«Полтава»</text>
<!-- Battle fire glow -->
<ellipse cx="160" cy="220" rx="20" ry="15" fill="#FF6D00" opacity="0.15"/>
<ellipse cx="350" cy="230" rx="15" ry="12" fill="#FF6D00" opacity="0.1"/>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#BF360C" opacity="0.5" text-anchor="middle">А.С. Пушкин. «Полтава»</text>
</svg>