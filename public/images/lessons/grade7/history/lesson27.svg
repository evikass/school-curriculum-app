<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFFDE7"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
<rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
<polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
<polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
<polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
<polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
<circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
<circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
<circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
<circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
<circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
<circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
<text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Иван III и освобождение Руси</text>
<text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 27</text>
<line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
<rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
<rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Map -->
  <rect x="25" y="90" width="220" height="200" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">Объединение Руси</text>
  <rect x="35" y="115" width="200" height="165" rx="4" fill="#E8F5E9" opacity="0.5"/>
  <!-- Moscow -->
  <circle cx="130" cy="140" r="6" fill="#C62828"/>
  <text x="130" y="133" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Москва</text>
  <!-- Other cities -->
  <circle cx="80" cy="120" r="4" fill="#1565C0"/>
  <text x="80" y="113" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Тверь</text>
  <circle cx="170" cy="130" r="4" fill="#1565C0"/>
  <text x="175" y="123" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Рязань</text>
  <circle cx="100" cy="160" r="4" fill="#1565C0"/>
  <text x="100" y="153" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Новгород</text>
  <circle cx="160" cy="170" r="4" fill="#1565C0"/>
  <text x="165" y="165" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Казань</text>
  <circle cx="190" cy="200" r="4" fill="#1565C0"/>
  <text x="190" y="195" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Астрахань</text>
  <!-- Growing territory -->
  <path d="M60,110 L180,110 L210,150 L200,200 L160,230 L80,220 L50,180 Z" fill="#C62828" opacity="0.08" stroke="#C62828" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="135" y="200" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" opacity="0.5">расширение</text>
  <!-- Timeline -->
  <line x1="50" y1="250" x2="210" y2="250" stroke="#C62828" stroke-width="1.5"/>
  <circle cx="70" cy="250" r="3" fill="#C62828"/>
  <text x="70" y="265" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">1462</text>
  <circle cx="130" cy="250" r="3" fill="#C62828"/>
  <text x="130" y="265" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">1480</text>
  <circle cx="190" cy="250" r="3" fill="#C62828"/>
  <text x="190" y="265" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">1485</text>
  <text x="130" y="280" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">присоединение земель</text>

  <!-- Ivan III figure -->
  <rect x="260" y="90" width="215" height="200" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="367" y="106" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" font-weight="bold" text-anchor="middle">Иван III</text>
  <!-- Figure -->
  <circle cx="367" cy="140" r="18" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
  <!-- Crown -->
  <path d="M352,128 L355,118 L360,126 L365,116 L370,126 L375,118 L378,128" fill="#F9A825" stroke="#C62828" stroke-width="1"/>
  <!-- Body -->
  <rect x="350" y="158" width="34" height="60" rx="5" fill="#C62828"/>
  <!-- Cross on chest -->
  <line x1="367" y1="170" x2="367" y2="190" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="360" y1="180" x2="374" y2="180" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Legs -->
  <line x1="360" y1="218" x2="356" y2="255" stroke="#5D4037" stroke-width="5"/>
  <line x1="374" y1="218" x2="378" y2="255" stroke="#5D4037" stroke-width="5"/>
  <rect x="350" y="253" width="12" height="8" rx="3" fill="#5D4037"/>
  <rect x="372" y="253" width="12" height="8" rx="3" fill="#5D4037"/>
  <!-- Scepter -->
  <line x1="388" y1="165" x2="388" y2="210" stroke="#F9A825" stroke-width="2.5"/>
  <circle cx="388" cy="163" r="5" fill="#F9A825" stroke="#C62828" stroke-width="1"/>
  <!-- Orb -->
  <circle cx="340" cy="195" r="8" fill="#F9A825" stroke="#C62828" stroke-width="1"/>
  <line x1="340" y1="183" x2="340" y2="177" stroke="#C62828" stroke-width="1.5"/>
  <line x1="336" y1="178" x2="344" y2="178" stroke="#C62828" stroke-width="1.5"/>
  <text x="367" y="280" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">Государь всея Руси</text>
<rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
<text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">История</text>
</svg>