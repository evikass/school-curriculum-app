<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#ECEFF1"/>
<line x1="250" y1="30" x2="250" y2="330" stroke="#B0BEC5" stroke-width="2" stroke-dasharray="5,3"/>
<rect x="30" y="40" width="190" height="130" rx="6" fill="#FFF" stroke="#C62828" stroke-width="2"/>
<text x="125" y="60" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Патриарх Никон</text>
<circle cx="80" cy="100" r="25" fill="#FFCDD2" stroke="#C62828" stroke-width="2"/>
<circle cx="80" cy="85" r="12" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
<path d="M65,80 L95,80" stroke="#5D4037" stroke-width="2"/>
<rect x="70" y="68" width="20" height="12" rx="3" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
<line x1="80" y1="68" x2="80" y2="55" stroke="#FFD700" stroke-width="2"/>
<circle cx="80" cy="52" r="4" fill="#FFD700" stroke="#F9A825" stroke-width="1"/>
<rect x="60" y="125" width="40" height="30" rx="3" fill="#E53935" stroke="#C62828" stroke-width="1"/>
<text x="80" y="142" font-size="6" fill="#FFF" text-anchor="middle">мантия</text>
<text x="130" y="95" font-size="8" fill="#C62828">Реформы:</text>
<text x="130" y="110" font-size="7" fill="#D32F2F">• Троеперстие</text>
<text x="130" y="123" font-size="7" fill="#D32F2F">• «Исус» → «Иисус»</text>
<text x="130" y="136" font-size="7" fill="#D32F2F">• Аллилуйя 3 раза</text>
<text x="130" y="149" font-size="7" fill="#D32F2F">• Поясные поклоны</text>
<text x="130" y="162" font-size="7" fill="#D32F2F">• Походы против</text>
<text x="137" y="173" font-size="7" fill="#D32F2F">двоеперстия</text>
<rect x="280" y="40" width="190" height="130" rx="6" fill="#FFF" stroke="#1565C0" stroke-width="2"/>
<text x="375" y="60" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Протопоп Аввакум</text>
<circle cx="330" cy="100" r="25" fill="#BBDEFB" stroke="#1565C0" stroke-width="2"/>
<circle cx="330" cy="85" r="12" fill="#FFE0B2" stroke="#E65100" stroke-width="1.5"/>
<line x1="315" y1="80" x2="345" y2="80" stroke="#5D4037" stroke-width="2"/>
<rect x="320" y="68" width="20" height="12" rx="3" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
<rect x="310" y="125" width="40" height="30" rx="3" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
<text x="330" y="142" font-size="6" fill="#FFF" text-anchor="middle">ряса</text>
<text x="380" y="95" font-size="8" fill="#1565C0">Старообрядцы:</text>
<text x="380" y="110" font-size="7" fill="#1976D2">• Двоеперстие</text>
<text x="380" y="123" font-size="7" fill="#1976D2">• «Исус»</text>
<text x="380" y="136" font-size="7" fill="#1976D2">• Аллилуйя 2 раза</text>
<text x="380" y="149" font-size="7" fill="#1976D2">• Земные поклоны</text>
<text x="380" y="162" font-size="7" fill="#1976D2">• Сохранение</text>
<text x="387" y="173" font-size="7" fill="#1976D2">старых обрядов</text>
<text x="250" y="28" font-size="8" fill="#546E7A" text-anchor="middle">РАСКОЛ 1653–1667</text>
<rect x="30" y="190" width="440" height="130" rx="6" fill="#FFF" stroke="#795548" stroke-width="1.5"/>
<text x="250" y="212" font-size="9" fill="#4E342E" text-anchor="middle" font-weight="bold">Последствия раскола</text>
<text x="50" y="232" font-size="8" fill="#5D4037">✦ Гонения на старообрядцев</text>
<text x="50" y="248" font-size="8" fill="#5D4037">✦ Самосожжения («гари»)</text>
<text x="50" y="264" font-size="8" fill="#5D4037">✦ Бегство в Сибирь и на Север</text>
<text x="50" y="280" font-size="8" fill="#5D4037">✦ Церковь подчинена государству</text>
<text x="50" y="296" font-size="8" fill="#5D4037">✦ Раскол народа на два лагеря</text>
<text x="250" y="314" font-size="7" fill="#795548" text-anchor="middle">Аввакум сослан и сожжён (1682)</text>
<text x="250" y="345" font-size="9" fill="#666" text-anchor="middle" opacity="0.5">Церковный раскол</text>
</svg>