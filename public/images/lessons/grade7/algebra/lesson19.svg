  <circle cx="85" cy="183" r="4" fill="#2E7D32"/>
  <text x="87" y="218" font-size="8" fill="#555" text-anchor="middle">Прямые пересекаются</text>
  <rect x="175" y="121" width="155" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#F4511E" stroke-width="1"/>
  <text x="252" y="136" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Нет решений</text>
  <line x1="195" y1="165" x2="300" y2="165" stroke="#F4511E" stroke-width="2"/>
