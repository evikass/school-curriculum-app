  <text x="252" y="218" font-size="8" fill="#555" text-anchor="middle">Прямые параллельны</text>
  <rect x="338" y="121" width="150" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#F4511E" stroke-width="1"/>
  <text x="413" y="136" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Бесконечно много</text>
  <line x1="360" y1="172" x2="460" y2="172" stroke="#F4511E" stroke-width="2.5"/>
  <text x="413" y="218" font-size="8" fill="#555" text-anchor="middle">Прямые совпадают</text>
  <rect x="12" y="229" width="476" height="65" rx="6" fill="white" fill-opacity="0.9" stroke="#F4511E" stroke-width="1"/>
  <text x="250" y="244" font-size="9" font-weight="bold" fill="#D84315" text-anchor="middle">Способы решения систем</text>
  <rect x="22" y="250" width="145" height="18" rx="3" fill="#FBE9E7" stroke="#F4511E" stroke-width="0.5"/>
  <text x="94" y="263" font-size="8" fill="#D84315" text-anchor="middle">Графический</text>
  <rect x="177" y="250" width="145" height="18" rx="3" fill="#FBE9E7" stroke="#F4511E" stroke-width="0.5"/>
  <text x="249" y="263" font-size="8" fill="#D84315" text-anchor="middle">Подстановка</text>
  <rect x="332" y="250" width="146" height="18" rx="3" fill="#FBE9E7" stroke="#F4511E" stroke-width="0.5"/>
  <text x="405" y="263" font-size="8" fill="#D84315" text-anchor="middle">Сложение</text>
  <text x="250" y="286" font-size="8" fill="#555" text-anchor="middle">Система: два или более уравнений с общими решениями</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#F4511E" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Системы линейных уравнений — Макарычев Ю.Н., 7 класс</text>
