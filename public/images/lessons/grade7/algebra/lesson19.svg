<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="50%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#FF7043" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#D84315" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#D84315" text-anchor="middle" font-family="Arial">Системы линейных уравнений</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 19</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#F4511E" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#F4511E" stroke-width="1"/>
  <text x="250" y="73" font-size="10" fill="#D84315" text-anchor="middle" font-weight="bold" font-family="monospace">ax + by = c — линейное уравнение с двумя переменными</text>
  <text x="250" y="98" font-size="9" fill="#555" text-anchor="middle">Решение — пара чисел (x; y), обращающая уравнение в верное равенство</text>
