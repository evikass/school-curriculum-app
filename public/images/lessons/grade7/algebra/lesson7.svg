<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFF3E0"/>
<!-- Exponent tower -->
<text x="100" y="80" font-family="monospace" font-size="36" fill="#BF360C" font-weight="bold">2³</text>
<text x="170" y="80" font-family="monospace" font-size="22" fill="#E65100">= 2·2·2</text>
<text x="310" y="80" font-family="monospace" font-size="22" fill="#1B5E20">= 8</text>
<!-- Tower visualization -->
<rect x="100" y="100" width="60" height="25" rx="4" fill="#FF6D00" opacity="0.3"/>
<rect x="100" y="130" width="60" height="25" rx="4" fill="#FF6D00" opacity="0.5"/>
<rect x="100" y="160" width="60" height="25" rx="4" fill="#FF6D00" opacity="0.7"/>
<text x="130" y="118" font-family="monospace" font-size="12" fill="#BF360C" text-anchor="middle">2</text>
<text x="130" y="148" font-family="monospace" font-size="12" fill="#BF360C" text-anchor="middle">2</text>
<text x="130" y="178" font-family="monospace" font-size="12" fill="#BF360C" text-anchor="middle">2</text>
<text x="70" y="150" font-family="sans-serif" font-size="12" fill="#BF360C" text-anchor="middle">3 раза</text>
<!-- Properties -->
<rect x="200" y="100" width="270" height="45" rx="6" fill="#FFF3E0" stroke="#FF6D00" stroke-width="1"/>
<text x="210" y="120" font-family="monospace" font-size="13" fill="#BF360C">aⁿ · aᵐ = aⁿ⁺ᵐ</text>
<text x="360" y="120" font-family="sans-serif" font-size="10" fill="#E65100">умножение</text>
<rect x="200" y="155" width="270" height="45" rx="6" fill="#FFF3E0" stroke="#FF6D00" stroke-width="1"/>
<text x="210" y="175" font-family="monospace" font-size="13" fill="#BF360C">aⁿ ÷ aᵐ = aⁿ⁻ᵐ</text>
<text x="360" y="175" font-family="sans-serif" font-size="10" fill="#E65100">деление</text>
<rect x="200" y="210" width="270" height="45" rx="6" fill="#FFF3E0" stroke="#FF6D00" stroke-width="1"/>
<text x="210" y="230" font-family="monospace" font-size="13" fill="#BF360C">(aⁿ)ᵐ = aⁿ·ᵐ</text>
<text x="360" y="230" font-family="sans-serif" font-size="10" fill="#E65100">возведение</text>
<!-- Example -->
<rect x="40" y="270" width="420" height="40" rx="8" fill="#FFE0B2"/>
<text x="60" y="295" font-family="monospace" font-size="15" fill="#BF360C">2³ · 2⁴ = 2⁷ = 128</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#BF360C" opacity="0.5" text-anchor="middle">Степень и её свойства</text>
</svg>