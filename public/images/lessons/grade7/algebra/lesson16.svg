<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="50%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#EC407A" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AD1457" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="Arial">Квадрат суммы и разности</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 16</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#D81B60" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="230" height="110" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="127" y="73" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Квадрат суммы</text>
  <text x="127" y="95" font-size="11" fill="#D81B60" text-anchor="middle" font-weight="bold" font-family="monospace">(a+b)^2 = a^2+2ab+b^2</text>
  <text x="127" y="120" font-size="8" fill="#555" text-anchor="middle">Пример: (x+3)^2</text>
  <text x="127" y="135" font-size="8" fill="#555">= x^2 + 6x + 9</text>
  <text x="127" y="155" font-size="8" fill="#555">= x^2+2(x)(3)+3^2</text>
  <rect x="252" y="58" width="236" height="110" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="370" y="73" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Квадрат разности</text>
  <text x="370" y="95" font-size="11" fill="#D81B60" text-anchor="middle" font-weight="bold" font-family="monospace">(a-b)^2 = a^2-2ab+b^2</text>
  <text x="370" y="120" font-size="8" fill="#555" text-anchor="middle">Пример: (5-y)^2</text>
  <text x="370" y="135" font-size="8" fill="#555">= 25 - 10y + y^2</text>
  <text x="370" y="155" font-size="8" fill="#555">= 5^2-2(5)(y)+y^2</text>
  <rect x="12" y="176" width="476" height="128" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="250" y="191" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Разложение на множители (обратные формулы)</text>
  <rect x="22" y="198" width="220" height="30" rx="3" fill="#FCE4EC" stroke="#D81B60" stroke-width="0.5"/>
  <text x="132" y="210" font-size="8" fill="#AD1457" text-anchor="middle">a^2 + 2ab + b^2 = (a + b)^2</text>
  <text x="132" y="224" font-size="8" fill="#555" text-anchor="middle">Три члена, средний — удвоенное</text>
  <rect x="252" y="198" width="226" height="30" rx="3" fill="#FCE4EC" stroke="#D81B60" stroke-width="0.5"/>
  <text x="365" y="210" font-size="8" fill="#AD1457" text-anchor="middle">a^2 - 2ab + b^2 = (a - b)^2</text>
  <text x="365" y="224" font-size="8" fill="#555" text-anchor="middle">Три члена, средний — минус удвоенное</text>
  <text x="250" y="252" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Примеры разложения</text>
  <text x="150" y="270" font-size="8" fill="#D81B60" font-family="monospace">x^2+10x+25 = (x+5)^2</text>
  <text x="350" y="270" font-size="8" fill="#D81B60" font-family="monospace">x^2-6x+9 = (x-3)^2</text>
  <text x="250" y="292" font-size="8" fill="#AD1457" text-anchor="middle" font-weight="bold">Разница между формулами: знак перед 2ab</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#D81B60" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Квадрат суммы и разности — Макарычев Ю.Н., 7 класс</text>
</svg>