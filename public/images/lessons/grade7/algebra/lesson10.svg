<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FBE9E7"/>
<!-- Parentheses -->
<text x="40" y="70" font-family="serif" font-size="60" fill="#BF360C" opacity="0.3">(</text>
<text x="430" y="70" font-family="serif" font-size="60" fill="#BF360C" opacity="0.3">)</text>
<!-- Expression before -->
<text x="70" y="60" font-family="monospace" font-size="18" fill="#4E342E">(3x² + 2xy) + (5xy − x²)</text>
<!-- Plus sign emphasized -->
<circle cx="250" cy="95" r="15" fill="#FF5722" opacity="0.2"/>
<text x="250" y="101" font-family="sans-serif" font-size="20" fill="#BF360C" text-anchor="middle">+</text>
<!-- After removing parentheses -->
<path d="M70 70 L70 120 L430 120 L430 70" stroke="#FF5722" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
<text x="70" y="145" font-family="monospace" font-size="18" fill="#BF360C">= 3x² + 2xy + 5xy − x²</text>
<!-- Grouping like terms -->
<rect x="70" y="158" width="80" height="28" rx="4" fill="#FF8A65" opacity="0.3"/>
<text x="110" y="178" font-family="monospace" font-size="14" fill="#BF360C" text-anchor="middle">3x²</text>
<rect x="155" y="158" width="70" height="28" rx="4" fill="#FF8A65" opacity="0.3"/>
<text x="190" y="178" font-family="monospace" font-size="14" fill="#E65100" text-anchor="middle">−x²</text>
<rect x="235" y="158" width="70" height="28" rx="4" fill="#A5D6A7" opacity="0.4"/>
<text x="270" y="178" font-family="monospace" font-size="14" fill="#1B5E20" text-anchor="middle">2xy</text>
<rect x="315" y="158" width="70" height="28" rx="4" fill="#A5D6A7" opacity="0.4"/>
<text x="350" y="178" font-family="monospace" font-size="14" fill="#2E7D32" text-anchor="middle">5xy</text>
<!-- Result -->
<text x="250" y="225" font-family="monospace" font-size="20" fill="#BF360C" text-anchor="middle" font-weight="bold">= 2x² + 7xy</text>
<!-- Subtraction rule -->
<rect x="40" y="245" width="420" height="55" rx="8" fill="#FFCCBC" opacity="0.5"/>
<text x="60" y="268" font-family="monospace" font-size="14" fill="#BF360C">− (a − b + c) = −a + b − c</text>
<text x="60" y="288" font-family="sans-serif" font-size="11" fill="#E65100">При вычитании знаки в скобках меняются!</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#BF360C" opacity="0.5" text-anchor="middle">Сложение и вычитание многочленов</text>
</svg>