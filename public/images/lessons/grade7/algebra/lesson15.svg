<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="50%" stop-color="#D1C4E9"/>
      <stop offset="100%" stop-color="#7E57C2" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4527A0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4527A0" text-anchor="middle" font-family="Arial">Умножение многочлена на многочлен</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 15</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#673AB7" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#4527A0" text-anchor="middle" font-weight="bold" font-family="monospace">(a + b)(c + d) = ac + ad + bc + bd</text>
  <text x="250" y="98" font-size="8" fill="#555" text-anchor="middle">Каждый член первого &times; каждый член второго</text>
  <rect x="12" y="116" width="230" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="127" y="131" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Пример</text>
  <text x="127" y="150" font-size="9" fill="#673AB7" font-family="monospace">(x+3)(x-5)</text>
  <text x="127" y="166" font-size="8" fill="#555">= x &times; x + x(-5)</text>
  <text x="127" y="178" font-size="8" fill="#555">+ 3 &times; x + 3(-5)</text>
  <line x1="87" y1="184" x2="167" y2="184" stroke="#673AB7" stroke-width="0.5"/>
  <text x="127" y="198" font-size="8" fill="#555">= x^2 - 5x + 3x - 15</text>
  <text x="127" y="218" font-size="9" fill="#4527A0" font-weight="bold" font-family="monospace">= x^2 - 2x - 15</text>
  <rect x="252" y="116" width="236" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="370" y="131" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Группировка</text>
  <text x="370" y="150" font-size="9" fill="#673AB7" font-family="monospace">ax+ay+bx+by</text>
  <text x="370" y="168" font-size="8" fill="#555">= a(x+y) + b(x+y)</text>
  <text x="370" y="188" font-size="9" fill="#4527A0" font-weight="bold" font-family="monospace">= (a+b)(x+y)</text>
  <text x="370" y="210" font-size="8" fill="#555" text-anchor="middle">1. Группируем слагаемые</text>
  <text x="370" y="222" font-size="8" fill="#555" text-anchor="middle">2. Выносим множитель из групп</text>
  <rect x="12" y="242" width="476" height="62" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="250" y="257" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Алгоритм</text>
  <text x="80" y="275" font-size="8" fill="#555" text-anchor="middle">1. Первый &times; каждый второго</text>
  <text x="250" y="275" font-size="8" fill="#555" text-anchor="middle">2. Второй &times; каждый второго</text>
  <text x="420" y="275" font-size="8" fill="#555" text-anchor="middle">3. Привести подобные</text>
  <text x="250" y="296" font-size="8" fill="#4527A0" text-anchor="middle" font-weight="bold">После умножения обязательно приводим подобные!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#673AB7" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Умножение многочлена на многочлен — Макарычев Ю.Н., 7 класс</text>
</svg>