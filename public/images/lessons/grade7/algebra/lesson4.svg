<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FCE4EC"/>
<!-- Number line -->
<line x1="40" y1="140" x2="460" y2="140" stroke="#880E4F" stroke-width="2"/>
<!-- Ticks and labels -->
<line x1="100" y1="132" x2="100" y2="148" stroke="#880E4F" stroke-width="2"/>
<text x="100" y="165" font-family="sans-serif" font-size="12" fill="#880E4F" text-anchor="middle">−3</text>
<line x1="170" y1="132" x2="170" y2="148" stroke="#880E4F" stroke-width="2"/>
<text x="170" y="165" font-family="sans-serif" font-size="12" fill="#880E4F" text-anchor="middle">−2</text>
<line x1="240" y1="132" x2="240" y2="148" stroke="#880E4F" stroke-width="2"/>
<text x="240" y="165" font-family="sans-serif" font-size="12" fill="#880E4F" text-anchor="middle">−1</text>
<line x1="310" y1="132" x2="310" y2="148" stroke="#880E4F" stroke-width="2"/>
<text x="310" y="165" font-family="sans-serif" font-size="14" fill="#880E4F" text-anchor="middle" font-weight="bold">0</text>
<line x1="380" y1="132" x2="380" y2="148" stroke="#880E4F" stroke-width="2"/>
<text x="380" y="165" font-family="sans-serif" font-size="12" fill="#880E4F" text-anchor="middle">1</text>
<line x1="450" y1="132" x2="450" y2="148" stroke="#880E4F" stroke-width="2"/>
<text x="450" y="165" font-family="sans-serif" font-size="12" fill="#880E4F" text-anchor="middle">2</text>
<!-- Arrow heads -->
<polygon points="460,140 452,136 452,144" fill="#880E4F"/>
<polygon points="40,140 48,136 48,144" fill="#880E4F"/>
<!-- |x| = 3 illustration: point at 3 and -3 -->
<circle cx="380" cy="140" r="6" fill="#D81B60"/>
<circle cx="100" cy="140" r="6" fill="#D81B60"/>
<!-- Distance brackets -->
<path d="M100 120 L100 108 L380 108 L380 120" stroke="#D81B60" stroke-width="2" fill="none"/>
<text x="240" y="100" font-family="monospace" font-size="16" fill="#D81B60" text-anchor="middle">|x| = 3</text>
<text x="240" y="82" font-family="sans-serif" font-size="11" fill="#880E4F" text-anchor="middle">расстояние от нуля</text>
<!-- Equation |x-2|=5 -->
<text x="250" y="210" font-family="monospace" font-size="20" fill="#880E4F" text-anchor="middle">|x − 2| = 5</text>
<!-- Solutions -->
<path d="M135 225 L135 255" stroke="#D81B60" stroke-width="2"/>
<circle cx="135" cy="260" r="5" fill="#D81B60"/>
<text x="135" y="280" font-family="monospace" font-size="14" fill="#D81B60" text-anchor="middle">−3</text>
<path d="M365 225 L365 255" stroke="#D81B60" stroke-width="2"/>
<circle cx="365" cy="260" r="5" fill="#D81B60"/>
<text x="365" y="280" font-family="monospace" font-size="14" fill="#D81B60" text-anchor="middle">7</text>
<!-- Center point at 2 -->
<circle cx="310" cy="260" r="4" fill="#880E4F" opacity="0.5"/>
<text x="310" y="280" font-family="sans-serif" font-size="10" fill="#880E4F" text-anchor="middle" opacity="0.6">2</text>
<!-- Distance labels -->
<line x1="135" y1="290" x2="310" y2="290" stroke="#AD1457" stroke-width="1.5"/>
<text x="222" y="305" font-family="sans-serif" font-size="11" fill="#AD1457" text-anchor="middle">5</text>
<line x1="310" y1="290" x2="365" y2="290" stroke="#AD1457" stroke-width="1.5"/>
<text x="337" y="305" font-family="sans-serif" font-size="11" fill="#AD1457" text-anchor="middle">5</text>
<!-- Abs value symbol -->
<text x="420" y="55" font-family="serif" font-size="80" fill="#F8BBD0" opacity="0.4">|</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#880E4F" opacity="0.5" text-anchor="middle">Уравнения с модулями</text>
</svg>