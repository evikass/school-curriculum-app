<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg4)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Линейное уравнение</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 4</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3949AB" stroke-opacity="0.3"/>

  <rect x="12" y="58" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="75" font-size="10" font-weight="bold" fill="#283593" text-anchor="middle" font-family="monospace">ax + b = 0</text>
  <text x="250" y="98" font-size="9" fill="#555" text-anchor="middle">a — коэффициент, b — свободный член, x — переменная</text>

  <rect x="12" y="116" width="155" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="89" y="131" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">a &ne; 0</text>
  <text x="89" y="155" font-size="11" fill="#1A237E" text-anchor="middle" font-weight="bold" font-family="monospace">x = -b/a</text>
  <text x="89" y="175" font-size="8" fill="#555" text-anchor="middle">Один корень</text>
  <text x="89" y="190" font-size="8" fill="#3949AB" text-anchor="middle">2x - 6 = 0: x = 3</text>

  <rect x="175" y="116" width="155" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="252" y="131" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">a = 0, b = 0</text>
  <text x="252" y="155" font-size="11" fill="#1A237E" text-anchor="middle" font-weight="bold">0x = 0</text>
  <text x="252" y="175" font-size="8" fill="#555" text-anchor="middle">Бесконечно много</text>
  <text x="252" y="190" font-size="8" fill="#3949AB" text-anchor="middle">Любое x — корень</text>

  <rect x="338" y="116" width="150" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="413" y="131" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">a = 0, b &ne; 0</text>
  <text x="413" y="155" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">0x = b</text>
  <text x="413" y="175" font-size="8" fill="#555" text-anchor="middle">Корней нет</text>
  <text x="413" y="190" font-size="8" fill="#C62828" text-anchor="middle">0 = 5 — ложно</text>

  <rect x="12" y="214" width="476" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="229" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Алгоритм решения</text>
  <rect x="22" y="236" width="456" height="16" rx="2" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
  <text x="250" y="248" font-size="8" fill="#1A237E" text-anchor="middle">1. Перенести слагаемые с x в одну часть, числа — в другую</text>
  <rect x="22" y="254" width="456" height="16" rx="2" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
  <text x="250" y="266" font-size="8" fill="#1A237E" text-anchor="middle">2. Привести подобные слагаемые</text>
  <rect x="22" y="272" width="456" height="16" rx="2" fill="#3949AB" fill-opacity="0.12"/>
  <text x="250" y="284" font-size="8" fill="#1A237E" text-anchor="middle" font-weight="bold">3. Разделить обе части на коэффициент при x</text>

  <rect x="12" y="320" width="476" height="22" rx="4" fill="#3949AB" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Корень уравнения — значение переменной, обращающее уравнение в верное равенство</text>
</svg>