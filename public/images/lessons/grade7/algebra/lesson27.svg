  <!-- Coordinate axes -->
  <line x1="55" y1="240" x2="210" y2="240" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="245" x2="60" y2="130" stroke="#333" stroke-width="1.5"/>
