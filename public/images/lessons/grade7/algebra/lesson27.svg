  <rect x="285" y="130" width="165" height="30" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="367" y="150" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle">ax + b = 0</text>
  <rect x="285" y="170" width="165" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="367" y="190" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">x = -b / a</text>
  <!-- Degree -->
  <rect x="285" y="210" width="165" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="367" y="230" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle">a x a = a2</text>
  <!-- Monomial -->
  <rect x="285" y="250" width="165" height="30" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="367" y="270" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle">3x2y - одночлен</text>
