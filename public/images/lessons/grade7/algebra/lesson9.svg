<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#283593" text-anchor="middle" font-family="Arial">Степень с натуральным показателем</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 9</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3949AB" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="78" font-size="12" fill="#283593" text-anchor="middle" font-weight="bold" font-family="monospace">a^n = a × a × ... × a (n раз)</text>
  <text x="250" y="100" font-size="9" fill="#555" text-anchor="middle">a — основание, n — показатель степени</text>
  <rect x="12" y="116" width="150" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="87" y="131" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Примеры</text>
  <text x="87" y="150" font-size="9" fill="#3949AB" font-family="monospace">2^3 = 8</text>
  <text x="87" y="166" font-size="9" fill="#3949AB" font-family="monospace">5^2 = 25</text>
  <text x="87" y="182" font-size="9" fill="#3949AB" font-family="monospace">10^3 = 1000</text>
  <text x="87" y="200" font-size="9" fill="#3949AB" font-family="monospace">(-2)^2 = 4</text>
  <rect x="172" y="116" width="155" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="249" y="131" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Особые случаи</text>
  <text x="249" y="150" font-size="9" fill="#3949AB" font-family="monospace">a^1 = a</text>
  <text x="249" y="166" font-size="9" fill="#3949AB" font-family="monospace">0^n = 0</text>
  <text x="249" y="182" font-size="9" fill="#3949AB" font-family="monospace">1^n = 1</text>
  <text x="249" y="200" font-size="8" fill="#C62828" font-family="monospace">-2^2 = -(2^2) = -4</text>
  <rect x="337" y="116" width="151" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="412" y="131" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Чтение</text>
  <text x="412" y="150" font-size="9" fill="#3949AB">a^2 — квадрат</text>
  <text x="412" y="166" font-size="9" fill="#3949AB">a^3 — куб</text>
  <text x="412" y="182" font-size="9" fill="#3949AB">a^4 — четвёртая</text>
  <text x="412" y="198" font-size="9" fill="#3949AB">степень</text>
  <rect x="12" y="224" width="476" height="80" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="239" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Важно: знак степени</text>
  <rect x="22" y="246" width="220" height="22" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
  <text x="132" y="261" font-size="9" fill="#283593" text-anchor="middle">(-3)^2 = 9 (скобки есть)</text>
  <rect x="252" y="246" width="226" height="22" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
  <text x="365" y="261" font-size="9" fill="#C62828" text-anchor="middle">-3^2 = -9 (скобок нет)</text>
  <text x="250" y="292" font-size="8" fill="#555" text-anchor="middle">Чётная степень всегда положительна, нечётная сохраняет знак</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#3949AB" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Степень с натуральным показателем — Макарычев Ю.Н., 7 класс</text>
</svg>