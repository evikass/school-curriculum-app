<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="50%" stop-color="#D1C4E9"/>
      <stop offset="100%" stop-color="#7E57C2" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4527A0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4527A0" text-anchor="middle" font-family="Arial">Умножение одночлена на многочлен</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 14</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#673AB7" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#4527A0" text-anchor="middle" font-weight="bold">Одночлен × каждый член многочлена</text>
  <text x="250" y="98" font-size="8" fill="#555" text-anchor="middle">Основано на распределительном свойстве: a(b+c) = ab + ac</text>
  <rect x="12" y="116" width="230" height="110" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="127" y="131" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Умножение</text>
  <text x="127" y="150" font-size="9" fill="#673AB7" font-family="monospace">2x(3x^2 - 5x + 4)</text>
  <text x="127" y="165" font-size="8" fill="#555">= 2x × 3x^2</text>
  <text x="127" y="178" font-size="8" fill="#555">- 2x × 5x</text>
  <text x="127" y="191" font-size="8" fill="#555">+ 2x × 4</text>
  <line x1="87" y1="196" x2="167" y2="196" stroke="#673AB7" stroke-width="0.5"/>
  <text x="127" y="214" font-size="9" fill="#4527A0" font-weight="bold" font-family="monospace">= 6x^3-10x^2+8x</text>
  <rect x="252" y="116" width="236" height="110" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="370" y="131" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Вынесение множителя</text>
  <text x="370" y="150" font-size="9" fill="#673AB7" font-family="monospace">6x^3 - 10x^2 + 8x</text>
  <text x="370" y="168" font-size="8" fill="#555">= 2x(3x^2 - 5x + 4)</text>
  <text x="370" y="186" font-size="8" fill="#555">НОД коэффициентов = 2</text>
  <text x="370" y="200" font-size="8" fill="#555">Наименьшая степень x = 1</text>
  <text x="370" y="218" font-size="8" fill="#4527A0" font-weight="bold">Обратная операция!</text>
  <rect x="12" y="234" width="476" height="70" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="250" y="249" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Алгоритм вынесения общего множителя</text>
  <rect x="22" y="256" width="220" height="20" rx="3" fill="#EDE7F6" stroke="#673AB7" stroke-width="0.5"/>
  <text x="132" y="270" font-size="8" fill="#4527A0" text-anchor="middle">1. Найти НОД коэффициентов</text>
  <rect x="252" y="256" width="226" height="20" rx="3" fill="#EDE7F6" stroke="#673AB7" stroke-width="0.5"/>
  <text x="365" y="270" font-size="8" fill="#4527A0" text-anchor="middle">2. Выбрать наименьшую степень</text>
  <rect x="140" y="280" width="220" height="20" rx="3" fill="#673AB7" fill-opacity="0.12"/>
  <text x="250" y="294" font-size="8" fill="#4527A0" text-anchor="middle" font-weight="bold">3. Вынести за скобки</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#673AB7" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Умножение одночлена на многочлен — Макарычев Ю.Н., 7 класс</text>
</svg>