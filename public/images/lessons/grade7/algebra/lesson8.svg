<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E8F5E9"/>
<!-- Decreasing power towers approaching zero -->
<rect x="40" y="40" width="80" height="200" rx="6" fill="#A5D6A7" opacity="0.5"/>
<text x="80" y="70" font-family="monospace" font-size="24" fill="#1B5E20" text-anchor="middle" font-weight="bold">5³</text>
<text x="80" y="100" font-family="monospace" font-size="14" fill="#2E7D32" text-anchor="middle">= 125</text>
<rect x="80" y="120" width="40" height="120" rx="3" fill="#4CAF50" opacity="0.4"/>

<rect x="140" y="80" width="80" height="160" rx="6" fill="#A5D6A7" opacity="0.4"/>
<text x="180" y="110" font-family="monospace" font-size="24" fill="#1B5E20" text-anchor="middle" font-weight="bold">5²</text>
<text x="180" y="140" font-family="monospace" font-size="14" fill="#2E7D32" text-anchor="middle">= 25</text>
<rect x="180" y="160" width="40" height="80" rx="3" fill="#4CAF50" opacity="0.5"/>

<rect x="240" y="120" width="80" height="120" rx="6" fill="#A5D6A7" opacity="0.3"/>
<text x="280" y="150" font-family="monospace" font-size="24" fill="#1B5E20" text-anchor="middle" font-weight="bold">5¹</text>
<text x="280" y="180" font-family="monospace" font-size="14" fill="#2E7D32" text-anchor="middle">= 5</text>
<rect x="280" y="200" width="40" height="40" rx="3" fill="#4CAF50" opacity="0.6"/>

<rect x="340" y="160" width="80" height="80" rx="6" fill="#C8E6C9" opacity="0.5" stroke="#1B5E20" stroke-width="2" stroke-dasharray="5,3"/>
<text x="380" y="190" font-family="monospace" font-size="24" fill="#1B5E20" text-anchor="middle" font-weight="bold">5⁰</text>
<text x="380" y="218" font-family="monospace" font-size="14" fill="#2E7D32" text-anchor="middle">= 1</text>
<!-- Arrow showing pattern -->
<path d="M80 250 L80 270 L380 270 L380 250" stroke="#1B5E20" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
<!-- Why = 1 explanation -->
<rect x="60" y="280" width="380" height="45" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.5"/>
<text x="80" y="300" font-family="monospace" font-size="13" fill="#1B5E20">5³÷5 = 5²  →  5¹÷5 = 5⁰ = 1</text>
<text x="80" y="316" font-family="sans-serif" font-size="10" fill="#2E7D32">Любое число в степени 0 равно 1</text>
<!-- Star emphasis -->
<text x="440" y="200" font-family="sans-serif" font-size="40" fill="#4CAF50" opacity="0.3">★</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#1B5E20" opacity="0.5" text-anchor="middle">Степень с нулевым показателем</text>
</svg>