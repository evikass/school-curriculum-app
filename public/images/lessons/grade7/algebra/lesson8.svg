<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="50%" stop-color="#B2EBF2"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg8)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00838F" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#006064" text-anchor="middle" font-family="Arial">Линейная функция</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 8</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00897B" stroke-opacity="0.3"/>

  <rect x="12" y="58" width="476" height="45" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="77" font-size="14" fill="#006064" text-anchor="middle" font-weight="bold" font-family="monospace">y = kx + b</text>
  <text x="250" y="95" font-size="8" fill="#555" text-anchor="middle">k — угловой коэффициент (наклон), b — сдвиг по оси y</text>

  <rect x="12" y="110" width="230" height="195" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="127" y="125" font-size="9" font-weight="bold" fill="#00838F" text-anchor="middle">k &gt; 0 — возрастает</text>
  <line x1="30" y1="280" x2="70" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="30" y1="135" x2="30" y2="285" stroke="#555" stroke-width="1"/>
  <polygon points="30,135 27,145 33,145" fill="#555"/>
  <polygon points="70,280 60,277 60,283" fill="#555"/>
  <line x1="40" y1="260" x2="220" y2="160" stroke="#00838F" stroke-width="2.5"/>
  <circle cx="40" cy="260" r="3" fill="#00838F"/>
  <circle cx="220" cy="160" r="3" fill="#00838F"/>
  <text x="127" y="295" font-size="8" fill="#00838F" text-anchor="middle">y = 2x + 1</text>

  <rect x="252" y="110" width="236" height="195" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="370" y="125" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">k &lt; 0 — убывает</text>
  <line x1="270" y1="280" x2="310" y2="280" stroke="#555" stroke-width="1"/>
  <line x1="270" y1="135" x2="270" y2="285" stroke="#555" stroke-width="1"/>
  <polygon points="270,135 267,145 273,145" fill="#555"/>
  <polygon points="310,280 300,277 300,283" fill="#555"/>
  <line x1="270" y1="160" x2="460" y2="260" stroke="#C62828" stroke-width="2.5"/>
  <circle cx="270" cy="160" r="3" fill="#C62828"/>
  <circle cx="460" cy="260" r="3" fill="#C62828"/>
  <text x="370" y="295" font-size="8" fill="#C62828" text-anchor="middle">y = -2x + 5</text>

  <rect x="12" y="320" width="476" height="22" rx="4" fill="#00897B" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">График линейной функции — прямая линия, k&gt;0 возрастает, k&lt;0 убывает</text>
</svg>