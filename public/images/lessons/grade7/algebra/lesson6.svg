<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F7FA"/>
      <stop offset="50%" stop-color="#B2EBF2"/>
      <stop offset="100%" stop-color="#80DEEA"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg6)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00838F" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#006064" text-anchor="middle" font-family="Arial">Что такое функция</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 6</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00897B" stroke-opacity="0.3"/>

  <rect x="12" y="58" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="78" font-size="11" fill="#006064" text-anchor="middle" font-weight="bold" font-family="monospace">y = f(x)</text>
  <text x="250" y="98" font-size="8" fill="#555" text-anchor="middle">Каждому x соответствует единственное y</text>

  <rect x="12" y="116" width="150" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="87" y="131" font-size="9" font-weight="bold" fill="#00838F" text-anchor="middle">Аргумент (x)</text>
  <circle cx="60" cy="160" r="20" fill="#E0F7FA" stroke="#00897B" stroke-width="1.5"/>
  <text x="60" y="164" font-size="9" fill="#006064" text-anchor="middle" font-weight="bold">x</text>
  <circle cx="115" cy="160" r="20" fill="#E0F7FA" stroke="#00897B" stroke-width="1.5"/>
  <text x="115" y="164" font-size="9" fill="#006064" text-anchor="middle" font-weight="bold">x</text>
  <text x="87" y="200" font-size="8" fill="#555" text-anchor="middle">Независимая</text>
  <text x="87" y="212" font-size="8" fill="#555" text-anchor="middle">переменная</text>

  <rect x="172" y="116" width="155" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="249" y="131" font-size="9" font-weight="bold" fill="#00838F" text-anchor="middle">Правило f</text>
  <text x="249" y="155" font-size="8" fill="#555" text-anchor="middle">Формула:</text>
  <text x="249" y="170" font-size="9" fill="#006064" text-anchor="middle" font-family="monospace">y = 2x + 1</text>
  <text x="249" y="195" font-size="8" fill="#555" text-anchor="middle">Таблица:</text>
  <text x="249" y="210" font-size="8" fill="#006064" text-anchor="middle" font-family="monospace">x: 0 1 2 3</text>
  <text x="249" y="222" font-size="8" fill="#006064" text-anchor="middle" font-family="monospace">y: 1 3 5 7</text>

  <rect x="337" y="116" width="151" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="412" y="131" font-size="9" font-weight="bold" fill="#00838F" text-anchor="middle">Функция (y)</text>
  <circle cx="385" cy="160" r="20" fill="#E0F7FA" stroke="#00897B" stroke-width="1.5"/>
  <text x="385" y="164" font-size="9" fill="#006064" text-anchor="middle" font-weight="bold">y</text>
  <circle cx="440" cy="160" r="20" fill="#E0F7FA" stroke="#00897B" stroke-width="1.5"/>
  <text x="440" y="164" font-size="9" fill="#006064" text-anchor="middle" font-weight="bold">y</text>
  <text x="412" y="200" font-size="8" fill="#555" text-anchor="middle">Зависимая</text>
  <text x="412" y="212" font-size="8" fill="#555" text-anchor="middle">переменная</text>

  <rect x="12" y="244" width="476" height="60" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="259" font-size="9" font-weight="bold" fill="#00838F" text-anchor="middle">Способы задания функции</text>
  <text x="80" y="277" font-size="8" fill="#006064" text-anchor="middle">Формула</text>
  <text x="180" y="277" font-size="8" fill="#006064" text-anchor="middle">Таблица</text>
  <text x="280" y="277" font-size="8" fill="#006064" text-anchor="middle">График</text>
  <text x="400" y="277" font-size="8" fill="#006064" text-anchor="middle">Описание</text>
  <text x="80" y="292" font-size="7" fill="#555" text-anchor="middle">y = 3x - 1</text>
  <text x="180" y="292" font-size="7" fill="#555" text-anchor="middle">(x, y) пары</text>
  <text x="280" y="292" font-size="7" fill="#555" text-anchor="middle">Линия на плоскости</text>
  <text x="400" y="292" font-size="7" fill="#555" text-anchor="middle">Словесное правило</text>

  <rect x="12" y="320" width="476" height="22" rx="4" fill="#00897B" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Функция: каждому x — единственное y</text>
</svg>