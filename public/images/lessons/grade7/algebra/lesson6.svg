<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#F3E5F5"/>
<!-- Coordinate plane -->
<line x1="60" y1="280" x2="470" y2="280" stroke="#4A148C" stroke-width="2"/>
<line x1="60" y1="30" x2="60" y2="280" stroke="#4A148C" stroke-width="2"/>
<!-- Axis arrows -->
<polygon points="470,280 462,276 462,284" fill="#4A148C"/>
<polygon points="60,30 56,38 64,38" fill="#4A148C"/>
<text x="475" y="295" font-family="sans-serif" font-size="13" fill="#4A148C">x</text>
<text x="45" y="35" font-family="sans-serif" font-size="13" fill="#4A148C">y</text>
<!-- Grid lines -->
<line x1="130" y1="30" x2="130" y2="280" stroke="#E1BEE7" stroke-width="0.5"/>
<line x1="200" y1="30" x2="200" y2="280" stroke="#E1BEE7" stroke-width="0.5"/>
<line x1="270" y1="30" x2="270" y2="280" stroke="#E1BEE7" stroke-width="0.5"/>
<line x1="340" y1="30" x2="340" y2="280" stroke="#E1BEE7" stroke-width="0.5"/>
<line x1="410" y1="30" x2="410" y2="280" stroke="#E1BEE7" stroke-width="0.5"/>
<line x1="60" y1="230" x2="470" y2="230" stroke="#E1BEE7" stroke-width="0.5"/>
<line x1="60" y1="180" x2="470" y2="180" stroke="#E1BEE7" stroke-width="0.5"/>
<line x1="60" y1="130" x2="470" y2="130" stroke="#E1BEE7" stroke-width="0.5"/>
<line x1="60" y1="80" x2="470" y2="80" stroke="#E1BEE7" stroke-width="0.5"/>
<!-- Tick marks -->
<text x="130" y="296" font-family="sans-serif" font-size="10" fill="#4A148C" text-anchor="middle">1</text>
<text x="200" y="296" font-family="sans-serif" font-size="10" fill="#4A148C" text-anchor="middle">2</text>
<text x="270" y="296" font-family="sans-serif" font-size="10" fill="#4A148C" text-anchor="middle">3</text>
<text x="340" y="296" font-family="sans-serif" font-size="10" fill="#4A148C" text-anchor="middle">4</text>
<text x="48" y="234" font-family="sans-serif" font-size="10" fill="#4A148C" text-anchor="middle">1</text>
<text x="48" y="184" font-family="sans-serif" font-size="10" fill="#4A148C" text-anchor="middle">2</text>
<text x="48" y="134" font-family="sans-serif" font-size="10" fill="#4A148C" text-anchor="middle">3</text>
<text x="48" y="84" font-family="sans-serif" font-size="10" fill="#4A148C" text-anchor="middle">4</text>
<!-- Line y = 2x + 1 (passes through (0,1) and (2,5)) -->
<!-- At x=0: y=1 → pixel (60, 230); at x=3: y=7 → pixel (270, -60) clipped -->
<!-- At x=0: y=1 → (60,230); at x=2: y=5 → (200,30) -->
<line x1="60" y1="230" x2="200" y2="30" stroke="#7B1FA2" stroke-width="3"/>
<!-- Points on line -->
<circle cx="60" cy="230" r="5" fill="#7B1FA2"/>
<circle cx="130" cy="130" r="5" fill="#7B1FA2"/>
<circle cx="200" cy="30" r="5" fill="#7B1FA2"/>
<!-- Labels for points -->
<text x="72" y="248" font-family="monospace" font-size="10" fill="#4A148C">(0;1)</text>
<text x="135" y="128" font-family="monospace" font-size="10" fill="#4A148C">(1;3)</text>
<text x="205" y="42" font-family="monospace" font-size="10" fill="#4A148C">(2;5)</text>
<!-- Equation label -->
<rect x="280" y="50" width="170" height="50" rx="8" fill="white" opacity="0.85" stroke="#7B1FA2" stroke-width="1.5"/>
<text x="365" y="72" font-family="monospace" font-size="18" fill="#7B1FA2" text-anchor="middle" font-weight="bold">y = 2x + 1</text>
<text x="365" y="90" font-family="sans-serif" font-size="11" fill="#9C27B0" text-anchor="middle">k = 2,  b = 1</text>
<!-- Slope triangle -->
<line x1="60" y1="230" x2="130" y2="230" stroke="#CE93D8" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="130" y1="230" x2="130" y2="130" stroke="#CE93D8" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="95" y="245" font-family="sans-serif" font-size="10" fill="#CE93D8">+1</text>
<text x="140" y="185" font-family="sans-serif" font-size="10" fill="#CE93D8">+2</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#4A148C" opacity="0.5" text-anchor="middle">Линейная функция</text>
</svg>