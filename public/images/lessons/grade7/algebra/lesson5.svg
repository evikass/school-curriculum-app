<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E0F7FA"/>
<!-- Input-output machine -->
<rect x="170" y="80" width="160" height="120" rx="15" fill="#00695C" opacity="0.9"/>
<rect x="178" y="88" width="144" height="104" rx="10" fill="#00897B"/>
<text x="250" y="135" font-family="sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">f(x)</text>
<text x="250" y="155" font-family="monospace" font-size="12" fill="#B2DFDB" text-anchor="middle">2x + 1</text>
<!-- Gears on machine -->
<circle cx="200" cy="108" r="10" fill="none" stroke="#B2DFDB" stroke-width="1.5"/>
<circle cx="300" cy="108" r="8" fill="none" stroke="#B2DFDB" stroke-width="1.5"/>
<!-- Input arrow -->
<line x1="50" y1="140" x2="165" y2="140" stroke="#004D40" stroke-width="3"/>
<polygon points="165,140 155,134 155,146" fill="#004D40"/>
<rect x="30" y="125" width="50" height="30" rx="5" fill="#004D40"/>
<text x="55" y="145" font-family="monospace" font-size="14" fill="#B2DFDB" text-anchor="middle">x</text>
<text x="55" y="115" font-family="sans-serif" font-size="10" fill="#004D40" text-anchor="middle">вход</text>
<!-- Output arrow -->
<line x1="335" y1="140" x2="430" y2="140" stroke="#004D40" stroke-width="3"/>
<polygon points="430,140 420,134 420,146" fill="#004D40"/>
<rect x="432" y="125" width="55" height="30" rx="5" fill="#004D40"/>
<text x="459" y="145" font-family="monospace" font-size="14" fill="#B2DFDB" text-anchor="middle">f(x)</text>
<text x="459" y="115" font-family="sans-serif" font-size="10" fill="#004D40" text-anchor="middle">выход</text>
<!-- Mapping examples -->
<text x="250" y="35" font-family="sans-serif" font-size="16" fill="#004D40" text-anchor="middle" font-weight="bold">Функция — правило преобразования</text>
<!-- Example mappings -->
<rect x="30" y="225" width="440" height="95" rx="8" fill="#B2DFDB" opacity="0.5"/>
<text x="60" y="250" font-family="monospace" font-size="13" fill="#004D40">x = 1  →  f(1) = 3</text>
<text x="60" y="272" font-family="monospace" font-size="13" fill="#004D40">x = 2  →  f(2) = 5</text>
<text x="60" y="294" font-family="monospace" font-size="13" fill="#004D40">x = 3  →  f(3) = 7</text>
<text x="260" y="250" font-family="monospace" font-size="13" fill="#004D40">x = 0  →  f(0) = 1</text>
<text x="260" y="272" font-family="monospace" font-size="13" fill="#004D40">x = −1 → f(−1) = −1</text>
<!-- Vertical line test reminder -->
<text x="400" y="294" font-family="sans-serif" font-size="10" fill="#004D40" opacity="0.6">один x →</text>
<text x="400" y="308" font-family="sans-serif" font-size="10" fill="#004D40" opacity="0.6">один y</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#004D40" opacity="0.5" text-anchor="middle">Что такое функция</text>
</svg>