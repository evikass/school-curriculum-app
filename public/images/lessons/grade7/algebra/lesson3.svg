<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E8EAF6"/>
<!-- Balance scale -->
<polygon points="250,60 240,80 260,80" fill="#283593"/>
<line x1="250" y1="80" x2="250" y2="120" stroke="#283593" stroke-width="3"/>
<line x1="120" y1="120" x2="380" y2="120" stroke="#283593" stroke-width="3"/>
<!-- Left pan -->
<line x1="120" y1="120" x2="100" y2="180" stroke="#283593" stroke-width="2"/>
<line x1="120" y1="120" x2="140" y2="180" stroke="#283593" stroke-width="2"/>
<path d="M80 180 Q120 200 160 180" stroke="#283593" stroke-width="2" fill="#C5CAE9"/>
<text x="120" y="195" font-family="monospace" font-size="18" fill="#1A237E" text-anchor="middle">2x + 3</text>
<!-- Right pan -->
<line x1="380" y1="120" x2="360" y2="180" stroke="#283593" stroke-width="2"/>
<line x1="380" y1="120" x2="400" y2="180" stroke="#283593" stroke-width="2"/>
<path d="M340 180 Q380 200 420 180" stroke="#283593" stroke-width="2" fill="#C5CAE9"/>
<text x="380" y="195" font-family="monospace" font-size="18" fill="#1A237E" text-anchor="middle">11</text>
<!-- Scale base -->
<rect x="230" y="55" width="40" height="10" rx="3" fill="#283593"/>
<!-- Solving steps -->
<rect x="40" y="220" width="420" height="35" rx="6" fill="#C5CAE9"/>
<text x="60" y="243" font-family="monospace" font-size="15" fill="#1A237E">2x + 3 = 11  →  2x = 8  →  x = 4</text>
<!-- Step indicators -->
<circle cx="120" cy="278" r="14" fill="#3949AB"/>
<text x="120" y="283" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">−3</text>
<path d="M140 278 L185 278" stroke="#3949AB" stroke-width="2"/>
<circle cx="205" cy="278" r="14" fill="#3949AB"/>
<text x="205" y="283" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">÷2</text>
<path d="M225 278 L270 278" stroke="#1B5E20" stroke-width="2"/>
<circle cx="290" cy="278" r="14" fill="#2E7D32"/>
<text x="290" y="283" font-family="sans-serif" font-size="11" fill="white" text-anchor="middle">✓</text>
<text x="310" y="283" font-family="monospace" font-size="15" fill="#2E7D32">x = 4</text>
<!-- Check mark -->
<text x="400" y="290" font-family="sans-serif" font-size="40" fill="#2E7D32" opacity="0.3">✓</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#283593" opacity="0.5" text-anchor="middle">Линейные уравнения</text>
</svg>