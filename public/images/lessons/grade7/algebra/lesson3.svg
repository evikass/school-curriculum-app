<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="50%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg3)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Тождества</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 3</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1976D2" stroke-opacity="0.3"/>

  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1976D2" stroke-width="1"/>
  <text x="250" y="73" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Определение</text>
  <text x="250" y="90" font-size="9" fill="#0D47A1" text-anchor="middle">Тождество — равенство, верное при любых допустимых значениях переменных</text>
  <text x="250" y="105" font-size="8" fill="#C62828" text-anchor="middle">x + 2 = 5 — НЕ тождество (верно только при x = 3)</text>

  <rect x="12" y="120" width="155" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#1976D2" stroke-width="1"/>
  <text x="89" y="135" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Переместительное</text>
  <text x="89" y="155" font-size="10" fill="#0D47A1" text-anchor="middle" font-family="monospace">a + b = b + a</text>
  <text x="89" y="175" font-size="10" fill="#0D47A1" text-anchor="middle" font-family="monospace">a &times; b = b &times; a</text>

  <rect x="175" y="120" width="155" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#1976D2" stroke-width="1"/>
  <text x="252" y="135" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Сочетательное</text>
  <text x="252" y="155" font-size="9" fill="#0D47A1" text-anchor="middle" font-family="monospace">(a+b)+c = a+(b+c)</text>
  <text x="252" y="175" font-size="9" fill="#0D47A1" text-anchor="middle" font-family="monospace">(ab)c = a(bc)</text>

  <rect x="338" y="120" width="150" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#1976D2" stroke-width="1"/>
  <text x="413" y="135" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Распределительное</text>
  <text x="413" y="158" font-size="10" fill="#0D47A1" text-anchor="middle" font-family="monospace">a(b+c) = ab+ac</text>
  <text x="413" y="180" font-size="8" fill="#555" text-anchor="middle">Самое важное!</text>

  <rect x="12" y="218" width="476" height="86" rx="6" fill="white" fill-opacity="0.9" stroke="#1976D2" stroke-width="1"/>
  <text x="250" y="233" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Тождественные преобразования</text>
  <rect x="22" y="240" width="220" height="25" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
  <text x="132" y="257" font-size="9" fill="#0D47A1" text-anchor="middle">Раскрытие скобок: 2(a+3) = 2a+6</text>
  <rect x="252" y="240" width="226" height="25" rx="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.5"/>
  <text x="365" y="257" font-size="9" fill="#0D47A1" text-anchor="middle">Подобные: 3x + 5x = 8x</text>
  <text x="250" y="288" font-size="8" fill="#555" text-anchor="middle">Замена одного выражения другим, тождественно равным ему</text>

  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1976D2" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Тождество верно при любых допустимых значениях переменных</text>
</svg>