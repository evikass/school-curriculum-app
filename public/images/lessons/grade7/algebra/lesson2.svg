<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFF8E1"/>
<!-- Variable box concept -->
<rect x="60" y="40" width="100" height="60" rx="8" fill="#FF8F00" opacity="0.15" stroke="#FF8F00" stroke-width="2"/>
<text x="110" y="78" font-family="monospace" font-size="32" fill="#E65100" text-anchor="middle">x</text>
<text x="110" y="115" font-family="sans-serif" font-size="10" fill="#E65100" text-anchor="middle">переменная</text>
<!-- Substitution arrow -->
<path d="M110 120 L110 145" stroke="#FF8F00" stroke-width="2" marker-end="url(#arrow1)"/>
<defs><marker id="arrow1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#FF8F00"/></marker></defs>
<rect x="60" y="150" width="100" height="40" rx="6" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5"/>
<text x="110" y="176" font-family="monospace" font-size="18" fill="#E65100" text-anchor="middle">x = 5</text>
<!-- Expression with variable -->
<text x="200" y="75" font-family="monospace" font-size="26" fill="#4E342E">2x + 3</text>
<!-- Equals and substitution -->
<path d="M300 60 L340 60" stroke="#E65100" stroke-width="2" marker-end="url(#arrow1)"/>
<text x="360" y="75" font-family="monospace" font-size="26" fill="#1B5E20">2·5 + 3</text>
<path d="M450 60 L470 60 L470 90 L360 90" stroke="#1B5E20" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
<text x="360" y="110" font-family="monospace" font-size="26" fill="#1B5E20">= 13</text>
<!-- More examples -->
<rect x="40" y="195" width="200" height="50" rx="8" fill="#FFF3E0"/>
<text x="55" y="225" font-family="monospace" font-size="18" fill="#4E342E">3y − 7 при y=4</text>
<rect x="270" y="195" width="200" height="50" rx="8" fill="#E8F5E9"/>
<text x="285" y="225" font-family="monospace" font-size="18" fill="#1B5E20">= 3·4 − 7 = 5</text>
<!-- Connecting arrow -->
<path d="M240 220 L270 220" stroke="#4E342E" stroke-width="2" marker-end="url(#arrow1)"/>
<!-- Variable y box -->
<rect x="40" y="270" width="80" height="50" rx="8" fill="#FF8F00" opacity="0.12" stroke="#FF8F00" stroke-width="1.5"/>
<text x="80" y="302" font-family="monospace" font-size="28" fill="#E65100" text-anchor="middle">y</text>
<rect x="140" y="270" width="80" height="50" rx="8" fill="#FF8F00" opacity="0.12" stroke="#FF8F00" stroke-width="1.5"/>
<text x="180" y="302" font-family="monospace" font-size="28" fill="#E65100" text-anchor="middle">a</text>
<rect x="240" y="270" width="80" height="50" rx="8" fill="#FF8F00" opacity="0.12" stroke="#FF8F00" stroke-width="1.5"/>
<text x="280" y="302" font-family="monospace" font-size="28" fill="#E65100" text-anchor="middle">b</text>
<rect x="340" y="270" width="120" height="50" rx="8" fill="#FF8F00" opacity="0.12" stroke="#FF8F00" stroke-width="1.5"/>
<text x="400" y="302" font-family="monospace" font-size="28" fill="#E65100" text-anchor="middle">x, y, z</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#E65100" opacity="0.5" text-anchor="middle">Выражения с переменными</text>
</svg>