<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="50%" stop-color="#D1C4E9"/>
      <stop offset="100%" stop-color="#7E57C2" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4527A0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4527A0" text-anchor="middle" font-family="Arial">Многочлен</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 12</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#673AB7" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="45" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#4527A0" text-anchor="middle" font-weight="bold">Многочлен — алгебраическая сумма одночленов</text>
  <text x="250" y="95" font-size="9" fill="#555" text-anchor="middle">3x^2 + 5x - 7, a^2b - 2ab + 3</text>
  <rect x="12" y="111" width="155" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="87" y="126" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Подобные члены</text>
  <text x="87" y="146" font-size="9" fill="#673AB7" font-family="monospace">3x^2 и -5x^2</text>
  <text x="87" y="162" font-size="8" fill="#2E7D32">Да — одинаковая</text>
  <text x="87" y="174" font-size="8" fill="#2E7D32">буквенная часть</text>
  <text x="87" y="196" font-size="9" fill="#C62828" font-family="monospace">3x^2 и 3x^3</text>
  <text x="87" y="208" font-size="8" fill="#C62828">Нет — разная степень</text>
  <rect x="175" y="111" width="155" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="252" y="126" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Приведение подобных</text>
  <text x="252" y="150" font-size="9" fill="#673AB7" font-family="monospace">3x + 5x = 8x</text>
  <text x="252" y="168" font-size="9" fill="#673AB7" font-family="monospace">2a^2 - 7a^2 = -5a^2</text>
  <text x="252" y="190" font-size="8" fill="#555" text-anchor="middle">Складываем</text>
  <text x="252" y="202" font-size="8" fill="#555" text-anchor="middle">коэффициенты</text>
  <rect x="338" y="111" width="150" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="413" y="126" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Степень</text>
  <text x="413" y="150" font-size="9" fill="#673AB7" font-family="monospace">3x^4+2x^2-x</text>
  <text x="413" y="168" font-size="8" fill="#555" text-anchor="middle">Степень = 4</text>
  <text x="413" y="190" font-size="8" fill="#555" text-anchor="middle">Наибольшая степень</text>
  <text x="413" y="202" font-size="8" fill="#555" text-anchor="middle">члена многочлена</text>
  <rect x="12" y="220" width="155" height="84" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="87" y="235" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Одночлен</text>
  <text x="87" y="255" font-size="8" fill="#555" text-anchor="middle">1 член</text>
  <text x="87" y="272" font-size="9" fill="#673AB7" font-family="monospace">5x^2</text>
  <rect x="175" y="220" width="155" height="84" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="252" y="235" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Двучлен</text>
  <text x="252" y="255" font-size="8" fill="#555" text-anchor="middle">2 члена</text>
  <text x="252" y="272" font-size="9" fill="#673AB7" font-family="monospace">a + b</text>
  <rect x="338" y="220" width="150" height="84" rx="6" fill="white" fill-opacity="0.9" stroke="#673AB7" stroke-width="1"/>
  <text x="413" y="235" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Трёхчлен</text>
  <text x="413" y="255" font-size="8" fill="#555" text-anchor="middle">3 члена</text>
  <text x="413" y="272" font-size="9" fill="#673AB7" font-family="monospace">a^2+2ab+b^2</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#673AB7" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Многочлен — Макарычев Ю.Н., 7 класс</text>
</svg>