<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="50%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <marker id="arrowR16" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg16)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle" font-family="Arial">Свойства параллельных прямых</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 16</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#43A047" stroke-opacity="0.3"/>

  <!-- Panel 1: Converse theorem 1 - Corresponding angles -->
  <rect x="12" y="58" width="235" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="129" y="73" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Обратная теорема: соответственные</text>
  <!-- Line a -->
  <line x1="22" y1="108" x2="237" y2="108" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowR16)"/>
  <text x="240" y="111" font-size="7" fill="#2E7D32" font-style="italic">a</text>
  <!-- Line b -->
  <line x1="22" y1="152" x2="237" y2="152" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowR16)"/>
  <text x="240" y="155" font-size="7" fill="#2E7D32" font-style="italic">b</text>
  <!-- Transversal -->
  <line x1="55" y1="82" x2="195" y2="172" stroke="#E53935" stroke-width="1.3"/>
  <text x="48" y="80" font-size="7" fill="#E53935" font-style="italic">c</text>
  <!-- Corresponding angles highlighted -->
  <path d="M98,102 A10,10 0 0,1 108,106" fill="none" stroke="#E53935" stroke-width="2"/>
  <path d="M118,146 A10,10 0 0,1 128,150" fill="none" stroke="#E53935" stroke-width="2"/>
  <!-- Equal marks -->
  <text x="104" y="98" font-size="7" fill="#E53935">1</text>
  <text x="124" y="143" font-size="7" fill="#E53935">2</text>
  <!-- Result -->
  <rect x="30" y="162" width="200" height="12" rx="3" fill="#E8F5E9" stroke="#43A047" stroke-width="0.5"/>
  <text x="129" y="172" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Если a ∥ b, то ∠1 = ∠2</text>

  <!-- Panel 2: Alternate interior -->
  <rect x="255" y="58" width="233" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="371" y="73" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Накрест лежащие углы</text>
  <!-- Line a -->
  <line x1="265" y1="108" x2="478" y2="108" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowR16)"/>
  <text x="481" y="111" font-size="7" fill="#2E7D32" font-style="italic">a</text>
  <!-- Line b -->
  <line x1="265" y1="152" x2="478" y2="152" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowR16)"/>
  <text x="481" y="155" font-size="7" fill="#2E7D32" font-style="italic">b</text>
  <!-- Transversal -->
  <line x1="290" y1="82" x2="430" y2="172" stroke="#1565C0" stroke-width="1.3"/>
  <text x="283" y="80" font-size="7" fill="#1565C0" font-style="italic">c</text>
  <!-- Alternate interior angles -->
  <path d="M340,112 A10,10 0 0,0 334,122" fill="none" stroke="#1565C0" stroke-width="2"/>
  <path d="M368,140 A10,10 0 0,1 374,150" fill="none" stroke="#1565C0" stroke-width="2"/>
  <text x="330" y="126" font-size="7" fill="#1565C0">3</text>
  <text x="378" y="140" font-size="7" fill="#1565C0">5</text>
  <rect x="275" y="162" width="195" height="12" rx="3" fill="#E8F5E9" stroke="#43A047" stroke-width="0.5"/>
  <text x="371" y="172" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Если a ∥ b, то ∠3 = ∠5</text>

  <!-- Panel 3: Co-interior supplementary -->
  <rect x="12" y="184" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="89" y="199" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Односторонние = 180°</text>
  <!-- Lines -->
  <line x1="22" y1="225" x2="148" y2="225" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="22" y1="265" x2="148" y2="265" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="152" y="228" font-size="6" fill="#2E7D32" font-style="italic">a</text>
  <text x="152" y="268" font-size="6" fill="#2E7D32" font-style="italic">b</text>
  <!-- Transversal -->
  <line x1="40" y1="210" x2="130" y2="280" stroke="#FF9800" stroke-width="1.2"/>
  <!-- Angles -->
  <path d="M65,228 A8,8 0 0,0 60,236" fill="none" stroke="#FF9800" stroke-width="1.5"/>
  <path d="M90,258 A8,8 0 0,1 95,266" fill="none" stroke="#FF9800" stroke-width="1.5"/>
  <text x="56" y="238" font-size="6" fill="#FF9800">3</text>
  <text x="98" y="264" font-size="6" fill="#FF9800">5</text>
  <text x="89" y="296" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">∠3 + ∠5 = 180°</text>

  <!-- Panel 4: Angle calculation example -->
  <rect x="175" y="184" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="252" y="199" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Пример вычисления</text>
  <rect x="185" y="207" width="135" height="88" rx="3" fill="#E8F5E9" stroke="#43A047" stroke-width="0.5"/>
  <text x="252" y="220" font-size="7" fill="#1B5E20" text-anchor="middle">Дано: a ∥ b, ∠1 = 65°</text>
  <text x="252" y="234" font-size="7" fill="#555" text-anchor="middle">Найти: ∠2, ∠3, ∠4</text>
  <line x1="195" y1="240" x2="310" y2="240" stroke="#43A047" stroke-width="0.5"/>
  <text x="252" y="252" font-size="7" fill="#2E7D32" text-anchor="middle">∠2 = 180° − 65° = 115°</text>
  <text x="252" y="264" font-size="7" fill="#2E7D32" text-anchor="middle">∠3 = ∠1 = 65° (накрест)</text>
  <text x="252" y="276" font-size="7" fill="#2E7D32" text-anchor="middle">∠4 = ∠2 = 115° (накрест)</text>
  <text x="252" y="290" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Сумма: 65+115+65+115=360°</text>

  <!-- Panel 5: Practical application -->
  <rect x="338" y="184" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="413" y="199" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Свойства ∥ (итог)</text>
  <rect x="348" y="207" width="130" height="18" rx="3" fill="#E8F5E9" stroke="#43A047" stroke-width="0.4"/>
  <text x="413" y="220" font-size="7" fill="#1B5E20" text-anchor="middle">Соответств. равны</text>
  <rect x="348" y="229" width="130" height="18" rx="3" fill="#E8F5E9" stroke="#43A047" stroke-width="0.4"/>
  <text x="413" y="242" font-size="7" fill="#1B5E20" text-anchor="middle">Накрест леж. равны</text>
  <rect x="348" y="251" width="130" height="18" rx="3" fill="#E8F5E9" stroke="#43A047" stroke-width="0.4"/>
  <text x="413" y="264" font-size="7" fill="#1B5E20" text-anchor="middle">Одностор. = 180°</text>
  <rect x="348" y="273" width="130" height="22" rx="3" fill="#2E7D32" fill-opacity="0.12"/>
  <text x="413" y="285" font-size="7" fill="#1B5E20" text-anchor="middle">Это обратные теоремы</text>
  <text x="413" y="294" font-size="6.5" fill="#1B5E20" text-anchor="middle">к признакам ∥</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#43A047" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Свойства ∥: соответственные = | накрест лежащие = | односторонние = 180°</text>
</svg>