<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFFDE7"/>
<!-- Triangle -->
<polygon points="250,50 80,280 420,280" fill="none" stroke="#F57F17" stroke-width="3"/>
<!-- Vertices -->
<circle cx="250" cy="50" r="5" fill="#E65100"/>
<circle cx="80" cy="280" r="5" fill="#E65100"/>
<circle cx="420" cy="280" r="5" fill="#E65100"/>
<!-- Vertex labels -->
<text x="250" y="40" font-family="sans-serif" font-size="16" fill="#E65100" text-anchor="middle" font-weight="bold">A</text>
<text x="65" y="295" font-family="sans-serif" font-size="16" fill="#E65100" font-weight="bold">B</text>
<text x="435" y="295" font-family="sans-serif" font-size="16" fill="#E65100" font-weight="bold">C</text>
<!-- Side labels -->
<text x="155" y="175" font-family="sans-serif" font-size="13" fill="#F57F17" transform="rotate(-55,155,175)">c</text>
<text x="345" y="175" font-family="sans-serif" font-size="13" fill="#F57F17" transform="rotate(55,345,175)">b</text>
<text x="250" y="305" font-family="sans-serif" font-size="13" fill="#F57F17" text-anchor="middle">a</text>
<!-- Angle marks -->
<path d="M95 280 A20 20 0 0 1 98 262" stroke="#1565C0" stroke-width="1.5" fill="none"/>
<text x="115" y="268" font-family="sans-serif" font-size="11" fill="#1565C0">α</text>
<path d="M405 280 A20 20 0 0 0 402 262" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
<text x="375" y="268" font-family="sans-serif" font-size="11" fill="#2E7D32">β</text>
<path d="M240 65 A15 15 0 0 0 260 65" stroke="#C62828" stroke-width="1.5" fill="none" transform="rotate(0,250,50)"/>
<text x="270" y="78" font-family="sans-serif" font-size="11" fill="#C62828">γ</text>
<!-- Info box -->
<rect x="350" y="50" width="140" height="90" rx="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
<text x="360" y="72" font-family="sans-serif" font-size="11" fill="#E65100">∠A + ∠B + ∠C</text>
<text x="360" y="90" font-family="sans-serif" font-size="11" fill="#E65100">= 180°</text>
<text x="360" y="115" font-family="sans-serif" font-size="10" fill="#F57F17">3 стороны</text>
<text x="360" y="130" font-family="sans-serif" font-size="10" fill="#F57F17">3 угла</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#E65100" opacity="0.5" text-anchor="middle">Треугольник</text>
</svg>