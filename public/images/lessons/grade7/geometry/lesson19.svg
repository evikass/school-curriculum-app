<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg19" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="50%" stop-color="#E1BEE7"/>
      <stop offset="100%" stop-color="#CE93D8"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg19)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle" font-family="Arial">Неравенство треугольника</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 19</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#9C27B0" stroke-opacity="0.3"/>

  <!-- Panel 1: Triangle inequality theorem -->
  <rect x="12" y="58" width="235" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="129" y="73" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Теорема: AB &lt; AC + CB</text>
  <!-- Triangle -->
  <polygon points="129,82 35,165 235,155" fill="#F3E5F5" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="2"/>
  <circle cx="129" cy="82" r="3" fill="#7B1FA2"/>
  <circle cx="35" cy="165" r="3" fill="#7B1FA2"/>
  <circle cx="235" cy="155" r="3" fill="#7B1FA2"/>
  <text x="129" y="78" font-size="8" fill="#7B1FA2" font-style="italic">A</text>
  <text x="22" y="168" font-size="8" fill="#7B1FA2" font-style="italic">B</text>
  <text x="240" y="158" font-size="8" fill="#7B1FA2" font-style="italic">C</text>
  <!-- Side labels with colors -->
  <line x1="35" y1="168" x2="235" y2="158" stroke="#E53935" stroke-width="2.5"/>
  <line x1="129" y1="85" x2="35" y2="165" stroke="#43A047" stroke-width="2"/>
  <line x1="129" y1="85" x2="235" y2="155" stroke="#1565C0" stroke-width="2"/>
  <text x="135" y="140" font-size="7" fill="#E53935" font-weight="bold">BC</text>
  <text x="70" y="118" font-size="7" fill="#43A047" font-weight="bold">AB</text>
  <text x="192" y="112" font-size="7" fill="#1565C0" font-weight="bold">AC</text>
  <!-- Inequality -->
  <rect x="25" y="162" width="210" height="14" rx="3" fill="#7B1FA2" fill-opacity="0.12"/>
  <text x="129" y="174" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">AB &lt; AC + CB</text>

  <!-- Panel 2: Three inequalities -->
  <rect x="255" y="58" width="233" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="371" y="73" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Три неравенства</text>
  <rect x="265" y="80" width="213" height="20" rx="3" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.5"/>
  <text x="371" y="95" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">AB &lt; AC + BC</text>
  <rect x="265" y="104" width="213" height="20" rx="3" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.5"/>
  <text x="371" y="119" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">BC &lt; AB + AC</text>
  <rect x="265" y="128" width="213" height="20" rx="3" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.5"/>
  <text x="371" y="143" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">AC &lt; AB + BC</text>
  <!-- Mini triangle for reference -->
  <polygon points="320,155 290,170 350,170" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <text x="320" y="152" font-size="5" fill="#7B1FA2">A</text>
  <text x="285" y="175" font-size="5" fill="#7B1FA2">B</text>
  <text x="355" y="175" font-size="5" fill="#7B1FA2">C</text>
  <text x="371" y="170" font-size="6.5" fill="#555" text-anchor="middle">Каждая сторона меньше</text>
  <text x="371" y="180" font-size="6.5" fill="#555" text-anchor="middle">суммы двух других</text>

  <!-- Panel 3: Impossible triangle -->
  <rect x="12" y="184" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="89" y="199" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Невозможный △</text>
  <!-- Two short segments can't reach -->
  <line x1="25" y1="230" x2="65" y2="230" stroke="#43A047" stroke-width="2.5"/>
  <line x1="65" y1="230" x2="105" y2="230" stroke="#1565C0" stroke-width="2.5"/>
  <text x="45" y="225" font-size="6" fill="#43A047">3 см</text>
  <text x="85" y="225" font-size="6" fill="#1565C0">4 см</text>
  <!-- Gap to third point -->
  <circle cx="145" cy="230" r="3" fill="#E53935"/>
  <text x="145" y="225" font-size="6" fill="#E53935">A</text>
  <line x1="105" y1="230" x2="145" y2="230" stroke="#E53935" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="125" y="225" font-size="6" fill="#C62828">8 см</text>
  <!-- X mark -->
  <line x1="120" y1="238" x2="130" y2="248" stroke="#C62828" stroke-width="2"/>
  <line x1="130" y1="238" x2="120" y2="248" stroke="#C62828" stroke-width="2"/>
  <text x="89" y="270" font-size="7" fill="#C62828" text-anchor="middle">3 + 4 = 7 &lt; 8</text>
  <text x="89" y="282" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Треугольник невозможен!</text>
  <text x="89" y="298" font-size="6.5" fill="#555" text-anchor="middle">Сумма двух сторон</text>
  <text x="89" y="308" font-size="6.5" fill="#555" text-anchor="middle">меньше третьей</text>

  <!-- Panel 4: Possible triangle -->
  <rect x="175" y="184" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="252" y="199" font-size="9" font-weight="bold" fill="#43A047" text-anchor="middle">Возможный △</text>
  <!-- Triangle with sides 3,4,5 -->
  <polygon points="220,220 185,290 315,280" fill="#E8F5E9" fill-opacity="0.4" stroke="#43A047" stroke-width="1.8"/>
  <circle cx="220" cy="220" r="2.5" fill="#43A047"/>
  <circle cx="185" cy="290" r="2.5" fill="#43A047"/>
  <circle cx="315" cy="280" r="2.5" fill="#43A047"/>
  <text x="220" y="216" font-size="7" fill="#43A047" font-style="italic">A</text>
  <text x="175" y="293" font-size="7" fill="#43A047" font-style="italic">B</text>
  <text x="320" y="283" font-size="7" fill="#43A047" font-style="italic">C</text>
  <text x="197" y="258" font-size="6.5" fill="#43A047">3</text>
  <text x="272" y="244" font-size="6.5" fill="#43A047">5</text>
  <text x="250" y="292" font-size="6.5" fill="#43A047">4</text>
  <text x="252" y="300" font-size="6.5" fill="#43A047" text-anchor="middle">3+4=7&gt;5 ✓</text>
  <text x="252" y="310" font-size="6.5" fill="#43A047" text-anchor="middle">3+5=8&gt;4 ✓ 4+5=9&gt;3 ✓</text>

  <!-- Panel 5: Degenerate case + proof concept -->
  <rect x="338" y="184" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#9C27B0" stroke-width="1"/>
  <text x="413" y="199" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Вырожденный △</text>
  <!-- Degenerate: three points on one line -->
  <line x1="350" y1="230" x2="470" y2="230" stroke="#7B1FA2" stroke-width="2"/>
  <circle cx="365" cy="230" r="3" fill="#7B1FA2"/>
  <circle cx="410" cy="230" r="3" fill="#7B1FA2"/>
  <circle cx="460" cy="230" r="3" fill="#7B1FA2"/>
  <text x="365" y="222" font-size="7" fill="#7B1FA2" font-style="italic">A</text>
  <text x="410" y="222" font-size="7" fill="#7B1FA2" font-style="italic">B</text>
  <text x="460" y="222" font-size="7" fill="#7B1FA2" font-style="italic">C</text>
  <text x="387" y="242" font-size="6" fill="#7B1FA2">3</text>
  <text x="435" y="242" font-size="6" fill="#7B1FA2">5</text>
  <text x="413" y="254" font-size="7" fill="#7B1FA2" text-anchor="middle">3 + 5 = 8 = AC</text>
  <text x="413" y="266" font-size="7" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Равенство! (граница)</text>
  <!-- Key fact -->
  <rect x="348" y="274" width="130" height="22" rx="3" fill="#7B1FA2" fill-opacity="0.1"/>
  <text x="413" y="286" font-size="6.5" fill="#4A148C" text-anchor="middle">△ существует, если</text>
  <text x="413" y="295" font-size="6.5" fill="#4A148C" text-anchor="middle">каждая сторона &lt; суммы</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#9C27B0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Каждая сторона треугольника меньше суммы двух других: AB &lt; AC + CB</text>
</svg>