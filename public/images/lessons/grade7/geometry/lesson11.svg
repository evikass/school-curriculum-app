<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="50%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#80CBC4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg11)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="Arial">Второй и третий признаки равенства</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 11</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#009688" stroke-opacity="0.3"/>

  <!-- Panel 1: ASA (УСУ) -->
  <rect x="12" y="58" width="235" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#009688" stroke-width="1"/>
  <text x="129" y="73" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">II признак: УСУ</text>
  <!-- Triangle 1 -->
  <polygon points="60,90 25,165 105,155" fill="#E0F2F1" fill-opacity="0.4" stroke="#00695C" stroke-width="1.5"/>
  <circle cx="60" cy="90" r="2.5" fill="#00695C"/>
  <circle cx="25" cy="165" r="2.5" fill="#00695C"/>
  <circle cx="105" cy="155" r="2.5" fill="#00695C"/>
  <text x="60" y="86" font-size="7" fill="#00695C" font-style="italic">A</text>
  <text x="14" y="168" font-size="7" fill="#00695C" font-style="italic">B</text>
  <text x="110" y="158" font-size="7" fill="#00695C" font-style="italic">C</text>
  <!-- Mark side BC -->
  <line x1="58" y1="160" x2="72" y2="160" stroke="#E53935" stroke-width="1.5"/>
  <line x1="58" y1="163" x2="72" y2="163" stroke="#E53935" stroke-width="1.5"/>
  <!-- Mark angle B -->
  <path d="M34,158 A10,10 0 0,1 40,148" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Mark angle C -->
  <path d="M97,152 A10,10 0 0,0 100,142" fill="none" stroke="#FF9800" stroke-width="1.5"/>
  <!-- Triangle 2 -->
  <polygon points="170,90 140,165 220,155" fill="#E0F2F1" fill-opacity="0.4" stroke="#00695C" stroke-width="1.5"/>
  <circle cx="170" cy="90" r="2.5" fill="#00695C"/>
  <circle cx="140" cy="165" r="2.5" fill="#00695C"/>
  <circle cx="220" cy="155" r="2.5" fill="#00695C"/>
  <text x="170" y="86" font-size="7" fill="#00695C" font-style="italic">A1</text>
  <text x="129" y="168" font-size="7" fill="#00695C" font-style="italic">B1</text>
  <text x="225" y="158" font-size="7" fill="#00695C" font-style="italic">C1</text>
  <!-- Mark side B1C1 -->
  <line x1="172" y1="160" x2="186" y2="160" stroke="#E53935" stroke-width="1.5"/>
  <line x1="172" y1="163" x2="186" y2="163" stroke="#E53935" stroke-width="1.5"/>
  <!-- Mark angle B1 -->
  <path d="M149,158 A10,10 0 0,1 155,148" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Mark angle C1 -->
  <path d="M212,152 A10,10 0 0,0 215,142" fill="none" stroke="#FF9800" stroke-width="1.5"/>
  <!-- Labels -->
  <rect x="30" y="100" width="85" height="30" rx="2" fill="white" fill-opacity="0.85"/>
  <text x="72" y="112" font-size="6.5" fill="#E53935">BC = B1C1</text>
  <text x="72" y="122" font-size="6.5" fill="#1565C0">∠B = ∠B1</text>
  <text x="72" y="132" font-size="6.5" fill="#FF9800">∠C = ∠C1</text>

  <!-- Panel 2: SSS (ССС) -->
  <rect x="255" y="58" width="233" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#009688" stroke-width="1"/>
  <text x="371" y="73" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">III признак: ССС</text>
  <!-- Triangle 1 -->
  <polygon points="310,88 275,168 355,158" fill="#E0F2F1" fill-opacity="0.4" stroke="#00695C" stroke-width="1.5"/>
  <circle cx="310" cy="88" r="2.5" fill="#00695C"/>
  <circle cx="275" cy="168" r="2.5" fill="#00695C"/>
  <circle cx="355" cy="158" r="2.5" fill="#00695C"/>
  <text x="310" y="84" font-size="7" fill="#00695C" font-style="italic">A</text>
  <text x="264" y="171" font-size="7" fill="#00695C" font-style="italic">B</text>
  <text x="360" y="161" font-size="7" fill="#00695C" font-style="italic">C</text>
  <!-- Mark all sides -->
  <line x1="294" y1="126" x2="290" y2="130" stroke="#E53935" stroke-width="1.5"/>
  <line x1="296" y1="124" x2="292" y2="128" stroke="#E53935" stroke-width="1.5"/>
  <line x1="332" y1="122" x2="336" y2="126" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="334" y1="120" x2="338" y2="124" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="300" y1="163" x2="312" y2="163" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="300" y1="166" x2="312" y2="166" stroke="#FF9800" stroke-width="1.5"/>
  <!-- Triangle 2 -->
  <polygon points="425,88 390,168 470,158" fill="#E0F2F1" fill-opacity="0.4" stroke="#00695C" stroke-width="1.5"/>
  <circle cx="425" cy="88" r="2.5" fill="#00695C"/>
  <circle cx="390" cy="168" r="2.5" fill="#00695C"/>
  <circle cx="470" cy="158" r="2.5" fill="#00695C"/>
  <text x="425" y="84" font-size="7" fill="#00695C" font-style="italic">A1</text>
  <text x="379" y="171" font-size="7" fill="#00695C" font-style="italic">B1</text>
  <text x="475" y="161" font-size="7" fill="#00695C" font-style="italic">C1</text>
  <!-- Mark all sides same -->
  <line x1="409" y1="126" x2="405" y2="130" stroke="#E53935" stroke-width="1.5"/>
  <line x1="411" y1="124" x2="407" y2="128" stroke="#E53935" stroke-width="1.5"/>
  <line x1="447" y1="122" x2="451" y2="126" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="449" y1="120" x2="453" y2="124" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="415" y1="163" x2="427" y2="163" stroke="#FF9800" stroke-width="1.5"/>
  <line x1="415" y1="166" x2="427" y2="166" stroke="#FF9800" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="371" y="100" font-size="6.5" fill="#00695C" text-anchor="middle">AB = A1B1</text>
  <text x="371" y="110" font-size="6.5" fill="#00695C" text-anchor="middle">BC = B1C1</text>
  <text x="371" y="120" font-size="6.5" fill="#00695C" text-anchor="middle">AC = A1C1</text>

  <!-- Panel 3: Summary comparison -->
  <rect x="12" y="184" width="476" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#009688" stroke-width="1"/>
  <text x="250" y="199" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Сравнение трёх признаков равенства треугольников</text>

  <!-- I признак -->
  <rect x="20" y="207" width="148" height="86" rx="4" fill="#00695C" fill-opacity="0.12" stroke="#00695C" stroke-width="1.2"/>
  <text x="94" y="220" font-size="8" font-weight="bold" fill="#004D40" text-anchor="middle">I признак (СУС)</text>
  <text x="94" y="234" font-size="7" fill="#00695C" text-anchor="middle">Сторона</text>
  <line x1="72" y1="237" x2="116" y2="237" stroke="#E53935" stroke-width="2"/>
  <text x="94" y="249" font-size="7" fill="#00695C" text-anchor="middle">Угол (между ними)</text>
  <path d="M82,256 A12,12 0 0,1 106,256" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <text x="94" y="268" font-size="7" fill="#00695C" text-anchor="middle">Сторона</text>
  <line x1="72" y1="271" x2="116" y2="271" stroke="#E53935" stroke-width="2"/>
  <text x="94" y="288" font-size="6.5" fill="#004D40" text-anchor="middle" font-weight="bold">AB, ∠A, AC</text>

  <!-- II признак -->
  <rect x="176" y="207" width="148" height="86" rx="4" fill="#00695C" fill-opacity="0.12" stroke="#00695C" stroke-width="1.2"/>
  <text x="250" y="220" font-size="8" font-weight="bold" fill="#004D40" text-anchor="middle">II признак (УСУ)</text>
  <text x="250" y="234" font-size="7" fill="#00695C" text-anchor="middle">Угол</text>
  <path d="M238,240 A12,12 0 0,1 262,240" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="252" font-size="7" fill="#00695C" text-anchor="middle">Сторона (прилежащая)</text>
  <line x1="228" y1="255" x2="272" y2="255" stroke="#E53935" stroke-width="2"/>
  <text x="250" y="267" font-size="7" fill="#00695C" text-anchor="middle">Угол</text>
  <path d="M238,273 A12,12 0 0,1 262,273" fill="none" stroke="#FF9800" stroke-width="1.5"/>
  <text x="250" y="288" font-size="6.5" fill="#004D40" text-anchor="middle" font-weight="bold">∠B, BC, ∠C</text>

  <!-- III признак -->
  <rect x="332" y="207" width="148" height="86" rx="4" fill="#00695C" fill-opacity="0.12" stroke="#00695C" stroke-width="1.2"/>
  <text x="406" y="220" font-size="8" font-weight="bold" fill="#004D40" text-anchor="middle">III признак (ССС)</text>
  <text x="406" y="234" font-size="7" fill="#00695C" text-anchor="middle">Сторона</text>
  <line x1="384" y1="237" x2="428" y2="237" stroke="#E53935" stroke-width="2"/>
  <text x="406" y="249" font-size="7" fill="#00695C" text-anchor="middle">Сторона</text>
  <line x1="384" y1="252" x2="428" y2="252" stroke="#1565C0" stroke-width="2"/>
  <text x="406" y="264" font-size="7" fill="#00695C" text-anchor="middle">Сторона</text>
  <line x1="384" y1="267" x2="428" y2="267" stroke="#FF9800" stroke-width="2"/>
  <text x="406" y="288" font-size="6.5" fill="#004D40" text-anchor="middle" font-weight="bold">AB, BC, AC</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#009688" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">II (УСУ): ∠B=∠B1, BC=B1C1, ∠C=∠C1 | III (ССС): 3 стороны равны</text>
</svg>