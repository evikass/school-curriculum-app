<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E0F2F1"/>
<!-- Parallel lines -->
<line x1="30" y1="100" x2="470" y2="100" stroke="#00695C" stroke-width="2.5"/>
<line x1="30" y1="240" x2="470" y2="240" stroke="#00695C" stroke-width="2.5"/>
<!-- Parallel marks -->
<text x="455" y="96" font-family="sans-serif" font-size="12" fill="#00695C">a</text>
<text x="455" y="236" font-family="sans-serif" font-size="12" fill="#00695C">b</text>
<!-- Small arrows showing parallel -->
<line x1="380" y1="93" x2="395" y2="93" stroke="#00695C" stroke-width="1.5"/>
<polygon points="395,93 390,90 390,96" fill="#00695C"/>
<line x1="380" y1="233" x2="395" y2="233" stroke="#00695C" stroke-width="1.5"/>
<polygon points="395,233 390,230 390,236" fill="#00695C"/>
<!-- Transversal -->
<line x1="100" y1="30" x2="380" y2="310" stroke="#BF360C" stroke-width="2"/>
<text x="385" y="308" font-family="sans-serif" font-size="12" fill="#BF360C">c</text>
<!-- Intersection points -->
<circle cx="190" cy="100" r="4" fill="#BF360C"/>
<circle cx="280" cy="240" r="4" fill="#BF360C"/>
<!-- Corresponding angles -->
<path d="M175 85 A18 18 0 0 1 200 82" stroke="#E91E63" stroke-width="2" fill="#FCE4EC" opacity="0.6"/>
<text x="200" y="75" font-family="sans-serif" font-size="10" fill="#E91E63">1</text>
<path d="M268 225 A18 18 0 0 1 292 222" stroke="#E91E63" stroke-width="2" fill="#FCE4EC" opacity="0.6"/>
<text x="292" y="220" font-family="sans-serif" font-size="10" fill="#E91E63">5</text>
<!-- Alternate interior angles -->
<path d="M205 110 A18 18 0 0 0 178 112" stroke="#1565C0" stroke-width="2" fill="#BBDEFB" opacity="0.6"/>
<text x="160" y="125" font-family="sans-serif" font-size="10" fill="#1565C0">3</text>
<path d="M268 225 A18 18 0 0 0 292 222" stroke="#1565C0" stroke-width="2" fill="#BBDEFB" opacity="0.6"/>
<!-- Actually let me fix: alternate interior are 3 and 5, or 4 and 6 -->
<!-- Angles 3,4 on top line interior side; 5,6 on bottom -->
<!-- Simplified: show alternate interior pair -->
<path d="M200 115 A15 15 0 0 0 178 112" stroke="#FF6F00" stroke-width="2" fill="#FFF3E0" opacity="0.5"/>
<text x="160" y="125" font-family="sans-serif" font-size="10" fill="#FF6F00">3</text>
<path d="M270 233 A15 15 0 0 1 293 230" stroke="#FF6F00" stroke-width="2" fill="#FFF3E0" opacity="0.5"/>
<text x="298" y="230" font-family="sans-serif" font-size="10" fill="#FF6F00">6</text>
<!-- Legend -->
<rect x="20" y="280" width="460" height="50" rx="6" fill="#B2DFDB" opacity="0.5"/>
<text x="40" y="300" font-family="sans-serif" font-size="10" fill="#E91E63">∠1=∠5 соотв.</text>
<text x="170" y="300" font-family="sans-serif" font-size="10" fill="#FF6F00">∠3=∠6 накрест</text>
<text x="320" y="300" font-family="sans-serif" font-size="10" fill="#1565C0">∠3+∠5=180° одностор.</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#00695C" opacity="0.5" text-anchor="middle">Признаки параллельности</text>
</svg>