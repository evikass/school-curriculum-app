<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="50%" stop-color="#FFCDD2"/>
      <stop offset="100%" stop-color="#EF9A9A"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg6)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#B71C1C" text-anchor="middle" font-family="Arial">Смежные и вертикальные углы</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 6</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#E53935" stroke-opacity="0.3"/>

  <!-- Panel 1: Supplementary angles -->
  <rect x="12" y="58" width="235" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#E53935" stroke-width="1"/>
  <text x="129" y="73" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Смежные углы</text>
  <!-- Line -->
  <line x1="30" y1="150" x2="225" y2="150" stroke="#555" stroke-width="1"/>
  <!-- Ray from point -->
  <circle cx="120" cy="150" r="3" fill="#C62828"/>
  <line x1="120" y1="150" x2="30" y2="150" stroke="#C62828" stroke-width="2"/>
  <line x1="120" y1="150" x2="225" y2="150" stroke="#C62828" stroke-width="2"/>
  <line x1="120" y1="150" x2="70" y2="85" stroke="#E53935" stroke-width="2"/>
  <!-- Angle 1 (blue shading) -->
  <path d="M120,150 L30,150 A60,60 0 0,0 70,85 Z" fill="#1565C0" fill-opacity="0.1"/>
  <path d="M110,143 A15,15 0 0,0 98,118" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <text x="85" y="120" font-size="8" fill="#1565C0" font-style="italic">α</text>
  <!-- Angle 2 (red shading) -->
  <path d="M120,150 L225,150 A60,60 0 0,1 70,85 Z" fill="#C62828" fill-opacity="0.1"/>
  <path d="M130,143 A15,15 0 0,1 110,120" fill="none" stroke="#C62828" stroke-width="1.5"/>
  <text x="145" y="118" font-size="8" fill="#C62828" font-style="italic">β</text>
  <!-- Labels -->
  <text x="120" y="162" font-size="7" fill="#C62828" text-anchor="middle">O</text>
  <text x="65" y="80" font-size="7" fill="#E53935" font-style="italic">A</text>
  <text x="228" y="148" font-size="7" fill="#C62828" font-style="italic">B</text>
  <text x="22" y="148" font-size="7" fill="#C62828" font-style="italic">C</text>
  <!-- Formula -->
  <rect x="30" y="164" width="190" height="14" rx="3" fill="#C62828" fill-opacity="0.12"/>
  <text x="129" y="175" font-size="8" fill="#B71C1C" text-anchor="middle" font-weight="bold">α + β = 180°</text>

  <!-- Panel 2: Vertical angles -->
  <rect x="255" y="58" width="233" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#E53935" stroke-width="1"/>
  <text x="371" y="73" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Вертикальные углы</text>
  <!-- Two intersecting lines -->
  <line x1="280" y1="90" x2="460" y2="160" stroke="#C62828" stroke-width="1.8"/>
  <line x1="280" y1="160" x2="460" y2="90" stroke="#E53935" stroke-width="1.8"/>
  <!-- Intersection point -->
  <circle cx="370" cy="125" r="3" fill="#C62828"/>
  <text x="370" y="138" font-size="7" fill="#C62828" text-anchor="middle">O</text>
  <!-- Angle markings -->
  <path d="M362,118 A12,12 0 0,0 378,118" fill="none" stroke="#1565C0" stroke-width="1.3"/>
  <path d="M362,132 A12,12 0 0,1 378,132" fill="none" stroke="#1565C0" stroke-width="1.3"/>
  <path d="M364,118 A10,10 0 0,1 364,132" fill="none" stroke="#43A047" stroke-width="1.3"/>
  <path d="M376,118 A10,10 0 0,0 376,132" fill="none" stroke="#43A047" stroke-width="1.3"/>
  <!-- Labels -->
  <text x="356" y="115" font-size="7" fill="#1565C0" font-weight="bold">1</text>
  <text x="380" y="115" font-size="7" fill="#43A047" font-weight="bold">2</text>
  <text x="356" y="143" font-size="7" fill="#43A047" font-weight="bold">3</text>
  <text x="380" y="143" font-size="7" fill="#1565C0" font-weight="bold">4</text>
  <!-- Shading -->
  <path d="M370,125 L362,118 L378,118 Z" fill="#1565C0" fill-opacity="0.08"/>
  <path d="M370,125 L378,132 L362,132 Z" fill="#1565C0" fill-opacity="0.08"/>
  <path d="M370,125 L364,118 L364,132 Z" fill="#43A047" fill-opacity="0.08"/>
  <path d="M370,125 L376,118 L376,132 Z" fill="#43A047" fill-opacity="0.08"/>
  <!-- Theorem -->
  <rect x="268" y="156" width="210" height="14" rx="3" fill="#C62828" fill-opacity="0.12"/>
  <text x="371" y="167" font-size="8" fill="#B71C1C" text-anchor="middle" font-weight="bold">∠1 = ∠4, ∠2 = ∠3</text>

  <!-- Panel 3: Theorem and calculation -->
  <rect x="12" y="184" width="235" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#E53935" stroke-width="1"/>
  <text x="129" y="199" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Теорема + пример</text>
  <!-- Theorem box -->
  <rect x="22" y="206" width="215" height="30" rx="3" fill="#FFEBEE" stroke="#E53935" stroke-width="0.6"/>
  <text x="129" y="218" font-size="7" fill="#B71C1C" text-anchor="middle">Вертикальные углы равны</text>
  <text x="129" y="230" font-size="7" fill="#B71C1C" text-anchor="middle">Доказательство: ∠1+∠2=180°, ∠3+∠2=180° => ∠1=∠3</text>
  <!-- Example -->
  <rect x="22" y="242" width="215" height="52" rx="3" fill="#FFF3E0" stroke="#F57F17" stroke-width="0.5"/>
  <text x="129" y="254" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Пример:</text>
  <text x="129" y="265" font-size="7" fill="#555" text-anchor="middle">Дано: ∠1 и ∠2 — смежные, ∠1 = 70°</text>
  <text x="129" y="276" font-size="7" fill="#555" text-anchor="middle">Найти: ∠2</text>
  <text x="129" y="290" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">∠2 = 180° − 70° = 110°</text>

  <!-- Panel 4: More examples -->
  <rect x="255" y="184" width="233" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#E53935" stroke-width="1"/>
  <text x="371" y="199" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Свойства и следствия</text>
  <rect x="265" y="207" width="213" height="18" rx="3" fill="#FFEBEE" stroke="#E53935" stroke-width="0.5"/>
  <text x="371" y="220" font-size="7.5" fill="#B71C1C" text-anchor="middle">Сумма смежных углов = 180°</text>
  <rect x="265" y="229" width="213" height="18" rx="3" fill="#FFEBEE" stroke="#E53935" stroke-width="0.5"/>
  <text x="371" y="242" font-size="7.5" fill="#B71C1C" text-anchor="middle">Вертикальные углы равны</text>
  <rect x="265" y="251" width="213" height="18" rx="3" fill="#FFEBEE" stroke="#E53935" stroke-width="0.5"/>
  <text x="371" y="264" font-size="7.5" fill="#B71C1C" text-anchor="middle">Если угол прямой, то смежный тоже прямой</text>
  <!-- Mini diagram: right angle supplementary -->
  <line x1="275" y1="290" x2="345" y2="290" stroke="#C62828" stroke-width="1.2"/>
  <line x1="275" y1="290" x2="275" y2="272" stroke="#C62828" stroke-width="1.2"/>
  <rect x="275" y="282" width="8" height="8" fill="none" stroke="#E53935" stroke-width="1"/>
  <line x1="275" y1="290" x2="345" y2="290" stroke="#E53935" stroke-width="1.2"/>
  <line x1="275" y1="290" x2="345" y2="272" stroke="#E53935" stroke-width="1.2"/>
  <path d="M285,286 A12,12 0 0,0 290,279" fill="none" stroke="#E53935" stroke-width="0.8"/>
  <text x="310" y="280" font-size="6" fill="#E53935">90°</text>
  <text x="371" y="284" font-size="6.5" fill="#555" text-anchor="middle">Оба смежных прямых угла = 90°</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#E53935" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Смежные: α + β = 180° | Вертикальные углы равны</text>
</svg>