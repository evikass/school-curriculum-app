<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="50%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#80CBC4"/>
    </linearGradient>
    <linearGradient id="hl1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00897B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00695C" stop-opacity="0.08"/>
    </linearGradient>
    <marker id="arrowR1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#00695C"/>
    </marker>
    <marker id="arrowL1" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#00695C"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg1)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="Arial">Точки, прямые, отрезки</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 1</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00897B" stroke-opacity="0.3"/>

  <!-- Panel 1: Point -->
  <rect x="12" y="58" width="115" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="69" y="73" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Точка</text>
  <circle cx="50" cy="105" r="4" fill="#00695C"/>
  <text x="50" y="98" font-size="10" fill="#00695C" text-anchor="middle" font-style="italic">A</text>
  <circle cx="90" cy="130" r="4" fill="#00897B"/>
  <text x="90" y="123" font-size="10" fill="#00897B" text-anchor="middle" font-style="italic">B</text>
  <line x1="53" y1="107" x2="87" y2="128" stroke="#00695C" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="69" y="165" font-size="7" fill="#555" text-anchor="middle">Обозначение: A, B, C</text>

  <!-- Panel 2: Line -->
  <rect x="135" y="58" width="145" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="207" y="73" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Прямая</text>
  <line x1="145" y1="100" x2="270" y2="100" stroke="#00695C" stroke-width="2" marker-start="url(#arrowL1)" marker-end="url(#arrowR1)"/>
  <text x="207" y="96" font-size="10" fill="#00695C" text-anchor="middle" font-style="italic">a</text>
  <circle cx="170" cy="100" r="3" fill="#00897B"/>
  <circle cx="240" cy="100" r="3" fill="#00897B"/>
  <text x="170" y="116" font-size="8" fill="#00897B" text-anchor="middle">M</text>
  <text x="240" y="116" font-size="8" fill="#00897B" text-anchor="middle">N</text>
  <text x="207" y="132" font-size="7" fill="#555" text-anchor="middle">M ∈ a, N ∈ a</text>
  <!-- second line -->
  <line x1="145" y1="148" x2="270" y2="162" stroke="#00897B" stroke-width="1.5" marker-start="url(#arrowL1)" marker-end="url(#arrowR1)"/>
  <text x="275" y="159" font-size="9" fill="#00897B" font-style="italic">b</text>
  <text x="207" y="172" font-size="7" fill="#555" text-anchor="middle">Бесконечна в обе стороны</text>

  <!-- Panel 3: Segment -->
  <rect x="288" y="58" width="105" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="340" y="73" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Отрезок</text>
  <line x1="303" y1="100" x2="377" y2="100" stroke="#00695C" stroke-width="2.5"/>
  <circle cx="303" cy="100" r="3.5" fill="#00695C"/>
  <circle cx="377" cy="100" r="3.5" fill="#00695C"/>
  <text x="303" y="93" font-size="9" fill="#00695C" text-anchor="middle" font-style="italic">A</text>
  <text x="377" y="93" font-size="9" fill="#00695C" text-anchor="middle" font-style="italic">B</text>
  <text x="340" y="118" font-size="9" fill="#00695C" text-anchor="middle" font-weight="bold">AB</text>
  <!-- dimension line -->
  <line x1="303" y1="126" x2="377" y2="126" stroke="#00897B" stroke-width="0.8"/>
  <line x1="303" y1="123" x2="303" y2="129" stroke="#00897B" stroke-width="0.8"/>
  <line x1="377" y1="123" x2="377" y2="129" stroke="#00897B" stroke-width="0.8"/>
  <text x="340" y="138" font-size="7" fill="#555" text-anchor="middle">Часть прямой</text>
  <text x="340" y="148" font-size="7" fill="#555" text-anchor="middle">между A и B</text>
  <text x="340" y="165" font-size="7" fill="#00695C" text-anchor="middle" font-weight="bold">AB = BA</text>

  <!-- Panel 4: Ray -->
  <rect x="400" y="58" width="88" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="444" y="73" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Луч</text>
  <circle cx="418" cy="105" r="3.5" fill="#00695C"/>
  <text x="418" y="98" font-size="9" fill="#00695C" text-anchor="middle" font-style="italic">O</text>
  <line x1="418" y1="105" x2="478" y2="105" stroke="#00695C" stroke-width="2" marker-end="url(#arrowR1)"/>
  <circle cx="455" cy="105" r="3" fill="#00897B"/>
  <text x="455" y="98" font-size="8" fill="#00897B" text-anchor="middle" font-style="italic">A</text>
  <text x="444" y="122" font-size="8" fill="#00695C" text-anchor="middle">Луч OA</text>
  <text x="444" y="138" font-size="7" fill="#555" text-anchor="middle">Начало: O</text>
  <text x="444" y="150" font-size="7" fill="#555" text-anchor="middle">Бесконечен</text>
  <text x="444" y="162" font-size="7" fill="#555" text-anchor="middle">в одну сторону</text>

  <!-- Panel 5: Intersection of lines -->
  <rect x="12" y="186" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="89" y="201" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Пересечение прямых</text>
  <line x1="22" y1="220" x2="152" y2="275" stroke="#00695C" stroke-width="1.8" marker-start="url(#arrowL1)" marker-end="url(#arrowR1)"/>
  <line x1="152" y1="218" x2="22" y2="277" stroke="#00897B" stroke-width="1.8" marker-start="url(#arrowL1)" marker-end="url(#arrowR1)"/>
  <text x="155" y="220" font-size="8" fill="#00695C" font-style="italic">a</text>
  <text x="155" y="277" font-size="8" fill="#00897B" font-style="italic">b</text>
  <circle cx="87" cy="248" r="4" fill="#E53935"/>
  <text x="87" y="244" font-size="9" fill="#C62828" text-anchor="middle" font-style="italic">C</text>
  <text x="89" y="296" font-size="7" fill="#555" text-anchor="middle">a ∩ b = {C}</text>

  <!-- Panel 6: Point on line / not on line -->
  <rect x="175" y="186" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="252" y="201" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Принадлежность</text>
  <line x1="185" y1="228" x2="320" y2="228" stroke="#00695C" stroke-width="1.8" marker-start="url(#arrowL1)" marker-end="url(#arrowR1)"/>
  <text x="250" y="224" font-size="9" fill="#00695C" text-anchor="middle" font-style="italic">a</text>
  <circle cx="210" cy="228" r="3.5" fill="#00897B"/>
  <text x="210" y="222" font-size="9" fill="#00897B" text-anchor="middle" font-style="italic">A</text>
  <circle cx="290" cy="228" r="3.5" fill="#00897B"/>
  <text x="290" y="222" font-size="9" fill="#00897B" text-anchor="middle" font-style="italic">B</text>
  <circle cx="250" cy="262" r="3.5" fill="#E53935"/>
  <text x="250" y="256" font-size="9" fill="#C62828" text-anchor="middle" font-style="italic">C</text>
  <!-- Box with formulas -->
  <text x="195" y="245" font-size="7" fill="#00695C">A ∈ a</text>
  <text x="195" y="255" font-size="7" fill="#00695C">B ∈ a</text>
  <text x="260" y="278" font-size="7" fill="#C62828">C ∉ a</text>
  <text x="195" y="275" font-size="7" fill="#555">Точка лежит</text>
  <text x="195" y="285" font-size="7" fill="#555">на прямой</text>
  <text x="195" y="296" font-size="7" fill="#555">или нет</text>

  <!-- Panel 7: Key properties -->
  <rect x="338" y="186" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="413" y="201" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Свойства</text>
  <rect x="348" y="208" width="130" height="22" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.5"/>
  <text x="413" y="222" font-size="7.5" fill="#004D40" text-anchor="middle">Через 2 точки — единственная</text>
  <rect x="348" y="236" width="130" height="22" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.5"/>
  <text x="413" y="250" font-size="7.5" fill="#004D40" text-anchor="middle">Две прямые: 1 точка или ∅</text>
  <rect x="348" y="264" width="130" height="22" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.5"/>
  <text x="413" y="278" font-size="7.5" fill="#004D40" text-anchor="middle">Отрезок — часть прямой</text>
  <rect x="348" y="286" width="130" height="14" rx="3" fill="#00897B" fill-opacity="0.12"/>
  <text x="413" y="296" font-size="7" fill="#00695C" text-anchor="middle" font-weight="bold">Точка делит прямую на 2 луча</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#00897B" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Через любые две точки можно провести прямую, и притом только одну</text>
</svg>