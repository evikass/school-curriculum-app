<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FAFAFA"/>
<!-- Point A -->
<circle cx="120" cy="80" r="5" fill="#D32F2F"/>
<text x="120" y="68" font-family="sans-serif" font-size="14" fill="#D32F2F" text-anchor="middle" font-weight="bold">A</text>
<text x="120" y="100" font-family="sans-serif" font-size="9" fill="#888" text-anchor="middle">точка</text>
<!-- Point B -->
<circle cx="380" cy="80" r="5" fill="#D32F2F"/>
<text x="380" y="68" font-family="sans-serif" font-size="14" fill="#D32F2F" text-anchor="middle" font-weight="bold">B</text>
<!-- Line through A and B -->
<line x1="30" y1="80" x2="470" y2="80" stroke="#1565C0" stroke-width="2"/>
<!-- Arrow heads for line -->
<polygon points="30,80 40,76 40,84" fill="#1565C0"/>
<polygon points="470,80 460,76 460,84" fill="#1565C0"/>
<text x="250" y="72" font-family="sans-serif" font-size="12" fill="#1565C0" text-anchor="middle">прямая AB</text>
<!-- Ray -->
<circle cx="80" cy="170" r="4" fill="#D32F2F"/>
<text x="80" y="160" font-family="sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle">C</text>
<line x1="80" y1="170" x2="450" y2="170" stroke="#2E7D32" stroke-width="2"/>
<polygon points="450,170 440,166 440,174" fill="#2E7D32"/>
<text x="260" y="165" font-family="sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">луч CD</text>
<circle cx="300" cy="170" r="4" fill="#D32F2F"/>
<text x="300" y="160" font-family="sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle">D</text>
<!-- Line segment -->
<circle cx="100" cy="260" r="4" fill="#D32F2F"/>
<circle cx="400" cy="260" r="4" fill="#D32F2F"/>
<line x1="100" y1="260" x2="400" y2="260" stroke="#7B1FA2" stroke-width="3"/>
<text x="100" y="252" font-family="sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle">E</text>
<text x="400" y="252" font-family="sans-serif" font-size="12" fill="#D32F2F" text-anchor="middle">F</text>
<text x="250" y="255" font-family="sans-serif" font-size="12" fill="#7B1FA2" text-anchor="middle">отрезок EF</text>
<!-- Length bracket -->
<path d="M100 275 L100 285 L400 285 L400 275" stroke="#7B1FA2" stroke-width="1" fill="none"/>
<text x="250" y="300" font-family="sans-serif" font-size="11" fill="#7B1FA2" text-anchor="middle">длина EF</text>
<!-- Multiple points on line -->
<circle cx="160" cy="80" r="3" fill="#666"/>
<circle cx="250" cy="80" r="3" fill="#666"/>
<circle cx="330" cy="80" r="3" fill="#666"/>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#444" opacity="0.5" text-anchor="middle">Точки, прямые, отрезки</text>
</svg>