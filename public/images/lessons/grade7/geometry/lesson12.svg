<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="50%" stop-color="#D1C4E9"/>
      <stop offset="100%" stop-color="#B39DDB"/>
    </linearGradient>
    <marker id="arrowR12" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#4527A0"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg12)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4527A0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#311B92" text-anchor="middle" font-family="Arial">Задачи на построение</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 12</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#7C4DFF" stroke-opacity="0.3"/>

  <!-- Panel 1: Equal segment -->
  <rect x="12" y="58" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#7C4DFF" stroke-width="1"/>
  <text x="89" y="73" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Равный отрезок</text>
  <!-- Source segment AB -->
  <line x1="25" y1="90" x2="80" y2="90" stroke="#4527A0" stroke-width="2"/>
  <circle cx="25" cy="90" r="2.5" fill="#4527A0"/>
  <circle cx="80" cy="90" r="2.5" fill="#4527A0"/>
  <text x="25" y="86" font-size="7" fill="#4527A0" font-style="italic">A</text>
  <text x="80" y="86" font-size="7" fill="#4527A0" font-style="italic">B</text>
  <!-- Ray from C -->
  <line x1="25" y1="120" x2="150" y2="120" stroke="#7C4DFF" stroke-width="1.5" marker-end="url(#arrowR12)"/>
  <circle cx="25" cy="120" r="2.5" fill="#7C4DFF"/>
  <text x="25" y="116" font-size="7" fill="#7C4DFF" font-style="italic">C</text>
  <!-- Construction arcs -->
  <path d="M80,90 A30,30 0 0,1 82,120" fill="none" stroke="#E53935" stroke-width="0.8" stroke-dasharray="3,2"/>
  <path d="M25,120 A30,30 0 0,1 55,120" fill="none" stroke="#E53935" stroke-width="0.8" stroke-dasharray="3,2"/>
  <circle cx="55" cy="120" r="2.5" fill="#E53935"/>
  <text x="55" y="116" font-size="7" fill="#E53935" font-style="italic">D</text>
  <line x1="25" y1="120" x2="55" y2="120" stroke="#E53935" stroke-width="2"/>
  <text x="89" y="145" font-size="6.5" fill="#4527A0" text-anchor="middle">CD = AB (циркулем)</text>
  <text x="89" y="160" font-size="6" fill="#555" text-anchor="middle">Шаг: измерить AB, отложить на луче</text>
  <text x="89" y="172" font-size="6" fill="#555" text-anchor="middle">1) Луч из C 2) Раствор = AB 3) Дуга</text>

  <!-- Panel 2: Angle bisector construction -->
  <rect x="175" y="58" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#7C4DFF" stroke-width="1"/>
  <text x="250" y="73" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Биссектриса угла</text>
  <!-- Angle -->
  <circle cx="215" cy="150" r="2.5" fill="#4527A0"/>
  <line x1="215" y1="150" x2="188" y2="90" stroke="#4527A0" stroke-width="1.5"/>
  <line x1="215" y1="150" x2="300" y2="105" stroke="#4527A0" stroke-width="1.5"/>
  <text x="185" y="87" font-size="7" fill="#4527A0" font-style="italic">A</text>
  <text x="305" y="102" font-size="7" fill="#4527A0" font-style="italic">B</text>
  <text x="215" y="160" font-size="7" fill="#4527A0" font-style="italic">O</text>
  <!-- Construction arcs -->
  <circle cx="202" cy="122" r="2" fill="#E53935"/>
  <circle cx="258" cy="130" r="2" fill="#E53935"/>
  <path d="M202,122 A30,30 0 0,1 258,130" fill="none" stroke="#E53935" stroke-width="0.7" stroke-dasharray="2,2"/>
  <!-- Upper arcs for bisector -->
  <path d="M202,122 A25,25 0 0,0 230,108" fill="none" stroke="#7C4DFF" stroke-width="0.7" stroke-dasharray="2,2"/>
  <path d="M258,130 A25,25 0 0,0 230,108" fill="none" stroke="#7C4DFF" stroke-width="0.7" stroke-dasharray="2,2"/>
  <circle cx="230" cy="108" r="2" fill="#7C4DFF"/>
  <!-- Bisector line -->
  <line x1="215" y1="150" x2="230" y2="108" stroke="#E53935" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="234" y="105" font-size="6" fill="#E53935">C</text>
  <!-- Equal angle marks -->
  <path d="M208,140 A10,10 0 0,1 214,132" fill="none" stroke="#43A047" stroke-width="1"/>
  <path d="M214,132 A10,10 0 0,1 222,137" fill="none" stroke="#43A047" stroke-width="1"/>

  <!-- Panel 3: Perpendicular bisector -->
  <rect x="333" y="58" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#7C4DFF" stroke-width="1"/>
  <text x="410" y="73" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Серединный ⊥</text>
  <!-- Segment AB -->
  <line x1="350" y1="115" x2="470" y2="115" stroke="#4527A0" stroke-width="2"/>
  <circle cx="350" cy="115" r="2.5" fill="#4527A0"/>
  <circle cx="470" cy="115" r="2.5" fill="#4527A0"/>
  <text x="350" y="110" font-size="7" fill="#4527A0" font-style="italic">A</text>
  <text x="470" y="110" font-size="7" fill="#4527A0" font-style="italic">B</text>
  <!-- Arcs above -->
  <path d="M350,115 A40,40 0 0,1 410,80" fill="none" stroke="#E53935" stroke-width="0.8" stroke-dasharray="2,2"/>
  <path d="M470,115 A40,40 0 0,0 410,80" fill="none" stroke="#E53935" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Arcs below -->
  <path d="M350,115 A40,40 0 0,0 410,150" fill="none" stroke="#7C4DFF" stroke-width="0.8" stroke-dasharray="2,2"/>
  <path d="M470,115 A40,40 0 0,1 410,150" fill="none" stroke="#7C4DFF" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Intersection points -->
  <circle cx="410" cy="80" r="2.5" fill="#E53935"/>
  <circle cx="410" cy="150" r="2.5" fill="#7C4DFF"/>
  <!-- Perpendicular bisector line -->
  <line x1="410" y1="75" x2="410" y2="155" stroke="#E53935" stroke-width="1.5"/>
  <rect x="410" y="110" width="7" height="7" fill="none" stroke="#E53935" stroke-width="1"/>
  <!-- Midpoint M -->
  <circle cx="410" cy="115" r="2.5" fill="#43A047"/>
  <text x="418" y="115" font-size="6" fill="#43A047">M</text>
  <text x="410" y="170" font-size="6" fill="#555" text-anchor="middle">AM = MB, ⊥ через M</text>

  <!-- Panel 4: Equal angle construction -->
  <rect x="12" y="184" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#7C4DFF" stroke-width="1"/>
  <text x="89" y="199" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Равный угол</text>
  <!-- Source angle -->
  <circle cx="40" cy="240" r="2.5" fill="#4527A0"/>
  <line x1="40" y1="240" x2="22" y2="210" stroke="#4527A0" stroke-width="1.5"/>
  <line x1="40" y1="240" x2="75" y2="215" stroke="#4527A0" stroke-width="1.5"/>
  <text x="40" y="250" font-size="6" fill="#4527A0">O</text>
  <!-- Arc on source -->
  <path d="M33,228 A12,12 0 0,1 50,226" fill="none" stroke="#E53935" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Target ray -->
  <line x1="90" y1="240" x2="155" y2="240" stroke="#7C4DFF" stroke-width="1.5" marker-end="url(#arrowR12)"/>
  <circle cx="90" cy="240" r="2.5" fill="#7C4DFF"/>
  <text x="90" y="250" font-size="6" fill="#7C4DFF">O1</text>
  <!-- Construction arc -->
  <path d="M83,228 A12,12 0 0,1 100,226" fill="none" stroke="#E53935" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Second ray of new angle -->
  <line x1="90" y1="240" x2="125" y2="212" stroke="#7C4DFF" stroke-width="1.5"/>
  <path d="M83,228 A12,12 0 0,1 98,224" fill="none" stroke="#43A047" stroke-width="0.8"/>
  <text x="89" y="270" font-size="6" fill="#555" text-anchor="middle">1) Дуга на ∠O</text>
  <text x="89" y="280" font-size="6" fill="#555" text-anchor="middle">2) Такой же радиус</text>
  <text x="89" y="290" font-size="6" fill="#555" text-anchor="middle">3) Перенести хорду</text>

  <!-- Panel 5: Perpendicular from point to line -->
  <rect x="175" y="184" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#7C4DFF" stroke-width="1"/>
  <text x="250" y="199" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">⊥ из точки к прямой</text>
  <!-- Line -->
  <line x1="185" y1="265" x2="315" y2="265" stroke="#4527A0" stroke-width="1.5"/>
  <text x="320" y="268" font-size="6" fill="#4527A0" font-style="italic">a</text>
  <!-- Point M above -->
  <circle cx="250" cy="222" r="3" fill="#E53935"/>
  <text x="258" y="220" font-size="7" fill="#C62828" font-style="italic">M</text>
  <!-- Construction arcs -->
  <path d="M220,265 A30,30 0 0,1 280,265" fill="none" stroke="#7C4DFF" stroke-width="0.8" stroke-dasharray="2,2"/>
  <circle cx="220" cy="265" r="2" fill="#7C4DFF"/>
  <circle cx="280" cy="265" r="2" fill="#7C4DFF"/>
  <!-- Arcs from intersection points -->
  <path d="M220,265 A35,35 0 0,0 250,232" fill="none" stroke="#E53935" stroke-width="0.7" stroke-dasharray="2,2"/>
  <path d="M280,265 A35,35 0 0,1 250,232" fill="none" stroke="#E53935" stroke-width="0.7" stroke-dasharray="2,2"/>
  <!-- Perpendicular line -->
  <line x1="250" y1="218" x2="250" y2="270" stroke="#E53935" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="250" cy="265" r="2.5" fill="#43A047"/>
  <text x="258" y="268" font-size="6" fill="#43A047">H</text>
  <rect x="250" y="258" width="7" height="7" fill="none" stroke="#E53935" stroke-width="0.8"/>
  <text x="250" y="288" font-size="6" fill="#555" text-anchor="middle">MH ⊥ a, MH — расстояние</text>

  <!-- Panel 6: Tools -->
  <rect x="333" y="184" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#7C4DFF" stroke-width="1"/>
  <text x="410" y="199" font-size="9" font-weight="bold" fill="#4527A0" text-anchor="middle">Инструменты</text>
  <!-- Compass icon -->
  <line x1="370" y1="215" x2="385" y2="250" stroke="#4527A0" stroke-width="1.5"/>
  <line x1="400" y1="215" x2="385" y2="250" stroke="#4527A0" stroke-width="1.5"/>
  <circle cx="385" cy="250" r="2" fill="#4527A0"/>
  <path d="M370,215 A20,20 0 0,1 400,215" fill="none" stroke="#4527A0" stroke-width="0.8"/>
  <text x="385" y="260" font-size="7" fill="#4527A0" text-anchor="middle">Циркуль</text>
  <!-- Ruler icon -->
  <rect x="355" y="272" width="110" height="14" rx="2" fill="#EDE7F6" stroke="#4527A0" stroke-width="0.8"/>
  <line x1="365" y1="272" x2="365" y2="286" stroke="#4527A0" stroke-width="0.5"/>
  <line x1="385" y1="272" x2="385" y2="280" stroke="#4527A0" stroke-width="0.5"/>
  <line x1="405" y1="272" x2="405" y2="286" stroke="#4527A0" stroke-width="0.5"/>
  <line x1="425" y1="272" x2="425" y2="280" stroke="#4527A0" stroke-width="0.5"/>
  <line x1="445" y1="272" x2="445" y2="286" stroke="#4527A0" stroke-width="0.5"/>
  <text x="410" y="298" font-size="7" fill="#4527A0" text-anchor="middle">Линейка (без делений)</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#7C4DFF" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Построения: циркуль + линейка — отрезок, угол, биссектриса, ⊥</text>
</svg>