<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="50%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg17)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Сумма углов треугольника</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 17</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1E88E5" stroke-opacity="0.3"/>

  <!-- Panel 1: Triangle with angle sum = 180° -->
  <rect x="12" y="58" width="165" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="94" y="73" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">∠A + ∠B + ∠C = 180°</text>
  <!-- Triangle -->
  <polygon points="94,85 35,165 165,150" fill="#E3F2FD" fill-opacity="0.3" stroke="#1565C0" stroke-width="2"/>
  <circle cx="94" cy="85" r="3" fill="#1565C0"/>
  <circle cx="35" cy="165" r="3" fill="#1565C0"/>
  <circle cx="165" cy="150" r="3" fill="#1565C0"/>
  <text x="94" y="81" font-size="8" fill="#1565C0" font-style="italic">A</text>
  <text x="22" y="168" font-size="8" fill="#1565C0" font-style="italic">B</text>
  <text x="170" y="153" font-size="8" fill="#1565C0" font-style="italic">C</text>
  <!-- Angle arcs -->
  <path d="M85,95 A12,12 0 0,1 100,95" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <text x="92" y="110" font-size="7" fill="#E53935">α</text>
  <path d="M42,158 A12,12 0 0,1 48,148" fill="none" stroke="#43A047" stroke-width="1.5"/>
  <text x="44" y="145" font-size="7" fill="#43A047">β</text>
  <path d="M157,145 A12,12 0 0,0 150,155" fill="none" stroke="#FF9800" stroke-width="1.5"/>
  <text x="152" y="158" font-size="7" fill="#FF9800">γ</text>

  <!-- Panel 2: Tear-off proof -->
  <rect x="185" y="58" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="262" y="73" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Доказательство</text>
  <!-- Straight line with angles -->
  <line x1="195" y1="120" x2="325" y2="120" stroke="#1565C0" stroke-width="1.5"/>
  <circle cx="260" cy="120" r="2.5" fill="#1565C0"/>
  <!-- Three angle sectors on line -->
  <path d="M260,120 L230,95 Z" fill="#E53935" fill-opacity="0.15" stroke="#E53935" stroke-width="1"/>
  <path d="M260,120 L290,95 Z" fill="#43A047" fill-opacity="0.15" stroke="#43A047" stroke-width="1"/>
  <path d="M260,120 L305,105 Z" fill="#FF9800" fill-opacity="0.15" stroke="#FF9800" stroke-width="1"/>
  <!-- Labels -->
  <text x="238" y="108" font-size="7" fill="#E53935">∠A</text>
  <text x="270" y="105" font-size="7" fill="#43A047">∠B</text>
  <text x="298" y="112" font-size="7" fill="#FF9800">∠C</text>
  <!-- 180° bracket -->
  <line x1="195" y1="128" x2="325" y2="128" stroke="#1565C0" stroke-width="1"/>
  <text x="260" y="140" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">180°</text>
  <!-- Arrow from triangle -->
  <text x="262" y="155" font-size="6.5" fill="#555" text-anchor="middle">Углы «отрываем» и</text>
  <text x="262" y="165" font-size="6.5" fill="#555" text-anchor="middle">складываем на прямой</text>
  <!-- Construction lines -->
  <line x1="260" y1="120" x2="230" y2="95" stroke="#E53935" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="260" y1="120" x2="290" y2="95" stroke="#43A047" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="260" y1="120" x2="305" y2="105" stroke="#FF9800" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Panel 3: Proof via parallel lines -->
  <rect x="348" y="58" width="140" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="418" y="73" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Через ∥ прямые</text>
  <!-- Triangle -->
  <polygon points="418,85 370,155 465,145" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <text x="418" y="81" font-size="7" fill="#1565C0" font-style="italic">A</text>
  <text x="360" y="158" font-size="7" fill="#1565C0" font-style="italic">B</text>
  <text x="470" y="148" font-size="7" fill="#1565C0" font-style="italic">C</text>
  <!-- Parallel line through A -->
  <line x1="360" y1="85" x2="475" y2="85" stroke="#43A047" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="478" y="88" font-size="6" fill="#43A047">MN ∥ BC</text>
  <!-- Angle marks -->
  <path d="M405,90 A12,12 0 0,0 395,90" fill="none" stroke="#43A047" stroke-width="1"/>
  <path d="M430,90 A12,12 0 0,1 440,90" fill="none" stroke="#FF9800" stroke-width="1"/>
  <path d="M410,98 A10,10 0 0,1 426,98" fill="none" stroke="#E53935" stroke-width="1"/>
  <text x="392" y="86" font-size="6" fill="#43A047">∠1</text>
  <text x="442" y="86" font-size="6" fill="#FF9800">∠3</text>
  <text x="418" y="108" font-size="6" fill="#E53935">∠2</text>
  <text x="418" y="120" font-size="6.5" fill="#1565C0" text-anchor="middle">∠1=∠B, ∠3=∠C</text>
  <text x="418" y="132" font-size="6.5" fill="#1565C0" text-anchor="middle">(накрест лежащие)</text>
  <text x="418" y="145" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">∠1+∠2+∠3=180°</text>

  <!-- Panel 4: External angle -->
  <rect x="12" y="184" width="235" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="129" y="199" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Внешний угол треугольника</text>
  <!-- Triangle -->
  <polygon points="100,210 35,285 175,280" fill="#E3F2FD" fill-opacity="0.3" stroke="#1565C0" stroke-width="1.5"/>
  <circle cx="100" cy="210" r="2.5" fill="#1565C0"/>
  <circle cx="35" cy="285" r="2.5" fill="#1565C0"/>
  <circle cx="175" cy="280" r="2.5" fill="#1565C0"/>
  <text x="100" y="206" font-size="7" fill="#1565C0" font-style="italic">A</text>
  <text x="22" y="288" font-size="7" fill="#1565C0" font-style="italic">B</text>
  <text x="180" y="283" font-size="7" fill="#1565C0" font-style="italic">C</text>
  <!-- Extended side BC -->
  <line x1="35" y1="285" x2="220" y2="284" stroke="#E53935" stroke-width="1.5"/>
  <!-- External angle at C -->
  <path d="M172,272 A15,15 0 0,0 195,275" fill="none" stroke="#E53935" stroke-width="2"/>
  <text x="198" y="272" font-size="7" fill="#C62828" font-weight="bold">Внеш. ∠</text>
  <!-- Interior angles -->
  <path d="M90,218 A10,10 0 0,1 105,218" fill="none" stroke="#43A047" stroke-width="1.2"/>
  <text x="97" y="228" font-size="6" fill="#43A047">∠A</text>
  <path d="M43,278 A10,10 0 0,1 50,268" fill="none" stroke="#FF9800" stroke-width="1.2"/>
  <text x="47" y="264" font-size="6" fill="#FF9800">∠B</text>
  <!-- Theorem box -->
  <rect x="100" y="258" width="140" height="32" rx="3" fill="#FFEBEE" stroke="#E53935" stroke-width="0.5"/>
  <text x="170" y="270" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Внеш. ∠ = ∠A + ∠B</text>
  <text x="170" y="282" font-size="7" fill="#C62828" text-anchor="middle">(сумма двух внутренних,</text>
  <text x="170" y="292" font-size="7" fill="#C62828" text-anchor="middle">не смежных с ним)</text>

  <!-- Panel 5: Corollaries -->
  <rect x="255" y="184" width="233" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#1E88E5" stroke-width="1"/>
  <text x="371" y="199" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Следствия из теоремы</text>
  <rect x="265" y="207" width="213" height="22" rx="3" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.5"/>
  <text x="371" y="222" font-size="7.5" fill="#0D47A1" text-anchor="middle">1. В △ не может быть двух прямых углов</text>
  <rect x="265" y="233" width="213" height="22" rx="3" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.5"/>
  <text x="371" y="248" font-size="7.5" fill="#0D47A1" text-anchor="middle">2. В △ не может быть двух тупых углов</text>
  <rect x="265" y="259" width="213" height="22" rx="3" fill="#E3F2FD" stroke="#1E88E5" stroke-width="0.5"/>
  <text x="371" y="274" font-size="7.5" fill="#0D47A1" text-anchor="middle">3. В △ хотя бы два острых угла</text>
  <rect x="265" y="285" width="213" height="14" rx="3" fill="#1565C0" fill-opacity="0.12"/>
  <text x="371" y="296" font-size="7" fill="#0D47A1" text-anchor="middle" font-weight="bold">Внеш. ∠ больше каждого внутреннего</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1E88E5" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">∠A + ∠B + ∠C = 180° | Внешний угол = сумме двух несмежных внутренних</text>
</svg>