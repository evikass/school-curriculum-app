<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="50%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#A5D6A7"/>
    </linearGradient>
    <marker id="arrowR2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arrowL2" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg2)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle" font-family="Arial">Луч и угол</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 2</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#43A047" stroke-opacity="0.3"/>

  <!-- Panel 1: Ray OA -->
  <rect x="12" y="58" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="87" y="73" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Луч OA</text>
  <circle cx="40" cy="110" r="4" fill="#2E7D32"/>
  <text x="40" y="103" font-size="10" fill="#2E7D32" text-anchor="middle" font-style="italic">O</text>
  <line x1="40" y1="110" x2="148" y2="110" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowR2)"/>
  <circle cx="120" cy="110" r="3" fill="#43A047"/>
  <text x="120" y="103" font-size="9" fill="#43A047" text-anchor="middle" font-style="italic">A</text>
  <text x="87" y="135" font-size="7.5" fill="#555" text-anchor="middle">O — начало луча</text>
  <text x="87" y="146" font-size="7.5" fill="#555" text-anchor="middle">Луч — полупрямая</text>
  <text x="87" y="157" font-size="7.5" fill="#555" text-anchor="middle">с началом в точке O</text>
  <text x="87" y="168" font-size="7.5" fill="#2E7D32" text-anchor="middle" font-weight="bold">Обозначение: OA</text>

  <!-- Panel 2: Angle AOB -->
  <rect x="170" y="58" width="165" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="252" y="73" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Угол AOB</text>
  <circle cx="215" cy="150" r="3.5" fill="#2E7D32"/>
  <text x="215" y="160" font-size="9" fill="#2E7D32" font-style="italic">O</text>
  <line x1="215" y1="150" x2="310" y2="85" stroke="#2E7D32" stroke-width="2"/>
  <line x1="215" y1="150" x2="140" y2="85" stroke="#2E7D32" stroke-width="2"/>
  <circle cx="290" cy="93" r="2.5" fill="#43A047"/>
  <text x="305" y="90" font-size="9" fill="#43A047" font-style="italic">A</text>
  <circle cx="152" cy="93" r="2.5" fill="#43A047"/>
  <text x="135" y="90" font-size="9" fill="#43A047" font-style="italic">B</text>
  <!-- angle arc -->
  <path d="M235,135 A30,30 0 0,0 202,135" fill="none" stroke="#43A047" stroke-width="1.5"/>
  <text x="218" y="128" font-size="8" fill="#43A047" font-style="italic">α</text>
  <!-- interior shading -->
  <path d="M215,150 L290,93 L152,93 Z" fill="#43A047" fill-opacity="0.08"/>
  <text x="252" y="108" font-size="7" fill="#555" text-anchor="middle">O — вершина</text>
  <text x="252" y="118" font-size="7" fill="#555" text-anchor="middle">OA, OB — стороны</text>

  <!-- Panel 3: Protractor visual -->
  <rect x="343" y="58" width="145" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="415" y="73" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Транспортир</text>
  <!-- protractor semicircle -->
  <path d="M370,155 A60,60 0 0,1 460,155" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="370" y1="155" x2="460" y2="155" stroke="#2E7D32" stroke-width="1"/>
  <!-- degree marks -->
  <line x1="415" y1="155" x2="415" y2="97" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="415" y="93" font-size="7" fill="#2E7D32" text-anchor="middle">90°</text>
  <line x1="378" y1="155" x2="380" y2="146" stroke="#43A047" stroke-width="0.5"/>
  <line x1="452" y1="155" x2="450" y2="146" stroke="#43A047" stroke-width="0.5"/>
  <text x="374" y="143" font-size="6" fill="#43A047">0°</text>
  <text x="450" y="143" font-size="6" fill="#43A047">180°</text>
  <!-- small tick marks -->
  <line x1="390" y1="155" x2="392" y2="149" stroke="#43A047" stroke-width="0.4"/>
  <line x1="400" y1="155" x2="402" y2="147" stroke="#43A047" stroke-width="0.4"/>
  <line x1="430" y1="155" x2="428" y2="147" stroke="#43A047" stroke-width="0.4"/>
  <line x1="440" y1="155" x2="438" y2="149" stroke="#43A047" stroke-width="0.4"/>
  <!-- angle example -->
  <line x1="395" y1="155" x2="440" y2="112" stroke="#E53935" stroke-width="1.5"/>
  <path d="M407,145 A20,20 0 0,1 415,136" fill="none" stroke="#E53935" stroke-width="1"/>
  <text x="425" y="140" font-size="7" fill="#C62828">45°</text>
  <text x="415" y="172" font-size="7" fill="#555" text-anchor="middle">Прибор для измерения</text>

  <!-- Panel 4: Angle types row -->
  <rect x="12" y="184" width="476" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#43A047" stroke-width="1"/>
  <text x="250" y="199" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Виды углов и обозначения</text>

  <!-- Acute angle -->
  <rect x="20" y="206" width="88" height="86" rx="4" fill="#E8F5E9" fill-opacity="0.6" stroke="#43A047" stroke-width="0.5"/>
  <text x="64" y="218" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Острый</text>
  <line x1="34" y1="278" x2="94" y2="278" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="34" y1="278" x2="68" y2="232" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M44,273 A14,14 0 0,1 48,266" fill="none" stroke="#43A047" stroke-width="1"/>
  <text x="64" y="268" font-size="7" fill="#2E7D32" text-anchor="middle">&lt; 90°</text>

  <!-- Right angle -->
  <rect x="118" y="206" width="88" height="86" rx="4" fill="#E8F5E9" fill-opacity="0.6" stroke="#43A047" stroke-width="0.5"/>
  <text x="162" y="218" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Прямой</text>
  <line x1="136" y1="278" x2="190" y2="278" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="136" y1="278" x2="136" y2="232" stroke="#2E7D32" stroke-width="1.5"/>
  <rect x="136" y="264" width="14" height="14" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="162" y="258" font-size="7" fill="#2E7D32" text-anchor="middle">= 90°</text>

  <!-- Obtuse angle -->
  <rect x="216" y="206" width="88" height="86" rx="4" fill="#E8F5E9" fill-opacity="0.6" stroke="#43A047" stroke-width="0.5"/>
  <text x="260" y="218" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Тупой</text>
  <line x1="232" y1="278" x2="292" y2="278" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="232" y1="278" x2="256" y2="232" stroke="#2E7D32" stroke-width="1.5"/>
  <path d="M242,273 A14,14 0 0,0 260,268" fill="none" stroke="#43A047" stroke-width="1"/>
  <text x="260" y="262" font-size="7" fill="#2E7D32" text-anchor="middle">&gt; 90°</text>

  <!-- Straight angle -->
  <rect x="314" y="206" width="88" height="86" rx="4" fill="#E8F5E9" fill-opacity="0.6" stroke="#43A047" stroke-width="0.5"/>
  <text x="358" y="218" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Развёрнутый</text>
  <line x1="326" y1="258" x2="390" y2="258" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="358" cy="258" r="3" fill="#2E7D32"/>
  <text x="358" y="252" font-size="7" fill="#2E7D32" text-anchor="middle">= 180°</text>

  <!-- Notation box -->
  <rect x="412" y="206" width="68" height="86" rx="4" fill="#C8E6C9" fill-opacity="0.5" stroke="#43A047" stroke-width="0.5"/>
  <text x="446" y="220" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Обозн.</text>
  <text x="446" y="236" font-size="7" fill="#2E7D32" text-anchor="middle">∠AOB</text>
  <text x="446" y="250" font-size="7" fill="#2E7D32" text-anchor="middle">∠α</text>
  <text x="446" y="264" font-size="7" fill="#2E7D32" text-anchor="middle">∠(ab)</text>
  <text x="446" y="280" font-size="6.5" fill="#555" text-anchor="middle">O — вершина</text>
  <text x="446" y="290" font-size="6.5" fill="#555" text-anchor="middle">в середине</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#43A047" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Угол — геометрическая фигура, состоящая из двух лучей с общим началом</text>
</svg>