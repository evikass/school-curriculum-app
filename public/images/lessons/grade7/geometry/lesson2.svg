<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#F5F5F5"/>
<!-- Acute angle -->
<line x1="60" y1="200" x2="180" y2="200" stroke="#1565C0" stroke-width="2"/>
<line x1="60" y1="200" x2="140" y2="140" stroke="#1565C0" stroke-width="2"/>
<path d="M100 200 A40 40 0 0 0 90 178" stroke="#1565C0" stroke-width="1.5" fill="#BBDEFB" opacity="0.5"/>
<circle cx="60" cy="200" r="3" fill="#1565C0"/>
<text x="110" y="185" font-family="sans-serif" font-size="11" fill="#1565C0">45°</text>
<text x="120" y="230" font-family="sans-serif" font-size="12" fill="#1565C0" text-anchor="middle">острый</text>
<!-- Right angle -->
<line x1="220" y1="200" x2="340" y2="200" stroke="#2E7D32" stroke-width="2"/>
<line x1="220" y1="200" x2="220" y2="120" stroke="#2E7D32" stroke-width="2"/>
<rect x="220" y="185" width="15" height="15" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
<circle cx="220" cy="200" r="3" fill="#2E7D32"/>
<text x="245" y="170" font-family="sans-serif" font-size="11" fill="#2E7D32">90°</text>
<text x="280" y="230" font-family="sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">прямой</text>
<!-- Obtuse angle -->
<line x1="380" y1="200" x2="480" y2="200" stroke="#C62828" stroke-width="2"/>
<line x1="380" y1="200" x2="420" y2="130" stroke="#C62828" stroke-width="2"/>
<path d="M420 200 A40 40 0 0 0 408 163" stroke="#C62828" stroke-width="1.5" fill="#FFCDD2" opacity="0.5"/>
<circle cx="380" cy="200" r="3" fill="#C62828"/>
<text x="425" y="175" font-family="sans-serif" font-size="11" fill="#C62828">135°</text>
<text x="430" y="230" font-family="sans-serif" font-size="12" fill="#C62828" text-anchor="middle">тупой</text>
<!-- Protractor at bottom -->
<rect x="80" y="255" width="340" height="70" rx="8" fill="#E8EAF6" opacity="0.5" stroke="#5C6BC0" stroke-width="1"/>
<text x="250" y="275" font-family="sans-serif" font-size="11" fill="#283593" text-anchor="middle">Транспортир</text>
<!-- Semicircle protractor -->
<path d="M130 310 A90 90 0 0 1 370 310" fill="none" stroke="#5C6BC0" stroke-width="1.5"/>
<line x1="130" y1="310" x2="370" y2="310" stroke="#5C6BC0" stroke-width="1"/>
<!-- Protractor ticks -->
<line x1="250" y1="310" x2="250" y2="298" stroke="#5C6BC0" stroke-width="1"/>
<text x="250" y="296" font-family="sans-serif" font-size="8" fill="#283593" text-anchor="middle">90°</text>
<line x1="190" y1="310" x2="192" y2="300" stroke="#5C6BC0" stroke-width="0.5"/>
<line x1="310" y1="310" x2="308" y2="300" stroke="#5C6BC0" stroke-width="0.5"/>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#444" opacity="0.5" text-anchor="middle">Угол и его виды</text>
</svg>