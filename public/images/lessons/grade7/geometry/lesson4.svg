<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#F3E5F5"/>
<!-- Triangle -->
<polygon points="250,40 70,290 430,290" fill="none" stroke="#6A1B9A" stroke-width="2"/>
<circle cx="250" cy="40" r="4" fill="#6A1B9A"/>
<circle cx="70" cy="290" r="4" fill="#6A1B9A"/>
<circle cx="430" cy="290" r="4" fill="#6A1B9A"/>
<!-- Median (vertex to midpoint of opposite side) -->
<line x1="250" y1="40" x2="250" y2="290" stroke="#D32F2F" stroke-width="2" stroke-dasharray="6,3"/>
<circle cx="250" cy="290" r="3" fill="#D32F2F"/>
<text x="260" y="170" font-family="sans-serif" font-size="10" fill="#D32F2F">медиана</text>
<!-- Bisector (splits angle) -->
<line x1="70" y1="290" x2="240" y2="165" stroke="#1565C0" stroke-width="2" stroke-dasharray="6,3"/>
<path d="M90 290 A20 20 0 0 1 95 275" stroke="#1565C0" stroke-width="1.5" fill="none"/>
<path d="M85 280 A15 15 0 0 1 95 275" stroke="#1565C0" stroke-width="1.5" fill="none"/>
<text x="130" y="240" font-family="sans-serif" font-size="10" fill="#1565C0">биссектриса</text>
<!-- Altitude (perpendicular to opposite side) -->
<line x1="430" y1="290" x2="300" y2="130" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6,3"/>
<!-- Right angle mark at foot -->
<rect x="290" y="260" width="10" height="10" fill="none" stroke="#2E7D32" stroke-width="1"/>
<text x="370" y="220" font-family="sans-serif" font-size="10" fill="#2E7D32">высота</text>
<!-- Legend -->
<rect x="320" y="30" width="165" height="80" rx="6" fill="white" opacity="0.8" stroke="#6A1B9A" stroke-width="1"/>
<line x1="335" y1="50" x2="365" y2="50" stroke="#D32F2F" stroke-width="2" stroke-dasharray="6,3"/>
<text x="375" y="54" font-family="sans-serif" font-size="10" fill="#D32F2F">Медиана</text>
<line x1="335" y1="70" x2="365" y2="70" stroke="#1565C0" stroke-width="2" stroke-dasharray="6,3"/>
<text x="375" y="74" font-family="sans-serif" font-size="10" fill="#1565C0">Биссектриса</text>
<line x1="335" y1="90" x2="365" y2="90" stroke="#2E7D32" stroke-width="2" stroke-dasharray="6,3"/>
<text x="375" y="94" font-family="sans-serif" font-size="10" fill="#2E7D32">Высота</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#6A1B9A" opacity="0.5" text-anchor="middle">Медианы, биссектрисы, высоты</text>
</svg>