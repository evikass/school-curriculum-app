<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FBE9E7"/>
<!-- Possible triangle: 3, 4, 5 -->
<text x="120" y="30" font-family="sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">Возможно ✓</text>
<polygon points="120,50 40,190 200,190" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2.5"/>
<text x="75" y="135" font-family="sans-serif" font-size="12" fill="#2E7D32">3</text>
<text x="150" y="135" font-family="sans-serif" font-size="12" fill="#2E7D32">5</text>
<text x="120" y="210" font-family="sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle">4</text>
<text x="120" y="230" font-family="monospace" font-size="11" fill="#2E7D32" text-anchor="middle">3+4>5, 3+5>4, 4+5>3</text>
<!-- Impossible triangle: 1, 2, 8 -->
<text x="380" y="30" font-family="sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">Невозможно ✗</text>
<!-- Broken/open triangle -->
<line x1="340" y1="50" x2="300" y2="190" stroke="#C62828" stroke-width="2.5"/>
<line x1="300" y1="190" x2="420" y2="190" stroke="#C62828" stroke-width="2.5"/>
<line x1="340" y1="50" x2="390" y2="145" stroke="#C62828" stroke-width="2.5" stroke-dasharray="5,4"/>
<circle cx="340" cy="50" r="3" fill="#C62828"/>
<circle cx="300" cy="190" r="3" fill="#C62828"/>
<circle cx="420" cy="190" r="3" fill="#C62828"/>
<circle cx="390" cy="145" r="3" fill="none" stroke="#C62828" stroke-width="1.5"/>
<text x="310" y="130" font-family="sans-serif" font-size="12" fill="#C62828">1</text>
<text x="400" y="110" font-family="sans-serif" font-size="12" fill="#C62828">8</text>
<text x="360" y="210" font-family="sans-serif" font-size="12" fill="#C62828" text-anchor="middle">2</text>
<text x="380" y="230" font-family="monospace" font-size="11" fill="#C62828" text-anchor="middle">1+2<8 ✗</text>
<!-- Rule box -->
<rect x="60" y="260" width="380" height="60" rx="8" fill="#FFCCBC" opacity="0.5" stroke="#BF360C" stroke-width="1"/>
<text x="250" y="285" font-family="sans-serif" font-size="14" fill="#BF360C" text-anchor="middle" font-weight="bold">Неравенство треугольника</text>
<text x="250" y="305" font-family="monospace" font-size="12" fill="#BF360C" text-anchor="middle">a + b > c  (каждая сторона)</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#BF360C" opacity="0.5" text-anchor="middle">Неравенство треугольника</text>
</svg>