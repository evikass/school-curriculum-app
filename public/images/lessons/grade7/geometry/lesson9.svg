<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="50%" stop-color="#B2DFDB"/>
      <stop offset="100%" stop-color="#80CBC4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg9)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle" font-family="Arial">Первый признак равенства треугольников</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 9</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#00897B" stroke-opacity="0.3"/>

  <!-- Panel 1: SAS Theorem statement -->
  <rect x="12" y="58" width="476" height="42" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="73" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle">СУС — Сторона, Угол, Сторона</text>
  <text x="250" y="88" font-size="8" fill="#004D40" text-anchor="middle">Если две стороны и угол между ними одного треугольника равны двум сторонам и углу между ними другого, то треугольники равны</text>

  <!-- Panel 2: Triangle 1 -->
  <rect x="12" y="108" width="155" height="130" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="89" y="123" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">△ABC</text>
  <polygon points="89,135 35,225 155,210" fill="none" stroke="#00695C" stroke-width="2"/>
  <circle cx="89" cy="135" r="3" fill="#00695C"/>
  <circle cx="35" cy="225" r="3" fill="#00695C"/>
  <circle cx="155" cy="210" r="3" fill="#00695C"/>
  <text x="89" y="131" font-size="8" fill="#00695C" font-style="italic">A</text>
  <text x="22" y="228" font-size="8" fill="#00695C" font-style="italic">B</text>
  <text x="160" y="213" font-size="8" fill="#00695C" font-style="italic">C</text>
  <!-- Mark equal sides -->
  <line x1="65" y1="176" x2="61" y2="180" stroke="#E53935" stroke-width="1.5"/>
  <line x1="67" y1="174" x2="63" y2="178" stroke="#E53935" stroke-width="1.5"/>
  <text x="50" y="172" font-size="7" fill="#C62828" font-weight="bold">AB</text>
  <line x1="118" y1="170" x2="122" y2="174" stroke="#E53935" stroke-width="1.5"/>
  <line x1="116" y1="168" x2="120" y2="172" stroke="#E53935" stroke-width="1.5"/>
  <text x="132" y="168" font-size="7" fill="#C62828" font-weight="bold">AC</text>
  <!-- Angle mark at A -->
  <path d="M80,148 A12,12 0 0,1 98,148" fill="none" stroke="#1565C0" stroke-width="2"/>
  <text x="89" y="155" font-size="7" fill="#1565C0" font-weight="bold">∠A</text>

  <!-- Panel 3: Triangle 2 -->
  <rect x="175" y="108" width="155" height="130" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="252" y="123" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">△A1B1C1</text>
  <polygon points="252,135 198,225 318,210" fill="none" stroke="#00695C" stroke-width="2"/>
  <circle cx="252" cy="135" r="3" fill="#00695C"/>
  <circle cx="198" cy="225" r="3" fill="#00695C"/>
  <circle cx="318" cy="210" r="3" fill="#00695C"/>
  <text x="252" y="131" font-size="8" fill="#00695C" font-style="italic">A1</text>
  <text x="185" y="228" font-size="8" fill="#00695C" font-style="italic">B1</text>
  <text x="323" y="213" font-size="8" fill="#00695C" font-style="italic">C1</text>
  <!-- Mark equal sides -->
  <line x1="228" y1="176" x2="224" y2="180" stroke="#E53935" stroke-width="1.5"/>
  <line x1="230" y1="174" x2="226" y2="178" stroke="#E53935" stroke-width="1.5"/>
  <text x="213" y="172" font-size="7" fill="#C62828" font-weight="bold">A1B1</text>
  <line x1="281" y1="170" x2="285" y2="174" stroke="#E53935" stroke-width="1.5"/>
  <line x1="279" y1="168" x2="283" y2="172" stroke="#E53935" stroke-width="1.5"/>
  <text x="295" y="168" font-size="7" fill="#C62828" font-weight="bold">A1C1</text>
  <!-- Angle mark at A1 -->
  <path d="M243,148 A12,12 0 0,1 261,148" fill="none" stroke="#1565C0" stroke-width="2"/>
  <text x="252" y="155" font-size="7" fill="#1565C0" font-weight="bold">∠A1</text>
  <!-- Equal signs -->
  <rect x="188" y="160" width="130" height="32" rx="3" fill="#E0F2F1" fill-opacity="0.7" stroke="#00897B" stroke-width="0.5"/>
  <text x="252" y="174" font-size="7" fill="#004D40" text-anchor="middle">AB = A1B1</text>
  <text x="252" y="186" font-size="7" fill="#004D40" text-anchor="middle">AC = A1C1, ∠A = ∠A1</text>

  <!-- Panel 4: Proof steps -->
  <rect x="338" y="108" width="150" height="130" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="413" y="123" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Доказательство</text>
  <rect x="348" y="130" width="130" height="16" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.4"/>
  <text x="413" y="142" font-size="7" fill="#004D40" text-anchor="middle">1. Наложим △ABC на △A1B1C1</text>
  <rect x="348" y="150" width="130" height="16" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.4"/>
  <text x="413" y="162" font-size="7" fill="#004D40" text-anchor="middle">2. A → A1 (∠A = ∠A1)</text>
  <rect x="348" y="170" width="130" height="16" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.4"/>
  <text x="413" y="182" font-size="7" fill="#004D40" text-anchor="middle">3. AB → A1B1 (AB = A1B1)</text>
  <rect x="348" y="190" width="130" height="16" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.4"/>
  <text x="413" y="202" font-size="7" fill="#004D40" text-anchor="middle">4. AC → A1C1 (AC = A1C1)</text>
  <rect x="348" y="210" width="130" height="16" rx="3" fill="#00695C" fill-opacity="0.15"/>
  <text x="413" y="222" font-size="7.5" fill="#004D40" text-anchor="middle" font-weight="bold">=> B → B1, C → C1</text>
  <rect x="348" y="230" width="130" height="6" rx="1" fill="#00695C" fill-opacity="0.3"/>

  <!-- Panel 5: Application -->
  <rect x="12" y="246" width="235" height="62" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="261" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Применение</text>
  <rect x="22" y="268" width="215" height="32" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.5"/>
  <text x="129" y="280" font-size="7" fill="#004D40" text-anchor="middle">Достаточно проверить равенство</text>
  <text x="129" y="292" font-size="7" fill="#004D40" text-anchor="middle" font-weight="bold">двух сторон и угла между ними</text>

  <!-- Panel 6: Sign summary -->
  <rect x="255" y="246" width="233" height="62" rx="6" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="261" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Признаки (итог)</text>
  <rect x="265" y="268" width="60" height="30" rx="3" fill="#00695C" fill-opacity="0.2" stroke="#00695C" stroke-width="1"/>
  <text x="295" y="284" font-size="8" fill="#004D40" text-anchor="middle" font-weight="bold">СУС</text>
  <text x="295" y="294" font-size="6" fill="#004D40" text-anchor="middle">I признак</text>
  <rect x="333" y="268" width="60" height="30" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.5"/>
  <text x="363" y="284" font-size="8" fill="#00695C" text-anchor="middle">УСУ</text>
  <text x="363" y="294" font-size="6" fill="#555" text-anchor="middle">II признак</text>
  <rect x="401" y="268" width="77" height="30" rx="3" fill="#E0F2F1" stroke="#00897B" stroke-width="0.5"/>
  <text x="439" y="284" font-size="8" fill="#00695C" text-anchor="middle">ССС</text>
  <text x="439" y="294" font-size="6" fill="#555" text-anchor="middle">III признак</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#00897B" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">I признак (СУС): AB=A1B1, AC=A1C1, ∠A=∠A1 => △ABC = △A1B1C1</text>
</svg>