<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="50%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg8)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AD1457" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle" font-family="Arial">Треугольник</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 8</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#E91E63" stroke-opacity="0.3"/>

  <!-- Panel 1: Triangle ABC -->
  <rect x="12" y="58" width="235" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#E91E63" stroke-width="1"/>
  <text x="129" y="73" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Треугольник ABC</text>
  <!-- Triangle -->
  <polygon points="70,165 25,90 185,110" fill="#FCE4EC" fill-opacity="0.5" stroke="#AD1457" stroke-width="2"/>
  <!-- Vertices -->
  <circle cx="70" cy="165" r="3.5" fill="#AD1457"/>
  <circle cx="25" cy="90" r="3.5" fill="#AD1457"/>
  <circle cx="185" cy="110" r="3.5" fill="#AD1457"/>
  <text x="70" y="178" font-size="9" fill="#AD1457" font-style="italic">A</text>
  <text x="15" y="88" font-size="9" fill="#AD1457" font-style="italic">B</text>
  <text x="190" y="108" font-size="9" fill="#AD1457" font-style="italic">C</text>
  <!-- Side labels -->
  <text x="42" y="134" font-size="7" fill="#C62828" text-anchor="middle">AB</text>
  <text x="132" y="128" font-size="7" fill="#1565C0" text-anchor="middle">AC</text>
  <text x="52" y="172" font-size="7" fill="#2E7D32" text-anchor="middle">BC</text>
  <!-- Angle marks -->
  <path d="M35,96 A12,12 0 0,1 42,104" fill="none" stroke="#E91E63" stroke-width="1"/>
  <path d="M180,110 A10,10 0 0,1 175,118" fill="none" stroke="#E91E63" stroke-width="1"/>
  <path d="M70,156 A10,10 0 0,1 62,160" fill="none" stroke="#E91E63" stroke-width="1"/>
  <!-- Perimeter -->
  <rect x="100" y="155" width="140" height="14" rx="3" fill="#AD1457" fill-opacity="0.12"/>
  <text x="170" y="166" font-size="8" fill="#880E4F" text-anchor="middle" font-weight="bold">P = AB + BC + AC</text>

  <!-- Panel 2: Triangle elements -->
  <rect x="255" y="58" width="233" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#E91E63" stroke-width="1"/>
  <text x="371" y="73" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Элементы треугольника</text>
  <rect x="265" y="80" width="213" height="18" rx="3" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.5"/>
  <text x="371" y="93" font-size="7.5" fill="#880E4F" text-anchor="middle">3 вершины: A, B, C</text>
  <rect x="265" y="102" width="213" height="18" rx="3" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.5"/>
  <text x="371" y="115" font-size="7.5" fill="#880E4F" text-anchor="middle">3 стороны: AB, BC, AC</text>
  <rect x="265" y="124" width="213" height="18" rx="3" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.5"/>
  <text x="371" y="137" font-size="7.5" fill="#880E4F" text-anchor="middle">3 угла: ∠A, ∠B, ∠C</text>
  <rect x="265" y="146" width="213" height="24" rx="3" fill="#AD1457" fill-opacity="0.1"/>
  <text x="371" y="157" font-size="7.5" fill="#880E4F" text-anchor="middle" font-weight="bold">∠A + ∠B + ∠C = 180°</text>
  <text x="371" y="167" font-size="7" fill="#880E4F" text-anchor="middle">Обозначение: △ABC</text>

  <!-- Panel 3: Types by sides -->
  <rect x="12" y="184" width="476" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#E91E63" stroke-width="1"/>
  <text x="250" y="199" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Виды треугольников по сторонам</text>

  <!-- Equilateral -->
  <rect x="20" y="207" width="148" height="86" rx="4" fill="#FCE4EC" fill-opacity="0.5" stroke="#E91E63" stroke-width="0.5"/>
  <text x="94" y="219" font-size="7" font-weight="bold" fill="#AD1457" text-anchor="middle">Равносторонний</text>
  <polygon points="94,230 60,285 128,285" fill="none" stroke="#AD1457" stroke-width="1.8"/>
  <circle cx="94" cy="230" r="2" fill="#AD1457"/>
  <circle cx="60" cy="285" r="2" fill="#AD1457"/>
  <circle cx="128" cy="285" r="2" fill="#AD1457"/>
  <!-- Equal marks on all sides -->
  <line x1="80" y1="254" x2="76" y2="258" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="82" y1="252" x2="78" y2="256" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="107" y1="254" x2="111" y2="258" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="105" y1="252" x2="109" y2="256" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="88" y1="285" x2="100" y2="285" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="88" y1="282" x2="100" y2="282" stroke="#E91E63" stroke-width="1.5"/>
  <text x="94" y="298" font-size="6.5" fill="#AD1457" text-anchor="middle">AB = BC = AC</text>

  <!-- Isosceles -->
  <rect x="176" y="207" width="148" height="86" rx="4" fill="#FCE4EC" fill-opacity="0.5" stroke="#E91E63" stroke-width="0.5"/>
  <text x="250" y="219" font-size="7" font-weight="bold" fill="#AD1457" text-anchor="middle">Равнобедренный</text>
  <polygon points="250,230 210,285 290,285" fill="none" stroke="#AD1457" stroke-width="1.8"/>
  <circle cx="250" cy="230" r="2" fill="#AD1457"/>
  <circle cx="210" cy="285" r="2" fill="#AD1457"/>
  <circle cx="290" cy="285" r="2" fill="#AD1457"/>
  <!-- Equal marks on AB and AC -->
  <line x1="234" y1="254" x2="230" y2="258" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="236" y1="252" x2="232" y2="256" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="266" y1="254" x2="270" y2="258" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="264" y1="252" x2="268" y2="256" stroke="#E91E63" stroke-width="1.5"/>
  <!-- Different mark on BC -->
  <line x1="244" y1="285" x2="256" y2="285" stroke="#E91E63" stroke-width="1.5"/>
  <text x="250" y="298" font-size="6.5" fill="#AD1457" text-anchor="middle">AB = AC ≠ BC</text>

  <!-- Scalene -->
  <rect x="332" y="207" width="148" height="86" rx="4" fill="#FCE4EC" fill-opacity="0.5" stroke="#E91E63" stroke-width="0.5"/>
  <text x="406" y="219" font-size="7" font-weight="bold" fill="#AD1457" text-anchor="middle">Разносторонний</text>
  <polygon points="406,228 358,285 455,285" fill="none" stroke="#AD1457" stroke-width="1.8"/>
  <circle cx="406" cy="228" r="2" fill="#AD1457"/>
  <circle cx="358" cy="285" r="2" fill="#AD1457"/>
  <circle cx="455" cy="285" r="2" fill="#AD1457"/>
  <!-- Different marks on each side -->
  <line x1="386" y1="254" x2="382" y2="258" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="424" y1="256" x2="429" y2="260" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="424" y1="254" x2="429" y2="258" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="395" y1="285" x2="407" y2="285" stroke="#E91E63" stroke-width="1.5"/>
  <line x1="395" y1="282" x2="407" y2="282" stroke="#E91E63" stroke-width="1.5"/>
  <text x="406" y="298" font-size="6.5" fill="#AD1457" text-anchor="middle">AB ≠ BC ≠ AC</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#E91E63" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Треугольник — три точки, не лежащие на одной прямой, и три отрезка P = a+b+c</text>
</svg>