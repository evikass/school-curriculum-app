<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#FFF8E1"/>
<!-- Triangle with colored corners -->
<polygon points="250,60 70,270 430,270" fill="none" stroke="#F57F17" stroke-width="2.5"/>
<!-- Torn corner pieces below the triangle -->
<!-- Corner 1 - from vertex A (top) -->
<polygon points="235,60 250,45 265,60" fill="#E53935" stroke="#C62828" stroke-width="1.5"/>
<path d="M250 60 L235 75 L220 60" fill="none" stroke="#E53935" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="250" y="55" font-family="sans-serif" font-size="9" fill="#C62828" text-anchor="middle">α</text>
<!-- Corner 2 - from vertex B (bottom-left) -->
<polygon points="70,270 55,255 70,240" fill="#1E88E5" stroke="#1565C0" stroke-width="1.5"/>
<path d="M70 270 L85 255 L70 240" fill="none" stroke="#1E88E5" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="95" y="252" font-family="sans-serif" font-size="9" fill="#1565C0">β</text>
<!-- Corner 3 - from vertex C (bottom-right) -->
<polygon points="430,270 445,255 430,240" fill="#43A047" stroke="#2E7D32" stroke-width="1.5"/>
<path d="M430 270 L415 255 L430 240" fill="none" stroke="#43A047" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="400" y="252" font-family="sans-serif" font-size="9" fill="#2E7D32">γ</text>
<!-- Arrow showing corners come together -->
<path d="M230 70 C200 120 180 160 180 200" stroke="#E53935" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
<path d="M80 250 C120 240 150 230 170 210" stroke="#1E88E5" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
<path d="M420 250 C380 240 350 230 310 210" stroke="#43A047" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
<!-- Straight line = 180° at bottom -->
<line x1="150" y1="300" x2="350" y2="300" stroke="#333" stroke-width="2"/>
<polygon points="350,300 342,296 342,304" fill="#333"/>
<polygon points="150,300 158,296 158,304" fill="#333"/>
<!-- Colored angles on the line -->
<polygon points="200,300 200,285 230,300" fill="#E53935" opacity="0.6"/>
<polygon points="230,300 260,285 260,300" fill="#1E88E5" opacity="0.6"/>
<polygon points="260,300 290,285 300,300" fill="#43A047" opacity="0.6"/>
<text x="215" y="296" font-family="sans-serif" font-size="9" fill="#C62828">α</text>
<text x="243" y="296" font-family="sans-serif" font-size="9" fill="#1565C0">β</text>
<text x="278" y="296" font-family="sans-serif" font-size="9" fill="#2E7D32">γ</text>
<!-- 180° label -->
<text x="250" y="325" font-family="sans-serif" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">α + β + γ = 180°</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#F57F17" opacity="0.5" text-anchor="middle">Сумма углов треугольника</text>
</svg>