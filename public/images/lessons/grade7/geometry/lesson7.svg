<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </linearGradient>
    <marker id="arrowR7" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#283593"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg7)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Перпендикулярные прямые</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 7</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3F51B5" stroke-opacity="0.3"/>

  <!-- Panel 1: Perpendicular lines -->
  <rect x="12" y="58" width="170" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="97" y="73" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">a ⊥ b</text>
  <!-- Horizontal line -->
  <line x1="25" y1="125" x2="165" y2="125" stroke="#283593" stroke-width="2"/>
  <text x="170" y="128" font-size="8" fill="#283593" font-style="italic">a</text>
  <!-- Vertical line -->
  <line x1="97" y1="82" x2="97" y2="165" stroke="#3F51B5" stroke-width="2"/>
  <text x="103" y="82" font-size="8" fill="#3F51B5" font-style="italic">b</text>
  <!-- Right angle mark -->
  <rect x="97" y="111" width="14" height="14" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <!-- 90° label -->
  <text x="120" y="108" font-size="8" fill="#C62828" font-weight="bold">90°</text>
  <!-- Intersection point -->
  <circle cx="97" cy="125" r="3" fill="#E53935"/>
  <text x="85" y="118" font-size="7" fill="#E53935" font-style="italic">O</text>
  <text x="97" y="170" font-size="7" fill="#555" text-anchor="middle">При пересечении — 4 прямых угла</text>

  <!-- Panel 2: Construction with compass -->
  <rect x="190" y="58" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="265" y="73" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Построение</text>
  <!-- Line a -->
  <line x1="200" y1="130" x2="330" y2="130" stroke="#283593" stroke-width="1.5"/>
  <text x="335" y="133" font-size="7" fill="#283593" font-style="italic">a</text>
  <!-- Point M -->
  <circle cx="265" cy="115" r="3" fill="#E53935"/>
  <text x="265" y="110" font-size="7" fill="#C62828" font-style="italic">M</text>
  <!-- Construction arcs -->
  <path d="M252,130 A13,13 0 0,1 278,130" fill="none" stroke="#3F51B5" stroke-width="0.8" stroke-dasharray="3,2"/>
  <circle cx="252" cy="130" r="2" fill="#3F51B5"/>
  <circle cx="278" cy="130" r="2" fill="#3F51B5"/>
  <!-- Upper arcs -->
  <path d="M252,130 A20,20 0 0,0 265,105" fill="none" stroke="#9C27B0" stroke-width="0.7" stroke-dasharray="2,2"/>
  <path d="M278,130 A20,20 0 0,0 265,105" fill="none" stroke="#9C27B0" stroke-width="0.7" stroke-dasharray="2,2"/>
  <!-- Perpendicular line -->
  <line x1="265" y1="85" x2="265" y2="165" stroke="#E53935" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="272" y="90" font-size="7" fill="#C62828" font-style="italic">b</text>
  <!-- Right angle -->
  <rect x="265" y="118" width="8" height="8" fill="none" stroke="#E53935" stroke-width="1"/>
  <!-- Steps -->
  <text x="265" y="170" font-size="6" fill="#555" text-anchor="middle">Циркулем и линейкой</text>

  <!-- Panel 3: Property -->
  <rect x="348" y="58" width="140" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="418" y="73" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Свойство</text>
  <rect x="358" y="80" width="120" height="28" rx="3" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.5"/>
  <text x="418" y="93" font-size="7" fill="#1A237E" text-anchor="middle">Через точку — только</text>
  <text x="418" y="103" font-size="7" fill="#1A237E" text-anchor="middle" font-weight="bold">одна перпендикулярная</text>
  <!-- Visual -->
  <line x1="363" y1="130" x2="473" y2="130" stroke="#283593" stroke-width="1.2"/>
  <text x="478" y="133" font-size="6" fill="#283593" font-style="italic">a</text>
  <circle cx="418" cy="115" r="3" fill="#E53935"/>
  <text x="418" y="110" font-size="6" fill="#C62828">M</text>
  <line x1="418" y1="115" x2="418" y2="135" stroke="#E53935" stroke-width="1.5"/>
  <rect x="418" y="124" width="6" height="6" fill="none" stroke="#E53935" stroke-width="0.8"/>
  <!-- Oblique line (dashed) -->
  <line x1="418" y1="115" x2="460" y2="132" stroke="#9C27B0" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="468" y="128" font-size="6" fill="#9C27B0">наклонная</text>
  <text x="418" y="150" font-size="6.5" fill="#555" text-anchor="middle">Перпендикуляр —</text>
  <text x="418" y="160" font-size="6.5" fill="#555" text-anchor="middle">кратчайшее</text>
  <text x="418" y="170" font-size="6.5" fill="#555" text-anchor="middle">расстояние</text>

  <!-- Panel 4: Not perpendicular vs perpendicular -->
  <rect x="12" y="184" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="89" y="199" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Сравнение</text>
  <!-- Not perpendicular -->
  <line x1="22" y1="225" x2="150" y2="225" stroke="#283593" stroke-width="1.5"/>
  <line x1="50" y1="205" x2="120" y2="250" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="155" y="228" font-size="6" fill="#283593" font-style="italic">a</text>
  <path d="M53,228 A10,10 0 0,1 60,232" fill="none" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="72" y="238" font-size="6" fill="#9C27B0">≠ 90°</text>
  <!-- Perpendicular -->
  <line x1="22" y1="275" x2="150" y2="275" stroke="#283593" stroke-width="1.5"/>
  <line x1="89" y1="255" x2="89" y2="295" stroke="#E53935" stroke-width="1.5"/>
  <rect x="89" y="265" width="10" height="10" fill="none" stroke="#E53935" stroke-width="1"/>
  <text x="78" y="265" font-size="6" fill="#E53935" font-style="italic">90°</text>
  <text x="89" y="305" font-size="6.5" fill="#555" text-anchor="middle">a ⊥ b ↔ угол = 90°</text>

  <!-- Panel 5: Theorem proof -->
  <rect x="175" y="184" width="155" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="252" y="199" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Теорема</text>
  <rect x="185" y="207" width="135" height="30" rx="3" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.5"/>
  <text x="252" y="220" font-size="7" fill="#1A237E" text-anchor="middle">Если две прямые</text>
  <text x="252" y="232" font-size="7" fill="#1A237E" text-anchor="middle">перпенд. третьей, то они ∥</text>
  <!-- Visual proof -->
  <line x1="195" y1="260" x2="315" y2="260" stroke="#283593" stroke-width="1"/>
  <text x="320" y="263" font-size="6" fill="#283593" font-style="italic">c</text>
  <line x1="220" y1="248" x2="220" y2="275" stroke="#E53935" stroke-width="1.2"/>
  <line x1="290" y1="248" x2="290" y2="275" stroke="#E53935" stroke-width="1.2"/>
  <rect x="220" y="254" width="6" height="6" fill="none" stroke="#E53935" stroke-width="0.8"/>
  <rect x="290" y="254" width="6" height="6" fill="none" stroke="#E53935" stroke-width="0.8"/>
  <text x="215" y="245" font-size="6" fill="#E53935" font-style="italic">a</text>
  <text x="295" y="245" font-size="6" fill="#E53935" font-style="italic">b</text>
  <line x1="226" y1="250" x2="284" y2="250" stroke="#3F51B5" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="252" y="247" font-size="6" fill="#3F51B5">a ∥ b</text>
  <text x="252" y="292" font-size="6.5" fill="#555" text-anchor="middle">a ⊥ c и b ⊥ c => a ∥ b</text>

  <!-- Panel 6: Key facts -->
  <rect x="338" y="184" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#3F51B5" stroke-width="1"/>
  <text x="413" y="199" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Ключевые факты</text>
  <rect x="348" y="207" width="130" height="18" rx="3" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.4"/>
  <text x="413" y="220" font-size="7" fill="#1A237E" text-anchor="middle">a ⊥ b ↔ ∠ = 90°</text>
  <rect x="348" y="229" width="130" height="18" rx="3" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.4"/>
  <text x="413" y="242" font-size="7" fill="#1A237E" text-anchor="middle">Единственность через точку</text>
  <rect x="348" y="251" width="130" height="18" rx="3" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.4"/>
  <text x="413" y="264" font-size="7" fill="#1A237E" text-anchor="middle">2 ⊥ 3-й => ∥</text>
  <rect x="348" y="273" width="130" height="22" rx="3" fill="#283593" fill-opacity="0.12"/>
  <text x="413" y="285" font-size="7" fill="#1A237E" text-anchor="middle">Перпендикуляр —</text>
  <text x="413" y="293" font-size="7" fill="#1A237E" text-anchor="middle">кратчайшее расстояние</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#3F51B5" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Две прямые перпендикулярны, если при пересечении образуют прямой угол (90°)</text>
</svg>