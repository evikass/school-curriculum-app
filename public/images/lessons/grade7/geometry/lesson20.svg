<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="50%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#FFAB91"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg20)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#BF360C" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#8B1A00" text-anchor="middle" font-family="Arial">Прямоугольные треугольники</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Геометрия 7 класс — Урок 20</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#FF5722" stroke-opacity="0.3"/>

  <!-- Panel 1: Right triangle with labels -->
  <rect x="12" y="58" width="165" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="94" y="73" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">Прямоугольный △</text>
  <!-- Right triangle -->
  <polygon points="35,165 35,88 155,165" fill="#FBE9E7" fill-opacity="0.4" stroke="#BF360C" stroke-width="2"/>
  <circle cx="35" cy="165" r="3" fill="#BF360C"/>
  <circle cx="35" cy="88" r="3" fill="#BF360C"/>
  <circle cx="155" cy="165" r="3" fill="#BF360C"/>
  <text x="25" y="170" font-size="8" fill="#BF360C" font-style="italic">C</text>
  <text x="25" y="85" font-size="8" fill="#BF360C" font-style="italic">A</text>
  <text x="160" y="170" font-size="8" fill="#BF360C" font-style="italic">B</text>
  <!-- Right angle mark at C -->
  <rect x="35" y="153" width="12" height="12" fill="none" stroke="#E53935" stroke-width="1.5"/>
  <!-- Hypotenuse label -->
  <line x1="45" y1="88" x2="50" y2="95" stroke="#E53935" stroke-width="1.5"/>
  <line x1="48" y1="86" x2="53" y2="93" stroke="#E53935" stroke-width="1.5"/>
  <text x="102" y="120" font-size="7.5" fill="#E53935" font-weight="bold" transform="rotate(-33,102,120)">AB — гипотенуза</text>
  <!-- Legs labels -->
  <text x="30" y="130" font-size="7" fill="#1565C0">AC</text>
  <text x="30" y="140" font-size="7" fill="#1565C0">катет</text>
  <text x="85" y="175" font-size="7" fill="#43A047">BC — катет</text>

  <!-- Panel 2: Properties -->
  <rect x="185" y="58" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="260" y="73" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">Свойства</text>
  <rect x="195" y="80" width="130" height="20" rx="3" fill="#FBE9E7" stroke="#FF5722" stroke-width="0.5"/>
  <text x="260" y="95" font-size="7.5" fill="#8B1A00" text-anchor="middle">Гипотенуза &gt; любого катета</text>
  <rect x="195" y="104" width="130" height="20" rx="3" fill="#FBE9E7" stroke="#FF5722" stroke-width="0.5"/>
  <text x="260" y="119" font-size="7.5" fill="#8B1A00" text-anchor="middle">∠A + ∠B = 90°</text>
  <rect x="195" y="128" width="130" height="20" rx="3" fill="#FBE9E7" stroke="#FF5722" stroke-width="0.5"/>
  <text x="260" y="143" font-size="7.5" fill="#8B1A00" text-anchor="middle">∠C = 90° (прямой)</text>
  <rect x="195" y="152" width="130" height="18" rx="3" fill="#BF360C" fill-opacity="0.12"/>
  <text x="260" y="165" font-size="7" fill="#8B1A00" text-anchor="middle" font-weight="bold">Катет &lt; гипотенузы</text>

  <!-- Panel 3: Signs of equality -->
  <rect x="343" y="58" width="145" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="415" y="73" font-size="9" font-weight="bold" fill="#BF360C" text-anchor="middle">Признаки равенства</text>
  <!-- By hypotenuse and leg -->
  <rect x="353" y="80" width="125" height="28" rx="3" fill="#FFF3E0" stroke="#FF5722" stroke-width="0.5"/>
  <text x="415" y="92" font-size="7" fill="#8B1A00" text-anchor="middle" font-weight="bold">По гипотенузе и катету</text>
  <text x="415" y="104" font-size="6.5" fill="#555" text-anchor="middle">Если гип. и катет =</text>
  <!-- By hypotenuse and acute angle -->
  <rect x="353" y="112" width="125" height="28" rx="3" fill="#FFF3E0" stroke="#FF5722" stroke-width="0.5"/>
  <text x="415" y="124" font-size="7" fill="#8B1A00" text-anchor="middle" font-weight="bold">По гип. и острому ∠</text>
  <text x="415" y="136" font-size="6.5" fill="#555" text-anchor="middle">Если гип. и острый ∠ =</text>
  <!-- By two legs -->
  <rect x="353" y="144" width="125" height="28" rx="3" fill="#FFF3E0" stroke="#FF5722" stroke-width="0.5"/>
  <text x="415" y="156" font-size="7" fill="#8B1A00" text-anchor="middle" font-weight="bold">По двум катетам</text>
  <text x="415" y="168" font-size="6.5" fill="#555" text-anchor="middle">Если оба катета =</text>

  <!-- Panel 4: Two right triangles comparison -->
  <rect x="12" y="184" width="165" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="94" y="199" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">По гипотенузе и катету</text>
  <!-- Triangle 1 -->
  <polygon points="30,280 30,235 90,280" fill="none" stroke="#BF360C" stroke-width="1.5"/>
  <rect x="30" y="270" width="8" height="8" fill="none" stroke="#BF360C" stroke-width="1"/>
  <!-- Mark hypotenuse -->
  <line x1="52" y1="240" x2="56" y2="244" stroke="#E53935" stroke-width="1.5"/>
  <line x1="54" y1="238" x2="58" y2="242" stroke="#E53935" stroke-width="1.5"/>
  <!-- Mark leg -->
  <line x1="55" y1="280" x2="65" y2="280" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="55" y1="277" x2="65" y2="277" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Triangle 2 -->
  <polygon points="105,280 105,235 165,280" fill="none" stroke="#FF5722" stroke-width="1.5"/>
  <rect x="105" y="270" width="8" height="8" fill="none" stroke="#FF5722" stroke-width="1"/>
  <!-- Mark hypotenuse equal -->
  <line x1="127" y1="240" x2="131" y2="244" stroke="#E53935" stroke-width="1.5"/>
  <line x1="129" y1="238" x2="133" y2="242" stroke="#E53935" stroke-width="1.5"/>
  <!-- Mark leg equal -->
  <line x1="130" y1="280" x2="140" y2="280" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="130" y1="277" x2="140" y2="277" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Equal sign -->
  <text x="97" y="260" font-size="10" fill="#BF360C" font-weight="bold">=</text>
  <text x="94" y="298" font-size="6.5" fill="#8B1A00" text-anchor="middle">Гипотенуза + катет => △ равны</text>

  <!-- Panel 5: Distance from point to line -->
  <rect x="185" y="184" width="145" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="257" y="199" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">Расст. от точки до прямой</text>
  <!-- Line a -->
  <line x1="195" y1="265" x2="320" y2="265" stroke="#BF360C" stroke-width="1.5"/>
  <text x="323" y="268" font-size="7" fill="#BF360C" font-style="italic">a</text>
  <!-- Point M -->
  <circle cx="257" cy="225" r="3.5" fill="#E53935"/>
  <text x="265" y="223" font-size="7" fill="#E53935" font-style="italic">M</text>
  <!-- Perpendicular MH -->
  <line x1="257" y1="225" x2="257" y2="265" stroke="#E53935" stroke-width="2"/>
  <circle cx="257" cy="265" r="2.5" fill="#E53935"/>
  <text x="262" y="263" font-size="6" fill="#E53935" font-style="italic">H</text>
  <rect x="257" y="255" width="7" height="7" fill="none" stroke="#E53935" stroke-width="1"/>
  <!-- Oblique lines -->
  <line x1="257" y1="225" x2="215" y2="265" stroke="#9C27B0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="257" y1="225" x2="300" y2="265" stroke="#9C27B0" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Right triangles formed -->
  <text x="230" y="250" font-size="5.5" fill="#9C27B0">MK</text>
  <text x="280" y="250" font-size="5.5" fill="#9C27B0">ML</text>
  <text x="257" y="248" font-size="6" fill="#E53935" font-weight="bold">MH</text>
  <text x="257" y="290" font-size="6.5" fill="#8B1A00" text-anchor="middle">MH ⊥ a — кратчайшее</text>
  <text x="257" y="300" font-size="6.5" fill="#8B1A00" text-anchor="middle">MH &lt; MK, MH &lt; ML</text>

  <!-- Panel 6: Acute angle sum -->
  <rect x="338" y="184" width="150" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#FF5722" stroke-width="1"/>
  <text x="413" y="199" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">Сумма острых ∠ = 90°</text>
  <!-- Right triangle -->
  <polygon points="380,280 380,215 465,280" fill="#FBE9E7" fill-opacity="0.4" stroke="#BF360C" stroke-width="1.8"/>
  <circle cx="380" cy="280" r="2.5" fill="#BF360C"/>
  <circle cx="380" cy="215" r="2.5" fill="#BF360C"/>
  <circle cx="465" cy="280" r="2.5" fill="#BF360C"/>
  <text x="372" y="283" font-size="7" fill="#BF360C" font-style="italic">C</text>
  <text x="372" y="212" font-size="7" fill="#BF360C" font-style="italic">A</text>
  <text x="470" y="283" font-size="7" fill="#BF360C" font-style="italic">B</text>
  <!-- Right angle mark -->
  <rect x="380" y="270" width="10" height="10" fill="none" stroke="#E53935" stroke-width="1.2"/>
  <!-- Angle A -->
  <path d="M387,228 A12,12 0 0,1 395,236" fill="none" stroke="#43A047" stroke-width="1.5"/>
  <text x="395" y="228" font-size="7" fill="#43A047" font-weight="bold">∠A</text>
  <!-- Angle B -->
  <path d="M455,274 A12,12 0 0,0 447,268" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <text x="445" y="265" font-size="7" fill="#1565C0" font-weight="bold">∠B</text>
  <!-- Formula -->
  <rect x="353" y="288" width="120" height="14" rx="3" fill="#BF360C" fill-opacity="0.12"/>
  <text x="413" y="299" font-size="8" fill="#8B1A00" text-anchor="middle" font-weight="bold">∠A + ∠B = 90°</text>

  <!-- Bottom bar -->
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#FF5722" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Гипотенуза &gt; катета | Сумма острых углов = 90° | Признаки: по гип.+кат., по гип.+∠</text>
</svg>