<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<rect width="500" height="350" fill="#E8EAF6"/>
<!-- First triangle -->
<polygon points="120,50 40,200 200,200" fill="none" stroke="#283593" stroke-width="2.5"/>
<circle cx="120" cy="50" r="3" fill="#283593"/>
<circle cx="40" cy="200" r="3" fill="#283593"/>
<circle cx="200" cy="200" r="3" fill="#283593"/>
<!-- Side markings: single tick -->
<line x1="75" y1="120" x2="82" y2="130" stroke="#283593" stroke-width="2"/>
<line x1="78" y1="120" x2="85" y2="130" stroke="#283593" stroke-width="2"/>
<!-- Another side marking -->
<line x1="118" y1="196" x2="122" y2="206" stroke="#283593" stroke-width="2"/>
<line x1="124" y1="196" x2="128" y2="206" stroke="#283593" stroke-width="2"/>
<!-- Angle marking -->
<path d="M55 200 A15 15 0 0 1 60 186" stroke="#283593" stroke-width="1.5" fill="none"/>
<!-- Second congruent triangle -->
<polygon points="350,50 270,200 430,200" fill="none" stroke="#283593" stroke-width="2.5"/>
<circle cx="350" cy="50" r="3" fill="#283593"/>
<circle cx="270" cy="200" r="3" fill="#283593"/>
<circle cx="430" cy="200" r="3" fill="#283593"/>
<!-- Same side markings -->
<line x1="305" y1="120" x2="312" y2="130" stroke="#283593" stroke-width="2"/>
<line x1="308" y1="120" x2="315" y2="130" stroke="#283593" stroke-width="2"/>
<line x1="348" y1="196" x2="352" y2="206" stroke="#283593" stroke-width="2"/>
<line x1="354" y1="196" x2="358" y2="206" stroke="#283593" stroke-width="2"/>
<!-- Same angle marking -->
<path d="M285 200 A15 15 0 0 1 290 186" stroke="#283593" stroke-width="1.5" fill="none"/>
<!-- Congruence symbol -->
<text x="250" y="130" font-family="sans-serif" font-size="30" fill="#1A237E" text-anchor="middle">≅</text>
<!-- Signs box -->
<rect x="40" y="230" width="420" height="85" rx="8" fill="#C5CAE9" opacity="0.4"/>
<text x="250" y="255" font-family="sans-serif" font-size="13" fill="#1A237E" text-anchor="middle" font-weight="bold">Признаки равенства треугольников</text>
<text x="60" y="278" font-family="sans-serif" font-size="11" fill="#283593">I: по двум сторонам и углу между ними</text>
<text x="60" y="295" font-family="sans-serif" font-size="11" fill="#283593">II: по стороне и двум прилежащим углам</text>
<text x="60" y="312" font-family="sans-serif" font-size="11" fill="#283593">III: по трём сторонам</text>
<text x="250" y="345" font-family="sans-serif" font-size="9" fill="#283593" opacity="0.5" text-anchor="middle">Признаки равенства треугольников</text>
</svg>