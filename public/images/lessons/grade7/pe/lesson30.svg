<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" fill="#E8F4FD" rx="12"/>
  <!-- Floor -->
  <rect x="0" y="420" width="800" height="80" fill="#C8DFF0" rx="0"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#A0BFD4" stroke-width="2"/>

  <!-- Gymnastics Vault (козёл) -->
  <rect x="200" y="320" width="180" height="30" rx="8" fill="#F5A623" stroke="#E08E0B" stroke-width="2"/>
  <rect x="195" y="350" width="20" height="70" rx="3" fill="#D4941A" stroke="#B87D10" stroke-width="1.5"/>
  <rect x="365" y="350" width="20" height="70" rx="3" fill="#D4941A" stroke="#B87D10" stroke-width="1.5"/>
  <rect x="190" y="340" width="200" height="15" rx="5" fill="#F7BD4F" stroke="#E8A730" stroke-width="1.5"/>

  <!-- Stick figure doing vault - approach run -->
  <!-- Body in vault position (hands on vault, body arched over) -->
  <!-- Head -->
  <circle cx="310" cy="270" r="16" fill="none" stroke="#2E6DA4" stroke-width="3"/>
  <!-- Arms reaching to vault -->
  <line x1="310" y1="286" x2="280" y2="330" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <line x1="310" y1="286" x2="340" y2="330" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <!-- Hands on vault surface -->
  <circle cx="280" cy="325" r="5" fill="#2E6DA4"/>
  <circle cx="340" cy="325" r="5" fill="#2E6DA4"/>
  <!-- Torso -->
  <line x1="310" y1="286" x2="330" y2="340" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs arched over -->
  <line x1="330" y1="340" x2="370" y2="300" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="300" x2="395" y2="280" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <!-- Feet -->
  <circle cx="395" cy="278" r="4" fill="#2E6DA4"/>

  <!-- Landing stick figure on the other side -->
  <circle cx="460" cy="370" r="16" fill="none" stroke="#4A90C4" stroke-width="2.5"/>
  <line x1="460" y1="386" x2="460" y2="420" stroke="#4A90C4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arms up (celebration) -->
  <line x1="460" y1="400" x2="435" y2="375" stroke="#4A90C4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="460" y1="400" x2="485" y2="375" stroke="#4A90C4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="460" y1="420" x2="445" y2="420" stroke="#4A90C4" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="460" y1="420" x2="475" y2="420" stroke="#4A90C4" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arc path showing vault trajectory -->
  <path d="M 180 420 Q 200 250 310 270" fill="none" stroke="#F5A623" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <path d="M 340 325 Q 400 260 460 370" fill="none" stroke="#F5A623" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>

  <!-- Climbing Rope -->
  <line x1="620" y1="0" x2="620" y2="420" stroke="#8B7355" stroke-width="6"/>
  <line x1="618" y1="0" x2="618" y2="420" stroke="#A08060" stroke-width="2"/>
  <!-- Rope knots -->
  <ellipse cx="620" cy="150" rx="8" ry="6" fill="#8B7355" stroke="#6B5335" stroke-width="1"/>
  <ellipse cx="620" cy="250" rx="8" ry="6" fill="#8B7355" stroke="#6B5335" stroke-width="1"/>
  <ellipse cx="620" cy="350" rx="8" ry="6" fill="#8B7355" stroke="#6B5335" stroke-width="1"/>

  <!-- Climbing stick figure on rope -->
  <circle cx="620" cy="200" r="16" fill="none" stroke="#2E6DA4" stroke-width="3"/>
  <!-- Arms reaching up to rope -->
  <line x1="620" y1="216" x2="620" y2="240" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <line x1="620" y1="230" x2="610" y2="210" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <line x1="620" y1="230" x2="630" y2="210" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <!-- Hands gripping -->
  <circle cx="610" cy="208" r="4" fill="#2E6DA4"/>
  <circle cx="630" cy="208" r="4" fill="#2E6DA4"/>
  <!-- Legs wrapped around rope -->
  <line x1="620" y1="240" x2="615" y2="275" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <line x1="620" y1="240" x2="625" y2="275" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <line x1="615" y1="275" x2="620" y2="285" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>
  <line x1="625" y1="275" x2="620" y2="285" stroke="#2E6DA4" stroke-width="3" stroke-linecap="round"/>

  <!-- Decorative elements -->
  <!-- Mat under vault -->
  <rect x="170" y="415" width="240" height="10" rx="3" fill="#7BC4E8" opacity="0.5"/>
  <!-- Small arrows showing movement direction -->
  <polygon points="155,410 145,400 155,405" fill="#2E6DA4" opacity="0.4"/>

  <!-- Wall mounting for rope -->
  <rect x="610" y="0" width="20" height="15" rx="3" fill="#666" stroke="#444" stroke-width="1.5"/>
  <circle cx="620" cy="7" r="4" fill="#888"/>
</svg>