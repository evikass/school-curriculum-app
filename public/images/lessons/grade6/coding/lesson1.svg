  <line x1="-18" y1="7" x2="-45" y2="7" stroke="#E8941E" stroke-width="1" opacity="0.7"/>
  <line x1="18" y1="2" x2="45" y2="-5" stroke="#E8941E" stroke-width="1" opacity="0.7"/>
  <line x1="18" y1="7" x2="45" y2="7" stroke="#E8941E" stroke-width="1" opacity="0.7"/>
