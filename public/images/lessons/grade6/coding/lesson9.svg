<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFFDE7"/></linearGradient></defs><rect width="500" height="350" fill="url(#bg)" rx="10"/><rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/><rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/><polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/><polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/><polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/><polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/><circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/><circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/><text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Логические операторы</text><text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Основы программирования - Урок 9</text><line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/><rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/><rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>
<!-- AND gate -->
<g transform="translate(100,160)">
  <text x="0" y="-50" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">И (AND)</text>
  <!-- D-shape body -->
  <path d="M-25,-35 L-25,35 Q-25,45 -15,45 L15,45 Q30,45 30,30 L30,-30 Q30,-45 15,-45 L-15,-45 Q-25,-45 -25,-35 Z" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <!-- Input dots -->
  <circle cx="-25" cy="-18" r="5" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="-42" y="-14" font-family="Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle">1</text>
  <circle cx="-25" cy="18" r="5" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="-42" y="22" font-family="Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle">1</text>
  <!-- Output dot -->
  <circle cx="30" cy="0" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="47" y="4" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">1</text>
  <!-- Truth table hint -->
  <text x="0" y="5" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" opacity="0.5">11=1</text>
</g>
<!-- OR gate -->
<g transform="translate(250,160)">
  <text x="0" y="-50" font-family="Arial,sans-serif" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">ИЛИ (OR)</text>
  <!-- OR shape -->
  <path d="M-25,-35 Q-15,-45 0,-42 Q25,-35 25,0 Q25,35 0,42 Q-15,45 -25,35 Z" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <!-- Input dots -->
  <circle cx="-20" cy="-18" r="5" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="-35" y="-14" font-family="Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle">1</text>
  <circle cx="-15" cy="18" r="5" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="-30" y="22" font-family="Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle">0</text>
  <!-- Output dot -->
  <circle cx="25" cy="0" r="5" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
  <text x="42" y="4" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">1</text>
  <!-- Truth table hint -->
  <text x="3" y="5" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" opacity="0.5">10=1</text>
</g>
<!-- NOT gate -->
<g transform="translate(400,160)">
  <text x="0" y="-50" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">НЕ (NOT)</text>
  <!-- Triangle body -->
  <polygon points="-20,-35 -20,35 25,0" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <!-- NOT bubble -->
  <circle cx="28" cy="0" r="5" fill="white" stroke="#C62828" stroke-width="2"/>
  <!-- Input dot -->
  <circle cx="-20" cy="0" r="5" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
  <text x="-38" y="4" font-family="Arial,sans-serif" font-size="11" fill="#333" text-anchor="middle">1</text>
  <!-- Output -->
  <circle cx="33" cy="0" r="4" fill="#C62828"/>
  <text x="50" y="4" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">0</text>
</g>
<!-- Comparison operators -->
<rect x="50" y="260" width="400" height="38" rx="5" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1"/>
<text x="250" y="276" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Операторы сравнения</text>
<!-- Comparison examples -->
<rect x="65" y="280" width="50" height="16" rx="8" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<text x="90" y="292" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">= равен</text>
<rect x="125" y="280" width="55" height="16" rx="8" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<text x="152" y="292" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">&gt; больше</text>
<rect x="190" y="280" width="65" height="16" rx="8" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<text x="222" y="292" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">&lt; меньше</text>
<rect x="265" y="280" width="55" height="16" rx="8" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<text x="292" y="292" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">&gt;=</text>
<rect x="330" y="280" width="55" height="16" rx="8" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<text x="357" y="292" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">&lt;=</text>
<rect x="395" y="280" width="40" height="16" rx="8" fill="#4FC3F7" stroke="#0288D1" stroke-width="0.8"/>
<text x="415" y="292" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">/=</text>
<!-- Connecting lines from gates -->
<line x1="100" y1="210" x2="100" y2="258" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
<line x1="250" y1="210" x2="250" y2="258" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
<line x1="400" y1="210" x2="400" y2="258" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
<rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/><text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Логические операторы</text></svg>