<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Сила трения</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Block sliding on surface with friction -->
  <rect x="35" y="95" width="145" height="130" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="107" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Трение скольжения</text>
  <!-- Surface with texture -->
  <rect x="50" y="175" width="120" height="6" rx="2" fill="#D7CCC8"/>
  <line x1="55" y1="175" x2="55" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="65" y1="175" x2="65" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="75" y1="175" x2="75" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="85" y1="175" x2="85" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="95" y1="175" x2="95" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="105" y1="175" x2="105" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="115" y1="175" x2="115" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="125" y1="175" x2="125" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="135" y1="175" x2="135" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="145" y1="175" x2="145" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <line x1="155" y1="175" x2="155" y2="181" stroke="#A1887F" stroke-width="0.5"/>
  <!-- Block -->
  <rect x="70" y="150" width="40" height="25" rx="2" fill="#FFE082" stroke="#F9A825" stroke-width="1.5"/>
  <text x="90" y="166" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">m</text>
  <!-- Applied force (pushing right) -->
  <line x1="112" y1="162" x2="145" y2="162" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="145,162 139,158 139,166" fill="#2E7D32"/>
  <text x="130" y="157" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">F</text>
  <!-- Friction force (opposing, pointing left) -->
  <line x1="68" y1="175" x2="40" y2="175" stroke="#C62828" stroke-width="2"/>
  <polygon points="40,175 46,171 46,179" fill="#C62828"/>
  <text x="52" y="183" font-family="Arial,sans-serif" font-size="7" fill="#C62828">Fтр</text>
  <!-- Normal force -->
  <line x1="90" y1="148" x2="90" y2="130" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="90,130 87,136 93,136" fill="#1565C0"/>
  <text x="95" y="137" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">N</text>
  <!-- Gravity -->
  <line x1="90" y1="177" x2="90" y2="198" stroke="#F57F17" stroke-width="1.5"/>
  <polygon points="90,198 87,192 93,192" fill="#F57F17"/>
  <text x="95" y="196" font-family="Arial,sans-serif" font-size="7" fill="#F57F17">mg</text>
  <!-- Formula -->
  <text x="107" y="215" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Fтр = N * mu</text>

  <!-- Brake pads on wheel -->
  <rect x="190" y="95" width="130" height="130" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="255" y="110" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Тормозные колодки</text>
  <!-- Wheel -->
  <circle cx="255" cy="160" r="30" fill="none" stroke="#333" stroke-width="3"/>
  <circle cx="255" cy="160" r="3" fill="#333"/>
  <!-- Spokes -->
  <line x1="255" y1="160" x2="255" y2="132" stroke="#555" stroke-width="1"/>
  <line x1="255" y1="160" x2="255" y2="188" stroke="#555" stroke-width="1"/>
  <line x1="255" y1="160" x2="227" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="255" y1="160" x2="283" y2="160" stroke="#555" stroke-width="1"/>
  <!-- Tire tread pattern -->
  <circle cx="255" cy="160" r="30" fill="none" stroke="#333" stroke-width="5" stroke-dasharray="4,3"/>
  <!-- Brake pad -->
  <rect x="240" y="126" width="30" height="6" rx="1" fill="#C62828"/>
  <text x="255" y="124" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">колодка</text>
  <!-- Friction arrow -->
  <line x1="275" y1="130" x2="290" y2="130" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="290,130 285,127 285,133" fill="#C62828"/>
  <text x="283" y="125" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Fтр</text>
  <!-- Ground -->
  <line x1="200" y1="192" x2="310" y2="192" stroke="#78909C" stroke-width="1"/>
  <!-- Rotation arrow -->
  <path d="M230,145 A28,28 0 0,1 250,133" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="250,133 246,139 253,140" fill="#1565C0"/>
  <text x="235" y="140" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">w</text>
  <text x="255" y="210" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Трение останавливает</text>

  <!-- Person walking -->
  <rect x="330" y="95" width="140" height="130" rx="4" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="400" y="110" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Трение помогает!</text>
  <!-- Ground -->
  <line x1="345" y1="200" x2="455" y2="200" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Person walking -->
  <g transform="translate(390, 135)">
    <circle cx="0" cy="0" r="6" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
    <!-- Body -->
    <line x1="0" y1="6" x2="0" y2="35" stroke="#1565C0" stroke-width="2"/>
    <!-- Arms swinging -->
    <line x1="0" y1="12" x2="-12" y2="25" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="12" y2="22" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Legs in walking position -->
    <line x1="0" y1="35" x2="-10" y2="55" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="0" y1="35" x2="15" y2="55" stroke="#1565C0" stroke-width="1.5"/>
  </g>
  <!-- Friction arrow at foot (static friction pushes forward) -->
  <line x1="375" y1="195" x2="358" y2="195" stroke="#C62828" stroke-width="2"/>
  <polygon points="358,195 364,191 364,199" fill="#C62828"/>
  <text x="362" y="188" font-family="Arial,sans-serif" font-size="7" fill="#C62828">Fтр</text>
  <!-- Direction of walking -->
  <line x1="408" y1="160" x2="435" y2="160" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="435,160 429,156 429,164" fill="#2E7D32"/>
  <text x="420" y="155" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">v</text>
  <!-- Exclamation -->
  <text x="400" y="210" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Без трения нельзя ходить!</text>

  <!-- Ice vs rough surface comparison -->
  <rect x="35" y="200" width="430" height="85" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="250" y="218" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Сравнение поверхностей</text>

  <!-- Ice surface -->
  <rect x="55" y="225" width="180" height="50" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="145" y="238" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Лёд (гладкий)</text>
  <!-- Ice block sliding easily -->
  <rect x="90" y="245" width="30" height="20" rx="2" fill="#B3E5FC" stroke="#1565C0" stroke-width="1"/>
  <line x1="120" y1="255" x2="155" y2="255" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="155,255 149,251 149,259" fill="#2E7D32"/>
  <!-- Very small friction arrow -->
  <line x1="88" y1="268" x2="78" y2="268" stroke="#C62828" stroke-width="1"/>
  <polygon points="78,268 82,265 82,271" fill="#C62828"/>
  <text x="82" y="275" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Fтр мал.</text>

  <!-- Rough surface -->
  <rect x="265" y="225" width="180" height="50" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="355" y="238" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Шероховатый</text>
  <!-- Rough surface texture -->
  <path d="M275,268 l5,-3 5,3 5,-2 5,3 5,-3 5,2 5,-3 5,3 5,-2 5,3 5,-3 5,2 5,-3 5,3 5,-2 5,3 5,-3 5,2 5,-3 5,3" fill="none" stroke="#A1887F" stroke-width="1.5"/>
  <!-- Block on rough surface -->
  <rect x="320" y="245" width="30" height="20" rx="2" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
  <!-- Small motion arrow -->
  <line x1="350" y1="255" x2="370" y2="255" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="370,255 365,252 365,258" fill="#2E7D32"/>
  <!-- Big friction arrow -->
  <line x1="318" y1="268" x2="290" y2="268" stroke="#C62828" stroke-width="2.5"/>
  <polygon points="290,268 297,264 297,272" fill="#C62828"/>
  <text x="300" y="275" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Fтр бол.</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Сила трения</text>
</svg>