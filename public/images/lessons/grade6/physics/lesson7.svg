<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Сила тяжести</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Apple falling from tree -->
  <rect x="35" y="95" width="130" height="130" rx="4" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="100" y="110" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Яблоко падает</text>
  <!-- Tree trunk -->
  <rect x="90" y="125" width="8" height="70" rx="2" fill="#8D6E63"/>
  <!-- Tree crown -->
  <circle cx="94" cy="118" r="20" fill="#4CAF50"/>
  <circle cx="82" cy="122" r="15" fill="#66BB6A"/>
  <circle cx="106" cy="122" r="15" fill="#66BB6A"/>
  <!-- Apple on tree -->
  <circle cx="108" cy="130" r="5" fill="#C62828"/>
  <line x1="108" y1="125" x2="110" y2="122" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Falling apple (lower) -->
  <circle cx="108" cy="160" r="5" fill="#EF5350"/>
  <!-- Motion lines -->
  <line x1="108" y1="132" x2="108" y2="140" stroke="#C62828" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="108" y1="142" x2="108" y2="148" stroke="#C62828" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="108" y1="150" x2="108" y2="155" stroke="#C62828" stroke-width="0.5" stroke-dasharray="2,2"/>
  <!-- Gravity arrow -->
  <line x1="120" y1="155" x2="120" y2="185" stroke="#C62828" stroke-width="2"/>
  <polygon points="120,185 116,178 124,178" fill="#C62828"/>
  <text x="128" y="175" font-family="Arial,sans-serif" font-size="8" fill="#C62828">mg</text>
  <!-- Ground -->
  <line x1="50" y1="197" x2="155" y2="197" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Landed apple -->
  <circle cx="108" cy="193" r="4" fill="#C62828" opacity="0.5"/>
  <ellipse cx="108" cy="197" rx="7" ry="2" fill="#C62828" opacity="0.2"/>

  <!-- Ball thrown up and coming down -->
  <rect x="180" y="95" width="130" height="130" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="245" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Бросок вверх</text>
  <!-- Trajectory -->
  <line x1="245" y1="205" x2="245" y2="120" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Going up -->
  <circle cx="245" cy="185" r="5" fill="#F9A825"/>
  <line x1="255" y1="185" x2="255" y2="170" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="255,170 252,176 258,176" fill="#2E7D32"/>
  <text x="262" y="178" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">v (вверх)</text>
  <!-- At top -->
  <circle cx="245" cy="135" r="4" fill="#F9A825"/>
  <line x1="235" y1="135" x2="225" y2="135" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="225,135 231,132 231,138" fill="#C62828"/>
  <text x="222" y="128" font-family="Arial,sans-serif" font-size="7" fill="#C62828">g</text>
  <!-- Coming down -->
  <circle cx="245" cy="170" r="5" fill="#EF5350"/>
  <line x1="255" y1="170" x2="255" y2="185" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="255,185 252,179 258,179" fill="#C62828"/>
  <text x="262" y="180" font-family="Arial,sans-serif" font-size="7" fill="#C62828">v (вниз)</text>
  <!-- Ground -->
  <line x1="195" y1="205" x2="300" y2="205" stroke="#78909C" stroke-width="1"/>
  <!-- Peak label -->
  <text x="215" y="133" font-family="Arial,sans-serif" font-size="7" fill="#555">v=0</text>

  <!-- Person on Earth with weight arrow -->
  <rect x="325" y="95" width="140" height="130" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="395" y="110" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Вес на Земле</text>
  <!-- Earth surface -->
  <path d="M335,200 Q365,195 395,200 Q425,205 455,200" fill="none" stroke="#2E7D32" stroke-width="2"/>
  <path d="M335,205 Q365,200 395,205 Q425,210 455,205" fill="#E8F5E9" stroke="none"/>
  <!-- Person -->
  <g transform="translate(385, 130)">
    <circle cx="0" cy="0" r="6" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
    <line x1="0" y1="6" x2="0" y2="35" stroke="#1565C0" stroke-width="2"/>
    <line x1="0" y1="12" x2="-12" y2="22" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="12" y2="22" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="0" y1="35" x2="-6" y2="55" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="0" y1="35" x2="6" y2="55" stroke="#1565C0" stroke-width="1.5"/>
  </g>
  <!-- Weight arrow -->
  <line x1="395" y1="195" x2="395" y2="215" stroke="#C62828" stroke-width="3"/>
  <polygon points="395,215 390,207 400,207" fill="#C62828"/>
  <text x="405" y="210" font-family="Arial,sans-serif" font-size="9" fill="#C62828" font-weight="bold">F = mg</text>
  <!-- g value -->
  <text x="395" y="130" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">g = 9.8 м/с2</text>

  <!-- Feather and stone comparison -->
  <rect x="35" y="200" width="430" height="85" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="250" y="218" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Перо и камень</text>

  <!-- Without air (vacuum) -->
  <rect x="55" y="225" width="170" height="50" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="140" y="238" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">В вакууме</text>
  <!-- Stone -->
  <polygon points="90,260 95,248 100,260" fill="#78909C"/>
  <!-- Feather -->
  <path d="M180,260 Q185,250 190,248 Q185,252 185,260" fill="#BDBDBD" stroke="#999" stroke-width="0.5"/>
  <path d="M180,260 Q175,252 172,248 Q177,252 178,260" fill="#BDBDBD" stroke="#999" stroke-width="0.5"/>
  <!-- Both reach bottom same time -->
  <line x1="90" y1="265" x2="90" y2="275" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="90,275 87,270 93,270" fill="#C62828"/>
  <line x1="182" y1="265" x2="182" y2="275" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="182,275 179,270 185,270" fill="#C62828"/>
  <text x="140" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Падают одновременно!</text>

  <!-- In air -->
  <rect x="265" y="225" width="180" height="50" rx="3" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="355" y="238" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">В воздухе</text>
  <!-- Stone falls fast -->
  <polygon points="290,268 295,252 300,268" fill="#78909C"/>
  <line x1="295" y1="270" x2="295" y2="278" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="295,278 292,274 298,274" fill="#C62828"/>
  <!-- Feather floats -->
  <path d="M395,265 Q400,255 405,253 Q400,257 400,265" fill="#BDBDBD" stroke="#999" stroke-width="0.5"/>
  <path d="M395,265 Q390,257 387,253 Q392,257 393,265" fill="#BDBDBD" stroke="#999" stroke-width="0.5"/>
  <!-- Wavy motion -->
  <path d="M400,268 Q403,270 400,272 Q397,274 400,276" fill="none" stroke="#999" stroke-width="0.8"/>
  <text x="355" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Камень падает быстрее (сопр. воздуха)</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Сила тяжести</text>
</svg>