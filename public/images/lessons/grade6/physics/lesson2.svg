<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Механическое движение</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Road with car -->
  <rect x="40" y="165" width="200" height="4" fill="#78909C"/>
  <!-- Distance markers -->
  <line x1="60" y1="160" x2="60" y2="174" stroke="#F9A825" stroke-width="2"/>
  <line x1="120" y1="160" x2="120" y2="174" stroke="#F9A825" stroke-width="2"/>
  <line x1="180" y1="160" x2="180" y2="174" stroke="#F9A825" stroke-width="2"/>
  <text x="60" y="157" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">0 м</text>
  <text x="120" y="157" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">50 м</text>
  <text x="180" y="157" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">100 м</text>

  <!-- Car -->
  <g transform="translate(80, 140)">
    <rect x="0" y="5" width="40" height="18" rx="4" fill="#1565C0"/>
    <rect x="8" y="-2" width="22" height="12" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <circle cx="10" cy="25" r="5" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="30" cy="25" r="5" fill="#333" stroke="#555" stroke-width="1"/>
    <circle cx="10" cy="25" r="2" fill="#888"/>
    <circle cx="30" cy="25" r="2" fill="#888"/>
    <!-- Direction arrow -->
    <line x1="45" y1="14" x2="70" y2="14" stroke="#C62828" stroke-width="2"/>
    <polygon points="70,14 63,9 63,19" fill="#C62828"/>
    <text x="55" y="8" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">v</text>
  </g>

  <!-- Runner -->
  <g transform="translate(40, 190)">
    <!-- Head -->
    <circle cx="12" cy="0" r="5" fill="#F5DEB3" stroke="#8D6E63" stroke-width="1"/>
    <!-- Body -->
    <line x1="12" y1="5" x2="12" y2="25" stroke="#1565C0" stroke-width="2"/>
    <!-- Arms -->
    <line x1="12" y1="10" x2="2" y2="18" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="12" y1="10" x2="22" y2="16" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Legs running -->
    <line x1="12" y1="25" x2="4" y2="38" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="12" y1="25" x2="22" y2="36" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Arrow -->
    <line x1="30" y1="15" x2="55" y2="15" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="55,15 49,11 49,19" fill="#C62828"/>
  </g>

  <!-- Cyclist -->
  <g transform="translate(110, 185)">
    <!-- Wheels -->
    <circle cx="10" cy="30" r="12" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="40" cy="30" r="12" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Frame -->
    <line x1="10" y1="30" x2="25" y2="15" stroke="#C62828" stroke-width="1.5"/>
    <line x1="25" y1="15" x2="40" y2="30" stroke="#C62828" stroke-width="1.5"/>
    <line x1="10" y1="30" x2="40" y2="30" stroke="#C62828" stroke-width="1"/>
    <line x1="25" y1="15" x2="20" y2="30" stroke="#C62828" stroke-width="1"/>
    <!-- Handlebars -->
    <line x1="20" y1="12" x2="28" y2="10" stroke="#333" stroke-width="1.5"/>
    <!-- Rider -->
    <circle cx="22" cy="5" r="4" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
    <line x1="22" y1="9" x2="25" y2="15" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="22" y1="12" x2="28" y2="10" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="22" y1="12" x2="16" y2="20" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="25" y1="15" x2="20" y2="30" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="25" y1="15" x2="35" y2="28" stroke="#1565C0" stroke-width="1.2"/>
    <!-- Arrow -->
    <line x1="55" y1="22" x2="75" y2="22" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="75,22 69,18 69,26" fill="#C62828"/>
  </g>

  <!-- Reference frame diagram card -->
  <rect x="280" y="95" width="180" height="100" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="370" y="112" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Система отсчёта</text>

  <!-- Coordinate axes -->
  <line x1="310" y1="155" x2="310" y2="120" stroke="#333" stroke-width="1.5"/>
  <polygon points="310,120 307,127 313,127" fill="#333"/>
  <line x1="310" y1="155" x2="355" y2="155" stroke="#333" stroke-width="1.5"/>
  <polygon points="355,155 348,152 348,158" fill="#333"/>
  <text x="315" y="125" font-family="Arial,sans-serif" font-size="9" fill="#333">y</text>
  <text x="350" y="168" font-family="Arial,sans-serif" font-size="9" fill="#333">x</text>

  <!-- Point on trajectory -->
  <path d="M310,150 Q325,130 340,140 Q350,145 360,135" fill="none" stroke="#C62828" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="340" cy="140" r="3" fill="#C62828"/>
  <line x1="310" y1="155" x2="340" y2="140" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="310" y1="140" x2="340" y2="140" stroke="#90CAF9" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Labels -->
  <text x="370" y="130" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Тело (мат. точка)</text>
  <text x="370" y="142" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Траектория</text>
  <text x="370" y="154" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Координаты (x, y)</text>
  <text x="370" y="166" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Тело отсчёта</text>
  <text x="370" y="178" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Часы (t)</text>

  <!-- Distance comparison -->
  <rect x="280" y="205" width="180" height="80" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="370" y="222" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">Путь и перемещение</text>
  <!-- Curved path -->
  <path d="M300,260 Q330,235 350,250 Q370,260 390,245 Q410,235 430,250" fill="none" stroke="#C62828" stroke-width="2"/>
  <!-- Straight displacement -->
  <line x1="300" y1="260" x2="430" y2="250" stroke="#1565C0" stroke-width="2"/>
  <text x="365" y="278" font-family="Arial,sans-serif" font-size="8" fill="#C62828">s - путь</text>
  <text x="365" y="248" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">d - перемещение</text>

  <!-- Bauhaus decorative -->
  <circle cx="260" y="250" r="15" fill="#C62828" opacity="0.06"/>
  <rect x="263" y="245" width="10" height="10" fill="#1565C0" opacity="0.06" transform="rotate(45,268,250)"/>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Механическое движение</text>
</svg>