<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Рычаг</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Seesaw with different weights -->
  <rect x="35" y="95" width="200" height="120" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="135" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Рычаг в равновесии</text>
  <!-- Fulcrum (triangle) -->
  <polygon points="135,190 125,200 145,200" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <!-- Beam (tilted slightly, in equilibrium) -->
  <line x1="55" y1="175" x2="215" y2="165" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
  <!-- Left weight (heavy, close to center) -->
  <rect x="95" y="163" width="25" height="18" rx="2" fill="#C62828" stroke="#B71C1C" stroke-width="1"/>
  <text x="107" y="176" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">10 кг</text>
  <!-- Right weight (light, far from center) -->
  <rect x="185" y="152" width="20" height="15" rx="2" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
  <text x="195" y="163" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">5 кг</text>
  <!-- Arms labels -->
  <line x1="135" y1="183" x2="107" y2="175" stroke="#F57F17" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="135" y1="178" x2="195" y2="163" stroke="#F57F17" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="115" y="188" font-family="Arial,sans-serif" font-size="7" fill="#F57F17">l1</text>
  <text x="168" y="173" font-family="Arial,sans-serif" font-size="7" fill="#F57F17">l2</text>
  <!-- Fulcrum label -->
  <text x="135" y="213" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">точка опоры</text>

  <!-- Crowbar lifting rock -->
  <rect x="245" y="95" width="105" height="120" rx="4" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="297" y="110" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Монтировка</text>
  <!-- Rock -->
  <ellipse cx="310" cy="190" rx="28" ry="18" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <ellipse cx="308" cy="185" rx="12" ry="8" fill="#90A4AE" opacity="0.5"/>
  <!-- Ground -->
  <line x1="260" y1="208" x2="345" y2="208" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Crowbar (lever) -->
  <line x1="255" y1="165" x2="330" y2="185" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
  <!-- Fulcrum (small rock) -->
  <polygon points="285,190 278,198 292,198" fill="#A1887F"/>
  <!-- Force arrow pushing down -->
  <line x1="255" y1="155" x2="255" y2="140" stroke="#C62828" stroke-width="2"/>
  <polygon points="255,140 251,147 259,147" fill="#C62828"/>
  <text x="243" y="148" font-family="Arial,sans-serif" font-size="7" fill="#C62828">F</text>
  <!-- Rock lifting arrow -->
  <line x1="320" y1="175" x2="320" y2="160" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="320,160 317,166 323,166" fill="#2E7D32"/>

  <!-- Scissors mechanism -->
  <rect x="360" y="95" width="105" height="120" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="412" y="110" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Ножницы</text>
  <!-- Two blades crossing at pivot -->
  <line x1="380" y1="140" x2="440" y2="195" stroke="#78909C" stroke-width="3" stroke-linecap="round"/>
  <line x1="440" y1="140" x2="380" y2="195" stroke="#78909C" stroke-width="3" stroke-linecap="round"/>
  <!-- Pivot point -->
  <circle cx="410" cy="167" r="4" fill="#C62828"/>
  <circle cx="410" cy="167" r="2" fill="#F5DEB3"/>
  <!-- Handles -->
  <ellipse cx="380" cy="140" rx="8" ry="5" fill="none" stroke="#8D6E63" stroke-width="2" transform="rotate(-45,380,140)"/>
  <ellipse cx="440" cy="140" rx="8" ry="5" fill="none" stroke="#8D6E63" stroke-width="2" transform="rotate(45,440,140)"/>
  <!-- Cutting force arrows -->
  <line x1="370" y1="165" x2="382" y2="160" stroke="#C62828" stroke-width="1"/>
  <line x1="450" y1="165" x2="438" y2="160" stroke="#C62828" stroke-width="1"/>
  <text x="412" y="210" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Рычаг 1-го рода</text>

  <!-- Wheelbarrow -->
  <rect x="35" y="200" width="200" height="85" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="135" y="218" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Тачка (рычаг 2-го рода)</text>
  <!-- Wheel -->
  <circle cx="70" cy="260" r="12" fill="none" stroke="#333" stroke-width="2"/>
  <circle cx="70" cy="260" r="2" fill="#333"/>
  <!-- Spokes -->
  <line x1="70" y1="260" x2="70" y2="250" stroke="#555" stroke-width="0.8"/>
  <line x1="70" y1="260" x2="70" y2="270" stroke="#555" stroke-width="0.8"/>
  <line x1="70" y1="260" x2="60" y2="260" stroke="#555" stroke-width="0.8"/>
  <line x1="70" y1="260" x2="80" y2="260" stroke="#555" stroke-width="0.8"/>
  <!-- Body/tray -->
  <path d="M70,248 L180,230 L200,240 L180,248 Z" fill="#FFE082" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Load in tray -->
  <path d="M100,248 L175,232 L180,248 Z" fill="#78909C" opacity="0.5"/>
  <!-- Handles -->
  <line x1="200" y1="240" x2="220" y2="230" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="248" x2="220" y2="258" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
  <!-- Force arrow (lifting handles) -->
  <line x1="222" y1="228" x2="222" y2="215" stroke="#C62828" stroke-width="2"/>
  <polygon points="222,215 219,221 225,221" fill="#C62828"/>
  <text x="230" y="222" font-family="Arial,sans-serif" font-size="7" fill="#C62828">F</text>
  <!-- Fulcrum label -->
  <text x="70" y="280" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">точка опоры (колесо)</text>

  <!-- Lever rule formula -->
  <rect x="245" y="200" width="220" height="85" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="355" y="220" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Правило рычага</text>
  <text x="355" y="242" font-family="Arial,sans-serif" font-size="14" fill="#333" text-anchor="middle" font-weight="bold">F1 * l1 = F2 * l2</text>
  <text x="355" y="260" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Сила умножается на расстояние</text>
  <text x="355" y="275" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Большему плечу - меньшая сила</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Рычаг</text>
</svg>