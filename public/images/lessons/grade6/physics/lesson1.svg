<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Что изучает физика</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- White card panel -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Ruler -->
  <g transform="translate(50, 110)">
    <rect x="0" y="0" width="80" height="18" rx="2" fill="#FFE082" stroke="#F9A825" stroke-width="1.5"/>
    <line x1="10" y1="0" x2="10" y2="10" stroke="#5D4037" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="14" stroke="#5D4037" stroke-width="1.5"/>
    <line x1="30" y1="0" x2="30" y2="10" stroke="#5D4037" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="14" stroke="#5D4037" stroke-width="1.5"/>
    <line x1="50" y1="0" x2="50" y2="10" stroke="#5D4037" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="14" stroke="#5D4037" stroke-width="1.5"/>
    <line x1="70" y1="0" x2="70" y2="10" stroke="#5D4037" stroke-width="1"/>
    <text x="40" y="30" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Линейка</text>
  </g>

  <!-- Thermometer -->
  <g transform="translate(170, 100)">
    <rect x="8" y="0" width="8" height="45" rx="4" fill="white" stroke="#C62828" stroke-width="1.5"/>
    <rect x="9.5" y="15" width="5" height="29" rx="2.5" fill="#C62828"/>
    <circle cx="12" cy="48" r="8" fill="#C62828" stroke="#B71C1C" stroke-width="1"/>
    <circle cx="12" cy="48" r="4" fill="#EF5350"/>
    <!-- Scale marks -->
    <line x1="17" y1="5" x2="22" y2="5" stroke="#888" stroke-width="0.8"/>
    <line x1="17" y1="15" x2="22" y2="15" stroke="#888" stroke-width="0.8"/>
    <line x1="17" y1="25" x2="22" y2="25" stroke="#888" stroke-width="0.8"/>
    <line x1="17" y1="35" x2="22" y2="35" stroke="#888" stroke-width="0.8"/>
    <text x="25" y="9" font-family="Arial,sans-serif" font-size="7" fill="#888">100</text>
    <text x="25" y="19" font-family="Arial,sans-serif" font-size="7" fill="#888">50</text>
    <text x="25" y="29" font-family="Arial,sans-serif" font-size="7" fill="#888">0</text>
    <text x="12" y="68" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Термометр</text>
  </g>

  <!-- Stopwatch -->
  <g transform="translate(270, 100)">
    <circle cx="22" cy="25" r="22" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
    <circle cx="22" cy="25" r="18" fill="white" stroke="#90CAF9" stroke-width="1"/>
    <!-- Watch face marks -->
    <line x1="22" y1="9" x2="22" y2="13" stroke="#333" stroke-width="1.5"/>
    <line x1="22" y1="37" x2="22" y2="41" stroke="#333" stroke-width="1"/>
    <line x1="6" y1="25" x2="10" y2="25" stroke="#333" stroke-width="1"/>
    <line x1="34" y1="25" x2="38" y2="25" stroke="#333" stroke-width="1"/>
    <!-- Hands -->
    <line x1="22" y1="25" x2="22" y2="14" stroke="#C62828" stroke-width="1.5"/>
    <line x1="22" y1="25" x2="32" y2="22" stroke="#333" stroke-width="1"/>
    <circle cx="22" cy="25" r="2" fill="#333"/>
    <!-- Top button -->
    <rect x="18" y="1" width="8" height="5" rx="2" fill="#1565C0"/>
    <text x="22" y="60" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Секундомер</text>
  </g>

  <!-- Scales -->
  <g transform="translate(370, 100)">
    <!-- Base -->
    <polygon points="20,55 5,55 12,48" fill="#78909C"/>
    <rect x="18" y="20" width="4" height="30" fill="#90A4AE"/>
    <!-- Beam -->
    <rect x="-15" y="18" width="70" height="3" rx="1" fill="#B0BEC5"/>
    <!-- Left pan -->
    <line x1="-8" y1="21" x2="-8" y2="35" stroke="#78909C" stroke-width="1"/>
    <line x1="22" y1="21" x2="22" y2="35" stroke="#78909C" stroke-width="1"/>
    <path d="M-18,35 Q-8,40 2,35" fill="none" stroke="#78909C" stroke-width="1.5"/>
    <path d="M12,35 Q22,40 32,35" fill="none" stroke="#78909C" stroke-width="1.5"/>
    <!-- Pivot triangle -->
    <polygon points="7,10 17,10 12,18" fill="#F9A825"/>
    <text x="7" y="68" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Весы</text>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(65, 180)">
    <circle cx="20" cy="20" r="18" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" opacity="0.9"/>
    <circle cx="20" cy="20" r="14" fill="white" stroke="#81C784" stroke-width="1"/>
    <line x1="33" y1="33" x2="48" y2="48" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
    <text x="25" y="62" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Лупа</text>
  </g>

  <!-- Beaker -->
  <g transform="translate(190, 175)">
    <rect x="0" y="5" width="35" height="45" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
    <path d="M35,10 Q45,10 45,20" fill="none" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Liquid -->
    <rect x="2" y="25" width="31" height="23" rx="1" fill="#42A5F5" opacity="0.4"/>
    <!-- Measurement marks -->
    <line x1="0" y1="20" x2="8" y2="20" stroke="#1565C0" stroke-width="0.8"/>
    <line x1="0" y1="30" x2="6" y2="30" stroke="#1565C0" stroke-width="0.8"/>
    <line x1="0" y1="40" x2="8" y2="40" stroke="#1565C0" stroke-width="0.8"/>
    <text x="10" y="23" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">200</text>
    <text x="10" y="33" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">100</text>
    <text x="17" y="62" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Мензурка</text>
  </g>

  <!-- Connecting lines - Bauhaus decorative -->
  <line x1="130" y1="120" x2="165" y2="120" stroke="#C62828" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="230" y1="120" x2="265" y2="120" stroke="#1565C0" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="335" y1="120" x2="365" y2="120" stroke="#F9A825" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Decorative Bauhaus elements -->
  <rect x="310" y="200" width="40" height="40" rx="20" fill="#1565C0" opacity="0.08"/>
  <rect x="320" y="210" width="20" height="20" rx="10" fill="#C62828" opacity="0.08"/>
  <circle cx="390" cy="220" r="25" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.15"/>

  <!-- Title text "Физика - наука о природе" -->
  <rect x="320" y="185" width="140" height="22" rx="3" fill="#E3F2FD"/>
  <text x="390" y="200" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Физика - наука</text>
  <text x="390" y="212" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">о природе</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Что изучает физика</text>
</svg>