<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#C62828" text-anchor="middle">Лабораторная работа</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 12</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Lab instruments card -->
  <rect x="35" y="95" width="140" height="130" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="105" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Приборы</text>

  <!-- Spring scale -->
  <g transform="translate(55, 118)">
    <rect x="5" y="0" width="12" height="45" rx="2" fill="white" stroke="#333" stroke-width="1"/>
    <path d="M8,8 L11,5 L14,8 L11,11 Z" fill="#78909C"/>
    <path d="M8,15 L11,12 L14,15 L11,18 Z" fill="#78909C"/>
    <path d="M8,22 L11,19 L14,22 L11,25 Z" fill="#78909C"/>
    <!-- Hook -->
    <line x1="11" y1="45" x2="11" y2="52" stroke="#333" stroke-width="1"/>
    <path d="M8,52 Q8,56 11,56 Q14,56 14,52" fill="none" stroke="#333" stroke-width="1"/>
    <text x="11" y="68" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Динамометр</text>
  </g>

  <!-- Ruler -->
  <g transform="translate(95, 118)">
    <rect x="0" y="0" width="60" height="12" rx="1" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
    <line x1="8" y1="0" x2="8" y2="6" stroke="#5D4037" stroke-width="0.8"/>
    <line x1="16" y1="0" x2="16" y2="8" stroke="#5D4037" stroke-width="1"/>
    <line x1="24" y1="0" x2="24" y2="6" stroke="#5D4037" stroke-width="0.8"/>
    <line x1="32" y1="0" x2="32" y2="8" stroke="#5D4037" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="6" stroke="#5D4037" stroke-width="0.8"/>
    <line x1="48" y1="0" x2="48" y2="8" stroke="#5D4037" stroke-width="1"/>
    <line x1="56" y1="0" x2="56" y2="6" stroke="#5D4037" stroke-width="0.8"/>
    <text x="30" y="24" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Линейка</text>
  </g>

  <!-- Weights -->
  <g transform="translate(55, 175)">
    <rect x="0" y="0" width="12" height="12" rx="1" fill="#78909C" stroke="#546E7A" stroke-width="0.8"/>
    <text x="6" y="9" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">1Н</text>
    <rect x="15" y="0" width="12" height="12" rx="1" fill="#78909C" stroke="#546E7A" stroke-width="0.8"/>
    <text x="21" y="9" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">2Н</text>
    <rect x="30" y="0" width="12" height="12" rx="1" fill="#78909C" stroke="#546E7A" stroke-width="0.8"/>
    <text x="36" y="9" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">5Н</text>
    <text x="24" y="24" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Гири</text>
  </g>

  <!-- Stopwatch -->
  <g transform="translate(100, 168)">
    <circle cx="15" cy="15" r="14" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
    <circle cx="15" cy="15" r="11" fill="white" stroke="#90CAF9" stroke-width="0.5"/>
    <line x1="15" y1="15" x2="15" y2="8" stroke="#C62828" stroke-width="1"/>
    <line x1="15" y1="15" x2="22" y2="13" stroke="#333" stroke-width="0.8"/>
    <circle cx="15" cy="15" r="1.5" fill="#333"/>
    <rect x="13" y="0" width="4" height="3" rx="1" fill="#1565C0"/>
    <text x="15" y="40" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Секундомер</text>
  </g>

  <!-- Measurement table -->
  <rect x="185" y="95" width="140" height="130" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="255" y="110" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Таблица измерений</text>
  <!-- Table header -->
  <rect x="195" y="116" width="120" height="14" rx="1" fill="#F9A825" opacity="0.2"/>
  <text x="220" y="126" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Опыт</text>
  <text x="252" y="126" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">F (H)</text>
  <text x="298" y="126" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">x (см)</text>
  <!-- Table rows -->
  <line x1="195" y1="130" x2="315" y2="130" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="235" y1="116" x2="235" y2="210" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="268" y1="116" x2="268" y2="210" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="220" y="141" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1</text>
  <text x="252" y="141" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1</text>
  <text x="298" y="141" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2.0</text>
  <line x1="195" y1="146" x2="315" y2="146" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="220" y="157" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2</text>
  <text x="252" y="157" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2</text>
  <text x="298" y="157" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">4.1</text>
  <line x1="195" y1="162" x2="315" y2="162" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="220" y="173" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">3</text>
  <text x="252" y="173" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">3</text>
  <text x="298" y="173" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">5.9</text>
  <line x1="195" y1="178" x2="315" y2="178" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="220" y="189" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">4</text>
  <text x="252" y="189" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">4</text>
  <text x="298" y="189" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">8.0</text>
  <line x1="195" y1="194" x2="315" y2="194" stroke="#E0E0E0" stroke-width="0.5"/>
  <text x="220" y="207" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">5</text>
  <text x="252" y="207" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">5</text>
  <text x="298" y="207" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">10.1</text>

  <!-- Graph paper with plotted results -->
  <rect x="335" y="95" width="130" height="130" rx="4" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="400" y="110" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">График F(x)</text>
  <!-- Grid -->
  <line x1="365" y1="120" x2="365" y2="210" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="365" y1="210" x2="455" y2="210" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Y-axis gridlines -->
  <line x1="365" y1="190" x2="455" y2="190" stroke="#E8F5E9" stroke-width="0.5"/>
  <line x1="365" y1="170" x2="455" y2="170" stroke="#E8F5E9" stroke-width="0.5"/>
  <line x1="365" y1="150" x2="455" y2="150" stroke="#E8F5E9" stroke-width="0.5"/>
  <line x1="365" y1="130" x2="455" y2="130" stroke="#E8F5E9" stroke-width="0.5"/>
  <!-- X-axis gridlines -->
  <line x1="385" y1="120" x2="385" y2="210" stroke="#E8F5E9" stroke-width="0.5"/>
  <line x1="405" y1="120" x2="405" y2="210" stroke="#E8F5E9" stroke-width="0.5"/>
  <line x1="425" y1="120" x2="425" y2="210" stroke="#E8F5E9" stroke-width="0.5"/>
  <line x1="445" y1="120" x2="445" y2="210" stroke="#E8F5E9" stroke-width="0.5"/>
  <!-- Axis labels -->
  <text x="360" y="124" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="end">F</text>
  <text x="455" y="220" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">x</text>
  <!-- Scale labels -->
  <text x="360" y="193" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="end">1</text>
  <text x="360" y="173" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="end">2</text>
  <text x="360" y="153" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="end">3</text>
  <text x="360" y="133" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="end">4</text>
  <text x="385" y="220" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">2</text>
  <text x="405" y="220" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">4</text>
  <text x="425" y="220" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">6</text>
  <text x="445" y="220" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">8</text>
  <!-- Data points -->
  <circle cx="375" cy="200" r="2.5" fill="#C62828"/>
  <circle cx="385" cy="190" r="2.5" fill="#C62828"/>
  <circle cx="395" cy="180" r="2.5" fill="#C62828"/>
  <circle cx="405" cy="170" r="2.5" fill="#C62828"/>
  <circle cx="415" cy="160" r="2.5" fill="#C62828"/>
  <!-- Best fit line -->
  <line x1="370" y1="205" x2="420" y2="155" stroke="#1565C0" stroke-width="1.5"/>

  <!-- Safety and instructions -->
  <rect x="35" y="200" width="210" height="85" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="140" y="218" font-family="Arial,sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Техника безопасности</text>

  <!-- Safety goggles -->
  <g transform="translate(52, 228)">
    <ellipse cx="10" cy="8" rx="10" ry="7" fill="none" stroke="#1565C0" stroke-width="1.5"/>
    <ellipse cx="35" cy="8" rx="10" ry="7" fill="none" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="20" y1="8" x2="25" y2="8" stroke="#1565C0" stroke-width="1"/>
    <line x1="0" y1="5" x2="-8" y2="2" stroke="#1565C0" stroke-width="1"/>
    <line x1="45" y1="5" x2="53" y2="2" stroke="#1565C0" stroke-width="1"/>
    <text x="22" y="28" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Защитные очки</text>
  </g>

  <!-- Rules -->
  <text x="140" y="265" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1. Надеть защитные очки</text>
  <text x="140" y="275" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2. Осторожно с приборами</text>

  <!-- Conclusion card -->
  <rect x="255" y="200" width="210" height="85" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="360" y="218" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Вывод</text>
  <text x="360" y="238" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">F = k * x (закон Гука)</text>
  <text x="360" y="255" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Сила упругости пропорциональна</text>
  <text x="360" y="268" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">удлинению пружины</text>
  <!-- Bauhaus decorative -->
  <rect x="335" y="275" width="8" height="8" rx="4" fill="#1565C0" opacity="0.12"/>
  <rect x="375" y="273" width="12" height="12" fill="#C62828" opacity="0.08" transform="rotate(45,381,279)"/>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Лабораторная работа</text>
</svg>