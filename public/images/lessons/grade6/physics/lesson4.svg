<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Инерция</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физика - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main card -->
  <rect x="25" y="88" width="450" height="205" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Scene 1: Bus stopping -->
  <rect x="35" y="95" width="190" height="100" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="130" y="110" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Автобус тормозит</text>
  <!-- Bus body -->
  <rect x="55" y="125" width="100" height="40" rx="6" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <rect x="65" y="130" width="25" height="18" rx="2" fill="#E3F2FD" stroke="#F9A825" stroke-width="0.5"/>
  <rect x="95" y="130" width="25" height="18" rx="2" fill="#E3F2FD" stroke="#F9A825" stroke-width="0.5"/>
  <rect x="60" y="155" width="10" height="10" rx="1" fill="#F9A825" stroke="#F57F17" stroke-width="0.5"/>
  <circle cx="75" cy="170" r="7" fill="#333" stroke="#555" stroke-width="1"/>
  <circle cx="135" cy="170" r="7" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Braking lines -->
  <line x1="50" y1="168" x2="55" y2="168" stroke="#C62828" stroke-width="1.5"/>
  <line x1="47" y1="172" x2="53" y2="172" stroke="#C62828" stroke-width="1"/>
  <!-- Stop sign -->
  <rect x="35" y="148" width="15" height="3" fill="#C62828"/>
  <!-- Passenger falling forward -->
  <g transform="translate(110, 130)">
    <!-- Person leaning forward -->
    <circle cx="5" cy="0" r="4" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
    <line x1="5" y1="4" x2="5" y2="18" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="5" y1="8" x2="-4" y2="14" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="5" y1="8" x2="14" y2="16" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="5" y1="18" x2="0" y2="28" stroke="#1565C0" stroke-width="1.2"/>
    <line x1="5" y1="18" x2="12" y2="26" stroke="#1565C0" stroke-width="1.2"/>
    <!-- Inertia arrow -->
    <line x1="16" y1="6" x2="28" y2="6" stroke="#C62828" stroke-width="1.5"/>
    <polygon points="28,6 23,3 23,9" fill="#C62828"/>
  </g>
  <!-- Standing passenger -->
  <g transform="translate(80, 130)">
    <circle cx="5" cy="0" r="4" fill="#F5DEB3" stroke="#8D6E63" stroke-width="0.8"/>
    <line x1="5" y1="4" x2="5" y2="18" stroke="#2E7D32" stroke-width="1.5"/>
    <line x1="5" y1="8" x2="-3" y2="15" stroke="#2E7D32" stroke-width="1.2"/>
    <line x1="5" y1="8" x2="13" y2="14" stroke="#2E7D32" stroke-width="1.2"/>
    <line x1="5" y1="18" x2="2" y2="28" stroke="#2E7D32" stroke-width="1.2"/>
    <line x1="5" y1="18" x2="8" y2="28" stroke="#2E7D32" stroke-width="1.2"/>
    <!-- Holding rail -->
    <line x1="13" y1="4" x2="13" y2="20" stroke="#888" stroke-width="1"/>
  </g>
  <!-- Label -->
  <text x="130" y="190" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Пассажир продолжает</text>
  <text x="130" y="198" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">двигаться вперёд по инерции</text>

  <!-- Scene 2: Tablecloth trick -->
  <rect x="235" y="95" width="115" height="100" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="292" y="110" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Фокус с скатертью</text>
  <!-- Table -->
  <rect x="250" y="155" width="90" height="6" rx="2" fill="#8D6E63"/>
  <rect x="260" y="161" width="5" height="25" fill="#6D4C41"/>
  <rect x="325" y="161" width="5" height="25" fill="#6D4C41"/>
  <!-- Tablecloth being pulled -->
  <rect x="252" y="148" width="86" height="8" rx="1" fill="#C62828" opacity="0.8"/>
  <line x1="338" y1="152" x2="355" y2="152" stroke="#C62828" stroke-width="2"/>
  <polygon points="355,152 350,148 350,156" fill="#C62828"/>
  <!-- Dishes on table -->
  <ellipse cx="275" cy="145" rx="12" ry="5" fill="white" stroke="#999" stroke-width="1"/>
  <rect x="295" y="140" width="10" height="15" rx="1" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <ellipse cx="325" cy="145" rx="8" ry="4" fill="white" stroke="#999" stroke-width="1"/>
  <!-- Text -->
  <text x="292" y="192" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Посуда остаётся на месте</text>

  <!-- Scene 3: Hockey puck on ice -->
  <rect x="360" y="95" width="105" height="100" rx="4" fill="#E8F5E9" stroke="#81C784" stroke-width="1"/>
  <text x="412" y="110" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Шайба на льду</text>
  <!-- Ice surface -->
  <rect x="370" y="155" width="90" height="30" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="415" y="173" font-family="Arial,sans-serif" font-size="7" fill="#90CAF9" text-anchor="middle">лёд</text>
  <!-- Puck sliding -->
  <ellipse cx="400" cy="150" rx="12" ry="5" fill="#333" stroke="#111" stroke-width="1"/>
  <ellipse cx="400" cy="149" rx="8" ry="3" fill="#444"/>
  <!-- Motion arrow -->
  <line x1="413" y1="150" x2="445" y2="150" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="445,150 439,146 439,154" fill="#C62828"/>
  <!-- Friction very small note -->
  <text x="412" y="195" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Малое трение =</text>
  <text x="412" y="203" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">долгое скольжение</text>

  <!-- Definition card -->
  <rect x="35" y="205" width="430" height="78" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="250" y="225" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Закон инерции (Ньютон)</text>
  <text x="250" y="243" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">Тело сохраняет состояние покоя или равномерного</text>
  <text x="250" y="257" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">движения, пока на него не подействует другое тело.</text>
  <!-- Decorative dots -->
  <circle cx="60" cy="272" r="3" fill="#C62828" opacity="0.15"/>
  <circle cx="72" cy="272" r="3" fill="#1565C0" opacity="0.15"/>
  <circle cx="84" cy="272" r="3" fill="#F9A825" opacity="0.15"/>
  <circle cx="416" cy="272" r="3" fill="#C62828" opacity="0.15"/>
  <circle cx="428" cy="272" r="3" fill="#1565C0" opacity="0.15"/>
  <circle cx="440" cy="272" r="3" fill="#F9A825" opacity="0.15"/>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Инерция</text>
</svg>