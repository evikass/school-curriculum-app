<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Блюда из яиц</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Технология - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Egg anatomy diagram -->
  <rect x="25" y="88" width="120" height="200" rx="6" fill="white" stroke="#F9A825" stroke-width="1.2"/>
  <text x="85" y="105" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Строение яйца</text>

  <!-- Egg shape -->
  <ellipse cx="85" cy="185" rx="32" ry="42" fill="#FFF8E1" stroke="#E0C068" stroke-width="1.5"/>
  <!-- Shell label -->
  <line x1="52" y1="160" x2="35" y2="148" stroke="#777" stroke-width="0.7"/>
  <text x="35" y="145" font-family="Arial,sans-serif" font-size="8" fill="#777">Скорлупа</text>
  <!-- White -->
  <ellipse cx="85" cy="185" rx="26" ry="36" fill="white" stroke="#E0E0E0" stroke-width="0.8"/>
  <line x1="112" y1="170" x2="130" y2="160" stroke="#777" stroke-width="0.7"/>
  <text x="130" y="157" font-family="Arial,sans-serif" font-size="8" fill="#777">Белок</text>
  <!-- Yolk -->
  <circle cx="85" cy="190" r="16" fill="#FFC107" stroke="#FFA000" stroke-width="1"/>
  <line x1="85" y1="206" x2="85" y2="222" stroke="#777" stroke-width="0.7"/>
  <text x="85" y="234" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Желток</text>
  <!-- Air pocket -->
  <ellipse cx="85" cy="148" rx="10" ry="4" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.5"/>
  <line x1="75" y1="148" x2="58" y2="135" stroke="#777" stroke-width="0.7"/>
  <text x="35" y="132" font-family="Arial,sans-serif" font-size="8" fill="#777">Воздушная</text>
  <text x="35" y="142" font-family="Arial,sans-serif" font-size="8" fill="#777">камера</text>
  <!-- Yolk highlight -->
  <circle cx="80" cy="185" r="4" fill="#FFD54F" opacity="0.5"/>

  <!-- Dish Card 1: Fried egg -->
  <rect x="155" y="88" width="95" height="95" rx="6" fill="white" stroke="#F9A825" stroke-width="1.2"/>
  <text x="202" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Яичница</text>
  <!-- Pan -->
  <ellipse cx="202" cy="150" rx="38" ry="10" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <rect x="164" y="143" width="76" height="7" rx="1" fill="#607D8B"/>
  <!-- Pan handle -->
  <rect x="240" y="143" width="25" height="7" rx="3" fill="#546E7A"/>
  <!-- Fried egg -->
  <ellipse cx="202" cy="148" rx="24" ry="15" fill="white" stroke="#E0E0E0" stroke-width="0.5" opacity="0.9"/>
  <circle cx="198" cy="146" r="8" fill="#FFC107" stroke="#FFA000" stroke-width="0.8"/>
  <circle cx="195" cy="144" r="2" fill="#FFD54F" opacity="0.5"/>
  <!-- Heat lines -->
  <path d="M185,155 Q183,158 185,161" fill="none" stroke="#F44336" stroke-width="0.5" opacity="0.4"/>
  <path d="M200,156 Q198,159 200,162" fill="none" stroke="#F44336" stroke-width="0.5" opacity="0.4"/>
  <path d="M215,155 Q213,158 215,161" fill="none" stroke="#F44336" stroke-width="0.5" opacity="0.4"/>
  <text x="202" y="178" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">На сковороде</text>

  <!-- Dish Card 2: Boiled egg -->
  <rect x="260" y="88" width="95" height="95" rx="6" fill="white" stroke="#F9A825" stroke-width="1.2"/>
  <text x="307" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Варёное яйцо</text>
  <!-- Egg cup -->
  <rect x="290" y="148" width="34" height="22" rx="4" fill="#E8EAF6" stroke="#7986CB" stroke-width="0.8"/>
  <ellipse cx="307" cy="148" rx="17" ry="4" fill="#C5CAE9" stroke="#7986CB" stroke-width="0.5"/>
  <!-- Boiled egg in cup -->
  <ellipse cx="307" cy="140" rx="13" ry="17" fill="#FFF8E1" stroke="#E0C068" stroke-width="1"/>
  <!-- Cracked top -->
  <path d="M296,130 L307,126 L318,130" fill="#FFF8E1" stroke="#E0C068" stroke-width="0.8"/>
  <path d="M300,130 L307,127 L314,130" fill="white" stroke="none"/>
  <!-- Lines on shell -->
  <line x1="300" y1="135" x2="298" y2="150" stroke="#E0C068" stroke-width="0.4" opacity="0.5"/>
  <line x1="314" y1="135" x2="316" y2="150" stroke="#E0C068" stroke-width="0.4" opacity="0.5"/>
  <text x="307" y="178" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Вкрутую / всмятку</text>

  <!-- Dish Card 3: Omelette -->
  <rect x="365" y="88" width="110" height="95" rx="6" fill="white" stroke="#F9A825" stroke-width="1.2"/>
  <text x="420" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Омлет</text>
  <!-- Plate -->
  <ellipse cx="420" cy="152" rx="40" ry="10" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.8"/>
  <!-- Omelette -->
  <path d="M388,148 Q390,130 420,128 Q450,130 452,148 Q440,155 420,156 Q400,155 388,148Z" fill="#FFC107" stroke="#FFA000" stroke-width="0.8"/>
  <!-- Omelette layers -->
  <path d="M392,146 Q394,134 420,132 Q446,134 448,146 Q435,152 420,153 Q405,152 392,146Z" fill="#FFD54F" opacity="0.6"/>
  <!-- Herbs/filling dots -->
  <circle cx="405" cy="142" r="2" fill="#4CAF50" opacity="0.6"/>
  <circle cx="425" cy="140" r="2" fill="#4CAF50" opacity="0.6"/>
  <circle cx="435" cy="144" r="1.5" fill="#4CAF50" opacity="0.6"/>
  <circle cx="415" cy="147" r="1.5" fill="#F44336" opacity="0.4"/>
  <text x="420" y="178" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">С начинкой</text>

  <!-- Dish Card 4: Scrambled eggs -->
  <rect x="155" y="193" width="140" height="95" rx="6" fill="white" stroke="#F9A825" stroke-width="1.2"/>
  <text x="225" y="210" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Яичница-болтунья</text>
  <!-- Plate -->
  <ellipse cx="225" cy="255" rx="50" ry="12" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.8"/>
  <!-- Scrambled egg - cloud-like shape -->
  <ellipse cx="210" cy="252" rx="18" ry="10" fill="#FFC107" stroke="#FFA000" stroke-width="0.5"/>
  <ellipse cx="235" cy="250" rx="16" ry="9" fill="#FFD54F" stroke="#FFA000" stroke-width="0.5"/>
  <ellipse cx="222" cy="248" rx="20" ry="8" fill="#FFC107" stroke="#FFA000" stroke-width="0.5"/>
  <ellipse cx="248" cy="253" rx="12" ry="7" fill="#FFD54F" stroke="#FFA000" stroke-width="0.5"/>
  <ellipse cx="200" cy="255" rx="12" ry="6" fill="#FFD54F" stroke="#FFA000" stroke-width="0.5"/>
  <text x="225" y="278" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Взбитые и обжаренные</text>

  <!-- Cooking tips panel -->
  <rect x="305" y="193" width="170" height="95" rx="6" fill="white" stroke="#C62828" stroke-width="1"/>
  <text x="390" y="210" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Приготовление</text>
  <line x1="315" y1="216" x2="465" y2="216" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>

  <!-- Steps -->
  <circle cx="325" cy="230" r="8" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.8"/>
  <text x="325" y="233" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">1</text>
  <text x="340" y="233" font-family="Arial,sans-serif" font-size="8" fill="#424242">Разбить яйца</text>

  <circle cx="325" cy="250" r="8" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.8"/>
  <text x="325" y="253" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">2</text>
  <text x="340" y="253" font-family="Arial,sans-serif" font-size="8" fill="#424242">Посолить, поперчить</text>

  <circle cx="325" cy="270" r="8" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.8"/>
  <text x="325" y="273" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">3</text>
  <text x="340" y="273" font-family="Arial,sans-serif" font-size="8" fill="#424242">Жарить / варить</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Блюда из яиц</text>
</svg>