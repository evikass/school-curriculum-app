  <text x="80" y="150" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Чёрный металл</text>
  <text x="80" y="161" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Магнитное свойство</text>
  <text x="80" y="172" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Основа чугуна и стали</text>

