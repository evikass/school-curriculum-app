  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Metal Card 1: Iron -->
  <rect x="25" y="88" width="110" height="100" rx="6" fill="white" stroke="#78909C" stroke-width="1.2"/>
  <rect x="25" y="88" width="110" height="22" rx="6" fill="#78909C" opacity="0.15"/>
  <text x="80" y="103" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#37474F" text-anchor="middle">Железо</text>
  <!-- Iron bar -->
  <rect x="40" y="118" width="80" height="16" rx="2" fill="#90A4AE" stroke="#78909C" stroke-width="1"/>
  <rect x="40" y="118" width="80" height="4" rx="1" fill="#B0BEC5" opacity="0.5"/>
