  <line x1="420" y1="125" x2="430" y2="125" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="425" y1="120" x2="425" y2="130" stroke="white" stroke-width="1" opacity="0.5"/>
  <text x="430" y="150" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Сплав Fe + C</text>
  <text x="430" y="161" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Очень прочная</text>
  <text x="430" y="172" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Инструменты</text>

  <!-- Properties comparison table -->
  <rect x="25" y="198" width="450" height="100" rx="6" fill="white" stroke="#C62828" stroke-width="1"/>
  <text x="250" y="216" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#C62828" text-anchor="middle">Сравнение свойств металлов</text>
  <line x1="40" y1="222" x2="460" y2="222" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>

  <!-- Table headers -->
  <text x="95" y="237" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#37474F" text-anchor="middle">Металл</text>
  <text x="195" y="237" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#37474F" text-anchor="middle">Пластичность</text>
  <text x="295" y="237" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#37474F" text-anchor="middle">Теплопро-водность</text>
  <text x="400" y="237" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#37474F" text-anchor="middle">Прочность</text>
  <line x1="40" y1="242" x2="460" y2="242" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- Iron row -->
  <text x="95" y="256" font-family="Arial,sans-serif" font-size="9" fill="#424242" text-anchor="middle">Железо</text>
  <rect x="155" y="247" width="80" height="12" rx="2" fill="#E8F5E9"/>
  <rect x="155" y="247" width="50" height="12" rx="2" fill="#66BB6A" opacity="0.7"/>
  <rect x="255" y="247" width="80" height="12" rx="2" fill="#E8F5E9"/>
  <rect x="255" y="247" width="60" height="12" rx="2" fill="#66BB6A" opacity="0.7"/>
  <rect x="355" y="247" width="90" height="12" rx="2" fill="#E8F5E9"/>
  <rect x="355" y="247" width="65" height="12" rx="2" fill="#66BB6A" opacity="0.7"/>

  <!-- Copper row -->
  <text x="95" y="274" font-family="Arial,sans-serif" font-size="9" fill="#424242" text-anchor="middle">Медь</text>
  <rect x="155" y="265" width="80" height="12" rx="2" fill="#FFF3E0"/>
  <rect x="155" y="265" width="75" height="12" rx="2" fill="#FFA726" opacity="0.6"/>
  <rect x="255" y="265" width="80" height="12" rx="2" fill="#FFF3E0"/>
  <rect x="255" y="265" width="80" height="12" rx="2" fill="#FFA726" opacity="0.6"/>
  <rect x="355" y="265" width="90" height="12" rx="2" fill="#FFF3E0"/>
  <rect x="355" y="265" width="45" height="12" rx="2" fill="#FFA726" opacity="0.6"/>

  <!-- Aluminum row -->
  <text x="95" y="292" font-family="Arial,sans-serif" font-size="9" fill="#424242" text-anchor="middle">Алюминий</text>
  <rect x="155" y="283" width="80" height="12" rx="2" fill="#E3F2FD"/>
  <rect x="155" y="283" width="70" height="12" rx="2" fill="#42A5F5" opacity="0.5"/>
  <rect x="255" y="283" width="80" height="12" rx="2" fill="#E3F2FD"/>
  <rect x="255" y="283" width="55" height="12" rx="2" fill="#42A5F5" opacity="0.5"/>
  <rect x="355" y="283" width="90" height="12" rx="2" fill="#E3F2FD"/>
  <rect x="355" y="283" width="30" height="12" rx="2" fill="#42A5F5" opacity="0.5"/>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Свойства металлов</text>
</svg>