<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="bone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFECB3"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <linearGradient id="muscle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <linearGradient id="joint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="100%" stop-color="#FF7043"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)"/>
  <rect x="2" y="2" width="496" height="346" rx="11" fill="none" stroke="#FFCC80" stroke-width="1.5"/>
  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#BF360C">Опорно-двигательная система</text>
  <!-- Human skeleton figure - center -->
  <!-- Skull -->
  <ellipse cx="250" cy="72" rx="22" ry="26" fill="url(#bone)" stroke="#D4A039" stroke-width="1.5"/>
  <circle cx="242" cy="68" r="4" fill="#5D4037"/>
  <circle cx="258" cy="68" r="4" fill="#5D4037"/>
  <ellipse cx="250" cy="80" rx="6" ry="3" fill="#D4A039"/>
  <!-- Spine -->
  <rect x="247" y="98" width="6" height="90" rx="3" fill="url(#bone)" stroke="#D4A039" stroke-width="1"/>
  <!-- Spine segments -->
  <line x1="247" y1="110" x2="253" y2="110" stroke="#D4A039" stroke-width="0.8"/>
  <line x1="247" y1="120" x2="253" y2="120" stroke="#D4A039" stroke-width="0.8"/>
  <line x1="247" y1="130" x2="253" y2="130" stroke="#D4A039" stroke-width="0.8"/>
  <line x1="247" y1="140" x2="253" y2="140" stroke="#D4A039" stroke-width="0.8"/>
  <line x1="247" y1="150" x2="253" y2="150" stroke="#D4A039" stroke-width="0.8"/>
  <line x1="247" y1="160" x2="253" y2="160" stroke="#D4A039" stroke-width="0.8"/>
  <line x1="247" y1="170" x2="253" y2="170" stroke="#D4A039" stroke-width="0.8"/>
  <!-- Ribcage -->
  <path d="M247,110 Q220,110 210,130 Q205,145 215,155 Q225,160 247,160" fill="none" stroke="url(#bone)" stroke-width="4" stroke-linecap="round"/>
  <path d="M253,110 Q280,110 290,130 Q295,145 285,155 Q275,160 253,160" fill="none" stroke="url(#bone)" stroke-width="4" stroke-linecap="round"/>
  <path d="M247,118 Q225,118 218,132 Q214,142 222,150 Q230,154 247,154" fill="none" stroke="#FFECB3" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M253,118 Q275,118 282,132 Q286,142 278,150 Q270,154 253,154" fill="none" stroke="#FFECB3" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Pelvis -->
  <path d="M247,188 Q230,188 222,200 Q218,210 230,218 Q240,220 250,218 Q260,220 270,218 Q282,210 278,200 Q270,188 253,188" fill="url(#bone)" stroke="#D4A039" stroke-width="1.2"/>
  <!-- Left arm bones -->
  <line x1="210" y1="110" x2="190" y2="115" stroke="url(#bone)" stroke-width="5" stroke-linecap="round"/>
  <line x1="190" y1="115" x2="165" y2="145" stroke="url(#bone)" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="165" cy="145" r="5" fill="url(#joint)" stroke="#D4A039" stroke-width="1"/>
  <line x1="165" y1="150" x2="155" y2="185" stroke="url(#bone)" stroke-width="4" stroke-linecap="round"/>
  <!-- Left hand -->
  <line x1="155" y1="185" x2="148" y2="200" stroke="url(#bone)" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="185" x2="155" y2="202" stroke="url(#bone)" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="185" x2="162" y2="200" stroke="url(#bone)" stroke-width="2" stroke-linecap="round"/>
  <!-- Right arm bones -->
  <line x1="290" y1="110" x2="310" y2="115" stroke="url(#bone)" stroke-width="5" stroke-linecap="round"/>
  <line x1="310" y1="115" x2="335" y2="145" stroke="url(#bone)" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="335" cy="145" r="5" fill="url(#joint)" stroke="#D4A039" stroke-width="1"/>
  <line x1="335" y1="150" x2="345" y2="185" stroke="url(#bone)" stroke-width="4" stroke-linecap="round"/>
  <!-- Right hand -->
  <line x1="345" y1="185" x2="338" y2="200" stroke="url(#bone)" stroke-width="2" stroke-linecap="round"/>
  <line x1="345" y1="185" x2="345" y2="202" stroke="url(#bone)" stroke-width="2" stroke-linecap="round"/>
  <line x1="345" y1="185" x2="352" y2="200" stroke="url(#bone)" stroke-width="2" stroke-linecap="round"/>
  <!-- Left leg -->
  <line x1="238" y1="218" x2="228" y2="260" stroke="url(#bone)" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="228" cy="260" r="5.5" fill="url(#joint)" stroke="#D4A039" stroke-width="1"/>
  <line x1="228" y1="265" x2="225" y2="310" stroke="url(#bone)" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="222" cy="316" rx="12" ry="5" fill="url(#bone)" stroke="#D4A039" stroke-width="1"/>
  <!-- Right leg -->
  <line x1="262" y1="218" x2="272" y2="260" stroke="url(#bone)" stroke-width="5.5" stroke-linecap="round"/>
  <circle cx="272" cy="260" r="5.5" fill="url(#joint)" stroke="#D4A039" stroke-width="1"/>
  <line x1="272" y1="265" x2="275" y2="310" stroke="url(#bone)" stroke-width="5" stroke-linecap="round"/>
  <ellipse cx="278" cy="316" rx="12" ry="5" fill="url(#bone)" stroke="#D4A039" stroke-width="1"/>
  <!-- Muscle overlay on right arm -->
  <path d="M310,118 Q325,125 332,140 Q328,130 310,125 Z" fill="url(#muscle)" opacity="0.6" stroke="#BF360C" stroke-width="0.5"/>
  <path d="M335,150 Q348,165 345,180 Q342,168 332,155 Z" fill="url(#muscle)" opacity="0.6" stroke="#BF360C" stroke-width="0.5"/>
  <!-- Muscle overlay on right leg -->
  <path d="M268,222 Q280,235 278,255 Q275,242 264,230 Z" fill="url(#muscle)" opacity="0.6" stroke="#BF360C" stroke-width="0.5"/>
  <path d="M273,268 Q282,280 280,305 Q278,290 270,275 Z" fill="url(#muscle)" opacity="0.6" stroke="#BF360C" stroke-width="0.5"/>
  <!-- Labels -->
  <line x1="250" y1="72" x2="395" y2="52" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="56" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" font-weight="bold">Череп</text>
  <line x1="210" y1="130" x2="395" y2="115" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="119" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" font-weight="bold">Рёбра</text>
  <line x1="250" y1="150" x2="395" y2="148" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="152" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" font-weight="bold">Позвоночник</text>
  <line x1="335" y1="170" x2="395" y2="178" stroke="#BF360C" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="182" font-family="Arial,sans-serif" font-size="11" fill="#BF360C" font-weight="bold">Мышцы</text>
  <line x1="228" y1="260" x2="100" y2="255" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="50" y="259" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" font-weight="bold">Колено</text>
  <line x1="165" y1="145" x2="80" y2="140" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="35" y="144" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" font-weight="bold">Локоть</text>
  <line x1="222" y1="316" x2="100" y2="310" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="50" y="314" font-family="Arial,sans-serif" font-size="11" fill="#5D4037" font-weight="bold">Стопа</text>
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="18" fill="#FFCC80" opacity="0.3"/>
  <circle cx="450" cy="320" r="22" fill="#FFAB91" opacity="0.25"/>
  <circle cx="42" cy="290" r="12" fill="#FFE0B2" opacity="0.4"/>
  <circle cx="460" cy="70" r="15" fill="#FFCC80" opacity="0.3"/>
  <!-- Bottom info -->
  <rect x="130" y="332" width="240" height="14" rx="7" fill="#FFCC80" opacity="0.4"/>
  <text x="250" y="343" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#8D6E63">Кости • Мышцы • Суставы • Связки</text>
</svg>