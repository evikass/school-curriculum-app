<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Строение растений</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main plant cross-section card -->
  <rect x="20" y="88" width="280" height="210" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>

  <!-- Underground soil area -->
  <rect x="21" y="215" width="278" height="82" rx="0" fill="#EFEBE9" opacity="0.5"/>
  <text x="40" y="230" font-family="Arial,sans-serif" font-size="7" fill="#795548" opacity="0.6">почва</text>

  <!-- Root system -->
  <!-- Main taproot -->
  <path d="M160,215 L160,275" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
  <!-- Lateral roots -->
  <path d="M160,230 Q145,240 130,250" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M130,250 Q122,256 115,260" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M130,250 Q128,258 125,265" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M160,240 Q175,250 190,260" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M190,260 Q198,266 205,270" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M190,260 Q192,268 195,275" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M160,255 Q148,265 138,278" stroke="#8D6E63" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M160,260 Q172,270 180,280" stroke="#8D6E63" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Root hairs (tiny lines) -->
  <line x1="115" y1="260" x2="110" y2="262" stroke="#BCAAA4" stroke-width="0.7"/>
  <line x1="115" y1="260" x2="112" y2="266" stroke="#BCAAA4" stroke-width="0.7"/>
  <line x1="125" y1="265" x2="120" y2="268" stroke="#BCAAA4" stroke-width="0.7"/>
  <line x1="205" y1="270" x2="210" y2="272" stroke="#BCAAA4" stroke-width="0.7"/>
  <line x1="205" y1="270" x2="208" y2="276" stroke="#BCAAA4" stroke-width="0.7"/>
  <line x1="195" y1="275" x2="200" y2="278" stroke="#BCAAA4" stroke-width="0.7"/>
  <!-- Root label -->
  <line x1="115" y1="252" x2="75" y2="242" stroke="#795548" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="73" y="240" font-family="Arial,sans-serif" font-size="7" fill="#795548" text-anchor="end" font-weight="bold">Корень</text>
  <text x="73" y="249" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">всасывание воды</text>

  <!-- Stem -->
  <rect x="154" y="148" width="12" height="70" rx="2" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Vascular bundles in stem -->
  <line x1="157" y1="155" x2="157" y2="210" stroke="#43A047" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="163" y1="155" x2="163" y2="210" stroke="#43A047" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Stem label -->
  <line x1="166" y1="175" x2="210" y2="165" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="212" y="163" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Стебель</text>
  <text x="212" y="172" font-family="Arial,sans-serif" font-size="6" fill="#999">проводит воду</text>

  <!-- Leaves -->
  <!-- Left leaf -->
  <path d="M154,160 Q125,140 100,150 Q90,155 85,160" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  <ellipse cx="115" cy="148" rx="28" ry="10" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1" transform="rotate(-15,115,148)" opacity="0.8"/>
  <!-- Leaf vein -->
  <line x1="154" y1="158" x2="90" y2="152" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="130" y1="153" x2="125" y2="142" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="115" y1="150" x2="110" y2="140" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="100" y1="152" x2="98" y2="145" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Right leaf -->
  <path d="M166,155 Q195,135 220,145 Q230,150 235,155" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  <ellipse cx="205" cy="143" rx="28" ry="10" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1" transform="rotate(15,205,143)" opacity="0.8"/>
  <!-- Leaf vein -->
  <line x1="166" y1="153" x2="230" y2="148" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="190" y1="149" x2="195" y2="138" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="205" y1="147" x2="210" y2="136" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="220" y1="149" x2="222" y2="141" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Upper leaf pair -->
  <path d="M154,145 Q130,128 108,135 Q98,140 95,145" stroke="#2E7D32" stroke-width="1.2" fill="none"/>
  <ellipse cx="122" cy="133" rx="24" ry="9" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8" transform="rotate(-10,122,133)" opacity="0.8"/>
  <path d="M166,140 Q190,123 212,130 Q222,135 225,140" stroke="#2E7D32" stroke-width="1.2" fill="none"/>
  <ellipse cx="198" cy="128" rx="24" ry="9" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8" transform="rotate(10,198,128)" opacity="0.8"/>
  <!-- Leaf label -->
  <line x1="230" y1="142" x2="265" y2="132" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="267" y="130" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Лист</text>
  <text x="267" y="139" font-family="Arial,sans-serif" font-size="6" fill="#999">фотосинтез</text>

  <!-- Flower on top -->
  <!-- Petals -->
  <ellipse cx="155" cy="105" rx="7" ry="14" fill="#FF8A80" stroke="#E53935" stroke-width="0.8"/>
  <ellipse cx="140" cy="110" rx="7" ry="14" fill="#FF8A80" stroke="#E53935" stroke-width="0.8" transform="rotate(72,140,110)"/>
  <ellipse cx="170" cy="110" rx="7" ry="14" fill="#FF8A80" stroke="#E53935" stroke-width="0.8" transform="rotate(-72,170,110)"/>
  <ellipse cx="143" cy="125" rx="7" ry="14" fill="#FF8A80" stroke="#E53935" stroke-width="0.8" transform="rotate(35,143,125)"/>
  <ellipse cx="167" cy="125" rx="7" ry="14" fill="#FF8A80" stroke="#E53935" stroke-width="0.8" transform="rotate(-35,167,125)"/>
  <!-- Center -->
  <circle cx="155" cy="115" r="7" fill="#FDD835" stroke="#F9A825" stroke-width="1"/>
  <circle cx="155" cy="115" r="4" fill="#F9A825"/>
  <!-- Flower label -->
  <line x1="172" y1="105" x2="215" y2="100" stroke="#E53935" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="217" y="98" font-family="Arial,sans-serif" font-size="7" fill="#E53935" font-weight="bold">Цветок</text>
  <text x="217" y="107" font-family="Arial,sans-serif" font-size="6" fill="#999">размножение</text>

  <!-- Right info card -->
  <rect x="315" y="88" width="165" height="100" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="397" y="104" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">ФУНКЦИИ ОРГАНОВ</text>
  <!-- Root icon + text -->
  <rect x="325" y="112" width="30" height="20" rx="3" fill="#EFEBE9" stroke="#795548" stroke-width="0.8"/>
  <path d="M335,120 L340,128 L345,120" stroke="#8D6E63" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M340,128 Q335,132 330,134" stroke="#8D6E63" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M340,128 Q345,132 350,134" stroke="#8D6E63" stroke-width="1" fill="none" stroke-linecap="round"/>
  <text x="362" y="122" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">Корень - вода</text>
  <text x="362" y="130" font-family="Arial,sans-serif" font-size="6" fill="#999">минеральные соли</text>
  <!-- Stem icon + text -->
  <rect x="325" y="140" width="30" height="20" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <rect x="337" y="143" width="6" height="14" rx="1" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="362" y="150" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Стебель - опора</text>
  <text x="362" y="158" font-family="Arial,sans-serif" font-size="6" fill="#999">транспорт веществ</text>
  <!-- Leaf icon + text -->
  <rect x="325" y="168" width="30" height="18" rx="3" fill="#F1F8E9" stroke="#66BB6A" stroke-width="0.8"/>
  <ellipse cx="340" cy="177" rx="10" ry="6" fill="#A5D6A7" stroke="#66BB6A" stroke-width="0.5"/>
  <text x="362" y="178" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Лист - фотосинтез</text>
  <text x="362" y="186" font-family="Arial,sans-serif" font-size="6" fill="#999">дыхание, испарение</text>

  <!-- Water transport card -->
  <rect x="315" y="198" width="165" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="397" y="214" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">ПРОВОДЯЩАЯ СИСТЕМА</text>
  <!-- Xylem upward arrows (water) -->
  <text x="340" y="238" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">Ксилема</text>
  <line x1="340" y1="242" x2="340" y2="275" stroke="#1565C0" stroke-width="2"/>
  <polygon points="337,275 340,282 343,275" fill="#1565C0"/>
  <text x="355" y="252" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">вода вверх</text>
  <!-- Water drops -->
  <path d="M336,260 Q336,256 340,256 Q344,256 344,260" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <path d="M336,268 Q336,264 340,264 Q344,264 344,268" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <!-- Phloem downward arrows (food) -->
  <text x="420" y="238" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" font-weight="bold">Флоэма</text>
  <line x1="420" y1="275" x2="420" y2="242" stroke="#F9A825" stroke-width="2"/>
  <polygon points="417,242 420,235 423,242" fill="#F9A825"/>
  <text x="435" y="262" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">питание вниз</text>
  <!-- Sugar dots -->
  <circle cx="418" cy="250" r="2" fill="#FDD835"/>
  <circle cx="422" cy="258" r="2" fill="#FDD835"/>
  <circle cx="418" cy="266" r="2" fill="#FDD835"/>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Строение растений</text>
</svg>