<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Фотосинтез</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Биология - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main photosynthesis diagram card -->
  <rect x="20" y="88" width="460" height="210" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>

  <!-- Sun - top left -->
  <circle cx="70" cy="120" r="22" fill="#FDD835" stroke="#F9A825" stroke-width="2"/>
  <circle cx="70" cy="120" r="16" fill="#FFEE58"/>
  <circle cx="70" cy="120" r="8" fill="#FFF9C4"/>
  <!-- Sun rays -->
  <line x1="70" y1="94" x2="70" y2="88" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="146" x2="70" y2="152" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="120" x2="38" y2="120" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="96" y1="120" x2="102" y2="120" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="102" x2="48" y2="98" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="102" x2="92" y2="98" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="138" x2="48" y2="142" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="138" x2="92" y2="142" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <text x="70" y="165" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle" font-weight="bold">Солнечная</text>
  <text x="70" y="174" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle" font-weight="bold">энергия</text>

  <!-- Energy arrow from sun to leaf -->
  <path d="M95,115 Q150,105 195,130" stroke="#F9A825" stroke-width="2.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="195,127 200,134 193,133" fill="#F9A825"/>
  <text x="145" y="105" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">свет</text>

  <!-- Large leaf - center -->
  <ellipse cx="250" cy="175" rx="60" ry="30" fill="#66BB6A" stroke="#2E7D32" stroke-width="2" transform="rotate(-5,250,175)"/>
  <!-- Leaf inner pattern -->
  <ellipse cx="250" cy="175" rx="45" ry="22" fill="#81C784" stroke="#2E7D32" stroke-width="1" transform="rotate(-5,250,175)" opacity="0.7"/>
  <!-- Central vein -->
  <line x1="195" y1="178" x2="305" y2="172" stroke="#2E7D32" stroke-width="2"/>
  <!-- Side veins -->
  <line x1="215" y1="175" x2="210" y2="162" stroke="#2E7D32" stroke-width="1"/>
  <line x1="230" y1="174" x2="225" y2="160" stroke="#2E7D32" stroke-width="1"/>
  <line x1="245" y1="173" x2="242" y2="158" stroke="#2E7D32" stroke-width="1"/>
  <line x1="260" y1="173" x2="264" y2="158" stroke="#2E7D32" stroke-width="1"/>
  <line x1="275" y1="173" x2="280" y2="160" stroke="#2E7D32" stroke-width="1"/>
  <line x1="290" y1="173" x2="296" y2="162" stroke="#2E7D32" stroke-width="1"/>
  <line x1="215" y1="178" x2="210" y2="192" stroke="#2E7D32" stroke-width="1"/>
  <line x1="230" y1="177" x2="225" y2="192" stroke="#2E7D32" stroke-width="1"/>
  <line x1="260" y1="175" x2="264" y2="190" stroke="#2E7D32" stroke-width="1"/>
  <line x1="275" y1="174" x2="280" y2="188" stroke="#2E7D32" stroke-width="1"/>
  <line x1="290" y1="174" x2="296" y2="185" stroke="#2E7D32" stroke-width="1"/>

  <!-- Chloroplasts inside leaf -->
  <ellipse cx="235" cy="170" rx="8" ry="4" fill="#43A047" stroke="#1B5E20" stroke-width="0.8" transform="rotate(10,235,170)"/>
  <ellipse cx="260" cy="168" rx="8" ry="4" fill="#43A047" stroke="#1B5E20" stroke-width="0.8" transform="rotate(-15,260,168)"/>
  <ellipse cx="250" cy="182" rx="7" ry="4" fill="#43A047" stroke="#1B5E20" stroke-width="0.8" transform="rotate(5,250,182)"/>
  <text x="250" y="215" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Лист с хлоропластами</text>

  <!-- CO2 input - left arrow -->
  <path d="M175,145 L195,155" stroke="#E53935" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="195,152 202,158 194,158" fill="#E53935"/>
  <text x="150" y="140" font-family="Arial,sans-serif" font-size="8" fill="#E53935" font-weight="bold">CO2</text>
  <!-- CO2 molecule -->
  <circle cx="140" cy="148" r="4" fill="#EF5350" opacity="0.6"/>
  <circle cx="132" cy="153" r="3" fill="#EF5350" opacity="0.4"/>
  <circle cx="148" cy="153" r="3" fill="#EF5350" opacity="0.4"/>

  <!-- H2O input - bottom left arrow -->
  <path d="M210,260 L220,230" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="218,232 222,224 224,233" fill="#1565C0"/>
  <text x="195" y="272" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold">H2O</text>
  <!-- Water drops -->
  <path d="M200,255 Q200,248 205,248 Q210,248 210,255" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <path d="M190,260 Q190,255 194,255 Q198,255 198,260" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>

  <!-- O2 output - right arrow -->
  <path d="M310,155 L340,140" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="337,137 345,138 340,144" fill="#2E7D32"/>
  <text x="355" y="138" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold">O2</text>
  <!-- O2 molecule -->
  <circle cx="370" cy="135" r="4" fill="#66BB6A" opacity="0.5"/>
  <circle cx="380" cy="135" r="4" fill="#66BB6A" opacity="0.5"/>
  <line x1="374" y1="135" x2="376" y2="135" stroke="#2E7D32" stroke-width="1"/>

  <!-- C6H12O6 output - bottom right -->
  <path d="M290,230 L330,255" stroke="#F9A825" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="327,252 335,258 328,259" fill="#F9A825"/>
  <text x="350" y="260" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" font-weight="bold">C6H12O6</text>
  <text x="350" y="270" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">глюкоза</text>
  <!-- Glucose hexagon -->
  <polygon points="390,250 396,246 402,250 402,258 396,262 390,258" fill="#FFECB3" stroke="#F9A825" stroke-width="1" opacity="0.8"/>
  <polygon points="406,250 412,246 418,250 418,258 412,262 406,258" fill="#FFE082" stroke="#F9A825" stroke-width="1" opacity="0.8"/>

  <!-- Equation card -->
  <rect x="340" y="88" width="135" height="35" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="407" y="102" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">6CO2 + 6H2O</text>
  <text x="407" y="112" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">+ свет = C6H12O6 + 6O2</text>

  <!-- Labels at bottom -->
  <rect x="30" y="280" width="100" height="14" rx="3" fill="#E53935" opacity="0.1"/>
  <text x="80" y="290" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle">Углекислый газ</text>
  <rect x="145" y="280" width="80" height="14" rx="3" fill="#1565C0" opacity="0.1"/>
  <text x="185" y="290" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Вода</text>
  <rect x="240" y="280" width="100" height="14" rx="3" fill="#F9A825" opacity="0.1"/>
  <text x="290" y="290" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">Глюкоза</text>
  <rect x="355" y="280" width="100" height="14" rx="3" fill="#2E7D32" opacity="0.1"/>
  <text x="405" y="290" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Кислород</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Фотосинтез</text>
</svg>