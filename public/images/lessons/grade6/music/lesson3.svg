<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Вокальные жанры</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Музыка - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Voice type cards - 4 voices at different heights representing pitch range -->
  
  <!-- Soprano - Highest voice -->
  <rect x="30" y="88" width="105" height="210" rx="6" fill="#FFFFFF" stroke="#E91E63" stroke-width="1.5" opacity="0.95"/>
  <rect x="30" y="88" width="105" height="28" rx="6" fill="#E91E63" opacity="0.85"/>
  <rect x="30" y="104" width="105" height="12" fill="#E91E63" opacity="0.85"/>
  <text x="82" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Сопрано</text>
  <!-- Soprano silhouette - female singer with mouth open high -->
  <g transform="translate(82, 200)">
    <!-- Head -->
    <circle cx="0" cy="-55" r="14" fill="#4A4A4A" opacity="0.75"/>
    <!-- Hair -->
    <path d="M-14,-55 Q-15,-72 0,-74 Q15,-72 14,-55" fill="#333" opacity="0.6"/>
    <!-- Neck -->
    <rect x="-4" y="-42" width="8" height="10" fill="#4A4A4A" opacity="0.7"/>
    <!-- Body/shoulders -->
    <path d="M-25,-32 Q-20,-42 0,-40 Q20,-42 25,-32 L25,-5 Q20,5 0,5 Q-20,5 -25,-5 Z" fill="#E91E63" opacity="0.6"/>
    <!-- Open mouth singing -->
    <ellipse cx="0" cy="-48" rx="4" ry="5" fill="#2A2A2A"/>
    <!-- Musical notes floating up -->
    <circle cx="18" cy="-70" r="3" fill="#E91E63" opacity="0.7"/>
    <rect x="20" y="-80" width="1.5" height="10" fill="#E91E63" opacity="0.7"/>
    <path d="M21.5,-80 Q28,-78 21.5,-74" fill="#E91E63" opacity="0.7"/>
    <circle cx="25" cy="-60" r="2.5" fill="#E91E63" opacity="0.5"/>
    <rect x="27" y="-68" width="1.5" height="8" fill="#E91E63" opacity="0.5"/>
    <!-- High pitch waves -->
    <path d="M-30,-50 Q-35,-55 -30,-60" fill="none" stroke="#E91E63" stroke-width="1" opacity="0.4"/>
    <path d="M-35,-47 Q-42,-55 -35,-63" fill="none" stroke="#E91E63" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Pitch range indicator -->
  <rect x="40" y="250" width="85" height="10" rx="2" fill="#E91E63" opacity="0.1"/>
  <rect x="40" y="250" width="85" height="10" rx="2" fill="none" stroke="#E91E63" stroke-width="0.5" opacity="0.3"/>
  <text x="42" y="258" font-family="Arial,sans-serif" font-size="7" fill="#E91E63">Высокий голос</text>
  <text x="82" y="278" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Женский</text>
  <text x="82" y="290" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">высокий регистр</text>

  <!-- Alto -->
  <rect x="145" y="88" width="105" height="210" rx="6" fill="#FFFFFF" stroke="#9C27B0" stroke-width="1.5" opacity="0.95"/>
  <rect x="145" y="88" width="105" height="28" rx="6" fill="#9C27B0" opacity="0.85"/>
  <rect x="145" y="104" width="105" height="12" fill="#9C27B0" opacity="0.85"/>
  <text x="197" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Альт</text>
  <!-- Alto silhouette -->
  <g transform="translate(197, 210)">
    <circle cx="0" cy="-50" r="13" fill="#4A4A4A" opacity="0.75"/>
    <path d="M-13,-50 Q-14,-66 0,-68 Q14,-66 13,-50" fill="#333" opacity="0.6"/>
    <rect x="-4" y="-38" width="8" height="10" fill="#4A4A4A" opacity="0.7"/>
    <path d="M-23,-28 Q-18,-38 0,-36 Q18,-38 23,-28 L23,0 Q18,8 0,8 Q-18,8 -23,0 Z" fill="#9C27B0" opacity="0.6"/>
    <ellipse cx="0" cy="-43" rx="3.5" ry="4.5" fill="#2A2A2A"/>
    <!-- Notes -->
    <circle cx="16" cy="-62" r="3" fill="#9C27B0" opacity="0.6"/>
    <rect x="18" y="-70" width="1.5" height="8" fill="#9C27B0" opacity="0.6"/>
    <path d="M-25,-45 Q-30,-49 -25,-53" fill="none" stroke="#9C27B0" stroke-width="1" opacity="0.4"/>
  </g>
  <rect x="155" y="250" width="85" height="10" rx="2" fill="#9C27B0" opacity="0.1"/>
  <rect x="155" y="250" width="85" height="10" rx="2" fill="none" stroke="#9C27B0" stroke-width="0.5" opacity="0.3"/>
  <text x="157" y="258" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0">Ниже сопрано</text>
  <text x="197" y="278" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Женский</text>
  <text x="197" y="290" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">низкий регистр</text>

  <!-- Tenor -->
  <rect x="260" y="88" width="105" height="210" rx="6" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5" opacity="0.95"/>
  <rect x="260" y="88" width="105" height="28" rx="6" fill="#1565C0" opacity="0.85"/>
  <rect x="260" y="104" width="105" height="12" fill="#1565C0" opacity="0.85"/>
  <text x="312" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Тенор</text>
  <!-- Tenor silhouette - male -->
  <g transform="translate(312, 205)">
    <circle cx="0" cy="-52" r="13" fill="#3A3A3A" opacity="0.8"/>
    <rect x="-4" y="-40" width="8" height="10" fill="#3A3A3A" opacity="0.75"/>
    <!-- Broader shoulders -->
    <path d="M-28,-30 Q-22,-42 0,-38 Q22,-42 28,-30 L26,10 Q20,15 0,15 Q-20,15 -26,10 Z" fill="#1565C0" opacity="0.6"/>
    <ellipse cx="0" cy="-45" rx="3.5" ry="4.5" fill="#1A1A1A"/>
    <!-- Notes -->
    <circle cx="20" cy="-60" r="3" fill="#1565C0" opacity="0.6"/>
    <rect x="22" y="-68" width="1.5" height="8" fill="#1565C0" opacity="0.6"/>
    <path d="M-30,-42 Q-35,-47 -30,-52" fill="none" stroke="#1565C0" stroke-width="1" opacity="0.4"/>
    <path d="M-35,-39 Q-42,-47 -35,-55" fill="none" stroke="#1565C0" stroke-width="1" opacity="0.25"/>
  </g>
  <rect x="270" y="250" width="85" height="10" rx="2" fill="#1565C0" opacity="0.1"/>
  <rect x="270" y="250" width="85" height="10" rx="2" fill="none" stroke="#1565C0" stroke-width="0.5" opacity="0.3"/>
  <text x="272" y="258" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Высокий мужской</text>
  <text x="312" y="278" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Мужской</text>
  <text x="312" y="290" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">высокий регистр</text>

  <!-- Bass - Lowest voice -->
  <rect x="375" y="88" width="105" height="210" rx="6" fill="#FFFFFF" stroke="#F57F17" stroke-width="1.5" opacity="0.95"/>
  <rect x="375" y="88" width="105" height="28" rx="6" fill="#F57F17" opacity="0.85"/>
  <rect x="375" y="104" width="105" height="12" fill="#F57F17" opacity="0.85"/>
  <text x="427" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Бас</text>
  <!-- Bass silhouette - larger male figure -->
  <g transform="translate(427, 200)">
    <circle cx="0" cy="-50" r="14" fill="#2A2A2A" opacity="0.85"/>
    <rect x="-5" y="-37" width="10" height="10" fill="#2A2A2A" opacity="0.8"/>
    <!-- Largest shoulders -->
    <path d="M-30,-27 Q-24,-40 0,-36 Q24,-40 30,-27 L28,15 Q22,22 0,22 Q-22,22 -28,15 Z" fill="#F57F17" opacity="0.6"/>
    <ellipse cx="0" cy="-42" rx="4" ry="5" fill="#111"/>
    <!-- Deep notes - going down -->
    <circle cx="-18" cy="-30" r="3.5" fill="#F57F17" opacity="0.6"/>
    <rect x="-16" y="-22" width="1.5" height="8" fill="#F57F17" opacity="0.6"/>
    <!-- Low frequency waves -->
    <path d="M-35,-35 Q-38,-32 -35,-29" fill="none" stroke="#F57F17" stroke-width="1.5" opacity="0.4"/>
    <path d="M-42,-37 Q-46,-32 -42,-27" fill="none" stroke="#F57F17" stroke-width="1.5" opacity="0.25"/>
  </g>
  <rect x="385" y="250" width="85" height="10" rx="2" fill="#F57F17" opacity="0.1"/>
  <rect x="385" y="250" width="85" height="10" rx="2" fill="none" stroke="#F57F17" stroke-width="0.5" opacity="0.3"/>
  <text x="387" y="258" font-family="Arial,sans-serif" font-size="7" fill="#F57F17">Самый низкий</text>
  <text x="427" y="278" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Мужской</text>
  <text x="427" y="290" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">низкий регистр</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Вокальные жанры</text>
</svg>