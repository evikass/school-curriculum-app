<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Инструментальные жанры</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Музыка - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Sonata Form A-B-A -->
  <rect x="25" y="88" width="145" height="105" rx="6" fill="#FFFFFF" stroke="#C62828" stroke-width="1.5" opacity="0.95"/>
  <rect x="25" y="88" width="145" height="24" rx="6" fill="#C62828" opacity="0.85"/>
  <rect x="25" y="102" width="145" height="10" fill="#C62828" opacity="0.85"/>
  <text x="97" y="105" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Сонатная форма</text>
  <!-- Sonata form diagram -->
  <!-- Exposition A -->
  <rect x="35" y="120" width="35" height="30" rx="3" fill="#E53935" opacity="0.3" stroke="#E53935" stroke-width="1"/>
  <text x="52" y="133" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">A</text>
  <text x="52" y="145" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Экспозиция</text>
  <!-- Development B -->
  <rect x="75" y="120" width="35" height="30" rx="3" fill="#1565C0" opacity="0.25" stroke="#1565C0" stroke-width="1"/>
  <text x="92" y="133" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">B</text>
  <text x="92" y="145" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Разработка</text>
  <!-- Recapitulation A -->
  <rect x="115" y="120" width="45" height="30" rx="3" fill="#E53935" opacity="0.3" stroke="#E53935" stroke-width="1"/>
  <text x="137" y="133" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">A</text>
  <text x="137" y="145" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Реприза</text>
  <!-- Arrows -->
  <polygon points="70,135 73,132 73,138" fill="#666" opacity="0.6"/>
  <polygon points="110,135 113,132 113,138" fill="#666" opacity="0.6"/>
  <!-- Music staff lines hint -->
  <line x1="35" y1="162" x2="160" y2="162" stroke="#CCC" stroke-width="0.5"/>
  <line x1="35" y1="166" x2="160" y2="166" stroke="#CCC" stroke-width="0.5"/>
  <line x1="35" y1="170" x2="160" y2="170" stroke="#CCC" stroke-width="0.5"/>
  <line x1="35" y1="174" x2="160" y2="174" stroke="#CCC" stroke-width="0.5"/>
  <line x1="35" y1="178" x2="160" y2="178" stroke="#CCC" stroke-width="0.5"/>
  <!-- Notes on staff -->
  <ellipse cx="45" cy="168" rx="3" ry="2" fill="#C62828" opacity="0.5"/>
  <ellipse cx="60" cy="164" rx="3" ry="2" fill="#1565C0" opacity="0.5"/>
  <ellipse cx="80" cy="170" rx="3" ry="2" fill="#1565C0" opacity="0.5"/>
  <ellipse cx="100" cy="166" rx="3" ry="2" fill="#1565C0" opacity="0.5"/>
  <ellipse cx="120" cy="168" rx="3" ry="2" fill="#C62828" opacity="0.5"/>
  <ellipse cx="140" cy="164" rx="3" ry="2" fill="#C62828" opacity="0.5"/>
  <text x="97" y="190" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">A - B - A форма</text>

  <!-- Card 2: Symphony Structure -->
  <rect x="178" y="88" width="145" height="105" rx="6" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5" opacity="0.95"/>
  <rect x="178" y="88" width="145" height="24" rx="6" fill="#1565C0" opacity="0.85"/>
  <rect x="178" y="102" width="145" height="10" fill="#1565C0" opacity="0.85"/>
  <text x="250" y="105" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Симфония</text>
  <!-- Symphony - 4 movements shown as columns -->
  <!-- Movement I -->
  <rect x="190" y="118" width="28" height="55" rx="3" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="0.8"/>
  <text x="204" y="131" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">I</text>
  <text x="204" y="142" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Allegro</text>
  <text x="204" y="152" font-family="Arial,sans-serif" font-size="5.5" fill="#888" text-anchor="middle">быстро</text>
  <!-- Tempo marking -->
  <line x1="193" y1="158" x2="215" y2="158" stroke="#1565C0" stroke-width="0.8"/>
  <text x="204" y="168" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">сонатная</text>
  <!-- Movement II -->
  <rect x="222" y="118" width="28" height="55" rx="3" fill="#1565C0" opacity="0.15" stroke="#1565C0" stroke-width="0.8"/>
  <text x="236" y="131" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">II</text>
  <text x="236" y="142" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Adagio</text>
  <text x="236" y="152" font-family="Arial,sans-serif" font-size="5.5" fill="#888" text-anchor="middle">медленно</text>
  <line x1="225" y1="158" x2="247" y2="158" stroke="#1565C0" stroke-width="0.8"/>
  <text x="236" y="168" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">лирич.</text>
  <!-- Movement III -->
  <rect x="254" y="118" width="28" height="55" rx="3" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="0.8"/>
  <text x="268" y="131" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">III</text>
  <text x="268" y="142" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Menuet</text>
  <text x="268" y="152" font-family="Arial,sans-serif" font-size="5.5" fill="#888" text-anchor="middle">танец</text>
  <line x1="257" y1="158" x2="279" y2="158" stroke="#1565C0" stroke-width="0.8"/>
  <text x="268" y="168" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">менуэт</text>
  <!-- Movement IV -->
  <rect x="286" y="118" width="28" height="55" rx="3" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="0.8"/>
  <text x="300" y="131" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">IV</text>
  <text x="300" y="142" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Finale</text>
  <text x="300" y="152" font-family="Arial,sans-serif" font-size="5.5" fill="#888" text-anchor="middle">быстро</text>
  <line x1="289" y1="158" x2="311" y2="158" stroke="#1565C0" stroke-width="0.8"/>
  <text x="300" y="168" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="middle">финал</text>
  <text x="250" y="190" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">4 части для оркестра</text>

  <!-- Card 3: Concerto with Soloist -->
  <rect x="331" y="88" width="145" height="105" rx="6" fill="#FFFFFF" stroke="#F9A825" stroke-width="1.5" opacity="0.95"/>
  <rect x="331" y="88" width="145" height="24" rx="6" fill="#F9A825" opacity="0.85"/>
  <rect x="331" y="102" width="145" height="10" fill="#F9A825" opacity="0.85"/>
  <text x="403" y="105" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Концерт</text>
  <!-- Soloist in front, orchestra behind -->
  <!-- Orchestra group (background) -->
  <g transform="translate(378, 145)">
    <!-- Row of small orchestra dots -->
    <circle cx="-25" cy="0" r="3" fill="#999" opacity="0.5"/>
    <circle cx="-15" cy="-2" r="3" fill="#999" opacity="0.5"/>
    <circle cx="-5" cy="0" r="3" fill="#999" opacity="0.5"/>
    <circle cx="5" cy="-2" r="3" fill="#999" opacity="0.5"/>
    <circle cx="15" cy="0" r="3" fill="#999" opacity="0.5"/>
    <circle cx="25" cy="-2" r="3" fill="#999" opacity="0.5"/>
    <circle cx="-20" cy="10" r="3" fill="#999" opacity="0.5"/>
    <circle cx="-10" cy="12" r="3" fill="#999" opacity="0.5"/>
    <circle cx="0" cy="10" r="3" fill="#999" opacity="0.5"/>
    <circle cx="10" cy="12" r="3" fill="#999" opacity="0.5"/>
    <circle cx="20" cy="10" r="3" fill="#999" opacity="0.5"/>
  </g>
  <!-- Soloist (prominent, in front) -->
  <g transform="translate(403, 155)">
    <!-- Spotlight effect -->
    <ellipse cx="0" cy="10" rx="18" ry="25" fill="#F9A825" opacity="0.08"/>
    <!-- Head -->
    <circle cx="0" cy="-20" r="7" fill="#F9A825" opacity="0.7"/>
    <!-- Body -->
    <path d="M-10,-14 Q-8,-22 0,-20 Q8,-22 10,-14 L10,8 Q5,12 0,12 Q-5,12 -10,8 Z" fill="#F9A825" opacity="0.5"/>
    <!-- Instrument (violin) -->
    <ellipse cx="14" cy="0" rx="5" ry="8" fill="#8B4513" opacity="0.6"/>
    <rect x="-12" y="8" width="24" height="2" rx="1" fill="#F9A825" opacity="0.4"/>
    <!-- Music notes -->
    <circle cx="-15" cy="-25" r="2" fill="#F9A825" opacity="0.6"/>
    <rect x="-14" y="-33" width="1" height="8" fill="#F9A825" opacity="0.6"/>
    <circle cx="18" cy="-30" r="2" fill="#F9A825" opacity="0.5"/>
    <rect x="19" y="-38" width="1" height="8" fill="#F9A825" opacity="0.5"/>
  </g>
  <text x="403" y="190" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Солист с оркестром</text>

  <!-- Bottom section: Additional genre info cards -->
  <!-- Card: Suite -->
  <rect x="25" y="200" width="105" height="100" rx="6" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.2" opacity="0.9"/>
  <text x="77" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сюита</text>
  <!-- Suite - multiple small dance boxes -->
  <rect x="35" y="225" width="18" height="18" rx="2" fill="#2E7D32" opacity="0.15" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="44" y="238" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">1</text>
  <rect x="58" y="225" width="18" height="18" rx="2" fill="#2E7D32" opacity="0.15" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="67" y="238" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">2</text>
  <rect x="81" y="225" width="18" height="18" rx="2" fill="#2E7D32" opacity="0.15" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="90" y="238" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">3</text>
  <rect x="104" y="225" width="18" height="18" rx="2" fill="#2E7D32" opacity="0.15" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="113" y="238" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">4</text>
  <text x="77" y="260" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Цикл танцевальных</text>
  <text x="77" y="272" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">пьес</text>
  <!-- Arrows connecting -->
  <polygon points="53,234 55,231 55,237" fill="#666" opacity="0.4"/>
  <polygon points="76,234 78,231 78,237" fill="#666" opacity="0.4"/>
  <polygon points="99,234 101,231 101,237" fill="#666" opacity="0.4"/>

  <!-- Card: Serenade -->
  <rect x="140" y="200" width="105" height="100" rx="6" fill="#FFFFFF" stroke="#7B1FA2" stroke-width="1.2" opacity="0.9"/>
  <text x="192" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Серенада</text>
  <!-- Moon and music -->
  <circle cx="192" cy="248" r="18" fill="#7B1FA2" opacity="0.06"/>
  <circle cx="180" cy="240" r="12" fill="#FFF9C4" opacity="0.8"/>
  <circle cx="186" cy="236" r="10" fill="#FFF3E0" opacity="0.9"/>
  <!-- Small stars -->
  <circle cx="200" cy="234" r="1.5" fill="#7B1FA2" opacity="0.4"/>
  <circle cx="208" cy="244" r="1" fill="#7B1FA2" opacity="0.3"/>
  <circle cx="170" cy="250" r="1.2" fill="#7B1FA2" opacity="0.35"/>
  <!-- Music note under moon -->
  <circle cx="196" cy="258" r="3" fill="#7B1FA2" opacity="0.5"/>
  <rect x="198" y="248" width="1.5" height="10" fill="#7B1FA2" opacity="0.5"/>
  <path d="M199.5,248 Q205,246 199.5,252" fill="#7B1FA2" opacity="0.5"/>
  <text x="192" y="280" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Вечерняя музыка</text>
  <text x="192" y="292" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">под окном</text>

  <!-- Card: Nocturne -->
  <rect x="255" y="200" width="105" height="100" rx="6" fill="#FFFFFF" stroke="#1A237E" stroke-width="1.2" opacity="0.9"/>
  <text x="307" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1A237E" text-anchor="middle">Ноктюрн</text>
  <!-- Night scene with piano keys -->
  <rect x="275" y="228" width="65" height="35" rx="3" fill="#1A237E" opacity="0.06"/>
  <!-- Piano keys -->
  <rect x="280" y="245" width="8" height="15" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
  <rect x="290" y="245" width="8" height="15" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
  <rect x="300" y="245" width="8" height="15" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
  <rect x="310" y="245" width="8" height="15" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
  <rect x="320" y="245" width="8" height="15" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.5"/>
  <!-- Black keys -->
  <rect x="286" y="245" width="5" height="9" rx="1" fill="#333"/>
  <rect x="296" y="245" width="5" height="9" rx="1" fill="#333"/>
  <rect x="313" y="245" width="5" height="9" rx="1" fill="#333"/>
  <rect x="323" y="245" width="5" height="9" rx="1" fill="#333"/>
  <!-- Stars / notes rising -->
  <circle cx="285" cy="235" r="2" fill="#1A237E" opacity="0.3"/>
  <circle cx="300" cy="230" r="1.5" fill="#1A237E" opacity="0.25"/>
  <circle cx="315" cy="233" r="2" fill="#1A237E" opacity="0.3"/>
  <text x="307" y="275" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Ночная пьеса</text>
  <text x="307" y="287" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">для фортепиано</text>

  <!-- Card: Variations -->
  <rect x="370" y="200" width="105" height="100" rx="6" fill="#FFFFFF" stroke="#E65100" stroke-width="1.2" opacity="0.9"/>
  <text x="422" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Вариации</text>
  <!-- Theme and variations visualization -->
  <!-- Theme -->
  <rect x="380" y="228" width="15" height="25" rx="2" fill="#E65100" opacity="0.25"/>
  <text x="387" y="244" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">T</text>
  <!-- Variation 1 - slightly different -->
  <rect x="398" y="232" width="15" height="21" rx="2" fill="#E65100" opacity="0.2"/>
  <text x="405" y="246" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">V1</text>
  <!-- Variation 2 - different height -->
  <rect x="416" y="226" width="15" height="27" rx="2" fill="#E65100" opacity="0.18"/>
  <text x="423" y="243" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">V2</text>
  <!-- Variation 3 -->
  <rect x="434" y="230" width="15" height="23" rx="2" fill="#E65100" opacity="0.15"/>
  <text x="441" y="245" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">V3</text>
  <text x="422" y="270" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Тема и её</text>
  <text x="422" y="282" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">изменения</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Инструментальные жанры</text>
</svg>