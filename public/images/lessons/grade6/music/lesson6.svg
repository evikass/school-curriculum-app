<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">П.И. Чайковский</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Музыка - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Tchaikovsky Portrait Silhouette -->
  <rect x="25" y="88" width="145" height="210" rx="6" fill="#FFFFFF" stroke="#C62828" stroke-width="1.5" opacity="0.95"/>
  <rect x="25" y="88" width="145" height="24" rx="6" fill="#C62828" opacity="0.85"/>
  <rect x="25" y="102" width="145" height="10" fill="#C62828" opacity="0.85"/>
  <text x="97" y="105" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Портрет</text>
  <!-- Tchaikovsky silhouette -->
  <ellipse cx="97" cy="195" rx="48" ry="60" fill="#F5F5F5" stroke="#C62828" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="97" cy="195" rx="45" ry="57" fill="none" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
  <g transform="translate(97, 195)">
    <!-- Head -->
    <circle cx="0" cy="-42" r="16" fill="#4A4A4A" opacity="0.8"/>
    <!-- Hair - Tchaikovsky's distinctive wavy hair -->
    <path d="M-16,-42 Q-20,-64 0,-66 Q20,-64 16,-42" fill="#333" opacity="0.7"/>
    <!-- Wavy hair on sides -->
    <path d="M-17,-42 Q-22,-35 -19,-28" fill="#333" opacity="0.6"/>
    <path d="M17,-42 Q22,-35 19,-28" fill="#333" opacity="0.6"/>
    <!-- Beard -->
    <path d="M-10,-30 Q-12,-20 -8,-15 Q0,-12 8,-15 Q12,-20 10,-30" fill="#3A3A3A" opacity="0.5"/>
    <!-- Eyes -->
    <circle cx="-5" cy="-44" r="1.5" fill="#777" opacity="0.5"/>
    <circle cx="5" cy="-44" r="1.5" fill="#777" opacity="0.5"/>
    <!-- Forehead -->
    <path d="M-4,-37 L4,-37" stroke="#555" stroke-width="0.8" opacity="0.4"/>
    <!-- Neck -->
    <rect x="-5" y="-27" width="10" height="10" fill="#4A4A4A" opacity="0.75"/>
    <!-- Bow tie -->
    <polygon points="0,-22 -6,-18 0,-14 6,-18" fill="#C62828" opacity="0.6"/>
    <!-- Coat with high collar -->
    <path d="M-28,-15 Q-20,-28 0,-24 Q20,-28 28,-15 L26,30 Q18,38 0,40 Q-18,38 -26,30 Z" fill="#4A4A4A" opacity="0.8"/>
    <!-- Collar -->
    <path d="M-10,-20 L0,-16 L10,-20" fill="none" stroke="#666" stroke-width="1" opacity="0.3"/>
  </g>
  <text x="97" y="270" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">1840 - 1893</text>
  <text x="97" y="282" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Великий русский</text>
  <text x="97" y="293" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">композитор-романтик</text>

  <!-- Card 2: Ballet Dancers / Swan Lake -->
  <rect x="178" y="88" width="145" height="210" rx="6" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5" opacity="0.95"/>
  <rect x="178" y="88" width="145" height="24" rx="6" fill="#1565C0" opacity="0.85"/>
  <rect x="178" y="102" width="145" height="10" fill="#1565C0" opacity="0.85"/>
  <text x="250" y="105" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Балеты</text>
  <!-- Ballet dancers on stage -->
  <g transform="translate(250, 195)">
    <!-- Stage floor -->
    <rect x="-60" y="45" width="120" height="4" rx="2" fill="#D7CCC8" opacity="0.5"/>
    <!-- Curtain left -->
    <path d="M-60,-70 Q-55,-65 -58,-55 Q-53,-45 -56,-35 Q-51,-25 -54,-15 Q-50,-5 -53,5 Q-49,15 -52,25 Q-48,35 -50,45" fill="#C62828" opacity="0.15"/>
    <!-- Curtain right -->
    <path d="M60,-70 Q55,-65 58,-55 Q53,-45 56,-35 Q51,-25 54,-15 Q50,-5 53,5 Q49,15 52,25 Q48,35 50,45" fill="#C62828" opacity="0.15"/>
    <!-- Spotlight -->
    <ellipse cx="0" cy="0" rx="40" ry="50" fill="#FFF9C4" opacity="0.06"/>

    <!-- Dancer 1 - Swan Lake (white) - arabesque -->
    <g transform="translate(-18, 10)">
      <!-- Head -->
      <circle cx="0" cy="-40" r="5" fill="#333" opacity="0.7"/>
      <!-- Hair bun -->
      <circle cx="0" cy="-46" r="3" fill="#333" opacity="0.6"/>
      <!-- Tutu body -->
      <path d="M-3,-35 L3,-35 L4,-20 L-4,-20 Z" fill="#FAFAFA" stroke="#DDD" stroke-width="0.5" opacity="0.9"/>
      <!-- Arms - graceful -->
      <path d="M-3,-32 Q-15,-38 -20,-30" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <path d="M3,-32 Q15,-40 22,-35" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <!-- Tutu skirt -->
      <ellipse cx="0" cy="-18" rx="12" ry="4" fill="#FAFAFA" stroke="#DDD" stroke-width="0.5" opacity="0.9"/>
      <!-- Standing leg -->
      <line x1="0" y1="-15" x2="0" y2="35" stroke="#333" stroke-width="2" opacity="0.7"/>
      <!-- Extended leg (arabesque) -->
      <line x1="0" y1="-18" x2="18" y2="-10" stroke="#333" stroke-width="2" opacity="0.7"/>
      <!-- Pointe shoe -->
      <ellipse cx="0" cy="36" rx="3" ry="2" fill="#F5B7B1" opacity="0.6"/>
      <!-- Swan feather crown -->
      <path d="M-3,-47 Q-1,-52 1,-47" fill="#FAFAFA" opacity="0.7"/>
      <path d="M-1,-47 Q1,-53 3,-47" fill="#FAFAFA" opacity="0.7"/>
    </g>

    <!-- Dancer 2 - Nutcracker (red) -->
    <g transform="translate(18, 15)">
      <!-- Head -->
      <circle cx="0" cy="-38" r="5" fill="#333" opacity="0.7"/>
      <!-- Crown/tiara -->
      <polygon points="-4,-43 0,-50 4,-43" fill="#F9A825" opacity="0.6"/>
      <!-- Body -->
      <path d="M-3,-33 L3,-33 L4,-18 L-4,-18 Z" fill="#C62828" opacity="0.6"/>
      <!-- Arms -->
      <path d="M-3,-30 Q-12,-25 -15,-18" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <path d="M3,-30 Q12,-22 16,-15" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <!-- Tutu skirt -->
      <ellipse cx="0" cy="-16" rx="11" ry="4" fill="#C62828" opacity="0.5"/>
      <!-- Legs -->
      <line x1="-2" y1="-13" x2="-5" y2="30" stroke="#333" stroke-width="2" opacity="0.7"/>
      <line x1="2" y1="-13" x2="6" y2="30" stroke="#333" stroke-width="2" opacity="0.7"/>
      <ellipse cx="-5" cy="31" rx="3" ry="2" fill="#F5B7B1" opacity="0.6"/>
      <ellipse cx="6" cy="31" rx="3" ry="2" fill="#F5B7B1" opacity="0.6"/>
    </g>

    <!-- Swan silhouette at top -->
    <path d="M-30,-60 Q-25,-70 -15,-65 Q-10,-68 -5,-62 Q0,-66 5,-62" fill="none" stroke="#1565C0" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Labels -->
  <text x="220" y="268" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Лебединое</text>
  <text x="220" y="278" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">озеро</text>
  <text x="280" y="268" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Щелкунчик</text>
  <text x="280" y="278" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Спящая красавица</text>
  <text x="250" y="293" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Классический балет</text>

  <!-- Card 3: Famous Works -->
  <rect x="331" y="88" width="145" height="210" rx="6" fill="#FFFFFF" stroke="#F9A825" stroke-width="1.5" opacity="0.95"/>
  <rect x="331" y="88" width="145" height="24" rx="6" fill="#F9A825" opacity="0.85"/>
  <rect x="331" y="102" width="145" height="10" fill="#F9A825" opacity="0.85"/>
  <text x="403" y="105" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Произведения</text>

  <!-- Piano keys at top -->
  <g transform="translate(403, 135)">
    <rect x="-50" y="0" width="100" height="18" rx="2" fill="#333" opacity="0.15"/>
    <!-- White keys -->
    <rect x="-48" y="0" width="9" height="18" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.4"/>
    <rect x="-37" y="0" width="9" height="18" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.4"/>
    <rect x="-26" y="0" width="9" height="18" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.4"/>
    <rect x="-15" y="0" width="9" height="18" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.4"/>
    <rect x="-4" y="0" width="9" height="18" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.4"/>
    <rect x="7" y="0" width="9" height="18" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.4"/>
    <rect x="18" y="0" width="9" height="18" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.4"/>
    <rect x="29" y="0" width="9" height="18" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.4"/>
    <rect x="40" y="0" width="9" height="18" rx="1" fill="#FFF" stroke="#CCC" stroke-width="0.4"/>
    <!-- Black keys -->
    <rect x="-33" y="0" width="6" height="11" rx="1" fill="#333" opacity="0.7"/>
    <rect x="-22" y="0" width="6" height="11" rx="1" fill="#333" opacity="0.7"/>
    <rect x="-1" y="0" width="6" height="11" rx="1" fill="#333" opacity="0.7"/>
    <rect x="10" y="0" width="6" height="11" rx="1" fill="#333" opacity="0.7"/>
    <rect x="21" y="0" width="6" height="11" rx="1" fill="#333" opacity="0.7"/>
    <rect x="33" y="0" width="6" height="11" rx="1" fill="#333" opacity="0.7"/>
  </g>

  <!-- Works list -->
  <g transform="translate(403, 170)">
    <circle cx="-50" cy="0" r="3" fill="#C62828" opacity="0.5"/>
    <text x="-43" y="3" font-family="Arial,sans-serif" font-size="8" fill="#333">Лебединое озеро</text>
    <circle cx="-50" cy="16" r="3" fill="#C62828" opacity="0.5"/>
    <text x="-43" y="19" font-family="Arial,sans-serif" font-size="8" fill="#333">Щелкунчик</text>
    <circle cx="-50" cy="32" r="3" fill="#C62828" opacity="0.5"/>
    <text x="-43" y="35" font-family="Arial,sans-serif" font-size="8" fill="#333">Спящая красавица</text>
    <circle cx="-50" cy="48" r="3" fill="#1565C0" opacity="0.5"/>
    <text x="-43" y="51" font-family="Arial,sans-serif" font-size="8" fill="#333">Симфония N 6</text>
    <circle cx="-50" cy="64" r="3" fill="#1565C0" opacity="0.5"/>
    <text x="-43" y="67" font-family="Arial,sans-serif" font-size="8" fill="#333">Симфония N 5</text>
    <circle cx="-50" cy="80" r="3" fill="#F9A825" opacity="0.5"/>
    <text x="-43" y="83" font-family="Arial,sans-serif" font-size="8" fill="#333">Фортепианный</text>
    <text x="-43" y="93" font-family="Arial,sans-serif" font-size="8" fill="#333">концерт N 1</text>
  </g>
  <text x="403" y="282" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Балеты, симфонии,</text>
  <text x="403" y="293" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">концерты, опера</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">П.И. Чайковский</text>
</svg>