<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#C62828" text-anchor="middle">М.И. Глинка</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Музыка - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Glinka Portrait Silhouette -->
  <rect x="25" y="88" width="145" height="210" rx="6" fill="#FFFFFF" stroke="#C62828" stroke-width="1.5" opacity="0.95"/>
  <rect x="25" y="88" width="145" height="24" rx="6" fill="#C62828" opacity="0.85"/>
  <rect x="25" y="102" width="145" height="10" fill="#C62828" opacity="0.85"/>
  <text x="97" y="105" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Портрет</text>
  <!-- Glinka silhouette in oval frame -->
  <ellipse cx="97" cy="195" rx="48" ry="60" fill="#F5F5F5" stroke="#C62828" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="97" cy="195" rx="45" ry="57" fill="none" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
  <!-- Silhouette -->
  <g transform="translate(97, 195)">
    <!-- Head -->
    <circle cx="0" cy="-42" r="16" fill="#4A4A4A" opacity="0.8"/>
    <!-- Hair - 19th century style -->
    <path d="M-16,-42 Q-18,-62 0,-64 Q18,-62 16,-42" fill="#333" opacity="0.7"/>
    <path d="M-16,-42 Q-20,-50 -18,-55" fill="#333" opacity="0.6"/>
    <path d="M16,-42 Q20,-50 18,-55" fill="#333" opacity="0.6"/>
    <!-- Sideburns -->
    <rect x="-17" y="-38" width="4" height="14" rx="2" fill="#333" opacity="0.6"/>
    <rect x="13" y="-38" width="4" height="14" rx="2" fill="#333" opacity="0.6"/>
    <!-- Face features -->
    <circle cx="-5" cy="-44" r="1.5" fill="#666" opacity="0.5"/>
    <circle cx="5" cy="-44" r="1.5" fill="#666" opacity="0.5"/>
    <line x1="-4" y1="-36" x2="4" y2="-36" stroke="#666" stroke-width="1" opacity="0.4"/>
    <!-- Neck -->
    <rect x="-5" y="-27" width="10" height="10" fill="#4A4A4A" opacity="0.75"/>
    <!-- Collar / cravat -->
    <path d="M-12,-18 L0,-24 L12,-18 L8,-14 L-8,-14 Z" fill="#EEE" opacity="0.6"/>
    <!-- Shoulders and coat -->
    <path d="M-30,-15 Q-22,-28 0,-24 Q22,-28 30,-15 L28,30 Q20,38 0,40 Q-20,38 -28,30 Z" fill="#4A4A4A" opacity="0.8"/>
    <!-- Coat lapels -->
    <path d="M-5,-18 L0,-10 L5,-18" fill="none" stroke="#666" stroke-width="1" opacity="0.4"/>
    <!-- Medal / order -->
    <circle cx="8" cy="-5" r="4" fill="#F9A825" opacity="0.5"/>
    <circle cx="8" cy="-5" r="2.5" fill="#FDD835" opacity="0.4"/>
  </g>
  <text x="97" y="270" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">1804 - 1857</text>
  <text x="97" y="282" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Основоположник</text>
  <text x="97" y="293" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">русской классики</text>

  <!-- Card 2: Opera House -->
  <rect x="178" y="88" width="145" height="210" rx="6" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5" opacity="0.95"/>
  <rect x="178" y="88" width="145" height="24" rx="6" fill="#1565C0" opacity="0.85"/>
  <rect x="178" y="102" width="145" height="10" fill="#1565C0" opacity="0.85"/>
  <text x="250" y="105" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Оперный театр</text>
  <!-- Opera house illustration -->
  <g transform="translate(250, 190)">
    <!-- Building base -->
    <rect x="-55" y="0" width="110" height="55" rx="2" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1" opacity="0.7"/>
    <!-- Columns -->
    <rect x="-48" y="0" width="6" height="55" fill="#BCAAA4" opacity="0.8"/>
    <rect x="-33" y="0" width="6" height="55" fill="#BCAAA4" opacity="0.8"/>
    <rect x="-18" y="0" width="6" height="55" fill="#BCAAA4" opacity="0.8"/>
    <rect x="-3" y="0" width="6" height="55" fill="#BCAAA4" opacity="0.8"/>
    <rect x="12" y="0" width="6" height="55" fill="#BCAAA4" opacity="0.8"/>
    <rect x="27" y="0" width="6" height="55" fill="#BCAAA4" opacity="0.8"/>
    <rect x="42" y="0" width="6" height="55" fill="#BCAAA4" opacity="0.8"/>
    <!-- Pediment (triangle top) -->
    <polygon points="-60,0 0,-35 60,0" fill="#BCAAA4" stroke="#8D6E63" stroke-width="1" opacity="0.8"/>
    <!-- Pediment decoration -->
    <ellipse cx="0" cy="-12" rx="12" ry="8" fill="#C62828" opacity="0.15"/>
    <!-- Lyre symbol -->
    <path d="M-5,-15 Q-8,-25 0,-28 Q8,-25 5,-15" fill="none" stroke="#C62828" stroke-width="1.2" opacity="0.5"/>
    <line x1="-4" y1="-18" x2="4" y2="-18" stroke="#C62828" stroke-width="0.8" opacity="0.4"/>
    <line x1="-3" y1="-22" x2="3" y2="-22" stroke="#C62828" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="-15" x2="0" y2="-28" stroke="#C62828" stroke-width="0.8" opacity="0.4"/>
    <!-- Entrance arch -->
    <path d="M-12,55 L-12,30 Q0,20 12,30 L12,55" fill="#5D4037" opacity="0.5"/>
    <!-- Windows -->
    <rect x="-40" y="15" width="10" height="15" rx="5" fill="#FFF9C4" opacity="0.5"/>
    <rect x="30" y="15" width="10" height="15" rx="5" fill="#FFF9C4" opacity="0.5"/>
    <!-- Steps -->
    <rect x="-60" y="55" width="120" height="5" rx="1" fill="#BCAAA4" opacity="0.6"/>
    <rect x="-55" y="60" width="110" height="5" rx="1" fill="#D7CCC8" opacity="0.5"/>
    <!-- Spotlights -->
    <circle cx="0" cy="-35" r="20" fill="#FFF9C4" opacity="0.08"/>
  </g>
  <text x="250" y="270" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Большой театр</text>
  <text x="250" y="282" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Москва</text>

  <!-- Card 3: Musical Score / Famous Works -->
  <rect x="331" y="88" width="145" height="210" rx="6" fill="#FFFFFF" stroke="#F9A825" stroke-width="1.5" opacity="0.95"/>
  <rect x="331" y="88" width="145" height="24" rx="6" fill="#F9A825" opacity="0.85"/>
  <rect x="331" y="102" width="145" height="10" fill="#F9A825" opacity="0.85"/>
  <text x="403" y="105" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">Произведения</text>
  <!-- Musical score -->
  <g transform="translate(403, 140)">
    <!-- Staff lines -->
    <line x1="-55" y1="0" x2="55" y2="0" stroke="#999" stroke-width="0.5"/>
    <line x1="-55" y1="4" x2="55" y2="4" stroke="#999" stroke-width="0.5"/>
    <line x1="-55" y1="8" x2="55" y2="8" stroke="#999" stroke-width="0.5"/>
    <line x1="-55" y1="12" x2="55" y2="12" stroke="#999" stroke-width="0.5"/>
    <line x1="-55" y1="16" x2="55" y2="16" stroke="#999" stroke-width="0.5"/>
    <!-- Treble clef hint -->
    <text x="-50" y="14" font-family="serif" font-size="20" fill="#C62828" opacity="0.4">&#119070;</text>
    <!-- Notes -->
    <ellipse cx="-30" cy="8" rx="4" ry="3" fill="#333" opacity="0.7"/>
    <line x1="-27" y1="8" x2="-27" y2="-6" stroke="#333" stroke-width="1" opacity="0.7"/>
    <ellipse cx="-18" cy="12" rx="4" ry="3" fill="#333" opacity="0.7"/>
    <line x1="-15" y1="12" x2="-15" y2="-2" stroke="#333" stroke-width="1" opacity="0.7"/>
    <ellipse cx="-5" cy="4" rx="4" ry="3" fill="#333" opacity="0.7"/>
    <line x1="-2" y1="4" x2="-2" y2="-10" stroke="#333" stroke-width="1" opacity="0.7"/>
    <ellipse cx="10" cy="8" rx="4" ry="3" fill="#333" opacity="0.7"/>
    <line x1="13" y1="8" x2="13" y2="-6" stroke="#333" stroke-width="1" opacity="0.7"/>
    <ellipse cx="22" cy="0" rx="4" ry="3" fill="#333" opacity="0.7"/>
    <line x1="25" y1="0" x2="25" y2="-14" stroke="#333" stroke-width="1" opacity="0.7"/>
    <ellipse cx="35" cy="4" rx="4" ry="3" fill="#333" opacity="0.7"/>
    <line x1="38" y1="4" x2="38" y2="-10" stroke="#333" stroke-width="1" opacity="0.7"/>
    <ellipse cx="47" cy="8" rx="4" ry="3" fill="#333" opacity="0.7"/>
    <line x1="50" y1="8" x2="50" y2="-6" stroke="#333" stroke-width="1" opacity="0.7"/>
    <!-- Second staff -->
    <line x1="-55" y1="28" x2="55" y2="28" stroke="#999" stroke-width="0.5"/>
    <line x1="-55" y1="32" x2="55" y2="32" stroke="#999" stroke-width="0.5"/>
    <line x1="-55" y1="36" x2="55" y2="36" stroke="#999" stroke-width="0.5"/>
    <line x1="-55" y1="40" x2="55" y2="40" stroke="#999" stroke-width="0.5"/>
    <line x1="-55" y1="44" x2="55" y2="44" stroke="#999" stroke-width="0.5"/>
    <!-- More notes -->
    <ellipse cx="-25" cy="36" rx="4" ry="3" fill="#333" opacity="0.6"/>
    <line x1="-22" y1="36" x2="-22" y2="22" stroke="#333" stroke-width="1" opacity="0.6"/>
    <ellipse cx="-10" cy="32" rx="4" ry="3" fill="#333" opacity="0.6"/>
    <line x1="-7" y1="32" x2="-7" y2="18" stroke="#333" stroke-width="1" opacity="0.6"/>
    <ellipse cx="5" cy="40" rx="4" ry="3" fill="#333" opacity="0.6"/>
    <line x1="8" y1="40" x2="8" y2="26" stroke="#333" stroke-width="1" opacity="0.6"/>
    <ellipse cx="20" cy="36" rx="4" ry="3" fill="#333" opacity="0.6"/>
    <line x1="23" y1="36" x2="23" y2="22" stroke="#333" stroke-width="1" opacity="0.6"/>
    <ellipse cx="35" cy="32" rx="4" ry="3" fill="#333" opacity="0.6"/>
    <line x1="38" y1="32" x2="38" y2="18" stroke="#333" stroke-width="1" opacity="0.6"/>
    <ellipse cx="48" cy="40" rx="4" ry="3" fill="#333" opacity="0.6"/>
    <line x1="51" y1="40" x2="51" y2="26" stroke="#333" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Famous works list -->
  <g transform="translate(403, 210)">
    <circle cx="-45" cy="0" r="3" fill="#F9A825" opacity="0.6"/>
    <text x="-38" y="3" font-family="Arial,sans-serif" font-size="8" fill="#333">Иван Сусанин</text>
    <circle cx="-45" cy="16" r="3" fill="#F9A825" opacity="0.6"/>
    <text x="-38" y="19" font-family="Arial,sans-serif" font-size="8" fill="#333">Руслан и Людмила</text>
    <circle cx="-45" cy="32" r="3" fill="#F9A825" opacity="0.6"/>
    <text x="-38" y="35" font-family="Arial,sans-serif" font-size="8" fill="#333">Камаринская</text>
    <circle cx="-45" cy="48" r="3" fill="#F9A825" opacity="0.6"/>
    <text x="-38" y="51" font-family="Arial,sans-serif" font-size="8" fill="#333">Вальс-фантазия</text>
  </g>
  <text x="403" y="282" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Оперы и симфонические</text>
  <text x="403" y="293" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">произведения</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">М.И. Глинка - основоположник русской музыки</text>
</svg>