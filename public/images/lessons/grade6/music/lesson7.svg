<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Музыка в нашей жизни</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Музыка - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Floating music notes across the top area -->
  <circle cx="160" cy="95" r="4" fill="#C62828" opacity="0.15"/>
  <rect x="163" y="83" width="1.5" height="12" fill="#C62828" opacity="0.15"/>
  <path d="M164.5,83 Q170,85 164.5,89" fill="#C62828" opacity="0.15"/>

  <circle cx="320" cy="92" r="3.5" fill="#1565C0" opacity="0.12"/>
  <rect x="323" y="81" width="1.5" height="11" fill="#1565C0" opacity="0.12"/>

  <circle cx="440" cy="98" r="3" fill="#F9A825" opacity="0.12"/>
  <rect x="442" y="88" width="1.5" height="10" fill="#F9A825" opacity="0.12"/>
  <path d="M443.5,88 Q448,90 443.5,93" fill="#F9A825" opacity="0.12"/>

  <circle cx="60" cy="100" r="3" fill="#2E7D32" opacity="0.1"/>
  <rect x="62" y="90" width="1.5" height="10" fill="#2E7D32" opacity="0.1"/>

  <!-- Card 1: Headphones / Listening to music -->
  <rect x="25" y="110" width="105" height="185" rx="6" fill="#FFFFFF" stroke="#E91E63" stroke-width="1.5" opacity="0.95"/>
  <rect x="25" y="110" width="105" height="24" rx="6" fill="#E91E63" opacity="0.8"/>
  <rect x="25" y="124" width="105" height="10" fill="#E91E63" opacity="0.8"/>
  <text x="77" y="127" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Наушники</text>
  <!-- Person with headphones -->
  <g transform="translate(77, 205)">
    <!-- Head -->
    <circle cx="0" cy="-40" r="16" fill="#FFCC80" opacity="0.5"/>
    <!-- Eyes (closed, enjoying music) -->
    <path d="M-6,-42 Q-4,-44 -2,-42" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.5"/>
    <path d="M2,-42 Q4,-44 6,-42" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.5"/>
    <!-- Smile -->
    <path d="M-4,-34 Q0,-30 4,-34" fill="none" stroke="#5D4037" stroke-width="0.8" opacity="0.4"/>
    <!-- Hair -->
    <path d="M-16,-40 Q-16,-58 0,-60 Q16,-58 16,-40" fill="#5D4037" opacity="0.4"/>
    <!-- Headphones band -->
    <path d="M-18,-42 Q-20,-65 0,-68 Q20,-65 18,-42" fill="none" stroke="#333" stroke-width="3" opacity="0.7"/>
    <!-- Headphone cushions -->
    <rect x="-22" y="-48" width="8" height="16" rx="4" fill="#333" opacity="0.7"/>
    <rect x="14" y="-48" width="8" height="16" rx="4" fill="#333" opacity="0.7"/>
    <rect x="-20" y="-46" width="4" height="12" rx="2" fill="#555" opacity="0.5"/>
    <rect x="16" y="-46" width="4" height="12" rx="2" fill="#555" opacity="0.5"/>
    <!-- Body -->
    <path d="M-16,-25 Q-12,-34 0,-32 Q12,-34 16,-25 L14,15 Q8,20 0,20 Q-8,20 -14,15 Z" fill="#42A5F5" opacity="0.4"/>
    <!-- Music notes floating -->
    <circle cx="-28" cy="-55" r="3" fill="#E91E63" opacity="0.5"/>
    <rect x="-26" y="-65" width="1.5" height="10" fill="#E91E63" opacity="0.5"/>
    <path d="M-24.5,-65 Q-19,-63 -24.5,-59" fill="#E91E63" opacity="0.5"/>
    <circle cx="28" cy="-50" r="2.5" fill="#E91E63" opacity="0.4"/>
    <rect x="30" y="-58" width="1.5" height="8" fill="#E91E63" opacity="0.4"/>
    <circle cx="0" cy="-72" r="2" fill="#E91E63" opacity="0.3"/>
    <rect x="2" y="-78" width="1" height="6" fill="#E91E63" opacity="0.3"/>
    <!-- Sound waves -->
    <path d="M-30,-40 Q-35,-45 -30,-50" fill="none" stroke="#E91E63" stroke-width="0.8" opacity="0.3"/>
    <path d="M-35,-38 Q-42,-45 -35,-52" fill="none" stroke="#E91E63" stroke-width="0.8" opacity="0.2"/>
    <path d="M30,-38 Q35,-43 30,-48" fill="none" stroke="#E91E63" stroke-width="0.8" opacity="0.3"/>
    <path d="M35,-36 Q42,-43 35,-50" fill="none" stroke="#E91E63" stroke-width="0.8" opacity="0.2"/>
  </g>
  <text x="77" y="275" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Слушаем музыку</text>
  <text x="77" y="286" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">в наушниках</text>

  <!-- Card 2: Radio / Broadcasting -->
  <rect x="140" y="110" width="105" height="185" rx="6" fill="#FFFFFF" stroke="#F9A825" stroke-width="1.5" opacity="0.95"/>
  <rect x="140" y="110" width="105" height="24" rx="6" fill="#F9A825" opacity="0.8"/>
  <rect x="140" y="124" width="105" height="10" fill="#F9A825" opacity="0.8"/>
  <text x="192" y="127" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Радио</text>
  <!-- Vintage radio illustration -->
  <g transform="translate(192, 195)">
    <!-- Radio body -->
    <rect x="-35" y="-20" width="70" height="50" rx="8" fill="#8D6E63" opacity="0.6"/>
    <rect x="-32" y="-17" width="64" height="44" rx="6" fill="#A1887F" opacity="0.3"/>
    <!-- Speaker grille -->
    <rect x="-28" y="-10" width="35" height="30" rx="3" fill="#5D4037" opacity="0.3"/>
    <!-- Speaker lines -->
    <line x1="-24" y1="-4" x2="-2" y2="-4" stroke="#8D6E63" stroke-width="0.6" opacity="0.5"/>
    <line x1="-24" y1="0" x2="-2" y2="0" stroke="#8D6E63" stroke-width="0.6" opacity="0.5"/>
    <line x1="-24" y1="4" x2="-2" y2="4" stroke="#8D6E63" stroke-width="0.6" opacity="0.5"/>
    <line x1="-24" y1="8" x2="-2" y2="8" stroke="#8D6E63" stroke-width="0.6" opacity="0.5"/>
    <line x1="-24" y1="12" x2="-2" y2="12" stroke="#8D6E63" stroke-width="0.6" opacity="0.5"/>
    <line x1="-24" y1="16" x2="-2" y2="16" stroke="#8D6E63" stroke-width="0.6" opacity="0.5"/>
    <!-- Tuning dial -->
    <rect x="12" y="-10" width="18" height="12" rx="2" fill="#FFF9C4" opacity="0.5"/>
    <line x1="14" y1="-4" x2="28" y2="-4" stroke="#F9A825" stroke-width="0.5" opacity="0.7"/>
    <!-- Frequency numbers -->
    <text x="15" y="-6" font-family="Arial,sans-serif" font-size="4" fill="#999">88</text>
    <text x="23" y="-6" font-family="Arial,sans-serif" font-size="4" fill="#999">108</text>
    <!-- Knobs -->
    <circle cx="14" cy="12" r="4" fill="#5D4037" opacity="0.5"/>
    <line x1="14" y1="9" x2="14" y2="15" stroke="#8D6E63" stroke-width="1" opacity="0.4"/>
    <circle cx="26" cy="12" r="4" fill="#5D4037" opacity="0.5"/>
    <line x1="26" y1="9" x2="26" y2="15" stroke="#8D6E63" stroke-width="1" opacity="0.4"/>
    <!-- Antenna -->
    <line x1="20" y1="-20" x2="35" y2="-55" stroke="#5D4037" stroke-width="1.5" opacity="0.6"/>
    <circle cx="35" cy="-55" r="2" fill="#5D4037" opacity="0.5"/>
    <!-- Radio waves -->
    <path d="M40,-50 Q45,-45 40,-40" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.3"/>
    <path d="M45,-48 Q52,-45 45,-38" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.2"/>
    <path d="M50,-46 Q58,-45 50,-36" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.15"/>
    <!-- Musical notes from radio -->
    <circle cx="-15" cy="-35" r="3" fill="#F9A825" opacity="0.5"/>
    <rect x="-13" y="-45" width="1.5" height="10" fill="#F9A825" opacity="0.5"/>
    <circle cx="5" cy="-40" r="2.5" fill="#F9A825" opacity="0.4"/>
    <rect x="7" y="-48" width="1.5" height="8" fill="#F9A825" opacity="0.4"/>
  </g>
  <text x="192" y="275" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Музыка по радио</text>
  <text x="192" y="286" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">и телевидению</text>

  <!-- Card 3: Concert / Live Music -->
  <rect x="255" y="110" width="105" height="185" rx="6" fill="#FFFFFF" stroke="#1565C0" stroke-width="1.5" opacity="0.95"/>
  <rect x="255" y="110" width="105" height="24" rx="6" fill="#1565C0" opacity="0.8"/>
  <rect x="255" y="124" width="105" height="10" fill="#1565C0" opacity="0.8"/>
  <text x="307" y="127" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Концерт</text>
  <!-- Concert scene -->
  <g transform="translate(307, 195)">
    <!-- Stage -->
    <rect x="-42" y="15" width="84" height="6" rx="2" fill="#D7CCC8" opacity="0.6"/>
    <!-- Spotlight beams -->
    <polygon points="-30,-60 -42,15 -18,15" fill="#FFF9C4" opacity="0.06"/>
    <polygon points="30,-60 18,15 42,15" fill="#FFF9C4" opacity="0.06"/>
    <polygon points="0,-65 -15,15 15,15" fill="#FFF9C4" opacity="0.04"/>
    <!-- Singer on stage (silhouette) -->
    <circle cx="0" cy="-15" r="8" fill="#333" opacity="0.6"/>
    <!-- Microphone -->
    <rect x="10" y="-8" width="3" height="18" rx="1" fill="#555" opacity="0.5"/>
    <circle cx="11.5" cy="-10" r="4" fill="#555" opacity="0.4"/>
    <!-- Body -->
    <path d="M-12,-8 Q-8,-16 0,-14 Q8,-16 12,-8 L10,12 Q5,16 0,16 Q-5,16 -10,12 Z" fill="#333" opacity="0.5"/>
    <!-- Raised arm -->
    <path d="M-10,-5 Q-20,-12 -22,-18" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Music notes -->
    <circle cx="-22" cy="-35" r="3" fill="#1565C0" opacity="0.5"/>
    <rect x="-20" y="-45" width="1.5" height="10" fill="#1565C0" opacity="0.5"/>
    <path d="M-18.5,-45 Q-13,-43 -18.5,-39" fill="#1565C0" opacity="0.5"/>
    <circle cx="20" cy="-30" r="2.5" fill="#1565C0" opacity="0.4"/>
    <rect x="22" y="-38" width="1.5" height="8" fill="#1565C0" opacity="0.4"/>
    <circle cx="-5" cy="-45" r="2" fill="#1565C0" opacity="0.3"/>
    <rect x="-3" y="-52" width="1" height="7" fill="#1565C0" opacity="0.3"/>
    <!-- Audience silhouettes (bottom) -->
    <circle cx="-35" cy="30" r="5" fill="#666" opacity="0.3"/>
    <circle cx="-25" cy="30" r="5" fill="#666" opacity="0.3"/>
    <circle cx="-15" cy="30" r="5" fill="#666" opacity="0.3"/>
    <circle cx="-5" cy="30" r="5" fill="#666" opacity="0.3"/>
    <circle cx="5" cy="30" r="5" fill="#666" opacity="0.3"/>
    <circle cx="15" cy="30" r="5" fill="#666" opacity="0.3"/>
    <circle cx="25" cy="30" r="5" fill="#666" opacity="0.3"/>
    <circle cx="35" cy="30" r="5" fill="#666" opacity="0.3"/>
    <!-- Raised hands in audience -->
    <line x1="-20" y1="26" x2="-22" y2="18" stroke="#666" stroke-width="1" opacity="0.3"/>
    <line x1="10" y1="26" x2="12" y2="17" stroke="#666" stroke-width="1" opacity="0.3"/>
  </g>
  <text x="307" y="275" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Живые выступления</text>
  <text x="307" y="286" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">и фестивали</text>

  <!-- Card 4: Guitar / Playing Music -->
  <rect x="370" y="110" width="105" height="185" rx="6" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1.5" opacity="0.95"/>
  <rect x="370" y="110" width="105" height="24" rx="6" fill="#2E7D32" opacity="0.8"/>
  <rect x="370" y="124" width="105" height="10" fill="#2E7D32" opacity="0.8"/>
  <text x="422" y="127" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Гитара</text>
  <!-- Person playing guitar -->
  <g transform="translate(422, 195)">
    <!-- Head -->
    <circle cx="0" cy="-40" r="12" fill="#FFCC80" opacity="0.5"/>
    <!-- Hair -->
    <path d="M-12,-40 Q-12,-54 0,-56 Q12,-54 12,-40" fill="#5D4037" opacity="0.4"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-42" r="1.2" fill="#5D4037" opacity="0.4"/>
    <circle cx="4" cy="-42" r="1.2" fill="#5D4037" opacity="0.4"/>
    <!-- Smile -->
    <path d="M-3,-36 Q0,-33 3,-36" fill="none" stroke="#5D4037" stroke-width="0.7" opacity="0.3"/>
    <!-- Body -->
    <path d="M-14,-28 Q-10,-36 0,-34 Q10,-36 14,-28 L12,15 Q6,20 0,20 Q-6,20 -12,15 Z" fill="#66BB6A" opacity="0.35"/>
    <!-- Guitar body -->
    <ellipse cx="15" cy="0" rx="16" ry="22" fill="#D2691E" opacity="0.7"/>
    <ellipse cx="15" cy="16" rx="20" ry="18" fill="#D2691E" opacity="0.7"/>
    <!-- Sound hole -->
    <circle cx="15" cy="8" r="6" fill="#8B4513" opacity="0.6"/>
    <circle cx="15" cy="8" r="5" fill="#5D3A1A" opacity="0.3"/>
    <!-- Rosette -->
    <circle cx="15" cy="8" r="7.5" fill="none" stroke="#DAA520" stroke-width="0.5" opacity="0.5"/>
    <!-- Guitar neck -->
    <rect x="10" y="-30" width="5" height="35" rx="2" fill="#8B4513" opacity="0.7"/>
    <!-- Frets -->
    <line x1="10" y1="-20" x2="15" y2="-20" stroke="#DAA520" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="-12" x2="15" y2="-12" stroke="#DAA520" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="-4" x2="15" y2="-4" stroke="#DAA520" stroke-width="0.5" opacity="0.5"/>
    <!-- Strings on guitar -->
    <line x1="11" y1="-28" x2="11" y2="28" stroke="#EEE" stroke-width="0.4" opacity="0.6"/>
    <line x1="12.5" y1="-28" x2="12.5" y2="28" stroke="#EEE" stroke-width="0.4" opacity="0.6"/>
    <line x1="14" y1="-28" x2="14" y2="28" stroke="#EEE" stroke-width="0.4" opacity="0.6"/>
    <!-- Headstock -->
    <rect x="9" y="-36" width="7" height="8" rx="2" fill="#5D3A1A" opacity="0.6"/>
    <!-- Tuning pegs -->
    <circle cx="8" cy="-33" r="1.5" fill="#DAA520" opacity="0.5"/>
    <circle cx="8" cy="-29" r="1.5" fill="#DAA520" opacity="0.5"/>
    <circle cx="17" cy="-33" r="1.5" fill="#DAA520" opacity="0.5"/>
    <circle cx="17" cy="-29" r="1.5" fill="#DAA520" opacity="0.5"/>
    <!-- Hands on guitar -->
    <circle cx="12" cy="-10" r="3" fill="#FFCC80" opacity="0.4"/>
    <circle cx="20" cy="2" r="3" fill="#FFCC80" opacity="0.4"/>
    <!-- Music notes -->
    <circle cx="30" cy="-35" r="3" fill="#2E7D32" opacity="0.5"/>
    <rect x="32" y="-45" width="1.5" height="10" fill="#2E7D32" opacity="0.5"/>
    <path d="M33.5,-45 Q38,-43 33.5,-39" fill="#2E7D32" opacity="0.5"/>
    <circle cx="35" cy="-25" r="2.5" fill="#2E7D32" opacity="0.4"/>
    <rect x="37" y="-33" width="1.5" height="8" fill="#2E7D32" opacity="0.4"/>
  </g>
  <text x="422" y="275" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Играем на</text>
  <text x="422" y="286" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">музыкальных инструментах</text>

  <!-- Bottom decorative notes -->
  <circle cx="150" cy="98" r="2.5" fill="#C62828" opacity="0.08"/>
  <rect x="152" y="90" width="1" height="8" fill="#C62828" opacity="0.08"/>
  <circle cx="350" cy="96" r="2" fill="#1565C0" opacity="0.08"/>
  <rect x="352" y="89" width="1" height="7" fill="#1565C0" opacity="0.08"/>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Музыка в нашей жизни</text>
</svg>