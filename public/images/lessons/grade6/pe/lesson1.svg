-size="9" font-weight="bold" fill="#1565C0">Закаливание</text><text x="200" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Воздушные и</text><text x="200" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">водные процедуры</text><rect x="266" y="228" width="105" height="68" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1" opacity="0.8"/><text x="318" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F57F17">Утренняя</text><text x="318" y="264" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F57F17">гигиена</text><text x="318" y="278" font-family="Arial,sans-serif" font-size="8" fill="#666">Чистка зубов,</text><text x="318" y="289" font-family="Arial,sans-serif" font-size="8" fill="#666">умывание</text><rect x="384" y="228" width="105" height="68" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" opacity="0.8"/><text x="436" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">Чистота</text><text x="436" y="264" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">тела</text><text x="436" y="278" font-family="Arial,sans-serif" font-size="8" fill="#666">Душ, чистая</text><text x="436" y="289" font-family="Arial,sans-serif" font-size="8" fill="#666">одежда и обувь</text><rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/><text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Гигиена и закаливание</text></svg>