<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFFDE7"/></linearGradient></defs><rect width="500" height="350" fill="url(#bg)" rx="10"/><rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/><rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/><polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/><polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/><polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/><polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/><circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/><circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/><text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Питание и здоровье</text><text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Физическая культура - Урок 10</text><line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/><rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/><rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/><!-- Main illustration: Healthy food pyramid --><rect x="60" y="92" width="380" height="130" rx="8" fill="#FFF3E0" opacity="0.35"/><!-- Pyramid structure --><!-- Base level (grains) - widest --><polygon points="100,210 400,210 390,178 110,178" fill="#FDD835" opacity="0.5" stroke="#F9A825" stroke-width="1"/><!-- Second level (vegetables/fruits) --><polygon points="120,178 380,178 368,150 132,150" fill="#66BB6A" opacity="0.5" stroke="#2E7D32" stroke-width="1"/><!-- Third level (protein/dairy) --><polygon points="145,150 355,150 345,126 155,126" fill="#EF5350" opacity="0.4" stroke="#C62828" stroke-width="1"/><!-- Top level (fats/sweets) - narrowest --><polygon points="170,126 330,126 320,105 180,105" fill="#FF8A65" opacity="0.4" stroke="#E65100" stroke-width="1"/><!-- Apex label --><polygon points="210,105 290,105 270,96 230,96" fill="#C62828" opacity="0.5"/><!-- Side labels --><text x="250" y="100" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Меньше</text><text x="250" y="218" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle" font-weight="bold">Больше</text><!-- Arrow on left side --><line x1="90" y1="100" x2="90" y2="212" stroke="#C62828" stroke-width="1.5" opacity="0.4"/><polygon points="90,212 85,204 95,204" fill="#C62828" opacity="0.4"/><!-- Food icons on pyramid levels --><!-- Base: Bread, cereal --><rect x="140" y="185" width="20" height="15" rx="3" fill="#D4A24C" opacity="0.7"/><line x1="145" y1="192" x2="155" y2="192" stroke="#A67C2E" stroke-width="0.8" opacity="0.5"/><rect x="220" y="188" width="25" height="12" rx="2" fill="#FDD835" opacity="0.7"/><rect x="310" y="185" width="18" height="16" rx="2" fill="#D4A24C" opacity="0.6"/><line x1="315" y1="193" x2="323" y2="193" stroke="#A67C2E" stroke-width="0.8" opacity="0.4"/><text x="175" y="177" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" opacity="0.7">Хлеб, крупы</text><!-- Second: Fruits and vegetables --><circle cx="165" cy="163" r="8" fill="#E53935" opacity="0.6"/><!-- Apple --><line x1="165" y1="155" x2="165" y2="152" stroke="#2E7D32" stroke-width="1" opacity="0.5"/><circle cx="280" cy="163" r="7" fill="#FF8F00" opacity="0.6"/><!-- Orange --><circle cx="350" cy="165" r="8" fill="#43A047" opacity="0.6"/><!-- Green veg --><rect x="195" y="157" width="12" height="14" rx="2" fill="#66BB6A" opacity="0.6"/><!-- Carrot-like --><text x="240" y="157" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" opacity="0.6">Овощи, фрукты</text><!-- Third: Protein, dairy --><circle cx="200" cy="138" r="6" fill="#FFAB91" opacity="0.6"/><!-- Meat --><rect x="270" y="132" width="14" height="12" rx="2" fill="#FFECB3" opacity="0.6"/><!-- Cheese --><rect x="335" y="133" width="12" height="12" rx="6" fill="#90CAF9" opacity="0.6"/><!-- Milk --><!-- Top: Fats, sweets --><circle cx="230" cy="116" r="5" fill="#FFCC80" opacity="0.5"/><!-- Butter --><circle cx="280" cy="116" r="5" fill="#F48FB1" opacity="0.5"/><!-- Sweet --><!-- Right side: Healthy person figure (Soviet style) --><circle cx="440" cy="130" r="10" fill="#C62828" opacity="0.7"/><rect x="433" y="140" width="14" height="25" rx="3" fill="#C62828" opacity="0.65"/><rect x="427" y="143" width="8" height="18" rx="2" fill="#C62828" opacity="0.6" transform="rotate(15 431 152)"/><rect x="445" y="143" width="8" height="18" rx="2" fill="#C62828" opacity="0.6" transform="rotate(-15 449 152)"/><rect x="434" y="164" width="6" height="16" rx="2" fill="#C62828" opacity="0.6"/><rect x="442" y="164" width="6" height="16" rx="2" fill="#C62828" opacity="0.6"/><!-- Plate in person's hands --><ellipse cx="455" cy="150" rx="10" ry="4" fill="white" stroke="#999" stroke-width="0.8" opacity="0.6"/><text x="440" y="190" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" opacity="0.5">Ешь</text><text x="440" y="200" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" opacity="0.5">правильно!</text><!-- Decorative sparkles near healthy foods --><path d="M75 150 L77 143 L79 150 L86 152 L79 154 L77 161 L75 154 L68 152 Z" fill="#2E7D32" opacity="0.3"/><path d="M75 180 L77 174 L79 180 L85 182 L79 184 L77 190 L75 184 L69 182 Z" fill="#F9A825" opacity="0.3"/><!-- Info cards --><rect x="30" y="228" width="105" height="68" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1" opacity="0.8"/><text x="82" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828">Завтрак</text><text x="82" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Каша, яйца,</text><text x="82" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">молоко, фрукты</text><rect x="148" y="228" width="105" height="68" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" opacity="0.8"/><text x="200" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0">Обед</text><text x="200" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Первое, второе,</text><text x="200" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">салат, компот</text><rect x="266" y="228" width="105" height="68" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1" opacity="0.8"/><text x="318" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F57F17">Полдник</text><text x="318" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Кефир, бутерброд,</text><text x="318" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">фрукты</text><rect x="384" y="228" width="105" height="68" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" opacity="0.8"/><text x="436" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">Ужин</text><text x="436" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Овощи, рыба,</text><text x="436" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">за 2ч до сна</text><rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/><text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Питание и здоровье</text></svg>