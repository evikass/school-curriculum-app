nner 1 - sprinting (red, Soviet style) --><circle cx="110" cy="135" r="9" fill="#C62828" opacity="0.85"/><rect x="103" y="144" width="14" height="22" rx="3" fill="#C62828" opacity="0.8"/><!-- Forward arm --><rect x="115" y="146" width="18" height="6" rx="3" fill="#C62828" opacity="0.75" transform="rotate(-20 115 149)"/><!-- Back arm --><rect x="90" y="146" width="18" height="6" rx="3" fill="#C62828" opacity="0.75" transform="rotate(25 100 149)"/><!-- Forward leg --><rect x="108" y="165" width="7" height="22" rx="2" fill="#C62828" opacity="0.75" transform="rotate(-15 111 176)"/><!-- Back leg --><rect x="100" y="165" width="7" height="22" rx="2" fill="#C62828" opacity="0.75" transform="rotate(20 103 176)"/><!-- Speed lines --><line x1="75" y1="130" x2="95" y2="130" stroke="#C62828" stroke-width="1.5" opacity="0.3"/><line x1="70" y1="145" x2="93" y2="145" stroke="#C62828" stroke-width="1.5" opacity="0.25"/><line x1="73" y1="160" x2="92" y2="160" stroke="#C62828" stroke-width="1.5" opacity="0.2"/><!-- Runner 2 - sprinting (blue) --><circle cx="180" cy="133" r="9" fill="#1565C0" opacity="0.8"/><rect x="173" y="142" width="14" height="22" rx="3" fill="#1565C0" opacity="0.75"/><rect x="185" y="144" width="18" height="6" rx="3" fill="#1565C0" opacity="0.7" transform="rotate(-20 185 147)"/><rect x="160" y="144" width="18" height="6" rx="3" fill="#1565C0" opacity="0.7" transform="rotate(25 170 147)"/><rect x="178" y="163" width="7" height="22" rx="2" fill="#1565C0" opacity="0.7" transform="rotate(-15 181 174)"/><rect x="170" y="163" width="7" height="22" rx="2" fill="#1565C0" opacity="0.7" transform="rotate(20 173 174)"/><!-- Jumper - mid-air (gold/yellow) --><circle cx="280" cy="110" r="10" fill="#F9A825" opacity="0.85"/><rect x="273" y="120" width="14" height="24" rx="3" fill="#F9A825" opacity="0.8"/><!-- Arms up --><rect x="260" y="115" width="15" height="6" rx="3" fill="#F9A825" opacity="0.75" transform="rotate(-45 265 118)"/><rect x="285" y="115" width="15" height="6" rx="3" fill="#F9A825" opacity="0.75" transform="rotate(45 295 118)"/><!-- Legs tucked --><rect x="272" y="143" width="7" height="18" rx="2" fill="#F9A825" opacity="0.75" transform="rotate(25 275 152)"/><rect x="281" y="143" width="7" height="18" rx="2" fill="#F9A825" opacity="0.75" transform="rotate(-25 284 152)"/><!-- Jump arc --><path d="M250 200 Q265 95 290 105" fill="none" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/><!-- Hurdle --><rect x="320" y="175" width="3" height="28" rx="1" fill="#E65100" opacity="0.7"/><rect x="345" y="175" width="3" height="28" rx="1" fill="#E65100" opacity="0.7"/><rect x="318" y="175" width="32" height="5" rx="2" fill="#FF8F00" opacity="0.7"/><!-- Runner 3 jumping hurdle (green) --><circle cx="335" cy="138" r="8" fill="#2E7D32" opacity="0.8"/><rect x="329" y="146" width="12" height="18" rx="2" fill="#2E7D32" opacity="0.75"/><rect x="322" y="148" width="14" height="5" rx="2" fill="#2E7D32" opacity="0.7" transform="rotate(-30 328 150)"/><rect x="336" y="148" width="14" height="5" rx="2" fill="#2E7D32" opacity="0.7" transform="rotate(30 342 150)"/><rect x="330" y="163" width="6" height="16" rx="2" fill="#2E7D32" opacity="0.7" transform="rotate(15 333 171)"/><rect x="338" y="163" width="6" height="16" rx="2" fill="#2E7D32" opacity="0.7" transform="rotate(-15 341 171)"/><!-- Strength figure - push-up pose (red accent) --><circle cx="430" cy="175" r="7" fill="#C62828" opacity="0.6"/><rect x="415" y="182" width="30" height="8" rx="3" fill="#C62828" opacity="0.55"/><rect x="410" y="186" width="8" height="14" rx="2" fill="#C62828" opacity="0.5" transform="rotate(10 414 193)"/><rect x="442" y="186" width="8" height="14" rx="2" fill="#C62828" opacity="0.5" transform="rotate(-10 446 193)"/><!-- Finish line flag --><line x1="470" y1="100" x2="470" y2="205" stroke="#333" stroke-width="2" opacity="0.5"/><rect x="470" y="100" width="18" height="12" rx="1" fill="#C62828" opacity="0.6"/><rect x="470" y="112" width="18" height="12" rx="1" fill="white" opacity="0.6"/><rect x="470" y="124" width="18" height="12" rx="1" fill="#1565C0" opacity="0.6"/><rect x="470" y="136" width="18" height="12" rx="1" fill="white" opacity="0.6"/><rect x="470" y="148" width="18" height="12" rx="1" fill="#F9A825" opacity="0.6"/><text x="250" y="100" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" opacity="0.5">ВПЕРЕД К ПОБЕДАМ!</text><!-- Info cards --><rect x="30" y="228" width="105" height="68" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="1" opacity="0.8"/><text x="82" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828">Скорость</text><text x="82" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Бег на 30м, 60м,</text><text x="82" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">челночный бег</text><rect x="148" y="228" width="105" height="68" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" opacity="0.8"/><text x="200" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0">Сила</text><text x="200" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Подтягивания,</text><text x="200" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">отжимания, прыжки</text><rect x="266" y="228" width="105" height="68" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1" opacity="0.8"/><text x="318" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F57F17">Выносливость</text><text x="318" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Бег 1000м,</text><text x="318" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">длительный бег</text><rect x="384" y="228" width="105" height="68" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" opacity="0.8"/><text x="436" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">Ловкость</text><text x="436" y="264" font-family="Arial,sans-serif" font-size="8" fill="#666">Прыжки через</text><text x="436" y="275" font-family="Arial,sans-serif" font-size="8" fill="#666">скакалку, метания</text><rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/><text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Развитие физических качеств</text></svg>