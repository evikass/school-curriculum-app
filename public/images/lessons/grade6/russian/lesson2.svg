<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Синонимы и антонимы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Синонимы -->
  <rect x="25" y="90" width="220" height="100" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="135" y="104" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">СИНОНИМЫ - близкие по смыслу</text>
  <!-- Synonym pair 1: храбрый = смелый -->
  <rect x="40" y="112" width="55" height="20" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="68" y="126" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">храбрый</text>
  <text x="110" y="126" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">=</text>
  <rect x="125" y="112" width="50" height="20" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="150" y="126" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">смелый</text>
  <!-- Synonym pair 2: бегемот = гиппопотам -->
  <rect x="35" y="142" width="60" height="20" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="65" y="156" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">бегемот</text>
  <text x="110" y="156" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">=</text>
  <rect x="125" y="142" width="70" height="20" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="160" y="156" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">гиппопотам</text>
  <!-- Synonym pair 3: путь = дорога -->
  <rect x="45" y="172" width="45" height="14" rx="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="68" y="182" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">путь</text>
  <text x="110" y="183" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">=</text>
  <rect x="125" y="172" width="50" height="14" rx="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="150" y="182" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">дорога</text>

  <!-- Card 2: Антонимы -->
  <rect x="257" y="90" width="217" height="100" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="365" y="104" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">АНТОНИМЫ - противоположные</text>
  <!-- Antonym pair 1: день - ночь -->
  <rect x="272" y="112" width="42" height="20" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="293" y="126" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">день</text>
  <!-- Sun icon -->
  <circle cx="293" y="0" r="0" fill="#F9A825"/>
  <text x="327" y="127" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">/</text>
  <rect x="340" y="112" width="42" height="20" rx="4" fill="#1A237E" stroke="#283593" stroke-width="1"/>
  <text x="361" y="126" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ночь</text>
  <!-- small sun -->
  <circle cx="293" cy="115" r="0" fill="#F9A825"/>
  <!-- Antonym pair 2: горячий - холодный -->
  <rect x="267" y="142" width="55" height="20" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
  <text x="295" y="156" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">горячий</text>
  <text x="340" y="156" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">/</text>
  <rect x="353" y="142" width="62" height="20" rx="4" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <text x="384" y="156" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">холодный</text>
  <!-- Antonym pair 3: свет - тьма -->
  <rect x="275" y="170" width="42" height="16" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="296" y="182" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle">свет</text>
  <text x="340" y="182" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">/</text>
  <rect x="353" y="170" width="42" height="16" rx="3" fill="#E8E8E8" stroke="#555" stroke-width="0.8"/>
  <text x="374" y="182" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">тьма</text>

  <!-- Card 3: Словарь синонимов -->
  <rect x="25" y="198" width="155" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="102" y="212" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">СЛОВАРЬ СИНОНИМОВ</text>
  <!-- Book illustration -->
  <rect x="40" y="220" width="55" height="65" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="40" y="220" width="55" height="10" rx="3" fill="#1565C0"/>
  <text x="68" y="228" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">СИНОНИМЫ</text>
  <!-- Book content lines with synonyms -->
  <text x="48" y="243" font-family="Arial,sans-serif" font-size="6" fill="#333">друг - товарищ</text>
  <text x="48" y="253" font-family="Arial,sans-serif" font-size="6" fill="#333">врач - доктор</text>
  <text x="48" y="263" font-family="Arial,sans-serif" font-size="6" fill="#333">большой -</text>
  <text x="55" y="273" font-family="Arial,sans-serif" font-size="6" fill="#333">огромный</text>
  <text x="48" y="283" font-family="Arial,sans-serif" font-size="6" fill="#333">быстрый -</text>
  <!-- Thesaurus web on the right -->
  <circle cx="135" cy="245" r="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="135" y="248" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">быстрый</text>
  <line x1="135" y1="237" x2="125" y2="225" stroke="#1565C0" stroke-width="0.8"/>
  <line x1="143" y1="240" x2="155" y2="228" stroke="#1565C0" stroke-width="0.8"/>
  <line x1="143" y1="250" x2="158" y2="255" stroke="#1565C0" stroke-width="0.8"/>
  <line x1="127" y1="250" x2="115" y2="260" stroke="#1565C0" stroke-width="0.8"/>
  <text x="118" y="222" font-family="Arial,sans-serif" font-size="6" fill="#555">скорый</text>
  <text x="155" y="226" font-family="Arial,sans-serif" font-size="6" fill="#555">резвый</text>
  <text x="160" y="258" font-family="Arial,sans-serif" font-size="6" fill="#555">стремит.</text>
  <text x="107" y="266" font-family="Arial,sans-serif" font-size="6" fill="#555">шустрый</text>
  <circle cx="135" cy="280" r="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8"/>
  <text x="135" y="283" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">+</text>

  <!-- Card 4: Антонимические пары в контексте -->
  <rect x="192" y="198" width="282" height="100" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="333" y="212" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">АНТОНИМЫ В ПОСЛОВИЦАХ</text>
  <!-- Proverb 1 -->
  <rect x="202" y="220" width="130" height="28" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="205" y="231" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Ум</text>
  <text x="218" y="231" font-family="Arial,sans-serif" font-size="7" fill="#555">хорошо, а</text>
  <text x="270" y="231" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">два</text>
  <text x="282" y="231" font-family="Arial,sans-serif" font-size="7" fill="#555">лучше</text>
  <text x="205" y="243" font-family="Arial,sans-serif" font-size="6" fill="#999" font-style="italic">антоним: один - два (много)</text>
  <!-- Proverb 2 -->
  <rect x="202" y="255" width="130" height="28" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="205" y="266" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Маленькое</text>
  <text x="256" y="266" font-family="Arial,sans-serif" font-size="7" fill="#555">дело лучше</text>
  <text x="205" y="278" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">большого</text>
  <text x="254" y="278" font-family="Arial,sans-serif" font-size="7" fill="#555">безделья</text>
  <!-- Proverb 3 -->
  <rect x="338" y="220" width="130" height="28" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="341" y="231" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Готовь</text>
  <text x="367" y="231" font-family="Arial,sans-serif" font-size="7" fill="#555">сани летом,</text>
  <text x="341" y="243" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">телегу</text>
  <text x="367" y="243" font-family="Arial,sans-serif" font-size="7" fill="#555">зимой</text>
  <!-- Proverb 4 -->
  <rect x="338" y="255" width="130" height="28" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="341" y="266" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Век</text>
  <text x="357" y="266" font-family="Arial,sans-serif" font-size="7" fill="#555">живи -</text>
  <text x="341" y="278" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">век</text>
  <text x="357" y="278" font-family="Arial,sans-serif" font-size="7" fill="#555">учись</text>
  <!-- Decorative arrows showing contrast -->
  <line x1="355" y1="233" x2="360" y2="228" stroke="#F9A825" stroke-width="1.2"/>
  <line x1="368" y1="233" x2="363" y2="228" stroke="#F9A825" stroke-width="1.2"/>

  <!-- Bottom bar -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Синонимы и антонимы</text>
</svg>