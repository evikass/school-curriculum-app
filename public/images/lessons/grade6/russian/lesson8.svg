<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#C62828" text-anchor="middle">Имя существительное</text>
  <text x="250" y="56" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#C62828" text-anchor="middle">как часть речи</text>
  <text x="250" y="70" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 8</text>
  <line x1="30" y1="76" x2="470" y2="76" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="73" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="73" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Что обозначает (What it means) -->
  <rect x="25" y="84" width="150" height="105" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="100" y="98" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ЧТО ОБОЗНАЧАЕТ?</text>
  <!-- Question mark icon -->
  <circle cx="52" cy="120" r="14" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="52" y="126" font-family="Arial,sans-serif" font-size="16" fill="#C62828" text-anchor="middle" font-weight="bold">?</text>
  <!-- Answers with icons -->
  <!-- Предмет -->
  <rect x="35" y="138" width="130" height="16" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6"/>
  <!-- chair icon -->
  <text x="44" y="150" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">1.</text>
  <text x="56" y="150" font-family="Arial,sans-serif" font-size="6" fill="#555">Предмет: стол, дом</text>
  <!-- Явление -->
  <rect x="35" y="157" width="130" height="16" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="44" y="169" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">2.</text>
  <text x="56" y="169" font-family="Arial,sans-serif" font-size="6" fill="#555">Явление: гроза, мороз</text>
  <!-- Признак -->
  <rect x="35" y="176" width="130" height="16" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="0.6"/>
  <text x="44" y="188" font-family="Arial,sans-serif" font-size="8" fill="#E65100">3.</text>
  <text x="56" y="188" font-family="Arial,sans-serif" font-size="6" fill="#555">Действие: бег, чтение</text>

  <!-- Card 2: Questions -->
  <rect x="187" y="84" width="142" height="105" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="258" y="98" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">ВОПРОСЫ</text>
  <!-- Big question marks with labels -->
  <rect x="197" y="106" width="56" height="22" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="225" y="121" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Кто?</text>
  <rect x="260" y="106" width="56" height="22" rx="6" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <text x="288" y="121" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Что?</text>
  <!-- Who examples -->
  <text x="210" y="143" font-family="Arial,sans-serif" font-size="6" fill="#555">Кто? - человек,</text>
  <text x="210" y="152" font-family="Arial,sans-serif" font-size="6" fill="#555">животное, птица</text>
  <!-- What examples -->
  <text x="275" y="143" font-family="Arial,sans-serif" font-size="6" fill="#555">Что? - вещь,</text>
  <text x="275" y="152" font-family="Arial,sans-serif" font-size="6" fill="#555">явление, абстракция</text>
  <!-- Little icons -->
  <circle cx="205" y="0" r="0" fill="none"/>
  <!-- Person icon for Кто? -->
  <circle cx="206" cy="168" r="4" fill="#FFCC80" stroke="#E65100" stroke-width="0.6"/>
  <line x1="206" y1="172" x2="206" y2="180" stroke="#E65100" stroke-width="0.8"/>
  <line x1="206" y1="176" x2="201" y2="180" stroke="#E65100" stroke-width="0.6"/>
  <line x1="206" y1="176" x2="211" y2="180" stroke="#E65100" stroke-width="0.6"/>
  <!-- Object icon for Что? -->
  <rect x="275" y="163" width="10" height="12" rx="1" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.6"/>
  <line x1="275" y1="163" x2="285" y2="163" stroke="#1565C0" stroke-width="0.6"/>
  <text x="258" y="185" font-family="Arial,sans-serif" font-size="5" fill="#999" text-anchor="middle">одуш./неодуш.</text>

  <!-- Card 3: Род (Gender) -->
  <rect x="341" y="84" width="133" height="105" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="407" y="98" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">РОД</text>
  <!-- Мужской род -->
  <rect x="351" y="106" width="38" height="22" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="370" y="118" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Муж.</text>
  <text x="370" y="126" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">он мой</text>
  <text x="370" y="140" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">стол, дом,</text>
  <text x="370" y="148" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">герой</text>
  <!-- Женский род -->
  <rect x="393" y="106" width="38" height="22" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="1"/>
  <text x="412" y="118" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Жен.</text>
  <text x="412" y="126" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">она моя</text>
  <text x="412" y="140" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">школа, речь,</text>
  <text x="412" y="148" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">ночь</text>
  <!-- Средний род -->
  <rect x="435" y="106" width="33" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="452" y="118" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Ср.</text>
  <text x="452" y="126" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">оно моё</text>
  <text x="452" y="140" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">окно,</text>
  <text x="452" y="148" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">поле, небо</text>
  <!-- Common gender -->
  <rect x="355" y="156" width="110" height="24" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="410" y="168" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">Общий род: умница, сирота</text>
  <text x="410" y="177" font-family="Arial,sans-serif" font-size="5" fill="#999" text-anchor="middle">он/она - умница</text>

  <!-- Card 4: Число (Number) -->
  <rect x="25" y="197" width="150" height="103" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="100" y="211" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">ЧИСЛО</text>
  <!-- Единственное -->
  <rect x="35" y="220" width="130" height="34" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="100" y="234" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">Единственное</text>
  <text x="100" y="247" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">стол, кот, город, река</text>
  <!-- Icon: 1 item -->
  <rect x="42" y="225" width="8" height="8" rx="1" fill="#F9A825" opacity="0.5"/>
  <!-- Множественное -->
  <rect x="35" y="260" width="130" height="34" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="100" y="274" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Множественное</text>
  <text x="100" y="287" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">столы, коты, города</text>
  <!-- Icons: 3 items -->
  <rect x="42" y="265" width="6" height="6" rx="1" fill="#E65100" opacity="0.5"/>
  <rect x="50" y="265" width="6" height="6" rx="1" fill="#E65100" opacity="0.5"/>
  <rect x="58" y="265" width="6" height="6" rx="1" fill="#E65100" opacity="0.5"/>

  <!-- Card 5: Падеж (Case) intro -->
  <rect x="187" y="197" width="142" height="103" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="258" y="211" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ПАДЕЖИ - 6 ШТУК</text>
  <!-- List of cases -->
  <rect x="197" y="218" width="56" height="14" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.6"/>
  <text x="225" y="228" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Им. - кто?</text>
  <rect x="258" y="218" width="56" height="14" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6"/>
  <text x="286" y="228" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Род. - кого?</text>
  <rect x="197" y="236" width="56" height="14" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="225" y="246" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Дат. - кому?</text>
  <rect x="258" y="236" width="56" height="14" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="0.6"/>
  <text x="286" y="246" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Вин. - кого?</text>
  <rect x="197" y="254" width="56" height="14" rx="3" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.6"/>
  <text x="225" y="264" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">Тв. - кем?</text>
  <rect x="258" y="254" width="56" height="14" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.6"/>
  <text x="286" y="264" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">Пред. - о ком?</text>
  <!-- Noun properties summary -->
  <rect x="197" y="274" width="117" height="18" rx="3" fill="#F5F5F5" stroke="#999" stroke-width="0.6"/>
  <text x="255" y="286" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Склоняется, имеет род и число</text>

  <!-- Card 6: Одушевлённость -->
  <rect x="341" y="197" width="133" height="103" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="407" y="211" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">ОДУШ./НЕОДУШ.</text>
  <!-- Animated -->
  <rect x="351" y="220" width="112" height="34" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="407" y="234" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Одушевлённые</text>
  <text x="407" y="247" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">кот, птица, человек</text>
  <!-- Cat icon -->
  <circle cx="365" cy="240" r="4" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
  <polygon points="362,237 363,233 365,237" fill="#FFCC80" stroke="#E65100" stroke-width="0.4"/>
  <polygon points="365,237 367,233 368,237" fill="#FFCC80" stroke="#E65100" stroke-width="0.4"/>
  <!-- Inanimate -->
  <rect x="351" y="260" width="112" height="34" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="407" y="274" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Неодушевлённые</text>
  <text x="407" y="287" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">стол, книга, город</text>
  <!-- Book icon -->
  <rect x="362" y="278" width="8" height="6" rx="1" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.4"/>

  <!-- Bottom bar -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Имя существительное как часть речи</text>
</svg>