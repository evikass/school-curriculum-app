<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title (two lines to fit) -->
  <text x="250" y="38" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#C62828" text-anchor="middle">Исконно русские и</text>
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#C62828" text-anchor="middle">заимствованные слова</text>
  <text x="250" y="73" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 3</text>
  <line x1="30" y1="79" x2="470" y2="79" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="76" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="76" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Tree of Russian language -->
  <rect x="25" y="87" width="225" height="120" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="137" y="101" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">ДРЕВО РУССКОГО ЯЗЫКА</text>
  <!-- Trunk -->
  <rect x="126" y="155" width="22" height="42" fill="#A1887F" stroke="#6D4C41" stroke-width="1" rx="2"/>
  <!-- Roots -->
  <path d="M128,197 Q115,208 108,195" stroke="#6D4C41" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M126,197 Q118,212 110,205" stroke="#6D4C41" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M146,197 Q158,208 165,195" stroke="#6D4C41" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M148,197 Q155,213 162,206" stroke="#6D4C41" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Root labels -->
  <text x="96" y="198" font-family="Arial,sans-serif" font-size="5" fill="#6D4C41">мать</text>
  <text x="165" y="200" font-family="Arial,sans-serif" font-size="5" fill="#6D4C41">дом</text>
  <!-- Crown -->
  <ellipse cx="137" cy="132" rx="48" ry="33" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="118" cy="138" rx="24" ry="20" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="156" cy="138" rx="24" ry="20" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="137" cy="124" rx="26" ry="18" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Russian words in crown -->
  <text x="120" y="128" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">небо</text>
  <text x="148" y="128" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">земля</text>
  <text x="120" y="148" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">вода</text>
  <text x="148" y="148" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">огонь</text>

  <!-- Card 2: Заимствованные слова -->
  <rect x="262" y="87" width="212" height="120" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="368" y="101" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">ЗАИМСТВОВАННЫЕ СЛОВА</text>
  <!-- Globe -->
  <circle cx="330" cy="148" r="28" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <ellipse cx="330" cy="148" rx="28" ry="10" fill="none" stroke="#1565C0" stroke-width="0.6"/>
  <line x1="330" y1="120" x2="330" y2="176" stroke="#1565C0" stroke-width="0.6"/>
  <ellipse cx="318" cy="148" rx="8" ry="28" fill="none" stroke="#1565C0" stroke-width="0.5"/>
  <ellipse cx="342" cy="148" rx="8" ry="28" fill="none" stroke="#1565C0" stroke-width="0.5"/>
  <!-- Arrows from languages -->
  <line x1="300" y1="128" x2="278" y2="114" stroke="#C62828" stroke-width="1.2"/>
  <polygon points="275,112 272,118 279,116" fill="#C62828"/>
  <text x="253" y="112" font-family="Arial,sans-serif" font-size="6" fill="#C62828">латынь</text>
  <line x1="358" y1="126" x2="388" y2="112" stroke="#F9A825" stroke-width="1.2"/>
  <polygon points="391,110 394,116 388,115" fill="#F9A825"/>
  <text x="393" y="110" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">греческий</text>
  <line x1="358" y1="162" x2="392" y2="158" stroke="#2E7D32" stroke-width="1.2"/>
  <polygon points="395,156 398,159 395,162" fill="#2E7D32"/>
  <text x="398" y="162" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">немецкий</text>
  <line x1="302" y1="170" x2="278" y2="180" stroke="#9C27B0" stroke-width="1.2"/>
  <polygon points="275,178 272,184 279,182" fill="#9C27B0"/>
  <text x="252" y="192" font-family="Arial,sans-serif" font-size="6" fill="#9C27B0">французский</text>
  <text x="300" y="200" font-family="Arial,sans-serif" font-size="5" fill="#555">школа, тетрадь, карандаш</text>

  <!-- Card 3: Groups of borrowed words -->
  <rect x="25" y="214" width="150" height="86" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="100" y="228" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" font-weight="bold" text-anchor="middle">ГРУППЫ ЗАИМСТВОВАНИЙ</text>
  <rect x="32" y="234" width="65" height="26" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="64" y="246" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Тюркизмы</text>
  <text x="64" y="255" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">деньги, сундук</text>
  <rect x="102" y="234" width="65" height="26" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="134" y="246" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Германизмы</text>
  <text x="134" y="255" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">галстук, лагерь</text>
  <rect x="32" y="266" width="65" height="26" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="64" y="278" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Латинизмы</text>
  <text x="64" y="287" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">грамматика</text>
  <rect x="102" y="266" width="65" height="26" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="134" y="278" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Грекизмы</text>
  <text x="134" y="287" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">тетрадь, идея</text>

  <!-- Card 4: Исконно русские - subcategories -->
  <rect x="187" y="214" width="287" height="86" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="330" y="228" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold" text-anchor="middle">ИСКОННО РУССКИЕ - ТРИ ГРУППЫ</text>
  <rect x="195" y="234" width="86" height="56" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
  <text x="238" y="246" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Индоевропейские</text>
  <text x="238" y="257" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">мать, брат,</text>
  <text x="238" y="266" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">дом, ночь,</text>
  <text x="238" y="275" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">вода, солнце</text>
  <rect x="287" y="234" width="86" height="56" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="330" y="246" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Общеславянские</text>
  <text x="330" y="257" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">весна, снег,</text>
  <text x="330" y="266" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">корова, овца,</text>
  <text x="330" y="275" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">лес, поле</text>
  <rect x="379" y="234" width="86" height="56" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="422" y="246" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Собственно русские</text>
  <text x="422" y="257" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">снегирь,</text>
  <text x="422" y="266" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">ковёр, лебедь,</text>
  <text x="422" y="275" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">дача, сметана</text>

  <!-- Bottom bar -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Исконно русские и заимствованные слова</text>
</svg>