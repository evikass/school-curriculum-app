<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Слово и его значение</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Толковый словарь (Explanatory Dictionary) -->
  <rect x="25" y="90" width="155" height="100" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="102" y="104" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ТОЛКОВЫЙ СЛОВАРЬ</text>
  <!-- Book shape -->
  <rect x="45" y="112" width="50" height="65" rx="3" fill="#FFECB3" stroke="#F9A825" stroke-width="1.5"/>
  <rect x="45" y="112" width="50" height="8" rx="3" fill="#C62828" opacity="0.8"/>
  <text x="70" y="119" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">СЛОВАРЬ</text>
  <!-- Book lines -->
  <line x1="52" y1="128" x2="88" y2="128" stroke="#D4A017" stroke-width="0.7"/>
  <line x1="52" y1="134" x2="85" y2="134" stroke="#D4A017" stroke-width="0.7"/>
  <line x1="52" y1="140" x2="82" y2="140" stroke="#D4A017" stroke-width="0.7"/>
  <line x1="52" y1="146" x2="86" y2="146" stroke="#D4A017" stroke-width="0.7"/>
  <line x1="52" y1="152" x2="78" y2="152" stroke="#D4A017" stroke-width="0.7"/>
  <line x1="52" y1="158" x2="84" y2="158" stroke="#D4A017" stroke-width="0.7"/>
  <!-- Magnifying glass -->
  <circle cx="130" cy="140" r="14" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <line x1="140" y1="150" x2="152" y2="162" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>
  <text x="130" y="144" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">А</text>
  <!-- Page stack below -->
  <rect x="48" y="115" width="46" height="62" rx="2" fill="white" stroke="#F9A825" stroke-width="0.5" opacity="0.4"/>
  <rect x="50" y="117" width="44" height="60" rx="2" fill="#FFFDE7" stroke="#F9A825" stroke-width="0.5" opacity="0.3"/>

  <!-- Card 2: Многозначные слова (Polysemantic words) -->
  <rect x="192" y="90" width="135" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="260" y="104" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">МНОГОЗНАЧНОСТЬ</text>
  <!-- Central word -->
  <rect x="228" y="112" width="64" height="20" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="260" y="126" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">КЛЮЧ</text>
  <!-- Arrows going out -->
  <line x1="235" y1="132" x2="210" y2="148" stroke="#C62828" stroke-width="1.2"/>
  <line x1="260" y1="132" x2="260" y2="148" stroke="#C62828" stroke-width="1.2"/>
  <line x1="285" y1="132" x2="310" y2="148" stroke="#C62828" stroke-width="1.2"/>
  <!-- Meaning 1: door key -->
  <circle cx="208" cy="158" r="10" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
  <!-- key icon -->
  <circle cx="205" cy="156" r="3" fill="none" stroke="#C62828" stroke-width="1.2"/>
  <line x1="208" y1="156" x2="215" y2="156" stroke="#C62828" stroke-width="1.2"/>
  <line x1="213" y1="156" x2="213" y2="160" stroke="#C62828" stroke-width="1"/>
  <text x="208" y="176" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">дверной</text>
  <!-- Meaning 2: source/water -->
  <circle cx="260" cy="158" r="10" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <!-- water drop -->
  <path d="M258,154 Q260,150 262,154 Q263,158 260,160 Q257,158 258,154Z" fill="#42A5F5"/>
  <text x="260" y="176" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">родник</text>
  <!-- Meaning 3: musical key -->
  <circle cx="312" cy="158" r="10" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <!-- treble clef simplified -->
  <text x="312" y="163" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">#</text>
  <text x="312" y="176" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">нота</text>

  <!-- Card 3: Однозначные слова (Univocal words) -->
  <rect x="339" y="90" width="135" height="100" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="407" y="104" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">ОДНОЗНАЧНЫЕ</text>
  <!-- Word and single arrow to meaning -->
  <rect x="360" y="115" width="55" height="18" rx="9" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="388" y="128" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">ТИРАН</text>
  <line x1="415" y1="124" x2="430" y2="124" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="430,121 436,124 430,127" fill="#C62828"/>
  <rect x="438" y="116" width="30" height="16" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="453" y="128" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">жестокий</text>
  <!-- Another word -->
  <rect x="360" y="145" width="60" height="18" rx="9" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="390" y="158" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">АППАРАТ</text>
  <line x1="420" y1="154" x2="432" y2="154" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="432,151 438,154 432,157" fill="#C62828"/>
  <rect x="440" y="146" width="28" height="16" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="454" y="158" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">прибор</text>
  <!-- = 1 sign -->
  <text x="407" y="185" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">одно значение</text>

  <!-- Card 4: Прямое и переносное значение -->
  <rect x="25" y="198" width="230" height="100" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="140" y="212" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">ПРЯМОЕ И ПЕРЕНОСНОЕ ЗНАЧЕНИЕ</text>
  <!-- Direct meaning -->
  <text x="60" y="235" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">Прямое</text>
  <!-- Golden chain -->
  <ellipse cx="60" cy="258" rx="22" ry="14" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
  <line x1="42" y1="252" x2="48" y2="256" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="256" x2="55" y2="252" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="252" x2="62" y2="256" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="62" y1="256" x2="68" y2="252" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="252" x2="75" y2="256" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <line x1="75" y1="256" x2="78" y2="260" stroke="#F9A825" stroke-width="2" stroke-linecap="round"/>
  <text x="60" y="285" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">цепь из металла</text>
  <!-- Arrow -->
  <line x1="95" y1="255" x2="130" y2="255" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="130,252 136,255 130,258" fill="#C62828"/>
  <!-- Figurative meaning -->
  <text x="195" y="235" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">Переносное</text>
  <!-- Mountain chain -->
  <polygon points="170,270 185,240 200,270" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
  <polygon points="190,270 210,235 230,270" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
  <polygon points="210,270 225,245 240,270" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Snow caps -->
  <polygon points="183,243 185,240 187,243" fill="white"/>
  <polygon points="207,238 210,235 213,238" fill="white"/>
  <text x="205" y="285" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">гора цепью</text>

  <!-- Card 5: Лексическое значение -->
  <rect x="267" y="198" width="207" height="100" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="370" y="212" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ЛЕКСИЧЕСКОЕ ЗНАЧЕНИЕ</text>
  <!-- Word in center -->
  <rect x="320" y="222" width="100" height="24" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2"/>
  <text x="370" y="239" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">ЗАКОЛКА</text>
  <!-- Definition box -->
  <rect x="290" y="255" width="165" height="36" rx="4" fill="#FFF3E0" stroke="#F9A825" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="372" y="268" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Предмет для скрепления</text>
  <text x="372" y="278" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">волос, украшение для волос</text>
  <!-- Small decorative elements -->
  <path d="M320,246 L330,246" stroke="#C62828" stroke-width="1" stroke-dasharray="2,1"/>
  <path d="M340,246 L350,246" stroke="#C62828" stroke-width="1" stroke-dasharray="2,1"/>
  <path d="M360,246 L370,246" stroke="#C62828" stroke-width="1" stroke-dasharray="2,1"/>
  <path d="M380,246 L390,246" stroke="#C62828" stroke-width="1" stroke-dasharray="2,1"/>
  <path d="M400,246 L410,246" stroke="#C62828" stroke-width="1" stroke-dasharray="2,1"/>
  <!-- Hair pin illustration -->
  <line x1="455" y1="230" x2="460" y2="270" stroke="#E65100" stroke-width="2" stroke-linecap="round"/>
  <circle cx="455" cy="226" r="4" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <circle cx="460" cy="273" r="2" fill="#E65100"/>

  <!-- Bottom bar -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Слово и его значение</text>
</svg>