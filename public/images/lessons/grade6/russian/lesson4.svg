<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Фразеологизмы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Русский язык - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Бить баклуши - to idle -->
  <rect x="25" y="88" width="145" height="100" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="97" y="102" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">БИТЬ БАКЛУШИ</text>
  <!-- Person sitting idle -->
  <circle cx="55" cy="125" r="8" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <line x1="55" y1="133" x2="55" y2="155" stroke="#E65100" stroke-width="2"/>
  <line x1="55" y1="140" x2="42" y2="150" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="140" x2="68" y2="148" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="155" x2="45" y2="175" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="155" x2="65" y2="175" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Baklushi (wooden blocks) scattered -->
  <rect x="78" y="160" width="12" height="8" rx="2" fill="#A1887F" stroke="#6D4C41" stroke-width="0.8" transform="rotate(-15,84,164)"/>
  <rect x="90" y="155" width="12" height="8" rx="2" fill="#BCAAA4" stroke="#6D4C41" stroke-width="0.8" transform="rotate(10,96,159)"/>
  <rect x="82" y="172" width="12" height="8" rx="2" fill="#D7CCC8" stroke="#6D4C41" stroke-width="0.8" transform="rotate(-5,88,176)"/>
  <!-- Zzz for sleeping -->
  <text x="72" y="120" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" opacity="0.7">z</text>
  <text x="78" y="115" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" opacity="0.5">z</text>
  <text x="85" y="108" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" opacity="0.3">z</text>
  <!-- Meaning -->
  <rect x="105" y="130" width="55" height="18" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.6" stroke-dasharray="2,1"/>
  <text x="132" y="143" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">бездельничать</text>

  <!-- Card 2: Водить за нос - to deceive -->
  <rect x="182" y="88" width="145" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="254" y="102" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">ВОДИТЬ ЗА НОС</text>
  <!-- Person being led by nose -->
  <!-- Person 1 (deceiver) pulling -->
  <circle cx="200" cy="135" r="7" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <line x1="200" y1="142" x2="200" y2="162" stroke="#E65100" stroke-width="1.5"/>
  <line x1="200" y1="148" x2="195" y2="158" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="200" y1="148" x2="210" y2="145" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="200" y1="162" x2="193" y2="178" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="200" y1="162" x2="207" y2="178" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Rope from hand to other person's nose -->
  <line x1="210" y1="145" x2="250" y2="138" stroke="#C62828" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Person 2 (being deceived) -->
  <circle cx="260" cy="132" r="7" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <line x1="260" y1="139" x2="260" y2="162" stroke="#E65100" stroke-width="1.5"/>
  <line x1="260" y1="147" x2="250" y2="155" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="260" y1="147" x2="270" y2="153" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="260" y1="162" x2="253" y2="178" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="260" y1="162" x2="267" y2="178" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Nose highlight -->
  <circle cx="266" cy="133" r="2.5" fill="#FFAB91" stroke="#E65100" stroke-width="0.8"/>
  <!-- Confusion marks -->
  <text x="270" y="126" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">?</text>
  <text x="278" y="122" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">?</text>
  <!-- Meaning -->
  <rect x="215" y="168" width="55" height="16" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6" stroke-dasharray="2,1"/>
  <text x="242" y="179" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">обманывать</text>

  <!-- Card 3: Заморить червячка - to have a snack -->
  <rect x="339" y="88" width="135" height="100" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="406" y="102" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold" text-anchor="middle">ЗАМОРИТЬ ЧЕРВЯЧКА</text>
  <!-- Person eating -->
  <circle cx="380" cy="125" r="7" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <line x1="380" y1="132" x2="380" y2="152" stroke="#E65100" stroke-width="1.5"/>
  <line x1="380" y1="138" x2="390" y2="142" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="380" y1="138" x2="370" y2="142" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="380" y1="152" x2="373" y2="168" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="380" y1="152" x2="387" y2="168" stroke="#E65100" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Food plate -->
  <ellipse cx="405" cy="152" rx="16" ry="8" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <circle cx="400" cy="148" r="5" fill="#EF5350"/>
  <circle cx="408" cy="149" r="4" fill="#FFC107"/>
  <circle cx="404" cy="155" r="3" fill="#66BB6A"/>
  <!-- Worm character -->
  <path d="M420,140 Q425,135 430,140 Q435,145 430,148 Q425,150 428,145" stroke="#E53935" stroke-width="1.5" fill="none"/>
  <circle cx="428" cy="143" r="1.5" fill="#333"/>
  <text x="435" y="137" font-family="Arial,sans-serif" font-size="8" fill="#E53935">zzz</text>
  <!-- Meaning -->
  <rect x="365" y="172" width="55" height="14" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.6" stroke-dasharray="2,1"/>
  <text x="392" y="182" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">перекусить</text>

  <!-- Card 4: Что такое фразеологизм -->
  <rect x="25" y="196" width="220" height="104" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="135" y="210" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">ЧТО ТАКОЕ ФРАЗЕОЛОГИЗМ?</text>
  <!-- Definition box -->
  <rect x="35" y="218" width="200" height="32" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="135" y="230" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Фразеологизм - устойчивое выражение,</text>
  <text x="135" y="242" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">смысл которого не складывается из слов</text>
  <!-- Comparison illustration -->
  <text x="60" y="265" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Бить баклуши</text>
  <line x1="120" y1="263" x2="140" y2="263" stroke="#C62828" stroke-width="1.2"/>
  <polygon points="140,260 146,263 140,266" fill="#C62828"/>
  <text x="150" y="265" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">бездельничать</text>
  <!-- Not: "бить" + "баклуши" -->
  <line x1="60" y1="275" x2="65" y2="280" stroke="#999" stroke-width="0.8"/>
  <line x1="95" y1="275" x2="90" y2="280" stroke="#999" stroke-width="0.8"/>
  <text x="55" y="290" font-family="Arial,sans-serif" font-size="5" fill="#999" text-anchor="middle">не = бить</text>
  <text x="100" y="290" font-family="Arial,sans-serif" font-size="5" fill="#999" text-anchor="middle">не = баклуши</text>
  <!-- Key concept icon -->
  <rect x="160" y="273" width="72" height="20" rx="10" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
  <text x="196" y="287" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">целостный смысл</text>

  <!-- Card 5: More examples -->
  <rect x="257" y="196" width="217" height="104" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="365" y="210" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ПРИМЕРЫ ФРАЗЕОЛОГИЗМОВ</text>
  <!-- Example 1 -->
  <rect x="267" y="218" width="95" height="30" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="314" y="231" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Спустя рукава</text>
  <text x="314" y="242" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">небрежно</text>
  <!-- Sleeves illustration -->
  <line x1="267" y1="233" x2="278" y2="237" stroke="#E65100" stroke-width="1.5"/>
  <path d="M278,232 Q285,228 290,235" stroke="#E65100" stroke-width="1" fill="#FFCC80" opacity="0.6"/>
  <!-- Example 2 -->
  <rect x="370" y="218" width="95" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="417" y="231" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Виться как уж</text>
  <text x="417" y="242" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">лезть из кожи</text>
  <!-- Example 3 -->
  <rect x="267" y="255" width="95" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="314" y="268" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Как снег на голову</text>
  <text x="314" y="279" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">внезапно</text>
  <!-- Example 4 -->
  <rect x="370" y="255" width="95" height="30" rx="4" fill="#FCE4EC" stroke="#C62828" stroke-width="0.8"/>
  <text x="417" y="268" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Зарубить на носу</text>
  <text x="417" y="279" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">запомнить</text>
  <!-- Snowflakes decoration -->
  <text x="285" y="265" font-family="Arial,sans-serif" font-size="6" fill="#90CAF9">*</text>
  <text x="340" y="272" font-family="Arial,sans-serif" font-size="5" fill="#90CAF9">*</text>

  <!-- Bottom bar -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Фразеологизмы</text>
</svg>