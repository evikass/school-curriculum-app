<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <radialGradient id="globe1" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
    <linearGradient id="land1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Форма и размеры Земли</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Globe -->
  <rect x="30" y="92" width="140" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="100" cy="170" r="52" fill="url(#globe1)" stroke="#0D47A1" stroke-width="1.5"/>
  <ellipse cx="100" cy="170" rx="52" ry="12" fill="none" stroke="#0D47A1" stroke-width="0.7" stroke-dasharray="3,2"/>
  <line x1="100" y1="118" x2="100" y2="222" stroke="#0D47A1" stroke-width="0.7" stroke-dasharray="3,2"/>
  <ellipse cx="100" cy="170" rx="52" ry="4" fill="none" stroke="#FDD835" stroke-width="1.2"/>
  <path d="M70,140 Q85,130 100,135 Q115,130 125,140" fill="url(#land1)" opacity="0.8"/>
  <path d="M80,170 Q90,160 100,165 Q110,160 120,170" fill="url(#land1)" opacity="0.6"/>
  <path d="M75,195 Q85,185 95,190 Q100,188 110,195" fill="url(#land1)" opacity="0.7"/>
  <text x="100" y="245" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Глобус</text>
  <text x="100" y="258" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">R = 6371 км</text>
  <text x="100" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Эллипсоид</text>

  <!-- Card 2: Oblate spheroid diagram -->
  <rect x="180" y="92" width="140" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <ellipse cx="250" cy="170" rx="48" ry="40" fill="#FFF9C4" stroke="#E65100" stroke-width="1.5"/>
  <line x1="250" y1="130" x2="250" y2="210" stroke="#E65100" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="202" y1="170" x2="298" y2="170" stroke="#E65100" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Axis exaggeration -->
  <text x="255" y="128" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">полярная ось</text>
  <text x="300" y="175" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">экватор</text>
  <!-- Dimension arrows -->
  <line x1="202" y1="150" x2="202" y2="146" stroke="#C62828" stroke-width="1"/>
  <line x1="298" y1="150" x2="298" y2="146" stroke="#C62828" stroke-width="1"/>
  <line x1="202" y1="148" x2="298" y2="148" stroke="#C62828" stroke-width="0.8"/>
  <text x="250" y="144" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">12 756 км</text>
  <line x1="240" y1="130" x2="236" y2="130" stroke="#1565C0" stroke-width="1"/>
  <line x1="240" y1="210" x2="236" y2="210" stroke="#1565C0" stroke-width="1"/>
  <line x1="238" y1="130" x2="238" y2="210" stroke="#1565C0" stroke-width="0.8"/>
  <text x="228" y="175" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" transform="rotate(-90,228,175)">12 714 км</text>
  <text x="250" y="232" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Сплюснутость</text>
  <text x="250" y="245" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">1/298 от полярной оси</text>
  <text x="250" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Разница: 42 км</text>

  <!-- Card 3: Eratosthenes measurement -->
  <rect x="330" y="92" width="140" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Arc of Earth surface -->
  <path d="M350,200 Q400,105 460,200" fill="none" stroke="#795548" stroke-width="2.5"/>
  <!-- Dots for cities -->
  <circle cx="365" cy="190" r="3" fill="#C62828"/>
  <circle cx="445" cy="190" r="3" fill="#C62828"/>
  <!-- Vertical obelisks -->
  <line x1="365" y1="150" x2="365" y2="190" stroke="#4E342E" stroke-width="2"/>
  <line x1="445" y1="160" x2="445" y2="190" stroke="#4E342E" stroke-width="2"/>
  <!-- Sun rays -->
  <line x1="340" y1="120" x2="365" y2="150" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="350" y1="118" x2="365" y2="150" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="420" y1="118" x2="445" y2="160" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="440" y1="120" x2="445" y2="160" stroke="#F9A825" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Angle arc -->
  <path d="M445,170 A10,10 0 0,0 440,162" fill="none" stroke="#E65100" stroke-width="1"/>
  <text x="453" y="167" font-family="Arial,sans-serif" font-size="7" fill="#E65100">7.2</text>
  <!-- Labels -->
  <text x="365" y="208" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Александрия</text>
  <text x="445" y="208" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Сиена</text>
  <text x="400" y="232" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Эратосфен</text>
  <text x="400" y="245" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Измерение окружности</text>
  <text x="400" y="258" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Земли в III в. до н.э.</text>
  <text x="400" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Угол: 7,2 градуса</text>

  <!-- Stats bar -->
  <rect x="30" y="298" width="440" height="3" rx="1" fill="#E0E0E0" opacity="0.5"/>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Форма и размеры Земли</text>
</svg>