<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Строение атмосферы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main atmosphere layers diagram -->
  <rect x="30" y="92" width="310" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Ground -->
  <rect x="40" y="255" width="290" height="30" rx="2" fill="#8D6E63" opacity="0.15"/>
  <rect x="40" y="255" width="290" height="3" rx="1" fill="#5D4037" opacity="0.4"/>
  <!-- Mountain silhouette -->
  <polygon points="40,255 80,220 120,255" fill="#A5D6A7" opacity="0.3"/>
  <polygon points="100,255 150,200 200,255" fill="#81C784" opacity="0.3"/>
  <polygon points="180,255 230,215 280,255" fill="#A5D6A7" opacity="0.3"/>

  <!-- Troposphere 0-12km -->
  <rect x="45" y="195" width="280" height="60" fill="#E3F2FD" opacity="0.4"/>
  <line x1="45" y1="195" x2="325" y2="195" stroke="#1565C0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="55" y="228" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" font-weight="bold">Тропосфера</text>
  <text x="55" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555">0 - 12 км</text>
  <!-- Clouds in troposphere -->
  <ellipse cx="130" cy="215" rx="18" ry="8" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
  <ellipse cx="142" cy="212" rx="12" ry="7" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
  <ellipse cx="250" cy="225" rx="15" ry="7" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Rain drops -->
  <line x1="135" y1="224" x2="134" y2="232" stroke="#42A5F5" stroke-width="1"/>
  <line x1="140" y1="225" x2="139" y2="233" stroke="#42A5F5" stroke-width="1"/>
  <line x1="148" y1="223" x2="147" y2="231" stroke="#42A5F5" stroke-width="1"/>

  <!-- Stratosphere 12-50km -->
  <rect x="45" y="145" width="280" height="50" fill="#E8EAF6" opacity="0.4"/>
  <line x1="45" y1="145" x2="325" y2="145" stroke="#3949AB" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="55" y="172" font-family="Arial,sans-serif" font-size="9" fill="#3949AB" font-weight="bold">Стратосфера</text>
  <text x="55" y="183" font-family="Arial,sans-serif" font-size="7" fill="#555">12 - 50 км</text>
  <!-- Ozone layer -->
  <rect x="120" y="152" width="80" height="6" rx="3" fill="#FDD835" opacity="0.5"/>
  <text x="160" y="157" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">озоновый слой</text>
  <!-- Weather balloon -->
  <ellipse cx="280" cy="160" rx="8" ry="10" fill="white" stroke="#757575" stroke-width="0.8"/>
  <line x1="280" y1="170" x2="280" y2="185" stroke="#757575" stroke-width="0.5"/>
  <rect x="275" y="185" width="10" height="6" rx="1" fill="#BDBDBD" stroke="#757575" stroke-width="0.5"/>

  <!-- Mesosphere 50-80km -->
  <rect x="45" y="110" width="280" height="35" fill="#F3E5F5" opacity="0.3"/>
  <line x1="45" y1="110" x2="325" y2="110" stroke="#7B1FA2" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="55" y="128" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" font-weight="bold">Мезосфера</text>
  <text x="55" y="138" font-family="Arial,sans-serif" font-size="7" fill="#555">50 - 80 км</text>
  <!-- Shooting star -->
  <path d="M200,115 L220,118" stroke="#FDD835" stroke-width="1.5"/>
  <polygon points="220,118 215,116 217,120" fill="#FDD835"/>
  <text x="225" y="118" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2">метеоры</text>

  <!-- Thermosphere 80-500km -->
  <rect x="45" y="92" width="280" height="18" fill="#FCE4EC" opacity="0.3"/>
  <text x="55" y="105" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Термосфера</text>
  <text x="155" y="105" font-family="Arial,sans-serif" font-size="7" fill="#555">80 - 500+ км</text>

  <!-- Right side: Key facts card -->
  <rect x="350" y="92" width="120" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="350" y="92" width="120" height="4" rx="2" fill="#3949AB"/>

  <text x="410" y="115" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Состав воздуха</text>

  <!-- Nitrogen -->
  <rect x="360" y="122" width="100" height="22" rx="3" fill="#E3F2FD"/>
  <rect x="360" y="122" width="78" height="22" rx="3" fill="#1565C0" opacity="0.2"/>
  <text x="410" y="136" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Азот 78%</text>

  <!-- Oxygen -->
  <rect x="360" y="148" width="100" height="22" rx="3" fill="#E8F5E9"/>
  <rect x="360" y="148" width="21" height="22" rx="3" fill="#2E7D32" opacity="0.2"/>
  <text x="410" y="162" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Кислород 21%</text>

  <!-- Other gases -->
  <rect x="360" y="174" width="100" height="22" rx="3" fill="#FFF9C4"/>
  <text x="410" y="188" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Прочие 1%</text>

  <!-- Altitude note -->
  <text x="410" y="215" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Погода формируется</text>
  <text x="410" y="226" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">в тропосфере</text>

  <!-- Pressure info -->
  <text x="410" y="248" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Давление падает</text>
  <text x="410" y="259" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">с высотой</text>
  <!-- Arrow showing decreasing pressure -->
  <line x1="385" y1="240" x2="385" y2="270" stroke="#999" stroke-width="1"/>
  <polygon points="385,270 382,265 388,265" fill="#999"/>
  <text x="375" y="260" font-family="Arial,sans-serif" font-size="6" fill="#999">P</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Строение атмосферы</text>
</svg>