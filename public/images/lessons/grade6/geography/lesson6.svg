<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="river6" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="glacier6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Воды суши</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: River system -->
  <rect x="30" y="92" width="145" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Mountains source -->
  <polygon points="55,115 70,130 85,115" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <polygon points="65,110 78,128 90,112" fill="#A1887F" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Snow caps -->
  <polygon points="65,110 70,115 60,115" fill="white"/>
  <polygon points="75,112 78,116 72,115" fill="white"/>
  <text x="75" y="140" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle">исток</text>
  <!-- Main river -->
  <path d="M72,130 Q75,145 80,150 Q90,158 95,168 Q100,178 105,190 Q110,200 115,210 Q125,225 140,235" fill="none" stroke="url(#river6)" stroke-width="3" stroke-linecap="round"/>
  <!-- Tributaries -->
  <path d="M60,160 Q70,162 80,158" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M120,155 Q110,165 100,170" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M130,190 Q120,195 110,198" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-linecap="round"/>
  <text x="55" y="158" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">приток</text>
  <!-- River mouth / delta -->
  <path d="M140,235 Q148,232 155,228 Q148,238 140,240" fill="#1565C0" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
  <path d="M140,235 Q148,238 155,242 Q148,240 140,240" fill="#1565C0" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
  <text x="150" y="248" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle">устье</text>
  <text x="102" y="275" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Речная система</text>

  <!-- Card 2: Lake and groundwater -->
  <rect x="185" y="92" width="145" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Ground line -->
  <line x1="195" y1="200" x2="320" y2="200" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Ground fill -->
  <rect x="195" y="200" width="125" height="80" rx="0" fill="#EFEBE9" opacity="0.5"/>
  <!-- Lake -->
  <ellipse cx="260" cy="175" rx="35" ry="20" fill="#42A5F5" opacity="0.5" stroke="#1565C0" stroke-width="1"/>
  <ellipse cx="260" cy="173" rx="33" ry="18" fill="#64B5F6" opacity="0.4"/>
  <text x="260" y="180" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle">Озеро</text>
  <!-- Groundwater -->
  <path d="M200,220 Q215,215 230,220 Q250,225 270,218 Q290,212 310,220" fill="none" stroke="#42A5F5" stroke-width="2"/>
  <path d="M200,225 Q215,220 230,225 Q250,230 270,223 Q290,217 310,225" fill="none" stroke="#42A5F5" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Water drops in ground -->
  <circle cx="215" cy="240" r="2" fill="#42A5F5" opacity="0.6"/>
  <circle cx="250" cy="245" r="2" fill="#42A5F5" opacity="0.6"/>
  <circle cx="285" cy="238" r="2" fill="#42A5F5" opacity="0.6"/>
  <!-- Arrow from lake down -->
  <line x1="260" y1="195" x2="260" y2="215" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="2,2"/>
  <polygon points="260,215 257,210 263,210" fill="#1565C0"/>
  <text x="220" y="215" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">грунтовые воды</text>
  <!-- Spring -->
  <path d="M200,200 Q195,195 200,192" fill="none" stroke="#42A5F5" stroke-width="1.5"/>
  <circle cx="198" cy="190" r="2" fill="#42A5F5"/>
  <text x="190" y="188" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">родник</text>
  <text x="257" y="275" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Озёра и подземные воды</text>

  <!-- Card 3: Glacier -->
  <rect x="340" y="92" width="130" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Mountain -->
  <polygon points="370,105 405,195 335,195" fill="url(#glacier6)" stroke="#1565C0" stroke-width="0.8"/>
  <!-- Glacier on mountain -->
  <path d="M365,120 Q375,108 385,118 Q395,112 405,130 L400,145 Q385,138 375,142 Q365,138 360,145 Z" fill="white" stroke="#90CAF9" stroke-width="0.8"/>
  <!-- Glacier flowing down -->
  <path d="M360,145 Q358,160 362,175 Q365,185 370,195" fill="none" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <path d="M360,145 Q358,160 362,175 Q365,185 370,195" fill="none" stroke="#90CAF9" stroke-width="6" stroke-linecap="round"/>
  <!-- Moraine dots -->
  <circle cx="368" cy="180" r="2" fill="#8D6E63" opacity="0.6"/>
  <circle cx="372" cy="185" r="1.5" fill="#8D6E63" opacity="0.6"/>
  <circle cx="365" cy="188" r="1.5" fill="#8D6E63" opacity="0.6"/>
  <!-- Snowflakes -->
  <text x="385" y="130" font-family="Arial,sans-serif" font-size="10" fill="#90CAF9">* *</text>
  <text x="390" y="140" font-family="Arial,sans-serif" font-size="8" fill="#90CAF9"> *</text>
  <!-- Labels -->
  <text x="415" y="145" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">ледник</text>
  <text x="415" y="170" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">морена</text>
  <text x="405" y="275" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Ледники</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Воды суши</text>
</svg>