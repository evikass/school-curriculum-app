<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Природные зоны</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Large natural zones map diagram -->
  <rect x="30" y="92" width="440" height="120" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Zone 1: Arctic / Ice zone -->
  <rect x="35" y="97" width="430" height="18" rx="2" fill="#E3F2FD"/>
  <rect x="35" y="97" width="430" height="18" rx="2" fill="white" opacity="0.3"/>
  <text x="50" y="110" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold">Арктические пустыни</text>
  <!-- Ice/snow icons -->
  <text x="180" y="108" font-family="Arial,sans-serif" font-size="7" fill="#90CAF9">* * * *</text>
  <text x="310" y="108" font-family="Arial,sans-serif" font-size="7" fill="#90CAF9">* * * *</text>

  <!-- Zone 2: Tundra -->
  <rect x="35" y="115" width="430" height="20" rx="2" fill="#C5CAE9" opacity="0.5"/>
  <text x="50" y="129" font-family="Arial,sans-serif" font-size="8" fill="#3949AB" font-weight="bold">Тундра</text>
  <!-- Tundra plants -->
  <path d="M180,132 L182,126 L184,132" fill="none" stroke="#7986CB" stroke-width="0.8"/>
  <path d="M195,132 L197,127 L199,132" fill="none" stroke="#7986CB" stroke-width="0.8"/>
  <path d="M310,132 L312,125 L314,132" fill="none" stroke="#7986CB" stroke-width="0.8"/>
  <path d="M325,132 L327,128 L329,132" fill="none" stroke="#7986CB" stroke-width="0.8"/>

  <!-- Zone 3: Taiga (Forest) -->
  <rect x="35" y="135" width="430" height="22" rx="2" fill="#66BB6A" opacity="0.4"/>
  <text x="50" y="150" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold">Тайга</text>
  <!-- Tree icons -->
  <polygon points="180,148 183,140 186,148" fill="#388E3C"/>
  <polygon points="192,148 195,139 198,148" fill="#2E7D32"/>
  <polygon points="204,148 207,141 210,148" fill="#388E3C"/>
  <polygon points="310,148 313,140 316,148" fill="#2E7D32"/>
  <polygon points="322,148 325,139 328,148" fill="#388E3C"/>
  <polygon points="334,148 337,141 340,148" fill="#2E7D32"/>

  <!-- Zone 4: Mixed forest -->
  <rect x="35" y="157" width="430" height="20" rx="2" fill="#A5D6A7" opacity="0.4"/>
  <text x="50" y="171" font-family="Arial,sans-serif" font-size="8" fill="#388E3C" font-weight="bold">Смешанные и широколиственные леса</text>
  <circle cx="220" cy="166" r="6" fill="#66BB6A"/>
  <circle cx="240" cy="164" r="7" fill="#81C784"/>
  <circle cx="350" cy="166" r="6" fill="#66BB6A"/>
  <circle cx="370" cy="164" r="7" fill="#81C784"/>

  <!-- Zone 5: Steppe -->
  <rect x="35" y="177" width="430" height="18" rx="2" fill="#F1F8E9"/>
  <text x="50" y="190" font-family="Arial,sans-serif" font-size="8" fill="#689F38" font-weight="bold">Степь</text>
  <path d="M180,192 Q182,185 184,192" fill="#81C784" stroke="none"/>
  <path d="M190,192 Q192,186 194,192" fill="#A5D6A7" stroke="none"/>
  <path d="M310,192 Q312,185 314,192" fill="#81C784" stroke="none"/>
  <path d="M320,192 Q322,186 324,192" fill="#A5D6A7" stroke="none"/>

  <!-- Zone 6: Desert -->
  <rect x="35" y="195" width="430" height="14" rx="2" fill="#FFF9C4" opacity="0.6"/>
  <text x="50" y="206" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">Пустыня</text>
  <!-- Cactus icons -->
  <line x1="180" y1="206" x2="180" y2="200" stroke="#689F38" stroke-width="1.5"/>
  <line x1="177" y1="203" x2="174" y2="201" stroke="#689F38" stroke-width="1"/>
  <line x1="183" y1="203" x2="186" y2="201" stroke="#689F38" stroke-width="1"/>
  <line x1="310" y1="206" x2="310" y2="200" stroke="#689F38" stroke-width="1.5"/>
  <line x1="307" y1="203" x2="304" y2="201" stroke="#689F38" stroke-width="1"/>
  <line x1="313" y1="203" x2="316" y2="201" stroke="#689F38" stroke-width="1"/>

  <!-- Temperature/latitude side labels -->
  <text x="37" y="100" font-family="Arial,sans-serif" font-size="6" fill="#C62828">-30 C</text>
  <text x="37" y="135" font-family="Arial,sans-serif" font-size="6" fill="#F9A825">+15 C</text>
  <text x="37" y="170" font-family="Arial,sans-serif" font-size="6" fill="#EF5350">+20 C</text>
  <text x="37" y="205" font-family="Arial,sans-serif" font-size="6" fill="#C62828">+35 C</text>

  <!-- Bottom cards: Zone characteristics -->
  <!-- Card 1: Tundra -->
  <rect x="30" y="220" width="105" height="78" rx="5" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="30" y="220" width="105" height="4" rx="2" fill="#7986CB"/>
  <rect x="30" y="224" width="105" height="74" rx="0" fill="#E8EAF6" opacity="0.3"/>
  <text x="82" y="238" font-family="Arial,sans-serif" font-size="9" fill="#3949AB" text-anchor="middle" font-weight="bold">Тундра</text>
  <text x="82" y="252" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Олени, мхи, лишайники</text>
  <text x="82" y="264" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Многолетняя мерзлота</text>
  <text x="82" y="276" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Зима длинная, лето</text>
  <text x="82" y="288" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">короткое и прохладное</text>

  <!-- Card 2: Taiga -->
  <rect x="142" y="220" width="105" height="78" rx="5" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="142" y="220" width="105" height="4" rx="2" fill="#2E7D32"/>
  <rect x="142" y="224" width="105" height="74" rx="0" fill="#E8F5E9" opacity="0.3"/>
  <text x="194" y="238" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Тайга</text>
  <text x="194" y="252" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Хвойные леса</text>
  <text x="194" y="264" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ель, сосна, пихта</text>
  <text x="194" y="276" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Лиса, волк, медведь,</text>
  <text x="194" y="288" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">заяц, белка</text>

  <!-- Card 3: Steppe -->
  <rect x="254" y="220" width="105" height="78" rx="5" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="254" y="220" width="105" height="4" rx="2" fill="#F9A825"/>
  <rect x="254" y="224" width="105" height="74" rx="0" fill="#FFF9C4" opacity="0.2"/>
  <text x="306" y="238" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Степь</text>
  <text x="306" y="252" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Травянистая растительность</text>
  <text x="306" y="264" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Тысячецветник, ковыль</text>
  <text x="306" y="276" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Суслик, степной орёл,</text>
  <text x="306" y="288" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">дрофа</text>

  <!-- Card 4: Tropical -->
  <rect x="366" y="220" width="104" height="78" rx="5" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="366" y="220" width="104" height="4" rx="2" fill="#1B5E20"/>
  <rect x="366" y="224" width="104" height="74" rx="0" fill="#E8F5E9" opacity="0.3"/>
  <text x="418" y="238" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Тропический лес</text>
  <text x="418" y="252" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Многоярусные леса</text>
  <text x="418" y="264" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Банан, пальма, лианы</text>
  <text x="418" y="276" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Обезьяны, попугаи,</text>
  <text x="418" y="288" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">тигры, змеи</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Природные зоны</text>
</svg>