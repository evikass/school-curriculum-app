<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Ветер и атмосферные осадки</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Wind diagram -->
  <rect x="30" y="92" width="155" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="107" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Образование ветра</text>
  <!-- High pressure area -->
  <ellipse cx="60" cy="160" rx="22" ry="22" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
  <text x="60" y="157" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">В</text>
  <text x="60" y="168" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">высокое</text>
  <!-- Low pressure area -->
  <ellipse cx="155" cy="160" rx="22" ry="22" fill="#BBDEFB" stroke="#42A5F5" stroke-width="1"/>
  <text x="155" y="157" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Н</text>
  <text x="155" y="168" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">низкое</text>
  <!-- Wind arrows -->
  <line x1="85" y1="152" x2="130" y2="152" stroke="#F9A825" stroke-width="2"/>
  <polygon points="130,152 123,148 124,156" fill="#F9A825"/>
  <line x1="85" y1="165" x2="130" y2="165" stroke="#F9A825" stroke-width="2"/>
  <polygon points="130,165 123,161 124,169" fill="#F9A825"/>
  <line x1="88" y1="143" x2="127" y2="143" stroke="#F9A825" stroke-width="1.5"/>
  <polygon points="127,143 121,140 121,147" fill="#F9A825"/>
  <line x1="88" y1="175" x2="127" y2="175" stroke="#F9A825" stroke-width="1.5"/>
  <polygon points="127,175 121,172 121,179" fill="#F9A825"/>
  <text x="107" y="200" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Ветер - движение воздуха</text>
  <text x="107" y="212" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">из зоны высокого в зону</text>
  <text x="107" y="224" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">низкого давления</text>
  <!-- Compass rose small -->
  <circle cx="107" cy="255" r="15" fill="none" stroke="#999" stroke-width="0.5"/>
  <text x="107" y="244" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">С</text>
  <text x="107" y="270" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Ю</text>
  <text x="94" y="258" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">З</text>
  <text x="120" y="258" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">В</text>
  <line x1="107" y1="246" x2="107" y2="264" stroke="#999" stroke-width="0.5"/>
  <line x1="95" y1="255" x2="119" y2="255" stroke="#999" stroke-width="0.5"/>

  <!-- Card 2: Cloud formation -->
  <rect x="195" y="92" width="145" height="115" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="267" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Образование облаков</text>
  <!-- Water surface -->
  <rect x="205" y="175" width="125" height="25" rx="3" fill="#42A5F5" opacity="0.2"/>
  <path d="M205,178 Q220,175 235,178 Q250,175 265,178 Q280,175 330,178" fill="none" stroke="#42A5F5" stroke-width="1"/>
  <!-- Evaporation arrows -->
  <line x1="225" y1="175" x2="222" y2="155" stroke="#42A5F5" stroke-width="1"/>
  <polygon points="222,155 219,161 225,161" fill="#42A5F5"/>
  <line x1="255" y1="175" x2="258" y2="150" stroke="#42A5F5" stroke-width="1"/>
  <polygon points="258,150 255,156 261,156" fill="#42A5F5"/>
  <line x1="290" y1="175" x2="287" y2="155" stroke="#42A5F5" stroke-width="1"/>
  <polygon points="287,155 284,161 290,161" fill="#42A5F5"/>
  <text x="220" y="150" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">испарение</text>
  <!-- Cloud -->
  <ellipse cx="267" cy="138" rx="25" ry="14" fill="white" stroke="#BDBDBD" stroke-width="1"/>
  <ellipse cx="255" cy="135" rx="16" ry="12" fill="white" stroke="#BDBDBD" stroke-width="0.8"/>
  <ellipse cx="280" cy="136" rx="14" ry="10" fill="white" stroke="#BDBDBD" stroke-width="0.8"/>
  <text x="267" y="168" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">конденсация</text>
  <!-- Rain -->
  <line x1="258" y1="152" x2="256" y2="170" stroke="#42A5F5" stroke-width="1"/>
  <line x1="267" y1="152" x2="265" y2="168" stroke="#42A5F5" stroke-width="1"/>
  <line x1="276" y1="152" x2="274" y2="170" stroke="#42A5F5" stroke-width="1"/>
  <text x="278" y="150" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">осадки</text>

  <!-- Card 3: Types of precipitation -->
  <rect x="195" y="215" width="145" height="77" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="195" y="215" width="145" height="4" rx="2" fill="#42A5F5"/>
  <text x="267" y="233" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Виды осадков</text>
  <!-- Rain icon -->
  <ellipse cx="218" cy="250" rx="10" ry="6" fill="#B3E5FC"/>
  <line x1="215" y1="257" x2="214" y2="265" stroke="#42A5F5" stroke-width="1.5"/>
  <line x1="221" y1="257" x2="220" y2="265" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="218" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Дождь</text>
  <!-- Snow icon -->
  <ellipse cx="267" cy="250" rx="10" ry="6" fill="#E3F2FD"/>
  <text x="264" y="264" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">*</text>
  <text x="269" y="268" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">*</text>
  <text x="267" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Снег</text>
  <!-- Hail icon -->
  <ellipse cx="316" cy="250" rx="10" ry="6" fill="#BBDEFB"/>
  <circle cx="313" cy="261" r="2.5" fill="#90CAF9" stroke="#42A5F5" stroke-width="0.5"/>
  <circle cx="319" cy="264" r="2" fill="#90CAF9" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="316" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Град</text>

  <!-- Card 4: Barometer -->
  <rect x="350" y="92" width="120" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <text x="410" y="108" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Барометр</text>
  <!-- Barometer body -->
  <circle cx="410" cy="175" r="48" fill="#FFF9C4" stroke="#795548" stroke-width="2"/>
  <circle cx="410" cy="175" r="45" fill="#FFFDE7" stroke="#A1887F" stroke-width="1"/>
  <!-- Scale marks -->
  <line x1="410" y1="130" x2="410" y2="136" stroke="#999" stroke-width="1"/>
  <line x1="410" y1="214" x2="410" y2="220" stroke="#999" stroke-width="1"/>
  <line x1="365" y1="175" x2="371" y2="175" stroke="#999" stroke-width="1"/>
  <line x1="449" y1="175" x2="455" y2="175" stroke="#999" stroke-width="1"/>
  <!-- Labels -->
  <text x="410" y="128" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Низкое</text>
  <text x="410" y="228" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Высокое</text>
  <text x="362" y="178" font-family="Arial,sans-serif" font-size="6" fill="#999" text-anchor="end">740</text>
  <text x="458" y="178" font-family="Arial,sans-serif" font-size="6" fill="#999">800</text>
  <text x="403" y="118" font-family="Arial,sans-serif" font-size="6" fill="#999">мм рт. ст.</text>
  <!-- Needle -->
  <line x1="410" y1="175" x2="395" y2="148" stroke="#C62828" stroke-width="2"/>
  <circle cx="410" cy="175" r="4" fill="#C62828"/>
  <circle cx="410" cy="175" r="2" fill="white"/>
  <!-- Reading -->
  <text x="410" y="250" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Давление воздуха</text>
  <text x="410" y="262" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">760 мм рт. ст. - норма</text>
  <text x="410" y="274" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Ветер - из В в Н</text>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Ветер и атмосферные осадки</text>
</svg>