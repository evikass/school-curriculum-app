<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <radialGradient id="sun3" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="60%" stop-color="#FFD600"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <radialGradient id="earth3" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Времена года и пояса освещённости</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">География - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Earth tilt diagram -->
  <rect x="30" y="92" width="145" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Earth -->
  <circle cx="102" cy="165" r="42" fill="url(#earth3)" stroke="#0D47A1" stroke-width="1.2"/>
  <!-- Equator -->
  <ellipse cx="102" cy="165" rx="42" ry="10" fill="none" stroke="#FDD835" stroke-width="1.2"/>
  <!-- Axis tilted 23.5 degrees -->
  <line x1="118" y1="120" x2="86" y2="210" stroke="#C62828" stroke-width="2"/>
  <circle cx="118" cy="120" r="2" fill="#C62828"/>
  <circle cx="86" cy="210" r="2" fill="#C62828"/>
  <!-- Vertical reference -->
  <line x1="102" y1="118" x2="102" y2="212" stroke="#999" stroke-width="0.8" stroke-dasharray="3,3"/>
  <!-- Angle arc -->
  <path d="M102,125 A8,8 0 0,0 106,121" fill="none" stroke="#E65100" stroke-width="1.2"/>
  <text x="112" y="128" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">23,5</text>
  <!-- Sun rays -->
  <circle cx="35" cy="120" r="14" fill="url(#sun3)"/>
  <line x1="50" y1="120" x2="62" y2="135" stroke="#F9A825" stroke-width="0.8"/>
  <line x1="50" y1="128" x2="62" y2="140" stroke="#F9A825" stroke-width="0.8"/>
  <text x="102" y="245" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Наклон оси</text>
  <text x="102" y="258" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">23,5 градуса</text>
  <text x="102" y="270" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">к плоскости орбиты</text>

  <!-- Card 2: Four seasons -->
  <rect x="185" y="92" width="140" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Spring -->
  <circle cx="215" cy="130" r="22" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <path d="M215,110 L217,120 L215,118 L213,120 Z" fill="#66BB6A"/>
  <path d="M207,125 Q215,115 223,125" fill="none" stroke="#66BB6A" stroke-width="1"/>
  <text x="215" y="160" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Весна</text>
  <!-- Summer -->
  <circle cx="290" cy="130" r="22" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <circle cx="290" cy="120" r="8" fill="#FDD835" opacity="0.6"/>
  <line x1="290" y1="112" x2="290" y2="108" stroke="#F9A825" stroke-width="1"/>
  <line x1="282" y1="120" x2="278" y2="120" stroke="#F9A825" stroke-width="1"/>
  <line x1="298" y1="120" x2="302" y2="120" stroke="#F9A825" stroke-width="1"/>
  <text x="290" y="160" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Лето</text>
  <!-- Autumn -->
  <circle cx="215" cy="210" r="22" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1"/>
  <path d="M210,200 L215,190 L220,200" fill="none" stroke="#FF8F00" stroke-width="1"/>
  <path d="M212,200 L215,193 L218,200" fill="#EF6C00" opacity="0.5"/>
  <text x="215" y="240" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Осень</text>
  <!-- Winter -->
  <circle cx="290" cy="210" r="22" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1"/>
  <path d="M283,220 L290,200 L297,220 Z" fill="none" stroke="#1565C0" stroke-width="1"/>
  <line x1="290" y1="200" x2="290" y2="195" stroke="#1565C0" stroke-width="1"/>
  <text x="290" y="240" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Зима</text>
  <!-- Orbit arrows -->
  <path d="M240,100 A70,70 0 0,1 310,100" fill="none" stroke="#999" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="255" y="270" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Времена года</text>

  <!-- Card 3: Illumination zones -->
  <rect x="335" y="92" width="135" height="200" rx="6" fill="white" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Simplified Earth half -->
  <path d="M360,120 A50,65 0 0,1 360,250" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <line x1="360" y1="120" x2="360" y2="250" stroke="#1565C0" stroke-width="1"/>
  <!-- Tropical zone -->
  <rect x="360" y="165" width="30" height="40" fill="#FFF9C4" opacity="0.8"/>
  <text x="390" y="183" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Тропический</text>
  <text x="390" y="193" font-family="Arial,sans-serif" font-size="7" fill="#E65100">0 - 23,5</text>
  <!-- Temperate zones -->
  <rect x="360" y="135" width="25" height="30" fill="#C8E6C9" opacity="0.7"/>
  <text x="385" y="152" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Умеренный</text>
  <rect x="360" y="205" width="25" height="30" fill="#C8E6C9" opacity="0.7"/>
  <text x="385" y="222" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Умеренный</text>
  <!-- Polar zones -->
  <rect x="360" y="120" width="20" height="15" fill="#BBDEFB" opacity="0.8"/>
  <text x="382" y="132" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Полярный</text>
  <rect x="360" y="235" width="20" height="15" fill="#BBDEFB" opacity="0.8"/>
  <text x="382" y="247" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Полярный</text>
  <!-- Boundary lines -->
  <line x1="358" y1="135" x2="390" y2="135" stroke="#E65100" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="358" y1="205" x2="390" y2="205" stroke="#E65100" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="358" y1="250" x2="390" y2="250" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="402" y="270" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle" font-weight="bold">Пояса</text>

  <!-- Stats bar -->
  <rect x="30" y="298" width="440" height="3" rx="1" fill="#E0E0E0" opacity="0.5"/>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Времена года и пояса освещённости</text>
</svg>