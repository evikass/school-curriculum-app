<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus geometric corner accents -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles top -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Древнерусское искусство</text>
  <text x="250" y="66" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">ИЗО - Урок 7</text>
  <line x1="30" y1="76" x2="470" y2="76" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <!-- Bauhaus stripe accent -->
  <rect x="30" y="73" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="73" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Icon -->
  <rect x="35" y="92" width="140" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <!-- Icon board shape -->
  <rect x="60" y="105" width="90" height="120" rx="3" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
  <!-- Gold background -->
  <rect x="65" y="110" width="80" height="110" rx="2" fill="#FDD835" opacity="0.6"/>
  <!-- Central figure silhouette -->
  <ellipse cx="105" cy="175" rx="12" ry="18" fill="#5D4037" opacity="0.5"/>
  <circle cx="105" cy="152" r="9" fill="#FFCC80"/>
  <!-- Halo -->
  <circle cx="105" cy="152" r="14" fill="none" stroke="#FDD835" stroke-width="1.5"/>
  <!-- Hands raised -->
  <line x1="95" y1="170" x2="85" y2="160" stroke="#FFCC80" stroke-width="2" stroke-linecap="round"/>
  <line x1="115" y1="170" x2="125" y2="160" stroke="#FFCC80" stroke-width="2" stroke-linecap="round"/>
  <!-- Decorative border on icon -->
  <rect x="68" y="113" width="74" height="104" rx="1" fill="none" stroke="#F57F17" stroke-width="1" opacity="0.5"/>
  <!-- Red border -->
  <rect x="60" y="105" width="90" height="120" rx="3" fill="none" stroke="#C62828" stroke-width="1"/>
  <!-- Top ornament -->
  <path d="M85,228 Q105,222 125,228" stroke="#C62828" stroke-width="1" fill="none"/>
  <text x="105" y="248" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold" text-anchor="middle">ИКОНА</text>
  <text x="105" y="260" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">Золотой фон</text>
  <text x="105" y="270" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">Обратная перспектива</text>
  <text x="105" y="280" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">Условность</text>

  <!-- Architecture -->
  <rect x="185" y="92" width="140" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <!-- Church on Nerl simplified -->
  <rect x="220" y="140" width="30" height="40" rx="0" fill="#FAFAFA" stroke="#90A4AE" stroke-width="1"/>
  <!-- Dome -->
  <path d="M220,140 Q225,110 235,105 Q245,110 250,140" fill="#43A047" stroke="#2E7D32" stroke-width="1"/>
  <!-- Cross -->
  <line x1="235" y1="98" x2="235" y2="108" stroke="#FDD835" stroke-width="1.5"/>
  <line x1="231" y1="101" x2="239" y2="101" stroke="#FDD835" stroke-width="1.5"/>
  <!-- Windows -->
  <rect x="228" y="150" width="6" height="12" rx="3 3 0 0" fill="#90CAF9" stroke="#64B5F6" stroke-width="0.5"/>
  <rect x="236" y="150" width="6" height="12" rx="3 3 0 0" fill="#90CAF9" stroke="#64B5F6" stroke-width="0.5"/>
  <!-- Door -->
  <rect x="230" y="168" width="10" height="12" rx="5 5 0 0" fill="#5D4037"/>
  <!-- Ground -->
  <rect x="210" y="180" width="50" height="5" rx="0" fill="#C8E6C9" opacity="0.5"/>
  <!-- Reflection in water -->
  <rect x="210" y="185" width="50" height="3" rx="0" fill="#90CAF9" opacity="0.3"/>
  <text x="255" y="145" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">ХРАМ</text>
  <text x="255" y="165" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Покрова</text>
  <text x="255" y="176" font-family="Arial,sans-serif" font-size="6" fill="#555">на Нерли</text>

  <!-- Rublev Trinity simplified -->
  <rect x="185" y="200" width="140" height="92" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <!-- Three angel figures -->
  <!-- Left angel -->
  <ellipse cx="220" cy="255" rx="8" ry="14" fill="#FDD835" opacity="0.3"/>
  <circle cx="220" cy="238" r="6" fill="#FFCC80"/>
  <path d="M210,232 Q215,226 220,224 Q225,226 230,232" fill="#FDD835" opacity="0.4"/>
  <!-- Middle angel -->
  <ellipse cx="255" cy="250" rx="8" ry="14" fill="#FDD835" opacity="0.4"/>
  <circle cx="255" cy="233" r="6" fill="#FFCC80"/>
  <path d="M245,227 Q250,221 255,219 Q260,221 265,227" fill="#FDD835" opacity="0.5"/>
  <!-- Right angel -->
  <ellipse cx="290" cy="255" rx="8" ry="14" fill="#FDD835" opacity="0.3"/>
  <circle cx="290" cy="238" r="6" fill="#FFCC80"/>
  <path d="M280,232 Q285,226 290,224 Q295,226 300,232" fill="#FDD835" opacity="0.4"/>
  <!-- Table -->
  <rect x="210" y="265" width="90" height="4" rx="1" fill="#8D6E63" opacity="0.5"/>
  <!-- Cup -->
  <path d="M250,262 L248,268 L262,268 L260,262" fill="#FDD835" opacity="0.3" stroke="#F57F17" stroke-width="0.5"/>
  <!-- Halos -->
  <circle cx="220" cy="238" r="9" fill="none" stroke="#FDD835" stroke-width="0.5"/>
  <circle cx="255" cy="233" r="9" fill="none" stroke="#FDD835" stroke-width="0.5"/>
  <circle cx="290" cy="238" r="9" fill="none" stroke="#FDD835" stroke-width="0.5"/>
  <text x="255" y="286" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Троица А. Рублёва</text>

  <!-- Techniques -->
  <rect x="335" y="92" width="130" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <!-- Fresco -->
  <rect x="350" y="102" width="55" height="40" rx="3" fill="#FFF8E1"/>
  <rect x="355" y="107" width="20" height="15" rx="1" fill="#E53935" opacity="0.4"/>
  <rect x="378" y="107" width="20" height="15" rx="1" fill="#1565C0" opacity="0.4"/>
  <rect x="355" y="125" width="43" height="12" rx="1" fill="#FDD835" opacity="0.3"/>
  <text x="378" y="155" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold" text-anchor="middle">ФРЕСКА</text>
  <text x="378" y="167" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">по сырой штукатурке</text>
  <!-- Mosaic -->
  <rect x="415" y="102" width="42" height="40" rx="3" fill="#FFF8E1"/>
  <rect x="420" y="107" width="5" height="5" fill="#E53935" opacity="0.6"/>
  <rect x="426" y="107" width="5" height="5" fill="#FDD835" opacity="0.6"/>
  <rect x="432" y="107" width="5" height="5" fill="#1565C0" opacity="0.6"/>
  <rect x="438" y="107" width="5" height="5" fill="#43A047" opacity="0.6"/>
  <rect x="420" y="114" width="5" height="5" fill="#FDD835" opacity="0.6"/>
  <rect x="426" y="114" width="5" height="5" fill="#43A047" opacity="0.6"/>
  <rect x="432" y="114" width="5" height="5" fill="#E53935" opacity="0.6"/>
  <rect x="438" y="114" width="5" height="5" fill="#FDD835" opacity="0.6"/>
  <rect x="420" y="121" width="5" height="5" fill="#1565C0" opacity="0.6"/>
  <rect x="426" y="121" width="5" height="5" fill="#E53935" opacity="0.6"/>
  <rect x="432" y="121" width="5" height="5" fill="#FDD835" opacity="0.6"/>
  <rect x="438" y="121" width="5" height="5" fill="#43A047" opacity="0.6"/>
  <rect x="420" y="128" width="5" height="5" fill="#43A047" opacity="0.6"/>
  <rect x="426" y="128" width="5" height="5" fill="#FDD835" opacity="0.6"/>
  <rect x="432" y="128" width="5" height="5" fill="#7B1FA2" opacity="0.6"/>
  <rect x="438" y="128" width="5" height="5" fill="#E53935" opacity="0.6"/>
  <text x="436" y="155" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold" text-anchor="middle">МОЗАИКА</text>
  <text x="436" y="167" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">из смальты</text>

  <!-- Key features -->
  <rect x="350" y="180" width="105" height="10" rx="2" fill="#C62828" opacity="0.1"/>
  <text x="400" y="195" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">ОСОБЕННОСТИ</text>
  <text x="400" y="212" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Плоскостное изображение</text>
  <text x="400" y="225" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Золотой фон - божественный свет</text>
  <text x="400" y="238" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Обратная перспектива</text>
  <text x="400" y="251" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Канон - строгие правила</text>
  <text x="400" y="264" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Символизм цвета</text>
  <!-- Color legend -->
  <circle cx="358" cy="278" r="3" fill="#FDD835"/>
  <text x="365" y="281" font-family="Arial,sans-serif" font-size="5" fill="#777">святость</text>
  <circle cx="398" cy="278" r="3" fill="#E53935"/>
  <text x="405" y="281" font-family="Arial,sans-serif" font-size="5" fill="#777">любовь</text>
  <circle cx="435" cy="278" r="3" fill="#1565C0"/>
  <text x="442" y="281" font-family="Arial,sans-serif" font-size="5" fill="#777">чистота</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Древнерусское искусство</text>
</svg>