  <text x="88" y="178" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">радость, энергия</text>
  <text x="88" y="188" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">огонь, солнце</text>

