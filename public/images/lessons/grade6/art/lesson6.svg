  <rect x="393" y="102" width="60" height="10" rx="3 3 0 0" fill="#C8E6C9"/>
  <rect x="393" y="112" width="60" height="10" fill="#A5D6A7"/>
  <rect x="393" y="122" width="60" height="10" fill="#81C784"/>
  <rect x="393" y="132" width="60" height="10" fill="#A5D6A7"/>
  <rect x="393" y="142" width="60" height="10" rx="0 0 3 3" fill="#C8E6C9"/>
