  <rect x="198" y="208" width="50" height="35" rx="2" fill="#ECEFF1"/>
  <circle cx="238" cy="218" r="5" fill="#B0BEC5" opacity="0.5"/>
  <path d="M198,230 L220,222 L240,230" fill="#546E7A" opacity="0.3"/>
  <rect x="205" y="232" width="35" height="11" rx="0" fill="#37474F" opacity="0.2"/>
  <text x="265" y="222" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">Левитан</text>
  <text x="265" y="233" font-family="Arial,sans-serif" font-size="6" fill="#555">Над вечным покоем</text>
  <text x="265" y="244" font-family="Arial,sans-serif" font-size="6" fill="#777">холодный колорит</text>
  <text x="265" y="255" font-family="Arial,sans-serif" font-size="6" fill="#777">сине-серый</text>

  <rect x="335" y="200" width="130" height="92" rx="6" fill="white" stroke="#F57F17" stroke-width="1.5" opacity="0.9"/>
  <text x="400" y="220" font-family="Arial,sans-serif" font-size="10" fill="#F57F17" font-weight="bold" text-anchor="middle">СВОЙСТВА</text>
  <text x="400" y="235" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Настроение</text>
  <text x="400" y="248" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Эмоции</text>
  <text x="400" y="261" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Время суток</text>
  <text x="400" y="274" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Характер персонажа</text>
  <text x="400" y="287" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Пространство</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Колорит</text>
</svg>