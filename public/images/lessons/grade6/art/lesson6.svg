  <!-- Warm palette -->
  <rect x="35" y="92" width="105" height="100" rx="6" fill="white" stroke="#E53935" stroke-width="1.5" opacity="0.9"/>
  <rect x="48" y="102" width="80" height="50" rx="3" fill="#FFF3E0"/>
