  <circle cx="90" cy="218" r="6" fill="#FFF176" opacity="0.5"/>
  <path d="M48,228 Q60,220 75,225 Q85,228 98,222" fill="#FFB74D" opacity="0.5"/>
  <path d="M55,243 L65,228 L75,243" fill="#E65100" opacity="0.3"/>
  <path d="M70,243 L82,225 L94,243" fill="#BF360C" opacity="0.25"/>
  <text x="115" y="222" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Левитан</text>
  <text x="115" y="233" font-family="Arial,sans-serif" font-size="6" fill="#555">Золотая осень</text>
  <text x="115" y="244" font-family="Arial,sans-serif" font-size="6" fill="#777">тёплый колорит</text>
  <text x="115" y="255" font-family="Arial,sans-serif" font-size="6" fill="#777">оранжево-золотой</text>

  <rect x="185" y="200" width="140" height="92" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
