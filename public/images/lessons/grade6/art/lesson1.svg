<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus geometric corner accents -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles top -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Живопись, графика, скульптура</text>
  <text x="250" y="66" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">ИЗО - Урок 1</text>
  <line x1="30" y1="76" x2="470" y2="76" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <!-- Bauhaus stripe accent -->
  <rect x="30" y="73" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="73" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main illustration area -->
  <!-- Paint tube - Bauhaus style -->
  <rect x="35" y="92" width="200" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <!-- Oil paint tube -->
  <rect x="55" y="105" width="30" height="80" rx="4" fill="#E53935"/>
  <rect x="55" y="95" width="30" height="15" rx="2" fill="#B71C1C"/>
  <rect x="62" y="88" width="16" height="10" rx="1" fill="#888"/>
  <ellipse cx="70" cy="186" rx="8" ry="3" fill="#C62828" opacity="0.3"/>
  <!-- Paint stroke from tube -->
  <path d="M85,165 Q110,150 130,155 Q150,160 160,148" stroke="#E53935" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M85,172 Q115,162 140,165 Q160,168 175,155" stroke="#FF7043" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Pencil - graphics -->
  <rect x="140" y="110" width="7" height="65" rx="1" fill="#FDD835" stroke="#F9A825" stroke-width="0.5"/>
  <polygon points="140,175 147,175 143.5,188" fill="#FFB300"/>
  <rect x="140" y="105" width="7" height="10" rx="1" fill="#E53935"/>
  <!-- Pencil line drawing -->
  <line x1="158" y1="125" x2="185" y2="120" stroke="#333" stroke-width="1.2"/>
  <line x1="185" y1="120" x2="190" y2="140" stroke="#333" stroke-width="1.2"/>
  <line x1="190" y1="140" x2="170" y2="155" stroke="#333" stroke-width="1.2"/>
  <line x1="170" y1="155" x2="158" y2="150" stroke="#333" stroke-width="1.2"/>
  <circle cx="174" cy="137" r="10" fill="none" stroke="#333" stroke-width="1"/>
  <!-- Sculpture bust - simplified geometric -->
  <rect x="60" y="210" width="20" height="5" rx="1" fill="#8D6E63"/>
  <path d="M65,210 L65,195 Q70,185 75,195 L75,210" fill="#BCAAA4" stroke="#8D6E63" stroke-width="1"/>
  <circle cx="70" cy="192" r="5" fill="#D7CCC8"/>
  <rect x="63" y="208" width="14" height="3" rx="1" fill="#8D6E63"/>
  <!-- Labels -->
  <text x="135" y="265" font-family="Arial,sans-serif" font-size="11" fill="#C62828" font-weight="bold" text-anchor="middle">ТРИ ВИДА</text>
  <rect x="100" y="270" width="70" height="14" rx="3" fill="#C62828" opacity="0.12"/>
  <text x="135" y="281" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">живопись графика скульптура</text>

  <!-- Color palette - right side -->
  <rect x="265" y="92" width="200" height="100" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <!-- Palette shape -->
  <ellipse cx="365" cy="142" rx="65" ry="32" fill="#F5DEB3" stroke="#A1887F" stroke-width="1.5"/>
  <!-- Thumb hole -->
  <ellipse cx="340" cy="148" rx="9" ry="7" fill="#FFF8E1" stroke="#A1887F" stroke-width="1"/>
  <!-- Paint blobs -->
  <circle cx="320" cy="125" r="8" fill="#E53935"/>
  <circle cx="340" cy="118" r="8" fill="#1E88E5"/>
  <circle cx="360" cy="118" r="8" fill="#FDD835"/>
  <circle cx="380" cy="125" r="8" fill="#43A047"/>
  <circle cx="395" cy="138" r="7" fill="#FF9800"/>
  <circle cx="320" cy="148" r="6" fill="#8E24AA"/>
  <circle cx="390" cy="152" r="6" fill="#795548"/>
  <circle cx="360" cy="155" r="5" fill="#E0E0E0"/>
  <!-- Mixing streak -->
  <path d="M350,135 Q365,130 375,140" stroke="#FF5722" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Small brush on palette -->
  <line x1="408" y1="115" x2="395" y2="135" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="395" y1="135" x2="392" y2="140" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>

  <!-- Techniques grid -->
  <rect x="265" y="200" width="95" height="92" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <!-- Mini canvas with brush strokes -->
  <rect x="285" y="210" width="50" height="35" rx="2" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.5"/>
  <path d="M290,225 Q300,218 310,222 Q320,228 328,220" stroke="#E53935" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M290,232 Q305,226 315,230 Q325,235 330,228" stroke="#1565C0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="313" y="260" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">Масло</text>
  <text x="313" y="272" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Акварель, Гуашь</text>
  <text x="313" y="282" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Темпера</text>

  <rect x="370" y="200" width="95" height="92" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <!-- Art supplies icons -->
  <!-- Eraser -->
  <rect x="390" y="212" width="20" height="10" rx="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
  <rect x="390" y="218" width="20" height="4" rx="1" fill="#5D4037"/>
  <!-- Ruler -->
  <rect x="420" y="210" width="6" height="30" rx="1" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="420" y1="215" x2="424" y2="215" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="420" y1="220" x2="424" y2="220" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="420" y1="225" x2="424" y2="225" stroke="#1565C0" stroke-width="0.5"/>
  <!-- Scissors X -->
  <text x="440" y="228" font-family="Arial,sans-serif" font-size="16" fill="#666" text-anchor="middle">X</text>
  <text x="418" y="258" font-family="Arial,sans-serif" font-size="10" fill="#F57F17" font-weight="bold" text-anchor="middle">Графика</text>
  <text x="418" y="270" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Карандаш, Уголь</text>
  <text x="418" y="280" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Тушь, Сангина</text>
  <!-- Bauhaus decorative stripe -->
  <rect x="265" y="296" width="200" height="3" rx="1" fill="#1565C0" opacity="0.15"/>
  <rect x="265" y="301" width="130" height="2" rx="1" fill="#C62828" opacity="0.12"/>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Живопись, графика, скульптура</text>
</svg>