<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus geometric corner accents -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles top -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Основы композиции</text>
  <text x="250" y="66" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">ИЗО - Урок 3</text>
  <line x1="30" y1="76" x2="470" y2="76" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <!-- Bauhaus stripe accent -->
  <rect x="30" y="73" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="73" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Golden ratio spiral -->
  <rect x="35" y="92" width="200" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <!-- Grid of thirds -->
  <line x1="102" y1="98" x2="102" y2="288" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
  <line x1="169" y1="98" x2="169" y2="288" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
  <line x1="38" y1="159" x2="232" y2="159" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
  <line x1="38" y1="221" x2="232" y2="221" stroke="#C62828" stroke-width="0.5" opacity="0.2"/>
  <!-- Rule of thirds intersection points -->
  <circle cx="102" cy="159" r="4" fill="#C62828" opacity="0.3"/>
  <circle cx="169" cy="159" r="4" fill="#C62828" opacity="0.3"/>
  <circle cx="102" cy="221" r="4" fill="#C62828" opacity="0.3"/>
  <circle cx="169" cy="221" r="4" fill="#C62828" opacity="0.3"/>
  <!-- Abstract composition in thirds -->
  <!-- Main subject at intersection -->
  <circle cx="102" cy="159" r="18" fill="#FDD835" stroke="#F57F17" stroke-width="1.5" opacity="0.7"/>
  <text x="102" y="163" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">*</text>
  <!-- Secondary elements -->
  <rect x="140" y="130" width="30" height="20" rx="3" fill="#1565C0" opacity="0.4"/>
  <rect x="55" y="195" width="35" height="25" rx="3" fill="#43A047" opacity="0.4"/>
  <circle cx="175" cy="210" r="12" fill="#E53935" opacity="0.3"/>
  <!-- Balance arrows -->
  <line x1="70" y1="280" x2="200" y2="280" stroke="#C62828" stroke-width="1" opacity="0.4"/>
  <polygon points="200,280 195,277 195,283" fill="#C62828" opacity="0.4"/>
  <polygon points="70,280 75,277 75,283" fill="#C62828" opacity="0.4"/>
  <text x="135" y="295" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">БАЛАНС</text>

  <!-- Bauhaus composition types -->
  <rect x="265" y="92" width="200" height="95" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <!-- Symmetrical -->
  <rect x="285" y="100" width="55" height="40" rx="3" fill="#FFF8E1" stroke="#C62828" stroke-width="0.5"/>
  <line x1="312" y1="105" x2="312" y2="135" stroke="#C62828" stroke-width="0.5" stroke-dasharray="2,2"/>
  <rect x="300" y="108" width="24" height="24" rx="2" fill="#C62828" opacity="0.3"/>
  <text x="312" y="152" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold" text-anchor="middle">СИММЕТРИЯ</text>
  <!-- Asymmetrical -->
  <rect x="350" y="100" width="55" height="40" rx="3" fill="#FFF8E1" stroke="#1565C0" stroke-width="0.5"/>
  <circle cx="368" cy="112" r="8" fill="#1565C0" opacity="0.4"/>
  <rect x="382" y="118" width="15" height="15" rx="1" fill="#F9A825" opacity="0.5"/>
  <text x="378" y="152" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold" text-anchor="middle">АСИММЕТРИЯ</text>
  <!-- Rhythm -->
  <rect x="285" y="158" width="170" height="20" rx="3" fill="#F5F5F5" stroke="#2E7D32" stroke-width="0.5"/>
  <rect x="295" y="162" width="8" height="12" rx="1" fill="#2E7D32" opacity="0.4"/>
  <rect x="313" y="160" width="8" height="14" rx="1" fill="#2E7D32" opacity="0.5"/>
  <rect x="331" y="164" width="8" height="10" rx="1" fill="#2E7D32" opacity="0.3"/>
  <rect x="349" y="161" width="8" height="13" rx="1" fill="#2E7D32" opacity="0.45"/>
  <rect x="367" y="163" width="8" height="11" rx="1" fill="#2E7D32" opacity="0.35"/>
  <rect x="385" y="159" width="8" height="15" rx="1" fill="#2E7D32" opacity="0.5"/>
  <rect x="403" y="162" width="8" height="12" rx="1" fill="#2E7D32" opacity="0.4"/>
  <rect x="421" y="160" width="8" height="14" rx="1" fill="#2E7D32" opacity="0.45"/>
  <text x="365" y="185" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold" text-anchor="middle">РИТМ</text>

  <!-- Golden ratio -->
  <rect x="265" y="195" width="95" height="97" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <!-- Golden spiral approximation -->
  <rect x="280" y="205" width="28" height="28" rx="1" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.5"/>
  <rect x="308" y="205" width="17" height="28" rx="1" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.5"/>
  <rect x="308" y="233" width="17" height="11" rx="1" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.5"/>
  <rect x="296" y="233" width="12" height="11" rx="1" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.5"/>
  <rect x="296" y="244" width="12" height="7" rx="1" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.4"/>
  <!-- Spiral -->
  <path d="M316,206 Q326,206 326,216 Q326,238 308,238 Q296,238 296,226 Q296,214 308,214 Q316,214 316,220" stroke="#F9A825" stroke-width="1.5" fill="none"/>
  <text x="313" y="262" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" font-weight="bold" text-anchor="middle">ЗОЛОТОЕ</text>
  <text x="313" y="272" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" font-weight="bold" text-anchor="middle">СЕЧЕНИЕ</text>
  <text x="313" y="284" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">1 : 1.618</text>

  <rect x="370" y="195" width="95" height="97" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <!-- Contrast examples -->
  <rect x="385" y="205" width="15" height="15" rx="2" fill="#000000"/>
  <rect x="402" y="205" width="15" height="15" rx="2" fill="#FFFFFF" stroke="#CCC" stroke-width="0.5"/>
  <text x="415" y="228" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">контраст</text>
  <!-- Color contrast -->
  <rect x="385" y="235" width="15" height="15" rx="2" fill="#E53935"/>
  <rect x="402" y="235" width="15" height="15" rx="2" fill="#1E88E5"/>
  <text x="415" y="258" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">цветовой</text>
  <!-- Size contrast -->
  <rect x="388" y="262" width="8" height="8" rx="1" fill="#C62828" opacity="0.6"/>
  <rect x="402" y="258" width="18" height="18" rx="2" fill="#C62828" opacity="0.6"/>
  <text x="415" y="286" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">масштаб</text>
  <text x="418" y="210" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold" text-anchor="middle">КОНТРАСТ</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Основы композиции</text>
</svg>