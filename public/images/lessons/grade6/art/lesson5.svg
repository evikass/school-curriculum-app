<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus geometric corner accents -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles top -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Цветовой круг</text>
  <text x="250" y="66" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">ИЗО - Урок 5</text>
  <line x1="30" y1="76" x2="470" y2="76" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <!-- Bauhaus stripe accent -->
  <rect x="30" y="73" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="73" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Color wheel -->
  <rect x="35" y="92" width="220" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <!-- Large color wheel -->
  <g transform="translate(145,195)">
    <!-- 12 segments -->
    <path d="M0,-55 L28,-47 L47,-28 L55,0 L47,28 L28,47 L0,55 L-28,47 L-47,28 L-55,0 L-47,-28 L-28,-47 Z" fill="none"/>
    <!-- Red -->
    <path d="M0,0 L0,-55 L28,-47 Z" fill="#E53935" opacity="0.8"/>
    <!-- Red-Orange -->
    <path d="M0,0 L28,-47 L47,-28 Z" fill="#FF5722" opacity="0.8"/>
    <!-- Orange -->
    <path d="M0,0 L47,-28 L55,0 Z" fill="#FF9800" opacity="0.8"/>
    <!-- Yellow-Orange -->
    <path d="M0,0 L55,0 L47,28 Z" fill="#FFC107" opacity="0.8"/>
    <!-- Yellow -->
    <path d="M0,0 L47,28 L28,47 Z" fill="#FDD835" opacity="0.8"/>
    <!-- Yellow-Green -->
    <path d="M0,0 L28,47 L0,55 Z" fill="#C0CA33" opacity="0.8"/>
    <!-- Green -->
    <path d="M0,0 L0,55 L-28,47 Z" fill="#43A047" opacity="0.8"/>
    <!-- Blue-Green -->
    <path d="M0,0 L-28,47 L-47,28 Z" fill="#00897B" opacity="0.8"/>
    <!-- Blue -->
    <path d="M0,0 L-47,28 L-55,0 Z" fill="#1E88E5" opacity="0.8"/>
    <!-- Blue-Violet -->
    <path d="M0,0 L-55,0 L-47,-28 Z" fill="#3949AB" opacity="0.8"/>
    <!-- Violet -->
    <path d="M0,0 L-47,-28 L-28,-47 Z" fill="#7B1FA2" opacity="0.8"/>
    <!-- Red-Violet -->
    <path d="M0,0 L-28,-47 L0,-55 Z" fill="#C2185B" opacity="0.8"/>
    <!-- Center circle -->
    <circle r="15" fill="white" stroke="#DDD" stroke-width="0.5"/>
    <!-- Primary colors labels -->
    <circle cx="0" cy="-42" r="3" fill="#E53935" stroke="white" stroke-width="0.5"/>
    <circle cx="49" cy="0" r="3" fill="#FDD835" stroke="white" stroke-width="0.5"/>
    <circle cx="-49" cy="0" r="3" fill="#1E88E5" stroke="white" stroke-width="0.5"/>
  </g>
  <!-- Labels -->
  <text x="80" y="108" font-family="Arial,sans-serif" font-size="10" fill="#E53935" font-weight="bold">КРАСНЫЙ</text>
  <text x="195" y="108" font-family="Arial,sans-serif" font-size="10" fill="#FDD835" font-weight="bold">ЖЁЛТЫЙ</text>
  <text x="225" y="200" font-family="Arial,sans-serif" font-size="10" fill="#1E88E5" font-weight="bold">СИНИЙ</text>
  <text x="145" y="275" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">12 секторов</text>
  <text x="145" y="285" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">ЦВЕТОВОЙ КРУГ</text>

  <!-- Color properties -->
  <rect x="270" y="92" width="95" height="95" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <!-- Warm/Cool -->
  <rect x="285" y="102" width="35" height="18" rx="3" fill="#FFEBEE"/>
  <text x="303" y="114" font-family="Arial,sans-serif" font-size="6" fill="#E53935" text-anchor="middle">ТЁПЛЫЕ</text>
  <circle cx="295" cy="108" r="3" fill="#E53935" opacity="0.5"/>
  <circle cx="303" cy="108" r="3" fill="#FF9800" opacity="0.5"/>
  <circle cx="311" cy="108" r="3" fill="#FDD835" opacity="0.5"/>
  <rect x="285" y="124" width="35" height="18" rx="3" fill="#E3F2FD"/>
  <text x="303" y="136" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">ХОЛОДНЫЕ</text>
  <circle cx="295" cy="130" r="3" fill="#1E88E5" opacity="0.5"/>
  <circle cx="303" cy="130" r="3" fill="#00ACC1" opacity="0.5"/>
  <circle cx="311" cy="130" r="3" fill="#7B1FA2" opacity="0.5"/>
  <!-- Saturation strip -->
  <rect x="285" y="150" width="65" height="8" rx="2">
    <animate attributeName="fill" values="#FFCDD2;#E53935" dur="0s" fill="freeze"/>
  </rect>
  <rect x="285" y="150" width="9" height="8" rx="1" fill="#FFCDD2"/>
  <rect x="294" y="150" width="9" height="8" rx="1" fill="#EF9A9A"/>
  <rect x="303" y="150" width="9" height="8" rx="1" fill="#E57373"/>
  <rect x="312" y="150" width="9" height="8" rx="1" fill="#EF5350"/>
  <rect x="321" y="150" width="9" height="8" rx="1" fill="#E53935"/>
  <text x="318" y="172" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Насыщенность</text>
  <!-- Lightness strip -->
  <rect x="285" y="178" width="65" height="6" rx="1"/>
  <rect x="285" y="178" width="13" height="6" fill="#333"/>
  <rect x="298" y="178" width="13" height="6" fill="#666"/>
  <rect x="311" y="178" width="13" height="6" fill="#999"/>
  <rect x="324" y="178" width="13" height="6" fill="#CCC"/>
  <rect x="337" y="178" width="13" height="6" fill="#FFF" stroke="#CCC" stroke-width="0.3"/>
  <text x="318" y="196" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Светлота</text>

  <rect x="375" y="92" width="90" height="95" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <!-- Complementary pairs -->
  <circle cx="420" cy="115" r="10" fill="#E53935" opacity="0.7"/>
  <line x1="420" y1="125" x2="420" y2="145" stroke="#888" stroke-width="1" stroke-dasharray="2,1"/>
  <circle cx="420" cy="155" r="10" fill="#43A047" opacity="0.7"/>
  <text x="420" y="178" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Контрастные</text>
  <circle cx="420" cy="105" r="3" fill="#E53935"/>
  <text x="436" y="108" font-family="Arial,sans-serif" font-size="5" fill="#777">K</text>
  <circle cx="420" cy="165" r="3" fill="#43A047"/>
  <text x="436" y="168" font-family="Arial,sans-serif" font-size="5" fill="#777">З</text>

  <!-- Color harmony -->
  <rect x="270" y="195" width="195" height="97" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <!-- Analogous -->
  <text x="367" y="210" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold" text-anchor="middle">ГАРМОНИИ ЦВЕТА</text>
  <!-- Analogous row -->
  <circle cx="295" cy="230" r="8" fill="#FF9800" opacity="0.7"/>
  <circle cx="315" cy="230" r="8" fill="#FDD835" opacity="0.7"/>
  <circle cx="335" cy="230" r="8" fill="#C0CA33" opacity="0.7"/>
  <text x="315" y="248" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Родственные</text>
  <!-- Complementary row -->
  <circle cx="385" cy="230" r="8" fill="#E53935" opacity="0.7"/>
  <circle cx="425" cy="230" r="8" fill="#43A047" opacity="0.7"/>
  <line x1="393" y1="230" x2="417" y2="230" stroke="#888" stroke-width="1" stroke-dasharray="2,1"/>
  <text x="405" y="248" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Дополнительные</text>
  <!-- Monochrome row -->
  <rect x="285" y="256" width="15" height="12" rx="2" fill="#C62828" opacity="0.3"/>
  <rect x="303" y="256" width="15" height="12" rx="2" fill="#C62828" opacity="0.5"/>
  <rect x="321" y="256" width="15" height="12" rx="2" fill="#C62828" opacity="0.7"/>
  <rect x="339" y="256" width="15" height="12" rx="2" fill="#C62828" opacity="0.9"/>
  <text x="315" y="278" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Монохромная</text>
  <!-- Triad -->
  <circle cx="385" cy="262" r="7" fill="#E53935" opacity="0.6"/>
  <circle cx="405" cy="262" r="7" fill="#FDD835" opacity="0.6"/>
  <circle cx="425" cy="262" r="7" fill="#1E88E5" opacity="0.6"/>
  <text x="405" y="278" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Триада</text>
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Цветовой круг</text>
</svg>