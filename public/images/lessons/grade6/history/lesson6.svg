<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Новгородская земля</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Novgorod veche (popular assembly) -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="210" height="200" rx="6" fill="#E8EAF6" stroke="#283593" stroke-width="1.5"/>
    <!-- Yaroslav's Courtyard / Veche square -->
    <rect x="10" y="10" width="190" height="180" rx="3" fill="#C8E6C9" opacity="0.4"/>
    <!-- St. Sophia in background -->
    <rect x="75" y="15" width="60" height="50" rx="2" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
    <path d="M85,15 Q85,5 105,-2 Q125,5 125,15" fill="#F9A825" opacity="0.7"/>
    <line x1="105" y1="-2" x2="105" y2="-8" stroke="#F9A825" stroke-width="1"/>
    <path d="M90,15 Q90,8 100,3 Q110,8 110,15" fill="#F9A825" opacity="0.5"/>
    <path d="M115,15 Q115,8 125,3 Q135,8 135,15" fill="#F9A825" opacity="0.5"/>
    <!-- Veche platform -->
    <rect x="60" y="130" width="90" height="10" rx="2" fill="#8D6E63" opacity="0.5"/>
    <!-- Podium/speaker area -->
    <rect x="85" y="110" width="40" height="20" rx="2" fill="#A1887F"/>
    <!-- Speaker figure -->
    <circle cx="105" cy="98" r="7" fill="#F9A825" stroke="#8D6E63" stroke-width="0.8"/>
    <rect x="98" y="105" width="14" height="15" rx="2" fill="#283593"/>
    <!-- Raised arm -->
    <line x1="112" y1="108" x2="122" y2="96" stroke="#F9A825" stroke-width="2"/>
    <!-- Veche bell -->
    <rect x="175" y="75" width="20" height="25" rx="2" fill="#F9A825" opacity="0.5"/>
    <path d="M180,75 L185,65 L190,75" fill="#F9A825" opacity="0.6"/>
    <circle cx="185" cy="82" r="3" fill="#F9A825"/>
    <text x="185" y="108" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">Вечевой</text>
    <text x="185" y="114" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">колокол</text>
    <!-- Assembly people (crowd) -->
    <circle cx="50" cy="155" r="5" fill="#F9A825" opacity="0.6"/>
    <rect x="45" y="160" width="10" height="15" rx="2" fill="#5D4037" opacity="0.5"/>
    <circle cx="70" cy="155" r="5" fill="#F9A825" opacity="0.6"/>
    <rect x="65" y="160" width="10" height="15" rx="2" fill="#1565C0" opacity="0.5"/>
    <circle cx="90" cy="158" r="5" fill="#F9A825" opacity="0.6"/>
    <rect x="85" y="163" width="10" height="15" rx="2" fill="#2E7D32" opacity="0.5"/>
    <circle cx="110" cy="158" r="5" fill="#F9A825" opacity="0.6"/>
    <rect x="105" y="163" width="10" height="15" rx="2" fill="#C62828" opacity="0.5"/>
    <circle cx="130" cy="155" r="5" fill="#F9A825" opacity="0.6"/>
    <rect x="125" y="160" width="10" height="15" rx="2" fill="#5D4037" opacity="0.5"/>
    <circle cx="150" cy="155" r="5" fill="#F9A825" opacity="0.6"/>
    <rect x="145" y="160" width="10" height="15" rx="2" fill="#1565C0" opacity="0.5"/>
    <!-- More people in second row -->
    <circle cx="40" cy="175" r="4" fill="#F9A825" opacity="0.4"/>
    <circle cx="60" cy="177" r="4" fill="#F9A825" opacity="0.4"/>
    <circle cx="80" cy="178" r="4" fill="#F9A825" opacity="0.4"/>
    <circle cx="100" cy="178" r="4" fill="#F9A825" opacity="0.4"/>
    <circle cx="120" cy="177" r="4" fill="#F9A825" opacity="0.4"/>
    <circle cx="140" cy="175" r="4" fill="#F9A825" opacity="0.4"/>
    <circle cx="160" cy="175" r="4" fill="#F9A825" opacity="0.4"/>
    <!-- Raised hands (voting) -->
    <line x1="55" y1="155" x2="55" y2="145" stroke="#F9A825" stroke-width="1.5"/>
    <line x1="135" y1="155" x2="135" y2="145" stroke="#F9A825" stroke-width="1.5"/>
    <line x1="85" y1="155" x2="85" y2="148" stroke="#F9A825" stroke-width="1.5"/>
    <text x="105" y="193" font-family="Arial,sans-serif" font-size="9" fill="#283593" text-anchor="middle" font-weight="bold">Вече - народное собрание</text>
  </g>

  <!-- Trade routes and Hanseatic league -->
  <g transform="translate(255,88)">
    <rect x="0" y="0" width="215" height="95" rx="6" fill="#E0F2F1" stroke="#00695C" stroke-width="1.5"/>
    <text x="107" y="15" font-family="Arial,sans-serif" font-size="8" fill="#00695C" text-anchor="middle" font-weight="bold">Торговые пути Великого Новгорода</text>
    <!-- Waterways -->
    <path d="M30,50 Q60,45 90,50 Q120,55 150,45 Q170,40 185,45" stroke="#1565C0" stroke-width="3" fill="none" opacity="0.4"/>
    <!-- Volkhov river label -->
    <text x="60" y="43" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">р. Волхов</text>
    <!-- Novgorod dot -->
    <circle cx="40" cy="50" r="5" fill="#C62828"/>
    <text x="40" y="65" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Новгород</text>
    <!-- Trade route to Baltic -->
    <path d="M40,50 L40,35 Q40,25 55,25 L90,25 Q110,25 120,30 L140,30" stroke="#F9A825" stroke-width="2" stroke-dasharray="4,2" fill="none"/>
    <text x="90" y="22" font-family="Arial,sans-serif" font-size="5" fill="#F9A825" text-anchor="middle">Путь в Балтику</text>
    <!-- Baltic/Scandinavia -->
    <circle cx="160" cy="30" r="4" fill="#1565C0"/>
    <text x="160" y="22" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Ганза</text>
    <!-- Trade route to Volga -->
    <path d="M40,50 Q30,65 25,75 Q30,80 50,82 L90,82 Q120,80 140,82" stroke="#2E7D32" stroke-width="2" stroke-dasharray="4,2" fill="none"/>
    <text x="80" y="78" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Путь на Волгу</text>
    <!-- East cities -->
    <circle cx="165" cy="82" r="3" fill="#2E7D32"/>
    <text x="180" y="85" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Восток</text>
    <!-- Goods symbols -->
    <text x="70" y="38" font-family="Arial,sans-serif" font-size="10" opacity="0.4">---</text>
    <rect x="195" y="45" width="12" height="12" rx="1" fill="#F9A825" opacity="0.3"/>
    <text x="201" y="54" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">мех</text>
    <rect x="195" y="60" width="12" height="12" rx="1" fill="#2E7D32" opacity="0.3"/>
    <text x="201" y="69" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">воск</text>
    <rect x="195" y="75" width="12" height="12" rx="1" fill="#1565C0" opacity="0.3"/>
    <text x="201" y="84" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">лен</text>
  </g>

  <!-- Novgorod republic structure -->
  <g transform="translate(255,190)">
    <rect x="0" y="0" width="215" height="98" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
    <text x="107" y="15" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Устройство Новгородской республики</text>
    <!-- Pyramid structure -->
    <polygon points="107,25 137,45 77,45" fill="#C62828" opacity="0.15" stroke="#C62828" stroke-width="0.8"/>
    <text x="107" y="40" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Вече</text>
    <polygon points="107,48 127,63 87,63" fill="#1565C0" opacity="0.12" stroke="#1565C0" stroke-width="0.8"/>
    <text x="107" y="58" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Посадник + Архиепископ</text>
    <polygon points="107,66 147,80 67,80" fill="#2E7D32" opacity="0.1" stroke="#2E7D32" stroke-width="0.8"/>
    <text x="107" y="75" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Тысяцкий + Совет бояр</text>
    <polygon points="107,83 162,95 52,95" fill="#F9A825" opacity="0.1" stroke="#E65100" stroke-width="0.8"/>
    <text x="107" y="92" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Бояре - крупнейшие землевладельцы</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Новгородская земля</text>
</svg>