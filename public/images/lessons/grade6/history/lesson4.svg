<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Причины раздробленности</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Fragmented map -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="200" height="200" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
    <!-- Original territory outline (faded) -->
    <path d="M30,25 L170,20 L190,55 L185,130 L165,175 L120,190 L55,185 L20,145 L15,65 Z" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.4"/>
    <!-- Fragment 1 - Novgorod -->
    <path d="M25,20 L70,18 L65,65 L30,70 Z" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="1.5"/>
    <circle cx="45" cy="42" r="3" fill="#1565C0"/>
    <text x="45" y="55" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Новгород</text>

    <!-- Fragment 2 - Vladimir-Suzdal -->
    <path d="M70,18 L130,25 L120,75 L65,65 Z" fill="#2E7D32" opacity="0.2" stroke="#2E7D32" stroke-width="1.5"/>
    <circle cx="95" cy="45" r="3" fill="#2E7D32"/>
    <text x="95" y="58" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Владимир</text>

    <!-- Fragment 3 - Chernigov -->
    <path d="M130,25 L175,30 L170,80 L120,75 Z" fill="#F9A825" opacity="0.2" stroke="#F9A825" stroke-width="1.5"/>
    <circle cx="148" cy="52" r="3" fill="#F9A825"/>
    <text x="148" y="65" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Чернигов</text>

    <!-- Fragment 4 - Kiev (smaller, weakened) -->
    <path d="M65,65 L120,75 L115,110 L70,105 Z" fill="#C62828" opacity="0.15" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="90" cy="88" r="3" fill="#C62828" opacity="0.5"/>
    <text x="90" y="100" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" opacity="0.6">Киев</text>

    <!-- Fragment 5 - Galicia-Volhynia -->
    <path d="M120,75 L170,80 L175,130 L130,125 L115,110 Z" fill="#7B1FA2" opacity="0.2" stroke="#7B1FA2" stroke-width="1.5"/>
    <circle cx="148" cy="100" r="3" fill="#7B1FA2"/>
    <text x="148" y="113" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">Галич</text>

    <!-- Fragment 6 - Polotsk -->
    <path d="M30,70 L65,65 L70,105 L55,130 L20,120 Z" fill="#00838F" opacity="0.2" stroke="#00838F" stroke-width="1.5"/>
    <circle cx="45" cy="95" r="3" fill="#00838F"/>
    <text x="45" y="108" font-family="Arial,sans-serif" font-size="6" fill="#00838F" text-anchor="middle">Полоцк</text>

    <!-- Fragment 7 - Ryazan -->
    <path d="M65,105 L115,110 L130,125 L110,155 L55,130 Z" fill="#E65100" opacity="0.15" stroke="#E65100" stroke-width="1"/>
    <circle cx="90" cy="125" r="3" fill="#E65100"/>
    <text x="90" y="138" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Рязань</text>

    <!-- Cracks/lightning showing fragmentation -->
    <path d="M95,45 L90,88" stroke="#C62828" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
    <path d="M148,52 L90,88" stroke="#C62828" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
    <path d="M45,42 L90,88" stroke="#C62828" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
    <path d="M90,88 L148,100" stroke="#C62828" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>

    <!-- Fragmentation arrows pointing outward -->
    <line x1="45" y1="42" x2="35" y2="35" stroke="#1565C0" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="95" y1="45" x2="95" y2="35" stroke="#2E7D32" stroke-width="1"/>
    <line x1="148" y1="52" x2="158" y2="45" stroke="#F9A825" stroke-width="1"/>

    <text x="100" y="178" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Удельная Русь (XII век)</text>
    <text x="100" y="190" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">15 самостоятельных княжеств</text>
  </g>

  <!-- Causes of fragmentation -->
  <g transform="translate(250,88)">
    <rect x="0" y="0" width="220" height="200" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
    <text x="110" y="18" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Причины раздробленности</text>
    <line x1="15" y1="24" x2="205" y2="24" stroke="#F9A825" stroke-width="0.5" opacity="0.5"/>

    <!-- Cause 1 -->
    <rect x="10" y="32" width="200" height="30" rx="4" fill="#C62828" opacity="0.08"/>
    <circle cx="28" cy="47" r="10" fill="#C62828" opacity="0.2"/>
    <text x="28" y="51" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">1</text>
    <text x="45" y="43" font-family="Arial,sans-serif" font-size="8" fill="#333" font-weight="bold">Лествичная система</text>
    <text x="45" y="55" font-family="Arial,sans-serif" font-size="7" fill="#666">передачи власти</text>

    <!-- Cause 2 -->
    <rect x="10" y="67" width="200" height="30" rx="4" fill="#1565C0" opacity="0.08"/>
    <circle cx="28" cy="82" r="10" fill="#1565C0" opacity="0.2"/>
    <text x="28" y="86" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">2</text>
    <text x="45" y="78" font-family="Arial,sans-serif" font-size="8" fill="#333" font-weight="bold">Рост и богатство уделов</text>
    <text x="45" y="90" font-family="Arial,sans-serif" font-size="7" fill="#666">экономическая независимость</text>

    <!-- Cause 3 -->
    <rect x="10" y="102" width="200" height="30" rx="4" fill="#2E7D32" opacity="0.08"/>
    <circle cx="28" cy="117" r="10" fill="#2E7D32" opacity="0.2"/>
    <text x="28" y="121" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">3</text>
    <text x="45" y="113" font-family="Arial,sans-serif" font-size="8" fill="#333" font-weight="bold">Междоусобные войны</text>
    <text x="45" y="125" font-family="Arial,sans-serif" font-size="7" fill="#666">борьба князей за власть</text>

    <!-- Cause 4 -->
    <rect x="10" y="137" width="200" height="30" rx="4" fill="#F9A825" opacity="0.08"/>
    <circle cx="28" cy="152" r="10" fill="#F9A825" opacity="0.2"/>
    <text x="28" y="156" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">4</text>
    <text x="45" y="148" font-family="Arial,sans-serif" font-size="8" fill="#333" font-weight="bold">Нападения кочевников</text>
    <text x="45" y="160" font-family="Arial,sans-serif" font-size="7" fill="#666">внешняя угроза ослабляет Русь</text>

    <!-- Weakening symbol -->
    <text x="110" y="188" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">1132 - начало раздробленности</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Причины раздробленности</text>
</svg>