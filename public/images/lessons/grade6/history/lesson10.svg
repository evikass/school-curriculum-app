<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Возвышение Москвы</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 10</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Moscow Kremlin with walls -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="210" height="200" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
    <!-- Sky -->
    <rect x="3" y="3" width="204" height="55" rx="4" fill="#FFE0B2" opacity="0.3"/>
    <!-- Kremlin walls -->
    <rect x="30" y="90" width="150" height="55" rx="1" fill="#C62828" opacity="0.3" stroke="#C62828" stroke-width="1.5"/>
    <!-- Wall battlements -->
    <g>
      <rect x="30" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="42" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="54" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="66" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="78" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="90" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="102" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="114" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="126" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="138" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="150" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="162" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
      <rect x="172" y="84" width="8" height="10" fill="#C62828" opacity="0.4"/>
    </g>
    <!-- Spasskaya tower (tall tower) -->
    <rect x="90" y="55" width="30" height="35" rx="2" fill="#C62828" opacity="0.5" stroke="#C62828" stroke-width="1"/>
    <path d="M90,55 L105,35 L120,55" fill="#C62828" opacity="0.5"/>
    <!-- Red star on tower (as part of Kremlin, not as decorative side element) -->
    <circle cx="105" cy="38" r="4" fill="#F9A825"/>
    <line x1="105" y1="34" x2="105" y2="42" stroke="#C62828" stroke-width="0.8"/>
    <line x1="101" y1="38" x2="109" y2="38" stroke="#C62828" stroke-width="0.8"/>
    <!-- Clock face -->
    <circle cx="105" cy="65" r="5" fill="#FFF8E1" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="105" y1="62" x2="105" y2="65" stroke="#333" stroke-width="0.5"/>
    <line x1="105" y1="65" x2="107" y2="65" stroke="#333" stroke-width="0.5"/>
    <!-- Corner towers -->
    <rect x="22" y="70" width="16" height="75" rx="2" fill="#C62828" opacity="0.4" stroke="#C62828" stroke-width="1"/>
    <path d="M22,70 L30,55 L38,70" fill="#C62828" opacity="0.4"/>
    <rect x="172" y="70" width="16" height="75" rx="2" fill="#C62828" opacity="0.4" stroke="#C62828" stroke-width="1"/>
    <path d="M172,70 L180,55 L190,70" fill="#C62828" opacity="0.4"/>
    <!-- Cathedrals inside Kremlin -->
    <!-- Assumption Cathedral -->
    <rect x="45" y="110" width="30" height="30" rx="1" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.8"/>
    <path d="M48,110 Q48,98 60,90 Q72,98 72,110" fill="#F9A825" opacity="0.7"/>
    <line x1="60" y1="90" x2="60" y2="83" stroke="#BDBDBD" stroke-width="1"/>
    <rect x="57" y="80" width="6" height="5" fill="#F9A825" rx="1"/>
    <!-- Archangel Cathedral -->
    <rect x="85" y="115" width="25" height="25" rx="1" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.8"/>
    <path d="M88,115 Q88,105 97,98 Q107,105 107,115" fill="#F9A825" opacity="0.6"/>
    <line x1="97" y1="98" x2="97" y2="92" stroke="#BDBDBD" stroke-width="0.8"/>
    <rect x="94" y="89" width="6" height="5" fill="#F9A825" rx="1"/>
    <!-- Bell tower (Ivan the Great) -->
    <rect x="130" y="80" width="20" height="60" rx="1" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.8"/>
    <path d="M130,80 L140,65 L150,80" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="0.8"/>
    <line x1="140" y1="65" x2="140" y2="58" stroke="#BDBDBD" stroke-width="1"/>
    <rect x="137" y="55" width="6" height="5" fill="#F9A825" rx="1"/>
    <!-- Moscow River -->
    <path d="M0,160 Q50,155 105,158 Q160,161 210,155" stroke="#1565C0" stroke-width="2" fill="none" opacity="0.4"/>
    <rect x="0" y="160" width="210" height="40" fill="#1565C0" opacity="0.06"/>
    <!-- Ground -->
    <rect x="0" y="145" width="210" height="15" fill="#8D6E63" opacity="0.1"/>
    <text x="105" y="185" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Московский Кремль</text>
    <text x="105" y="195" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Столица объединяющейся Руси</text>
  </g>

  <!-- Ivan Kalita with gold chest -->
  <g transform="translate(255,88)">
    <rect x="0" y="0" width="215" height="100" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
    <!-- Ivan Kalita figure -->
    <g transform="translate(20,10)">
      <!-- Head -->
      <circle cx="30" cy="20" r="12" fill="#F9A825" stroke="#8D6E63" stroke-width="0.8"/>
      <!-- Crown/hat -->
      <path d="M18,14 L20,4 L27,12 L32,2 L37,12 L44,4 L46,14" fill="#F9A825" stroke="#C62828" stroke-width="0.8"/>
      <rect x="17" y="12" width="26" height="5" rx="1" fill="#F9A825" stroke="#C62828" stroke-width="0.5"/>
      <!-- Fur trim -->
      <path d="M17,17 Q20,22 23,17 Q26,22 29,17 Q32,22 35,17 Q38,22 41,17" fill="#FFF8E1" stroke="#A1887F" stroke-width="0.5"/>
      <!-- Eyes -->
      <ellipse cx="25" cy="20" rx="2.5" ry="1.5" fill="#FFF8E1"/>
      <circle cx="25" cy="20" r="1" fill="#3E2723"/>
      <ellipse cx="35" cy="20" rx="2.5" ry="1.5" fill="#FFF8E1"/>
      <circle cx="35" cy="20" r="1" fill="#3E2723"/>
      <!-- Body -->
      <rect x="20" y="32" width="20" height="30" rx="3" fill="#C62828" opacity="0.8"/>
      <!-- Belt -->
      <rect x="19" y="42" width="22" height="3" rx="1" fill="#F9A825"/>
      <!-- Legs -->
      <line x1="25" y1="62" x2="22" y2="80" stroke="#5D4037" stroke-width="4"/>
      <line x1="35" y1="62" x2="38" y2="80" stroke="#5D4037" stroke-width="4"/>
      <rect x="18" y="78" width="8" height="4" rx="1" fill="#5D4037"/>
      <rect x="34" y="78" width="8" height="4" rx="1" fill="#5D4037"/>
    </g>
    <!-- Gold chest -->
    <g transform="translate(80,45)">
      <rect x="0" y="15" width="40" height="25" rx="3" fill="#F9A825" stroke="#8D6E63" stroke-width="1"/>
      <!-- Lid -->
      <path d="M0,15 Q0,5 20,3 Q40,5 40,15" fill="#FDD835" stroke="#8D6E63" stroke-width="0.8"/>
      <!-- Lock -->
      <rect x="16" y="13" width="8" height="6" rx="1" fill="#8D6E63"/>
      <!-- Coins visible inside -->
      <circle cx="10" cy="18" r="3" fill="#FDD835" stroke="#8D6E63" stroke-width="0.3"/>
      <circle cx="20" cy="17" r="3" fill="#FDD835" stroke="#8D6E63" stroke-width="0.3"/>
      <circle cx="30" cy="18" r="3" fill="#FDD835" stroke="#8D6E63" stroke-width="0.3"/>
      <!-- Gold overflow -->
      <circle cx="45" cy="35" r="2.5" fill="#F9A825"/>
      <circle cx="50" cy="33" r="2" fill="#F9A825"/>
      <circle cx="55" cy="36" r="2.5" fill="#F9A825"/>
      <!-- Hands holding chest -->
      <line x1="75" y1="45" x2="70" y2="40" stroke="#F9A825" stroke-width="2"/>
    </g>
    <!-- Labels -->
    <text x="40" y="93" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Иван Калита</text>
    <text x="120" y="93" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Сокровищница</text>
  </g>

  <!-- Reasons for Moscow's rise -->
  <g transform="translate(255,195)">
    <rect x="0" y="0" width="215" height="93" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="107" y="14" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Причины возвышения Москвы</text>

    <rect x="8" y="22" width="100" height="18" rx="3" fill="#C62828" opacity="0.08"/>
    <text x="58" y="34" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle">1. Центральное положение</text>

    <rect x="112" y="22" width="98" height="18" rx="3" fill="#1565C0" opacity="0.08"/>
    <text x="161" y="34" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle">2. Защита от ордынцев</text>

    <rect x="8" y="44" width="100" height="18" rx="3" fill="#2E7D32" opacity="0.08"/>
    <text x="58" y="56" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle">3. Перенос митрополии</text>

    <rect x="112" y="44" width="98" height="18" rx="3" fill="#F9A825" opacity="0.08"/>
    <text x="161" y="56" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle">4. Поддержка Орды</text>

    <rect x="8" y="66" width="202" height="18" rx="3" fill="#7B1FA2" opacity="0.08"/>
    <text x="109" y="78" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle">5. Энергичные князья: Даниил, Юрий, Иван Калита</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Возвышение Москвы</text>
</svg>