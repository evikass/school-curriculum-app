<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Культура Древней Руси</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Golden domes of Kyiv churches -->
  <g transform="translate(30,88)">
    <rect x="0" y="0" width="200" height="200" rx="6" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5"/>
    <!-- Sky background -->
    <rect x="3" y="3" width="194" height="80" rx="4" fill="#E3F2FD" opacity="0.5"/>
    <!-- Main cathedral -->
    <rect x="70" y="80" width="60" height="70" rx="2" fill="#FFF8E1" stroke="#C62828" stroke-width="1"/>
    <!-- Central dome -->
    <ellipse cx="100" cy="80" rx="18" ry="8" fill="#F9A825"/>
    <path d="M82,80 Q82,50 100,35 Q118,50 118,80" fill="#F9A825"/>
    <line x1="100" y1="35" x2="100" y2="25" stroke="#C62828" stroke-width="1.5"/>
    <rect x="96" y="22" width="8" height="5" fill="#C62828" rx="1"/>
    <!-- Left dome -->
    <ellipse cx="55" cy="85" rx="12" ry="6" fill="#F9A825" opacity="0.85"/>
    <path d="M43,85 Q43,62 55,50 Q67,62 67,85" fill="#F9A825" opacity="0.85"/>
    <line x1="55" y1="50" x2="55" y2="42" stroke="#C62828" stroke-width="1"/>
    <rect x="52" y="40" width="6" height="4" fill="#C62828" rx="1"/>
    <!-- Right dome -->
    <ellipse cx="145" cy="85" rx="12" ry="6" fill="#F9A825" opacity="0.85"/>
    <path d="M133,85 Q133,62 145,50 Q157,62 157,85" fill="#F9A825" opacity="0.85"/>
    <line x1="145" y1="50" x2="145" y2="42" stroke="#C62828" stroke-width="1"/>
    <rect x="142" y="40" width="6" height="4" fill="#C62828" rx="1"/>
    <!-- Church windows -->
    <rect x="90" y="95" width="8" height="15" rx="4" fill="#E3F2FD" stroke="#C62828" stroke-width="0.5"/>
    <rect x="102" y="95" width="8" height="15" rx="4" fill="#E3F2FD" stroke="#C62828" stroke-width="0.5"/>
    <rect x="90" y="120" width="8" height="15" rx="4" fill="#E3F2FD" stroke="#C62828" stroke-width="0.5"/>
    <rect x="102" y="120" width="8" height="15" rx="4" fill="#E3F2FD" stroke="#C62828" stroke-width="0.5"/>
    <!-- Door -->
    <rect x="92" y="140" width="16" height="10" rx="8" fill="#5D4037"/>
    <!-- Ground -->
    <rect x="0" y="150" width="200" height="50" fill="#8D6E63" opacity="0.15" rx="0"/>
    <!-- Small domes on sides -->
    <path d="M30,120 Q30,108 38,100 Q46,108 46,120" fill="#F9A825" opacity="0.7"/>
    <path d="M154,120 Q154,108 162,100 Q170,108 170,120" fill="#F9A825" opacity="0.7"/>
    <!-- Crosses on domes -->
    <line x1="38" y1="100" x2="38" y2="95" stroke="#C62828" stroke-width="0.8"/>
    <line x1="35" y1="97" x2="41" y2="97" stroke="#C62828" stroke-width="0.8"/>
    <line x1="162" y1="100" x2="162" y2="95" stroke="#C62828" stroke-width="0.8"/>
    <line x1="159" y1="97" x2="165" y2="97" stroke="#C62828" stroke-width="0.8"/>
    <text x="100" y="185" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-weight="bold">Софийский собор, Киев</text>
  </g>

  <!-- Birch bark letters and manuscript -->
  <g transform="translate(250,88)">
    <rect x="0" y="0" width="220" height="200" rx="6" fill="#EFEBE9" stroke="#8D6E63" stroke-width="1.5"/>
    <!-- Birch bark letter -->
    <rect x="15" y="15" width="80" height="60" rx="3" fill="#FFF8E1" stroke="#A1887F" stroke-width="1"/>
    <!-- Birch bark texture lines -->
    <line x1="20" y1="25" x2="90" y2="25" stroke="#D7CCC8" stroke-width="0.5"/>
    <line x1="20" y1="30" x2="90" y2="30" stroke="#D7CCC8" stroke-width="0.5"/>
    <line x1="20" y1="35" x2="90" y2="35" stroke="#D7CCC8" stroke-width="0.5"/>
    <!-- Glagolitic-like text lines -->
    <path d="M22,42 l4,-4 l3,5 l4,-3 l3,4 l5,-5 l3,3 l4,-4 l3,5 l4,-3 l5,4" stroke="#5D4037" stroke-width="0.8" fill="none"/>
    <path d="M22,52 l5,-3 l3,4 l4,-5 l3,3 l4,4 l3,-5 l4,3 l3,-4 l5,5 l3,-3" stroke="#5D4037" stroke-width="0.8" fill="none"/>
    <path d="M22,62 l3,5 l4,-3 l3,4 l5,-5 l3,3 l4,-4 l3,5 l4,-3 l3,4 l5,-5" stroke="#5D4037" stroke-width="0.8" fill="none"/>
    <text x="55" y="88" font-family="Arial,sans-serif" font-size="8" fill="#5D4037" text-anchor="middle">Берестяная грамота</text>

    <!-- Manuscript book -->
    <rect x="115" y="15" width="90" height="65" rx="3" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
    <!-- Book spine -->
    <rect x="115" y="15" width="8" height="65" rx="2" fill="#7B1FA2" opacity="0.2"/>
    <!-- Page text lines -->
    <line x1="128" y1="28" x2="195" y2="28" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>
    <line x1="128" y1="35" x2="195" y2="35" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>
    <line x1="128" y1="42" x2="195" y2="42" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>
    <line x1="128" y1="49" x2="195" y2="49" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>
    <line x1="128" y1="56" x2="195" y2="56" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>
    <line x1="128" y1="63" x2="195" y2="63" stroke="#7B1FA2" stroke-width="0.5" opacity="0.4"/>
    <!-- Illuminated initial letter -->
    <rect x="125" y="20" width="14" height="16" rx="2" fill="#C62828" opacity="0.15"/>
    <text x="132" y="33" font-family="serif" font-size="14" fill="#C62828" text-anchor="middle">В</text>
    <text x="160" y="88" font-family="Arial,sans-serif" font-size="8" fill="#5D4037" text-anchor="middle">Рукописная книга</text>

    <!-- Icons -->
    <g transform="translate(15,100)">
      <rect x="0" y="0" width="55" height="70" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="1.5"/>
      <!-- Icon frame -->
      <rect x="5" y="5" width="45" height="55" rx="2" fill="#1565C0" opacity="0.1" stroke="#F9A825" stroke-width="0.8"/>
      <!-- Saint figure simplified -->
      <circle cx="27" cy="22" r="8" fill="#F9A825" opacity="0.4"/>
      <rect x="20" y="30" width="14" height="22" rx="2" fill="#C62828" opacity="0.3"/>
      <!-- Halo -->
      <circle cx="27" cy="20" r="11" fill="none" stroke="#F9A825" stroke-width="1" opacity="0.6"/>
      <!-- Cross on top -->
      <line x1="27" y1="4" x2="27" y2="12" stroke="#F9A825" stroke-width="1"/>
      <line x1="24" y1="7" x2="30" y2="7" stroke="#F9A825" stroke-width="1"/>
    </g>
    <text x="42" y="190" font-family="Arial,sans-serif" font-size="8" fill="#5D4037" text-anchor="middle">Икона</text>

    <!-- Cross/ornament -->
    <g transform="translate(90,100)">
      <rect x="0" y="0" width="55" height="70" rx="3" fill="#FFF8E1" stroke="#C62828" stroke-width="1.5"/>
      <rect x="5" y="5" width="45" height="55" rx="2" fill="#E8F5E9" stroke="#C62828" stroke-width="0.8"/>
      <!-- Decorative pattern -->
      <rect x="12" y="12" width="30" height="40" rx="1" fill="none" stroke="#C62828" stroke-width="0.8" opacity="0.5"/>
      <rect x="17" y="17" width="20" height="30" rx="1" fill="none" stroke="#C62828" stroke-width="0.5" opacity="0.4"/>
      <line x1="27" y1="12" x2="27" y2="52" stroke="#C62828" stroke-width="0.5" opacity="0.4"/>
      <line x1="12" y1="32" x2="42" y2="32" stroke="#C62828" stroke-width="0.5" opacity="0.4"/>
      <!-- Meander pattern -->
      <path d="M15,55 h5 v-3 h-5 v3 M20,55 h5 v-3 h-5 v3 M25,55 h5 v-3 h-5 v3 M30,55 h5 v-3 h-5 v3 M35,55 h5 v-3 h-5 v3" stroke="#C62828" stroke-width="0.5" fill="none"/>
    </g>
    <text x="117" y="190" font-family="Arial,sans-serif" font-size="8" fill="#5D4037" text-anchor="middle">Орнамент</text>

    <!-- Alphabet -->
    <g transform="translate(160,100)">
      <rect x="0" y="0" width="55" height="70" rx="3" fill="#FFF8E1" stroke="#1565C0" stroke-width="1.5"/>
      <text x="27" y="18" font-family="serif" font-size="10" fill="#C62828" text-anchor="middle">А Б В Г</text>
      <text x="27" y="30" font-family="serif" font-size="10" fill="#C62828" text-anchor="middle">Д Е Ж З</text>
      <text x="27" y="42" font-family="serif" font-size="10" fill="#C62828" text-anchor="middle">И К Л М</text>
      <text x="27" y="54" font-family="serif" font-size="10" fill="#C62828" text-anchor="middle">Н О П Р</text>
      <text x="27" y="66" font-family="serif" font-size="10" fill="#C62828" text-anchor="middle">С Т У Ф</text>
    </g>
    <text x="187" y="190" font-family="Arial,sans-serif" font-size="8" fill="#5D4037" text-anchor="middle">Кириллица</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Культура Древней Руси</text>
</svg>