<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Древняя Русь: политическое устройство</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">История - Урок 1</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Map of Kievan Rus -->
  <g transform="translate(30,90)">
    <rect x="0" y="0" width="200" height="200" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
    <!-- Rivers -->
    <path d="M60,10 Q80,60 100,100 Q120,140 130,190" stroke="#1565C0" stroke-width="2.5" fill="none" opacity="0.5"/>
    <path d="M30,80 Q70,90 110,85 Q140,80 170,95" stroke="#1565C0" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M80,30 Q85,50 75,70" stroke="#1565C0" stroke-width="1.5" fill="none" opacity="0.4"/>
    <!-- Territory outline -->
    <path d="M40,20 L160,15 L190,50 L185,120 L170,170 L130,195 L60,190 L20,150 L15,70 Z" fill="#2E7D32" opacity="0.1" stroke="#2E7D32" stroke-width="1"/>
    <!-- Cities -->
    <circle cx="135" cy="95" r="5" fill="#C62828"/>
    <text x="135" y="88" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Киев</text>
    <circle cx="55" cy="30" r="4" fill="#1565C0"/>
    <text x="55" y="23" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Новгород</text>
    <circle cx="95" cy="55" r="3.5" fill="#2E7D32"/>
    <text x="95" y="48" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Смоленск</text>
    <circle cx="155" cy="60" r="3.5" fill="#2E7D32"/>
    <text x="170" y="55" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Чернигов</text>
    <circle cx="65" cy="100" r="3.5" fill="#2E7D32"/>
    <text x="50" y="103" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Полоцк</text>
    <circle cx="120" cy="50" r="3" fill="#2E7D32"/>
    <text x="120" y="43" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Муром</text>
    <circle cx="160" cy="130" r="3" fill="#2E7D32"/>
    <text x="160" y="145" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Переяславль</text>
    <!-- Trade routes dashed -->
    <path d="M55,30 L95,55 L135,95" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6"/>
    <path d="M135,95 L155,60" stroke="#F9A825" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.6"/>
    <!-- Map label -->
    <text x="100" y="10" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle" opacity="0.6">Карта Древней Руси</text>
  </g>

  <!-- Prince with retinue -->
  <g transform="translate(270,90)">
    <rect x="0" y="0" width="200" height="200" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" opacity="0.9"/>
    <!-- Prince figure (center, taller) -->
    <circle cx="100" cy="50" r="14" fill="#F9A825" stroke="#C62828" stroke-width="1.5"/>
    <!-- Crown -->
    <path d="M86,40 L88,32 L93,38 L98,30 L103,38 L108,32 L110,40" fill="#F9A825" stroke="#C62828" stroke-width="1"/>
    <!-- Prince body -->
    <rect x="88" y="64" width="24" height="50" rx="4" fill="#C62828"/>
    <!-- Scepter -->
    <line x1="115" y1="70" x2="115" y2="115" stroke="#F9A825" stroke-width="2"/>
    <circle cx="115" cy="68" r="4" fill="#F9A825"/>
    <!-- Legs -->
    <line x1="95" y1="114" x2="92" y2="150" stroke="#5D4037" stroke-width="4"/>
    <line x1="105" y1="114" x2="108" y2="150" stroke="#5D4037" stroke-width="4"/>
    <!-- Boots -->
    <rect x="87" y="148" width="10" height="6" rx="2" fill="#5D4037"/>
    <rect x="103" y="148" width="10" height="6" rx="2" fill="#5D4037"/>
    <!-- Retinue left -->
    <circle cx="50" cy="65" r="10" fill="#F9A825" stroke="#888" stroke-width="1"/>
    <rect x="42" y="75" width="16" height="35" rx="3" fill="#1565C0"/>
    <line x1="48" y1="110" x2="46" y2="140" stroke="#5D4037" stroke-width="3"/>
    <line x1="54" y1="110" x2="56" y2="140" stroke="#5D4037" stroke-width="3"/>
    <!-- Sword on retinue -->
    <line x1="58" y1="80" x2="70" y2="60" stroke="#888" stroke-width="1.5"/>
    <rect x="67" y="56" width="8" height="2" rx="1" fill="#888"/>
    <!-- Retinue right -->
    <circle cx="150" cy="65" r="10" fill="#F9A825" stroke="#888" stroke-width="1"/>
    <rect x="142" y="75" width="16" height="35" rx="3" fill="#1565C0"/>
    <line x1="148" y1="110" x2="146" y2="140" stroke="#5D4037" stroke-width="3"/>
    <line x1="154" y1="110" x2="156" y2="140" stroke="#5D4037" stroke-width="3"/>
    <!-- Shield on retinue -->
    <ellipse cx="138" cy="90" rx="10" ry="14" fill="#C62828" stroke="#F9A825" stroke-width="1"/>
    <line x1="138" y1="78" x2="138" y2="102" stroke="#F9A825" stroke-width="0.8"/>
    <line x1="130" y1="90" x2="146" y2="90" stroke="#F9A825" stroke-width="0.8"/>
    <!-- Ground line -->
    <line x1="20" y1="155" x2="180" y2="155" stroke="#5D4037" stroke-width="1" opacity="0.3"/>
    <!-- Label -->
    <text x="100" y="175" font-family="Arial,sans-serif" font-size="9" fill="#5D4037" text-anchor="middle" font-weight="bold">Князь с дружиной</text>
    <!-- Boyar signs -->
    <text x="50" y="185" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">бояре</text>
    <text x="150" y="185" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">воеводы</text>
  </g>

  <!-- Political structure cards -->
  <g transform="translate(30,295)">
    <rect x="0" y="-20" width="60" height="14" rx="3" fill="#C62828" opacity="0.15"/>
    <text x="30" y="-9" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Великий князь</text>
    <rect x="70" y="-20" width="55" height="14" rx="3" fill="#1565C0" opacity="0.15"/>
    <text x="97" y="-9" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Боярская дума</text>
    <rect x="135" y="-20" width="50" height="14" rx="3" fill="#2E7D32" opacity="0.15"/>
    <text x="160" y="-9" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Вече</text>
    <rect x="195" y="-20" width="50" height="14" rx="3" fill="#F9A825" opacity="0.15"/>
    <text x="220" y="-9" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Дружина</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Древняя Русь: политическое устройство</text>
</svg>