<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFFDE7"/></linearGradient></defs><rect width="500" height="350" fill="url(#bg)" rx="10"/><rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/><rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/><polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/><polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/><polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/><polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/><circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/><circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/><text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Первая помощь</text><text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">ОБЖ - Урок 8</text><line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/><rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/><rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/><!-- First Aid Cross --><rect x="140" y="105" width="100" height="100" rx="12" fill="white" stroke="#C62828" stroke-width="3"/><rect x="175" y="118" width="30" height="74" rx="4" fill="#C62828"/><rect x="153" y="140" width="74" height="30" rx="4" fill="#C62828"/><text x="190" y="225" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Знак первой помощи</text><!-- Bandage roll --><rect x="40" y="150" width="50" height="55" rx="6" fill="white" stroke="#ECEFF1" stroke-width="2"/><ellipse cx="65" cy="153" rx="22" ry="10" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1.5"/><ellipse cx="65" cy="153" rx="12" ry="6" fill="white" stroke="#E0E0E0" stroke-width="1"/><rect x="56" y="160" width="18" height="40" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1.5"/><line x1="65" y1="200" x2="80" y2="215" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/><line x1="80" y1="215" x2="90" y2="208" stroke="#E0E0E0" stroke-width="2" stroke-linecap="round"/><text x="65" y="225" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Бинт</text><!-- CPR Steps card --><rect x="290" y="95" width="170" height="115" rx="6" fill="white" opacity="0.6" stroke="#C62828" stroke-width="1.5"/><text x="375" y="115" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">Сердечно-лёгочная</text><text x="375" y="130" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">реанимация (СЛР)</text><text x="305" y="148" font-family="Arial,sans-serif" font-size="10" fill="#333">1. Проверь сознание</text><text x="305" y="163" font-family="Arial,sans-serif" font-size="10" fill="#333">2. Звони 112</text><text x="305" y="178" font-family="Arial,sans-serif" font-size="10" fill="#333">3. 30 нажатий на грудь</text><text x="305" y="193" font-family="Arial,sans-serif" font-size="10" fill="#333">4. 2 вдоха</text><text x="305" y="208" font-family="Arial,sans-serif" font-size="10" fill="#C62828">5. Повторяй до приезда</text><!-- CPR illustration - person on back --><rect x="40" y="248" width="130" height="45" rx="5" fill="white" opacity="0.6" stroke="#1565C0" stroke-width="1.5"/><circle cx="75" cy="262" r="6" fill="#FFCC80"/><line x1="75" y1="268" x2="75" y2="285" stroke="#FFCC80" stroke-width="3" stroke-linecap="round"/><line x1="75" y1="275" x2="63" y2="272" stroke="#FFCC80" stroke-width="2" stroke-linecap="round"/><line x1="75" y1="275" x2="87" y2="272" stroke="#FFCC80" stroke-width="2" stroke-linecap="round"/><!-- Hands doing compressions --><ellipse cx="75" cy="275" rx="12" ry="6" fill="#FFAB91" stroke="#FF8A65" stroke-width="1.5" opacity="0.7"/><text x="105" y="267" font-family="Arial,sans-serif" font-size="8" fill="#C62828">Нажатие</text><text x="105" y="278" font-family="Arial,sans-serif" font-size="8" fill="#C62828">на грудь</text><text x="105" y="289" font-family="Arial,sans-serif" font-size="8" fill="#555">30 раз</text><!-- First aid kit --><rect x="290" y="220" width="80" height="55" rx="6" fill="white" stroke="#C62828" stroke-width="2"/><rect x="320" y="238" width="20" height="20" rx="3" fill="#C62828" opacity="0.2"/><rect x="325" y="243" width="10" height="10" rx="1" fill="#C62828"/><rect x="319" y="246" width="22" height="4" rx="1" fill="#C62828"/><line x1="310" y1="220" x2="320" y2="210" stroke="#C62828" stroke-width="2"/><circle cx="320" cy="208" r="4" fill="none" stroke="#C62828" stroke-width="1.5"/><text x="330" y="290" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Аптечка</text><!-- Wound treatment --><rect x="390" y="222" width="70" height="50" rx="5" fill="white" opacity="0.6" stroke="#F9A825" stroke-width="1.5"/><text x="425" y="238" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Раны:</text><text x="400" y="252" font-family="Arial,sans-serif" font-size="8" fill="#444">&#8226; Промой водой</text><text x="400" y="263" font-family="Arial,sans-serif" font-size="8" fill="#444">&#8226; Наложи бинт</text><!-- Bleeding warning --><rect x="185" y="240" width="95" height="50" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/><text x="232" y="258" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Кровотечение</text><text x="232" y="272" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Зажми рану</text><text x="232" y="284" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">тугой повязкой</text><rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/><text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Первая помощь</text></svg>