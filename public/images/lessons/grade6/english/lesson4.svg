<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Days of the Week and Prepositions</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Иностранный язык - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Calendar Strip with 7 Days -->
  <g transform="translate(20, 88)">
    <!-- Monday -->
    <rect x="0" y="0" width="62" height="38" rx="4" fill="#C62828" opacity="0.15" stroke="#C62828" stroke-width="1.2"/>
    <text x="31" y="16" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">MON</text>
    <text x="31" y="30" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Monday</text>
    <!-- Tuesday -->
    <rect x="66" y="0" width="62" height="38" rx="4" fill="#1565C0" opacity="0.15" stroke="#1565C0" stroke-width="1.2"/>
    <text x="97" y="16" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">TUE</text>
    <text x="97" y="30" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Tuesday</text>
    <!-- Wednesday -->
    <rect x="132" y="0" width="62" height="38" rx="4" fill="#2E7D32" opacity="0.15" stroke="#2E7D32" stroke-width="1.2"/>
    <text x="163" y="16" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">WED</text>
    <text x="163" y="30" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Wednesday</text>
    <!-- Thursday -->
    <rect x="198" y="0" width="62" height="38" rx="4" fill="#F9A825" opacity="0.15" stroke="#F9A825" stroke-width="1.2"/>
    <text x="229" y="16" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">THU</text>
    <text x="229" y="30" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Thursday</text>
    <!-- Friday -->
    <rect x="264" y="0" width="62" height="38" rx="4" fill="#7B1FA2" opacity="0.15" stroke="#7B1FA2" stroke-width="1.2"/>
    <text x="295" y="16" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle" font-weight="bold">FRI</text>
    <text x="295" y="30" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Friday</text>
    <!-- Saturday -->
    <rect x="330" y="0" width="62" height="38" rx="4" fill="#E65100" opacity="0.15" stroke="#E65100" stroke-width="1.2"/>
    <text x="361" y="16" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">SAT</text>
    <text x="361" y="30" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Saturday</text>
    <!-- Sunday -->
    <rect x="396" y="0" width="62" height="38" rx="4" fill="#C62828" opacity="0.12" stroke="#C62828" stroke-width="1.2"/>
    <text x="427" y="16" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">SUN</text>
    <text x="427" y="30" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Sunday</text>
  </g>

  <!-- Preposition Diagrams -->
  <!-- ON - cat on the table -->
  <g transform="translate(30, 142)">
    <rect x="0" y="0" width="105" height="75" rx="6" fill="white" stroke="#C62828" stroke-width="1.2"/>
    <text x="52" y="14" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">ON</text>
    <!-- Table -->
    <rect x="20" y="50" width="65" height="6" rx="2" fill="#8D6E63"/>
    <rect x="28" y="56" width="5" height="14" rx="1" fill="#6D4C41"/>
    <rect x="72" y="56" width="5" height="14" rx="1" fill="#6D4C41"/>
    <!-- Cat on table -->
    <ellipse cx="52" cy="46" rx="12" ry="5" fill="#FF8A65"/>
    <circle cx="52" cy="38" r="7" fill="#FF8A65"/>
    <polygon points="45,33 47,28 49,33" fill="#FF8A65"/>
    <polygon points="55,33 57,28 59,33" fill="#FF8A65"/>
    <circle cx="49" cy="37" r="1.5" fill="#5D4037"/>
    <circle cx="55" cy="37" r="1.5" fill="#5D4037"/>
    <path d="M50,41 L52,43 L54,41" fill="none" stroke="#5D4037" stroke-width="0.8"/>
    <!-- Arrow -->
    <line x1="52" y1="28" x2="52" y2="20" stroke="#C62828" stroke-width="1" marker-end="none"/>
    <text x="52" y="19" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">on</text>
  </g>

  <!-- UNDER - ball under the table -->
  <g transform="translate(150, 142)">
    <rect x="0" y="0" width="105" height="75" rx="6" fill="white" stroke="#1565C0" stroke-width="1.2"/>
    <text x="52" y="14" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">UNDER</text>
    <!-- Table -->
    <rect x="20" y="40" width="65" height="6" rx="2" fill="#8D6E63"/>
    <rect x="28" y="46" width="5" height="22" rx="1" fill="#6D4C41"/>
    <rect x="72" y="46" width="5" height="22" rx="1" fill="#6D4C41"/>
    <!-- Ball under table -->
    <circle cx="52" cy="62" r="8" fill="#42A5F5"/>
    <path d="M48,56 Q52,54 56,56" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
    <!-- Arrow -->
    <line x1="65" y1="62" x2="78" y2="62" stroke="#1565C0" stroke-width="1"/>
    <text x="85" y="65" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="start">under</text>
  </g>

  <!-- NEXT TO - chair next to the table -->
  <g transform="translate(270, 142)">
    <rect x="0" y="0" width="105" height="75" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.2"/>
    <text x="52" y="14" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">NEXT TO</text>
    <!-- Table -->
    <rect x="25" y="40" width="40" height="6" rx="2" fill="#8D6E63"/>
    <rect x="30" y="46" width="4" height="20" rx="1" fill="#6D4C41"/>
    <rect x="56" y="46" width="4" height="20" rx="1" fill="#6D4C41"/>
    <!-- Chair next to table -->
    <rect x="72" y="35" width="20" height="4" rx="1" fill="#A1887F"/>
    <rect x="72" y="39" width="20" height="25" rx="1" fill="#BCAAA4"/>
    <rect x="72" y="25" width="20" height="12" rx="1" fill="#A1887F"/>
    <rect x="72" y="64" width="4" height="5" rx="1" fill="#8D6E63"/>
    <rect x="88" y="64" width="4" height="5" rx="1" fill="#8D6E63"/>
    <!-- Arrow -->
    <path d="M67,45 L72,45" fill="none" stroke="#2E7D32" stroke-width="1"/>
    <text x="52" y="72" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">next to</text>
  </g>

  <!-- IN - apple in the box -->
  <g transform="translate(390, 142)">
    <rect x="0" y="0" width="90" height="75" rx="6" fill="white" stroke="#F9A825" stroke-width="1.2"/>
    <text x="45" y="14" font-family="Arial,sans-serif" font-size="11" fill="#F9A825" text-anchor="middle" font-weight="bold">IN</text>
    <!-- Box (3D-ish) -->
    <rect x="18" y="35" width="55" height="30" rx="2" fill="#FFE0B2" stroke="#F9A825" stroke-width="1"/>
    <line x1="18" y1="35" x2="45" y2="22" stroke="#F9A825" stroke-width="1"/>
    <line x1="73" y1="35" x2="45" y2="22" stroke="#F9A825" stroke-width="1"/>
    <polygon points="18,35 45,22 45,35" fill="#FFF3E0" stroke="#F9A825" stroke-width="0.5"/>
    <!-- Apple inside -->
    <circle cx="45" cy="48" r="8" fill="#C62828"/>
    <line x1="45" y1="40" x2="47" y2="36" stroke="#5D4037" stroke-width="1.2"/>
    <ellipse cx="49" cy="37" rx="3" ry="2" fill="#4CAF50"/>
    <!-- Arrow -->
    <line x1="45" y1="55" x2="45" y2="62" stroke="#F9A825" stroke-width="1"/>
    <text x="45" y="72" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">in</text>
  </g>

  <!-- Additional prepositions row -->
  <!-- IN FRONT OF -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="95" height="55" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
    <!-- Tree -->
    <rect x="50" y="28" width="6" height="18" fill="#795548"/>
    <circle cx="53" cy="22" r="14" fill="#4CAF50"/>
    <!-- Person in front -->
    <circle cx="30" cy="33" r="5" fill="#FFCC80"/>
    <rect x="27" y="38" width="6" height="12" rx="2" fill="#1565C0"/>
    <text x="48" y="50" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">in front of</text>
  </g>
  <!-- BEHIND -->
  <g transform="translate(160, 230)">
    <rect x="0" y="0" width="95" height="55" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <!-- Person -->
    <circle cx="55" cy="33" r="5" fill="#FFCC80"/>
    <rect x="52" y="38" width="6" height="12" rx="2" fill="#C62828"/>
    <!-- Tree behind (partially hidden) -->
    <rect x="22" y="28" width="6" height="18" fill="#795548"/>
    <circle cx="25" cy="22" r="14" fill="#66BB6A" opacity="0.7"/>
    <text x="48" y="50" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">behind</text>
  </g>
  <!-- BETWEEN -->
  <g transform="translate(270, 230)">
    <rect x="0" y="0" width="95" height="55" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <!-- Left object (lamp) -->
    <rect x="12" y="25" width="4" height="18" fill="#F9A825"/>
    <ellipse cx="14" cy="24" rx="8" ry="5" fill="#FFD54F"/>
    <!-- Right object (book) -->
    <rect x="72" y="28" width="14" height="18" rx="2" fill="#7B1FA2"/>
    <!-- Cat between -->
    <ellipse cx="48" cy="40" rx="8" ry="4" fill="#FF8A65"/>
    <circle cx="48" cy="34" r="5" fill="#FF8A65"/>
    <polygon points="43,30 45,26 47,30" fill="#FF8A65"/>
    <polygon points="49,30 51,26 53,30" fill="#FF8A65"/>
    <text x="48" y="50" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">between</text>
  </g>

  <!-- Weekday phrases -->
  <g transform="translate(130, 295)">
    <rect x="0" y="0" width="55" height="14" rx="7" fill="#C62828" opacity="0.1"/>
    <text x="27" y="11" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">on Monday</text>
  </g>
  <g transform="translate(195, 295)">
    <rect x="0" y="0" width="70" height="14" rx="7" fill="#1565C0" opacity="0.1"/>
    <text x="35" y="11" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">at the weekend</text>
  </g>
  <g transform="translate(275, 295)">
    <rect x="0" y="0" width="55" height="14" rx="7" fill="#2E7D32" opacity="0.1"/>
    <text x="27" y="11" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">next week</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Days of the Week and Prepositions</text>
</svg>