<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Time and Daily Activities</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Иностранный язык - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Large Clock Face -->
  <g transform="translate(70, 130)">
    <circle cx="55" cy="55" r="52" fill="white" stroke="#C62828" stroke-width="2.5"/>
    <circle cx="55" cy="55" r="48" fill="none" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>
    <!-- Hour markers -->
    <line x1="55" y1="8" x2="55" y2="14" stroke="#C62828" stroke-width="2"/>
    <line x1="55" y1="96" x2="55" y2="102" stroke="#C62828" stroke-width="2"/>
    <line x1="8" y1="55" x2="14" y2="55" stroke="#C62828" stroke-width="2"/>
    <line x1="96" y1="55" x2="102" y2="55" stroke="#C62828" stroke-width="2"/>
    <!-- Small hour markers -->
    <line x1="78" y1="14" x2="75" y2="20" stroke="#C62828" stroke-width="1"/>
    <line x1="96" y1="32" x2="90" y2="35" stroke="#C62828" stroke-width="1"/>
    <line x1="96" y1="78" x2="90" y2="75" stroke="#C62828" stroke-width="1"/>
    <line x1="78" y1="96" x2="75" y2="90" stroke="#C62828" stroke-width="1"/>
    <line x1="32" y1="96" x2="35" y2="90" stroke="#C62828" stroke-width="1"/>
    <line x1="14" y1="78" x2="20" y2="75" stroke="#C62828" stroke-width="1"/>
    <line x1="14" y1="32" x2="20" y2="35" stroke="#C62828" stroke-width="1"/>
    <line x1="32" y1="14" x2="35" y2="20" stroke="#C62828" stroke-width="1"/>
    <!-- Numbers -->
    <text x="55" y="22" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">12</text>
    <text x="99" y="58" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">3</text>
    <text x="55" y="98" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">6</text>
    <text x="14" y="58" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">9</text>
    <!-- Hour hand (pointing to 7) -->
    <line x1="55" y1="55" x2="55" y2="25" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
    <!-- Minute hand (pointing to 12) -->
    <line x1="55" y1="55" x2="75" y2="35" stroke="#1565C0" stroke-width="2" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="55" cy="55" r="3" fill="#C62828"/>
    <!-- Time label -->
    <text x="55" y="120" font-family="Arial,sans-serif" font-size="13" fill="#C62828" text-anchor="middle" font-weight="bold">7:00</text>
  </g>

  <!-- Small clocks showing different times -->
  <!-- 12:30 -->
  <g transform="translate(200, 88)">
    <circle cx="22" cy="22" r="20" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <line x1="22" y1="5" x2="22" y2="9" stroke="#1565C0" stroke-width="1"/>
    <line x1="22" y1="35" x2="22" y2="39" stroke="#1565C0" stroke-width="1"/>
    <line x1="5" y1="22" x2="9" y2="22" stroke="#1565C0" stroke-width="1"/>
    <line x1="35" y1="22" x2="39" y2="22" stroke="#1565C0" stroke-width="1"/>
    <line x1="22" y1="22" x2="22" y2="8" stroke="#C62828" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="22" x2="32" y2="22" stroke="#1565C0" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="22" cy="22" r="2" fill="#C62828"/>
    <text x="22" y="52" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">12:30</text>
  </g>
  <!-- 3:15 -->
  <g transform="translate(280, 88)">
    <circle cx="22" cy="22" r="20" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
    <line x1="22" y1="5" x2="22" y2="9" stroke="#2E7D32" stroke-width="1"/>
    <line x1="22" y1="35" x2="22" y2="39" stroke="#2E7D32" stroke-width="1"/>
    <line x1="5" y1="22" x2="9" y2="22" stroke="#2E7D32" stroke-width="1"/>
    <line x1="35" y1="22" x2="39" y2="22" stroke="#2E7D32" stroke-width="1"/>
    <line x1="22" y1="22" x2="33" y2="28" stroke="#C62828" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="22" x2="22" y2="8" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="22" cy="22" r="2" fill="#C62828"/>
    <text x="22" y="52" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">3:15</text>
  </g>
  <!-- 9:45 -->
  <g transform="translate(360, 88)">
    <circle cx="22" cy="22" r="20" fill="white" stroke="#F9A825" stroke-width="1.5"/>
    <line x1="22" y1="5" x2="22" y2="9" stroke="#F9A825" stroke-width="1"/>
    <line x1="22" y1="35" x2="22" y2="39" stroke="#F9A825" stroke-width="1"/>
    <line x1="5" y1="22" x2="9" y2="22" stroke="#F9A825" stroke-width="1"/>
    <line x1="35" y1="22" x2="39" y2="22" stroke="#F9A825" stroke-width="1"/>
    <line x1="22" y1="22" x2="11" y2="28" stroke="#C62828" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="22" x2="22" y2="8" stroke="#F9A825" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="22" cy="22" r="2" fill="#C62828"/>
    <text x="22" y="52" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">9:45</text>
  </g>

  <!-- Daily Routine Icons -->
  <!-- Wake Up -->
  <g transform="translate(30, 195)">
    <rect x="0" y="0" width="78" height="55" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
    <!-- Bed icon -->
    <rect x="10" y="20" width="40" height="12" rx="2" fill="#8D6E63"/>
    <rect x="8" y="32" width="4" height="12" rx="1" fill="#5D4037"/>
    <rect x="48" y="32" width="4" height="12" rx="1" fill="#5D4037"/>
    <rect x="10" y="12" width="16" height="10" rx="3" fill="white" stroke="#8D6E63" stroke-width="0.5"/>
    <!-- ZZZ -->
    <text x="58" y="14" font-family="Arial,sans-serif" font-size="8" fill="#E65100" opacity="0.6">z</text>
    <text x="63" y="9" font-family="Arial,sans-serif" font-size="10" fill="#E65100" opacity="0.8">z</text>
    <text x="68" y="5" font-family="Arial,sans-serif" font-size="12" fill="#E65100">z</text>
    <text x="39" y="50" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">wake up</text>
  </g>
  <!-- Breakfast -->
  <g transform="translate(120, 195)">
    <rect x="0" y="0" width="78" height="55" rx="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
    <!-- Bowl and spoon -->
    <ellipse cx="35" cy="30" rx="18" ry="10" fill="#FFECB3" stroke="#F9A825" stroke-width="1"/>
    <path d="M17,30 Q17,40 35,40 Q53,40 53,30" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
    <line x1="50" y1="15" x2="65" y2="28" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="66" cy="29" rx="4" ry="3" fill="#8D6E63"/>
    <!-- Steam -->
    <path d="M30,18 Q28,12 32,8" fill="none" stroke="#F9A825" stroke-width="0.8" opacity="0.5"/>
    <path d="M38,16 Q36,10 40,6" fill="none" stroke="#F9A825" stroke-width="0.8" opacity="0.5"/>
    <text x="39" y="50" font-family="Arial,sans-serif" font-size="8" fill="#F9A825" text-anchor="middle" font-weight="bold">breakfast</text>
  </g>
  <!-- School -->
  <g transform="translate(210, 195)">
    <rect x="0" y="0" width="78" height="55" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <!-- School building -->
    <rect x="18" y="15" width="38" height="28" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
    <polygon points="18,15 37,4 56,15" fill="#C62828" stroke="#B71C1C" stroke-width="0.5"/>
    <rect x="28" y="26" width="10" height="10" rx="1" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
    <rect x="44" y="22" width="8" height="8" rx="1" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
    <rect x="12" y="22" width="8" height="8" rx="1" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
    <!-- Door -->
    <rect x="33" y="33" width="8" height="10" rx="1" fill="#5D4037"/>
    <circle cx="39" cy="38" r="1" fill="#F9A825"/>
    <text x="39" y="50" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">school</text>
  </g>
  <!-- Homework -->
  <g transform="translate(300, 195)">
    <rect x="0" y="0" width="78" height="55" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
    <!-- Book and pencil -->
    <rect x="15" y="14" width="30" height="28" rx="2" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1"/>
    <line x1="20" y1="22" x2="40" y2="22" stroke="#7B1FA2" stroke-width="0.5" opacity="0.5"/>
    <line x1="20" y1="27" x2="40" y2="27" stroke="#7B1FA2" stroke-width="0.5" opacity="0.5"/>
    <line x1="20" y1="32" x2="35" y2="32" stroke="#7B1FA2" stroke-width="0.5" opacity="0.5"/>
    <!-- Pencil -->
    <rect x="50" y="14" width="5" height="30" rx="1" fill="#F9A825" stroke="#F57F17" stroke-width="0.5"/>
    <polygon points="50,44 52.5,50 55,44" fill="#FFCC80" stroke="#F57F17" stroke-width="0.5"/>
    <rect x="50" y="14" width="5" height="5" fill="#EF5350"/>
    <text x="39" y="50" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">homework</text>
  </g>
  <!-- Sleep -->
  <g transform="translate(390, 195)">
    <rect x="0" y="0" width="78" height="55" rx="6" fill="#E8EAF6" stroke="#283593" stroke-width="1"/>
    <!-- Moon -->
    <circle cx="45" cy="18" r="12" fill="#FDD835"/>
    <circle cx="50" cy="14" r="10" fill="#E3F2FD"/>
    <!-- Stars -->
    <text x="25" y="14" font-family="Arial,sans-serif" font-size="6" fill="#FDD835">*</text>
    <text x="60" y="10" font-family="Arial,sans-serif" font-size="8" fill="#FDD835">*</text>
    <text x="65" y="22" font-family="Arial,sans-serif" font-size="5" fill="#FDD835">*</text>
    <!-- Bed -->
    <rect x="12" y="30" width="45" height="10" rx="2" fill="#5C6BC0"/>
    <rect x="10" y="40" width="3" height="8" rx="1" fill="#3949AB"/>
    <rect x="54" y="40" width="3" height="8" rx="1" fill="#3949AB"/>
    <rect x="12" y="24" width="14" height="8" rx="2" fill="white" stroke="#5C6BC0" stroke-width="0.5"/>
    <text x="39" y="50" font-family="Arial,sans-serif" font-size="8" fill="#283593" text-anchor="middle" font-weight="bold">sleep</text>
  </g>

  <!-- Time phrases -->
  <g transform="translate(180, 262)">
    <rect x="0" y="0" width="65" height="18" rx="9" fill="#C62828" opacity="0.1"/>
    <text x="32" y="13" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">in the morning</text>
  </g>
  <g transform="translate(255, 262)">
    <rect x="0" y="0" width="65" height="18" rx="9" fill="#1565C0" opacity="0.1"/>
    <text x="32" y="13" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">in the afternoon</text>
  </g>
  <g transform="translate(330, 262)">
    <rect x="0" y="0" width="58" height="18" rx="9" fill="#283593" opacity="0.1"/>
    <text x="29" y="13" font-family="Arial,sans-serif" font-size="9" fill="#283593" text-anchor="middle" font-weight="bold">at night</text>
  </g>

  <!-- o'clock / half past / quarter labels -->
  <g transform="translate(200, 290)">
    <rect x="0" y="0" width="40" height="14" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
    <text x="20" y="11" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">o'clock</text>
  </g>
  <g transform="translate(250, 290)">
    <rect x="0" y="0" width="48" height="14" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
    <text x="24" y="11" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">half past</text>
  </g>
  <g transform="translate(308, 290)">
    <rect x="0" y="0" width="52" height="14" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
    <text x="26" y="11" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">quarter to</text>
  </g>

  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Time and Daily Activities</text>
</svg>