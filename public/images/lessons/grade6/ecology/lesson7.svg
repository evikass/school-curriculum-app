<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#C62828" text-anchor="middle">Рациональное потребление</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Экология - Урок 7</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Top left: Recycling symbol -->
  <rect x="30" y="90" width="120" height="100" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="90" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ПЕРЕРАБОТКА</text>
  
  <!-- Recycling triangle (3 arrows) -->
  <g transform="translate(90,150)">
    <!-- Arrow 1 (top) -->
    <polygon points="0,-28 -12,-5 5,-5 5,-12 12,2 -5,2 -5,-5" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.5"/>
    <!-- Arrow 2 (bottom-right) -->
    <polygon points="24,14 0,22 4,5 -3,8 -7,-8 10,-4 4,5" fill="#43A047" stroke="#2E7D32" stroke-width="0.5"/>
    <!-- Arrow 3 (bottom-left) -->
    <polygon points="-24,14 0,22 -4,5 3,8 7,-8 -10,-4 -4,5" fill="#66BB6A" stroke="#43A047" stroke-width="0.5"/>
  </g>

  <!-- Top center: 4R Rule -->
  <rect x="160" y="90" width="170" height="100" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="245" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">ПРАВИЛО 4R</text>
  
  <!-- R1: Refuse -->
  <g transform="translate(190,135)">
    <rect x="-15" y="-15" width="30" height="30" rx="3" fill="#FFEBEE" stroke="#E53935" stroke-width="1"/>
    <text x="0" y="-2" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle" font-weight="bold">R1</text>
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="6" fill="#757575" text-anchor="middle">Откажись</text>
    <!-- X on plastic bag -->
    <rect x="-8" y="-14" width="16" height="12" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
    <line x1="-4" y1="-12" x2="4" y2="-6" stroke="#E53935" stroke-width="1.5"/>
    <line x1="4" y1="-12" x2="-4" y2="-6" stroke="#E53935" stroke-width="1.5"/>
  </g>
  
  <!-- R2: Reduce -->
  <g transform="translate(230,135)">
    <rect x="-15" y="-15" width="30" height="30" rx="3" fill="#E8F5E9" stroke="#43A047" stroke-width="1"/>
    <text x="0" y="-2" font-family="Arial,sans-serif" font-size="7" fill="#43A047" text-anchor="middle" font-weight="bold">R2</text>
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="6" fill="#757575" text-anchor="middle">Уменьши</text>
    <!-- Downward arrow -->
    <line x1="0" y1="-14" x2="0" y2="-7" stroke="#43A047" stroke-width="1.5"/>
    <polygon points="0,-6 -3,-10 3,-10" fill="#43A047"/>
  </g>
  
  <!-- R3: Reuse -->
  <g transform="translate(270,135)">
    <rect x="-15" y="-15" width="30" height="30" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <text x="0" y="-2" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">R3</text>
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="6" fill="#757575" text-anchor="middle">Используй</text>
    <!-- Circular arrow -->
    <path d="M-4,-14 A6,6 0 1,1 4,-14" stroke="#1565C0" stroke-width="1.5" fill="none"/>
    <polygon points="4,-14 2,-17 6,-16" fill="#1565C0"/>
  </g>
  
  <!-- R4: Recycle -->
  <g transform="translate(310,135)">
    <rect x="-15" y="-15" width="30" height="30" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
    <text x="0" y="-2" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle" font-weight="bold">R4</text>
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="6" fill="#757575" text-anchor="middle">Переработай</text>
    <!-- Mini recycling bin -->
    <rect x="-5" y="-14" width="10" height="10" rx="1" fill="#2E7D32"/>
    <rect x="-7" y="-15" width="14" height="2" rx="1" fill="#2E7D32"/>
  </g>
  
  <!-- Labels under 4R -->
  <text x="190" y="162" font-family="Arial,sans-serif" font-size="5" fill="#E53935" text-anchor="middle">Refuse</text>
  <text x="230" y="162" font-family="Arial,sans-serif" font-size="5" fill="#43A047" text-anchor="middle">Reduce</text>
  <text x="270" y="162" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Reuse</text>
  <text x="310" y="162" font-family="Arial,sans-serif" font-size="5" fill="#F9A825" text-anchor="middle">Recycle</text>

  <!-- Top right: Ecological footprint -->
  <rect x="340" y="90" width="130" height="100" rx="5" fill="white" stroke="#8D6E63" stroke-width="1.5" opacity="0.9"/>
  <text x="405" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#8D6E63" text-anchor="middle">ЭКОЛОГИЧЕСКИЙ СЛЕД</text>
  
  <!-- Boot print -->
  <g transform="translate(390,155)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#A1887F" stroke="#795548" stroke-width="1"/>
    <!-- Sole tread -->
    <line x1="-8" y1="3" x2="-8" y2="6" stroke="#795548" stroke-width="1"/>
    <line x1="-4" y1="3" x2="-4" y2="7" stroke="#795548" stroke-width="1"/>
    <line x1="0" y1="3" x2="0" y2="7" stroke="#795548" stroke-width="1"/>
    <line x1="4" y1="3" x2="4" y2="6" stroke="#795548" stroke-width="1"/>
    <line x1="8" y1="3" x2="8" y2="5" stroke="#795548" stroke-width="1"/>
    <!-- Leaf inside print -->
    <path d="M-3,-3 Q0,-8 3,-3 Q0,2 -3,-3 Z" fill="#43A047"/>
  </g>
  
  <!-- Second boot print (walking) -->
  <g transform="translate(418,148)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#8D6E63" stroke="#6D4C41" stroke-width="1" opacity="0.6"/>
    <line x1="-8" y1="3" x2="-8" y2="6" stroke="#6D4C41" stroke-width="1" opacity="0.6"/>
    <line x1="-4" y1="3" x2="-4" y2="7" stroke="#6D4C41" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="3" x2="0" y2="7" stroke="#6D4C41" stroke-width="1" opacity="0.6"/>
    <line x1="4" y1="3" x2="4" y2="6" stroke="#6D4C41" stroke-width="1" opacity="0.6"/>
  </g>
  
  <text x="405" y="175" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">уменьши свой след!</text>

  <!-- Bottom left: Shopping bags comparison -->
  <rect x="30" y="200" width="160" height="95" rx="5" fill="white" stroke="#E53935" stroke-width="1.5" opacity="0.9"/>
  <text x="110" y="215" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E53935" text-anchor="middle">ПЛАСТИК vs МНОГОРАЗОВЫЙ</text>
  
  <!-- Plastic bag (bad) -->
  <g transform="translate(70,258)">
    <path d="M-12,-20 L-12,15 Q-12,20 -7,20 L7,20 Q12,20 12,15 L12,-20 Z" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="1"/>
    <path d="M-6,-20 Q0,-28 6,-20" stroke="#BDBDBD" stroke-width="1.5" fill="none"/>
    <text x="0" y="8" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle" font-weight="bold">X</text>
  </g>
  <text x="70" y="286" font-family="Arial,sans-serif" font-size="6" fill="#E53935" text-anchor="middle">1 раз</text>
  
  <!-- Arrow -->
  <text x="110" y="258" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle">&gt;</text>
  
  <!-- Reusable bag (good) -->
  <g transform="translate(150,258)">
    <rect x="-14" y="-10" width="28" height="30" rx="3" fill="#43A047" stroke="#2E7D32" stroke-width="1.5"/>
    <path d="M-6,-10 Q0,-20 6,-10" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
    <!-- Leaf on bag -->
    <path d="M-3,5 Q0,-2 3,5 Q0,10 -3,5 Z" fill="#A5D6A7"/>
    <text x="0" y="16" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">+</text>
  </g>
  <text x="150" y="286" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">много раз</text>

  <!-- Bottom center: Recycle loop diagram -->
  <rect x="200" y="200" width="140" height="95" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="270" y="215" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ЦИКЛ ПЕРЕРАБОТКИ</text>
  
  <!-- Raw material -->
  <rect x="215" y="225" width="30" height="25" rx="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="230" y="240" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Сырьё</text>
  
  <!-- Arrow right -->
  <line x1="248" y1="237" x2="260" y2="237" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="260,237 256,234 256,240" fill="#2E7D32"/>
  
  <!-- Product -->
  <rect x="263" y="225" width="30" height="25" rx="3" fill="#B3E5FC" stroke="#1565C0" stroke-width="0.5"/>
  <text x="278" y="240" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Товар</text>
  
  <!-- Arrow down -->
  <line x1="278" y1="253" x2="278" y2="263" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="278,263 275,259 281,259" fill="#1565C0"/>
  
  <!-- Use -->
  <rect x="263" y="265" width="30" height="20" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.5"/>
  <text x="278" y="278" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">Использ.</text>
  
  <!-- Arrow left -->
  <line x1="261" y1="275" x2="250" y2="275" stroke="#F9A825" stroke-width="1.5"/>
  <polygon points="250,275 254,272 254,278" fill="#F9A825"/>
  
  <!-- Recycle -->
  <rect x="218" y="265" width="30" height="20" rx="3" fill="#C8E6C9" stroke="#43A047" stroke-width="0.5"/>
  <text x="233" y="278" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Перераб.</text>
  
  <!-- Arrow up -->
  <line x1="233" y1="263" x2="233" y2="253" stroke="#43A047" stroke-width="1.5"/>
  <polygon points="233,253 230,257 236,257" fill="#43A047"/>

  <!-- Bottom right: Refill bottle -->
  <rect x="350" y="200" width="120" height="95" rx="5" fill="white" stroke="#43A047" stroke-width="1.5" opacity="0.9"/>
  <text x="410" y="215" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#43A047" text-anchor="middle">МНОГОРАЗОВАЯ ТАРА</text>
  
  <!-- Water bottle -->
  <g transform="translate(395,255)">
    <!-- Bottle body -->
    <rect x="-10" y="-15" width="20" height="35" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <!-- Bottle neck -->
    <rect x="-5" y="-22" width="10" height="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <!-- Cap -->
    <rect x="-6" y="-25" width="12" height="4" rx="1" fill="#43A047"/>
    <!-- Water level -->
    <rect x="-9" y="0" width="18" height="18" rx="3" fill="#42A5F5" opacity="0.4"/>
    <!-- Refill arrow -->
    <path d="M15,-25 Q20,-15 15,-5" stroke="#43A047" stroke-width="2" fill="none"/>
    <polygon points="15,-5 12,-10 18,-10" fill="#43A047"/>
    <!-- Water drops -->
    <ellipse cx="19" cy="-18" rx="2" ry="3" fill="#42A5F5" opacity="0.6"/>
    <ellipse cx="22" cy="-12" rx="2" ry="3" fill="#42A5F5" opacity="0.4"/>
  </g>
  
  <text x="410" y="288" font-family="Arial,sans-serif" font-size="7" fill="#43A047" text-anchor="middle">повторное наполнение</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Рациональное потребление</text>
</svg>