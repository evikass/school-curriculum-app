<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#C62828" text-anchor="middle">Что такое устойчивое развитие</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Экология - Урок 5</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Left panel: Three pillars Venn diagram -->
  <rect x="30" y="90" width="230" height="205" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="145" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ТРИ СТОЛПА УСТОЙЧИВОСТИ</text>

  <!-- Venn diagram circles -->
  <!-- Ecology (top) -->
  <circle cx="145" cy="155" r="42" fill="#2E7D32" opacity="0.2" stroke="#2E7D32" stroke-width="2"/>
  <text x="145" y="148" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">ЭКОЛОГИЯ</text>
  <!-- Tree icon -->
  <rect x="142" y="153" width="4" height="8" fill="#795548"/>
  <circle cx="144" cy="151" r="5" fill="#43A047"/>

  <!-- Economy (bottom-left) -->
  <circle cx="115" cy="205" r="42" fill="#F9A825" opacity="0.2" stroke="#F9A825" stroke-width="2"/>
  <text x="95" y="208" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">ЭКОНО</text>
  <text x="95" y="218" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">МИКА</text>
  <!-- Coin icon -->
  <circle cx="130" cy="215" r="6" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <text x="130" y="219" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">$</text>

  <!-- Society (bottom-right) -->
  <circle cx="175" cy="205" r="42" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="2"/>
  <text x="190" y="208" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">ОБЩЕ</text>
  <text x="190" y="218" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">СТВО</text>
