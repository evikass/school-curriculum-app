  <!-- Scale pillar -->
  <rect x="367" y="125" width="6" height="72" fill="#757575" stroke="#5D4037" stroke-width="1"/>
  <!-- Scale beam -->
  <line x1="305" y1="128" x2="435" y2="128" stroke="#5D4037" stroke-width="3"/>
  <!-- Scale triangle top -->
  <polygon points="370,115 363,125 377,125" fill="#757575" stroke="#5D4037" stroke-width="1"/>
  
  <!-- Left pan: Nature -->
  <line x1="305" y1="128" x2="305" y2="140" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="290" y1="140" x2="320" y2="140" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="290" y1="140" x2="295" y2="148" stroke="#5D4037" stroke-width="1"/>
  <line x1="320" y1="140" x2="315" y2="148" stroke="#5D4037" stroke-width="1"/>
  <!-- Nature in pan -->
  <rect x="295" y="148" width="20" height="12" fill="#43A047" rx="1"/>
  <circle cx="305" cy="143" r="7" fill="#2E7D32"/>
  <text x="305" y="170" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">ПРИРОДА</text>
  
  <!-- Right pan: Human needs -->
  <line x1="435" y1="128" x2="435" y2="140" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="420" y1="140" x2="450" y2="140" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="420" y1="140" x2="425" y2="148" stroke="#5D4037" stroke-width="1"/>
  <line x1="450" y1="140" x2="445" y2="148" stroke="#5D4037" stroke-width="1"/>
  <!-- Human needs in pan -->
  <rect x="425" y="148" width="20" height="12" fill="#F9A825" rx="1"/>
  <circle cx="435" cy="143" r="7" fill="#F9A825"/>
  <text x="435" y="146" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle" font-weight="bold">H</text>
  <text x="435" y="170" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle" font-weight="bold">ПОТРЕБНОСТИ</text>

  <!-- Equal sign on top -->
  <text x="370" y="113" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">=</text>

  <!-- Right bottom panel: SDG grid -->
  <rect x="270" y="228" width="200" height="67" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="370" y="242" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">ЦЕЛИ УСТОЙЧИВОГО РАЗВИТИЯ ООН (17 ЦУР)</text>
  
  <!-- SDG colored grid - simplified 6x3 grid -->
  <!-- Row 1 -->
  <rect x="278" y="248" width="16" height="14" rx="2" fill="#E5243B"/>
  <text x="286" y="259" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">1</text>
  <rect x="298" y="248" width="16" height="14" rx="2" fill="#DDA63A"/>
  <text x="306" y="259" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">2</text>
  <rect x="318" y="248" width="16" height="14" rx="2" fill="#4C9F38"/>
  <text x="326" y="259" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">3</text>
  <rect x="338" y="248" width="16" height="14" rx="2" fill="#C5192D"/>
  <text x="346" y="259" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">4</text>
  <rect x="358" y="248" width="16" height="14" rx="2" fill="#FF3A21"/>
  <text x="366" y="259" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">5</text>
  <rect x="378" y="248" width="16" height="14" rx="2" fill="#26BDE2"/>
  <text x="386" y="259" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">6</text>
  <rect x="398" y="248" width="16" height="14" rx="2" fill="#FCC30B"/>
  <text x="406" y="259" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">7</text>
  <rect x="418" y="248" width="16" height="14" rx="2" fill="#A21942"/>
  <text x="426" y="259" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">8</text>
  <rect x="438" y="248" width="16" height="14" rx="2" fill="#FD6925"/>
  <text x="446" y="259" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">9</text>
  
  <!-- Row 2 -->
  <rect x="278" y="266" width="16" height="14" rx="2" fill="#DD1367"/>
  <text x="286" y="277" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">10</text>
  <rect x="298" y="266" width="16" height="14" rx="2" fill="#FD9D24"/>
  <text x="306" y="277" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">11</text>
  <rect x="318" y="266" width="16" height="14" rx="2" fill="#BF8B2E"/>
  <text x="326" y="277" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">12</text>
  <rect x="338" y="266" width="16" height="14" rx="2" fill="#3F7E44"/>
  <text x="346" y="277" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">13</text>
  <rect x="358" y="266" width="16" height="14" rx="2" fill="#0A97D9"/>
  <text x="366" y="277" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">14</text>
  <rect x="378" y="266" width="16" height="14" rx="2" fill="#56C02B"/>
  <text x="386" y="277" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">15</text>
  <rect x="398" y="266" width="16" height="14" rx="2" fill="#00689D"/>
  <text x="406" y="277" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">16</text>
  <rect x="418" y="266" width="16" height="14" rx="2" fill="#19486A"/>
  <text x="426" y="277" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">17</text>

  <!-- Globe with plant in left panel bottom -->
  <g transform="translate(145,260)">
    <circle cx="0" cy="0" r="20" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
    <!-- Continents simplified -->
    <ellipse cx="-5" cy="-5" rx="8" ry="6" fill="#A5D6A7" opacity="0.7"/>
    <ellipse cx="8" cy="5" rx="5" ry="7" fill="#81C784" opacity="0.7"/>
    <ellipse cx="-8" cy="8" rx="4" ry="3" fill="#66BB6A" opacity="0.6"/>
    <!-- Plant growing from globe -->
    <rect x="-1" y="-25" width="3" height="8" fill="#43A047"/>
    <circle cx="1" cy="-28" r="6" fill="#2E7D32"/>
    <path d="M1,-22 Q6,-18 8,-22" stroke="#43A047" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Что такое устойчивое развитие</text>
