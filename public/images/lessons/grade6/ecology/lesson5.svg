  <text x="370" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">БАЛАНС ПРИРОДЫ И ЧЕЛОВЕКА</text>

  <!-- Scale base -->
