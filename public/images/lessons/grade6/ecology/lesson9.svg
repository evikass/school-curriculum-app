<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#C62828" text-anchor="middle">Школьные эко-проекты</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Экология - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Main scene -->
  <rect x="30" y="90" width="300" height="205" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="180" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ЭКОЛОГИЧЕСКАЯ ПЛОЩАДКА ШКОЛЫ</text>

  <!-- Sky -->
  <rect x="35" y="110" width="290" height="60" fill="#E3F2FD"/>
  <!-- Sun -->
  <circle cx="300" cy="125" r="14" fill="#F9A825" opacity="0.5"/>
  
  <!-- School building -->
  <rect x="45" y="140" width="90" height="80" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <polygon points="40,140 90,110 140,140" fill="#E53935" stroke="#C62828" stroke-width="1"/>
  <!-- Flag on school -->
  <line x1="90" y1="110" x2="90" y2="95" stroke="#757575" stroke-width="1.5"/>
  <rect x="90" y="95" width="15" height="10" fill="#C62828"/>
  <!-- Windows -->
  <rect x="55" y="155" width="12" height="12" fill="#B3E5FC" stroke="#1565C0" stroke-width="0.5"/>
  <rect x="73" y="155" width="12" height="12" fill="#B3E5FC" stroke="#1565C0" stroke-width="0.5"/>
  <rect x="91" y="155" width="12" height="12" fill="#B3E5FC" stroke="#1565C0" stroke-width="0.5"/>
  <rect x="109" y="155" width="12" height="12" fill="#B3E5FC" stroke="#1565C0" stroke-width="0.5"/>
  <rect x="55" y="180" width="12" height="12" fill="#B3E5FC" stroke="#1565C0" stroke-width="0.5"/>
  <rect x="73" y="180" width="12" height="12" fill="#B3E5FC" stroke="#1565C0" stroke-width="0.5"/>
  <rect x="91" y="180" width="12" height="12" fill="#B3E5FC" stroke="#1565C0" stroke-width="0.5"/>
  <rect x="109" y="180" width="12" height="12" fill="#B3E5FC" stroke="#1565C0" stroke-width="0.5"/>
  <!-- Door -->
  <rect x="75" y="200" width="18" height="20" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
  
  <!-- "ШКОЛА" text -->
  <text x="90" y="210" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">ШКОЛА</text>
  
  <!-- Ground -->
  <rect x="35" y="220" width="290" height="70" fill="#A5D6A7"/>
  
  <!-- Student 1 (planting tree) -->
  <g transform="translate(170,210)">
    <!-- Body -->
    <rect x="-5" y="5" width="14" height="18" fill="#1565C0"/>
    <!-- Head -->
    <circle cx="2" cy="-2" r="6" fill="#FFCC80"/>
    <!-- Hair -->
    <path d="M-4,-7 Q2,-12 8,-7" fill="#5D4037"/>
    <!-- Arms -->
    <line x1="-5" y1="10" x2="-12" y2="18" stroke="#1565C0" stroke-width="2.5"/>
    <line x1="9" y1="10" x2="16" y2="18" stroke="#1565C0" stroke-width="2.5"/>
    <!-- Legs -->
    <line x1="-1" y1="23" x2="-3" y2="32" stroke="#5D4037" stroke-width="2.5"/>
    <line x1="5" y1="23" x2="7" y2="32" stroke="#5D4037" stroke-width="2.5"/>
  </g>
  
  <!-- Tree being planted -->
  <rect x="180" y="218" width="5" height="22" fill="#795548"/>
  <circle cx="182" cy="210" r="14" fill="#43A047"/>
  <circle cx="175" cy="215" r="10" fill="#66BB6A"/>
  <circle cx="190" cy="212" r="9" fill="#2E7D32"/>
  
  <!-- Shovel near student -->
  <line x1="155" y1="235" x2="145" y2="210" stroke="#757575" stroke-width="2"/>
  <path d="M140,208 L150,208 L148,218 L142,218 Z" fill="#90A4AE" stroke="#757575" stroke-width="0.5"/>

  <!-- Student 2 (collecting trash) -->
  <g transform="translate(230,215)">
    <rect x="-5" y="3" width="14" height="16" fill="#E53935"/>
    <circle cx="2" cy="-4" r="6" fill="#FFCC80"/>
    <path d="M-4,-9 Q2,-14 8,-9" fill="#8D6E63"/>
    <!-- Holding bag -->
    <line x1="-5" y1="8" x2="-10" y2="15" stroke="#E53935" stroke-width="2"/>
    <line x1="9" y1="8" x2="14" y2="15" stroke="#E53935" stroke-width="2"/>
    <!-- Trash bag -->
    <rect x="7" y="12" width="12" height="16" rx="1" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
    <line x1="0" y1="19" x2="5" y2="23" stroke="#5D4037" stroke-width="2.5"/>
    <line x1="5" y1="19" x2="8" y2="23" stroke="#5D4037" stroke-width="2.5"/>
  </g>

  <!-- Recycling bins -->
  <rect x="270" y="228" width="14" height="20" rx="1" fill="#1565C0"/>
  <rect x="287" y="228" width="14" height="20" rx="1" fill="#F9A825"/>
  <rect x="304" y="228" width="14" height="20" rx="1" fill="#43A047"/>

  <!-- Bird feeder -->
  <g transform="translate(150,160)">
    <rect x="-2" y="-20" width="4" height="20" fill="#795548"/>
    <!-- Feeder tray -->
    <rect x="-10" y="-2" width="20" height="4" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
    <!-- Roof -->
    <polygon points="-12,-4 0,-14 12,-4" fill="#E53935" stroke="#C62828" stroke-width="0.5"/>
    <!-- Bird -->
    <ellipse cx="0" cy="-10" rx="5" ry="4" fill="#F9A825"/>
    <circle cx="-4" cy="-12" r="2" fill="#E53935"/>
    <line x1="-6" y1="-12" x2="-8" y2="-10" stroke="#F9A825" stroke-width="0.5"/>
  </g>

  <!-- Compost bin -->
  <g transform="translate(280,210)">
    <rect x="-10" y="0" width="20" height="22" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
    <rect x="-12" y="-2" width="24" height="4" rx="1" fill="#6D4C41"/>
    <text x="0" y="14" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle" font-weight="bold">КОМ</text>
    <!-- Leaf symbol -->
    <path d="M0,-6 Q5,-12 10,-6 Q5,0 0,-6 Z" fill="#43A047" opacity="0.7"/>
  </g>

  <!-- Right panel: Project board -->
  <rect x="340" y="90" width="130" height="205" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="405" y="106" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">НАШ ПРОЕКТ</text>
  
  <!-- Project board -->
  <rect x="355" y="115" width="100" height="80" rx="3" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  
  <!-- Board title -->
  <rect x="365" y="120" width="80" height="12" fill="#2E7D32" rx="2"/>
  <text x="405" y="130" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">ЭКО-ИНИЦИАТИВА</text>
  
  <!-- Chart/graph on board -->
  <rect x="365" y="138" width="15" height="30" fill="#43A047" opacity="0.6"/>
  <rect x="385" y="143" width="15" height="25" fill="#66BB6A" opacity="0.6"/>
  <rect x="405" y="135" width="15" height="33" fill="#2E7D32" opacity="0.6"/>
  <rect x="425" y="140" width="15" height="28" fill="#43A047" opacity="0.6"/>
  <text x="405" y="180" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">СБОР ОТХОДОВ (кг)</text>
  
  <!-- Pin on board -->
  <circle cx="360" cy="120" r="3" fill="#E53935"/>
  
  <!-- Thermometer -->
  <g transform="translate(445,130)">
    <rect x="-3" y="-15" width="6" height="30" rx="3" fill="white" stroke="#E53935" stroke-width="1"/>
    <circle cx="0" cy="18" r="6" fill="#E53935"/>
    <rect x="-1.5" y="-10" width="3" height="28" fill="#E53935"/>
    <!-- Scale marks -->
    <line x1="4" y1="-10" x2="7" y2="-10" stroke="#757575" stroke-width="0.5"/>
    <line x1="4" y1="-5" x2="7" y2="-5" stroke="#757575" stroke-width="0.5"/>
    <line x1="4" y1="0" x2="7" y2="0" stroke="#757575" stroke-width="0.5"/>
    <line x1="4" y1="5" x2="7" y2="5" stroke="#757575" stroke-width="0.5"/>
    <text x="12" y="-2" font-family="Arial,sans-serif" font-size="5" fill="#757575">t</text>
  </g>

  <!-- Items below board: clipboard with checklist -->
  <rect x="360" y="205" width="90" height="65" rx="3" fill="white" stroke="#757575" stroke-width="1"/>
  <rect x="385" y="202" width="40" height="6" fill="#757575" rx="2"/>
  <text x="405" y="220" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">ПЛАН ДЕЙСТВИЙ:</text>
  
  <!-- Checklist -->
  <rect x="370" y="226" width="8" height="8" rx="1" fill="none" stroke="#2E7D32" stroke-width="1"/>
  <path d="M372,230 L374,232 L377,228" stroke="#2E7D32" stroke-width="1" fill="none"/>
  <text x="382" y="233" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">Посадить деревья</text>
  
  <rect x="370" y="238" width="8" height="8" rx="1" fill="none" stroke="#2E7D32" stroke-width="1"/>
  <path d="M372,242 L374,244 L377,240" stroke="#2E7D32" stroke-width="1" fill="none"/>
  <text x="382" y="245" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">Собрать мусор</text>
  
  <rect x="370" y="250" width="8" height="8" rx="1" fill="none" stroke="#757575" stroke-width="1"/>
  <text x="382" y="257" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">Сделать кормушки</text>
  
  <rect x="370" y="262" width="8" height="8" rx="1" fill="none" stroke="#757575" stroke-width="1"/>
  <text x="382" y="269" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">Организовать патруль</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Школьные экологические проекты</text>
</svg>