<text x="198" y="256" font-family="Arial,sans-serif" font-size="10" fill="#333">На имя и гражданство</text>
<text x="198" y="272" font-family="Arial,sans-serif" font-size="10" fill="#333">На заботу родителей</text>
<text x="198" y="288" font-family="Arial,sans-serif" font-size="10" fill="#333">На защиту от насилия</text>
