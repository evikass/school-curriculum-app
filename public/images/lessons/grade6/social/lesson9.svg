<rect x="340" y="228" width="135" height="12" fill="#6A1B9A" opacity="0.12"/>
<text x="408" y="234" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Конвенция ООН</text>
<text x="353" y="256" font-family="Arial,sans-serif" font-size="10" fill="#333">О правах ребёнка</text>
<text x="353" y="272" font-family="Arial,sans-serif" font-size="10" fill="#333">Принята в 1989 г.</text>
<text x="353" y="288" font-family="Arial,sans-serif" font-size="10" fill="#333">Ратифицирована РФ</text>
