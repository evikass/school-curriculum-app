<text x="135" y="178" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">Естественные и неотъемлемые</text>
<text x="135" y="192" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">принадлежат каждому от рождения</text>
<text x="135" y="206" font-family="Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">Всеобщая декларация прав человека (1948)</text>
