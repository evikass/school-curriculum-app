<rect x="185" y="216" width="145" height="80" rx="6" fill="white" stroke="#F9A825" stroke-width="2"/>
<rect x="185" y="216" width="145" height="24" rx="6" fill="#F9A825" opacity="0.12"/>
<rect x="185" y="228" width="145" height="12" fill="#F9A825" opacity="0.12"/>
