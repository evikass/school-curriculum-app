<text x="369" y="136" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Политич.</text>
<text x="369" y="152" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">голос, мнение</text>
<rect x="408" y="118" width="55" height="40" rx="3" fill="#2E7D32" opacity="0.06" stroke="#2E7D32" stroke-width="1"/>
<circle cx="436" cy="132" r="8" fill="#2E7D32" opacity="0.1"/>
<text x="436" y="136" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Соц.</text>
<text x="436" y="152" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">труд, учёба</text>
<text x="365" y="176" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">Экономические: труд, собственность</text>
<text x="365" y="192" font-family="Arial,sans-serif" font-size="10" fill="#333" text-anchor="middle">Культурные: образование, творчество</text>
