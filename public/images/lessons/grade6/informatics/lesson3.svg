<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFFDE7"/></linearGradient><marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker></defs><rect width="500" height="350" fill="url(#bg)" rx="10"/><rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/><rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/><polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/><polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/><polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/><polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/><circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/><circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/><circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/><circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/><text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Ветвления в алгоритмах</text><text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Информатика - Урок 3</text><line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/><rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/><rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>
<!-- IF-ELSE branching diagram -->
<!-- Top node -->
<rect x="190" y="88" width="120" height="34" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
<text x="250" y="110" font-family="Arial,sans-serif" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">Проверка</text>
<line x1="250" y1="122" x2="250" y2="140" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
<!-- Decision diamond -->
<polygon points="250,144 310,172 250,200 190,172" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
<text x="250" y="170" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle">Условие?</text>
<text x="250" y="182" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">if</text>
<!-- Yes branch left -->
<line x1="190" y1="172" x2="120" y2="172" stroke="#2E7D32" stroke-width="2"/>
<line x1="120" y1="172" x2="120" y2="200" stroke="#2E7D32" stroke-width="2" marker-end="url(#ar)"/>
<text x="155" y="164" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" font-weight="bold">Да</text>
<!-- Yes action box -->
<rect x="60" y="204" width="120" height="40" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
<text x="120" y="220" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle">Действие 1</text>
<text x="120" y="234" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">if-блок</text>
<!-- No branch right -->
<line x1="310" y1="172" x2="380" y2="172" stroke="#C62828" stroke-width="2"/>
<line x1="380" y1="172" x2="380" y2="200" stroke="#C62828" stroke-width="2" marker-end="url(#ar)"/>
<text x="340" y="164" font-family="Arial,sans-serif" font-size="10" fill="#C62828" font-weight="bold">Нет</text>
<!-- No action box -->
<rect x="320" y="204" width="120" height="40" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
<text x="380" y="220" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle">Действие 2</text>
<text x="380" y="234" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle">else-блок</text>
<!-- Merge arrows -->
<line x1="120" y1="244" x2="120" y2="268" stroke="#555" stroke-width="2"/>
<line x1="120" y1="268" x2="242" y2="268" stroke="#555" stroke-width="2"/>
<line x1="380" y1="244" x2="380" y2="268" stroke="#555" stroke-width="2"/>
<line x1="380" y1="268" x2="258" y2="268" stroke="#555" stroke-width="2"/>
<line x1="250" y1="268" x2="250" y2="285" stroke="#555" stroke-width="2" marker-end="url(#ar)"/>
<!-- End node -->
<rect x="190" y="289" width="120" height="32" rx="16" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
<text x="250" y="310" font-family="Arial,sans-serif" font-size="11" fill="#E65100" text-anchor="middle" font-weight="bold">Далее...</text>
<!-- Decorative code snippet -->
<rect x="35" y="88" width="130" height="55" rx="6" fill="#263238" opacity="0.9"/>
<text x="100" y="105" font-family="monospace" font-size="10" fill="#81C784">if (x &gt; 0)</text>
<text x="100" y="118" font-family="monospace" font-size="10" fill="#fff">  print("да")</text>
<text x="100" y="131" font-family="monospace" font-size="10" fill="#FF8A65">else</text>
<text x="100" y="144" font-family="monospace" font-size="10" fill="#fff">  print("нет")</text>
<!-- Decorative: right side example labels -->
<rect x="355" y="88" width="115" height="48" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
<text x="412" y="107" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Пример:</text>
<text x="412" y="123" font-family="Arial,sans-serif" font-size="9" fill="#333" text-anchor="middle">Температура &gt; 0?</text>
<text x="412" y="135" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Тепло / Холодно</text>
<rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/><text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Ветвления в алгоритмах</text></svg>