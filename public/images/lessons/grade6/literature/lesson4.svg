<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#C62828" text-anchor="middle">Былины — русский героический эпос</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 4</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Three Bogatyrs -->
  <rect x="25" y="90" width="240" height="200" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="145" y="104" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ТРИ БОГАТЫРЯ</text>
  <!-- Sky background -->
  <rect x="30" y="108" width="230" height="80" fill="#E3F2FD" opacity="0.4" rx="4"/>
  <!-- Hills -->
  <path d="M30,190 Q80,165 130,185 Q180,160 230,180 Q250,170 260,185 L260,285 L30,285 Z" fill="#C8E6C9" opacity="0.5"/>
  <!-- Ground -->
  <rect x="30" y="250" width="230" height="35" fill="#8D6E63" opacity="0.2" rx="2"/>

  <!-- Bogatyr 1: Ilya Muromets (center, largest) -->
  <!-- Horse body -->
  <ellipse cx="130" cy="238" rx="30" ry="15" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- Horse head -->
  <path d="M158,228 Q168,220 170,225 Q172,230 165,235 L158,232 Z" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Horse eye -->
  <circle cx="165" cy="224" r="1.5" fill="#C62828"/>
  <!-- Horse ear -->
  <path d="M162,220 L164,214 L166,220" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
  <!-- Horse legs -->
  <line x1="108" y1="250" x2="106" y2="275" stroke="#5D4037" stroke-width="3"/>
  <line x1="118" y1="252" x2="116" y2="275" stroke="#5D4037" stroke-width="3"/>
  <line x1="142" y1="252" x2="144" y2="275" stroke="#5D4037" stroke-width="3"/>
  <line x1="152" y1="250" x2="154" y2="275" stroke="#5D4037" stroke-width="3"/>
  <!-- Hooves -->
  <rect x="103" y="273" width="7" height="3" rx="1" fill="#5D4037"/>
  <rect x="113" y="273" width="7" height="3" rx="1" fill="#5D4037"/>
  <rect x="141" y="273" width="7" height="3" rx="1" fill="#5D4037"/>
  <rect x="151" y="273" width="7" height="3" rx="1" fill="#5D4037"/>
  <!-- Horse tail -->
  <path d="M100,232 Q90,225 85,235 Q82,240 88,238" stroke="#5D4037" stroke-width="1.5" fill="none"/>
  <!-- Rider (Ilya Muromets) -->
  <!-- Body/Chain mail -->
  <path d="M120,190 Q115,210 112,230 L148,230 Q145,210 140,190 Z" fill="#9E9E9E" stroke="#616161" stroke-width="1"/>
  <!-- Head -->
  <circle cx="130" cy="180" r="10" fill="#FFCC80" stroke="#C62828" stroke-width="1"/>
  <!-- Helmet -->
  <path d="M120,175 Q125,165 130,163 Q135,165 140,175" fill="#9E9E9E" stroke="#616161" stroke-width="1"/>
  <rect x="118" y="175" width="24" height="4" rx="1" fill="#F9A825"/>
  <!-- Nose guard -->
  <line x1="130" y1="177" x2="130" y2="185" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="127" cy="179" r="1.5" fill="#C62828"/>
  <circle cx="133" cy="179" r="1.5" fill="#C62828"/>
  <!-- Beard -->
  <path d="M125,184 Q130,190 135,184" stroke="#5D4037" stroke-width="1" fill="none"/>
  <!-- Shield on left arm -->
  <ellipse cx="110" cy="215" rx="12" ry="15" fill="#C62828" stroke="#F9A825" stroke-width="1"/>
  <circle cx="110" cy="215" r="5" fill="#F9A825"/>
  <!-- Spear in right hand -->
  <line x1="148" y1="195" x2="170" y2="140" stroke="#8D6E63" stroke-width="2.5"/>
  <!-- Spear tip -->
  <polygon points="168,135 170,128 172,135 170,140" fill="#9E9E9E" stroke="#616161" stroke-width="0.5"/>
  <!-- Flag on spear -->
  <rect x="170" y="132" width="20" height="12" fill="#C62828" stroke="#F9A825" stroke-width="0.5"/>
  <!-- Name label -->
  <text x="130" y="286" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Илья Муромец</text>

  <!-- Bogatyr 2: Dobrynya Nikitich (left) -->
  <!-- Horse body -->
  <ellipse cx="62" cy="242" rx="22" ry="12" fill="#6D4C41" stroke="#4E342E" stroke-width="0.8"/>
  <!-- Horse head -->
  <path d="M82,234 Q88,228 90,232 Q91,236 85,240 L82,237 Z" fill="#6D4C41" stroke="#4E342E" stroke-width="0.6"/>
  <!-- Horse legs -->
  <line x1="48" y1="252" x2="46" y2="275" stroke="#4E342E" stroke-width="2.5"/>
  <line x1="56" y1="254" x2="54" y2="275" stroke="#4E342E" stroke-width="2.5"/>
  <line x1="68" y1="254" x2="70" y2="275" stroke="#4E342E" stroke-width="2.5"/>
  <line x1="76" y1="252" x2="78" y2="275" stroke="#4E342E" stroke-width="2.5"/>
  <!-- Rider (Dobrynya) -->
  <path d="M52,198 Q49,215 47,235 L77,235 Q75,215 72,198 Z" fill="#1565C0" stroke="#0D47A1" stroke-width="0.8"/>
  <!-- Head -->
  <circle cx="62" cy="190" r="8" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <!-- Helmet -->
  <path d="M54,186 Q58,178 62,176 Q66,178 70,186" fill="#9E9E9E" stroke="#616161" stroke-width="0.8"/>
  <!-- Eyes -->
  <circle cx="59" cy="189" r="1.2" fill="#C62828"/>
  <circle cx="65" cy="189" r="1.2" fill="#C62828"/>
  <!-- Moustache -->
  <path d="M58,193 Q62,191 66,193" stroke="#5D4037" stroke-width="0.8" fill="none"/>
  <!-- Sword -->
  <line x1="77" y1="200" x2="90" y2="170" stroke="#9E9E9E" stroke-width="2"/>
  <rect x="88" y="168" width="2" height="6" fill="#9E9E9E"/>
  <rect x="85" y="166" width="8" height="3" rx="1" fill="#F9A825"/>
  <text x="62" y="286" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Добрыня</text>

  <!-- Bogatyr 3: Alyosha Popovich (right) -->
  <!-- Horse body -->
  <ellipse cx="205" cy="242" rx="22" ry="12" fill="#D4A574" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Horse head -->
  <path d="M185,234 Q179,228 177,232 Q176,236 182,240 L185,237 Z" fill="#D4A574" stroke="#8D6E63" stroke-width="0.6"/>
  <!-- Horse legs -->
  <line x1="191" y1="252" x2="189" y2="275" stroke="#8D6E63" stroke-width="2.5"/>
  <line x1="199" y1="254" x2="197" y2="275" stroke="#8D6E63" stroke-width="2.5"/>
  <line x1="211" y1="254" x2="213" y2="275" stroke="#8D6E63" stroke-width="2.5"/>
  <line x1="219" y1="252" x2="221" y2="275" stroke="#8D6E63" stroke-width="2.5"/>
  <!-- Rider (Alyosha) -->
  <path d="M195,198 Q192,215 190,235 L220,235 Q218,215 215,198 Z" fill="#F9A825" stroke="#E65100" stroke-width="0.8"/>
  <!-- Head -->
  <circle cx="205" cy="190" r="8" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <!-- Cap -->
  <path d="M197,186 Q201,179 205,177 Q209,179 213,186" fill="#C62828" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Eyes -->
  <circle cx="202" cy="189" r="1.2" fill="#C62828"/>
  <circle cx="208" cy="189" r="1.2" fill="#C62828"/>
  <!-- Youthful look - no beard -->
  <!-- Bow -->
  <path d="M190,200 Q178,210 180,225" stroke="#8D6E63" stroke-width="2" fill="none"/>
  <line x1="190" y1="200" x2="180" y2="225" stroke="#BDBDBD" stroke-width="0.5"/>
  <!-- Arrow -->
  <line x1="190" y1="212" x2="175" y2="212" stroke="#8D6E63" stroke-width="1.5"/>
  <polygon points="175,210 170,212 175,214" fill="#9E9E9E"/>
  <text x="205" y="286" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Алёша</text>

  <!-- Card 2: Heroic symbols -->
  <rect x="277" y="90" width="198" height="200" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="376" y="104" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">СИМВОЛЫ БОГАТЫРСКОЙ СИЛЫ</text>
  <!-- Sword -->
  <rect x="310" y="115" width="4" height="50" fill="#9E9E9E" stroke="#616161" stroke-width="0.8"/>
  <rect x="303" y="165" width="18" height="4" rx="1" fill="#F9A825" stroke="#E65100" stroke-width="0.5"/>
  <rect x="307" y="169" width="10" height="12" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <polygon points="310,115 312,108 314,115" fill="#BDBDBD" stroke="#616161" stroke-width="0.5"/>
  <!-- Ruby on pommel -->
  <circle cx="312" cy="175" r="3" fill="#C62828"/>
  <text x="312" y="192" font-family="Arial,sans-serif" font-size="7" fill="#616161" text-anchor="middle">Меч-кладенец</text>

  <!-- Shield -->
  <path d="M420,120 Q445,130 445,155 Q445,175 420,185 Q395,175 395,155 Q395,130 420,120 Z" fill="#C62828" stroke="#F9A825" stroke-width="1.5"/>
  <path d="M420,130 Q435,137 435,155 Q435,168 420,175 Q405,168 405,155 Q405,137 420,130 Z" fill="#F9A825" opacity="0.4"/>
  <!-- Cross on shield -->
  <line x1="420" y1="128" x2="420" y2="180" stroke="#F9A825" stroke-width="2"/>
  <line x1="397" y1="152" x2="443" y2="152" stroke="#F9A825" stroke-width="2"/>
  <text x="420" y="198" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">Щит богатырский</text>

  <!-- Chain mail (кольчуга) -->
  <circle cx="330" cy="230" r="5" fill="none" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="340" cy="230" r="5" fill="none" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="335" cy="240" r="5" fill="none" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="325" cy="240" r="5" fill="none" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="345" cy="240" r="5" fill="none" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="335" cy="250" r="5" fill="none" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="325" cy="250" r="5" fill="none" stroke="#9E9E9E" stroke-width="1"/>
  <circle cx="345" cy="250" r="5" fill="none" stroke="#9E9E9E" stroke-width="1"/>
  <text x="335" y="268" font-family="Arial,sans-serif" font-size="7" fill="#616161" text-anchor="middle">Кольчуга</text>

  <!-- Helmet (шелом) -->
  <path d="M410,230 Q420,215 430,230 Z" fill="#9E9E9E" stroke="#616161" stroke-width="1"/>
  <rect x="407" y="228" width="26" height="15" rx="3" fill="#9E9E9E" stroke="#616161" stroke-width="1"/>
  <!-- Nose guard -->
  <line x1="420" y1="228" x2="420" y2="243" stroke="#F9A825" stroke-width="2"/>
  <!-- Decoration -->
  <circle cx="420" cy="222" r="3" fill="#F9A825"/>
  <text x="420" y="268" font-family="Arial,sans-serif" font-size="7" fill="#616161" text-anchor="middle">Шелом</text>

  <!-- Gusli (musical instrument) -->
  <path d="M380,235 Q370,240 370,255 Q375,265 390,265 Q400,260 400,250 Q398,240 390,235 Z" fill="#FFCC80" stroke="#8D6E63" stroke-width="1"/>
  <line x1="378" y1="240" x2="392" y2="240" stroke="#8D6E63" stroke-width="0.5"/>
  <line x1="376" y1="245" x2="395" y2="245" stroke="#8D6E63" stroke-width="0.5"/>
  <line x1="375" y1="250" x2="398" y2="250" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- Strings -->
  <line x1="382" y1="237" x2="382" y2="262" stroke="#9E9E9E" stroke-width="0.5"/>
  <line x1="387" y1="236" x2="387" y2="264" stroke="#9E9E9E" stroke-width="0.5"/>
  <line x1="392" y1="238" x2="392" y2="260" stroke="#9E9E9E" stroke-width="0.5"/>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Былины — русский героический эпос</text>
</svg>