<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#C62828" text-anchor="middle">Мифы о Прометее и Тесее</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 3</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Prometheus chained to rock -->
  <rect x="25" y="90" width="220" height="150" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="135" y="104" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ПРОМЕТЕЙ ПРИКОВАННЫЙ</text>
  <!-- Mountain/rock cliff -->
  <polygon points="55,105 75,95 90,105 105,90 120,105 135,95 150,105" fill="#9E9E9E" stroke="#616161" stroke-width="1"/>
  <rect x="55" y="105" width="140" height="130" fill="#BDBDBD" stroke="#616161" stroke-width="0.5"/>
  <!-- Rock texture lines -->
  <line x1="70" y1="115" x2="70" y2="230" stroke="#9E9E9E" stroke-width="0.5" opacity="0.5"/>
  <line x1="100" y1="110" x2="100" y2="230" stroke="#9E9E9E" stroke-width="0.5" opacity="0.5"/>
  <line x1="130" y1="112" x2="130" y2="230" stroke="#9E9E9E" stroke-width="0.5" opacity="0.5"/>
  <line x1="160" y1="108" x2="160" y2="230" stroke="#9E9E9E" stroke-width="0.5" opacity="0.5"/>
  <!-- Prometheus figure -->
  <!-- Head -->
  <circle cx="115" cy="140" r="12" fill="#FFCC80" stroke="#C62828" stroke-width="1.2"/>
  <!-- Hair -->
  <path d="M105,135 Q108,125 115,128 Q122,125 125,135" fill="#5D4037" stroke="#5D4037" stroke-width="0.5"/>
  <!-- Eyes (suffering) -->
  <path d="M109,139 L112,141" stroke="#C62828" stroke-width="1"/>
  <path d="M118,139 L121,141" stroke="#C62828" stroke-width="1"/>
  <!-- Mouth (pain) -->
  <path d="M110,146 Q115,149 120,146" stroke="#C62828" stroke-width="0.8" fill="none"/>
  <!-- Body -->
  <path d="M108,152 Q105,165 102,185 L128,185 Q125,165 122,152 Z" fill="#FFCC80" stroke="#C62828" stroke-width="1"/>
  <!-- Left arm chained up -->
  <line x1="108" y1="158" x2="80" y2="135" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chain -->
  <ellipse cx="78" cy="133" rx="4" ry="3" fill="none" stroke="#616161" stroke-width="1.5"/>
  <ellipse cx="82" cy="137" rx="4" ry="3" fill="none" stroke="#616161" stroke-width="1.5"/>
  <line x1="75" y1="132" x2="65" y2="120" stroke="#616161" stroke-width="1.5"/>
  <!-- Bolt in rock -->
  <circle cx="62" cy="118" r="3" fill="#616161" stroke="#424242" stroke-width="1"/>
  <!-- Right arm chained -->
  <line x1="122" y1="158" x2="150" y2="135" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="152" cy="133" rx="4" ry="3" fill="none" stroke="#616161" stroke-width="1.5"/>
  <ellipse cx="148" cy="137" rx="4" ry="3" fill="none" stroke="#616161" stroke-width="1.5"/>
  <line x1="155" y1="132" x2="165" y2="120" stroke="#616161" stroke-width="1.5"/>
  <circle cx="168" cy="118" r="3" fill="#616161" stroke="#424242" stroke-width="1"/>
  <!-- Eagle -->
  <path d="M185,115 L175,125 L180,125 L172,132 L178,130 L170,140" stroke="#5D4037" stroke-width="2" fill="none"/>
  <!-- Wing -->
  <path d="M175,118 L165,112 L170,118 L160,115 L168,122" stroke="#5D4037" stroke-width="1.5" fill="#8D6E63" opacity="0.5"/>
  <!-- Beak -->
  <polygon points="170,140 166,145 172,143" fill="#F9A825"/>
  <!-- Eye -->
  <circle cx="173" cy="125" r="1.5" fill="#C62828"/>
  <!-- Liver glow -->
  <ellipse cx="115" cy="170" rx="6" ry="4" fill="#EF9A9A" opacity="0.6"/>

  <!-- Card 2: Theseus and Minotaur in Labyrinth -->
  <rect x="257" y="90" width="218" height="150" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5" opacity="0.9"/>
  <text x="366" y="104" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" font-weight="bold" text-anchor="middle">ТЕСЕЙ И МИНОТАВР В ЛАБИРИНТЕ</text>
  <!-- Labyrinth walls -->
  <rect x="270" y="110" width="192" height="120" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>
  <!-- Labyrinth paths -->
  <rect x="280" y="120" width="25" height="80" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <rect x="310" y="110" width="20" height="60" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <rect x="335" y="130" width="30" height="70" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <rect x="370" y="110" width="20" height="50" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <rect x="395" y="140" width="25" height="60" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <rect x="425" y="110" width="25" height="90" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <rect x="300" y="190" width="50" height="20" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <rect x="365" y="170" width="25" height="30" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <rect x="340" y="200" width="55" height="15" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <!-- Theseus figure (small) -->
  <circle cx="295" cy="200" r="5" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <line x1="295" y1="205" x2="295" y2="215" stroke="#C62828" stroke-width="1.5"/>
  <!-- Sword -->
  <line x1="298" y1="208" x2="310" y2="200" stroke="#9E9E9E" stroke-width="1.5"/>
  <polygon points="310,198 314,196 312,200" fill="#BDBDBD"/>
  <!-- Thread of Ariadne -->
  <path d="M292,203 Q280,195 285,185 Q290,175 300,180 Q310,175 308,165" stroke="#F9A825" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <circle cx="292" cy="203" r="2" fill="#F9A825"/>
  <!-- Minotaur in center -->
  <circle cx="420" cy="170" r="10" fill="#D4A574" stroke="#8D6E63" stroke-width="1.2"/>
  <!-- Horns -->
  <path d="M413,162 L408,150" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M427,162 L432,150" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bull face -->
  <ellipse cx="420" cy="172" rx="5" ry="4" fill="#D4A574" opacity="0.7"/>
  <circle cx="416" cy="168" r="2" fill="#C62828"/>
  <circle cx="424" cy="168" r="2" fill="#C62828"/>
  <!-- Nostrils -->
  <circle cx="418" cy="174" r="1" fill="#8D6E63"/>
  <circle cx="422" cy="174" r="1" fill="#8D6E63"/>
  <!-- Body -->
  <path d="M412,180 Q410,195 408,210 L432,210 Q430,195 428,180 Z" fill="#D4A574" stroke="#8D6E63" stroke-width="1"/>
  <!-- Label -->
  <text x="366" y="228" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">нить Ариадны ведёт к выходу</text>

  <!-- Card 3: Fire and Gift -->
  <rect x="25" y="248" width="450" height="52" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="250" y="262" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">ПРОМЕТЕЙ ДАЛ ОГНЬ ЛЮДЯМ</text>
  <!-- Torch with fire -->
  <line x1="130" y1="275" x2="130" y2="293" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
  <!-- Big fire -->
  <path d="M120,275 Q125,260 130,255 Q135,260 140,275 Z" fill="#F9A825" opacity="0.9"/>
  <path d="M123,275 Q127,265 130,262 Q133,265 137,275 Z" fill="#FF6F00" opacity="0.9"/>
  <path d="M126,275 Q128,268 130,266 Q132,268 134,275 Z" fill="#FDD835"/>
  <!-- Arrows from fire to people -->
  <line x1="145" y1="275" x2="175" y2="285" stroke="#F9A825" stroke-width="1" opacity="0.6"/>
  <line x1="145" y1="278" x2="175" y2="292" stroke="#F9A825" stroke-width="1" opacity="0.6"/>
  <!-- Person 1 receiving fire -->
  <circle cx="190" cy="280" r="5" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <line x1="190" y1="285" x2="190" y2="295" stroke="#C62828" stroke-width="1.5"/>
  <line x1="183" y1="288" x2="197" y2="288" stroke="#C62828" stroke-width="1.5"/>
  <!-- Person 2 -->
  <circle cx="220" cy="280" r="5" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <line x1="220" y1="285" x2="220" y2="295" stroke="#C62828" stroke-width="1.5"/>
  <line x1="213" y1="288" x2="227" y2="288" stroke="#C62828" stroke-width="1.5"/>
  <!-- Person 3 -->
  <circle cx="250" cy="280" r="5" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <line x1="250" y1="285" x2="250" y2="295" stroke="#C62828" stroke-width="1.5"/>
  <line x1="243" y1="288" x2="257" y2="288" stroke="#C62828" stroke-width="1.5"/>
  <!-- Houses getting warm -->
  <rect x="290" y="285" width="15" height="10" fill="#FFCC80" stroke="#8D6E63" stroke-width="0.8"/>
  <polygon points="288,285 297,276 306,285" fill="#C62828" stroke="#8D6E63" stroke-width="0.5"/>
  <rect x="312" y="285" width="15" height="10" fill="#FFCC80" stroke="#8D6E63" stroke-width="0.8"/>
  <polygon points="310,285 319,276 328,285" fill="#C62828" stroke="#8D6E63" stroke-width="0.5"/>
  <rect x="334" y="285" width="15" height="10" fill="#FFCC80" stroke="#8D6E63" stroke-width="0.8"/>
  <polygon points="332,285 341,276 350,285" fill="#C62828" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- Smoke from chimneys -->
  <path d="M295,276 Q293,270 296,265" stroke="#9E9E9E" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M317,276 Q315,270 318,265" stroke="#9E9E9E" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M339,276 Q337,270 340,265" stroke="#9E9E9E" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Мифы о Прометее и Тесее</text>
</svg>