<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Подвиги Геракла</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Литература - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Hercules with Lion Skin -->
  <rect x="25" y="90" width="145" height="140" rx="6" fill="white" stroke="#C62828" stroke-width="1.5" opacity="0.9"/>
  <text x="97" y="104" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold" text-anchor="middle">ГЕРАКЛ И НЕМЕЙСКИЙ ЛЕВ</text>
  <!-- Hercules body -->
  <path d="M78,135 Q72,155 68,185 L126,185 Q122,155 116,135 Z" fill="#FFCC80" stroke="#C62828" stroke-width="1.2"/>
  <!-- Head -->
  <circle cx="97" cy="125" r="14" fill="#FFCC80" stroke="#C62828" stroke-width="1.2"/>
  <!-- Lion skin cape -->
  <path d="M78,130 Q70,125 65,135 Q60,145 68,160 L78,145 Z" fill="#D4A574" stroke="#8D6E63" stroke-width="1"/>
  <path d="M116,130 Q124,125 129,135 Q134,145 126,160 L116,145 Z" fill="#D4A574" stroke="#8D6E63" stroke-width="1"/>
  <!-- Lion head as helmet -->
  <path d="M83,118 Q97,105 111,118" fill="#D4A574" stroke="#8D6E63" stroke-width="1"/>
  <!-- Lion ears -->
  <circle cx="83" cy="115" r="4" fill="#D4A574" stroke="#8D6E63" stroke-width="0.8"/>
  <circle cx="111" cy="115" r="4" fill="#D4A574" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Lion mane -->
  <path d="M80,122 Q78,110 85,108 Q92,105 97,107 Q102,105 109,108 Q116,110 114,122" fill="#D4A574" stroke="#8D6E63" stroke-width="0.8" opacity="0.7"/>
  <!-- Eyes -->
  <circle cx="92" cy="122" r="2" fill="#C62828"/>
  <circle cx="102" cy="122" r="2" fill="#C62828"/>
  <!-- Mouth (determined) -->
  <line x1="92" y1="129" x2="102" y2="129" stroke="#C62828" stroke-width="1.2"/>
  <!-- Arms - left with club -->
  <line x1="78" y1="145" x2="55" y2="130" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <!-- Club -->
  <line x1="48" y1="125" x2="58" y2="138" stroke="#8D6E63" stroke-width="5" stroke-linecap="round"/>
  <circle cx="46" cy="123" r="6" fill="#8D6E63" stroke="#6D4C41" stroke-width="1"/>
  <!-- Right arm flexed -->
  <line x1="116" y1="145" x2="135" y2="140" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <circle cx="138" cy="138" r="5" fill="#FFCC80" stroke="#C62828" stroke-width="1"/>
  <!-- Biceps muscle -->
  <circle cx="125" cy="138" r="6" fill="#FFCC80" stroke="#C62828" stroke-width="1"/>
  <!-- Legs -->
  <line x1="85" y1="185" x2="78" y2="220" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <line x1="109" y1="185" x2="116" y2="220" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <!-- Sandals -->
  <rect x="72" y="218" width="14" height="6" rx="2" fill="#8D6E63" stroke="#6D4C41" stroke-width="0.8"/>
  <rect x="110" y="218" width="14" height="6" rx="2" fill="#8D6E63" stroke="#6D4C41" stroke-width="0.8"/>

  <!-- Card 2: Hydra -->
  <rect x="182" y="90" width="145" height="140" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5" opacity="0.9"/>
  <text x="254" y="104" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" font-weight="bold" text-anchor="middle">ГИДРА ЛЕРНЕЙСКАЯ</text>
  <!-- Hydra body -->
  <ellipse cx="254" cy="175" rx="40" ry="18" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Scales pattern -->
  <path d="M220,170 Q225,165 230,170 Q235,165 240,170 Q245,165 250,170 Q255,165 260,170 Q265,165 270,170 Q275,165 280,170" stroke="#2E7D32" stroke-width="0.8" fill="none"/>
  <!-- Neck 1 (center) -->
  <path d="M254,157 Q254,145 254,135" stroke="#2E7D32" stroke-width="5" fill="none"/>
  <circle cx="254" cy="130" r="8" fill="#81C784" stroke="#2E7D32" stroke-width="1.2"/>
  <circle cx="251" cy="128" r="2" fill="#C62828"/>
  <circle cx="257" cy="128" r="2" fill="#C62828"/>
  <polygon points="250,133 254,137 258,133" fill="#C62828"/>
  <!-- Neck 2 (left) -->
  <path d="M238,157 Q228,145 218,135" stroke="#2E7D32" stroke-width="4" fill="none"/>
  <circle cx="215" cy="130" r="7" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.2"/>
  <circle cx="212" cy="128" r="1.5" fill="#C62828"/>
  <circle cx="218" cy="128" r="1.5" fill="#C62828"/>
  <!-- Neck 3 (right) -->
  <path d="M270,157 Q280,145 290,135" stroke="#2E7D32" stroke-width="4" fill="none"/>
  <circle cx="293" cy="130" r="7" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.2"/>
  <circle cx="290" cy="128" r="1.5" fill="#C62828"/>
  <circle cx="296" cy="128" r="1.5" fill="#C62828"/>
  <!-- Neck 4 (far left) -->
  <path d="M225,160 Q210,155 200,145" stroke="#2E7D32" stroke-width="3.5" fill="none"/>
  <circle cx="197" cy="140" r="6" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <circle cx="195" cy="138" r="1.5" fill="#C62828"/>
  <circle cx="200" cy="138" r="1.5" fill="#C62828"/>
  <!-- Neck 5 (far right) -->
  <path d="M283,160 Q298,155 308,145" stroke="#2E7D32" stroke-width="3.5" fill="none"/>
  <circle cx="311" cy="140" r="6" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <circle cx="309" cy="138" r="1.5" fill="#C62828"/>
  <circle cx="314" cy="138" r="1.5" fill="#C62828"/>
  <!-- Stump of cut neck -->
  <line x1="240" y1="162" x2="244" y2="162" stroke="#C62828" stroke-width="2"/>
  <!-- Fire torch -->
  <line x1="310" y1="120" x2="310" y2="148" stroke="#8D6E63" stroke-width="3"/>
  <ellipse cx="310" cy="115" rx="6" ry="8" fill="#F9A825" opacity="0.8"/>
  <ellipse cx="310" cy="113" rx="3" ry="5" fill="#FF6F00" opacity="0.8"/>
  <text x="254" y="200" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">подвиг второй</text>

  <!-- Card 3: 12 Labors Symbols -->
  <rect x="339" y="90" width="135" height="140" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5" opacity="0.9"/>
  <text x="406" y="104" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold" text-anchor="middle">12 ПОДВИГОВ</text>
  <!-- Grid of labor symbols -->
  <!-- 1. Nemean Lion -->
  <circle cx="370" cy="122" r="8" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <circle cx="370" cy="120" r="2" fill="#C62828"/>
  <text x="370" y="135" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">1</text>
  <!-- 2. Hydra -->
  <circle cx="406" cy="122" r="8" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M402,120 L406,116 L410,120 L408,124 L404,124Z" fill="#2E7D32" opacity="0.5"/>
  <text x="406" y="135" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">2</text>
  <!-- 3. Ceryneian Hind -->
  <circle cx="442" cy="122" r="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M438,124 L442,118 L446,124" stroke="#8D6E63" stroke-width="1.2" fill="none"/>
  <text x="442" y="135" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">3</text>
  <!-- 4. Erymanthian Boar -->
  <circle cx="370" cy="150" r="8" fill="#FFCC80" stroke="#8D6E63" stroke-width="0.8"/>
  <circle cx="370" cy="148" r="3" fill="#8D6E63"/>
  <path d="M366,152 L363,155" stroke="#8D6E63" stroke-width="1"/>
  <path d="M374,152 L377,155" stroke="#8D6E63" stroke-width="1"/>
  <text x="370" y="163" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">4</text>
  <!-- 5. Augean Stables -->
  <circle cx="406" cy="150" r="8" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <rect x="401" y="147" width="10" height="6" fill="#8D6E63"/>
  <path d="M403,147 L403,144 L409,144 L409,147" fill="#C62828"/>
  <text x="406" y="163" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">5</text>
  <!-- 6. Stymphalian Birds -->
  <circle cx="442" cy="150" r="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <path d="M438,152 L442,146 L446,152" stroke="#1565C0" stroke-width="1.2" fill="none"/>
  <path d="M444,148 L450,146" stroke="#1565C0" stroke-width="0.8"/>
  <text x="442" y="163" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">6</text>
  <!-- 7. Cretan Bull -->
  <circle cx="370" cy="178" r="8" fill="#FFCC80" stroke="#C62828" stroke-width="0.8"/>
  <ellipse cx="370" cy="178" rx="5" ry="4" fill="#8D6E63"/>
  <path d="M365,174 L362,170" stroke="#C62828" stroke-width="1.2"/>
  <path d="M375,174 L378,170" stroke="#C62828" stroke-width="1.2"/>
  <text x="370" y="191" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">7</text>
  <!-- 8. Diomedes Mares -->
  <circle cx="406" cy="178" r="8" fill="#FFCC80" stroke="#8D6E63" stroke-width="0.8"/>
  <path d="M401,180 L404,174 L407,180" stroke="#8D6E63" stroke-width="1" fill="none"/>
  <path d="M405,180 L408,174 L411,180" stroke="#8D6E63" stroke-width="1" fill="none"/>
  <text x="406" y="191" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">8</text>
  <!-- 9. Belt of Hippolyta -->
  <circle cx="442" cy="178" r="8" fill="#FCE4EC" stroke="#C62828" stroke-width="0.8"/>
  <rect x="437" y="175" width="10" height="3" rx="1" fill="#F9A825" stroke="#C62828" stroke-width="0.5"/>
  <circle cx="442" cy="177" r="1.5" fill="#C62828"/>
  <text x="442" y="191" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">9</text>
  <!-- 10. Cattle of Geryon -->
  <circle cx="370" cy="206" r="8" fill="#FFCC80" stroke="#8D6E63" stroke-width="0.8"/>
  <ellipse cx="370" cy="207" rx="5" ry="3" fill="#8D6E63" opacity="0.7"/>
  <path d="M375,204 L378,200" stroke="#8D6E63" stroke-width="1"/>
  <text x="370" y="219" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">10</text>
  <!-- 11. Apples of Hesperides -->
  <circle cx="406" cy="206" r="8" fill="#F9A825" stroke="#E65100" stroke-width="0.8"/>
  <circle cx="406" cy="204" r="3" fill="#C62828" opacity="0.6"/>
  <line x1="406" y1="201" x2="406" y2="199" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="406" y="219" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">11</text>
  <!-- 12. Cerberus -->
  <circle cx="442" cy="206" r="8" fill="#9E9E9E" stroke="#424242" stroke-width="0.8"/>
  <circle cx="438" cy="204" r="2" fill="#C62828" opacity="0.7"/>
  <circle cx="442" cy="203" r="2" fill="#C62828" opacity="0.7"/>
  <circle cx="446" cy="204" r="2" fill="#C62828" opacity="0.7"/>
  <text x="442" y="219" font-family="Arial,sans-serif" font-size="5" fill="#777" text-anchor="middle">12</text>

  <!-- Bottom bar -->
  <rect x="15" y="310" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Подвиги Геракла</text>
</svg>