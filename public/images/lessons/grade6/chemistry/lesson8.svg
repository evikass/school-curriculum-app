  <text x="312" y="235" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Химическое уравнение</text>

  <!-- Equation: 2H2 + O2 -> 2H2O -->
  <!-- Coefficient -->
  <text x="160" y="262" font-family="Arial,sans-serif" font-size="18" fill="#7B1FA2" font-weight="bold">2</text>
  <text x="175" y="262" font-family="Arial,sans-serif" font-size="18" fill="#2E7D32" font-weight="bold">H</text>
