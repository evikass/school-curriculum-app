<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF3E0"/><stop offset="100%" stop-color="#FFE0B2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle">Химические формулы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 8</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#E65100" stroke-width="1" opacity="0.3"/>


<!-- Formula cards -->
<g transform="translate(70,155)">
  <rect x="-45" y="-40" width="90" height="85" rx="5" fill="white" opacity="0.92" stroke="#E65100" stroke-width="1.5"/>
  <text x="0" y="-22" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#BF360C" text-anchor="middle">H₂O</text>
  <line x1="-35" y1="-12" x2="35" y2="-12" stroke="#E65100" stroke-width="0.5"/>
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Вода</text>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">H — 2 атома</text>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">O — 1 атом</text>
  <text x="0" y="36" font-family="Arial,sans-serif" font-size="5" fill="#FF9800" text-anchor="middle">Mr = 18</text>
</g>

<g transform="translate(200,155)">
  <rect x="-45" y="-40" width="90" height="85" rx="5" fill="white" opacity="0.92" stroke="#E65100" stroke-width="1.5"/>
  <text x="0" y="-22" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#BF360C" text-anchor="middle">NaCl</text>
  <line x1="-35" y1="-12" x2="35" y2="-12" stroke="#E65100" stroke-width="0.5"/>
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Поваренная соль</text>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Na — 1 атом</text>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Cl — 1 атом</text>
  <text x="0" y="36" font-family="Arial,sans-serif" font-size="5" fill="#FF9800" text-anchor="middle">Mr = 58.5</text>
</g>

<g transform="translate(330,155)">
  <rect x="-45" y="-40" width="90" height="85" rx="5" fill="white" opacity="0.92" stroke="#E65100" stroke-width="1.5"/>
  <text x="0" y="-22" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#BF360C" text-anchor="middle">CO₂</text>
  <line x1="-35" y1="-12" x2="35" y2="-12" stroke="#E65100" stroke-width="0.5"/>
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Углекислый газ</text>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">C — 1 атом</text>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">O — 2 атома</text>
  <text x="0" y="36" font-family="Arial,sans-serif" font-size="5" fill="#FF9800" text-anchor="middle">Mr = 44</text>
</g>

<!-- Reading guide -->
<g transform="translate(450,160)">
  <rect x="-35" y="-40" width="70" height="80" rx="5" fill="#FF9800" opacity="0.1" stroke="#E65100" stroke-width="1"/>
  <text x="0" y="-24" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">Как читать</text>
  <text x="0" y="-10" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">аш-два-о</text>
  <text x="0" y="2" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">на-а-цэ-эль</text>
  <text x="0" y="14" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">цэ-о-два</text>
  <line x1="-25" y1="22" x2="25" y2="22" stroke="#E65100" stroke-width="0.3"/>
  <text x="0" y="34" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Индексы = число</text>
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">атомов элемента</text>
</g>

<text x="30" y="270" font-family="Arial,sans-serif" font-size="6" fill="#333">• Химическая формула показывает состав вещества</text>
<text x="30" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333">• Индекс — число атомов элемента в молекуле</text>
<text x="30" y="298" font-family="Arial,sans-serif" font-size="6" fill="#333">• Mr = сумма относительных атомных масс с учёто...</text>


<rect x="10" y="330" width="480" height="16" rx="4" fill="#E65100" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 6 класс — Урок 8</text>
</svg>