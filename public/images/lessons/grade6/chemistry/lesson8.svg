  <!-- O2 -->
  <text x="225" y="262" font-family="Arial,sans-serif" font-size="18" fill="#C62828" font-weight="bold">O</text>
  <text x="238" y="267" font-family="Arial,sans-serif" font-size="13" fill="#C62828">2</text>
