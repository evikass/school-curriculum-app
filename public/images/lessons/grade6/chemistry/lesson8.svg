  <text x="382" y="152" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Cl-</text>
  <circle cx="407" cy="148" r="8" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <text x="407" y="152" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Na+</text>
  <circle cx="432" cy="148" r="8" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <text x="432" y="152" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Cl-</text>
  <circle cx="370" cy="171" r="8" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <text x="370" y="175" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Na+</text>
  <circle cx="395" cy="171" r="8" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <text x="395" y="175" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Cl-</text>
  <circle cx="420" cy="171" r="8" fill="#F9A825" stroke="#F57F17" stroke-width="1"/>
  <text x="420" y="175" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Na+</text>
  <circle cx="445" cy="171" r="8" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <text x="445" y="175" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">Cl-</text>
  <text x="407" y="205" font-family="Arial,sans-serif" font-size="14" fill="#7B1FA2" text-anchor="middle" font-weight="bold">NaCl</text>

  <!-- CH4 molecule -->
