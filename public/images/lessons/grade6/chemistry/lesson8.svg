  <text x="60" y="246" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">H</text>
  <circle cx="100" cy="242" r="10" fill="#1565C0" opacity="0.15" stroke="#1565C0" stroke-width="1.5"/>
  <text x="100" y="246" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">H</text>
  <circle cx="60" cy="278" r="10" fill="#1565C0" opacity="0.15" stroke="#1565C0" stroke-width="1.5"/>
  <text x="60" y="282" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">H</text>
  <circle cx="100" cy="278" r="10" fill="#1565C0" opacity="0.15" stroke="#1565C0" stroke-width="1.5"/>
  <text x="100" y="282" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">H</text>
