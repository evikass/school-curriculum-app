<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#004D40" text-anchor="middle">Валентность химических элементов</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 15</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#00695C" stroke-width="1" opacity="0.3"/>
<!-- Water molecule H₂O showing valence -->
<text x="250" y="72" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C" text-anchor="middle">Валентность — способность атомов образовывать связи</text>

<!-- H₂O molecule -->
<g transform="translate(135, 120)">
  <!-- Oxygen atom -->
  <circle cx="0" cy="0" r="28" fill="#E53935" opacity="0.25" stroke="#E53935" stroke-width="2"/>
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#C62828" text-anchor="middle">O</text>
  <text x="0" y="10" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">II</text>
  
  <!-- Bonds to H -->
  <line x1="28" y1="0" x2="60" y2="0" stroke="#00695C" stroke-width="3"/>
  <line x1="-28" y1="0" x2="-60" y2="0" stroke="#00695C" stroke-width="3"/>
  
  <!-- Hydrogen atoms -->
  <circle cx="75" cy="0" r="20" fill="#42A5F5" opacity="0.25" stroke="#42A5F5" stroke-width="2"/>
  <text x="75" y="-3" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">H</text>
  <text x="75" y="10" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">I</text>
  
  <circle cx="-75" cy="0" r="20" fill="#42A5F5" opacity="0.25" stroke="#42A5F5" stroke-width="2"/>
  <text x="-75" y="-3" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">H</text>
  <text x="-75" y="10" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">I</text>
</g>

<!-- Label for water -->
<text x="135" y="165" font-family="Arial,sans-serif" font-size="10" fill="#004D40" text-anchor="middle">H₂O — валентность O = II</text>
<!-- NH₃ molecule -->
<g transform="translate(385, 120)">
  <!-- Nitrogen atom -->
  <circle cx="0" cy="0" r="28" fill="#7B1FA2" opacity="0.25" stroke="#7B1FA2" stroke-width="2"/>
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#6A1B9A" text-anchor="middle">N</text>
  <text x="0" y="10" font-family="Arial,sans-serif" font-size="8" fill="#6A1B9A" text-anchor="middle">III</text>
  
  <!-- Bonds to 3 H -->
  <line x1="-28" y1="-10" x2="-58" y2="-28" stroke="#00695C" stroke-width="3"/>
  <line x1="-28" y1="10" x2="-58" y2="28" stroke="#00695C" stroke-width="3"/>
  <line x1="28" y1="0" x2="58" y2="0" stroke="#00695C" stroke-width="3"/>
  
  <!-- H atoms -->
  <circle cx="-70" cy="-35" r="16" fill="#42A5F5" opacity="0.25" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="-70" y="-31" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">H</text>
  <circle cx="-70" cy="35" r="16" fill="#42A5F5" opacity="0.25" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="-70" y="39" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">H</text>
  <circle cx="70" cy="0" r="16" fill="#42A5F5" opacity="0.25" stroke="#42A5F5" stroke-width="1.5"/>
  <text x="70" y="4" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">H</text>
</g>
<text x="385" y="165" font-family="Arial,sans-serif" font-size="10" fill="#004D40" text-anchor="middle">NH₃ — валентность N = III</text>
<!-- Valence reference table -->
<rect x="40" y="185" width="420" height="130" rx="8" fill="white" opacity="0.9" stroke="#00695C" stroke-width="1.5"/>
<text x="250" y="205" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#004D40" text-anchor="middle">Таблица валентности</text>
<line x1="60" y1="212" x2="440" y2="212" stroke="#00695C" stroke-width="0.5" opacity="0.5"/>

<!-- Table headers -->
<text x="90" y="228" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Элемент</text>
<text x="170" y="228" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Валентность</text>
<text x="270" y="228" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Элемент</text>
<text x="370" y="228" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C" text-anchor="middle">Валентность</text>
<line x1="60" y1="233" x2="440" y2="233" stroke="#00695C" stroke-width="0.5" opacity="0.3"/>

<!-- Table data left -->
<text x="90" y="248" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">H (водород)</text>
<text x="170" y="248" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" font-weight="bold" text-anchor="middle">I</text>
<text x="90" y="263" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">O (кислород)</text>
<text x="170" y="263" font-family="Arial,sans-serif" font-size="9" fill="#E53935" font-weight="bold" text-anchor="middle">II</text>
<text x="90" y="278" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">N (азот)</text>
<text x="170" y="278" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" font-weight="bold" text-anchor="middle">III</text>
<text x="90" y="293" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">C (углерод)</text>
<text x="170" y="293" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" font-weight="bold" text-anchor="middle">IV</text>

<!-- Table data right -->
<text x="270" y="248" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Na (натрий)</text>
<text x="370" y="248" font-family="Arial,sans-serif" font-size="9" fill="#FF9800" font-weight="bold" text-anchor="middle">I</text>
<text x="270" y="263" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Ca (кальций)</text>
<text x="370" y="263" font-family="Arial,sans-serif" font-size="9" fill="#FF9800" font-weight="bold" text-anchor="middle">II</text>
<text x="270" y="278" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Al (алюминий)</text>
<text x="370" y="278" font-family="Arial,sans-serif" font-size="9" fill="#FF9800" font-weight="bold" text-anchor="middle">III</text>
<text x="270" y="293" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Fe (железо)</text>
<text x="370" y="293" font-family="Arial,sans-serif" font-size="9" fill="#FF9800" font-weight="bold" text-anchor="middle">II, III</text>
<text x="250" y="335" font-family="Arial,sans-serif" font-size="7" fill="#00695C" text-anchor="middle" font-style="italic">Римские цифры обозначают валентность элемента в соединении</text>
</svg>