<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F7FA"/><stop offset="100%" stop-color="#B2EBF2"/></linearGradient>
<linearGradient id="solutionGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4DD0E1" stop-opacity="0.3"/><stop offset="100%" stop-color="#00838F" stop-opacity="0.6"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00838F" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#006064" text-anchor="middle">Растворы и растворимость</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 32</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#00838F" stroke-width="1" opacity="0.3"/>

<!-- Dissolution process: 3 stages -->
<!-- Stage 1: Solid + Water -->
<rect x="30" y="60" width="145" height="160" rx="8" fill="white" fill-opacity="0.4" stroke="#00838F" stroke-width="1"/>
<text x="102" y="78" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#006064" text-anchor="middle">До растворения</text>

<!-- Beaker with water -->
<path d="M 60 90 L 60 180 Q 60 195 75 195 L 130 195 Q 145 195 145 180 L 145 90" fill="#B2EBF2" fill-opacity="0.4" stroke="#00838F" stroke-width="1.5"/>
<!-- Solid chunk at bottom -->
<rect x="80" y="170" width="30" height="20" rx="3" fill="#FFAB40" stroke="#E65100" stroke-width="1.5"/>
<text x="95" y="184" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="middle">соль</text>
<!-- Water label -->
<text x="102" y="155" font-family="Arial,sans-serif" font-size="8" fill="#00838F" text-anchor="middle">H₂O</text>

<!-- Arrow 1 -->
<text x="185" y="140" font-family="Arial,sans-serif" font-size="16" fill="#00838F">→</text>

<!-- Stage 2: Dissolving -->
<rect x="195" y="60" width="145" height="160" rx="8" fill="white" fill-opacity="0.4" stroke="#00838F" stroke-width="1"/>
<text x="267" y="78" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#006064" text-anchor="middle">Растворение</text>

<path d="M 225 90 L 225 180 Q 225 195 240 195 L 295 195 Q 310 195 310 180 L 310 90" fill="url(#solutionGrad)" stroke="#00838F" stroke-width="1.5"/>
<!-- Dissolving particles -->
<circle cx="245" cy="170" r="4" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="260" cy="155" r="3" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="275" cy="165" r="3.5" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="290" cy="150" r="3" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="250" cy="140" r="2.5" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="280" cy="135" r="2" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<!-- Smaller piece still at bottom -->
<rect x="255" y="180" width="12" height="8" rx="2" fill="#FFAB40" stroke="#E65100" stroke-width="1"/>
<!-- Motion arrows -->
<path d="M 260 175 L 255 168" fill="none" stroke="#00838F" stroke-width="0.8"/>
<path d="M 275 170 L 278 160" fill="none" stroke="#00838F" stroke-width="0.8"/>

<!-- Arrow 2 -->
<text x="350" y="140" font-family="Arial,sans-serif" font-size="16" fill="#00838F">→</text>

<!-- Stage 3: Solution -->
<rect x="360" y="60" width="110" height="160" rx="8" fill="white" fill-opacity="0.4" stroke="#00838F" stroke-width="1"/>
<text x="415" y="78" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#006064" text-anchor="middle">Раствор</text>

<path d="M 385 90 L 385 180 Q 385 195 395 195 L 435 195 Q 445 195 445 180 L 445 90" fill="#4DD0E1" fill-opacity="0.5" stroke="#00838F" stroke-width="1.5"/>
<!-- Fully dissolved particles -->
<circle cx="400" cy="130" r="2" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="415" cy="145" r="2" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="430" cy="125" r="2" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="408" cy="160" r="2" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="425" cy="155" r="2" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="395" cy="150" r="2" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="420" cy="170" r="2" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>
<circle cx="410" cy="115" r="2" fill="#FFAB40" stroke="#E65100" stroke-width="0.5"/>

<!-- Bottom section: Solubility info -->
<rect x="30" y="230" width="440" height="105" rx="8" fill="white" fill-opacity="0.5" stroke="#00838F" stroke-width="1"/>
<text x="250" y="250" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#006064" text-anchor="middle">Растворимость зависит от</text>

<rect x="45" y="260" width="130" height="35" rx="5" fill="#B2EBF2" fill-opacity="0.5" stroke="#00838F" stroke-width="1"/>
<text x="110" y="275" font-family="Arial,sans-serif" font-size="9" fill="#006064" text-anchor="middle" font-weight="bold">Температуры</text>
<text x="110" y="288" font-family="Arial,sans-serif" font-size="7" fill="#00838F" text-anchor="middle">T ↑ → растворимость ↑</text>

<rect x="190" y="260" width="130" height="35" rx="5" fill="#B2EBF2" fill-opacity="0.5" stroke="#00838F" stroke-width="1"/>
<text x="255" y="275" font-family="Arial,sans-serif" font-size="9" fill="#006064" text-anchor="middle" font-weight="bold">Природы вещества</text>
<text x="255" y="288" font-family="Arial,sans-serif" font-size="7" fill="#00838F" text-anchor="middle">«Подобное в подобном»</text>

<rect x="335" y="260" width="120" height="35" rx="5" fill="#B2EBF2" fill-opacity="0.5" stroke="#00838F" stroke-width="1"/>
<text x="395" y="275" font-family="Arial,sans-serif" font-size="9" fill="#006064" text-anchor="middle" font-weight="bold">Давления</text>
<text x="395" y="288" font-family="Arial,sans-serif" font-size="7" fill="#00838F" text-anchor="middle">(для газов)</text>

<!-- Types -->
<text x="110" y="315" font-family="Arial,sans-serif" font-size="8" fill="#006064" font-weight="bold">Насыщенный</text>
<text x="110" y="327" font-family="Arial,sans-serif" font-size="7" fill="#00838F">макс. растворено</text>

<text x="255" y="315" font-family="Arial,sans-serif" font-size="8" fill="#006064" font-weight="bold">Ненасыщенный</text>
<text x="255" y="327" font-family="Arial,sans-serif" font-size="7" fill="#00838F">можно ещё добавить</text>

<text x="395" y="315" font-family="Arial,sans-serif" font-size="8" fill="#006064" font-weight="bold">Пересыщенный</text>
<text x="395" y="327" font-family="Arial,sans-serif" font-size="7" fill="#00838F">больше нормы (нестаб.)</text>
</svg>