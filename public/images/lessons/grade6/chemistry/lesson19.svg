<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8EAF6"/><stop offset="100%" stop-color="#C5CAE9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1A237E" text-anchor="middle">Массовая доля элемента</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 19</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#283593" stroke-width="1" opacity="0.3"/>
<!-- Formula explanation -->
<text x="250" y="70" font-family="Arial,sans-serif" font-size="10" fill="#1A237E" text-anchor="middle">Массовая доля ω — отношение массы элемента к массе вещества</text>

<!-- Main formula -->
<rect x="120" y="80" width="260" height="45" rx="8" fill="white" opacity="0.95" stroke="#283593" stroke-width="2"/>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#283593" text-anchor="middle">ω(эл) = n·Ar(эл) / Mr(в-ва) · 100%</text>
<text x="250" y="118" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">где n — число атомов элемента в формуле</text>
<!-- Example H₂O -->
<rect x="30" y="138" width="210" height="180" rx="8" fill="white" opacity="0.92" stroke="#283593" stroke-width="1.5"/>
<text x="135" y="158" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1A237E" text-anchor="middle">Пример: H₂O</text>
<line x1="50" y1="164" x2="220" y2="164" stroke="#283593" stroke-width="0.5" opacity="0.4"/>

<text x="50" y="180" font-family="Arial,sans-serif" font-size="9" fill="#555">Mr(H₂O) = 18</text>
<text x="50" y="198" font-family="Arial,sans-serif" font-size="9" fill="#1A237E" font-weight="bold">ω(H):</text>
<text x="50" y="213" font-family="Arial,sans-serif" font-size="9" fill="#555">= 2·1 / 18 · 100%</text>
<text x="50" y="230" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0">= 11.1%</text>

<text x="50" y="250" font-family="Arial,sans-serif" font-size="9" fill="#1A237E" font-weight="bold">ω(O):</text>
<text x="50" y="265" font-family="Arial,sans-serif" font-size="9" fill="#555">= 16 / 18 · 100%</text>
<text x="50" y="282" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E53935">= 88.9%</text>

<!-- Pie chart for H2O -->
<circle cx="175" cy="235" r="32" fill="none" stroke="#283593" stroke-width="1"/>
<path d="M175,203 A32,32 0 0,1 175,267 Z" fill="#42A5F5" opacity="0.4" stroke="#1565C0" stroke-width="1"/>
<circle cx="175" cy="235" r="32" fill="#E53935" opacity="0.2"/>
<text x="175" y="225" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">H</text>
<text x="175" y="235" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">11.1%</text>
<text x="175" y="250" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">O 88.9%</text>
<!-- Example CO₂ -->
<rect x="260" y="138" width="210" height="180" rx="8" fill="white" opacity="0.92" stroke="#283593" stroke-width="1.5"/>
<text x="365" y="158" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1A237E" text-anchor="middle">Пример: CO₂</text>
<line x1="280" y1="164" x2="450" y2="164" stroke="#283593" stroke-width="0.5" opacity="0.4"/>

<text x="280" y="180" font-family="Arial,sans-serif" font-size="9" fill="#555">Mr(CO₂) = 44</text>
<text x="280" y="198" font-family="Arial,sans-serif" font-size="9" fill="#1A237E" font-weight="bold">ω(C):</text>
<text x="280" y="213" font-family="Arial,sans-serif" font-size="9" fill="#555">= 12 / 44 · 100%</text>
<text x="280" y="230" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32">= 27.3%</text>

<text x="280" y="250" font-family="Arial,sans-serif" font-size="9" fill="#1A237E" font-weight="bold">ω(O):</text>
<text x="280" y="265" font-family="Arial,sans-serif" font-size="9" fill="#555">= 2·16 / 44 · 100%</text>
<text x="280" y="282" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E53935">= 72.7%</text>

<!-- Pie chart for CO2 -->
<circle cx="405" cy="235" r="32" fill="none" stroke="#283593" stroke-width="1"/>
<path d="M405,203 A32,32 0 1,1 405,267 Z" fill="#E53935" opacity="0.2"/>
<path d="M405,203 A32,32 0 0,1 405,267 Z" fill="#4CAF50" opacity="0.3"/>
<text x="405" y="222" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">C</text>
<text x="405" y="232" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">27.3%</text>
<text x="405" y="250" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">O 72.7%</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="#283593" text-anchor="middle" font-style="italic">Проверка: ω(H) + ω(O) = 11.1% + 88.9% = 100% ✓</text>
</svg>