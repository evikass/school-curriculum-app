<rect x="10" y="330" width="480" height="16" rx="4" fill="#BF360C" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 6 класс — Урок 10</text>
