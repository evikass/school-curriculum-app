<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="rustG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="100%" stop-color="#BF360C"/>
    </linearGradient>
    <linearGradient id="magFlame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="30%" stop-color="#FFF9C4"/>
      <stop offset="70%" stop-color="#F9A825"/>
      <stop offset="100%" stop-color="#FF6F00"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Химические реакции</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 10</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Iron + Oxygen -> Rust -->
  <rect x="20" y="88" width="225" height="90" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="132" y="103" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Образование ржавчины (окисление)</text>
  <!-- Iron nail (before) -->
  <rect x="35" y="115" width="7" height="38" rx="1" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <polygon points="38" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <polygon points="38,115 31,124 45,124" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <text x="38" y="163" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Fe</text>
  <!-- Plus -->
  <text x="60" y="138" font-family="Arial,sans-serif" font-size="14" fill="#777">+</text>
  <!-- Oxygen molecule -->
  <circle cx="78" cy="132" r="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="78" y="136" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">O</text>
  <circle cx="100" cy="132" r="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="100" y="136" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">O</text>
  <text x="89" y="163" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">O2</text>
  <!-- Arrow -->
  <line x1="115" y1="132" x2="140" y2="132" stroke="#7B1FA2" stroke-width="2"/>
  <polygon points="140,129 148,132 140,135" fill="#7B1FA2"/>
  <!-- Rusty nail (after) -->
  <rect x="155" y="115" width="7" height="38" rx="1" fill="url(#rustG)" stroke="#BF360C" stroke-width="1"/>
  <polygon points="158,115 151,124 165,124" fill="url(#rustG)" stroke="#BF360C" stroke-width="1"/>
  <!-- Rust flakes -->
  <circle cx="150" cy="140" r="3" fill="#FFAB91" opacity="0.6"/>
  <circle cx="165" cy="145" r="2" fill="#FF8A65" opacity="0.5"/>
  <circle cx="153" cy="150" r="2.5" fill="#FFAB91" opacity="0.4"/>
  <text x="158" y="163" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="middle">Fe2O3</text>
  <!-- Water drops needed -->
  <text x="89" y="172" font-family="Arial,sans-serif" font-size="6" fill="#42A5F5" text-anchor="middle">H2O (катализатор)</text>

  <!-- Baking soda + vinegar -->
  <rect x="255" y="88" width="225" height="90" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="367" y="103" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Сода + уксус: выделение газа</text>
  <!-- Beaker with soda -->
  <path d="M270,118 L270,165 L300,165 L300,118" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <path d="M270,140 L300,140 L300,165 L270,165 Z" fill="#FFFFFF" opacity="0.5"/>
  <text x="285" y="175" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">NaHCO3</text>
  <!-- Plus -->
  <text x="310" y="145" font-family="Arial,sans-serif" font-size="14" fill="#777">+</text>
  <!-- Vinegar bottle -->
  <path d="M325,118 L325,155 Q325,165 335,165 L350,165 Q355,165 355,155 L355,118" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <rect x="332" y="110" width="16" height="10" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <text x="340" y="175" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">CH3COOH</text>
  <!-- Arrow -->
  <line x1="362" y1="140" x2="387" y2="140" stroke="#7B1FA2" stroke-width="2"/>
  <polygon points="387,137 395,140 387,143" fill="#7B1FA2"/>
  <!-- Result: bubbles -->
  <path d="M400,118 L400,165 L460,165 L460,118" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <path d="M400,155 Q415,150 430,155 Q445,160 460,155 L460,165 L400,165 Z" fill="#FFECB3" opacity="0.5"/>
  <!-- Bubbles CO2 -->
  <circle cx="415" cy="145" r="5" fill="white" stroke="#aaa" stroke-width="0.8" opacity="0.6"/>
  <circle cx="430" cy="138" r="4" fill="white" stroke="#aaa" stroke-width="0.8" opacity="0.5"/>
  <circle cx="445" cy="142" r="6" fill="white" stroke="#aaa" stroke-width="0.8" opacity="0.4"/>
  <circle cx="425" cy="128" r="3" fill="white" stroke="#aaa" stroke-width="0.8" opacity="0.5"/>
  <circle cx="440" cy="125" r="4" fill="white" stroke="#aaa" stroke-width="0.8" opacity="0.3"/>
  <circle cx="455" cy="132" r="3.5" fill="white" stroke="#aaa" stroke-width="0.8" opacity="0.45"/>
  <text x="430" y="175" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">CO2 + H2O + NaCO3</text>

  <!-- Magnesium burning -->
  <rect x="20" y="185" width="225" height="110" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="132" y="200" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Горение магния (сильное свечение)</text>
  <!-- Magnesium ribbon (before) -->
  <rect x="35" y="215" width="50" height="3" rx="1" fill="#BDBDBD" stroke="#757575" stroke-width="0.8"/>
  <text x="60" y="230" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Mg (лента)</text>
  <!-- Plus -->
  <text x="100" y="222" font-family="Arial,sans-serif" font-size="12" fill="#777">+</text>
  <!-- Oxygen -->
  <circle cx="120" cy="218" r="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="120" y="222" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">O2</text>
  <!-- Arrow -->
  <line x1="135" y1="218" x2="155" y2="218" stroke="#7B1FA2" stroke-width="2"/>
  <polygon points="155,215 163,218 155,221" fill="#7B1FA2"/>
  <!-- Burning magnesium with bright flame -->
  <rect x="170" y="210" width="8" height="35" rx="1" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="0.8"/>
  <!-- Bright white flame -->
  <path d="M174,210 Q168,195 174,180 Q180,195 186,188 Q182,200 188,210 Z" fill="#FFFFFF" stroke="#FFF9C4" stroke-width="1"/>
  <path d="M174,210 Q170,198 174,188 Q178,198 180,192 Q179,202 183,210 Z" fill="#FFFFFF" opacity="0.9"/>
  <!-- Glow effect -->
  <circle cx="174" cy="195" r="18" fill="#FFFDE7" opacity="0.3"/>
  <circle cx="174" cy="195" r="12" fill="#FFFFFF" opacity="0.2"/>
  <!-- Sparks -->
  <line x1="165" y1="190" x2="158" y2="185" stroke="#FFEE58" stroke-width="1" opacity="0.6"/>
  <line x1="183" y1="188" x2="190" y2="183" stroke="#FFEE58" stroke-width="1" opacity="0.6"/>
  <line x1="170" y1="182" x2="165" y2="175" stroke="#FFEE58" stroke-width="1" opacity="0.5"/>
  <text x="174" y="258" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">MgO (белый)</text>
  <text x="174" y="270" font-family="Arial,sans-serif" font-size="6" fill="#777" text-anchor="middle">Яркий белый свет!</text>

  <!-- Signs of chemical reactions -->
  <rect x="255" y="185" width="225" height="110" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="367" y="200" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle" font-weight="bold">Признаки реакций</text>
  <!-- Color change -->
  <rect x="268" y="208" width="12" height="12" rx="2" fill="#EF5350"/>
  <text x="295" y="218" font-family="Arial,sans-serif" font-size="8" fill="#555">Изменение цвета</text>
  <!-- Gas release -->
  <circle cx="274" cy="240" r="5" fill="white" stroke="#aaa" stroke-width="0.8" opacity="0.6"/>
  <circle cx="268" cy="235" r="3" fill="white" stroke="#aaa" stroke-width="0.8" opacity="0.5"/>
  <text x="295" y="242" font-family="Arial,sans-serif" font-size="8" fill="#555">Выделение газа</text>
  <!-- Precipitate -->
  <rect x="268" y="255" width="12" height="10" rx="0" fill="none" stroke="#78909C" stroke-width="1"/>
  <rect x="270" y="260" width="8" height="5" rx="1" fill="#FFAB91" opacity="0.7"/>
  <text x="295" y="268" font-family="Arial,sans-serif" font-size="8" fill="#555">Выпадение осадка</text>
  <!-- Heat/light -->
  <path d="M271,280 Q268,275 274,270 Q280,275 277,280 Z" fill="#FF7043" opacity="0.6"/>
  <text x="295" y="286" font-family="Arial,sans-serif" font-size="8" fill="#555">Выделение тепла/света</text>

  <!-- Reaction types -->
  <rect x="390" y="208" width="80" height="80" rx="4" fill="#F3E5F5" stroke="#CE93D8" stroke-width="1"/>
  <text x="430" y="222" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Типы</text>
  <text x="430" y="236" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Соединение</text>
  <text x="430" y="250" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Разложение</text>
  <text x="430" y="264" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Замещение</text>
  <text x="430" y="278" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Обмен</text>

  <rect x="15" y="310" width="470" height="30" rx="4" fill="#2E7D32" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Химические реакции</text>
</svg>