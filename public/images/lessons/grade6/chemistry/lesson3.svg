<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Атомы и молекулы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 3</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#1565C0" stroke-width="1" opacity="0.3"/>


<!-- Atom detail -->
<g transform="translate(100,175)">
  <circle cx="0" cy="0" r="10" fill="#2196F3" opacity="0.6" stroke="#1565C0" stroke-width="2"/>
  <text x="0" y="4" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">+</text>
  <ellipse cx="0" cy="0" rx="30" ry="12" fill="none" stroke="#2196F3" stroke-width="1.2" transform="rotate(-30)" opacity="0.6"/>
  <ellipse cx="0" cy="0" rx="30" ry="12" fill="none" stroke="#2196F3" stroke-width="1.2" transform="rotate(30)" opacity="0.6"/>
  <circle cx="28" cy="-12" r="3" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  <circle cx="-28" cy="12" r="3" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  <circle cx="0" cy="-30" r="3" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">Атом</text>
  <text x="0" y="60" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Наименьшая частица элемента</text>
</g>

<!-- Molecule H2O -->
<g transform="translate(250,170)">
  <circle cx="0" cy="0" r="18" fill="#2196F3" opacity="0.4" stroke="#1565C0" stroke-width="2"/>
  <text x="0" y="5" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">O</text>
  <circle cx="-22" cy="18" r="11" fill="#FF9800" opacity="0.5" stroke="#E65100" stroke-width="1.2"/>
  <text x="-22" y="22" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">H</text>
  <circle cx="22" cy="18" r="11" fill="#FF9800" opacity="0.5" stroke="#E65100" stroke-width="1.2"/>
  <text x="22" y="22" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">H</text>
  <line x1="-12" y1="10" x2="-15" y2="13" stroke="#1565C0" stroke-width="2.5"/>
  <line x1="12" y1="10" x2="15" y2="13" stroke="#1565C0" stroke-width="2.5"/>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">Молекула H₂O</text>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Частица вещества</text>
</g>

<!-- Comparison panel -->
<g transform="translate(400,165)">
  <rect x="-50" y="-45" width="100" height="100" rx="6" fill="white" opacity="0.9" stroke="#1565C0" stroke-width="1.2"/>
  <text x="0" y="-30" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">Различие</text>
  <line x1="-40" y1="-24" x2="40" y2="-24" stroke="#1565C0" stroke-width="0.5"/>
  <circle cx="-30" cy="-10" r="4" fill="#2196F3" opacity="0.5"/>
  <text x="-20" y="-7" font-family="Arial,sans-serif" font-size="6" fill="#333">Атом — один элемент</text>
  <circle cx="-30" cy="8" r="4" fill="#FF9800" opacity="0.5"/>
  <text x="-20" y="11" font-family="Arial,sans-serif" font-size="6" fill="#333">Молекула — несколько</text>
  <text x="-20" y="20" font-family="Arial,sans-serif" font-size="6" fill="#333">атомов</text>
  <line x1="-40" y1="28" x2="40" y2="28" stroke="#1565C0" stroke-width="0.3"/>
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Атомы → Молекулы → Вещество</text>
</g>

<text x="30" y="270" font-family="Arial,sans-serif" font-size="6" fill="#333">• Атом — мельчайшая частица элемента, молекула ...</text>
<text x="30" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333">• Молекулы состоят из атомов, соединённых химич...</text>
<text x="30" y="298" font-family="Arial,sans-serif" font-size="6" fill="#333">• Диффузия — перемешивание веществ из-за движен...</text>


<rect x="10" y="330" width="480" height="16" rx="4" fill="#1565C0" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 6 класс — Урок 3</text>
</svg>