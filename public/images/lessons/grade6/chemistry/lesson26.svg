<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF3E0"/><stop offset="100%" stop-color="#FFE0B2"/></linearGradient>
<linearGradient id="acidLiquid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF9800" stop-opacity="0.6"/><stop offset="100%" stop-color="#E65100" stop-opacity="0.8"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle">Кислоты</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 26</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#E65100" stroke-width="1" opacity="0.3"/>

<!-- HCl bottle -->
<rect x="40" y="90" width="60" height="100" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
<rect x="50" y="80" width="40" height="15" rx="3" fill="#E65100"/>
<rect x="42" y="140" width="56" height="48" rx="3" fill="url(#acidLiquid)"/>
<text x="70" y="122" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#BF360C" text-anchor="middle">HCl</text>
<text x="70" y="200" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Соляная</text>
<text x="70" y="210" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">кислота</text>

<!-- H2SO4 bottle -->
<rect x="130" y="90" width="60" height="100" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
<rect x="140" y="80" width="40" height="15" rx="3" fill="#E65100"/>
<rect x="132" y="140" width="56" height="48" rx="3" fill="url(#acidLiquid)"/>
<text x="160" y="122" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">H₂SO₄</text>
<text x="160" y="200" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Серная</text>
<text x="160" y="210" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">кислота</text>

<!-- HNO3 bottle -->
<rect x="220" y="90" width="60" height="100" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
<rect x="230" y="80" width="40" height="15" rx="3" fill="#E65100"/>
<rect x="222" y="140" width="56" height="48" rx="3" fill="url(#acidLiquid)"/>
<text x="250" y="122" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#BF360C" text-anchor="middle">HNO₃</text>
<text x="250" y="200" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Азотная</text>
<text x="250" y="210" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">кислота</text>

<!-- Hazard symbol -->
<polygon points="330,90 345,120 315,120" fill="#FF6D00" stroke="#BF360C" stroke-width="2"/>
<text x="330" y="116" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">!</text>
<text x="330" y="135" font-family="Arial,sans-serif" font-size="8" fill="#BF360C" text-anchor="middle">Осторожно!</text>
<text x="330" y="145" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Едкие вещества</text>

<!-- H+ ion -->
<circle cx="370" cy="105" r="15" fill="#FF9800" fill-opacity="0.3" stroke="#E65100" stroke-width="1.5"/>
<text x="370" y="110" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#BF360C" text-anchor="middle">H⁺</text>
<text x="370" y="130" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">ион кислоты</text>

<!-- Properties box -->
<rect x="30" y="225" width="440" height="110" rx="8" fill="white" fill-opacity="0.5" stroke="#E65100" stroke-width="1"/>
<text x="250" y="245" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#BF360C" text-anchor="middle">Свойства кислот</text>

<circle cx="55" cy="268" r="4" fill="#E65100"/>
<text x="65" y="272" font-family="Arial,sans-serif" font-size="9" fill="#BF360C">Кислый вкус</text>

<circle cx="55" cy="288" r="4" fill="#E65100"/>
<text x="65" y="292" font-family="Arial,sans-serif" font-size="9" fill="#BF360C">Изменяют окраску индикаторов</text>

<circle cx="55" cy="308" r="4" fill="#E65100"/>
<text x="65" y="312" font-family="Arial,sans-serif" font-size="9" fill="#BF360C">Реагируют с металлами → соль + H₂↑</text>

<circle cx="280" cy="268" r="4" fill="#E65100"/>
<text x="290" y="272" font-family="Arial,sans-serif" font-size="9" fill="#BF360C">Реагируют с основаниями</text>

<circle cx="280" cy="288" r="4" fill="#E65100"/>
<text x="290" y="292" font-family="Arial,sans-serif" font-size="9" fill="#BF360C">Разъедают материалы</text>

<circle cx="280" cy="308" r="4" fill="#E65100"/>
<text x="290" y="312" font-family="Arial,sans-serif" font-size="9" fill="#BF360C">Содержат H⁺ ионы в растворе</text>

<!-- Additional acid: CH3COOH -->
<rect x="400" y="90" width="70" height="80" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
<rect x="410" y="82" width="50" height="12" rx="3" fill="#E65100"/>
<text x="435" y="122" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">CH₃COOH</text>
<text x="435" y="150" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Уксусная</text>
<text x="435" y="160" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">кислота</text>
</svg>