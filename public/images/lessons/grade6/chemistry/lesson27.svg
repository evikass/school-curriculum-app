<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ECEFF1"/><stop offset="100%" stop-color="#CFD8DC"/></linearGradient>
<linearGradient id="baseLiquid" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#78909C" stop-opacity="0.5"/><stop offset="100%" stop-color="#37474F" stop-opacity="0.7"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#37474F" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#263238" text-anchor="middle">Основания</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 27</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#37474F" stroke-width="1" opacity="0.3"/>

<!-- NaOH container -->
<rect x="40" y="85" width="80" height="110" rx="8" fill="white" stroke="#37474F" stroke-width="2"/>
<rect x="55" y="75" width="50" height="15" rx="4" fill="#37474F"/>
<rect x="42" y="145" width="76" height="48" rx="4" fill="url(#baseLiquid)"/>
<text x="80" y="120" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238" text-anchor="middle">NaOH</text>
<text x="80" y="135" font-family="Arial,sans-serif" font-size="7" fill="#37474F" text-anchor="middle">едкий натр</text>
<text x="80" y="210" font-family="Arial,sans-serif" font-size="8" fill="#263238" text-anchor="middle">Гидроксид</text>
<text x="80" y="222" font-family="Arial,sans-serif" font-size="8" fill="#263238" text-anchor="middle">натрия</text>

<!-- KOH container -->
<rect x="150" y="85" width="80" height="110" rx="8" fill="white" stroke="#37474F" stroke-width="2"/>
<rect x="165" y="75" width="50" height="15" rx="4" fill="#37474F"/>
<rect x="152" y="145" width="76" height="48" rx="4" fill="url(#baseLiquid)"/>
<text x="190" y="120" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238" text-anchor="middle">KOH</text>
<text x="190" y="135" font-family="Arial,sans-serif" font-size="7" fill="#37474F" text-anchor="middle">едкое кали</text>
<text x="190" y="210" font-family="Arial,sans-serif" font-size="8" fill="#263238" text-anchor="middle">Гидроксид</text>
<text x="190" y="222" font-family="Arial,sans-serif" font-size="8" fill="#263238" text-anchor="middle">калия</text>

<!-- Ca(OH)2 container -->
<rect x="260" y="85" width="80" height="110" rx="8" fill="white" stroke="#37474F" stroke-width="2"/>
<rect x="275" y="75" width="50" height="15" rx="4" fill="#37474F"/>
<rect x="262" y="145" width="76" height="48" rx="4" fill="url(#baseLiquid)"/>
<text x="300" y="118" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#263238" text-anchor="middle">Ca(OH)₂</text>
<text x="300" y="135" font-family="Arial,sans-serif" font-size="7" fill="#37474F" text-anchor="middle">гашёная известь</text>
<text x="300" y="210" font-family="Arial,sans-serif" font-size="8" fill="#263238" text-anchor="middle">Гидроксид</text>
<text x="300" y="222" font-family="Arial,sans-serif" font-size="8" fill="#263238" text-anchor="middle">кальция</text>

<!-- OH- ion -->
<circle cx="410" cy="120" r="22" fill="#546E7A" fill-opacity="0.2" stroke="#37474F" stroke-width="2"/>
<text x="410" y="125" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#263238" text-anchor="middle">OH⁻</text>
<text x="410" y="155" font-family="Arial,sans-serif" font-size="8" fill="#37474F" text-anchor="middle">ион основания</text>

<!-- Metal ion + OH- diagram -->
<circle cx="430" cy="195" r="12" fill="#B0BEC5" stroke="#37474F" stroke-width="1.5"/>
<text x="430" y="199" font-family="Arial,sans-serif" font-size="8" fill="#263238" text-anchor="middle">Me</text>
<text x="450" y="199" font-family="Arial,sans-serif" font-size="10" fill="#37474F">⁺</text>

<text x="460" y="199" font-family="Arial,sans-serif" font-size="12" fill="#263238">+</text>

<circle cx="480" cy="195" r="12" fill="#78909C" fill-opacity="0.4" stroke="#37474F" stroke-width="1.5"/>
<text x="480" y="199" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#263238" text-anchor="middle">OH⁻</text>

<!-- Properties -->
<rect x="30" y="240" width="440" height="95" rx="8" fill="white" fill-opacity="0.5" stroke="#37474F" stroke-width="1"/>
<text x="250" y="258" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#263238" text-anchor="middle">Свойства оснований</text>

<circle cx="50" cy="278" r="3.5" fill="#37474F"/>
<text x="60" y="282" font-family="Arial,sans-serif" font-size="9" fill="#263238">Мылкие на ощупь</text>

<circle cx="50" cy="298" r="3.5" fill="#37474F"/>
<text x="60" y="302" font-family="Arial,sans-serif" font-size="9" fill="#263238">Изменяют окраску индикаторов</text>

<circle cx="50" cy="318" r="3.5" fill="#37474F"/>
<text x="60" y="322" font-family="Arial,sans-serif" font-size="9" fill="#263238">Реагируют с кислотами (нейтрализация)</text>

<circle cx="280" cy="278" r="3.5" fill="#37474F"/>
<text x="290" y="282" font-family="Arial,sans-serif" font-size="9" fill="#263238">Растворимые — щёлочи</text>

<circle cx="280" cy="298" r="3.5" fill="#37474F"/>
<text x="290" y="302" font-family="Arial,sans-serif" font-size="9" fill="#263238">Нерастворимые разлагаются при нагревании</text>

<circle cx="280" cy="318" r="3.5" fill="#37474F"/>
<text x="290" y="322" font-family="Arial,sans-serif" font-size="9" fill="#263238">Общая формула: Me(OH)ₙ</text>
</svg>