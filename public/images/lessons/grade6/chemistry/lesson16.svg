<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Химические формулы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 16</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#1565C0" stroke-width="1" opacity="0.3"/>
<!-- Title explanation -->
<text x="250" y="70" font-family="Arial,sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle">Химическая формула — условная запись состава вещества</text>

<!-- H₂O card -->
<rect x="30" y="82" width="140" height="100" rx="8" fill="white" opacity="0.92" stroke="#1565C0" stroke-width="1.5"/>
<text x="100" y="100" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1" text-anchor="middle">Вода</text>
<text x="100" y="130" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#1565C0" text-anchor="middle">H₂O</text>
<text x="100" y="155" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">2 атома H + 1 атом O</text>
<text x="100" y="170" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Индекс: 2 (при H)</text>

<!-- NaCl card -->
<rect x="180" y="82" width="140" height="100" rx="8" fill="white" opacity="0.92" stroke="#1565C0" stroke-width="1.5"/>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1" text-anchor="middle">Поваренная соль</text>
<text x="250" y="130" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#1565C0" text-anchor="middle">NaCl</text>
<text x="250" y="155" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">1 атом Na + 1 атом Cl</text>
<text x="250" y="170" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Индексы: 1 и 1</text>

<!-- CO₂ card -->
<rect x="330" y="82" width="140" height="100" rx="8" fill="white" opacity="0.92" stroke="#1565C0" stroke-width="1.5"/>
<text x="400" y="100" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1" text-anchor="middle">Углекислый газ</text>
<text x="400" y="130" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#1565C0" text-anchor="middle">CO₂</text>
<text x="400" y="155" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">1 атом C + 2 атома O</text>
<text x="400" y="170" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Индекс: 2 (при O)</text>
<!-- Formula anatomy -->
<rect x="40" y="195" width="420" height="80" rx="8" fill="white" opacity="0.9" stroke="#1565C0" stroke-width="1.5"/>
<text x="250" y="215" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1" text-anchor="middle">Строение формулы H₂SO₄</text>

<!-- Large formula with annotations -->
<text x="130" y="255" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#1565C0" text-anchor="middle">H₂SO₄</text>

<!-- Annotation arrows -->
<line x1="120" y1="235" x2="110" y2="220" stroke="#E53935" stroke-width="1"/>
<text x="75" y="218" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle">Символ</text>
<text x="75" y="228" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle">элемента</text>

<line x1="132" y1="235" x2="132" y2="218" stroke="#4CAF50" stroke-width="1"/>
<text x="132" y="215" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50" text-anchor="middle">Индекс</text>

<line x1="165" y1="248" x2="165" y2="218" stroke="#FF9800" stroke-width="1"/>
<text x="165" y="215" font-family="Arial,sans-serif" font-size="7" fill="#FF9800" text-anchor="middle">Символ</text>

<line x1="220" y1="255" x2="240" y2="235" stroke="#9C27B0" stroke-width="1"/>
<text x="260" y="230" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0" text-anchor="middle">Индекс</text>
<!-- Additional formula examples -->
<text x="250" y="295" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle">Другие формулы:</text>

<rect x="50" y="303" width="80" height="30" rx="5" fill="#BBDEFB" opacity="0.6" stroke="#1565C0" stroke-width="1"/>
<text x="90" y="323" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">Fe₂O₃</text>

<rect x="145" y="303" width="70" height="30" rx="5" fill="#BBDEFB" opacity="0.6" stroke="#1565C0" stroke-width="1"/>
<text x="180" y="323" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">CaO</text>

<rect x="230" y="303" width="80" height="30" rx="5" fill="#BBDEFB" opacity="0.6" stroke="#1565C0" stroke-width="1"/>
<text x="270" y="323" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">H₃PO₄</text>

<rect x="325" y="303" width="70" height="30" rx="5" fill="#BBDEFB" opacity="0.6" stroke="#1565C0" stroke-width="1"/>
<text x="360" y="323" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">NH₃</text>

<rect x="410" y="303" width="70" height="30" rx="5" fill="#BBDEFB" opacity="0.6" stroke="#1565C0" stroke-width="1"/>
<text x="445" y="323" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1565C0" text-anchor="middle">CH₄</text>
</svg>