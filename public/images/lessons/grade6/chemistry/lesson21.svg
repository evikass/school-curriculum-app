<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFEBEE"/><stop offset="100%" stop-color="#FFCDD2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#B71C1C" text-anchor="middle">Химические реакции и их признаки</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 21</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#C62828" stroke-width="1" opacity="0.3"/>
<!-- Definition -->
<text x="250" y="70" font-family="Arial,sans-serif" font-size="10" fill="#B71C1C" text-anchor="middle">Признаки химических реакций — видимые изменения при реакциях</text>
<!-- Sign 1: Color change -->
<rect x="30" y="80" width="215" height="80" rx="8" fill="white" opacity="0.92" stroke="#C62828" stroke-width="1.5"/>
<text x="137" y="98" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#B71C1C" text-anchor="middle">1. Изменение цвета</text>

<!-- Before: colorless solution -->
<rect x="50" y="108" width="30" height="40" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5"/>
<rect x="53" y="128" width="24" height="17" rx="1" fill="#BBDEFB" opacity="0.8"/>
<text x="65" y="155" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">до</text>

<!-- Arrow -->
<text x="100" y="135" font-family="Arial,sans-serif" font-size="16" fill="#C62828" text-anchor="middle">→</text>

<!-- After: colored solution -->
<rect x="120" y="108" width="30" height="40" rx="3" fill="#FFCDD2" stroke="#E53935" stroke-width="1.5"/>
<rect x="123" y="128" width="24" height="17" rx="1" fill="#EF5350" opacity="0.8"/>
<text x="135" y="155" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">после</text>

<!-- Example text -->
<text x="195" y="125" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Фенолфталеин</text>
<text x="195" y="138" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">+ щёлочь</text>
<text x="195" y="151" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">→ малиновый</text>
<!-- Sign 2: Gas bubbles -->
<rect x="255" y="80" width="215" height="80" rx="8" fill="white" opacity="0.92" stroke="#C62828" stroke-width="1.5"/>
<text x="362" y="98" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#B71C1C" text-anchor="middle">2. Выделение газа</text>

<!-- Test tube with bubbles -->
<rect x="310" y="108" width="25" height="42" rx="3" fill="#E8F5E9" stroke="#81C784" stroke-width="1.5"/>
<rect x="312" y="130" width="21" height="17" rx="1" fill="#A5D6A7" opacity="0.8"/>
<!-- Bubbles -->
<circle cx="318" cy="118" r="3" fill="none" stroke="#4CAF50" stroke-width="1"/>
<circle cx="326" cy="112" r="2.5" fill="none" stroke="#4CAF50" stroke-width="1"/>
<circle cx="322" cy="105" r="2" fill="none" stroke="#4CAF50" stroke-width="1"/>
<text x="322" y="155" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">пузырьки</text>

<!-- Example text -->
<text x="420" y="125" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Кислота +</text>
<text x="420" y="138" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">металл</text>
<text x="420" y="151" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">→ H₂ ↑</text>
<!-- Sign 3: Precipitate -->
<rect x="30" y="170" width="215" height="80" rx="8" fill="white" opacity="0.92" stroke="#C62828" stroke-width="1.5"/>
<text x="137" y="188" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#B71C1C" text-anchor="middle">3. Образование осадка</text>

<!-- Test tube with precipitate -->
<rect x="60" y="198" width="25" height="42" rx="3" fill="#FFF9C4" stroke="#FDD835" stroke-width="1.5"/>
<rect x="62" y="225" width="21" height="12" rx="1" fill="#FDD835" opacity="0.9"/>
<!-- Precipitate dots -->
<circle cx="67" cy="232" r="1.5" fill="#F9A825"/>
<circle cx="73" cy="228" r="1.5" fill="#F9A825"/>
<circle cx="70" cy="234" r="1.5" fill="#F9A825"/>
<text x="72" y="248" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">осадок ↓</text>

<!-- Example text -->
<text x="175" y="210" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">AgNO₃ + NaCl</text>
<text x="175" y="225" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">→ AgCl ↓ белый</text>
<text x="175" y="240" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">осадок</text>
<!-- Sign 4: Heat and light -->
<rect x="255" y="170" width="215" height="80" rx="8" fill="white" opacity="0.92" stroke="#C62828" stroke-width="1.5"/>
<text x="362" y="188" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#B71C1C" text-anchor="middle">4. Выделение тепла и света</text>

<!-- Flame icon -->
<ellipse cx="340" cy="230" rx="10" ry="18" fill="#FF9800" opacity="0.5"/>
<ellipse cx="340" cy="233" rx="6" ry="12" fill="#FFC107" opacity="0.6"/>
<ellipse cx="340" cy="236" rx="3" ry="6" fill="#2196F3" opacity="0.5"/>
<text x="340" y="248" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">горение</text>

<!-- Example text -->
<text x="420" y="210" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">Горение</text>
<text x="420" y="225" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">CH₄ + O₂ →</text>
<text x="420" y="240" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">CO₂ + H₂O + Q</text>
<!-- Summary -->
<rect x="30" y="262" width="440" height="68" rx="8" fill="white" opacity="0.92" stroke="#C62828" stroke-width="1.5"/>
<text x="250" y="280" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#B71C1C" text-anchor="middle">Признаки реакции позволяют определить, что реакция произошла</text>
<line x1="50" y1="286" x2="450" y2="286" stroke="#C62828" stroke-width="0.5" opacity="0.3"/>

<rect x="50" y="292" width="90" height="28" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<text x="95" y="310" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle">Цвет →</text>

<rect x="150" y="292" width="90" height="28" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<text x="195" y="310" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle">Газ ↑</text>

<rect x="250" y="292" width="90" height="28" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<text x="295" y="310" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle">Осадок ↓</text>

<rect x="350" y="292" width="100" height="28" rx="4" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<text x="400" y="310" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle">Тепло + свет</text>
</svg>