<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFECB3"/></linearGradient>
<linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#E65100"/><stop offset="50%" stop-color="#FF8F00"/><stop offset="100%" stop-color="#FFD54F"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#FF8F00" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Кристаллизация и выпаривание</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 34</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#FF8F00" stroke-width="1" opacity="0.3"/>

<!-- Evaporation setup -->
<!-- Tripod/stand -->
<line x1="60" y1="220" x2="80" y2="170" stroke="#795548" stroke-width="3"/>
<line x1="140" y1="220" x2="120" y2="170" stroke="#795548" stroke-width="3"/>
<line x1="80" y1="170" x2="120" y2="170" stroke="#795548" stroke-width="2.5"/>
<!-- Wire gauze -->
<line x1="70" y1="172" x2="130" y2="172" stroke="#9E9E9E" stroke-width="1"/>

<!-- Evaporation dish -->
<ellipse cx="100" cy="168" rx="40" ry="10" fill="#BCAAA4" stroke="#795548" stroke-width="2"/>
<path d="M 60 168 Q 60 158 100 155 Q 140 158 140 168" fill="#FFCC80" fill-opacity="0.5" stroke="#795548" stroke-width="1.5"/>

<!-- Steam/vapor rising -->
<path d="M 85 150 Q 80 135 88 120" fill="none" stroke="#BDBDBD" stroke-width="1.5" opacity="0.6"/>
<path d="M 100 148 Q 95 130 103 115" fill="none" stroke="#BDBDBD" stroke-width="1.5" opacity="0.6"/>
<path d="M 115 150 Q 110 135 118 118" fill="none" stroke="#BDBDBD" stroke-width="1.5" opacity="0.6"/>

<!-- Flame -->
<ellipse cx="85" cy="215" rx="10" ry="15" fill="url(#flameGrad)" opacity="0.8"/>
<ellipse cx="100" cy="212" rx="12" ry="18" fill="url(#flameGrad)" opacity="0.9"/>
<ellipse cx="115" cy="215" rx="10" ry="15" fill="url(#flameGrad)" opacity="0.8"/>
<!-- Inner flame -->
<ellipse cx="100" cy="218" rx="5" ry="8" fill="#FFF9C4" opacity="0.7"/>

<!-- Labels -->
<text x="100" y="248" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Выпаривание</text>
<text x="100" y="260" font-family="Arial,sans-serif" font-size="7" fill="#FF8F00" text-anchor="middle">(нагревание)</text>

<!-- Arrow between processes -->
<text x="175" y="180" font-family="Arial,sans-serif" font-size="10" fill="#FF8F00">или</text>

<!-- Crystallization setup: beaker with crystals -->
<path d="M 210 140 L 210 225 Q 210 240 225 240 L 285 240 Q 300 240 300 225 L 300 140" fill="#FFF8E1" fill-opacity="0.5" stroke="#795548" stroke-width="2"/>
<!-- Solution level -->
<rect x="212" y="155" width="86" height="83" rx="2" fill="#4FC3F7" fill-opacity="0.3"/>

<!-- Crystals at bottom -->
<polygon points="230,225 237,215 244,225" fill="#FFB74D" stroke="#E65100" stroke-width="1"/>
<polygon points="250,228 257,218 264,228" fill="#FFB74D" stroke="#E65100" stroke-width="1"/>
<polygon points="270,225 277,215 284,225" fill="#FFB74D" stroke="#E65100" stroke-width="1"/>
<polygon points="240,232 247,222 254,232" fill="#FFA726" stroke="#E65100" stroke-width="1"/>
<polygon points="260,232 267,222 274,232" fill="#FFA726" stroke="#E65100" stroke-width="1"/>

<!-- Seed crystal being lowered on string -->
<line x1="255" y1="140" x2="255" y2="190" stroke="#795548" stroke-width="0.8"/>
<polygon points="250,190 255,182 260,190" fill="#FF8F00" stroke="#E65100" stroke-width="1"/>
<text x="255" y="204" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">затравка</text>

<text x="255" y="260" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Кристаллизация</text>
<text x="255" y="272" font-family="Arial,sans-serif" font-size="7" fill="#FF8F00" text-anchor="middle">(охлаждение)</text>

<!-- Crystal shapes section on right -->
<rect x="325" y="60" width="155" height="170" rx="8" fill="white" fill-opacity="0.4" stroke="#FF8F00" stroke-width="1"/>
<text x="402" y="78" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Формы кристаллов</text>

<!-- Cubic crystal (NaCl) -->
<rect x="345" y="90" width="30" height="30" fill="none" stroke="#E65100" stroke-width="1.5" transform="rotate(5,360,105)"/>
<rect x="349" y="94" width="22" height="22" fill="#FFECB3" stroke="#FF8F00" stroke-width="0.5" transform="rotate(5,360,105)"/>
<text x="360" y="135" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Кубическая</text>

<!-- Hexagonal crystal -->
<polygon points="430,95 445,88 460,95 460,110 445,117 430,110" fill="#FFECB3" stroke="#E65100" stroke-width="1.5"/>
<text x="445" y="135" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Гексагональная</text>

<!-- Rhombic crystal -->
<polygon points="360,155 385,148 410,155 385,178" fill="#FFECB3" stroke="#E65100" stroke-width="1.5"/>
<text x="385" y="195" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Ромбическая</text>

<!-- Needle crystal -->
<line x1="350" y1="215" x2="420" y2="200" stroke="#E65100" stroke-width="3"/>
<line x1="350" y1="218" x2="420" y2="203" stroke="#FF8F00" stroke-width="2"/>
<text x="385" y="230" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Иголчатая</text>

<!-- Bottom section -->
<rect x="30" y="280" width="440" height="55" rx="8" fill="white" fill-opacity="0.5" stroke="#FF8F00" stroke-width="1"/>
<text x="250" y="298" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Способы разделения смесей</text>

<rect x="45" y="308" width="120" height="20" rx="4" fill="#FFECB3" stroke="#FF8F00" stroke-width="0.8"/>
<text x="105" y="322" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Выпаривание (t°↑)</text>

<rect x="180" y="308" width="140" height="20" rx="4" fill="#FFECB3" stroke="#FF8F00" stroke-width="0.8"/>
<text x="250" y="322" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Кристаллизация (t°↓)</text>

<rect x="335" y="308" width="120" height="20" rx="4" fill="#FFECB3" stroke="#FF8F00" stroke-width="0.8"/>
<text x="395" y="322" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Фильтрование</text>
</svg>