<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F1F8E9"/><stop offset="100%" stop-color="#DCEDC8"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#558B2F" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#33691E" text-anchor="middle">Типы химических реакций</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 23</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#558B2F" stroke-width="1" opacity="0.3"/>
<!-- Type 1: Соединение -->
<rect x="25" y="58" width="225" height="85" rx="8" fill="white" opacity="0.92" stroke="#558B2F" stroke-width="1.5"/>
<text x="137" y="76" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">1. Соединение</text>
<text x="137" y="88" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">A + B → AB</text>

<!-- Visual: two circles merging -->
<circle cx="75" cy="115" r="12" fill="#42A5F5" opacity="0.3" stroke="#1565C0" stroke-width="1.5"/>
<text x="75" y="119" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">A</text>
<text x="105" y="115" font-family="Arial,sans-serif" font-size="12" fill="#558B2F" text-anchor="middle">+</text>
<circle cx="130" cy="115" r="12" fill="#E53935" opacity="0.3" stroke="#C62828" stroke-width="1.5"/>
<text x="130" y="119" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">B</text>
<text x="160" y="115" font-family="Arial,sans-serif" font-size="12" fill="#558B2F" text-anchor="middle">→</text>
<circle cx="195" cy="115" r="16" fill="#9C27B0" opacity="0.3" stroke="#7B1FA2" stroke-width="1.5"/>
<text x="195" y="119" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle">AB</text>

<text x="137" y="138" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" text-anchor="middle">2Mg + O₂ → 2MgO</text>
<!-- Type 2: Разложение -->
<rect x="260" y="58" width="215" height="85" rx="8" fill="white" opacity="0.92" stroke="#558B2F" stroke-width="1.5"/>
<text x="367" y="76" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">2. Разложение</text>
<text x="367" y="88" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">AB → A + B</text>

<!-- Visual: one circle splitting -->
<circle cx="310" cy="115" r="16" fill="#9C27B0" opacity="0.3" stroke="#7B1FA2" stroke-width="1.5"/>
<text x="310" y="119" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#7B1FA2" text-anchor="middle">AB</text>
<text x="340" y="115" font-family="Arial,sans-serif" font-size="12" fill="#558B2F" text-anchor="middle">→</text>
<circle cx="370" cy="105" r="12" fill="#42A5F5" opacity="0.3" stroke="#1565C0" stroke-width="1.5"/>
<text x="370" y="109" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">A</text>
<text x="392" y="115" font-family="Arial,sans-serif" font-size="12" fill="#558B2F" text-anchor="middle">+</text>
<circle cx="420" cy="125" r="12" fill="#E53935" opacity="0.3" stroke="#C62828" stroke-width="1.5"/>
<text x="420" y="129" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">B</text>

<text x="367" y="138" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" text-anchor="middle">2H₂O → 2H₂ + O₂</text>
<!-- Type 3: Замещение -->
<rect x="25" y="152" width="225" height="85" rx="8" fill="white" opacity="0.92" stroke="#558B2F" stroke-width="1.5"/>
<text x="137" y="170" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">3. Замещение</text>
<text x="137" y="182" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">A + BC → AC + B</text>

<!-- Visual: substitution -->
<circle cx="70" cy="208" r="10" fill="#42A5F5" opacity="0.3" stroke="#1565C0" stroke-width="1.5"/>
<text x="70" y="212" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0" text-anchor="middle">A</text>
<rect x="90" y="198" width="30" height="20" rx="3" fill="#9C27B0" opacity="0.2" stroke="#7B1FA2" stroke-width="1"/>
<text x="105" y="212" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle">BC</text>
<text x="135" y="208" font-family="Arial,sans-serif" font-size="12" fill="#558B2F" text-anchor="middle">→</text>
<rect x="150" y="198" width="30" height="20" rx="3" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="1"/>
<text x="165" y="212" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">AC</text>
<circle cx="200" cy="208" r="10" fill="#E53935" opacity="0.3" stroke="#C62828" stroke-width="1.5"/>
<text x="200" y="212" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">B</text>

<text x="137" y="232" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" text-anchor="middle">Zn + 2HCl → ZnCl₂ + H₂</text>
<!-- Type 4: Обмен -->
<rect x="260" y="152" width="215" height="85" rx="8" fill="white" opacity="0.92" stroke="#558B2F" stroke-width="1.5"/>
<text x="367" y="170" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">4. Обмен</text>
<text x="367" y="182" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">AB + CD → AD + CB</text>

<!-- Visual: exchange -->
<rect x="285" y="198" width="28" height="20" rx="3" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="1"/>
<text x="299" y="212" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">AB</text>
<rect x="320" y="198" width="28" height="20" rx="3" fill="#C62828" opacity="0.2" stroke="#C62828" stroke-width="1"/>
<text x="334" y="212" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">CD</text>
<text x="365" y="208" font-family="Arial,sans-serif" font-size="12" fill="#558B2F" text-anchor="middle">→</text>
<rect x="380" y="198" width="28" height="20" rx="3" fill="#2E7D32" opacity="0.2" stroke="#2E7D32" stroke-width="1"/>
<text x="394" y="212" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">AD</text>
<rect x="415" y="198" width="28" height="20" rx="3" fill="#E65100" opacity="0.2" stroke="#E65100" stroke-width="1"/>
<text x="429" y="212" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">CB</text>

<!-- Curved exchange arrows -->
<path d="M299,198 Q299,188 394,198" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,2"/>
<path d="M334,218 Q334,228 429,218" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>

<text x="367" y="232" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" text-anchor="middle">NaOH + HCl → NaCl + H₂O</text>
<!-- Summary -->
<rect x="25" y="248" width="450" height="82" rx="8" fill="white" opacity="0.92" stroke="#558B2F" stroke-width="1.5"/>
<text x="250" y="266" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#33691E" text-anchor="middle">Сводная таблица типов реакций</text>
<line x1="45" y1="272" x2="455" y2="272" stroke="#558B2F" stroke-width="0.5" opacity="0.3"/>

<text x="110" y="287" font-family="Arial,sans-serif" font-size="8" fill="#33691E" font-weight="bold" text-anchor="middle">Соединение</text>
<text x="110" y="300" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">A + B → AB</text>
<text x="110" y="312" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" text-anchor="middle">Много → Мало</text>

<text x="220" y="287" font-family="Arial,sans-serif" font-size="8" fill="#33691E" font-weight="bold" text-anchor="middle">Разложение</text>
<text x="220" y="300" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">AB → A + B</text>
<text x="220" y="312" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" text-anchor="middle">Мало → Много</text>

<text x="330" y="287" font-family="Arial,sans-serif" font-size="8" fill="#33691E" font-weight="bold" text-anchor="middle">Замещение</text>
<text x="330" y="300" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">A + BC → AC + B</text>
<text x="330" y="312" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" text-anchor="middle">1 элемент меняет</text>

<text x="430" y="287" font-family="Arial,sans-serif" font-size="8" fill="#33691E" font-weight="bold" text-anchor="middle">Обмен</text>
<text x="430" y="300" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">AB+CD→AD+CB</text>
<text x="430" y="312" font-family="Arial,sans-serif" font-size="7" fill="#558B2F" text-anchor="middle">Обмен частями</text>

<!-- Vertical separators -->
<line x1="165" y1="278" x2="165" y2="318" stroke="#558B2F" stroke-width="0.5" opacity="0.3"/>
<line x1="275" y1="278" x2="275" y2="318" stroke="#558B2F" stroke-width="0.5" opacity="0.3"/>
<line x1="385" y1="278" x2="385" y2="318" stroke="#558B2F" stroke-width="0.5" opacity="0.3"/>
</svg>