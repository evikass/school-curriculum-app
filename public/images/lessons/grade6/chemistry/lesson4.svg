<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#E1BEE7"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle">Агрегатные состояния</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 4</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#7B1FA2" stroke-width="1" opacity="0.3"/>


<!-- Solid (ice) -->
<g transform="translate(80,175)">
  <rect x="-30" y="-30" width="60" height="60" rx="3" fill="#9C27B0" opacity="0.15" stroke="#7B1FA2" stroke-width="2"/>
  <!-- Crystal lattice -->
  <line x1="-20" y1="-20" x2="20" y2="-20" stroke="#9C27B0" stroke-width="1" opacity="0.5"/>
  <line x1="-20" y1="0" x2="20" y2="0" stroke="#9C27B0" stroke-width="1" opacity="0.5"/>
  <line x1="-20" y1="20" x2="20" y2="20" stroke="#9C27B0" stroke-width="1" opacity="0.5"/>
  <line x1="-20" y1="-20" x2="-20" y2="20" stroke="#9C27B0" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="-20" x2="0" y2="20" stroke="#9C27B0" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="-20" x2="20" y2="20" stroke="#9C27B0" stroke-width="1" opacity="0.5"/>
  <!-- Atoms at lattice points -->
  <circle cx="-20" cy="-20" r="4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="0" cy="-20" r="4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="20" cy="-20" r="4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="-20" cy="0" r="4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="0" cy="0" r="4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="20" cy="0" r="4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="-20" cy="20" r="4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="0" cy="20" r="4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="20" cy="20" r="4" fill="#9C27B0" opacity="0.7"/>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">Твёрдое</text>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Кристаллическая решётка</text>
</g>

<!-- Liquid (water) -->
<g transform="translate(250,180)">
  <path d="M-35,-15 Q-40,0 -35,15 Q-20,25 0,20 Q20,25 35,15 Q40,0 35,-15 Q20,-25 0,-20 Q-20,-25 -35,-15 Z" fill="#9C27B0" opacity="0.25" stroke="#7B1FA2" stroke-width="1.5"/>
  <!-- Loosely packed molecules -->
  <circle cx="-12" cy="-5" r="5" fill="#9C27B0" opacity="0.6"/>
  <circle cx="8" cy="-3" r="5" fill="#9C27B0" opacity="0.6"/>
  <circle cx="-5" cy="8" r="5" fill="#9C27B0" opacity="0.6"/>
  <circle cx="15" cy="10" r="5" fill="#9C27B0" opacity="0.6"/>
  <circle cx="-18" cy="6" r="4" fill="#9C27B0" opacity="0.5"/>
  <text x="0" y="38" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">Жидкое</text>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Свободно скользят</text>
</g>

<!-- Gas (vapor) -->
<g transform="translate(400,175)">
  <circle cx="-20" cy="-20" r="4" fill="#9C27B0" opacity="0.4"/>
  <circle cx="15" cy="-25" r="3" fill="#9C27B0" opacity="0.35"/>
  <circle cx="-10" cy="10" r="3.5" fill="#9C27B0" opacity="0.4"/>
  <circle cx="20" cy="5" r="3" fill="#9C27B0" opacity="0.35"/>
  <circle cx="0" cy="-5" r="2.5" fill="#9C27B0" opacity="0.3"/>
  <circle cx="-25" cy="20" r="2" fill="#9C27B0" opacity="0.25"/>
  <circle cx="10" cy="25" r="2.5" fill="#9C27B0" opacity="0.3"/>
  <!-- Motion arrows -->
  <path d="M-15,-22 L-10,-28" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.5"/>
  <path d="M18,-22 L22,-28" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.5"/>
  <path d="M-6,13 L-2,18" fill="none" stroke="#7B1FA2" stroke-width="0.8" opacity="0.5"/>
  <text x="0" y="45" font-family="Arial,sans-serif" font-size="8" fill="#4A148C" text-anchor="middle" font-weight="bold">Газообразное</text>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Хаотичное движение</text>
</g>

<!-- Arrows between states -->
<line x1="130" y1="180" x2="190" y2="180" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="310" y1="180" x2="360" y2="180" stroke="#7B1FA2" stroke-width="1.5"/>
<polygon points="360,177 370,180 360,183" fill="#7B1FA2"/>

<text x="30" y="270" font-family="Arial,sans-serif" font-size="6" fill="#333">• Три состояния: твёрдое, жидкое, газообразное</text>
<text x="30" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333">• Переходы: плавление, кристаллизация, испарени...</text>
<text x="30" y="298" font-family="Arial,sans-serif" font-size="6" fill="#333">• Температуры плавления и кипения — уникальные ...</text>


<rect x="10" y="330" width="480" height="16" rx="4" fill="#7B1FA2" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 6 класс — Урок 4</text>
</svg>