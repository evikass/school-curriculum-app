<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение атома</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 6</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>


<!-- Atom cross-section -->
<g transform="translate(150,190)">
  <!-- Electron shells -->
  <circle cx="0" cy="0" r="70" fill="none" stroke="#66BB6A" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
  <circle cx="0" cy="0" r="45" fill="none" stroke="#66BB6A" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- Nucleus -->
  <circle cx="0" cy="0" r="18" fill="#66BB6A" opacity="0.3" stroke="#2E7D32" stroke-width="2"/>
  <text x="0" y="4" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ядро</text>
  <!-- Protons and neutrons -->
  <circle cx="-5" cy="-5" r="5" fill="#F44336" opacity="0.6" stroke="#C62828" stroke-width="0.8"/>
  <text x="-5" y="-3" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">p+</text>
  <circle cx="6" cy="-4" r="5" fill="#2196F3" opacity="0.6" stroke="#1565C0" stroke-width="0.8"/>
  <text x="6" y="-2" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">n</text>
  <circle cx="0" cy="6" r="5" fill="#F44336" opacity="0.6" stroke="#C62828" stroke-width="0.8"/>
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">p+</text>
  <!-- Electrons -->
  <circle cx="45" cy="0" r="4" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <text x="45" y="3" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">e⁻</text>
  <circle cx="-45" cy="0" r="4" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <text x="-45" y="3" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">e⁻</text>
  <circle cx="70" cy="0" r="3" fill="#FF9800" opacity="0.7" stroke="#E65100" stroke-width="0.8"/>
  <circle cx="-20" cy="-67" r="3" fill="#FF9800" opacity="0.7" stroke="#E65100" stroke-width="0.8"/>
  <circle cx="20" cy="67" r="3" fill="#FF9800" opacity="0.7" stroke="#E65100" stroke-width="0.8"/>
</g>

<!-- Legend panel -->
<g transform="translate(380,145)">
  <rect x="-55" y="-40" width="110" height="105" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="0" y="-24" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Частицы атома</text>
  <line x1="-45" y1="-18" x2="45" y2="-18" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="-30" cy="-5" r="5" fill="#F44336" opacity="0.6" stroke="#C62828" stroke-width="0.8"/>
  <text x="-18" y="-2" font-family="Arial,sans-serif" font-size="6" fill="#333">Протон (+)</text>
  <circle cx="-30" cy="12" r="5" fill="#2196F3" opacity="0.6" stroke="#1565C0" stroke-width="0.8"/>
  <text x="-18" y="15" font-family="Arial,sans-serif" font-size="6" fill="#333">Нейтрон (0)</text>
  <circle cx="-30" cy="29" r="5" fill="#FF9800" opacity="0.7" stroke="#E65100" stroke-width="0.8"/>
  <text x="-18" y="32" font-family="Arial,sans-serif" font-size="6" fill="#333">Электрон (−)</text>
  <line x1="-45" y1="42" x2="45" y2="42" stroke="#2E7D32" stroke-width="0.3"/>
  <text x="0" y="54" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Атом электронейтрален</text>
</g>

<text x="30" y="270" font-family="Arial,sans-serif" font-size="6" fill="#333">• Атом состоит из ядра (протоны + нейтроны) и э...</text>
<text x="30" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333">• Число протонов = порядковый номер элемента</text>
<text x="30" y="298" font-family="Arial,sans-serif" font-size="6" fill="#333">• Атом электронейтрален: число протонов = числу...</text>


<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 6 класс — Урок 6</text>
</svg>