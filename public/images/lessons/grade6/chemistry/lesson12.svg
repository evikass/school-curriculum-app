  <text x="-20" y="48" font-family="Arial,sans-serif" font-size="6" fill="#333">Кислоты и основания</text>
</g>

<text x="30" y="270" font-family="Arial,sans-serif" font-size="6" fill="#333">• Химия изучает вещества и их превращения</text>
<text x="30" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333">• Атомы — основа всех веществ, молекулы — части...</text>
<text x="30" y="298" font-family="Arial,sans-serif" font-size="6" fill="#333">• Кислоты и основания — важнейшие классы соедин...</text>


<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 6 класс — Урок 12</text>
</svg>