  <circle cx="0" cy="0" r="30" fill="#4CAF50" opacity="0.3" stroke="#2E7D32" stroke-width="2"/>
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Химия</text>
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">6 класс</text>
  
  <!-- Branches -->
  <line x1="-30" y1="-15" x2="-75" y2="-50" stroke="#2E7D32" stroke-width="1.5" opacity="0.6"/>
  <circle cx="-85" cy="-55" r="22" fill="#4CAF50" opacity="0.3" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="-85" y="-58" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Атомы и</text>
  <text x="-85" y="-48" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">молекулы</text>
  
  <line x1="30" y1="-15" x2="75" y2="-50" stroke="#2E7D32" stroke-width="1.5" opacity="0.6"/>
  <circle cx="85" cy="-55" r="22" fill="#2196F3" opacity="0.3" stroke="#1565C0" stroke-width="1.5"/>
  <text x="85" y="-58" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Таблица</text>
  <text x="85" y="-48" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Менделеева</text>
  
  <line x1="-30" y1="15" x2="-75" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.6"/>
  <circle cx="-85" cy="55" r="22" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="1.5"/>
  <text x="-85" y="52" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Химические</text>
  <text x="-85" y="62" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">формулы</text>
  
  <line x1="30" y1="15" x2="75" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.6"/>
  <circle cx="85" cy="55" r="22" fill="#F44336" opacity="0.3" stroke="#C62828" stroke-width="1.5"/>
  <text x="85" y="52" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Реакции</text>
  <text x="85" y="62" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">и признаки</text>
</g>

<!-- Review panel -->
<g transform="translate(420,175)">
