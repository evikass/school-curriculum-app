<text x="30" y="270" font-family="Arial,sans-serif" font-size="6" fill="#333">• Химический элемент — вид атомов с одинаковым ...</text>
<text x="30" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333">• Знаки элементов записываются латинскими буква...</text>
<text x="30" y="298" font-family="Arial,sans-serif" font-size="6" fill="#333">• Менделеев создал периодическую таблицу в 1869...</text>


