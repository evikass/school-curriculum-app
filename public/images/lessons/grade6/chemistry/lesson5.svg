<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e0d0"/>
      <stop offset="100%" stop-color="#d0c8b0"/>
    </linearGradient>
    <linearGradient id="summaryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e8d8"/>
      <stop offset="100%" stop-color="#d8ccb0"/>
    </linearGradient>
  </defs>
  <rect width="480" height="340" fill="url(#bg5)" rx="12"/>
  <rect x="8" y="8" width="464" height="324" fill="none" stroke="#a09070" stroke-width="1.5" rx="8" stroke-dasharray="4,3"/>
  <text x="240" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#5a4a2a" font-family="serif">Обобщение: Введение в химию</text>
  <!-- Central summary circle -->
  <circle cx="240" cy="160" r="55" fill="#f0e8d8" stroke="#a09070" stroke-width="2"/>
  <circle cx="240" cy="160" r="50" fill="url(#summaryGrad)" stroke="#b0a080" stroke-width="1"/>
  <text x="240" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#5a4a2a">ХИМИЯ</text>
  <text x="240" y="160" text-anchor="middle" font-size="8" fill="#7a6a4a">наука о</text>
  <text x="240" y="173" text-anchor="middle" font-size="8" fill="#7a6a4a">веществах</text>
  <text x="240" y="188" text-anchor="middle" font-size="8" fill="#7a6a4a">и реакциях</text>
  <!-- Branch 1: Вещество (top-left) -->
  <line x1="195" y1="120" x2="110" y2="65" stroke="#6a8a5a" stroke-width="2"/>
  <rect x="55" y="42" width="100" height="45" rx="6" fill="#d8e8d0" stroke="#6a8a5a" stroke-width="1.5"/>
  <text x="105" y="60" text-anchor="middle" font-size="9" font-weight="bold" fill="#2d5a2d">Вещество</text>
  <text x="105" y="73" text-anchor="middle" font-size="7" fill="#4a7a4a">простое / сложное</text>
  <text x="105" y="83" text-anchor="middle" font-size="7" fill="#4a7a4a">тело / смесь</text>
  <!-- Branch 2: Атом (top-right) -->
  <line x1="285" y1="120" x2="370" y2="65" stroke="#5070a0" stroke-width="2"/>
  <rect x="320" y="42" width="100" height="45" rx="6" fill="#d8e0f0" stroke="#5070a0" stroke-width="1.5"/>
  <text x="370" y="60" text-anchor="middle" font-size="9" font-weight="bold" fill="#2a3860">Атом</text>
  <text x="370" y="73" text-anchor="middle" font-size="7" fill="#4a6090">химически неделим</text>
  <text x="370" y="83" text-anchor="middle" font-size="7" fill="#4a6090">элемент → вещество</text>
  <!-- Branch 3: Молекула (left) -->
  <line x1="185" y1="165" x2="75" y2="170" stroke="#8a6a5a" stroke-width="2"/>
  <rect x="15" y="148" width="105" height="45" rx="6" fill="#f0e0d0" stroke="#8a6a5a" stroke-width="1.5"/>
  <text x="67" y="166" text-anchor="middle" font-size="9" font-weight="bold" fill="#5a3a2a">Молекула</text>
  <text x="67" y="179" text-anchor="middle" font-size="7" fill="#7a5a4a">сохраняет свойства</text>
  <text x="67" y="189" text-anchor="middle" font-size="7" fill="#7a5a4a">вещества</text>
  <!-- Branch 4: Явления (right) -->
  <line x1="295" y1="165" x2="370" y2="148" stroke="#8a5a8a" stroke-width="2"/>
  <rect x="320" y="118" width="110" height="60" rx="6" fill="#f0d8f0" stroke="#8a5a8a" stroke-width="1.5"/>
  <text x="375" y="136" text-anchor="middle" font-size="9" font-weight="bold" fill="#5a2a5a">Явления</text>
  <text x="375" y="149" text-anchor="middle" font-size="7" fill="#7a4a7a">физические — без</text>
  <text x="375" y="159" text-anchor="middle" font-size="7" fill="#7a4a7a">новых веществ</text>
  <text x="375" y="169" text-anchor="middle" font-size="7" fill="#7a4a7a">химические — с</text>
  <text x="375" y="179" text-anchor="middle" font-size="7" fill="#7a4a7a">новыми веществами</text>
  <!-- Branch 5: Признаки реакций (bottom-right) -->
  <line x1="280" y1="205" x2="370" y2="225" stroke="#a08a40" stroke-width="2"/>
  <rect x="320" y="205" width="115" height="65" rx="6" fill="#f0e8c8" stroke="#a08a40" stroke-width="1.5"/>
  <text x="377" y="222" text-anchor="middle" font-size="8" font-weight="bold" fill="#6a5a20">Признаки реакций</text>
  <text x="377" y="234" text-anchor="middle" font-size="7" fill="#8a7a40">1. Газ</text>
  <text x="377" y="244" text-anchor="middle" font-size="7" fill="#8a7a40">2. Осадок</text>
  <text x="377" y="254" text-anchor="middle" font-size="7" fill="#8a7a40">3. Цвет / Тепло / Запах</text>
  <text x="377" y="264" text-anchor="middle" font-size="7" fill="#8a7a40">4. Условия: t, катализ</text>
  <!-- Branch 6: Аллотропия (bottom-left) -->
  <line x1="200" y1="205" x2="110" y2="230" stroke="#5a8a6a" stroke-width="2"/>
  <rect x="40" y="215" width="110" height="55" rx="6" fill="#d0e8d8" stroke="#5a8a6a" stroke-width="1.5"/>
  <text x="95" y="232" text-anchor="middle" font-size="8" font-weight="bold" fill="#2a5a3a">Аллотропия</text>
  <text x="95" y="244" text-anchor="middle" font-size="7" fill="#4a7a5a">C: алмаз / графит</text>
  <text x="95" y="254" text-anchor="middle" font-size="7" fill="#4a7a5a">O: O2 / O3</text>
  <text x="95" y="264" text-anchor="middle" font-size="7" fill="#4a7a5a">1 элемент → несколько</text>
  <text x="95" y="274" text-anchor="middle" font-size="7" fill="#4a7a5a">простых веществ</text>
  <!-- Comparison table at bottom -->
  <rect x="140" y="290" width="200" height="40" rx="4" fill="#e8e0d0" stroke="#a09070" stroke-width="1"/>
  <line x1="240" y1="290" x2="240" y2="330" stroke="#a09070" stroke-width="1"/>
  <text x="190" y="306" text-anchor="middle" font-size="7" font-weight="bold" fill="#5a4a2a">Элемент</text>
  <text x="190" y="318" text-anchor="middle" font-size="7" fill="#7a6a4a">вид атомов</text>
  <text x="290" y="306" text-anchor="middle" font-size="7" font-weight="bold" fill="#5a4a2a">Вещество</text>
  <text x="290" y="318" text-anchor="middle" font-size="7" fill="#7a6a4a">форма существования</text>
  <!-- Key question -->
  <text x="240" y="283" text-anchor="middle" font-size="8" fill="#5a4a2a" font-style="italic">В чём разница?</text>
  <!-- Decorative -->
  <circle cx="20" cy="45" r="2" fill="#c8b888" opacity="0.5"/>
  <circle cx="460" cy="45" r="2" fill="#c8b888" opacity="0.5"/>
  <circle cx="25" cy="335" r="1.5" fill="#a09868" opacity="0.4"/>
  <circle cx="455" cy="335" r="1.5" fill="#a09868" opacity="0.4"/>
  <!-- Small flask icon -->
  <path d="M440,280 L445,270 L445,260 L455,260 L455,270 L460,280 Q462,288 450,288 Q438,288 440,280" fill="#d8e8d0" stroke="#6a8a5a" stroke-width="1" opacity="0.6"/>
  <!-- Dalton portrait hint -->
  <circle cx="30" cy="110" r="15" fill="#e8e0d0" stroke="#a09070" stroke-width="1"/>
  <circle cx="30" cy="105" r="6" fill="#d0c8b0" stroke="#8a7a5a" stroke-width="0.5"/>
  <text x="30" y="135" text-anchor="middle" font-size="6" fill="#7a6a4a">Дальтон</text>
  <text x="30" y="145" text-anchor="middle" font-size="6" fill="#7a6a4a">1803 г.</text>
  <!-- Lavoisier hint -->
  <circle cx="450" cy="90" r="15" fill="#e8e0d0" stroke="#a09070" stroke-width="1"/>
  <circle cx="450" cy="85" r="6" fill="#d0c8b0" stroke="#8a7a5a" stroke-width="0.5"/>
  <text x="450" y="115" text-anchor="middle" font-size="6" fill="#7a6a4a">Лавуазье</text>
  <text x="450" y="125" text-anchor="middle" font-size="6" fill="#7a6a4a">XVIII в.</text>
</svg>
