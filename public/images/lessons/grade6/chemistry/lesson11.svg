  <text x="405" y="128" text-anchor="middle" font-size="9" font-weight="bold" fill="#5a3a20">Д.И. Менделеев</text>
  <text x="405" y="140" text-anchor="middle" font-size="7" fill="#7a5a30">1834-1907</text>
  <text x="405" y="152" text-anchor="middle" font-size="7" fill="#7a5a30">Открыл таблицу</text>
  <text x="405" y="163" text-anchor="middle" font-size="7" fill="#7a5a30">в 1869 году</text>
