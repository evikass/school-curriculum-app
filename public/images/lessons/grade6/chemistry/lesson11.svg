  <text x="115" y="298" text-anchor="middle" font-size="7" fill="#7a5a30">6</text>
  <text x="115" y="314" text-anchor="middle" font-size="18" font-weight="bold" fill="#5a3a20">C</text>
  <text x="148" y="300" font-size="7" fill="#5a3a20">Углерод</text>
  <text x="148" y="312" font-size="7" fill="#7a5a30">Ar = 12.011</text>
  <text x="148" y="322" font-size="6" fill="#7a5a30">2 период, IV группа</text>
