  <rect x="20" y="170" width="440" height="80" rx="5" fill="#f8f0e0" stroke="#a08860" stroke-width="1"/>
  <text x="240" y="188" text-anchor="middle" font-size="9" font-weight="bold" fill="#5a3a20">Структура таблицы</text>
  <text x="40" y="205" font-size="7" fill="#5a3a20">Периоды (строки) — число уровней = номер периода</text>
  <text x="40" y="218" font-size="7" fill="#5a3a20">Группы (столбцы) — элементы с одинаковым числом e- на внешнем уровне</text>
  <text x="40" y="231" font-size="7" fill="#5a3a20">В группе сверху вниз: металлические свойства усиливаются</text>
  <text x="40" y="244" font-size="7" fill="#5a3a20">В периоде слева направо: неметаллические свойства усиливаются</text>
