<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FCE4EC"/><stop offset="100%" stop-color="#F8BBD0"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C2185B" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#880E4F" text-anchor="middle">Кислоты и основания</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 11</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#C2185B" stroke-width="1" opacity="0.3"/>


<!-- Acid bottle -->
<g transform="translate(80,175)">
  <rect x="-30" y="-40" width="60" height="75" rx="4" fill="#F44336" opacity="0.08" stroke="#C62828" stroke-width="1.8"/>
  <path d="M-25,5 Q-27,28 -15,30 L15,30 Q27,28 25,5 Z" fill="#F44336" opacity="0.2"/>
  <rect x="-15" y="-42" width="30" height="6" rx="2" fill="#C62828" opacity="0.3"/>
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#C62828" text-anchor="middle">HCl</text>
  <text x="0" y="45" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Кислота</text>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">pH &lt; 7, кислый вкус</text>
</g>

<!-- Base bottle -->
<g transform="translate(220,175)">
  <rect x="-30" y="-40" width="60" height="75" rx="4" fill="#2196F3" opacity="0.08" stroke="#1565C0" stroke-width="1.8"/>
  <path d="M-25,5 Q-27,28 -15,30 L15,30 Q27,28 25,5 Z" fill="#2196F3" opacity="0.2"/>
  <rect x="-15" y="-42" width="30" height="6" rx="2" fill="#1565C0" opacity="0.3"/>
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">NaOH</text>
  <text x="0" y="45" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Основание</text>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">pH &gt; 7, мылкий</text>
</g>

<!-- pH scale -->
<g transform="translate(380,160)">
  <rect x="-70" y="-30" width="140" height="85" rx="5" fill="white" opacity="0.92" stroke="#C2185B" stroke-width="1.2"/>
  <text x="0" y="-14" font-family="Arial,sans-serif" font-size="8" fill="#880E4F" text-anchor="middle" font-weight="bold">Шкала pH</text>
  <line x1="-60" y1="-5" x2="60" y2="-5" stroke="#333" stroke-width="1.5"/>
  <!-- Color gradient bar -->
  <rect x="-60" y="0" width="15" height="12" fill="#F44336"/>
  <rect x="-45" y="0" width="15" height="12" fill="#FF9800"/>
  <rect x="-30" y="0" width="15" height="12" fill="#FFC107"/>
  <rect x="-15" y="0" width="15" height="12" fill="#4CAF50"/>
  <rect x="0" y="0" width="15" height="12" fill="#8BC34A"/>
  <rect x="15" y="0" width="15" height="12" fill="#2196F3"/>
  <rect x="30" y="0" width="15" height="12" fill="#1565C0"/>
  <rect x="45" y="0" width="15" height="12" fill="#3F51B5"/>
  <text x="-52" y="22" font-family="Arial,sans-serif" font-size="5" fill="#666">0</text>
  <text x="-30" y="22" font-family="Arial,sans-serif" font-size="5" fill="#666">3</text>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="5" fill="#666">7</text>
  <text x="30" y="22" font-family="Arial,sans-serif" font-size="5" fill="#666">11</text>
  <text x="53" y="22" font-family="Arial,sans-serif" font-size="5" fill="#666">14</text>
  <text x="-45" y="35" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Кислоты</text>
  <text x="-5" y="35" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">Нейтр.</text>
  <text x="30" y="35" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">Щёлочи</text>
  <!-- Indicators -->
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Лакмус: кислота → красный</text>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Лакмус: щёлочь → синий</text>
</g>

<text x="30" y="270" font-family="Arial,sans-serif" font-size="6" fill="#333">• Кислоты содержат атомы H и кислотные остатки</text>
<text x="30" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333">• Основания содержат атомы металла и группы OH</text>
<text x="30" y="298" font-family="Arial,sans-serif" font-size="6" fill="#333">• Нейтрализация: кислота + основание = соль + в...</text>


<rect x="10" y="330" width="480" height="16" rx="4" fill="#C2185B" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 6 класс — Урок 11</text>
</svg>