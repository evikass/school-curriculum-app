<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="phScale" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C62828"/>
      <stop offset="15%" stop-color="#EF5350"/>
      <stop offset="30%" stop-color="#FF9800"/>
      <stop offset="45%" stop-color="#FFEE58"/>
      <stop offset="55%" stop-color="#CDDC39"/>
      <stop offset="70%" stop-color="#66BB6A"/>
      <stop offset="85%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Кислоты и основания</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- pH Scale -->
  <rect x="25" y="88" width="450" height="55" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="250" y="102" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Шкала pH (кислотность)</text>
  <!-- pH bar -->
  <rect x="40" y="108" width="420" height="18" rx="9" fill="url(#phScale)"/>
  <!-- pH numbers -->
  <text x="40" y="140" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">0</text>
  <text x="61" y="140" font-family="Arial,sans-serif" font-size="8" fill="#EF5350" text-anchor="middle">1</text>
  <text x="82" y="140" font-family="Arial,sans-serif" font-size="8" fill="#EF5350" text-anchor="middle">2</text>
  <text x="103" y="140" font-family="Arial,sans-serif" font-size="8" fill="#FF9800" text-anchor="middle">3</text>
  <text x="124" y="140" font-family="Arial,sans-serif" font-size="8" fill="#FF9800" text-anchor="middle">4</text>
  <text x="145" y="140" font-family="Arial,sans-serif" font-size="8" fill="#FFEE58" text-anchor="middle">5</text>
  <text x="166" y="140" font-family="Arial,sans-serif" font-size="8" fill="#CDDC39" text-anchor="middle">6</text>
  <text x="188" y="140" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">7</text>
  <text x="209" y="140" font-family="Arial,sans-serif" font-size="8" fill="#66BB6A" text-anchor="middle">8</text>
  <text x="230" y="140" font-family="Arial,sans-serif" font-size="8" fill="#66BB6A" text-anchor="middle">9</text>
  <text x="251" y="140" font-family="Arial,sans-serif" font-size="8" fill="#42A5F5" text-anchor="middle">10</text>
  <text x="272" y="140" font-family="Arial,sans-serif" font-size="8" fill="#42A5F5" text-anchor="middle">11</text>
  <text x="293" y="140" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">12</text>
  <text x="314" y="140" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">13</text>
  <text x="335" y="140" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle">14</text>
  <!-- Labels -->
  <text x="80" y="113" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">КИСЛАЯ</text>
  <text x="185" y="113" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">НЕЙТР</text>
  <text x="310" y="113" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle">ЩЕЛОЧНАЯ</text>
  <!-- Neutral marker -->
  <line x1="188" y1="106" x2="188" y2="108" stroke="#2E7D32" stroke-width="2"/>
  <line x1="188" y1="126" x2="188" y2="130" stroke="#2E7D32" stroke-width="2"/>
  <!-- Arrow labels -->
  <text x="65" y="102" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Кислоты</text>
  <text x="315" y="102" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Основания</text>

  <!-- Examples: Acid side -->
  <rect x="25" y="150" width="145" height="85" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="97" y="164" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Кислоты</text>
  <!-- Lemon -->
  <ellipse cx="50" cy="195" rx="16" ry="12" fill="#FFEE58" stroke="#F9A825" stroke-width="1.5"/>
  <ellipse cx="50" cy="195" rx="14" ry="10" fill="#FFF9C4" opacity="0.5"/>
  <text x="50" y="213" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Лимон</text>
  <text x="50" y="222" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">pH ~ 2</text>
  <!-- Vinegar -->
  <path d="M80,182 L80,202 L100,202 L100,182" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <rect x="87" y="176" width="6" height="8" rx="1" fill="#8D6E63"/>
  <text x="90" y="213" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Уксус</text>
  <text x="90" y="222" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">pH ~ 3</text>
  <!-- HCl beaker -->
  <path d="M115,188 L115,202 L140,202 L140,188" fill="none" stroke="#78909C" stroke-width="1"/>
  <path d="M116,194 L139,194 L139,202 L116,202 Z" fill="#E0E0E0" opacity="0.5"/>
  <text x="127" y="213" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">HCl</text>
  <text x="127" y="222" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">pH ~ 1</text>

  <!-- Litmus paper: Acid turns red -->
  <rect x="180" y="150" width="120" height="85" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="240" y="164" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Лакмусовая бумага</text>
  <!-- Litmus paper strip in acid -->
  <rect x="198" y="175" width="45" height="12" rx="2" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
  <text x="220" y="184" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">КРАСНАЯ</text>
  <text x="220" y="200" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">В кислоте</text>
  <!-- Litmus paper strip in base -->
  <rect x="248" y="175" width="45" height="12" rx="2" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
  <text x="270" y="184" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">СИНЯЯ</text>
  <text x="270" y="200" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">В щёлочи</text>
  <!-- Neutral -->
  <rect x="210" y="208" width="60" height="10" rx="2" fill="#A5D6A7" stroke="#66BB6A" stroke-width="1"/>
  <text x="240" y="216" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Нейтральная</text>

  <!-- Examples: Base side -->
  <rect x="310" y="150" width="165" height="85" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="392" y="164" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Основания (щёлочи)</text>
  <!-- Soap -->
  <ellipse cx="335" cy="195" rx="14" ry="10" fill="#E3F2FD" stroke="#42A5F5" stroke-width="1.5"/>
  <ellipse cx="335" cy="192" rx="10" ry="6" fill="white" opacity="0.4"/>
  <text x="335" y="213" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Мыло</text>
  <text x="335" y="222" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">pH ~ 10</text>
  <!-- NaOH beaker -->
  <path d="M360,188 L360,202 L385,202 L385,188" fill="none" stroke="#78909C" stroke-width="1"/>
  <path d="M361,195 L384,195 L384,202 L361,202 Z" fill="#E3F2FD" opacity="0.5"/>
  <text x="372" y="213" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">NaOH</text>
  <text x="372" y="222" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">pH ~ 14</text>
  <!-- Baking soda -->
  <rect x="398" y="186" width="20" height="18" rx="2" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1"/>
  <text x="408" y="199" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Na</text>
  <text x="408" y="213" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Сода</text>
  <text x="408" y="222" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">pH ~ 9</text>

  <!-- Properties panel -->
  <rect x="25" y="242" width="220" height="58" rx="6" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="1"/>
  <text x="135" y="256" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Свойства кислот</text>
  <text x="135" y="268" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Кисый вкус, разъедают металлы</text>
  <text x="135" y="279" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Действуют на индикаторы</text>
  <text x="135" y="290" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Содержат ион H+</text>

  <rect x="255" y="242" width="220" height="58" rx="6" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
  <text x="365" y="256" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Свойства оснований</text>
  <text x="365" y="268" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Мыльные на ощупь, горькие</text>
  <text x="365" y="279" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Действуют на индикаторы</text>
  <text x="365" y="290" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Содержат ион OH-</text>

  <rect x="15" y="310" width="470" height="30" rx="4" fill="#2E7D32" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Кислоты и основания</text>
</svg>