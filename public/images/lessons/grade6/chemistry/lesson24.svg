<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EFEBE9"/><stop offset="100%" stop-color="#D7CCC8"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4E342E" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#3E2723" text-anchor="middle">Закон сохранения массы веществ</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 24</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#4E342E" stroke-width="1" opacity="0.3"/>
<!-- Law statement -->
<rect x="40" y="60" width="420" height="45" rx="8" fill="white" opacity="0.95" stroke="#4E342E" stroke-width="2"/>
<text x="250" y="78" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3E2723" text-anchor="middle">Закон сохранения массы (М.В. Ломоносов, 1748)</text>
<text x="250" y="96" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Масса веществ до реакции = Масса веществ после реакции</text>
<!-- Balance scale -->
<g transform="translate(250, 155)">
  <!-- Scale base -->
  <rect x="-8" y="15" width="16" height="25" rx="2" fill="#8D6E63" stroke="#4E342E" stroke-width="1.5"/>
  <polygon points="0,-20 -12,15 12,15" fill="#A1887F" stroke="#4E342E" stroke-width="1.5"/>
  
  <!-- Scale beam -->
  <line x1="-90" y1="-10" x2="90" y2="-10" stroke="#4E342E" stroke-width="3"/>
  
  <!-- Left pan -->
  <line x1="-90" y1="-10" x2="-90" y2="5" stroke="#4E342E" stroke-width="1.5"/>
  <path d="M-110,5 Q-90,15 -70,5" fill="none" stroke="#4E342E" stroke-width="1.5"/>
  <rect x="-108" y="5" width="36" height="5" rx="2" fill="#BCAAA4"/>
  
  <!-- Left pan content: Reactants -->
  <rect x="-105" y="-5" width="12" height="10" rx="2" fill="#42A5F5" opacity="0.6"/>
  <rect x="-95" y="-8" width="15" height="13" rx="2" fill="#E53935" opacity="0.6"/>
  <text x="-90" y="22" font-family="Arial,sans-serif" font-size="7" fill="#3E2723" text-anchor="middle">Реагенты</text>
  
  <!-- Right pan -->
  <line x1="90" y1="-10" x2="90" y2="5" stroke="#4E342E" stroke-width="1.5"/>
  <path d="M70,5 Q90,15 110,5" fill="none" stroke="#4E342E" stroke-width="1.5"/>
  <rect x="72" y="5" width="36" height="5" rx="2" fill="#BCAAA4"/>
  
  <!-- Right pan content: Products -->
  <rect x="77" y="-8" width="26" height="13" rx="2" fill="#4CAF50" opacity="0.6"/>
  <text x="90" y="22" font-family="Arial,sans-serif" font-size="7" fill="#3E2723" text-anchor="middle">Продукты</text>
  
  <!-- Equal sign -->
  <text x="0" y="-15" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#4E342E" text-anchor="middle">=</text>
</g>
<!-- Example equation with atom count -->
<rect x="30" y="195" width="440" height="70" rx="8" fill="white" opacity="0.92" stroke="#4E342E" stroke-width="1.5"/>
<text x="250" y="213" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3E2723" text-anchor="middle">Пример: 2H₂ + O₂ → 2H₂O</text>
<line x1="50" y1="218" x2="450" y2="218" stroke="#4E342E" stroke-width="0.5" opacity="0.3"/>

<!-- Reactant atoms -->
<text x="120" y="234" font-family="Arial,sans-serif" font-size="8" fill="#42A5F5" text-anchor="middle">H: 4</text>
<text x="200" y="234" font-family="Arial,sans-serif" font-size="8" fill="#E53935" text-anchor="middle">O: 2</text>
<text x="250" y="234" font-family="Arial,sans-serif" font-size="10" fill="#4E342E" text-anchor="middle">→</text>
<text x="360" y="234" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50" text-anchor="middle">H: 4</text>
<text x="410" y="234" font-family="Arial,sans-serif" font-size="8" fill="#4CAF50" text-anchor="middle">O: 2</text>

<!-- Mass check -->
<text x="140" y="253" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3E2723" text-anchor="middle">4·1 + 2·16 = 36</text>
<text x="250" y="253" font-family="Arial,sans-serif" font-size="9" fill="#4E342E" text-anchor="middle">=</text>
<text x="360" y="253" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3E2723" text-anchor="middle">2·18 = 36 ✓</text>
<!-- Historical note -->
<rect x="30" y="275" width="210" height="55" rx="8" fill="white" opacity="0.92" stroke="#4E342E" stroke-width="1.2"/>
<text x="135" y="293" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#3E2723" text-anchor="middle">М.В. Ломоносов</text>
<text x="135" y="305" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Открыл закон в 1748 г.</text>
<text x="135" y="317" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">«Все перемены в натуре</text>
<text x="135" y="327" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">случаются так...»</text>

<rect x="260" y="275" width="210" height="55" rx="8" fill="white" opacity="0.92" stroke="#4E342E" stroke-width="1.2"/>
<text x="365" y="293" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#3E2723" text-anchor="middle">А.Л. Лавуазье</text>
<text x="365" y="305" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Подтвердил в 1789 г.</text>
<text x="365" y="317" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Экспериментально доказал</text>
<text x="365" y="327" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">закон сохранения массы</text>
</svg>