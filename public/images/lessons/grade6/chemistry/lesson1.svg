<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Что изучает химия</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 6 класс — Урок 1</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>


<!-- Flask with bubbling liquid -->
<g transform="translate(130,180)">
  <path d="M-20,-50 L-20,-20 L-40,30 Q-42,40 -32,42 L32,42 Q42,40 40,30 L20,-20 L20,-50 Z" fill="#4CAF50" opacity="0.2" stroke="#2E7D32" stroke-width="2"/>
  <path d="M-30,10 Q-32,30 -20,35 L20,35 Q32,30 30,10 Z" fill="#4CAF50" opacity="0.35"/>
  <ellipse cx="0" cy="-50" rx="22" ry="6" fill="#4CAF50" opacity="0.15" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Bubbles -->
  <circle cx="-8" cy="-5" r="4" fill="white" opacity="0.6" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="5" cy="8" r="3" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="-3" cy="-15" r="2.5" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="10" cy="-10" r="2" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Steam -->
  <path d="M-5,-55 Q-8,-65 -3,-72" fill="none" stroke="#4CAF50" stroke-width="1" opacity="0.4"/>
  <path d="M5,-55 Q8,-65 3,-72" fill="none" stroke="#4CAF50" stroke-width="1" opacity="0.4"/>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Вещество</text>
</g>

<!-- Atom model -->
<g transform="translate(280,175)">
  <circle cx="0" cy="0" r="8" fill="#4CAF50" opacity="0.5" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="0" cy="0" rx="35" ry="14" fill="none" stroke="#2E7D32" stroke-width="1.2" transform="rotate(-25)" opacity="0.7"/>
  <ellipse cx="0" cy="0" rx="35" ry="14" fill="none" stroke="#2E7D32" stroke-width="1.2" transform="rotate(25)" opacity="0.7"/>
  <ellipse cx="0" cy="0" rx="35" ry="14" fill="none" stroke="#2E7D32" stroke-width="1.2" opacity="0.7"/>
  <circle cx="32" cy="-10" r="3" fill="#4CAF50" opacity="0.8"/>
  <circle cx="-32" cy="10" r="3" fill="#4CAF50" opacity="0.8"/>
  <circle cx="0" cy="-35" r="3" fill="#4CAF50" opacity="0.8"/>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Атом</text>
</g>

<!-- Molecule -->
<g transform="translate(400,165)">
  <circle cx="0" cy="0" r="12" fill="#4CAF50" opacity="0.4" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="0" y="4" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">O</text>
  <circle cx="-18" cy="14" r="8" fill="#FF9800" opacity="0.5" stroke="#E65100" stroke-width="1"/>
  <text x="-18" y="18" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">H</text>
  <circle cx="18" cy="14" r="8" fill="#FF9800" opacity="0.5" stroke="#E65100" stroke-width="1"/>
  <text x="18" y="18" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">H</text>
  <line x1="-8" y1="8" x2="-12" y2="10" stroke="#2E7D32" stroke-width="2"/>
  <line x1="8" y1="8" x2="12" y2="10" stroke="#2E7D32" stroke-width="2"/>
  <text x="0" y="38" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">H₂O</text>
</g>

<text x="30" y="270" font-family="Arial,sans-serif" font-size="6" fill="#333">• Химия — наука о веществах и их превращениях</text>
<text x="30" y="284" font-family="Arial,sans-serif" font-size="6" fill="#333">• Основные разделы: неорганическая, органическа...</text>
<text x="30" y="298" font-family="Arial,sans-serif" font-size="6" fill="#333">• Химические явления — процессы, при которых об...</text>


<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 6 класс — Урок 1</text>
</svg>