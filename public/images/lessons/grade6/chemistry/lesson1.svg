  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Erlenmeyer Flask with bubbling liquid -->
  <rect x="25" y="88" width="210" height="205" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="130" y="105" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Химическая колба</text>
