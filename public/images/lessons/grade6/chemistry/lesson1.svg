  <circle cx="120" cy="230" r="3" fill="white" opacity="0.4"/>
  <circle cx="145" cy="245" r="5" fill="white" opacity="0.3"/>
  <circle cx="110" cy="255" r="3.5" fill="white" opacity="0.45"/>
  <circle cx="135" cy="250" r="2.5" fill="white" opacity="0.5"/>
  <circle cx="90" cy="260" r="2" fill="white" opacity="0.35"/>
  <!-- Steam -->
  <path d="M120,112 Q118,105 122,100" fill="none" stroke="#aaa" stroke-width="1" opacity="0.4"/>
