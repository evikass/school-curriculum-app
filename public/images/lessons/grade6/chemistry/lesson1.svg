  <text x="372" y="105" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">Штатив с пробирками</text>
  <!-- Rack base -->
  <rect x="290" y="175" width="170" height="8" rx="2" fill="#8D6E63"/>
  <rect x="295" y="140" width="160" height="8" rx="2" fill="#A1887F"/>
  <!-- Rack vertical supports -->
  <rect x="290" y="135" width="6" height="48" rx="1" fill="#8D6E63"/>
  <rect x="454" y="135" width="6" height="48" rx="1" fill="#8D6E63"/>
  <!-- Test tubes -->
  <rect x="315" y="120" width="12" height="48" rx="0" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="315" y="148" width="12" height="16" rx="0" fill="#EF5350" opacity="0.6"/>
  <circle cx="321" cy="118" r="7" fill="none" stroke="#7B1FA2" stroke-width="2"/>

  <rect x="340" y="120" width="12" height="48" rx="0" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="340" y="142" width="12" height="22" rx="0" fill="#42A5F5" opacity="0.6"/>
  <circle cx="346" cy="118" r="7" fill="none" stroke="#7B1FA2" stroke-width="2"/>

  <rect x="365" y="120" width="12" height="48" rx="0" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="365" y="152" width="12" height="12" rx="0" fill="#FFEE58" opacity="0.7"/>
  <circle cx="371" cy="118" r="7" fill="none" stroke="#7B1FA2" stroke-width="2"/>

  <rect x="390" y="120" width="12" height="48" rx="0" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="390" y="145" width="12" height="19" rx="0" fill="#66BB6A" opacity="0.6"/>
  <circle cx="396" cy="118" r="7" fill="none" stroke="#7B1FA2" stroke-width="2"/>

  <rect x="415" y="120" width="12" height="48" rx="0" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <rect x="415" y="155" width="12" height="9" rx="0" fill="#FFA726" opacity="0.6"/>
  <circle cx="421" cy="118" r="7" fill="none" stroke="#7B1FA2" stroke-width="2"/>

  <!-- Safety goggles + lab coat + fire row -->
  <rect x="25" y="228" width="130" height="65" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="90" y="243" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Защитные очки</text>
  <!-- Goggles -->
  <ellipse cx="70" cy="265" rx="18" ry="12" fill="none" stroke="#1565C0" stroke-width="2"/>
  <ellipse cx="110" cy="265" rx="18" ry="12" fill="none" stroke="#1565C0" stroke-width="2"/>
  <line x1="88" y1="265" x2="92" y2="265" stroke="#1565C0" stroke-width="2"/>
  <line x1="52" y1="262" x2="38" y2="258" stroke="#1565C0" stroke-width="1.5"/>
  <line x1="128" y1="262" x2="142" y2="258" stroke="#1565C0" stroke-width="1.5"/>
  <ellipse cx="70" cy="265" rx="16" ry="10" fill="#E3F2FD" opacity="0.5"/>
  <ellipse cx="110" cy="265" rx="16" ry="10" fill="#E3F2FD" opacity="0.5"/>

  <!-- Lab coat icon -->
  <rect x="170" y="228" width="85" height="65" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="212" y="243" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Халат</text>
  <!-- Coat shape -->
  <path d="M190,250 L185,248 L178,270 L182,288 L200,288 L212,288 L242,288 L246,270 L240,248 L235,250 L230,268 L220,268 L215,255 L212,268 L205,268 L195,255 Z" fill="#ECEFF1" stroke="#78909C" stroke-width="1.5"/>
  <circle cx="212" cy="262" r="2" fill="#78909C"/>
  <circle cx="212" cy="274" r="2" fill="#78909C"/>

  <!-- Fire / Chemical reaction -->
  <rect x="270" y="228" width="210" height="65" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="375" y="243" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Химическая реакция</text>
  <!-- Alcohol lamp -->
  <rect x="340" y="265" width="40" height="25" rx="4" fill="#8D6E63" stroke="#5D4037" stroke-width="1.5"/>
  <rect x="354" y="255" width="12" height="12" rx="2" fill="#9E9E9E" stroke="#757575" stroke-width="1"/>
  <!-- Flame -->
  <path d="M360,255 Q355,240 360,225 Q365,240 370,232 Q368,242 375,255 Z" fill="url(#flame1)"/>
  <path d="M360,255 Q358,245 360,235 Q362,245 365,240 Q363,248 367,255 Z" fill="#FFEE58" opacity="0.7"/>

  <rect x="15" y="310" width="470" height="30" rx="4" fill="#2E7D32" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Что изучает химия</text>
</svg>