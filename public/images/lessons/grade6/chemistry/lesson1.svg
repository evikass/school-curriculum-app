<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0e8"/>
      <stop offset="100%" stop-color="#c5d8c0"/>
    </linearGradient>
    <linearGradient id="flask1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8d8a0"/>
      <stop offset="100%" stop-color="#6db86a"/>
    </linearGradient>
    <linearGradient id="liquid1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec87e"/>
      <stop offset="100%" stop-color="#4a9e4a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="480" height="340" fill="url(#bg1)" rx="12"/>
  <rect x="8" y="8" width="464" height="324" fill="none" stroke="#8aa88a" stroke-width="1.5" rx="8" stroke-dasharray="4,3"/>
  <!-- Title -->
  <text x="240" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2d5a2d" font-family="serif">Что изучает химия</text>
  <!-- Flask body -->
  <path d="M200,60 L200,120 L160,200 Q155,215 170,220 L310,220 Q325,215 320,200 L280,120 L280,60 Z" fill="url(#flask1)" stroke="#3d7a3d" stroke-width="2"/>
  <!-- Flask neck -->
  <rect x="195" y="50" width="90" height="15" rx="3" fill="#b8e0b0" stroke="#3d7a3d" stroke-width="1.5"/>
  <!-- Flask rim -->
  <rect x="190" y="45" width="100" height="8" rx="4" fill="#c8e8c0" stroke="#3d7a3d" stroke-width="1.5"/>
  <!-- Liquid inside -->
  <path d="M170,175 Q240,165 310,175 L310,220 Q240,225 170,220 Z" fill="url(#liquid1)" opacity="0.8"/>
  <!-- Bubbles -->
  <circle cx="210" cy="195" r="5" fill="#a8e8a8" opacity="0.7"/>
  <circle cx="240" cy="185" r="4" fill="#90d890" opacity="0.6"/>
  <circle cx="260" cy="198" r="3" fill="#a8e8a8" opacity="0.7"/>
  <circle cx="225" cy="190" r="6" fill="#b0f0b0" opacity="0.5"/>
  <circle cx="275" cy="192" r="3.5" fill="#90d890" opacity="0.6"/>
  <!-- Steam/vapor -->
  <path d="M220,45 Q225,30 220,18" stroke="#6db86a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M240,42 Q245,25 238,12" stroke="#6db86a" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M260,45 Q265,28 258,15" stroke="#6db86a" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Atom symbol left -->
  <ellipse cx="80" cy="120" rx="30" ry="12" fill="none" stroke="#5a8a5a" stroke-width="1.5" transform="rotate(-30,80,120)"/>
  <ellipse cx="80" cy="120" rx="30" ry="12" fill="none" stroke="#5a8a5a" stroke-width="1.5" transform="rotate(30,80,120)"/>
  <ellipse cx="80" cy="120" rx="30" ry="12" fill="none" stroke="#5a8a5a" stroke-width="1.5"/>
  <circle cx="80" cy="120" r="6" fill="#5a8a5a"/>
  <!-- Atom electrons -->
  <circle cx="108" cy="108" r="3" fill="#7ab87a"/>
  <circle cx="52" cy="108" r="3" fill="#7ab87a"/>
  <circle cx="80" cy="90" r="3" fill="#7ab87a"/>
  <!-- Molecule right -->
  <circle cx="400" cy="100" r="14" fill="#d4a0a0" stroke="#8a5050" stroke-width="1.5"/>
  <circle cx="425" cy="130" r="10" fill="#a0c8a0" stroke="#508850" stroke-width="1.5"/>
  <circle cx="375" cy="130" r="10" fill="#a0c8a0" stroke="#508850" stroke-width="1.5"/>
  <line x1="400" y1="114" x2="425" y2="120" stroke="#6a6a6a" stroke-width="2"/>
  <line x1="400" y1="114" x2="375" y2="120" stroke="#6a6a6a" stroke-width="2"/>
  <!-- Test tube left -->
  <rect x="55" y="200" width="18" height="50" rx="9" fill="#d8ecd4" stroke="#5a8a5a" stroke-width="1.5"/>
  <rect x="57" y="225" width="14" height="23" rx="7" fill="#8ac88a" opacity="0.6"/>
  <!-- Beaker -->
  <path d="M100,195 L100,250 Q100,260 110,260 L150,260 Q160,260 160,250 L160,195" fill="#d8ecd4" stroke="#5a8a5a" stroke-width="1.5"/>
  <rect x="105" y="225" width="50" height="33" fill="#90c890" opacity="0.5" rx="2"/>
  <!-- Book bottom left -->
  <rect x="20" y="280" width="55" height="40" rx="3" fill="#c8d8b0" stroke="#6a8a5a" stroke-width="1.5"/>
  <rect x="23" y="283" width="49" height="34" rx="2" fill="#d8e8c0"/>
  <line x1="47" y1="285" x2="47" y2="315" stroke="#6a8a5a" stroke-width="1"/>
  <text x="38" y="305" font-size="7" fill="#4a6a4a" font-family="serif">Химия</text>
  <!-- Periodic table element card -->
  <rect x="340" y="195" width="55" height="65" rx="4" fill="#f0e8d0" stroke="#8a7a5a" stroke-width="1.5"/>
  <text x="367" y="215" text-anchor="middle" font-size="9" fill="#6a5a3a">1</text>
  <text x="367" y="240" text-anchor="middle" font-size="22" font-weight="bold" fill="#5a4a2a">H</text>
  <text x="367" y="255" text-anchor="middle" font-size="7" fill="#6a5a3a">1.008</text>
  <!-- Another element card -->
  <rect x="405" y="195" width="55" height="65" rx="4" fill="#e0e8f0" stroke="#5a6a8a" stroke-width="1.5"/>
  <text x="432" y="215" text-anchor="middle" font-size="9" fill="#3a4a6a">8</text>
  <text x="432" y="240" text-anchor="middle" font-size="22" font-weight="bold" fill="#3a4a6a">O</text>
  <text x="432" y="255" text-anchor="middle" font-size="7" fill="#3a4a6a">16.00</text>
  <!-- Lab burner -->
  <rect x="320" y="280" width="30" height="15" rx="2" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
  <rect x="330" y="265" width="10" height="18" rx="1" fill="#b0b0b0" stroke="#808080" stroke-width="1"/>
  <ellipse cx="335" cy="260" rx="6" ry="10" fill="#e8a030" opacity="0.7"/>
  <ellipse cx="335" cy="255" rx="3" ry="6" fill="#f0c860" opacity="0.8"/>
  <!-- Safety goggles -->
  <ellipse cx="410" cy="285" rx="15" ry="10" fill="none" stroke="#5a8a5a" stroke-width="2"/>
  <ellipse cx="440" cy="285" rx="15" ry="10" fill="none" stroke="#5a8a5a" stroke-width="2"/>
  <line x1="425" y1="285" x2="425" y2="285" stroke="#5a8a5a" stroke-width="2"/>
  <path d="M395,285 Q385,278 380,285" stroke="#5a8a5a" stroke-width="1.5" fill="none"/>
  <path d="M455,285 Q465,278 470,285" stroke="#5a8a5a" stroke-width="1.5" fill="none"/>
  <!-- Decorative dots -->
  <circle cx="30" cy="50" r="2" fill="#8ab88a" opacity="0.5"/>
  <circle cx="455" cy="55" r="2" fill="#8ab88a" opacity="0.5"/>
  <circle cx="25" cy="160" r="2" fill="#8ab88a" opacity="0.4"/>
  <circle cx="460" cy="160" r="2" fill="#8ab88a" opacity="0.4"/>
  <!-- Decorative molecular bonds -->
  <circle cx="90" cy="265" r="5" fill="#b8d0a8" stroke="#6a8a5a" stroke-width="1"/>
  <circle cx="78" cy="255" r="4" fill="#d0b8a8" stroke="#8a6a5a" stroke-width="1"/>
  <line x1="85" y1="262" x2="81" y2="258" stroke="#8a8a6a" stroke-width="1.5"/>
  <!-- Lab coat hint -->
  <path d="M410,230 L410,270 L430,270 L430,230 Q420,225 410,230" fill="#e8e8e8" stroke="#a0a0a0" stroke-width="1" opacity="0.6"/>
  <!-- Label -->
  <text x="240" y="330" text-anchor="middle" font-size="10" fill="#3d6a3d" font-family="serif" font-style="italic">Химия — наука о веществах</text>
</svg>
