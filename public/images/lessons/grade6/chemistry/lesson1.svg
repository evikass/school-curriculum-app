  <path d="M100,120 L100,160 L60,270 L200,270 L160,160 L160,120 Z" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <rect x="95" y="112" width="70" height="10" rx="2" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <!-- Liquid in flask -->
  <path d="M75,220 Q90,215 105,220 Q120,225 135,220 Q150,215 165,220 L175,270 L65,270 Z" fill="url(#liquid1)" opacity="0.6"/>
