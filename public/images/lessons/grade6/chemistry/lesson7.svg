  <text x="415" y="228" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Легенда</text>
  <rect x="358" y="233" width="10" height="8" rx="1" fill="#FFE0B2" stroke="#E65100" stroke-width="0.5"/>
  <text x="373" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555">Щелочные и щёл.-зем.</text>
  <rect x="358" y="244" width="10" height="8" rx="1" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="373" y="251" font-family="Arial,sans-serif" font-size="7" fill="#555">Неметаллы</text>
  <rect x="358" y="255" width="10" height="8" rx="1" fill="#E8EAF6" stroke="#7B1FA2" stroke-width="0.5"/>
  <text x="373" y="262" font-family="Arial,sans-serif" font-size="7" fill="#555">Благородные газы</text>
  <rect x="358" y="266" width="10" height="8" rx="1" fill="#FCE4EC" stroke="#EC407A" stroke-width="0.5"/>
  <text x="373" y="273" font-family="Arial,sans-serif" font-size="7" fill="#555">Переходные металлы</text>

