  <text x="97" y="232" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Периоды - строки</text>
  <text x="97" y="244" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Свойства элементов</text>
  <text x="97" y="254" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">повторяются периодически</text>
  <text x="97" y="268" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">1869 год - открытие</text>

  <rect x="175" y="218" width="165" height="56" rx="4" fill="#FFF3E0" stroke="#FFCC80" stroke-width="1"/>
  <text x="257" y="232" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Группы - столбцы</text>
  <text x="257" y="244" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Элементы одной группы</text>
  <text x="257" y="254" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">имеют похожие свойства</text>
  <text x="257" y="268" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">118 элементов</text>

  <rect x="15" y="310" width="470" height="30" rx="4" fill="#2E7D32" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Периодическая таблица</text>
