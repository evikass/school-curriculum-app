<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
    <linearGradient id="glassG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="40%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#BDBDBD"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Лабораторная посуда</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Химия - Урок 9</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Beaker (Мензурка) -->
  <rect x="20" y="88" width="95" height="105" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="67" y="103" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Мензурка</text>
  <!-- Beaker shape -->
  <path d="M42,112 L42,178 Q42,183 47,183 L87,183 Q92,183 92,178 L92,112" fill="url(#glassG)" stroke="#78909C" stroke-width="1.5" opacity="0.6"/>
  <!-- Spout -->
  <path d="M42,112 L38,108" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <!-- Graduation marks -->
  <line x1="42" y1="130" x2="50" y2="130" stroke="#777" stroke-width="0.5"/>
  <line x1="42" y1="140" x2="47" y2="140" stroke="#777" stroke-width="0.5"/>
  <line x1="42" y1="150" x2="50" y2="150" stroke="#777" stroke-width="0.5"/>
  <line x1="42" y1="160" x2="47" y2="160" stroke="#777" stroke-width="0.5"/>
  <line x1="42" y1="170" x2="50" y2="170" stroke="#777" stroke-width="0.5"/>
  <text x="53" y="133" font-family="Arial,sans-serif" font-size="6" fill="#999">100</text>
  <text x="53" y="153" font-family="Arial,sans-serif" font-size="6" fill="#999">50</text>
  <!-- Blue liquid -->
  <path d="M43,155 Q60,152 78,155 Q88,158 92,155 L92,178 Q92,183 87,183 L47,183 Q42,183 42,178 L42,155 Z" fill="#42A5F5" opacity="0.3"/>
  <text x="67" y="180" font-family="Arial,sans-serif" font-size="7" fill="#999" text-anchor="middle">мл</text>

  <!-- Flask (Колба) -->
  <rect x="125" y="88" width="95" height="105" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="172" y="103" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Колба</text>
  <!-- Round bottom flask -->
  <path d="M164,112 L164,132 Q140,140 130,160 Q128,175 145,183 L199,183 Q216,175 214,160 Q204,140 180,132 L180,112" fill="url(#glassG)" stroke="#78909C" stroke-width="1.5" opacity="0.6"/>
  <rect x="162" y="108" width="20" height="6" rx="2" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <!-- Green liquid -->
  <path d="M135,165 Q145,160 160,163 Q175,166 190,163 Q205,160 210,165 Q214,178 200,183 L145,183 Q130,178 135,165 Z" fill="#66BB6A" opacity="0.3"/>

  <!-- Test tube (Пробирка) -->
  <rect x="230" y="88" width="80" height="105" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="270" y="103" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Пробирка</text>
  <!-- Test tube -->
  <path d="M258,112 L258,178 Q258,183 263,183 L277,183 Q282,183 282,178 L282,112" fill="url(#glassG)" stroke="#78909C" stroke-width="1.5" opacity="0.6"/>
  <path d="M258,112 L282,112" stroke="#78909C" stroke-width="2"/>
  <!-- Rim -->
  <path d="M255,112 Q255,108 258,108 L282,108 Q285,108 285,112" fill="none" stroke="#78909C" stroke-width="1.5"/>
  <!-- Pink liquid -->
  <path d="M259,155 Q270,152 281,155 L281,178 Q281,182 277,182 L263,182 Q259,182 259,178 Z" fill="#EF9A9A" opacity="0.4"/>

  <!-- Alcohol lamp (Спиртовка) -->
  <rect x="320" y="88" width="85" height="105" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="362" y="103" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Спиртовка</text>
  <!-- Lamp body -->
  <path d="M338,175 Q335,180 338,183 L388,183 Q391,180 388,175 Z" fill="#8D6E63" stroke="#5D4037" stroke-width="1.5"/>
  <path d="M340,150 L338,175 L388,175 L386,150 Z" fill="#A1887F" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Wick tube -->
  <rect x="356" y="138" width="12" height="14" rx="2" fill="#9E9E9E" stroke="#757575" stroke-width="1"/>
  <!-- Wick -->
  <line x1="362" y1="138" x2="362" y2="130" stroke="#424242" stroke-width="2"/>
  <!-- Flame -->
  <path d="M362,130 Q357,118 362,108 Q367,118 372,112 Q369,122 375,130 Z" fill="#FF7043" opacity="0.7"/>
  <path d="M362,130 Q359,122 362,115 Q365,122 367,118 Q366,125 369,130 Z" fill="#FFEE58" opacity="0.6"/>

  <!-- Tripod with gauze (Штатив) -->
  <rect x="415" y="88" width="65" height="105" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="447" y="103" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Штатив</text>
  <!-- Tripod legs -->
  <line x1="447" y1="130" x2="425" y2="183" stroke="#546E7A" stroke-width="2.5"/>
  <line x1="447" y1="130" x2="469" y2="183" stroke="#546E7A" stroke-width="2.5"/>
  <line x1="447" y1="130" x2="447" y2="183" stroke="#546E7A" stroke-width="2.5"/>
  <!-- Ring at top -->
  <ellipse cx="447" cy="130" rx="18" ry="4" fill="none" stroke="#546E7A" stroke-width="2"/>
  <!-- Gauze (wire gauze) -->
  <rect x="430" y="135" width="34" height="4" rx="1" fill="#BDBDBD" stroke="#757575" stroke-width="0.5" opacity="0.6"/>
  <line x1="434" y1="135" x2="434" y2="139" stroke="#757575" stroke-width="0.3" opacity="0.4"/>
  <line x1="440" y1="135" x2="440" y2="139" stroke="#757575" stroke-width="0.3" opacity="0.4"/>
  <line x1="446" y1="135" x2="446" y2="139" stroke="#757575" stroke-width="0.3" opacity="0.4"/>
  <line x1="452" y1="135" x2="452" y2="139" stroke="#757575" stroke-width="0.3" opacity="0.4"/>
  <line x1="458" y1="135" x2="458" y2="139" stroke="#757575" stroke-width="0.3" opacity="0.4"/>

  <!-- Funnel (Воронка) -->
  <rect x="20" y="200" width="85" height="95" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="62" y="215" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Воронка</text>
  <!-- Funnel cone -->
  <path d="M42,228 L52,268 L72,268 L82,228 Z" fill="url(#glassG)" stroke="#78909C" stroke-width="1.5" opacity="0.6"/>
  <!-- Funnel stem -->
  <rect x="58" y="268" width="8" height="20" rx="1" fill="url(#glassG)" stroke="#78909C" stroke-width="1" opacity="0.6"/>

  <!-- Mortar and pestle (Ступка) -->
  <rect x="115" y="200" width="85" height="95" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="157" y="215" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Ступка и пестик</text>
  <!-- Mortar (bowl) -->
  <path d="M128,250 Q128,282 157,282 Q186,282 186,250 L180,240 Q157,235 134,240 Z" fill="#BDBDBD" stroke="#757575" stroke-width="1.5"/>
  <!-- Pestle -->
  <path d="M157,222 L157,248" stroke="#9E9E9E" stroke-width="5" stroke-linecap="round"/>
  <circle cx="157" cy="220" r="6" fill="#9E9E9E" stroke="#757575" stroke-width="1"/>

  <!-- Tongs (Щипцы) -->
  <rect x="210" y="200" width="85" height="95" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="252" y="215" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Тигельные щипцы</text>
  <!-- Tongs -->
  <path d="M230,240 L245,280 L250,282 L250,278 L237,240 Z" fill="#9E9E9E" stroke="#757575" stroke-width="1.5"/>
  <path d="M275,240 L260,280 L255,282 L255,278 L268,240 Z" fill="#9E9E9E" stroke="#757575" stroke-width="1.5"/>
  <!-- Hinge -->
  <circle cx="252" cy="240" r="4" fill="#757575" stroke="#5D4037" stroke-width="1"/>
  <!-- Handles -->
  <path d="M230,240 L222,225" stroke="#757575" stroke-width="3" stroke-linecap="round"/>
  <path d="M275,240 L283,225" stroke="#757575" stroke-width="3" stroke-linecap="round"/>

  <!-- Evaporating dish (Чашка) -->
  <rect x="305" y="200" width="85" height="95" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="347" y="215" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Фарфоровая чашка</text>
  <!-- Dish -->
  <path d="M315,260 Q312,275 347,278 Q382,275 380,260 Z" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5"/>
  <ellipse cx="347" cy="260" rx="33" ry="6" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
  <!-- Some substance -->
  <ellipse cx="347" cy="268" rx="18" ry="4" fill="#FFCC80" opacity="0.5"/>

  <!-- Glass rod (Стеклянная палочка) -->
  <rect x="400" y="200" width="80" height="95" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="440" y="215" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Стеклянная палочка</text>
  <!-- Glass rod -->
  <line x1="415" y1="245" x2="465" y2="275" stroke="#B3E5FC" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="415" y1="245" x2="465" y2="275" stroke="#78909C" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Highlight -->
  <line x1="418" y1="247" x2="462" y2="274" stroke="white" stroke-width="1" opacity="0.3"/>

  <rect x="15" y="310" width="470" height="30" rx="4" fill="#2E7D32" opacity="0.85"/>
  <text x="250" y="330" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Лабораторная посуда</text>
</svg>