<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Сложение и вычитание отрицательных чисел</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 11</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Adding negatives on number line -->
  <rect x="20" y="88" width="460" height="90" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="104" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Сложение на числовой прямой</text>
  <line x1="28" y1="108" x2="472" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Example 1: -3 + (-2) = -5 -->
  <text x="50" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555">(-3) + (-2) = -5</text>
  <!-- Number line for example 1 -->
  <line x1="180" y1="122" x2="460" y2="122" stroke="#555" stroke-width="1"/>
  <circle cx="280" cy="122" r="4" fill="#1565C0" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
  <text x="280" y="117" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">-3</text>
  <!-- Arrow going left (adding negative) -->
  <line x1="280" y1="122" x2="220" y2="122" stroke="#C62828" stroke-width="2" opacity="0.6"/>
  <polygon points="220,122 228,118 228,126" fill="#C62828" opacity="0.6"/>
  <circle cx="220" cy="122" r="4" fill="#C62828" opacity="0.3" stroke="#C62828" stroke-width="1"/>
  <text x="220" y="117" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">-5</text>
  <!-- Example 2: (-4) + 7 = 3 -->
  <text x="50" y="152" font-family="Arial,sans-serif" font-size="9" fill="#555">(-4) + 7 = 3</text>
  <line x1="180" y1="149" x2="460" y2="149" stroke="#555" stroke-width="1"/>
  <circle cx="250" cy="149" r="4" fill="#C62828" opacity="0.3" stroke="#C62828" stroke-width="1"/>
  <text x="250" y="144" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">-4</text>
  <!-- Arrow going right (adding positive) -->
  <line x1="250" y1="149" x2="370" y2="149" stroke="#2E7D32" stroke-width="2" opacity="0.6"/>
  <polygon points="370,149 362,145 362,153" fill="#2E7D32" opacity="0.6"/>
  <circle cx="370" cy="149" r="4" fill="#2E7D32" opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
  <text x="370" y="144" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">3</text>
  <!-- Zero mark -->
  <text x="310" y="117" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">0</text>
  <line x1="310" y1="119" x2="310" y2="125" stroke="#F9A825" stroke-width="0.8"/>
  <text x="310" y="144" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">0</text>
  <line x1="310" y1="146" x2="310" y2="152" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Rules summary -->
  <rect x="170" y="162" width="300" height="12" rx="2" fill="#1565C0" opacity="0.06"/>
  <text x="320" y="172" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(-) + (-) = (-)   |   (-) + (+) = разность модулей с знаком большего</text>

  <!-- Card 2: Subtraction rules -->
  <rect x="20" y="186" width="225" height="113" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="132" y="202" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Правила вычитания</text>
  <line x1="28" y1="206" x2="237" y2="206" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Rule 1 -->
  <rect x="30" y="212" width="205" height="24" rx="4" fill="#C62828" opacity="0.04"/>
  <text x="132" y="225" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">a - (-b) = a + b</text>
  <text x="132" y="234" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Минус на минус даёт плюс</text>
  <!-- Rule 2 -->
  <rect x="30" y="240" width="205" height="24" rx="4" fill="#1565C0" opacity="0.04"/>
  <text x="132" y="253" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">a - (+b) = a - b</text>
  <text x="132" y="262" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Минус на плюс даёт минус</text>
  <!-- Example -->
  <rect x="30" y="268" width="205" height="26" rx="4" fill="#F9A825" opacity="0.06"/>
  <text x="132" y="282" font-family="Arial,sans-serif" font-size="9" fill="#F9A825" text-anchor="middle" font-weight="bold">(-5) - (-3) = (-5) + 3 = -2</text>
  <text x="132" y="293" font-family="Arial,sans-serif" font-size="7" fill="#777" text-anchor="middle">Два минуса рядом = плюс</text>

  <!-- Card 3: Visual elevator analogy -->
  <rect x="253" y="186" width="228" height="113" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="367" y="202" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Аналогия: лифт в здании</text>
  <line x1="261" y1="206" x2="473" y2="206" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Elevator shaft -->
  <rect x="310" y="212" width="30" height="80" rx="3" fill="#E0E0E0" stroke="#999" stroke-width="1"/>
  <!-- Floors -->
  <line x1="310" y1="230" x2="340" y2="230" stroke="#999" stroke-width="0.5"/>
  <line x1="310" y1="248" x2="340" y2="248" stroke="#F9A825" stroke-width="1"/>
  <line x1="310" y1="266" x2="340" y2="266" stroke="#999" stroke-width="0.5"/>
  <!-- Floor labels -->
  <text x="295" y="224" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="end">+2</text>
  <text x="295" y="242" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="end">+1</text>
  <text x="295" y="256" font-family="Arial,sans-serif" font-size="9" fill="#F9A825" text-anchor="end" font-weight="bold">0</text>
  <text x="295" y="274" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="end">-1</text>
  <text x="295" y="290" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="end">-2</text>
  <!-- Elevator car -->
  <rect x="314" y="253" width="22" height="13" rx="2" fill="#2E7D32" opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
  <!-- Arrow down -->
  <line x1="325" y1="269" x2="325" y2="280" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="325,282 321,276 329,276" fill="#C62828"/>
  <!-- Example -->
  <text x="367" y="225" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Находимся на 0 этаже</text>
  <text x="367" y="242" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Спускаемся на 2 вниз</text>
  <text x="367" y="259" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">0 + (-2) = -2</text>
  <text x="367" y="280" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Поднимаемся на 3</text>
  <text x="367" y="295" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">(-2) + 3 = +1</text>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Сложение и вычитание отрицательных чисел</text>
</svg>