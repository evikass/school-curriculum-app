<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Сложение и вычитание дробей</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 6</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Same denominator -->
  <rect x="20" y="88" width="230" height="120" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="135" y="104" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Одинаковый знаменатель</text>
  <line x1="28" y1="108" x2="242" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Visual: 2/6 + 3/6 = 5/6 -->
  <!-- First fraction: 2/6 -->
  <text x="135" y="124" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">2/6 + 3/6 = 5/6</text>
  <!-- Bar for 2/6 -->
  <rect x="35" y="130" width="180" height="12" rx="2" fill="#E0E0E0" stroke="#CCC" stroke-width="0.5"/>
  <rect x="35" y="130" width="60" height="12" rx="2" fill="#1565C0" opacity="0.4"/>
  <line x1="65" y1="130" x2="65" y2="142" stroke="#999" stroke-width="0.5"/>
  <line x1="95" y1="130" x2="95" y2="142" stroke="#999" stroke-width="0.5"/>
  <line x1="125" y1="130" x2="125" y2="142" stroke="#999" stroke-width="0.5"/>
  <line x1="155" y1="130" x2="155" y2="142" stroke="#999" stroke-width="0.5"/>
  <line x1="185" y1="130" x2="185" y2="142" stroke="#999" stroke-width="0.5"/>
  <text x="25" y="140" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="end">2/6</text>
  <!-- Plus sign -->
  <text x="135" y="153" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">+</text>
  <!-- Bar for 3/6 -->
  <rect x="35" y="156" width="180" height="12" rx="2" fill="#E0E0E0" stroke="#CCC" stroke-width="0.5"/>
  <rect x="35" y="156" width="90" height="12" rx="2" fill="#C62828" opacity="0.35"/>
  <line x1="65" y1="156" x2="65" y2="168" stroke="#999" stroke-width="0.5"/>
  <line x1="95" y1="156" x2="95" y2="168" stroke="#999" stroke-width="0.5"/>
  <line x1="125" y1="156" x2="125" y2="168" stroke="#999" stroke-width="0.5"/>
  <line x1="155" y1="156" x2="155" y2="168" stroke="#999" stroke-width="0.5"/>
  <line x1="185" y1="156" x2="185" y2="168" stroke="#999" stroke-width="0.5"/>
  <text x="25" y="166" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="end">3/6</text>
  <!-- Equals sign -->
  <text x="135" y="179" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">=</text>
  <!-- Result bar: 5/6 -->
  <rect x="35" y="182" width="180" height="12" rx="2" fill="#E0E0E0" stroke="#CCC" stroke-width="0.5"/>
  <rect x="35" y="182" width="150" height="12" rx="2" fill="#2E7D32" opacity="0.35"/>
  <line x1="65" y1="182" x2="65" y2="194" stroke="#999" stroke-width="0.5"/>
  <line x1="95" y1="182" x2="95" y2="194" stroke="#999" stroke-width="0.5"/>
  <line x1="125" y1="182" x2="125" y2="194" stroke="#999" stroke-width="0.5"/>
  <line x1="155" y1="182" x2="155" y2="194" stroke="#999" stroke-width="0.5"/>
  <line x1="185" y1="182" x2="185" y2="194" stroke="#999" stroke-width="0.5"/>
  <text x="25" y="192" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="end" font-weight="bold">5/6</text>
  <!-- Rule -->
  <text x="135" y="205" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">a/n + b/n = (a+b)/n</text>

  <!-- Card 2: Different denominators -->
  <rect x="258" y="88" width="223" height="120" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="370" y="104" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Разные знаменатели</text>
  <line x1="266" y1="108" x2="473" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Example: 1/3 + 1/4 -->
  <text x="370" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">1/3 + 1/4 = ?</text>
  <!-- Step 1: Find common denominator -->
  <rect x="270" y="132" width="200" height="22" rx="3" fill="#F9A825" opacity="0.08"/>
  <text x="280" y="146" font-family="Arial,sans-serif" font-size="8" fill="#F9A825">Шаг 1: НОК(3,4) = 12</text>
  <!-- Step 2: Convert -->
  <rect x="270" y="158" width="200" height="22" rx="3" fill="#1565C0" opacity="0.08"/>
  <text x="280" y="172" font-family="Arial,sans-serif" font-size="8" fill="#1565C0">Шаг 2: 1/3 = 4/12, 1/4 = 3/12</text>
  <!-- Step 3: Add -->
  <rect x="270" y="184" width="200" height="22" rx="3" fill="#2E7D32" opacity="0.08"/>
  <text x="280" y="198" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Шаг 3: 4/12 + 3/12 = 7/12</text>

  <!-- Card 3: Visual subtraction -->
  <rect x="20" y="215" width="460" height="84" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <text x="250" y="233" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">Вычитание дробей: визуальный пример</text>
  <line x1="28" y1="237" x2="472" y2="237" stroke="#E0E0E0" stroke-width="1"/>
  <!-- 5/8 - 2/8 = 3/8 -->
  <text x="250" y="252" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">5/8 - 2/8 = 3/8</text>
  <!-- Bar showing 5/8 -->
  <rect x="60" y="258" width="320" height="14" rx="2" fill="#E0E0E0" stroke="#CCC" stroke-width="0.5"/>
  <rect x="60" y="258" width="200" height="14" rx="2" fill="#C62828" opacity="0.3"/>
  <rect x="60" y="258" width="120" height="14" rx="2" fill="#2E7D32" opacity="0.4"/>
  <!-- Dividers for 8 parts -->
  <line x1="100" y1="258" x2="100" y2="272" stroke="#999" stroke-width="0.5"/>
  <line x1="140" y1="258" x2="140" y2="272" stroke="#999" stroke-width="0.5"/>
  <line x1="180" y1="258" x2="180" y2="272" stroke="#999" stroke-width="0.5"/>
  <line x1="220" y1="258" x2="220" y2="272" stroke="#999" stroke-width="0.5"/>
  <line x1="260" y1="258" x2="260" y2="272" stroke="#999" stroke-width="0.5"/>
  <line x1="300" y1="258" x2="300" y2="272" stroke="#999" stroke-width="0.5"/>
  <line x1="340" y1="258" x2="340" y2="272" stroke="#999" stroke-width="0.5"/>
  <!-- Legend -->
  <rect x="100" y="278" width="10" height="10" rx="2" fill="#2E7D32" opacity="0.4"/>
  <text x="115" y="287" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Результат: 3/8</text>
  <rect x="220" y="278" width="10" height="10" rx="2" fill="#C62828" opacity="0.3"/>
  <text x="235" y="287" font-family="Arial,sans-serif" font-size="8" fill="#C62828">Вычитаемое: 2/8</text>
  <rect x="360" y="278" width="10" height="10" rx="2" fill="#E0E0E0"/>
  <text x="375" y="287" font-family="Arial,sans-serif" font-size="8" fill="#777">Пустое</text>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Сложение и вычитание дробей</text>
</svg>