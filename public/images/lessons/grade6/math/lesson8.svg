<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Отношения</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 8</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Ratio as comparison with objects -->
  <rect x="20" y="88" width="230" height="120" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="135" y="104" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Отношение как сравнение</text>
  <line x1="28" y1="108" x2="242" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Apples and oranges -->
  <!-- 3 apples (red circles) -->
  <circle cx="50" cy="132" r="10" fill="#C62828" opacity="0.3" stroke="#C62828" stroke-width="1"/>
  <text x="50" y="136" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle"></text>
  <circle cx="75" cy="132" r="10" fill="#C62828" opacity="0.3" stroke="#C62828" stroke-width="1"/>
  <circle cx="100" cy="132" r="10" fill="#C62828" opacity="0.3" stroke="#C62828" stroke-width="1"/>
  <text x="75" y="120" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">3 яблока</text>
  <!-- Colon -->
  <text x="135" y="136" font-family="Arial,sans-serif" font-size="16" fill="#555" text-anchor="middle">:</text>
  <!-- 5 oranges (orange circles) -->
  <circle cx="165" cy="132" r="10" fill="#F9A825" opacity="0.4" stroke="#F9A825" stroke-width="1"/>
  <circle cx="190" cy="132" r="10" fill="#F9A825" opacity="0.4" stroke="#F9A825" stroke-width="1"/>
  <circle cx="215" cy="132" r="10" fill="#F9A825" opacity="0.4" stroke="#F9A825" stroke-width="1"/>
  <circle cx="190" cy="120" r="8" fill="#F9A825" opacity="0.2"/>
  <circle cx="215" cy="120" r="8" fill="#F9A825" opacity="0.2"/>
  <text x="190" y="120" font-family="Arial,sans-serif" font-size="8" fill="#F9A825" text-anchor="middle">5 апельсинов</text>
  <!-- Result -->
  <rect x="55" y="150" width="160" height="22" rx="4" fill="#1565C0" opacity="0.08"/>
  <text x="135" y="165" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">Отношение = 3 : 5</text>
  <text x="135" y="182" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">На каждые 3 яблока - 5 апельсинов</text>

  <!-- Card 2: Ratio in bar chart form -->
  <rect x="258" y="88" width="223" height="120" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="370" y="104" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Отношение на диаграмме</text>
  <line x1="266" y1="108" x2="473" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Bar chart: ratio 2:3 -->
  <rect x="285" y="120" width="40" height="70" rx="3" fill="#1565C0" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
  <text x="305" y="160" font-family="Arial,sans-serif" font-size="14" fill="#1565C0" text-anchor="middle" font-weight="bold">2</text>
  <rect x="345" y="120" width="60" height="70" rx="3" fill="#C62828" opacity="0.25" stroke="#C62828" stroke-width="1"/>
  <text x="375" y="160" font-family="Arial,sans-serif" font-size="14" fill="#C62828" text-anchor="middle" font-weight="bold">3</text>
  <!-- Scale marks -->
  <line x1="325" y1="115" x2="325" y2="195" stroke="#555" stroke-width="0.5" stroke-dasharray="2,2"/>
  <!-- Labels -->
  <text x="305" y="200" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">Мальчики</text>
  <text x="375" y="200" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Девочки</text>
  <text x="370" y="135" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">2 : 3</text>

  <!-- Card 3: Properties of ratios -->
  <rect x="20" y="215" width="460" height="84" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="233" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Свойства отношений и примеры</text>
  <line x1="28" y1="237" x2="472" y2="237" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Property 1 -->
  <rect x="30" y="244" width="140" height="48" rx="4" fill="#1565C0" opacity="0.04"/>
  <text x="100" y="258" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Осн. свойство</text>
  <text x="100" y="272" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">2 : 3 = 4 : 6 = 6 : 9</text>
  <text x="100" y="285" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">x2, x3</text>
  <!-- Property 2 -->
  <rect x="180" y="244" width="140" height="48" rx="4" fill="#C62828" opacity="0.04"/>
  <text x="250" y="258" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Обратное</text>
  <text x="250" y="272" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">2 : 5 и 5 : 2</text>
  <text x="250" y="285" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Взаимно обратные</text>
  <!-- Property 3 -->
  <rect x="330" y="244" width="140" height="48" rx="4" fill="#F9A825" opacity="0.04"/>
  <text x="400" y="258" font-family="Arial,sans-serif" font-size="9" fill="#F9A825" text-anchor="middle" font-weight="bold">Как деление</text>
  <text x="400" y="272" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">2 : 5 = 2/5 = 0,4</text>
  <text x="400" y="285" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">Отношение = дробь</text>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Отношения</text>
</svg>