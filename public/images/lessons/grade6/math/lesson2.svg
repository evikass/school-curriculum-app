<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Признаки делимости</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 2</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Divisible by 2 (even/odd) -->
  <rect x="20" y="88" width="115" height="105" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="20" y="88" width="115" height="20" rx="6" fill="#1565C0" opacity="0.12"/>
  <rect x="20" y="100" width="115" height="8" fill="#1565C0" opacity="0.12"/>
  <text x="77" y="103" font-family="Arial,sans-serif" font-size="11" fill="#1565C0" text-anchor="middle" font-weight="bold">На 2</text>
  <text x="77" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Чётные числа</text>
  <!-- Even numbers highlighted -->
  <rect x="30" y="132" width="22" height="16" rx="3" fill="#2E7D32" opacity="0.15"/>
  <text x="41" y="144" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">2</text>
  <rect x="56" y="132" width="22" height="16" rx="3" fill="#2E7D32" opacity="0.15"/>
  <text x="67" y="144" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">4</text>
  <rect x="82" y="132" width="22" height="16" rx="3" fill="#2E7D32" opacity="0.15"/>
  <text x="93" y="144" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">6</text>
  <rect x="108" y="132" width="22" height="16" rx="3" fill="#C62828" opacity="0.15"/>
  <text x="119" y="144" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle">7</text>
  <!-- Arrow pointing to last digit -->
  <text x="77" y="165" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">Заканчивается на</text>
  <text x="77" y="178" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">0, 2, 4, 6, 8</text>
  <text x="119" y="160" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">нет</text>

  <!-- Card 2: Divisible by 3 -->
  <rect x="143" y="88" width="115" height="105" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <rect x="143" y="88" width="115" height="20" rx="6" fill="#2E7D32" opacity="0.12"/>
  <rect x="143" y="100" width="115" height="8" fill="#2E7D32" opacity="0.12"/>
  <text x="200" y="103" font-family="Arial,sans-serif" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">На 3</text>
  <text x="200" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Сумма цифр</text>
  <!-- Example: 273 -->
  <rect x="162" y="132" width="76" height="24" rx="4" fill="#2E7D32" opacity="0.06"/>
  <text x="200" y="148" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32" text-anchor="middle" font-weight="bold">273</text>
  <text x="200" y="170" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">2 + 7 + 3 = 12</text>
  <text x="200" y="183" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">12 : 3 = 4  да!</text>

  <!-- Card 3: Divisible by 5 -->
  <rect x="266" y="88" width="115" height="105" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <rect x="266" y="88" width="115" height="20" rx="6" fill="#C62828" opacity="0.12"/>
  <rect x="266" y="100" width="115" height="8" fill="#C62828" opacity="0.12"/>
  <text x="323" y="103" font-family="Arial,sans-serif" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">На 5</text>
  <text x="323" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Последняя цифра</text>
  <!-- Numbers ending in 0 or 5 -->
  <rect x="275" y="132" width="22" height="16" rx="3" fill="#C62828" opacity="0.15"/>
  <text x="286" y="144" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">5</text>
  <rect x="301" y="132" width="26" height="16" rx="3" fill="#C62828" opacity="0.15"/>
  <text x="314" y="144" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">10</text>
  <rect x="331" y="132" width="26" height="16" rx="3" fill="#C62828" opacity="0.15"/>
  <text x="344" y="144" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">15</text>
  <rect x="361" y="132" width="26" height="16" rx="3" fill="#C62828" opacity="0.15"/>
  <text x="374" y="144" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">20</text>
  <text x="323" y="170" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Заканчивается на</text>
  <text x="323" y="185" font-family="Arial,sans-serif" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">0 или 5</text>

  <!-- Card 4: Divisible by 10 -->
  <rect x="389" y="88" width="92" height="105" rx="6" fill="white" stroke="#F9A825" stroke-width="1.5"/>
  <rect x="389" y="88" width="92" height="20" rx="6" fill="#F9A825" opacity="0.12"/>
  <rect x="389" y="100" width="92" height="8" fill="#F9A825" opacity="0.12"/>
  <text x="435" y="103" font-family="Arial,sans-serif" font-size="11" fill="#F9A825" text-anchor="middle" font-weight="bold">На 10</text>
  <text x="435" y="125" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Заканчивается</text>
  <!-- Zero circles -->
  <circle cx="412" cy="148" r="14" fill="#F9A825" opacity="0.12" stroke="#F9A825" stroke-width="1"/>
  <text x="412" y="153" font-family="Arial,sans-serif" font-size="14" fill="#F9A825" text-anchor="middle" font-weight="bold">0</text>
  <text x="435" y="180" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">10, 20, 30...</text>
  <text x="435" y="185" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle"></text>

  <!-- Bottom wide card: Quick reference table -->
  <rect x="20" y="200" width="460" height="98" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="250" y="218" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Быстрая справка: Признаки делимости</text>
  <line x1="28" y1="222" x2="472" y2="222" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Table rows -->
  <text x="55" y="240" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">на 2</text>
  <text x="55" y="254" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">0,2,4,6,8</text>
  <line x1="100" y1="228" x2="100" y2="290" stroke="#E0E0E0" stroke-width="1"/>
  <text x="150" y="240" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">на 3</text>
  <text x="150" y="254" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">сумма : 3</text>
  <line x1="200" y1="228" x2="200" y2="290" stroke="#E0E0E0" stroke-width="1"/>
  <text x="250" y="240" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">на 5</text>
  <text x="250" y="254" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">0 или 5</text>
  <line x1="300" y1="228" x2="300" y2="290" stroke="#E0E0E0" stroke-width="1"/>
  <text x="350" y="240" font-family="Arial,sans-serif" font-size="10" fill="#F9A825" text-anchor="middle" font-weight="bold">на 10</text>
  <text x="350" y="254" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">заканчив. 0</text>
  <line x1="400" y1="228" x2="400" y2="290" stroke="#E0E0E0" stroke-width="1"/>
  <text x="440" y="240" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="middle" font-weight="bold">на 9</text>
  <text x="440" y="254" font-family="Arial,sans-serif" font-size="8" fill="#777" text-anchor="middle">сумма : 9</text>
  <!-- Example -->
  <rect x="35" y="262" width="450" height="30" rx="4" fill="#C62828" opacity="0.04"/>
  <text x="250" y="278" font-family="Arial,sans-serif" font-size="9" fill="#555" text-anchor="middle">Пример: 360 - делится на 2 (заканч. 0), на 3 (3+6+0=9), на 5 (заканч. 0), на 9 (9:9=1), на 10 (заканч. 0)</text>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Признаки делимости</text>
</svg>