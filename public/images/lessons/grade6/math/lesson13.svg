<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFFDE7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="3"/>
  <rect x="8" y="8" width="484" height="334" rx="6" fill="none" stroke="#C62828" stroke-width="1" opacity="0.3"/>
  <!-- Bauhaus corners -->
  <polygon points="10,10 30,10 10,30" fill="#C62828" opacity="0.08"/>
  <polygon points="490,10 470,10 490,30" fill="#1565C0" opacity="0.08"/>
  <polygon points="10,340 30,340 10,320" fill="#F9A825" opacity="0.08"/>
  <polygon points="490,340 470,340 490,320" fill="#2E7D32" opacity="0.08"/>
  <!-- Bauhaus circles -->
  <circle cx="70" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="82" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="94" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <circle cx="406" cy="15" r="4" fill="#C62828" opacity="0.1"/>
  <circle cx="418" cy="15" r="4" fill="#1565C0" opacity="0.1"/>
  <circle cx="430" cy="15" r="4" fill="#F9A825" opacity="0.1"/>
  <!-- Title -->
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#C62828" text-anchor="middle">Координатная плоскость</text>
  <text x="250" y="68" font-family="Arial,sans-serif" font-size="12" fill="#777" text-anchor="middle">Математика - Урок 13</text>
  <line x1="30" y1="78" x2="470" y2="78" stroke="#C62828" stroke-width="2" opacity="0.25"/>
  <rect x="30" y="75" width="60" height="6" fill="#C62828" opacity="0.15" rx="1"/>
  <rect x="410" y="75" width="60" height="6" fill="#1565C0" opacity="0.12" rx="1"/>

  <!-- Card 1: Coordinate plane with plotted points forming a house shape -->
  <rect x="20" y="88" width="290" height="210" rx="6" fill="white" stroke="#1565C0" stroke-width="1.5"/>
  <text x="165" y="104" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">Координатная плоскость XOY</text>
  <line x1="28" y1="108" x2="302" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Grid -->
  <!-- Vertical grid lines -->
  <line x1="70" y1="115" x2="70" y2="290" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="110" y1="115" x2="110" y2="290" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="190" y1="115" x2="190" y2="290" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="230" y1="115" x2="230" y2="290" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="270" y1="115" x2="270" y2="290" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Horizontal grid lines -->
  <line x1="30" y1="140" x2="300" y2="140" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="30" y1="170" x2="300" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="30" y1="210" x2="300" y2="210" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="30" y1="250" x2="300" y2="250" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Axes -->
  <line x1="30" y1="210" x2="300" y2="210" stroke="#555" stroke-width="1.5"/>
  <polygon points="300,210 293,206 293,214" fill="#555"/>
  <line x1="150" y1="292" x2="150" y2="115" stroke="#555" stroke-width="1.5"/>
  <polygon points="150,115 146,122 154,122" fill="#555"/>
  <!-- Axis labels -->
  <text x="295" y="225" font-family="Arial,sans-serif" font-size="10" fill="#555" font-weight="bold">X</text>
  <text x="157" y="122" font-family="Arial,sans-serif" font-size="10" fill="#555" font-weight="bold">Y</text>
  <text x="155" y="222" font-family="Arial,sans-serif" font-size="9" fill="#555">0</text>
  <!-- X axis numbers -->
  <text x="190" y="222" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">1</text>
  <text x="230" y="222" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">2</text>
  <text x="270" y="222" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">3</text>
  <text x="110" y="222" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">-1</text>
  <text x="70" y="222" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">-2</text>
  <!-- Y axis numbers -->
  <text x="143" y="173" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="end">1</text>
  <text x="143" y="143" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="end">2</text>
  <text x="143" y="253" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="end">-1</text>
  <!-- House shape: points forming a house -->
  <!-- House body: (1,-1) (3,-1) (3,1) (1,1) -->
  <polygon points="190,250 270,250 270,170 190,170" fill="#1565C0" opacity="0.1" stroke="#1565C0" stroke-width="1.5"/>
  <!-- Roof: (1,1) (2,2) (3,1) -->
  <polygon points="190,170 230,140 270,170" fill="#C62828" opacity="0.12" stroke="#C62828" stroke-width="1.5"/>
  <!-- Door -->
  <rect x="215" y="210" width="30" height="40" rx="2" fill="#F9A825" opacity="0.15" stroke="#F9A825" stroke-width="1"/>
  <!-- Window -->
  <rect x="195" y="185" width="18" height="18" rx="2" fill="#2E7D32" opacity="0.12" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="204" y1="185" x2="204" y2="203" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="195" y1="194" x2="213" y2="194" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Plot points with labels -->
  <!-- Point A (1, 1) -->
  <circle cx="190" cy="170" r="3.5" fill="#C62828" stroke="white" stroke-width="1"/>
  <text x="182" y="166" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="end">A(1,1)</text>
  <!-- Point B (3, 1) -->
  <circle cx="270" cy="170" r="3.5" fill="#C62828" stroke="white" stroke-width="1"/>
  <text x="278" y="166" font-family="Arial,sans-serif" font-size="7" fill="#C62828">B(3,1)</text>
  <!-- Point C (2, 2) -->
  <circle cx="230" cy="140" r="3.5" fill="#C62828" stroke="white" stroke-width="1"/>
  <text x="238" y="136" font-family="Arial,sans-serif" font-size="7" fill="#C62828">C(2,2)</text>
  <!-- Point D (3, -1) -->
  <circle cx="270" cy="250" r="3.5" fill="#1565C0" stroke="white" stroke-width="1"/>
  <text x="278" y="256" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">D(3,-1)</text>
  <!-- Point E (1, -1) -->
  <circle cx="190" cy="250" r="3.5" fill="#1565C0" stroke="white" stroke-width="1"/>
  <text x="182" y="256" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="end">E(1,-1)</text>
  <!-- Quadrant labels -->
  <text x="95" y="160" font-family="Arial,sans-serif" font-size="7" fill="#C62828" opacity="0.4">II</text>
  <text x="230" y="160" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" opacity="0.4">I</text>
  <text x="95" y="260" font-family="Arial,sans-serif" font-size="7" fill="#C62828" opacity="0.4">III</text>
  <text x="230" y="260" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" opacity="0.4">IV</text>

  <!-- Card 2: Coordinate reading guide -->
  <rect x="318" y="88" width="163" height="100" rx="6" fill="white" stroke="#C62828" stroke-width="1.5"/>
  <text x="400" y="104" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Чтение координат</text>
  <line x1="326" y1="108" x2="473" y2="108" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Point with dashed lines to axes -->
  <circle cx="400" cy="140" r="4" fill="#C62828" opacity="0.3" stroke="#C62828" stroke-width="1.5"/>
  <line x1="400" y1="140" x2="400" y2="175" stroke="#1565C0" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="400" y1="140" x2="345" y2="140" stroke="#C62828" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Arrow labels -->
  <text x="395" y="185" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">x = 3</text>
  <text x="338" y="138" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="end" font-weight="bold">y = 2</text>
  <rect x="355" y="145" width="72" height="16" rx="3" fill="#F9A825" opacity="0.1"/>
  <text x="391" y="157" font-family="Arial,sans-serif" font-size="9" fill="#F9A825" text-anchor="middle" font-weight="bold">A(3, 2)</text>

  <!-- Card 3: Quadrants -->
  <rect x="318" y="196" width="163" height="102" rx="6" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="400" y="212" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Четверти плоскости</text>
  <line x1="326" y1="216" x2="473" y2="216" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Quadrant grid -->
  <line x1="400" y1="222" x2="400" y2="290" stroke="#555" stroke-width="0.8"/>
  <line x1="330" y1="258" x2="468" y2="258" stroke="#555" stroke-width="0.8"/>
  <!-- Q1 -->
  <rect x="402" y="222" width="64" height="34" rx="0" fill="#2E7D32" opacity="0.08"/>
  <text x="434" y="243" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">I</text>
  <text x="434" y="254" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">(+,+)</text>
  <!-- Q2 -->
  <rect x="334" y="222" width="64" height="34" rx="0" fill="#F9A825" opacity="0.08"/>
  <text x="366" y="243" font-family="Arial,sans-serif" font-size="9" fill="#F9A825" text-anchor="middle" font-weight="bold">II</text>
  <text x="366" y="254" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" text-anchor="middle">(-,+)</text>
  <!-- Q3 -->
  <rect x="334" y="260" width="64" height="30" rx="0" fill="#C62828" opacity="0.06"/>
  <text x="366" y="279" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">III</text>
  <text x="366" y="290" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">(-,-)</text>
  <!-- Q4 -->
  <rect x="402" y="260" width="64" height="30" rx="0" fill="#1565C0" opacity="0.06"/>
  <text x="434" y="279" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">IV</text>
  <text x="434" y="290" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">(+,-)</text>

  <!-- Bottom panel -->
  <rect x="15" y="308" width="470" height="30" rx="4" fill="#C62828" opacity="0.85"/>
  <text x="250" y="329" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="white" font-weight="bold">Координатная плоскость</text>
</svg>