<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#AD1457;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FCE4EC;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00897B;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#AD1457;stop-opacity:0.7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#skyGradient)"/>
  <rect width="500" height="350" fill="#FCE4EC" opacity="0.4"/>
  
  <!-- Decorative elements -->
  <circle cx="450" cy="50" r="40" fill="#AD1457" opacity="0.15">
    <animate attributeName="r" values="38;42;38" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="300" r="30" fill="#00897B" opacity="0.15">
    <animate attributeName="r" values="28;32;28" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Header -->
  <rect x="50" y="25" width="400" height="50" rx="10" fill="url(#accentGradient)" opacity="0.8"/>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">📖 Урок 9</text>
  
  <!-- Topic box -->
  <rect x="50" y="90" width="400" height="60" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#AD1457" stroke-width="2"/>
  <text x="250" y="125" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#AD1457" text-anchor="middle">Чуковский К.И.</text>
  
  <!-- Content area -->
  <rect x="50" y="165" width="400" height="140" rx="8" fill="#FFFFFF" opacity="0.7" stroke="#AD1457" stroke-width="1"/>
  
  <!-- Visual elements based on subject -->
  <g transform="translate(250, 235)">
    <!-- Subject-specific visual -->
    <circle cx="0" cy="0" r="50" fill="#AD1457" opacity="0.2">
      <animate attributeName="r" values="48;52;48" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="35" fill="#00897B" opacity="0.3"/>
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="32" text-anchor="middle">📖</text>
  </g>
  
  <!-- Progress indicator -->
  <rect x="50" y="320" width="400" height="8" rx="4" fill="#E0E0E0"/>
  <rect x="50" y="320" width="360" height="8" rx="4" fill="#00897B"/>
  
  <!-- Lesson number badge -->
  <circle cx="440" cy="310" r="20" fill="#AD1457"/>
  <text x="440" y="316" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">9</text>
</svg>