<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#E3F2FD"/>
  <text x="250" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#0D47A1">Моя семья</text>
  <rect x="30" y="50" width="440" height="130" fill="white" rx="10" stroke="#0D47A1" stroke-width="2" opacity="0.9"/>
  <text x="250" y="75" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0D47A1">Что сделать в проекте</text>
  <g font-family="Arial,sans-serif" font-size="13" fill="#333">
    <text x="50" y="100">1. Собери фото семьи</text>
    <text x="50" y="125">2. Напиши рассказ о каждом</text>
    <text x="50" y="150">3. Составь семейное древо</text>
  </g>
  <rect x="30" y="195" width="440" height="140" fill="#E3F2FD" rx="10"/>
  <text x="250" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0D47A1">Этапы работы над проектом</text>
  <g font-family="Arial,sans-serif" font-size="12" fill="#333">
    <text x="50" y="242">1. Выбери тему и поставь цель</text>
    <text x="50" y="262">2. Собери информацию</text>
    <text x="50" y="282">3. Создай продукт (постер, презентацию)</text>
    <text x="50" y="302">4. Подготовь выступление</text>
    <text x="50" y="322" fill="#0D47A1">5. Представь проект классу!</text>
  </g>
</svg>