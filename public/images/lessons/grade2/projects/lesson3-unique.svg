<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<style>.wh{animation:s 20s linear infinite;transform-origin:250px 185px}@keyframes s{to{transform:rotate(360deg)}}</style>
<rect width="500" height="350" fill="#E8F5E9"/>
<text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" fill="#33691E" font-weight="bold">Времена года</text>
<circle cx="250" cy="185" r="135" fill="none" stroke="#81C784" stroke-width="2" stroke-dasharray="5,5"/>
<g class="wh"><line x1="250" y1="50" x2="250" y2="320" stroke="#A5D6A7" stroke-width="1"/><line x1="115" y1="185" x2="385" y2="185" stroke="#A5D6A7" stroke-width="1"/></g>
<!-- Winter -->
<rect x="118" y="55" width="130" height="128" rx="10" fill="#E3F2FD"/>
<circle cx="150" cy="90" r="18" fill="white" stroke="#90CAF9" stroke-width="1.5"/>
<circle cx="150" cy="72" r="7" fill="white" stroke="#90CAF9" stroke-width="1.5"/>
<circle cx="146" cy="70" r="1.5" fill="#5D4037"/><circle cx="154" cy="70" r="1.5" fill="#5D4037"/>
<path d="M147,74Q150,77 153,74" fill="none" stroke="#E64A19" stroke-width="1"/>
<rect x="144" y="90" width="12" height="3" fill="#E64A19"/>
<line x1="210" y1="160" x2="210" y2="100" stroke="#795548" stroke-width="3"/>
<line x1="210" y1="120" x2="195" y2="105" stroke="#795548" stroke-width="2"/>
<line x1="210" y1="130" x2="225" y2="112" stroke="#795548" stroke-width="2"/>
<text x="155" y="148" font-size="11" fill="#90CAF9">❄</text>
<text x="183" y="75" text-anchor="middle" font-size="9" fill="#1565C0" font-family="sans-serif">Зима</text>
<!-- Spring -->
<rect x="252" y="55" width="130" height="128" rx="10" fill="#F1F8E9"/>
<line x1="290" y1="160" x2="290" y2="120" stroke="#66BB6A" stroke-width="2"/>
<circle cx="290" cy="115" r="8" fill="#F48FB1"/><circle cx="290" cy="115" r="3" fill="#FFD54F"/>
<line x1="320" y1="160" x2="320" y2="130" stroke="#66BB6A" stroke-width="2"/>
<circle cx="320" cy="125" r="7" fill="#CE93D8"/><circle cx="320" cy="125" r="2.5" fill="#FFD54F"/>
<line x1="350" y1="160" x2="350" y2="140" stroke="#66BB6A" stroke-width="2"/>
<circle cx="350" cy="136" r="6" fill="#81D4FA"/><circle cx="350" cy="136" r="2" fill="#FFD54F"/>
<ellipse cx="275" cy="95" rx="2" ry="4" fill="#64B5F6"/><ellipse cx="300" cy="88" rx="2" ry="4" fill="#64B5F6"/>
<ellipse cx="330" cy="92" rx="2" ry="4" fill="#64B5F6"/>
<ellipse cx="320" cy="78" rx="25" ry="10" fill="#B0BEC5"/>
<text x="317" y="70" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="sans-serif">Весна</text>
<!-- Summer -->
<rect x="252" y="187" width="130" height="128" rx="10" fill="#FFFDE7"/>
<circle cx="360" cy="220" r="18" fill="#FFD54F" stroke="#FFC107" stroke-width="1.5"/>
<line x1="360" y1="198" x2="360" y2="192" stroke="#FFC107" stroke-width="2"/>
<line x1="338" y1="220" x2="332" y2="220" stroke="#FFC107" stroke-width="2"/>
<line x1="382" y1="220" x2="388" y2="220" stroke="#FFC107" stroke-width="2"/>
<path d="M258,280Q280,275 300,280Q320,285 340,280Q360,275 378,280L378,310L258,310Z" fill="#4FC3F7"/>
<text x="317" y="200" text-anchor="middle" font-size="9" fill="#F57F17" font-family="sans-serif">Лето</text>
<!-- Autumn -->
<rect x="118" y="187" width="130" height="128" rx="10" fill="#FFF3E0"/>
<line x1="160" y1="300" x2="160" y2="240" stroke="#795548" stroke-width="4"/>
<circle cx="160" cy="230" r="20" fill="#FF8A65"/>
<circle cx="150" cy="225" r="12" fill="#FFB74D"/>
<circle cx="172" cy="228" r="10" fill="#FF7043"/>
<ellipse cx="130" cy="270" rx="5" ry="3" fill="#FF8A65" transform="rotate(-30,130,270)"/>
<ellipse cx="190" cy="260" rx="5" ry="3" fill="#FFB74D" transform="rotate(20,190,260)"/>
<rect x="220" y="280" width="6" height="15" rx="2" fill="#EFEBE9"/>
<ellipse cx="223" cy="278" rx="12" ry="8" fill="#E53935"/>
<circle cx="218" cy="275" r="2" fill="white"/><circle cx="228" cy="276" r="1.5" fill="white"/>
<text x="183" y="200" text-anchor="middle" font-size="9" fill="#E65100" font-family="sans-serif">Осень</text>
</svg>