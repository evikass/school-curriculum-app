  <!-- Singer 3 -->
  <circle cx="370" cy="180" r="12" fill="#ffccbc"/>
  <path d="M358,175 Q370,155 382,175" fill="#6a1b9a"/>
  <path d="M360,175 L370,158 L380,175" fill="#ffd54f" stroke="#ff8f00" stroke-width="1"/>
  <path d="M370,192 L370,225 M370,200 L355,215 M370,200 L385,215" stroke="#6a1b9a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M355,225 Q370,235 385,225" stroke="#6a1b9a" stroke-width="2.5" fill="#6a1b9a"/>
  <!-- Balalaika player -->
  <circle cx="440" cy="175" r="12" fill="#ffccbc"/>
  <rect x="434" y="160" width="12" height="6" rx="2" fill="#5d4037"/>
  <ellipse cx="440" cy="230" rx="18" ry="25" fill="#e65100" transform="rotate(-20,440,230)"/>
  <rect x="432" y="195" width="4" height="30" rx="1" fill="#5d4037"/>
  <!-- Musical notes -->
  <g fill="#ffd54f"><ellipse cx="230" cy="155" rx="5" ry="4" transform="rotate(-15,230,155)"/>
    <line x1="235" y1="155" x2="235" y2="138" stroke="#ffd54f" stroke-width="1.5"/>
    <ellipse cx="305" cy="158" rx="5" ry="4" transform="rotate(-10,305,158)"/>
    <line x1="310" y1="158" x2="310" y2="141" stroke="#ffd54f" stroke-width="1.5"/>
    <ellipse cx="375" cy="155" rx="5" ry="4" transform="rotate(-20,375,155)"/>
    <line x1="380" y1="155" x2="380" y2="138" stroke="#ffd54f" stroke-width="1.5"/></g>
  <!-- Ground -->
  <path d="M0,260 Q200,262 500,257 L500,350 L0,350Z" fill="#2e7d32" opacity="0.3"/>
  <!-- Birch -->
  <rect x="460" y="100" width="8" height="160" rx="2" fill="#eceff1"/>
  <circle cx="464" cy="95" r="20" fill="#4caf50" opacity="0.7"/>
