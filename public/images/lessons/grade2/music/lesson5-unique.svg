<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" rx="12" fill="#1a472a"/>
  <rect x="4" y="4" width="492" height="342" rx="10" fill="none" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="250" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">Русские народные песни</text>
  <!-- Wooden house -->
  <rect x="30" y="130" width="80" height="60" fill="#8d6e63"/>
  <g stroke="#6d4c41" stroke-width="1"><line x1="30" y1="145" x2="110" y2="145"/><line x1="30" y1="160" x2="110" y2="160"/><line x1="30" y1="175" x2="110" y2="175"/></g>
  <polygon points="25,130 70,100 115,130" fill="#c62828"/>
  <rect x="55" y="155" width="15" height="35" rx="1" fill="#5d4037"/>
  <circle cx="67" cy="173" r="2" fill="#ffd54f"/>
  <rect x="40" y="140" width="12" height="12" rx="1" fill="#81d4fa" stroke="#5d4037" stroke-width="1"/>
  <rect x="88" y="140" width="12" height="12" rx="1" fill="#81d4fa" stroke="#5d4037" stroke-width="1"/>
  <!-- Fence -->
  <g stroke="#8d6e63" stroke-width="2"><line x1="120" y1="170" x2="120" y2="195"/><line x1="130" y1="170" x2="130" y2="195"/><line x1="140" y1="170" x2="140" y2="195"/></g>
  <line x1="118" y1="178" x2="142" y2="178" stroke="#8d6e63" stroke-width="1.5"/>
  <line x1="118" y1="190" x2="142" y2="190" stroke="#8d6e63" stroke-width="1.5"/>
  <!-- Singer 1 -->
  <circle cx="220" cy="180" r="12" fill="#ffccbc"/>
  <path d="M208,175 Q220,155 232,175" fill="#c62828"/>
  <path d="M210,175 L220,158 L230,175" fill="#ffd54f" stroke="#ff8f00" stroke-width="1"/>
  <path d="M220,192 L220,225 M220,200 L205,215 M220,200 L235,215" stroke="#c62828" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M205,225 Q220,235 235,225" stroke="#c62828" stroke-width="2.5" fill="#c62828"/>
  <!-- Singer 2 -->
  <circle cx="300" cy="180" r="12" fill="#ffe0b2"/>
  <path d="M288,175 Q300,155 312,175" fill="#1565c0"/>
  <path d="M290,175 L300,158 L310,175" fill="#ffd54f" stroke="#ff8f00" stroke-width="1"/>
  <path d="M300,192 L300,225 M300,200 L285,215 M300,200 L315,215" stroke="#1565c0" stroke-width="3" fill="none" stroke-linecap="round"/>
