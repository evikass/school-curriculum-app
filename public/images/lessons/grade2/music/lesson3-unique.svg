  <!-- Tempo arrow -->
  <defs><marker id="a1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#fff"/></marker></defs>
  <line x1="190" y1="170" x2="280" y2="170" stroke="#fff" stroke-width="2" marker-end="url(#a1)"/>
  <text x="235" y="163" text-anchor="middle" font-size="10" fill="#fff">Темп</text>
</svg>