  <line x1="340" y1="245" x2="325" y2="275" stroke="#ffb74d" stroke-width="5" stroke-linecap="round"/>
  <line x1="355" y1="245" x2="365" y2="278" stroke="#ffb74d" stroke-width="5" stroke-linecap="round"/>
  <line x1="380" y1="245" x2="370" y2="275" stroke="#ffb74d" stroke-width="5" stroke-linecap="round"/>
  <line x1="395" y1="240" x2="410" y2="270" stroke="#ffb74d" stroke-width="5" stroke-linecap="round"/>
  <!-- Tail -->
  <path d="M305,215 Q290,200 295,185 Q300,175 308,180" stroke="#ffc107" stroke-width="3" fill="none"/>
  <!-- Speed lines -->
  <line x1="280" y1="200" x2="255" y2="200" stroke="#ff9800" stroke-width="1.5" opacity="0.6"/>
  <line x1="285" y1="215" x2="250" y2="215" stroke="#ff9800" stroke-width="1.5" opacity="0.6"/>
  <line x1="280" y1="230" x2="250" y2="230" stroke="#ff9800" stroke-width="1.5" opacity="0.6"/>
