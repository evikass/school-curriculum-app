  <!-- Cheetah -->
  <ellipse cx="360" cy="220" rx="55" ry="28" fill="#ffb74d"/>
  <ellipse cx="360" cy="220" rx="50" ry="24" fill="#ffc107"/>
  <circle cx="345" cy="215" r="4" fill="#5d4037"/><circle cx="370" cy="212" r="3.5" fill="#5d4037"/>
  <circle cx="385" cy="225" r="3" fill="#5d4037"/><circle cx="352" cy="228" r="3" fill="#5d4037"/>
  <circle cx="415" cy="205" r="18" fill="#ffc107"/>
  <circle cx="425" cy="200" r="2.5" fill="#333"/>
  <path d="M410,190 Q408,180 414,185" stroke="#5d4037" stroke-width="2" fill="#ffc107"/>
  <path d="M420,188 Q422,178 425,184" stroke="#5d4037" stroke-width="2" fill="#ffc107"/>
