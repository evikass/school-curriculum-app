<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <title>Что такое деление?</title>
  <defs><style>@keyframes s{0%,100%{transform:rotate(0)}50%{transform:rotate(5deg)}}.ps{animation:s 3s ease-in-out infinite;transform-origin:0 -20px}</style></defs>
  <rect width="500" height="350" fill="#FFF3E0" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold" fill="#BF360C">Что такое деление?</text>
  <!-- Tablecloth -->
  <rect x="20" y="50" width="460" height="230" rx="10" fill="#FFE0B2"/>
  <!-- Whole pizza -->
  <g transform="translate(100,165)">
    <circle r="55" fill="#FFB74D" stroke="#E65100" stroke-width="2"/>
    <circle r="45" fill="#FF9800"/>
    <circle r="45" fill="#FFC107" opacity="0.4"/>
    <circle cx="-12" cy="-12" r="6" fill="#D32F2F"/><circle cx="12" cy="-8" r="5.5" fill="#D32F2F"/>
    <circle cx="-4" cy="16" r="6" fill="#D32F2F"/><circle cx="20" cy="12" r="5" fill="#D32F2F"/>
    <circle cx="-20" cy="6" r="5" fill="#D32F2F"/>
    <line x1="0" y1="-45" x2="0" y2="45" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
  <text x="100" y="240" text-anchor="middle" font-size="13" font-weight="bold" fill="#E65100">Целая пицца</text>
  <!-- Arrow -->
  <path d="M170,165 L220,165" stroke="#BF360C" stroke-width="3" fill="none"/>
  <polygon points="225,165 215,160 215,170" fill="#BF360C"/>
  <!-- 4 friends with slices -->
  <defs><g id="f"><circle cy="30" r="7" fill="#FFCC80"/><circle cx="-2" cy="28" r="1.2" fill="#333"/><circle cx="2" cy="28" r="1.2" fill="#333"/><path d="M-2,33 Q0,36 2,33" fill="none" stroke="#333" stroke-width="1"/><line x1="0" y1="37" x2="0" y2="55" stroke-width="2"/><line x1="-6" y1="44" x2="6" y2="44" stroke-width="2"/><line x1="0" y1="55" x2="-4" y2="66" stroke-width="1.5"/><line x1="0" y1="55" x2="4" y2="66" stroke-width="1.5"/></g></defs>
  <!-- Friend 1 -->
  <g transform="translate(280,95)">
    <g class="ps"><path d="M0,-25 L12,8 L-12,8 Z" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/><circle cy="-3" r="3.5" fill="#D32F2F"/></g>
    <use href="#f" stroke="#F57C00" fill="#F57C00"/>
  </g>
  <!-- Friend 2 -->
  <g transform="translate(370,95)">
    <g class="ps" style="animation-delay:.5s"><path d="M0,-25 L12,8 L-12,8 Z" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/><circle cy="-3" r="3.5" fill="#D32F2F"/></g>
    <use href="#f" stroke="#1565C0" fill="#1565C0"/>
  </g>
  <!-- Friend 3 -->
  <g transform="translate(300,195)">
    <g class="ps" style="animation-delay:1s"><path d="M0,-20 L10,6 L-10,6 Z" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/><circle cy="-2" r="3" fill="#D32F2F"/></g>
    <use href="#f" stroke="#2E7D32" fill="#2E7D32"/>
  </g>
  <!-- Friend 4 -->
  <g transform="translate(395,195)">
    <g class="ps" style="animation-delay:1.5s"><path d="M0,-20 L10,6 L-10,6 Z" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/><circle cy="-2" r="3" fill="#D32F2F"/></g>
    <use href="#f" stroke="#7B1FA2" fill="#7B1FA2"/>
  </g>
  <text x="250" y="320" text-anchor="middle" font-size="18" font-weight="bold" fill="#BF360C">4 ÷ 4 = 1 (каждому по 1 куску)</text>
</svg>