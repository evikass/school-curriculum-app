<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <title>Двузначные числа и их разряды</title>
  <defs><style>@keyframes w{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}.wn{animation:w 3s ease-in-out infinite}</style></defs>
  <rect width="500" height="350" fill="#E8EAF6" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold" fill="#283593">Двузначные числа и их разряды</text>
  <rect x="0" y="30" width="500" height="220" fill="#B3E5FC"/>
  <ellipse cx="80" cy="70" rx="35" ry="15" fill="#fff" opacity=".8"/>
  <ellipse cx="400" cy="80" rx="30" ry="13" fill="#fff" opacity=".7"/>
  <rect x="0" y="280" width="500" height="70" fill="#81C784"/>
  <!-- Tens house -->
  <g transform="translate(40,80)">
    <polygon points="70,0 0,60 140,60" fill="#E53935"/>
    <rect x="62" y="-5" width="16" height="25" fill="#FFEB3B"/>
    <rect x="10" y="60" width="120" height="160" fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
    <rect x="20" y="65" width="100" height="20" rx="3" fill="#FF7043"/>
    <text x="70" y="80" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ДЕСЯТКИ</text>
    <g class="wn"><rect x="20" y="95" width="35" height="35" rx="3" fill="#81D4FA" stroke="#0288D1" stroke-width="1.5"/><text x="37" y="118" text-anchor="middle" font-size="20" font-weight="bold" fill="#01579B">2</text></g>
    <g class="wn" style="animation-delay:.5s"><rect x="85" y="95" width="35" height="35" rx="3" fill="#81D4FA" stroke="#0288D1" stroke-width="1.5"/><text x="102" y="118" text-anchor="middle" font-size="20" font-weight="bold" fill="#01579B">3</text></g>
    <g class="wn" style="animation-delay:1s"><rect x="20" y="145" width="35" height="35" rx="3" fill="#81D4FA" stroke="#0288D1" stroke-width="1.5"/><text x="37" y="168" text-anchor="middle" font-size="20" font-weight="bold" fill="#01579B">5</text></g>
    <g class="wn" style="animation-delay:1.5s"><rect x="85" y="145" width="35" height="35" rx="3" fill="#81D4FA" stroke="#0288D1" stroke-width="1.5"/><text x="102" y="168" text-anchor="middle" font-size="20" font-weight="bold" fill="#01579B">7</text></g>
    <rect x="50" y="185" width="30" height="35" rx="2" fill="#6D4C41"/>
  </g>
  <!-- Ones house -->
  <g transform="translate(290,170)">
    <polygon points="80,0 0,50 160,50" fill="#43A047"/>
    <rect x="70" y="-5" width="18" height="22" fill="#FFEB3B"/>
    <rect x="10" y="50" width="140" height="80" fill="#E1F5FE" stroke="#0288D1" stroke-width="2"/>
    <rect x="25" y="55" width="110" height="18" rx="3" fill="#29B6F6"/>
    <text x="80" y="68" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">ЕДИНИЦЫ</text>
    <g class="wn" style="animation-delay:.3s"><rect x="20" y="80" width="30" height="30" rx="3" fill="#FFE082" stroke="#F9A825" stroke-width="1.5"/><text x="35" y="100" text-anchor="middle" font-size="18" font-weight="bold" fill="#E65100">4</text></g>
    <g class="wn" style="animation-delay:.8s"><rect x="70" y="80" width="30" height="30" rx="3" fill="#FFE082" stroke="#F9A825" stroke-width="1.5"/><text x="85" y="100" text-anchor="middle" font-size="18" font-weight="bold" fill="#E65100">6</text></g>
    <g class="wn" style="animation-delay:1.3s"><rect x="118" y="80" width="30" height="30" rx="3" fill="#FFE082" stroke="#F9A825" stroke-width="1.5"/><text x="133" y="100" text-anchor="middle" font-size="18" font-weight="bold" fill="#E65100">9</text></g>
    <rect x="55" y="105" width="24" height="25" rx="2" fill="#8D6E63"/>
  </g>
  <path d="M195,230 Q250,210 280,230" fill="none" stroke="#FF6F00" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="250" y="320" text-anchor="middle" font-size="22" font-weight="bold" fill="#283593">23 = 2 дес. + 3 ед.</text>
</svg>