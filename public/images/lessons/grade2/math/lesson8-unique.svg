<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <title>Таблица умножения на 3</title>
  <rect width="500" height="350" fill="#FCE4EC" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold" fill="#880E4F">Таблица умножения на 3</text>
  <rect x="0" y="270" width="500" height="80" fill="#BDBDBD"/>
  <g fill="#FFD600"><rect x="30" y="300" width="30" height="5" rx="2"/><rect x="90" y="300" width="30" height="5" rx="2"/><rect x="150" y="300" width="30" height="5" rx="2"/><rect x="210" y="300" width="30" height="5" rx="2"/><rect x="270" y="300" width="30" height="5" rx="2"/><rect x="330" y="300" width="30" height="5" rx="2"/><rect x="390" y="300" width="30" height="5" rx="2"/><rect x="450" y="300" width="30" height="5" rx="2"/></g>
  <!-- Tricycle def -->
  <defs><g id="wh"><circle r="16" fill="none" stroke-width="2.5"/><circle r="3.5"/></g></defs>
  <!-- Trike 1 -->
  <g transform="translate(30,170)" stroke="#E53935">
    <use href="#wh" x="10" y="75" fill="#E53935"/>
    <use href="#wh" x="50" y="75" fill="#E53935"/>
    <use href="#wh" x="90" y="75" fill="#E53935"/>
    <path d="M50,75 L50,40 L90,75 M50,40 L10,75 M10,75 L90,75" stroke="#C62828" stroke-width="2.5" fill="none"/>
    <line x1="38" y1="35" x2="62" y2="35" stroke="#424242" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="40" x2="50" y2="35" stroke="#424242" stroke-width="2"/>
    <ellipse cx="32" cy="58" rx="8" ry="4" fill="#FF8A65"/>
  </g>
  <text x="80" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">1×3=3</text>
  <text x="80" y="115" text-anchor="middle" font-size="11" fill="#C62828">3 колеса</text>
  <!-- Trike 2 -->
  <g transform="translate(185,175)" stroke="#1565C0">
    <use href="#wh" x="10" y="70" fill="#1565C0"/>
    <use href="#wh" x="45" y="70" fill="#1565C0"/>
    <use href="#wh" x="80" y="70" fill="#1565C0"/>
    <path d="M45,70 L45,38 L80,70 M45,38 L10,70 M10,70 L80,70" stroke="#0D47A1" stroke-width="2.5" fill="none"/>
    <line x1="34" y1="33" x2="56" y2="33" stroke="#424242" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="45" y1="38" x2="45" y2="33" stroke="#424242" stroke-width="2"/>
    <ellipse cx="28" cy="54" rx="7" ry="3.5" fill="#64B5F6"/>
  </g>
  <text x="230" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#0D47A1">2×3=6</text>
  <text x="230" y="120" text-anchor="middle" font-size="11" fill="#0D47A1">6 колёс</text>
  <!-- Trike 3 -->
  <g transform="translate(340,180)" stroke="#2E7D32">
    <use href="#wh" x="8" y="65" fill="#2E7D32"/>
    <use href="#wh" x="40" y="65" fill="#2E7D32"/>
    <use href="#wh" x="72" y="65" fill="#2E7D32"/>
    <path d="M40,65 L40,36 L72,65 M40,36 L8,65 M8,65 L72,65" stroke="#1B5E20" stroke-width="2.5" fill="none"/>
    <line x1="30" y1="32" x2="50" y2="32" stroke="#424242" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="36" x2="40" y2="32" stroke="#424242" stroke-width="2"/>
    <ellipse cx="24" cy="50" rx="6" ry="3" fill="#81C784"/>
  </g>
  <text x="380" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">3×3=9</text>
  <text x="380" y="125" text-anchor="middle" font-size="11" fill="#1B5E20">9 колёс</text>
  <text x="250" y="335" text-anchor="middle" font-size="18" font-weight="bold" fill="#880E4F">Трицикл = 3 колеса!</text>
</svg>