<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <title>Сложение двузначных чисел</title>
  <rect width="500" height="350" fill="#E0F7FA" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold" fill="#00695C">Сложение двузначных чисел</text>
  <rect x="0" y="260" width="500" height="90" fill="#81C784"/>
  <polygon points="420,120 420,260 460,260" fill="#FFB74D"/>
  <line x1="420" y1="120" x2="470" y2="260" stroke="#E64A19" stroke-width="3"/>
  <rect x="30" y="180" width="14" height="80" fill="#795548"/>
  <circle cx="37" cy="160" r="35" fill="#66BB6A"/><circle cx="20" cy="170" r="25" fill="#4CAF50"/>
  <circle cx="460" cy="60" r="22" fill="#FFD600"/>
  <text x="115" y="55" text-anchor="middle" font-size="26" font-weight="bold" fill="#1565C0">23</text>
  <!-- 13 stick figures as groups -->
  <g fill="#FFCC80" stroke="#FF8A65" stroke-width="1.5">
    <circle cx="35" cy="100" r="5"/><circle cx="55" cy="100" r="5"/><circle cx="75" cy="100" r="5"/><circle cx="95" cy="100" r="5"/><circle cx="115" cy="100" r="5"/>
    <circle cx="135" cy="100" r="5"/><circle cx="155" cy="100" r="5"/><circle cx="175" cy="100" r="5"/><circle cx="195" cy="100" r="5"/><circle cx="215" cy="100" r="5"/>
  </g>
  <g fill="#FFCC80" stroke="#42A5F5" stroke-width="1.5">
    <circle cx="45" cy="148" r="4.5"/><circle cx="63" cy="148" r="4.5"/><circle cx="81" cy="148" r="4.5"/>
  </g>
  <text x="250" y="140" text-anchor="middle" font-size="44" font-weight="bold" fill="#FF6F00">+</text>
  <text x="370" y="55" text-anchor="middle" font-size="26" font-weight="bold" fill="#C62828">14</text>
  <g fill="#FFCC80" stroke="#CE93D8" stroke-width="1.5">
    <circle cx="300" cy="100" r="5"/><circle cx="320" cy="100" r="5"/><circle cx="340" cy="100" r="5"/><circle cx="360" cy="100" r="5"/>
  </g>
  <path d="M230,170 Q250,200 270,170" fill="none" stroke="#FF6F00" stroke-width="2.5"/>
  <polygon points="250,195 244,185 256,185" fill="#FF6F00"/>
  <text x="250" y="310" text-anchor="middle" font-size="24" font-weight="bold" fill="#00695C">23 + 14 = 37</text>
</svg>