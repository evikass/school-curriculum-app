<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <title>Периметр фигур</title>
  <defs><style>@keyframes m{0%{stroke-dashoffset:0}100%{stroke-dashoffset:20}}.t{animation:m 2s linear infinite}</style></defs>
  <rect width="500" height="350" fill="#E0F2F1" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold" fill="#004D40">Периметр фигур</text>
  <polygon points="120,110 70,190 170,190" fill="#E8F5E9" stroke="#4CAF50" stroke-width="3"/>
  <line x1="70" y1="190" x2="120" y2="110" stroke="#FF9800" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <line x1="120" y1="110" x2="170" y2="190" stroke="#2196F3" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <line x1="70" y1="190" x2="170" y2="190" stroke="#E53935" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <text x="88" y="148" font-size="11" font-weight="bold" fill="#FF9800" transform="rotate(-60,88,148)">5</text>
  <text x="150" y="145" font-size="11" font-weight="bold" fill="#2196F3" transform="rotate(60,150,145)">5</text>
  <text x="120" y="207" text-anchor="middle" font-size="11" font-weight="bold" fill="#E53935">6</text>
  <text x="120" y="222" text-anchor="middle" font-size="13" font-weight="bold" fill="#004D40">P=16</text>
  <rect x="210" y="120" width="60" height="60" fill="#E3F2FD" stroke="#1565C0" stroke-width="3"/>
  <line x1="210" y1="120" x2="270" y2="120" stroke="#E53935" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <line x1="270" y1="120" x2="270" y2="180" stroke="#FF9800" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <line x1="210" y1="180" x2="270" y2="180" stroke="#2196F3" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <line x1="210" y1="120" x2="210" y2="180" stroke="#4CAF50" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <text x="240" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#E53935">4</text>
  <text x="280" y="153" font-size="11" font-weight="bold" fill="#FF9800">4</text>
  <text x="240" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#2196F3">4</text>
  <text x="202" y="153" font-size="11" font-weight="bold" fill="#4CAF50">4</text>
  <text x="240" y="213" text-anchor="middle" font-size="13" font-weight="bold" fill="#004D40">P=16</text>
  <rect x="310" y="125" width="120" height="50" fill="#FFF3E0" stroke="#E65100" stroke-width="3"/>
  <line x1="310" y1="125" x2="430" y2="125" stroke="#E53935" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <line x1="430" y1="125" x2="430" y2="175" stroke="#FF9800" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <line x1="310" y1="175" x2="430" y2="175" stroke="#2196F3" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <line x1="310" y1="125" x2="310" y2="175" stroke="#4CAF50" stroke-width="2" class="t" stroke-dasharray="6,4"/>
  <text x="370" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#E53935">8</text>
  <text x="440" y="153" font-size="11" font-weight="bold" fill="#FF9800">3</text>
  <text x="370" y="191" text-anchor="middle" font-size="11" font-weight="bold" fill="#2196F3">8</text>
  <text x="302" y="153" font-size="11" font-weight="bold" fill="#4CAF50">3</text>
  <text x="370" y="208" text-anchor="middle" font-size="13" font-weight="bold" fill="#004D40">P=22</text>
  <rect x="160" y="278" width="180" height="12" rx="3" fill="#FFD600" stroke="#F9A825" stroke-width="1"/>
  <circle cx="340" cy="284" r="7" fill="#F9A825" stroke="#E65100" stroke-width="1"/>
  <text x="250" y="318" text-anchor="middle" font-size="14" font-weight="bold" fill="#004D40">P = сумма длин всех сторон</text>
  <text x="250" y="338" text-anchor="middle" font-size="10" fill="#00695C">5+5+6=16 | 4×4=16 | 8+3+8+3=22</text>
</svg>