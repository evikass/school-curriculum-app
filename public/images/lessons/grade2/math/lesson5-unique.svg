<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <title>Вычитание двузначных чисел</title>
  <defs><style>@keyframes f{0%{transform:translateY(0)}100%{transform:translateY(30px)}}.fa{animation:f 2s ease-in infinite alternate}</style></defs>
  <rect width="500" height="350" fill="#FFF3E0" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold" fill="#BF360C">Вычитание двузначных чисел</text>
  <rect x="0" y="30" width="500" height="140" fill="#FFE0B2"/>
  <rect x="0" y="280" width="500" height="70" fill="#8D6E63"/>
  <!-- Trunk -->
  <path d="M222,280 L226,140 L234,130 L246,130 L254,140 L258,280 Z" fill="#6D4C41"/>
  <path d="M226,200 Q190,180 170,160" stroke="#6D4C41" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M254,190 Q290,170 310,155" stroke="#6D4C41" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Foliage -->
  <ellipse cx="200" cy="110" rx="55" ry="45" fill="#FF8A65"/>
  <ellipse cx="250" cy="90" rx="60" ry="50" fill="#FF7043"/>
  <ellipse cx="300" cy="105" rx="50" ry="42" fill="#FF8A65"/>
  <ellipse cx="240" cy="75" rx="45" ry="35" fill="#FFAB91"/>
  <!-- Apples on tree -->
  <g fill="#E53935">
    <circle cx="185" cy="95" r="5"/><circle cx="210" cy="80" r="5"/><circle cx="230" cy="70" r="5"/>
    <circle cx="250" cy="75" r="5"/><circle cx="270" cy="80" r="5"/><circle cx="290" cy="90" r="5"/>
    <circle cx="195" cy="115" r="5"/><circle cx="215" cy="105" r="5"/><circle cx="235" cy="95" r="5"/>
    <circle cx="255" cy="90" r="5"/><circle cx="275" cy="100" r="5"/><circle cx="310" cy="100" r="5"/>
    <circle cx="175" cy="125" r="4.5"/><circle cx="200" cy="130" r="4.5"/><circle cx="225" cy="120" r="4.5"/>
    <circle cx="245" cy="115" r="4.5"/><circle cx="265" cy="110" r="4.5"/><circle cx="285" cy="115" r="4.5"/>
    <circle cx="325" cy="120" r="4.5"/><circle cx="190" cy="140" r="4"/><circle cx="210" cy="135" r="4"/>
    <circle cx="240" cy="130" r="4"/><circle cx="260" cy="125" r="4"/><circle cx="300" cy="130" r="4"/>
    <circle cx="250" cy="60" r="4"/><circle cx="220" cy="65" r="4"/><circle cx="280" cy="65" r="4"/>
    <circle cx="165" cy="140" r="3.5"/><circle cx="315" cy="135" r="3.5"/><circle cx="300" cy="115" r="4"/>
    <circle cx="230" cy="140" r="3.5"/><circle cx="175" cy="135" r="3.5"/><circle cx="270" cy="130" r="3.5"/>
  </g>
  <!-- Falling -->
  <g class="fa" fill="#E53935"><circle cx="195" cy="175" r="5"/><circle cx="260" cy="185" r="5"/><circle cx="310" cy="170" r="4.5"/></g>
  <!-- Ground apples (12) -->
  <g fill="#C62828">
    <ellipse cx="140" cy="275" rx="6" ry="5"/><ellipse cx="155" cy="270" rx="5" ry="4"/>
    <ellipse cx="170" cy="278" rx="6" ry="5"/><ellipse cx="185" cy="272" rx="5" ry="4"/>
    <ellipse cx="200" cy="276" rx="6" ry="5"/><ellipse cx="215" cy="270" rx="5" ry="4"/>
    <ellipse cx="280" cy="274" rx="6" ry="5"/><ellipse cx="295" cy="278" rx="5" ry="4"/>
    <ellipse cx="310" cy="272" rx="6" ry="5"/><ellipse cx="325" cy="276" rx="5" ry="4"/>
    <ellipse cx="340" cy="270" rx="6" ry="5"/><ellipse cx="355" cy="275" rx="5" ry="4"/>
  </g>
  <text x="240" y="50" text-anchor="middle" font-size="18" font-weight="bold" fill="#BF360C">45</text>
  <text x="250" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">12 упало</text>
  <text x="250" y="335" text-anchor="middle" font-size="22" font-weight="bold" fill="#BF360C">45 − 12 = 33</text>
</svg>