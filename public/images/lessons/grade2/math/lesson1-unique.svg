<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <title>Образование чисел от 10 до 20</title>
  <defs><style>@keyframes w{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}.b{animation:w 2s ease-in-out infinite;transform-origin:155px 195px}</style></defs>
  <rect width="500" height="350" fill="#FFF8E1" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold" fill="#5D4037">Образование чисел от 10 до 20</text>
  <ellipse cx="250" cy="330" rx="240" ry="20" fill="#C8E6C9"/>
  <g transform="translate(20,60)">
    <g stroke="#8D6E63" stroke-width="5" stroke-linecap="round">
      <line x1="30" y1="40" x2="30" y2="210"/><line x1="42" y1="40" x2="42" y2="210"/>
      <line x1="54" y1="40" x2="54" y2="210"/><line x1="66" y1="40" x2="66" y2="210"/>
      <line x1="78" y1="40" x2="78" y2="210"/><line x1="90" y1="40" x2="90" y2="210"/>
      <line x1="102" y1="40" x2="102" y2="210"/><line x1="114" y1="40" x2="114" y2="210"/>
      <line x1="126" y1="40" x2="126" y2="210"/><line x1="138" y1="40" x2="138" y2="210"/>
    </g>
    <rect x="22" y="110" width="124" height="14" rx="4" fill="#E53935" opacity="0.85"/>
    <g class="b"><path d="M84,117 C70,95 55,100 65,117 C55,100 70,95 84,117" fill="#E53935"/><path d="M84,117 C98,95 113,100 103,117 C113,100 98,95 84,117" fill="#C62828"/><circle cx="84" cy="117" r="4" fill="#FFEB3B"/></g>
    <text x="84" y="240" text-anchor="middle" font-size="22" font-weight="bold" fill="#E53935">10</text>
  </g>
  <text x="230" y="170" text-anchor="middle" font-size="40" font-weight="bold" fill="#FF6F00">+</text>
  <g transform="translate(260,60)">
    <g stroke="#8D6E63" stroke-width="5" stroke-linecap="round">
      <line x1="20" y1="80" x2="20" y2="210"/><line x1="50" y1="80" x2="50" y2="210"/><line x1="80" y1="80" x2="80" y2="210"/>
    </g>
    <text x="50" y="240" text-anchor="middle" font-size="22" font-weight="bold" fill="#1565C0">3</text>
  </g>
  <text x="385" y="170" text-anchor="middle" font-size="40" font-weight="bold" fill="#FF6F00">=</text>
  <g transform="translate(410,80)">
    <g stroke="#8D6E63" stroke-width="4" stroke-linecap="round">
      <line x1="15" y1="40" x2="15" y2="80"/><line x1="27" y1="40" x2="27" y2="80"/>
      <line x1="39" y1="40" x2="39" y2="80"/><line x1="51" y1="40" x2="51" y2="80"/>
      <line x1="63" y1="40" x2="63" y2="80"/><line x1="15" y1="90" x2="15" y2="130"/>
      <line x1="27" y1="90" x2="27" y2="130"/><line x1="39" y1="90" x2="39" y2="130"/>
      <line x1="51" y1="90" x2="51" y2="130"/><line x1="63" y1="90" x2="63" y2="130"/>
      <line x1="20" y1="150" x2="20" y2="190"/><line x1="38" y1="150" x2="38" y2="190"/><line x1="56" y1="150" x2="56" y2="190"/>
    </g>
