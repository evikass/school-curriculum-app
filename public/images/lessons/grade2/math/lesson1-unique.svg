  <circle cx="470" cy="300" r="18" fill="#FFCC80"/>
  <circle cx="464" cy="296" r="2.5" fill="#333"/><circle cx="476" cy="296" r="2.5" fill="#333"/>
  <path d="M463,306 Q470,314 477,306" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
