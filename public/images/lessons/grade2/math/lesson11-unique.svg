<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <title>Решение задач</title>
  <defs><style>@keyframes t{0%,100%{opacity:1}50%{opacity:.5}}.th{animation:t 2s ease-in-out infinite}</style></defs>
  <rect width="500" height="350" fill="#E8EAF6" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold" fill="#1A237E">Решение задач</text>
  <rect x="0" y="30" width="500" height="230" fill="#1A237E"/>
  <g fill="#FFD600"><circle cx="40" cy="50" r="1.5"/><circle cx="90" cy="70" r="1"/><circle cx="150" cy="45" r="1.5"/><circle cx="350" cy="50" r="1.5"/><circle cx="420" cy="65" r="1"/><circle cx="460" cy="45" r="1.5"/><circle cx="70" cy="90" r="1"/><circle cx="380" cy="90" r="1"/></g>
  <circle cx="450" cy="60" r="25" fill="#FFF9C4"/><circle cx="440" cy="55" r="22" fill="#1A237E"/>
  <rect x="0" y="260" width="500" height="90" fill="#37474F"/>
  <!-- Detective child -->
  <g transform="translate(150,145)">
    <line x1="0" y1="30" x2="0" y2="75" stroke="#1565C0" stroke-width="4"/>
    <path d="M0,45 L-15,55 L-10,40" stroke="#1565C0" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0,45 L20,35 L25,20" stroke="#1565C0" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cy="18" r="18" fill="#FFCC80"/>
    <path d="M-18,12 Q-18,-5 -5,-8 Q5,-12 18,-5 Q20,5 18,12" fill="#5D4037"/>
    <rect x="-22" y="-2" width="44" height="8" rx="2" fill="#455A64"/>
    <rect x="-14" y="-14" width="28" height="14" rx="3" fill="#37474F"/>
    <circle cx="-6" cy="15" r="2.5" fill="#333"/><circle cx="6" cy="15" r="2.5" fill="#333"/>
    <path d="M-4,24 Q0,22 4,24" fill="none" stroke="#333" stroke-width="1.5"/>
    <circle cx="30" cy="12" r="10" fill="none" stroke="#FFD600" stroke-width="2.5"/>
    <line x1="37" y1="19" x2="45" y2="27" stroke="#FFD600" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="75" x2="-8" y2="105" stroke="#1565C0" stroke-width="3"/>
    <line x1="0" y1="75" x2="8" y2="105" stroke="#1565C0" stroke-width="3"/>
    <ellipse cx="-10" cy="108" rx="6" ry="3" fill="#D32F2F"/><ellipse cx="10" cy="108" rx="6" ry="3" fill="#D32F2F"/>
  </g>
  <!-- Thought: question mark -->
  <g class="th"><circle cx="260" cy="55" r="20" fill="#fff" opacity=".9" stroke="#BDBDBD" stroke-width="1"/><text x="260" y="63" text-anchor="middle" font-size="22" font-weight="bold" fill="#E53935">?</text></g>
  <circle cx="225" cy="80" r="4" fill="#fff" opacity=".7"/><circle cx="215" cy="95" r="6" fill="#fff" opacity=".8"/>
  <!-- Thought: coins -->
  <g class="th" style="animation-delay:.5s"><circle cx="335" cy="75" r="22" fill="#fff" opacity=".9" stroke="#BDBDBD" stroke-width="1"/><circle cx="328" cy="73" r="7" fill="#FFD600" stroke="#F9A825" stroke-width="1"/><circle cx="345" cy="79" r="6" fill="#FFD600" stroke="#F9A825" stroke-width="1"/></g>
  <circle cx="290" cy="105" r="3" fill="#fff" opacity=".6"/><circle cx="300" cy="115" r="5" fill="#fff" opacity=".7"/>
  <!-- Thought: apples -->
  <g class="th" style="animation-delay:1s"><circle cx="380" cy="125" r="22" fill="#fff" opacity=".9" stroke="#BDBDBD" stroke-width="1"/><circle cx="373" cy="120" r="7" fill="#E53935"/><circle cx="390" cy="128" r="6" fill="#E53935"/></g>
  <circle cx="320" cy="130" r="3" fill="#fff" opacity=".6"/>
  <!-- Thought: steps -->
  <g class="th" style="animation-delay:1.5s"><circle cx="410" cy="185" r="20" fill="#fff" opacity=".9" stroke="#BDBDBD" stroke-width="1"/><rect x="397" y="177" width="7" height="18" fill="#42A5F5"/><rect x="404" y="183" width="7" height="12" fill="#1E88E5"/><rect x="411" y="188" width="7" height="7" fill="#1565C0"/></g>
  <text x="250" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">Шаг за шагом к решению!</text>
  <text x="250" y="335" text-anchor="middle" font-size="12" fill="#B0BEC5">Условие → Вопрос → Решение → Ответ</text>
</svg>