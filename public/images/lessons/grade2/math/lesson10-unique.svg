<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <title>Деление на 2 и на 3</title>
  <rect width="500" height="350" fill="#F3E5F5" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-family="sans-serif" font-weight="bold" fill="#4A148C">Деление на 2 и на 3</text>
  <line x1="250" y1="40" x2="250" y2="280" stroke="#CE93D8" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="250" y="60" text-anchor="middle" font-size="14" fill="#4A148C">6 цветов</text>
  <g><circle cx="225" cy="75" r="5" fill="#E91E63"/><circle cx="237" cy="77" r="5" fill="#FF9800"/><circle cx="249" cy="75" r="5" fill="#9C27B0"/><circle cx="261" cy="77" r="5" fill="#FFD600"/><circle cx="273" cy="75" r="5" fill="#2196F3"/><circle cx="285" cy="77" r="5" fill="#4CAF50"/></g>
  <path d="M230,90 Q180,120 140,140" fill="none" stroke="#7B1FA2" stroke-width="1.5"/>
  <path d="M275,90 Q320,120 360,140" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <!-- Flower def -->
  <defs><g id="fl"><circle r="7.5" stroke-width="0"/><circle r="3" fill="#FFEB3B"/></g><g id="vs"><path d="M-12,30 L-15,70 Q0,78 15,70 L12,30 Z" fill="#4DD0E1" stroke="#00838F" stroke-width="1.5"/><rect x="-13" y="27" width="26" height="6" rx="2" fill="#00838F"/></g></defs>
  <text x="125" y="70" text-anchor="middle" font-size="18" font-weight="bold" fill="#7B1FA2">÷ 2</text>
  <!-- Vase 1 with 3 flowers -->
  <g transform="translate(60,180)">
    <use href="#vs"/>
    <line x1="-3" y1="30" x2="-8" y2="-15" stroke="#388E3C" stroke-width="2"/><line x1="3" y1="30" x2="8" y2="-10" stroke="#388E3C" stroke-width="2"/><line x1="0" y1="30" x2="0" y2="-20" stroke="#388E3C" stroke-width="2"/>
    <use href="#fl" x="-8" y="-18" fill="#E91E63"/><use href="#fl" x="8" y="-13" fill="#FF5722"/><use href="#fl" x="0" y="-23" fill="#FF9800"/>
  </g>
  <!-- Vase 2 with 3 flowers -->
  <g transform="translate(190,180)">
    <use href="#vs"/>
    <line x1="-3" y1="30" x2="-6" y2="-12" stroke="#388E3C" stroke-width="2"/><line x1="3" y1="30" x2="7" y2="-8" stroke="#388E3C" stroke-width="2"/><line x1="0" y1="30" x2="0" y2="-18" stroke="#388E3C" stroke-width="2"/>
    <use href="#fl" x="-6" y="-15" fill="#9C27B0"/><use href="#fl" x="7" y="-11" fill="#F44336"/><use href="#fl" x="0" y="-21" fill="#2196F3"/>
  </g>
  <text x="125" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="#7B1FA2">6 ÷ 2 = 3</text>
  <text x="375" y="70" text-anchor="middle" font-size="18" font-weight="bold" fill="#E65100">÷ 3</text>
  <!-- Small vases with 2 flowers each -->
  <defs><g id="sv"><path d="M-9,20 L-11,50 Q0,56 11,50 L9,20 Z" fill="#FFAB91" stroke="#E64A19" stroke-width="1.5"/></g></defs>
  <g transform="translate(290,195)"><use href="#sv"/><line x1="-2" y1="18" x2="-5" y2="-8" stroke="#388E3C" stroke-width="1.5"/><line x1="2" y1="18" x2="5" y2="-5" stroke="#388E3C" stroke-width="1.5"/><use href="#fl" x="-5" y="-11" fill="#FFD600"/><use href="#fl" x="5" y="-8" fill="#E040FB"/></g>
  <g transform="translate(375,195)"><use href="#sv"/><line x1="-2" y1="18" x2="-4" y2="-6" stroke="#388E3C" stroke-width="1.5"/><line x1="2" y1="18" x2="5" y2="-10" stroke="#388E3C" stroke-width="1.5"/><use href="#fl" x="-4" y="-9" fill="#00BCD4"/><use href="#fl" x="5" y="-13" fill="#FF5722"/></g>
  <g transform="translate(460,195)"><use href="#sv"/><line x1="-2" y1="18" x2="-4" y2="-10" stroke="#388E3C" stroke-width="1.5"/><line x1="2" y1="18" x2="4" y2="-6" stroke="#388E3C" stroke-width="1.5"/><use href="#fl" x="-4" y="-13" fill="#4CAF50"/><use href="#fl" x="4" y="-9" fill="#FF9800"/></g>
  <text x="375" y="270" text-anchor="middle" font-size="16" font-weight="bold" fill="#E65100">6 ÷ 3 = 2</text>
  <text x="250" y="320" text-anchor="middle" font-size="18" font-weight="bold" fill="#4A148C">Делим поровну!</text>
</svg>