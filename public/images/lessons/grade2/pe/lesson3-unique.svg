<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><style>.t{font:bold 17px sans-serif;fill:#fff;@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></defs>
  <rect width="500" height="350" rx="12" fill="#4a148c"/>
  <rect x="4" y="4" width="492" height="342" rx="10" fill="none" stroke="#ea80fc" stroke-width="1.5"/>
  <text x="250" y="26" text-anchor="middle" class="t">Акробатические упражнения</text>
  <!-- Gym mat -->
  <rect x="40" y="230" width="420" height="20" rx="4" fill="#4caf50"/>
  <rect x="45" y="233" width="410" height="14" rx="3" fill="#66bb6a"/>
  <line x1="100" y1="233" x2="100" y2="247" stroke="#43a047" stroke-width="1"/>
  <line x1="200" y1="233" x2="200" y2="247" stroke="#43a047" stroke-width="1"/>
  <line x1="300" y1="233" x2="300" y2="247" stroke="#43a047" stroke-width="1"/>
  <line x1="400" y1="233" x2="400" y2="247" stroke="#43a047" stroke-width="1"/>
  <!-- Cartwheel figure -->
  <g>
    <!-- Body at angle -->
    <line x1="130" y1="180" x2="180" y2="150" stroke="#ff9800" stroke-width="4" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="125" cy="185" r="14" fill="#ffccbc"/>
    <path d="M115,173 Q125,162 135,173" fill="#333"/>
    <ellipse cx="120" cy="183" rx="2" ry="2" fill="#333"/>
    <ellipse cx="131" cy="183" rx="2" ry="2" fill="#333"/>
    <!-- Top arm (on ground) -->
    <line x1="180" y1="150" x2="195" y2="228" stroke="#ff9800" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Bottom arm (up) -->
    <line x1="130" y1="180" x2="110" y2="130" stroke="#ff9800" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Top leg (on ground) -->
    <line x1="175" y1="152" x2="200" y2="230" stroke="#1565c0" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Bottom leg (up) -->
    <line x1="135" y1="175" x2="100" y2="120" stroke="#1565c0" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- Motion arc for cartwheel -->
  <path d="M110,230 Q90,140 200,110 Q270,95 280,230" stroke="#ea80fc" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.6"/>
  <text x="155" y="270" text-anchor="middle" font-size="10" fill="#ea80fc">Колесо</text>
  <!-- Somersault figure -->
  <g>
    <!-- Curled up body -->
    <circle cx="360" cy="195" r="14" fill="#ffe0b2"/>
    <path d="M350,183 Q360,172 370,183" fill="#333"/>
    <ellipse cx="355" cy="193" rx="2" ry="2" fill="#333"/>
    <ellipse cx="366" cy="193" rx="2" ry="2" fill="#333"/>
    <!-- Curled body -->
    <path d="M360,209 Q340,225 350,235 Q370,245 380,225 Q390,210 370,200" stroke="#e53935" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Arms hugging knees -->
    <path d="M355,205 Q345,215 355,220" stroke="#e53935" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M370,205 Q380,215 370,220" stroke="#e53935" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <circle cx="350" cy="238" r="5" fill="#333"/>
  </g>
  <!-- Roll arrows -->
  <path d="M320,210 Q330,180 350,175 Q370,170 390,180 Q400,190 390,200" stroke="#ea80fc" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.6"/>
  <text x="360" y="270" text-anchor="middle" font-size="10" fill="#ea80fc">Кувырок</text>
  <!-- Achievement stars -->
  <polygon points="60,70 63,80 73,80 65,86 68,96 60,90 52,96 55,86 47,80 57,80" fill="#ffd700"/>
  <polygon points="440,55 443,65 453,65 445,71 448,81 440,75 432,81 435,71 427,65 437,65" fill="#ffd700"/>
  <polygon points="250,50 252,56 258,56 253,60 255,66 250,62 245,66 247,60 242,56 248,56" fill="#ffd700" opacity="0.7"/>
  <!-- Small sparkle -->
  <polygon points="150,55 151,58 154,58 152,60 153,63 150,61 147,63 148,60 146,58 149,58" fill="#ffd700" opacity="0.5"/>
  <polygon points="320,45 321,48 324,48 322,50 323,53 320,51 317,53 318,50 316,48 319,48" fill="#ffd700" opacity="0.5"/>
</svg>