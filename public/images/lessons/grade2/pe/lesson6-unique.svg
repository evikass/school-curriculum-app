<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><style>@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}</style></defs>
  <rect width="500" height="350" rx="12" fill="#1b5e20"/>
  <rect x="4" y="4" width="492" height="342" rx="10" fill="none" stroke="#69f0ae" stroke-width="1.5"/>
  <text x="250" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">Прыжки</text>
  <!-- Field -->
  <rect x="0" y="240" width="500" height="110" fill="#2e7d32" opacity="0.4"/>
  <line x1="0" y1="240" x2="500" y2="240" stroke="#4caf50" stroke-width="1"/>
  <!-- Hurdle -->
  <rect x="130" y="175" width="4" height="65" rx="1" fill="#fff"/>
  <rect x="180" y="175" width="4" height="65" rx="1" fill="#fff"/>
  <rect x="125" y="173" width="64" height="6" rx="2" fill="#e53935"/>
  <rect x="125" y="195" width="64" height="3" rx="1" fill="#fff" opacity="0.6"/>
  <!-- Figure over hurdle -->
  <g>
    <circle cx="155" cy="115" r="14" fill="#ffccbc"/>
    <path d="M145,103 Q155,90 165,103" fill="#333"/>
    <ellipse cx="149" cy="113" rx="2" ry="2.5" fill="#333"/>
    <ellipse cx="161" cy="113" rx="2" ry="2.5" fill="#333"/>
    <path d="M155,129 Q150,155 155,175" stroke="#ff9800" stroke-width="4" fill="none" stroke-linecap="round"/>
    <line x1="152" y1="140" x2="125" y2="155" stroke="#ff9800" stroke-width="3" stroke-linecap="round"/>
    <line x1="152" y1="140" x2="180" y2="135" stroke="#ff9800" stroke-width="3" stroke-linecap="round"/>
    <path d="M155,175 Q140,190 135,185" stroke="#1565c0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M155,175 Q170,185 175,178" stroke="#1565c0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Jump arc -->
  <path d="M100,230 Q130,100 190,230" stroke="#69f0ae" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="155" y="280" text-anchor="middle" font-size="10" fill="#69f0ae">Барьер</text>
  <!-- Sand pit -->
  <rect x="300" y="220" width="170" height="30" rx="4" fill="#ffe082"/>
  <rect x="305" y="223" width="160" height="24" rx="3" fill="#ffcc02" opacity="0.5"/>
  <!-- Take-off board -->
  <rect x="280" y="220" width="10" height="30" rx="1" fill="#fff"/>
  <!-- Long jump figure -->
  <g>
    <circle cx="340" cy="145" r="14" fill="#ffe0b2"/>
    <path d="M330,133 Q340,120 350,133" fill="#333"/>
    <ellipse cx="334" cy="143" rx="2" ry="2.5" fill="#333"/>
    <ellipse cx="346" cy="143" rx="2" ry="2.5" fill="#333"/>
    <line x1="340" y1="159" x2="335" y2="200" stroke="#8e24aa" stroke-width="4" stroke-linecap="round"/>
    <line x1="338" y1="170" x2="310" y2="158" stroke="#8e24aa" stroke-width="3" stroke-linecap="round"/>
    <line x1="338" y1="170" x2="365" y2="160" stroke="#8e24aa" stroke-width="3" stroke-linecap="round"/>
    <path d="M335,200 Q310,210 300,215" stroke="#1565c0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M335,200 Q350,210 360,212" stroke="#1565c0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Long jump arc -->
  <path d="M250,235 Q290,110 380,225" stroke="#69f0ae" stroke-width="1.5" fill="none" stroke-dasharray="5,4" opacity="0.5"/>
  <text x="385" y="270" text-anchor="middle" font-size="10" fill="#69f0ae">Прыжок в длину</text>
</svg>