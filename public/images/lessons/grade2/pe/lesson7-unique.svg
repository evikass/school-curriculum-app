<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><style>.t{font:bold 17px sans-serif;fill:#fff;@keyframes fly{0%{opacity:1}100%{opacity:0.3}}</style></defs>
  <rect width="500" height="350" rx="12" fill="#263238"/>
  <rect x="4" y="4" width="492" height="342" rx="10" fill="none" stroke="#ff7043" stroke-width="1.5"/>
  <text x="250" y="26" text-anchor="middle" class="t">Метание</text>
  <!-- Ground -->
  <rect x="0" y="260" width="500" height="90" fill="#33691e" opacity="0.4"/>
  <line x1="0" y1="260" x2="500" y2="260" stroke="#4caf50" stroke-width="1"/>
  <!-- Wall with target -->
  <rect x="380" y="80" width="15" height="180" rx="2" fill="#78909c"/>
  <rect x="385" y="85" width="8" height="170" fill="#90a4ae"/>
  <!-- Target on wall -->
  <circle cx="395" cy="155" r="35" fill="#f44336"/>
  <circle cx="395" cy="155" r="26" fill="#fff"/>
  <circle cx="395" cy="155" r="17" fill="#f44336"/>
  <circle cx="395" cy="155" r="8" fill="#fff"/>
  <circle cx="395" cy="155" r="3" fill="#f44336"/>
  <!-- Figure throwing ball -->
  <g>
    <circle cx="120" cy="150" r="16" fill="#ffccbc"/>
    <path d="M110,138 Q120,125 130,138" fill="#333"/>
    <ellipse cx="114" cy="148" rx="2" ry="2.5" fill="#333"/>
    <ellipse cx="126" cy="148" rx="2" ry="2.5" fill="#333"/>
    <!-- Body -->
    <line x1="120" y1="166" x2="120" y2="225" stroke="#1e88e5" stroke-width="4" stroke-linecap="round"/>
    <!-- Throwing arm extended back -->
    <path d="M120,180 Q100,165 85,150 Q75,140 70,135" stroke="#1e88e5" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Other arm forward -->
    <line x1="120" y1="180" x2="140" y2="195" stroke="#1e88e5" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Legs in throwing stance -->
    <line x1="120" y1="225" x2="100" y2="258" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="120" y1="225" x2="145" y2="255" stroke="#333" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <!-- Ball -->
  <circle cx="68" cy="132" r="8" fill="#ff9800"/>
  <ellipse cx="65" cy="128" rx="2" ry="1.5" fill="#ffb74d" opacity="0.6"/>
  <!-- Trajectory arc (dotted) -->
  <path d="M68,132 Q150,60 250,80 Q330,95 390,155" stroke="#ff7043" stroke-width="2" fill="none" stroke-dasharray="6,4">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <!-- Ball positions along trajectory -->
  <circle cx="150" cy="62" r="6" fill="#ff9800" opacity="0.5"/>
  <circle cx="250" cy="80" r="6" fill="#ff9800" opacity="0.35"/>
  <circle cx="330" cy="97" r="6" fill="#ff9800" opacity="0.2"/>
  <!-- Impact stars on target -->
  <polygon points="395,120 397,126 403,126 398,130 400,136 395,132 390,136 392,130 387,126 393,126" fill="#ffd700" opacity="0.8"/>
  <!-- Distance line -->
  <line x1="130" y1="275" x2="385" y2="275" stroke="#ff7043" stroke-width="1" opacity="0.4"/>
  <text x="250" y="290" text-anchor="middle" font-size="10" fill="#ff7043" opacity="0.6">расстояние</text>
</svg>