<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><style>@keyframes dash{to{stroke-dashoffset:-20}}</style></defs>
  <rect width="500" height="350" rx="12" fill="#e65100"/>
  <rect x="4" y="4" width="492" height="342" rx="10" fill="none" stroke="#ffab40" stroke-width="1.5"/>
  <text x="250" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#fff">Беговые упражнения</text>
  <!-- Track -->
  <rect x="30" y="120" width="440" height="180" rx="40" fill="#d84315"/>
  <rect x="40" y="130" width="420" height="160" rx="35" fill="#bf360c"/>
  <!-- Lanes -->
  <rect x="50" y="140" width="400" height="30" rx="15" fill="#e65100" opacity="0.6"/>
  <rect x="50" y="175" width="400" height="30" rx="15" fill="#bf360c" opacity="0.6"/>
  <rect x="50" y="210" width="400" height="30" rx="15" fill="#e65100" opacity="0.6"/>
  <rect x="50" y="245" width="400" height="30" rx="15" fill="#bf360c" opacity="0.6"/>
  <g stroke="#fff" stroke-width="0.5" opacity="0.3">
    <line x1="55" y1="170" x2="445" y2="170"/><line x1="55" y1="205" x2="445" y2="205"/>
    <line x1="55" y1="240" x2="445" y2="240"/>
  </g>
  <!-- Start line -->
  <line x1="80" y1="130" x2="80" y2="300" stroke="#fff" stroke-width="2"/>
  <rect x="75" y="130" width="10" height="5" fill="#000"/><rect x="75" y="135" width="10" height="5" fill="#fff"/>
  <rect x="75" y="140" width="10" height="5" fill="#000"/><rect x="75" y="145" width="10" height="5" fill="#fff"/>
  <!-- Runner 1 -->
  <circle cx="200" cy="155" r="12" fill="#ffccbc"/>
  <path d="M192,145 Q200,135 208,145" fill="#333"/>
  <line x1="200" y1="167" x2="200" y2="205" stroke="#1565c0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="200" y1="178" x2="185" y2="190" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="178" x2="215" y2="168" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="205" x2="185" y2="222" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="205" x2="220" y2="218" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <g stroke="#ffab40" stroke-width="1.5" opacity="0.6">
    <line x1="175" y1="180" x2="155" y2="180"/><line x1="175" y1="195" x2="150" y2="195"/>
  </g>
  <!-- Runner 2 -->
  <circle cx="160" cy="192" r="12" fill="#ffe0b2"/>
  <path d="M152,182 Q160,172 168,182" fill="#333"/>
  <line x1="160" y1="204" x2="160" y2="240" stroke="#e53935" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="160" y1="215" x2="145" y2="225" stroke="#e53935" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="215" x2="175" y2="208" stroke="#e53935" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="240" x2="145" y2="258" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="240" x2="178" y2="253" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <g stroke="#ffab40" stroke-width="1.5" opacity="0.6">
    <line x1="135" y1="218" x2="115" y2="218"/><line x1="135" y1="232" x2="110" y2="232"/>
  </g>
  <!-- Runner 3 -->
  <circle cx="250" cy="227" r="12" fill="#ffccbc"/>
  <path d="M242,217 Q250,207 258,217" fill="#333"/>
  <line x1="250" y1="239" x2="250" y2="275" stroke="#43a047" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="250" y1="250" x2="235" y2="260" stroke="#43a047" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="250" x2="265" y2="242" stroke="#43a047" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="275" x2="235" y2="292" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="275" x2="268" y2="288" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="225" y1="253" x2="205" y2="253" stroke="#ffab40" stroke-width="1.5" opacity="0.6"/>
  <!-- Animated dashes -->
  <line x1="50" y1="300" x2="450" y2="300" stroke="#fff" stroke-width="1" stroke-dasharray="8,6" opacity="0.2">
    <animate attributeName="stroke-dashoffset" from="0" to="-20" dur="1s" repeatCount="indefinite"/>
  </line>
</svg>