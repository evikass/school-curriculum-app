<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#E3F2FD" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#0D47A1">Оригами «Голубь»</text>
  <!-- Step 1: Square paper -->
  <g>
    <rect x="30" y="70" width="65" height="65" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="2" rx="1"/>
    <line x1="30" y1="70" x2="95" y2="135" stroke="#5C6BC0" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="95" y1="70" x2="30" y2="135" stroke="#5C6BC0" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="62" y="155" text-anchor="middle" font-size="10" fill="#3949AB" font-family="sans-serif">1. Квадрат</text>
  </g>
  <!-- Arrow -->
  <path d="M105,102 L130,102" stroke="#FF9800" stroke-width="2.5"/>
  <polygon points="128,97 138,102 128,107" fill="#FF9800"/>
  <!-- Step 2: Triangle -->
  <g>
    <polygon points="165,135 230,135 197,70" fill="#C5CAE9" stroke="#5C6BC0" stroke-width="2"/>
    <line x1="197" y1="70" x2="197" y2="135" stroke="#5C6BC0" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="197" y="155" text-anchor="middle" font-size="10" fill="#3949AB" font-family="sans-serif">2. Треугольник</text>
  </g>
  <!-- Arrow -->
  <path d="M240,102 L265,102" stroke="#FF9800" stroke-width="2.5"/>
  <polygon points="263,97 273,102 263,107" fill="#FF9800"/>
  <!-- Step 3: Diamond shape -->
  <g>
    <polygon points="305,70 340,102 305,135 270,102" fill="#9FA8DA" stroke="#5C6BC0" stroke-width="2"/>
    <line x1="305" y1="70" x2="305" y2="135" stroke="#5C6BC0" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="270" y1="102" x2="340" y2="102" stroke="#5C6BC0" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="305" y="155" text-anchor="middle" font-size="10" fill="#3949AB" font-family="sans-serif">3. Ромб</text>
  </g>
  <!-- Arrow -->
  <path d="M350,102 L375,102" stroke="#FF9800" stroke-width="2.5"/>
  <polygon points="373,97 383,102 373,107" fill="#FF9800"/>
  <!-- Step 4: Dove/bird -->
  <g>
    <path d="M420,120 L450,95 L460,80 L455,100 L480,105 L455,108 L450,120 L420,120Z" fill="#7986CB" stroke="#3F51B5" stroke-width="2"/>
    <ellipse cx="440" cy="128" rx="22" ry="14" fill="#7986CB" stroke="#3F51B5" stroke-width="2"/>
    <!-- Wing -->
    <path d="M425,122 Q415,100 430,90 Q440,95 445,110Z" fill="#9FA8DA" stroke="#5C6BC0" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M462,125 L485,135 L460,130Z" fill="#5C6BC0" stroke="#3F51B5" stroke-width="1"/>
    <!-- Eye -->
    <circle cx="448" cy="100" r="2.5" fill="#1A237E"/>
    <!-- Beak -->
    <polygon points="455,100 465,97 455,95" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
    <text x="445" y="155" text-anchor="middle" font-size="10" fill="#3949AB" font-family="sans-serif">4. Голубь!</text>
  </g>
  <!-- Large finished dove at bottom -->
  <g transform="translate(250,250) scale(1.5)">
    <path d="M0,-5 L15,-22 L20,-30 L17,-18 L30,-15 L17,-12 L15,-5 L0,-5Z" fill="#9FA8DA" stroke="#3F51B5" stroke-width="1.5"/>
    <ellipse cx="8" cy="3" rx="15" ry="9" fill="#9FA8DA" stroke="#3F51B5" stroke-width="1.5"/>
    <path d="M-5,0 Q-15,-15 -2,-22 Q5,-15 8,-5Z" fill="#C5CAE9" stroke="#5C6BC0" stroke-width="1"/>
    <path d="M23,5 L38,12 L22,8Z" fill="#5C6BC0" stroke="#3F51B5" stroke-width="1"/>
    <circle cx="13" cy="-18" r="2" fill="#1A237E"/>
    <polygon points="17,-18 24,-21 17,-22" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  </g>
  <!-- Fold lines decoration -->
  <path d="M50,175 Q150,165 250,175 Q350,185 450,175" stroke="#C5CAE9" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
</svg>