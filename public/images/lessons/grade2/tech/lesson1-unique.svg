<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><style>@keyframes fold{0%,100%{transform:rotate(0deg)}50%{transform:rotate(5deg)}}</style></defs>
  <rect width="500" height="350" fill="#FFFDE7" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#F57F17">Свойства бумаги</text>
  <!-- Flat paper -->
  <g>
    <rect x="30" y="100" width="80" height="110" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="2" rx="1"/>
    <line x1="40" y1="130" x2="100" y2="130" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="40" y1="145" x2="100" y2="145" stroke="#E0E0E0" stroke-width="1"/>
    <line x1="40" y1="160" x2="100" y2="160" stroke="#E0E0E0" stroke-width="1"/>
    <text x="70" y="230" text-anchor="middle" font-size="11" fill="#795548" font-family="sans-serif">бумага</text>
  </g>
  <!-- Arrow 1 -->
  <path d="M120,155 L150,155" stroke="#FF9800" stroke-width="2.5"/>
  <polygon points="148,150 158,155 148,160" fill="#FF9800"/>
  <!-- Folded paper -->
  <g>
    <polygon points="170,100 250,100 250,155 210,155 210,210 170,210" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="2"/>
    <polygon points="250,100 250,155 210,155" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="2"/>
    <line x1="210" y1="155" x2="250" y2="155" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="215" y="230" text-anchor="middle" font-size="11" fill="#795548" font-family="sans-serif">складывается</text>
  </g>
  <!-- Arrow 2 -->
  <path d="M260,155 L290,155" stroke="#FF9800" stroke-width="2.5"/>
  <polygon points="288,150 298,155 288,160" fill="#FF9800"/>
  <!-- Crumpled paper -->
  <g>
    <path d="M310,110 Q320,100 340,105 Q360,95 370,110 Q385,105 380,120 Q390,130 375,140 Q385,155 370,160 Q375,175 355,170 Q340,180 325,170 Q310,175 310,160 Q295,155 305,140 Q295,130 310,120Z" fill="#EEEEEE" stroke="#BDBDBD" stroke-width="2"/>
    <path d="M325,120 Q335,125 340,118" stroke="#BDBDBD" stroke-width="1" fill="none"/>
    <path d="M350,135 Q355,145 360,138" stroke="#BDBDBD" stroke-width="1" fill="none"/>
    <text x="345" y="200" text-anchor="middle" font-size="11" fill="#795548" font-family="sans-serif">сминается</text>
  </g>
  <!-- Arrow 3 -->
  <path d="M390,155 L420,155" stroke="#FF9800" stroke-width="2.5"/>
  <polygon points="418,150 428,155 418,160" fill="#FF9800"/>
  <!-- Cut paper with scissors -->
  <g>
    <path d="M440,100 L480,100 L480,155 L465,155 L465,210 L440,210Z" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="2"/>
    <path d="M465,155 L480,155 L480,180 L465,180Z" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1"/>
    <!-- Scissors -->
    <circle cx="458" cy="160" r="7" fill="none" stroke="#F44336" stroke-width="2.5"/>
    <circle cx="478" cy="160" r="7" fill="none" stroke="#F44336" stroke-width="2.5"/>
    <line x1="455" y1="166" x2="465" y2="195" stroke="#F44336" stroke-width="2.5"/>
    <line x1="481" y1="166" x2="475" y2="195" stroke="#F44336" stroke-width="2.5"/>
    <text x="455" y="230" text-anchor="middle" font-size="11" fill="#795548" font-family="sans-serif">режется</text>
  </g>
  <!-- Hands at bottom -->
  <g opacity="0.5">
    <!-- Left hand holding flat paper -->
    <path d="M50,210 Q45,215 50,220 L55,215 Q60,210 50,210Z" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
    <!-- Right hand with scissors -->
    <path d="M470,190 Q475,185 480,190 L475,195 Q470,200 470,190Z" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  </g>
  <text x="250" y="290" text-anchor="middle" font-size="12" fill="#F57F17" font-family="sans-serif">Бумага мнётся, складывается, режется</text>
  <text x="250" y="310" text-anchor="middle" font-size="11" fill="#9E9E9E" font-family="sans-serif">она лёгкая и тонкая</text>
</svg>