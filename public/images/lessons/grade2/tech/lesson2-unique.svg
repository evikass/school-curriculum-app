<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F1F8E9" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#33691E">Аппликация «Цветы»</text>
  <!-- Background paper -->
  <rect x="50" y="55" width="250" height="260" fill="#FFFDE7" stroke="#F9A825" stroke-width="1.5" rx="3"/>
  <!-- Stem -->
  <path d="M175,270 Q172,220 175,170" stroke="#4CAF50" stroke-width="5" stroke-linecap="round"/>
  <!-- Leaves -->
  <path d="M175,220 Q145,210 130,230 Q150,230 175,220Z" fill="#66BB6A" stroke="#388E3C" stroke-width="1.5"/>
  <path d="M175,200 Q205,190 220,210 Q200,210 175,200Z" fill="#66BB6A" stroke="#388E3C" stroke-width="1.5"/>
  <!-- Flower petals (layered paper pieces) -->
  <ellipse cx="175" cy="140" rx="18" ry="30" fill="#F44336" stroke="#C62828" stroke-width="1.5" transform="rotate(0,175,170)"/>
  <ellipse cx="175" cy="140" rx="18" ry="30" fill="#E91E63" stroke="#AD1457" stroke-width="1.5" transform="rotate(60,175,170)"/>
  <ellipse cx="175" cy="140" rx="18" ry="30" fill="#FF5722" stroke="#D84315" stroke-width="1.5" transform="rotate(120,175,170)"/>
  <ellipse cx="175" cy="140" rx="18" ry="30" fill="#FF9800" stroke="#E65100" stroke-width="1.5" transform="rotate(180,175,170)"/>
  <ellipse cx="175" cy="140" rx="18" ry="30" fill="#FFEB3B" stroke="#F9A825" stroke-width="1.5" transform="rotate(240,175,170)"/>
  <ellipse cx="175" cy="140" rx="18" ry="30" fill="#FFC107" stroke="#FF8F00" stroke-width="1.5" transform="rotate(300,175,170)"/>
  <!-- Flower center -->
  <circle cx="175" cy="170" r="14" fill="#FFEB3B" stroke="#F9A825" stroke-width="2"/>
  <circle cx="172" cy="167" r="3" fill="#FF8F00"/>
  <circle cx="178" cy="167" r="3" fill="#FF8F00"/>
  <path d="M172,174 Q175,177 178,174" stroke="#FF8F00" stroke-width="1.2" fill="none"/>
  <!-- Second small flower -->
  <path d="M130,260 Q128,250 130,240" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
  <circle cx="130" cy="232" r="10" fill="#E91E63" stroke="#AD1457" stroke-width="1.5"/>
  <circle cx="125" cy="228" r="6" fill="#F48FB1" stroke="#EC407A" stroke-width="1"/>
  <circle cx="135" cy="228" r="6" fill="#F48FB1" stroke="#EC407A" stroke-width="1"/>
  <circle cx="130" cy="235" r="6" fill="#F48FB1" stroke="#EC407A" stroke-width="1"/>
  <circle cx="130" cy="232" r="5" fill="#FFEB3B" stroke="#F9A825" stroke-width="1"/>
  <!-- Scissors on the right -->
  <g transform="translate(370,100) rotate(-20)">
    <ellipse cx="0" cy="30" rx="10" ry="14" fill="none" stroke="#78909C" stroke-width="3"/>
    <ellipse cx="0" cy="-10" rx="10" ry="14" fill="none" stroke="#78909C" stroke-width="3"/>
    <line x1="-3" y1="16" x2="8" y2="-25" stroke="#78909C" stroke-width="3"/>
    <line x1="3" y1="16" x2="-8" y2="-25" stroke="#78909C" stroke-width="3"/>
  </g>
  <!-- Glue stick -->
  <g transform="translate(380,200)">
    <rect x="-12" y="0" width="24" height="55" fill="#42A5F5" stroke="#1565C0" stroke-width="2" rx="4"/>
    <rect x="-10" y="5" width="20" height="15" fill="#64B5F6" rx="2"/>
    <rect x="-8" y="-8" width="16" height="10" fill="#BDBDBD" stroke="#9E9E9E" stroke-width="1" rx="2"/>
    <text x="0" y="38" text-anchor="middle" font-size="7" fill="#fff" font-family="sans-serif">КЛЕЙ</text>
  </g>
  <!-- Paper scraps -->
  <rect x="340" y="170" width="20" height="15" fill="#F44336" opacity="0.7" transform="rotate(15,350,177)" rx="1"/>
  <rect x="365" y="155" width="18" height="13" fill="#FFEB3B" opacity="0.7" transform="rotate(-10,374,161)" rx="1"/>
  <rect x="345" y="280" width="22" height="16" fill="#4CAF50" opacity="0.7" transform="rotate(5,356,288)" rx="1"/>
  <!-- Label -->
  <text x="250" y="340" text-anchor="middle" font-size="11" fill="#33691E" font-family="sans-serif">Вырежи детали и наклей на бумагу</text>
</svg>