<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#FBE9E7" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#BF360C">Объёмные поделки</text>
  <!-- Table surface -->
  <rect x="20" y="260" width="460" height="15" fill="#8D6E63" stroke="#5D4037" stroke-width="2" rx="3"/>
  <rect x="25" y="275" width="450" height="5" fill="#6D4C41" rx="2"/>
  <!-- Cube -->
  <g transform="translate(100,180)">
    <!-- Front face -->
    <polygon points="0,60 60,60 60,0 0,0" fill="#42A5F5" stroke="#1565C0" stroke-width="2"/>
    <!-- Top face -->
    <polygon points="0,0 30,-25 90,-25 60,0" fill="#64B5F6" stroke="#1565C0" stroke-width="2"/>
    <!-- Right face -->
    <polygon points="60,0 90,-25 90,35 60,60" fill="#1E88E5" stroke="#1565C0" stroke-width="2"/>
    <!-- Fold lines -->
    <line x1="0" y1="0" x2="30" y2="-25" stroke="#90CAF9" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="45" y="85" text-anchor="middle" font-size="11" fill="#1565C0" font-family="sans-serif">куб</text>
  </g>
  <!-- Cylinder -->
  <g transform="translate(240,140)">
    <!-- Body -->
    <rect x="0" y="20" width="60" height="80" fill="#66BB6A" stroke="#2E7D32" stroke-width="2"/>
    <!-- Top ellipse -->
    <ellipse cx="30" cy="20" rx="30" ry="12" fill="#81C784" stroke="#2E7D32" stroke-width="2"/>
    <!-- Bottom ellipse (visible part) -->
    <path d="M0,100 Q15,112 30,100 Q45,112 60,100" fill="#4CAF50" stroke="#2E7D32" stroke-width="2"/>
    <!-- Shading -->
    <rect x="45" y="22" width="12" height="76" fill="#4CAF50" opacity="0.4" rx="1"/>
    <text x="30" y="130" text-anchor="middle" font-size="11" fill="#2E7D32" font-family="sans-serif">цилиндр</text>
  </g>
  <!-- Cone -->
  <g transform="translate(390,120)">
    <!-- Body -->
    <polygon points="35,-15 0,100 70,100" fill="#FF7043" stroke="#D84315" stroke-width="2"/>
    <!-- Bottom ellipse -->
    <ellipse cx="35" cy="100" rx="35" ry="12" fill="#FF8A65" stroke="#D84315" stroke-width="2"/>
    <!-- Shading -->
    <path d="M35,-15 L55,100 Q60,94 65,100 L35,-15Z" fill="#E64A19" opacity="0.3"/>
    <text x="35" y="130" text-anchor="middle" font-size="11" fill="#D84315" font-family="sans-serif">конус</text>
  </g>
  <!-- Scissors in corner -->
  <g transform="translate(430,55) rotate(15)">
    <circle cx="-5" cy="10" r="6" fill="none" stroke="#78909C" stroke-width="2"/>
    <circle cx="5" cy="10" r="6" fill="none" stroke="#78909C" stroke-width="2"/>
    <line x1="-3" y1="4" x2="3" y2="-18" stroke="#78909C" stroke-width="2"/>
    <line x1="3" y1="4" x2="-3" y2="-18" stroke="#78909C" stroke-width="2"/>
  </g>
  <!-- Small paper pieces -->
  <rect x="30" y="285" width="15" height="12" fill="#42A5F5" opacity="0.5" transform="rotate(-8,37,291)" rx="1"/>
  <rect x="55" y="288" width="12" height="10" fill="#66BB6A" opacity="0.5" transform="rotate(5,61,293)" rx="1"/>
  <rect x="420" y="287" width="14" height="11" fill="#FF7043" opacity="0.5" transform="rotate(-3,427,292)" rx="1"/>
  <text x="250" y="320" text-anchor="middle" font-size="11" fill="#BF360C" font-family="sans-serif">Из бумаги можно сделать объёмные фигуры</text>
</svg>