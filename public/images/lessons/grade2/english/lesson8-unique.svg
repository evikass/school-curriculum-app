  <rect x="86" y="238" width="24" height="27" rx="3" fill="#2196F3" stroke="#1565C0" stroke-width="1"/>
  <text x="98" y="257" text-anchor="middle" font-size="13" font-family="Arial" fill="#fff" font-weight="bold">2</text>
  <rect x="117" y="236" width="24" height="29" rx="3" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
