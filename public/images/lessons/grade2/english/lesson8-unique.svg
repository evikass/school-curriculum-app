  <rect x="180" y="235" width="26" height="30" rx="3" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
  <text x="193" y="256" text-anchor="middle" font-size="13" font-family="Arial" fill="#fff" font-weight="bold">5</text>
