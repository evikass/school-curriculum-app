    <text x="170" y="100">14</text><text x="206" y="100">15</text><text x="242" y="100">16</text>
    <text x="278" y="100">17</text><text x="314" y="100">18</text><text x="350" y="100">19</text>
    <text x="382" y="100">20</text>
  </g>
  <line x1="58" y1="110" x2="442" y2="110" stroke="#81C784" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="250" y="180" text-anchor="middle" font-size="13" font-family="Arial" fill="#A5D6A7" font-style="italic">Count to 20!</text>
  <rect x="0" y="276" width="500" height="74" fill="#D7CCC8"/>
  <rect x="0" y="272" width="500" height="6" fill="#8D6E63"/>
  <rect x="55" y="235" width="24" height="30" rx="3" fill="#E74C3C" stroke="#C62828" stroke-width="1"/>
