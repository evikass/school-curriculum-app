<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <style>@keyframes s{0%,100%{opacity:.3;transform:translateY(0)}50%{opacity:.9;transform:translateY(-4px)}}.s{animation:s 2s ease-in-out infinite}</style>
