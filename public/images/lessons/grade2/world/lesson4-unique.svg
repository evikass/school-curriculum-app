<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#FFF8E1" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#E65100">Полезные ископаемые</text>
  <!-- Sky -->
  <rect x="0" y="40" width="500" height="50" fill="#81D4FA" rx="0"/>
  <!-- Ground surface -->
  <rect x="0" y="90" width="500" height="15" fill="#8BC34A" stroke="#689F38" stroke-width="1"/>
  <!-- Underground layers -->
  <!-- Top soil -->
  <rect x="0" y="105" width="500" height="25" fill="#A1887F" stroke="#795548" stroke-width="1"/>
  <!-- Coal layer -->
  <rect x="0" y="130" width="500" height="40" fill="#424242" stroke="#212121" stroke-width="1"/>
  <text x="60" y="155" text-anchor="middle" font-size="12" fill="#E0E0E0" font-family="sans-serif">Уголь</text>
  <!-- Coal pieces -->
  <rect x="130" y="135" width="12" height="10" fill="#616161" stroke="#424242" stroke-width="1" rx="2" transform="rotate(10,136,140)"/>
  <rect x="160" y="140" width="10" height="8" fill="#757575" stroke="#424242" stroke-width="1" rx="2" transform="rotate(-5,165,144)"/>
  <!-- Clay layer -->
  <rect x="0" y="170" width="500" height="30" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="1"/>
  <!-- Oil layer -->
  <rect x="0" y="200" width="500" height="35" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
  <text x="420" y="222" text-anchor="middle" font-size="12" fill="#FFB74D" font-family="sans-serif">Нефть</text>
  <!-- Oil drops -->
  <circle cx="280" cy="215" r="4" fill="#795548"/>
  <circle cx="310" cy="218" r="3" fill="#6D4C41"/>
  <circle cx="340" cy="212" r="5" fill="#795548"/>
  <!-- Iron ore layer -->
  <rect x="0" y="235" width="500" height="35" fill="#A1887F" stroke="#8D6E63" stroke-width="1"/>
  <text x="250" y="257" text-anchor="middle" font-size="12" fill="#4E342E" font-family="sans-serif">Железная руда</text>
  <!-- Iron ore pieces -->
  <circle cx="150" cy="250" r="6" fill="#B71C1C" stroke="#880E4F" stroke-width="1"/>
  <circle cx="350" cy="248" r="7" fill="#C62828" stroke="#B71C1C" stroke-width="1"/>
  <circle cx="180" cy="255" r="4" fill="#D32F2F"/>
  <!-- Granite layer -->
  <rect x="0" y="270" width="500" height="50" fill="#BCAAA4" stroke="#8D6E63" stroke-width="1"/>
  <text x="100" y="300" text-anchor="middle" font-size="12" fill="#5D4037" font-family="sans-serif">Гранит</text>
  <!-- Granite specks -->
  <circle cx="170" cy="290" r="3" fill="#FF8A65"/>
  <circle cx="180" cy="298" r="2" fill="#90A4AE"/>
  <circle cx="190" cy="285" r="2.5" fill="#fff"/>
  <circle cx="175" cy="305" r="2" fill="#FF8A65"/>
  <!-- Miner's lamp -->
  <g transform="translate(440,70)">
    <rect x="-8" y="5" width="16" height="20" fill="#FFD54F" stroke="#F9A825" stroke-width="1.5" rx="3"/>
    <path d="M-5,5 Q0,-8 5,5" fill="#FFEB3B" stroke="#FFC107" stroke-width="1.5"/>
    <line x1="0" y1="-8" x2="0" y2="-15" stroke="#F9A825" stroke-width="2"/>
    <circle cx="0" cy="-18" r="5" fill="#FFEB3B" opacity="0.6"/>
  </g>
  <!-- Pickaxe -->
  <g transform="translate(30,60) rotate(20)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#795548" stroke-width="4" stroke-linecap="round"/>
    <path d="M-12,0 L12,0 L8,-5 L-8,-5Z" fill="#78909C" stroke="#546E7A" stroke-width="1.5"/>
  </g>
  <!-- Labels on side -->
  <g>
    <line x1="490" y1="145" x2="500" y2="145" stroke="#E65100" stroke-width="1.5"/>
    <line x1="490" y1="215" x2="500" y2="215" stroke="#E65100" stroke-width="1.5"/>
    <line x1="490" y1="252" x2="500" y2="252" stroke="#E65100" stroke-width="1.5"/>
    <line x1="490" y1="295" x2="500" y2="295" stroke="#E65100" stroke-width="1.5"/>
  </g>
</svg>