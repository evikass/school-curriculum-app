<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#FCE4EC" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#880E4F">Текст и его структура</text>
  <!-- Cake plate -->
  <ellipse cx="250" cy="295" rx="160" ry="12" fill="#BCAAA4" stroke="#795548" stroke-width="2"/>
  <!-- Bottom layer - Заключение -->
  <rect x="110" y="235" width="280" height="58" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2" rx="8"/>
  <ellipse cx="250" cy="235" rx="140" ry="10" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="250" cy="293" rx="140" ry="10" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="270" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="sans-serif">Заключение</text>
  <!-- Decorations on bottom layer -->
  <circle cx="135" cy="265" r="5" fill="#FFEB3B"/>
  <circle cx="365" cy="265" r="5" fill="#FFEB3B"/>
  <circle cx="200" cy="260" r="4" fill="#E91E63"/>
  <circle cx="300" cy="260" r="4" fill="#E91E63"/>
  <!-- Middle layer - Основная часть -->
  <rect x="130" y="165" width="240" height="68" fill="#90CAF9" stroke="#1565C0" stroke-width="2" rx="8"/>
  <ellipse cx="250" cy="165" rx="120" ry="10" fill="#64B5F6" stroke="#1565C0" stroke-width="1.5"/>
  <ellipse cx="250" cy="233" rx="120" ry="10" fill="#42A5F5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="198" text-anchor="middle" font-size="14" font-weight="bold" fill="#0D47A1" font-family="sans-serif">Основная часть</text>
  <text x="250" y="215" text-anchor="middle" font-size="10" fill="#1565C0" font-family="sans-serif">(самая большая)</text>
  <!-- Decorations on middle layer -->
  <circle cx="160" cy="195" r="4" fill="#FF5722"/>
  <circle cx="340" cy="195" r="4" fill="#FF5722"/>
  <circle cx="200" cy="190" r="3" fill="#FFEB3B"/>
  <circle cx="300" cy="190" r="3" fill="#FFEB3B"/>
  <!-- Top layer - Введение -->
  <rect x="155" y="100" width="190" height="63" fill="#FFCC80" stroke="#E65100" stroke-width="2" rx="8"/>
  <ellipse cx="250" cy="100" rx="95" ry="10" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
  <ellipse cx="250" cy="163" rx="95" ry="10" fill="#FFA726" stroke="#E65100" stroke-width="1.5"/>
  <text x="250" y="138" text-anchor="middle" font-size="14" font-weight="bold" fill="#BF360C" font-family="sans-serif">Введение</text>
  <!-- Candle -->
  <rect x="245" y="72" width="10" height="30" fill="#E91E63" stroke="#C2185B" stroke-width="1" rx="2"/>
  <ellipse cx="250" cy="68" rx="5" ry="7" fill="#FFEB3B" stroke="#FF9800" stroke-width="1"/>
  <ellipse cx="250" cy="63" rx="3" ry="5" fill="#FFF9C4"/>
  <!-- Decorations on top layer -->
  <circle cx="180" cy="130" r="3" fill="#E91E63"/>
  <circle cx="320" cy="130" r="3" fill="#E91E63"/>
  <!-- Side labels with arrows -->
  <g>
    <line x1="90" y1="130" x2="150" y2="130" stroke="#E65100" stroke-width="1.5"/>
    <text x="85" y="125" text-anchor="end" font-size="10" fill="#E65100" font-family="sans-serif">1. Вступление</text>
  </g>
  <g>
    <line x1="90" y1="200" x2="125" y2="200" stroke="#1565C0" stroke-width="1.5"/>
    <text x="85" y="195" text-anchor="end" font-size="10" fill="#1565C0" font-family="sans-serif">2. Основное</text>
  </g>
  <g>
    <line x1="90" y1="265" x2="105" y2="265" stroke="#2E7D32" stroke-width="1.5"/>
    <text x="85" y="260" text-anchor="end" font-size="10" fill="#2E7D32" font-family="sans-serif">3. Конец</text>
  </g>
  <text x="250" y="335" text-anchor="middle" font-size="11" fill="#880E4F" font-family="sans-serif">Текст состоит из трёх частей</text>
</svg>