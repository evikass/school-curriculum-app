<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#FFF8E1" rx="12"/>
  <text x="250" y="28" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#F57F17">Разделительный мягкий знак</text>
  <!-- Room 1 (left) -->
  <rect x="60" y="80" width="120" height="180" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" rx="5"/>
  <text x="120" y="105" text-anchor="middle" font-size="13" fill="#2E7D32" font-family="sans-serif">согласный</text>
  <text x="120" y="195" text-anchor="middle" font-size="60" font-weight="bold" fill="#1565C0" font-family="sans-serif">л</text>
  <!-- Door character (ь) -->
  <g>
    <rect x="195" y="100" width="45" height="140" fill="#FFE082" stroke="#F9A825" stroke-width="2" rx="10"/>
    <circle cx="217" cy="130" r="10" fill="#FFECB3" stroke="#F9A825" stroke-width="1.5"/>
    <circle cx="213" cy="128" r="2" fill="#5D4037"/>
    <circle cx="221" cy="128" r="2" fill="#5D4037"/>
    <path d="M212,134 Q217,138 222,134" stroke="#5D4037" stroke-width="1.5" fill="none"/>
    <text x="217" y="195" text-anchor="middle" font-size="50" font-weight="bold" fill="#E65100" font-family="sans-serif">ь</text>
    <!-- Doorknob -->
    <circle cx="230" cy="170" r="4" fill="#FFB300" stroke="#FF8F00" stroke-width="1.5"/>
  </g>
  <!-- Room 2 (right) -->
  <rect x="255" y="80" width="120" height="180" fill="#E3F2FD" stroke="#42A5F5" stroke-width="2" rx="5"/>
  <text x="315" y="105" text-anchor="middle" font-size="13" fill="#1565C0" font-family="sans-serif">гласный</text>
  <text x="315" y="195" text-anchor="middle" font-size="60" font-weight="bold" fill="#C62828" font-family="sans-serif">ю</text>
  <!-- Arrow showing separation -->
  <path d="M185,260 Q217,290 250,260" stroke="#FF8F00" stroke-width="2" fill="none"/>
  <text x="217" y="305" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100" font-family="sans-serif">лью</text>
  <!-- Example words below -->
  <g>
    <rect x="40" y="280" width="70" height="30" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" rx="6"/>
    <text x="75" y="300" text-anchor="middle" font-size="14" fill="#1B5E20" font-family="sans-serif">в<tg fill="#E65100">ь</tg>юга</text>
  </g>
  <g>
    <rect x="120" y="280" width="70" height="30" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" rx="6"/>
    <text x="155" y="300" text-anchor="middle" font-size="14" fill="#1B5E20" font-family="sans-serif">ли<tg fill="#E65100">ь</tg>ёт</text>
  </g>
  <g>
    <rect x="200" y="280" width="80" height="30" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1.5" rx="6"/>
    <text x="240" y="300" text-anchor="middle" font-size="14" fill="#1B5E20" font-family="sans-serif">ру<tg fill="#E65100">ь</tg>и</text>
  </g>
  <!-- ь as friendly face icon top right -->
  <circle cx="440" cy="70" r="22" fill="#FFE082" stroke="#F9A825" stroke-width="2"/>
  <text x="440" y="78" text-anchor="middle" font-size="26" font-weight="bold" fill="#E65100" font-family="sans-serif">ь</text>
  <circle cx="432" cy="64" r="2.5" fill="#5D4037"/>
  <circle cx="448" cy="64" r="2.5" fill="#5D4037"/>
  <path d="M433,74 Q440,80 447,74" stroke="#5D4037" stroke-width="1.5" fill="none"/>
  <text x="440" y="105" text-anchor="middle" font-size="10" fill="#F57F17" font-family="sans-serif">я разделитель!</text>
  <!-- Decorative stars -->
  <text x="400" y="140" font-size="14" fill="#FFB300">★</text>
  <text x="450" y="170" font-size="10" fill="#FFB300">★</text>
  <text x="420" y="210" font-size="12" fill="#FFB300">★</text>
</svg>