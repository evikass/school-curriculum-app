<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Нахождение части числа</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Как найти часть от числа (долю)</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Magnifying glass -->
  <circle cx="120" cy="180" r="50" fill="white" opacity="0.6" stroke="#1a1a1a" stroke-width="3" />
  <line x1="155" y1="215" x2="195" y2="255" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round" />
  
  <!-- Inside magnifying glass: number 20 with 1/4 highlighted -->
  <text x="120" y="175" text-anchor="middle" fill="#1a1a1a" font-size="11">из 20</text>
  <text x="120" y="195" text-anchor="middle" fill="#C41E3A" font-size="16" font-weight="bold">1/4 = 5</text>
  
  <!-- Arrow pointing right -->
  <line x1="200" y1="180" x2="240" y2="180" stroke="#C41E3A" stroke-width="3" />
  <polygon points="240,180 230,174 230,186" fill="#C41E3A" />
  
  <!-- Formula box -->
  <rect x="250" y="95" width="220" height="180" fill="white" opacity="0.5" rx="8" stroke="#2B4C7E" stroke-width="1" />
  <text x="360" y="125" text-anchor="middle" fill="#2B4C7E" font-size="13" font-weight="bold">Правило:</text>
  <text x="360" y="150" text-anchor="middle" fill="#1a1a1a" font-size="11">Часть = Число</text>
  <text x="360" y="168" text-anchor="middle" fill="#1a1a1a" font-size="11">: Знаменатель</text>
  <text x="360" y="186" text-anchor="middle" fill="#1a1a1a" font-size="11">x Числитель</text>
  
  <line x1="280" y1="198" x2="440" y2="198" stroke="#1a1a1a" stroke-width="1" />
  
  <text x="360" y="220" text-anchor="middle" fill="#C41E3A" font-size="13" font-weight="bold">Пример:</text>
  <text x="360" y="242" text-anchor="middle" fill="#1a1a1a" font-size="12">3/5 от 30</text>
  <text x="360" y="260" text-anchor="middle" fill="#1a1a1a" font-size="12">= 30 : 5 x 3</text>
  <text x="360" y="275" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold">= 18</text>
  
  <!-- Bar showing 3/5 of 30 -->
  <rect x="50" y="250" width="200" height="25" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="1" rx="3" />
  <rect x="50" y="250" width="120" height="25" fill="#C41E3A" opacity="0.4" rx="3" />
  <text x="110" y="267" text-anchor="middle" fill="#1a1a1a" font-size="10">18 из 30</text>
  <!-- Division marks -->
  <line x1="90" y1="250" x2="90" y2="275" stroke="#1a1a1a" stroke-width="1" />
  <line x1="130" y1="250" x2="130" y2="275" stroke="#1a1a1a" stroke-width="1" />
  <line x1="170" y1="250" x2="170" y2="275" stroke="#1a1a1a" stroke-width="1" />
  <line x1="210" y1="250" x2="210" y2="275" stroke="#1a1a1a" stroke-width="1" />
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>