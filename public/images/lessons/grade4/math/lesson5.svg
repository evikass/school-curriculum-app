<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Сложение многозначных чисел</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Сложение столбиком многозначных чисел</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Column addition -->
  <rect x="140" y="95" width="220" height="170" fill="white" opacity="0.6" rx="6" stroke="#1a1a1a" stroke-width="1" />
  
  <!-- Numbers -->
  <text x="330" y="140" text-anchor="middle" fill="#C41E3A" font-size="28" font-weight="bold">+</text>
  <text x="250" y="155" text-anchor="middle" fill="#1a1a1a" font-size="30" font-weight="bold" font-family="'Courier New', monospace">25 486</text>
  <text x="250" y="195" text-anchor="middle" fill="#1a1a1a" font-size="30" font-weight="bold" font-family="'Courier New', monospace">13 257</text>
  <line x1="170" y1="205" x2="330" y2="205" stroke="#1a1a1a" stroke-width="3" />
  <text x="250" y="245" text-anchor="middle" fill="#C41E3A" font-size="30" font-weight="bold" font-family="'Courier New', monospace">38 743</text>
  
  <!-- Step annotations -->
  <text x="340" y="155" text-anchor="start" fill="#2B4C7E" font-size="9">6+7=13</text>
  <text x="340" y="170" text-anchor="start" fill="#2B4C7E" font-size="9">8+5+1=14</text>
  <text x="340" y="185" text-anchor="start" fill="#2B4C7E" font-size="9">4+2+1=7</text>
  <text x="340" y="200" text-anchor="start" fill="#2B4C7E" font-size="9">5+3=8</text>
  <text x="340" y="215" text-anchor="start" fill="#2B4C7E" font-size="9">2+1=3</text>
  
  <!-- Check mark -->
  <rect x="120" y="275" width="260" height="30" fill="#4A7C59" opacity="0.15" rx="4" />
  <text x="250" y="295" text-anchor="middle" fill="#1a1a1a" font-size="12">Проверка: 38 743 - 13 257 = 25 486</text>
  
  <!-- Decorative arrows -->
  <line x1="70" y1="140" x2="130" y2="140" stroke="#C41E3A" stroke-width="2" />
  <polygon points="70,140 80,135 80,145" fill="#C41E3A" />
  <line x1="370" y1="140" x2="430" y2="140" stroke="#C41E3A" stroke-width="2" />
  <polygon points="430,140 420,135 420,145" fill="#C41E3A" />
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>