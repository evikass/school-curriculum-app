<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="60%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  <g transform="translate(40,25)" filter="url(#softShadow)">
    <rect width="420" height="290" rx="12" fill="white" opacity="0.94"/>
    <rect width="420" height="32" rx="12" fill="#1565C0" opacity="0.9"/>
    <rect y="24" width="420" height="8" fill="#1565C0" opacity="0.9"/>
    <text x="210" y="22" font-family="Arial" font-size="13" fill="white" text-anchor="middle" font-weight="bold">ДЕЛЕНИЕ НА ОДНОЗНАЧНОЕ ЧИСЛО</text>
    <g transform="translate(40,50)">
      <rect width="340" height="160" rx="8" fill="#E3F2FD" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
      <text x="60" y="25" font-family="monospace" font-size="18" fill="#0D47A1" font-weight="bold">7 5 6</text>
      <line x1="0" y1="5" x2="0" y2="30" stroke="#1565C0" stroke-width="2.5"/>
      <line x1="0" y1="5" x2="90" y2="5" stroke="#1565C0" stroke-width="2.5"/>
      <text x="40" y="0" font-family="monospace" font-size="14" fill="#FDD835" font-weight="bold">3</text>
      <text x="160" y="25" font-family="monospace" font-size="18" fill="#1565C0" font-weight="bold">2 5 2</text>
      <text x="60" y="50" font-family="monospace" font-size="13" fill="#777">7:3=2 (ост.1)</text>
      <text x="60" y="70" font-family="monospace" font-size="13" fill="#777">15:3=5</text>
      <text x="60" y="90" font-family="monospace" font-size="13" fill="#777">6:3=2</text>
      <text x="160" y="50" font-family="Arial" font-size="10" fill="#0D47A1" font-weight="bold">← частное</text>
      <text x="160" y="120" font-family="Arial" font-size="11" fill="#1565C0" text-anchor="start" font-weight="bold">756 : 3 = 252</text>
      <text x="160" y="140" font-family="Arial" font-size="9" fill="#555" text-anchor="start">Проверка: 252 × 3 = 756 ✓</text>
    </g>
  </g>
  <rect x="0" y="318" width="500" height="32" rx="0" fill="#1565C0" opacity="0.9"/>
  <text x="250" y="339" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Деление на однозначное число</text>
</svg>