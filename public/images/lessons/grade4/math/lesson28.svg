<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Задачи на цену, количество, стоимость</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Решение задач на покупку и продажу</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Shopping cart -->
  <rect x="60" y="160" width="80" height="60" fill="#1a1a1a" opacity="0.1" rx="5" stroke="#1a1a1a" stroke-width="2" />
  <!-- Cart wheels -->
  <circle cx="75" cy="225" r="7" fill="#1a1a1a" opacity="0.3" />
  <circle cx="125" cy="225" r="7" fill="#1a1a1a" opacity="0.3" />
  <!-- Cart handle -->
  <line x1="140" y1="165" x2="170" y2="140" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" />
  
  <!-- Items in cart -->
  <rect x="70" y="145" width="20" height="20" fill="#C41E3A" opacity="0.5" rx="2" />
  <rect x="95" y="148" width="15" height="17" fill="#2B4C7E" opacity="0.5" rx="2" />
  <rect x="115" y="143" width="18" height="22" fill="#D4A843" opacity="0.5" rx="2" />
  
  <!-- Price tags -->
  <text x="80" y="140" text-anchor="middle" fill="#C41E3A" font-size="9" font-weight="bold">5р.</text>
  <text x="103" y="143" text-anchor="middle" fill="#2B4C7E" font-size="9" font-weight="bold">3р.</text>
  <text x="124" y="138" text-anchor="middle" fill="#D4A843" font-size="9" font-weight="bold">7р.</text>
  
  <!-- Formula triangle -->
  <rect x="210" y="90" width="240" height="110" fill="white" opacity="0.5" rx="8" stroke="#C41E3A" stroke-width="1" />
  <text x="330" y="115" text-anchor="middle" fill="#C41E3A" font-size="15" font-weight="bold">Формула стоимости</text>
  
  <polygon points="330,125 395,185 265,185" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="2" />
  <text x="330" y="155" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">C</text>
  <line x1="280" y1="178" x2="380" y2="178" stroke="#1a1a1a" stroke-width="2" />
  <text x="295" y="200" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">Ц</text>
  <text x="365" y="200" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">К</text>
  
  <!-- Legend -->
  <text x="80" y="260" text-anchor="middle" fill="#1a1a1a" font-size="11">Ц - цена</text>
  <text x="200" y="260" text-anchor="middle" fill="#1a1a1a" font-size="11">К - количество</text>
  <text x="340" y="260" text-anchor="middle" fill="#1a1a1a" font-size="11">С - стоимость</text>
  
  <!-- Example -->
  <rect x="60" y="275" width="380" height="30" fill="#2B4C7E" opacity="0.08" rx="4" />
  <text x="250" y="295" text-anchor="middle" fill="#1a1a1a" font-size="12">5 тетрадей по 12 руб. = 5 x 12 = 60 руб.</text>
  
  <!-- Coin visuals -->
  <circle cx="400" cy="240" r="15" fill="#D4A843" opacity="0.5" stroke="#D4A843" stroke-width="2" />
  <text x="400" y="245" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">P</text>
  <circle cx="440" cy="245" r="12" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="1" />
  <circle cx="425" cy="260" r="12" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="1" />
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>