<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Умножение на однозначное число</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Письменное умножение столбиком</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Column multiplication -->
  <rect x="140" y="90" width="220" height="180" fill="white" opacity="0.6" rx="6" stroke="#1a1a1a" stroke-width="1" />
  
  <text x="330" y="135" text-anchor="middle" fill="#C41E3A" font-size="28" font-weight="bold">x</text>
  <text x="250" y="150" text-anchor="middle" fill="#1a1a1a" font-size="32" font-weight="bold" font-family="'Courier New', monospace">1234</text>
  <text x="250" y="190" text-anchor="middle" fill="#1a1a1a" font-size="32" font-weight="bold" font-family="'Courier New', monospace">  x 3</text>
  <line x1="170" y1="200" x2="330" y2="200" stroke="#1a1a1a" stroke-width="3" />
  <text x="250" y="240" text-anchor="middle" fill="#C41E3A" font-size="32" font-weight="bold" font-family="'Courier New', monospace">3702</text>
  
  <!-- Step breakdown -->
  <rect x="50" y="280" width="400" height="28" fill="#D4A843" opacity="0.2" rx="4" />
  <text x="250" y="299" text-anchor="middle" fill="#1a1a1a" font-size="11">4x3=12 | 3x3+1=10 | 2x3+1=7 | 1x3=3</text>
  
  <!-- Properties -->
  <text x="80" y="135" text-anchor="middle" fill="#2B4C7E" font-size="9">a x b =</text>
  <text x="80" y="148" text-anchor="middle" fill="#2B4C7E" font-size="9">b x a</text>
  <text x="420" y="135" text-anchor="middle" fill="#2B4C7E" font-size="9">(a+b) x c</text>
  <text x="420" y="148" text-anchor="middle" fill="#2B4C7E" font-size="9">= ac + bc</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>