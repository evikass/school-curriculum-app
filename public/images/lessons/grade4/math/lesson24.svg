<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Действия с величинами</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Сложение и вычитание величин</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Three operation boxes -->
  
  <!-- Addition box -->
  <rect x="30" y="95" width="140" height="100" fill="#C41E3A" opacity="0.1" rx="8" stroke="#C41E3A" stroke-width="2" />
  <text x="100" y="120" text-anchor="middle" fill="#C41E3A" font-size="16" font-weight="bold">Сложение</text>
  <text x="100" y="145" text-anchor="middle" fill="#1a1a1a" font-size="12">3 м 45 см</text>
  <text x="100" y="163" text-anchor="middle" fill="#1a1a1a" font-size="12">+ 2 м 30 см</text>
  <line x1="50" y1="170" x2="150" y2="170" stroke="#1a1a1a" stroke-width="1" />
  <text x="100" y="188" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold">= 5 м 75 см</text>
  
  <!-- Subtraction box -->
  <rect x="180" y="95" width="140" height="100" fill="#2B4C7E" opacity="0.1" rx="8" stroke="#2B4C7E" stroke-width="2" />
  <text x="250" y="120" text-anchor="middle" fill="#2B4C7E" font-size="16" font-weight="bold">Вычитание</text>
  <text x="250" y="145" text-anchor="middle" fill="#1a1a1a" font-size="12">7 кг 200 г</text>
  <text x="250" y="163" text-anchor="middle" fill="#1a1a1a" font-size="12">- 3 кг 500 г</text>
  <line x1="200" y1="170" x2="300" y2="170" stroke="#1a1a1a" stroke-width="1" />
  <text x="250" y="188" text-anchor="middle" fill="#2B4C7E" font-size="14" font-weight="bold">= 3 кг 700 г</text>
  
  <!-- Multiplication box -->
  <rect x="330" y="95" width="140" height="100" fill="#D4A843" opacity="0.2" rx="8" stroke="#D4A843" stroke-width="2" />
  <text x="400" y="120" text-anchor="middle" fill="#D4A843" font-size="16" font-weight="bold">Умножение</text>
  <text x="400" y="145" text-anchor="middle" fill="#1a1a1a" font-size="12">2 м 50 см</text>
  <text x="400" y="163" text-anchor="middle" fill="#1a1a1a" font-size="12">x 3</text>
  <line x1="350" y1="170" x2="450" y2="170" stroke="#1a1a1a" stroke-width="1" />
  <text x="400" y="188" text-anchor="middle" fill="#D4A843" font-size="14" font-weight="bold">= 7 м 50 см</text>
  
  <!-- Rule box -->
  <rect x="50" y="210" width="400" height="90" fill="white" opacity="0.5" rx="8" stroke="#1a1a1a" stroke-width="1" />
  <text x="250" y="235" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="bold">Правила:</text>
  <text x="250" y="255" text-anchor="middle" fill="#1a1a1a" font-size="11">1. Приведи величины к одним единицам</text>
  <text x="250" y="272" text-anchor="middle" fill="#1a1a1a" font-size="11">2. Выполни действие</text>
  <text x="250" y="289" text-anchor="middle" fill="#1a1a1a" font-size="11">3. Переведи обратно если нужно</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>