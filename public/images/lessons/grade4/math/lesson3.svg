<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Чтение и запись многозначных чисел</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Как читать и записывать числа до миллиона</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Book/open book shape -->
  <rect x="150" y="90" width="200" height="10" fill="#1a1a1a" rx="2" />
  <rect x="155" y="100" width="95" height="80" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="2" rx="0" />
  <rect x="250" y="100" width="95" height="80" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="2" rx="0" />
  <line x1="250" y1="100" x2="250" y2="180" stroke="#1a1a1a" stroke-width="2" />
  
  <!-- Numbers on pages -->
  <text x="200" y="130" text-anchor="middle" fill="#1a1a1a" font-size="11">12 305</text>
  <text x="200" y="150" text-anchor="middle" fill="#1a1a1a" font-size="9" fill-opacity="0.7">двенадцать</text>
  <text x="200" y="165" text-anchor="middle" fill="#1a1a1a" font-size="9" fill-opacity="0.7">тысяч триста</text>
  <text x="200" y="178" text-anchor="middle" fill="#1a1a1a" font-size="9" fill-opacity="0.7">пять</text>
  
  <text x="300" y="130" text-anchor="middle" fill="#1a1a1a" font-size="11">350 724</text>
  <text x="300" y="150" text-anchor="middle" fill="#1a1a1a" font-size="9" fill-opacity="0.7">триста пятьдесят</text>
  <text x="300" y="165" text-anchor="middle" fill="#1a1a1a" font-size="9" fill-opacity="0.7">тысяч семьсот</text>
  <text x="300" y="178" text-anchor="middle" fill="#1a1a1a" font-size="9" fill-opacity="0.7">двадцать четыре</text>
  
  <!-- Previous / Next arrows -->
  <text x="100" y="220" text-anchor="middle" fill="#C41E3A" font-size="40" font-weight="bold">&lt;</text>
  <text x="175" y="222" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">999</text>
  <text x="240" y="222" text-anchor="middle" fill="#2B4C7E" font-size="16" font-weight="bold">1000</text>
  <text x="325" y="222" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">1001</text>
  <text x="400" y="220" text-anchor="middle" fill="#C41E3A" font-size="40" font-weight="bold">&gt;</text>
  
  <text x="175" y="242" text-anchor="middle" fill="#1a1a1a" font-size="9">пред.</text>
  <text x="325" y="242" text-anchor="middle" fill="#1a1a1a" font-size="9">след.</text>
  
  <!-- Reading rule box -->
  <rect x="60" y="260" width="380" height="45" fill="#C41E3A" opacity="0.08" rx="6" />
  <text x="250" y="280" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">Правило чтения: разбей на классы по 3 цифры</text>
  <text x="250" y="296" text-anchor="middle" fill="#1a1a1a" font-size="10">справа налево, читай слева направо</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>