<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Умножение на числа с нулями</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Особые случаи умножения на 10, 100, 1000</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Zero bubbles / circles -->
  <!-- Big x10 circle -->
  <circle cx="130" cy="150" r="50" fill="#C41E3A" opacity="0.12" stroke="#C41E3A" stroke-width="2" />
  <text x="130" y="145" text-anchor="middle" fill="#C41E3A" font-size="22" font-weight="bold">x 10</text>
  <text x="130" y="165" text-anchor="middle" fill="#C41E3A" font-size="11">+1 ноль</text>
  
  <circle cx="250" cy="150" r="50" fill="#2B4C7E" opacity="0.12" stroke="#2B4C7E" stroke-width="2" />
  <text x="250" y="145" text-anchor="middle" fill="#2B4C7E" font-size="22" font-weight="bold">x 100</text>
  <text x="250" y="165" text-anchor="middle" fill="#2B4C7E" font-size="11">+2 нуля</text>
  
  <circle cx="370" cy="150" r="50" fill="#D4A843" opacity="0.25" stroke="#D4A843" stroke-width="2" />
  <text x="370" y="145" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">x 1000</text>
  <text x="370" y="165" text-anchor="middle" fill="#1a1a1a" font-size="11">+3 нуля</text>
  
  <!-- Examples -->
  <rect x="50" y="220" width="120" height="35" fill="#C41E3A" opacity="0.08" rx="4" />
  <text x="110" y="243" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="bold">45 x 10 = 450</text>
  
  <rect x="190" y="220" width="120" height="35" fill="#2B4C7E" opacity="0.08" rx="4" />
  <text x="250" y="243" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="bold">45 x 100 = 4500</text>
  
  <rect x="330" y="220" width="140" height="35" fill="#D4A843" opacity="0.15" rx="4" />
  <text x="400" y="243" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="bold">45 x 1000 = 45000</text>
  
  <!-- Round numbers -->
  <rect x="80" y="270" width="340" height="35" fill="#F5E6C8" stroke="#C41E3A" stroke-width="1" rx="6" />
  <text x="250" y="293" text-anchor="middle" fill="#1a1a1a" font-size="13" font-weight="bold">60 x 300 = 18 000  (6x3=18 + три нуля)</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>