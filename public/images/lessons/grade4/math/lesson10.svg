<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Деление на числа с нулями</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Особые случаи деления на 10, 100, 1000</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Zero removal visual - scissors/cutting -->
  
  <!-- Dividing by 10 -->
  <rect x="30" y="95" width="140" height="80" fill="#C41E3A" opacity="0.08" rx="6" />
  <text x="100" y="120" text-anchor="middle" fill="#C41E3A" font-size="12" font-weight="bold">: 10</text>
  <text x="100" y="145" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">450 : 10</text>
  <text x="100" y="168" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">= 45</text>
  <!-- Cut mark -->
  <text x="150" y="145" fill="#C41E3A" font-size="20">x</text>
  <text x="155" y="138" fill="#C41E3A" font-size="9">0</text>
  
  <!-- Dividing by 100 -->
  <rect x="190" y="95" width="140" height="80" fill="#2B4C7E" opacity="0.08" rx="6" />
  <text x="260" y="120" text-anchor="middle" fill="#2B4C7E" font-size="12" font-weight="bold">: 100</text>
  <text x="260" y="145" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">4500 : 100</text>
  <text x="260" y="168" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">= 45</text>
  <text x="310" y="145" fill="#2B4C7E" font-size="20">x</text>
  <text x="315" y="138" fill="#2B4C7E" font-size="9">00</text>
  
  <!-- Dividing by 1000 -->
  <rect x="350" y="95" width="140" height="80" fill="#D4A843" opacity="0.15" rx="6" />
  <text x="420" y="120" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">: 1000</text>
  <text x="420" y="145" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">45000 : 1000</text>
  <text x="420" y="168" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">= 45</text>
  <text x="470" y="145" fill="#D4A843" font-size="20">x</text>
  <text x="475" y="138" fill="#D4A843" font-size="9">000</text>
  
  <!-- Round division example -->
  <rect x="80" y="195" width="340" height="100" fill="white" opacity="0.5" rx="8" stroke="#C41E3A" stroke-width="1" />
  <text x="250" y="225" text-anchor="middle" fill="#C41E3A" font-size="16" font-weight="bold">6000 : 200 = 30</text>
  <text x="250" y="250" text-anchor="middle" fill="#1a1a1a" font-size="13">1. Делим цифры: 60 : 2 = 30</text>
  <text x="250" y="270" text-anchor="middle" fill="#1a1a1a" font-size="13">2. Убираем нули делителя из делимого</text>
  <text x="250" y="288" text-anchor="middle" fill="#D4A843" font-size="11">3. Ответ: 30</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>