<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Класс единиц и класс тысяч</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Разряды и классы в многозначных числах</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Class of thousands block -->
  <rect x="40" y="95" width="200" height="130" fill="#2B4C7E" opacity="0.12" rx="6" stroke="#2B4C7E" stroke-width="2" />
  <text x="140" y="120" text-anchor="middle" fill="#2B4C7E" font-size="15" font-weight="bold">КЛАСС ТЫСЯЧ</text>
  <rect x="55" y="130" width="50" height="35" fill="#2B4C7E" opacity="0.3" rx="3" />
  <text x="80" y="153" text-anchor="middle" fill="#1a1a1a" font-size="10">Сотни</text>
  <text x="80" y="168" text-anchor="middle" fill="#1a1a1a" font-size="10">тыс.</text>
  <rect x="115" y="130" width="50" height="35" fill="#2B4C7E" opacity="0.3" rx="3" />
  <text x="140" y="153" text-anchor="middle" fill="#1a1a1a" font-size="10">Десятки</text>
  <text x="140" y="168" text-anchor="middle" fill="#1a1a1a" font-size="10">тыс.</text>
  <rect x="175" y="130" width="50" height="35" fill="#2B4C7E" opacity="0.3" rx="3" />
  <text x="200" y="153" text-anchor="middle" fill="#1a1a1a" font-size="10">Единицы</text>
  <text x="200" y="168" text-anchor="middle" fill="#1a1a1a" font-size="10">тыс.</text>
  <!-- Example number -->
  <text x="80" y="205" text-anchor="middle" fill="#2B4C7E" font-size="26" font-weight="bold">5</text>
  <text x="140" y="205" text-anchor="middle" fill="#2B4C7E" font-size="26" font-weight="bold">3</text>
  <text x="200" y="205" text-anchor="middle" fill="#2B4C7E" font-size="26" font-weight="bold">7</text>

  <!-- Class of units block -->
  <rect x="260" y="95" width="200" height="130" fill="#C41E3A" opacity="0.12" rx="6" stroke="#C41E3A" stroke-width="2" />
  <text x="360" y="120" text-anchor="middle" fill="#C41E3A" font-size="15" font-weight="bold">КЛАСС ЕДИНИЦ</text>
  <rect x="275" y="130" width="50" height="35" fill="#C41E3A" opacity="0.3" rx="3" />
  <text x="300" y="153" text-anchor="middle" fill="#1a1a1a" font-size="10">Сотни</text>
  <rect x="335" y="130" width="50" height="35" fill="#C41E3A" opacity="0.3" rx="3" />
  <text x="360" y="153" text-anchor="middle" fill="#1a1a1a" font-size="10">Десятки</text>
  <rect x="395" y="130" width="50" height="35" fill="#C41E3A" opacity="0.3" rx="3" />
  <text x="420" y="153" text-anchor="middle" fill="#1a1a1a" font-size="10">Единицы</text>
  <text x="300" y="205" text-anchor="middle" fill="#C41E3A" font-size="26" font-weight="bold">8</text>
  <text x="360" y="205" text-anchor="middle" fill="#C41E3A" font-size="26" font-weight="bold">4</text>
  <text x="420" y="205" text-anchor="middle" fill="#C41E3A" font-size="26" font-weight="bold">2</text>

  <!-- Result -->
  <rect x="100" y="240" width="300" height="65" fill="#D4A843" opacity="0.2" rx="6" />
  <text x="250" y="268" text-anchor="middle" fill="#1a1a1a" font-size="20" font-weight="bold">537 842</text>
  <text x="250" y="293" text-anchor="middle" fill="#1a1a1a" font-size="11">Пятьсот тридцать семь тысяч восемьсот сорок два</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>