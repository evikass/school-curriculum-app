<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="60%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="220" fill="url(#skyGrad)"/>
  <circle cx="430" cy="50" r="35" fill="url(#sunGrad)" filter="url(#glow)"/>
  <path d="M80,40 Q90,25 100,40 Q110,25 120,40" fill="white" opacity="0.7"/>
  <path d="M200,55 Q212,38 224,55 Q236,38 248,55" fill="white" opacity="0.6"/>
  <path d="M340,30 Q348,20 356,30 Q364,20 372,30" fill="white" opacity="0.5"/><path d="M0,270 Q125,255 250,270 Q375,280 500,270 L500,350 L0,350 Z" fill="url(#groundGrad)"/>
  <path d="M0,275 Q125,260 250,275 Q375,285 500,275" fill="#66BB6A" opacity="0.3"/>
  <rect x="47" y="230" width="6" height="18" rx="2" fill="#795548"/>
  <path d="M34.25,230 Q50,194 65.75,230" fill="#2E7D32" opacity="0.8"/>
  <path d="M37.4,223.25 Q50,189.5 62.6,223.25" fill="#388E3C" opacity="0.7"/>
  <path d="M41,216.5 Q50,185 59,216.5" fill="#43A047" opacity="0.6"/><rect x="437" y="225" width="6" height="16" rx="2" fill="#795548"/>
  <path d="M426,225 Q440,193 454,225" fill="#2E7D32" opacity="0.8"/>
  <path d="M428.8,219 Q440,189 451.2,219" fill="#388E3C" opacity="0.7"/>
  <path d="M432,213 Q440,185 448,213" fill="#43A047" opacity="0.6"/><ellipse cx="100" cy="260" rx="15" ry="10.5" fill="#4CAF50" opacity="0.6"/>
  <ellipse cx="109" cy="262" rx="10.5" ry="7.5" fill="#388E3C" opacity="0.5"/><ellipse cx="380" cy="258" rx="15" ry="10.5" fill="#4CAF50" opacity="0.6"/>
  <ellipse cx="389" cy="260" rx="10.5" ry="7.5" fill="#388E3C" opacity="0.5"/>
  <rect x="60" y="130" width="200" height="130" rx="8" fill="white" opacity="0.92" filter="url(#shadow)"/>
  <rect x="60" y="130" width="200" height="28" rx="8" fill="#1565C0" opacity="0.9"/>
  <rect x="60" y="150" width="200" height="8" fill="#1565C0" opacity="0.9"/>
  <text x="160" y="149" font-family="Arial" font-size="11" fill="white" text-anchor="middle" font-weight="bold">ЧИСЛА</text>
  <text x="85" y="182" font-family="Arial" font-size="28" fill="#0D47A1" font-weight="bold">1</text>
  <text x="120" y="182" font-family="Arial" font-size="28" fill="#1565C0" font-weight="bold">10</text>
  <text x="165" y="182" font-family="Arial" font-size="28" fill="#42A5F5" font-weight="bold">100</text>
  <text x="215" y="182" font-family="Arial" font-size="22" fill="#FDD835" font-weight="bold">1000</text>
  <line x1="80" y1="195" x2="240" y2="195" stroke="#1565C0" stroke-width="1" opacity="0.3"/>
  <text x="160" y="215" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Единицы → Десятки → Сотни → Тысячи</text>
  <text x="160" y="232" font-family="Arial" font-size="9" fill="#1565C0" text-anchor="middle">1 2 3 ... 999 1000</text>
  <path d="M300,80 Q305,75 310,80 Q315,75 320,80" fill="none" stroke="#555" stroke-width="1.2"/><path d="M330,95 Q335,90 340,95 Q345,90 350,95" fill="none" stroke="#555" stroke-width="1.2"/>
  <g transform="translate(290,140)">
    <rect x="0" y="0" width="160" height="115" rx="8" fill="white" opacity="0.92" filter="url(#shadow)"/>
    <rect x="0" y="0" width="160" height="28" rx="8" fill="#0D47A1" opacity="0.85"/>
    <rect x="0" y="20" width="160" height="8" fill="#0D47A1" opacity="0.85"/>
    <text x="80" y="19" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">РАЗРЯДЫ</text>
    <rect x="10" y="36" width="40" height="65" rx="4" fill="#1565C0" opacity="0.12" stroke="#1565C0" stroke-width="1"/>
    <text x="30" y="58" font-family="Arial" font-size="18" fill="#1565C0" text-anchor="middle" font-weight="bold">3</text>
    <text x="30" y="75" font-family="Arial" font-size="7" fill="#777" text-anchor="middle">Тысячи</text>
    <rect x="56" y="36" width="40" height="65" rx="4" fill="#42A5F5" opacity="0.12" stroke="#1565C0" stroke-width="1"/>
    <text x="76" y="58" font-family="Arial" font-size="18" fill="#1565C0" text-anchor="middle" font-weight="bold">5</text>
    <text x="76" y="75" font-family="Arial" font-size="7" fill="#777" text-anchor="middle">Сотни</text>
    <rect x="102" y="36" width="40" height="65" rx="4" fill="#1565C0" opacity="0.12" stroke="#1565C0" stroke-width="1"/>
    <text x="122" y="58" font-family="Arial" font-size="18" fill="#1565C0" text-anchor="middle" font-weight="bold">8</text>
    <text x="122" y="75" font-family="Arial" font-size="7" fill="#777" text-anchor="middle">Десятки</text>
    <text x="80" y="100" font-family="Arial" font-size="14" fill="#0D47A1" text-anchor="middle" font-weight="bold">= 3580</text>
  </g>
  <rect x="0" y="318" width="500" height="32" rx="0" fill="#1565C0" opacity="0.9"/>
  <text x="250" y="339" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Нумерация чисел от 1 до 1000</text>
</svg>