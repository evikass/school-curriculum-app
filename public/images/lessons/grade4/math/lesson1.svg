<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Нумерация чисел от 1 до 1000</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Числа от 1 до 1000: чтение, запись, сравнение</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Place value blocks -->
  <!-- Hundreds column -->
  <rect x="80" y="100" width="80" height="200" fill="#2B4C7E" opacity="0.15" rx="4" />
  <text x="120" y="130" text-anchor="middle" fill="#2B4C7E" font-size="14" font-weight="bold">СОТНИ</text>
  <rect x="90" y="145" width="60" height="45" fill="#2B4C7E" opacity="0.4" rx="3" />
  <text x="120" y="175" text-anchor="middle" fill="white" font-size="22" font-weight="bold">4</text>
  <text x="120" y="210" text-anchor="middle" fill="#1a1a1a" font-size="11">= 400</text>
  
  <!-- Tens column -->
  <rect x="210" y="100" width="80" height="200" fill="#C41E3A" opacity="0.15" rx="4" />
  <text x="250" y="130" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold">ДЕСЯТКИ</text>
  <rect x="220" y="145" width="60" height="45" fill="#C41E3A" opacity="0.4" rx="3" />
  <text x="250" y="175" text-anchor="middle" fill="white" font-size="22" font-weight="bold">7</text>
  <text x="250" y="210" text-anchor="middle" fill="#1a1a1a" font-size="11">= 70</text>
  
  <!-- Ones column -->
  <rect x="340" y="100" width="80" height="200" fill="#D4A843" opacity="0.25" rx="4" />
  <text x="380" y="130" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">ЕДИНИЦЫ</text>
  <rect x="350" y="145" width="60" height="45" fill="#D4A843" opacity="0.6" rx="3" />
  <text x="380" y="175" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="bold">5</text>
  <text x="380" y="210" text-anchor="middle" fill="#1a1a1a" font-size="11">= 5</text>
  
  <!-- Sum representation -->
  <rect x="100" y="240" width="300" height="50" fill="#C41E3A" opacity="0.1" rx="6" />
  <text x="250" y="262" text-anchor="middle" fill="#1a1a1a" font-size="18" font-weight="bold">475 = 400 + 70 + 5</text>
  <text x="250" y="282" text-anchor="middle" fill="#1a1a1a" font-size="11">Разрядные слагаемые</text>
  
  <!-- Arrow decorations -->
  <line x1="90" y1="195" x2="90" y2="240" stroke="#C41E3A" stroke-width="2" marker-end="url(#arrowR)" />
  <line x1="290" y1="195" x2="290" y2="240" stroke="#C41E3A" stroke-width="2" />
  <line x1="410" y1="195" x2="410" y2="240" stroke="#C41E3A" stroke-width="2" />
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>