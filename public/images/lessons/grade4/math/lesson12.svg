<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Сравнение дробей</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Как сравнивать дроби с одинаковыми знаменателями</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Balance scale -->
  <!-- Base -->
  <rect x="225" y="270" width="50" height="40" fill="#1a1a1a" rx="3" />
  <!-- Pole -->
  <line x1="250" y1="110" x2="250" y2="270" stroke="#1a1a1a" stroke-width="4" />
  <!-- Triangle top -->
  <polygon points="240,270 260,270 250,255" fill="#1a1a1a" />
  
  <!-- Left beam - lower (lighter fraction) -->
  <line x1="80" y1="170" x2="250" y2="120" stroke="#1a1a1a" stroke-width="3" />
  <!-- Right beam - higher (heavier fraction) -->
  <line x1="250" y1="120" x2="420" y2="170" stroke="#1a1a1a" stroke-width="3" />
  
  <!-- Left pan - 3/8 -->
  <line x1="60" y1="170" x2="100" y2="170" stroke="#1a1a1a" stroke-width="2" />
  <line x1="55" y1="170" x2="55" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <line x1="105" y1="170" x2="105" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <line x1="55" y1="190" x2="105" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <rect x="55" y="190" width="50" height="40" fill="#2B4C7E" opacity="0.2" rx="3" />
  <text x="80" y="217" text-anchor="middle" fill="#2B4C7E" font-size="18" font-weight="bold">3</text>
  <line x1="65" y1="222" x2="95" y2="222" stroke="#2B4C7E" stroke-width="2" />
  <text x="80" y="238" text-anchor="middle" fill="#2B4C7E" font-size="18" font-weight="bold">8</text>
  
  <!-- Right pan - 5/8 -->
  <line x1="400" y1="170" x2="440" y2="170" stroke="#1a1a1a" stroke-width="2" />
  <line x1="395" y1="170" x2="395" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <line x1="445" y1="170" x2="445" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <line x1="395" y1="190" x2="445" y2="190" stroke="#1a1a1a" stroke-width="2" />
  <rect x="395" y="190" width="50" height="40" fill="#C41E3A" opacity="0.2" rx="3" />
  <text x="420" y="217" text-anchor="middle" fill="#C41E3A" font-size="18" font-weight="bold">5</text>
  <line x1="405" y1="222" x2="435" y2="222" stroke="#C41E3A" stroke-width="2" />
  <text x="420" y="238" text-anchor="middle" fill="#C41E3A" font-size="18" font-weight="bold">8</text>
  
  <!-- Result -->
  <text x="250" y="100" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="bold">3/8 &lt; 5/8</text>
  
  <!-- Rules -->
  <rect x="50" y="280" width="180" height="25" fill="#2B4C7E" opacity="0.1" rx="4" />
  <text x="140" y="297" text-anchor="middle" fill="#1a1a1a" font-size="10">Один. знаменатель: больше числитель</text>
  <rect x="260" y="280" width="190" height="25" fill="#C41E3A" opacity="0.1" rx="4" />
  <text x="355" y="297" text-anchor="middle" fill="#1a1a1a" font-size="10">Один. числитель: меньше знаменатель</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>