<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="60%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  <g transform="translate(40,30)" filter="url(#softShadow)">
    <rect width="420" height="285" rx="12" fill="white" opacity="0.94"/>
    <rect width="420" height="32" rx="12" fill="#1565C0" opacity="0.9"/>
    <rect y="24" width="420" height="8" fill="#1565C0" opacity="0.9"/>
    <text x="210" y="22" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">ВЫЧИТАНИЕ ДРОБЕЙ</text>
    <g transform="translate(30,50)">
      <rect width="360" height="90" rx="8" fill="#FFEBEE" opacity="0.4" stroke="#D32F2F" stroke-width="1.5"/>
      <text x="180" y="40" font-family="Arial" font-size="28" fill="#0D47A1" text-anchor="middle" font-weight="bold">3/5 − 1/5 = 2/5</text>
      <text x="180" y="70" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Вычитаем числители, знаменатель оставляем тот же</text>
    </g>
    <g transform="translate(30,160)">
      <rect width="170" height="100" rx="8" fill="#E3F2FD" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
      <text x="85" y="20" font-family="Arial" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">ПРИМЕР</text>
      <text x="85" y="50" font-family="Arial" font-size="11" fill="#0D47A1" text-anchor="middle" font-weight="bold">3/5 − 1/5 = 2/5</text>
      <text x="85" y="75" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">Вычитаем числители, знаменатель ост</text>
    </g>
    <g transform="translate(220,160)">
      <rect width="170" height="100" rx="8" fill="#FFF3E0" opacity="0.4" stroke="#FF9800" stroke-width="1"/>
      <text x="85" y="20" font-family="Arial" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">ЗАПОМНИ</text>
      <text x="85" y="50" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Решай по шагам!</text>
      <text x="85" y="70" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">1. Прочитай условие</text>
      <text x="85" y="83" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">2. Запиши формулу</text>
      <text x="85" y="96" font-family="Arial" font-size="8" fill="#555" text-anchor="middle">3. Подставь значения</text>
    </g>
  </g>
  <rect x="0" y="318" width="500" height="32" rx="0" fill="#1565C0" opacity="0.9"/>
  <text x="250" y="339" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Вычитание дробей</text>
</svg>