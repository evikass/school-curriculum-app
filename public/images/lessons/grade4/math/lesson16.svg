<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Нахождение числа по его части</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Как найти целое число по его части</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Reverse process visual -->
  <!-- Arrow going backward -->
  <path d="M420,150 L100,150" stroke="#C41E3A" stroke-width="3" fill="none" marker-end="url(#arrowL)" />
  <polygon points="100,150 112,143 112,157" fill="#C41E3A" />
  
  <!-- Known part -->
  <rect x="280" y="100" width="150" height="100" fill="#2B4C7E" opacity="0.12" rx="8" stroke="#2B4C7E" stroke-width="2" />
  <text x="355" y="130" text-anchor="middle" fill="#2B4C7E" font-size="14" font-weight="bold">ЧАСТЬ</text>
  <text x="355" y="160" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">15</text>
  <text x="355" y="185" text-anchor="middle" fill="#1a1a1a" font-size="12">это 3/5</text>
  
  <!-- Unknown whole -->
  <rect x="50" y="100" width="150" height="100" fill="#C41E3A" opacity="0.1" rx="8" stroke="#C41E3A" stroke-width="2" stroke-dasharray="5,3" />
  <text x="125" y="130" text-anchor="middle" fill="#C41E3A" font-size="14" font-weight="bold">ЦЕЛОЕ = ?</text>
  <text x="125" y="165" text-anchor="middle" fill="#C41E3A" font-size="28" font-weight="bold">25</text>
  <text x="125" y="185" text-anchor="middle" fill="#1a1a1a" font-size="12">ответ</text>
  
  <!-- Formula -->
  <rect x="80" y="220" width="340" height="80" fill="white" opacity="0.5" rx="8" stroke="#D4A843" stroke-width="2" />
  <text x="250" y="245" text-anchor="middle" fill="#D4A843" font-size="14" font-weight="bold">Число = Часть : Числитель x Знаменатель</text>
  <line x1="110" y1="255" x2="390" y2="255" stroke="#1a1a1a" stroke-width="1" />
  <text x="250" y="275" text-anchor="middle" fill="#1a1a1a" font-size="13">25 = 15 : 3 x 5</text>
  <text x="250" y="293" text-anchor="middle" fill="#C41E3A" font-size="13" font-weight="bold">Сначала делим на числитель, потом умножаем!</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>