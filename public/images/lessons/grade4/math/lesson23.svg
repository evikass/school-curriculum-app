<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Единицы времени</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Секунда, минута, час, сутки, год</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Clock face -->
  <circle cx="150" cy="180" r="75" fill="white" stroke="#1a1a1a" stroke-width="3" />
  <circle cx="150" cy="180" r="70" fill="white" opacity="0.8" />
  
  <!-- Hour marks -->
  <line x1="150" y1="115" x2="150" y2="125" stroke="#1a1a1a" stroke-width="2" />
  <line x1="150" y1="235" x2="150" y2="245" stroke="#1a1a1a" stroke-width="2" />
  <line x1="85" y1="180" x2="95" y2="180" stroke="#1a1a1a" stroke-width="2" />
  <line x1="205" y1="180" x2="215" y2="180" stroke="#1a1a1a" stroke-width="2" />
  <!-- 12, 3, 6, 9 labels -->
  <text x="150" y="112" text-anchor="middle" fill="#1a1a1a" font-size="11">12</text>
  <text x="220" y="184" text-anchor="middle" fill="#1a1a1a" font-size="11">3</text>
  <text x="150" y="256" text-anchor="middle" fill="#1a1a1a" font-size="11">6</text>
  <text x="80" y="184" text-anchor="middle" fill="#1a1a1a" font-size="11">9</text>
  
  <!-- Hour hand -->
  <line x1="150" y1="180" x2="150" y2="130" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" />
  <!-- Minute hand -->
  <line x1="150" y1="180" x2="195" y2="155" stroke="#C41E3A" stroke-width="2" stroke-linecap="round" />
  <!-- Center dot -->
  <circle cx="150" cy="180" r="4" fill="#C41E3A" />
  
  <!-- Time units chain -->
  <rect x="270" y="95" width="210" height="210" fill="white" opacity="0.4" rx="8" stroke="#2B4C7E" stroke-width="1" />
  <text x="375" y="120" text-anchor="middle" fill="#2B4C7E" font-size="14" font-weight="bold">Единицы времени</text>
  
  <rect x="285" y="130" width="180" height="28" fill="#C41E3A" opacity="0.1" rx="4" />
  <text x="375" y="150" text-anchor="middle" fill="#1a1a1a" font-size="12">1 год = 365(366) сут.</text>
  
  <rect x="285" y="165" width="180" height="28" fill="#D4A843" opacity="0.15" rx="4" />
  <text x="375" y="185" text-anchor="middle" fill="#1a1a1a" font-size="12">1 сут. = 24 часа</text>
  
  <rect x="285" y="200" width="180" height="28" fill="#2B4C7E" opacity="0.1" rx="4" />
  <text x="375" y="220" text-anchor="middle" fill="#1a1a1a" font-size="12">1 час = 60 минут</text>
  
  <rect x="285" y="235" width="180" height="28" fill="#C41E3A" opacity="0.1" rx="4" />
  <text x="375" y="255" text-anchor="middle" fill="#1a1a1a" font-size="12">1 мин. = 60 секунд</text>
  
  <rect x="285" y="270" width="180" height="25" fill="#D4A843" opacity="0.15" rx="4" />
  <text x="375" y="288" text-anchor="middle" fill="#1a1a1a" font-size="11">1 год = 12 месяцев</text>
  
  <!-- Clock label -->
  <text x="150" y="275" text-anchor="middle" fill="#1a1a1a" font-size="11">10:15</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>