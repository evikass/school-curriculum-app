<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      text { font-family: 'Arial', 'Helvetica', sans-serif; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Top decorative line -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom decorative line -->
  <rect x="0" y="316" width="500" height="4" fill="#C41E3A" />
  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" fill="#1a1a1a" font-size="24" font-weight="bold">Геометрические фигуры</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" fill="#1a1a1a" font-size="12">Виды геометрических фигур и их свойства</text>
  <!-- Separator -->
  <line x1="50" y1="80" x2="450" y2="80" stroke="#C41E3A" stroke-width="2" />
  <!-- Triangle -->
  <polygon points="100,270 60,200 140,200" fill="#C41E3A" opacity="0.3" stroke="#C41E3A" stroke-width="2" />
  <text x="100" y="290" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Треугольник</text>
  
  <!-- Square -->
  <rect x="160" y="195" width="65" height="65" fill="#2B4C7E" opacity="0.3" stroke="#2B4C7E" stroke-width="2" />
  <text x="192" y="290" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Квадрат</text>
  
  <!-- Rectangle -->
  <rect x="245" y="190" width="90" height="60" fill="#D4A843" opacity="0.4" stroke="#D4A843" stroke-width="2" />
  <text x="290" y="290" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Прямоугольник</text>
  
  <!-- Circle -->
  <circle cx="395" cy="220" r="38" fill="#C41E3A" opacity="0.15" stroke="#C41E3A" stroke-width="2" />
  <text x="395" y="290" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">Круг</text>
  
  <!-- Pentagon -->
  <polygon points="80,130 50,155 65,190 95,190 110,155" fill="#2B4C7E" opacity="0.2" stroke="#2B4C7E" stroke-width="2" />
  <text x="80" y="175" text-anchor="middle" fill="white" font-size="9" font-weight="bold">5</text>
  
  <!-- Hexagon -->
  <polygon points="165,110 195,120 195,150 165,160 135,150 135,120" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="2" />
  <text x="165" y="140" text-anchor="middle" fill="#1a1a1a" font-size="9" font-weight="bold">6</text>
  
  <!-- Diamond/Rhombus -->
  <polygon points="250,100 290,140 250,180 210,140" fill="#C41E3A" opacity="0.2" stroke="#C41E3A" stroke-width="2" />
  <text x="250" y="145" text-anchor="middle" fill="#1a1a1a" font-size="9" font-weight="bold">4</text>
  
  <!-- Trapezoid -->
  <polygon points="320,120 380,120 400,160 300,160" fill="#2B4C7E" opacity="0.2" stroke="#2B4C7E" stroke-width="2" />
  <text x="350" y="147" text-anchor="middle" fill="#1a1a1a" font-size="9" font-weight="bold">Трапеция</text>
  
  <!-- Oval -->
  <ellipse cx="440" cy="140" rx="35" ry="25" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="2" />
  <text x="440" y="145" text-anchor="middle" fill="#1a1a1a" font-size="9" font-weight="bold">Овал</text>
  <!-- Bottom panel text -->
  <text x="250" y="335" text-anchor="middle" fill="#F5E6C8" font-size="13" font-weight="bold">Математика</text>
</svg>