<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Гимнастические упражнения</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Осваиваем основные гимнастические элементы</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- gymnast figure -->
  <circle cx="200" cy="130" r="11" fill="#1a1a1a"/>
  <!-- body arched back -->
  <path d="M200,141 Q210,170 260,185 Q300,195 310,175" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- arms reaching up -->
  <line x1="205" y1="145" x2="185" y2="120" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="195" y1="142" x2="170" y2="125" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- legs -->
  <line x1="310" y1="175" x2="340" y2="155" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="310" y1="175" x2="330" y2="195" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- mat -->
  <rect x="160" y="200" width="200" height="8" rx="3" fill="#2B4C7E" opacity="0.3"/>
  <!-- second figure - stretching -->
  <circle cx="370" cy="145" r="9" fill="#C41E3A"/>
  <line x1="370" y1="154" x2="370" y2="195" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="165" x2="350" y2="150" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="165" x2="395" y2="155" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="195" x2="355" y2="220" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="370" y1="195" x2="385" y2="220" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <!-- balance beam -->
  <rect x="120" y="245" width="260" height="5" rx="2" fill="#D4A843"/>
  <line x1="135" y1="250" x2="135" y2="270" stroke="#D4A843" stroke-width="3"/>
  <line x1="365" y1="250" x2="365" y2="270" stroke="#D4A843" stroke-width="3"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Физическая культура</text>
</svg>