<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Упражнения с предметами</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Осваиваем работу с гимнастическими предметами</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- ball -->
  <circle cx="160" cy="175" r="30" fill="#C41E3A"/>
  <path d="M135,155 Q160,180 185,155" stroke="#1a1a1a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M135,195 Q160,170 185,195" stroke="#1a1a1a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <line x1="160" y1="145" x2="160" y2="205" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3"/>
  <!-- hoop -->
  <circle cx="330" cy="165" r="35" stroke="#2B4C7E" stroke-width="6" fill="none"/>
  <circle cx="330" cy="165" r="35" stroke="#D4A843" stroke-width="2" fill="none" stroke-dasharray="8,6"/>
  <!-- jump rope arc -->
  <path d="M200,260 Q260,110 360,260" stroke="#C41E3A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <circle cx="200" cy="262" r="5" fill="#D4A843"/>
  <circle cx="360" cy="262" r="5" fill="#D4A843"/>
  <!-- handles -->
  <line x1="200" y1="267" x2="195" y2="280" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
  <line x1="360" y1="267" x2="365" y2="280" stroke="#D4A843" stroke-width="4" stroke-linecap="round"/>
  <!-- small figure jumping -->
  <circle cx="280" cy="140" r="8" fill="#1a1a1a"/>
  <line x1="280" y1="148" x2="280" y2="180" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="280" y1="158" x2="265" y2="145" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="280" y1="158" x2="295" y2="145" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="280" y1="180" x2="270" y2="200" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="280" y1="180" x2="290" y2="200" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Физическая культура</text>
</svg>