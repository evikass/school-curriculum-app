<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Метание</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Осваиваем технику метания</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- thrower figure -->
  <circle cx="170" cy="140" r="10" fill="#C41E3A"/>
  <line x1="170" y1="150" x2="175" y2="195" stroke="#C41E3A" stroke-width="3.5" stroke-linecap="round"/>
  <!-- throwing arm -->
  <line x1="175" y1="160" x2="210" y2="130" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <!-- ball in hand -->
  <circle cx="212" cy="128" r="7" fill="#D4A843"/>
  <!-- other arm -->
  <line x1="173" y1="160" x2="155" y2="175" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="175" y1="195" x2="160" y2="225" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="175" y1="195" x2="190" y2="225" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <!-- trajectory arc -->
  <path d="M220,125 Q300,90 400,160" stroke="#D4A843" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
  <!-- target circles -->
  <circle cx="410" cy="175" r="35" stroke="#C41E3A" stroke-width="2" fill="none"/>
  <circle cx="410" cy="175" r="25" stroke="#C41E3A" stroke-width="1.5" fill="none"/>
  <circle cx="410" cy="175" r="15" stroke="#C41E3A" stroke-width="1.5" fill="none"/>
  <circle cx="410" cy="175" r="5" fill="#C41E3A"/>
  <!-- distance markers -->
  <line x1="220" y1="260" x2="400" y2="260" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="270" y1="256" x2="270" y2="264" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="320" y1="256" x2="320" y2="264" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="370" y1="256" x2="370" y2="264" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="270" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a1a1a">10m</text>
  <text x="320" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a1a1a">20m</text>
  <text x="370" y="278" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a1a1a">30m</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Физическая культура</text>
</svg>