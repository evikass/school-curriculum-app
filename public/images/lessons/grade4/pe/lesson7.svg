<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Футбол</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Осваиваем основы игры в футбол</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- soccer field lines -->
  <rect x="80" y="95" width="340" height="190" stroke="#D4A843" stroke-width="1" fill="none" opacity="0.3"/>
  <line x1="250" y1="95" x2="250" y2="285" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
  <circle cx="250" cy="190" r="30" stroke="#D4A843" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- goal -->
  <rect x="380" y="150" width="40" height="80" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <line x1="380" y1="190" x2="420" y2="190" stroke="#1a1a1a" stroke-width="1"/>
  <!-- player figure -->
  <circle cx="250" cy="150" r="11" fill="#C41E3A"/>
  <line x1="250" y1="161" x2="250" y2="210" stroke="#C41E3A" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="250" y1="175" x2="230" y2="165" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="175" x2="275" y2="160" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="210" x2="235" y2="240" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <line x1="250" y1="210" x2="268" y2="235" stroke="#C41E3A" stroke-width="3" stroke-linecap="round"/>
  <!-- soccer ball -->
  <circle cx="310" cy="200" r="12" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M304,195 L310,190 L316,195" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <path d="M306,202 L310,208 L314,202" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <polygon points="310,192 306,198 314,198" fill="#1a1a1a" opacity="0.6"/>
  <!-- second player -->
  <circle cx="160" cy="165" r="9" fill="#2B4C7E"/>
  <line x1="160" y1="174" x2="160" y2="215" stroke="#2B4C7E" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="185" x2="145" y2="175" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="160" y1="185" x2="178" y2="178" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="160" y1="215" x2="148" y2="240" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="160" y1="215" x2="172" y2="240" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Физическая культура</text>
</svg>