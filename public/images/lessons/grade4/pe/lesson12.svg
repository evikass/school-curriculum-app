<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Подвижные игры зимой</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Играем в зимние игры</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- snow hill -->
  <path d="M80,260 Q150,180 250,200 Q350,220 420,180 L420,290 L80,290 Z" fill="#FFFFFF" opacity="0.4"/>
  <path d="M80,260 Q150,180 250,200 Q350,220 420,180" stroke="#D4A843" stroke-width="1.5" fill="none"/>
  <!-- sled with figure -->
  <rect x="190" y="225" width="40" height="6" rx="2" fill="#C41E3A"/>
  <line x1="190" y1="228" x2="180" y2="242" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="230" y1="228" x2="240" y2="242" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="210" cy="205" r="8" fill="#2B4C7E"/>
  <line x1="210" y1="213" x2="210" y2="228" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="210" y1="220" x2="198" y2="210" stroke="#2B4C7E" stroke-width="2" stroke-linecap="round"/>
  <line x1="210" y1="220" x2="222" y2="210" stroke="#2B4C7E" stroke-width="2" stroke-linecap="round"/>
  <!-- snowballs in air -->
  <circle cx="310" cy="155" r="8" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="340" cy="145" r="6" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="365" cy="160" r="7" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1"/>
  <!-- snowball thrower -->
  <circle cx="300" cy="195" r="8" fill="#C41E3A"/>
  <line x1="300" y1="203" x2="300" y2="230" stroke="#C41E3A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="300" y1="212" x2="315" y2="195" stroke="#C41E3A" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="212" x2="285" y2="200" stroke="#C41E3A" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="230" x2="290" y2="250" stroke="#C41E3A" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="230" x2="312" y2="250" stroke="#C41E3A" stroke-width="2" stroke-linecap="round"/>
  <!-- hockey stick on ground -->
  <path d="M130,255 L120,235 L125,225" stroke="#D4A843" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- snowflakes -->
  <text x="140" y="140" font-size="14" fill="#2B4C7E" opacity="0.4">*</text>
  <text x="260" y="125" font-size="10" fill="#2B4C7E" opacity="0.3">*</text>
  <text x="380" y="130" font-size="12" fill="#2B4C7E" opacity="0.5">*</text>
  <text x="170" y="120" font-size="8" fill="#2B4C7E" opacity="0.3">*</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Физическая культура</text>
</svg>