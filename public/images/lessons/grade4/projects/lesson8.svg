<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Макеты природных объектов</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Создание макетов</text>
  <!-- Illustration area -->
  <circle cx="250" cy="200" r="25" fill="#D4A843" stroke="#DAA520" stroke-width="1.5"/><circle cx="195" cy="200" r="6" fill="#888"/><circle cx="310" cy="200" r="8" fill="#228B22" opacity="0.7"/><circle cx="170" cy="165" r="7" fill="#4169E1" opacity="0.7"/><circle cx="335" cy="235" r="5" fill="#FF6347" opacity="0.7"/><circle cx="155" cy="220" r="14" fill="#DEB887" stroke="#8B6914" stroke-width="1"/><circle cx="345" cy="170" r="12" fill="#DEB887" stroke="#8B6914" stroke-width="1"/><circle cx="345" cy="155" r="18" fill="#CD853F" stroke="#8B6914" stroke-width="1" opacity="0.8"/><ellipse cx="250" cy="200" rx="90" ry="90" fill="none" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,4"/><ellipse cx="250" cy="200" rx="130" ry="130" fill="none" stroke="#ddd" stroke-width="0.5" stroke-dasharray="4,4"/><text x="250" y="295" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Меркурий, Венера, Земля, Марс</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Проектная деятельность</text>
</svg>