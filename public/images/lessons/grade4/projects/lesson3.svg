<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Методы исследования</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Исследовательские проекты</text>
  <!-- Illustration area -->
  <rect x="130" y="185" width="30" height="60" rx="3" fill="#888" stroke="#666" stroke-width="1.5"/><circle cx="145" cy="175" r="20" fill="#87CEEB" stroke="#888" stroke-width="2" opacity="0.6"/><circle cx="145" cy="175" r="10" fill="#87CEEB" stroke="#888" stroke-width="1"/><rect x="125" y="245" width="40" height="8" rx="2" fill="#666"/><text x="145" y="275" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">Наблюдение</text><!-- Flask --><path d="M210,180 L210,200 Q200,220 200,235 Q200,255 220,255 Q240,255 240,235 Q240,220 230,200 L230,180 Z" fill="#87CEEB" opacity="0.5" stroke="#888" stroke-width="1.5"/><rect x="208" y="175" width="24" height="8" rx="2" fill="#888"/><text x="220" y="275" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">Эксперимент</text><!-- Clipboard --><rect x="280" y="150" width="50" height="70" rx="3" fill="#DEB887" stroke="#999" stroke-width="1.5"/><rect x="275" y="145" width="60" height="12" rx="3" fill="#8B6914"/><circle cx="305" cy="150" r="5" fill="#1a1a1a"/><line x1="290" y1="175" x2="320" y2="175" stroke="#999" stroke-width="1"/><line x1="290" y1="190" x2="315" y2="190" stroke="#999" stroke-width="1"/><line x1="290" y1="205" x2="318" y2="205" stroke="#999" stroke-width="1"/><text x="305" y="275" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">Опрос</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Проектная деятельность</text>
</svg>