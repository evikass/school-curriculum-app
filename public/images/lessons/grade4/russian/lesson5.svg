<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect x="0" y="0" width="500" height="6" fill="#C41E3A"/>
  <rect x="0" y="310" width="500" height="4" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Приставка и суффикс</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">Части слова для образования новых слов</text>
  <!-- Large word structure diagram -->
  <!-- Word: под-снеж-ник -->
  <rect x="40" y="95" width="420" height="65" rx="6" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Prefix block -->
  <rect x="55" y="105" width="70" height="45" rx="4" fill="#2B4C7E"/>
  <text x="90" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FFFFFF">под-</text>
  <text x="90" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#A0C4E8">приставка</text>
  <!-- Arrow -->
  <polygon points="128,127 140,120 140,134" fill="#1a1a1a"/>
  <!-- Root block -->
  <rect x="145" y="105" width="110" height="45" rx="4" fill="#C41E3A"/>
  <text x="200" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#FFFFFF">-снеж-</text>
  <text x="200" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#E8A0A0">корень</text>
  <!-- Arrow -->
  <polygon points="258,127 270,120 270,134" fill="#1a1a1a"/>
  <!-- Suffix block -->
  <rect x="275" y="105" width="80" height="45" rx="4" fill="#D4A843"/>
  <text x="315" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="bold" fill="#1a1a1a">-ник</text>
  <text x="315" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a">суффикс</text>
  <!-- Word labels -->
  <text x="390" y="118" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a">= подснежник</text>
  <!-- Position indicators -->
  <text x="90" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2B4C7E">ПЕРЕД корнем</text>
  <text x="315" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#D4A843">ПОСЛЕ корня</text>
  <!-- Second word example: перелет -->
  <rect x="40" y="195" width="420" height="50" rx="6" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="1.5"/>
  <rect x="100" y="205" width="60" height="30" rx="3" fill="#2B4C7E"/>
  <text x="130" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#FFFFFF">пере-</text>
  <polygon points="163,220 173,215 173,225" fill="#1a1a1a"/>
  <rect x="178" y="205" width="80" height="30" rx="3" fill="#C41E3A"/>
  <text x="218" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#FFFFFF">-лет-</text>
  <text x="300" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">= перелететь</text>
  <!-- Third word example: домик -->
  <rect x="40" y="255" width="420" height="50" rx="6" fill="#FFFFFF" stroke="#D4A843" stroke-width="1.5"/>
  <rect x="110" y="265" width="70" height="30" rx="3" fill="#C41E3A"/>
  <text x="145" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#FFFFFF">дом-</text>
  <polygon points="183,280 193,275 193,285" fill="#1a1a1a"/>
  <rect x="198" y="265" width="65" height="30" rx="3" fill="#D4A843"/>
  <text x="230" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1a1a1a">-ик</text>
  <text x="310" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">= домик (уменьш.)</text>
  <!-- Subject name -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a">Русский язык -- 4 класс</text>
</svg>
