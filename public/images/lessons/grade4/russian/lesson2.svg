<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="60%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="220" fill="url(#skyGrad)"/>
  <circle cx="430" cy="50" r="35" fill="url(#sunGrad)" filter="url(#glow)"/>
  <path d="M80,40 Q90,25 100,40 Q110,25 120,40" fill="white" opacity="0.7"/>
  <path d="M200,55 Q212,38 224,55 Q236,38 248,55" fill="white" opacity="0.6"/>
  <path d="M340,30 Q348,20 356,30 Q364,20 372,30" fill="white" opacity="0.5"/><path d="M0,270 Q125,255 250,270 Q375,280 500,270 L500,350 L0,350 Z" fill="url(#groundGrad)"/>
  <path d="M0,275 Q125,260 250,275 Q375,285 500,275" fill="#66BB6A" opacity="0.3"/>
  <g transform="translate(40,40)" filter="url(#softShadow)">
    <rect width="420" height="220" rx="12" fill="white" opacity="0.94"/>
    <rect width="420" height="28" rx="12" fill="#D32F2F" opacity="0.9"/>
    <rect y="20" width="420" height="8" fill="#D32F2F" opacity="0.9"/>
    <text x="210" y="19" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">ГЛАВНЫЕ ЧЛЕНЫ ПРЕДЛОЖЕНИЯ</text>
    <g transform="translate(15,40)">
      <rect width="390" height="35" rx="6" fill="#FFEBEE" opacity="0.4" stroke="#D32F2F" stroke-width="1"/>
      <text x="195" y="23" font-family="Arial" font-size="13" fill="#B71C1C" text-anchor="middle" font-weight="bold">Солнце освещает поле.</text>
    </g>
    <g transform="translate(20,90)">
      <rect width="180" height="110" rx="8" fill="#D32F2F" opacity="0.08" stroke="#D32F2F" stroke-width="2"/>
      <text x="90" y="22" font-family="Arial" font-size="11" fill="#D32F2F" text-anchor="middle" font-weight="bold">ПОДЛЕЖАЩЕЕ</text>
      <line x1="20" y1="30" x2="160" y2="30" stroke="#D32F2F" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="90" y="50" font-family="Arial" font-size="16" fill="#B71C1C" text-anchor="middle" font-weight="bold">Солнце</text>
      <text x="90" y="70" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Кто? Что?</text>
      <text x="90" y="90" font-family="Arial" font-size="8" fill="#D32F2F" text-anchor="middle">Предмет, о котором</text>
      <text x="90" y="102" font-family="Arial" font-size="8" fill="#D32F2F" text-anchor="middle">говорится в предложении</text>
    </g>
    <g transform="translate(220,90)">
      <rect width="180" height="110" rx="8" fill="#EF5350" opacity="0.08" stroke="#D32F2F" stroke-width="2"/>
      <text x="90" y="22" font-family="Arial" font-size="11" fill="#D32F2F" text-anchor="middle" font-weight="bold">СКАЗУЕМОЕ</text>
      <line x1="20" y1="30" x2="160" y2="30" stroke="#D32F2F" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="90" y="50" font-family="Arial" font-size="16" fill="#B71C1C" text-anchor="middle" font-weight="bold">освещает</text>
      <text x="90" y="70" font-family="Arial" font-size="9" fill="#555" text-anchor="middle">Что делает?</text>
      <text x="90" y="90" font-family="Arial" font-size="8" fill="#D32F2F" text-anchor="middle">Что говорится о</text>
      <text x="90" y="102" font-family="Arial" font-size="8" fill="#D32F2F" text-anchor="middle">подлежащем</text>
    </g>
  </g>
  <rect x="0" y="318" width="500" height="32" rx="0" fill="#D32F2F" opacity="0.9"/>
  <text x="250" y="339" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Главные члены предложения</text>
</svg>