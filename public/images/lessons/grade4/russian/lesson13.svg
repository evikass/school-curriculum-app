<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect x="0" y="0" width="500" height="6" fill="#C41E3A"/>
  <rect x="0" y="310" width="500" height="4" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Разделительные Ь и Ъ</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">Мягкий и твёрдый разделительные знаки</text>
  <!-- Left column: Soft sign -->
  <rect x="30" y="90" width="210" height="200" rx="8" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="2.5"/>
  <!-- Soft sign header -->
  <rect x="30" y="90" width="210" height="40" rx="8" fill="#2B4C7E"/>
  <rect x="30" y="118" width="210" height="12" fill="#2B4C7E"/>
  <text x="135" y="117" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#FFFFFF">Ь</text>
  <!-- Soft sign description -->
  <text x="135" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2B4C7E">В корне слова</text>
  <text x="135" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a">Перед е, ё, ю, я, и</text>
  <!-- Examples -->
  <rect x="50" y="182" width="170" height="22" rx="3" fill="#A0C4E8"/>
  <text x="135" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">с<tspan font-weight="bold" fill="#2B4C7E">ь</tspan>емья</text>
  <rect x="50" y="210" width="170" height="22" rx="3" fill="#A0C4E8"/>
  <text x="135" y="226" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">вь<tspan font-weight="bold" fill="#2B4C7E">ь</tspan>юга</text>
  <rect x="50" y="238" width="170" height="22" rx="3" fill="#A0C4E8"/>
  <text x="135" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">лист<tspan font-weight="bold" fill="#2B4C7E">ь</tspan>я</text>
  <rect x="50" y="266" width="170" height="18" rx="3" fill="#A0C4E8"/>
  <text x="135" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">пь<tspan font-weight="bold" fill="#2B4C7E">ь</tspan>ю</text>
  <!-- Right column: Hard sign -->
  <rect x="260" y="90" width="210" height="200" rx="8" fill="#FFFFFF" stroke="#C41E3A" stroke-width="2.5"/>
  <!-- Hard sign header -->
  <rect x="260" y="90" width="210" height="40" rx="8" fill="#C41E3A"/>
  <rect x="260" y="118" width="210" height="12" fill="#C41E3A"/>
  <text x="365" y="117" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#FFFFFF">Ъ</text>
  <!-- Hard sign description -->
  <text x="365" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C41E3A">После приставки</text>
  <text x="365" y="168" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a">Перед е, ё, ю, я</text>
  <!-- Examples -->
  <rect x="280" y="182" width="170" height="22" rx="3" fill="#E8A0A0"/>
  <text x="365" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">под<tspan font-weight="bold" fill="#C41E3A">ъ</tspan>езд</text>
  <rect x="280" y="210" width="170" height="22" rx="3" fill="#E8A0A0"/>
  <text x="365" y="226" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">с<tspan font-weight="bold" fill="#C41E3A">ъ</tspan>езд</text>
  <rect x="280" y="238" width="170" height="22" rx="3" fill="#E8A0A0"/>
  <text x="365" y="254" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">об<tspan font-weight="bold" fill="#C41E3A">ъ</tspan>явление</text>
  <rect x="280" y="266" width="170" height="18" rx="3" fill="#E8A0A0"/>
  <text x="365" y="280" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">под<tspan font-weight="bold" fill="#C41E3A">ъ</tspan>ём</text>
  <!-- VS divider -->
  <circle cx="250" cy="190" r="16" fill="#D4A843"/>
  <text x="250" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">VS</text>
  <!-- Bottom note -->
  <text x="250" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a">После разделительного знака всегда слышится звук [й]</text>
  <!-- Subject name -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a">Русский язык -- 4 класс</text>
</svg>
