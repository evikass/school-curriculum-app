<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect x="0" y="0" width="500" height="6" fill="#C41E3A"/>
  <rect x="0" y="310" width="500" height="4" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Местоимение</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">Указывает на предметы, но не называет их</text>
  <!-- Large pointing hand -->
  <g transform="translate(200, 95)">
    <!-- Hand shape -->
    <rect x="15" y="40" width="50" height="60" rx="8" fill="#E8C090" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Pointing finger -->
    <rect x="55" y="15" width="14" height="45" rx="7" fill="#E8C090" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Other fingers -->
    <rect x="38" y="10" width="12" height="35" rx="6" fill="#E8C090" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="24" y="8" width="12" height="32" rx="6" fill="#E8C090" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="10" y="12" width="12" height="28" rx="6" fill="#E8C090" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Thumb -->
    <rect x="0" y="45" width="18" height="12" rx="6" fill="#E8C090" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <!-- Arrow from hand -->
  <line x1="275" y1="140" x2="340" y2="140" stroke="#C41E3A" stroke-width="2.5"/>
  <polygon points="338,135 348,140 338,145" fill="#C41E3A"/>
  <!-- Question mark at arrow end -->
  <circle cx="365" cy="140" r="22" fill="#C41E3A"/>
  <text x="365" y="148" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#FFFFFF">?</text>
  <!-- Person table - personal pronouns -->
  <rect x="40" y="190" width="420" height="100" rx="6" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="40" y="190" width="420" height="25" rx="6" fill="#2B4C7E"/>
  <rect x="40" y="205" width="420" height="10" fill="#2B4C7E"/>
  <text x="145" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Единственное число</text>
  <text x="365" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Множественное число</text>
  <!-- 1st person -->
  <rect x="50" y="222" width="60" height="20" rx="3" fill="#C41E3A" opacity="0.9"/>
  <text x="80" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">1 лицо</text>
  <rect x="120" y="222" width="50" height="20" rx="3" fill="#E8A0A0"/>
  <text x="145" y="236" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1a1a1a">я</text>
  <rect x="310" y="222" width="60" height="20" rx="3" fill="#A0C4E8"/>
  <text x="340" y="236" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1a1a1a">мы</text>
  <!-- 2nd person -->
  <rect x="50" y="248" width="60" height="20" rx="3" fill="#C41E3A" opacity="0.9"/>
  <text x="80" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF">2 лицо</text>
  <rect x="120" y="248" width="50" height="20" rx="3" fill="#E8A0A0"/>
  <text x="145" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1a1a1a">ты</text>
  <rect x="310" y="248" width="60" height="20" rx="3" fill="#A0C4E8"/>
  <text x="340" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#1a1a1a">вы</text>
  <!-- 3rd person -->
  <rect x="50" y="274" width="60" height="14" rx="3" fill="#C41E3A" opacity="0.9"/>
  <text x="80" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#FFFFFF">3 лицо</text>
  <rect x="120" y="274" width="50" height="14" rx="3" fill="#E8A0A0"/>
  <text x="145" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#1a1a1a">он она оно</text>
  <rect x="310" y="274" width="60" height="14" rx="3" fill="#A0C4E8"/>
  <text x="340" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="12" font-weight="bold" fill="#1a1a1a">они</text>
  <!-- Note -->
  <text x="250" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a">После предлогов к 3-му лицу добавляется н: к нему, от неё</text>
  <!-- Subject name -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a">Русский язык -- 4 класс</text>
</svg>
