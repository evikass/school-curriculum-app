<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect x="0" y="0" width="500" height="6" fill="#C41E3A"/>
  <rect x="0" y="310" width="500" height="4" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Имя прилагательное</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">Часть речи, обозначающая признак предмета (какой? чей?)</text>
  <!-- Question badge -->
  <circle cx="90" cy="100" r="24" fill="#C41E3A"/>
  <text x="90" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FFFFFF">Какой?</text>
  <circle cx="410" cy="100" r="24" fill="#2B4C7E"/>
  <text x="410" y="105" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#FFFFFF">Чей?</text>
  <!-- Paint palette -->
  <ellipse cx="250" cy="180" rx="100" ry="55" fill="#D4C4A0" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="250" cy="180" rx="75" ry="35" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Color blobs on palette -->
  <circle cx="185" cy="155" r="14" fill="#C41E3A"/>
  <circle cx="220" cy="145" r="14" fill="#2B4C7E"/>
  <circle cx="255" cy="142" r="14" fill="#4A8B3F"/>
  <circle cx="290" cy="148" r="14" fill="#D4A843"/>
  <circle cx="318" cy="160" r="14" fill="#9B59B6"/>
  <!-- Adjective labels pointing to colors -->
  <text x="185" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#C41E3A">красный</text>
  <text x="220" y="120" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#2B4C7E">синий</text>
  <text x="255" y="118" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#4A8B3F">зелёный</text>
  <text x="290" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#D4A843">золотой</text>
  <text x="318" y="137" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#9B59B6">фиолетовый</text>
  <!-- Agreement examples -->
  <rect x="40" y="245" width="420" height="50" rx="5" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="250" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">Согласование с существительным:</text>
  <text x="120" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2B4C7E">красив-<tspan fill="#C41E3A" font-weight="bold">ый</tspan> дом</text>
  <text x="260" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2B4C7E">красив-<tspan fill="#C41E3A" font-weight="bold">ая</tspan> картина</text>
  <text x="400" y="284" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#2B4C7E">красив-<tspan fill="#C41E3A" font-weight="bold">ое</tspan> небо</text>
  <!-- Subject name -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a">Русский язык -- 4 класс</text>
</svg>
