<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top decorative band -->
  <rect x="0" y="0" width="500" height="6" fill="#C41E3A"/>
  <!-- Bottom decorative band -->
  <rect x="0" y="310" width="500" height="4" fill="#D4A843"/>
  <!-- Red accent lines top left -->
  <rect x="15" y="85" width="4" height="60" fill="#C41E3A"/>
  <rect x="15" y="85" width="30" height="4" fill="#C41E3A"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Что такое предложение</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">Законченная мысль, выраженная словами</text>
  <!-- Large book in center -->
  <rect x="170" y="100" width="160" height="120" rx="4" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="170" y="100" width="80" height="120" rx="4" fill="#3A5C8E" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="250" y1="100" x2="250" y2="220" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Book spine -->
  <rect x="164" y="100" width="8" height="120" rx="2" fill="#1a1a1a"/>
  <!-- Text lines on left page -->
  <line x1="185" y1="125" x2="235" y2="125" stroke="#F5E6C8" stroke-width="2"/>
  <line x1="185" y1="140" x2="230" y2="140" stroke="#F5E6C8" stroke-width="2"/>
  <line x1="185" y1="155" x2="220" y2="155" stroke="#F5E6C8" stroke-width="2"/>
  <line x1="185" y1="170" x2="233" y2="170" stroke="#F5E6C8" stroke-width="2"/>
  <line x1="185" y1="185" x2="225" y2="185" stroke="#F5E6C8" stroke-width="2"/>
  <!-- Text lines on right page -->
  <line x1="265" y1="125" x2="315" y2="125" stroke="#F5E6C8" stroke-width="2"/>
  <line x1="265" y1="140" x2="310" y2="140" stroke="#F5E6C8" stroke-width="2"/>
  <line x1="265" y1="155" x2="300" y2="155" stroke="#F5E6C8" stroke-width="2"/>
  <line x1="265" y1="170" x2="308" y2="170" stroke="#F5E6C8" stroke-width="2"/>
  <line x1="265" y1="185" x2="312" y2="185" stroke="#F5E6C8" stroke-width="2"/>
  <!-- Punctuation marks floating around -->
  <!-- Period -->
  <circle cx="80" cy="130" r="22" fill="#C41E3A"/>
  <text x="80" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#FFFFFF">.</text>
  <!-- Question mark -->
  <circle cx="420" cy="130" r="22" fill="#D4A843"/>
  <text x="420" y="140" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#1a1a1a">?</text>
  <!-- Exclamation mark -->
  <circle cx="80" cy="195" r="22" fill="#2B4C7E"/>
  <text x="80" y="206" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#FFFFFF">!</text>
  <!-- Three dots (ellipsis) -->
  <circle cx="420" cy="195" r="22" fill="#E8D5A0"/>
  <text x="420" y="201" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#1a1a1a">...</text>
  <!-- Connecting arrows from punctuation to book -->
  <line x1="102" y1="130" x2="165" y2="145" stroke="#C41E3A" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="398" y1="130" x2="335" y2="145" stroke="#D4A843" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="102" y1="195" x2="165" y2="175" stroke="#2B4C7E" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="398" y1="195" x2="335" y2="175" stroke="#E8D5A0" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Sentence types labels -->
  <rect x="55" y="245" width="130" height="24" rx="4" fill="#C41E3A" opacity="0.9"/>
  <text x="120" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Повествовательное</text>
  <rect x="200" y="245" width="110" height="24" rx="4" fill="#2B4C7E" opacity="0.9"/>
  <text x="255" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Вопросительное</text>
  <rect x="325" y="245" width="120" height="24" rx="4" fill="#D4A843" opacity="0.9"/>
  <text x="385" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">Побудительное</text>
  <!-- Small sentences example -->
  <text x="120" y="289" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#1a1a1a" font-style="italic">Сегодня хорошая погода.</text>
  <text x="255" y="289" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#1a1a1a" font-style="italic">Ты пойдёшь гулять?</text>
  <text x="385" y="289" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#1a1a1a" font-style="italic">Открой окно!</text>
  <!-- Subject name -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a">Русский язык -- 4 класс</text>
</svg>
