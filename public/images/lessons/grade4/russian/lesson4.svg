<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect x="0" y="0" width="500" height="6" fill="#C41E3A"/>
  <rect x="0" y="310" width="500" height="4" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Корень слова</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">Главная значимая часть слова</text>
  <!-- Large tree -->
  <!-- Trunk -->
  <rect x="235" y="140" width="30" height="80" fill="#8B6914"/>
  <!-- Roots -->
  <path d="M 235 220 Q 220 250 190 270" stroke="#8B6914" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 235 220 Q 225 255 210 280" stroke="#8B6914" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 265 220 Q 280 250 310 270" stroke="#8B6914" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 265 220 Q 275 255 290 280" stroke="#8B6914" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 250 220 Q 250 260 250 285" stroke="#8B6914" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Crown - large circle -->
  <circle cx="250" cy="110" r="65" fill="#4A8B3F"/>
  <circle cx="215" cy="125" r="40" fill="#3A7B2F"/>
  <circle cx="285" cy="125" r="40" fill="#3A7B2F"/>
  <circle cx="250" cy="85" r="40" fill="#5A9B4F"/>
  <!-- Root label -->
  <rect x="200" y="230" width="100" height="24" rx="4" fill="#C41E3A"/>
  <text x="250" y="247" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">КОРЕНЬ</text>
  <!-- Related words branching from tree -->
  <!-- Left branch -->
  <line x1="185" y1="110" x2="70" y2="90" stroke="#4A8B3F" stroke-width="2"/>
  <rect x="15" y="78" width="70" height="22" rx="4" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="1.5"/>
  <text x="50" y="93" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">лес</text>
  <line x1="185" y1="120" x2="70" y2="130" stroke="#4A8B3F" stroke-width="2"/>
  <rect x="10" y="120" width="80" height="22" rx="4" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="1.5"/>
  <text x="50" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">лесник</text>
  <!-- Right branch -->
  <line x1="315" y1="110" x2="430" y2="90" stroke="#4A8B3F" stroke-width="2"/>
  <rect x="415" y="78" width="75" height="22" rx="4" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="1.5"/>
  <text x="452" y="93" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">лесной</text>
  <line x1="315" y1="120" x2="430" y2="130" stroke="#4A8B3F" stroke-width="2"/>
  <rect x="408" y="120" width="85" height="22" rx="4" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="1.5"/>
  <text x="450" y="135" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#1a1a1a">перелесок</text>
  <!-- Highlighted root in each word -->
  <!-- "лес" highlighted in the word boxes is already shown -->
  <!-- Bottom explanation -->
  <rect x="60" y="290" width="380" height="20" rx="3" fill="#E8D5A0"/>
  <text x="250" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a">Однокоренные слова имеют общий корень -лес- и общее значение</text>
  <!-- Subject name -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a">Русский язык -- 4 класс</text>
</svg>
