<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect x="0" y="0" width="500" height="6" fill="#C41E3A"/>
  <rect x="0" y="310" width="500" height="4" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Окончание слова</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a">Изменяемая часть слова для связи в предложении</text>
  <!-- Central word: СТОЛ with changing endings -->
  <!-- Base word -->
  <rect x="180" y="90" width="140" height="50" rx="6" fill="#C41E3A"/>
  <text x="250" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="26" font-weight="bold" fill="#FFFFFF">СТОЛ</text>
  <!-- Radiating lines to word forms -->
  <line x1="220" y1="140" x2="100" y2="175" stroke="#D4A843" stroke-width="2"/>
  <line x1="250" y1="140" x2="250" y2="175" stroke="#D4A843" stroke-width="2"/>
  <line x1="280" y1="140" x2="400" y2="175" stroke="#D4A843" stroke-width="2"/>
  <line x1="220" y1="140" x2="100" y2="240" stroke="#D4A843" stroke-width="2"/>
  <line x1="250" y1="140" x2="250" y2="240" stroke="#D4A843" stroke-width="2"/>
  <line x1="280" y1="140" x2="400" y2="240" stroke="#D4A843" stroke-width="2"/>
  <!-- Word forms row 1 -->
  <rect x="45" y="175" width="110" height="36" rx="4" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="1.5"/>
  <text x="100" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">стол-<tspan fill="#C41E3A" font-weight="bold">а</tspan></text>
  <text x="100" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2B4C7E">Р.п.</text>
  <rect x="195" y="175" width="110" height="36" rx="4" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="1.5"/>
  <text x="250" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">стол-<tspan fill="#C41E3A" font-weight="bold">у</tspan></text>
  <text x="250" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2B4C7E">Д.п.</text>
  <rect x="345" y="175" width="110" height="36" rx="4" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="1.5"/>
  <text x="400" y="190" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">стол-<tspan fill="#C41E3A" font-weight="bold">ом</tspan></text>
  <text x="400" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2B4C7E">Т.п.</text>
  <!-- Word forms row 2 -->
  <rect x="45" y="240" width="110" height="36" rx="4" fill="#FFFFFF" stroke="#D4A843" stroke-width="1.5"/>
  <text x="100" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">стол-<tspan fill="#C41E3A" font-weight="bold">ы</tspan></text>
  <text x="100" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#D4A843">мн.ч. И.п.</text>
  <rect x="195" y="240" width="110" height="36" rx="4" fill="#FFFFFF" stroke="#D4A843" stroke-width="1.5"/>
  <text x="250" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">о стол-<tspan fill="#C41E3A" font-weight="bold">е</tspan></text>
  <text x="250" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#D4A843">П.п.</text>
  <rect x="345" y="240" width="110" height="36" rx="4" fill="#FFFFFF" stroke="#D4A843" stroke-width="1.5"/>
  <text x="400" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#1a1a1a">стол-<tspan fill="#C41E3A" font-weight="bold">ом</tspan></text>
  <text x="400" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#D4A843">П.п. (о ком?)</text>
  <!-- Zero ending note -->
  <rect x="140" y="288" width="220" height="22" rx="3" fill="#E8A0A0"/>
  <text x="250" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1a1a1a">Нулевое окончание: стол (нет звука)</text>
  <!-- Subject name -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1a1a1a">Русский язык -- 4 класс</text>
</svg>
