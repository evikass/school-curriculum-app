  <line x1="175" y1="230" x2="220" y2="227" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <line x1="265" y1="197" x2="325" y2="200" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <line x1="265" y1="212" x2="325" y2="215" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <line x1="265" y1="227" x2="310" y2="230" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
