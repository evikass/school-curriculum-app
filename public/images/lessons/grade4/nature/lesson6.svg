<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Царство грибов</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">Отдельное царство живой природы</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Forest floor background -->
  <path d="M20,250 Q80,240 150,248 Q220,238 300,245 Q380,235 480,250 L480,310 L20,310 Z" fill="#5D4037" opacity="0.1"/>
  
  <!-- Moss/ground details -->
  <circle cx="60" cy="265" r="3" fill="#2E7D32" opacity="0.2"/>
  <circle cx="180" cy="258" r="4" fill="#2E7D32" opacity="0.15"/>
  <circle cx="350" cy="255" r="3" fill="#2E7D32" opacity="0.2"/>
  <circle cx="440" cy="262" r="3.5" fill="#2E7D32" opacity="0.15"/>
  
  <!-- Fly agaric (мухомор) - left -->
  <g transform="translate(80, 130)">
    <!-- Stem -->
    <rect x="15" y="55" width="14" height="55" rx="5" fill="#FAFAFA" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Skirt -->
    <ellipse cx="22" cy="70" rx="14" ry="4" fill="#F5F5F5" stroke="#1a1a1a" stroke-width="0.8"/>
    <!-- Cap -->
    <path d="M0,58 Q5,25 22,18 Q39,25 44,58 Z" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- White spots on cap -->
    <circle cx="15" cy="38" r="4" fill="white" opacity="0.9"/>
    <circle cx="30" cy="35" r="3.5" fill="white" opacity="0.9"/>
    <circle cx="22" cy="28" r="3" fill="white" opacity="0.9"/>
    <circle cx="10" cy="50" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="35" cy="48" r="3" fill="white" opacity="0.8"/>
  </g>
  <!-- Warning label -->
  <rect x="55" y="250" width="55" height="18" rx="3" fill="#C41E3A" opacity="0.15"/>
  <text x="82" y="263" font-family="Arial" font-size="8" fill="#C41E3A" text-anchor="middle" font-weight="bold">Ядовитый!</text>
  
  <!-- Porcini (боровик) - center, large -->
  <g transform="translate(200, 115)">
    <!-- Stem -->
    <rect x="18" y="65" width="20" height="65" rx="7" fill="#EFEBE9" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Cap -->
    <path d="M-2,68 Q8,20 28,12 Q48,20 58,68 Z" fill="#8D6E63" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Cap top highlight -->
    <path d="M8,30 Q28,22 48,30" fill="none" stroke="#A1887F" stroke-width="1" opacity="0.6"/>
    <!-- Pores under cap -->
    <ellipse cx="28" cy="66" rx="26" ry="5" fill="#D7CCC8" opacity="0.5"/>
  </g>
  <text x="228" y="260" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Белый гриб</text>
  
  <!-- Birch boletus (подберёзовик) - right -->
  <g transform="translate(340, 140)">
    <!-- Stem with scales -->
    <rect x="13" y="45" width="12" height="50" rx="4" fill="#EFEBE9" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="13" y1="55" x2="25" y2="53" stroke="#BDBDBD" stroke-width="0.8"/>
    <line x1="13" y1="62" x2="25" y2="60" stroke="#BDBDBD" stroke-width="0.8"/>
    <line x1="13" y1="69" x2="25" y2="67" stroke="#BDBDBD" stroke-width="0.8"/>
    <line x1="13" y1="76" x2="25" y2="74" stroke="#BDBDBD" stroke-width="0.8"/>
    <!-- Cap -->
    <path d="M0,48 Q5,20 19,14 Q33,20 38,48 Z" fill="#5D4037" stroke="#1a1a1a" stroke-width="1.2"/>
  </g>
  <text x="359" y="260" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle">Подберёзовик</text>
  
  <!-- Chanterelle (лисичка) - far right -->
  <g transform="translate(420, 150)">
    <!-- Stem -->
    <rect x="10" y="42" width="10" height="40" rx="3" fill="#F9A825" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Cap - funnel shape -->
    <path d="M0,45 Q5,18 15,14 Q25,18 30,45 Q15,38 0,45 Z" fill="#FBC02D" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Wavy cap edge -->
    <path d="M0,45 Q5,48 10,44 Q15,48 20,44 Q25,48 30,45" fill="none" stroke="#F57F17" stroke-width="1"/>
  </g>
  <text x="435" y="260" font-family="Arial" font-size="9" fill="#2E7D32" text-anchor="middle">Лисичка</text>
  
  <!-- Cross-section diagram box -->
  <rect x="50" y="86" width="90" height="45" rx="4" fill="white" opacity="0.5" stroke="#1a1a1a" stroke-width="1"/>
  <text x="95" y="97" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Строение гриба</text>
  <!-- Mini mushroom cross-section -->
  <path d="M65,110 Q70,95 85,92 Q100,95 105,110 Z" fill="#8D6E63" stroke="#1a1a1a" stroke-width="0.8"/>
  <rect x="80" y="110" width="10" height="15" rx="3" fill="#EFEBE9" stroke="#1a1a1a" stroke-width="0.8"/>
  <!-- Mycelium lines -->
  <path d="M78,125 Q70,130 60,132" fill="none" stroke="#5D4037" stroke-width="0.8" opacity="0.5"/>
  <path d="M92,125 Q100,130 110,132" fill="none" stroke="#5D4037" stroke-width="0.8" opacity="0.5"/>
  <text x="60" y="129" font-family="Arial" font-size="6" fill="#666">грибница</text>
  <text x="88" y="103" font-family="Arial" font-size="6" fill="#666">шляпка</text>
  <text x="105" y="120" font-family="Arial" font-size="6" fill="#666">ножка</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>