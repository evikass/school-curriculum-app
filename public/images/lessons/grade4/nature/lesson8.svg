<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Царство животных</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">От простейших до млекопитающих</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Ecological pyramid of animals -->
  
  <!-- Pyramid background -->
  <polygon points="250,100 80,300 420,300" fill="white" opacity="0.3" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Level 5 (top) - Mammals (Млекопитающие) -->
  <polygon points="250,120 220,165 280,165" fill="#C41E3A" opacity="0.12" stroke="#C41E3A" stroke-width="0.5"/>
  <!-- Lion silhouette -->
  <g transform="translate(235, 125)">
    <circle cx="8" cy="5" r="6" fill="#D4A843" opacity="0.7"/>
    <ellipse cx="12" cy="16" rx="7" ry="5" fill="#D4A843" opacity="0.6"/>
    <line x1="5" y1="20" x2="4" y2="30" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="15" y1="20" x2="16" y2="30" stroke="#D4A843" stroke-width="1.5"/>
  </g>
  <text x="330" y="148" font-family="Arial" font-size="9" fill="#C41E3A" font-weight="bold">Млекопитающие</text>
  <text x="330" y="160" font-family="Arial" font-size="7" fill="#666">Волк, кит, человек</text>
  
  <!-- Level 4 - Birds (Птицы) -->
  <polygon points="218,168 190,213 310,213 282,168" fill="#2B4C7E" opacity="0.08" stroke="#2B4C7E" stroke-width="0.5"/>
  <!-- Bird silhouette -->
  <g transform="translate(235, 180)">
    <ellipse cx="10" cy="5" rx="8" ry="4" fill="#2B4C7E" opacity="0.5"/>
    <circle cx="18" cy="3" r="3" fill="#2B4C7E" opacity="0.5"/>
    <path d="M2,3 L-8,-2 L-5,3" fill="#2B4C7E" opacity="0.4"/>
    <line x1="8" y1="9" x2="7" y2="18" stroke="#2B4C7E" stroke-width="1"/>
    <line x1="13" y1="9" x2="14" y2="18" stroke="#2B4C7E" stroke-width="1"/>
  </g>
  <text x="340" y="195" font-family="Arial" font-size="9" fill="#2B4C7E" font-weight="bold">Птицы</text>
  <text x="340" y="207" font-family="Arial" font-size="7" fill="#666">Воробей, орёл</text>
  
  <!-- Level 3 - Fish & Amphibians (Рыбы, земноводные) -->
  <polygon points="188,216 160,261 340,261 312,216" fill="#00796B" opacity="0.08" stroke="#00796B" stroke-width="0.5"/>
  <!-- Fish silhouette -->
  <g transform="translate(220, 230)">
    <ellipse cx="12" cy="5" rx="12" ry="5" fill="#00796B" opacity="0.5"/>
    <polygon points="24,5 30,0 30,10" fill="#00796B" opacity="0.4"/>
    <circle cx="6" cy="4" r="1.5" fill="#1a1a1a"/>
  </g>
  <!-- Frog silhouette -->
  <g transform="translate(260, 235)">
    <ellipse cx="8" cy="5" rx="8" ry="5" fill="#2E7D32" opacity="0.5"/>
    <circle cx="5" cy="1" r="3" fill="#2E7D32" opacity="0.5"/>
    <circle cx="11" cy="1" r="3" fill="#2E7D32" opacity="0.5"/>
    <circle cx="5" cy="0" r="1.5" fill="#1a1a1a"/>
    <circle cx="11" cy="0" r="1.5" fill="#1a1a1a"/>
  </g>
  <text x="350" y="242" font-family="Arial" font-size="9" fill="#00796B" font-weight="bold">Рыбы, земноводные</text>
  <text x="350" y="254" font-family="Arial" font-size="7" fill="#666">Щука, лягушка</text>
  
  <!-- Level 2 - Invertebrates (Членистоногие, черви) -->
  <polygon points="158,264 130,300 370,300 342,264" fill="#EF6C00" opacity="0.08" stroke="#EF6C00" stroke-width="0.5"/>
  <!-- Butterfly -->
  <g transform="translate(200, 275)">
    <ellipse cx="8" cy="5" rx="2" ry="5" fill="#1a1a1a" opacity="0.4"/>
    <ellipse cx="4" cy="3" rx="6" ry="4" fill="#C41E3A" opacity="0.3"/>
    <ellipse cx="12" cy="3" rx="6" ry="4" fill="#D4A843" opacity="0.3"/>
    <ellipse cx="5" cy="8" rx="4" ry="3" fill="#C41E3A" opacity="0.25"/>
    <ellipse cx="11" cy="8" rx="4" ry="3" fill="#D4A843" opacity="0.25"/>
  </g>
  <!-- Worm -->
  <path d="M250,288 Q255,283 260,288 Q265,283 270,288 Q275,283 280,288" fill="none" stroke="#5D4037" stroke-width="2.5" opacity="0.5"/>
  <text x="355" y="288" font-family="Arial" font-size="9" fill="#EF6C00" font-weight="bold">Членистоногие, черви</text>
  <text x="355" y="300" font-family="Arial" font-size="7" fill="#666">Насекомые, улитки</text>
  
  <!-- Level labels on left side -->
  <text x="75" y="148" font-family="Arial" font-size="8" fill="#999" text-anchor="end">Сложные</text>
  <text x="75" y="298" font-family="Arial" font-size="8" fill="#999" text-anchor="end">Простые</text>
  
  <!-- Side bar indicator -->
  <line x1="82" y1="155" x2="82" y2="290" stroke="#1a1a1a" stroke-width="1" opacity="0.15"/>
  <polygon points="82,155 79,162 85,162" fill="#1a1a1a" opacity="0.15"/>
  <polygon points="82,290 79,283 85,283" fill="#1a1a1a" opacity="0.15"/>
  
  <!-- Total count -->
  <rect x="130" y="86" width="240" height="16" rx="3" fill="#1a1a1a" opacity="0.05"/>
  <text x="250" y="97" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">На Земле более 1,5 млн видов животных</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>