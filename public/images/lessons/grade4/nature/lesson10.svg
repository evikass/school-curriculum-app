<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Лес как экосистема</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">Ярусы и жители леса</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Forest layers (ярусы) -->
  
  <!-- Layer background bands -->
  <rect x="40" y="100" width="420" height="40" rx="0" fill="#2B4C7E" opacity="0.03"/>
  <rect x="40" y="140" width="420" height="40" rx="0" fill="#2E7D32" opacity="0.04"/>
  <rect x="40" y="180" width="420" height="40" rx="0" fill="#2E7D32" opacity="0.03"/>
  <rect x="40" y="220" width="420" height="40" rx="0" fill="#5D4037" opacity="0.04"/>
  <!-- Soil -->
  <rect x="40" y="260" width="420" height="50" rx="0" fill="#A1887F" opacity="0.12"/>
  
  <!-- Layer separator lines -->
  <line x1="40" y1="140" x2="460" y2="140" stroke="#1a1a1a" stroke-width="0.5" opacity="0.15"/>
  <line x1="40" y1="180" x2="460" y2="180" stroke="#1a1a1a" stroke-width="0.5" opacity="0.15"/>
  <line x1="40" y1="220" x2="460" y2="220" stroke="#1a1a1a" stroke-width="0.5" opacity="0.15"/>
  <line x1="40" y1="260" x2="460" y2="260" stroke="#1a1a1a" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Layer labels on left -->
  <text x="48" y="124" font-family="Arial" font-size="8" fill="#1a1a1a" font-weight="bold">Древесный ярус</text>
  <text x="48" y="164" font-family="Arial" font-size="8" fill="#1a1a1a" font-weight="bold">Кустарниковый</text>
  <text x="48" y="204" font-family="Arial" font-size="8" fill="#1a1a1a" font-weight="bold">Травянистый</text>
  <text x="48" y="244" font-family="Arial" font-size="8" fill="#1a1a1a" font-weight="bold">Моховый ярус</text>
  
  <!-- Tall trees - top layer -->
  <g transform="translate(200, 85)">
    <rect x="12" y="35" width="10" height="40" fill="#5D4037"/>
    <polygon points="17,10 0,40 34,40" fill="#2E7D32" opacity="0.7"/>
    <polygon points="17,20 4,45 30,45" fill="#2E7D32" opacity="0.6"/>
  </g>
  <g transform="translate(280, 80)">
    <rect x="12" y="40" width="10" height="45" fill="#5D4037"/>
    <polygon points="17,15 0,45 34,45" fill="#2E7D32" opacity="0.65"/>
    <polygon points="17,25 4,50 30,50" fill="#2E7D32" opacity="0.55"/>
  </g>
  <g transform="translate(360, 90)">
    <rect x="12" y="30" width="10" height="35" fill="#5D4037"/>
    <polygon points="17,5 0,35 34,35" fill="#2E7D32" opacity="0.6"/>
    <polygon points="17,15 4,40 30,40" fill="#2E7D32" opacity="0.5"/>
  </g>
  
  <!-- Birds in canopy -->
  <g transform="translate(230, 105)">
    <ellipse cx="5" cy="3" rx="5" ry="2.5" fill="#5D4037" opacity="0.5"/>
    <path d="M0,3 L-5,0 L-3,3" fill="#5D4037" opacity="0.4"/>
    <circle cx="9" cy="2" r="2" fill="#5D4037" opacity="0.5"/>
  </g>
  <!-- Squirrel in tree -->
  <g transform="translate(265, 115)">
    <ellipse cx="5" cy="4" rx="4" ry="3" fill="#D7A86E" opacity="0.7"/>
    <circle cx="9" cy="1" r="3" fill="#D7A86E" opacity="0.7"/>
    <path d="M12,1 Q16,-3 14,1" fill="#D7A86E" opacity="0.6"/>
    <circle cx="10" cy="0" r="1" fill="#1a1a1a"/>
  </g>
  
  <!-- Bushes - second layer -->
  <circle cx="170" cy="158" r="18" fill="#2E7D32" opacity="0.35"/>
  <circle cx="190" cy="155" r="15" fill="#2E7D32" opacity="0.3"/>
  <circle cx="330" cy="160" r="16" fill="#2E7D32" opacity="0.3"/>
  <circle cx="350" cy="157" r="14" fill="#2E7D32" opacity="0.35"/>
  <circle cx="410" cy="158" r="12" fill="#2E7D32" opacity="0.3"/>
  <!-- Berries on bushes -->
  <circle cx="175" cy="152" r="2" fill="#C41E3A" opacity="0.7"/>
  <circle cx="180" cy="155" r="2" fill="#C41E3A" opacity="0.6"/>
  <circle cx="168" cy="156" r="2" fill="#C41E3A" opacity="0.7"/>
  <!-- Bird on bush -->
  <g transform="translate(340, 145)">
    <ellipse cx="4" cy="3" rx="4" ry="2" fill="#D4A843" opacity="0.5"/>
    <circle cx="8" cy="2" r="2" fill="#D4A843" opacity="0.5"/>
    <circle cx="9" cy="1.5" r="0.8" fill="#1a1a1a"/>
  </g>
  
  <!-- Grass and flowers - third layer -->
  <line x1="150" y1="210" x2="148" y2="195" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="155" y1="210" x2="158" y2="192" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="220" y1="210" x2="218" y2="193" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="225" y1="210" x2="228" y2="194" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="300" y1="210" x2="298" y2="195" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="380" y1="210" x2="382" y2="194" stroke="#2E7D32" stroke-width="1.2"/>
  <line x1="430" y1="210" x2="428" y2="196" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Small flowers -->
  <circle cx="148" cy="192" r="2.5" fill="#C41E3A" opacity="0.6"/>
  <circle cx="228" cy="192" r="2" fill="#D4A843" opacity="0.6"/>
  <circle cx="298" cy="193" r="2.5" fill="#2B4C7E" opacity="0.5"/>
  <!-- Butterfly -->
  <g transform="translate(240, 195)">
    <ellipse cx="4" cy="2" rx="1.5" ry="3" fill="#1a1a1a" opacity="0.3"/>
    <ellipse cx="2" cy="0" rx="4" ry="2.5" fill="#C41E3A" opacity="0.3"/>
    <ellipse cx="6" cy="0" rx="4" ry="2.5" fill="#D4A843" opacity="0.3"/>
  </g>
  
  <!-- Moss and mushrooms - fourth layer -->
  <circle cx="160" cy="250" r="4" fill="#2E7D32" opacity="0.2"/>
  <circle cx="250" cy="248" r="5" fill="#2E7D32" opacity="0.15"/>
  <circle cx="340" cy="250" r="4" fill="#2E7D32" opacity="0.2"/>
  <circle cx="400" cy="248" r="3" fill="#2E7D32" opacity="0.15"/>
  <!-- Small mushrooms -->
  <rect x="198" y="248" width="4" height="10" rx="2" fill="#EFEBE9"/>
  <path d="M192,250 Q196,242 200,240 Q204,242 208,250 Z" fill="#8D6E63" opacity="0.6"/>
  <rect x="290" y="246" width="3" height="8" rx="1.5" fill="#EFEBE9"/>
  <path d="M286,248 Q289,242 291.5,240 Q294,242 297,248 Z" fill="#A1887F" opacity="0.5"/>
  
  <!-- Underground mycelium -->
  <path d="M100,275 Q150,268 200,275 Q250,268 300,275 Q350,268 400,275" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.2"/>
  <path d="M120,285 Q180,278 240,285 Q300,278 380,285" fill="none" stroke="#5D4037" stroke-width="0.8" opacity="0.15"/>
  <!-- Roots -->
  <path d="M215,250 Q210,265 200,280" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.2"/>
  <path d="M215,250 Q220,270 230,282" fill="none" stroke="#5D4037" stroke-width="1" opacity="0.2"/>
  
  <!-- Fox between layers -->
  <g transform="translate(130, 195)">
    <ellipse cx="12" cy="12" rx="10" ry="7" fill="#E65100" opacity="0.5"/>
    <circle cx="22" cy="5" r="5" fill="#E65100" opacity="0.5"/>
    <polygon points="20,0 18,-5 22,0" fill="#E65100" opacity="0.4"/>
    <polygon points="24,0 26,-5 22,0" fill="#E65100" opacity="0.4"/>
    <circle cx="23" cy="4" r="1" fill="#1a1a1a"/>
    <line x1="5" y1="18" x2="3" y2="24" stroke="#E65100" stroke-width="1.5"/>
    <line x1="10" y1="18" x2="9" y2="24" stroke="#E65100" stroke-width="1.5"/>
    <line x1="15" y1="18" x2="16" y2="24" stroke="#E65100" stroke-width="1.5"/>
    <line x1="19" y1="18" x2="20" y2="24" stroke="#E65100" stroke-width="1.5"/>
    <!-- Tail -->
    <path d="M2,10 Q-6,5 -4,0" fill="none" stroke="#E65100" stroke-width="2" opacity="0.4"/>
    <circle cx="-4" cy="0" r="2.5" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>