<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Царство растений</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">Фотосинтез и группы растений</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Five plant groups in ascending order -->
  
  <!-- 1. Algae (водоросли) -->
  <rect x="25" y="90" width="80" height="75" rx="5" fill="#2B4C7E" opacity="0.06" stroke="#2B4C7E" stroke-width="0.8"/>
  <!-- Water waves -->
  <path d="M30,150 Q50,143 65,150 Q80,143 100,150" fill="none" stroke="#64B5F6" stroke-width="1.5"/>
  <path d="M30,155 Q50,148 65,155 Q80,148 100,155" fill="none" stroke="#64B5F6" stroke-width="1"/>
  <!-- Algae fronds -->
  <path d="M45,150 Q42,135 50,120 Q55,130 52,145" fill="#2E7D32" opacity="0.4"/>
  <path d="M65,150 Q60,130 70,115 Q75,128 68,145" fill="#2E7D32" opacity="0.35"/>
  <path d="M80,150 Q78,138 85,125 Q88,135 83,148" fill="#2E7D32" opacity="0.4"/>
  <text x="65" y="163" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Водоросли</text>
  
  <!-- 2. Moss (мхи) -->
  <rect x="115" y="90" width="80" height="75" rx="5" fill="#2E7D32" opacity="0.06" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Ground -->
  <path d="M120,150 L190,150 L190,160 L120,160 Z" fill="#A1887F" opacity="0.3"/>
  <!-- Moss tufts -->
  <line x1="135" y1="150" x2="133" y2="125" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="140" y1="150" x2="142" y2="120" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="148" y1="150" x2="146" y2="118" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="155" y1="150" x2="157" y2="122" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="162" y1="150" x2="160" y2="125" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="170" y1="150" x2="172" y2="120" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="178" y1="150" x2="176" y2="128" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Spore capsules -->
  <ellipse cx="146" cy="115" rx="3" ry="5" fill="#5D4037" opacity="0.6"/>
  <ellipse cx="157" cy="119" rx="2.5" ry="4" fill="#5D4037" opacity="0.6"/>
  <text x="155" y="163" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Мхи</text>
  
  <!-- 3. Fern (папоротники) -->
  <rect x="205" y="90" width="80" height="75" rx="5" fill="#2E7D32" opacity="0.06" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Fern fronds -->
  <path d="M245,155 Q240,130 235,105" fill="none" stroke="#2E7D32" stroke-width="2"/>
  <!-- Leaflets left -->
  <path d="M242,140 Q230,138 225,135" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <path d="M240,130 Q228,127 224,124" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <path d="M238,120 Q228,116 225,113" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Leaflets right -->
  <path d="M238,140 Q248,138 252,135" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <path d="M236,130 Q248,127 252,124" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <path d="M235,120 Q245,116 250,113" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Second frond -->
  <path d="M250,155 Q255,132 260,108" fill="none" stroke="#2E7D32" stroke-width="2" opacity="0.7"/>
  <path d="M253,140 Q263,137 268,133" fill="none" stroke="#2E7D32" stroke-width="1" opacity="0.7"/>
  <path d="M255,130 Q265,126 269,122" fill="none" stroke="#2E7D32" stroke-width="1" opacity="0.7"/>
  <text x="245" y="163" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Папоротники</text>
  
  <!-- 4. Conifer (хвойные) -->
  <rect x="295" y="90" width="80" height="75" rx="5" fill="#2E7D32" opacity="0.06" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Trunk -->
  <rect x="332" y="140" width="8" height="18" fill="#5D4037"/>
  <!-- Triangle tree layers -->
  <polygon points="336,100 315,135 357,135" fill="#2E7D32" opacity="0.7" stroke="#2E7D32" stroke-width="0.5"/>
  <polygon points="336,115 318,145 354,145" fill="#2E7D32" opacity="0.6" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Cone -->
  <ellipse cx="350" cy="152" rx="5" ry="8" fill="#8D6E63" opacity="0.7"/>
  <text x="335" y="163" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Хвойные</text>
  
  <!-- 5. Flowering (цветковые) -->
  <rect x="385" y="90" width="90" height="75" rx="5" fill="#2E7D32" opacity="0.06" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Stem -->
  <line x1="430" y1="155" x2="430" y2="115" stroke="#2E7D32" stroke-width="2"/>
  <!-- Leaves -->
  <ellipse cx="422" cy="140" rx="10" ry="5" fill="#2E7D32" opacity="0.6" transform="rotate(-30,422,140)"/>
  <ellipse cx="438" cy="145" rx="9" ry="4" fill="#2E7D32" opacity="0.5" transform="rotate(25,438,145)"/>
  <!-- Flower petals -->
  <ellipse cx="430" cy="105" rx="6" ry="10" fill="#C41E3A" opacity="0.6"/>
  <ellipse cx="430" cy="105" rx="6" ry="10" fill="#C41E3A" opacity="0.6" transform="rotate(60,430,115)"/>
  <ellipse cx="430" cy="105" rx="6" ry="10" fill="#C41E3A" opacity="0.6" transform="rotate(120,430,115)"/>
  <ellipse cx="430" cy="105" rx="6" ry="10" fill="#C41E3A" opacity="0.6" transform="rotate(180,430,115)"/>
  <ellipse cx="430" cy="105" rx="6" ry="10" fill="#C41E3A" opacity="0.6" transform="rotate(240,430,115)"/>
  <ellipse cx="430" cy="105" rx="6" ry="10" fill="#C41E3A" opacity="0.6" transform="rotate(300,430,115)"/>
  <!-- Flower center -->
  <circle cx="430" cy="115" r="5" fill="#D4A843"/>
  <text x="430" y="163" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Цветковые</text>
  
  <!-- Arrow showing evolution progression -->
  <line x1="65" y1="180" x2="430" y2="180" stroke="#1a1a1a" stroke-width="1.5" opacity="0.25"/>
  <polygon points="430,177 440,180 430,183" fill="#1a1a1a" opacity="0.25"/>
  <text x="250" y="195" font-family="Arial" font-size="9" fill="#666" text-anchor="middle">От простых к сложным</text>
  
  <!-- Photosynthesis diagram -->
  <rect x="80" y="210" width="340" height="95" rx="8" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="1"/>
  <text x="250" y="228" font-family="Arial" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">Фотосинтез</text>
  
  <!-- Sun -->
  <circle cx="130" cy="268" r="18" fill="#D4A843" opacity="0.6"/>
  <text x="130" y="253" font-family="Arial" font-size="8" fill="#D4A843" text-anchor="middle">Свет</text>
  <!-- Arrow to leaf -->
  <line x1="150" y1="268" x2="185" y2="265" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <polygon points="183,262 190,265 183,268" fill="#D4A843" opacity="0.5"/>
  
  <!-- Leaf -->
  <ellipse cx="210" cy="265" rx="22" ry="14" fill="#2E7D32" opacity="0.6" stroke="#2E7D32" stroke-width="1"/>
  <line x1="195" y1="265" x2="225" y2="265" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>
  
  <!-- Input arrows -->
  <text x="150" y="290" font-family="Arial" font-size="9" fill="#2B4C7E" text-anchor="middle">H2O</text>
  <line x1="168" y1="288" x2="195" y2="275" stroke="#2B4C7E" stroke-width="1" opacity="0.5"/>
  <text x="250" y="300" font-family="Arial" font-size="9" fill="#999" text-anchor="middle">CO2</text>
  <line x1="240" y1="296" x2="225" y2="275" stroke="#999" stroke-width="1" opacity="0.5"/>
  
  <!-- Output arrow -->
  <line x1="235" y1="260" x2="310" y2="255" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  <polygon points="308,252 316,255 308,258" fill="#2E7D32" opacity="0.5"/>
  <text x="340" y="250" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">O2</text>
  <text x="340" y="268" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Кислород</text>
  
  <line x1="235" y1="270" x2="310" y2="278" stroke="#D4A843" stroke-width="1.5" opacity="0.4"/>
  <polygon points="308,275 316,278 308,281" fill="#D4A843" opacity="0.4"/>
  <text x="345" y="282" font-family="Arial" font-size="9" fill="#D4A843" text-anchor="middle">Пища</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>