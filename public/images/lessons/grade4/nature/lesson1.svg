  <rect x="0" y="318" width="500" height="32" rx="0" fill="#2E7D32" opacity="0.9"/>
  <text x="250" y="339" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Что такое климат</text>
</svg>