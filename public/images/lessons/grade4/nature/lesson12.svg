<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Экология</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">Охрана природы и Красная книга</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Split scene: left - problem, right - solution -->
  
  <!-- Dividing line -->
  <line x1="250" y1="85" x2="250" y2="310" stroke="#1a1a1a" stroke-width="1.5" opacity="0.15"/>
  <polygon points="250,85 246,92 254,92" fill="#1a1a1a" opacity="0.2"/>
  <polygon points="250,310 246,303 254,303" fill="#1a1a1a" opacity="0.2"/>
  
  <!-- LEFT SIDE - Problems -->
  <rect x="30" y="85" width="215" height="225" rx="0" fill="#C41E3A" opacity="0.03"/>
  
  <text x="137" y="102" font-family="Arial" font-size="11" fill="#C41E3A" text-anchor="middle" font-weight="bold">Проблемы</text>
  
  <!-- Factory with smoke -->
  <rect x="60" y="130" width="60" height="45" fill="#78909C" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="70" y="115" width="8" height="18" fill="#90A4AE"/>
  <rect x="85" y="120" width="8" height="13" fill="#90A4AE"/>
  <rect x="100" y="118" width="8" height="15" fill="#90A4AE"/>
  <!-- Smoke -->
  <circle cx="74" cy="108" r="6" fill="#9E9E9E" opacity="0.3"/>
  <circle cx="82" cy="100" r="8" fill="#9E9E9E" opacity="0.25"/>
  <circle cx="78" cy="90" r="7" fill="#9E9E9E" opacity="0.2"/>
  <circle cx="89" cy="108" r="5" fill="#9E9E9E" opacity="0.25"/>
  <circle cx="94" cy="98" r="6" fill="#9E9E9E" opacity="0.2"/>
  
  <!-- Dead tree -->
  <line x1="180" y1="175" x2="180" y2="130" stroke="#5D4037" stroke-width="3"/>
  <line x1="180" y1="145" x2="165" y2="125" stroke="#5D4037" stroke-width="2"/>
  <line x1="180" y1="140" x2="195" y2="120" stroke="#5D4037" stroke-width="2"/>
  <line x1="180" y1="135" x2="170" y2="115" stroke="#5D4037" stroke-width="1.5"/>
  
  <!-- Trash on ground -->
  <rect x="80" y="190" width="8" height="12" rx="1" fill="#BDBDBD" transform="rotate(15,84,196)"/>
  <rect x="120" y="195" width="6" height="10" rx="1" fill="#BDBDBD" transform="rotate(-10,123,200)"/>
  <circle cx="160" cy="192" r="5" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.5"/>
  <rect x="100" y="198" width="12" height="3" rx="1" fill="#8D6E63" transform="rotate(25,106,199)"/>
  
  <!-- Polluted water -->
  <path d="M50,210 Q90,205 130,210 Q170,205 210,210 L210,225 Q170,220 130,225 Q90,220 50,225 Z" fill="#5D4037" opacity="0.2"/>
  <text x="130" y="220" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">Загрязнение воды</text>
  
  <!-- Sad face / warning -->
  <circle cx="130" cy="260" r="20" fill="white" opacity="0.3" stroke="#C41E3A" stroke-width="1.5"/>
  <circle cx="124" cy="256" r="2" fill="#C41E3A" opacity="0.5"/>
  <circle cx="136" cy="256" r="2" fill="#C41E3A" opacity="0.5"/>
  <path d="M123,268 Q130,263 137,268" fill="none" stroke="#C41E3A" stroke-width="1.5" opacity="0.5"/>
  
  <text x="130" y="295" font-family="Arial" font-size="8" fill="#C41E3A" text-anchor="middle" opacity="0.7">Мусор, смог, вырубка</text>
  
  <!-- RIGHT SIDE - Solutions -->
  <rect x="255" y="85" width="215" height="225" rx="0" fill="#2E7D32" opacity="0.03"/>
  
  <text x="362" y="102" font-family="Arial" font-size="11" fill="#2E7D32" text-anchor="middle" font-weight="bold">Решения</text>
  
  <!-- Clean trees -->
  <line x1="300" y1="175" x2="300" y2="125" stroke="#5D4037" stroke-width="3"/>
  <circle cx="300" cy="118" r="20" fill="#2E7D32" opacity="0.5"/>
  <circle cx="288" cy="122" r="14" fill="#2E7D32" opacity="0.4"/>
  <circle cx="312" cy="120" r="16" fill="#2E7D32" opacity="0.45"/>
  
  <line x1="380" y1="175" x2="380" y2="130" stroke="#5D4037" stroke-width="3"/>
  <circle cx="380" cy="123" r="18" fill="#2E7D32" opacity="0.5"/>
  <circle cx="370" cy="127" r="13" fill="#2E7D32" opacity="0.4"/>
  <circle cx="390" cy="125" r="14" fill="#2E7D32" opacity="0.45"/>
  
  <!-- Person planting tree -->
  <g transform="translate(340, 135)">
    <!-- Body -->
    <circle cx="8" cy="0" r="5" fill="#FFCC80" stroke="#1a1a1a" stroke-width="0.8"/>
    <line x1="8" y1="5" x2="8" y2="25" stroke="#1565C0" stroke-width="3"/>
    <!-- Arms holding sapling -->
    <line x1="8" y1="10" x2="-5" y2="18" stroke="#1565C0" stroke-width="2"/>
    <line x1="8" y1="10" x2="20" y2="18" stroke="#1565C0" stroke-width="2"/>
    <!-- Small sapling -->
    <line x1="8" y1="18" x2="8" y2="10" stroke="#2E7D32" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="4" fill="#2E7D32" opacity="0.5"/>
    <!-- Legs -->
    <line x1="8" y1="25" x2="4" y2="38" stroke="#1565C0" stroke-width="2"/>
    <line x1="8" y1="25" x2="12" y2="38" stroke="#1565C0" stroke-width="2"/>
  </g>
  
  <!-- Clean water -->
  <path d="M270,210 Q310,205 350,210 Q390,205 430,210 L430,225 Q390,220 350,225 Q310,220 270,225 Z" fill="#64B5F6" opacity="0.3"/>
  <!-- Fish in clean water -->
  <g transform="translate(340, 215)">
    <ellipse cx="8" cy="3" rx="8" ry="3" fill="#2B4C7E" opacity="0.4"/>
    <polygon points="16,3 20,0 20,6" fill="#2B4C7E" opacity="0.3"/>
  </g>
  
  <!-- Recycling symbol -->
  <g transform="translate(290, 248)">
    <polygon points="15,0 0,12 5,12" fill="#2E7D32" opacity="0.5"/>
    <polygon points="30,0 25,12 35,12" fill="#2E7D32" opacity="0.5"/>
    <polygon points="8,24 18,14 8,14" fill="#2E7D32" opacity="0.5"/>
    <polygon points="22,24 12,14 22,14" fill="#2E7D32" opacity="0.5"/>
    <text x="15" y="10" font-family="Arial" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">3R</text>
  </g>
  
  <!-- Smiley face -->
  <circle cx="395" cy="260" r="20" fill="white" opacity="0.3" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="389" cy="256" r="2" fill="#2E7D32" opacity="0.5"/>
  <circle cx="401" cy="256" r="2" fill="#2E7D32" opacity="0.5"/>
  <path d="M388,265 Q395,270 402,265" fill="none" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>
  
  <text x="362" y="295" font-family="Arial" font-size="8" fill="#2E7D32" text-anchor="middle" opacity="0.7">Посадка деревьев, переработка</text>
  
  <!-- Red Book icon -->
  <rect x="110" y="86" width="12" height="14" rx="1" fill="#C41E3A" opacity="0.7"/>
  <text x="116" y="96" font-family="Arial" font-size="6" fill="white" text-anchor="middle">КК</text>
  <text x="128" y="96" font-family="Arial" font-size="8" fill="#C41E3A">Красная книга</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>