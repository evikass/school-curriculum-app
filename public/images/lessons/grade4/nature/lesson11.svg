<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect x="0" y="8" width="500" height="3" fill="#D4A843" opacity="0.5"/>
  
  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Водоём как экосистема</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666" text-anchor="middle">Реки, озёра, пруды и болота</text>
  
  <!-- Decorative line under title -->
  <line x1="120" y1="52" x2="380" y2="52" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

  <!-- Illustration area -->
  <!-- Sky -->
  <rect x="30" y="85" width="440" height="100" rx="0" fill="#64B5F6" opacity="0.08"/>
  
  <!-- Sun -->
  <circle cx="400" cy="110" r="22" fill="#D4A843" opacity="0.6"/>
  <line x1="400" y1="83" x2="400" y2="77" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="422" y1="95" x2="426" y2="91" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="378" y1="95" x2="374" y2="91" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="427" y1="110" x2="433" y2="110" stroke="#D4A843" stroke-width="1.5"/>
  
  <!-- Clouds -->
  <ellipse cx="100" cy="105" rx="25" ry="10" fill="white" opacity="0.5"/>
  <ellipse cx="115" cy="100" rx="20" ry="12" fill="white" opacity="0.4"/>
  <ellipse cx="250" cy="98" rx="22" ry="9" fill="white" opacity="0.45"/>
  <ellipse cx="265" cy="94" rx="18" ry="11" fill="white" opacity="0.35"/>
  
  <!-- Horizon line -->
  <line x1="30" y1="185" x2="470" y2="185" stroke="#1a1a1a" stroke-width="0.5" opacity="0.15"/>
  
  <!-- Water surface -->
  <rect x="30" y="185" width="440" height="125" fill="#2B4C7E" opacity="0.08"/>
  
  <!-- Water ripples -->
  <path d="M40,200 Q80,196 120,200 Q160,196 200,200" fill="none" stroke="#2B4C7E" stroke-width="0.8" opacity="0.3"/>
  <path d="M200,210 Q250,206 300,210 Q350,206 400,210" fill="none" stroke="#2B4C7E" stroke-width="0.8" opacity="0.25"/>
  <path d="M60,230 Q110,226 160,230 Q210,226 260,230" fill="none" stroke="#2B4C7E" stroke-width="0.8" opacity="0.2"/>
  <path d="M250,250 Q300,246 350,250 Q400,246 450,250" fill="none" stroke="#2B4C7E" stroke-width="0.8" opacity="0.2"/>
  
  <!-- Reeds on left bank -->
  <line x1="55" y1="185" x2="52" y2="120" stroke="#2E7D32" stroke-width="2"/>
  <line x1="65" y1="185" x2="63" y2="125" stroke="#2E7D32" stroke-width="2"/>
  <line x1="75" y1="185" x2="77" y2="128" stroke="#2E7D32" stroke-width="2"/>
  <line x1="85" y1="185" x2="83" y2="130" stroke="#2E7D32" stroke-width="1.8"/>
  <!-- Reed tops (cattail) -->
  <ellipse cx="52" cy="118" rx="3" ry="8" fill="#5D4037" opacity="0.6"/>
  <ellipse cx="63" cy="123" rx="3" ry="8" fill="#5D4037" opacity="0.6"/>
  <ellipse cx="77" cy="126" rx="2.5" ry="7" fill="#5D4037" opacity="0.5"/>
  
  <!-- Reeds on right bank -->
  <line x1="430" y1="185" x2="428" y2="125" stroke="#2E7D32" stroke-width="2"/>
  <line x1="440" y1="185" x2="442" y2="128" stroke="#2E7D32" stroke-width="2"/>
  <line x1="450" y1="185" x2="448" y2="130" stroke="#2E7D32" stroke-width="1.8"/>
  <ellipse cx="428" cy="123" rx="3" ry="7" fill="#5D4037" opacity="0.5"/>
  <ellipse cx="442" cy="126" rx="2.5" ry="7" fill="#5D4037" opacity="0.5"/>
  
  <!-- Lily pads -->
  <ellipse cx="150" cy="210" rx="18" ry="8" fill="#2E7D32" opacity="0.4"/>
  <ellipse cx="320" cy="225" rx="16" ry="7" fill="#2E7D32" opacity="0.35"/>
  <ellipse cx="220" cy="250" rx="15" ry="7" fill="#2E7D32" opacity="0.3"/>
  <!-- Lily flower -->
  <g transform="translate(150, 200)">
    <ellipse cx="0" cy="3" rx="3" ry="6" fill="white" opacity="0.6"/>
    <ellipse cx="0" cy="3" rx="3" ry="6" fill="white" opacity="0.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="3" rx="3" ry="6" fill="white" opacity="0.5" transform="rotate(120)"/>
    <circle cx="0" cy="3" r="3" fill="#D4A843" opacity="0.5"/>
  </g>
  
  <!-- Fish 1 (underwater) -->
  <g transform="translate(200, 235)">
    <ellipse cx="20" cy="8" rx="18" ry="8" fill="#D4A843" opacity="0.5"/>
    <polygon points="38,8 48,0 48,16" fill="#D4A843" opacity="0.4"/>
    <circle cx="10" cy="6" r="2.5" fill="#1a1a1a" opacity="0.5"/>
    <circle cx="10" cy="6" r="1" fill="white" opacity="0.5"/>
    <!-- Fin -->
    <path d="M15,0 Q18,-8 22,0" fill="#D4A843" opacity="0.35"/>
  </g>
  
  <!-- Fish 2 -->
  <g transform="translate(300, 260)">
    <ellipse cx="15" cy="6" rx="14" ry="6" fill="#2E7D32" opacity="0.4"/>
    <polygon points="29,6 37,0 37,12" fill="#2E7D32" opacity="0.35"/>
    <circle cx="8" cy="5" r="2" fill="#1a1a1a" opacity="0.4"/>
    <circle cx="8" cy="5" r="0.8" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Small fish -->
  <g transform="translate(130, 265)">
    <ellipse cx="8" cy="4" rx="8" ry="3.5" fill="#2B4C7E" opacity="0.3"/>
    <polygon points="16,4 20,0 20,8" fill="#2B4C7E" opacity="0.25"/>
  </g>
  
  <!-- Frog on lily pad -->
  <g transform="translate(310, 215)">
    <ellipse cx="8" cy="5" rx="7" ry="5" fill="#2E7D32" opacity="0.6"/>
    <circle cx="5" cy="0" r="3" fill="#2E7D32" opacity="0.6"/>
    <circle cx="11" cy="0" r="3" fill="#2E7D32" opacity="0.6"/>
    <circle cx="5" cy="-1" r="1.5" fill="#1a1a1a" opacity="0.5"/>
    <circle cx="11" cy="-1" r="1.5" fill="#1a1a1a" opacity="0.5"/>
    <!-- Legs -->
    <ellipse cx="0" cy="8" rx="5" ry="2.5" fill="#2E7D32" opacity="0.4"/>
    <ellipse cx="16" cy="8" rx="5" ry="2.5" fill="#2E7D32" opacity="0.4"/>
  </g>
  
  <!-- Duck on water -->
  <g transform="translate(170, 175)">
    <ellipse cx="15" cy="5" rx="12" ry="6" fill="white" opacity="0.7" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="26" cy="0" r="5" fill="white" opacity="0.7" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="29" cy="-1" r="1" fill="#1a1a1a" opacity="0.5"/>
    <polygon points="31,0 36,1 31,3" fill="#D4A843" opacity="0.7"/>
    <!-- Wing detail -->
    <path d="M10,2 Q15,-1 20,2" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
  </g>
  
  <!-- Underwater bubbles -->
  <circle cx="250" cy="245" r="3" fill="none" stroke="#2B4C7E" stroke-width="0.5" opacity="0.3"/>
  <circle cx="255" cy="238" r="2" fill="none" stroke="#2B4C7E" stroke-width="0.5" opacity="0.25"/>
  <circle cx="248" cy="230" r="2.5" fill="none" stroke="#2B4C7E" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Labels -->
  <text x="150" y="290" font-family="Arial" font-size="8" fill="#2B4C7E" text-anchor="middle" opacity="0.6">Карась</text>
  <text x="310" y="290" font-family="Arial" font-size="8" fill="#2E7D32" text-anchor="middle" opacity="0.6">Лягушка</text>
  <text x="200" y="170" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle" opacity="0.5">Утка</text>
  
  <!-- Bottom bar -->
  <rect x="0" y="318" width="500" height="32" fill="#2C1810"/>
  <line x1="0" y1="318" x2="500" y2="318" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#F5E6C8" text-anchor="middle" opacity="0.9">Природоведение — 4 класс</text>
</svg>