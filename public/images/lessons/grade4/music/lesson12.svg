<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Русские народные песни</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Изучаем русское песенное творчество</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- group of 5 singers in a semi-circle -->
  <!-- singer 1 -->
  <circle cx="130" cy="155" r="12" fill="#1a1a1a" opacity="0.65"/>
  <path d="M110,195 Q130,182 150,195 L150,240 L110,240 Z" fill="#2B4C7E" opacity="0.5"/>
  <!-- singer 2 -->
  <circle cx="210" cy="140" r="12" fill="#1a1a1a" opacity="0.65"/>
  <path d="M190,180 Q210,167 230,180 L230,240 L190,240 Z" fill="#C41E3A" opacity="0.5"/>
  <!-- singer 3 (center, slightly forward) -->
  <circle cx="290" cy="135" r="14" fill="#1a1a1a" opacity="0.7"/>
  <path d="M265,178 Q290,163 315,178 L315,240 L265,240 Z" fill="#D4A843" opacity="0.5"/>
  <!-- singer 4 -->
  <circle cx="370" cy="140" r="12" fill="#1a1a1a" opacity="0.65"/>
  <path d="M350,180 Q370,167 390,180 L390,240 L350,240 Z" fill="#C41E3A" opacity="0.5"/>
  <!-- singer 5 -->
  <circle cx="430" cy="155" r="12" fill="#1a1a1a" opacity="0.65"/>
  <path d="M410,195 Q430,182 450,195 L450,240 L410,240 Z" fill="#2B4C7E" opacity="0.5"/>
  <!-- open mouths (singing) -->
  <ellipse cx="130" cy="168" rx="3" ry="4" fill="#1a1a1a" opacity="0.5"/>
  <ellipse cx="210" cy="153" rx="3" ry="4" fill="#1a1a1a" opacity="0.5"/>
  <ellipse cx="290" cy="149" rx="4" ry="5" fill="#1a1a1a" opacity="0.5"/>
  <ellipse cx="370" cy="153" rx="3" ry="4" fill="#1a1a1a" opacity="0.5"/>
  <ellipse cx="430" cy="168" rx="3" ry="4" fill="#1a1a1a" opacity="0.5"/>
  <!-- sound waves -->
  <path d="M280,120 Q290,108 300,120" stroke="#D4A843" stroke-width="1" fill="none"/>
  <path d="M272,115 Q290,100 308,115" stroke="#D4A843" stroke-width="0.8" fill="none" opacity="0.6"/>
  <path d="M264,110 Q290,92 316,110" stroke="#D4A843" stroke-width="0.6" fill="none" opacity="0.4"/>
  <!-- musical notes -->
  <text x="160" y="120" font-size="14" fill="#C41E3A" opacity="0.35">&#9835;</text>
  <text x="340" y="115" font-size="12" fill="#2B4C7E" opacity="0.35">&#9834;</text>
  <!-- ground -->
  <line x1="100" y1="250" x2="440" y2="250" stroke="#D4A843" stroke-width="1.5"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>