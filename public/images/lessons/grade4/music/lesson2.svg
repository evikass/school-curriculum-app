<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Нотная грамота</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Учимся читать и записывать музыку</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- treble clef (simplified) -->
  <text x="110" y="195" font-family="serif" font-size="80" fill="#1a1a1a">&#119070;</text>
  <!-- staff lines -->
  <line x1="155" y1="145" x2="430" y2="145" stroke="#1a1a1a" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="158" x2="430" y2="158" stroke="#1a1a1a" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="171" x2="430" y2="171" stroke="#1a1a1a" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="184" x2="430" y2="184" stroke="#1a1a1a" stroke-width="0.8" opacity="0.6"/>
  <line x1="155" y1="197" x2="430" y2="197" stroke="#1a1a1a" stroke-width="0.8" opacity="0.6"/>
  <!-- notes -->
  <ellipse cx="200" cy="171" rx="7" ry="5.5" fill="#1a1a1a" transform="rotate(-15,200,171)"/>
  <line x1="207" y1="171" x2="207" y2="135" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <ellipse cx="240" cy="184" rx="7" ry="5.5" fill="#C41E3A" transform="rotate(-15,240,184)"/>
  <line x1="247" y1="184" x2="247" y2="148" stroke="#C41E3A" stroke-width="1.5"/>
  
  <ellipse cx="280" cy="158" rx="7" ry="5.5" fill="#1a1a1a" transform="rotate(-15,280,158)"/>
  <line x1="287" y1="158" x2="287" y2="122" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <ellipse cx="320" cy="171" rx="7" ry="5.5" fill="#D4A843" transform="rotate(-15,320,171)"/>
  <line x1="327" y1="171" x2="327" y2="135" stroke="#D4A843" stroke-width="1.5"/>
  
  <ellipse cx="360" cy="145" rx="7" ry="5.5" fill="#1a1a1a" transform="rotate(-15,360,145)"/>
  <line x1="367" y1="145" x2="367" y2="109" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- half note -->
  <ellipse cx="400" cy="197" rx="7" ry="5.5" fill="none" stroke="#C41E3A" stroke-width="1.8" transform="rotate(-15,400,197)"/>
  <line x1="407" y1="197" x2="407" y2="161" stroke="#C41E3A" stroke-width="1.5"/>
  <!-- note names below -->
  <text x="200" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#2B4C7E">До</text>
  <text x="240" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#2B4C7E">Ре</text>
  <text x="280" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#2B4C7E">Ми</text>
  <text x="320" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#2B4C7E">Фа</text>
  <text x="360" y="225" text-anchor="middle" font-family="Arial" font-size="9" fill="#2B4C7E">Соль</text>
  <!-- time signature -->
  <text x="170" y="152" font-family="serif" font-size="16" font-weight="bold" fill="#1a1a1a">4</text>
  <text x="170" y="177" font-family="serif" font-size="16" font-weight="bold" fill="#1a1a1a">4</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>