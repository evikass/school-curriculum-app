<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Песня и романс</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Изучаем вокальные жанры</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- singer figure -->
  <circle cx="250" cy="130" r="14" fill="#1a1a1a" opacity="0.75"/>
  <!-- body with bowtie -->
  <path d="M220,180 Q250,165 280,180 L280,230 L220,230 Z" fill="#C41E3A" opacity="0.7"/>
  <!-- bowtie -->
  <polygon points="243,170 250,165 257,170 250,175" fill="#D4A843"/>
  <!-- arms -->
  <line x1="225" y1="190" x2="205" y2="180" stroke="#C41E3A" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="275" y1="190" x2="295" y2="175" stroke="#C41E3A" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- microphone -->
  <line x1="295" y1="175" x2="300" y2="195" stroke="#D4A843" stroke-width="2.5" stroke-linecap="round"/>
  <ellipse cx="300" cy="200" rx="8" ry="10" fill="#1a1a1a" opacity="0.6"/>
  <ellipse cx="300" cy="195" rx="5" ry="3" fill="#D4A843" opacity="0.4"/>
  <!-- sound waves from mic -->
  <path d="M315,195 Q322,190 315,185" stroke="#D4A843" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M325,200 Q335,192 325,184" stroke="#D4A843" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M335,205 Q348,195 335,185" stroke="#D4A843" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- music notes floating -->
  <text x="150" y="140" font-size="18" fill="#C41E3A" opacity="0.4">&#9835;</text>
  <text x="340" y="130" font-size="15" fill="#D4A843" opacity="0.4">&#9834;</text>
  <text x="130" y="170" font-size="12" fill="#2B4C7E" opacity="0.3">&#9833;</text>
  <!-- sheet music stand -->
  <line x1="150" y1="250" x2="150" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="130" y="195" width="40" height="28" rx="2" fill="{CREAM}" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="136" y1="203" x2="164" y2="203" stroke="#1a1a1a" stroke-width="0.3"/>
  <line x1="136" y1="209" x2="164" y2="209" stroke="#1a1a1a" stroke-width="0.3"/>
  <line x1="136" y1="215" x2="164" y2="215" stroke="#1a1a1a" stroke-width="0.3"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Музыка</text>
</svg>