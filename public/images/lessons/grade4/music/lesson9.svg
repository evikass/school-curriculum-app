<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F8BBD0"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E0F7FA"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF9C4"/>
      <stop offset="60%" stop-color="#FDD835"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="3" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  <g transform="translate(40,30)" filter="url(#softShadow)">
    <rect width="420" height="285" rx="12" fill="white" opacity="0.94"/>
    <rect width="420" height="32" rx="12" fill="#AD1457" opacity="0.9"/>
    <rect y="24" width="420" height="8" fill="#AD1457" opacity="0.9"/>
    <text x="210" y="22" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">КОНЦЕРТ И СИМФОНИЯ</text>
    <g transform="translate(20,48)">
      <rect width="380" height="70" rx="8" fill="#FCE4EC" opacity="0.4" stroke="#AD1457" stroke-width="1.5"/>
      <text x="190" y="30" font-family="Arial" font-size="16" fill="#880E4F" text-anchor="middle" font-weight="bold">Оркестр — группа музыкантов</text>
    </g>
    <g transform="translate(20,135)">
      <rect width="380" height="130" rx="8" fill="white" stroke="#9C27B0" stroke-width="1.5"/>
      <rect width="380" height="24" rx="8" fill="#9C27B0" opacity="0.85"/>
      <rect y="18" width="380" height="6" fill="#9C27B0" opacity="0.85"/>
      <text x="190" y="17" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">МУЗЫКА</text>
      <text x="190" y="55" font-family="Arial" font-size="12" fill="#880E4F" text-anchor="middle" font-weight="bold">Оркестр — группа музыкантов</text>
    </g>
  </g>
  <rect x="0" y="318" width="500" height="32" rx="0" fill="#AD1457" opacity="0.9"/>
  <text x="250" y="339" font-family="Arial,sans-serif" font-size="13" text-anchor="middle" fill="white" font-weight="bold">Концерт и симфония</text>
</svg>