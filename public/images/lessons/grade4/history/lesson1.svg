<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="85" fill="#F5E6C8" opacity="0.9"/>
  <line x1="0" y1="85" x2="500" y2="85" stroke="#C41E3A" stroke-width="3"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Истоки Руси</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">Восточные славяне и их племена</text>

  <!-- Bottom panel -->
  <rect x="0" y="315" width="500" height="35" fill="#C41E3A" opacity="0.85"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" font-weight="bold">История России - 4 класс</text>

  <!-- Sky and ground -->
  <rect x="0" y="85" width="500" height="230" fill="#F5E6C8"/>

  <!-- Sun -->
  <circle cx="420" cy="120" r="28" fill="#D4A843" opacity="0.9"/>
  <line x1="420" y1="85" x2="420" y2="95" stroke="#D4A843" stroke-width="3"/>
  <line x1="420" y1="145" x2="420" y2="155" stroke="#D4A843" stroke-width="3"/>
  <line x1="385" y1="120" x2="395" y2="120" stroke="#D4A843" stroke-width="3"/>
  <line x1="445" y1="120" x2="455" y2="120" stroke="#D4A843" stroke-width="3"/>

  <!-- Forest (left) - stylized trees -->
  <polygon points="30,240 45,160 60,240" fill="#6B7B3A" opacity="0.8"/>
  <polygon points="55,240 70,150 85,240" fill="#6B7B3A" opacity="0.7"/>
  <polygon points="75,240 90,170 105,240" fill="#6B7B3A" opacity="0.85"/>
  <rect x="42" y="240" width="6" height="15" fill="#8B6914"/>
  <rect x="67" y="240" width="6" height="15" fill="#8B6914"/>
  <rect x="87" y="240" width="6" height="15" fill="#8B6914"/>

  <!-- River (wavy) -->
  <path d="M0,270 Q60,255 120,270 Q180,285 240,270 Q300,255 360,270 Q420,285 500,270" fill="none" stroke="#2B4C7E" stroke-width="4" opacity="0.6"/>
  <path d="M0,280 Q60,265 120,280 Q180,295 240,280 Q300,265 360,280 Q420,295 500,280" fill="#2B4C7E" opacity="0.15"/>

  <!-- Wooden houses (Slavic settlements) -->
  <!-- House 1 -->
  <rect x="140" y="210" width="60" height="50" fill="#8B6914" opacity="0.8"/>
  <polygon points="130,210 170,185 210,210" fill="#8B1528" opacity="0.7"/>
  <rect x="160" y="230" width="15" height="30" fill="#DCC9A3"/>
  <rect x="148" y="225" width="10" height="10" fill="#A8C4E0" opacity="0.7"/>

  <!-- House 2 -->
  <rect x="230" y="215" width="55" height="45" fill="#8B6914" opacity="0.75"/>
  <polygon points="222,215 257,192 292,215" fill="#8B1528" opacity="0.65"/>
  <rect x="248" y="235" width="12" height="25" fill="#DCC9A3"/>

  <!-- House 3 (small) -->
  <rect x="310" y="225" width="45" height="35" fill="#8B6914" opacity="0.7"/>
  <polygon points="304,225 332,205 360,225" fill="#8B1528" opacity="0.6"/>

  <!-- Boat on river -->
  <path d="M170,275 L185,285 L215,285 L230,275" fill="#8B6914" opacity="0.8"/>
  <line x1="200" y1="275" x2="200" y2="258" stroke="#8B6914" stroke-width="2"/>
  <polygon points="200,258 218,268 200,268" fill="#F5E6C8" stroke="#8B6914" stroke-width="1"/>

  <!-- Wheat/grain field (right side) -->
  <line x1="370" y1="290" x2="370" y2="260" stroke="#D4A843" stroke-width="2"/>
  <line x1="380" y1="290" x2="380" y2="255" stroke="#D4A843" stroke-width="2"/>
  <line x1="390" y1="290" x2="390" y2="258" stroke="#D4A843" stroke-width="2"/>
  <line x1="400" y1="290" x2="400" y2="252" stroke="#D4A843" stroke-width="2"/>
  <line x1="410" y1="290" x2="410" y2="256" stroke="#D4A843" stroke-width="2"/>
  <line x1="420" y1="290" x2="420" y2="260" stroke="#D4A843" stroke-width="2"/>
  <line x1="430" y1="290" x2="430" y2="254" stroke="#D4A843" stroke-width="2"/>
  <line x1="440" y1="290" x2="440" y2="258" stroke="#D4A843" stroke-width="2"/>
  <ellipse cx="370" cy="258" rx="4" ry="6" fill="#D4A843" opacity="0.8"/>
  <ellipse cx="380" cy="253" rx="4" ry="6" fill="#D4A843" opacity="0.8"/>
  <ellipse cx="390" cy="256" rx="4" ry="6" fill="#D4A843" opacity="0.8"/>
  <ellipse cx="400" cy="250" rx="4" ry="6" fill="#D4A843" opacity="0.8"/>
  <ellipse cx="410" cy="254" rx="4" ry="6" fill="#D4A843" opacity="0.8"/>
  <ellipse cx="420" cy="258" rx="4" ry="6" fill="#D4A843" opacity="0.8"/>
  <ellipse cx="430" cy="252" rx="4" ry="6" fill="#D4A843" opacity="0.8"/>
  <ellipse cx="440" cy="256" rx="4" ry="6" fill="#D4A843" opacity="0.8"/>

  <!-- Smoke from houses -->
  <path d="M155,185 Q150,175 158,168" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3"/>
  <path d="M250,192 Q245,180 253,172" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3"/>

  <!-- Geometric Bauhaus accents -->
  <rect x="10" y="100" width="8" height="8" fill="#C41E3A" opacity="0.6"/>
  <rect x="25" y="108" width="5" height="5" fill="#2B4C7E" opacity="0.5"/>
  <circle cx="475" cy="295" r="6" fill="#C41E3A" opacity="0.5"/>
  <polygon points="465,165 475,155 485,165" fill="#D4A843" opacity="0.5"/>

</svg>