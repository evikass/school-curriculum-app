<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">

  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="85" fill="#F5E6C8" opacity="0.9"/>
  <line x1="0" y1="85" x2="500" y2="85" stroke="#C41E3A" stroke-width="3"/>
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Куликовская битва</text>
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle">Перелом в борьбе с монгольским игом</text>

  <!-- Bottom panel -->
  <rect x="0" y="315" width="500" height="35" fill="#C41E3A" opacity="0.85"/>
  <text x="250" y="337" font-family="Arial, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" font-weight="bold">История России - 4 класс</text>

  <!-- Background -->
  <rect x="0" y="85" width="500" height="230" fill="#F5E6C8"/>

  <!-- Battlefield ground -->
  <rect x="0" y="220" width="500" height="95" fill="#DCC9A3" opacity="0.5"/>
  <path d="M0,220 Q125,210 250,220 Q375,230 500,220" fill="none" stroke="#6B7B3A" stroke-width="1" opacity="0.3"/>

  <!-- Russian army (left) - shields and weapons -->
  <!-- Shield 1 -->
  <ellipse cx="80" cy="175" rx="20" ry="25" fill="#2B4C7E" stroke="#D4A843" stroke-width="2"/>
  <circle cx="80" cy="175" r="7" fill="#D4A843"/>
  <!-- Shield 2 -->
  <ellipse cx="130" cy="190" rx="18" ry="22" fill="#2B4C7E" stroke="#D4A843" stroke-width="1.5"/>
  <circle cx="130" cy="190" r="6" fill="#D4A843"/>
  <!-- Shield 3 -->
  <ellipse cx="65" cy="210" rx="16" ry="20" fill="#C41E3A" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Spears -->
  <line x1="100" y1="155" x2="100" y2="250" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="100,155 97,145 103,145" fill="#1a1a1a"/>
  <line x1="150" y1="165" x2="150" y2="250" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="150,165 147,155 153,155" fill="#1a1a1a"/>

  <!-- Russian banner -->
  <line x1="175" y1="100" x2="175" y2="250" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="176" y="105" width="45" height="35" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Cross on banner -->
  <rect x="195" y="108" width="6" height="28" fill="#D4A843"/>
  <rect x="186" y="118" width="24" height="6" fill="#D4A843"/>

  <!-- Center: Crossed swords (main symbol) -->
  <line x1="210" y1="240" x2="290" y2="150" stroke="#1a1a1a" stroke-width="4"/>
  <rect x="204" y="235" width="14" height="5" fill="#D4A843"/>
  <line x1="290" y1="240" x2="210" y2="150" stroke="#1a1a1a" stroke-width="4"/>
  <rect x="282" y="235" width="14" height="5" fill="#D4A843"/>
  <!-- Sword pommels -->
  <circle cx="210" cy="240" r="4" fill="#D4A843"/>
  <circle cx="290" cy="240" r="4" fill="#D4A843"/>

  <!-- Ambush regiment (behind green hill) -->
  <path d="M310,220 Q350,200 390,220" fill="#6B7B3A" opacity="0.3"/>
  <!-- Hidden warriors -->
  <circle cx="330" cy="210" r="8" fill="#DCC9A3" opacity="0.7"/>
  <rect x="324" y="218" width="12" height="15" fill="#2B4C7E" opacity="0.5"/>
  <circle cx="355" cy="208" r="8" fill="#DCC9A3" opacity="0.6"/>
  <rect x="349" y="216" width="12" height="15" fill="#2B4C7E" opacity="0.4"/>
  <circle cx="375" cy="212" r="8" fill="#DCC9A3" opacity="0.5"/>
  <rect x="369" y="220" width="12" height="15" fill="#2B4C7E" opacity="0.3"/>
  <!-- Arrows from ambush -->
  <line x1="350" y1="205" x2="320" y2="185" stroke="#1a1a1a" stroke-width="1.5"/>
  <polygon points="320,185 326,182 325,189" fill="#1a1a1a"/>

  <!-- Mongol forces (right) -->
  <!-- Horsemen (simplified, facing left) -->
  <ellipse cx="430" cy="195" rx="40" ry="18" fill="#1a1a1a" opacity="0.6"/>
  <path d="M460,185 Q470,170 468,160" fill="none" stroke="#1a1a1a" stroke-width="12" opacity="0.6"/>
  <ellipse cx="469" cy="158" rx="10" ry="7" fill="#1a1a1a" opacity="0.6"/>
  <!-- Rider -->
  <circle cx="445" cy="172" r="10" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="0.8"/>
  <rect x="438" y="182" width="14" height="18" fill="#C41E3A" opacity="0.5"/>
  <!-- Bow -->
  <path d="M455,170 Q465,182 455,194" fill="none" stroke="#8B6914" stroke-width="2"/>
  <!-- More horses -->
  <ellipse cx="455" cy="225" rx="35" ry="16" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="468" cy="207" r="8" fill="#DCC9A3" opacity="0.4"/>

  <!-- Mongol banner -->
  <line x1="480" y1="110" x2="480" y2="250" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="480,110 500,118 480,128" fill="#C41E3A" opacity="0.6"/>

  <!-- Duel scene (Peresvet vs Chelubey) - small inset -->
  <circle cx="250" cy="270" r="22" fill="#F5E6C8" stroke="#C41E3A" stroke-width="1.5"/>
  <!-- Two tiny figures facing each other -->
  <line x1="240" y1="265" x2="240" y2="278" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="260" y1="265" x2="260" y2="278" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="240" cy="262" r="5" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="260" cy="262" r="5" fill="#DCC9A3" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- Clashing lances -->
  <line x1="242" y1="268" x2="258" y2="268" stroke="#D4A843" stroke-width="2"/>

  <!-- Date banner -->
  <rect x="160" y="295" width="180" height="18" fill="#C41E3A" opacity="0.85" rx="2"/>
  <text x="250" y="308" font-family="Arial, sans-serif" font-size="11" fill="#F5E6C8" text-anchor="middle" font-weight="bold">8 сентября 1380 года</text>

</svg>