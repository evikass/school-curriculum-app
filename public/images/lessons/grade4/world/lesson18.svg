<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Красная книга</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Страницы, которых не должно стать больше</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Open red book -->
  <!-- Left page -->
  <path d="M120,130 L120,280 Q120,290 130,290 L245,290 L245,130 Z" fill="#F5F0E0" stroke="#C0A080" stroke-width="1"/>
  <!-- Right page -->
  <path d="M245,130 L245,290 L360,290 Q370,290 370,280 L370,130 Z" fill="#F5F0E0" stroke="#C0A080" stroke-width="1"/>
  <!-- Book spine -->
  <rect x="118" y="125" width="255" height="10" fill="#C41E3A" rx="3"/>
  <!-- Book cover (visible edges) -->
  <line x1="118" y1="125" x2="118" y2="295" stroke="#C41E3A" stroke-width="3"/>
  <line x1="373" y1="125" x2="373" y2="295" stroke="#C41E3A" stroke-width="3"/>
  <line x1="118" y1="295" x2="373" y2="295" stroke="#C41E3A" stroke-width="3"/>
  <!-- Title on cover -->
  <text x="245" y="119" font-family="Arial" font-size="12" font-weight="bold" fill="#C41E3A" text-anchor="middle">КРАСНАЯ КНИГА</text>
  <!-- Page lines (left) -->
  <line x1="130" y1="150" x2="240" y2="150" stroke="#CCC" stroke-width="0.5"/>
  <line x1="130" y1="165" x2="240" y2="165" stroke="#CCC" stroke-width="0.5"/>
  <line x1="130" y1="180" x2="240" y2="180" stroke="#CCC" stroke-width="0.5"/>
  <line x1="130" y1="195" x2="200" y2="195" stroke="#CCC" stroke-width="0.5"/>
  <!-- Amur tiger (left page) -->
  <ellipse cx="185" cy="230" rx="30" ry="18" fill="#D4900A" opacity="0.6"/>
  <circle cx="212" cy="220" r="12" fill="#D4900A" opacity="0.6"/>
  <line x1="170" y1="225" x2="180" y2="230" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="180" y1="235" x2="195" y2="238" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
  <circle cx="218" cy="217" r="1.5" fill="#1a1a1a"/>
  <text x="185" y="260" font-family="Arial" font-size="7" fill="#1a1a1a" text-anchor="middle">Амурский тигр</text>
  <!-- Snow leopard (right page) -->
  <ellipse cx="310" cy="230" rx="28" ry="16" fill="#C0B0A0" opacity="0.6"/>
  <circle cx="335" cy="220" r="11" fill="#C0B0A0" opacity="0.6"/>
  <circle cx="340" cy="217" r="1.5" fill="#1a1a1a"/>
  <circle cx="337" cy="224" r="1" fill="#333"/>
  <text x="310" y="260" font-family="Arial" font-size="7" fill="#1a1a1a" text-anchor="middle">Снежный барс</text>
  <!-- Page lines (right) -->
  <line x1="255" y1="150" x2="360" y2="150" stroke="#CCC" stroke-width="0.5"/>
  <line x1="255" y1="165" x2="360" y2="165" stroke="#CCC" stroke-width="0.5"/>
  <line x1="255" y1="180" x2="360" y2="180" stroke="#CCC" stroke-width="0.5"/>
  <!-- Warning ribbon -->
  <rect x="40" y="150" width="55" height="80" rx="4" fill="#C41E3A" opacity="0.12"/>
  <text x="67" y="180" font-family="Arial" font-size="9" font-weight="bold" fill="#C41E3A" text-anchor="middle">400+</text>
  <text x="67" y="195" font-family="Arial" font-size="7" fill="#C41E3A" text-anchor="middle">видов</text>
  <text x="67" y="208" font-family="Arial" font-size="7" fill="#C41E3A" text-anchor="middle">под</text>
  <text x="67" y="220" font-family="Arial" font-size="7" fill="#C41E3A" text-anchor="middle">угрозой</text>
  <!-- Exclamation mark -->
  <text x="430" y="180" font-family="Arial" font-size="28" font-weight="bold" fill="#C41E3A" text-anchor="middle" opacity="0.4">!</text>
  <!-- Flower (rare plant) -->
  <line x1="420" y1="280" x2="420" y2="255" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="420" cy="255" rx="8" ry="5" fill="#E8A0D0" opacity="0.5"/>
  <circle cx="420" cy="255" r="3" fill="#D4A843" opacity="0.5"/>
</svg>