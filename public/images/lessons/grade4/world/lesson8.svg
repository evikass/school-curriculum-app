<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Князья Руси</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Мудрые, непобедимые, прославленные</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Three panels background -->
  <rect x="25" y="90" width="145" height="215" rx="6" fill="#E8DDD0" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <rect x="178" y="90" width="145" height="215" rx="6" fill="#E8DDD0" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <rect x="331" y="90" width="145" height="215" rx="6" fill="#E8DDD0" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
  <!-- Prince 1: Yaroslav the Wise -->
  <!-- Shield -->
  <ellipse cx="97" cy="200" rx="30" ry="40" fill="#2B4C7E" stroke="#D4A843" stroke-width="2"/>
  <!-- Sword -->
  <line x1="70" y1="160" x2="110" y2="250" stroke="#D4A843" stroke-width="3"/>
  <line x1="70" y1="160" x2="65" y2="152" stroke="#D4A843" stroke-width="5"/>
  <!-- Book symbol (wisdom) -->
  <rect x="85" y="190" width="24" height="18" fill="#F5E6C8" stroke="#1a1a1a" stroke-width="1" rx="2"/>
  <line x1="97" y1="190" x2="97" y2="208" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="92" y="202" font-family="Arial" font-size="6" fill="#1a1a1a">ABC</text>
  <text x="99" y="202" font-family="Arial" font-size="6" fill="#1a1a1a">V</text>
  <!-- Crown -->
  <polygon points="85,155 90,145 95,155 100,145 105,155 97,160" fill="#D4A843"/>
  <text x="97" y="260" font-family="Arial" font-size="9" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Ярослав</text>
  <text x="97" y="272" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Мудрый</text>
  <text x="97" y="285" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">1019-1054</text>

  <!-- Prince 2: Alexander Nevsky -->
  <!-- Shield -->
  <ellipse cx="250" cy="200" rx="30" ry="40" fill="#C41E3A" stroke="#D4A843" stroke-width="2"/>
  <!-- Sword crossed -->
  <line x1="235" y1="165" x2="265" y2="245" stroke="#AAA" stroke-width="2.5"/>
  <line x1="265" y1="165" x2="235" y2="245" stroke="#AAA" stroke-width="2.5"/>
  <line x1="235" y1="165" x2="230" y2="155" stroke="#AAA" stroke-width="4"/>
  <line x1="265" y1="165" x2="270" y2="155" stroke="#AAA" stroke-width="4"/>
  <!-- Helmet -->
  <path d="M235,170 Q250,150 265,170" fill="#666" stroke="#444" stroke-width="1"/>
  <line x1="250" y1="150" x2="250" y2="142" stroke="#666" stroke-width="2"/>
  <text x="250" y="260" font-family="Arial" font-size="9" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Александр</text>
  <text x="250" y="272" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Невский</text>
  <text x="250" y="285" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">1236-1263</text>

  <!-- Prince 3: Dmitry Donskoy -->
  <!-- Shield -->
  <ellipse cx="403" cy="200" rx="30" ry="40" fill="#C41E3A" stroke="#D4A843" stroke-width="2"/>
  <!-- Spear -->
  <line x1="390" y1="155" x2="390" y2="250" stroke="#777" stroke-width="2.5"/>
  <polygon points="390,150 385,160 395,160" fill="#777"/>
  <!-- Battle axe -->
  <line x1="410" y1="170" x2="420" y2="240" stroke="#8B6040" stroke-width="2"/>
  <path d="M415,175 Q425,170 420,185" fill="#777"/>
  <!-- Helmet with chain -->
  <path d="M390,168 Q403,152 416,168" fill="#555" stroke="#333" stroke-width="1"/>
  <line x1="416" y1="168" x2="425" y2="175" stroke="#888" stroke-width="1"/>
  <line x1="425" y1="175" x2="430" y2="180" stroke="#888" stroke-width="1"/>
  <line x1="390" y1="168" x2="381" y2="175" stroke="#888" stroke-width="1"/>
  <line x1="381" y1="175" x2="376" y2="180" stroke="#888" stroke-width="1"/>
  <text x="403" y="260" font-family="Arial" font-size="9" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Дмитрий</text>
  <text x="403" y="272" font-family="Arial" font-size="8" fill="#666" text-anchor="middle">Донской</text>
  <text x="403" y="285" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">1359-1389</text>
</svg>