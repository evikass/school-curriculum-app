<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Растения и животные</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Живые природные ресурсы</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Forest background -->
  <rect x="20" y="85" width="460" height="225" fill="#D5E5C8" rx="6" opacity="0.3"/>
  <!-- Pine tree left -->
  <rect x="60" y="230" width="8" height="60" fill="#6B4226"/>
  <polygon points="64,100 35,180 93,180" fill="#3A6A2A"/>
  <polygon points="64,140 30,210 98,210" fill="#2E5D22"/>
  <polygon points="64,180 25,240 103,240" fill="#2A5020"/>
  <!-- Birch tree -->
  <rect x="140" y="160" width="7" height="130" fill="white" stroke="#999" stroke-width="0.5"/>
  <circle cx="143" cy="145" r="28" fill="#5AA045" opacity="0.6"/>
  <!-- Oak tree right -->
  <rect x="400" y="200" width="10" height="90" fill="#6B4226"/>
  <circle cx="405" cy="175" r="35" fill="#4A8030" opacity="0.5"/>
  <!-- Fox (center bottom) -->
  <polygon points="220,280 250,255 280,280" fill="#D4760A"/>
  <circle cx="270" cy="253" r="10" fill="#D4760A"/>
  <polygon points="266,243 272,232 278,243" fill="#E89030"/>
  <polygon points="260,243 266,232 272,243" fill="#E89030"/>
  <circle cx="275" cy="250" r="1.5" fill="#1a1a1a"/>
  <!-- Bear (behind tree) -->
  <ellipse cx="330" cy="260" rx="30" ry="22" fill="#6B4226" opacity="0.7"/>
  <circle cx="358" cy="242" r="14" fill="#6B4226" opacity="0.7"/>
  <circle cx="363" cy="238" r="2" fill="#1a1a1a"/>
  <ellipse cx="370" cy="245" rx="5" ry="3" fill="#4A2E15" opacity="0.7"/>
  <!-- Bird on branch -->
  <polygon points="310,150 325,142 340,150" fill="#4A4A6B"/>
  <circle cx="335" cy="142" r="6" fill="#4A4A6B"/>
  <circle cx="338" cy="140" r="1.5" fill="white"/>
  <line x1="320" y1="155" x2="315" y2="158" stroke="#6B4226" stroke-width="2"/>
  <!-- Squirrel on birch -->
  <ellipse cx="152" cy="210" rx="8" ry="6" fill="#C07820"/>
  <circle cx="160" cy="206" r="5" fill="#C07820"/>
  <circle cx="162" cy="204" r="1" fill="#1a1a1a"/>
  <path d="M158,205 Q165,195 162,188" stroke="#C07820" stroke-width="2" fill="none"/>
  <!-- Mushroom cluster -->
  <rect x="245" y="280" width="3" height="10" fill="#E8D5C0"/>
  <ellipse cx="246" cy="280" rx="6" ry="4" fill="#C41E3A"/>
  <circle cx="243" cy="279" r="1" fill="white"/>
  <circle cx="249" cy="278" r="0.8" fill="white"/>
  <!-- Berry bush -->
  <circle cx="195" cy="275" r="15" fill="#2E7D32" opacity="0.5"/>
  <circle cx="190" cy="270" r="3" fill="#C41E3A" opacity="0.7"/>
  <circle cx="198" cy="275" r="3" fill="#C41E3A" opacity="0.7"/>
  <circle cx="195" cy="280" r="3" fill="#C41E3A" opacity="0.7"/>
  <circle cx="200" cy="268" r="3" fill="#C41E3A" opacity="0.7"/>
  <!-- Butterfly -->
  <ellipse cx="180" cy="145" rx="8" ry="5" fill="#E8A0D0" opacity="0.6" transform="rotate(-20,180,145)"/>
  <ellipse cx="175" cy="145" rx="8" ry="5" fill="#E8A0D0" opacity="0.6" transform="rotate(20,175,145)"/>
  <!-- Fish in water (bottom) -->
  <path d="M280,295 Q295,288 310,295 Q295,302 280,295Z" fill="#2B4C7E" opacity="0.5"/>
  <polygon points="310,295 318,290 318,300" fill="#2B4C7E" opacity="0.5"/>
</svg>