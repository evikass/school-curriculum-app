<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Леса России</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Тайга и смешанные леса — лёгкие планеты</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Forest background (layered trees) -->
  <!-- Back row - distant trees (lighter) -->
  <rect x="20" y="140" width="460" height="170" fill="#D5E5C8" rx="4"/>
  <!-- Far trees -->
  <polygon points="60,300 80,140 100,300" fill="#5A8A4A" opacity="0.6"/>
  <polygon points="120,300 145,130 170,300" fill="#4A7A3A" opacity="0.6"/>
  <polygon points="200,300 220,135 240,300" fill="#5A8A4A" opacity="0.5"/>
  <polygon points="300,300 325,125 350,300" fill="#4A7A3A" opacity="0.6"/>
  <polygon points="380,300 405,138 430,300" fill="#5A8A4A" opacity="0.5"/>
  <polygon points="430,300 450,145 470,300" fill="#4A7A3A" opacity="0.5"/>
  <!-- Mid trees - pine shapes -->
  <polygon points="50,300 80,160 110,300" fill="#3A6A2A"/>
  <polygon points="80,300 100,180 120,300" fill="#2E5D22"/>
  <polygon points="160,300 185,155 210,300" fill="#3A6A2A"/>
  <polygon points="260,300 280,165 300,300" fill="#2E5D22"/>
  <polygon points="340,300 365,150 390,300" fill="#3A6A2A"/>
  <polygon points="410,300 430,170 450,300" fill="#2E5D22"/>
  <!-- Birch tree (white trunk) -->
  <rect x="228" y="150" width="8" height="150" fill="white" stroke="#888" stroke-width="0.5"/>
  <circle cx="232" cy="140" r="25" fill="#5AA045" opacity="0.8"/>
  <circle cx="220" cy="150" r="18" fill="#4A9035" opacity="0.7"/>
  <circle cx="244" cy="148" r="20" fill="#6AB055" opacity="0.7"/>
  <!-- Birch bark marks -->
  <rect x="229" y="180" width="3" height="4" fill="#555" rx="1"/>
  <rect x="230" y="200" width="3" height="3" fill="#555" rx="1"/>
  <rect x="229" y="220" width="3" height="4" fill="#555" rx="1"/>
  <!-- Forest floor -->
  <rect x="20" y="285" width="460" height="25" fill="#8B7355" rx="3" opacity="0.5"/>
  <!-- Mushroom cluster -->
  <rect x="135" y="283" width="4" height="12" fill="#E8D5C0"/>
  <ellipse cx="137" cy="283" rx="8" ry="5" fill="#C41E3A"/>
  <circle cx="133" cy="282" r="1.5" fill="white"/>
  <circle cx="140" cy="281" r="1" fill="white"/>
  <!-- Fox -->
  <polygon points="340,285 365,260 390,285" fill="#D4760A"/>
  <circle cx="377" cy="258" r="8" fill="#D4760A"/>
  <polygon points="373,250 377,242 381,250" fill="#E89030"/>
  <polygon points="369,250 373,242 377,250" fill="#E89030"/>
  <circle cx="380" cy="256" r="1.5" fill="#1a1a1a"/>
  <!-- Label -->
  <rect x="30" y="90" width="80" height="22" rx="3" fill="#2E7D32" opacity="0.15"/>
  <text x="70" y="105" font-family="Arial" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ТАЙГА</text>
  <!-- Pine cone -->
  <ellipse cx="420" cy="292" rx="6" ry="4" fill="#6B4226"/>
  <line x1="417" y1="290" x2="423" y2="294" stroke="#4A2E15" stroke-width="0.5"/>
  <line x1="420" y1="289" x2="420" y2="295" stroke="#4A2E15" stroke-width="0.5"/>
</svg>