<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Вода и воздух</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Главные богатства нашей планеты</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Water cycle diagram (left side) -->
  <!-- Sun -->
  <circle cx="100" cy="100" r="20" fill="#D4A843" opacity="0.6"/>
  <line x1="100" y1="72" x2="100" y2="65" stroke="#D4A843" stroke-width="2"/>
  <line x1="100" y1="128" x2="100" y2="135" stroke="#D4A843" stroke-width="2"/>
  <line x1="72" y1="100" x2="65" y2="100" stroke="#D4A843" stroke-width="2"/>
  <line x1="128" y1="100" x2="135" y2="100" stroke="#D4A843" stroke-width="2"/>
  <!-- Cloud -->
  <ellipse cx="120" cy="145" rx="35" ry="15" fill="#DDD" opacity="0.6"/>
  <ellipse cx="105" cy="148" rx="20" ry="12" fill="#DDD" opacity="0.6"/>
  <ellipse cx="135" cy="148" rx="20" ry="12" fill="#DDD" opacity="0.6"/>
  <!-- Rain drops -->
  <line x1="100" y1="162" x2="98" y2="175" stroke="#2B4C7E" stroke-width="1.5"/>
  <line x1="115" y1="162" x2="113" y2="178" stroke="#2B4C7E" stroke-width="1.5"/>
  <line x1="130" y1="162" x2="128" y2="173" stroke="#2B4C7E" stroke-width="1.5"/>
  <line x1="108" y1="163" x2="106" y2="176" stroke="#2B4C7E" stroke-width="1"/>
  <line x1="122" y1="163" x2="120" y2="174" stroke="#2B4C7E" stroke-width="1"/>
  <!-- River -->
  <path d="M50,220 Q90,210 130,220 Q170,230 210,220" stroke="#2B4C7E" stroke-width="12" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Mountain -->
  <polygon points="40,220 80,140 120,220" fill="#8AA8C8" opacity="0.3"/>
  <!-- Evaporation arrows -->
  <path d="M100,215 Q95,200 100,185" stroke="#2B4C7E" stroke-width="0.8" fill="none" stroke-dasharray="3,2" opacity="0.5"/>
  <polygon points="98,185 100,178 102,185" fill="#2B4C7E" opacity="0.5"/>
  <!-- Labels -->
  <text x="50" y="290" font-family="Arial" font-size="8" fill="#2B4C7E">Испарение</text>
  <text x="50" y="302" font-family="Arial" font-size="8" fill="#2B4C7E">Осадки</text>

  <!-- Air composition (right side) -->
  <!-- Pie chart -->
  <circle cx="350" cy="190" r="60" fill="#DDD" opacity="0.3"/>
  <!-- Nitrogen 78% (large slice) -->
  <path d="M350,130 A60,60 0 1,1 291,158 L350,190 Z" fill="#B8CCE0" stroke="white" stroke-width="1"/>
  <!-- Oxygen 21% -->
  <path d="M291,158 A60,60 0 0,1 345,130 L350,190 Z" fill="#E8D0D0" stroke="white" stroke-width="1"/>
  <!-- Other 1% -->
  <path d="M345,130 A60,60 0 0,1 350,130 L350,190 Z" fill="#D4D4D4" stroke="white" stroke-width="1"/>
  <!-- Center hole -->
  <circle cx="350" cy="190" r="20" fill="#F5E6C8"/>
  <text x="350" y="193" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle">ВОЗДУХ</text>
  <!-- Legend -->
  <rect x="410" y="100" width="10" height="10" fill="#B8CCE0" rx="2"/>
  <text x="425" y="109" font-family="Arial" font-size="8" fill="#1a1a1a">N₂ — 78%</text>
  <rect x="410" y="118" width="10" height="10" fill="#E8D0D0" rx="2"/>
  <text x="425" y="127" font-family="Arial" font-size="8" fill="#1a1a1a">O₂ — 21%</text>
  <rect x="410" y="136" width="10" height="10" fill="#D4D4D4" rx="2"/>
  <text x="425" y="145" font-family="Arial" font-size="8" fill="#1a1a1a">Прочее — 1%</text>
  <!-- Water stat -->
  <rect x="40" y="240" width="85" height="30" rx="4" fill="#2B4C7E" opacity="0.1"/>
  <text x="82" y="255" font-family="Arial" font-size="9" font-weight="bold" fill="#2B4C7E" text-anchor="middle">71% воды</text>
  <text x="82" y="266" font-family="Arial" font-size="7" fill="#888" text-anchor="middle">на Земле</text>
</svg>