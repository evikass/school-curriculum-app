<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Полезные ископаемые</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Сокровища недр земли</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Sky -->
  <rect x="20" y="85" width="460" height="50" fill="#B8CCE0" opacity="0.2" rx="4"/>
  <!-- Grass surface -->
  <rect x="20" y="130" width="460" height="15" fill="#2E7D32" opacity="0.4" rx="2"/>
  <!-- Soil layer -->
  <rect x="20" y="145" width="460" height="30" fill="#8B6040" opacity="0.4"/>
  <text x="250" y="165" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">Почва</text>
  <!-- Clay layer -->
  <rect x="20" y="175" width="460" height="25" fill="#A08060" opacity="0.5"/>
  <text x="250" y="192" font-family="Arial" font-size="7" fill="#665544" text-anchor="middle">Глина</text>
  <!-- Sand layer -->
  <rect x="20" y="200" width="460" height="20" fill="#D4B880" opacity="0.5"/>
  <text x="250" y="214" font-family="Arial" font-size="7" fill="#8B7A50" text-anchor="middle">Песок</text>
  <!-- Rock layer -->
  <rect x="20" y="220" width="460" height="25" fill="#888" opacity="0.4"/>
  <text x="250" y="237" font-family="Arial" font-size="7" fill="#555" text-anchor="middle">Горные породы</text>
  <!-- Deep rock layer -->
  <rect x="20" y="245" width="460" height="25" fill="#666" opacity="0.4"/>
  <!-- Minerals embedded -->
  <!-- Oil drop -->
  <ellipse cx="80" cy="262" rx="15" ry="12" fill="#1a1a1a"/>
  <text x="80" y="266" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Нефть</text>
  <!-- Gas -->
  <ellipse cx="160" cy="262" rx="15" ry="12" fill="#C8A050" opacity="0.7"/>
  <text x="160" y="266" font-family="Arial" font-size="7" fill="#1a1a1a" text-anchor="middle">Газ</text>
  <!-- Coal -->
  <rect x="225" y="252" width="30" height="20" rx="4" fill="#333"/>
  <text x="240" y="266" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Уголь</text>
  <!-- Gold nuggets -->
  <circle cx="310" cy="258" r="8" fill="#D4A843"/>
  <circle cx="325" cy="262" r="6" fill="#D4A843"/>
  <text x="318" y="280" font-family="Arial" font-size="7" fill="#8B6A20">Золото</text>
  <!-- Iron ore -->
  <rect x="370" y="252" width="30" height="20" rx="4" fill="#8B4040"/>
  <text x="385" y="266" font-family="Arial" font-size="7" fill="white" text-anchor="middle">Руда</text>
  <!-- Drill tower on surface -->
  <rect x="90" y="90" width="4" height="42" fill="#555"/>
  <polygon points="75,92 92,80 92,92" fill="#555"/>
  <line x1="70" y1="92" x2="115" y2="92" stroke="#555" stroke-width="1.5"/>
  <!-- Pickaxe -->
  <line x1="350" y1="100" x2="400" y2="140" stroke="#6B4226" stroke-width="3"/>
  <path d="M400,140 L410,135 L405,145 Z" fill="#888"/>
  <!-- Miners helmet (left) -->
  <path d="M410,95 Q420,85 430,95" fill="#D4A843" stroke="#8B6A20" stroke-width="1"/>
  <line x1="420" y1="85" x2="420" y2="80" stroke="#D4A843" stroke-width="1.5"/>
  <circle cx="420" cy="80" r="2" fill="#D4A843"/>
</svg>