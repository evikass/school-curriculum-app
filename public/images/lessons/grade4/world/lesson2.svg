<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Арктика и тундра</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Край вечных льдов и северных сияний</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Aurora borealis (geometric waves) -->
  <path d="M50,90 Q120,100 160,85 Q200,70 250,88 Q300,105 350,82 Q400,60 450,90" stroke="#2E7D32" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M60,98 Q130,110 170,93 Q210,78 260,96 Q310,113 360,90 Q410,68 460,98" stroke="#4CAF50" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M70,106 Q140,118 180,101 Q220,86 270,104 Q320,121 370,98 Q420,76 460,106" stroke="#2B4C7E" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Ice/snow ground -->
  <path d="M30,270 Q100,250 180,265 Q250,278 320,260 Q400,242 470,270 L470,300 L30,300 Z" fill="#E0EEF5"/>
  <path d="M30,285 Q120,275 200,282 Q280,290 360,278 Q420,270 470,285 L470,310 L30,310 Z" fill="#C8DDE8"/>
  <!-- Polar bear (simplified Bauhaus style) -->
  <ellipse cx="300" cy="245" rx="35" ry="22" fill="#F0F0F0" stroke="#D0D0D0" stroke-width="1"/>
  <circle cx="330" cy="230" r="14" fill="#F0F0F0" stroke="#D0D0D0" stroke-width="1"/>
  <circle cx="336" cy="226" r="2" fill="#1a1a1a"/>
  <circle cx="342" cy="226" r="2" fill="#1a1a1a"/>
  <ellipse cx="338" cy="233" rx="4" ry="2.5" fill="#333"/>
  <!-- Bear legs -->
  <ellipse cx="278" cy="262" rx="8" ry="5" fill="#F0F0F0" stroke="#D0D0D0" stroke-width="0.5"/>
  <ellipse cx="298" cy="264" rx="8" ry="5" fill="#F0F0F0" stroke="#D0D0D0" stroke-width="0.5"/>
  <ellipse cx="318" cy="264" rx="8" ry="5" fill="#F0F0F0" stroke="#D0D0D0" stroke-width="0.5"/>
  <!-- Mountain silhouettes -->
  <polygon points="60,270 100,190 140,270" fill="#8AA8C8" opacity="0.5"/>
  <polygon points="110,270 165,170 220,270" fill="#7A98B8" opacity="0.4"/>
  <polygon points="170,270 210,200 250,270" fill="#9AB8D0" opacity="0.3"/>
  <!-- Snow cap on mountain -->
  <polygon points="100,190 90,205 110,205" fill="white" opacity="0.7"/>
  <polygon points="165,170 152,190 178,190" fill="white" opacity="0.7"/>
  <!-- Seal on ice -->
  <ellipse cx="160" cy="258" rx="18" ry="8" fill="#8B7355"/>
  <circle cx="148" cy="254" r="6" fill="#8B7355"/>
  <circle cx="146" cy="252" r="1.5" fill="#1a1a1a"/>
  <!-- Temperature indicator -->
  <rect x="395" y="120" width="65" height="45" rx="4" fill="#C41E3A" opacity="0.15"/>
  <text x="427" y="140" font-family="Arial" font-size="14" font-weight="bold" fill="#C41E3A" text-anchor="middle">-50°C</text>
  <text x="427" y="156" font-family="Arial" font-size="7" fill="#666" text-anchor="middle">зимой</text>
</svg>