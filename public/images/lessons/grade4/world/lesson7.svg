<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Крещение Руси</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Князь Владимир и новая вера</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Sky with rays -->
  <line x1="250" y1="100" x2="100" y2="200" stroke="#D4A843" stroke-width="0.8" opacity="0.2"/>
  <line x1="250" y1="100" x2="150" y2="300" stroke="#D4A843" stroke-width="0.8" opacity="0.2"/>
  <line x1="250" y1="100" x2="350" y2="300" stroke="#D4A843" stroke-width="0.8" opacity="0.2"/>
  <line x1="250" y1="100" x2="400" y2="200" stroke="#D4A843" stroke-width="0.8" opacity="0.2"/>
  <line x1="250" y1="100" x2="250" y2="300" stroke="#D4A843" stroke-width="0.8" opacity="0.2"/>
  <!-- Big church/cathedral -->
  <rect x="180" y="150" width="140" height="120" fill="#E8D8C0" stroke="#A09070" stroke-width="1"/>
  <!-- Central dome -->
  <ellipse cx="250" cy="148" rx="22" ry="30" fill="#D4A843"/>
  <ellipse cx="250" cy="148" rx="20" ry="28" fill="#D4A843"/>
  <!-- Cross on central dome -->
  <line x1="250" y1="118" x2="250" y2="108" stroke="#D4A843" stroke-width="3"/>
  <line x1="245" y1="113" x2="255" y2="113" stroke="#D4A843" stroke-width="3"/>
  <!-- Side domes -->
  <ellipse cx="210" cy="155" rx="14" ry="18" fill="#D4A843"/>
  <line x1="210" y1="137" x2="210" y2="130" stroke="#D4A843" stroke-width="2"/>
  <line x1="207" y1="133" x2="213" y2="133" stroke="#D4A843" stroke-width="2"/>
  <ellipse cx="290" cy="155" rx="14" ry="18" fill="#D4A843"/>
  <line x1="290" y1="137" x2="290" y2="130" stroke="#D4A843" stroke-width="2"/>
  <line x1="287" y1="133" x2="293" y2="133" stroke="#D4A843" stroke-width="2"/>
  <!-- Church door -->
  <rect x="232" y="230" width="36" height="40" fill="#4A2E15" rx="18"/>
  <!-- Church windows -->
  <rect x="195" y="175" width="14" height="22" fill="#B8D4E8" rx="7" stroke="#A09070" stroke-width="1"/>
  <rect x="240" y="175" width="20" height="26" fill="#B8D4E8" rx="10" stroke="#A09070" stroke-width="1"/>
  <rect x="291" y="175" width="14" height="22" fill="#B8D4E8" rx="7" stroke="#A09070" stroke-width="1"/>
  <!-- River (Dnieper) -->
  <rect x="20" y="275" width="460" height="35" fill="#7AADD0" rx="4" opacity="0.4"/>
  <!-- People in river (silhouettes) -->
  <circle cx="80" cy="268" r="6" fill="#888" opacity="0.6"/>
  <rect x="76" y="275" width="8" height="18" fill="#888" opacity="0.5" rx="2"/>
  <circle cx="100" cy="270" r="6" fill="#888" opacity="0.6"/>
  <rect x="96" y="277" width="8" height="18" fill="#888" opacity="0.5" rx="2"/>
  <circle cx="120" cy="272" r="5" fill="#888" opacity="0.6"/>
  <rect x="117" y="278" width="6" height="16" fill="#888" opacity="0.5" rx="2"/>
  <!-- Year banner -->
  <rect x="370" y="100" width="90" height="35" rx="5" fill="#C41E3A" opacity="0.15"/>
  <text x="415" y="122" font-family="Arial" font-size="18" font-weight="bold" fill="#C41E3A" text-anchor="middle">988</text>
  <!-- Cyrillic letter hints -->
  <text x="415" y="148" font-family="Arial" font-size="8" fill="#888" text-anchor="middle">год крещения</text>
  <!-- Water ripple effect -->
  <path d="M40,285 Q60,282 80,285 Q100,288 120,285" stroke="#2B4C7E" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M350,288 Q370,285 390,288 Q410,291 430,288" stroke="#2B4C7E" stroke-width="0.5" fill="none" opacity="0.5"/>
</svg>