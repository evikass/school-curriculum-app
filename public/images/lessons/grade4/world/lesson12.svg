<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Кровообращение</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Сердце — вечный мотор организма</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Big central heart -->
  <path d="M200,180 Q200,140 250,140 Q300,140 300,180 Q300,220 250,260 Q200,220 200,180Z" fill="#C41E3A" stroke="#A01830" stroke-width="2"/>
  <!-- Heart chambers -->
  <line x1="250" y1="145" x2="250" y2="250" stroke="#A01830" stroke-width="1" opacity="0.4"/>
  <line x1="205" y1="195" x2="295" y2="195" stroke="#A01830" stroke-width="1" opacity="0.4"/>
  <!-- Chamber labels -->
  <text x="225" y="175" font-family="Arial" font-size="6" fill="white" opacity="0.7">ПП</text>
  <text x="262" y="175" font-family="Arial" font-size="6" fill="white" opacity="0.7">ЛП</text>
  <text x="225" y="225" font-family="Arial" font-size="6" fill="white" opacity="0.7">ПЖ</text>
  <text x="262" y="225" font-family="Arial" font-size="6" fill="white" opacity="0.7">ЛЖ</text>
  <!-- Aorta (top) -->
  <path d="M250,140 L250,110 Q250,95 240,95" stroke="#C41E3A" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Arteries (red, going out) -->
  <path d="M240,95 Q180,90 140,110 Q100,130 80,150" stroke="#C41E3A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M240,95 Q300,90 360,110 Q400,130 420,155" stroke="#C41E3A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Capillaries network (right side) -->
  <path d="M420,155 Q440,180 420,200 Q400,220 420,240" stroke="#C41E3A" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Veins (blue, coming back) -->
  <path d="M80,150 Q60,180 80,200 Q100,220 80,240 Q60,260 90,280" stroke="#2B4C7E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M420,240 Q440,260 410,280" stroke="#2B4C7E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Veins back to heart -->
  <path d="M90,280 Q150,295 200,270" stroke="#2B4C7E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M410,280 Q350,295 300,270" stroke="#2B4C7E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Direction arrows -->
  <polygon points="135,105 125,110 130,100" fill="#C41E3A"/>
  <polygon points="365,105 375,110 370,100" fill="#C41E3A"/>
  <text x="110" y="100" font-family="Arial" font-size="7" fill="#C41E3A">Артерии</text>
  <text x="340" y="100" font-family="Arial" font-size="7" fill="#C41E3A">Артерии</text>
  <text x="55" y="265" font-family="Arial" font-size="7" fill="#2B4C7E">Вены</text>
  <text x="425" y="275" font-family="Arial" font-size="7" fill="#2B4C7E">Вены</text>
  <!-- Pulse wave (bottom) -->
  <path d="M150,300 Q170,300 190,300 L210,300 L220,285 L230,310 L240,295 L250,300 Q280,300 350,300" stroke="#C41E3A" stroke-width="1.5" fill="none" opacity="0.5"/>
  <text x="250" y="312" font-family="Arial" font-size="7" fill="#C41E3A" text-anchor="middle">ПУЛЬС</text>
  <!-- Stats -->
  <rect x="30" y="92" width="65" height="35" rx="4" fill="#C41E3A" opacity="0.1"/>
  <text x="62" y="108" font-family="Arial" font-size="10" font-weight="bold" fill="#C41E3A" text-anchor="middle">80-90</text>
  <text x="62" y="121" font-family="Arial" font-size="6" fill="#888" text-anchor="middle">уд./мин</text>
  <text x="250" y="160" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold">СЕРДЦЕ</text>
</svg>