<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Охрана природы</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Защитим наш общий дом</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Divided scene: left dirty, right clean -->
  <!-- Left side - pollution -->
  <rect x="20" y="90" width="225" height="220" rx="4" fill="#D8D0C8" opacity="0.3"/>
  <!-- Factory with smoke -->
  <rect x="50" y="200" width="80" height="70" fill="#888" stroke="#666" stroke-width="1"/>
  <rect x="60" y="160" width="15" height="45" fill="#777"/>
  <rect x="95" y="170" width="12" height="35" fill="#777"/>
  <!-- Smoke -->
  <circle cx="67" cy="150" r="10" fill="#999" opacity="0.4"/>
  <circle cx="75" cy="135" r="14" fill="#999" opacity="0.3"/>
  <circle cx="65" cy="118" r="16" fill="#999" opacity="0.2"/>
  <circle cx="101" cy="158" r="8" fill="#999" opacity="0.3"/>
  <circle cx="107" cy="145" r="12" fill="#999" opacity="0.2"/>
  <!-- Dead tree -->
  <rect x="170" y="220" width="6" height="50" fill="#555"/>
  <line x1="173" y1="230" x2="155" y2="210" stroke="#555" stroke-width="2"/>
  <line x1="173" y1="225" x2="190" y2="205" stroke="#555" stroke-width="2"/>
  <!-- Waste in water -->
  <rect x="30" y="270" width="200" height="30" fill="#7A8A6A" rx="3" opacity="0.3"/>
  <rect x="80" y="272" width="15" height="12" fill="#888" rx="1" opacity="0.5"/>
  <rect x="120" y="275" width="10" height="8" fill="#888" rx="1" opacity="0.5"/>
  <!-- X mark -->
  <text x="130" y="130" font-family="Arial" font-size="30" font-weight="bold" fill="#C41E3A" text-anchor="middle" opacity="0.3">X</text>
  <text x="130" y="295" font-family="Arial" font-size="8" fill="#C41E3A" text-anchor="middle">Загрязнение</text>

  <!-- Vertical divider -->
  <line x1="250" y1="90" x2="250" y2="310" stroke="#C41E3A" stroke-width="2" opacity="0.3"/>

  <!-- Right side - clean nature -->
  <rect x="255" y="90" width="225" height="220" rx="4" fill="#D5E8D0" opacity="0.3"/>
  <!-- Clean trees -->
  <polygon points="310,300 340,200 370,300" fill="#4A8A3A"/>
  <polygon points="350,300 375,220 400,300" fill="#3A7A2A"/>
  <polygon points="400,300 425,210 450,300" fill="#4A8A3A"/>
  <!-- Clean river -->
  <path d="M260,270 Q320,258 380,270 Q430,280 480,268" stroke="#2B4C7E" stroke-width="15" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Sun -->
  <circle cx="440" cy="120" r="22" fill="#D4A843" opacity="0.5"/>
  <circle cx="440" cy="120" r="12" fill="#D4A843"/>
  <!-- Bird -->
  <path d="M290,130 Q295,125 300,130" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <path d="M300,130 Q305,125 310,130" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Checkmark -->
  <text x="370" y="130" font-family="Arial" font-size="30" font-weight="bold" fill="#2E7D32" text-anchor="middle" opacity="0.3">V</text>
  <text x="370" y="295" font-family="Arial" font-size="8" fill="#2E7D32" text-anchor="middle">Защита природы</text>
  <!-- Central shield -->
  <ellipse cx="250" cy="195" rx="25" ry="32" fill="#C41E3A" opacity="0.15" stroke="#C41E3A" stroke-width="1.5"/>
  <text x="250" y="200" font-family="Arial" font-size="18" font-weight="bold" fill="#2E7D32" text-anchor="middle" opacity="0.6">!</text>
</svg>