<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Red top accent bar -->
  <rect x="0" y="0" width="500" height="8" fill="#C41E3A"/>
  <!-- Gold accent line -->
  <rect x="0" y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Cream background -->
  <rect x="0" y="10" width="500" height="325" fill="#F5E6C8"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Древние славяне</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">Жизнь, быт и верования наших предков</text>
  <!-- Decorative line under title -->
  <line x1="150" y1="78" x2="350" y2="78" stroke="#C41E3A" stroke-width="1.5" opacity="0.6"/>
  <!-- Bottom dark bar -->
  <rect x="0" y="318" width="500" height="32" fill="#1a1a1a"/>
  <!-- Gold accent on bottom bar -->
  <rect x="0" y="316" width="500" height="2" fill="#D4A843"/>
  <!-- Bottom text -->
  <text x="250" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#F5E6C8">Окружающий мир — 4 класс</text>
  <!-- Sky -->
  <rect x="20" y="85" width="460" height="100" fill="#B8CCE0" rx="4" opacity="0.3"/>
  <!-- Ground -->
  <rect x="20" y="185" width="460" height="125" fill="#8B7355" rx="4" opacity="0.3"/>
  <!-- Log cabin (izba) -->
  <rect x="60" y="180" width="90" height="70" fill="#A0722A" stroke="#6B4E1A" stroke-width="1.5"/>
  <!-- Log lines -->
  <line x1="60" y1="195" x2="150" y2="195" stroke="#6B4E1A" stroke-width="0.5" opacity="0.5"/>
  <line x1="60" y1="210" x2="150" y2="210" stroke="#6B4E1A" stroke-width="0.5" opacity="0.5"/>
  <line x1="60" y1="225" x2="150" y2="225" stroke="#6B4E1A" stroke-width="0.5" opacity="0.5"/>
  <!-- Roof -->
  <polygon points="50,180 105,140 160,180" fill="#6B4226"/>
  <!-- Roof ridge -->
  <line x1="105" y1="140" x2="105" y2="138" stroke="#4A2E15" stroke-width="2"/>
  <!-- Door -->
  <rect x="90" y="220" width="25" height="30" fill="#4A2E15" rx="2"/>
  <circle cx="110" cy="237" r="2" fill="#D4A843"/>
  <!-- Window -->
  <rect x="70" y="195" width="18" height="16" fill="#B8D4E8" stroke="#4A2E15" stroke-width="1"/>
  <line x1="79" y1="195" x2="79" y2="211" stroke="#4A2E15" stroke-width="0.5"/>
  <line x1="70" y1="203" x2="88" y2="203" stroke="#4A2E15" stroke-width="0.5"/>
  <!-- Chimney -->
  <rect x="130" y="145" width="12" height="25" fill="#8B6040"/>
  <!-- Smoke -->
  <circle cx="136" cy="140" r="5" fill="#CCC" opacity="0.4"/>
  <circle cx="140" cy="132" r="6" fill="#CCC" opacity="0.3"/>
  <circle cx="138" cy="122" r="7" fill="#CCC" opacity="0.2"/>
  <!-- Second house (smaller) -->
  <rect x="220" y="200" width="70" height="55" fill="#B08030" stroke="#6B4E1A" stroke-width="1"/>
  <polygon points="212,200 255,165 298,200" fill="#7A4E26"/>
  <rect x="242" y="230" width="18" height="25" fill="#4A2E15" rx="2"/>
  <!-- Farm field with crops -->
  <rect x="340" y="220" width="130" height="50" fill="#B8A050" rx="3" stroke="#8B7A30" stroke-width="0.5"/>
  <!-- Wheat stalks -->
  <line x1="360" y1="265" x2="358" y2="235" stroke="#8B7A30" stroke-width="1"/>
  <ellipse cx="357" cy="234" rx="3" ry="5" fill="#C4A843"/>
  <line x1="375" y1="263" x2="373" y2="232" stroke="#8B7A30" stroke-width="1"/>
  <ellipse cx="372" cy="231" rx="3" ry="5" fill="#C4A843"/>
  <line x1="390" y1="265" x2="388" y2="233" stroke="#8B7A30" stroke-width="1"/>
  <ellipse cx="387" cy="232" rx="3" ry="5" fill="#C4A843"/>
  <line x1="405" y1="263" x2="403" y2="234" stroke="#8B7A30" stroke-width="1"/>
  <ellipse cx="402" cy="233" rx="3" ry="5" fill="#C4A843"/>
  <line x1="420" y1="265" x2="418" y2="230" stroke="#8B7A30" stroke-width="1"/>
  <ellipse cx="417" cy="229" rx="3" ry="5" fill="#C4A843"/>
  <line x1="440" y1="264" x2="438" y2="236" stroke="#8B7A30" stroke-width="1"/>
  <ellipse cx="437" cy="235" rx="3" ry="5" fill="#C4A843"/>
  <!-- Horse -->
  <ellipse cx="315" cy="275" rx="25" ry="12" fill="#8B6A3A"/>
  <circle cx="340" cy="265" r="10" fill="#8B6A3A"/>
  <polygon points="348,260 358,255 350,265" fill="#8B6A3A"/>
  <line x1="300" y1="285" x2="298" y2="300" stroke="#6B4A2A" stroke-width="2"/>
  <line x1="310" y1="285" x2="308" y2="300" stroke="#6B4A2A" stroke-width="2"/>
  <line x1="325" y1="285" x2="327" y2="300" stroke="#6B4A2A" stroke-width="2"/>
  <line x1="335" y1="283" x2="337" y2="298" stroke="#6B4A2A" stroke-width="2"/>
  <!-- River -->
  <path d="M0,185 Q60,178 120,185 Q180,192 240,185" stroke="#2B4C7E" stroke-width="8" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Plow on ground -->
  <line x1="175" y1="275" x2="200" y2="260" stroke="#555" stroke-width="2"/>
  <line x1="200" y1="260" x2="210" y2="270" stroke="#555" stroke-width="2"/>
  <polygon points="200,255 195,265 205,265" fill="#777"/>
</svg>