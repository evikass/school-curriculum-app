<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Что такое религия</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Религии мира</text>
  <!-- Illustration area -->
  <circle cx="250" cy="190" r="65" fill="#2B4C7E" opacity="0.12" stroke="#2B4C7E" stroke-width="2"/><ellipse cx="250" cy="190" rx="65" ry="25" fill="none" stroke="#2B4C7E" stroke-width="1" opacity="0.4"/><ellipse cx="250" cy="190" rx="25" ry="65" fill="none" stroke="#2B4C7E" stroke-width="1" opacity="0.4"/><line x1="185" y1="190" x2="315" y2="190" stroke="#2B4C7E" stroke-width="1" opacity="0.4"/><line x1="250" y1="125" x2="250" y2="255" stroke="#2B4C7E" stroke-width="1" opacity="0.4"/><!-- Cross --><line x1="220" y1="145" x2="220" y2="165" stroke="#D4A843" stroke-width="3"/><line x1="213" y1="150" x2="227" y2="150" stroke="#D4A843" stroke-width="3"/><!-- Crescent --><circle cx="285" cy="150" r="8" fill="none" stroke="#D4A843" stroke-width="2"/><circle cx="289" cy="148" r="7" fill="#2B4C7E" opacity="0.12"/><!-- Star of David --><polygon points="195,225 205,210 215,225 205,240" fill="none" stroke="#D4A843" stroke-width="1.5"/><polygon points="200,230 210,215 220,230 210,245" fill="none" stroke="#D4A843" stroke-width="1.5"/><!-- Dharma wheel --><circle cx="305" cy="228" r="10" fill="none" stroke="#D4A843" stroke-width="1.5"/><circle cx="305" cy="228" r="3" fill="#D4A843"/><text x="250" y="290" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Свобода вероисповедания</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>