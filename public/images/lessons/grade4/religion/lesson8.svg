<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Пост и традиции</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Православная культура</text>
  <!-- Illustration area -->
  <!-- Bread (no yeast during strict fast) --><ellipse cx="200" cy="200" rx="40" ry="30" fill="#d4a76a" stroke="#8B6914" stroke-width="2"/><ellipse cx="200" cy="195" rx="35" ry="20" fill="#e8c88a" stroke="none"/><line x1="175" y1="195" x2="225" y2="195" stroke="#c4a06a" stroke-width="1" stroke-dasharray="4,3"/><!-- Vegetables --><circle cx="290" cy="190" r="18" fill="#FF6347" stroke="#cc3f2e" stroke-width="1.5"/><line x1="290" y1="172" x2="290" y2="165" stroke="#228B22" stroke-width="2"/><ellipse cx="290" cy="162" rx="6" ry="4" fill="#228B22"/><rect x="320" y="180" width="18" height="30" rx="3" fill="#32CD32" stroke="#228B22" stroke-width="1"/><circle cx="345" cy="210" r="14" fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/><text x="250" y="265" text-anchor="middle" font-size="11" fill="#1a1a1a" font-family="Arial">40 дней перед Пасхой</text><text x="250" y="285" text-anchor="middle" font-size="10" fill="#C41E3A" font-family="Arial">Милосердие и добрые дела</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>