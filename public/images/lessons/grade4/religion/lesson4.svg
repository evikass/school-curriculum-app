<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Священные книги</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Религии мира</text>
  <!-- Illustration area -->
  <rect x="140" y="130" width="220" height="130" rx="3" fill="#8B4513" stroke="#1a1a1a" stroke-width="2"/><rect x="145" y="125" width="210" height="10" rx="2" fill="#6B3410"/><rect x="148" y="128" width="204" height="4" fill="#D4A843"/><line x1="250" y1="130" x2="250" y2="260" stroke="#5a2d0a" stroke-width="2"/><rect x="155" y="142" width="88" height="108" rx="2" fill="#FFF8DC"/><rect x="257" y="142" width="88" height="108" rx="2" fill="#FFF8DC"/><line x1="165" y1="158" x2="233" y2="158" stroke="#bbb" stroke-width="1"/><line x1="165" y1="170" x2="225" y2="170" stroke="#bbb" stroke-width="1"/><line x1="165" y1="182" x2="230" y2="182" stroke="#bbb" stroke-width="1"/><line x1="165" y1="194" x2="220" y2="194" stroke="#bbb" stroke-width="1"/><line x1="165" y1="206" x2="228" y2="206" stroke="#bbb" stroke-width="1"/><line x1="267" y1="158" x2="335" y2="158" stroke="#bbb" stroke-width="1"/><line x1="267" y1="170" x2="328" y2="170" stroke="#bbb" stroke-width="1"/><line x1="267" y1="182" x2="332" y2="182" stroke="#bbb" stroke-width="1"/><line x1="267" y1="194" x2="322" y2="194" stroke="#bbb" stroke-width="1"/><text x="250" y="290" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Библия, Коран, Тора</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>