<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Ислам и другие религии</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Религии мира</text>
  <!-- Illustration area -->
  <!-- Mosque --><rect x="110" y="180" width="60" height="70" fill="#ddd" stroke="#999" stroke-width="1.5"/><path d="M120,180 Q140,145 160,180" fill="#87CEEB" stroke="#999" stroke-width="1"/><rect x="138" y="140" width="4" height="40" fill="#999"/><circle cx="140" cy="138" r="5" fill="#999"/><circle cx="140" cy="138" r="3" fill="#87CEEB"/><text x="140" y="270" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">Мечеть</text><!-- Synagogue --><rect x="220" y="175" width="60" height="75" fill="#e8d8b8" stroke="#999" stroke-width="1.5"/><polygon points="250,135 220,175 280,175" fill="#6B8E23" stroke="#999" stroke-width="1"/><polygon points="200,200 250,150 300,200" fill="none" stroke="#D4A843" stroke-width="1.5"/><polygon points="210,200 250,160 290,200" fill="none" stroke="#D4A843" stroke-width="1.5"/><text x="250" y="270" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">Синагога</text><!-- Stupa --><ellipse cx="375" cy="240" rx="30" ry="10" fill="#ddd" stroke="#999" stroke-width="1.5"/><path d="M360,240 Q375,180 390,240" fill="#ddd" stroke="#999" stroke-width="1"/><circle cx="375" cy="175" r="8" fill="#D4A843" stroke="#999" stroke-width="1"/><rect x="370" y="155" width="10" height="20" fill="#999"/><text x="375" y="270" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial">Пагода</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>