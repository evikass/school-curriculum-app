<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Милосердие и помощь</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Нравственные ценности</text>
  <!-- Illustration area -->
  <path d="M150,200 Q160,170 200,160 Q240,155 260,180 Q265,195 255,220" fill="#e8b89d" stroke="#c4826a" stroke-width="2"/><path d="M350,200 Q340,170 300,160 Q260,155 240,180 Q235,195 245,220" fill="#e8b89d" stroke="#c4826a" stroke-width="2"/><text x="250" y="260" text-anchor="middle" font-size="22" fill="#C41E3A" font-family="Arial" font-weight="bold">Любовь</text><text x="250" y="185" text-anchor="middle" font-size="13" fill="#D4A843" font-family="Arial" font-weight="bold">Помощь</text><text x="250" y="290" text-anchor="middle" font-size="11" fill="#1a1a1a" font-family="Arial">Возлюби ближнего как себя</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>