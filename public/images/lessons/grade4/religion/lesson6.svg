<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#6A1B9A"/>
    <stop offset="100%" style="stop-color:#BA68C8"/>
  </linearGradient>
  <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
    <stop offset="100%" style="stop-color:rgba(255,255,255,0.85)"/>
  </linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)"/>
<circle cx="50" cy="30" r="25" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
<circle cx="50" cy="30" r="15" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
<circle cx="160" cy="310" r="25" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
<circle cx="160" cy="310" r="15" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
<circle cx="270" cy="30" r="25" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
<circle cx="270" cy="30" r="15" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
<circle cx="380" cy="310" r="25" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
<circle cx="380" cy="310" r="15" fill="none" stroke="white" stroke-width="0.5" opacity="0.08"/>
<circle cx="490" cy="30" r="25" fill="none" stroke="white" stroke-width="1" opacity="0.08"/>
