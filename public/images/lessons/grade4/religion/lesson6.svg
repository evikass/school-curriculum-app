<rect x="30" y="60" width="auto" height="24" rx="12" fill="#6A1B9A" opacity="0.9"/>
<rect x="30" y="60" width="228" height="24" rx="12" fill="#6A1B9A" opacity="0.9"/>
<text x="144" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">Основы религиозных культур</text>
<text x="470" y="77" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#6A1B9A" font-weight="bold">Урок 9</text>
<text x="40" y="105" font-family="Arial,sans-serif" font-size="18" fill="#1a1a1a" font-weight="bold">Добро и зло</text>
<line x1="40" y1="115" x2="460" y2="115" stroke="#E1BEE7" stroke-width="2"/>
<text x="40" y="135" font-family="Arial,sans-serif" font-size="13" fill="#444">Учимся различать добро и зло.</text>
<rect x="40" y="155" width="420" height="30" rx="6" fill="#6A1B9A" opacity="0.08"/>
<text x="50" y="175" font-family="Arial,sans-serif" font-size="11" fill="#444">Во всех религиях добро — главная ценность</text>
<rect x="40" y="191" width="420" height="30" rx="6" fill="#6A1B9A" opacity="0.08"/>
<text x="50" y="211" font-family="Arial,sans-serif" font-size="11" fill="#444">Добро побеждает зло — главная тема сказок</text>
<rect x="40" y="227" width="420" height="30" rx="6" fill="#6A1B9A" opacity="0.08"/>
<text x="50" y="247" font-family="Arial,sans-serif" font-size="11" fill="#444">Учёные доказали: добрые люди живут дольше</text>
<circle cx="460" cy="310" r="25" fill="#6A1B9A" opacity="0.15"/>
<circle cx="460" cy="310" r="15" fill="#6A1B9A" opacity="0.1"/>
</svg>