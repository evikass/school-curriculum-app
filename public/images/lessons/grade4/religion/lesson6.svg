<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Молитва и богослужение</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Православная культура</text>
  <!-- Illustration area -->
  <!-- Candle --><rect x="300" y="130" width="16" height="80" rx="3" fill="#FFF8DC" stroke="#ddd" stroke-width="1"/><ellipse cx="308" cy="122" rx="6" ry="10" fill="#D4A843" opacity="0.8"/><ellipse cx="308" cy="118" rx="3" ry="5" fill="#FF6600" opacity="0.8"/><rect x="296" y="210" width="24" height="10" rx="2" fill="#D4A843" stroke="#8B6914" stroke-width="1"/><!-- Praying hands --><path d="M210,160 Q200,180 195,220 Q195,260 220,270 L250,270 L250,160 Z" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><path d="M240,160 Q250,180 255,220 Q255,260 230,270 L200,270 L200,160 Z" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><line x1="225" y1="165" x2="225" y2="260" stroke="#c4826a" stroke-width="0.5" opacity="0.5"/><!-- Rays of light --><line x1="308" y1="108" x2="290" y2="100" stroke="#D4A843" stroke-width="1" opacity="0.6"/><line x1="308" y1="108" x2="308" y2="95" stroke="#D4A843" stroke-width="1" opacity="0.6"/><line x1="308" y1="108" x2="326" y2="100" stroke="#D4A843" stroke-width="1" opacity="0.6"/><text x="160" y="195" text-anchor="middle" font-size="11" fill="#1a1a1a" font-family="Arial">Отче наш</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Основы духовной культуры</text>
</svg>