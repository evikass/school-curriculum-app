<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Музеи России</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Главные музеи изобразительного искусства</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- museum building -->
  <!-- pediment -->
  <polygon points="140,130 250,100 360,130" fill="#1a1a1a" opacity="0.15" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="140" y="130" width="220" height="100" fill="{CREAM}" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- columns -->
  <rect x="155" y="135" width="10" height="90" fill="#1a1a1a" opacity="0.2"/>
  <rect x="185" y="135" width="10" height="90" fill="#1a1a1a" opacity="0.2"/>
  <rect x="215" y="135" width="10" height="90" fill="#1a1a1a" opacity="0.2"/>
  <rect x="245" y="135" width="10" height="90" fill="#1a1a1a" opacity="0.2"/>
  <rect x="275" y="135" width="10" height="90" fill="#1a1a1a" opacity="0.2"/>
  <rect x="305" y="135" width="10" height="90" fill="#1a1a1a" opacity="0.2"/>
  <rect x="335" y="135" width="10" height="90" fill="#1a1a1a" opacity="0.2"/>
  <!-- door -->
  <rect x="225" y="185" width="50" height="45" rx="20" fill="#1a1a1a" opacity="0.3"/>
  <!-- steps -->
  <rect x="135" y="230" width="230" height="5" fill="#1a1a1a" opacity="0.15"/>
  <rect x="130" y="235" width="240" height="5" fill="#1a1a1a" opacity="0.1"/>
  <!-- name plaque -->
  <rect x="195" y="145" width="110" height="16" rx="2" fill="#D4A843" opacity="0.4"/>
  <text x="250" y="157" text-anchor="middle" font-family="Arial" font-size="8" fill="#1a1a1a">МУЗЕЙ</text>
  <!-- statues on pediment -->
  <circle cx="200" cy="122" r="5" fill="#D4A843" opacity="0.5"/>
  <line x1="200" y1="127" x2="200" y2="135" stroke="#D4A843" stroke-width="2" opacity="0.5"/>
  <circle cx="300" cy="122" r="5" fill="#D4A843" opacity="0.5"/>
  <line x1="300" y1="127" x2="300" y2="135" stroke="#D4A843" stroke-width="2" opacity="0.5"/>
  <!-- flags -->
  <line x1="140" y1="100" x2="140" y2="85" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="140" y="85" width="18" height="12" fill="#C41E3A" opacity="0.6"/>
  <line x1="360" y1="100" x2="360" y2="85" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="342" y="85" width="18" height="12" fill="#C41E3A" opacity="0.6"/>
  <!-- visitors -->
  <circle cx="110" cy="252" r="5" fill="#C41E3A" opacity="0.5"/>
  <line x1="110" y1="257" x2="110" y2="270" stroke="#C41E3A" stroke-width="2" opacity="0.5"/>
  <circle cx="390" cy="252" r="5" fill="#2B4C7E" opacity="0.5"/>
  <line x1="390" y1="257" x2="390" y2="270" stroke="#2B4C7E" stroke-width="2" opacity="0.5"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Изобразительное искусство</text>
</svg>