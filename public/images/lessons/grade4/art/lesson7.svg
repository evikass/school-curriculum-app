<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Рисунок и графика</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Искусство рисунка</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- large pencil -->
  <rect x="200" y="110" width="100" height="14" rx="1" fill="#D4A843" stroke="#1a1a1a" stroke-width="1" transform="rotate(-15,250,117)"/>
  <polygon points="200,117 188,122 188,128 200,124" fill="#DEB887" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(-15,250,117)"/>
  <polygon points="188,123 182,126 188,128" fill="#1a1a1a" transform="rotate(-15,250,117)"/>
  <rect x="290" y="108" width="20" height="18" rx="1" fill="#FFB6C1" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(-15,250,117)"/>
  <!-- colored pencils -->
  <rect x="120" y="200" width="70" height="8" rx="1" fill="#C41E3A" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(-60,155,204)"/>
  <polygon points="125,200 118,204 125,208" fill="#DEB887" transform="rotate(-60,155,204)"/>
  <rect x="350" y="180" width="70" height="8" rx="1" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(50,385,184)"/>
  <polygon points="415,180 422,184 415,188" fill="#DEB887" transform="rotate(50,385,184)"/>
  <!-- sketch paper -->
  <rect x="140" y="230" width="80" height="55" rx="2" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1" opacity="0.7"/>
  <!-- sketch on paper - simple cat -->
  <circle cx="165" cy="248" r="8" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <polygon points="158,242 155,234 162,240" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.5"/>
  <polygon points="172,242 175,234 168,240" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.5"/>
  <ellipse cx="165" cy="265" rx="15" ry="12" fill="none" stroke="#1a1a1a" stroke-width="0.8" opacity="0.5"/>
  <!-- charcoal stick -->
  <rect x="320" y="240" width="60" height="8" rx="3" fill="#1a1a1a" opacity="0.7"/>
  <!-- eraser -->
  <rect x="350" y="260" width="25" height="12" rx="3" fill="#FFB6C1" stroke="#1a1a1a" stroke-width="0.8"/>
  <!-- ink bottle -->
  <rect x="280" y="255" width="15" height="20" rx="2" fill="#1a1a1a" opacity="0.6"/>
  <rect x="282" y="250" width="11" height="6" rx="1" fill="#1a1a1a" opacity="0.5"/>
  <!-- drawing -->
  <text x="160" y="130" font-family="Arial" font-size="9" fill="#1a1a1a" opacity="0.4" transform="rotate(-15,160,130)">Рисунок</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Изобразительное искусство</text>
</svg>