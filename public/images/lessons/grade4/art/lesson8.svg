<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Народное искусство</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Русские народные промыслы</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- Gzhel plate (blue on white) -->
  <ellipse cx="170" cy="195" rx="55" ry="18" fill="#FFFFFF" stroke="#2B4C7E" stroke-width="2"/>
  <ellipse cx="170" cy="192" rx="45" ry="14" fill="none" stroke="#2B4C7E" stroke-width="1" opacity="0.5"/>
  <!-- Gzhel flower -->
  <circle cx="170" cy="190" r="8" fill="none" stroke="#2B4C7E" stroke-width="1.5"/>
  <circle cx="170" cy="190" r="3" fill="#2B4C7E" opacity="0.5"/>
  <line x1="170" y1="182" x2="170" y2="175" stroke="#2B4C7E" stroke-width="1"/>
  <line x1="162" y1="185" x2="155" y2="180" stroke="#2B4C7E" stroke-width="1"/>
  <line x1="178" y1="185" x2="185" y2="180" stroke="#2B4C7E" stroke-width="1"/>
  <circle cx="170" cy="175" r="3" fill="none" stroke="#2B4C7E" stroke-width="1"/>
  <circle cx="155" cy="180" r="3" fill="none" stroke="#2B4C7E" stroke-width="1"/>
  <circle cx="185" cy="180" r="3" fill="none" stroke="#2B4C7E" stroke-width="1"/>
  <text x="170" y="230" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a1a1a">Гжель</text>
  <!-- Khokhloma bowl (gold red black on dark) -->
  <path d="M310,180 Q340,155 370,180 Q370,215 340,225 Q310,215 310,180 Z" fill="#2E1503" opacity="0.6" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Khokhloma pattern -->
  <path d="M320,190 Q340,175 360,190" stroke="#D4A843" stroke-width="1.5" fill="none"/>
  <path d="M315,200 Q340,182 365,200" stroke="#C41E3A" stroke-width="1" fill="none"/>
  <path d="M325,195 Q340,185 355,195" stroke="#D4A843" stroke-width="1" fill="none"/>
  <circle cx="340" cy="192" r="4" fill="#C41E3A" opacity="0.6"/>
  <circle cx="340" cy="192" r="2" fill="#D4A843" opacity="0.6"/>
  <text x="340" y="240" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a1a1a">Хохлома</text>
  <!-- Dymkovo toy (bright colors) -->
  <circle cx="420" cy="165" r="18" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- face -->
  <circle cx="414" cy="162" r="2" fill="#1a1a1a"/>
  <circle cx="426" cy="162" r="2" fill="#1a1a1a"/>
  <path d="M416,170 Q420,174 424,170" stroke="#C41E3A" stroke-width="1.2" fill="none"/>
  <!-- headdress -->
  <path d="M403,158 Q420,140 437,158" fill="#C41E3A" opacity="0.6"/>
  <circle cx="420" cy="145" r="3" fill="#D4A843"/>
  <!-- body -->
  <path d="M405,180 Q420,190 435,180 L440,230 L400,230 Z" fill="#C41E3A" opacity="0.5"/>
  <!-- Dymkovo dots -->
  <circle cx="410" cy="200" r="3" fill="#D4A843" opacity="0.5"/>
  <circle cx="420" cy="210" r="3" fill="#2B4C7E" opacity="0.5"/>
  <circle cx="430" cy="200" r="3" fill="#D4A843" opacity="0.5"/>
  <text x="420" y="245" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a1a1a">Дымково</text>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Изобразительное искусство</text>
</svg>