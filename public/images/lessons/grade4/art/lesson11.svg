<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#F5E6C8"/>
  <rect width="500" height="8" fill="#C41E3A"/>
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <text x="250" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Свет и тень</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#D4A843">Передача объёма на плоскости</text>
  <line x1="50" y1="82" x2="450" y2="82" stroke="#D4A843" stroke-width="0.5"/>
  
  <!-- light source (sun/lamp) -->
  <circle cx="400" cy="120" r="15" fill="#D4A843" opacity="0.5"/>
  <!-- light rays -->
  <line x1="385" y1="120" x2="300" y2="170" stroke="#D4A843" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="385" y1="125" x2="300" y2="185" stroke="#D4A843" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="388" y1="130" x2="300" y2="200" stroke="#D4A843" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>
  <!-- sphere with shading -->
  <circle cx="250" cy="190" r="55" fill="#1a1a1a" opacity="0.15"/>
  <!-- highlight -->
  <circle cx="230" cy="172" r="12" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="225" cy="168" r="5" fill="#FFFFFF" opacity="0.8"/>
  <!-- gradient shadow on sphere (layers) -->
  <circle cx="250" cy="190" r="50" fill="#1a1a1a" opacity="0.05"/>
  <circle cx="265" cy="200" r="40" fill="#1a1a1a" opacity="0.08"/>
  <circle cx="275" cy="210" r="30" fill="#1a1a1a" opacity="0.1"/>
  <circle cx="280" cy="215" r="20" fill="#1a1a1a" opacity="0.12"/>
  <!-- sphere outline -->
  <circle cx="250" cy="190" r="55" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- labels with lines -->
  <line x1="230" y1="168" x2="160" y2="130" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="110" y="128" font-family="Arial" font-size="9" fill="#1a1a1a">Блик</text>
  <line x1="280" y1="210" x2="340" y2="240" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="345" y="245" font-family="Arial" font-size="9" fill="#1a1a1a">Тень</text>
  <!-- ground shadow -->
  <ellipse cx="250" cy="260" rx="50" ry="8" fill="#1a1a1a" opacity="0.2"/>
  <!-- cube with shading -->
  <polygon points="120,200 160,185 200,200 160,215" fill="#D4A843" opacity="0.2" stroke="#1a1a1a" stroke-width="0.8"/>
  <polygon points="120,200 120,240 160,255 160,215" fill="#1a1a1a" opacity="0.15" stroke="#1a1a1a" stroke-width="0.8"/>
  <polygon points="160,215 160,255 200,240 200,200" fill="#D4A843" opacity="0.35" stroke="#1a1a1a" stroke-width="0.8"/>
  <rect y="310" width="500" height="40" fill="#1a1a1a"/>
  <rect y="308" width="500" height="2" fill="#C41E3A"/>
  <text x="250" y="335" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#D4A843">Изобразительное искусство</text>
</svg>