    <rect width="420" height="225" rx="12" fill="white" opacity="0.94"/>
    <rect width="420" height="28" rx="12" fill="#F57C00" opacity="0.9"/>
    <rect y="20" width="420" height="8" fill="#F57C00" opacity="0.9"/>
    <text x="210" y="19" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">GREETINGS — ПРИВЕТСТВИЕ</text>
    <g transform="translate(20,40)">
      <rect width="180" height="55" rx="8" fill="#FFF3E0" stroke="#F57C00" stroke-width="1.5"/>
      <text x="90" y="25" font-family="Arial" font-size="16" fill="#F57C00" text-anchor="middle" font-weight="bold">Hello!</text>
      <text x="90" y="45" font-family="Arial" font-size="10" fill="#555" text-anchor="middle">Привет!</text>
    </g>
    <g transform="translate(220,40)">
