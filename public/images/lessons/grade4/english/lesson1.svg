  <path d="M446,228 Q460,196 474,228" fill="#2E7D32" opacity="0.8"/>
  <path d="M448.8,222 Q460,192 471.2,222" fill="#388E3C" opacity="0.7"/>
  <path d="M452,216 Q460,188 468,216" fill="#43A047" opacity="0.6"/>
