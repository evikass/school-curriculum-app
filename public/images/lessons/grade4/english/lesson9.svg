<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 9:  Школьные принадлежности</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">School things</text>

  
  <!-- Desk surface -->
  <rect x="50" y="230" width="400" height="80" rx="3" fill="#DCC8A0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Book -->
  <rect x="80" y="245" width="70" height="50" rx="3" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-5, 115, 270)"/>
  <line x1="115" y1="248" x2="115" y2="292" stroke="#1a1a1a" stroke-width="1" opacity="0.5" transform="rotate(-5, 115, 270)"/>
  <text x="115" y="275" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold" transform="rotate(-5, 115, 270)">BOOK</text>
  <!-- Pencil -->
  <rect x="200" y="240" width="8" height="60" rx="2" fill="#FDD835" stroke="#1a1a1a" stroke-width="1" transform="rotate(15, 204, 270)"/>
  <polygon points="200,300 204,312 208,300" fill="#DEB887" stroke="#1a1a1a" stroke-width="1" transform="rotate(15, 204, 306)"/>
  <rect x="200" y="240" width="8" height="8" rx="1" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1" transform="rotate(15, 204, 244)"/>
  <text x="230" y="255" font-family="Arial" font-size="9" fill="#1a1a1a">pencil</text>
  <!-- Ruler -->
  <rect x="280" y="255" width="100" height="18" rx="2" fill="#A5D6A7" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-3, 330, 264)"/>
  <!-- ruler marks -->
  <line x1="290" y1="255" x2="290" y2="265" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(-3, 330, 264)"/>
  <line x1="300" y1="255" x2="300" y2="265" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(-3, 330, 264)"/>
  <line x1="310" y1="255" x2="310" y2="265" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(-3, 330, 264)"/>
  <line x1="320" y1="255" x2="320" y2="268" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(-3, 330, 264)"/>
  <line x1="330" y1="255" x2="330" y2="265" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(-3, 330, 264)"/>
  <line x1="340" y1="255" x2="340" y2="265" stroke="#1a1a1a" stroke-width="0.5" transform="rotate(-3, 330, 264)"/>
  <line x1="350" y1="255" x2="350" y2="268" stroke="#1a1a1a" stroke-width="0.8" transform="rotate(-3, 330, 264)"/>
  <text x="340" y="288" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">ruler</text>
  <!-- Eraser -->
  <rect x="165" y="250" width="25" height="15" rx="3" fill="#FF8A80" stroke="#1a1a1a" stroke-width="1"/>
  <text x="177" y="238" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">eraser</text>
  <!-- Pencil case -->
  <rect x="390" y="248" width="50" height="25" rx="5" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="395" y="252" width="40" height="4" rx="2" fill="#D4A843"/>
  <text x="415" y="290" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">pencil case</text>
  <!-- Scissors -->
  <circle cx="100" cy="115" r="8" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="120" cy="115" r="8" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="108" y1="110" x2="130" y2="160" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="112" y1="110" x2="135" y2="160" stroke="#1a1a1a" stroke-width="2"/>
  <text x="115" y="180" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">scissors</text>
  <!-- Pen -->
  <rect x="350" y="110" width="6" height="55" rx="2" fill="#2B4C7E" stroke="#1a1a1a" stroke-width="1" transform="rotate(-10, 353, 137)"/>
  <polygon points="350,165 353,175 356,165" fill="#1a1a1a" transform="rotate(-10, 353, 170)"/>
  <text x="365" y="145" font-family="Arial" font-size="9" fill="#1a1a1a">pen</text>
  <!-- Notebook -->
  <rect x="200" y="100" width="50" height="65" rx="2" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="200" y1="100" x2="200" y2="165" stroke="#C41E3A" stroke-width="3"/>
  <line x1="210" y1="115" x2="240" y2="115" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="210" y1="125" x2="240" y2="125" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
  <line x1="210" y1="135" x2="240" y2="135" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
  <text x="225" y="182" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">notebook</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>