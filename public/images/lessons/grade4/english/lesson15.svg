<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 15:  Моя комната</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">My room</text>

  
  <!-- Room outline -->
  <rect x="90" y="95" width="320" height="210" rx="4" fill="#EDE0CC" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Door -->
  <rect x="90" y="270" width="40" height="15" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M130 270 Q130 255 140 255" fill="none" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Window -->
  <rect x="280" y="95" width="80" height="12" fill="#B3E5FC" stroke="#2B4C7E" stroke-width="2"/>
  <line x1="310" y1="95" x2="310" y2="107" stroke="#2B4C7E" stroke-width="1"/>
  <!-- Bed -->
  <rect x="120" y="130" width="70" height="100" rx="5" fill="#2B4C7E" opacity="0.3" stroke="#2B4C7E" stroke-width="2"/>
  <rect x="122" y="132" width="66" height="30" rx="4" fill="#2B4C7E" opacity="0.2"/>
  <text x="155" y="185" font-family="Arial" font-size="10" fill="#2B4C7E" text-anchor="middle" font-weight="bold">BED</text>
  <!-- Desk -->
  <rect x="280" y="130" width="90" height="45" rx="3" fill="#A1887F" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="325" y="157" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">DESK</text>
  <!-- Chair -->
  <rect x="310" y="185" width="30" height="25" rx="3" fill="#C41E3A" opacity="0.3" stroke="#C41E3A" stroke-width="1.5"/>
  <text x="325" y="202" font-family="Arial" font-size="7" fill="#C41E3A" text-anchor="middle">chair</text>
  <!-- Wardrobe -->
  <rect x="120" y="250" width="55" height="45" rx="3" fill="#795548" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="147" y1="250" x2="147" y2="295" stroke="#1a1a1a" stroke-width="1"/>
  <text x="147" y="280" font-family="Arial" font-size="7" fill="#FFFFFF" text-anchor="middle">WARDROBE</text>
  <!-- Bookshelf -->
  <rect x="370" y="250" width="25" height="45" rx="2" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="370" y1="265" x2="395" y2="265" stroke="#1a1a1a" stroke-width="0.5"/>
  <line x1="370" y1="280" x2="395" y2="280" stroke="#1a1a1a" stroke-width="0.5"/>
  <text x="382" y="246" font-family="Arial" font-size="7" fill="#1a1a1a" text-anchor="middle">shelf</text>
  <!-- Carpet (ellipse) -->
  <ellipse cx="280" cy="260" rx="45" ry="25" fill="#C41E3A" opacity="0.15" stroke="#C41E3A" stroke-width="1"/>
  <text x="280" y="265" font-family="Arial" font-size="7" fill="#C41E3A" text-anchor="middle">carpet</text>
  <!-- Lamp -->
  <circle cx="390" cy="135" r="8" fill="#D4A843" opacity="0.5" stroke="#D4A843" stroke-width="1"/>
  <text x="390" y="155" font-family="Arial" font-size="7" fill="#1a1a1a" text-anchor="middle">lamp</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>