<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 17:  Продукты</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Food</text>

  
  <!-- Big plate -->
  <ellipse cx="250" cy="200" rx="100" ry="40" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="2"/>
  <ellipse cx="250" cy="200" rx="80" ry="30" fill="none" stroke="#1a1a1a" stroke-width="0.5" opacity="0.3"/>
  <!-- Fork -->
  <rect x="120" y="170" width="4" height="60" rx="2" fill="#1a1a1a"/>
  <line x1="118" y1="170" x2="118" y2="150" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="122" y1="170" x2="122" y2="150" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="126" y1="170" x2="126" y2="150" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Knife -->
  <rect x="373" y="170" width="4" height="60" rx="2" fill="#1a1a1a"/>
  <path d="M375 170 L375 150 Q385 155 375 170" fill="#1a1a1a"/>
  <!-- Food items on plate -->
  <ellipse cx="225" cy="190" rx="25" ry="15" fill="#FDD835" stroke="#F9A825" stroke-width="1"/>
  <text x="225" y="194" font-family="Arial" font-size="7" fill="#1a1a1a" text-anchor="middle">cheese</text>
  <rect x="260" y="178" width="30" height="18" rx="3" fill="#A1887F" stroke="#795548" stroke-width="1"/>
  <text x="275" y="191" font-family="Arial" font-size="6" fill="#FFFFFF" text-anchor="middle">bread</text>
  <circle cx="240" cy="215" r="12" fill="#C41E3A" opacity="0.7"/>
  <text x="240" y="219" font-family="Arial" font-size="6" fill="#FFFFFF" text-anchor="middle">meat</text>
  <!-- Surrounding food items -->
  <!-- Pizza slice -->
  <path d="M380 110 L410 140 L380 140 Z" fill="#FDD835" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="395" cy="130" r="4" fill="#C41E3A" opacity="0.7"/>
  <text x="400" y="110" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">pizza</text>
  <!-- Fish -->
  <ellipse cx="100" cy="130" rx="25" ry="12" fill="#81D4FA" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="75,130 60,118 60,142" fill="#81D4FA" stroke="#1a1a1a" stroke-width="1"/>
  <text x="100" y="155" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">fish</text>
  <!-- Rice bowl -->
  <path d="M340 270 Q340 250 360 250 Q380 250 380 270" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="360" y="285" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">rice</text>
  <!-- Pasta -->
  <ellipse cx="140" cy="275" rx="30" ry="12" fill="#FFCC80" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M125 270 Q140 265 155 270" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <path d="M128 275 Q140 270 152 275" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <text x="140" y="298" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">pasta</text>
  <!-- Egg -->
  <ellipse cx="250" cy="270" rx="15" ry="20" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="250" cy="265" rx="8" ry="8" fill="#FDD835"/>
  <text x="250" y="300" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">egg</text>
  <!-- Apple -->
  <circle cx="60" cy="200" r="12" fill="#C41E3A"/>
  <line x1="60" y1="188" x2="62" y2="182" stroke="#1a1a1a" stroke-width="1"/>
  <text x="60" y="222" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle">apple</text>
  <!-- Carrot -->
  <path d="M440 250 L440 280 L430 285" fill="#FB8C00" stroke="#1a1a1a" stroke-width="1"/>
  <path d="M438 250 L435 242 L442 242 Z" fill="#43A047"/>
  <text x="442" y="268" font-family="Arial" font-size="8" fill="#1a1a1a">carrot</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>