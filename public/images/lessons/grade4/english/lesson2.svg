<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 2:  Представление</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Introducing yourself</text>

  
  <!-- Central figure -->
  <circle cx="250" cy="175" r="30" fill="#2B4C7E"/>
  <rect x="228" y="208" width="44" height="65" rx="6" fill="#2B4C7E"/>
  <!-- Arms -->
  <line x1="228" y1="220" x2="195" y2="240" stroke="#2B4C7E" stroke-width="6" stroke-linecap="round"/>
  <line x1="272" y1="220" x2="305" y2="240" stroke="#2B4C7E" stroke-width="6" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="240" y1="273" x2="232" y2="305" stroke="#2B4C7E" stroke-width="6" stroke-linecap="round"/>
  <line x1="260" y1="273" x2="268" y2="305" stroke="#2B4C7E" stroke-width="6" stroke-linecap="round"/>
  <!-- Name badge -->
  <rect x="270" y="155" width="70" height="22" rx="4" fill="#C41E3A"/>
  <text x="305" y="170" font-family="Arial" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="bold">My name is</text>
  <!-- Speech bubble -->
  <ellipse cx="145" cy="140" rx="75" ry="30" fill="#FFFFFF" stroke="#C41E3A" stroke-width="2"/>
  <polygon points="205,150 215,160 200,160" fill="#FFFFFF" stroke="#C41E3A" stroke-width="2"/>
  <text x="145" y="136" font-family="Arial" font-size="13" font-weight="bold" fill="#C41E3A" text-anchor="middle">What is</text>
  <text x="145" y="152" font-family="Arial" font-size="13" font-weight="bold" fill="#C41E3A" text-anchor="middle">your name?</text>
  <!-- Info labels -->
  <rect x="100" y="270" width="60" height="18" rx="3" fill="#D4A843" opacity="0.25"/>
  <text x="130" y="283" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">I am 10</text>
  <rect x="340" y="270" width="80" height="18" rx="3" fill="#D4A843" opacity="0.25"/>
  <text x="380" y="283" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">I am from Russia</text>
  <!-- Handshake -->
  <path d="M190 250 Q205 242 220 250" fill="none" stroke="#D4A843" stroke-width="2"/>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>