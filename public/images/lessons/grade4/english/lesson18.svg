<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 18:  Напитки</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Drinks</text>

  
  <!-- Water glass -->
  <path d="M80 160 L75 260 L115 260 L110 160 Z" fill="#B3E5FC" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="95" y="220" font-family="Arial" font-size="9" fill="#2B4C7E" text-anchor="middle" opacity="0.6">water</text>
  <text x="95" y="280" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">WATER</text>
  <!-- Tea cup -->
  <path d="M165 190 L160 260 L210 260 L205 190 Z" fill="#D7CCC8" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="187" cy="190" rx="22" ry="6" fill="#D7CCC8" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Tea handle -->
  <path d="M210 205 Q230 205 230 225 Q230 245 210 245" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Steam -->
  <path d="M180 185 Q175 175 180 165" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <path d="M190 185 Q195 172 190 160" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <text x="187" y="280" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">TEA</text>
  <!-- Juice glass -->
  <path d="M260 180 L255 260 L305 260 L300 180 Z" fill="#FFCC80" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="280" cy="180" rx="22" ry="6" fill="#FFCC80" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Orange slice -->
  <circle cx="280" cy="175" r="5" fill="#FB8C00" opacity="0.7"/>
  <text x="280" y="280" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">JUICE</text>
  <!-- Coffee cup -->
  <path d="M355 195 L350 260 L400 260 L395 195 Z" fill="#5D4037" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="377" cy="195" rx="22" ry="6" fill="#5D4037" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M395 210 Q415 210 415 230 Q415 245 395 245" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Steam -->
  <path d="M370 190 Q365 178 370 168" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <text x="377" y="280" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">COFFEE</text>
  <!-- Milk carton -->
  <rect x="420" y="170" width="40" height="60" rx="3" fill="#FFFFFF" stroke="#1a1a1a" stroke-width="1.5"/>
  <polygon points="420,170 430,155 460,155 460,170" fill="#2B4C7E"/>
  <text x="440" y="200" font-family="Arial" font-size="8" fill="#2B4C7E" text-anchor="middle" font-weight="bold">MILK</text>
  <text x="440" y="245" font-family="Arial" font-size="11" fill="#1a1a1a" text-anchor="middle" font-weight="bold">MILK</text>
  <!-- Cola can -->
  <rect x="60" y="100" width="30" height="50" rx="4" fill="#C41E3A"/>
  <text x="75" y="130" font-family="Arial" font-size="8" fill="#FFFFFF" text-anchor="middle" font-weight="bold">COLA</text>
  <text x="75" y="163" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">cola</text>
  <!-- Speech bubble -->
  <ellipse cx="250" cy="120" rx="70" ry="20" fill="#D4A843" opacity="0.2" stroke="#D4A843" stroke-width="1"/>
  <text x="250" y="124" font-family="Arial" font-size="10" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Would you like some...?</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>