<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="6" fill="#C41E3A"/>
  <!-- Gold line under red bar -->
  <rect y="6" width="500" height="2" fill="#D4A843" opacity="0.6"/>

  <!-- Title -->
  <text x="250" y="45" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Урок 13:  Члены семьи</text>
  <!-- Subtitle -->
  <text x="250" y="70" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#2B4C7E" text-anchor="middle">Family members</text>

  
  <!-- Tree lines -->
  <line x1="250" y1="175" x2="250" y2="120" stroke="#D4A843" stroke-width="2"/>
  <line x1="130" y1="175" x2="130" y2="120" stroke="#D4A843" stroke-width="2"/>
  <line x1="370" y1="175" x2="370" y2="120" stroke="#D4A843" stroke-width="2"/>
  <!-- Connecting horizontal line -->
  <line x1="130" y1="120" x2="370" y2="120" stroke="#D4A843" stroke-width="1.5"/>
  <line x1="250" y1="120" x2="250" y2="95" stroke="#D4A843" stroke-width="1.5"/>
  <!-- Grandparents -->
  <circle cx="190" cy="100" r="16" fill="#8E24AA" opacity="0.6"/>
  <rect x="180" y="118" width="20" height="25" rx="3" fill="#8E24AA" opacity="0.6"/>
  <text x="190" y="155" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle">grandma</text>
  <circle cx="310" cy="100" r="16" fill="#8E24AA" opacity="0.6"/>
  <rect x="300" y="118" width="20" height="25" rx="3" fill="#8E24AA" opacity="0.6"/>
  <text x="310" y="155" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle">grandpa</text>
  <!-- Parents -->
  <circle cx="120" cy="195" r="16" fill="#2B4C7E"/>
  <rect x="110" y="213" width="20" height="25" rx="3" fill="#2B4C7E"/>
  <text x="120" y="250" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">mother</text>
  <circle cx="250" cy="195" r="16" fill="#C41E3A"/>
  <rect x="240" y="213" width="20" height="25" rx="3" fill="#C41E3A"/>
  <text x="250" y="250" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">father</text>
  <!-- Children -->
  <circle cx="370" cy="195" r="14" fill="#D4A843"/>
  <rect x="361" y="211" width="18" height="22" rx="3" fill="#D4A843"/>
  <text x="370" y="245" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle" font-weight="bold">sister</text>
  <circle cx="420" cy="195" r="12" fill="#FB8C00"/>
  <rect x="412" y="209" width="16" height="20" rx="3" fill="#FB8C00"/>
  <text x="420" y="240" font-family="Arial" font-size="8" fill="#1a1a1a" text-anchor="middle">brother</text>
  <!-- Lines down from parents to children -->
  <line x1="250" y1="240" x2="370" y2="175" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
  <line x1="250" y1="240" x2="420" y2="175" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
  <!-- House -->
  <rect x="30" y="230" width="50" height="40" rx="2" fill="#DEB887" stroke="#1a1a1a" stroke-width="1"/>
  <polygon points="25,230 80,230 55,205" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1"/>
  <rect x="42" y="250" width="12" height="20" fill="#1a1a1a"/>
  <text x="55" y="285" font-family="Arial" font-size="9" fill="#1a1a1a" text-anchor="middle">HOME</text>

  <!-- Bottom dark bar -->
  <rect y="318" width="500" height="32" fill="#1a1a1a"/>
  <rect y="318" width="500" height="2" fill="#D4A843" opacity="0.5"/>
  <text x="250" y="339" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#F5E6C8" text-anchor="middle" letter-spacing="1">Иностранный язык — 4 класс</text>
</svg>