  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Моделирование</text>
  <!-- Illustration area -->
  <rect x="150" y="150" width="200" height="80" rx="8" fill="#444" stroke="#333" stroke-width="2"/><rect x="155" y="155" width="60" height="40" rx="3" fill="#87CEEB" opacity="0.5" stroke="#5a8ab5" stroke-width="1"/><rect x="160" y="200" width="45" height="25" rx="3" fill="#333" stroke="#555" stroke-width="1"/><circle cx="185" cy="235" r="12" fill="#333" stroke="#555" stroke-width="2"/><circle cx="185" cy="235" r="6" fill="#555"/><circle cx="315" cy="235" r="12" fill="#333" stroke="#555" stroke-width="2"/><circle cx="315" cy="235" r="6" fill="#555"/><rect x="290" y="155" width="40" height="60" rx="3" fill="#333" stroke="#555" stroke-width="1"/><circle cx="305" cy="170" r="8" fill="#87CEEB" opacity="0.5" stroke="#5a8ab5" stroke-width="1"/><circle cx="330" cy="175" r="6" fill="#FFD700" opacity="0.7"/><circle cx="330" cy="195" r="6" fill="#FF4444" opacity="0.7"/><text x="250" y="270" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Корпус + Движитель</text><text x="250" y="290" text-anchor="middle" font-size="10" fill="#C41E3A" font-family="Arial">Проверь устойчивость!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
