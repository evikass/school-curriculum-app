<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Изготовление игрушки</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Работа с тканью</text>
  <!-- Illustration area -->
  <circle cx="200" cy="155" r="20" fill="#DEB887" stroke="#8B6914" stroke-width="1.5"/><circle cx="200" cy="155" r="10" fill="#DEB887" stroke="#8B6914" stroke-width="1"/><circle cx="195" cy="150" r="2" fill="#333"/><circle cx="205" cy="150" r="2" fill="#333"/><ellipse cx="200" cy="156" rx="4" ry="2" fill="#8B4513"/><circle cx="188" cy="155" r="6" fill="#DEB887" stroke="#8B6914" stroke-width="1"/><circle cx="212" cy="155" r="6" fill="#DEB887" stroke="#8B6914" stroke-width="1"/><ellipse cx="200" cy="200" rx="25" ry="35" fill="#DEB887" stroke="#8B6914" stroke-width="1.5"/><circle cx="250" cy="170" r="35" fill="none" stroke="#C41E3A" stroke-width="2" stroke-dasharray="5,3"/><text x="250" y="270" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Выкройка + припуски</text><text x="250" y="290" text-anchor="middle" font-size="10" fill="#C41E3A" font-family="Arial">Сшей, выверни, набей!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>