<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Аппликация</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Работа с бумагой</text>
  <!-- Illustration area -->
  <rect x="130" y="105" width="240" height="170" rx="3" fill="#fff" stroke="#ccc" stroke-width="2"/><rect x="155" y="135" width="60" height="45" rx="2" fill="#C41E3A" stroke="#8B0000" stroke-width="1.5"/><circle cx="270" cy="158" r="30" fill="#2B4C7E" stroke="#1a3a5e" stroke-width="1.5"/><polygon points="200,210 230,260 170,260" fill="#D4A843" stroke="#8B6914" stroke-width="1.5"/><rect x="265" y="215" width="50" height="35" rx="2" fill="#228B22" stroke="#1a6b1a" stroke-width="1.5"/><circle cx="210" cy="148" r="8" fill="#FFD700"/><rect x="275" y="225" width="15" height="15" rx="2" fill="#FFD700" opacity="0.7"/><text x="250" y="295" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Композиция + Клей от центра</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>