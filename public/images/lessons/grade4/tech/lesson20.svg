<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Итоговая выставка</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Проекты</text>
  <!-- Illustration area -->
  <rect x="100" y="100" width="300" height="195" rx="3" fill="#e8e0d0" stroke="#999" stroke-width="2"/><rect x="130" y="125" width="60" height="50" rx="2" fill="#fff" stroke="#D4A843" stroke-width="2"/><rect x="135" y="130" width="50" height="40" fill="#87CEEB" opacity="0.3"/><rect x="220" y="120" width="60" height="55" rx="2" fill="#fff" stroke="#C41E3A" stroke-width="2"/><rect x="225" y="125" width="50" height="45" fill="#D4A843" opacity="0.3"/><rect x="310" y="128" width="60" height="48" rx="2" fill="#fff" stroke="#2B4C7E" stroke-width="2"/><rect x="315" y="133" width="50" height="38" fill="#FF69B4" opacity="0.3"/><rect x="145" y="195" width="50" height="40" rx="2" fill="#fff" stroke="#228B22" stroke-width="2"/><rect x="150" y="200" width="40" height="30" fill="#DEB887" opacity="0.3"/><rect x="230" y="200" width="50" height="35" rx="2" fill="#fff" stroke="#8B4513" stroke-width="2"/><rect x="235" y="205" width="40" height="25" fill="#ddd" opacity="0.3"/><rect x="315" y="195" width="55" height="40" rx="2" fill="#fff" stroke="#D4A843" stroke-width="2"/><rect x="320" y="200" width="45" height="30" fill="#8B6914" opacity="0.3"/><text x="250" y="265" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Выставка лучших работ!</text><text x="250" y="285" text-anchor="middle" font-size="10" fill="#C41E3A" font-family="Arial">Подпиши: название, автор</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>