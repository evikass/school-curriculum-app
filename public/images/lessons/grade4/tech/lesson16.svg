<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Проект Подарок маме</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Проекты</text>
  <!-- Illustration area -->
  <rect x="160" y="140" width="180" height="120" rx="5" fill="#FF69B4" stroke="#cc4090" stroke-width="2"/><rect x="245" y="140" width="20" height="120" fill="#D4A843" stroke="#8B6914" stroke-width="1"/><rect x="160" y="195" width="180" height="18" fill="#D4A843" stroke="#8B6914" stroke-width="1"/><polygon points="255,115 275,140 235,140" fill="#C41E3A" stroke="#8B0000" stroke-width="1.5"/><polygon points="255,115 240,140 270,140" fill="#FF6347" stroke="#8B0000" stroke-width="1.5"/><polygon points="245,115 265,140 225,140" fill="#FFD700" stroke="#8B6914" stroke-width="1"/><polygon points="265,115 285,140 245,140" fill="#FFD700" stroke="#8B6914" stroke-width="1"/><text x="250" y="290" text-anchor="middle" font-size="11" fill="#C41E3A" font-weight="bold" font-family="Arial">Мамочке с любовью!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>