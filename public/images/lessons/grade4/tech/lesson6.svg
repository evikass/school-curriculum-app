<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Ручные швы</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Работа с тканью</text>
  <!-- Illustration area -->
  <line x1="140" y1="130" x2="360" y2="130" stroke="#8B4513" stroke-width="2" stroke-dasharray="8,4"/><line x1="140" y1="160" x2="360" y2="160" stroke="#8B4513" stroke-width="2" stroke-dasharray="8,4"/><rect x="130" y="120" width="240" height="50" fill="none" stroke="#c4826a" stroke-width="2"/><!-- Running stitch --><line x1="160" y1="210" x2="180" y2="210" stroke="#333" stroke-width="1.5"/><line x1="200" y1="210" x2="220" y2="210" stroke="#333" stroke-width="1.5"/><line x1="240" y1="210" x2="260" y2="210" stroke="#333" stroke-width="1.5"/><line x1="280" y1="210" x2="300" y2="210" stroke="#333" stroke-width="1.5"/><line x1="320" y1="210" x2="340" y2="210" stroke="#333" stroke-width="1.5"/><text x="250" y="235" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Смёточный шов</text><!-- Back stitch --><polyline points="160,260 185,260 170,260 195,260 180,260 205,260 190,260 215,260 200,260 225,260 210,260 235,260 220,260 245,260 230,260 255,260 240,260 265,260 250,260 275,260 260,260 285,260 270,260 295,260 280,260 305,260 290,260 315,260 300,260 325,260 310,260 335,260" fill="none" stroke="#333" stroke-width="1.5"/><text x="250" y="285" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Шов назад иголку</text><!-- Needle --><line x1="350" y1="155" x2="380" y2="200" stroke="#888" stroke-width="2.5"/><circle cx="351" cy="154" r="3" fill="#888"/><ellipse cx="350" cy="152" rx="2" ry="6" fill="#8B4513" opacity="0.5"/>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>