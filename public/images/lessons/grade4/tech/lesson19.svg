<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Поделка для школы</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Проекты</text>
  <!-- Illustration area -->
  <rect x="150" y="120" width="45" height="130" rx="3" fill="#fff" stroke="#2B4C7E" stroke-width="2"/><polygon points="172,120 172,100 150,120" fill="#C41E3A" stroke="#8B0000" stroke-width="1"/><polygon points="172,120 172,100 195,120" fill="#C41E3A" stroke="#8B0000" stroke-width="1"/><line x1="160" y1="140" x2="185" y2="140" stroke="#ccc" stroke-width="1"/><line x1="160" y1="155" x2="180" y2="155" stroke="#ccc" stroke-width="1"/><line x1="160" y1="170" x2="183" y2="170" stroke="#ccc" stroke-width="1"/><text x="172" y="195" text-anchor="middle" font-size="8" fill="#999" font-family="Arial">Закладка</text><rect x="250" y="160" width="100" height="90" rx="3" fill="#DEB887" stroke="#8B6914" stroke-width="2"/><rect x="250" y="155" width="100" height="10" rx="2" fill="#c4a070"/><line x1="275" y1="155" x2="275" y2="140" stroke="#333" stroke-width="2"/><line x1="295" y1="155" x2="295" y2="135" stroke="#333" stroke-width="2"/><line x1="315" y1="155" x2="315" y2="142" stroke="#333" stroke-width="2"/><line x1="335" y1="155" x2="335" y2="138" stroke="#333" stroke-width="2"/><text x="300" y="210" text-anchor="middle" font-size="8" fill="#666" font-family="Arial">Органайзер</text><text x="250" y="280" text-anchor="middle" font-size="11" fill="#C41E3A" font-weight="bold" font-family="Arial">Полезно и красиво!</text><text x="250" y="298" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Расскажи классу!</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>