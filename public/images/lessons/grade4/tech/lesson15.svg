<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Глина</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Пластичные материалы</text>
  <!-- Illustration area -->
  <ellipse cx="170" cy="220" rx="35" ry="45" fill="#b87333" stroke="#8B5A2B" stroke-width="2"/><ellipse cx="170" cy="178" rx="20" ry="8" fill="#c48343" stroke="#8B5A2B" stroke-width="1.5"/><ellipse cx="170" cy="220" rx="28" ry="6" fill="#a86323"/><path d="M275,175 Q275,260 320,260 Q365,260 365,200 Q365,175 345,175" fill="#b87333" stroke="#8B5A2B" stroke-width="2"/><ellipse cx="320" cy="175" rx="45" ry="15" fill="#c48343" stroke="#8B5A2B" stroke-width="1.5"/><ellipse cx="320" cy="175" rx="30" ry="8" fill="#a86323"/><rect x="180" y="140" width="20" height="5" fill="#888" stroke="#666" stroke-width="1"/><text x="250" y="280" text-anchor="middle" font-size="11" fill="#1a1a1a" font-weight="bold" font-family="Arial">Обжиг делает твёрдым!</text><text x="250" y="298" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial">Узор нанеси до сушки</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Технология</text>
</svg>