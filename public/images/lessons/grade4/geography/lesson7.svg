<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Моря России</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Моря и океаны, омывающие Россию</text>

  <!-- Three ocean sections -->
  <!-- Arctic Ocean -->
  <rect x="20" y="92" width="148" height="155" rx="4" fill="#2B4C7E" opacity="0.15" />
  <rect x="20" y="92" width="148" height="22" rx="4" fill="#2B4C7E" opacity="0.8" />
  <rect x="20" y="108" width="148" height="6" rx="0" fill="#2B4C7E" opacity="0.8" />
  <text x="94" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Arial, sans-serif">Северный Ледовитый</text>
  <!-- Icebergs -->
  <polygon points="50,160 60,140 70,160" fill="white" opacity="0.7" stroke="#2B4C7E" stroke-width="0.5" />
  <polygon points="80,170 88,148 96,170" fill="white" opacity="0.7" stroke="#2B4C7E" stroke-width="0.5" />
  <polygon points="110,155 120,132 130,155" fill="white" opacity="0.7" stroke="#2B4C7E" stroke-width="0.5" />
  <!-- Waves -->
  <path d="M30,195 Q45,190 60,195 Q75,200 90,195 Q105,190 120,195 Q135,200 150,195" fill="none" stroke="#2B4C7E" stroke-width="1.5" opacity="0.4" />
  <text x="94" y="185" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Баренцево, Карское,</text>
  <text x="94" y="196" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Лаптевых, Чукотское</text>
  <!-- Ship for Northern Sea Route -->
  <polygon points="60,218 90,218 85,225 65,225" fill="#1a1a1a" opacity="0.5" />
  <rect x="73" y="208" width="4" height="10" fill="#1a1a1a" opacity="0.5" />
  <text x="94" y="237" text-anchor="middle" font-size="7" fill="#2B4C7E" font-family="Arial, sans-serif">Северный морской путь</text>

  <!-- Pacific Ocean -->
  <rect x="178" y="92" width="148" height="155" rx="4" fill="#2B4C7E" opacity="0.12" />
  <rect x="178" y="92" width="148" height="22" rx="4" fill="#2B4C7E" opacity="0.65" />
  <rect x="178" y="108" width="148" height="6" rx="0" fill="#2B4C7E" opacity="0.65" />
  <text x="252" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Arial, sans-serif">Тихий океан</text>
  <!-- Waves -->
  <path d="M190,165 Q205,158 220,165 Q235,172 250,165 Q265,158 280,165 Q295,172 310,165" fill="none" stroke="#2B4C7E" stroke-width="2" opacity="0.3" />
  <path d="M190,180 Q205,173 220,180 Q235,187 250,180 Q265,173 280,180 Q295,187 310,180" fill="none" stroke="#2B4C7E" stroke-width="2" opacity="0.25" />
  <!-- Fish -->
  <g transform="translate(220,150)">
    <ellipse cx="0" cy="0" rx="10" ry="5" fill="#D4A843" opacity="0.6" />
    <polygon points="10,0 16,-5 16,5" fill="#D4A843" opacity="0.6" />
  </g>
  <g transform="translate(270,170)">
    <ellipse cx="0" cy="0" rx="8" ry="4" fill="#D4A843" opacity="0.5" />
    <polygon points="8,0 13,-4 13,4" fill="#D4A843" opacity="0.5" />
  </g>
  <text x="252" y="200" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Берингово, Охотское,</text>
  <text x="252" y="211" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Японское</text>
  <!-- Whale -->
  <g transform="translate(245,230)">
    <ellipse cx="0" cy="0" rx="22" ry="8" fill="#1a1a1a" opacity="0.3" />
    <polygon points="22,0 30,-6 28,0 30,6" fill="#1a1a1a" opacity="0.3" />
  </g>

  <!-- Atlantic Ocean -->
  <rect x="336" y="92" width="148" height="155" rx="4" fill="#2B4C7E" opacity="0.1" />
  <rect x="336" y="92" width="148" height="22" rx="4" fill="#2B4C7E" opacity="0.5" />
  <rect x="336" y="108" width="148" height="6" rx="0" fill="#2B4C7E" opacity="0.5" />
  <text x="410" y="107" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="Arial, sans-serif">Атлантический</text>
  <!-- Waves -->
  <path d="M348,160 Q363,154 378,160 Q393,166 408,160 Q423,154 438,160 Q453,166 468,160" fill="none" stroke="#2B4C7E" stroke-width="2" opacity="0.3" />
  <!-- Sun for warm seas -->
  <circle cx="410" cy="145" r="14" fill="#D4A843" opacity="0.3" />
  <circle cx="410" cy="145" r="8" fill="#D4A843" opacity="0.5" />
  <text x="410" y="190" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Балтийское, Чёрное,</text>
  <text x="410" y="201" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Азовское</text>
  <!-- Palm tree hint -->
  <line x1="380" y1="220" x2="375" y2="185" stroke="#5D4037" stroke-width="2" />
  <ellipse cx="370" cy="183" rx="10" ry="5" fill="#2D5A27" opacity="0.5" />
  <ellipse cx="380" cy="180" rx="10" ry="5" fill="#2D5A27" opacity="0.5" transform="rotate(-20,380,180)" />
  <text x="410" y="237" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Тёплые курортные моря</text>

  <!-- Summary -->
  <rect x="30" y="260" width="440" height="35" rx="4" fill="white" stroke="#D4A843" stroke-width="1.5" />
  <text x="250" y="278" text-anchor="middle" font-size="11" fill="#1a1a1a" font-family="Arial, sans-serif">Россия омывается водами трёх океанов</text>
  <text x="250" y="293" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">12 морей, самая длинная морская граница в мире</text>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 7</text>
</svg>