<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Водные ресурсы</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Значение воды и её охрана</text>

  <!-- Hydroelectric dam illustration -->
  <!-- River -->
  <rect x="20" y="195" width="460" height="25" rx="2" fill="#2B4C7E" opacity="0.2" />
  <path d="M20,207 Q80,200 140,207 Q200,214 260,207 Q320,200 380,207 Q440,214 480,207" fill="none" stroke="#2B4C7E" stroke-width="2" />

  <!-- Dam structure -->
  <rect x="220" y="120" width="60" height="80" fill="#1a1a1a" opacity="0.6" />
  <rect x="215" y="115" width="70" height="10" fill="#D4A843" />
  <!-- Dam top details -->
  <rect x="230" y="105" width="6" height="10" fill="#1a1a1a" opacity="0.6" />
  <rect x="248" y="100" width="6" height="15" fill="#1a1a1a" opacity="0.6" />
  <rect x="264" y="105" width="6" height="10" fill="#1a1a1a" opacity="0.6" />
  <!-- Water falling -->
  <path d="M280,140 Q290,155 285,170 Q295,185 290,195" fill="none" stroke="#2B4C7E" stroke-width="2" opacity="0.5" />
  <path d="M285,140 Q295,158 290,175 Q300,190 295,195" fill="none" stroke="#2B4C7E" stroke-width="1.5" opacity="0.4" />

  <!-- Reservoir (upstream) -->
  <rect x="20" y="175" width="200" height="30" rx="2" fill="#2B4C7E" opacity="0.15" />
  <text x="120" y="194" text-anchor="middle" font-size="9" fill="#2B4C7E" font-family="Arial, sans-serif">Водохранилище</text>

  <!-- Power lines from dam -->
  <line x1="250" y1="100" x2="250" y2="95" stroke="#1a1a1a" stroke-width="2" />
  <line x1="250" y1="95" x2="320" y2="95" stroke="#1a1a1a" stroke-width="1.5" />
  <line x1="320" y1="95" x2="320" y2="130" stroke="#1a1a1a" stroke-width="1.5" />
  <circle cx="320" cy="130" r="3" fill="#D4A843" />
  <text x="340" y="128" font-size="8" fill="#D4A843" font-family="Arial, sans-serif">ГЭС</text>

  <!-- Electricity symbol -->
  <g transform="translate(350,110)">
    <polygon points="0,-8 -5,0 2,0 -3,8" fill="#D4A843" stroke="#D4A843" stroke-width="1" />
  </g>

  <!-- Water usage icons left side -->
  <g transform="translate(40,100)">
    <!-- Drinking glass -->
    <rect x="0" y="0" width="12" height="16" rx="1" fill="none" stroke="#2B4C7E" stroke-width="1.5" />
    <rect x="2" y="6" width="8" height="8" fill="#2B4C7E" opacity="0.4" />
    <text x="6" y="26" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Питьё</text>
  </g>
  <g transform="translate(85,100)">
    <!-- Factory -->
    <rect x="0" y="8" width="16" height="10" fill="#1a1a1a" opacity="0.4" />
    <rect x="2" y="2" width="4" height="6" fill="#1a1a1a" opacity="0.4" />
    <rect x="10" y="4" width="4" height="4" fill="#1a1a1a" opacity="0.4" />
    <text x="8" y="26" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Заводы</text>
  </g>
  <g transform="translate(130,100)">
    <!-- Ship -->
    <polygon points="0,14 8,6 16,14" fill="#1a1a1a" opacity="0.4" />
    <rect x="6" y="2" width="3" height="6" fill="#1a1a1a" opacity="0.4" />
    <text x="8" y="26" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Транспорт</text>
  </g>
  <g transform="translate(175,100)">
    <!-- Fish -->
    <ellipse cx="8" cy="8" rx="8" ry="4" fill="#2B4C7E" opacity="0.4" />
    <polygon points="16,8 22,4 22,12" fill="#2B4C7E" opacity="0.4" />
    <text x="10" y="26" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Рыба</text>
  </g>

  <!-- HES info boxes -->
  <rect x="30" y="230" width="145" height="50" rx="4" fill="white" stroke="#C41E3A" stroke-width="1.5" />
  <text x="102" y="247" text-anchor="middle" font-size="9" font-weight="bold" fill="#C41E3A" font-family="Arial, sans-serif">Саяно-Шушенская</text>
  <text x="102" y="260" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">6400 МВт</text>
  <text x="102" y="273" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Самая мощная ГЭС России</text>

  <rect x="190" y="230" width="130" height="50" rx="4" fill="white" stroke="#2B4C7E" stroke-width="1.5" />
  <text x="255" y="247" text-anchor="middle" font-size="9" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Красноярская</text>
  <text x="255" y="260" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">6000 МВт</text>
  <text x="255" y="273" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">На реке Енисей</text>

  <rect x="335" y="230" width="140" height="50" rx="4" fill="white" stroke="#D4A843" stroke-width="1.5" />
  <text x="405" y="247" text-anchor="middle" font-size="9" font-weight="bold" fill="#D4A843" font-family="Arial, sans-serif">Береги воду!</text>
  <text x="405" y="260" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Не мусори у воды</text>
  <text x="405" y="273" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Экономь дома</text>

  <!-- Clean water drop -->
  <g transform="translate(440,100)">
    <path d="M0,-15 Q-10,0 0,12 Q10,0 0,-15 Z" fill="#2B4C7E" opacity="0.4" />
  </g>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 8</text>
</svg>