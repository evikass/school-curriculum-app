<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <!-- Geometric Bauhaus accents -->
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <rect x="0" y="310" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Россия на карте</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Расположение России на карте мира</text>

  <!-- Simplified Russia outline (Europe + Asia) -->
  <!-- Ocean background for Arctic -->
  <rect x="20" y="90" width="460" height="210" rx="4" fill="#2B4C7E" opacity="0.12" />
  <!-- Russia landmass - simplified polygon -->
  <polygon points="60,120 100,100 140,110 160,105 190,108 220,115 250,110 280,108 310,112 340,105 370,110 400,115 430,120 450,140 440,160 460,170 445,190 450,210 440,230 420,250 400,260 380,270 350,280 320,275 290,270 260,268 230,275 200,270 170,260 150,250 130,240 110,230 90,220 70,200 55,180 50,160 55,140"
    fill="#D4A843" opacity="0.35" stroke="#1a1a1a" stroke-width="1.5" />
  <!-- Ural mountains divider line -->
  <line x1="270" y1="105" x2="290" y2="275" stroke="#C41E3A" stroke-width="2" stroke-dasharray="6,4" />
  <text x="258" y="200" font-size="9" fill="#C41E3A" font-family="Arial, sans-serif" transform="rotate(-85,258,200)">Урал</text>
  <!-- Europe / Asia labels -->
  <text x="160" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Европа</text>
  <text x="380" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#C41E3A" font-family="Arial, sans-serif">Азия</text>
  <!-- Moscow dot -->
  <circle cx="195" cy="150" r="4" fill="#C41E3A" />
  <text x="205" y="148" font-size="10" fill="#1a1a1a" font-family="Arial, sans-serif">Москва</text>
  <!-- Ocean labels -->
  <text x="100" y="105" font-size="9" fill="#2B4C7E" font-family="Arial, sans-serif">Ледовитый</text>
  <text x="90" y="115" font-size="9" fill="#2B4C7E" font-family="Arial, sans-serif">океан</text>
  <text x="430" y="150" font-size="9" fill="#2B4C7E" font-family="Arial, sans-serif">Тихий</text>
  <text x="430" y="160" font-size="9" fill="#2B4C7E" font-family="Arial, sans-serif">океан</text>
  <!-- Compass rose -->
  <g transform="translate(445,250)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#1a1a1a" stroke-width="1" />
    <polygon points="0,-16 -4,-4 0,-8 4,-4" fill="#C41E3A" />
    <polygon points="0,16 -4,4 0,8 4,4" fill="#1a1a1a" />
    <text x="0" y="-20" text-anchor="middle" font-size="8" fill="#C41E3A" font-weight="bold" font-family="Arial, sans-serif">С</text>
  </g>
  <!-- Stats boxes -->
  <rect x="30" y="280" width="100" height="22" rx="2" fill="#C41E3A" opacity="0.9" />
  <text x="80" y="295" text-anchor="middle" font-size="10" fill="#F5E6C8" font-family="Arial, sans-serif">17,1 млн кв.км</text>
  <rect x="145" y="280" width="110" height="22" rx="2" fill="#2B4C7E" opacity="0.85" />
  <text x="200" y="295" text-anchor="middle" font-size="10" fill="#F5E6C8" font-family="Arial, sans-serif">18 стран-соседей</text>
  <rect x="270" y="280" width="120" height="22" rx="2" fill="#D4A843" opacity="0.9" />
  <text x="330" y="295" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial, sans-serif">3 океана омывают</text>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 1</text>
</svg>