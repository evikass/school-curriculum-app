<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Полезные ископаемые</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Богатства недр России</text>

  <!-- Underground layers -->
  <rect x="20" y="92" width="460" height="130" rx="4" fill="#1a1a1a" opacity="0.05" />
  <!-- Surface -->
  <rect x="20" y="92" width="460" height="15" rx="2" fill="#8B7D5D" opacity="0.3" />
  <!-- Soil layers -->
  <rect x="20" y="107" width="460" height="20" fill="#A08060" opacity="0.2" />
  <rect x="20" y="127" width="460" height="20" fill="#8B6914" opacity="0.15" />
  <rect x="20" y="147" width="460" height="20" fill="#6D5A3E" opacity="0.2" />
  <rect x="20" y="167" width="460" height="20" fill="#555" opacity="0.15" />
  <rect x="20" y="187" width="460" height="35" fill="#333" opacity="0.1" />
  <text x="35" y="104" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Поверхность</text>
  <text x="35" y="121" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Глина, песок</text>
  <text x="35" y="140" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Уголь</text>
  <text x="35" y="160" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Железная руда</text>
  <text x="35" y="180" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Нефть, газ</text>
  <text x="35" y="200" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Алмазы, золото</text>

  <!-- Oil drops -->
  <g transform="translate(150,180)">
    <path d="M0,-8 Q-6,0 0,6 Q6,0 0,-8 Z" fill="#333" opacity="0.5" />
    <text x="12" y="3" font-size="7" fill="#333" font-family="Arial, sans-serif">Нефть</text>
  </g>
  <!-- Gas flame -->
  <g transform="translate(250,175)">
    <path d="M0,-10 Q-5,-3 0,4 Q5,-3 0,-10 Z" fill="#2B4C7E" opacity="0.4" />
    <text x="10" y="3" font-size="7" fill="#2B4C7E" font-family="Arial, sans-serif">Газ</text>
  </g>
  <!-- Coal -->
  <g transform="translate(350,137)">
    <rect x="-8" y="-6" width="16" height="12" rx="2" fill="#333" opacity="0.4" />
    <text x="0" y="16" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Уголь</text>
  </g>
  <!-- Gold nugget -->
  <g transform="translate(150,200)">
    <polygon points="0,-8 7,-3 5,5 -5,5 -7,-3" fill="#D4A843" opacity="0.7" />
    <text x="12" y="3" font-size="7" fill="#D4A843" font-family="Arial, sans-serif">Золото</text>
  </g>
  <!-- Diamond -->
  <g transform="translate(300,200)">
    <polygon points="0,-8 8,0 0,8 -8,0" fill="#2B4C7E" opacity="0.3" stroke="#2B4C7E" stroke-width="0.5" />
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#2B4C7E" stroke-width="0.5" />
    <text x="12" y="3" font-size="7" fill="#2B4C7E" font-family="Arial, sans-serif">Алмазы</text>
  </g>
  <!-- Iron ore -->
  <g transform="translate(420,157)">
    <polygon points="0,-7 6,-4 6,4 0,7 -6,4 -6,-4" fill="#C41E3A" opacity="0.4" />
    <text x="0" y="16" text-anchor="middle" font-size="7" fill="#C41E3A" font-family="Arial, sans-serif">Железная</text>
    <text x="0" y="24" text-anchor="middle" font-size="7" fill="#C41E3A" font-family="Arial, sans-serif">руда</text>
  </g>
  <!-- Oil derrick -->
  <g transform="translate(440,95)" stroke="#1a1a1a" stroke-width="1" opacity="0.4">
    <line x1="0" y1="0" x2="-5" y2="30" />
    <line x1="0" y1="0" x2="5" y2="30" />
    <line x1="-3" y1="10" x2="3" y2="10" />
    <line x1="-4" y1="20" x2="4" y2="20" />
  </g>

  <!-- Category boxes -->
  <rect x="20" y="232" width="108" height="60" rx="3" fill="white" stroke="#333" stroke-width="1.5" />
  <text x="74" y="248" text-anchor="middle" font-size="9" font-weight="bold" fill="#333" font-family="Arial, sans-serif">Топливные</text>
  <text x="74" y="261" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Нефть, газ, уголь</text>
  <text x="74" y="274" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Западная Сибирь,</text>
  <text x="74" y="284" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Кузбасс</text>

  <rect x="138" y="232" width="108" height="60" rx="3" fill="white" stroke="#C41E3A" stroke-width="1.5" />
  <text x="192" y="248" text-anchor="middle" font-size="9" font-weight="bold" fill="#C41E3A" font-family="Arial, sans-serif">Рудные</text>
  <text x="192" y="261" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Железная руда,</text>
  <text x="192" y="274" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">медь, никель</text>
  <text x="192" y="284" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">КМА, Урал</text>

  <rect x="256" y="232" width="108" height="60" rx="3" fill="white" stroke="#D4A843" stroke-width="1.5" />
  <text x="310" y="248" text-anchor="middle" font-size="9" font-weight="bold" fill="#D4A843" font-family="Arial, sans-serif">Драгоценные</text>
  <text x="310" y="261" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Золото, алмазы,</text>
  <text x="310" y="274" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">серебро, платина</text>
  <text x="310" y="284" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Якутия, Урал</text>

  <rect x="374" y="232" width="110" height="60" rx="3" fill="white" stroke="#8B7D5D" stroke-width="1.5" />
  <text x="429" y="248" text-anchor="middle" font-size="9" font-weight="bold" fill="#8B7D5D" font-family="Arial, sans-serif">Нерудные</text>
  <text x="429" y="261" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Соль, песок, глина,</text>
  <text x="429" y="274" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">известняк, мрамор</text>
  <text x="429" y="284" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Повсеместно</text>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 11</text>
</svg>