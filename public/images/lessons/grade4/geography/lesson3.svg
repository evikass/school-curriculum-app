<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Столица России</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Москва — сердце России</text>

  <!-- Sky gradient -->
  <rect x="20" y="95" width="460" height="145" rx="4" fill="#2B4C7E" opacity="0.08" />

  <!-- Kremlin wall -->
  <rect x="60" y="200" width="180" height="35" fill="#8B1A2B" />
  <!-- Kremlin wall teeth -->
  <g fill="#8B1A2B">
    <rect x="60" y="194" width="8" height="10" />
    <rect x="72" y="194" width="8" height="10" />
    <rect x="84" y="194" width="8" height="10" />
    <rect x="96" y="194" width="8" height="10" />
    <rect x="108" y="194" width="8" height="10" />
    <rect x="120" y="194" width="8" height="10" />
    <rect x="132" y="194" width="8" height="10" />
    <rect x="144" y="194" width="8" height="10" />
    <rect x="156" y="194" width="8" height="10" />
    <rect x="168" y="194" width="8" height="10" />
    <rect x="180" y="194" width="8" height="10" />
    <rect x="192" y="194" width="8" height="10" />
    <rect x="204" y="194" width="8" height="10" />
    <rect x="216" y="194" width="8" height="10" />
    <rect x="228" y="194" width="8" height="10" />
  </g>

  <!-- Spasskaya Tower -->
  <rect x="140" y="130" width="22" height="70" fill="#8B1A2B" />
  <rect x="136" y="125" width="30" height="10" fill="#D4A843" />
  <polygon points="140,125 151,105 162,125" fill="#C41E3A" />
  <polygon points="145,105 151,95 157,105" fill="#D4A843" />
  <!-- Clock face -->
  <circle cx="151" cy="155" r="7" fill="#D4A843" />
  <circle cx="151" cy="155" r="6" fill="white" />
  <line x1="151" y1="155" x2="151" y2="150" stroke="#1a1a1a" stroke-width="1" />
  <line x1="151" y1="155" x2="155" y2="157" stroke="#1a1a1a" stroke-width="1" />

  <!-- Second tower -->
  <rect x="90" y="145" width="18" height="55" fill="#8B1A2B" />
  <polygon points="90,145 99,130 108,145" fill="#C41E3A" />
  <polygon points="94,130 99,122 104,130" fill="#D4A843" />

  <!-- Third tower -->
  <rect x="200" y="145" width="18" height="55" fill="#8B1A2B" />
  <polygon points="200,145 209,130 218,145" fill="#C41E3A" />
  <polygon points="204,130 209,122 214,130" fill="#D4A843" />

  <!-- St Basil's Cathedral (simplified) -->
  <g transform="translate(320,140)">
    <!-- Base -->
    <rect x="0" y="40" width="80" height="55" fill="#C41E3A" />
    <!-- Central dome -->
    <rect x="30" y="10" width="20" height="35" fill="#C41E3A" />
    <ellipse cx="40" cy="10" rx="15" ry="12" fill="#D4A843" />
    <polygon points="40,-5 35,5 45,5" fill="#D4A843" />
    <circle cx="40" cy="0" r="3" fill="#D4A843" />
    <!-- Side domes -->
    <rect x="0" y="20" width="15" height="25" fill="#C41E3A" />
    <ellipse cx="7" cy="20" rx="10" ry="8" fill="#D4A843" />
    <polygon points="7,7 3,15 11,15" fill="#D4A843" />
    <rect x="65" y="20" width="15" height="25" fill="#C41E3A" />
    <ellipse cx="72" cy="20" rx="10" ry="8" fill="#D4A843" />
    <polygon points="72,7 68,15 76,15" fill="#D4A843" />
    <rect x="12" y="25" width="14" height="20" fill="#C41E3A" opacity="0.9" />
    <ellipse cx="19" cy="25" rx="9" ry="7" fill="#D4A843" opacity="0.8" />
    <rect x="54" y="25" width="14" height="20" fill="#C41E3A" opacity="0.9" />
    <ellipse cx="61" cy="25" rx="9" ry="7" fill="#D4A843" opacity="0.8" />
  </g>

  <!-- Moscow River -->
  <path d="M20,245 Q100,240 150,248 Q250,256 350,245 Q420,238 480,245" fill="none" stroke="#2B4C7E" stroke-width="3" opacity="0.5" />
  <text x="420" y="240" font-size="8" fill="#2B4C7E" font-family="Arial, sans-serif">р. Москва</text>

  <!-- Year established -->
  <rect x="30" y="260" width="90" height="28" rx="3" fill="#C41E3A" opacity="0.9" />
  <text x="75" y="279" text-anchor="middle" font-size="12" font-weight="bold" fill="#F5E6C8" font-family="Arial, sans-serif">1147 год</text>

  <!-- Population -->
  <rect x="135" y="260" width="110" height="28" rx="3" fill="#2B4C7E" opacity="0.8" />
  <text x="190" y="279" text-anchor="middle" font-size="12" font-weight="bold" fill="#F5E6C8" font-family="Arial, sans-serif">13 млн человек</text>

  <!-- Red Square label -->
  <text x="150" y="190" text-anchor="middle" font-size="8" fill="#D4A843" font-family="Arial, sans-serif">Красная площадь</text>

  <!-- Fact box -->
  <rect x="260" y="260" width="210" height="28" rx="3" fill="#D4A843" opacity="0.8" />
  <text x="365" y="279" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial, sans-serif">Кремль — символ России</text>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 3</text>
</svg>