<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Реки России</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Главные реки страны</text>

  <!-- Land background -->
  <rect x="20" y="95" width="460" height="160" rx="4" fill="#D4A843" opacity="0.1" />

  <!-- Russia outline simplified -->
  <polygon points="30,100 100,95 200,100 300,95 400,100 470,110 470,240 400,255 300,250 200,252 100,248 40,240 25,200"
    fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.3" />

  <!-- Volga river -->
  <path d="M170,108 Q165,130 155,150 Q148,170 140,190 Q135,210 130,235 Q125,248 120,255"
    fill="none" stroke="#2B4C7E" stroke-width="4" stroke-linecap="round" />
  <text x="160" y="140" font-size="10" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Волга</text>
  <text x="135" y="152" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">3530 км</text>

  <!-- Ob river -->
  <path d="M200,108 Q220,130 240,150 Q260,170 280,190 Q310,210 350,230 Q380,240 420,250"
    fill="none" stroke="#2B4C7E" stroke-width="3.5" stroke-linecap="round" />
  <text x="310" y="185" font-size="10" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Обь</text>
  <text x="285" y="197" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">5410 км</text>

  <!-- Yenisei river -->
  <path d="M320,100 Q325,120 330,145 Q332,170 335,195 Q338,215 340,240 Q342,250 345,255"
    fill="none" stroke="#2B4C7E" stroke-width="3" stroke-linecap="round" />
  <text x="348" y="145" font-size="10" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Енисей</text>
  <text x="348" y="157" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">4287 км</text>

  <!-- Lena river -->
  <path d="M410,100 Q415,120 418,145 Q420,170 425,195 Q428,215 435,240 Q438,248 440,255"
    fill="none" stroke="#2B4C7E" stroke-width="2.5" stroke-linecap="round" />
  <text x="435" y="140" font-size="9" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Лена</text>
  <text x="435" y="152" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">4400 км</text>

  <!-- Amur river -->
  <path d="M420,175 Q440,185 460,195 Q470,200 475,205"
    fill="none" stroke="#2B4C7E" stroke-width="2" stroke-linecap="round" />
  <text x="445" y="190" font-size="8" fill="#2B4C7E" font-family="Arial, sans-serif">Амур</text>

  <!-- Ocean labels -->
  <text x="140" y="255" font-size="8" fill="#2B4C7E" font-family="Arial, sans-serif">Каспийское м.</text>
  <text x="380" y="258" font-size="8" fill="#2B4C7E" font-family="Arial, sans-serif">Ледовитый ок.</text>

  <!-- Water flow arrow -->
  <polygon points="80,165 95,160 95,170" fill="#2B4C7E" opacity="0.6" />

  <!-- River info boxes -->
  <rect x="30" y="265" width="140" height="35" rx="3" fill="#2B4C7E" opacity="0.85" />
  <text x="100" y="279" text-anchor="middle" font-size="9" fill="#F5E6C8" font-family="Arial, sans-serif">Обь — самая длинная</text>
  <text x="100" y="293" text-anchor="middle" font-size="9" fill="#F5E6C8" font-family="Arial, sans-serif">река России</text>

  <rect x="185" y="265" width="140" height="35" rx="3" fill="#C41E3A" opacity="0.85" />
  <text x="255" y="279" text-anchor="middle" font-size="9" fill="#F5E6C8" font-family="Arial, sans-serif">Волга — великая</text>
  <text x="255" y="293" text-anchor="middle" font-size="9" fill="#F5E6C8" font-family="Arial, sans-serif">река Европы</text>

  <rect x="340" y="265" width="140" height="35" rx="3" fill="#D4A843" opacity="0.85" />
  <text x="410" y="279" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">В России более</text>
  <text x="410" y="293" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">2,5 млн рек</text>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 5</text>
</svg>