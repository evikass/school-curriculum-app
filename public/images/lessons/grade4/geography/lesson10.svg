<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Животный мир природных зон</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Растения и животные разных зон</text>

  <!-- Three zone sections with animals -->

  <!-- Tundra animals -->
  <rect x="20" y="92" width="152" height="135" rx="4" fill="white" stroke="#2B4C7E" stroke-width="1.5" />
  <rect x="20" y="92" width="152" height="20" rx="4" fill="#2B4C7E" opacity="0.7" />
  <rect x="20" y="108" width="152" height="4" fill="#2B4C7E" opacity="0.7" />
  <text x="96" y="106" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Arial, sans-serif">Тундра</text>

  <!-- Polar owl -->
  <g transform="translate(55,140)">
    <ellipse cx="0" cy="0" rx="10" ry="12" fill="white" stroke="#1a1a1a" stroke-width="1" />
    <circle cx="-4" cy="-5" r="3" fill="#D4A843" />
    <circle cx="4" cy="-5" r="3" fill="#D4A843" />
    <circle cx="-4" cy="-5" r="1.5" fill="#1a1a1a" />
    <circle cx="4" cy="-5" r="1.5" fill="#1a1a1a" />
    <polygon points="-2,2 0,5 2,2" fill="#D4A843" />
    <polygon points="-8,5 -15,2 -8,8" fill="white" stroke="#1a1a1a" stroke-width="0.5" />
    <polygon points="8,5 15,2 8,8" fill="white" stroke="#1a1a1a" stroke-width="0.5" />
    <text x="0" y="22" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Полярная сова</text>
  </g>

  <!-- Reindeer -->
  <g transform="translate(130,145)">
    <ellipse cx="0" cy="5" rx="14" ry="8" fill="#6D4C2E" opacity="0.7" />
    <circle cx="-11" cy="0" r="5" fill="#6D4C2E" opacity="0.7" />
    <circle cx="-13" cy="-2" r="1.5" fill="#1a1a1a" />
    <!-- Antlers -->
    <line x1="-10" y1="-4" x2="-16" y2="-14" stroke="#6D4C2E" stroke-width="1.5" />
    <line x1="-16" y1="-14" x2="-20" y2="-12" stroke="#6D4C2E" stroke-width="1" />
    <line x1="-16" y1="-14" x2="-14" y2="-18" stroke="#6D4C2E" stroke-width="1" />
    <line x1="-6" y1="-4" x2="-2" y2="-12" stroke="#6D4C2E" stroke-width="1.5" />
    <line x1="-2" y1="-12" x2="-5" y2="-16" stroke="#6D4C2E" stroke-width="1" />
    <!-- Legs -->
    <line x1="-8" y1="12" x2="-9" y2="20" stroke="#6D4C2E" stroke-width="1.5" />
    <line x1="-3" y1="12" x2="-2" y2="20" stroke="#6D4C2E" stroke-width="1.5" />
    <line x1="5" y1="12" x2="6" y2="20" stroke="#6D4C2E" stroke-width="1.5" />
    <line x1="10" y1="12" x2="11" y2="20" stroke="#6D4C2E" stroke-width="1.5" />
    <text x="0" y="30" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Северный олень</text>
  </g>

  <!-- Arctic fox -->
  <g transform="translate(55,195)">
    <ellipse cx="0" cy="3" rx="12" ry="7" fill="white" stroke="#1a1a1a" stroke-width="0.8" />
    <circle cx="-9" cy="0" r="4" fill="white" stroke="#1a1a1a" stroke-width="0.8" />
    <circle cx="-10" cy="-1" r="1" fill="#1a1a1a" />
    <polygon points="-5,4 -2,7 0,4" fill="#1a1a1a" opacity="0.5" />
    <text x="0" y="18" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Песец</text>
  </g>

  <!-- Lemming -->
  <g transform="translate(130,198)">
    <ellipse cx="0" cy="2" rx="8" ry="5" fill="#7D6B5D" opacity="0.6" />
    <circle cx="-5" cy="0" r="3.5" fill="#7D6B5D" opacity="0.6" />
    <circle cx="-6" cy="-1" r="1" fill="#1a1a1a" />
    <text x="0" y="15" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Лемминг</text>
  </g>

  <!-- Forest (Taiga) animals -->
  <rect x="182" y="92" width="152" height="135" rx="4" fill="white" stroke="#2D5A27" stroke-width="1.5" />
  <rect x="182" y="92" width="152" height="20" rx="4" fill="#2D5A27" opacity="0.7" />
  <rect x="182" y="108" width="152" height="4" fill="#2D5A27" opacity="0.7" />
  <text x="258" y="106" text-anchor="middle" font-size="10" font-weight="bold" fill="white" font-family="Arial, sans-serif">Лесная зона</text>

  <!-- Brown bear -->
  <g transform="translate(220,155)">
    <ellipse cx="0" cy="5" rx="18" ry="13" fill="#6D4C2E" opacity="0.6" />
    <circle cx="-14" cy="-2" r="8" fill="#6D4C2E" opacity="0.6" />
    <circle cx="-16" cy="-4" r="2" fill="#1a1a1a" />
    <circle cx="-16" cy="-4" r="0.8" fill="white" />
    <!-- Ears -->
    <circle cx="-18" cy="-9" r="3" fill="#6D4C2E" opacity="0.6" />
    <circle cx="-10" cy="-9" r="3" fill="#6D4C2E" opacity="0.6" />
    <!-- Legs -->
    <rect x="-12" y="14" width="6" height="8" rx="2" fill="#6D4C2E" opacity="0.6" />
    <rect x="-2" y="14" width="6" height="8" rx="2" fill="#6D4C2E" opacity="0.6" />
    <rect x="8" y="14" width="6" height="8" rx="2" fill="#6D4C2E" opacity="0.6" />
    <text x="0" y="33" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Бурый медведь</text>
  </g>

  <!-- Wolf -->
  <g transform="translate(300,160)">
    <ellipse cx="0" cy="3" rx="14" ry="8" fill="#555" opacity="0.6" />
    <circle cx="-10" cy="-2" r="5" fill="#555" opacity="0.6" />
    <circle cx="-12" cy="-3" r="1.2" fill="#D4A843" />
    <circle cx="-12" cy="-3" r="0.6" fill="#1a1a1a" />
    <!-- Ears -->
    <polygon points="-14,-6 -12,-12 -10,-6" fill="#555" opacity="0.6" />
    <polygon points="-8,-6 -6,-12 -4,-6" fill="#555" opacity="0.6" />
    <text x="0" y="20" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Волк</text>
  </g>

  <!-- Squirrel -->
  <g transform="translate(210,200)">
    <ellipse cx="0" cy="4" rx="6" ry="5" fill="#8B4513" opacity="0.6" />
    <circle cx="-3" cy="0" r="3.5" fill="#8B4513" opacity="0.6" />
    <circle cx="-4" cy="-1" r="1" fill="#1a1a1a" />
    <!-- Tail -->
    <path d="M5,0 Q12,-10 8,-15 Q4,-12 6,-2" fill="#8B4513" opacity="0.5" />
    <text x="0" y="16" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Белка</text>
  </g>

  <!-- Fox -->
  <g transform="translate(300,195)">
    <ellipse cx="0" cy="3" rx="12" ry="7" fill="#D2691E" opacity="0.6" />
    <circle cx="-8" cy="0" r="4.5" fill="#D2691E" opacity="0.6" />
    <circle cx="-10" cy="-1" r="1.2" fill="#1a1a1a" />
    <!-- Big tail -->
    <path d="M10,2 Q18,-5 15,-10 Q10,-5 12,0" fill="#D2691E" opacity="0.5" />
    <text x="0" y="18" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Лиса</text>
  </g>

  <!-- Steppe animals -->
  <rect x="344" y="92" width="140" height="135" rx="4" fill="white" stroke="#D4A843" stroke-width="1.5" />
  <rect x="344" y="92" width="140" height="20" rx="4" fill="#D4A843" opacity="0.7" />
  <rect x="344" y="108" width="140" height="4" fill="#D4A843" opacity="0.7" />
  <text x="414" y="106" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Степь</text>

  <!-- Saiga antelope -->
  <g transform="translate(395,148)">
    <ellipse cx="0" cy="5" rx="16" ry="9" fill="#C4A87C" opacity="0.6" />
    <circle cx="-12" cy="0" r="6" fill="#C4A87C" opacity="0.6" />
    <circle cx="-14" cy="-2" r="1.5" fill="#1a1a1a" />
    <!-- Nose (saiga has distinctive nose) -->
    <ellipse cx="-17" cy="1" rx="3" ry="2" fill="#B8976A" opacity="0.7" />
    <!-- Horns -->
    <line x1="-11" y1="-5" x2="-8" y2="-16" stroke="#C4A87C" stroke-width="2" />
    <line x1="-5" y1="-5" x2="-2" y2="-16" stroke="#C4A87C" stroke-width="2" />
    <!-- Legs -->
    <line x1="-8" y1="13" x2="-9" y2="22" stroke="#C4A87C" stroke-width="2" />
    <line x1="0" y1="13" x2="-1" y2="22" stroke="#C4A87C" stroke-width="2" />
    <line x1="6" y1="13" x2="7" y2="22" stroke="#C4A87C" stroke-width="2" />
    <line x1="12" y1="13" x2="13" y2="22" stroke="#C4A87C" stroke-width="2" />
    <text x="0" y="33" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Сайгак</text>
  </g>

  <!-- Steppe eagle -->
  <g transform="translate(440,130)">
    <polygon points="0,0 -20,-8 -8,-2 -20,-12 -5,-4 0,-10 5,-4 20,-12 8,-2 20,-8 0,0" fill="#5D4037" opacity="0.6" />
    <text x="0" y="10" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Степной орёл</text>
  </g>

  <!-- Marmot -->
  <g transform="translate(380,195)">
    <ellipse cx="0" cy="3" rx="10" ry="7" fill="#8B7D5D" opacity="0.6" />
    <circle cx="-6" cy="0" r="4" fill="#8B7D5D" opacity="0.6" />
    <circle cx="-7" cy="-1" r="1" fill="#1a1a1a" />
    <text x="0" y="18" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Сурок</text>
  </g>

  <!-- Ground squirrel -->
  <g transform="translate(450,195)">
    <ellipse cx="0" cy="2" rx="6" ry="4" fill="#C4A87C" opacity="0.5" />
    <circle cx="-4" cy="0" r="3" fill="#C4A87C" opacity="0.5" />
    <text x="0" y="14" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Суслик</text>
  </g>

  <!-- Adaptations info -->
  <rect x="20" y="235" width="230" height="55" rx="4" fill="white" stroke="#C41E3A" stroke-width="1" />
  <text x="135" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#C41E3A" font-family="Arial, sans-serif">Приспособления к холоду:</text>
  <text x="135" y="263" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Густой мех, белая окраска зимой,</text>
  <text x="135" y="275" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">спячка, миграция на юг</text>

  <rect x="265" y="235" width="220" height="55" rx="4" fill="white" stroke="#2B4C7E" stroke-width="1" />
  <text x="375" y="250" text-anchor="middle" font-size="9" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Приспособления к жаре:</text>
  <text x="375" y="263" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Лёгкая шерсть, норы под землёй,</text>
  <text x="375" y="275" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">активность ночью</text>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 10</text>
</svg>