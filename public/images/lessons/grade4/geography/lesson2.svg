<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Субъекты России</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Республики, края, области в составе России</text>

  <!-- Federal districts as colored blocks -->
  <rect x="30" y="95" width="65" height="50" rx="3" fill="#C41E3A" opacity="0.7" />
  <text x="62" y="115" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">Централь-</text>
  <text x="62" y="127" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">ный</text>
  <text x="62" y="140" text-anchor="middle" font-size="7" fill="#E8D5A0" font-family="Arial, sans-serif">18 обл.</text>

  <rect x="105" y="95" width="65" height="50" rx="3" fill="#2B4C7E" opacity="0.7" />
  <text x="137" y="115" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">Северо-</text>
  <text x="137" y="127" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">Западный</text>
  <text x="137" y="140" text-anchor="middle" font-size="7" fill="#E8D5A0" font-family="Arial, sans-serif">11 суб.</text>

  <rect x="180" y="95" width="65" height="50" rx="3" fill="#D4A843" opacity="0.8" />
  <text x="212" y="115" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Южный</text>
  <text x="212" y="127" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Сев.-Кавк.</text>
  <text x="212" y="140" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">14 суб.</text>

  <rect x="255" y="95" width="65" height="50" rx="3" fill="#8B1A2B" opacity="0.7" />
  <text x="287" y="115" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">Приволж-</text>
  <text x="287" y="127" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">ский</text>
  <text x="287" y="140" text-anchor="middle" font-size="7" fill="#E8D5A0" font-family="Arial, sans-serif">14 суб.</text>

  <rect x="330" y="95" width="65" height="50" rx="3" fill="#2B4C7E" opacity="0.5" />
  <text x="362" y="115" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">Ураль-</text>
  <text x="362" y="127" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">ский</text>
  <text x="362" y="140" text-anchor="middle" font-size="7" fill="#E8D5A0" font-family="Arial, sans-serif">6 суб.</text>

  <rect x="405" y="95" width="65" height="50" rx="3" fill="#C41E3A" opacity="0.5" />
  <text x="437" y="115" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">Сибир-</text>
  <text x="437" y="127" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">ский</text>
  <text x="437" y="140" text-anchor="middle" font-size="7" fill="#E8D5A0" font-family="Arial, sans-serif">12 суб.</text>

  <rect x="200" y="155" width="65" height="50" rx="3" fill="#D4A843" opacity="0.6" />
  <text x="232" y="175" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Дальне-</text>
  <text x="232" y="187" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">восточн.</text>
  <text x="232" y="200" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">11 суб.</text>

  <!-- Subject types info -->
  <rect x="30" y="160" width="155" height="95" rx="4" fill="white" stroke="#D4A843" stroke-width="1.5" />
  <text x="107" y="178" text-anchor="middle" font-size="11" font-weight="bold" fill="#C41E3A" font-family="Arial, sans-serif">Виды субъектов</text>
  <text x="40" y="195" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">Республики — 22</text>
  <text x="40" y="208" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">Края — 9</text>
  <text x="40" y="221" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">Области — 46</text>
  <text x="40" y="234" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">Города фед. знач. — 3</text>
  <text x="40" y="247" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">Авт. округа — 5</text>

  <!-- Large cities -->
  <rect x="290" y="155" width="180" height="95" rx="4" fill="white" stroke="#C41E3A" stroke-width="1.5" />
  <text x="380" y="173" text-anchor="middle" font-size="11" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Крупнейшие города</text>
  <!-- City skyline silhouettes -->
  <rect x="300" y="195" width="8" height="25" fill="#1a1a1a" />
  <rect x="310" y="185" width="10" height="35" fill="#1a1a1a" />
  <rect x="322" y="190" width="8" height="30" fill="#1a1a1a" />
  <rect x="332" y="188" width="12" height="32" fill="#1a1a1a" />
  <rect x="346" y="193" width="8" height="27" fill="#1a1a1a" />
  <polygon points="306,185 315,180 324,185" fill="#C41E3A" />
  <rect x="365" y="183" width="8" height="37" fill="#2B4C7E" opacity="0.7" />
  <rect x="375" y="190" width="10" height="30" fill="#2B4C7E" opacity="0.7" />
  <rect x="387" y="187" width="8" height="33" fill="#2B4C7E" opacity="0.7" />
  <rect x="397" y="192" width="12" height="28" fill="#2B4C7E" opacity="0.7" />
  <text x="316" y="230" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Москва 13 млн</text>
  <text x="380" y="230" font-size="8" fill="#2B4C7E" font-family="Arial, sans-serif">СПб 5,6 млн</text>

  <!-- Federal building icon -->
  <rect x="30" y="265" width="440" height="45" rx="4" fill="#1a1a1a" opacity="0.06" />
  <text x="250" y="285" text-anchor="middle" font-size="10" fill="#1a1a1a" font-family="Arial, sans-serif">89 субъектов в составе Российской Федерации</text>
  <!-- Federation emblem simplified -->
  <circle cx="80" cy="295" r="10" fill="none" stroke="#D4A843" stroke-width="2" />
  <circle cx="120" cy="295" r="10" fill="none" stroke="#C41E3A" stroke-width="2" />
  <circle cx="160" cy="295" r="10" fill="none" stroke="#2B4C7E" stroke-width="2" />
  <text x="95" y="298" font-size="7" fill="#D4A843" font-family="Arial, sans-serif">Респ.</text>
  <text x="135" y="298" font-size="7" fill="#C41E3A" font-family="Arial, sans-serif">Края</text>
  <text x="175" y="298" font-size="7" fill="#2B4C7E" font-family="Arial, sans-serif">Обл.</text>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 2</text>
</svg>