<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8" />
  <rect x="0" y="0" width="500" height="4" fill="#C41E3A" />
  <rect x="0" y="85" width="500" height="2" fill="#D4A843" opacity="0.5" />
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a1a" font-family="Arial, sans-serif">Озёра России</text>
  <text x="250" y="70" text-anchor="middle" font-size="12" fill="#1a1a1a" font-family="Arial, sans-serif">Крупнейшие озёра страны</text>

  <!-- Baikal - main feature -->
  <rect x="20" y="95" width="460" height="155" rx="4" fill="#2B4C7E" opacity="0.06" />

  <!-- Baikal lake shape (crescent) -->
  <path d="M60,130 Q100,105 180,110 Q260,115 340,108 Q400,105 440,120"
    fill="none" stroke="#2B4C7E" stroke-width="20" stroke-linecap="round" opacity="0.3" />
  <path d="M70,130 Q110,115 180,118 Q260,120 340,115 Q390,113 430,122"
    fill="#2B4C7E" opacity="0.25" />

  <!-- Mountains around Baikal -->
  <polygon points="40,150 60,110 80,150" fill="#1a1a1a" opacity="0.3" />
  <polygon points="65,155 85,120 105,155" fill="#1a1a1a" opacity="0.25" />
  <polygon points="400,148 420,108 440,148" fill="#1a1a1a" opacity="0.3" />
  <polygon points="430,152 450,118 470,152" fill="#1a1a1a" opacity="0.25" />

  <!-- Baikal label -->
  <text x="250" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#2B4C7E" font-family="Arial, sans-serif">Байкал</text>

  <!-- Depth indicator -->
  <line x1="250" y1="135" x2="250" y2="205" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="4,3" />
  <polygon points="245,200 255,200 250,210" fill="#1a1a1a" />
  <text x="265" y="150" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">1642 м</text>
  <text x="265" y="160" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">глубина</text>

  <!-- Nerpa (Baikal seal) -->
  <g transform="translate(300,160)">
    <ellipse cx="0" cy="0" rx="18" ry="8" fill="#1a1a1a" opacity="0.7" />
    <circle cx="-15" cy="-3" r="5" fill="#1a1a1a" opacity="0.7" />
    <circle cx="-17" cy="-4" r="1.5" fill="white" />
    <text x="0" y="18" text-anchor="middle" font-size="7" fill="#1a1a1a" font-family="Arial, sans-serif">Нерпа</text>
  </g>

  <!-- Fish in lake -->
  <g transform="translate(150,150)">
    <polygon points="-8,0 0,-4 0,4" fill="#2B4C7E" opacity="0.6" />
    <text x="0" y="12" text-anchor="middle" font-size="6" fill="#2B4C7E" font-family="Arial, sans-serif">Омуль</text>
  </g>

  <!-- Trees on shore -->
  <g fill="#2D5A27" opacity="0.5">
    <polygon points="30,170 35,155 40,170" />
    <polygon points="42,175 47,158 52,175" />
    <polygon points="445,165 450,150 455,165" />
    <polygon points="455,170 460,155 465,170" />
  </g>

  <!-- Info boxes -->
  <rect x="30" y="215" width="130" height="35" rx="3" fill="#2B4C7E" opacity="0.85" />
  <text x="95" y="229" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">20% пресной воды</text>
  <text x="95" y="243" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">всей планеты</text>

  <rect x="175" y="215" width="130" height="35" rx="3" fill="#D4A843" opacity="0.85" />
  <text x="240" y="229" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Возраст:</text>
  <text x="240" y="243" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">25-35 млн лет</text>

  <rect x="320" y="215" width="155" height="35" rx="3" fill="#C41E3A" opacity="0.85" />
  <text x="397" y="229" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">Ладожское — самое</text>
  <text x="397" y="243" text-anchor="middle" font-size="8" fill="#F5E6C8" font-family="Arial, sans-serif">крупное озеро Европы</text>

  <!-- Onega mention -->
  <rect x="30" y="260" width="210" height="35" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1" />
  <text x="135" y="278" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">Онежское озеро — 2-е в Европе</text>
  <text x="135" y="292" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Остров Кижи с деревянными церквями</text>

  <rect x="255" y="260" width="220" height="35" rx="3" fill="white" stroke="#2B4C7E" stroke-width="1" />
  <text x="365" y="278" text-anchor="middle" font-size="9" fill="#1a1a1a" font-family="Arial, sans-serif">Байкал называют Голубым глазом</text>
  <text x="365" y="292" text-anchor="middle" font-size="8" fill="#1a1a1a" font-family="Arial, sans-serif">Сибири — видно дно на 40 м глубины</text>

  <!-- Bottom panel -->
  <rect x="0" y="316" width="500" height="34" fill="#1a1a1a" />
  <rect x="0" y="316" width="500" height="3" fill="#C41E3A" />
  <text x="250" y="337" text-anchor="middle" font-size="13" fill="#F5E6C8" font-family="Arial, sans-serif">География: Россия — Урок 6</text>
</svg>