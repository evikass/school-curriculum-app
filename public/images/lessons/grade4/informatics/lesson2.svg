<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Слепая печать</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Работа с клавиатурой</text>
  <!-- Illustration area -->
  <!-- Left hand --><rect x="115" y="155" width="16" height="40" rx="6" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><rect x="138" y="150" width="14" height="42" rx="5" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><rect x="157" y="147" width="13" height="38" rx="5" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><rect x="174" y="150" width="13" height="35" rx="5" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><rect x="190" y="155" width="12" height="30" rx="4" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><!-- Right hand --><rect x="295" y="155" width="12" height="30" rx="4" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><rect x="311" y="150" width="13" height="35" rx="5" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><rect x="328" y="147" width="13" height="38" rx="5" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><rect x="345" y="150" width="14" height="42" rx="5" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><rect x="364" y="155" width="16" height="40" rx="6" fill="#e8b89d" stroke="#c4826a" stroke-width="1.5"/><!-- Home row bumps --><circle cx="170" cy="224" r="3" fill="#D4A843"/><circle cx="322" cy="224" r="3" fill="#D4A843"/><!-- Keyboard base --><rect x="100" y="210" width="300" height="55" rx="6" fill="#d0d0d0" stroke="#999" stroke-width="2"/><rect x="108" y="216" width="284" height="43" rx="4" fill="#e8e8e8"/><!-- Wrist pads --><rect x="110" y="265" width="280" height="12" rx="6" fill="#bbb" stroke="#999" stroke-width="1"/><text x="250" y="300" text-anchor="middle" font-size="11" fill="#C41E3A" font-weight="bold" font-family="Arial">F и J</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
