<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Графический редактор Paint</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Графический редактор</text>
  <!-- Illustration area -->
  <rect x="110" y="100" width="280" height="195" rx="4" fill="#fff" stroke="#999" stroke-width="2"/><rect x="110" y="100" width="50" height="195" rx="4" fill="#e0e0e0" stroke="#999" stroke-width="1"/><!-- Tool icons --><rect x="122" y="115" width="26" height="26" rx="3" fill="{CREAM}" stroke="#999" stroke-width="1"/><line x1="130" y1="134" x2="142" y2="122" stroke="#1a1a1a" stroke-width="2"/><rect x="122" y="150" width="26" height="26" rx="3" fill="{CREAM}" stroke="#999" stroke-width="1"/><rect x="128" y="156" width="14" height="14" rx="2" fill="#C41E3A"/><rect x="122" y="185" width="26" height="26" rx="3" fill="{CREAM}" stroke="#999" stroke-width="1"/><ellipse cx="135" cy="198" rx="8" ry="6" fill="#87CEEB"/><rect x="122" y="220" width="26" height="26" rx="3" fill="{CREAM}" stroke="#999" stroke-width="1"/><rect x="130" y="225" width="10" height="16" rx="1" fill="#FFB6C1" transform="rotate(-30 135 233)"/><!-- Color palette at bottom --><circle cx="180" cy="278" r="6" fill="#C41E3A"/><circle cx="198" cy="278" r="6" fill="#FF6600"/><circle cx="216" cy="278" r="6" fill="#D4A843"/><circle cx="234" cy="278" r="6" fill="#00AA00"/><circle cx="252" cy="278" r="6" fill="#2B4C7E"/><circle cx="270" cy="278" r="6" fill="#8B00FF"/><circle cx="288" cy="278" r="6" fill="#000"/><circle cx="306" cy="278" r="6" fill="#fff" stroke="#999" stroke-width="1"/><!-- Drawing on canvas --><circle cx="250" cy="170" r="30" fill="#FFD700" opacity="0.6"/><rect x="200" y="140" width="50" height="35" rx="3" fill="#4CAF50" opacity="0.5"/>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
</svg>