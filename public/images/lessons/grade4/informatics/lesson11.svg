<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Создание текстовых документов</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Безопасный интернет</text>
  <!-- Illustration area -->
  <rect x="150" y="105" width="200" height="180" rx="3" fill="#fff" stroke="#999" stroke-width="2"/><rect x="150" y="105" width="200" height="22" rx="3" fill="#2B4C7E" opacity="0.85"/><circle cx="165" cy="116" r="4" fill="#FF6347"/><circle cx="180" cy="116" r="4" fill="#D4A843"/><circle cx="195" cy="116" r="4" fill="#32CD32"/><text x="250" y="119" text-anchor="middle" font-size="10" fill="#fff" font-family="Arial">Документ</text><line x1="170" y1="145" x2="330" y2="145" stroke="#ddd" stroke-width="1.5"/><line x1="170" y1="160" x2="310" y2="160" stroke="#ddd" stroke-width="1.5"/><line x1="170" y1="175" x2="320" y2="175" stroke="#ddd" stroke-width="1.5"/><line x1="170" y1="190" x2="290" y2="190" stroke="#ddd" stroke-width="1.5"/><line x1="170" y1="205" x2="325" y2="205" stroke="#ddd" stroke-width="1.5"/><line x1="170" y1="220" x2="300" y2="220" stroke="#ddd" stroke-width="1.5"/><line x1="170" y1="235" x2="315" y2="235" stroke="#ddd" stroke-width="1.5"/><line x1="170" y1="250" x2="280" y2="250" stroke="#ddd" stroke-width="1.5"/><text x="250" y="300" text-anchor="middle" font-size="11" fill="#C41E3A" font-weight="bold" font-family="Arial">Ctrl+S - сохранить</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
</svg>