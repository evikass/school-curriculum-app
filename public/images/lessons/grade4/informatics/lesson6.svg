<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Инструменты рисования</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Графический редактор</text>
  <!-- Illustration area -->
  <!-- Pencil --><polygon points="140,130 145,270 155,270 160,130" fill="#D4A843" stroke="#1a1a1a" stroke-width="1"/><polygon points="145,270 155,270 150,290" fill="#333" stroke="#1a1a1a" stroke-width="0.5"/><rect x="140" y="130" width="20" height="20" rx="2" fill="#FF69B4"/><!-- Brush --><rect x="220" y="120" width="14" height="120" rx="2" fill="#8B4513" stroke="#1a1a1a" stroke-width="1"/><rect x="216" y="120" width="22" height="15" rx="2" fill="#C0C0C0" stroke="#999" stroke-width="0.5"/><polygon points="218,240 236,240 232,280 222,280" fill="#666"/><ellipse cx="227" cy="278" rx="7" ry="4" fill="#555"/><!-- Eraser --><rect x="310" y="140" width="30" height="80" rx="4" fill="#87CEEB" stroke="#1a1a1a" stroke-width="1.5"/><rect x="315" y="140" width="20" height="15" rx="2" fill="#FF69B4"/><line x1="315" y1="160" x2="335" y2="160" stroke="#ddd" stroke-width="1"/><!-- Palette --><ellipse cx="180" cy="190" rx="35" ry="25" fill="#DEB887" stroke="#1a1a1a" stroke-width="1.5"/><circle cx="170" cy="182" r="5" fill="#C41E3A"/><circle cx="185" cy="180" r="5" fill="#2B4C7E"/><circle cx="195" cy="192" r="5" fill="#D4A843"/><circle cx="178" cy="200" r="5" fill="#00AA00"/><ellipse cx="170" cy="195" rx="8" ry="5" fill="#fff" opacity="0.3"/>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
</svg>