<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Геометрические фигуры</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Графический редактор</text>
  <!-- Illustration area -->
  <rect x="120" y="120" width="80" height="55" rx="2" fill="none" stroke="#C41E3A" stroke-width="3"/><circle cx="280" cy="148" r="35" fill="none" stroke="#2B4C7E" stroke-width="3"/><polygon points="390,115 420,175 360,175" fill="none" stroke="#D4A843" stroke-width="3"/><line x1="140" y1="220" x2="360" y2="220" stroke="#1a1a1a" stroke-width="3" marker-end="url(#arrowH)"/><line x1="140" y1="260" x2="360" y2="260" stroke="#C41E3A" stroke-width="3" stroke-dasharray="8,4"/><rect x="130" y="200" width="60" height="60" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="2"/><circle cx="310" cy="230" r="30" fill="#C41E3A" opacity="0.2" stroke="#C41E3A" stroke-width="2"/><polygon points="230,195 265,270 195,270" fill="#2B4C7E" opacity="0.2" stroke="#2B4C7E" stroke-width="2"/><text x="250" y="300" text-anchor="middle" font-size="11" fill="#1a1a1a" font-family="Arial" font-weight="bold">Shift = квадрат, круг</text><defs><marker id="arrowH" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#1a1a1a"/></marker></defs>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
</svg>