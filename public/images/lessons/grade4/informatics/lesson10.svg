<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Поиск информации</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Безопасный интернет</text>
  <!-- Illustration area -->
  <circle cx="230" cy="185" r="45" fill="none" stroke="#2B4C7E" stroke-width="5"/><circle cx="230" cy="185" r="45" fill="#2B4C7E" opacity="0.08"/><line x1="263" y1="218" x2="310" y2="265" stroke="#2B4C7E" stroke-width="8" stroke-linecap="round"/><rect x="195" y="140" width="50" height="65" rx="2" fill="#fff" stroke="#ccc" stroke-width="1" opacity="0.8"/><line x1="203" y1="155" x2="237" y2="155" stroke="#aaa" stroke-width="2"/><line x1="203" y1="165" x2="230" y2="165" stroke="#aaa" stroke-width="2"/><line x1="203" y1="175" x2="233" y2="175" stroke="#aaa" stroke-width="2"/><line x1="203" y1="185" x2="228" y2="185" stroke="#aaa" stroke-width="2"/><!-- Search bar --><rect x="140" y="100" width="220" height="25" rx="12" fill="#fff" stroke="#999" stroke-width="1.5"/><text x="165" y="117" font-size="11" fill="#aaa" font-family="Arial">ключевые слова...</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
</svg>