<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <!-- Background -->
  <rect width="500" height="350" fill="#F5E6C8"/>
  <!-- Top red accent bar -->
  <rect width="500" height="8" fill="#C41E3A"/>
  <!-- Thin gold line under accent -->
  <rect y="8" width="500" height="2" fill="#D4A843"/>
  <!-- Title -->
  <text x="250" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="#1a1a1a">Специальные клавиши</text>
  <!-- Subtitle -->
  <text x="250" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#D4A843">Работа с клавиатурой</text>
  <!-- Illustration area -->
  <rect x="130" y="130" width="70" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="2"/><text x="165" y="153" text-anchor="middle" font-size="11" fill="{CREAM}" font-family="Arial" font-weight="bold">Shift</text><rect x="220" y="130" width="70" height="36" rx="5" fill="#2B4C7E" stroke="#555" stroke-width="2"/><text x="255" y="153" text-anchor="middle" font-size="11" fill="{CREAM}" font-family="Arial" font-weight="bold">Ctrl</text><rect x="310" y="130" width="70" height="36" rx="5" fill="#1a1a1a" stroke="#555" stroke-width="2"/><text x="345" y="153" text-anchor="middle" font-size="11" fill="{CREAM}" font-family="Arial" font-weight="bold">Alt</text><rect x="170" y="185" width="160" height="36" rx="5" fill="#888" stroke="#666" stroke-width="2"/><text x="250" y="208" text-anchor="middle" font-size="11" fill="{CREAM}" font-family="Arial" font-weight="bold">Space / Пробел</text><!-- Arrows cluster --><polygon points="250,240 260,255 240,255" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/><polygon points="220,265 235,255 235,275" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/><polygon points="280,265 265,255 265,275" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/><polygon points="250,290 260,275 240,275" fill="#C41E3A" stroke="#1a1a1a" stroke-width="1.5"/><text x="250" y="305" text-anchor="middle" font-size="10" fill="#C41E3A" font-family="Arial">Ctrl+C  Ctrl+V  Ctrl+Z</text>
  <!-- Bottom dark bar -->
  <rect y="315" width="500" height="35" fill="#1a1a1a"/>
  <!-- Gold line above bottom bar -->
  <rect y="313" width="500" height="2" fill="#D4A843"/>
  <!-- Subject name -->
  <text x="250" y="337" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="#F5E6C8">Информатика</text>
</svg>