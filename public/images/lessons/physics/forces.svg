<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7c3aed">Силы в природе</text>
  
  <!-- Gravity Force Section -->
  <rect x="20" y="45" width="110" height="120" fill="#ede9fe" rx="8"/>
  <text x="75" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7c3aed">Сила тяжести</text>
  
  <!-- Ball -->
  <circle cx="75" cy="100" r="20" fill="#8b5cf6"/>
  <text x="75" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">m</text>
  
  <!-- Gravity arrow -->
  <line x1="75" y1="120" x2="75" y2="155" stroke="#dc2626" stroke-width="3"/>
  <polygon points="75,155 70,145 80,145" fill="#dc2626"/>
  <text x="85" y="145" font-family="Arial, sans-serif" font-size="11" fill="#dc2626">Fтяж</text>
  
  <!-- Formula -->
  <text x="75" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7c3aed">F = m · g</text>
  
  <!-- Friction Force Section -->
  <rect x="145" y="45" width="110" height="120" fill="#dcfce7" rx="8"/>
  <text x="200" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">Сила трения</text>
  
  <!-- Surface -->
  <rect x="155" y="120" width="90" height="8" fill="#64748b"/>
  
  <!-- Box -->
  <rect x="175" y="90" width="40" height="30" fill="#22c55e" rx="3"/>
  <text x="195" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">m</text>
  
  <!-- Friction arrow -->
  <line x1="175" y1="105" x2="155" y2="105" stroke="#dc2626" stroke-width="3"/>
  <polygon points="155,105 165,100 165,110" fill="#dc2626"/>
  <text x="145" y="108" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">Fтр</text>
  
  <!-- Motion arrow -->
  <line x1="215" y1="105" x2="235" y2="105" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="235,105 228,101 228,109" fill="#3b82f6"/>
  
  <!-- Formula -->
  <text x="200" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#16a34a">Fтр = μ · N</text>
  
  <!-- Elastic Force Section -->
  <rect x="270" y="45" width="110" height="120" fill="#fef3c7" rx="8"/>
  <text x="325" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#d97706">Сила упругости</text>
  
  <!-- Wall -->
  <rect x="280" y="85" width="10" height="50" fill="#64748b"/>
  
  <!-- Spring -->
  <path d="M 290 110 L 300 100 L 310 120 L 320 100 L 330 120 L 340 100 L 350 110" fill="none" stroke="#f59e0b" stroke-width="2"/>
  
  <!-- Box on spring -->
  <rect x="350" y="95" width="25" height="30" fill="#fbbf24" rx="3"/>
  
  <!-- Elastic force arrow -->
  <line x1="350" y1="110" x2="320" y2="110" stroke="#dc2626" stroke-width="3"/>
  <polygon points="320,110 330,105 330,115" fill="#dc2626"/>
  <text x="310" y="100" font-family="Arial, sans-serif" font-size="10" fill="#dc2626">Fупр</text>
  
  <!-- Formula -->
  <text x="325" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#d97706">Fупр = k · Δx</text>
  
  <!-- Bottom info -->
  <rect x="20" y="200" width="360" height="90" fill="#f1f5f9" rx="8"/>
  <text x="200" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#334155">Единица силы: Ньютон (Н)</text>
  
  <text x="60" y="245" font-family="Arial, sans-serif" font-size="12" fill="#475569">g ≈ 10 Н/кг</text>
  <text x="160" y="245" font-family="Arial, sans-serif" font-size="12" fill="#475569">k — жёсткость (Н/м)</text>
  <text x="280" y="245" font-family="Arial, sans-serif" font-size="12" fill="#475569">μ — коэф. трения</text>
  
  <text x="200" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Сила — векторная величина (имеет направление)</text>
</svg>