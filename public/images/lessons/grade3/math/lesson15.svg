<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math15" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFECB3;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color="#FFE082;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math15)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">🔢 Нумерация чисел до 1000</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF9800" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFCC80" opacity="0.5"/>
  
  <!-- Place value table -->
  <g transform="translate(50, 70)" font-family="Arial, sans-serif">
    <text x="200" y="0" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">Разряды числа 537</text>
    
    <g transform="translate(50, 20)">
      <!-- Headers -->
      <rect x="0" y="0" width="100" height="30" fill="#FFB74D" stroke="#F57C00"/>
      <text x="50" y="22" fill="#FFF" text-anchor="middle" font-weight="bold">Сотни</text>
      
      <rect x="100" y="0" width="100" height="30" fill="#FFCC80" stroke="#F57C00"/>
      <text x="150" y="22" fill="#E65100" text-anchor="middle" font-weight="bold">Десятки</text>
      
      <rect x="200" y="0" width="100" height="30" fill="#FFE0B2" stroke="#F57C00"/>
      <text x="250" y="22" fill="#E65100" text-anchor="middle" font-weight="bold">Единицы</text>
      
      <!-- Values -->
      <rect x="0" y="30" width="100" height="40" fill="#FFF8E1" stroke="#F57C00"/>
      <text x="50" y="58" fill="#E65100" text-anchor="middle" font-size="24" font-weight="bold">5</text>
      
      <rect x="100" y="30" width="100" height="40" fill="#FFF8E1" stroke="#F57C00"/>
      <text x="150" y="58" fill="#E65100" text-anchor="middle" font-size="24" font-weight="bold">3</text>
      
      <rect x="200" y="30" width="100" height="40" fill="#FFF8E1" stroke="#F57C00"/>
      <text x="250" y="58" fill="#E65100" text-anchor="middle" font-size="24" font-weight="bold">7</text>
    </g>
  </g>
  
  <!-- Number breakdown -->
  <g transform="translate(50, 180)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="50" fill="#E3F2FD" rx="8" stroke="#2196F3"/>
    <text x="200" y="22" font-size="13" fill="#0D47A1" text-anchor="middle">537 = 500 + 30 + 7</text>
    <text x="200" y="40" font-size="11" fill="#1565C0" text-anchor="middle">пятьсот тридцать семь</text>
  </g>
  
  <!-- Special numbers -->
  <g transform="translate(50, 250)" font-family="Arial, sans-serif" font-size="10">
    <rect x="0" y="0" width="75" height="35" fill="#FFECB3" rx="3"/>
    <text x="37" y="15" fill="#E65100" text-anchor="middle">100</text>
    <text x="37" y="28" fill="#F57C00" text-anchor="middle">сто</text>
    
    <rect x="85" y="0" width="75" height="35" fill="#FFECB3" rx="3"/>
    <text x="122" y="15" fill="#E65100" text-anchor="middle">200</text>
    <text x="122" y="28" fill="#F57C00" text-anchor="middle">двести</text>
    
    <rect x="170" y="0" width="75" height="35" fill="#FFECB3" rx="3"/>
    <text x="207" y="15" fill="#E65100" text-anchor="middle">500</text>
    <text x="207" y="28" fill="#F57C00" text-anchor="middle">пятьсот</text>
    
    <rect x="255" y="0" width="75" height="35" fill="#FFECB3" rx="3"/>
    <text x="292" y="15" fill="#E65100" text-anchor="middle">900</text>
    <text x="292" y="28" fill="#F57C00" text-anchor="middle">девятьсот</text>
    
    <rect x="340" y="0" width="75" height="35" fill="#C8E6C9" rx="3" stroke="#4CAF50"/>
    <text x="377" y="15" fill="#2E7D32" text-anchor="middle">1000</text>
    <text x="377" y="28" fill="#388E3C" text-anchor="middle">тысяча</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>