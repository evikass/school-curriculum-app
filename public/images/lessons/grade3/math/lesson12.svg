<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="math12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F8BBD9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#F48FB1;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#math12)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#AD1457" text-anchor="middle">📝 Составные задачи</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#E91E63" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#F48FB1" opacity="0.4"/>
  
  <!-- Problem -->
  <g transform="translate(50, 70)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="40" fill="#FCE4EC" rx="8" stroke="#E91E63"/>
    <text x="200" y="15" font-size="11" font-weight="bold" fill="#880E4F" text-anchor="middle">Задача</text>
    <text x="200" y="32" font-size="10" fill="#AD1457" text-anchor="middle">В 8 коробках по 6 кг конфет. Продали 23 кг. Сколько осталось?</text>
  </g>
  
  <!-- Solution steps -->
  <g transform="translate(50, 130)" font-family="Arial, sans-serif">
    <text x="200" y="0" font-size="12" font-weight="bold" fill="#AD1457" text-anchor="middle">Решение по шагам</text>
    
    <!-- Step 1 -->
    <g transform="translate(0, 20)">
      <circle cx="25" cy="15" r="15" fill="#E91E63"/>
      <text x="25" y="20" font-size="12" fill="#FFF" text-anchor="middle">1</text>
      <text x="50" y="12" font-size="10" fill="#880E4F">Сколько всего конфет?</text>
      <text x="50" y="26" font-size="11" fill="#AD1457">8 × 6 = 48 (кг)</text>
    </g>
    
    <!-- Step 2 -->
    <g transform="translate(0, 60)">
      <circle cx="25" cy="15" r="15" fill="#E91E63"/>
      <text x="25" y="20" font-size="12" fill="#FFF" text-anchor="middle">2</text>
      <text x="50" y="12" font-size="10" fill="#880E4F">Сколько осталось?</text>
      <text x="50" y="26" font-size="11" fill="#AD1457">48 - 23 = 25 (кг)</text>
    </g>
    
    <!-- Answer -->
    <g transform="translate(200, 40)">
      <rect x="0" y="0" width="150" height="50" fill="#C8E6C9" rx="5" stroke="#4CAF50"/>
      <text x="75" y="20" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Ответ:</text>
      <text x="75" y="38" font-size="11" fill="#388E3C" text-anchor="middle">25 кг конфет</text>
    </g>
  </g>
  
  <!-- Algorithm -->
  <g transform="translate(50, 270)">
    <rect x="0" y="0" width="400" height="40" fill="#FFF8E1" rx="5" stroke="#FFC107"/>
    <text x="200" y="15" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">💡 Алгоритм: 1) Прочитай задачу 2) Определи данные</text>
    <text x="200" y="30" font-family="Arial, sans-serif" font-size="9" fill="#F57C00" text-anchor="middle">3) Разбей на шаги 4) Реши каждый шаг 5) Запиши ответ</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>