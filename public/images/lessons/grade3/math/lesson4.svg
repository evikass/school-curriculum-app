<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="mathBg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#mathBg4)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#9C27B0" opacity="0.12"/>
  <circle cx="460" cy="295" r="40" fill="#9C27B0" opacity="0.1"/>
  
  <!-- Sun -->
  <circle cx="440" cy="50" r="22" fill="#FFD700" opacity="0.85">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="120" cy="45" rx="28" ry="16" fill="white"/>
    <ellipse cx="145" cy="40" rx="22" ry="13" fill="white"/>
  </g>
  
  <!-- Trees -->
  <g opacity="0.25">
    <ellipse cx="35" cy="280" rx="22" ry="35" fill="#228B22"/>
    <rect x="30" y="280" width="10" height="20" fill="#8B4513"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.5">
    <circle cx="40" cy="325" r="5" fill="#9C27B0"/>
    <circle cx="47" cy="320" r="4" fill="#BA68C8"/>
  </g>
  <g opacity="0.45">
    <circle cx="465" cy="325" r="5" fill="#7B1FA2"/>
    <circle cx="458" cy="320" r="4" fill="#AB47BC"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7B1FA2" text-anchor="middle">✖️ Умножение и деление</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#7B1FA2" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="60" width="440" height="255" rx="15" fill="white" opacity="0.9" stroke="#7B1FA2" stroke-width="2"/>
  
  <!-- Multiplication -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="190" height="100" rx="10" fill="#F3E5F5" stroke="#9C27B0"/>
    <text x="95" y="20" font-size="12" font-weight="bold" fill="#7B1FA2" text-anchor="middle">✖️ Умножение</text>
    
    <text x="95" y="45" font-size="14" fill="#333" text-anchor="middle">12 × 3 = ?</text>
    
    <g transform="translate(15, 55)">
      <text x="0" y="12" font-size="10" fill="#666">12 × 3 = 12 + 12 + 12</text>
      <text x="0" y="28" font-size="10" fill="#666">= 36</text>
      <text x="100" y="22" font-size="11" font-weight="bold" fill="#7B1FA2">Ответ: 36</text>
    </g>
  </g>
  
  <!-- Division -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="190" height="100" rx="10" fill="#E8EAF6" stroke="#3F51B5"/>
    <text x="95" y="20" font-size="12" font-weight="bold" fill="#303F9F" text-anchor="middle">➗ Деление</text>
    
    <text x="95" y="45" font-size="14" fill="#333" text-anchor="middle">36 ÷ 3 = ?</text>
    
    <g transform="translate(15, 55)">
      <text x="0" y="12" font-size="10" fill="#666">36 ÷ 3 = 12</text>
      <text x="0" y="28" font-size="10" fill="#666">(30 ÷ 3) + (6 ÷ 3)</text>
      <text x="100" y="22" font-size="11" font-weight="bold" fill="#303F9F">= 10 + 2 = 12</text>
    </g>
  </g>
  
  <!-- Multiplication table -->
  <rect x="50" y="195" width="400" height="80" rx="10" fill="#FCE4EC" stroke="#7B1FA2"/>
  <text x="250" y="215" font-size="11" font-weight="bold" fill="#7B1FA2" text-anchor="middle">🌟 Таблица умножения</text>
  
  <g transform="translate(60, 225)">
    <text x="0" y="12" font-size="9" fill="#333">2×1=2  2×2=4  2×3=6  2×4=8  2×5=10</text>
    <text x="0" y="26" font-size="9" fill="#333">3×1=3  3×2=6  3×3=9  3×4=12 3×5=15</text>
    <text x="0" y="40" font-size="9" fill="#333">4×1=4  4×2=8  4×3=12 4×4=16 4×5=20</text>
    <text x="210" y="12" font-size="9" fill="#333">5×1=5  5×2=10 5×3=15</text>
    <text x="210" y="26" font-size="9" fill="#333">6×1=6  6×2=12 6×3=18</text>
    <text x="210" y="40" font-size="9" fill="#333">Учи наизусть!</text>
  </g>
  
  <!-- Animated symbols -->
  <g transform="translate(250, 290)">
    <text font-size="18" fill="#7B1FA2" text-anchor="middle">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
      ✖️➗
    </text>
  </g>
  
  <!-- Pencil decoration -->
  <g transform="translate(55, 280)" opacity="0.5">
    <rect x="0" y="3" width="25" height="8" fill="#FFD700"/>
    <polygon points="25,3 25,11 32,7" fill="#333"/>
  </g>
</svg>