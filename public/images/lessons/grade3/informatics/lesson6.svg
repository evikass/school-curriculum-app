<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
    <linearGradient id="robot6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg6)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#004D40" text-anchor="middle">🤖 Исполнители</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#009688"/>
  
  <!-- Main Robot -->
  <g transform="translate(180, 70)">
    <!-- Head -->
    <rect x="30" y="0" width="80" height="60" fill="url(#robot6)" rx="10"/>
    <rect x="40" y="10" width="25" height="20" fill="#E0F2F1" rx="3">
      <animate attributeName="fill" values="#E0F2F1;#80CBC4;#E0F2F1" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="75" y="10" width="25" height="20" fill="#E0F2F1" rx="3">
      <animate attributeName="fill" values="#E0F2F1;#80CBC4;#E0F2F1" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="55" y="40" width="30" height="8" fill="#004D40" rx="2"/>
    
    <!-- Body -->
    <rect x="20" y="65" width="100" height="80" fill="url(#robot6)" rx="8"/>
    <rect x="35" y="75" width="70" height="30" fill="#004D40" rx="5"/>
    <circle cx="55" cy="90" r="8" fill="#4CAF50">
      <animate attributeName="fill" values="#4CAF50;#81C784;#4CAF50" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="90" r="8" fill="#F44336">
      <animate attributeName="fill" values="#F44336;#EF5350;#F44336" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Arms -->
    <rect x="0" y="70" width="15" height="50" fill="#00897B" rx="5"/>
    <rect x="125" y="70" width="15" height="50" fill="#00897B" rx="5"/>
    
    <!-- Legs -->
    <rect x="35" y="150" width="20" height="40" fill="#00897B" rx="5"/>
    <rect x="85" y="150" width="20" height="40" fill="#00897B" rx="5"/>
  </g>
  
  <!-- Commands panel -->
  <g transform="translate(20, 80)" font-family="Arial" font-size="10">
    <rect x="0" y="0" width="120" height="100" fill="#FFF" rx="8" stroke="#009688"/>
    <text x="60" y="18" fill="#00695C" text-anchor="middle" font-weight="bold">Команды:</text>
    
    <rect x="10" y="28" width="100" height="20" fill="#E0F2F1" rx="3">
      <animate attributeName="x" values="10;15;10" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="42" fill="#00796B" text-anchor="middle">вперёд</text>
    
    <rect x="10" y="52" width="100" height="20" fill="#E0F2F1" rx="3">
      <animate attributeName="x" values="10;15;10" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="66" fill="#00796B" text-anchor="middle">направо</text>
    
    <rect x="10" y="76" width="100" height="20" fill="#E0F2F1" rx="3">
      <animate attributeName="x" values="10;15;10" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="90" fill="#00796B" text-anchor="middle">налево</text>
  </g>
  
  <!-- Info box -->
  <g transform="translate(350, 80)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="130" height="80" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="65" y="18" fill="#F57F17" text-anchor="middle" font-weight="bold" font-size="10">Исполнитель —</text>
    <text x="65" y="35" fill="#FF8F00" text-anchor="middle">тот, кто</text>
    <text x="65" y="50" fill="#FF8F00" text-anchor="middle">выполняет</text>
    <text x="65" y="65" fill="#FFA000" text-anchor="middle">команды</text>
  </g>
  
  <!-- Grid for robot movement -->
  <g transform="translate(20, 200)">
    <rect x="0" y="0" width="200" height="120" fill="#FFF" rx="5" stroke="#BDBDBD"/>
    <!-- Grid lines -->
    <line x1="50" y1="0" x2="50" y2="120" stroke="#E0E0E0"/>
    <line x1="100" y1="0" x2="100" y2="120" stroke="#E0E0E0"/>
    <line x1="150" y1="0" x2="150" y2="120" stroke="#E0E0E0"/>
    <line x1="0" y1="40" x2="200" y2="40" stroke="#E0E0E0"/>
    <line x1="0" y1="80" x2="200" y2="80" stroke="#E0E0E0"/>
    
    <!-- Mini robot -->
    <g transform="translate(55, 45)">
      <rect x="0" y="0" width="30" height="30" fill="#26A69A" rx="5">
        <animate attributeName="x" values="0;50;50;0;0" dur="8s" repeatCount="indefinite"/>
      </rect>
      <circle cx="10" cy="10" r="4" fill="#FFF"/>
      <circle cx="20" cy="10" r="4" fill="#FFF"/>
    </g>
  </g>
  
  <!-- Examples -->
  <g transform="translate(240, 210)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="240" height="110" fill="#E8F5E9" rx="8" stroke="#4CAF50"/>
    <text x="120" y="18" fill="#2E7D32" text-anchor="middle" font-weight="bold" font-size="10">Примеры исполнителей:</text>
    
    <rect x="10" y="28" width="65" height="35" fill="#FFF" rx="5"/>
    <text x="42" y="40" text-anchor="middle">👤</text>
    <text x="42" y="55" text-anchor="middle" fill="#388E3C">Человек</text>
    
    <rect x="85" y="28" width="65" height="35" fill="#FFF" rx="5"/>
    <text x="117" y="40" text-anchor="middle">💻</text>
    <text x="117" y="55" text-anchor="middle" fill="#388E3C">Компьютер</text>
    
    <rect x="160" y="28" width="65" height="35" fill="#FFF" rx="5"/>
    <text x="192" y="40" text-anchor="middle">🤖</text>
    <text x="192" y="55" text-anchor="middle" fill="#388E3C">Робот</text>
    
    <text x="120" y="80" fill="#1B5E20" text-anchor="middle">СКИ — система команд</text>
    <text x="120" y="95" fill="#2E7D32" text-anchor="middle">исполнителя</text>
  </g>
</svg>