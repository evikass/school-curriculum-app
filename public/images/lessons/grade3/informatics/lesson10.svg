<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="toolbar10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg10)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1" text-anchor="middle">📝 Текстовый редактор</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#1976D2"/>
  
  <!-- Text editor window -->
  <g transform="translate(50, 70)">
    <!-- Window frame -->
    <rect x="0" y="0" width="400" height="230" fill="#FFF" rx="8" stroke="#90CAF9" stroke-width="2"/>
    
    <!-- Title bar -->
    <rect x="0" y="0" width="400" height="30" fill="url(#toolbar10)" rx="8"/>
    <rect x="0" y="20" width="400" height="10" fill="url(#toolbar10)"/>
    
    <circle cx="15" cy="15" r="6" fill="#EF5350"/>
    <circle cx="35" cy="15" r="6" fill="#FFEB3B"/>
    <circle cx="55" cy="15" r="6" fill="#4CAF50"/>
    
    <text x="200" y="20" font-family="Arial" font-size="11" fill="#FFF" text-anchor="middle">Документ.txt</text>
    
    <!-- Toolbar -->
    <rect x="0" y="30" width="400" height="35" fill="#E3F2FD"/>
    <line x1="0" y1="65" x2="400" y2="65" stroke="#90CAF9"/>
    
    <!-- Format buttons -->
    <rect x="10" y="38" width="30" height="20" fill="#BBDEFB" rx="3"/>
    <text x="25" y="52" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">B</text>
    
    <rect x="45" y="38" width="30" height="20" fill="#BBDEFB" rx="3"/>
    <text x="60" y="52" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle" font-style="italic">I</text>
    
    <rect x="80" y="38" width="30" height="20" fill="#BBDEFB" rx="3"/>
    <text x="95" y="52" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle" text-decoration="underline">U</text>
    
    <!-- Font size -->
    <rect x="120" y="38" width="50" height="20" fill="#FFF" rx="3" stroke="#90CAF9"/>
    <text x="145" y="52" font-family="Arial" font-size="9" fill="#1976D2" text-anchor="middle">14 pt</text>
    
    <!-- Alignment -->
    <rect x="180" y="38" width="25" height="20" fill="#BBDEFB" rx="3"/>
    <line x1="185" y1="44" x2="200" y2="44" stroke="#1565C0" stroke-width="2"/>
    <line x1="185" y1="48" x2="197" y2="48" stroke="#1565C0" stroke-width="2"/>
    <line x1="185" y1="52" x2="200" y2="52" stroke="#1565C0" stroke-width="2"/>
    
    <rect x="210" y="38" width="25" height="20" fill="#BBDEFB" rx="3"/>
    <line x1="215" y1="44" x2="230" y2="44" stroke="#1565C0" stroke-width="2"/>
    <line x1="217" y1="48" x2="228" y2="48" stroke="#1565C0" stroke-width="2"/>
    <line x1="215" y1="52" x2="230" y2="52" stroke="#1565C0" stroke-width="2"/>
    
    <!-- Text content area -->
    <rect x="5" y="70" width="390" height="155" fill="#FFF"/>
    
    <!-- Sample text -->
    <text x="15" y="95" font-family="Arial" font-size="12" fill="#333">Заголовок документа</text>
    <text x="15" y="115" font-family="Arial" font-size="10" fill="#666">Это пример текста, который можно</text>
    <text x="15" y="130" font-family="Arial" font-size="10" fill="#666">редактировать в текстовом редакторе.</text>
    
    <text x="15" y="155" font-family="Arial" font-size="10" fill="#333">Возможности:</text>
    <text x="15" y="170" font-family="Arial" font-size="9" fill="#1976D2">• Создание и редактирование текста</text>
    <text x="15" y="185" font-family="Arial" font-size="9" fill="#1976D2">• Форматирование: шрифт, размер, цвет</text>
    <text x="15" y="200" font-family="Arial" font-size="9" fill="#1976D2">• Сохранение в файл</text>
    
    <!-- Cursor -->
    <rect x="230" y="105" width="2" height="12" fill="#1976D2">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Info panels -->
  <g transform="translate(20, 310)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="140" height="30" fill="#FFF8E1" rx="5" stroke="#FFA000"/>
    <text x="70" y="12" fill="#E65100" text-anchor="middle" font-weight="bold">Форматирование:</text>
    <text x="70" y="25" fill="#F57C00" text-anchor="middle">изменение вида текста</text>
  </g>
  
  <g transform="translate(180, 310)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="140" height="30" fill="#E8F5E9" rx="5" stroke="#4CAF50"/>
    <text x="70" y="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Шрифт:</text>
    <text x="70" y="25" fill="#388E3C" text-anchor="middle">стиль букв и цифр</text>
  </g>
  
  <g transform="translate(340, 310)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="140" height="30" fill="#F3E5F5" rx="5" stroke="#9C27B0"/>
    <text x="70" y="12" fill="#6A1B9A" text-anchor="middle" font-weight="bold">.txt .doc .odt</text>
    <text x="70" y="25" fill="#7B1FA2" text-anchor="middle">форматы файлов</text>
  </g>
</svg>