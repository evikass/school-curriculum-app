<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="info1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color="#BBDEFB;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#info1)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0" text-anchor="middle">💻 Информация вокруг нас</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#2196F3" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#90CAF9" opacity="0.5"/>
  
  <!-- Computer -->
  <g transform="translate(150, 80)">
    <!-- Monitor -->
    <rect x="0" y="0" width="200" height="130" fill="#37474F" rx="10"/>
    <rect x="10" y="10" width="180" height="100" fill="#E3F2FD"/>
    
    <!-- Screen content -->
    <rect x="20" y="20" width="160" height="80" fill="#FFF"/>
    <rect x="30" y="30" width="60" height="30" fill="#4CAF50" rx="3"/>
    <rect x="100" y="30" width="60" height="30" fill="#2196F3" rx="3"/>
    <rect x="30" y="70" width="130" height="20" fill="#E0E0E0" rx="2"/>
    
    <!-- Stand -->
    <rect x="80" y="130" width="40" height="20" fill="#546E7A"/>
    <rect x="60" y="150" width="80" height="8" fill="#455A64" rx="2"/>
  </g>
  
  <!-- Info types -->
  <g transform="translate(30, 250)" font-family="Arial, sans-serif" font-size="10">
    <rect x="0" y="0" width="100" height="45" fill="#C8E6C9" rx="5"/>
    <text x="50" y="18" fill="#2E7D32" text-anchor="middle" font-weight="bold">Текст</text>
    <text x="50" y="32" fill="#388E3C" text-anchor="middle">книги, статьи</text>
    
    <rect x="115" y="0" width="100" height="45" fill="#FFECB3" rx="5"/>
    <text x="165" y="18" fill="#E65100" text-anchor="middle" font-weight="bold">Звук</text>
    <text x="165" y="32" fill="#F57C00" text-anchor="middle">речь, музыка</text>
    
    <rect x="230" y="0" width="100" height="45" fill="#BBDEFB" rx="5"/>
    <text x="280" y="18" fill="#0D47A1" text-anchor="middle" font-weight="bold">Изображение</text>
    <text x="280" y="32" fill="#1565C0" text-anchor="middle">фото, рисунки</text>
    
    <rect x="345" y="0" width="100" height="45" fill="#F8BBD9" rx="5"/>
    <text x="395" y="18" fill="#AD1457" text-anchor="middle" font-weight="bold">Видео</text>
    <text x="395" y="32" fill="#C2185B" text-anchor="middle">фильмы, клипы</text>
  </g>
  
  <!-- Info -->
  <g transform="translate(380, 100)">
    <rect x="0" y="0" width="90" height="60" fill="#E8F5E9" rx="8" stroke="#4CAF50"/>
    <text x="45" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Информация</text>
    <text x="45" y="38" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">— это знания</text>
    <text x="45" y="52" font-family="Arial, sans-serif" font-size="9" fill="#388E3C" text-anchor="middle">и данные</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>