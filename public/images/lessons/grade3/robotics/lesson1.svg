<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="robot1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CFD8DC;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color="#B0BEC5;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#robot1)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#37474F" text-anchor="middle">🤖 Что такое робот?</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#607D8B" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#B0BEC5" opacity="0.4"/>
  
  <!-- Robot -->
  <g transform="translate(180, 80)">
    <!-- Head -->
    <rect x="20" y="0" width="80" height="60" fill="#78909C" rx="10"/>
    <rect x="30" y="15" width="25" height="15" fill="#4FC3F7" rx="3">
      <animate attributeName="fill" values="#4FC3F7;#81D4FA;#4FC3F7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="65" y="15" width="25" height="15" fill="#4FC3F7" rx="3">
      <animate attributeName="fill" values="#81D4FA;#4FC3F7;#81D4FA" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="50" y="40" width="20" height="10" fill="#455A64"/>
    
    <!-- Body -->
    <rect x="15" y="65" width="90" height="70" fill="#607D8B" rx="5"/>
    <circle cx="40" cy="90" r="10" fill="#FF5722">
      <animate attributeName="fill" values="#FF5722;#FF7043;#FF5722" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="90" r="10" fill="#4CAF50"/>
    <rect x="30" y="110" width="60" height="15" fill="#455A64" rx="2"/>
    
    <!-- Arms -->
    <rect x="-10" y="70" width="20" height="50" fill="#78909C" rx="5"/>
    <rect x="110" y="70" width="20" height="50" fill="#78909C" rx="5"/>
    
    <!-- Legs -->
    <rect x="25" y="140" width="25" height="40" fill="#607D8B" rx="5"/>
    <rect x="70" y="140" width="25" height="40" fill="#607D8B" rx="5"/>
  </g>
  
  <!-- Info -->
  <g transform="translate(50, 250)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="55" fill="#ECEFF1" rx="8" stroke="#607D8B"/>
    <text x="200" y="20" font-size="11" font-weight="bold" fill="#37474F" text-anchor="middle">Робот — это машина, которая выполняет команды</text>
    <text x="200" y="38" font-size="10" fill="#546E7A" text-anchor="middle">Роботы помогают людям: собирают автомобили,</text>
    <text x="200" y="50" font-size="9" fill="#607D8B" text-anchor="middle">исследуют космос, выполняют опасную работу</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>