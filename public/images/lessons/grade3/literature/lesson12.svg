<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFECB3;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FFE082;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit12)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">👠 Шарль Перро</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF9800" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFCC80" opacity="0.5"/>
  
  <!-- Cinderella scene -->
  <g transform="translate(50, 80)">
    <!-- Castle -->
    <rect x="280" y="30" width="100" height="100" fill="#FFCC80" stroke="#F57C00" stroke-width="2"/>
    <polygon points="280,30 330,-10 380,30" fill="#FFB74D"/>
    <rect x="290" y="100" width="30" height="30" fill="#8D6E63"/>
    
    <!-- Pumpkin carriage -->
    <ellipse cx="100" cy="100" rx="50" ry="35" fill="#FF7043"/>
    <circle cx="60" cy="120" r="15" fill="#5D4037"/>
    <circle cx="140" cy="120" r="15" fill="#5D4037"/>
    <ellipse cx="100" cy="80" rx="30" ry="20" fill="#FFB74D"/>
    
    <!-- Glass slipper -->
    <g transform="translate(180, 100)">
      <ellipse cx="20" cy="15" rx="15" ry="8" fill="#B3E5FC" stroke="#03A9F4"/>
      <path d="M5,15 Q20,0 35,15" fill="none" stroke="#81D4FA" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Info -->
  <g transform="translate(50, 210)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="90" fill="#FFF3E0" rx="8" stroke="#FF9800"/>
    <text x="200" y="20" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Французские сказки</text>
    <text x="200" y="38" font-size="10" fill="#F57C00" text-anchor="middle">«Золушка» • «Красная Шапочка» • «Спящая красавица»</text>
    <text x="200" y="53" font-size="10" fill="#FF9800" text-anchor="middle">«Кот в сапогах» • «Мальчик-с-пальчик»</text>
    <text x="200" y="73" font-size="9" fill="#FFB74D" text-anchor="middle">Переведены на все языки мира!</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>