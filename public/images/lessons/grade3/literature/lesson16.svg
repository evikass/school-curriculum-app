<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit16" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D5F5E3;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ABEBC6;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="medal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F1C40F"/>
      <stop offset="100%" style="stop-color:#D4AC0D"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D03F"/>
      <stop offset="100%" style="stop-color:#D4AC0D"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit16)"/>
  <rect width="500" height="350" fill="#EAFAF1" opacity="0.3"/>
  
  <!-- Confetti -->
  <g>
    <rect x="50" y="60" width="8" height="8" fill="#E74C3C" transform="rotate(45 50 60)">
      <animate attributeName="y" values="60;320;60" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="40" width="6" height="6" fill="#3498DB" transform="rotate(30 150 40)">
      <animate attributeName="y" values="40;340;40" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <rect x="350" y="50" width="7" height="7" fill="#9B59B6" transform="rotate(60 350 50)">
      <animate attributeName="y" values="50;330;50" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="450" y="45" width="5" height="5" fill="#2ECC71" transform="rotate(15 450 45)">
      <animate attributeName="y" values="45;335;45" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="3.5s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Sun -->
  <circle cx="250" cy="55" r="30" fill="#F1C40F" opacity="0.9">
    <animate attributeName="r" values="28;33;28" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="105" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1E8449" text-anchor="middle">🏆 Итоговый урок</text>
  <rect x="100" y="112" width="300" height="2" rx="1" fill="#27AE60" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="270" ry="50" fill="#82E0AA" opacity="0.5"/>
  
  <!-- Trophy -->
  <g transform="translate(200, 130)">
    <ellipse cx="50" cy="70" rx="25" ry="8" fill="#B7950B"/>
    <rect x="40" y="50" width="20" height="20" fill="#D4AC0D"/>
    <path d="M20,0 L20,30 Q20,50 50,50 Q80,50 80,30 L80,0 Z" fill="url(#trophy)"/>
    <ellipse cx="50" cy="5" rx="30" ry="10" fill="#F4D03F"/>
    <!-- Handles -->
    <path d="M20,10 Q0,10 0,25 Q0,40 20,35" fill="none" stroke="#D4AC0D" stroke-width="5"/>
    <path d="M80,10 Q100,10 100,25 Q100,40 80,35" fill="none" stroke="#D4AC0D" stroke-width="5"/>
    <!-- Star on trophy -->
    <polygon points="50,20 53,28 62,28 55,33 58,42 50,37 42,42 45,33 38,28 47,28" fill="#E74C3C">
      <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Books stack -->
  <g transform="translate(50, 200)">
    <rect x="0" y="40" width="60" height="12" fill="#E74C3C" rx="2">
      <animate attributeName="y" values="40;38;40" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="5" y="28" width="55" height="12" fill="#3498DB" rx="2">
      <animate attributeName="y" values="28;26;28" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="2" y="16" width="50" height="12" fill="#9B59B6" rx="2">
      <animate attributeName="y" values="16;14;16" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="4" width="45" height="12" fill="#2ECC71" rx="2">
      <animate attributeName="y" values="4;2;4" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="70" font-size="9" fill="#1E8449" text-anchor="middle">Прочитано!</text>
  </g>
  
  <!-- Books stack 2 -->
  <g transform="translate(390, 200)">
    <rect x="0" y="40" width="60" height="12" fill="#F39C12" rx="2">
      <animate attributeName="y" values="40;38;40" dur="2.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="5" y="28" width="55" height="12" fill="#1ABC9C" rx="2">
      <animate attributeName="y" values="28;26;28" dur="1.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="2" y="16" width="50" height="12" fill="#E91E63" rx="2">
      <animate attributeName="y" values="16;14;16" dur="2.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="8" y="4" width="45" height="12" fill="#5DADE2" rx="2">
      <animate attributeName="y" values="4;2;4" dur="2.1s" repeatCount="indefinite"/>
    </rect>
    <text x="30" y="70" font-size="9" fill="#1E8449" text-anchor="middle">Изучено!</text>
  </g>
  
  <!-- Checkmarks -->
  <g transform="translate(140, 200)">
    <circle cx="20" cy="20" r="18" fill="#27AE60">
      <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
    </circle>
    <path d="M10,20 L17,27 L30,13" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round"/>
    <text x="20" y="55" font-size="8" fill="#1E8449" text-anchor="middle">Сказки</text>
  </g>
  
  <g transform="translate(320, 200)">
    <circle cx="20" cy="20" r="18" fill="#27AE60">
      <animate attributeName="r" values="18;20;18" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <path d="M10,20 L17,27 L30,13" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round"/>
    <text x="20" y="55" font-size="8" fill="#1E8449" text-anchor="middle">Поэзия</text>
  </g>
  
  <!-- Diploma -->
  <g transform="translate(130, 130)">
    <rect x="0" y="0" width="50" height="40" fill="#FDFEFE" stroke="#D4AC0D" stroke-width="2" rx="3"/>
    <line x1="5" y1="12" x2="45" y2="12" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="5" y1="18" x2="40" y2="18" stroke="#E8E8E8" stroke-width="1"/>
    <line x1="5" y1="24" x2="35" y2="24" stroke="#E8E8E8" stroke-width="1"/>
    <!-- Ribbon -->
    <polygon points="40,5 55,0 55,45 40,40" fill="#E74C3C"/>
    <polygon points="50,0 65,5 65,40 50,45" fill="#C0392B"/>
    <!-- Seal -->
    <circle cx="50" cy="25" r="10" fill="url(#medal)">
      <animate attributeName="r" values="10;11;10" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Info -->
  <g transform="translate(30, 270)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="50" fill="#D4EFDF" rx="8" stroke="#27AE60"/>
    <text x="220" y="20" font-size="12" font-weight="bold" fill="#1E8449" text-anchor="middle">🎉 Поздравляем с завершением курса!</text>
    <text x="220" y="38" font-size="10" fill="#27AE60" text-anchor="middle">Ты научился любить и понимать литературу!</text>
  </g>
</svg>