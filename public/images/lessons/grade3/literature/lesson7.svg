<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DCEDC8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color="#C5E1A5;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit7)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#33691E" text-anchor="middle">📖 Л.Н. Толстой</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#7CB342" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#C5E1A5" opacity="0.5"/>
  
  <!-- Portrait and info -->
  <g transform="translate(50, 80)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="150" height="130" fill="#F1F8E9" rx="10" stroke="#7CB342"/>
    <circle cx="75" cy="45" r="30" fill="#FFCCBC"/>
    <rect x="45" y="0" width="60" height="25" fill="#795548" rx="3"/>
    <rect x="50" y="80" width="50" height="40" fill="#37474F" rx="3"/>
    <text x="75" y="145" font-size="10" fill="#33691E" text-anchor="middle">1828-1910</text>
  </g>
  
  <!-- Works -->
  <g transform="translate(220, 80)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="220" height="130" fill="#E8F5E9" rx="10" stroke="#4CAF50"/>
    <text x="110" y="25" font-size="12" font-weight="bold" fill="#1B5E20" text-anchor="middle">Писатель и педагог</text>
    <text x="110" y="50" font-size="10" fill="#2E7D32" text-anchor="middle">Открыл школу для крестьянских детей</text>
    <text x="110" y="75" font-size="9" fill="#388E3C" text-anchor="middle">Рассказы для детей:</text>
    <text x="110" y="95" font-size="9" fill="#43A047" text-anchor="middle">• «Филипок»</text>
    <text x="110" y="110" font-size="9" fill="#43A047" text-anchor="middle">• «Котёнок» • «Акула»</text>
    <text x="110" y="125" font-size="9" fill="#43A047" text-anchor="middle">• «Лев и собачка»</text>
  </g>
  
  <!-- Filipok story -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="400" height="70" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">«Филипок» — о мальчике, который хотел учиться</text>
    <text x="200" y="40" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">Учит: учиться — важно и интересно</text>
    <text x="200" y="55" font-family="Arial, sans-serif" font-size="9" fill="#FF9800" text-anchor="middle">Настойчивость и смелость помогают достичь цели</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>