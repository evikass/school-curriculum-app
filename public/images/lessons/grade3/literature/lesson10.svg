<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B3E5FC;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#81D4FA;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit10)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#01579B" text-anchor="middle">🦢 Ганс Христиан Андерсен</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#03A9F4" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#81D4FA" opacity="0.5"/>
  
  <!-- Swan and duckling -->
  <g transform="translate(50, 80)">
    <!-- Water -->
    <ellipse cx="200" cy="120" rx="180" ry="30" fill="#4FC3F7" opacity="0.5"/>
    
    <!-- Ugly duckling becoming swan -->
    <g transform="translate(100, 70)">
      <!-- Duckling (left) -->
      <ellipse cx="30" cy="40" rx="20" ry="15" fill="#A1887F"/>
      <circle cx="15" cy="30" r="12" fill="#A1887F"/>
      <polygon points="5,30 -5,35 5,38" fill="#FF9800"/>
      <text x="30" y="70" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" text-anchor="middle">гадкий</text>
    </g>
    
    <!-- Arrow -->
    <path d="M180,95 L230,95" stroke="#1565C0" stroke-width="3" fill="none"/>
    <polygon points="230,95 220,90 220,100" fill="#1565C0"/>
    
    <!-- Swan (right) -->
    <g transform="translate(250, 50)">
      <ellipse cx="40" cy="50" rx="30" ry="20" fill="#FFF"/>
      <ellipse cx="15" cy="35" rx="15" ry="18" fill="#FFF"/>
      <polygon points="0,35 -10,40 0,45" fill="#FF9800"/>
      <circle cx="8" cy="30" r="2" fill="#333"/>
      <!-- Wing -->
      <ellipse cx="55" cy="40" rx="20" ry="10" fill="#FFF" stroke="#90CAF9"/>
      <text x="40" y="85" font-family="Arial, sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle">лебедь</text>
    </g>
  </g>
  
  <!-- Tale info -->
  <g transform="translate(50, 210)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="90" fill="#E1F5FE" rx="8" stroke="#03A9F4"/>
    <text x="200" y="20" font-size="11" font-weight="bold" fill="#01579B" text-anchor="middle">«Гадкий утёнок»</text>
    <text x="200" y="40" font-size="10" fill="#0277BD" text-anchor="middle">Не важно, как ты выглядишь сейчас —</text>
    <text x="200" y="55" font-size="10" fill="#0277BD" text-anchor="middle">важно, какой ты внутри и кем станешь!</text>
    <text x="200" y="75" font-size="9" fill="#0288D1" text-anchor="middle">Другие сказки: «Русалочка» • «Снежная королева» • «Дюймовочка»</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>