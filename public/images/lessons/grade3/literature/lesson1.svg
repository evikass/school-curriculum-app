<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCCBC;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FFAB91;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit1)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="60" r="30" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="28;32;28" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#BF360C" text-anchor="middle">🏰 Русские народные сказки</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF7043" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#A5D6A7" opacity="0.6"/>
  
  <!-- Far forest -->
  <g opacity="0.4">
    <polygon points="20,180 50,110 80,180" fill="#2E7D32"/>
    <polygon points="70,185 110,100 150,185" fill="#388E3C"/>
    <polygon points="350,180 390,105 430,180" fill="#2E7D32"/>
    <polygon points="420,185 460,115 500,185" fill="#388E3C"/>
  </g>
  
  <!-- Near forest left -->
  <g>
    <polygon points="0,280 35,160 70,280" fill="#43A047"/>
    <polygon points="50,290 100,150 150,290" fill="#2E7D32"/>
    <rect x="30" y="280" width="10" height="30" fill="#795548"/>
    <rect x="90" y="290" width="12" height="25" fill="#795548"/>
  </g>
  
  <!-- Near forest right -->
  <g>
    <polygon points="360,285 400,155 440,285" fill="#43A047"/>
    <polygon points="430,280 470,165 510,280" fill="#2E7D32"/>
    <rect x="390" y="285" width="10" height="28" fill="#795548"/>
    <rect x="460" y="280" width="12" height="30" fill="#795548"/>
  </g>
  
  <!-- Castle in center -->
  <g transform="translate(250, 200)">
    <rect x="-35" y="-15" width="70" height="50" fill="#FFCC80" stroke="#E65100" stroke-width="2"/>
    <polygon points="-45,-15 0,-50 45,-15" fill="#FF8A65" stroke="#E65100" stroke-width="1"/>
    <rect x="-45" y="-50" width="12" height="40" fill="#FFAB91"/>
    <rect x="33" y="-50" width="12" height="40" fill="#FFAB91"/>
    <polygon points="-45,-50 -39,-62 -33,-50" fill="#EF5350"/>
    <polygon points="33,-50 39,-62 45,-50" fill="#EF5350"/>
    <rect x="-8" y="5" width="16" height="25" fill="#5D4037" rx="8"/>
    <circle cx="0" cy="12" r="3" fill="#FFD54F"/>
    <rect x="-25" y="-5" width="12" height="15" fill="#81D4FA" opacity="0.7"/>
    <rect x="13" y="-5" width="12" height="15" fill="#81D4FA" opacity="0.7"/>
    <animateTransform attributeName="transform" type="translate" values="250,200;250,195;250,200" dur="4s" repeatCount="indefinite"/>
  </g>
  
  <!-- Path -->
  <path d="M250,350 Q220,320 200,300 Q180,280 250,260" fill="none" stroke="#BCAAA4" stroke-width="20" opacity="0.4"/>
  <path d="M250,350 Q280,320 300,300 Q320,280 250,260" fill="none" stroke="#BCAAA4" stroke-width="20" opacity="0.4"/>
  
  <!-- Flowers -->
  <g>
    <circle cx="170" cy="290" r="5" fill="#E91E63"/>
    <circle cx="180" cy="295" r="4" fill="#F48FB1"/>
    <circle cx="320" cy="288" r="5" fill="#E91E63"/>
    <circle cx="335" cy="293" r="4" fill="#F48FB1"/>
  </g>
  
  <!-- Magical sparkles -->
  <circle cx="200" cy="150" r="3" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="160" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="230" cy="140" r="2" fill="#E91E63">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  <circle cx="270" cy="145" r="2" fill="#E91E63">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.9s"/>
  </circle>
  
  <!-- Birds -->
  <g opacity="0.6">
    <path d="M150,80 Q155,75 160,80" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M320,70 Q325,65 330,70" fill="none" stroke="#333" stroke-width="2"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;30,3;0,0" dur="6s" repeatCount="indefinite"/>
  </g>
  
  <!-- Clouds -->
  <g opacity="0.5">
    <ellipse cx="80" cy="50" rx="25" ry="12" fill="#FFF"/>
    <ellipse cx="60" cy="55" rx="18" ry="10" fill="#FFF"/>
    <ellipse cx="100" cy="55" rx="15" ry="8" fill="#FFF"/>
  </g>
</svg>