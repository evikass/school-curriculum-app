<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFECB3;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color="#FFE082;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit4)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">📚 Пословицы и поговорки</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#FF9800" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFCC80" opacity="0.5"/>
  
  <!-- Book icon -->
  <g transform="translate(180, 80)">
    <rect x="0" y="0" width="140" height="100" fill="#8D6E63" rx="5"/>
    <rect x="10" y="5" width="55" height="90" fill="#FFF8E1"/>
    <rect x="75" y="5" width="55" height="90" fill="#FFFDE7"/>
    <line x1="70" y1="5" x2="70" y2="95" stroke="#5D4037" stroke-width="2"/>
  </g>
  
  <!-- Proverbs examples -->
  <g transform="translate(30, 200)" font-family="Arial, sans-serif" font-size="10">
    <rect x="0" y="0" width="210" height="35" fill="#FFECB3" rx="5"/>
    <text x="105" y="15" fill="#E65100" text-anchor="middle" font-weight="bold">О труде:</text>
    <text x="105" y="28" fill="#F57C00" text-anchor="middle">«Терпение и труд всё перетрут»</text>
    
    <rect x="230" y="0" width="210" height="35" fill="#FFECB3" rx="5"/>
    <text x="335" y="15" fill="#E65100" text-anchor="middle" font-weight="bold">О дружбе:</text>
    <text x="335" y="28" fill="#F57C00" text-anchor="middle">«Друг познаётся в беде»</text>
    
    <rect x="115" y="45" width="210" height="35" fill="#FFECB3" rx="5"/>
    <text x="220" y="60" fill="#E65100" text-anchor="middle" font-weight="bold">О знаниях:</text>
    <text x="220" y="73" fill="#F57C00" text-anchor="middle">«Ученье — свет, а неученье — тьма»</text>
  </g>
  
  <!-- Explanation -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="120" height="50" fill="#E3F2FD" rx="5" stroke="#2196F3"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle" font-weight="bold">Пословица</text>
    <text x="60" y="35" font-family="Arial, sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">законченное</text>
    <text x="60" y="46" font-family="Arial, sans-serif" font-size="9" fill="#1565C0" text-anchor="middle">предложение</text>
    
    <rect x="350" y="0" width="120" height="50" fill="#C8E6C9" rx="5" stroke="#4CAF50"/>
    <text x="410" y="20" font-family="Arial, sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Поговорка</text>
    <text x="410" y="35" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">незаконченная</text>
    <text x="410" y="46" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle">фраза</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="250" cy="130" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>