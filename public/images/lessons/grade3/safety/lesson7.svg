<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="elec7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bolt7" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEB3B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFC107;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#elec7)"/>
  
  <!-- Title -->
  <rect x="120" y="10" width="260" height="45" rx="10" fill="#FFF" stroke="#2196F3" stroke-width="2"/>
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0D47A1" text-anchor="middle">⚡ Электричество</text>
  
  <!-- Large lightning bolt -->
  <g transform="translate(200, 80)">
    <polygon points="50,0 30,50 45,50 25,100 70,40 50,40 70,0" fill="url(#bolt7)" stroke="#FF8F00" stroke-width="2">
      <animate attributeName="opacity" values="1;0.6;1" dur="0.3s" repeatCount="indefinite"/>
    </polygon>
    <!-- Glow effect -->
    <polygon points="50,0 30,50 45,50 25,100 70,40 50,40 70,0" fill="#FFF" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.1;0.3" dur="0.3s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Electrical outlet with prohibition -->
  <g transform="translate(30, 150)">
    <rect x="0" y="0" width="100" height="130" fill="#FFEBEE" rx="10" stroke="#E53935" stroke-width="2"/>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">РОЗЕТКА</text>
    
    <!-- Outlet -->
    <rect x="20" y="35" width="60" height="50" fill="#FFF" stroke="#333" stroke-width="2" rx="5"/>
    <circle cx="35" cy="55" r="6" fill="#333"/>
    <circle cx="65" cy="55" r="6" fill="#333"/>
    <rect x="45" y="68" width="10" height="8" fill="#333" rx="2"/>
    
    <!-- Hand reaching -->
    <g>
      <animate attributeName="transform" values="translate(0,0);translate(0,-10);translate(0,0)" dur="1s" repeatCount="indefinite"/>
      <ellipse cx="50" cy="100" rx="20" ry="15" fill="#FFCC80"/>
      <rect x="40" y="85" width="20" height="20" fill="#FFCC80"/>
    </g>
    
    <!-- Prohibition circle -->
    <circle cx="50" cy="65" r="55" fill="none" stroke="#F44336" stroke-width="4">
      <animate attributeName="stroke-width" values="4;6;4" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <line x1="15" y1="30" x2="85" y2="100" stroke="#F44336" stroke-width="4"/>
    
    <!-- X mark -->
    <text x="50" y="125" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#D32F2F" text-anchor="middle">НЕТ!</text>
  </g>
  
  <!-- Dangerous appliances -->
  <g transform="translate(350, 130)">
    <rect x="0" y="0" width="120" height="150" fill="#FFF3E0" rx="10" stroke="#FF9800" stroke-width="2"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">ПРИБОРЫ</text>
    
    <!-- Hair dryer -->
    <ellipse cx="30" cy="60" rx="15" ry="20" fill="#E91E63"/>
    <rect x="15" y="55" width="30" height="10" fill="#E91E63"/>
    <ellipse cx="45" cy="60" rx="5" ry="10" fill="#E91E63"/>
    <line x1="30" y1="80" x2="30" y2="100" stroke="#C2185B" stroke-width="3"/>
    
    <!-- Microwave -->
    <rect x="60" y="40" width="40" height="35" fill="#607D8B" rx="3"/>
    <rect x="65" y="45" width="25" height="25" fill="#263238" rx="2"/>
    <circle cx="95" cy="55" r="3" fill="#4CAF50">
      <animate attributeName="fill" values="#4CAF50;#81C784;#4CAF50" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Kettle -->
    <ellipse cx="90" cy="110" rx="20" ry="15" fill="#2196F3"/>
    <rect x="70" y="95" width="40" height="20" fill="#2196F3" rx="5"/>
    <rect x="85" y="85" width="10" height="15" fill="#1976D2"/>
    <rect x="110" y="100" width="15" height="8" fill="#1976D2" rx="2"/>
    
    <!-- Warning signs -->
    <polygon points="60,130 45,145 75,145" fill="#FFC107"/>
    <text x="60" y="143" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">!</text>
  </g>
  
  <!-- Safety rules -->
  <g transform="translate(140, 240)">
    <rect x="0" y="0" width="220" height="90" fill="#FFF" rx="10" stroke="#2196F3" stroke-width="2"/>
    <text x="110" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1565C0" text-anchor="middle">⚡ Правила электробезопасности:</text>
    <text x="110" y="38" font-family="Arial, sans-serif" font-size="9" fill="#1976D2" text-anchor="middle">• Не трогай розетки пальцами</text>
    <text x="110" y="52" font-family="Arial, sans-serif" font-size="9" fill="#1E88E5" text-anchor="middle">• Не тянись за проводами</text>
    <text x="110" y="66" font-family="Arial, sans-serif" font-size="9" fill="#42A5F5" text-anchor="middle">• Не используй приборы мокрыми руками</text>
    <text x="110" y="80" font-family="Arial, sans-serif" font-size="9" fill="#64B5F6" text-anchor="middle">• Если искрит — скажи взрослым!</text>
  </g>
  
  <!-- Animated sparks -->
  <circle cx="70" cy="200" r="4" fill="#FFC107">
    <animate attributeName="opacity" values="0;1;0" dur="0.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2;4;2" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="170" r="3" fill="#FFEB3B">
    <animate attributeName="opacity" values="0;1;0" dur="0.7s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;3;1" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Warning symbols -->
  <polygon points="480,30 465,55 495,55" fill="#FFC107" stroke="#FF6F00" stroke-width="2">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </polygon>
  <text x="480" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000" text-anchor="middle">!</text>
  
  <polygon points="20,30 5,55 35,55" fill="#FFC107" stroke="#FF6F00" stroke-width="2">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </polygon>
  <text x="20" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000" text-anchor="middle">!</text>
  
  <!-- Emergency number -->
  <rect x="380" y="270" width="70" height="45" fill="#2196F3" rx="8">
    <animate attributeName="fill" values="#2196F3;#42A5F5;#2196F3" dur="2s" repeatCount="indefinite"/>
  </rect>
  <text x="415" y="300" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFF" text-anchor="middle">112</text>
</svg>