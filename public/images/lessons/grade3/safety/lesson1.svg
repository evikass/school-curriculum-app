<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="safety1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color="#FFCDD2;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color="#EF9A9A;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#safety1)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#B71C1C" text-anchor="middle">⚠️ Безопасность</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#F44336" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#EF9A9A" opacity="0.4"/>
  
  <!-- Warning signs -->
  <g transform="translate(50, 70)" font-family="Arial, sans-serif">
    <!-- Traffic light -->
    <rect x="0" y="0" width="100" height="150" fill="#FFEBEE" rx="8" stroke="#F44336"/>
    <text x="50" y="18" font-size="10" font-weight="bold" fill="#B71C1C" text-anchor="middle">Дорога</text>
    <rect x="25" y="30" width="50" height="100" fill="#37474F" rx="5"/>
    <circle cx="50" cy="50" r="12" fill="#F44336"/>
    <circle cx="50" cy="80" r="12" fill="#FFC107"/>
    <circle cx="50" cy="110" r="12" fill="#4CAF50"/>
    
    <!-- Fire -->
    <rect x="120" y="0" width="100" height="150" fill="#FFF3E0" rx="8" stroke="#FF9800"/>
    <text x="170" y="18" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Огонь</text>
    <g transform="translate(135, 35)">
      <ellipse cx="35" cy="70" rx="30" ry="15" fill="#8D6E63"/>
      <path d="M20,70 Q25,40 35,50 Q40,20 50,45 Q55,15 60,40 Q65,50 50,70" fill="#FF5722">
        <animate attributeName="d" values="M20,70 Q25,40 35,50 Q40,20 50,45 Q55,15 60,40 Q65,50 50,70;M20,70 Q25,45 35,55 Q40,25 50,50 Q55,20 60,45 Q65,55 50,70;M20,70 Q25,40 35,50 Q40,20 50,45 Q55,15 60,40 Q65,50 50,70" dur="1s" repeatCount="indefinite"/>
      </path>
    </g>
    
    <!-- Electricity -->
    <rect x="240" y="0" width="100" height="150" fill="#E3F2FD" rx="8" stroke="#2196F3"/>
    <text x="290" y="18" font-size="10" font-weight="bold" fill="#0D47A1" text-anchor="middle">Ток</text>
    <polygon points="290,35 270,75 285,75 275,110 310,65 290,65 300,35" fill="#FFC107">
      <animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite"/>
    </polygon>
    
    <!-- Stranger -->
    <rect x="360" y="0" width="100" height="150" fill="#F3E5F5" rx="8" stroke="#9C27B0"/>
    <text x="410" y="18" font-size="10" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Чужие</text>
    <circle cx="410" cy="50" r="20" fill="#CE93D8"/>
    <circle cx="403" cy="45" r="3" fill="#333"/>
    <circle cx="417" cy="45" r="3" fill="#333"/>
    <ellipse cx="410" cy="58" rx="8" ry="4" fill="#7B1FA2"/>
    <text x="410" y="90" font-size="16" fill="#6A1B9A" text-anchor="middle">❓</text>
    <text x="410" y="110" font-size="8" fill="#8E24AA" text-anchor="middle">не разговаривай</text>
    <text x="410" y="120" font-size="8" fill="#9C27B0" text-anchor="middle">с незнакомцами</text>
  </g>
  
  <!-- Tips -->
  <g transform="translate(50, 240)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="65" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="18" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">🛡️ Правила безопасности</text>
    <text x="200" y="35" font-size="9" fill="#F57C00" text-anchor="middle">• Переходи дорогу на зелёный свет • Не играй с огнём</text>
    <text x="200" y="48" font-size="9" fill="#FF9800" text-anchor="middle">• Не трогай розетки • Не открывай дверь незнакомцам</text>
    <text x="200" y="60" font-size="8" fill="#FFB74D" text-anchor="middle">Если случилась беда — звони: 112</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>