<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pole3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#757575;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#9E9E9E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#757575;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg3)"/>
  
  <!-- Title -->
  <rect x="120" y="10" width="260" height="40" rx="10" fill="#FFF" stroke="#4CAF50" stroke-width="2"/>
  <text x="250" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2E7D32" text-anchor="middle">🚦 Светофор</text>
  
  <!-- Traffic light pole -->
  <rect x="225" y="50" width="50" height="280" fill="url(#pole3)" rx="5"/>
  
  <!-- Traffic light box -->
  <rect x="180" y="70" width="140" height="220" rx="15" fill="#37474F" stroke="#263238" stroke-width="3"/>
  
  <!-- Red light -->
  <circle cx="250" cy="120" r="35" fill="#B71C1C" stroke="#7F0000" stroke-width="3"/>
  <circle cx="250" cy="120" r="30" fill="#F44336">
    <animate attributeName="fill" values="#F44336;#EF5350;#F44336" dur="0.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="30;32;30" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="250" y="127" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFF" text-anchor="middle">СТОП</text>
  
  <!-- Yellow light -->
  <circle cx="250" cy="190" r="35" fill="#F57F17" stroke="#FF6F00" stroke-width="3"/>
  <circle cx="250" cy="190" r="28" fill="#9E9E9E"/>
  
  <!-- Green light -->
  <circle cx="250" cy="260" r="35" fill="#1B5E20" stroke="#003300" stroke-width="3"/>
  <circle cx="250" cy="260" r="28" fill="#424242"/>
  
  <!-- Labels on sides -->
  <g font-family="Arial, sans-serif" font-size="11">
    <!-- Left labels -->
    <text x="120" y="125" fill="#C62828" text-anchor="middle" font-weight="bold">СТОП!</text>
    <text x="120" y="140" fill="#E53935" text-anchor="middle">Жди</text>
    
    <text x="120" y="195" fill="#F9A825" text-anchor="middle" font-weight="bold">ВНИМАНИЕ!</text>
    <text x="120" y="210" fill="#FBC02D" text-anchor="middle">Приготовься</text>
    
    <text x="120" y="265" fill="#2E7D32" text-anchor="middle" font-weight="bold">ИДИ!</text>
    <text x="120" y="280" fill="#43A047" text-anchor="middle">Переходи</text>
    
    <!-- Right labels -->
    <text x="380" y="125" fill="#C62828" text-anchor="middle" font-weight="bold">RED</text>
    <text x="380" y="140" fill="#E53935" text-anchor="middle">STOP</text>
    
    <text x="380" y="195" fill="#F9A825" text-anchor="middle" font-weight="bold">YELLOW</text>
    <text x="380" y="210" fill="#FBC02D" text-anchor="middle">WAIT</text>
    
    <text x="380" y="265" fill="#2E7D32" text-anchor="middle" font-weight="bold">GREEN</text>
    <text x="380" y="280" fill="#43A047" text-anchor="middle">GO</text>
  </g>
  
  <!-- Walking person sign -->
  <g transform="translate(400, 100)">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#1B5E20" stroke="#2E7D32" stroke-width="2">
      <animate attributeName="fill" values="#1B5E20;#2E7D32;#1B5E20" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Walking person -->
    <circle cx="30" cy="18" r="8" fill="#FFF"/>
    <line x1="30" y1="26" x2="30" y2="40" stroke="#FFF" stroke-width="3"/>
    <line x1="30" y1="32" x2="20" y2="28" stroke="#FFF" stroke-width="3"/>
    <line x1="30" y1="32" x2="40" y2="28" stroke="#FFF" stroke-width="3"/>
    <line x1="30" y1="40" x2="22" y2="55" stroke="#FFF" stroke-width="3">
      <animate attributeName="x2" values="22;38;22" dur="0.5s" repeatCount="indefinite"/>
    </line>
    <line x1="30" y1="40" x2="38" y2="55" stroke="#FFF" stroke-width="3">
      <animate attributeName="x2" values="38;22;38" dur="0.5s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Stop hand sign -->
  <g transform="translate(40, 100)">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#B71C1C" stroke="#C62828" stroke-width="2">
      <animate attributeName="fill" values="#B71C1C;#C62828;#B71C1C" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Hand -->
    <g transform="translate(30, 32)">
      <ellipse cx="0" cy="0" rx="18" ry="20" fill="#FFF"/>
      <rect x="-15" y="-25" width="5" height="15" rx="2" fill="#FFF">
        <animate attributeName="height" values="15;18;15" dur="0.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="-8" y="-28" width="5" height="18" rx="2" fill="#FFF"/>
      <rect x="-1" y="-28" width="5" height="18" rx="2" fill="#FFF"/>
      <rect x="6" y="-25" width="5" height="15" rx="2" fill="#FFF">
        <animate attributeName="height" values="15;18;15" dur="0.5s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  
  <!-- Animated arrows -->
  <g stroke="#4CAF50" stroke-width="2" fill="none">
    <path d="M330,260 L350,260 L345,255 M350,260 L345,265">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Memory tip -->
  <rect x="50" y="300" width="400" height="40" rx="10" fill="#FFF8E1" stroke="#FFC107" stroke-width="2"/>
  <text x="250" y="325" font-family="Arial, sans-serif" font-size="14" fill="#E65100" text-anchor="middle">💡 Запомни: Красный — стой! Жёлтый — жди! Зелёный — иди!</text>
  
  <!-- Decorative elements -->
  <circle cx="30" cy="30" r="15" fill="#4CAF50" opacity="0.3"/>
  <circle cx="470" cy="330" r="20" fill="#81C784" opacity="0.3"/>
</svg>