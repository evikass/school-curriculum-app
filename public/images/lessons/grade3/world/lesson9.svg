<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D7CCC8"/>
      <stop offset="100%" style="stop-color:#BCAAA4"/>
    </linearGradient>
    <linearGradient id="earth9" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63"/>
      <stop offset="30%" style="stop-color:#6D4C41"/>
      <stop offset="60%" style="stop-color:#5D4037"/>
      <stop offset="100%" style="stop-color:#4E342E"/>
    </linearGradient>
    <linearGradient id="coal9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#424242"/>
      <stop offset="100%" style="stop-color:#212121"/>
    </linearGradient>
    <linearGradient id="gold9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FF8F00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg9)"/>

  <!-- Title -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3E2723" text-anchor="middle">⛏️ Полезные ископаемые</text>
  <rect x="80" y="38" width="340" height="2" rx="1" fill="#5D4037" opacity="0.5"/>

  <!-- Cross-section of earth -->
  <g transform="translate(0, 50)">
    <!-- Sky/Grass -->
    <rect x="0" y="0" width="500" height="40" fill="#81C784"/>
    
    <!-- Ground layers -->
    <rect x="0" y="40" width="500" height="60" fill="#8D6E63"/>
    <rect x="0" y="100" width="500" height="50" fill="#6D4C41"/>
    <rect x="0" y="150" width="500" height="60" fill="#5D4037"/>
    <rect x="0" y="210" width="500" height="100" fill="#4E342E"/>

    <!-- Layer labels -->
    <text x="480" y="70" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="end">почва</text>
    <text x="480" y="130" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="end">глина</text>
    <text x="480" y="185" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="end">песчаник</text>
    <text x="480" y="260" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="end">скальные породы</text>

    <!-- Coal deposit -->
    <g>
      <ellipse cx="80" cy="160" rx="35" ry="15" fill="url(#coal9)" stroke="#000000" stroke-width="1">
        <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="95" cy="155" rx="20" ry="8" fill="#333333"/>
      <text x="80" y="185" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">уголь</text>
    </g>

    <!-- Iron ore -->
    <g>
      <ellipse cx="200" cy="190" rx="30" ry="20" fill="#A1887F" stroke="#8D6E63" stroke-width="2">
        <animate attributeName="fill" values="#A1887F;#BCAAA4;#A1887F" dur="3s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="190" cy="185" r="5" fill="#D84315"/>
      <circle cx="205" cy="190" r="6" fill="#BF360C"/>
      <circle cx="195" cy="195" r="4" fill="#E64A19"/>
      <text x="200" y="220" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">железная руда</text>
    </g>

    <!-- Gold/precious metal -->
    <g>
      <ellipse cx="350" cy="220" rx="25" ry="15" fill="#795548" stroke="#5D4037" stroke-width="2"/>
      <polygon points="340,215 345,205 355,205 360,215 355,225 345,225" fill="url(#gold9)">
        <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="365" cy="218" r="5" fill="#FFD54F"/>
      <text x="350" y="245" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">золото</text>
    </g>

    <!-- Oil deposit -->
    <g>
      <ellipse cx="450" cy="180" rx="30" ry="18" fill="#37474F" stroke="#263238" stroke-width="2">
        <animate attributeName="rx" values="30;32;30" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="450" cy="177" rx="20" ry="10" fill="#455A64"/>
      <text x="450" y="205" font-family="Arial, sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">нефть</text>
    </g>

    <!-- Gas pocket -->
    <g>
      <ellipse cx="150" cy="120" rx="25" ry="12" fill="#B0BEC5" stroke="#90A4AE" stroke-width="1" stroke-dasharray="3,2">
        <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <text x="150" y="145" font-family="Arial, sans-serif" font-size="8" fill="#37474F" text-anchor="middle">природный газ</text>
    </g>

    <!-- Sand/gravel -->
    <g>
      <rect x="280" y="100" width="40" height="30" fill="#FFE0B2" stroke="#FFCC80" stroke-width="1"/>
      <circle cx="285" cy="110" r="3" fill="#FFCC80"/>
      <circle cx="295" cy="118" r="4" fill="#FFE0B2"/>
      <circle cx="305" cy="108" r="3" fill="#FFCC80"/>
      <circle cx="310" cy="120" r="4" fill="#FFE0B2"/>
      <text x="300" y="145" font-family="Arial, sans-serif" font-size="8" fill="#5D4037" text-anchor="middle">песок</text>
    </g>
  </g>

  <!-- Types box -->
  <g transform="translate(10, 280)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#5D4037"/>
    <text x="80" y="18" font-family="Arial, sans-serif" font-size="11" fill="#3E2723" text-anchor="middle" font-weight="bold">Виды ископаемых:</text>
    <text x="80" y="35" font-family="Arial, sans-serif" font-size="9" fill="#5D4037" text-anchor="middle">🔥 Горючие (уголь, нефть, газ)</text>
    <text x="80" y="48" font-family="Arial, sans-serif" font-size="9" fill="#5D4037" text-anchor="middle">⚙️ Рудные (металлы)</text>
    <text x="80" y="61" font-family="Arial, sans-serif" font-size="9" fill="#5D4037" text-anchor="middle">🪨 Нерудные (песок, камни)</text>
  </g>

  <!-- Miner icon -->
  <g transform="translate(430, 280)">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#FFFFFF" opacity="0.9" stroke="#5D4037"/>
    <circle cx="30" cy="20" r="12" fill="#FFCCBC"/>
    <rect x="18" y="10" width="24" height="8" fill="#FFD54F" rx="2"/>
    <circle cx="24" cy="15" r="3" fill="#FFFFFF"/>
    <circle cx="36" cy="15" r="3" fill="#FFFFFF"/>
    <rect x="20" y="32" width="20" height="25" fill="#FF9800" rx="3"/>
    <line x1="45" y1="35" x2="55" y2="25" stroke="#795548" stroke-width="3"/>
    <polygon points="55,25 60,20 65,30 55,30" fill="#6D4C41"/>
  </g>

  <!-- Bottom text -->
  <text x="250" y="345" font-family="Arial, sans-serif" font-size="10" fill="#3E2723" text-anchor="middle">
    Полезные ископаемые — богатства недр Земли
  </text>
</svg>