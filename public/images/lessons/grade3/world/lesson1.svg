<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="world1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#81C784;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#66BB6A;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#world1)"/>
  <rect width="500" height="350" fill="#E8F5E9" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B5E20" text-anchor="middle">🌿 Природные сообщества</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#4CAF50" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#81C784" opacity="0.6"/>
  
  <!-- Forest ecosystem -->
  <g transform="translate(20, 70)">
    <rect x="0" y="0" width="140" height="150" fill="#C8E6C9" rx="10" stroke="#4CAF50"/>
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Лес</text>
    <polygon points="40,80 70,30 100,80" fill="#388E3C"/>
    <rect x="60" y="80" width="20" height="30" fill="#795548"/>
    <circle cx="30" cy="110" r="5" fill="#8D6E63"/>
    <circle cx="110" cy="115" r="4" fill="#A1887F"/>
    <text x="70" y="145" font-family="Arial, sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">деревья, кустарники</text>
  </g>
  
  <!-- Meadow ecosystem -->
  <g transform="translate(180, 70)">
    <rect x="0" y="0" width="140" height="150" fill="#DCEDC8" rx="10" stroke="#8BC34A"/>
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#33691E" text-anchor="middle">Луг</text>
    <line x1="30" y1="130" x2="30" y2="80" stroke="#66BB6A" stroke-width="2"/>
    <circle cx="30" cy="75" r="8" fill="#E91E63"/>
    <line x1="70" y1="130" x2="70" y2="90" stroke="#66BB6A" stroke-width="2"/>
    <circle cx="70" cy="85" r="6" fill="#FF9800"/>
    <line x1="110" y1="130" x2="110" y2="85" stroke="#66BB6A" stroke-width="2"/>
    <circle cx="110" cy="80" r="7" fill="#FFEB3B"/>
    <text x="70" y="145" font-family="Arial, sans-serif" font-size="8" fill="#558B2F" text-anchor="middle">травы, цветы</text>
  </g>
  
  <!-- Water ecosystem -->
  <g transform="translate(340, 70)">
    <rect x="0" y="0" width="140" height="150" fill="#B3E5FC" rx="10" stroke="#03A9F4"/>
    <text x="70" y="20" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#01579B" text-anchor="middle">Водоём</text>
    <ellipse cx="70" cy="100" rx="50" ry="25" fill="#4FC3F7"/>
    <ellipse cx="50" cy="95" rx="8" ry="5" fill="#795548"/>
    <ellipse cx="90" cy="105" rx="6" ry="4" fill="#FF9800"/>
    <text x="70" y="145" font-family="Arial, sans-serif" font-size="8" fill="#0277BD" text-anchor="middle">рыбы, водоросли</text>
  </g>
  
  <!-- Info -->
  <g transform="translate(50, 240)">
    <rect x="0" y="0" width="400" height="60" fill="#E8F5E9" rx="8" stroke="#4CAF50"/>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1B5E20" text-anchor="middle">Природное сообщество — это растения и животные,</text>
    <text x="200" y="38" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">которые живут вместе и связаны друг с другом</text>
    <text x="200" y="52" font-family="Arial, sans-serif" font-size="9" fill="#388E3C" text-anchor="middle">Лес, луг, водоём, поле — примеры природных сообществ</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>