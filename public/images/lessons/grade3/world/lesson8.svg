<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A5D6A7;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#81C784;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit8)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32" text-anchor="middle">🌲 М.М. Пришвин</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#4CAF50" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#81C784" opacity="0.6"/>
  
  <!-- Forest scene -->
  <g transform="translate(50, 80)">
    <!-- Trees -->
    <polygon points="30,150 60,60 90,150" fill="#388E3C"/>
    <polygon points="80,160 120,50 160,160" fill="#43A047"/>
    <polygon points="340,150 380,55 420,150" fill="#388E3C"/>
    <polygon points="390,160 430,65 470,160" fill="#43A047"/>
    
    <!-- Birds -->
    <g fill="#5D4037">
      <ellipse cx="200" cy="80" rx="15" ry="10"/>
      <polygon points="185,80 170,85 185,88" fill="#795548"/>
      <circle cx="195" cy="77" r="2"/>
    </g>
    
    <!-- Deer -->
    <g transform="translate(230, 100)">
      <ellipse cx="30" cy="50" rx="20" ry="15" fill="#8D6E63"/>
      <ellipse cx="10" cy="35" rx="10" ry="12" fill="#8D6E63"/>
      <line x1="10" y1="22" x2="5" y2="5" stroke="#5D4037" stroke-width="2"/>
      <line x1="5" y1="5" x2="0" y2="15" stroke="#5D4037" stroke-width="2"/>
      <line x1="10" y1="22" x2="15" y2="5" stroke="#5D4037" stroke-width="2"/>
      <line x1="15" y1="5" x2="20" y2="15" stroke="#5D4037" stroke-width="2"/>
      <circle cx="6" cy="33" r="2" fill="#333"/>
    </g>
  </g>
  
  <!-- Info -->
  <g transform="translate(150, 230)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="200" height="75" fill="#E8F5E9" rx="8" stroke="#4CAF50"/>
    <text x="100" y="20" font-size="12" font-weight="bold" fill="#1B5E20" text-anchor="middle">«Певец русской природы»</text>
    <text x="100" y="40" font-size="10" fill="#2E7D32" text-anchor="middle">«Лесная капель»</text>
    <text x="100" y="55" font-size="9" fill="#388E3C" text-anchor="middle">«Ёж» • «Золотой луг»</text>
    <text x="100" y="68" font-size="9" fill="#43A047" text-anchor="middle">«Кладовая солнца»</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="80" cy="300" r="6" fill="#E91E63"/>
  <circle cx="420" cy="305" r="6" fill="#E91E63"/>
  <circle cx="50" cy="290" r="4" fill="#FFB6C1"/>
  <circle cx="450" cy="295" r="4" fill="#FFB6C1"/>
  
  <!-- Sparkles -->
  <circle cx="250" cy="120" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>