<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="tableGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg11)"/>
  
  <!-- Decorative pattern -->
  <g fill="#FF9800" opacity="0.1">
    <circle cx="50" cy="300" r="40"/>
    <circle cx="450" cy="280" r="35"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">🍽️ За столом</text>
  <rect x="160" y="42" width="180" height="2" rx="1" fill="#FF9800" opacity="0.6"/>
  
  <!-- Table -->
  <g transform="translate(50, 100)">
    <!-- Table surface -->
    <ellipse cx="200" cy="100" rx="180" ry="60" fill="url(#tableGrad)" stroke="#BDBDBD" stroke-width="2"/>
    
    <!-- Plate -->
    <ellipse cx="200" cy="90" rx="70" ry="35" fill="#FFF" stroke="#9E9E9E" stroke-width="2"/>
    <ellipse cx="200" cy="90" rx="50" ry="25" fill="#FAFAFA" stroke="#BDBDBD" stroke-width="1"/>
    
    <!-- Fork -->
    <g transform="translate(100, 50)">
      <rect x="0" y="0" width="5" height="60" fill="#BDBDBD" rx="1"/>
      <rect x="-3" y="0" width="3" height="15" fill="#BDBDBD" rx="1"/>
      <rect x="0" y="0" width="3" height="15" fill="#BDBDBD" rx="1"/>
      <rect x="5" y="0" width="3" height="15" fill="#BDBDBD" rx="1"/>
      <rect x="10" y="0" width="3" height="15" fill="#BDBDBD" rx="1"/>
    </g>
    
    <!-- Knife -->
    <g transform="translate(295, 50)">
      <rect x="0" y="0" width="5" height="60" fill="#BDBDBD" rx="1"/>
      <rect x="0" y="0" width="20" height="25" fill="#BDBDBD" rx="1"/>
    </g>
    
    <!-- Spoon -->
    <g transform="translate(185, 20)">
      <rect x="0" y="0" width="5" height="40" fill="#BDBDBD" rx="1"/>
      <ellipse cx="2.5" cy="-5" rx="10" ry="8" fill="#BDBDBD"/>
    </g>
    
    <!-- Napkin -->
    <rect x="320" y="60" width="30" height="40" fill="#E91E63" rx="3" transform="rotate(-15 335 80)"/>
    
    <!-- Glass -->
    <g transform="translate(250, 30)">
      <path d="M10,0 L15,0 L18,40 L7,40 Z" fill="#81D4FA" opacity="0.6"/>
      <rect x="7" y="40" width="11" height="5" fill="#81D4FA" opacity="0.8"/>
      <rect x="5" y="45" width="15" height="3" fill="#BDBDBD"/>
    </g>
  </g>
  
  <!-- Table manners list -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="150" height="130" fill="#FFF" rx="10" stroke="#FF9800"/>
    <text x="75" y="22" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">🍴 Правила</text>
    <text x="15" y="45" font-size="9" fill="#F57C00">✓ Мой руки перед едой</text>
    <text x="15" y="62" font-size="9" fill="#F57C00">✓ Не чавкай</text>
    <text x="15" y="79" font-size="9" fill="#F57C00">✓ Не говори с едой</text>
    <text x="15" y="96" font-size="9" fill="#F57C00">✓ Пользуйся салфеткой</text>
    <text x="15" y="113" font-size="9" fill="#F57C00">✓ Не играй приборами</text>
    <text x="15" y="130" font-size="9" fill="#F57C00">✓ Благодари за еду</text>
  </g>
  
  <!-- Sitting person -->
  <g transform="translate(320, 60)">
    <!-- Chair back -->
    <rect x="0" y="0" width="60" height="80" fill="#8D6E63" rx="5"/>
    <!-- Person -->
    <circle cx="30" cy="-15" r="20" fill="#FFCC80"/>
    <ellipse cx="30" cy="-23" rx="16" ry="10" fill="#5D4037"/>
    <rect x="10" y="5" width="40" height="45" rx="10" fill="#4CAF50"/>
    <circle cx="24" cy="-18" r="2" fill="#5D4037"/>
    <circle cx="36" cy="-18" r="2" fill="#5D4037"/>
    <path d="M22,-8 Q30,-2 38,-8" stroke="#E65100" stroke-width="2" fill="none"/>
    <!-- Chair seat -->
    <rect x="-5" y="50" width="70" height="15" fill="#6D4C41" rx="3"/>
    <!-- Chair legs -->
    <rect x="0" y="65" width="8" height="30" fill="#6D4C41"/>
    <rect x="52" y="65" width="8" height="30" fill="#6D4C41"/>
    <animate attributeName="opacity" values="1;0.95;1" dur="3s" repeatCount="indefinite"/>
  </g>
  
  <!-- Good behavior -->
  <g transform="translate(300, 220)">
    <rect x="0" y="0" width="180" height="60" fill="#C8E6C9" rx="8" stroke="#4CAF50"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">✓ Правильно:</text>
    <text x="90" y="38" font-family="Arial, sans-serif" font-size="10" fill="#388E3C" text-anchor="middle">«Спасибо, было очень вкусно!»</text>
    <text x="90" y="53" font-family="Arial, sans-serif" font-size="10" fill="#43A047" text-anchor="middle">«Можно мне ещё немного?»</text>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(30, 280)">
    <rect x="0" y="0" width="260" height="55" fill="#FFF8E1" rx="8" stroke="#FF9800"/>
    <text x="130" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">💡 Хорошие манеры за столом</text>
    <text x="130" y="38" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">показывают уважение к хозяевам</text>
    <text x="130" y="50" font-family="Arial, sans-serif" font-size="10" fill="#FF9800" text-anchor="middle">и делают еду приятнее для всех</text>
  </g>
  
  <!-- Decorative elements -->
  <text x="20" y="50" font-size="14">🌸</text>
  <text x="480" y="50" font-size="12">✨</text>
  <text x="260" y="330" font-size="14">🍽️</text>
</svg>