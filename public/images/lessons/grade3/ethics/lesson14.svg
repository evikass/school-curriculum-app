<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg14" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="treeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFEB3B"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg14)"/>
  
  <!-- Sun -->
  <circle cx="450" cy="50" r="30" fill="url(#sunGrad)">
    <animate attributeName="r" values="28;33;28" dur="3s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#FFC107" stroke-width="2" opacity="0.7">
    <line x1="450" y1="10" x2="450" y2="-5">
      <animate attributeName="y1" values="10;8;10" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="480" y1="20" x2="495" y2="10"/>
    <line x1="490" y1="50" x2="505" y2="50"/>
    <line x1="480" y1="80" x2="495" y2="90"/>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2E7D32" text-anchor="middle">🌱 Экологическая этика</text>
  <rect x="110" y="42" width="280" height="2" rx="1" fill="#4CAF50" opacity="0.6"/>
  
  <!-- Ground/Grass -->
  <ellipse cx="250" cy="330" rx="280" ry="40" fill="#81C784"/>
  
  <!-- Tree -->
  <g transform="translate(50, 80)">
    <rect x="35" y="120" width="30" height="80" fill="#8D6E63"/>
    <ellipse cx="50" cy="80" rx="50" ry="60" fill="url(#treeGrad)">
      <animate attributeName="ry" values="60;62;60" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Leaves animation -->
    <circle cx="30" cy="50" r="5" fill="#66BB6A">
      <animate attributeName="cy" values="50;48;50" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="60" r="4" fill="#81C784">
      <animate attributeName="cy" values="60;58;60" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Recycling symbols -->
  <g transform="translate(170, 100)">
    <!-- Recycle bin -->
    <rect x="0" y="50" width="70" height="60" fill="#4CAF50" rx="5"/>
    <rect x="10" y="45" width="50" height="10" fill="#388E3C" rx="3"/>
    <!-- Recycle symbol -->
    <g transform="translate(20, 65)">
      <path d="M15,0 L25,15 L20,15 L20,25 L10,25 L10,15 L5,15 Z" fill="#FFF" transform="rotate(0 15 12)"/>
      <path d="M15,0 L25,15 L20,15 L20,25 L10,25 L10,15 L5,15 Z" fill="#FFF" transform="rotate(120 15 12)"/>
      <path d="M15,0 L25,15 L20,15 L20,25 L10,25 L10,15 L5,15 Z" fill="#FFF" transform="rotate(240 15 12)"/>
      <animateTransform attributeName="transform" type="rotate" from="0 15 12" to="360 15 12" dur="10s" repeatCount="indefinite"/>
    </g>
    <text x="35" y="130" font-family="Arial, sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle">♻️ Сортируй</text>
  </g>
  
  <!-- Earth -->
  <g transform="translate(280, 70)">
    <circle cx="50" cy="50" r="45" fill="#2196F3"/>
    <ellipse cx="50" cy="50" rx="45" ry="45" fill="#4CAF50" opacity="0.6"/>
    <ellipse cx="35" cy="35" rx="20" ry="15" fill="#4CAF50"/>
    <ellipse cx="65" cy="60" rx="15" ry="10" fill="#4CAF50"/>
    <ellipse cx="45" cy="70" rx="10" ry="8" fill="#4CAF50"/>
    <!-- Hands around earth -->
    <g transform="translate(-20, 30)">
      <ellipse cx="15" cy="20" rx="12" ry="10" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
    </g>
    <g transform="translate(95, 30)">
      <ellipse cx="15" cy="20" rx="12" ry="10" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
    </g>
    <animate attributeName="opacity" values="1;0.95;1" dur="3s" repeatCount="indefinite"/>
    <text x="50" y="115" font-family="Arial, sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">🌍 Береги планету</text>
  </g>
  
  <!-- Water drop -->
  <g transform="translate(400, 90)">
    <path d="M25,0 C25,0 0,30 0,45 C0,60 11,70 25,70 C39,70 50,60 50,45 C50,30 25,0 25,0" fill="#03A9F4">
      <animate attributeName="d" values="M25,0 C25,0 0,30 0,45 C0,60 11,70 25,70 C39,70 50,60 50,45 C50,30 25,0 25,0;M25,2 C25,2 2,32 2,47 C2,62 12,72 25,72 C38,72 48,62 48,47 C48,32 25,2 25,2;M25,0 C25,0 0,30 0,45 C0,60 11,70 25,70 C39,70 50,60 50,45 C50,30 25,0 25,0" dur="2s" repeatCount="indefinite"/>
    </path>
    <text x="25" y="85" font-family="Arial, sans-serif" font-size="10" fill="#0288D1" text-anchor="middle">💧 Экономь воду</text>
  </g>
  
  <!-- Eco rules -->
  <g transform="translate(30, 200)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="180" height="100" fill="#FFF" rx="10" stroke="#4CAF50"/>
    <text x="90" y="20" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">🌿 Экологические правила</text>
    <text x="15" y="40" font-size="9" fill="#388E3C">🌱 Не мусори в природе</text>
    <text x="15" y="55" font-size="9" fill="#388E3C">♻️ Сортируй отходы</text>
    <text x="15" y="70" font-size="9" fill="#388E3C">💧 Экономь воду и свет</text>
    <text x="15" y="85" font-size="9" fill="#388E3C">🌳 Сажай деревья</text>
    <text x="15" y="100" font-size="9" fill="#388E3C">🐦 Защищай животных</text>
  </g>
  
  <!-- Animals -->
  <g transform="translate(250, 230)">
    <!-- Bird -->
    <ellipse cx="30" cy="20" rx="15" ry="10" fill="#FF9800"/>
    <circle cx="40" cy="15" r="8" fill="#FF9800"/>
    <polygon points="48,15 58,13 48,12" fill="#E65100"/>
    <circle cx="43" cy="13" r="2" fill="#000"/>
    <path d="M15,25 Q5,30 15,35" stroke="#FF9800" stroke-width="3" fill="none">
      <animate attributeName="d" values="M15,25 Q5,30 15,35;M15,25 Q5,25 15,35;M15,25 Q5,30 15,35" dur="0.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Flower -->
  <g transform="translate(420, 240)">
    <line x1="15" y1="50" x2="15" y2="25" stroke="#4CAF50" stroke-width="3"/>
    <circle cx="15" cy="20" r="10" fill="#E91E63">
      <animate attributeName="r" values="10;12;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="15" cy="10" r="8" fill="#F48FB1"/>
    <circle cx="5" cy="20" r="8" fill="#F48FB1"/>
    <circle cx="25" cy="20" r="8" fill="#F48FB1"/>
    <circle cx="15" cy="20" r="5" fill="#FFC107"/>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(220, 200)">
    <rect x="0" y="0" width="250" height="100" fill="#E8F5E9" rx="8" stroke="#4CAF50"/>
    <text x="125" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">💡 Земля — наш общий дом!</text>
    <text x="125" y="40" font-family="Arial, sans-serif" font-size="10" fill="#388E3C" text-anchor="middle">Каждый может помочь природе:</text>
    <text x="125" y="58" font-family="Arial, sans-serif" font-size="10" fill="#43A047" text-anchor="middle">• Подними мусор и выбрось в урну</text>
    <text x="125" y="73" font-family="Arial, sans-serif" font-size="10" fill="#43A047" text-anchor="middle">• Выключай воду и свет</text>
    <text x="125" y="88" font-family="Arial, sans-serif" font-size="10" fill="#43A047" text-anchor="middle">• Будь другом животным</text>
  </g>
</svg>