<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="bow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg2)"/>
  
  <!-- Sun -->
  <circle cx="450" cy="50" r="25" fill="#FFD54F">
    <animate attributeName="r" values="23;27;23" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0" text-anchor="middle">🎩 Вежливость</text>
  <rect x="100" y="42" width="300" height="2" rx="1" fill="#2196F3" opacity="0.6"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="330" rx="280" ry="40" fill="#90CAF9" opacity="0.4"/>
  
  <!-- Magic Words Clouds -->
  <g font-family="Arial, sans-serif">
    <!-- Hello cloud -->
    <ellipse cx="100" cy="100" rx="55" ry="30" fill="#FFF" opacity="0.9">
      <animate attributeName="cy" values="100;95;100" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <text x="100" y="105" font-size="14" font-weight="bold" fill="#1976D2" text-anchor="middle">Здравствуйте!</text>
    
    <!-- Thank you cloud -->
    <ellipse cx="400" cy="100" rx="50" ry="30" fill="#FFF" opacity="0.9">
      <animate attributeName="cy" values="100;105;100" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
    <text x="400" y="105" font-size="14" font-weight="bold" fill="#1976D2" text-anchor="middle">Спасибо!</text>
    
    <!-- Please cloud -->
    <ellipse cx="250" cy="80" rx="45" ry="25" fill="#FFF" opacity="0.9">
      <animate attributeName="cy" values="80;75;80" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <text x="250" y="85" font-size="14" font-weight="bold" fill="#1976D2" text-anchor="middle">Пожалуйста</text>
  </g>
  
  <!-- Person bowing -->
  <g transform="translate(200, 140)">
    <!-- Body -->
    <ellipse cx="50" cy="120" rx="30" ry="15" fill="#1976D2"/>
    <rect x="30" y="60" width="40" height="60" rx="10" fill="#42A5F5"/>
    <!-- Head -->
    <circle cx="50" cy="45" r="20" fill="#FFCC80"/>
    <!-- Hair -->
    <ellipse cx="50" cy="35" rx="18" ry="10" fill="#5D4037"/>
    <!-- Smile -->
    <path d="M40,50 Q50,60 60,50" stroke="#E65100" stroke-width="2" fill="none"/>
    <!-- Bowing animation -->
    <animateTransform attributeName="transform" type="rotate" values="0 50 120;-10 50 120;0 50 120" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Magic words list -->
  <g transform="translate(320, 160)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="150" height="130" fill="#FFF" rx="10" stroke="#2196F3"/>
    <text x="75" y="25" font-size="12" font-weight="bold" fill="#1565C0" text-anchor="middle">✨ Волшебные слова</text>
    <text x="20" y="50" font-size="11" fill="#1976D2">• Здравствуйте</text>
    <text x="20" y="70" font-size="11" fill="#1976D2">• До свидания</text>
    <text x="20" y="90" font-size="11" fill="#1976D2">• Спасибо</text>
    <text x="20" y="110" font-size="11" fill="#1976D2">• Пожалуйста</text>
    <text x="20" y="130" font-size="11" fill="#1976D2">• Извините</text>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(40, 260)">
    <rect x="0" y="0" width="420" height="55" fill="#E3F2FD" rx="8" stroke="#2196F3"/>
    <text x="210" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0D47A1" text-anchor="middle">💡 Правило вежливости</text>
    <text x="210" y="40" font-family="Arial, sans-serif" font-size="10" fill="#1565C0" text-anchor="middle">Вежливый человек всегда здоровается, прощается и благодарит!</text>
  </g>
  
  <!-- Decorative stars -->
  <text x="30" y="200" font-size="20">⭐</text>
  <text x="470" y="180" font-size="15">✨</text>
  <text x="180" y="320" font-size="12">🌟</text>
</svg>