<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B3E5FC;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#E1F5FE;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#37474F" text-anchor="middle">➡️ Приставка</text>
  <rect x="100" y="42" width="300" height="2" rx="1" fill="#78909C" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#81C784" opacity="0.6"/>
  
  <!-- Arrow showing prefix position -->
  <g>
    <path d="M50,150 L120,150 L110,140 M120,150 L110,160" stroke="#E53935" stroke-width="3" fill="none">
      <animate attributeName="stroke-dasharray" values="0,200;200,0" dur="2s" repeatCount="indefinite"/>
    </path>
    <text x="85" y="130" font-family="Arial, sans-serif" font-size="12" fill="#E53935" text-anchor="middle">ПРИСТАВКА</text>
  </g>
  
  <!-- Word train metaphor -->
  <g transform="translate(150, 180)">
    <!-- Prefix car -->
    <rect x="0" y="20" width="60" height="40" fill="#FF7043" rx="5"/>
    <text x="30" y="48" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFF" text-anchor="middle">ПЕРЕ-</text>
    <circle cx="15" cy="70" r="8" fill="#5D4037"/>
    <circle cx="45" cy="70" r="8" fill="#5D4037"/>
    
    <!-- Root car -->
    <rect x="70" y="20" width="80" height="40" fill="#66BB6A" rx="5"/>
    <text x="110" y="48" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFF" text-anchor="middle">ПИС</text>
    <circle cx="85" cy="70" r="8" fill="#5D4037"/>
    <circle cx="135" cy="70" r="8" fill="#5D4037"/>
    
    <!-- Suffix car -->
    <rect x="160" y="20" width="50" height="40" fill="#42A5F5" rx="5"/>
    <text x="185" y="48" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFF" text-anchor="middle">-А-</text>
    <circle cx="175" cy="70" r="8" fill="#5D4037"/>
    <circle cx="195" cy="70" r="8" fill="#5D4037"/>
    
    <!-- Connecting line -->
    <line x1="60" y1="40" x2="70" y2="40" stroke="#333" stroke-width="2"/>
    <line x1="150" y1="40" x2="160" y2="40" stroke="#333" stroke-width="2"/>
    
    <!-- Result word -->
    <text x="110" y="100" font-family="Arial, sans-serif" font-size="14" fill="#37474F" text-anchor="middle">ПЕРЕПИСАЛ</text>
  </g>
  
  <!-- More examples -->
  <g font-family="Arial, sans-serif" font-size="12">
    <rect x="30" y="260" width="100" height="30" fill="#FFCCBC" rx="5"/>
    <text x="80" y="280" fill="#BF360C" text-anchor="middle">НА-писать</text>
    
    <rect x="140" y="260" width="100" height="30" fill="#FFCCBC" rx="5"/>
    <text x="190" y="280" fill="#BF360C" text-anchor="middle">ПРИ-ехать</text>
    
    <rect x="250" y="260" width="100" height="30" fill="#FFCCBC" rx="5"/>
    <text x="300" y="280" fill="#BF360C" text-anchor="middle">ВЫ-бежать</text>
    
    <rect x="360" y="260" width="100" height="30" fill="#FFCCBC" rx="5"/>
    <text x="410" y="280" fill="#BF360C" text-anchor="middle">ЗА-кричать</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="40" cy="310" r="5" fill="#E91E63"/>
  <circle cx="460" cy="315" r="5" fill="#E91E63"/>
  <circle cx="30" cy="318" r="4" fill="#F48FB1"/>
  <circle cx="470" cy="308" r="4" fill="#F48FB1"/>
  
  <!-- Sparkles -->
  <circle cx="180" cy="200" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="210" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
</svg>