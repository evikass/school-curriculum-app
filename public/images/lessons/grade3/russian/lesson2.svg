<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="skyGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E6F3FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#98FB98;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#90EE90;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#skyGrad2)"/>
  
  <!-- Sun with rays -->
  <circle cx="60" cy="50" r="25" fill="#FFD700" opacity="0.9">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <g stroke="#FFD700" stroke-width="2" opacity="0.7">
    <line x1="60" y1="15" x2="60" y2="5"/>
    <line x1="35" y1="25" x2="25" y2="15"/>
    <line x1="25" y1="50" x2="10" y2="50"/>
    <line x1="35" y1="75" x2="25" y2="85"/>
    <line x1="85" y1="25" x2="95" y2="15"/>
    <animateTransform attributeName="transform" type="rotate" from="0 60 50" to="360 60 50" dur="15s" repeatCount="indefinite"/>
  </g>
  
  <!-- Clouds -->
  <g opacity="0.8">
    <ellipse cx="200" cy="45" rx="35" ry="22" fill="white"/>
    <ellipse cx="225" cy="40" rx="28" ry="18" fill="white"/>
    <ellipse cx="180" cy="50" rx="22" ry="15" fill="white"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;30,0;0,0" dur="20s" repeatCount="indefinite"/>
  </g>
  
  <!-- Hills -->
  <ellipse cx="100" cy="360" rx="150" ry="50" fill="url(#fieldGrad)"/>
  <ellipse cx="400" cy="365" rx="180" ry="55" fill="#98FB98" opacity="0.4"/>
  
  <!-- Trees -->
  <g opacity="0.35" transform="translate(0, 20)">
    <ellipse cx="480" cy="260" rx="28" ry="45" fill="#228B22"/>
    <rect x="475" y="260" width="10" height="30" fill="#8B4513"/>
  </g>
  
  <!-- Flowers at bottom -->
  <g opacity="0.6">
    <circle cx="30" cy="330" r="6" fill="#FF69B4"/>
    <circle cx="37" cy="325" r="5" fill="#FFB6C1"/>
    <circle cx="23" cy="325" r="5" fill="#FFB6C1"/>
    <line x1="30" y1="335" x2="30" y2="350" stroke="#228B22" stroke-width="2"/>
  </g>
  <g opacity="0.5">
    <circle cx="470" cy="325" r="6" fill="#9370DB"/>
    <circle cx="477" cy="320" r="5" fill="#DDA0DD"/>
    <circle cx="463" cy="320" r="5" fill="#DDA0DD"/>
  </g>
  
  <!-- Flying bird -->
  <path d="M380 70 Q385 65 390 70 Q395 65 400 70" stroke="#555" stroke-width="2" fill="none" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" values="0,0;-40,5;-80,0" dur="6s" repeatCount="indefinite"/>
  </path>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#4169E1" text-anchor="middle">➡️ Приставка</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#4169E1" opacity="0.5"/>
  
  <!-- Main Content -->
  <rect x="30" y="65" width="440" height="255" rx="15" fill="white" opacity="0.9" stroke="#4169E1" stroke-width="2"/>
  
  <!-- Prefix explanation -->
  <text x="250" y="95" font-size="12" font-weight="bold" fill="#4169E1" text-anchor="middle">Приставка — часть слова перед корнем</text>
  
  <!-- Word examples with arrows -->
  <g transform="translate(70, 120)">
    <!-- Example 1 -->
    <rect x="0" y="0" width="120" height="35" rx="8" fill="#E6F3FF"/>
    <text x="10" y="22" font-size="14" fill="#4169E1" font-weight="bold">ПЕРЕ</text>
    <text x="55" y="22" font-size="14" fill="#333">писать</text>
    <rect x="0" y="28" width="40" height="4" fill="#4169E1" opacity="0.5"/>
    
    <!-- Arrow -->
    <path d="M130 18 L150 18" stroke="#4169E1" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="160" y="22" font-size="11" fill="#555">пере- двигаться</text>
  </g>
  
  <g transform="translate(70, 170)">
    <!-- Example 2 -->
    <rect x="0" y="0" width="120" height="35" rx="8" fill="#E6F3FF"/>
    <text x="10" y="22" font-size="14" fill="#4169E1" font-weight="bold">ПРИ</text>
    <text x="45" y="22" font-size="14" fill="#333">лететь</text>
    <rect x="0" y="28" width="32" height="4" fill="#4169E1" opacity="0.5"/>
    
    <text x="160" y="22" font-size="11" fill="#555">при- приближение</text>
  </g>
  
  <g transform="translate(70, 220)">
    <!-- Example 3 -->
    <rect x="0" y="0" width="120" height="35" rx="8" fill="#E6F3FF"/>
    <text x="10" y="22" font-size="14" fill="#4169E1" font-weight="bold">ЗА</text>
    <text x="35" y="22" font-size="14" fill="#333">ходить</text>
    <rect x="0" y="28" width="24" height="4" fill="#4169E1" opacity="0.5"/>
    
    <text x="160" y="22" font-size="11" fill="#555">за- начало действия</text>
  </g>
  
  <!-- Prefix meanings box -->
  <rect x="300" y="115" width="160" height="100" rx="10" fill="#F0F8FF" stroke="#4169E1" stroke-width="1"/>
  <text x="380" y="135" font-size="10" font-weight="bold" fill="#4169E1" text-anchor="middle">Значения приставок:</text>
  <text x="310" y="155" font-size="9" fill="#333">• пере- = перемещение</text>
  <text x="310" y="170" font-size="9" fill="#333">• при- = приближение</text>
  <text x="310" y="185" font-size="9" fill="#333">• за- = начало</text>
  <text x="310" y="200" font-size="9" fill="#333">• вы- = направление наружу</text>
  
  <!-- Animated prefix arrow -->
  <g transform="translate(250, 275)">
    <polygon points="0,0 -10,-10 -5,-10 -5,-20 5,-20 5,-10 10,-10" fill="#4169E1" opacity="0.7">
      <animateTransform attributeName="transform" type="translate" values="0,0;-10,0;0,0" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
    <text x="0" y="30" font-size="10" fill="#4169E1" text-anchor="middle">В начале слова!</text>
  </g>
  
  <!-- Decorative elements -->
  <g transform="translate(50, 290)" opacity="0.6">
    <rect x="0" y="0" width="25" height="18" rx="2" fill="#4169E1"/>
    <rect x="2" y="2" width="21" height="14" fill="white"/>
    <text x="12" y="12" font-size="6" fill="#4169E1" text-anchor="middle">ПРИ-</text>
  </g>
</svg>