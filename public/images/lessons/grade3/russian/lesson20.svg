<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky20" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCC80;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="medalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFA000;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky20)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun with rays -->
  <circle cx="250" cy="60" r="30" fill="#FFD54F" opacity="0.8">
    <animate attributeName="r" values="28;35;28" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Sun rays -->
  <g stroke="#FFD54F" stroke-width="2" opacity="0.6">
    <line x1="250" y1="20" x2="250" y2="10">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite"/>
    </line>
    <line x1="280" y1="30" x2="290" y2="20">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </line>
    <line x1="220" y1="30" x2="210" y2="20">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </line>
    <line x1="295" y1="60" x2="305" y2="60">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </line>
    <line x1="205" y1="60" x2="195" y2="60">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="1.5s" repeatCount="indefinite" begin="0.8s"/>
    </line>
  </g>
  
  <!-- Title -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#E65100" text-anchor="middle">🏆 Итоговый урок</text>
  <text x="250" y="58" font-family="Arial, sans-serif" font-size="12" fill="#F57C00" text-anchor="middle">Русский язык 3 класс</text>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#FFCC80" opacity="0.4"/>
  
  <!-- Medal -->
  <g transform="translate(400, 130)">
    <circle cx="0" cy="0" r="35" fill="url(#medalGrad)" stroke="#FF8F00" stroke-width="2">
      <animate attributeName="r" values="33;37;33" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#5D4037" text-anchor="middle">5</text>
    <rect x="-8" y="-50" width="16" height="20" fill="#FF8F00"/>
    <polygon points="-15,-50 0,-65 15,-50" fill="#FF8F00"/>
  </g>
  
  <!-- Topics covered -->
  <g transform="translate(20, 90)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="220" height="150" fill="#E8F5E9" rx="10" stroke="#4CAF50"/>
    <text x="110" y="20" font-size="12" font-weight="bold" fill="#2E7D32" text-anchor="middle">📚 Что мы изучили:</text>
    
    <text x="15" y="45" font-size="10" fill="#388E3C">✓ Части речи</text>
    <text x="15" y="62" font-size="10" fill="#388E3C">✓ Склонения имён</text>
    <text x="15" y="79" font-size="10" fill="#388E3C">✓ Спряжения глаголов</text>
    <text x="15" y="96" font-size="10" fill="#388E3C">✓ Правописание корней</text>
    <text x="15" y="113" font-size="10" fill="#388E3C">✓ НЕ с глаголами</text>
    <text x="15" y="130" font-size="10" fill="#388E3C">✓ Члены предложения</text>
    <text x="15" y="147" font-size="10" fill="#388E3C">✓ Текст и его части</text>
  </g>
  
  <!-- Stars section -->
  <g transform="translate(250, 120)">
    <!-- Star 1 -->
    <polygon points="0,-20 5,-8 18,-8 8,2 12,15 0,8 -12,15 -8,2 -18,-8 -5,-8" fill="url(#starGrad)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
    <!-- Star 2 -->
    <polygon points="40,-10 43,-4 50,-4 45,1 47,8 40,4 33,8 35,1 30,-4 37,-4" fill="url(#starGrad)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </polygon>
    <!-- Star 3 -->
    <polygon points="-40,-10 -37,-4 -30,-4 -35,1 -33,8 -40,4 -47,8 -45,1 -50,-4 -43,-4" fill="url(#starGrad)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </polygon>
  </g>
  
  <!-- Achievement badges -->
  <g transform="translate(260, 90)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="120" height="80" fill="#E3F2FD" rx="8" stroke="#1976D2"/>
    <text x="60" y="18" font-size="10" font-weight="bold" fill="#0D47A1" text-anchor="middle">Навыки:</text>
    <text x="60" y="35" font-size="9" fill="#1565C0" text-anchor="middle">🎯 Грамотность</text>
    <text x="60" y="50" font-size="9" fill="#1565C0" text-anchor="middle">✍️ Письмо</text>
    <text x="60" y="65" font-size="9" fill="#1565C0" text-anchor="middle">📖 Чтение</text>
  </g>
  
  <!-- Summary stats -->
  <g transform="translate(260, 180)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="120" height="60" fill="#FCE4EC" rx="8" stroke="#E91E63"/>
    <text x="60" y="18" font-size="10" font-weight="bold" fill="#C2185B" text-anchor="middle">Пройдено:</text>
    <text x="60" y="35" font-size="12" fill="#AD1457" text-anchor="middle">20 уроков</text>
    <text x="60" y="50" font-size="10" fill="#AD1457" text-anchor="middle">Молодец! 🎉</text>
  </g>
  
  <!-- Motivation message -->
  <g transform="translate(50, 260)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="55" fill="#FFF8E1" rx="10" stroke="#FFC107" stroke-width="2"/>
    <text x="200" y="22" font-size="13" font-weight="bold" fill="#E65100" text-anchor="middle">🌟 Ты отлично поработал! 🌟</text>
    <text x="200" y="42" font-size="11" fill="#F57C00" text-anchor="middle">Теперь ты знаешь много правил русского языка!</text>
  </g>
  
  <!-- Confetti effect -->
  <circle cx="50" cy="100" r="4" fill="#E91E63">
    <animate attributeName="cy" values="100;90;100" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="120" r="4" fill="#2196F3">
    <animate attributeName="cy" values="120;110;120" dur="1s" repeatCount="indefinite" begin="0.2s"/>
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="100" cy="200" r="3" fill="#4CAF50">
    <animate attributeName="cy" values="200;190;200" dur="1s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
  <circle cx="460" cy="250" r="3" fill="#FF9800">
    <animate attributeName="cy" values="250;240;250" dur="1s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63">
    <animate attributeName="r" values="5;6;5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="475" cy="310" r="5" fill="#E91E63">
    <animate attributeName="r" values="5;6;5" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  
  <!-- Sparkles around -->
  <circle cx="80" cy="150" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="170" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="250" cy="250" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  
  <!-- Small trophy -->
  <g transform="translate(30, 280)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="20">
      🏆
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>