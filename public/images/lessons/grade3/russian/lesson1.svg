<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4E1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFF0F5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#skyGrad)"/>
  
  <!-- Sun -->
  <circle cx="450" cy="50" r="30" fill="#FFD700" opacity="0.8">
    <animate attributeName="r" values="30;35;30" dur="3s" repeatCount="indefinite"/>
  </circle>
  <g opacity="0.6">
    <line x1="450" y1="10" x2="450" y2="0" stroke="#FFD700" stroke-width="3"/>
    <line x1="480" y1="20" x2="490" y2="10" stroke="#FFD700" stroke-width="3"/>
    <line x1="490" y1="50" x2="500" y2="50" stroke="#FFD700" stroke-width="3"/>
    <line x1="480" y1="80" x2="490" y2="90" stroke="#FFD700" stroke-width="3"/>
    <animateTransform attributeName="transform" type="rotate" from="0 450 50" to="360 450 50" dur="20s" repeatCount="indefinite"/>
  </g>
  
  <!-- Clouds -->
  <g opacity="0.7">
    <ellipse cx="80" cy="40" rx="30" ry="20" fill="white"/>
    <ellipse cx="100" cy="35" rx="25" ry="18" fill="white"/>
    <ellipse cx="60" cy="45" rx="20" ry="15" fill="white"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;20,0;0,0" dur="15s" repeatCount="indefinite"/>
  </g>
  <g opacity="0.6">
    <ellipse cx="300" cy="60" rx="25" ry="15" fill="white"/>
    <ellipse cx="320" cy="55" rx="20" ry="12" fill="white"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;-15,0;0,0" dur="12s" repeatCount="indefinite"/>
  </g>
  
  <!-- Ground/Grass -->
  <ellipse cx="250" cy="380" rx="300" ry="80" fill="url(#grassGrad)"/>
  
  <!-- Trees in background -->
  <g opacity="0.4">
    <ellipse cx="30" cy="280" rx="25" ry="40" fill="#228B22"/>
    <rect x="25" y="280" width="10" height="30" fill="#8B4513"/>
  </g>
  <g opacity="0.35">
    <ellipse cx="470" cy="270" rx="30" ry="50" fill="#228B22"/>
    <rect x="465" y="270" width="10" height="35" fill="#8B4513"/>
  </g>
  
  <!-- Flowers -->
  <g opacity="0.6">
    <circle cx="50" cy="320" r="5" fill="#FF69B4"/>
    <circle cx="55" cy="315" r="4" fill="#FFB6C1"/>
    <circle cx="45" cy="315" r="4" fill="#FFB6C1"/>
  </g>
  <g opacity="0.5">
    <circle cx="450" cy="315" r="5" fill="#DDA0DD"/>
    <circle cx="455" cy="310" r="4" fill="#EE82EE"/>
    <circle cx="445" cy="310" r="4" fill="#EE82EE"/>
  </g>
  
  <!-- Birds -->
  <g opacity="0.5">
    <path d="M120 80 Q125 75 130 80 Q135 75 140 80" stroke="#333" stroke-width="2" fill="none">
      <animateTransform attributeName="transform" type="translate" values="0,0;50,10;100,0" dur="8s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#C41E3A" text-anchor="middle">🌱 Корень слова</text>
  <rect x="100" y="45" width="300" height="3" rx="2" fill="#C41E3A" opacity="0.5"/>
  
  <!-- Main Content Area -->
  <rect x="40" y="70" width="420" height="250" rx="15" fill="white" opacity="0.85" stroke="#C41E3A" stroke-width="2"/>
  
  <!-- Word Tree Diagram -->
  <g transform="translate(250, 160)">
    <!-- Root circle -->
    <circle cx="0" cy="0" r="45" fill="#C41E3A" opacity="0.2">
      <animate attributeName="r" values="45;50;45" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="35" fill="#C41E3A" opacity="0.3"/>
    <text x="0" y="5" font-size="14" font-weight="bold" fill="#C41E3A" text-anchor="middle">КОРЕНЬ</text>
    
    <!-- Branch words -->
    <line x1="-60" y1="-60" x2="-20" y2="-20" stroke="#8B4513" stroke-width="3"/>
    <line x1="60" y1="-60" x2="20" y2="-20" stroke="#8B4513" stroke-width="3"/>
    <line x1="-80" y1="30" x2="-25" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="80" y1="30" x2="25" y2="15" stroke="#8B4513" stroke-width="3"/>
    <line x1="0" y1="70" x2="0" y2="35" stroke="#8B4513" stroke-width="3"/>
    
    <!-- Related words -->
    <g transform="translate(-90, -75)">
      <rect x="-35" y="-15" width="70" height="25" rx="5" fill="#FFE4E1" stroke="#C41E3A"/>
      <text x="0" y="3" font-size="11" fill="#333" text-anchor="middle">лес</text>
    </g>
    <g transform="translate(90, -75)">
      <rect x="-40" y="-15" width="80" height="25" rx="5" fill="#FFE4E1" stroke="#C41E3A"/>
      <text x="0" y="3" font-size="11" fill="#333" text-anchor="middle">лесник</text>
    </g>
    <g transform="translate(-110, 45)">
      <rect x="-45" y="-15" width="90" height="25" rx="5" fill="#FFE4E1" stroke="#C41E3A"/>
      <text x="0" y="3" font-size="11" fill="#333" text-anchor="middle">лесной</text>
    </g>
    <g transform="translate(110, 45)">
      <rect x="-50" y="-15" width="100" height="25" rx="5" fill="#FFE4E1" stroke="#C41E3A"/>
      <text x="0" y="3" font-size="11" fill="#333" text-anchor="middle">лесничий</text>
    </g>
    <g transform="translate(0, 90)">
      <rect x="-50" y="-15" width="100" height="25" rx="5" fill="#FFE4E1" stroke="#C41E3A"/>
      <text x="0" y="3" font-size="11" fill="#333" text-anchor="middle">перелесок</text>
    </g>
  </g>
  
  <!-- Key points -->
  <text x="70" y="115" font-size="10" fill="#C41E3A">📌 Корень — общая часть родственных слов</text>
  <text x="70" y="130" font-size="10" fill="#C41E3A">📌 Родственные слова имеют общий смысл</text>
  
  <!-- Decorative book -->
  <g transform="translate(60, 280)" opacity="0.7">
    <rect x="0" y="0" width="30" height="20" rx="2" fill="#C41E3A"/>
    <rect x="2" y="2" width="26" height="16" fill="#FFF5F5"/>
    <line x1="15" y1="2" x2="15" y2="18" stroke="#C41E3A" stroke-width="1"/>
  </g>
  
  <!-- Pencil -->
  <g transform="translate(420, 280)" opacity="0.7">
    <rect x="0" y="5" width="25" height="8" fill="#FFD700"/>
    <polygon points="25,5 25,13 32,9" fill="#333"/>
    <rect x="0" y="5" width="5" height="8" fill="#FF69B4"/>
  </g>
</svg>