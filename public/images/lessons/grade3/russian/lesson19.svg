<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky19" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B3E5FC;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#E1F5FE;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pencilGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFD54F;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky19)"/>
  <rect width="500" height="350" fill="#FFFDE7" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1" text-anchor="middle">📝 Правописание слов</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#1976D2" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#90CAF9" opacity="0.4"/>
  
  <!-- Book illustration -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="140" height="100" fill="url(#bookGrad)" rx="5" stroke="#0D47A1"/>
    <rect x="5" y="5" width="65" height="90" fill="#E3F2FD" rx="3"/>
    <rect x="70" y="5" width="65" height="90" fill="#E3F2FD" rx="3"/>
    <line x1="70" y1="5" x2="70" y2="95" stroke="#0D47A1" stroke-width="2"/>
    <!-- Lines on book pages -->
    <line x1="15" y1="20" x2="60" y2="20" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="35" x2="60" y2="35" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="50" x2="60" y2="50" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
    <line x1="15" y1="65" x2="60" y2="65" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="20" x2="125" y2="20" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="35" x2="125" y2="35" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="50" x2="125" y2="50" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
    <line x1="80" y1="65" x2="125" y2="65" stroke="#1976D2" stroke-width="1" opacity="0.5"/>
    <text x="70" y="120" font-family="Arial, sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle">Словарь</text>
  </g>
  
  <!-- Pencil illustration -->
  <g transform="translate(350, 75)">
    <rect x="0" y="0" width="15" height="80" fill="url(#pencilGrad)" rx="2"/>
    <polygon points="0,80 7.5,100 15,80" fill="#FFECB3"/>
    <polygon points="5,80 7.5,100 10,80" fill="#424242"/>
    <rect x="0" y="0" width="15" height="10" fill="#E91E63" rx="2"/>
    <text x="7" y="115" font-family="Arial, sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle">Карандаш</text>
  </g>
  
  <!-- Main rules section -->
  <g transform="translate(180, 70)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="160" height="110" fill="#E3F2FD" rx="8" stroke="#1976D2"/>
    <text x="80" y="20" font-size="12" font-weight="bold" fill="#0D47A1" text-anchor="middle">Правила:</text>
    <text x="10" y="42" font-size="10" fill="#1565C0">• Проверяемые гласные</text>
    <text x="10" y="58" font-size="10" fill="#1565C0">• Проверяемые согласные</text>
    <text x="10" y="74" font-size="10" fill="#1565C0">• Непроизносимые</text>
    <text x="10" y="90" font-size="10" fill="#1565C0">• Словарные слова</text>
  </g>
  
  <!-- Examples section -->
  <g transform="translate(30, 200)" font-family="Arial, sans-serif">
    <text x="220" y="0" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Примеры проверки слов</text>
    
    <!-- Example 1 -->
    <rect x="0" y="15" width="130" height="45" fill="#C8E6C9" rx="5"/>
    <text x="65" y="32" font-size="10" fill="#2E7D32" text-anchor="middle">в•да — воды</text>
    <text x="65" y="48" font-size="9" fill="#1B5E20" text-anchor="middle">проверяемая гласная</text>
    
    <!-- Example 2 -->
    <rect x="150" y="15" width="130" height="45" fill="#BBDEFB" rx="5"/>
    <text x="215" y="32" font-size="10" fill="#1565C0" text-anchor="middle">ду•ка — дубы</text>
    <text x="215" y="48" font-size="9" fill="#0D47A1" text-anchor="middle">проверяемая согласная</text>
    
    <!-- Example 3 -->
    <rect x="300" y="15" width="140" height="45" fill="#F8BBD9" rx="5"/>
    <text x="370" y="32" font-size="10" fill="#C2185B" text-anchor="middle">соло•а — солнце</text>
    <text x="370" y="48" font-size="9" fill="#880E4F" text-anchor="middle">непроизносимая согласная</text>
  </g>
  
  <!-- Dictionary words section -->
  <g transform="translate(50, 280)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="35" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="14" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">📖 Словарные слова (запомнить!):</text>
    <text x="200" y="28" font-size="10" fill="#F57C00" text-anchor="middle">берёза, ветер, ворона, заяц, капуста, малина, мороз, орех</text>
  </g>
  
  <!-- Animated writing elements -->
  <g transform="translate(50, 100)">
    <circle cx="0" cy="0" r="3" fill="#E91E63">
      <animate attributeName="cy" values="0;-10;0" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63">
    <animate attributeName="r" values="5;6;5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="475" cy="310" r="5" fill="#E91E63">
    <animate attributeName="r" values="5;6;5" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  
  <!-- Sparkles -->
  <circle cx="150" cy="90" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="90" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
  <circle cx="250" cy="180" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.6s"/>
  </circle>
  
  <!-- Animated check mark -->
  <g transform="translate(440, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" fill="#4CAF50">
      ✓
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>