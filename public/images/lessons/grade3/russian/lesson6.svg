<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="sky6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BBDEFB;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#E3F2FD;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#sky6)"/>
  <rect width="500" height="350" fill="#E8F5E9" opacity="0.3"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0D47A1" text-anchor="middle">📋 Падежи существительных</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#2196F3" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#90CAF9" opacity="0.4"/>
  
  <!-- Cases table -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif" font-size="11">
    <!-- Header -->
    <rect x="0" y="0" width="440" height="25" fill="#1976D2" rx="3"/>
    <text x="50" y="17" fill="#FFF" text-anchor="middle" font-weight="bold">Падеж</text>
    <text x="150" y="17" fill="#FFF" text-anchor="middle" font-weight="bold">Вопросы</text>
    <text x="250" y="17" fill="#FFF" text-anchor="middle" font-weight="bold">Предлоги</text>
    <text x="370" y="17" fill="#FFF" text-anchor="middle" font-weight="bold">Пример</text>
    
    <!-- Rows -->
    <rect x="0" y="28" width="440" height="22" fill="#E3F2FD"/>
    <text x="50" y="43" fill="#0D47A1" text-anchor="middle">Именительный</text>
    <text x="150" y="43" fill="#0D47A1" text-anchor="middle">кто? что?</text>
    <text x="250" y="43" fill="#666" text-anchor="middle">—</text>
    <text x="370" y="43" fill="#333" text-anchor="middle">мама</text>
    
    <rect x="0" y="52" width="440" height="22" fill="#BBDEFB"/>
    <text x="50" y="67" fill="#0D47A1" text-anchor="middle">Родительный</text>
    <text x="150" y="67" fill="#0D47A1" text-anchor="middle">кого? чего?</text>
    <text x="250" y="67" fill="#666" text-anchor="middle">от, до, из, без, у, для</text>
    <text x="370" y="67" fill="#333" text-anchor="middle">мамы</text>
    
    <rect x="0" y="76" width="440" height="22" fill="#E3F2FD"/>
    <text x="50" y="91" fill="#0D47A1" text-anchor="middle">Дательный</text>
    <text x="150" y="91" fill="#0D47A1" text-anchor="middle">кому? чему?</text>
    <text x="250" y="91" fill="#666" text-anchor="middle">к, по</text>
    <text x="370" y="91" fill="#333" text-anchor="middle">маме</text>
    
    <rect x="0" y="100" width="440" height="22" fill="#BBDEFB"/>
    <text x="50" y="115" fill="#0D47A1" text-anchor="middle">Винительный</text>
    <text x="150" y="115" fill="#0D47A1" text-anchor="middle">кого? что?</text>
    <text x="250" y="115" fill="#666" text-anchor="middle">в, на, за, через</text>
    <text x="370" y="115" fill="#333" text-anchor="middle">маму</text>
    
    <rect x="0" y="124" width="440" height="22" fill="#E3F2FD"/>
    <text x="50" y="139" fill="#0D47A1" text-anchor="middle">Творительный</text>
    <text x="150" y="139" fill="#0D47A1" text-anchor="middle">кем? чем?</text>
    <text x="250" y="139" fill="#666" text-anchor="middle">с, за, под, над</text>
    <text x="370" y="139" fill="#333" text-anchor="middle">мамой</text>
    
    <rect x="0" y="148" width="440" height="22" fill="#BBDEFB"/>
    <text x="50" y="163" fill="#0D47A1" text-anchor="middle">Предложный</text>
    <text x="150" y="163" fill="#0D47A1" text-anchor="middle">о ком? о чём?</text>
    <text x="250" y="163" fill="#666" text-anchor="middle">о, об, в, на</text>
    <text x="370" y="163" fill="#333" text-anchor="middle">о маме</text>
  </g>
  
  <!-- Mnemonic -->
  <g transform="translate(50, 260)">
    <rect x="0" y="0" width="400" height="45" fill="#FFF3E0" rx="8" stroke="#FF9800"/>
    <text x="200" y="18" font-family="Arial, sans-serif" font-size="12" fill="#E65100" text-anchor="middle" font-weight="bold">💡 Лайфхак:</text>
    <text x="200" y="36" font-family="Arial, sans-serif" font-size="11" fill="#E65100" text-anchor="middle">Иван Родил Девчонку, Велел Тащить Пелёнку</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
  
  <!-- Sparkles -->
  <circle cx="150" cy="240" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="240" r="2" fill="#FFD54F">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite" begin="0.3s"/>
  </circle>
</svg>