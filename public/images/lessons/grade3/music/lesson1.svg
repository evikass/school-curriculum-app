<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="music1g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color="#F8BBD9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color="#F48FB1;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#music1g3)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#AD1457" text-anchor="middle">🎵 Музыка в нашей жизни</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#E91E63" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#F48FB1" opacity="0.4"/>
  
  <!-- Musical instruments -->
  <g transform="translate(30, 70)" font-family="Arial, sans-serif">
    <!-- Piano -->
    <rect x="0" y="0" width="120" height="100" fill="#FCE4EC" rx="8" stroke="#E91E63"/>
    <text x="60" y="18" font-size="10" font-weight="bold" fill="#880E4F" text-anchor="middle">Пианино</text>
    <rect x="15" y="30" width="90" height="50" fill="#37474F"/>
    <g fill="#FFF">
      <rect x="20" y="35" width="10" height="35"/>
      <rect x="35" y="35" width="10" height="35"/>
      <rect x="50" y="35" width="10" height="35"/>
      <rect x="65" y="35" width="10" height="35"/>
      <rect x="80" y="35" width="10" height="35"/>
    </g>
    <g fill="#333">
      <rect x="27" y="35" width="6" height="22"/>
      <rect x="42" y="35" width="6" height="22"/>
      <rect x="57" y="35" width="6" height="22"/>
      <rect x="72" y="35" width="6" height="22"/>
    </g>
    
    <!-- Guitar -->
    <rect x="140" y="0" width="120" height="100" fill="#FFECB3" rx="8" stroke="#FF9800"/>
    <text x="200" y="18" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Гитара</text>
    <ellipse cx="200" cy="60" rx="30" ry="35" fill="#8D6E63"/>
    <ellipse cx="200" cy="60" rx="10" ry="12" fill="#5D4037"/>
    <rect x="195" y="15" width="10" height="40" fill="#795548"/>
    <line x1="200" y1="30" x2="200" y2="90" stroke="#FFD54F" stroke-width="1"/>
    
    <!-- Violin -->
    <rect x="280" y="0" width="120" height="100" fill="#C8E6C9" rx="8" stroke="#4CAF50"/>
    <text x="340" y="18" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Скрипка</text>
    <ellipse cx="330" cy="55" rx="20" ry="28" fill="#8D6E63"/>
    <ellipse cx="350" cy="55" rx="18" ry="25" fill="#8D6E63"/>
    <rect x="335" y="20" width="10" height="50" fill="#795548"/>
    <line x1="340" y1="30" x2="340" y2="90" stroke="#FFF" stroke-width="1"/>
  </g>
  
  <!-- Info -->
  <g transform="translate(50, 190)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="400" height="110" fill="#F3E5F5" rx="8" stroke="#9C27B0"/>
    <text x="200" y="20" font-size="12" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Музыка — это искусство звуков</text>
    <text x="200" y="40" font-size="10" fill="#7B1FA2" text-anchor="middle">Звуки бывают высокие и низкие, громкие и тихие</text>
    <text x="200" y="58" font-size="9" fill="#8E24AA" text-anchor="middle">🎵 Музыка поднимает настроение</text>
    <text x="200" y="73" font-size="9" fill="#9C27B0" text-anchor="middle">🎵 Музыка помогает выразить чувства</text>
    <text x="200" y="88" font-size="9" fill="#AB47BC" text-anchor="middle">🎵 Музыка объединяет людей</text>
    <text x="200" y="103" font-size="8" fill="#BA68C8" text-anchor="middle">Попробуй сыграть на инструменте!</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>