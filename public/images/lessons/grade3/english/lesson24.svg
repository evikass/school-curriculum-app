<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad24" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5"/>
      <stop offset="100%" style="stop-color:#E1BEE7"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad24)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#7B1FA2" text-anchor="middle">📚 Review Lesson 2</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#9C27B0" opacity="0.6"/>
  
  <!-- Topics reviewed -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="65" width="145" height="90" fill="#C8E6C9" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="92" y="85" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">🍂 Seasons</text>
    <text x="92" y="105" font-size="10" fill="#1B5E20" text-anchor="middle">spring, summer</text>
    <text x="92" y="120" font-size="10" fill="#1B5E20" text-anchor="middle">autumn, winter</text>
    <text x="92" y="140" font-size="9" fill="#4CAF50" text-anchor="middle">I like summer!</text>
    
    <rect x="175" y="65" width="145" height="90" fill="#E3F2FD" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="247" y="85" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">📅 Time</text>
    <text x="247" y="105" font-size="10" fill="#0D47A1" text-anchor="middle">o'clock, half past</text>
    <text x="247" y="120" font-size="10" fill="#0D47A1" text-anchor="middle">quarter past/to</text>
    <text x="247" y="140" font-size="9" fill="#2196F3" text-anchor="middle">It's 3 o'clock!</text>
    
    <rect x="330" y="65" width="150" height="90" fill="#FFF8E1" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="405" y="85" font-size="12" fill="#E65100" text-anchor="middle" font-weight="bold">🔢 Numbers</text>
    <text x="405" y="105" font-size="10" fill="#BF360C" text-anchor="middle">1-100</text>
    <text x="405" y="120" font-size="10" fill="#BF360C" text-anchor="middle">one, two, three...</text>
    <text x="405" y="140" font-size="9" fill="#FF9800" text-anchor="middle">twenty, fifty...</text>
  </g>
  
  <!-- Second row -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="165" width="145" height="90" fill="#FFEBEE" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <text x="92" y="185" font-size="12" fill="#C62828" text-anchor="middle" font-weight="bold">🎨 Colours</text>
    <text x="92" y="205" font-size="10" fill="#B71C1C" text-anchor="middle">red, blue, green</text>
    <text x="92" y="220" font-size="10" fill="#B71C1C" text-anchor="middle">yellow, pink</text>
    <text x="92" y="240" font-size="9" fill="#F44336" text-anchor="middle">My favourite is blue!</text>
    
    <rect x="175" y="165" width="145" height="90" fill="#E0F7FA" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.7s" repeatCount="indefinite"/>
    </rect>
    <text x="247" y="185" font-size="12" fill="#00838F" text-anchor="middle" font-weight="bold">🔷 Shapes</text>
    <text x="247" y="205" font-size="10" fill="#006064" text-anchor="middle">circle, square</text>
    <text x="247" y="220" font-size="10" fill="#006064" text-anchor="middle">triangle, star</text>
    <text x="247" y="240" font-size="9" fill="#00BCD4" text-anchor="middle">Draw a circle!</text>
    
    <rect x="330" y="165" width="150" height="90" fill="#E8F5E9" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="5.2s" repeatCount="indefinite"/>
    </rect>
    <text x="405" y="185" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">✅ Grammar</text>
    <text x="405" y="205" font-size="10" fill="#1B5E20" text-anchor="middle">can/can't</text>
    <text x="405" y="220" font-size="10" fill="#1B5E20" text-anchor="middle">have got</text>
    <text x="405" y="240" font-size="9" fill="#4CAF50" text-anchor="middle">there is/are</text>
  </g>
  
  <!-- Progress bar -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="270" width="460" height="70" fill="white" rx="10" opacity="0.8"/>
    <text x="250" y="290" font-size="11" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Lessons 11-22 Review: Time, Numbers, Colours, Shapes, Grammar</text>
    
    <!-- Grammar summary -->
    <text x="80" y="315" font-size="10" fill="#C62828" text-anchor="middle">I can swim ✓</text>
    <text x="170" y="315" font-size="10" fill="#1565C0" text-anchor="middle">I've got a cat</text>
    <text x="270" y="315" font-size="10" fill="#2E7D32" text-anchor="middle">There is a book</text>
    <text x="370" y="315" font-size="10" fill="#E65100" text-anchor="middle">I play every day</text>
    <text x="450" y="315" font-size="10" fill="#7B1FA2" text-anchor="middle">What is this?</text>
    
    <rect x="40" y="325" width="420" height="8" fill="#E0E0E0" rx="4"/>
    <rect x="40" y="325" width="420" height="8" fill="#9C27B0" rx="4">
      <animate attributeName="width" values="0;420" dur="2s" fill="freeze"/>
    </rect>
  </g>
  
  <!-- Congratulations -->
  <g transform="translate(250, 55)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="16" fill="#FFD54F" text-anchor="middle" font-weight="bold">⭐</text>
    <animateTransform attributeName="transform" type="rotate" values="0 250 55;10 250 55;0 250 55;-10 250 55;0 250 55" dur="2s" repeatCount="indefinite"/>
  </g>
  
  <!-- Lesson number -->
  <circle cx="470" cy="320" r="20" fill="#9C27B0" opacity="0.9"/>
  <text x="470" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">24</text>
</svg>