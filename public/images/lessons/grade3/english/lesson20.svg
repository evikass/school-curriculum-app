<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="grad20" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE4EC"/>
      <stop offset="100%" style="stop-color:#F8BBD9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#grad20)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#AD1457" text-anchor="middle">🏠 There is / There are</text>
  <rect x="100" y="45" width="300" height="2" rx="1" fill="#E91E63" opacity="0.6"/>
  
  <!-- Room illustration -->
  <rect x="20" y="65" width="280" height="180" fill="white" stroke="#E91E63" stroke-width="2" rx="10"/>
  <text x="160" y="85" font-family="Arial, sans-serif" font-size="12" fill="#C2185B" text-anchor="middle" font-weight="bold">My Room</text>
  
  <!-- Room contents -->
  <rect x="40" y="100" width="60" height="40" fill="#8D6E63" rx="3"/>  <!-- Table -->
  <rect x="50" y="105" width="40" height="30" fill="#A1887F" rx="2"/>  <!-- Table top -->
  <circle cx="70" cy="115" r="8" fill="#FFEB3B"/>  <!-- Lamp -->
  
  <rect x="120" y="130" width="50" height="80" fill="#81C784" rx="5"/>  <!-- Bed -->
  <rect x="120" y="130" width="50" height="20" fill="#A5D6A7" rx="3"/>  <!-- Pillow -->
  
  <rect x="190" y="90" width="40" height="60" fill="#90CAF9" rx="3"/>  <!-- Window -->
  <line x1="210" y1="90" x2="210" y2="150" stroke="#E3F2FD" stroke-width="2"/>
  <line x1="190" y1="120" x2="230" y2="120" stroke="#E3F2FD" stroke-width="2"/>
  
  <circle cx="255" cy="200" r="15" fill="#FF9800"/>  <!-- Ball -->
  <rect x="240" y="220" width="30" height="20" fill="#795548" rx="2"/>  <!-- Box -->
  
  <!-- Floor -->
  <rect x="20" y="225" width="280" height="20" fill="#D7CCC8" rx="0"/>
  
  <!-- There is examples -->
  <g font-family="Arial, sans-serif">
    <rect x="320" y="65" width="160" height="80" fill="#C8E6C9" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <text x="400" y="85" font-size="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">There is (1)</text>
    <text x="400" y="105" font-size="10" fill="#388E3C" text-anchor="middle">There is a table.</text>
    <text x="400" y="120" font-size="9" fill="#66BB6A" text-anchor="middle">Там есть стол.</text>
    <text x="400" y="135" font-size="10" fill="#388E3C" text-anchor="middle">There is a ball.</text>
  </g>
  
  <!-- There are examples -->
  <g font-family="Arial, sans-serif">
    <rect x="320" y="155" width="160" height="90" fill="#BBDEFB" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <text x="400" y="175" font-size="12" fill="#1565C0" text-anchor="middle" font-weight="bold">There are (2+)</text>
    <text x="400" y="195" font-size="10" fill="#1976D2" text-anchor="middle">There are 2 chairs.</text>
    <text x="400" y="210" font-size="9" fill="#42A5F5" text-anchor="middle">Там есть 2 стула.</text>
    <text x="400" y="230" font-size="10" fill="#1976D2" text-anchor="middle">There are books.</text>
  </g>
  
  <!-- Negative and Question -->
  <g font-family="Arial, sans-serif">
    <rect x="20" y="260" width="220" height="75" fill="#FFCDD2" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="280" font-size="11" fill="#C62828" text-anchor="middle" font-weight="bold">Negative (−)</text>
    <text x="130" y="300" font-size="10" fill="#D32F2F" text-anchor="middle">There isn't a cat.</text>
    <text x="130" y="315" font-size="10" fill="#D32F2F" text-anchor="middle">There aren't any books.</text>
    <text x="130" y="330" font-size="8" fill="#EF5350" text-anchor="middle">Там нет...</text>
    
    <rect x="260" y="260" width="220" height="75" fill="#FFF8E1" rx="10">
      <animate attributeName="opacity" values="1;0.9;1" dur="5.5s" repeatCount="indefinite"/>
    </rect>
    <text x="370" y="280" font-size="11" fill="#E65100" text-anchor="middle" font-weight="bold">Question (?)</text>
    <text x="370" y="300" font-size="10" fill="#F57F17" text-anchor="middle">Is there a bed? — Yes, there is.</text>
    <text x="370" y="315" font-size="10" fill="#F57F17" text-anchor="middle">Are there chairs? — No, there aren't.</text>
    <text x="370" y="330" font-size="8" fill="#FFB74D" text-anchor="middle">Там есть...?</text>
  </g>
  
  <!-- Lesson number -->
  <circle cx="470" cy="320" r="20" fill="#E91E63" opacity="0.9"/>
  <text x="470" y="326" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">20</text>
</svg>