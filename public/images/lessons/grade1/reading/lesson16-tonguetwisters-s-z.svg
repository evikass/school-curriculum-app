<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1565c0" text-anchor="middle">🐍 Скороговорки С-З</text>
  
  <!-- Snake for S sound -->
  <g transform="translate(50, 80)">
    <path d="M20,60 Q40,20 80,60 Q120,100 140,60" stroke="#4caf50" stroke-width="8" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M20,60 Q40,20 80,60 Q120,100 140,60;M20,60 Q40,100 80,60 Q120,20 140,60;M20,60 Q40,20 80,60 Q120,100 140,60" dur="2s" repeatCount="indefinite"/>
    </path>
    <circle cx="150" cy="60" r="10" fill="#4caf50"/>
    <circle cx="153" cy="57" r="2" fill="#333"/>
    <text x="40" y="95" font-family="Arial" font-size="24" fill="#2e7d32" text-anchor="middle">С</text>
    <text x="40" y="115" font-family="Arial" font-size="10" fill="#1b5e20" text-anchor="middle">свистящий</text>
  </g>
  
  <!-- Bee for Z sound -->
  <g transform="translate(220, 80)">
    <ellipse cx="50" cy="50" rx="25" ry="18" fill="#ffc107">
      <animate attributeName="cx" values="50;55;50;45;50" dur="1s" repeatCount="indefinite"/>
    </ellipse>
    <line x1="35" y1="45" x2="35" y2="55" stroke="#333" stroke-width="2"/>
    <line x1="45" y1="45" x2="45" y2="55" stroke="#333" stroke-width="2"/>
    <line x1="55" y1="45" x2="55" y2="55" stroke="#333" stroke-width="2"/>
    <line x1="65" y1="45" x2="65" y2="55" stroke="#333" stroke-width="2"/>
    <circle cx="70" cy="50" r="5" fill="#333"/>
    <text x="50" y="90" font-family="Arial" font-size="24" fill="#f57f17" text-anchor="middle">З</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#ff6f00" text-anchor="middle">звонкий</text>
  </g>
  
  <!-- Tongue twister examples -->
  <g font-family="Arial" font-size="11">
    <rect x="30" y="180" width="340" height="30" fill="#fff" rx="5" opacity="0.8"/>
    <text x="200" y="200" fill="#0d47a1" text-anchor="middle">"У Сани и Сони в гостях усатые сомы"</text>
    
    <rect x="30" y="220" width="340" height="30" fill="#fff" rx="5" opacity="0.8"/>
    <text x="200" y="240" fill="#0d47a1" text-anchor="middle">"Саша шустро сушит сушки"</text>
  </g>
  
  <!-- Sound wave animation -->
  <g transform="translate(150, 260)">
    <path d="M0,20 Q20,0 40,20 Q60,40 80,20 Q100,0 120,20" stroke="#1976d2" stroke-width="2" fill="none">
      <animate attributeName="d" values="M0,20 Q20,0 40,20 Q60,40 80,20 Q100,0 120,20;M0,20 Q20,40 40,20 Q60,0 80,20 Q100,40 120,20;M0,20 Q20,0 40,20 Q60,40 80,20 Q100,0 120,20" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>