<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2e7d32" text-anchor="middle">Учим стихи</text>
  
  <!-- Book -->
  <rect x="100" y="50" width="200" height="130" fill="#fff" stroke="#4caf50" stroke-width="3" rx="5"/>
  <line x1="200" y1="50" x2="200" y2="180" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Text on left page -->
  <text x="150" y="80" font-family="Georgia, serif" font-size="11" fill="#1b5e20" text-anchor="middle" font-style="italic">"Осьминог"</text>
  <text x="150" y="100" font-family="Georgia, serif" font-size="9" fill="#2e7d32" text-anchor="middle">Осьминог спросил</text>
  <text x="150" y="115" font-family="Georgia, serif" font-size="9" fill="#2e7d32" text-anchor="middle">осьминога:</text>
  <text x="150" y="130" font-family="Georgia, serif" font-size="9" fill="#2e7d32" text-anchor="middle">— Отчего ты</text>
  <text x="150" y="145" font-family="Georgia, serif" font-size="9" fill="#2e7d32" text-anchor="middle">такого родного?</text>
  <text x="150" y="165" font-family="Georgia, serif" font-size="8" fill="#1b5e20" text-anchor="middle">И. Токмакова</text>
  
  <!-- Text on right page -->
  <text x="250" y="80" font-family="Georgia, serif" font-size="9" fill="#2e7d32" text-anchor="middle">Отчего твои</text>
  <text x="250" y="95" font-family="Georgia, serif" font-size="9" fill="#2e7d32" text-anchor="middle">ноги бегут</text>
  <text x="250" y="110" font-family="Georgia, serif" font-size="9" fill="#2e7d32" text-anchor="middle">по дороге,</text>
  <text x="250" y="130" font-family="Georgia, serif" font-size="9" fill="#2e7d32" text-anchor="middle">А руки</text>
  <text x="250" y="145" font-family="Georgia, serif" font-size="9" fill="#2e7d32" text-anchor="middle">готовят обед?</text>
  
  <!-- Steps -->
  <rect x="30" y="190" width="340" height="95" fill="white" stroke="#81c784" stroke-width="2" rx="10"/>
  
  <circle cx="60" cy="220" r="15" fill="#a5d6a7">
    <animate attributeName="fill" values="#a5d6a7;#81c784;#a5d6a7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="60" y="225" font-family="Arial" font-size="12" text-anchor="middle">1</text>
  <text x="85" y="225" font-family="Arial" font-size="11" fill="#2e7d32">Прочитай вслух 2-3 раза</text>
  
  <circle cx="60" cy="255" r="15" fill="#a5d6a7">
    <animate attributeName="fill" values="#81c784;#a5d6a7;#81c784" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="60" y="260" font-family="Arial" font-size="12" text-anchor="middle">2</text>
  <text x="85" y="260" font-family="Arial" font-size="11" fill="#2e7d32">Представь картинку</text>
  
  <circle cx="230" cy="220" r="15" fill="#a5d6a7">
    <animate attributeName="fill" values="#a5d6a7;#81c784;#a5d6a7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="230" y="225" font-family="Arial" font-size="12" text-anchor="middle">3</text>
  <text x="255" y="225" font-family="Arial" font-size="11" fill="#2e7d32">Повтори по строчке</text>
  
  <circle cx="230" cy="255" r="15" fill="#a5d6a7">
    <animate attributeName="fill" values="#81c784;#a5d6a7;#81c784" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="230" y="260" font-family="Arial" font-size="12" text-anchor="middle">4</text>
  <text x="255" y="260" font-family="Arial" font-size="11" fill="#2e7d32">Расскажи кому-нибудь!</text>
  
  <!-- Octopus -->
  <circle cx="340" cy="130" r="20" fill="#ff8a65">
    <animate attributeName="cy" values="130;125;130" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="340" y="137" font-family="Arial" font-size="16" text-anchor="middle">🐙</text>
</svg>