<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ff6f00" text-anchor="middle">🦎 Скороговорки Ш-Ж</text>
  
  <!-- Hedgehog for Ш sound -->
  <g transform="translate(40, 80)">
    <ellipse cx="50" cy="50" rx="35" ry="25" fill="#8d6e63">
      <animate attributeName="ry" values="25;28;25" dur="1s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Spikes -->
    <polygon points="30,35 35,20 40,35" fill="#5d4037"/>
    <polygon points="45,30 50,15 55,30" fill="#5d4037"/>
    <polygon points="60,35 65,20 70,35" fill="#5d4037"/>
    <circle cx="70" cy="45" r="8" fill="#a1887f"/>
    <circle cx="73" cy="43" r="2" fill="#333"/>
    <circle cx="78" cy="50" r="3" fill="#333"/>
    <text x="50" y="95" font-family="Arial" font-size="28" fill="#5d4037" text-anchor="middle">Ш</text>
    <text x="50" y="115" font-family="Arial" font-size="10" fill="#4e342e" text-anchor="middle">шипящий</text>
  </g>
  
  <!-- Beetle for Ж sound -->
  <g transform="translate(220, 80)">
    <ellipse cx="50" cy="50" rx="30" ry="20" fill="#4caf50">
      <animate attributeName="fill" values="#4caf50;#66bb6a;#4caf50" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Wings -->
    <line x1="20" y1="40" x2="0" y2="30" stroke="#333" stroke-width="3"/>
    <line x1="20" y1="60" x2="0" y2="70" stroke="#333" stroke-width="3"/>
    <line x1="80" y1="40" x2="100" y2="30" stroke="#333" stroke-width="3"/>
    <line x1="80" y1="60" x2="100" y2="70" stroke="#333" stroke-width="3"/>
    <!-- Antenna -->
    <line x1="45" y1="30" x2="40" y2="15" stroke="#333" stroke-width="2"/>
    <line x1="55" y1="30" x2="60" y2="15" stroke="#333" stroke-width="2"/>
    <circle cx="50" cy="40" r="12" fill="#81c784"/>
    <circle cx="45" cy="38" r="3" fill="#333"/>
    <circle cx="55" cy="38" r="3" fill="#333"/>
    <text x="50" y="90" font-family="Arial" font-size="28" fill="#2e7d32" text-anchor="middle">Ж</text>
    <text x="50" y="110" font-family="Arial" font-size="10" fill="#1b5e20" text-anchor="middle">жужжащий</text>
  </g>
  
  <!-- Examples -->
  <g font-family="Arial" font-size="11">
    <rect x="30" y="180" width="340" height="28" fill="#fff" rx="5" opacity="0.9"/>
    <text x="200" y="198" fill="#e65100" text-anchor="middle">"Шесть мышат в шалаше шуршат"</text>
    
    <rect x="30" y="215" width="340" height="28" fill="#fff" rx="5" opacity="0.9"/>
    <text x="200" y="233" fill="#e65100" text-anchor="middle">"Жужжит жужелица, жужжит да не кружится"</text>
  </g>
  
  <!-- Sound waves -->
  <path d="M100,265 Q150,250 200,265 Q250,280 300,265" stroke="#ff9800" stroke-width="2" fill="none" stroke-dasharray="5,3">
    <animate attributeName="stroke-dashoffset" values="0;-16" dur="0.8s" repeatCount="indefinite"/>
  </path>
</svg>