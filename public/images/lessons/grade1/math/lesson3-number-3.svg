<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    @keyframes wave {
      0%, 100% { transform: rotate(-5deg); }
      50% { transform: rotate(5deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0.3; }
    }
    .number { animation: pulse 2s ease-in-out infinite; transform-origin: center; }
    .rabbit1 { animation: bounce 2s ease-in-out infinite; }
    .rabbit2 { animation: bounce 2s ease-in-out infinite 0.3s; }
    .rabbit3 { animation: bounce 2s ease-in-out infinite 0.6s; }
    .ear { animation: wave 1s ease-in-out infinite; transform-origin: bottom; }
    .eye { animation: blink 3s ease-in-out infinite; }
  </style>
  <!-- Background -->
  <rect width="400" height="400" fill="#fdf4ff" rx="20"/>
  <!-- Decorative elements -->
  <circle cx="60" cy="60" r="15" fill="#f9a8d4" opacity="0.5"/>
  <circle cx="340" cy="70" r="18" fill="#d8b4fe" opacity="0.5"/>
  <circle cx="50" cy="340" r="12" fill="#fdba74" opacity="0.5"/>
  <circle cx="350" cy="350" r="20" fill="#a5f3fc" opacity="0.5"/>
  <!-- Carrot decorations -->
  <g transform="translate(30, 150)">
    <path d="M 15 0 L 20 40 L 10 40 Z" fill="#f97316"/>
    <path d="M 10 0 Q 15 -10 20 0" fill="#22c55e"/>
  </g>
  <g transform="translate(340, 180)">
    <path d="M 15 0 L 20 35 L 10 35 Z" fill="#f97316"/>
    <path d="M 10 0 Q 15 -10 20 0" fill="#22c55e"/>
  </g>
  <!-- Large number 3 -->
  <g class="number">
    <text x="200" y="230" font-size="180" font-weight="bold" fill="url(#grad3)" text-anchor="middle" font-family="Arial, sans-serif">3</text>
  </g>
  <!-- Rabbit 1 -->
  <g class="rabbit1" transform="translate(80, 280)">
    <ellipse cx="25" cy="30" rx="20" ry="25" fill="#faf5ff"/>
    <circle cx="25" cy="10" r="15" fill="#faf5ff"/>
    <ellipse class="ear" cx="18" cy="-15" rx="5" ry="18" fill="#faf5ff"/>
    <ellipse class="ear" cx="32" cy="-15" rx="5" ry="18" fill="#faf5ff"/>
    <circle class="eye" cx="20" cy="8" r="3" fill="#1e293b"/>
    <circle class="eye" cx="30" cy="8" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="15" rx="3" ry="2" fill="#f9a8d4"/>
  </g>
  <!-- Rabbit 2 -->
  <g class="rabbit2" transform="translate(175, 300)">
    <ellipse cx="25" cy="30" rx="20" ry="25" fill="#fff7ed"/>
    <circle cx="25" cy="10" r="15" fill="#fff7ed"/>
    <ellipse class="ear" cx="18" cy="-15" rx="5" ry="18" fill="#fff7ed"/>
    <ellipse class="ear" cx="32" cy="-15" rx="5" ry="18" fill="#fff7ed"/>
    <circle class="eye" cx="20" cy="8" r="3" fill="#1e293b"/>
    <circle class="eye" cx="30" cy="8" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="15" rx="3" ry="2" fill="#f9a8d4"/>
  </g>
  <!-- Rabbit 3 -->
  <g class="rabbit3" transform="translate(270, 280)">
    <ellipse cx="25" cy="30" rx="20" ry="25" fill="#fefce8"/>
    <circle cx="25" cy="10" r="15" fill="#fefce8"/>
    <ellipse class="ear" cx="18" cy="-15" rx="5" ry="18" fill="#fefce8"/>
    <ellipse class="ear" cx="32" cy="-15" rx="5" ry="18" fill="#fefce8"/>
    <circle class="eye" cx="20" cy="8" r="3" fill="#1e293b"/>
    <circle class="eye" cx="30" cy="8" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="15" rx="3" ry="2" fill="#f9a8d4"/>
  </g>
  <!-- Label -->
  <g transform="translate(200, 380)">
    <text x="0" y="0" font-size="18" fill="#c026d3" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ТРИ</text>
  </g>
</svg>