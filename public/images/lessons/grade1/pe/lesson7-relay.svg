<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgPE7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgPE7)"/>
  
  <!-- Running track -->
  <rect x="0" y="180" width="400" height="120" fill="#a5d6a7"/>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2e7d32">Эстафета</text>
  
  <!-- Team 1 (blue) -->
  <g>
    <!-- Runner 1 waiting -->
    <g transform="translate(50, 150)">
      <ellipse cx="0" cy="0" rx="14" ry="22" fill="#42a5f5"/>
      <circle cx="0" cy="-30" r="14" fill="#ffcc80"/>
      <ellipse cx="0" cy="-40" rx="11" ry="8" fill="#5d4037"/>
      <circle cx="-4" cy="-33" r="2" fill="#333"/>
      <circle cx="4" cy="-33" r="2" fill="#333"/>
      <path d="M-3 -25 Q0 -22 3 -25" stroke="#333" stroke-width="1.5" fill="none"/>
      <!-- Hand waiting for baton -->
      <ellipse cx="20" cy="-5" rx="8" ry="5" fill="#42a5f5"/>
    </g>
    
    <!-- Runner 2 running with baton -->
    <g transform="translate(120, 145)">
      <animateTransform attributeName="transform" type="translate" values="120,145;125,143;120,145" dur="0.3s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="14" ry="22" fill="#42a5f5" transform="rotate(-12)"/>
      <circle cx="5" cy="-30" r="14" fill="#ffcc80"/>
      <ellipse cx="5" cy="-40" rx="11" ry="8" fill="#5d4037"/>
      <circle cx="1" cy="-33" r="2" fill="#333"/>
      <circle cx="9" cy="-33" r="2" fill="#333"/>
      <ellipse cx="-15" cy="-8" rx="7" ry="4" fill="#42a5f5"/>
      <ellipse cx="18" cy="5" rx="7" ry="4" fill="#42a5f5"/>
      <rect x="-8" y="18" width="5" height="22" rx="2" fill="#1565c0" transform="rotate(-20 -5 29)"/>
      <rect x="3" y="18" width="5" height="22" rx="2" fill="#1565c0" transform="rotate(20 5 29)"/>
      <!-- Baton -->
      <rect x="25" y="-10" width="25" height="6" rx="3" fill="#ff5722"/>
    </g>
    
    <!-- Team label -->
    <text x="80" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">Команда А</text>
  </g>
  
  <!-- Team 2 (red) -->
  <g>
    <!-- Runner 3 waiting -->
    <g transform="translate(250, 150)">
      <ellipse cx="0" cy="0" rx="14" ry="22" fill="#ef5350"/>
      <circle cx="0" cy="-30" r="14" fill="#ffcc80"/>
      <path d="M-10 -40 Q0 -50 10 -40 Q6 -35 0 -36 Q-6 -35 -10 -40" fill="#8d6e63"/>
      <circle cx="-4" cy="-33" r="2" fill="#333"/>
      <circle cx="4" cy="-33" r="2" fill="#333"/>
      <path d="M-3 -25 Q0 -22 3 -25" stroke="#333" stroke-width="1.5" fill="none"/>
      <ellipse cx="20" cy="-5" rx="8" ry="5" fill="#ef5350"/>
    </g>
    
    <!-- Runner 4 running with baton -->
    <g transform="translate(320, 145)">
      <animateTransform attributeName="transform" type="translate" values="320,145;327,143;320,145" dur="0.3s" repeatCount="indefinite"/>
      <ellipse cx="0" cy="0" rx="14" ry="22" fill="#ef5350" transform="rotate(-12)"/>
      <circle cx="5" cy="-30" r="14" fill="#ffcc80"/>
      <path d="M-5 -40 Q5 -50 15 -40 Q10 -35 5 -36 Q0 -35 -5 -40" fill="#8d6e63"/>
      <circle cx="1" cy="-33" r="2" fill="#333"/>
      <circle cx="9" cy="-33" r="2" fill="#333"/>
      <ellipse cx="-15" cy="-8" rx="7" ry="4" fill="#ef5350"/>
      <ellipse cx="18" cy="5" rx="7" ry="4" fill="#ef5350"/>
      <rect x="-8" y="18" width="5" height="22" rx="2" fill="#c62828" transform="rotate(-20 -5 29)"/>
      <rect x="3" y="18" width="5" height="22" rx="2" fill="#c62828" transform="rotate(20 5 29)"/>
      <!-- Baton -->
      <rect x="25" y="-10" width="25" height="6" rx="3" fill="#ff5722"/>
    </g>
    
    <!-- Team label -->
    <text x="300" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c62828">Команда Б</text>
  </g>
  
  <!-- Baton close-up -->
  <g transform="translate(200, 80)">
    <rect x="-30" y="-5" width="60" height="12" rx="6" fill="#ff7043" stroke="#e64a19" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-5;5;-5" dur="1s" repeatCount="indefinite"/>
    </rect>
    <text y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bf360c">Эстафетная палочка</text>
  </g>
  
  <!-- Arrow showing handoff -->
  <g transform="translate(185, 150)">
    <path d="M0 0 L20 -10 L20 -5 L40 -5 L40 5 L20 5 L20 10 Z" fill="#4caf50" opacity="0.6">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="0.8s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Finish line -->
  <g transform="translate(380, 180)">
    <rect x="-5" y="0" width="10" height="100" fill="white"/>
    <rect x="-5" y="0" width="5" height="10" fill="#333"/>
    <rect x="0" y="10" width="5" height="10" fill="#333"/>
    <rect x="-5" y="20" width="5" height="10" fill="#333"/>
    <rect x="0" y="30" width="5" height="10" fill="#333"/>
    <rect x="-5" y="40" width="5" height="10" fill="#333"/>
    <rect x="0" y="50" width="5" height="10" fill="#333"/>
    <rect x="-5" y="60" width="5" height="10" fill="#333"/>
    <rect x="0" y="70" width="5" height="10" fill="#333"/>
    <rect x="-5" y="80" width="5" height="10" fill="#333"/>
    <rect x="0" y="90" width="5" height="10" fill="#333"/>
  </g>
  
  <!-- Medal -->
  <g transform="translate(370, 50)">
    <circle r="20" fill="#ffd54f" stroke="#ff8f00" stroke-width="2"/>
    <text y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#e65100">1</text>
  </g>
  
  <!-- Label -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2e7d32">Командные соревнования</text>
</svg>