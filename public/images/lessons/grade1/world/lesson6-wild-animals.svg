<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    @keyframes walk {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
    @keyframes hop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes fly {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-5px) rotate(3deg); }
    }
    @keyframes sleep {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .walk { animation: walk 2s ease-in-out infinite; }
    .hop { animation: hop 1s ease-in-out infinite; }
    .fly { animation: fly 2s ease-in-out infinite; }
    .sleep { animation: sleep 3s ease-in-out infinite; }
  </style>
  <!-- Background - forest -->
  <rect width="400" height="400" fill="#14532d" rx="20"/>
  <!-- Trees -->
  <g opacity="0.4">
    <polygon points="50,0 20,100 80,100" fill="#166534"/>
    <polygon points="350,20 320,120 380,120" fill="#166534"/>
    <polygon points="180,-10 150,90 210,90" fill="#166534"/>
  </g>
  <!-- Ground -->
  <ellipse cx="200" cy="385" rx="190" ry="20" fill="#4d7c0f"/>
  <rect width="400" height="30" fill="#4d7c0f" y="370"/>
  <!-- Title -->
  <text x="200" y="35" font-size="16" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ДИКИЕ ЖИВОТНЫЕ</text>
  <text x="200" y="50" font-size="10" fill="#86efac" text-anchor="middle" font-family="Arial, sans-serif">🌲 Живут в лесу сами по себе</text>
  <!-- Bear -->
  <g class="sleep" transform="translate(20, 80)">
    <!-- Body -->
    <ellipse cx="50" cy="80" rx="45" ry="35" fill="#78350f"/>
    <!-- Head -->
    <circle cx="90" cy="60" r="30" fill="#78350f"/>
    <!-- Ears -->
    <circle cx="70" cy="40" r="12" fill="#78350f"/>
    <circle cx="110" cy="40" r="12" fill="#78350f"/>
    <!-- Snout -->
    <ellipse cx="95" cy="70" rx="12" ry="10" fill="#a8a29e"/>
    <!-- Nose -->
    <ellipse cx="95" cy="68" rx="5" ry="4" fill="#1e293b"/>
    <!-- Closed eyes (sleeping) -->
    <path d="M 80 55 Q 85 50 90 55" stroke="#1e293b" stroke-width="2" fill="none"/>
    <path d="M 100 55 Q 105 50 110 55" stroke="#1e293b" stroke-width="2" fill="none"/>
    <!-- Zzz -->
    <text x="120" y="30" font-size="16" fill="#fef3c7" font-family="Arial, sans-serif">💤</text>
    <!-- Cave (berloga) -->
    <ellipse cx="20" cy="90" rx="25" ry="30" fill="#292524"/>
    <text x="60" y="130" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Медведь 🐻</text>
    <text x="60" y="143" font-size="8" fill="#86efac" text-anchor="middle" font-family="Arial, sans-serif">Спит в берлоге</text>
  </g>
  <!-- Fox -->
  <g class="walk" transform="translate(150, 90)">
    <!-- Body -->
    <ellipse cx="35" cy="50" rx="30" ry="20" fill="#f97316"/>
    <!-- Head -->
    <ellipse cx="60" cy="40" rx="18" ry="15" fill="#f97316"/>
    <!-- Ears -->
    <polygon points="50,25 45,10 55,20" fill="#f97316"/>
    <polygon points="70,25 75,10 65,20" fill="#f97316"/>
    <!-- Snout -->
    <ellipse cx="70" cy="45" rx="8" ry="5" fill="#fef3c7"/>
    <!-- Nose -->
    <circle cx="75" cy="43" r="3" fill="#1e293b"/>
    <!-- Eyes -->
    <circle cx="55" cy="38" r="3" fill="#1e293b"/>
    <circle cx="65" cy="38" r="3" fill="#1e293b"/>
    <!-- Tail (fluffy) -->
    <ellipse cx="5" cy="45" rx="20" ry="10" fill="#fef3c7"/>
    <text x="40" y="85" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Лиса 🦊</text>
    <text x="40" y="98" font-size="8" fill="#86efac" text-anchor="middle" font-family="Arial, sans-serif">Живёт в норе</text>
  </g>
  <!-- Wolf -->
  <g class="walk" style="animation-delay: 0.5s" transform="translate(260, 85)">
    <!-- Body -->
    <ellipse cx="35" cy="50" rx="32" ry="22" fill="#6b7280"/>
    <!-- Head -->
    <ellipse cx="65" cy="35" rx="18" ry="14" fill="#6b7280"/>
    <!-- Ears -->
    <polygon points="55,20 50,5 60,18" fill="#6b7280"/>
    <polygon points="75,20 80,5 70,18" fill="#6b7280"/>
    <!-- Snout -->
    <ellipse cx="75" cy="40" rx="10" ry="6" fill="#9ca3af"/>
    <!-- Nose -->
    <circle cx="82" cy="38" r="3" fill="#1e293b"/>
    <!-- Eyes -->
    <circle cx="60" cy="32" r="3" fill="#fbbf24"/>
    <circle cx="70" cy="32" r="3" fill="#fbbf24"/>
    <!-- Tail -->
    <path d="M 3 45 Q -10 35 0 30" stroke="#6b7280" stroke-width="8" fill="none"/>
    <text x="40" y="85" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Волк 🐺</text>
    <text x="40" y="98" font-size="8" fill="#86efac" text-anchor="middle" font-family="Arial, sans-serif">Живёт в логове</text>
  </g>
  <!-- Hare -->
  <g class="hop" transform="translate(30, 200)">
    <!-- Body -->
    <ellipse cx="30" cy="50" rx="22" ry="18" fill="#e5e7eb"/>
    <!-- Head -->
    <circle cx="45" cy="35" r="16" fill="#e5e7eb"/>
    <!-- Ears (long) -->
    <ellipse cx="35" cy="10" rx="6" ry="22" fill="#e5e7eb"/>
    <ellipse cx="55" cy="10" rx="6" ry="22" fill="#e5e7eb"/>
    <ellipse cx="35" cy="12" rx="3" ry="15" fill="#fecaca"/>
    <ellipse cx="55" cy="12" rx="3" ry="15" fill="#fecaca"/>
    <!-- Eyes -->
    <circle cx="40" cy="32" r="4" fill="#1e293b"/>
    <circle cx="52" cy="32" r="4" fill="#1e293b"/>
    <!-- Nose -->
    <ellipse cx="48" cy="40" rx="3" ry="2" fill="#f472b6"/>
    <!-- Tail -->
    <circle cx="8" cy="50" r="10" fill="#f8fafc"/>
    <text x="30" y="85" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Заяц 🐰</text>
    <text x="30" y="98" font-size="8" fill="#86efac" text-anchor="middle" font-family="Arial, sans-serif">Быстро бегает</text>
  </g>
  <!-- Squirrel -->
  <g class="hop" style="animation-delay: 0.3s" transform="translate(130, 190)">
    <!-- Body -->
    <ellipse cx="25" cy="50" rx="18" ry="15" fill="#f97316"/>
    <!-- Head -->
    <circle cx="35" cy="35" r="14" fill="#f97316"/>
    <!-- Ears with tufts -->
    <ellipse cx="28" cy="22" rx="5" ry="10" fill="#f97316"/>
    <ellipse cx="42" cy="22" rx="5" ry="10" fill="#f97316"/>
    <polygon points="25,12 22,5 28,15" fill="#fef3c7"/>
    <polygon points="45,12 48,5 42,15" fill="#fef3c7"/>
    <!-- Eyes -->
    <circle cx="32" cy="33" r="3" fill="#1e293b"/>
    <circle cx="40" cy="33" r="3" fill="#1e293b"/>
    <!-- Nose -->
    <circle cx="40" cy="40" r="2" fill="#1e293b"/>
    <!-- Fluffy tail -->
    <path d="M 7 45 Q -15 30 -10 60 Q -5 80 15 70" fill="#f97316"/>
    <!-- Acorn -->
    <ellipse cx="55" cy="50" rx="8" ry="10" fill="#92400e"/>
    <rect x="50" y="38" width="10" height="6" fill="#78350f" rx="2"/>
    <text x="25" y="85" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Белка 🐿️</text>
    <text x="25" y="98" font-size="8" fill="#86efac" text-anchor="middle" font-family="Arial, sans-serif">Делает запасы</text>
  </g>
  <!-- Hedgehog -->
  <g transform="translate(240, 200)">
    <!-- Body with spines -->
    <ellipse cx="30" cy="50" rx="28" ry="22" fill="#78350f"/>
    <!-- Spines -->
    <g stroke="#1e293b" stroke-width="2">
      <line x1="10" y1="35" x2="0" y2="25"/>
      <line x1="20" y1="30" x2="15" y2="18"/>
      <line x1="30" y1="28" x2="30" y2="15"/>
      <line x1="40" y1="30" x2="45" y2="18"/>
      <line x1="50" y1="35" x2="60" y2="25"/>
      <line x1="8" y1="50" x2="-5" y2="50"/>
      <line x1="52" y1="50" x2="65" y2="50"/>
    </g>
    <!-- Face -->
    <ellipse cx="45" cy="55" rx="15" ry="12" fill="#fef3c7"/>
    <!-- Nose -->
    <circle cx="55" cy="52" r="4" fill="#1e293b"/>
    <!-- Eye -->
    <circle cx="42" cy="50" r="3" fill="#1e293b"/>
    <circle cx="43" cy="49" r="1" fill="#fef3c7"/>
    <!-- Mushroom on back -->
    <ellipse cx="20" cy="40" rx="8" ry="5" fill="#dc2626"/>
    <rect x="17" y="40" width="6" height="8" fill="#fef3c7"/>
    <text x="30" y="90" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Ёж 🦔</text>
    <text x="30" y="103" font-size="8" fill="#86efac" text-anchor="middle" font-family="Arial, sans-serif">Колючие иголки</text>
  </g>
  <!-- Deer -->
  <g class="walk" style="animation-delay: 1s" transform="translate(320, 180)">
    <!-- Body -->
    <ellipse cx="30" cy="60" rx="25" ry="20" fill="#b45309"/>
    <!-- Neck -->
    <rect x="45" y="25" width="12" height="40" fill="#b45309"/>
    <!-- Head -->
    <ellipse cx="55" cy="20" rx="12" ry="10" fill="#b45309"/>
    <!-- Antlers -->
    <path d="M 48 10 L 40 0 M 40 0 L 35 5 M 40 0 L 45 -5" stroke="#6b7280" stroke-width="2" fill="none"/>
    <path d="M 62 10 L 70 0 M 70 0 L 75 5 M 70 0 L 65 -5" stroke="#6b7280" stroke-width="2" fill="none"/>
    <!-- Eyes -->
    <circle cx="52" cy="18" r="2" fill="#1e293b"/>
    <circle cx="60" cy="18" r="2" fill="#1e293b"/>
    <!-- Nose -->
    <ellipse cx="56" cy="25" rx="3" ry="2" fill="#1e293b"/>
    <!-- Legs -->
    <rect x="15" y="75" width="5" height="25" fill="#b45309"/>
    <rect x="40" y="75" width="5" height="25" fill="#b45309"/>
    <!-- Tail -->
    <ellipse cx="5" cy="55" rx="5" ry="8" fill="#fef3c7"/>
    <text x="30" y="115" font-size="10" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Олень 🦌</text>
  </g>
  <!-- Owl on tree -->
  <g class="fly" transform="translate(350, 60)">
    <rect x="5" y="0" width="8" height="60" fill="#78350f"/>
    <ellipse cx="20" cy="30" rx="18" ry="15" fill="#78716c"/>
    <circle cx="20" cy="22" r="12" fill="#78716c"/>
    <!-- Eyes (big) -->
    <circle cx="15" cy="20" r="6" fill="#fef3c7"/>
    <circle cx="25" cy="20" r="6" fill="#fef3c7"/>
    <circle cx="15" cy="20" r="3" fill="#1e293b"/>
    <circle cx="25" cy="20" r="3" fill="#1e293b"/>
    <!-- Beak -->
    <polygon points="20,28 17,35 23,35" fill="#f59e0b"/>
    <!-- Ears -->
    <polygon points="8,12 5,0 15,15" fill="#78716c"/>
    <polygon points="32,12 35,0 25,15" fill="#78716c"/>
    <text x="20" y="60" font-size="8" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">Сова 🦉</text>
  </g>
  <!-- Label -->
  <text x="200" y="395" font-size="9" fill="#fef3c7" text-anchor="middle" font-family="Arial, sans-serif">🌲 Сами добывают еду и строят жилища</text>
</svg>