<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#424242"/>
      <stop offset="100%" style="stop-color:#212121"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#81D4FA"/>
  
  <!-- Ground -->
  <rect x="0" y="200" width="400" height="100" fill="#7CB342"/>
  
  <!-- Road -->
  <rect x="50" y="200" width="300" height="80" fill="url(#roadGrad)"/>
  
  <!-- Crosswalk (zebra) -->
  <g>
    <rect x="150" y="205" width="20" height="70" fill="white"/>
    <rect x="180" y="205" width="20" height="70" fill="white"/>
    <rect x="210" y="205" width="20" height="70" fill="white"/>
    <rect x="240" y="205" width="20" height="70" fill="white"/>
  </g>
  
  <!-- Traffic Light -->
  <g transform="translate(340, 80)">
    <!-- Pole -->
    <rect x="-5" y="0" width="10" height="120" fill="#757575"/>
    
    <!-- Traffic light box -->
    <rect x="-25" y="-10" width="50" height="90" fill="#37474F" rx="5"/>
    
    <!-- Red light -->
    <circle cx="0" cy="10" r="15" fill="#F44336">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="10" r="12" fill="#EF5350"/>
    
    <!-- Yellow light (dim) -->
    <circle cx="0" cy="40" r="15" fill="#424242"/>
    
    <!-- Green light (dim) -->
    <circle cx="0" cy="70" r="15" fill="#424242"/>
    
    <!-- Label -->
    <text x="0" y="100" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" font-weight="bold" fill="#F44336">СТОЙ!</text>
  </g>
  
  <!-- Child figure -->
  <g transform="translate(130, 185)">
    <!-- Body -->
    <rect x="-8" y="0" width="16" height="25" fill="#2196F3" rx="3"/>
    
    <!-- Head -->
    <circle cx="0" cy="-12" r="14" fill="#FFCC80"/>
    
    <!-- Hair -->
    <ellipse cx="0" cy="-22" rx="12" ry="8" fill="#5D4037"/>
    
    <!-- Eyes -->
    <circle cx="-4" cy="-14" r="2" fill="#212121"/>
    <circle cx="4" cy="-14" r="2" fill="#212121"/>
    
    <!-- Smile -->
    <path d="M-5,-8 Q0,-4 5,-8" stroke="#E65100" stroke-width="2" fill="none"/>
    
    <!-- Legs -->
    <rect x="-8" y="25" width="6" height="15" fill="#1565C0"/>
    <rect x="2" y="25" width="6" height="15" fill="#1565C0"/>
    
    <!-- Shoes -->
    <ellipse cx="-5" cy="42" rx="6" ry="4" fill="#212121"/>
    <ellipse cx="5" cy="42" rx="6" ry="4" fill="#212121"/>
    
    <!-- Arm pointing to crosswalk -->
    <line x1="8" y1="8" x2="30" y2="0" stroke="#FFCC80" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Walking figure (on crosswalk) -->
  <g transform="translate(195, 215)">
    <!-- Body -->
    <rect x="-6" y="0" width="12" height="20" fill="#E91E63" rx="2"/>
    
    <!-- Head -->
    <circle cx="0" cy="-10" r="10" fill="#FFCC80"/>
    
    <!-- Hair (girl) -->
    <ellipse cx="0" cy="-18" rx="10" ry="6" fill="#5D4037"/>
    
    <!-- Legs walking -->
    <rect x="-5" y="20" width="4" height="12" fill="#C2185B" transform="rotate(-10 -3 20)"/>
    <rect x="1" y="20" width="4" height="12" fill="#C2185B" transform="rotate(10 3 20)"/>
    
    <!-- Animation for walking -->
    <animateTransform attributeName="transform" type="translate" values="195,215;215,215;235,215" dur="3s" repeatCount="indefinite"/>
  </g>
  
  <!-- Safety rules text bubbles -->
  <style>
    .rule-text { font-family: 'Comic Sans MS', cursive; font-size: 11px; font-weight: bold; }
  </style>
  
  <!-- Rule 1 -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="120" height="35" fill="white" rx="10" stroke="#4CAF50" stroke-width="2"/>
    <text x="60" y="22" text-anchor="middle" class="rule-text" fill="#2E7D32">✓ Смотри на светофор!</text>
  </g>
  
  <!-- Rule 2 -->
  <g transform="translate(170, 40)">
    <rect x="0" y="0" width="130" height="35" fill="white" rx="10" stroke="#FF9800" stroke-width="2"/>
    <text x="65" y="22" text-anchor="middle" class="rule-text" fill="#E65100">✓ Переходи по зебре!</text>
  </g>
  
  <!-- Emergency numbers -->
  <g transform="translate(20, 130)">
    <rect x="0" y="0" width="100" height="60" fill="#FFEBEE" rx="8" stroke="#F44336" stroke-width="2"/>
    <text x="50" y="20" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" font-weight="bold" fill="#C62828">Телефоны:</text>
    <text x="50" y="35" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="11" font-weight="bold" fill="#D32F2F">101 - Пожар</text>
    <text x="50" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="11" font-weight="bold" fill="#D32F2F">112 - Служба</text>
  </g>
  
  <!-- Stop sign -->
  <g transform="translate(60, 235)">
    <polygon points="0,-20 17,-10 17,10 0,20 -17,10 -17,-10" fill="#F44336" stroke="white" stroke-width="3"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="white">СТОП</text>
  </g>
  
  <!-- Warning triangle -->
  <g transform="translate(280, 130)">
    <polygon points="0,-25 25,20 -25,20" fill="#FFEB3B" stroke="#FF9800" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#212121">!</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="295" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="14" font-weight="bold" fill="#1565C0">
    Правила безопасности
  </text>
</svg>