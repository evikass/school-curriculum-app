<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  
  <!-- Background -->
  <rect width="500" height="350" fill="#ecfdf5" rx="15"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="30" fill="#059669" opacity="0.15"/>
  <circle cx="450" cy="300" r="35" fill="#059669" opacity="0.1"/>
  
  <!-- Title -->
  <rect x="120" y="10" width="260" height="40" fill="#059669" rx="10"/>
  <text x="250" y="28" font-size="18" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">👨‍⚕️ ДОКТОР АЙБОЛИТ</text>
  <text x="250" y="45" font-size="11" fill="#d1fae5" text-anchor="middle" font-family="Arial, sans-serif">К.И. Чуковский</text>
  
  <!-- Doctor Aybolit - animated (NO static transform, only animateTransform) -->
  <g>
    <!-- Initial position set via animateTransform -->
    <animateTransform attributeName="transform" type="translate" values="50,80;50,75;50,80" dur="3s" repeatCount="indefinite"/>
    
    <!-- Body (white coat) -->
    <rect x="20" y="70" width="70" height="90" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2" rx="5"/>
    
    <!-- Head -->
    <circle cx="55" cy="45" r="28" fill="#fef3c7"/>
    
    <!-- Hat -->
    <ellipse cx="55" cy="22" rx="25" ry="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="35" y="15" width="40" height="10" fill="#f8fafc"/>
    
    <!-- Glasses -->
    <circle cx="45" cy="42" r="10" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <circle cx="65" cy="42" r="10" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="55" y1="42" x2="55" y2="42" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="35" y1="42" x2="25" y2="40" stroke="#0ea5e9" stroke-width="2"/>
    <line x1="75" y1="42" x2="85" y2="40" stroke="#0ea5e9" stroke-width="2"/>
    
    <!-- Eyes -->
    <circle cx="45" cy="42" r="3" fill="#1e293b"/>
    <circle cx="65" cy="42" r="3" fill="#1e293b"/>
    
    <!-- Smile -->
    <path d="M 45 58 Q 55 68 65 58" stroke="#dc2626" stroke-width="2" fill="none"/>
    
    <!-- Beard -->
    <path d="M 35 58 Q 55 80 75 58" fill="#e5e7eb"/>
    
    <!-- Cross on coat -->
    <rect x="50" y="85" width="10" height="25" fill="#dc2626"/>
    <rect x="42" y="93" width="26" height="10" fill="#dc2626"/>
    
    <!-- Medical bag -->
    <rect x="85" y="110" width="22" height="18" fill="#78350f" rx="3"/>
    <circle cx="96" cy="119" r="3" fill="#fbbf24"/>
  </g>
  
  <!-- Animals queue - animated -->
  <!-- Fox -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="180,95;180,90;180,95" dur="2s" repeatCount="indefinite" begin="0s"/>
    <ellipse cx="25" cy="35" rx="18" ry="13" fill="#f97316"/>
    <polygon points="12,18 25,5 38,18" fill="#f97316"/>
    <polygon points="13,12 10,2 18,14" fill="#f97316"/>
    <polygon points="37,12 40,2 32,14" fill="#f97316"/>
    <circle cx="20" cy="20" r="3" fill="#1e293b"/>
    <circle cx="30" cy="20" r="3" fill="#1e293b"/>
    <ellipse cx="25" cy="28" rx="4" ry="3" fill="#1e293b"/>
    <text x="25" y="58" font-size="9" fill="#c2410c" text-anchor="middle" font-family="Arial, sans-serif">🦊 Лиса</text>
  </g>
  
  <!-- Rabbit -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="240,95;240,88;240,95" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    <ellipse cx="22" cy="38" rx="16" ry="18" fill="#faf5ff"/>
    <circle cx="22" cy="22" r="14" fill="#faf5ff"/>
    <ellipse cx="16" cy="6" rx="5" ry="14" fill="#faf5ff"/>
    <ellipse cx="28" cy="6" rx="5" ry="14" fill="#faf5ff"/>
    <circle cx="17" cy="20" r="3" fill="#1e293b"/>
    <circle cx="27" cy="20" r="3" fill="#1e293b"/>
    <ellipse cx="22" cy="28" rx="4" ry="2" fill="#f9a8d4"/>
    <!-- Bandage -->
    <rect x="12" y="32" width="18" height="4" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
    <text x="22" y="65" font-size="9" fill="#7c3aed" text-anchor="middle" font-family="Arial, sans-serif">🐰 Зайка</text>
  </g>
  
  <!-- Dog -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="300,95;300,90;300,95" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    <ellipse cx="22" cy="32" rx="20" ry="16" fill="#a8a29e"/>
    <circle cx="22" cy="18" r="14" fill="#a8a29e"/>
    <ellipse cx="8" cy="6" rx="7" ry="10" fill="#a8a29e"/>
    <ellipse cx="36" cy="6" rx="7" ry="10" fill="#a8a29e"/>
    <circle cx="17" cy="16" r="3" fill="#1e293b"/>
    <circle cx="27" cy="16" r="3" fill="#1e293b"/>
    <ellipse cx="22" cy="25" rx="5" ry="3" fill="#1e293b"/>
    <!-- Tongue -->
    <ellipse cx="22" cy="32" rx="3" ry="5" fill="#f472b6"/>
    <text x="22" y="58" font-size="9" fill="#78716c" text-anchor="middle" font-family="Arial, sans-serif">🐕 Барбос</text>
  </g>
  
  <!-- African animals section -->
  <rect x="30" y="185" width="440" height="95" fill="#d1fae5" rx="10"/>
  <text x="250" y="205" font-size="12" fill="#047857" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">🌍 Животные из Африки:</text>
  
  <!-- Hippo -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="55,215;55,212;55,215" dur="3s" repeatCount="indefinite"/>
    <ellipse cx="25" cy="28" rx="24" ry="18" fill="#9ca3af"/>
    <ellipse cx="25" cy="16" rx="18" ry="12" fill="#9ca3af"/>
    <ellipse cx="16" cy="14" rx="5" ry="4" fill="#fef3c7"/>
    <ellipse cx="34" cy="14" rx="5" ry="4" fill="#fef3c7"/>
    <circle cx="16" cy="12" r="2" fill="#1e293b"/>
    <circle cx="34" cy="12" r="2" fill="#1e293b"/>
    <text x="25" y="55" font-size="9" fill="#6b7280" text-anchor="middle" font-family="Arial, sans-serif">🦛 Бегемот</text>
  </g>
  
  <!-- Elephant -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="130,210;130,207;130,210" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    <ellipse cx="30" cy="30" rx="26" ry="18" fill="#a8a29e"/>
    <circle cx="18" cy="18" r="15" fill="#a8a29e"/>
    <ellipse cx="3" cy="30" rx="18" ry="5" fill="#a8a29e"/>
    <circle cx="12" cy="14" r="4" fill="#fef3c7"/>
    <circle cx="26" cy="16" r="4" fill="#fef3c7"/>
    <circle cx="12" cy="14" r="2" fill="#1e293b"/>
    <circle cx="26" cy="16" r="2" fill="#1e293b"/>
    <text x="30" y="58" font-size="9" fill="#78716c" text-anchor="middle" font-family="Arial, sans-serif">🐘 Слон</text>
  </g>
  
  <!-- Lion -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="210,210;210,205;210,210" dur="2s" repeatCount="indefinite" begin="1s"/>
    <ellipse cx="22" cy="30" rx="18" ry="14" fill="#fbbf24"/>
    <circle cx="22" cy="18" r="16" fill="#f59e0b"/>
    <circle cx="22" cy="18" r="10" fill="#fbbf24"/>
    <circle cx="18" cy="16" r="2" fill="#1e293b"/>
    <circle cx="26" cy="16" r="2" fill="#1e293b"/>
    <ellipse cx="22" cy="22" rx="2" ry="2" fill="#1e293b"/>
    <text x="22" y="55" font-size="9" fill="#b45309" text-anchor="middle" font-family="Arial, sans-serif">🦁 Лев</text>
  </g>
  
  <!-- Giraffe -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="280,205;280,202;280,205" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    <ellipse cx="18" cy="45" rx="12" ry="10" fill="#fbbf24"/>
    <rect x="13" y="15" width="10" height="30" fill="#fbbf24"/>
    <circle cx="18" cy="10" r="9" fill="#fbbf24"/>
    <circle cx="14" cy="8" r="2" fill="#1e293b"/>
    <circle cx="22" cy="8" r="2" fill="#1e293b"/>
    <!-- Spots -->
    <circle cx="18" cy="30" r="3" fill="#b45309"/>
    <circle cx="16" cy="22" r="2" fill="#b45309"/>
    <circle cx="20" cy="40" r="2" fill="#b45309"/>
    <text x="18" y="65" font-size="9" fill="#b45309" text-anchor="middle" font-family="Arial, sans-serif">🦒 Жираф</text>
  </g>
  
  <!-- Monkey -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="350,215;350,210;350,215" dur="2s" repeatCount="indefinite" begin="0.8s"/>
    <ellipse cx="20" cy="28" rx="16" ry="12" fill="#92400e"/>
    <circle cx="20" cy="15" r="12" fill="#a16207"/>
    <ellipse cx="20" cy="20" rx="6" ry="5" fill="#fef3c7"/>
    <circle cx="15" cy="12" r="2" fill="#1e293b"/>
    <circle cx="25" cy="12" r="2" fill="#1e293b"/>
    <!-- Ears -->
    <circle cx="8" cy="10" r="5" fill="#a16207"/>
    <circle cx="32" cy="10" r="5" fill="#a16207"/>
    <text x="20" y="50" font-size="9" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif">🐒 Мартышка</text>
  </g>
  
  <!-- Heart with cross - scale animation -->
  <g transform="translate(420, 70)">
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="2s" repeatCount="indefinite" additive="sum"/>
    <path d="M 25 15 C 25 10, 15 5, 10 15 C 5 25, 15 35, 25 45 C 35 35, 45 25, 40 15 C 35 5, 25 10, 25 15" fill="#dc2626"/>
    <rect x="22" y="20" width="6" height="15" fill="#fef3c7"/>
    <rect x="17" y="25" width="16" height="5" fill="#fef3c7"/>
  </g>
  
  <!-- Quote -->
  <rect x="80" y="295" width="340" height="40" fill="#059669" rx="8"/>
  <text x="250" y="312" font-size="10" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">«Добрый доктор Айболит!</text>
  <text x="250" y="326" font-size="10" fill="#d1fae5" text-anchor="middle" font-family="Arial, sans-serif">Он под деревом сидит... Приходи к нему лечиться...»</text>
</svg>