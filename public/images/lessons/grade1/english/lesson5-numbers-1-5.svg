<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad5)"/>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="24" font-weight="bold" fill="#2e7d32">Numbers 1-5 / Числа 1-5</text>
  
  <!-- Number 1 -->
  <g transform="translate(50, 110)">
    <circle r="35" fill="#fff" stroke="#4caf50" stroke-width="3">
      <animate attributeName="r" values="33;38;33" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#2e7d32">1</text>
    <text y="60" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" font-weight="bold" fill="#1b5e20">one</text>
    <!-- Single apple -->
    <circle cx="0" cy="85" r="12" fill="#f44336"/>
    <ellipse cx="3" cy="75" rx="3" ry="6" fill="#4caf50"/>
  </g>
  
  <!-- Number 2 -->
  <g transform="translate(120, 110)">
    <circle r="35" fill="#fff" stroke="#2196f3" stroke-width="3">
      <animate attributeName="r" values="33;38;33" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <text y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#1565c0">2</text>
    <text y="60" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" font-weight="bold" fill="#0d47a1">two</text>
    <!-- Two apples -->
    <circle cx="-10" cy="88" r="10" fill="#f44336"/>
    <circle cx="10" cy="88" r="10" fill="#f44336"/>
    <ellipse cx="-7" cy="80" rx="2" ry="4" fill="#4caf50"/>
    <ellipse cx="13" cy="80" rx="2" ry="4" fill="#4caf50"/>
  </g>
  
  <!-- Number 3 -->
  <g transform="translate(200, 110)">
    <circle r="35" fill="#fff" stroke="#ff9800" stroke-width="3">
      <animate attributeName="r" values="33;38;33" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <text y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#e65100">3</text>
    <text y="60" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" font-weight="bold" fill="#e65100">three</text>
    <!-- Three apples -->
    <circle cx="0" cy="78" r="9" fill="#f44336"/>
    <circle cx="-12" cy="95" r="9" fill="#f44336"/>
    <circle cx="12" cy="95" r="9" fill="#f44336"/>
  </g>
  
  <!-- Number 4 -->
  <g transform="translate(280, 110)">
    <circle r="35" fill="#fff" stroke="#9c27b0" stroke-width="3">
      <animate attributeName="r" values="33;38;33" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <text y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#7b1fa2">4</text>
    <text y="60" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" font-weight="bold" fill="#7b1fa2">four</text>
    <!-- Four stars -->
    <polygon points="0,75 3,85 13,85 5,92 8,102 0,96 -8,102 -5,92 -13,85 -3,85" fill="#ffd54f"/>
    <polygon points="-15,90 -12,98 -4,98 -10,103 -8,111 -15,107 -22,111 -20,103 -26,98 -18,98" fill="#ffd54f" transform="scale(0.7) translate(-5,30)"/>
    <polygon points="15,90 18,98 26,98 20,103 22,111 15,107 8,111 10,103 4,98 12,98" fill="#ffd54f" transform="scale(0.7) translate(5,30)"/>
    <polygon points="0,105 2,110 8,110 4,114 5,120 0,117 -5,120 -4,114 -8,110 -2,110" fill="#ffd54f"/>
  </g>
  
  <!-- Number 5 -->
  <g transform="translate(350, 110)">
    <circle r="35" fill="#fff" stroke="#f44336" stroke-width="3">
      <animate attributeName="r" values="33;38;33" dur="1.5s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <text y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#c62828">5</text>
    <text y="60" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" font-weight="bold" fill="#c62828">five</text>
    <!-- Hand showing 5 -->
    <g transform="translate(0, 80)">
      <ellipse cx="0" cy="10" rx="18" ry="12" fill="#ffcc80"/>
      <rect x="-15" y="-20" width="5" height="18" rx="2" fill="#ffcc80"/>
      <rect x="-7" y="-25" width="5" height="23" rx="2" fill="#ffcc80"/>
      <rect x="1" y="-25" width="5" height="23" rx="2" fill="#ffcc80"/>
      <rect x="9" y="-23" width="5" height="21" rx="2" fill="#ffcc80"/>
      <ellipse cx="17" cy="-5" rx="5" ry="10" fill="#ffcc80"/>
    </g>
  </g>
  
  <!-- Counting hand at bottom -->
  <g transform="translate(200, 250)">
    <text text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="16" fill="#2e7d32">
      Count with me! Считай со мной!
    </text>
  </g>
  
  <!-- Decorative elements -->
  <g>
    <circle cx="30" cy="60" r="8" fill="#4caf50" opacity="0.5">
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="370" cy="60" r="8" fill="#4caf50" opacity="0.5">
      <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>
</svg>