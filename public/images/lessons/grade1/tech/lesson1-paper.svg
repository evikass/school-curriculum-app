<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA"/>
      <stop offset="100%" style="stop-color:#E0E0E0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#E3F2FD"/>
  
  <!-- Table -->
  <rect x="20" y="200" width="360" height="80" fill="#8D6E63"/>
  <rect x="20" y="195" width="360" height="10" fill="#A1887F"/>
  
  <!-- Paper types -->
  
  <!-- White paper sheet -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="70" height="90" fill="url(#paperGrad)" stroke="#BDBDBD" stroke-width="1">
      <animateTransform attributeName="transform" type="rotate" values="0 35 45;-3 35 45;0 35 45" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="35" y="110" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">Белая</text>
  </g>
  
  <!-- Colored papers -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="50" height="70" fill="#F44336" rx="2">
      <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="5" width="50" height="70" fill="#2196F3" rx="2"/>
    <rect x="20" y="10" width="50" height="70" fill="#4CAF50" rx="2"/>
    <text x="35" y="100" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">Цветная</text>
  </g>
  
  <!-- Cardboard -->
  <g transform="translate(250, 110)">
    <rect x="0" y="0" width="80" height="70" fill="#A1887F" rx="2"/>
    <rect x="5" y="5" width="70" height="60" fill="#8D6E63" rx="1"/>
    <!-- Corrugated pattern -->
    <g stroke="#795548" stroke-width="1" opacity="0.5">
      <path d="M10,15 Q20,20 30,15 Q40,10 50,15 Q60,20 70,15"/>
      <path d="M10,30 Q20,35 30,30 Q40,25 50,30 Q60,35 70,30"/>
      <path d="M10,45 Q20,50 30,45 Q40,40 50,45 Q60,50 70,45"/>
    </g>
    <text x="40" y="90" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">Картон</text>
  </g>
  
  <!-- Paper properties icons -->
  
  <!-- Can bend -->
  <g transform="translate(80, 50)">
    <rect x="0" y="0" width="40" height="30" fill="#FFF9C4" stroke="#FBC02D" stroke-width="2" rx="3"/>
    <path d="M0,15 Q20,5 40,15" stroke="#FBC02D" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
    <text x="20" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#F57F17">Сгибать</text>
  </g>
  
  <!-- Can cut -->
  <g transform="translate(180, 50)">
    <rect x="0" y="0" width="40" height="30" fill="#FFECB3" stroke="#FF8F00" stroke-width="2" rx="3"/>
    <!-- Scissors icon -->
    <g transform="translate(20, 15)">
      <circle cx="-8" cy="-5" r="5" fill="none" stroke="#FF8F00" stroke-width="2"/>
      <circle cx="-8" cy="5" r="5" fill="none" stroke="#FF8F00" stroke-width="2"/>
      <line x1="-3" y1="0" x2="10" y2="0" stroke="#FF8F00" stroke-width="2"/>
    </g>
    <text x="20" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#E65100">Резать</text>
  </g>
  
  <!-- Can glue -->
  <g transform="translate(280, 50)">
    <rect x="0" y="0" width="40" height="30" fill="#E1F5FE" stroke="#0288D1" stroke-width="2" rx="3"/>
    <!-- Glue bottle -->
    <rect x="15" y="5" width="10" height="20" fill="#0288D1" rx="2"/>
    <rect x="17" y="0" width="6" height="5" fill="#0288D1"/>
    <text x="20" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#01579B">Клеить</text>
  </g>
  
  <!-- Tools -->
  
  <!-- Scissors -->
  <g transform="translate(100, 220)">
    <ellipse cx="-15" cy="-20" r="12" fill="none" stroke="#FF5722" stroke-width="4"/>
    <ellipse cx="-15" cy="0" r="12" fill="none" stroke="#FF5722" stroke-width="4"/>
    <polygon points="0,-10 30,-5 0,10" fill="#78909C"/>
    <circle cx="0" cy="0" r="4" fill="#546E7A"/>
  </g>
  
  <!-- Ruler -->
  <g transform="translate(180, 230)">
    <rect x="0" y="0" width="80" height="15" fill="#FFC107" rx="2"/>
    <g stroke="#FF8F00" stroke-width="0.5">
      <line x1="10" y1="0" x2="10" y2="10"/>
      <line x1="20" y1="0" x2="20" y2="5"/>
      <line x1="30" y1="0" x2="30" y2="10"/>
      <line x1="40" y1="0" x2="40" y2="5"/>
      <line x1="50" y1="0" x2="50" y2="10"/>
      <line x1="60" y1="0" x2="60" y2="5"/>
      <line x1="70" y1="0" x2="70" y2="10"/>
    </g>
  </g>
  
  <!-- Glue -->
  <g transform="translate(300, 220)">
    <rect x="0" y="0" width="25" height="40" fill="#4CAF50" rx="3"/>
    <rect x="8" y="-8" width="9" height="12" fill="#81C784"/>
    <polygon points="10,-8 15,-15 10,-8" fill="#A5D6A7"/>
  </g>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#1565C0">
    Знакомство с бумагой
  </text>
</svg>