<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#FFF3E0"/>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#E65100">
    Аппликация «Животные»
  </text>
  
  <!-- Table -->
  <rect x="20" y="200" width="360" height="80" fill="#8D6E63"/>
  <rect x="20" y="195" width="360" height="10" fill="#A1887F"/>
  
  <!-- Cat made of shapes -->
  <g transform="translate(70, 50)">
    <!-- Body (oval) -->
    <ellipse cx="30" cy="80" rx="25" ry="35" fill="#FF9800"/>
    
    <!-- Head (circle) -->
    <circle cx="30" cy="30" r="25" fill="#FF9800"/>
    
    <!-- Ears (triangles) -->
    <polygon points="10,15 5,-5 25,5" fill="#FF9800"/>
    <polygon points="50,15 55,-5 35,5" fill="#FF9800"/>
    <polygon points="12,12 10,0 22,7" fill="#FFB74D"/>
    <polygon points="48,12 50,0 38,7" fill="#FFB74D"/>
    
    <!-- Eyes -->
    <ellipse cx="20" cy="25" rx="5" ry="6" fill="#4CAF50"/>
    <ellipse cx="40" cy="25" rx="5" ry="6" fill="#4CAF50"/>
    <ellipse cx="20" cy="25" rx="2" ry="4" fill="#212121"/>
    <ellipse cx="40" cy="25" rx="2" ry="4" fill="#212121"/>
    
    <!-- Nose -->
    <ellipse cx="30" cy="38" rx="4" ry="3" fill="#E91E63"/>
    
    <!-- Whiskers -->
    <g stroke="#5D4037" stroke-width="1">
      <line x1="5" y1="35" x2="-10" y2="32"/>
      <line x1="5" y1="40" x2="-10" y2="40"/>
      <line x1="55" y1="35" x2="70" y2="32"/>
      <line x1="55" y1="40" x2="70" y2="40"/>
    </g>
    
    <!-- Tail -->
    <path d="M55,80 Q80,60 70,100" stroke="#FF9800" stroke-width="10" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M55,80 Q80,60 70,100;M55,80 Q85,55 75,95;M55,80 Q80,60 70,100" dur="1s" repeatCount="indefinite"/>
    </path>
    
    <text x="30" y="135" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#E65100">Кошка</text>
  </g>
  
  <!-- Bunny made of shapes -->
  <g transform="translate(200, 60)">
    <!-- Body (oval) -->
    <ellipse cx="35" cy="75" rx="25" ry="30" fill="#E0E0E0"/>
    
    <!-- Head (circle) -->
    <circle cx="35" cy="30" r="22" fill="#E0E0E0"/>
    
    <!-- Ears (long ovals) -->
    <ellipse cx="20" cy="-15" rx="8" ry="30" fill="#E0E0E0"/>
    <ellipse cx="50" cy="-15" rx="8" ry="30" fill="#E0E0E0"/>
    <ellipse cx="20" cy="-15" rx="4" ry="22" fill="#FFCDD2"/>
    <ellipse cx="50" cy="-15" rx="4" ry="22" fill="#FFCDD2"/>
    
    <!-- Eyes -->
    <circle cx="27" cy="25" r="4" fill="#212121"/>
    <circle cx="43" cy="25" r="4" fill="#212121"/>
    
    <!-- Nose -->
    <ellipse cx="35" cy="35" rx="5" ry="4" fill="#FFCDD2"/>
    
    <!-- Teeth -->
    <rect x="30" y="42" width="4" height="6" fill="white"/>
    <rect x="36" y="42" width="4" height="6" fill="white"/>
    
    <!-- Whiskers -->
    <g stroke="#9E9E9E" stroke-width="1">
      <line x1="10" y1="35" x2="-5" y2="32"/>
      <line x1="10" y1="40" x2="-5" y2="40"/>
      <line x1="60" y1="35" x2="75" y2="32"/>
      <line x1="60" y1="40" x2="75" y2="40"/>
    </g>
    
    <text x="35" y="125" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">Зайчик</text>
  </g>
  
  <!-- Shapes used -->
  <g transform="translate(310, 50)">
    <text x="40" y="0" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="11" fill="#333">Фигуры:</text>
    
    <circle cx="25" cy="25" r="15" fill="#FF9800" stroke="#E65100" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="25" y="55" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Круг</text>
    
    <ellipse cx="70" cy="25" rx="20" ry="12" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="70" y="55" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Овал</text>
    
    <polygon points="25,70 15,90 35,90" fill="#FF9800" stroke="#E65100" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="25" y="105" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Треугольник</text>
  </g>
  
  <!-- Tools -->
  <g transform="translate(100, 230)">
    <rect x="0" y="0" width="40" height="25" fill="#FF9800"/>
    <rect x="50" y="0" width="40" height="25" fill="#E0E0E0"/>
    <rect x="100" y="0" width="40" height="25" fill="#795548"/>
    <text x="70" y="45" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Бумага</text>
  </g>
  
  <g transform="translate(260, 225)">
    <rect x="0" y="0" width="20" height="35" fill="#4CAF50" rx="3"/>
    <text x="10" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Клей</text>
  </g>
  
  <g transform="translate(300, 225)">
    <ellipse cx="-8" cy="-5" r="5" fill="none" stroke="#FF5722" stroke-width="2"/>
    <ellipse cx="-8" cy="5" r="5" fill="none" stroke="#FF5722" stroke-width="2"/>
    <polygon points="0,-3 12,-1 0,3" fill="#78909C"/>
    <text x="2" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#616161">Ножницы</text>
  </g>
</svg>