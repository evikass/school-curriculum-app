<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="paperGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F5F5F5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="#FFF8E1"/>
  
  <!-- Table -->
  <rect x="20" y="200" width="360" height="80" fill="#8D6E63"/>
  <rect x="20" y="195" width="360" height="10" fill="#A1887F"/>
  
  <!-- Paper folding animation -->
  
  <!-- Step 1: Flat paper -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="80" height="60" fill="url(#paperGrad2)" stroke="#BDBDBD" stroke-width="1"/>
    <text x="40" y="80" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">1. Лист</text>
  </g>
  
  <!-- Step 2: Folding -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="80" height="60" fill="url(#paperGrad2)" stroke="#BDBDBD" stroke-width="1"/>
    <!-- Fold line -->
    <path d="M40,0 L40,60" stroke="#2196F3" stroke-width="2" stroke-dasharray="5,3"/>
    <!-- Folding arrow -->
    <path d="M60,10 L45,5 L45,15 Z" fill="#2196F3">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </path>
    <text x="40" y="80" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">2. Сгибаем</text>
  </g>
  
  <!-- Step 3: Folded -->
  <g transform="translate(260, 100)">
    <rect x="0" y="0" width="40" height="60" fill="url(#paperGrad2)" stroke="#BDBDBD" stroke-width="1"/>
    <rect x="0" y="0" width="40" height="60" fill="#E3F2FD" stroke="#BDBDBD" stroke-width="1" transform="skewY(-5)"/>
    <text x="40" y="80" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="10" fill="#616161">3. Готово!</text>
  </g>
  
  <!-- Folding patterns -->
  
  <!-- Half fold -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="40" height="25" fill="#FFCC80" stroke="#FF9800" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="25" stroke="#FF9800" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="20" y="40" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#E65100">Пополам</text>
  </g>
  
  <!-- Quarter fold -->
  <g transform="translate(130, 50)">
    <rect x="0" y="0" width="40" height="25" fill="#B2DFDB" stroke="#009688" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="25" stroke="#009688" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="0" y1="12.5" x2="40" y2="12.5" stroke="#009688" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="20" y="40" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#00695C">Вчетверо</text>
  </g>
  
  <!-- Accordion fold -->
  <g transform="translate(210, 45)">
    <path d="M0,0 L5,30 L15,0 L25,30 L35,0 L40,30" stroke="#9C27B0" stroke-width="2" fill="none"/>
    <text x="20" y="50" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#7B1FA2">Гармошка</text>
  </g>
  
  <!-- Hands folding paper -->
  <g transform="translate(180, 220)">
    <!-- Left hand -->
    <ellipse cx="-20" cy="10" rx="15" ry="20" fill="#FFCC80"/>
    <rect x="-30" y="-5" width="5" height="15" fill="#FFCC80" rx="2"/>
    <rect x="-23" y="-12" width="4" height="18" fill="#FFCC80" rx="2"/>
    <rect x="-16" y="-15" width="4" height="20" fill="#FFCC80" rx="2"/>
    <rect x="-9" y="-12" width="4" height="18" fill="#FFCC80" rx="2"/>
    
    <!-- Right hand -->
    <ellipse cx="40" cy="10" rx="15" ry="20" fill="#FFCC80"/>
    <rect x="35" y="-5" width="5" height="15" fill="#FFCC80" rx="2"/>
    <rect x="42" y="-12" width="4" height="18" fill="#FFCC80" rx="2"/>
    <rect x="49" y="-15" width="4" height="20" fill="#FFCC80" rx="2"/>
    <rect x="56" y="-12" width="4" height="18" fill="#FFCC80" rx="2"/>
    
    <!-- Paper being folded -->
    <rect x="0" y="-5" width="20" height="30" fill="#FFF9C4" stroke="#FBC02D" stroke-width="1"/>
  </g>
  
  <!-- Ruler -->
  <g transform="translate(300, 225)">
    <rect x="0" y="0" width="60" height="10" fill="#FFC107" rx="1"/>
    <g stroke="#FF8F00" stroke-width="0.5">
      <line x1="10" y1="0" x2="10" y2="6"/>
      <line x1="20" y1="0" x2="20" y2="6"/>
      <line x1="30" y1="0" x2="30" y2="6"/>
      <line x1="40" y1="0" x2="40" y2="6"/>
      <line x1="50" y1="0" x2="50" y2="6"/>
    </g>
    <text x="30" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="9" fill="#E65100">Линейка</text>
  </g>
  
  <!-- Title -->
  <text x="200" y="25" text-anchor="middle" font-family="'Comic Sans MS', cursive" font-size="16" font-weight="bold" fill="#1565C0">
    Сгибание бумаги
  </text>
</svg>