 text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#92400E" font-weight="normal">Почва</text><line x1="195" y1="130" x2="300" y2="120" stroke="#059669" stroke-width="1.5"/><circle cx="300" cy="120" r="3" fill="#059669"/><text x="305" y="123" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Шляпка</text><line x1="240" y1="180" x2="300" y2="180" stroke="#059669" stroke-width="1.5"/><circle cx="300" cy="180" r="3" fill="#059669"/><text x="305" y="183" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Гименофор (пластинки)</text><line x1="215" y1="230" x2="280" y2="230" stroke="#059669" stroke-width="1.5"/><circle cx="280" cy="230" r="3" fill="#059669"/><text x="285" y="233" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Кольцо</text><line x1="215" y1="280" x2="280" y2="280" stroke="#059669" stroke-width="1.5"/><circle cx="280" cy="280" r="3" fill="#059669"/><text x="285" y="283" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Ножка</text><line x1="195" y1="370" x2="260" y2="370" stroke="#059669" stroke-width="1.5"/><circle cx="260" cy="370" r="3" fill="#059669"/><text x="265" y="373" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Грибница (мицелий)</text><rect x="385" y="72" width="405" height="180" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="587" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Гифы и мицелий</text><path d="M410,130 Q440,120 460,135 Q480,150 510,140 Q530,130 550,145" fill="none" stroke="#059669" stroke-width="2.5"/><path d="M410,150 Q435,145 455,160 Q470,175 500,165 Q520,155 555,168" fill="none" stroke="#059669" stroke-width="2.5"/><line x1="460" y1="130" x2="460" y2="140" stroke="#059669" stroke-width="1.5"/><line x1="510" y1="135" x2="510" y2="145" stroke="#059669" stroke-width="1.5"/><text x="420" y="115" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#065F46" font-weight="normal">Септа</text><circle cx="430" cy="136" r="4" fill="#10B981" opacity="0.5"/><circle cx="480" cy="143" r="4" fill="#10B981" opacity="0.5"/><text x="560" y="135" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Членистые гифы</text><text x="560" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(с перегородками)</text><path d="M410,200 Q445,190 470,205 Q500,220 540,210 Q560,200 580,215" fill="none" stroke="#F97316" stroke-width="3"/><circle cx="425" cy="202" r="3" fill="#F97316" opacity="0.6"/><circle cx="450" cy="202" r="3" fill="#F97316" opacity="0.6"/><circle cx="475" cy="202" r="3" fill="#F97316" opacity="0.6"/><circle cx="500" cy="202" r="3" fill="#F97316" opacity="0.6"/><circle cx="525" cy="202" r="3" fill="#F97316" opacity="0.6"/><circle cx="550" cy="202" r="3" fill="#F97316" opacity="0.6"/><text x="590" y="205" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Нечленистые гифы</text><text x="590" y="220" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(многоядерные)</text><rect x="385" y="265" width="405" height="197" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="587" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Характеристика грибов</text><text x="400" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Царство:</text><text x="510" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Грибы (Fungi) — отдельное царство</text><text x="400" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Признаки растений:</text><text x="510" y="322" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">неподвижны, клеточная стенка,</text><text x="510" y="339" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">размножение спорами</text><text x="400" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Признаки животных:</text><text x="510" y="356" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">гетеротрофы, запасной гликоген,</text><text x="510" y="373" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">хитин в стенке</text><text x="400" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Клеточная стенка:</text><text x="510" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">хитин (не целлюлоза!)</text><text x="400" y="407" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Запасное вещество:</text><text x="510" y="407" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">гликоген (не крахмал!)</text><text x="400" y="424" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Питание:</text><text x="510" y="424" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">гетеротрофное (осмотрофное)</text><text x="400" y="441" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Виды питания:</text><text x="510" y="441" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">сапротрофы, паразиты, симбионты</text><rect x="20" y="475" width="350" height="110" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="195" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Размножение грибов</text><circle cx="55" cy="525" r="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/><text x="55" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFFFFF" font-weight="bold">С</text><line x1="70" y1="525" x2="100" y2="525" stroke="#10B981" stroke-width="2"/><polygon points="100,525 92.63151204797691,528.1153467384692 92.63151204797691,521.8846532615308" fill="#10B981"/><text x="75" y="518" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#065F46" font-weight="normal">Спора</text><path d="M105,525 Q115,515 120,525 Q130,540 140,530" fill="none" stroke="#059669" stroke-width="2"/><line x1="145" y1="530" x2="175" y2="530" stroke="#10B981" stroke-width="2"/><polygon points="175,530 167.6315120479769,533.1153467384692 167.6315120479769,526.8846532615308" fill="#10B981"/><path d="M180,530 Q190,520 200,530 Q210,545 225,535 Q235,525 250,535" fill="none" stroke="#6B7280" stroke-width="1.5"/><path d="M190,530 Q195,540 210,545" fill="none" stroke="#6B7280" stroke-width="1"/><text x="195" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Мицелий</text><text x="270" y="515" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Виды размножения:</text><text x="270" y="530" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Вегетативное (частями мицелия)</text><text x="270" y="544" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Бесполое (спорами)</text><text x="270" y="558" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Половое (слияние гамет)</text><rect x="385" y="475" width="405" height="110" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="587" y="495" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Типы спор</text><circle cx="410" cy="515" r="6" fill="#10B981" opacity="0.4" stroke="#10B981" stroke-width="1.5"/><text x="425" y="519" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Экзоспоры</text><text x="510" y="519" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">на концах гиф (конидии)</text><circle cx="410" cy="537" r="6" fill="#F97316" opacity="0.4" stroke="#F97316" stroke-width="1.5"/><text x="425" y="541" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Эндоспоры</text><text x="510" y="541" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">внутри спорангиев</text><circle cx="410" cy="559" r="6" fill="#3B82F6" opacity="0.4" stroke="#3B82F6" stroke-width="1.5"/><text x="425" y="563" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Зооспоры</text><text x="510" y="563" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">с жгутиками (подвижные)</text>  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Урок 3</text>
</svg>