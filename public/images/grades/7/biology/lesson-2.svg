<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">Роль бактерий в природе и жизни человека</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 7</text>
<rect x="20" y="72" width="385" height="250" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="212" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Круговорот веществ</text><rect x="100" y="115" width="120" height="30" rx="6" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/><text x="160" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Остатки организмов</text><line x1="160" y1="150" x2="160" y2="175" stroke="#10B981" stroke-width="2"/><polygon points="160,175 156.8846532615308,167.6315120479769 163.1153467384692,167.6315120479769" fill="#10B981"/><ellipse cx="160" cy="200" rx="40" ry="18" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/><text x="160" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="bold">Бактерии-редуценты</text><line x1="160" y1="222" x2="160" y2="248" stroke="#10B981" stroke-width="2"/><polygon points="160,248 156.8846532615308,240.6315120479769 163.1153467384692,240.6315120479769" fill="#10B981"/><rect x="100" y="255" width="120" height="30" rx="6" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/><text x="160" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="bold">Минеральные вещества</text><line x1="225" y1="270" x2="270" y2="270" stroke="#10B981" stroke-width="2"/><polygon points="270,270 262.6315120479769,273.1153467384692 262.6315120479769,266.8846532615308" fill="#10B981"/><rect x="280" y="255" width="80" height="30" rx="6" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/><text x="320" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="bold">Растения</text><line x1="320" y1="250" x2="320" y2="150" stroke="#10B981" stroke-width="2"/><polygon points="320,150 323.1153467384692,157.3684879520231 316.8846532615308,157.3684879520231" fill="#10B981"/><text x="335" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Органические</text><text x="335" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">вещества</text><text x="300" y="120" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Азотфиксация:</text><text x="300" y="136" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">N₂ → NH₃</text><text x="300" y="152" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Клубеньковые бактерии</text><text x="300" y="165" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">на корнях бобовых</text><rect x="420" y="72" width="370" height="250" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="605" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Полезные бактерии</text><rect x="435" y="112" width="14" height="14" rx="3" fill="#FDE68A" stroke="#6B7280" stroke-width="0.5"/><text x="456" y="123" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Молочнокислые</text><text x="456" y="136" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Кисломолочные продукты,</text><text x="456" y="147" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">квашение, силос</text><rect x="435" y="154" width="14" height="14" rx="3" fill="#BBF7D0" stroke="#6B7280" stroke-width="0.5"/><text x="456" y="165" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Клубеньковые</text><text x="456" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Связывают азот из воздуха,</text><text x="456" y="189" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">обогащают почву</text><rect x="435" y="196" width="14" height="14" rx="3" fill="#D1FAE5" stroke="#6B7280" stroke-width="0.5"/><text x="456" y="207" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Почвенные</text><text x="456" y="220" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Разлагают органику,</text><text x="456" y="231" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">образуют перегной</text><rect x="435" y="238" width="14" height="14" rx="3" fill="#BFDBFE" stroke="#6B7280" stroke-width="0.5"/><text x="456" y="249" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Кишечные</text><text x="456" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Синтез витаминов B и K,</text><text x="456" y="273" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">защита от патогенов</text><rect x="435" y="280" width="14" height="14" rx="3" fill="#E9D5FF" stroke="#6B7280" stroke-width="0.5"/><text x="456" y="291" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Бактерии брожения</text><text x="456" y="304" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Производство уксуса,</text><text x="456" y="315" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">сыра, вина</text><rect x="20" y="335" width="385" height="250" rx="6" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.5" filter="url(#shadow)"/><text x="212" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#EF4444" font-weight="bold">Вредные бактерии (патогены)</text><circle cx="40" cy="378" r="5" fill="#FECACA" stroke="#EF4444" stroke-width="1"/><text x="52" y="382" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Туберкулёз</text><text x="160" y="382" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(Mycobacterium tuberculosis)</text><circle cx="40" cy="402" r="5" fill="#FECACA" stroke="#EF4444" stroke-width="1"/><text x="52" y="406" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Холера</text><text x="160" y="406" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(Vibrio cholerae)</text><circle cx="40" cy="426" r="5" fill="#FECACA" stroke="#EF4444" stroke-width="1"/><text x="52" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Столбняк</text><text x="160" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(Clostridium tetani)</text><circle cx="40" cy="450" r="5" fill="#FECACA" stroke="#EF4444" stroke-width="1"/><text x="52" y="454" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Дифтерия</text><text x="160" y="454" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(Corynebacterium diphtheriae)</text><circle cx="40" cy="474" r="5" fill="#FECACA" stroke="#EF4444" stroke-width="1"/><text x="52" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Сальмонеллёз</text><text x="160" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(Salmonella)</text><circle cx="40" cy="498" r="5" fill="#FECACA" stroke="#EF4444" stroke-width="1"/><text x="52" y="502" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Ботулизм</text><text x="160" y="502" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(Clostridium botulinum)</text><text x="35" y="535" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Меры профилактики:</text><text x="35" y="552" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Вакцинация, гигиена, пастеризация,</text><text x="35" y="567" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">стерилизация, антибиотики</text><rect x="420" y="335" width="370" height="250" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="605" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Бактерии в промышленности</text><rect x="435" y="370" width="340" height="50" rx="6" fill="#ECFDF5"/><text x="445" y="388" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Пищевая промышленность</text><text x="445" y="403" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Йогурт, кефир, сыр, квашеная капуста,</text><text x="445" y="416" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">уксус, силос для животных</text><rect x="435" y="428" width="340" height="40" rx="6" fill="#DBEAFE"/><text x="445" y="446" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">Медицина</text><text x="445" y="460" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Антибиотики (стрептомицин), инсулин, витамины</text><rect x="435" y="476" width="340" height="40" rx="6" fill="#D1FAE5"/><text x="445" y="494" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#059669" font-weight="bold">Сельское хозяйство</text><text x="445" y="508" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Азотфиксация, силосование, компостирование</text><rect x="435" y="524" width="340" height="40" rx="6" fill="#E9D5FF"/><text x="445" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" font-weight="bold">Биотехнология</text><text x="445" y="556" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Генно-инженерные бактерии: инсулин, гормоны</text>  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Урок 2</text>
</svg>