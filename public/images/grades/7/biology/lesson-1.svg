<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">Строение и жизнедеятельность бактерий</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 7</text>
<rect x="20" y="72" width="370" height="310" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="205" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Строение бактериальной клетки</text><ellipse cx="200" cy="250" rx="100" ry="70" fill="#D1FAE5" stroke="#10B981" stroke-width="2" stroke-dasharray="6,3"/><text x="200" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="bold">Капсула</text><ellipse cx="200" cy="250" rx="85" ry="58" fill="#BBF7D0" stroke="#059669" stroke-width="2.5"/><text x="200" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Клеточная стенка</text><ellipse cx="200" cy="250" rx="72" ry="46" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5" stroke-dasharray="3,2"/><ellipse cx="190" cy="240" rx="35" ry="22" fill="#10B981" opacity="0.3" stroke="#065F46" stroke-width="1.5"/><path d="M165,230 Q175,227 185,230 Q195,233 205,230 Q215,227 220,230" fill="none" stroke="#065F46" stroke-width="0.8"/><path d="M165,235 Q175,232 185,235 Q195,238 205,235 Q215,232 220,235" fill="none" stroke="#065F46" stroke-width="0.8"/><path d="M165,240 Q175,237 185,240 Q195,243 205,240 Q215,237 220,240" fill="none" stroke="#065F46" stroke-width="0.8"/><path d="M165,245 Q175,242 185,245 Q195,248 205,245 Q215,242 220,245" fill="none" stroke="#065F46" stroke-width="0.8"/><path d="M165,250 Q175,247 185,250 Q195,253 205,250 Q215,247 220,250" fill="none" stroke="#065F46" stroke-width="0.8"/><text x="190" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#065F46" font-weight="bold">Нуклеоид</text><text x="190" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#065F46" font-weight="normal">(ДНК)</text><circle cx="170" cy="220" r="3" fill="#F97316" stroke="#D97706" stroke-width="0.5"/><circle cx="220" cy="260" r="3" fill="#F97316" stroke="#D97706" stroke-width="0.5"/><circle cx="175" cy="270" r="3" fill="#F97316" stroke="#D97706" stroke-width="0.5"/><circle cx="225" cy="235" r="3" fill="#F97316" stroke="#D97706" stroke-width="0.5"/><circle cx="200" cy="275" r="3" fill="#F97316" stroke="#D97706" stroke-width="0.5"/><path d="M200,310 Q230,340 210,360 Q190,380 220,400" fill="none" stroke="#6B7280" stroke-width="2"/><path d="M190,312 Q160,340 180,360 Q200,380 170,400" fill="none" stroke="#6B7280" stroke-width="2"/><line x1="230" y1="370" x2="260" y2="380" stroke="#059669" stroke-width="1.5"/><circle cx="260" cy="380" r="3" fill="#059669"/><text x="265" y="383" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Жгутики</text><line x1="120" y1="240" x2="95" y2="235" stroke="#6B7280" stroke-width="1"/><line x1="118" y1="260" x2="90" y2="265" stroke="#6B7280" stroke-width="1"/><line x1="125" y1="225" x2="100" y2="215" stroke="#6B7280" stroke-width="1"/><text x="60" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Пили</text><line x1="200" y1="195" x2="260" y2="175" stroke="#059669" stroke-width="1.5"/><circle cx="260" cy="175" r="3" fill="#059669"/><text x="265" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Клеточная стенка</text><line x1="200" y1="230" x2="290" y2="220" stroke="#059669" stroke-width="1.5"/><circle cx="290" cy="220" r="3" fill="#059669"/><text x="295" y="223" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#065F46" font-weight="bold">Цитоплазматическая мембрана</text><line x1="225" y1="260" x2="310" y2="260" stroke="#059669" stroke-width="1.5"/><circle cx="310" cy="260" r="3" fill="#059669"/><text x="315" y="263" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#F97316" font-weight="bold">Рибосомы</text><rect x="405" y="72" width="385" height="145" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="597" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Формы бактерий</text><circle cx="440" cy="130" r="14" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/><text x="460" y="127" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Кокки</text><text x="460" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(шаровидные)</text><rect x="420" y="158" width="40" height="16" rx="8" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/><text x="470" y="170" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Палочки</text><text x="470" y="183" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(цилиндрические)</text><path d="M425,200 Q435,192 445,200 Q455,208 465,200 Q475,192 485,200" fill="none" stroke="#059669" stroke-width="2.5"/><text x="495" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Спириллы</text><text x="495" y="213" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(спиральные)</text><path d="M580,125 Q605,145 585,165" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round"/><text x="612" y="147" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Вибрионы</text><text x="612" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(изогнутые)</text><circle cx="640" cy="190" r="8" fill="#BBF7D0" stroke="#059669" stroke-width="1"/><circle cx="654" cy="186" r="8" fill="#BBF7D0" stroke="#059669" stroke-width="1"/><circle cx="647" cy="200" r="8" fill="#BBF7D0" stroke="#059669" stroke-width="1"/><circle cx="660" cy="197" r="8" fill="#BBF7D0" stroke="#059669" stroke-width="1"/><text x="674" y="195" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Стафилококки</text><rect x="405" y="228" width="385" height="155" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="597" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Размножение и питание</text><text x="420" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Размножение — деление надвое:</text><ellipse cx="430" cy="290" rx="15" ry="10" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/><polygon points="450,290 456,286 456,294" fill="#10B981"/><ellipse cx="475" cy="290" rx="22" ry="10" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/><line x1="475" y1="280" x2="475" y2="300" stroke="#059669" stroke-width="1" stroke-dasharray="2,2"/><polygon points="502,290 508,286 508,294" fill="#10B981"/><ellipse cx="525" cy="290" rx="14" ry="10" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/><ellipse cx="553" cy="290" rx="14" ry="10" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/><text x="420" y="315" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Время деления: ~20 мин</text><text x="420" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Спорообразование — выживание в</text><text x="420" y="343" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">неблагоприятных условиях</text><text x="420" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Типы питания:</text><rect x="420" y="370" width="10" height="10" rx="2" fill="#10B981" opacity="0.5"/><text x="435" y="379" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Автотрофы (фото- и хемосинтетики)</text><rect x="420" y="385" width="10" height="10" rx="2" fill="#F97316" opacity="0.5"/><text x="435" y="394" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Гетеротрофы (сапротрофы, паразиты)</text><rect x="20" y="395" width="370" height="190" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="35" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Ключевые особенности:</text><text x="35" y="435" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Прокариоты — нет ядра и мембранных органоидов</text><text x="35" y="452" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Размер: 0,5-5 мкм (в 10-100 раз меньше эукариот)</text><text x="35" y="469" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• ДНК — кольцевая хромосома в нуклеоиде</text><text x="35" y="486" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Рибосомы 70S (мельче, чем у эукариот — 80S)</text><text x="35" y="503" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Клеточная стенка из муреина (пептидогликана)</text><text x="35" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Жгутики из белка флагеллина</text><text x="35" y="537" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Обмен веществ разнообразнее эукариот</text><text x="35" y="554" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Споры выдерживают кипячение до 3 часов</text><rect x="405" y="395" width="385" height="190" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="597" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Спорообразование</text><ellipse cx="470" cy="450" rx="25" ry="15" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/><text x="470" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Клетка</text><line x1="500" y1="450" x2="535" y2="450" stroke="#10B981" stroke-width="2"/><polygon points="535,450 527.6315120479769,453.1153467384692 527.6315120479769,446.8846532615308" fill="#10B981"/><ellipse cx="565" cy="450" rx="25" ry="15" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/><ellipse cx="565" cy="450" rx="12" ry="9" fill="#F97316" stroke="#92400E" stroke-width="1"/><text x="565" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#FFFFFF" font-weight="bold">Спора</text><line x1="595" y1="450" x2="630" y2="450" stroke="#10B981" stroke-width="2"/><polygon points="630,450 622.6315120479769,453.1153467384692 622.6315120479769,446.8846532615308" fill="#10B981"/><ellipse cx="660" cy="450" rx="25" ry="15" fill="#BBF7D0" stroke="#059669" stroke-width="1.5"/><text x="660" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Клетка</text><text x="425" y="485" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Спора — покоящаяся форма бактерий:</text><text x="425" y="500" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Образуется при неблагоприятных условиях</text><text x="425" y="515" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Устойчива к высушиванию, нагреванию,</text><text x="425" y="528" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">  излучению, дезинфицирующим средствам</text><text x="425" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• При благоприятных условиях прорастает</text><text x="425" y="563" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">  в вегетативную клетку за 4-5 часов</text>  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Урок 1</text>
</svg>