  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">Мхи, папоротники, голосеменные</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 7</text>
<rect x="20" y="72" width="250" height="270" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="145" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Мхи (Bryophyta)</text><line x1="120" y1="140" x2="120" y2="260" stroke="#15803D" stroke-width="3"/><ellipse cx="105" cy="150" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><ellipse cx="135" cy="160" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><ellipse cx="105" cy="170" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><ellipse cx="135" cy="180" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><ellipse cx="105" cy="190" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><ellipse cx="135" cy="200" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><ellipse cx="105" cy="210" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><ellipse cx="135" cy="220" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><ellipse cx="105" cy="230" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><ellipse cx="135" cy="240" rx="12" ry="6" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><line x1="120" y1="140" x2="120" y2="115" stroke="#15803D" stroke-width="1.5"/><ellipse cx="120" cy="112" rx="10" ry="14" fill="#D97706" stroke="#92400E" stroke-width="1.5"/><rect x="116" y="98" width="8" height="5" rx="2" fill="#FFFFFF" stroke="#D97706" stroke-width="0.8"/><line x1="115" y1="260" x2="108" y2="280" stroke="#6B7280" stroke-width="1"/><line x1="120" y1="260" x2="120" y2="282" stroke="#6B7280" stroke-width="1"/><line x1="125" y1="260" x2="132" y2="280" stroke="#6B7280" stroke-width="1"/><line x1="130" y1="108" x2="160" y2="105" stroke="#059669" stroke-width="1.5"/><circle cx="160" cy="105" r="3" fill="#059669"/><text x="165" y="108" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Спорангий</text><line x1="130" y1="140" x2="165" y2="140" stroke="#059669" stroke-width="1.5"/><circle cx="165" cy="140" r="3" fill="#059669"/><text x="170" y="143" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Ножка</text><line x1="120" y1="270" x2="160" y2="270" stroke="#059669" stroke-width="1.5"/><circle cx="160" cy="270" r="3" fill="#059669"/><text x="165" y="273" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="bold">Ризоиды</text><text x="35" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Особенности:</text><text x="35" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Нет корней (ризоиды)</text><text x="35" y="327" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Нет проводящей системы</text><text x="35" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Споровые растения</text><text x="35" y="353" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Кукушкин лён, сфагнум</text><rect x="285" y="72" width="260" height="270" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="415" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Папоротники</text><line x1="380" y1="310" x2="380" y2="130" stroke="#15803D" stroke-width="3"/><path d="M380,140 Q365,130 345,140 Q365,145 380,140" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,140 Q395,130 415,140 Q395,145 380,140" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,165 Q365,155 345,165 Q365,170 380,165" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,165 Q395,155 415,165 Q395,170 380,165" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,190 Q365,180 345,190 Q365,195 380,190" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,190 Q395,180 415,190 Q395,195 380,190" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,215 Q365,205 345,215 Q365,220 380,215" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,215 Q395,205 415,215 Q395,220 380,215" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,240 Q365,230 345,240 Q365,245 380,240" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,240 Q395,230 415,240 Q395,245 380,240" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,265 Q365,255 345,265 Q365,270 380,265" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,265 Q395,255 415,265 Q395,270 380,265" fill="#22C55E" stroke="#15803D" stroke-width="0.8"/><path d="M380,130 Q370,120 375,110 Q382,100 380,95" fill="none" stroke="#15803D" stroke-width="2.5"/><circle cx="360" cy="200" r="4" fill="#D97706" stroke="#92400E" stroke-width="0.8"/><circle cx="400" cy="215" r="4" fill="#D97706" stroke="#92400E" stroke-width="0.8"/><line x1="360" y1="200" x2="310" y2="200" stroke="#059669" stroke-width="1.5"/><circle cx="310" cy="200" r="3" fill="#059669"/><text x="295" y="203" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Сорусы</text><text x="295" y="215" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(споры)</text><line x1="380" y1="310" x2="370" y2="330" stroke="#92400E" stroke-width="2"/><line x1="380" y1="310" x2="390" y2="330" stroke="#92400E" stroke-width="2"/><text x="300" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Особенности:</text><text x="300" y="328" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Есть корни и стебель</text><text x="300" y="341" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Проводящая система</text><text x="300" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Споры на листьях (сорусы)</text><rect x="560" y="72" width="230" height="270" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="675" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Голосеменные</text><polygon points="675,120 640,200 650,200 620,270 630,270 610,330 740,330 720,270 730,270 700,200 710,200" fill="#15803D" stroke="#0F4C2A" stroke-width="1.5"/><rect x="665" y="330" width="20" height="20" fill="#D97706" stroke="#92400E" stroke-width="1"/><ellipse cx="700" cy="200" rx="12" ry="20" fill="#92400E" stroke="#78350F" stroke-width="1.5"/><line x1="690" y1="190" x2="710" y2="190" stroke="#78350F" stroke-width="0.8"/><line x1="690" y1="195" x2="710" y2="195" stroke="#78350F" stroke-width="0.8"/><line x1="690" y1="200" x2="710" y2="200" stroke="#78350F" stroke-width="0.8"/><line x1="690" y1="205" x2="710" y2="205" stroke="#78350F" stroke-width="0.8"/><line x1="690" y1="210" x2="710" y2="210" stroke="#78350F" stroke-width="0.8"/><line x1="712" y1="200" x2="740" y2="190" stroke="#059669" stroke-width="1.5"/><circle cx="740" cy="190" r="3" fill="#059669"/><text x="745" y="193" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Шишка</text><text x="575" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Особенности:</text><text x="575" y="328" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Семена без плода</text><text x="575" y="341" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Хвоя вместо листьев</text><text x="575" y="354" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">• Сосна, ель, лиственница</text><rect x="20" y="355" width="770" height="95" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="400" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Эволюция высших растений</text><line x1="50" y1="415" x2="760" y2="415" stroke="#10B981" stroke-width="2"/><polygon points="760,415 752.6315120479769,418.1153467384692 752.6315120479769,411.8846532615308" fill="#10B981"/><circle cx="80" cy="415" r="6" fill="#22C55E" stroke="#FFFFFF" stroke-width="1.5"/><text x="80" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#22C55E" font-weight="bold">Водоросли</text><text x="80" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Нет тканей</text><circle cx="200" cy="415" r="6" fill="#15803D" stroke="#FFFFFF" stroke-width="1.5"/><text x="200" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#15803D" font-weight="bold">Мхи</text><text x="200" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Нет проводящей
системы</text><circle cx="360" cy="415" r="6" fill="#059669" stroke="#FFFFFF" stroke-width="1.5"/><text x="360" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="bold">Папоротники</text><text x="360" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Споры, есть
ткани</text><circle cx="520" cy="415" r="6" fill="#065F46" stroke="#FFFFFF" stroke-width="1.5"/><text x="520" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Голосеменные</text><text x="520" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Семена, нет
плодов</text><circle cx="680" cy="415" r="6" fill="#065F46" stroke="#FFFFFF" stroke-width="1.5"/><text x="680" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Покрытосеменные</text><text x="680" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Семена в плодах</text><rect x="20" y="462" width="380" height="125" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="210" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Споровые растения</text><text x="35" y="500" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Мхи и папоротники размножаются спорами:</text><text x="35" y="516" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Спора → заросток → гаметы → оплодотворение</text><text x="35" y="532" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="normal">• Для оплодотворения нужна вода!</text><text x="35" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Споры мелкие, разносятся ветром</text><text x="35" y="564" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Жизненный цикл: спорофит + гаметофит</text><rect x="420" y="462" width="370" height="125" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="605" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Семенные растения</text><text x="435" y="500" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Голосеменные размножаются семенами:</text><text x="435" y="516" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Семя = зародыш + запас питательных</text><text x="435" y="532" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="normal">• НЕ нужна вода для оплодотворения</text><text x="435" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Пыльца переносится ветром</text><text x="435" y="564" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Семя защищено кожурой</text>  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Урок 6</text>
</svg>