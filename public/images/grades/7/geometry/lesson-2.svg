  <rect x="590" y="235" width="190" height="175" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="590" y="235" width="190" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="590" y="251" width="190" height="8" fill="#06B6D4" opacity="0.15" />
