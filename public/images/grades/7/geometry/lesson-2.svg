  <rect x="400" y="235" width="180" height="175" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="400" y="235" width="180" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="400" y="251" width="180" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="490" y="252" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Тупой</text>
  <text x="490" y="272" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">90° &lt; α &lt; 180°</text>
  <line x1="440" y1="390" x2="560" y2="390" stroke="#06B6D4" stroke-width="2.5" />
