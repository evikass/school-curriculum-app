  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Определение угла</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F"><tspan font-weight="bold" fill="#0E7490">Угол</tspan> — геометрическая фигура,</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="12" fill="#37474F">состоящая из двух лучей, выходящих</text>
