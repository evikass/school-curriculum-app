  <text x="60" y="382" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0E7490" text-anchor="middle"></text>
  <rect x="213" y="238" width="180" height="175" fill="#000000" rx="8" opacity="0.05" />
  <rect x="210" y="235" width="180" height="175" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="210" y="235" width="180" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="210" y="251" width="180" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="300" y="252" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Прямой</text>
  <text x="300" y="272" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">α = 90°</text>
  <line x1="250" y1="390" x2="350" y2="390" stroke="#06B6D4" stroke-width="2.5" />
  <line x1="250" y1="390" x2="250" y2="310" stroke="#06B6D4" stroke-width="2.5" />
