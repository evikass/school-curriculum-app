  <text x="110" y="272" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">0° &lt; α &lt; 90°</text>
  <line x1="60" y1="390" x2="160" y2="390" stroke="#06B6D4" stroke-width="2.5" />
  <line x1="60" y1="390" x2="105" y2="310" stroke="#06B6D4" stroke-width="2.5" />
  <path d="M 80,383 A 25,25 0 0,1 78,370" fill="none" stroke="#D97706" stroke-width="2" />
