  <text x="685" y="272" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">α = 180°</text>
  <line x1="620" y1="370" x2="750" y2="370" stroke="#06B6D4" stroke-width="2.5" />
  <circle cx="685" cy="370" r="3.5" fill="#0E7490" />
  <text x="685" y="362" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">O</text>
  <text x="630" y="363" font-family="Arial,sans-serif" font-size="11" fill="#0E7490">A</text>
  <text x="740" y="363" font-family="Arial,sans-serif" font-size="11" fill="#0E7490">B</text>
  <rect x="20" y="425" width="760" height="60" fill="#F0FDF4" rx="8" stroke="#059669" stroke-width="1.5" />
  <rect x="20" y="425" width="5" height="60" fill="#059669" rx="2" />
  <text x="36" y="445" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Биссектриса угла — луч, выходящий из вершины угла и делящий его пополам.</text>
  <text x="36" y="463" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Если ∠AOB = α, то биссектриса OC образует два угла по α/2.</text>
  <rect x="23" y="503" width="760" height="85" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="500" width="760" height="85" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="500" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="516" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="517" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Биссектриса</text>
  <line x1="80" y1="565" x2="200" y2="510" stroke="#06B6D4" stroke-width="2" />
  <line x1="80" y1="565" x2="200" y2="565" stroke="#06B6D4" stroke-width="2" />
  <line x1="80" y1="565" x2="230" y2="538" stroke="#059669" stroke-width="2" stroke-dasharray="6,3" />
  <circle cx="80" cy="565" r="3.5" fill="#0E7490" />
  <text x="80" y="557" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">O</text>
  <text x="203" y="507" font-family="Arial,sans-serif" font-size="11" fill="#0E7490">A</text>
  <text x="203" y="575" font-family="Arial,sans-serif" font-size="11" fill="#0E7490">B</text>
  <text x="234" y="535" font-family="Arial,sans-serif" font-size="11" fill="#059669">C (биссектриса)</text>
  <path d="M 100,558 A 20,20 0 0,1 104,547" fill="none" stroke="#D97706" stroke-width="1.5" />
  <path d="M 104,547 A 20,20 0 0,1 112,552" fill="none" stroke="#DC2626" stroke-width="1.5" />
  <text x="300" y="530" font-family="Arial,sans-serif" font-size="13" fill="#37474F">∠AOC = ∠COB = α/2</text>
  <text x="300" y="555" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Биссектриса делит угол на два равных угла</text>
</svg>
