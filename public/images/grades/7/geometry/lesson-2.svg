  <text x="575" y="128" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0E7490">A</text>
  <text x="640" y="203" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0E7490">B</text>
  <text x="533" y="178" font-family="Arial,sans-serif" font-size="12" fill="#D97706">α</text>
  <rect x="23" y="238" width="180" height="175" fill="#000000" rx="8" opacity="0.05" />
