  <text x="32" y="190" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Обозначение: ∠AOB, ∠α, ∠β</text>
  <text x="32" y="208" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Единица измерения: градус (°)</text>
