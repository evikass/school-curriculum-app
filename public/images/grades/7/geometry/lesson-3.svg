<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDFA" />
      <stop offset="100%" stop-color="#ECFEFF" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891B2" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    
  </defs>
  <!-- background & border -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="12" />
  <rect x="3" y="3" width="794" height="594" rx="10" fill="none" stroke="#06B6D4" stroke-width="2.5" />
  <rect x="8" y="8" width="784" height="584" rx="8" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2" />
  <!-- corner decorations -->
  <polygon points="12,12 42,12 12,42" fill="#06B6D4" opacity="0.08" />
  <polygon points="788,12 758,12 788,42" fill="#06B6D4" opacity="0.08" />
  <polygon points="12,588 42,588 12,558" fill="#06B6D4" opacity="0.08" />
  <polygon points="788,588 758,588 788,558" fill="#06B6D4" opacity="0.08" />
  <!-- decorative shapes -->
  <circle cx="740" cy="100" r="25" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.1" />
  <polygon points="60,540 80,510 100,540" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.1" />
  <rect x="70" y="80" width="18" height="18" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.08" transform="rotate(45,79,89)" />
  <!-- header bar -->
  <rect x="15" y="15" width="770" height="55" fill="url(#headerGrad)" rx="8" opacity="0.92" />
  <rect x="25" y="22" width="50" height="38" fill="#FFFFFF" rx="6" opacity="0.25" />
  <text x="50" y="49" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
  <text x="410" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Треугольник</text>
  <text x="760" y="35" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">7 класс</text>
  <text x="760" y="50" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">Геометрия</text>
  <line x1="20" y1="80" x2="780" y2="80" stroke="#06B6D4" stroke-width="2" opacity="0.25" />
  <rect x="23" y="93" width="370" height="110" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="90" width="370" height="110" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="90" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="106" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Определение</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F"><tspan font-weight="bold" fill="#0E7490">Треугольник</tspan> — фигура, состоящая</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="12" fill="#37474F">из трёх точек (вершин), не лежащих</text>
  <text x="32" y="166" font-family="Arial,sans-serif" font-size="12" fill="#37474F">на одной прямой, и трёх отрезков,</text>
  <text x="32" y="184" font-family="Arial,sans-serif" font-size="12" fill="#37474F">их соединяющих (сторон).</text>
  <rect x="413" y="93" width="370" height="110" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="90" width="370" height="110" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="410" y="90" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="410" y="106" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="595" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Обозначение △ABC</text>
  <polygon points="520,185 600,110 680,185" fill="none" stroke="#06B6D4" stroke-width="2.5" />
  <circle cx="520" cy="185" r="3.5" fill="#0E7490" />
  <text x="520" y="177" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">A</text>
  <circle cx="600" cy="110" r="3.5" fill="#0E7490" />
  <text x="600" y="102" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">B</text>
  <circle cx="680" cy="185" r="3.5" fill="#0E7490" />
  <text x="680" y="177" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">C</text>
  <text x="545" y="155" font-family="Arial,sans-serif" font-size="10" fill="#D97706">c</text>
  <text x="640" y="140" font-family="Arial,sans-serif" font-size="10" fill="#D97706">a</text>
  <text x="600" y="198" font-family="Arial,sans-serif" font-size="10" fill="#D97706">b</text>
  <rect x="23" y="218" width="245" height="170" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="215" width="245" height="170" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="215" width="245" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="231" width="245" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="142" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">По сторонам</text>
  <polygon points="60,285 90,255 120,285" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" />
  <text x="90" y="300" font-family="Arial,sans-serif" font-size="10" fill="#263238" text-anchor="middle">Равносторонний</text>
  <text x="90" y="314" font-family="Arial,sans-serif" font-size="10" fill="#0E7490" text-anchor="middle">a = b = c</text>
  <polygon points="160,285 190,250 220,285" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" />
  <text x="190" y="300" font-family="Arial,sans-serif" font-size="10" fill="#263238" text-anchor="middle">Равнобедренный</text>
  <text x="190" y="314" font-family="Arial,sans-serif" font-size="10" fill="#0E7490" text-anchor="middle">a = b ≠ c</text>
  <polygon points="50,370 105,330 140,370" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" />
  <text x="95" y="383" font-family="Arial,sans-serif" font-size="10" fill="#263238" text-anchor="middle">Разносторонний</text>
  <text x="95" y="397" font-family="Arial,sans-serif" font-size="10" fill="#0E7490" text-anchor="middle">a ≠ b ≠ c</text>
  <rect x="283" y="218" width="245" height="170" fill="#000000" rx="8" opacity="0.05" />
  <rect x="280" y="215" width="245" height="170" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="280" y="215" width="245" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="280" y="231" width="245" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="402" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">По углам</text>
  <polygon points="320,310 360,280 390,310" fill="#FFF7ED" stroke="#EA580C" stroke-width="2" />
  <text x="355" y="326" font-family="Arial,sans-serif" font-size="10" fill="#263238" text-anchor="middle">Остроугольный</text>
  <polygon points="320,375 360,340 320,340" fill="#FFF7ED" stroke="#EA580C" stroke-width="2" />
  <rect x="320" y="362" width="13" height="13" fill="none" stroke="#EA580C" stroke-width="1.2" />
  <text x="350" y="375" font-family="Arial,sans-serif" font-size="10" fill="#263238" text-anchor="middle">Прямоугольный</text>
  <polygon points="430,375 460,345 510,375" fill="#FFF7ED" stroke="#EA580C" stroke-width="2" />
  <text x="470" y="390" font-family="Arial,sans-serif" font-size="10" fill="#263238" text-anchor="middle">Тупоугольный</text>
  <rect x="543" y="218" width="240" height="170" fill="#000000" rx="8" opacity="0.05" />
  <rect x="540" y="215" width="240" height="170" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="540" y="215" width="240" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="540" y="231" width="240" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="660" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Свойства</text>
  <text x="552" y="258" font-family="Arial,sans-serif" font-size="11" fill="#37474F">1. Против большей стороны</text>
  <text x="552" y="274" font-family="Arial,sans-serif" font-size="11" fill="#37474F">   лежит больший угол</text>
  <text x="552" y="298" font-family="Arial,sans-serif" font-size="11" fill="#37474F">2. Сумма любых двух сторон</text>
  <text x="552" y="314" font-family="Arial,sans-serif" font-size="11" fill="#37474F">   больше третьей:</text>
  <text x="552" y="336" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490">   a + b &gt; c</text>
  <text x="552" y="358" font-family="Arial,sans-serif" font-size="11" fill="#37474F">3. Сумма углов = 180°</text>
  <text x="552" y="374" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490">   ∠A + ∠B + ∠C = 180°</text>
  <rect x="20" y="400" width="760" height="55" fill="#FFF7ED" rx="8" stroke="#D97706" stroke-width="1.5" />
  <rect x="20" y="400" width="5" height="55" fill="#D97706" rx="2" />
  <text x="36" y="420" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Периметр треугольника:  P = a + b + c</text>
  <rect x="23" y="473" width="760" height="115" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="470" width="760" height="115" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="470" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="486" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="487" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Свойства равнобедренного треугольника</text>
  <polygon points="100,560 140,490 180,560" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2.5" />
  <line x1="140" y1="490" x2="140" y2="560" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" />
  <circle cx="100" cy="560" r="3.5" fill="#0E7490" />
  <text x="100" y="552" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">A</text>
  <circle cx="140" cy="490" r="3.5" fill="#0E7490" />
  <text x="140" y="482" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">B</text>
  <circle cx="180" cy="560" r="3.5" fill="#0E7490" />
  <text x="180" y="552" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">C</text>
  <text x="155" y="530" font-family="Arial,sans-serif" font-size="10" fill="#059669">h</text>
  <text x="260" y="505" font-family="Arial,sans-serif" font-size="12" fill="#37474F">1. Углы при основании равны: ∠A = ∠C</text>
  <text x="260" y="525" font-family="Arial,sans-serif" font-size="12" fill="#37474F">2. Биссектриса к основанию является</text>
  <text x="260" y="543" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   медианой и высотой</text>
  <text x="260" y="563" font-family="Arial,sans-serif" font-size="12" fill="#37474F">3. Высота, биссектриса и медиана,</text>
  <text x="260" y="578" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   проведённые к основанию, совпадают</text>
</svg>
