  <text x="140" y="296" font-family="Arial,sans-serif" font-size="10" fill="#263238" text-anchor="middle">AB=A&#8321;B&#8321;  BC=B&#8321;C&#8321;  AC=A&#8321;C&#8321;</text>
  <text x="140" y="315" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#059669" text-anchor="middle">=&gt; △ABC = △A&#8321;B&#8321;C&#8321;</text>
