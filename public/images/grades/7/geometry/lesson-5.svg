  <rect x="540" y="106" width="240" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="660" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">3-й признак: УСУ</text>
  <polygon points="565,270 610,195 655,270" fill="#ECFEFF" stroke="#06B6D4" stroke-width="2" />
  <polygon points="665,270 710,195 755,270" fill="#FFF7ED" stroke="#EA580C" stroke-width="2" />
