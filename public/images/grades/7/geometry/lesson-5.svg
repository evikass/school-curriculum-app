  <path d="M 625,230 A 15,15 0 0,0 640,225" fill="none" stroke="#DC2626" stroke-width="1.5" />
  <path d="M 725,230 A 15,15 0 0,0 740,225" fill="none" stroke="#DC2626" stroke-width="1.5" />
  <line x1="605" y1="232" x2="609" y2="238" stroke="#0E7490" stroke-width="1.5" />
  <line x1="705" y1="232" x2="709" y2="238" stroke="#EA580C" stroke-width="1.5" />
  <text x="660" y="296" font-family="Arial,sans-serif" font-size="10" fill="#263238" text-anchor="middle">∠A=∠A&#8321;  AB=A&#8321;B&#8321;  ∠B=∠B&#8321;</text>
  <text x="660" y="315" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#059669" text-anchor="middle">=&gt; △ABC = △A&#8321;B&#8321;C&#8321;</text>
  <rect x="20" y="345" width="760" height="55" fill="#F0FDF4" rx="8" stroke="#059669" stroke-width="1.5" />
  <rect x="20" y="345" width="5" height="55" fill="#059669" rx="2" />
  <text x="36" y="365" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Треугольники равны, если их можно совместить наложением. У равных треугольников все</text>
  <text x="36" y="383" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">соответствующие элементы равны: стороны, углы, высоты, медианы, биссектрисы.</text>
  <rect x="23" y="418" width="760" height="170" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="415" width="760" height="170" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="415" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="431" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="432" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Сводка признаков равенства</text>
  <rect x="30" y="445" width="240" height="22" fill="#06B6D4" rx="4" opacity="0.2" />
  <rect x="275" y="445" width="240" height="22" fill="#06B6D4" rx="4" opacity="0.2" />
  <rect x="520" y="445" width="250" height="22" fill="#06B6D4" rx="4" opacity="0.2" />
  <text x="150" y="461" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">1-й признак (ССС)</text>
  <text x="395" y="461" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">2-й признак (СУС)</text>
  <text x="645" y="461" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">3-й признак (УСУ)</text>
  <text x="150" y="490" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">Три стороны</text>
  <text x="150" y="506" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">одного треугольника</text>
  <text x="150" y="522" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">равны трём сторонам</text>
  <text x="150" y="538" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">другого</text>
  <text x="150" y="558" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">a=a&#8321;, b=b&#8321;, c=c&#8321;</text>
  <text x="395" y="490" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">Две стороны и угол</text>
  <text x="395" y="506" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">между ними одного</text>
  <text x="395" y="522" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">треугольника равны</text>
  <text x="395" y="538" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">соответствующим</text>
  <text x="395" y="558" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">элементам другого</text>
  <text x="645" y="490" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">Сторона и два</text>
  <text x="645" y="506" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">прилежащих угла</text>
  <text x="645" y="522" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">одного треугольника</text>
  <text x="645" y="538" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">равны соответствующим</text>
  <text x="645" y="558" font-family="Arial,sans-serif" font-size="11" fill="#37474F" text-anchor="middle">элементам другого</text>
