  <line x1="465" y1="268" x2="469" y2="274" stroke="#EA580C" stroke-width="1.5" />
  <text x="400" y="296" font-family="Arial,sans-serif" font-size="10" fill="#263238" text-anchor="middle">AB=A&#8321;B&#8321;  ∠A=∠A&#8321;  AC=A&#8321;C&#8321;</text>
  <text x="400" y="315" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#059669" text-anchor="middle">=&gt; △ABC = △A&#8321;B&#8321;C&#8321;</text>
  <rect x="543" y="93" width="240" height="240" fill="#000000" rx="8" opacity="0.05" />
  <rect x="540" y="90" width="240" height="240" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
