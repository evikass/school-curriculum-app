<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0FDFA" />
      <stop offset="100%" stop-color="#ECFEFF" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0891B2" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    
  </defs>
  <!-- background & border -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="12" />
  <rect x="3" y="3" width="794" height="594" rx="10" fill="none" stroke="#06B6D4" stroke-width="2.5" />
  <rect x="8" y="8" width="784" height="584" rx="8" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.2" />
  <!-- corner decorations -->
  <polygon points="12,12 42,12 12,42" fill="#06B6D4" opacity="0.08" />
  <polygon points="788,12 758,12 788,42" fill="#06B6D4" opacity="0.08" />
  <polygon points="12,588 42,588 12,558" fill="#06B6D4" opacity="0.08" />
  <polygon points="788,588 758,588 788,558" fill="#06B6D4" opacity="0.08" />
  <!-- decorative shapes -->
  <circle cx="740" cy="100" r="25" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.1" />
  <polygon points="60,540 80,510 100,540" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.1" />
  <rect x="70" y="80" width="18" height="18" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.08" transform="rotate(45,79,89)" />
  <!-- header bar -->
  <rect x="15" y="15" width="770" height="55" fill="url(#headerGrad)" rx="8" opacity="0.92" />
  <rect x="25" y="22" width="50" height="38" fill="#FFFFFF" rx="6" opacity="0.25" />
  <text x="50" y="49" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <text x="410" y="48" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Точки, прямые, отрезки</text>
  <text x="760" y="35" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">7 класс</text>
  <text x="760" y="50" font-family="Arial,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.7">Геометрия</text>
  <line x1="20" y1="80" x2="780" y2="80" stroke="#06B6D4" stroke-width="2" opacity="0.25" />
  <rect x="23" y="93" width="370" height="200" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="90" width="370" height="200" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="90" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="106" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Основные понятия</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F"><tspan font-weight="bold" fill="#0E7490">Точка</tspan> — самое простое понятие геометрии.</text>
  <text x="32" y="148" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Точка не имеет размеров, обозначается: A, B, C ...</text>
  <text x="32" y="172" font-family="Arial,sans-serif" font-size="12" fill="#37474F"><tspan font-weight="bold" fill="#0E7490">Прямая</tspan> — бесконечна в обе стороны,</text>
  <text x="32" y="190" font-family="Arial,sans-serif" font-size="12" fill="#37474F">обозначается: a, b, c ... или AB</text>
  <text x="32" y="214" font-family="Arial,sans-serif" font-size="12" fill="#37474F"><tspan font-weight="bold" fill="#0E7490">Отрезок</tspan> — часть прямой, ограниченная</text>
  <text x="32" y="232" font-family="Arial,sans-serif" font-size="12" fill="#37474F">двумя точками. Обозначается: AB</text>
  <text x="32" y="256" font-family="Arial,sans-serif" font-size="12" fill="#37474F"><tspan font-weight="bold" fill="#0E7490">Луч</tspan> — часть прямой с началом в точке,</text>
  <text x="32" y="274" font-family="Arial,sans-serif" font-size="12" fill="#37474F">бесконечная в одну сторону. Обозначается: OA</text>
  <rect x="413" y="93" width="370" height="200" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="90" width="370" height="200" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="410" y="90" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="410" y="106" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="595" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Диаграмма</text>
  <circle cx="470" cy="150" r="3.5" fill="#0E7490" />
  <text x="470" y="142" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">A</text>
  <circle cx="630" cy="150" r="3.5" fill="#0E7490" />
  <text x="630" y="142" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">B</text>
  <line x1="473" y1="150" x2="627" y2="150" stroke="#06B6D4" stroke-width="3" />
  <text x="550" y="143" font-family="Arial,sans-serif" font-size="11" fill="#D97706" text-anchor="middle">отрезок AB</text>
  <circle cx="470" cy="210" r="3.5" fill="#0E7490" />
  <text x="470" y="202" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">C</text>
  <line x1="435" y1="210" x2="740" y2="210" stroke="#0E7490" stroke-width="2" stroke-dasharray="8,4" />
  <text x="660" y="203" font-family="Arial,sans-serif" font-size="11" fill="#0E7490">прямая a</text>
  <circle cx="470" cy="260" r="3.5" fill="#0E7490" />
  <text x="470" y="252" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">O</text>
  <line x1="473" y1="260" x2="750" y2="260" stroke="#DC2626" stroke-width="2.5" />
  <polygon points="750,260 740,255 740,265" fill="#DC2626" />
  <text x="630" y="253" font-family="Arial,sans-serif" font-size="11" fill="#DC2626">луч OA</text>
  <rect x="23" y="308" width="370" height="175" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="305" width="370" height="175" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="305" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="321" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="205" y="322" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Пересечение прямых</text>
  <line x1="45" y1="370" x2="250" y2="460" stroke="#06B6D4" stroke-width="2.5" />
  <line x1="45" y1="460" x2="250" y2="370" stroke="#DC2626" stroke-width="2.5" />
  <circle cx="148" cy="415" r="3.5" fill="#DC2626" />
  <text x="148" y="407" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#DC2626" text-anchor="middle">O</text>
  <text x="270" y="385" font-family="Arial,sans-serif" font-size="11" fill="#06B6D4">прямая a</text>
  <text x="270" y="450" font-family="Arial,sans-serif" font-size="11" fill="#DC2626">прямая b</text>
  <text x="60" y="475" font-family="Arial,sans-serif" font-size="11" fill="#37474F">Две прямые пересекаются</text>
  <text x="60" y="490" font-family="Arial,sans-serif" font-size="11" fill="#37474F">в одной точке O</text>
  <rect x="410" y="305" width="370" height="80" fill="#FFF7ED" rx="8" stroke="#D97706" stroke-width="1.5" />
  <rect x="410" y="305" width="5" height="80" fill="#D97706" rx="2" />
  <text x="426" y="325" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Аксиома: через любые две точки</text>
  <text x="426" y="343" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">можно провести прямую, и притом</text>
  <text x="426" y="361" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">только одну.</text>
  <rect x="410" y="400" width="370" height="80" fill="#F0FDF4" rx="8" stroke="#059669" stroke-width="1.5" />
  <rect x="410" y="400" width="5" height="80" fill="#059669" rx="2" />
  <text x="426" y="420" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Две прямые либо имеют одну</text>
  <text x="426" y="438" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">общую точку (пересекаются),</text>
  <text x="426" y="456" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">либо не имеют ни одной (параллельны).</text>
</svg>
