  <rect x="23" y="93" width="370" height="150" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="90" width="370" height="150" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="90" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="106" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Определения</text>
  <text x="32" y="128" font-family="Arial,sans-serif" font-size="12" fill="#37474F"><tspan font-weight="bold" fill="#0E7490">Медиана</tspan> — отрезок, соединяющий</text>
  <text x="32" y="146" font-family="Arial,sans-serif" font-size="12" fill="#37474F">вершину с серединой противоположной</text>
  <text x="32" y="162" font-family="Arial,sans-serif" font-size="12" fill="#37474F">стороны.</text>
  <text x="32" y="184" font-family="Arial,sans-serif" font-size="12" fill="#37474F"><tspan font-weight="bold" fill="#0E7490">Биссектриса</tspan> — отрезок биссектрисы</text>
  <text x="32" y="202" font-family="Arial,sans-serif" font-size="12" fill="#37474F">угла, от вершины до противолежащей</text>
  <text x="32" y="218" font-family="Arial,sans-serif" font-size="12" fill="#37474F">стороны.</text>
  <text x="32" y="236" font-family="Arial,sans-serif" font-size="12" fill="#37474F"><tspan font-weight="bold" fill="#0E7490">Высота</tspan> — перпендикуляр из вершины</text>
  <rect x="413" y="93" width="370" height="150" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="90" width="370" height="150" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="410" y="90" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="410" y="106" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="595" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Медианы</text>
  <polygon points="500,220 590,120 700,220" fill="none" stroke="#06B6D4" stroke-width="2" />
  <circle cx="545" cy="170" r="3" fill="#DC2626" />
  <circle cx="645" cy="170" r="3" fill="#DC2626" />
  <circle cx="600" cy="220" r="3" fill="#DC2626" />
  <line x1="500" y1="220" x2="645" y2="170" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" />
  <line x1="590" y1="120" x2="600" y2="220" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" />
  <line x1="700" y1="220" x2="545" y2="170" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" />
  <circle cx="597" cy="187" r="4" fill="#D97706" />
  <circle cx="500" cy="220" r="3.5" fill="#0E7490" />
  <text x="500" y="212" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">A</text>
  <circle cx="590" cy="120" r="3.5" fill="#0E7490" />
  <text x="590" y="112" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">B</text>
  <circle cx="700" cy="220" r="3.5" fill="#0E7490" />
  <text x="700" y="212" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">C</text>
  <text x="607" y="193" font-family="Arial,sans-serif" font-size="11" fill="#D97706">M</text>
  <rect x="23" y="258" width="370" height="170" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="255" width="370" height="170" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="255" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="271" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="205" y="272" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Биссектрисы</text>
  <polygon points="90,400 180,280 280,400" fill="none" stroke="#06B6D4" stroke-width="2" />
  <line x1="90" y1="400" x2="222" y2="365" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3" />
  <line x1="180" y1="280" x2="185" y2="400" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3" />
  <line x1="280" y1="400" x2="147" y2="360" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3" />
  <circle cx="183" cy="370" r="4" fill="#D97706" />
  <circle cx="90" cy="400" r="3.5" fill="#0E7490" />
