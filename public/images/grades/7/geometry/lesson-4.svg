  <circle cx="180" cy="280" r="3.5" fill="#0E7490" />
  <text x="180" y="272" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">B</text>
  <circle cx="280" cy="400" r="3.5" fill="#0E7490" />
  <text x="280" y="392" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">C</text>
  <text x="193" y="377" font-family="Arial,sans-serif" font-size="11" fill="#D97706">I</text>
  <rect x="413" y="258" width="370" height="170" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="255" width="370" height="170" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="410" y="255" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="410" y="271" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="595" y="272" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Высоты</text>
  <polygon points="480,400 570,290 690,400" fill="none" stroke="#06B6D4" stroke-width="2" />
  <line x1="480" y1="400" x2="623" y2="375" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" />
  <line x1="570" y1="290" x2="585" y2="400" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" />
  <line x1="690" y1="400" x2="534" y2="358" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" />
  <circle cx="580" cy="377" r="4" fill="#D97706" />
  <circle cx="480" cy="400" r="3.5" fill="#0E7490" />
  <text x="480" y="392" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">A</text>
  <circle cx="570" cy="290" r="3.5" fill="#0E7490" />
  <text x="570" y="282" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">B</text>
  <circle cx="690" cy="400" r="3.5" fill="#0E7490" />
  <text x="690" y="392" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490" text-anchor="middle">C</text>
  <text x="590" y="383" font-family="Arial,sans-serif" font-size="11" fill="#D97706">H</text>
  <rect x="20" y="440" width="370" height="65" fill="#FFF7ED" rx="8" stroke="#D97706" stroke-width="1.5" />
  <rect x="20" y="440" width="5" height="65" fill="#D97706" rx="2" />
  <text x="36" y="460" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Медианы пересекаются в одной</text>
  <text x="36" y="478" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">точке M и делятся 2:1 от вершины.</text>
  <rect x="410" y="440" width="370" height="65" fill="#F0FDF4" rx="8" stroke="#059669" stroke-width="1.5" />
  <rect x="410" y="440" width="5" height="65" fill="#059669" rx="2" />
  <text x="426" y="460" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Высоты пересекаются в одной</text>
  <text x="426" y="478" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">точке H — ортоцентре треугольника.</text>
  <rect x="20" y="520" width="370" height="65" fill="#FDF4FF" rx="8" stroke="#7C3AED" stroke-width="1.5" />
  <rect x="20" y="520" width="5" height="65" fill="#7C3AED" rx="2" />
  <text x="36" y="540" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">Биссектрисы пересекаются в одной</text>
  <text x="36" y="558" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">точке I — центре вписанной окружности.</text>
  <rect x="410" y="520" width="370" height="65" fill="#FEF2F2" rx="8" stroke="#DC2626" stroke-width="1.5" />
  <rect x="410" y="520" width="5" height="65" fill="#DC2626" rx="2" />
  <text x="426" y="540" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">В равнобедренном △ медиана,</text>
  <text x="426" y="558" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#263238">биссектриса и высота совпадают.</text>
</svg>
