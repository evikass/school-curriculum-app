<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#FED7AA;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#9A3412;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#EA580C;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
  </linearGradient>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" floodColor="#9A3412" floodOpacity="0.2" />
  </filter>
  <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="1" dy="1" stdDeviation="2" floodColor="#000" floodOpacity="0.15" />
  </filter>
</defs>
<rect width="800" height="600" fill="url(#bgGrad)" />
<rect x="8" y="8" width="784" height="584" fill="none" stroke="#EA580C" stroke-width="2" rx="8" />
<rect x="14" y="14" width="772" height="572" fill="none" stroke="#D97706" stroke-width="1" rx="6" stroke-dasharray="8,4" />
<rect x="20" y="16" width="760" height="60" fill="url(#titleGrad)" rx="6" filter="url(#shadow)" />
<text x="400" y="46" fill="#FFFFFF" font-size="22" font-weight="bold" text-anchor="middle" font-family="serif">Направления XX–XXI века</text>
<text x="400" y="66" fill="#FED7AA" font-size="12" text-anchor="middle" font-family="sans-serif">Абстракционизм, поп-арт, сюрреализм, цифровое искусство</text>
<circle cx="35" cy="46" r="6" fill="#D97706" opacity="0.6" />
<circle cx="765" cy="46" r="6" fill="#D97706" opacity="0.6" />
<circle cx="400" cy="95" r="14" fill="#EA580C" filter="url(#softShadow)" />
<text x="400" y="100" fill="#FFFFFF" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">5</text>
<rect x="30" y="115" width="355" height="200" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="115" width="355" height="4" fill="#2563EB" rx="2" />
<circle cx="90" cy="158" r="12" fill="#2563EB" opacity="0.15"/><circle cx="90" cy="158" r="6" fill="#2563EB" opacity="0.25"/><circle cx="90" cy="158" r="2" fill="#2563EB" opacity="0.4"/>
<text x="50" y="145" fill="#9A3412" font-size="15" font-weight="bold" font-family="serif">Абстракционизм</text>
<text x="50" y="159" fill="#A16207" font-size="9" font-family="sans-serif">1910-е — наст. время</text>
<text x="42" y="177" fill="#7C2D12" font-size="10" font-family="sans-serif">Отказ от изображения реальных объектов. Главные средства — цвет, линия, форма.</text>
<text x="42" y="197" fill="#7C2D12" font-size="10" font-family="sans-serif">• Основатель: В. Кандинский (“Композиции”)</text>
<text x="42" y="213" fill="#7C2D12" font-size="10" font-family="sans-serif">• Геометрическая абстракция: Малевич (“Чёрный квадрат”)</text>
<text x="42" y="229" fill="#7C2D12" font-size="10" font-family="sans-serif">• Супрематизм — чистые формы и цвет</text>
<text x="42" y="245" fill="#7C2D12" font-size="10" font-family="sans-serif">• Неопластицизм: Мондриан</text>
<rect x="410" y="115" width="355" height="200" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="410" y="115" width="355" height="4" fill="#DC2626" rx="2" />
<rect x="275" y="148" width="16" height="16" fill="#DC2626" opacity="0.2" rx="2"/><rect x="295" y="148" width="16" height="16" fill="#D97706" opacity="0.2" rx="2"/><rect x="275" y="168" width="16" height="16" fill="#F59E0B" opacity="0.2" rx="2"/><rect x="295" y="168" width="16" height="16" fill="#DC2626" opacity="0.2" rx="2"/>
<text x="430" y="145" fill="#9A3412" font-size="15" font-weight="bold" font-family="serif">Поп-арт</text>
<text x="430" y="159" fill="#A16207" font-size="9" font-family="sans-serif">1950-е — 1960-е</text>
<text x="422" y="177" fill="#7C2D12" font-size="10" font-family="sans-serif">Искусство, вдохновлённое массовой культурой: реклама, комиксы, товары.</text>
<text x="422" y="197" fill="#7C2D12" font-size="10" font-family="sans-serif">• Энди Уорхол — “Банка супа Кэмпбелл”</text>
<text x="422" y="213" fill="#7C2D12" font-size="10" font-family="sans-serif">• Рой Лихтенстайн — стиль комиксов</text>
<text x="422" y="229" fill="#7C2D12" font-size="10" font-family="sans-serif">• Использование готовых образов (ready-made)</text>
<text x="422" y="245" fill="#7C2D12" font-size="10" font-family="sans-serif">• Ирония, повтор, яркие цвета</text>
<rect x="30" y="330" width="355" height="200" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="330" width="355" height="4" fill="#7C3AED" rx="2" />
<ellipse cx="610" cy="155" rx="14" ry="10" fill="#7C3AED" opacity="0.15"/><path d="M604,158 Q610,148 616,158" fill="none" stroke="#7C3AED" stroke-width="1.5" opacity="0.3"/><circle cx="610" cy="148" r="3" fill="#7C3AED" opacity="0.2"/>
<text x="50" y="360" fill="#9A3412" font-size="15" font-weight="bold" font-family="serif">Сюрреализм</text>
<text x="50" y="374" fill="#A16207" font-size="9" font-family="sans-serif">1920-е — наст. время</text>
<text x="42" y="392" fill="#7C2D12" font-size="10" font-family="sans-serif">Мир снов и подсознания. Соединение несоединимого, иррациональность.</text>
<text x="42" y="412" fill="#7C2D12" font-size="10" font-family="sans-serif">• Сальвадор Дали — “Постоянство памяти”</text>
<text x="42" y="428" fill="#7C2D12" font-size="10" font-family="sans-serif">• Рене Магритт — “Сын человеческий”</text>
<text x="42" y="444" fill="#7C2D12" font-size="10" font-family="sans-serif">• Марк Шагал — сказочный мир</text>
<text x="42" y="460" fill="#7C2D12" font-size="10" font-family="sans-serif">• Метод: автоматическое письмо, сны</text>
<rect x="410" y="330" width="355" height="200" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="410" y="330" width="355" height="4" fill="#0891B2" rx="2" />
<rect x="705" y="148" width="18" height="14" fill="none" stroke="#0891B2" stroke-width="1.5" opacity="0.3" rx="2"/><line x1="714" y1="162" x2="714" y2="168" stroke="#0891B2" stroke-width="1.5" opacity="0.3"/><line x1="707" y1="168" x2="721" y2="168" stroke="#0891B2" stroke-width="1.5" opacity="0.3"/>
<text x="430" y="360" fill="#9A3412" font-size="15" font-weight="bold" font-family="serif">Цифровое искусство</text>
<text x="430" y="374" fill="#A16207" font-size="9" font-family="sans-serif">1990-е — наст. время</text>
<text x="422" y="392" fill="#7C2D12" font-size="10" font-family="sans-serif">Искусство, созданное с помощью компьютера: графика, анимация, NFT, ИИ.</text>
<text x="422" y="412" fill="#7C2D12" font-size="10" font-family="sans-serif">• CGI, 3D-моделирование, анимация</text>
<text x="422" y="428" fill="#7C2D12" font-size="10" font-family="sans-serif">• Генеративное искусство (алгоритмы)</text>
<text x="422" y="444" fill="#7C2D12" font-size="10" font-family="sans-serif">• Нейросети: Midjourney, DALL-E, Stable Diffusion</text>
<text x="422" y="460" fill="#7C2D12" font-size="10" font-family="sans-serif">• NFT — цифровые сертификаты уникальности</text>
<rect x="30" y="545" width="740" height="38" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="545" width="740" height="4" fill="url(#accentGrad)" rx="2" />
<text x="55" y="568" fill="#9A3412" font-size="11" font-weight="bold" font-family="serif">Эволюция:</text>
<text x="120" y="568" fill="#2563EB" font-size="10" font-weight="bold" font-family="sans-serif">Абстракция</text>
<text x="195" y="568" fill="#7C2D12" font-size="10" font-family="sans-serif">→</text>
<text x="210" y="568" fill="#DC2626" font-size="10" font-weight="bold" font-family="sans-serif">Поп-арт</text>
<text x="265" y="568" fill="#7C2D12" font-size="10" font-family="sans-serif">→</text>
<text x="280" y="568" fill="#7C3AED" font-size="10" font-weight="bold" font-family="sans-serif">Сюрреализм</text>
<text x="360" y="568" fill="#7C2D12" font-size="10" font-family="sans-serif">→</text>
<text x="375" y="568" fill="#D97706" font-size="10" font-weight="bold" font-family="sans-serif">Модернизм</text>
<text x="450" y="568" fill="#7C2D12" font-size="10" font-family="sans-serif">→</text>
<text x="465" y="568" fill="#16A34A" font-size="10" font-weight="bold" font-family="sans-serif">Концептуализм</text>
<text x="555" y="568" fill="#7C2D12" font-size="10" font-family="sans-serif">→</text>
<text x="570" y="568" fill="#0891B2" font-size="10" font-weight="bold" font-family="sans-serif">Цифровое искусство + ИИ</text>
</svg>