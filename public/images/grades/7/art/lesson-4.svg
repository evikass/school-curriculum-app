<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#FED7AA;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#9A3412;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#EA580C;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
  </linearGradient>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" floodColor="#9A3412" floodOpacity="0.2" />
  </filter>
  <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="1" dy="1" stdDeviation="2" floodColor="#000" floodOpacity="0.15" />
  </filter>
</defs>
<rect width="800" height="600" fill="url(#bgGrad)" />
<rect x="8" y="8" width="784" height="584" fill="none" stroke="#EA580C" stroke-width="2" rx="8" />
<rect x="14" y="14" width="772" height="572" fill="none" stroke="#D97706" stroke-width="1" rx="6" stroke-dasharray="8,4" />
<rect x="20" y="16" width="760" height="60" fill="url(#titleGrad)" rx="6" filter="url(#shadow)" />
<text x="400" y="46" fill="#FFFFFF" font-size="22" font-weight="bold" text-anchor="middle" font-family="serif">Передвижники</text>
<text x="400" y="66" fill="#FED7AA" font-size="12" text-anchor="middle" font-family="sans-serif">Товарищество передвижных художественных выставок (1870–1923)</text>
<circle cx="35" cy="46" r="6" fill="#D97706" opacity="0.6" />
<circle cx="765" cy="46" r="6" fill="#D97706" opacity="0.6" />
<circle cx="400" cy="95" r="14" fill="#EA580C" filter="url(#softShadow)" />
<text x="400" y="100" fill="#FFFFFF" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">4</text>
<rect x="30" y="115" width="740" height="80" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="115" width="740" height="4" fill="url(#titleGrad)" rx="2" />
<text x="400" y="140" fill="#9A3412" font-size="13" font-weight="bold" text-anchor="middle" font-family="serif">Художники-передвижники — искусство на службе народа</text>
<text x="42" y="160" fill="#7C2D12" font-size="10" font-family="sans-serif">• Основано в 1870 г. по инициативе Г. Мясоедова, И. Крамского, Н. Ге и др.</text>
<text x="42" y="175" fill="#7C2D12" font-size="10" font-family="sans-serif">• Цель: нести искусство в народ, показывать правду жизни, отказаться от академических условностей</text>
<text x="42" y="190" fill="#7C2D12" font-size="10" font-family="sans-serif">• Выставки передвигались по городам: Москва, Киев, Харьков, Казань и др.</text>
<rect x="30" y="210" width="355" height="148" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="210" width="355" height="4" fill="#DC2626" rx="2" />
<circle cx="50" cy="234" r="10" fill="#DC2626" opacity="0.15" />
<text x="68" y="234" fill="#9A3412" font-size="14" font-weight="bold" font-family="serif">Илья Репин</text>
<text x="68" y="248" fill="#A16207" font-size="9" font-family="sans-serif">(1844–1930)</text>
<text x="42" y="264" fill="#7C2D12" font-size="10" font-family="sans-serif" font-style="italic">Великий русский живописец, мастер портрета и исторической картины</text>
<text x="42" y="282" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Бурлаки на Волге” — тяжёлый труд народа</text>
<text x="42" y="296" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Иван Грозный и сын” — психологич. драма</text>
<text x="42" y="310" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Запорожцы” — юмор и свобода</text>
<text x="42" y="324" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Не ждали” — возвращение ссыльного</text>
<text x="42" y="338" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Крестный ход в Курской губ.”</text>
<rect x="400" y="210" width="355" height="148" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="400" y="210" width="355" height="4" fill="#7C3AED" rx="2" />
<circle cx="420" cy="234" r="10" fill="#7C3AED" opacity="0.15" />
<text x="438" y="234" fill="#9A3412" font-size="14" font-weight="bold" font-family="serif">Василий Суриков</text>
<text x="438" y="248" fill="#A16207" font-size="9" font-family="sans-serif">(1848–1916)</text>
<text x="412" y="264" fill="#7C2D12" font-size="10" font-family="sans-serif" font-style="italic">Мастер масштабных исторических полотен, колорист</text>
<text x="412" y="282" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Утро стрелецкой казни” — Пётр I</text>
<text x="412" y="296" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Боярыня Морозова” — раскольница</text>
<text x="412" y="310" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Меньшиков в Березове” — опала</text>
<text x="412" y="324" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Покорение Сибири Ермаком”</text>
<text x="412" y="338" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Переход Суворова через Альпы”</text>
<rect x="30" y="370" width="355" height="148" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="370" width="355" height="4" fill="#16A34A" rx="2" />
<circle cx="50" cy="394" r="10" fill="#16A34A" opacity="0.15" />
<text x="68" y="394" fill="#9A3412" font-size="14" font-weight="bold" font-family="serif">Иван Шишкин</text>
<text x="68" y="408" fill="#A16207" font-size="9" font-family="sans-serif">(1832–1898)</text>
<text x="42" y="424" fill="#7C2D12" font-size="10" font-family="sans-serif" font-style="italic">Певец русского леса, мастер пейзажной живописи</text>
<text x="42" y="442" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Утро в сосновом лесу” — медведи</text>
<text x="42" y="456" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Рожь” — бескрайние поля</text>
<text x="42" y="470" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Корабельная роща” — величие леса</text>
<text x="42" y="484" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Лесные дали” — панорама</text>
<text x="42" y="498" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Сосновый лес. Мачтовый лес”</text>
<rect x="400" y="370" width="355" height="148" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="400" y="370" width="355" height="4" fill="#D97706" rx="2" />
<circle cx="420" cy="394" r="10" fill="#D97706" opacity="0.15" />
<text x="438" y="394" fill="#9A3412" font-size="14" font-weight="bold" font-family="serif">Исаак Левитан</text>
<text x="438" y="408" fill="#A16207" font-size="9" font-family="sans-serif">(1860–1900)</text>
<text x="412" y="424" fill="#7C2D12" font-size="10" font-family="sans-serif" font-style="italic">Мастер “пейзажа настроения”, тонкий лирик</text>
<text x="412" y="442" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Золотая осень” — яркие краски</text>
<text x="412" y="456" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Владимирка” — путь ссыльных</text>
<text x="412" y="470" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Над вечным покоем” — философия</text>
<text x="412" y="484" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Март” — пробуждение весны</text>
<text x="412" y="498" fill="#7C2D12" font-size="10" font-family="sans-serif">• “Вечерний звон” — монастырь</text>
<rect x="30" y="535" width="740" height="45" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="535" width="740" height="4" fill="url(#goldGrad)" rx="2" />
<text x="55" y="562" fill="#9A3412" font-size="11" font-weight="bold" font-family="serif">Главные идеи передвижников:</text>
<text x="280" y="562" fill="#7C2D12" font-size="10" font-family="sans-serif">реализм • народность • правда жизни • социальная значимость • гражданственность</text>
</svg>