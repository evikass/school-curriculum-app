<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs>
  <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#FED7AA;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#9A3412;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#EA580C;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#D97706;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
  </linearGradient>
  <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="2" dy="2" stdDeviation="3" floodColor="#9A3412" floodOpacity="0.2" />
  </filter>
  <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="1" dy="1" stdDeviation="2" floodColor="#000" floodOpacity="0.15" />
  </filter>
</defs>
<rect width="800" height="600" fill="url(#bgGrad)" />
<rect x="8" y="8" width="784" height="584" fill="none" stroke="#EA580C" stroke-width="2" rx="8" />
<rect x="14" y="14" width="772" height="572" fill="none" stroke="#D97706" stroke-width="1" rx="6" stroke-dasharray="8,4" />
<rect x="20" y="16" width="760" height="60" fill="url(#titleGrad)" rx="6" filter="url(#shadow)" />
<text x="400" y="46" fill="#FFFFFF" font-size="22" font-weight="bold" text-anchor="middle" font-family="serif">Исторический и бытовой жанры</text>
<text x="400" y="66" fill="#FED7AA" font-size="12" text-anchor="middle" font-family="sans-serif">Жанры, рассказывающие о жизни людей: от великих событий до повседневности</text>
<circle cx="35" cy="46" r="6" fill="#D97706" opacity="0.6" />
<circle cx="765" cy="46" r="6" fill="#D97706" opacity="0.6" />
<circle cx="400" cy="95" r="14" fill="#EA580C" filter="url(#softShadow)" />
<text x="400" y="100" fill="#FFFFFF" font-size="14" font-weight="bold" text-anchor="middle" font-family="sans-serif">3</text>
<rect x="30" y="115" width="360" height="250" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="115" width="360" height="4" fill="#DC2626" rx="2" />
<line x1="60" y1="130" x2="80" y2="160" stroke="#DC2626" stroke-width="2" opacity="0.3" />
<line x1="80" y1="130" x2="60" y2="160" stroke="#DC2626" stroke-width="2" opacity="0.3" />
<text x="210" y="142" fill="#9A3412" font-size="16" font-weight="bold" text-anchor="middle" font-family="serif">Исторический жанр</text>
<text x="210" y="158" fill="#A16207" font-size="10" text-anchor="middle" font-family="sans-serif">События истории, подвиги, трагедии народа</text>
<text x="42" y="180" fill="#EA580C" font-size="11" font-weight="bold" font-family="sans-serif">Особенности:</text>
<text x="42" y="196" fill="#7C2D12" font-size="10" font-family="sans-serif">• Изображает значительные исторические события</text>
<text x="42" y="209" fill="#7C2D12" font-size="10" font-family="sans-serif">• Герои — реальные исторические личности</text>
<text x="42" y="222" fill="#7C2D12" font-size="10" font-family="sans-serif">• Драматизм, монументальность, масштабность</text>
<text x="42" y="235" fill="#7C2D12" font-size="10" font-family="sans-serif">• Подчёркивает патриотизм и народный дух</text>
<text x="42" y="257" fill="#EA580C" font-size="11" font-weight="bold" font-family="sans-serif">Поджанры:</text>
<text x="42" y="273" fill="#7C2D12" font-size="10" font-family="sans-serif">• Батальный — сцены сражений</text>
<text x="42" y="286" fill="#7C2D12" font-size="10" font-family="sans-serif">• Историко-бытовой — быт в прошлом</text>
<text x="42" y="299" fill="#7C2D12" font-size="10" font-family="sans-serif">• Мифологический — мифы и легенды</text>
<text x="42" y="322" fill="#EA580C" font-size="11" font-weight="bold" font-family="sans-serif">Произведения:</text>
<text x="42" y="338" fill="#7C2D12" font-size="10" font-family="sans-serif">Суриков “Утро стрелецкой казни”, “Боярыня Морозова”</text>
<text x="42" y="351" fill="#7C2D12" font-size="10" font-family="sans-serif">Репин “Иван Грозный и сын его Иван”</text>
<rect x="410" y="115" width="360" height="250" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="410" y="115" width="360" height="4" fill="#D97706" rx="2" />
<rect x="440" y="142" width="18" height="14" fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.4" />
<polygon points="440,142 449,132 458,142" fill="none" stroke="#D97706" stroke-width="1.5" opacity="0.4" />
<text x="590" y="142" fill="#9A3412" font-size="16" font-weight="bold" text-anchor="middle" font-family="serif">Бытовой жанр</text>
<text x="590" y="158" fill="#A16207" font-size="10" text-anchor="middle" font-family="sans-serif">Повседневная жизнь, труд и отдых людей</text>
<text x="422" y="180" fill="#EA580C" font-size="11" font-weight="bold" font-family="sans-serif">Особенности:</text>
<text x="422" y="196" fill="#7C2D12" font-size="10" font-family="sans-serif">• Изображает повседневную жизнь людей</text>
<text x="422" y="209" fill="#7C2D12" font-size="10" font-family="sans-serif">• Герои — обычные люди, крестьяне, горожане</text>
<text x="422" y="222" fill="#7C2D12" font-size="10" font-family="sans-serif">• Жизненность, правдивость, простота</text>
<text x="422" y="235" fill="#7C2D12" font-size="10" font-family="sans-serif">• Часто — социальная критика, сочувствие</text>
<text x="422" y="257" fill="#EA580C" font-size="11" font-weight="bold" font-family="sans-serif">Виды:</text>
<text x="422" y="273" fill="#7C2D12" font-size="10" font-family="sans-serif">• Сценки из крестьянской жизни</text>
<text x="422" y="286" fill="#7C2D12" font-size="10" font-family="sans-serif">• Городские сцены, интерьеры</text>
<text x="422" y="299" fill="#7C2D12" font-size="10" font-family="sans-serif">• Семейные сцены, трактирные</text>
<text x="422" y="322" fill="#EA580C" font-size="11" font-weight="bold" font-family="sans-serif">Произведения:</text>
<text x="422" y="338" fill="#7C2D12" font-size="10" font-family="sans-serif">Венецианов “На пашне. Весна”</text>
<text x="422" y="351" fill="#7C2D12" font-size="10" font-family="sans-serif">Перов “Тройка”, “Охотники на привале”</text>
<rect x="30" y="380" width="740" height="90" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="380" width="740" height="4" fill="url(#goldGrad)" rx="2" />
<text x="400" y="405" fill="#9A3412" font-size="13" font-weight="bold" text-anchor="middle" font-family="serif">Сравнение жанров</text>
<line x1="400" y1="412" x2="400" y2="465" stroke="#FDBA74" stroke-width="1" />
<text x="55" y="425" fill="#DC2626" font-size="11" font-weight="bold" font-family="sans-serif">Исторический жанр:</text>
<text x="55" y="441" fill="#7C2D12" font-size="10" font-family="sans-serif">• Исключительные события, герои, масштаб</text>
<text x="55" y="457" fill="#7C2D12" font-size="10" font-family="sans-serif">Цель — напомнить о великом, воспитать патриотизм</text>
<text x="420" y="425" fill="#D97706" font-size="11" font-weight="bold" font-family="sans-serif">Бытовой жанр:</text>
<text x="420" y="441" fill="#7C2D12" font-size="10" font-family="sans-serif">• Обычные события, простые люди, будни</text>
<text x="420" y="457" fill="#7C2D12" font-size="10" font-family="sans-serif">Цель — показать реальную жизнь, вызвать сочувствие</text>
<rect x="30" y="485" width="740" height="95" fill="#FFF7ED" rx="6" stroke="#FDBA74" stroke-width="1" filter="url(#softShadow)" />
<rect x="30" y="485" width="740" height="4" fill="url(#accentGrad)" rx="2" />
<text x="400" y="508" fill="#9A3412" font-size="13" font-weight="bold" text-anchor="middle" font-family="serif">Развитие жанров в русском искусстве</text>
<line x1="70" y1="535" x2="730" y2="535" stroke="#EA580C" stroke-width="2" />
<circle cx="120" cy="535" r="6" fill="#EA580C" />
<text x="120" y="555" fill="#431407" font-size="9" font-weight="bold" text-anchor="middle" font-family="sans-serif">XI–XVII вв.</text>
<text x="120" y="568" fill="#7C2D12" font-size="8" text-anchor="middle" font-family="sans-serif">Иконопись</text>
<text x="120" y="578" fill="#7C2D12" font-size="8" text-anchor="middle" font-family="sans-serif">фрески</text>
<circle cx="250" cy="535" r="6" fill="#EA580C" />
<text x="250" y="555" fill="#431407" font-size="9" font-weight="bold" text-anchor="middle" font-family="sans-serif">XVIII в.</text>
<text x="250" y="568" fill="#7C2D12" font-size="8" text-anchor="middle" font-family="sans-serif">Академизм</text>
<text x="250" y="578" fill="#7C2D12" font-size="8" text-anchor="middle" font-family="sans-serif">историч. жанр</text>
<circle cx="400" cy="535" r="6" fill="#EA580C" />
<text x="400" y="555" fill="#431407" font-size="9" font-weight="bold" text-anchor="middle" font-family="sans-serif">1860-е</text>
<text x="400" y="568" fill="#7C2D12" font-size="8" text-anchor="middle" font-family="sans-serif">Передвижники</text>
<text x="400" y="578" fill="#7C2D12" font-size="8" text-anchor="middle" font-family="sans-serif">быт. жанр</text>
<circle cx="550" cy="535" r="6" fill="#EA580C" />
<text x="550" y="555" fill="#431407" font-size="9" font-weight="bold" text-anchor="middle" font-family="sans-serif">Кон. XIX в.</text>
<text x="550" y="568" fill="#7C2D12" font-size="8" text-anchor="middle" font-family="sans-serif">Расцвет обоих жанров</text>
<circle cx="690" cy="535" r="6" fill="#EA580C" />
<text x="690" y="555" fill="#431407" font-size="9" font-weight="bold" text-anchor="middle" font-family="sans-serif">XX–XXI вв.</text>
<text x="690" y="568" fill="#7C2D12" font-size="8" text-anchor="middle" font-family="sans-serif">Смешение жанров</text>
</svg>