<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#FFF1F2"/><rect x="0" y="0" width="800" height="48" fill="#EC4899"/>
<text x="400" y="32" font-size="22" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Правописание причастий</text><circle cx="40" cy="30" r="20" fill="#BE185D"/>
    <text x="40" y="36" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">4</text><rect x="20" y="60" width="760" height="155" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="68" width="314" height="28" rx="14" fill="#EC4899"/>
<text x="187" y="87" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Гласные в суффиксах причастий</text><rect x="35" y="100" width="355" height="100" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="1"/><text x="212" y="118" font-size="14" fill="#BE185D" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Настоящее время</text><text x="45" y="138" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">I спр. → -ущ-/-ющ-  (читающий)</text><text x="45" y="156" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">II спр. → -ащ-/-ящ-  (кричащий)</text><text x="45" y="176" font-size="12" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Страд.: -ом-/-ем- / -им-</text><rect x="410" y="100" width="355" height="100" rx="8" fill="#EEF2FF" stroke="#8B5CF6" stroke-width="1"/><text x="587" y="118" font-size="14" fill="#8B5CF6" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Прошедшее время</text><text x="420" y="138" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Перед -вш- та же гласная, что</text><text x="420" y="156" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">в инфинитиве перед -ть:</text><text x="420" y="176" font-size="12" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">видеть → видевший; клеить → клеивший</text><rect x="20" y="225" width="760" height="220" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="233" width="514" height="28" rx="14" fill="#EF4444"/>
<text x="287" y="252" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Н и НН в причастиях и отглагольных прилагательных</text><rect x="35" y="268" width="355" height="165" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/><text x="212" y="286" font-size="15" fill="#EF4444" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">НН пишется:</text><text x="45" y="304" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">1. Есть приставка (кроме не-):</text><text x="45" y="320" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   связа**нн**ый, выкрашен**н**ый</text><text x="45" y="336" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">2. Есть суффикс -ова-/-ева-/-ирова-:</text><text x="45" y="352" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   балова**нн**ый, маринова**нн**ый</text><text x="45" y="368" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">3. Есть зависимые слова:</text><text x="45" y="384" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   крашен**н**ый (краской) забор</text><text x="45" y="400" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">4. Образовано от бесприст. глагола сов. вида:</text><text x="45" y="416" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   решённый (решить — сов. вид)</text><rect x="410" y="268" width="355" height="165" rx="8" fill="#FDF2F8" stroke="#10B981" stroke-width="1.5"/><text x="587" y="286" font-size="15" fill="#10B981" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Н пишется:</text><text x="420" y="304" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">1. Нет приставки, нет -ова-/-ева-,</text><text x="420" y="320" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   нет зависимых слов:</text><text x="420" y="336" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   крашеный забор</text><text x="420" y="352" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">2. Образовано от глагола несов. вида:</text><text x="420" y="368" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   брошенный → бросить (сов.) — НН</text><text x="420" y="384" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   но: ране**н**ый (ранить — несов.) — Н</text><text x="420" y="400" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">3. Исключения:</text><text x="420" y="416" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   названый брат, посажёный отец,</text><text x="420" y="432" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">   смышлёный мальчик, конченый человек</text><rect x="20" y="455" width="760" height="135" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="463" width="184" height="28" rx="14" fill="#F59E0B"/>
<text x="122" y="482" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">НЕ с причастиями</text><rect x="35" y="496" width="355" height="82" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/><text x="212" y="514" font-size="14" fill="#F59E0B" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Слитно</text><text x="45" y="534" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Без НЕ не употребляется: ненавидевший</text><text x="45" y="550" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Нет зависимых слов, нет противопоставления:</text><text x="45" y="566" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">  непрочитанная книга</text><rect x="410" y="496" width="355" height="82" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/><text x="587" y="514" font-size="14" fill="#EF4444" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Раздельно</text><text x="420" y="534" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Есть зависимые слова:</text><text x="420" y="550" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">  не прочитанная учеником книга</text><text x="420" y="566" font-size="11" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">• Есть противопоставление с а:</text><text x="420" y="582" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">  не прочитанная, а просмотренная книга</text></svg>