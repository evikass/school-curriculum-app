<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#FFF1F2"/><rect x="0" y="0" width="800" height="48" fill="#EC4899"/>
<text x="400" y="32" font-size="22" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Правописание наречий</text><circle cx="40" cy="30" r="20" fill="#BE185D"/>
    <text x="40" y="36" font-size="16" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">7</text><rect x="20" y="60" width="760" height="130" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="68" width="304" height="28" rx="14" fill="#EC4899"/>
<text x="182" y="87" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Буквы О и Е на конце наречий</text><rect x="35" y="100" width="355" height="78" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="1.5"/><text x="212" y="118" font-size="14" fill="#BE185D" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">-О- после твёрдых согласных</text><text x="45" y="138" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">крепко, громко, быстро, часто</text><text x="45" y="156" font-size="12" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Прил. крепкий → крепк-о</text><rect x="410" y="100" width="355" height="78" rx="8" fill="#EEF2FF" stroke="#8B5CF6" stroke-width="1.5"/><text x="587" y="118" font-size="14" fill="#8B5CF6" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">-Е- после мягких согласных</text><text x="420" y="138" font-size="13" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">свеже, горячо, певуче, общий→обоче</text><text x="420" y="156" font-size="12" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">Прил. свежий → свеж-е</text><rect x="20" y="200" width="760" height="120" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="208" width="284" height="28" rx="14" fill="#EF4444"/>
<text x="172" y="227" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Н и НН в наречиях на -о/-е</text><rect x="35" y="240" width="355" height="68" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/><text x="212" y="258" font-size="14" fill="#EF4444" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">НН — от прил. с НН</text><text x="45" y="278" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">взволнова**нн**ый → взволнова**нн**о</text><text x="45" y="294" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">удивлённый → удивлённо</text><rect x="410" y="240" width="355" height="68" rx="8" fill="#FDF2F8" stroke="#10B981" stroke-width="1.5"/><text x="587" y="258" font-size="14" fill="#10B981" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Н — от прил. с Н</text><text x="420" y="278" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">весёлый → весело (весёл → весел + о)</text><text x="420" y="294" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">мудрый → мудро</text><rect x="20" y="330" width="760" height="140" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="338" width="184" height="28" rx="14" fill="#F59E0B"/>
<text x="122" y="357" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">Дефис в наречиях</text><rect x="35" y="368" width="730" height="22" rx="4" fill="#FDF2F8"/><text x="42" y="384" font-size="12" fill="#EC4899" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">по- + -ому/-ему</text><text x="280" y="384" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">по-новому, по-русски, по-летнему</text><rect x="35" y="392" width="730" height="22" rx="4" fill="#FFFFFF"/><text x="42" y="408" font-size="12" fill="#8B5CF6" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">во- + -ых/-их</text><text x="280" y="408" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">во-первых, в-третьих, в-седьмых</text><rect x="35" y="416" width="730" height="22" rx="4" fill="#FDF2F8"/><text x="42" y="432" font-size="12" fill="#10B981" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">кое-/ -то/ -либо/ -нибудь</text><text x="280" y="432" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">кое-где, где-то, когда-либо, куда-нибудь</text><rect x="35" y="440" width="730" height="22" rx="4" fill="#FFFFFF"/><text x="42" y="456" font-size="12" fill="#3B82F6" text-anchor="start" font-weight="bold" font-family="Arial, sans-serif">Сложение синонимов</text><text x="280" y="456" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">еле-еле, мало-мальски, тихо-смирно</text><rect x="20" y="480" width="760" height="110" rx="12" fill="#FFFFFF" stroke="#FBCFE8" stroke-width="1.5"/><rect x="30" y="488" width="204" height="28" rx="14" fill="#BE185D"/>
<text x="132" y="507" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">НЕ и НИ в наречиях</text><rect x="35" y="520" width="355" height="58" rx="8" fill="#FDF2F8" stroke="#EC4899" stroke-width="1"/><text x="212" y="538" font-size="13" fill="#BE185D" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">НЕ — отрицание</text><text x="45" y="556" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">негде, некуда, неоткуда, незачем</text><text x="45" y="572" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">нет условий для действия</text><rect x="410" y="520" width="355" height="58" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/><text x="587" y="538" font-size="13" fill="#EF4444" text-anchor="middle" font-weight="bold" font-family="Arial, sans-serif">НИ — усиление отрицания</text><text x="420" y="556" font-size="12" fill="#1F2937" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">нигде, никуда, ниоткуда, никак</text><text x="420" y="572" font-size="11" fill="#6B7280" text-anchor="start" font-weight="normal" font-family="Arial, sans-serif">в предложении с глаголом + НЕ</text></svg>