<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E1B4B" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#4F46E5" opacity="0.15"/>
  <circle cx="50" cy="560" r="60" fill="#A78BFA" opacity="0.1"/>
  <circle cx="700" cy="550" r="40" fill="#818CF8" opacity="0.1"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>

  <!-- Header bar -->
  <rect x="30" y="15" width="740" height="70" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.8">Урок 9</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Одночлены и многочлены</text>
    <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C7D2FE" opacity="0.9">Стандартный вид и степень</text>
  <rect x="30" y="95" width="740" height="490" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="116" width="8" height="16" rx="2" fill="#4F46E5"/>
  <text x="64" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">Одночлен</text>
  <rect x="50" y="140" width="700" height="60" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="70" y="165" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B">Одночлен — произведение чисел, переменных и их степеней</text>
  <text x="70" y="190" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#4F46E5" font-weight="bold">3x²y    −5a³b    7    x⁴    −2m</text>
  <rect x="50" y="206" width="8" height="16" rx="2" fill="#6366F1"/>
  <text x="64" y="220" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6366F1">Стандартный вид одночлена</text>
  <rect x="50" y="235" width="345" height="80" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="65" y="258" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569">Коэффициент × степени переменных</text>
  <text x="65" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#4F46E5" font-weight="bold">3x × 2x² = 6x³</text>
  <text x="65" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#6366F1">Коэфф.=6, степень=3</text>
  <rect x="415" y="235" width="335" height="80" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="430" y="258" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569" font-weight="bold">Степень одночлена:</text>
  <text x="430" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569">Сумма показателей степеней</text>
  <text x="430" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#6366F1" font-weight="bold">5x³y² → ст.= 3+2 = 5</text>
  <rect x="50" y="326" width="8" height="16" rx="2" fill="#3B82F6"/>
  <text x="64" y="340" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">Многочлен</text>
  <rect x="50" y="355" width="700" height="55" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="70" y="378" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B">Многочлен — сумма одночленов</text>
  <text x="70" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">3x² + 5x − 7    |    a²b − 2ab + b²    |    4m³n − mn² + 8</text>
  <rect x="50" y="416" width="8" height="16" rx="2" fill="#10B981"/>
  <text x="64" y="430" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Свойства многочлена</text>
  <rect x="50" y="445" width="345" height="65" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="65" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B" font-weight="bold">Степень многочлена:</text>
  <text x="65" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#475569">Наибольшая степень входящих</text>
  <text x="65" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#475569">в него одночленов</text>
  <rect x="415" y="445" width="335" height="65" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="430" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B" font-weight="bold">Пример:</text>
  <text x="430" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#4F46E5" font-weight="bold">3x⁴ + 2x² − x + 5</text>
  <text x="430" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#10B981" font-weight="bold">Степень = 4</text>
  <rect x="50" y="525" width="700" height="50" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="70" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B">Члены многочлена: 3x⁴  |  +2x²  |  −x  |  +5 (свободный член)</text>
  <text x="70" y="565" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#6366F1">Подобные члены: 3x² и 5x² (одинаковая переменная часть)</text>
</svg>