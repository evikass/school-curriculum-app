<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E1B4B" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#4F46E5" opacity="0.15"/>
  <circle cx="50" cy="560" r="60" fill="#A78BFA" opacity="0.1"/>
  <circle cx="700" cy="550" r="40" fill="#818CF8" opacity="0.1"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>

  <!-- Header bar -->
  <rect x="30" y="15" width="740" height="70" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.8">Урок 8</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Степень с нулевым показателем</text>
    <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C7D2FE" opacity="0.9">a⁰ = 1 и отрицательные степени</text>
  <rect x="30" y="95" width="740" height="490" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="116" width="8" height="16" rx="2" fill="#4F46E5"/>
  <text x="64" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">Главное правило</text>
  <rect x="150" y="140" width="500" height="60" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="400.0" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Нулевая степень:</text>
  <text x="400.0" y="180.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">a⁰ = 1  (a ≠ 0)</text>
  <rect x="50" y="211" width="8" height="16" rx="2" fill="#6366F1"/>
  <text x="64" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6366F1">Почему a⁰ = 1?</text>
  <rect x="50" y="240" width="700" height="85" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="70" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B">Рассмотрим:  a³ ÷ a³ = a³⁻³ = a⁰</text>
  <text x="70" y="290" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B">Но:  a³ ÷ a³ = 1  (любое число делится само на себя)</text>
  <text x="70" y="315" text-anchor="start" font-family="Arial, sans-serif" font-size="18" fill="#4F46E5" font-weight="bold">Значит:  a⁰ = 1</text>
  <rect x="50" y="331" width="8" height="16" rx="2" fill="#3B82F6"/>
  <text x="64" y="345" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">Закономерность степеней</text>
  <rect x="50" y="360" width="700" height="80" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="70" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#10B981" font-weight="bold">2³</text>
  <text x="70" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">= 8</text>
  <text x="135" y="402" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">÷2</text>
  <text x="182" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#10B981" font-weight="bold">2²</text>
  <text x="182" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">= 4</text>
  <text x="247" y="402" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">÷2</text>
  <text x="294" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#10B981" font-weight="bold">2¹</text>
  <text x="294" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">= 2</text>
  <text x="359" y="402" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">÷2</text>
  <text x="406" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#4F46E5" font-weight="bold">2⁰</text>
  <text x="406" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">= 1</text>
  <text x="471" y="402" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">÷2</text>
  <text x="518" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#EF4444" font-weight="bold">2⁻¹</text>
  <text x="518" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">= 1/2</text>
  <text x="583" y="402" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8">÷2</text>
  <text x="630" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#EF4444" font-weight="bold">2⁻²</text>
  <text x="630" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E293B">= 1/4</text>
  <rect x="50" y="446" width="8" height="16" rx="2" fill="#EF4444"/>
  <text x="64" y="460" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#EF4444">Отрицательные степени</text>
  <rect x="50" y="475" width="340" height="95" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="65" y="500" text-anchor="start" font-family="Arial, sans-serif" font-size="18" fill="#4F46E5" font-weight="bold">a⁻ⁿ = 1 / aⁿ</text>
  <text x="65" y="525" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#6366F1">3⁻² = 1/3² = 1/9</text>
  <text x="65" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#6366F1">5⁻¹ = 1/5</text>
  <rect x="415" y="475" width="335" height="95" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="430" y="500" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#1E293B" font-weight="bold">Важные примеры:</text>
  <text x="430" y="525" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#EF4444" font-weight="bold">0⁰ — не определено!</text>
  <text x="430" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#10B981">1⁰ = 1;  (−5)⁰ = 1</text>
</svg>