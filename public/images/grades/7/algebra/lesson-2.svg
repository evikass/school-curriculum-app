<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E1B4B" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#4F46E5" opacity="0.15"/>
  <circle cx="50" cy="560" r="60" fill="#A78BFA" opacity="0.1"/>
  <circle cx="700" cy="550" r="40" fill="#818CF8" opacity="0.1"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>

  <!-- Header bar -->
  <rect x="30" y="15" width="740" height="70" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.8">Урок 2</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Выражения с переменными</text>
    <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C7D2FE" opacity="0.9">Подстановка и упрощение</text>
  <rect x="30" y="95" width="740" height="490" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="116" width="8" height="16" rx="2" fill="#4F46E5"/>
  <text x="64" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">Выражение с переменной</text>
  <text x="50" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#475569">Содержит буквы (переменные), числа и знаки действий</text>
  <rect x="50" y="165" width="340" height="50" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="220.0" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Выражение:</text>
  <text x="220.0" y="200.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">3x + 5y − 2</text>
  <rect x="410" y="165" width="340" height="50" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="580.0" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Формула:</text>
  <text x="580.0" y="200.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">a² + 2ab + b²</text>
  <rect x="50" y="226" width="8" height="16" rx="2" fill="#6366F1"/>
  <text x="64" y="240" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6366F1">Подстановка значений</text>
  <rect x="50" y="255" width="700" height="110" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="70" y="280" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B">Найти значение выражения  2x + 3  при x = 4:</text>
  <text x="70" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#475569">2x + 3 =</text>
  <text x="180" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#4F46E5" font-weight="bold">2 · 4 + 3 =</text>
  <text x="320" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#4F46E5" font-weight="bold">8 + 3 =</text>
  <text x="420" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="18" fill="#10B981" font-weight="bold">11</text>
  <text x="70" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B">Найти значение  5a − b  при a = 2, b = 3:</text>
  <text x="70" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#4F46E5" font-weight="bold">5 · 2 − 3 = 10 − 3 = 7</text>
  <rect x="50" y="376" width="8" height="16" rx="2" fill="#10B981"/>
  <text x="64" y="390" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Упрощение выражений</text>
  <rect x="50" y="405" width="340" height="80" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="65" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569" font-weight="bold">Приведение подобных:</text>
  <text x="65" y="455" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#4F46E5" font-weight="bold">3x + 5x = 8x</text>
  <text x="65" y="475" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#4F46E5" font-weight="bold">7a − 2a + 3a = 8a</text>
  <rect x="410" y="405" width="340" height="80" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="425" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569" font-weight="bold">Раскрытие скобок:</text>
  <text x="425" y="455" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#6366F1" font-weight="bold">2(x + 3) = 2x + 6</text>
  <text x="425" y="475" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#6366F1" font-weight="bold">−(a − b) = −a + b</text>
  <rect x="50" y="505" width="700" height="65" rx="10" fill="#3730A3" filter="url(#shadowSm)"/>
  <text x="400" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">Правило: Подобные слагаемые — с одинаковой переменной частью</text>
  <text x="400" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#C7D2FE" font-weight="bold">3xy + 5xy = 8xy    |    4a² − a² = 3a²</text>
</svg>