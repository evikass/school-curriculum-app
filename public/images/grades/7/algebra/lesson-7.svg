<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E1B4B" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#4F46E5" opacity="0.15"/>
  <circle cx="50" cy="560" r="60" fill="#A78BFA" opacity="0.1"/>
  <circle cx="700" cy="550" r="40" fill="#818CF8" opacity="0.1"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>

  <!-- Header bar -->
  <rect x="30" y="15" width="740" height="70" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.8">Урок 7</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Степень и её свойства</text>
    <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C7D2FE" opacity="0.9">aⁿ и операции со степенями</text>
  <rect x="30" y="95" width="740" height="490" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="116" width="8" height="16" rx="2" fill="#4F46E5"/>
  <text x="64" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">Определение степени</text>
  <rect x="50" y="140" width="700" height="60" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="70" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="20" fill="#4F46E5" font-weight="bold">aⁿ = a · a · a · ... · a</text>
  <text x="360" y="158" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569">n раз</text>
  <text x="460" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#6366F1" font-weight="bold">2⁵ = 2·2·2·2·2 = 32</text>
  <rect x="50" y="211" width="8" height="16" rx="2" fill="#6366F1"/>
  <text x="64" y="225" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6366F1">Свойства степеней</text>
  <rect x="50" y="240" width="700" height="48" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="240" width="8" height="48" rx="3" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="70" y="258" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#4F46E5" font-weight="bold">Умножение</text>
  <text x="70" y="278" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B" font-weight="bold">aⁿ · aᵐ = aⁿ⁺ᵐ</text>
  <text x="460" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#4F46E5">2³ · 2⁴ = 2⁷ = 128</text>
  <rect x="50" y="296" width="700" height="48" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="296" width="8" height="48" rx="3" fill="#6366F1" filter="url(#shadowSm)"/>
  <text x="70" y="314" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#6366F1" font-weight="bold">Деление</text>
  <text x="70" y="334" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B" font-weight="bold">aⁿ ÷ aᵐ = aⁿ⁻ᵐ</text>
  <text x="460" y="326" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#6366F1">3⁵ ÷ 3² = 3³ = 27</text>
  <rect x="50" y="352" width="700" height="48" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="352" width="8" height="48" rx="3" fill="#3B82F6" filter="url(#shadowSm)"/>
  <text x="70" y="370" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#3B82F6" font-weight="bold">Степень степени</text>
  <text x="70" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B" font-weight="bold">(aⁿ)ᵐ = aⁿˣᵐ</text>
  <text x="460" y="382" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#3B82F6">(2³)² = 2⁶ = 64</text>
  <rect x="50" y="408" width="700" height="48" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="408" width="8" height="48" rx="3" fill="#10B981" filter="url(#shadowSm)"/>
  <text x="70" y="426" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#10B981" font-weight="bold">Степень произведения</text>
  <text x="70" y="446" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B" font-weight="bold">(ab)ⁿ = aⁿbⁿ</text>
  <text x="460" y="438" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#10B981">(2·3)² = 4·9 = 36</text>
  <rect x="50" y="464" width="700" height="48" rx="6" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="464" width="8" height="48" rx="3" fill="#F59E0B" filter="url(#shadowSm)"/>
  <text x="70" y="482" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#F59E0B" font-weight="bold">Степень частного</text>
  <text x="70" y="502" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B" font-weight="bold">(a/b)ⁿ = aⁿ/bⁿ</text>
  <text x="460" y="494" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#F59E0B">(4/2)³ = 64/8 = 8</text>
</svg>