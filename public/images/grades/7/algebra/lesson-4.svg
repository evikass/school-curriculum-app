<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E1B4B" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#4F46E5" opacity="0.15"/>
  <circle cx="50" cy="560" r="60" fill="#A78BFA" opacity="0.1"/>
  <circle cx="700" cy="550" r="40" fill="#818CF8" opacity="0.1"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>

  <!-- Header bar -->
  <rect x="30" y="15" width="740" height="70" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.8">Урок 4</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Уравнения с модулями</text>
    <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C7D2FE" opacity="0.9">|x| = a и разбор случаев</text>
  <rect x="30" y="95" width="740" height="490" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="116" width="8" height="16" rx="2" fill="#4F46E5"/>
  <text x="64" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">Определение модуля</text>
  <rect x="50" y="140" width="340" height="55" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="220.0" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Если a ≥ 0:</text>
  <text x="220.0" y="177.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">|a| = a, a ≥ 0</text>
  <rect x="410" y="140" width="340" height="55" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="580.0" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Если a &amp;lt; 0:</text>
  <text x="580.0" y="177.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">|a| = −a, a &amp;lt; 0</text>
  <rect x="50" y="206" width="8" height="16" rx="2" fill="#6366F1"/>
  <text x="64" y="220" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6366F1">Уравнение |x| = a</text>
  <rect x="50" y="235" width="350" height="95" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="65" y="260" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#10B981" font-weight="bold">Если a &amp;gt; 0:</text>
  <text x="65" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#4F46E5" font-weight="bold">|x| = a  →  x = a  или  x = −a</text>
  <text x="65" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569">Два корня!</text>
  <rect x="415" y="235" width="335" height="95" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="430" y="260" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#F59E0B" font-weight="bold">Если a = 0:</text>
  <text x="430" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#F59E0B" font-weight="bold">|x| = 0  →  x = 0</text>
  <text x="430" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569">Один корень</text>
  <rect x="50" y="341" width="8" height="16" rx="2" fill="#3B82F6"/>
  <text x="64" y="355" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">Геометрический смысл</text>
  <text x="50" y="375" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#475569">|x| — расстояние от числа x до нуля на числовой прямой</text>
  <rect x="50" y="388" width="700" height="70" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="70" y="410" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#4F46E5" font-weight="bold">|x| = 3</text>
  <line x1="90" y1="435" x2="710" y2="435" stroke="#475569" stroke-width="2"/>
  <polygon points="710,435 702,431 702,439" fill="#475569"/>
  <circle cx="400" cy="435" r="4" fill="#1E293B"/>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#475569">0</text>
  <circle cx="310" cy="435" r="5" fill="#EF4444"/>
  <text x="310" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#EF4444" font-weight="bold">−3</text>
  <circle cx="490" cy="435" r="5" fill="#EF4444"/>
  <text x="490" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#EF4444" font-weight="bold">3</text>
  <line x1="315" y1="420" x2="395" y2="420" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="405" y1="420" x2="485" y2="420" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="400" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#EF4444" font-weight="bold">3</text>
  <rect x="50" y="470" width="700" height="100" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="65" y="495" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#1E293B" font-weight="bold">Пример: |2x − 1| = 5</text>
  <text x="65" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#4F46E5" font-weight="bold">Случай 1: 2x − 1 = 5 → 2x = 6 → x = 3</text>
  <text x="65" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#6366F1" font-weight="bold">Случай 2: 2x − 1 = −5 → 2x = −4 → x = −2</text>
  <text x="65" y="562" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#10B981" font-weight="bold">Ответ: x = 3  или  x = −2</text>
</svg>