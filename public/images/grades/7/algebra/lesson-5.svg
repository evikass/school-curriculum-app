<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3730A3;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EEF2FF;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1E1B4B" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#1E1B4B" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#4F46E5" opacity="0.15"/>
  <circle cx="50" cy="560" r="60" fill="#A78BFA" opacity="0.1"/>
  <circle cx="700" cy="550" r="40" fill="#818CF8" opacity="0.1"/>
  <!-- Subtle grid pattern -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>
  <line x1="800" y1="0" x2="0" y2="600" stroke="#4F46E5" stroke-width="0.3" opacity="0.05"/>

  <!-- Header bar -->
  <rect x="30" y="15" width="740" height="70" rx="12" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="60" y="48" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" opacity="0.8">Урок 5</text>
  <text x="400" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Что такое функция</text>
    <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C7D2FE" opacity="0.9">Область определения и значения</text>
  <rect x="30" y="95" width="740" height="490" rx="10" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="50" y="116" width="8" height="16" rx="2" fill="#4F46E5"/>
  <text x="64" y="130" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4F46E5">Определение функции</text>
  <rect x="50" y="140" width="700" height="55" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="400" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#1E293B" font-weight="bold">Функция — зависимость, где каждому x соответствует единственное y</text>
  <text x="400" y="183" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4F46E5" font-weight="bold">Запись: y = f(x)</text>
  <rect x="50" y="201" width="8" height="16" rx="2" fill="#6366F1"/>
  <text x="64" y="215" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#6366F1">Ключевые понятия</text>
  <rect x="50" y="230" width="220" height="80" rx="8" fill="#4F46E5" filter="url(#shadowSm)"/>
  <text x="160" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">x — аргумент</text>
  <text x="160" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C7D2FE">Независимая</text>
  <text x="160" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C7D2FE">переменная</text>
  <polygon points="275,270 290,264 290,276" fill="#A78BFA"/>
  <text x="283" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#A78BFA" font-weight="bold">f</text>
  <rect x="300" y="230" width="220" height="80" rx="8" fill="#6366F1" filter="url(#shadowSm)"/>
  <text x="410" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">f — функция</text>
  <text x="410" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C7D2FE">Правило</text>
  <text x="410" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C7D2FE">соответствия</text>
  <polygon points="525,270 540,264 540,276" fill="#A78BFA"/>
  <rect x="550" y="230" width="220" height="80" rx="8" fill="#3730A3" filter="url(#shadowSm)"/>
  <text x="660" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">y — значение</text>
  <text x="660" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C7D2FE">Зависимая</text>
  <text x="660" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#C7D2FE">переменная</text>
  <rect x="50" y="321" width="8" height="16" rx="2" fill="#10B981"/>
  <text x="64" y="335" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Область определения и значений</text>
  <rect x="50" y="350" width="345" height="90" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="65" y="375" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#4F46E5" font-weight="bold">Область определения D(f)</text>
  <text x="65" y="398" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569">Все допустимые значения x</text>
  <text x="65" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#6366F1" font-style="italic">Пример: y = 1/x  →  D(f) = R\{0}</text>
  <rect x="415" y="350" width="335" height="90" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <text x="430" y="375" text-anchor="start" font-family="Arial, sans-serif" font-size="14" fill="#6366F1" font-weight="bold">Множество значений E(f)</text>
  <text x="430" y="398" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#475569">Все значения функции y</text>
  <text x="430" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#4F46E5" font-style="italic">Пример: y = x²  →  E(f) = [0; +∞)</text>
  <rect x="50" y="446" width="8" height="16" rx="2" fill="#3B82F6"/>
  <text x="64" y="460" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#3B82F6">Диаграмма соответствия</text>
  <rect x="50" y="475" width="700" height="95" rx="8" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <ellipse cx="140" cy="522" rx="70" ry="35" fill="#C7D2FE" stroke="#4F46E5" stroke-width="2"/>
  <text x="140" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#4F46E5" font-weight="bold">D(f)</text>
  <text x="120" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E293B">1</text>
  <text x="140" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E293B">2</text>
  <text x="160" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E293B">3</text>
  <line x1="210" y1="515" x2="580" y2="510" stroke="#4F46E5" stroke-width="1.5" marker-end="url(#arrowMarker)"/>
  <line x1="210" y1="525" x2="580" y2="525" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="210" y1="535" x2="580" y2="540" stroke="#4F46E5" stroke-width="1.5"/>
  <ellipse cx="650" cy="522" rx="70" ry="35" fill="#C7D2FE" stroke="#6366F1" stroke-width="2"/>
  <text x="650" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6366F1" font-weight="bold">E(f)</text>
  <text x="630" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E293B">a</text>
  <text x="650" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E293B">b</text>
  <text x="670" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1E293B">c</text>
  <defs><marker id="arrowMarker" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0,0 8,3 0,6" fill="#4F46E5"/></marker></defs>
</svg>