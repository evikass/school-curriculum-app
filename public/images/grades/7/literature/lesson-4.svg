<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-color="#00000015"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">А.С. Пушкин. «Полтава»</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="105" height="24" rx="12" fill="#D97706" opacity="0.9"/>
  <text x="64" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Литература 7</text><rect x="16" y="100" width="370" height="155" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">О поэме</text><circle cx="34" cy="125" r="2.5" fill="#D97706"/><text x="44" y="128" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Историческая поэма (1828 г.)</text><circle cx="34" cy="147" r="2.5" fill="#D97706"/><text x="44" y="150" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Посвящена Полтавской битве (1709 г.)</text><circle cx="34" cy="169" r="2.5" fill="#D97706"/><text x="44" y="172" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Три песни (песни-главы)</text><circle cx="34" cy="191" r="2.5" fill="#D97706"/><text x="44" y="194" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Сочетание любовной и исторической линий</text><circle cx="34" cy="213" r="2.5" fill="#D97706"/><text x="44" y="216" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Пётр I — идеал просвещённого монарха</text><rect x="414" y="100" width="370" height="155" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Главные герои</text><rect x="428" y="126" width="110" height="30" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="483.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Пётр I</text><text x="428" y="170" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Царь-реформатор, полководец</text><rect x="560" y="126" width="110" height="30" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/><text x="615.0" y="145.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Мазепа</text><text x="560" y="170" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Гетман, предатель Петра</text><rect x="428" y="185" width="110" height="30" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="483.0" y="204.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Кочубей</text><text x="428" y="229" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Судья, отец Марии</text><rect x="560" y="185" width="110" height="30" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5"/><text x="615.0" y="204.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Мария</text><text x="560" y="229" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Дочь Кочубея, возлюбленная</text><line x1="538" y1="141" x2="560" y2="141" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,2"/><text x="549" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#EF4444">враги</text><line x1="538" y1="200" x2="560" y2="200" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3,2"/><text x="549" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#EC4899">дочь</text><rect x="16" y="270" width="768" height="100" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="400.0" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Композиция поэмы (три песни)</text><rect x="35" y="295" width="75" height="22" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="72.5" y="310.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Песнь 1</text><text x="117" y="311" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Любовь Марии и Мазепы, конфликт с Кочубеем</text><rect x="285" y="295" width="75" height="22" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="322.5" y="310.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Песнь 2</text><text x="367" y="311" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Предательство Мазепы, казнь Кочубея</text><rect x="535" y="295" width="75" height="22" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="572.5" y="310.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Песнь 3</text><text x="617" y="311" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Полтавская битва, победа Петра</text><rect x="16" y="385" width="370" height="200" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Исторический контекст</text><circle cx="34" cy="412" r="2.5" fill="#D97706"/><text x="44" y="415" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Северная война (1700–1721 гг.)</text><circle cx="34" cy="436" r="2.5" fill="#D97706"/><text x="44" y="439" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Полтавская битва — 27 июня 1709 г.</text><circle cx="34" cy="460" r="2.5" fill="#D97706"/><text x="44" y="463" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Решающая победа над шведами Карла XII</text><circle cx="34" cy="484" r="2.5" fill="#D97706"/><text x="44" y="487" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Мазепа перешёл на сторону шведов</text><circle cx="34" cy="508" r="2.5" fill="#D97706"/><text x="44" y="511" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Битва определила ход войны</text><circle cx="34" cy="532" r="2.5" fill="#D97706"/><text x="44" y="535" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Пётр: «Шведы — это враги, но учителя»</text><rect x="414" y="385" width="370" height="200" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Темы и идеи</text><rect x="428" y="409" width="120" height="20" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="488.0" y="423.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Исторический долг</text><text x="556" y="420" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Служение Родине выше личного</text><rect x="428" y="449" width="120" height="20" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="488.0" y="463.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Предательство</text><text x="556" y="460" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Мазепа — коварный предатель</text><rect x="428" y="489" width="120" height="20" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="488.0" y="503.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Любовь и долг</text><text x="556" y="500" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Мария разрывается между чувствами</text><rect x="428" y="529" width="120" height="20" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="488.0" y="543.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Слава России</text><text x="556" y="540" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Пётр — воплощение силы державы</text><circle cx="760" cy="82" r="10" fill="none" stroke="#D97706" stroke-width="1.5"/><text x="760" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D97706">⚔</text>
</svg>