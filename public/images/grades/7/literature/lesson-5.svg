<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-color="#00000015"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">М.Ю. Лермонтов. «Песня про царя Ивана Васильевича»</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="105" height="24" rx="12" fill="#D97706" opacity="0.9"/>
  <text x="64" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Литература 7</text><rect x="16" y="100" width="370" height="130" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">О произведении</text><circle cx="34" cy="123" r="2.5" fill="#D97706"/><text x="44" y="126" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Поэма-песня (1837 г.)</text><circle cx="34" cy="145" r="2.5" fill="#D97706"/><text x="44" y="148" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Жанр: историческая песня</text><circle cx="34" cy="167" r="2.5" fill="#D97706"/><text x="44" y="170" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Время действия: эпоха Ивана Грозного</text><circle cx="34" cy="189" r="2.5" fill="#D97706"/><text x="44" y="192" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Тема: честь, достоинство, справедливость</text><rect x="414" y="100" width="370" height="195" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Система персонажей</text><rect x="490" y="124" width="140" height="30" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/><text x="560.0" y="143.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Царь Иван</text><text x="560" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Власть, произвол, но — справедливость</text><rect x="425" y="182" width="155" height="30" rx="8" fill="#FED7AA" stroke="#F97316" stroke-width="1.5"/><text x="502.5" y="201.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Кирибеевич</text><text x="425" y="224" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Опричник, любимец царя, бесчестен</text><rect x="620" y="182" width="145" height="30" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="692.5" y="201.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Калашников</text><text x="620" y="224" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Купец, защитник чести, праведник</text><rect x="520" y="242" width="145" height="24" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5"/><text x="592.5" y="258.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Алёна Дмитриевна</text><text x="520" y="278" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Жена Калашникова, верность</text><line x1="502" y1="154" x2="480" y2="182" stroke="#F97316" stroke-width="1.5" stroke-dasharray="3,2"/><text x="475" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#F97316">слуги</text><line x1="580" y1="212" x2="620" y2="197" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="3,2"/><text x="605" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#EF4444">враги</text><line x1="620" y1="240" x2="590" y2="242" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="3,2"/><rect x="16" y="245" width="370" height="115" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Конфликт</text><text x="30" y="275" font-family="Arial, sans-serif" font-size="9" fill="#92400E" font-weight="bold">Кирибеевич:</text><text x="30" y="290" font-family="Arial, sans-serif" font-size="9" fill="#92400E">«Не стыдно тебе, старый, до белого света…» — домогательство</text><text x="30" y="310" font-family="Arial, sans-serif" font-size="9" fill="#92400E" font-weight="bold">Калашников:</text><text x="30" y="325" font-family="Arial, sans-serif" font-size="9" fill="#92400E">«Я убил его вольной волею, а за что — не скажу» — защита чести</text><text x="30" y="345" font-family="Arial, sans-serif" font-size="9" fill="#92400E" font-weight="bold">Итог:</text><text x="72" y="345" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Казнь Калашникова, но народное уважение</text><rect x="16" y="375" width="370" height="210" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Темы и идеи</text><rect x="30" y="397" width="135" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="97.5" y="410.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Честь и достоинство</text><text x="172" y="406" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Выше жизни, выше царской воли</text><rect x="30" y="431" width="135" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="97.5" y="444.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Произвол власти</text><text x="172" y="440" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Опричнина — вне закона и морали</text><rect x="30" y="465" width="135" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="97.5" y="478.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Народная правда</text><text x="172" y="474" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Калашников — носитель народной правды</text><rect x="30" y="499" width="135" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="97.5" y="512.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Личность и государство</text><text x="172" y="508" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Конфликт человека с деспотизмом</text><rect x="30" y="533" width="135" height="18" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="97.5" y="546.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Справедливость</text><text x="172" y="542" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Царь казнит, но признаёт правоту</text><rect x="414" y="375" width="370" height="210" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Художественные средства</text><circle cx="432" cy="402" r="2.5" fill="#D97706"/><text x="442" y="405" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Фольклорный стиль (песня, былина)</text><circle cx="432" cy="428" r="2.5" fill="#D97706"/><text x="442" y="431" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Постоянные эпитеты («добрый молодец»)</text><circle cx="432" cy="454" r="2.5" fill="#D97706"/><text x="442" y="457" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Риторические вопросы и обращения</text><circle cx="432" cy="480" r="2.5" fill="#D97706"/><text x="442" y="483" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Антитеза (Кирибеевич — Калашников)</text><circle cx="432" cy="506" r="2.5" fill="#D97706"/><text x="442" y="509" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Гипербола в описании кулачного боя</text><circle cx="432" cy="532" r="2.5" fill="#D97706"/><text x="442" y="535" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Символика (заря, тучи — предвестие)</text><circle cx="760" cy="82" r="10" fill="none" stroke="#D97706" stroke-width="1.5"/><text x="760" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D97706">👑</text>
</svg>