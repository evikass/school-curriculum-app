<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-color="#00000015"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">Н.В. Гоголь. «Тарас Бульба»</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="105" height="24" rx="12" fill="#D97706" opacity="0.9"/>
  <text x="64" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Литература 7</text><rect x="16" y="100" width="370" height="140" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">О повести</text><circle cx="34" cy="123" r="2.5" fill="#D97706"/><text x="44" y="126" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Повесть (1835 г.), жанр: историческая</text><circle cx="34" cy="147" r="2.5" fill="#D97706"/><text x="44" y="150" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Действие — XV век, Запорожская Сечь</text><circle cx="34" cy="171" r="2.5" fill="#D97706"/><text x="44" y="174" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Основа — народные песни и предания</text><circle cx="34" cy="195" r="2.5" fill="#D97706"/><text x="44" y="198" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Проблема: долг, предательство, патриотизм</text><rect x="414" y="100" width="370" height="195" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Персонажи: семья Бульба</text><rect x="530" y="124" width="140" height="30" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="600.0" y="143.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Тарас Бульба</text><text x="600" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Полковник, идеал казачества</text><rect x="428" y="180" width="120" height="28" rx="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><text x="488.0" y="198.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Остап</text><text x="428" y="218" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Старший сын, воин, твёрдость</text><rect x="620" y="180" width="120" height="28" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/><text x="680.0" y="198.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Андрий</text><text x="620" y="218" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Младший сын, предатель, любовь</text><line x1="560" y1="154" x2="488" y2="180" stroke="{ACCENT}" stroke-width="1.5"/><line x1="640" y1="154" x2="680" y2="180" stroke="{ACCENT}" stroke-width="1.5"/><line x1="548" y1="194" x2="620" y2="194" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,2"/><text x="584" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#EF4444">конфликт</text><rect x="690" y="220" width="80" height="24" rx="8" fill="#FCE7F3" stroke="#EC4899" stroke-width="1.5"/><text x="730.0" y="236.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#78350F" font-weight="bold">Панночка</text><line x1="680" y1="208" x2="710" y2="220" stroke="#EC4899" stroke-width="1" stroke-dasharray="3,2"/><text x="690" y="256" font-family="Arial, sans-serif" font-size="8" fill="{TEXT_BODY}">Ради неё Андрий предаёт</text><rect x="16" y="255" width="370" height="105" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Казачья жизнь</text><circle cx="34" cy="280" r="2.5" fill="#D97706"/><text x="44" y="283" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Запорожская Сечь — вольное братство</text><circle cx="34" cy="300" r="2.5" fill="#D97706"/><text x="44" y="303" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Товарищество — высшая ценность</text><circle cx="34" cy="320" r="2.5" fill="#D97706"/><text x="44" y="323" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Война за веру и свободу</text><circle cx="34" cy="340" r="2.5" fill="#D97706"/><text x="44" y="343" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Равенство казаков, выборность атамана</text><rect x="414" y="310" width="370" height="105" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Остап и Андрий — сравнение</text><text x="428" y="338" font-family="Arial, sans-serif" font-size="9" fill="#3B82F6" font-weight="bold">Остап:</text><text x="428" y="353" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Твёрдый, храбрый, преданный</text><text x="428" y="368" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Долг выше чувств, мученик</text><text x="428" y="383" font-family="Arial, sans-serif" font-size="8" fill="#92400E">«Я вас не продам!»</text><text x="610" y="338" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="bold">Андрий:</text><text x="610" y="353" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Мягкий, чувствительный</text><text x="610" y="368" font-family="Arial, sans-serif" font-size="8" fill="#92400E">Любовь выше долга, предатель</text><text x="610" y="383" font-family="Arial, sans-serif" font-size="8" fill="#92400E">«Отчизна — это ты!»</text><line x1="595" y1="332" x2="595" y2="400" stroke="#FDE68A" stroke-width="1" stroke-dasharray="4,3"/><rect x="16" y="375" width="768" height="210" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="400.0" y="393" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Темы и проблематика</text><rect x="35" y="410" width="140" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="105.0" y="425.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Патриотизм</text><text x="35" y="448" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Любовь к Родине — высшая добродетель</text><rect x="285" y="410" width="140" height="22" rx="8" fill="#FEE2E2" stroke="#D97706" stroke-width="1.5"/><text x="355.0" y="425.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Предательство</text><text x="285" y="448" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Андрий — самое страшное преступление</text><rect x="535" y="410" width="140" height="22" rx="8" fill="#DBEAFE" stroke="#D97706" stroke-width="1.5"/><text x="605.0" y="425.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Товарищество</text><text x="535" y="448" font-family="Arial, sans-serif" font-size="9" fill="#92400E">«Нет уз святее товарищества»</text><rect x="35" y="490" width="140" height="22" rx="8" fill="#FED7AA" stroke="#D97706" stroke-width="1.5"/><text x="105.0" y="505.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Отец и дети</text><text x="35" y="528" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Тарас убивает сына — трагедия долга</text><rect x="285" y="490" width="140" height="22" rx="8" fill="#BBF7D0" stroke="#D97706" stroke-width="1.5"/><text x="355.0" y="505.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Свобода</text><text x="285" y="528" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Казачья воля против угнетения</text><circle cx="760" cy="82" r="10" fill="none" stroke="#D97706" stroke-width="1.5"/><text x="760" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D97706">🗡</text>
</svg>