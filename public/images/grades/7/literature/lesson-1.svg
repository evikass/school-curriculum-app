<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFBEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FEF3C7;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
    <filter id="shadowLight" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0.5" dy="0.5" stdDeviation="1" flood-color="#00000015"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">Былины. Илья Муромец и Соловей-разбойник</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="105" height="24" rx="12" fill="#D97706" opacity="0.9"/>
  <text x="64" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Литература 7</text><rect x="16" y="100" width="370" height="240" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Признаки былины</text><circle cx="34" cy="127" r="2.5" fill="#D97706"/><text x="44" y="130" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Гиперболизация — преувеличение силы героя</text><circle cx="34" cy="147" r="2.5" fill="#D97706"/><text x="44" y="150" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Повторы — троекратные повторы действий</text><circle cx="34" cy="167" r="2.5" fill="#D97706"/><text x="44" y="170" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Постоянные эпитеты — «добрый молодец»</text><circle cx="34" cy="187" r="2.5" fill="#D97706"/><text x="44" y="190" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Ритмизованная речь, напевность</text><circle cx="34" cy="207" r="2.5" fill="#D97706"/><text x="44" y="210" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Историческая основа и фантастический сюжет</text><circle cx="34" cy="227" r="2.5" fill="#D97706"/><text x="44" y="230" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Устная передача от сказителей</text><rect x="414" y="100" width="370" height="240" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Главные герои</text><rect x="430" y="130" width="150" height="40" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="505.0" y="154.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#78350F" font-weight="bold">Илья Муромец</text><circle cx="439" cy="182" r="2.5" fill="#D97706"/><text x="449" y="185" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Богатырь, защитник Руси</text><circle cx="439" cy="197" r="2.5" fill="#D97706"/><text x="449" y="200" font-family="Arial, sans-serif" font-size="9" fill="#92400E">30 лет сидел «на печи»</text><circle cx="439" cy="212" r="2.5" fill="#D97706"/><text x="449" y="215" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Освободил дорогу в Киев</text><rect x="610" y="130" width="155" height="40" rx="8" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/><text x="687.5" y="154.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#78350F" font-weight="bold">Соловей-разбойник</text><circle cx="619" cy="182" r="2.5" fill="#D97706"/><text x="629" y="185" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Свистом губил людей</text><circle cx="619" cy="197" r="2.5" fill="#D97706"/><text x="629" y="200" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Сидел у дороги 30 лет</text><circle cx="619" cy="212" r="2.5" fill="#D97706"/><text x="629" y="215" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Побеждён Ильёй</text><line x1="580" y1="150" x2="610" y2="150" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,2"/><text x="595" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#EF4444">борьба</text><rect x="16" y="355" width="370" height="230" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="201.0" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Композиция былины</text><rect x="30" y="382" width="80" height="22" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="70.0" y="397.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Зачин</text><text x="120" y="394" font-family="Arial, sans-serif" font-size="9" fill="#92400E">«Из того ли из города из Мурома»</text><line x1="70" y1="404" x2="70" y2="426" stroke="#D97706" stroke-width="1.5"/><rect x="30" y="426" width="80" height="22" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="70.0" y="441.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Экспозиция</text><text x="120" y="438" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Илья едет по дороге в Киев</text><line x1="70" y1="448" x2="70" y2="470" stroke="#D97706" stroke-width="1.5"/><rect x="30" y="470" width="80" height="22" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="70.0" y="485.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Кульминация</text><text x="120" y="482" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Бой с Соловьём-разбойником</text><line x1="70" y1="492" x2="70" y2="514" stroke="#D97706" stroke-width="1.5"/><rect x="30" y="514" width="80" height="22" rx="8" fill="#D97706" stroke="#D97706" stroke-width="1.5"/><text x="70.0" y="529.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Развязка</text><text x="120" y="526" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Илья везёт врага в Киев</text><rect x="414" y="355" width="370" height="230" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/><text x="599.0" y="373" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#78350F" font-weight="bold">Темы и идеи</text><rect x="430" y="377" width="120" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="490.0" y="392.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Патриотизм</text><text x="560" y="389" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Защита родной земли от врагов</text><rect x="430" y="421" width="120" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="490.0" y="436.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Сила духа</text><text x="560" y="433" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Настоящая сила — в мужестве</text><rect x="430" y="465" width="120" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="490.0" y="480.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Справедливость</text><text x="560" y="477" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Добро побеждает зло</text><rect x="430" y="509" width="120" height="22" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="490.0" y="524.0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#78350F" font-weight="bold">Народный идеал</text><text x="560" y="521" font-family="Arial, sans-serif" font-size="9" fill="#92400E">Герой — выразитель народных чаяний</text><circle cx="760" cy="82" r="10" fill="none" stroke="#D97706" stroke-width="1.5"/><text x="760" y="87" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#D97706">⚔</text>
</svg>