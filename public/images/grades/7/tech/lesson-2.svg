<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#FEF3C7" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400E" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFF7ED" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#92400E" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#B45309" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="800" height="4" fill="#B45309" rx="2"/>

  <!-- Header -->
  <rect x="20" y="15" width="760" height="60" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="40" y="50" font-size="14" fill="#FCD34D" font-weight="bold">Урок 2</text>
  <text x="130" y="50" font-size="20" fill="#FFFFFF" font-weight="bold">Ручная обработка древесины</text>
    <text x="780" y="55" font-size="13" fill="#F59E0B" text-anchor="end" font-style="italic">Инструменты, операции и техника безопасности</text>

  <!-- Saw illustration -->
  <rect x="35" y="100" width="180" height="7" rx="2" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <rect x="215" y="90" width="60" height="27" rx="4" fill="#8B7355" stroke="#92400E" stroke-width="1"/>
  <!-- Saw teeth -->
  <polygon points="35,107 40,114 45,107 50,114 55,107 60,114 65,107 70,114 75,107 80,114 85,107 90,114 95,107 100,114 105,107 110,114 115,107 120,114 125,107 130,114 135,107 140,114 145,107 150,114 155,107 160,114 165,107 170,114 175,107 180,114 185,107 190,114 195,107 200,114 205,107 210,114 215,107" fill="#6B7280" stroke="#4B5563" stroke-width="0.5"/>
  <text x="125" y="130" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">Ножовка</text>

  <!-- Plane illustration -->
  <rect x="35" y="155" width="120" height="18" rx="3" fill="#8B7355" stroke="#92400E" stroke-width="1"/>
  <rect x="65" y="145" width="45" height="10" rx="2" fill="#A0845C" stroke="#92400E" stroke-width="1"/>
  <rect x="80" y="138" width="15" height="7" rx="1" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <rect x="35" y="173" width="120" height="4" fill="#8B7355" stroke="#92400E" stroke-width="0.5"/>
  <rect x="75" y="177" width="35" height="2" fill="#6B7280"/>
  <text x="95" y="195" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">Рубанок</text>

  <!-- Chisel illustration -->
  <rect x="55" y="210" width="7" height="42" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <rect x="46" y="252" width="25" height="7" rx="1" fill="#8B7355" stroke="#92400E" stroke-width="1"/>
  <polygon points="46,210 62,210 54,182" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <text x="54" y="275" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">Стамеска</text>

  <!-- Hammer illustration -->
  <rect x="130" y="210" width="6" height="45" fill="#8B7355" stroke="#92400E" stroke-width="1"/>
  <rect x="118" y="200" width="30" height="15" rx="2" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <text x="133" y="275" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">Киянка</text>

  <!-- Tools for sawing -->
    <rect x="310" y="90" width="470" height="105" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="310" y="90" width="470" height="26" rx="6" fill="#B45309"/>
  <rect x="310" y="110" width="470" height="6" fill="#B45309"/>
  <text x="545" y="108" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Инструменты для пиления</text>
  <text x="322" y="130" font-size="12" fill="#78350F">&#8226; Ножовка — продольное и поперечное пиление</text>
  <text x="322" y="150" font-size="12" fill="#78350F">&#8226; Лучковая пила — криволинейный распил</text>
  <text x="322" y="170" font-size="12" fill="#78350F">&#8226; Ножовка с обушком — точный тонкий распил</text>

  <!-- Tools for planing -->
    <rect x="310" y="208" width="470" height="105" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="310" y="208" width="470" height="26" rx="6" fill="#B45309"/>
  <rect x="310" y="228" width="470" height="6" fill="#B45309"/>
  <text x="545" y="226" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Инструменты для строгания</text>
  <text x="322" y="248" font-size="12" fill="#78350F">&#8226; Рубанок — черновое и чистовое строгание</text>
  <text x="322" y="268" font-size="12" fill="#78350F">&#8226; Шерхебель — грубое снятие материала</text>
  <text x="322" y="288" font-size="12" fill="#78350F">&#8226; Фуганок — выравнивание длинных деталей</text>

  <!-- Drilling tools -->
    <rect x="25" y="295" width="250" height="105" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="25" y="295" width="250" height="26" rx="6" fill="#B45309"/>
  <rect x="25" y="315" width="250" height="6" fill="#B45309"/>
  <text x="150" y="313" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Сверление и долбление</text>
  <text x="37" y="335" font-size="12" fill="#78350F">&#8226; Коловорот — ручное сверление</text>
  <text x="37" y="355" font-size="12" fill="#78350F">&#8226; Ручная дрель — быстрое сверление</text>
  <text x="37" y="375" font-size="12" fill="#78350F">&#8226; Сверло перьевое — отверстия в дереве</text>

  <!-- Measuring tools -->
    <rect x="290" y="325" width="250" height="75" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="290" y="325" width="250" height="26" rx="6" fill="#B45309"/>
  <rect x="290" y="345" width="250" height="6" fill="#B45309"/>
  <text x="415" y="343" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Разметка и измерение</text>
  <text x="302" y="365" font-size="12" fill="#78350F">&#8226; Угольник — проверка прямых углов</text>
  <text x="302" y="385" font-size="12" fill="#78350F">&#8226; Рейсмус — разметка толщины</text>

  <!-- Auxiliary tools -->
    <rect x="555" y="325" width="225" height="75" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="555" y="325" width="225" height="26" rx="6" fill="#B45309"/>
  <rect x="555" y="345" width="225" height="6" fill="#B45309"/>
  <text x="667" y="343" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Вспомогательные</text>
  <text x="567" y="365" font-size="12" fill="#78350F">&#8226; Зажимы, струбцины</text>
  <text x="567" y="385" font-size="12" fill="#78350F">&#8226; Верстак с клиньями</text>

  <!-- Safety rules -->
    <rect x="25" y="415" width="750" height="90" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="25" y="415" width="750" height="26" rx="6" fill="#DC2626"/>
  <rect x="25" y="435" width="750" height="6" fill="#DC2626"/>
  <text x="400" y="433" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Техника безопасности при работе с деревом</text>
  <text x="37" y="455" font-size="12" fill="#78350F">&#8226; Надёжно закрепляй заготовку в зажимах верстака перед обработкой!</text>
  <text x="37" y="475" font-size="12" fill="#78350F">&#8226; Не держи руку на линии реза — используй упор для нажима</text>
  <text x="37" y="495" font-size="12" fill="#78350F">&#8226; Работай только острым инструментом — тупой требует большего усилия и опаснее</text>

  <!-- Operations sequence -->
    <rect x="25" y="520" width="750" height="60" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="37" y="540" font-size="12" fill="#78350F" font-weight="bold">Последовательность обработки: разметка &amp;#8594; закрепление &amp;#8594; пиление &amp;#8594; строгание &amp;#8594; сверление &amp;#8594; зачистка</text>
  <text x="37" y="558" font-size="12" fill="#78350F" font-weight="bold">Правило мастера: измеряй дважды, режь один раз!</text>
</svg>