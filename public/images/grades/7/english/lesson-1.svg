<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs>
<rect width="800" height="600" fill="#F3F4F6" rx="0" />
<rect x="0" y="0" width="800" height="70" fill="#3B82F6" />
<text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Daily Routines and Habits</text>
<text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Повседневные привычки и рутины</text>
<rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="90" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Present Simple / Настоящее простое время</text>
<line x1="20" y1="93" x2="340" y2="93" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="108" width="355" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="197" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + V</tspan><tspan fill="#6B7280"> (</tspan><tspan fill="#3B82F6">V/Vs/es</tspan><tspan fill="#6B7280">) + ...</tspan></text><rect x="390" y="108" width="380" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="580" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#DC2626">don't/doesn't</tspan><tspan fill="#3B82F6"> + V</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="20" y="152" width="750" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="395" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">Do/Does</tspan><tspan fill="#DC2626"> + S + </tspan><tspan fill="#3B82F6">V</tspan><tspan fill="#6B7280"> + ... ?</tspan></text><text x="20" y="202" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Маркеры времени / Time Expressions</text>
<line x1="20" y1="205" x2="292" y2="205" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="220" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="110" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">always</text><rect x="215" y="220" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="305" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">usually</text><rect x="410" y="220" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="500" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">often</text><rect x="605" y="220" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="695" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">sometimes</text><rect x="20" y="252" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="110" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">rarely</text><rect x="215" y="252" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="305" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">never</text><rect x="410" y="252" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="500" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">every day</text><rect x="605" y="252" width="180" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" />
<text x="695" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">on weekdays</text><text x="20" y="295" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Правила / Rules</text>
<line x1="20" y1="298" x2="140" y2="298" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="313" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" />
<circle cx="38" cy="331" r="12" fill="#DC2626" />
<text x="38" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text>
<text x="58" y="335" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Окончание -s/-es</text>
<text x="34" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">He/She/It + V-s/es: works, goes, studies</text><rect x="410" y="313" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" />
<circle cx="428" cy="331" r="12" fill="#DC2626" />
<text x="428" y="336" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text>
<text x="448" y="335" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Отрицание и вопрос</text>
<text x="424" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">She doesn't work. / Does she work?</text><text x="20" y="378" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Спряжение / Conjugation: WORK</text>
<line x1="20" y1="381" x2="252" y2="381" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="396" width="690" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" />
<text x="85" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold"></text>
<text x="250" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Утверждение +</text>
<text x="450" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Отрицание −</text>
<text x="630" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Вопрос ?</text><rect x="20" y="424" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="443" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I</text>
<text x="160" y="443" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I work</text>
<text x="360" y="443" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I don't work</text>
<text x="560" y="443" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Do I work?</text><rect x="20" y="452" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="471" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">He/She/It</text>
<text x="160" y="471" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">He works</text>
<text x="360" y="471" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">He doesn't work</text>
<text x="560" y="471" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Does he work?</text><rect x="20" y="480" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="499" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We/You/They</text>
<text x="160" y="499" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We work</text>
<text x="360" y="499" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We don't work</text>
<text x="560" y="499" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Do we work?</text><text x="20" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Словарь / Vocabulary</text>
<line x1="20" y1="523" x2="180" y2="523" stroke="#3B82F6" stroke-width="1.5" /><text x="20" y="550" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">wake up</tspan> — просыпаться</text><text x="410" y="550" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">have breakfast</tspan> — завтракать</text><text x="20" y="572" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">go to school</tspan> — идти в школу</text><text x="410" y="572" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">do homework</tspan> — делать уроки</text><text x="20" y="593" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text>
<line x1="20" y1="596" x2="164" y2="596" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="609" r="9" fill="#3B82F6" />
<text x="30" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text>
<text x="46" y="613" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I usually wake up at 7 am.</text>
<text x="46" y="627" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я обычно просыпаюсь в 7 утра.</text><circle cx="410" cy="609" r="9" fill="#3B82F6" />
<text x="410" y="613" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text>
<text x="426" y="613" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">She doesn't watch TV on weekdays.</text>
<text x="426" y="627" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Она не смотрит ТВ в будни.</text><circle cx="30" cy="647" r="9" fill="#3B82F6" />
<text x="30" y="651" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text>
<text x="46" y="651" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Do you always do your homework?</text>
<text x="46" y="665" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Ты всегда делаешь домашнее задание?</text><circle cx="410" cy="647" r="9" fill="#3B82F6" />
<text x="410" y="651" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text>
<text x="426" y="651" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">He goes to school by bus.</text>
<text x="426" y="665" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Он ездит в школу на автобусе.</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" />
<text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 7 | English | Lesson 1</text>
<text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 1/6</text>
