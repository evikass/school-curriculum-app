<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs>
<rect width="800" height="600" fill="#F3F4F6" rx="0" />
<rect x="0" y="0" width="800" height="70" fill="#3B82F6" />
<text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Planning a Trip</text>
<text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Планирование поездки</text>
<rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="90" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формы будущего времени / Future Forms</text>
<line x1="20" y1="93" x2="316" y2="93" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="108" width="240" height="80" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="140" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3B82F6" font-weight="bold">WILL</text>
<text x="30" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Решение в момент речи,</text>
<text x="30" y="158" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">предсказание, обещание</text>
<text x="30" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">S + will + V</text><rect x="275" y="108" width="250" height="80" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" />
<text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3B82F6" font-weight="bold">BE GOING TO</text>
<text x="285" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Заранее запланированное,</text>
<text x="285" y="158" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">намерение, план</text>
<text x="285" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">S + am/is/are going to + V</text><rect x="540" y="108" width="240" height="80" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" />
<text x="660" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#DC2626" font-weight="bold">PRES. CONTINUOUS</text>
<text x="550" y="144" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Точно запланированное</text>
<text x="550" y="158" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">(билеты, время)</text>
<text x="550" y="176" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">S + am/is/are + V-ing</text><text x="20" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Сравнение / Comparison</text>
<line x1="20" y1="203" x2="196" y2="203" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="218" width="720" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" />
<text x="100" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Ситуация</text>
<text x="320" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Форма</text>
<text x="600" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Пример</text><rect x="20" y="246" width="720" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Мгновенное решение</text>
<text x="190" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">will</text>
<text x="470" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">&quot;I'll help you!&quot;</text><rect x="20" y="274" width="720" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">План / намерение</text>
<text x="190" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">be going to</text>
<text x="470" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">&quot;I'm going to visit London.&quot;</text><rect x="20" y="302" width="720" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" />
<text x="30" y="321" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Точное расписание</text>
<text x="190" y="321" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Pres. Continuous</text>
<text x="470" y="321" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">&quot;We're leaving at 9.&quot;</text><text x="20" y="344" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Словарь / Travel Vocabulary</text>
<line x1="20" y1="347" x2="236" y2="347" stroke="#3B82F6" stroke-width="1.5" /><text x="20" y="374" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">book tickets</tspan> — бронировать билеты</text><text x="410" y="374" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">pack luggage</tspan> — собирать багаж</text><text x="20" y="394" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">check in</tspan> — регистрироваться</text><text x="410" y="394" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">board the plane</tspan> — садиться на самолёт</text><text x="20" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">destination</tspan> — пункт назначения</text><text x="410" y="414" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">suitcase</tspan> — чемодан</text><text x="20" y="434" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">passport</tspan> — загранпаспорт</text><text x="410" y="434" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F"><tspan fill="#3B82F6" font-weight="bold">travel agency</tspan> — турагентство</text><text x="20" y="452" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text>
<line x1="20" y1="455" x2="164" y2="455" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="468" r="9" fill="#3B82F6" />
<text x="30" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text>
<text x="46" y="472" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I think it will rain tomorrow.</text>
<text x="46" y="486" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Думаю, завтра будет дождь.</text><circle cx="410" cy="468" r="9" fill="#3B82F6" />
<text x="410" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text>
<text x="426" y="472" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">We're going to visit Paris in summer.</text>
<text x="426" y="486" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Мы собираемся посетить Париж летом.</text><circle cx="30" cy="506" r="9" fill="#3B82F6" />
<text x="30" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text>
<text x="46" y="510" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Our train is leaving at 8:30.</text>
<text x="46" y="524" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Наш поезд отправляется в 8:30.</text><circle cx="410" cy="506" r="9" fill="#3B82F6" />
<text x="410" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text>
<text x="426" y="510" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I'll carry your suitcase for you!</text>
<text x="426" y="524" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я понесу твой чемодан!</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" />
<text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 7 | English | Lesson 3</text>
<text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 3/6</text>
</svg>