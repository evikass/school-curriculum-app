<rect x="35" y="492" width="450" height="24" fill="#1E293B" rx="6"/>
<rect x="35" y="510" width="450" height="6" fill="#1E293B" rx="8"/>
<text x="45" y="508" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">square.py</text>
<circle cx="445" cy="504" r="4" fill="#F87171"/>
<circle cx="459" cy="504" r="4" fill="#FACC15"/>
<circle cx="473" cy="504" r="4" fill="#4ADE80"/>
<text x="43" y="532" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="532" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">import turtle</text>
<text x="43" y="548" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="548" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="564" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="564" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(4):</text>
<text x="43" y="580" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="580" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    turtle.forward(100)</text>
<text x="43" y="596" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="596" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    turtle.right(90)</text>
<text x="43" y="612" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="612" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="628" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="628" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">turtle.done()</text>
<rect x="500" y="497" width="270" height="65" fill="#1E293B" rx="6"/>
<text x="510" y="515" fill="#4ADE80" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="normal">Результат: квадрат 100x100</text>
<text x="510" y="533" fill="#38BDF8" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">Цикл for повторяет 4 раза</text>
<text x="510" y="551" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">forward + right = сторона + поворот</text>
