<text x="435" y="421" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">turtle.py</text>
<circle cx="725" cy="417" r="4" fill="#F87171"/>
<circle cx="739" cy="417" r="4" fill="#FACC15"/>
<circle cx="753" cy="417" r="4" fill="#4ADE80"/>
<text x="433" y="445" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="455" y="445" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">forward(100)   # вперёд 100</text>
<text x="433" y="461" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="455" y="461" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">right(90)      # направо 90°</text>
<text x="433" y="477" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="455" y="477" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">penup()        # поднять перо</text>
<text x="433" y="493" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="455" y="493" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">pendown()      # опустить перо</text>
<rect x="20" y="460" width="760" height="110" fill="#0F172A" rx="8" stroke="#4ADE80" stroke-width="1"/>
<text x="35" y="482" fill="#4ADE80" font-size="14" text-anchor="start" font-family="sans-serif" font-weight="bold">Рисуем квадрат черепашкой</text>
