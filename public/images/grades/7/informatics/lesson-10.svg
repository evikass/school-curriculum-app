<text x="333" y="312" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="355" y="312" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">Алгоритм: Найти максимум</text>
