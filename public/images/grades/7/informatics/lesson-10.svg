<text x="45" y="528" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">max.py</text>
<circle cx="345" cy="524" r="4" fill="#F87171"/>
<circle cx="359" cy="524" r="4" fill="#FACC15"/>
<circle cx="373" cy="524" r="4" fill="#4ADE80"/>
<text x="43" y="552" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="552" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">a = int(input('a: '))</text>
<text x="43" y="566" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="566" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">b = int(input('b: '))</text>
<text x="43" y="580" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="580" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">if a &gt; b:</text>
<text x="43" y="594" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="594" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    max_val = a</text>
<text x="43" y="608" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="608" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">else:</text>
<text x="43" y="622" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="622" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    max_val = b</text>
<text x="43" y="636" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="636" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">print('Максимум:', max_val)</text>
<rect x="400" y="517" width="370" height="45" fill="#1E293B" rx="6"/>
<text x="410" y="535" fill="#4ADE80" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="normal">Псевдокод → Python: один к одному!</text>
<text x="410" y="552" fill="#38BDF8" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">Алгоритмическое мышление = программирование</text>
