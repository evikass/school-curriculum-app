<text x="355" y="330" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">  Ввести a, b</text>
<text x="333" y="348" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="355" y="348" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">  ЕСЛИ a &gt; b ТО</text>
<text x="333" y="366" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="355" y="366" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    max = a</text>
<text x="333" y="384" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="355" y="384" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">  ИНАЧЕ</text>
<text x="333" y="402" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="355" y="402" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    max = b</text>
<text x="333" y="420" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="355" y="420" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">  Вывести max</text>
<text x="325" y="415" fill="#38BDF8" font-size="12" text-anchor="start" font-family="sans-serif" font-weight="bold">Способы записи алгоритма:</text>
<text x="335" y="432" fill="#FACC15" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="bold">Словесный</text>
<text x="435" y="432" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">Текстовое описание шагов</text>
<text x="335" y="452" fill="#FACC15" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="bold">Блок-схема</text>
<text x="435" y="452" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">Графическое изображение</text>
<text x="335" y="472" fill="#FACC15" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="bold">Псевдокод</text>
<text x="435" y="472" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">Условный язык записи</text>
<text x="335" y="492" fill="#FACC15" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="bold">Программа</text>
<text x="435" y="492" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">Код на языке программирования</text>
