<text x="35" y="502" fill="#38BDF8" font-size="14" text-anchor="start" font-family="sans-serif" font-weight="bold">Пример: алгоритм → программа</text>
<rect x="35" y="512" width="350" height="142" fill="#0F172A" rx="6" stroke="#1E293B" stroke-width="1"/>
<rect x="35" y="512" width="350" height="24" fill="#1E293B" rx="6"/>
