<text x="72" y="32" fill="#FFFFFF" font-size="22" text-anchor="start" font-family="sans-serif" font-weight="bold">Циклы в программировании</text>
<text x="72" y="52" fill="#7DD3FC" font-size="13" text-anchor="start" font-family="sans-serif" font-weight="normal">for, while, break, continue, вложенные циклы</text>
