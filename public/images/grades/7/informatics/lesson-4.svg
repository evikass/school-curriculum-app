<text x="45" y="128" fill="#7DD3FC" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">for_loop.py</text>
<circle cx="345" cy="124" r="4" fill="#F87171"/>
<circle cx="359" cy="124" r="4" fill="#FACC15"/>
<circle cx="373" cy="124" r="4" fill="#4ADE80"/>
<text x="43" y="152" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="152" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"># Перебор чисел</text>
<text x="43" y="170" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="170" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(5):</text>
<text x="43" y="188" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="188" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    print(i)  # 0,1,2,3,4</text>
<text x="43" y="206" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="206" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="224" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="224" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"># С шагом</text>
<text x="43" y="242" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="242" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(0, 10, 2):</text>
<text x="43" y="260" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="260" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    print(i)  # 0,2,4,6,8</text>
<text x="43" y="278" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="65" y="278" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="296" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="65" y="296" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"># Перебор строки</text>
<text x="43" y="314" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">10</text>
<text x="65" y="314" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">for ch in &quot;Привет&quot;:</text>
<text x="43" y="332" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">11</text>
<text x="65" y="332" fill="#E0F2FE" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">    print(ch)</text>
