<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect x="0" y="0" width="800" height="72" rx="0" fill="#EF4444" />
  <rect x="0" y="72" width="800" height="4" rx="0" fill="#B91C1C" />
  <text x="400" y="36" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="sans-serif">Объединение русских земель</text>
  <text x="400" y="58" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="normal" font-family="sans-serif">Возвышение Москвы и собирание Руси</text>
  <rect x="0" y="570" width="800" height="30" rx="0" fill="#FFF1F2" />
  <line x1="0" y1="570" x2="800" y2="570" stroke="#FCA5A5" stroke-width="1" />
  <text x="400" y="590" text-anchor="middle" fill="#9CA3AF" font-size="10" font-weight="normal" font-family="sans-serif">7 класс — История России — Урок 1</text>
  <rect x="0" y="76" width="800" height="494" rx="0" fill="#FFF1F2" opacity="0.4" />
  <text x="400" y="100" text-anchor="middle" fill="#B91C1C" font-size="15" font-weight="bold" font-family="sans-serif">Хронология объединения</text>
  <line x1="80" y1="135" x2="720" y2="135" stroke="#EF4444" stroke-width="3" />
  <circle cx="110" cy="135" r="8" fill="#EF4444" stroke="#FFFFFF" stroke-width="2" />
  <text x="110" y="121" text-anchor="middle" fill="#B91C1C" font-size="11" font-weight="bold" font-family="sans-serif">1325</text>
  <text x="110" y="153" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Иван Калита</text>
  <circle cx="260" cy="135" r="8" fill="#EF4444" stroke="#FFFFFF" stroke-width="2" />
  <text x="260" y="121" text-anchor="middle" fill="#B91C1C" font-size="11" font-weight="bold" font-family="sans-serif">1340</text>
  <text x="260" y="153" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Москва —</text>
  <text x="260" y="166" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">центр Руси</text>
  <circle cx="400" cy="135" r="8" fill="#EF4444" stroke="#FFFFFF" stroke-width="2" />
  <text x="400" y="121" text-anchor="middle" fill="#B91C1C" font-size="11" font-weight="bold" font-family="sans-serif">1359</text>
  <text x="400" y="153" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Дмитрий</text>
  <text x="400" y="166" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Донской</text>
  <circle cx="540" cy="135" r="8" fill="#EF4444" stroke="#FFFFFF" stroke-width="2" />
  <text x="540" y="121" text-anchor="middle" fill="#B91C1C" font-size="11" font-weight="bold" font-family="sans-serif">1380</text>
  <text x="540" y="153" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Куликовская</text>
  <text x="540" y="166" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">битва</text>
  <circle cx="690" cy="135" r="8" fill="#EF4444" stroke="#FFFFFF" stroke-width="2" />
  <text x="690" y="121" text-anchor="middle" fill="#B91C1C" font-size="11" font-weight="bold" font-family="sans-serif">1389</text>
  <text x="690" y="153" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Василий I</text>
  <rect x="30" y="195" width="230" height="130" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
  <rect x="30" y="195" width="5" height="130" rx="2" fill="#EF4444" />
  <text x="46" y="215" text-anchor="start" fill="#EF4444" font-size="13" font-weight="bold" font-family="sans-serif">Иван Калита (1325–1340)</text>
  <text x="46" y="233" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Перенос резиденции митрополита</text>
  <text x="46" y="249" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">в Москву (1326 г.)</text>
  <text x="46" y="265" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Сбор дани для Орды —</text>
  <text x="46" y="281" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">укрепление авторитета</text>
  <text x="46" y="297" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Расширение московских владений</text>
  <rect x="280" y="195" width="230" height="130" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
  <rect x="280" y="195" width="5" height="130" rx="2" fill="#EF4444" />
  <text x="296" y="215" text-anchor="start" fill="#EF4444" font-size="13" font-weight="bold" font-family="sans-serif">Дмитрий Донской (1359–1389)</text>
  <text x="296" y="233" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Куликовская битва — 8 сентября</text>
  <text x="296" y="249" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">1380 г. — первая крупная победа</text>
  <text x="296" y="265" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Белокаменный Кремль (1367 г.)</text>
  <text x="296" y="281" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Москва — лидер объединения</text>
  <text x="296" y="297" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Передача власти без ханской ярлыки</text>
  <rect x="530" y="195" width="240" height="130" rx="6" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" />
  <rect x="530" y="195" width="5" height="130" rx="2" fill="#EF4444" />
  <text x="546" y="215" text-anchor="start" fill="#EF4444" font-size="13" font-weight="bold" font-family="sans-serif">Причины возвышения Москвы</text>
  <text x="546" y="233" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Географическое положение</text>
  <text x="546" y="249" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Поддержка православной церкви</text>
  <text x="546" y="265" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Умелая политика московских князей</text>
  <text x="546" y="281" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Пересечение торговых путей</text>
  <text x="546" y="297" text-anchor="start" fill="#4B5563" font-size="11" font-weight="normal" font-family="sans-serif">Дальновидная политика по отношению к Орде</text>
  <text x="400" y="370" text-anchor="middle" fill="#B91C1C" font-size="14" font-weight="bold" font-family="sans-serif">Рост влияния Москвы</text>
  <circle cx="400" cy="480" r="100" fill="#FECDD3" stroke="#EF4444" stroke-width="1" />
  <circle cx="400" cy="480" r="70" fill="#FCA5A5" />
  <circle cx="400" cy="480" r="40" fill="#FCA5A5" />
  <text x="400" y="474" text-anchor="middle" fill="#B91C1C" font-size="13" font-weight="bold" font-family="sans-serif">Москва</text>
  <text x="400" y="490" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">центр Руси</text>
  <text x="400" y="400" text-anchor="middle" fill="#4B5563" font-size="9" font-weight="normal" font-family="sans-serif">Удельные княжества</text>
  <text x="400" y="425" text-anchor="middle" fill="#4B5563" font-size="9" font-weight="normal" font-family="sans-serif">Земли Великого княжества</text>
</svg>