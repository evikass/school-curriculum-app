<text x="433" y="175" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="455" y="175" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">name = input(&quot;Ваше имя: &quot;)</text>
<text x="433" y="191" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="455" y="191" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">print(&quot;Привет, &quot; + name)</text>
<text x="433" y="207" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="455" y="207" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="433" y="223" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="455" y="223" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># input() всегда возвращает str</text>
<text x="433" y="239" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="455" y="239" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">age = input(&quot;Возраст: &quot;)</text>
