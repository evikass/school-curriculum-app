<circle cx="455" cy="414" r="4" fill="#F87171"/>
<circle cx="469" cy="414" r="4" fill="#FCD34D"/>
<circle cx="483" cy="414" r="4" fill="#4ADE80"/>
<text x="43" y="442" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="442" fill="#D1FAE5" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"># Программа-приветствие</text>
<text x="43" y="459" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="459" fill="#D1FAE5" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">print(&quot;Привет! Я — Python!&quot;)</text>
<text x="43" y="476" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="476" fill="#D1FAE5" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="493" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="493" fill="#D1FAE5" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">name = input(&quot;Как тебя зовут? &quot;)</text>
<text x="43" y="510" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="510" fill="#D1FAE5" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">age = input(&quot;Сколько тебе лет? &quot;)</text>
<text x="43" y="527" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="527" fill="#D1FAE5" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="544" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="544" fill="#D1FAE5" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">print(&quot;Привет, &quot; + name + &quot;!&quot;)</text>
<text x="43" y="561" fill="#475569" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="65" y="561" fill="#D1FAE5" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">print(&quot;Тебе &quot; + age + &quot; лет!&quot;)</text>
