<text x="65" y="175" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">print(&quot;Привет!&quot;)</text>
<text x="43" y="191" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="191" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">print(5 + 3)  # выведет 8</text>
<text x="43" y="207" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="207" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">print(2, 4, 6)  # 2 4 6</text>
<text x="43" y="223" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="223" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">print(&quot;a&quot;, &quot;b&quot;, sep=&quot;-&quot;)  # a-b</text>
<rect x="410" y="80" width="370" height="170" fill="#0F172A" rx="8" stroke="#4ADE80" stroke-width="1"/>
