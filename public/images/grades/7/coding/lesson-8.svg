<text x="433" y="297" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="455" y="297" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># Ввод до стоп-слова</text>
<text x="433" y="311" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="455" y="311" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">word = &quot;&quot;</text>
<text x="433" y="325" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="455" y="325" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">while word != &quot;стоп&quot;:</text>
<text x="433" y="339" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="455" y="339" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    word = input(&quot;Слово: &quot;)</text>
<text x="433" y="353" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="455" y="353" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">print(&quot;Конец!&quot;)</text>
<text x="433" y="367" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="455" y="367" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="433" y="381" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="455" y="381" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># Подсчёт суммы</text>
<text x="433" y="395" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="455" y="395" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">total = 0</text>
<text x="433" y="409" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="455" y="409" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">num = 1</text>
<text x="433" y="423" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">10</text>
<text x="455" y="423" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">while num != 0:</text>
<text x="433" y="437" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">11</text>
<text x="455" y="437" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    num = int(input(&quot;Число: &quot;))</text>
<text x="433" y="451" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">12</text>
<text x="455" y="451" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    total += num</text>
