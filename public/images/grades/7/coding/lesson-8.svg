<text x="45" y="458" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">pattern.py</text>
<circle cx="355" cy="454" r="4" fill="#F87171"/>
<circle cx="369" cy="454" r="4" fill="#FCD34D"/>
<circle cx="383" cy="454" r="4" fill="#4ADE80"/>
<text x="43" y="482" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="482" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Узор — треугольник</text>
<text x="43" y="497" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="497" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">n = int(input(&quot;Высота: &quot;))</text>
<text x="43" y="512" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="512" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">i = 1</text>
<text x="43" y="527" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="527" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">while i &lt;= n:</text>
<text x="43" y="542" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="542" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    spaces = &quot; &quot; * (n - i)</text>
<text x="43" y="557" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="557" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    stars = &quot;*&quot; * (2 * i - 1)</text>
<text x="43" y="572" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="572" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(spaces + stars)</text>
<text x="43" y="587" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="65" y="587" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    i += 1</text>
<rect x="410" y="447" width="355" height="110" fill="#1E293B" rx="6" stroke="#4ADE80" stroke-width="1"/>
<text x="420" y="465" fill="#4ADE80" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="bold">Результат (n=5):</text>
<text x="500" y="482" fill="#D1FAE5" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">*</text>
<text x="500" y="496" fill="#D1FAE5" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">***</text>
<text x="500" y="510" fill="#D1FAE5" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">*****</text>
<text x="500" y="524" fill="#D1FAE5" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">*******</text>
<text x="500" y="538" fill="#D1FAE5" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">*********</text>
