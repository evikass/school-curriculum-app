<text x="435" y="273" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">practical.py</text>
<circle cx="725" cy="269" r="4" fill="#F87171"/>
<circle cx="739" cy="269" r="4" fill="#FCD34D"/>
