<text x="43" y="349" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="349" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">while True:</text>
<text x="43" y="363" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="363" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Бесконечно...&quot;)</text>
<text x="43" y="377" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="377" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="391" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="391" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># Стоп через break</text>
<text x="43" y="405" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="405" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">while True:</text>
<text x="43" y="419" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="419" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    cmd = input(&quot;&gt;&gt; &quot;)</text>
<text x="43" y="433" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="65" y="433" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    if cmd == &quot;exit&quot;:</text>
<text x="43" y="447" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="65" y="447" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">        break</text>
