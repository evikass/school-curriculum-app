<text x="45" y="293" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">iteration.py</text>
<circle cx="445" cy="289" r="4" fill="#F87171"/>
<circle cx="459" cy="289" r="4" fill="#FCD34D"/>
<circle cx="473" cy="289" r="4" fill="#4ADE80"/>
<text x="43" y="317" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="317" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># Числа от 1 до 10</text>
<text x="43" y="331" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="331" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(1, 11):</text>
<text x="43" y="345" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="345" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(i, end=&quot; &quot;)  # 1 2 3 ... 10</text>
<text x="43" y="359" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="359" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="373" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="373" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># С шагом 2</text>
<text x="43" y="387" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="387" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(0, 10, 2):</text>
<text x="43" y="401" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="401" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(i, end=&quot; &quot;)  # 0 2 4 6 8</text>
<text x="43" y="415" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="65" y="415" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="429" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="65" y="429" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># Перебор строки</text>
<text x="43" y="443" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">10</text>
<text x="65" y="443" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">for ch in &quot;Python&quot;:</text>
<text x="43" y="457" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">11</text>
<text x="65" y="457" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(ch)  # P y t h o n</text>
<rect x="510" y="245" width="270" height="155" fill="#0F172A" rx="8" stroke="#F87171" stroke-width="1"/>
