<text x="43" y="152" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="152" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">for переменная in последовательность:</text>
<text x="43" y="169" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="169" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    тело_цикла</text>
<text x="43" y="186" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="186" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="203" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="203" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Пример:</text>
<text x="43" y="220" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="220" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(5):</text>
<text x="43" y="237" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="237" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(i)  # 0 1 2 3 4</text>
<rect x="410" y="80" width="370" height="155" fill="#0F172A" rx="8" stroke="#4ADE80" stroke-width="1"/>
<text x="425" y="102" fill="#4ADE80" font-size="14" text-anchor="start" font-family="sans-serif" font-weight="bold">Функция range()</text>
<rect x="425" y="115" width="340" height="28" fill="#1E293B" rx="4" stroke="#10B981" stroke-width="1"/>
<text x="595" y="134" fill="#10B981" font-size="12" text-anchor="middle" font-family="monospace" font-weight="normal">range(stop)</text>
<text x="595" y="152" fill="#6EE7B7" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="normal">0, 1, 2, ..., stop-1</text>
