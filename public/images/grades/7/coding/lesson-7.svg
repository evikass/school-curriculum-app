<rect x="35" y="112" width="350" height="24" fill="#1E293B" rx="6"/>
<rect x="35" y="130" width="350" height="6" fill="#1E293B" rx="8"/>
<text x="45" y="128" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">for_syntax.py</text>
<circle cx="345" cy="124" r="4" fill="#F87171"/>
<circle cx="359" cy="124" r="4" fill="#FCD34D"/>
