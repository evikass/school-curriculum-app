<rect x="525" y="277" width="240" height="198" fill="#0F172A" rx="6" stroke="#1E293B" stroke-width="1"/>
<rect x="525" y="277" width="240" height="24" fill="#1E293B" rx="6"/>
<rect x="525" y="295" width="240" height="6" fill="#1E293B" rx="8"/>
<text x="535" y="293" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">control.py</text>
<circle cx="725" cy="289" r="4" fill="#F87171"/>
<circle cx="739" cy="289" r="4" fill="#FCD34D"/>
<circle cx="753" cy="289" r="4" fill="#4ADE80"/>
<text x="533" y="317" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="555" y="317" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># break — выход</text>
<text x="533" y="331" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="555" y="331" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(10):</text>
<text x="533" y="345" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="555" y="345" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    if i == 5:</text>
<text x="533" y="359" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="555" y="359" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">        break  # стоп</text>
<text x="533" y="373" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="555" y="373" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(i)  # 0..4</text>
<text x="533" y="387" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="555" y="387" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="533" y="401" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="555" y="401" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># continue — пропуск</text>
<text x="533" y="415" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="555" y="415" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(5):</text>
<text x="533" y="429" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="555" y="429" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    if i == 2:</text>
<text x="533" y="443" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">10</text>
<text x="555" y="443" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">        continue</text>
<text x="533" y="457" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">11</text>
<text x="555" y="457" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(i)  # 0,1,3,4</text>
<rect x="20" y="410" width="760" height="160" fill="#0F172A" rx="8" stroke="#10B981" stroke-width="1"/>
<text x="35" y="432" fill="#14B8A6" font-size="14" text-anchor="start" font-family="sans-serif" font-weight="bold">Практические примеры</text>
<rect x="35" y="442" width="360" height="134" fill="#0F172A" rx="6" stroke="#1E293B" stroke-width="1"/>
<rect x="35" y="442" width="360" height="24" fill="#1E293B" rx="6"/>
<rect x="35" y="460" width="360" height="6" fill="#1E293B" rx="8"/>
<text x="45" y="458" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">sum.py</text>
<circle cx="355" cy="454" r="4" fill="#F87171"/>
<circle cx="369" cy="454" r="4" fill="#FCD34D"/>
<circle cx="383" cy="454" r="4" fill="#4ADE80"/>
<text x="43" y="482" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="482" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Сумма чисел от 1 до N</text>
<text x="43" y="497" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="497" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">n = int(input(&quot;N: &quot;))</text>
<text x="43" y="512" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="512" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">total = 0</text>
<text x="43" y="527" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="527" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(1, n + 1):</text>
<text x="43" y="542" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="542" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    total += i</text>
<text x="43" y="557" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="557" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">print(&quot;Сумма =&quot;, total)</text>
<rect x="410" y="442" width="355" height="184" fill="#0F172A" rx="6" stroke="#1E293B" stroke-width="1"/>
<rect x="410" y="442" width="355" height="24" fill="#1E293B" rx="6"/>
<rect x="410" y="460" width="355" height="6" fill="#1E293B" rx="8"/>
<text x="420" y="458" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">triangle.py</text>
<circle cx="725" cy="454" r="4" fill="#F87171"/>
<circle cx="739" cy="454" r="4" fill="#FCD34D"/>
<circle cx="753" cy="454" r="4" fill="#4ADE80"/>
<text x="418" y="482" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="440" y="482" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># Рисуем треугольник</text>
<text x="418" y="496" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="440" y="496" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">n = int(input(&quot;Размер: &quot;))</text>
<text x="418" y="510" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="440" y="510" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">for i in range(1, n + 1):</text>
<text x="418" y="524" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="440" y="524" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;*&quot; * i)</text>
<text x="418" y="538" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="440" y="538" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="418" y="552" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="440" y="552" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># Результат для n=4:</text>
<text x="418" y="566" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="440" y="566" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># *</text>
<text x="418" y="580" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="440" y="580" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># **</text>
<text x="418" y="594" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="440" y="594" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># ***</text>
<text x="418" y="608" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">10</text>
<text x="440" y="608" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"># ****</text>
