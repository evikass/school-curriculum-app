<text x="595" y="194" fill="#6EE7B7" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="normal">start, start+1, ..., stop-1</text>
<rect x="425" y="199" width="340" height="28" fill="#1E293B" rx="4" stroke="#C084FC" stroke-width="1"/>
