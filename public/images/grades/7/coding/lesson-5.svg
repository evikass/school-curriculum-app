<text x="690" y="129" fill="#6EE7B7" font-size="9" text-anchor="start" font-family="sans-serif" font-weight="normal">5 != 3 → True</text>
<rect x="315" y="142" width="225" height="25" fill="#1E293B" rx="4"/>
<text x="323" y="159" fill="#FCD34D" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">&gt;</text>
