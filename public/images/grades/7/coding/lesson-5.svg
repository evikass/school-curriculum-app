<text x="360" y="189" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">больше или равно</text>
<text x="455" y="189" fill="#6EE7B7" font-size="9" text-anchor="start" font-family="sans-serif" font-weight="normal">5 &gt;= 5 → True</text>
