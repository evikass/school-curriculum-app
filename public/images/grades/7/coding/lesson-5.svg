<rect x="425" y="402" width="340" height="24" fill="#1E293B" rx="6"/>
<rect x="425" y="420" width="340" height="6" fill="#1E293B" rx="8"/>
<text x="435" y="418" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">nested_if.py</text>
<circle cx="725" cy="414" r="4" fill="#F87171"/>
<circle cx="739" cy="414" r="4" fill="#FCD34D"/>
<circle cx="753" cy="414" r="4" fill="#4ADE80"/>
<text x="433" y="442" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="455" y="442" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">x = int(input(&quot;Число: &quot;))</text>
<text x="433" y="456" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="455" y="456" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="433" y="470" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="455" y="470" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">if x &gt; 0:</text>
<text x="433" y="484" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="455" y="484" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Положительное&quot;)</text>
<text x="433" y="498" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="455" y="498" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    if x &gt; 100:</text>
<text x="433" y="512" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="455" y="512" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">        print(&quot;Очень большое&quot;)</text>
<text x="433" y="526" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="455" y="526" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    else:</text>
<text x="433" y="540" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="455" y="540" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">        print(&quot;Обычное&quot;)</text>
<text x="433" y="554" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="455" y="554" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">elif x == 0:</text>
<text x="433" y="568" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">10</text>
<text x="455" y="568" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Нуль&quot;)</text>
<text x="433" y="582" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">11</text>
<text x="455" y="582" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">else:</text>
<text x="433" y="596" fill="#475569" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">12</text>
<text x="455" y="596" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Отрицательное&quot;)</text>
