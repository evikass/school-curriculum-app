<text x="325" y="283" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">access.py</text>
<circle cx="725" cy="279" r="4" fill="#F87171"/>
<circle cx="739" cy="279" r="4" fill="#FCD34D"/>
<circle cx="753" cy="279" r="4" fill="#4ADE80"/>
<text x="323" y="307" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="345" y="307" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">age = int(input(&quot;Возраст: &quot;))</text>
<text x="323" y="322" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="345" y="322" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="323" y="337" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="345" y="337" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">if age &gt;= 18:</text>
<text x="323" y="352" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="345" y="352" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Доступ разрешён&quot;)</text>
<text x="323" y="367" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="345" y="367" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">elif age &gt;= 14:</text>
<text x="323" y="382" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="345" y="382" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;С согласием родителей&quot;)</text>
<text x="323" y="397" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="345" y="397" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">else:</text>
<text x="323" y="412" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="345" y="412" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Доступ запрещён&quot;)</text>
<rect x="20" y="370" width="380" height="200" fill="#0F172A" rx="8" stroke="#FCD34D" stroke-width="1"/>
