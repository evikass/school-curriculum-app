<text x="35" y="412" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="normal">В Python отступы обязательны!</text>
<rect x="35" y="425" width="350" height="149" fill="#0F172A" rx="6" stroke="#1E293B" stroke-width="1"/>
<rect x="35" y="425" width="350" height="24" fill="#1E293B" rx="6"/>
