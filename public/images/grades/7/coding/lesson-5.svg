<text x="360" y="129" fill="#D1FAE5" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="normal">равно</text>
<text x="455" y="129" fill="#6EE7B7" font-size="9" text-anchor="start" font-family="sans-serif" font-weight="normal">5 == 5 → True</text>
<rect x="550" y="112" width="225" height="25" fill="#1E293B" rx="4"/>
<text x="558" y="129" fill="#FCD34D" font-size="12" text-anchor="start" font-family="monospace" font-weight="normal">!=</text>
