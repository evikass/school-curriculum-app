<text x="45" y="441" fill="#6EE7B7" font-size="10" text-anchor="start" font-family="monospace" font-weight="normal">indent.py</text>
<circle cx="345" cy="437" r="4" fill="#F87171"/>
<circle cx="359" cy="437" r="4" fill="#FCD34D"/>
<circle cx="373" cy="437" r="4" fill="#4ADE80"/>
<text x="43" y="465" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="465" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">if True:</text>
<text x="43" y="480" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="480" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Да&quot;)  # 4 пробела</text>
<text x="43" y="495" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="495" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">    print(&quot;Да 2&quot;)</text>
<text x="43" y="510" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="510" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="525" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="525" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Ошибка:</text>
<text x="43" y="540" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="540" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># if True:</text>
<text x="43" y="555" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="555" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># print(&quot;Нет отступа&quot;)  # Error!</text>
