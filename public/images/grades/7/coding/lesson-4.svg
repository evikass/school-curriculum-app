<text x="533" y="327" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="555" y="327" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">y = &quot;hello&quot;</text>
<text x="533" y="342" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
