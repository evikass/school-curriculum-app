<text x="43" y="462" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">1</text>
<text x="65" y="462" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Строка → число</text>
<text x="43" y="477" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">2</text>
<text x="65" y="477" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">s = &quot;42&quot;</text>
<text x="43" y="492" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">3</text>
<text x="65" y="492" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">n = int(s)      # 42</text>
<text x="43" y="507" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">4</text>
<text x="65" y="507" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">f = float(s)    # 42.0</text>
<text x="43" y="522" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">5</text>
<text x="65" y="522" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="537" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">6</text>
<text x="65" y="537" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Число → строка</text>
<text x="43" y="552" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">7</text>
<text x="65" y="552" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">x = 100</text>
<text x="43" y="567" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">8</text>
<text x="65" y="567" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">s = str(x)      # &quot;100&quot;</text>
<text x="43" y="582" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">9</text>
<text x="65" y="582" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"></text>
<text x="43" y="597" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">10</text>
<text x="65" y="597" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal"># Число → логическое</text>
<text x="43" y="612" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">11</text>
<text x="65" y="612" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">b = bool(0)     # False</text>
<text x="43" y="627" fill="#475569" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">12</text>
<text x="65" y="627" fill="#D1FAE5" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">b = bool(1)     # True</text>
<rect x="510" y="427" width="255" height="130" fill="#1E293B" rx="6"/>
<text x="520" y="445" fill="#FFFFFF" font-size="11" text-anchor="start" font-family="sans-serif" font-weight="bold">Цепочка преобразований:</text>
<text x="520" y="465" fill="#14B8A6" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">input() → str</text>
<text x="520" y="483" fill="#4ADE80" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">int(input()) → int</text>
<text x="520" y="501" fill="#FB923C" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">float(input()) → float</text>
<text x="520" y="525" fill="#F87171" font-size="10" text-anchor="start" font-family="sans-serif" font-weight="bold">Важно! Нельзя складывать str и int:</text>
<text x="520" y="543" fill="#F87171" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">&quot;5&quot; + 3  # TypeError!</text>
<text x="520" y="557" fill="#4ADE80" font-size="11" text-anchor="start" font-family="monospace" font-weight="normal">int(&quot;5&quot;) + 3  # 8 ✓</text>
