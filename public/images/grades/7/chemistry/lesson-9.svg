<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4C1D95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="120" fill="#5B21B6" opacity="0.3"/>
  <circle cx="750" cy="550" r="100" fill="#5B21B6" opacity="0.3"/>
  <circle cx="700" cy="80" r="60" fill="#7C3AED" opacity="0.2"/>
  <circle cx="100" cy="520" r="80" fill="#7C3AED" opacity="0.2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0"/>
  <rect x="0" y="68" width="800" height="3" fill="#A78BFA" opacity="0.6"/>
  <text x="80" y="44" font-family="Arial, sans-serif" font-size="13" fill="#C4B5FD" font-weight="bold">УРОК 9</text>
  <text x="160" y="44" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">Оксиды и соли</text>
  <text x="160" y="60" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD">Классификация, свойства, образование</text>
  <!-- Lesson number circle -->
  <circle cx="40" cy="35" r="25" fill="#5B21B6" stroke="#A78BFA" stroke-width="2"/>
  <text x="40" y="41" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold" text-anchor="middle">9</text>
  <rect x="20" y="85" width="370" height="280" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="25" y="90" width="360" height="28" rx="6" fill="#F59E0B" opacity="0.3"/>
  <text x="205" y="109" font-family="Arial, sans-serif" font-size="16" fill="#F59E0B" text-anchor="middle" font-weight="bold">ОКСИДЫ</text>
  <text x="35" y="138" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="start" font-weight="bold">Общая формула: Э_xO_y</text>
  <text x="35" y="158" font-family="Arial, sans-serif" font-size="12" fill="#DDD6FE" text-anchor="start" font-weight="normal">Состоят из элемента и кислорода</text>
  <text x="35" y="183" font-family="Arial, sans-serif" font-size="12" fill="#A78BFA" text-anchor="start" font-weight="bold">Классификация оксидов:</text>
  <rect x="35" y="192" width="160" height="55" rx="5" fill="#3B82F6" opacity="0.15" stroke="#3B82F6" stroke-width="1"/>
  <text x="115" y="210" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6" text-anchor="middle" font-weight="bold">Основные</text>
  <text x="115" y="225" font-family="Arial, sans-serif" font-size="10" fill="#DDD6FE" text-anchor="middle" font-weight="normal">из металлов</text>
  <text x="115" y="240" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="normal">Na₂O, CaO, FeO</text>
  <rect x="205" y="192" width="160" height="55" rx="5" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="1"/>
  <text x="285" y="210" font-family="Arial, sans-serif" font-size="12" fill="#EF4444" text-anchor="middle" font-weight="bold">Кислотные</text>
  <text x="285" y="225" font-family="Arial, sans-serif" font-size="10" fill="#DDD6FE" text-anchor="middle" font-weight="normal">из неметаллов</text>
  <text x="285" y="240" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="normal">CO₂, SO₃, P₂O₅</text>
  <rect x="120" y="255" width="160" height="50" rx="5" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1"/>
  <text x="200" y="273" font-family="Arial, sans-serif" font-size="12" fill="#10B981" text-anchor="middle" font-weight="bold">Амфотерные</text>
  <text x="200" y="288" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="normal">Al₂O₃, ZnO, Cr₂O₃</text>
  <text x="200" y="300" font-family="Arial, sans-serif" font-size="9" fill="#DDD6FE" text-anchor="middle" font-weight="normal">(двойственные свойства)</text>
  <text x="35" y="325" font-family="Arial, sans-serif" font-size="12" fill="#A78BFA" text-anchor="start" font-weight="bold">Свойства:</text>
  <text x="35" y="342" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="start" font-weight="normal">Основные + Кислота = Соль + H₂O</text>
  <text x="35" y="358" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="start" font-weight="normal">Кислотные + Основание = Соль + H₂O</text>
  <rect x="410" y="85" width="370" height="280" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="415" y="90" width="360" height="28" rx="6" fill="#10B981" opacity="0.3"/>
  <text x="595" y="109" font-family="Arial, sans-serif" font-size="16" fill="#10B981" text-anchor="middle" font-weight="bold">СОЛИ</text>
  <text x="425" y="138" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="start" font-weight="bold">Общая формула: Me_x(Кисл.остаток)_y</text>
  <text x="425" y="165" font-family="Arial, sans-serif" font-size="12" fill="#A78BFA" text-anchor="start" font-weight="bold">Классификация солей:</text>
  <rect x="425" y="178" width="340" height="52" rx="5" fill="rgba(255,255,255,0.05)" stroke="#8B5CF6" stroke-width="0.5"/>
  <text x="435" y="193" font-family="Arial, sans-serif" font-size="12" fill="#10B981" text-anchor="start" font-weight="bold">Средние (нормальные)</text>
  <text x="435" y="209" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">NaCl, CaSO₄, KNO₃</text>
  <text x="435" y="225" font-family="Arial, sans-serif" font-size="10" fill="#DDD6FE" text-anchor="start" font-weight="normal">Полное замещение H кислоты</text>
  <rect x="425" y="236" width="340" height="52" rx="5" fill="rgba(255,255,255,0.05)" stroke="#8B5CF6" stroke-width="0.5"/>
  <text x="435" y="251" font-family="Arial, sans-serif" font-size="12" fill="#10B981" text-anchor="start" font-weight="bold">Кислые</text>
  <text x="435" y="267" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">NaHSO₄, KHCO₃</text>
  <text x="435" y="283" font-family="Arial, sans-serif" font-size="10" fill="#DDD6FE" text-anchor="start" font-weight="normal">Частичное замещение H</text>
  <rect x="425" y="294" width="340" height="52" rx="5" fill="rgba(255,255,255,0.05)" stroke="#8B5CF6" stroke-width="0.5"/>
  <text x="435" y="309" font-family="Arial, sans-serif" font-size="12" fill="#10B981" text-anchor="start" font-weight="bold">Основные</text>
  <text x="435" y="325" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">Mg(OH)Cl, Cu₂(OH)₂CO₃</text>
  <text x="435" y="341" font-family="Arial, sans-serif" font-size="10" fill="#DDD6FE" text-anchor="start" font-weight="normal">Содержат OH⁻ группу</text>
  <text x="425" y="362" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD" text-anchor="start" font-weight="normal">Растворимость — по таблице</text>
  <rect x="20" y="380" width="760" height="185" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="405" font-family="Arial, sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle" font-weight="bold">Способы получения солей и оксидов</text>
  <rect x="35" y="425" width="235" height="60" rx="6" fill="#3B82F6" opacity="0.08" stroke="#3B82F6" stroke-width="1"/>
  <text x="45" y="443" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6" text-anchor="start" font-weight="bold">Металл + Кислота</text>
  <text x="45" y="463" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">Zn + 2HCl = ZnCl₂ + H₂↑</text>
  <text x="45" y="477" font-family="Arial, sans-serif" font-size="9" fill="#C4B5FD" text-anchor="start" font-weight="normal">↓ осадок / ↑ газ</text>
  <rect x="285" y="425" width="235" height="60" rx="6" fill="#10B981" opacity="0.08" stroke="#10B981" stroke-width="1"/>
  <text x="295" y="443" font-family="Arial, sans-serif" font-size="11" fill="#10B981" text-anchor="start" font-weight="bold">Основание + Кислота</text>
  <text x="295" y="463" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">NaOH + HCl = NaCl + H₂O</text>
  <text x="295" y="477" font-family="Arial, sans-serif" font-size="9" fill="#C4B5FD" text-anchor="start" font-weight="normal">↓ осадок / ↑ газ</text>
  <rect x="535" y="425" width="235" height="60" rx="6" fill="#F59E0B" opacity="0.08" stroke="#F59E0B" stroke-width="1"/>
  <text x="545" y="443" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B" text-anchor="start" font-weight="bold">Оксид + Кислота</text>
  <text x="545" y="463" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">CuO + H₂SO₄ = CuSO₄ + H₂O</text>
  <text x="545" y="477" font-family="Arial, sans-serif" font-size="9" fill="#C4B5FD" text-anchor="start" font-weight="normal">↓ осадок / ↑ газ</text>
  <rect x="35" y="495" width="235" height="60" rx="6" fill="#EC4899" opacity="0.08" stroke="#EC4899" stroke-width="1"/>
  <text x="45" y="513" font-family="Arial, sans-serif" font-size="11" fill="#EC4899" text-anchor="start" font-weight="bold">Оксид + Основание</text>
  <text x="45" y="533" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">CO₂ + Ca(OH)₂ = CaCO₃ + H₂O</text>
  <text x="45" y="547" font-family="Arial, sans-serif" font-size="9" fill="#C4B5FD" text-anchor="start" font-weight="normal">↓ осадок / ↑ газ</text>
  <rect x="285" y="495" width="235" height="60" rx="6" fill="#06B6D4" opacity="0.08" stroke="#06B6D4" stroke-width="1"/>
  <text x="295" y="513" font-family="Arial, sans-serif" font-size="11" fill="#06B6D4" text-anchor="start" font-weight="bold">Соль + Соль</text>
  <text x="295" y="533" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">AgNO₃ + NaCl = AgCl↓ + NaNO₃</text>
  <text x="295" y="547" font-family="Arial, sans-serif" font-size="9" fill="#C4B5FD" text-anchor="start" font-weight="normal">↓ осадок / ↑ газ</text>

  <rect x="0" y="575" width="800" height="25" fill="rgba(0,0,0,0.2)"/>
  <text x="400" y="592" font-family="Arial, sans-serif" font-size="11" fill="#A78BFA" text-anchor="middle">Химия • 7 класс • ИнеШкола</text>
</svg>