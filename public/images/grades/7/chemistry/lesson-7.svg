  <line x1="430" y1="540" x2="430" y2="545" stroke="#A78BFA" stroke-width="1"/>
  <text x="430" y="555" font-family="Arial, sans-serif" font-size="10" fill="#C4B5FD" text-anchor="middle" font-weight="normal">20°</text>
  <line x1="590" y1="540" x2="590" y2="545" stroke="#A78BFA" stroke-width="1"/>
  <text x="590" y="555" font-family="Arial, sans-serif" font-size="10" fill="#C4B5FD" text-anchor="middle" font-weight="normal">30°</text>
  <text x="400.0" y="570" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD" text-anchor="middle" font-weight="normal">При +10°C скорость возрастает в 2–4 раза (правило Вант-Гоффа)</text>

