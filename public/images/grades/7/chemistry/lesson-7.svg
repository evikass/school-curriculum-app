  <text x="335" y="278" font-family="Arial, sans-serif" font-size="10" fill="#C4B5FD" text-anchor="middle" font-weight="normal">Высокая</text>
  <text x="225" y="300" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">Чем больше концентрация</text>
  <text x="225" y="314" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">реагентов, тем выше</text>
  <text x="225" y="328" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">скорость реакции</text>
  <text x="225" y="350" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">v = k · [A]ⁿ · [B]ᵐ</text>
  <text x="225" y="370" font-family="Arial, sans-serif" font-size="10" fill="#DDD6FE" text-anchor="start" font-weight="normal">Закон действующих масс</text>
