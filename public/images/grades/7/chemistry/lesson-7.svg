  <circle cx="276" cy="258" r="4" fill="#3B82F6" opacity="0.5"/>
  <text x="260" y="278" font-family="Arial, sans-serif" font-size="10" fill="#C4B5FD" text-anchor="middle" font-weight="normal">Низкая</text>
