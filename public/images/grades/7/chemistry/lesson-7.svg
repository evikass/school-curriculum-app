  <rect x="706" y="225" width="9" height="9" rx="1" fill="#F59E0B" opacity="0.7"/>
  <rect x="670" y="239" width="9" height="9" rx="1" fill="#F59E0B" opacity="0.7"/>
  <rect x="682" y="239" width="9" height="9" rx="1" fill="#F59E0B" opacity="0.7"/>
  <rect x="694" y="239" width="9" height="9" rx="1" fill="#F59E0B" opacity="0.7"/>
  <rect x="706" y="239" width="9" height="9" rx="1" fill="#F59E0B" opacity="0.7"/>
  <text x="695" y="275" font-family="Arial, sans-serif" font-size="9" fill="#C4B5FD" text-anchor="middle" font-weight="normal">Порошок</text>
  <text x="615" y="298" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">Чем больше площадь</text>
  <text x="615" y="312" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">контакта, тем быстрее</text>
  <text x="615" y="326" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">идёт реакция</text>
  <text x="615" y="350" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">Измельчение →</text>
  <text x="615" y="364" font-family="Arial, sans-serif" font-size="10" fill="#F59E0B" text-anchor="start" font-weight="bold">↑ площадь поверхности</text>
  <text x="615" y="380" font-family="Arial, sans-serif" font-size="10" fill="#F59E0B" text-anchor="start" font-weight="bold">→ ↑ скорость реакции</text>
  <rect x="20" y="405" width="760" height="160" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="428" font-family="Arial, sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle" font-weight="bold">Зависимость скорости от температуры</text>
