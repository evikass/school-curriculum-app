  <text x="300.0" y="203" font-family="Arial, sans-serif" font-size="14" fill="#3B82F6" text-anchor="middle" font-weight="bold">Концентрация</text>
  <rect x="230" y="220" width="60" height="45" rx="4" fill="#FFFFFF" opacity="0.1" stroke="#8B5CF6" stroke-width="0.5"/>
