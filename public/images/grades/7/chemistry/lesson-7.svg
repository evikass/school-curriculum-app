<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4C1D95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="120" fill="#5B21B6" opacity="0.3"/>
  <circle cx="750" cy="550" r="100" fill="#5B21B6" opacity="0.3"/>
  <circle cx="700" cy="80" r="60" fill="#7C3AED" opacity="0.2"/>
  <circle cx="100" cy="520" r="80" fill="#7C3AED" opacity="0.2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0"/>
  <rect x="0" y="68" width="800" height="3" fill="#A78BFA" opacity="0.6"/>
  <text x="80" y="44" font-family="Arial, sans-serif" font-size="13" fill="#C4B5FD" font-weight="bold">УРОК 7</text>
  <text x="160" y="44" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">Скорость химических реакций</text>
  <text x="160" y="60" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD">Факторы: температура, концентрация, катализаторы</text>
  <!-- Lesson number circle -->
  <circle cx="40" cy="35" r="25" fill="#5B21B6" stroke="#A78BFA" stroke-width="2"/>
  <text x="40" y="41" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold" text-anchor="middle">7</text>
  <rect x="20" y="85" width="760" height="80" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="400" y="112" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Скорость реакции v = Δn / (Δt · V)</text>
  <text x="400" y="135" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD" text-anchor="middle" font-weight="normal">Δn — изменение количества вещества (моль)   Δt — время (с)   V — объём (л)</text>
  <text x="400" y="152" font-family="Arial, sans-serif" font-size="12" fill="#A78BFA" text-anchor="middle" font-weight="normal">Единица: моль/(л·с)</text>
  <rect x="15" y="180" width="180" height="210" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="20" y="185" width="170" height="26" rx="6" fill="#EF4444" opacity="0.3"/>
  <text x="105.0" y="203" font-family="Arial, sans-serif" font-size="14" fill="#EF4444" text-anchor="middle" font-weight="bold">Температура</text>
  <rect x="95" y="220" width="10" height="50" rx="5" fill="#FFFFFF" opacity="0.3"/>
  <rect x="97" y="240" width="6" height="28" rx="3" fill="#EF4444"/>
  <circle cx="100" cy="275" r="8" fill="#EF4444"/>
  <text x="30" y="300" font-family="Arial, sans-serif" font-size="10" fill="#C4B5FD" text-anchor="start" font-weight="normal">Правило Вант-Гоффа:</text>
  <text x="30" y="316" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">При повышении t на 10°C</text>
  <text x="30" y="330" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">скорость увеличивается</text>
  <text x="30" y="344" font-family="Arial, sans-serif" font-size="13" fill="#EF4444" text-anchor="start" font-weight="bold">в 2-4 раза</text>
  <text x="30" y="365" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="bold">v₂/v₁ = γ^((t₂-t₁)/10)</text>
  <text x="30" y="382" font-family="Arial, sans-serif" font-size="9" fill="#DDD6FE" text-anchor="start" font-weight="normal">γ = 2–4 (температурный коэфф.)</text>
  <rect x="210" y="180" width="180" height="210" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
