  <text x="690.0" y="203" font-family="Arial, sans-serif" font-size="13" fill="#F59E0B" text-anchor="middle" font-weight="bold">Площадь поверхности</text>
  <rect x="615" y="225" width="35" height="35" rx="3" fill="#F59E0B" opacity="0.5" stroke="#F59E0B" stroke-width="1"/>
  <text x="633" y="275" font-family="Arial, sans-serif" font-size="9" fill="#C4B5FD" text-anchor="middle" font-weight="normal">Цельный</text>
  <rect x="670" y="225" width="9" height="9" rx="1" fill="#F59E0B" opacity="0.7"/>
  <rect x="682" y="225" width="9" height="9" rx="1" fill="#F59E0B" opacity="0.7"/>
