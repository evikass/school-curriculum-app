  <circle cx="337" cy="258" r="3.5" fill="#3B82F6" opacity="0.7"/>
  <circle cx="348" cy="228" r="3.5" fill="#3B82F6" opacity="0.7"/>
  <circle cx="348" cy="238" r="3.5" fill="#3B82F6" opacity="0.7"/>
  <circle cx="348" cy="248" r="3.5" fill="#3B82F6" opacity="0.7"/>
