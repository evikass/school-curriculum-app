  <rect x="410" y="185" width="170" height="26" rx="6" fill="#10B981" opacity="0.3"/>
  <text x="495.0" y="203" font-family="Arial, sans-serif" font-size="14" fill="#10B981" text-anchor="middle" font-weight="bold">Катализатор</text>
  <rect x="425" y="220" width="140" height="60" rx="4" fill="rgba(255,255,255,0.05)" stroke="#8B5CF6" stroke-width="0.5"/>
  <path d="M430,270 Q460,220 495,270" fill="none" stroke="#EF4444" stroke-width="2"/>
  <path d="M430,270 Q460,245 495,270" fill="none" stroke="#10B981" stroke-width="2"/>
  <text x="440" y="288" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" text-anchor="start" font-weight="normal">— без катализ.</text>
  <text x="440" y="300" font-family="Arial, sans-serif" font-size="9" fill="#10B981" text-anchor="start" font-weight="normal">— с катализ.</text>
  <text x="505" y="232" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" text-anchor="start" font-weight="normal">Eₐ</text>
  <text x="420" y="320" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">Ускоряет реакцию,</text>
  <text x="420" y="334" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">но не расходуется</text>
  <text x="420" y="354" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">Снижает энергию</text>
  <text x="420" y="368" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="start" font-weight="normal">активации (Eₐ)</text>
  <text x="420" y="385" font-family="Arial, sans-serif" font-size="10" fill="#DDD6FE" text-anchor="start" font-weight="normal">Пример: MnO₂ для O₂ из H₂O₂</text>
  <rect x="600" y="180" width="180" height="210" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
