  <text x="145" y="538" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD" text-anchor="middle" font-weight="normal">e⁻ — электроны</text>
  <rect x="290" y="330" width="250" height="230" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
