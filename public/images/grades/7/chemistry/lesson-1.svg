<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4C1D95;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="120" fill="#5B21B6" opacity="0.3"/>
  <circle cx="750" cy="550" r="100" fill="#5B21B6" opacity="0.3"/>
  <circle cx="700" cy="80" r="60" fill="#7C3AED" opacity="0.2"/>
  <circle cx="100" cy="520" r="80" fill="#7C3AED" opacity="0.2"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0"/>
  <rect x="0" y="68" width="800" height="3" fill="#A78BFA" opacity="0.6"/>
  <text x="80" y="44" font-family="Arial, sans-serif" font-size="13" fill="#C4B5FD" font-weight="bold">УРОК 1</text>
  <text x="160" y="44" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold">Периодический закон Д.И. Менделеева</text>
  <text x="160" y="60" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD">Основы периодической системы элементов</text>
  <!-- Lesson number circle -->
  <circle cx="40" cy="35" r="25" fill="#5B21B6" stroke="#A78BFA" stroke-width="2"/>
  <text x="40" y="41" font-family="Arial, sans-serif" font-size="20" fill="#FFFFFF" font-weight="bold" text-anchor="middle">1</text>
  <rect x="20" y="85" width="370" height="230" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="35" y="110" font-family="Arial, sans-serif" font-size="16" fill="#C4B5FD" text-anchor="start" font-weight="bold">Дмитрий Иванович Менделеев</text>
  <text x="35" y="130" font-family="Arial, sans-serif" font-size="12" fill="#DDD6FE" text-anchor="start" font-weight="normal">1869 год — открытие периодического закона</text>
  <text x="35" y="160" font-family="Arial, sans-serif" font-size="13" fill="#A78BFA" text-anchor="start" font-weight="bold">Формулировка закона:</text>
  <text x="35" y="180" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="normal">Свойства химических элементов</text>
  <text x="35" y="196" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="normal">и их соединений находятся в</text>
  <text x="35" y="212" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="normal">периодической зависимости</text>
  <text x="35" y="228" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="normal">от величины атомных масс.</text>
  <text x="35" y="258" font-family="Arial, sans-serif" font-size="13" fill="#A78BFA" text-anchor="start" font-weight="bold">Современная формулировка:</text>
  <text x="35" y="278" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="normal">Свойства элементов находятся в</text>
  <text x="35" y="294" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="normal">периодической зависимости от</text>
  <text x="35" y="310" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="start" font-weight="normal">заряда атомного ядра (Z).</text>
