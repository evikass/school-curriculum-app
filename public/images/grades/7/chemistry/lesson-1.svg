  <text x="415" y="540" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Z = 1, 2, 3 ... 118</text>
  <rect x="560" y="330" width="220" height="230" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="670" y="355" font-family="Arial, sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle" font-weight="bold">Ключевые формулы</text>
  <text x="580" y="390" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD" text-anchor="start" font-weight="normal">Заряд ядра:</text>
  <text x="580" y="412" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="start" font-weight="bold">Z = число протонов</text>
  <text x="580" y="432" font-family="Arial, sans-serif" font-size="12" fill="#DDD6FE" text-anchor="start" font-weight="normal">   = порядковый номер</text>
  <text x="580" y="462" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD" text-anchor="start" font-weight="normal">Массовое число:</text>
  <text x="580" y="484" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="start" font-weight="bold">A = Z + N</text>
  <text x="580" y="504" font-family="Arial, sans-serif" font-size="12" fill="#DDD6FE" text-anchor="start" font-weight="normal">N — число нейтронов</text>
  <text x="580" y="534" font-family="Arial, sans-serif" font-size="12" fill="#C4B5FD" text-anchor="start" font-weight="normal">Число электронов</text>
  <text x="580" y="552" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="start" font-weight="bold">= Z (для атома)</text>

