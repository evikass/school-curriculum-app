  <text x="425" y="198" font-family="Arial, sans-serif" font-size="11" fill="#A78BFA" text-anchor="start" font-weight="bold">Условные обозначения:</text>
  <rect x="425" y="206" width="12" height="12" rx="2" fill="#F59E0B" opacity="0.4"/>
  <text x="442" y="216" font-family="Arial, sans-serif" font-size="11" fill="#DDD6FE" text-anchor="start" font-weight="normal">— Металлы</text>
  <rect x="510" y="206" width="12" height="12" rx="2" fill="#FCD34D" opacity="0.4"/>
  <text x="527" y="216" font-family="Arial, sans-serif" font-size="11" fill="#DDD6FE" text-anchor="start" font-weight="normal">— Неметаллы</text>
  <rect x="610" y="206" width="12" height="12" rx="2" fill="#06B6D4" opacity="0.4"/>
  <text x="627" y="216" font-family="Arial, sans-serif" font-size="11" fill="#DDD6FE" text-anchor="start" font-weight="normal">— Благородные газы</text>
  <text x="425" y="248" font-family="Arial, sans-serif" font-size="12" fill="#A78BFA" text-anchor="start" font-weight="bold">Закономерности:</text>
  <text x="425" y="268" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="start" font-weight="normal">• В периоде: слева направо</text>
  <text x="435" y="284" font-family="Arial, sans-serif" font-size="11" fill="#C4B5FD" text-anchor="start" font-weight="normal">металлич. свойства убывают</text>
  <text x="425" y="304" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="start" font-weight="normal">• В группе: сверху вниз</text>
  <text x="435" y="320" font-family="Arial, sans-serif" font-size="11" fill="#C4B5FD" text-anchor="start" font-weight="normal">металлич. свойства возрастают</text>
  <rect x="20" y="330" width="250" height="230" rx="12" fill="rgba(255,255,255,0.1)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3"/>
  <text x="145" y="355" font-family="Arial, sans-serif" font-size="14" fill="#A78BFA" text-anchor="middle" font-weight="bold">Модель атома</text>
