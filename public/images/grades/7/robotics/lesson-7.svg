  <text x="180" y="105" fill="#06B6D4" font-size="10" font-family="sans-serif" text-anchor="start" font-weight="bold">Ультразвук →</text>
  <text x="220" y="175" fill="#22C55E" font-size="10" font-family="sans-serif" text-anchor="start" font-weight="bold">← Эхо-сигнал</text>
  <text x="40" y="178" fill="#7DD3FC" font-size="10" font-family="sans-serif" text-anchor="start">T = передатчик</text>
  <text x="40" y="194" fill="#7DD3FC" font-size="10" font-family="sans-serif" text-anchor="start">R = приёмник</text>
  <text x="30" y="220" fill="#38BDF8" font-size="14" font-family="monospace" text-anchor="start" font-weight="bold">S = (v × t) / 2</text>
  <text x="180" y="220" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="start">v = 340 м/с (скорость звука)</text>
  <text x="30" y="240" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="start">t = время возврата эха</text>
  <rect x="450" y="82" width="334" height="210" rx="8" fill="#0D2137" stroke="#1E5A8A" stroke-width="1" />
  <text x="462" y="104" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Временная диаграмма</text>
  <text x="462" y="114" fill="#06B6D4" font-size="11" font-family="sans-serif" text-anchor="start">Trig → 10 мкс импульс</text>
  <line x1="462" y1="130" x2="490" y2="130" stroke="#7DD3FC" stroke-width="1.5" />
  <line x1="490" y1="130" x2="490" y2="120" stroke="#06B6D4" stroke-width="1.5" />
  <line x1="490" y1="120" x2="500" y2="120" stroke="#06B6D4" stroke-width="1.5" />
  <line x1="500" y1="120" x2="500" y2="130" stroke="#06B6D4" stroke-width="1.5" />
  <text x="462" y="152" fill="#22C55E" font-size="11" font-family="sans-serif" text-anchor="start">Echo → длительность = расстояние</text>
  <line x1="505" y1="168" x2="505" y2="155" stroke="#22C55E" stroke-width="1.5" />
  <line x1="505" y1="155" x2="700" y2="155" stroke="#22C55E" stroke-width="1.5" />
  <line x1="700" y1="155" x2="700" y2="168" stroke="#22C55E" stroke-width="1.5" />
  <text x="580" y="150" fill="#22C55E" font-size="10" font-family="sans-serif" text-anchor="middle">← t →</text>
  <text x="462" y="200" fill="#38BDF8" font-size="12" font-family="sans-serif" text-anchor="start" font-weight="bold">Характеристики HC-SR04:</text>
  <text x="470" y="218" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">• Диапазон: 2 см – 400 см</text>
  <text x="470" y="234" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">• Точность: ±3 мм</text>
  <text x="470" y="250" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">• Угол обзора: 30°</text>
  <text x="470" y="266" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">• Напряжение: 5 В</text>
  <rect x="16" y="306" width="370" height="130" rx="8" fill="#0D2137" stroke="#1E5A8A" stroke-width="1" />
  <text x="28" y="328" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Подключение к Arduino</text>
  <text x="28" y="340" fill="#EF4444" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">VCC</text>
  <text x="80" y="340" fill="#E0F2FE" font-size="12" font-family="sans-serif" text-anchor="start">→ 5V (Arduino)</text>
  <text x="28" y="362" fill="#F59E0B" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">Trig</text>
  <text x="80" y="362" fill="#E0F2FE" font-size="12" font-family="sans-serif" text-anchor="start">→ Пин 9 (цифровой)</text>
  <text x="28" y="384" fill="#22C55E" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">Echo</text>
  <text x="80" y="384" fill="#E0F2FE" font-size="12" font-family="sans-serif" text-anchor="start">→ Пин 10 (цифровой)</text>
  <text x="28" y="406" fill="#7DD3FC" font-size="12" font-family="monospace" text-anchor="start" font-weight="bold">GND</text>
  <text x="80" y="406" fill="#E0F2FE" font-size="12" font-family="sans-serif" text-anchor="start">→ GND (Arduino)</text>
  <rect x="400" y="306" width="384" height="130" rx="8" fill="#0D2137" stroke="#06B6D4" stroke-width="1" />
  <text x="412" y="328" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Код: чтение расстояния</text>
  <text x="410" y="342" fill="#7DD3FC" font-size="11" font-family="monospace" text-anchor="start">#define TRIG 9</text>
  <text x="410" y="358" fill="#7DD3FC" font-size="11" font-family="monospace" text-anchor="start">#define ECHO 10</text>
  <text x="410" y="374" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start" />
  <text x="410" y="390" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">long getDistance() {</text>
  <text x="410" y="406" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  digitalWrite(TRIG, LOW);</text>
  <text x="410" y="422" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  delayMicroseconds(2);</text>
  <text x="410" y="438" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  digitalWrite(TRIG, HIGH);</text>
  <text x="410" y="454" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  delayMicroseconds(10);</text>
  <text x="410" y="470" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  digitalWrite(TRIG, LOW);</text>
  <text x="410" y="486" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  long dur = pulseIn(ECHO, HIGH);</text>
  <text x="410" y="502" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  return dur * 0.034 / 2;</text>
  <text x="410" y="518" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">}</text>
  <rect x="16" y="450" width="768" height="56" rx="8" fill="#0D2137" stroke="#22C55E" stroke-width="1" />
  <text x="28" y="472" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Применение</text>
  <text x="28" y="484" fill="#22C55E" font-size="13" font-family="sans-serif" text-anchor="start">Парктроник • Робот-обходчик препятствий • Измеритель уровня воды • Система охраны • Картирование помещения</text>
  <rect x="16" y="518" width="768" height="40" rx="8" fill="#0D2137" stroke="#38BDF8" stroke-width="1" />
  <text x="28" y="543" fill="#38BDF8" font-size="13" font-family="monospace" text-anchor="start" font-weight="bold">Формула: расстояние(см) = время(мкс) × 0.034 / 2</text>
  <text x="400" y="575" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="middle">7 класс | Робототехника | Урок 7</text>
</svg>