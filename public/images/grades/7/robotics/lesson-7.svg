  <text x="76" y="38" fill="#E0F2FE" font-size="22" font-weight="bold" font-family="sans-serif">Ультразвуковой датчик расстояния</text>
  <text x="76" y="58" fill="#7DD3FC" font-size="13" font-family="sans-serif">HC-SR04: принцип работы и подключение</text>
