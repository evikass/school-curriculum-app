  <text x="26" y="536" fill="#7DD3FC" font-size="11" font-family="monospace" text-anchor="start">// Мигание светодиодом (Blink)</text>
  <text x="26" y="552" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void setup()   { pinMode(13, OUTPUT); }</text>
  <text x="26" y="568" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void loop()    { digitalWrite(13, HIGH); delay(1000);</text>
  <text x="26" y="584" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">                 digitalWrite(13, LOW);  delay(1000); }</text>
