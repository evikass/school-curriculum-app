  <text x="294" y="226" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">3 провода: VCC, GND, Signal</text>
  <text x="294" y="242" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">Управление: servo.write(angle)</text>
  <text x="294" y="258" fill="#7DD3FC" font-size="10" font-family="sans-serif" text-anchor="start">Обычно SG90 (микро)</text>
