  <text x="724" y="134" fill="#EF4444" font-size="8" font-family="monospace" text-anchor="start">M+</text>
  <text x="724" y="154" fill="#EF4444" font-size="8" font-family="monospace" text-anchor="start">M–</text>
  <circle cx="755" cy="140" r="12" fill="none" stroke="#F59E0B" stroke-width="1.5" />
  <text x="755" y="144" fill="#F59E0B" font-size="10" font-family="sans-serif" text-anchor="middle">M</text>
  <text x="558" y="210" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">Управляет направлением</text>
  <text x="558" y="226" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">и скоростью мотора.</text>
  <text x="558" y="248" fill="#22C55E" font-size="10" font-family="monospace" text-anchor="start">IN1=1, IN2=0 → вперёд</text>
  <text x="558" y="262" fill="#EF4444" font-size="10" font-family="monospace" text-anchor="start">IN1=0, IN2=1 → назад</text>
  <rect x="16" y="296" width="390" height="130" rx="8" fill="#0D2137" stroke="#1E5A8A" stroke-width="1" />
  <text x="28" y="318" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">ШИМ (PWM)</text>
  <text x="28" y="326" fill="#E0F2FE" font-size="12" font-family="sans-serif" text-anchor="start">Широтно-импульсная модуляция</text>
  <text x="28" y="344" fill="#E0F2FE" font-size="12" font-family="sans-serif" text-anchor="start">управляет мощностью мотора.</text>
