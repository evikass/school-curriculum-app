  <text x="28" y="405" fill="#38BDF8" font-size="12" font-family="monospace" text-anchor="start">analogWrite(pin, 0-255)</text>
  <text x="28" y="420" fill="#7DD3FC" font-size="11" font-family="monospace" text-anchor="start">0 = 0%, 127 = 50%, 255 = 100%</text>
  <rect x="416" y="296" width="368" height="130" rx="8" fill="#0D2137" stroke="#06B6D4" stroke-width="1" />
  <text x="428" y="318" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Пример: DC мотор</text>
  <text x="426" y="332" fill="#7DD3FC" font-size="11" font-family="monospace" text-anchor="start">// DC мотор через L298N</text>
  <text x="426" y="348" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void setup() {</text>
  <text x="426" y="364" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  pinMode(5, OUTPUT); // IN1</text>
  <text x="426" y="380" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  pinMode(6, OUTPUT); // IN2</text>
  <text x="426" y="396" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  pinMode(9, OUTPUT); // ENA(PWM)</text>
  <text x="426" y="412" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">}</text>
  <text x="426" y="428" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void forward() {</text>
  <text x="426" y="444" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  digitalWrite(5, HIGH);</text>
  <text x="426" y="460" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  digitalWrite(6, LOW);</text>
  <text x="426" y="476" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  analogWrite(9, 200);</text>
  <text x="426" y="492" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">}</text>
  <rect x="16" y="440" width="370" height="100" rx="8" fill="#0D2137" stroke="#06B6D4" stroke-width="1" />
  <text x="28" y="462" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Пример: Серводвигатель</text>
  <text x="26" y="476" fill="#7DD3FC" font-size="11" font-family="monospace" text-anchor="start">#include &amp;lt;Servo.h&amp;gt;</text>
  <text x="26" y="492" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">Servo myServo;</text>
  <text x="26" y="508" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void setup() {</text>
  <text x="26" y="524" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  myServo.attach(9);</text>
  <text x="26" y="540" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">}</text>
  <text x="26" y="556" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void loop() {</text>
  <text x="26" y="572" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  myServo.write(90);  // 90°</text>
  <text x="26" y="588" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">}</text>
  <rect x="400" y="440" width="384" height="100" rx="8" fill="#0D2137" stroke="#F59E0B" stroke-width="1" />
  <text x="412" y="462" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Важно помнить</text>
  <text x="412" y="466" fill="#F59E0B" font-size="12" font-family="sans-serif" text-anchor="start" font-weight="bold">⚠ Arduino не может напрямую питать мотор!</text>
  <text x="412" y="486" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">• Мотор потребляет больше 40 мА (предел пина)</text>
  <text x="412" y="502" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">• Используйте драйвер (L298N, L293D)</text>
  <text x="412" y="518" fill="#E0F2FE" font-size="11" font-family="sans-serif" text-anchor="start">• Отдельное питание для мотора</text>
  <text x="400" y="555" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="middle">7 класс | Робототехника | Урок 6</text>
</svg>