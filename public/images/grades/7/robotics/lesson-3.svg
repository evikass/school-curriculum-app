  <text x="403" y="428" fill="#F59E0B" font-size="14" font-family="monospace" text-anchor="start" font-weight="bold">Действие</text>
  <text x="495" y="428" fill="#7DD3FC" font-size="14" font-family="monospace" text-anchor="start" font-weight="bold">→</text>
  <text x="524" y="428" fill="#06B6D4" font-size="14" font-family="monospace" text-anchor="start" font-weight="bold">Среда</text>
  <rect x="16" y="464" width="768" height="70" rx="8" fill="#0D2137" stroke="#06B6D4" stroke-width="1" />
  <text x="28" y="486" fill="#38BDF8" font-size="14" font-weight="bold" font-family="sans-serif">Пример логики</text>
  <text x="26" y="500" fill="#7DD3FC" font-size="11" font-family="monospace" text-anchor="start">// Цикл управления роботом:</text>
  <text x="26" y="516" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">void loop() {</text>
  <text x="26" y="532" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  int dist = readSensor();   // 1. Чтение датчика</text>
  <text x="26" y="548" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  int cmd  = process(dist);  // 2. Обработка данных</text>
  <text x="26" y="564" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">  drive(cmd);                // 3. Управление приводом</text>
  <text x="26" y="580" fill="#E0F2FE" font-size="11" font-family="monospace" text-anchor="start">}</text>
  <text x="400" y="555" fill="#7DD3FC" font-size="11" font-family="sans-serif" text-anchor="middle">7 класс | Робототехника | Урок 3</text>
