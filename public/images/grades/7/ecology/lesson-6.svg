  <text x="400" y="38" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Пищевые цепи и сети</text>
  <text x="28" y="40" font-size="26">🌿</text>
  <text x="752" y="40" font-size="26">🌿</text>
  <text x="400" y="82" text-anchor="middle" fill="#166534" font-size="15" font-style="italic" font-family="Arial, sans-serif">Трофические уровни, поток энергии, экологические пирамиды</text>
  <rect x="30" y="95" width="740" height="120" fill="#FFFFFF" stroke="#84CC16" stroke-width="2" rx="10" />
