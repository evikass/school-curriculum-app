  <text x="600" y="490" text-anchor="middle" fill="#7C3AED" font-size="9" font-family="Arial, sans-serif" font-weight="bold">Конс. III (1 кДж)</text>
  <text x="600" y="520" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">Правило 10%: на каждый</text>
