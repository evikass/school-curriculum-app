  <rect x="80" y="456" width="80" height="28" fill="#EA580C" rx="10" />
  <text x="120" y="475" text-anchor="middle" fill="#FFFFFF" font-size="10" font-family="Arial, sans-serif" font-weight="bold">Лиса</text>
