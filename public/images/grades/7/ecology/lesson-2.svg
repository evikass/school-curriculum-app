  <text x="400" y="378" text-anchor="middle" fill="#1A2E05" font-size="13" font-family="Arial, sans-serif">Наблюдение → Гипотеза → Эксперимент → Анализ → Моделирование → Мониторинг</text>
  <rect x="40" y="405" width="720" height="170" fill="#FFFFFF" stroke="#84CC16" stroke-width="2" rx="10" />
