  <text x="185" y="510" text-anchor="middle" fill="#1E40AF" font-size="13" font-family="Arial, sans-serif" font-weight="bold">Водоём</text>
  <text x="185" y="528" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">Отбор проб воды</text>
  <line x1="320" y1="505" x2="370" y2="505" stroke="#65A30D" stroke-width="3" />
  <polygon points="370,505 361.33974596215563,510.0 361.33974596215563,500.0" fill="#65A30D" />
  <rect x="380" y="450" width="160" height="110" fill="#DCFCE7" stroke="#65A30D" stroke-width="2" rx="10" />
  <text x="460" y="480" text-anchor="middle" fill="#1A2E05" font-size="28" font-family="Arial, sans-serif">🧪</text>
  <text x="460" y="510" text-anchor="middle" fill="#1A2E05" font-size="13" font-family="Arial, sans-serif" font-weight="bold">Лаборатория</text>
  <text x="460" y="528" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">Анализ проб</text>
  <line x1="550" y1="505" x2="600" y2="505" stroke="#65A30D" stroke-width="3" />
  <polygon points="600,505 591.3397459621556,510.0 591.3397459621556,500.0" fill="#65A30D" />
  <rect x="610" y="450" width="130" height="110" fill="#FEF9C3" stroke="#EA580C" stroke-width="2" rx="10" />
  <text x="675" y="480" text-anchor="middle" fill="#1A2E05" font-size="28" font-family="Arial, sans-serif">📋</text>
  <text x="675" y="510" text-anchor="middle" fill="#1A2E05" font-size="13" font-family="Arial, sans-serif" font-weight="bold">Отчёт</text>
  <text x="675" y="528" text-anchor="middle" fill="#365314" font-size="11" font-family="Arial, sans-serif">Выводы и меры</text>
