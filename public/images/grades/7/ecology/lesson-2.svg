  <text x="677" y="276" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Система предупреждений</text>
  <rect x="40" y="335" width="720" height="55" fill="#FFFFFF" stroke="#84CC16" stroke-width="2" rx="10" />
