  <text x="492" y="276" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Математические модели</text>
  <rect x="592" y="100" width="170" height="210" fill="#FFFFFF" stroke="#166534" stroke-width="2" rx="10" />
  <circle cx="677" cy="140" r="28" fill="#166534" />
