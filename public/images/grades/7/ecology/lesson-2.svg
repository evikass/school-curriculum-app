  <text x="122" y="232" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Полевые наблюдения</text>
  <text x="122" y="254" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Фенологические записи</text>
  <text x="122" y="276" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Учёт численности видов</text>
  <rect x="222" y="100" width="170" height="210" fill="#FFFFFF" stroke="#15803D" stroke-width="2" rx="10" />
  <circle cx="307" cy="140" r="28" fill="#15803D" />
  <text x="307" y="148" text-anchor="middle" fill="#FFFFFF" font-size="24" font-family="Arial, sans-serif">🔬</text>
  <text x="307" y="185" text-anchor="middle" fill="#15803D" font-size="14" font-family="Arial, sans-serif" font-weight="bold">Эксперимент</text>
  <text x="307" y="210" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Целенаправленное воздействие</text>
  <text x="307" y="232" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Лабораторные опыты</text>
  <text x="307" y="254" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Сравнение опытной и контрольной</text>
