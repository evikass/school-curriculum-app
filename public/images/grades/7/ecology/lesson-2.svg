  <text x="400" y="38" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Методы экологических исследований</text>
  <text x="28" y="40" font-size="26">🌿</text>
  <text x="752" y="40" font-size="26">🌿</text>
  <text x="400" y="82" text-anchor="middle" fill="#166534" font-size="15" font-style="italic" font-family="Arial, sans-serif">Основные методы: наблюдение, эксперимент, моделирование, мониторинг</text>
  <rect x="37" y="100" width="170" height="210" fill="#FFFFFF" stroke="#4D7C0F" stroke-width="2" rx="10" />
  <circle cx="122" cy="140" r="28" fill="#4D7C0F" />
  <text x="122" y="148" text-anchor="middle" fill="#FFFFFF" font-size="24" font-family="Arial, sans-serif">👁</text>
  <text x="122" y="185" text-anchor="middle" fill="#4D7C0F" font-size="14" font-family="Arial, sans-serif" font-weight="bold">Наблюдение</text>
