  <text x="492" y="210" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Создание моделей экосистем</text>
  <text x="492" y="232" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Компьютерное моделирование</text>
