  <text x="677" y="210" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Регулярные наблюдения</text>
  <text x="677" y="232" text-anchor="middle" fill="#365314" font-size="10" font-family="Arial, sans-serif">Отслеживание изменений</text>
