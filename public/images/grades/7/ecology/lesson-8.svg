<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#F7FEE7" rx="12" />
  <rect x="2" y="2" width="796" height="596" fill="none" stroke="#84CC16" stroke-width="3" rx="12" />
  <rect x="3" y="3" width="794" height="56" fill="#65A30D" rx="10" />
  <text x="400" y="38" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Круговорот кислорода и азота</text>
  <text x="28" y="40" font-size="26">🌿</text>
  <text x="752" y="40" font-size="26">🌿</text>
  <text x="400" y="82" text-anchor="middle" fill="#166534" font-size="15" font-style="italic" font-family="Arial, sans-serif">Азотфиксация, нитрификация, денитрификация, кислородный цикл</text>
  <rect x="25" y="92" width="380" height="245" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2" rx="10" />
  <text x="215" y="112" text-anchor="middle" fill="#0369A1" font-size="14" font-family="Arial, sans-serif" font-weight="bold">🔭 Круговорот кислорода</text>
  <ellipse cx="215" cy="165" rx="100" ry="35" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="2" />
  <text x="215" y="168" text-anchor="middle" fill="#0369A1" font-size="11" font-family="Arial, sans-serif" font-weight="bold">O₂ в атмосфере (21%)</text>
  <line x1="175" y1="200" x2="140" y2="240" stroke="#22C55E" stroke-width="2" />
  <polygon points="140,240 141.9399337156981,230.18997160153458 149.46570066276686,236.77501768021978" fill="#22C55E" />
  <text x="120" y="222" text-anchor="end" fill="#22C55E" font-size="10" font-family="Arial, sans-serif">Фотосинтез</text>
  <circle cx="140" cy="270" r="28" fill="#86EFAC" stroke="#22C55E" stroke-width="2" />
  <text x="140" y="275" text-anchor="middle" fill="#FFFFFF" font-size="20" font-family="Arial, sans-serif">🌿</text>
  <text x="140" y="310" text-anchor="middle" fill="#15803D" font-size="10" font-family="Arial, sans-serif">Растения</text>
  <line x1="170" y1="255" x2="200" y2="200" stroke="#EA580C" stroke-width="2" />
  <polygon points="200,200 200.2424967663151,209.99705933354036 191.46354103717127,205.20853802673463" fill="#EA580C" />
  <text x="215" y="225" text-anchor="start" fill="#EA580C" font-size="10" font-family="Arial, sans-serif">Дыхание</text>
  <rect x="60" y="145" width="310" height="14" fill="#E0E7FF" stroke="#818CF8" stroke-width="2" rx="4" />
  <text x="215" y="155" text-anchor="middle" fill="#4338CA" font-size="8" font-family="Arial, sans-serif">Озоновый слой (O₃) — защита от УФ</text>
  <text x="315" y="275" text-anchor="start" fill="#0369A1" font-size="9" font-family="Arial, sans-serif">O₂ из воды</text>
  <text x="315" y="290" text-anchor="start" fill="#0369A1" font-size="9" font-family="Arial, sans-serif">при фотосинтезе:</text>
  <text x="315" y="305" text-anchor="start" fill="#0369A1" font-size="9" font-family="Arial, sans-serif">2H₂O → O₂ + 4H</text>
  <rect x="415" y="92" width="365" height="495" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2" rx="10" />
  <text x="597" y="112" text-anchor="middle" fill="#6D28D9" font-size="14" font-family="Arial, sans-serif" font-weight="bold">🧪 Круговорот азота</text>
  <ellipse cx="597" cy="160" rx="100" ry="35" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2" />
  <text x="597" y="163" text-anchor="middle" fill="#6D28D9" font-size="11" font-family="Arial, sans-serif" font-weight="bold">N₂ в атмосфере (78%)</text>
  <line x1="555" y1="195" x2="500" y2="225" stroke="#7C3AED" stroke-width="2" />
  <polygon points="500,225 505.20853802673463,216.46354103717127 509.9970593335404,225.2424967663151" fill="#7C3AED" />
  <text x="510" y="205" text-anchor="end" fill="#6D28D9" font-size="9" font-family="Arial, sans-serif">Азотфиксация</text>
  <ellipse cx="470" cy="240" rx="55" ry="22" fill="#DDD6FE" stroke="#7C3AED" stroke-width="2" />
  <text x="470" y="244" text-anchor="middle" fill="#6D28D9" font-size="9" font-family="Arial, sans-serif">Клубеньковые</text>
  <text x="470" y="256" text-anchor="middle" fill="#6D28D9" font-size="9" font-family="Arial, sans-serif">бактерии</text>
  <rect x="440" y="280" width="80" height="30" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" rx="8" />
  <text x="480" y="300" text-anchor="middle" fill="#6D28D9" font-size="12" font-family="Arial, sans-serif" font-weight="bold">NH₄⁺</text>
  <line x1="470" y1="262" x2="470" y2="280" stroke="#7C3AED" stroke-width="2" />
  <polygon points="470,280 465.0,271.33974596215563 475.0,271.33974596215563" fill="#7C3AED" />
  <line x1="520" y1="295" x2="560" y2="295" stroke="#7C3AED" stroke-width="2" />
  <polygon points="560,295 551.3397459621556,300.0 551.3397459621556,290.0" fill="#7C3AED" />
  <text x="540" y="288" text-anchor="middle" fill="#6D28D9" font-size="9" font-family="Arial, sans-serif">Нитрификация</text>
  <rect x="560" y="280" width="60" height="30" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" rx="8" />
  <text x="590" y="300" text-anchor="middle" fill="#6D28D9" font-size="12" font-family="Arial, sans-serif" font-weight="bold">NO₂⁻</text>
  <line x1="620" y1="295" x2="660" y2="295" stroke="#7C3AED" stroke-width="2" />
  <polygon points="660,295 651.3397459621556,300.0 651.3397459621556,290.0" fill="#7C3AED" />
  <rect x="660" y="280" width="60" height="30" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" rx="8" />
  <text x="690" y="300" text-anchor="middle" fill="#6D28D9" font-size="12" font-family="Arial, sans-serif" font-weight="bold">NO₃⁻</text>
  <line x1="690" y1="310" x2="690" y2="340" stroke="#22C55E" stroke-width="2" />
  <polygon points="690,340 685.0,331.33974596215563 695.0,331.33974596215563" fill="#22C55E" />
  <text x="720" y="330" text-anchor="start" fill="#22C55E" font-size="9" font-family="Arial, sans-serif">Усвоение</text>
  <circle cx="680" cy="370" r="25" fill="#86EFAC" stroke="#22C55E" stroke-width="2" />
  <text x="680" y="374" text-anchor="middle" fill="#FFFFFF" font-size="18" font-family="Arial, sans-serif">🌿</text>
  <line x1="705" y1="370" x2="730" y2="370" stroke="#65A30D" stroke-width="2" />
  <polygon points="730,370 721.3397459621556,375.0 721.3397459621556,365.0" fill="#65A30D" />
  <circle cx="750" cy="370" r="20" fill="#FED7AA" stroke="#EA580C" stroke-width="2" />
  <text x="750" y="374" text-anchor="middle" fill="#FFFFFF" font-size="15" font-family="Arial, sans-serif">🐾</text>
  <line x1="750" y1="390" x2="720" y2="430" stroke="#991B1B" stroke-width="2" />
  <polygon points="720,430 721.1961524227066,420.0717967697245 729.1961524227066,426.0717967697245" fill="#991B1B" />
  <text x="755" y="415" text-anchor="start" fill="#991B1B" font-size="8" font-family="Arial, sans-serif">Отмирание</text>
  <ellipse cx="660" cy="445" rx="60" ry="22" fill="#FEE2E2" stroke="#991B1B" stroke-width="2" />
  <text x="660" y="448" text-anchor="middle" fill="#991B1B" font-size="9" font-family="Arial, sans-serif">Редуценты</text>
  <line x1="620" y1="440" x2="530" y2="310" stroke="#991B1B" stroke-width="2" />
  <polygon points="530,310 539.0404639757654,314.27434335341565 530.8185420593276,319.9664431417187" fill="#991B1B" />
  <text x="560" y="380" text-anchor="end" fill="#991B1B" font-size="9" font-family="Arial, sans-serif">Аммонификация</text>
  <line x1="460" y1="310" x2="430" y2="360" stroke="#DC2626" stroke-width="2" />
  <polygon points="430,360 430.1681993148323,350.0014146505373 438.74312857195775,355.14637220481256" fill="#DC2626" />
  <text x="420" y="340" text-anchor="end" fill="#DC2626" font-size="9" font-family="Arial, sans-serif">Денитрификация</text>
  <ellipse cx="440" cy="380" rx="60" ry="22" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" />
  <text x="440" y="383" text-anchor="middle" fill="#DC2626" font-size="9" font-family="Arial, sans-serif">N₂ ↑ атмосфера</text>
  <line x1="470" y1="360" x2="530" y2="195" stroke="#DC2626" stroke-width="2" />
  <polygon points="530,195 531.7393853754403,204.84756510593886 522.3414511405558,201.4301344750718" fill="#DC2626" />
  <rect x="25" y="345" width="380" height="245" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2" rx="10" />
  <text x="215" y="365" text-anchor="middle" fill="#0369A1" font-size="13" font-family="Arial, sans-serif" font-weight="bold">Ключевые процессы:</text>
  <text x="45" y="390" text-anchor="start" fill="#0369A1" font-size="11" font-family="Arial, sans-serif" font-weight="bold">Фотосинтез:</text>
  <text x="45" y="405" text-anchor="start" fill="#365314" font-size="10" font-family="Arial, sans-serif">CO₂ + H₂O → глюкоза + O₂</text>
  <text x="45" y="426" text-anchor="start" fill="#0369A1" font-size="11" font-family="Arial, sans-serif" font-weight="bold">Дыхание:</text>
  <text x="45" y="441" text-anchor="start" fill="#365314" font-size="10" font-family="Arial, sans-serif">Глюкоза + O₂ → CO₂ + H₂O</text>
  <text x="45" y="462" text-anchor="start" fill="#0369A1" font-size="11" font-family="Arial, sans-serif" font-weight="bold">Озонообразование:</text>
  <text x="45" y="477" text-anchor="start" fill="#365314" font-size="10" font-family="Arial, sans-serif">3O₂ → 2O₃ (в стратосфере)</text>
  <text x="45" y="498" text-anchor="start" fill="#0369A1" font-size="11" font-family="Arial, sans-serif" font-weight="bold">Источники O₂:</text>
  <text x="45" y="513" text-anchor="start" fill="#365314" font-size="10" font-family="Arial, sans-serif">Растения, фитопланктон</text>
  <text x="45" y="534" text-anchor="start" fill="#0369A1" font-size="11" font-family="Arial, sans-serif" font-weight="bold">Значение:</text>
  <text x="45" y="549" text-anchor="start" fill="#365314" font-size="10" font-family="Arial, sans-serif">Дыхание всех организмов</text>
  <rect x="415" y="475" width="365" height="115" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2" rx="10" />
  <text x="597" y="495" text-anchor="middle" fill="#6D28D9" font-size="12" font-family="Arial, sans-serif" font-weight="bold">Процессы круговорота азота:</text>
  <text x="430" y="512" text-anchor="start" fill="#6D28D9" font-size="10" font-family="Arial, sans-serif" font-weight="bold">Азотфиксация:</text>
  <text x="570" y="512" text-anchor="start" fill="#365314" font-size="10" font-family="Arial, sans-serif">N₂ → NH₃ (бактерии, молнии)</text>
  <text x="430" y="532" text-anchor="start" fill="#6D28D9" font-size="10" font-family="Arial, sans-serif" font-weight="bold">Нитрификация:</text>
  <text x="570" y="532" text-anchor="start" fill="#365314" font-size="10" font-family="Arial, sans-serif">NH₄⁺ → NO₂⁻ → NO₃⁻</text>
  <text x="430" y="552" text-anchor="start" fill="#6D28D9" font-size="10" font-family="Arial, sans-serif" font-weight="bold">Аммонификация:</text>
  <text x="570" y="552" text-anchor="start" fill="#365314" font-size="10" font-family="Arial, sans-serif">Органика → NH₄⁺ (редуценты)</text>
  <text x="430" y="572" text-anchor="start" fill="#6D28D9" font-size="10" font-family="Arial, sans-serif" font-weight="bold">Денитрификация:</text>
  <text x="570" y="572" text-anchor="start" fill="#365314" font-size="10" font-family="Arial, sans-serif">NO₃⁻ → N₂ (бактерии)</text>
</svg>