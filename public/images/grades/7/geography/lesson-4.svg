  <text x="175" y="126" text-anchor="end" fill="#1F2937" font-size="10" font-weight="normal" font-family="sans-serif">Индоевропейская</text>
  <text x="473" y="126" text-anchor="start" fill="#047857" font-size="9" font-weight="bold" font-family="sans-serif">2,5 млрд чел.</text>
  <rect x="180" y="142" width="140" height="20" rx="3" fill="#059669" />
  <text x="175" y="156" text-anchor="end" fill="#1F2937" font-size="10" font-weight="normal" font-family="sans-serif">Сино-тибетская</text>
  <text x="325" y="156" text-anchor="start" fill="#059669" font-size="9" font-weight="bold" font-family="sans-serif">1,2 млрд чел.</text>
  <rect x="180" y="172" width="38" height="20" rx="3" fill="#0E7490" />
  <text x="175" y="186" text-anchor="end" fill="#1F2937" font-size="10" font-weight="normal" font-family="sans-serif">Нигеро-конголезская</text>
  <text x="223" y="186" text-anchor="start" fill="#0E7490" font-size="9" font-weight="bold" font-family="sans-serif">350 млн чел.</text>
  <rect x="180" y="202" width="32" height="20" rx="3" fill="#B45309" />
  <text x="175" y="216" text-anchor="end" fill="#1F2937" font-size="10" font-weight="normal" font-family="sans-serif">Афразийская</text>
  <text x="217" y="216" text-anchor="start" fill="#B45309" font-size="9" font-weight="bold" font-family="sans-serif">300 млн чел.</text>
  <rect x="180" y="232" width="25" height="20" rx="3" fill="#6D28D9" />
  <text x="175" y="246" text-anchor="end" fill="#1F2937" font-size="10" font-weight="normal" font-family="sans-serif">Австронезийская</text>
  <text x="210" y="246" text-anchor="start" fill="#6D28D9" font-size="9" font-weight="bold" font-family="sans-serif">300 млн чел.</text>
  <rect x="180" y="262" width="19" height="20" rx="3" fill="#B45309" />
