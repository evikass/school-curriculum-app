  <rect x="55" y="408" width="125" height="20" rx="3" fill="#A7F3D0" />
  <text x="117" y="422" text-anchor="middle" fill="#047857" font-size="11" font-weight="bold" font-family="sans-serif">2,4 млрд</text>
  <text x="117" y="445" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Католицизм, протестантизм,</text>
