  <text x="117" y="475" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Европа, Америка, Африка</text>
  <rect x="220" y="370" width="185" height="170" rx="6" fill="#FFFFFF" stroke="#0E7490" stroke-width="2" />
  <rect x="220" y="370" width="185" height="28" rx="6" fill="#0E7490" />
  <rect x="220" y="392" width="185" height="6" rx="0" fill="#0E7490" />
  <text x="312" y="388" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="sans-serif">Ислам</text>
  <rect x="250" y="408" width="125" height="20" rx="3" fill="#A7F3D0" />
  <text x="312" y="422" text-anchor="middle" fill="#0E7490" font-size="11" font-weight="bold" font-family="sans-serif">1,9 млрд</text>
  <text x="312" y="445" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Суннизм, шиизм</text>
  <text x="312" y="460" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Ближний Восток,</text>
  <text x="312" y="475" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Северная Африка, Азия</text>
  <rect x="415" y="370" width="185" height="170" rx="6" fill="#FFFFFF" stroke="#B45309" stroke-width="2" />
  <rect x="415" y="370" width="185" height="28" rx="6" fill="#B45309" />
  <rect x="415" y="392" width="185" height="6" rx="0" fill="#B45309" />
  <text x="507" y="388" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="sans-serif">Буддизм</text>
  <rect x="445" y="408" width="125" height="20" rx="3" fill="#A7F3D0" />
  <text x="507" y="422" text-anchor="middle" fill="#B45309" font-size="11" font-weight="bold" font-family="sans-serif">500 млн</text>
  <text x="507" y="445" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Тхеравада, махаяна</text>
  <text x="507" y="460" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Восточная и</text>
  <text x="507" y="475" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Юго-Восточная Азия</text>
  <rect x="610" y="370" width="185" height="170" rx="6" fill="#FFFFFF" stroke="#6D28D9" stroke-width="2" />
  <rect x="610" y="370" width="185" height="28" rx="6" fill="#6D28D9" />
  <rect x="610" y="392" width="185" height="6" rx="0" fill="#6D28D9" />
  <text x="702" y="388" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="sans-serif">Индуизм</text>
  <rect x="640" y="408" width="125" height="20" rx="3" fill="#A7F3D0" />
  <text x="702" y="422" text-anchor="middle" fill="#6D28D9" font-size="11" font-weight="bold" font-family="sans-serif">1,2 млрд</text>
  <text x="702" y="445" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Ведическая традиция</text>
  <text x="702" y="460" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Индия, Непал,</text>
  <text x="702" y="475" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Бали</text>
  <rect x="60" y="545" width="680" height="20" rx="3" fill="#FFFFFF" stroke="#6EE7B7" stroke-width="1" />
  <text x="400" y="558" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="normal" font-family="sans-serif">Национальные религии: иудаизм, синтоизм, даосизм, конфуцианство</text>
