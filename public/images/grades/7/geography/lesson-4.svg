  <text x="204" y="276" text-anchor="start" fill="#B45309" font-size="9" font-weight="bold" font-family="sans-serif">220 млн чел.</text>
  <rect x="180" y="292" width="12" height="20" rx="3" fill="#4B5563" />
  <text x="175" y="306" text-anchor="end" fill="#1F2937" font-size="10" font-weight="normal" font-family="sans-serif">Алтайская</text>
  <text x="197" y="306" text-anchor="start" fill="#4B5563" font-size="9" font-weight="bold" font-family="sans-serif">100 млн чел.</text>
  <text x="340" y="330" text-anchor="middle" fill="#9CA3AF" font-size="9" font-weight="normal" font-family="sans-serif">Доля говорящих (%)</text>
  <text x="400" y="350" text-anchor="middle" fill="#047857" font-size="15" font-weight="bold" font-family="sans-serif">Мировые религии</text>
