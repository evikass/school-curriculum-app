<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="amberV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FB923C"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFFBEB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ADE80"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F87171"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60A5FA"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="12"/>
  <!-- Decorative top bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#amberGrad)" rx="2"/>
  <circle cx="40" cy="45" r="18" fill="#B45309" stroke="#F59E0B" stroke-width="2"/>
  <text x="40" y="51" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFBEB">7</text>
  <text x="68" y="52" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F59E0B" filter="url(#glow)">Сила тяжести и вес тела</text>
  <text x="68" y="70" font-family="Arial, sans-serif" font-size="13" fill="#FDE68A">F = mg, P = mg, свободное падение, масса vs вес</text>
  <line x1="20" y1="78" x2="780" y2="78" stroke="#92400E" stroke-width="1" stroke-dasharray="4,4"/>  <rect x="30" y="85" width="230" height="70" rx="8" fill="#292524" stroke="#F59E0B" stroke-width="2"/>
  <text x="145" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Сила тяжести</text>
  <text x="145" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FCD34D" filter="url(#glow)">F = m · g</text>  <rect x="280" y="85" width="230" height="70" rx="8" fill="#292524" stroke="#F59E0B" stroke-width="2"/>
  <text x="395" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Вес тела (покой)</text>
  <text x="395" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FCD34D" filter="url(#glow)">P = m · g</text>  <rect x="530" y="85" width="240" height="70" rx="8" fill="#292524" stroke="#F59E0B" stroke-width="2"/>
  <text x="650" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Ускорение свободного падения</text>
  <text x="650" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FCD34D" filter="url(#glow)">g = 9,8 Н/кг</text>
  <!-- Gravity force diagram -->
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Сила тяжести</text>
  <rect x="50" y="200" width="260" height="240" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <!-- Earth surface -->
  <line x1="55" y1="400" x2="305" y2="400" stroke="#92400E" stroke-width="2"/>
  <text x="150" y="425" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">Земля</text>
  <!-- Object -->
  <rect x="150" y="280" width="50" height="40" rx="5" fill="#B45309" stroke="#F59E0B" stroke-width="2"/>
  <text x="165" y="305" font-family="Arial, sans-serif" font-size="11" fill="#FFFBEB" text-anchor="middle">m</text>
  <!-- F gravity arrow -->
  <line x1="175" y1="320" x2="175" y2="390" stroke="#F87171" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="190" y="365" font-family="Arial, sans-serif" font-size="13" fill="#F87171" font-weight="bold">Fтяж</text>
  <!-- Earth center arrow -->
  <text x="120" y="390" font-family="Arial, sans-serif" font-size="10" fill="#92400E">↓ к центру Земли</text>

  <!-- Weight diagram -->
  <text x="370" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Вес тела на опоре</text>
  <rect x="340" y="200" width="210" height="240" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <!-- Table/surface -->
  <rect x="355" y="350" width="180" height="10" rx="2" fill="#92400E"/>
  <!-- Object on table -->
  <rect x="410" y="300" width="50" height="50" rx="5" fill="#B45309" stroke="#F59E0B" stroke-width="2"/>
  <text x="425" y="330" font-family="Arial, sans-serif" font-size="11" fill="#FFFBEB" text-anchor="middle">m</text>
  <!-- Weight arrow (down) -->
  <line x1="435" y1="350" x2="435" y2="395" stroke="#F87171" stroke-width="2.5" marker-end="url(#arrowRed)"/>
  <text x="450" y="380" font-family="Arial, sans-serif" font-size="11" fill="#F87171" font-weight="bold">P</text>
  <!-- Normal force arrow (up) -->
  <line x1="435" y1="300" x2="435" y2="250" stroke="#4ADE80" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="445" y="265" font-family="Arial, sans-serif" font-size="11" fill="#4ADE80" font-weight="bold">N</text>
  <!-- Label -->
  <text x="360" y="420" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">P = N (покой)</text>

  <!-- Mass vs Weight -->
  <text x="610" y="185" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Масса vs Вес</text>
  <rect x="570" y="200" width="210" height="240" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <!-- Mass icon (balance) -->
  <text x="675" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B">Масса (m)</text>
  <line x1="630" y1="245" x2="720" y2="245" stroke="#F59E0B" stroke-width="2"/>
  <line x1="675" y1="245" x2="675" y2="260" stroke="#F59E0B" stroke-width="2"/>
  <path d="M 640,260 L 660,275 L 650,275 L 640,260" fill="#B45309" stroke="#F59E0B" stroke-width="1"/>
  <path d="M 710,260 L 690,275 L 700,275 L 710,260" fill="#B45309" stroke="#F59E0B" stroke-width="1"/>
  <text x="675" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">Скаляр [кг]</text>
  <text x="675" y="308" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">Не зависит от места</text>
  <!-- Weight icon (spring) -->
  <text x="675" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FB923C">Вес (P)</text>
  <path d="M 665,345 L 670,350 L 660,355 L 670,360 L 660,365 L 670,370 L 665,375" fill="none" stroke="#FB923C" stroke-width="2"/>
  <rect x="655" y="378" width="30" height="20" rx="3" fill="#B45309" stroke="#FB923C" stroke-width="1.5"/>
  <text x="675" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">Вектор [Н]</text>
  <text x="675" y="433" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">Зависит от g</text>
  <rect x="30" y="450" width="250" height="130" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="40" y="468" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">Определения</text>
  <text x="40" y="480" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Fтяж — сила, с которой</text>
  <text x="40" y="497" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Земля притягивает тело.</text>
  <text x="40" y="514" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Направлена к центру Земли.</text>
  <text x="40" y="531" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="40" y="548" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">P — сила, с которой тело</text>
  <text x="40" y="565" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">действует на опору/подвес.</text>  <rect x="300" y="450" width="250" height="130" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="310" y="468" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">Расчёт</text>
  <text x="310" y="480" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Пример:</text>
  <text x="310" y="497" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">m = 10 кг</text>
  <text x="310" y="514" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">g = 9,8 Н/кг</text>
  <text x="310" y="531" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">F = P = 10 · 9,8 = 98 Н</text>
  <text x="310" y="548" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="310" y="565" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">На Луне g ≈ 1,6 Н/кг</text>  <rect x="570" y="450" width="210" height="130" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="580" y="468" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">Интересно</text>
  <text x="580" y="480" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Вес при движении:</text>
  <text x="580" y="497" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Лифт вверх: P &amp;gt; mg</text>
  <text x="580" y="514" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Лифт вниз: P &amp;lt; mg</text>
  <text x="580" y="531" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Невесомость: P = 0</text>
  <text x="580" y="548" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">  (свободное падение)</text>
</svg>