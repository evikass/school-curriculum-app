<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="amberV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FB923C"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFFBEB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ADE80"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F87171"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60A5FA"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="12"/>
  <!-- Decorative top bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#amberGrad)" rx="2"/>
  <circle cx="40" cy="45" r="18" fill="#B45309" stroke="#F59E0B" stroke-width="2"/>
  <text x="40" y="51" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFBEB">7</text>
  <text x="68" y="52" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F59E0B" filter="url(#glow)">Мощность</text>
  <text x="68" y="70" font-family="Arial, sans-serif" font-size="13" fill="#FDE68A">N = A/t, единицы (Вт), мощность vs работа, практические примеры</text>
  <line x1="20" y1="78" x2="780" y2="78" stroke="#92400E" stroke-width="1" stroke-dasharray="4,4"/>  <rect x="30" y="85" width="300" height="70" rx="8" fill="#292524" stroke="#F59E0B" stroke-width="2"/>
  <text x="180" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Мощность</text>
  <text x="180" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FCD34D" filter="url(#glow)">N = A / t</text>  <rect x="350" y="85" width="220" height="70" rx="8" fill="#292524" stroke="#F59E0B" stroke-width="2"/>
  <text x="460" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Единица — Ватт</text>
  <text x="460" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FCD34D" filter="url(#glow)">[N] = Вт = Дж/с</text>  <rect x="590" y="85" width="190" height="70" rx="8" fill="#292524" stroke="#F59E0B" stroke-width="2"/>
  <text x="685" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Мощность при движении</text>
  <text x="685" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FCD34D" filter="url(#glow)">N = F · v</text>
  <!-- Power comparison: two workers -->
  <text x="60" y="195" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Мощность: кто быстрее?</text>
  <rect x="30" y="205" width="480" height="180" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  
  <!-- Worker 1 (slow) -->
  <text x="120" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#22D3EE">Медленный</text>
  <!-- Person icon -->
  <circle cx="120" cy="250" r="8" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
  <line x1="120" y1="258" x2="120" y2="285" stroke="#22D3EE" stroke-width="1.5"/>
  <line x1="105" y1="268" x2="135" y2="268" stroke="#22D3EE" stroke-width="1.5"/>
  <line x1="120" y1="285" x2="108" y2="310" stroke="#22D3EE" stroke-width="1.5"/>
  <line x1="120" y1="285" x2="132" y2="310" stroke="#22D3EE" stroke-width="1.5"/>
  <!-- Box being carried -->
  <rect x="100" y="310" width="40" height="25" rx="3" fill="#B45309" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="120" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFBEB">A=500Дж</text>
  <text x="120" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#22D3EE">t = 50 с</text>
  <text x="120" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#22D3EE" font-weight="bold">N = 10 Вт</text>
  
  <!-- Worker 2 (fast) -->
  <text x="350" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F87171">Быстрый</text>
  <circle cx="350" cy="250" r="8" fill="none" stroke="#F87171" stroke-width="1.5"/>
  <line x1="350" y1="258" x2="350" y2="285" stroke="#F87171" stroke-width="1.5"/>
  <line x1="335" y1="268" x2="365" y2="268" stroke="#F87171" stroke-width="1.5"/>
  <line x1="350" y1="285" x2="338" y2="310" stroke="#F87171" stroke-width="1.5"/>
  <line x1="350" y1="285" x2="362" y2="310" stroke="#F87171" stroke-width="1.5"/>
  <rect x="330" y="310" width="40" height="25" rx="3" fill="#B45309" stroke="#F87171" stroke-width="1.5"/>
  <text x="350" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#FFFBEB">A=500Дж</text>
  <text x="350" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#F87171">t = 10 с</text>
  <text x="350" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F87171" font-weight="bold">N = 50 Вт</text>
  
  <!-- Comparison arrow -->
  <text x="235" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F59E0B">Та же A,</text>
  <text x="235" y="326" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#F59E0B">но N разная!</text>

  <!-- Power table -->
  <text x="560" y="195" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Мощность устройств</text>
  <rect x="530" y="205" width="250" height="180" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="550" y="228" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Человек: ~75 Вт</text>
  <rect x="545" y="233" width="75" height="6" rx="3" fill="#22D3EE"/>
  
  <text x="550" y="258" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Лампочка: 60-100 Вт</text>
  <rect x="545" y="263" width="100" height="6" rx="3" fill="#F59E0B"/>
  
  <text x="550" y="288" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Утюг: ~2000 Вт</text>
  <rect x="545" y="293" width="180" height="6" rx="3" fill="#FB923C"/>
  
  <text x="550" y="318" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Автомобиль: ~75 кВт</text>
  <rect x="545" y="323" width="220" height="6" rx="3" fill="#F87171"/>
  
  <text x="550" y="348" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Электровоз: ~5 МВт</text>
  <rect x="545" y="353" width="230" height="6" rx="3" fill="#F87171"/>
  <rect x="30" y="400" width="250" height="180" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="40" y="418" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">Определение</text>
  <text x="40" y="430" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Мощность N = A / t:</text>
  <text x="40" y="447" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">N — мощность [Вт]</text>
  <text x="40" y="464" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">A — работа [Дж]</text>
  <text x="40" y="481" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">t — время [с]</text>
  <text x="40" y="498" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="40" y="515" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">1 Вт = 1 Дж/с</text>
  <text x="40" y="532" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">1 кВт = 1000 Вт</text>
  <text x="40" y="549" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">1 МВт = 1 000 000 Вт</text>
  <text x="40" y="566" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>  <rect x="300" y="400" width="250" height="180" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="310" y="418" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">Расчёты</text>
  <text x="310" y="430" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Примеры расчётов:</text>
  <text x="310" y="447" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="310" y="464" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">1) A = 600 Дж, t = 30 с</text>
  <text x="310" y="481" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">   N = 600/30 = 20 Вт</text>
  <text x="310" y="498" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="310" y="515" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">2) N = 2 кВт, t = 10 с</text>
  <text x="310" y="532" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">   A = N·t = 2000·10</text>
  <text x="310" y="549" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">     = 20 000 Дж = 20 кДж</text>
  <text x="310" y="566" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>  <rect x="570" y="400" width="210" height="180" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="580" y="418" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">Сравнение</text>
  <text x="580" y="430" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Работа vs Мощность:</text>
  <text x="580" y="447" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="580" y="464" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Работа (A) — сколько</text>
  <text x="580" y="481" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">совершено (Дж).</text>
  <text x="580" y="498" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="580" y="515" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Мощность (N) — как</text>
  <text x="580" y="532" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">быстро совершено (Вт).</text>
  <text x="580" y="549" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="580" y="566" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">A = N · t</text>
</svg>