<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="amberV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FB923C"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FFFBEB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ADE80"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F87171"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60A5FA"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="12"/>
  <!-- Decorative top bar -->
  <rect x="0" y="0" width="800" height="4" fill="url(#amberGrad)" rx="2"/>
  <circle cx="40" cy="45" r="18" fill="#B45309" stroke="#F59E0B" stroke-width="2"/>
  <text x="40" y="51" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFBEB">7</text>
  <text x="68" y="52" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#F59E0B" filter="url(#glow)">Давление и его единицы</text>
  <text x="68" y="70" font-family="Arial, sans-serif" font-size="13" fill="#FDE68A">p = F/S, единицы (Па), увеличение/уменьшение давления</text>
  <line x1="20" y1="78" x2="780" y2="78" stroke="#92400E" stroke-width="1" stroke-dasharray="4,4"/>  <rect x="30" y="85" width="350" height="80" rx="8" fill="#292524" stroke="#F59E0B" stroke-width="2"/>
  <text x="205" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Давление</text>
  <text x="205" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#FCD34D" filter="url(#glow)">p = F / S</text>  <rect x="400" y="85" width="380" height="80" rx="8" fill="#292524" stroke="#F59E0B" stroke-width="2"/>
  <text x="590" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FDE68A">Единица давления — Паскаль</text>
  <text x="590" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FCD34D" filter="url(#glow)">[p] = Па = Н/м²</text>
  <!-- Pressure comparison diagram -->
  <text x="60" y="200" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Одинаковая сила — разное давление</text>
  <rect x="30" y="210" width="480" height="200" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  
  <!-- Small area → high pressure -->
  <text x="100" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F87171">Малая площадь</text>
  <text x="100" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#F87171">→ Большое давление</text>
  <!-- Sharp object -->
  <polygon points="90,265 110,265 105,330 95,330" fill="#B45309" stroke="#F87171" stroke-width="2"/>
  <line x1="100" y1="265" x2="100" y2="235" stroke="#FB923C" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="120" y="340" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">F=10Н, S=0,001м²</text>
  <text x="120" y="355" font-family="Arial, sans-serif" font-size="10" fill="#F87171" font-weight="bold">p = 10 000 Па</text>
  <!-- Surface -->
  <line x1="55" y1="330" x2="155" y2="330" stroke="#92400E" stroke-width="3"/>
  
  <!-- Large area → low pressure -->
  <text x="330" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4ADE80">Большая площадь</text>
  <text x="330" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#4ADE80">→ Малое давление</text>
  <!-- Wide object -->
  <rect x="290" y="265" width="80" height="60" rx="3" fill="#B45309" stroke="#4ADE80" stroke-width="2"/>
  <line x1="330" y1="265" x2="330" y2="235" stroke="#FB923C" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="340" y="340" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">F=10Н, S=0,1м²</text>
  <text x="340" y="355" font-family="Arial, sans-serif" font-size="10" fill="#4ADE80" font-weight="bold">p = 100 Па</text>
  <!-- Surface -->
  <line x1="260" y1="325" x2="420" y2="325" stroke="#92400E" stroke-width="3"/>

  <!-- Examples -->
  <text x="560" y="200" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Примеры давления</text>
  <rect x="530" y="210" width="250" height="200" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  
  <!-- Knife (increase pressure) -->
  <text x="550" y="235" font-family="Arial, sans-serif" font-size="11" fill="#FB923C">Увеличение давления:</text>
  <path d="M 560,250 L 620,250 L 620,280 L 560,280 Z" fill="none" stroke="#FB923C" stroke-width="1.5"/>
  <polygon points="575,280 605,280 600,310 580,310" fill="#B45309" stroke="#F87171" stroke-width="1.5"/>
  <text x="630" y="300" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">Нож — острый</text>
  <text x="630" y="313" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">край (малая S)</text>
  
  <!-- Snowshoes (decrease pressure) -->
  <text x="550" y="345" font-family="Arial, sans-serif" font-size="11" fill="#FB923C">Уменьшение давления:</text>
  <rect x="560" y="355" width="50" height="8" rx="2" fill="#B45309" stroke="#4ADE80" stroke-width="1.5"/>
  <rect x="555" y="363" width="60" height="5" rx="2" fill="#92400E" stroke="#4ADE80" stroke-width="1"/>
  <text x="630" y="365" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">Лыжи — широкие</text>
  <text x="630" y="378" font-family="Arial, sans-serif" font-size="10" fill="#FDE68A">(большая S)</text>
  <rect x="30" y="425" width="250" height="155" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="40" y="443" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">Формула и единицы</text>
  <text x="40" y="455" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Давление p = F / S:</text>
  <text x="40" y="472" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">F — сила, действующая на</text>
  <text x="40" y="489" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">  поверхность [Н]</text>
  <text x="40" y="506" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">S — площадь поверхности [м²]</text>
  <text x="40" y="523" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="40" y="540" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">1 Па = 1 Н/м²</text>
  <text x="40" y="557" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">1 кПа = 1000 Па</text>
  <text x="40" y="574" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">1 гПа = 100 Па</text>  <rect x="300" y="425" width="250" height="155" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="310" y="443" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">Управление давлением</text>
  <text x="310" y="455" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Как увеличить давление:</text>
  <text x="310" y="472" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Увеличить силу F</text>
  <text x="310" y="489" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Уменьшить площадь S</text>
  <text x="310" y="506" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">  (заточить, заострить)</text>
  <text x="310" y="523" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7"></text>
  <text x="310" y="540" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Как уменьшить давление:</text>
  <text x="310" y="557" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Уменьшить силу F</text>
  <text x="310" y="574" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Увеличить площадь S</text>  <rect x="570" y="425" width="210" height="155" rx="6" fill="#292524" stroke="#44403C" stroke-width="1"/>
  <text x="580" y="443" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">Практика</text>
  <text x="580" y="455" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">Примеры:</text>
  <text x="580" y="472" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Гвоздь: острый конец</text>
  <text x="580" y="489" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">  p очень большое</text>
  <text x="580" y="506" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Фундамент: широкое</text>
  <text x="580" y="523" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">  основание, p мало</text>
  <text x="580" y="540" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Танк: гусеницы,</text>
  <text x="580" y="557" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">  p = 40-50 кПа</text>
  <text x="580" y="574" font-family="Arial, sans-serif" font-size="11" fill="#FEF3C7">• Человек: p ≈ 20 кПа</text>
</svg>