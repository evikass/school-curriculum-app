  <text x="138" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Классические ходы</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Попеременный двухшажный</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Попеременный четырёхшажный</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Одновременный бесшажный</text>
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Одновременный одношажный</text>
  <text x="26" y="172" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Одновременный двухшажный</text>
