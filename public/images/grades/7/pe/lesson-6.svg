  <text x="281" y="277" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Толчок двумя палками сразу</text>
  <text x="281" y="292" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Ноги не отталкиваются</text>
  <text x="281" y="307" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Наклон туловища вперёд</text>
  <text x="281" y="322" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Только при хорошем скольжении</text>
