  <text x="536" y="277" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• «Полуёлочкой» — косой подъём</text>
  <text x="536" y="292" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• «Ёлочкой» — прямо в гору</text>
  <text x="536" y="307" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• «Лесенкой» — крутой подъём</text>
  <text x="536" y="322" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Спуск в основной стойке</text>
