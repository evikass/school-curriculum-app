  <text x="281" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Полуконьковый ход</text>
  <text x="281" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Коньковый без палок</text>
  <text x="281" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Коньковый одновременный</text>
  <text x="281" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Коньковый попеременный</text>
  <text x="281" y="172" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Перекрёстный (двухшажный)</text>
