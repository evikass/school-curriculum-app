  <text x="655" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Выбор хода</text>
  <text x="536" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Классика — лыжня, равнина</text>
  <text x="536" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Конёк — без лыжни, подъём</text>
  <text x="536" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Бесшажный — хороший скольз.</text>
  <text x="536" y="157" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Попеременный — подъём в гору</text>
  <text x="536" y="172" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Одношажный — ускорение</text>
