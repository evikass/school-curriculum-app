  <text x="26" y="292" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Левая нога + правая палка</text>
  <text x="26" y="307" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Скользящий шаг — основа</text>
  <text x="26" y="322" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Толчок ногой назад-вверх</text>
