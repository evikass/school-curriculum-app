  <text x="138" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#FFF">Ведение мяча (дриблинг)</text>
  <text x="26" y="112" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Пальцы, не ладонь!</text>
  <text x="26" y="127" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Высота отскока: до пояса</text>
  <text x="26" y="142" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Взгляд — вперёд, не на мяч</text>
