  <text x="26" y="257" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Разыгрывающий (1) — плеймейкер</text>
  <text x="26" y="272" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Атакующий защитник (2)</text>
  <text x="26" y="287" font-family="Arial,sans-serif" font-size="10.5" fill="#166534">• Лёгкий форвард (3)</text>
