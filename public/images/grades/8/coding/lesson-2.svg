  <polygon points="70,548 67.0,542.0 73.0,542.0" fill="#10B981" />
  <rect x="30" y="550" width="80" height="25" rx="8" fill="#1E293B" filter="url(#shadow)" />
  <text x="70" y="567" fill="#CBD5E1" font-size="11" font-weight="normal" text-anchor="middle">15</text>
  <rect x="150" y="505" width="100" height="28" rx="8" fill="#3B82F6" filter="url(#shadow)" />
  <text x="200" y="524" fill="white" font-size="12" font-weight="bold" text-anchor="middle">height</text>
  <line x1="200" y1="533" x2="200" y2="548" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrowhead)" />
  <polygon points="200,548 197.0,542.0 203.0,542.0" fill="#3B82F6" />
  <rect x="160" y="550" width="80" height="25" rx="8" fill="#1E293B" filter="url(#shadow)" />
  <text x="200" y="567" fill="#CBD5E1" font-size="11" font-weight="normal" text-anchor="middle">1.72</text>
  <rect x="280" y="505" width="100" height="28" rx="8" fill="#F59E0B" filter="url(#shadow)" />
  <text x="330" y="524" fill="white" font-size="12" font-weight="bold" text-anchor="middle">name</text>
  <line x1="330" y1="533" x2="330" y2="548" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowhead)" />
  <polygon points="330,548 327.0,542.0 333.0,542.0" fill="#F59E0B" />
  <rect x="290" y="550" width="80" height="25" rx="8" fill="#1E293B" filter="url(#shadow)" />
  <text x="330" y="567" fill="#CBD5E1" font-size="11" font-weight="normal" text-anchor="middle">&amp;quot;Алиса&amp;quot;</text>
  <rect x="0" y="582" width="800" height="18" fill="#334155" rx="0" />
  <text x="400" y="595" fill="#94A3B8" font-size="10" text-anchor="middle">8 класс • Кодирование • Python</text>
