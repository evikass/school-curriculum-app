  <circle cx="45" cy="35" r="25" fill="#1E293B" stroke="#34D399" stroke-width="2" />
  <text x="45" y="42" fill="#34D399" font-size="20" font-weight="bold" text-anchor="middle" font-family="monospace">2</text>
  <text x="85" y="32" fill="white" font-size="22" font-weight="bold">Переменные и типы данных</text>
  <text x="85" y="54" fill="#CBD5E1" font-size="14">int, float, str, bool — правила именования</text>
  <circle cx="760" cy="35" r="20" fill="#1E293B" stroke="#10B981" stroke-width="1.5" />
  <text x="760" y="42" fill="#10B981" font-size="18" font-weight="bold" text-anchor="middle" font-family="monospace">Py</text>
  <rect x="20" y="85" width="370" height="240" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="85" width="370" height="28" rx="8" fill="#334155" />
  <rect x="20" y="105" width="370" height="8" fill="#334155" />
  <circle cx="36" cy="99" r="5" fill="#EF4444" />
  <circle cx="56" cy="99" r="5" fill="#FBBF24" />
  <circle cx="76" cy="99" r="5" fill="#10B981" />
  <text x="205" y="104" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Переменные в Python</text>
  <text x="34" y="129" fill="#64748B" font-size="13" font-family="monospace"># Объявление переменных</text>
  <text x="34" y="149" fill="#E2E8F0" font-size="13" font-family="monospace">age = </text>
  <text x="80.8" y="149" fill="#C084FC" font-size="13" font-family="monospace">15</text>
  <text x="34" y="169" fill="#E2E8F0" font-size="13" font-family="monospace">height = </text>
  <text x="104.2" y="169" fill="#C084FC" font-size="13" font-family="monospace">1.72</text>
  <text x="34" y="189" fill="#E2E8F0" font-size="13" font-family="monospace">name = </text>
  <text x="88.6" y="189" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Алиса&amp;quot;</text>
  <text x="34" y="209" fill="#E2E8F0" font-size="13" font-family="monospace">is_student = </text>
  <text x="135.39999999999998" y="209" fill="#10B981" font-size="13" font-family="monospace">True</text>
  <text x="34" y="229" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="249" fill="#38BDF8" font-size="13" font-family="monospace">type</text>
  <text x="65.2" y="249" fill="#E2E8F0" font-size="13" font-family="monospace">(age)      </text>
  <text x="151.0" y="249" fill="#64748B" font-size="13" font-family="monospace"># </text>
  <text x="166.6" y="249" fill="#64748B" font-size="13" font-family="monospace">&amp;lt;class &amp;apos;int&amp;apos;&amp;gt;</text>
  <text x="34" y="269" fill="#38BDF8" font-size="13" font-family="monospace">type</text>
  <text x="65.2" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">(height)   </text>
  <text x="151.0" y="269" fill="#64748B" font-size="13" font-family="monospace"># </text>
  <text x="166.6" y="269" fill="#64748B" font-size="13" font-family="monospace">&amp;lt;class &amp;apos;float&amp;apos;&amp;gt;</text>
  <text x="34" y="289" fill="#38BDF8" font-size="13" font-family="monospace">type</text>
  <text x="65.2" y="289" fill="#E2E8F0" font-size="13" font-family="monospace">(name)     </text>
  <text x="151.0" y="289" fill="#64748B" font-size="13" font-family="monospace"># </text>
  <text x="166.6" y="289" fill="#64748B" font-size="13" font-family="monospace">&amp;lt;class &amp;apos;str&amp;apos;&amp;gt;</text>
  <text x="34" y="309" fill="#38BDF8" font-size="13" font-family="monospace">type</text>
  <text x="65.2" y="309" fill="#E2E8F0" font-size="13" font-family="monospace">(is_student)</text>
  <text x="158.8" y="309" fill="#64748B" font-size="13" font-family="monospace"># </text>
  <text x="174.4" y="309" fill="#64748B" font-size="13" font-family="monospace">&amp;lt;class &amp;apos;bool&amp;apos;&amp;gt;</text>
  <text x="34" y="329" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="349" fill="#64748B" font-size="13" font-family="monospace"># Динамическая типизация</text>
  <text x="34" y="369" fill="#E2E8F0" font-size="13" font-family="monospace">x = </text>
  <text x="65.2" y="369" fill="#C084FC" font-size="13" font-family="monospace">10</text>
  <text x="80.8" y="369" fill="#64748B" font-size="13" font-family="monospace">        # int</text>
  <text x="34" y="389" fill="#E2E8F0" font-size="13" font-family="monospace">x = </text>
  <text x="65.2" y="389" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;текст&amp;quot;</text>
  <text x="119.80000000000001" y="389" fill="#64748B" font-size="13" font-family="monospace">   # str — можно!</text>
  <rect x="410" y="85" width="370" height="52" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="2" />
  <rect x="410" y="85" width="80" height="52" rx="8" fill="#10B981" />
  <rect x="460" y="85" width="30" height="52" fill="#10B981" />
  <text x="425" y="118" fill="white" font-size="16" font-weight="bold">int</text>
  <text x="500" y="107" fill="#F8FAFC" font-size="13" font-weight="bold">Целые числа</text>
  <text x="500" y="125" fill="#94A3B8" font-size="11" font-weight="normal">-5, 0, 42, 1000</text>
  <rect x="410" y="147" width="370" height="52" rx="8" fill="#0F172A" stroke="#3B82F6" stroke-width="2" />
  <rect x="410" y="147" width="80" height="52" rx="8" fill="#3B82F6" />
  <rect x="460" y="147" width="30" height="52" fill="#3B82F6" />
  <text x="425" y="180" fill="white" font-size="16" font-weight="bold">float</text>
  <text x="500" y="169" fill="#F8FAFC" font-size="13" font-weight="bold">Дробные числа</text>
  <text x="500" y="187" fill="#94A3B8" font-size="11" font-weight="normal">3.14, -0.5, 2.0</text>
  <rect x="410" y="209" width="370" height="52" rx="8" fill="#0F172A" stroke="#F59E0B" stroke-width="2" />
  <rect x="410" y="209" width="80" height="52" rx="8" fill="#F59E0B" />
  <rect x="460" y="209" width="30" height="52" fill="#F59E0B" />
  <text x="425" y="242" fill="white" font-size="16" font-weight="bold">str</text>
  <text x="500" y="231" fill="#F8FAFC" font-size="13" font-weight="bold">Строки (текст)</text>
  <text x="500" y="249" fill="#94A3B8" font-size="11" font-weight="normal">&amp;apos;Привет&amp;apos;, &amp;quot;мир&amp;quot;</text>
  <rect x="410" y="271" width="370" height="52" rx="8" fill="#0F172A" stroke="#8B5CF6" stroke-width="2" />
  <rect x="410" y="271" width="80" height="52" rx="8" fill="#8B5CF6" />
  <rect x="460" y="271" width="30" height="52" fill="#8B5CF6" />
  <text x="425" y="304" fill="white" font-size="16" font-weight="bold">bool</text>
  <text x="500" y="293" fill="#F8FAFC" font-size="13" font-weight="bold">Логический</text>
  <text x="500" y="311" fill="#94A3B8" font-size="11" font-weight="normal">True, False</text>
  <rect x="20" y="340" width="370" height="130" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#shadow)" />
  <rect x="20" y="340" width="4" height="130" rx="2" fill="#10B981" />
  <text x="36" y="362" fill="#10B981" font-size="14" font-weight="bold">Правила именования переменных</text>
  <text x="36" y="380" fill="#CBD5E1" font-size="12">• Начинается с буквы или _</text>
  <text x="36" y="398" fill="#CBD5E1" font-size="12">• Может содержать буквы, цифры, _</text>
  <text x="36" y="416" fill="#CBD5E1" font-size="12">• Нельзя: my-var, 2name, class</text>
  <text x="36" y="434" fill="#CBD5E1" font-size="12">• Регистрочувствительные: Age != age</text>
  <text x="36" y="452" fill="#CBD5E1" font-size="12">• Стиль: snake_case (my_variable)</text>
  <rect x="410" y="340" width="370" height="130" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="410" y="340" width="370" height="28" rx="8" fill="#334155" />
  <rect x="410" y="360" width="370" height="8" fill="#334155" />
  <circle cx="426" cy="354" r="5" fill="#EF4444" />
  <circle cx="446" cy="354" r="5" fill="#FBBF24" />
  <circle cx="466" cy="354" r="5" fill="#10B981" />
  <text x="595" y="359" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Преобразование типов</text>
  <text x="424" y="384" fill="#64748B" font-size="13" font-family="monospace"># Преобразование типов</text>
  <text x="424" y="404" fill="#E2E8F0" font-size="13" font-family="monospace">x = </text>
  <text x="455.2" y="404" fill="#38BDF8" font-size="13" font-family="monospace">int</text>
  <text x="478.59999999999997" y="404" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="486.4" y="404" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;42&amp;quot;</text>
  <text x="517.6" y="404" fill="#64748B" font-size="13" font-family="monospace">)   # 42</text>
  <text x="424" y="424" fill="#E2E8F0" font-size="13" font-family="monospace">y = </text>
  <text x="455.2" y="424" fill="#38BDF8" font-size="13" font-family="monospace">float</text>
  <text x="494.2" y="424" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="502.0" y="424" fill="#C084FC" font-size="13" font-family="monospace">3</text>
  <text x="509.8" y="424" fill="#64748B" font-size="13" font-family="monospace">)     # 3.0</text>
  <text x="424" y="444" fill="#E2E8F0" font-size="13" font-family="monospace">z = </text>
  <text x="455.2" y="444" fill="#38BDF8" font-size="13" font-family="monospace">str</text>
  <text x="478.59999999999997" y="444" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="486.4" y="444" fill="#C084FC" font-size="13" font-family="monospace">100</text>
  <text x="509.79999999999995" y="444" fill="#64748B" font-size="13" font-family="monospace">)    # &amp;apos;100&amp;apos;</text>
  <text x="424" y="464" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="424" y="484" fill="#E2E8F0" font-size="13" font-family="monospace">age_str = </text>
  <text x="502.0" y="484" fill="#38BDF8" font-size="13" font-family="monospace">input</text>
  <text x="541.0" y="484" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="548.8" y="484" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Возраст: &amp;quot;</text>
  <text x="634.5999999999999" y="484" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="424" y="504" fill="#E2E8F0" font-size="13" font-family="monospace">age = </text>
  <text x="470.8" y="504" fill="#38BDF8" font-size="13" font-family="monospace">int</text>
  <text x="494.2" y="504" fill="#E2E8F0" font-size="13" font-family="monospace">(age_str)</text>
  <text x="20" y="490" fill="#34D399" font-size="14" font-weight="bold">Модель памяти:</text>
  <rect x="20" y="505" width="100" height="28" rx="8" fill="#10B981" filter="url(#shadow)" />
  <text x="70" y="524" fill="white" font-size="12" font-weight="bold" text-anchor="middle">age</text>
