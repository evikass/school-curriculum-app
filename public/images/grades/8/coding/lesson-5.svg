  <text x="210" y="309" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">break и continue</text>
  <text x="34" y="334" fill="#64748B" font-size="13" font-family="monospace"># break — выход из цикла</text>
  <text x="34" y="354" fill="#10B981" font-size="13" font-family="monospace">for</text>
  <text x="57.4" y="354" fill="#E2E8F0" font-size="13" font-family="monospace"> i </text>
  <text x="80.8" y="354" fill="#10B981" font-size="13" font-family="monospace">in</text>
  <text x="96.39999999999999" y="354" fill="#38BDF8" font-size="13" font-family="monospace"> range</text>
  <text x="143.2" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">(100):</text>
  <text x="34" y="374" fill="#10B981" font-size="13" font-family="monospace">    if</text>
  <text x="80.8" y="374" fill="#E2E8F0" font-size="13" font-family="monospace"> i == </text>
  <text x="127.6" y="374" fill="#C084FC" font-size="13" font-family="monospace">5</text>
  <text x="135.4" y="374" fill="#E2E8F0" font-size="13" font-family="monospace">:</text>
  <text x="34" y="394" fill="#10B981" font-size="13" font-family="monospace">        break</text>
  <text x="135.39999999999998" y="394" fill="#64748B" font-size="13" font-family="monospace">  # выход</text>
  <text x="34" y="414" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="434" fill="#64748B" font-size="13" font-family="monospace"># continue — пропуск итерации</text>
  <text x="34" y="454" fill="#10B981" font-size="13" font-family="monospace">for</text>
  <text x="57.4" y="454" fill="#E2E8F0" font-size="13" font-family="monospace"> i </text>
  <text x="80.8" y="454" fill="#10B981" font-size="13" font-family="monospace">in</text>
  <text x="96.39999999999999" y="454" fill="#38BDF8" font-size="13" font-family="monospace"> range</text>
  <text x="143.2" y="454" fill="#E2E8F0" font-size="13" font-family="monospace">(10):</text>
  <text x="34" y="474" fill="#10B981" font-size="13" font-family="monospace">    if</text>
  <text x="80.8" y="474" fill="#E2E8F0" font-size="13" font-family="monospace"> i % </text>
  <text x="119.8" y="474" fill="#C084FC" font-size="13" font-family="monospace">2</text>
  <text x="127.6" y="474" fill="#E2E8F0" font-size="13" font-family="monospace"> == </text>
  <text x="158.79999999999998" y="474" fill="#C084FC" font-size="13" font-family="monospace">0</text>
  <text x="166.6" y="474" fill="#E2E8F0" font-size="13" font-family="monospace">:</text>
  <text x="34" y="494" fill="#10B981" font-size="13" font-family="monospace">        continue</text>
  <text x="158.8" y="494" fill="#64748B" font-size="13" font-family="monospace">  # чётные пропускаем</text>
