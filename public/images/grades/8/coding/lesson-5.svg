  <text x="158.8" y="209" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="174.4" y="209" fill="#C084FC" font-size="13" font-family="monospace">6</text>
  <text x="182.20000000000002" y="209" fill="#E2E8F0" font-size="13" font-family="monospace">):</text>
  <text x="34" y="229" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="104.2" y="229" fill="#E2E8F0" font-size="13" font-family="monospace">(i)  </text>
  <text x="143.2" y="229" fill="#64748B" font-size="13" font-family="monospace"># 1 2 3 4 5</text>
  <text x="34" y="249" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="269" fill="#10B981" font-size="13" font-family="monospace">for</text>
  <text x="57.4" y="269" fill="#E2E8F0" font-size="13" font-family="monospace"> i </text>
  <text x="80.8" y="269" fill="#10B981" font-size="13" font-family="monospace">in</text>
  <text x="96.39999999999999" y="269" fill="#38BDF8" font-size="13" font-family="monospace"> range</text>
  <text x="143.2" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="151.0" y="269" fill="#C084FC" font-size="13" font-family="monospace">0</text>
  <text x="158.8" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="174.4" y="269" fill="#C084FC" font-size="13" font-family="monospace">10</text>
  <text x="190.0" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
