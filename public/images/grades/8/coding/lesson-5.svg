  <text x="210" y="464" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Практический пример</text>
  <text x="34" y="489" fill="#64748B" font-size="13" font-family="monospace"># Сумма чисел от 1 до N</text>
  <text x="34" y="509" fill="#E2E8F0" font-size="13" font-family="monospace">n = </text>
  <text x="65.2" y="509" fill="#38BDF8" font-size="13" font-family="monospace">int</text>
  <text x="88.6" y="509" fill="#E2E8F0" font-size="13" font-family="monospace">(input</text>
  <text x="135.39999999999998" y="509" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="143.2" y="509" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;N: &amp;quot;</text>
  <text x="182.2" y="509" fill="#E2E8F0" font-size="13" font-family="monospace">))</text>
  <text x="34" y="529" fill="#E2E8F0" font-size="13" font-family="monospace">total = </text>
  <text x="96.4" y="529" fill="#C084FC" font-size="13" font-family="monospace">0</text>
  <text x="34" y="549" fill="#10B981" font-size="13" font-family="monospace">for</text>
  <text x="57.4" y="549" fill="#E2E8F0" font-size="13" font-family="monospace"> i </text>
  <text x="80.8" y="549" fill="#10B981" font-size="13" font-family="monospace">in</text>
  <text x="96.39999999999999" y="549" fill="#38BDF8" font-size="13" font-family="monospace"> range</text>
  <text x="143.2" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="151.0" y="549" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="158.8" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">, n+</text>
  <text x="190.0" y="549" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="197.8" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">):</text>
  <text x="34" y="569" fill="#E2E8F0" font-size="13" font-family="monospace">    total += i</text>
  <text x="34" y="589" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="589" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="80.8" y="589" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Сумма:&amp;quot;</text>
  <text x="143.2" y="589" fill="#E2E8F0" font-size="13" font-family="monospace">, total)</text>
