  <text x="213.4" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">):</text>
  <text x="34" y="289" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="104.2" y="289" fill="#E2E8F0" font-size="13" font-family="monospace">(i)  </text>
