  <text x="434" y="284" fill="#64748B" font-size="13" font-family="monospace"># Итерация по строке</text>
  <text x="434" y="304" fill="#E2E8F0" font-size="13" font-family="monospace">word = </text>
  <text x="488.6" y="304" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Привет&amp;quot;</text>
