  <text x="436" y="107" fill="#10B981" font-size="14" font-weight="bold">range(старт, стоп, шаг)</text>
  <text x="436" y="125" fill="#CBD5E1" font-size="12">• range(5)        → 0,1,2,3,4</text>
  <text x="436" y="143" fill="#CBD5E1" font-size="12">• range(1,6)      → 1,2,3,4,5</text>
  <text x="436" y="161" fill="#CBD5E1" font-size="12">• range(0,10,2)   → 0,2,4,6,8</text>
  <text x="436" y="179" fill="#CBD5E1" font-size="12">• range(5,0,-1)   → 5,4,3,2,1</text>
  <text x="436" y="197" fill="#CBD5E1" font-size="12">• Стоп не включается!</text>
