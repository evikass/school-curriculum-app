  <text x="457.4" y="324" fill="#E2E8F0" font-size="13" font-family="monospace"> ch </text>
  <text x="488.59999999999997" y="324" fill="#10B981" font-size="13" font-family="monospace">in</text>
  <text x="504.2" y="324" fill="#E2E8F0" font-size="13" font-family="monospace"> word:</text>
  <text x="434" y="344" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="504.2" y="344" fill="#E2E8F0" font-size="13" font-family="monospace">(ch)  </text>
  <text x="551.0" y="344" fill="#64748B" font-size="13" font-family="monospace"># П р и в е т</text>
