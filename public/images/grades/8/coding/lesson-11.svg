  <text x="595" y="104" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Чтение из файла</text>
  <text x="424" y="129" fill="#64748B" font-size="13" font-family="monospace"># Чтение файла</text>
  <text x="424" y="149" fill="#10B981" font-size="13" font-family="monospace">with</text>
  <text x="455.2" y="149" fill="#38BDF8" font-size="13" font-family="monospace"> open</text>
  <text x="494.2" y="149" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="502.0" y="149" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;data.txt&amp;quot;</text>
  <text x="580.0" y="149" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="595.6" y="149" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;r&amp;quot;</text>
  <text x="619.0" y="149" fill="#E2E8F0" font-size="13" font-family="monospace">) </text>
  <text x="634.6" y="149" fill="#10B981" font-size="13" font-family="monospace">as</text>
  <text x="650.2" y="149" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="424" y="169" fill="#E2E8F0" font-size="13" font-family="monospace">    content = f.read</text>
  <text x="580.0" y="169" fill="#E2E8F0" font-size="13" font-family="monospace">()  </text>
  <text x="611.2" y="169" fill="#64748B" font-size="13" font-family="monospace"># весь файл</text>
  <text x="424" y="189" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="424" y="209" fill="#64748B" font-size="13" font-family="monospace"># Построчное чтение</text>
  <text x="424" y="229" fill="#10B981" font-size="13" font-family="monospace">with</text>
  <text x="455.2" y="229" fill="#38BDF8" font-size="13" font-family="monospace"> open</text>
  <text x="494.2" y="229" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="502.0" y="229" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;data.txt&amp;quot;</text>
  <text x="580.0" y="229" fill="#E2E8F0" font-size="13" font-family="monospace">) </text>
  <text x="595.6" y="229" fill="#10B981" font-size="13" font-family="monospace">as</text>
  <text x="611.2" y="229" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="424" y="249" fill="#10B981" font-size="13" font-family="monospace">    for</text>
  <text x="478.6" y="249" fill="#E2E8F0" font-size="13" font-family="monospace"> line </text>
  <text x="525.4" y="249" fill="#10B981" font-size="13" font-family="monospace">in</text>
  <text x="541.0" y="249" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="424" y="269" fill="#38BDF8" font-size="13" font-family="monospace">        print</text>
  <text x="525.4" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">(line.strip</text>
  <text x="611.1999999999999" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">())</text>
  <text x="424" y="289" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="424" y="309" fill="#E2E8F0" font-size="13" font-family="monospace">lines = f.readlines</text>
  <text x="572.2" y="309" fill="#E2E8F0" font-size="13" font-family="monospace">()  </text>
  <text x="603.4000000000001" y="309" fill="#64748B" font-size="13" font-family="monospace"># список строк</text>
  <text x="410" y="275" fill="#34D399" font-size="13" font-weight="bold">Жизненный цикл файла:</text>
  <rect x="420" y="290" width="110" height="35" rx="8" fill="#10B981" filter="url(#shadow)" />
  <text x="475" y="312" fill="white" font-size="11" font-weight="bold" text-anchor="middle">open()</text>
  <text x="420" y="338" fill="#CBD5E1" font-size="9" font-weight="normal">Открыть файл</text>
  <line x1="530" y1="307" x2="545" y2="307" stroke="#34D399" stroke-width="2" marker-end="url(#arrowhead)" />
  <polygon points="545,307 539.0,310.0 539.0,304.0" fill="#34D399" />
  <rect x="545" y="290" width="110" height="35" rx="8" fill="#3B82F6" filter="url(#shadow)" />
  <text x="600" y="312" fill="white" font-size="11" font-weight="bold" text-anchor="middle">read/write</text>
  <text x="545" y="338" fill="#CBD5E1" font-size="9" font-weight="normal">Работать с данными</text>
  <line x1="655" y1="307" x2="670" y2="307" stroke="#34D399" stroke-width="2" marker-end="url(#arrowhead)" />
  <polygon points="670,307 664.0,310.0 664.0,304.0" fill="#34D399" />
  <rect x="670" y="290" width="110" height="35" rx="8" fill="#F59E0B" filter="url(#shadow)" />
  <text x="725" y="312" fill="white" font-size="11" font-weight="bold" text-anchor="middle">close()</text>
  <text x="670" y="338" fill="#CBD5E1" font-size="9" font-weight="normal">Закрыть файл</text>
  <rect x="410" y="355" width="370" height="80" rx="8" fill="#0F172A" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)" />
  <rect x="410" y="355" width="4" height="80" rx="2" fill="#14B8A6" />
  <text x="426" y="377" fill="#14B8A6" font-size="14" font-weight="bold">Конструкция with</text>
  <text x="426" y="395" fill="#CBD5E1" font-size="12">• Автоматически закрывает файл!</text>
  <text x="426" y="413" fill="#CBD5E1" font-size="12">• with open(&amp;apos;f.txt&amp;apos;) as f:</text>
  <text x="426" y="431" fill="#CBD5E1" font-size="12">•     # даже при ошибке файл закроется</text>
  <text x="426" y="449" fill="#CBD5E1" font-size="12">• Лучше всегда использовать with</text>
  <rect x="20" y="415" width="380" height="160" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="415" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="435" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="429" r="5" fill="#EF4444" />
  <circle cx="56" cy="429" r="5" fill="#FBBF24" />
  <circle cx="76" cy="429" r="5" fill="#10B981" />
  <text x="210" y="434" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Практический пример</text>
  <text x="34" y="459" fill="#64748B" font-size="13" font-family="monospace"># Практика: подсчёт строк</text>
  <text x="34" y="479" fill="#10B981" font-size="13" font-family="monospace">def</text>
  <text x="57.4" y="479" fill="#60A5FA" font-size="13" font-family="monospace"> count_lines</text>
  <text x="151.0" y="479" fill="#E2E8F0" font-size="13" font-family="monospace">(filename):</text>
  <text x="34" y="499" fill="#10B981" font-size="13" font-family="monospace">    with</text>
  <text x="96.4" y="499" fill="#38BDF8" font-size="13" font-family="monospace"> open</text>
  <text x="135.4" y="499" fill="#E2E8F0" font-size="13" font-family="monospace">(filename) </text>
  <text x="221.2" y="499" fill="#10B981" font-size="13" font-family="monospace">as</text>
  <text x="236.79999999999998" y="499" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="34" y="519" fill="#E2E8F0" font-size="13" font-family="monospace">        count = </text>
  <text x="158.8" y="519" fill="#C084FC" font-size="13" font-family="monospace">0</text>
  <text x="34" y="539" fill="#10B981" font-size="13" font-family="monospace">        for</text>
  <text x="119.8" y="539" fill="#E2E8F0" font-size="13" font-family="monospace"> line </text>
  <text x="166.6" y="539" fill="#10B981" font-size="13" font-family="monospace">in</text>
  <text x="182.2" y="539" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="34" y="559" fill="#E2E8F0" font-size="13" font-family="monospace">            count += </text>
  <text x="197.79999999999998" y="559" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="34" y="579" fill="#10B981" font-size="13" font-family="monospace">    return</text>
  <text x="112.0" y="579" fill="#E2E8F0" font-size="13" font-family="monospace"> count</text>
  <text x="34" y="599" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="619" fill="#64748B" font-size="13" font-family="monospace"># CSV: простая запись</text>
  <text x="34" y="639" fill="#10B981" font-size="13" font-family="monospace">with</text>
  <text x="65.2" y="639" fill="#38BDF8" font-size="13" font-family="monospace"> open</text>
  <text x="104.2" y="639" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="112.0" y="639" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;data.csv&amp;quot;</text>
  <text x="190.0" y="639" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="205.6" y="639" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;w&amp;quot;</text>
  <text x="229.0" y="639" fill="#E2E8F0" font-size="13" font-family="monospace">) </text>
  <text x="244.6" y="639" fill="#10B981" font-size="13" font-family="monospace">as</text>
  <text x="260.2" y="639" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="34" y="659" fill="#E2E8F0" font-size="13" font-family="monospace">    f.write</text>
  <text x="119.8" y="659" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="127.6" y="659" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;имя,возраст\n&amp;quot;</text>
  <text x="244.6" y="659" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="679" fill="#E2E8F0" font-size="13" font-family="monospace">    f.write</text>
  <text x="119.8" y="679" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="127.6" y="679" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Алиса,14\n&amp;quot;</text>
  <text x="221.2" y="679" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <rect x="410" y="445" width="370" height="130" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="410" y="445" width="370" height="28" rx="8" fill="#334155" />
  <rect x="410" y="465" width="370" height="8" fill="#334155" />
  <circle cx="426" cy="459" r="5" fill="#EF4444" />
  <circle cx="446" cy="459" r="5" fill="#FBBF24" />
  <circle cx="466" cy="459" r="5" fill="#10B981" />
  <text x="595" y="464" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Обработка ошибок</text>
  <text x="424" y="489" fill="#64748B" font-size="13" font-family="monospace"># Обработка ошибок</text>
  <text x="424" y="509" fill="#10B981" font-size="13" font-family="monospace">try</text>
  <text x="447.4" y="509" fill="#E2E8F0" font-size="13" font-family="monospace">:</text>
  <text x="424" y="529" fill="#10B981" font-size="13" font-family="monospace">    with</text>
  <text x="486.4" y="529" fill="#38BDF8" font-size="13" font-family="monospace"> open</text>
  <text x="525.4" y="529" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="533.1999999999999" y="529" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;data.txt&amp;quot;</text>
  <text x="611.1999999999999" y="529" fill="#E2E8F0" font-size="13" font-family="monospace">) </text>
  <text x="626.8" y="529" fill="#10B981" font-size="13" font-family="monospace">as</text>
  <text x="642.4" y="529" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="424" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">        content = f.read</text>
  <text x="611.2" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">()</text>
  <text x="424" y="569" fill="#10B981" font-size="13" font-family="monospace">except</text>
  <text x="470.8" y="569" fill="#E2E8F0" font-size="13" font-family="monospace"> FileNotFoundError:</text>
  <text x="424" y="589" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="494.2" y="589" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="502.0" y="589" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Файл не найден!&amp;quot;</text>
  <text x="634.6" y="589" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="424" y="609" fill="#10B981" font-size="13" font-family="monospace">except</text>
