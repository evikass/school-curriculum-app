  <text x="85" y="32" fill="white" font-size="22" font-weight="bold">Работа с файлами</text>
  <text x="85" y="54" fill="#CBD5E1" font-size="14">open, read, write, with, режимы открытия</text>
  <circle cx="760" cy="35" r="20" fill="#1E293B" stroke="#10B981" stroke-width="1.5" />
  <text x="760" y="42" fill="#10B981" font-size="18" font-weight="bold" text-anchor="middle" font-family="monospace">Py</text>
  <rect x="20" y="85" width="370" height="155" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#shadow)" />
  <rect x="20" y="85" width="4" height="155" rx="2" fill="#10B981" />
  <text x="36" y="107" fill="#10B981" font-size="14" font-weight="bold">Режимы открытия файлов</text>
  <text x="36" y="125" fill="#CBD5E1" font-size="12">• &amp;apos;r&amp;apos; — чтение (по умолчанию)</text>
  <text x="36" y="143" fill="#CBD5E1" font-size="12">• &amp;apos;w&amp;apos; — запись (создаёт/перезаписывает)</text>
  <text x="36" y="161" fill="#CBD5E1" font-size="12">• &amp;apos;a&amp;apos; — дописывание в конец</text>
  <text x="36" y="179" fill="#CBD5E1" font-size="12">• &amp;apos;x&amp;apos; — создание (ошибка если есть)</text>
  <text x="36" y="197" fill="#CBD5E1" font-size="12">• &amp;apos;r+&amp;apos; — чтение и запись</text>
  <text x="36" y="215" fill="#CBD5E1" font-size="12">• Добавь &amp;apos;b&amp;apos; для бинарного: &amp;apos;rb&amp;apos;, &amp;apos;wb&amp;apos;</text>
  <rect x="20" y="255" width="370" height="145" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="255" width="370" height="28" rx="8" fill="#334155" />
  <rect x="20" y="275" width="370" height="8" fill="#334155" />
