  <text x="205" y="274" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Запись в файл</text>
  <text x="34" y="299" fill="#64748B" font-size="13" font-family="monospace"># Запись в файл</text>
  <text x="34" y="319" fill="#10B981" font-size="13" font-family="monospace">with</text>
  <text x="65.2" y="319" fill="#38BDF8" font-size="13" font-family="monospace"> open</text>
  <text x="104.2" y="319" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="112.0" y="319" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;data.txt&amp;quot;</text>
  <text x="190.0" y="319" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="205.6" y="319" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;w&amp;quot;</text>
  <text x="229.0" y="319" fill="#E2E8F0" font-size="13" font-family="monospace">) </text>
  <text x="244.6" y="319" fill="#10B981" font-size="13" font-family="monospace">as</text>
  <text x="260.2" y="319" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="34" y="339" fill="#E2E8F0" font-size="13" font-family="monospace">    f.write</text>
  <text x="119.8" y="339" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="127.6" y="339" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Привет!\n&amp;quot;</text>
  <text x="213.39999999999998" y="339" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="359" fill="#E2E8F0" font-size="13" font-family="monospace">    f.write</text>
  <text x="119.8" y="359" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="127.6" y="359" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Вторая строка\n&amp;quot;</text>
  <text x="260.2" y="359" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="379" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="399" fill="#64748B" font-size="13" font-family="monospace"># Список строк в файл</text>
  <text x="34" y="419" fill="#E2E8F0" font-size="13" font-family="monospace">lines = [</text>
  <text x="104.2" y="419" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;стр1\n&amp;quot;</text>
  <text x="166.6" y="419" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="182.2" y="419" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;стр2\n&amp;quot;</text>
  <text x="244.6" y="419" fill="#E2E8F0" font-size="13" font-family="monospace">]</text>
  <text x="34" y="439" fill="#E2E8F0" font-size="13" font-family="monospace">f.writelines</text>
  <text x="127.6" y="439" fill="#E2E8F0" font-size="13" font-family="monospace">(lines)</text>
  <rect x="410" y="85" width="370" height="175" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="410" y="85" width="370" height="28" rx="8" fill="#334155" />
