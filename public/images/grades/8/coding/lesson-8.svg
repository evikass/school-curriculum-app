  <text x="210" y="104" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Списки в Python</text>
  <text x="34" y="129" fill="#64748B" font-size="13" font-family="monospace"># Создание списков</text>
  <text x="34" y="149" fill="#E2E8F0" font-size="13" font-family="monospace">fruits = </text>
  <text x="104.2" y="149" fill="#F472B6" font-size="13" font-family="monospace">[</text>
  <text x="112.0" y="149" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;яблоко&amp;quot;</text>
  <text x="174.4" y="149" fill="#F472B6" font-size="13" font-family="monospace">, </text>
  <text x="190.0" y="149" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;банан&amp;quot;</text>
  <text x="244.6" y="149" fill="#F472B6" font-size="13" font-family="monospace">, </text>
  <text x="260.2" y="149" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;вишня&amp;quot;</text>
  <text x="314.8" y="149" fill="#F472B6" font-size="13" font-family="monospace">]</text>
  <text x="34" y="169" fill="#E2E8F0" font-size="13" font-family="monospace">numbers = </text>
  <text x="112.0" y="169" fill="#F472B6" font-size="13" font-family="monospace">[</text>
  <text x="119.8" y="169" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="127.6" y="169" fill="#F472B6" font-size="13" font-family="monospace">, </text>
  <text x="143.2" y="169" fill="#C084FC" font-size="13" font-family="monospace">2</text>
  <text x="151.0" y="169" fill="#F472B6" font-size="13" font-family="monospace">, </text>
  <text x="166.6" y="169" fill="#C084FC" font-size="13" font-family="monospace">3</text>
  <text x="174.4" y="169" fill="#F472B6" font-size="13" font-family="monospace">, </text>
  <text x="190.0" y="169" fill="#C084FC" font-size="13" font-family="monospace">4</text>
  <text x="197.8" y="169" fill="#F472B6" font-size="13" font-family="monospace">, </text>
  <text x="213.4" y="169" fill="#C084FC" font-size="13" font-family="monospace">5</text>
  <text x="221.20000000000002" y="169" fill="#F472B6" font-size="13" font-family="monospace">]</text>
  <text x="34" y="189" fill="#E2E8F0" font-size="13" font-family="monospace">mixed = </text>
  <text x="96.4" y="189" fill="#F472B6" font-size="13" font-family="monospace">[</text>
  <text x="104.2" y="189" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="112.0" y="189" fill="#F472B6" font-size="13" font-family="monospace">, </text>
  <text x="127.6" y="189" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;hi&amp;quot;</text>
  <text x="158.79999999999998" y="189" fill="#F472B6" font-size="13" font-family="monospace">, </text>
  <text x="174.39999999999998" y="189" fill="#10B981" font-size="13" font-family="monospace">True</text>
  <text x="205.59999999999997" y="189" fill="#F472B6" font-size="13" font-family="monospace">]</text>
  <text x="34" y="209" fill="#E2E8F0" font-size="13" font-family="monospace">empty = </text>
  <text x="96.4" y="209" fill="#F472B6" font-size="13" font-family="monospace">[]</text>
  <text x="34" y="229" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="249" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="249" fill="#E2E8F0" font-size="13" font-family="monospace">(fruits[0])  </text>
  <text x="174.39999999999998" y="249" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;яблоко&amp;apos;</text>
  <text x="34" y="269" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">(fruits[-1]) </text>
  <text x="174.39999999999998" y="269" fill="#64748B" font-size="13" font-family="monospace"># &amp;apos;вишня&amp;apos;</text>
  <text x="34" y="289" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="289" fill="#E2E8F0" font-size="13" font-family="monospace">(len(fruits))</text>
  <text x="174.39999999999998" y="289" fill="#64748B" font-size="13" font-family="monospace"># 3</text>
  <text x="420" y="100" fill="#34D399" font-size="13" font-weight="bold">Визуализация списка:</text>
  <rect x="420" y="115" width="85" height="45" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="2" />
  <text x="428" y="143" fill="#F8FAFC" font-size="11" font-weight="bold">яблоко</text>
  <text x="450" y="110" fill="#34D399" font-size="10" font-weight="bold">0</text>
  <text x="445" y="168" fill="#EC4899" font-size="10" font-weight="bold">-4</text>
  <rect x="510" y="115" width="85" height="45" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="2" />
  <text x="518" y="143" fill="#F8FAFC" font-size="11" font-weight="bold">банан</text>
  <text x="540" y="110" fill="#34D399" font-size="10" font-weight="bold">1</text>
  <text x="535" y="168" fill="#EC4899" font-size="10" font-weight="bold">-3</text>
  <rect x="600" y="115" width="85" height="45" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="2" />
  <text x="608" y="143" fill="#F8FAFC" font-size="11" font-weight="bold">вишня</text>
  <text x="630" y="110" fill="#34D399" font-size="10" font-weight="bold">2</text>
  <text x="625" y="168" fill="#EC4899" font-size="10" font-weight="bold">-2</text>
  <rect x="690" y="115" width="85" height="45" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="2" />
  <text x="698" y="143" fill="#F8FAFC" font-size="11" font-weight="bold">дыня</text>
  <text x="720" y="110" fill="#34D399" font-size="10" font-weight="bold">3</text>
  <text x="715" y="168" fill="#EC4899" font-size="10" font-weight="bold">-1</text>
  <rect x="420" y="190" width="360" height="170" rx="8" fill="#0F172A" stroke="#10B981" stroke-width="2" filter="url(#shadow)" />
  <rect x="420" y="190" width="4" height="170" rx="2" fill="#10B981" />
  <text x="436" y="212" fill="#10B981" font-size="14" font-weight="bold">Методы списков</text>
  <text x="436" y="230" fill="#CBD5E1" font-size="12">• .append(x)    — добавить в конец</text>
  <text x="436" y="248" fill="#CBD5E1" font-size="12">• .insert(i, x) — вставить по индексу</text>
  <text x="436" y="266" fill="#CBD5E1" font-size="12">• .remove(x)    — удалить по значению</text>
  <text x="436" y="284" fill="#CBD5E1" font-size="12">• .pop(i)       — удалить по индексу</text>
  <text x="436" y="302" fill="#CBD5E1" font-size="12">• .sort()       — сортировка на месте</text>
  <text x="436" y="320" fill="#CBD5E1" font-size="12">• .reverse()    — реверс списка</text>
  <text x="436" y="338" fill="#CBD5E1" font-size="12">• .count(x)     — количество x</text>
  <text x="436" y="356" fill="#CBD5E1" font-size="12">• .index(x)     — индекс элемента</text>
  <rect x="20" y="270" width="380" height="200" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="270" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="290" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="284" r="5" fill="#EF4444" />
  <circle cx="56" cy="284" r="5" fill="#FBBF24" />
  <circle cx="76" cy="284" r="5" fill="#10B981" />
  <text x="210" y="289" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Методы списков</text>
  <text x="34" y="314" fill="#E2E8F0" font-size="13" font-family="monospace">fruits = </text>
  <text x="104.2" y="314" fill="#F472B6" font-size="13" font-family="monospace">[</text>
  <text x="112.0" y="314" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;яблоко&amp;quot;</text>
  <text x="174.4" y="314" fill="#F472B6" font-size="13" font-family="monospace">, </text>
  <text x="190.0" y="314" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;банан&amp;quot;</text>
  <text x="244.6" y="314" fill="#F472B6" font-size="13" font-family="monospace">]</text>
  <text x="34" y="334" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">fruits.append</text>
  <text x="135.39999999999998" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="143.2" y="354" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;вишня&amp;quot;</text>
  <text x="197.79999999999998" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="205.6" y="354" fill="#64748B" font-size="13" font-family="monospace">  # +в конец</text>
  <text x="34" y="374" fill="#E2E8F0" font-size="13" font-family="monospace">fruits.insert</text>
  <text x="135.39999999999998" y="374" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="143.2" y="374" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="151.0" y="374" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="166.6" y="374" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;киви&amp;quot;</text>
  <text x="213.39999999999998" y="374" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="221.2" y="374" fill="#64748B" font-size="13" font-family="monospace"> # на позицию 1</text>
  <text x="34" y="394" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="414" fill="#64748B" font-size="13" font-family="monospace"># [&amp;apos;яблоко&amp;apos;, &amp;apos;киви&amp;apos;, &amp;apos;банан&amp;apos;, &amp;apos;вишня&amp;apos;]</text>
  <text x="34" y="434" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="454" fill="#E2E8F0" font-size="13" font-family="monospace">fruits.sort()</text>
  <text x="135.39999999999998" y="454" fill="#64748B" font-size="13" font-family="monospace">  # сортировка</text>
  <text x="34" y="474" fill="#E2E8F0" font-size="13" font-family="monospace">fruits.reverse()</text>
  <text x="158.8" y="474" fill="#64748B" font-size="13" font-family="monospace">  # реверс</text>
  <text x="34" y="494" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="514" fill="#E2E8F0" font-size="13" font-family="monospace">nums = [</text>
  <text x="96.4" y="514" fill="#C084FC" font-size="13" font-family="monospace">3</text>
  <text x="104.2" y="514" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="119.8" y="514" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="127.6" y="514" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="143.2" y="514" fill="#C084FC" font-size="13" font-family="monospace">4</text>
  <text x="151.0" y="514" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="166.6" y="514" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="174.4" y="514" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="190.0" y="514" fill="#C084FC" font-size="13" font-family="monospace">5</text>
  <text x="197.8" y="514" fill="#E2E8F0" font-size="13" font-family="monospace">]</text>
  <text x="34" y="534" fill="#E2E8F0" font-size="13" font-family="monospace">nums.sort()</text>
  <text x="119.8" y="534" fill="#64748B" font-size="13" font-family="monospace">  # [1, 1, 3, 4, 5]</text>
  <rect x="20" y="485" width="380" height="85" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="485" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="505" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="499" r="5" fill="#EF4444" />
  <circle cx="56" cy="499" r="5" fill="#FBBF24" />
  <circle cx="76" cy="499" r="5" fill="#10B981" />
  <text x="210" y="504" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">List Comprehension</text>
  <text x="34" y="529" fill="#64748B" font-size="13" font-family="monospace"># Генератор списка (list comprehension)</text>
  <text x="34" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">squares = [</text>
  <text x="119.8" y="549" fill="#C084FC" font-size="13" font-family="monospace">i**</text>
  <text x="143.2" y="549" fill="#C084FC" font-size="13" font-family="monospace">2</text>
  <text x="151.0" y="549" fill="#38BDF8" font-size="13" font-family="monospace"> for i in range</text>
  <text x="268.0" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="275.8" y="549" fill="#C084FC" font-size="13" font-family="monospace">10</text>
  <text x="291.40000000000003" y="549" fill="#E2E8F0" font-size="13" font-family="monospace">)]</text>
  <text x="34" y="569" fill="#64748B" font-size="13" font-family="monospace"># [0, 1, 4, 9, 16, 25, 36, 49, 64, 81]</text>
  <text x="34" y="589" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="609" fill="#38BDF8" font-size="13" font-family="monospace">evens = [i for i in range</text>
  <text x="229.0" y="609" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="236.8" y="609" fill="#C084FC" font-size="13" font-family="monospace">20</text>
  <text x="252.4" y="609" fill="#E2E8F0" font-size="13" font-family="monospace">) if i % </text>
  <text x="322.6" y="609" fill="#C084FC" font-size="13" font-family="monospace">2</text>
  <text x="330.40000000000003" y="609" fill="#E2E8F0" font-size="13" font-family="monospace"> == </text>
  <text x="361.6" y="609" fill="#C084FC" font-size="13" font-family="monospace">0</text>
  <text x="369.40000000000003" y="609" fill="#E2E8F0" font-size="13" font-family="monospace">]</text>
  <text x="420" y="375" fill="#34D399" font-size="13" font-weight="bold">Срезы списков:</text>
  <rect x="420" y="390" width="360" height="80" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="420" y="390" width="360" height="28" rx="8" fill="#334155" />
  <rect x="420" y="410" width="360" height="8" fill="#334155" />
  <circle cx="436" cy="404" r="5" fill="#EF4444" />
  <circle cx="456" cy="404" r="5" fill="#FBBF24" />
  <circle cx="476" cy="404" r="5" fill="#10B981" />
  <text x="600" y="409" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Срезы</text>
  <text x="434" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">nums = [</text>
  <text x="496.4" y="434" fill="#C084FC" font-size="13" font-family="monospace">0</text>
  <text x="504.2" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="519.8" y="434" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="527.5999999999999" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="543.1999999999999" y="434" fill="#C084FC" font-size="13" font-family="monospace">2</text>
  <text x="550.9999999999999" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="566.5999999999999" y="434" fill="#C084FC" font-size="13" font-family="monospace">3</text>
  <text x="574.3999999999999" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="589.9999999999999" y="434" fill="#C084FC" font-size="13" font-family="monospace">4</text>
  <text x="597.7999999999998" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="613.3999999999999" y="434" fill="#C084FC" font-size="13" font-family="monospace">5</text>
  <text x="621.1999999999998" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">]</text>
  <text x="434" y="454" fill="#E2E8F0" font-size="13" font-family="monospace">nums[1:4]  </text>
  <text x="519.8" y="454" fill="#64748B" font-size="13" font-family="monospace"># [1, 2, 3]</text>
  <text x="434" y="474" fill="#E2E8F0" font-size="13" font-family="monospace">nums[::2]  </text>
  <text x="519.8" y="474" fill="#64748B" font-size="13" font-family="monospace"># [0, 2, 4]</text>
  <rect x="0" y="582" width="800" height="18" fill="#334155" rx="0" />
  <text x="400" y="595" fill="#94A3B8" font-size="10" text-anchor="middle">8 класс • Кодирование • Python</text>
</svg>
