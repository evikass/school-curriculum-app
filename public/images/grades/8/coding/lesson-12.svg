  <text x="205" y="284" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Проект: Викторина (начало)</text>
  <text x="34" y="309" fill="#64748B" font-size="13" font-family="monospace"># Проект: Викторина</text>
  <text x="34" y="329" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="349" fill="#10B981" font-size="13" font-family="monospace">def</text>
  <text x="57.4" y="349" fill="#60A5FA" font-size="13" font-family="monospace"> load_questions</text>
  <text x="174.4" y="349" fill="#E2E8F0" font-size="13" font-family="monospace">(filename):</text>
  <text x="34" y="369" fill="#E2E8F0" font-size="13" font-family="monospace">    questions = []</text>
  <text x="34" y="389" fill="#10B981" font-size="13" font-family="monospace">    with</text>
  <text x="96.4" y="389" fill="#38BDF8" font-size="13" font-family="monospace"> open</text>
  <text x="135.4" y="389" fill="#E2E8F0" font-size="13" font-family="monospace">(filename) </text>
  <text x="221.2" y="389" fill="#10B981" font-size="13" font-family="monospace">as</text>
  <text x="236.79999999999998" y="389" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="34" y="409" fill="#10B981" font-size="13" font-family="monospace">        for</text>
  <text x="119.8" y="409" fill="#E2E8F0" font-size="13" font-family="monospace"> line </text>
  <text x="166.6" y="409" fill="#10B981" font-size="13" font-family="monospace">in</text>
  <text x="182.2" y="409" fill="#E2E8F0" font-size="13" font-family="monospace"> f:</text>
  <text x="34" y="429" fill="#E2E8F0" font-size="13" font-family="monospace">            parts = line.strip</text>
  <text x="268.0" y="429" fill="#E2E8F0" font-size="13" font-family="monospace">().split</text>
  <text x="330.4" y="429" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="338.2" y="429" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;|&amp;quot;</text>
  <text x="361.59999999999997" y="429" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="449" fill="#E2E8F0" font-size="13" font-family="monospace">            questions.append</text>
  <text x="252.4" y="449" fill="#E2E8F0" font-size="13" font-family="monospace">(parts)</text>
  <text x="34" y="469" fill="#10B981" font-size="13" font-family="monospace">    return</text>
  <text x="112.0" y="469" fill="#E2E8F0" font-size="13" font-family="monospace"> questions</text>
  <text x="34" y="489" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="509" fill="#10B981" font-size="13" font-family="monospace">def</text>
  <text x="57.4" y="509" fill="#60A5FA" font-size="13" font-family="monospace"> play</text>
  <text x="96.4" y="509" fill="#E2E8F0" font-size="13" font-family="monospace">(questions):</text>
  <text x="34" y="529" fill="#E2E8F0" font-size="13" font-family="monospace">    score = </text>
  <text x="127.6" y="529" fill="#C084FC" font-size="13" font-family="monospace">0</text>
