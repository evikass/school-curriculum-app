  <text x="205" y="494" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Викторина (продолжение)</text>
  <text x="34" y="519" fill="#10B981" font-size="13" font-family="monospace">    for</text>
  <text x="88.6" y="519" fill="#E2E8F0" font-size="13" font-family="monospace"> q </text>
  <text x="112.0" y="519" fill="#10B981" font-size="13" font-family="monospace">in</text>
  <text x="127.6" y="519" fill="#E2E8F0" font-size="13" font-family="monospace"> questions:</text>
  <text x="34" y="539" fill="#E2E8F0" font-size="13" font-family="monospace">        answer = </text>
  <text x="166.6" y="539" fill="#38BDF8" font-size="13" font-family="monospace">input</text>
  <text x="205.6" y="539" fill="#C084FC" font-size="13" font-family="monospace">(q[</text>
  <text x="229.0" y="539" fill="#C084FC" font-size="13" font-family="monospace">0</text>
  <text x="236.8" y="539" fill="#E2E8F0" font-size="13" font-family="monospace">] + </text>
  <text x="268.0" y="539" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot; &amp;quot;</text>
  <text x="291.4" y="539" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="559" fill="#10B981" font-size="13" font-family="monospace">        if</text>
  <text x="112.0" y="559" fill="#E2E8F0" font-size="13" font-family="monospace"> answer == q[</text>
  <text x="213.39999999999998" y="559" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="221.2" y="559" fill="#E2E8F0" font-size="13" font-family="monospace">]:</text>
  <text x="34" y="579" fill="#E2E8F0" font-size="13" font-family="monospace">            score += </text>
  <text x="197.79999999999998" y="579" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="34" y="599" fill="#10B981" font-size="13" font-family="monospace">    return</text>
  <text x="112.0" y="599" fill="#E2E8F0" font-size="13" font-family="monospace"> score</text>
