  <rect x="420" y="415" width="4" height="100" rx="2" fill="#F59E0B" />
  <text x="436" y="437" fill="#F59E0B" font-size="14" font-weight="bold">Советы для проекта</text>
  <text x="436" y="455" fill="#CBD5E1" font-size="12">• Разбей задачу на подзадачи</text>
  <text x="436" y="473" fill="#CBD5E1" font-size="12">• Пиши функции для каждой части</text>
  <text x="436" y="491" fill="#CBD5E1" font-size="12">• Тестируй каждый шаг</text>
  <text x="436" y="509" fill="#CBD5E1" font-size="12">• Используй git для версионности</text>
  <text x="436" y="527" fill="#CBD5E1" font-size="12">• Добавляй комментарии и docstrings</text>
  <rect x="20" y="475" width="370" height="100" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="475" width="370" height="28" rx="8" fill="#334155" />
