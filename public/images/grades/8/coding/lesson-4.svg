<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <filter id="glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0" />
  <rect x="0" y="70" width="800" height="3" fill="#34D399" />
  <circle cx="45" cy="35" r="25" fill="#1E293B" stroke="#34D399" stroke-width="2" />
  <text x="45" y="42" fill="#34D399" font-size="20" font-weight="bold" text-anchor="middle" font-family="monospace">4</text>
  <text x="85" y="32" fill="white" font-size="22" font-weight="bold">Условные операторы</text>
  <text x="85" y="54" fill="#CBD5E1" font-size="14">if / elif / else — операторы сравнения и логика</text>
  <circle cx="760" cy="35" r="20" fill="#1E293B" stroke="#10B981" stroke-width="1.5" />
  <text x="760" y="42" fill="#10B981" font-size="18" font-weight="bold" text-anchor="middle" font-family="monospace">Py</text>
  <rect x="20" y="85" width="380" height="230" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="85" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="105" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="99" r="5" fill="#EF4444" />
  <circle cx="56" cy="99" r="5" fill="#FBBF24" />
  <circle cx="76" cy="99" r="5" fill="#10B981" />
  <text x="210" y="104" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Условные операторы</text>
  <text x="34" y="129" fill="#E2E8F0" font-size="13" font-family="monospace">age = </text>
  <text x="80.8" y="129" fill="#38BDF8" font-size="13" font-family="monospace">int</text>
  <text x="104.19999999999999" y="129" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="111.99999999999999" y="129" fill="#38BDF8" font-size="13" font-family="monospace">input</text>
  <text x="151.0" y="129" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="158.8" y="129" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Возраст: &amp;quot;</text>
  <text x="244.60000000000002" y="129" fill="#E2E8F0" font-size="13" font-family="monospace">))</text>
  <text x="34" y="149" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="169" fill="#10B981" font-size="13" font-family="monospace">if</text>
  <text x="49.6" y="169" fill="#E2E8F0" font-size="13" font-family="monospace"> age &amp;gt;= </text>
  <text x="112.0" y="169" fill="#C084FC" font-size="13" font-family="monospace">18</text>
  <text x="127.6" y="169" fill="#E2E8F0" font-size="13" font-family="monospace">:</text>
  <text x="34" y="189" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="104.2" y="189" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="112.0" y="189" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Доступ разрешён&amp;quot;</text>
  <text x="244.6" y="189" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="209" fill="#10B981" font-size="13" font-family="monospace">elif</text>
  <text x="65.2" y="209" fill="#E2E8F0" font-size="13" font-family="monospace"> age &amp;gt;= </text>
  <text x="127.6" y="209" fill="#C084FC" font-size="13" font-family="monospace">14</text>
  <text x="143.2" y="209" fill="#E2E8F0" font-size="13" font-family="monospace">:</text>
  <text x="34" y="229" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="104.2" y="229" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="112.0" y="229" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;С разрешением родителей&amp;quot;</text>
  <text x="307.0" y="229" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="249" fill="#10B981" font-size="13" font-family="monospace">else</text>
  <text x="65.2" y="249" fill="#E2E8F0" font-size="13" font-family="monospace">:</text>
  <text x="34" y="269" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="104.2" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="112.0" y="269" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Доступ запрещён&amp;quot;</text>
  <text x="244.6" y="269" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="289" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="309" fill="#64748B" font-size="13" font-family="monospace"># Тернарный оператор</text>
  <text x="34" y="329" fill="#E2E8F0" font-size="13" font-family="monospace">status = </text>
  <text x="104.2" y="329" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;взрослый&amp;quot;</text>
  <text x="182.2" y="329" fill="#E2E8F0" font-size="13" font-family="monospace"> if age &amp;gt;= </text>
  <text x="268.0" y="329" fill="#C084FC" font-size="13" font-family="monospace">18</text>
  <text x="283.6" y="329" fill="#E2E8F0" font-size="13" font-family="monospace"> else </text>
  <text x="330.40000000000003" y="329" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;ребёнок&amp;quot;</text>
  <text x="440" y="100" fill="#34D399" font-size="14" font-weight="bold">Блок-схема:</text>
  <rect x="480" y="110" width="120" height="28" rx="8" fill="#334155" filter="url(#shadow)" />
  <text x="540" y="129" fill="white" font-size="11" font-weight="normal" text-anchor="middle">Начало</text>
  <line x1="540" y1="138" x2="540" y2="155" stroke="#94A3B8" stroke-width="2" />
  <polygon points="540,165 610,190 540,215 470,190" fill="#10B981" stroke="white" stroke-width="1" filter="url(#shadow)" />
  <text x="540" y="195" fill="white" font-size="11" font-weight="bold" text-anchor="middle">age &amp;gt;= 18?</text>
  <text x="475" y="185" fill="#34D399" font-size="11" font-weight="bold">Да</text>
  <text x="610" y="185" fill="#EF4444" font-size="11" font-weight="bold">Нет</text>
  <line x1="470" y1="190" x2="420" y2="190" stroke="#94A3B8" stroke-width="2" />
  <rect x="340" y="175" width="130" height="30" rx="8" fill="#059669" filter="url(#shadow)" />
  <text x="405" y="195" fill="white" font-size="10" font-weight="normal" text-anchor="middle">Доступ разрешён</text>
  <line x1="610" y1="190" x2="660" y2="190" stroke="#94A3B8" stroke-width="2" />
  <polygon points="720,218 780,240 720,262 660,240" fill="#3B82F6" stroke="white" stroke-width="1" filter="url(#shadow)" />
  <text x="720" y="245" fill="white" font-size="11" font-weight="bold" text-anchor="middle">age &amp;gt;= 14?</text>
  <line x1="540" y1="215" x2="540" y2="235" stroke="#94A3B8" stroke-width="2" />
  <line x1="540" y1="235" x2="720" y2="235" stroke="#94A3B8" stroke-width="2" />
  <line x1="720" y1="235" x2="720" y2="218" stroke="#94A3B8" stroke-width="2" />
  <text x="660" y="235" fill="#34D399" font-size="10" font-weight="bold">Да</text>
  <rect x="610" y="275" width="130" height="30" rx="8" fill="#3B82F6" filter="url(#shadow)" />
  <text x="675" y="295" fill="white" font-size="10" font-weight="normal" text-anchor="middle">С родителями</text>
  <line x1="660" y1="262" x2="660" y2="275" stroke="#94A3B8" stroke-width="2" />
  <text x="785" y="235" fill="#EF4444" font-size="10" font-weight="bold">Нет</text>
  <rect x="620" y="320" width="130" height="30" rx="8" fill="#EF4444" filter="url(#shadow)" />
  <text x="685" y="340" fill="white" font-size="10" font-weight="normal" text-anchor="middle">Запрещён</text>
  <line x1="780" y1="240" x2="800" y2="240" stroke="#94A3B8" stroke-width="2" />
  <line x1="800" y1="240" x2="800" y2="335" stroke="#94A3B8" stroke-width="2" />
  <line x1="800" y1="335" x2="750" y2="335" stroke="#94A3B8" stroke-width="2" />
  <rect x="410" y="375" width="370" height="130" rx="8" fill="#0F172A" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)" />
  <rect x="410" y="375" width="4" height="130" rx="2" fill="#14B8A6" />
  <text x="426" y="397" fill="#14B8A6" font-size="14" font-weight="bold">Операторы сравнения</text>
  <text x="426" y="415" fill="#CBD5E1" font-size="12">• ==  равно        !=  не равно</text>
  <text x="426" y="433" fill="#CBD5E1" font-size="12">• &amp;gt;   больше       &amp;lt;   меньше</text>
  <text x="426" y="451" fill="#CBD5E1" font-size="12">• &amp;gt;=  больше/равно  &amp;lt;= меньше/равно</text>
  <text x="426" y="469" fill="#CBD5E1" font-size="12">• </text>
  <text x="426" y="487" fill="#CBD5E1" font-size="12">• Логические: and, or, not</text>
  <text x="426" y="505" fill="#CBD5E1" font-size="12">• if a &amp;gt; 0 and b &amp;gt; 0: ...</text>
  <rect x="20" y="330" width="380" height="120" rx="8" fill="#0F172A" stroke="#3B82F6" stroke-width="2" filter="url(#shadow)" />
  <rect x="20" y="330" width="4" height="120" rx="2" fill="#3B82F6" />
  <text x="36" y="352" fill="#3B82F6" font-size="14" font-weight="bold">Логические операторы</text>
  <text x="36" y="370" fill="#CBD5E1" font-size="12">• and — оба условия истинны</text>
  <text x="36" y="388" fill="#CBD5E1" font-size="12">• or  — хотя бы одно истинно</text>
  <text x="36" y="406" fill="#CBD5E1" font-size="12">• not — отрицание (инверсия)</text>
  <text x="36" y="424" fill="#CBD5E1" font-size="12">• if (x &amp;gt; 0) and (x &amp;lt; 10): ...</text>
  <text x="36" y="442" fill="#CBD5E1" font-size="12">• if (a == 1) or (b == 1): ...</text>
  <text x="20" y="470" fill="#34D399" font-size="13" font-weight="bold">Таблица истинности:</text>
  <rect x="20" y="480" width="380" height="22" rx="4" fill="#334155" />
  <text x="30" y="496" fill="#F8FAFC" font-size="11" font-weight="bold">A</text>
  <text x="90" y="496" fill="#F8FAFC" font-size="11" font-weight="bold">B</text>
  <text x="150" y="496" fill="#F8FAFC" font-size="11" font-weight="bold">A and B</text>
  <text x="260" y="496" fill="#F8FAFC" font-size="11" font-weight="bold">A or B</text>
  <rect x="20" y="502" width="380" height="20" rx="0" fill="#0F172A" stroke="#334155" stroke-width="0.5" />
  <text x="30" y="516" fill="#10B981" font-size="11" font-weight="normal">True</text>
  <text x="90" y="516" fill="#10B981" font-size="11" font-weight="normal">True</text>
  <text x="150" y="516" fill="#10B981" font-size="11" font-weight="normal">True</text>
  <text x="260" y="516" fill="#10B981" font-size="11" font-weight="normal">True</text>
  <rect x="20" y="522" width="380" height="20" rx="0" fill="#0F172A" stroke="#334155" stroke-width="0.5" />
  <text x="30" y="536" fill="#10B981" font-size="11" font-weight="normal">True</text>
  <text x="90" y="536" fill="#10B981" font-size="11" font-weight="normal">False</text>
  <text x="150" y="536" fill="#EF4444" font-size="11" font-weight="normal">False</text>
  <text x="260" y="536" fill="#10B981" font-size="11" font-weight="normal">True</text>
  <rect x="20" y="542" width="380" height="20" rx="0" fill="#0F172A" stroke="#334155" stroke-width="0.5" />
  <text x="30" y="556" fill="#10B981" font-size="11" font-weight="normal">False</text>
  <text x="90" y="556" fill="#10B981" font-size="11" font-weight="normal">True</text>
  <text x="150" y="556" fill="#EF4444" font-size="11" font-weight="normal">False</text>
  <text x="260" y="556" fill="#10B981" font-size="11" font-weight="normal">True</text>
  <rect x="20" y="562" width="380" height="20" rx="0" fill="#0F172A" stroke="#334155" stroke-width="0.5" />
  <text x="30" y="576" fill="#10B981" font-size="11" font-weight="normal">False</text>
  <text x="90" y="576" fill="#10B981" font-size="11" font-weight="normal">False</text>
  <text x="150" y="576" fill="#EF4444" font-size="11" font-weight="normal">False</text>
  <text x="260" y="576" fill="#EF4444" font-size="11" font-weight="normal">False</text>
  <rect x="0" y="582" width="800" height="18" fill="#334155" rx="0" />
  <text x="400" y="595" fill="#94A3B8" font-size="10" text-anchor="middle">8 класс • Кодирование • Python</text>
</svg>
