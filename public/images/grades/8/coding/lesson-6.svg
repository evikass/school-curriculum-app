  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0" />
  <rect x="0" y="70" width="800" height="3" fill="#34D399" />
  <circle cx="45" cy="35" r="25" fill="#1E293B" stroke="#34D399" stroke-width="2" />
  <text x="45" y="42" fill="#34D399" font-size="20" font-weight="bold" text-anchor="middle" font-family="monospace">6</text>
  <text x="85" y="32" fill="white" font-size="22" font-weight="bold">Цикл while</text>
  <text x="85" y="54" fill="#CBD5E1" font-size="14">Условие цикла, бесконечные циклы, паттерны</text>
  <circle cx="760" cy="35" r="20" fill="#1E293B" stroke="#10B981" stroke-width="1.5" />
  <text x="760" y="42" fill="#10B981" font-size="18" font-weight="bold" text-anchor="middle" font-family="monospace">Py</text>
  <rect x="20" y="85" width="380" height="170" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="85" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="105" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="99" r="5" fill="#EF4444" />
  <circle cx="56" cy="99" r="5" fill="#FBBF24" />
  <circle cx="76" cy="99" r="5" fill="#10B981" />
  <text x="210" y="104" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">while — цикл с условием</text>
  <text x="34" y="129" fill="#64748B" font-size="13" font-family="monospace"># Цикл while</text>
  <text x="34" y="149" fill="#E2E8F0" font-size="13" font-family="monospace">count = </text>
  <text x="96.4" y="149" fill="#C084FC" font-size="13" font-family="monospace">0</text>
  <text x="34" y="169" fill="#10B981" font-size="13" font-family="monospace">while</text>
  <text x="73.0" y="169" fill="#E2E8F0" font-size="13" font-family="monospace"> count </text>
  <text x="127.6" y="169" fill="#F472B6" font-size="13" font-family="monospace">&amp;lt;</text>
  <text x="135.4" y="169" fill="#E2E8F0" font-size="13" font-family="monospace"> </text>
  <text x="143.20000000000002" y="169" fill="#C084FC" font-size="13" font-family="monospace">5</text>
  <text x="151.00000000000003" y="169" fill="#E2E8F0" font-size="13" font-family="monospace">:</text>
  <text x="34" y="189" fill="#38BDF8" font-size="13" font-family="monospace">    print</text>
  <text x="104.2" y="189" fill="#E2E8F0" font-size="13" font-family="monospace">(count)</text>
  <text x="34" y="209" fill="#E2E8F0" font-size="13" font-family="monospace">    count += </text>
  <text x="135.39999999999998" y="209" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="34" y="229" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="249" fill="#64748B" font-size="13" font-family="monospace"># Вывод: 0 1 2 3 4</text>
  <text x="34" y="269" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="34" y="289" fill="#64748B" font-size="13" font-family="monospace"># Условие проверяется ПЕРЕД</text>
  <text x="34" y="309" fill="#64748B" font-size="13" font-family="monospace"># каждой итерацией</text>
  <rect x="420" y="85" width="360" height="170" rx="8" fill="#0F172A" stroke="#14B8A6" stroke-width="2" filter="url(#shadow)" />
  <rect x="420" y="85" width="4" height="170" rx="2" fill="#14B8A6" />
  <text x="436" y="107" fill="#14B8A6" font-size="14" font-weight="bold">while vs for</text>
  <text x="436" y="125" fill="#CBD5E1" font-size="12">• for — когда знаем количество повторений</text>
  <text x="436" y="143" fill="#CBD5E1" font-size="12">• while — когда неизвестно заранее</text>
  <text x="436" y="161" fill="#CBD5E1" font-size="12">• while нужен для ожидания событий</text>
  <text x="436" y="179" fill="#CBD5E1" font-size="12">• while True — бесконечный цикл</text>
  <text x="436" y="197" fill="#CBD5E1" font-size="12">• break для выхода из бесконечного цикла</text>
  <text x="436" y="215" fill="#CBD5E1" font-size="12">• Обязательно менять условие!</text>
  <rect x="20" y="270" width="380" height="130" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="20" y="270" width="380" height="28" rx="8" fill="#334155" />
  <rect x="20" y="290" width="380" height="8" fill="#334155" />
  <circle cx="36" cy="284" r="5" fill="#EF4444" />
  <circle cx="56" cy="284" r="5" fill="#FBBF24" />
  <circle cx="76" cy="284" r="5" fill="#10B981" />
  <text x="210" y="289" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Бесконечный цикл с break</text>
  <text x="34" y="314" fill="#64748B" font-size="13" font-family="monospace"># Бесконечный цикл + break</text>
  <text x="34" y="334" fill="#10B981" font-size="13" font-family="monospace">while</text>
  <text x="73.0" y="334" fill="#10B981" font-size="13" font-family="monospace"> True</text>
  <text x="112.0" y="334" fill="#E2E8F0" font-size="13" font-family="monospace">:</text>
  <text x="34" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">    answer = </text>
  <text x="135.39999999999998" y="354" fill="#38BDF8" font-size="13" font-family="monospace">input</text>
  <text x="174.39999999999998" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="182.2" y="354" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Выйти? (да/нет): &amp;quot;</text>
  <text x="330.4" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="34" y="374" fill="#10B981" font-size="13" font-family="monospace">    if</text>
  <text x="80.8" y="374" fill="#E2E8F0" font-size="13" font-family="monospace"> answer == </text>
  <text x="166.6" y="374" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;да&amp;quot;</text>
  <text x="197.79999999999998" y="374" fill="#E2E8F0" font-size="13" font-family="monospace">:</text>
  <text x="34" y="394" fill="#10B981" font-size="13" font-family="monospace">        break</text>
  <text x="34" y="414" fill="#38BDF8" font-size="13" font-family="monospace">print</text>
  <text x="73.0" y="414" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="80.8" y="414" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Пока!&amp;quot;</text>
  <text x="135.4" y="414" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <rect x="420" y="270" width="360" height="160" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" filter="url(#shadow)" />
  <rect x="420" y="270" width="360" height="28" rx="8" fill="#334155" />
  <rect x="420" y="290" width="360" height="8" fill="#334155" />
  <circle cx="436" cy="284" r="5" fill="#EF4444" />
  <circle cx="456" cy="284" r="5" fill="#FBBF24" />
  <circle cx="476" cy="284" r="5" fill="#10B981" />
  <text x="600" y="289" fill="#94A3B8" font-size="11" text-anchor="middle" font-family="monospace">Игра: угадай число</text>
  <text x="434" y="314" fill="#64748B" font-size="13" font-family="monospace"># Игра: угадай число</text>
  <text x="434" y="334" fill="#10B981" font-size="13" font-family="monospace">import</text>
  <text x="480.8" y="334" fill="#E2E8F0" font-size="13" font-family="monospace"> random</text>
  <text x="434" y="354" fill="#38BDF8" font-size="13" font-family="monospace">secret = random.randint</text>
  <text x="613.4" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="621.1999999999999" y="354" fill="#C084FC" font-size="13" font-family="monospace">1</text>
  <text x="628.9999999999999" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">, </text>
  <text x="644.5999999999999" y="354" fill="#C084FC" font-size="13" font-family="monospace">100</text>
  <text x="667.9999999999999" y="354" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="434" y="374" fill="#E2E8F0" font-size="13" font-family="monospace">guess = </text>
  <text x="496.4" y="374" fill="#C084FC" font-size="13" font-family="monospace">0</text>
  <text x="434" y="394" fill="#E2E8F0" font-size="13" font-family="monospace" />
  <text x="434" y="414" fill="#10B981" font-size="13" font-family="monospace">while</text>
  <text x="473.0" y="414" fill="#E2E8F0" font-size="13" font-family="monospace"> guess != secret:</text>
  <text x="434" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">    guess = </text>
  <text x="527.6" y="434" fill="#38BDF8" font-size="13" font-family="monospace">int</text>
  <text x="551.0" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">(input</text>
  <text x="597.8" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="605.5999999999999" y="434" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Угадай: &amp;quot;</text>
  <text x="683.5999999999999" y="434" fill="#E2E8F0" font-size="13" font-family="monospace">))</text>
  <text x="434" y="454" fill="#10B981" font-size="13" font-family="monospace">    if</text>
  <text x="480.8" y="454" fill="#E2E8F0" font-size="13" font-family="monospace"> guess </text>
  <text x="535.4" y="454" fill="#F472B6" font-size="13" font-family="monospace">&amp;lt;</text>
  <text x="543.1999999999999" y="454" fill="#E2E8F0" font-size="13" font-family="monospace"> secret:</text>
  <text x="434" y="474" fill="#38BDF8" font-size="13" font-family="monospace">        print</text>
  <text x="535.4" y="474" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="543.1999999999999" y="474" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Больше!&amp;quot;</text>
  <text x="613.4" y="474" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="434" y="494" fill="#10B981" font-size="13" font-family="monospace">    elif</text>
  <text x="496.4" y="494" fill="#E2E8F0" font-size="13" font-family="monospace"> guess </text>
  <text x="551.0" y="494" fill="#F472B6" font-size="13" font-family="monospace">&amp;gt;</text>
  <text x="558.8" y="494" fill="#E2E8F0" font-size="13" font-family="monospace"> secret:</text>
  <text x="434" y="514" fill="#38BDF8" font-size="13" font-family="monospace">        print</text>
  <text x="535.4" y="514" fill="#E2E8F0" font-size="13" font-family="monospace">(</text>
  <text x="543.1999999999999" y="514" fill="#F59E0B" font-size="13" font-family="monospace">&amp;quot;Меньше!&amp;quot;</text>
  <text x="613.4" y="514" fill="#E2E8F0" font-size="13" font-family="monospace">)</text>
  <text x="20" y="420" fill="#34D399" font-size="14" font-weight="bold">Блок-схема while:</text>
  <rect x="30" y="435" width="110" height="25" rx="8" fill="#334155" filter="url(#shadow)" />
  <text x="85" y="452" fill="white" font-size="10" font-weight="normal" text-anchor="middle">Инициализация</text>
  <line x1="85" y1="460" x2="85" y2="475" stroke="#94A3B8" stroke-width="2" />
  <polygon points="85,480 145,500 85,520 25,500" fill="#10B981" stroke="white" stroke-width="1" filter="url(#shadow)" />
  <text x="85" y="505" fill="white" font-size="11" font-weight="bold" text-anchor="middle">Условие?</text>
  <text x="25" y="497" fill="#34D399" font-size="10" font-weight="bold">Да</text>
  <line x1="25" y1="500" x2="-10" y2="500" stroke="#94A3B8" stroke-width="2" />
  <line x1="-10" y1="500" x2="-10" y2="545" stroke="#94A3B8" stroke-width="2" />
  <line x1="-10" y1="545" x2="30" y2="545" stroke="#94A3B8" stroke-width="2" />
  <rect x="30" y="530" width="110" height="30" rx="8" fill="#3B82F6" filter="url(#shadow)" />
  <text x="85" y="550" fill="white" font-size="10" font-weight="normal" text-anchor="middle">Тело цикла</text>
  <line x1="85" y1="560" x2="85" y2="575" stroke="#94A3B8" stroke-width="2" />
  <line x1="85" y1="575" x2="-40" y2="575" stroke="#94A3B8" stroke-width="2" />
  <line x1="-40" y1="575" x2="-40" y2="500" stroke="#94A3B8" stroke-width="2" />
  <line x1="-40" y1="500" x2="25" y2="500" stroke="#94A3B8" stroke-width="2" />
  <text x="150" y="497" fill="#EF4444" font-size="10" font-weight="bold">Нет</text>
  <line x1="145" y1="500" x2="200" y2="500" stroke="#94A3B8" stroke-width="2" />
  <rect x="200" y="487" width="110" height="25" rx="8" fill="#334155" filter="url(#shadow)" />
  <text x="255" y="504" fill="white" font-size="10" font-weight="normal" text-anchor="middle">Конец цикла</text>
  <rect x="420" y="450" width="360" height="120" rx="8" fill="#0F172A" stroke="#8B5CF6" stroke-width="2" filter="url(#shadow)" />
  <rect x="420" y="450" width="4" height="120" rx="2" fill="#8B5CF6" />
  <text x="436" y="472" fill="#8B5CF6" font-size="14" font-weight="bold">Паттерны циклов</text>
  <text x="436" y="490" fill="#CBD5E1" font-size="12">• Счётчик: count = 0; while count &amp;lt; n:</text>
  <text x="436" y="508" fill="#CBD5E1" font-size="12">• Накопление: total = 0; total += x</text>
  <text x="436" y="526" fill="#CBD5E1" font-size="12">• Ожидание: while not condition:</text>
  <text x="436" y="544" fill="#CBD5E1" font-size="12">• Ввод до sentinel: while x != 0:</text>
  <text x="436" y="562" fill="#CBD5E1" font-size="12">• Флаг: found = False; while not found:</text>
  <rect x="0" y="582" width="800" height="18" fill="#334155" rx="0" />
  <text x="400" y="595" fill="#94A3B8" font-size="10" text-anchor="middle">8 класс • Кодирование • Python</text>
</svg>
