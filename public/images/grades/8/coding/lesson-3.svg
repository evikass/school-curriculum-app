  <text x="280" y="151" fill="#C084FC" font-size="13" font-weight="bold">10 - 4 = 6</text>
  <rect x="20" y="169" width="380" height="36" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1" />
  <rect x="20" y="169" width="50" height="36" rx="6" fill="#F59E0B" />
  <rect x="50" y="169" width="20" height="36" fill="#F59E0B" />
  <text x="30" y="194" fill="white" font-size="16" font-weight="bold">*</text>
