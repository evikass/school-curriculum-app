  <text x="280" y="193" fill="#C084FC" font-size="13" font-weight="bold">6 * 7 = 42</text>
  <rect x="20" y="211" width="380" height="36" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1" />
  <rect x="20" y="211" width="50" height="36" rx="6" fill="#8B5CF6" />
  <rect x="50" y="211" width="20" height="36" fill="#8B5CF6" />
  <text x="30" y="236" fill="white" font-size="16" font-weight="bold">/</text>
  <text x="80" y="235" fill="#F8FAFC" font-size="13" font-weight="normal">Деление</text>
  <text x="280" y="235" fill="#C084FC" font-size="13" font-weight="bold">15 / 4 = 3.75</text>
  <rect x="20" y="253" width="380" height="36" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1" />
  <rect x="20" y="253" width="50" height="36" rx="6" fill="#14B8A6" />
  <rect x="50" y="253" width="20" height="36" fill="#14B8A6" />
  <text x="30" y="278" fill="white" font-size="16" font-weight="bold">//</text>
  <text x="80" y="277" fill="#F8FAFC" font-size="13" font-weight="normal">Целое деление</text>
  <text x="280" y="277" fill="#C084FC" font-size="13" font-weight="bold">15 // 4 = 3</text>
  <rect x="20" y="295" width="380" height="36" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1" />
  <rect x="20" y="295" width="50" height="36" rx="6" fill="#EC4899" />
  <rect x="50" y="295" width="20" height="36" fill="#EC4899" />
  <text x="30" y="320" fill="white" font-size="16" font-weight="bold">%</text>
  <text x="80" y="319" fill="#F8FAFC" font-size="13" font-weight="normal">Остаток</text>
  <text x="280" y="319" fill="#C084FC" font-size="13" font-weight="bold">15 % 4 = 3</text>
  <rect x="20" y="337" width="380" height="36" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1" />
  <rect x="20" y="337" width="50" height="36" rx="6" fill="#EF4444" />
  <rect x="50" y="337" width="20" height="36" fill="#EF4444" />
  <text x="30" y="362" fill="white" font-size="16" font-weight="bold">**</text>
