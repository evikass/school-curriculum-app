<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#0D9488" />
    </linearGradient>
    <filter id="glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#14B8A6" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="800" height="70" fill="url(#headerGrad)" rx="0" />
  <rect x="0" y="70" width="800" height="3" fill="#34D399" />
  <circle cx="45" cy="35" r="25" fill="#1E293B" stroke="#34D399" stroke-width="2" />
  <text x="45" y="42" fill="#34D399" font-size="20" font-weight="bold" text-anchor="middle" font-family="monospace">3</text>
  <text x="85" y="32" fill="white" font-size="22" font-weight="bold">Арифметические операции</text>
  <text x="85" y="54" fill="#CBD5E1" font-size="14">+, -, *, /, //, %, ** — порядок операций</text>
  <circle cx="760" cy="35" r="20" fill="#1E293B" stroke="#10B981" stroke-width="1.5" />
  <text x="760" y="42" fill="#10B981" font-size="18" font-weight="bold" text-anchor="middle" font-family="monospace">Py</text>
  <rect x="20" y="85" width="380" height="36" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1" />
  <rect x="20" y="85" width="50" height="36" rx="6" fill="#10B981" />
  <rect x="50" y="85" width="20" height="36" fill="#10B981" />
  <text x="30" y="110" fill="white" font-size="16" font-weight="bold">+</text>
  <text x="80" y="109" fill="#F8FAFC" font-size="13" font-weight="normal">Сложение</text>
  <text x="280" y="109" fill="#C084FC" font-size="13" font-weight="bold">5 + 3 = 8</text>
  <rect x="20" y="127" width="380" height="36" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1" />
  <rect x="20" y="127" width="50" height="36" rx="6" fill="#3B82F6" />
