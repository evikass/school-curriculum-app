<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Газообмен и регуляция дыхания</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 8</text>
<rect x="20" y="72" width="380" height="260" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="210" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Газообмен в альвеолах</text><circle cx="210" cy="210" r="60" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/><text x="210" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#059669" font-weight="bold">Альвеола</text><text x="210" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="normal">(воздух)</text><path d="M130,180 L160,200" stroke="#EF4444" stroke-width="3"/><polygon points="160,200 150,195 155,205" fill="#EF4444"/><text x="95" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#EF4444" font-weight="bold">O₂</text><path d="M260,200 L290,180" stroke="#3B82F6" stroke-width="3"/><polygon points="290,180 280,178 285,188" fill="#3B82F6"/><text x="310" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#3B82F6" font-weight="bold">CO₂</text><ellipse cx="210" cy="210" rx="75" ry="75" fill="none" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/><text x="100" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#3B82F6" font-weight="bold">Венозная кровь</text><text x="100" y="153" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#3B82F6" font-weight="normal">O₂: 40 мм рт.ст.</text><text x="100" y="165" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#3B82F6" font-weight="normal">CO₂: 46 мм рт.ст.</text><text x="270" y="260" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="bold">Артериальная кровь</text><text x="270" y="273" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#EF4444" font-weight="normal">O₂: 100 мм рт.ст.</text><text x="270" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#EF4444" font-weight="normal">CO₂: 40 мм рт.ст.</text><rect x="420" y="72" width="365" height="120" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Диффузия газов</text><text x="435" y="115" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Газ переходит из области</text><text x="435" y="130" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">высокого давления в область низкого</text><text x="435" y="150" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">O₂: альвеола (100) → кровь (40)</text><text x="435" y="165" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">CO₂: кровь (46) → альвеола (40)</text><text x="435" y="183" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Диффузия через тонкую стенку альвеолы + капилляра</text><rect x="420" y="205" width="365" height="127" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="225" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Транспорт газов кровью</text><text x="435" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Кислород (O₂):</text><text x="435" y="263" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• 98% — связано с гемоглобином (HbO₂)</text><text x="435" y="277" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• 2% — растворено в плазме</text><text x="435" y="295" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Углекислый газ (CO₂):</text><text x="435" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• 70% — в виде HCO₃⁻ (бикарбонат)</text><text x="435" y="324" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• 23% — связано с Hb (карбгемоглобин)</text><rect x="20" y="345" width="380" height="110" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="210" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Газообмен в тканях</text><rect x="150" y="385" width="60" height="40" rx="8" fill="#FDE68A" stroke="#D97706" stroke-width="1.5"/><text x="180" y="408" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Клетка</text><path d="M110,395 L150,395" stroke="#EF4444" stroke-width="2.5"/><polygon points="150,395 142,390 142,400" fill="#EF4444"/><text x="85" y="393" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" font-weight="bold">O₂</text><path d="M210,405 L260,405" stroke="#3B82F6" stroke-width="2.5"/><polygon points="260,405 252,400 252,410" fill="#3B82F6"/><text x="265" y="403" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">CO₂</text><text x="55" y="425" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Кровь отдаёт O₂, забирает CO₂</text><text x="55" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">Артериальная → Венозная</text><rect x="420" y="345" width="365" height="110" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Регуляция дыхания</text><text x="435" y="388" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Нервная регуляция:</text><text x="435" y="403" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Дыхательный центр — продолговатый мозг</text><text x="435" y="417" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Рефлекторная дуга: рецепторы → ЦНС → мышцы</text><text x="435" y="435" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Гуморальная регуляция:</text><text x="435" y="450" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• CO₂ ↑ → дыхание учащается</text><rect x="20" y="468" width="765" height="118" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="400" y="488" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Важные факты о дыхании</text><text x="40" y="510" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Частота дыхания: 16-20 в минуту в покое</text><text x="40" y="526" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• За 1 вдох ~500 мл воздуха (дыхательный объём)</text><text x="40" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Вдыхаемый воздух: O₂=21%, CO₂=0,03%</text><text x="40" y="558" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Выдыхаемый воздух: O₂=16%, CO₂=4%</text><text x="450" y="510" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Гипервентиляция — избыток O₂, дефицит CO₂</text><text x="450" y="526" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Удушье — недостаток O₂, избыток CO₂</text><text x="450" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Искусственное дыхание — спасение при остановке</text><text x="450" y="558" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Дыхательная гимнастика укрепляет лёгкие</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 8</text></svg>