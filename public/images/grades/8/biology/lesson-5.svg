<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Строение сердца</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 8</text>
<rect x="20" y="72" width="370" height="370" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="205" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#065F46" font-weight="bold">Сердце человека</text><path d="M170,160 L170,220 Q130,220 130,180 Q130,140 160,140 Z" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/><path d="M240,160 L240,220 Q280,220 280,180 Q280,140 250,140 Z" fill="#FECACA" stroke="#EF4444" stroke-width="2"/><path d="M140,230 L170,230 L170,340 Q130,340 120,300 Q110,260 130,240 Z" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2"/><path d="M240,230 L270,230 L280,300 Q290,340 250,340 L240,340 Z" fill="#FCA5A5" stroke="#EF4444" stroke-width="2"/><line x1="205" y1="140" x2="205" y2="340" stroke="#1F2937" stroke-width="2" stroke-dasharray="4,2"/><ellipse cx="170" cy="228" rx="15" ry="5" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/><ellipse cx="240" cy="228" rx="15" ry="5" fill="#F59E0B" stroke="#D97706" stroke-width="1.5"/><line x1="160" y1="170" x2="100" y2="155" stroke="#059669" stroke-width="1.5"/><circle cx="100" cy="155" r="3" fill="#059669"/><text x="55" y="153" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">Правое предсердие</text><line x1="250" y1="170" x2="310" y2="155" stroke="#059669" stroke-width="1.5"/><circle cx="310" cy="155" r="3" fill="#059669"/><text x="310" y="153" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" font-weight="bold">Левое предсердие</text><line x1="140" y1="290" x2="75" y2="290" stroke="#059669" stroke-width="1.5"/><circle cx="75" cy="290" r="3" fill="#059669"/><text x="28" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">Правый желудочек</text><line x1="270" y1="290" x2="330" y2="290" stroke="#059669" stroke-width="1.5"/><circle cx="330" cy="290" r="3" fill="#059669"/><text x="330" y="293" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" font-weight="bold">Левый желудочек</text><line x1="170" y1="228" x2="90" y2="228" stroke="#059669" stroke-width="1.5"/><circle cx="90" cy="228" r="3" fill="#059669"/><text x="28" y="231" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#D97706" font-weight="bold">Трёхстворчатый клапан</text><line x1="240" y1="228" x2="325" y2="228" stroke="#059669" stroke-width="1.5"/><circle cx="325" cy="228" r="3" fill="#059669"/><text x="325" y="231" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#D97706" font-weight="bold">Двухстворчатый (митр.)</text><text x="205" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Перегородка</text><path d="M170,140 L155,110" stroke="#3B82F6" stroke-width="3"/><text x="130" y="108" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#3B82F6" font-weight="bold">Полая вена</text><path d="M240,140 L255,110" stroke="#EF4444" stroke-width="3"/><text x="260" y="108" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="bold">Лёгочные вены</text><path d="M140,240 L100,240 L100,350" stroke="#3B82F6" stroke-width="3"/><text x="55" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#3B82F6" font-weight="bold">Лёгочная артерия</text><path d="M270,240 L310,240 L310,350" stroke="#EF4444" stroke-width="3"/><text x="315" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="bold">Аорта</text><rect x="410" y="72" width="375" height="175" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="597" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Особенности строения</text><text x="425" y="115" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Стенка сердца — 3 слоя:</text><rect x="425" y="125" width="12" height="12" rx="2" fill="#FECACA" stroke="#EF4444" stroke-width="0.5"/><text x="442" y="135" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Эндокард (внутренний)</text><rect x="425" y="143" width="12" height="12" rx="2" fill="#FCA5A5" stroke="#EF4444" stroke-width="0.5"/><text x="442" y="153" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Миокард (средний, мышечный)</text><rect x="425" y="161" width="12" height="12" rx="2" fill="#FDE68A" stroke="#F59E0B" stroke-width="0.5"/><text x="442" y="171" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Эпикард (наружный)</text><text x="425" y="195" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Левый желудочек толще правого</text><text x="425" y="210" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(т.к. толкает кровь по большому кругу)</text><text x="425" y="228" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Перикард — околосердечная сумка</text><text x="425" y="243" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">с жидкостью для уменьшения трения</text><rect x="410" y="260" width="375" height="182" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="597" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Сердечный цикл</text><rect x="425" y="295" width="350" height="28" rx="4" fill="#D1FAE5"/><rect x="425" y="295" width="130" height="28" rx="4" fill="#10B981" opacity="0.4"/><rect x="555" y="295" width="140" height="28" rx="4" fill="#F59E0B" opacity="0.4"/><rect x="695" y="295" width="80" height="28" rx="4" fill="#3B82F6" opacity="0.3"/><text x="490" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Систола предс.</text><text x="625" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Систола желуд.</text><text x="735" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Диастола</text><text x="425" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">0,1 с + 0,3 с + 0,4 с = 0,8 с</text><text x="425" y="358" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">ЧСС в покое: 60-80 уд/мин</text><text x="425" y="375" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Автоматия сердца — способность</text><text x="425" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">сокращаться без внешних стимулов</text><text x="425" y="408" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Водитель ритма — синусно-предсердный узел</text><text x="425" y="423" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Проводящая система: СА-узел → АВ-узел → пучок Гиса → волокна Пуркинье</text><rect x="20" y="455" width="765" height="130" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="400" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Ключевые формулы</text><text x="40" y="498" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Минутный объём крови (МОК) = ЧСС × УО</text><text x="40" y="516" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Ударный объём (УО) ≈ 70 мл (в покое)</text><text x="40" y="534" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="normal">МОК = 70 × 70 = 4900 мл/мин ≈ 5 л/мин</text><text x="450" y="498" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">За сутки сердце перекачивает ~7000 л крови</text><text x="450" y="516" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Масса сердца: ~300 г (0,5% массы тела)</text><text x="450" y="534" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Клапаны обеспечивают односторонний ток крови</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 5</text></svg>