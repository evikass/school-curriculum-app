<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Строение скелета человека</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 8</text>
<ellipse cx="280" cy="130" rx="30" ry="35" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/><text x="280" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#D97706" font-weight="bold">Череп</text><rect x="275" y="165" width="10" height="130" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><line x1="273" y1="170" x2="287" y2="170" stroke="#D97706" stroke-width="1"/><line x1="273" y1="188" x2="287" y2="188" stroke="#D97706" stroke-width="1"/><line x1="273" y1="206" x2="287" y2="206" stroke="#D97706" stroke-width="1"/><line x1="273" y1="224" x2="287" y2="224" stroke="#D97706" stroke-width="1"/><line x1="273" y1="242" x2="287" y2="242" stroke="#D97706" stroke-width="1"/><line x1="273" y1="260" x2="287" y2="260" stroke="#D97706" stroke-width="1"/><line x1="273" y1="278" x2="287" y2="278" stroke="#D97706" stroke-width="1"/><path d="M240,200 Q280,230 240,270" fill="none" stroke="#D97706" stroke-width="2"/><path d="M260,195 Q280,225 260,265" fill="none" stroke="#D97706" stroke-width="2"/><path d="M300,200 Q280,230 300,270" fill="none" stroke="#D97706" stroke-width="2"/><path d="M300,195 Q280,225 300,265" fill="none" stroke="#D97706" stroke-width="2"/><ellipse cx="280" cy="305" rx="40" ry="20" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><line x1="250" y1="190" x2="210" y2="250" stroke="#D97706" stroke-width="3"/><line x1="210" y1="250" x2="190" y2="330" stroke="#D97706" stroke-width="3"/><line x1="310" y1="190" x2="350" y2="250" stroke="#D97706" stroke-width="3"/><line x1="350" y1="250" x2="370" y2="330" stroke="#D97706" stroke-width="3"/><line x1="265" y1="320" x2="255" y2="420" stroke="#D97706" stroke-width="3.5"/><line x1="255" y1="420" x2="250" y2="510" stroke="#D97706" stroke-width="3.5"/><line x1="295" y1="320" x2="305" y2="420" stroke="#D97706" stroke-width="3.5"/><line x1="305" y1="420" x2="310" y2="510" stroke="#D97706" stroke-width="3.5"/><line x1="310" y1="125" x2="370" y2="115" stroke="#059669" stroke-width="1.5"/><circle cx="370" cy="115" r="3" fill="#059669"/><text x="375" y="118" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Череп (22 кости)</text><line x1="287" y1="220" x2="350" y2="215" stroke="#059669" stroke-width="1.5"/><circle cx="350" cy="215" r="3" fill="#059669"/><text x="355" y="218" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Грудная клетка</text><line x1="287" y1="300" x2="350" y2="300" stroke="#059669" stroke-width="1.5"/><circle cx="350" cy="300" r="3" fill="#059669"/><text x="355" y="303" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Таз</text><line x1="210" y1="240" x2="160" y2="220" stroke="#059669" stroke-width="1.5"/><circle cx="160" cy="220" r="3" fill="#059669"/><text x="105" y="223" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Плечевая кость</text><line x1="370" y1="310" x2="420" y2="310" stroke="#059669" stroke-width="1.5"/><circle cx="420" cy="310" r="3" fill="#059669"/><text x="425" y="313" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Лучевая/Локтевая</text><line x1="305" y1="440" x2="360" y2="440" stroke="#059669" stroke-width="1.5"/><circle cx="360" cy="440" r="3" fill="#059669"/><text x="365" y="443" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Берцовые кости</text><line x1="275" y1="175" x2="160" y2="175" stroke="#059669" stroke-width="1.5"/><circle cx="160" cy="175" r="3" fill="#059669"/><text x="105" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Позвоночник (33-34 позвонка)</text><rect x="530" y="75" width="255" height="110" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><rect x="530" y="75" width="255" height="22" rx="6" fill="#059669"/><rect x="530" y="91" width="255" height="6" fill="#059669"/><text x="657.5" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Осевой скелет</text><text x="538" y="113" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Череп — защита мозга
• Позвоночник — опора тела
  (7 шейных, 12 грудных,
   5 поясничных, 5 крестцовых,
   4-5 копчиковых)
• Грудная клетка — защита органов</text><rect x="530" y="200" width="255" height="105" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><rect x="530" y="200" width="255" height="22" rx="6" fill="#065F46"/><rect x="530" y="216" width="255" height="6" fill="#065F46"/><text x="657.5" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Добавочный скелет</text><text x="538" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Пояс верхних конечностей
  (лопатки, ключицы)
• Свободные конечности
  (руки — 30 костей каждая)
• Пояс нижних конечностей (таз)
• Свободные конечности (ноги)</text><rect x="20" y="430" width="490" height="155" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="30" y="450" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#065F46" font-weight="bold">Ключевые факты:</text><text x="30" y="470" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937" font-weight="normal">• Скелет человека состоит из 206 костей</text><text x="30" y="488" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937" font-weight="normal">• Самая длинная кость — бедренная (~45 см)</text><text x="30" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937" font-weight="normal">• Самая маленькая — стремя в ухе (3 мм)</text><text x="30" y="524" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937" font-weight="normal">• Скелет составляет ~15% массы тела</text><text x="30" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937" font-weight="normal">• Функции: опора, защита, движение, кроветворение</text><text x="30" y="560" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937" font-weight="normal">• Соединения костей: неподвижные, полуподвижные, подвижные (суставы)</text><rect x="530" y="320" width="255" height="130" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="540" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Отделы позвоночника:</text><rect x="545" y="355" width="12" height="14" rx="2" fill="#7DD3FC" stroke="#6B7280" stroke-width="0.5"/><text x="563" y="366" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Шейный — 7 позвонков</text><rect x="545" y="375" width="12" height="14" rx="2" fill="#D1FAE5" stroke="#6B7280" stroke-width="0.5"/><text x="563" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Грудной — 12 позвонков</text><rect x="545" y="395" width="12" height="14" rx="2" fill="#FDE68A" stroke="#6B7280" stroke-width="0.5"/><text x="563" y="406" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Поясничный — 5 позвонков</text><rect x="545" y="415" width="12" height="14" rx="2" fill="#FECACA" stroke="#6B7280" stroke-width="0.5"/><text x="563" y="426" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Крестцовый — 5 позвонков</text><rect x="545" y="435" width="12" height="14" rx="2" fill="#E9D5FF" stroke="#6B7280" stroke-width="0.5"/><text x="563" y="446" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Копчиковый — 4-5 позвонков</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 1</text></svg>