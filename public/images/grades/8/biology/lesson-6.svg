t x="120" y="458" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Правый желудочек</text><text x="250" y="458" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Левый желудочек</text><line x1="30" y1="465" x2="390" y2="465" stroke="#E5E7EB" stroke-width="0.5"/><text x="35" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Конец</text><text x="120" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Левое предсердие</text><text x="250" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Правое предсердие</text><line x1="30" y1="485" x2="390" y2="485" stroke="#E5E7EB" stroke-width="0.5"/><text x="35" y="498" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Артерии несут</text><text x="120" y="498" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Венозную кровь</text><text x="250" y="498" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Артериальную кровь</text><line x1="30" y1="505" x2="390" y2="505" stroke="#E5E7EB" stroke-width="0.5"/><text x="35" y="518" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Вены несут</text><text x="120" y="518" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Артериальную кровь</text><text x="250" y="518" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">Венозную кровь</text><line x1="30" y1="525" x2="390" y2="525" stroke="#E5E7EB" stroke-width="0.5"/><text x="35" y="538" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Время</text><text x="120" y="538" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">~4-5 секунд</text><text x="250" y="538" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="normal">~20-25 секунд</text><rect x="420" y="385" width="365" height="200" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Типы кровеносных сосудов</text><rect x="435" y="420" width="340" height="24" rx="4" fill="#FECACA" opacity="0.5"/><text x="440" y="436" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Артерии — толстые стенки, нет клапанов, высокое давление, несут кровь от сердца</text><rect x="435" y="450" width="340" height="24" rx="4" fill="#DBEAFE" opacity="0.5"/><text x="440" y="466" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Вены — тонкие стенки, есть клапаны, низкое давление, несут кровь к сердцу</text><rect x="435" y="480" width="340" height="24" rx="4" fill="#D1FAE5" opacity="0.5"/><text x="440" y="496" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Капилляры — стенка 1 слой клеток, обмен O₂/CO₂ и веществ</text><text x="435" y="530" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Давление: 120/80 мм рт. ст. (норма)</text><text x="435" y="548" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Пульс — колебание стенки артерии</text><text x="435" y="566" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Скорость крови: аорта 0,5 м/с → капилляры 0,5 мм/с</text><text x="400" y="590" text-anchor="middle" 