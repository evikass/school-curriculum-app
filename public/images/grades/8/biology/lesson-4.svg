<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Состав крови</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 8</text>
<rect x="20" y="72" width="380" height="260" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="210" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#065F46" font-weight="bold">Состав крови</text><rect x="80" y="108" width="70" height="200" rx="5" fill="none" stroke="#1F2937" stroke-width="2"/><rect x="82" y="110" width="66" height="108" rx="3" fill="#FDE68A" opacity="0.7"/><text x="120" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Плазма</text><text x="120" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">55%</text><rect x="82" y="218" width="66" height="10" fill="#FFFFFF" stroke="#6B7280" stroke-width="0.5"/><rect x="82" y="228" width="66" height="78" rx="3" fill="#EF4444" opacity="0.8"/><text x="120" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Эритроциты</text><text x="120" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="normal">44%</text><text x="175" y="115" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Плазма крови (55%):</text><text x="175" y="132" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Вода — 90-92%</text><text x="175" y="146" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Белки: альбумины, глобулины,</text><text x="175" y="159" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">  фибриноген — 7%</text><text x="175" y="173" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Глюкоза, жиры, соли — 1-2%</text><text x="175" y="195" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Форменные элементы (45%):</text><circle cx="185" cy="218" r="7" fill="#EF4444" stroke="#D97706" stroke-width="0.5"/><text x="198" y="221" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Эритроциты (4-5·10¹²/л)</text><circle cx="185" cy="240" r="8" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/><circle cx="185" cy="240" r="4" fill="#3B82F6" opacity="0.5"/><text x="198" y="243" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Лейкоциты (4-9·10⁹/л)</text><circle cx="185" cy="260" r="4" fill="#E9D5FF" stroke="#8B5CF6" stroke-width="1"/><text x="198" y="263" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Тромбоциты (200-400·10⁹/л)</text><rect x="420" y="72" width="365" height="260" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#065F46" font-weight="bold">Форменные элементы крови</text><ellipse cx="462" cy="130" rx="22" ry="12" fill="#EF4444" stroke="#D97706" stroke-width="1.5"/><ellipse cx="462" cy="130" rx="8" ry="5" fill="#FCA5A5" stroke="none"/><text x="492" y="127" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Эритроцит</text><text x="492" y="141" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Двояковогнутый диск</text><text x="492" y="154" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Без ядра, содержит гемоглобин</text><text x="492" y="167" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Живёт ~120 дней</text><text x="492" y="180" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Функция: транспорт O₂ и CO₂</text><circle cx="462" cy="220" r="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/><circle cx="462" cy="220" r="8" fill="#3B82F6" opacity="0.4"/><text x="492" y="217" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Лейкоцит</text><text x="492" y="231" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Есть ядро, способен к движению</text><text x="492" y="244" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Виды: нейтрофилы, лимфоциты,</text><text x="492" y="257" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">моноциты, эозинофилы, базофилы</text><text x="492" y="270" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Функция: иммунитет, фагоцитоз</text><ellipse cx="462" cy="295" rx="10" ry="5" fill="#E9D5FF" stroke="#8B5CF6" stroke-width="1"/><text x="492" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Тромбоцит</text><text x="492" y="311" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Функция: свёртывание крови</text><rect x="20" y="345" width="385" height="240" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="212" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Гемоглобин и свёртывание</text><text x="35" y="388" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Гемоглобин (Hb):</text><text x="35" y="406" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Hb + O₂ → HbO₂ (оксигемоглобин)</text><text x="35" y="424" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">HbO₂ → Hb + O₂ (в тканях)</text><rect x="35" y="436" width="355" height="2" fill="#E5E7EB"/><text x="35" y="454" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Свёртывание крови:</text><text x="35" y="472" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">1. Повреждение сосуда</text><text x="35" y="488" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">2. Тромбоциты → тромбопластин</text><text x="35" y="504" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">3. Протромбин → тромбин</text><text x="35" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">4. Фибриноген → фибрин (нити)</text><text x="35" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">5. Формирование тромба (сгустка)</text><rect x="420" y="345" width="365" height="240" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Группы крови</text><rect x="435" y="388" width="16" height="16" rx="3" fill="#BBF7D0" stroke="#6B7280" stroke-width="0.5"/><text x="458" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">I (0)</text><text x="435" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Эритроциты: Нет агглютиногенов</text><text x="435" y="428" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Плазма: α и β агглютинины</text><rect x="435" y="440" width="16" height="16" rx="3" fill="#FDE68A" stroke="#6B7280" stroke-width="0.5"/><text x="458" y="452" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">II (A)</text><text x="435" y="467" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Эритроциты: Агглютиноген A</text><text x="435" y="480" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Плазма: β агглютинин</text><rect x="435" y="492" width="16" height="16" rx="3" fill="#BFDBFE" stroke="#6B7280" stroke-width="0.5"/><text x="458" y="504" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">III (B)</text><text x="435" y="519" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Эритроциты: Агглютиноген B</text><text x="435" y="532" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Плазма: α агглютинин</text><rect x="435" y="544" width="16" height="16" rx="3" fill="#FECACA" stroke="#6B7280" stroke-width="0.5"/><text x="458" y="556" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">IV (AB)</text><text x="435" y="571" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Эритроциты: A и B агглютиногены</text><text x="435" y="584" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Плазма: Нет агглютининов</text><text x="435" y="574" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Rh-фактор: D-антиген (+/-)</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 4</text></svg>