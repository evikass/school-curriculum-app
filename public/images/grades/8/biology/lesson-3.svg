<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Мышцы и их работа</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 8</text>
<rect x="20" y="72" width="245" height="230" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="142" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Виды мышечной ткани</text><rect x="40" y="108" width="80" height="25" rx="4" fill="#FCA5A5" stroke="#EF4444" stroke-width="1.5"/><line x1="50" y1="108" x2="50" y2="133" stroke="#EF4444" stroke-width="0.5" opacity="0.5"/><line x1="60" y1="108" x2="60" y2="133" stroke="#EF4444" stroke-width="0.5" opacity="0.5"/><line x1="70" y1="108" x2="70" y2="133" stroke="#EF4444" stroke-width="0.5" opacity="0.5"/><line x1="80" y1="108" x2="80" y2="133" stroke="#EF4444" stroke-width="0.5" opacity="0.5"/><line x1="90" y1="108" x2="90" y2="133" stroke="#EF4444" stroke-width="0.5" opacity="0.5"/><line x1="100" y1="108" x2="100" y2="133" stroke="#EF4444" stroke-width="0.5" opacity="0.5"/><line x1="110" y1="108" x2="110" y2="133" stroke="#EF4444" stroke-width="0.5" opacity="0.5"/><line x1="120" y1="108" x2="120" y2="133" stroke="#EF4444" stroke-width="0.5" opacity="0.5"/><text x="130" y="124" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Поперечнополосатая</text><text x="130" y="137" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(скелетная)</text><text x="40" y="153" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Произвольная, быстро утомляется</text><rect x="40" y="170" width="80" height="25" rx="4" fill="#BBF7D0" stroke="#10B981" stroke-width="1.5"/><ellipse cx="55" cy="183" rx="8" ry="10" fill="none" stroke="#10B981" stroke-width="0.8"/><ellipse cx="75" cy="183" rx="8" ry="10" fill="none" stroke="#10B981" stroke-width="0.8"/><ellipse cx="95" cy="183" rx="8" ry="10" fill="none" stroke="#10B981" stroke-width="0.8"/><ellipse cx="115" cy="183" rx="8" ry="10" fill="none" stroke="#10B981" stroke-width="0.8"/><text x="130" y="186" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Гладкая</text><text x="130" y="199" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(непроизвольная)</text><text x="40" y="215" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Непроизвольная, медленная</text><rect x="40" y="232" width="80" height="25" rx="4" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/><path d="M52,245 L58,237 L64,245 L70,237 L76,245" fill="none" stroke="#D97706" stroke-width="1"/><path d="M77,245 L83,237 L89,245 L95,237 L101,245" fill="none" stroke="#D97706" stroke-width="1"/><path d="M102,245 L108,237 L114,245 L120,237 L126,245" fill="none" stroke="#D97706" stroke-width="1"/><text x="130" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Сердечная</text><text x="130" y="261" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(непроизвольная)</text><text x="40" y="277" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Непроизвольная, неутомимая</text><rect x="280" y="72" width="505" height="230" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="532" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Механизм сокращения мышцы</text><rect x="310" y="115" width="150" height="35" rx="6" fill="#FCA5A5" stroke="#EF4444" stroke-width="1.5"/><rect x="300" y="120" width="15" height="25" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/><rect x="455" y="120" width="15" height="25" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/><text x="385" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Расслабленная</text><path d="M385,158 L385,178" stroke="#10B981" stroke-width="2" marker-end="url(#arrow)"/><polygon points="385,183 380,175 390,175" fill="#10B981"/><rect x="330" y="190" width="110" height="50" rx="6" fill="#EF4444" stroke="#EF4444" stroke-width="2"/><rect x="300" y="203" width="15" height="25" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/><rect x="455" y="203" width="15" height="25" rx="3" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/><text x="385" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" font-weight="normal">Сокращённая</text><text x="560" y="115" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Саркомер:</text><rect x="540" y="125" width="180" height="20" rx="3" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/><rect x="540" y="125" width="45" height="20" rx="3" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1"/><rect x="675" y="125" width="45" height="20" rx="3" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1"/><rect x="600" y="128" width="60" height="14" rx="2" fill="#FCA5A5" stroke="#EF4444" stroke-width="1"/><text x="560" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3B82F6" font-weight="normal">Актин</text><text x="630" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#EF4444" font-weight="normal">Миозин</text><text x="697" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3B82F6" font-weight="normal">Актин</text><text x="510" y="170" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Этапы сокращения:</text><text x="510" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">1. Нервный импульс → мышца</text><text x="510" y="204" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">2. Высвобождение Ca²⁺ из саркоплазматич. ретикулума</text><text x="510" y="220" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">3. Миозин связывается с актином</text><text x="510" y="236" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">4. Головки миозина совершают «гребок»</text><text x="510" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">5. Актиновые нити сближаются</text><text x="510" y="268" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">6. Мышца укорачивается (сокращение)</text><rect x="20" y="315" width="385" height="270" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="212" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Основные мышцы человека</text><text x="35" y="358" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Голова и шея:</text><text x="35" y="372" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">мимические, жевательные, грудино-ключично-сосцевидная</text><text x="35" y="394" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Туловище:</text><text x="35" y="408" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">трапециевидная, широчайшая спины, грудные, пресс</text><text x="35" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Руки:</text><text x="35" y="444" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">дельтовидная, бицепс, трицепс, сгибатели/разгибатели</text><text x="35" y="466" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Ноги:</text><text x="35" y="480" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">ягодичные, четырёхглавая, икроножная, камбаловидная</text><text x="35" y="510" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Правило рычага:</text><text x="35" y="526" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Кость = рычаг, сустав = точка опоры,</text><text x="35" y="540" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">мышца = сила, груз = сопротивление</text><text x="35" y="558" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Движение — результат работы мышц-антагонистов</text><text x="35" y="574" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(сгибатели + разгибатели)</text><rect x="420" y="315" width="365" height="270" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Работа мышц</text><text x="435" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Энергия сокращения:</text><text x="435" y="378" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">АТФ → АДФ + энергия</text><rect x="435" y="390" width="335" height="2" fill="#E5E7EB"/><text x="435" y="408" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Динамическая работа:</text><text x="435" y="424" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Изотоническое сокращение (длина меняется)</text><text x="435" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Изометрическое сокращение (длина постоянна)</text><rect x="435" y="452" width="335" height="2" fill="#E5E7EB"/><text x="435" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Утомление мышцы:</text><text x="435" y="484" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Накопление молочной кислоты</text><text x="435" y="498" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Истощение запасов АТФ и гликогена</text><text x="435" y="512" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Отдых восстанавливает работоспособность</text><rect x="435" y="524" width="335" height="2" fill="#E5E7EB"/><text x="435" y="540" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#EF4444" font-weight="bold">Гиподинамия — недостаток движений</text><text x="435" y="556" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">→ ослабление мышц, нарушение осанки</text><text x="435" y="572" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#10B981" font-weight="bold">Тренировка → гипертрофия мышц</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 3</text></svg>