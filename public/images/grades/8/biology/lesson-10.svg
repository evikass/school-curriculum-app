<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Пищеварение в кишечнике</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 8</text>
<rect x="20" y="72" width="380" height="310" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="210" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Пищеварительный тракт</text><path d="M140,115 Q120,115 120,145 L120,175 Q120,195 140,195 L175,195 Q195,195 195,175 L195,125 Q195,115 175,115 Z" fill="#FECACA" stroke="#EF4444" stroke-width="1.5"/><text x="157" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1F2937" font-weight="bold">Желудок</text><path d="M195,180 Q230,180 240,200 Q250,220 240,240 Q230,260 210,260 Q190,260 185,250" fill="none" stroke="#F97316" stroke-width="4"/><text x="260" y="220" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#F97316" font-weight="normal">12-перстная</text><text x="260" y="233" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#F97316" font-weight="normal">кишка</text><path d="M60,200 Q50,200 50,220 L50,280 Q50,310 80,310 L130,310 Q160,310 160,280 L160,220 Q160,200 140,200 Z" fill="#8B5CF6" opacity="0.3" stroke="#8B5CF6" stroke-width="1.5"/><text x="105" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B5CF6" font-weight="bold">Печень</text><ellipse cx="155" cy="305" rx="10" ry="14" fill="#4ADE80" stroke="#10B981" stroke-width="1"/><text x="170" y="308" text-anchor="start" font-family="Arial, sans-serif" font-size="7" fill="#059669" font-weight="normal">Жёлчный пузырь</text><ellipse cx="185" cy="280" rx="35" ry="10" fill="#FDE68A" stroke="#D97706" stroke-width="1.5" transform="rotate(-30 185 280)"/><text x="225" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#D97706" font-weight="normal">Поджелудочная</text><path d="M90,330 Q105,325 120,330" fill="none" stroke="#10B981" stroke-width="2"/><path d="M120,336 Q135,331 150,336" fill="none" stroke="#10B981" stroke-width="2"/><path d="M90,342 Q105,337 120,342" fill="none" stroke="#10B981" stroke-width="2"/><path d="M120,348 Q135,343 150,348" fill="none" stroke="#10B981" stroke-width="2"/><path d="M90,354 Q105,349 120,354" fill="none" stroke="#10B981" stroke-width="2"/><path d="M120,360 Q135,355 150,360" fill="none" stroke="#10B981" stroke-width="2"/><path d="M90,366 Q105,361 120,366" fill="none" stroke="#10B981" stroke-width="2"/><path d="M120,372 Q135,367 150,372" fill="none" stroke="#10B981" stroke-width="2"/><text x="210" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#059669" font-weight="normal">Тонкий кишечник</text><text x="210" y="375" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(3-5 м)</text><path d="M80,320 L60,320 L55,340 L55,370 L60,385 L330,385 L335,370 L335,340 L330,320" fill="none" stroke="#8B5CF6" stroke-width="3"/><text x="195" y="378" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#8B5CF6" font-weight="normal">Толстый кишечник (1,5-2 м)</text><rect x="420" y="72" width="365" height="175" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Ферменты тонкого кишечника</text><rect x="435" y="113" width="8" height="14" rx="2" fill="#10B981" opacity="0.5"/><text x="450" y="124" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Амилаза: Крахмал → Мальтоза</text><rect x="435" y="135" width="8" height="14" rx="2" fill="#10B981" opacity="0.5"/><text x="450" y="146" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Мальтаза: Мальтоза → Глюкоза</text><rect x="435" y="157" width="8" height="14" rx="2" fill="#F97316" opacity="0.5"/><text x="450" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Липаза: Жиры → Глицерин + Жирные к-ты</text><rect x="435" y="179" width="8" height="14" rx="2" fill="#EF4444" opacity="0.5"/><text x="450" y="190" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Трипсин: Белки → Аминокислоты</text><rect x="435" y="201" width="8" height="14" rx="2" fill="#EF4444" opacity="0.5"/><text x="450" y="212" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Пептидаза: Пептиды → Аминокислоты</text><text x="435" y="233" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#065F46" font-weight="normal">Панкреатический сок + жёлчь + кишечный сок</text><rect x="420" y="260" width="365" height="122" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Печень и поджелудочная</text><text x="435" y="300" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#8B5CF6" font-weight="bold">Печень — крупнейшая железа (1,5 кг):</text><text x="435" y="315" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Жёлчь — эмульгация жиров</text><text x="435" y="329" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Обезвреживание токсинов</text><text x="435" y="343" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Хранение гликогена, витаминов</text><text x="435" y="360" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#D97706" font-weight="bold">Поджелудочная железа:</text><text x="435" y="374" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Панкреатический сок (ферменты + бикарбонат)</text><rect x="20" y="395" width="380" height="190" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="210" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Всасывание в кишечнике</text><path d="M80,450 L90,430 L100,450" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/><path d="M110,450 L120,420 L130,450" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/><path d="M140,450 L150,425 L160,450" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/><path d="M170,450 L180,430 L190,450" fill="#D1FAE5" stroke="#10B981" stroke-width="1.5"/><rect x="70" y="450" width="130" height="15" rx="3" fill="#FDE68A" stroke="#D97706" stroke-width="1"/><text x="135" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#1F2937" font-weight="normal">Стенка кишечника</text><line x1="120" y1="420" x2="215" y2="420" stroke="#059669" stroke-width="1.5"/><circle cx="215" cy="420" r="3" fill="#059669"/><text x="220" y="418" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="bold">Ворсинка</text><text x="220" y="432" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">(увеличивает площадь)</text><text x="35" y="480" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Всасываются:</text><text x="35" y="496" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Аминокислоты, глюкоза → в кровь</text><text x="35" y="510" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Глицерин + жирные к-ты → в лимфу</text><text x="35" y="524" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Витамины, минеральные вещества</text><text x="35" y="540" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="normal">Площадь всасывания: ~200 м²</text><text x="35" y="556" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Ворсинок: ~4-5 млн в тонком кишечнике</text><rect x="420" y="395" width="365" height="190" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Толстый кишечник</text><text x="435" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Функции:</text><text x="435" y="456" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Всасывание воды и минеральных солей</text><text x="435" y="470" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Формирование каловых масс</text><text x="435" y="484" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Микрофлора (E. coli и др.):</text><text x="435" y="498" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">  — синтез витаминов K, B</text><text x="435" y="512" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">  — подавление гнилостных бактерий</text><rect x="435" y="524" width="335" height="2" fill="#E5E7EB"/><text x="435" y="540" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Аппендикс — червеобразный отросток</text><text x="435" y="554" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#EF4444" font-weight="normal">Аппендицит — воспаление аппендикса</text><text x="435" y="570" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#F97316" font-weight="normal">Дисбактериоз — нарушение микрофлоры</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 10</text></svg>