<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ECFDF5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="8"/>
  <rect x="0" y="30" width="800" height="30" fill="url(#headerGrad)"/>
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Пищеварение в ротовой полости и желудке</text>
  <!-- Lesson badge -->
  <rect x="12" y="68" width="90" height="24" rx="12" fill="#10B981" opacity="0.9"/>
  <text x="57" y="84" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">Биология 8</text>
<rect x="20" y="72" width="385" height="240" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="212" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Ротовая полость</text><path d="M120,130 Q210,110 300,130 L290,200 Q210,210 130,200 Z" fill="#FECDD3" stroke="#EF4444" stroke-width="1.5"/><path d="M130,130 L135,155 L170,155 L175,130" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/><path d="M245,130 L250,155 L285,155 L290,130" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/><ellipse cx="210" cy="175" rx="50" ry="15" fill="#F87171" stroke="#EF4444" stroke-width="1"/><ellipse cx="140" cy="115" rx="20" ry="10" fill="#FDE68A" stroke="#D97706" stroke-width="1"/><ellipse cx="280" cy="115" rx="20" ry="10" fill="#FDE68A" stroke="#D97706" stroke-width="1"/><path d="M280,125 L260,140" stroke="#D97706" stroke-width="1" stroke-dasharray="3,2"/><path d="M140,125 L160,140" stroke="#D97706" stroke-width="1" stroke-dasharray="3,2"/><line x1="140" y1="115" x2="85" y2="110" stroke="#059669" stroke-width="1.5"/><circle cx="85" cy="110" r="3" fill="#059669"/><text x="40" y="113" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#D97706" font-weight="bold">Слюнные железы</text><line x1="210" y1="175" x2="85" y2="175" stroke="#059669" stroke-width="1.5"/><circle cx="85" cy="175" r="3" fill="#059669"/><text x="40" y="178" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#D97706" font-weight="bold">Язык (вкусовые рецепторы)</text><line x1="155" y1="145" x2="85" y2="145" stroke="#059669" stroke-width="1.5"/><circle cx="85" cy="145" r="3" fill="#059669"/><text x="40" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#D97706" font-weight="bold">Зубы (механическая обработка)</text><text x="40" y="215" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Слюна: муцин + амилаза + лизоцим</text><text x="40" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Механическая + химическая обработка</text><text x="40" y="247" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Формирование пищевого комка → глотание</text><rect x="420" y="72" width="365" height="240" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#065F46" font-weight="bold">Желудок</text><path d="M540,130 Q500,130 500,180 L500,260 Q500,290 540,290 L640,290 Q680,290 680,260 L680,160 Q680,130 640,130 Z" fill="#FECACA" stroke="#EF4444" stroke-width="2"/><path d="M510,145 Q510,270 530,280 L650,280 Q670,270 670,145" fill="none" stroke="#E5A0A0" stroke-width="1" stroke-dasharray="3,2"/><rect x="555" y="122" width="40" height="10" rx="3" fill="#F59E0B" stroke="#D97706" stroke-width="1"/><rect x="545" y="288" width="50" height="10" rx="3" fill="#F59E0B" stroke="#D97706" stroke-width="1"/><text x="575" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#D97706" font-weight="normal">Кардиальный сфинктер</text><text x="570" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#D97706" font-weight="normal">Пилорический сфинктер</text><rect x="515" y="170" width="30" height="60" rx="5" fill="#FDE68A" stroke="#D97706" stroke-width="1"/><text x="552" y="200" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#D97706" font-weight="normal">Железы желудка</text><rect x="20" y="325" width="385" height="260" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="212" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Ферменты ротовой полости</text><text x="35" y="370" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Амилаза (птиалин):</text><text x="35" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Крахмал → Мальтоза (дисахарид)</text><text x="35" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Условие: t=37°C, pH ≈ 6,8 (слабокислая)</text><rect x="35" y="410" width="355" height="2" fill="#E5E7EB"/><text x="35" y="425" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Мальтаза:</text><text x="35" y="441" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Мальтоза → Глюкоза</text><rect x="35" y="451" width="355" height="2" fill="#E5E7EB"/><text x="35" y="466" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Лизоцим:</text><text x="35" y="482" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Антибактериальное действие</text><text x="35" y="496" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">Разрушает клеточную стенку бактерий</text><rect x="35" y="506" width="355" height="2" fill="#E5E7EB"/><text x="35" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Зубы: резцы, клыки, малые/большие коренные</text><text x="35" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Молочные: 20 зубов, Постоянные: 32 зуба</text><text x="35" y="555" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">Формула зуба: I-C-P-M</text><rect x="420" y="325" width="365" height="260" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="602" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Ферменты желудка</text><text x="435" y="370" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Состав желудочного сока:</text><text x="435" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Пепсин — расщепляет белки</text><text x="435" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">  Белки → Пептоны + Альбумозы</text><text x="435" y="416" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Соляная кислота (HCl):</text><text x="435" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">  — активирует пепсиноген → пепсин</text><text x="435" y="444" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">  — создаёт pH ≈ 1,5-2,0</text><text x="435" y="458" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">  — обеззараживает пищу</text><text x="435" y="474" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Липаза — расщепляет жиры молока</text><text x="435" y="488" text-anchor="start" font-family="Arial, sans-serif" font-size="8" fill="#6B7280" font-weight="normal">  (в желудке жиры почти не перевариваются)</text><text x="435" y="504" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">• Слизь — защита стенки желудка</text><rect x="435" y="516" width="335" height="2" fill="#E5E7EB"/><text x="435" y="530" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#065F46" font-weight="normal">Время нахождения пищи: 4-8 часов</text><text x="435" y="546" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Объём желудка: 1,5-2 литра</text><text x="435" y="562" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="normal">Перистальтика — волнообразные сокращения</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 9</text></svg>