"237" cy="123" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><ellipse cx="200" cy="260" rx="55" ry="20" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/><circle cx="165" cy="256" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><circle cx="165" cy="264" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><circle cx="183" cy="256" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><circle cx="183" cy="264" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><circle cx="201" cy="256" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><circle cx="201" cy="264" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><circle cx="219" cy="256" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><circle cx="219" cy="264" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><circle cx="237" cy="256" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><circle cx="237" cy="264" r="3" fill="none" stroke="#D97706" stroke-width="0.8"/><line x1="96" y1="125" x2="55" y2="110" stroke="#059669" stroke-width="1.5"/><circle cx="55" cy="110" r="3" fill="#059669"/><text x="10" y="113" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Надкостница</text><line x1="100" y1="137" x2="55" y2="137" stroke="#059669" stroke-width="1.5"/><circle cx="55" cy="137" r="3" fill="#059669"/><text x="10" y="140" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Компактное вещество</text><line x1="120" y1="190" x2="55" y2="170" stroke="#059669" stroke-width="1.5"/><circle cx="55" cy="170" r="3" fill="#059669"/><text x="10" y="173" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Губчатое вещество</text><line x1="200" y1="260" x2="55" y2="260" stroke="#059669" stroke-width="1.5"/><circle cx="55" cy="260" r="3" fill="#059669"/><text x="10" y="263" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#065F46" font-weight="bold">Эпифиз</text><line x1="200" y1="190" x2="200" y2="290" stroke="#059669" stroke-width="1.5"/><circle cx="200" cy="290" r="3" fill="#059669"/><text x="200" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Диафиз</text><rect x="400" y="72" width="385" height="260" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="592" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#065F46" font-weight="bold">Виды костей</text><rect x="420" y="115" width="20" height="70" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><ellipse cx="430" cy="115" rx="12" ry="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><ellipse cx="430" cy="185" rx="12" ry="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="448" y="155" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Трубчатые</text><text x="448" y="168" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(бедренная, плечевая)</text><rect x="420" y="200" width="25" height="25" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="448" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Короткие</text><text x="448" y="229" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(запястные, предплюсны)</text><rect x="415" y="242" width="35" height="10" rx="2" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="448" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Плоские</text><text x="448" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(лопатка, рёбра, череп)</text><path d="M600,115 L615,130 L625,125 L640,140 L630,155 L610,150 L600,115Z" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="650" y="135" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Смешанные</text><text x="650" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(позвонки)</text><rect x="598" y="185" width="30" height="28" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><ellipse cx="608" cy="199" rx="5" ry="6" fill="#E0F2FE" stroke="#6B7280" stroke-width="0.5"/><ellipse cx="620" cy="196" rx="4" ry="5" fill="#E0F2FE" stroke="#6B7280" stroke-width="0.5"/><text x="638" y="203" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Воздухоносные</text><text x="638" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(клиновидная, решётчатая)</text><ellipse cx="610" cy="255" rx="8" ry="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="626" y="258" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="bold">Сесамовидные</text><text x="626" y="271" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#6B7280" font-weight="normal">(надколенник)</text><rect x="20" y="345" width="765" height="240" rx="6" fill="#FFFFFF" stroke="#10B981" stroke-width="1.5" filter="url(#shadow)"/><text x="400" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#065F46" font-weight="bold">Химический состав кости</text><circle cx="160" cy="470" r="70" fill="#10B981" opacity="0.3"/><path d="M160,470 L160,400 A70,70 0 0,1 227,490 Z" fill="#10B981" opacity="0.7"/><text x="120" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Органические</text><text x="120" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">вещества</text><text x="120" y="461" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">~30%</text><text x="195" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">Неорганические</text><text x="195" y="503" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1F2937" font-weight="bold">вещества ~70%</text><text x="270" y="395" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Органические вещества (белки — оссеин, коллаген):</text><text x="270" y="413" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Придают кости упругость и эластичность</text><text x="270" y="433" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Неорганические вещества (соли Ca, P):</text><text x="270" y="451" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Придают кости твёрдость и прочность</text><text x="270" y="475" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#065F46" font-weight="bold">Свойства кости:</text><text x="270" y="493" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• У детей — больше органических, кости гибкие</text><text x="270" y="509" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• У пожилых — больше неорганических, кости хрупкие</text><text x="270" y="533" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">• Оптимальное соотношение — прочность + упругость</text><text x="270" y="555" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Остеоны — структурные единицы компактного вещества</text><text x="270" y="571" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#1F2937" font-weight="normal">Клетки: остеоциты, остеобласты, остеокласты</text><text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280" font-weight="normal">Урок 2</text></svg>