<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Modal Verbs: Can, Could, Must</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Модальные глаголы: возможность, разрешение, обязанность</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формула / Formation</text><line x1="20" y1="103" x2="172" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="750" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="395" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#3B82F6">can/could/must</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#DC2626">V</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="20" y="162" width="245" height="200" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="8" /><text x="142" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#3B82F6" font-weight="bold">CAN</text><text x="142" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">могу, умею</text><text x="30" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Ability (способность)</text><text x="30" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  I can swim.</text><text x="30" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Permission (разрешение)</text><text x="30" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  Can I go home?</text><text x="30" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Request (просьба)</text><text x="30" y="325" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  Can you help me?</text><text x="30" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Past: could</text><rect x="278" y="162" width="245" height="200" fill="#FEF9C3" stroke="#EA580C" stroke-width="2" rx="8" /><text x="400" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#EA580C" font-weight="bold">COULD</text><text x="400" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">мог, мог бы</text><text x="288" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Past ability (способность)</text><text x="288" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  I could read at 5.</text><text x="288" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Polite request</text><text x="288" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  Could you help me?</text><text x="288" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Possibility</text><text x="288" y="325" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  It could be true.</text><text x="288" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Более вежливая форма can</text><rect x="536" y="162" width="245" height="200" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="8" /><text x="658" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#DC2626" font-weight="bold">MUST</text><text x="658" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6B7280">должен, обязан</text><text x="546" y="225" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Obligation (обязанность)</text><text x="546" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  I must do homework.</text><text x="546" y="265" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Strong advice</text><text x="546" y="285" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  You must see a doctor.</text><text x="546" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">• Prohibition (mustn't)</text><text x="546" y="325" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  You mustn't smoke here.</text><text x="546" y="348" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#DC2626">Mustn't = запрещено!</text><text x="20" y="380" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Отрицание / Negative Forms</text><line x1="20" y1="383" x2="228" y2="383" stroke="#3B82F6" stroke-width="1.5" /><text x="20" y="400" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1F2937">can → cannot (formal) / can't (informal)</text><text x="20" y="420" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1F2937">could → couldn't</text><text x="20" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">must → mustn't (= prohibition, НЕ «не обязан»)</text><text x="20" y="460" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#3B82F6" font-weight="bold">Не обязан = don't have to / needn't</text><rect x="20" y="480" width="750" height="40" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="498" r="12" fill="#DC2626" /><text x="38" y="503" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="502" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Важно!</text><text x="32" y="524" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Модальные глаголы НЕ меняют форму (нет -s, -ed, -ing) и после них всегда V (без to)!</text><text x="20" y="535" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="538" x2="164" y2="538" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="551" r="9" fill="#3B82F6" /><text x="30" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="555" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">She can speak three languages.</text><text x="46" y="571" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Она может говорить на 3 языках.</text><circle cx="410" cy="551" r="9" fill="#3B82F6" /><text x="410" y="555" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="426" y="555" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Must I wear a uniform? — Yes, you must.</text><text x="426" y="571" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я должен носить форму?</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 8</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 8/15</text></svg>