<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Daily Routine</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Распорядок дня — лексика и фразы</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Утро / Morning</text><line x1="20" y1="103" x2="132" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="180" height="36" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="6" /><text x="110" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">wake up</text><text x="110" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">просыпаться</text><rect x="210" y="112" width="180" height="36" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="6" /><text x="300" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">get up</text><text x="300" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">вставать</text><rect x="400" y="112" width="180" height="36" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="6" /><text x="490" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">brush teeth</text><text x="490" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6