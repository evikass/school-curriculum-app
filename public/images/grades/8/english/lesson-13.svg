36" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="6" /><text x="300" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">study</text><text x="300" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">учиться</text><rect x="400" y="259" width="180" height="36" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="6" /><text x="490" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">meet friends</text><text x="490" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">встречать друзей</text><rect x="590" y="259" width="180" height="36" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="6" /><text x="680" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">play sports</text><text x="680" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">заниматься спортом</text><text x="20" y="310" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Вечер / Evening &amp;amp; Night</text><line x1="20" y1="313" x2="204" y2="313" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="322" width="180" height="36" fill="#E0E7FF" stroke="#6366F1" stroke-width="1" rx="6" /><text x="110" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">have dinner</text><text x="110" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">ужинать</text><rect x="210" y="322" width="180" height="36" fill="#E0E7FF" stroke="#6366F1" stroke-width="1" rx="6" /><text x="300" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">watch TV</text><text x="300" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">смотреть ТВ</text><rect x="400" y="322" width="180" height="36" fill="#E0E7FF" stroke="#6366F1" stroke-width="1" rx="6" /><text x="490" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">read a book</text><text x="490" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">читать книгу</text><rect x="590" y="322" width="180" height="36" fill="#E0E7FF" stroke="#6366F1" stroke-width="1" rx="6" /><text x="680" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">take a bath</text><text x="680" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">принять ванну</text><rect x="20" y="364" width="180" height="36" fill="#E0E7FF" stroke="#6366F1" stroke-width="1" rx="6" /><text x="110" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">go to bed</text><text x="110" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">ложиться спать</text><rect x="210" y="364" width="180" height="36" fill="#E0E7FF" stroke="#6366F1" stroke-width="1" rx="6" /><text x="300" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">fall asleep</text><text x="300" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">засыпать</text><rect x="400" y="364" width="180" height="36" fill="#E0E7FF" stroke="#6366F1" stroke-width="1" rx="6" /><text x="490" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">set the alarm</text><text x="490" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">поставить будильник</text><rect x="590" y="364" width="180" height="36" fill="#E0E7FF" stroke="#6366F1" stroke-width="1" rx="6" /><text x="680" y="379" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">chat online</text><text x="680" y="394" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B7280">общаться онлайн</text><text x="20" y="415" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Полезные фразы / Useful Phrases</text><line x1="20" y1="418" x2="268" y2="418" stroke="#3B82F6" stroke-width="1.5" /><text x="20" y="438" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I usually wake up at 7 am.</text><text x="20" y="456" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Я обычно просыпаюсь в 7 утра.</text><text x="400" y="438" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">After school, I do my homework.</text><text x="400" y="456" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">После школы я делаю домашнее задание.</text><text x="20" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Before going to bed, I read for 30 min.</text><text x="20" y="496" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Перед сном я читаю 30 минут.</text><text x="400" y="478" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">My day starts early and ends late.</text><text x="400" y="496" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Мой день начинается рано и заканчивается поздно.</text><rect x="20" y="520" width="750" height="45" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="538" r="12" fill="#DC2626" /><text x="38" y="543" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Время суток / Time of Day</text><text x="32" y="564" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">in the morning / in the afternoon / in the evening / at night / at noon / at midnight</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 13</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 13/15</text></svg>