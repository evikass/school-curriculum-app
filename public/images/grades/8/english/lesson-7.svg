<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">To be going to</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Конструкция «собираться сделать»</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формула образования / Formation</text><line x1="20" y1="103" x2="268" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="355" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="197" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#3B82F6">am/is/are going to</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#DC2626">V</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="390" y="112" width="380" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="580" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#DC2626">am/is/are not going to</tspan><tspan fill="#3B82F6"> + V</tspan></text><rect x="20" y="156" width="750" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="395" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">Am/Is/Are</tspan><tspan fill="#DC2626"> + S + going to</tspan><tspan fill="#3B82F6"> + V</tspan><tspan fill="#6B7280"> ...?</tspan></text><text x="20" y="210" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Когда использовать / When to use</text><line x1="20" y1="213" x2="276" y2="213" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="223" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="241" r="12" fill="#DC2626" /><text x="38" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">1. Планы и намерения</text><text x="32" y="267" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I am going to study medicine. We are going to travel.</text><rect x="410" y="223" width="370" height="55" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="428" cy="241" r="12" fill="#DC2626" /><text x="428" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="446" y="245" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">2. Предсказания по признакам</text><text x="422" y="267" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Look at the clouds! It is going to rain.</text><text x="20" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Will vs Going to — разница / Difference</text><line x1="20" y1="301" x2="332" y2="301" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="310" width="370" height="100" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="30" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#3B82F6" font-weight="bold">WILL</text><text x="30" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1F2937">• Спонтанное решение</text><text x="30" y="368" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1F2937">• Предсказание без доказательств</text><text x="30" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">• I'll answer the phone!</text><rect x="410" y="310" width="370" height="100" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" rx="6" /><text x="420" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="16" fill="#16A34A" font-weight="bold">GOING TO</text><text x="420" y="350" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1F2937">* Запланированное действие</text><text x="420" y="368" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1F2937">* Предсказание по признакам</text><text x="420" y="386" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">* I'm going to visit my grandma.</text><text x="20" y="428" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="431" x2="164" y2="431" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="446" r="9" fill="#3B82F6" /><text x="30" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="450" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I am going to buy a new phone.</text><text x="46" y="466" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я собираюсь купить новый телефон.</text><circle cx="30" cy="476" r="9" fill="#3B82F6" /><text x="30" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="480" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">She isn't going to come.</text><text x="46" y="496" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Она не собирается приходить.</text><circle cx="410" cy="446" r="9" fill="#3B82F6" /><text x="410" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="426" y="450" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Are you going to study tonight?</text><text x="426" y="466" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Ты собираешься учиться вечером?</text><circle cx="410" cy="476" r="9" fill="#3B82F6" /><text x="410" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="480" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">He is going to fix the car.</text><text x="426" y="496" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Он собирается починить машину.</text><rect x="20" y="518" width="750" height="45" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="536" r="12" fill="#DC2626" /><text x="38" y="541" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="540" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Запомни!</text><text x="32" y="562" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Going to всегда требует формуку глагола to be (am/is/are) и НЕ меняет V на V-ing!</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 7</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 7/15</text></svg>