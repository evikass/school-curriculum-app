<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Past Simple</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Прошедшее простое время</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формула образования / Formation</text><line x1="20" y1="103" x2="268" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="240" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="140" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#3B82F6">V2 / V-ed</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="270" y="112" width="250" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="395" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#DC2626">did not</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#3B82F6">V</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="530" y="112" width="240" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="650" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">Did</tspan><tspan fill="#DC2626"> + S + </tspan><tspan fill="#3B82F6">V</tspan><tspan fill="#6B7280"> + ...?</tspan></text><text x="20" y="165" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Маркеры времени / Time Markers</text><line x1="20" y1="168" x2="260" y2="168" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="175" width="175" height="24" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="12" /><text x="107" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">yesterday</text><rect x="210" y="175" width="175" height="24" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="12" /><text x="297" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">last week</text><rect x="400" y="175" width="175" height="24" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="12" /><text x="487" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">last month</text><rect x="590" y="175" width="175" height="24" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="12" /><text x="677" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">last year</text><rect x="20" y="205" width="175" height="24" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="12" /><text x="107" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">ago</text><rect x="210" y="205" width="175" height="24" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="12" /><text x="297" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">in 2020</text><rect x="400" y="205" width="175" height="24" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="12" /><text x="487" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">the other day</text><rect x="590" y="205" width="175" height="24" fill="#FEF9C3" stroke="#EA580C" stroke-width="1" rx="12" /><text x="677" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">then</text><text x="20" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Regular vs Irregular Verbs</text><line x1="20" y1="251" x2="228" y2="251" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="261" width="690" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" /><text x="80" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Тип</text><text x="230" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Правило</text><text x="515" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Пример</text><rect x="20" y="289" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="308" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Regular</text><text x="148" y="308" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">+ed</text><text x="328" y="308" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">work → worked, play → played</text><rect x="20" y="317" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Regular (e)</text><text x="148" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">+d</text><text x="328" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">like → liked, live → lived</text><rect x="20" y="345" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="364" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Regular (y)</text><text x="148" y="364" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">-y +ied</text><text x="328" y="364" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">study → studied, cry → cried</text><rect x="20" y="373" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Irregular</text><text x="148" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">особая форма</text><text x="328" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">go → went, see → saw, eat → ate</text><text x="20" y="385" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Спряжение глагола WORK / Conjugation</text><line x1="20" y1="388" x2="308" y2="388" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="398" width="690" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" /><text x="85" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold" /><text x="245" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Утверждение +</text><text x="435" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Отрицание −</text><text x="620" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Вопрос ?</text><rect x="20" y="426" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I/He/She/It</text><text x="158" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I worked</text><text x="348" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I didn't work</text><text x="538" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Did I work?</text><rect x="20" y="454" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We/You/They</text><text x="158" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We worked</text><text x="348" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We didn't work</text><text x="538" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Did we work?</text><text x="20" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="471" x2="164" y2="471" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="486" r="9" fill="#3B82F6" /><text x="30" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">We visited Paris last summer.</text><text x="46" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Мы посетили Париж прошлым летом.</text><circle cx="30" cy="516" r="9" fill="#3B82F6" /><text x="30" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">She didn't go to school yesterday.</text><text x="46" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Она не пошла в школу вчера.</text><circle cx="410" cy="486" r="9" fill="#3B82F6" /><text x="410" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="426" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Did you watch the movie?</text><text x="426" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Ты смотрел фильм?</text><circle cx="410" cy="516" r="9" fill="#3B82F6" /><text x="410" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">He bought a new car two days ago.</text><text x="426" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Он купил машину два дня назад.</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 4</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 4/15</text></svg>