<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Future Simple</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Будущее простое время</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формула образования / Formation</text><line x1="20" y1="103" x2="268" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="240" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="140" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#3B82F6">will</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#DC2626">V</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="270" y="112" width="260" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="400" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#DC2626">will not (won't)</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#3B82F6">V</tspan></text><rect x="540" y="112" width="230" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="655" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">Will</tspan><tspan fill="#DC2626"> + S + </tspan><tspan fill="#3B82F6">V</tspan><tspan fill="#6B7280"> ...?</tspan></text><text x="20" y="165" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Маркеры времени / Time Markers</text><line x1="20" y1="168" x2="260" y2="168" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="175" width="175" height="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="12" /><text x="107" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">tomorrow</text><rect x="210" y="175" width="175" height="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="12" /><text x="297" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">next week</text><rect x="400" y="175" width="175" height="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="12" /><text x="487" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">next month</text><rect x="590" y="175" width="175" height="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="12" /><text x="677" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">next year</text><rect x="20" y="205" width="175" height="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="12" /><text x="107" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">soon</text><rect x="210" y="205" width="175" height="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="12" /><text x="297" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">in 2025</text><rect x="400" y="205" width="175" height="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="12" /><text x="487" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">the day after tomorrow</text><rect x="590" y="205" width="175" height="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="1" rx="12" /><text x="677" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">in the future</text><text x="20" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Случаи использования / When to use</text><line x1="20" y1="251" x2="292" y2="251" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="261" width="370" height="48" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="279" r="12" fill="#DC2626" /><text x="38" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="283" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">1. Спонтанные решения</text><text x="32" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">The phone is ringing. — I'll answer it!</text><rect x="410" y="261" width="370" height="48" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="428" cy="279" r="12" fill="#DC2626" /><text x="428" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="446" y="283" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">2. Предсказания</text><text x="422" y="305" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">It will rain tomorrow. / You will be fine.</text><rect x="20" y="318" width="370" height="48" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="336" r="12" fill="#DC2626" /><text x="38" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">3. Обещания</text><text x="32" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I will help you with homework.</text><rect x="410" y="318" width="370" height="48" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="428" cy="336" r="12" fill="#DC2626" /><text x="428" y="341" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="446" y="340" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">4. Предложения/просьбы</text><text x="422" y="362" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Will you open the window? / Shall we go?</text><text x="20" y="385" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Спряжение / Conjugation</text><line x1="20" y1="388" x2="204" y2="388" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="398" width="690" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" /><text x="85" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold" /><text x="245" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Утверждение +</text><text x="435" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Отрицание −</text><text x="620" y="417" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Вопрос ?</text><rect x="20" y="426" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I/He/She/It</text><text x="158" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I will go</text><text x="348" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">I won't go</text><text x="538" y="445" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Will I go?</text><rect x="20" y="454" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We/You/They</text><text x="158" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We will go</text><text x="348" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We won't go</text><text x="538" y="473" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Will we go?</text><text x="20" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="471" x2="164" y2="471" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="486" r="9" fill="#3B82F6" /><text x="30" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I will call you tomorrow.</text><text x="46" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я позвоню тебе завтра.</text><circle cx="30" cy="516" r="9" fill="#3B82F6" /><text x="30" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">She won't come to the party.</text><text x="46" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Она не придёт на вечеринку.</text><circle cx="410" cy="486" r="9" fill="#3B82F6" /><text x="410" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="426" y="490" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Will you help me?</text><text x="426" y="506" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Ты поможешь мне?</text><circle cx="410" cy="516" r="9" fill="#3B82F6" /><text x="410" y="520" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">We will win the game!</text><text x="426" y="536" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Мы выиграем игру!</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 6</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 6/15</text></svg>