<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Conditionals: Zero &amp;amp; First</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Условные предложения: Нулевой и Первый тип</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><rect x="20" y="85" width="380" height="230" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="8" /><text x="210" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#3B82F6" font-weight="bold">ZERO CONDITIONAL</text><text x="210" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Нулевое условное (общие истины)</text><rect x="30" y="138" width="360" height="32" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="210" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">If + </tspan><tspan fill="#3B82F6">Present Simple</tspan><tspan fill="#6B7280">, </tspan><tspan fill="#3B82F6">Present Simple</tspan></text><text x="40" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#DC2626" font-weight="bold">Условие (If)</text><text x="40" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">If you heat water to 100°C,</text><text x="40" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">If people don't eat,</text><text x="220" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6" font-weight="bold">Результат</text><text x="220" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">it boils.</text><text x="220" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">they get hungry.</text><text x="40" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">= Когда/Если — всегда так!</text><rect x="410" y="85" width="370" height="230" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" rx="8" /><text x="595" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#16A34A" font-weight="bold">FIRST CONDITIONAL</text><text x="595" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Первое условное (реальные)</text><rect x="420" y="138" width="350" height="32" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="595" y="162" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">If + </tspan><tspan fill="#3B82F6">Present Simple</tspan><tspan fill="#6B7280">, </tspan><tspan fill="#3B82F6">Future Simple</tspan></text><text x="430" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#DC2626" font-weight="bold">Условие (If)</text><text x="430" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">If it rains tomorrow,</text><text x="430" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">If you study hard,</text><text x="610" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#16A34A" font-weight="bold">Результат</text><text x="610" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">we will stay home.</text><text x="610" y="224" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F">you will pass the exam.</text><text x="430" y="252" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">= Реальная возможность в будущем</text><text x="20" y="335" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Важные правила / Important Rules</text><line x1="20" y1="338" x2="276" y2="338" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="348" width="370" height="50" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="366" r="12" fill="#DC2626" /><text x="38" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="370" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">НЕ ставьте WILL после IF!</text><text x="32" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">If it will rain — WRONG! / If it rains — CORRECT!</text><rect x="410" y="348" width="370" height="50" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="428" cy="366" r="12" fill="#DC2626" /><text x="428" y="371" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="446" y="370" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Порядок частей можно менять</text><text x="422" y="392" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">We will stay home if it rains. (без запятой)</text><text x="20" y="418" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="421" x2="164" y2="421" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="436" r="9" fill="#3B82F6" /><text x="30" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">If you freeze water, it becomes ice.</text><text x="46" y="456" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Если заморозить воду, она станет льдом. (Zero)</text><circle cx="30" cy="466" r="9" fill="#3B82F6" /><text x="30" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="470" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">If she calls, I will tell her.</text><text x="46" y="486" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Если она позвонит, я ей скажу. (First)</text><circle cx="30" cy="496" r="9" fill="#3B82F6" /><text x="30" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="46" y="500" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Plants die if they don't get water.</text><text x="46" y="516" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Растения гибнут без воды. (Zero)</text><circle cx="410" cy="436" r="9" fill="#3B82F6" /><text x="410" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="440" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">If we hurry, we will catch the bus.</text><text x="426" y="456" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Если поторопимся, успеем на автобус. (First)</text><circle cx="410" cy="466" r="9" fill="#3B82F6" /><text x="410" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">5</text><text x="426" y="470" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">If you mix red and blue, you get purple.</text><text x="426" y="486" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Если смешать красный и синий — фиолетовый. (Zero)</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 11</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 11/15</text></svg>