<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Present Continuous</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Настоящее длительное время</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формула образования / Formation</text><line x1="20" y1="103" x2="268" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="355" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="197" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#3B82F6">am/is/are</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#DC2626">V-ing</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="390" y="112" width="380" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="580" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#DC2626">am/is/are + not</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#3B82F6">V-ing</tspan></text><rect x="20" y="156" width="750" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="395" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">Am/Is/Are</tspan><tspan fill="#DC2626"> + S + </tspan><tspan fill="#3B82F6">V-ing</tspan><tspan fill="#6B7280"> + ...?</tspan></text><text x="20" y="210" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Маркеры времени / Time Markers</text><line x1="20" y1="213" x2="260" y2="213" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="220" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="107" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">now</text><rect x="210" y="220" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="297" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">right now</text><rect x="400" y="220" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="487" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">at the moment</text><rect x="590" y="220" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="677" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">currently</text><rect x="20" y="250" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="107" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">Look!</text><rect x="210" y="250" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="297" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">Listen!</text><rect x="400" y="250" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="487" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">today</text><rect x="590" y="250" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="677" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">this week</text><text x="20" y="295" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Правила правописания -ing / Spelling Rules</text><line x1="20" y1="298" x2="356" y2="298" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="308" width="690" height="28" fill="#3B82F6" stroke="#3B82F6" stroke-width="2" rx="0" /><text x="135" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Правило</text><text x="480" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" font-weight="bold">Пример</text><rect x="20" y="336" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="355" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Общее: +ing</text><text x="258" y="355" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">work → working, play → playing</text><rect x="20" y="364" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="383" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Немая -e: drop e + ing</text><text x="258" y="383" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">make → making, write → writing</text><rect x="20" y="392" width="690" height="28" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="411" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Удвоение согласной</text><text x="258" y="411" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">run → running, swim → swimming</text><rect x="20" y="420" width="690" height="28" fill="#DBEAFE" stroke="#CBD5E1" stroke-width="1" rx="0" /><text x="28" y="439" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Конец -ie → y + ing</text><text x="258" y="439" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">lie → lying, die → dying</text><text x="20" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="433" x2="164" y2="433" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="448" r="9" fill="#3B82F6" /><text x="30" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="452" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I am reading a book now.</text><text x="46" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я сейчас читаю книгу.</text><circle cx="30" cy="478" r="9" fill="#3B82F6" /><text x="30" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="46" y="482" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">She is not sleeping at the moment.</text><text x="46" y="498" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Она не спит в данный момент.</text><circle cx="410" cy="448" r="9" fill="#3B82F6" /><text x="410" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="426" y="452" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Are they playing football?</text><text x="426" y="468" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Они играют в футбол?</text><circle cx="410" cy="478" r="9" fill="#3B82F6" /><text x="410" y="482" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="482" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Look! It is raining!</text><text x="426" y="498" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Смотри! Идёт дождь!</text><rect x="20" y="520" width="750" height="45" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="538" r="12" fill="#DC2626" /><text x="38" y="543" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Запомни!</text><text x="32" y="564" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Stative verbs (know, like, want, love) НЕ используются в Present Continuous!</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 2</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 2/15</text></svg>