<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Reading Strategies</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Стратегии чтения — skimming, scanning, intensive</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><rect x="20" y="85" width="245" height="240" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2" rx="8" /><text x="142" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#3B82F6" font-weight="bold">SKIMMING</text><text x="142" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Просмотровое чтение</text><text x="30" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937" font-weight="bold">Цель: Общее понимание</text><text x="30" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Get the gist / main idea</text><text x="30" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6" font-weight="bold">Как:</text><text x="30" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Read title &amp;amp; headings</text><text x="30" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Read first &amp;amp; last paragraphs</text><text x="30" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Read first sentence of each</text><text x="30" y="254" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  paragraph (topic sentence)</text><text x="30" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#3B82F6" font-weight="bold">Скорость: Быстро!</text><text x="30" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">~300+ words/min</text><rect x="278" y="85" width="245" height="240" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" rx="8" /><text x="400" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#16A34A" font-weight="bold">SCANNING</text><text x="400" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Поисковое чтение</text><text x="288" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937" font-weight="bold">Цель: Найти конкретную инфо</text><text x="288" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Find specific information</text><text x="288" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#16A34A" font-weight="bold">Как:</text><text x="288" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Know what you're looking for</text><text x="288" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Don't read every word</text><text x="288" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Look for keywords, names,</text><text x="288" y="254" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">  dates, numbers</text><text x="288" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#16A34A" font-weight="bold">Скорость: Очень быстро!</text><text x="288" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">~500+ words/min</text><rect x="536" y="85" width="245" height="240" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="8" /><text x="658" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#DC2626" font-weight="bold">INTENSIVE</text><text x="658" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Изучающее чтение</text><text x="546" y="148" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937" font-weight="bold">Цель: Полное понимание</text><text x="546" y="166" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">Detailed comprehension</text><text x="546" y="188" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#DC2626" font-weight="bold">Как:</text><text x="546" y="206" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Read every word carefully</text><text x="546" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Understand grammar &amp;amp; vocab</text><text x="546" y="238" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Take notes, underline</text><text x="546" y="254" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">* Look up unknown words</text><text x="546" y="274" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#DC2626" font-weight="bold">Скорость: Медленно</text><text x="546" y="292" text-anchor="start" font-family="Arial, sans-serif" font-size="10" fill="#6B7280">~50-100 words/min</text><text x="20" y="345" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Советы для эффективного чтения / Reading Tips</text><line x1="20" y1="348" x2="380" y2="348" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="350" width="760" height="22" fill="#FEF9C3" stroke="#CBD5E1" stroke-width="1" rx="4" /><text x="30" y="364" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">1. Before reading: Look at the title, headings, images — predict the content.</text><rect x="20" y="374" width="760" height="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4" /><text x="30" y="388" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">2. While reading: Highlight unknown words, but don't stop at every word.</text><rect x="20" y="398" width="760" height="22" fill="#FEF9C3" stroke="#CBD5E1" stroke-width="1" rx="4" /><text x="30" y="412" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">3. After reading: Summarize the main idea in your own words.</text><rect x="20" y="422" width="760" height="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4" /><text x="30" y="436" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">4. Use context clues to guess meaning of new words.</text><rect x="20" y="446" width="760" height="22" fill="#FEF9C3" stroke="#CBD5E1" stroke-width="1" rx="4" /><text x="30" y="460" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">5. Read regularly — 15-20 minutes every day in English!</text><rect x="20" y="470" width="760" height="22" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1" rx="4" /><text x="30" y="484" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1E3A5F">6. Choose texts at your level — not too easy, not too hard.</text><text x="20" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Когда какую стратегию? / Which Strategy?</text><line x1="20" y1="523" x2="340" y2="523" stroke="#3B82F6" stroke-width="1.5" /><text x="20" y="542" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6">Skimming: newspaper article, book review, brochure</text><text x="20" y="560" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#16A34A">Scanning: timetable, dictionary, phone book, menu</text><text x="20" y="578" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#DC2626">Intensive: textbook, exam text, legal document, poem</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 15</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 15/15</text></svg>