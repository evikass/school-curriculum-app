<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#3B82F6" /></marker></defs><rect width="800" height="600" fill="#F3F4F6" rx="0" /><rect x="0" y="0" width="800" height="70" fill="#3B82F6" /><text x="400" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Past Continuous</text><text x="400" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#BFDBFE">Прошедшее длительное время</text><rect x="0" y="70" width="800" height="3" fill="#DC2626" /><text x="20" y="100" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Формула образования / Formation</text><line x1="20" y1="103" x2="268" y2="103" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="112" width="355" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="197" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#3B82F6">was/were</tspan><tspan fill="#6B7280"> + </tspan><tspan fill="#DC2626">V-ing</tspan><tspan fill="#6B7280"> + ...</tspan></text><rect x="390" y="112" width="380" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="580" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">S + </tspan><tspan fill="#DC2626">was/were + not</tspan><tspan fill="#3B82F6"> + V-ing</tspan></text><rect x="20" y="156" width="750" height="36" fill="#FEF9C3" stroke="#3B82F6" stroke-width="2" rx="6" /><text x="395" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold"><tspan fill="#DC2626">Was/Were</tspan><tspan fill="#DC2626"> + S + </tspan><tspan fill="#3B82F6">V-ing</tspan><tspan fill="#6B7280"> + ...?</tspan></text><text x="20" y="210" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Маркеры времени / Time Markers</text><line x1="20" y1="213" x2="260" y2="213" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="220" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="107" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">at 5 pm yesterday</text><rect x="210" y="220" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="297" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">at that time</text><rect x="400" y="220" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="487" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">while</text><rect x="590" y="220" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="677" y="237" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">when</text><rect x="20" y="250" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="107" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">all day</text><rect x="210" y="250" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="297" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">from 2 to 4</text><rect x="400" y="250" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="487" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">as</text><rect x="590" y="250" width="175" height="24" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="12" /><text x="677" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1E3A5F" font-weight="bold">the whole evening</text><text x="20" y="295" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Past Continuous + Past Simple / Комбинация</text><line x1="20" y1="298" x2="356" y2="298" stroke="#3B82F6" stroke-width="1.5" /><rect x="20" y="308" width="750" height="48" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" rx="6" /><circle cx="38" cy="326" r="12" fill="#DC2626" /><text x="38" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">!</text><text x="56" y="330" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#DC2626" font-weight="bold">Когда использовать / When to use</text><text x="32" y="352" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#1F2937">Действие происходило в определённый момент в прошлом / было прервано другим действием</text><rect x="20" y="370" width="370" height="100" fill="#FEF9C3" stroke="#EA580C" stroke-width="2" rx="6" /><text x="30" y="388" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#EA580C" font-weight="bold">Длительное действие (Past Continuous):</text><rect x="50" y="400" width="250" height="18" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="4" /><text x="175" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6">was reading</text><line x1="180" y1="398" x2="180" y2="460" stroke="#DC2626" stroke-width="2" stroke-dasharray="4" /><text x="200" y="430" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#DC2626" font-weight="bold">phone rang (Past Simple)</text><text x="20" y="485" text-anchor="start" font-family="Arial, sans-serif" font-size="15" fill="#3B82F6" font-weight="bold">Примеры / Examples</text><line x1="20" y1="488" x2="164" y2="488" stroke="#3B82F6" stroke-width="1.5" /><circle cx="30" cy="501" r="9" fill="#3B82F6" /><text x="30" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">1</text><text x="46" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">I was reading when the phone rang.</text><text x="46" y="521" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Я читал, когда зазвонил телефон.</text><circle cx="410" cy="501" r="9" fill="#3B82F6" /><text x="410" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">2</text><text x="426" y="505" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">They were playing all evening.</text><text x="426" y="521" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Они играли весь вечер.</text><circle cx="30" cy="531" r="9" fill="#3B82F6" /><text x="30" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">3</text><text x="46" y="535" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">She wasn't sleeping at midnight.</text><text x="46" y="551" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Она не спала в полночь.</text><circle cx="410" cy="531" r="9" fill="#3B82F6" /><text x="410" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">4</text><text x="426" y="535" text-anchor="start" font-family="Arial, sans-serif" font-size="13" fill="#1E3A5F">Were you watching TV at 8 pm?</text><text x="426" y="551" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#6B7280">Ты смотрел ТВ в 8 вечера?</text><rect x="0" y="570" width="800" height="30" fill="#1E3A5F" /><text x="20" y="590" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Grade 8 | English | Lesson 5</text><text x="780" y="590" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Lesson 5/15</text></svg>