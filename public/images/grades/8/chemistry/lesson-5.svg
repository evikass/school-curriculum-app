  <text x="60" y="527" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#1E1B4B">Электропровод.</text>
  <text x="210" y="527" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#EF4444">Расплавы, р-ры</text>
