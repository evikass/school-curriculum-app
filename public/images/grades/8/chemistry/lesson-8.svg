<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F5F3FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EDE9FE;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5B21B6" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#5B21B6" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="50" cy="550" r="60" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="400" cy="600" r="100" fill="#A78BFA" opacity="0.04"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="0"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Окислительно-восстановительные реакции</text>
  <!-- Small decorative line under header -->
  <rect x="300" y="54" width="200" height="3" fill="#C4B5FD" rx="1.5" opacity="0.7"/>
  <rect x="20" y="75" width="760" height="100" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="100" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Основные понятия</text>
  <rect x="40" y="112" width="360" height="55" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="55" y="130" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Окислитель — принимает электроны</text>
  <text x="55" y="148" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">(степень окисления понижается)</text>
  <rect x="415" y="112" width="350" height="55" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="430" y="130" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">Восстановитель — отдаёт электроны</text>
  <text x="430" y="148" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">(степень окисления повышается)</text>
  <text x="400" y="178" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#5B21B6">Окислитель + e⁻ → восстановление    |    Восстановитель - e⁻ → окисление</text>
  <rect x="20" y="185" width="380" height="200" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="210" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Степень окисления (правила)</text>
  <text x="45" y="230" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">1. Элементы: с.о. = 0 (Na, O₂, Cl₂)</text>
  <text x="45" y="252" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#3B82F6">2. H: +1 (кроме гидридов: -1)</text>
  <text x="45" y="274" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#EF4444">3. O: -2 (кроме пероксидов: -1, OF₂)</text>
  <text x="45" y="296" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#F59E0B">4. Щелочные металлы (IA): +1</text>
  <text x="45" y="318" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#10B981">5. Щёлочноземельные (IIA): +2</text>
  <text x="45" y="340" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#06B6D4">6. Al: +3, F: -1</text>
  <text x="45" y="362" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#5B21B6">7. Сумма с.о. в молекуле = 0</text>
  <rect x="410" y="185" width="370" height="200" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="430" y="210" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Пример: Fe₂O₃ + CO</text>
  <text x="430" y="235" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#5B21B6">Fe₂⁺³O₃⁻²  +  C⁺²O⁻²  →  Fe⁰  +  C⁺⁴O₂⁻²</text>
  <rect x="430" y="250" width="165" height="55" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="445" y="268" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#10B981">Восстановитель: C⁺² → C⁺⁴</text>
  <text x="445" y="284" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#10B981">C⁺² - 2e⁻ → C⁺⁴ (окисление)</text>
  <rect x="605" y="250" width="165" height="55" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="620" y="268" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#EF4444">Окислитель: Fe⁺³ → Fe⁰</text>
  <text x="620" y="284" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#EF4444">Fe⁺³ + 3e⁻ → Fe⁰ (восст.)</text>
  <rect x="430" y="315" width="340" height="50" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" rx="8"/>
  <text x="445" y="335" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#F59E0B">Электронный баланс:</text>
  <text x="445" y="353" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#F59E0B">Fe⁺³ + 3e⁻ → Fe⁰  | x2</text>
  <text x="445" y="367" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#F59E0B">C⁺² - 2e⁻ → C⁺⁴  | x3</text>
  <rect x="20" y="395" width="760" height="175" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="420" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Пример: MnO₂ + HCl</text>
  <text x="400" y="448" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#5B21B6">MnO₂ + 4HCl → MnCl₂ + Cl₂ + 2H₂O</text>
  <rect x="40" y="460" width="350" height="50" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="55" y="478" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">Восстановитель: Cl⁻ → Cl⁰</text>
  <text x="55" y="496" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#10B981">2Cl⁻ - 2e⁻ → Cl₂⁰ (окисление)</text>
  <rect x="410" y="460" width="350" height="50" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="425" y="478" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Окислитель: Mn⁺⁴ → Mn⁺²</text>
  <text x="425" y="496" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#EF4444">Mn⁺⁴ + 2e⁻ → Mn⁺² (восстановление)</text>
  <rect x="40" y="520" width="720" height="40" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1" rx="8"/>
  <text x="400" y="544" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" font-weight="bold" fill="#7C3AED">Запомни: Окислитель ВОССТАНАВЛИВАЕТСЯ, Восстановитель ОКИСЛЯЕТСЯ!</text>
  <!-- Footer -->
  <rect x="0" y="580" width="800" height="20" fill="#7C3AED" opacity="0.1"/>
  <text x="400" y="594" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">Химия — 8 класс</text>
</svg>