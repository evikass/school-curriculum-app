<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F5F3FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EDE9FE;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5B21B6" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#5B21B6" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="50" cy="550" r="60" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="400" cy="600" r="100" fill="#A78BFA" opacity="0.04"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="0"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Состав атома</text>
  <!-- Small decorative line under header -->
  <rect x="300" y="54" width="200" height="3" fill="#C4B5FD" rx="1.5" opacity="0.7"/>
  <rect x="20" y="75" width="360" height="310" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="100" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Модель атома</text>
  <circle cx="200" cy="260" r="35" fill="#5B21B6" opacity="0.25"/>
  <circle cx="200" cy="260" r="25" fill="#5B21B6" opacity="0.4"/>
  <circle cx="200" cy="260" r="15" fill="#5B21B6" opacity="0.6"/>
  <circle cx="192" cy="253" r="7" fill="#EF4444" opacity="0.8"/>
  <circle cx="208" cy="253" r="7" fill="#3B82F6" opacity="0.8"/>
  <circle cx="200" cy="267" r="7" fill="#EF4444" opacity="0.8"/>
  <circle cx="192" cy="267" r="7" fill="#3B82F6" opacity="0.8"/>
  <circle cx="200" cy="260" r="65" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="200" cy="260" r="100" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="5,3"/>
  <circle cx="200" cy="195" r="6" fill="#10B981"/>
  <circle cx="200" cy="325" r="6" fill="#10B981"/>
  <circle cx="300" cy="260" r="6" fill="#10B981"/>
  <circle cx="100" cy="260" r="6" fill="#10B981"/>
  <text x="200" y="290" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#FFFFFF">Ядро</text>
  <text x="255" y="195" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#10B981">e⁻ (электрон)</text>
  <text x="130" y="260" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#7C3AED">Электронные</text>
  <text x="130" y="273" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#7C3AED">оболочки</text>
  <circle cx="55" cy="355" r="6" fill="#EF4444"/>
  <text x="68" y="359" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">p⁺ (протон)</text>
  <circle cx="55" cy="375" r="6" fill="#3B82F6"/>
  <text x="68" y="379" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3B82F6">n⁰ (нейтрон)</text>
  <circle cx="220" cy="355" r="6" fill="#10B981"/>
  <text x="233" y="359" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">e⁻ (электрон)</text>
  <rect x="400" y="75" width="380" height="310" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="420" y="100" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Частицы атома</text>
  <rect x="420" y="115" width="340" height="28" fill="#5B21B6" stroke="#5B21B6" stroke-width="1" rx="8"/>
  <text x="440" y="134" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#FFFFFF">Частица</text>
  <text x="540" y="134" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#FFFFFF">Заряд</text>
  <text x="640" y="134" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#FFFFFF">Масса</text>
  <rect x="420" y="148" width="340" height="28" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" rx="8"/>
  <text x="440" y="167" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Протон (p)</text>
  <text x="540" y="167" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">+1</text>
  <text x="640" y="167" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">1 а.е.м.</text>
  <rect x="420" y="181" width="340" height="28" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1" rx="8"/>
  <text x="440" y="200" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3B82F6">Нейтрон (n)</text>
  <text x="540" y="200" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3B82F6">0</text>
  <text x="640" y="200" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3B82F6">1 а.е.м.</text>
  <rect x="420" y="214" width="340" height="28" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1" rx="8"/>
  <text x="440" y="233" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">Электрон (e)</text>
  <text x="540" y="233" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">-1</text>
  <text x="640" y="233" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">1/1836</text>
  <text x="420" y="265" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Ключевые формулы</text>
  <rect x="420" y="275" width="340" height="30" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" rx="8"/>
  <text x="590" y="295" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#F59E0B">Z = число протонов = порядковый номер</text>
  <rect x="420" y="310" width="340" height="30" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1" rx="8"/>
  <text x="590" y="330" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#7C3AED">N = Ar - Z  (число нейтронов)</text>
  <rect x="420" y="345" width="340" height="30" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" rx="8"/>
  <text x="590" y="365" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="bold" fill="#EF4444">Атом электронейтрален: p⁺ = e⁻</text>
  <rect x="20" y="400" width="760" height="170" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="425" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Изотопы</text>
  <text x="40" y="445" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#6B7280">Изотопы — атомы одного элемента с разным числом нейтронов</text>
  <rect x="40" y="455" width="220" height="55" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1" rx="8"/>
  <text x="150" y="478" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#EF4444">¹H (протий)</text>
  <text x="60" y="500" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">p=1, n=0</text>
  <rect x="270" y="455" width="220" height="55" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" rx="8"/>
  <text x="380" y="478" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#F59E0B">²H (дейтерий)</text>
  <text x="290" y="500" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">p=1, n=1</text>
  <rect x="500" y="455" width="220" height="55" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1" rx="8"/>
  <text x="610" y="478" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#3B82F6">³H (тритий)</text>
  <text x="520" y="500" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">p=1, n=2</text>
  <rect x="40" y="520" width="720" height="40" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1" rx="8"/>
  <text x="400" y="544" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#7C3AED">Химические свойства изотопов одинаковы, физические — различаются</text>
  <!-- Footer -->
  <rect x="0" y="580" width="800" height="20" fill="#7C3AED" opacity="0.1"/>
  <text x="400" y="594" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">Химия — 8 класс</text>
</svg>