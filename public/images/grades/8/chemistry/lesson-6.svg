<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE9FE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F5F3FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5B21B6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#EDE9FE;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#5B21B6" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#5B21B6" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="750" cy="50" r="80" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="50" cy="550" r="60" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="400" cy="600" r="100" fill="#A78BFA" opacity="0.04"/>
  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="60" fill="url(#headerGrad)" rx="0"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF">Электроотрицательность</text>
  <!-- Small decorative line under header -->
  <rect x="300" y="54" width="200" height="3" fill="#C4B5FD" rx="1.5" opacity="0.7"/>
  <rect x="20" y="75" width="760" height="80" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="100" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Определение</text>
  <text x="40" y="120" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#6B7280">Электроотрицательность (ЭО) — способность атома притягивать к себе</text>
  <text x="40" y="136" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#6B7280">электронную плотность при образовании химической связи.</text>
  <text x="400" y="150" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#5B21B6">Шкала Полинга (1960)</text>
  <rect x="20" y="165" width="420" height="260" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="190" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Значения ЭО (шкала Полинга)</text>
  <rect x="40" y="210" width="44" height="50" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="62" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#10B981">H</text>
  <text x="62" y="245" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">2,1</text>
  <rect x="88" y="210" width="44" height="50" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="110" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#EF4444">Li</text>
  <text x="110" y="245" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">1,0</text>
  <rect x="136" y="210" width="44" height="50" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="158" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#EF4444">Be</text>
  <text x="158" y="245" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">1,5</text>
  <rect x="184" y="210" width="44" height="50" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="206" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#10B981">B</text>
  <text x="206" y="245" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">2,0</text>
  <rect x="232" y="210" width="44" height="50" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="254" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#10B981">C</text>
  <text x="254" y="245" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">2,5</text>
  <rect x="280" y="210" width="44" height="50" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="302" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#10B981">N</text>
  <text x="302" y="245" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">3,0</text>
  <rect x="328" y="210" width="44" height="50" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="8"/>
  <text x="350" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#3B82F6">O</text>
  <text x="350" y="245" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">3,5</text>
  <rect x="376" y="210" width="44" height="50" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="8"/>
  <text x="398" y="228" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="13" fill="#3B82F6">F</text>
  <text x="398" y="245" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">4,0</text>
  <rect x="40" y="270" width="44" height="50" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="62" y="288" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Na</text>
  <text x="62" y="305" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">0,9</text>
  <rect x="88" y="270" width="44" height="50" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="110" y="288" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Mg</text>
  <text x="110" y="305" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">1,2</text>
  <rect x="136" y="270" width="44" height="50" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" rx="8"/>
  <text x="158" y="288" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#F59E0B">Al</text>
  <text x="158" y="305" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">1,5</text>
  <rect x="184" y="270" width="44" height="50" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="206" y="288" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">Si</text>
  <text x="206" y="305" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">1,8</text>
  <rect x="232" y="270" width="44" height="50" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="254" y="288" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">P</text>
  <text x="254" y="305" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">2,1</text>
  <rect x="280" y="270" width="44" height="50" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="302" y="288" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">S</text>
  <text x="302" y="305" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">2,5</text>
  <rect x="328" y="270" width="44" height="50" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="8"/>
  <text x="350" y="288" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3B82F6">Cl</text>
  <text x="350" y="305" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">3,0</text>
  <text x="40" y="340" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#EF4444">Мин. ЭО</text>
  <text x="40" y="355" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">Ме: 0,7-1,5</text>
  <text x="150" y="340" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#10B981">Средн. ЭО</text>
  <text x="150" y="355" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">НеМе: 2,0-2,5</text>
  <text x="280" y="340" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#3B82F6">Макс. ЭО</text>
  <text x="280" y="355" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">Галогены: 3,0-4,0</text>
  <rect x="450" y="165" width="330" height="260" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="470" y="190" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Закономерности ЭО</text>
  <rect x="470" y="205" width="290" height="55" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1" rx="8"/>
  <text x="485" y="225" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">В периоде (вправо):</text>
  <text x="485" y="245" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#3B82F6">ЭО увеличивается →</text>
  <rect x="470" y="270" width="290" height="55" fill="#EDE9FE" stroke="#A78BFA" stroke-width="1" rx="8"/>
  <text x="485" y="290" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#7C3AED">В группе (вниз):</text>
  <text x="485" y="310" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">ЭО уменьшается ↓</text>
  <rect x="470" y="335" width="140" height="55" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1" rx="8"/>
  <text x="485" y="355" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#3B82F6">Макс. ЭО:</text>
  <text x="540" y="378" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#3B82F6">F = 4,0</text>
  <rect x="620" y="335" width="140" height="55" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="635" y="355" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#EF4444">Мин. ЭО:</text>
  <text x="690" y="378" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="bold" fill="#EF4444">Fr = 0,7</text>
  <rect x="20" y="435" width="760" height="135" fill="url(#cardGrad)" stroke="#C4B5FD" stroke-width="1.5" rx="12" filter="url(#shadow)"/>
  <text x="40" y="460" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="bold" fill="#7C3AED">Применение ЭО</text>
  <rect x="40" y="475" width="350" height="45" fill="#D1FAE5" stroke="#10B981" stroke-width="1" rx="8"/>
  <text x="55" y="495" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#10B981">Ковалентная полярная связь:</text>
  <text x="55" y="510" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">Разность ЭО 0,4 - 1,7</text>
  <text x="55" y="524" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">Пример: H-Cl (ΔΧ = 0,9)</text>
  <rect x="410" y="475" width="350" height="45" fill="#FEE2E2" stroke="#EF4444" stroke-width="1" rx="8"/>
  <text x="425" y="495" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="12" fill="#EF4444">Ионная связь:</text>
  <text x="425" y="510" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">Разность ЭО &gt; 1,7</text>
  <text x="425" y="524" text-anchor="start" font-family="Arial,Helvetica,sans-serif" font-size="11" fill="#6B7280">Пример: Na-Cl (ΔΧ = 2,1)</text>
  <rect x="40" y="530" width="720" height="30" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1" rx="8"/>
  <text x="400" y="550" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">ΔΧ = ЭО(А) - ЭО(Б) — разность электроотрицательностей</text>
  <!-- Footer -->
  <rect x="0" y="580" width="800" height="20" fill="#7C3AED" opacity="0.1"/>
  <text x="400" y="594" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="#6B7280">Химия — 8 класс</text>
</svg>