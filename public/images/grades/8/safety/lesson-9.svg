<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C" />
      <stop offset="100%" style="stop-color:#DC2626" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030" />
    </filter>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626" />
      <stop offset="100%" style="stop-color:#991B1B" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#F3F4F6" />
  <rect width="800" height="70" fill="url(#headerGrad)" />
  <text x="400" y="35" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Поведение в экстремальных ситуациях</text>
  <text x="400" y="58" text-anchor="middle" fill="#FEE2E2" font-size="13" font-family="Arial, sans-serif">Стихийные бедствия и тревожный чемоданчик</text>
  <rect x="10" y="8" width="50" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.3" />
  <text x="35" y="25" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">ОБЖ</text>
  <rect x="0" y="70" width="800" height="3" fill="#EAB308" />
  <text x="20" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Виды экстремальных ситуаций</text>
  <line x1="20" y1="99" x2="236" y2="99" stroke="#EA580C" stroke-width="2" />
  <rect x="25" y="112" width="6" height="28" fill="#EA580C" rx="3" />
  <text x="40" y="126" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Землетрясение</text>
  <text x="175" y="126" fill="#374151" font-size="10" font-family="Arial, sans-serif">Дрожь земли, разрушения зданий</text>
  <rect x="25" y="150" width="6" height="28" fill="#2563EB" rx="3" />
  <text x="40" y="164" fill="#2563EB" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Наводнение</text>
  <text x="175" y="164" fill="#374151" font-size="10" font-family="Arial, sans-serif">Подъём уровня воды, затопление</text>
  <rect x="25" y="188" width="6" height="28" fill="#7C3AED" rx="3" />
  <text x="40" y="202" fill="#7C3AED" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Ураган/Шторм</text>
  <text x="175" y="202" fill="#374151" font-size="10" font-family="Arial, sans-serif">Сильный ветер, разрушения</text>
  <rect x="25" y="226" width="6" height="28" fill="#DC2626" rx="3" />
  <text x="40" y="240" fill="#DC2626" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Пожар</text>
  <text x="175" y="240" fill="#374151" font-size="10" font-family="Arial, sans-serif">Открытый огонь, дым</text>
  <rect x="25" y="264" width="6" height="28" fill="#059669" rx="3" />
  <text x="40" y="278" fill="#059669" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Авария ХОО</text>
  <text x="175" y="278" fill="#374151" font-size="10" font-family="Arial, sans-serif">Химическая опасность</text>
  <text x="20" y="305" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Общие правила поведения</text>
  <line x1="20" y1="309" x2="204" y2="309" stroke="#EA580C" stroke-width="2" />
  <circle cx="32" cy="332" r="12" fill="#EA580C" />
  <text x="32" y="336" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">1</text>
  <text x="50" y="336" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не паникуйте — паника опаснее ситуации</text>
  <circle cx="32" cy="358" r="12" fill="#EA580C" />
  <text x="32" y="362" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <text x="50" y="362" fill="#374151" font-size="12" font-family="Arial, sans-serif">Оцените обстановку и определите угрозу</text>
  <circle cx="32" cy="384" r="12" fill="#EA580C" />
  <text x="32" y="388" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">3</text>
  <text x="50" y="388" fill="#374151" font-size="12" font-family="Arial, sans-serif">Действуйте по плану или инструкциям</text>
  <circle cx="32" cy="410" r="12" fill="#EA580C" />
  <text x="32" y="414" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">4</text>
  <text x="50" y="414" fill="#374151" font-size="12" font-family="Arial, sans-serif">Информируйте родных и экстренные службы</text>
  <circle cx="32" cy="436" r="12" fill="#EA580C" />
  <text x="32" y="440" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">5</text>
  <text x="50" y="440" fill="#374151" font-size="12" font-family="Arial, sans-serif">Помогайте тем, кто рядом, если это безопасно</text>
  <circle cx="32" cy="462" r="12" fill="#EA580C" />
  <text x="32" y="466" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">6</text>
  <text x="50" y="466" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не приближайтесь к месту ЧП</text>
  <text x="420" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Тревожный чемоданчик</text>
  <line x1="420" y1="99" x2="580" y2="99" stroke="#EA580C" stroke-width="2" />
  <rect x="435" y="108" width="60" height="45" rx="8" fill="#EA580C" stroke="#9A3412" stroke-width="2" />
  <path d="M450,108 Q465,90 480,108" fill="none" stroke="#9A3412" stroke-width="3" />
  <g>
    <circle cx="511" cy="113" r="6" fill="#16A34A" />
    <text x="511" y="118" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="521" y="115" fill="#374151" font-size="10" font-family="Arial, sans-serif">Документы (копии) и деньги</text>
  <g>
    <circle cx="511" cy="135" r="6" fill="#16A34A" />
    <text x="511" y="140" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="521" y="137" fill="#374151" font-size="10" font-family="Arial, sans-serif">Вода (3 л на человека)</text>
  <g>
    <circle cx="511" cy="157" r="6" fill="#16A34A" />
    <text x="511" y="162" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="521" y="159" fill="#374151" font-size="10" font-family="Arial, sans-serif">Консервы и сухой паёк на 3 дня</text>
  <g>
    <circle cx="511" cy="179" r="6" fill="#16A34A" />
    <text x="511" y="184" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="521" y="181" fill="#374151" font-size="10" font-family="Arial, sans-serif">Аптечка первой помощи</text>
  <g>
    <circle cx="511" cy="201" r="6" fill="#16A34A" />
    <text x="511" y="206" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="521" y="203" fill="#374151" font-size="10" font-family="Arial, sans-serif">Фонарик и батарейки</text>
  <g>
    <circle cx="671" cy="113" r="6" fill="#16A34A" />
    <text x="671" y="118" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="681" y="115" fill="#374151" font-size="10" font-family="Arial, sans-serif">Радиоприёмник</text>
  <g>
    <circle cx="671" cy="135" r="6" fill="#16A34A" />
    <text x="671" y="140" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="681" y="137" fill="#374151" font-size="10" font-family="Arial, sans-serif">Тёплая одежда и одеяло</text>
  <g>
    <circle cx="671" cy="157" r="6" fill="#16A34A" />
    <text x="671" y="162" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="681" y="159" fill="#374151" font-size="10" font-family="Arial, sans-serif">Средства гигиены</text>
  <g>
    <circle cx="671" cy="179" r="6" fill="#16A34A" />
    <text x="671" y="184" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="681" y="181" fill="#374151" font-size="10" font-family="Arial, sans-serif">Зарядное устройство для телефона</text>
  <g>
    <circle cx="671" cy="201" r="6" fill="#16A34A" />
    <text x="671" y="206" text-anchor="middle" fill="#FFFFFF" font-size="6" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="681" y="203" fill="#374151" font-size="10" font-family="Arial, sans-serif">Свисток и нож</text>
  <rect x="420" y="335" width="350" height="90" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="2" filter="url(#shadow)" />
  <text x="430" y="355" fill="#EA580C" font-size="13" font-weight="bold" font-family="Arial, sans-serif">При землетрясении:</text>
  <text x="430" y="373" fill="#374151" font-size="11" font-family="Arial, sans-serif">В помещении: встаньте в дверном проёме или</text>
  <text x="430" y="390" fill="#374151" font-size="11" font-family="Arial, sans-serif">под крепким столом,远离 окон</text>
  <text x="430" y="407" fill="#374151" font-size="11" font-family="Arial, sans-serif">На улице: отойдите от зданий и линий ЭП</text>
  <text x="430" y="424" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не пользуйтесь лифтом!</text>
  <text x="430" y="441" fill="#374151" font-size="11" font-family="Arial, sans-serif">После толчков: выйдите из здания</text>
  <rect x="420" y="440" width="350" height="80" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)" />
  <text x="430" y="460" fill="#2563EB" font-size="13" font-weight="bold" font-family="Arial, sans-serif">При наводнении:</text>
  <text x="430" y="478" fill="#374151" font-size="11" font-family="Arial, sans-serif">Поднимитесь на верхний этаж или крышу</text>
  <text x="430" y="495" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не пытайтесь плыть в паводковых водах</text>
  <text x="430" y="512" fill="#374151" font-size="11" font-family="Arial, sans-serif">Подайте сигнал спасателям</text>
  <text x="430" y="529" fill="#374151" font-size="11" font-family="Arial, sans-serif">Ждите помощи, не покидайте укрытие</text>
  <rect x="20" y="490" width="380" height="78" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
  <g>
    <circle cx="33" cy="503" r="8" fill="#16A34A" />
    <text x="33" y="508" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="46" y="508" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ПРАВИЛЬНО</text>
  <text x="30" y="524" fill="#374151" font-size="11" font-family="Arial, sans-serif">Заранее подготовьте тревожный чемоданчик</text>
  <text x="30" y="540" fill="#374151" font-size="11" font-family="Arial, sans-serif">Знайте пути эвакуации из дома</text>
  <text x="30" y="556" fill="#374151" font-size="11" font-family="Arial, sans-serif">Сохраняйте спокойствие</text>
</svg>