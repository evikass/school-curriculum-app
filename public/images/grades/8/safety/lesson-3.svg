  </g>
  <text x="485" y="148" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не оставляйте включённые приборы</text>
  <g>
    <circle cx="472" cy="171" r="7" fill="#16A34A" />
    <text x="472" y="176" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="485" y="176" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не курите в постели и на балконе</text>
  <g>
    <circle cx="472" cy="199" r="7" fill="#16A34A" />
    <text x="472" y="204" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="485" y="204" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не перегружайте электросеть</text>
  <g>
    <circle cx="472" cy="227" r="7" fill="#16A34A" />
    <text x="472" y="232" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="485" y="232" fill="#374151" font-size="11" font-family="Arial, sans-serif">Установите дымовые датчики</text>
  <g>
    <circle cx="472" cy="255" r="7" fill="#16A34A" />
    <text x="472" y="260" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="485" y="260" fill="#374151" font-size="11" font-family="Arial, sans-serif">Храните спички в недоступном месте</text>
