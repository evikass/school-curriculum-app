  <text x="30" y="540" fill="#374151" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Уберите один элемент:</text>
  <text x="30" y="558" fill="#374151" font-size="11" font-family="Arial, sans-serif">Тепло — залейте водой</text>
