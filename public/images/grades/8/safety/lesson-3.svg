    <circle cx="472" cy="283" r="7" fill="#16A34A" />
    <text x="472" y="288" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="485" y="288" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не разжигайте костёр без взрослых</text>
  <g>
    <circle cx="472" cy="311" r="7" fill="#16A34A" />
    <text x="472" y="316" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
