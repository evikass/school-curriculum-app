  <text x="5" y="510" text-anchor="middle" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Горючее</text>
  <text x="5" y="524" text-anchor="middle" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">вещество</text>
  <text x="160" y="465" text-anchor="middle" fill="#DC2626" font-size="14" font-weight="bold" font-family="Arial, sans-serif">ПОЖАР</text>
