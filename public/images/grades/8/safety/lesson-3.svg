  <text x="30" y="592" fill="#374151" font-size="11" font-family="Arial, sans-serif">Горючее — уберите источник</text>
  <rect x="460" y="370" width="320" height="95" rx="8" fill="#FFF7ED" stroke="#EA580C" stroke-width="2" filter="url(#shadow)" />
  <text x="470" y="390" fill="#EA580C" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Огнетушитель:</text>
  <text x="470" y="408" fill="#374151" font-size="11" font-family="Arial, sans-serif">1. Сорвите пломбу</text>
  <text x="470" y="425" fill="#374151" font-size="11" font-family="Arial, sans-serif">2. Направьте шланг на огонь</text>
  <text x="470" y="442" fill="#374151" font-size="11" font-family="Arial, sans-serif">3. Нажмите на рычаг</text>
  <text x="470" y="459" fill="#374151" font-size="11" font-family="Arial, sans-serif">4. Сбивайте пламя с расстояния 2-3 м</text>
  <rect x="660" y="480" width="30" height="50" rx="5" fill="#DC2626" stroke="#991B1B" stroke-width="2" />
  <line x1="675" y1="475" x2="695" y2="465" stroke="#374151" stroke-width="3" />
  <rect x="460" y="500" width="320" height="62" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
