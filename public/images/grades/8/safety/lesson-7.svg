  </g>
  <text x="448" y="122" fill="#DC2626" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Запрещено купаться</text>
  <text x="448" y="138" fill="#374151" font-size="10" font-family="Arial, sans-serif">Красный флаг на пляже</text>
  <g transform="translate(425,160)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="448" y="172" fill="#EA580C" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Осторожно, глубоко!</text>
  <text x="448" y="188" fill="#374151" font-size="10" font-family="Arial, sans-serif">Резкое понижение дна</text>
  <g transform="translate(425,210)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="448" y="222" fill="#F59E0B" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Сильное течение</text>
  <text x="448" y="238" fill="#374151" font-size="10" font-family="Arial, sans-serif">Река с быстрым потоком</text>
  <g transform="translate(425,260)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="448" y="272" fill="#16A34A" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Водоросли</text>
  <text x="448" y="288" fill="#374151" font-size="10" font-family="Arial, sans-serif">Можно запутаться под водой</text>
  <g transform="translate(425,310)">
    <polygon points="8,0 16,16 0,16" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="8" y="12" text-anchor="middle" fill="#111827" font-size="8" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <text x="448" y="322" fill="#2563EB" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Холодные ключи</text>
  <text x="448" y="338" fill="#374151" font-size="10" font-family="Arial, sans-serif">Резкое охлаждение воды</text>
  <text x="20" y="345" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Если вы попали в течении</text>
  <line x1="20" y1="349" x2="212" y2="349" stroke="#EA580C" stroke-width="2" />
  <circle cx="37" cy="372" r="12" fill="#2563EB" />
