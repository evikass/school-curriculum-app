  <text x="55" y="376" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не паникуйте и не боритесь с течением</text>
  <circle cx="37" cy="400" r="12" fill="#2563EB" />
  <text x="37" y="404" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <text x="55" y="404" fill="#374151" font-size="12" font-family="Arial, sans-serif">Плывите параллельно берегу</text>
  <circle cx="37" cy="428" r="12" fill="#2563EB" />
  <text x="37" y="432" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">3</text>
  <text x="55" y="432" fill="#374151" font-size="12" font-family="Arial, sans-serif">Постепенно смещайтесь к берегу</text>
  <circle cx="37" cy="456" r="12" fill="#2563EB" />
  <text x="37" y="460" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">4</text>
  <text x="55" y="460" fill="#374151" font-size="12" font-family="Arial, sans-serif">Зовите на помощь, подняв руку</text>
