  <line x1="420" y1="364" x2="556" y2="364" stroke="#EA580C" stroke-width="2" />
  <rect x="430" y="380" width="340" height="100" fill="#BFDBFE" />
  <rect x="430" y="380" width="340" height="15" fill="#FDE68A" />
  <rect x="430" y="395" width="80" height="85" fill="#16A34A" fill-opacity="0.2" stroke="#16A34A" stroke-width="1.5" />
  <text x="470" y="430" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Мелко</text>
  <text x="470" y="446" text-anchor="middle" fill="#16A34A" font-size="10" font-weight="normal" font-family="Arial, sans-serif">до 1 м</text>
  <rect x="510" y="395" width="80" height="85" fill="#EAB308" fill-opacity="0.2" stroke="#EAB308" stroke-width="1.5" />
  <text x="550" y="430" text-anchor="middle" fill="#EAB308" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Средне</text>
  <text x="550" y="446" text-anchor="middle" fill="#EAB308" font-size="10" font-weight="normal" font-family="Arial, sans-serif">1-1.5 м</text>
  <rect x="590" y="395" width="80" height="85" fill="#EA580C" fill-opacity="0.2" stroke="#EA580C" stroke-width="1.5" />
  <text x="630" y="430" text-anchor="middle" fill="#EA580C" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Глубоко</text>
  <text x="630" y="446" text-anchor="middle" fill="#EA580C" font-size="10" font-weight="normal" font-family="Arial, sans-serif">1.5-3 м</text>
  <rect x="670" y="395" width="100" height="85" fill="#DC2626" fill-opacity="0.2" stroke="#DC2626" stroke-width="1.5" />
  <text x="720" y="430" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Опасно</text>
  <text x="720" y="446" text-anchor="middle" fill="#DC2626" font-size="10" font-weight="normal" font-family="Arial, sans-serif">&amp;gt;3 м</text>
  <rect x="20" y="490" width="375" height="78" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
  <g>
    <circle cx="33" cy="503" r="8" fill="#16A34A" />
    <text x="33" y="508" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="46" y="508" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ПРАВИЛЬНО</text>
  <text x="30" y="524" fill="#374151" font-size="11" font-family="Arial, sans-serif">Купайтесь только в специально отведённых местах</text>
  <text x="30" y="540" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не заплывайте за буйки</text>
  <text x="30" y="556" fill="#374151" font-size="11" font-family="Arial, sans-serif">Соблюдайте температурный режим воды</text>
  <rect x="420" y="490" width="355" height="78" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" />
  <g>
    <circle cx="433" cy="503" r="8" fill="#DC2626" />
    <text x="433" y="508" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">X</text>
  </g>
  <text x="446" y="508" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ОПАСНО</text>
  <text x="430" y="524" fill="#374151" font-size="11" font-family="Arial, sans-serif">Купаться в незнакомых водоёмах</text>
  <text x="430" y="540" fill="#374151" font-size="11" font-family="Arial, sans-serif">Нырять с мостов и обрывов</text>
  <text x="430" y="556" fill="#374151" font-size="11" font-family="Arial, sans-serif">Купаться в шторм или грозу</text>
</svg>