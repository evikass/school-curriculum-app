  <text x="50" y="284" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не плавайте на надувных матрасах далеко</text>
  <circle cx="32" cy="306" r="12" fill="#2563EB" />
  <text x="32" y="310" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">8</text>
  <text x="50" y="310" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не заходите в воду при волнении более 3 баллов</text>
  <text x="420" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Опасности на воде</text>
  <line x1="420" y1="99" x2="556" y2="99" stroke="#EA580C" stroke-width="2" />
  <g transform="translate(425,110)">
