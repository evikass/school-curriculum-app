<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C" />
      <stop offset="100%" style="stop-color:#DC2626" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030" />
    </filter>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626" />
      <stop offset="100%" style="stop-color:#991B1B" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#F3F4F6" />
  <rect width="800" height="70" fill="url(#headerGrad)" />
  <text x="400" y="35" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Безопасность пассажира</text>
  <text x="400" y="58" text-anchor="middle" fill="#FEE2E2" font-size="13" font-family="Arial, sans-serif">Общественный транспорт и автомобиль</text>
  <rect x="10" y="8" width="50" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.3" />
  <text x="35" y="25" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">ОБЖ</text>
  <rect x="0" y="70" width="800" height="3" fill="#EAB308" />
  <text x="20" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Общественный транспорт</text>
  <line x1="20" y1="99" x2="196" y2="99" stroke="#EA580C" stroke-width="2" />
  <circle cx="32" cy="124" r="12" fill="#2563EB" />
  <text x="32" y="128" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">1</text>
  <text x="50" y="128" fill="#374151" font-size="12" font-family="Arial, sans-serif">Ожидайте транспорт на остановке, не на проезжей части</text>
  <circle cx="32" cy="150" r="12" fill="#2563EB" />
  <text x="32" y="154" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <text x="50" y="154" fill="#374151" font-size="12" font-family="Arial, sans-serif">Входите через заднюю дверь, выходите через переднюю</text>
  <circle cx="32" cy="176" r="12" fill="#2563EB" />
  <text x="32" y="180" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">3</text>
  <text x="50" y="180" fill="#374151" font-size="12" font-family="Arial, sans-serif">Держитесь за поручни во время движения</text>
  <circle cx="32" cy="202" r="12" fill="#2563EB" />
  <text x="32" y="206" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">4</text>
  <text x="50" y="206" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не прислоняйтесь к дверям</text>
  <circle cx="32" cy="228" r="12" fill="#2563EB" />
  <text x="32" y="232" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">5</text>
  <text x="50" y="232" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не отвлекайте водителя разговорами</text>
  <circle cx="32" cy="254" r="12" fill="#2563EB" />
  <text x="32" y="258" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">6</text>
  <text x="50" y="258" fill="#374151" font-size="12" font-family="Arial, sans-serif">При аварии — покиньте транспорт через окна/двери</text>
  <text x="420" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Безопасность в автомобиле</text>
  <line x1="420" y1="99" x2="620" y2="99" stroke="#EA580C" stroke-width="2" />
  <g>
    <circle cx="432" cy="114" r="7" fill="#16A34A" />
    <text x="432" y="119" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="445" y="119" fill="#374151" font-size="11" font-family="Arial, sans-serif">Всегда пристёгивайте ремень безопасности</text>
  <g>
    <circle cx="432" cy="140" r="7" fill="#16A34A" />
    <text x="432" y="145" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="445" y="145" fill="#374151" font-size="11" font-family="Arial, sans-serif">Дети до 12 лет — в детском кресле</text>
  <g>
    <circle cx="432" cy="166" r="7" fill="#16A34A" />
    <text x="432" y="171" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="445" y="171" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не высовывайте руки и голову из окна</text>
  <g>
    <circle cx="432" cy="192" r="7" fill="#16A34A" />
    <text x="432" y="197" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="445" y="197" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не отвлекайте водителя</text>
  <g>
    <circle cx="432" cy="218" r="7" fill="#16A34A" />
    <text x="432" y="223" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="445" y="223" fill="#374151" font-size="11" font-family="Arial, sans-serif">Садитесь и выходите со стороны тротуара</text>
  <g>
    <circle cx="432" cy="244" r="7" fill="#16A34A" />
    <text x="432" y="249" text-anchor="middle" fill="#FFFFFF" font-size="8" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="445" y="249" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не открывайте двери на ходу</text>
  <text x="20" y="290" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Ремень безопасности</text>
  <line x1="20" y1="294" x2="172" y2="294" stroke="#EA580C" stroke-width="2" />
  <rect x="80" y="320" width="40" height="70" rx="5" fill="#2563EB" fill-opacity="0.3" stroke="#2563EB" stroke-width="2" />
  <circle cx="100" cy="305" r="15" fill="#FBBF24" />
  <rect x="80" y="320" width="40" height="70" rx="5" fill="none" stroke="#2563EB" stroke-width="2" />
  <line x1="120" y1="315" x2="85" y2="380" stroke="#DC2626" stroke-width="4" />
  <line x1="80" y1="365" x2="120" y2="365" stroke="#DC2626" stroke-width="4" />
  <rect x="170" y="310" width="250" height="105" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)" />
  <text x="180" y="330" fill="#2563EB" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Факты о ремнях безопасности:</text>
  <text x="180" y="348" fill="#374151" font-size="11" font-family="Arial, sans-serif">Снижают риск гибели на 50%</text>
  <text x="180" y="365" fill="#374151" font-size="11" font-family="Arial, sans-serif">Снижают риск тяжёлых травм на 65%</text>
  <text x="180" y="382" fill="#374151" font-size="11" font-family="Arial, sans-serif">Защищают при перевороте автомобиля</text>
  <text x="180" y="399" fill="#374151" font-size="11" font-family="Arial, sans-serif">Пристёгиваться нужно ВСЕМ пассажирам!</text>
  <text x="180" y="416" fill="#374151" font-size="11" font-family="Arial, sans-serif">Штраф за непристёгнутый ремень</text>
  <text x="460" y="290" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">При аварии в транспорте</text>
  <line x1="460" y1="294" x2="644" y2="294" stroke="#EA580C" stroke-width="2" />
  <circle cx="477" cy="317" r="12" fill="#EA580C" />
  <text x="477" y="321" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">1</text>
  <text x="495" y="321" fill="#374151" font-size="12" font-family="Arial, sans-serif">Сохраняйте спокойствие</text>
  <circle cx="477" cy="343" r="12" fill="#EA580C" />
  <text x="477" y="347" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <text x="495" y="347" fill="#374151" font-size="12" font-family="Arial, sans-serif">Оцените обстановку</text>
  <circle cx="477" cy="369" r="12" fill="#EA580C" />
  <text x="477" y="373" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">3</text>
  <text x="495" y="373" fill="#374151" font-size="12" font-family="Arial, sans-serif">Покиньте транспорт через двери/окна</text>
  <circle cx="477" cy="395" r="12" fill="#EA580C" />
  <text x="477" y="399" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">4</text>
  <text x="495" y="399" fill="#374151" font-size="12" font-family="Arial, sans-serif">Помогите тем, кто не может сам</text>
  <circle cx="477" cy="421" r="12" fill="#EA580C" />
  <text x="477" y="425" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">5</text>
  <text x="495" y="425" fill="#374151" font-size="12" font-family="Arial, sans-serif">Отойдите на безопасное расстояние</text>
  <circle cx="477" cy="447" r="12" fill="#DC2626" />
  <text x="477" y="451" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">6</text>
  <text x="495" y="451" fill="#374151" font-size="12" font-family="Arial, sans-serif">Вызовите 112</text>
  <rect x="20" y="460" width="375" height="78" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
  <g>
    <circle cx="33" cy="473" r="8" fill="#16A34A" />
    <text x="33" y="478" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="46" y="478" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ПРАВИЛЬНО</text>
  <text x="30" y="494" fill="#374151" font-size="11" font-family="Arial, sans-serif">Пристёгиваться ремнём безопасности</text>
  <text x="30" y="510" fill="#374151" font-size="11" font-family="Arial, sans-serif">Держаться за поручни в автобусе</text>
  <text x="30" y="526" fill="#374151" font-size="11" font-family="Arial, sans-serif">Садиться/выходить со стороны тротуара</text>
  <rect x="420" y="460" width="355" height="78" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" />
  <g>
    <circle cx="433" cy="473" r="8" fill="#DC2626" />
    <text x="433" y="478" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">X</text>
  </g>
  <text x="446" y="478" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ОПАСНО</text>
  <text x="430" y="494" fill="#374151" font-size="11" font-family="Arial, sans-serif">Стоять в автобусе без опоры</text>
  <text x="430" y="510" fill="#374151" font-size="11" font-family="Arial, sans-serif">Открывать двери на ходу</text>
  <text x="430" y="526" fill="#374151" font-size="11" font-family="Arial, sans-serif">Высовываться из окон автомобиля</text>
</svg>