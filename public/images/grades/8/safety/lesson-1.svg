<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C" />
      <stop offset="100%" style="stop-color:#DC2626" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030" />
    </filter>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626" />
      <stop offset="100%" style="stop-color:#991B1B" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#F3F4F6" />
  <rect width="800" height="70" fill="url(#headerGrad)" />
  <text x="400" y="35" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Безопасность в квартире</text>
  <text x="400" y="58" text-anchor="middle" fill="#FEE2E2" font-size="13" font-family="Arial, sans-serif">Электричество, газ, вода — правила безопасного поведения дома</text>
  <rect x="10" y="8" width="50" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.3" />
  <text x="35" y="25" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">ОБЖ</text>
  <rect x="0" y="70" width="800" height="3" fill="#EAB308" />
  <text x="20" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Электробезопасность</text>
  <line x1="20" y1="99" x2="172" y2="99" stroke="#EA580C" stroke-width="2" />
  <g transform="translate(160,80)">
    <polygon points="10,0 20,20 0,20" fill="#EAB308" stroke="#374151" stroke-width="1" />
    <text x="10" y="16" text-anchor="middle" fill="#111827" font-size="10" font-weight="bold" font-family="Arial, sans-serif">!</text>
  </g>
  <polygon points="220,85 230,100 225,100 232,118 218,103 223,103 215,85" fill="#EAB308" stroke="#EA580C" stroke-width="1" />
  <rect x="20" y="105" width="240" height="94" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
  <g>
    <circle cx="33" cy="118" r="8" fill="#16A34A" />
    <text x="33" y="123" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="46" y="123" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ПРАВИЛЬНО</text>
  <text x="30" y="139" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не прикасайтесь к розеткам мокрыми руками</text>
  <text x="30" y="155" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не вставляйте посторонние предметы в розетки</text>
  <text x="30" y="171" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не перегружайте розетки множеством приборов</text>
  <text x="30" y="187" fill="#374151" font-size="11" font-family="Arial, sans-serif">Отключайте приборы уходя из дома</text>
  <rect x="20" y="205" width="240" height="94" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" />
  <g>
    <circle cx="33" cy="218" r="8" fill="#DC2626" />
    <text x="33" y="223" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">X</text>
  </g>
  <text x="46" y="223" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ОПАСНО</text>
  <text x="30" y="239" fill="#374151" font-size="11" font-family="Arial, sans-serif">Тянуть за шнур при отключении</text>
  <text x="30" y="255" fill="#374151" font-size="11" font-family="Arial, sans-serif">Использовать повреждённые провода</text>
  <text x="30" y="271" fill="#374151" font-size="11" font-family="Arial, sans-serif">Оставлять включённые приборы без присмотра</text>
  <text x="30" y="287" fill="#374151" font-size="11" font-family="Arial, sans-serif">Самостоятельно ремонтировать электроприборы</text>
  <text x="280" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Газовая безопасность</text>
  <line x1="280" y1="99" x2="440" y2="99" stroke="#EA580C" stroke-width="2" />
  <g transform="translate(420,78)">
    <ellipse cx="8" cy="14" rx="8" ry="14" fill="#FBBF24" />
    <ellipse cx="8" cy="16" rx="5" ry="10" fill="#3B82F6" />
  </g>
  <rect x="280" y="105" width="240" height="120" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="2" filter="url(#shadow)" />
  <text x="290" y="125" fill="#DC2626" font-size="13" font-weight="bold" font-family="Arial, sans-serif">При запахе газа:</text>
  <text x="290" y="143" fill="#374151" font-size="11" font-family="Arial, sans-serif">1. Не включайте свет и электроприборы</text>
  <text x="290" y="160" fill="#374151" font-size="11" font-family="Arial, sans-serif">2. Откройте окна и двери</text>
  <text x="290" y="177" fill="#374151" font-size="11" font-family="Arial, sans-serif">3. Закройте газовый кран</text>
  <text x="290" y="194" fill="#374151" font-size="11" font-family="Arial, sans-serif">4. Выйдите из квартиры</text>
  <text x="290" y="211" fill="#374151" font-size="11" font-family="Arial, sans-serif">5. Вызовите газовую службу: 04</text>
  <text x="290" y="228" fill="#374151" font-size="11" font-family="Arial, sans-serif">6. Не зажигайте спички и огонь</text>
  <text x="540" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Водная безопасность</text>
  <line x1="540" y1="99" x2="692" y2="99" stroke="#EA580C" stroke-width="2" />
  <path d="M570,82 Q575,70 580,82 Q580,92 575,95 Q570,92 570,82 Z" fill="#2563EB" />
  <rect x="540" y="105" width="240" height="95" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)" />
  <text x="550" y="125" fill="#2563EB" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Правила:</text>
  <text x="550" y="143" fill="#374151" font-size="11" font-family="Arial, sans-serif">Проверяйте краны перед уходом</text>
  <text x="550" y="160" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не оставляйте воду без присмотра</text>
  <text x="550" y="177" fill="#374151" font-size="11" font-family="Arial, sans-serif">Знайте расположение вентилей</text>
  <text x="550" y="194" fill="#374151" font-size="11" font-family="Arial, sans-serif">При прорыве: отключите воду</text>
  <text x="550" y="211" fill="#374151" font-size="11" font-family="Arial, sans-serif">Сообщите в УК или аварииную службу</text>
  <text x="20" y="340" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Телефоны экстренных служб</text>
  <line x1="20" y1="344" x2="220" y2="344" stroke="#EA580C" stroke-width="2" />
  <rect x="20" y="360" width="110" height="45" rx="8" fill="#DC2626" filter="url(#shadow)" />
  <text x="75" y="382" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">112</text>
  <text x="75" y="398" text-anchor="middle" fill="#FEE2E2" font-size="9" font-family="Arial, sans-serif">Единый номер</text>
  <rect x="145" y="360" width="110" height="45" rx="8" fill="#DC2626" filter="url(#shadow)" />
  <text x="200" y="382" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">101</text>
  <text x="200" y="398" text-anchor="middle" fill="#FEE2E2" font-size="9" font-family="Arial, sans-serif">Пожарная/МЧС</text>
  <rect x="270" y="360" width="110" height="45" rx="8" fill="#DC2626" filter="url(#shadow)" />
  <text x="325" y="382" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">104</text>
  <text x="325" y="398" text-anchor="middle" fill="#FEE2E2" font-size="9" font-family="Arial, sans-serif">Газовая служба</text>
  <rect x="395" y="360" width="110" height="45" rx="8" fill="#DC2626" filter="url(#shadow)" />
  <text x="450" y="382" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="bold" font-family="Arial, sans-serif">03</text>
  <text x="450" y="398" text-anchor="middle" fill="#FEE2E2" font-size="9" font-family="Arial, sans-serif">Скорая помощь</text>
  <text x="20" y="430" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Схема безопасности квартиры</text>
  <line x1="20" y1="434" x2="236" y2="434" stroke="#EA580C" stroke-width="2" />
  <rect x="40" y="450" width="720" height="130" rx="4" fill="#FFFFFF" stroke="#374151" stroke-width="2" />
  <rect x="45" y="455" width="170" height="55" rx="3" fill="#EA580C" fill-opacity="0.15" stroke="#EA580C" stroke-width="1.5" />
  <text x="130" y="477" text-anchor="middle" fill="#EA580C" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Кухня</text>
  <text x="130" y="493" text-anchor="middle" fill="#EA580C" font-size="11" font-weight="normal" font-family="Arial, sans-serif">(газ, вода)</text>
  <rect x="220" y="455" width="170" height="55" rx="3" fill="#2563EB" fill-opacity="0.15" stroke="#2563EB" stroke-width="1.5" />
  <text x="305" y="477" text-anchor="middle" fill="#2563EB" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Ванная</text>
  <text x="305" y="493" text-anchor="middle" fill="#2563EB" font-size="11" font-weight="normal" font-family="Arial, sans-serif">(вода, электричество)</text>
  <rect x="395" y="455" width="170" height="55" rx="3" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5" />
  <text x="480" y="477" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Комната</text>
  <text x="480" y="493" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">(электроприборы)</text>
  <rect x="570" y="455" width="185" height="55" rx="3" fill="#16A34A" fill-opacity="0.15" stroke="#16A34A" stroke-width="1.5" />
  <text x="662" y="477" text-anchor="middle" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Прихожая</text>
  <text x="662" y="493" text-anchor="middle" fill="#16A34A" font-size="11" font-weight="normal" font-family="Arial, sans-serif">(щиток, дверь)</text>
  <text x="70" y="520" fill="#374151" font-size="10" font-family="Arial, sans-serif">⚡ Розетки</text>
  <text x="250" y="520" fill="#374151" font-size="10" font-family="Arial, sans-serif">🔥 Плита</text>
  <text x="420" y="520" fill="#374151" font-size="10" font-family="Arial, sans-serif">💡 Свет</text>
  <text x="600" y="520" fill="#374151" font-size="10" font-family="Arial, sans-serif">🚪 Дверь</text>
  <text x="70" y="545" fill="#374151" font-size="10" font-family="Arial, sans-serif">🔌 Щиток</text>
  <text x="250" y="545" fill="#374151" font-size="10" font-family="Arial, sans-serif">🚿 Краны</text>
  <text x="420" y="545" fill="#374151" font-size="10" font-family="Arial, sans-serif">📺 ТВ</text>
  <text x="600" y="545" fill="#374151" font-size="10" font-family="Arial, sans-serif">🔑 Замок</text>
</svg>