<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EA580C" />
      <stop offset="100%" style="stop-color:#DC2626" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030" />
    </filter>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626" />
      <stop offset="100%" style="stop-color:#991B1B" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#F3F4F6" />
  <rect width="800" height="70" fill="url(#headerGrad)" />
  <text x="400" y="35" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Правила дорожного движения для пешеходов</text>
  <text x="400" y="58" text-anchor="middle" fill="#FEE2E2" font-size="13" font-family="Arial, sans-serif">Знаки, переходы и безопасное поведение</text>
  <rect x="10" y="8" width="50" height="24" rx="12" fill="#FFFFFF" fill-opacity="0.3" />
  <text x="35" y="25" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">ОБЖ</text>
  <rect x="0" y="70" width="800" height="3" fill="#EAB308" />
  <text x="20" y="95" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Важные дорожные знаки</text>
  <line x1="20" y1="99" x2="188" y2="99" stroke="#EA580C" stroke-width="2" />
  <circle cx="80" cy="130" r="25" fill="#2563EB" stroke="#374151" stroke-width="2" />
  <text x="80" y="134" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold" font-family="Arial, sans-serif">5.19.1</text>
  <text x="80" y="170" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">Пешеходный</text>
  <text x="80" y="182" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">переход</text>
  <circle cx="210" cy="130" r="25" fill="#DC2626" stroke="#374151" stroke-width="2" />
  <text x="210" y="134" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold" font-family="Arial, sans-serif">3.10</text>
  <text x="210" y="170" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">Движение</text>
  <text x="210" y="182" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">пешеходов</text>
  <text x="210" y="194" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">запрещено</text>
  <circle cx="340" cy="130" r="25" fill="#2563EB" stroke="#374151" stroke-width="2" />
  <text x="340" y="134" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold" font-family="Arial, sans-serif">6.6</text>
  <text x="340" y="170" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">Подземный</text>
  <text x="340" y="182" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">переход</text>
  <circle cx="470" cy="130" r="25" fill="#2563EB" stroke="#374151" stroke-width="2" />
  <text x="470" y="134" text-anchor="middle" fill="#FFFFFF" font-size="9" font-weight="bold" font-family="Arial, sans-serif">6.7</text>
  <text x="470" y="170" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">Надземный</text>
  <text x="470" y="182" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">переход</text>
  <circle cx="600" cy="130" r="25" fill="#EAB308" stroke="#374151" stroke-width="2" />
  <text x="600" y="134" text-anchor="middle" fill="#111827" font-size="9" font-weight="bold" font-family="Arial, sans-serif">1.23</text>
  <text x="600" y="170" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">Осторожно</text>
  <text x="600" y="182" text-anchor="middle" fill="#374151" font-size="9" font-family="Arial, sans-serif">дети!</text>
  <text x="20" y="215" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Правила перехода дороги</text>
  <line x1="20" y1="219" x2="204" y2="219" stroke="#EA580C" stroke-width="2" />
  <circle cx="32" cy="242" r="12" fill="#EA580C" />
  <text x="32" y="246" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">1</text>
  <text x="50" y="246" fill="#374151" font-size="12" font-family="Arial, sans-serif">Подойдите к краю тротуара</text>
  <circle cx="32" cy="267" r="12" fill="#EA580C" />
  <text x="32" y="271" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <text x="50" y="271" fill="#374151" font-size="12" font-family="Arial, sans-serif">Посмотрите НАЛЕВО</text>
  <circle cx="32" cy="292" r="12" fill="#EA580C" />
  <text x="32" y="296" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">3</text>
  <text x="50" y="296" fill="#374151" font-size="12" font-family="Arial, sans-serif">Посмотрите НАПРАВО</text>
  <circle cx="32" cy="317" r="12" fill="#EA580C" />
  <text x="32" y="321" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">4</text>
  <text x="50" y="321" fill="#374151" font-size="12" font-family="Arial, sans-serif">Ещё раз посмотрите НАЛЕВО</text>
  <circle cx="32" cy="342" r="12" fill="#EA580C" />
  <text x="32" y="346" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">5</text>
  <text x="50" y="346" fill="#374151" font-size="12" font-family="Arial, sans-serif">Убедитесь, что транспорт остановился</text>
  <circle cx="32" cy="367" r="12" fill="#EA580C" />
  <text x="32" y="371" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">6</text>
  <text x="50" y="371" fill="#374151" font-size="12" font-family="Arial, sans-serif">Переходите дорогу спокойным шагом</text>
  <circle cx="32" cy="392" r="12" fill="#DC2626" />
  <text x="32" y="396" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="bold" font-family="Arial, sans-serif">7</text>
  <text x="50" y="396" fill="#374151" font-size="12" font-family="Arial, sans-serif">Не играйте и не бегите на переходе</text>
  <text x="420" y="215" fill="#EA580C" font-size="15" font-weight="bold" font-family="Arial, sans-serif">Схема перехода</text>
  <line x1="420" y1="219" x2="532" y2="219" stroke="#EA580C" stroke-width="2" />
  <rect x="430" y="240" width="350" height="200" fill="#374151" />
  <rect x="445" y="337" width="30" height="4" fill="#FFFFFF" />
  <rect x="500" y="337" width="30" height="4" fill="#FFFFFF" />
  <rect x="555" y="337" width="30" height="4" fill="#FFFFFF" />
  <rect x="610" y="337" width="30" height="4" fill="#FFFFFF" />
  <rect x="665" y="337" width="30" height="4" fill="#FFFFFF" />
  <rect x="720" y="337" width="30" height="4" fill="#FFFFFF" />
  <rect x="430" y="230" width="350" height="15" fill="#9CA3AF" />
  <rect x="430" y="435" width="350" height="15" fill="#9CA3AF" />
  <rect x="540" y="245" width="50" height="16" fill="#FFFFFF" />
  <rect x="540" y="269" width="50" height="16" fill="#FFFFFF" />
  <rect x="540" y="293" width="50" height="16" fill="#FFFFFF" />
  <rect x="540" y="317" width="50" height="16" fill="#FFFFFF" />
  <rect x="540" y="341" width="50" height="16" fill="#FFFFFF" />
  <rect x="540" y="365" width="50" height="16" fill="#FFFFFF" />
  <rect x="540" y="389" width="50" height="16" fill="#FFFFFF" />
  <rect x="540" y="413" width="50" height="16" fill="#FFFFFF" />
  <circle cx="565" cy="260" r="8" fill="#16A34A" />
  <line x1="565" y1="270" x2="565" y2="420" stroke="#16A34A" stroke-width="2" stroke-dasharray="5,5" />
  <polygon points="565,425 558,415 572,415" fill="#16A34A" />
  <text x="520" y="290" fill="#EAB308" font-size="10" font-weight="bold" font-family="Arial, sans-serif">&lt;&lt; НАЛЕВО</text>
  <text x="520" y="395" fill="#EAB308" font-size="10" font-weight="bold" font-family="Arial, sans-serif">НАПРАВО &gt;&gt;</text>
  <rect x="650" y="260" width="30" height="80" rx="6" fill="#1F2937" stroke="#374151" stroke-width="2" />
  <circle cx="665" cy="278" r="10" fill="#991B1B" />
  <circle cx="665" cy="300" r="10" fill="#854D0E" />
  <circle cx="665" cy="322" r="10" fill="#16A34A" stroke="#86EFAC" stroke-width="2" />
  <rect x="20" y="460" width="375" height="78" rx="6" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" />
  <g>
    <circle cx="33" cy="473" r="8" fill="#16A34A" />
    <text x="33" y="478" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">+</text>
  </g>
  <text x="46" y="478" fill="#16A34A" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ПРАВИЛЬНО</text>
  <text x="30" y="494" fill="#374151" font-size="11" font-family="Arial, sans-serif">Переходите только по зебре или подземному переходу</text>
  <text x="30" y="510" fill="#374151" font-size="11" font-family="Arial, sans-serif">На красный сигнал — стойте, на зелёный — идите</text>
  <text x="30" y="526" fill="#374151" font-size="11" font-family="Arial, sans-serif">Не перебегайте дорогу перед близким транспортом</text>
  <rect x="420" y="460" width="355" height="78" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" />
  <g>
    <circle cx="433" cy="473" r="8" fill="#DC2626" />
    <text x="433" y="478" text-anchor="middle" fill="#FFFFFF" font-size="12" font-weight="bold" font-family="Arial, sans-serif">X</text>
  </g>
  <text x="446" y="478" fill="#DC2626" font-size="11" font-weight="bold" font-family="Arial, sans-serif">ОПАСНО</text>
  <text x="430" y="494" fill="#374151" font-size="11" font-family="Arial, sans-serif">Переходить на красный или жёлтый сигнал</text>
  <text x="430" y="510" fill="#374151" font-size="11" font-family="Arial, sans-serif">Играть на проезжей части</text>
  <text x="430" y="526" fill="#374151" font-size="11" font-family="Arial, sans-serif">Выходить из-за стоящего транспорта без осмотра</text>
