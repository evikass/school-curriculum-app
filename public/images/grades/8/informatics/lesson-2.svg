  <text x="475" y="370" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <circle cx="715" cy="365" r="22" fill="#38BDF8" />
  <text x="715" y="370" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold" font-family="Arial, sans-serif">8</text>
  <circle cx="595" cy="530" r="22" fill="#38BDF8" />
  <text x="595" y="535" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="bold" font-family="Arial, sans-serif">16</text>
  <line x1="495" y1="380" x2="570" y2="410" stroke="#0284C7" stroke-width="2" />
  <polygon points="570,410 566,403 574,403" fill="#0284C7" />
  <line x1="695" y1="380" x2="620" y2="410" stroke="#0284C7" stroke-width="2" />
  <polygon points="620,410 616,403 624,403" fill="#0284C7" />
  <line x1="595" y1="460" x2="595" y2="508" stroke="#0284C7" stroke-width="2" />
  <polygon points="595,508 591,501 599,501" fill="#0284C7" />
  <text x="510" y="378" text-anchor="start" fill="#64748B" font-size="9" font-weight="normal" font-family="Consolas, monospace">bin()</text>
  <text x="650" y="378" text-anchor="start" fill="#64748B" font-size="9" font-weight="normal" font-family="Consolas, monospace">oct()</text>
  <text x="610" y="500" text-anchor="start" fill="#64748B" font-size="9" font-weight="normal" font-family="Consolas, monospace">hex()</text>
