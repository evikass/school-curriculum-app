  <rect x="410" y="328" width="370" height="8" fill="#0284C7" />
  <text x="595" y="327" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Схема перевода</text>
  <circle cx="595" cy="430" r="30" fill="#0EA5E9" />
  <text x="595" y="435" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="bold" font-family="Arial, sans-serif">10</text>
