<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F9FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)" />
  <rect x="0" y="0" width="800" height="56" fill="#0EA5E9" rx="0" />
  <text x="400" y="38" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Урок 4: Программирование на Python</text>
  <line x1="50" y1="52" x2="750" y2="52" stroke="#38BDF8" stroke-width="2" />
  <rect x="650" y="64" width="130" height="32" fill="#306998" rx="16" />
  <text x="715" y="85" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Python 3</text>
  <rect x="22" y="70" width="380" height="185" fill="#94A3B8" rx="8" opacity="0.15" />
  <rect x="20" y="68" width="380" height="185" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="2" rx="8" />
  <rect x="20" y="68" width="380" height="28" fill="#0284C7" rx="8" />
  <rect x="20" y="88" width="380" height="8" fill="#0284C7" />
  <text x="210" y="87" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Переменные и типы данных</text>
  <rect x="30" y="100" width="360" height="145" fill="#1E293B" rx="6" />
  <rect x="30" y="100" width="360" height="20" fill="#334155" rx="6" />
  <rect x="30" y="114" width="360" height="6" fill="#334155" />
  <circle cx="44" cy="110" r="4" fill="#EF4444" />
  <circle cx="60" cy="110" r="4" fill="#F59E0B" />
  <circle cx="76" cy="110" r="4" fill="#22C55E" />
  <text x="42" y="134" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Объявление переменных</text>
  <text x="42" y="150" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace">name = 'Алексей'   # str</text>
  <text x="42" y="166" fill="#FACC15" font-size="12" font-family="Consolas, monospace">age = 14            # int</text>
  <text x="42" y="182" fill="#FB923C" font-size="12" font-family="Consolas, monospace">height = 1.65       # float</text>
  <text x="42" y="198" fill="#F472B6" font-size="12" font-family="Consolas, monospace">is_student = True   # bool</text>
  <text x="42" y="214" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace" />
  <text x="42" y="230" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Вывод типа</text>
  <text x="42" y="246" fill="#60A5FA" font-size="12" font-family="Consolas, monospace">print(type(age))</text>
  <text x="42" y="262" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># &amp;lt;class 'int'&amp;gt;</text>
  <rect x="412" y="70" width="370" height="185" fill="#94A3B8" rx="8" opacity="0.15" />
  <rect x="410" y="68" width="370" height="185" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="2" rx="8" />
  <rect x="410" y="68" width="370" height="28" fill="#0284C7" rx="8" />
  <rect x="410" y="88" width="370" height="8" fill="#0284C7" />
  <text x="595" y="87" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Ввод и вывод данных</text>
  <rect x="420" y="100" width="350" height="145" fill="#1E293B" rx="6" />
  <rect x="420" y="100" width="350" height="20" fill="#334155" rx="6" />
  <rect x="420" y="114" width="350" height="6" fill="#334155" />
  <circle cx="434" cy="110" r="4" fill="#EF4444" />
  <circle cx="450" cy="110" r="4" fill="#F59E0B" />
  <circle cx="466" cy="110" r="4" fill="#22C55E" />
  <text x="432" y="134" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Ввод данных</text>
  <text x="432" y="150" fill="#60A5FA" font-size="12" font-family="Consolas, monospace">name = input('Имя: ')</text>
  <text x="432" y="166" fill="#FACC15" font-size="12" font-family="Consolas, monospace">age = int(input('Возраст: '))</text>
  <text x="432" y="182" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace" />
  <text x="432" y="198" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Вывод данных</text>
  <text x="432" y="214" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace">print('Привет,', name)</text>
  <text x="432" y="230" fill="#F472B6" font-size="12" font-family="Consolas, monospace">print(f'Тебе {age} лет')</text>
  <text x="432" y="246" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace" />
  <text x="432" y="262" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Форматированный вывод</text>
  <text x="432" y="278" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace">pi = 3.14159</text>
  <text x="432" y="294" fill="#F472B6" font-size="12" font-family="Consolas, monospace">print(f'pi = {pi:.2f}')</text>
  <rect x="22" y="268" width="380" height="155" fill="#94A3B8" rx="8" opacity="0.15" />
  <rect x="20" y="266" width="380" height="155" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="2" rx="8" />
  <rect x="20" y="266" width="380" height="28" fill="#0284C7" rx="8" />
  <rect x="20" y="286" width="380" height="8" fill="#0284C7" />
  <text x="210" y="285" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Арифметические операции</text>
  <text x="35" y="310" text-anchor="start" fill="#0284C7" font-size="11" font-weight="bold" font-family="Consolas, monospace">+ </text>
  <text x="65" y="310" text-anchor="start" fill="#0C4A6E" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Сложение</text>
  <text x="210" y="310" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Consolas, monospace">3 + 2 = 5</text>
  <text x="35" y="328" text-anchor="start" fill="#0284C7" font-size="11" font-weight="bold" font-family="Consolas, monospace">- </text>
  <text x="65" y="328" text-anchor="start" fill="#0C4A6E" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Вычитание</text>
  <text x="210" y="328" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Consolas, monospace">7 - 4 = 3</text>
  <text x="35" y="346" text-anchor="start" fill="#0284C7" font-size="11" font-weight="bold" font-family="Consolas, monospace">* </text>
  <text x="65" y="346" text-anchor="start" fill="#0C4A6E" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Умножение</text>
  <text x="210" y="346" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Consolas, monospace">3 * 4 = 12</text>
  <text x="35" y="364" text-anchor="start" fill="#0284C7" font-size="11" font-weight="bold" font-family="Consolas, monospace">/ </text>
  <text x="65" y="364" text-anchor="start" fill="#0C4A6E" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Деление</text>
  <text x="210" y="364" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Consolas, monospace">10 / 3 = 3.33</text>
  <text x="35" y="382" text-anchor="start" fill="#0284C7" font-size="11" font-weight="bold" font-family="Consolas, monospace">//</text>
  <text x="65" y="382" text-anchor="start" fill="#0C4A6E" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Целочисл. деление</text>
  <text x="210" y="382" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Consolas, monospace">10 // 3 = 3</text>
  <text x="35" y="400" text-anchor="start" fill="#0284C7" font-size="11" font-weight="bold" font-family="Consolas, monospace">% </text>
  <text x="65" y="400" text-anchor="start" fill="#0C4A6E" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Остаток</text>
  <text x="210" y="400" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Consolas, monospace">10 % 3 = 1</text>
  <text x="35" y="418" text-anchor="start" fill="#0284C7" font-size="11" font-weight="bold" font-family="Consolas, monospace">**</text>
  <text x="65" y="418" text-anchor="start" fill="#0C4A6E" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Степень</text>
  <text x="210" y="418" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Consolas, monospace">2 ** 3 = 8</text>
  <rect x="412" y="268" width="370" height="155" fill="#94A3B8" rx="8" opacity="0.15" />
  <rect x="410" y="266" width="370" height="155" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="2" rx="8" />
  <rect x="410" y="266" width="370" height="28" fill="#0284C7" rx="8" />
  <rect x="410" y="286" width="370" height="8" fill="#0284C7" />
  <text x="595" y="285" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Основной синтаксис</text>
  <rect x="420" y="298" width="350" height="115" fill="#1E293B" rx="6" />
  <rect x="420" y="298" width="350" height="20" fill="#334155" rx="6" />
  <rect x="420" y="312" width="350" height="6" fill="#334155" />
  <circle cx="434" cy="308" r="4" fill="#EF4444" />
  <circle cx="450" cy="308" r="4" fill="#F59E0B" />
  <circle cx="466" cy="308" r="4" fill="#22C55E" />
  <text x="432" y="332" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Комментарий</text>
  <text x="432" y="348" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace" />
  <text x="432" y="364" fill="#FB923C" font-size="12" font-family="Consolas, monospace">&amp;quot;&amp;quot;&amp;quot;Многострочный</text>
  <text x="432" y="380" fill="#FB923C" font-size="12" font-family="Consolas, monospace">комментарий&amp;quot;&amp;quot;&amp;quot;</text>
  <text x="432" y="396" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace" />
  <text x="432" y="412" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Множественное присваивание</text>
  <text x="432" y="428" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace">x, y, z = 1, 2, 3</text>
  <text x="432" y="444" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace">a = b = c = 0</text>
  <text x="432" y="460" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace" />
  <text x="432" y="476" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Обмен значений</text>
  <text x="432" y="492" fill="#F472B6" font-size="12" font-family="Consolas, monospace">x, y = y, x</text>
  <rect x="22" y="436" width="760" height="155" fill="#94A3B8" rx="8" opacity="0.15" />
  <rect x="20" y="434" width="760" height="155" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="2" rx="8" />
  <rect x="20" y="434" width="760" height="28" fill="#0284C7" rx="8" />
  <rect x="20" y="454" width="760" height="8" fill="#0284C7" />
  <text x="400" y="453" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Пример программы: Калькулятор</text>
  <rect x="30" y="466" width="740" height="115" fill="#1E293B" rx="6" />
  <rect x="30" y="466" width="740" height="20" fill="#334155" rx="6" />
  <rect x="30" y="480" width="740" height="6" fill="#334155" />
  <circle cx="44" cy="476" r="4" fill="#EF4444" />
  <circle cx="60" cy="476" r="4" fill="#F59E0B" />
  <circle cx="76" cy="476" r="4" fill="#22C55E" />
  <text x="42" y="500" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Программа-калькулятор</text>
  <text x="42" y="516" fill="#60A5FA" font-size="12" font-family="Consolas, monospace">a = float(input('Введите первое число: '))</text>
  <text x="42" y="532" fill="#60A5FA" font-size="12" font-family="Consolas, monospace">b = float(input('Введите второе число: '))</text>
  <text x="42" y="548" fill="#FACC15" font-size="12" font-family="Consolas, monospace">print(f'Сумма: {a + b}')</text>
  <text x="42" y="564" fill="#FACC15" font-size="12" font-family="Consolas, monospace">print(f'Разность: {a - b}')</text>
  <text x="42" y="580" fill="#FACC15" font-size="12" font-family="Consolas, monospace">print(f'Произведение: {a * b}')</text>
  <text x="42" y="596" fill="#F472B6" font-size="12" font-family="Consolas, monospace">print(f'Частное: {a / b:.2f}')</text>
</svg>