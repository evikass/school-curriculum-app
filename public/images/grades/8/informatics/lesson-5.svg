  <text x="552" y="162" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Цикл for</text>
  <text x="552" y="178" fill="#F472B6" font-size="12" font-family="Consolas, monospace">for i in range(5):</text>
  <text x="552" y="194" fill="#FACC15" font-size="12" font-family="Consolas, monospace">    print(i)  # 0-4</text>
  <text x="552" y="210" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace" />
  <text x="552" y="226" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Цикл while</text>
  <text x="552" y="242" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace">n = 1</text>
  <text x="552" y="258" fill="#F472B6" font-size="12" font-family="Consolas, monospace">while n &amp;lt;= 10:</text>
  <text x="552" y="274" fill="#FACC15" font-size="12" font-family="Consolas, monospace">    print(n)</text>
  <text x="552" y="290" fill="#FB923C" font-size="12" font-family="Consolas, monospace">    n += 1</text>
