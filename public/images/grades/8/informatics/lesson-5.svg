  <text x="297" y="162" fill="#60A5FA" font-size="12" font-family="Consolas, monospace">age = int(input())</text>
  <text x="297" y="178" fill="#F472B6" font-size="12" font-family="Consolas, monospace">if age &gt;= 18:</text>
  <text x="297" y="194" fill="#FACC15" font-size="12" font-family="Consolas, monospace">    print('Взрослый')</text>
  <text x="297" y="210" fill="#F472B6" font-size="12" font-family="Consolas, monospace">elif age &gt;= 14:</text>
  <text x="297" y="226" fill="#FACC15" font-size="12" font-family="Consolas, monospace">    print('Подросток')</text>
  <text x="297" y="242" fill="#F472B6" font-size="12" font-family="Consolas, monospace">else:</text>
  <text x="297" y="258" fill="#FACC15" font-size="12" font-family="Consolas, monospace">    print('Ребёнок')</text>
