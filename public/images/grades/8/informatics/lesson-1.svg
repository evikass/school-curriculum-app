  <text x="160" y="240" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">video clips</text>
  <rect x="292" y="70" width="240" height="200" fill="#94A3B8" rx="8" opacity="0.15" />
  <rect x="290" y="68" width="240" height="200" fill="#FFFFFF" stroke="#BAE6FD" stroke-width="2" rx="8" />
