  <rect x="290" y="88" width="240" height="8" fill="#0284C7" />
  <text x="410" y="87" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Единицы измерения</text>
  <text x="302" y="112" text-anchor="start" fill="#0284C7" font-size="12" font-weight="bold" font-family="Consolas, monospace">1 бит</text>
  <text x="440" y="112" text-anchor="start" fill="#64748B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">0 или 1</text>
  <text x="302" y="144" text-anchor="start" fill="#0284C7" font-size="12" font-weight="bold" font-family="Consolas, monospace">1 байт</text>
  <text x="440" y="144" text-anchor="start" fill="#64748B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">= 8 бит</text>
  <text x="302" y="176" text-anchor="start" fill="#0284C7" font-size="12" font-weight="bold" font-family="Consolas, monospace">1 КБ (килобайт)</text>
  <text x="440" y="176" text-anchor="start" fill="#64748B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">= 1024 байт</text>
  <text x="302" y="208" text-anchor="start" fill="#0284C7" font-size="12" font-weight="bold" font-family="Consolas, monospace">1 МБ (мегабайт)</text>
  <text x="440" y="208" text-anchor="start" fill="#64748B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">= 1024 КБ</text>
  <text x="302" y="240" text-anchor="start" fill="#0284C7" font-size="12" font-weight="bold" font-family="Consolas, monospace">1 ГБ (гигабайт)</text>
  <text x="440" y="240" text-anchor="start" fill="#64748B" font-size="11" font-weight="normal" font-family="Arial, sans-serif">= 1024 МБ</text>
  <rect x="22" y="284" width="510" height="80" fill="#94A3B8" rx="8" opacity="0.15" />
