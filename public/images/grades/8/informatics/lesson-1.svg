  <rect x="20" y="302" width="510" height="8" fill="#0284C7" />
  <text x="275" y="301" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Перевод единиц</text>
  <text x="35" y="316" text-anchor="start" fill="#0C4A6E" font-size="12" font-weight="normal" font-family="Consolas, monospace">Пример: 2048 байт = 2048 / 1024 = 2 КБ</text>
  <text x="35" y="338" text-anchor="start" fill="#0284C7" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Формула: КБ = байт / 1024</text>
