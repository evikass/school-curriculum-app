  <text x="145" y="87" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Виды информации</text>
  <circle cx="38" cy="108" r="8" fill="#0EA5E9" />
  <text x="38" y="112" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">1</text>
  <text x="52" y="112" text-anchor="start" fill="#0C4A6E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Текстовая</text>
  <text x="160" y="112" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">books, documents</text>
  <circle cx="38" cy="140" r="8" fill="#38BDF8" />
  <text x="38" y="144" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">2</text>
  <text x="52" y="144" text-anchor="start" fill="#0C4A6E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Числовая</text>
  <text x="160" y="144" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">numbers, formulas</text>
  <circle cx="38" cy="172" r="8" fill="#0EA5E9" />
  <text x="38" y="176" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="bold" font-family="Arial, sans-serif">3</text>
  <text x="52" y="176" text-anchor="start" fill="#0C4A6E" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Графическая</text>
  <text x="160" y="176" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">images, charts</text>
  <circle cx="38" cy="204" r="8" fill="#38BDF8" />
