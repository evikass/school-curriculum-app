  <text x="47" y="542" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Важна в данный момент</text>
  <rect x="285" y="498" width="230" height="65" fill="#E0F2FE" stroke="#BAE6FD" stroke-width="1" rx="6" />
  <text x="297" y="520" text-anchor="start" fill="#0284C7" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Полезность</text>
  <text x="297" y="542" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Имеет практическую ценность</text>
  <rect x="535" y="498" width="230" height="65" fill="#E0F2FE" stroke="#BAE6FD" stroke-width="1" rx="6" />
  <text x="547" y="520" text-anchor="start" fill="#0284C7" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Понятность</text>
  <text x="547" y="542" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Доступна для восприятия</text>
