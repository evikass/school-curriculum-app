  <text x="400" y="38" text-anchor="middle" fill="#FFFFFF" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Урок 1: Информация и её свойства</text>
  <line x1="50" y1="52" x2="750" y2="52" stroke="#38BDF8" stroke-width="2" />
