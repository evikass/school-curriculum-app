  <text x="547" y="462" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Достаточна для понимания</text>
  <rect x="35" y="498" width="230" height="65" fill="#E0F2FE" stroke="#BAE6FD" stroke-width="1" rx="6" />
