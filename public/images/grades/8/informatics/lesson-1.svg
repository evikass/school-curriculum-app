  <text x="664" y="264" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Передача</text>
  <rect x="562" y="292" width="204" height="36" fill="#0C4A6E" rx="18" />
  <text x="664" y="312" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Поиск</text>
