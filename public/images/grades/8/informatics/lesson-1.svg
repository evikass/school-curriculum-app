  <text x="47" y="462" text-anchor="start" fill="#64748B" font-size="10" font-weight="normal" font-family="Arial, sans-serif">Не зависит от мнения</text>
  <rect x="285" y="418" width="230" height="65" fill="#E0F2FE" stroke="#BAE6FD" stroke-width="1" rx="6" />
  <text x="297" y="440" text-anchor="start" fill="#0284C7" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Достоверность</text>
