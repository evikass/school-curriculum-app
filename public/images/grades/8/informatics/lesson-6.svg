  <text x="42" y="326" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Сортировка пузырьком</text>
  <text x="42" y="342" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace">arr = [64, 34, 25, 12, 22]</text>
  <text x="42" y="358" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace">n = len(arr)</text>
  <text x="42" y="374" fill="#F472B6" font-size="12" font-family="Consolas, monospace">for i in range(n):</text>
  <text x="42" y="390" fill="#F472B6" font-size="12" font-family="Consolas, monospace">    for j in range(n-i-1):</text>
  <text x="42" y="406" fill="#FACC15" font-size="12" font-family="Consolas, monospace">        if arr[j] &gt; arr[j+1]:</text>
  <text x="42" y="422" fill="#FB923C" font-size="12" font-family="Consolas, monospace">            arr[j], arr[j+1] =</text>
  <text x="42" y="438" fill="#FB923C" font-size="12" font-family="Consolas, monospace">                arr[j+1], arr[j]</text>
  <text x="42" y="454" fill="#4ADE80" font-size="12" font-family="Consolas, monospace">print(arr)  # [12,22,25,34,64]</text>
  <rect x="412" y="262" width="370" height="175" fill="#94A3B8" rx="8" opacity="0.15" />
