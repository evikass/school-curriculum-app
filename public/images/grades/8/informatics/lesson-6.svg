  <text x="432" y="454" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># (только для отсортированных)</text>
  <text x="432" y="470" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Используйте bisect module</text>
