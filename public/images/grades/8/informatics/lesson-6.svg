  <text x="432" y="326" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Линейный поиск</text>
  <text x="432" y="342" fill="#60A5FA" font-size="12" font-family="Consolas, monospace">def linear_search(arr, x):</text>
  <text x="432" y="358" fill="#F472B6" font-size="12" font-family="Consolas, monospace">    for i in range(len(arr)):</text>
  <text x="432" y="374" fill="#FACC15" font-size="12" font-family="Consolas, monospace">        if arr[i] == x:</text>
  <text x="432" y="390" fill="#FB923C" font-size="12" font-family="Consolas, monospace">            return i</text>
  <text x="432" y="406" fill="#FB923C" font-size="12" font-family="Consolas, monospace">    return -1</text>
  <text x="432" y="422" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace" />
