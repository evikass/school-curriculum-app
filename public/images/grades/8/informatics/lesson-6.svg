  <text x="432" y="513" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace">data = [4, 8, 6, 5, 3, 9, 7]</text>
  <text x="432" y="529" fill="#E2E8F0" font-size="12" font-family="Consolas, monospace" />
  <text x="432" y="545" fill="#4ADE80" font-size="12" font-family="Consolas, monospace">print(min(data))  # 3</text>
  <text x="432" y="561" fill="#4ADE80" font-size="12" font-family="Consolas, monospace">print(max(data))  # 9</text>
  <text x="432" y="577" fill="#4ADE80" font-size="12" font-family="Consolas, monospace">print(sum(data))  # 42</text>
  <text x="432" y="593" fill="#FACC15" font-size="12" font-family="Consolas, monospace">avg = sum(data)/len(data)</text>
  <text x="432" y="609" fill="#F472B6" font-size="12" font-family="Consolas, monospace">print(f'Среднее: {avg:.1f}')</text>
  <text x="432" y="625" fill="#4ADE80" font-size="12" font-family="Consolas, monospace"># Среднее: 6.0</text>
