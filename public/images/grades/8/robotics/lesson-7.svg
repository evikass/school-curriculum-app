  <text x="600" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Программирование — логика робота</text>
  <rect x="430" y="235" width="340" height="135" rx="4" ry="4" fill="#0D1117" stroke="#334155" stroke-width="1" />
  <rect x="430" y="235" width="340" height="20" rx="4" ry="4" fill="#161B22" />
  <rect x="430" y="251" width="340" height="4" fill="#161B22" />
