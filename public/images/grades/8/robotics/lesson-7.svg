  <text x="385" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#F59E0B">и подключение</text>
  <text x="385" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Плата контроллера</text>
  <text x="385" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Датчики и моторы</text>
  <text x="385" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Провода и питание</text>
