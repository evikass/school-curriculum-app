  <circle cx="460" cy="245" r="4" fill="#F59E0B" />
  <circle cx="476" cy="245" r="4" fill="#22C55E" />
  <text x="442" y="269" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Основной алгоритм робота</text>
  <text x="442" y="284" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">void loop() {</text>
  <text x="442" y="299" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  // 1. Чтение датчиков</text>
  <text x="442" y="314" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  int dist = readUltrasonic();</text>
  <text x="442" y="329" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  int light = analogRead(A0);</text>
  <text x="442" y="344" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="442" y="359" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  // 2. Принятие решения</text>
  <text x="442" y="374" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  if (dist &amp;lt; 20) {</text>
  <text x="442" y="389" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">    turnRight();  // Объезд</text>
  <text x="442" y="404" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  } else {</text>
  <text x="442" y="419" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">    moveForward();</text>
  <text x="442" y="434" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  }</text>
  <text x="442" y="449" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="442" y="464" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  // 3. Действие</text>
  <text x="442" y="479" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  delay(50);</text>
  <text x="442" y="494" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">}</text>
