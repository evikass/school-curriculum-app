  <text x="465" y="160" font-family="Consolas, monospace" font-size="10" fill="#A78BFA">void</text>
  <text x="493" y="160" font-family="Consolas, monospace" font-size="10" fill="#CBD5E1"> setup() {</text>
  <text x="465" y="173" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  pinMode(13, OUTPUT);</text>
  <text x="465" y="186" font-family="Consolas, monospace" font-size="10" fill="#CBD5E1">}</text>
  <text x="472" y="186" font-family="Consolas, monospace" font-size="10" fill="" />
  <text x="465" y="212" font-family="Consolas, monospace" font-size="10" fill="#A78BFA">void</text>
  <text x="493" y="212" font-family="Consolas, monospace" font-size="10" fill="#CBD5E1"> loop() {</text>
  <text x="465" y="225" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  digitalWrite(13, HIGH);</text>
  <text x="465" y="238" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  delay(1000);</text>
  <text x="465" y="251" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  digitalWrite(13, LOW);</text>
  <text x="465" y="264" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  delay(1000);</text>
  <text x="465" y="277" font-family="Consolas, monospace" font-size="10" fill="#CBD5E1">}</text>
