  <text x="30" y="132" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">• Постоянного тока</text>
  <text x="30" y="146" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">• Простое управление</text>
  <text x="30" y="160" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">• Высокие обороты</text>
  <text x="30" y="178" font-family="Consolas, monospace" font-size="8" fill="#38BDF8">3-12В, до 10000 об/мин</text>
