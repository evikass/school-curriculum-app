  <text x="297" y="222" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">#include &amp;lt;Servo.h&amp;gt;</text>
  <text x="297" y="237" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">Servo myservo;</text>
  <text x="297" y="252" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">myservo.attach(9);</text>
  <text x="297" y="267" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">myservo.write(90); // угол</text>
  <text x="297" y="282" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">delay(1000);</text>
