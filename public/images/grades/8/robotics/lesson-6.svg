  <text x="37" y="222" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Направление вращения</text>
  <text x="37" y="237" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">digitalWrite(in1, HIGH);</text>
  <text x="37" y="252" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">digitalWrite(in2, LOW);</text>
  <text x="37" y="267" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Скорость (PWM)</text>
  <text x="37" y="282" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">analogWrite(enA, 200);</text>
