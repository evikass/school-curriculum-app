  <text x="557" y="222" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">#include &amp;lt;Stepper.h&amp;gt;</text>
  <text x="557" y="237" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">Stepper s(2048,8,10,9,11);</text>
  <text x="557" y="252" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">s.setSpeed(10);</text>
  <text x="557" y="267" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">s.step(512);</text>
  <text x="557" y="282" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// 512 шагов = 90°</text>
