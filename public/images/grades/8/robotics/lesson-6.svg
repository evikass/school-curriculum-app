  <text x="290" y="132" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">• Точный угол поворота</text>
  <text x="290" y="146" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">• 0-180° (обычно)</text>
  <text x="290" y="160" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">• Встроенный контроллер</text>
  <text x="290" y="178" font-family="Consolas, monospace" font-size="8" fill="#F59E0B">4.8-6В, крутящий момент 1.8 кг·см</text>
