<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0F172A" />
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5" />
    </pattern>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0284C7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.5" />
  <rect width="800" height="200" fill="url(#topGrad)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38BDF8" />
    </marker>
  </defs>
  <rect x="0" y="10" width="800" height="55" fill="#0369A1" opacity="0.9" />
  <rect x="0" y="65" width="800" height="3" fill="#38BDF8" />
  <text x="400" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#F8FAFC">Программирование Arduino</text>
  <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">Урок 4 — Основы C++ для Arduino</text>
  <rect x="20" y="90" width="350" height="240" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <rect x="20" y="90" width="350" height="28" rx="8" ry="8" fill="#0369A1" />
  <rect x="20" y="110" width="350" height="8" fill="#0369A1" />
  <text x="195" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Структура программы</text>
  <rect x="30" y="125" width="330" height="195" rx="4" ry="4" fill="#0D1117" stroke="#334155" stroke-width="1" />
  <rect x="30" y="125" width="330" height="20" rx="4" ry="4" fill="#161B22" />
  <rect x="30" y="141" width="330" height="4" fill="#161B22" />
  <circle cx="44" cy="135" r="4" fill="#EF4444" />
  <circle cx="60" cy="135" r="4" fill="#F59E0B" />
  <circle cx="76" cy="135" r="4" fill="#22C55E" />
  <text x="42" y="159" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Подключение библиотек</text>
  <text x="42" y="174" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">#include &amp;lt;Servo.h&amp;gt;</text>
  <text x="42" y="189" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="42" y="204" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Объявление переменных</text>
  <text x="42" y="219" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">int ledPin = 13;</text>
  <text x="42" y="234" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">int sensorValue = 0;</text>
  <text x="42" y="249" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="42" y="264" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">void setup() {</text>
  <text x="42" y="279" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  // Инициализация (выполняется 1 раз)</text>
  <text x="42" y="294" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  pinMode(ledPin, OUTPUT);</text>
  <text x="42" y="309" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  Serial.begin(9600);</text>
  <text x="42" y="324" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">}</text>
  <text x="42" y="339" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="42" y="354" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">void loop() {</text>
  <text x="42" y="369" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  // Основной цикл (повторяется)</text>
  <text x="42" y="384" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  sensorValue = analogRead(A0);</text>
  <text x="42" y="399" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  digitalWrite(ledPin, HIGH);</text>
  <text x="42" y="414" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  delay(500);</text>
  <text x="42" y="429" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  digitalWrite(ledPin, LOW);</text>
  <text x="42" y="444" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  delay(500);</text>
  <text x="42" y="459" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">}</text>
  <rect x="390" y="90" width="390" height="240" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <rect x="390" y="90" width="390" height="28" rx="8" ry="8" fill="#0369A1" />
  <rect x="390" y="110" width="390" height="8" fill="#0369A1" />
  <text x="585" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Типы данных C++ для Arduino</text>
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#F59E0B">Тип</text>
  <text x="520" y="130" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#F59E0B">Описание</text>
  <text x="640" y="130" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#F59E0B">Пример</text>
  <rect x="395" y="136" width="375" height="22" fill="#0D1117" opacity="0.5" />
  <text x="400" y="148" font-family="Consolas, monospace" font-size="9" fill="#38BDF8">int</text>
  <text x="520" y="148" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">Целое число</text>
  <text x="640" y="148" font-family="Consolas, monospace" font-size="8" fill="#94A3B8">-32768..32767</text>
  <text x="400" y="172" font-family="Consolas, monospace" font-size="9" fill="#06B6D4">float</text>
  <text x="520" y="172" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">Дробное число</text>
  <text x="640" y="172" font-family="Consolas, monospace" font-size="8" fill="#94A3B8">3.14, -2.5</text>
  <rect x="395" y="184" width="375" height="22" fill="#0D1117" opacity="0.5" />
  <text x="400" y="196" font-family="Consolas, monospace" font-size="9" fill="#22C55E">bool</text>
  <text x="520" y="196" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">Логический</text>
  <text x="640" y="196" font-family="Consolas, monospace" font-size="8" fill="#94A3B8">true / false</text>
  <text x="400" y="220" font-family="Consolas, monospace" font-size="9" fill="#F59E0B">char</text>
  <text x="520" y="220" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">Символ</text>
  <text x="640" y="220" font-family="Consolas, monospace" font-size="8" fill="#94A3B8">'A', '0'</text>
  <rect x="395" y="232" width="375" height="22" fill="#0D1117" opacity="0.5" />
  <text x="400" y="244" font-family="Consolas, monospace" font-size="9" fill="#A78BFA">String</text>
  <text x="520" y="244" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">Строка</text>
  <text x="640" y="244" font-family="Consolas, monospace" font-size="8" fill="#94A3B8">&amp;quot;Hello&amp;quot;</text>
  <text x="400" y="268" font-family="Consolas, monospace" font-size="9" fill="#14B8A6">byte</text>
  <text x="520" y="268" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">0..255</text>
  <text x="640" y="268" font-family="Consolas, monospace" font-size="8" fill="#94A3B8">8 бит</text>
  <rect x="395" y="280" width="375" height="22" fill="#0D1117" opacity="0.5" />
  <text x="400" y="292" font-family="Consolas, monospace" font-size="9" fill="#0284C7">long</text>
  <text x="520" y="292" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">Длинное целое</text>
  <text x="640" y="292" font-family="Consolas, monospace" font-size="8" fill="#94A3B8">-2млрд..2млрд</text>
  <text x="400" y="316" font-family="Consolas, monospace" font-size="9" fill="#EF4444">unsigned int</text>
  <text x="520" y="316" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">Беззнаковое</text>
  <text x="640" y="316" font-family="Consolas, monospace" font-size="8" fill="#94A3B8">0..65535</text>
  <rect x="20" y="345" width="260" height="230" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <rect x="20" y="345" width="260" height="28" rx="8" ry="8" fill="#0369A1" />
  <rect x="20" y="365" width="260" height="8" fill="#0369A1" />
  <text x="150" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Цифровой ввод/вывод</text>
  <rect x="30" y="380" width="240" height="130" rx="4" ry="4" fill="#0D1117" stroke="#334155" stroke-width="1" />
  <rect x="30" y="380" width="240" height="20" rx="4" ry="4" fill="#161B22" />
  <rect x="30" y="396" width="240" height="4" fill="#161B22" />
  <circle cx="44" cy="390" r="4" fill="#EF4444" />
  <circle cx="60" cy="390" r="4" fill="#F59E0B" />
  <circle cx="76" cy="390" r="4" fill="#22C55E" />
  <text x="42" y="414" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Настройка пина</text>
  <text x="42" y="429" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">pinMode(13, OUTPUT);</text>
  <text x="42" y="444" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">pinMode(2, INPUT);</text>
  <text x="42" y="459" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="42" y="474" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Запись на пин</text>
  <text x="42" y="489" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">digitalWrite(13, HIGH);</text>
  <text x="42" y="504" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">digitalWrite(13, LOW);</text>
  <text x="42" y="519" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="42" y="534" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Чтение с пина</text>
  <text x="42" y="549" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">int val = digitalRead(2);</text>
  <rect x="30" y="520" width="240" height="40" fill="#0D1117" stroke="#334155" stroke-width="0.5" />
  <polyline points="35,550 35,530 70,530 70,550 105,550 105,530 140,530 140,550 175,550 175,530 210,530 210,550 245,550 245,530 260,530" fill="none" stroke="#06B6D4" stroke-width="1.5" />
  <text x="150" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94A3B8">Цифровой сигнал (HIGH/LOW)</text>
  <rect x="300" y="345" width="260" height="230" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <rect x="300" y="345" width="260" height="28" rx="8" ry="8" fill="#0369A1" />
  <rect x="300" y="365" width="260" height="8" fill="#0369A1" />
  <text x="430" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Аналоговый ввод/вывод</text>
  <rect x="310" y="380" width="240" height="130" rx="4" ry="4" fill="#0D1117" stroke="#334155" stroke-width="1" />
  <rect x="310" y="380" width="240" height="20" rx="4" ry="4" fill="#161B22" />
  <rect x="310" y="396" width="240" height="4" fill="#161B22" />
  <circle cx="324" cy="390" r="4" fill="#EF4444" />
  <circle cx="340" cy="390" r="4" fill="#F59E0B" />
  <circle cx="356" cy="390" r="4" fill="#22C55E" />
  <text x="322" y="414" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Аналоговое чтение (0-1023)</text>
  <text x="322" y="429" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">int val = analogRead(A0);</text>
  <text x="322" y="444" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="322" y="459" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Аналоговая запись (0-255)</text>
  <text x="322" y="474" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">analogWrite(9, 128);</text>
  <text x="322" y="489" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="322" y="504" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// ШИМ (PWM) сигнал</text>
  <text x="322" y="519" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Частота ~490 Гц</text>
  <text x="322" y="534" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Разрешение: 8 бит</text>
  <rect x="310" y="520" width="240" height="40" fill="#0D1117" stroke="#334155" stroke-width="0.5" />
  <polyline points="315,550 315,530 345,530 345,550 355,550 355,530 385,530 385,550 395,550 395,530 425,530 425,550 435,550 435,530 465,530 465,550 475,550 475,530 505,530 505,550 515,550 515,530 545,530 545,550" fill="none" stroke="#F59E0B" stroke-width="1.5" />
  <text x="430" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#94A3B8">ШИМ сигнал (PWM)</text>
  <rect x="580" y="345" width="200" height="230" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <rect x="580" y="345" width="200" height="28" rx="8" ry="8" fill="#0369A1" />
  <rect x="580" y="365" width="200" height="8" fill="#0369A1" />
  <text x="680" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Циклы и условия</text>
  <rect x="590" y="380" width="180" height="185" rx="4" ry="4" fill="#0D1117" stroke="#334155" stroke-width="1" />
  <rect x="590" y="380" width="180" height="20" rx="4" ry="4" fill="#161B22" />
  <rect x="590" y="396" width="180" height="4" fill="#161B22" />
  <circle cx="604" cy="390" r="4" fill="#EF4444" />
  <circle cx="620" cy="390" r="4" fill="#F59E0B" />
  <circle cx="636" cy="390" r="4" fill="#22C55E" />
  <text x="602" y="414" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Условие if/else</text>
  <text x="602" y="429" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">if (val &amp;gt; 500) {</text>
  <text x="602" y="444" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  digitalWrite(13, HIGH);</text>
  <text x="602" y="459" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">} else {</text>
  <text x="602" y="474" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  digitalWrite(13, LOW);</text>
  <text x="602" y="489" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">}</text>
  <text x="602" y="504" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="602" y="519" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Цикл for</text>
  <text x="602" y="534" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">for (int i=0; i&amp;lt;10; i++){</text>
  <text x="602" y="549" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  Serial.println(i);</text>
  <text x="602" y="564" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">}</text>
  <text x="602" y="579" font-family="Consolas, monospace" font-size="10" fill="#06B6D4" />
  <text x="602" y="594" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">// Цикл while</text>
  <text x="602" y="609" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">while (val &amp;lt; 1000){</text>
  <text x="602" y="624" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">  val = analogRead(A0);</text>
  <text x="602" y="639" font-family="Consolas, monospace" font-size="10" fill="#06B6D4">}</text>
</svg>
