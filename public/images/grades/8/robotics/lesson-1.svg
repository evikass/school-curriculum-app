<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0F172A" />
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5" />
    </pattern>
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0284C7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#grid)" opacity="0.5" />
  <rect width="800" height="200" fill="url(#topGrad)" />
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38BDF8" />
    </marker>
  </defs>
  <rect x="0" y="10" width="800" height="55" fill="#0369A1" opacity="0.9" />
  <rect x="0" y="65" width="800" height="3" fill="#38BDF8" />
  <text x="400" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#F8FAFC">Что такое робот?</text>
  <text x="400" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">Урок 1 — Введение в робототехнику</text>
  <rect x="20" y="90" width="360" height="65" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <text x="30" y="112" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F59E0B">Определение:</text>
  <text x="30" y="128" font-family="Arial, sans-serif" font-size="10" fill="#CBD5E1">Робот — автоматическое устройство, заменяющее</text>
  <text x="30" y="142" font-family="Arial, sans-serif" font-size="10" fill="#CBD5E1">человека при выполнении механических и интеллектуальных задач.</text>
  <rect x="400" y="90" width="380" height="65" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <rect x="400" y="90" width="380" height="28" rx="8" ry="8" fill="#0369A1" />
  <rect x="400" y="110" width="380" height="8" fill="#0369A1" />
  <text x="590" y="109" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Законы робототехники (Азимов)</text>
  <text x="412" y="128" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">1. Робот не может причинить вред человеку</text>
  <text x="412" y="142" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">2. Робот повинуется приказам человека</text>
  <text x="412" y="156" font-family="Arial, sans-serif" font-size="9" fill="#CBD5E1">3. Робот защищает себя, если это не противоречит 1 и 2</text>
  <rect x="20" y="170" width="760" height="200" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <rect x="20" y="170" width="760" height="28" rx="8" ry="8" fill="#0369A1" />
  <rect x="20" y="190" width="760" height="8" fill="#0369A1" />
  <text x="400" y="189" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Основные компоненты робота</text>
  <rect x="330" y="240" width="140" height="40" rx="5" ry="5" fill="#0284C7" stroke="#0284C7" stroke-width="1" />
  <text x="400" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Контроллер</text>
  <rect x="50" y="235" width="120" height="50" rx="5" ry="5" fill="#14B8A6" stroke="#14B8A6" stroke-width="1" />
  <text x="110" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Датчики</text>
  <text x="60" y="295" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Ультразвук.</text>
  <text x="60" y="308" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Инфракрасный</text>
  <text x="60" y="321" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Световой</text>
  <rect x="630" y="235" width="120" height="50" rx="5" ry="5" fill="#F59E0B" stroke="#F59E0B" stroke-width="1" />
  <text x="690" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Исполн. мех.</text>
  <text x="640" y="295" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Двигатели</text>
  <text x="640" y="308" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Сервоприводы</text>
  <text x="640" y="321" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Шаговые моторы</text>
  <rect x="330" y="300" width="140" height="30" rx="5" ry="5" fill="#EF4444" stroke="#EF4444" stroke-width="1" />
  <text x="400" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">Питание</text>
  <line x1="170" y1="260" x2="325" y2="258" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="475" y1="258" x2="625" y2="258" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="400" y1="283" x2="400" y2="296" stroke="#38BDF8" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="240" y="252" font-family="Arial, sans-serif" font-size="8" fill="#06B6D4" text-anchor="middle">Входные данные</text>
  <text x="555" y="252" font-family="Arial, sans-serif" font-size="8" fill="#06B6D4" text-anchor="middle">Управление</text>
  <rect x="20" y="385" width="760" height="185" rx="8" ry="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
  <rect x="20" y="385" width="760" height="28" rx="8" ry="8" fill="#0369A1" />
  <rect x="20" y="405" width="760" height="8" fill="#0369A1" />
  <text x="400" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#F8FAFC">История развития робототехники</text>
  <line x1="60" y1="470" x2="740" y2="470" stroke="#38BDF8" stroke-width="2" />
  <circle cx="60" cy="470" r="6" fill="#38BDF8" stroke="#0F172A" stroke-width="2" />
  <text x="60" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#F59E0B">1920</text>
  <text x="60" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">К. Чапек</text>
  <text x="60" y="517" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">ввёл слово</text>
  <text x="60" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">&amp;quot;робот&amp;quot;</text>
  <circle cx="190" cy="470" r="6" fill="#38BDF8" stroke="#0F172A" stroke-width="2" />
  <text x="190" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#F59E0B">1961</text>
  <text x="190" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Первый</text>
  <text x="190" y="517" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">промышленный</text>
  <text x="190" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">робот Unimate</text>
  <circle cx="320" cy="470" r="6" fill="#38BDF8" stroke="#0F172A" stroke-width="2" />
  <text x="320" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#F59E0B">1969</text>
  <text x="320" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Стэнфордская</text>
  <text x="320" y="517" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">рука — первый</text>
  <text x="320" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">электромех. робот</text>
  <circle cx="450" cy="470" r="6" fill="#38BDF8" stroke="#0F172A" stroke-width="2" />
  <text x="450" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#F59E0B">1997</text>
  <text x="450" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">Deep Blue</text>
  <text x="450" y="517" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">побеждает</text>
  <text x="450" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">чемпиона мира</text>
  <circle cx="580" cy="470" r="6" fill="#38BDF8" stroke="#0F172A" stroke-width="2" />
  <text x="580" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#F59E0B">2000</text>
  <text x="580" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">ASIMO —</text>
  <text x="580" y="517" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">гуманоидный</text>
  <text x="580" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">робот Honda</text>
  <circle cx="710" cy="470" r="6" fill="#38BDF8" stroke="#0F172A" stroke-width="2" />
  <text x="710" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#F59E0B">2020+</text>
  <text x="710" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">AI и</text>
  <text x="710" y="517" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">коллаборативные</text>
  <text x="710" y="529" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#94A3B8">роботы</text>
</svg>
