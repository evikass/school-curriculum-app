  <text x="430" y="160" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">I — сила тока [А] (Ампер)</text>
  <text x="430" y="180" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">q — заряд [Кл] (Кулон)</text>
  <text x="430" y="200" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">t — время [с]</text>
  <text x="430" y="220" text-anchor="start" fill="#92400E" font-size="13" font-weight="bold" font-family="Arial, sans-serif">1 А = 1 Кл / 1 с</text>
