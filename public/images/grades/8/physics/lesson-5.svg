  <circle cx="195" cy="345" r="12" fill="none" stroke="#EF4444" stroke-width="2" />
  <text x="195" y="350" text-anchor="middle" fill="#EF4444" font-size="11" font-weight="bold" font-family="Arial, sans-serif">V</text>
  <line x1="195" y1="357" x2="195" y2="350" stroke="#3B82F6" stroke-width="1" stroke-dasharray="4,4" />
  <rect x="417" y="242" width="370" height="100" rx="8" fill="#E5E7EB" opacity="0.5" />
