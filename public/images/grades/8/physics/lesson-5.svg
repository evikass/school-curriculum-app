  <text x="30" y="128" text-anchor="start" fill="#1C1917" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Направленное движение</text>
  <text x="30" y="148" text-anchor="start" fill="#1C1917" font-size="14" font-weight="bold" font-family="Arial, sans-serif">заряженных частиц!</text>
  <text x="30" y="175" text-anchor="start" fill="#92400E" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Условия тока:</text>
  <text x="30" y="195" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">• Свободные заряды</text>
  <text x="30" y="213" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">• Электрическое поле (источник)</text>
