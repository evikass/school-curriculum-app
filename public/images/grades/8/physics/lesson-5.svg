  <text x="40" y="445" text-anchor="start" fill="#1C1917" font-size="14" font-weight="bold" font-family="Arial, sans-serif">I: Ампер [А]</text>
  <text x="210" y="445" text-anchor="start" fill="#1C1917" font-size="14" font-weight="bold" font-family="Arial, sans-serif">U: Вольт [В]</text>
  <text x="380" y="445" text-anchor="start" fill="#1C1917" font-size="14" font-weight="bold" font-family="Arial, sans-serif">R: Ом [Ω]</text>
  <text x="540" y="445" text-anchor="start" fill="#1C1917" font-size="14" font-weight="bold" font-family="Arial, sans-serif">q: Кулон [Кл]</text>
  <text x="40" y="468" text-anchor="start" fill="#3B82F6" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Амперметр — последовательно</text>
  <text x="280" y="468" text-anchor="start" fill="#EF4444" font-size="12" font-weight="normal" font-family="Arial, sans-serif">Вольтметр — параллельно</text>
