  <text x="600" y="368" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold" font-family="Arial, sans-serif">Сопротивление</text>
  <text x="600" y="380" text-anchor="middle" fill="#92400E" font-size="22" font-weight="bold" font-family="Arial, sans-serif">R = ρ · l / S</text>
  <line x1="529" y1="386" x2="671" y2="386" stroke="#F59E0B" stroke-width="2" opacity="0.4" />
  <text x="430" y="400" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">ρ — уд. сопротивление, l — длина</text>
  <text x="430" y="418" text-anchor="start" fill="#1C1917" font-size="12" font-weight="normal" font-family="Arial, sans-serif">S — площадь сечения [Ом]</text>
  <rect x="17" y="417" width="770" height="70" rx="8" fill="#E5E7EB" opacity="0.5" />
