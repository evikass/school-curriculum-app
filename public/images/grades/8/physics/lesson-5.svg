  <text x="600" y="278" text-anchor="middle" fill="#92400E" font-size="24" font-weight="bold" font-family="Arial, sans-serif">U = A / q</text>
  <line x1="546" y1="284" x2="654" y2="284" stroke="#F59E0B" stroke-width="2" opacity="0.4" />
  <text x="430" y="300" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">U — напряжение [В] (Вольт)</text>
  <text x="430" y="318" text-anchor="start" fill="#1C1917" font-size="13" font-weight="normal" font-family="Arial, sans-serif">A — работа поля, q — заряд</text>
  <text x="430" y="335" text-anchor="start" fill="#92400E" font-size="13" font-weight="bold" font-family="Arial, sans-serif">1 В = 1 Дж / 1 Кл</text>
  <rect x="417" y="352" width="370" height="80" rx="8" fill="#E5E7EB" opacity="0.5" />
  <rect x="415" y="350" width="370" height="80" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.5" />
