  <text x="145" y="402" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="sans-serif" font-weight="bold">Указ о престолонаследии (1722)</text>
  <text x="30" y="427" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">Пётр I отменил обычный порядок</text>
  <text x="30" y="441" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">наследования. Монарх сам назначает</text>
  <text x="30" y="455" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">преемника. Это привело к эпохе</text>
  <text x="30" y="469" font-size="9" fill="#B91C1C" text-anchor="start" font-family="sans-serif" font-weight="bold">дворцовых переворотов.</text>
