  <rect x="550" y="399" width="235" height="10" fill="#059669" />
  <text x="667" y="402" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="sans-serif" font-weight="bold">Манифест 1762 г.</text>
  <text x="560" y="427" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">Освобождение дворян от</text>
  <text x="560" y="441" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">обязательной службы. Пётр III</text>
  <text x="560" y="455" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">подписал манифест. Дворяне</text>
  <text x="560" y="469" font-size="9" fill="#065F46" text-anchor="start" font-family="sans-serif" font-weight="bold">могли не служить государству.</text>
  <rect x="20" y="495" width="760" height="40" fill="#FEE2E2" stroke="#FCA5A5" rx="8" ry="8" />
  <text x="400" y="512" font-size="11" fill="#B91C1C" text-anchor="middle" font-family="sans-serif" font-weight="bold">Эпоха дворцовых переворотов: 37 лет, 6 правителей, постоянная борьба за власть</text>
  <text x="400" y="527" font-size="9" fill="#6B7280" text-anchor="middle" font-family="sans-serif" font-style="italic">«Дворцы да шептунов довольно, а войска мало» — современники об эпохе</text>
  <rect x="0" y="570" width="800" height="30" fill="#B91C1C" opacity="0.15" />
