  <text x="420" y="402" font-size="10" fill="#FFFFFF" text-anchor="middle" font-family="sans-serif" font-weight="bold">Гвардия — главная сила</text>
  <text x="295" y="427" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">Преображенский и Семёновский</text>
  <text x="295" y="441" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">полки решали исход переворотов.</text>
  <text x="295" y="455" font-size="9" fill="#1F2937" text-anchor="start" font-family="sans-serif">Гвардейцы возводили и свергали</text>
  <text x="295" y="469" font-size="9" fill="#7C3AED" text-anchor="start" font-family="sans-serif" font-weight="bold">императоров по своей воле.</text>
  <rect x="550" y="385" width="235" height="95" fill="#FFFFFF" stroke="#059669" stroke-width="1.5" rx="8" ry="8" />
