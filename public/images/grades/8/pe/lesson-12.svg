<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#F0FDF4" rx="12"/>
  <rect x="0" y="0" width="800" height="60" fill="#22C55E" rx="0"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Олимпийское движение: история и современность</text><circle cx="240" cy="120" r="25" fill="none" stroke="#0081C8" stroke-width="4"/><circle cx="310" cy="120" r="25" fill="none" stroke="#000000" stroke-width="4"/><circle cx="380" cy="120" r="25" fill="none" stroke="#EE334E" stroke-width="4"/><circle cx="275" cy="145" r="25" fill="none" stroke="#FCB131" stroke-width="4"/><circle cx="345" cy="145" r="25" fill="none" stroke="#00A651" stroke-width="4"/><text x="310" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#475569">Citius, Altius, Fortius — Быстрее, Выше, Сильнее</text><rect x="20" y="200" width="375" height="170" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="20" y="200" width="375" height="28" fill="#22C55E" rx="8"/>
<rect x="20" y="220" width="375" height="8" fill="#22C55E"/>
<text x="207" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Древние Олимпийские игры</text>
<text x="32" y="244" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Первые игры — 776 г. до н.э., Олимпия (Греция)</text>
<text x="32" y="262" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Проводились в честь бога Зевса</text>
<text x="32" y="280" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Длились 5 дней, каждые 4 года</text>
<text x="32" y="298" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Виды: бег, панкратион, пятиборье,</text>
<text x="32" y="316" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  борьба, гонки на колесницах</text>
<text x="32" y="334" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Участники — только свободные греки-мужчины</text>
<text x="32" y="352" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Священное перемирие (экехейрия)</text>
<text x="32" y="370" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Запрещены в 394 г. н.э. (имп. Феодосий)</text><rect x="410" y="200" width="370" height="170" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="410" y="200" width="370" height="28" fill="#EF4444" rx="8"/>
<rect x="410" y="220" width="370" height="8" fill="#EF4444"/>
<text x="595" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Современные Олимпийские игры</text>
<text x="422" y="244" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Возрождены Пьером де Кубертеном (1896)</text>
<text x="422" y="262" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• I Олимпиада — Афины, 1896 г.</text>
<text x="422" y="280" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Зимние Олимпийские игры — с 1924 г.</text>
<text x="422" y="298" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Паралимпийские игры — с 1960 г.</text>
<text x="422" y="316" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Проводятся каждые 4 года</text>
<text x="422" y="334" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Олимпийская хартия — основной документ</text>
<text x="422" y="352" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• МОК — Международный олимпийский комитет</text>
<text x="422" y="370" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Россия на Олимпиадах с 1900 г.</text>
  <rect x="20" y="380" width="760" height="36" fill="#16A34A" rx="8"/>
  <text x="400" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Хронология олимпийского движения</text><line x1="40" y1="435" x2="760" y2="435" stroke="#22C55E" stroke-width="3"/><circle cx="80" cy="435" r="6" fill="#EF4444"/><text x="80" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16A34A" font-weight="bold">776 до н.э.</text><text x="80" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">Первые игры</text><circle cx="230" cy="435" r="6" fill="#EF4444"/><text x="230" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16A34A" font-weight="bold">1896</text><text x="230" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">Афины, I Олимпиада</text><circle cx="380" cy="435" r="6" fill="#EF4444"/><text x="380" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16A34A" font-weight="bold">1924</text><text x="380" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">Зимние игры</text><circle cx="530" cy="435" r="6" fill="#EF4444"/><text x="530" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16A34A" font-weight="bold">1980</text><text x="530" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">Москва, XXII Олимпиада</text><circle cx="680" cy="435" r="6" fill="#EF4444"/><text x="680" y="425" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#16A34A" font-weight="bold">2024</text><text x="680" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#475569">Париж, XXXIII Олимпиада</text><rect x="20" y="475" width="375" height="80" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="20" y="475" width="375" height="28" fill="#22C55E" rx="8"/>
<rect x="20" y="495" width="375" height="8" fill="#22C55E"/>
<text x="207" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Олимпийские чемпионы России</text>
<text x="32" y="519" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• А. Карелин (борьба) — 3-кратный олимпийский чемпион</text>
<text x="32" y="537" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Л. Егорова (лыжи) — 6 золотых медалей</text>
<text x="32" y="555" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• С. Хоркина (гимнастика) — 2 золота</text><rect x="410" y="475" width="370" height="80" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="410" y="475" width="370" height="28" fill="#EF4444" rx="8"/>
<rect x="410" y="495" width="370" height="8" fill="#EF4444"/>
<text x="595" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Ценности олимпизма</text>
<text x="422" y="519" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Дружба, солидарность, честная игра</text>
<text x="422" y="537" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Спорт как средство мира и взаимопонимания</text>
<text x="422" y="555" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Ни расы, ни религии — только талант!</text>
  <rect x="0" y="568" width="800" height="32" fill="#16A34A"/>
  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">8 класс | Физкультура/ОБЖ | Урок 12</text></svg>