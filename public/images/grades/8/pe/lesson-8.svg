<text x="142" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Классические ходы</text>
<text x="32" y="269" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Попеременный двухшажный</text>
<text x="32" y="287" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Одновременный бесшажный</text>
<text x="32" y="305" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Одновременный одношажный</text>
<text x="32" y="323" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Одновременный двухшажный</text>
<text x="32" y="341" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Полуконьковый ход</text>
<text x="32" y="359" font-family="Arial, sans-serif" font-size="12" fill="#1E293B"></text>
<text x="32" y="377" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Отталкивание ногой назад</text>
<text x="32" y="395" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  по классической лыжне</text><rect x="280" y="225" width="245" height="165" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="280" y="225" width="245" height="28" fill="#EF4444" rx="8"/>
<rect x="280" y="245" width="245" height="8" fill="#EF4444"/>
<text x="402" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Коньковые ходы</text>
<text x="292" y="269" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Коньковый без палок</text>
<text x="292" y="287" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Коньковый одновременный</text>
<text x="292" y="305" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Коньковый двухшажный</text>
<text x="292" y="323" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Полуконьковый</text>
<text x="292" y="341" font-family="Arial, sans-serif" font-size="12" fill="#1E293B"></text>
<text x="292" y="359" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Отталкивание ребром лыжи</text>
<text x="292" y="377" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  V-образное скольжение</text>
<text x="292" y="395" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  Скорость выше классики</text><rect x="540" y="225" width="240" height="165" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="540" y="225" width="240" height="28" fill="#22C55E" rx="8"/>
<rect x="540" y="245" width="240" height="8" fill="#22C55E"/>
<text x="660" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Спуски и подъёмы</text>
<text x="552" y="269" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Спуск в основной стойке</text>
<text x="552" y="287" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Спуск в высокой стойке</text>
<text x="552" y="305" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Спуск в низкой стойке</text>
<text x="552" y="323" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Подъём «лесенкой»</text>
<text x="552" y="341" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Подъём «ёлочкой»</text>
<text x="552" y="359" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Подъём «полуёлочкой»</text>
<text x="552" y="377" font-family="Arial, sans-serif" font-size="12" fill="#1E293B"></text>
<text x="552" y="395" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Торможение: плугом, упором</text>
  <rect x="20" y="400" width="760" height="36" fill="#16A34A" rx="8"/>
  <text x="400" y="424" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Инвентарь и безопасность</text><rect x="20" y="440" width="245" height="110" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="20" y="440" width="245" height="28" fill="#22C55E" rx="8"/>
<rect x="20" y="460" width="245" height="8" fill="#22C55E"/>
<text x="142" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Лыжный инвентарь</text>
<text x="32" y="484" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Беговые лыжи (классические)</text>
<text x="32" y="502" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Коньковые лыжи (короче)</text>
<text x="32" y="520" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Лыжные палки (до подмышки)</text>
<text x="32" y="538" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Лыжные ботинки</text>
<text x="32" y="556" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Крепления (NNN, SNS)</text>
<text x="32" y="574" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Смазка (мазь держания/скольж.)</text><rect x="282" y="440" width="245" height="110" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="282" y="440" width="245" height="28" fill="#EF4444" rx="8"/>
<rect x="282" y="460" width="245" height="8" fill="#EF4444"/>
<text x="404" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Безопасность на лыжне</text>
<text x="294" y="484" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Разминка перед выходом на снег</text>
<text x="294" y="502" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Соответствующая одежда</text>
<text x="294" y="520" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Соблюдать дистанцию</text>
<text x="294" y="538" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Не пересекать чужую лыжню</text>
<text x="294" y="556" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Спуск по своей дорожке</text>
<text x="294" y="574" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Осторожно на спусках и поворотах</text><rect x="543" y="440" width="240" height="110" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="543" y="440" width="240" height="28" fill="#22C55E" rx="8"/>
<rect x="543" y="460" width="240" height="8" fill="#22C55E"/>
<text x="663" y="459" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Соревнования</text>
<text x="555" y="484" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Спринт (1,5 км)</text>
<text x="555" y="502" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Гонка преследования (пурсьют)</text>
<text x="555" y="520" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Индивидуальная гонка (10/15 км)</text>
<text x="555" y="538" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Марафон (50 км)</text>
<text x="555" y="556" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Эстафета 4х5 / 4х10 км</text>
<text x="555" y="574" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Тур де Ски — многодневка</text>
