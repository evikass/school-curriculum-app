<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600"><rect width="800" height="600" fill="#F0FDF4" rx="12"/>
  <rect x="0" y="0" width="800" height="60" fill="#22C55E" rx="0"/>
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">Профилактика травм на занятиях физкультурой</text>
  <polygon points="400,90 340,175 460,175" fill="none" stroke="#EF4444" stroke-width="4" stroke-linejoin="round"/>
  <text x="400" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#EF4444">!</text>
  <text x="400" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#DC2626" font-weight="bold">ВНИМАНИЕ: БЕЗОПАСНОСТЬ ПРЕЖДЕ ВСЕГО</text><rect x="20" y="210" width="245" height="185" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="20" y="210" width="245" height="28" fill="#22C55E" rx="8"/>
<rect x="20" y="230" width="245" height="8" fill="#22C55E"/>
<text x="142" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Разминка и подготовка</text>
<text x="32" y="254" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Обязательная разминка (10-15 мин)</text>
<text x="32" y="272" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Разогрев всех групп мышц</text>
<text x="32" y="290" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Растяжка после разминки</text>
<text x="32" y="308" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Постепенное увеличение нагрузки</text>
<text x="32" y="326" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Проверка инвентаря перед занятием</text>
<text x="32" y="344" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Удобная спортивная форма и обувь</text>
<text x="32" y="362" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Снятие украшений и часов</text>
<text x="32" y="380" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Волосы собраны (для девочек)</text><rect x="280" y="210" width="245" height="185" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="280" y="210" width="245" height="28" fill="#EF4444" rx="8"/>
<rect x="280" y="230" width="245" height="8" fill="#EF4444"/>
<text x="402" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Правильная техника</text>
<text x="292" y="254" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Соблюдать технику выполнения</text>
<text x="292" y="272" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Не выполнять сложные элементы</text>
<text x="292" y="290" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  без подготовки</text>
<text x="292" y="308" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Следовать указаниям учителя</text>
<text x="292" y="326" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Соблюдать дистанцию между</text>
<text x="292" y="344" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  учащимися</text>
<text x="292" y="362" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Правильное приземление</text>
<text x="292" y="380" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  (на две ноги, амортизация)</text>
<text x="292" y="398" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Не толкаться и не подножки</text><rect x="540" y="210" width="240" height="185" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="540" y="210" width="240" height="28" fill="#22C55E" rx="8"/>
<rect x="540" y="230" width="240" height="8" fill="#22C55E"/>
<text x="660" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Инвентарь и среда</text>
<text x="552" y="254" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Исправный спортивный инвентарь</text>
<text x="552" y="272" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Чистый и сухой спортивный зал</text>
<text x="552" y="290" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Маты под снарядами</text>
<text x="552" y="308" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Проверка креплений (лыжи)</text>
<text x="552" y="326" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Безопасная зона вокруг</text>
<text x="552" y="344" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  гимнастических снарядов</text>
<text x="552" y="362" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Ограждение зоны бросков</text>
<text x="552" y="380" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Температура в зале 16-18 C</text>
  <rect x="20" y="405" width="760" height="36" fill="#16A34A" rx="8"/>
  <text x="400" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Типичные травмы и первая помощь</text><rect x="20" y="450" width="245" height="110" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="20" y="450" width="245" height="28" fill="#22C55E" rx="8"/>
<rect x="20" y="470" width="245" height="8" fill="#22C55E"/>
<text x="142" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Типичные травмы</text>
<text x="32" y="494" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Растяжение связок и мышц</text>
<text x="32" y="512" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Ушибы и ссадины</text>
<text x="32" y="530" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Вывихи суставов</text>
<text x="32" y="548" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Переломы (редко)</text>
<text x="32" y="566" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Потёртости и мозоли</text><rect x="282" y="450" width="245" height="110" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="282" y="450" width="245" height="28" fill="#EF4444" rx="8"/>
<rect x="282" y="470" width="245" height="8" fill="#EF4444"/>
<text x="404" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Первая помощь (R.I.C.E.)</text>
<text x="294" y="494" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">R — Rest (покой)</text>
<text x="294" y="512" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">I — Ice (лёд на 15-20 мин)</text>
<text x="294" y="530" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">C — Compression (тугая повязка)</text>
<text x="294" y="548" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">E — Elevation (поднять конечность)</text>
<text x="294" y="566" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">Обязательно — обратиться к врачу!</text><rect x="543" y="450" width="240" height="110" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="543" y="450" width="240" height="28" fill="#22C55E" rx="8"/>
<rect x="543" y="470" width="240" height="8" fill="#22C55E"/>
<text x="663" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Профилактика</text>
<text x="555" y="494" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Регулярные медосмотры</text>
<text x="555" y="512" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Учёт состояния здоровья</text>
<text x="555" y="530" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Ограничения по заболеваниям</text>
<text x="555" y="548" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Страховка при выполнении</text>
<text x="555" y="566" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  сложных элементов</text>
  <rect x="0" y="568" width="800" height="32" fill="#16A34A"/>
  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">8 класс | Физкультура/ОБЖ | Урок 11</text></svg>