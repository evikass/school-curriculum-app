<text x="145" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Правила безопасности</text>
<text x="32" y="434" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Разминка перед заплывом</text>
<text x="32" y="452" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Не плавать на полный желудок</text>
<text x="32" y="470" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Соблюдать дистанцию между</text>
<text x="32" y="488" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">  пловцами на дорожках</text>
<text x="32" y="506" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Не прыгать на мелководье</text>
<text x="32" y="524" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Использовать шапочку и очки</text>
<text x="32" y="542" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Не заплывать за буйки</text><rect x="285" y="390" width="250" height="150" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="285" y="390" width="250" height="28" fill="#EF4444" rx="8"/>
<rect x="285" y="410" width="250" height="8" fill="#EF4444"/>
<text x="410" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Олимпийские дистанции</text>
<text x="297" y="434" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 50 м вольный стиль (спринт)</text>
<text x="297" y="452" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 100 м — все стили</text>
<text x="297" y="470" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 200 м — все стили</text>
<text x="297" y="488" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 400 м вольный стиль</text>
<text x="297" y="506" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 1500 м вольный стиль</text>
<text x="297" y="524" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Эстафеты 4х100, 4х200</text>
<text x="297" y="542" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Комплексное плавание</text><rect x="550" y="390" width="230" height="150" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="550" y="390" width="230" height="28" fill="#22C55E" rx="8"/>
<rect x="550" y="410" width="230" height="8" fill="#22C55E"/>
<text x="665" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Знаменитые пловцы</text>
<text x="562" y="434" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• М. Фелпс — 23 олимп. золота</text>
<text x="562" y="452" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• К. Ледецки — королева的水</text>
<text x="562" y="470" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• А. Попов — легенда спринта</text>
<text x="562" y="488" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Л. Клебер — брасс</text>
<text x="562" y="506" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Ю. Прилуцкий — Россия</text>
<text x="562" y="524" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Рекорд 100м кр: 46,86 с</text>
<text x="562" y="542" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Рекорд 200м батт: 1:50,3</text>
