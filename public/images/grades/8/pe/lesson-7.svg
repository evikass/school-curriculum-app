<text x="600" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Кроль (вольный стиль)</text>
<text x="432" y="122" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Самый быстрый способ плавания</text>
<text x="432" y="140" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Попеременная работа рук и ног</text>
<text x="432" y="158" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Ноги — непрерывный удар вверх-вниз</text>
<text x="432" y="176" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Дыхание — поворот головы в сторону</text><rect x="420" y="183" width="360" height="75" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="420" y="183" width="360" height="28" fill="#EF4444" rx="8"/>
<rect x="420" y="203" width="360" height="8" fill="#EF4444"/>
<text x="600" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Брасс</text>
<text x="432" y="227" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Одновременная работа рук и ног</text>
<text x="432" y="245" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• «Лягушачьи» движения ногами</text>
<text x="432" y="263" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Дыхание — подъём головы над водой</text><rect x="420" y="268" width="360" height="60" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="420" y="268" width="360" height="28" fill="#22C55E" rx="8"/>
<rect x="420" y="288" width="360" height="8" fill="#22C55E"/>
<text x="600" y="287" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Баттерфляй (дельфин)</text>
<text x="432" y="312" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Самый сложный и энергозатратный стиль</text>
<text x="432" y="330" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Одновременный гребок обеими руками</text>
