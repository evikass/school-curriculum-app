  <text x="400" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Техника безопасности и советы</text><rect x="20" y="390" width="250" height="150" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="20" y="390" width="250" height="28" fill="#22C55E" rx="8"/>
