<text x="142" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Размеры и время</text>
<text x="32" y="454" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Площадка: 28 х 15 м</text>
<text x="32" y="472" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Кольцо: 3,05 м высота</text>
<text x="32" y="490" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Матч: 4 четверти по 10 мин</text>
<text x="32" y="508" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Состав: 5 на площадке</text>
<text x="32" y="526" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 24 сек — время на атаку</text>
<text x="32" y="544" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• 3 сек — в штрафной зоне</text><rect x="282" y="410" width="245" height="140" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="282" y="410" width="245" height="28" fill="#EF4444" rx="8"/>
<rect x="282" y="430" width="245" height="8" fill="#EF4444"/>
<text x="404" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Нарушения</text>
<text x="294" y="454" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Пробежка — более 2 шагов</text>
<text x="294" y="472" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Двойное ведение</text>
<text x="294" y="490" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Нарушение 3/5/24 секунд</text>
<text x="294" y="508" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Фол — толчок, блок</text>
<text x="294" y="526" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Технический фол</text>
<text x="294" y="544" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Дисквалифицирующий фол</text><rect x="543" y="410" width="245" height="140" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="543" y="410" width="245" height="28" fill="#22C55E" rx="8"/>
<rect x="543" y="430" width="245" height="8" fill="#22C55E"/>
<text x="665" y="429" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Знаменитые лиги</text>
<text x="555" y="454" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• NBA — США (лучшие игроки)</text>
<text x="555" y="472" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Евролига — лучший в Европе</text>
<text x="555" y="490" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Единная лига ВТБ — Россия</text>
<text x="555" y="508" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Чемпионат мира ФИБА</text>
<text x="555" y="526" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Олимпийский турнир</text>
<text x="555" y="544" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Джеймс, Джордан, Коби</text>
