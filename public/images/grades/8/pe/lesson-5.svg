  <text x="210" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">Схема баскетбольной площадки</text><circle cx="70" cy="190" r="12" fill="#16A34A" opacity="0.85"/><text x="70" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">РЗ</text><circle cx="150" cy="130" r="12" fill="#16A34A" opacity="0.85"/><text x="150" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">АЗ</text><circle cx="150" cy="250" r="12" fill="#16A34A" opacity="0.85"/><text x="150" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">ЛФ</text><circle cx="250" cy="130" r="12" fill="#16A34A" opacity="0.85"/><text x="250" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">ТФ</text><circle cx="300" cy="190" r="12" fill="#16A34A" opacity="0.85"/><text x="300" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF" font-weight="bold">Ц</text><rect x="410" y="80" width="370" height="130" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
