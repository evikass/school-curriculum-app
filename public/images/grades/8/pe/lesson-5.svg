<text x="595" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Техника игры</text>
<text x="422" y="124" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Ведение мяча (дриблинг)</text>
<text x="422" y="142" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Передача — двумя руками от груди</text>
<text x="422" y="160" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Бросок — двухтактный, трёхочковый</text>
<text x="422" y="178" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Подбор мяча (ребаунд)</text><rect x="410" y="220" width="370" height="130" fill="#FFFFFF" stroke="#EF4444" stroke-width="2" rx="8"/>
<rect x="410" y="220" width="370" height="28" fill="#EF4444" rx="8"/>
<rect x="410" y="240" width="370" height="8" fill="#EF4444"/>
<text x="595" y="239" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">Тактика игры</text>
<text x="422" y="264" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Пик-н-ролл (заслон + проход)</text>
<text x="422" y="282" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Изоляция (1 на 1)</text>
<text x="422" y="300" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Быстрый отрыв (фаст-брейк)</text>
<text x="422" y="318" font-family="Arial, sans-serif" font-size="12" fill="#1E293B">• Зонная защита (2-3, 3-2)</text>
  <rect x="20" y="360" width="760" height="36" fill="#16A34A" rx="8"/>
  <text x="400" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Основные правила</text><rect x="20" y="410" width="245" height="140" fill="#FFFFFF" stroke="#22C55E" stroke-width="2" rx="8"/>
<rect x="20" y="410" width="245" height="28" fill="#22C55E" rx="8"/>
