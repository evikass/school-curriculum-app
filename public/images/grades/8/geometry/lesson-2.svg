    <text x="358" y="235" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490">C</text>
    <text x="158" y="235" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0E7490">D</text>
    <text x="243" y="271" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#F59E0B">O</text>
    <line x1="170" y1="240" x2="170" y2="310" stroke="#EF4444" stroke-width="2" stroke-dasharray="3,2" />
    <text x="170" y="269" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#EF4444" text-anchor="middle" font-style="italic">h</text>
    <text x="210" y="328" font-family="Arial,sans-serif" font-size="12" fill="#06B6D4" font-style="italic" text-anchor="middle">a</text>
    <text x="268" y="232" font-family="Arial,sans-serif" font-size="12" fill="#06B6D4" font-style="italic">a</text>
    <text x="210" y="380" font-family="Arial,sans-serif" font-size="11" fill="#06B6D4" text-anchor="middle" opacity="0.8">ABCD — параллелограмм</text>
  </g>
  <rect x="413" y="218" width="370" height="170" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="215" width="370" height="170" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="410" y="215" width="370" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="410" y="231" width="370" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="595" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Признаки параллелограмма</text>
  <text x="422" y="255" font-family="Arial,sans-serif" font-size="12" fill="#37474F">1. AB = CD и AB ∥ CD</text>
  <text x="422" y="272" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   (одна пара равных и паралл.)</text>
  <text x="422" y="289" font-family="Arial,sans-serif" font-size="12" fill="#37474F">2. AB = CD и BC = AD</text>
  <text x="422" y="306" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   (обе пары сторон равны)</text>
  <text x="422" y="323" font-family="Arial,sans-serif" font-size="12" fill="#37474F">3. AO = OC и BO = OD</text>
  <text x="422" y="340" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   (диагонали точкой делятся</text>
  <text x="422" y="357" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   пополам)</text>
  <text x="422" y="374" font-family="Arial,sans-serif" font-size="12" fill="#37474F">4. ∠A = ∠C и ∠B = ∠D</text>
  <text x="422" y="391" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   (обе пары углов равны)</text>
  <rect x="23" y="403" width="760" height="70" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="400" width="760" height="70" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
  <rect x="20" y="400" width="760" height="24" fill="#F59E0B" rx="8" opacity="0.2" />
  <rect x="20" y="416" width="760" height="8" fill="#F59E0B" opacity="0.2" />
  <text x="400" y="417" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Площадь параллелограмма</text>
  <text x="32" y="440" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">S = a · h   где a — основание, h — высота     |     S = d₁ · d₂ · sin(α) / 2   где α — угол между диагоналями</text>
  <rect x="23" y="488" width="760" height="55" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="485" width="760" height="55" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="485" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="501" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="502" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Частные случаи</text>
  <text x="32" y="525" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Прямоугольник — все углы 90°     • Ромб — все стороны равны     • Квадрат — прямоугольник и ромб одновременно</text>
