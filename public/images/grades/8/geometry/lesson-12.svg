  <text x="640" y="232" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Расположение центров</text>
  <text x="512" y="255" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Δ остроугольный: O внутри Δ</text>
  <text x="512" y="272" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Δ прямоугольный: O на середине</text>
  <text x="512" y="289" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  гипотенузы, R = c/2</text>
  <text x="512" y="306" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Δ тупоугольный: O вне Δ</text>
  <text x="512" y="323" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="512" y="340" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Впис. окружность Δ всегда внутри</text>
  <text x="512" y="357" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="512" y="374" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Для прямоугольного Δ:</text>
  <text x="512" y="391" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  r = (a + b − c) / 2</text>
  <text x="512" y="408" font-family="Arial,sans-serif" font-size="12" fill="#37474F">  R = c / 2</text>
  <rect x="23" y="413" width="760" height="90" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="410" width="760" height="90" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
  <rect x="20" y="410" width="760" height="24" fill="#F59E0B" rx="8" opacity="0.2" />
  <rect x="20" y="426" width="760" height="8" fill="#F59E0B" opacity="0.2" />
  <text x="400" y="427" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Ключевые формулы</text>
  <text x="32" y="450" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">r = S / p  (впис. в Δ)          |          R = abc / (4S)  (опис. около Δ)          |          R ≥ 2r  (неравенство Эйлера)</text>
  <text x="32" y="468" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Для прав. Δ: R = a/√3,  r = a/(2√3)     |     Для квадрата: R = a√2/2,  r = a/2     |     Для прав. 6-уг: R = a,  r = a√3/2</text>
  <rect x="23" y="518" width="760" height="40" fill="#000000" rx="8" opacity="0.05" />
  <rect x="20" y="515" width="760" height="40" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
  <rect x="20" y="515" width="760" height="24" fill="#06B6D4" rx="8" opacity="0.15" />
  <rect x="20" y="531" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="532" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Теорема: около любого треугольника можно описать и в любой треугольник вписать окружность</text>
  <text x="32" y="555" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Для четырёхугольника: описанная ↔ сумма противоп. сторон равна (a+c=b+d) | вписанная ↔ сумма противоп. углов = 180°</text>
