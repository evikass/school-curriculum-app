  <text x="595" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Описанная окружность</text>
  <text x="422" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Описанная окружность — окружность,</text>
  <text x="422" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">проходящая через все вершины.</text>
  <text x="422" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="422" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Центр — точка пересечения</text>
  <text x="422" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">серединных перпендикуляров.</text>
  <text x="422" y="215" font-family="Arial,sans-serif" font-size="12" fill="#37474F">R = abc / (4S)  (в треугольнике)</text>
