  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Вписанная окружность</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Вписанная окружность — окружность,</text>
  <text x="32" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">касающаяся всех сторон многоугол.</text>
  <text x="32" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="32" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Центр — точка пересечения</text>
  <text x="32" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">биссектрис внутренних углов.</text>
  <text x="32" y="215" font-family="Arial,sans-serif" font-size="12" fill="#37474F">r = S / p  (в треугольнике)</text>
  <rect x="413" y="93" width="370" height="110" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="90" width="370" height="110" fill="#FFFFFF" rx="8" stroke="#06B6D4" stroke-width="1.5" opacity="0.95" />
