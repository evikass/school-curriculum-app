  <text x="422" y="130" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">1. Касательная ⊥ радиусу в точке</text>
  <text x="422" y="148" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">   касания: a ⊥ OK</text>
  <text x="422" y="166" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold" />
  <text x="422" y="184" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">2. Отрезки касательных, проведённых</text>
  <text x="422" y="202" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">   из одной точки, равны:</text>
  <text x="422" y="220" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">   AM = AN</text>
