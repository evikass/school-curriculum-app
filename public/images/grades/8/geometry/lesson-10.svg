  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Определение</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Касательная к окружности — прямая,</text>
  <text x="32" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">имеющая с окружностью ровно</text>
  <text x="32" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F">одну общую точку (точку касания).</text>
  <text x="32" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="32" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Прямая a — касательная</text>
  <text x="32" y="215" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Точка K — точка касания</text>
