  <text x="32" y="460" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">1. Касательная ⊥ радиусу: OK ⊥ a     2. AM = AN (отрезки из одной точки)     3. OM ⊥ AM, ON ⊥ AN</text>
