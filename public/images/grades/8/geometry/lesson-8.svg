  <rect x="20" y="516" width="760" height="8" fill="#06B6D4" opacity="0.15" />
  <text x="400" y="517" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Применение</text>
  <text x="32" y="540" font-family="Arial,sans-serif" font-size="12" fill="#37474F">• Нахождение неизвестных сторон     • Доказательство пропорциональности     • Задачи на построение     • Измерение расстояний (недоступных)</text>
