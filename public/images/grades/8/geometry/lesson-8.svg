  <text x="400" y="422" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Ключевые формулы</text>
  <text x="32" y="445" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">S₁/S₂ = k²     |     P₁/P₂ = k     |     k = A₁B₁/AB     |     Отношение медиан, биссектрис, высот = k</text>
