  <rect x="410" y="106" width="370" height="8" fill="#F59E0B" opacity="0.2" />
  <text x="595" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#92400E" text-anchor="middle">Свойства подобных треугольников</text>
  <text x="422" y="130" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">∠A = ∠A₁, ∠B = ∠B₁, ∠C = ∠C₁</text>
  <text x="422" y="148" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Отношение сторон: k (коэфф. подобия)</text>
  <text x="422" y="166" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Отношение площадей: S₁/S₂ = k²</text>
  <text x="422" y="184" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Отношение периметров: P₁/P₂ = k</text>
  <text x="422" y="202" font-family="Arial,sans-serif" font-size="12" fill="#92400E" font-weight="bold">Отношение высот: h₁/h₂ = k</text>
