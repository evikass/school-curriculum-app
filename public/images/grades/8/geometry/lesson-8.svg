  <text x="645" y="227" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Признаки подобия</text>
  <text x="522" y="250" font-family="Arial,sans-serif" font-size="12" fill="#37474F">1. По двум углам:</text>
  <text x="522" y="267" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   ∠A = ∠A₁ и ∠B = ∠B₁</text>
  <text x="522" y="284" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="522" y="301" font-family="Arial,sans-serif" font-size="12" fill="#37474F">2. По двум пропорциональным</text>
  <text x="522" y="318" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   сторонам и углу между ними:</text>
  <text x="522" y="335" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   A₁B₁/AB = A₁C₁/AC, ∠A = ∠A₁</text>
  <text x="522" y="352" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="522" y="369" font-family="Arial,sans-serif" font-size="12" fill="#37474F">3. По трём пропорциональным</text>
  <text x="522" y="386" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   сторонам:</text>
  <text x="522" y="403" font-family="Arial,sans-serif" font-size="12" fill="#37474F">   A₁B₁/AB = B₁C₁/BC = A₁C₁/AC</text>
