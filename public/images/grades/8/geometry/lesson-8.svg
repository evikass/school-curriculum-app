  <text x="205" y="107" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#0E7490" text-anchor="middle">Определение</text>
  <text x="32" y="130" font-family="Arial,sans-serif" font-size="12" fill="#37474F">Подобные треугольники — треугольники,</text>
  <text x="32" y="147" font-family="Arial,sans-serif" font-size="12" fill="#37474F">у которых углы соответственно равны,</text>
  <text x="32" y="164" font-family="Arial,sans-serif" font-size="12" fill="#37474F">а сходственные стороны пропорциональны.</text>
  <text x="32" y="181" font-family="Arial,sans-serif" font-size="12" fill="#37474F" />
  <text x="32" y="198" font-family="Arial,sans-serif" font-size="12" fill="#37474F">ΔABC ~ ΔA₁B₁C₁</text>
  <text x="32" y="215" font-family="Arial,sans-serif" font-size="12" fill="#37474F">k = A₁B₁/AB = B₁C₁/BC = A₁C₁/AC</text>
  <rect x="413" y="93" width="370" height="105" fill="#000000" rx="8" opacity="0.05" />
  <rect x="410" y="90" width="370" height="105" fill="#FFF7ED" rx="8" stroke="#F59E0B" stroke-width="2" opacity="0.95" />
