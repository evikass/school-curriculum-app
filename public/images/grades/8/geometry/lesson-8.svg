    <text x="110" y="265" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#06B6D4">C</text>
    <text x="20" y="395" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">A₁</text>
