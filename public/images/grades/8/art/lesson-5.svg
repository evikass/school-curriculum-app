  <text x="400" y="48" fill="white" fontSize="22" fontWeight="bold" textAnchor="middle" fontFamily="serif">Пейзаж в искусстве</text>
  <text x="400" y="68" fill="#FED7AA" fontSize="12" textAnchor="middle" fontFamily="sans-serif">Виды пейзажа, законы перспективы, великие пейзажисты</text>
  <circle cx="35" cy="46" r="6" fill="#D97706" opacity="0.6" />
  <circle cx="765" cy="46" r="6" fill="#D97706" opacity="0.6" />
  <circle cx="52" cy="100" r="18" fill="#EA580C" filter="url(#softShadow)" />
  <text x="52" y="106" fill="white" fontSize="16" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif">5</text>
  <rect x="530" y="95" width="240" height="70" fill="#BFDBFE" rx="4" />
  <polygon points="530,165 600,110 670,165" fill="#86EFAC" opacity="0.7" />
  <polygon points="610,165 680,120 770,165" fill="#4ADE80" opacity="0.7" />
  <rect x="530" y="165" width="240" height="30" fill="#93C5FD" rx="2" opacity="0.6" />
  <circle cx="700" cy="115" r="15" fill="#D97706" opacity="0.7" />
  <rect x="30" y="90" width="240" height="155" fill="white" stroke="#EA580C" strokeWidth="1.5" rx="6" filter="url(#softShadow)" />
  <rect x="30" y="90" width="240" height="26" fill="#EA580C" rx="6" />
  <rect x="30" y="108" width="240" height="8" fill="#EA580C" />
  <text x="150" y="108" fill="white" fontSize="12" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif">Виды пейзажа</text>
  <circle cx="44" cy="124" r="3" fill="#EA580C" opacity="0.6" />
  <text x="52" y="128" fill="#78350F" fontSize="11" fontFamily="sans-serif">Сельский — природа и деревня</text>
  <circle cx="44" cy="141" r="3" fill="#EA580C" opacity="0.6" />
  <text x="52" y="145" fill="#78350F" fontSize="11" fontFamily="sans-serif">Городской — улицы и здания</text>
  <circle cx="44" cy="158" r="3" fill="#EA580C" opacity="0.6" />
  <text x="52" y="162" fill="#78350F" fontSize="11" fontFamily="sans-serif">Морской (марина) — море</text>
  <circle cx="44" cy="175" r="3" fill="#EA580C" opacity="0.6" />
  <text x="52" y="179" fill="#78350F" fontSize="11" fontFamily="sans-serif">Горный — горы и вершины</text>
  <circle cx="44" cy="192" r="3" fill="#EA580C" opacity="0.6" />
  <text x="52" y="196" fill="#78350F" fontSize="11" fontFamily="sans-serif">Лесной — деревья и чаща</text>
  <circle cx="44" cy="209" r="3" fill="#EA580C" opacity="0.6" />
  <text x="52" y="213" fill="#78350F" fontSize="11" fontFamily="sans-serif">Промышленный — заводы</text>
  <rect x="30" y="260" width="240" height="130" fill="white" stroke="#1E40AF" strokeWidth="1.5" rx="6" filter="url(#softShadow)" />
  <rect x="30" y="260" width="240" height="26" fill="#1E40AF" rx="6" />
  <rect x="30" y="278" width="240" height="8" fill="#1E40AF" />
  <text x="150" y="278" fill="white" fontSize="12" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif">Законы перспективы</text>
  <circle cx="44" cy="294" r="3" fill="#1E40AF" opacity="0.6" />
  <text x="52" y="298" fill="#78350F" fontSize="11" fontFamily="sans-serif">Линия горизонта — уровень глаз</text>
  <circle cx="44" cy="311" r="3" fill="#1E40AF" opacity="0.6" />
  <text x="52" y="315" fill="#78350F" fontSize="11" fontFamily="sans-serif">Точка схода на горизонте</text>
  <circle cx="44" cy="328" r="3" fill="#1E40AF" opacity="0.6" />
  <text x="52" y="332" fill="#78350F" fontSize="11" fontFamily="sans-serif">Дальше = выше и меньше</text>
  <circle cx="44" cy="345" r="3" fill="#1E40AF" opacity="0.6" />
  <text x="52" y="349" fill="#78350F" fontSize="11" fontFamily="sans-serif">Воздушная перспектива:</text>
  <circle cx="44" cy="362" r="3" fill="#1E40AF" opacity="0.6" />
  <text x="52" y="366" fill="#78350F" fontSize="11" fontFamily="sans-serif">  Дальше = бледнее и синее</text>
  <rect x="290" y="90" width="220" height="155" fill="white" stroke="#166534" strokeWidth="1.5" rx="6" filter="url(#softShadow)" />
  <rect x="290" y="90" width="220" height="26" fill="#166534" rx="6" />
  <rect x="290" y="108" width="220" height="8" fill="#166534" />
  <text x="400" y="108" fill="white" fontSize="12" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif">Великие пейзажисты</text>
  <circle cx="304" cy="124" r="3" fill="#166534" opacity="0.6" />
  <text x="312" y="128" fill="#78350F" fontSize="11" fontFamily="sans-serif">И. Левитан («Золотая осень»)</text>
  <circle cx="304" cy="141" r="3" fill="#166534" opacity="0.6" />
  <text x="312" y="145" fill="#78350F" fontSize="11" fontFamily="sans-serif">И. Шишкин («Утро в лесу»)</text>
  <circle cx="304" cy="158" r="3" fill="#166534" opacity="0.6" />
  <text x="312" y="162" fill="#78350F" fontSize="11" fontFamily="sans-serif">Ф. Васильев («Мокрый луг»)</text>
  <circle cx="304" cy="175" r="3" fill="#166534" opacity="0.6" />
  <text x="312" y="179" fill="#78350F" fontSize="11" fontFamily="sans-serif">А. Саврасов («Грачи прилетели»)</text>
  <circle cx="304" cy="192" r="3" fill="#166534" opacity="0.6" />
  <text x="312" y="196" fill="#78350F" fontSize="11" fontFamily="sans-serif">К. Моне (« Впечатление»)</text>
  <circle cx="304" cy="209" r="3" fill="#166534" opacity="0.6" />
  <text x="312" y="213" fill="#78350F" fontSize="11" fontFamily="sans-serif">У. Тёрнер (английский)</text>
  <rect x="290" y="260" width="220" height="130" fill="white" stroke="#D97706" strokeWidth="1.5" rx="6" filter="url(#softShadow)" />
  <rect x="290" y="260" width="220" height="26" fill="#D97706" rx="6" />
  <rect x="290" y="278" width="220" height="8" fill="#D97706" />
  <text x="400" y="278" fill="white" fontSize="12" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif">Техника пейзажа</text>
  <circle cx="304" cy="294" r="3" fill="#D97706" opacity="0.6" />
  <text x="312" y="298" fill="#78350F" fontSize="11" fontFamily="sans-serif">Пленэр — работа на природе</text>
  <circle cx="304" cy="311" r="3" fill="#D97706" opacity="0.6" />
  <text x="312" y="315" fill="#78350F" fontSize="11" fontFamily="sans-serif">Этюд — быстрый набросок</text>
  <circle cx="304" cy="328" r="3" fill="#D97706" opacity="0.6" />
  <text x="312" y="332" fill="#78350F" fontSize="11" fontFamily="sans-serif">Передача освещения</text>
  <circle cx="304" cy="345" r="3" fill="#D97706" opacity="0.6" />
  <text x="312" y="349" fill="#78350F" fontSize="11" fontFamily="sans-serif">Рефлексы и цветовые связи</text>
  <circle cx="304" cy="362" r="3" fill="#D97706" opacity="0.6" />
  <text x="312" y="366" fill="#78350F" fontSize="11" fontFamily="sans-serif">Состояние: утро, день, вечер</text>
  <text x="400" y="420" fill="#9A3412" fontSize="13" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif">Линейная перспектива (схема)</text>
  <line x1="80" y1="470" x2="720" y2="470" stroke="#1E40AF" strokeWidth="2" strokeDasharray="8,4" />
  <text x="730" y="473" fill="#1E40AF" fontSize="10" fontFamily="sans-serif">Линия горизонта</text>
  <circle cx="400" cy="470" r="5" fill="#B91C1C" />
  <text x="400" y="465" fill="#B91C1C" fontSize="9" textAnchor="middle" fontFamily="sans-serif">Точка схода</text>
