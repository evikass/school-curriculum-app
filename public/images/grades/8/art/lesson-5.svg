  <line x1="720" y1="550" x2="400" y2="470" stroke="#EA580C" strokeWidth="1.5" opacity="0.5" />
  <line x1="200" y1="550" x2="400" y2="470" stroke="#EA580C" strokeWidth="1" opacity="0.3" />
  <line x1="600" y1="550" x2="400" y2="470" stroke="#EA580C" strokeWidth="1" opacity="0.3" />
