<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#FEF3C7" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400E" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFF7ED" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#92400E" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#B45309" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="800" height="4" fill="#B45309" rx="2"/>

  <!-- Header -->
  <rect x="20" y="15" width="760" height="60" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="40" y="50" font-size="14" fill="#FCD34D" font-weight="bold">Урок 4</text>
  <text x="130" y="50" font-size="20" fill="#FFFFFF" font-weight="bold">Ручные инструменты для обработки древесины</text>
    <text x="780" y="55" font-size="13" fill="#F59E0B" text-anchor="end" font-style="italic">Пилы, рубанки, стамески</text>

  <!-- Saw illustration -->
  <rect x="40" y="105" width="200" height="8" rx="2" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <rect x="240" y="92" width="70" height="34" rx="4" fill="#8B7355" stroke="#92400E" stroke-width="1"/>
  <!-- Saw teeth -->
  <polygon points="40,113 45,120 50,113 55,120 60,113 65,120 70,113 75,120 80,113 85,120 90,113 95,120 100,113 105,120 110,113 115,120 120,113 125,120 130,113 135,120 140,113 145,120 150,113 155,120 160,113 165,120 170,113 175,120 180,113 185,120 190,113 195,120 200,113 205,120 210,113 215,120 220,113 225,120 230,113 235,120 240,113" fill="#6B7280" stroke="#4B5563" stroke-width="0.5"/>
  <text x="140" y="140" font-size="11" fill="#78350F" text-anchor="middle" font-weight="bold">Ножовка</text>
  
  <!-- Plane illustration -->
  <rect x="40" y="168" width="140" height="20" rx="3" fill="#8B7355" stroke="#92400E" stroke-width="1"/>
  <rect x="80" y="155" width="50" height="13" rx="2" fill="#A0845C" stroke="#92400E" stroke-width="1"/>
  <rect x="95" y="148" width="20" height="7" rx="1" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <rect x="40" y="188" width="140" height="5" fill="#8B7355" stroke="#92400E" stroke-width="0.5"/>
  <rect x="90" y="193" width="40" height="3" fill="#6B7280"/>
  <text x="110" y="213" font-size="11" fill="#78350F" text-anchor="middle" font-weight="bold">Рубанок</text>
  
  <!-- Chisel illustration -->
  <rect x="70" y="233" width="8" height="50" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <rect x="60" y="283" width="28" height="8" rx="1" fill="#8B7355" stroke="#92400E" stroke-width="1"/>
  <polygon points="60,233 78,233 69,200" fill="#6B7280" stroke="#4B5563" stroke-width="1"/>
  <text x="70" y="308" font-size="11" fill="#78350F" text-anchor="middle" font-weight="bold">Стамеска</text>
  
  <!-- Tools categories -->
    <rect x="375" y="95" width="400" height="110" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="375" y="95" width="400" height="26" rx="6" fill="#B45309"/>
  <rect x="375" y="115" width="400" height="6" fill="#B45309"/>
  <text x="575" y="113" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Инструменты для пиления</text>
  <text x="387" y="135" font-size="12" fill="#78350F">• Ножовка — продольное и поперечное пиление</text>
  <text x="387" y="155" font-size="12" fill="#78350F">• Лучковая пила — криволинейный распил</text>
  <text x="387" y="175" font-size="12" fill="#78350F">• Ножовка с обушком — точный тонкий распил</text>
  <text x="387" y="195" font-size="12" fill="#78350F">• Лобзик — фигурный выпиливание</text>
  
    <rect x="375" y="218" width="400" height="110" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="375" y="218" width="400" height="26" rx="6" fill="#B45309"/>
  <rect x="375" y="238" width="400" height="6" fill="#B45309"/>
  <text x="575" y="236" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Инструменты для строгания</text>
  <text x="387" y="258" font-size="12" fill="#78350F">• Рубанок — черновое и чистовое строгание</text>
  <text x="387" y="278" font-size="12" fill="#78350F">• Шерхебель — грубое снятие материала</text>
  <text x="387" y="298" font-size="12" fill="#78350F">• Фуганок — выравнивание длинных деталей</text>
  <text x="387" y="318" font-size="12" fill="#78350F">• Цикля — окончательная зачистка</text>
  
    <rect x="375" y="341" width="400" height="110" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="375" y="341" width="400" height="26" rx="6" fill="#B45309"/>
  <rect x="375" y="361" width="400" height="6" fill="#B45309"/>
  <text x="575" y="359" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Инструменты для сверления и долбления</text>
  <text x="387" y="381" font-size="12" fill="#78350F">• Коловорот — ручное сверление</text>
  <text x="387" y="401" font-size="12" fill="#78350F">• Ручная дрель — быстрое сверление</text>
  <text x="387" y="421" font-size="12" fill="#78350F">• Сверло перьевое — отверстия в дереве</text>
  <text x="387" y="441" font-size="12" fill="#78350F">• Стамеска — выборка пазов и гнёзд</text>
  
    <rect x="25" y="325" width="335" height="95" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="25" y="325" width="335" height="26" rx="6" fill="#B45309"/>
  <rect x="25" y="345" width="335" height="6" fill="#B45309"/>
  <text x="192" y="343" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Вспомогательные инструменты</text>
  <text x="37" y="365" font-size="12" fill="#78350F">• Киянка — деревянный молоток</text>
  <text x="37" y="385" font-size="12" fill="#78350F">• Угольник — проверка прямых углов</text>
  <text x="37" y="405" font-size="12" fill="#78350F">• Рейсмус — разметка толщины</text>
  
    <rect x="25" y="468" width="750" height="60" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="37" y="488" font-size="12" fill="#78350F" font-weight="bold">⚠ Правила безопасности: надёжно закрепляй заготовку,</text>
  <text x="37" y="506" font-size="12" fill="#78350F" font-weight="bold">не держи руку на линии реза, работай острым инструментом!</text>
  <text x="37" y="524" font-size="12" fill="#78350F" font-weight="bold">Тупой инструмент опаснее острого — требует большего усилия</text>
  
  <!-- Measurement marks -->
  <rect x="30" y="545" width="740" height="25" rx="4" fill="#FFFFFF" stroke="#D97706" stroke-width="1" opacity="0.6"/>
  <text x="400" y="562" font-size="11" fill="#92400E" text-anchor="middle">📏 Измеряй дважды, режь один раз!</text>
  </svg>