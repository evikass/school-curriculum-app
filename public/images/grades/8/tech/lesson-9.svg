<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#FEF3C7" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400E" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFF7ED" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#92400E" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#B45309" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="800" height="4" fill="#B45309" rx="2"/>

  <!-- Header -->
  <rect x="20" y="15" width="760" height="60" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="40" y="50" font-size="14" fill="#FCD34D" font-weight="bold">Урок 9</text>
  <text x="130" y="50" font-size="20" fill="#FFFFFF" font-weight="bold">Бытовые электроприборы</text>
    <text x="780" y="55" font-size="13" fill="#F59E0B" text-anchor="end" font-style="italic">Безопасность, типы, обслуживание</text>

  <!-- Appliance categories - grid layout -->
  <!-- Heating -->
  <rect x="30" y="95" width="240" height="100" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="2" filter="url(#shadow)"/>
  <rect x="30" y="95" width="240" height="28" rx="8" fill="#DC2626"/>
  <rect x="30" y="117" width="240" height="6" fill="#DC2626"/>
  <text x="150" y="115" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Нагревательные</text>
  <text x="45" y="140" font-size="11" fill="#78350F">• Утюг — 1000-2200 Вт</text>
  <text x="45" y="156" font-size="11" fill="#78350F">• Обогреватель — 1500-2500 Вт</text>
  <text x="45" y="172" font-size="11" fill="#78350F">• Фен — 1200-2200 Вт</text>
  <text x="45" y="188" font-size="11" fill="#78350F">• Плита — 1000-3000 Вт</text>
  
  <!-- Mechanical -->
  <rect x="285" y="95" width="240" height="100" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/>
  <rect x="285" y="95" width="240" height="28" rx="8" fill="#2563EB"/>
  <rect x="285" y="117" width="240" height="6" fill="#2563EB"/>
  <text x="405" y="115" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Механические</text>
  <text x="300" y="140" font-size="11" fill="#78350F">• Пылесос — 1000-2200 Вт</text>
  <text x="300" y="156" font-size="11" fill="#78350F">• Миксер — 300-700 Вт</text>
  <text x="300" y="172" font-size="11" fill="#78350F">• Блендер — 400-1200 Вт</text>
  <text x="300" y="188" font-size="11" fill="#78350F">• Стиральная машина — 2000 Вт</text>
  
  <!-- Combined -->
  <rect x="540" y="95" width="240" height="100" rx="8" fill="#FFFFFF" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <rect x="540" y="95" width="240" height="28" rx="8" fill="#059669"/>
  <rect x="540" y="117" width="240" height="6" fill="#059669"/>
  <text x="660" y="115" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Комбинированные</text>
  <text x="555" y="140" font-size="11" fill="#78350F">• Холодильник — 100-400 Вт</text>
  <text x="555" y="156" font-size="11" fill="#78350F">• Кондиционер — 1000-3500 Вт</text>
  <text x="555" y="172" font-size="11" fill="#78350F">• Микроволновка — 700-1500 Вт</text>
  <text x="555" y="188" font-size="11" fill="#78350F">• Посудомойка — 1800-2500 Вт</text>
  
  <!-- Safety rules -->
    <rect x="25" y="215" width="375" height="170" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="25" y="215" width="375" height="26" rx="6" fill="#DC2626"/>
  <rect x="25" y="235" width="375" height="6" fill="#DC2626"/>
  <text x="212" y="233" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">⚠ Правила безопасности</text>
  <text x="37" y="255" font-size="12" fill="#78350F">• Не прикасайся мокрыми руками к розетке!</text>
  <text x="37" y="275" font-size="12" fill="#78350F">• Не вытаскивай вилку за провод!</text>
  <text x="37" y="295" font-size="12" fill="#78350F">• Не используй неисправные приборы!</text>
  <text x="37" y="315" font-size="12" fill="#78350F">• Не перегружай розетки (не более 3500 Вт)!</text>
  <text x="37" y="335" font-size="12" fill="#78350F">• Заземляй приборы с металлическим корпусом!</text>
  <text x="37" y="355" font-size="12" fill="#78350F">• Отключай приборы уходя из дома!</text>
  <text x="37" y="375" font-size="12" fill="#78350F">• Не оставляй включённые приборы без присмотра!</text>
  
  <!-- Maintenance -->
    <rect x="415" y="215" width="365" height="170" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="415" y="215" width="365" height="26" rx="6" fill="#B45309"/>
  <rect x="415" y="235" width="365" height="6" fill="#B45309"/>
  <text x="597" y="233" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Обслуживание приборов</text>
  <text x="427" y="255" font-size="12" fill="#78350F">• Регулярная очистка от пыли и грязи</text>
  <text x="427" y="275" font-size="12" fill="#78350F">• Проверка целостности шнура и вилки</text>
  <text x="427" y="295" font-size="12" fill="#78350F">• Своевременная замена фильтров</text>
  <text x="427" y="315" font-size="12" fill="#78350F">• Не разбирать включённые приборы!</text>
  <text x="427" y="335" font-size="12" fill="#78350F">• Доверять ремонт специалистам</text>
  <text x="427" y="355" font-size="12" fill="#78350F">• Следить за сроком эксплуатации</text>
  <text x="427" y="375" font-size="12" fill="#78350F">• Использовать стабилизаторы напряжения</text>
  
  <!-- Energy efficiency -->
    <rect x="25" y="400" width="375" height="100" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="25" y="400" width="375" height="26" rx="6" fill="#059669"/>
  <rect x="25" y="420" width="375" height="6" fill="#059669"/>
  <text x="212" y="418" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Классы энергоэффективности</text>
  <text x="37" y="440" font-size="12" fill="#78350F">• A+++ — самый экономичный</text>
  <text x="37" y="460" font-size="12" fill="#78350F">• A++, A+ — высокая экономичность</text>
  <text x="37" y="480" font-size="12" fill="#78350F">• A, B — хорошая экономичность</text>
  
    <rect x="415" y="400" width="365" height="100" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="415" y="400" width="365" height="26" rx="6" fill="#B45309"/>
  <rect x="415" y="420" width="365" height="6" fill="#B45309"/>
  <text x="597" y="418" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Экономия электроэнергии</text>
  <text x="427" y="440" font-size="12" fill="#78350F">• Используй LED-лампы (экономия 80%)</text>
  <text x="427" y="460" font-size="12" fill="#78350F">• Выключай свет, выходя из комнаты</text>
  <text x="427" y="480" font-size="12" fill="#78350F">• Не открывай холодильник надолго</text>
  
    <rect x="25" y="515" width="750" height="55" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="37" y="535" font-size="12" fill="#78350F" font-weight="bold">🔌 Мощность прибора = Напряжение × Сила тока. P = U × I</text>
  <text x="37" y="553" font-size="12" fill="#78350F" font-weight="bold">Суммарная мощность включённых приборов не должна превышать нагрузку проводки!</text>
  </svg>