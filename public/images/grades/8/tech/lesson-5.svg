<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#FEF3C7" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400E" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFF7ED" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#92400E" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#B45309" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="800" height="4" fill="#B45309" rx="2"/>

  <!-- Header -->
  <rect x="20" y="15" width="760" height="60" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="40" y="50" font-size="14" fill="#FCD34D" font-weight="bold">Урок 5</text>
  <text x="130" y="50" font-size="20" fill="#FFFFFF" font-weight="bold">Виды соединений древесины</text>
    <text x="780" y="55" font-size="13" fill="#F59E0B" text-anchor="end" font-style="italic">Гвоздь, шуруп, клей, шип, паз</text>

  <!-- Nail joint -->
  <rect x="40" y="105" width="130" height="25" rx="2" fill="#DEB887" stroke="#92400E" stroke-width="1.5"/>
  <rect x="40" y="130" width="130" height="25" rx="2" fill="#D2B48C" stroke="#92400E" stroke-width="1.5"/>
  <line x1="85" y1="105" x2="85" y2="155" stroke="#6B7280" stroke-width="2.5"/>
  <circle cx="85" cy="105" r="3" fill="#6B7280"/>
  <text x="105" y="170" font-size="11" fill="#78350F" text-anchor="middle" font-weight="bold">Гвоздевое</text>
  
  <!-- Screw joint -->
  <rect x="195" y="105" width="130" height="25" rx="2" fill="#DEB887" stroke="#92400E" stroke-width="1.5"/>
  <rect x="195" y="130" width="130" height="25" rx="2" fill="#D2B48C" stroke="#92400E" stroke-width="1.5"/>
  <line x1="260" y1="108" x2="260" y2="152" stroke="#4B5563" stroke-width="2"/>
  <line x1="256" y1="118" x2="264" y2="114" stroke="#4B5563" stroke-width="1"/>
  <line x1="256" y1="128" x2="264" y2="124" stroke="#4B5563" stroke-width="1"/>
  <line x1="256" y1="138" x2="264" y2="134" stroke="#4B5563" stroke-width="1"/>
  <line x1="255" y1="148" x2="265" y2="144" stroke="#4B5563" stroke-width="1"/>
  <circle cx="260" cy="105" r="5" fill="none" stroke="#4B5563" stroke-width="1.5"/>
  <line x1="260" y1="100" x2="260" y2="110" stroke="#4B5563" stroke-width="1.5"/>
  <text x="260" y="170" font-size="11" fill="#78350F" text-anchor="middle" font-weight="bold">Шурупное</text>
  
  <!-- Glue joint -->
  <rect x="350" y="105" width="130" height="25" rx="2" fill="#DEB887" stroke="#92400E" stroke-width="1.5"/>
  <rect x="350" y="130" width="130" height="25" rx="2" fill="#D2B48C" stroke="#92400E" stroke-width="1.5"/>
  <rect x="355" y="127" width="120" height="6" rx="1" fill="#F59E0B" opacity="0.7"/>
  <text x="415" y="170" font-size="11" fill="#78350F" text-anchor="middle" font-weight="bold">Клеевое</text>
  
  <!-- Dovetail joint -->
  <rect x="505" y="105" width="130" height="50" rx="2" fill="#DEB887" stroke="#92400E" stroke-width="1.5"/>
  <polygon points="530,105 540,130 530,155 550,155 560,130 550,105" fill="#D2B48C" stroke="#92400E" stroke-width="1.5"/>
  <polygon points="570,105 580,130 570,155 590,155 600,130 590,105" fill="#D2B48C" stroke="#92400E" stroke-width="1.5"/>
  <polygon points="610,105 620,130 610,155 625,155 625,105" fill="#D2B48C" stroke="#92400E" stroke-width="1.5"/>
  <text x="570" y="170" font-size="11" fill="#78350F" text-anchor="middle" font-weight="bold">Ласточкин хвост</text>
  
  <!-- Mortise and tenon -->
  <rect x="660" y="115" width="30" height="30" fill="none" stroke="#92400E" stroke-width="1.5"/>
  <rect x="660" y="105" width="120" height="50" rx="2" fill="none" stroke="#92400E" stroke-width="1.5"/>
  <rect x="690" y="125" width="60" height="10" fill="#D2B48C" stroke="#92400E" stroke-width="1.5"/>
  <text x="720" y="170" font-size="11" fill="#78350F" text-anchor="middle" font-weight="bold">Шип-паз</text>
  
  <!-- Detailed info boxes -->
    <rect x="25" y="190" width="250" height="145" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="25" y="190" width="250" height="26" rx="6" fill="#B45309"/>
  <rect x="25" y="210" width="250" height="6" fill="#B45309"/>
  <text x="150" y="208" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Неразъёмные соединения</text>
  <text x="37" y="230" font-size="12" fill="#78350F">• Гвоздевое — быстрое, но слабое</text>
  <text x="37" y="250" font-size="12" fill="#78350F">• Шурупное — прочнее гвоздевого</text>
  <text x="37" y="270" font-size="12" fill="#78350F">• Клеевое — прочное, невидимое</text>
  <text x="37" y="290" font-size="12" fill="#78350F">• Ласточкин хвост — без клея и гвоздей</text>
  <text x="37" y="310" font-size="12" fill="#78350F">• Шиповое — самое прочное из ручных</text>
  
    <rect x="290" y="190" width="250" height="145" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="290" y="190" width="250" height="26" rx="6" fill="#B45309"/>
  <rect x="290" y="210" width="250" height="6" fill="#B45309"/>
  <text x="415" y="208" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Разъёмные соединения</text>
  <text x="302" y="230" font-size="12" fill="#78350F">• Болтовое — с гайкой и шайбой</text>
  <text x="302" y="250" font-size="12" fill="#78350F">• Винтовое — для регулировки</text>
  <text x="302" y="270" font-size="12" fill="#78350F">• Шурупное в гладкое — можно выкрутить</text>
  <text x="302" y="290" font-size="12" fill="#78350F">• Клиновое — для разборной мебели</text>
  <text x="302" y="310" font-size="12" fill="#78350F">• Штифтовое — со вставным шипом</text>
  
    <rect x="555" y="190" width="225" height="145" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="555" y="190" width="225" height="26" rx="6" fill="#B45309"/>
  <rect x="555" y="210" width="225" height="6" fill="#B45309"/>
  <text x="667" y="208" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Выбор соединения</text>
  <text x="567" y="230" font-size="12" fill="#78350F">• Нагрузка: прочность?</text>
  <text x="567" y="250" font-size="12" fill="#78350F">• Внешний вид: видно/скрыто?</text>
  <text x="567" y="270" font-size="12" fill="#78350F">• Разборность: нужно ли?</text>
  <text x="567" y="290" font-size="12" fill="#78350F">• Инструменты: что есть?</text>
  <text x="567" y="310" font-size="12" fill="#78350F">• Материал: толщина деталей?</text>
  
    <rect x="25" y="355" width="750" height="50" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="37" y="375" font-size="12" fill="#78350F" font-weight="bold">🔑 Главное правило: вид соединения зависит от назначения изделия, нагрузки и условий эксплуатации</text>
  <text x="37" y="393" font-size="12" fill="#78350F" font-weight="bold">Мебельные шипы + клей = самое прочное и красивое соединение</text>
  
  <!-- Wood joint types comparison table -->
    <rect x="25" y="420" width="750" height="150" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="25" y="420" width="750" height="26" rx="6" fill="#B45309"/>
  <rect x="25" y="440" width="750" height="6" fill="#B45309"/>
  <text x="400" y="438" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Сравнение видов соединений</text>
  <text x="37" y="460" font-size="12" fill="#78350F">• Гвоздь        — прочность: ★★☆☆☆   скорость: ★★★★★   разборность: нет     внешний вид: ★★☆☆☆</text>
  <text x="37" y="480" font-size="12" fill="#78350F">• Шуруп         — прочность: ★★★☆☆   скорость: ★★★★☆   разборность: да      внешний вид: ★★★☆☆</text>
  <text x="37" y="500" font-size="12" fill="#78350F">• Клей            — прочность: ★★★★☆   скорость: ★★★☆☆   разборность: нет     внешний вид: ★★★★★</text>
  <text x="37" y="520" font-size="12" fill="#78350F">• Шип-паз      — прочность: ★★★★★   скорость: ★★☆☆☆   разборность: нет     внешний вид: ★★★★★</text>
  <text x="37" y="540" font-size="12" fill="#78350F">• Ласточкин хв. — прочность: ★★★★★   скорость: ★☆☆☆☆   разборность: нет     внешний вид: ★★★★★</text>
  <text x="37" y="560" font-size="12" fill="#78350F">• Болт            — прочность: ★★★★☆   скорость: ★★★☆☆   разборность: да      внешний вид: ★★☆☆☆</text>
  </svg>