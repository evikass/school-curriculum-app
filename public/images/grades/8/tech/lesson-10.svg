<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFBEB" />
      <stop offset="100%" stop-color="#FEF3C7" />
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#92400E" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFF7ED" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#92400E" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#B45309" />
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B" />
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="8"/>
  <rect x="0" y="0" width="800" height="4" fill="#B45309" rx="2"/>

  <!-- Header -->
  <rect x="20" y="15" width="760" height="60" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="40" y="50" font-size="14" fill="#FCD34D" font-weight="bold">Урок 10</text>
  <text x="130" y="50" font-size="20" fill="#FFFFFF" font-weight="bold">Основы кулинарии</text>
    <text x="780" y="55" font-size="13" fill="#F59E0B" text-anchor="end" font-style="italic">Гигиена, оборудование, продукты</text>

  <!-- Food groups diagram - plate model -->
  <ellipse cx="180" cy="230" rx="120" ry="90" fill="#FFFFFF" stroke="#B45309" stroke-width="2" filter="url(#shadow)"/>
  <ellipse cx="180" cy="230" rx="115" ry="85" fill="none" stroke="#D97706" stroke-width="1"/>
  
  <!-- Food sections -->
  <path d="M180,140 L180,230 L90,175 A115,85 0 0,1 180,140Z" fill="#86EFAC" stroke="#92400E" stroke-width="1"/>
  <path d="M180,230 L270,175 A115,85 0 0,1 180,320Z" fill="#FDE68A" stroke="#92400E" stroke-width="1"/>
  <path d="M180,230 L90,285 A115,85 0 0,1 90,175Z" fill="#FCA5A5" stroke="#92400E" stroke-width="1"/>
  <path d="M180,230 L270,285 A115,85 0 0,1 180,320Z" fill="#93C5FD" stroke="#92400E" stroke-width="1"/>
  
  <text x="130" y="185" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">Овощи</text>
  <text x="130" y="196" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">и фрукты</text>
  <text x="230" y="185" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">Злаки,</text>
  <text x="230" y="196" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">хлеб</text>
  <text x="130" y="280" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">Мясо,</text>
  <text x="130" y="291" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">рыба</text>
  <text x="230" y="280" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">Молочные</text>
  <text x="230" y="291" font-size="10" fill="#78350F" text-anchor="middle" font-weight="bold">продукты</text>
  
  <text x="180" y="235" font-size="9" fill="#78350F" text-anchor="middle" font-weight="bold">Здоровая</text>
  <text x="180" y="246" font-size="9" fill="#78350F" text-anchor="middle" font-weight="bold">тарелка</text>
  
  <!-- Hygiene rules -->
    <rect x="345" y="95" width="430" height="155" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="345" y="95" width="430" height="26" rx="6" fill="#DC2626"/>
  <rect x="345" y="115" width="430" height="6" fill="#DC2626"/>
  <text x="560" y="113" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Правила гигиены на кухне</text>
  <text x="357" y="135" font-size="12" fill="#78350F">• Мой руки перед готовкой и после каждого перерыва!</text>
  <text x="357" y="155" font-size="12" fill="#78350F">• Используй отдельные доски для мяса и овощей</text>
  <text x="357" y="175" font-size="12" fill="#78350F">• Мой овощи и фрукты перед приготовлением</text>
  <text x="357" y="195" font-size="12" fill="#78350F">• Храни продукты при правильной температуре</text>
  <text x="357" y="215" font-size="12" fill="#78350F">• Не используй продукты с истёкшим сроком</text>
  <text x="357" y="235" font-size="12" fill="#78350F">• Следи за чистотой рабочей поверхности</text>
  
  <!-- Kitchen equipment -->
    <rect x="345" y="265" width="430" height="125" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="345" y="265" width="430" height="26" rx="6" fill="#B45309"/>
  <rect x="345" y="285" width="430" height="6" fill="#B45309"/>
  <text x="560" y="283" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Кухонное оборудование</text>
  <text x="357" y="305" font-size="12" fill="#78350F">• Кастрюли и сковороды — варка и жарка</text>
  <text x="357" y="325" font-size="12" fill="#78350F">• Ножи: поварской, хлебный, для овощей</text>
  <text x="357" y="345" font-size="12" fill="#78350F">• Разделочные доски: мясо / овощи / хлеб</text>
  <text x="357" y="365" font-size="12" fill="#78350F">• Мерный стакан и кухонные весы</text>
  
  <!-- Cooking methods -->
    <rect x="25" y="345" width="240" height="130" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="25" y="345" width="240" height="26" rx="6" fill="#B45309"/>
  <rect x="25" y="365" width="240" height="6" fill="#B45309"/>
  <text x="145" y="363" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Способы тепловой обработки</text>
  <text x="37" y="385" font-size="12" fill="#78350F">• Варка — в воде или на пару</text>
  <text x="37" y="405" font-size="12" fill="#78350F">• Жарка — на сковороде с маслом</text>
  <text x="37" y="425" font-size="12" fill="#78350F">• Запекание — в духовке</text>
  <text x="37" y="445" font-size="12" fill="#78350F">• Тушение — с небольшим количеством воды</text>
  <text x="37" y="465" font-size="12" fill="#78350F">• Бланширование — краткая варка</text>
  
    <rect x="280" y="345" width="240" height="130" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="280" y="345" width="240" height="26" rx="6" fill="#B45309"/>
  <rect x="280" y="365" width="240" height="6" fill="#B45309"/>
  <text x="400" y="363" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Виды нарезки продуктов</text>
  <text x="292" y="385" font-size="12" fill="#78350F">• Кубиками — для супов и рагу</text>
  <text x="292" y="405" font-size="12" fill="#78350F">• Соломкой — для салатов</text>
  <text x="292" y="425" font-size="12" fill="#78350F">• Кольцами — лук, морковь</text>
  <text x="292" y="445" font-size="12" fill="#78350F">• Ломтиками — для бутербродов</text>
  <text x="292" y="465" font-size="12" fill="#78350F">• Крошка — для посыпки</text>
  
    <rect x="535" y="405" width="240" height="70" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="535" y="405" width="240" height="26" rx="6" fill="#B45309"/>
  <rect x="535" y="425" width="240" height="6" fill="#B45309"/>
  <text x="655" y="423" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Температурные режимы</text>
  <text x="547" y="445" font-size="12" fill="#78350F">• Варка: 100°C (кипение воды)</text>
  <text x="547" y="465" font-size="12" fill="#78350F">• Жарка: 150-200°C</text>
  
    <rect x="25" y="490" width="750" height="55" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="37" y="510" font-size="12" fill="#78350F" font-weight="bold">🍽 Пищевая безопасность: мясо — полностью прожаривать, яйца — не сырые,</text>
  <text x="37" y="528" font-size="12" fill="#78350F" font-weight="bold">молоко — кипятить! Разделочные доски — отдельные для каждого типа продуктов!</text>
  
    <rect x="535" y="345" width="240" height="50" rx="6" fill="url(#boxGrad)" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="535" y="345" width="240" height="26" rx="6" fill="#B45309"/>
  <rect x="535" y="365" width="240" height="6" fill="#B45309"/>
  <text x="655" y="363" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="bold">СанПиН нормы</text>
  <text x="547" y="385" font-size="12" fill="#78350F">• Мясная доска — красная, Овощная — зелёная</text>
  </svg>