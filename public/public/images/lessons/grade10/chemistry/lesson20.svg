<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg20" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="sh20" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg20)"/>
  <rect y="44" width="400" height="8" fill="url(#tg20)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Обобщение: УВ и кислогод. соед.</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top: Hydrocarbon classes -->
    <rect x="10" y="60" width="380" height="90" rx="6" fill="#1e1e3a" stroke="#3b82f6" stroke-width="1" filter="url(#sh20)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#3b82f6">Классы углеводородов</text>
    <text x="22" y="95" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Алканы</text>
    <text x="72" y="95" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">CnH2n+2</text>
    <text x="140" y="95" font-family="Arial, sans-serif" font-size="9" fill="#10b981">Алкены</text>
    <text x="185" y="95" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">CnH2n</text>
    <text x="230" y="95" font-family="Arial, sans-serif" font-size="9" fill="#a855f7">Алкины</text>
    <text x="275" y="95" font-family="Arial, sans-serif" font-size="8" fill="#e2e8f0">CnH2n-2</text>
    <text x="325" y="95" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Арены</text>
    <text x="22" y="112" font-family="Arial, sans-serif" font-size="8.5" fill="#14b8a6">sp3</text>
    <text x="140" y="112" font-family="Arial, sans-serif" font-size="8.5" fill="#10b981">sp2</text>
    <text x="230" y="112" font-family="Arial, sans-serif" font-size="8.5" fill="#a855f7">sp</text>
    <text x="325" y="112" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">sp2</text>
    <text x="22" y="128" font-family="Arial, sans-serif" font-size="8.5" fill="#14b8a6">замещ.</text>
    <text x="140" y="128" font-family="Arial, sans-serif" font-size="8.5" fill="#10b981">присоед.</text>
    <text x="230" y="128" font-family="Arial, sans-serif" font-size="8.5" fill="#a855f7">присоед.</text>
    <text x="325" y="128" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">замещ.</text>
    <text x="22" y="143" font-family="Arial, sans-serif" font-size="8.5" fill="#14b8a6">-ан</text>
    <text x="140" y="143" font-family="Arial, sans-serif" font-size="8.5" fill="#10b981">-ен</text>
    <text x="230" y="143" font-family="Arial, sans-serif" font-size="8.5" fill="#a855f7">-ин</text>
    <text x="325" y="143" font-family="Arial, sans-serif" font-size="8.5" fill="#f59e0b">-арены</text>

  <!-- Bottom left: Oxygen-containing classes -->
    <rect x="10" y="158" width="185" height="132" rx="6" fill="#1e1e3a" stroke="#ef4444" stroke-width="1" filter="url(#sh20)"/>
    <text x="22" y="176" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Кислородсодержащие</text>
    <circle cx="22" cy="188" r="3" fill="#14b8a6"/>
  <text x="32" y="192" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Спирты R-OH (-ол)</text>
    <circle cx="22" cy="202" r="3" fill="#10b981"/>
  <text x="32" y="206" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Альдегиды R-CHO (-аль)</text>
    <circle cx="22" cy="216" r="3" fill="#f59e0b"/>
  <text x="32" y="220" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Кетоны R-CO-R' (-он)</text>
    <circle cx="22" cy="230" r="3" fill="#ef4444"/>
  <text x="32" y="234" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Кислоты R-COOH (-овая)</text>
    <circle cx="22" cy="244" r="3" fill="#a855f7"/>
  <text x="32" y="248" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Сложн. эфиры R-COO-R'</text>
    <circle cx="22" cy="258" r="3" fill="#f59e0b"/>
  <text x="32" y="262" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Жиры — триглицериды</text>
    <circle cx="22" cy="272" r="3" fill="#10b981"/>
  <text x="32" y="276" font-family="Arial, sans-serif" font-size="9.5" fill="#e2e8f0">Углеводы Cn(H2O)m</text>

  <!-- Bottom right: Reaction flowchart -->
    <rect x="205" y="158" width="185" height="132" rx="6" fill="#1e1e3a" stroke="#0d9488" stroke-width="1" filter="url(#sh20)"/>
    <text x="217" y="176" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#14b8a6">Переходы между классами</text>
    <text x="217" y="194" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Алкан → Алкен (-H2)</text>
    <line x1="217" y1="200" x2="235" y2="210" stroke="#0d9488" stroke-width="1.5"/>
  <polygon points="235,210 230,207 230,213" fill="#0d9488"/>
    <text x="217" y="216" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Алкен → Алкан (+H2)</text>
    <line x1="217" y1="222" x2="235" y2="232" stroke="#10b981" stroke-width="1.5"/>
  <polygon points="235,232 230,229 230,235" fill="#10b981"/>
    <text x="217" y="238" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Алкен → Спирт (+H2O)</text>
    <line x1="217" y1="244" x2="235" y2="254" stroke="#ef4444" stroke-width="1.5"/>
  <polygon points="235,254 230,251 230,257" fill="#ef4444"/>
    <text x="217" y="260" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Спирт → Альдегид (+[O])</text>
    <line x1="217" y1="266" x2="235" y2="276" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="235,276 230,273 230,279" fill="#f59e0b"/>
    <text x="217" y="282" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Альдегид → Кислота (+[O])</text>
</svg>