<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Аминокислоты</text>

  <!-- General formula -->
  <g transform="translate(200, 70)">
    <rect x="0" y="0" width="400" height="70" rx="8" fill="#0f172a" stroke="#14b8a6" stroke-width="2"/>
    <text x="200" y="25" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">Общая формула альфа-аминокислот</text>
    <text x="200" y="55" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle" filter="url(#glow1)">NH2-CH(R)-COOH</text>
  </g>

  <!-- Amphoteric nature -->
  <g transform="translate(50, 160)">
    <rect x="0" y="0" width="700" height="130" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
    <text x="350" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#c084fc" text-anchor="middle">Амфотерность аминокислот</text>

    <!-- Acid reaction -->
    <g transform="translate(30, 40)">
      <rect x="0" y="0" width="280" height="70" rx="6" fill="#0f172a" stroke="#ef4444" stroke-width="1"/>
      <text x="140" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#f87171" text-anchor="middle">Как кислота (по -COOH)</text>
      <text x="140" y="40" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">NH2-CH(R)-COOH + NaOH</text>
      <text x="140" y="58" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">= NH2-CH(R)-COONa + H2O</text>
    </g>

    <!-- Base reaction -->
    <g transform="translate(380, 40)">
      <rect x="0" y="0" width="280" height="70" rx="6" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
      <text x="140" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#60a5fa" text-anchor="middle">Как основание (по -NH2)</text>
      <text x="140" y="40" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">NH2-CH(R)-COOH + HCl</text>
      <text x="140" y="58" font-family="Arial, sans-serif" font-size="10" fill="#e2e8f0" text-anchor="middle">= Cl-NH3-CH(R)-COOH</text>
    </g>
  </g>

  <!-- Zwitter-ion -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="340" height="160" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="170" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6" text-anchor="middle">Цвиттер-ион</text>

    <!-- Zwitter-ion structure -->
    <g transform="translate(30, 40)">
      <text x="0" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#3b82f6">+</text>
      <text x="15" y="20" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0">NH3-CH(R)-COO</text>
      <text x="205" y="20" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ef4444">-</text>
    </g>

    <text x="170" y="85" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Основная форма в нейтральном растворе</text>
    <text x="170" y="105" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Внутримолекулярный перенос протона</text>
    <text x="170" y="130" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">H от -NH2 переходит к -COO-</text>
    <text x="170" y="150" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Изоэлектрическая точка (pI)</text>
  </g>

  <!-- Essential amino acids -->
  <g transform="translate(420, 310)">
    <rect x="0" y="0" width="330" height="160" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1" opacity="0.7"/>
    <text x="165" y="22" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle">Незаменимые аминокислоты</text>

    <text x="20" y="48" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Валин (Val), Лейцин (Leu)</text>
    <text x="20" y="68" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Изолейцин (Ile), Лизин (Lys)</text>
    <text x="20" y="88" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Метионин (Met), Фенилаланин (Phe)</text>
    <text x="20" y="108" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Треонин (Thr), Триптофан (Trp)</text>

    <rect x="20" y="120" width="290" height="25" rx="6" fill="#f59e0b" opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
    <text x="165" y="137" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24" text-anchor="middle">Не синтезируются организмом человека</text>
  </g>
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>