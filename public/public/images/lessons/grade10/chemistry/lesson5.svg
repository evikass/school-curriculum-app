<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tg5" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="sh5" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" rx="8" fill="#1a1a2e"/>
  <rect width="400" height="52" rx="8" fill="url(#tg5)"/>
  <rect y="44" width="400" height="8" fill="url(#tg5)"/>
  <text x="200" y="24" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Алканы: химические свойства</text>
  <text x="200" y="42" text-anchor="middle" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="10">Химия 10 класс</text>
  <!-- Top left: Reactions -->
    <rect x="10" y="60" width="190" height="128" rx="6" fill="#1e1e3a" stroke="#ef4444" stroke-width="1" filter="url(#sh5)"/>
    <text x="22" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ef4444">Химические реакции</text>
    <text x="22" y="94" font-family="Arial, sans-serif" font-size="9.5" fill="#f59e0b">1. Горение:</text>
    <text x="22" y="106" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">CH4 + 2O2 → CO2 + 2H2O</text>
    <text x="22" y="120" font-family="Arial, sans-serif" font-size="9.5" fill="#f59e0b">2. Галогенирование (h·):</text>
    <text x="22" y="132" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">CH4 + Cl2 → CH3Cl + HCl</text>
    <text x="22" y="146" font-family="Arial, sans-serif" font-size="9.5" fill="#f59e0b">3. Крекинг:</text>
    <text x="22" y="158" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">C10H22 → C5H12 + C5H10</text>
    <text x="22" y="172" font-family="Arial, sans-serif" font-size="9.5" fill="#f59e0b">4. Изомеризация:</text>
    <text x="22" y="184" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">C4H10 → изо-C4H10 (кат.)</text>

  <!-- Top right: Halogenation mechanism -->
    <rect x="210" y="60" width="180" height="128" rx="6" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" filter="url(#sh5)"/>
    <text x="222" y="78" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#a855f7">Механизм (радикальный)</text>
    <text x="222" y="95" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Инициация:</text>
    <text x="222" y="107" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Cl2 → 2Cl·  (h·)</text>
    <text x="222" y="121" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Рост цепи:</text>
    <text x="222" y="133" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Cl· + CH4 → ·CH3 + HCl</text>
    <text x="222" y="145" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">·CH3 + Cl2 → CH3Cl + Cl·</text>
    <text x="222" y="159" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Обрыв цепи:</text>
    <text x="222" y="171" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">Cl· + Cl· → Cl2</text>
    <text x="222" y="183" font-family="Arial, sans-serif" font-size="8.5" fill="#e2e8f0">·CH3 + Cl· → CH3Cl</text>

  <!-- Bottom: Applications -->
    <rect x="10" y="196" width="380" height="94" rx="6" fill="#1e1e3a" stroke="#10b981" stroke-width="1" filter="url(#sh5)"/>
    <text x="22" y="214" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Применение алканов</text>
    <text x="22" y="230" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Метан CH4</text>
    <text x="75" y="230" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">— топливо, синтез-газ</text>
    <text x="22" y="244" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Пропан-бутан</text>
    <text x="107" y="244" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">— бытовой газ</text>
    <text x="22" y="258" font-family="Arial, sans-serif" font-size="9" fill="#14b8a6">Парафины</text>
    <text x="72" y="258" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">— свечи, смазка</text>
    <text x="200" y="230" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Вазелин</text>
    <text x="240" y="230" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">— медицина</text>
    <text x="200" y="244" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Церезин</text>
    <text x="245" y="244" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">— изоляция</text>
    <text x="200" y="258" font-family="Arial, sans-serif" font-size="9" fill="#f59e0b">Сажа</text>
    <text x="225" y="258" font-family="Arial, sans-serif" font-size="9" fill="#e2e8f0">— красители, шины</text>
</svg>