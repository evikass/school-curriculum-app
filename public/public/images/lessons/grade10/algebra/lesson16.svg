<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Определение производной</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 16</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="42" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="73" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold" font-family="Arial">f'(x) = lim(Δx→0) [f(x+Δx) − f(x)] / Δx</text>
  <text x="250" y="93" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Геометрически: f'(x₀) = tg α | Физически: s'(t) = v(t)</text>
  <rect x="12" y="108" width="476" height="115" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="124" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Таблица производных</text>
  <text x="250" y="142" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">C → 0 | x → 1 | xⁿ → nxⁿ⁻¹</text>
  <text x="250" y="157" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">√x → 1/(2√x) | 1/x → −1/x²</text>
  <text x="250" y="172" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">eˣ → eˣ | aˣ → aˣ ln a | ln x → 1/x</text>
  <text x="250" y="187" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">sin x → cos x | cos x → −sin x</text>
  <text x="250" y="202" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">tg x → 1/cos²x | ctg x → −1/sin²x</text>
  <text x="250" y="218" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">(xⁿ)' = nxⁿ⁻¹ — главное правило!</text>
  <rect x="12" y="231" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="248" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Примеры</text>
  <text x="250" y="265" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">(x⁴)' = 4x³ | (√x)' = 1/(2√x) | (5)' = 0</text>
  <text x="250" y="278" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">(cos x)' = −sin x — минус!</text>
  <rect x="12" y="289" width="476" height="23" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="305" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Не путай: (x³)' = 3x², а не 3x³. Степень уменьшается!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Определение производной — Мордкович А.Г., 10 класс</text>
</svg>