<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="50%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Арктангенс и уравнения</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 9</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="60" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="75" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">arctg a и arcctg a</text>
  <text x="250" y="93" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">arctg a ∈ (−π/2; π/2) | tg(arctg a) = a | Для всех a!</text>
  <text x="250" y="108" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">arcctg a ∈ (0; π) | ctg(arcctg a) = a | Для всех a!</text>
  <text x="250" y="114" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">arctg(−a) = −arctg a | tg t = a: t = arctg a + πk</text>
  <rect x="12" y="126" width="476" height="80" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="143" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Методы решения уравнений</text>
  <text x="250" y="160" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">1. Замена: 2sin²x − sin x − 1 = 0 → t = sin x</text>
  <text x="250" y="173" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">2. Разложение: sin x(cos x − 1) = 0</text>
  <text x="250" y="186" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">3. Однородные: a sin x + b cos x = 0 → делим на cos x</text>
  <text x="250" y="199" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">4. Вспомогательный угол: a sin x + b cos x = c</text>
  <rect x="12" y="214" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="231" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Пример: 2cos²x + cos x − 1 = 0</text>
  <text x="250" y="248" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">t = cos x: 2t² + t − 1 = 0 → t = 1/2 или t = −1</text>
  <text x="250" y="263" font-size="8" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">x = ±π/3 + 2πk или x = π + 2πk</text>
  <rect x="12" y="276" width="476" height="36" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="293" font-size="8" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Осторожно!</text>
  <text x="250" y="307" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Деля на cos x, учтите cos x ≠ 0 | В sin 2x ответ x = ..., не 2x</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Арктангенс — Мордкович А.Г., 10 класс</text>
</svg>