<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="50%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Обратная функция</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 3</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="75" font-size="10" fill="#0D47A1" text-anchor="middle" font-weight="bold" font-family="Arial">Ключевое правило</text>
  <text x="250" y="93" font-size="9" fill="#555" text-anchor="middle" font-family="Arial">Функция обратима ⇔ она монотонна на D(f)</text>
  <text x="250" y="107" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">f(a) = b ⟹ f⁻¹(b) = a — обратная функция</text>
  <rect x="12" y="120" width="476" height="50" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="137" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Свойства</text>
  <text x="250" y="155" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">D(f⁻¹) = E(f) | E(f⁻¹) = D(f) | f(f⁻¹(x)) = x</text>
  <text x="250" y="165" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Графики симметричны относительно y = x</text>
  <rect x="12" y="178" width="230" height="70" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="127" y="194" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Пример 1</text>
  <text x="127" y="210" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">f(x) = 2x + 3</text>
  <text x="127" y="225" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">f⁻¹(x) = (x − 3)/2</text>
  <text x="127" y="240" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Проверка: 2·(x−3)/2+3 = x ✓</text>
  <rect x="252" y="178" width="236" height="70" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="370" y="194" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Пример 2</text>
  <text x="370" y="210" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">f(x) = x³</text>
  <text x="370" y="225" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">f⁻¹(x) = ∛x</text>
  <text x="370" y="240" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">x³ монотонна → обратима ✓</text>
  <rect x="12" y="256" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="273" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Осторожно!</text>
  <text x="250" y="290" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">f(x) = x² на R — НЕ обратима (f(2) = f(−2) = 4)</text>
  <text x="250" y="305" font-size="8" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Но на [0; +∞) обратима: f⁻¹(x) = √x</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Обратная функция — Мордкович А.Г., 10 класс</text>
</svg>