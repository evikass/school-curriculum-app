<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="50%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Числовая функция</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 1</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="48" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="75" font-size="10" fill="#0D47A1" text-anchor="middle" font-weight="bold" font-family="Arial">Определение</text>
  <text x="250" y="93" font-size="9" fill="#555" text-anchor="middle" font-family="Arial">y = f(x): каждому x из D(f) → единственное y из E(f)</text>
  <rect x="12" y="114" width="230" height="95" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="127" y="130" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Ограничения для D(f)</text>
  <text x="127" y="148" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Знаменатель: 1/x → x ≠ 0</text>
  <text x="127" y="163" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Корень: √x → x ≥ 0</text>
  <text x="127" y="178" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">Логарифм: ln x → x > 0</text>
  <text x="127" y="198" font-size="8" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Несколько → пересечение!</text>
  <rect x="252" y="114" width="236" height="95" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="370" y="130" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Способы задания</text>
  <text x="370" y="148" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">1. Аналитический: y = 2x + 3</text>
  <text x="370" y="163" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">2. Табличный: таблица значений</text>
  <text x="370" y="178" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">3. Графический: на плоскости</text>
  <text x="370" y="193" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">4. Словесный: описанием</text>
  <rect x="12" y="217" width="476" height="48" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="234" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Пример</text>
  <text x="250" y="252" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">f(x) = √(x−3) + 1/(x−5) → D(f) = [3; 5) ∪ (5; +∞)</text>
  <rect x="12" y="272" width="476" height="40" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="289" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Важно!</text>
  <text x="250" y="304" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">D(f) — про x, E(f) — про y. Не путайте!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Числовые функции — Мордкович А.Г., 10 класс</text>
</svg>