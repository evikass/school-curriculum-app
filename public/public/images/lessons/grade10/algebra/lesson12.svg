<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Формулы двойного аргумента</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 12</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="38" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="78" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold" font-family="Arial">sin 2α = 2sin α cos α</text>
  <text x="250" y="92" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Частный случай формулы сложения при β = α</text>
  <rect x="12" y="103" width="476" height="75" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="120" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">cos 2α — три формы</text>
  <text x="250" y="138" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">cos 2α = cos²α − sin²α</text>
  <text x="250" y="153" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">cos 2α = 2cos²α − 1</text>
  <text x="250" y="168" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">cos 2α = 1 − 2sin²α</text>
  <rect x="12" y="186" width="476" height="32" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="206" font-size="9" fill="#0D47A1" text-anchor="middle" font-weight="bold" font-family="Arial">tg 2α = 2tg α / (1 − tg²α)</text>
  <rect x="12" y="226" width="476" height="60" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="243" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Пример</text>
  <text x="250" y="260" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">sin α = 3/5, cos α = 4/5 → sin 2α = 24/25</text>
  <text x="250" y="278" font-size="8" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">2sin 2α ≠ sin α! sin 2α = 2sin α cos α</text>
  <rect x="12" y="294" width="476" height="18" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="307" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Осторожно: 2sin α ≠ sin 2α! Нужен cos α в формуле</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Двойной аргумент — Мордкович А.Г., 10 класс</text>
</svg>