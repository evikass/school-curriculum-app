<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="50%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Функции y = sin x и y = cos x</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 6</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="230" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="127" y="74" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">y = sin x</text>
  <text x="127" y="90" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Нечётная: sin(−x) = −sin x</text>
  <text x="127" y="104" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Нули: x = πk, k ∈ Z</text>
  <text x="127" y="118" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Max = 1 при x = π/2 + 2πk</text>
  <text x="127" y="132" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Min = −1 при x = −π/2 + 2πk</text>
  <text x="127" y="146" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">Возрастает: [−π/2+2πk; π/2+2πk]</text>
  <text x="127" y="160" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">Убывает: [π/2+2πk; 3π/2+2πk]</text>
  <text x="127" y="174" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">T = 2π | E = [−1; 1]</text>
  <rect x="252" y="58" width="236" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="370" y="74" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">y = cos x</text>
  <text x="370" y="90" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Чётная: cos(−x) = cos x</text>
  <text x="370" y="104" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Нули: x = π/2 + πk</text>
  <text x="370" y="118" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Max = 1 при x = 2πk</text>
  <text x="370" y="132" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Min = −1 при x = π + 2πk</text>
  <text x="370" y="146" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">Убывает: [2πk; π+2πk]</text>
  <text x="370" y="160" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">Возрастает: [π+2πk; 2π+2πk]</text>
  <text x="370" y="174" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">T = 2π | E = [−1; 1]</text>
  <rect x="12" y="186" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="203" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Связь графиков</text>
  <text x="250" y="220" font-size="8" fill="#1565C0" text-anchor="middle" font-family="Arial">cos x = sin(x + π/2)</text>
  <text x="250" y="234" font-size="7" fill="#555" text-anchor="middle" font-family="Arial">Косинусоида = синусоида, сдвинутая на π/2 влево</text>
  <rect x="12" y="249" width="476" height="63" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="266" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Сравнение sin 1 и sin 2</text>
  <text x="250" y="283" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">1 ∈ I четверть (возрастает), 2 ∈ II четверть (убывает)</text>
  <text x="250" y="298" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">sin 2 = sin(π − 2) ≈ sin 1,14</text>
  <text x="250" y="308" font-size="8" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">sin 1 &lt; sin 2</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">sin x и cos x — Мордкович А.Г., 10 класс</text>
</svg>