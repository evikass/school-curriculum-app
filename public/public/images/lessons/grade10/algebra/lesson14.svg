<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#BBDEFB"/><stop offset="100%" stop-color="#1E88E5" stop-opacity="0.5"/></linearGradient></defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="250" y="28" font-size="12" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Суммы и произведения</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 10 класс — Урок 14</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#1565C0" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="74" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Суммы → Произведения</text>
  <text x="250" y="92" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">sinα + sinβ = 2sin((α+β)/2)cos((α−β)/2)</text>
  <text x="250" y="106" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">sinα − sinβ = 2cos((α+β)/2)sin((α−β)/2)</text>
  <text x="250" y="120" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">cosα + cosβ = 2cos((α+β)/2)cos((α−β)/2)</text>
  <text x="250" y="134" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">cosα − cosβ = −2sin((α+β)/2)sin((α−β)/2)</text>
  <text x="250" y="145" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Минус в разности косинусов!</text>
  <rect x="12" y="156" width="476" height="65" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="172" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Произведения → Суммы</text>
  <text x="250" y="190" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">2sinα cosβ = sin(α+β) + sin(α−β)</text>
  <text x="250" y="204" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">2cosα cosβ = cos(α−β) + cos(α+β)</text>
  <text x="250" y="218" font-size="7" fill="#1565C0" text-anchor="middle" font-family="Arial">2sinα sinβ = cos(α−β) − cos(α+β)</text>
  <rect x="12" y="229" width="476" height="55" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="246" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle" font-family="Arial">Примеры</text>
  <text x="250" y="262" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">sin5x + sin3x = 2sin4x cosx</text>
  <text x="250" y="278" font-size="8" fill="#555" text-anchor="middle" font-family="Arial">sin75° + sin15° = 2sin45° cos30° = √6/2</text>
  <rect x="12" y="292" width="476" height="20" rx="6" fill="white" fill-opacity="0.9" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="306" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle" font-family="Arial">Аргументы: полусумма (α+β)/2 и полуразность (α−β)/2</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#1565C0" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Суммы и произведения — Мордкович А.Г., 10 класс</text>
</svg>