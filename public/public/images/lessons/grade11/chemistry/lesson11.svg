<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Химическое равновесие и принцип Ле Шателье</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Le Chatelier's Principle -->
<rect x="12" y="58" width="476" height="30" rx="6" fill="#1B5E20"/>
<text x="250" y="78" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Принцип Ле Шателье: равновесие смещается в сторону, противодействующую внешнему воздействию</text>

<!-- Temperature effect -->
<rect x="12" y="98" width="155" height="115" rx="8" fill="white" stroke="#FF5722" stroke-width="1.5" filter="url(#sh)"/>
<text x="90" y="115" font-family="Arial,sans-serif" font-size="8" fill="#BF360C" text-anchor="middle" font-weight="bold">Повышение T</text>
<text x="22" y="130" font-family="Arial,sans-serif" font-size="7" fill="#FF5722">Экзо-р-ция: сдвиг ВЛЕВО</text>
<text x="22" y="143" font-family="Arial,sans-serif" font-size="7" fill="#2196F3">Эндо-р-ция: сдвиг ВПРАВО</text>
<text x="22" y="158" font-family="Arial,sans-serif" font-size="7" fill="#333">Система поглощает тепло,</text>
<text x="22" y="171" font-family="Arial,sans-serif" font-size="7" fill="#333">благодаря эндотермич.</text>
<text x="22" y="184" font-family="Arial,sans-serif" font-size="7" fill="#333">направлению</text>
<text x="22" y="200" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Пример: N2+3H2 ⇌ 2NH3</text>
<text x="22" y="210" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Синтез NH3 — экзо, T+ -> влево</text>

<!-- Pressure effect -->
<rect x="177" y="98" width="155" height="115" rx="8" fill="white" stroke="#9C27B0" stroke-width="1.5" filter="url(#sh)"/>
<text x="255" y="115" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Повышение P</text>
<text x="187" y="130" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">Сдвиг к меньшему числу</text>
<text x="187" y="143" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">молей газа</text>
<text x="187" y="158" font-family="Arial,sans-serif" font-size="7" fill="#333">Пример: 4 моль -> 2 моль</text>
<text x="187" y="171" font-family="Arial,sans-serif" font-size="7" fill="#333">P+: сдвиг ВПРАВО</text>
<text x="187" y="184" font-family="Arial,sans-serif" font-size="7" fill="#333">(в сторону NH3)</text>
<text x="187" y="200" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Только для газов!</text>
<text x="187" y="210" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Жидкости и твёрдые — нет</text>

<!-- Concentration effect -->
<rect x="342" y="98" width="146" height="115" rx="8" fill="white" stroke="#2196F3" stroke-width="1.5" filter="url(#sh)"/>
<text x="415" y="115" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Повышение конц.</text>
<text x="352" y="130" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50">Добавить реагент: ВПРАВО</text>
<text x="352" y="143" font-family="Arial,sans-serif" font-size="7" fill="#F44336">Добавить продукт: ВЛЕВО</text>
<text x="352" y="158" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50">Удалить продукт: ВПРАВО</text>
<text x="352" y="175" font-family="Arial,sans-serif" font-size="7" fill="#333">Система противодействует</text>
<text x="352" y="188" font-family="Arial,sans-serif" font-size="7" fill="#333">изменению</text>

<!-- Equilibrium Constant -->
<rect x="12" y="225" width="250" height="90" rx="8" fill="white" stroke="#1B5E20" stroke-width="1.5" filter="url(#sh)"/>
<text x="137" y="243" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Константа равновесия Kc</text>
<text x="137" y="258" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Kc = [C]^c * [D]^d / ([A]^a * [B]^b)</text>
<text x="22" y="273" font-family="Arial,sans-serif" font-size="7" fill="#333">Зависит ТОЛЬКО от температуры!</text>
<text x="22" y="286" font-family="Arial,sans-serif" font-size="7" fill="#4CAF50">Kc ≫ 1: преобладают продукты</text>
<text x="22" y="299" font-family="Arial,sans-serif" font-size="7" fill="#F44336">Kc ≪ 1: преобладают реагенты</text>
<text x="22" y="312" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2">Катализатор: НЕ влияет на Kc</text>

<!-- Summary -->
<rect x="272" y="225" width="216" height="90" rx="8" fill="white" stroke="#FF9800" stroke-width="1.5" filter="url(#sh)"/>
<text x="380" y="243" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Равновесие</text>
<circle cx="282" cy="258" r="3" fill="#4CAF50"/><text x="292" y="261" font-family="Arial,sans-serif" font-size="7" fill="#333">Kc = const при данной T</text>
<circle cx="282" cy="273" r="3" fill="#2196F3"/><text x="292" y="276" font-family="Arial,sans-serif" font-size="7" fill="#333">Динамическое состояние</text>
<circle cx="282" cy="288" r="3" fill="#FF9800"/><text x="292" y="291" font-family="Arial,sans-serif" font-size="7" fill="#333">Скорость прямой = скорости обратной</text>
<circle cx="282" cy="303" r="3" fill="#9C27B0"/><text x="292" y="306" font-family="Arial,sans-serif" font-size="7" fill="#333">Концентрации неизменны</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>