<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Скорость химических реакций</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Speed factors -->
<rect x="12" y="58" width="160" height="130" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
<text x="92" y="75" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Факторы скорости</text>
<line x1="22" y1="80" x2="162" y2="80" stroke="#2E7D32" stroke-width="0.5"/>
<circle cx="28" cy="93" r="3" fill="#4CAF50"/><text x="38" y="96" font-family="Arial,sans-serif" font-size="7" fill="#333">Концентрация [A]: +</text>
<circle cx="28" cy="108" r="3" fill="#FF9800"/><text x="38" y="111" font-family="Arial,sans-serif" font-size="7" fill="#333">Температура T: +</text>
<circle cx="28" cy="123" r="3" fill="#2196F3"/><text x="38" y="126" font-family="Arial,sans-serif" font-size="7" fill="#333">Давление P (газы): +</text>
<circle cx="28" cy="138" r="3" fill="#9C27B0"/><text x="38" y="141" font-family="Arial,sans-serif" font-size="7" fill="#333">Катализатор: +</text>
<circle cx="28" cy="153" r="3" fill="#F44336"/><text x="38" y="156" font-family="Arial,sans-serif" font-size="7" fill="#333">Поверхность: +</text>
<circle cx="28" cy="168" r="3" fill="#795548"/><text x="38" y="171" font-family="Arial,sans-serif" font-size="7" fill="#333">Ингибитор: -</text>

<!-- Van't Hoff rule -->
<rect x="185" y="58" width="155" height="60" rx="8" fill="white" stroke="#FF9800" stroke-width="1.5" filter="url(#sh)"/>
<text x="262" y="75" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Правило Вант-Гоффа</text>
<text x="195" y="90" font-family="Arial,sans-serif" font-size="7" fill="#333">При повышении T на 10 C:</text>
<text x="262" y="105" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">V2/V1 = y^((T2-T1)/10)</text>
<text x="262" y="115" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">y = 2-4 (температурный коэффициент)</text>

<!-- Law of Mass Action -->
<rect x="185" y="125" width="155" height="63" rx="8" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
<text x="262" y="142" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Закон действующих масс</text>
<text x="195" y="157" font-family="Arial,sans-serif" font-size="7" fill="#333">Для aA + bB:</text>
<text x="262" y="170" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">v = k * [A]^a * [B]^b</text>
<text x="262" y="183" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">k — константа скорости</text>

<!-- Catalyst diagram -->
<rect x="350" y="58" width="138" height="130" rx="8" fill="white" stroke="#9C27B0" stroke-width="1.5" filter="url(#sh)"/>
<text x="419" y="75" font-family="Arial,sans-serif" font-size="9" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Катализатор</text>
<text x="419" y="88" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle">Снижает Ea</text>
<!-- Energy diagram -->
<line x1="365" y1="170" x2="475" y2="170" stroke="#ccc" stroke-width="0.5"/>
<line x1="365" y1="95" x2="365" y2="170" stroke="#ccc" stroke-width="0.5"/>
<text x="360" y="175" font-family="Arial,sans-serif" font-size="5" fill="#666">ход</text>
<text x="360" y="94" font-family="Arial,sans-serif" font-size="5" fill="#666">E</text>
<path d="M370,155 Q400,85 430,155" fill="none" stroke="#F44336" stroke-width="1.5"/>
<path d="M370,155 Q400,115 430,155" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="405" y="82" font-family="Arial,sans-serif" font-size="5" fill="#F44336">без кат.</text>
<text x="415" y="108" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">с кат.</text>

<!-- Enzymes -->
<rect x="12" y="200" width="235" height="60" rx="8" fill="white" stroke="#2E7D32" stroke-width="1" filter="url(#sh)"/>
<text x="130" y="218" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ферменты — биологические катализаторы</text>
<text x="22" y="233" font-family="Arial,sans-serif" font-size="7" fill="#333">Модель «ключ-замок»</text>
<text x="22" y="246" font-family="Arial,sans-serif" font-size="7" fill="#333">Специфичность: один фермент — одна реакция</text>

<!-- Arrhenius -->
<rect x="258" y="200" width="230" height="60" rx="8" fill="white" stroke="#1565C0" stroke-width="1" filter="url(#sh)"/>
<text x="373" y="218" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Уравнение Аррениуса</text>
<text x="373" y="233" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">k = A * exp(-Ea / (R*T))</text>
<text x="373" y="248" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ea — энергия активации, R = 8,314 Дж/(моль*К)</text>

<!-- Important note -->
<text x="250" y="280" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Катализатор снижает Ea, но НЕ смещает равновесие!</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>