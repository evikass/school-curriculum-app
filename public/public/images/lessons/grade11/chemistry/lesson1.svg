<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
<defs>
  <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
  </filter>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E8F5E9"/>
    <stop offset="100%" stop-color="#C8E6C9"/>
  </linearGradient>
</defs>

<!-- Background -->
<rect width="500" height="350" fill="url(#bg)"/>

<!-- Title bar -->
<rect x="0" y="0" width="500" height="42" fill="#1B5E20" rx="8"/>
<rect x="0" y="20" width="500" height="22" fill="#1B5E20"/>
<text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Амины: строение, номенклатура, свойства</text>

<!-- Card 1: Primary Amine CH3-NH2 -->
<rect x="10" y="50" width="152" height="125" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
<text x="86" y="67" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">Первичный амин</text>
<!-- CH3-NH2 structure -->
<text x="40" y="95" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">H</text>
<text x="58" y="95" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">H</text>
<text x="86" y="95" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">C</text>
<text x="114" y="95" text-anchor="middle" fill="#1B5E20" font-size="13" font-weight="bold">N</text>
<text x="132" y="95" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">H</text>
<!-- bonds -->
<line x1="46" y1="92" x2="58" y2="92" stroke="#555" stroke-width="1.2"/>
<line x1="64" y1="92" x2="79" y2="92" stroke="#555" stroke-width="1.2"/>
<line x1="93" y1="92" x2="107" y2="92" stroke="#2E7D32" stroke-width="1.5"/>
<line x1="120" y1="92" x2="126" y2="92" stroke="#555" stroke-width="1.2"/>
<!-- NH2 highlight -->
<rect x="105" y="80" width="38" height="18" rx="4" fill="#C8E6C9" opacity="0.5"/>
<text x="114" y="112" text-anchor="middle" fill="#333" font-size="10">H</text>
<line x1="114" y1="99" x2="114" y2="107" stroke="#555" stroke-width="1"/>
<text x="86" y="130" text-anchor="middle" fill="#2E7D32" font-size="9" font-weight="bold">CH&#8323;-NH&#8322;</text>
<text x="86" y="143" text-anchor="middle" fill="#555" font-size="7">метиламин</text>
<rect x="30" y="148" width="112" height="16" rx="8" fill="#43A047"/>
<text x="86" y="159" text-anchor="middle" fill="white" font-size="7" font-weight="bold">1 аминогруппа -NH&#8322;</text>

<!-- Card 2: Secondary Amine (CH3)2NH -->
<rect x="172" y="50" width="152" height="125" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
<text x="248" y="67" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">Вторичный амин</text>
<!-- (CH3)2NH structure -->
<text x="210" y="92" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">CH&#8323;</text>
<line x1="223" y1="89" x2="238" y2="89" stroke="#2E7D32" stroke-width="1.5"/>
<text x="248" y="95" text-anchor="middle" fill="#1B5E20" font-size="13" font-weight="bold">N</text>
<line x1="258" y1="89" x2="273" y2="89" stroke="#2E7D32" stroke-width="1.5"/>
<text x="286" y="92" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">CH&#8323;</text>
<!-- NH bond -->
<text x="248" y="118" text-anchor="middle" fill="#333" font-size="10">H</text>
<line x1="248" y1="99" x2="248" y2="110" stroke="#555" stroke-width="1.2"/>
<!-- N highlight -->
<circle cx="248" cy="89" r="12" fill="#C8E6C9" opacity="0.4"/>
<text x="248" y="138" text-anchor="middle" fill="#2E7D32" font-size="9" font-weight="bold">(CH&#8323;)&#8322;NH</text>
<text x="248" y="151" text-anchor="middle" fill="#555" font-size="7">диметиламин</text>
<rect x="192" y="155" width="112" height="16" rx="8" fill="#388E3C"/>
<text x="248" y="166" text-anchor="middle" fill="white" font-size="7" font-weight="bold">2 алкильные группы</text>

<!-- Card 3: Tertiary Amine (CH3)3N -->
<rect x="334" y="50" width="152" height="125" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
<text x="410" y="67" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">Третичный амин</text>
<!-- (CH3)3N structure - central N with 3 branches -->
<text x="410" y="93" text-anchor="middle" fill="#1B5E20" font-size="13" font-weight="bold">N</text>
<circle cx="410" cy="89" r="12" fill="#C8E6C9" opacity="0.4"/>
<!-- top-left CH3 -->
<line x1="398" y1="85" x2="378" y2="78" stroke="#2E7D32" stroke-width="1.5"/>
<text x="368" y="78" text-anchor="middle" fill="#333" font-size="9" font-weight="bold">CH&#8323;</text>
<!-- top-right CH3 -->
<line x1="422" y1="85" x2="442" y2="78" stroke="#2E7D32" stroke-width="1.5"/>
<text x="452" y="78" text-anchor="middle" fill="#333" font-size="9" font-weight="bold">CH&#8323;</text>
<!-- bottom CH3 -->
<line x1="410" y1="99" x2="410" y2="112" stroke="#2E7D32" stroke-width="1.5"/>
<text x="410" y="122" text-anchor="middle" fill="#333" font-size="9" font-weight="bold">CH&#8323;</text>
<text x="410" y="138" text-anchor="middle" fill="#2E7D32" font-size="9" font-weight="bold">(CH&#8323;)&#8323;N</text>
<text x="410" y="151" text-anchor="middle" fill="#555" font-size="7">триметиламин</text>
<rect x="354" y="155" width="112" height="16" rx="8" fill="#2E7D32"/>
<text x="410" y="166" text-anchor="middle" fill="white" font-size="7" font-weight="bold">3 алкильные группы</text>

<!-- Dashed connecting lines between cards -->
<line x1="162" y1="112" x2="172" y2="112" stroke="#66BB6A" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="324" y1="112" x2="334" y2="112" stroke="#66BB6A" stroke-width="1.5" stroke-dasharray="4,3"/>

<!-- Card 4: Basicity comparison -->
<rect x="10" y="185" width="240" height="130" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
<text x="130" y="202" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">Основность аминов (сравнение)</text>

<!-- Arrow showing basicity order -->
<text x="40" y="225" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">CH&#8323;NH&#8322;</text>
<text x="40" y="237" text-anchor="middle" fill="#555" font-size="7">метиламин</text>

<line x1="72" y1="222" x2="102" y2="222" stroke="#4CAF50" stroke-width="1.5"/>
<polygon points="100,218 108,222 100,226" fill="#4CAF50"/>
<text x="90" y="215" text-anchor="middle" fill="#4CAF50" font-size="7">&#62;</text>

<text x="130" y="225" text-anchor="middle" fill="#388E3C" font-size="9" font-weight="bold">NH&#8323;</text>
<text x="130" y="237" text-anchor="middle" fill="#555" font-size="7">аммиак</text>

<line x1="155" y1="222" x2="185" y2="222" stroke="#4CAF50" stroke-width="1.5"/>
<polygon points="183,218 191,222 183,226" fill="#4CAF50"/>
<text x="170" y="215" text-anchor="middle" fill="#4CAF50" font-size="7">&#62;</text>

<text x="213" y="225" text-anchor="middle" fill="#66BB6A" font-size="9" font-weight="bold">C&#8326;H&#8325;NH&#8322;</text>
<text x="213" y="237" text-anchor="middle" fill="#555" font-size="7">анилин</text>

<!-- Reason text -->
<text x="130" y="256" text-anchor="middle" fill="#555" font-size="7">+I эффект алкила усиливает основность</text>
<text x="130" y="267" text-anchor="middle" fill="#555" font-size="7">Сопряжение с кольцом ослабляет основность</text>

<!-- pKb values as pills -->
<rect x="22" y="275" width="55" height="16" rx="8" fill="#43A047"/>
<text x="49" y="286" text-anchor="middle" fill="white" font-size="7" font-weight="bold">pKb 3,36</text>
<rect x="103" y="275" width="55" height="16" rx="8" fill="#66BB6A"/>
<text x="130" y="286" text-anchor="middle" fill="white" font-size="7" font-weight="bold">pKb 4,75</text>
<rect x="185" y="275" width="55" height="16" rx="8" fill="#A5D6A7"/>
<text x="212" y="286" text-anchor="middle" fill="#1B5E20" font-size="7" font-weight="bold">pKb 9,38</text>

<!-- Basicity strength bar -->
<rect x="22" y="296" width="216" height="6" rx="3" fill="#E8F5E9"/>
<rect x="22" y="296" width="180" height="6" rx="3" fill="#43A047"/>
<rect x="22" y="296" width="100" height="6" rx="3" fill="#66BB6A"/>
<text x="22" y="310" fill="#81C784" font-size="6">сильнее основание</text>
<text x="238" y="310" text-anchor="end" fill="#81C784" font-size="6">слабее</text>

<!-- Card 5: Reaction with acid -->
<rect x="260" y="185" width="228" height="130" rx="10" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#shadow1)"/>
<text x="374" y="202" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">Реакция с кислотой</text>

<!-- Reaction equation -->
<text x="290" y="228" text-anchor="middle" fill="#333" font-size="10" font-weight="bold">CH&#8323;NH&#8322;</text>
<text x="325" y="228" text-anchor="middle" fill="#333" font-size="10">+</text>
<text x="350" y="228" text-anchor="middle" fill="#C62828" font-size="10" font-weight="bold">HCl</text>
<!-- Arrow -->
<line x1="370" y1="225" x2="400" y2="225" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="398,221 406,225 398,229" fill="#2E7D32"/>
<text x="430" y="228" text-anchor="middle" fill="#1B5E20" font-size="10" font-weight="bold">[CH&#8323;NH&#8323;]&#8314;Cl&#8315;</text>

<!-- Visual: beaker with acid + amine -->
<rect x="278" y="242" width="50" height="45" rx="3" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
<rect x="280" y="262" width="46" height="23" rx="2" fill="#81C784" opacity="0.4"/>
<text x="303" y="280" text-anchor="middle" fill="#1B5E20" font-size="7">амин</text>

<text x="342" y="268" text-anchor="middle" fill="#333" font-size="12">+</text>

<rect x="358" y="242" width="40" height="45" rx="3" fill="none" stroke="#C62828" stroke-width="1.2"/>
<rect x="360" y="262" width="36" height="23" rx="2" fill="#EF9A9A" opacity="0.5"/>
<text x="378" y="280" text-anchor="middle" fill="#C62828" font-size="7">HCl</text>

<text x="412" y="268" text-anchor="middle" fill="#333" font-size="12">&#8594;</text>

<!-- Salt product -->
<rect x="425" y="248" width="50" height="38" rx="5" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<text x="450" y="264" text-anchor="middle" fill="#1B5E20" font-size="7" font-weight="bold">Соль</text>
<text x="450" y="276" text-anchor="middle" fill="#555" font-size="6">хлорид</text>
<text x="450" y="284" text-anchor="middle" fill="#555" font-size="6">метиламмония</text>

<!-- Key concept pills -->
<rect x="275" y="295" width="60" height="14" rx="7" fill="#4CAF50"/>
<text x="305" y="305" text-anchor="middle" fill="white" font-size="6.5" font-weight="bold">основание</text>
<rect x="340" y="295" width="60" height="14" rx="7" fill="#388E3C"/>
<text x="370" y="305" text-anchor="middle" fill="white" font-size="6.5" font-weight="bold">протонация</text>
<rect x="405" y="295" width="60" height="14" rx="7" fill="#2E7D32"/>
<text x="435" y="305" text-anchor="middle" fill="white" font-size="6.5" font-weight="bold">ионная соль</text>

<!-- Bottom accent bar -->
<rect x="0" y="330" width="500" height="20" fill="#1B5E20"/>
<text x="250" y="343" text-anchor="middle" fill="#A5D6A7" font-size="8">Амины &#8212; органические основания; основность: алкиламины &#62; NH&#8323; &#62; анилин</text>
</svg>