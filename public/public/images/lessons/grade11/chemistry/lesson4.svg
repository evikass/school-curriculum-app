<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Нуклеиновые кислоты: ДНК и РНК</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- DNA double helix -->
<g transform="translate(130,180)">
  <path d="M-10,-40 C0,-35 10,-30 0,-25 C-10,-20 10,-15 0,-10 C-10,-5 10,0 0,5 C-10,10 10,15 0,20 C-10,25 10,30 0,35" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <path d="M10,-40 C0,-35 -10,-30 0,-25 C10,-20 -10,-15 0,-10 C10,-5 -10,0 0,5 C10,10 -10,15 0,20 C10,25 -10,30 0,35" fill="none" stroke="#C62828" stroke-width="2.5"/>
  <line x1="-5" y1="-35" x2="5" y2="-35" stroke="#888" stroke-width="1"/>
  <line x1="-8" y1="-25" x2="8" y2="-25" stroke="#888" stroke-width="1"/>
  <line x1="-5" y1="-15" x2="5" y2="-15" stroke="#888" stroke-width="1"/>
  <line x1="-8" y1="-5" x2="8" y2="-5" stroke="#888" stroke-width="1"/>
  <line x1="-5" y1="5" x2="5" y2="5" stroke="#888" stroke-width="1"/>
  <line x1="-8" y1="15" x2="8" y2="15" stroke="#888" stroke-width="1"/>
  <line x1="-5" y1="25" x2="5" y2="25" stroke="#888" stroke-width="1"/>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">ДНК</text>
</g>

<!-- DNA info card -->
<rect x="30" y="60" width="200" height="90" rx="8" fill="white" opacity="0.9" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
<text x="130" y="78" font-family="Arial,sans-serif" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">ДНК (дезоксирибонуклеиновая)</text>
<text x="40" y="93" font-family="Arial,sans-serif" font-size="8" fill="#333">Двойная спираль</text>
<text x="40" y="105" font-family="Arial,sans-serif" font-size="8" fill="#333">Сахар: дезоксирибоза</text>
<text x="40" y="117" font-family="Arial,sans-serif" font-size="8" fill="#333">Азотистые основания: А, Т, Г, Ц</text>
<text x="40" y="129" font-family="Arial,sans-serif" font-size="8" fill="#333">Правило Чаргаффа: А=Т, Г=Ц</text>
<text x="40" y="141" font-family="Arial,sans-serif" font-size="8" fill="#333">Комплементарность: А-Т, Г-Ц</text>

<!-- RNA info card -->
<rect x="270" y="60" width="200" height="90" rx="8" fill="white" opacity="0.9" stroke="#C62828" stroke-width="1.5" filter="url(#sh)"/>
<text x="370" y="78" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">РНК (рибонуклеиновая)</text>
<text x="280" y="93" font-family="Arial,sans-serif" font-size="8" fill="#333">Одинарная цепь</text>
<text x="280" y="105" font-family="Arial,sans-serif" font-size="8" fill="#333">Сахар: рибоза</text>
<text x="280" y="117" font-family="Arial,sans-serif" font-size="8" fill="#333">Азотистые основания: А, У, Г, Ц</text>
<text x="280" y="129" font-family="Arial,sans-serif" font-size="8" fill="#333">Урацил (У) вместо тимина (Т)</text>
<text x="280" y="141" font-family="Arial,sans-serif" font-size="8" fill="#333">Виды: иРНК, тРНК, рРНК</text>

<!-- RNA types -->
<rect x="30" y="165" width="140" height="70" rx="6" fill="white" opacity="0.85" stroke="#FF9800" stroke-width="1" filter="url(#sh)"/>
<text x="100" y="180" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">иРНК (матричная)</text>
<text x="40" y="195" font-family="Arial,sans-serif" font-size="7" fill="#333">Переносит информацию</text>
<text x="40" y="207" font-family="Arial,sans-serif" font-size="7" fill="#333">от ДНК к рибосоме</text>
<text x="40" y="219" font-family="Arial,sans-serif" font-size="7" fill="#333">5% от всей РНК</text>

<rect x="180" y="165" width="140" height="70" rx="6" fill="white" opacity="0.85" stroke="#9C27B0" stroke-width="1" filter="url(#sh)"/>
<text x="250" y="180" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">тРНК (транспортная)</text>
<text x="190" y="195" font-family="Arial,sans-serif" font-size="7" fill="#333">Приносит аминокислоты</text>
<text x="190" y="207" font-family="Arial,sans-serif" font-size="7" fill="#333">Форма: клеверный лист</text>
<text x="190" y="219" font-family="Arial,sans-serif" font-size="7" fill="#333">Антикодон комплементарен кодону</text>

<rect x="330" y="165" width="140" height="70" rx="6" fill="white" opacity="0.85" stroke="#2196F3" stroke-width="1" filter="url(#sh)"/>
<text x="400" y="180" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">рРНК (рибосомная)</text>
<text x="340" y="195" font-family="Arial,sans-serif" font-size="7" fill="#333">Входит в состав рибосом</text>
<text x="340" y="207" font-family="Arial,sans-serif" font-size="7" fill="#333">80% от всей РНК</text>
<text x="340" y="219" font-family="Arial,sans-serif" font-size="7" fill="#333">Катализирует синтез белка</text>

<!-- Replication/Transcription/Translation -->
<rect x="30" y="250" width="140" height="65" rx="6" fill="#1565C0" opacity="0.15" stroke="#1565C0" stroke-width="1"/>
<text x="100" y="265" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Репликация</text>
<text x="40" y="278" font-family="Arial,sans-serif" font-size="7" fill="#333">ДНК -> ДНК</text>
<text x="40" y="290" font-family="Arial,sans-serif" font-size="7" fill="#333">Удвоение перед делением</text>
<text x="40" y="302" font-family="Arial,sans-serif" font-size="7" fill="#333">Полуконсервативный механизм</text>

<rect x="180" y="250" width="140" height="65" rx="6" fill="#FF9800" opacity="0.15" stroke="#FF9800" stroke-width="1"/>
<text x="250" y="265" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Транскрипция</text>
<text x="190" y="278" font-family="Arial,sans-serif" font-size="7" fill="#333">ДНК -> иРНК</text>
<text x="190" y="290" font-family="Arial,sans-serif" font-size="7" fill="#333">В ядре, фермент РНК-полимераза</text>
<text x="190" y="302" font-family="Arial,sans-serif" font-size="7" fill="#333">Т -> У в иРНК</text>

<rect x="330" y="250" width="140" height="65" rx="6" fill="#4CAF50" opacity="0.15" stroke="#4CAF50" stroke-width="1"/>
<text x="400" y="265" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Трансляция</text>
<text x="340" y="278" font-family="Arial,sans-serif" font-size="7" fill="#333">иРНК -> белок</text>
<text x="340" y="290" font-family="Arial,sans-serif" font-size="7" fill="#333">На рибосомах</text>
<text x="340" y="302" font-family="Arial,sans-serif" font-size="7" fill="#333">Кодон = 3 нуклеотида</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>