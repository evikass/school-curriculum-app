<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<filter id="sh"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000030"/></filter>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Тепловой эффект химических реакций</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Химия 11 класс</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Energy diagram -->
<rect x="12" y="58" width="235" height="140" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5" filter="url(#sh)"/>
<text x="130" y="75" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Энергетическая диаграмма</text>
<!-- Axes -->
<line x1="40" y1="85" x2="40" y2="185" stroke="#666" stroke-width="1"/>
<line x1="40" y1="185" x2="225" y2="185" stroke="#666" stroke-width="1"/>
<text x="35" y="88" font-family="Arial,sans-serif" font-size="6" fill="#666">H</text>
<text x="225" y="193" font-family="Arial,sans-serif" font-size="6" fill="#666">ход р-ции</text>
<!-- Exothermic -->
<line x1="55" y1="110" x2="55" y2="175" stroke="#F44336" stroke-width="2"/>
<text x="55" y="105" font-family="Arial,sans-serif" font-size="6" fill="#F44336" text-anchor="middle">Реагенты</text>
<line x1="150" y1="140" x2="150" y2="175" stroke="#4CAF50" stroke-width="2"/>
<text x="150" y="137" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50" text-anchor="middle">Продукты</text>
<line x1="55" y1="110" x2="150" y2="140" stroke="#F44336" stroke-width="1.5" stroke-dasharray="3,2"/>
<!-- dH arrow -->
<line x1="80" y1="110" x2="80" y2="140" stroke="#F44336" stroke-width="1"/>
<text x="95" y="128" font-family="Arial,sans-serif" font-size="6" fill="#F44336">dH &lt; 0</text>
<text x="130" y="195" font-family="Arial,sans-serif" font-size="7" fill="#F44336" text-anchor="middle">Экзо: dH &lt; 0, Q &gt; 0</text>

<!-- Hess's Law -->
<rect x="258" y="58" width="230" height="70" rx="8" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="75" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Закон Гесса</text>
<text x="268" y="90" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Тепловой эффект зависит только от</text>
<text x="268" y="102" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">начального и конечного состояний,</text>
<text x="268" y="114" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">а не от пути реакции!</text>

<!-- Thermochemical equation -->
<rect x="258" y="138" width="230" height="60" rx="8" fill="white" stroke="#FF9800" stroke-width="1.5" filter="url(#sh)"/>
<text x="373" y="155" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Термохимическое уравнение</text>
<text x="268" y="170" font-family="Arial,sans-serif" font-size="7" fill="#333">2H2 + O2 = 2H2O + 572 кДж</text>
<text x="268" y="183" font-family="Arial,sans-serif" font-size="7" fill="#FF9800">Экзо: +Q справа, Эндо: -Q справа</text>

<!-- Key formulas -->
<rect x="12" y="210" width="476" height="100" rx="8" fill="white" stroke="#1B5E20" stroke-width="1.5" filter="url(#sh)"/>
<text x="250" y="228" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ключевые формулы</text>
<line x1="22" y1="234" x2="478" y2="234" stroke="#1B5E20" stroke-width="0.5"/>
<text x="250" y="250" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">dH = Сумма[dHf(продукты)] - Сумма[dHf(реагенты)]</text>
<text x="250" y="266" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">dHf(простого вещества) = 0</text>
<text x="250" y="282" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Q = -dH (тепловой эффект по абсолютной величине)</text>
<text x="250" y="298" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Экзо: dH &lt; 0 | Эндо: dH &gt; 0 | Q = -dH</text>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Химия 11 класс</text>
</svg>