<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Правила дифференцирования</text>
  <!-- Card: Sum rule -->
  <rect x="15" y="52" width="150" height="70" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="90" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Сумма</text>
  <text x="90" y="88" text-anchor="middle" fill="#1565C0" font-size="12">(u + v)' = u' + v'</text>
  <text x="90" y="108" text-anchor="middle" fill="#42A5F5" font-size="9">производная суммы</text>
  <!-- Card: Product rule -->
  <rect x="175" y="52" width="150" height="70" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Произведение</text>
  <text x="250" y="88" text-anchor="middle" fill="#1565C0" font-size="11">(uv)' = u'v + uv'</text>
  <text x="250" y="108" text-anchor="middle" fill="#42A5F5" font-size="9">правило Лейбница</text>
  <!-- Card: Quotient rule -->
  <rect x="335" y="52" width="150" height="70" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="410" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Частное</text>
  <text x="410" y="86" text-anchor="middle" fill="#1565C0" font-size="10">(u/v)' =</text>
  <text x="410" y="100" text-anchor="middle" fill="#1565C0" font-size="10">(u'v - uv') / v²</text>
  <text x="410" y="115" text-anchor="middle" fill="#42A5F5" font-size="9">при v ≠ 0</text>
  <!-- Card: Power rule -->
  <rect x="15" y="132" width="150" height="60" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="90" y="152" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Степень</text>
  <text x="90" y="170" text-anchor="middle" fill="#1565C0" font-size="12">(xⁿ)' = n·xⁿ⁻¹</text>
  <text x="90" y="185" text-anchor="middle" fill="#42A5F5" font-size="9">для любого n ∈ R</text>
  <!-- Card: Constant multiplier -->
  <rect x="175" y="132" width="150" height="60" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5" filter="url(#shadow1)"/>
  <text x="250" y="152" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Пост. множитель</text>
  <text x="250" y="170" text-anchor="middle" fill="#1565C0" font-size="12">(cf)' = c·f'</text>
  <text x="250" y="185" text-anchor="middle" fill="#42A5F5" font-size="9">выносится за знак</text>
  <!-- Example computation card -->
  <rect x="335" y="132" width="150" height="60" rx="10" fill="#E3F2FD" stroke="#1976D2" stroke-width="2" filter="url(#shadow1)"/>
  <text x="410" y="148" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Пример</text>
  <text x="410" y="163" text-anchor="middle" fill="#1565C0" font-size="10">(x²·sin x)' =</text>
  <text x="410" y="178" text-anchor="middle" fill="#1565C0" font-size="10">2x·sin x + x²·cos x</text>
  <!-- Warning pill -->
  <rect x="30" y="204" width="210" height="24" rx="12" fill="#E65100"/>
  <text x="135" y="220" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Внимание: (uv)' ≠ u'·v' !</text>
  <!-- Formula pills -->
  <rect x="260" y="204" width="200" height="24" rx="12" fill="#1976D2"/>
  <text x="360" y="220" text-anchor="middle" fill="white" font-size="10" font-weight="bold">C' = 0, (√x)' = 1/(2√x)</text>
  <!-- Mini computation flow -->
  <rect x="20" y="240" width="460" height="80" rx="10" fill="white" stroke="#1565C0" stroke-width="1" filter="url(#shadow1)"/>
  <text x="250" y="258" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Вычисление производной пошагово</text>
  <text x="250" y="275" text-anchor="middle" fill="#1565C0" font-size="10">f(x) = 3x⁴ + 2x² − 5</text>
  <text x="250" y="290" text-anchor="middle" fill="#1565C0" font-size="10">f'(x) = 3·4x³ + 2·2x − 0</text>
  <text x="250" y="308" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">f'(x) = 12x³ + 4x</text>
  <!-- Bottom bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Правила позволяют находить производные без пределов</text>
</svg>