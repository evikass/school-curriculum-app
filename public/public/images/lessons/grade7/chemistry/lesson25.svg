<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#e11d48" rx="3"/>
<text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Расчёты по химическим уравнениям</text>

<!-- Algorithm steps -->
<rect x="20" y="55" width="760" height="55" rx="12" fill="#fff" stroke="#e11d48" stroke-width="1.5" filter="url(#shadow)"/>
<text x="115" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#e11d48">1. Уравнение</text>
<text x="265" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#3b82f6">2. Мольные отношения</text>
<text x="435" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">3. Молярные массы</text>
<text x="625" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#8b5cf6">4. Пропорция</text>
<text x="190" y="100" text-anchor="middle" font-size="14" fill="#e11d48">→</text>
<text x="360" y="100" text-anchor="middle" font-size="14" fill="#3b82f6">→</text>
<text x="540" y="100" text-anchor="middle" font-size="14" fill="#10b981">→</text>

<!-- Worked example -->
<rect x="20" y="120" width="760" height="240" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
<rect x="20" y="120" width="760" height="6" rx="3" fill="#3b82f6"/>
<text x="400" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#3b82f6">Задача: Сколько O₂ нужно для сжигания 8 г Mg?</text>

<!-- Step 1: Equation -->
<rect x="40" y="162" width="35" height="22" rx="6" fill="#e11d48"/>
<text x="57" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
<text x="85" y="179" font-size="14" font-weight="600" fill="#1e3a5f">Уравнение:  2Mg + O<tspan font-size="11" baseline-shift="sub">2</tspan> = 2MgO</text>

<!-- Step 2: Mol ratios -->
<rect x="40" y="192" width="35" height="22" rx="6" fill="#3b82f6"/>
<text x="57" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
<text x="85" y="209" font-size="14" font-weight="600" fill="#3b82f6">Мольные отношения:</text>
<text x="260" y="209" font-size="14" fill="#475569">2 моль Mg — 1 моль O₂ — 2 моль MgO</text>

<!-- Step 3: Molar masses -->
<rect x="40" y="222" width="35" height="22" rx="6" fill="#10b981"/>
<text x="57" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
<text x="85" y="239" font-size="14" font-weight="600" fill="#10b981">Молярные массы:</text>
<text x="240" y="239" font-size="14" fill="#475569">M(Mg) = 24 г/моль, M(O₂) = 32 г/моль</text>

<!-- Step 4: Proportion -->
<rect x="40" y="252" width="35" height="22" rx="6" fill="#8b5cf6"/>
<text x="57" y="268" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4</text>
<text x="85" y="269" font-size="14" font-weight="600" fill="#8b5cf6">Расчёт:</text>

<text x="100" y="295" font-size="13" fill="#475569">n(Mg) = m/M = 8/24 = 0,333 моль</text>
<text x="100" y="318" font-size="13" fill="#475569">По уравнению: 2 моль Mg — 1 моль O₂</text>
<text x="100" y="340" font-size="13" fill="#475569">Значит: n(O₂) = n(Mg)/2 = 0,333/2 = 0,167 моль</text>
<text x="100" y="362" font-size="15" font-weight="700" fill="#e11d48">m(O₂) = n × M = 0,167 × 32 = 5,33 г</text>

<!-- Proportion visual -->
<rect x="480" y="255" width="280" height="95" rx="12" fill="#fdf2f8" stroke="#e11d48" stroke-width="1.5"/>
<text x="620" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#e11d48">Пропорция</text>
<text x="560" y="300" font-size="13" fill="#475569">2 моль Mg  —  1 моль O₂</text>
<text x="560" y="320" font-size="13" fill="#475569">0,333 моль  —  x моль</text>
<line x1="510" y1="328" x2="740" y2="328" stroke="#e11d48" stroke-width="1"/>
<text x="560" y="346" font-size="13" font-weight="600" fill="#e11d48">x = 0,333 × 1 / 2 = 0,167</text>

<!-- Answer -->
<rect x="20" y="375" width="760" height="42" rx="10" fill="#dcfce7" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
<text x="400" y="402" text-anchor="middle" font-size="16" font-weight="700" fill="#166534">Ответ: для сжигания 8 г Mg потребуется 5,33 г O₂</text>

<!-- Key formula -->
<rect x="20" y="428" width="760" height="38" rx="10" fill="#fff" stroke="#e11d48" stroke-width="1" filter="url(#shadow)"/>
<text x="400" y="452" text-anchor="middle" font-size="13" font-weight="600" fill="#e11d48">Формулы: n = m/M  →  m = n×M  |  Коэффициенты в уравнении = отношения моль</text>

<!-- Footer -->
<rect x="200" y="472" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="492" text-anchor="middle" font-size="12" fill="#94a3b8">Расчёты основаны на законе сохранения массы и мольных отношениях</text>
</svg>
