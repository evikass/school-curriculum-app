<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .card-title { font-size: 13px; font-weight: 600; fill: #1e293b; }
    .card-text { font-size: 11px; fill: #475569; }
    .formula { font-size: 15px; fill: #334155; font-weight: 600; }
    .label { font-size: 12px; fill: #475569; }
    .small { font-size: 10px; fill: #94a3b8; }
    .accent-text { font-size: 12px; font-weight: 600; }
  </style>
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#f8fafc" filter="url(#shadow)"/>
  <!-- Accent bar -->
  <rect width="800" height="6" rx="3" fill="#7c3aed"/>
  <!-- Title -->
  <text x="40" y="42" class="title">Факторы скорости химических реакций</text>
  <rect x="40" y="50" width="60" height="3" rx="1.5" fill="#7c3aed" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="40" y="72" class="subtitle">Что влияет на скорость протекания реакций?</text>

  <!-- 5 Factor Cards -->
  <!-- Card 1: Природа веществ -->
  <g transform="translate(28, 95)">
    <rect width="140" height="350" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="140" height="4" rx="2" fill="#7c3aed" opacity="0.7"/>
    <circle cx="70" cy="60" r="28" fill="#7c3aed" opacity="0.1"/>
    <text x="70" y="55" text-anchor="middle" font-size="28" fill="#7c3aed">⚛</text>
    <text x="70" y="100" text-anchor="middle" class="card-title">Природа</text>
    <text x="70" y="116" text-anchor="middle" class="card-title">веществ</text>
    <line x1="30" y1="130" x2="110" y2="130" stroke="#e2e8f0" stroke-width="1"/>
    <text x="70" y="152" text-anchor="middle" class="card-text">Химический состав</text>
    <text x="70" y="168" text-anchor="middle" class="card-text">и строение веществ</text>
    <text x="70" y="190" text-anchor="middle" class="card-text">определяют их</text>
    <text x="70" y="206" text-anchor="middle" class="card-text">реакционную</text>
    <text x="70" y="222" text-anchor="middle" class="card-text">способность</text>
    <rect x="15" y="245" width="110" height="40" rx="6" fill="#7c3aed" opacity="0.07"/>
    <text x="70" y="262" text-anchor="middle" class="small">Na + H<tspan baseline-shift="sub" font-size="75%">2</tspan>O → быстро</text>
    <text x="70" y="278" text-anchor="middle" class="small">Fe + H<tspan baseline-shift="sub" font-size="75%">2</tspan>O → медленно</text>
    <!-- Speed indicator -->
    <rect x="20" y="310" width="100" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="20" y="310" width="70" height="6" rx="3" fill="#7c3aed" opacity="0.6"/>
    <text x="70" y="332" text-anchor="middle" class="small">Разная скорость</text>
  </g>

  <!-- Card 2: Концентрация -->
  <g transform="translate(180, 95)">
    <rect width="140" height="350" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="140" height="4" rx="2" fill="#7c3aed" opacity="0.7"/>
    <circle cx="70" cy="60" r="28" fill="#7c3aed" opacity="0.1"/>
    <text x="70" y="58" text-anchor="middle" font-size="26" fill="#7c3aed">⬆</text>
    <text x="70" y="100" text-anchor="middle" class="card-title">Концентрация</text>
    <line x1="30" y1="115" x2="110" y2="115" stroke="#e2e8f0" stroke-width="1"/>
    <text x="70" y="137" text-anchor="middle" class="card-text">Больше частиц →</text>
    <text x="70" y="153" text-anchor="middle" class="card-text">чаще столкновения</text>
    <text x="70" y="175" text-anchor="middle" class="card-text">→ выше скорость</text>
    <!-- Concentration visual: two boxes with dots -->
    <rect x="15" y="195" width="50" height="50" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
    <circle cx="30" cy="215" r="4" fill="#7c3aed" opacity="0.5"/>
    <circle cx="48" cy="225" r="4" fill="#7c3aed" opacity="0.5"/>
    <text x="40" y="260" text-anchor="middle" class="small">Мало</text>
    <rect x="75" y="195" width="50" height="50" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
    <circle cx="88" cy="210" r="4" fill="#7c3aed" opacity="0.5"/>
    <circle cx="105" cy="220" r="4" fill="#7c3aed" opacity="0.5"/>
    <circle cx="92" cy="235" r="4" fill="#7c3aed" opacity="0.5"/>
    <circle cx="110" cy="210" r="4" fill="#7c3aed" opacity="0.5"/>
    <circle cx="100" cy="230" r="4" fill="#7c3aed" opacity="0.5"/>
    <text x="100" y="260" text-anchor="middle" class="small">Много</text>
    <!-- Arrow between -->
    <text x="65" y="225" font-size="16" fill="#7c3aed">→</text>
    <rect x="20" y="310" width="100" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="20" y="310" width="85" height="6" rx="3" fill="#7c3aed" opacity="0.6"/>
    <text x="70" y="332" text-anchor="middle" class="small">↑ Концентрация = ↑ Скорость</text>
  </g>

  <!-- Card 3: Температура -->
  <g transform="translate(332, 95)">
    <rect width="140" height="350" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="140" height="4" rx="2" fill="#7c3aed" opacity="0.7"/>
    <circle cx="70" cy="60" r="28" fill="#7c3aed" opacity="0.1"/>
    <text x="70" y="58" text-anchor="middle" font-size="26" fill="#ef4444">🌡</text>
    <text x="70" y="100" text-anchor="middle" class="card-title">Температура</text>
    <line x1="30" y1="115" x2="110" y2="115" stroke="#e2e8f0" stroke-width="1"/>
    <text x="70" y="137" text-anchor="middle" class="card-text">При нагревании</text>
    <text x="70" y="153" text-anchor="middle" class="card-text">частицы движутся</text>
    <text x="70" y="169" text-anchor="middle" class="card-text">быстрее</text>
    <!-- Thermometer visual -->
    <rect x="55" y="185" width="12" height="70" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
    <rect x="57" y="210" width="8" height="43" rx="4" fill="#ef4444" opacity="0.7"/>
    <circle cx="61" cy="255" r="10" fill="#ef4444" opacity="0.7"/>
    <text x="40" y="210" text-anchor="end" class="small">100°</text>
    <text x="40" y="250" text-anchor="end" class="small">0°</text>
    <rect x="15" y="280" width="110" height="30" rx="6" fill="#7c3aed" opacity="0.07"/>
    <text x="70" y="297" text-anchor="middle" class="small">Правило Вант-Гоффа:</text>
    <text x="70" y="310" text-anchor="middle" class="small">↑10°C → скорость ×2–4</text>
    <rect x="20" y="330" width="100" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="20" y="330" width="90" height="6" rx="3" fill="#7c3aed" opacity="0.6"/>
    <text x="70" y="348" text-anchor="middle" class="small">Сильный фактор</text>
  </g>

  <!-- Card 4: Площадь поверхности -->
  <g transform="translate(484, 95)">
    <rect width="140" height="350" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="140" height="4" rx="2" fill="#7c3aed" opacity="0.7"/>
    <circle cx="70" cy="60" r="28" fill="#7c3aed" opacity="0.1"/>
    <text x="70" y="58" text-anchor="middle" font-size="24" fill="#7c3aed">◇</text>
    <text x="70" y="100" text-anchor="middle" class="card-title">Площадь</text>
    <text x="70" y="116" text-anchor="middle" class="card-title">поверхности</text>
    <line x1="30" y1="130" x2="110" y2="130" stroke="#e2e8f0" stroke-width="1"/>
    <text x="70" y="152" text-anchor="middle" class="card-text">Измельчение</text>
    <text x="70" y="168" text-anchor="middle" class="card-text">увеличивает</text>
    <text x="70" y="184" text-anchor="middle" class="card-text">контакт веществ</text>
    <!-- Whole vs crushed visual -->
    <rect x="15" y="200" width="50" height="50" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
    <rect x="28" y="210" width="24" height="30" rx="3" fill="#7c3aed" opacity="0.3"/>
    <text x="40" y="268" text-anchor="middle" class="small">Целый</text>
    <rect x="75" y="200" width="50" height="50" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
    <rect x="80" y="208" width="10" height="10" rx="1" fill="#7c3aed" opacity="0.4"/>
    <rect x="95" y="208" width="10" height="10" rx="1" fill="#7c3aed" opacity="0.4"/>
    <rect x="110" y="208" width="10" height="10" rx="1" fill="#7c3aed" opacity="0.4"/>
    <rect x="80" y="222" width="10" height="10" rx="1" fill="#7c3aed" opacity="0.4"/>
    <rect x="95" y="222" width="10" height="10" rx="1" fill="#7c3aed" opacity="0.4"/>
    <rect x="110" y="222" width="10" height="10" rx="1" fill="#7c3aed" opacity="0.4"/>
    <rect x="80" y="236" width="10" height="10" rx="1" fill="#7c3aed" opacity="0.4"/>
    <rect x="95" y="236" width="10" height="10" rx="1" fill="#7c3aed" opacity="0.4"/>
    <rect x="110" y="236" width="10" height="10" rx="1" fill="#7c3aed" opacity="0.4"/>
    <text x="100" y="268" text-anchor="middle" class="small">Дроблёный</text>
    <text x="65" y="228" font-size="16" fill="#7c3aed">→</text>
    <rect x="15" y="280" width="110" height="30" rx="6" fill="#7c3aed" opacity="0.07"/>
    <text x="70" y="297" text-anchor="middle" class="small">Порошок реагирует</text>
    <text x="70" y="310" text-anchor="middle" class="small">быстрее куска</text>
    <rect x="20" y="330" width="100" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="20" y="330" width="75" height="6" rx="3" fill="#7c3aed" opacity="0.6"/>
    <text x="70" y="348" text-anchor="middle" class="small">Значимый фактор</text>
  </g>

  <!-- Card 5: Давление -->
  <g transform="translate(636, 95)">
    <rect width="140" height="350" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="140" height="4" rx="2" fill="#7c3aed" opacity="0.7"/>
    <circle cx="70" cy="60" r="28" fill="#7c3aed" opacity="0.1"/>
    <text x="70" y="58" text-anchor="middle" font-size="24" fill="#7c3aed">⏏</text>
    <text x="70" y="100" text-anchor="middle" class="card-title">Давление</text>
    <line x1="30" y1="115" x2="110" y2="115" stroke="#e2e8f0" stroke-width="1"/>
    <text x="70" y="137" text-anchor="middle" class="card-text">Для газов:</text>
    <text x="70" y="153" text-anchor="middle" class="card-text">сжатие газа =</text>
    <text x="70" y="169" text-anchor="middle" class="card-text">рост концентрации</text>
    <!-- Piston visual -->
    <rect x="25" y="190" width="90" height="60" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
    <!-- Gas particles low pressure -->
    <circle cx="45" cy="210" r="3" fill="#7c3aed" opacity="0.4"/>
    <circle cx="75" cy="225" r="3" fill="#7c3aed" opacity="0.4"/>
    <circle cx="95" cy="215" r="3" fill="#7c3aed" opacity="0.4"/>
    <rect x="25" y="260" width="50" height="50" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
    <circle cx="40" cy="278" r="3" fill="#7c3aed" opacity="0.4"/>
    <circle cx="58" cy="292" r="3" fill="#7c3aed" opacity="0.4"/>
    <text x="50" y="324" text-anchor="middle" class="small">P ↓</text>
    <rect x="85" y="260" width="30" height="50" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
    <circle cx="95" cy="278" r="3" fill="#7c3aed" opacity="0.6"/>
    <circle cx="108" cy="290" r="3" fill="#7c3aed" opacity="0.6"/>
    <circle cx="100" cy="300" r="3" fill="#7c3aed" opacity="0.6"/>
    <text x="100" y="324" text-anchor="middle" class="small">P ↑</text>
    <text x="68" y="285" font-size="14" fill="#7c3aed">→</text>
    <rect x="20" y="335" width="100" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="20" y="335" width="60" height="6" rx="3" fill="#7c3aed" opacity="0.6"/>
    <text x="70" y="350" text-anchor="middle" class="small">Только для газов</text>
  </g>

  <!-- Bottom summary -->
  <text x="400" y="480" text-anchor="middle" class="small">Все факторы влияют на частоту столкновений частиц реагентов</text>
</svg>
