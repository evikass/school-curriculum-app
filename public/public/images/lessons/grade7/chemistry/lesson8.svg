<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="flask1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="liquid1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>
  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Скорость химических реакций</text>

  <!-- Speed formula -->
  <g transform="translate(250, 70)">
    <rect x="0" y="0" width="300" height="60" rx="8" fill="#0f172a" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="150" y="25" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">v = DC / Dt</text>
    <text x="150" y="48" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Изменение концентрации за время</text>
  </g>

  <!-- Four factors -->
  <!-- Factor 1: Temperature -->
  <g transform="translate(20, 160)">
    <rect x="0" y="0" width="180" height="160" rx="8" fill="#0f172a" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ef4444" text-anchor="middle">Температура</text>

    <!-- Thermometer -->
    <g transform="translate(60, 40)">
      <rect x="10" y="0" width="12" height="60" rx="6" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="16" cy="65" r="12" fill="#ef4444" opacity="0.4" stroke="#ef4444" stroke-width="1.5"/>
      <rect x="12" y="20" width="8" height="40" rx="4" fill="#ef4444" opacity="0.6"/>
      <!-- Arrow up -->
      <path d="M16,-5 L12,0 L20,0 Z" fill="#ef4444"/>
    </g>
    <text x="90" y="130" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">+10C = скорость</text>
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">x 2-3 раза</text>
  </g>

  <!-- Factor 2: Concentration -->
  <g transform="translate(210, 160)">
    <rect x="0" y="0" width="180" height="160" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#60a5fa" text-anchor="middle">Концентрация</text>

    <!-- Beakers with different concentrations -->
    <g transform="translate(20, 40)">
      <!-- Dilute -->
      <rect x="0" y="0" width="35" height="50" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <rect x="2" y="25" width="31" height="23" rx="2" fill="#3b82f6" opacity="0.2"/>
      <circle cx="12" cy="35" r="4" fill="#3b82f6" opacity="0.3"/>
      <circle cx="25" cy="30" r="4" fill="#3b82f6" opacity="0.3"/>
      <text x="17" y="65" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Слабая</text>

      <!-- Concentrated -->
      <rect x="50" y="0" width="35" height="50" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <rect x="52" y="10" width="31" height="38" rx="2" fill="#3b82f6" opacity="0.4"/>
      <circle cx="62" cy="20" r="4" fill="#3b82f6" opacity="0.6"/>
      <circle cx="75" cy="25" r="4" fill="#3b82f6" opacity="0.6"/>
      <circle cx="67" cy="35" r="4" fill="#3b82f6" opacity="0.6"/>
      <circle cx="78" cy="15" r="4" fill="#3b82f6" opacity="0.6"/>
      <circle cx="58" cy="30" r="4" fill="#3b82f6" opacity="0.6"/>
      <text x="67" y="65" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Сильная</text>

      <!-- Arrow between -->
      <path d="M40,25 L45,25" stroke="#14b8a6" stroke-width="2" marker-end="url(#arrowHead1)"/>
    </g>
    <text x="90" y="130" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Больше частиц =</text>
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">чаще столкновения</text>
  </g>

  <!-- Factor 3: Surface area -->
  <g transform="translate(400, 160)">
    <rect x="0" y="0" width="180" height="160" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6" text-anchor="middle">Площадь поверхности</text>

    <!-- Whole vs powder -->
    <g transform="translate(15, 40)">
      <rect x="0" y="5" width="30" height="30" rx="3" fill="#10b981" opacity="0.4" stroke="#10b981" stroke-width="1.5"/>
      <text x="15" y="50" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Цельный</text>

      <!-- Powder -->
      <rect x="50" y="0" width="40" height="40" rx="3" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="3,3"/>
      <circle cx="60" cy="10" r="4" fill="#10b981" opacity="0.5"/>
      <circle cx="75" cy="15" r="4" fill="#10b981" opacity="0.5"/>
      <circle cx="65" cy="25" r="4" fill="#10b981" opacity="0.5"/>
      <circle cx="80" cy="28" r="4" fill="#10b981" opacity="0.5"/>
      <circle cx="55" cy="35" r="4" fill="#10b981" opacity="0.5"/>
      <circle cx="70" cy="35" r="4" fill="#10b981" opacity="0.5"/>
      <circle cx="85" cy="38" r="4" fill="#10b981" opacity="0.5"/>
      <text x="70" y="55" font-family="Arial, sans-serif" font-size="8" fill="#94a3b8" text-anchor="middle">Порошок</text>
    </g>
    <text x="90" y="130" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Дробление</text>
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">увеличивает скорость</text>
  </g>

  <!-- Factor 4: Catalyst -->
  <g transform="translate(590, 160)">
    <rect x="0" y="0" width="180" height="160" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c084fc" text-anchor="middle">Катализатор</text>

    <!-- Energy diagram -->
    <g transform="translate(20, 40)">
      <!-- Without catalyst -->
      <path d="M0,60 L20,10 L60,10 L80,70" fill="none" stroke="#ef4444" stroke-width="2"/>
      <text x="40" y="5" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">Без кат.</text>
      <!-- With catalyst -->
      <path d="M100,60 L115,30 L145,30 L160,70" fill="none" stroke="#a855f7" stroke-width="2"/>
      <text x="130" y="25" font-family="Arial, sans-serif" font-size="8" fill="#a855f7" text-anchor="middle">С кат.</text>
      <!-- Energy barrier arrows -->
      <line x1="20" y1="60" x2="20" y2="10" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
      <line x1="115" y1="60" x2="115" y2="30" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    </g>
    <text x="90" y="130" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Снижает энергию</text>
    <text x="90" y="145" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">активации</text>
  </g>

  <!-- Van't Hoff rule -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="700" height="100" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <text x="350" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle">Правило Вант-Гоффа</text>
    <text x="350" y="50" font-family="Arial, sans-serif" font-size="16" fill="#e2e8f0" text-anchor="middle">При повышении температуры на 10C скорость увеличивается в 2-3 раза</text>
    <text x="350" y="75" font-family="Arial, sans-serif" font-size="14" fill="#14b8a6" text-anchor="middle">v2/v1 = g^((t2-t1)/10)</text>
    <text x="350" y="95" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">g — температурный коэффициент (2-3)</text>
  </g>
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>