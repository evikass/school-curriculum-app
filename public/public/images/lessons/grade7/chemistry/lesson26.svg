<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#7c3aed" rx="3"/>
<text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Скорость химических реакций</text>

<!-- Definition -->
<rect x="150" y="55" width="500" height="45" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
<text x="400" y="84" text-anchor="middle" font-size="22" font-weight="700" fill="#7c3aed">v = Δc / Δt</text>

<!-- Speed gauge -->
<rect x="30" y="110" width="350" height="130" rx="14" fill="#fff" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="110" width="350" height="6" rx="3" fill="#7c3aed"/>
<text x="205" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#7c3aed">Быстрота реакций</text>

<!-- Speed bar - slow to fast -->
<rect x="60" y="155" width="280" height="20" rx="10" fill="#e2e8f0"/>
<rect x="60" y="155" width="56" height="20" rx="10" fill="#10b981"/>
<rect x="116" y="155" width="112" height="20" fill="#f59e0b"/>
<rect x="228" y="155" width="112" height="20" rx="10" fill="#ef4444"/>
<text x="88" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Медленно</text>
<text x="340" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Быстро</text>

<!-- Examples -->
<text x="60" y="200" font-size="13" fill="#10b981">🐢 Ржавление — годы</text>
<text x="60" y="218" font-size="13" fill="#f59e0b">🔥 Горение — секунды</text>
<text x="60" y="236" font-size="13" fill="#ef4444">💥 Взрыв — мгновенно</text>

<!-- Collision theory -->
<rect x="400" y="110" width="380" height="130" rx="14" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="400" y="110" width="380" height="6" rx="3" fill="#3b82f6"/>
<text x="590" y="138" text-anchor="middle" font-size="15" font-weight="700" fill="#3b82f6">Теория столкновений</text>

<!-- Particles colliding -->
<circle cx="480" cy="175" r="12" fill="#3b82f6" opacity="0.7"/>
<circle cx="530" cy="175" r="12" fill="#10b981" opacity="0.7"/>
<!-- Arrow showing collision -->
<path d="M495,175 L515,175" fill="none" stroke="#ef4444" stroke-width="2" marker-end="none"/>
<text x="505" y="205" text-anchor="middle" font-size="11" fill="#475569">Частицы сталкиваются</text>

<circle cx="640" cy="175" r="12" fill="#3b82f6" opacity="0.7"/>
<circle cx="690" cy="175" r="12" fill="#10b981" opacity="0.7"/>
<path d="M654,168 L676,168" fill="none" stroke="#ef4444" stroke-width="3"/>
<!-- Bounce off -->
<path d="M654,182 L640,195" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>
<path d="M676,182 L690,195" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="665" y="205" text-anchor="middle" font-size="11" fill="#ef4444">Без энергии — нет реакции</text>

<!-- Activation energy diagram -->
<rect x="30" y="250" width="740" height="175" rx="14" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="30" y="250" width="740" height="6" rx="3" fill="#f59e0b"/>
<text x="400" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#f59e0b">Энергетическая диаграмма</text>

<!-- Energy hill -->
<polyline points="80,390 180,390 250,300 340,340 430,380 530,390 700,390" fill="none" stroke="#3b82f6" stroke-width="3"/>
<!-- Reactant level -->
<line x1="80" y1="390" x2="180" y2="390" stroke="#3b82f6" stroke-width="3"/>
<!-- Product level -->
<line x1="530" y1="390" x2="700" y2="390" stroke="#10b981" stroke-width="3"/>

<!-- Labels -->
<text x="130" y="408" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">Реагенты</text>
<text x="615" y="408" text-anchor="middle" font-size="12" font-weight="600" fill="#10b981">Продукты</text>

<!-- Activation energy arrow -->
<line x1="180" y1="385" x2="180" y2="305" stroke="#ef4444" stroke-width="2"/>
<polygon points="175,305 185,305 180,295" fill="#ef4444"/>
<text x="165" y="350" text-anchor="end" font-size="12" font-weight="600" fill="#ef4444">E<tspan font-size="9" baseline-shift="sub">a</tspan></text>

<!-- Energy released -->
<line x1="700" y1="385" x2="700" y2="390" stroke="#10b981" stroke-width="2"/>
<text x="400" y="320" text-anchor="middle" font-size="11" fill="#64748b">Энергетический барьер</text>
<text x="400" y="336" text-anchor="middle" font-size="11" fill="#64748b">(энергия активации)</text>

<!-- Factors -->
<rect x="30" y="435" width="740" height="30" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1" filter="url(#shadow)"/>
<text x="400" y="455" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">Факторы: температура ↑ | концентрация ↑ | поверхность ↑ | катализатор → скорость ↑</text>

<!-- Footer -->
<rect x="200" y="472" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="492" text-anchor="middle" font-size="12" fill="#94a3b8">Скорость реакции зависит от частоты и энергии столкновений частиц</text>
</svg>
