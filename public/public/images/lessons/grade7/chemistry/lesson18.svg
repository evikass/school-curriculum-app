<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
<defs>
  <style>
    text { font-family: 'Segoe UI', Arial, Helvetica, sans-serif; }
  </style>
  <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
    <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
  </filter>
</defs>
<rect width="800" height="500" rx="12" fill="#f8fafc"/>
<rect width="800" height="6" fill="#f59e0b" rx="3"/>
<text x="400" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1e3a5f">Валентность химических элементов</text>

<!-- Definition -->
<rect x="30" y="55" width="740" height="40" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="81" text-anchor="middle" font-size="14" font-weight="600" fill="#92400e">Валентность — способность атома образовывать определённое число химических связей</text>

<!-- Hands metaphor -->
<rect x="30" y="105" width="200" height="95" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="130" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#3b82f6">H — I (1 рука)</text>
<!-- Hand icon with 1 finger -->
<circle cx="130" cy="168" r="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
<text x="130" y="174" text-anchor="middle" font-size="22" font-weight="700" fill="#3b82f6">☝</text>

<rect x="250" y="105" width="200" height="95" rx="12" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<text x="350" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#10b981">O — II (2 руки)</text>
<circle cx="350" cy="168" r="18" fill="#f0fdf4" stroke="#10b981" stroke-width="2"/>
<text x="350" y="174" text-anchor="middle" font-size="22" font-weight="700" fill="#10b981">✌</text>

<rect x="470" y="105" width="200" height="95" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
<text x="570" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#8b5cf6">N — III (3 руки)</text>
<circle cx="570" cy="168" r="18" fill="#faf5ff" stroke="#8b5cf6" stroke-width="2"/>
<text x="570" y="174" text-anchor="middle" font-size="22" font-weight="700" fill="#8b5cf6">🤟</text>

<!-- Table of valences -->
<rect x="30" y="215" width="740" height="190" rx="14" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="242" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">Таблица валентностей</text>

<!-- Constant valence header -->
<rect x="50" y="255" width="340" height="24" rx="6" fill="#dcfce7"/>
<text x="220" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Постоянная валентность</text>

<text x="70" y="298" font-size="14" fill="#334155">H — <tspan font-weight="700" fill="#3b82f6">I</tspan></text>
<text x="170" y="298" font-size="14" fill="#334155">O — <tspan font-weight="700" fill="#3b82f6">II</tspan></text>
<text x="270" y="298" font-size="14" fill="#334155">Na — <tspan font-weight="700" fill="#3b82f6">I</tspan></text>
<text x="370" y="298" font-size="14" fill="#334155">Ca — <tspan font-weight="700" fill="#3b82f6">II</tspan></text>

<text x="70" y="320" font-size="14" fill="#334155">Al — <tspan font-weight="700" fill="#3b82f6">III</tspan></text>

<!-- Variable valence header -->
<rect x="420" y="255" width="330" height="24" rx="6" fill="#fef3c7"/>
<text x="585" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Переменная валентность</text>

<text x="440" y="298" font-size="14" fill="#334155">C — <tspan font-weight="700" fill="#f59e0b">IV</tspan></text>
<text x="540" y="298" font-size="14" fill="#334155">N — <tspan font-weight="700" fill="#f59e0b">III, V</tspan></text>
<text x="660" y="298" font-size="14" fill="#334155">S — <tspan font-weight="700" fill="#f59e0b">II, IV, VI</tspan></text>

<text x="440" y="320" font-size="14" fill="#334155">Fe — <tspan font-weight="700" fill="#f59e0b">II, III</tspan></text>
<text x="570" y="320" font-size="14" fill="#334155">Cu — <tspan font-weight="700" fill="#f59e0b">I, II</tspan></text>
<text x="690" y="320" font-size="14" fill="#334155">P — <tspan font-weight="700" fill="#f59e0b">III, V</tspan></text>

<!-- Color legend -->
<rect x="50" y="345" width="700" height="3" rx="1" fill="#e2e8f0"/>
<rect x="180" y="358" width="14" height="14" rx="4" fill="#dcfce7" stroke="#10b981" stroke-width="1"/>
<text x="200" y="370" font-size="12" fill="#64748b">Постоянная валентность — не меняется</text>
<rect x="430" y="358" width="14" height="14" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
<text x="450" y="370" font-size="12" fill="#64748b">Переменная валентность — зависит от соединения</text>

<!-- Roman numerals note -->
<rect x="30" y="395" width="740" height="50" rx="12" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="418" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Валентность обозначают римскими цифрами: I, II, III, IV, V, VI, VII</text>
<text x="400" y="436" text-anchor="middle" font-size="12" fill="#64748b">Валентность не может быть равна нулю</text>

<!-- Footer -->
<rect x="200" y="460" width="400" height="3" rx="1.5" fill="#e2e8f0"/>
<text x="400" y="483" text-anchor="middle" font-size="12" fill="#94a3b8">Валентность — свойство атома, определяющее число связей</text>
</svg>
