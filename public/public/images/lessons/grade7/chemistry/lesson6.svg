<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="flask1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="liquid1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowHead1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg1)" rx="12"/>
  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#e2e8f0" text-anchor="middle">Типы химических реакций</text>

  <!-- Four reaction types in quadrants -->
  <!-- Connection reaction -->
  <g transform="translate(20, 70)">
    <rect x="0" y="0" width="370" height="180" rx="8" fill="#0f172a" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <text x="185" y="25" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#14b8a6" text-anchor="middle">Реакция соединения</text>

    <g transform="translate(30, 50)">
      <circle cx="30" cy="30" r="25" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="2"/>
      <text x="30" y="35" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">A</text>
      <text x="75" y="35" font-family="Arial, sans-serif" font-size="20" fill="#14b8a6" text-anchor="middle">+</text>
      <circle cx="120" cy="30" r="25" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="2"/>
      <text x="120" y="35" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">B</text>
      <text x="175" y="35" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">=</text>
      <circle cx="240" cy="30" r="35" fill="#10b981" opacity="0.5" stroke="#14b8a6" stroke-width="2"/>
      <text x="240" y="35" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">AB</text>
    </g>
    <text x="185" y="140" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Из нескольких веществ → одно</text>
    <text x="185" y="160" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">2H2 + O2 = 2H2O</text>
  </g>

  <!-- Decomposition reaction -->
  <g transform="translate(410, 70)">
    <rect x="0" y="0" width="370" height="180" rx="8" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
    <text x="185" y="25" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#fbbf24" text-anchor="middle">Реакция разложения</text>

    <g transform="translate(30, 50)">
      <circle cx="30" cy="30" r="35" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="2"/>
      <text x="30" y="35" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">AB</text>
      <text x="90" y="35" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">=</text>
      <circle cx="155" cy="15" r="22" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="2"/>
      <text x="155" y="20" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">A</text>
      <text x="200" y="35" font-family="Arial, sans-serif" font-size="20" fill="#fbbf24" text-anchor="middle">+</text>
      <circle cx="255" cy="45" r="22" fill="#f59e0b" opacity="0.3" stroke="#f59e0b" stroke-width="2"/>
      <text x="255" y="50" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">B</text>
    </g>
    <text x="185" y="140" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Одно вещество → несколько</text>
    <text x="185" y="160" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">2H2O = 2H2 + O2</text>
  </g>

  <!-- Substitution reaction -->
  <g transform="translate(20, 270)">
    <rect x="0" y="0" width="370" height="180" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
    <text x="185" y="25" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#60a5fa" text-anchor="middle">Реакция замещения</text>

    <g transform="translate(20, 50)">
      <circle cx="30" cy="20" r="20" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
      <text x="30" y="25" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">A</text>
      <circle cx="75" cy="20" r="25" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
      <text x="75" y="25" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">BC</text>
      <text x="125" y="25" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">=</text>
      <circle cx="185" cy="20" r="25" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
      <text x="185" y="25" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">AC</text>
      <circle cx="240" cy="20" r="20" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="2"/>
      <text x="240" y="25" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">B</text>
    </g>
    <text x="185" y="120" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Элемент вытесняет другой</text>
    <text x="185" y="140" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">из соединения</text>
    <text x="185" y="160" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Zn + 2HCl = ZnCl2 + H2</text>
  </g>

  <!-- Exchange reaction -->
  <g transform="translate(410, 270)">
    <rect x="0" y="0" width="370" height="180" rx="8" fill="#0f172a" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
    <text x="185" y="25" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#c084fc" text-anchor="middle">Реакция обмена</text>

    <g transform="translate(20, 50)">
      <circle cx="30" cy="15" r="22" fill="#a855f7" opacity="0.3" stroke="#a855f7" stroke-width="2"/>
      <text x="30" y="20" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">AB</text>
      <circle cx="85" cy="15" r="22" fill="#a855f7" opacity="0.3" stroke="#a855f7" stroke-width="2"/>
      <text x="85" y="20" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">CD</text>
      <text x="130" y="20" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">=</text>
      <circle cx="185" cy="8" r="22" fill="#a855f7" opacity="0.3" stroke="#a855f7" stroke-width="2"/>
      <text x="185" y="13" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">AD</text>
      <circle cx="240" cy="28" r="22" fill="#a855f7" opacity="0.3" stroke="#a855f7" stroke-width="2"/>
      <text x="240" y="33" font-family="Arial, sans-serif" font-size="11" fill="#e2e8f0" text-anchor="middle">CB</text>
    </g>
    <text x="185" y="120" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Обмен частями между</text>
    <text x="185" y="140" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">двумя соединениями</text>
    <text x="185" y="160" font-family="Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">NaOH + HCl = NaCl + H2O</text>
  </g>

  <text x="400" y="470" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle" opacity="0.7">Четыре основных типа химических реакций</text>
  <!-- Decorative corner elements -->
  <circle cx="30" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="30" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="30" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
  <circle cx="770" cy="470" r="4" fill="#0d9488" opacity="0.3"/>
</svg>