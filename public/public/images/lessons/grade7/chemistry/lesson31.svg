<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000018"/>
    </filter>
  </defs>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; }
    .title { font-size: 22px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 13px; fill: #64748b; }
    .card-title { font-size: 13px; font-weight: 600; fill: #1e293b; }
    .card-text { font-size: 11px; fill: #475569; }
    .formula { font-size: 15px; fill: #334155; font-weight: 600; }
    .label { font-size: 12px; fill: #475569; }
    .small { font-size: 10px; fill: #94a3b8; }
    .accent-text { font-size: 12px; font-weight: 600; }
  </style>
  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#f8fafc" filter="url(#shadow)"/>
  <!-- Accent bar -->
  <rect width="800" height="6" rx="3" fill="#ec4899"/>
  <!-- Title -->
  <text x="40" y="42" class="title">Массовая доля растворённого вещества</text>
  <rect x="40" y="50" width="60" height="3" rx="1.5" fill="#ec4899" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="40" y="72" class="subtitle">Отношение массы растворённого вещества к массе всего раствора</text>

  <!-- Formula box -->
  <rect x="40" y="85" width="340" height="70" rx="10" fill="#ec4899" opacity="0.07" stroke="#ec4899" stroke-width="1.5"/>
  <text x="210" y="115" text-anchor="middle" class="formula" font-size="20" fill="#ec4899">
    w = m(в-ва) / m(р-ра) × 100%
  </text>
  <text x="210" y="140" text-anchor="middle" class="card-text">w — массовая доля (в %); m(в-ва) — масса вещества; m(р-ра) — масса раствора</text>

  <!-- Pie Chart -->
  <g transform="translate(190, 280)">
    <!-- Pie: 10% solute, 90% solvent -->
    <!-- Solute slice: 10% = 36 degrees -->
    <path d="M 0 0 L 0 -100 A 100 100 0 0 1 58.8 -80.9 Z" fill="#ec4899" opacity="0.8" stroke="white" stroke-width="2"/>
    <!-- Solvent slice: 90% = 324 degrees -->
    <path d="M 0 0 L 58.8 -80.9 A 100 100 0 1 1 0 -100 Z" fill="#06b6d4" opacity="0.3" stroke="white" stroke-width="2"/>
    <!-- Labels -->
    <text x="-10" y="-60" text-anchor="middle" font-size="11" font-weight="600" fill="white">10%</text>
    <text x="-55" y="55" text-anchor="middle" font-size="13" font-weight="600" fill="#0891b2">90%</text>
    <!-- Legend -->
    <rect x="115" y="-50" width="12" height="12" rx="3" fill="#ec4899" opacity="0.8"/>
    <text x="133" y="-40" font-size="12" fill="#1e293b">NaCl (в-во)</text>
    <rect x="115" y="-30" width="12" height="12" rx="3" fill="#06b6d4" opacity="0.3"/>
    <text x="133" y="-20" font-size="12" fill="#1e293b">H<tspan baseline-shift="sub" font-size="75%">2</tspan>O (растворитель)</text>
  </g>

  <!-- Example calculation -->
  <g transform="translate(430, 85)">
    <rect width="340" height="340" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="340" height="4" rx="2" fill="#ec4899" opacity="0.7"/>
    <text x="170" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">📋 Пример задачи</text>
    <line x1="20" y1="40" x2="320" y2="40" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Step by step -->
    <text x="20" y="65" class="card-text" font-weight="600" fill="#ec4899">Дано:</text>
    <text x="20" y="85" class="card-text">m(NaCl) = 10 г</text>
    <text x="20" y="105" class="card-text">m(H<tspan baseline-shift="sub" font-size="75%">2</tspan>O) = 90 г</text>

    <line x1="20" y1="118" x2="320" y2="118" stroke="#e2e8f0" stroke-width="1"/>

    <text x="20" y="140" class="card-text" font-weight="600" fill="#ec4899">Решение:</text>
    <text x="20" y="162" class="card-text">1) m(р-ра) = m(в-ва) + m(H<tspan baseline-shift="sub" font-size="75%">2</tspan>O)</text>
    <text x="30" y="182" class="card-text">m(р-ра) = 10 + 90 = 100 г</text>

    <text x="20" y="208" class="card-text">2) w = m(в-ва) / m(р-ра) × 100%</text>

    <rect x="15" y="218" width="310" height="35" rx="6" fill="#ec4899" opacity="0.07"/>
    <text x="170" y="240" text-anchor="middle" font-size="16" font-weight="700" fill="#ec4899">
      w = 10 / 100 × 100% = 10%
    </text>

    <line x1="20" y1="265" x2="320" y2="265" stroke="#e2e8f0" stroke-width="1"/>

    <text x="20" y="288" class="card-text" font-weight="600" fill="#ec4899">Ответ:</text>
    <text x="20" y="310" class="formula" fill="#1e293b">w(NaCl) = 10%</text>

    <!-- Mini beaker icon -->
    <rect x="250" y="270" width="50" height="55" rx="3" fill="#e0f7fa" stroke="#06b6d4" stroke-width="1"/>
    <rect x="258" y="290" width="34" height="25" rx="2" fill="#ec4899" opacity="0.2"/>
    <rect x="258" y="315" width="34" height="5" rx="1" fill="#06b6d4" opacity="0.2"/>
  </g>

  <!-- Bottom note -->
  <text x="400" y="480" text-anchor="middle" class="small">Массовая доля всегда выражается в процентах: от 0% (чистый растворитель) до 100% (чистое вещество)</text>
</svg>
