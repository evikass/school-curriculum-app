<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#5C6BC0" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#283593" text-anchor="middle" font-family="Arial">Одночлены</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 11</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3949AB" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="45" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="73" font-size="10" fill="#283593" text-anchor="middle" font-weight="bold">Одночлен — произведение чисел, переменных и их степеней</text>
  <text x="250" y="95" font-size="9" fill="#555" text-anchor="middle">Примеры: 3x^2y, -5a, 7, x^4</text>
  <rect x="12" y="111" width="155" height="95" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="87" y="126" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Стандартный вид</text>
  <text x="87" y="146" font-size="9" fill="#3949AB" font-family="monospace">3x^2y</text>
  <text x="87" y="162" font-size="8" fill="#555" text-anchor="middle">Коэффициент вперёд,</text>
  <text x="87" y="174" font-size="8" fill="#555" text-anchor="middle">буквы по алфавиту</text>
  <text x="87" y="194" font-size="8" fill="#C62828" text-anchor="middle">x^2 &times; 3 &times; y — нет!</text>
  <rect x="175" y="111" width="155" height="95" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="252" y="126" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Коэффициент</text>
  <text x="252" y="146" font-size="9" fill="#3949AB" font-family="monospace">3x^2y → k = 3</text>
  <text x="252" y="162" font-size="9" fill="#3949AB" font-family="monospace">-7ab → k = -7</text>
  <text x="252" y="178" font-size="8" fill="#555" text-anchor="middle">Числовой множитель</text>
  <text x="252" y="194" font-size="8" fill="#555" text-anchor="middle">в стандартной записи</text>
  <rect x="338" y="111" width="150" height="95" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="413" y="126" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Степень</text>
  <text x="413" y="146" font-size="9" fill="#3949AB" font-family="monospace">3x^2y^3 → 5</text>
  <text x="413" y="162" font-size="8" fill="#555" text-anchor="middle">(2 + 3 = 5)</text>
  <text x="413" y="178" font-size="9" fill="#3949AB" font-family="monospace">-5a^2b^2 → 4</text>
  <text x="413" y="194" font-size="8" fill="#555" text-anchor="middle">Сумма показателей</text>
  <rect x="12" y="214" width="476" height="90" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="229" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Действия с одночленами</text>
  <rect x="22" y="236" width="220" height="22" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
  <text x="132" y="251" font-size="9" fill="#283593" text-anchor="middle">Умножение: 3x^2 &times; 5x^3 = 15x^5</text>
  <rect x="252" y="236" width="226" height="22" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
  <text x="365" y="251" font-size="9" fill="#283593" text-anchor="middle">Степень: (2x^3)^2 = 4x^6</text>
  <text x="250" y="278" font-size="8" fill="#555" text-anchor="middle">При умножении: коэффициенты перемножаются, показатели складываются</text>
  <text x="250" y="292" font-size="8" fill="#555" text-anchor="middle">При возведении в степень: каждый множитель возводится в эту степень</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#3949AB" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Одночлены — Макарычев Ю.Н., 7 класс</text>
</svg>