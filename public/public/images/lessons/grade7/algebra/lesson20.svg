<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBE9E7"/>
      <stop offset="50%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#FF7043" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#D84315" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#D84315" text-anchor="middle" font-family="Arial">Подстановка и сложение</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 20</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#F4511E" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="230" height="150" rx="6" fill="white" fill-opacity="0.9" stroke="#F4511E" stroke-width="1"/>
  <text x="127" y="73" font-size="9" font-weight="bold" fill="#D84315" text-anchor="middle">Способ подстановки</text>
  <rect x="22" y="80" width="210" height="14" rx="2" fill="#FBE9E7" stroke="#F4511E" stroke-width="0.5"/>
  <text x="127" y="91" font-size="7.5" fill="#D84315" text-anchor="middle">1. Выразить y через x (или наоборот)</text>
  <rect x="22" y="96" width="210" height="14" rx="2" fill="#FBE9E7" stroke="#F4511E" stroke-width="0.5"/>
  <text x="127" y="107" font-size="7.5" fill="#D84315" text-anchor="middle">2. Подставить в другое уравнение</text>
  <rect x="22" y="112" width="210" height="14" rx="2" fill="#FBE9E7" stroke="#F4511E" stroke-width="0.5"/>
  <text x="127" y="123" font-size="7.5" fill="#D84315" text-anchor="middle">3. Решить уравнение с одной переменной</text>
  <rect x="22" y="128" width="210" height="14" rx="2" fill="#F4511E" fill-opacity="0.12"/>
  <text x="127" y="139" font-size="7.5" fill="#D84315" text-anchor="middle" font-weight="bold">4. Найти вторую переменную</text>
  <text x="127" y="158" font-size="8" fill="#555" text-anchor="middle">{x+y=7, 2x-y=2}</text>
  <text x="127" y="172" font-size="8" fill="#555" text-anchor="middle">y=7-x, 2x-(7-x)=2</text>
  <text x="127" y="186" font-size="8" fill="#555" text-anchor="middle">3x=9, x=3, y=4</text>
  <text x="127" y="200" font-size="8" fill="#D84315" font-weight="bold">Ответ: (3; 4)</text>
  <rect x="252" y="58" width="236" height="150" rx="6" fill="white" fill-opacity="0.9" stroke="#F4511E" stroke-width="1"/>
  <text x="370" y="73" font-size="9" font-weight="bold" fill="#D84315" text-anchor="middle">Способ сложения</text>
  <rect x="262" y="80" width="216" height="14" rx="2" fill="#FBE9E7" stroke="#F4511E" stroke-width="0.5"/>
  <text x="370" y="91" font-size="7.5" fill="#D84315" text-anchor="middle">1. Уравнять коэффициенты при переменной</text>
  <rect x="262" y="96" width="216" height="14" rx="2" fill="#FBE9E7" stroke="#F4511E" stroke-width="0.5"/>
  <text x="370" y="107" font-size="7.5" fill="#D84315" text-anchor="middle">2. Сложить уравнения почленно</text>
  <rect x="262" y="112" width="216" height="14" rx="2" fill="#FBE9E7" stroke="#F4511E" stroke-width="0.5"/>
  <text x="370" y="123" font-size="7.5" fill="#D84315" text-anchor="middle">3. Решить полученное уравнение</text>
  <rect x="262" y="128" width="216" height="14" rx="2" fill="#F4511E" fill-opacity="0.12"/>
  <text x="370" y="139" font-size="7.5" fill="#D84315" text-anchor="middle" font-weight="bold">4. Найти вторую переменную</text>
  <text x="370" y="158" font-size="8" fill="#555" text-anchor="middle">{3x+2y=10, x-2y=2}</text>
  <text x="370" y="172" font-size="8" fill="#555" text-anchor="middle">Складываем: 4x=12, x=3</text>
  <text x="370" y="186" font-size="8" fill="#555" text-anchor="middle">3-2y=2, y=0.5</text>
  <text x="370" y="200" font-size="8" fill="#D84315" font-weight="bold">Ответ: (3; 0.5)</text>
  <rect x="12" y="216" width="476" height="82" rx="6" fill="white" fill-opacity="0.9" stroke="#F4511E" stroke-width="1"/>
  <text x="250" y="231" font-size="9" font-weight="bold" fill="#D84315" text-anchor="middle">Задачи с помощью систем</text>
  <text x="250" y="248" font-size="8" fill="#555" text-anchor="middle">Две неизвестные величины — вводим две переменные</text>
  <text x="250" y="264" font-size="8" fill="#555" text-anchor="middle">Составляем систему из двух уравнений</text>
  <text x="250" y="280" font-size="8" fill="#555" text-anchor="middle">Решаем систему подстановкой или сложением</text>
  <text x="250" y="292" font-size="8" fill="#D84315" text-anchor="middle" font-weight="bold">Проверяем ответ по условию задачи!</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#F4511E" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Подстановка и сложение — Макарычев Ю.Н., 7 класс</text>
</svg>