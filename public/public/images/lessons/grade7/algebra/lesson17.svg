<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="50%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#EC407A" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#AD1457" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#AD1457" text-anchor="middle" font-family="Arial">Разность квадратов</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 17</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#D81B60" stroke-opacity="0.3"/>
  <rect x="12" y="58" width="476" height="60" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="250" y="80" font-size="14" fill="#AD1457" text-anchor="middle" font-weight="bold" font-family="monospace">a^2 - b^2 = (a - b)(a + b)</text>
  <text x="250" y="108" font-size="9" fill="#555" text-anchor="middle">Разность квадратов = произведение разности на сумму</text>
  <rect x="12" y="126" width="230" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="127" y="141" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Разложение</text>
  <text x="127" y="160" font-size="8" fill="#D81B60" font-family="monospace">x^2 - 9 = (x-3)(x+3)</text>
  <text x="127" y="178" font-size="8" fill="#D81B60" font-family="monospace">4a^2-25 = (2a-5)(2a+5)</text>
  <text x="127" y="196" font-size="8" fill="#D81B60" font-family="monospace">16-y^2 = (4-y)(4+y)</text>
  <rect x="252" y="126" width="236" height="100" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="370" y="141" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Быстрые вычисления</text>
  <text x="370" y="160" font-size="8" fill="#555">53^2 - 47^2 =</text>
  <text x="370" y="175" font-size="8" fill="#D81B60">(53-47)(53+47)</text>
  <text x="370" y="190" font-size="8" fill="#D81B60">= 6 &times; 100 = 600</text>
  <text x="370" y="210" font-size="8" fill="#555">101^2 - 1 = 100 &times; 102 = 10200</text>
  <rect x="12" y="234" width="476" height="70" rx="6" fill="white" fill-opacity="0.9" stroke="#D81B60" stroke-width="1"/>
  <text x="250" y="249" font-size="9" font-weight="bold" fill="#AD1457" text-anchor="middle">Обратная формула</text>
  <text x="250" y="268" font-size="10" fill="#AD1457" text-anchor="middle" font-weight="bold" font-family="monospace">(a - b)(a + b) = a^2 - b^2</text>
  <text x="250" y="290" font-size="8" fill="#555" text-anchor="middle">Умножение разности на сумму = разность квадратов</text>
  <rect x="12" y="320" width="476" height="22" rx="4" fill="#D81B60" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="9" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Разность квадратов — Макарычев Ю.Н., 7 класс</text>
</svg>