<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="50%" stop-color="#C5CAE9"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="500" height="350" fill="url(#bg2)"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#283593" stroke-width="2.5"/>
  <text x="250" y="28" font-size="14" font-weight="bold" fill="#1A237E" text-anchor="middle" font-family="Arial">Выражения с переменными</text>
  <text x="250" y="43" font-size="9" fill="#666" text-anchor="middle" font-family="Arial">Алгебра 7 класс — Урок 2</text>
  <line x1="20" y1="50" x2="480" y2="50" stroke="#3949AB" stroke-opacity="0.3"/>

  <rect x="12" y="58" width="155" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="89" y="73" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Переменная</text>
  <text x="89" y="93" font-size="22" fill="#3949AB" text-anchor="middle" font-style="italic" font-weight="bold">x</text>
  <text x="89" y="112" font-size="8" fill="#555" text-anchor="middle">Может принимать</text>
  <text x="89" y="124" font-size="8" fill="#555" text-anchor="middle">различные</text>
  <text x="89" y="136" font-size="8" fill="#555" text-anchor="middle">числовые значения</text>
  <text x="89" y="155" font-size="8" fill="#3949AB" text-anchor="middle" font-weight="bold">x, y, z, a, b, c</text>

  <rect x="175" y="58" width="155" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="252" y="73" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Подстановка</text>
  <text x="252" y="95" font-size="9" fill="#3949AB" font-family="monospace">2x + 1</text>
  <text x="252" y="112" font-size="8" fill="#666" text-anchor="middle">при x = 3:</text>
  <text x="252" y="132" font-size="11" fill="#283593" text-anchor="middle" font-weight="bold" font-family="monospace">2(3) + 1 = 7</text>
  <text x="252" y="155" font-size="8" fill="#555" text-anchor="middle">Значение выражения = 7</text>

  <rect x="338" y="58" width="150" height="120" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="413" y="73" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Обл. определения</text>
  <text x="413" y="95" font-size="9" fill="#3949AB" font-family="monospace">5/(x - 2)</text>
  <text x="413" y="115" font-size="8" fill="#C62828" text-anchor="middle">x &ne; 2</text>
  <text x="413" y="132" font-size="8" fill="#555" text-anchor="middle">Знаменатель</text>
  <text x="413" y="144" font-size="8" fill="#555" text-anchor="middle">не равен нулю</text>
  <text x="413" y="165" font-size="8" fill="#3949AB" text-anchor="middle" font-weight="bold">D(f) = R \ {2}</text>

  <rect x="12" y="186" width="476" height="118" rx="6" fill="white" fill-opacity="0.9" stroke="#3949AB" stroke-width="1"/>
  <text x="250" y="201" font-size="9" font-weight="bold" fill="#283593" text-anchor="middle">Виды алгебраических выражений</text>
  <rect x="22" y="210" width="145" height="40" rx="4" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
  <text x="94" y="226" font-size="9" fill="#283593" text-anchor="middle" font-weight="bold">Целые</text>
  <text x="94" y="240" font-size="8" fill="#555" text-anchor="middle">2a + 3, x - 5</text>
  <rect x="177" y="210" width="145" height="40" rx="4" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
  <text x="249" y="226" font-size="9" fill="#283593" text-anchor="middle" font-weight="bold">Дробные</text>
  <text x="249" y="240" font-size="8" fill="#555" text-anchor="middle">5/x, (a+1)/(b-2)</text>
  <rect x="332" y="210" width="145" height="40" rx="4" fill="#E8EAF6" stroke="#3949AB" stroke-width="0.5"/>
  <text x="404" y="226" font-size="9" fill="#283593" text-anchor="middle" font-weight="bold">С модулем</text>
  <text x="404" y="240" font-size="8" fill="#555" text-anchor="middle">|x - 3|, |2a + b|</text>
  <text x="250" y="272" font-size="8" fill="#555" text-anchor="middle">Допустимые значения — те, при которых выражение имеет смысл</text>
  <text x="250" y="286" font-size="8" fill="#555" text-anchor="middle">Для дробей: исключаем значения, обнуляющие знаменатель</text>

  <rect x="12" y="320" width="476" height="22" rx="4" fill="#3949AB" fill-opacity="0.85"/>
  <text x="250" y="335" font-size="10" fill="white" text-anchor="middle" font-weight="bold" font-family="Arial">Значение выражения зависит от значения переменной</text>
</svg>