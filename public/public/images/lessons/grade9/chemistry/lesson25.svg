<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg25" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh25">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg25)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Аммиак и соли аммония</text>

  <!-- NH3 pyramid structure -->
  <rect x="12" y="40" width="185" height="72" rx="6" fill="#0f766e" filter="url(#sh25)"/>
  <text x="101" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#5eead4" font-weight="bold">NH&#179; — пирамида</text>
  <circle cx="101" cy="75" r="12" fill="#3b82f6" opacity="0.7"/><text x="101" y="79" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold">N</text>
  <line x1="92" y1="85" x2="70" y2="102" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="85" x2="132" y2="102" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="101" y1="87" x2="101" y2="106" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="70" cy="105" r="8" fill="white" opacity="0.5"/><text x="70" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0f172a">H</text>
  <circle cx="132" cy="105" r="8" fill="white" opacity="0.5"/><text x="132" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0f172a">H</text>
  <circle cx="101" cy="109" r="8" fill="white" opacity="0.5"/><text x="101" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0f172a">H</text>
  <text x="155" y="70" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">108&#176;</text>
  <text x="155" y="80" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">донор</text>
  <text x="155" y="90" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">электронов</text>

  <!-- NH3 + HCl reaction -->
  <rect x="203" y="40" width="185" height="72" rx="6" fill="#0f766e" filter="url(#sh25)"/>
  <text x="295" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">NH&#179; + HCl</text>
  <text x="295" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="bold">= NH&#8308;Cl</text>
  <text x="295" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">хлорид аммония</text>
  <text x="295" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#ccfbf1">«белый дым»</text>

  <!-- NH4+ ion -->
  <rect x="12" y="119" width="185" height="45" rx="6" fill="#134e4a" filter="url(#sh25)"/>
  <text x="22" y="135" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Ион NH&#8308;+</text>
  <text x="22" y="150" font-family="Arial,sans-serif" font-size="8" fill="white">Тетраэдр, ков. связь</text>
  <text x="22" y="161" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">по донорно-акцепторн. механизму</text>

  <!-- Ammonium salts -->
  <rect x="203" y="119" width="185" height="45" rx="6" fill="#134e4a" filter="url(#sh25)"/>
  <text x="213" y="135" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Соли аммония:</text>
  <text x="213" y="150" font-family="Arial,sans-serif" font-size="8" fill="white">(NH&#8308;)&#178;SO&#8308;, NH&#8308;NO&#179;</text>
  <text x="213" y="161" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Разлаг. при нагревании</text>

  <!-- Properties of NH3 -->
  <rect x="12" y="171" width="376" height="46" rx="6" fill="#0f766e" filter="url(#sh25)"/>
  <text x="22" y="187" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Свойства NH&#179;:</text>
  <text x="22" y="202" font-family="Arial,sans-serif" font-size="8" fill="white">Бесцв. газ, резкий запах, р-рим в воде = NH&#179;-H&#178;O (нашатырный спирт)</text>
  <text x="22" y="213" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Слабое основание: NH&#179; + H&#178;O = NH&#8308;+ + OH-</text>

  <!-- Nitrogen fertilizers -->
  <rect x="12" y="224" width="376" height="62" rx="6" fill="#134e4a" filter="url(#sh25)"/>
  <text x="22" y="240" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Азотные удобрения:</text>
  <rect x="22" y="248" width="80" height="22" rx="4" fill="#0f766e"/>
  <text x="62" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">NH&#8308;NO&#179;</text>
  <rect x="108" y="248" width="80" height="22" rx="4" fill="#0f766e"/>
  <text x="148" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">(NH&#8308;)&#178;SO&#8308;</text>
  <rect x="194" y="248" width="80" height="22" rx="4" fill="#0f766e"/>
  <text x="234" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">NaNO&#179;</text>
  <rect x="280" y="248" width="100" height="22" rx="4" fill="#0f766e"/>
  <text x="330" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">CO(NH&#178;)&#178;</text>
  <text x="200" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Аммиачная селитра | Сульфат аммония | Натриевая селитра | Мочевина</text>
  <text x="365" y="240" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 25</text>

</svg>