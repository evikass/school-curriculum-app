<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh11">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg11)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Щелочные металлы</text>

  <!-- Element cards -->
  <rect x="12" y="40" width="60" height="50" rx="6" fill="#0f766e" filter="url(#sh11)"/>
  <text x="42" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=3</text>
  <text x="42" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="white" font-weight="bold">Li</text>
  <text x="42" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">2s&#185;</text>

  <rect x="78" y="40" width="60" height="50" rx="6" fill="#0f766e" filter="url(#sh11)"/>
  <text x="108" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=11</text>
  <text x="108" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="white" font-weight="bold">Na</text>
  <text x="108" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">3s&#185;</text>

  <rect x="144" y="40" width="60" height="50" rx="6" fill="#0f766e" filter="url(#sh11)"/>
  <text x="174" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=19</text>
  <text x="174" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="white" font-weight="bold">K</text>
  <text x="174" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">4s&#185;</text>

  <rect x="210" y="40" width="60" height="50" rx="6" fill="#0f766e" filter="url(#sh11)"/>
  <text x="240" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=37</text>
  <text x="240" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="white" font-weight="bold">Rb</text>
  <text x="240" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">5s&#185;</text>

  <rect x="276" y="40" width="60" height="50" rx="6" fill="#0f766e" filter="url(#sh11)"/>
  <text x="306" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=55</text>
  <text x="306" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="white" font-weight="bold">Cs</text>
  <text x="306" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">6s&#185;</text>

  <rect x="342" y="40" width="46" height="50" rx="6" fill="#134e4a" filter="url(#sh11)"/>
  <text x="365" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=87</text>
  <text x="365" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#c4b5fd" font-weight="bold">Fr</text>
  <text x="365" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">7s&#185;</text>

  <!-- General info -->
  <rect x="12" y="98" width="376" height="38" rx="6" fill="#134e4a" filter="url(#sh11)"/>
  <text x="22" y="114" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">IA группа:</text>
  <text x="90" y="114" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">1 валентный электрон ns&#185; | Хранят под слоем масла | Мягкие</text>
  <text x="22" y="128" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Активность растёт вниз по группе: Li &lt; Na &lt; K &lt; Rb &lt; Cs &lt; Fr</text>

  <!-- Reactions -->
  <rect x="12" y="144" width="185" height="78" rx="6" fill="#0f766e" filter="url(#sh11)"/>
  <text x="22" y="160" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Реакции:</text>
  <text x="22" y="174" font-family="Arial,sans-serif" font-size="8" fill="white">2Na + 2H&#8322;O = 2NaOH + H&#8322;</text>
  <text x="22" y="187" font-family="Arial,sans-serif" font-size="8" fill="white">2K + 2H&#8322;O = 2KOH + H&#8322;</text>
  <text x="22" y="200" font-family="Arial,sans-serif" font-size="8" fill="white">4Li + O&#8322; = 2Li&#8322;O</text>
  <text x="22" y="213" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">С водой - бурно (K - взрыв!)</text>

  <!-- Flame colors -->
  <rect x="203" y="144" width="185" height="78" rx="6" fill="#0f766e" filter="url(#sh11)"/>
  <text x="213" y="160" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Цвет пламени:</text>
  <rect x="213" y="167" width="10" height="10" rx="2" fill="#fca5a5"/>
  <text x="228" y="176" font-family="Arial,sans-serif" font-size="8" fill="white">Li - карминно-красный</text>
  <rect x="213" y="181" width="10" height="10" rx="2" fill="#fde68a"/>
  <text x="228" y="190" font-family="Arial,sans-serif" font-size="8" fill="white">Na - жёлтый</text>
  <rect x="213" y="195" width="10" height="10" rx="2" fill="#c4b5fd"/>
  <text x="228" y="204" font-family="Arial,sans-serif" font-size="8" fill="white">K - фиолетовый</text>
  <text x="213" y="218" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Качественный анализ на Me&#8314;</text>

  <!-- Oxides and hydroxides -->
  <rect x="12" y="230" width="376" height="58" rx="6" fill="#134e4a" filter="url(#sh11)"/>
  <text x="22" y="246" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Оксиды и гидроксиды:</text>
  <text x="22" y="260" font-family="Arial,sans-serif" font-size="8" fill="white">Оксиды: Li&#8322;O, Na&#8322;O, K&#8322;O - основные</text>
  <text x="22" y="273" font-family="Arial,sans-serif" font-size="8" fill="white">Гидроксиды: NaOH, KOH - щёлочи (сильные основания)</text>
  <text x="22" y="285" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Щёлочь + кислота = соль + H&#8322;O (нейтрализация)</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 11</text>
</svg>