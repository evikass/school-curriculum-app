<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg20" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh20">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg20)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Общая характеристика неметаллов</text>

  <!-- Position in PT -->
  <rect x="12" y="40" width="185" height="68" rx="6" fill="#0f766e" filter="url(#sh20)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Положение в ПСХЭ:</text>
  <text x="22" y="70" font-family="Arial,sans-serif" font-size="8" fill="white">Верхний правый угол</text>
  <text x="22" y="83" font-family="Arial,sans-serif" font-size="8" fill="white">IVA - VIIIA группы</text>
  <text x="22" y="96" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">4-7 валентных электронов</text>
  <text x="22" y="106" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">H и He - особые позиции</text>

  <!-- Properties -->
  <rect x="203" y="40" width="185" height="68" rx="6" fill="#134e4a" filter="url(#sh20)"/>
  <text x="213" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Свойства неметаллов:</text>
  <text x="213" y="70" font-family="Arial,sans-serif" font-size="8" fill="white">Нет металлического блеска</text>
  <text x="213" y="83" font-family="Arial,sans-serif" font-size="8" fill="white">Плохие проводники</text>
  <text x="213" y="96" font-family="Arial,sans-serif" font-size="8" fill="white">Хрупкие (твёрдые)</text>
  <text x="213" y="106" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Окислители (принимают e&#8315;)</text>

  <!-- Structure types -->
  <rect x="12" y="116" width="185" height="55" rx="6" fill="#0f766e" filter="url(#sh20)"/>
  <text x="22" y="132" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Строение веществ:</text>
  <text x="22" y="146" font-family="Arial,sans-serif" font-size="8" fill="white">Молекулярное: N&#8322;, O&#8322;, P&#8324;</text>
  <text x="22" y="159" font-family="Arial,sans-serif" font-size="8" fill="white">Атомное: C (алмаз), B, Si</text>
  <text x="22" y="167" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Аллотропия: O&#8322;/O&#8323;, P/C, C алмаз/графит</text>

  <!-- EN -->
  <rect x="203" y="116" width="185" height="55" rx="6" fill="#134e4a" filter="url(#sh20)"/>
  <text x="213" y="132" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Электроотрицательность:</text>
  <text x="213" y="146" font-family="Arial,sans-serif" font-size="8" fill="white">Высокая ЭО неметаллов</text>
  <text x="213" y="159" font-family="Arial,sans-serif" font-size="8" fill="white">F(4.0) &gt; O(3.5) &gt; N(3.0) &gt; Cl(3.0)</text>
  <text x="213" y="167" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Окислительная способность</text>

  <!-- Comparison table -->
  <rect x="12" y="179" width="185" height="78" rx="6" fill="#0f766e" filter="url(#sh20)"/>
  <text x="22" y="195" font-family="Arial,sans-serif" font-size="9" fill="#93c5fd" font-weight="bold">Металлы:</text>
  <text x="22" y="209" font-family="Arial,sans-serif" font-size="7" fill="white">1-3 вал. эл-на | ЭО низкая</text>
  <text x="22" y="221" font-family="Arial,sans-serif" font-size="7" fill="white">Восстановители | Me связь</text>
  <text x="22" y="233" font-family="Arial,sans-serif" font-size="7" fill="white">Основные оксиды и гидроксиды</text>
  <text x="22" y="245" font-family="Arial,sans-serif" font-size="7" fill="white">Катионы Me&#8319;&#8314;</text>
  <text x="22" y="254" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Левая часть ПСХЭ</text>

  <rect x="203" y="179" width="185" height="78" rx="6" fill="#134e4a" filter="url(#sh20)"/>
  <text x="213" y="195" font-family="Arial,sans-serif" font-size="9" fill="#fca5a5" font-weight="bold">Неметаллы:</text>
  <text x="213" y="209" font-family="Arial,sans-serif" font-size="7" fill="white">4-8 вал. эл-нов | ЭО высокая</text>
  <text x="213" y="221" font-family="Arial,sans-serif" font-size="7" fill="white">Окислители | ков. связь</text>
  <text x="213" y="233" font-family="Arial,sans-serif" font-size="7" fill="white">Кислотные оксиды и кислоты</text>
  <text x="213" y="245" font-family="Arial,sans-serif" font-size="7" fill="white">Анионы NeMe&#8345;&#8315;</text>
  <text x="213" y="254" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Правая часть ПСХЭ</text>

  <!-- Key nonmetals -->
  <rect x="12" y="264" width="376" height="26" rx="6" fill="#0f766e" filter="url(#sh20)"/>
  <text x="22" y="280" font-family="Arial,sans-serif" font-size="8" fill="white">Главные неметаллы: H, C, N, O, F, P, S, Cl, Br, I, He, Ne, Ar, Kr, Xe</text>
  <text x="22" y="288" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">22 неметалла из 118 элементов</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 20</text>
</svg>