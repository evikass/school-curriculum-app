<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg32" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh32">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg32)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Обобщение: Неметаллы</text>

  <!-- Central classification -->
  <rect x="130" y="40" width="140" height="24" rx="12" fill="#0d9488"/>
  <text x="200" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="white" font-weight="bold">НЕМЕТАЛЛЫ</text>

  <!-- Group branches -->
  <line x1="155" y1="64" x2="72" y2="80" stroke="#5eead4" stroke-width="1"/>
  <line x1="200" y1="64" x2="200" y2="80" stroke="#5eead4" stroke-width="1"/>
  <line x1="245" y1="64" x2="328" y2="80" stroke="#5eead4" stroke-width="1"/>

  <rect x="22" y="80" width="100" height="20" rx="4" fill="#7c3aed" opacity="0.6"/>
  <text x="72" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold">Галогены VIIA</text>
  <rect x="140" y="80" width="120" height="20" rx="4" fill="#059669" opacity="0.6"/>
  <text x="200" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold">Халькогены VIA</text>
  <rect x="278" y="80" width="100" height="20" rx="4" fill="#0284c7" opacity="0.6"/>
  <text x="328" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold">Пниктогены VA</text>

  <!-- Halogens -->
  <rect x="12" y="106" width="120" height="55" rx="6" fill="#0f766e" filter="url(#sh32)"/>
  <text x="72" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c4b5fd" font-weight="bold">F, Cl, Br, I</text>
  <text x="22" y="133" font-family="Arial,sans-serif" font-size="7" fill="white">7 вал. электронов</text>
  <text x="22" y="144" font-family="Arial,sans-serif" font-size="7" fill="white">Окислители</text>
  <text x="22" y="155" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">ns&#178;np&#8309;</text>

  <!-- Chalcogens -->
  <rect x="140" y="106" width="120" height="55" rx="6" fill="#0f766e" filter="url(#sh32)"/>
  <text x="200" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#6ee7b7" font-weight="bold">O, S, Se, Te</text>
  <text x="150" y="133" font-family="Arial,sans-serif" font-size="7" fill="white">6 вал. электронов</text>
  <text x="150" y="144" font-family="Arial,sans-serif" font-size="7" fill="white">Образ. к-ты H&#178;R</text>
  <text x="150" y="155" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">ns&#178;np&#8308;</text>

  <!-- Pnictogens -->
  <rect x="268" y="106" width="120" height="55" rx="6" fill="#0f766e" filter="url(#sh32)"/>
  <text x="328" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#7dd3fc" font-weight="bold">N, P, As, Sb</text>
  <text x="278" y="133" font-family="Arial,sans-serif" font-size="7" fill="white">5 вал. электронов</text>
  <text x="278" y="144" font-family="Arial,sans-serif" font-size="7" fill="white">Образ. NH&#179;, PH&#179;</text>
  <text x="278" y="155" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">ns&#178;np&#179;</text>

  <!-- Carbon & Silicon -->
  <rect x="12" y="168" width="185" height="36" rx="6" fill="#134e4a" filter="url(#sh32)"/>
  <text x="22" y="183" font-family="Arial,sans-serif" font-size="8" fill="#fbbf24" font-weight="bold">IVA: C, Si</text>
  <text x="80" y="183" font-family="Arial,sans-serif" font-size="7" fill="white">4 вал. эл., ns&#178;np&#178;</text>
  <text x="22" y="196" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Аллотропия, ков. связь</text>

  <rect x="203" y="168" width="185" height="36" rx="6" fill="#134e4a" filter="url(#sh32)"/>
  <text x="213" y="183" font-family="Arial,sans-serif" font-size="8" fill="#f0abfc" font-weight="bold">H, B</text>
  <text x="245" y="183" font-family="Arial,sans-serif" font-size="7" fill="white">особые неметаллы</text>
  <text x="213" y="196" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">H — 1 эл., B — 3 эл.</text>

  <!-- Common properties -->
  <rect x="12" y="211" width="376" height="42" rx="6" fill="#0f766e" filter="url(#sh32)"/>
  <text x="22" y="227" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Общие свойства неметаллов:</text>
  <text x="22" y="241" font-family="Arial,sans-serif" font-size="7" fill="white">Окислители | Ков. связь в молекулах | Аллотропия | Кислые оксиды | Кислоты HxR</text>

  <!-- Patterns -->
  <rect x="12" y="259" width="376" height="27" rx="6" fill="#134e4a" filter="url(#sh32)"/>
  <text x="22" y="275" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">В группе: активность неметаллов уменьш. вниз | В периоде: активность неметаллов увелич. вправо</text>
  <text x="345" y="275" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 32</text>

</svg>