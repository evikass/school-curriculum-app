<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg15" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh15">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg15)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Сплавы</text>

  <!-- Definition -->
  <rect x="12" y="40" width="376" height="36" rx="6" fill="#0f766e" filter="url(#sh15)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Сплав</text>
  <text x="50" y="56" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">- вещество с металлическими свойствами, состоящее из двух и более элементов</text>
  <text x="22" y="70" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Свойства сплава отличаются от свойств компонентов (твёрже, прочнее, ниже t&#176; плавл.)</text>

  <!-- Types of alloys -->
  <rect x="12" y="84" width="185" height="42" rx="6" fill="#134e4a" filter="url(#sh15)"/>
  <text x="22" y="100" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Типы сплавов:</text>
  <text x="22" y="114" font-family="Arial,sans-serif" font-size="8" fill="white">Замещения (атомы Me замещают)</text>
  <text x="22" y="122" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Внедрения (малые атомы в решётке)</text>

  <!-- Main alloys table -->
  <rect x="203" y="84" width="185" height="42" rx="6" fill="#0f766e" filter="url(#sh15)"/>
  <text x="213" y="100" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Преимущества сплавов:</text>
  <text x="213" y="114" font-family="Arial,sans-serif" font-size="8" fill="white">Твёрдость, прочность, корроз.</text>
  <text x="213" y="122" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">стойкость, низкая t&#176; плавления</text>

  <!-- Alloy cards -->
  <rect x="12" y="134" width="120" height="55" rx="6" fill="#0f766e" filter="url(#sh15)"/>
  <text x="72" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fbbf24" font-weight="bold">Бронза</text>
  <text x="72" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white">Cu + Sn</text>
  <text x="72" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Статуи, колокола</text>
  <text x="72" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Замещение</text>

  <rect x="140" y="134" width="120" height="55" rx="6" fill="#0f766e" filter="url(#sh15)"/>
  <text x="200" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fbbf24" font-weight="bold">Латунь</text>
  <text x="200" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white">Cu + Zn</text>
  <text x="200" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Детали, декор</text>
  <text x="200" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Замещение</text>

  <rect x="268" y="134" width="120" height="55" rx="6" fill="#0f766e" filter="url(#sh15)"/>
  <text x="328" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fbbf24" font-weight="bold">Сталь</text>
  <text x="328" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="white">Fe + C (&lt;2%)</text>
  <text x="328" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Конструкции</text>
  <text x="328" y="185" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Внедрение</text>

  <!-- More alloys -->
  <rect x="12" y="197" width="120" height="55" rx="6" fill="#134e4a" filter="url(#sh15)"/>
  <text x="72" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#fbbf24" font-weight="bold">Нержав. сталь</text>
  <text x="72" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">Fe + Cr + Ni</text>
  <text x="72" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Посуда, трубы</text>
  <text x="72" y="249" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Корроз. стойкая</text>

  <rect x="140" y="197" width="120" height="55" rx="6" fill="#134e4a" filter="url(#sh15)"/>
  <text x="200" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fbbf24" font-weight="bold">Дюралюминий</text>
  <text x="200" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">Al + Cu + Mg</text>
  <text x="200" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Авиация, ракеты</text>
  <text x="200" y="249" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Лёгкий, прочный</text>

  <rect x="268" y="197" width="120" height="55" rx="6" fill="#134e4a" filter="url(#sh15)"/>
  <text x="328" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#fbbf24" font-weight="bold">Чугун</text>
  <text x="328" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">Fe + C (2-4.3%)</text>
  <text x="328" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Трубы, радиаторы</text>
  <text x="328" y="249" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Хрупкий, литейный</text>

  <!-- Key point -->
  <rect x="12" y="260" width="376" height="28" rx="6" fill="#0f766e" filter="url(#sh15)"/>
  <text x="22" y="276" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">Сплавы твёрже и прочнее чистых металлов | T&#176; плавл. сплава &lt; T&#176; плавл. компонентов</text>
  <text x="370" y="286" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 15</text>
</svg>