<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh10">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg10)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="white" font-weight="bold">Химические свойства металлов</text>

  <!-- Activity series -->
  <rect x="12" y="40" width="376" height="42" rx="6" fill="#134e4a" filter="url(#sh10)"/>
  <text x="22" y="56" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Ряд активности:</text>
  <text x="22" y="72" font-family="Arial,sans-serif" font-size="8" fill="#fca5a5" font-weight="bold">K Na Ca Mg</text>
  <text x="105" y="72" font-family="Arial,sans-serif" font-size="8" fill="#fbbf24" font-weight="bold">Al Zn Fe</text>
  <text x="168" y="72" font-family="Arial,sans-serif" font-size="8" fill="#93c5fd" font-weight="bold">Sn Pb</text>
  <text x="206" y="72" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold">H</text>
  <text x="220" y="72" font-family="Arial,sans-serif" font-size="8" fill="#a5b4fc" font-weight="bold">Cu Hg Ag</text>
  <text x="282" y="72" font-family="Arial,sans-serif" font-size="8" fill="#c4b5fd" font-weight="bold">Au Pt</text>

  <!-- Reactions with O2 -->
  <rect x="12" y="90" width="185" height="55" rx="6" fill="#0f766e" filter="url(#sh10)"/>
  <text x="22" y="106" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">С кислородом:</text>
  <text x="22" y="120" font-family="Arial,sans-serif" font-size="8" fill="white">2Mg + O&#8322; = 2MgO</text>
  <text x="22" y="133" font-family="Arial,sans-serif" font-size="8" fill="white">4Al + 3O&#8322; = 2Al&#8322;O&#8323;</text>
  <text x="22" y="143" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Me + O&#8322; = Me&#8339;O&#8345; (оксид)</text>

  <!-- Reactions with water -->
  <rect x="203" y="90" width="185" height="55" rx="6" fill="#0f766e" filter="url(#sh10)"/>
  <text x="213" y="106" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">С водой:</text>
  <text x="213" y="120" font-family="Arial,sans-serif" font-size="8" fill="white">2Na + 2H&#8322;O = 2NaOH + H&#8322;</text>
  <text x="213" y="133" font-family="Arial,sans-serif" font-size="8" fill="white">Fe + H&#8322;O = (при t&#176;)</text>
  <text x="213" y="143" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">До H - р-ют с H&#8322;O</text>

  <!-- Reactions with acids -->
  <rect x="12" y="153" width="185" height="55" rx="6" fill="#134e4a" filter="url(#sh10)"/>
  <text x="22" y="169" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">С кислотами:</text>
  <text x="22" y="183" font-family="Arial,sans-serif" font-size="8" fill="white">Zn + 2HCl = ZnCl&#8322; + H&#8322;</text>
  <text x="22" y="196" font-family="Arial,sans-serif" font-size="8" fill="white">Fe + H&#8322;SO&#8324;(разб.) = FeSO&#8324; + H&#8322;</text>
  <text x="22" y="206" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Me до H + кислота = соль + H&#8322;</text>

  <!-- Displacement -->
  <rect x="203" y="153" width="185" height="55" rx="6" fill="#134e4a" filter="url(#sh10)"/>
  <text x="213" y="169" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Замещение (из растворов солей):</text>
  <text x="213" y="183" font-family="Arial,sans-serif" font-size="8" fill="white">Fe + CuSO&#8324; = FeSO&#8324; + Cu</text>
  <text x="213" y="196" font-family="Arial,sans-serif" font-size="8" fill="white">Zn + Pb(NO&#8323;)&#8322; = Zn(NO&#8323;)&#8322; + Pb</text>
  <text x="213" y="206" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Более активный Me вытесняет</text>

  <!-- General scheme -->
  <rect x="12" y="216" width="376" height="72" rx="6" fill="#0f766e" filter="url(#sh10)"/>
  <text x="22" y="232" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Общая схема: Me - восстановитель (отдаёт электроны)</text>
  <text x="22" y="248" font-family="Arial,sans-serif" font-size="9" fill="#fca5a5">Me &#8594; Me&#8319;&#8314; + ne&#8315; (окисление)</text>
  <text x="22" y="264" font-family="Arial,sans-serif" font-size="8" fill="white">Активные Me (до H): р-ют с H&#8322;O, кислотами, солями</text>
  <text x="22" y="278" font-family="Arial,sans-serif" font-size="8" fill="white">Малоактивные (после H): только с конц. кислотами-окисл.</text>
  <text x="22" y="285" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Au, Pt - не реагируют (благородные)</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 10</text>
</svg>