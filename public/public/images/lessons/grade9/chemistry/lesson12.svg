<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh12">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg12)" rx="10"/>
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="white" stroke-width="0.5" opacity="0.15" rx="8"/>
  <rect x="0" y="0" width="400" height="32" fill="#0d9488" rx="10"/>
  <rect x="0" y="16" width="400" height="16" fill="#0d9488"/>
  <text x="200" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="white" font-weight="bold">Be, Mg и щёлочноземельные металлы</text>

  <!-- Element cards -->
  <rect x="12" y="40" width="60" height="48" rx="6" fill="#0f766e" filter="url(#sh12)"/>
  <text x="42" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=4</text>
  <text x="42" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="white" font-weight="bold">Be</text>
  <text x="42" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">2s&#178;</text>

  <rect x="78" y="40" width="60" height="48" rx="6" fill="#0f766e" filter="url(#sh12)"/>
  <text x="108" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=12</text>
  <text x="108" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="white" font-weight="bold">Mg</text>
  <text x="108" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">3s&#178;</text>

  <rect x="144" y="40" width="60" height="48" rx="6" fill="#0f766e" filter="url(#sh12)"/>
  <text x="174" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=20</text>
  <text x="174" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="white" font-weight="bold">Ca</text>
  <text x="174" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">4s&#178;</text>

  <rect x="210" y="40" width="60" height="48" rx="6" fill="#0f766e" filter="url(#sh12)"/>
  <text x="240" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=38</text>
  <text x="240" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="white" font-weight="bold">Sr</text>
  <text x="240" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">5s&#178;</text>

  <rect x="276" y="40" width="60" height="48" rx="6" fill="#0f766e" filter="url(#sh12)"/>
  <text x="306" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Z=56</text>
  <text x="306" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="white" font-weight="bold">Ba</text>
  <text x="306" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">6s&#178;</text>

  <rect x="342" y="40" width="46" height="48" rx="6" fill="#134e4a" filter="url(#sh12)"/>
  <text x="365" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Z=88</text>
  <text x="365" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#c4b5fd" font-weight="bold">Ra</text>
  <text x="365" y="84" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#ccfbf1">7s&#178;</text>

  <!-- General info -->
  <rect x="12" y="96" width="376" height="36" rx="6" fill="#134e4a" filter="url(#sh12)"/>
  <text x="22" y="112" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">IIA группа:</text>
  <text x="90" y="112" font-family="Arial,sans-serif" font-size="8" fill="#f0fdfa">2 валентных электрона ns&#178; | с.о. = +2 | Be - амфотерен</text>
  <text x="22" y="126" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Mg - переходный, Ca, Sr, Ba, Ra - типичные щёлочноземельные</text>

  <!-- Reactions -->
  <rect x="12" y="140" width="185" height="72" rx="6" fill="#0f766e" filter="url(#sh12)"/>
  <text x="22" y="156" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Химические свойства:</text>
  <text x="22" y="170" font-family="Arial,sans-serif" font-size="8" fill="white">2Mg + O&#8322; = 2MgO</text>
  <text x="22" y="183" font-family="Arial,sans-serif" font-size="8" fill="white">Ca + 2H&#8322;O = Ca(OH)&#8322; + H&#8322;</text>
  <text x="22" y="196" font-family="Arial,sans-serif" font-size="8" fill="white">Mg + 2HCl = MgCl&#8322; + H&#8322;</text>
  <text x="22" y="208" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Mg горит ярким белым пламенем!</text>

  <!-- Applications -->
  <rect x="203" y="140" width="185" height="72" rx="6" fill="#0f766e" filter="url(#sh12)"/>
  <text x="213" y="156" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Применение:</text>
  <text x="213" y="170" font-family="Arial,sans-serif" font-size="8" fill="white">Ca - стройматериалы (CaO, CaCO&#8323;)</text>
  <text x="213" y="183" font-family="Arial,sans-serif" font-size="8" fill="white">Mg - лёгкие сплавы (авиа)</text>
  <text x="213" y="196" font-family="Arial,sans-serif" font-size="8" fill="white">Ba - рентгеноконтраст (BaSO&#8324;)</text>
  <text x="213" y="208" font-family="Arial,sans-serif" font-size="7" fill="#99f6e4">Sr - пиротехника (красный цвет)</text>

  <!-- Hard water -->
  <rect x="12" y="220" width="376" height="68" rx="6" fill="#134e4a" filter="url(#sh12)"/>
  <text x="22" y="236" font-family="Arial,sans-serif" font-size="9" fill="#5eead4" font-weight="bold">Жёсткая вода (соли Ca&#178;&#8314; и Mg&#178;&#8314;):</text>
  <text x="22" y="250" font-family="Arial,sans-serif" font-size="8" fill="white">Временная: Ca(HCO&#8323;)&#8322; (кипячение устраняет)</text>
  <text x="22" y="263" font-family="Arial,sans-serif" font-size="8" fill="white">Постоянная: CaSO&#8324;, MgCl&#8322; (нужны реагенты)</text>
  <text x="22" y="278" font-family="Arial,sans-serif" font-size="8" fill="#99f6e4">Умягчение: Ca(HCO&#8323;)&#8322; &#8594; CaCO&#8323;&#8595; + H&#8322;O + CO&#8322;</text>

  <text x="370" y="295" text-anchor="end" font-family="Arial,sans-serif" font-size="8" fill="#5eead4">Урок 12</text>
</svg>