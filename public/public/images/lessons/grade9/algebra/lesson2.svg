<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Урок 2: Функция y = ax² + bx + c и её график</text>

  <!-- Central parabola diagram with shifted vertex -->
  <g filter="url(#shadow1)">
    <rect x="15" y="52" width="225" height="195" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="128" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">График y = ax² + bx + c</text>
    <line x1="25" y1="75" x2="230" y2="75" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Coordinate axes -->
    <line x1="35" y1="220" x2="225" y2="220" stroke="#666" stroke-width="1.2"/>
    <line x1="110" y1="80" x2="110" y2="240" stroke="#666" stroke-width="1.2"/>
    <polygon points="225,217 225,223 231,220" fill="#666"/>
    <polygon points="107,80 113,80 110,74" fill="#666"/>
    <text x="228" y="234" font-size="8" fill="#666">x</text>
    <text x="116" y="83" font-size="8" fill="#666">y</text>

    <!-- Tick marks -->
    <line x1="70" y1="218" x2="70" y2="222" stroke="#666" stroke-width="0.8"/>
    <line x1="150" y1="218" x2="150" y2="222" stroke="#666" stroke-width="0.8"/>
    <text x="70" y="232" font-size="7" fill="#666" text-anchor="middle">-2</text>
    <text x="150" y="232" font-size="7" fill="#666" text-anchor="middle">2</text>

    <!-- Shifted parabola y = (x-1)² + 2 type curve -->
    <path d="M50,220 Q70,180 90,150 Q105,130 120,120 Q135,130 150,150 Q170,180 190,220" fill="none" stroke="#1565C0" stroke-width="2.5"/>

    <!-- Vertex point -->
    <circle cx="120" cy="120" r="3.5" fill="#F44336"/>
    <text x="128" y="115" font-size="7" fill="#F44336" font-weight="bold">x₀</text>

    <!-- Dashed lines to vertex -->
    <line x1="120" y1="220" x2="120" y2="120" stroke="#F44336" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="110" y1="120" x2="120" y2="120" stroke="#F44336" stroke-width="0.8" stroke-dasharray="3,3"/>

    <!-- Axis of symmetry -->
    <line x1="120" y1="80" x2="120" y2="240" stroke="#FF9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="125" y="240" font-size="6" fill="#FF9800">x₀</text>

    <!-- y₀ label -->
    <line x1="110" y1="120" x2="35" y2="120" stroke="#F44336" stroke-width="0.6" stroke-dasharray="2,2"/>
    <text x="40" y="117" font-size="6" fill="#F44336">y₀</text>
  </g>

  <!-- Connecting lines -->
  <line x1="240" y1="120" x2="258" y2="105" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="240" y1="190" x2="258" y2="210" stroke="#42A5F5" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Vertex formula card -->
  <g filter="url(#shadow1)">
    <rect x="258" y="52" width="225" height="95" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="370" y="70" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Координаты вершины</text>
    <line x1="268" y1="75" x2="473" y2="75" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Formula display box -->
    <rect x="275" y="82" width="195" height="24" rx="6" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1"/>
    <text x="372" y="98" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">x₀ = -b / (2a)</text>

    <circle cx="278" cy="120" r="3" fill="#1976D2"/>
    <text x="286" y="123" font-size="8" fill="#333">y₀ = f(x₀) = a·x₀² + b·x₀ + c</text>
    <circle cx="278" cy="136" r="3" fill="#1976D2"/>
    <text x="286" y="139" font-size="8" fill="#333">Ось симметрии: x = x₀</text>
  </g>

  <!-- Algorithm card -->
  <g filter="url(#shadow1)">
    <rect x="258" y="157" width="225" height="90" rx="10" fill="white" stroke="#1565C0" stroke-width="1.5"/>
    <text x="370" y="175" text-anchor="middle" fill="#0D47A1" font-size="10" font-weight="bold">Алгоритм построения</text>
    <line x1="268" y1="180" x2="473" y2="180" stroke="#42A5F5" stroke-width="0.5"/>

    <!-- Step numbers with circles -->
    <circle cx="278" cy="194" r="7" fill="#1565C0"/>
    <text x="278" y="197" text-anchor="middle" fill="white" font-size="7" font-weight="bold">1</text>
    <text x="290" y="197" font-size="8" fill="#333">Найти вершину (x₀, y₀)</text>

    <circle cx="278" cy="212" r="7" fill="#1976D2"/>
    <text x="278" y="215" text-anchor="middle" fill="white" font-size="7" font-weight="bold">2</text>
    <text x="290" y="215" font-size="8" fill="#333">Провести ось симметрии</text>

    <circle cx="278" cy="230" r="7" fill="#42A5F5"/>
    <text x="278" y="233" text-anchor="middle" fill="white" font-size="7" font-weight="bold">3</text>
    <text x="290" y="233" font-size="8" fill="#333">Найти доп. точки и построить</text>
  </g>

  <!-- Concept pills -->
  <g transform="translate(25,275)">
    <rect x="0" y="0" width="90" height="20" rx="10" fill="#1565C0"/>
    <text x="45" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Квадратичная</text>
  </g>
  <g transform="translate(125,275)">
    <rect x="0" y="0" width="85" height="20" rx="10" fill="#1976D2"/>
    <text x="42" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Вершина</text>
  </g>
  <g transform="translate(220,275)">
    <rect x="0" y="0" width="85" height="20" rx="10" fill="#0D47A1"/>
    <text x="42" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Сдвиг</text>
  </g>
  <g transform="translate(315,275)">
    <rect x="0" y="0" width="80" height="20" rx="10" fill="#42A5F5"/>
    <text x="40" y="14" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Дискриминант</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="312" width="500" height="38" fill="#0D47A1" rx="8"/>
  <rect x="0" y="312" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="336" text-anchor="middle" fill="#90CAF9" font-size="9">Ключевая формула: x₀ = -b/(2a) — абсцисса вершины параболы</text>
</svg>