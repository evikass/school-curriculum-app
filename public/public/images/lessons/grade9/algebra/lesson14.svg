<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Неравенства с двумя переменными</text>

  <!-- Card 1: Half-plane shading for y > 2x + 1 -->
  <rect x="15" y="52" width="230" height="138" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="130" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Полуплоскость</text>
  <!-- Coordinate axes -->
  <line x1="35" y1="160" x2="225" y2="160" stroke="#90CAF9" stroke-width="1"/>
  <line x1="70" y1="78" x2="70" y2="178" stroke="#90CAF9" stroke-width="1"/>
  <polygon points="225,160 220,157 220,163" fill="#90CAF9"/>
  <polygon points="70,78 67,83 73,83" fill="#90CAF9"/>
  <text x="227" y="164" fill="#64B5F6" font-size="8">x</text>
  <text x="74" y="82" fill="#64B5F6" font-size="8">y</text>
  <!-- Grid -->
  <line x1="105" y1="78" x2="105" y2="178" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="140" y1="78" x2="140" y2="178" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="175" y1="78" x2="175" y2="178" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="35" y1="140" x2="225" y2="140" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="35" y1="120" x2="225" y2="120" stroke="#E3F2FD" stroke-width="0.5"/>
  <line x1="35" y1="100" x2="225" y2="100" stroke="#E3F2FD" stroke-width="0.5"/>
  <!-- Shaded half-plane (above line) -->
  <polygon points="35,78 225,78 225,120 175,140 140,150 105,160 70,170 35,180" fill="#42A5F5" opacity="0.2"/>
  <!-- Boundary line (dashed for strict inequality) -->
  <line x1="35" y1="180" x2="210" y2="100" stroke="#0D47A1" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Test point (0,0) -->
  <circle cx="70" cy="160" r="4" fill="#1976D2" stroke="white" stroke-width="1.5"/>
  <text x="78" y="158" fill="#1976D2" font-size="8">(0;0)</text>
  <!-- Arrow showing shading direction -->
  <line x1="120" y1="140" x2="120" y2="110" stroke="#42A5F5" stroke-width="1.5"/>
  <polygon points="120,107 117,112 123,112" fill="#42A5F5"/>
  <!-- Equation label -->
  <text x="155" y="176" fill="#1565C0" font-size="10" font-style="italic">y &gt; 2x + 1</text>

  <!-- Card 2: Boundary line types — solid vs dashed -->
  <rect x="260" y="52" width="225" height="138" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="372" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Граница области</text>
  <!-- Solid line example -->
  <text x="282" y="92" fill="#1565C0" font-size="9" font-weight="bold">Сплошная</text>
  <line x1="275" y1="105" x2="340" y2="105" stroke="#0D47A1" stroke-width="2.5"/>
  <!-- Shaded region above -->
  <rect x="275" y="95" width="65" height="10" rx="2" fill="#42A5F5" opacity="0.15"/>
  <text x="350" y="109" fill="#1565C0" font-size="9">≥ или ≤</text>
  <!-- Dashed line example -->
  <text x="282" y="135" fill="#1565C0" font-size="9" font-weight="bold">Штриховая</text>
  <line x1="275" y1="148" x2="340" y2="148" stroke="#0D47A1" stroke-width="2.5" stroke-dasharray="6,3"/>
  <!-- Shaded region above -->
  <rect x="275" y="138" width="65" height="10" rx="2" fill="#42A5F5" opacity="0.15"/>
  <text x="350" y="152" fill="#1565C0" font-size="9">&gt; или &lt;</text>
  <!-- Dashed connecting lines -->
  <line x1="307" y1="115" x2="340" y2="160" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="307" y1="158" x2="340" y2="160" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Decision pill -->
  <rect x="335" y="162" width="120" height="20" rx="10" fill="#0D47A1"/>
  <text x="395" y="176" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Точка на границе?</text>

  <!-- Card 3: Test point method -->
  <rect x="15" y="200" width="225" height="120" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="127" y="218" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Метод пробной точки</text>
  <!-- Step illustration -->
  <rect x="30" y="228" width="195" height="24" rx="6" fill="#E3F2FD" stroke="#64B5F6" stroke-width="0.5"/>
  <text x="38" y="244" fill="#0D47A1" font-size="9">1. Провести граничную прямую</text>
  <line x1="127" y1="253" x2="127" y2="260" stroke="#42A5F5" stroke-width="1.2"/>
  <polygon points="127,263 124,258 130,258" fill="#42A5F5"/>
  <rect x="30" y="264" width="195" height="24" rx="6" fill="#E3F2FD" stroke="#64B5F6" stroke-width="0.5"/>
  <text x="38" y="280" fill="#0D47A1" font-size="9">2. Взять точку (0;0) — проверить</text>
  <line x1="127" y1="289" x2="127" y2="296" stroke="#42A5F5" stroke-width="1.2"/>
  <polygon points="127,299 124,294 130,294" fill="#42A5F5"/>
  <rect x="30" y="300" width="195" height="20" rx="6" fill="#E3F2FD" stroke="#64B5F6" stroke-width="0.5"/>
  <text x="38" y="314" fill="#0D47A1" font-size="9">3. Заштриховать нужную область</text>

  <!-- Card 4: Inequality symbols and region types -->
  <rect x="260" y="200" width="225" height="120" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="372" y="218" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Виды неравенств</text>
  <!-- Linear inequality pill -->
  <rect x="275" y="230" width="90" height="22" rx="10" fill="#0D47A1"/>
  <text x="320" y="245" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Линейное</text>
  <!-- Quadratic inequality pill -->
  <rect x="375" y="230" width="95" height="22" rx="10" fill="#1565C0"/>
  <text x="422" y="245" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Квадратное</text>
  <!-- Mini graph: linear half-plane -->
  <line x1="285" y1="275" x2="345" y2="255" stroke="#0D47A1" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="280" y="256" width="65" height="14" rx="2" fill="#42A5F5" opacity="0.2"/>
  <text x="313" y="287" fill="#1565C0" font-size="7">ax+by &gt; c</text>
  <!-- Mini graph: quadratic (parabola region) -->
  <path d="M 385,275 Q 405,255 425,275" fill="none" stroke="#0D47A1" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="388" y="256" width="33" height="14" rx="2" fill="#42A5F5" opacity="0.2"/>
  <text x="405" y="287" fill="#1565C0" font-size="7">y &gt; x²</text>
  <!-- Dashed connecting lines -->
  <line x1="320" y1="252" x2="313" y2="270" stroke="#42A5F5" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="422" y1="252" x2="405" y2="270" stroke="#42A5F5" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Key concept pill -->
  <rect x="320" y="296" width="105" height="20" rx="10" fill="#0D47A1"/>
  <text x="372" y="310" text-anchor="middle" fill="white" font-size="8" font-weight="bold">Область решений</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Решение неравенства — полуплоскость на координатной плоскости</text>
</svg>