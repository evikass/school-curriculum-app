<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <filter id="shadow1" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg1)" rx="8"/>
  <rect x="0" y="0" width="500" height="42" fill="#0D47A1" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#0D47A1"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Арифметическая прогрессия</text>

  <!-- Card 1: Visual staircase of AP terms -->
  <rect x="15" y="52" width="230" height="138" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="130" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Ступенчатая модель</text>
  <!-- Step bars representing AP: 2, 5, 8, 11, 14 -->
  <rect x="32" y="162" width="32" height="20" rx="3" fill="#0D47A1"/>
  <text x="48" y="176" text-anchor="middle" fill="white" font-size="9" font-weight="bold">2</text>
  <rect x="72" y="147" width="32" height="35" rx="3" fill="#1565C0"/>
  <text x="88" y="168" text-anchor="middle" fill="white" font-size="9" font-weight="bold">5</text>
  <rect x="112" y="132" width="32" height="50" rx="3" fill="#1976D2"/>
  <text x="128" y="162" text-anchor="middle" fill="white" font-size="9" font-weight="bold">8</text>
  <rect x="152" y="117" width="32" height="65" rx="3" fill="#42A5F5"/>
  <text x="168" y="155" text-anchor="middle" fill="white" font-size="9" font-weight="bold">11</text>
  <rect x="192" y="102" width="32" height="80" rx="3" fill="#64B5F6"/>
  <text x="208" y="148" text-anchor="middle" fill="white" font-size="9" font-weight="bold">14</text>
  <!-- Term labels below -->
  <text x="48" y="186" text-anchor="middle" fill="#1565C0" font-size="7">a₁</text>
  <text x="88" y="186" text-anchor="middle" fill="#1565C0" font-size="7">a₂</text>
  <text x="128" y="186" text-anchor="middle" fill="#1565C0" font-size="7">a₃</text>
  <text x="168" y="186" text-anchor="middle" fill="#1565C0" font-size="7">a₄</text>
  <text x="208" y="186" text-anchor="middle" fill="#1565C0" font-size="7">a₅</text>
  <!-- d arrows between bars -->
  <line x1="65" y1="155" x2="72" y2="148" stroke="#42A5F5" stroke-width="1"/>
  <text x="66" y="144" fill="#42A5F5" font-size="7" font-weight="bold">+d</text>
  <line x1="105" y1="140" x2="112" y2="133" stroke="#42A5F5" stroke-width="1"/>
  <text x="106" y="128" fill="#42A5F5" font-size="7" font-weight="bold">+d</text>
  <line x1="145" y1="125" x2="152" y2="118" stroke="#42A5F5" stroke-width="1"/>
  <text x="146" y="113" fill="#42A5F5" font-size="7" font-weight="bold">+d</text>
  <line x1="185" y1="110" x2="192" y2="103" stroke="#42A5F5" stroke-width="1"/>
  <text x="186" y="98" fill="#42A5F5" font-size="7" font-weight="bold">+d</text>
  <!-- d value -->
  <text x="130" y="84" text-anchor="middle" fill="#0D47A1" font-size="9" font-weight="bold">d = 3</text>

  <!-- Card 2: Nth term formula -->
  <rect x="260" y="52" width="225" height="138" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="372" y="70" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Формула n-го члена</text>
  <!-- Formula box -->
  <rect x="280" y="80" width="185" height="38" rx="8" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="372" y="104" text-anchor="middle" fill="#0D47A1" font-size="16" font-weight="bold" font-style="italic">aₙ = a₁ + (n-1)d</text>
  <!-- Dashed lines from formula components -->
  <line x1="310" y1="118" x2="310" y2="130" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="372" y1="118" x2="372" y2="130" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="440" y1="118" x2="440" y2="130" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Component labels -->
  <rect x="285" y="132" width="50" height="18" rx="8" fill="#0D47A1"/>
  <text x="310" y="144" text-anchor="middle" fill="white" font-size="8" font-weight="bold">1-й член</text>
  <rect x="347" y="132" width="50" height="18" rx="8" fill="#1976D2"/>
  <text x="372" y="144" text-anchor="middle" fill="white" font-size="8" font-weight="bold">номер</text>
  <rect x="415" y="132" width="50" height="18" rx="8" fill="#42A5F5"/>
  <text x="440" y="144" text-anchor="middle" fill="white" font-size="8" font-weight="bold">разность</text>
  <!-- Example calculation -->
  <text x="290" y="168" fill="#1565C0" font-size="9">Пример: a₁=2, d=3, n=10</text>
  <text x="290" y="182" fill="#0D47A1" font-size="10" font-weight="bold">a₁₀ = 2 + 9·3 = 29</text>

  <!-- Card 3: Sum formula with visual pairing -->
  <rect x="15" y="200" width="225" height="120" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="127" y="218" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Сумма n членов</text>
  <!-- Sum formula box -->
  <rect x="30" y="226" width="195" height="32" rx="8" fill="#E3F2FD" stroke="#64B5F6" stroke-width="1"/>
  <text x="127" y="247" text-anchor="middle" fill="#0D47A1" font-size="14" font-weight="bold" font-style="italic">Sₙ = n(a₁+aₙ)/2</text>
  <!-- Visual pairing: a1+an, a2+an-1 -->
  <rect x="35" y="266" width="40" height="18" rx="5" fill="#0D47A1"/>
  <text x="55" y="279" text-anchor="middle" fill="white" font-size="8">a₁</text>
  <text x="80" y="279" fill="#42A5F5" font-size="10">+</text>
  <rect x="88" y="266" width="40" height="18" rx="5" fill="#64B5F6"/>
  <text x="108" y="279" text-anchor="middle" fill="white" font-size="8">aₙ</text>
  <rect x="140" y="266" width="40" height="18" rx="5" fill="#1565C0"/>
  <text x="160" y="279" text-anchor="middle" fill="white" font-size="8">a₂</text>
  <text x="185" y="279" fill="#42A5F5" font-size="10">+</text>
  <rect x="193" y="266" width="40" height="18" rx="5" fill="#42A5F5"/>
  <text x="213" y="279" text-anchor="middle" fill="white" font-size="8">aₙ₋₁</text>
  <!-- Dashed connecting equal sums -->
  <line x1="55" y1="285" x2="55" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="108" y1="285" x2="108" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="55" y1="296" x2="108" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="81" y="308" text-anchor="middle" fill="#0D47A1" font-size="8">= const</text>
  <line x1="160" y1="285" x2="160" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="213" y1="285" x2="213" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="296" x2="213" y2="296" stroke="#42A5F5" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="186" y="308" text-anchor="middle" fill="#0D47A1" font-size="8">= const</text>

  <!-- Card 4: Key properties as pills -->
  <rect x="260" y="200" width="225" height="120" rx="10" fill="white" stroke="#1565C0" filter="url(#shadow1)"/>
  <text x="372" y="218" text-anchor="middle" fill="#0D47A1" font-size="11" font-weight="bold">Свойства</text>
  <!-- Property pills -->
  <rect x="275" y="230" width="195" height="22" rx="10" fill="#0D47A1"/>
  <text x="372" y="245" text-anchor="middle" fill="white" font-size="9" font-weight="bold">d = aₙ₊₁ - aₙ (разность)</text>
  <rect x="275" y="260" width="195" height="22" rx="10" fill="#1565C0"/>
  <text x="372" y="275" text-anchor="middle" fill="white" font-size="9" font-weight="bold">aₙ = (aₙ₋₁ + aₙ₊₁)/2</text>
  <rect x="275" y="290" width="195" height="22" rx="10" fill="#1976D2"/>
  <text x="372" y="305" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Sₙ = n² при a₁=d=1</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="330" width="500" height="20" fill="#0D47A1"/>
  <text x="250" y="344" text-anchor="middle" fill="#90CAF9" font-size="10" font-weight="bold">Арифметическая прогрессия: каждый член = предыдущий + d</text>
</svg>