<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="teal6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg6)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981" filter="url(#glow6)">Простые вещества — неметаллы</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Аллотропия углерода и кислорода</text>

  <!-- Decorative line -->
  <line x1="100" y1="76" x2="700" y2="76" stroke="#0d9488" stroke-width="1" opacity="0.5"/>

  <!-- === DIAMOND (Алмаз) === -->
  <g transform="translate(140, 200)">
    <!-- Tetrahedral crystal structure -->
    <polygon points="0,-55 45,15 -45,15" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.6"/>
    <polygon points="0,-55 45,15" stroke="#14b8a6" stroke-width="1.5" opacity="0.8"/>
    <polygon points="0,-55 -45,15" stroke="#14b8a6" stroke-width="1.5" opacity="0.8"/>
    <!-- Central atom -->
    <circle cx="0" cy="-10" r="6" fill="#10b981" opacity="0.9"/>
    <!-- Top atom -->
    <circle cx="0" cy="-55" r="5" fill="#14b8a6"/>
    <!-- Bottom-left atom -->
    <circle cx="-45" cy="15" r="5" fill="#14b8a6"/>
    <!-- Bottom-right atom -->
    <circle cx="45" cy="15" r="5" fill="#14b8a6"/>
    <!-- Back atom (smaller, faded) -->
    <circle cx="0" cy="35" r="4" fill="#0d9488" opacity="0.5"/>
    <!-- Bonds from center -->
    <line x1="0" y1="-10" x2="0" y2="-55" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="-10" x2="-45" y2="15" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="-10" x2="45" y2="15" stroke="#10b981" stroke-width="1.5" opacity="0.7"/>
    <line x1="0" y1="-10" x2="0" y2="35" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>
    <!-- Extended crystal lattice hints -->
    <line x1="0" y1="-55" x2="30" y2="-80" stroke="#0d9488" stroke-width="0.8" opacity="0.3"/>
    <line x1="0" y1="-55" x2="-30" y2="-80" stroke="#0d9488" stroke-width="0.8" opacity="0.3"/>
    <line x1="-45" y1="15" x2="-70" y2="40" stroke="#0d9488" stroke-width="0.8" opacity="0.3"/>
    <line x1="45" y1="15" x2="70" y2="40" stroke="#0d9488" stroke-width="0.8" opacity="0.3"/>
    <circle cx="30" cy="-80" r="3" fill="#0d9488" opacity="0.3"/>
    <circle cx="-30" cy="-80" r="3" fill="#0d9488" opacity="0.3"/>
    <circle cx="-70" cy="40" r="3" fill="#0d9488" opacity="0.3"/>
    <circle cx="70" cy="40" r="3" fill="#0d9488" opacity="0.3"/>
    <!-- Label -->
    <text x="0" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981">Алмаз</text>
    <text x="0" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">твёрдый, прозрачный</text>
  </g>

  <!-- === GRAPHITE (Графит) === -->
  <g transform="translate(400, 195)">
    <!-- Layer 1 (top) -->
    <g opacity="0.9">
      <!-- Hexagonal ring -->
      <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <circle cx="0" cy="-40" r="4" fill="#14b8a6"/>
      <circle cx="35" cy="-20" r="4" fill="#14b8a6"/>
      <circle cx="35" cy="20" r="4" fill="#14b8a6"/>
      <circle cx="0" cy="40" r="4" fill="#14b8a6"/>
      <circle cx="-35" cy="20" r="4" fill="#14b8a6"/>
      <circle cx="-35" cy="-20" r="4" fill="#14b8a6"/>
    </g>
    <!-- Layer 2 (bottom, offset) -->
    <g transform="translate(18, 25)" opacity="0.45">
      <polygon points="0,-40 35,-20 35,20 0,40 -35,20 -35,-20" fill="none" stroke="#0d9488" stroke-width="1.2"/>
      <circle cx="0" cy="-40" r="3.5" fill="#0d9488" opacity="0.6"/>
      <circle cx="35" cy="-20" r="3.5" fill="#0d9488" opacity="0.6"/>
      <circle cx="35" cy="20" r="3.5" fill="#0d9488" opacity="0.6"/>
      <circle cx="0" cy="40" r="3.5" fill="#0d9488" opacity="0.6"/>
      <circle cx="-35" cy="20" r="3.5" fill="#0d9488" opacity="0.6"/>
      <circle cx="-35" cy="-20" r="3.5" fill="#0d9488" opacity="0.6"/>
    </g>
    <!-- Dashed inter-layer bonds -->
    <line x1="0" y1="40" x2="18" y2="65" stroke="#059669" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
    <line x1="35" y1="20" x2="53" y2="45" stroke="#059669" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
    <line x1="-35" y1="20" x2="-17" y2="45" stroke="#059669" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
    <!-- Label -->
    <text x="10" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981">Графит</text>
    <text x="10" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">мягкий, слоистый</text>
  </g>

  <!-- === FULLERENE (Фуллерен) === -->
  <g transform="translate(660, 195)">
    <!-- C60 ball - pentagons and hexagons forming a sphere -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.6"/>
    <!-- Front hexagon -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <!-- Top pentagon hint -->
    <polygon points="0,-48 20,-38 15,-20 -15,-20 -20,-38" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.5"/>
    <!-- Bottom pentagon hint -->
    <polygon points="0,48 20,38 15,20 -15,20 -20,38" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.5"/>
    <!-- Left hex hint -->
    <polygon points="-48,0 -38,-20 -20,-15 -20,15 -38,20 -48,0" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
    <!-- Right hex hint -->
    <polygon points="48,0 38,-20 20,-15 20,15 38,20 48,0" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.4"/>
    <!-- Atoms at vertices of central hex -->
    <circle cx="0" cy="-30" r="3.5" fill="#10b981"/>
    <circle cx="26" cy="-15" r="3.5" fill="#10b981"/>
    <circle cx="26" cy="15" r="3.5" fill="#10b981"/>
    <circle cx="0" cy="30" r="3.5" fill="#10b981"/>
    <circle cx="-26" cy="15" r="3.5" fill="#10b981"/>
    <circle cx="-26" cy="-15" r="3.5" fill="#10b981"/>
    <!-- Scattered atoms on sphere -->
    <circle cx="0" cy="-48" r="3" fill="#0d9488" opacity="0.7"/>
    <circle cx="0" cy="48" r="3" fill="#0d9488" opacity="0.7"/>
    <circle cx="-48" cy="0" r="3" fill="#0d9488" opacity="0.7"/>
    <circle cx="48" cy="0" r="3" fill="#0d9488" opacity="0.7"/>
    <circle cx="34" cy="-34" r="3" fill="#0d9488" opacity="0.6"/>
    <circle cx="-34" cy="-34" r="3" fill="#0d9488" opacity="0.6"/>
    <circle cx="34" cy="34" r="3" fill="#0d9488" opacity="0.6"/>
    <circle cx="-34" cy="34" r="3" fill="#0d9488" opacity="0.6"/>
    <!-- Label -->
    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981">Фуллерен</text>
    <text x="0" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">C₆₀, молекулярный</text>
  </g>

  <!-- Section divider -->
  <line x1="50" y1="330" x2="750" y2="330" stroke="#0d9488" stroke-width="0.8" opacity="0.3"/>

  <!-- === OXYGEN allotropes === -->
  <text x="400" y="358" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0f766e">Аллотропия кислорода</text>

  <!-- O₂ molecule -->
  <g transform="translate(270, 410)">
    <circle cx="-14" cy="0" r="14" fill="#0d9488" opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="14" cy="0" r="14" fill="#0d9488" opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
    <text x="-14" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">O</text>
    <text x="14" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">O</text>
    <!-- Double bond -->
    <line x1="0" y1="-3" x2="0" y2="3" stroke="white" stroke-width="1"/>
    <text x="0" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">O₂</text>
    <text x="0" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">кислород</text>
  </g>

  <!-- O₃ molecule -->
  <g transform="translate(530, 410)">
    <circle cx="-22" cy="-10" r="13" fill="#059669" opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="0" cy="8" r="13" fill="#059669" opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="22" cy="-10" r="13" fill="#059669" opacity="0.7" stroke="#10b981" stroke-width="1.5"/>
    <text x="-22" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">O</text>
    <text x="0" y="13" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">O</text>
    <text x="22" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">O</text>
    <text x="0" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#14b8a6">O₃</text>
    <text x="0" y="59" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#94a3b8">озон</text>
  </g>

  <!-- Footer note -->
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Аллотропия — существование одного элемента в виде нескольких простых веществ</text>
</svg>