<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="atomGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="atomTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="20" font-weight="bold" filter="url(#glow)">Ковалентная связь</text>
  <text x="400" y="48" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11">Образование неполярной и полярной ковалентной связи</text>

  <!-- ===== LEFT: H₂ Nonpolar ===== -->
  <rect x="20" y="58" width="365" height="220" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" opacity="0.8"/>
  <text x="202" y="80" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Неполярная ковалентная связь</text>
  <text x="202" y="95" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Молекула H₂</text>

  <!-- H atom 1 orbital -->
  <circle cx="140" cy="170" r="40" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <circle cx="140" cy="170" r="28" fill="url(#atomGreen)" stroke="#10b981" stroke-width="2"/>
  <text x="140" y="167" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="18" font-weight="bold">H</text>
  <text x="140" y="182" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="9">1e⁻</text>

  <!-- H atom 2 orbital -->
  <circle cx="265" cy="170" r="40" fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <circle cx="265" cy="170" r="28" fill="url(#atomGreen)" stroke="#10b981" stroke-width="2"/>
  <text x="265" y="167" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="18" font-weight="bold">H</text>
  <text x="265" y="182" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="9">1e⁻</text>

  <!-- Overlap region -->
  <ellipse cx="202" cy="170" rx="20" ry="18" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Shared electron pair -->
  <circle cx="195" cy="170" r="4" fill="#f0fdf4" opacity="0.9"/>
  <circle cx="210" cy="170" r="4" fill="#f0fdf4" opacity="0.9"/>
  <text x="202" y="155" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">общая пара e⁻</text>

  <!-- Bond indicator -->
  <line x1="155" y1="170" x2="250" y2="170" stroke="#10b981" stroke-width="3" opacity="0.6"/>

  <!-- Description -->
  <text x="202" y="230" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Одинаковые атомы → электронная пара</text>
  <text x="202" y="245" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">расположена симметрично</text>
  <text x="202" y="260" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ΔЭО = 0</text>

  <!-- Formula -->
  <text x="202" y="275" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="12" font-weight="bold">H—H (H₂)</text>

  <!-- ===== RIGHT: HCl Polar ===== -->
  <rect x="415" y="58" width="365" height="220" rx="10" fill="#1e293b" stroke="#14b8a6" stroke-width="1.5" opacity="0.8"/>
  <text x="597" y="80" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Полярная ковалентная связь</text>
  <text x="597" y="95" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="10">Молекула HCl</text>

  <!-- H atom orbital -->
  <circle cx="500" cy="170" r="35" fill="none" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <circle cx="500" cy="170" r="22" fill="url(#atomTeal)" stroke="#14b8a6" stroke-width="2"/>
  <text x="500" y="175" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="16" font-weight="bold">H</text>

  <!-- Cl atom orbital -->
  <circle cx="690" cy="170" r="45" fill="none" stroke="#0d9488" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <circle cx="690" cy="170" r="32" fill="url(#atomGreen)" stroke="#0d9488" stroke-width="2"/>
  <text x="690" y="175" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Cl</text>

  <!-- Overlap region (shifted toward Cl) -->
  <ellipse cx="590" cy="170" rx="22" ry="16" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Shared electron pair (shifted toward Cl) -->
  <circle cx="582" cy="170" r="4" fill="#f0fdf4" opacity="0.9"/>
  <circle cx="596" cy="170" r="4" fill="#f0fdf4" opacity="0.9"/>
  <text x="589" y="155" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="8" font-weight="bold">смещена →</text>

  <!-- Bond indicator -->
  <line x1="518" y1="170" x2="660" y2="170" stroke="#14b8a6" stroke-width="3" opacity="0.6"/>

  <!-- Dipole charges -->
  <text x="488" y="148" text-anchor="middle" fill="#fb923c" font-family="Arial, sans-serif" font-size="16" font-weight="bold">δ+</text>
  <text x="710" y="148" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">δ−</text>

  <!-- Dipole arrow -->
  <line x1="520" y1="200" x2="660" y2="200" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrowY)"/>
  <text x="590" y="215" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="9">дипольный момент</text>

  <!-- Description -->
  <text x="597" y="237" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">Разные атомы → электронная пара</text>
  <text x="597" y="252" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">смещена к более ЭО атому (Cl)</text>
  <text x="597" y="267" text-anchor="middle" fill="#14b8a6" font-family="Arial, sans-serif" font-size="11" font-weight="bold">ΔЭО = 0.9</text>

  <!-- Formula -->
  <text x="597" y="275" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="12" font-weight="bold">H→Cl (HCl)</text>

  <!-- ===== BOTTOM LEFT: Sigma bond ===== -->
  <rect x="20" y="295" width="370" height="185" rx="10" fill="#1e293b" stroke="#059669" stroke-width="1.5" opacity="0.8"/>
  <text x="205" y="318" text-anchor="middle" fill="#059669" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Сигма-связь (σ)</text>

  <!-- Sigma bond diagram - head-on overlap -->
  <!-- Left orbital (s-orbital) -->
  <circle cx="140" cy="400" r="32" fill="url(#atomGreen)" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <text x="140" y="405" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="11">s</text>

  <!-- Right orbital (s-orbital) -->
  <circle cx="200" cy="400" r="32" fill="url(#atomGreen)" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <text x="200" y="405" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="11">s</text>

  <!-- Overlap region for sigma -->
  <ellipse cx="170" cy="400" rx="12" ry="28" fill="#10b981" opacity="0.3"/>
  <line x1="170" y1="375" x2="170" y2="425" stroke="#10b981" stroke-width="2" opacity="0.8"/>
  <text x="170" y="440" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="8">ось связи</text>

  <!-- s-p overlap variant -->
  <circle cx="310" cy="395" r="25" fill="url(#atomTeal)" stroke="#14b8a6" stroke-width="1.5" opacity="0.5"/>
  <text x="310" y="400" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="10">s</text>
  <!-- p orbital -->
  <ellipse cx="370" cy="395" rx="30" ry="14" fill="url(#atomGreen)" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
  <text x="370" y="400" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="10">p</text>
  <ellipse cx="340" cy="395" rx="10" ry="14" fill="#14b8a6" opacity="0.25"/>

  <text x="205" y="460" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="9">Перекрывание вдоль оси связи</text>
  <text x="205" y="473" text-anchor="middle" fill="#64748b" font-family="Arial, sans-serif" font-size="8">s-s, s-p, p-p (одиночная связь)</text>

  <!-- ===== BOTTOM RIGHT: Pi bond ===== -->
  <rect x="410" y="295" width="370" height="185" rx="10" fill="#1e293b" stroke="#0d9488" stroke-width="1.5" opacity="0.8"/>
  <text x="595" y="318" text-anchor="middle" fill="#0d9488" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Пи-связь (π)</text>

  <!-- Pi bond diagram - lateral overlap -->
  <!-- Two p-orbitals side by side -->
  <!-- Left p orbital (vertical dumbbell) -->
  <ellipse cx="520" cy="375" rx="10" ry="28" fill="url(#atomTeal)" stroke="#14b8a6" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="520" cy="420" rx="10" ry="15" fill="url(#atomTeal)" stroke="#14b8a6" stroke-width="1.5" opacity="0.5"/>
  <text x="520" y="398" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9">p</text>

  <!-- Right p orbital (vertical dumbbell) -->
  <ellipse cx="580" cy="375" rx="10" ry="28" fill="url(#atomTeal)" stroke="#14b8a6" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="580" cy="420" rx="10" ry="15" fill="url(#atomTeal)" stroke="#14b8a6" stroke-width="1.5" opacity="0.5"/>
  <text x="580" y="398" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="9">p</text>

  <!-- Overlap regions (above and below axis) -->
  <ellipse cx="550" cy="370" rx="20" ry="8" fill="#14b8a6" opacity="0.3"/>
  <ellipse cx="550" cy="420" rx="20" ry="8" fill="#14b8a6" opacity="0.3"/>

  <!-- Bond axis -->
  <line x1="500" y1="397" x2="600" y2="397" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="550" y="445" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8">ось σ-связи</text>

  <!-- Labels for overlap regions -->
  <text x="550" y="365" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="7">перекрывание ↑</text>
  <text x="550" y="435" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="7">перекрывание ↓</text>

  <!-- Double/triple bond notation -->
  <text x="700" y="380" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Двойная:</text>
  <text x="700" y="395" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">1σ + 1π</text>
  <text x="700" y="415" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="11" font-weight="bold">C=C</text>
  <text x="700" y="440" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Тройная:</text>
  <text x="700" y="455" text-anchor="middle" fill="#a7f3d0" font-family="Arial, sans-serif" font-size="10">1σ + 2π</text>
  <text x="700" y="470" text-anchor="middle" fill="#f0fdf4" font-family="Arial, sans-serif" font-size="11" font-weight="bold">C≡C</text>

  <!-- Decorative border -->
  <rect x="2" y="2" width="796" height="496" rx="8" fill="none" stroke="#10b981" stroke-width="1" opacity="0.3"/>

  <!-- Lesson number -->
  <text x="780" y="490" text-anchor="end" fill="#475569" font-family="Arial, sans-serif" font-size="9">Урок 19</text>
</svg>