<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="oxygenGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="hydrogenGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#10b981">Водородная связь</text>
  <line x1="250" y1="52" x2="550" y2="52" stroke="#0d9488" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Section 1: Two water molecules with hydrogen bonds -->
  <text x="250" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a7f3d0">Водородная связь между молекулами воды</text>

  <!-- Water molecule 1 -->
  <!-- Oxygen 1 -->
  <circle cx="140" cy="180" r="28" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="140" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">O</text>
  <text x="140" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fecaca">δ⁻</text>

  <!-- Covalent bonds molecule 1 -->
  <line x1="140" y1="180" x2="95" y2="230" stroke="#5eead4" stroke-width="3"/>
  <line x1="140" y1="180" x2="185" y2="230" stroke="#5eead4" stroke-width="3"/>

  <!-- Hydrogen 1a -->
  <circle cx="95" cy="230" r="16" fill="url(#hydrogenGrad)" stroke="#bae6fd" stroke-width="1"/>
  <text x="95" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">H</text>
  <text x="95" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e293b">δ⁺</text>

  <!-- Hydrogen 1b -->
  <circle cx="185" cy="230" r="16" fill="url(#hydrogenGrad)" stroke="#bae6fd" stroke-width="1"/>
  <text x="185" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">H</text>
  <text x="185" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e293b">δ⁺</text>

  <!-- Water molecule 2 -->
  <!-- Oxygen 2 -->
  <circle cx="360" cy="180" r="28" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1.5"/>
  <text x="360" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f0fdf4">O</text>
  <text x="360" y="193" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fecaca">δ⁻</text>

  <!-- Covalent bonds molecule 2 -->
  <line x1="360" y1="180" x2="315" y2="230" stroke="#5eead4" stroke-width="3"/>
  <line x1="360" y1="180" x2="405" y2="230" stroke="#5eead4" stroke-width="3"/>

  <!-- Hydrogen 2a -->
  <circle cx="315" cy="230" r="16" fill="url(#hydrogenGrad)" stroke="#bae6fd" stroke-width="1"/>
  <text x="315" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">H</text>
  <text x="315" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e293b">δ⁺</text>

  <!-- Hydrogen 2b -->
  <circle cx="405" cy="230" r="16" fill="url(#hydrogenGrad)" stroke="#bae6fd" stroke-width="1"/>
  <text x="405" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0f172a">H</text>
  <text x="405" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#1e293b">δ⁺</text>

  <!-- Hydrogen bond: H1b ... O2 -->
  <line x1="201" y1="225" x2="332" y2="185" stroke="#10b981" stroke-width="2" stroke-dasharray="6,4" filter="url(#glow)"/>

  <!-- Label for hydrogen bond -->
  <text x="268" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">Водородная</text>
  <text x="268" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10b981">связь</text>

  <!-- H2O labels -->
  <text x="140" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5eead4">H₂O</text>
  <text x="360" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#5eead4">H₂O</text>

  <!-- Section 2: Ice crystal structure -->
  <text x="620" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a7f3d0">Структура льда</text>

  <!-- Hexagonal ice structure -->
  <!-- Top of hexagon -->
  <circle cx="580" cy="130" r="10" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="580" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">O</text>

  <circle cx="660" cy="130" r="10" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="134" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">O</text>

  <circle cx="620" cy="165" r="10" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="620" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">O</text>

  <circle cx="540" cy="200" r="10" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="540" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">O</text>

  <circle cx="620" cy="200" r="10" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="620" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">O</text>

  <circle cx="700" cy="200" r="10" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="700" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">O</text>

  <circle cx="580" cy="240" r="10" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="580" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">O</text>

  <circle cx="660" cy="240" r="10" fill="url(#oxygenGrad)" stroke="#ef4444" stroke-width="1"/>
  <text x="660" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#f0fdf4">O</text>

  <!-- Covalent bonds (solid) -->
  <line x1="580" y1="130" x2="620" y2="165" stroke="#5eead4" stroke-width="2"/>
  <line x1="660" y1="130" x2="620" y2="165" stroke="#5eead4" stroke-width="2"/>
  <line x1="540" y1="200" x2="580" y2="240" stroke="#5eead4" stroke-width="2"/>
  <line x1="620" y1="200" x2="580" y2="240" stroke="#5eead4" stroke-width="2"/>
  <line x1="620" y1="200" x2="660" y2="240" stroke="#5eead4" stroke-width="2"/>
  <line x1="700" y1="200" x2="660" y2="240" stroke="#5eead4" stroke-width="2"/>

  <!-- Hydrogen bonds (dashed) -->
  <line x1="580" y1="140" x2="540" y2="200" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="660" y1="140" x2="700" y2="200" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="620" y1="175" x2="620" y2="200" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="540" y1="210" x2="580" y2="240" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="700" y1="210" x2="660" y2="240" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Small H atoms on hydrogen bonds -->
  <circle cx="560" cy="165" r="5" fill="url(#hydrogenGrad)"/>
  <circle cx="680" cy="165" r="5" fill="url(#hydrogenGrad)"/>
  <circle cx="620" cy="188" r="5" fill="url(#hydrogenGrad)"/>

  <!-- Ice label -->
  <text x="620" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5eead4">Пустоты → низкая плотность льда</text>

  <!-- Section 3: Bond strength comparison -->
  <rect x="60" y="310" width="680" height="140" rx="12" fill="#0f766e" fill-opacity="0.15" stroke="#0d9488" stroke-width="1"/>

  <text x="400" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#10b981">Сравнение прочности связей</text>

  <!-- Covalent bond bar -->
  <text x="130" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f0fdf4">Ковалентная</text>
  <rect x="210" y="358" width="400" height="18" rx="4" fill="#0d9488" opacity="0.4"/>
  <rect x="210" y="358" width="400" height="18" rx="4" fill="#14b8a6" opacity="0.7"/>
  <text x="620" y="372" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">~400 кДж/моль</text>

  <!-- Hydrogen bond bar -->
  <text x="130" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#f0fdf4">Водородная</text>
  <rect x="210" y="393" width="400" height="18" rx="4" fill="#0d9488" opacity="0.4"/>
  <rect x="210" y="393" width="40" height="18" rx="4" fill="#059669" opacity="0.8"/>
  <text x="620" y="407" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">~20 кДж/моль</text>

  <!-- Comparison arrows -->
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" font-weight="bold">Ковалентная  &gt;&gt;  Водородная</text>
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5eead4">в 10–20 раз слабее ковалентной</text>

  <!-- Legend -->
  <line x1="60" y1="470" x2="90" y2="470" stroke="#5eead4" stroke-width="3"/>
  <text x="95" y="474" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">— ковалентная связь</text>
  <line x1="220" y1="470" x2="250" y2="470" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="255" y="474" font-family="Arial, sans-serif" font-size="10" fill="#ccfbf1">--- водородная связь</text>

  <!-- Lesson number -->
  <text x="780" y="490" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" opacity="0.6">Урок 22</text>
</svg>