<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="flask7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg7)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981" filter="url(#glow7)">Количество вещества. Моль</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Основные формулы и постоянные</text>

  <!-- Decorative line -->
  <line x1="100" y1="76" x2="700" y2="76" stroke="#0d9488" stroke-width="1" opacity="0.5"/>

  <!-- === FLASK with particles === -->
  <g transform="translate(170, 140)">
    <!-- Flask neck -->
    <rect x="-12" y="0" width="24" height="50" fill="none" stroke="#14b8a6" stroke-width="2" rx="2"/>
    <!-- Flask body (round bottom) -->
    <path d="M-12,50 Q-12,60 -60,100 Q-85,125 -85,155 Q-85,200 -40,220 Q0,235 40,220 Q85,200 85,155 Q85,125 60,100 Q12,60 12,50" fill="url(#flask7)" stroke="#14b8a6" stroke-width="2"/>
    <!-- Liquid level -->
    <path d="M-75,165 Q0,155 75,165 Q80,200 40,218 Q0,230 -40,218 Q-80,200 -75,165 Z" fill="#0d9488" opacity="0.3"/>

    <!-- Particles inside flask (representing 6.02×10²³) -->
    <circle cx="-40" cy="185" r="5" fill="#10b981" opacity="0.8"/>
    <circle cx="-20" cy="175" r="4" fill="#14b8a6" opacity="0.7"/>
    <circle cx="0" cy="195" r="5" fill="#10b981" opacity="0.8"/>
    <circle cx="25" cy="180" r="4" fill="#14b8a6" opacity="0.7"/>
    <circle cx="45" cy="190" r="5" fill="#10b981" opacity="0.8"/>
    <circle cx="-50" cy="200" r="4" fill="#0d9488" opacity="0.6"/>
    <circle cx="-10" cy="210" r="4" fill="#0d9488" opacity="0.6"/>
    <circle cx="15" cy="205" r="5" fill="#10b981" opacity="0.7"/>
    <circle cx="35" cy="210" r="4" fill="#0d9488" opacity="0.6"/>
    <circle cx="-30" cy="215" r="4" fill="#14b8a6" opacity="0.7"/>
    <circle cx="55" cy="200" r="4" fill="#0d9488" opacity="0.6"/>
    <circle cx="-5" cy="165" r="3" fill="#10b981" opacity="0.5"/>
    <circle cx="10" cy="160" r="3" fill="#14b8a6" opacity="0.5"/>
    <circle cx="-35" cy="170" r="3" fill="#0d9488" opacity="0.5"/>
    <circle cx="50" cy="175" r="3" fill="#10b981" opacity="0.5"/>
    <circle cx="-55" cy="180" r="3" fill="#0d9488" opacity="0.5"/>
    <circle cx="0" cy="220" r="4" fill="#10b981" opacity="0.6"/>
    <circle cx="25" cy="218" r="4" fill="#14b8a6" opacity="0.6"/>
    <circle cx="-45" cy="210" r="3" fill="#10b981" opacity="0.5"/>
    <circle cx="60" cy="185" r="3" fill="#14b8a6" opacity="0.5"/>

    <!-- "1 моль" label -->
    <rect x="-40" y="245" width="80" height="28" rx="6" fill="#0d9488" opacity="0.3" stroke="#10b981" stroke-width="1"/>
    <text x="0" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#10b981">1 моль</text>

    <!-- Arrow pointing to particles -->
    <text x="0" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">6,02×10²³ частиц</text>
  </g>

  <!-- === FORMULAS section === -->
  <g transform="translate(420, 100)">
    <!-- Formula card 1 -->
    <rect x="0" y="0" width="340" height="65" rx="8" fill="#0d9488" opacity="0.1" stroke="#0d9488" stroke-width="1"/>
    <text x="20" y="25" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Через массу:</text>
    <text x="170" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#10b981">n = m / M</text>
    <text x="310" y="30" font-family="Arial, sans-serif" font-size="10" fill="#475569">моль = г / (г/моль)</text>

    <!-- Formula card 2 -->
    <rect x="0" y="80" width="340" height="65" rx="8" fill="#14b8a6" opacity="0.1" stroke="#14b8a6" stroke-width="1"/>
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Через объём (газ, н.у.):</text>
    <text x="170" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#14b8a6">n = V / Vm</text>
    <text x="310" y="110" font-family="Arial, sans-serif" font-size="10" fill="#475569">моль = л / (л/моль)</text>

    <!-- Formula card 3 -->
    <rect x="0" y="160" width="340" height="65" rx="8" fill="#059669" opacity="0.1" stroke="#059669" stroke-width="1"/>
    <text x="20" y="185" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Через число частиц:</text>
    <text x="170" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#059669">n = N / NA</text>
    <text x="310" y="190" font-family="Arial, sans-serif" font-size="10" fill="#475569">моль = шт / моль⁻¹</text>
  </g>

  <!-- === CONSTANTS section === -->
  <g transform="translate(420, 360)">
    <!-- Vm constant -->
    <rect x="0" y="0" width="165" height="70" rx="8" fill="#0f766e" opacity="0.2" stroke="#0f766e" stroke-width="1.5"/>
    <text x="82" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Молярный объём</text>
    <text x="82" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#14b8a6">Vm = 22,4</text>
    <text x="82" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0d9488">л/моль (н.у.)</text>

    <!-- NA constant -->
    <rect x="180" y="0" width="165" height="70" rx="8" fill="#0f766e" opacity="0.2" stroke="#0f766e" stroke-width="1.5"/>
    <text x="262" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8">Число Авогадро</text>
    <text x="262" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10b981">NA = 6,02×10²³</text>
    <text x="262" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#0d9488">моль⁻¹</text>
  </g>

  <!-- Footer note -->
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#475569">Моль — единица количества вещества, содержащая NA частиц</text>
</svg>