<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="30" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Микроэволюция и видообразование</text>
<text x="250" y="46" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 11 класс — Урок 8</text>
<line x1="30" y1="52" x2="470" y2="52" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Allopatric speciation -->
<text x="250" y="72" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Аллопатрическое видообразование</text>
<g transform="translate(100,160)">
<ellipse cx="0" cy="0" rx="50" ry="35" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
<text x="0" y="-5" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Популяция A</text>
<text x="0" y="8" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Исходный вид</text>
<circle cx="-15" cy="18" r="3" fill="#66BB6A"/>
<circle cx="0" cy="22" r="3" fill="#66BB6A"/>
<circle cx="15" cy="18" r="3" fill="#66BB6A"/>
</g>
<!-- Barrier -->
<rect x="155" y="100" width="15" height="120" rx="3" fill="#795548" opacity="0.4" stroke="#5D4037" stroke-width="1"/>
<text x="162" y="235" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">Барьер</text>
<g transform="translate(250,140)">
<ellipse cx="0" cy="0" rx="40" ry="30" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5"/>
<text x="0" y="-5" font-family="Arial,sans-serif" font-size="6" fill="#388E3C" text-anchor="middle">Популяция B</text>
<circle cx="-8" cy="15" r="3" fill="#81C784"/>
<circle cx="8" cy="18" r="3" fill="#81C784"/>
</g>
<g transform="translate(380,140)">
<ellipse cx="0" cy="0" rx="40" ry="30" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
<text x="0" y="-5" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Популяция C</text>
<circle cx="-8" cy="15" r="3" fill="#FFCC80"/>
<circle cx="8" cy="18" r="3" fill="#FFCC80"/>
</g>
<line x1="210" y1="120" x2="230" y2="130" stroke="#388E3C" stroke-width="1"/>
<line x1="210" y1="160" x2="230" y2="150" stroke="#E65100" stroke-width="1"/>
<rect x="30" y="255" width="440" height="50" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="269" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Микроэволюция: изменения внутри вида (популяционный уровень)</text>
<text x="250" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Видообразование: аллопатрическое (географическая изоляция) и симпатрическое (экологическая)</text>
<text x="250" y="291" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Изоляция: географическая, экологическая, репродуктивная | Репродуктивная = завершающий этап</text>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Биология 11 класс</text>
</svg>