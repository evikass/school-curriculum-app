<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Релятивистская динамика</text>
<!-- E=mc2 -->
<text x="200" y="65" text-anchor="middle" fill="#ffd700" font-size="28" font-weight="bold">E = mc2</text>
<text x="200" y="85" text-anchor="middle" fill="#636e72" font-size="10">Самая знаменитая формула физики</text>
<!-- Relativistic momentum -->
<text x="200" y="115" text-anchor="middle" fill="#55efc4" font-size="14" font-weight="bold">p = mv / sqrt(1-v2/c2)</text>
<!-- Total energy -->
<text x="200" y="145" text-anchor="middle" fill="#ff7675" font-size="12" font-weight="bold">E = mc2 / sqrt(1-v2/c2) = g*mc2</text>
<!-- Energy-momentum relation -->
<text x="200" y="170" text-anchor="middle" fill="#a29bfe" font-size="12" font-weight="bold">E2 = (pc)2 + (mc2)2</text>
<!-- Triangle diagram -->
<g transform="translate(100,180)">
<line x1="0" y1="60" x2="120" y2="60" stroke="#ff7675" stroke-width="2"/>
<text x="60" y="73" text-anchor="middle" fill="#ff7675" font-size="9">mc2</text>
<line x1="120" y1="60" x2="120" y2="15" stroke="#55efc4" stroke-width="2"/>
<text x="140" y="40" fill="#55efc4" font-size="9">pc</text>
<line x1="0" y1="60" x2="120" y2="15" stroke="#ffd700" stroke-width="2.5"/>
<text x="45" y="30" fill="#ffd700" font-size="10" font-weight="bold">E</text>
</g>
<!-- Velocity addition -->
<rect x="240" y="185" width="150" height="55" rx="5" fill="#2d3436" opacity="0.6"/>
<text x="315" y="205" text-anchor="middle" fill="#ffeaa7" font-size="9" font-weight="bold">Сложение скоростей</text>
<text x="315" y="222" text-anchor="middle" fill="#74b9ff" font-size="9">v = (v1+v2)/(1+v1v2/c2)</text>
<text x="315" y="235" text-anchor="middle" fill="#636e72" font-size="7">v всегда &lt; c!</text>
<!-- Examples -->
<text x="200" y="260" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Примеры</text>
<text x="200" y="278" text-anchor="middle" fill="#55efc4" font-size="8">1 кг = 9*10^16 Дж (мощность Земли на 2 года)</text>
<text x="200" y="293" text-anchor="middle" fill="#ff7675" font-size="8">Солнце: 4 млн тонн/с -> E = mc2</text>
</svg>