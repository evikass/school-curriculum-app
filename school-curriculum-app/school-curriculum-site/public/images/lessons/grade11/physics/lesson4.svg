<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg4)"/>
  <!-- Sequential connection -->
  <text x="100" y="22" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Последовательное</text>
  <!-- Wire -->
  <line x1="20" y1="55" x2="50" y2="55" stroke="#ffd700" stroke-width="2"/>
  <!-- R1 -->
  <rect x="50" y="45" width="50" height="20" rx="3" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
  <text x="75" y="59" text-anchor="middle" fill="#fff" font-size="10">R1</text>
  <line x1="100" y1="55" x2="110" y2="55" stroke="#ffd700" stroke-width="2"/>
  <!-- R2 -->
  <rect x="110" y="45" width="50" height="20" rx="3" fill="#0984e3" stroke="#74b9ff" stroke-width="1"/>
  <text x="135" y="59" text-anchor="middle" fill="#fff" font-size="10">R2</text>
  <line x1="160" y1="55" x2="170" y2="55" stroke="#ffd700" stroke-width="2"/>
  <!-- R3 -->
  <rect x="170" y="45" width="50" height="20" rx="3" fill="#00b894" stroke="#55efc4" stroke-width="1"/>
  <text x="195" y="59" text-anchor="middle" fill="#fff" font-size="10">R3</text>
  <line x1="220" y1="55" x2="250" y2="55" stroke="#ffd700" stroke-width="2"/>
  <!-- Current arrow -->
  <line x1="30" y1="68" x2="60" y2="68" stroke="#ffd700" stroke-width="1.5"/>
  <polygon points="60,65 66,68 60,71" fill="#ffd700"/>
  <text x="48" y="80" fill="#ffd700" font-size="8">I</text>
  <!-- Formulas -->
  <text x="135" y="100" text-anchor="middle" fill="#55efc4" font-size="9">I = I1 = I2 = I3</text>
  <text x="135" y="115" text-anchor="middle" fill="#ff7675" font-size="9">U = U1 + U2 + U3</text>
  <text x="135" y="130" text-anchor="middle" fill="#ffeaa7" font-size="9">R = R1 + R2 + R3</text>
  <!-- Parallel connection -->
  <text x="310" y="22" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Параллельное</text>
  <!-- Main wires -->
  <line x1="250" y1="55" x2="280" y2="55" stroke="#ffd700" stroke-width="2"/>
  <line x1="280" y1="40" x2="280" y2="95" stroke="#ffd700" stroke-width="2"/>
  <!-- Branch 1 -->
  <line x1="280" y1="40" x2="310" y2="40" stroke="#ffd700" stroke-width="2"/>
  <rect x="310" y="30" width="45" height="20" rx="3" fill="#e17055" stroke="#fab1a0" stroke-width="1"/>
  <text x="332" y="44" text-anchor="middle" fill="#fff" font-size="9">R1</text>
  <line x1="355" y1="40" x2="380" y2="40" stroke="#ffd700" stroke-width="2"/>
  <!-- Branch 2 -->
  <line x1="280" y1="67" x2="310" y2="67" stroke="#ffd700" stroke-width="2"/>
  <rect x="310" y="57" width="45" height="20" rx="3" fill="#0984e3" stroke="#74b9ff" stroke-width="1"/>
  <text x="332" y="71" text-anchor="middle" fill="#fff" font-size="9">R2</text>
  <line x1="355" y1="67" x2="380" y2="67" stroke="#ffd700" stroke-width="2"/>
  <!-- Branch 3 -->
  <line x1="280" y1="95" x2="310" y2="95" stroke="#ffd700" stroke-width="2"/>
  <rect x="310" y="85" width="45" height="20" rx="3" fill="#00b894" stroke="#55efc4" stroke-width="1"/>
  <text x="332" y="99" text-anchor="middle" fill="#fff" font-size="9">R3</text>
  <line x1="355" y1="95" x2="380" y2="95" stroke="#ffd700" stroke-width="2"/>
  <line x1="380" y1="40" x2="380" y2="95" stroke="#ffd700" stroke-width="2"/>
  <line x1="380" y1="55" x2="395" y2="55" stroke="#ffd700" stroke-width="2"/>
  <!-- Formulas -->
  <text x="320" y="120" text-anchor="middle" fill="#55efc4" font-size="9">U = U1 = U2 = U3</text>
  <text x="320" y="135" text-anchor="middle" fill="#ff7675" font-size="9">I = I1 + I2 + I3</text>
  <text x="320" y="150" text-anchor="middle" fill="#ffeaa7" font-size="9">1/R = 1/R1 + 1/R2 + 1/R3</text>
  <!-- Meters -->
  <text x="100" y="175" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Измерительные приборы</text>
  <!-- Ammeter -->
  <circle cx="80" cy="210" r="20" fill="none" stroke="#ff7675" stroke-width="2"/>
  <text x="80" y="215" text-anchor="middle" fill="#ff7675" font-size="14" font-weight="bold">A</text>
  <line x1="60" y1="210" x2="40" y2="210" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="100" y1="210" x2="120" y2="210" stroke="#ffd700" stroke-width="1.5"/>
  <text x="80" y="245" text-anchor="middle" fill="#dfe6e9" font-size="9">Амперметр</text>
  <text x="80" y="258" text-anchor="middle" fill="#55efc4" font-size="8">последовательно</text>
  <text x="80" y="270" text-anchor="middle" fill="#636e72" font-size="8">R_A = 0 (идеал.)</text>
  <!-- Voltmeter -->
  <circle cx="280" cy="210" r="20" fill="none" stroke="#74b9ff" stroke-width="2"/>
  <text x="280" y="215" text-anchor="middle" fill="#74b9ff" font-size="14" font-weight="bold">V</text>
  <line x1="260" y1="210" x2="240" y2="210" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="300" y1="210" x2="320" y2="210" stroke="#ffd700" stroke-width="1.5"/>
  <text x="280" y="245" text-anchor="middle" fill="#dfe6e9" font-size="9">Вольтметр</text>
  <text x="280" y="258" text-anchor="middle" fill="#55efc4" font-size="8">параллельно</text>
  <text x="280" y="270" text-anchor="middle" fill="#636e72" font-size="8">R_V = бескон. (идеал.)</text>
  <!-- Shunt & add resistance -->
  <text x="380" y="175" text-anchor="middle" fill="#a29bfe" font-size="9">Шунт к A</text>
  <text x="380" y="195" text-anchor="middle" fill="#a29bfe" font-size="9">Доб. сопр. к V</text>
</svg>