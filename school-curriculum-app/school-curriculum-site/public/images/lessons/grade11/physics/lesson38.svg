<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Тепловое излучение. Гипотеза Планка</text>
<!-- Black body spectrum -->
<text x="130" y="48" text-anchor="middle" fill="#ffeaa7" font-size="9" font-weight="bold">Спектр теплового излучения</text>
<line x1="40" y1="160" x2="230" y2="160" stroke="#dfe6e9" stroke-width="1"/>
<line x1="40" y1="160" x2="40" y2="55" stroke="#dfe6e9" stroke-width="1"/>
<text x="235" y="163" fill="#dfe6e9" font-size="7">l</text>
<text x="30" y="58" fill="#dfe6e9" font-size="7">R</text>
<!-- Classical (Rayleigh-Jeans) - diverges -->
<path d="M40,158 Q80,155 100,140 Q120,110 150,80 Q170,60 200,50" fill="none" stroke="#ff7675" stroke-width="1.5" stroke-dasharray="4,2"/>
<text x="205" y="48" fill="#ff7675" font-size="7">Рэлей-Джинс</text>
<text x="215" y="58" fill="#ff7675" font-size="6">(катастрофа!)</text>
<!-- Planck curve -->
<path d="M40,160 Q60,158 80,150 Q100,130 120,100 Q135,80 145,75 Q155,80 170,100 Q200,135 230,155" fill="none" stroke="#55efc4" stroke-width="2.5"/>
<text x="155" y="68" fill="#55efc4" font-size="7">Планк</text>
<!-- Peak -->
<circle cx="145" cy="75" r="3" fill="#ffd700"/>
<text x="155" y="85" fill="#ffd700" font-size="6">l_max = b/T</text>
<!-- Two temperatures -->
<path d="M40,160 Q80,158 110,148 Q130,130 140,120 Q150,128 165,140 Q190,155 230,160" fill="none" stroke="#74b9ff" stroke-width="1.5"/>
<text x="155" y="118" fill="#74b9ff" font-size="6">T2 > T1</text>
<!-- Planck's formula -->
<rect x="245" y="40" width="145" height="70" rx="8" fill="#2d3436" opacity="0.7"/>
<text x="317" y="60" text-anchor="middle" fill="#ffeaa7" font-size="9" font-weight="bold">Гипотеза Планка</text>
<text x="317" y="82" text-anchor="middle" fill="#55efc4" font-size="16" font-weight="bold">E = hv</text>
<text x="317" y="100" text-anchor="middle" fill="#dfe6e9" font-size="8">h = 6,6*10^-34 Дж*с</text>
<!-- Quanta -->
<rect x="20" y="175" width="360" height="115" rx="8" fill="#2d3436" opacity="0.5"/>
<text x="200" y="195" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Кванты энергии</text>
<!-- Energy levels -->
<line x1="60" y1="230" x2="180" y2="230" stroke="#ff7675" stroke-width="1.5"/>
<text x="185" y="233" fill="#ff7675" font-size="8">E1 (n=1)</text>
<line x1="60" y1="215" x2="180" y2="215" stroke="#55efc4" stroke-width="1.5"/>
<text x="185" y="218" fill="#55efc4" font-size="8">E2 (n=2)</text>
<line x1="60" y1="200" x2="180" y2="200" stroke="#74b9ff" stroke-width="1.5"/>
<text x="185" y="203" fill="#74b9ff" font-size="8">E3 (n=3)</text>
<!-- Photon arrow -->
<line x1="120" y1="228" x2="120" y2="217" stroke="#ffd700" stroke-width="2"/>
<polygon points="117,219 120,213 123,219" fill="#ffd700"/>
<text x="140" y="225" fill="#ffd700" font-size="7">hv</text>
<!-- Discrete -->
<text x="300" y="215" text-anchor="middle" fill="#55efc4" font-size="9">E_n = nhv</text>
<text x="300" y="230" text-anchor="middle" fill="#636e72" font-size="8">n = 1, 2, 3 ...</text>
<text x="300" y="250" text-anchor="middle" fill="#ff7675" font-size="8">Энергия дискретна!</text>
<text x="300" y="265" text-anchor="middle" fill="#636e72" font-size="7">(не непрерывна)</text>
<text x="200" y="285" text-anchor="middle" fill="#a29bfe" font-size="8">14 декабря 1900 — день рождения квантовой физики</text>
</svg>