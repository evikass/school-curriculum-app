<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs><linearGradient id="bg18" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
  <rect width="400" height="300" fill="url(#bg18)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Математический маятник</text>
  <!-- Pendulum at 3 positions -->
  <!-- Left extreme -->
  <line x1="120" y1="55" x2="60" y2="130" stroke="#dfe6e9" stroke-width="1"/>
  <circle cx="60" cy="130" r="10" fill="#74b9ff" stroke="#a29bfe" stroke-width="1"/>
  <text x="40" y="125" fill="#74b9ff" font-size="8">x=-A</text>
  <!-- Center -->
  <line x1="120" y1="55" x2="120" y2="140" stroke="#dfe6e9" stroke-width="1.5"/>
  <circle cx="120" cy="140" r="10" fill="#55efc4" stroke="#00b894" stroke-width="1.5"/>
  <text x="120" y="160" text-anchor="middle" fill="#55efc4" font-size="8">x=0</text>
  <!-- Right extreme -->
  <line x1="120" y1="55" x2="180" y2="130" stroke="#dfe6e9" stroke-width="1"/>
  <circle cx="180" cy="130" r="10" fill="#ff7675" stroke="#fab1a0" stroke-width="1"/>
  <text x="200" y="125" fill="#ff7675" font-size="8">x=+A</text>
  <!-- Arc showing path -->
  <path d="M60,130 Q120,160 180,130" fill="none" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Height h -->
  <line x1="60" y1="140" x2="120" y2="140" stroke="#a29bfe" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="85" y="150" fill="#a29bfe" font-size="7">h</text>
  <!-- Formulas -->
  <text x="300" y="60" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Период</text>
  <text x="300" y="85" text-anchor="middle" fill="#55efc4" font-size="18" font-weight="bold">T = 2п*sqrt(l/g)</text>
  <text x="300" y="110" text-anchor="middle" fill="#ff7675" font-size="12">T = 2п*sqrt(m/k)</text>
  <text x="300" y="128" text-anchor="middle" fill="#636e72" font-size="8">(пружинный маятник)</text>
  <!-- Energy diagram -->
  <text x="200" y="165" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Превращения энергии</text>
  <!-- Bar chart: energy at different positions -->
  <!-- Left extreme: Eп max, Eк = 0 -->
  <rect x="40" y="195" width="20" height="50" rx="2" fill="#ff7675" opacity="0.7"/>
  <rect x="65" y="240" width="20" height="5" rx="2" fill="#55efc4" opacity="0.7"/>
  <text x="62" y="260" text-anchor="middle" fill="#dfe6e9" font-size="7">x=-A</text>
  <text x="50" y="192" fill="#ff7675" font-size="7">Eп</text>
  <text x="75" y="240" fill="#55efc4" font-size="7">Eк</text>
  <!-- Center: Eк max, Eп = 0 -->
  <rect x="115" y="240" width="20" height="5" rx="2" fill="#ff7675" opacity="0.7"/>
  <rect x="140" y="195" width="20" height="50" rx="2" fill="#55efc4" opacity="0.7"/>
  <text x="137" y="260" text-anchor="middle" fill="#dfe6e9" font-size="7">x=0</text>
  <!-- Right extreme -->
  <rect x="190" y="195" width="20" height="50" rx="2" fill="#ff7675" opacity="0.7"/>
  <rect x="215" y="240" width="20" height="5" rx="2" fill="#55efc4" opacity="0.7"/>
  <text x="212" y="260" text-anchor="middle" fill="#dfe6e9" font-size="7">x=+A</text>
  <!-- Total energy line -->
  <line x1="35" y1="195" x2="240" y2="195" stroke="#ffd700" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="250" y="198" fill="#ffd700" font-size="8">E=Eк+Eп</text>
  <!-- Key facts -->
  <rect x="260" y="175" width="130" height="115" rx="5" fill="#2d3436" opacity="0.6"/>
  <text x="325" y="195" text-anchor="middle" fill="#ffeaa7" font-size="9" font-weight="bold">Важно!</text>
  <text x="270" y="212" fill="#55efc4" font-size="8">T НЕ зависит от:</text>
  <text x="270" y="227" fill="#ff7675" font-size="8">- массы груза</text>
  <text x="270" y="242" fill="#ff7675" font-size="8">- амплитуды</text>
  <text x="270" y="260" fill="#74b9ff" font-size="8">T зависит от:</text>
  <text x="270" y="275" fill="#ffd700" font-size="8">- длины нити l</text>
  <text x="270" y="288" fill="#ffd700" font-size="8">- ускорения g</text>
</svg>