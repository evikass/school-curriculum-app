<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg13" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg13)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Сила Ампера</text>
  <!-- Wire in magnetic field -->
  <text x="120" y="50" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Проводник в поле B</text>
  <!-- B field arrows (horizontal) -->
  <g stroke="#55efc4" stroke-width="1" opacity="0.5">
    <line x1="30" y1="70" x2="210" y2="70"/>
    <line x1="30" y1="90" x2="210" y2="90"/>
    <line x1="30" y1="110" x2="210" y2="110"/>
    <line x1="30" y1="130" x2="210" y2="130"/>
  </g>
  <polygon points="210,67 218,70 210,73" fill="#55efc4" opacity="0.5"/>
  <text x="220" y="95" fill="#55efc4" font-size="10">B</text>
  <!-- Wire (current into page) -->
  <circle cx="120" cy="100" r="10" fill="#74b9ff" stroke="#a29bfe" stroke-width="1.5"/>
  <text x="120" y="104" text-anchor="middle" fill="#fff" font-size="10">x</text>
  <!-- Force arrow (upward) -->
  <line x1="120" y1="88" x2="120" y2="60" stroke="#ff7675" stroke-width="2.5"/>
  <polygon points="117,60 120,52 123,60" fill="#ff7675"/>
  <text x="132" y="60" fill="#ff7675" font-size="9">F_A</text>
  <!-- Formula -->
  <text x="120" y="155" text-anchor="middle" fill="#ffeaa7" font-size="14" font-weight="bold">F = BIlsin(a)</text>
  <!-- Electric motor -->
  <text x="320" y="50" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Электромотор</text>
  <!-- Magnet poles -->
  <rect x="260" y="60" width="20" height="80" rx="3" fill="#ff7675" opacity="0.6"/>
  <text x="270" y="105" text-anchor="middle" fill="#fff" font-size="10">N</text>
  <rect x="360" y="60" width="20" height="80" rx="3" fill="#74b9ff" opacity="0.6"/>
  <text x="370" y="105" text-anchor="middle" fill="#fff" font-size="10">S</text>
  <!-- B field between poles -->
  <line x1="285" y1="90" x2="355" y2="90" stroke="#55efc4" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="285" y1="110" x2="355" y2="110" stroke="#55efc4" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Rotating coil -->
  <rect x="300" y="80" width="40" height="40" rx="2" fill="none" stroke="#ffd700" stroke-width="2" transform="rotate(20,320,100)"/>
  <text x="320" y="103" text-anchor="middle" fill="#ffd700" font-size="8">рамка</text>
  <!-- Rotation arrow -->
  <path d="M340,80 Q350,75 345,65" fill="none" stroke="#a29bfe" stroke-width="1.5"/>
  <polygon points="343,67 345,60 349,67" fill="#a29bfe"/>
  <!-- Applications -->
  <rect x="20" y="175" width="360" height="115" rx="8" fill="#2d3436" opacity="0.6"/>
  <text x="200" y="195" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Применения силы Ампера</text>
  <text x="80" y="215" text-anchor="middle" fill="#55efc4" font-size="9">Электромотор</text>
  <text x="80" y="230" text-anchor="middle" fill="#636e72" font-size="7">рамка вращается</text>
  <text x="200" y="215" text-anchor="middle" fill="#a29bfe" font-size="9">Гальванометр</text>
  <text x="200" y="230" text-anchor="middle" fill="#636e72" font-size="7">измеряет ток</text>
  <text x="320" y="215" text-anchor="middle" fill="#ff7675" font-size="9">Динамик</text>
  <text x="320" y="230" text-anchor="middle" fill="#636e72" font-size="7">катушка колеблется</text>
  <!-- Left hand rule reminder -->
  <text x="200" y="255" text-anchor="middle" fill="#ffd700" font-size="10" font-weight="bold">Правило левой руки</text>
  <text x="200" y="272" text-anchor="middle" fill="#74b9ff" font-size="9">4 пальца = I</text>
  <text x="200" y="285" text-anchor="middle" fill="#55efc4" font-size="9">B в ладонь</text>
  <text x="290" y="278" fill="#ff7675" font-size="9">большой палец = F_A</text>
</svg>