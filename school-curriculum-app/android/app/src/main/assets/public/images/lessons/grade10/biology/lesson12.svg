<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="30" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Клеточная теория</text>
<text x="250" y="46" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 10 класс — Урок 12</text>
<line x1="30" y1="52" x2="470" y2="52" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<g transform="translate(90,120)">
<rect x="-55" y="-30" width="110" height="60" rx="5" fill="white" stroke="#795548" stroke-width="1.5"/>
<text x="0" y="-15" font-family="Arial,sans-serif" font-size="7" fill="#795548" text-anchor="middle" font-weight="bold">Гук, 1665</text>
<line x1="-40" y1="-8" x2="40" y2="-8" stroke="#795548" stroke-width="0.5"/>
<text x="0" y="5" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Открыл клетки</text>
<text x="0" y="17" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">(пробка)</text>
</g>
<g transform="translate(250,120)">
<rect x="-55" y="-30" width="110" height="60" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
<text x="0" y="-15" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Шлейден-Шванн</text>
<line x1="-40" y1="-8" x2="40" y2="-8" stroke="#1565C0" stroke-width="0.5"/>
<text x="0" y="5" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Все организмы</text>
<text x="0" y="17" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">из клеток</text>
</g>
<g transform="translate(410,120)">
<rect x="-55" y="-30" width="110" height="60" rx="5" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
<text x="0" y="-15" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Вирхов, 1855</text>
<line x1="-40" y1="-8" x2="40" y2="-8" stroke="#2E7D32" stroke-width="0.5"/>
<text x="0" y="5" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Каждая клетка</text>
<text x="0" y="17" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">из клетки</text>
</g>
<rect x="30" y="220" width="440" height="60" rx="5" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.9"/>
<text x="250" y="234" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Положения клеточной теории:</text>
<text x="250" y="245" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1. Клетка — элементарная единица строения и жизнедеятельности</text>
<text x="250" y="256" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">2. Клетки всех организмов сходны по строению, хим. составу, функциям</text>
<text x="250" y="267" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">3. Клетки размножаются делением (каждая из ранее существовавшей)</text>
<text x="250" y="278" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">4. Многоклеточный организм — система клеток, специализированных по функциям</text>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Биология 10 класс</text>
</svg>