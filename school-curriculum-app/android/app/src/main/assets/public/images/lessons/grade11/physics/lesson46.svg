<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Ядерная энергетика</text>

<!-- Reactor diagram -->
<text x="200" y="42" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Схема ядерного реактора</text>
<!-- Core -->
<rect x="50" y="55" width="100" height="80" rx="5" fill="#ff7675" opacity="0.15" stroke="#ff7675" stroke-width="1.5"/>
<text x="100" y="72" text-anchor="middle" fill="#ff7675" font-size="8" font-weight="bold">Активная зона</text>
<!-- Fuel rods -->
<rect x="65" y="80" width="8" height="40" rx="2" fill="#ffd700" opacity="0.7"/>
<rect x="80" y="80" width="8" height="40" rx="2" fill="#ffd700" opacity="0.7"/>
<rect x="95" y="80" width="8" height="40" rx="2" fill="#ffd700" opacity="0.7"/>
<rect x="110" y="80" width="8" height="40" rx="2" fill="#ffd700" opacity="0.7"/>
<rect x="125" y="80" width="8" height="40" rx="2" fill="#ffd700" opacity="0.7"/>
<text x="100" y="135" text-anchor="middle" fill="#ffd700" font-size="6">топливо (U-235)</text>
<!-- Control rods -->
<rect x="72" y="78" width="4" height="30" rx="1" fill="#74b9ff"/>
<rect x="102" y="78" width="4" height="30" rx="1" fill="#74b9ff"/>
<text x="100" y="145" text-anchor="middle" fill="#74b9ff" font-size="5">стержни</text>
<!-- Heat exchanger -->
<rect x="175" y="60" width="60" height="70" rx="5" fill="#55efc4" opacity="0.15" stroke="#55efc4" stroke-width="1"/>
<text x="205" y="80" text-anchor="middle" fill="#55efc4" font-size="7">Парогене-</text>
<text x="205" y="90" text-anchor="middle" fill="#55efc4" font-size="7">ратор</text>
<!-- Turbine -->
<rect x="260" y="65" width="50" height="50" rx="5" fill="#74b9ff" opacity="0.15" stroke="#74b9ff" stroke-width="1"/>
<text x="285" y="90" text-anchor="middle" fill="#74b9ff" font-size="7">Турбина</text>
<text x="285" y="100" text-anchor="middle" fill="#636e72" font-size="6">и генератор</text>
<!-- Connection -->
<line x1="150" y1="90" x2="175" y2="90" stroke="#55efc4" stroke-width="1.5"/>
<line x1="235" y1="90" x2="260" y2="90" stroke="#74b9ff" stroke-width="1.5"/>
<!-- Electricity -->
<line x1="310" y1="90" x2="360" y2="90" stroke="#ffd700" stroke-width="2"/>
<text x="365" y="87" fill="#ffd700" font-size="7">~</text>
<text x="340" y="105" text-anchor="middle" fill="#ffd700" font-size="7">Электричество</text>
<!-- Components list -->
<rect x="20" y="150" width="360" height="140" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="170" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Компоненты реактора</text>
<text x="50" y="192" fill="#ffd700" font-size="9">1. Топливо (U-235, Pu-239)</text>
<text x="50" y="210" fill="#55efc4" font-size="9">2. Замедлитель (H2O, графит)</text>
<text x="50" y="228" fill="#74b9ff" font-size="9">3. Теплоноситель (вода, Na)</text>
<text x="50" y="246" fill="#ff7675" font-size="9">4. Регул. стержни (B, Cd)</text>
<text x="50" y="264" fill="#a29bfe" font-size="9">5. Биологическая защита</text>
<text x="50" y="282" fill="#636e72" font-size="8">Первая АЭС: Обнинск, 1954 г.</text>

</svg>