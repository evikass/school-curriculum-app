<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs><linearGradient id="bg25" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#16213e"/></linearGradient></defs>
  <rect width="400" height="300" fill="url(#bg25)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Трансформатор</text>
  <!-- Core -->
  <rect x="130" y="50" width="140" height="100" rx="5" fill="#636e72" opacity="0.3" stroke="#636e72" stroke-width="2"/>
  <!-- Primary coil (left) -->
  <path d="M100,60 C95,50 90,70 85,60 C80,50 75,70 70,60 C65,50 60,70 55,60" fill="none" stroke="#ff7675" stroke-width="2.5"/>
  <path d="M100,90 C95,80 90,100 85,90 C80,80 75,100 70,90 C65,80 60,100 55,90" fill="none" stroke="#ff7675" stroke-width="2.5"/>
  <path d="M100,120 C95,110 90,130 85,120 C80,110 75,130 70,120 C65,110 60,130 55,120" fill="none" stroke="#ff7675" stroke-width="2.5"/>
  <text x="75" y="45" text-anchor="middle" fill="#ff7675" font-size="9">N1 витков</text>
  <!-- Secondary coil (right) -->
  <path d="M300,60 C305,50 310,70 315,60 C320,50 325,70 330,60 C335,50 340,70 345,60 C350,50 355,70 360,60" fill="none" stroke="#74b9ff" stroke-width="2.5"/>
  <path d="M300,90 C305,80 310,100 315,90 C320,80 325,100 330,90 C335,80 340,100 345,90 C350,80 355,100 360,90" fill="none" stroke="#74b9ff" stroke-width="2.5"/>
  <text x="330" y="45" text-anchor="middle" fill="#74b9ff" font-size="9">N2 витков</text>
  <!-- Labels -->
  <text x="40" y="75" fill="#ff7675" font-size="10">U1</text>
  <text x="365" y="75" fill="#74b9ff" font-size="10">U2</text>
  <!-- AC source -->
  <circle cx="30" cy="110" r="12" fill="none" stroke="#ffd700" stroke-width="1.5"/>
  <text x="30" y="114" text-anchor="middle" fill="#ffd700" font-size="10">~</text>
  <line x1="30" y1="98" x2="55" y2="85" stroke="#ffd700" stroke-width="1"/>
  <line x1="30" y1="122" x2="55" y2="120" stroke="#ffd700" stroke-width="1"/>
  <!-- Load -->
  <rect x="355" y="100" width="25" height="25" rx="3" fill="#2d3436" stroke="#a29bfe" stroke-width="1"/>
  <text x="367" y="117" text-anchor="middle" fill="#a29bfe" font-size="8">R</text>
  <line x1="360" y1="100" x2="360" y2="90" stroke="#74b9ff" stroke-width="1"/>
  <line x1="360" y1="125" x2="360" y2="140" stroke="#74b9ff" stroke-width="1"/>
  <!-- Formula -->
  <rect x="40" y="170" width="320" height="55" rx="8" fill="#6c5ce7" opacity="0.15" stroke="#a29bfe" stroke-width="1"/>
  <text x="200" y="195" text-anchor="middle" fill="#ffeaa7" font-size="11" font-weight="bold">Коэффициент трансформации</text>
  <text x="200" y="215" text-anchor="middle" fill="#55efc4" font-size="16" font-weight="bold">k = U1/U2 = N1/N2</text>
  <!-- Step up / step down -->
  <rect x="20" y="235" width="175" height="55" rx="8" fill="#2d3436" opacity="0.6"/>
  <text x="107" y="255" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Повышающий</text>
  <text x="107" y="272" text-anchor="middle" fill="#dfe6e9" font-size="9">N2 > N1, U2 > U1</text>
  <text x="107" y="286" text-anchor="middle" fill="#636e72" font-size="8">Электростанция -> ЛЭП</text>
  <rect x="205" y="235" width="175" height="55" rx="8" fill="#2d3436" opacity="0.6"/>
  <text x="292" y="255" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Понижающий</text>
  <text x="292" y="272" text-anchor="middle" fill="#dfe6e9" font-size="9">N2 < N1, U2 < U1</text>
  <text x="292" y="286" text-anchor="middle" fill="#636e72" font-size="8">ЛЭП -> Потребитель</text>
</svg>