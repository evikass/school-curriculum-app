<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Плесневые грибы и дрожжи</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 15</text>
  
  <rect x="30" y="70" width="140" height="190" fill="#E8F5E9" rx="6" stroke="#4CAF50" stroke-width="1"/>
  <text x="100" y="90" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Мукор</text>
  <text x="100" y="105" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(белая плесень)</text>
  <rect x="75" y="150" width="50" height="30" fill="#EEEEEE" rx="2"/>
  <line x1="100" y1="130" x2="100" y2="150" stroke="#999" stroke-width="2"/>
  <circle cx="100" cy="125" r="8" fill="#424242"/>
  <text x="100" y="140" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">споры</text>
  <text x="100" y="200" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Неклеточный</text>
  <text x="100" y="212" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">мицелий</text>
  <text x="100" y="228" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(1 многоядерная</text>
  <text x="100" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">клетка)</text>
  <rect x="185" y="70" width="140" height="190" fill="#E3F2FD" rx="6" stroke="#1565C0" stroke-width="1"/>
  <text x="255" y="90" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" text-anchor="middle" font-weight="bold">Пеницилл</text>
  <text x="255" y="105" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(зелёная плесень)</text>
  <line x1="255" y1="130" x2="240" y2="155" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="255" y1="130" x2="255" y2="155" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="255" y1="130" x2="270" y2="155" stroke="#4CAF50" stroke-width="1.5"/>
  <circle cx="240" cy="158" r="4" fill="#81C784"/>
  <circle cx="255" cy="158" r="4" fill="#81C784"/>
  <circle cx="270" cy="158" r="4" fill="#81C784"/>
  <text x="255" y="140" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">кисточка</text>
  <text x="255" y="200" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Многоклеточный</text>
  <text x="255" y="212" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">мицелий</text>
  <text x="255" y="228" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" font-weight="bold" text-anchor="middle">→ Пенициллин</text>
  <text x="255" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(антибиотик)</text>
  <rect x="340" y="70" width="140" height="190" fill="#FFF3E0" rx="6" stroke="#E65100" stroke-width="1"/>
  <text x="410" y="90" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Дрожжи</text>
  <text x="410" y="105" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(одноклеточные)</text>
  <ellipse cx="410" cy="145" rx="18" ry="12" fill="#FFB74D"/>
  <ellipse cx="425" cy="138" rx="8" ry="6" fill="#FFA726"/>
  <text x="410" y="148" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">ядро</text>
  <text x="425" y="141" font-family="Arial,sans-serif" font-size="4" fill="white" text-anchor="middle">почка</text>
  <text x="410" y="200" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Размножение:</text>
  <text x="410" y="212" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">почкование</text>
  <text x="410" y="228" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold" text-anchor="middle">Брожение:</text>
  <text x="410" y="240" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">сахар → спирт + CO2</text>
  <rect x="30" y="275" width="450" height="50" fill="#FFF9C4" rx="6" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="295" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">Пенициллин открыл А. Флеминг (1929) — первый антибиотик</text>
  <text x="250" y="312" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Дрожжи: хлебопечение (CO2 поднимает тесто) · Пивоварение · Виноделие</text>
  
</svg>