<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Среды обитания организмов</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 4</text>
  
  <rect x="30" y="70" width="210" height="90" fill="#81D4FA" rx="8"/>
  <text x="135" y="90" font-family="Arial,sans-serif" font-size="10" fill="#01579B" text-anchor="middle" font-weight="bold">Водная среда</text>
  <text x="135" y="106" font-family="Arial,sans-serif" font-size="7" fill="#0277BD" text-anchor="middle">Стабильная температура</text>
  <text x="135" y="118" font-family="Arial,sans-serif" font-size="7" fill="#0277BD" text-anchor="middle">Мало света и кислорода</text>
  <text x="135" y="130" font-family="Arial,sans-serif" font-size="7" fill="#0277BD" text-anchor="middle">🐟 жабры, плавники, слизь</text>
  <text x="135" y="148" font-family="Arial,sans-serif" font-size="7" fill="#0277BD" text-anchor="middle">Обтекаемая форма тела</text>
  <rect x="260" y="70" width="210" height="90" fill="#A5D6A7" rx="8"/>
  <text x="365" y="90" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Наземно-воздушная</text>
  <text x="365" y="106" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Много кислорода и света</text>
  <text x="365" y="118" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Колебания температуры</text>
  <text x="365" y="130" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">🐦 лёгкие, скелет, шерсть</text>
  <text x="365" y="148" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Защитные покровы</text>
  <rect x="30" y="180" width="210" height="90" fill="#8D6E63" rx="8"/>
  <text x="135" y="200" font-family="Arial,sans-serif" font-size="10" fill="#FFF" text-anchor="middle" font-weight="bold">Почвенная среда</text>
  <text x="135" y="216" font-family="Arial,sans-serif" font-size="7" fill="#EFEBE9" text-anchor="middle">Мало света, стабильные условия</text>
  <text x="135" y="228" font-family="Arial,sans-serif" font-size="7" fill="#EFEBE9" text-anchor="middle">Много влаги и органики</text>
  <text x="135" y="240" font-family="Arial,sans-serif" font-size="7" fill="#EFEBE9" text-anchor="middle">🐀 копательные лапы</text>
  <text x="135" y="252" font-family="Arial,sans-serif" font-size="7" fill="#EFEBE9" text-anchor="middle">Слабое зрение, компактное тело</text>
  <rect x="260" y="180" width="210" height="90" fill="#CE93D8" rx="8"/>
  <text x="365" y="200" font-family="Arial,sans-serif" font-size="10" fill="#4A148C" text-anchor="middle" font-weight="bold">Организм как среда</text>
  <text x="365" y="216" font-family="Arial,sans-serif" font-size="7" fill="#6A1B9A" text-anchor="middle">Паразиты внутри хозяина</text>
  <text x="365" y="228" font-family="Arial,sans-serif" font-size="7" fill="#6A1B9A" text-anchor="middle">Постоянные условия</text>
  <text x="365" y="240" font-family="Arial,sans-serif" font-size="7" fill="#6A1B9A" text-anchor="middle">🦠 присоски, крючья</text>
  <text x="365" y="252" font-family="Arial,sans-serif" font-size="7" fill="#6A1B9A" text-anchor="middle">Редукция органов пищеварения</text>
  <rect x="50" y="290" width="400" height="30" fill="#FFF9C4" rx="4" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="310" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">Приспособленность к среде — результат длительной эволюции</text>
  
</svg>