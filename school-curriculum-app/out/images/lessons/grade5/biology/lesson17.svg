<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Разнообразие и значение растений</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 17</text>
  
  <rect x="30" y="70" width="440" height="40" fill="#4CAF50" rx="6"/>
  <text x="250" y="95" font-family="Arial,sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">Растения — продуценты органических веществ</text>
  <rect x="30" y="125" width="210" height="90" fill="#C8E6C9" rx="6"/>
  <text x="135" y="145" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Споровые растения</text>
  <text x="50" y="165" font-family="Arial,sans-serif" font-size="7" fill="#555">🌊 Водоросли — таллом</text>
  <text x="50" y="180" font-family="Arial,sans-serif" font-size="7" fill="#555">🌿 Мхи — стебель + листья</text>
  <text x="50" y="195" font-family="Arial,sans-serif" font-size="7" fill="#555">🍃 Папоротники, хвощи, плауны</text>
  <text x="50" y="210" font-family="Arial,sans-serif" font-size="7" fill="#555">Размножение: споры</text>
  <rect x="260" y="125" width="210" height="90" fill="#A5D6A7" rx="6"/>
  <text x="365" y="145" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Семенные растения</text>
  <text x="280" y="165" font-family="Arial,sans-serif" font-size="7" fill="#555">🌲 Голосеменные — шишки</text>
  <text x="280" y="180" font-family="Arial,sans-serif" font-size="7" fill="#555">🌸 Покрытосеменные — цветки</text>
  <text x="280" y="195" font-family="Arial,sans-serif" font-size="7" fill="#555">Размножение: семена</text>
  <text x="280" y="210" font-family="Arial,sans-serif" font-size="7" fill="#555">(без воды!)</text>
  <rect x="30" y="230" width="440" height="90" fill="#E8F5E9" rx="6" stroke="#4CAF50" stroke-width="1"/>
  <text x="250" y="250" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" text-anchor="middle" font-weight="bold">Значение растений:</text>
  <text x="70" y="270" font-family="Arial,sans-serif" font-size="7" fill="#555">🌬️ Выделяют O2 при фотосинтезе</text>
  <text x="270" y="270" font-family="Arial,sans-serif" font-size="7" fill="#555">🍞 Пища для всех организмов</text>
  <text x="70" y="288" font-family="Arial,sans-serif" font-size="7" fill="#555">🏠 Строительный материал</text>
  <text x="270" y="288" font-family="Arial,sans-serif" font-size="7" fill="#555">💊 Лекарства</text>
  <text x="70" y="306" font-family="Arial,sans-serif" font-size="7" fill="#555">🎨 Красители, волокна</text>
  <text x="270" y="306" font-family="Arial,sans-serif" font-size="7" fill="#555">♻️ Круговорот веществ</text>
  
</svg>