<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Происхождение растений</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 24</text>
  
  <rect x="30" y="70" width="440" height="35" fill="#2E7D32" rx="4"/>
  <text x="250" y="92" font-family="Arial,sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Эволюция растений: от водорослей к цветковым</text>
  <rect x="30" y="120" width="85" height="55" fill="#81D4FA" rx="6"/>
  <text x="72" y="145" font-family="Arial,sans-serif" font-size="8" fill="#01579B" text-anchor="middle" font-weight="bold">Водоросли</text>
  <text x="72" y="160" font-family="Arial,sans-serif" font-size="6" fill="#0277BD" text-anchor="middle">2 млрд лет</text>
  <text x="72" y="170" font-family="Arial,sans-serif" font-size="6" fill="#0277BD" text-anchor="middle">таллом</text>
  <line x1="115" y1="147" x2="125" y2="147" stroke="#4CAF50" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="125" y="120" width="70" height="55" fill="#A5D6A7" rx="6"/>
  <text x="160" y="145" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Мхи</text>
  <text x="160" y="160" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">400 млн</text>
  <text x="160" y="170" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">ст.+л.</text>
  <line x1="195" y1="147" x2="205" y2="147" stroke="#4CAF50" stroke-width="2"/>
  <rect x="205" y="120" width="80" height="55" fill="#66BB6A" rx="6"/>
  <text x="245" y="142" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Папоротники</text>
  <text x="245" y="160" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9" text-anchor="middle">300 млн</text>
  <text x="245" y="170" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9" text-anchor="middle">корень+ств+л</text>
  <line x1="285" y1="147" x2="295" y2="147" stroke="#4CAF50" stroke-width="2"/>
  <rect x="295" y="120" width="85" height="55" fill="#4CAF50" rx="6"/>
  <text x="337" y="142" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Голосеменные</text>
  <text x="337" y="160" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9" text-anchor="middle">150 млн</text>
  <text x="337" y="170" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9" text-anchor="middle">семена</text>
  <line x1="380" y1="147" x2="390" y2="147" stroke="#4CAF50" stroke-width="2"/>
  <rect x="390" y="120" width="80" height="55" fill="#E91E63" rx="6"/>
  <text x="430" y="138" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle" font-weight="bold">Покрыто-</text>
  <text x="430" y="148" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle" font-weight="bold">семенные</text>
  <text x="430" y="160" font-family="Arial,sans-serif" font-size="6" fill="#FCE4EC" text-anchor="middle">130 млн</text>
  <text x="430" y="170" font-family="Arial,sans-serif" font-size="6" fill="#FCE4EC" text-anchor="middle">цветок+плод</text>
  <rect x="30" y="195" width="440" height="130" fill="#FFF9C4" rx="6" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="215" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Ключевые эволюционные этапы:</text>
  <text x="50" y="235" font-family="Arial,sans-serif" font-size="8" fill="#555">1. Выход на сушу (от водорослей → мхи) — появление стебля и листьев</text>
  <text x="50" y="252" font-family="Arial,sans-serif" font-size="8" fill="#555">2. Появление корней и проводящей ткани (папоротники)</text>
  <text x="50" y="269" font-family="Arial,sans-serif" font-size="8" fill="#555">3. Семя — запас питания, защита, оплодотворение без воды (голосеменные)</text>
  <text x="50" y="286" font-family="Arial,sans-serif" font-size="8" fill="#555">4. Цветок и плод — привлечение опылителей, защита семян (покрытосеменные)</text>
  <text x="250" y="315" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Первые наземные растения произошли от зелёных водорослей</text>
  
</svg>