<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Строение и жизнедеятельность бактерий</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 11</text>
  
  <ellipse cx="250" cy="140" rx="50" ry="35" fill="#8D6E63" stroke="#5D4037" stroke-width="2"/>
  <ellipse cx="250" cy="140" rx="42" ry="28" fill="#A1887F" opacity="0.6"/>
  <ellipse cx="240" cy="130" rx="12" ry="8" fill="#4E342E"/>
  <text x="240" y="133" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">ДНК</text>
  <circle cx="265" cy="140" r="3" fill="#D7CCC8"/>
  <text x="250" y="185" font-family="Arial,sans-serif" font-size="9" fill="#4E342E" text-anchor="middle" font-weight="bold">Бактерия (прокариот)</text>
  <rect x="40" y="205" width="200" height="110" fill="#EFEBE9" rx="6"/>
  <text x="140" y="225" font-family="Arial,sans-serif" font-size="9" fill="#4E342E" text-anchor="middle" font-weight="bold">Строение:</text>
  <text x="60" y="245" font-family="Arial,sans-serif" font-size="7" fill="#555">• Клеточная стенка (нет целлюлозы)</text>
  <text x="60" y="260" font-family="Arial,sans-serif" font-size="7" fill="#555">• Мембрана</text>
  <text x="60" y="275" font-family="Arial,sans-serif" font-size="7" fill="#555">• Цитоплазма с рибосомами</text>
  <text x="60" y="290" font-family="Arial,sans-serif" font-size="7" fill="#555">• Нуклеоид (кольцевая ДНК)</text>
  <text x="60" y="305" font-family="Arial,sans-serif" font-size="7" fill="#555">• Нет ядра, митохондрий, ЭПС</text>
  <rect x="260" y="205" width="210" height="110" fill="#E3F2FD" rx="6"/>
  <text x="365" y="225" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" text-anchor="middle" font-weight="bold">Жизнедеятельность:</text>
  <text x="280" y="245" font-family="Arial,sans-serif" font-size="7" fill="#555">• Автотрофы / Гетеротрофы</text>
  <text x="280" y="260" font-family="Arial,sans-serif" font-size="7" fill="#555">• Аэробные / Анаэробные</text>
  <text x="280" y="275" font-family="Arial,sans-serif" font-size="7" fill="#555">• Деление каждые 20–30 мин</text>
  <text x="280" y="290" font-family="Arial,sans-serif" font-size="7" fill="#555">• Жгутики для движения</text>
  <text x="280" y="305" font-family="Arial,sans-serif" font-size="7" fill="#555">• Споры при неблагоприятных условиях</text>
  <circle cx="330" cy="140" r="4" fill="#8D6E63"/><line x1="330" y1="136" x2="330" y2="110" stroke="#5D4037" stroke-width="1.5"/>
  <circle cx="180" cy="140" r="5" fill="#A1887F"/><line x1="180" y1="135" x2="180" y2="120" stroke="#8D6E63" stroke-width="1"/><line x1="176" y1="120" x2="184" y2="120" stroke="#8D6E63" stroke-width="1"/>
  <text x="330" y="105" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">жгутик</text>
  <text x="180" y="115" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">спора</text>
  
</svg>