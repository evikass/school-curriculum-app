  <text x="250" y="162" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Мицелий</text>
  <text x="250" y="174" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(гифы)</text>
  <rect x="300" y="125" width="140" height="60" fill="#EF5350" rx="6"/>
