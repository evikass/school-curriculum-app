  <text x="280" y="280" font-family="Arial,sans-serif" font-size="7" fill="#555">🍄 Бесполое — споры</text>
  <text x="280" y="298" font-family="Arial,sans-serif" font-size="7" fill="#555">💕 Половое — слияние гамет</text>
  
