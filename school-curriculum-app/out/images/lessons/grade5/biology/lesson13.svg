  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 13</text>
  
  <rect x="170" y="65" width="160" height="35" fill="#795548" rx="6"/>
