<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Лишайники</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 19</text>
  
  <rect x="140" y="65" width="220" height="35" fill="#9E9E9E" rx="6"/>
  <text x="250" y="87" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Лишайник = гриб + водоросль</text>
  <rect x="60" y="115" width="160" height="70" fill="#A5D6A7" rx="8"/>
  <text x="140" y="135" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Водоросль</text>
  <text x="140" y="152" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Фотосинтез →</text>
  <text x="140" y="165" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">органические вещества</text>
  <rect x="280" y="115" width="160" height="70" fill="#8D6E63" rx="8"/>
  <text x="360" y="135" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Гриб</text>
  <text x="360" y="152" font-family="Arial,sans-serif" font-size="7" fill="#EFEBE9" text-anchor="middle">Вода + минеральные соли →</text>
  <text x="360" y="165" font-family="Arial,sans-serif" font-size="7" fill="#EFEBE9" text-anchor="middle">защита от высыхания</text>
  <text x="250" y="145" font-family="Arial,sans-serif" font-size="12" fill="#333" text-anchor="middle">⟷</text>
  <rect x="30" y="200" width="140" height="55" fill="#EEEEEE" rx="4"/>
  <text x="100" y="220" font-family="Arial,sans-serif" font-size="8" fill="#424242" text-anchor="middle" font-weight="bold">Накипные</text>
  <text x="100" y="235" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Корочка на камнях</text>
  <text x="100" y="247" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Пионеры заселения</text>
  <rect x="180" y="200" width="140" height="55" fill="#C8E6C9" rx="4"/>
  <text x="250" y="220" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Листовые</text>
  <text x="250" y="235" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Пластинки, ризины</text>
  <text x="250" y="247" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Ксантория</text>
  <rect x="330" y="200" width="140" height="55" fill="#A5D6A7" rx="4"/>
  <text x="400" y="220" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Кустистые</text>
  <text x="400" y="235" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Ветвящиеся кустики</text>
  <text x="400" y="247" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Ягель, Уснея</text>
  <rect x="30" y="270" width="440" height="55" fill="#E3F2FD" rx="6" stroke="#1565C0" stroke-width="1"/>
  <text x="250" y="290" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Индикаторы чистоты воздуха — гибнут при загрязнении SO2</text>
  <text x="250" y="308" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ягель — корм оленей в тундре · Пионеры — первые заселяют голые скалы · Создают почву</text>
  
</svg>