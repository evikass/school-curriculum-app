<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Плод</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 28</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Fruit structure -->
<text x="130" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение плода (ягода)</text>

<g transform="translate(15,72)">
<!-- Whole fruit -->
<ellipse cx="60" cy="50" rx="35" ry="30" fill="#E53935" stroke="#C62828" stroke-width="1.2"/>
<!-- Highlight -->
<ellipse cx="48" cy="40" rx="10" ry="8" fill="#EF5350" opacity="0.5"/>

<!-- Labels on whole fruit -->
<text x="100" y="35" font-family="Arial,sans-serif" font-size="6" fill="#C62828">кожица (эпикарпий)</text>
<line x1="85" y1="37" x2="98" y2="36" stroke="#C62828" stroke-width="0.3"/>

<!-- Cross-section -->
<ellipse cx="175" cy="50" rx="35" ry="30" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
<!-- Flesh (мезокарпий) -->
<ellipse cx="175" cy="50" rx="28" ry="23" fill="#FF8A80" stroke="#E53935" stroke-width="0.5"/>
<!-- Seeds (семена) -->
<circle cx="165" cy="45" r="4" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>
<circle cx="185" cy="45" r="4" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>
<circle cx="170" cy="58" r="4" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>
<circle cx="182" cy="58" r="3.5" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>
<circle cx="175" cy="50" r="3" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>

<!-- Section labels -->
<text x="218" y="35" font-family="Arial,sans-serif" font-size="6" fill="#C62828">эпикарпий (кожица)</text>
<line x1="207" y1="37" x2="216" y2="36" stroke="#C62828" stroke-width="0.3"/>
<text x="218" y="48" font-family="Arial,sans-serif" font-size="6" fill="#E53935">мезокарпий (мякоть)</text>
<line x1="205" y1="48" x2="216" y2="48" stroke="#E53935" stroke-width="0.3"/>
<text x="218" y="60" font-family="Arial,sans-serif" font-size="6" fill="#FBC02D">семена</text>
<line x1="186" y1="55" x2="216" y2="58" stroke="#FBC02D" stroke-width="0.3"/>

<text x="118" y="88" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="middle">окарпий = 3 слоя: эпи- + мезо- + эндокарпий</text>
</g>

<!-- Section 2: Succulent fruits -->
<text x="250" y="110" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сочные плоды</text>

<g transform="translate(10,116)">
<!-- Berry (Ягода) -->
<rect x="0" y="0" width="95" height="55" rx="4" fill="white" fill-opacity="0.4" stroke="#E53935" stroke-width="0.5"/>
<text x="47" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828" text-anchor="middle">Ягода</text>
<ellipse cx="35" cy="32" rx="12" ry="10" fill="#E53935" stroke="#C62828" stroke-width="0.8"/>
<circle cx="32" cy="30" r="2" fill="#FFF9C4"/>
<circle cx="38" cy="32" r="2" fill="#FFF9C4"/>
<circle cx="35" cy="36" r="2" fill="#FFF9C4"/>
<text x="47" y="48" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">смородина, томат</text>

<!-- Drupe (Костянка) -->
<rect x="100" y="0" width="95" height="55" rx="4" fill="white" fill-opacity="0.4" stroke="#FF9800" stroke-width="0.5"/>
<text x="147" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Костянка</text>
<ellipse cx="135" cy="30" rx="12" ry="11" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
<ellipse cx="135" cy="30" rx="6" ry="5.5" fill="#795548" stroke="#5D4037" stroke-width="0.8"/>
<circle cx="135" cy="30" r="2" fill="#FFF9C4"/>
<text x="147" y="48" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">вишня, слива, персик</text>

<!-- Apple-type (Яблоко) -->
<rect x="200" y="0" width="95" height="55" rx="4" fill="white" fill-opacity="0.4" stroke="#4CAF50" stroke-width="0.5"/>
<text x="247" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Яблоко</text>
<ellipse cx="237" cy="30" rx="13" ry="11" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
<!-- Core with seeds -->
<ellipse cx="237" cy="30" rx="5" ry="4" fill="#E8F5E9" stroke="#81C784" stroke-width="0.5"/>
<circle cx="235" cy="28" r="1.5" fill="#5D4037"/>
<circle cx="239" cy="32" r="1.5" fill="#5D4037"/>
<text x="247" y="48" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">яблоня, груша, рябина</text>

<!-- Pumpkin-type (Тыквина) -->
<rect x="300" y="0" width="95" height="55" rx="4" fill="white" fill-opacity="0.4" stroke="#FF9800" stroke-width="0.5"/>
<text x="347" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Тыквина</text>
<ellipse cx="337" cy="30" rx="14" ry="11" fill="#FFA726" stroke="#E65100" stroke-width="0.8"/>
<ellipse cx="337" cy="30" rx="8" ry="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="0.5"/>
<circle cx="334" cy="29" r="1.5" fill="#FFF9C4"/>
<circle cx="340" cy="31" r="1.5" fill="#FFF9C4"/>
<text x="347" y="48" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">тыква, огурец, дыня</text>

<!-- Hesperidium (Померанец) -->
<rect x="400" y="0" width="85" height="55" rx="4" fill="white" fill-opacity="0.4" stroke="#FFC107" stroke-width="0.5"/>
<text x="442" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17" text-anchor="middle">Померанец</text>
<ellipse cx="432" cy="30" rx="13" ry="11" fill="#FFC107" stroke="#F57F17" stroke-width="0.8"/>
<!-- Segments -->
<path d="M425,22 Q432,28 425,36" fill="none" stroke="#FFD54F" stroke-width="0.5"/>
<path d="M439,22 Q432,28 439,36" fill="none" stroke="#FFD54F" stroke-width="0.5"/>
<text x="442" y="48" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">апельсин, лимон</text>
</g>

<!-- Section 3: Dry fruits -->
<text x="250" y="185" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сухие плоды</text>

<!-- Dry dehiscent (раскрывающиеся) -->
<g transform="translate(10,192)">
<rect x="0" y="0" width="230" height="65" rx="4" fill="white" fill-opacity="0.4" stroke="#795548" stroke-width="0.5"/>
<text x="115" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#4E342E" text-anchor="middle">Раскрывающиеся</text>

<!-- Bean/Legume (Боб) -->
<rect x="8" y="18" width="30" height="10" rx="3" fill="#A1887F" stroke="#795548" stroke-width="0.7"/>
<line x1="12" y1="23" x2="34" y2="23" stroke="#5D4037" stroke-width="0.5"/>
<circle cx="18" cy="20" r="1.5" fill="#5D4037"/>
<circle cx="26" cy="20" r="1.5" fill="#5D4037"/>
<text x="23" y="38" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle">Боб</text>
<text x="23" y="45" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">горох, фасоль</text>

<!-- Pod/Silique (Стручок) -->
<rect x="48" y="18" width="30" height="8" rx="2" fill="#A1887F" stroke="#795548" stroke-width="0.7"/>
<line x1="50" y1="22" x2="76" y2="22" stroke="#5D4037" stroke-width="0.5"/>
<circle cx="56" cy="20" r="1.5" fill="#5D4037"/>
<circle cx="64" cy="20" r="1.5" fill="#5D4037"/>
<circle cx="72" cy="20" r="1.5" fill="#5D4037"/>
<text x="63" y="38" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle">Стручок</text>
<text x="63" y="45" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">капуста, редис</text>

<!-- Follicle (Листовка) -->
<path d="M98,28 Q105,18 108,28" fill="#A1887F" stroke="#795548" stroke-width="0.7"/>
<circle cx="103" cy="24" r="1.5" fill="#5D4037"/>
<text x="105" y="38" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle">Листовка</text>
<text x="105" y="45" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">лютик, дельфиниум</text>

<!-- Capsule (Коробочка) -->
<ellipse cx="150" cy="23" rx="8" ry="10" fill="#8D6E63" stroke="#5D4037" stroke-width="0.7"/>
<line x1="142" y1="20" x2="158" y2="20" stroke="#5D4037" stroke-width="0.3"/>
<line x1="142" y1="26" x2="158" y2="26" stroke="#5D4037" stroke-width="0.3"/>
<text x="150" y="38" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle">Коробочка</text>
<text x="150" y="45" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">мак, хлопчатник</text>

<!-- Opening mechanism icon -->
<text x="200" y="22" font-family="Arial,sans-serif" font-size="8" fill="#795548" text-anchor="middle">→</text>
<text x="200" y="32" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">раскры-</text>
<text x="200" y="38" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">ваются</text>
</g>

<!-- Dry indehiscent (нераскрывающиеся) -->
<g transform="translate(255,192)">
<rect x="0" y="0" width="230" height="65" rx="4" fill="white" fill-opacity="0.4" stroke="#795548" stroke-width="0.5"/>
<text x="115" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#4E342E" text-anchor="middle">Нераскрывающиеся</text>

<!-- Achene (Семянка) -->
<ellipse cx="25" cy="25" rx="8" ry="5" fill="#A1887F" stroke="#795548" stroke-width="0.7"/>
<path d="M33,24 Q38,22 40,24" fill="none" stroke="#BCAAA4" stroke-width="0.5"/>
<text x="25" y="38" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle">Семянка</text>
<text x="25" y="45" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">подсолнечник</text>

<!-- Nut (Орех) -->
<ellipse cx="70" cy="25" rx="8" ry="7" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
<path d="M65,18 Q70,15 75,18" fill="#6D4C41" stroke="#5D4037" stroke-width="0.5"/>
<text x="70" y="38" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle">Орех</text>
<text x="70" y="45" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">лещина, жёлудь</text>

<!-- Caryopsis (Зерновка) -->
<ellipse cx="115" cy="25" rx="10" ry="5" fill="#FFCC80" stroke="#E65100" stroke-width="0.7"/>
<text x="115" y="38" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle">Зерновка</text>
<text x="115" y="45" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">пшеница, кукуруза</text>

<!-- Samara (Крылатка) -->
<ellipse cx="160" cy="27" rx="6" ry="4" fill="#A1887F" stroke="#795548" stroke-width="0.7"/>
<path d="M166,25 Q175,20 185,22" fill="#BCAAA4" stroke="#A1887F" stroke-width="0.5" opacity="0.7"/>
<text x="172" y="38" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle">Крылатка</text>
<text x="172" y="45" font-family="Arial,sans-serif" font-size="4.5" fill="#888" text-anchor="middle">клён, ясень</text>

<text x="200" y="22" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">не</text>
<text x="200" y="28" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">раскры-</text>
<text x="200" y="34" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">ваются</text>
</g>

<!-- Section 4: Fruit dispersal -->
<text x="250" y="272" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Распространение плодов и семян</text>

<g transform="translate(10,280)">
<rect x="0" y="0" width="470" height="55" rx="5" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Wind (анемохория) -->
<g transform="translate(15,5)">
<text x="0" y="10" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2196F3">Ветер</text>
<text x="0" y="18" font-family="Arial,sans-serif" font-size="5" fill="#888">анемохория</text>
<!-- Dandelion seed -->
<line x1="25" y1="18" x2="25" y2="28" stroke="#795548" stroke-width="0.8"/>
<path d="M20,15 Q25,10 30,15" fill="none" stroke="#BDBDBD" stroke-width="0.5"/>
<path d="M18,17 Q25,8 32,17" fill="none" stroke="#BDBDBD" stroke-width="0.5"/>
<path d="M16,20 Q25,6 34,20" fill="none" stroke="#BDBDBD" stroke-width="0.5"/>
<text x="25" y="40" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">одуванчик</text>
</g>

<!-- Water (гидрохория) -->
<g transform="translate(80,5)">
<text x="0" y="10" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1565C0">Вода</text>
<text x="0" y="18" font-family="Arial,sans-serif" font-size="5" fill="#888">гидрохория</text>
<ellipse cx="25" cy="30" rx="12" ry="8" fill="#8D6E63" stroke="#5D4037" stroke-width="0.7"/>
<path d="M15,25 Q25,22 35,25" fill="none" stroke="#2196F3" stroke-width="0.5"/>
<text x="25" y="42" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">кокос</text>
</g>

<!-- Animals (зоохория) -->
<g transform="translate(155,5)">
<text x="0" y="10" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#FF9800">Животные</text>
<text x="0" y="18" font-family="Arial,sans-serif" font-size="5" fill="#888">зоохория</text>
<!-- Burdock/repeshnik hooks -->
<circle cx="30" cy="28" r="5" fill="#A1887F" stroke="#795548" stroke-width="0.7"/>
<path d="M25,25 Q23,22 25,20" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<path d="M35,25 Q37,22 35,20" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<path d="M28,33 Q26,36 28,38" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<text x="30" y="42" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">репейник</text>
</g>

<!-- Self-dispersal (автохория) -->
<g transform="translate(235,5)">
<text x="0" y="10" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#4CAF50">Саморазбр.</text>
<text x="0" y="18" font-family="Arial,sans-serif" font-size="5" fill="#888">автохория</text>
<!-- Touch-me-not / Impatiens -->
<ellipse cx="30" cy="25" rx="6" ry="8" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.7"/>
<path d="M30,17 L32,10" stroke="#2E7D32" stroke-width="0.5"/>
<path d="M28,12 Q30,8 32,12" fill="none" stroke="#C62828" stroke-width="0.8"/>
<text x="30" y="42" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">недотрога</text>
</g>

<!-- Summary -->
<g transform="translate(330,5)">
<text x="0" y="10" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Функции плода:</text>
<text x="0" y="20" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Защита семян</text>
<text x="0" y="28" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Питание зародыша</text>
<text x="0" y="36" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Распространение семян</text>
<text x="0" y="44" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Привлечение животных</text>
</g>
</g>
</svg>