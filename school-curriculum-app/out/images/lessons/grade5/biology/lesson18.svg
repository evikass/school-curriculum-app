<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Водоросли</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 18</text>
  
  <rect x="30" y="70" width="130" height="140" fill="#81C784" rx="6" stroke="#4CAF50" stroke-width="1"/>
  <text x="95" y="90" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Зелёные</text>
  <circle cx="95" cy="120" r="12" fill="#4CAF50" opacity="0.7"/>
  <circle cx="80" cy="135" r="8" fill="#66BB6A" opacity="0.7"/>
  <circle cx="110" cy="130" r="10" fill="#4CAF50" opacity="0.6"/>
  <text x="95" y="160" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Одноклеточные</text>
  <text x="95" y="172" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">и многоклеточные</text>
  <text x="95" y="186" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Хлорелла,</text>
  <text x="95" y="197" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Хламидомонада</text>
  <rect x="175" y="70" width="150" height="140" fill="#8D6E63" rx="6" stroke="#5D4037" stroke-width="1"/>
  <text x="250" y="90" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Бурые</text>
  <path d="M230 160 Q250 110 270 160" fill="#A1887F" stroke="#8D6E63" stroke-width="2"/>
  <line x1="250" y1="160" x2="250" y2="175" stroke="#6D4C41" stroke-width="3"/>
  <text x="250" y="195" font-family="Arial,sans-serif" font-size="6" fill="#EFEBE9" text-anchor="middle">Самые крупные</text>
  <text x="250" y="207" font-family="Arial,sans-serif" font-size="6" fill="#EFEBE9" text-anchor="middle">Морские</text>
  <text x="250" y="195" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Ламинария, Фукус</text>
  <rect x="340" y="70" width="130" height="140" fill="#CE93D8" rx="6" stroke="#7B1FA2" stroke-width="1"/>
  <text x="405" y="90" font-family="Arial,sans-serif" font-size="9" fill="#4A148C" text-anchor="middle" font-weight="bold">Красные</text>
  <path d="M390 120 Q405 100 420 120 Q405 140 390 120" fill="#AB47BC" opacity="0.6"/>
  <text x="405" y="165" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Глубоководные</text>
  <text x="405" y="177" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">до 200 м</text>
  <text x="405" y="197" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Порфира,</text>
  <text x="405" y="208" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Филлофора</text>
  <rect x="30" y="230" width="440" height="90" fill="#E3F2FD" rx="6"/>
  <text x="250" y="250" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Тело водорослей — таллом (слоевище)</text>
  <text x="250" y="270" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Нет корня, стебля, листьев — низшие растения</text>
  <text x="250" y="290" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Агар-агар (из красных) · Альгинаты (из бурых) · Йод</text>
  <text x="250" y="308" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Зелёные вызывают «цветение» воды при массовом размножении</text>
  
</svg>