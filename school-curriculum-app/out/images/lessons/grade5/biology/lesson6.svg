<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Устройство увеличительных приборов</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 6</text>
  
  <rect x="30" y="70" width="200" height="130" fill="#E3F2FD" rx="8" stroke="#1565C0" stroke-width="1"/>
  <text x="130" y="90" font-family="Arial,sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle" font-weight="bold">Лупа</text>
  <circle cx="130" cy="145" r="35" fill="none" stroke="#1565C0" stroke-width="2"/>
  <circle cx="130" cy="145" r="25" fill="#BBDEFB" opacity="0.5"/>
  <text x="130" y="142" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle">2–25×</text>
  <text x="130" y="165" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Ручная / Штативная</text>
  <text x="130" y="180" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">1 или несколько линз</text>
  <rect x="270" y="70" width="200" height="130" fill="#E8F5E9" rx="8" stroke="#2E7D32" stroke-width="1"/>
  <text x="370" y="90" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Микроскоп</text>
  <rect x="355" y="100" width="15" height="60" fill="#66BB6A" rx="3"/>
  <circle cx="362" cy="95" r="8" fill="#4CAF50"/>
  <circle cx="362" cy="165" r="8" fill="#388E3C"/>
  <rect x="345" y="170" width="35" height="5" fill="#A5D6A7" rx="2"/>
  <text x="370" y="195" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">100–1500×</text>
  <text x="370" y="185" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Окуляр × Объектив</text>
  <rect x="30" y="220" width="440" height="100" fill="#FFF9C4" rx="6" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="240" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Основные части микроскопа:</text>
  <text x="130" y="260" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">🔍 Окуляр (смотрят)</text>
  <text x="370" y="260" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">🔬 Объектив (у препарата)</text>
  <text x="130" y="280" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">📋 Предметный столик</text>
  <text x="370" y="280" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">🪞 Зеркало / Осветитель</text>
  <text x="250" y="305" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">Общее увел. = Окуляр × Объектив</text>
  
</svg>