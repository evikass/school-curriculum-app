<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="24" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Влияние человека на природу</text>
  <text x="250" y="37" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 42</text>
  <line x1="30" y1="43" x2="470" y2="43" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

  <!-- Negative impacts - 6 panels -->
  <!-- 1. Вырубка лесов -->
  <rect x="20" y="50" width="150" height="88" rx="5" fill="white" stroke="#C62828" stroke-width="1" opacity="0.9"/>
  <rect x="20" y="50" width="150" height="14" rx="5" fill="#C62828"/>
  <text x="95" y="61" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Вырубка лесов</text>
  <!-- Stumps -->
  <rect x="40" y="95" width="8" height="5" fill="#795548" rx="1"/>
  <rect x="60" y="95" width="8" height="5" fill="#795548" rx="1"/>
  <rect x="80" y="95" width="8" height="5" fill="#795548" rx="1"/>
  <rect x="100" y="95" width="8" height="5" fill="#795548" rx="1"/>
  <rect x="120" y="95" width="8" height="5" fill="#795548" rx="1"/>
  <!-- Bare soil -->
  <rect x="35" y="100" width="100" height="8" fill="#D7CCC8" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- Axe -->
  <line x1="55" y1="70" x2="65" y2="90" stroke="#666" stroke-width="1.5"/>
  <path d="M65 86 L72 88 L65 93Z" fill="#9E9E9E" stroke="#666" stroke-width="0.5"/>
  <!-- Felled tree -->
  <rect x="90" y="85" width="35" height="5" fill="#8D6E63" rx="2"/>
  <path d="M105 82 Q115 76 120 78" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.5"/>
  <text x="95" y="120" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">~13 млн га леса в год</text>
  <text x="95" y="129" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Уничтожение местообитаний</text>

  <!-- 2. Загрязнение -->
  <rect x="175" y="50" width="150" height="88" rx="5" fill="white" stroke="#FF6F00" stroke-width="1" opacity="0.9"/>
  <rect x="175" y="50" width="150" height="14" rx="5" fill="#FF6F00"/>
  <text x="250" y="61" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Загрязнение</text>
  <!-- Factory -->
  <rect x="210" y="85" width="25" height="20" fill="#9E9E9E" stroke="#616161" stroke-width="0.8"/>
  <rect x="215" y="78" width="6" height="7" fill="#757575" stroke="#616161" stroke-width="0.5"/>
  <rect x="225" y="82" width="5" height="3" fill="#616161"/>
  <!-- Smoke -->
  <circle cx="218" cy="73" r="5" fill="#BDBDBD" opacity="0.5"/>
  <circle cx="225" cy="68" r="7" fill="#9E9E9E" opacity="0.4"/>
  <circle cx="232" cy="63" r="8" fill="#757575" opacity="0.3"/>
  <!-- Water pollution -->
  <path d="M210 108 Q230 106 250 108 Q270 110 280 108" fill="none" stroke="#795548" stroke-width="2"/>
  <circle cx="230" cy="110" r="3" fill="#795548" opacity="0.5"/>
  <circle cx="260" cy="112" r="2" fill="#795548" opacity="0.4"/>
  <!-- Dead fish -->
  <ellipse cx="240" cy="118" rx="5" ry="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.3"/>
  <text x="240" y="120" font-family="Arial,sans-serif" font-size="3" fill="#E65100">✕</text>
  <text x="250" y="130" font-family="Arial,sans-serif" font-size="5" fill="#FF6F00" text-anchor="middle">Вода, воздух, почва</text>

  <!-- 3. Пожары -->
  <rect x="330" y="50" width="150" height="88" rx="5" fill="white" stroke="#D32F2F" stroke-width="1" opacity="0.9"/>
  <rect x="330" y="50" width="150" height="14" rx="5" fill="#D32F2F"/>
  <text x="405" y="61" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Пожары</text>
  <!-- Tree on fire -->
  <rect x="395" y="90" width="5" height="20" fill="#795548" rx="1"/>
  <ellipse cx="397" cy="85" rx="10" ry="8" fill="#FF5722" stroke="#D32F2F" stroke-width="0.5"/>
  <!-- Flames -->
  <path d="M390 80 Q395 72 397 78 Q400 68 405 75 Q408 70 410 80" fill="#FF9800" stroke="#F44336" stroke-width="0.5"/>
  <path d="M387 88 Q392 82 397 86 Q402 80 407 85" fill="#FFC107" stroke="#FF9800" stroke-width="0.5"/>
  <!-- Smoke -->
  <circle cx="397" cy="70" r="5" fill="#9E9E9E" opacity="0.4"/>
  <circle cx="403" cy="65" r="6" fill="#BDBDBD" opacity="0.3"/>
  <!-- Burnt ground -->
  <rect x="365" y="110" width="65" height="8" fill="#4E342E" rx="1"/>
  <text x="405" y="130" font-family="Arial,sans-serif" font-size="5" fill="#D32F2F" text-anchor="middle">90% — по вине человека</text>

  <!-- 4. Браконьерство -->
  <rect x="20" y="145" width="150" height="88" rx="5" fill="white" stroke="#6A1B9A" stroke-width="1" opacity="0.9"/>
  <rect x="20" y="145" width="150" height="14" rx="5" fill="#6A1B9A"/>
  <text x="95" y="156" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Браконьерство</text>
  <!-- Animal silhouette -->
  <ellipse cx="70" cy="185" rx="15" ry="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.8"/>
  <ellipse cx="58" cy="182" rx="6" ry="4" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.8"/>
  <!-- Horns -->
  <path d="M55 178 L48 172" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <path d="M60 178 L55 171" fill="none" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Crossed out -->
  <line x1="50" y1="172" x2="90" y2="195" stroke="#F44336" stroke-width="2"/>
  <line x1="90" y1="172" x2="50" y2="195" stroke="#F44336" stroke-width="2"/>
  <!-- Gun -->
  <rect x="110" y="180" width="20" height="3" fill="#424242" rx="1"/>
  <rect x="125" y="183" width="3" height="6" fill="#424242" rx="1"/>
  <text x="95" y="210" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle">Незаконная охота и лов</text>
  <text x="95" y="219" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Истребление редких видов</text>

  <!-- 5. Осушение болот -->
  <rect x="175" y="145" width="150" height="88" rx="5" fill="white" stroke="#1565C0" stroke-width="1" opacity="0.9"/>
  <rect x="175" y="145" width="150" height="14" rx="5" fill="#1565C0"/>
  <text x="250" y="156" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Осушение водоёмов</text>
  <!-- Dried lake -->
  <path d="M200 175 Q225 170 250 175 Q275 180 300 175" fill="none" stroke="#8D6E63" stroke-width="1.5"/>
  <path d="M200 185 Q225 182 250 185 Q275 188 300 185" fill="none" stroke="#BCAAA4" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Cracked earth -->
  <line x1="210" y1="190" x2="220" y2="195" stroke="#8D6E63" stroke-width="0.5"/>
  <line x1="240" y1="188" x2="250" y2="195" stroke="#8D6E63" stroke-width="0.5"/>
  <line x1="270" y1="190" x2="280" y2="195" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- Dead cattail -->
  <line x1="230" y1="175" x2="230" y2="165" stroke="#8D6E63" stroke-width="1"/>
  <ellipse cx="230" cy="164" rx="2" ry="4" fill="#795548"/>
  <!-- Water drop crossed out -->
  <circle cx="280" cy="170" r="5" fill="none" stroke="#1565C0" stroke-width="0.8"/>
  <path d="M280 166 L280 172" fill="none" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="275" y1="165" x2="285" y2="175" stroke="#F44336" stroke-width="1"/>
  <text x="250" y="210" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Уничтожение местообитаний</text>
  <text x="250" y="219" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Обмеление рек</text>

  <!-- 6. Инвазивные виды -->
  <rect x="330" y="145" width="150" height="88" rx="5" fill="white" stroke="#33691E" stroke-width="1" opacity="0.9"/>
  <rect x="330" y="145" width="150" height="14" rx="5" fill="#33691E"/>
  <text x="405" y="156" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Инвазивные виды</text>
  <!-- Big invasive plant -->
  <rect x="380" y="175" width="5" height="25" fill="#558B2F" rx="1"/>
  <ellipse cx="382" cy="170" rx="18" ry="12" fill="#7CB342" stroke="#33691E" stroke-width="1"/>
  <!-- Small native plants being overgrown -->
  <line x1="350" y1="195" x2="350" y2="190" stroke="#81C784" stroke-width="1"/>
  <circle cx="350" cy="188" r="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="410" y1="195" x2="410" y2="191" stroke="#81C784" stroke-width="1"/>
  <circle cx="410" cy="189" r="2.5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.3"/>
  <!-- Arrow showing invasion -->
  <path d="M440 165 L455 170" fill="none" stroke="#33691E" stroke-width="1"/>
  <text x="457" y="167" font-family="Arial,sans-serif" font-size="5" fill="#33691E">→</text>
  <text x="405" y="210" font-family="Arial,sans-serif" font-size="5" fill="#33691E" text-anchor="middle">Борщевик Сосновского</text>
  <text x="405" y="219" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Вытесняют местные виды</text>

  <!-- Summary statistics -->
  <rect x="20" y="240" width="460" height="100" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="255" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Страшные факты</text>

  <text x="40" y="272" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828">🌳 Каждый день уничтожается ~80 000 га леса</text>
  <text x="40" y="284" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828">🐅 За 100 лет численность диких животных ↓ на 60%</text>
  <text x="40" y="296" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828">🐟 8 млн тонн пластика попадает в океан ежегодно</text>
  <text x="40" y="308" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828">💨 CO₂ в атмосфере вырос на 50% с 1750 года</text>
  <text x="40" y="320" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828">🔥 5 млн га выгорает от пожаров каждый год</text>
  <text x="40" y="332" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828">🦏 1 вид вымирает каждые 20 минут</text>

  <text x="380" y="272" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Антропогенный фактор —</text>
  <text x="380" y="284" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">влияние человека</text>
  <text x="380" y="296" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">на окружающую среду</text>
  <text x="380" y="312" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Человек — часть</text>
  <text x="380" y="324" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">природы, а не её</text>
  <text x="380" y="336" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">хозяин!</text>
</svg>