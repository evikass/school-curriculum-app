<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="24" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Дыхание и испарение растений</text>
  <text x="250" y="37" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 32</text>
  <line x1="30" y1="43" x2="470" y2="43" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

  <!-- Section 1: Respiration equation -->
  <text x="135" y="60" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Дыхание растений</text>

  <rect x="30" y="65" width="210" height="30" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="135" y="78" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle" font-weight="bold">C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O</text>
  <text x="135" y="90" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">+ энергия (АТФ)</text>

  <!-- Respiration diagram: plant taking O2, releasing CO2 -->
  <rect x="65" y="100" width="140" height="70" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>

  <!-- Simple plant -->
  <rect x="115" y="135" width="6" height="30" fill="#795548" rx="1"/>
  <ellipse cx="118" cy="125" rx="25" ry="18" fill="url(#leaf)" stroke="#1B5E20" stroke-width="0.8"/>
  <line x1="118" y1="125" x2="118" y2="110" stroke="#1B5E20" stroke-width="0.5"/>
  <line x1="105" y1="118" x2="118" y2="125" stroke="#1B5E20" stroke-width="0.5"/>
  <line x1="131" y1="118" x2="118" y2="125" stroke="#1B5E20" stroke-width="0.5"/>

  <!-- O2 arrow IN -->
  <path d="M45 115 L80 115" fill="none" stroke="#2196F3" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <text x="45" y="110" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">O₂ ↗</text>

  <!-- CO2 arrow OUT -->
  <path d="M156 115 L190 115" fill="none" stroke="#795548" stroke-width="1.5" marker-end="url(#arrBr)"/>
  <text x="165" y="110" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">↗ CO₂</text>

  <!-- Energy symbol -->
  <text x="118" y="148" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">⚡ энергия</text>

  <!-- Day/Night gas exchange -->
  <text x="135" y="185" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Газообмен:</text>
  <text x="70" y="197" font-family="Arial,sans-serif" font-size="6" fill="#333">☀ День: O₂↑ CO₂↓</text>
  <text x="70" y="207" font-family="Arial,sans-serif" font-size="6" fill="#333">🌙 Ночь: O₂↓ CO₂↑</text>
  <text x="70" y="217" font-family="Arial,sans-serif" font-size="6" fill="#333">🌅 Сумерки: баланс</text>

  <!-- Section 2: Stomata detail -->
  <text x="370" y="60" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Устьица</text>

  <!-- Open stomata -->
  <rect x="295" y="68" width="80" height="55" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>
  <text x="335" y="79" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Открытое</text>
  <!-- Guard cells -->
  <ellipse cx="325" cy="100" rx="12" ry="8" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <ellipse cx="345" cy="100" rx="12" ry="8" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <!-- Stomatal pore (open) -->
  <ellipse cx="335" cy="100" rx="4" ry="8" fill="#E8F5E9" stroke="#1B5E20" stroke-width="0.5"/>
  <!-- Arrows showing gas flow -->
  <path d="M335 85 L335 90" fill="none" stroke="#2196F3" stroke-width="1" marker-end="url(#arrBlue)"/>
  <path d="M335 110 L335 118" fill="none" stroke="#795548" stroke-width="1" marker-end="url(#arrBr)"/>
  <text x="310" y="88" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1">O₂</text>
  <text x="340" y="120" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">CO₂</text>
  <!-- Chloroplasts in guard cells -->
  <ellipse cx="320" cy="100" rx="3" ry="2" fill="#388E3C"/>
  <ellipse cx="350" cy="100" rx="3" ry="2" fill="#388E3C"/>
  <text x="335" y="115" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">замыкающие клетки</text>

  <!-- Closed stomata -->
  <rect x="385" y="68" width="80" height="55" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
  <text x="425" y="79" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Закрытое</text>
  <!-- Guard cells (closed) -->
  <ellipse cx="415" cy="100" rx="10" ry="8" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <ellipse cx="435" cy="100" rx="10" ry="8" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <!-- Closed pore -->
  <line x1="425" y1="94" x2="425" y2="106" stroke="#1B5E20" stroke-width="1"/>
  <ellipse cx="410" cy="100" rx="3" ry="2" fill="#388E3C"/>
  <ellipse cx="440" cy="100" rx="3" ry="2" fill="#388E3C"/>
  <text x="425" y="115" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">нет газообмена</text>

  <!-- Section 3: Transpiration -->
  <text x="370" y="140" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Испарение (транспирация)</text>

  <!-- Plant with water droplets -->
  <rect x="310" y="148" width="120" height="95" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>

  <!-- Soil -->
  <rect x="315" y="225" width="110" height="15" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
  <text x="370" y="236" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">почва + H₂O</text>

  <!-- Roots -->
  <path d="M370 225 L355 238" fill="none" stroke="#795548" stroke-width="1.5"/>
  <path d="M370 225 L370 240" fill="none" stroke="#795548" stroke-width="1.5"/>
  <path d="M370 225 L385 238" fill="none" stroke="#795548" stroke-width="1.5"/>

  <!-- Stem -->
  <rect x="367" y="185" width="6" height="40" fill="#795548" rx="1"/>

  <!-- Leaves -->
  <ellipse cx="350" cy="175" rx="20" ry="10" fill="url(#leaf)" stroke="#1B5E20" stroke-width="0.8"/>
  <ellipse cx="390" cy="170" rx="20" ry="10" fill="url(#leaf)" stroke="#1B5E20" stroke-width="0.8"/>
  <line x1="350" y1="175" x2="370" y2="190" stroke="#1B5E20" stroke-width="0.5"/>
  <line x1="390" y1="170" x2="370" y2="190" stroke="#1B5E20" stroke-width="0.5"/>

  <!-- Water drops (transpiration) -->
  <ellipse cx="340" cy="160" rx="2" ry="3" fill="#90CAF9"/>
  <ellipse cx="358" cy="155" rx="2" ry="3" fill="#90CAF9"/>
  <ellipse cx="395" cy="155" rx="2" ry="3" fill="#90CAF9"/>
  <ellipse cx="385" cy="150" rx="1.5" ry="2.5" fill="#90CAF9"/>

  <!-- Evaporation arrows -->
  <path d="M345 155 L340 148" fill="none" stroke="#90CAF9" stroke-width="0.8" stroke-dasharray="2,1"/>
  <path d="M395 155 L400 148" fill="none" stroke="#90CAF9" stroke-width="0.8" stroke-dasharray="2,1"/>

  <!-- Water flow arrows inside stem -->
  <path d="M370 235 L370 195" fill="none" stroke="#2196F3" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="395" y="210" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">вода ↑</text>

  <text x="370" y="155" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">H₂O↑ пар</text>

  <!-- Transpiration functions -->
  <rect x="30" y="230" width="260" height="105" rx="5" fill="#E0F7FA" stroke="#00838F" stroke-width="0.8"/>
  <text x="160" y="245" font-family="Arial,sans-serif" font-size="8" fill="#006064" text-anchor="middle" font-weight="bold">Функции испарения</text>

  <circle cx="50" cy="258" r="4" fill="#00838F"/>
  <text x="58" y="261" font-family="Arial,sans-serif" font-size="7" fill="#333">Охлаждение листа (до 10-15°C)</text>

  <circle cx="50" cy="275" r="4" fill="#00838F"/>
  <text x="58" y="278" font-family="Arial,sans-serif" font-size="7" fill="#333">Водный поток от корня к листу</text>

  <circle cx="50" cy="292" r="4" fill="#00838F"/>
  <text x="58" y="295" font-family="Arial,sans-serif" font-size="7" fill="#333">Поступление минеральных веществ</text>

  <circle cx="50" cy="309" r="4" fill="#00838F"/>
  <text x="58" y="312" font-family="Arial,sans-serif" font-size="7" fill="#333">Газообмен через устьица</text>

  <circle cx="50" cy="326" r="4" fill="#00838F"/>
  <text x="58" y="329" font-family="Arial,sans-serif" font-size="7" fill="#333">Поддержание тургора клеток</text>

  <!-- Comparison table -->
  <rect x="440" y="250" width="50" height="85" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="0.5"/>
  <text x="465" y="262" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">VS</text>
  <text x="465" y="275" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Фотосинтез</text>
  <text x="465" y="285" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">→ синтез</text>
  <text x="465" y="295" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">поглощает</text>
  <text x="465" y="305" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">CO₂+H₂O</text>
  <line x1="445" y1="310" x2="485" y2="310" stroke="#E65100" stroke-width="0.3"/>
  <text x="465" y="320" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Дыхание</text>
  <text x="465" y="330" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">→ распад</text>

  <defs>
    <marker id="arrBlue" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#2196F3"/>
    </marker>
    <marker id="arrBr" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4 Z" fill="#795548"/>
    </marker>
  </defs>
</svg>