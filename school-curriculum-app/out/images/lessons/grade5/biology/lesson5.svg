  <text x="255" y="106" font-family="Arial,sans-serif" font-size="7" fill="#E8F5E9" text-anchor="middle">Хищничество</text>
  <text x="255" y="118" font-family="Arial,sans-serif" font-size="7" fill="#E8F5E9" text-anchor="middle">Паразитизм</text>
  <text x="255" y="130" font-family="Arial,sans-serif" font-size="7" fill="#E8F5E9" text-anchor="middle">Конкуренция</text>
  <text x="255" y="142" font-family="Arial,sans-serif" font-size="7" fill="#E8F5E9" text-anchor="middle">Симбиоз</text>
  <text x="255" y="155" font-family="Arial,sans-serif" font-size="7" fill="#E8F5E9" text-anchor="middle">Взаимопомощь</text>
  <rect x="340" y="70" width="130" height="100" fill="#EF5350" rx="8"/>
  <text x="405" y="90" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Антропогенные</text>
  <text x="405" y="106" font-family="Arial,sans-serif" font-size="7" fill="#FFEBEE" text-anchor="middle">Вырубка лесов</text>
  <text x="405" y="118" font-family="Arial,sans-serif" font-size="7" fill="#FFEBEE" text-anchor="middle">Загрязнение</text>
  <text x="405" y="130" font-family="Arial,sans-serif" font-size="7" fill="#FFEBEE" text-anchor="middle">Осушение болот</text>
  <text x="405" y="142" font-family="Arial,sans-serif" font-size="7" fill="#FFEBEE" text-anchor="middle">Интродукция</text>
  <text x="405" y="155" font-family="Arial,sans-serif" font-size="7" fill="#FFEBEE" text-anchor="middle">Охрана природы</text>
  <rect x="30" y="195" width="210" height="50" fill="#FFF9C4" rx="6" stroke="#F9A825" stroke-width="1"/>
  <text x="135" y="215" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">Закон оптимума</text>
  <text x="135" y="230" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Лучшее значение фактора → зона оптимума</text>
