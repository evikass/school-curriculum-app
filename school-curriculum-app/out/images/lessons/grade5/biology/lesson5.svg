<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Экологические факторы</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 5</text>
  
  <rect x="30" y="70" width="140" height="100" fill="#42A5F5" rx="8"/>
  <text x="100" y="90" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Абиотические</text>
  <text x="100" y="106" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">Свет</text>
  <text x="100" y="118" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">Температура</text>
  <text x="100" y="130" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">Влажность</text>
  <text x="100" y="142" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">Давление, ветер</text>
  <text x="100" y="155" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">Состав почвы</text>
  <rect x="185" y="70" width="140" height="100" fill="#66BB6A" rx="8"/>
