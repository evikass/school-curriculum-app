  <rect x="80" y="270" width="340" height="45" fill="#E8F5E9" rx="6"/>
  <text x="250" y="290" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Оптимум → Угнетение → Предел выносливости</text>
  <text x="250" y="305" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">min ← оптимум → max (кривая жизнеспособности)</text>
  
</svg>