<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Стебель</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 25</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Dicot stem cross-section -->
<text x="130" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Поперечный срез стебля двудольного</text>

<g transform="translate(20,72)">
<!-- Pith (сердцевина) - center -->
<circle cx="110" cy="80" r="15" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.8"/>
<text x="110" y="78" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">сердцевина</text>
<text x="110" y="84" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">(запас)</text>

<!-- Xylem (ксилема) - wood -->
<circle cx="110" cy="80" r="30" fill="none" stroke="#8D6E63" stroke-width="8"/>
<text x="148" y="68" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">ксилема</text>
<text x="148" y="75" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">(древесина)</text>
<text x="148" y="81" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">↑ вода и минер.</text>
<line x1="140" y1="73" x2="146" y2="73" stroke="#5D4037" stroke-width="0.3"/>

<!-- Cambium (камбий) -->
<circle cx="110" cy="80" r="38" fill="none" stroke="#4CAF50" stroke-width="2.5"/>
<text x="152" y="90" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">камбий</text>
<text x="152" y="97" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">(рост в толщину)</text>
<line x1="148" y1="92" x2="150" y2="92" stroke="#2E7D32" stroke-width="0.3"/>

<!-- Phloem (флоэма) - bast -->
<circle cx="110" cy="80" r="48" fill="none" stroke="#81C784" stroke-width="6"/>
<text x="68" y="30" font-family="Arial,sans-serif" font-size="6" fill="#388E3C">флоэма (луб)</text>
<text x="68" y="37" font-family="Arial,sans-serif" font-size="5" fill="#388E3C">↓ органич. вещества</text>
<line x1="78" y1="38" x2="68" y2="42" stroke="#388E3C" stroke-width="0.3"/>

<!-- Cortex (кора) -->
<circle cx="110" cy="80" r="62" fill="none" stroke="#A1887F" stroke-width="4"/>
<text x="45" y="105" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">кора</text>
<line x1="52" y1="102" x2="55" y2="100" stroke="#5D4037" stroke-width="0.3"/>

<!-- Epidermis (эпидермис) -->
<circle cx="110" cy="80" r="68" fill="none" stroke="#795548" stroke-width="1.5"/>
<text x="45" y="92" font-family="Arial,sans-serif" font-size="5" fill="#795548">эпидермис</text>

<!-- Vascular bundle detail arrows -->
<path d="M110,65 L110,52" fill="none" stroke="#C62828" stroke-width="0.8"/>
<polygon points="108,52 110,48 112,52" fill="#C62828"/>
<text x="120" y="50" font-family="Arial,sans-serif" font-size="5" fill="#C62828">вверх (вода)</text>

<path d="M110,95 L110,108" fill="none" stroke="#2196F3" stroke-width="0.8"/>
<polygon points="108,108 110,112 112,108" fill="#2196F3"/>
<text x="120" y="112" font-family="Arial,sans-serif" font-size="5" fill="#2196F3">вниз (орг. в-ва)</text>
</g>

<!-- Section 2: Annual rings -->
<text x="370" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Годичные кольца</text>

<g transform="translate(280,72)">
<!-- Tree cross-section with rings -->
<circle cx="80" cy="80" r="75" fill="#D7CCC8" stroke="#795548" stroke-width="2"/>
<!-- Bark -->
<circle cx="80" cy="80" r="75" fill="none" stroke="#5D4037" stroke-width="4"/>

<!-- Annual rings -->
<circle cx="80" cy="80" r="70" fill="none" stroke="#A1887F" stroke-width="1.5"/>
<circle cx="80" cy="80" r="63" fill="none" stroke="#8D6E63" stroke-width="2"/>
<circle cx="80" cy="80" r="55" fill="none" stroke="#BCAAA4" stroke-width="1"/>
<circle cx="80" cy="80" r="48" fill="none" stroke="#8D6E63" stroke-width="2.5"/>
<circle cx="80" cy="80" r="40" fill="none" stroke="#BCAAA4" stroke-width="1"/>
<circle cx="80" cy="80" r="33" fill="none" stroke="#8D6E63" stroke-width="2.5"/>
<circle cx="80" cy="80" r="25" fill="none" stroke="#BCAAA4" stroke-width="1"/>
<circle cx="80" cy="80" r="18" fill="none" stroke="#8D6E63" stroke-width="2"/>
<circle cx="80" cy="80" r="10" fill="none" stroke="#BCAAA4" stroke-width="1"/>

<!-- Pith center -->
<circle cx="80" cy="80" r="4" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>

<!-- Ring labels -->
<text x="80" y="8" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">кора</text>
<text x="145" y="40" font-family="Arial,sans-serif" font-size="5" fill="#8D6E63">камбий →</text>

<!-- Spring wood (ранняя древесина) - lighter, wider -->
<rect x="5" y="150" width="12" height="8" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
<text x="25" y="157" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">ранняя (весна) — широкий</text>

<!-- Summer wood (поздняя древесина) - darker, narrow -->
<rect x="5" y="160" width="6" height="8" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
<text x="25" y="167" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">поздняя (лето) — узкий</text>

<!-- Count arrow -->
<path d="M8,80 L8,20" fill="none" stroke="#C62828" stroke-width="0.8"/>
<text x="5" y="50" font-family="Arial,sans-serif" font-size="5" fill="#C62828" transform="rotate(-90,5,50)">подсчёт колец = возраст</text>
</g>

<!-- Section 3: Transport in stem -->
<text x="250" y="248" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Транспорт веществ по стеблю</text>

<g transform="translate(20,255)">
<!-- Stem diagram -->
<rect x="110" y="0" width="20" height="80" fill="#66BB6A" rx="5"/>

<!-- Vascular bundles simplified -->
<rect x="114" y="0" width="4" height="80" fill="#81C784" rx="1"/>
<rect x="120" y="0" width="4" height="80" fill="#8D6E63" rx="1"/>
<rect x="125" y="0" width="2" height="80" fill="#4CAF50" rx="1"/>

<!-- Ascending flow (xylem) -->
<path d="M122,75 L122,10" fill="none" stroke="#2196F3" stroke-width="1.5"/>
<polygon points="120,10 122,5 124,10" fill="#2196F3"/>
<text x="135" y="20" font-family="Arial,sans-serif" font-size="6" fill="#2196F3">ксилема ↑</text>
<text x="135" y="28" font-family="Arial,sans-serif" font-size="5" fill="#2196F3">вода + минеральные</text>
<text x="135" y="35" font-family="Arial,sans-serif" font-size="5" fill="#2196F3">вещества (от корня)</text>

<!-- Descending flow (phloem) -->
<path d="M116,5 L116,70" fill="none" stroke="#FF9800" stroke-width="1.5"/>
<polygon points="114,70 116,75 118,70" fill="#FF9800"/>
<text x="30" y="40" font-family="Arial,sans-serif" font-size="6" fill="#FF9800">флоэма ↓</text>
<text x="30" y="48" font-family="Arial,sans-serif" font-size="5" fill="#FF9800">органические вещества</text>
<text x="30" y="55" font-family="Arial,sans-serif" font-size="5" fill="#FF9800">(от листьев)</text>
<line x1="108" y1="50" x2="114" y2="50" stroke="#FF9800" stroke-width="0.3"/>

<!-- Labels -->
<text x="130" y="65" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">камбий</text>
<line x1="125" y1="63" x2="129" y2="63" stroke="#4CAF50" stroke-width="0.3"/>
</g>

<!-- Key facts box -->
<g transform="translate(220,255)">
<rect x="0" y="0" width="260" height="78" rx="5" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<text x="130" y="13" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Функции стебля</text>
<circle cx="15" cy="25" r="3" fill="#2196F3"/>
<text x="25" y="28" font-family="Arial,sans-serif" font-size="6" fill="#333">Опорная — поддерживает крону</text>
<circle cx="15" cy="37" r="3" fill="#FF9800"/>
<text x="25" y="40" font-family="Arial,sans-serif" font-size="6" fill="#333">Проводящая — транспорт веществ</text>
<circle cx="15" cy="49" r="3" fill="#4CAF50"/>
<text x="25" y="52" font-family="Arial,sans-serif" font-size="6" fill="#333">Запасающая — хранит питательные вещества</text>
<circle cx="15" cy="61" r="3" fill="#E91E63"/>
<text x="25" y="64" font-family="Arial,sans-serif" font-size="6" fill="#333">Рост — камбий обеспечивает рост в толщину</text>
<circle cx="15" cy="73" r="3" fill="#9C27B0"/>
<text x="25" y="76" font-family="Arial,sans-serif" font-size="6" fill="#333">Вегетативное размножение (отводки, черенки)</text>
</g>
</svg>