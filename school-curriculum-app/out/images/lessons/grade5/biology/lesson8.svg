<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Химический состав клетки</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 8</text>
  
  <rect x="50" y="70" width="180" height="50" fill="#42A5F5" rx="6"/>
  <text x="140" y="90" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Вода 70–80%</text>
  <text x="140" y="106" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">Растворитель, транспорт, терморегуляция</text>
  <rect x="270" y="70" width="180" height="50" fill="#8D6E63" rx="6"/>
  <text x="360" y="90" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Минеральные соли 1–1,5%</text>
  <text x="360" y="106" font-family="Arial,sans-serif" font-size="7" fill="#EFEBE9" text-anchor="middle">Na, K, Ca, P, Fe, Mg</text>
  <rect x="30" y="145" width="105" height="80" fill="#EF5350" rx="6"/>
  <text x="82" y="168" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Белки</text>
  <text x="82" y="182" font-family="Arial,sans-serif" font-size="7" fill="#FFEBEE" text-anchor="middle">10–20%</text>
  <text x="82" y="195" font-family="Arial,sans-serif" font-size="6" fill="#FFEBEE" text-anchor="middle">Строительная</text>
  <text x="82" y="205" font-family="Arial,sans-serif" font-size="6" fill="#FFEBEE" text-anchor="middle">Ферментативная</text>
  <text x="82" y="215" font-family="Arial,sans-serif" font-size="6" fill="#FFEBEE" text-anchor="middle">17,6 кДж/г</text>
  <rect x="150" y="145" width="105" height="80" fill="#FFA726" rx="6"/>
  <text x="202" y="168" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Жиры</text>
  <text x="202" y="182" font-family="Arial,sans-serif" font-size="7" fill="#FFF3E0" text-anchor="middle">1–5%</text>
  <text x="202" y="195" font-family="Arial,sans-serif" font-size="6" fill="#FFF3E0" text-anchor="middle">Запас энергии</text>
  <text x="202" y="205" font-family="Arial,sans-serif" font-size="6" fill="#FFF3E0" text-anchor="middle">Мембраны</text>
  <text x="202" y="215" font-family="Arial,sans-serif" font-size="6" fill="#FFF3E0" text-anchor="middle">38,9 кДж/г</text>
  <rect x="270" y="145" width="105" height="80" fill="#66BB6A" rx="6"/>
  <text x="322" y="168" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Углеводы</text>
  <text x="322" y="182" font-family="Arial,sans-serif" font-size="7" fill="#E8F5E9" text-anchor="middle">0,2–2%</text>
  <text x="322" y="195" font-family="Arial,sans-serif" font-size="6" fill="#E8F5E9" text-anchor="middle">Источник энергии</text>
  <text x="322" y="205" font-family="Arial,sans-serif" font-size="6" fill="#E8F5E9" text-anchor="middle">Целлюлоза, крахмал</text>
  <text x="322" y="215" font-family="Arial,sans-serif" font-size="6" fill="#E8F5E9" text-anchor="middle">17,6 кДж/г</text>
  <rect x="390" y="145" width="80" height="80" fill="#AB47BC" rx="6"/>
  <text x="430" y="168" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ДНК/РНК</text>
  <text x="430" y="185" font-family="Arial,sans-serif" font-size="6" fill="#F3E5F5" text-anchor="middle">Наследств.</text>
  <text x="430" y="197" font-family="Arial,sans-serif" font-size="6" fill="#F3E5F5" text-anchor="middle">информация</text>
  <text x="430" y="209" font-family="Arial,sans-serif" font-size="6" fill="#F3E5F5" text-anchor="middle">Синтез белка</text>
  <rect x="50" y="250" width="400" height="60" fill="#FFF9C4" rx="6" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="270" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">Неорганические: вода + минеральные соли</text>
  <text x="250" y="290" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Органические: белки + жиры + углеводы + нуклеиновые кислоты</text>
  <text x="250" y="303" font-family="Arial,sans-serif" font-size="7" fill="#888" text-anchor="middle">Жиры дают больше всего энергии (38,9 кДж/г)</text>
  
</svg>