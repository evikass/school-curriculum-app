<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="24" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Размножение растений</text>
  <text x="250" y="37" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 34</text>
  <line x1="30" y1="43" x2="470" y2="43" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

  <!-- Two main types -->
  <rect x="30" y="48" width="210" height="22" rx="5" fill="#2E7D32"/>
  <text x="135" y="63" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Вегетативное</text>
  <rect x="260" y="48" width="210" height="22" rx="5" fill="#FF7043"/>
  <text x="365" y="63" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">Генеративное (семенами)</text>

  <!-- Vegetative methods -->
  <text x="135" y="85" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Способы вегетативного размножения</text>

  <!-- By stems: runners/stolons -->
  <rect x="30" y="92" width="95" height="55" rx="4" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.7"/>
  <text x="77" y="103" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Усами (столоны)</text>
  <!-- Parent plant -->
  <rect x="45" y="115" width="3" height="12" fill="#66BB6A" rx="1"/>
  <ellipse cx="46" cy="112" rx="7" ry="5" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Runner -->
  <path d="M48 118 Q65 120 75 118" fill="none" stroke="#66BB6A" stroke-width="1"/>
  <!-- Daughter plant -->
  <rect x="73" y="118" width="3" height="10" fill="#66BB6A" rx="1"/>
  <ellipse cx="74" cy="116" rx="6" ry="4" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="77" y="142" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">клубника</text>

  <!-- By tubers -->
  <rect x="130" y="92" width="95" height="55" rx="4" fill="#EFEBE9" stroke="#795548" stroke-width="0.7"/>
  <text x="177" y="103" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle" font-weight="bold">Клубнями</text>
  <!-- Tuber -->
  <ellipse cx="170" cy="120" rx="14" ry="10" fill="#D7CCC8" stroke="#795548" stroke-width="1"/>
  <!-- Eyes on tuber -->
  <circle cx="164" cy="116" r="1.5" fill="#5D4037"/>
  <circle cx="176" cy="118" r="1.5" fill="#5D4037"/>
  <circle cx="168" cy="125" r="1.5" fill="#5D4037"/>
  <!-- Sprout from eye -->
  <path d="M164 114 L162 108" fill="none" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="177" y="142" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">картофель</text>

  <!-- By bulbs -->
  <rect x="230" y="92" width="95" height="55" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="277" y="103" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Луковицами</text>
  <!-- Bulb cross-section -->
  <ellipse cx="277" cy="122" rx="12" ry="14" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Scales -->
  <path d="M267 115 Q277 110 287 115" fill="none" stroke="#E8D44D" stroke-width="0.5"/>
  <path d="M265 120 Q277 114 289 120" fill="none" stroke="#E8D44D" stroke-width="0.5"/>
  <path d="M267 125 Q277 118 287 125" fill="none" stroke="#E8D44D" stroke-width="0.5"/>
  <!-- Central bud -->
  <ellipse cx="277" cy="116" rx="3" ry="5" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="277" y="142" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">лук, тюльпан</text>

  <!-- By rhizome -->
  <rect x="30" y="152" width="95" height="50" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.7"/>
  <text x="77" y="163" font-family="Arial,sans-serif" font-size="6" fill="#4A148C" text-anchor="middle" font-weight="bold">Корневищем</text>
  <!-- Rhizome -->
  <path d="M45 178 Q60 175 80 178 Q95 181 105 178" fill="none" stroke="#795548" stroke-width="3"/>
  <!-- Shoots from rhizome -->
  <rect x="60" y="168" width="2" height="8" fill="#66BB6A" rx="1"/>
  <ellipse cx="61" cy="166" rx="5" ry="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <rect x="88" y="170" width="2" height="8" fill="#66BB6A" rx="1"/>
  <ellipse cx="89" cy="168" rx="5" ry="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="77" y="196" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">пырей, ирис</text>

  <!-- By leaves -->
  <rect x="130" y="152" width="95" height="50" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.7"/>
  <text x="177" y="163" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle" font-weight="bold">Листьями</text>
  <!-- Leaf with plantlets -->
  <ellipse cx="177" cy="180" rx="18" ry="8" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="177" y1="180" x2="177" y2="172" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Small plantlets on leaf margin -->
  <circle cx="165" cy="177" r="2.5" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.3"/>
  <circle cx="170" cy="174" r="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.3"/>
  <circle cx="185" cy="174" r="2.5" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.3"/>
  <circle cx="190" cy="177" r="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.3"/>
  <text x="177" y="196" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">бриофиллум</text>

  <!-- By root suckers -->
  <rect x="230" y="152" width="95" height="50" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.7"/>
  <text x="277" y="163" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">Корневыми отпрысками</text>
  <!-- Root horizontal -->
  <path d="M245 180 Q277 178 310 180" fill="none" stroke="#8D6E63" stroke-width="2"/>
  <!-- Suckers going up -->
  <rect x="260" y="168" width="2" height="10" fill="#66BB6A" rx="1"/>
  <ellipse cx="261" cy="166" rx="5" ry="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <rect x="285" y="170" width="2" height="8" fill="#66BB6A" rx="1"/>
  <ellipse cx="286" cy="168" rx="5" ry="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="277" y="196" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">малина, осина</text>

  <!-- Grafting (artificial) -->
  <text x="400" y="85" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Прививка</text>

  <!-- Rootstock -->
  <rect x="385" y="120" width="8" height="50" fill="#8D6E63" rx="2" stroke="#5D4037" stroke-width="0.5"/>
  <text x="389" y="148" font-family="Arial,sans-serif" font-size="5" fill="white" transform="rotate(-90 389 148)">подвой</text>

  <!-- Scion -->
  <rect x="387" y="95" width="6" height="28" fill="#66BB6A" rx="2" stroke="#2E7D32" stroke-width="0.5"/>
  <ellipse cx="390" cy="90" rx="10" ry="7" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="410" y="102" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">привой</text>

  <!-- Graft junction -->
  <path d="M385 120 L393 120" fill="none" stroke="#E65100" stroke-width="1"/>
  <path d="M387 120 L391 118" fill="none" stroke="#F44336" stroke-width="0.8"/>
  <text x="400" y="125" font-family="Arial,sans-serif" font-size="5" fill="#E65100">место прививки</text>

  <!-- Grafting types -->
  <text x="400" y="185" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Виды прививок:</text>
  <text x="400" y="196" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Окулировка (глазком)</text>
  <text x="400" y="206" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Копулировка (вприклад)</text>
  <text x="400" y="216" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• В расщеп</text>
  <text x="400" y="226" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• За кору</text>

  <!-- Pollination section -->
  <text x="250" y="220" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Опыление — перенос пыльцы</text>

  <!-- Flower structure -->
  <g transform="translate(80, 240)">
    <!-- Petals -->
    <ellipse cx="0" cy="-15" rx="8" ry="12" fill="#FF80AB" stroke="#C2185B" stroke-width="0.5"/>
    <ellipse cx="12" cy="-6" rx="8" ry="12" fill="#FF80AB" stroke="#C2185B" stroke-width="0.5" transform="rotate(60 12 -6)"/>
    <ellipse cx="12" cy="6" rx="8" ry="12" fill="#FF80AB" stroke="#C2185B" stroke-width="0.5" transform="rotate(120 12 6)"/>
    <ellipse cx="0" cy="15" rx="8" ry="12" fill="#FF80AB" stroke="#C2185B" stroke-width="0.5"/>
    <ellipse cx="-12" cy="6" rx="8" ry="12" fill="#FF80AB" stroke="#C2185B" stroke-width="0.5" transform="rotate(-60 -12 6)"/>
    <ellipse cx="-12" cy="-6" rx="8" ry="12" fill="#FF80AB" stroke="#C2185B" stroke-width="0.5" transform="rotate(-120 -12 -6)"/>
    <!-- Stamens -->
    <line x1="-5" y1="-3" x2="-8" y2="-10" stroke="#FFD54F" stroke-width="0.8"/>
    <circle cx="-9" cy="-11" r="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
    <line x1="5" y1="-3" x2="8" y2="-10" stroke="#FFD54F" stroke-width="0.8"/>
    <circle cx="9" cy="-11" r="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
    <!-- Pistil -->
    <rect x="-1.5" y="-5" width="3" height="12" fill="#4CAF50" rx="1"/>
    <circle cx="0" cy="-7" r="2.5" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  </g>
  <text x="80" y="290" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Цветок</text>

  <!-- Pollination agents -->
  <text x="200" y="240" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Агенты опыления</text>

  <!-- Insect pollination -->
  <rect x="145" y="248" width="50" height="35" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.5"/>
  <!-- Bee -->
  <ellipse cx="170" cy="260" rx="6" ry="4" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
  <line x1="166" y1="260" x2="164" y2="260" stroke="#333" stroke-width="0.5"/>
  <line x1="174" y1="260" x2="176" y2="260" stroke="#333" stroke-width="0.5"/>
  <ellipse cx="170" cy="268" rx="5" ry="3" fill="#333"/>
  <text x="170" y="280" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">насекомые</text>

  <!-- Wind pollination -->
  <rect x="200" y="248" width="50" height="35" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
  <!-- Wind lines -->
  <path d="M210 258 Q220 256 228 258" fill="none" stroke="#90CAF9" stroke-width="1"/>
  <path d="M210 264 Q220 262 230 264" fill="none" stroke="#90CAF9" stroke-width="1"/>
  <path d="M210 270 Q218 268 225 270" fill="none" stroke="#90CAF9" stroke-width="1"/>
  <!-- Pollen grains -->
  <circle cx="232" cy="257" r="1.5" fill="#FFD54F"/>
  <circle cx="235" cy="263" r="1.5" fill="#FFD54F"/>
  <circle cx="228" cy="269" r="1.5" fill="#FFD54F"/>
  <text x="225" y="280" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">ветер</text>

  <!-- Self vs Cross -->
  <rect x="260" y="248" width="90" height="40" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.7"/>
  <text x="305" y="260" font-family="Arial,sans-serif" font-size="6" fill="#4A148C" text-anchor="middle" font-weight="bold">Типы опыления</text>
  <text x="280" y="272" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Самоопыление</text>
  <text x="280" y="282" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Перекрёстное</text>
  <text x="340" y="272" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2">→ в одном</text>
  <text x="340" y="282" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2">→ между ↕</text>

  <!-- Key facts -->
  <rect x="360" y="235" width="130" height="100" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="425" y="248" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Преимущества</text>
  <text x="425" y="260" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">вегетативного:</text>
  <text x="370" y="272" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Быстрый результат</text>
  <text x="370" y="282" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Сохранение признаков</text>
  <text x="370" y="292" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Клон материнского раст.</text>
  <text x="370" y="305" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">генеративного:</text>
  <text x="370" y="315" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Генетическое разнообразие</text>
  <text x="370" y="325" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Приспособляемость</text>
</svg>