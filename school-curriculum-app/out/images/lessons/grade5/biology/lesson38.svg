  <text x="64" y="137" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">• Чешуя</text>
  <text x="64" y="145" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">• Боковая линия</text>
  <text x="64" y="153" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">• Двухкам. сердце</text>
  <text x="64" y="161" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">• Холоднокровные</text>
  <text x="64" y="169" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">• Нерест (икра)</text>
  <text x="64" y="177" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">• Плавники</text>
  <text x="64" y="190" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle" font-style="italic">карп, акула</text>

