<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="soil" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Видоизменения побегов</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 29</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Underground modifications -->
<text x="250" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Подземные видоизменения</text>

<!-- Rhizome (Корневище) -->
<g transform="translate(10,75)">
<rect x="0" y="0" width="155" height="108" rx="5" fill="white" fill-opacity="0.4" stroke="#795548" stroke-width="0.7"/>
<text x="77" y="13" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#4E342E" text-anchor="middle">Корневище</text>

<!-- Soil -->
<rect x="5" y="30" width="145" height="65" rx="3" fill="url(#soil)" opacity="0.2"/>

<!-- Rhizome body -->
<path d="M15,55 Q40,48 80,52 Q120,56 140,50" fill="none" stroke="#8D6E63" stroke-width="6" stroke-linecap="round"/>
<!-- Nodes -->
<circle cx="35" cy="52" r="2" fill="#5D4037"/>
<circle cx="80" cy="52" r="2" fill="#5D4037"/>
<circle cx="120" cy="53" r="2" fill="#5D4037"/>

<!-- Scale leaves -->
<path d="M35,52 Q33,46 37,44" fill="#A1887F" stroke="#795548" stroke-width="0.5"/>
<path d="M80,52 Q78,46 82,44" fill="#A1887F" stroke="#795548" stroke-width="0.5"/>

<!-- Adventitious roots -->
<line x1="50" y1="55" x2="45" y2="72" stroke="#A1887F" stroke-width="0.8"/>
<line x1="60" y1="54" x2="58" y2="72" stroke="#A1887F" stroke-width="0.8"/>
<line x1="90" y1="54" x2="88" y2="72" stroke="#A1887F" stroke-width="0.8"/>
<line x1="100" y1="54" x2="105" y2="72" stroke="#A1887F" stroke-width="0.8"/>

<!-- Shoot above ground -->
<line x1="35" y1="52" x2="35" y2="32" stroke="#4CAF50" stroke-width="1.5"/>
<ellipse cx="35" cy="28" rx="8" ry="5" fill="#66BB6A"/>

<!-- Labels -->
<text x="100" y="38" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">надземный побег</text>
<text x="70" y="85" font-family="Arial,sans-serif" font-size="5" fill="#795548">придаточные корни</text>
<text x="70" y="95" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">чешуйки (редуц. листья)</text>
<text x="77" y="105" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">пырей, ландыш, папоротник</text>
</g>

<!-- Tuber (Клубень) -->
<g transform="translate(170,75)">
<rect x="0" y="0" width="155" height="108" rx="5" fill="white" fill-opacity="0.4" stroke="#FF9800" stroke-width="0.7"/>
<text x="77" y="13" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Клубень</text>

<!-- Soil -->
<rect x="5" y="30" width="145" height="65" rx="3" fill="url(#soil)" opacity="0.2"/>

<!-- Potato tuber -->
<ellipse cx="70" cy="55" rx="30" ry="18" fill="#FFCC80" stroke="#E65100" stroke-width="1.2"/>
<!-- Eyes (глазки) -->
<circle cx="55" cy="50" r="3" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
<circle cx="75" cy="48" r="3" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
<circle cx="85" cy="55" r="3" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
<circle cx="60" cy="62" r="2.5" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
<!-- Sprouts from eyes -->
<path d="M55,47 Q52,42 55,38" fill="none" stroke="#4CAF50" stroke-width="0.8"/>

<!-- Stolon connecting to parent plant -->
<path d="M100,55 Q115,50 130,45" fill="none" stroke="#8D6E63" stroke-width="2"/>
<!-- Parent stem above -->
<line x1="130" y1="45" x2="130" y2="28" stroke="#66BB6A" stroke-width="1.5"/>
<ellipse cx="130" cy="25" rx="6" ry="4" fill="#4CAF50"/>

<!-- Labels -->
<text x="48" y="42" font-family="Arial,sans-serif" font-size="5" fill="#8D6E63">глазки</text>
<text x="48" y="48" font-family="Arial,sans-serif" font-size="5" fill="#8D6E63">(почки)</text>
<text x="105" y="48" font-family="Arial,sans-serif" font-size="5" fill="#8D6E63">столон</text>
<text x="70" y="85" font-family="Arial,sans-serif" font-size="5" fill="#E65100">утолщённый подземный побег</text>
<text x="70" y="95" font-family="Arial,sans-serif" font-size="5" fill="#E65100">запас крахмала</text>
<text x="77" y="105" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">картофель, топинамбур</text>
</g>

<!-- Bulb (Луковица) -->
<g transform="translate(330,75)">
<rect x="0" y="0" width="155" height="108" rx="5" fill="white" fill-opacity="0.4" stroke="#9C27B0" stroke-width="0.7"/>
<text x="77" y="13" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Луковица</text>

<!-- Soil -->
<rect x="5" y="30" width="145" height="65" rx="3" fill="url(#soil)" opacity="0.2"/>

<!-- Bulb cross-section -->
<!-- Outer dry scales -->
<ellipse cx="70" cy="55" rx="22" ry="25" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2"/>
<!-- Fleshy scales -->
<ellipse cx="70" cy="55" rx="16" ry="20" fill="#E8F5E9" stroke="#81C784" stroke-width="0.8"/>
<ellipse cx="70" cy="55" rx="10" ry="15" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.5"/>
<!-- Central bud -->
<ellipse cx="70" cy="48" rx="5" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
<!-- Donets (донце) -->
<path d="M50,72 Q70,80 90,72" fill="none" stroke="#8D6E63" stroke-width="2"/>
<!-- Roots from donets -->
<line x1="55" y1="75" x2="52" y2="85" stroke="#A1887F" stroke-width="0.8"/>
<line x1="70" y1="78" x2="70" y2="88" stroke="#A1887F" stroke-width="0.8"/>
<line x1="85" y1="75" x2="88" y2="85" stroke="#A1887F" stroke-width="0.8"/>
<!-- Green leaves above -->
<line x1="70" y1="30" x2="65" y2="18" stroke="#4CAF50" stroke-width="2"/>
<line x1="70" y1="30" x2="75" y2="18" stroke="#4CAF50" stroke-width="2"/>

<!-- Labels -->
<text x="98" y="42" font-family="Arial,sans-serif" font-size="5" fill="#E65100">сухие чешуи</text>
<text x="98" y="52" font-family="Arial,sans-serif" font-size="5" fill="#81C784">сочные чешуи</text>
<text x="98" y="62" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">зачаточный</text>
<text x="98" y="68" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">побег</text>
<text x="98" y="78" font-family="Arial,sans-serif" font-size="5" fill="#8D6E63">донце</text>
<text x="77" y="105" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">лук, тюльпан, нарцисс</text>
</g>

<!-- Section 2: Above-ground modifications -->
<text x="250" y="195" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Надземные видоизменения</text>

<!-- Tendrils (Усы/усики) -->
<g transform="translate(10,202)">
<rect x="0" y="0" width="115" height="85" rx="4" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.7"/>
<text x="57" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Усики</text>

<!-- Stem -->
<line x1="15" y1="75" x2="15" y2="25" stroke="#4CAF50" stroke-width="2"/>
<!-- Leaf -->
<path d="M15,40 Q30,35 35,40 Q30,45 15,42" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Tendril (modified leaf/stem) -->
<path d="M35,40 Q45,35 55,30 Q65,25 75,30 Q85,35 90,28 Q95,22 100,25" fill="none" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>
<!-- Support -->
<line x1="100" y1="15" x2="100" y2="75" stroke="#795548" stroke-width="2" stroke-dasharray="3,2"/>
<text x="57" y="80" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">горох, виноград, огурец</text>
</g>

<!-- Spines (Колючки) -->
<g transform="translate(130,202)">
<rect x="0" y="0" width="115" height="85" rx="4" fill="white" fill-opacity="0.4" stroke="#795548" stroke-width="0.7"/>
<text x="57" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#4E342E" text-anchor="middle">Колючки</text>

<!-- Stem with spines -->
<line x1="57" y1="78" x2="57" y2="22" stroke="#5D4037" stroke-width="3"/>
<!-- Spines (modified shoots) -->
<path d="M57,28 L72,18" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
<path d="M57,40 L42,30" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
<path d="M57,52 L72,42" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
<path d="M57,64 L42,54" stroke="#795548" stroke-width="2" stroke-linecap="round"/>
<!-- Small leaves -->
<path d="M60,35 Q65,32 62,30" fill="#81C784" stroke="#2E7D32" stroke-width="0.3"/>
<path d="M54,47 Q49,44 52,42" fill="#81C784" stroke="#2E7D32" stroke-width="0.3"/>
<text x="57" y="80" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">боярышник, дикая слива</text>
</g>

<!-- Phylloclades (Филлокладии) -->
<g transform="translate(250,202)">
<rect x="0" y="0" width="115" height="85" rx="4" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.7"/>
<text x="57" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Филлокладии</text>

<!-- Flattened stem segments -->
<rect x="30" y="20" width="25" height="50" rx="8" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
<rect x="55" y="35" width="25" height="40" rx="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
<!-- Small leaf scales -->
<path d="M42,22 Q44,18 46,22" fill="#81C784" stroke="#2E7D32" stroke-width="0.3"/>
<path d="M67,37 Q69,33 71,37" fill="#81C784" stroke="#2E7D32" stroke-width="0.3"/>
<!-- Berries on asparagus -->
<circle cx="75" cy="72" r="3" fill="#E53935"/>
<text x="57" y="80" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">аспарагус, иглица</text>
</g>

<!-- Stolons (Столоны) -->
<g transform="translate(370,202)">
<rect x="0" y="0" width="120" height="85" rx="4" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.7"/>
<text x="60" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Столоны (усы)</text>

<!-- Parent plant -->
<line x1="20" y1="72" x2="20" y2="35" stroke="#4CAF50" stroke-width="2"/>
<ellipse cx="20" cy="32" rx="8" ry="5" fill="#66BB6A"/>
<!-- Runner -->
<path d="M20,65 Q40,58 60,62 Q80,66 100,60" fill="none" stroke="#66BB6A" stroke-width="1.5"/>
<!-- New plant at node -->
<line x1="60" y1="62" x2="60" y2="40" stroke="#4CAF50" stroke-width="1.5"/>
<ellipse cx="60" cy="37" rx="8" ry="5" fill="#66BB6A"/>
<!-- Roots from new plant -->
<line x1="55" y1="62" x2="50" y2="75" stroke="#A1887F" stroke-width="0.8"/>
<line x1="65" y1="62" x2="70" y2="75" stroke="#A1887F" stroke-width="0.8"/>
<!-- Another new plant -->
<line x1="100" y1="60" x2="100" y2="42" stroke="#4CAF50" stroke-width="1.2"/>
<ellipse cx="100" cy="39" rx="6" ry="4" fill="#66BB6A"/>
<text x="60" y="80" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">земляника, живучка</text>
</g>

<!-- Section 3: Comparison summary -->
<g transform="translate(10,295)">
<rect x="0" y="0" width="480" height="42" rx="5" fill="white" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="240" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Как отличить видоизменённый побег от корня?</text>
<text x="240" y="22" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Побег: есть узлы, почки (глазки), чешуйки (видоизменённые листья), придаточные корни</text>
<text x="240" y="32" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Корень: нет узлов, почек, листьев — только корневые волоски и чехлик на конце</text>
<text x="240" y="40" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Клубень = видоизменённый побег (есть глазки-почки), корнеплод = видоизменённый корень (нет почек)</text>
</g>
</svg>