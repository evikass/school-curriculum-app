  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 1</text>
  
  <circle cx="250" cy="110" r="40" fill="#4CAF50" opacity="0.9"/>
