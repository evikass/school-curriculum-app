  <line x1="250" y1="150" x2="130" y2="190" stroke="#66BB6A" stroke-width="2"/>
  <line x1="250" y1="150" x2="370" y2="190" stroke="#66BB6A" stroke-width="2"/>
  <line x1="250" y1="150" x2="250" y2="190" stroke="#66BB6A" stroke-width="2"/>
