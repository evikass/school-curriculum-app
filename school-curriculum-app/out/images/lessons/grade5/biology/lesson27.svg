<circle cx="42" cy="55" r="4" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>
<circle cx="35" cy="60" r="3" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>

<!-- Labels -->
<text x="60" y="10" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">рыльце</text>
<text x="60" y="17" font-family="Arial,sans-serif" font-size="5" fill="#888">(ловит пыльцу)</text>
<line x1="44" y1="10" x2="58" y2="10" stroke="#2E7D32" stroke-width="0.3"/>

<text x="60" y="32" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">столбик</text>
<text x="60" y="39" font-family="Arial,sans-serif" font-size="5" fill="#888">(проводник пыльцы)</text>
<line x1="38" y1="30" x2="58" y2="31" stroke="#4CAF50" stroke-width="0.3"/>

<text x="60" y="52" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">завязь</text>
<text x="60" y="59" font-family="Arial,sans-serif" font-size="5" fill="#888">(семяпочки внутри)</text>
<line x1="53" y1="52" x2="58" y2="52" stroke="#1B5E20" stroke-width="0.3"/>

<text x="28" y="68" font-family="Arial,sans-serif" font-size="5" fill="#FBC02D" text-anchor="middle">семяпочки</text>
<text x="28" y="74" font-family="Arial,sans-serif" font-size="4" fill="#FBC02D" text-anchor="middle">(будущие семена)</text>
</g>

<!-- Section 4: Flower formula and parts summary -->
<text x="140" y="220" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Формула цветка шиповника</text>

<g transform="translate(20,228)">
<rect x="0" y="0" width="230" height="105" rx="5" fill="white" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Formula -->
<text x="115" y="18" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">✳ K₅ C₅ A∞ G∞</text>

<!-- Explanation -->
<text x="10" y="35" font-family="Arial,sans-serif" font-size="6" fill="#333">✳ — актиноморфный (правильный) цветок</text>
<text x="10" y="47" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">K₅ — чашечка из 5 чашелистиков</text>
<text x="10" y="59" font-family="Arial,sans-serif" font-size="6" fill="#E91E63">C₅ — венчик из 5 лепестков</text>
<text x="10" y="71" font-family="Arial,sans-serif" font-size="6" fill="#FFC107">A∞ — тычинок много (∞ — неопределённое число)</text>
<text x="10" y="83" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">G∞ — пестиков много, завязь нижняя</text>
<line x1="0" y1="88" x2="230" y2="88" stroke="#E8F5E9" stroke-width="0.5"/>
<text x="115" y="98" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Околоцветник — чашечка + венчик (двойной)</text>
</g>

<!-- Flower types summary -->
<g transform="translate(265,228)">
<rect x="0" y="0" width="215" height="105" rx="5" fill="white" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="107" y="13" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Типы цветков</text>

<text x="10" y="28" font-family="Arial,sans-serif" font-size="6" fill="#333">Обоеполый — есть тычинки и пестики</text>
<text x="10" y="40" font-family="Arial,sans-serif" font-size="6" fill="#333">Раздельнополый:</text>
<text x="20" y="50" font-family="Arial,sans-serif" font-size="6" fill="#FFC107">♂ тычиночный (только тычинки)</text>
<text x="20" y="60" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">♀ пестичный (только пестики)</text>
<line x1="0" y1="65" x2="215" y2="65" stroke="#E8F5E9" stroke-width="0.5"/>
<text x="10" y="76" font-family="Arial,sans-serif" font-size="6" fill="#333">Однодомные — ♂ и ♀ на одном растении</text>
<text x="15" y="85" font-family="Arial,sans-serif" font-size="5" fill="#888">(огурец, кукуруза, дуб)</text>
<text x="10" y="96" font-family="Arial,sans-serif" font-size="6" fill="#333">Двудомные — ♂ и ♀ на разных растениях</text>
<text x="15" y="105" font-family="Arial,sans-serif" font-size="5" fill="#888">(тополь, ива, облепиха)</text>
</g>
</svg>