<line x1="114" y1="105" x2="110" y2="78" stroke="#FFD54F" stroke-width="0.8"/>
<ellipse cx="110" cy="74" rx="4" ry="7" fill="#FFC107" stroke="#F57F17" stroke-width="0.6"/>
