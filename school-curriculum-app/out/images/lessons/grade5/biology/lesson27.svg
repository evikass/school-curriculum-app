<circle cx="121" cy="108" r="2" fill="#FFEB3B"/>
<circle cx="127" cy="110" r="2" fill="#FFEB3B"/>
<text x="165" y="100" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">пестик</text>
<line x1="134" y1="105" x2="162" y2="100" stroke="#1B5E20" stroke-width="0.3"/>
<text x="165" y="108" font-family="Arial,sans-serif" font-size="5" fill="#66BB6A">рыльце</text>
<line x1="130" y1="62" x2="162" y2="108" stroke="#66BB6A" stroke-width="0.2"/>
<text x="165" y="116" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50">столбик</text>
<text x="165" y="124" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">завязь (семяпочки)</text>
</g>

<!-- Section 2: Stamen detail -->
<text x="370" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Тычинка (увеличенно)</text>

<g transform="translate(305,72)">
<!-- Filament (тычиночная нить) -->
<rect x="38" y="50" width="5" height="60" fill="#FFD54F" stroke="#F57F17" stroke-width="0.8" rx="1"/>
<!-- Anther (пыльник) -->
<ellipse cx="40" cy="40" rx="12" ry="18" fill="#FFC107" stroke="#F57F17" stroke-width="1.2"/>
<!-- Two thecae -->
<line x1="40" y1="25" x2="40" y2="55" stroke="#F57F17" stroke-width="0.5"/>
<!-- Pollen grains (пыльцевые зёрна) -->
<circle cx="34" cy="35" r="2" fill="#FFEB3B" stroke="#F57F17" stroke-width="0.3"/>
<circle cx="34" cy="42" r="2" fill="#FFEB3B" stroke="#F57F17" stroke-width="0.3"/>
<circle cx="34" cy="49" r="2" fill="#FFEB3B" stroke="#F57F17" stroke-width="0.3"/>
<circle cx="46" cy="35" r="2" fill="#FFEB3B" stroke="#F57F17" stroke-width="0.3"/>
<circle cx="46" cy="42" r="2" fill="#FFEB3B" stroke="#F57F17" stroke-width="0.3"/>
<circle cx="46" cy="49" r="2" fill="#FFEB3B" stroke="#F57F17" stroke-width="0.3"/>

<!-- Labels -->
<text x="58" y="35" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">пыльник</text>
<text x="58" y="42" font-family="Arial,sans-serif" font-size="5" fill="#888">(гнёзда с пыльцой)</text>
<text x="58" y="60" font-family="Arial,sans-serif" font-size="6" fill="#FFD54F">тычиночная</text>
<text x="58" y="67" font-family="Arial,sans-serif" font-size="6" fill="#FFD54F">нить</text>
<line x1="52" y1="38" x2="56" y2="37" stroke="#F57F17" stroke-width="0.3"/>
<line x1="43" y1="58" x2="56" y2="60" stroke="#FFD54F" stroke-width="0.3"/>

<!-- Pollen detail -->
<circle cx="30" cy="75" r="5" fill="#FFEB3B" stroke="#F57F17" stroke-width="0.8"/>
<circle cx="30" cy="75" r="2" fill="#FFC107"/>
<text x="30" y="85" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">пыльцевое</text>
<text x="30" y="91" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">зерно</text>
<text x="30" y="97" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">(муж. гаметофит)</text>
</g>

<!-- Section 3: Pistil detail -->
<text x="370" y="172" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Пестик (увеличенно)</text>

<g transform="translate(305,178)">
<!-- Stigma -->
<path d="M35,10 Q30,5 25,8 Q22,12 28,15 Q33,18 38,15 Q44,12 42,8 Q38,5 35,10Z" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
<!-- Sticky surface dots -->
<circle cx="28" cy="10" r="1" fill="#FFEB3B"/>
<circle cx="35" cy="9" r="1" fill="#FFEB3B"/>
<circle cx="42" cy="10" r="1" fill="#FFEB3B"/>

