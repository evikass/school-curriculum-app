<!-- Pistil (пестик) -->
<!-- Ovary (завязь) -->
<ellipse cx="124" cy="108" rx="10" ry="12" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
<!-- Style (столбик) -->
<line x1="124" y1="96" x2="124" y2="68" stroke="#4CAF50" stroke-width="1.5"/>
