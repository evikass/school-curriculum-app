<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <rect x="10" y="10" width="480" height="330" fill="white" rx="8" opacity="0.85"/>
  <text x="250" y="35" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#2E7D32" text-anchor="middle">Роль бактерий в природе и жизни человека</text>
  <text x="250" y="50" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 5 класс — Урок 12</text>
  
  <rect x="30" y="70" width="210" height="120" fill="#E8F5E9" rx="8" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="135" y="90" font-family="Arial,sans-serif" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">Положительная роль</text>
  <text x="50" y="110" font-family="Arial,sans-serif" font-size="7" fill="#555">♻️ Санитары природы — разлагают</text>
  <text x="55" y="123" font-family="Arial,sans-serif" font-size="7" fill="#555">мёртвые организмы</text>
  <text x="50" y="138" font-family="Arial,sans-serif" font-size="7" fill="#555">🌱 Клубеньковые — фиксируют N2</text>
  <text x="55" y="151" font-family="Arial,sans-serif" font-size="7" fill="#555">обогащают почву азотом</text>
  <text x="50" y="166" font-family="Arial,sans-serif" font-size="7" fill="#555">🧀 Молочнокислые — кефир,</text>
  <text x="55" y="179" font-family="Arial,sans-serif" font-size="7" fill="#555">йогурт, квашеная капуста</text>
  <rect x="260" y="70" width="210" height="120" fill="#FFEBEE" rx="8" stroke="#EF5350" stroke-width="1.5"/>
  <text x="365" y="90" font-family="Arial,sans-serif" font-size="10" fill="#C62828" text-anchor="middle" font-weight="bold">Отрицательная роль</text>
  <text x="280" y="110" font-family="Arial,sans-serif" font-size="7" fill="#555">🦠 Возбудители болезней:</text>
  <text x="285" y="123" font-family="Arial,sans-serif" font-size="7" fill="#555">туберкулёз, холера, дифтерия</text>
  <text x="280" y="138" font-family="Arial,sans-serif" font-size="7" fill="#555">🍎 Порча продуктов — гниение</text>
  <text x="285" y="151" font-family="Arial,sans-serif" font-size="7" fill="#555">мяса, рыбы, овощей</text>
  <text x="280" y="166" font-family="Arial,sans-serif" font-size="7" fill="#555">🌾 Болезни растений —</text>
  <text x="285" y="179" font-family="Arial,sans-serif" font-size="7" fill="#555">бактериоз, рак</text>
  <rect x="30" y="210" width="440" height="55" fill="#FFF9C4" rx="6" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="230" font-family="Arial,sans-serif" font-size="9" fill="#F57F17" text-anchor="middle" font-weight="bold">Меры профилактики:</text>
  <text x="250" y="248" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Вакцинация · Пастеризация · Стерилизация · Антибиотики · Санитария</text>
  <rect x="30" y="280" width="440" height="45" fill="#E3F2FD" rx="6"/>
  <text x="250" y="300" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">А. Флеминг открыл пенициллин (1929) — первый антибиотик</text>
  <text x="250" y="315" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Пастеризация (60–70°C) — частичное уничтожение · Стерилизация (120°C) — полное</text>
  
</svg>