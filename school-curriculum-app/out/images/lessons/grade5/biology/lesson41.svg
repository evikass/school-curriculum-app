<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="24" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Взаимосвязи организмов</text>
  <text x="250" y="37" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 41</text>
  <line x1="30" y1="43" x2="470" y2="43" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

  <!-- 6 Relationship types in 2 rows x 3 cols -->
  <!-- 1. Мутуализм (Mutualism) -->
  <rect x="20" y="50" width="150" height="80" rx="5" fill="white" stroke="#4CAF50" stroke-width="1" opacity="0.9"/>
  <rect x="20" y="50" width="150" height="14" rx="5" fill="#4CAF50"/>
  <text x="95" y="61" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Мутуализм (+/+)</text>
  <!-- Two organisms benefiting -->
  <circle cx="55" cy="85" r="12" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="55" y="88" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">А</text>
  <circle cx="135" cy="85" r="12" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="135" y="88" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">Б</text>
  <!-- Double arrow -->
  <path d="M70 82 L120 82" fill="none" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrG)"/>
  <path d="M120 88 L70 88" fill="none" stroke="#4CAF50" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="95" y="105" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Оба выигрывают</text>
  <text x="95" y="114" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Пример: лишейник (гриб+водор.)</text>
  <text x="95" y="123" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">клубеньки на корнях бобовых</text>

  <!-- 2. Протокооперация -->
  <rect x="175" y="50" width="150" height="80" rx="5" fill="white" stroke="#8BC34A" stroke-width="1" opacity="0.9"/>
  <rect x="175" y="50" width="150" height="14" rx="5" fill="#8BC34A"/>
  <text x="250" y="61" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Протокооперация (+/+)</text>
  <circle cx="210" cy="85" r="12" fill="#C5E1A5" stroke="#8BC34A" stroke-width="0.8"/>
  <text x="210" y="88" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">А</text>
  <circle cx="290" cy="85" r="12" fill="#C5E1A5" stroke="#8BC34A" stroke-width="0.8"/>
  <text x="290" y="88" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">Б</text>
  <path d="M225 85 L275 85" fill="none" stroke="#8BC34A" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="250" y="105" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Выгодно, но не обязательно</text>
  <text x="250" y="114" font-family="Arial,sans-serif" font-size="5" fill="#558B2F" text-anchor="middle">Пример: краб + актиния</text>
  <text x="250" y="123" font-family="Arial,sans-serif" font-size="5" fill="#558B2F" text-anchor="middle">птица + крокодил (зубы чистит)</text>

  <!-- 3. Комменсализм -->
  <rect x="330" y="50" width="150" height="80" rx="5" fill="white" stroke="#FF9800" stroke-width="1" opacity="0.9"/>
  <rect x="330" y="50" width="150" height="14" rx="5" fill="#FF9800"/>
  <text x="405" y="61" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Комменсализм (+/0)</text>
  <circle cx="365" cy="85" r="12" fill="#FFE0B2" stroke="#FF9800" stroke-width="0.8"/>
  <text x="365" y="88" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">А+</text>
  <circle cx="445" cy="85" r="12" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="0.8"/>
  <text x="445" y="88" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Б0</text>
  <path d="M380 85 L430 85" fill="none" stroke="#FF9800" stroke-width="1" marker-end="url(#arrO)"/>
  <text x="405" y="105" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Один выигр., друг. нейтр.</text>
  <text x="405" y="114" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Пример: эпифиты на деревьях</text>
  <text x="405" y="123" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">рыба-прилипала + акула</text>

  <!-- 4. Паразитизм -->
  <rect x="20" y="135" width="150" height="80" rx="5" fill="white" stroke="#F44336" stroke-width="1" opacity="0.9"/>
  <rect x="20" y="135" width="150" height="14" rx="5" fill="#F44336"/>
  <text x="95" y="146" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Паразитизм (+/-)</text>
  <circle cx="55" cy="170" r="12" fill="#FFCDD2" stroke="#F44336" stroke-width="0.8"/>
  <text x="55" y="173" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle">П+</text>
  <circle cx="135" cy="170" r="12" fill="#EF9A9A" stroke="#F44336" stroke-width="0.8"/>
  <text x="135" y="173" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle">Х-</text>
  <path d="M70 170 L120 170" fill="none" stroke="#F44336" stroke-width="1.5" marker-end="url(#arrR)"/>
  <text x="95" y="190" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Один выигр., друг. страдает</text>
  <text x="95" y="199" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle">Пример: повилика на растении</text>
  <text x="95" y="208" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle">аскарида в кишечнике</text>

  <!-- 5. Конкуренция -->
  <rect x="175" y="135" width="150" height="80" rx="5" fill="white" stroke="#795548" stroke-width="1" opacity="0.9"/>
  <rect x="175" y="135" width="150" height="14" rx="5" fill="#795548"/>
  <text x="250" y="146" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Конкуренция (-/-)</text>
  <circle cx="210" cy="170" r="12" fill="#D7CCC8" stroke="#795548" stroke-width="0.8"/>
  <text x="210" y="173" font-family="Arial,sans-serif" font-size="5" fill="#3E2723" text-anchor="middle">А-</text>
  <circle cx="290" cy="170" r="12" fill="#D7CCC8" stroke="#795548" stroke-width="0.8"/>
  <text x="290" y="173" font-family="Arial,sans-serif" font-size="5" fill="#3E2723" text-anchor="middle">Б-</text>
  <!-- Clashing arrows -->
  <path d="M225 167 L260 167" fill="none" stroke="#795548" stroke-width="1.5" marker-end="url(#arrBr)"/>
  <path d="M275 173 L240 173" fill="none" stroke="#795548" stroke-width="1.5" marker-end="url(#arrBr)"/>
  <text x="250" y="190" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Обоим невыгодно</text>
  <text x="250" y="199" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">Пример: волк и лиса за добычу</text>
  <text x="250" y="208" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">сосна и берёза за свет</text>

  <!-- 6. Хищничество -->
  <rect x="330" y="135" width="150" height="80" rx="5" fill="white" stroke="#C62828" stroke-width="1" opacity="0.9"/>
  <rect x="330" y="135" width="150" height="14" rx="5" fill="#C62828"/>
  <text x="405" y="146" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Хищничество (+/-)</text>
  <circle cx="365" cy="170" r="12" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <text x="365" y="173" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">Х+</text>
  <circle cx="445" cy="170" r="12" fill="#FFAB91" stroke="#C62828" stroke-width="0.8"/>
  <text x="445" y="173" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">Ж-</text>
  <path d="M380 170 L430 170" fill="none" stroke="#C62828" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="405" y="190" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Хищник поедает жертву</text>
  <text x="405" y="199" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle">Пример: волк + заяц</text>
  <text x="405" y="208" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle">росянка + насекомое</text>

  <!-- Food web -->
  <text x="250" y="228" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Пищевая сеть</text>

  <!-- Nodes -->
  <!-- Plants -->
  <rect x="30" y="242" width="60" height="16" rx="8" fill="#4CAF50" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="60" y="253" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Растения</text>

  <rect x="120" y="242" width="55" height="16" rx="8" fill="#4CAF50" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="147" y="253" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Трава</text>

  <!-- Herbivores -->
  <rect x="40" y="272" width="50" height="16" rx="8" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  <text x="65" y="283" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Заяц</text>

  <rect x="110" y="272" width="55" height="16" rx="8" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  <text x="137" y="283" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Мышь</text>

  <rect x="185" y="272" width="45" height="16" rx="8" fill="#FF9800" stroke="#E65100" stroke-width="0.8"/>
  <text x="207" y="283" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Олень</text>

  <!-- Predators -->
  <rect x="70" y="302" width="45" height="16" rx="8" fill="#F44336" stroke="#B71C1C" stroke-width="0.8"/>
  <text x="92" y="313" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Лиса</text>

  <rect x="155" y="302" width="50" height="16" rx="8" fill="#F44336" stroke="#B71C1C" stroke-width="0.8"/>
  <text x="180" y="313" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Волк</text>

  <rect x="240" y="272" width="45" height="16" rx="8" fill="#9C27B0" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="262" y="283" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Орёл</text>

  <!-- Decomposers -->
  <rect x="280" y="302" width="60" height="16" rx="8" fill="#5D4037" stroke="#3E2723" stroke-width="0.8"/>
  <text x="310" y="313" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">Редуценты</text>

  <!-- Connections -->
  <line x1="60" y1="258" x2="65" y2="272" stroke="#4CAF50" stroke-width="0.5"/>
  <line x1="60" y1="258" x2="137" y2="272" stroke="#4CAF50" stroke-width="0.5"/>
  <line x1="147" y1="258" x2="137" y2="272" stroke="#4CAF50" stroke-width="0.5"/>
  <line x1="147" y1="258" x2="207" y2="272" stroke="#4CAF50" stroke-width="0.5"/>
  <line x1="65" y1="288" x2="92" y2="302" stroke="#E65100" stroke-width="0.5"/>
  <line x1="137" y1="288" x2="92" y2="302" stroke="#E65100" stroke-width="0.5"/>
  <line x1="207" y1="288" x2="180" y2="302" stroke="#E65100" stroke-width="0.5"/>
  <line x1="65" y1="288" x2="262" y2="272" stroke="#E65100" stroke-width="0.3" stroke-dasharray="2,1"/>
  <line x1="137" y1="288" x2="262" y2="272" stroke="#E65100" stroke-width="0.3" stroke-dasharray="2,1"/>

  <!-- Neutralism box -->
  <rect x="350" y="242" width="130" height="60" rx="5" fill="#F5F5F5" stroke="#9E9E9E" stroke-width="0.8"/>
  <text x="415" y="256" font-family="Arial,sans-serif" font-size="7" fill="#616161" text-anchor="middle" font-weight="bold">Нейтрализм (0/0)</text>
  <text x="415" y="268" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Организмы не влияют</text>
  <text x="415" y="278" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">друг на друга</text>
  <text x="415" y="290" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Пример: белка + ёж</text>
  <text x="415" y="298" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">В природе почти не встречается</text>

  <!-- Key insight -->
  <rect x="350" y="310" width="130" height="30" rx="3" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.5"/>
  <text x="415" y="322" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">Все организмы связаны</text>
  <text x="415" y="332" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">в единую сеть жизни!</text>

  <defs>
    <marker id="arrG" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#4CAF50"/>
    </marker>
    <marker id="arrO" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#FF9800"/>
    </marker>
    <marker id="arrR" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#F44336"/>
    </marker>
    <marker id="arrBr" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L5,2 L0,4 Z" fill="#795548"/>
    </marker>
  </defs>
</svg>