<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient></defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<text x="250" y="30" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1565C0" text-anchor="middle">Равномерное прямолинейное движение</text>
<text x="250" y="46" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Физика 10 класс — Урок 5</text>
<line x1="30" y1="52" x2="470" y2="52" stroke="#1565C0" stroke-width="1.5" opacity="0.25"/>

<g transform="translate(140,200)">
<rect x="-80" y="-75" width="160" height="150" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
<text x="0" y="-60" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">График x(t)</text>
<line x1="-55" y1="50" x2="65" y2="50" stroke="#333" stroke-width="1"/>
<line x1="-55" y1="50" x2="-55" y2="-50" stroke="#333" stroke-width="1"/>
<text x="65" y="62" font-family="Arial,sans-serif" font-size="6" fill="#333">t</text>
<text x="-62" y="-48" font-family="Arial,sans-serif" font-size="6" fill="#333">x</text>
<line x1="-40" y1="30" x2="55" y2="-35" stroke="#E53935" stroke-width="2"/>
<text x="30" y="-15" font-family="Arial,sans-serif" font-size="6" fill="#E53935">x = x0 + vt</text>
<line x1="-55" y1="30" x2="-40" y2="30" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="3,2"/>
<text x="-55" y="27" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">x0</text>
</g>
<g transform="translate(370,180)">
<rect x="-80" y="-75" width="160" height="150" rx="5" fill="white" stroke="#1565C0" stroke-width="1.5"/>
<text x="0" y="-60" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">График v(t)</text>
<line x1="-55" y1="50" x2="65" y2="50" stroke="#333" stroke-width="1"/>
<line x1="-55" y1="50" x2="-55" y2="-50" stroke="#333" stroke-width="1"/>
<text x="65" y="62" font-family="Arial,sans-serif" font-size="6" fill="#333">t</text>
<text x="-62" y="-48" font-family="Arial,sans-serif" font-size="6" fill="#333">v</text>
<line x1="-40" y1="10" x2="55" y2="10" stroke="#2E7D32" stroke-width="2"/>
<text x="10" y="5" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">v = const</text>
<line x1="-55" y1="10" x2="-40" y2="10" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="3,2"/>
<rect x="-40" y="10" width="95" height="40" fill="#2E7D32" opacity="0.1" stroke="#2E7D32" stroke-width="0.5"/>
<text x="8" y="35" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">S = v*t</text>
</g>
<rect x="30" y="295" width="440" height="18" rx="5" fill="white" stroke="#1565C0" stroke-width="1" opacity="0.9"/>
<text x="250" y="309" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Равномерное прямолинейное: v = const | x = x0 + vx*t</text>
<text x="250" y="320" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">График x(t) — прямая, v(t) — горизонтальная прямая, площадь = S</text>

<rect x="10" y="325" width="480" height="20" rx="4" fill="#1565C0" opacity="0.85"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="11" text-anchor="middle" fill="white" font-weight="bold">Физика 10 класс</text>
</svg>