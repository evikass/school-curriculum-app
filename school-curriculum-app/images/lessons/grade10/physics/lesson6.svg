<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e88e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43a047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e53935;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c62828;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#546e7a" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#90a4ae" stroke-width="1" rx="3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#37474f">Закон сохранения энергии</text>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#546e7a">ФИЗИКА · 10 КЛАСС</text>
  <text x="30" y="35" font-family="Arial, sans-serif" font-size="12" fill="#78909c">Урок 12</text>
  
  <!-- Кинетическая энергия секция -->
  <g transform="translate(30, 80)">
    <rect x="0" y="0" width="200" height="80" fill="#e3f2fd" stroke="#1e88e5" stroke-width="2" rx="5"/>
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1565c0">Кинетическая энергия</text>
    <text x="100" y="50" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#0d47a1">E<sub>к</sub> = mv²/2</text>
    
    <!-- Иконка скорости -->
    <circle cx="20" cy="65" r="8" fill="url(#blueGradient)"/>
    <line x1="28" y1="65" x2="40" y2="65" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="65" x2="45" y2="60" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="65" x2="45" y2="70" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Потенциальная энергия секция -->
  <g transform="translate(270, 80)">
    <rect x="0" y="0" width="200" height="80" fill="#e8f5e9" stroke="#43a047" stroke-width="2" rx="5"/>
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2e7d32">Потенциальная энергия</text>
    
    <!-- Подсекция гравитационная -->
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1b5e20">В поле тяжести:</text>
    <text x="100" y="65" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#1b5e20">E<sub>п</sub> = mgh</text>
  </g>
  
  <!-- Упругая энергия секция -->
  <g transform="translate(30, 180)">
    <rect x="0" y="0" width="200" height="80" fill="#ffebee" stroke="#e53935" stroke-width="2" rx="5"/>
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#c62828">Упругая энергия</text>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#b71c1c">Упруго деформированного тела:</text>
    <text x="100" y="65" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#b71c1c">E<sub>п</sub> = kx²/2</text>
    
    <!-- Иконка пружины -->
    <path d="M 30 60 Q 35 55 40 60 T 50 60 T 60 60 T 70 60" fill="none" stroke="#c62828" stroke-width="2"/>
  </g>
  
  <!-- Полная механическая энергия секция -->
  <g transform="translate(270, 180)">
    <rect x="0" y="0" width="200" height="80" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
    <text x="100" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#e65100">Полная механическая энергия</text>
    <text x="100" y="50" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#e65100">E = E<sub>к</sub> + E<sub>п</sub></text>
    
    <!-- Иконка сложения -->
    <circle cx="30" cy="65" r="8" fill="#ff9800"/>
    <circle cx="50" cy="65" r="8" fill="#ff9800"/>
    <line x1="25" y1="60" x2="55" y2="70" stroke="#e65100" stroke-width="2"/>
    <line x1="25" y1="70" x2="55" y2="60" stroke="#e65100" stroke-width="2"/>
  </g>
  
  <!-- Закон сохранения энергии секция -->
  <g transform="translate(30, 280)">
    <rect x="0" y="0" width="440" height="50" fill="#f3e5f5" stroke="#8e24aa" stroke-width="2" rx="5"/>
    <text x="220" y="20" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#6a1b9a">Закон сохранения энергии</text>
    <text x="220" y="38" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#4a148c">В замкнутой системе, где действуют только консервативные силы,</text>
    <text x="220" y="50" font-family="Arial, sans-serif" font-size="13" text-anchor="middle" fill="#4a148c">полная механическая энергия остается постоянной</text>
  </g>
  
  <!-- Диаграмма преобразования энергии -->
  <g transform="translate(150, 90)">
    <!-- Фон диаграммы -->
    <rect x="0" y="0" width="200" height="120" fill="#fafafa" stroke="#9e9e9e" stroke-width="1" rx="3" opacity="0.5"/>
    
    <!-- Кинетическая энергия (справа) -->
    <rect x="120" y="20" width="30" height="80" fill="url(#blueGradient)" opacity="0.7"/>
    <text x="135" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1565c0">E<sub>к</sub></text>
    
    <!-- Потенциальная энергия (слева) -->
    <rect x="50" y="20" width="30" height="80" fill="url(#greenGradient)" opacity="0.7"/>
    <text x="65" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2e7d32">E<sub>п</sub></text>
    
    <!-- Стрелка преобразования -->
    <path d="M 80 60 Q 100 40 120 60" fill="none" stroke="#ff5722" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d84315">преобразование</text>
    
    <!-- Стрелка в обратную сторону -->
    <path d="M 120 80 Q 100 100 80 80" fill="none" stroke="#ff5722" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Общая энергия (над диаграммой) -->
    <line x1="40" y1="10" x2="160" y2="10" stroke="#37474f" stroke-width="2"/>
    <text x="100" y="8" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#37474f">E = const</text>
  </g>
  
  <!-- Определение стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff5722"/>
    </marker>
  </defs>
  
  <!-- Дополнительные элементы для заполнения -->
  <circle cx="450" cy="30" r="3" fill="#90a4ae"/>
  <circle cx="460" cy="30" r="3" fill="#90a4ae"/>
  <circle cx="470" cy="30" r="3" fill="#90a4ae"/>
  
  <rect x="20" y="100" width="4" height="30" fill="#b0bec5" rx="2"/>
  <rect x="455" y="200" width="4" height="30" fill="#b0bec5" rx="2"/>
  
  <text x="25" y="145" font-family="Arial, sans-serif" font-size="8" fill="#78909c">m</text>
  <text x="460" y="245" font-family="Arial, sans-serif" font-size="8" fill="#78909c">k</text>
  
  <path d="M 30 120 Q 35 115 40 120 T 50 120" fill="none" stroke="#b0bec5" stroke-width="1"/>
  <path d="M 470 220 Q 475 215 480 220 T 490 220" fill="none" stroke="#b0bec5" stroke-width="1"/>
</svg>