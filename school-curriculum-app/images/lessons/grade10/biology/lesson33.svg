<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg33" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="50%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e1bee7"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg33)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#6a1b9a" stroke-width="2" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="38" fill="#6a1b9a" rx="8"/>
  <rect x="0" y="20" width="500" height="18" fill="#6a1b9a"/>
  <text x="250" y="26" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">Сравнение митоза и мейоза</text>
  <text x="490" y="14" text-anchor="end" fill="#e1bee7" font-size="8" font-family="Arial">Биология 10 класс — Урок 33</text>
  <!-- Two columns -->
  <!-- MITOSIS column -->
  <rect x="20" y="46" width="225" height="18" fill="#2e7d32" rx="4"/>
  <text x="132" y="59" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">МИТОЗ</text>
  <!-- MEIOSIS column -->
  <rect x="255" y="46" width="225" height="18" fill="#7b1fa2" rx="4"/>
  <text x="367" y="59" text-anchor="middle" fill="white" font-size="11" font-weight="bold" font-family="Arial">МЕЙОЗ</text>
  <!-- Comparison table -->
  <!-- Row 1: Number of divisions -->
  <rect x="20" y="68" width="225" height="28" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5" rx="2"/>
  <rect x="255" y="68" width="225" height="28" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="0.5" rx="2"/>
  <text x="30" y="78" fill="#1b5e20" font-size="8" font-weight="bold" font-family="Arial">Число делений:</text>
  <text x="30" y="90" fill="#4e342e" font-size="9" font-family="Arial">1 деление</text>
  <text x="265" y="78" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">Число делений:</text>
  <text x="265" y="90" fill="#4e342e" font-size="9" font-family="Arial">2 деления (I и II)</text>
  <!-- Row 2: Daughter cells -->
  <rect x="20" y="100" width="225" height="28" fill="#c8e6c9" stroke="#2e7d32" stroke-width="0.5" rx="2"/>
  <rect x="255" y="100" width="225" height="28" fill="#e1bee7" stroke="#7b1fa2" stroke-width="0.5" rx="2"/>
  <text x="30" y="110" fill="#1b5e20" font-size="8" font-weight="bold" font-family="Arial">Дочерние клетки:</text>
  <text x="30" y="122" fill="#4e342e" font-size="9" font-family="Arial">2 клетки</text>
  <text x="265" y="110" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">Дочерние клетки:</text>
  <text x="265" y="122" fill="#4e342e" font-size="9" font-family="Arial">4 клетки</text>
  <!-- Row 3: Ploidy -->
  <rect x="20" y="132" width="225" height="28" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5" rx="2"/>
  <rect x="255" y="132" width="225" height="28" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="0.5" rx="2"/>
  <text x="30" y="142" fill="#1b5e20" font-size="8" font-weight="bold" font-family="Arial">Плоидность:</text>
  <text x="30" y="154" fill="#4e342e" font-size="9" font-family="Arial">2n → 2n (диплоидные)</text>
  <text x="265" y="142" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">Плоидность:</text>
  <text x="265" y="154" fill="#4e342e" font-size="9" font-family="Arial">2n → n (гаплоидные)</text>
  <!-- Row 4: Genetic identity -->
  <rect x="20" y="164" width="225" height="28" fill="#c8e6c9" stroke="#2e7d32" stroke-width="0.5" rx="2"/>
  <rect x="255" y="164" width="225" height="28" fill="#e1bee7" stroke="#7b1fa2" stroke-width="0.5" rx="2"/>
  <text x="30" y="174" fill="#1b5e20" font-size="8" font-weight="bold" font-family="Arial">Генетическая идентичность:</text>
  <text x="30" y="186" fill="#4e342e" font-size="9" font-family="Arial">Идентичные (копии)</text>
  <text x="265" y="174" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">Генетическая идентичность:</text>
  <text x="265" y="186" fill="#4e342e" font-size="9" font-family="Arial">Разнообразные (рекомбинация)</text>
  <!-- Row 5: Crossing over -->
  <rect x="20" y="196" width="225" height="28" fill="#e8f5e9" stroke="#2e7d32" stroke-width="0.5" rx="2"/>
  <rect x="255" y="196" width="225" height="28" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="0.5" rx="2"/>
  <text x="30" y="206" fill="#1b5e20" font-size="8" font-weight="bold" font-family="Arial">Кроссинговер:</text>
  <text x="30" y="218" fill="#4e342e" font-size="9" font-family="Arial">Нет</text>
  <text x="265" y="206" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">Кроссинговер:</text>
  <text x="265" y="218" fill="#4e342e" font-size="9" font-family="Arial">Да (Профаза I)</text>
  <!-- Row 6: Biological role -->
  <rect x="20" y="228" width="225" height="28" fill="#c8e6c9" stroke="#2e7d32" stroke-width="0.5" rx="2"/>
  <rect x="255" y="228" width="225" height="28" fill="#e1bee7" stroke="#7b1fa2" stroke-width="0.5" rx="2"/>
  <text x="30" y="238" fill="#1b5e20" font-size="8" font-weight="bold" font-family="Arial">Биологическая роль:</text>
  <text x="30" y="250" fill="#4e342e" font-size="9" font-family="Arial">Рост, регенерация</text>
  <text x="265" y="238" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">Биологическая роль:</text>
  <text x="265" y="250" fill="#4e342e" font-size="9" font-family="Arial">Образование гамет</text>
  <!-- Visual comparison: cell diagrams -->
  <!-- Mitosis visual -->
  <rect x="20" y="262" width="225" height="78" fill="white" fill-opacity="0.6" rx="5" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="132" y="276" text-anchor="middle" fill="#1b5e20" font-size="8" font-weight="bold" font-family="Arial">Схема митоза</text>
  <!-- Parent cell -->
  <ellipse cx="55" cy="305" rx="18" ry="14" fill="#fff9c4" stroke="#558b2f" stroke-width="1"/>
  <text x="55" y="309" text-anchor="middle" fill="#d32f2f" font-size="6" font-weight="bold" font-family="Arial">2n</text>
  <line x1="73" y1="305" x2="95" y2="305" stroke="#2e7d32" stroke-width="1" marker-end="url(#aM33)"/>
  <defs><marker id="aM33" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#2e7d32"/></marker></defs>
  <!-- 2 daughter cells -->
  <ellipse cx="120" cy="295" rx="14" ry="11" fill="#fff9c4" stroke="#558b2f" stroke-width="1"/>
  <text x="120" y="299" text-anchor="middle" fill="#d32f2f" font-size="5" font-weight="bold" font-family="Arial">2n</text>
  <ellipse cx="120" cy="318" rx="14" ry="11" fill="#fff9c4" stroke="#558b2f" stroke-width="1"/>
  <text x="120" y="322" text-anchor="middle" fill="#d32f2f" font-size="5" font-weight="bold" font-family="Arial">2n</text>
  <!-- Chromosome illustration for mitosis -->
  <line x1="155" y1="285" x2="155" y2="295" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="158" y1="285" x2="158" y2="295" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="300" x2="155" y2="310" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="158" y1="300" x2="158" y2="310" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <text x="165" y="295" fill="#4e342e" font-size="6" font-family="Arial">=</text>
  <line x1="175" y1="285" x2="175" y2="295" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="178" y1="285" x2="178" y2="295" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <text x="165" y="310" fill="#4e342e" font-size="6" font-family="Arial">=</text>
  <line x1="175" y1="300" x2="175" y2="310" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="178" y1="300" x2="178" y2="310" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <text x="210" y="293" fill="#1b5e20" font-size="7" font-family="Arial">Идентичные</text>
  <text x="210" y="303" fill="#1b5e20" font-size="7" font-family="Arial">дочерние</text>
  <text x="210" y="313" fill="#1b5e20" font-size="7" font-family="Arial">клетки</text>
  <!-- Meiosis visual -->
  <rect x="255" y="262" width="225" height="78" fill="white" fill-opacity="0.6" rx="5" stroke="#7b1fa2" stroke-width="0.8"/>
  <text x="367" y="276" text-anchor="middle" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">Схема мейоза</text>
  <ellipse cx="290" cy="305" rx="18" ry="14" fill="#fff9c4" stroke="#6a1b9a" stroke-width="1"/>
  <text x="290" y="309" text-anchor="middle" fill="#d32f2f" font-size="6" font-weight="bold" font-family="Arial">2n</text>
  <line x1="308" y1="305" x2="320" y2="305" stroke="#7b1fa2" stroke-width="1" marker-end="url(#aMe33)"/>
  <defs><marker id="aMe33" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#7b1fa2"/></marker></defs>
  <!-- After Meiosis I: 2 cells -->
  <ellipse cx="340" cy="295" rx="12" ry="10" fill="#fff9c4" stroke="#6a1b9a" stroke-width="1"/>
  <text x="340" y="299" text-anchor="middle" fill="#7b1fa2" font-size="5" font-weight="bold" font-family="Arial">n</text>
  <ellipse cx="340" cy="318" rx="12" ry="10" fill="#fff9c4" stroke="#6a1b9a" stroke-width="1"/>
  <text x="340" y="322" text-anchor="middle" fill="#7b1fa2" font-size="5" font-weight="bold" font-family="Arial">n</text>
  <line x1="352" y1="295" x2="365" y2="290" stroke="#7b1fa2" stroke-width="0.8" marker-end="url(#aMe33)"/>
  <line x1="352" y1="295" x2="365" y2="300" stroke="#7b1fa2" stroke-width="0.8" marker-end="url(#aMe33)"/>
  <line x1="352" y1="318" x2="365" y2="313" stroke="#7b1fa2" stroke-width="0.8" marker-end="url(#aMe33)"/>
  <line x1="352" y1="318" x2="365" y2="323" stroke="#7b1fa2" stroke-width="0.8" marker-end="url(#aMe33)"/>
  <!-- 4 haploid cells -->
  <ellipse cx="380" cy="285" rx="9" ry="7" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="0.8"/>
  <ellipse cx="380" cy="298" rx="9" ry="7" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="0.8"/>
  <ellipse cx="380" cy="311" rx="9" ry="7" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="0.8"/>
  <ellipse cx="380" cy="324" rx="9" ry="7" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="0.8"/>
  <text x="380" y="288" text-anchor="middle" fill="#7b1fa2" font-size="4" font-weight="bold" font-family="Arial">n</text>
  <text x="380" y="301" text-anchor="middle" fill="#7b1fa2" font-size="4" font-weight="bold" font-family="Arial">n</text>
  <text x="380" y="314" text-anchor="middle" fill="#7b1fa2" font-size="4" font-weight="bold" font-family="Arial">n</text>
  <text x="380" y="327" text-anchor="middle" fill="#7b1fa2" font-size="4" font-weight="bold" font-family="Arial">n</text>
  <text x="430" y="295" fill="#4a148c" font-size="7" font-family="Arial">Разные</text>
  <text x="430" y="305" fill="#4a148c" font-size="7" font-family="Arial">гаплоидные</text>
  <text x="430" y="315" fill="#4a148c" font-size="7" font-family="Arial">клетки</text>
  <!-- VS circle -->
  <circle cx="247" cy="55" r="10" fill="#ff6f00" stroke="white" stroke-width="1.5"/>
  <text x="247" y="59" text-anchor="middle" fill="white" font-size="8" font-weight="bold" font-family="Arial">VS</text>
</svg>