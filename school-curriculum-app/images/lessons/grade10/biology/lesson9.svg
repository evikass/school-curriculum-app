<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FBE9E7"/><stop offset="100%" stop-color="#FFCCBC"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#BF360C" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle">Функции белков. Ферменты</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 9</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#BF360C" stroke-width="1" opacity="0.3"/>

<!-- Enzyme-substrate complex (lock and key) -->
<g transform="translate(145,155)">
  <rect x="-115" y="-75" width="230" height="160" rx="6" fill="white" opacity="0.92" stroke="#BF360C" stroke-width="1.2"/>
  <text x="0" y="-58" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" text-anchor="middle" font-weight="bold">ФЕРМЕНТ + СУБСТРАТ</text>
  <line x1="-95" y1="-52" x2="95" y2="-52" stroke="#BF360C" stroke-width="0.5"/>

  <!-- Step 1: Substrate approaches enzyme -->
  <g transform="translate(-65,-25)">
    <text x="0" y="-30" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">1. Сближение</text>
    <!-- Enzyme (larger shape with active site) -->
    <ellipse cx="0" cy="5" rx="28" ry="18" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="1.5"/>
    <!-- Active site indentation -->
    <path d="M-10,-12 Q0,-8 10,-12" fill="#FBE9E7" stroke="#E65100" stroke-width="1.2"/>
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Фермент</text>
    <!-- Substrate (smaller shape fitting active site) -->
    <path d="M-7,-28 Q0,-22 7,-28 Q10,-32 7,-36 Q0,-40 -7,-36 Q-10,-32 -7,-28 Z" fill="#4CAF50" opacity="0.5" stroke="#2E7D32" stroke-width="1"/>
    <text x="0" y="-31" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle" font-weight="bold">S</text>
  </g>

  <!-- Step 2: Enzyme-substrate complex -->
  <g transform="translate(0,-25)">
    <text x="0" y="-30" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">2. ES-комплекс</text>
    <!-- Enzyme with substrate in active site -->
    <ellipse cx="0" cy="5" rx="28" ry="18" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="1.5"/>
    <path d="M-10,-12 Q0,-8 10,-12" fill="#FBE9E7" stroke="#E65100" stroke-width="1.2"/>
    <!-- Substrate fits into active site -->
    <path d="M-6,-14 Q0,-10 6,-14 Q8,-18 6,-22 Q0,-26 -6,-22 Q-8,-18 -6,-14 Z" fill="#4CAF50" opacity="0.5" stroke="#2E7D32" stroke-width="1"/>
    <text x="0" y="-16" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle" font-weight="bold">S</text>
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Фермент</text>
  </g>

  <!-- Step 3: Products released -->
  <g transform="translate(65,-25)">
    <text x="0" y="-30" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">3. Продукты</text>
    <!-- Enzyme unchanged -->
    <ellipse cx="0" cy="5" rx="28" ry="18" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="1.5"/>
    <path d="M-10,-12 Q0,-8 10,-12" fill="#FBE9E7" stroke="#E65100" stroke-width="1.2"/>
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Фермент</text>
    <!-- Two product pieces -->
    <rect x="-12" y="-30" width="10" height="8" rx="2" fill="#9C27B0" opacity="0.4" stroke="#7B1FA2" stroke-width="0.8"/>
    <text x="-7" y="-24" font-family="Arial,sans-serif" font-size="4" fill="#7B1FA2" text-anchor="middle">P1</text>
    <rect x="2" y="-30" width="10" height="8" rx="2" fill="#2196F3" opacity="0.4" stroke="#1565C0" stroke-width="0.8"/>
    <text x="7" y="-24" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">P2</text>
  </g>

  <!-- Arrows between steps -->
  <line x1="-35" y1="-25" x2="-20" y2="-25" stroke="#BF360C" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="30" y1="-25" x2="45" y2="-25" stroke="#BF360C" stroke-width="1" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#BF360C"/></marker></defs>

  <text x="0" y="38" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="middle" font-weight="bold">Модель «ключ-замок»</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Фермент не расходуется —</text>
  <text x="0" y="60" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">катализирует множество реакций</text>

  <!-- Enzyme properties -->
  <text x="0" y="75" font-family="Arial,sans-serif" font-size="6" fill="#1A237E" text-anchor="middle" font-weight="bold">Свойства ферментов:</text>
  <text x="-50" y="83" font-family="Arial,sans-serif" font-size="5" fill="#666">Специфичность</text>
  <text x="40" y="83" font-family="Arial,sans-serif" font-size="5" fill="#666">Высокая активность</text>
</g>

<!-- Protein functions -->
<g transform="translate(370,70)">
  <rect x="-75" y="-10" width="150" height="220" rx="6" fill="white" opacity="0.92" stroke="#283593" stroke-width="1"/>
  <text x="0" y="5" font-family="Arial,sans-serif" font-size="9" fill="#1A237E" text-anchor="middle" font-weight="bold">ФУНКЦИИ БЕЛКОВ</text>
  <line x1="-60" y1="10" x2="60" y2="10" stroke="#283593" stroke-width="0.5"/>

  <g transform="translate(0,28)">
    <rect x="-60" y="-5" width="120" height="16" rx="3" fill="#F44336" opacity="0.12" stroke="#F44336" stroke-width="0.7"/>
    <circle cx="-48" cy="3" r="4" fill="#F44336" opacity="0.5"/>
    <text x="-38" y="7" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Каталитическая</text>
    <text x="50" y="7" font-family="Arial,sans-serif" font-size="5" fill="#666">Ферменты</text>
  </g>
  <g transform="translate(0,50)">
    <rect x="-60" y="-5" width="120" height="16" rx="3" fill="#4CAF50" opacity="0.12" stroke="#4CAF50" stroke-width="0.7"/>
    <circle cx="-48" cy="3" r="4" fill="#4CAF50" opacity="0.5"/>
    <text x="-38" y="7" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Строительная</text>
    <text x="50" y="7" font-family="Arial,sans-serif" font-size="5" fill="#666">Коллаген</text>
  </g>
  <g transform="translate(0,72)">
    <rect x="-60" y="-5" width="120" height="16" rx="3" fill="#2196F3" opacity="0.12" stroke="#2196F3" stroke-width="0.7"/>
    <circle cx="-48" cy="3" r="4" fill="#2196F3" opacity="0.5"/>
    <text x="-38" y="7" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">Транспортная</text>
    <text x="50" y="7" font-family="Arial,sans-serif" font-size="5" fill="#666">Гемоглобин</text>
  </g>
  <g transform="translate(0,94)">
    <rect x="-60" y="-5" width="120" height="16" rx="3" fill="#9C27B0" opacity="0.12" stroke="#9C27B0" stroke-width="0.7"/>
    <circle cx="-48" cy="3" r="4" fill="#9C27B0" opacity="0.5"/>
    <text x="-38" y="7" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" font-weight="bold">Защитная</text>
    <text x="50" y="7" font-family="Arial,sans-serif" font-size="5" fill="#666">Антитела</text>
  </g>
  <g transform="translate(0,116)">
    <rect x="-60" y="-5" width="120" height="16" rx="3" fill="#FF9800" opacity="0.12" stroke="#FF9800" stroke-width="0.7"/>
    <circle cx="-48" cy="3" r="4" fill="#FF9800" opacity="0.5"/>
    <text x="-38" y="7" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">Регуляторная</text>
    <text x="50" y="7" font-family="Arial,sans-serif" font-size="5" fill="#666">Инсулин</text>
  </g>
  <g transform="translate(0,138)">
    <rect x="-60" y="-5" width="120" height="16" rx="3" fill="#00BCD4" opacity="0.12" stroke="#00BCD4" stroke-width="0.7"/>
    <circle cx="-48" cy="3" r="4" fill="#00BCD4" opacity="0.5"/>
    <text x="-38" y="7" font-family="Arial,sans-serif" font-size="7" fill="#00838F" font-weight="bold">Сократительная</text>
    <text x="50" y="7" font-family="Arial,sans-serif" font-size="5" fill="#666">Актин, миозин</text>
  </g>
  <g transform="translate(0,160)">
    <rect x="-60" y="-5" width="120" height="16" rx="3" fill="#795548" opacity="0.12" stroke="#795548" stroke-width="0.7"/>
    <circle cx="-48" cy="3" r="4" fill="#795548" opacity="0.5"/>
    <text x="-38" y="7" font-family="Arial,sans-serif" font-size="7" fill="#4E342E" font-weight="bold">Запасающая</text>
    <text x="50" y="7" font-family="Arial,sans-serif" font-size="5" fill="#666">Казеин</text>
  </g>
  <g transform="translate(0,182)">
    <rect x="-60" y="-5" width="120" height="16" rx="3" fill="#607D8B" opacity="0.12" stroke="#607D8B" stroke-width="0.7"/>
    <circle cx="-48" cy="3" r="4" fill="#607D8B" opacity="0.5"/>
    <text x="-38" y="7" font-family="Arial,sans-serif" font-size="7" fill="#37474F" font-weight="bold">Токсическая</text>
    <text x="50" y="7" font-family="Arial,sans-serif" font-size="5" fill="#666">Яды, токсины</text>
  </g>
</g>

<!-- Optimum conditions at bottom -->
<g transform="translate(30,295)">
  <rect x="0" y="0" width="440" height="35" rx="5" fill="white" opacity="0.9" stroke="#BF360C" stroke-width="0.8"/>
  <text x="220" y="12" font-family="Arial,sans-serif" font-size="8" fill="#BF360C" text-anchor="middle" font-weight="bold">Условия активности ферментов</text>
  <text x="75" y="26" font-family="Arial,sans-serif" font-size="6" fill="#E65100">t° оптимум: 36–40°C</text>
  <text x="220" y="26" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">pH оптимум: зависит от фермента</text>
  <text x="370" y="26" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Кофакторы: ионы, витамины</text>
</g>

<rect x="10" y="335" width="480" height="10" rx="4" fill="#BF360C" opacity="0.85"/>
<text x="250" y="343" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="white" font-weight="bold">Ферменты — биологические катализаторы белковой природы, ускоряющие реакции в 10^8–10^12 раз</text>
</svg>