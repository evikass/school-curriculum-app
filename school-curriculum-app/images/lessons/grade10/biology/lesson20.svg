<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF3E0"/><stop offset="100%" stop-color="#FFE0B2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#E65100" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#BF360C" text-anchor="middle">Прокариотическая клетка</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 20</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#E65100" stroke-width="1" opacity="0.3"/>

<!-- Prokaryotic cell (bacterium) -->
<g transform="translate(160,170)">
  <!-- Cell wall -->
  <rect x="-110" y="-65" width="220" height="130" rx="25" fill="#FF9800" opacity="0.1" stroke="#E65100" stroke-width="2.5"/>

  <!-- Capsule (outside wall) -->
  <rect x="-118" y="-73" width="236" height="146" rx="30" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Plasma membrane -->
  <rect x="-100" y="-55" width="200" height="110" rx="20" fill="#FFCC80" opacity="0.3" stroke="#BF360C" stroke-width="1.5"/>

  <!-- Nucleoid region (no true nucleus!) -->
  <ellipse cx="-10" cy="-5" rx="40" ry="25" fill="#1565C0" opacity="0.1" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Circular DNA -->
  <ellipse cx="-10" cy="-5" rx="25" ry="15" fill="none" stroke="#1565C0" stroke-width="2"/>
  <text x="-10" y="-2" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Нуклеоид</text>
  <text x="-10" y="7" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Кольцевая ДНК</text>
  <text x="-10" y="15" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">Нет ядерной оболочки!</text>

  <!-- Plasmids (small circular DNA) -->
  <ellipse cx="45" cy="-30" rx="10" ry="6" fill="none" stroke="#9C27B0" stroke-width="1.2"/>
  <text x="45" y="-28" font-family="Arial,sans-serif" font-size="4" fill="#7B1FA2" text-anchor="middle">Плазмида</text>
  <ellipse cx="55" cy="20" rx="8" ry="5" fill="none" stroke="#9C27B0" stroke-width="1"/>

  <!-- Ribosomes (70S, smaller than eukaryotic) -->
  <circle cx="-60" cy="25" r="3" fill="#9C27B0" opacity="0.6"/>
  <circle cx="-50" cy="30" r="3" fill="#9C27B0" opacity="0.6"/>
  <circle cx="-40" cy="28" r="3" fill="#9C27B0" opacity="0.6"/>
  <circle cx="-55" cy="35" r="3" fill="#9C27B0" opacity="0.6"/>
  <circle cx="30" cy="30" r="3" fill="#9C27B0" opacity="0.6"/>
  <circle cx="40" cy="35" r="3" fill="#9C27B0" opacity="0.6"/>
  <text x="-55" y="48" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2" text-anchor="middle">Рибосомы 70S</text>

  <!-- Flagellum -->
  <path d="M-110,0 Q-130,-10 -145,0 Q-160,10 -175,0 Q-190,-10 -200,0" fill="none" stroke="#795548" stroke-width="2"/>
  <text x="-160" y="-15" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Жгутик</text>

  <!-- Pili -->
  <line x1="-50" y1="55" x2="-55" y2="72" stroke="#795548" stroke-width="1"/>
  <line x1="-30" y1="55" x2="-32" y2="70" stroke="#795548" stroke-width="1"/>
  <line x1="-10" y1="55" x2="-8" y2="72" stroke="#795548" stroke-width="1"/>
  <line x1="10" y1="55" x2="12" y2="68" stroke="#795548" stroke-width="1"/>
  <text x="-25" y="80" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">Пили (ворсинки)</text>

  <!-- Mesosome (invagination) -->
  <path d="M80,-30 Q90,-20 80,-10 Q90,0 80,10" fill="none" stroke="#BF360C" stroke-width="1.5"/>
  <text x="90" y="-5" font-family="Arial,sans-serif" font-size="5" fill="#BF360C">Мезосома</text>

  <!-- Labels with lines -->
  <line x1="-115" y1="-55" x2="-115" y2="-80" stroke="#E65100" stroke-width="0.8"/>
  <text x="-115" y="-85" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Капсула</text>

  <line x1="-100" y1="-50" x2="-100" y2="-68" stroke="#BF360C" stroke-width="0.8"/>
  <text x="-100" y="-72" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">Клет. стенка</text>

  <line x1="95" y1="-40" x2="105" y2="-55" stroke="#BF360C" stroke-width="0.8"/>
  <text x="105" y="-58" font-family="Arial,sans-serif" font-size="6" fill="#BF360C">Мембрана</text>
</g>

<!-- Prokaryote vs Eukaryote comparison -->
<g transform="translate(30,285)">
  <rect x="0" y="0" width="440" height="48" rx="5" fill="white" opacity="0.92" stroke="#E65100" stroke-width="1"/>
  <text x="220" y="13" font-family="Arial,sans-serif" font-size="8" fill="#BF360C" text-anchor="middle" font-weight="bold">ПРОКАРИОТЫ vs ЭУКАРИОТЫ</text>
  <line x1="10" y1="18" x2="430" y2="18" stroke="#FF9800" stroke-width="0.5"/>

  <g transform="translate(0,28)">
    <text x="110" y="0" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Прокариоты: нет ядра, кольцевая ДНК, 70S рибосомы, нет мембранных органоидов, 1–10 мкм</text>
    <text x="110" y="12" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">Эукариоты: есть ядро, линейная ДНК, 80S рибосомы, мембранные органоиды, 10–100 мкм</text>
  </g>
</g>

<rect x="10" y="338" width="480" height="6" rx="3" fill="#E65100" opacity="0.85"/>
</svg>