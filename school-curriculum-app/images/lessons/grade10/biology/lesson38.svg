<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg38" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e5f5"/>
      <stop offset="100%" stop-color="#e8eaf6"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg38)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#6a1b9a" stroke-width="2" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="38" fill="#6a1b9a" rx="8"/>
  <rect x="0" y="20" width="500" height="18" fill="#6a1b9a"/>
  <text x="250" y="26" text-anchor="middle" fill="white" font-size="12" font-weight="bold" font-family="Arial">Моногибридное скрещивание. Законы Менделя</text>
  <text x="490" y="14" text-anchor="end" fill="#e1bee7" font-size="8" font-family="Arial">Биология 10 класс — Урок 38</text>
  <!-- FIRST LAW section -->
  <rect x="15" y="46" width="235" height="145" fill="white" fill-opacity="0.7" rx="5" stroke="#c62828" stroke-width="0.8"/>
  <rect x="15" y="46" width="235" height="16" fill="#c62828" rx="5"/>
  <rect x="15" y="56" width="235" height="6" fill="#c62828"/>
  <text x="132" y="58" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial">I закон — Закон единообразия</text>
  <!-- P generation -->
  <text x="25" y="76" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">Р:</text>
  <!-- AA parent (yellow) -->
  <circle cx="65" cy="90" r="12" fill="#fdd835" stroke="#f9a825" stroke-width="1.2"/>
  <text x="65" y="94" text-anchor="middle" fill="#e65100" font-size="8" font-weight="bold" font-family="Arial">AA</text>
  <text x="65" y="108" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">жёлтые</text>
  <!-- × sign -->
  <text x="95" y="94" text-anchor="middle" fill="#c62828" font-size="14" font-weight="bold" font-family="Arial">×</text>
  <!-- aa parent (green) -->
  <circle cx="125" cy="90" r="12" fill="#8bc34a" stroke="#558b2f" stroke-width="1.2"/>
  <text x="125" y="94" text-anchor="middle" fill="#1b5e20" font-size="8" font-weight="bold" font-family="Arial">aa</text>
  <text x="125" y="108" text-anchor="middle" fill="#4e342e" font-size="6" font-family="Arial">зелёные</text>
  <!-- Arrow -->
  <text x="155" y="90" fill="#c62828" font-size="10" font-family="Arial">→</text>
  <!-- Gametes -->
  <text x="25" y="122" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">G:</text>
  <circle cx="65" cy="120" r="6" fill="#fff9c4" stroke="#f9a825" stroke-width="0.8"/>
  <text x="65" y="123" text-anchor="middle" fill="#e65100" font-size="6" font-weight="bold" font-family="Arial">A</text>
  <circle cx="125" cy="120" r="6" fill="#c8e6c9" stroke="#558b2f" stroke-width="0.8"/>
  <text x="125" y="123" text-anchor="middle" fill="#1b5e20" font-size="6" font-weight="bold" font-family="Arial">a</text>
  <!-- F1 result -->
  <text x="25" y="144" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">F1:</text>
  <circle cx="75" cy="148" r="12" fill="#fdd835" stroke="#f9a825" stroke-width="1.2"/>
  <text x="75" y="152" text-anchor="middle" fill="#e65100" font-size="8" font-weight="bold" font-family="Arial">Aa</text>
  <text x="115" y="148" fill="#4e342e" font-size="7" font-family="Arial">— 100% жёлтые</text>
  <text x="115" y="158" fill="#4e342e" font-size="7" font-family="Arial">гетерозиготы</text>
  <text x="25" y="178" fill="#c62828" font-size="7" font-weight="bold" font-family="Arial">Все гибриды F1 единообразны!</text>
  <text x="25" y="188" fill="#4e342e" font-size="6" font-family="Arial">Доминантный признак проявляется</text>
  <!-- SECOND LAW section -->
  <rect x="260" y="46" width="225" height="145" fill="white" fill-opacity="0.7" rx="5" stroke="#2e7d32" stroke-width="0.8"/>
  <rect x="260" y="46" width="225" height="16" fill="#2e7d32" rx="5"/>
  <rect x="260" y="56" width="225" height="6" fill="#2e7d32"/>
  <text x="372" y="58" text-anchor="middle" fill="white" font-size="9" font-weight="bold" font-family="Arial">II закон — Закон расщепления</text>
  <!-- P: Aa × Aa -->
  <text x="270" y="76" fill="#4a148c" font-size="8" font-weight="bold" font-family="Arial">Р:</text>
  <circle cx="310" cy="90" r="10" fill="#fdd835" stroke="#f9a825" stroke-width="1"/>
  <text x="310" y="93" text-anchor="middle" fill="#e65100" font-size="7" font-weight="bold" font-family="Arial">Aa</text>
  <text x="340" y="93" fill="#c62828" font-size="12" font-weight="bold" font-family="Arial">×</text>
  <circle cx="370" cy="90" r="10" fill="#fdd835" stroke="#f9a825" stroke-width="1"/>
  <text x="370" y="93" text-anchor="middle" fill="#e65100" font-size="7" font-weight="bold" font-family="Arial">Aa</text>
  <!-- Gametes -->
  <text x="270" y="112" fill="#4a148c" font-size="7" font-weight="bold" font-family="Arial">G:</text>
  <circle cx="300" cy="110" r="5" fill="#fff9c4" stroke="#f9a825" stroke-width="0.6"/>
  <text x="300" y="113" text-anchor="middle" fill="#e65100" font-size="5" font-weight="bold" font-family="Arial">A</text>
  <circle cx="320" cy="110" r="5" fill="#c8e6c9" stroke="#558b2f" stroke-width="0.6"/>
  <text x="320" y="113" text-anchor="middle" fill="#1b5e20" font-size="5" font-weight="bold" font-family="Arial">a</text>
  <circle cx="350" cy="110" r="5" fill="#fff9c4" stroke="#f9a825" stroke-width="0.6"/>
  <text x="350" y="113" text-anchor="middle" fill="#e65100" font-size="5" font-weight="bold" font-family="Arial">A</text>
  <circle cx="370" cy="110" r="5" fill="#c8e6c9" stroke="#558b2f" stroke-width="0.6"/>
  <text x="370" y="113" text-anchor="middle" fill="#1b5e20" font-size="5" font-weight="bold" font-family="Arial">a</text>
  <!-- Punnett square for F2 -->
  <text x="270" y="128" fill="#4a148c" font-size="7" font-weight="bold" font-family="Arial">F2 (решётка Пеннета):</text>
  <!-- Grid -->
  <rect x="290" y="132" width="25" height="16" fill="#e8eaf6" stroke="#6a1b9a" stroke-width="0.5"/>
  <rect x="315" y="132" width="25" height="16" fill="#fff9c4" stroke="#6a1b9a" stroke-width="0.5"/>
  <text x="302" y="143" text-anchor="middle" fill="#6a1b9a" font-size="7" font-weight="bold" font-family="Arial"></text>
  <text x="327" y="143" text-anchor="middle" fill="#e65100" font-size="7" font-weight="bold" font-family="Arial">A</text>
  <rect x="290" y="148" width="25" height="16" fill="#c8e6c9" stroke="#6a1b9a" stroke-width="0.5"/>
  <text x="302" y="159" text-anchor="middle" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">a</text>
  <rect x="340" y="132" width="25" height="16" fill="#fff9c4" stroke="#6a1b9a" stroke-width="0.5"/>
  <text x="352" y="143" text-anchor="middle" fill="#e65100" font-size="7" font-weight="bold" font-family="Arial">A</text>
  <rect x="340" y="148" width="25" height="16" fill="#c8e6c9" stroke="#6a1b9a" stroke-width="0.5"/>
  <text x="352" y="159" text-anchor="middle" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">a</text>
  <!-- Cells -->
  <rect x="315" y="148" width="25" height="16" fill="#fdd835" fill-opacity="0.4" stroke="#6a1b9a" stroke-width="0.5"/>
  <text x="327" y="159" text-anchor="middle" fill="#e65100" font-size="7" font-weight="bold" font-family="Arial">AA</text>
  <rect x="340" y="148" width="25" height="16" fill="#fdd835" fill-opacity="0.3" stroke="#6a1b9a" stroke-width="0.5"/>
  <text x="352" y="159" text-anchor="middle" fill="#e65100" font-size="7" font-weight="bold" font-family="Arial">Aa</text>
  <rect x="315" y="164" width="25" height="16" fill="#fdd835" fill-opacity="0.3" stroke="#6a1b9a" stroke-width="0.5"/>
  <text x="327" y="175" text-anchor="middle" fill="#e65100" font-size="7" font-weight="bold" font-family="Arial">Aa</text>
  <rect x="340" y="164" width="25" height="16" fill="#8bc34a" fill-opacity="0.5" stroke="#6a1b9a" stroke-width="0.5"/>
  <text x="352" y="175" text-anchor="middle" fill="#1b5e20" font-size="7" font-weight="bold" font-family="Arial">aa</text>
  <!-- Ratio -->
  <text x="390" y="150" fill="#4a148c" font-size="7" font-weight="bold" font-family="Arial">Генотип:</text>
  <text x="390" y="160" fill="#4e342e" font-size="6" font-family="Arial">1 AA : 2 Aa : 1 aa</text>
  <text x="390" y="172" fill="#4a148c" font-size="7" font-weight="bold" font-family="Arial">Фенотип:</text>
  <text x="390" y="182" fill="#c62828" font-size="7" font-weight="bold" font-family="Arial">3 жёлтых : 1 зелёный</text>
  <!-- Pea illustrations -->
  <rect x="15" y="198" width="235" height="70" fill="white" fill-opacity="0.6" rx="5" stroke="#2e7d32" stroke-width="0.8"/>
  <text x="132" y="212" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="bold" font-family="Arial">Опыт Менделя: горох</text>
  <!-- Yellow peas -->
  <circle cx="45" cy="238" r="10" fill="#fdd835" stroke="#f9a825" stroke-width="0.8"/>
  <text x="45" y="241" text-anchor="middle" fill="#e65100" font-size="6" font-family="Arial">AA</text>
  <circle cx="75" cy="238" r="10" fill="#fdd835" stroke="#f9a825" stroke-width="0.8"/>
  <text x="75" y="241" text-anchor="middle" fill="#e65100" font-size="6" font-family="Arial">Aa</text>
  <circle cx="105" cy="238" r="10" fill="#fdd835" stroke="#f9a825" stroke-width="0.8"/>
  <text x="105" y="241" text-anchor="middle" fill="#e65100" font-size="6" font-family="Arial">Aa</text>
  <!-- Green pea -->
  <circle cx="140" cy="238" r="10" fill="#8bc34a" stroke="#558b2f" stroke-width="0.8"/>
  <text x="140" y="241" text-anchor="middle" fill="#1b5e20" font-size="6" font-family="Arial">aa</text>
  <text x="90" y="260" text-anchor="middle" fill="#c62828" font-size="8" font-weight="bold" font-family="Arial">3 : 1</text>
  <!-- Ratio bar -->
  <rect x="170" y="225" width="70" height="10" fill="#fdd835" rx="2" stroke="#f9a825" stroke-width="0.5"/>
  <rect x="170" y="237" width="70" height="10" fill="#fdd835" rx="2" stroke="#f9a825" stroke-width="0.5"/>
  <rect x="170" y="249" width="70" height="10" fill="#fdd835" rx="2" stroke="#f9a825" stroke-width="0.5"/>
  <rect x="170" y="261" width="24" height="10" fill="#8bc34a" rx="2" stroke="#558b2f" stroke-width="0.5"/>
  <text x="210" y="230" fill="#4e342e" font-size="5" font-family="Arial">жёлтый AA</text>
  <text x="210" y="242" fill="#4e342e" font-size="5" font-family="Arial">жёлтый Aa</text>
  <text x="210" y="254" fill="#4e342e" font-size="5" font-family="Arial">жёлтый Aa</text>
  <text x="175" y="266" fill="#4e342e" font-size="5" font-family="Arial">зелёный aa</text>
  <!-- Law summary box -->
  <rect x="260" y="198" width="225" height="70" fill="white" fill-opacity="0.7" rx="5" stroke="#6a1b9a" stroke-width="0.8"/>
  <text x="372" y="214" text-anchor="middle" fill="#4a148c" font-size="9" font-weight="bold" font-family="Arial">Суть законов</text>
  <text x="270" y="228" fill="#c62828" font-size="7" font-family="Arial">I: При скрещивании гомозигот</text>
  <text x="275" y="238" fill="#c62828" font-size="7" font-family="Arial">все F1 единообразны</text>
  <text x="270" y="252" fill="#2e7d32" font-size="7" font-family="Arial">II: При скрещивании гетерозигот</text>
  <text x="275" y="262" fill="#2e7d32" font-size="7" font-family="Arial">в F2 расщепление 3:1 по фенотипу</text>
  <!-- Bottom summary -->
  <rect x="15" y="274" width="470" height="66" fill="white" fill-opacity="0.7" rx="5" stroke="#6a1b9a" stroke-width="1"/>
  <text x="250" y="290" text-anchor="middle" fill="#4a148c" font-size="9" font-weight="bold" font-family="Arial">Ключевые формулы моногибридного скрещивания</text>
  <text x="25" y="306" fill="#4e342e" font-size="7" font-family="Arial">• AA × aa → F1: 100% Aa (единообразие)</text>
  <text x="25" y="318" fill="#4e342e" font-size="7" font-family="Arial">• Aa × Aa → F2: 1AA : 2Aa : 1aa (генотип 1:2:1)</text>
  <text x="25" y="330" fill="#4e342e" font-size="7" font-family="Arial">• Фенотип F2: 3 доминантных : 1 рецессивный (3:1)</text>
  <text x="300" y="306" fill="#4e342e" font-size="7" font-family="Arial">• Полное доминирование: Aa = AA</text>
  <text x="300" y="318" fill="#4e342e" font-size="7" font-family="Arial">• Гаметы несут 1 аллель каждого гена</text>
  <text x="300" y="330" fill="#4e342e" font-size="7" font-family="Arial">• Чистые линии: AA и aa</text>
</svg>