<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg55" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#004d40"/>
      <stop offset="100%" stop-color="#0a1a14"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
    <linearGradient id="soilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg55)"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#26a69a" stroke-width="2" rx="6"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="492" height="36" fill="#00695c" rx="4"/>
  <text x="250" y="27" text-anchor="middle" fill="#e0f2f1" font-size="12" font-weight="bold" font-family="Arial">Экология как наука. Среды жизни — Биология 10 класс — Урок 55</text>

  <!-- Four environments -->

  <!-- 1. AQUATIC environment - top left -->
  <rect x="8" y="48" width="240" height="140" fill="#01579b" stroke="#29b6f6" stroke-width="1" rx="4"/>
  <rect x="8" y="48" width="240" height="16" fill="#0277bd" rx="4"/>
  <text x="128" y="60" text-anchor="middle" fill="#e1f5fe" font-size="8" font-weight="bold" font-family="Arial">1. Водная среда (гидробионты)</text>
  
  <!-- Water waves -->
  <path d="M15,100 Q40,90 65,100 Q90,110 115,100 Q140,90 165,100 Q190,110 215,100 Q230,94 240,100" stroke="#4fc3f7" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M15,110 Q40,100 65,110 Q90,120 115,110 Q140,100 165,110 Q190,120 215,110 Q230,104 240,110" stroke="#4fc3f7" stroke-width="0.8" fill="none" opacity="0.4"/>
  
  <!-- Fish -->
  <path d="M60,130 Q75,118 100,125 Q125,118 140,130 Q125,138 100,135 Q75,138 60,130 Z" fill="#4fc3f7" stroke="#0288d1" stroke-width="0.7"/>
  <path d="M135,130 L145,122 L145,138 Z" fill="#4fc3f7" stroke="#0288d1" stroke-width="0.5"/>
  <circle cx="72" cy="128" r="2" fill="#01579b"/>
  <line x1="82" y1="126" x2="90" y2="124" stroke="#b3e5fc" stroke-width="0.5"/>
  <line x1="82" y1="130" x2="90" y2="130" stroke="#b3e5fc" stroke-width="0.5"/>
  <line x1="82" y1="134" x2="90" y2="136" stroke="#b3e5fc" stroke-width="0.5"/>
  
  <!-- Seaweed -->
  <path d="M170,175 Q175,160 168,148 Q172,140 166,130" stroke="#4caf50" stroke-width="1.5" fill="none"/>
  <path d="M180,175 Q185,162 178,150 Q182,142 176,132" stroke="#388e3c" stroke-width="1.5" fill="none"/>
  <path d="M190,175 Q188,158 195,145" stroke="#66bb6a" stroke-width="1.2" fill="none"/>
  
  <!-- Jellyfish -->
  <path d="M40,150 Q55,138 70,150" stroke="#b3e5fc" stroke-width="0.8" fill="#e1f5fe" opacity="0.5"/>
  <line x1="45" y1="150" x2="42" y2="165" stroke="#b3e5fc" stroke-width="0.5" opacity="0.4"/>
  <line x1="55" y1="150" x2="53" y2="168" stroke="#b3e5fc" stroke-width="0.5" opacity="0.4"/>
  <line x1="65" y1="150" x2="67" y2="163" stroke="#b3e5fc" stroke-width="0.5" opacity="0.4"/>
  
  <text x="128" y="78" text-anchor="middle" fill="#b3e5fc" font-size="5.5" font-family="Arial">Плотность среды обеспечивает плавучесть</text>
  <text x="128" y="188" text-anchor="middle" fill="#81d4fa" font-size="5" font-family="Arial">Кислород растворён • Стабильная температура</text>
  <text x="128" y="197" text-anchor="middle" fill="#4fc3f7" font-size="5" font-family="Arial">Давление увеличивается с глубиной</text>

  <!-- 2. TERRESTRIAL-AERIAL environment - top right -->
  <rect x="252" y="48" width="240" height="140" fill="#1b5e20" stroke="#66bb6a" stroke-width="1" rx="4"/>
  <rect x="252" y="48" width="240" height="16" fill="#2e7d32" rx="4"/>
  <text x="372" y="60" text-anchor="middle" fill="#e8f5e9" font-size="7.5" font-weight="bold" font-family="Arial">2. Наземно-воздушная среда</text>
  
  <!-- Sky -->
  <rect x="256" y="68" width="232" height="55" fill="#4caf50" opacity="0.1" rx="2"/>
  <!-- Sun -->
  <circle cx="460" cy="78" r="10" fill="#ffeb3b" opacity="0.3"/>
  <circle cx="460" cy="78" r="6" fill="#fff176" opacity="0.5"/>
  
  <!-- Tree -->
  <rect x="320" y="110" width="6" height="35" fill="#5d4037" rx="1"/>
  <ellipse cx="323" cy="100" rx="18" ry="14" fill="#388e3c" opacity="0.8"/>
  <ellipse cx="315" cy="95" rx="12" ry="10" fill="#4caf50" opacity="0.7"/>
  <ellipse cx="333" cy="97" rx="10" ry="9" fill="#2e7d32" opacity="0.7"/>
  
  <!-- Bird -->
  <path d="M380,82 Q385,78 392,80 Q395,76 400,82 Q395,84 392,82 Q385,84 380,82 Z" fill="#fff9c4" stroke="#f9a825" stroke-width="0.5"/>
  <circle cx="397" cy="80" r="1" fill="#1a1a1a"/>
  
  <!-- Butterfly -->
  <path d="M280,95 Q275,88 282,85 Q286,88 280,95" fill="#f48fb1" stroke="#e91e63" stroke-width="0.3"/>
  <path d="M280,95 Q285,88 278,85 Q274,88 280,95" fill="#f8bbd0" stroke="#e91e63" stroke-width="0.3"/>
  <line x1="280" y1="95" x2="280" y2="90" stroke="#4a148c" stroke-width="0.5"/>
  
  <!-- Grass -->
  <path d="M260,148 L262,130 L265,148" stroke="#66bb6a" stroke-width="0.8" fill="none"/>
  <path d="M270,148 L273,128 L276,148" stroke="#4caf50" stroke-width="0.8" fill="none"/>
  <path d="M280,148 L282,132 L285,148" stroke="#81c784" stroke-width="0.8" fill="none"/>
  
  <text x="372" y="78" text-anchor="middle" fill="#c8e6c9" font-size="5.5" font-family="Arial">Самая сложная и разнообразная</text>
  <text x="372" y="163" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">Колебания температуры • Недостаток влаги</text>
  <text x="372" y="172" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Достаточно кислорода и света</text>
  <text x="372" y="181" text-anchor="middle" fill="#66bb6a" font-size="5" font-family="Arial">Большинство видов организмов</text>

  <!-- 3. SOIL environment - bottom left -->
  <rect x="8" y="194" width="240" height="140" fill="#3e2723" stroke="#a1887f" stroke-width="1" rx="4"/>
  <rect x="8" y="194" width="240" height="16" fill="#4e342e" rx="4"/>
  <text x="128" y="206" text-anchor="middle" fill="#efebe9" font-size="8" font-weight="bold" font-family="Arial">3. Почвенная среда (эдафон)</text>
  
  <!-- Soil layers -->
  <rect x="12" y="214" width="232" height="25" fill="#795548" rx="2"/>
  <rect x="12" y="239" width="232" height="30" fill="#5d4037" rx="2"/>
  <rect x="12" y="269" width="232" height="40" fill="#3e2723" rx="2"/>
  <text x="220" y="228" fill="#bcaaa4" font-size="5" font-family="Arial">Перегной</text>
  <text x="220" y="256" fill="#a1887f" font-size="5" font-family="Arial">Минеральный слой</text>
  <text x="220" y="290" fill="#8d6e63" font-size="5" font-family="Arial">Материнская порода</text>
  
  <!-- Earthworm -->
  <path d="M30,248 Q50,242 70,248 Q90,254 110,248 Q130,242 150,248" stroke="#d7ccc8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="28" cy="248" r="3" fill="#efebe9" stroke="#bcaaa4" stroke-width="0.5"/>
  
  <!-- Mole -->
  <ellipse cx="180" cy="255" rx="12" ry="8" fill="#5d4037" stroke="#3e2723" stroke-width="0.5"/>
  <circle cx="173" cy="252" r="1.5" fill="#1a1a1a"/>
  <circle cx="178" cy="252" r="1.5" fill="#1a1a1a"/>
  <path d="M170,256 L168,254 L172,256 L168,258 Z" fill="#795548"/>
  
  <!-- Plant roots -->
  <line x1="90" y1="214" x2="85" y2="260" stroke="#8d6e63" stroke-width="1"/>
  <line x1="90" y1="230" x2="80" y2="245" stroke="#8d6e63" stroke-width="0.6"/>
  <line x1="90" y1="240" x2="100" y2="255" stroke="#8d6e63" stroke-width="0.6"/>
  
  <!-- Soil bacteria dots -->
  <circle cx="40" cy="260" r="1" fill="#a5d6a7"/>
  <circle cx="55" cy="265" r="1" fill="#a5d6a7"/>
  <circle cx="65" cy="258" r="0.8" fill="#a5d6a7"/>
  <circle cx="130" cy="262" r="1" fill="#a5d6a7"/>
  <circle cx="140" cy="268" r="0.8" fill="#a5d6a7"/>
  
  <text x="128" y="310" text-anchor="middle" fill="#bcaaa4" font-size="5" font-family="Arial">Темнота • Стабильные условия • Мало кислорода</text>
  <text x="128" y="320" text-anchor="middle" fill="#a1887f" font-size="5" font-family="Arial">Плотная среда • Много органических веществ</text>
  <text x="128" y="330" text-anchor="middle" fill="#8d6e63" font-size="5" font-family="Arial">Дождевые черви, кроты, насекомые, грибы</text>

  <!-- 4. ORGANISMAL environment - bottom right -->
  <rect x="252" y="194" width="240" height="140" fill="#1a0a1a" stroke="#ce93d8" stroke-width="1" rx="4"/>
  <rect x="252" y="194" width="240" height="16" fill="#6a1b9a" rx="4"/>
  <text x="372" y="206" text-anchor="middle" fill="#f3e5f5" font-size="8" font-weight="bold" font-family="Arial">4. Организменная среда (паразиты)</text>
  
  <!-- Host organism outline -->
  <ellipse cx="370" cy="270" rx="55" ry="40" fill="none" stroke="#ab47bc" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="370" y="235" text-anchor="middle" fill="#ce93d8" font-size="6" font-family="Arial">Организм-хозяин</text>
  
  <!-- Tapeworm inside -->
  <path d="M340,262 Q355,258 370,264 Q385,258 400,262 Q405,260 408,264" stroke="#e1bee7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="338" cy="262" r="4" fill="#f3e5f5" stroke="#ce93d8" stroke-width="0.5"/>
  <circle cx="337" cy="261" r="1" fill="#4a148c"/>
  <circle cx="339" cy="261" r="1" fill="#4a148c"/>
  <!-- Suckers -->
  <circle cx="345" cy="264" r="1.5" fill="#9c27b0"/>
  <circle cx="350" cy="263" r="1.5" fill="#9c27b0"/>
  
  <!-- Bacteria inside -->
  <ellipse cx="360" cy="282" rx="5" ry="2.5" fill="#ef9a9a" stroke="#e57373" stroke-width="0.3"/>
  <ellipse cx="375" cy="278" rx="4" ry="2" fill="#ef9a9a" stroke="#e57373" stroke-width="0.3"/>
  <circle cx="390" cy="282" r="2" fill="#ef9a9a" stroke="#e57373" stroke-width="0.3"/>
  
  <!-- Virus -->
  <circle cx="355" cy="290" r="3" fill="#90caf9" stroke="#42a5f5" stroke-width="0.5"/>
  <line x1="355" y1="287" x2="355" y2="284" stroke="#42a5f5" stroke-width="0.5"/>
  <line x1="352" y1="288" x2="350" y2="285" stroke="#42a5f5" stroke-width="0.5"/>
  <line x1="358" y1="288" x2="360" y2="285" stroke="#42a5f5" stroke-width="0.5"/>
  
  <!-- Malarial plasmodium -->
  <ellipse cx="390" cy="290" rx="4" ry="3" fill="#a5d6a7" stroke="#66bb6a" stroke-width="0.3"/>
  
  <text x="372" y="320" text-anchor="middle" fill="#ce93d8" font-size="5" font-family="Arial">Постоянные условия • Пища в избытке</text>
  <text x="372" y="330" text-anchor="middle" fill="#ba68c8" font-size="5" font-family="Arial">Аскариды, бычий цепень, малярийный плазмодий</text>

  <!-- Ecology definition at very bottom -->
  <rect x="160" y="338" width="180" height="10" fill="#00695c" rx="2"/>
  <text x="250" y="346" text-anchor="middle" fill="#b2dfdb" font-size="5.5" font-weight="bold" font-family="Arial">Экология — наука о связях организмов со средой</text>
</svg>