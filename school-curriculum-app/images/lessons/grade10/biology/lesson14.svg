  <!-- Integral protein (spans entire membrane) -->
  <rect x="-70" y="-30" width="16" height="80" rx="4" fill="#4CAF50" opacity="0.5" stroke="#2E7D32" stroke-width="1"/>
  <text x="-62" y="10" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle" font-weight="bold">Интегр.</text>
  <text x="-62" y="18" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">белок</text>

  <!-- Peripheral protein (on surface) -->
  <ellipse cx="40" cy="-35" rx="15" ry="8" fill="#2196F3" opacity="0.4" stroke="#1565C0" stroke-width="1"/>
  <text x="40" y="-32" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle" font-weight="bold">Перифер.</text>

  <!-- Channel protein -->
  <rect x="100" y="-30" width="14" height="80" rx="4" fill="#FF9800" opacity="0.4" stroke="#E65100" stroke-width="1"/>
  <line x1="107" y1="-25" x2="107" y2="45" stroke="#E65100" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="107" y="10" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">Канал</text>

  <!-- Cholesterol -->
  <polygon points="-120,10 -115,5 -110,10 -115,15" fill="#F44336" opacity="0.4" stroke="#C62828" stroke-width="0.8"/>
  <text x="-115" y="24" font-family="Arial,sans-serif" font-size="4" fill="#C62828" text-anchor="middle">Холест.</text>

  <!-- Glycoprotein (with carbohydrate chain) -->
  <circle cx="140" cy="-30" r="6" fill="#4CAF50" opacity="0.4" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="140" y1="-36" x2="138" y2="-42" stroke="#00BCD4" stroke-width="1"/>
  <line x1="140" y1="-36" x2="144" y2="-43" stroke="#00BCD4" stroke-width="1"/>
  <circle cx="138" cy="-44" r="2" fill="#00BCD4" opacity="0.4"/>
  <circle cx="144" cy="-45" r="2" fill="#00BCD4" opacity="0.4"/>
  <text x="140" y="-50" font-family="Arial,sans-serif" font-size="4" fill="#00838F" text-anchor="middle">Глико-</text>
  <text x="140" y="-46" font-family="Arial,sans-serif" font-size="4" fill="#00838F" text-anchor="middle">протеин</text>
