    <line x1="-50" y1="20" x2="-50" y2="43" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="-30" y1="20" x2="-30" y2="43" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="-10" y1="20" x2="-10" y2="43" stroke="#FF9800" stroke-width="1.2"/>
