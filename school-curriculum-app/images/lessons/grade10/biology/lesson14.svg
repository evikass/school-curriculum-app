  <circle cx="-110" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="-90" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="-70" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="-50" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="-30" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="-10" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="10" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="30" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="50" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="70" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="90" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="110" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="130" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="150" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <circle cx="170" cy="50" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>

  <!-- Inside label -->
