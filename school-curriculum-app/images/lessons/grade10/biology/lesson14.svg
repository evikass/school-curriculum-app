    <line x1="-70" y1="-23" x2="-70" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="-50" y1="-23" x2="-50" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="-30" y1="-23" x2="-30" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="-10" y1="-23" x2="-10" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="10" y1="-23" x2="10" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="30" y1="-23" x2="30" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="50" y1="-23" x2="50" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="70" y1="-23" x2="70" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="90" y1="-23" x2="90" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="110" y1="-23" x2="110" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="130" y1="-23" x2="130" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="150" y1="-23" x2="150" y2="0" stroke="#FF9800" stroke-width="1.2"/>
    <line x1="170" y1="-23" x2="170" y2="0" stroke="#FF9800" stroke-width="1.2"/>
