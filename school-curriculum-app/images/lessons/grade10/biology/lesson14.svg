  <line x1="-190" y1="-62" x2="190" y2="-62" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Outside label -->
  <text x="-180" y="-45" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">СНАРУЖИ</text>

  <!-- Upper phospholipid heads row -->
  <circle cx="-170" cy="-30" r="7" fill="#9C27B0" opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
