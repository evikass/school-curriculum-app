<!-- Membrane functions at bottom -->
<g transform="translate(30,295)">
  <rect x="0" y="0" width="440" height="38" rx="5" fill="white" opacity="0.9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="220" y="13" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Функции мембраны</text>
  <text x="55" y="27" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Барьерная</text>
  <text x="130" y="27" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Транспортная</text>
  <text x="215" y="27" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Рецепторная</text>
  <text x="300" y="27" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Ферментативная</text>
  <text x="395" y="27" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Контактная</text>
</g>

<rect x="10" y="338" width="480" height="6" rx="3" fill="#2E7D32" opacity="0.85"/>
</svg>