<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg34" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <radialGradient id="cellG34" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </radialGradient>
    <marker id="arr34" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#880e4f"/></marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg34)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#880e4f" stroke-width="2" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="38" fill="#880e4f" rx="8"/>
  <rect x="0" y="20" width="500" height="18" fill="#880e4f"/>
  <text x="250" y="26" text-anchor="middle" fill="white" font-size="13" font-weight="bold" font-family="Arial">Образование половых клеток — гаметогенез</text>
  <text x="490" y="14" text-anchor="end" fill="#f8bbd0" font-size="8" font-family="Arial">Биология 10 класс — Урок 34</text>
  <!-- SPERMATOGENESIS section -->
  <rect x="15" y="46" width="235" height="18" fill="#1565c0" rx="4"/>
  <text x="132" y="59" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial">СПЕРМАТОГЕНЕЗ (в семенниках)</text>
  <!-- Spermatogenesis flow -->
  <!-- Spermatogonia 2n -->
  <ellipse cx="45" cy="82" rx="28" ry="16" fill="url(#cellG34)" stroke="#1565c0" stroke-width="1.3"/>
  <text x="45" y="78" text-anchor="middle" fill="#1565c0" font-size="6" font-family="Arial">Спермато-</text>
  <text x="45" y="86" text-anchor="middle" fill="#1565c0" font-size="6" font-family="Arial">гонии 2n</text>
  <!-- Mitosis arrow -->
  <line x1="75" y1="82" x2="93" y2="82" stroke="#1565c0" stroke-width="1.2" marker-end="url(#arr34)"/>
  <text x="84" y="77" text-anchor="middle" fill="#1565c0" font-size="5" font-family="Arial">митоз</text>
  <!-- 1° Spermatocyte 2n -->
  <ellipse cx="125" cy="82" rx="32" ry="16" fill="url(#cellG34)" stroke="#1565c0" stroke-width="1.3"/>
  <text x="125" y="78" text-anchor="middle" fill="#1565c0" font-size="6" font-family="Arial">Сперматоцит</text>
  <text x="125" y="86" text-anchor="middle" fill="#1565c0" font-size="6" font-family="Arial">I порядка 2n</text>
  <!-- Meiosis I arrow -->
  <line x1="159" y1="82" x2="177" y2="82" stroke="#1565c0" stroke-width="1.2" marker-end="url(#arr34)"/>
  <text x="168" y="77" text-anchor="middle" fill="#880e4f" font-size="5" font-family="Arial">мейоз I</text>
  <!-- 2° Spermatocyte n -->
  <ellipse cx="210" cy="82" rx="32" ry="16" fill="url(#cellG34)" stroke="#1565c0" stroke-width="1.3"/>
  <text x="210" y="78" text-anchor="middle" fill="#1565c0" font-size="6" font-family="Arial">Сперматоцит</text>
  <text x="210" y="86" text-anchor="middle" fill="#1565c0" font-size="6" font-family="Arial">II порядка n</text>
  <!-- Meiosis II arrow down -->
  <line x1="210" y1="100" x2="210" y2="112" stroke="#1565c0" stroke-width="1.2" marker-end="url(#arr34)"/>
  <text x="230" y="108" fill="#880e4f" font-size="5" font-family="Arial">мейоз II</text>
  <!-- Spermatids n -->
  <ellipse cx="185" cy="126" rx="26" ry="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="185" y="130" text-anchor="middle" fill="#1565c0" font-size="6" font-family="Arial">Сперматиды n</text>
  <ellipse cx="235" cy="126" rx="26" ry="12" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
  <text x="235" y="130" text-anchor="middle" fill="#1565c0" font-size="6" font-family="Arial">Сперматиды n</text>
  <!-- Formation arrow -->
  <line x1="185" y1="140" x2="185" y2="152" stroke="#1565c0" stroke-width="1" marker-end="url(#arr34)"/>
  <line x1="235" y1="140" x2="235" y2="152" stroke="#1565c0" stroke-width="1" marker-end="url(#arr34)"/>
  <text x="260" y="148" fill="#1565c0" font-size="5" font-family="Arial">формирование</text>
  <!-- Spermatozoa -->
  <ellipse cx="175" cy="165" rx="8" ry="5" fill="#1565c0" opacity="0.7"/>
  <line x1="183" y1="165" x2="195" y2="165" stroke="#1565c0" stroke-width="0.8"/>
  <ellipse cx="205" cy="165" rx="8" ry="5" fill="#1565c0" opacity="0.7"/>
  <line x1="213" y1="165" x2="225" y2="165" stroke="#1565c0" stroke-width="0.8"/>
  <ellipse cx="235" cy="165" rx="8" ry="5" fill="#1565c0" opacity="0.7"/>
  <line x1="243" y1="165" x2="255" y2="165" stroke="#1565c0" stroke-width="0.8"/>
  <text x="210" y="182" text-anchor="middle" fill="#1565c0" font-size="7" font-weight="bold" font-family="Arial">Сперматозоиды (4 шт.) n</text>
  <!-- OOGENESIS section -->
  <rect x="260" y="46" width="225" height="18" fill="#c62828" rx="4"/>
  <text x="372" y="59" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial">ОВОГЕНЕЗ (в яичниках)</text>
  <!-- Oogonia 2n -->
  <ellipse cx="290" cy="82" rx="28" ry="16" fill="url(#cellG34)" stroke="#c62828" stroke-width="1.3"/>
  <text x="290" y="78" text-anchor="middle" fill="#c62828" font-size="6" font-family="Arial">Оогонии</text>
  <text x="290" y="86" text-anchor="middle" fill="#c62828" font-size="6" font-family="Arial">2n</text>
  <line x1="320" y1="82" x2="338" y2="82" stroke="#c62828" stroke-width="1.2" marker-end="url(#arr34)"/>
  <text x="329" y="77" text-anchor="middle" fill="#c62828" font-size="5" font-family="Arial">митоз</text>
  <!-- 1° Oocyte 2n (large) -->
  <ellipse cx="375" cy="82" rx="35" ry="20" fill="url(#cellG34)" stroke="#c62828" stroke-width="1.5"/>
  <text x="375" y="78" text-anchor="middle" fill="#c62828" font-size="6" font-family="Arial">Ооцит I</text>
  <text x="375" y="86" text-anchor="middle" fill="#c62828" font-size="6" font-family="Arial">порядка 2n</text>
  <line x1="412" y1="82" x2="430" y2="82" stroke="#c62828" stroke-width="1.2" marker-end="url(#arr34)"/>
  <text x="421" y="77" text-anchor="middle" fill="#880e4f" font-size="5" font-family="Arial">мейоз I</text>
  <!-- 2° Oocyte n (large) + polar body (small) -->
  <ellipse cx="455" cy="75" rx="25" ry="16" fill="url(#cellG34)" stroke="#c62828" stroke-width="1.2"/>
  <text x="455" y="73" text-anchor="middle" fill="#c62828" font-size="5" font-family="Arial">Ооцит II n</text>
  <text x="455" y="80" text-anchor="middle" fill="#c62828" font-size="5" font-family="Arial">(крупная)</text>
  <circle cx="455" cy="96" r="7" fill="#ffcdd2" stroke="#c62828" stroke-width="0.8"/>
  <text x="455" y="99" text-anchor="middle" fill="#c62828" font-size="4" font-family="Arial">ПТ</text>
  <line x1="455" y1="93" x2="455" y2="104" stroke="#c62828" stroke-width="0.6" stroke-dasharray="2,1"/>
  <text x="470" y="102" fill="#c62828" font-size="4" font-family="Arial">полярное тельце</text>
  <!-- Meiosis II arrows -->
  <line x1="455" y1="93" x2="430" y2="112" stroke="#c62828" stroke-width="1" marker-end="url(#arr34)"/>
  <line x1="455" y1="93" x2="480" y2="112" stroke="#c62828" stroke-width="1" marker-end="url(#arr34)"/>
  <text x="412" y="108" fill="#880e4f" font-size="5" font-family="Arial">мейоз II</text>
  <!-- Ovum (large) + 3 polar bodies -->
  <ellipse cx="410" cy="130" rx="28" ry="20" fill="#fff9c4" stroke="#c62828" stroke-width="1.5"/>
  <text x="410" y="128" text-anchor="middle" fill="#c62828" font-size="6" font-weight="bold" font-family="Arial">Яйцеклетка</text>
  <text x="410" y="136" text-anchor="middle" fill="#c62828" font-size="6" font-weight="bold" font-family="Arial">n</text>
  <circle cx="460" cy="120" r="6" fill="#ffcdd2" stroke="#c62828" stroke-width="0.6"/>
  <circle cx="475" cy="128" r="6" fill="#ffcdd2" stroke="#c62828" stroke-width="0.6"/>
  <circle cx="460" cy="138" r="6" fill="#ffcdd2" stroke="#c62828" stroke-width="0.6"/>
  <text x="472" y="150" fill="#c62828" font-size="5" font-family="Arial">3 полярных</text>
  <text x="472" y="157" fill="#c62828" font-size="5" font-family="Arial">тельца</text>
  <!-- Comparison box -->
  <rect x="15" y="200" width="470" height="140" fill="white" fill-opacity="0.7" rx="6" stroke="#880e4f" stroke-width="1"/>
  <text x="250" y="218" text-anchor="middle" fill="#880e4f" font-size="11" font-weight="bold" font-family="Arial">Различия сперматогенеза и овогенеза</text>
  <!-- Table -->
  <line x1="15" y1="225" x2="485" y2="225" stroke="#880e4f" stroke-width="0.5"/>
  <line x1="170" y1="225" x2="170" y2="335" stroke="#880e4f" stroke-width="0.5"/>
  <line x1="327" y1="225" x2="327" y2="335" stroke="#880e4f" stroke-width="0.5"/>
  <!-- Headers -->
  <text x="92" y="236" text-anchor="middle" fill="#880e4f" font-size="8" font-weight="bold" font-family="Arial">Признак</text>
  <text x="248" y="236" text-anchor="middle" fill="#1565c0" font-size="8" font-weight="bold" font-family="Arial">Сперматогенез</text>
  <text x="406" y="236" text-anchor="middle" fill="#c62828" font-size="8" font-weight="bold" font-family="Arial">Овогенез</text>
  <line x1="15" y1="240" x2="485" y2="240" stroke="#880e4f" stroke-width="0.3"/>
  <!-- Row 1 -->
  <text x="25" y="254" fill="#4e342e" font-size="7" font-family="Arial">Число продуктов</text>
  <text x="180" y="254" fill="#4e342e" font-size="7" font-family="Arial">4 сперматозоида</text>
  <text x="337" y="254" fill="#4e342e" font-size="7" font-family="Arial">1 яйцеклетка + 3 ПТ</text>
  <line x1="15" y1="260" x2="485" y2="260" stroke="#880e4f" stroke-width="0.2"/>
  <!-- Row 2 -->
  <text x="25" y="272" fill="#4e342e" font-size="7" font-family="Arial">Размер клеток</text>
  <text x="180" y="272" fill="#4e342e" font-size="7" font-family="Arial">Мелкие, подвижные</text>
  <text x="337" y="272" fill="#4e342e" font-size="7" font-family="Arial">Крупная, неподвижная</text>
  <line x1="15" y1="278" x2="485" y2="278" stroke="#880e4f" stroke-width="0.2"/>
  <!-- Row 3 -->
  <text x="25" y="290" fill="#4e342e" font-size="7" font-family="Arial">Цитоплазма</text>
  <text x="180" y="290" fill="#4e342e" font-size="7" font-family="Arial">Делится поровну</text>
  <text x="337" y="290" fill="#4e342e" font-size="7" font-family="Arial">Задерживается у ооцита</text>
  <line x1="15" y1="296" x2="485" y2="296" stroke="#880e4f" stroke-width="0.2"/>
  <!-- Row 4 -->
  <text x="25" y="308" fill="#4e342e" font-size="7" font-family="Arial">Запас питательных</text>
  <text x="25" y="317" fill="#4e342e" font-size="7" font-family="Arial">веществ</text>
  <text x="180" y="312" fill="#4e342e" font-size="7" font-family="Arial">Минимальный</text>
  <text x="337" y="312" fill="#4e342e" font-size="7" font-family="Arial">Большой запас (желток)</text>
  <line x1="15" y1="320" x2="485" y2="320" stroke="#880e4f" stroke-width="0.2"/>
  <!-- Row 5 -->
  <text x="25" y="332" fill="#4e342e" font-size="7" font-family="Arial">Период образования</text>
  <text x="180" y="332" fill="#4e342e" font-size="7" font-family="Arial">Постоянно</text>
  <text x="337" y="332" fill="#4e342e" font-size="7" font-family="Arial">Начинается до рождения</text>
</svg>