<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#E1BEE7"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#6A1B9A" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#4A148C" text-anchor="middle">Нуклеиновые кислоты: РНК</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 11</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#6A1B9A" stroke-width="1" opacity="0.3"/>

<!-- Three types of RNA -->
<!-- mRNA -->
<g transform="translate(90,155)">
  <rect x="-65" y="-70" width="130" height="150" rx="6" fill="white" opacity="0.92" stroke="#6A1B9A" stroke-width="1"/>
  <rect x="-65" y="-70" width="130" height="22" rx="6" fill="#6A1B9A" opacity="0.85"/>
  <rect x="-65" y="-56" width="130" height="8" fill="#6A1B9A" opacity="0.85"/>
  <text x="0" y="-53" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">иРНК (мРНК)</text>

  <!-- Single strand wave -->
  <path d="M-40,-30 C-25,-40 -15,-20 0,-30 C15,-40 25,-20 40,-30" fill="none" stroke="#9C27B0" stroke-width="2.5"/>
  <!-- Codon boxes -->
  <rect x="-38" y="-22" width="18" height="12" rx="2" fill="#CE93D8" opacity="0.5" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="-29" y="-13" font-family="Arial,sans-serif" font-size="5" fill="#4A148C" text-anchor="middle">AUG</text>
  <rect x="-18" y="-22" width="18" height="12" rx="2" fill="#CE93D8" opacity="0.5" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="-9" y="-13" font-family="Arial,sans-serif" font-size="5" fill="#4A148C" text-anchor="middle">GCU</text>
  <rect x="2" y="-22" width="18" height="12" rx="2" fill="#CE93D8" opacity="0.5" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="11" y="-13" font-family="Arial,sans-serif" font-size="5" fill="#4A148C" text-anchor="middle">UAC</text>
  <rect x="22" y="-22" width="18" height="12" rx="2" fill="#CE93D8" opacity="0.5" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="31" y="-13" font-family="Arial,sans-serif" font-size="5" fill="#4A148C" text-anchor="middle">GAA</text>

  <text x="0" y="5" font-family="Arial,sans-serif" font-size="7" fill="#4A148C" text-anchor="middle" font-weight="bold">Информационная</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Копия гена (транскрипт)</text>
  <text x="0" y="28" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Несёт информацию от ДНК</text>
  <text x="0" y="40" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">к рибосоме</text>

  <line x1="-50" y1="48" x2="50" y2="48" stroke="#CE93D8" stroke-width="0.5"/>
  <text x="0" y="58" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle">5% от всей РНК клетки</text>
  <text x="0" y="68" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle">Одноцепочечная, линейная</text>
</g>

<!-- tRNA -->
<g transform="translate(250,155)">
  <rect x="-65" y="-70" width="130" height="150" rx="6" fill="white" opacity="0.92" stroke="#6A1B9A" stroke-width="1"/>
  <rect x="-65" y="-70" width="130" height="22" rx="6" fill="#7B1FA2" opacity="0.85"/>
  <rect x="-65" y="-56" width="130" height="8" fill="#7B1FA2" opacity="0.85"/>
  <text x="0" y="-53" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">тРНК</text>

  <!-- Cloverleaf structure -->
  <g transform="translate(0,0)">
    <!-- Acceptor stem (top) -->
    <line x1="-4" y1="-30" x2="-4" y2="-15" stroke="#9C27B0" stroke-width="1.5"/>
    <line x1="4" y1="-30" x2="4" y2="-15" stroke="#9C27B0" stroke-width="1.5"/>
    <text x="12" y="-22" font-family="Arial,sans-serif" font-size="5" fill="#C62828" font-weight="bold">CCA</text>
    <!-- Amino acid attached -->
    <circle cx="0" cy="-35" r="6" fill="#F44336" opacity="0.3" stroke="#C62828" stroke-width="0.8"/>
    <text x="0" y="-32" font-family="Arial,sans-serif" font-size="4" fill="#C62828" text-anchor="middle">АК</text>
    <!-- Left loop (D-loop) -->
    <path d="M-4,-15 Q-25,-10 -25,5 Q-25,18 -10,18" fill="none" stroke="#9C27B0" stroke-width="1.5"/>
    <!-- Right loop (T-loop) -->
    <path d="M4,-15 Q25,-10 25,5 Q25,18 10,18" fill="none" stroke="#9C27B0" stroke-width="1.5"/>
    <!-- Bottom loop (anticodon) -->
    <path d="M-10,18 Q-15,30 0,35 Q15,30 10,18" fill="none" stroke="#9C27B0" stroke-width="1.5"/>
    <!-- Anticodon -->
    <rect x="-14" y="25" width="28" height="10" rx="2" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="0.8"/>
    <text x="0" y="33" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">Антикодон</text>
  </g>

  <text x="0" y="53" font-family="Arial,sans-serif" font-size="7" fill="#4A148C" text-anchor="middle" font-weight="bold">Транспортная</text>
  <text x="0" y="64" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Доставляет аминокислоты</text>
  <text x="0" y="74" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">к рибосоме</text>
</g>

<!-- rRNA -->
<g transform="translate(410,155)">
  <rect x="-65" y="-70" width="130" height="150" rx="6" fill="white" opacity="0.92" stroke="#6A1B9A" stroke-width="1"/>
  <rect x="-65" y="-70" width="130" height="22" rx="6" fill="#8E24AA" opacity="0.85"/>
  <rect x="-65" y="-56" width="130" height="8" fill="#8E24AA" opacity="0.85"/>
  <text x="0" y="-53" font-family="Arial,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">рРНК</text>

  <!-- Ribosome structure -->
  <g transform="translate(0,0)">
    <!-- Large subunit -->
    <ellipse cx="0" cy="8" rx="32" ry="20" fill="#BA68C8" opacity="0.3" stroke="#7B1FA2" stroke-width="1.5"/>
    <text x="0" y="12" font-family="Arial,sans-serif" font-size="6" fill="#4A148C" text-anchor="middle" font-weight="bold">Большая</text>
    <text x="0" y="20" font-family="Arial,sans-serif" font-size="5" fill="#4A148C" text-anchor="middle">субъединица</text>
    <!-- Small subunit -->
    <ellipse cx="0" cy="-14" rx="25" ry="14" fill="#CE93D8" opacity="0.3" stroke="#9C27B0" stroke-width="1.5"/>
    <text x="0" y="-11" font-family="Arial,sans-serif" font-size="6" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Малая</text>
    <text x="0" y="-3" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle">субъединица</text>
    <!-- mRNA passing through -->
    <path d="M-35,-20 Q-15,-25 5,-20 Q25,-15 40,-20" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="0" y="-26" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">мРНК</text>
  </g>

  <text x="0" y="45" font-family="Arial,sans-serif" font-size="7" fill="#4A148C" text-anchor="middle" font-weight="bold">Рибосомальная</text>
  <text x="0" y="56" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Входит в состав рибосом</text>
  <text x="0" y="66" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">80% всей РНК</text>
  <text x="0" y="76" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle">Катализирует синтез белка</text>
</g>

<!-- DNA vs RNA comparison at bottom -->
<g transform="translate(30,275)">
  <rect x="0" y="0" width="440" height="55" rx="5" fill="white" opacity="0.92" stroke="#6A1B9A" stroke-width="1"/>
  <text x="220" y="14" font-family="Arial,sans-serif" font-size="9" fill="#4A148C" text-anchor="middle" font-weight="bold">СРАВНЕНИЕ ДНК и РНК</text>
  <line x1="10" y1="20" x2="430" y2="20" stroke="#CE93D8" stroke-width="0.5"/>

  <!-- DNA column -->
  <g transform="translate(80,32)">
    <rect x="-55" y="-5" width="110" height="20" rx="3" fill="#1565C0" opacity="0.12" stroke="#1565C0" stroke-width="0.7"/>
    <text x="0" y="8" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">ДНК: 2 цепи | дезоксирибоза | T | ядро</text>
  </g>
  <!-- RNA column -->
  <g transform="translate(280,32)">
    <rect x="-55" y="-5" width="110" height="20" rx="3" fill="#9C27B0" opacity="0.12" stroke="#9C27B0" stroke-width="0.7"/>
    <text x="0" y="8" font-family="Arial,sans-serif" font-size="6" fill="#9C27B0" text-anchor="middle">РНК: 1 цепь | рибоза | U | вся клетка</text>
  </g>

  <!-- U instead of T -->
  <text x="220" y="42" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Урацил (U) заменяет Тимин (T) в РНК</text>
</g>

<rect x="10" y="336" width="480" height="8" rx="4" fill="#6A1B9A" opacity="0.85"/>
</svg>