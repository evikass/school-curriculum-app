<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E0F7FA"/><stop offset="100%" stop-color="#B2EBF2"/></linearGradient>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00695C"/><stop offset="100%" stop-color="#00897B"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#00695C" stroke-width="2.5"/>
<rect x="10" y="8" width="480" height="28" rx="5" fill="url(#bar)" opacity="0.9"/>
<text x="250" y="27" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Модификационная изменчивость · Биология 10 — Урок 45</text>

<!-- Definition -->
<rect x="10" y="42" width="480" height="28" rx="5" fill="white" fill-opacity="0.8" stroke="#00695C" stroke-width="1"/>
<text x="250" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Модификация — изменение фенотипа без изменения генотипа под влиянием среды</text>
<text x="250" y="66" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Не наследуется! Обратима! Адаптивна!</text>

<!-- Variation curve (bell curve) -->
<rect x="10" y="74" width="290" height="160" rx="5" fill="white" fill-opacity="0.7" stroke="#00695C" stroke-width="1"/>
<text x="155" y="89" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Вариационная кривая (кривая нормального распределения)</text>

<!-- Axes -->
<line x1="40" y1="220" x2="280" y2="220" stroke="#333" stroke-width="1.5"/>
<line x1="40" y1="220" x2="40" y2="100" stroke="#333" stroke-width="1.5"/>
<text x="160" y="234" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Значение признака</text>
<text x="25" y="160" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle" transform="rotate(-90 25 160)">Частота</text>

<!-- Bell curve -->
<path d="M45,218 Q55,216 65,210 Q75,200 85,185 Q95,162 110,140 Q125,120 140,112 Q150,108 160,112 Q175,120 190,140 Q205,162 215,185 Q225,200 235,210 Q245,216 255,218" fill="none" stroke="#00897B" stroke-width="2.5"/>
<!-- Fill under curve -->
<path d="M45,218 Q55,216 65,210 Q75,200 85,185 Q95,162 110,140 Q125,120 140,112 Q150,108 160,112 Q175,120 190,140 Q205,162 215,185 Q225,200 235,210 Q245,216 255,218 L255,220 L45,220 Z" fill="#00897B" fill-opacity="0.15"/>

<!-- Mean line -->
<line x1="150" y1="108" x2="150" y2="220" stroke="#E65100" stroke-width="1" stroke-dasharray="3,2"/>
<text x="150" y="104" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Среднее</text>

<!-- Bars representing frequency -->
<rect x="50" y="215" width="8" height="5" rx="1" fill="#26A69A"/>
<rect x="62" y="212" width="8" height="8" rx="1" fill="#26A69A"/>
<rect x="74" y="206" width="8" height="14" rx="1" fill="#26A69A"/>
<rect x="86" y="196" width="8" height="24" rx="1" fill="#26A69A"/>
<rect x="98" y="178" width="8" height="42" rx="1" fill="#26A69A"/>
<rect x="110" y="158" width="8" height="62" rx="1" fill="#26A69A"/>
<rect x="122" y="135" width="8" height="85" rx="1" fill="#26A69A"/>
<rect x="134" y="118" width="8" height="102" rx="1" fill="#26A69A"/>
<rect x="146" y="110" width="8" height="110" rx="1" fill="#26A69A"/>
<rect x="158" y="118" width="8" height="102" rx="1" fill="#26A69A"/>
<rect x="170" y="135" width="8" height="85" rx="1" fill="#26A69A"/>
<rect x="182" y="158" width="8" height="62" rx="1" fill="#26A69A"/>
<rect x="194" y="178" width="8" height="42" rx="1" fill="#26A69A"/>
<rect x="206" y="196" width="8" height="24" rx="1" fill="#26A69A"/>
<rect x="218" y="206" width="8" height="14" rx="1" fill="#26A69A"/>
<rect x="230" y="212" width="8" height="8" rx="1" fill="#26A69A"/>
<rect x="242" y="215" width="8" height="5" rx="1" fill="#26A69A"/>

<!-- Norm of reaction brackets -->
<line x1="58" y1="226" x2="58" y2="232" stroke="#E65100" stroke-width="1.5"/>
<line x1="58" y1="232" x2="242" y2="232" stroke="#E65100" stroke-width="1.5"/>
<line x1="242" y1="226" x2="242" y2="232" stroke="#E65100" stroke-width="1.5"/>
<text x="150" y="242" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Норма реакции</text>

<!-- Examples panel -->
<rect x="310" y="74" width="180" height="160" rx="5" fill="white" fill-opacity="0.7" stroke="#00695C" stroke-width="1"/>
<text x="400" y="89" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Примеры модификаций</text>

<!-- Leaf size example -->
<ellipse cx="340" cy="112" rx="15" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
<line x1="325" y1="112" x2="355" y2="112" stroke="#33691E" stroke-width="0.5"/>
<text x="367" y="108" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Размер листьев</text>
<text x="367" y="118" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="start">(зависит от света)</text>

<!-- Human weight example -->
<circle cx="340" cy="142" r="12" fill="#FFAB91" stroke="#E64A19" stroke-width="1"/>
<text x="340" y="146" font-family="Arial,sans-serif" font-size="8" fill="#BF360C" text-anchor="middle">♂</text>
<text x="367" y="138" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Масса тела</text>
<text x="367" y="148" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="start">(питание, образ жизни)</text>

<!-- Skin tan example -->
<rect x="328" y="165" width="24" height="16" rx="4" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
<text x="367" y="172" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Загар кожи</text>
<text x="367" y="182" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="start">(УФ-излучение)</text>

<!-- Flower color example -->
<circle cx="340" cy="208" r="10" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1"/>
<circle cx="340" cy="208" r="4" fill="#FFF176"/>
<text x="367" y="204" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Окраска соцветий</text>
<text x="367" y="214" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="start">гортензии (pH почвы)</text>

<!-- Norm of reaction section -->
<line x1="10" y1="240" x2="490" y2="240" stroke="#00695C" stroke-width="0.8" stroke-dasharray="4,3"/>
<rect x="10" y="246" width="235" height="96" rx="5" fill="white" fill-opacity="0.7" stroke="#00695C" stroke-width="1"/>
<text x="127" y="261" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Норма реакции</text>

<!-- Wide norm diagram -->
<text x="40" y="278" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Широкая:</text>
<rect x="70" y="270" width="120" height="10" rx="3" fill="#B2DFDB" stroke="#00897B" stroke-width="0.5"/>
<line x1="80" y1="275" x2="180" y2="275" stroke="#00897B" stroke-width="2"/>
<text x="130" y="290" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">масса тела, удой коров</text>

<!-- Narrow norm diagram -->
<text x="40" y="306" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Узкая:</text>
<rect x="70" y="298" width="120" height="10" rx="3" fill="#B2DFDB" stroke="#00897B" stroke-width="0.5"/>
<line x1="115" y1="303" x2="145" y2="303" stroke="#00897B" stroke-width="2"/>
<text x="130" y="318" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">цвет глаз, группа крови</text>

<text x="127" y="336" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#004D40" text-anchor="middle">Норма реакции генетически обусловлена!</text>

<!-- Key properties -->
<rect x="255" y="246" width="235" height="96" rx="5" fill="white" fill-opacity="0.7" stroke="#00695C" stroke-width="1"/>
<text x="372" y="261" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#004D40" text-anchor="middle">Свойства модификаций</text>

<rect x="265" y="268" width="8" height="8" rx="2" fill="#4CAF50"/>
<text x="280" y="276" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">НЕ наследуются (генотип не меняется)</text>

<rect x="265" y="282" width="8" height="8" rx="2" fill="#4CAF50"/>
<text x="280" y="290" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Обратимы (исчезают при устранении фактора)</text>

<rect x="265" y="296" width="8" height="8" rx="2" fill="#4CAF50"/>
<text x="280" y="304" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Адаптивны (полезны в данных условиях)</text>

<rect x="265" y="310" width="8" height="8" rx="2" fill="#4CAF50"/>
<text x="280" y="318" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Массовый характер (вся популяция)</text>

<rect x="265" y="324" width="8" height="8" rx="2" fill="#4CAF50"/>
<text x="280" y="332" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Ограничены нормой реакции</text>
</svg>