<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#E1BEE7"/></linearGradient>
  <linearGradient id="mitoGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#CE93D8"/><stop offset="100%" stop-color="#8E24AA"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#7B1FA2" stroke-width="2.5"/>
<!-- Title bar -->
<rect x="3" y="3" width="494" height="38" rx="8" fill="#7B1FA2"/>
<rect x="3" y="30" width="494" height="11" fill="#7B1FA2"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Клеточное дыхание: цикл Кребса</text>
<text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="#6A1B9A" text-anchor="middle">Биология 10 класс — Урок 25</text>

<!-- Location -->
<rect x="155" y="55" width="190" height="16" rx="4" fill="#AB47BC" opacity="0.3"/>
<text x="250" y="66" font-family="Arial,sans-serif" font-size="8" fill="#6A1B9A" text-anchor="middle">Матрикс митохондрии — аэробный процесс</text>

<!-- Mitochondria outline (background) -->
<ellipse cx="235" cy="205" rx="140" ry="105" fill="#F3E5F5" stroke="#AB47BC" stroke-width="2" opacity="0.4"/>
<text x="235" y="310" font-family="Arial,sans-serif" font-size="8" fill="#9C27B0" text-anchor="middle">Митохондрия</text>
<!-- Inner membrane cristae -->
<path d="M130,170 Q160,155 180,170" stroke="#AB47BC" stroke-width="1" fill="none" opacity="0.4"/>
<path d="M290,230 Q320,215 340,230" stroke="#AB47BC" stroke-width="1" fill="none" opacity="0.4"/>

<!-- CIRCULAR KREBS CYCLE -->
<!-- Central circle path (positions around circle) -->
<!-- Top: Oxaloacetate (C4) -->
<!-- Going clockwise: Citrate (C6), Isocitrate (C6), α-KG (C5), Succinyl-CoA (C4), Succinate (C4), Fumarate (C4), Malate (C4) -->

<!-- Circle center at 235, 195, radius ~75 -->
<!-- 8 positions around circle -->

<!-- Oxaloacetate (C4) - top -->
<rect x="195" y="82" width="80" height="22" rx="8" fill="#FFD54F" stroke="#F57F17" stroke-width="1.5"/>
<text x="235" y="96" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">Оксалоацетат</text>
<text x="235" y="80" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle">C₄</text>

<!-- Arrow: Oxaloacetate → Citrate (clockwise) -->
<path d="M275,98 Q310,105 318,120" stroke="#7B1FA2" stroke-width="1.5" fill="none" marker-end="url(#arrPp)"/>
<defs><marker id="arrPp" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 Z" fill="#7B1FA2"/></marker></defs>

<!-- Acetyl-CoA input arrow -->
<path d="M365,88 L320,108" stroke="#E53935" stroke-width="2" fill="none" marker-end="url(#arrRd)"/>
<defs><marker id="arrRd" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 Z" fill="#E53935"/></marker></defs>
<rect x="360" y="72" width="85" height="24" rx="6" fill="#FF8A65" stroke="#BF360C" stroke-width="1.5"/>
<text x="402" y="86" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">Ацетил-CoA</text>
<text x="402" y="94" font-family="Arial,sans-serif" font-size="7" fill="#FFCCBC" text-anchor="middle">C₂</text>

<!-- Citrate (C6) - right top -->
<rect x="310" y="118" width="70" height="22" rx="8" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
<text x="345" y="132" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Цитрат C₆</text>

<!-- Arrow: Citrate → Isocitrate -->
<path d="M365,140 Q385,155 380,172" stroke="#7B1FA2" stroke-width="1.5" fill="none" marker-end="url(#arrPp)"/>

<!-- Isocitrate (C6) - right -->
<rect x="335" y="172" width="75" height="20" rx="8" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
<text x="372" y="186" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Изоцитрат C₆</text>

<!-- NADH + CO2 out -->
<text x="420" y="178" font-family="Arial,sans-serif" font-size="7" fill="#E53935">→CO₂</text>
<text x="420" y="188" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">+NADH</text>

<!-- Arrow down -->
<path d="M360,192 Q340,210 325,220" stroke="#7B1FA2" stroke-width="1.5" fill="none" marker-end="url(#arrPp)"/>

<!-- α-Ketoglutarate (C5) - right bottom -->
<rect x="315" y="215" width="85" height="22" rx="8" fill="#4FC3F7" stroke="#0277BD" stroke-width="1.5"/>
<text x="357" y="229" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#01579B" text-anchor="middle">α-Кетоглутарат C₅</text>

<!-- NADH + CO2 out -->
<text x="415" y="222" font-family="Arial,sans-serif" font-size="7" fill="#E53935">→CO₂</text>
<text x="415" y="232" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">+NADH</text>

<!-- Arrow -->
<path d="M340,237 Q320,252 300,258" stroke="#7B1FA2" stroke-width="1.5" fill="none" marker-end="url(#arrPp)"/>

<!-- Succinyl-CoA (C4) - bottom right -->
<rect x="285" y="255" width="80" height="20" rx="8" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
<text x="325" y="268" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#BF360C" text-anchor="middle">Сукцинил-CoA C₄</text>

<!-- GTP out -->
<text x="375" y="265" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">+GTP</text>

<!-- Arrow: bottom -->
<path d="M295,275 Q270,290 245,288" stroke="#7B1FA2" stroke-width="1.5" fill="none" marker-end="url(#arrPp)"/>

<!-- Succinate (C4) - bottom -->
<rect x="195" y="278" width="70" height="20" rx="8" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
<text x="230" y="292" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C" text-anchor="middle">Сукцинат C₄</text>

<!-- FADH2 -->
<text x="180" y="285" font-family="Arial,sans-serif" font-size="7" fill="#FF6F00">+FADH₂</text>

<!-- Arrow: bottom left -->
<path d="M185,290 Q155,282 140,270" stroke="#7B1FA2" stroke-width="1.5" fill="none" marker-end="url(#arrPp)"/>

<!-- Fumarate (C4) - left bottom -->
<rect x="95" y="255" width="68" height="20" rx="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1.5"/>
<text x="129" y="268" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#4A148C" text-anchor="middle">Фумарат C₄</text>

<!-- Arrow -->
<path d="M115,255 Q105,238 108,222" stroke="#7B1FA2" stroke-width="1.5" fill="none" marker-end="url(#arrPp)"/>

<!-- Malate (C4) - left -->
<rect x="85" y="205" width="65" height="20" rx="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1.5"/>
<text x="117" y="219" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#4A148C" text-anchor="middle">Малат C₄</text>

<!-- NADH out -->
<text x="68" y="218" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">+NADH</text>

<!-- Arrow: top left back to Oxaloacetate -->
<path d="M120,205 Q125,175 155,155 Q175,140 200,108" stroke="#7B1FA2" stroke-width="1.5" fill="none" marker-end="url(#arrPp)"/>

<!-- Summary box at bottom -->
<rect x="10" y="316" width="480" height="26" rx="6" fill="#4A148C"/>
<text x="250" y="333" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#FFEB3B" text-anchor="middle">За 1 оборот: 3 NADH + 1 FADH₂ + 1 GTP + 2 CO₂ | За глюкозу (2 оборота): 6 NADH + 2 FADH₂ + 2 GTP</text>
</svg>