<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#F3E5F5"/><stop offset="100%" stop-color="#D1C4E9"/></linearGradient>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4A148C"/><stop offset="100%" stop-color="#7B1FA2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#4A148C" stroke-width="2.5"/>
<rect x="10" y="8" width="480" height="28" rx="5" fill="url(#bar)" opacity="0.9"/>
<text x="250" y="27" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Развитие эволюционных идей · Биология 10 — Урок 47</text>

<!-- Timeline arrow -->
<line x1="20" y1="60" x2="480" y2="60" stroke="#4A148C" stroke-width="2"/>
<polygon points="480,55 490,60 480,65" fill="#4A148C"/>
<text x="488" y="55" font-family="Arial,sans-serif" font-size="7" fill="#4A148C" text-anchor="end">Время</text>

<!-- Aristotle -->
<circle cx="50" cy="60" r="6" fill="#7B1FA2" stroke="white" stroke-width="1.5"/>
<line x1="50" y1="66" x2="50" y2="82" stroke="#7B1FA2" stroke-width="1"/>
<rect x="15" y="82" width="70" height="58" rx="4" fill="white" fill-opacity="0.85" stroke="#7B1FA2" stroke-width="1"/>
<text x="50" y="94" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#4A148C" text-anchor="middle">Аристотель</text>
<text x="50" y="104" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(IV в. до н.э.)</text>
<text x="50" y="116" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Лестница</text>
<text x="50" y="126" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">природы —</text>
<text x="50" y="136" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">иерархия форм</text>

<!-- Scale of nature visualization -->
<rect x="22" y="97" width="6" height="4" rx="1" fill="#9E9E9E"/>
<rect x="21" y="104" width="8" height="4" rx="1" fill="#8D6E63"/>
<rect x="20" y="111" width="10" height="4" rx="1" fill="#66BB6A"/>
<rect x="19" y="118" width="12" height="4" rx="1" fill="#42A5F5"/>
<text x="38" y="123" font-family="Arial,sans-serif" font-size="5" fill="#9E9E9E">↑</text>

<!-- Linnaeus -->
<circle cx="140" cy="60" r="6" fill="#7B1FA2" stroke="white" stroke-width="1.5"/>
<line x1="140" y1="66" x2="140" y2="82" stroke="#7B1FA2" stroke-width="1"/>
<rect x="105" y="82" width="70" height="58" rx="4" fill="white" fill-opacity="0.85" stroke="#7B1FA2" stroke-width="1"/>
<text x="140" y="94" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#4A148C" text-anchor="middle">Линней</text>
<text x="140" y="104" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(1707–1778)</text>
<text x="140" y="116" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Классификация</text>
<text x="140" y="126" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Вид — единица</text>
<text x="140" y="136" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">КРЕАЦИОНИЗМ</text>

<!-- Linnaeus classification icon -->
<line x1="115" y1="98" x2="115" y2="138" stroke="#4A148C" stroke-width="0.5"/>
<line x1="115" y1="108" x2="120" y2="108" stroke="#4A148C" stroke-width="0.5"/>
<line x1="115" y1="118" x2="120" y2="118" stroke="#4A148C" stroke-width="0.5"/>
<line x1="115" y1="128" x2="120" y2="128" stroke="#4A148C" stroke-width="0.5"/>

<!-- Lamarck -->
<circle cx="230" cy="60" r="6" fill="#E65100" stroke="white" stroke-width="1.5"/>
<line x1="230" y1="66" x2="230" y2="82" stroke="#E65100" stroke-width="1"/>
<rect x="190" y="82" width="80" height="58" rx="4" fill="white" fill-opacity="0.85" stroke="#E65100" stroke-width="1.5"/>
<text x="230" y="94" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">Ламарк</text>
<text x="230" y="104" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(1744–1829)</text>
<text x="230" y="116" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Упражнение/неупр.</text>
<text x="230" y="126" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Наследование</text>
<text x="230" y="136" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">приобретённых</text>

<!-- Cuvier -->
<circle cx="320" cy="60" r="6" fill="#7B1FA2" stroke="white" stroke-width="1.5"/>
<line x1="320" y1="66" x2="320" y2="82" stroke="#7B1FA2" stroke-width="1"/>
<rect x="285" y="82" width="70" height="58" rx="4" fill="white" fill-opacity="0.85" stroke="#7B1FA2" stroke-width="1"/>
<text x="320" y="94" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#4A148C" text-anchor="middle">Кювье</text>
<text x="320" y="104" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(1769–1832)</text>
<text x="320" y="116" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">КАТАСТРОФИЗМ</text>
<text x="320" y="126" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Катаклизмы</text>
<text x="320" y="136" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">→ вымирание →</text>
<text x="320" y="146" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">новое творение</text>

<!-- Lyell -->
<circle cx="400" cy="60" r="6" fill="#7B1FA2" stroke="white" stroke-width="1.5"/>
<line x1="400" y1="66" x2="400" y2="82" stroke="#7B1FA2" stroke-width="1"/>
<rect x="365" y="82" width="70" height="58" rx="4" fill="white" fill-opacity="0.85" stroke="#7B1FA2" stroke-width="1"/>
<text x="400" y="94" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#4A148C" text-anchor="middle">Лайель</text>
<text x="400" y="104" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(1797–1875)</text>
<text x="400" y="116" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">УНИФОРМИЗМ</text>
<text x="400" y="126" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Медленные</text>
<text x="400" y="136" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">постоянные</text>
<text x="400" y="146" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">изменения Земли</text>

<!-- Darwin -->
<circle cx="465" cy="60" r="8" fill="#2E7D32" stroke="#FFD600" stroke-width="2"/>
<line x1="465" y1="68" x2="465" y2="82" stroke="#2E7D32" stroke-width="1.5"/>
<rect x="440" y="82" width="50" height="58" rx="4" fill="#E8F5E9" fill-opacity="0.9" stroke="#2E7D32" stroke-width="2"/>
<text x="465" y="94" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">ДАРВИН</text>
<text x="465" y="104" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">(1809–1882)</text>
<text x="465" y="116" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">ЕСТЕСТВЕННЫЙ</text>
<text x="465" y="126" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">ОТБОР</text>
<text x="465" y="136" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">→ Эволюция!</text>

<!-- Lamarck's giraffe example -->
<line x1="10" y1="150" x2="490" y2="150" stroke="#4A148C" stroke-width="0.8" stroke-dasharray="4,3"/>
<rect x="10" y="155" width="480" height="105" rx="5" fill="white" fill-opacity="0.7" stroke="#E65100" stroke-width="1"/>
<text x="250" y="170" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Пример Ламарка: шея жирафа</text>

<!-- Short giraffe -->
<text x="90" y="188" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Предок</text>
<!-- Body -->
<ellipse cx="90" cy="220" rx="25" ry="14" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
<!-- Short neck -->
<rect x="85" y="200" width="10" height="20" rx="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.8"/>
<!-- Head -->
<ellipse cx="90" cy="195" rx="8" ry="5" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
<!-- Legs -->
<line x1="75" y1="234" x2="75" y2="250" stroke="#5D4037" stroke-width="2"/>
<line x1="105" y1="234" x2="105" y2="250" stroke="#5D4037" stroke-width="2"/>
<!-- Leaves out of reach -->
<ellipse cx="90" cy="180" rx="6" ry="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<text x="90" y="178" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">🍃</text>

<!-- Arrow: stretching -->
<text x="160" y="215" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">Упражнение</text>
<text x="160" y="228" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">→</text>
<text x="160" y="241" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Шея удлиняется</text>

<!-- Medium giraffe -->
<ellipse cx="240" cy="220" rx="25" ry="14" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
<rect x="235" y="192" width="10" height="28" rx="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.8"/>
<ellipse cx="240" cy="187" rx="8" ry="5" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
<line x1="225" y1="234" x2="225" y2="250" stroke="#5D4037" stroke-width="2"/>
<line x1="255" y1="234" x2="255" y2="250" stroke="#5D4037" stroke-width="2"/>
<!-- Leaves at reach -->
<ellipse cx="240" cy="184" rx="8" ry="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>

<text x="240" y="188" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle"></text>

<!-- Arrow: inheritance -->
<text x="310" y="215" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">Наследование</text>
<text x="310" y="228" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle">→</text>
<text x="310" y="241" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Потомки с длинной</text>
<text x="310" y="251" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">шеей</text>

<!-- Tall giraffe -->
<ellipse cx="400" cy="220" rx="25" ry="14" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
<rect x="395" y="182" width="10" height="38" rx="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.8"/>
<ellipse cx="400" cy="177" rx="8" ry="5" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
<line x1="385" y1="234" x2="385" y2="250" stroke="#5D4037" stroke-width="2"/>
<line x1="415" y1="234" x2="415" y2="250" stroke="#5D4037" stroke-width="2"/>
<!-- Leaves -->
<ellipse cx="400" cy="172" rx="10" ry="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>

<text x="400" y="188" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Современный жираф</text>

<!-- Criticism of Lamarck -->
<rect x="10" y="265" width="235" height="76" rx="5" fill="white" fill-opacity="0.8" stroke="#C62828" stroke-width="1"/>
<text x="127" y="279" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Ошибки Ламарка</text>
<rect x="20" y="286" width="6" height="6" rx="1" fill="#C62828"/>
<text x="30" y="292" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Приобретённые признаки НЕ наследуются</text>
<rect x="20" y="300" width="6" height="6" rx="1" fill="#C62828"/>
<text x="30" y="306" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Стремление организма ≠ эволюция</text>
<rect x="20" y="314" width="6" height="6" rx="1" fill="#C62828"/>
<text x="30" y="320" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Прямая адаптация — неверный принцип</text>
<rect x="20" y="328" width="6" height="6" rx="1" fill="#C62828"/>
<text x="30" y="334" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Заслуга: первый эволюционный взгляд</text>

<!-- Darwin's correction -->
<rect x="255" y="265" width="235" height="76" rx="5" fill="white" fill-opacity="0.8" stroke="#2E7D32" stroke-width="1"/>
<text x="372" y="279" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Дарвин: естественный отбор</text>
<rect x="265" y="286" width="6" height="6" rx="1" fill="#2E7D32"/>
<text x="275" y="292" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Изменчивость — случайна (не направлена)</text>
<rect x="265" y="300" width="6" height="6" rx="1" fill="#2E7D32"/>
<text x="275" y="306" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Отбор сохраняет полезные варианты</text>
<rect x="265" y="314" width="6" height="6" rx="1" fill="#2E7D32"/>
<text x="275" y="320" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">Жирафы с длинной шеей выживали</text>
<rect x="265" y="328" width="6" height="6" rx="1" fill="#2E7D32"/>
<text x="275" y="334" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="start">и оставляли больше потомков</text>
</svg>