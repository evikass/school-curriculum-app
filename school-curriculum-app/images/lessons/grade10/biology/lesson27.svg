<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#A5D6A7"/></linearGradient>
  <linearGradient id="thylGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#66BB6A"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient>
  <linearGradient id="lumenGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF9C4"/><stop offset="100%" stop-color="#FFF176"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<!-- Title bar -->
<rect x="3" y="3" width="494" height="38" rx="8" fill="#2E7D32"/>
<rect x="3" y="30" width="494" height="11" fill="#2E7D32"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">Фотосинтез: световая фаза</text>
<text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">Биология 10 класс — Урок 27</text>

<!-- Thylakoid membrane structure -->
<!-- Lumen (inside) -->
<rect x="20" y="85" width="460" height="70" rx="6" fill="url(#lumenGrad)" opacity="0.6"/>
<text x="250" y="100" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle">Полость тилакоида (люмен) — высокое [H⁺]</text>

<!-- Top membrane -->
<rect x="20" y="78" width="460" height="8" rx="3" fill="url(#thylGrad)" stroke="#1B5E20" stroke-width="1"/>
<!-- Bottom membrane -->
<rect x="20" y="153" width="460" height="8" rx="3" fill="url(#thylGrad)" stroke="#1B5E20" stroke-width="1"/>

<!-- Stroma label (below) -->
<rect x="20" y="165" width="460" height="130" rx="6" fill="#C8E6C9" opacity="0.3"/>
<text x="250" y="180" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Строма хлоропласта</text>

<!-- PHOTOSYSTEM II (left) -->
<rect x="35" y="83" width="80" height="73" rx="6" fill="#43A047" stroke="#1B5E20" stroke-width="2"/>
<circle cx="75" cy="105" r="14" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
<text x="75" y="102" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">P680</text>
<text x="75" y="112" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">хлорофилл</text>
<text x="75" y="130" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">ФС II</text>
<text x="75" y="142" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9" text-anchor="middle">Фото-система 2</text>

<!-- Light arrows hitting PSII -->
<line x1="30" y1="60" x2="65" y2="88" stroke="#FFD54F" stroke-width="2"/>
<line x1="50" y1="55" x2="70" y2="88" stroke="#FFD54F" stroke-width="2"/>
<line x1="70" y1="58" x2="78" y2="88" stroke="#FFD54F" stroke-width="2"/>
<text x="40" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F57F17">hν</text>
<!-- Sun symbol -->
<circle cx="25" cy="62" r="8" fill="#FFEB3B" stroke="#F9A825" stroke-width="1.5"/>
<text x="25" y="65" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">☀</text>

<!-- Water splitting (below PSII) -->
<path d="M75,158 L75,188" stroke="#0D47A1" stroke-width="1.5"/>
<rect x="40" y="190" width="70" height="32" rx="6" fill="#42A5F5" stroke="#0D47A1" stroke-width="1.5"/>
<text x="75" y="203" font-family="Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle">H₂O расщепление</text>
<text x="75" y="214" font-family="Arial,sans-serif" font-size="7" fill="#E3F2FD" text-anchor="middle">(фотолиз)</text>
<!-- Products of water splitting -->
<text x="20" y="228" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">→ ½O₂↑</text>
<text x="20" y="238" font-family="Arial,sans-serif" font-size="7" fill="#E53935">→ 2H⁺↑люмен</text>
<text x="20" y="248" font-family="Arial,sans-serif" font-size="7" fill="#FF6F00">→ 2e⁻→ФСII</text>

<!-- O2 released -->
<path d="M30,190 L20,175" stroke="#0D47A1" stroke-width="1" stroke-dasharray="3,2"/>
<text x="10" y="172" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" font-weight="bold">O₂↑</text>

<!-- ELECTRON TRANSPORT: PSII → Cyt b6f -->
<path d="M115,115 L170,115" stroke="#FFEB3B" stroke-width="2.5" marker-end="url(#arrYl)"/>
<defs><marker id="arrYl" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#FFEB3B"/></marker></defs>
<text x="142" y="110" font-family="Arial,sans-serif" font-size="7" fill="#F57F17">e⁻</text>

<!-- CYTOCHROME b6f complex -->
<rect x="175" y="90" width="70" height="60" rx="6" fill="#795548" stroke="#4E342E" stroke-width="2"/>
<text x="210" y="115" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">Cyt b₆f</text>
<text x="210" y="128" font-family="Arial,sans-serif" font-size="6" fill="#D7CCC8" text-anchor="middle">цитохром</text>
<text x="210" y="138" font-family="Arial,sans-serif" font-size="6" fill="#D7CCC8" text-anchor="middle">комплекс</text>
<!-- H+ pumped into lumen -->
<path d="M195,88 L195,78" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrR4)"/>
<defs><marker id="arrR4" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 Z" fill="#E53935"/></marker></defs>
<text x="183" y="76" font-family="Arial,sans-serif" font-size="7" fill="#E53935">H⁺↑</text>
<!-- H+ from stroma -->
<path d="M225,162 L225,152" stroke="#E53935" stroke-width="1.5" marker-end="url(#arrR4)"/>
<text x="235" y="172" font-family="Arial,sans-serif" font-size="7" fill="#E53935">H⁺↑из стромы</text>

<!-- ELECTRON TRANSPORT: Cyt b6f → PSI -->
<path d="M245,120 L300,120" stroke="#FFEB3B" stroke-width="2.5" marker-end="url(#arrYl)"/>
<text x="272" y="115" font-family="Arial,sans-serif" font-size="7" fill="#F57F17">e⁻</text>
<!-- Plastocyanin carrier -->
<rect x="258" y="123" width="35" height="12" rx="4" fill="#FFF176" stroke="#F9A825" stroke-width="0.8"/>
<text x="275" y="132" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Pc</text>

<!-- PHOTOSYSTEM I (right) -->
<rect x="305" y="83" width="80" height="73" rx="6" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
<circle cx="345" cy="105" r="14" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
<text x="345" y="102" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">P700</text>
<text x="345" y="112" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">хлорофилл</text>
<text x="345" y="130" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">ФС I</text>
<text x="345" y="142" font-family="Arial,sans-serif" font-size="6" fill="#C8E6C9" text-anchor="middle">Фото-система 1</text>

<!-- Light arrows hitting PSI -->
<line x1="340" y1="60" x2="335" y2="88" stroke="#FFD54F" stroke-width="2"/>
<line x1="360" y1="55" x2="350" y2="88" stroke="#FFD54F" stroke-width="2"/>
<line x1="380" y1="60" x2="358" y2="88" stroke="#FFD54F" stroke-width="2"/>
<text x="370" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#F57F17">hν</text>
<circle cx="390" cy="62" r="8" fill="#FFEB3B" stroke="#F9A825" stroke-width="1.5"/>
<text x="390" y="65" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">☀</text>

<!-- NADP+ reductase -->
<path d="M385,110 L420,110" stroke="#FFEB3B" stroke-width="2" marker-end="url(#arrYl)"/>
<rect x="415" y="95" width="60" height="50" rx="6" fill="#FF8A65" stroke="#BF360C" stroke-width="1.5"/>
<text x="445" y="115" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#fff" text-anchor="middle">ФАД</text>
<text x="445" y="126" font-family="Arial,sans-serif" font-size="6" fill="#FFCCBC" text-anchor="middle">NADP⁺</text>
<text x="445" y="136" font-family="Arial,sans-serif" font-size="6" fill="#FFCCBC" text-anchor="middle">редуктаза</text>

<!-- NADPH output -->
<path d="M445,145 L445,190" stroke="#7B1FA2" stroke-width="2" marker-end="url(#arrPu)"/>
<defs><marker id="arrPu" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 Z" fill="#7B1FA2"/></marker></defs>
<rect x="420" y="192" width="60" height="22" rx="6" fill="#7B1FA2" stroke="#4A148C" stroke-width="1.5"/>
<text x="450" y="205" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">NADPH</text>

<!-- ATP SYNTHASE -->
<rect x="165" y="215" width="70" height="55" rx="8" fill="#FFD54F" stroke="#F57F17" stroke-width="2"/>
<circle cx="200" cy="237" r="12" fill="#FFF176" stroke="#F9A825" stroke-width="1.5"/>
<text x="200" y="240" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">ATP</text>
<text x="200" y="260" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">синтаза</text>
<!-- H+ flowing through from lumen to stroma -->
<path d="M200,155 L200,213" stroke="#E53935" stroke-width="2" marker-end="url(#arrR4)"/>
<text x="212" y="190" font-family="Arial,sans-serif" font-size="7" fill="#E53935">H⁺↓</text>
<text x="212" y="200" font-family="Arial,sans-serif" font-size="6" fill="#E53935">хемиосмос</text>

<!-- ATP output -->
<path d="M200,270 L200,285" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrG5)"/>
<defs><marker id="arrG5" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 Z" fill="#2E7D32"/></marker></defs>
<rect x="175" y="287" width="55" height="20" rx="6" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
<text x="202" y="300" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">АТФ</text>

<!-- Summary box -->
<rect x="15" y="314" width="470" height="28" rx="6" fill="#1B5E20"/>
<text x="250" y="328" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#FFEB3B" text-anchor="middle">Световая фаза: H₂O → ½O₂ | NADP⁺ → NADPH | ADP → АТФ | Всё в мембранах тилакоидов</text>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="7" fill="#C8E6C9" text-anchor="middle">Нек cyclic и циклический поток электронов</text>
</svg>