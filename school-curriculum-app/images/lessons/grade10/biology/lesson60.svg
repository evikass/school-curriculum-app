<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg60" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
    <radialGradient id="earthGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="60%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#0a1929"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg60)"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#42a5f5" stroke-width="2" rx="6"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="492" height="36" fill="#1565c0" rx="4"/>
  <text x="250" y="27" text-anchor="middle" fill="#e3f2fd" font-size="11" font-weight="bold" font-family="Arial">Биосфера — глобальная экосистема — Биология 10 класс — Урок 60</text>

  <!-- Earth diagram with layers -->
  <rect x="8" y="48" width="175" height="160" fill="#0a1929" stroke="#1e88e5" stroke-width="1" rx="4"/>
  <text x="95" y="62" text-anchor="middle" fill="#90caf9" font-size="7.5" font-weight="bold" font-family="Arial">Оболочки биосферы</text>
  
  <!-- Earth circle -->
  <circle cx="95" cy="132" r="55" fill="url(#earthGrad)" stroke="#1565c0" stroke-width="1"/>
  
  <!-- Atmosphere layer -->
  <circle cx="95" cy="132" r="58" fill="none" stroke="#81d4fa" stroke-width="3" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="95" y="73" text-anchor="middle" fill="#81d4fa" font-size="5" font-weight="bold" font-family="Arial">АТМОСФЕРА</text>
  <text x="95" y="80" text-anchor="middle" fill="#4fc3f7" font-size="4" font-family="Arial">до ~20 км</text>
  
  <!-- Land masses on earth -->
  <path d="M60,110 Q70,105 80,112 Q85,108 90,115 Q95,110 100,118" fill="#2e7d32" opacity="0.5"/>
  <path d="M75,135 Q85,130 95,138 Q100,132 110,140" fill="#2e7d32" opacity="0.4"/>
  <path d="M55,140 Q65,138 70,145" fill="#2e7d32" opacity="0.3"/>
  
  <!-- Hydrosphere label -->
  <text x="138" y="142" fill="#29b6f6" font-size="5" font-weight="bold" font-family="Arial">ГИДРОСФЕРА</text>
  <text x="138" y="149" fill="#4fc3f7" font-size="4" font-family="Arial">до ~11 км глуб.</text>
  
  <!-- Lithosphere label -->
  <text x="95" y="172" text-anchor="middle" fill="#a1887f" font-size="5" font-weight="bold" font-family="Arial">ЛИТОСФЕРА</text>
  <text x="95" y="179" text-anchor="middle" fill="#bcaaa4" font-size="4" font-family="Arial">до ~5 км глуб.</text>
  
  <!-- Living matter indicator -->
  <circle cx="95" cy="132" r="42" fill="none" stroke="#76ff03" stroke-width="1" stroke-dasharray="2,3" opacity="0.6"/>
  <text x="95" y="132" text-anchor="middle" fill="#76ff03" font-size="5" font-family="Arial">Живое</text>
  <text x="95" y="139" text-anchor="middle" fill="#76ff03" font-size="5" font-family="Arial">вещество</text>

  <!-- Vernadsky info -->
  <rect x="8" y="214" width="175" height="34" fill="#0a1929" stroke="#1e88e5" stroke-width="0.8" rx="3"/>
  <text x="95" y="226" text-anchor="middle" fill="#90caf9" font-size="6" font-weight="bold" font-family="Arial">В.И. Вернадский</text>
  <text x="95" y="235" text-anchor="middle" fill="#64b5f6" font-size="5" font-family="Arial">Учение о биосфере (1926 г.)</text>
  <text x="95" y="244" text-anchor="middle" fill="#42a5f5" font-size="5" font-family="Arial">Живое вещество — двигательная сила</text>

  <!-- Carbon cycle -->
  <rect x="190" y="48" width="302" height="112" fill="#0a1929" stroke="#26a69a" stroke-width="1" rx="4"/>
  <text x="341" y="62" text-anchor="middle" fill="#80cbc4" font-size="7.5" font-weight="bold" font-family="Arial">Круговорот углерода</text>
  
  <!-- Atmosphere CO2 -->
  <rect x="290" y="68" width="100" height="18" fill="#26a69a" opacity="0.2" stroke="#26a69a" stroke-width="0.8" rx="8"/>
  <text x="340" y="80" text-anchor="middle" fill="#80cbc4" font-size="6" font-weight="bold" font-family="Arial">CO₂ атмосфера</text>
  
  <!-- Photosynthesis arrow down -->
  <line x1="310" y1="86" x2="280" y2="100" stroke="#66bb6a" stroke-width="1.2" marker-end="url(#arr60g)"/>
  <defs><marker id="arr60g" markerWidth="5" markerHeight="5" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,5 Z" fill="#66bb6a"/></marker></defs>
  <text x="282" y="96" fill="#81c784" font-size="5" font-family="Arial">Фотосинтез</text>
  
  <!-- Plants -->
  <rect x="235" y="100" width="55" height="16" fill="#2e7d32" opacity="0.3" stroke="#4caf50" stroke-width="0.5" rx="2"/>
  <text x="262" y="111" text-anchor="middle" fill="#a5d6a7" font-size="5.5" font-family="Arial">Растения</text>
  
  <!-- Respiration arrow up -->
  <line x1="290" y1="100" x2="320" y2="86" stroke="#ff8a65" stroke-width="1" marker-end="url(#arr60r)"/>
  <defs><marker id="arr60r" markerWidth="5" markerHeight="5" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,5 Z" fill="#ff8a65"/></marker></defs>
  <text x="310" y="100" fill="#ff8a65" font-size="5" font-family="Arial">Дыхание</text>
  
  <!-- Animals -->
  <rect x="310" y="100" width="55" height="16" fill="#4a148c" opacity="0.3" stroke="#ab47bc" stroke-width="0.5" rx="2"/>
  <text x="337" y="111" text-anchor="middle" fill="#ce93d8" font-size="5.5" font-family="Arial">Животные</text>
  
  <!-- Decomposition -->
  <line x1="337" y1="116" x2="337" y2="128" stroke="#a1887f" stroke-width="1" marker-end="url(#arr60d)"/>
  <defs><marker id="arr60d" markerWidth="5" markerHeight="5" refX="3" refY="5" orient="auto"><path d="M0,0 L5,3 L0,5 Z" fill="#a1887f"/></marker></defs>
  <text x="358" y="124" fill="#bcaaa4" font-size="4.5" font-family="Arial">Разложение</text>
  
  <!-- Fossil fuels -->
  <rect x="375" y="100" width="55" height="16" fill="#3e2723" opacity="0.5" stroke="#795548" stroke-width="0.5" rx="2"/>
  <text x="402" y="111" text-anchor="middle" fill="#d7ccc8" font-size="5" font-family="Arial">Ископаемое</text>
  
  <!-- Combustion -->
  <line x1="402" y1="100" x2="380" y2="82" stroke="#ef5350" stroke-width="1" stroke-dasharray="2,1"/>
  <text x="412" y="92" fill="#ef9a9a" font-size="4.5" font-family="Arial">Сжигание</text>
  
  <!-- Decomposers -->
  <rect x="280" y="130" width="90" height="14" fill="#3e2723" opacity="0.3" stroke="#8d6e63" stroke-width="0.5" rx="2"/>
  <text x="325" y="140" text-anchor="middle" fill="#bcaaa4" font-size="5.5" font-family="Arial">Редуценты → CO₂</text>
  
  <!-- Dead organic -->
  <path d="M262,116 L262,128 L280,134" stroke="#8d6e63" stroke-width="0.8" fill="none"/>
  <text x="240" y="126" fill="#a1887f" font-size="4.5" font-family="Arial">Отмершие</text>
  <text x="240" y="133" fill="#a1887f" font-size="4.5" font-family="Arial">остатки</text>

  <!-- Nitrogen cycle -->
  <rect x="190" y="164" width="302" height="84" fill="#0a1929" stroke="#7e57c2" stroke-width="1" rx="4"/>
  <text x="341" y="178" text-anchor="middle" fill="#b39ddb" font-size="7.5" font-weight="bold" font-family="Arial">Круговорот азота</text>
  
  <!-- N2 atmosphere -->
  <rect x="290" y="183" width="100" height="14" fill="#4527a0" opacity="0.3" stroke="#7e57c2" stroke-width="0.5" rx="7"/>
  <text x="340" y="193" text-anchor="middle" fill="#b39ddb" font-size="5.5" font-weight="bold" font-family="Arial">N₂ атмосфера (78%)</text>
  
  <!-- Nitrogen fixation -->
  <line x1="300" y1="197" x2="260" y2="210" stroke="#66bb6a" stroke-width="1"/>
  <text x="268" y="206" fill="#81c784" font-size="4.5" font-family="Arial">Азотфиксация</text>
  <text x="268" y="212" fill="#a5d6a7" font-size="4" font-family="Arial">(клубеньковые бактерии)</text>
  
  <!-- Nitrates -->
  <rect x="220" y="214" width="70" height="12" fill="#1b5e20" opacity="0.3" stroke="#66bb6a" stroke-width="0.5" rx="2"/>
  <text x="255" y="223" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">NO₃⁻ (нитраты)</text>
  
  <!-- Plant uptake -->
  <line x1="260" y1="214" x2="280" y2="210" stroke="#4caf50" stroke-width="0.8"/>
  <text x="290" y="210" fill="#81c784" font-size="4" font-family="Arial">Растения</text>
  
  <!-- Denitrification -->
  <line x1="340" y1="197" x2="400" y2="218" stroke="#ef5350" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="380" y="210" fill="#ef9a9a" font-size="4.5" font-family="Arial">Денитрификация</text>
  <text x="395" y="216" fill="#e57373" font-size="4" font-family="Arial">(бактерии → N₂)</text>
  
  <!-- Ammonia -->
  <rect x="290" y="225" width="55" height="12" fill="#ff6f00" opacity="0.2" stroke="#ff9800" stroke-width="0.5" rx="2"/>
  <text x="317" y="234" text-anchor="middle" fill="#ffcc80" font-size="5" font-family="Arial">NH₃ (аммиак)</text>
  
  <!-- Nitrification -->
  <line x1="290" y1="228" x2="270" y2="220" stroke="#ff9800" stroke-width="0.8"/>
  <text x="255" y="232" fill="#ffa726" font-size="4" font-family="Arial">Нитрификация</text>

  <!-- Biomass distribution -->
  <rect x="8" y="254" width="175" height="88" fill="#0a1929" stroke="#42a5f5" stroke-width="1" rx="4"/>
  <text x="95" y="268" text-anchor="middle" fill="#90caf9" font-size="7" font-weight="bold" font-family="Arial">Биомасса на Земле</text>
  
  <!-- Bar chart -->
  <rect x="25" y="316" width="20" height="8" fill="#2e7d32" rx="1"/>
  <text x="35" y="312" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">99%</text>
  <text x="35" y="330" text-anchor="middle" fill="#a5d6a7" font-size="4.5" font-family="Arial">Растения</text>
  
  <rect x="60" y="320" width="20" height="4" fill="#9c27b0" rx="1"/>
  <text x="70" y="316" text-anchor="middle" fill="#ce93d8" font-size="5" font-family="Arial">0.7%</text>
  <text x="70" y="330" text-anchor="middle" fill="#e1bee7" font-size="4.5" font-family="Arial">Бактерии</text>
  
  <rect x="95" y="321" width="20" height="3" fill="#4a148c" rx="1"/>
  <text x="105" y="316" text-anchor="middle" fill="#ce93d8" font-size="5" font-family="Arial">0.2%</text>
  <text x="105" y="330" text-anchor="middle" fill="#e1bee7" font-size="4.5" font-family="Arial">Грибы</text>
  
  <rect x="130" y="322" width="20" height="2" fill="#e64a19" rx="1"/>
  <text x="140" y="316" text-anchor="middle" fill="#ff8a65" font-size="5" font-family="Arial">0.1%</text>
  <text x="140" y="330" text-anchor="middle" fill="#ffab91" font-size="4.5" font-family="Arial">Животные</text>
  
  <text x="95" y="282" text-anchor="middle" fill="#64b5f6" font-size="5" font-family="Arial">Суша: 99.2% биомассы</text>
  <text x="95" y="290" text-anchor="middle" fill="#42a5f5" font-size="5" font-family="Arial">Океан: 0.8% биомассы</text>
  <text x="95" y="298" text-anchor="middle" fill="#29b6f6" font-size="5" font-family="Arial">Но океан = 71% поверхности</text>

  <!-- Bottom summary -->
  <rect x="190" y="254" width="302" height="88" fill="#0a1929" stroke="#1565c0" stroke-width="1" rx="4"/>
  <text x="341" y="268" text-anchor="middle" fill="#90caf9" font-size="7" font-weight="bold" font-family="Arial">Роль живых организмов в биосфере</text>
  
  <!-- Functions -->
  <rect x="198" y="274" width="140" height="28" fill="#1a237e" stroke="#3f51b5" stroke-width="0.5" rx="2"/>
  <text x="268" y="284" text-anchor="middle" fill="#c5cae9" font-size="5.5" font-weight="bold" font-family="Arial">Газовая функция</text>
  <text x="268" y="293" text-anchor="middle" fill="#9fa8da" font-size="5" font-family="Arial">O₂ и CO₂ в атмосфере</text>
  
  <rect x="344" y="274" width="140" height="28" fill="#1a237e" stroke="#3f51b5" stroke-width="0.5" rx="2"/>
  <text x="414" y="284" text-anchor="middle" fill="#c5cae9" font-size="5.5" font-weight="bold" font-family="Arial">Концентрационная функция</text>
  <text x="414" y="293" text-anchor="middle" fill="#9fa8da" font-size="5" font-family="Arial">Накопление элементов (Ca, P, Si)</text>
  
  <rect x="198" y="306" width="140" height="28" fill="#1a237e" stroke="#3f51b5" stroke-width="0.5" rx="2"/>
  <text x="268" y="316" text-anchor="middle" fill="#c5cae9" font-size="5.5" font-weight="bold" font-family="Arial">Окислительно-восстановит.</text>
  <text x="268" y="325" text-anchor="middle" fill="#9fa8da" font-size="5" font-family="Arial">Химические превращения</text>
  
  <rect x="344" y="306" width="140" height="28" fill="#1a237e" stroke="#3f51b5" stroke-width="0.5" rx="2"/>
  <text x="414" y="316" text-anchor="middle" fill="#c5cae9" font-size="5.5" font-weight="bold" font-family="Arial">Биохимическая функция</text>
  <text x="414" y="325" text-anchor="middle" fill="#9fa8da" font-size="5" font-family="Arial">Создание органических веществ</text>
</svg>