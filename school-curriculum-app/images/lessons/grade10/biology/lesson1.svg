<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="cellGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Биология — наука о живом</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 1</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Central cell illustration -->
<g transform="translate(130,175)">
  <!-- Cell membrane -->
  <ellipse cx="0" cy="0" rx="70" ry="55" fill="url(#cellGrad)" opacity="0.3" stroke="#2E7D32" stroke-width="2"/>
  <ellipse cx="0" cy="0" rx="70" ry="55" fill="none" stroke="#388E3C" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.5"/>
  <!-- Nucleus -->
  <ellipse cx="5" cy="-5" rx="25" ry="20" fill="#2E7D32" opacity="0.25" stroke="#1B5E20" stroke-width="1.5"/>
  <ellipse cx="5" cy="-5" rx="12" ry="9" fill="#1B5E20" opacity="0.3"/>
  <!-- DNA inside nucleus -->
  <path d="M-2,-12 C2,-10 -2,-6 2,-4 C6,-2 2,2 6,4" fill="none" stroke="#1B5E20" stroke-width="1.5"/>
  <!-- Mitochondria -->
  <ellipse cx="-30" cy="20" rx="18" ry="8" fill="#FF9800" opacity="0.35" stroke="#E65100" stroke-width="1"/>
  <path d="M-42,20 Q-35,15 -30,20 Q-25,25 -18,20" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <!-- ER -->
  <path d="M25,-25 Q35,-20 30,-15 Q25,-10 35,-5" fill="none" stroke="#795548" stroke-width="1.2"/>
  <path d="M28,-23 Q38,-18 33,-13 Q28,-8 38,-3" fill="none" stroke="#795548" stroke-width="1.2"/>
  <!-- Ribosomes -->
  <circle cx="32" cy="-25" r="2" fill="#9C27B0"/>
  <circle cx="37" cy="-18" r="2" fill="#9C27B0"/>
  <circle cx="28" cy="-10" r="2" fill="#9C27B0"/>
  <circle cx="36" cy="-3" r="2" fill="#9C27B0"/>
  <!-- Label -->
  <text x="0" y="68" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Клетка</text>
</g>

<!-- DNA double helix -->
<g transform="translate(250,155)">
  <path d="M-10,-30 C0,-25 10,-20 0,-15 C-10,-10 10,-5 0,0 C-10,5 10,10 0,15 C-10,20 10,25 0,30" fill="none" stroke="#1565C0" stroke-width="2"/>
  <path d="M10,-30 C0,-25 -10,-20 0,-15 C10,-10 -10,-5 0,0 C10,5 -10,10 0,15 C10,20 -10,25 0,30" fill="none" stroke="#C62828" stroke-width="2"/>
  <!-- Base pairs (rungs) -->
  <line x1="-5" y1="-25" x2="5" y2="-25" stroke="#666" stroke-width="1"/>
  <line x1="-8" y1="-15" x2="8" y2="-15" stroke="#666" stroke-width="1"/>
  <line x1="-5" y1="-5" x2="5" y2="-5" stroke="#666" stroke-width="1"/>
  <line x1="-8" y1="5" x2="8" y2="5" stroke="#666" stroke-width="1"/>
  <line x1="-5" y1="15" x2="5" y2="15" stroke="#666" stroke-width="1"/>
  <line x1="-8" y1="25" x2="8" y2="25" stroke="#666" stroke-width="1"/>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">ДНК</text>
</g>

<!-- Organism (simple animal silhouette) -->
<g transform="translate(350,155)">
  <ellipse cx="0" cy="0" rx="22" ry="15" fill="#8D6E63" opacity="0.4" stroke="#5D4037" stroke-width="1.5"/>
  <circle cx="-20" cy="-5" r="9" fill="#8D6E63" opacity="0.4" stroke="#5D4037" stroke-width="1.5"/>
  <circle cx="-22" cy="-7" r="1.5" fill="#1B5E20"/>
  <!-- Legs -->
  <line x1="-8" y1="15" x2="-10" y2="28" stroke="#5D4037" stroke-width="2"/>
  <line x1="8" y1="15" x2="10" y2="28" stroke="#5D4037" stroke-width="2"/>
  <!-- Leaf on top (nature symbol) -->
  <path d="M0,-15 Q5,-25 0,-35 Q-5,-25 0,-15" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="42" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle" font-weight="bold">Организм</text>
</g>

<!-- Properties of living things - right side panel -->
<g transform="translate(440,75)">
  <rect x="-45" y="-20" width="90" height="225" rx="5" fill="white" opacity="0.85" stroke="#2E7D32" stroke-width="1"/>
  <text x="0" y="-6" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Свойства живого</text>
  <line x1="-35" y1="0" x2="35" y2="0" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Property items -->
  <circle cx="-30" cy="15" r="3" fill="#E91E63"/>
  <text x="-22" y="18" font-family="Arial,sans-serif" font-size="6" fill="#333">Обмен веществ</text>

  <circle cx="-30" cy="35" r="3" fill="#9C27B0"/>
  <text x="-22" y="38" font-family="Arial,sans-serif" font-size="6" fill="#333">Репродукция</text>

  <circle cx="-30" cy="55" r="3" fill="#2196F3"/>
  <text x="-22" y="58" font-family="Arial,sans-serif" font-size="6" fill="#333">Наследственность</text>

  <circle cx="-30" cy="75" r="3" fill="#4CAF50"/>
  <text x="-22" y="78" font-family="Arial,sans-serif" font-size="6" fill="#333">Изменчивость</text>

  <circle cx="-30" cy="95" r="3" fill="#FF9800"/>
  <text x="-22" y="98" font-family="Arial,sans-serif" font-size="6" fill="#333">Рост и развитие</text>

  <circle cx="-30" cy="115" r="3" fill="#F44336"/>
  <text x="-22" y="118" font-family="Arial,sans-serif" font-size="6" fill="#333">Раздражимость</text>

  <circle cx="-30" cy="135" r="3" fill="#00BCD4"/>
  <text x="-22" y="138" font-family="Arial,sans-serif" font-size="6" fill="#333">Движение</text>

  <circle cx="-30" cy="155" r="3" fill="#795548"/>
  <text x="-22" y="158" font-family="Arial,sans-serif" font-size="6" fill="#333">Гомеостаз</text>

  <circle cx="-30" cy="175" r="3" fill="#607D8B"/>
  <text x="-22" y="178" font-family="Arial,sans-serif" font-size="6" fill="#333">Ритмичность</text>
</g>

<!-- Methods section at bottom -->
<g transform="translate(30,280)">
  <rect x="0" y="0" width="380" height="45" rx="5" fill="white" opacity="0.85" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="190" y="14" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Методы биологии</text>
  <!-- Microscope icon -->
  <g transform="translate(30,28)">
    <rect x="-4" y="-8" width="8" height="12" rx="2" fill="#546E7A"/>
    <line x1="0" y1="-8" x2="0" y2="-14" stroke="#546E7A" stroke-width="2"/>
    <circle cx="0" cy="-16" r="4" fill="none" stroke="#1565C0" stroke-width="1.5"/>
    <text x="12" y="-4" font-family="Arial,sans-serif" font-size="5" fill="#333">Наблюдение</text>
  </g>
  <!-- Flask icon -->
  <g transform="translate(100,28)">
    <path d="M-3,-14 L-3,-6 L-8,4 L8,4 L3,-6 L3,-14 Z" fill="#FF9800" opacity="0.5" stroke="#E65100" stroke-width="0.8"/>
    <line x1="-4" y1="-14" x2="4" y2="-14" stroke="#E65100" stroke-width="1.5"/>
    <text x="12" y="-4" font-family="Arial,sans-serif" font-size="5" fill="#333">Эксперимент</text>
  </g>
  <!-- Comparison icon -->
  <g transform="translate(175,28)">
    <rect x="-8" y="-10" width="7" height="14" rx="1" fill="#4CAF50" opacity="0.5" stroke="#2E7D32" stroke-width="0.8"/>
    <rect x="1" y="-10" width="7" height="14" rx="1" fill="#2196F3" opacity="0.5" stroke="#1565C0" stroke-width="0.8"/>
    <text x="14" y="-4" font-family="Arial,sans-serif" font-size="5" fill="#333">Сравнение</text>
  </g>
  <!-- Model icon -->
  <g transform="translate(245,28)">
    <rect x="-8" y="-10" width="16" height="14" rx="1" fill="#9C27B0" opacity="0.3" stroke="#7B1FA2" stroke-width="0.8"/>
    <text x="0" y="-1" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2" text-anchor="middle">01</text>
    <text x="14" y="-4" font-family="Arial,sans-serif" font-size="5" fill="#333">Моделирование</text>
  </g>
  <!-- History icon -->
  <g transform="translate(325,28)">
    <circle cx="0" cy="-4" r="7" fill="none" stroke="#795548" stroke-width="1.2"/>
    <line x1="0" y1="-4" x2="0" y2="-9" stroke="#795548" stroke-width="1"/>
    <line x1="0" y1="-4" x2="4" y2="-2" stroke="#795548" stroke-width="1"/>
    <text x="12" y="-4" font-family="Arial,sans-serif" font-size="5" fill="#333">Исторический</text>
  </g>
</g>

<rect x="10" y="330" width="480" height="16" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="10" text-anchor="middle" fill="white" font-weight="bold">Биология 10 класс — Урок 1</text>
</svg>