<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#8B4513" stroke-width="3" rx="5"/>
  <rect x="20" y="20" width="460" height="310" fill="none" stroke="#A0522D" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#5D4037">ЛИТЕРАТУРА · 10 КЛАСС</text>
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#3E2723">А.С. Пушкин</text>
  <text x="40" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5D4037">Урок 12</text>
  
  <!-- Портрет Пушкина -->
  <g transform="translate(80, 90)">
    <circle cx="35" cy="35" r="32" fill="#F5DEB3" stroke="#8B4513" stroke-width="2"/>
    <circle cx="35" cy="25" r="12" fill="#3E2723"/>
    <path d="M35 35 Q35 45 45 50 Q55 45 55 35 Z" fill="#3E2723"/>
    <path d="M15 35 Q15 45 25 50 Q35 45 35 35 Z" fill="#3E2723"/>
    <ellipse cx="35" cy="40" rx="15" ry="10" fill="#FDBCB4"/>
    <path d="M35 50 Q30 55 25 55 Q20 55 20 50 Q25 52 30 53 Q35 52 40 53 Q45 52 50 50 Q50 55 45 55 Q40 55 35 50" fill="#D2691E"/>
    <text x="35" y="85" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#3E2723">А.С. Пушкин</text>
    <text x="35" y="100" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#5D4037">1799-1837</text>
  </g>
  
  <!-- Временная линия -->
  <g transform="translate(200, 110)">
    <line x1="0" y1="30" x2="250" y2="30" stroke="#8B4513" stroke-width="2"/>
    <circle cx="0" cy="30" r="5" fill="#8B4513"/>
    <circle cx="62.5" cy="30" r="5" fill="#8B4513"/>
    <circle cx="125" cy="30" r="5" fill="#8B4513"/>
    <circle cx="187.5" cy="30" r="5" fill="#8B4513"/>
    <circle cx="250" cy="30" r="5" fill="#8B4513"/>
    
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3E2723">1799</text>
    <text x="62.5" y="50" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3E2723">1820</text>
    <text x="125" y="50" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3E2723">1825</text>
    <text x="187.5" y="50" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3E2723">1830</text>
    <text x="250" y="50" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#3E2723">1837</text>
    
    <text x="125" y="15" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#5D4037">Жизненный путь</text>
  </g>
  
  <!-- Основные произведения -->
  <g transform="translate(50, 180)">
    <rect x="0" y="0" width="120" height="80" fill="#FFF8DC" stroke="#8B4513" stroke-width="1" rx="3"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#5D4037">Основные произведения</text>
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">"Евгений Онегин"</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">(роман в стихах)</text>
    
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">"Капитанская дочка"</text>
  </g>
  
  <g transform="translate(190, 180)">
    <rect x="0" y="0" width="120" height="80" fill="#FFF8DC" stroke="#8B4513" stroke-width="1" rx="3"/>
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">"Медный всадник"</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="9" fill="#5D4037">(поэма)</text>
    
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">"Борис Годунов"</text>
  </g>
  
  <!-- Темы творчества -->
  <g transform="translate(330, 180)">
    <rect x="0" y="0" width="120" height="80" fill="#F0E68C" stroke="#8B4513" stroke-width="1" rx="3"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#5D4037">Темы творчества</text>
    
    <circle cx="20" cy="40" r="8" fill="#CD853F"/>
    <text x="35" y="45" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">Свобода и судьба</text>
    
    <circle cx="20" cy="65" r="8" fill="#CD853F"/>
    <text x="35" y="70" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">Любовь</text>
  </g>
  
  <!-- Стихотворные строки -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="400" height="50" fill="#F5F5DC" stroke="#8B4513" stroke-width="1" rx="3"/>
    <text x="200" y="20" font-family="Arial, sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#3E2723">"Я помню чудное мгновенье: передо мной явилась ты,</text>
    <text x="200" y="35" font-family="Arial, sans-serif" font-size="10" font-style="italic" text-anchor="middle" fill="#3E2723">Как мимолетное виденье, как гений чистой красоты."</text>
    <text x="200" y="50" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#5D4037">("К Чаадаеву", 1818)</text>
  </g>
  
  <!-- Формула сонета -->
  <g transform="translate(320, 90)">
    <rect x="0" y="0" width="150" height="70" fill="#E6D3C3" stroke="#8B4513" stroke-width="1" rx="3"/>
    <text x="75" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#5D4037">Структура сонета</text>
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">Кватrain 1: ABBA</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">Кватrain 2: ABBA</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="10" fill="#3E2723">Терцет: CDC | DCD</text>
  </g>
  
  <!-- Графика влияния -->
  <g transform="translate(220, 40)">
    <circle cx="0" cy="0" r="15" fill="#D2691E"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Пушкин</text>
    
    <line x1="-15" y1="-15" x2="-35" y2="-35" stroke="#8B4513" stroke-width="2"/>
    <circle cx="-40" cy="-40" r="12" fill="#CD853F"/>
    <text x="-40" y="-35" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Ломоносов</text>
    
    <line x1="15" y1="-15" x2="35" y2="-35" stroke="#8B4513" stroke-width="2"/>
    <circle cx="40" cy="-40" r="12" fill="#CD853F"/>
    <text x="40" y="-35" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Байрон</text>
    
    <line x1="0" y1="15" x2="0" y2="35" stroke="#8B4513" stroke-width="2"/>
    <circle cx="0" cy="40" r="12" fill="#CD853F"/>
    <text x="0" y="45" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Жуковский</text>
  </g>
  
  <!-- Декоративные элементы -->
  <path d="M30 100 Q40 90 50 100" fill="none" stroke="#8B4513" stroke-width="1"/>
  <path d="M30 110 Q40 100 50 110" fill="none" stroke="#8B4513" stroke-width="1"/>
  <path d="M30 120 Q40 110 50 120" fill="none" stroke="#8B4513" stroke-width="1"/>
  
  <path d="M450 100 Q440 90 430 100" fill="none" stroke="#8B4513" stroke-width="1"/>
  <path d="M450 110 Q440 100 430 110" fill="none" stroke="#8B4513" stroke-width="1"/>
  <path d="M450 120 Q440 110 430 120" fill="none" stroke="#8B4513" stroke-width="1"/>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0522D;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0E68C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="180" y="160" width="10" height="40" fill="url(#grad1)"/>
  <rect x="310" y="160" width="10" height="40" fill="url(#grad1)"/>
</svg>