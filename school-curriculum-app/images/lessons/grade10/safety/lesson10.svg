<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов и паттернов -->
  <defs>
    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A2A2A;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="zebraStripes" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="10" height="20" fill="white"/>
      <rect x="10" width="10" height="20" fill="black"/>
    </pattern>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2C3E50" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#34495E" stroke-width="1" rx="3"/>
  
  <!-- Номер урока -->
  <text x="460" y="35" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50" text-anchor="end">Урок №12</text>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50" text-anchor="middle">ОБЖ · 10 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2C3E50" text-anchor="middle">Дорожная безопасность</text>
  
  <!-- Небо -->
  <rect x="0" y="70" width="500" height="100" fill="url(#skyGradient)"/>
  
  <!-- Здание -->
  <rect x="20" y="90" width="60" height="80" fill="#7F8C8D"/>
  <rect x="25" y="95" width="50" height="50" fill="#3498DB"/>
  <rect x="30" y="100" width="15" height="15" fill="white"/>
  <rect x="50" y="100" width="15" height="15" fill="white"/>
  <rect x="30" y="120" width="15" height="15" fill="white"/>
  <rect x="50" y="120" width="15" height="15" fill="white"/>
  
  <!-- Дорога -->
  <rect x="0" y="170" width="500" height="180" fill="url(#roadGradient)"/>
  
  <!-- Разметка дороги -->
  <line x1="0" y1="190" x2="500" y2="190" stroke="white" stroke-width="2" stroke-dasharray="20,10"/>
  <line x1="0" y1="210" x2="500" y2="210" stroke="white" stroke-width="2" stroke-dasharray="20,10"/>
  <line x1="0" y1="230" x2="500" y2="230" stroke="white" stroke-width="2" stroke-dasharray="20,10"/>
  <line x1="0" y1="250" x2="500" y2="250" stroke="white" stroke-width="2" stroke-dasharray="20,10"/>
  
  <!-- Пешеходный переход -->
  <rect x="180" y="170" width="140" height="50" fill="url(#zebraStripes)"/>
  
  <!-- Светофор -->
  <rect x="220" y="120" width="20" height="60" fill="#34495E"/>
  <circle cx="230" cy="130" r="8" fill="#E74C3C"/>
  <circle cx="230" cy="145" r="8" fill="#2ECC71"/>
  <circle cx="230" cy="160" r="8" fill="#F39C12"/>
  
  <!-- Пешеход 1 (зеленый сигнал) -->
  <g transform="translate(250, 190)">
    <circle cx="0" cy="-10" r="5" fill="#FDBCB4"/>
    <rect x="-5" y="-5" width="10" height="20" fill="#3498DB"/>
    <rect x="-5" y="15" width="4" height="15" fill="#2C3E50"/>
    <rect x="1" y="15" width="4" height="15" fill="#2C3E50"/>
    <text x="0" y="-20" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50" text-anchor="middle">Пешеход</text>
  </g>
  
  <!-- Автомобиль -->
  <g transform="translate(150, 200)">
    <rect x="-20" y="-10" width="40" height="20" fill="#E74C3C" rx="3"/>
    <rect x="-15" y="-5" width="15" height="10" fill="#3498DB" rx="2"/>
    <rect x="0" y="-5" width="15" height="10" fill="#3498DB" rx="2"/>
    <circle cx="-12" cy="8" r="4" fill="#2C3E50"/>
    <circle cx="12" cy="8" r="4" fill="#2C3E50"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50" text-anchor="middle">Автомобиль</text>
  </g>
  
  <!-- Тормозной путь -->
  <g transform="translate(350, 250)">
    <rect x="0" y="0" width="100" height="80" fill="white" stroke="#2C3E50" stroke-width="1" rx="5"/>
    <text x="50" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50" text-anchor="middle">Тормозной путь</text>
    <line x1="10" y1="50" x2="90" y2="50" stroke="#2C3E50" stroke-width="2"/>
    <line x1="10" y1="30" x2="90" y2="30" stroke="#E74C3C" stroke-width="2"/>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50" text-anchor="middle">60 км/ч — 20-40 м</text>
  </g>
  
  <!-- Правила для пешеходов -->
  <g transform="translate(30, 250)">
    <rect x="0" y="0" width="120" height="80" fill="white" stroke="#2C3E50" stroke-width="1" rx="5"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50" text-anchor="middle">Правила</text>
    <text x="5" y="35" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">1. Переходить по</text>
    <text x="5" y="47" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">   переходу</text>
    <text x="5" y="59" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">2. На зелёный</text>
    <text x="5" y="71" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">   сигнал</text>
  </g>
  
  <!-- Дополнительные правила -->
  <g transform="translate(160, 250)">
    <rect x="0" y="0" width="120" height="80" fill="white" stroke="#2C3E50" stroke-width="1" rx="5"/>
    <text x="60" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50" text-anchor="middle">Дополнительно</text>
    <text x="5" y="35" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">3. Убедиться в</text>
    <text x="5" y="47" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">   безопасности</text>
    <text x="5" y="59" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">4. Не выходить из-за</text>
    <text x="5" y="71" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">   препятствия</text>
  </g>
  
  <!-- Велосипедист -->
  <g transform="translate(380, 210)">
    <circle cx="0" cy="-10" r="4" fill="#FDBCB4"/>
    <rect x="-3" y="-6" width="6" height="15" fill="#9B59B6"/>
    <line x1="-3" y1="-3" x2="-15" y2="5" stroke="#2C3E50" stroke-width="2"/>
    <line x1="3" y1="-3" x2="15" y2="5" stroke="#2C3E50" stroke-width="2"/>
    <circle cx="-10" cy="10" r="5" fill="none" stroke="#2C3E50" stroke-width="1"/>
    <circle cx="10" cy="10" r="5" fill="none" stroke="#2C3E50" stroke-width="1"/>
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50" text-anchor="middle">Велосипедист</text>
  </g>
  
  <!-- Правило для велосипедистов -->
  <g transform="translate(300, 300)">
    <rect x="0" y="0" width="150" height="40" fill="white" stroke="#2C3E50" stroke-width="1" rx="5"/>
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50" text-anchor="middle">До 14 лет — только по</text>
    <text x="75" y="28" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50" text-anchor="middle">тротуарам и велодорожкам</text>
  </g>
  
  <!-- Предупреждающий знак -->
  <g transform="translate(440, 90)">
    <polygon points="0,20 -17.32,-10 17.32,-10" fill="#F1C40F" stroke="#2C3E50" stroke-width="1"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50" text-anchor="middle">!</text>
  </g>
  
  <!-- Стрелки для иллюстрации -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
  </defs>
  
  <!-- Стрелка тормозного пути -->
  <line x1="150" y1="200" x2="80" y2="200" stroke="#E74C3C" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Дополнительные элементы для детализации -->
  <circle cx="30" cy="120" r="3" fill="#F39C12"/>
  <circle cx="470" cy="120" r="3" fill="#F39C12"/>
  <circle cx="250" cy="80" r="3" fill="#F39C12"/>
</svg>