<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="3" rx="10"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498db" stroke-width="1" rx="8" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">ОБЖ · 10 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495e">Первая помощь при кровотечениях и травмах</text>
  
  <!-- Номер урока -->
  <text x="470" y="30" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Урок №12</text>
  
  <!-- Разделитель -->
  <line x1="30" y1="70" x2="470" y2="70" stroke="#bdc3c7" stroke-width="1"/>
  <text x="250" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e74c3c">Виды кровотечений:</text>
  
  <!-- Артериальное кровотечение -->
  <g transform="translate(30, 110)">
    <!-- Заголовок -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">Артериальное</text>
    
    <!-- Иконка руки -->
    <ellipse cx="20" cy="25" rx="8" ry="12" fill="#fdbcb4"/>
    <rect x="16" y="10" width="8" height="20" fill="#fdbcb4"/>
    <rect x="14" y="8" width="12" height="4" fill="#fdbcb4" rx="2"/>
    
    <!-- Рана с артериальным кровотечением -->
    <ellipse cx="20" cy="30" rx="3" ry="2" fill="#e74c3c"/>
    <path d="M 20 30 Q 30 25, 35 30" fill="none" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
    
    <!-- Жгут -->
    <rect x="10" y="15" width="20" height="3" fill="#34495e" rx="1"/>
    <line x1="10" y1="16.5" x2="30" y2="16.5" stroke="#ecf0f1" stroke-width="0.5"/>
    <line x1="10" y1="17.5" x2="30" y2="17.5" stroke="#ecf0f1" stroke-width="0.5"/>
    
    <!-- Ткань под жгут -->
    <rect x="12" y="13" width="16" height="2" fill="#ecf0f1" opacity="0.7" rx="1"/>
    
    <!-- Метка времени -->
    <rect x="5" y="5" width="30" height="15" fill="#3498db" rx="2"/>
    <text x="20" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">2ч/1ч</text>
    
    <!-- Стрелка вверх -->
    <path d="M 20 40 L 20 45 M 17 42 L 20 45 L 23 42" stroke="#2c3e50" stroke-width="1.5" fill="none"/>
    
    <!-- Текст с правилами -->
    <text x="50" y="10" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Жгут выше раны на 5-10 см</text>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Подложить ткань под жгут</text>
    <text x="50" y="40" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Записать время наложения</text>
    <text x="50" y="55" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Летом: не более 2 часов</text>
    <text x="50" y="70" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Зимой: не более 1 часа</text>
  </g>
  
  <!-- Венозное кровотечение -->
  <g transform="translate(250, 110)">
    <!-- Заголовок -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8e44ad">Венозное</text>
    
    <!-- Иконка руки -->
    <ellipse cx="20" cy="25" rx="8" ry="12" fill="#fdbcb4"/>
    <rect x="16" y="10" width="8" height="20" fill="#fdbcb4"/>
    <rect x="14" y="8" width="12" height="4" fill="#fdbcb4" rx="2"/>
    
    <!-- Рана с венозным кровотечением -->
    <ellipse cx="20" cy="30" rx="3" ry="2" fill="#8e44ad"/>
    <path d="M 20 30 Q 30 32, 35 35" fill="none" stroke="#8e44ad" stroke-width="2"/>
    
    <!-- Давящая повязка -->
    <rect x="10" y="15" width="20" height="3" fill="#e67e22" rx="1"/>
    <circle cx="20" cy="16.5" r="3" fill="none" stroke="#f39c12" stroke-width="1"/>
    
    <!-- Стрелка вверх -->
    <path d="M 20 40 L 20 45 M 17 42 L 20 45 L 23 42" stroke="#2c3e50" stroke-width="1.5" fill="none"/>
    
    <!-- Возвышенное положение -->
    <rect x="5" y="5" width="30" height="10" fill="#3498db" opacity="0.3"/>
    <path d="M 5 10 L 10 5 L 15 10 L 20 5 L 25 10 L 30 5 L 35 10" stroke="#3498db" stroke-width="1" fill="none"/>
    
    <!-- Текст с правилами -->
    <text x="50" y="10" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Давящая повязка</text>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Возвышенное положение</text>
    <text x="50" y="40" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">конечности</text>
  </g>
  
  <!-- Капиллярное кровотечение -->
  <g transform="translate(30, 230)">
    <!-- Заголовок -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#16a085">Капиллярное</text>
    
    <!-- Иконка руки -->
    <ellipse cx="20" cy="25" rx="8" ry="12" fill="#fdbcb4"/>
    <rect x="16" y="10" width="8" height="20" fill="#fdbcb4"/>
    <rect x="14" y="8" width="12" height="4" fill="#fdbcb4" rx="2"/>
    
    <!-- Рана с капиллярным кровотечением -->
    <ellipse cx="20" cy="30" rx="3" ry="2" fill="#16a085"/>
    <circle cx="25" cy="32" r="1" fill="#16a085"/>
    <circle cx="28" cy="33" r="1" fill="#16a085"/>
    
    <!-- Бинтовая повязка -->
    <rect x="10" y="15" width="20" height="3" fill="#27ae60" rx="1"/>
    <path d="M 10 15 L 30 15 L 25 18 L 15 18 Z" fill="#2ecc71" opacity="0.7"/>
    
    <!-- Текст с правилами -->
    <text x="50" y="10" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Наложение асептической</text>
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">повязки</text>
    <text x="50" y="40" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Прекращается само</text>
    <text x="50" y="55" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">через 5-10 минут</text>
  </g>
  
  <!-- Сравнительная таблица -->
  <g transform="translate(250, 210)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Сравнение кровотечений</text>
    
    <!-- Таблица -->
    <rect x="0" y="10" width="200" height="100" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    
    <!-- Заголовки столбцов -->
    <rect x="0" y="10" width="66" height="20" fill="#3498db"/>
    <rect x="67" y="10" width="66" height="20" fill="#9b59b6"/>
    <rect x="134" y="10" width="66" height="20" fill="#16a085"/>
    
    <text x="33" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Артериальное</text>
    <text x="100" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Венозное</text>
    <text x="167" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">Капиллярное</text>
    
    <!-- Строка 1 -->
    <text x="5" y="45" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Цвет:</text>
    <circle cx="33" cy="42" r="3" fill="#e74c3c"/>
    <circle cx="100" cy="42" r="3" fill="#8e44ad"/>
    <circle cx="167" cy="42" r="3" fill="#16a085"/>
    
    <!-- Строка 2 -->
    <text x="5" y="65" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Течение:</text>
    <text x="33" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Фонтан</text>
    <text x="100" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Постоянно</text>
    <text x="167" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Каплями</text>
    
    <!-- Строка 3 -->
    <text x="5" y="85" font-family="Arial, sans-serif" font-size="8" fill="#2c3e50">Опасность:</text>
    <text x="33" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#e74c3c">Высокая</text>
    <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#f39c12">Средняя</text>
    <text x="167" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#27ae60">Низкая</text>
  </g>
  
  <!-- Опасность шкала -->
  <g transform="translate(30, 330)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Уровень опасности:</text>
    <rect x="70" y="-10" width="40" height="10" fill="#e74c3c"/>
    <text x="90" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Критическая</text>
    <rect x="110" y="-10" width="40" height="10" fill="#f39c12"/>
    <text x="130" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Высокая</text>
    <rect x="150" y="-10" width="40" height="10" fill="#27ae60"/>
    <text x="170" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="white">Низкая</text>
  </g>
  
  <!-- Определение -->
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Кровотечение — истечение крови из сосудов</text>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#e74c3c"/>
    </marker>
  </defs>
</svg>