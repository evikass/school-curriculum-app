<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="alertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcc00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:1" />
    </linearGradient>
    <pattern id="diagonalHatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" style="stroke:#ff6b00; stroke-width:0.5"/>
    </pattern>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c5aa0" stroke-width="3" rx="5" />
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#2c5aa0" stroke-width="1" rx="3" />
  
  <!-- "ОБЖ · 10 КЛАСС" -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c5aa0">ОБЖ · 10 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#2c5aa0">Урок №12</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2c5aa0">Причины пожаров и профилактика</text>
  
  <!-- Разделитель -->
  <line x1="50" y1="70" x2="450" y2="70" stroke="#2c5aa0" stroke-width="2" />
  
  <!-- Основные причины пожаров -->
  <text x="50" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c5aa0">Основные причины пожаров:</text>
  
  <!-- Иконка огня -->
  <path d="M70,105 Q75,110 75,120 Q75,130 65,135 Q55,130 55,120 Q55,110 60,105 L62,105 Q63,108 65,110 Q67,108 68,105 Z" fill="url(#fireGrad)" />
  <path d="M65,110 Q68,115 68,120 Q68,125 65,127 Q62,125 62,120 Q62,115 65,110 Z" fill="#ff6b00" />
  
  <!-- Неосторожное обращение с огнём -->
  <circle cx="90" cy="115" r="15" fill="none" stroke="#ff6b00" stroke-width="2" />
  <text x="90" y="120" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ff6b00">1</text>
  <text x="115" y="120" font-family="Arial, sans-serif" font-size="12" fill="#333">Неосторожное обращение с огнём</text>
  
  <!-- Неисправная электропроводка -->
  <circle cx="90" cy="140" r="15" fill="none" stroke="#ff6b00" stroke-width="2" />
  <text x="90" y="145" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ff6b00">2</text>
  <text x="115" y="145" font-family="Arial, sans-serif" font-size="12" fill="#333">Неисправная электропроводка</text>
  
  <!-- Нарушение правил эксплуатации электроприборов -->
  <circle cx="90" cy="165" r="15" fill="none" stroke="#ff6b00" stroke-width="2" />
  <text x="90" y="170" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ff6b00">3</text>
  <text x="115" y="170" font-family="Arial, sans-serif" font-size="12" fill="#333">Нарушение правил эксплуатации электроприборов</text>
  
  <!-- Детские шалости с огнём -->
  <circle cx="90" cy="190" r="15" fill="none" stroke="#ff6b00" stroke-width="2" />
  <text x="90" y="195" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ff6b00">4</text>
  <text x="115" y="195" font-family="Arial, sans-serif" font-size="12" fill="#333">Детские шалости с огнём</text>
  
  <!-- Курение в неположенных местах -->
  <circle cx="90" cy="215" r="15" fill="none" stroke="#ff6b00" stroke-width="2" />
  <text x="90" y="220" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ff6b00">5</text>
  <text x="115" y="220" font-family="Arial, sans-serif" font-size="12" fill="#333">Курение в неположенных местах</text>
  
  <!-- Нарушение правил пожарной безопасности -->
  <circle cx="90" cy="240" r="15" fill="none" stroke="#ff6b00" stroke-width="2" />
  <text x="90" y="245" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ff6b00">6</text>
  <text x="115" y="245" font-family="Arial, sans-serif" font-size="12" fill="#333">Нарушение правил пожарной безопасности</text>
  
  <!-- График причин пожаров -->
  <text x="350" y="120" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c5aa0">Статистика причин пожаров</text>
  
  <!-- Ось Y -->
  <line x1="300" y1="130" x2="300" y2="250" stroke="#333" stroke-width="1" />
  <!-- Ось X -->
  <line x1="300" y1="250" x2="420" y2="250" stroke="#333" stroke-width="1" />
  
  <!-- Деления оси Y -->
  <line x1="295" y1="140" x2="300" y2="140" stroke="#333" stroke-width="1" />
  <line x1="295" y1="170" x2="300" y2="170" stroke="#333" stroke-width="1" />
  <line x1="295" y1="200" x2="300" y2="200" stroke="#333" stroke-width="1" />
  <line x1="295" y1="230" x2="300" y2="230" stroke="#333" stroke-width="1" />
  
  <!-- Значения оси Y -->
  <text x="290" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#333">40%</text>
  <text x="290" y="175" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#333">30%</text>
  <text x="290" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#333">20%</text>
  <text x="290" y="235" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#333">10%</text>
  <text x="290" y="255" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#333">0%</text>
  
  <!-- Столбцы графика -->
  <rect x="310" y="180" width="20" height="70" fill="#ff6b00" opacity="0.8" />
  <rect x="335" y="160" width="20" height="90" fill="#ff9500" opacity="0.8" />
  <rect x="360" y="190" width="20" height="60" fill="#ffcc00" opacity="0.8" />
  <rect x="385" y="210" width="20" height="40" fill="#ffb700" opacity="0.8" />
  <rect x="410" y="220" width="20" height="30" fill="#ffc107" opacity="0.8" />
  
  <!-- Подписи столбцов -->
  <text x="320" y="265" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">1</text>
  <text x="345" y="265" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">2</text>
  <text x="370" y="265" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">3</text>
  <text x="395" y="265" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">4</text>
  <text x="420" y="265" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">5</text>
  
  <!-- Разделитель -->
  <line x1="50" y1="275" x2="450" y2="275" stroke="#2c5aa0" stroke-width="2" />
  
  <!-- Меры профилактики -->
  <text x="50" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c5aa0">Меры профилактики:</text>
  
  <!-- Иконка предупреждения -->
  <path d="M70,305 L80,305 L75,295 Z" fill="url(#alertGrad)" />
  <text x="75" y="302" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">!</text>
  
  <!-- Мера профилактики -->
  <text x="90" y="310" font-family="Arial, sans-serif" font-size="12" fill="#333">Не оставлять без присмотра включённые электроприборы</text>
  
  <!-- Схема безопасного поведения -->
  <text x="50" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c5aa0">При обнаружении возгорания:</text>
  
  <!-- Схема -->
  <circle cx="150" cy="325" r="15" fill="none" stroke="#ff6b00" stroke-width="2" />
  <text x="150" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ff6b00">1</text>
  <text x="170" y="330" font-family="Arial, sans-serif" font-size="11" fill="#333">Сообщить</text>
  
  <path d="M190,325 L210,325" stroke="#ff6b00" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <circle cx="230" cy="325" r="15" fill="none" stroke="#ff6b00" stroke-width="2" />
  <text x="230" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ff6b00">2</text>
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="11" fill="#333">Эвакуироваться</text>
  
  <!-- Стрелка -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b00" />
    </marker>
  </defs>
  
  <!-- Дополнительные элементы для увеличения размера -->
  <rect x="320" y="290" width="120" height="50" fill="none" stroke="#2c5aa0" stroke-width="1" rx="5" />
  <text x="380" y="310" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c5aa0">Телефон экстренных</text>
  <text x="380" y="325" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c5aa0">служб:</text>
  <text x="380" y="340" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#ff6b00">101</text>
  
  <!-- Формула скорости распространения огня -->
  <text x="50" y="80" font-family="Arial, sans-serif" font-size="10" fill="#666">V = k·S</text>
  <text x="80" y="80" font-family="Arial, sans-serif" font-size="8" fill="#666">где V - скорость распространения, k - коэффициент, S - площадь</text>
</svg>