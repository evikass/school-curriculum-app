<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Фоновый градиент -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004499;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f3f5;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#0066cc" stroke-width="2" rx="8"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#0066cc" stroke-width="1" rx="5" opacity="0.5"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="bold">АНГЛИЙСКИЙ · 10 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="24" fill="url(#titleGrad)" text-anchor="middle" font-weight="bold">Урок 2: Passive Voice</text>
  
  <!-- Номер урока в углу -->
  <text x="460" y="35" font-family="Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="end">№2</text>
  
  <!-- Основная коробка с определением -->
  <rect x="40" y="85" width="420" height="50" rx="5" fill="url(#boxGrad)" stroke="#0066cc" stroke-width="1" filter="url(#shadow)"/>
  <text x="250" y="115" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Страдательный залог (Passive Voice) - конструкция, где действие</text>
  <text x="250" y="130" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">применяется к объекту, а не к субъекту</text>
  
  <!-- Схема преобразования Active to Passive -->
  <text x="250" y="165" font-family="Arial, sans-serif" font-size="16" fill="#0066cc" text-anchor="middle" font-weight="bold">Преобразование Active → Passive</text>
  
  <!-- Active Voice Box -->
  <rect x="40" y="180" width="100" height="60" rx="5" fill="#e3f2fd" stroke="#0066cc" stroke-width="1"/>
  <text x="90" y="205" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Active Voice</text>
  <text x="90" y="225" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Subject + Verb + Object</text>
  
  <!-- Стрелка преобразования -->
  <line x1="150" y1="210" x2="200" y2="210" stroke="#0066cc" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="175" y="205" font-family="Arial, sans-serif" font-size="12" fill="#0066cc" text-anchor="middle">→</text>
  
  <!-- Passive Voice Box -->
  <rect x="210" y="180" width="100" height="60" rx="5" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
  <text x="260" y="205" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Passive Voice</text>
  <text x="260" y="225" font-family="Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Object + be + V3 + by + Subject</text>
  
  <!-- Пример преобразования -->
  <text x="370" y="200" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="start">Tom writes a letter.</text>
  <text x="370" y="215" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="start">↓</text>
  <text x="370" y="230" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="start">A letter is written by Tom.</text>
  
  <!-- Формы Passive Voice -->
  <text x="250" y="270" font-family="Arial, sans-serif" font-size="16" fill="#0066cc" text-anchor="middle" font-weight="bold">Формы Passive Voice</text>
  
  <!-- Present Simple Passive -->
  <rect x="30" y="285" width="110" height="40" rx="5" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
  <text x="85" y="305" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Present Simple</text>
  <text x="85" y="320" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">am/is/are + V3</text>
  
  <!-- Past Simple Passive -->
  <rect x="150" y="285" width="110" height="40" rx="5" fill="#fce4ec" stroke="#e91e63" stroke-width="1"/>
  <text x="205" y="305" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Past Simple</text>
  <text x="205" y="320" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">was/were + V3</text>
  
  <!-- Future Simple Passive -->
  <rect x="270" y="285" width="110" height="40" rx="5" fill="#e1f5fe" stroke="#03a9f4" stroke-width="1"/>
  <text x="325" y="305" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Future Simple</text>
  <text x="325" y="320" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">will be + V3</text>
  
  <!-- Perfect Passive -->
  <rect x="390" y="285" width="110" height="40" rx="5" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
  <text x="445" y="305" font-family="Arial, sans-serif" font-size="12" fill="#333" text-anchor="middle">Perfect</text>
  <text x="445" y="320" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">have/has been + V3</text>
  
  <!-- Особенности использования Passive -->
  <text x="250" y="345" font-family="Arial, sans-serif" font-size="14" fill="#0066cc" text-anchor="middle" font-weight="bold">Особенности применения в речи</text>
  
  <!-- Маркер для стрелки -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
  </defs>
  
  <!-- Дополнительные элементы для увеличения размера -->
  <circle cx="30" cy="210" r="3" fill="#0066cc"/>
  <circle cx="200" cy="210" r="3" fill="#0066cc"/>
  <circle cx="320" cy="210" r="3" fill="#4caf50"/>
  <rect x="40" y="170" width="4" height="80" fill="#0066cc" opacity="0.2"/>
  <rect x="460" y="170" width="4" height="80" fill="#4caf50" opacity="0.2"/>
  
  <!-- Разделительные линии -->
  <line x1="40" y1="175" x2="460" y2="175" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="40" y1="275" x2="460" y2="275" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Декоративные элементы -->
  <path d="M 50 100 Q 60 95 70 100" stroke="#0066cc" stroke-width="1" fill="none"/>
  <path d="M 430 100 Q 440 95 450 100" stroke="#0066cc" stroke-width="1" fill="none"/>
  
  <!-- Точки для украшения -->
  <circle cx="50" cy="100" r="2" fill="#0066cc"/>
  <circle cx="70" cy="100" r="2" fill="#0066cc"/>
  <circle cx="430" cy="100" r="2" fill="#0066cc"/>
  <circle cx="450" cy="100" r="2" fill="#0066cc"/>
</svg>