<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#3498db" stroke-width="1" rx="3"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">АНГЛИЙСКИЙ · 10 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="450" y="35" text-anchor="end" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">Урок 1</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">Времена группы Perfect</text>
  
  <!-- Градиенты для элементов -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Present Perfect секция -->
  <rect x="30" y="80" width="140" height="60" fill="url(#grad1)" rx="5"/>
  <text x="100" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Present Perfect</text>
  
  <!-- Present Perfect формула -->
  <text x="100" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">have/has + V³</text>
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">(V³ - третье форма глагола)</text>
  
  <!-- Present Perfect примеры -->
  <text x="30" y="200" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• I have finished my homework.</text>
  <text x="30" y="215" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• She has lived here for 5 years.</text>
  
  <!-- Past Perfect секция -->
  <rect x="180" y="80" width="140" height="60" fill="url(#grad2)" rx="5"/>
  <text x="250" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Past Perfect</text>
  
  <!-- Past Perfect формула -->
  <text x="250" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">had + V³</text>
  <text x="250" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">(V³ - третье форма глагола)</text>
  
  <!-- Past Perfect примеры -->
  <text x="180" y="200" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• I had finished before he came.</text>
  <text x="180" y="215" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• She had lived there for years.</text>
  
  <!-- Future Perfect секция -->
  <rect x="330" y="80" width="140" height="60" fill="url(#grad3)" rx="5"/>
  <text x="400" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Future Perfect</text>
  
  <!-- Future Perfect формула -->
  <text x="400" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50">will have + V³</text>
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">(V³ - третье форма глагола)</text>
  
  <!-- Future Perfect примеры -->
  <text x="330" y="200" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• I will have finished by 5 PM.</text>
  <text x="330" y="215" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">• She will have lived there for 10 years.</text>
  
  <!-- Таймлайн Perfect времен -->
  <line x1="50" y1="250" x2="450" y2="250" stroke="#95a5a6" stroke-width="2"/>
  
  <!-- Тайммаркеры -->
  <circle cx="100" cy="250" r="8" fill="#3498db"/>
  <text x="100" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Настоящее</text>
  
  <circle cx="250" cy="250" r="8" fill="#e74c3c"/>
  <text x="250" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Прошлое</text>
  
  <circle cx="400" cy="250" r="8" fill="#2ecc71"/>
  <text x="400" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Будущее</text>
  
  <!-- Сравнительная таблица -->
  <rect x="30" y="290" width="440" height="40" fill="url(#grad4)" rx="5" opacity="0.3"/>
  <text x="250" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Perfect времена показывают завершенность действия до определенного момента времени</text>
  
  <!-- Дополнительные элементы для декора -->
  <polygon points="45,95 50,90 55,95" fill="#3498db"/>
  <polygon points="195,95 200,90 205,95" fill="#e74c3c"/>
  <polygon points="345,95 350,90 355,95" fill="#2ecc71"/>
  
  <!-- Стрелки между временами -->
  <path d="M 175 110 L 175 110" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
  <path d="M 325 110 L 325 110" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
  
  <!-- Ключевые термины -->
  <text x="50" y="240" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Действия, завершенные к настоящему моменту</text>
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Действия, завершенные до другого действия в прошлом</text>
  <text x="330" y="240" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">Действия, которые будут завершены к определенному моменту в будущем</text>
  
  <!-- Дополнительные схемы -->
  <rect x="30" y="70" width="440" height="2" fill="#ecf0f1"/>
  <rect x="30" y="230" width="440" height="2" fill="#ecf0f1"/>
  <rect x="30" y="285" width="440" height="2" fill="#ecf0f1"/>
  
  <!-- Вспомогательные элементы -->
  <circle cx="25" cy="250" r="3" fill="#95a5a6"/>
  <circle cx="475" cy="250" r="3" fill="#95a5a6"/>
</svg>