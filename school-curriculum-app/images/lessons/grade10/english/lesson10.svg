<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#3A5A80" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#5A8AB0" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1E3A5F">АНГЛИЙСКИЙ · 10 КЛАСС</text>
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2C5282">Урок 10: Discussion Skills</text>
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="end" fill="#4A6FA5">№10</text>
  
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5A8AB0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A5A80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD166;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9F1C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Схема дискуссии -->
  <rect x="30" y="80" width="200" height="120" fill="none" stroke="#3A5A80" stroke-width="2" rx="5"/>
  <text x="130" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E3A5F">Структура дискуссии</text>
  
  <!-- Элементы схемы дискуссии -->
  <circle cx="60" cy="120" r="15" fill="#FFD166" stroke="#3A5A80" stroke-width="1"/>
  <text x="60" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1E3A5F">1</text>
  <text x="130" y="125" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2C5282">Введение темы</text>
  
  <circle cx="60" cy="150" r="15" fill="#FFD166" stroke="#3A5A80" stroke-width="1"/>
  <text x="60" y="155" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1E3A5F">2</text>
  <text x="130" y="155" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2C5282">Высказывание мнений</text>
  
  <circle cx="60" cy="180" r="15" fill="#FFD166" stroke="#3A5A80" stroke-width="1"/>
  <text x="60" y="185" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1E3A5F">3</text>
  <text x="130" y="185" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2C5282">Обсуждение</text>
  
  <!-- Фразы для выражения мнений -->
  <rect x="270" y="80" width="200" height="120" fill="none" stroke="#3A5A80" stroke-width="2" rx="5"/>
  <text x="370" y="100" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E3A5F">Выражение мнений</text>
  
  <!-- Элементы фраз -->
  <rect x="285" y="110" width="170" height="18" fill="url(#grad1)" rx="3"/>
  <text x="370" y="123" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">I think that...</text>
  
  <rect x="285" y="135" width="170" height="18" fill="url(#grad1)" rx="3"/>
  <text x="370" y="148" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">In my opinion...</text>
  
  <rect x="285" y="160" width="170" height="18" fill="url(#grad1)" rx="3"/>
  <text x="370" y="173" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">From my point of view...</text>
  
  <!-- Схема аргументации -->
  <rect x="30" y="220" width="200" height="100" fill="none" stroke="#3A5A80" stroke-width="2" rx="5"/>
  <text x="130" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E3A5F">Структура аргумента</text>
  
  <!-- Треугольник аргументации -->
  <polygon points="130,250 100,280 160,280" fill="#FFD166" stroke="#3A5A80" stroke-width="1"/>
  <text x="130" y="270" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#1E3A5F">Тезис</text>
  
  <rect x="50" y="290" width="160" height="20" fill="#5A8AB0" rx="3"/>
  <text x="130" y="303" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Доказательства + Примеры</text>
  
  <!-- Формулы вежливого несогласия -->
  <rect x="270" y="220" width="200" height="100" fill="none" stroke="#3A5A80" stroke-width="2" rx="5"/>
  <text x="370" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1E3A5F">Вежливое несогласие</text>
  
  <!-- Формулы -->
  <text x="280" y="260" font-family="Arial, sans-serif" font-size="10" fill="#2C5282">I see your point, but...</text>
  <text x="280" y="275" font-family="Arial, sans-serif" font-size="10" fill="#2C5282">I understand what you mean,</text>
  <text x="290" y="288" font-family="Arial, sans-serif" font-size="10" fill="#2C5282">however...</text>
  <text x="280" y="303" font-family="Arial, sans-serif" font-size="10" fill="#2C5282">That's interesting, but I think...</text>
  
  <!-- График активного слушания -->
  <rect x="30" y="80" width="40" height="200" fill="none" stroke="#3A5A80" stroke-width="1"/>
  <line x1="30" y1="280" x2="70" y2="280" stroke="#3A5A80" stroke-width="1"/>
  <line x1="30" y1="280" x2="30" y2="80" stroke="#3A5A80" stroke-width="1"/>
  
  <text x="50" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1E3A5F">0%</text>
  <text x="50" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1E3A5F">100%</text>
  <text x="25" y="180" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1E3A5F" transform="rotate(-90, 25, 180)">Эффективность</text>
  
  <rect x="30" y="240" width="40" height="40" fill="url(#grad2)" opacity="0.7"/>
  <text x="85" y="265" font-family="Arial, sans-serif" font-size="9" fill="#1E3A5F">Слушание</text>
  
  <rect x="30" y="200" width="40" height="40" fill="#3A5A80" opacity="0.7"/>
  <text x="85" y="225" font-family="Arial, sans-serif" font-size="9" fill="#1E3A5F">Понимание</text>
  
  <rect x="30" y="160" width="40" height="40" fill="#5A8AB0" opacity="0.7"/>
  <text x="85" y="185" font-family="Arial, sans-serif" font-size="9" fill="#1E3A5F">Анализ</text>
  
  <rect x="30" y="120" width="40" height="40" fill="#FF9F1C" opacity="0.7"/>
  <text x="85" y="145" font-family="Arial, sans-serif" font-size="9" fill="#1E3A5F">Ответ</text>
  
  <!-- Ключевые термины -->
  <circle cx="350" cy="340" r="20" fill="#FFD166" stroke="#3A5A80" stroke-width="1"/>
  <text x="350" y="345" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#1E3A5F">КЛЮЧ</text>
  
  <text x="380" y="340" font-family="Arial, sans-serif" font-size="9" fill="#2C5282">Discussion</text>
  <text x="380" y="352" font-family="Arial, sans-serif" font-size="9" fill="#2C5282">Argument</text>
  <text x="380" y="364" font-family="Arial, sans-serif" font-size="9" fill="#2C5282">Opinion</text>
  
  <!-- Декоративные элементы -->
  <path d="M450,90 Q460,100 450,110" stroke="#FF9F1C" stroke-width="2" fill="none"/>
  <path d="M450,110 Q440,120 450,130" stroke="#FF9F1C" stroke-width="2" fill="none"/>
  <path d="M450,130 Q460,140 450,150" stroke="#FF9F1C" stroke-width="2" fill="none"/>
  
  <circle cx="40" y="40" r="5" fill="#FFD166"/>
  <circle cx="460" y="40" r="5" fill="#FFD166"/>
  <circle cx="40" y="310" r="5" fill="#FFD166"/>
  <circle cx="460" y="310" r="5" fill="#FFD166"/>
</svg>