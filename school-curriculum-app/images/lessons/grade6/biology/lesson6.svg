<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="assimGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8E6C9"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
<linearGradient id="dissimGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFCCBC"/><stop offset="100%" stop-color="#FF5722"/></linearGradient>
<linearGradient id="atpGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FFD54F"/><stop offset="100%" stop-color="#FFC107"/></linearGradient>
<linearGradient id="energyGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF176"/><stop offset="100%" stop-color="#FFD54F"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Обмен веществ и энергообмен</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 6</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Central metabolism diagram -->
<!-- Assimilation (left side) - green/upward -->
<g transform="translate(130,160)">
  <rect x="-65" y="-55" width="130" height="110" rx="10" fill="url(#assimGrad)" opacity="0.2" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="0" y="-40" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">АССИМИЛЯЦИЯ</text>
  <text x="0" y="-28" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">(пластический обмен)</text>
  
  <!-- Building up arrow -->
  <polygon points="0,-15 -10,5 -4,5 -4,20 4,20 4,5 10,5" fill="#4CAF50" opacity="0.6"/>
  
  <!-- Input substances -->
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Простые вещества</text>
  <text x="-40" y="42" font-family="Arial,sans-serif" font-size="6" fill="#666">H₂O</text>
  <text x="-10" y="42" font-family="Arial,sans-serif" font-size="6" fill="#666">CO₂</text>
  <text x="25" y="42" font-family="Arial,sans-serif" font-size="6" fill="#666">NH₃</text>
  
  <!-- Output - complex substances -->
  <text x="0" y="-18" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Сложные вещества</text>
  
  <!-- Energy consumed -->
  <text x="0" y="52" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Энергия + АТФ</text>
</g>

<!-- Dissimilation (right side) - red/downward -->
<g transform="translate(370,160)">
  <rect x="-65" y="-55" width="130" height="110" rx="10" fill="url(#dissimGrad)" opacity="0.15" stroke="#BF360C" stroke-width="1.5"/>
  <text x="0" y="-40" font-family="Arial,sans-serif" font-size="9" fill="#BF360C" text-anchor="middle" font-weight="bold">ДИССИМИЛЯЦИЯ</text>
  <text x="0" y="-28" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">(энергетический обмен)</text>
  
  <!-- Breaking down arrow -->
  <polygon points="0,20 -10,0 -4,0 -4,-15 4,-15 4,0 10,0" fill="#FF5722" opacity="0.5"/>
  
  <!-- Input - complex substances -->
  <text x="0" y="-18" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Сложные вещества</text>
  
  <!-- Output substances -->
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Простые вещества</text>
  <text x="-40" y="42" font-family="Arial,sans-serif" font-size="6" fill="#666">H₂O</text>
  <text x="-10" y="42" font-family="Arial,sans-serif" font-size="6" fill="#666">CO₂</text>
  <text x="25" y="42" font-family="Arial,sans-serif" font-size="6" fill="#666">NH₃</text>
  
  <!-- Energy released -->
  <text x="0" y="52" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Энергия → АТФ</text>
</g>

<!-- Connecting arrows between assimilation and dissimilation -->
<!-- Top arrow: complex substances from assimilation to dissimilation -->
<line x1="200" y1="125" x2="298" y2="125" stroke="#2E7D32" stroke-width="1.2"/>
<polygon points="300,125 294,121 294,129" fill="#2E7D32"/>
<text x="250" y="120" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">Сложные вещества</text>

<!-- Bottom arrow: simple substances from dissimilation to assimilation -->
<line x1="300" y1="195" x2="202" y2="195" stroke="#BF360C" stroke-width="1.2"/>
<polygon points="200,195 206,191 206,199" fill="#BF360C"/>
<text x="250" y="208" font-family="Arial,sans-serif" font-size="5.5" fill="#BF360C" text-anchor="middle">Простые вещества + энергия</text>

<!-- ATP molecule diagram -->
<g transform="translate(250,280)">
  <!-- ATP structure -->
  <rect x="-50" y="-15" width="20" height="20" rx="3" fill="#1565C0" opacity="0.3" stroke="#1565C0" stroke-width="1"/>
  <text x="-40" y="-1" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Аденин</text>
  
  <rect x="-27" y="-15" width="15" height="20" rx="3" fill="#9C27B0" opacity="0.3" stroke="#9C27B0" stroke-width="1"/>
  <text x="-19.5" y="-1" font-family="Arial,sans-serif" font-size="6" fill="#9C27B0" text-anchor="middle">Р</text>
  
  <!-- Bonds -->
  <line x1="-7" y1="-5" x2="-2" y2="-5" stroke="#333" stroke-width="1.5"/>
  <line x1="-7" y1="0" x2="-2" y2="0" stroke="#333" stroke-width="1.5"/>
  
  <!-- Three phosphate groups -->
  <circle cx="5" cy="-5" r="8" fill="url(#atpGrad)" stroke="#F57F17" stroke-width="1"/>
  <text x="5" y="-2" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">P</text>
  
  <text x="17" y="-5" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold">~</text>
  
  <circle cx="28" cy="-5" r="8" fill="url(#atpGrad)" stroke="#F57F17" stroke-width="1"/>
  <text x="28" y="-2" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">P</text>
  
  <text x="40" y="-5" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" font-weight="bold">~</text>
  
  <circle cx="51" cy="-5" r="8" fill="url(#atpGrad)" stroke="#F57F17" stroke-width="1"/>
  <text x="51" y="-2" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">P</text>
  
  <!-- Energy indicators -->
  <path d="M22,-16 L22,-20" stroke="#F44336" stroke-width="1"/>
  <path d="M34,-16 L34,-22" stroke="#F44336" stroke-width="1.5"/>
  <path d="M57,-16 L57,-20" stroke="#F44336" stroke-width="1"/>
  
  <!-- Label -->
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">АТФ — универсальный источник энергии</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">~ макроэргические связи (запасают энергию)</text>
</g>

<!-- Energy flow diagram at top -->
<g transform="translate(250,73)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Поток энергии в клетке</text>
  <!-- Sun -->
  <circle cx="-110" cy="12" r="8" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <line x1="-110" y1="2" x2="-110" y2="-3" stroke="#FFD54F" stroke-width="1"/>
  <line x1="-102" y1="5" x2="-98" y2="1" stroke="#FFD54F" stroke-width="1"/>
  <line x1="-118" y1="5" x2="-122" y2="1" stroke="#FFD54F" stroke-width="1"/>
  <text x="-110" y="28" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Свет</text>
  <!-- Arrow -->
  <line x1="-98" y1="12" x2="-60" y2="12" stroke="#4CAF50" stroke-width="1"/>
  <polygon points="-58,12 -64,9 -64,15" fill="#4CAF50"/>
  <!-- Assimilation box -->
  <rect x="-55" y="4" width="50" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="-30" y="15" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">Ассимиляция</text>
  <!-- Arrow -->
  <line x1="-3" y1="12" x2="20" y2="12" stroke="#F57F17" stroke-width="1"/>
  <polygon points="22,12 16,9 16,15" fill="#F57F17"/>
  <!-- ATP -->
  <rect x="25" y="4" width="35" height="16" rx="3" fill="url(#energyGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <text x="42" y="15" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">АТФ</text>
  <!-- Arrow -->
  <line x1="62" y1="12" x2="85" y2="12" stroke="#FF5722" stroke-width="1"/>
  <polygon points="87,12 81,9 81,15" fill="#FF5722"/>
  <!-- Dissimilation box -->
  <rect x="90" y="4" width="55" height="16" rx="3" fill="#FFEBEE" stroke="#FF5722" stroke-width="0.8"/>
  <text x="117" y="15" font-family="Arial,sans-serif" font-size="5.5" fill="#BF360C" text-anchor="middle">Диссимиляция</text>
</g>

<!-- Fermentation note -->
<rect x="20" y="320" width="200" height="20" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.6"/>
<text x="120" y="334" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Брожение — без O₂ → 2 АТФ</text>

<!-- Respiration note -->
<rect x="280" y="320" width="200" height="20" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.6"/>
<text x="380" y="334" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Дыхание — с O₂ → 38 АТФ</text>
</svg>