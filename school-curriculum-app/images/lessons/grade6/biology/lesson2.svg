<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="tubeGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
<linearGradient id="liquidGrad1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4CAF50"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient>
<linearGradient id="liquidGrad2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF9800"/><stop offset="100%" stop-color="#E65100"/></linearGradient>
<linearGradient id="liquidGrad3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9C27B0"/><stop offset="100%" stop-color="#6A1B9A"/></linearGradient>
<linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4CAF50"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Методы исследования в биологии</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 2</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Microscope -->
<g transform="translate(100,200)">
  <!-- Base -->
  <rect x="-35" y="55" width="70" height="10" rx="3" fill="#546E7A" stroke="#37474F" stroke-width="1"/>
  <!-- Arm/pillar -->
  <rect x="-5" y="-10" width="10" height="65" rx="2" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
  <!-- Stage -->
  <rect x="-25" y="25" width="50" height="6" rx="1" fill="#90A4AE" stroke="#546E7A" stroke-width="0.8"/>
  <!-- Clips on stage -->
  <rect x="-22" y="23" width="8" height="3" rx="1" fill="#B0BEC5"/>
  <rect x="14" y="23" width="8" height="3" rx="1" fill="#B0BEC5"/>
  <!-- Objective turret -->
  <rect x="-8" y="10" width="16" height="15" rx="2" fill="#607D8B" stroke="#455A64" stroke-width="0.8"/>
  <!-- Objective lens -->
  <rect x="-3" y="25" width="6" height="8" rx="1" fill="#455A64"/>
  <!-- Eyepiece tube -->
  <rect x="-4" y="-35" width="8" height="25" rx="2" fill="#78909C" stroke="#546E7A" stroke-width="0.8"/>
  <!-- Eyepiece -->
  <rect x="-6" y="-42" width="12" height="10" rx="2" fill="#607D8B" stroke="#455A64" stroke-width="0.8"/>
  <!-- Coarse focus knob -->
  <ellipse cx="-8" cy="40" rx="6" ry="6" fill="#90A4AE" stroke="#546E7A" stroke-width="0.8"/>
  <!-- Fine focus knob -->
  <ellipse cx="-8" cy="40" rx="3" ry="3" fill="#B0BEC5"/>
  <!-- Mirror/light -->
  <ellipse cx="0" cy="62" rx="10" ry="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Labels -->
  <line x1="10" y1="-37" x2="45" y2="-37" stroke="#666" stroke-width="0.5"/>
  <text x="48" y="-34" font-family="Arial,sans-serif" font-size="6" fill="#333">Окуляр</text>
  <line x1="10" y1="15" x2="45" y2="15" stroke="#666" stroke-width="0.5"/>
  <text x="48" y="18" font-family="Arial,sans-serif" font-size="6" fill="#333">Объектив</text>
  <line x1="22" y1="28" x2="45" y2="28" stroke="#666" stroke-width="0.5"/>
  <text x="48" y="31" font-family="Arial,sans-serif" font-size="6" fill="#333">Столик</text>
  <text x="0" y="80" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Микроскоп</text>
</g>

<!-- Test tubes rack -->
<g transform="translate(230,240)">
  <!-- Rack -->
  <rect x="-30" y="25" width="60" height="8" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <rect x="-28" y="-15" width="3" height="40" fill="#8D6E63"/>
  <rect x="25" y="-15" width="3" height="40" fill="#8D6E63"/>
  <rect x="-28" y="-15" width="56" height="4" rx="1" fill="#A1887F" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- Tube 1 -->
  <rect x="-22" y="-5" width="10" height="28" rx="3" fill="url(#tubeGrad)" stroke="#90CAF9" stroke-width="0.8"/>
  <rect x="-21" y="10" width="8" height="12" rx="2" fill="url(#liquidGrad1)" opacity="0.7"/>
  <!-- Tube 2 -->
  <rect x="-7" y="-5" width="10" height="28" rx="3" fill="url(#tubeGrad)" stroke="#90CAF9" stroke-width="0.8"/>
  <rect x="-6" y="7" width="8" height="15" rx="2" fill="url(#liquidGrad2)" opacity="0.7"/>
  <!-- Tube 3 -->
  <rect x="8" y="-5" width="10" height="28" rx="3" fill="url(#tubeGrad)" stroke="#90CAF9" stroke-width="0.8"/>
  <rect x="9" y="12" width="8" height="10" rx="2" fill="url(#liquidGrad3)" opacity="0.7"/>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">Пробирки</text>
</g>

<!-- Magnifying glass -->
<g transform="translate(350,230)">
  <circle cx="0" cy="0" r="22" fill="#E8F5E9" opacity="0.4" stroke="#795548" stroke-width="3"/>
  <circle cx="0" cy="0" r="18" fill="#FFF9C4" opacity="0.2" stroke="none"/>
  <line x1="16" y1="16" x2="35" y2="35" stroke="#795548" stroke-width="4" stroke-linecap="round"/>
  <!-- Detail in lens -->
  <circle cx="-5" cy="-3" r="5" fill="#81C784" opacity="0.3"/>
  <path d="M-8,-5 C-5,-8 0,-7 2,-3" fill="none" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="5" y="50" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">Лупа</text>
</g>

<!-- Scientific method flow - horizontal arrows at bottom -->
<g transform="translate(0,0)">
  <!-- Step 1: Наблюдение -->
  <rect x="30" y="305" width="85" height="28" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.2"/>
  <text x="72" y="318" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Наблюдение</text>
  <text x="72" y="328" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">сбор фактов</text>
  <!-- Arrow 1 -->
  <polygon points="118,319 125,319 125,315 132,319 125,323 125,319" fill="#4CAF50"/>

  <!-- Step 2: Гипотеза -->
  <rect x="135" y="305" width="85" height="28" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.2"/>
  <text x="177" y="318" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Гипотеза</text>
  <text x="177" y="328" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">предположение</text>
  <!-- Arrow 2 -->
  <polygon points="223,319 230,319 230,315 237,319 230,323 230,319" fill="#4CAF50"/>

  <!-- Step 3: Эксперимент -->
  <rect x="240" y="305" width="85" height="28" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.2"/>
  <text x="282" y="318" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Эксперимент</text>
  <text x="282" y="328" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">проверка</text>
  <!-- Arrow 3 -->
  <polygon points="328,319 335,319 335,315 342,319 335,323 335,319" fill="#4CAF50"/>

  <!-- Step 4: Вывод -->
  <rect x="345" y="305" width="85" height="28" rx="6" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1.2"/>
  <text x="387" y="318" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Вывод</text>
  <text x="387" y="328" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">заключение</text>
</g>

<!-- Methods list on right side -->
<g transform="translate(400,70)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Методы:</text>
  <circle cx="-8" cy="14" r="2" fill="#4CAF50"/>
  <text x="0" y="17" font-family="Arial,sans-serif" font-size="7" fill="#333">Наблюдение</text>
  <circle cx="-8" cy="28" r="2" fill="#4CAF50"/>
  <text x="0" y="31" font-family="Arial,sans-serif" font-size="7" fill="#333">Эксперимент</text>
  <circle cx="-8" cy="42" r="2" fill="#4CAF50"/>
  <text x="0" y="45" font-family="Arial,sans-serif" font-size="7" fill="#333">Измерение</text>
  <circle cx="-8" cy="56" r="2" fill="#4CAF50"/>
  <text x="0" y="59" font-family="Arial,sans-serif" font-size="7" fill="#333">Сравнение</text>
  <circle cx="-8" cy="70" r="2" fill="#4CAF50"/>
  <text x="0" y="73" font-family="Arial,sans-serif" font-size="7" fill="#333">Описание</text>
  <circle cx="-8" cy="84" r="2" fill="#4CAF50"/>
  <text x="0" y="87" font-family="Arial,sans-serif" font-size="7" fill="#333">Моделирование</text>
</g>

<!-- Notebook with notes -->
<g transform="translate(290,140)">
  <rect x="0" y="0" width="40" height="50" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <line x1="8" y1="0" x2="8" y2="50" stroke="#F9A825" stroke-width="0.5" opacity="0.5"/>
  <line x1="10" y1="10" x2="35" y2="10" stroke="#BCAAA4" stroke-width="0.5"/>
  <line x1="10" y1="18" x2="35" y2="18" stroke="#BCAAA4" stroke-width="0.5"/>
  <line x1="10" y1="26" x2="35" y2="26" stroke="#BCAAA4" stroke-width="0.5"/>
  <line x1="10" y1="34" x2="30" y2="34" stroke="#BCAAA4" stroke-width="0.5"/>
  <text x="20" y="60" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Дневник</text>
</g>
</svg>