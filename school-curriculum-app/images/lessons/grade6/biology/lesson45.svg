<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="soilG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
<linearGradient id="tuberG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#BCAAA4"/><stop offset="100%" stop-color="#8D6E63"/></linearGradient>
<linearGradient id="bulbG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF9C4"/><stop offset="100%" stop-color="#FFECB3"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Вегетативное размножение растений</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 45</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- SECTION 1: Natural methods -->
<text x="250" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Естественные способы</text>

<!-- 1. Runners/Усы (strawberry) -->
<rect x="10" y="70" width="115" height="68" rx="3" fill="#FFF" opacity="0.3" stroke="#4CAF50" stroke-width="0.5"/>
<text x="67" y="80" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#2E7D32" text-anchor="middle">Усы (столоны)</text>
<!-- Mother plant -->
<ellipse cx="35" cy="105" rx="12" ry="8" fill="#81C784" stroke="#388E3C" stroke-width="0.8"/>
<line x1="35" y1="113" x2="35" y2="125" stroke="#4CAF50" stroke-width="1"/>
<!-- Runner (stolon) -->
<path d="M47,105 Q65,100 85,108" stroke="#66BB6A" stroke-width="1.2" fill="none"/>
<!-- Daughter plant 1 -->
<ellipse cx="85" cy="105" rx="8" ry="6" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.6"/>
<line x1="85" y1="111" x2="85" y2="118" stroke="#81C784" stroke-width="0.8"/>
<!-- Small roots on daughter -->
<line x1="82" y1="118" x2="80" y2="122" stroke="#8D6E63" stroke-width="0.5"/>
<line x1="88" y1="118" x2="90" y2="122" stroke="#8D6E63" stroke-width="0.5"/>
<!-- Runner 2 -->
<path d="M47,108 Q60,115 80,125" stroke="#66BB6A" stroke-width="1" fill="none"/>
<ellipse cx="80" cy="125" rx="6" ry="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
<text x="67" y="135" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">земляника</text>

<!-- 2. Bulbs (тюльпан) -->
<rect x="132" y="70" width="100" height="68" rx="3" fill="#FFF" opacity="0.3" stroke="#FF9800" stroke-width="0.5"/>
<text x="182" y="80" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#E65100" text-anchor="middle">Луковицы</text>
<!-- Bulb cross section -->
<ellipse cx="182" cy="112" rx="16" ry="18" fill="url(#bulbG)" stroke="#F9A825" stroke-width="0.8"/>
<!-- Scales -->
<ellipse cx="182" cy="112" rx="13" ry="15" fill="#FFF9C4" stroke="#FFECB3" stroke-width="0.3"/>
<ellipse cx="182" cy="112" rx="10" ry="12" fill="#FFF9C4" stroke="#FFECB3" stroke-width="0.3"/>
<ellipse cx="182" cy="112" rx="7" ry="9" fill="#FFECB3" stroke="#F9A825" stroke-width="0.3"/>
<!-- Central bud -->
<ellipse cx="182" cy="105" rx="3" ry="5" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.5"/>
<!-- Roots -->
<line x1="176" y1="129" x2="174" y2="134" stroke="#8D6E63" stroke-width="0.5"/>
<line x1="182" y1="129" x2="182" y2="134" stroke="#8D6E63" stroke-width="0.5"/>
<line x1="188" y1="129" x2="190" y2="134" stroke="#8D6E63" stroke-width="0.5"/>
<!-- Daughter bulbs -->
<ellipse cx="170" cy="118" rx="4" ry="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.4"/>
<ellipse cx="194" cy="116" rx="3" ry="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.4"/>
<!-- Labels -->
<text x="168" y="100" font-family="Arial,sans-serif" font-size="4" fill="#E65100">чешуи</text>
<text x="192" y="105" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32">почка</text>
<text x="182" y="135" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">тюльпан, лук</text>

<!-- 3. Tubers (картофель) -->
<rect x="239" y="70" width="100" height="68" rx="3" fill="#FFF" opacity="0.3" stroke="#795548" stroke-width="0.5"/>
<text x="289" y="80" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#4E342E" text-anchor="middle">Клубни</text>
<!-- Potato tuber -->
<ellipse cx="289" cy="110" rx="20" ry="14" fill="url(#tuberG)" stroke="#5D4037" stroke-width="0.8"/>
<!-- Eyes (почки/глазки) -->
<circle cx="278" cy="105" r="2" fill="#795548" stroke="#4E342E" stroke-width="0.3"/>
<circle cx="295" cy="103" r="2" fill="#795548" stroke="#4E342E" stroke-width="0.3"/>
<circle cx="285" cy="115" r="2" fill="#795548" stroke="#4E342E" stroke-width="0.3"/>
<circle cx="300" cy="112" r="2" fill="#795548" stroke="#4E342E" stroke-width="0.3"/>
<circle cx="275" cy="113" r="1.5" fill="#795548" stroke="#4E342E" stroke-width="0.3"/>
<!-- Sprout from eye -->
<path d="M295,101 Q298,95 302,92" stroke="#4CAF50" stroke-width="0.8" fill="none"/>
<ellipse cx="303" cy="91" rx="3" ry="2" fill="#81C784" stroke="#388E3C" stroke-width="0.3"/>
<!-- Labels -->
<line x1="295" y1="101" x2="310" y2="97" stroke="#4E342E" stroke-width="0.3"/>
<text x="312" y="99" font-family="Arial,sans-serif" font-size="4" fill="#4E342E">глазок</text>
<text x="312" y="110" font-family="Arial,sans-serif" font-size="4" fill="#4E342E">(почка)</text>
<text x="289" y="135" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">картофель</text>

<!-- 4. Root suckers (корневые отпрыски) -->
<rect x="346" y="70" width="150" height="68" rx="3" fill="#FFF" opacity="0.3" stroke="#1565C0" stroke-width="0.5"/>
<text x="421" y="80" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#0D47A1" text-anchor="middle">Корневые отпрыски</text>
<!-- Underground root -->
<path d="M358,120 Q380,115 420,118 Q450,120 470,115" stroke="#8D6E63" stroke-width="2.5" fill="none"/>
<!-- Suckers emerging -->
<line x1="380" y1="118" x2="380" y2="100" stroke="#4CAF50" stroke-width="1"/>
<ellipse cx="380" cy="98" rx="7" ry="5" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
<line x1="420" y1="118" x2="420" y2="102" stroke="#4CAF50" stroke-width="1"/>
<ellipse cx="420" cy="100" rx="6" ry="4" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
<line x1="450" y1="117" x2="450" y2="105" stroke="#66BB6A" stroke-width="0.8"/>
<ellipse cx="450" cy="103" rx="5" ry="3.5" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.5"/>
<!-- Soil line -->
<line x1="356" y1="118" x2="496" y2="118" stroke="#5D4037" stroke-width="0.3" stroke-dasharray="2,1"/>
<text x="421" y="135" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">малина, осина, вишня</text>

<!-- SECTION 2: Artificial methods -->
<text x="250" y="152" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Искусственные способы</text>

<!-- 1. Cuttings (черенкование) -->
<rect x="10" y="157" width="155" height="68" rx="3" fill="#FFF" opacity="0.3" stroke="#4CAF50" stroke-width="0.5"/>
<text x="87" y="167" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#2E7D32" text-anchor="middle">Черенкование</text>
<!-- Stem cutting -->
<line x1="45" y1="215" x2="45" y2="185" stroke="#4CAF50" stroke-width="2"/>
<path d="M45,190 Q35,185 30,188" stroke="#81C784" stroke-width="1" fill="#A5D6A7"/>
<path d="M45,193 Q55,188 60,191" stroke="#81C784" stroke-width="1" fill="#A5D6A7"/>
<!-- Roots from cutting -->
<path d="M45,215 Q42,218 40,220" stroke="#8D6E63" stroke-width="0.6" fill="none"/>
<path d="M45,215 Q48,218 50,220" stroke="#8D6E63" stroke-width="0.6" fill="none"/>
<path d="M45,215 Q44,219 43,222" stroke="#8D6E63" stroke-width="0.6" fill="none"/>
<!-- Soil -->
<rect x="30" y="213" width="30" height="8" rx="2" fill="url(#soilG)" opacity="0.4"/>
<text x="45" y="177" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32" text-anchor="middle">стеблевой</text>

<!-- Leaf cutting -->
<ellipse cx="100" cy="190" rx="10" ry="6" fill="#81C784" stroke="#388E3C" stroke-width="0.8"/>
<line x1="100" y1="196" x2="100" y2="215" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M100,215 Q97,218 95,220" stroke="#8D6E63" stroke-width="0.5" fill="none"/>
<path d="M100,215 Q103,218 105,220" stroke="#8D6E63" stroke-width="0.5" fill="none"/>
<rect x="87" y="213" width="26" height="8" rx="2" fill="url(#soilG)" opacity="0.4"/>
<text x="100" y="177" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32" text-anchor="middle">листовой</text>

<!-- Label -->
<text x="72" y="228" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">смородина, сенполия</text>

<!-- 2. Layering (отводки) -->
<rect x="175" y="157" width="140" height="68" rx="3" fill="#FFF" opacity="0.3" stroke="#FF9800" stroke-width="0.5"/>
<text x="245" y="167" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#E65100" text-anchor="middle">Отводки</text>
<!-- Parent stem -->
<line x1="200" y1="170" x2="200" y2="220" stroke="#4CAF50" stroke-width="2"/>
<!-- Branch bent to ground -->
<path d="M200,185 Q220,195 240,200 Q260,205 275,210" stroke="#66BB6A" stroke-width="1.5" fill="none"/>
<!-- Rooted section -->
<path d="M265,210 Q263,214 260,218" stroke="#8D6E63" stroke-width="0.6" fill="none"/>
<path d="M270,210 Q268,214 266,218" stroke="#8D6E63" stroke-width="0.6" fill="none"/>
<path d="M275,210 Q273,214 271,218" stroke="#8D6E63" stroke-width="0.6" fill="none"/>
<!-- Soil at rooting point -->
<rect x="255" y="208" width="30" height="8" rx="2" fill="url(#soilG)" opacity="0.5"/>
<!-- New plant emerging -->
<line x1="275" y1="210" x2="275" y2="195" stroke="#4CAF50" stroke-width="1"/>
<ellipse cx="275" cy="193" rx="5" ry="3" fill="#81C784" stroke="#388E3C" stroke-width="0.4"/>
<!-- Scissors -->
<line x1="232" y1="197" x2="237" y2="192" stroke="#F44336" stroke-width="0.6"/>
<line x1="237" y1="197" x2="232" y2="192" stroke="#F44336" stroke-width="0.6"/>
<text x="245" y="228" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">смородина, крыжовник</text>

<!-- 3. Grafting (прививка) -->
<rect x="325" y="157" width="170" height="68" rx="3" fill="#FFF" opacity="0.3" stroke="#C62828" stroke-width="0.5"/>
<text x="410" y="167" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#C62828" text-anchor="middle">Прививка</text>

<!-- Budding (окулировка) -->
<text x="365" y="177" font-family="Arial,sans-serif" font-size="5" font-weight="bold" fill="#C62828">Окулировка</text>
<!-- Rootstock -->
<line x1="365" y1="180" x2="365" y2="218" stroke="#795548" stroke-width="2.5"/>
<!-- Bud shield -->
<ellipse cx="365" cy="192" rx="5" ry="7" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
<ellipse cx="365" cy="189" rx="2" ry="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.3"/>
<!-- Binding -->
<path d="M360,186 Q358,192 360,198" stroke="#FF9800" stroke-width="0.5" fill="none"/>
<path d="M370,186 Q372,192 370,198" stroke="#FF9800" stroke-width="0.5" fill="none"/>
<text x="365" y="211" font-family="Arial,sans-serif" font-size="4" fill="#795548" text-anchor="middle">подвой</text>
<text x="374" y="189" font-family="Arial,sans-serif" font-size="3.5" fill="#2E7D32">почка</text>

<!-- Whip graft (копулировка) -->
<text x="445" y="177" font-family="Arial,sans-serif" font-size="5" font-weight="bold" fill="#C62828">Копулировка</text>
<!-- Rootstock (lower) -->
<line x1="445" y1="200" x2="445" y2="218" stroke="#795548" stroke-width="2.5"/>
<!-- Scion (upper) -->
<line x1="445" y1="185" x2="445" y2="200" stroke="#4CAF50" stroke-width="2"/>
<path d="M445,185 Q450,182 453,185" stroke="#66BB6A" stroke-width="0.8" fill="#A5D6A7"/>
<!-- Diagonal cut -->
<path d="M443,200 L447,196" stroke="#C62828" stroke-width="0.8"/>
<!-- Binding -->
<rect x="440" y="196" width="10" height="6" rx="1" fill="none" stroke="#FF9800" stroke-width="0.5"/>
<text x="435" y="211" font-family="Arial,sans-serif" font-size="4" fill="#795548" text-anchor="middle">подвой</text>
<text x="455" y="191" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32">привой</text>
<text x="410" y="228" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">яблоня, роза, цитрус</text>

<!-- SECTION 3: Tissue culture -->
<text x="130" y="244" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Культура тканей (микроклональное размножение)</text>

<!-- Test tube -->
<rect x="30" y="250" width="35" height="55" rx="3" fill="#E3F2FD" opacity="0.4" stroke="#90A4AE" stroke-width="0.8"/>
<!-- Nutrient medium -->
<rect x="32" y="275" width="31" height="28" rx="2" fill="#FFF9C4" opacity="0.5"/>
<!-- Small plant in tube -->
<line x1="47" y1="275" x2="47" y2="260" stroke="#4CAF50" stroke-width="1"/>
<ellipse cx="47" cy="258" rx="5" ry="3" fill="#81C784" stroke="#388E3C" stroke-width="0.4"/>
<path d="M47,265 Q40,260 38,263" stroke="#66BB6A" stroke-width="0.5" fill="#A5D6A7"/>
<!-- Cap -->
<rect x="28" y="248" width="39" height="4" rx="1" fill="#78909C" opacity="0.6"/>

<!-- Arrow to many plants -->
<path d="M70,275 L90,275" stroke="#6A1B9A" stroke-width="1" fill="none"/>
<polygon points="90,273 94,275 90,277" fill="#6A1B9A"/>

<!-- Multiple test tubes (production) -->
<rect x="95" y="252" width="15" height="30" rx="2" fill="#E3F2FD" opacity="0.3" stroke="#90A4AE" stroke-width="0.4"/>
<rect x="115" y="252" width="15" height="30" rx="2" fill="#E3F2FD" opacity="0.3" stroke="#90A4AE" stroke-width="0.4"/>
<rect x="135" y="252" width="15" height="30" rx="2" fill="#E3F2FD" opacity="0.3" stroke="#90A4AE" stroke-width="0.4"/>
<rect x="155" y="252" width="15" height="30" rx="2" fill="#E3F2FD" opacity="0.3" stroke="#90A4AE" stroke-width="0.4"/>
<rect x="175" y="252" width="15" height="30" rx="2" fill="#E3F2FD" opacity="0.3" stroke="#90A4AE" stroke-width="0.4"/>
<!-- Small plants in tubes -->
<line x1="102" y1="272" x2="102" y2="264" stroke="#4CAF50" stroke-width="0.5"/>
<line x1="122" y1="272" x2="122" y2="264" stroke="#4CAF50" stroke-width="0.5"/>
<line x1="142" y1="272" x2="142" y2="264" stroke="#4CAF50" stroke-width="0.5"/>
<line x1="162" y1="272" x2="162" y2="264" stroke="#4CAF50" stroke-width="0.5"/>
<line x1="182" y1="272" x2="182" y2="264" stroke="#4CAF50" stroke-width="0.5"/>
<!-- x1000 label -->
<text x="140" y="295" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#6A1B9A" text-anchor="middle">× 1000 клонов</text>

<!-- Steps -->
<text x="330" y="255" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A">1. Кусочек ткани (эксплант)</text>
<text x="330" y="263" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A">2. Стерильная питательная среда</text>
<text x="330" y="271" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A">3. Деление → каллус → побеги</text>
<text x="330" y="279" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A">4. Укоренение → пересадка</text>

<!-- Advantage box -->
<rect x="280" y="285" width="210" height="30" rx="3" fill="#F3E5F5" opacity="0.3" stroke="#6A1B9A" stroke-width="0.5"/>
<text x="385" y="296" font-family="Arial,sans-serif" font-size="5.5" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Преимущества вегетативного размножения:</text>
<text x="385" y="304" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle">Быстрота, сохранение признаков, получение clones</text>

<!-- Summary -->
<text x="250" y="330" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Клон — потомство от одного организма, полученное вегетативным путём. Все потомки генетически одинаковы.</text>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">Недостаток: нет генетического разнообразия → уязвимость к болезням и изменениям среды</text>
</svg>