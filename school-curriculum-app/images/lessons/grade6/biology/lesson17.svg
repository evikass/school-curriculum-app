<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="50%" stop-color="#90CAF9"/><stop offset="100%" stop-color="#42A5F5"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Роль водорослей в природе и жизни человека</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 17</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Oxygen production (top left) -->
<text x="120" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Кислород — продукт фотосинтеза</text>

<g transform="translate(20,75)">
<!-- Water -->
<rect x="0" y="40" width="200" height="60" rx="4" fill="url(#waterGrad)" opacity="0.3" stroke="#1976D2" stroke-width="0.5"/>

<!-- Underwater algae -->
<path d="M30,95 Q28,75 32,60 Q35,50 30,45" fill="none" stroke="#4CAF50" stroke-width="2"/>
<path d="M30,60 Q25,55 20,58" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M30,70 Q35,65 40,68" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M30,50 Q25,45 20,48" fill="none" stroke="#81C784" stroke-width="0.8"/>

<path d="M70,95 Q68,70 72,55 Q75,45 70,40" fill="none" stroke="#4CAF50" stroke-width="2"/>
<path d="M70,55 Q65,50 60,53" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M70,65 Q75,60 80,63" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M70,75 Q65,72 60,75" fill="none" stroke="#66BB6A" stroke-width="1"/>

<path d="M110,95 Q108,80 112,65 Q115,55 110,48" fill="none" stroke="#4CAF50" stroke-width="2"/>
<path d="M110,60 Q105,55 100,58" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M110,70 Q115,65 120,68" fill="none" stroke="#66BB6A" stroke-width="1"/>

<path d="M150,95 Q148,78 152,62 Q155,50 150,42" fill="none" stroke="#66BB6A" stroke-width="1.5"/>
<path d="M150,55 Q145,50 140,53" fill="none" stroke="#81C784" stroke-width="0.8"/>
<path d="M150,68 Q155,63 160,66" fill="none" stroke="#81C784" stroke-width="0.8"/>

<!-- O2 bubbles -->
<circle cx="35" cy="38" r="4" fill="none" stroke="#2196F3" stroke-width="0.8" opacity="0.7"/>
<text x="35" y="40" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">O₂</text>
<circle cx="50" cy="28" r="3" fill="none" stroke="#2196F3" stroke-width="0.6" opacity="0.6"/>
<text x="50" y="30" font-family="Arial,sans-serif" font-size="3.5" fill="#1565C0" text-anchor="middle">O₂</text>
<circle cx="75" cy="32" r="4" fill="none" stroke="#2196F3" stroke-width="0.8" opacity="0.7"/>
<text x="75" y="34" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">O₂</text>
<circle cx="90" cy="22" r="3" fill="none" stroke="#2196F3" stroke-width="0.6" opacity="0.6"/>
<circle cx="115" cy="40" r="4" fill="none" stroke="#2196F3" stroke-width="0.8" opacity="0.7"/>
<text x="115" y="42" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">O₂</text>
<circle cx="155" cy="34" r="4" fill="none" stroke="#2196F3" stroke-width="0.7" opacity="0.6"/>
<circle cx="165" cy="25" r="3" fill="none" stroke="#2196F3" stroke-width="0.5" opacity="0.5"/>

<!-- Sun rays coming down -->
<line x1="40" y1="5" x2="50" y2="40" stroke="#FFEB3B" stroke-width="0.5" opacity="0.5"/>
<line x1="80" y1="5" x2="75" y2="42" stroke="#FFEB3B" stroke-width="0.5" opacity="0.5"/>
<line x1="120" y1="5" x2="115" y2="45" stroke="#FFEB3B" stroke-width="0.5" opacity="0.5"/>
<line x1="160" y1="5" x2="155" y2="40" stroke="#FFEB3B" stroke-width="0.5" opacity="0.5"/>

<!-- CO2 arrows going down -->
<text x="10" y="18" font-family="Arial,sans-serif" font-size="5" fill="#757575">CO₂ ↓</text>
<text x="180" y="18" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">O₂ ↑</text>
</g>

<!-- Oxygen stat box -->
<g transform="translate(20,175)">
<rect x="0" y="0" width="200" height="22" rx="3" fill="white" opacity="0.6" stroke="#1976D2" stroke-width="0.5"/>
<text x="100" y="10" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#1565C0" text-anchor="middle">50–80% кислорода — из водорослей!</text>
<text x="100" y="19" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">Главные поставщики O₂ на планете</text>
</g>

<!-- Section 2: Food products (top right) -->
<text x="370" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Пищевые продукты</text>

<g transform="translate(280,75)">
<!-- Nori -->
<rect x="0" y="0" width="55" height="50" rx="4" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<rect x="12" y="8" width="30" height="28" rx="1" fill="#1B5E20" opacity="0.6" stroke="#0D47A1" stroke-width="0.5"/>
<!-- Sushi roll suggestion -->
<circle cx="27" cy="22" r="8" fill="white" opacity="0.3"/>
<circle cx="27" cy="22" r="4" fill="#FF9800" opacity="0.3"/>
<text x="27" y="44" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Нори</text>
<text x="27" y="52" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(Порфира)</text>

<!-- Agar-agar -->
<rect x="62" y="0" width="55" height="50" rx="4" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Petri dish with agar -->
<ellipse cx="89" cy="25" rx="18" ry="10" fill="#FCE4EC" opacity="0.4" stroke="#E91E63" stroke-width="0.5"/>
<ellipse cx="89" cy="25" rx="14" ry="7" fill="#F8BBD0" opacity="0.3"/>
<text x="89" y="44" font-family="Arial,sans-serif" font-size="6" fill="#C2185B" text-anchor="middle">Агар-агар</text>
<text x="89" y="52" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(из красных)</text>

<!-- Sea cabbage / Kombu -->
<rect x="124" y="0" width="55" height="50" rx="4" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Kelp piece -->
<rect x="137" y="10" width="28" height="25" rx="3" fill="#8D6E63" opacity="0.4" stroke="#5D4037" stroke-width="0.8"/>
<line x1="151" y1="10" x2="151" y2="35" stroke="#5D4037" stroke-width="0.5"/>
<text x="151" y="44" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037" text-anchor="middle">Морская</text>
<text x="151" y="52" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037" text-anchor="middle">капуста</text>
</g>

<!-- Section 3: Diatom shell -->
<text x="370" y="138" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Диатомовые водоросли</text>

<g transform="translate(290,148)">
<!-- Diatom frustule (pill-box shape) -->
<ellipse cx="55" cy="20" rx="40" ry="16" fill="#FFECB3" opacity="0.3" stroke="#F9A825" stroke-width="1"/>
<!-- Valve pattern (striae) -->
<line x1="25" y1="12" x2="25" y2="28" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="30" y1="8" x2="30" y2="32" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="35" y1="6" x2="35" y2="34" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="40" y1="5" x2="40" y2="35" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="45" y1="4" x2="45" y2="36" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="50" y1="4" x2="50" y2="36" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="55" y1="4" x2="55" y2="36" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="60" y1="5" x2="60" y2="35" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="65" y1="6" x2="65" y2="34" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="70" y1="8" x2="70" y2="32" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<line x1="75" y1="12" x2="75" y2="28" stroke="#F9A825" stroke-width="0.3" opacity="0.5"/>
<!-- Central area -->
<ellipse cx="55" cy="20" rx="12" ry="8" fill="none" stroke="#F9A825" stroke-width="0.5"/>
<!-- Raphe (slit) -->
<line x1="43" y1="20" x2="67" y2="20" stroke="#E65100" stroke-width="0.6"/>

<!-- Girdle view (side view) -->
<rect x="5" y="48" width="100" height="18" rx="2" fill="#FFECB3" opacity="0.2" stroke="#F9A825" stroke-width="0.5"/>
<line x1="5" y1="57" x2="105" y2="57" stroke="#F9A825" stroke-width="0.3"/>
<text x="55" y="46" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">вид со стороны пояска</text>

<!-- Labels -->
<text x="120" y="15" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">панцирь</text>
<text x="120" y="22" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">(SiO₂)</text>
<text x="120" y="33" font-family="Arial,sans-serif" font-size="5.5" fill="#F9A825">шов</text>

<!-- Diatomite note -->
<text x="55" y="75" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">Диатомит = скопления панцирей</text>
<text x="55" y="83" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">фильтры, абразивы, динамит</text>
</g>

<!-- Section 4: Water bloom -->
<text x="120" y="210" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Цветение воды</text>

<g transform="translate(20,218)">
<!-- Water surface -->
<rect x="0" y="0" width="200" height="50" rx="4" fill="#81C784" opacity="0.3" stroke="#4CAF50" stroke-width="0.8"/>
<!-- Dense algae layer on surface -->
<ellipse cx="50" cy="15" rx="20" ry="8" fill="#66BB6A" opacity="0.5"/>
<ellipse cx="100" cy="20" rx="25" ry="10" fill="#4CAF50" opacity="0.4"/>
<ellipse cx="150" cy="12" rx="18" ry="7" fill="#66BB6A" opacity="0.5"/>
<!-- Individual cells -->
<circle cx="30" cy="10" r="2" fill="#2E7D32" opacity="0.4"/>
<circle cx="40" cy="18" r="2.5" fill="#2E7D32" opacity="0.4"/>
<circle cx="60" cy="8" r="2" fill="#2E7D32" opacity="0.4"/>
<circle cx="80" cy="15" r="2.5" fill="#2E7D32" opacity="0.4"/>
<circle cx="110" cy="12" r="2" fill="#2E7D32" opacity="0.4"/>
<circle cx="130" cy="22" r="2.5" fill="#2E7D32" opacity="0.4"/>
<circle cx="160" cy="18" r="2" fill="#2E7D32" opacity="0.4"/>
<circle cx="170" cy="10" r="2.5" fill="#2E7D32" opacity="0.4"/>

<!-- Fish struggling -->
<path d="M85,38 Q90,32 95,38 Q90,44 85,38Z" fill="#FF9800" opacity="0.5" stroke="#E65100" stroke-width="0.5"/>
<circle cx="92" cy="37" r="1" fill="#E65100"/>
<!-- X marks dead fish -->
<text x="90" y="50" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">гибель рыб</text>

<text x="100" y="60" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">Причина: избыток азота и фосфора</text>
<text x="100" y="68" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">→ массовое размножение цианобактерий</text>
</g>

<!-- Section 5: Industrial uses -->
<text x="370" y="240" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Промышленное значение</text>

<g transform="translate(280,248)">
<rect x="0" y="0" width="200" height="65" rx="4" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Alginates -->
<circle cx="20" cy="15" r="8" fill="#8D6E63" opacity="0.3" stroke="#5D4037" stroke-width="0.5"/>
<text x="20" y="17" font-family="Arial,sans-serif" font-size="4" fill="#5D4037" text-anchor="middle">альгин</text>
<text x="38" y="12" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">Альгинаты — загустители</text>
<text x="38" y="20" font-family="Arial,sans-serif" font-size="5" fill="#666">мороженое, кремы, краски</text>

<!-- Carrageenan -->
<circle cx="20" cy="33" r="8" fill="#E57373" opacity="0.3" stroke="#C62828" stroke-width="0.5"/>
<text x="20" y="35" font-family="Arial,sans-serif" font-size="4" fill="#C62828" text-anchor="middle">карр.</text>
<text x="38" y="30" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828">Каррагинан — желирование</text>
<text x="38" y="38" font-family="Arial,sans-serif" font-size="5" fill="#666">десерты, зубная паста, пиво</text>

<!-- Iodine -->
<circle cx="20" cy="51" r="8" fill="#7B1FA2" opacity="0.2" stroke="#7B1FA2" stroke-width="0.5"/>
<text x="20" y="53" font-family="Arial,sans-serif" font-size="4" fill="#7B1FA2" text-anchor="middle">I₂</text>
<text x="38" y="48" font-family="Arial,sans-serif" font-size="5.5" fill="#7B1FA2">Йод — из бурых водорослей</text>
<text x="38" y="56" font-family="Arial,sans-serif" font-size="5" fill="#666">медицина, дезинфекция</text>
</g>

<!-- Bottom summary -->
<g transform="translate(15,300)">
<rect x="0" y="0" width="470" height="30" rx="4" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="235" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Значение водорослей: O₂ для дыхания → пища → промышленность → очистка воды → биотопливо</text>
<text x="235" y="24" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Водоросли — основа пищевых цепей в водоёмах (первичное производство органического вещества)</text>
</g>
</svg>