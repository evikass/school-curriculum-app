<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4FC3F7"/><stop offset="100%" stop-color="#0288D1"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Условия прорастания семян</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 29</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- THREE CONDITIONS (top row) -->
<text x="250" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Необходимые условия прорастания</text>

<!-- 1. WATER -->
<g transform="translate(80,115)">
  <rect x="-50" y="-35" width="100" height="70" rx="8" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <!-- Water drop icon -->
  <path d="M0,-22 Q12,-5 8,5 Q4,14 0,14 Q-4,14 -8,5 Q-12,-5 0,-22" fill="url(#water)" opacity="0.7" stroke="#0277BD" stroke-width="0.8"/>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="9" fill="#0277BD" text-anchor="middle" font-weight="bold">Вода</text>
  <text x="0" y="40" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Набухание семени</text>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Активация ферментов</text>
</g>

<!-- 2. OXYGEN -->
<g transform="translate(230,115)">
  <rect x="-50" y="-35" width="100" height="70" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.2"/>
  <!-- O2 molecule -->
  <circle cx="-6" cy="-12" r="8" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <circle cx="6" cy="-12" r="8" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <text x="-6" y="-9" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">O</text>
  <text x="6" y="-9" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">O</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Кислород</text>
  <text x="0" y="40" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Дыхание клеток</text>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Выделение энергии</text>
</g>

<!-- 3. TEMPERATURE -->
<g transform="translate(380,115)">
  <rect x="-50" y="-35" width="100" height="70" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="1.2"/>
  <!-- Thermometer -->
  <rect x="-3" y="-25" width="6" height="25" rx="3" fill="#FFF" stroke="#C62828" stroke-width="0.8"/>
  <circle cx="0" cy="3" r="7" fill="#F44336" stroke="#C62828" stroke-width="0.8"/>
  <!-- Mercury -->
  <rect x="-1.5" y="-15" width="3" height="20" fill="#F44336"/>
  <!-- Temperature marks -->
  <line x1="3" y1="-20" x2="7" y2="-20" stroke="#C62828" stroke-width="0.5"/>
  <line x1="3" y1="-14" x2="7" y2="-14" stroke="#C62828" stroke-width="0.5"/>
  <line x1="3" y1="-8" x2="7" y2="-8" stroke="#C62828" stroke-width="0.5"/>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="9" fill="#C62828" text-anchor="middle" font-weight="bold">Тепло</text>
  <text x="0" y="40" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Оптимум: 20-30°C</text>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Работа ферментов</text>
</g>

<!-- GERMINATION SEQUENCE (center) -->
<text x="250" y="182" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Последовательность прорастания</text>

<!-- Stage 1: Seed -->
<g transform="translate(55,220)">
  <ellipse cx="0" cy="0" rx="15" ry="10" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle">Семя</text>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(сухое)</text>
</g>

<!-- Arrow 1 -->
<path d="M75,220 L95,220" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="95,216 103,220 95,224" fill="#2E7D32"/>
<text x="89" y="213" font-family="Arial,sans-serif" font-size="5" fill="#0288D1">+ H₂O</text>

<!-- Stage 2: Swollen seed -->
<g transform="translate(135,220)">
  <ellipse cx="0" cy="0" rx="18" ry="13" fill="#A5D6A7" stroke="#388E3C" stroke-width="1" opacity="0.7"/>
  <ellipse cx="0" cy="0" rx="15" ry="10" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="7" fill="#388E3C" text-anchor="middle">Набухание</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(вода + O₂)</text>
</g>

<!-- Arrow 2 -->
<path d="M158,220 L178,220" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="178,216 186,220 178,224" fill="#2E7D32"/>

<!-- Stage 3: Root emergence -->
<g transform="translate(220,220)">
  <ellipse cx="0" cy="-2" rx="15" ry="10" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Root emerging -->
  <path d="M0,8 Q0,15 -2,22" fill="none" stroke="#8D6E63" stroke-width="1.5"/>
  <path d="M-1,22 Q-5,18 -4,22" fill="none" stroke="#8D6E63" stroke-width="0.5"/>
  <text x="0" y="35" font-family="Arial,sans-serif" font-size="7" fill="#388E3C" text-anchor="middle">Корешок</text>
  <text x="0" y="43" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(проклёвывается)</text>
</g>

<!-- Arrow 3 -->
<path d="M243,220 L263,220" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="263,216 271,220 263,224" fill="#2E7D32"/>

<!-- Stage 4: Sprout -->
<g transform="translate(310,215)">
  <ellipse cx="-8" cy="-5" rx="10" ry="6" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.8" opacity="0.7"/>
  <!-- Stem going up -->
  <line x1="0" y1="0" x2="0" y2="-25" stroke="#4CAF50" stroke-width="2"/>
  <!-- Root going down -->
  <line x1="0" y1="0" x2="-2" y2="18" stroke="#8D6E63" stroke-width="1.5"/>
  <line x1="-2" y1="18" x2="-6" y2="25" stroke="#8D6E63" stroke-width="1"/>
  <!-- First leaves -->
  <path d="M0,-20 Q8,-24 10,-16 Q4,-16 0,-20" fill="#66BB6A"/>
  <path d="M0,-20 Q-8,-24 -10,-16 Q-4,-16 0,-20" fill="#81C784"/>
  <text x="0" y="38" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Проросток</text>
</g>

<!-- Arrow 4 -->
<path d="M333,215 L353,215" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="353,211 361,215 353,219" fill="#2E7D32"/>

<!-- Stage 5: Seedling -->
<g transform="translate(400,205)">
  <!-- Roots -->
  <line x1="0" y1="20" x2="-5" y2="32" stroke="#8D6E63" stroke-width="1.2"/>
  <line x1="0" y1="20" x2="3" y2="34" stroke="#8D6E63" stroke-width="1"/>
  <line x1="0" y1="20" x2="8" y2="30" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Stem -->
  <line x1="0" y1="20" x2="0" y2="-15" stroke="#4CAF50" stroke-width="2"/>
  <!-- True leaves -->
  <path d="M0,-5 Q12,-10 14,-2 Q8,0 0,-5" fill="#4CAF50"/>
  <path d="M0,-5 Q-12,-10 -14,-2 Q-8,0 0,-5" fill="#66BB6A"/>
  <path d="M0,-12 Q10,-18 10,-10 Q6,-10 0,-12" fill="#388E3C"/>
  <path d="M0,-12 Q-10,-18 -10,-10 Q-6,-10 0,-12" fill="#4CAF50"/>
  <text x="0" y="45" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">Растение</text>
</g>

<!-- GERMINATION TYPES (bottom left) -->
<text x="130" y="272" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Типы прорастания</text>

<!-- Above-ground (надземное) -->
<g transform="translate(65,305)">
  <rect x="-45" y="-25" width="90" height="50" rx="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Soil line -->
  <line x1="-40" y1="5" x2="40" y2="5" stroke="#795548" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="35" y="3" font-family="Arial,sans-serif" font-size="5" fill="#795548">почва</text>
  <!-- Cotyledons above ground -->
  <ellipse cx="0" cy="-8" rx="8" ry="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="4" fill="#1B5E20" text-anchor="middle">С1</text>
  <ellipse cx="8" cy="-6" rx="8" ry="5" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
  <!-- Stem above ground -->
  <line x1="0" y1="-3" x2="0" y2="5" stroke="#4CAF50" stroke-width="1"/>
  <!-- Root below -->
  <line x1="0" y1="5" x2="0" y2="18" stroke="#8D6E63" stroke-width="1"/>
  <!-- True leaves -->
  <path d="M0,-12 Q6,-15 5,-10" fill="#2E7D32" stroke-width="0.5"/>
  <path d="M0,-12 Q-6,-15 -5,-10" fill="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="-18" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle" font-weight="bold">Надземное</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Фасоль, тыква</text>
</g>

<!-- Underground (подземное) -->
<g transform="translate(195,305)">
  <rect x="-45" y="-25" width="90" height="50" rx="5" fill="#E8F5E9" stroke="#388E3C" stroke-width="0.8"/>
  <!-- Soil line -->
  <line x1="-40" y1="5" x2="40" y2="5" stroke="#795548" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Cotyledons underground -->
  <ellipse cx="0" cy="12" rx="8" ry="5" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
  <ellipse cx="8" cy="13" rx="8" ry="5" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
  <!-- Stem above ground only -->
  <line x1="4" y1="5" x2="4" y2="-10" stroke="#4CAF50" stroke-width="1"/>
  <!-- Root below -->
  <line x1="0" y1="17" x2="-3" y2="22" stroke="#8D6E63" stroke-width="1"/>
  <!-- True leaves above ground -->
  <path d="M4,-8 Q10,-12 8,-5" fill="#2E7D32"/>
  <path d="M4,-8 Q-2,-12 0,-5" fill="#4CAF50"/>
  <text x="0" y="-18" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Подземное</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Горох, пшеница</text>
</g>

<!-- EXPERIMENT SETUP (bottom right) -->
<text x="370" y="272" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Опыт: условия прорастания</text>

<!-- Experiment 1: All conditions (control) -->
<g transform="translate(320,310)">
  <rect x="-18" y="-18" width="36" height="36" rx="3" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.8"/>
  <!-- Seed -->
  <ellipse cx="0" cy="4" rx="5" ry="3" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
  <!-- Sprout -->
  <line x1="0" y1="2" x2="0" y2="-6" stroke="#4CAF50" stroke-width="1"/>
  <circle cx="0" cy="-8" r="2" fill="#66BB6A"/>
  <!-- Water drops -->
  <circle cx="-10" cy="-8" r="2" fill="#42A5F5" opacity="0.5"/>
  <circle cx="10" cy="-6" r="2" fill="#42A5F5" opacity="0.5"/>
  <!-- Temperature -->
  <text x="0" y="-14" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">25°C</text>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">+ Проросло ✓</text>
</g>

<!-- Experiment 2: No water -->
<g transform="translate(370,310)">
  <rect x="-18" y="-18" width="36" height="36" rx="3" fill="#FFF" stroke="#9E9E9E" stroke-width="0.8"/>
  <!-- Dry seed -->
  <ellipse cx="0" cy="2" rx="5" ry="3" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- No water cross -->
  <circle cx="0" cy="-8" r="5" fill="none" stroke="#C62828" stroke-width="0.5"/>
  <line x1="-3" y1="-11" x2="3" y2="-5" stroke="#C62828" stroke-width="1"/>
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="4" fill="#42A5F5" text-anchor="middle">H₂O</text>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">— Не проросло ✗</text>
</g>

<!-- Experiment 3: No oxygen -->
<g transform="translate(420,310)">
  <rect x="-18" y="-18" width="36" height="36" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <!-- Seed underwater (boiled water) -->
  <rect x="-15" y="-8" width="30" height="20" rx="2" fill="#BBDEFB" opacity="0.5"/>
  <ellipse cx="0" cy="4" rx="5" ry="3" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- No oxygen cross -->
  <circle cx="0" cy="-10" r="5" fill="none" stroke="#C62828" stroke-width="0.5"/>
  <line x1="-3" y1="-13" x2="3" y2="-7" stroke="#C62828" stroke-width="1"/>
  <text x="0" y="-10" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle">O₂</text>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">— Не проросло ✗</text>
</g>

<!-- Experiment 4: Cold -->
<g transform="translate(470,310)">
  <rect x="-18" y="-18" width="36" height="36" rx="3" fill="#E8EAF6" stroke="#3F51B5" stroke-width="0.8"/>
  <!-- Seed -->
  <ellipse cx="0" cy="4" rx="5" ry="3" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- Snowflake -->
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">*</text>
  <text x="0" y="-14" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">2°C</text>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">— Не проросло ✗</text>
</g>
</svg>