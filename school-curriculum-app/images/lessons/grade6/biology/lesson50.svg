<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="fireG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF6F00"/><stop offset="100%" stop-color="#DD2C00"/></linearGradient>
<linearGradient id="bookG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E53935"/><stop offset="100%" stop-color="#B71C1C"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Влияние деятельности человека на растительный мир</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 50</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- SECTION 1: Negative impacts -->
<text x="250" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Негативное влияние человека</text>

<!-- Deforestation -->
<rect x="10" y="72" width="92" height="58" rx="3" fill="#FFEBEE" opacity="0.3" stroke="#C62828" stroke-width="0.5"/>
<text x="56" y="82" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#B71C1C" text-anchor="middle">Вырубка лесов</text>
