<rect x="35" y="112" width="8" height="5" rx="1" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
<rect x="55" y="112" width="8" height="5" rx="1" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
<rect x="75" y="112" width="8" height="5" rx="1" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
