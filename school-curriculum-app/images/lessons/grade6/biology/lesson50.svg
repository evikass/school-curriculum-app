<!-- Shield icon -->
<path d="M160,200 L160,208 Q160,215 168,218 Q176,215 176,208 L176,200 Z" fill="#2E7D32" opacity="0.3" stroke="#1B5E20" stroke-width="0.5"/>
<text x="168" y="212" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">🛡</text>

