<text x="250" y="296" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">природа</text>

<!-- Final message -->
<rect x="345" y="260" width="145" height="72" rx="4" fill="#FFF" opacity="0.3" stroke="#2E7D32" stroke-width="0.5"/>
<text x="417" y="272" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Что может каждый:</text>
<text x="417" y="282" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">1. Не рвать редкие цветы</text>
<text x="417" y="290" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">2. Не разжигать костры в лесу</text>
<text x="417" y="298" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">3. Участвовать в посадках</text>
<text x="417" y="306" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">4. Не мусорить в природе</text>
<text x="417" y="314" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">5. Беречь зелёные зоны</text>
<text x="417" y="326" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">«Природа — наш общий дом»</text>
