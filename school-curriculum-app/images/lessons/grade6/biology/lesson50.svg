<text x="67" y="193" font-family="Arial,sans-serif" font-size="4.5" fill="#666">0 — исчезнувшие</text>
<text x="67" y="199" font-family="Arial,sans-serif" font-size="4.5" fill="#666">1 — под угрозой</text>
<text x="67" y="205" font-family="Arial,sans-serif" font-size="4.5" fill="#666">2 — сокращающиеся</text>
<text x="67" y="211" font-family="Arial,sans-serif" font-size="4.5" fill="#666">3 — редкие</text>
<text x="67" y="217" font-family="Arial,sans-serif" font-size="4.5" fill="#666">4 — неопределённые</text>
<text x="67" y="223" font-family="Arial,sans-serif" font-size="4.5" fill="#666">5 — восстанавливаемые</text>

