<path d="M320,100 L335,100" stroke="#BDBDBD" stroke-width="0.5" stroke-dasharray="2,1"/>
<path d="M325,104 L340,104" stroke="#BDBDBD" stroke-width="0.5" stroke-dasharray="2,1"/>
<text x="356" y="125" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">перевыпас, эрозия</text>

<!-- Invasive species -->
<rect x="410" y="72" width="82" height="58" rx="3" fill="#F3E5F5" opacity="0.3" stroke="#7B1FA2" stroke-width="0.5"/>
<text x="451" y="82" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Вселенцы</text>
