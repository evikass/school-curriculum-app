<circle cx="465" cy="95" r="6" fill="#FFD54F" stroke="#F57F17" stroke-width="0.5"/>
<text x="465" y="98" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle">!</text>
<text x="451" y="125" font-family="Arial,sans-serif" font-size="4" fill="#666" text-anchor="middle">борщевик Сосновского</text>

<!-- SECTION 2: Красная книга и охрана -->
<text x="250" y="147" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Охрана растений</text>

