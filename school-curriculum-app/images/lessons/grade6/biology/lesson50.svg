<!-- SECTION 3: Course summary circle -->
<text x="250" y="245" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Итог курса: Биология 6 класс</text>

<!-- Circular arrangement of course topics -->
<!-- Circle path -->
<circle cx="250" cy="290" r="38" fill="none" stroke="#2E7D32" stroke-width="0.5" stroke-dasharray="3,2"/>

<!-- Bacteria (top) -->
