<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="seedG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#BCAAA4"/><stop offset="100%" stop-color="#8D6E63"/></linearGradient>
<linearGradient id="sunG" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF176"/><stop offset="100%" stop-color="#FFB300"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Рост и развитие растений</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 44</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- SECTION 1: Growth stages -->
<text x="250" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Стадии развития растения</text>

<!-- Stage 1: Seed -->
<ellipse cx="50" cy="100" rx="14" ry="10" fill="url(#seedG)" stroke="#5D4037" stroke-width="0.8"/>
<line x1="43" y1="97" x2="57" y2="97" stroke="#795548" stroke-width="0.3"/>
<text x="50" y="118" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Семя</text>

<!-- Arrow -->
<path d="M70,100 L90,100" stroke="#2E7D32" stroke-width="1" fill="none"/>
<polygon points="90,98 94,100 90,102" fill="#2E7D32"/>

<!-- Stage 2: Seedling -->
<line x1="110" y1="115" x2="110" y2="95" stroke="#66BB6A" stroke-width="1.5"/>
<path d="M110,100 Q100,92 95,96" stroke="#81C784" stroke-width="1" fill="#A5D6A7"/>
<path d="M110,98 Q120,90 125,94" stroke="#81C784" stroke-width="1" fill="#A5D6A7"/>
<!-- Small root -->
<path d="M110,115 Q107,122 103,126" stroke="#8D6E63" stroke-width="0.8" fill="none"/>
<path d="M110,115 Q113,122 117,126" stroke="#8D6E63" stroke-width="0.8" fill="none"/>
<!-- Seed coat remnants -->
<ellipse cx="110" cy="112" rx="6" ry="4" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.3" opacity="0.5"/>
<text x="110" y="135" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Проросток</text>

<!-- Arrow -->
<path d="M130,105 L150,105" stroke="#2E7D32" stroke-width="1" fill="none"/>
<polygon points="150,103 154,105 150,107" fill="#2E7D32"/>

<!-- Stage 3: Young plant -->
<line x1="175" y1="120" x2="175" y2="82" stroke="#4CAF50" stroke-width="2"/>
<path d="M175,88 Q162,78 155,82" stroke="#66BB6A" stroke-width="1.2" fill="#81C784"/>
<path d="M175,85 Q188,75 195,79" stroke="#66BB6A" stroke-width="1.2" fill="#81C784"/>
<path d="M175,92 Q165,85 158,90" stroke="#81C784" stroke-width="1" fill="#A5D6A7"/>
<path d="M175,90 Q185,83 192,88" stroke="#81C784" stroke-width="1" fill="#A5D6A7"/>
<!-- Roots -->
<path d="M175,120 Q170,130 165,135" stroke="#8D6E63" stroke-width="1" fill="none"/>
<path d="M175,120 Q180,130 185,135" stroke="#8D6E63" stroke-width="1" fill="none"/>
<text x="175" y="145" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Взрослое</text>
<text x="175" y="153" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">растение</text>

<!-- Arrow -->
<path d="M195,105 L215,105" stroke="#2E7D32" stroke-width="1" fill="none"/>
<polygon points="215,103 219,105 215,107" fill="#2E7D32"/>

<!-- Stage 4: Flowering -->
<line x1="240" y1="120" x2="240" y2="80" stroke="#4CAF50" stroke-width="2.5"/>
<path d="M240,88 Q225,78 218,83" stroke="#66BB6A" stroke-width="1.5" fill="#81C784"/>
<path d="M240,85 Q255,75 262,80" stroke="#66BB6A" stroke-width="1.5" fill="#81C784"/>
<path d="M240,95 Q228,88 222,93" stroke="#81C784" stroke-width="1.2" fill="#A5D6A7"/>
<path d="M240,93 Q252,86 258,91" stroke="#81C784" stroke-width="1.2" fill="#A5D6A7"/>
<!-- Flower -->
<circle cx="240" cy="75" r="7" fill="#FF8A65" stroke="#E64A19" stroke-width="0.5"/>
<circle cx="233" cy="75" r="4" fill="#FFAB91" stroke="#FF7043" stroke-width="0.3"/>
<circle cx="247" cy="75" r="4" fill="#FFAB91" stroke="#FF7043" stroke-width="0.3"/>
<circle cx="240" cy="68" r="4" fill="#FFAB91" stroke="#FF7043" stroke-width="0.3"/>
<circle cx="240" cy="75" r="3" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
<text x="240" y="135" font-family="Arial,sans-serif" font-size="6" fill="#E64A19" text-anchor="middle">Цветение</text>

<!-- Arrow -->
<path d="M260,105 L280,105" stroke="#2E7D32" stroke-width="1" fill="none"/>
<polygon points="280,103 284,105 280,107" fill="#2E7D32"/>

<!-- Stage 5: Fruiting -->
<line x1="305" y1="120" x2="305" y2="82" stroke="#4CAF50" stroke-width="2.5"/>
<path d="M305,90 Q290,80 283,85" stroke="#66BB6A" stroke-width="1.5" fill="#81C784"/>
<path d="M305,87 Q320,77 327,82" stroke="#66BB6A" stroke-width="1.5" fill="#81C784"/>
<!-- Fruit -->
<ellipse cx="305" cy="78" rx="6" ry="8" fill="#E53935" stroke="#C62828" stroke-width="0.5"/>
<!-- Flower remnants -->
<path d="M303,70 L305,67 L307,70" fill="none" stroke="#4CAF50" stroke-width="0.5"/>
<text x="305" y="135" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Плодо-</text>
<text x="305" y="143" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">ношение</text>

<!-- Curved arrow back to seed -->
<path d="M305,148 Q280,165 50,130 Q30,125 35,110" stroke="#5D4037" stroke-width="0.8" fill="none" stroke-dasharray="3,2"/>
<polygon points="33,112 35,107 37,112" fill="#5D4037"/>
<text x="170" y="165" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">жизненный цикл</text>

<!-- SECTION 2: Tropisms -->
<text x="400" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Тропизмы</text>

<!-- Phototropism -->
<rect x="325" y="72" width="80" height="55" rx="3" fill="#FFF9C4" opacity="0.3" stroke="#F9A825" stroke-width="0.5"/>
<text x="365" y="82" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#F57F17" text-anchor="middle">Фототропизм</text>
<!-- Sun -->
<circle cx="390" cy="92" r="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.4"/>
<line x1="390" y1="86" x2="390" y2="84" stroke="#FFB300" stroke-width="0.4"/>
<line x1="395" y1="88" x2="397" y2="86" stroke="#FFB300" stroke-width="0.4"/>
<!-- Plant bending toward light -->
<path d="M345,120 Q345,105 355,95 Q362,90 370,88" stroke="#4CAF50" stroke-width="1.5" fill="none"/>
<ellipse cx="372" cy="87" rx="6" ry="4" fill="#81C784" stroke="#388E3C" stroke-width="0.4"/>
<!-- Light rays -->
<path d="M385,92 L375,95" stroke="#FFB300" stroke-width="0.4" stroke-dasharray="1,1"/>
<path d="M385,92 L378,98" stroke="#FFB300" stroke-width="0.4" stroke-dasharray="1,1"/>
<text x="365" y="124" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">к свету →</text>

<!-- Geotropism -->
<rect x="415" y="72" width="80" height="55" rx="3" fill="#EFEBE9" opacity="0.3" stroke="#795548" stroke-width="0.5"/>
<text x="455" y="82" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#5D4037" text-anchor="middle">Геотропизм</text>
<!-- Gravity arrow -->
<path d="M455,87 L455,97" stroke="#5D4037" stroke-width="1" fill="none"/>
<polygon points="453,97 455,101 457,97" fill="#5D4037"/>
<text x="465" y="95" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">g</text>
<!-- Root going down -->
<path d="M445,90 L445,115" stroke="#8D6E63" stroke-width="1.5" fill="none"/>
<path d="M445,115 Q442,118 440,120" stroke="#8D6E63" stroke-width="1" fill="none"/>
<path d="M445,115 Q448,118 450,120" stroke="#8D6E63" stroke-width="1" fill="none"/>
<!-- Shoot going up -->
<path d="M455,90 L455,87" stroke="#4CAF50" stroke-width="1.5" fill="none"/>
<ellipse cx="455" cy="86" rx="5" ry="3" fill="#81C784" stroke="#388E3C" stroke-width="0.4"/>
<text x="445" y="97" font-family="Arial,sans-serif" font-size="4" fill="#4CAF50">↑ побег</text>
<text x="445" y="108" font-family="Arial,sans-serif" font-size="4" fill="#5D4037">↓ корень</text>
<text x="455" y="124" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">+geo / -geo</text>

<!-- SECTION 3: Phytohormones -->
<text x="250" y="183" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Фитогормоны</text>

<!-- Auxin -->
<rect x="15" y="188" width="90" height="38" rx="4" fill="#E8EAF6" opacity="0.4" stroke="#3F51B5" stroke-width="0.5"/>
<text x="60" y="199" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#283593" text-anchor="middle">Ауксин</text>
<text x="60" y="209" font-family="Arial,sans-serif" font-size="5" fill="#3F51B5" text-anchor="middle">рост клеток</text>
<text x="60" y="217" font-family="Arial,sans-serif" font-size="5" fill="#3F51B5" text-anchor="middle">тропизмы, верхушка</text>
<!-- Arrow pointing down -->
<path d="M60,220 L60,225" stroke="#3F51B5" stroke-width="0.8"/>

<!-- Gibberellin -->
<rect x="115" y="188" width="90" height="38" rx="4" fill="#E8F5E9" opacity="0.4" stroke="#4CAF50" stroke-width="0.5"/>
<text x="160" y="199" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Гиббереллин</text>
<text x="160" y="209" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">удлинение стебля</text>
<text x="160" y="217" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">прорастание семян</text>

<!-- Cytokinin -->
<rect x="215" y="188" width="90" height="38" rx="4" fill="#FFF3E0" opacity="0.4" stroke="#FF9800" stroke-width="0.5"/>
<text x="260" y="199" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Цитокинин</text>
<text x="260" y="209" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">деление клеток</text>
<text x="260" y="217" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">рост побегов</text>

<!-- Ethylene -->
<rect x="315" y="188" width="90" height="38" rx="4" fill="#FCE4EC" opacity="0.4" stroke="#E91E63" stroke-width="0.5"/>
<text x="360" y="199" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#880E4F" text-anchor="middle">Этилен</text>
<text x="360" y="209" font-family="Arial,sans-serif" font-size="5" fill="#C2185B" text-anchor="middle">созревание плодов</text>
<text x="360" y="217" font-family="Arial,sans-serif" font-size="5" fill="#C2185B" text-anchor="middle">старение, опадение</text>

<!-- Abscisic acid -->
<rect x="415" y="188" width="80" height="38" rx="4" fill="#EFEBE9" opacity="0.4" stroke="#795548" stroke-width="0.5"/>
<text x="455" y="199" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#4E342E" text-anchor="middle">Абсцизовая</text>
<text x="455" y="207" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#4E342E" text-anchor="middle">кислота</text>
<text x="455" y="217" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">покой, стресс</text>

<!-- SECTION 4: Life forms by duration -->
<text x="125" y="248" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Жизненные формы (по продолжительности)</text>

<!-- Annual -->
<rect x="15" y="255" width="145" height="52" rx="3" fill="#FFF9C4" opacity="0.3" stroke="#F9A825" stroke-width="0.5"/>
<text x="87" y="266" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17" text-anchor="middle">Однолетние</text>
<!-- Small plant with flower -->
<line x1="87" y1="290" x2="87" y2="275" stroke="#66BB6A" stroke-width="1.5"/>
<path d="M87,278 Q77,273 72,276" stroke="#81C784" stroke-width="1" fill="#A5D6A7"/>
<path d="M87,278 Q97,273 102,276" stroke="#81C784" stroke-width="1" fill="#A5D6A7"/>
<circle cx="87" cy="274" r="3" fill="#FF8A65" stroke="#E64A19" stroke-width="0.3"/>
<text x="87" y="300" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">1 сезон: рожь, горох</text>

<!-- Biennial -->
<rect x="170" y="255" width="145" height="52" rx="3" fill="#C8E6C9" opacity="0.3" stroke="#4CAF50" stroke-width="0.5"/>
<text x="242" y="266" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Двулетние</text>
<!-- Year 1: rosette -->
<ellipse cx="222" cy="283" rx="12" ry="5" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
<text x="222" y="295" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32" text-anchor="middle">1 год</text>
<text x="222" y="300" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32" text-anchor="middle">розетка</text>
<!-- Year 2: flowering -->
<line x1="262" y1="290" x2="262" y2="273" stroke="#4CAF50" stroke-width="1.5"/>
<ellipse cx="262" cy="280" rx="8" ry="3" fill="#81C784" stroke="#388E3C" stroke-width="0.5"/>
<circle cx="262" cy="272" r="3" fill="#FF8A65" stroke="#E64A19" stroke-width="0.3"/>
<text x="262" y="295" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32" text-anchor="middle">2 год</text>
<text x="242" y="305" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">морковь, свёкла</text>

<!-- Perennial -->
<rect x="325" y="255" width="165" height="52" rx="3" fill="#E8F5E9" opacity="0.3" stroke="#1B5E20" stroke-width="0.5"/>
<text x="407" y="266" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Многолетние</text>
<!-- Tree -->
<rect x="400" y="278" width="6" height="16" rx="1" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
<ellipse cx="403" cy="274" rx="12" ry="10" fill="#66BB6A" stroke="#388E3C" stroke-width="0.8"/>
<!-- Trunk rings -->
<text x="430" y="280" font-family="Arial,sans-serif" font-size="4" fill="#1B5E20">деревья</text>
<text x="430" y="286" font-family="Arial,sans-serif" font-size="4" fill="#1B5E20">кустарники</text>
<text x="430" y="292" font-family="Arial,sans-serif" font-size="4" fill="#1B5E20">травы</text>
<text x="407" y="305" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">дуб, яблоня, пырей</text>

<!-- Summary -->
<rect x="15" y="316" width="470" height="25" rx="3" fill="#FFF" opacity="0.3" stroke="#2E7D32" stroke-width="0.5"/>
<text x="250" y="328" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Рост — увеличение размеров (клетки делятся и растягиваются). Развитие — качественные изменения.</text>
<text x="250" y="338" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">Фотопериодизм (длинный/короткий день), яровизация (влияние холода), настии (движения без направления)</text>
</svg>