<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Классы покрытосеменных: Двудольные и Однодольные</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 26</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- HEADER LABELS -->
<rect x="30" y="55" width="210" height="16" rx="3" fill="#1565C0" opacity="0.15"/>
<text x="135" y="67" font-family="Arial,sans-serif" font-size="9" fill="#1565C0" text-anchor="middle" font-weight="bold">Двудольные (Dicotyledones)</text>
<rect x="260" y="55" width="210" height="16" rx="3" fill="#E65100" opacity="0.15"/>
<text x="365" y="67" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Однодольные (Monocotyledones)</text>

<!-- Vertical divider -->
<line x1="250" y1="55" x2="250" y2="345" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- 1. SEED COMPARISON -->
<text x="135" y="82" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Семя</text>
<!-- Dicot seed - bean -->
<g transform="translate(100,108)">
  <ellipse cx="0" cy="0" rx="28" ry="18" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
  <!-- Two cotyledons -->
  <path d="M-1,-15 Q-18,-5 -1,15" fill="none" stroke="#8D6E63" stroke-width="0.8"/>
  <ellipse cx="-12" cy="0" rx="12" ry="14" fill="#A5D6A7" opacity="0.5"/>
  <ellipse cx="12" cy="0" rx="12" ry="14" fill="#81C784" opacity="0.5"/>
  <text x="-12" y="3" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">С1</text>
  <text x="12" y="3" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">С2</text>
  <!-- Embryo -->
  <circle cx="0" cy="-5" r="2" fill="#1B5E20"/>
  <text x="0" y="28" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">2 семядоли</text>
</g>

<text x="365" y="82" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Семя</text>
<!-- Monocot seed - wheat -->
<g transform="translate(345,108)">
  <ellipse cx="0" cy="0" rx="14" ry="22" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <!-- Single cotyledon (shield) -->
  <path d="M6,-12 Q10,0 6,12" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
  <text x="10" y="3" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Щ</text>
  <!-- Endosperm -->
  <ellipse cx="-4" cy="0" rx="8" ry="16" fill="#FFF3E0" opacity="0.6"/>
  <text x="-4" y="3" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Э</text>
  <!-- Embryo -->
  <circle cx="6" cy="-8" r="2" fill="#E65100"/>
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">1 семядоля (щиток)</text>
</g>

<!-- 2. LEAF VENATION -->
<text x="135" y="148" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Жилкование листа</text>
<!-- Dicot - netted venation -->
<g transform="translate(115,180)">
  <path d="M0,-25 Q25,-18 30,0 Q25,18 0,25 Q-25,18 -30,0 Q-25,-18 0,-25" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Main vein -->
  <line x1="0" y1="-25" x2="0" y2="25" stroke="#2E7D32" stroke-width="1"/>
  <!-- Side veins -->
  <line x1="0" y1="-15" x2="-18" y2="-20" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="0" y1="-15" x2="18" y2="-20" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="0" y1="-5" x2="-22" y2="-8" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="0" y1="-5" x2="22" y2="-8" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="0" y1="5" x2="-24" y2="2" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="0" y1="5" x2="24" y2="2" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="0" y1="15" x2="-20" y2="15" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="0" y1="15" x2="20" y2="15" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Net connections -->
  <line x1="-15" y1="-18" x2="-20" y2="-6" stroke="#388E3C" stroke-width="0.3" opacity="0.5"/>
  <line x1="15" y1="-18" x2="20" y2="-6" stroke="#388E3C" stroke-width="0.3" opacity="0.5"/>
  <text x="0" y="35" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Сетчатое</text>
</g>

<text x="365" y="148" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Жилкование листа</text>
<!-- Monocot - parallel venation -->
<g transform="translate(365,180)">
  <path d="M0,-25 Q10,-18 12,0 Q10,18 0,25 Q-10,18 -12,0 Q-10,-18 0,-25" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Parallel veins -->
  <line x1="-8" y1="-22" x2="-8" y2="22" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="-4" y1="-24" x2="-4" y2="24" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="0" y1="-25" x2="0" y2="25" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="4" y1="-24" x2="4" y2="24" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="8" y1="-22" x2="8" y2="22" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="35" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Параллельное / Дуговое</text>
</g>

<!-- 3. ROOT SYSTEM -->
<text x="135" y="222" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Корневая система</text>
<!-- Dicot - taproot -->
<g transform="translate(135,260)">
  <line x1="0" y1="-12" x2="0" y2="25" stroke="#8D6E63" stroke-width="2.5"/>
  <line x1="0" y1="0" x2="-12" y2="12" stroke="#8D6E63" stroke-width="1.2"/>
  <line x1="0" y1="5" x2="12" y2="15" stroke="#8D6E63" stroke-width="1"/>
  <line x1="0" y1="10" x2="-8" y2="20" stroke="#8D6E63" stroke-width="0.8"/>
  <text x="0" y="35" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Стержневая</text>
  <text x="0" y="43" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(главный корень)</text>
</g>

<text x="365" y="222" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Корневая система</text>
<!-- Monocot - fibrous -->
<g transform="translate(365,260)">
  <line x1="0" y1="-12" x2="-10" y2="20" stroke="#8D6E63" stroke-width="1.5"/>
  <line x1="0" y1="-12" x2="-4" y2="22" stroke="#8D6E63" stroke-width="1.5"/>
  <line x1="0" y1="-12" x2="3" y2="22" stroke="#8D6E63" stroke-width="1.5"/>
  <line x1="0" y1="-12" x2="10" y2="20" stroke="#8D6E63" stroke-width="1.5"/>
  <line x1="0" y1="-12" x2="-14" y2="15" stroke="#8D6E63" stroke-width="1.2"/>
  <line x1="0" y1="-12" x2="14" y2="15" stroke="#8D6E63" stroke-width="1.2"/>
  <text x="0" y="35" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Мочковатая</text>
  <text x="0" y="43" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(придаточные корни)</text>
</g>

<!-- 4. FLOWER PARTS -->
<text x="60" y="222" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Цветок</text>
<!-- Dicot flower (5 parts) -->
<g transform="translate(55,245)">
  <circle cx="0" cy="-8" r="3" fill="#FFC107"/>
  <path d="M0,-5 Q-8,-12 -5,-18 Q0,-15 0,-5" fill="#E91E63" opacity="0.6"/>
  <path d="M0,-5 Q8,-12 5,-18 Q0,-15 0,-5" fill="#E91E63" opacity="0.6"/>
  <path d="M0,-5 Q-15,-5 -18,-12 Q-12,-8 0,-5" fill="#F06292" opacity="0.5"/>
  <path d="M0,-5 Q15,-5 18,-12 Q12,-8 0,-5" fill="#F06292" opacity="0.5"/>
  <path d="M0,-5 Q-12,5 -15,0 Q-8,-2 0,-5" fill="#EC407A" opacity="0.5"/>
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">4-5 частей</text>
</g>

<text x="440" y="222" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Цветок</text>
<!-- Monocot flower (3 parts) -->
<g transform="translate(440,245)">
  <circle cx="0" cy="-6" r="2.5" fill="#FFC107"/>
  <path d="M0,-4 Q-8,-10 -5,-16 Q0,-12 0,-4" fill="#9C27B0" opacity="0.6"/>
  <path d="M0,-4 Q8,-10 5,-16 Q0,-12 0,-4" fill="#9C27B0" opacity="0.6"/>
  <path d="M0,-4 Q-10,0 -12,-6 Q-6,-4 0,-4" fill="#AB47BC" opacity="0.5"/>
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">3 части</text>
</g>

<!-- 5. STEM STRUCTURE (small icons) -->
<text x="195" y="222" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Стебель</text>
<!-- Dicot stem cross-section (ring of bundles) -->
<g transform="translate(195,240)">
  <circle cx="0" cy="0" r="12" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
  <circle cx="0" cy="0" r="8" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.3"/>
  <circle cx="0" cy="0" r="3" fill="#D7CCC8"/>
  <!-- Vascular bundles in ring -->
  <circle cx="0" cy="-10" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <circle cx="9" cy="-5" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <circle cx="9" cy="5" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <circle cx="0" cy="10" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <circle cx="-9" cy="5" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <circle cx="-9" cy="-5" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Камбий есть</text>
</g>

<text x="310" y="222" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Стебель</text>
<!-- Monocot stem (scattered bundles) -->
<g transform="translate(310,240)">
  <circle cx="0" cy="0" r="12" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.5"/>
  <!-- Scattered vascular bundles -->
  <circle cx="-4" cy="-6" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <circle cx="5" cy="-4" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <circle cx="2" cy="5" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <circle cx="-6" cy="3" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <circle cx="7" cy="4" r="2" fill="#FF9800" stroke="#E65100" stroke-width="0.3"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Камбия нет</text>
</g>

<!-- EXAMPLE PLANTS -->
<rect x="30" y="305" width="210" height="35" rx="5" fill="#1565C0" opacity="0.08" stroke="#1565C0" stroke-width="0.5"/>
<text x="135" y="318" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Примеры:</text>
<text x="135" y="330" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Розоцветные, Бобовые, Крестоцветные,</text>
<text x="135" y="339" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Паслёновые, Сложноцветные</text>

<rect x="260" y="305" width="210" height="35" rx="5" fill="#E65100" opacity="0.08" stroke="#E65100" stroke-width="0.5"/>
<text x="365" y="318" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Примеры:</text>
<text x="365" y="330" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Злаковые, Лилейные,</text>
<text x="365" y="339" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Орхидные, Пальмы</text>
</svg>