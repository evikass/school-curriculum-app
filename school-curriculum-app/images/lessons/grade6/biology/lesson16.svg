<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="greenAlgae" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
<linearGradient id="brownAlgae" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A1887F"/><stop offset="100%" stop-color="#6D4C41"/></linearGradient>
<linearGradient id="redAlgae" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E57373"/><stop offset="100%" stop-color="#C62828"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Водоросли, их многообразие и строение</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 16</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Зелёные водоросли — Хламидомонада -->
<text x="95" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Зелёные водоросли</text>

<g transform="translate(30,75)">
<!-- Chlamydomonas (large cell) -->
<ellipse cx="65" cy="45" rx="32" ry="28" fill="url(#greenAlgae)" opacity="0.35" stroke="#4CAF50" stroke-width="1.5"/>

<!-- Cell wall -->
<ellipse cx="65" cy="45" rx="32" ry="28" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,1"/>

<!-- Cup-shaped chloroplast -->
<path d="M42,38 Q50,25 65,25 Q80,25 88,38 Q85,55 65,58 Q45,55 42,38Z" fill="#4CAF50" opacity="0.3" stroke="#2E7D32" stroke-width="0.8"/>

<!-- Pyrenoid -->
<circle cx="65" cy="42" r="6" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.6"/>
<text x="65" y="44" font-family="Arial,sans-serif" font-size="4.5" fill="#F57F17" text-anchor="middle">пиреноид</text>

<!-- Nucleus -->
<ellipse cx="65" cy="32" rx="8" ry="5" fill="#1B5E20" opacity="0.25" stroke="#1B5E20" stroke-width="0.5"/>
<text x="65" y="34" font-family="Arial,sans-serif" font-size="4" fill="#1B5E20" text-anchor="middle">ядро</text>

<!-- Eye spot (стигма) -->
<ellipse cx="48" cy="35" rx="4" ry="2.5" fill="#FF5722" opacity="0.5" stroke="#D84315" stroke-width="0.4"/>

<!-- Flagella -->
<path d="M55,18 Q50,8 45,2" fill="none" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M75,18 Q80,8 85,2" fill="none" stroke="#4CAF50" stroke-width="0.8"/>

<!-- Contractile vacuoles -->
<circle cx="48" cy="25" r="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.4"/>
<circle cx="82" cy="25" r="3" fill="#E3F2FD" stroke="#1976D2" stroke-width="0.4"/>

<!-- Labels -->
<text x="10" y="35" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">жгутики</text>
<line x1="28" y1="32" x2="44" y2="8" stroke="#2E7D32" stroke-width="0.3" stroke-dasharray="1,1"/>

<text x="100" y="32" font-family="Arial,sans-serif" font-size="5.5" fill="#D84315">стигма</text>
<line x1="99" y1="33" x2="52" y2="35" stroke="#D84315" stroke-width="0.3" stroke-dasharray="1,1"/>

<text x="100" y="48" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">хлоропласт</text>
<line x1="99" y1="47" x2="88" y2="42" stroke="#2E7D32" stroke-width="0.3" stroke-dasharray="1,1"/>

<text x="100" y="22" font-family="Arial,sans-serif" font-size="5.5" fill="#1976D2">пульсирующие</text>
<text x="100" y="28" font-family="Arial,sans-serif" font-size="5.5" fill="#1976D2">вакуоли</text>

<text x="65" y="82" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Хламидомонада</text>
<text x="65" y="90" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">одноклеточная</text>
</g>

<!-- Section 2: Бурые водоросли — Ламинария -->
<text x="245" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#5D4037" text-anchor="middle">Бурые водоросли</text>

<g transform="translate(185,75)">
<!-- Laminaria (kelp) -->
<!-- Holdfast -->
<path d="M50,85 Q40,80 30,88 Q25,92 35,92" fill="#6D4C41" stroke="#4E342E" stroke-width="0.8"/>
<path d="M50,85 Q55,80 65,88 Q68,92 60,92" fill="#6D4C41" stroke="#4E342E" stroke-width="0.8"/>
<text x="50" y="98" font-family="Arial,sans-serif" font-size="5" fill="#4E342E" text-anchor="middle">ризоиды</text>

<!-- Stipe -->
<rect x="46" y="50" width="8" height="35" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
<text x="62" y="68" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">стебель</text>

<!-- Blade (thallus) -->
<path d="M25,15 Q30,5 50,0 Q70,5 75,15 Q78,30 75,50 L50,50 L25,50 Q22,30 25,15Z" fill="url(#brownAlgae)" opacity="0.4" stroke="#5D4037" stroke-width="1"/>
<!-- Midrib -->
<line x1="50" y1="5" x2="50" y2="50" stroke="#5D4037" stroke-width="1"/>

<!-- Sporangia areas -->
<ellipse cx="40" cy="25" rx="6" ry="4" fill="#FFCC80" opacity="0.3" stroke="#E65100" stroke-width="0.3"/>
<ellipse cx="60" cy="30" rx="6" ry="4" fill="#FFCC80" opacity="0.3" stroke="#E65100" stroke-width="0.3"/>

<text x="80" y="20" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">слоевище</text>
<text x="80" y="27" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">(таллом)</text>
<line x1="79" y1="22" x2="72" y2="22" stroke="#5D4037" stroke-width="0.3" stroke-dasharray="1,1"/>

<text x="80" y="10" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">сорус</text>
<line x1="79" y1="10" x2="66" y2="28" stroke="#E65100" stroke-width="0.3" stroke-dasharray="1,1"/>

<text x="50" y="110" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#5D4037" text-anchor="middle">Ламинария</text>
<text x="50" y="118" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">многоклеточная</text>
</g>

<!-- Section 3: Красные водоросли — Порфира -->
<text x="410" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">Красные водоросли</text>

<g transform="translate(360,75)">
<!-- Porphyra thallus -->
<path d="M30,5 Q45,0 55,5 Q65,15 60,30 Q55,45 45,55 Q35,60 30,50 Q25,40 22,25 Q20,15 30,5Z" fill="url(#redAlgae)" opacity="0.35" stroke="#C62828" stroke-width="1"/>
<!-- Wavy edges -->
<path d="M30,5 Q32,10 28,15 Q32,20 28,25 Q32,30 28,35 Q32,40 28,45 Q32,50 30,50" fill="none" stroke="#E57373" stroke-width="0.5"/>
<path d="M55,5 Q53,10 57,15 Q53,20 57,25 Q53,30 57,35 Q53,40 57,45" fill="none" stroke="#E57373" stroke-width="0.5"/>

<!-- Holdfast -->
<path d="M40,55 Q35,60 32,62" fill="none" stroke="#8D6E63" stroke-width="1"/>
<path d="M40,55 Q45,60 48,62" fill="none" stroke="#8D6E63" stroke-width="1"/>

<text x="70" y="20" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828">слоевище</text>
<text x="70" y="30" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828">(пластинка)</text>
<text x="70" y="48" font-family="Arial,sans-serif" font-size="5.5" fill="#8D6E63">ризоиды</text>

<text x="45" y="82" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828" text-anchor="middle">Порфира</text>
<text x="45" y="90" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">многоклеточная</text>
</g>

<!-- Section 4: Pigments comparison table -->
<text x="250" y="192" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Пигменты водорослей</text>

<g transform="translate(30,200)">
<rect x="0" y="0" width="440" height="60" rx="4" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<line x1="0" y1="15" x2="440" y2="15" stroke="#2E7D32" stroke-width="0.3"/>
<line x1="110" y1="0" x2="110" y2="60" stroke="#2E7D32" stroke-width="0.2"/>
<line x1="220" y1="0" x2="220" y2="60" stroke="#2E7D32" stroke-width="0.2"/>
<line x1="330" y1="0" x2="330" y2="60" stroke="#2E7D32" stroke-width="0.2"/>

<text x="55" y="11" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2E7D32" text-anchor="middle">Зелёные</text>
<text x="165" y="11" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#5D4037" text-anchor="middle">Бурые</text>
<text x="275" y="11" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#C62828" text-anchor="middle">Красные</text>
<text x="385" y="11" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#FF6F00" text-anchor="middle">Диатомовые</text>

<!-- Color swatches -->
<rect x="20" y="18" width="12" height="8" rx="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.3"/>
<rect x="130" y="18" width="12" height="8" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.3"/>
<rect x="240" y="18" width="12" height="8" rx="2" fill="#E53935" stroke="#C62828" stroke-width="0.3"/>
<rect x="350" y="18" width="12" height="8" rx="2" fill="#FFB74D" stroke="#E65100" stroke-width="0.3"/>

<text x="55" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">хлорофилл a, b</text>
<text x="165" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">хлорофилл a, c</text>
<text x="275" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">хлорофилл a, d</text>
<text x="385" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">хлорофилл a, c</text>

<text x="55" y="36" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">каротин</text>
<text x="165" y="36" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">фукоксантин</text>
<text x="275" y="36" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">фикоэритрин</text>
<text x="385" y="36" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">фукоксантин</text>

<text x="55" y="46" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">ксантофилл</text>
<text x="165" y="46" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">(бурый пигмент)</text>
<text x="275" y="46" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">фикоцианин</text>
<text x="385" y="46" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">(буроватый)</text>

<text x="55" y="56" font-family="Arial,sans-serif" font-size="5.5" fill="#4CAF50" text-anchor="middle">пресные воды</text>
<text x="165" y="56" font-family="Arial,sans-serif" font-size="5.5" fill="#8D6E63" text-anchor="middle">моря, океаны</text>
<text x="275" y="56" font-family="Arial,sans-serif" font-size="5.5" fill="#E53935" text-anchor="middle">глубокие моря</text>
<text x="385" y="56" font-family="Arial,sans-serif" font-size="5.5" fill="#FFB74D" text-anchor="middle">вода повсюду</text>
</g>

<!-- Section 5: Unicellular vs Multicellular -->
<text x="135" y="275" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Одноклеточные</text>
<g transform="translate(25,280)">
<!-- Chlorella -->
<circle cx="20" cy="12" rx="8" ry="8" fill="#81C784" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>
<circle cx="20" cy="12" r="5" fill="#4CAF50" opacity="0.3"/>
<text x="20" y="28" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Хлорелла</text>
<!-- Euglena -->
<ellipse cx="55" cy="12" rx="8" ry="5" fill="#81C784" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>
<path d="M47,8 Q45,3 43,1" fill="none" stroke="#4CAF50" stroke-width="0.6"/>
<circle cx="50" cy="9" r="1.5" fill="#FF5722" opacity="0.5"/>
<text x="55" y="28" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Эвглена</text>
<!-- Diatom -->
<ellipse cx="90" cy="12" rx="10" ry="5" fill="#FFB74D" opacity="0.4" stroke="#E65100" stroke-width="0.8"/>
<line x1="85" y1="12" x2="95" y2="12" stroke="#E65100" stroke-width="0.4"/>
<text x="90" y="28" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Диатомея</text>
</g>

<text x="320" y="275" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Многоклеточные</text>
<g transform="translate(220,280)">
<!-- Spirogyra -->
<rect x="0" y="2" width="45" height="20" rx="3" fill="#C8E6C9" opacity="0.3" stroke="#4CAF50" stroke-width="0.5"/>
<rect x="2" y="4" width="12" height="16" rx="6" fill="#81C784" opacity="0.4" stroke="#4CAF50" stroke-width="0.5"/>
<path d="M5,12 Q8,8 11,12 Q14,16 17,12" fill="none" stroke="#2E7D32" stroke-width="0.5"/>
<rect x="16" y="4" width="12" height="16" rx="6" fill="#81C784" opacity="0.4" stroke="#4CAF50" stroke-width="0.5"/>
<path d="M19,12 Q22,8 25,12 Q28,16 31,12" fill="none" stroke="#2E7D32" stroke-width="0.5"/>
<rect x="30" y="4" width="12" height="16" rx="6" fill="#81C784" opacity="0.4" stroke="#4CAF50" stroke-width="0.5"/>
<text x="22" y="32" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Спирогира</text>
<!-- Ulva -->
<ellipse cx="75" cy="12" rx="12" ry="8" fill="#A5D6A7" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>
<text x="75" y="28" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Ульва</text>
</g>

<!-- Reproduction note -->
<g transform="translate(340,282)">
<rect x="0" y="0" width="140" height="42" rx="3" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.4"/>
<text x="70" y="10" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#1B5E20" text-anchor="middle">Размножение водорослей</text>
<text x="5" y="20" font-family="Arial,sans-serif" font-size="5.5" fill="#333">1. Вегетативное (частями слоевища)</text>
<text x="5" y="28" font-family="Arial,sans-serif" font-size="5.5" fill="#333">2. Бесполое (зооспоры)</text>
<text x="5" y="36" font-family="Arial,sans-serif" font-size="5.5" fill="#333">3. Половое (гаметы)</text>
</g>
</svg>