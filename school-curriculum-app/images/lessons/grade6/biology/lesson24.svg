<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B3E5FC"/><stop offset="100%" stop-color="#E1F5FE"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Роль голосеменных в природе и жизни человека</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 24</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- TAIGA FOREST LANDSCAPE (top section) -->
<text x="250" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Тайга — крупнейший биом Земли</text>

<!-- Sky background -->
<rect x="30" y="74" width="440" height="80" fill="url(#sky)" rx="3"/>
<!-- Mountains in background -->
<polygon points="30,130 100,85 170,130" fill="#78909C" opacity="0.4"/>
<polygon points="130,130 210,80 290,130" fill="#90A4AE" opacity="0.3"/>
<polygon points="250,130 340,75 430,130" fill="#78909C" opacity="0.35"/>

<!-- Ground/snow -->
<rect x="30" y="130" width="440" height="24" fill="#E8F5E9" rx="0"/>

<!-- Spruce trees - background row (smaller) -->
<g transform="translate(80,95)">
  <polygon points="0,-18 -8,10 8,10" fill="#1B5E20" opacity="0.5"/>
  <rect x="-1" y="10" width="2" height="10" fill="#5D4037" opacity="0.5"/>
</g>
<g transform="translate(140,90)">
  <polygon points="0,-22 -10,12 10,12" fill="#1B5E20" opacity="0.45"/>
  <rect x="-1.5" y="12" width="3" height="10" fill="#5D4037" opacity="0.5"/>
</g>
<g transform="translate(200,88)">
  <polygon points="0,-25 -12,14 12,14" fill="#1B5E20" opacity="0.4"/>
  <rect x="-2" y="14" width="4" height="10" fill="#5D4037" opacity="0.5"/>
</g>
<g transform="translate(340,90)">
  <polygon points="0,-22 -10,12 10,12" fill="#1B5E20" opacity="0.45"/>
  <rect x="-1.5" y="12" width="3" height="10" fill="#5D4037" opacity="0.5"/>
</g>
<g transform="translate(400,93)">
  <polygon points="0,-20 -9,10 9,10" fill="#1B5E20" opacity="0.5"/>
  <rect x="-1" y="10" width="2" height="10" fill="#5D4037" opacity="0.5"/>
</g>

<!-- Foreground spruces (larger) -->
<g transform="translate(60,85)">
  <polygon points="0,-30 -15,22 15,22" fill="#1B5E20" opacity="0.85"/>
  <polygon points="0,-20 -10,15 10,15" fill="#2E7D32" opacity="0.5"/>
  <rect x="-2.5" y="22" width="5" height="15" fill="#5D4037"/>
</g>
<g transform="translate(170,82)">
  <polygon points="0,-35 -18,25 18,25" fill="#1B5E20" opacity="0.85"/>
  <polygon points="0,-22 -12,18 12,18" fill="#2E7D32" opacity="0.5"/>
  <rect x="-3" y="25" width="6" height="15" fill="#4E342E"/>
</g>
<g transform="translate(270,80)">
  <polygon points="0,-38 -20,28 20,28" fill="#1B5E20" opacity="0.85"/>
  <polygon points="0,-25 -14,20 14,20" fill="#2E7D32" opacity="0.5"/>
  <rect x="-3" y="28" width="6" height="15" fill="#4E342E"/>
</g>
<g transform="translate(380,83)">
  <polygon points="0,-33 -17,24 17,24" fill="#1B5E20" opacity="0.85"/>
  <polygon points="0,-20 -11,17 11,17" fill="#2E7D32" opacity="0.5"/>
  <rect x="-2.5" y="24" width="5" height="15" fill="#5D4037"/>
</g>
<g transform="translate(450,87)">
  <polygon points="0,-28 -14,20 14,20" fill="#1B5E20" opacity="0.85"/>
  <rect x="-2" y="20" width="4" height="15" fill="#5D4037"/>
</g>

<!-- Taiga stats -->
<text x="250" y="162" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Тайга = 30% лесов планеты • Крупнейший кислородный фильтр • Дом для животных</text>

<!-- WOOD PRODUCTS (bottom left section) -->
<text x="135" y="180" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Продукция из древесины</text>

<!-- Timber/Construction -->
<g transform="translate(55,210)">
  <rect x="-18" y="-12" width="36" height="24" rx="2" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1"/>
  <rect x="-15" y="-8" width="30" height="3" fill="#BCAAA4"/>
  <rect x="-15" y="-2" width="30" height="3" fill="#BCAAA4"/>
  <rect x="-15" y="4" width="30" height="3" fill="#BCAAA4"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Строительство</text>
</g>

<!-- Paper -->
<g transform="translate(125,210)">
  <rect x="-12" y="-14" width="24" height="28" rx="1" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.8"/>
  <line x1="-8" y1="-8" x2="8" y2="-8" stroke="#CCC" stroke-width="0.5"/>
  <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#CCC" stroke-width="0.5"/>
  <line x1="-8" y1="0" x2="8" y2="0" stroke="#CCC" stroke-width="0.5"/>
  <line x1="-8" y1="4" x2="8" y2="4" stroke="#CCC" stroke-width="0.5"/>
  <line x1="-8" y1="8" x2="5" y2="8" stroke="#CCC" stroke-width="0.5"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Бумага</text>
</g>

<!-- Resin/Turpentine -->
<g transform="translate(195,210)">
  <!-- Bottle shape -->
  <path d="M-5,-14 L-5,-5 L-10,5 L-10,14 L10,14 L10,5 L5,-5 L5,-14 Z" fill="#FFC107" stroke="#FF8F00" stroke-width="0.8" opacity="0.8"/>
  <rect x="-4" y="-16" width="8" height="3" rx="1" fill="#8D6E63"/>
  <text x="0" y="4" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">Живица</text>
  <text x="0" y="24" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Смола</text>
</g>

<!-- Turpentine and Rosin -->
<g transform="translate(265,210)">
  <!-- Small bottle -->
  <path d="M-6,-12 L-6,-4 L-10,4 L-10,14 L10,14 L10,4 L6,-4 L6,-12 Z" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.8" opacity="0.7"/>
  <rect x="-5" y="-14" width="10" height="3" rx="1" fill="#8D6E63"/>
  <text x="0" y="5" font-family="Arial,sans-serif" font-size="4" fill="#5D4037" text-anchor="middle">Скипидар</text>
  <text x="0" y="24" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Канифоль</text>
</g>

<!-- PINE NUTS (right section) -->
<text x="410" y="180" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Кедровые орехи</text>

<!-- Pine cone with seeds -->
<g transform="translate(400,215)">
  <ellipse cx="0" cy="0" rx="14" ry="22" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- Scales -->
  <path d="M-12,-16 Q0,-19 12,-16" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-13,-10 Q0,-13 13,-10" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-13,-4 Q0,-7 13,-4" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-13,2 Q0,-1 13,2" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-12,8 Q0,5 12,8" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-10,14 Q0,11 10,14" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Seeds falling -->
  <ellipse cx="20" cy="-10" rx="3" ry="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
  <ellipse cx="22" cy="5" rx="3" ry="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
  <ellipse cx="18" cy="18" rx="3" ry="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
</g>

<!-- Pine nut benefits -->
<g transform="translate(450,200)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">• Масло</text>
  <text x="0" y="10" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">• Белок</text>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">• Витамины</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">• Минералы</text>
</g>

<!-- ENVIRONMENTAL & PHYTONCIDES (bottom) -->
<text x="135" y="255" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Экологическая роль</text>

<!-- Phytoncides -->
<g transform="translate(55,275)">
  <circle cx="0" cy="0" r="15" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <!-- Tree icon -->
  <polygon points="0,-10 -7,5 7,5" fill="#2E7D32"/>
  <rect x="-1.5" y="5" width="3" height="5" fill="#5D4037"/>
  <!-- Wavy lines for phytoncides -->
  <path d="M10,-5 Q15,-8 20,-5" fill="none" stroke="#4CAF50" stroke-width="0.8" opacity="0.6"/>
  <path d="M10,0 Q15,-3 20,0" fill="none" stroke="#4CAF50" stroke-width="0.8" opacity="0.6"/>
  <path d="M10,5 Q15,2 20,5" fill="none" stroke="#4CAF50" stroke-width="0.8" opacity="0.6"/>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Фитонциды</text>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">убивают бактерии</text>
</g>

<!-- Soil protection -->
<g transform="translate(130,275)">
  <circle cx="0" cy="0" r="15" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <!-- Roots holding soil -->
  <line x1="0" y1="-8" x2="0" y2="3" stroke="#795548" stroke-width="1.5"/>
  <line x1="0" y1="3" x2="-8" y2="12" stroke="#795548" stroke-width="1"/>
  <line x1="0" y1="3" x2="8" y2="12" stroke="#795548" stroke-width="1"/>
  <line x1="0" y1="3" x2="0" y2="12" stroke="#795548" stroke-width="1"/>
  <!-- Soil particles -->
  <circle cx="-5" cy="10" r="2" fill="#A1887F"/>
  <circle cx="5" cy="10" r="2" fill="#A1887F"/>
  <circle cx="0" cy="12" r="2" fill="#BCAAA4"/>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Защита почвы</text>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">от эрозии</text>
</g>

<!-- Water regulation -->
<g transform="translate(205,275)">
  <circle cx="0" cy="0" r="15" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <!-- Rain -->
  <line x1="-6" y1="-10" x2="-8" y2="-4" stroke="#42A5F5" stroke-width="1"/>
  <line x1="0" y1="-10" x2="-2" y2="-4" stroke="#42A5F5" stroke-width="1"/>
  <line x1="6" y1="-10" x2="4" y2="-4" stroke="#42A5F5" stroke-width="1"/>
  <!-- Ground sponge -->
  <ellipse cx="0" cy="5" rx="10" ry="5" fill="#81C784" opacity="0.6"/>
  <!-- Drops below -->
  <circle cx="-4" cy="12" r="1.5" fill="#42A5F5" opacity="0.7"/>
  <circle cx="4" cy="11" r="1.5" fill="#42A5F5" opacity="0.7"/>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle">Водорегуляция</text>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">чистые реки</text>
</g>

<!-- Habitat -->
<g transform="translate(280,275)">
  <circle cx="0" cy="0" r="15" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Animal silhouette -->
  <ellipse cx="0" cy="2" rx="6" ry="4" fill="#7B1FA2" opacity="0.5"/>
  <circle cx="3" cy="-2" r="3" fill="#7B1FA2" opacity="0.5"/>
  <!-- Ear -->
  <line x1="2" y1="-5" x2="4" y2="-9" stroke="#7B1FA2" stroke-width="1" opacity="0.5"/>
  <line x1="4" y1="-5" x2="6" y2="-9" stroke="#7B1FA2" stroke-width="1" opacity="0.5"/>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">Среда обитания</text>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">для животных</text>
</g>

<!-- THREATS AND CONSERVATION (bottom right) -->
<text x="410" y="255" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Угрозы</text>

<!-- Fire -->
<g transform="translate(375,278)">
  <path d="M0,8 Q6,-2 3,-8 Q0,-4 -3,-8 Q-6,-2 0,8" fill="#FF5722" opacity="0.7"/>
  <path d="M0,5 Q3,0 1,-5 Q0,-2 -1,-5 Q-3,0 0,5" fill="#FFEB3B" opacity="0.6"/>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Пожары</text>
</g>

<!-- Deforestation -->
<g transform="translate(415,278)">
  <!-- Stump -->
  <rect x="-6" y="-2" width="12" height="8" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
  <ellipse cx="0" cy="-2" rx="6" ry="2" fill="#A1887F"/>
  <!-- Axe -->
  <line x1="8" y1="-8" x2="2" y2="0" stroke="#795548" stroke-width="1.5"/>
  <path d="M8,-8 L12,-12 L10,-10 Z" fill="#9E9E9E"/>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Вырубка</text>
</g>

<!-- Pests -->
<g transform="translate(455,278)">
  <!-- Bug -->
  <ellipse cx="0" cy="0" rx="5" ry="3" fill="#795548"/>
  <circle cx="5" cy="-1" r="2" fill="#5D4037"/>
  <line x1="-3" y1="-3" x2="-5" y2="-6" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="0" y1="-3" x2="0" y2="-7" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="3" y1="-3" x2="5" y2="-6" stroke="#5D4037" stroke-width="0.5"/>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Вредители</text>
</g>

<!-- Conservation message -->
<rect x="290" y="305" width="190" height="25" rx="5" fill="#1B5E20" opacity="0.1" stroke="#2E7D32" stroke-width="0.5"/>
<text x="385" y="317" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">🛡 Охрана: заповедники, лесовосстановление,</text>
<text x="385" y="327" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">рациональное лесопользование</text>
</svg>