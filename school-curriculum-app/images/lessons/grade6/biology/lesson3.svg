<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<radialGradient id="centerGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#2E7D32" stop-opacity="0.3"/><stop offset="100%" stop-color="#1B5E20" stop-opacity="0.1"/></radialGradient>
<radialGradient id="bactGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFECB3"/><stop offset="100%" stop-color="#FFB300"/></radialGradient>
<radialGradient id="fungiGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#D7CCC8"/><stop offset="100%" stop-color="#8D6E63"/></radialGradient>
<radialGradient id="plantGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#C8E6C9"/><stop offset="100%" stop-color="#4CAF50"/></radialGradient>
<radialGradient id="animalGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFCCBC"/><stop offset="100%" stop-color="#FF7043"/></radialGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Разнообразие живой природы. Царства</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 3</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Signs of living organisms at top -->
<rect x="30" y="55" width="440" height="22" rx="4" fill="#1B5E20" opacity="0.07" stroke="none"/>
<text x="250" y="64" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Признаки живого:</text>
<text x="250" y="73" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">обмен веществ • рост • развитие • размножение • раздражимость • дыхание • питание • выделение</text>

<!-- Central circle - Живая природа -->
<circle cx="250" cy="195" r="52" fill="url(#centerGrad)" stroke="#2E7D32" stroke-width="2"/>
<text x="250" y="189" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Живая</text>
<text x="250" y="202" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">природа</text>
<text x="250" y="215" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">4 царства</text>

<!-- Connection lines from center to kingdoms -->
<line x1="205" y1="168" x2="125" y2="108" stroke="#4CAF50" stroke-width="1.8" opacity="0.5"/>
<line x1="295" y1="168" x2="375" y2="108" stroke="#4CAF50" stroke-width="1.8" opacity="0.5"/>
<line x1="205" y1="222" x2="125" y2="278" stroke="#4CAF50" stroke-width="1.8" opacity="0.5"/>
<line x1="295" y1="222" x2="375" y2="278" stroke="#4CAF50" stroke-width="1.8" opacity="0.5"/>

<!-- Small decorative dots on connection lines -->
<circle cx="165" cy="138" r="2" fill="#4CAF50" opacity="0.3"/>
<circle cx="335" cy="138" r="2" fill="#4CAF50" opacity="0.3"/>
<circle cx="165" cy="250" r="2" fill="#4CAF50" opacity="0.3"/>
<circle cx="335" cy="250" r="2" fill="#4CAF50" opacity="0.3"/>

<!-- Kingdom 1: Бактерии (top left) -->
<g transform="translate(110,90)">
  <ellipse cx="0" cy="0" rx="58" ry="42" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1.5" opacity="0.6"/>
  <!-- Bacteria shapes inside -->
  <ellipse cx="-18" cy="-10" rx="10" ry="6" fill="#FF8F00" opacity="0.5" stroke="#E65100" stroke-width="0.8"/>
  <circle cx="8" cy="-8" r="5" fill="#FFB300" opacity="0.5" stroke="#E65100" stroke-width="0.8"/>
  <!-- Vibrio -->
  <path d="M-5,10 C-2,5 5,5 8,10 C10,14 6,16 2,14" fill="#FF8F00" opacity="0.4" stroke="#E65100" stroke-width="0.8"/>
  <!-- Spirillum -->
  <path d="M15,5 C18,2 22,8 25,5 C28,2 32,8 35,5" fill="none" stroke="#E65100" stroke-width="0.8"/>
  <!-- Flagella -->
  <path d="M8,-8 C14,-12 16,-8 20,-10" fill="none" stroke="#E65100" stroke-width="0.6"/>
  <path d="M-25,-10 C-30,-14 -32,-10 -36,-12" fill="none" stroke="#E65100" stroke-width="0.6"/>
  <!-- Nucleoid in cocci -->
  <path d="M6,-10 C4,-12 10,-12 8,-10" fill="#E65100" opacity="0.3"/>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Бактерии</text>
  <text x="0" y="65" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">прокариоты (без ядра)</text>
  <text x="0" y="74" font-family="Arial,sans-serif" font-size="5.5" fill="#999" text-anchor="middle">~10 000 видов</text>
</g>

<!-- Kingdom 2: Грибы (top right) -->
<g transform="translate(390,90)">
  <ellipse cx="0" cy="0" rx="58" ry="42" fill="url(#fungiGrad)" stroke="#6D4C41" stroke-width="1.5" opacity="0.6"/>
  <!-- Cap mushroom -->
  <rect x="-4" y="4" width="8" height="15" fill="#D7CCC8" rx="2"/>
  <ellipse cx="0" cy="4" rx="15" ry="10" fill="#A1887F" opacity="0.7" stroke="#6D4C41" stroke-width="0.8"/>
  <!-- Gill lines -->
  <line x1="-8" y1="6" x2="0" y2="12" stroke="#6D4C41" stroke-width="0.3"/>
  <line x1="8" y1="6" x2="0" y2="12" stroke="#6D4C41" stroke-width="0.3"/>
  <!-- Spots -->
  <circle cx="-5" cy="2" r="2.5" fill="#8D6E63" opacity="0.4"/>
  <circle cx="6" cy="0" r="2" fill="#8D6E63" opacity="0.4"/>
  <!-- Small mold cluster -->
  <circle cx="-25" cy="-8" r="4" fill="#BCAAA4" opacity="0.5" stroke="#6D4C41" stroke-width="0.5"/>
  <circle cx="-20" cy="-12" r="3" fill="#BCAAA4" opacity="0.5" stroke="#6D4C41" stroke-width="0.5"/>
  <circle cx="-22" cy="-4" r="3.5" fill="#BCAAA4" opacity="0.5" stroke="#6D4C41" stroke-width="0.5"/>
  <!-- Hyphae -->
  <path d="M-22,-14 C-16,-18 -10,-14 -5,-10" fill="none" stroke="#8D6E63" stroke-width="0.8"/>
  <path d="M-22,-2 C-16,-6 -10,-2 -5,2" fill="none" stroke="#8D6E63" stroke-width="0.8"/>
  <!-- Yeast (budding) -->
  <ellipse cx="22" cy="-10" rx="5" ry="4" fill="#BCAAA4" opacity="0.5" stroke="#6D4C41" stroke-width="0.5"/>
  <ellipse cx="28" cy="-14" rx="3.5" ry="3" fill="#BCAAA4" opacity="0.4" stroke="#6D4C41" stroke-width="0.5"/>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="10" fill="#5D4037" text-anchor="middle" font-weight="bold">Грибы</text>
  <text x="0" y="65" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">эукариоты-гетеротрофы</text>
  <text x="0" y="74" font-family="Arial,sans-serif" font-size="5.5" fill="#999" text-anchor="middle">~120 000 видов</text>
</g>

<!-- Kingdom 3: Растения (bottom left) -->
<g transform="translate(110,280)">
  <ellipse cx="0" cy="0" rx="58" ry="42" fill="url(#plantGrad)" stroke="#2E7D32" stroke-width="1.5" opacity="0.6"/>
  <!-- Tree -->
  <rect x="-2" y="-8" width="4" height="22" fill="#795548" rx="1"/>
  <ellipse cx="0" cy="-18" rx="16" ry="14" fill="#66BB6A" opacity="0.7" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="-10" cy="-12" rx="10" ry="8" fill="#81C784" opacity="0.5"/>
  <ellipse cx="10" cy="-12" rx="10" ry="8" fill="#81C784" opacity="0.5"/>
  <!-- Small flower -->
  <circle cx="25" cy="-15" r="4" fill="#F44336" opacity="0.4"/>
  <circle cx="25" cy="-15" r="1.5" fill="#FFD54F"/>
  <!-- Roots -->
  <path d="M-2,14 C-6,18 -10,20 -14,24" fill="none" stroke="#795548" stroke-width="0.8"/>
  <path d="M2,14 C6,18 10,20 14,24" fill="none" stroke="#795548" stroke-width="0.8"/>
  <!-- Fern frond -->
  <path d="M-30,-5 C-25,-10 -20,-5 -15,-10" fill="none" stroke="#4CAF50" stroke-width="1"/>
  <path d="M-30,-3 C-25,-8 -20,-3 -15,-8" fill="none" stroke="#4CAF50" stroke-width="0.6"/>
  <!-- Algae -->
  <path d="M20,10 C22,5 26,8 24,14 C22,18 20,14 20,10" fill="#4CAF50" opacity="0.3" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">Растения</text>
  <text x="0" y="65" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">эукариоты-автотрофы</text>
  <text x="0" y="74" font-family="Arial,sans-serif" font-size="5.5" fill="#999" text-anchor="middle">~390 000 видов</text>
</g>

<!-- Kingdom 4: Животные (bottom right) -->
<g transform="translate(390,280)">
  <ellipse cx="0" cy="0" rx="58" ry="42" fill="url(#animalGrad)" stroke="#BF360C" stroke-width="1.5" opacity="0.6"/>
  <!-- Animal - simple mammal shape -->
  <ellipse cx="-5" cy="-5" rx="14" ry="9" fill="#FF7043" opacity="0.4" stroke="#BF360C" stroke-width="0.8"/>
  <circle cx="-18" cy="-8" r="6" fill="#FF8A65" opacity="0.4" stroke="#BF360C" stroke-width="0.8"/>
  <!-- Eye -->
  <circle cx="-20" cy="-9" r="1.5" fill="#BF360C"/>
  <!-- Ear -->
  <path d="M-20,-14 L-18,-20 L-16,-14" fill="#FF8A65" opacity="0.4" stroke="#BF360C" stroke-width="0.5"/>
  <!-- Legs -->
  <line x1="-10" y1="4" x2="-12" y2="16" stroke="#BF360C" stroke-width="1.2"/>
  <line x1="-2" y1="4" x2="-4" y2="16" stroke="#BF360C" stroke-width="1.2"/>
  <line x1="4" y1="3" x2="2" y2="15" stroke="#BF360C" stroke-width="1.2"/>
  <line x1="8" y1="2" x2="6" y2="14" stroke="#BF360C" stroke-width="1.2"/>
  <!-- Tail -->
  <path d="M9,-8 C16,-12 18,-6 20,-10" fill="none" stroke="#BF360C" stroke-width="1"/>
  <!-- Bird silhouette -->
  <path d="M22,-20 C26,-22 30,-20 28,-16 C26,-14 24,-16 22,-20" fill="#FF8A65" opacity="0.3"/>
  <path d="M28,-16 L34,-18" fill="none" stroke="#BF360C" stroke-width="0.5"/>
  <!-- Fish -->
  <ellipse cx="30" cy="10" rx="8" ry="4" fill="#FF8A65" opacity="0.3" stroke="#BF360C" stroke-width="0.5"/>
  <path d="M38,10 L42,6 L42,14 Z" fill="#FF8A65" opacity="0.3" stroke="#BF360C" stroke-width="0.5"/>
  <circle cx="26" cy="9" r="1" fill="#BF360C" opacity="0.5"/>
  <text x="0" y="55" font-family="Arial,sans-serif" font-size="10" fill="#BF360C" text-anchor="middle" font-weight="bold">Животные</text>
  <text x="0" y="65" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">эукариоты-гетеротрофы</text>
  <text x="0" y="74" font-family="Arial,sans-serif" font-size="5.5" fill="#999" text-anchor="middle">~2 000 000 видов</text>
</g>

<!-- Viruses note -->
<rect x="160" y="318" width="180" height="22" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8" opacity="0.8"/>
<text x="250" y="330" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">⚠ Вирусы — неклеточная форма</text>
<text x="250" y="338" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">не относятся ни к одному царству</text>
</svg>