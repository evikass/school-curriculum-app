<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="chlorGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#66BB6A"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Растения. Ботаника — наука о растениях</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 15</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Plant Evolution Timeline -->
<text x="250" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Эволюция растений</text>

<!-- Timeline arrow -->
<line x1="30" y1="130" x2="470" y2="130" stroke="#2E7D32" stroke-width="2"/>
<polygon points="470,126 480,130 470,134" fill="#2E7D32"/>

<!-- Time markers -->
<text x="30" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#666">~3,5 млрд лет</text>
<text x="110" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#666">~470 млн</text>
<text x="195" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#666">~400 млн</text>
<text x="290" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#666">~350 млн</text>
<text x="400" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#666">~130 млн</text>

<!-- 1. Водоросли -->
<g transform="translate(40,78)">
<rect x="-5" y="0" width="60" height="50" rx="4" fill="white" opacity="0.4" stroke="#1B5E20" stroke-width="0.5"/>
<!-- Simple algae -->
<ellipse cx="25" cy="20" rx="15" ry="10" fill="#81C784" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>
<circle cx="20" cy="18" r="2" fill="#4CAF50" opacity="0.4"/>
<circle cx="30" cy="22" r="1.5" fill="#4CAF50" opacity="0.4"/>
<!-- Wavy algae -->
<path d="M10,30 Q15,25 20,30 Q25,35 30,30 Q35,25 40,30" fill="none" stroke="#4CAF50" stroke-width="1"/>
<text x="25" y="45" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Водоросли</text>
</g>
<!-- Connecting dot -->
<circle cx="55" cy="130" r="3" fill="#1B5E20"/>

<!-- 2. Мхи -->
<g transform="translate(115,78)">
<rect x="-5" y="0" width="60" height="50" rx="4" fill="white" opacity="0.4" stroke="#33691E" stroke-width="0.5"/>
<!-- Moss plants -->
<line x1="15" y1="40" x2="15" y2="20" stroke="#4CAF50" stroke-width="1"/>
<line x1="25" y1="40" x2="25" y2="15" stroke="#4CAF50" stroke-width="1.2"/>
<line x1="35" y1="40" x2="35" y2="22" stroke="#4CAF50" stroke-width="1"/>
<!-- Capsule on top -->
<ellipse cx="25" cy="12" rx="4" ry="3" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
<!-- Small leaves -->
<path d="M12,30 L18,28 M12,25 L17,24" fill="none" stroke="#66BB6A" stroke-width="0.6"/>
<path d="M38,30 L32,28 M38,25 L33,24" fill="none" stroke="#66BB6A" stroke-width="0.6"/>
<text x="25" y="48" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#33691E" text-anchor="middle">Мхи</text>
</g>
<circle cx="130" cy="130" r="3" fill="#33691E"/>

<!-- 3. Папоротники -->
<g transform="translate(195,78)">
<rect x="-5" y="0" width="65" height="50" rx="4" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Fern frond -->
<path d="M25,40 Q25,20 25,10" fill="none" stroke="#4CAF50" stroke-width="1.2"/>
<path d="M25,18 Q18,15 12,18" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
<path d="M25,22 Q32,19 38,22" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
<path d="M25,26 Q17,24 10,28" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
<path d="M25,30 Q33,27 40,32" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
<!-- Sub-fronds -->
<path d="M12,18 Q8,15 6,18" fill="none" stroke="#81C784" stroke-width="0.5"/>
<path d="M38,22 Q42,19 44,22" fill="none" stroke="#81C784" stroke-width="0.5"/>
<text x="27" y="48" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Папоротники</text>
</g>
<circle cx="220" cy="130" r="3" fill="#2E7D32"/>

<!-- 4. Голосеменные -->
<g transform="translate(280,78)">
<rect x="-5" y="0" width="65" height="50" rx="4" fill="white" opacity="0.4" stroke="#1B5E20" stroke-width="0.5"/>
<!-- Pine tree -->
<line x1="27" y1="40" x2="27" y2="30" stroke="#795548" stroke-width="2"/>
<polygon points="27,8 12,22 42,22" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.6"/>
<polygon points="27,15 15,28 39,28" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Cone -->
<ellipse cx="38" cy="18" rx="3" ry="5" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
<text x="27" y="48" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Голосеменные</text>
</g>
<circle cx="310" cy="130" r="3" fill="#1B5E20"/>

<!-- 5. Покрытосеменные -->
<g transform="translate(370,78)">
<rect x="-5" y="0" width="75" height="50" rx="4" fill="white" opacity="0.4" stroke="#0D47A1" stroke-width="0.5"/>
<!-- Flowering plant -->
<line x1="35" y1="40" x2="35" y2="18" stroke="#4CAF50" stroke-width="1.5"/>
<!-- Leaves -->
<path d="M35,28 Q25,24 20,28 Q25,30 35,28Z" fill="#81C784" stroke="#4CAF50" stroke-width="0.4"/>
<path d="M35,24 Q45,20 50,24 Q45,26 35,24Z" fill="#81C784" stroke="#4CAF50" stroke-width="0.4"/>
<!-- Flower -->
<circle cx="35" cy="13" r="3" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.5"/>
<ellipse cx="35" cy="8" rx="3" ry="4" fill="#E91E63" opacity="0.5" stroke="#C2185B" stroke-width="0.4"/>
<ellipse cx="30" cy="12" rx="4" ry="3" fill="#E91E63" opacity="0.5" stroke="#C2185B" stroke-width="0.4" transform="rotate(-30,30,12)"/>
<ellipse cx="40" cy="12" rx="4" ry="3" fill="#E91E63" opacity="0.5" stroke="#C2185B" stroke-width="0.4" transform="rotate(30,40,12)"/>
<text x="35" y="48" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1" text-anchor="middle">Покрытосеменные</text>
</g>
<circle cx="415" cy="130" r="3" fill="#0D47A1"/>

<!-- Evolution innovations labels -->
<g transform="translate(30,150)">
<text x="25" y="8" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">фотосинтез</text>
<text x="100" y="8" font-family="Arial,sans-serif" font-size="5" fill="#33691E" text-anchor="middle">выход на сушу</text>
<text x="190" y="8" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">проводящая</text>
<text x="190" y="14" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">система</text>
<text x="310" y="8" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">семена</text>
<text x="415" y="8" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">цветок и плод</text>
</g>

<!-- Section 2: Botany branches -->
<text x="125" y="178" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Разделы ботаники</text>

<g transform="translate(15,185)">
<rect x="0" y="0" width="220" height="78" rx="5" fill="white" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Central label -->
<text x="110" y="14" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Ботаника</text>

<!-- Branch boxes -->
<rect x="5" y="22" width="65" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
<text x="37" y="33" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Морфология</text>

<rect x="75" y="22" width="65" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
<text x="107" y="33" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Анатомия</text>

<rect x="145" y="22" width="65" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
<text x="177" y="33" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Физиология</text>

<rect x="5" y="42" width="65" height="16" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.5"/>
<text x="37" y="53" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Систематика</text>

<rect x="75" y="42" width="65" height="16" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.5"/>
<text x="107" y="53" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Экология</text>

<rect x="145" y="42" width="65" height="16" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.5"/>
<text x="177" y="53" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">География</text>

<!-- Brief descriptions -->
<text x="37" y="66" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">строение</text>
<text x="37" y="71" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">органов</text>
<text x="107" y="66" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">внутреннее</text>
<text x="107" y="71" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">строение</text>
<text x="177" y="66" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">жизненные</text>
<text x="177" y="71" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">процессы</text>
</g>

<!-- Section 3: Chloroplast with photosynthesis -->
<text x="370" y="178" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Хлоропласт — фотосинтез</text>

<g transform="translate(280,188)">
<!-- Chloroplast -->
<ellipse cx="85" cy="35" rx="55" ry="28" fill="url(#chlorGrad)" opacity="0.4" stroke="#2E7D32" stroke-width="1.5"/>
<!-- Outer membrane -->
<ellipse cx="85" cy="35" rx="55" ry="28" fill="none" stroke="#1B5E20" stroke-width="0.8" stroke-dasharray="4,2" opacity="0.5"/>
<!-- Inner membrane -->
<ellipse cx="85" cy="35" rx="50" ry="25" fill="none" stroke="#1B5E20" stroke-width="0.5"/>

<!-- Grana (stacks of thylakoids) -->
<rect x="50" y="18" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>
<rect x="50" y="22" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>
<rect x="50" y="26" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>

<rect x="80" y="22" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>
<rect x="80" y="26" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>
<rect x="80" y="30" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>
<rect x="80" y="34" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>

<rect x="105" y="28" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>
<rect x="105" y="32" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>
<rect x="105" y="36" width="12" height="8" rx="2" fill="#43A047" stroke="#1B5E20" stroke-width="0.5"/>

<!-- Lamellae connecting grana -->
<path d="M62,25 Q70,24 80,26" fill="none" stroke="#66BB6A" stroke-width="0.6"/>
<path d="M62,30 Q70,32 80,30" fill="none" stroke="#66BB6A" stroke-width="0.6"/>
<path d="M92,30 Q98,34 105,32" fill="none" stroke="#66BB6A" stroke-width="0.6"/>

<!-- Stroma label -->
<text x="75" y="50" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">строма</text>
<!-- Grana label -->
<text x="56" y="16" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">грана</text>

<!-- DNA in stroma -->
<circle cx="70" cy="45" r="1.5" fill="#1B5E20" opacity="0.3"/>
<circle cx="100" cy="48" r="1.5" fill="#1B5E20" opacity="0.3"/>
</g>

<!-- Photosynthesis equation -->
<g transform="translate(260,262)">
<rect x="0" y="0" width="220" height="30" rx="4" fill="white" opacity="0.6" stroke="#2E7D32" stroke-width="0.8"/>
<text x="110" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Уравнение фотосинтеза</text>
<text x="110" y="24" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle">6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂</text>
</g>

<!-- Sun and light arrows -->
<g transform="translate(260,298)">
<!-- Sun -->
<circle cx="15" cy="12" r="8" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.8"/>
<line x1="15" y1="0" x2="15" y2="-4" stroke="#F9A825" stroke-width="0.8"/>
<line x1="15" y1="24" x2="15" y2="28" stroke="#F9A825" stroke-width="0.8"/>
<line x1="3" y1="12" x2="-1" y2="12" stroke="#F9A825" stroke-width="0.8"/>
<line x1="27" y1="12" x2="31" y2="12" stroke="#F9A825" stroke-width="0.8"/>
<line x1="7" y1="4" x2="4" y2="1" stroke="#F9A825" stroke-width="0.6"/>
<line x1="23" y1="4" x2="26" y2="1" stroke="#F9A825" stroke-width="0.6"/>
<line x1="7" y1="20" x2="4" y2="23" stroke="#F9A825" stroke-width="0.6"/>
<line x1="23" y1="20" x2="26" y2="23" stroke="#F9A825" stroke-width="0.6"/>
<text x="15" y="40" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">свет</text>

<!-- Arrow to equation components -->
<text x="55" y="12" font-family="Arial,sans-serif" font-size="6" fill="#333">CO₂ (воздух)</text>
<text x="55" y="22" font-family="Arial,sans-serif" font-size="6" fill="#333">H₂O (почва)</text>
<text x="140" y="12" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">→ глюкоза</text>
<text x="140" y="22" font-family="Arial,sans-serif" font-size="6" fill="#2196F3">→ O₂ (кислород)</text>
<text x="210" y="15" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">хлорофилл</text>
</g>

<!-- Key plant characteristics -->
<g transform="translate(15,275)">
<rect x="0" y="0" width="230" height="55" rx="5" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="115" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Признаки растений</text>
<text x="8" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">• Автотрофы — сами создают органические вещества</text>
<text x="8" y="33" font-family="Arial,sans-serif" font-size="6" fill="#333">• Клеточная стенка из целлюлозы</text>
<text x="8" y="42" font-family="Arial,sans-serif" font-size="6" fill="#333">• Запасное вещество — крахмал</text>
<text x="8" y="51" font-family="Arial,sans-serif" font-size="6" fill="#333">• Рост в течение всей жизни, прикреплённый образ жизни</text>
</g>
</svg>