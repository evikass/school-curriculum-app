<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgPE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff8e1"/>
      <stop offset="100%" style="stop-color:#ffecb3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgPE)"/>
  
  <!-- Gym floor -->
  <rect x="0" y="220" width="400" height="80" fill="#ffcc80"/>
  <line x1="0" y1="220" x2="400" y2="220" stroke="#ffb74d" stroke-width="3"/>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#e65100">Строевые упражнения</text>
  
  <!-- Children standing in line -->
  <!-- Child 1 -->
  <g transform="translate(80, 150)">
    <ellipse cx="0" cy="55" rx="18" ry="28" fill="#42a5f5"/>
    <circle cx="0" cy="8" r="18" fill="#ffcc80"/>
    <ellipse cx="0" cy="-5" rx="15" ry="10" fill="#5d4037"/>
    <circle cx="-5" cy="5" r="2.5" fill="#333"/>
    <circle cx="5" cy="5" r="2.5" fill="#333"/>
    <path d="M-4 14 Q0 18 4 14" stroke="#333" stroke-width="1.5" fill="none"/>
    <!-- Arms at sides -->
    <rect x="-22" y="35" width="8" height="25" rx="3" fill="#42a5f5"/>
    <rect x="14" y="35" width="8" height="25" rx="3" fill="#42a5f5"/>
    <!-- Legs together -->
    <rect x="-8" y="78" width="7" height="30" rx="3" fill="#1565c0"/>
    <rect x="1" y="78" width="7" height="30" rx="3" fill="#1565c0"/>
  </g>
  
  <!-- Child 2 -->
  <g transform="translate(140, 150)">
    <ellipse cx="0" cy="55" rx="18" ry="28" fill="#ec407a"/>
    <circle cx="0" cy="8" r="18" fill="#ffcc80"/>
    <path d="M-15 -5 Q0 -22 15 -5 Q10 5 0 0 Q-10 5 -15 -5" fill="#8d6e63"/>
    <circle cx="-5" cy="5" r="2.5" fill="#333"/>
    <circle cx="5" cy="5" r="2.5" fill="#333"/>
    <path d="M-4 14 Q0 18 4 14" stroke="#333" stroke-width="1.5" fill="none"/>
    <rect x="-22" y="35" width="8" height="25" rx="3" fill="#ec407a"/>
    <rect x="14" y="35" width="8" height="25" rx="3" fill="#ec407a"/>
    <rect x="-8" y="78" width="7" height="30" rx="3" fill="#ad1457"/>
    <rect x="1" y="78" width="7" height="30" rx="3" fill="#ad1457"/>
  </g>
  
  <!-- Child 3 (taller) -->
  <g transform="translate(200, 145)">
    <ellipse cx="0" cy="55" rx="18" ry="28" fill="#66bb6a"/>
    <circle cx="0" cy="8" r="18" fill="#ffcc80"/>
    <ellipse cx="0" cy="-5" rx="15" ry="10" fill="#4e342e"/>
    <circle cx="-5" cy="5" r="2.5" fill="#333"/>
    <circle cx="5" cy="5" r="2.5" fill="#333"/>
    <path d="M-4 14 Q0 18 4 14" stroke="#333" stroke-width="1.5" fill="none"/>
    <rect x="-22" y="35" width="8" height="25" rx="3" fill="#66bb6a"/>
    <rect x="14" y="35" width="8" height="25" rx="3" fill="#66bb6a"/>
    <rect x="-8" y="78" width="7" height="35" rx="3" fill="#2e7d32"/>
    <rect x="1" y="78" width="7" height="35" rx="3" fill="#2e7d32"/>
  </g>
  
  <!-- Child 4 -->
  <g transform="translate(260, 150)">
    <ellipse cx="0" cy="55" rx="18" ry="28" fill="#ffa726"/>
    <circle cx="0" cy="8" r="18" fill="#ffcc80"/>
    <ellipse cx="0" cy="-5" rx="15" ry="10" fill="#5d4037"/>
    <circle cx="-5" cy="5" r="2.5" fill="#333"/>
    <circle cx="5" cy="5" r="2.5" fill="#333"/>
    <path d="M-4 14 Q0 18 4 14" stroke="#333" stroke-width="1.5" fill="none"/>
    <rect x="-22" y="35" width="8" height="25" rx="3" fill="#ffa726"/>
    <rect x="14" y="35" width="8" height="25" rx="3" fill="#ffa726"/>
    <rect x="-8" y="78" width="7" height="30" rx="3" fill="#e65100"/>
    <rect x="1" y="78" width="7" height="30" rx="3" fill="#e65100"/>
  </g>
  
  <!-- Child 5 -->
  <g transform="translate(320, 150)">
    <ellipse cx="0" cy="55" rx="18" ry="28" fill="#ab47bc"/>
    <circle cx="0" cy="8" r="18" fill="#ffcc80"/>
    <path d="M-15 -5 Q0 -22 15 -5 Q10 5 0 0 Q-10 5 -15 -5" fill="#6d4c41"/>
    <circle cx="-5" cy="5" r="2.5" fill="#333"/>
    <circle cx="5" cy="5" r="2.5" fill="#333"/>
    <path d="M-4 14 Q0 18 4 14" stroke="#333" stroke-width="1.5" fill="none"/>
    <rect x="-22" y="35" width="8" height="25" rx="3" fill="#ab47bc"/>
    <rect x="14" y="35" width="8" height="25" rx="3" fill="#ab47bc"/>
    <rect x="-8" y="78" width="7" height="30" rx="3" fill="#7b1fa2"/>
    <rect x="1" y="78" width="7" height="30" rx="3" fill="#7b1fa2"/>
  </g>
  
  <!-- Teacher -->
  <g transform="translate(35, 145)">
    <ellipse cx="0" cy="50" rx="20" ry="30" fill="#ef5350"/>
    <circle cx="0" cy="5" r="20" fill="#ffcc80"/>
    <ellipse cx="0" cy="-8" rx="17" ry="11" fill="#4e342e"/>
    <circle cx="-6" cy="3" r="3" fill="#333"/>
    <circle cx="6" cy="3" r="3" fill="#333"/>
    <path d="M-5 12 Q0 17 5 12" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Whistle -->
    <ellipse cx="30" cy="20" rx="12" ry="8" fill="#ffd54f" stroke="#ff8f00" stroke-width="2"/>
    <rect x="38" y="16" width="10" height="8" rx="2" fill="#ffd54f" stroke="#ff8f00" stroke-width="2"/>
  </g>
  
  <!-- "Смирно!" text -->
  <g>
    <animateTransform attributeName="transform" type="scale" values="1;1.1;1" dur="2s" repeatCount="indefinite" additive="sum" origin="200 80"/>
    <ellipse cx="200" cy="80" rx="60" ry="25" fill="white" stroke="#e65100" stroke-width="2"/>
    <text x="200" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#e65100">Смирно!</text>
  </g>
  
  <!-- Dashed line showing alignment -->
  <line x1="60" y1="235" x2="340" y2="235" stroke="#ff8a65" stroke-width="2" stroke-dasharray="10,5"/>
  
  <!-- Label -->
  <text x="200" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#bf360c">Построение в шеренгу</text>
</svg>