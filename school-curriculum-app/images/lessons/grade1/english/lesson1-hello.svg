<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeb3b"/>
      <stop offset="100%" style="stop-color:#ffc107"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad)"/>
  
  <!-- Sun with rays -->
  <g transform="translate(340, 50)">
    <circle r="30" fill="url(#sunGrad)">
      <animate attributeName="r" values="28;32;28" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Sun rays -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
      <line x1="0" y1="-45" x2="0" y2="-55" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="-32" x2="39" y2="-39" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
      <line x1="45" y1="0" x2="55" y2="0" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="32" x2="39" y2="39" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
      <line x1="0" y1="45" x2="0" y2="55" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
      <line x1="-32" y1="32" x2="-39" y2="39" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
      <line x1="-45" y1="0" x2="-55" y2="0" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
      <line x1="-32" y1="-32" x2="-39" y2="-39" stroke="#ffc107" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Two children waving -->
  <!-- Child 1 -->
  <g transform="translate(100, 160)">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="25" ry="35" fill="#42a5f5"/>
    <!-- Head -->
    <circle cx="0" cy="10" r="25" fill="#ffcc80"/>
    <!-- Hair -->
    <ellipse cx="0" cy="-5" rx="22" ry="15" fill="#5d4037"/>
    <!-- Eyes -->
    <circle cx="-8" cy="8" r="4" fill="#333">
      <animate attributeName="cy" values="8;6;8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="8" r="4" fill="#333">
      <animate attributeName="cy" values="8;6;8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Smile -->
    <path d="M-8 18 Q0 26 8 18" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Waving arm -->
    <g transform="rotate(0)">
      <animateTransform attributeName="transform" type="rotate" values="-20;30;-20" dur="0.8s" repeatCount="indefinite" additive="sum"/>
      <ellipse cx="35" cy="-10" rx="20" ry="8" fill="#ffcc80"/>
      <circle cx="50" cy="-10" r="8" fill="#ffcc80"/>
    </g>
  </g>
  
  <!-- Child 2 -->
  <g transform="translate(300, 160)">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="25" ry="35" fill="#ec407a"/>
    <!-- Head -->
    <circle cx="0" cy="10" r="25" fill="#ffcc80"/>
    <!-- Hair with pigtails -->
    <ellipse cx="0" cy="-5" rx="22" ry="15" fill="#8d6e63"/>
    <circle cx="-25" cy="0" r="10" fill="#8d6e63"/>
    <circle cx="25" cy="0" r="10" fill="#8d6e63"/>
    <!-- Eyes -->
    <circle cx="-8" cy="8" r="4" fill="#333">
      <animate attributeName="cy" values="8;6;8" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="8" cy="8" r="4" fill="#333">
      <animate attributeName="cy" values="8;6;8" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <!-- Smile -->
    <path d="M-8 18 Q0 26 8 18" stroke="#333" stroke-width="2" fill="none"/>
    <!-- Waving arm -->
    <g transform="rotate(0)">
      <animateTransform attributeName="transform" type="rotate" values="20;-30;20" dur="0.8s" repeatCount="indefinite" additive="sum"/>
      <ellipse cx="-35" cy="-10" rx="20" ry="8" fill="#ffcc80"/>
      <circle cx="-50" cy="-10" r="8" fill="#ffcc80"/>
    </g>
  </g>
  
  <!-- Speech bubble -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,5;0,-5;0,5" dur="2s" repeatCount="indefinite"/>
    <ellipse cx="200" cy="60" rx="80" ry="35" fill="white" stroke="#4caf50" stroke-width="3"/>
    <polygon points="170,90 180,110 195,90" fill="white" stroke="#4caf50" stroke-width="3"/>
    <text x="200" y="68" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="28" font-weight="bold" fill="#2e7d32">
      Hello!
      <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Hi! text -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="1.5s" repeatCount="indefinite"/>
    <ellipse cx="80" cy="100" rx="35" ry="22" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
    <text x="80" y="107" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="20" font-weight="bold" fill="#f57f17">Hi!</text>
  </g>
  
  <!-- Decorative flags -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;2,0;0,0" dur="1s" repeatCount="indefinite"/>
    <polygon points="30,20 30,70 45,60 30,50 45,40 30,30" fill="#ff5722"/>
  </g>
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;-2,0;0,0" dur="1s" repeatCount="indefinite"/>
    <polygon points="370,20 370,70 355,60 370,50 355,40 370,30" fill="#2196f3"/>
  </g>
  
  <!-- Ground -->
  <ellipse cx="200" cy="280" rx="180" ry="20" fill="#81c784"/>
  
  <!-- Title -->
  <text x="200" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1b5e20">Greeting / Приветствие</text>
</svg>