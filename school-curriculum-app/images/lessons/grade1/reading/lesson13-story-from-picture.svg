<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <text x="200" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2e7d32" text-anchor="middle">Рассказ по картинке</text>
  
  <!-- Picture frame -->
  <rect x="100" y="50" width="200" height="140" fill="white" stroke="#4caf50" stroke-width="3" rx="5"/>
  <rect x="105" y="55" width="190" height="130" fill="#e3f2fd"/>
  
  <!-- Picture content - children on slide -->
  <ellipse cx="200" cy="165" rx="70" ry="15" fill="#81c784"/>
  <!-- Slide -->
  <polygon points="150,160 220,100 250,160" fill="#ffcc80" stroke="#f57c00" stroke-width="2"/>
  <!-- Children -->
  <circle cx="180" cy="120" r="12" fill="#ffcc80"/>
  <circle cx="180" cy="115" r="6" fill="#ffcc80"/>
  <text x="180" y="122" font-family="Arial" font-size="10" text-anchor="middle">👧</text>
  
  <circle cx="210" cy="130" r="12" fill="#90caf9"/>
  <circle cx="210" cy="125" r="6" fill="#90caf9"/>
  <text x="210" y="132" font-family="Arial" font-size="10" text-anchor="middle">👦</text>
  
  <!-- Sun -->
  <circle cx="260" cy="75" r="15" fill="#ffd54f">
    <animate attributeName="r" values="15;18;15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="260" y="80" font-family="Arial" font-size="14" text-anchor="middle">☀️</text>
  
  <!-- Steps -->
  <text x="30" y="210" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20">1. Рассмотри картинку</text>
  <text x="30" y="225" font-family="Arial" font-size="10" fill="#388e3c">Кто? Что делает? Где?</text>
  
  <text x="30" y="245" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20">2. Придумай начало</text>
  <text x="30" y="260" font-family="Arial" font-size="10" fill="#388e3c">Как оказались здесь?</text>
  
  <text x="200" y="210" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20">3. Опиши середину</text>
  <text x="200" y="225" font-family="Arial" font-size="10" fill="#388e3c">Что происходит?</text>
  
  <text x="200" y="245" font-family="Arial" font-size="12" font-weight="bold" fill="#1b5e20">4. Придумай конец</text>
  <text x="200" y="260" font-family="Arial" font-size="10" fill="#388e3c">Что будет дальше?</text>
  
  <!-- Magnifying glass -->
  <circle cx="330" cy="130" r="20" fill="none" stroke="#66bb6a" stroke-width="3"/>
  <line x1="345" y1="145" x2="360" y2="160" stroke="#66bb6a" stroke-width="4"/>
  <text x="330" y="135" font-family="Arial" font-size="16" text-anchor="middle">🔍</text>
  
  <text x="200" y="285" font-family="Arial" font-size="11" fill="#5d4037" text-anchor="middle">Картинка подсказывает историю!</text>
</svg>