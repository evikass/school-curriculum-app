<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <style>
    @keyframes double-hop {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(25px); }
      50% { transform: translateX(50px); }
      75% { transform: translateX(50px); }
    }
    @keyframes step-step {
      0% { transform: translateX(0); }
      25% { transform: translateX(25px); }
      50% { transform: translateX(50px); }
      75% { transform: translateX(50px); }
      100% { transform: translateX(50px); }
    }
    @keyframes bounce-light {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .rabbit { animation: double-hop 2s ease-in-out infinite; }
    .example { animation: bounce-light 2s ease-in-out infinite; }
  </style>
  <!-- Background -->
  <rect width="400" height="400" fill="#fefce8" rx="20"/>
  <!-- Decorative carrots -->
  <g transform="translate(30, 330)">
    <path d="M 15 0 L 20 35 L 10 35 Z" fill="#f97316"/>
    <path d="M 12 0 Q 15 -8 18 0" fill="#22c55e"/>
  </g>
  <g transform="translate(350, 350)">
    <path d="M 10 0 L 15 30 L 5 30 Z" fill="#f97316"/>
    <path d="M 7 0 Q 10 -6 13 0" fill="#22c55e"/>
  </g>
  <!-- Title -->
  <text x="200" y="45" font-size="22" fill="#ca8a04" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">ПРИБАВИТЬ И ВЫЧЕСТЬ 2</text>
  <!-- Rabbit jumping -->
  <g class="rabbit" transform="translate(60, 70)">
    <ellipse cx="30" cy="45" rx="22" ry="18" fill="#faf5ff"/>
    <circle cx="30" cy="25" r="14" fill="#faf5ff"/>
    <ellipse cx="22" cy="8" rx="4" ry="14" fill="#faf5ff"/>
    <ellipse cx="38" cy="8" rx="4" ry="14" fill="#faf5ff"/>
    <circle cx="25" cy="22" r="2.5" fill="#1e293b"/>
    <circle cx="35" cy="22" r="2.5" fill="#1e293b"/>
    <ellipse cx="30" cy="30" rx="3" ry="2" fill="#f9a8d4"/>
    <!-- Jump trail -->
    <ellipse cx="0" cy="50" rx="8" ry="4" fill="#a5f3fc" opacity="0.5"/>
    <ellipse cx="-20" cy="50" rx="6" ry="3" fill="#a5f3fc" opacity="0.3"/>
  </g>
  <!-- +2 formula -->
  <g transform="translate(150, 70)">
    <rect x="0" y="0" width="220" height="60" fill="#dcfce7" rx="10"/>
    <text x="110" y="25" font-size="14" fill="#166534" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">+2 = +1 + 1</text>
    <text x="110" y="48" font-size="12" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">ДВА ШАГА ВПЕРЁД →→</text>
  </g>
  <!-- Number line with jumps -->
  <g transform="translate(30, 150)">
    <line x1="0" y1="20" x2="340" y2="20" stroke="#ca8a04" stroke-width="3"/>
    <!-- Numbers -->
    <circle cx="0" cy="20" r="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
    <text x="0" y="26" font-size="16" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">1</text>
    
    <circle cx="68" cy="20" r="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
    <text x="68" y="26" font-size="16" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">2</text>
    
    <circle cx="136" cy="20" r="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
    <text x="136" y="26" font-size="16" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">3</text>
    
    <circle cx="204" cy="20" r="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
    <text x="204" y="26" font-size="16" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">4</text>
    
    <circle cx="272" cy="20" r="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
    <text x="272" y="26" font-size="16" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">5</text>
    
    <circle cx="340" cy="20" r="18" fill="#fef3c7" stroke="#eab308" stroke-width="2"/>
    <text x="340" y="26" font-size="16" fill="#78350f" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">6</text>
    
    <!-- Jump arrows for +2 -->
    <path d="M 10 0 Q 70 -20 130 0" stroke="#22c55e" stroke-width="3" fill="none" stroke-dasharray="5,3"/>
    <polygon points="130,0 120,-5 120,5" fill="#22c55e"/>
    <text x="70" y="-25" font-size="12" fill="#22c55e" text-anchor="middle" font-family="Arial, sans-serif">+2</text>
  </g>
  <!-- Examples section -->
  <g transform="translate(30, 230)">
    <text x="170" y="0" font-size="16" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">ПРИМЕРЫ:</text>
    <!-- +2 examples -->
    <g class="example" transform="translate(0, 20)">
      <rect x="0" y="0" width="155" height="50" fill="#ecfdf5" rx="8"/>
      <text x="77" y="20" font-size="18" fill="#16a34a" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">3 + 2 = 5</text>
      <text x="77" y="40" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">3→4→5</text>
    </g>
    <g class="example" style="animation-delay: 0.3s" transform="translate(170, 20)">
      <rect x="0" y="0" width="155" height="50" fill="#ecfdf5" rx="8"/>
      <text x="77" y="20" font-size="18" fill="#16a34a" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">4 + 2 = 6</text>
      <text x="77" y="40" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">4→5→6</text>
    </g>
    <!-- -2 examples -->
    <g class="example" style="animation-delay: 0.6s" transform="translate(0, 80)">
      <rect x="0" y="0" width="155" height="50" fill="#fef2f2" rx="8"/>
      <text x="77" y="20" font-size="18" fill="#dc2626" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">6 − 2 = 4</text>
      <text x="77" y="40" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">6→5→4</text>
    </g>
    <g class="example" style="animation-delay: 0.9s" transform="translate(170, 80)">
      <rect x="0" y="0" width="155" height="50" fill="#fef2f2" rx="8"/>
      <text x="77" y="20" font-size="18" fill="#dc2626" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">5 − 2 = 3</text>
      <text x="77" y="40" font-size="10" fill="#64748b" text-anchor="middle" font-family="Arial, sans-serif">5→4→3</text>
    </g>
  </g>
  <!-- Famous 2+2=4 -->
  <g transform="translate(200, 385)">
    <text x="0" y="0" font-size="16" fill="#ca8a04" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold">2 + 2 = 4 🌟</text>
  </g>
</svg>