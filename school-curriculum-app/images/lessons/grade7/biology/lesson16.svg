<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B3E5FC"/><stop offset="100%" stop-color="#4FC3F7"/></linearGradient>
<linearGradient id="peat" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#8D6E63"/><stop offset="50%" stop-color="#5D4037"/><stop offset="100%" stop-color="#3E2723"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Мхи: сфагнум и значение мхов</text>
<text x="250" y="44" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 7 класс — Урок 16</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Section 1: Sphagnum Cross-Section -->
<text x="95" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Строение сфагнума</text>
<rect x="15" y="72" width="160" height="108" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Leaf cross-section diagram -->
<g transform="translate(95,120)">
  <!-- Large hyaline cells (водоносные) -->
  <rect x="-55" y="-30" width="30" height="40" rx="5" fill="#E1F5FE" stroke="#4FC3F7" stroke-width="1.2" opacity="0.8"/>
  <rect x="-20" y="-30" width="30" height="40" rx="5" fill="#E1F5FE" stroke="#4FC3F7" stroke-width="1.2" opacity="0.8"/>
  <rect x="15" y="-30" width="30" height="40" rx="5" fill="#E1F5FE" stroke="#4FC3F7" stroke-width="1.2" opacity="0.8"/>
  <rect x="50" y="-30" width="30" height="40" rx="5" fill="#E1F5FE" stroke="#4FC3F7" stroke-width="1.2" opacity="0.8"/>
  <!-- Water drops inside -->
  <circle cx="-40" cy="-10" r="3" fill="#4FC3F7" opacity="0.6"/>
  <circle cx="-5" cy="-8" r="3" fill="#4FC3F7" opacity="0.6"/>
  <circle cx="30" cy="-10" r="3" fill="#4FC3F7" opacity="0.6"/>
  <circle cx="65" cy="-8" r="3" fill="#4FC3F7" opacity="0.6"/>
  
  <!-- Small chlorophyll cells (хлорофиллоносные) -->
  <rect x="-40" y="-18" width="12" height="12" rx="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <rect x="-5" y="-18" width="12" height="12" rx="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <rect x="30" y="-18" width="12" height="12" rx="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
  <rect x="60" y="-16" width="12" height="12" rx="2" fill="#4CAF50" stroke="#2E7D32" stroke-width="1"/>
</g>

<!-- Labels for cross-section -->
<text x="40" y="140" font-family="Arial,sans-serif" font-size="6" fill="#0277BD" text-anchor="middle">водоносные</text>
<text x="40" y="148" font-family="Arial,sans-serif" font-size="6" fill="#0277BD" text-anchor="middle">клетки</text>
<text x="108" y="112" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">хлорофилло-</text>
<text x="108" y="120" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">носные</text>

<!-- Sphagnum plant -->
<g transform="translate(42,210)">
  <line x1="0" y1="0" x2="0" y2="-35" stroke="#66BB6A" stroke-width="1.5"/>
  <ellipse cx="0" cy="-38" rx="6" ry="4" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="-4" cy="-28" rx="5" ry="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.8" transform="rotate(-20,-4,-28)"/>
  <ellipse cx="4" cy="-28" rx="5" ry="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.8" transform="rotate(20,4,-28)"/>
  <ellipse cx="-5" cy="-18" rx="4" ry="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.8" transform="rotate(-25,-5,-18)"/>
  <ellipse cx="5" cy="-18" rx="4" ry="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.8" transform="rotate(25,5,-18)"/>
  <!-- Capsule (коробочка) -->
  <ellipse cx="0" cy="-45" rx="4" ry="6" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Сфагнум</text>
</g>

<!-- Water absorption diagram -->
<text x="160" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Впитывание воды</text>
<rect x="130" y="72" width="80" height="108" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Dry moss -->
<g transform="translate(148,100)">
  <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#C8E6C9" stroke="#81C784" stroke-width="1"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">1×</text>
</g>
<!-- Arrow -->
<path d="M148,115 L160,130" stroke="#2E7D32" stroke-width="1.2" fill="none" marker-end="url(#arrowG)"/>
<defs><marker id="arrowG" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/></marker></defs>
<text x="168" y="125" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">×20-25</text>

<!-- Wet moss -->
<g transform="translate(195,140)">
  <rect x="-15" y="-15" width="30" height="30" rx="3" fill="#4FC3F7" stroke="#0288D1" stroke-width="1" opacity="0.6"/>
  <rect x="-12" y="-12" width="24" height="24" rx="2" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="0" y="3" font-family="Arial,sans-serif" font-size="7" fill="#01579B" text-anchor="middle">×25</text>
  <!-- Water drops -->
  <circle cx="-10" cy="-10" r="2" fill="#29B6F6" opacity="0.7"/>
  <circle cx="10" cy="-8" r="2" fill="#29B6F6" opacity="0.7"/>
  <circle cx="-8" cy="8" r="2" fill="#29B6F6" opacity="0.7"/>
</g>

<!-- Section 2: Peat Formation -->
<text x="345" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Образование торфа</text>
<rect x="260" y="72" width="220" height="108" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Stage 1: Moss -->
<g transform="translate(290,110)">
  <ellipse cx="0" cy="0" rx="14" ry="10" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
  <path d="M-5,-8 L-3,-14 M0,-9 L0,-16 M5,-8 L3,-14" stroke="#4CAF50" stroke-width="1" fill="none"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Мох</text>
</g>
<!-- Arrow -->
<path d="M308,110 L325,110" stroke="#2E7D32" stroke-width="1.2" fill="none" marker-end="url(#arrowG)"/>

<!-- Stage 2: Peat -->
<g transform="translate(348,110)">
  <ellipse cx="0" cy="0" rx="14" ry="10" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <path d="M-8,-4 Q-3,-8 2,-3 Q7,-7 10,-2" stroke="#6D4C41" stroke-width="0.8" fill="none"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Торф</text>
</g>
<!-- Arrow -->
<path d="M366,110 L383,110" stroke="#2E7D32" stroke-width="1.2" fill="none" marker-end="url(#arrowG)"/>

<!-- Stage 3: Brown coal -->
<g transform="translate(406,110)">
  <ellipse cx="0" cy="0" rx="14" ry="10" fill="#5D4037" stroke="#3E2723" stroke-width="1"/>
  <path d="M-6,-3 Q0,-6 6,-3" stroke="#4E342E" stroke-width="0.8" fill="none"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Бурый уголь</text>
</g>
<!-- Arrow -->
<path d="M424,110 L441,110" stroke="#2E7D32" stroke-width="1.2" fill="none" marker-end="url(#arrowG)"/>

<!-- Stage 4: Hard coal -->
<g transform="translate(462,110)">
  <ellipse cx="0" cy="0" rx="14" ry="10" fill="#37474F" stroke="#263238" stroke-width="1"/>
  <path d="M-6,-2 L6,-2" stroke="#455A64" stroke-width="0.8"/>
  <text x="0" y="20" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Каменный</text>
  <text x="0" y="28" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">уголь</text>
</g>

<!-- Section 3: Bog Ecosystem Cross-Section -->
<text x="250" y="198" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сфагновое болото (профиль)</text>
<rect x="15" y="202" width="470" height="138" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Sky -->
<rect x="20" y="207" width="460" height="40" fill="#E3F2FD" rx="3"/>

<!-- Water layer -->
<rect x="20" y="247" width="460" height="20" fill="#B3E5FC" opacity="0.5" rx="0"/>
<text x="35" y="260" font-family="Arial,sans-serif" font-size="7" fill="#0277BD">Вода</text>

<!-- Peat layers -->
<rect x="20" y="267" width="460" height="25" fill="#A1887F" opacity="0.6"/>
<text x="35" y="283" font-family="Arial,sans-serif" font-size="7" fill="#4E342E">Торф (верховой)</text>
<rect x="20" y="292" width="460" height="20" fill="#8D6E63" opacity="0.7"/>
<text x="35" y="305" font-family="Arial,sans-serif" font-size="7" fill="#3E2723">Торф (низинный)</text>

<!-- Clay bottom -->
<rect x="20" y="312" width="460" height="23" fill="#BCAAA4" rx="0 0 3 3"/>
<text x="35" y="327" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">Глина</text>

<!-- Sphagnum mound -->
<ellipse cx="250" cy="245" rx="200" ry="15" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>

<!-- Moss plants on top -->
<g transform="translate(80,225)">
  <line x1="0" y1="0" x2="0" y2="-18" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-20" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>
<g transform="translate(120,222)">
  <line x1="0" y1="0" x2="0" y2="-20" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-22" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>
<g transform="translate(160,218)">
  <line x1="0" y1="0" x2="0" y2="-22" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-24" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>
<g transform="translate(200,216)">
  <line x1="0" y1="0" x2="0" y2="-24" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-26" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>
<g transform="translate(240,214)">
  <line x1="0" y1="0" x2="0" y2="-25" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-27" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>
<g transform="translate(280,214)">
  <line x1="0" y1="0" x2="0" y2="-25" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-27" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>
<g transform="translate(320,216)">
  <line x1="0" y1="0" x2="0" y2="-24" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-26" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>
<g transform="translate(360,218)">
  <line x1="0" y1="0" x2="0" y2="-22" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-24" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>
<g transform="translate(400,222)">
  <line x1="0" y1="0" x2="0" y2="-20" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-22" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>
<g transform="translate(440,225)">
  <line x1="0" y1="0" x2="0" y2="-18" stroke="#66BB6A" stroke-width="1"/>
  <ellipse cx="0" cy="-20" rx="5" ry="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
</g>

<!-- Bog plants (cotton grass / пушица) -->
<g transform="translate(140,205)">
  <line x1="0" y1="0" x2="0" y2="-28" stroke="#8BC34A" stroke-width="1"/>
  <ellipse cx="0" cy="-32" rx="4" ry="4" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
  <text x="0" y="-38" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Пушица</text>
</g>
<g transform="translate(350,207)">
  <line x1="0" y1="0" x2="0" y2="-26" stroke="#8BC34A" stroke-width="1"/>
  <ellipse cx="0" cy="-30" rx="4" ry="4" fill="white" stroke="#BDBDBD" stroke-width="0.5"/>
  <text x="0" y="-36" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Росянка</text>
  <circle cx="-2" cy="-22" r="1.5" fill="#F44336" opacity="0.7"/>
  <circle cx="3" cy="-20" r="1.5" fill="#F44336" opacity="0.7"/>
</g>

<!-- Small pine trees on bog -->
<g transform="translate(220,195)">
  <line x1="0" y1="0" x2="0" y2="-12" stroke="#795548" stroke-width="1.5"/>
  <polygon points="0,-22 -6,-10 6,-10" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="0" y="8" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Сосна</text>
</g>
<g transform="translate(300,197)">
  <line x1="0" y1="0" x2="0" y2="-10" stroke="#795548" stroke-width="1.2"/>
  <polygon points="0,-18 -5,-8 5,-8" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.6"/>
</g>

<!-- Significance labels -->
<text x="250" y="340" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-style="italic">Значение: образование торфа, водоохрана, строительство, медицина</text>
</svg>