<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="juicyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E53935;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#EF5350;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="dryClosedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8F00;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FFB300;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="dryOpenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6D4C41;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8D6E63;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="6" fill="url(#bgGrad)" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="500" height="32" rx="6" fill="url(#headerGrad)"/>
  <rect x="0" y="16" width="500" height="16" fill="url(#headerGrad)"/>
  <text x="250" y="22" font-family="Arial,sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">Плод. Разнообразие плодов</text>

  <!-- === FRUIT CLASSIFICATION (left side) === -->
  <text x="155" y="48" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle" font-weight="bold">КЛАССИФИКАЦИЯ ПЛОДОВ</text>

  <!-- Сочные плоды -->
  <rect x="8" y="54" width="155" height="108" rx="4" fill="url(#juicyGrad)" stroke="#E53935" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="85" y="66" font-family="Arial,sans-serif" font-size="9.5" fill="#C62828" text-anchor="middle" font-weight="bold">Сочные плоды</text>

  <!-- ягода -->
  <circle cx="26" cy="82" r="6" fill="#7B1FA2" opacity="0.8"/>
  <circle cx="22" cy="80" r="1.5" fill="white" opacity="0.4"/>
  <text x="38" y="85" font-family="Arial,sans-serif" font-size="8" fill="#333">ягода</text>
  <text x="80" y="85" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">виноград, томат</text>

  <!-- костянка -->
  <ellipse cx="26" cy="97" rx="5" ry="6" fill="#D32F2F" opacity="0.8"/>
  <circle cx="26" cy="99" r="2.5" fill="#5D4037" opacity="0.6"/>
  <text x="38" y="100" font-family="Arial,sans-serif" font-size="8" fill="#333">костянка</text>
  <text x="87" y="100" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">вишня, слива</text>

  <!-- яблоко -->
  <ellipse cx="26" cy="112" rx="6" ry="5.5" fill="#E53935" opacity="0.8"/>
  <line x1="26" y1="106" x2="26" y2="104" stroke="#5D4037" stroke-width="1"/>
  <text x="38" y="115" font-family="Arial,sans-serif" font-size="8" fill="#333">яблоко</text>
  <text x="78" y="115" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">яблоня, груша</text>

  <!-- тыквина -->
  <ellipse cx="26" cy="127" rx="7" ry="5" fill="#FF8F00" opacity="0.7"/>
  <line x1="21" y1="127" x2="31" y2="127" stroke="#E65100" stroke-width="0.5"/>
  <text x="38" y="130" font-family="Arial,sans-serif" font-size="8" fill="#333">тыквина</text>
  <text x="84" y="130" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">тыква, арбуз</text>

  <!-- померанец -->
  <circle cx="26" cy="142" r="6" fill="#FF9800" opacity="0.8"/>
  <text x="38" y="145" font-family="Arial,sans-serif" font-size="8" fill="#333">померанец</text>
  <text x="94" y="145" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">апельсин</text>

  <!-- Сухие нераскрывающиеся -->
  <rect x="8" y="166" width="155" height="82" rx="4" fill="url(#dryClosedGrad)" stroke="#FF8F00" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="85" y="178" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">Сухие нераскрывающиеся</text>

  <!-- зерновка -->
  <ellipse cx="26" cy="192" rx="6" ry="3" fill="#FDD835" opacity="0.8" stroke="#F9A825" stroke-width="0.5"/>
  <text x="38" y="195" font-family="Arial,sans-serif" font-size="8" fill="#333">зерновка</text>
  <text x="83" y="195" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">пшеница</text>

  <!-- семянка -->
  <ellipse cx="26" cy="207" rx="4" ry="6" fill="#5D4037" opacity="0.6" stroke="#3E2723" stroke-width="0.5"/>
  <text x="38" y="210" font-family="Arial,sans-serif" font-size="8" fill="#333">семянка</text>
  <text x="83" y="210" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">подсолнечник</text>

  <!-- орех -->
  <circle cx="26" cy="222" r="5" fill="#795548" opacity="0.8" stroke="#4E342E" stroke-width="0.5"/>
  <text x="38" y="225" font-family="Arial,sans-serif" font-size="8" fill="#333">орех</text>
  <text x="63" y="225" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">лещина, жёлудь</text>

  <!-- Сухие раскрывающиеся -->
  <rect x="8" y="252" width="155" height="60" rx="4" fill="url(#dryOpenGrad)" stroke="#6D4C41" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="85" y="264" font-family="Arial,sans-serif" font-size="9" fill="#4E342E" text-anchor="middle" font-weight="bold">Сухие раскрывающиеся</text>

  <!-- боб -->
  <ellipse cx="26" cy="278" rx="7" ry="3" fill="#8BC34A" opacity="0.7" stroke="#558B2F" stroke-width="0.5"/>
  <line x1="19" y1="275" x2="33" y2="275" stroke="#33691E" stroke-width="0.5"/>
  <text x="38" y="281" font-family="Arial,sans-serif" font-size="8" fill="#333">боб</text>
  <text x="58" y="281" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">горох</text>

  <!-- стручок -->
  <ellipse cx="26" cy="293" rx="7" ry="2.5" fill="#AED581" opacity="0.7" stroke="#558B2F" stroke-width="0.5"/>
  <line x1="26" y1="290" x2="26" y2="296" stroke="#33691E" stroke-width="0.5"/>
  <text x="38" y="296" font-family="Arial,sans-serif" font-size="8" fill="#333">стручок</text>
  <text x="72" y="296" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">капуста</text>

  <!-- коробочка -->
  <ellipse cx="26" cy="306" rx="4" ry="5" fill="#CE93D8" opacity="0.6" stroke="#7B1FA2" stroke-width="0.5"/>
  <text x="38" y="309" font-family="Arial,sans-serif" font-size="8" fill="#333">коробочка</text>
  <text x="84" y="309" font-family="Arial,sans-serif" font-size="7" fill="#666" font-style="italic">мак</text>

  <!-- === MAIN DIAGRAM: Fruit structure cross-section (center) === -->
  <rect x="170" y="54" width="155" height="155" rx="5" fill="white" fill-opacity="0.6" stroke="#2E7D32" stroke-width="1"/>
  <text x="247" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Строение плода</text>

  <!-- Drupe cross-section diagram -->
  <ellipse cx="247" cy="125" rx="45" ry="42" fill="#E53935" opacity="0.3" stroke="#C62828" stroke-width="1"/>
  <!-- Epicarp (skin) -->
  <ellipse cx="247" cy="125" rx="45" ry="42" fill="none" stroke="#C62828" stroke-width="1.5"/>
  <!-- Mesocarp (flesh) -->
  <ellipse cx="247" cy="125" rx="38" ry="35" fill="#EF5350" opacity="0.3" stroke="#E53935" stroke-width="0.8" stroke-dasharray="2,1"/>
  <!-- Endocarp (stone) -->
  <ellipse cx="247" cy="125" rx="20" ry="18" fill="#5D4037" opacity="0.5" stroke="#3E2723" stroke-width="1.2"/>
  <!-- Seed inside stone -->
  <ellipse cx="247" cy="123" rx="8" ry="6" fill="#A5D6A7" opacity="0.7" stroke="#2E7D32" stroke-width="0.8"/>

  <!-- Labels with lines -->
  <line x1="290" y1="90" x2="270" y2="98" stroke="#666" stroke-width="0.5"/>
  <text x="292" y="90" font-family="Arial,sans-serif" font-size="7" fill="#C62828">околоплодник</text>

  <line x1="296" y1="107" x2="272" y2="112" stroke="#666" stroke-width="0.5"/>
  <text x="298" y="107" font-family="Arial,sans-serif" font-size="7" fill="#E53935">внеш. слой</text>

  <line x1="296" y1="120" x2="272" y2="122" stroke="#666" stroke-width="0.5"/>
  <text x="298" y="120" font-family="Arial,sans-serif" font-size="7" fill="#E53935">мякоть</text>

  <line x1="296" y1="133" x2="267" y2="131" stroke="#666" stroke-width="0.5"/>
  <text x="298" y="133" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">косточка</text>

  <line x1="270" y1="145" x2="254" y2="130" stroke="#666" stroke-width="0.5"/>
  <text x="195" y="162" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">семя</text>
  <line x1="210" y1="160" x2="240" y2="127" stroke="#666" stroke-width="0.5"/>

  <text x="247" y="177" font-family="Arial,sans-serif" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-style="italic">Костянка (разрез)</text>

  <!-- Pericarp layers legend -->
  <rect x="180" y="185" width="135" height="20" rx="3" fill="white" fill-opacity="0.7" stroke="#aaa" stroke-width="0.5"/>
  <rect x="184" y="189" width="8" height="4" fill="#C62828" opacity="0.6"/>
  <text x="194" y="196" font-family="Arial,sans-serif" font-size="6.5" fill="#555">эндокарп</text>
  <rect x="224" y="189" width="8" height="4" fill="#EF5350" opacity="0.5"/>
  <text x="234" y="196" font-family="Arial,sans-serif" font-size="6.5" fill="#555">мезокарп</text>
  <rect x="268" y="189" width="8" height="4" fill="#E53935" opacity="0.4"/>
  <text x="278" y="196" font-family="Arial,sans-serif" font-size="6.5" fill="#555">экзокарп</text>

  <!-- === DISPERSAL METHODS (bottom-right) === -->
  <rect x="170" y="212" width="325" height="100" rx="5" fill="white" fill-opacity="0.6" stroke="#2E7D32" stroke-width="1"/>
  <text x="332" y="226" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Способы распространения плодов и семян</text>

  <!-- Зоохория -->
  <rect x="178" y="233" width="72" height="72" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="214" y="245" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">Зоохория</text>
  <!-- Bird icon -->
  <ellipse cx="214" cy="262" rx="8" ry="5" fill="#42A5F5" opacity="0.5"/>
  <polygon points="222,262 227,259 227,265" fill="#42A5F5" opacity="0.5"/>
  <circle cx="208" cy="260" r="1" fill="#1565C0"/>
  <!-- Seed with hook -->
  <ellipse cx="200" cy="278" rx="3" ry="2" fill="#795548" opacity="0.7"/>
  <path d="M203,277 Q207,273 205,270" fill="none" stroke="#5D4037" stroke-width="0.7"/>
  <text x="214" y="293" font-family="Arial,sans-serif" font-size="6.5" fill="#555" text-anchor="middle">животными</text>
  <text x="214" y="301" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="italic">репейник, лопух</text>

  <!-- Анемохория -->
  <rect x="258" y="233" width="72" height="72" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="294" y="245" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Анемохория</text>
  <!-- Wind lines -->
  <path d="M278,260 Q288,258 298,260" fill="none" stroke="#FF9800" stroke-width="0.8"/>
  <path d="M280,265 Q290,263 300,265" fill="none" stroke="#FF9800" stroke-width="0.8"/>
  <!-- Dandelion seed -->
  <circle cx="290" cy="275" r="2" fill="#795548" opacity="0.6"/>
  <line x1="290" y1="273" x2="290" y2="268" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="290" y1="268" x2="285" y2="264" stroke="#aaa" stroke-width="0.4"/>
  <line x1="290" y1="268" x2="295" y2="264" stroke="#aaa" stroke-width="0.4"/>
  <line x1="290" y1="268" x2="287" y2="263" stroke="#aaa" stroke-width="0.4"/>
  <line x1="290" y1="268" x2="293" y2="263" stroke="#aaa" stroke-width="0.4"/>
  <line x1="290" y1="268" x2="290" y2="262" stroke="#aaa" stroke-width="0.4"/>
  <text x="294" y="293" font-family="Arial,sans-serif" font-size="6.5" fill="#555" text-anchor="middle">ветром</text>
  <text x="294" y="301" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="italic">одуванчик, клён</text>

  <!-- Гидрохория -->
  <rect x="338" y="233" width="72" height="72" rx="4" fill="#E0F7FA" stroke="#00695C" stroke-width="0.8"/>
  <text x="374" y="245" font-family="Arial,sans-serif" font-size="8" fill="#00695C" text-anchor="middle" font-weight="bold">Гидрохория</text>
  <!-- Water waves -->
  <path d="M354,262 Q362,258 370,262 Q378,266 386,262" fill="none" stroke="#00ACC1" stroke-width="0.8"/>
  <path d="M354,268 Q362,264 370,268 Q378,272 386,268" fill="none" stroke="#00ACC1" stroke-width="0.8"/>
  <!-- Coconut floating -->
  <ellipse cx="374" cy="278" rx="5" ry="4" fill="#8D6E63" opacity="0.6"/>
  <text x="374" y="293" font-family="Arial,sans-serif" font-size="6.5" fill="#555" text-anchor="middle">водой</text>
  <text x="374" y="301" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="italic">кокос, ольха</text>

  <!-- Автохория -->
  <rect x="418" y="233" width="72" height="72" rx="4" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="454" y="245" font-family="Arial,sans-serif" font-size="8" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Автохория</text>
  <!-- Self-dispersal / explosion -->
  <ellipse cx="454" cy="270" rx="5" ry="3" fill="#AB47BC" opacity="0.4"/>
  <line x1="449" y1="268" x2="443" y2="262" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="459" y1="268" x2="465" y2="262" stroke="#7B1FA2" stroke-width="0.7"/>
  <line x1="454" y1="267" x2="454" y2="260" stroke="#7B1FA2" stroke-width="0.7"/>
  <circle cx="443" cy="262" r="1" fill="#7B1FA2" opacity="0.5"/>
  <circle cx="465" cy="262" r="1" fill="#7B1FA2" opacity="0.5"/>
  <circle cx="454" cy="260" r="1" fill="#7B1FA2" opacity="0.5"/>
  <text x="454" y="293" font-family="Arial,sans-serif" font-size="6.5" fill="#555" text-anchor="middle">саморазброс</text>
  <text x="454" y="301" font-family="Arial,sans-serif" font-size="6" fill="#888" text-anchor="italic">недотрога, бешеный</text>

  <!-- === FRUIT TYPES SUMMARY TABLE (top right) === -->
  <rect x="330" y="54" width="163" height="155" rx="5" fill="white" fill-opacity="0.6" stroke="#2E7D32" stroke-width="1"/>
  <text x="411" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Схема классификации</text>

  <!-- Main node: Плод -->
  <rect x="381" y="74" width="60" height="16" rx="3" fill="#2E7D32" opacity="0.9"/>
  <text x="411" y="85" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">ПЛОД</text>

  <!-- Lines to categories -->
  <line x1="391" y1="90" x2="370" y2="100" stroke="#2E7D32" stroke-width="1"/>
  <line x1="431" y1="90" x2="452" y2="100" stroke="#2E7D32" stroke-width="1"/>

  <!-- Сочные -->
  <rect x="342" y="100" width="55" height="14" rx="3" fill="#E53935" opacity="0.8"/>
  <text x="369" y="110" font-family="Arial,sans-serif" font-size="7.5" fill="white" text-anchor="middle" font-weight="bold">Сочные</text>

  <!-- Сухие -->
  <rect x="414" y="100" width="55" height="14" rx="3" fill="#FF8F00" opacity="0.8"/>
  <text x="441" y="110" font-family="Arial,sans-serif" font-size="7.5" fill="white" text-anchor="middle" font-weight="bold">Сухие</text>

  <!-- Sub-branches from Сочные -->
  <line x1="349" y1="114" x2="349" y2="122" stroke="#E53935" stroke-width="0.7"/>
  <line x1="369" y1="114" x2="369" y2="122" stroke="#E53935" stroke-width="0.7"/>
  <line x1="389" y1="114" x2="389" y2="122" stroke="#E53935" stroke-width="0.7"/>

  <text x="349" y="130" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">ягода</text>
  <text x="369" y="130" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">костянка</text>
  <text x="389" y="130" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">яблоко</text>

  <!-- More sub-branches -->
  <text x="349" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#888" text-anchor="middle">тыквина</text>
  <text x="389" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#888" text-anchor="middle">померанец</text>

  <!-- Sub-branches from Сухие -->
  <line x1="428" y1="114" x2="428" y2="122" stroke="#FF8F00" stroke-width="0.7"/>
  <line x1="455" y1="114" x2="455" y2="122" stroke="#FF8F00" stroke-width="0.7"/>

  <rect x="408" y="122" width="40" height="12" rx="2" fill="#FFA726" opacity="0.6"/>
  <text x="428" y="131" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">нераскр.</text>
  <rect x="438" y="122" width="40" height="12" rx="2" fill="#8D6E63" opacity="0.6"/>
  <text x="458" y="131" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle">раскрывающ.</text>

  <!-- Nераскрывающиеся sub-items -->
  <line x1="418" y1="134" x2="410" y2="145" stroke="#FF8F00" stroke-width="0.5"/>
  <line x1="428" y1="134" x2="428" y2="145" stroke="#FF8F00" stroke-width="0.5"/>

  <text x="400" y="152" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">зерновка</text>
  <text x="428" y="152" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">семянка</text>
  <text x="418" y="161" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">орех</text>

  <!-- Раскрывающиеся sub-items -->
  <line x1="450" y1="134" x2="445" y2="145" stroke="#6D4C41" stroke-width="0.5"/>
  <line x1="460" y1="134" x2="470" y2="145" stroke="#6D4C41" stroke-width="0.5"/>

  <text x="445" y="152" font-family="Arial,sans-serif" font-size="5.5" fill="#4E342E" text-anchor="middle">боб</text>
  <text x="470" y="152" font-family="Arial,sans-serif" font-size="5.5" fill="#4E342E" text-anchor="middle">стручок</text>
  <text x="458" y="161" font-family="Arial,sans-serif" font-size="5.5" fill="#4E342E" text-anchor="middle">коробочка</text>

  <!-- True vs false fruit note -->
  <rect x="335" y="170" width="155" height="32" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.5"/>
