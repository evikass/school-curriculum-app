<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="26" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32" text-anchor="middle">Семя. Строение и прорастание</text>
<text x="250" y="40" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 7 класс — Урок 27</text>
<line x1="30" y1="46" x2="470" y2="46" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- DICOT SEED (Bean) -->
<text x="130" y="62" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Двудольное семя (Фасоль)</text>

<g transform="translate(30,68)">
<!-- Seed coat outline - kidney shape -->
<path d="M100,10 Q130,5 140,30 Q145,55 120,70 Q95,80 70,70 Q45,55 50,30 Q60,5 90,10 Z" fill="#D7CCC8" stroke="#795548" stroke-width="1.5"/>
<!-- Hilum -->
<ellipse cx="95" cy="70" rx="8" ry="3" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
<text x="95" y="86" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">рубчик</text>

<!-- Left cotyledon (behind) -->
<path d="M80,20 Q65,35 70,55 Q80,65 90,55 Q95,40 90,25 Z" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8" opacity="0.6"/>

<!-- Right cotyledon (front, partially peeled) -->
<path d="M95,18 Q110,30 108,50 Q100,65 92,55 Q85,38 90,22 Z" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>

<!-- Embryo parts -->
<!-- Radicle -->
<path d="M92,55 Q88,62 85,68" stroke="#E65100" stroke-width="2.5" fill="none" stroke-linecap="round"/>
<text x="72" y="65" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="end">зародышевый</text>
<text x="72" y="72" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="end">корешок</text>

<!-- Hypocotyl -->
<line x1="93" y1="48" x2="93" y2="55" stroke="#FF8F00" stroke-width="2"/>
<text x="115" y="58" font-family="Arial,sans-serif" font-size="5.5" fill="#FF8F00">гипокотиль</text>

<!-- Epicotyl -->
<line x1="94" y1="35" x2="94" y2="48" stroke="#66BB6A" stroke-width="2"/>
<text x="115" y="44" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">эпикотиль</text>

<!-- Plumule (tiny leaves) -->
<path d="M92,30 Q88,25 92,22" stroke="#2E7D32" stroke-width="1" fill="#81C784"/>
<path d="M96,30 Q100,25 96,22" stroke="#2E7D32" stroke-width="1" fill="#81C784"/>
<text x="115" y="30" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">почечка</text>

<!-- Cotyledon labels -->
<line x1="135" y1="38" x2="160" y2="38" stroke="#888" stroke-width="0.5" stroke-dasharray="2"/>
<text x="162" y="36" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">семядоля 1</text>
<line x1="70" y1="42" x2="45" y2="42" stroke="#888" stroke-width="0.5" stroke-dasharray="2"/>
<text x="43" y="40" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="end">семядоля 2</text>

<!-- Seed coat label -->
<line x1="140" y1="18" x2="160" y2="15" stroke="#888" stroke-width="0.5" stroke-dasharray="2"/>
<text x="162" y="14" font-family="Arial,sans-serif" font-size="5.5" fill="#795548">семенная</text>
<text x="162" y="21" font-family="Arial,sans-serif" font-size="5.5" fill="#795548">оболочка</text>
</g>

<!-- MONOCOT SEED (Corn) -->
<text x="370" y="62" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Однодольное семя (Кукуруза)</text>

<g transform="translate(280,68)">
<!-- Seed outline - triangular/teardrop -->
<path d="M90,10 Q120,15 125,45 Q120,75 90,80 Q60,75 55,45 Q60,15 90,10 Z" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>

<!-- Endosperm (large area) -->
<path d="M90,22 Q112,28 115,48 Q110,65 90,68 Q70,65 65,48 Q68,28 90,22 Z" fill="#FFF3E0" stroke="#FFE0B2" stroke-width="0.5"/>
<text x="90" y="52" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">Эндосперм</text>

<!-- Scutellum (single cotyledon) -->
<path d="M75,28 Q68,40 70,55 Q75,60 80,50 Q82,38 78,30 Z" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
<text x="56" y="42" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="end">щиток</text>
<text x="56" y="48" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="end">(семядоля)</text>

<!-- Embryo -->
<ellipse cx="90" cy="65" rx="8" ry="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
<!-- Radicle pointing down -->
<path d="M90,70 L90,76" stroke="#E65100" stroke-width="1.5" stroke-linecap="round"/>
<!-- Shoot pointing up -->
<path d="M90,60 L90,55" stroke="#2E7D32" stroke-width="1.5" stroke-linecap="round"/>

<text x="108" y="63" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">зародыш</text>

<!-- Seed coat label -->
<line x1="125" y1="25" x2="145" y2="20" stroke="#888" stroke-width="0.5" stroke-dasharray="2"/>
<text x="147" y="18" font-family="Arial,sans-serif" font-size="5.5" fill="#F9A825">семенная</text>
<text x="147" y="24" font-family="Arial,sans-serif" font-size="5.5" fill="#F9A825">оболочка</text>
</g>

<!-- GERMINATION CONDITIONS -->
<text x="250" y="175" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Условия прорастания</text>

<g transform="translate(30,182)">
<!-- Water -->
<rect x="0" y="0" width="100" height="35" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
<text x="50" y="14" font-family="Arial,sans-serif" font-size="8" fill="#1565C0" text-anchor="middle" font-weight="bold">💧 Вода</text>
<text x="50" y="26" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">набухание семени</text>

<!-- O2 -->
<rect x="110" y="0" width="100" height="35" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
<text x="160" y="14" font-family="Arial,sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle" font-weight="bold">💨 Кислород</text>
<text x="160" y="26" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">дыхание зародыша</text>

<!-- Temperature -->
<rect x="220" y="0" width="100" height="35" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
<text x="270" y="14" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">🌡 Температура</text>
<text x="270" y="26" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">ферменты активны</text>

<!-- Light (optional) -->
<rect x="330" y="0" width="100" height="35" rx="4" fill="#FFFDE7" stroke="#F9A825" stroke-width="1" stroke-dasharray="3"/>
<text x="380" y="14" font-family="Arial,sans-serif" font-size="8" fill="#F9A825" text-anchor="middle" font-weight="bold">☀ Свет</text>
<text x="380" y="26" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">(не для всех)</text>
</g>

<!-- GERMINATION SEQUENCE -->
<text x="250" y="238" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Последовательность прорастания</text>

<!-- Stage 1: Imbibition (swollen seed) -->
<g transform="translate(40,248)">
<ellipse cx="25" cy="18" rx="18" ry="13" fill="#D7CCC8" stroke="#795548" stroke-width="1"/>
<ellipse cx="25" cy="18" rx="16" ry="11" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Water drops -->
<text x="5" y="8" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">💧</text>
<text x="38" y="8" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">💧</text>
<text x="25" y="42" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Набухание</text>
</g>

<!-- Arrow 1 -->
<path d="M80,265 L100,265" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#arG27)"/>
<defs><marker id="arG27" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5Z" fill="#2E7D32"/></marker></defs>

<!-- Stage 2: Radicle emerges -->
<g transform="translate(105,248)">
<ellipse cx="25" cy="15" rx="17" ry="11" fill="#D7CCC8" stroke="#795548" stroke-width="1"/>
<path d="M25,26 L25,36" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
<text x="25" y="42" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Корешок</text>
<text x="25" y="49" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">выходит</text>
</g>

<!-- Arrow 2 -->
<path d="M150,265 L170,265" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#arG27)"/>

<!-- Stage 3: Hypocotyl elongates -->
<g transform="translate(175,240)">
<ellipse cx="25" cy="10" rx="15" ry="10" fill="#D7CCC8" stroke="#795548" stroke-width="1" opacity="0.7"/>
<path d="M25,20 L25,42" stroke="#66BB6A" stroke-width="2" stroke-linecap="round"/>
<path d="M25,42 L23,48 M25,42 L27,48" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round"/>
<text x="25" y="58" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Гипокотиль</text>
<text x="25" y="65" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">растёт</text>
</g>

<!-- Arrow 3 -->
<path d="M220,265 L240,265" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#arG27)"/>

<!-- Stage 4: Seedling -->
<g transform="translate(248,238)">
<!-- Stem -->
<line x1="40" y1="55" x2="40" y2="20" stroke="#4CAF50" stroke-width="2"/>
<!-- Roots -->
<path d="M40,55 L38,65 M40,55 L42,63 M40,55 L36,60" stroke="#8D6E63" stroke-width="1" stroke-linecap="round"/>
<!-- Cotyledons emerging -->
<ellipse cx="32" cy="24" rx="8" ry="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8" transform="rotate(-30,32,24)"/>
<ellipse cx="48" cy="24" rx="8" ry="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8" transform="rotate(30,48,24)"/>
<!-- First true leaves -->
<path d="M40,15 Q32,8 36,5" stroke="#2E7D32" stroke-width="1" fill="#81C784"/>
<path d="M40,15 Q48,8 44,5" stroke="#2E7D32" stroke-width="1" fill="#81C784"/>
<text x="40" y="75" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Проросток</text>
</g>

<!-- Additional note about epigeal vs hypogeal -->
<g transform="translate(370,250)">
<rect x="0" y="0" width="110" height="60" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
<text x="55" y="12" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Типы прорастания:</text>
<text x="55" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Надземное — семядоли</text>
<text x="55" y="32" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">выносятся над почвой</text>
<line x1="10" y1="36" x2="100" y2="36" stroke="#2E7D32" stroke-width="0.3"/>
<text x="55" y="46" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Подземное — семядоли</text>
<text x="55" y="54" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">остаются в почве</text>
</g>

<!-- Embryo label box at bottom-left -->
<g transform="translate(30,310)">
<rect x="0" y="0" width="180" height="28" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
<text x="90" y="12" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle" font-weight="bold">Зародыш = корешок + гипокотиль +</text>
<text x="90" y="22" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle" font-weight="bold">эпикотиль + почечка + семядоли</text>
</g>
</svg>