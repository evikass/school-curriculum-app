<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Класс Двудольные (Dicotyledones)</text>
<text x="250" y="44" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 7 класс — Урок 24</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Section: 5 Diagnostic Features -->
<text x="250" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Диагностические признаки двудольных</text>

<!-- Feature 1: 2 cotyledons -->
<g transform="translate(55,100)">
  <rect x="-40" y="-20" width="80" height="42" fill="white" fill-opacity="0.5" rx="4" stroke="#A5D6A7" stroke-width="0.6"/>
  <!-- Seed with 2 cotyledons -->
  <ellipse cx="0" cy="0" rx="12" ry="8" fill="#A1887F" stroke="#6D4C41" stroke-width="0.6"/>
  <path d="M0,-8 L0,8" stroke="#5D4037" stroke-width="0.5"/>
  <ellipse cx="-4" cy="0" rx="5" ry="6" fill="#C8E6C9" stroke="#81C784" stroke-width="0.4"/>
  <ellipse cx="4" cy="0" rx="5" ry="6" fill="#C8E6C9" stroke="#81C784" stroke-width="0.4"/>
  <text x="0" y="-24" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2E7D32" text-anchor="middle">1. Две семядоли</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">зародыш с 2 семядолями</text>
</g>

<!-- Feature 2: Net venation -->
<g transform="translate(155,100)">
  <rect x="-40" y="-20" width="80" height="42" fill="white" fill-opacity="0.5" rx="4" stroke="#A5D6A7" stroke-width="0.6"/>
  <!-- Leaf with net venation -->
  <path d="M0,-14 Q-16,-6 -14,4 Q-10,12 0,14 Q10,12 14,4 Q16,-6 0,-14Z" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="0" y1="-14" x2="0" y2="14" stroke="#2E7D32" stroke-width="0.6"/>
  <line x1="0" y1="-6" x2="-8" y2="-10" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="0" y1="-6" x2="8" y2="-10" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="0" y1="0" x2="-10" y2="-2" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="0" y1="0" x2="10" y2="-2" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="0" y1="6" x2="-8" y2="8" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="0" y1="6" x2="8" y2="8" stroke="#2E7D32" stroke-width="0.3"/>
  <text x="0" y="-24" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2E7D32" text-anchor="middle">2. Сетчатое жилкование</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">перистое / пальчатое</text>
</g>

<!-- Feature 3: Taproot -->
<g transform="translate(255,100)">
  <rect x="-40" y="-20" width="80" height="42" fill="white" fill-opacity="0.5" rx="4" stroke="#A5D6A7" stroke-width="0.6"/>
  <!-- Taproot system -->
  <line x1="0" y1="-8" x2="0" y2="12" stroke="#795548" stroke-width="2"/>
  <path d="M0,-8 Q-5,-6 -6,-2" stroke="#795548" stroke-width="0.8" fill="none"/>
  <path d="M0,-8 Q5,-6 6,-2" stroke="#795548" stroke-width="0.8" fill="none"/>
  <path d="M0,-3 Q-7,0 -8,3" stroke="#795548" stroke-width="0.6" fill="none"/>
  <path d="M0,-3 Q7,0 8,3" stroke="#795548" stroke-width="0.6" fill="none"/>
  <path d="M0,4 Q-6,6 -7,9" stroke="#795548" stroke-width="0.5" fill="none"/>
  <path d="M0,4 Q6,6 7,9" stroke="#795548" stroke-width="0.5" fill="none"/>
  <text x="0" y="-24" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2E7D32" text-anchor="middle">3. Стержневая корн.</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">главный + боковые</text>
</g>

<!-- Feature 4: 4-5 merous flowers -->
<g transform="translate(355,100)">
  <rect x="-40" y="-20" width="80" height="42" fill="white" fill-opacity="0.5" rx="4" stroke="#A5D6A7" stroke-width="0.6"/>
  <!-- 5-petal flower -->
  <circle cx="-6" cy="-4" r="5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.4"/>
  <circle cx="6" cy="-4" r="5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.4"/>
  <circle cx="-10" cy="5" r="5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.4"/>
  <circle cx="10" cy="5" r="5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.4"/>
  <circle cx="0" cy="-8" r="5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.4"/>
  <circle cx="0" cy="0" r="3" fill="#FFD54F" stroke="#F9A825" stroke-width="0.4"/>
  <text x="0" y="-24" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2E7D32" text-anchor="middle">4. Число частей 4-5</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">4- или 5-членные</text>
</g>

<!-- Feature 5: Cambium present -->
<g transform="translate(450,100)">
  <rect x="-35" y="-20" width="70" height="42" fill="white" fill-opacity="0.5" rx="4" stroke="#A5D6A7" stroke-width="0.6"/>
  <!-- Stem cross section with rings -->
  <circle cx="0" cy="0" r="12" fill="#8D6E63" stroke="#5D4037" stroke-width="0.6"/>
  <circle cx="0" cy="0" r="9" fill="#A1887F" stroke="#8D6E63" stroke-width="0.4"/>
  <circle cx="0" cy="0" r="5" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.4"/>
  <circle cx="0" cy="0" r="2" fill="#795548"/>
  <!-- Cambium ring -->
  <circle cx="0" cy="0" r="7" fill="none" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="0" y="-24" font-family="Arial,sans-serif" font-size="6.5" font-weight="bold" fill="#2E7D32" text-anchor="middle">5. Камбий +</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">вторичный рост</text>
</g>

<!-- Divider -->
<line x1="30" y1="140" x2="470" y2="140" stroke="#2E7D32" stroke-width="1" opacity="0.2"/>
<text x="250" y="154" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Основные семейства двудольных</text>

<!-- Family 1: Розоцветные (Rosaceae) -->
<rect x="10" y="160" width="92" height="170" fill="white" fill-opacity="0.45" rx="5" stroke="#E91E63" stroke-width="0.8"/>
<text x="56" y="174" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#C2185B" text-anchor="middle">Розоцветные</text>
<text x="56" y="183" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Rosaceae</text>
<!-- Formula -->
<rect x="15" y="186" width="82" height="14" fill="#FCE4EC" rx="2"/>
<text x="56" y="196" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#C2185B" text-anchor="middle">Ч₅ Л₅ Т∞ П₁</text>
<!-- Rose flower -->
<circle cx="42" cy="220" r="3.5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.3"/>
<circle cx="56" cy="214" r="3.5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.3"/>
<circle cx="68" cy="220" r="3.5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.3"/>
<circle cx="64" cy="233" r="3.5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.3"/>
<circle cx="46" cy="233" r="3.5" fill="#F48FB1" stroke="#E91E63" stroke-width="0.3"/>
<circle cx="56" cy="225" r="3" fill="#FFD54F" stroke="#F9A825" stroke-width="0.4"/>
<!-- Examples -->
<text x="56" y="250" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🍎 Яблоня</text>
<text x="56" y="260" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🌹 Роза</text>
<text x="56" y="270" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🍓 Земляника</text>
<!-- Fruit types -->
<rect x="17" y="278" width="78" height="44" fill="#FCE4EC" fill-opacity="0.3" rx="2"/>
<text x="56" y="288" font-family="Arial,sans-serif" font-size="5" fill="#C2185B" text-anchor="middle">Плоды:</text>
<text x="56" y="296" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">яблоко, костянка</text>
<text x="56" y="304" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">многолистовка</text>
<text x="56" y="312" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">земляничина</text>
<text x="56" y="320" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">~3000 видов</text>

<!-- Family 2: Бобовые (Fabaceae) -->
<rect x="108" y="160" width="92" height="170" fill="white" fill-opacity="0.45" rx="5" stroke="#4CAF50" stroke-width="0.8"/>
<text x="154" y="174" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#2E7D32" text-anchor="middle">Бобовые</text>
<text x="154" y="183" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Fabaceae</text>
<!-- Formula -->
<rect x="113" y="186" width="82" height="14" fill="#E8F5E9" rx="2"/>
<text x="154" y="196" font-family="Arial,sans-serif" font-size="5.5" font-weight="bold" fill="#2E7D32" text-anchor="middle">Ч(5) Л1+2+(2) Т(9)+1 П1</text>
<!-- Papilionaceous flower (moth-type) -->
<!-- Flag (sail) -->
<path d="M148,218 L154,208 L160,218Z" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.5"/>
<!-- Wings -->
<path d="M145,222 L140,218 L144,224Z" fill="#BA68C8" stroke="#7B1FA2" stroke-width="0.4"/>
<path d="M163,222 L168,218 L164,224Z" fill="#BA68C8" stroke="#7B1FA2" stroke-width="0.4"/>
<!-- Keel -->
<path d="M150,226 L154,230 L158,226Z" fill="#AB47BC" stroke="#6A1B9A" stroke-width="0.4"/>
<text x="154" y="240" font-family="Arial,sans-serif" font-size="4" fill="#7B1FA2" text-anchor="middle">мотыльковый тип</text>
<!-- Examples -->
<text x="154" y="252" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🫛 Горох</text>
<text x="154" y="262" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🍀 Клевер</text>
<text x="154" y="272" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🥜 Арахис</text>
<!-- Fruit info -->
<rect x="115" y="278" width="78" height="44" fill="#E8F5E9" fill-opacity="0.3" rx="2"/>
<text x="154" y="288" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Плод — боб:</text>
<text x="154" y="296" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">раскрывается 2 створками</text>
<text x="154" y="304" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">Клубеньки на корнях</text>
<text x="154" y="312" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">(азотфиксация!)</text>
<text x="154" y="320" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">~20 000 видов</text>

<!-- Family 3: Крестоцветные (Brassicaceae) -->
<rect x="206" y="160" width="92" height="170" fill="white" fill-opacity="0.45" rx="5" stroke="#FFC107" stroke-width="0.8"/>
<text x="252" y="174" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#F57F17" text-anchor="middle">Крестоцветные</text>
<text x="252" y="183" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Brassicaceae</text>
<!-- Formula -->
<rect x="211" y="186" width="82" height="14" fill="#FFF8E1" rx="2"/>
<text x="252" y="196" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#F57F17" text-anchor="middle">Ч₄ Л₄ Т₂+₄ П₁</text>
<!-- Cruciform flower (cross) -->
<ellipse cx="240" cy="216" rx="4" ry="9" fill="#FFF176" stroke="#FDD835" stroke-width="0.4"/>
<ellipse cx="264" cy="216" rx="4" ry="9" fill="#FFF176" stroke="#FDD835" stroke-width="0.4"/>
<ellipse cx="252" cy="204" rx="9" ry="4" fill="#FFF176" stroke="#FDD835" stroke-width="0.4"/>
<ellipse cx="252" cy="228" rx="9" ry="4" fill="#FFF176" stroke="#FDD835" stroke-width="0.4"/>
<circle cx="252" cy="216" r="3" fill="#F9A825" stroke="#F57F17" stroke-width="0.3"/>
<text x="252" y="240" font-family="Arial,sans-serif" font-size="4" fill="#F57F17" text-anchor="middle">крестовидный венчик</text>
<!-- Examples -->
<text x="252" y="252" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🥬 Капуста</text>
<text x="252" y="262" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🫚 Редис</text>
<text x="252" y="272" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🟡 Горчица</text>
<!-- Fruit info -->
<rect x="213" y="278" width="78" height="44" fill="#FFF8E1" fill-opacity="0.3" rx="2"/>
<text x="252" y="288" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">Плод — стручок</text>
<text x="252" y="296" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">или стручочек</text>
<text x="252" y="304" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">4 длинных + 2 коротк.</text>
<text x="252" y="312" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">тычинки (тетрадинамия)</text>
<text x="252" y="320" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">~3 500 видов</text>

<!-- Family 4: Паслёновые (Solanaceae) -->
<rect x="304" y="160" width="92" height="170" fill="white" fill-opacity="0.45" rx="5" stroke="#7B1FA2" stroke-width="0.8"/>
<text x="350" y="174" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Паслёновые</text>
<text x="350" y="183" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Solanaceae</text>
<!-- Formula -->
<rect x="311" y="186" width="78" height="14" fill="#F3E5F5" rx="2"/>
<text x="350" y="196" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Ч(5) Л(5) Т(5) П1</text>
<!-- Tubular flower -->
<ellipse cx="350" cy="212" rx="10" ry="7" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.5"/>
<path d="M340,210 Q345,204 350,208 Q355,204 360,210" fill="#AB47BC" stroke="#7B1FA2" stroke-width="0.4"/>
<circle cx="350" cy="214" r="2.5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
<text x="350" y="230" font-family="Arial,sans-serif" font-size="4" fill="#6A1B9A" text-anchor="middle">сростнолепестный</text>
<!-- Examples -->
<text x="350" y="244" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🥔 Картофель</text>
<text x="350" y="254" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🍅 Томат</text>
<text x="350" y="264" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🌶 Перец</text>
<text x="350" y="274" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🍆 Баклажан</text>
<!-- Fruit info -->
<rect x="311" y="278" width="78" height="44" fill="#F3E5F5" fill-opacity="0.3" rx="2"/>
<text x="350" y="288" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle">Плод — ягода</text>
<text x="350" y="296" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">или коробочка</text>
<text x="350" y="304" font-family="Arial,sans-serif" font-size="4.5" fill="#C2185B" text-anchor="middle">⚠ Многие ядовиты!</text>
<text x="350" y="312" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">(соланин)</text>
<text x="350" y="320" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">~2 700 видов</text>

<!-- Family 5: Астровые (Asteraceae) -->
<rect x="402" y="160" width="92" height="170" fill="white" fill-opacity="0.45" rx="5" stroke="#FF6F00" stroke-width="0.8"/>
<text x="448" y="174" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#E65100" text-anchor="middle">Астровые</text>
<text x="448" y="183" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Asteraceae</text>
<!-- Formula -->
<rect x="409" y="186" width="78" height="14" fill="#FFF3E0" rx="2"/>
<text x="448" y="196" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#E65100" text-anchor="middle">Ч→Л(5) Т(5) П1</text>
<!-- Sunflower head (composite inflorescence) -->
<circle cx="448" cy="218" r="10" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
<!-- Disk florets -->
<circle cx="448" cy="215" r="1.2" fill="#F9A825"/>
<circle cx="446" cy="218" r="1.2" fill="#F9A825"/>
<circle cx="450" cy="218" r="1.2" fill="#F9A825"/>
<circle cx="448" cy="221" r="1.2" fill="#F9A825"/>
<!-- Ray florets (petals) -->
<ellipse cx="436" cy="212" rx="5" ry="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3" transform="rotate(-30 436 212)"/>
<ellipse cx="460" cy="212" rx="5" ry="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3" transform="rotate(30 460 212)"/>
<ellipse cx="434" cy="220" rx="5" ry="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3" transform="rotate(-50 434 220)"/>
<ellipse cx="462" cy="220" rx="5" ry="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3" transform="rotate(50 462 220)"/>
<ellipse cx="448" cy="206" rx="5" ry="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
<ellipse cx="448" cy="230" rx="5" ry="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
<text x="448" y="240" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle">корзинка</text>
<!-- Examples -->
<text x="448" y="252" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🌻 Подсолнечник</text>
<text x="448" y="262" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🌼 Ромашка</text>
<text x="448" y="272" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">🍀 Одуванчик</text>
<!-- Fruit info -->
<rect x="409" y="278" width="78" height="44" fill="#FFF3E0" fill-opacity="0.3" rx="2"/>
<text x="448" y="288" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Плод — семянка</text>
<text x="448" y="296" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">с летучкой / хохолком</text>
<text x="448" y="304" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">Чашечка → хохолок</text>
<text x="448" y="312" font-family="Arial,sans-serif" font-size="4.5" fill="#555" text-anchor="middle">(паппус)</text>
<text x="448" y="320" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle">~32 000 видов!</text>
</svg>