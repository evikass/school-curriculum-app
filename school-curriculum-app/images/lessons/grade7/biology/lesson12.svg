<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="greenCell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8E6C9"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <radialGradient id="stigmaG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#D84315"/>
    </radialGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <rect x="1" y="1" width="498" height="348" fill="none" stroke="#2E7D32" stroke-width="2" rx="8"/>
  <!-- Header -->
  <rect x="4" y="4" width="492" height="28" fill="url(#hdr)" rx="6"/>
  <text x="250" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#fff" font-weight="bold">Одноклеточные водоросли</text>

  <!-- ========== CHLAMYDOMONAS ========== -->
  <text x="72" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" font-weight="bold">Хламидомонада</text>
  <!-- Cell body -->
  <ellipse cx="72" cy="108" rx="38" ry="32" fill="url(#greenCell)" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Cell wall outline -->
  <ellipse cx="72" cy="108" rx="40" ry="34" fill="none" stroke="#1B5E20" stroke-width="1.5" stroke-dasharray="2,1"/>
  <!-- Chloroplast (cup-shaped) -->
  <path d="M48,92 Q48,130 72,130 Q96,130 96,92 Q88,100 72,102 Q56,100 48,92Z" fill="#388E3C" stroke="#1B5E20" stroke-width="0.8" opacity="0.7"/>
  <!-- Pyrenoid -->
  <circle cx="72" cy="118" r="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.7"/>
  <!-- Nucleus -->
  <ellipse cx="72" cy="96" rx="8" ry="6" fill="#795548" stroke="#4E342E" stroke-width="0.8"/>
  <circle cx="72" cy="96" r="2" fill="#4E342E"/>
  <!-- Stigma -->
  <circle cx="88" cy="88" r="3.5" fill="url(#stigmaG)"/>
  <!-- Contractile vacuoles -->
  <circle cx="50" cy="96" r="3" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.6"/>
  <circle cx="94" cy="96" r="3" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.6"/>
  <!-- Flagella -->
  <path d="M62,76 Q55,60 48,50" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <path d="M82,76 Q89,60 96,50" fill="none" stroke="#2E7D32" stroke-width="1.2"/>

  <!-- Labels for Chlamydomonas -->
  <line x1="36" y1="76" x2="8" y2="62" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="2" y="62" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">жгутики</text>
  <line x1="92" y1="88" x2="115" y2="78" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="116" y="78" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">стигма</text>
  <line x1="96" y1="96" x2="115" y2="92" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="116" y="92" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">пульсирующая</text>
  <text x="116" y="99" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">вакуоль</text>
  <line x1="84" y1="96" x2="115" y2="106" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="116" y="106" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">ядро</text>
  <line x1="72" y1="124" x2="115" y2="120" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="116" y="120" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">пиреноид</text>
  <line x1="72" y1="108" x2="115" y2="134" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="116" y="134" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">хлоропласт</text>
  <line x1="40" y1="82" x2="8" y2="78" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="2" y="78" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">клеточная</text>
  <text x="2" y="84" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">оболочка</text>

  <!-- ========== CHLORELLA ========== -->
  <text x="230" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" font-weight="bold">Хлорелла</text>
  <!-- Cell -->
  <circle cx="230" cy="100" r="28" fill="url(#greenCell)" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Cell wall -->
  <circle cx="230" cy="100" r="30" fill="none" stroke="#1B5E20" stroke-width="1.5"/>
  <!-- Chloroplast (cup/band) -->
  <path d="M210,90 Q210,115 230,118 Q250,115 250,90 Q242,98 230,100 Q218,98 210,90Z" fill="#388E3C" stroke="#1B5E20" stroke-width="0.8" opacity="0.7"/>
  <!-- Nucleus -->
  <ellipse cx="230" cy="94" rx="6" ry="5" fill="#795548" stroke="#4E342E" stroke-width="0.7"/>
  <!-- No flagella marker -->
  <text x="230" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Без жгутиков!</text>
  <!-- Labels -->
  <line x1="252" y1="88" x2="275" y2="78" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="276" y="78" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">оболочка</text>
  <line x1="248" y1="100" x2="275" y2="96" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="276" y="96" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">хлоропласт</text>
  <line x1="236" y1="94" x2="275" y2="110" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="276" y="110" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">ядро</text>

  <!-- ========== EUGLENA ========== -->
  <text x="400" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" font-weight="bold">Эвглена зелёная</text>
  <!-- Body - elongated spindle -->
  <ellipse cx="400" cy="100" rx="30" ry="16" fill="url(#greenCell)" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Pellicle stripes -->
  <line x1="375" y1="94" x2="425" y2="94" stroke="#1B5E20" stroke-width="0.3" opacity="0.5"/>
  <line x1="374" y1="98" x2="426" y2="98" stroke="#1B5E20" stroke-width="0.3" opacity="0.5"/>
  <line x1="375" y1="102" x2="425" y2="102" stroke="#1B5E20" stroke-width="0.3" opacity="0.5"/>
  <line x1="376" y1="106" x2="424" y2="106" stroke="#1B5E20" stroke-width="0.3" opacity="0.5"/>
  <!-- Chloroplasts (discoid) -->
  <ellipse cx="392" cy="96" rx="5" ry="3" fill="#388E3C" stroke="#1B5E20" stroke-width="0.5"/>
  <ellipse cx="405" cy="98" rx="5" ry="3" fill="#388E3C" stroke="#1B5E20" stroke-width="0.5"/>
  <ellipse cx="398" cy="104" rx="5" ry="3" fill="#388E3C" stroke="#1B5E20" stroke-width="0.5"/>
  <ellipse cx="412" cy="103" rx="4" ry="3" fill="#388E3C" stroke="#1B5E20" stroke-width="0.5"/>
  <!-- Stigma -->
  <circle cx="384" cy="92" r="3" fill="url(#stigmaG)"/>
  <!-- Nucleus -->
  <ellipse cx="415" cy="100" rx="6" ry="5" fill="#795548" stroke="#4E342E" stroke-width="0.7"/>
  <!-- Flagellum -->
  <path d="M375,92 Q360,70 355,55" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
  <!-- Contractile vacuole -->
  <circle cx="380" cy="92" r="2.5" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.5"/>
  <!-- Labels -->
  <line x1="358" y1="60" x2="340" y2="55" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="310" y="55" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">жгутик</text>
  <line x1="384" y1="89" x2="370" y2="78" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="345" y="78" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">стигма</text>
  <line x1="392" y1="96" x2="440" y2="82" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="441" y="82" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">хлоропласты</text>
  <line x1="415" y1="100" x2="440" y2="96" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="441" y="96" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">ядро</text>
  <line x1="400" y1="107" x2="440" y2="110" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="441" y="110" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">пелликула</text>

  <!-- ========== REPRODUCTION SECTION ========== -->
  <line x1="4" y1="155" x2="496" y2="155" stroke="#81C784" stroke-width="0.5"/>
  <text x="250" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" font-weight="bold">Размножение хламидомонады</text>

  <!-- Zoospores -->
  <text x="100" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Зооспоры</text>
  <!-- Mother cell -->
  <ellipse cx="50" cy="218" rx="25" ry="20" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="50" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">материнская</text>
  <text x="50" y="229" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">клетка</text>
  <!-- Arrow -->
  <line x1="78" y1="218" x2="100" y2="218" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
  <defs><marker id="arrowG" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#2E7D32"/></marker></defs>
  <!-- Division into 4 -->
  <rect x="102" y="198" width="40" height="40" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1" rx="3"/>
  <line x1="122" y1="198" x2="122" y2="238" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="102" y1="218" x2="142" y2="218" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- 4 small cells -->
  <ellipse cx="112" cy="208" rx="7" ry="6" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.6"/>
  <ellipse cx="132" cy="208" rx="7" ry="6" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.6"/>
  <ellipse cx="112" cy="228" rx="7" ry="6" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.6"/>
  <ellipse cx="132" cy="228" rx="7" ry="6" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.6"/>
  <!-- Arrow to free cells -->
  <line x1="144" y1="218" x2="166" y2="218" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
  <!-- Free zoospores with flagella -->
  <ellipse cx="180" cy="210" rx="8" ry="6" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M176,204 Q172,196 170,190" fill="none" stroke="#2E7D32" stroke-width="0.6"/>
  <ellipse cx="200" cy="220" rx="8" ry="6" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M196,214 Q192,206 190,200" fill="none" stroke="#2E7D32" stroke-width="0.6"/>
  <ellipse cx="185" cy="234" rx="8" ry="6" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M181,228 Q177,220 175,214" fill="none" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="180" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">4 зооспоры</text>
  <text x="180" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#558B2F">с жгутиками</text>

  <!-- Isogamy -->
  <text x="345" y="188" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Изогамия</text>
  <!-- Two identical gametes -->
  <ellipse cx="290" cy="220" rx="12" ry="10" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <path d="M286,210 Q282,204 280,198" fill="none" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="320" cy="220" rx="12" ry="10" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <path d="M324,210 Q328,204 330,198" fill="none" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="290" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">гамета (+)</text>
  <text x="320" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">гамета (−)</text>
  <!-- Plus/minus symbols -->
  <text x="290" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">+</text>
  <text x="320" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">−</text>
  <!-- Fusion arrow -->
  <line x1="302" y1="220" x2="308" y2="220" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Down arrow -->
  <line x1="305" y1="234" x2="305" y2="252" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
  <!-- Zygote -->
  <circle cx="305" cy="266" r="12" fill="#795548" stroke="#4E342E" stroke-width="1.2"/>
  <text x="305" y="269" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#FFF">зигота</text>
  <!-- Thick wall -->
  <circle cx="305" cy="266" r="14" fill="none" stroke="#4E342E" stroke-width="1.5"/>
  <!-- Arrow to meiosis -->
  <line x1="305" y1="282" x2="305" y2="296" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="305" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">мейоз → 4 зооспоры</text>

  <!-- Bottom summary -->
  <rect x="4" y="318" width="492" height="28" fill="#1B5E20" fill-opacity="0.1" rx="4"/>
  <text x="250" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">
    Хламидомонада — подвижная водоросль (2 жгутика) | Хлорелла — неподвижная | Эвглена — жгутиконосец с пелликулой
  </text>
</svg>