<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1B5E20"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="brownAlga" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <linearGradient id="redAlga" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E57373"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="greenAlga" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81C784"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <marker id="arrowG" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#2E7D32"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="8"/>
  <rect x="1" y="1" width="498" height="348" fill="none" stroke="#2E7D32" stroke-width="2" rx="8"/>
  <!-- Header -->
  <rect x="4" y="4" width="492" height="28" fill="url(#hdr)" rx="6"/>
  <text x="250" y="23" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#fff" font-weight="bold">Многоклеточные водоросли</text>

  <!-- ===== GREEN ALGAE ===== -->
  <rect x="10" y="38" width="150" height="130" fill="#E8F5E9" stroke="#388E3C" stroke-width="1" rx="5"/>
  <text x="85" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" font-weight="bold">Зелёные водоросли</text>

  <!-- Ulva (sea lettuce) -->
  <text x="85" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Ульва (морской салат)</text>
  <path d="M65,70 Q55,90 60,120 Q65,140 80,148 Q95,140 100,120 Q105,90 95,70 Z" fill="url(#greenAlga)" stroke="#2E7D32" stroke-width="1" opacity="0.8"/>
  <path d="M70,75 Q65,95 68,115" fill="none" stroke="#1B5E20" stroke-width="0.4" opacity="0.5"/>
  <path d="M80,72 Q78,95 80,125" fill="none" stroke="#1B5E20" stroke-width="0.4" opacity="0.5"/>
  <path d="M90,75 Q92,95 90,115" fill="none" stroke="#1B5E20" stroke-width="0.4" opacity="0.5"/>

  <!-- Ulothrix -->
  <text x="140" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Улотрикс</text>
  <!-- Chain of cells -->
  <rect x="134" y="72" width="12" height="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.7" rx="1"/>
  <rect x="134" y="80" width="12" height="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.7" rx="1"/>
  <rect x="134" y="88" width="12" height="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.7" rx="1"/>
  <rect x="134" y="96" width="12" height="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.7" rx="1"/>
  <rect x="134" y="104" width="12" height="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.7" rx="1"/>
  <rect x="134" y="112" width="12" height="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.7" rx="1"/>
  <rect x="134" y="120" width="12" height="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.7" rx="1"/>
  <rect x="134" y="128" width="12" height="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.7" rx="1"/>
  <!-- Holdfast -->
  <path d="M134,136 L130,146 L140,146 L136,136" fill="#5D4037" stroke="#3E2723" stroke-width="0.5"/>
  <text x="140" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#558B2F">нитчатая</text>

  <text x="85" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Хлорофилл a+b | Крахмал | Целлюлоза</text>

  <!-- ===== BROWN ALGAE ===== -->
  <rect x="170" y="38" width="160" height="130" fill="#EFEBE9" stroke="#795548" stroke-width="1" rx="5"/>
  <text x="250" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#4E342E" font-weight="bold">Бурые водоросли</text>

  <!-- Laminaria full anatomy -->
  <text x="250" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">Ламинария (морская капуста)</text>

  <!-- Blade (пластинка) -->
  <path d="M225,70 Q220,80 215,100 Q210,120 220,138 Q235,150 250,152 Q265,150 280,138 Q290,120 285,100 Q280,80 275,70 Z" fill="url(#brownAlga)" stroke="#4E342E" stroke-width="1"/>
  <!-- Midrib -->
  <line x1="250" y1="72" x2="250" y2="148" stroke="#3E2723" stroke-width="1.2"/>

  <!-- Stipe (ножка) -->
  <rect x="244" y="152" width="12" height="30" fill="#8D6E63" stroke="#4E342E" stroke-width="1" rx="2"/>

  <!-- Holdfast (ризоиды) -->
  <path d="M244,182 Q230,195 220,200" fill="none" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M250,184 Q250,198 248,205" fill="none" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M256,182 Q270,195 280,200" fill="none" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Anatomy labels -->
  <line x1="215" y1="100" x2="195" y2="90" stroke="#4E342E" stroke-width="0.5"/>
  <text x="172" y="90" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" font-weight="bold">пластинка</text>
  <line x1="244" y1="168" x2="195" y2="165" stroke="#4E342E" stroke-width="0.5"/>
  <text x="178" y="168" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" font-weight="bold">ножка</text>
  <line x1="228" y1="198" x2="195" y2="195" stroke="#4E342E" stroke-width="0.5"/>
  <text x="172" y="196" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" font-weight="bold">ризоиды</text>

  <!-- Size indicator -->
  <line x1="292" y1="70" x2="292" y2="205" stroke="#795548" stroke-width="0.5"/>
  <line x1="289" y1="70" x2="295" y2="70" stroke="#795548" stroke-width="0.5"/>
  <line x1="289" y1="205" x2="295" y2="205" stroke="#795548" stroke-width="0.5"/>
  <text x="296" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">до 20 м</text>

  <text x="250" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">Фукоксантин | Ламинарин | Альгиновая к-та</text>

  <!-- ===== RED ALGAE ===== -->
  <rect x="340" y="38" width="150" height="130" fill="#FFEBEE" stroke="#C62828" stroke-width="1" rx="5"/>
  <text x="415" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C" font-weight="bold">Красные водоросли</text>

  <!-- Porphyra (nori) -->
  <text x="380" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828">Порфира (нори)</text>
  <path d="M360,70 Q350,90 355,115 Q360,135 375,145 Q385,140 385,120 Q385,90 375,70 Z" fill="url(#redAlga)" stroke="#B71C1C" stroke-width="1" opacity="0.8"/>
  <path d="M375,70 Q370,90 372,115 Q374,135 378,142" fill="none" stroke="#880E4F" stroke-width="0.5"/>

  <!-- Coralline red algae -->
  <text x="460" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828">Кораллиновые</text>
  <path d="M445,80 L448,85 L443,90 L448,95 L443,100 L448,105 L443,110 L448,115 L443,120 L448,125" fill="none" stroke="#E57373" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M455,80 L458,85 L453,90 L458,95 L453,100 L458,105 L453,110 L458,115 L453,120 L458,125" fill="none" stroke="#EF9A9A" stroke-width="2" stroke-linecap="round"/>
  <path d="M468,85 L470,90 L466,95 L470,100 L466,105 L470,110 L466,115" fill="none" stroke="#E57373" stroke-width="2" stroke-linecap="round"/>
  <text x="458" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">инкрустированы</text>
  <text x="458" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">CaCO₃</text>

  <text x="415" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#B71C1C">Фикоэритрин | Флоридеинный крахмал | Агар</text>

  <!-- ===== ALTERNATION OF GENERATIONS ===== -->
  <line x1="4" y1="175" x2="496" y2="175" stroke="#81C784" stroke-width="0.5"/>
  <text x="250" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" font-weight="bold">Чередование поколений</text>

  <!-- Isomorphic -->
  <text x="130" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Изоморфное</text>
  <text x="130" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#558B2F">(поколения похожи)</text>

  <!-- Sporophyte 2n -->
  <rect x="75" y="225" width="50" height="30" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1" rx="4"/>
  <text x="100" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Спорофит</text>
  <text x="100" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">2n</text>

  <!-- Arrow: meiosis -->
  <path d="M100,257 L100,268 L75,268 L75,275" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="60" y="272" font-family="Arial,sans-serif" font-size="5" fill="#C62828">мейоз</text>

  <!-- Spores n -->
  <circle cx="75" cy="285" r="8" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="75" y="288" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">споры n</text>

  <!-- Arrow to gametophyte -->
  <path d="M75,295 L75,305 L155,305 L155,275" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>

  <!-- Gametophyte n -->
  <rect x="130" y="225" width="50" height="30" fill="#81C784" stroke="#2E7D32" stroke-width="1" rx="4"/>
  <text x="155" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Гаметофит</text>
  <text x="155" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">n</text>

  <!-- Arrow: fertilization -->
  <path d="M155,225 L155,215 L100,215 L100,225" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="128" y="213" font-family="Arial,sans-serif" font-size="5" fill="#C62828">оплодотворение</text>

  <!-- Heteromorphic -->
  <text x="370" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Гетероморфное</text>
  <text x="370" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#558B2F">(поколения разные)</text>

  <!-- Large Sporophyte -->
  <rect x="310" y="230" width="55" height="30" fill="#8D6E63" stroke="#4E342E" stroke-width="1" rx="4"/>
  <text x="337" y="243" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#FFF" font-weight="bold">Спорофит</text>
  <text x="337" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#FFF">2n (крупный)</text>

  <!-- Arrow meiosis -->
  <path d="M337,262 L337,275 L305,275 L305,285" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="290" y="280" font-family="Arial,sans-serif" font-size="5" fill="#C62828">мейоз</text>

  <!-- Small spores -->
  <circle cx="305" cy="293" r="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="305" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">n</text>

  <!-- Arrow to gametophyte -->
  <path d="M305,301 L305,310 L400,310 L400,278" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>

  <!-- Tiny Gametophyte -->
  <rect x="378" y="246" width="45" height="24" fill="#81C784" stroke="#388E3C" stroke-width="1" rx="4"/>
  <text x="400" y="257" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Гаметофит</text>
  <text x="400" y="267" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">n (мелкий)</text>

  <!-- Arrow fertilization -->
  <path d="M400,246 L400,236 L337,236 L337,230" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="370" y="234" font-family="Arial,sans-serif" font-size="5" fill="#C62828">оплодтворение</text>

  <!-- Example labels -->
  <text x="130" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#558B2F">Пример: Улотрикс, Кладофора</text>
  <text x="370" y="324" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#558B2F">Пример: Ламинария</text>

  <!-- Bottom -->
  <rect x="4" y="333" width="492" height="13" fill="#1B5E20" fill-opacity="0.08" rx="3"/>
  <text x="250" y="343" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20">
    Многоклеточные водоросли: тело = слоевище (таллом), нет корней/стеблей/листьев
  </text>
</svg>