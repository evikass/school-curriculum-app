<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="timeG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1B5E20"/><stop offset="100%" stop-color="#66BB6A"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="26" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32" text-anchor="middle">Происхождение и эволюция цветковых</text>
<text x="250" y="40" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 7 класс — Урок 26</text>
<line x1="30" y1="46" x2="470" y2="46" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Timeline: seed ferns → first angiosperms → diversification -->
<text x="250" y="62" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Хронология эволюции</text>
<line x1="40" y1="80" x2="460" y2="80" stroke="url(#timeG)" stroke-width="3" marker-end="url(#arrowG)"/>
<defs><marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#66BB6A"/></marker></defs>
<!-- Time markers -->
<circle cx="60" cy="80" r="5" fill="#4E342E" stroke="#2E7D32" stroke-width="1"/>
<text x="60" y="96" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">~300 млн л.н.</text>
<text x="60" y="105" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Семенные папоротники</text>

<circle cx="200" cy="80" r="6" fill="#FF8F00" stroke="#E65100" stroke-width="1.5"/>
<text x="200" y="96" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">~130 млн л.н.</text>
<text x="200" y="105" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Первые цветковые</text>
<text x="200" y="113" font-family="Arial,sans-serif" font-size="5.5" fill="#888" text-anchor="middle">(ранний мел)</text>

<circle cx="350" cy="80" r="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1"/>
<text x="350" y="96" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">~100 млн л.н.</text>
<text x="350" y="105" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Быстрая диверсификация</text>

<circle cx="440" cy="80" r="4" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
<text x="440" y="96" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="middle">Сейчас</text>
<text x="440" y="105" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">~300 000 видов</text>

<!-- Evolutionary advantages -->
<text x="130" y="128" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Эволюционные преимущества</text>
<!-- Flower -->
<g transform="translate(50,145)">
<rect x="0" y="0" width="55" height="50" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
<circle cx="27" cy="18" r="8" fill="#FF7043" stroke="#D84315" stroke-width="0.8"/>
<ellipse cx="27" cy="10" rx="5" ry="8" fill="#FF8A65" stroke="#D84315" stroke-width="0.5" transform="rotate(-30,27,18)"/>
<ellipse cx="27" cy="10" rx="5" ry="8" fill="#FF8A65" stroke="#D84315" stroke-width="0.5" transform="rotate(30,27,18)"/>
<ellipse cx="27" cy="10" rx="5" ry="8" fill="#FF8A65" stroke="#D84315" stroke-width="0.5" transform="rotate(90,27,18)"/>
<circle cx="27" cy="18" r="4" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
<text x="27" y="40" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Цветок</text>
<text x="27" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">привлечение</text>
</g>
<!-- Fruit -->
<g transform="translate(115,145)">
<rect x="0" y="0" width="55" height="50" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
<ellipse cx="27" cy="16" rx="12" ry="9" fill="#E53935" stroke="#B71C1C" stroke-width="0.8"/>
<path d="M27,7 L27,3 M24,5 L30,5" stroke="#4E342E" stroke-width="0.8" fill="none"/>
<text x="27" y="40" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Плод</text>
<text x="27" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">распространение</text>
</g>
<!-- Double fertilization -->
<g transform="translate(180,145)">
<rect x="0" y="0" width="55" height="50" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
<circle cx="20" cy="16" r="7" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.8"/>
<text x="20" y="18" font-family="Arial,sans-serif" font-size="5" fill="#fff" text-anchor="middle">2n</text>
<circle cx="38" cy="16" r="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
<text x="38" y="18" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">3n</text>
<text x="29" y="40" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle" font-weight="bold">Двойное</text>
<text x="29" y="48" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle" font-weight="bold">оплодотвор.</text>
</g>
<!-- Vessels -->
<g transform="translate(245,145)">
<rect x="0" y="0" width="55" height="50" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
<rect x="18" y="6" width="20" height="22" rx="2" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
<line x1="22" y1="8" x2="22" y2="26" stroke="#2E7D32" stroke-width="0.5"/>
<line x1="28" y1="8" x2="28" y2="26" stroke="#2E7D32" stroke-width="0.5"/>
<line x1="34" y1="8" x2="34" y2="26" stroke="#2E7D32" stroke-width="0.5"/>
<path d="M18,28 L28,28 L38,18 L38,28" stroke="#2E7D32" stroke-width="0.8" fill="none"/>
<text x="27" y="40" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle" font-weight="bold">Сосуды</text>
<text x="27" y="48" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">водный транспорт</text>
</g>

<!-- Coevolution with insects -->
<text x="395" y="128" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Коэволюция с насекомыми</text>
<g transform="translate(335,135)">
<rect x="0" y="0" width="120" height="65" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
<!-- Flower simplified -->
<ellipse cx="40" cy="25" rx="12" ry="8" fill="#FF80AB" stroke="#C51162" stroke-width="0.8"/>
<circle cx="40" cy="25" r="4" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
<text x="40" y="44" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Цветок</text>
<text x="40" y="51" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">(нектар, пыльца,</text>
<text x="40" y="57" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">окраска, аромат)</text>
<!-- Arrow -->
<path d="M55,25 L68,25" stroke="#7B1FA2" stroke-width="1" fill="none" marker-end="url(#arrP)"/>
<path d="M68,28 L55,28" stroke="#7B1FA2" stroke-width="1" fill="none" marker-end="url(#arrP)"/>
<defs><marker id="arrP" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4Z" fill="#7B1FA2"/></marker></defs>
<!-- Bee -->
<ellipse cx="90" cy="25" rx="8" ry="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
<line x1="85" y1="22" x2="83" y2="18" stroke="#333" stroke-width="0.5"/>
<line x1="88" y1="20" x2="87" y2="16" stroke="#333" stroke-width="0.5"/>
<line x1="92" y1="20" x2="93" y2="16" stroke="#333" stroke-width="0.5"/>
<line x1="95" y1="22" x2="97" y2="18" stroke="#333" stroke-width="0.5"/>
<text x="90" y="44" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Опылитель</text>
<text x="90" y="51" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">(хоботок, волоски,</text>
<text x="90" y="57" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">поведение)</text>
</g>

<!-- Phylogenetic tree of angiosperm groups -->
<text x="250" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Филогенетическое дерево цветковых</text>

<!-- Tree structure -->
<g transform="translate(0,0)">
<!-- Trunk -->
<path d="M250,228 L250,260" stroke="#5D4037" stroke-width="3" fill="none"/>
<!-- Main branch splits -->
<path d="M250,245 L160,275" stroke="#5D4037" stroke-width="2" fill="none"/>
<path d="M250,245 L340,275" stroke="#5D4037" stroke-width="2" fill="none"/>

<!-- Left: Magnoliids branch -->
<path d="M160,275 L90,300" stroke="#5D4037" stroke-width="1.5" fill="none"/>
<path d="M160,275 L160,305" stroke="#5D4037" stroke-width="1.5" fill="none"/>
<!-- Magnoliids -->
<ellipse cx="90" cy="308" rx="35" ry="12" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1"/>
<text x="90" y="311" font-family="Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Магнолииды</text>
<!-- Monocots -->
<ellipse cx="160" cy="313" rx="35" ry="12" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
<text x="160" y="316" font-family="Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle" font-weight="bold">Однодольные</text>

<!-- Right: Eudicots branch -->
<path d="M340,275 L310,300" stroke="#5D4037" stroke-width="1.5" fill="none"/>
<path d="M340,275 L410,300" stroke="#5D4037" stroke-width="1.5" fill="none"/>
<!-- Basal eudicots -->
<ellipse cx="310" cy="308" rx="38" ry="12" fill="#A5D6A7" stroke="#388E3C" stroke-width="1"/>
<text x="310" y="311" font-family="Arial,sans-serif" font-size="6.5" fill="#333" text-anchor="middle" font-weight="bold">Базальные эвдикоты</text>
<!-- Core eudicots -->
<ellipse cx="410" cy="308" rx="38" ry="12" fill="#66BB6A" stroke="#1B5E20" stroke-width="1"/>
<text x="410" y="311" font-family="Arial,sans-serif" font-size="6.5" fill="#fff" text-anchor="middle" font-weight="bold">Ядерные эвдикоты</text>

<!-- Ancestral node label -->
<circle cx="250" cy="245" r="3" fill="#5D4037"/>
<circle cx="160" cy="275" r="2.5" fill="#5D4037"/>
<circle cx="340" cy="275" r="2.5" fill="#5D4037"/>

<!-- Root label -->
<text x="250" y="238" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Общий предок</text>
<text x="250" y="268" font-family="Arial,sans-serif" font-size="5.5" fill="#888" text-anchor="middle">~130-140 млн л.н.</text>

<!-- Sub-branches for monocots -->
<path d="M160,300 L130,325" stroke="#5D4037" stroke-width="1" fill="none"/>
<path d="M160,300 L190,325" stroke="#5D4037" stroke-width="1" fill="none"/>
<text x="125" y="334" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Лилиевые</text>
<text x="195" y="334" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Злаки</text>

<!-- Sub-branches for core eudicots -->
<path d="M410,318 L380,338" stroke="#5D4037" stroke-width="1" fill="none"/>
<path d="M410,318 L440,338" stroke="#5D4037" stroke-width="1" fill="none"/>
<text x="375" y="347" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Розиды</text>
<text x="445" y="347" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Астериды</text>
</g>
</svg>