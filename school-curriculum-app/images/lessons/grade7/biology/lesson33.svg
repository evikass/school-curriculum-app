<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="petalG" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#E91E63"/><stop offset="100%" stop-color="#F48FB1"/></linearGradient>
<linearGradient id="sepalG" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#66BB6A"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="26" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32" text-anchor="middle">Цветок. Соцветия</text>
<text x="250" y="40" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 7 класс — Урок 33</text>
<line x1="30" y1="46" x2="470" y2="46" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- ====== FLOWER ANATOMY (left half, large) ====== -->
<text x="120" y="62" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение цветка</text>

<g transform="translate(30,68)">
  <!-- Pedicel - цветоножка -->
  <line x1="90" y1="165" x2="90" y2="195" stroke="#388E3C" stroke-width="3"/>
  <text x="60" y="190" font-family="Arial,sans-serif" font-size="6" fill="#333">Цветоножка</text>

  <!-- Receptacle - цветоложе -->
  <ellipse cx="90" cy="162" rx="18" ry="6" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
  <text x="115" y="168" font-family="Arial,sans-serif" font-size="6" fill="#333">Цветоложе</text>

  <!-- Sepals - чашелистики -->
  <path d="M75,155 Q60,145 55,130 Q60,135 70,140Z" fill="url(#sepalG)" stroke="#1B5E20" stroke-width="0.8"/>
  <path d="M80,158 Q70,140 72,120 Q78,130 82,145Z" fill="url(#sepalG)" stroke="#1B5E20" stroke-width="0.8"/>
  <path d="M100,158 Q110,140 108,120 Q102,130 98,145Z" fill="url(#sepalG)" stroke="#1B5E20" stroke-width="0.8"/>
  <path d="M105,155 Q120,145 125,130 Q120,135 110,140Z" fill="url(#sepalG)" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="130" y="138" font-family="Arial,sans-serif" font-size="6" fill="#333">Чашелистики</text>

  <!-- Petals - лепестки -->
  <path d="M85,148 Q60,115 55,85 Q65,95 78,120Z" fill="url(#petalG)" stroke="#C2185B" stroke-width="0.8" opacity="0.9"/>
  <path d="M78,145 Q45,120 40,90 Q55,100 72,118Z" fill="url(#petalG)" stroke="#C2185B" stroke-width="0.8" opacity="0.85"/>
  <path d="M95,148 Q120,115 125,85 Q115,95 102,120Z" fill="url(#petalG)" stroke="#C2185B" stroke-width="0.8" opacity="0.9"/>
  <path d="M102,145 Q135,120 140,90 Q125,100 108,118Z" fill="url(#petalG)" stroke="#C2185B" stroke-width="0.8" opacity="0.85"/>
  <path d="M88,145 Q75,105 80,72 Q88,88 90,115Z" fill="url(#petalG)" stroke="#C2185B" stroke-width="0.8" opacity="0.88"/>
  <path d="M92,145 Q105,105 100,72 Q92,88 90,115Z" fill="url(#petalG)" stroke="#C2185B" stroke-width="0.8" opacity="0.88"/>
  <text x="140" y="95" font-family="Arial,sans-serif" font-size="6" fill="#333">Лепестки</text>

  <!-- Stamens - тычинки -->
  <!-- Stamen 1 -->
  <line x1="75" y1="140" x2="68" y2="100" stroke="#FFB300" stroke-width="1"/>
  <ellipse cx="66" cy="96" rx="5" ry="7" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Stamen 2 -->
  <line x1="80" y1="140" x2="78" y2="98" stroke="#FFB300" stroke-width="1"/>
  <ellipse cx="77" cy="94" rx="5" ry="7" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Stamen 3 -->
  <line x1="100" y1="140" x2="102" y2="98" stroke="#FFB300" stroke-width="1"/>
  <ellipse cx="103" cy="94" rx="5" ry="7" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Stamen 4 -->
  <line x1="105" y1="140" x2="112" y2="100" stroke="#FFB300" stroke-width="1"/>
  <ellipse cx="114" cy="96" rx="5" ry="7" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Stamen labels -->
  <line x1="68" y1="96" x2="40" y2="85" stroke="#555" stroke-width="0.4"/>
  <text x="8" y="82" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Пыльник</text>
  <line x1="75" y1="120" x2="40" y2="105" stroke="#555" stroke-width="0.4"/>
  <text x="8" y="108" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Нить тычинки</text>

  <!-- Pistil - пестик -->
  <!-- Stigma - рыльце -->
  <path d="M87,65 Q90,55 93,65" fill="#9C27B0" stroke="#6A1B9A" stroke-width="1"/>
  <path d="M85,65 Q90,50 95,65" fill="none" stroke="#6A1B9A" stroke-width="1.2"/>
  <!-- Style - столбик -->
  <line x1="90" y1="65" x2="90" y2="140" stroke="#9C27B0" stroke-width="1.5"/>
  <!-- Ovary - завязь -->
  <ellipse cx="90" cy="150" rx="10" ry="8" fill="#CE93D8" stroke="#6A1B9A" stroke-width="1"/>
  <!-- Ovules inside ovary -->
  <circle cx="87" cy="150" r="2" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="0.5"/>
  <circle cx="93" cy="150" r="2" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="0.5"/>
  <!-- Pistil labels -->
  <line x1="92" y1="55" x2="130" y2="50" stroke="#555" stroke-width="0.4"/>
  <text x="132" y="50" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Рыльце</text>
  <line x1="92" y1="100" x2="130" y2="100" stroke="#555" stroke-width="0.4"/>
  <text x="132" y="100" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Столбик</text>
  <line x1="100" y1="150" x2="130" y2="150" stroke="#555" stroke-width="0.4"/>
  <text x="132" y="148" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Завязь</text>
  <text x="132" y="156" font-family="Arial,sans-serif" font-size="5" fill="#555">(семязачатки)</text>

  <!-- Combined label for stamen -->
  <line x1="118" y1="96" x2="132" y2="78" stroke="#555" stroke-width="0.4"/>
  <text x="132" y="72" font-family="Arial,sans-serif" font-size="6" fill="#333">Тычинка</text>
  <text x="132" y="79" font-family="Arial,sans-serif" font-size="5" fill="#555">(♂ мужской)</text>

  <!-- Combined label for pistil -->
  <text x="132" y="118" font-family="Arial,sans-serif" font-size="6" fill="#333">Пестик</text>
  <text x="132" y="125" font-family="Arial,sans-serif" font-size="5" fill="#555">(♀ женский)</text>
</g>

<!-- ====== SIMPLE INFLORESCENCES (right half, top) ====== -->
<text x="370" y="62" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Простые соцветия</text>

