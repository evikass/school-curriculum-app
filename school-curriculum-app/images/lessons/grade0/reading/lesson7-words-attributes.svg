<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <style>
      @keyframes color { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
      .attribute { animation: color 2s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="#f3e8ff"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#7c3aed">Слова-признаки 🎨</text>
  
  <!-- Main explanation -->
  <rect x="20" y="50" width="460" height="60" fill="#fef3c7" rx="10"/>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#b45309">Слова-признаки описывают предметы</text>
  <text x="250" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d97706">Отвечают на вопрос КАКОЙ? КАКАЯ? КАКОЕ?</text>
  
  <!-- Attribute types -->
  <rect x="20" y="125" width="145" height="100" fill="#fef2f2" rx="10"/>
  <text x="92" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#dc2626">Цвет 🌈</text>
  <g class="attribute">
    <circle cx="50" cy="185" r="12" fill="#ef4444"/>
    <text x="85" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151">красный</text>
    <circle cx="50" cy="210" r="12" fill="#3b82f6"/>
    <text x="85" y="215" font-family="Arial, sans-serif" font-size="12" fill="#374151">синий</text>
  </g>
  
  <rect x="175" y="125" width="145" height="100" fill="#dbeafe" rx="10"/>
  <text x="247" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8">Размер 📏</text>
  <g class="attribute" style="animation-delay: 0.3s">
    <text x="195" y="190" font-family="Arial, sans-serif" font-size="10" fill="#374151">большой</text>
    <text x="195" y="215" font-family="Arial, sans-serif" font-size="14" fill="#374151">маленький</text>
  </g>
  
  <rect x="330" y="125" width="150" height="100" fill="#dcfce7" rx="10"/>
  <text x="405" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#15803d">Вкус 😋</text>
  <g class="attribute" style="animation-delay: 0.6s">
    <text x="350" y="190" font-family="Arial, sans-serif" font-size="12" fill="#374151">🍬 сладкий</text>
    <text x="350" y="215" font-family="Arial, sans-serif" font-size="12" fill="#374151">🍋 кислый</text>
  </g>
  
  <!-- Examples -->
  <rect x="20" y="240" width="460" height="95" fill="#fce7f3" rx="15"/>
  <text x="250" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#be185d">Примеры 🔗</text>
  
  <text x="100" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">🍎 красное яблоко</text>
  <text x="250" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">🐱 пушистый кот</text>
  <text x="400" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">🏠 большой дом</text>
  
  <text x="250" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">предмет + признак = словосочетание</text>
</svg>
