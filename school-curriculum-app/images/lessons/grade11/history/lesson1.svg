<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">Россия накануне Первой мировой войны</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#7f8c8d">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="460" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#7f8c8d">Урок 15</text>
  
  <!-- Флаг Российской империи -->
  <g transform="translate(30, 70)">
    <rect x="0" y="0" width="80" height="20" fill="#0039A6"/>
    <rect x="0" y="20" width="80" height="20" fill="#FFFFFF"/>
    <rect x="0" y="40" width="80" height="20" fill="#D52B1E"/>
    <text x="40" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Флаг Российской</text>
    <text x="40" y="87" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">империи, 1914 г.</text>
  </g>
  
  <!-- Портрет Николая II -->
  <g transform="translate(130, 70)">
    <circle cx="40" cy="40" r="35" fill="#e8d5b7"/>
    <circle cx="40" cy="35" r="15" fill="#f4d1ae"/>
    <path d="M 25 45 Q 40 55, 55 45" fill="none" stroke="#8b4513" stroke-width="2"/>
    <rect x="25" y="50" width="30" height="20" rx="3" fill="#2c3e50"/>
    <text x="40" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Император</text>
    <text x="40" y="97" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Николай II</text>
  </g>
  
  <!-- Карта Российской империи -->
  <g transform="translate(30, 120)">
    <rect x="0" y="0" width="220" height="150" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <path d="M 20 30 Q 40 20, 60 25 L 80 20 Q 100 30, 120 35 L 140 30 Q 160 40, 180 45 L 200 40 L 210 50 L 200 60 L 180 65 L 160 70 L 140 65 L 120 70 L 100 65 L 80 70 L 60 65 L 40 70 L 20 65 Z" fill="#3498db" opacity="0.7"/>
    <path d="M 40 90 Q 60 80, 80 85 L 100 80 Q 120 90, 140 95 L 160 90 L 180 100 L 160 110 L 140 115 L 120 120 L 100 115 L 80 120 L 60 115 L 40 120 Z" fill="#2ecc71" opacity="0.7"/>
    <text x="110" y="130" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Карта Российской</text>
    <text x="110" y="142" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">империи, 1914 г.</text>
    
    <!-- Города -->
    <circle cx="50" cy="50" r="3" fill="#e74c3c"/>
    <text x="55" y="53" font-family="Arial, sans-serif" font-size="7" fill="#2c3e50">СПб</text>
    
    <circle cx="180" cy="55" r="3" fill="#e74c3c"/>
    <text x="185" y="58" font-family="Arial, sans-serif" font-size="7" fill="#2c3e50">Москва</text>
    
    <circle cx="70" cy="95" r="3" fill="#e74c3c"/>
    <text x="75" y="98" font-family="Arial, sans-serif" font-size="7" fill="#2c3e50">Варшава</text>
    
    <circle cx="150" cy="100" r="3" fill="#e74c3c"/>
    <text x="155" y="103" font-family="Arial, sans-serif" font-size="7" fill="#2c3e50">Киев</text>
  </g>
  
  <!-- Транссиб -->
  <g transform="translate(260, 70)">
    <rect x="0" y="0" width="210" height="100" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <text x="105" y="15" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2c3e50">Транссибирская магистраль</text>
    
    <!-- Линия железной дороги -->
    <path d="M 20 50 L 190 50" stroke="#e74c3c" stroke-width="3"/>
    <path d="M 20 50 L 190 50" stroke="#f1c40f" stroke-width="1" stroke-dasharray="5,5"/>
    
    <!-- Станции -->
    <circle cx="20" cy="50" r="5" fill="#3498db"/>
    <text x="20" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Москва</text>
    
    <circle cx="70" cy="50" r="5" fill="#3498db"/>
    <text x="70" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Екатеринбург</text>
    
    <circle cx="120" cy="50" r="5" fill="#3498db"/>
    <text x="120" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Новосибирск</text>
    
    <circle cx="170" cy="50" r="5" fill="#3498db"/>
    <text x="170" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Иркутск</text>
    
    <circle cx="190" cy="50" r="5" fill="#3498db"/>
    <text x="190" y="40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">Владивосток</text>
    
    <text x="105" y="75" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Длина: 9 288 км</text>
    <text x="105" y="87" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">Строительство: 1891-1916</text>
  </g>
  
  <!-- Статистика населения -->
  <g transform="translate(30, 280)">
    <rect x="0" y="0" width="210" height="50" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <text x="105" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c3e50">Население: 167 млн чел.</text>
    <text x="105" y="30" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">Городское: 20%</text>
    <text x="105" y="42" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">Сельское: 80%</text>
  </g>
  
  <!-- Статистика экономики -->
  <g transform="translate(250, 280)">
    <rect x="0" y="0" width="210" height="50" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <text x="105" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c3e50">ВВП на душу населения</text>
    <text x="105" y="30" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7f8c8d">$148 (1913 г.)</text>
    <text x="105" y="42" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">5-е место в мире</text>
  </g>
  
  <!-- График промышленного роста -->
  <g transform="translate(260, 180)">
    <rect x="0" y="0" width="210" height="90" fill="#ecf0f1" stroke="#34495e" stroke-width="1"/>
    <text x="105" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#2c3e50">Промышленный рост</text>
    
    <!-- График -->
    <polyline points="20,70 50,65 80,55 110,45 140,35 170,30" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <polyline points="20,70 50,65 80,55 110,45 140,35 170,30" fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,2"/>
    
    <!-- Оси -->
    <line x1="20" y1="70" x2="180" y2="70" stroke="#34495e" stroke-width="1"/>
    <line x1="20" y1="70" x2="20" y2="25" stroke="#34495e" stroke-width="1"/>
    
    <!-- Подписи осей -->
    <text x="20" y="82" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">1890</text>
    <text x="80" y="82" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">1900</text>
    <text x="140" y="82" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">1910</text>
    <text x="170" y="82" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">1914</text>
    
    <text x="105" y="25" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">Промышленное</text>
    <text x="105" y="35" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">производство</text>
  </g>
  
  <!-- Хронологическая линия -->
  <g transform="translate(30, 240)">
    <line x1="0" y1="0" x2="210" y2="0" stroke="#3498db" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="#3498db"/>
    <circle cx="70" cy="0" r="4" fill="#3498db"/>
    <circle cx="140" cy="0" r="4" fill="#3498db"/>
    <circle cx="210" cy="0" r="4" fill="#3498db"/>
    
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">1894</text>
    <text x="70" y="15" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">1905</text>
    <text x="140" y="15" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">1910</text>
    <text x="210" y="15" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c3e50">1914</text>
    
    <text x="0" y="25" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">Начало</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">правления</text>
    
    <text x="70" y="25" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">Революция</text>
    
    <text x="140" y="25" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">Столыпинские</text>
    <text x="140" y="35" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">реформы</text>
    
    <text x="210" y="25" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">Начало</text>
    <text x="210" y="35" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#7f8c8d">ПМВ</text>
  </g>
</svg>