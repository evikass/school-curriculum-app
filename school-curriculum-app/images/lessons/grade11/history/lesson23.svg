<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Определения градиентов -->
  <defs>
    <linearGradient id="wallGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A0522D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="bombGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="cloudGrad">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#CCCCCC;stop-opacity:0.6" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2E4057" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2E4057" stroke-width="1"/>
  
  <!-- Заголовок и класс -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#2E4057">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#2E4057">Холодная война</text>
  
  <!-- Номер урока -->
  <text x="470" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#2E4057">Урок 12</text>
  
  <!-- Карта мира с блоками НАТО и ОВД -->
  <g id="worldMap">
    <!-- Фон карты -->
    <rect x="20" y="70" width="200" height="140" fill="#E6F3FF" stroke="#2E4057" stroke-width="1"/>
    
    <!-- Блок НАТО (синий) -->
    <path d="M40,90 Q60,85 80,90 L80,110 Q70,115 60,110 Q50,115 40,110 Z" fill="#4A90E2" opacity="0.7"/>
    <path d="M90,100 Q110,95 130,100 L130,120 Q120,125 110,120 Q100,125 90,120 Z" fill="#4A90E2" opacity="0.7"/>
    <path d="M140,110 Q160,105 180,110 L180,130 Q170,135 160,130 Q150,135 140,130 Z" fill="#4A90E2" opacity="0.7"/>
    
    <!-- Блок ОВД (красный) -->
    <path d="M40,140 Q60,135 80,140 L80,160 Q70,165 60,160 Q50,165 40,160 Z" fill="#E74C3C" opacity="0.7"/>
    <path d="M90,150 Q110,145 130,150 L130,170 Q120,175 110,170 Q100,175 90,170 Z" fill="#E74C3C" opacity="0.7"/>
    <path d="M140,160 Q160,155 180,160 L180,180 Q170,185 160,180 Q150,185 140,180 Z" fill="#E74C3C" opacity="0.7"/>
    
    <!-- Легенда карты -->
    <rect x="30" y="210" width="15" height="10" fill="#4A90E2" opacity="0.7"/>
    <text x="50" y="219" font-family="Arial, sans-serif" font-size="10" fill="#2E4057">НАТО</text>
    <rect x="90" y="210" width="15" height="10" fill="#E74C3C" opacity="0.7"/>
    <text x="110" y="219" font-family="Arial, sans-serif" font-size="10" fill="#2E4057">ОВД</text>
  </g>
  
  <!-- Берлинская стена -->
  <g id="berlinWall">
    <rect x="240" y="70" width="10" height="140" fill="url(#wallGrad)"/>
    <line x1="235" y1="70" x2="255" y2="70" stroke="#654321" stroke-width="2"/>
    <line x1="235" y1="210" x2="255" y2="210" stroke="#654321" stroke-width="2"/>
    
    <!-- Колючая проволока -->
    <line x1="245" y1="80" x2="245" y2="90" stroke="#333" stroke-width="1"/>
    <line x1="245" y1="100" x2="245" y2="110" stroke="#333" stroke-width="1"/>
    <line x1="245" y1="120" x2="245" y2="130" stroke="#333" stroke-width="1"/>
    <line x1="245" y1="140" x2="245" y2="150" stroke="#333" stroke-width="1"/>
    <line x1="245" y1="160" x2="245" y2="170" stroke="#333" stroke-width="1"/>
    <line x1="245" y1="180" x2="245" y2="190" stroke="#333" stroke-width="1"/>
    <line x1="245" y1="200" x2="245" y2="210" stroke="#333" stroke-width="1"/>
    
    <!-- Надпись на стене -->
    <text x="260" y="140" font-family="Arial, sans-serif" font-size="8" fill="#2E4057">Берлинская стена</text>
    <text x="260" y="150" font-family="Arial, sans-serif" font-size="7" fill="#666">1961-1989</text>
  </g>
  
  <!-- Атомная бомба -->
  <g id="atomicBomb">
    <!-- Облако взрыва -->
    <ellipse cx="400" cy="120" rx="40" ry="25" fill="url(#cloudGrad)"/>
    <ellipse cx="380" cy="130" rx="30" ry="20" fill="url(#cloudGrad)"/>
    <ellipse cx="420" cy="130" rx="30" ry="20" fill="url(#cloudGrad)"/>
    
    <!-- Ядро бомбы -->
    <ellipse cx="400" cy="140" rx="15" ry="25" fill="#333"/>
    <path d="M385,140 L415,140 L410,160 L390,160 Z" fill="#666"/>
    
    <!-- Надпись -->
    <text x="400" y="180" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2E4057">Атомная бомба</text>
    <text x="400" y="192" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">1945</text>
  </g>
  
  <!-- Фултонская речь -->
  <g id="fultonSpeech">
    <!-- Портрет Черчилля -->
    <circle cx="350" cy="260" r="20" fill="#FDBCB4" stroke="#333" stroke-width="1"/>
    <path d="M340,255 Q350,250 360,255 L355,265 L345,265 Z" fill="#333"/>
    <circle cx="345" cy="258" r="2" fill="#333"/>
    <circle cx="355" cy="258" r="2" fill="#333"/>
    <path d="M345,265 Q350,268 355,265" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Микрофон -->
    <rect x="370" y="255" width="5" height="15" fill="#666"/>
    <ellipse cx="372.5" cy="253" rx="5" ry="3" fill="#333"/>
    
    <!-- Речь -->
    <rect x="320" y="285" width="120" height="30" fill="#FFF8DC" stroke="#333" stroke-width="1" rx="3"/>
    <text x="380" y="297" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#333">"Железный занавес"</text>
    <text x="380" y="307" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#666">5 марта 1946 г.</text>
  </g>
  
  <!-- Хронологическая линия -->
  <g id="timeline">
    <!-- Линия времени -->
    <line x1="30" y1="240" x2="200" y2="240" stroke="#2E4057" stroke-width="2"/>
    
    <!-- Маркеры событий -->
    <circle cx="50" cy="240" r="4" fill="#4A90E2"/>
    <text x="50" y="225" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2E4057">1945</text>
    <text x="50" y="255" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#666">Конец войны</text>
    
    <circle cx="90" cy="240" r="4" fill="#4A90E2"/>
    <text x="90" y="225" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2E4057">1949</text>
    <text x="90" y="255" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#666">НАТО</text>
    
    <circle cx="130" cy="240" r="4" fill="#E74C3C"/>
    <text x="130" y="225" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2E4057">1955</text>
    <text x="130" y="255" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#666">ОВД</text>
    
    <circle cx="170" cy="240" r="4" fill="#8B4513"/>
    <text x="170" y="225" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#2E4057">1991</text>
    <text x="170" y="255" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#666">Конец ХВ</text>
  </g>
  
  <!-- Схема гонки вооружений -->
  <g id="armsRace">
    <!-- График -->
    <rect x="220" y="240" width="120" height="60" fill="#F0F0F0" stroke="#333" stroke-width="1"/>
    <text x="280" y="255" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2E4057">Гонка вооружений</text>
    
    <!-- Линия США -->
    <path d="M230,290 L250,280 L270,270 L290,260 L310,255" fill="none" stroke="#4A90E2" stroke-width="2"/>
    <text x="235" y="295" font-family="Arial, sans-serif" font-size="7" fill="#4A90E2">США</text>
    
    <!-- Линия СССР -->
    <path d="M230,295 L250,285 L270,275 L290,265 L310,260" fill="none" stroke="#E74C3C" stroke-width="2"/>
    <text x="235" y="305" font-family="Arial, sans-serif" font-size="7" fill="#E74C3C">СССР</text>
  </g>
  
  <!-- Дополнительные элементы декора -->
  <g id="decor">
    <!-- Звезды -->
    <path d="M460,80 L462,86 L468,86 L463,90 L465,96 L460,92 L455,96 L457,90 L452,86 L458,86 Z" fill="#FFD700" opacity="0.8"/>
    <path d="M480,100 L482,106 L488,106 L483,110 L485,116 L480,112 L475,116 L477,110 L472,106 L478,106 Z" fill="#FFD700" opacity="0.8"/>
    
    <!-- Щит НАТО -->
    <path d="M30,300 Q40,290 50,300 L50,310 Q40,315 30,310 Z" fill="none" stroke="#4A90E2" stroke-width="1"/>
    <text x="40" y="305" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#4A90E2">NATO</text>
    
    <!-- Эмблема ОВД -->
    <circle cx="160" cy="300" r="10" fill="none" stroke="#E74C3C" stroke-width="1"/>
    <path d="M160,295 L160,305 M155,300 L165,300" stroke="#E74C3C" stroke-width="1"/>
    <text x="160" y="320" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#E74C3C">ОВД</text>
  </g>
</svg>