<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4169E1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grayGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#696969;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A9A9A9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="url(#grayGrad)" stroke-width="3"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#grayGrad)" stroke-width="1"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#000">Урок 7: Военный коммунизм</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">ИСТОРИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока в углу -->
  <rect x="420" y="20" width="60" height="25" fill="url(#redGrad)" rx="5"/>
  <text x="450" y="37" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">№ 7</text>
  
  <!-- Хронологическая полоса -->
  <rect x="30" y="70" width="440" height="15" fill="url(#grayGrad)"/>
  <line x1="30" y1="77.5" x2="470" y2="77.5" stroke="white" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Даты на хронологии -->
  <text x="50" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">1918</text>
  <text x="150" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">1919</text>
  <text x="250" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">1920</text>
  <text x="350" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">1921</text>
  <text x="450" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#333">1922</text>
  
  <!-- Карта с продразвёрсткой -->
  <rect x="30" y="120" width="200" height="120" fill="#F0F8FF" stroke="#4682B4" stroke-width="1"/>
  <text x="130" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">Карта продразвёрстки</text>
  
  <!-- Регионы на карте -->
  <rect x="50" y="150" width="30" height="20" fill="#FF6347" opacity="0.7"/>
  <text x="65" y="165" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">ЦЧО</text>
  
  <rect x="90" y="150" width="30" height="20" fill="#FF6347" opacity="0.7"/>
  <text x="105" y="165" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">Поволжье</text>
  
  <rect x="130" y="150" width="30" height="20" fill="#FF6347" opacity="0.7"/>
  <text x="145" y="165" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">Сибирь</text>
  
  <rect x="170" y="150" width="30" height="20" fill="#FF6347" opacity="0.7"/>
  <text x="185" y="165" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">Урал</text>
  
  <!-- График производства -->
  <rect x="240" y="120" width="230" height="120" fill="#F5F5DC" stroke="#8B4513" stroke-width="1"/>
  <text x="355" y="140" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">Динамика производства</text>
  
  <!-- Ось Y -->
  <line x1="260" y1="150" x2="260" y2="220" stroke="#000" stroke-width="1"/>
  <text x="255" y="155" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#000">100%</text>
  <text x="255" y="185" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#000">50%</text>
  <text x="255" y="215" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#000">0%</text>
  
  <!-- Ось X -->
  <line x1="260" y1="220" x2="450" y2="220" stroke="#000" stroke-width="1"/>
  
  <!-- График зерна -->
  <polyline points="270,180 310,190 350,195 390,200 430,205" fill="none" stroke="#FF6347" stroke-width="2"/>
  <text x="350" y="235" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#000">Зерно</text>
  
  <!-- График скота -->
  <polyline points="270,170 310,180 350,190 390,200 430,210" fill="none" stroke="#4169E1" stroke-width="2"/>
  <text x="350" y="245" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#000">Скот</text>
  
  <!-- Схема продотрядов -->
  <rect x="30" y="250" width="140" height="80" fill="#FFF0F5" stroke="#DC143C" stroke-width="1"/>
  <text x="100" y="270" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#000">Продовольственные отряды</text>
  
  <!-- Элементы схемы продотрядов -->
  <circle cx="60" cy="290" r="8" fill="url(#redGrad)"/>
  <text x="60" y="294" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="white">РКП</text>
  
  <circle cx="100" cy="290" r="8" fill="url(#blueGrad)"/>
  <text x="100" y="294" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="white">ВЧК</text>
  
  <circle cx="140" cy="290" r="8" fill="#32CD32"/>
  <text x="140" y="294" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="white">КК</text>
  
  <line x1="60" y1="298" x2="140" y2="298" stroke="#000" stroke-width="1"/>
  <text x="100" y="315" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">Принудительный изъятие продовольствия</text>
  
  <!-- Схема комбедов -->
  <rect x="180" y="250" width="140" height="80" fill="#F0FFF0" stroke="#228B22" stroke-width="1"/>
  <text x="250" y="270" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#000">Комбеды</text>
  
  <!-- Элементы схемы комбедов -->
  <rect x="195" y="280" width="30" height="15" fill="#90EE90"/>
  <text x="210" y="290" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#000">Бедняки</text>
  
  <rect x="235" y="280" width="30" height="15" fill="#32CD32"/>
  <text x="250" y="290" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="#000">Середняки</text>
  
  <rect x="275" y="280" width="30" height="15" fill="#006400"/>
  <text x="290" y="290" font-family="Arial, sans-serif" font-size="7" text-anchor="middle" fill="white">Беднота</text>
  
  <text x="250" y="315" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">Комитеты бедноты</text>
  
  <!-- Карточная система -->
  <rect x="330" y="250" width="140" height="80" fill="#E6E6FA" stroke="#4B0082" stroke-width="1"/>
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#000">Карточная система</text>
  
  <!-- Карточки -->
  <rect x="350" y="280" width="20" height="25" fill="#FFF8DC" stroke="#8B4513" stroke-width="1"/>
  <text x="360" y="297" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">А</text>
  
  <rect x="380" y="280" width="20" height="25" fill="#FFF8DC" stroke="#8B4513" stroke-width="1"/>
  <text x="390" y="297" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">Б</text>
  
  <rect x="410" y="280" width="20" height="25" fill="#FFF8DC" stroke="#8B4513" stroke-width="1"/>
  <text x="420" y="297" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">В</text>
  
  <text x="400" y="315" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">Пайки по категориям</text>
  
  <!-- Красный террор -->
  <rect x="30" y="340" width="440" height="5" fill="url(#redGrad)"/>
  
  <!-- Портрет Дзержинского -->
  <circle cx="60" cy="360" r="15" fill="#F5DEB3" stroke="#8B4513" stroke-width="1"/>
  <text x="60" y="365" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#000">Ф.Э.</text>
  <text x="60" y="380" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">Дзержинский</text>
  
  <!-- ГУЛАГ -->
  <rect x="130" y="350" width="80" height="30" fill="#2F4F4F" stroke="#000" stroke-width="1"/>
  <text x="170" y="370" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">ГУЛАГ</text>
  <text x="170" y="385" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">1919-1921</text>
  
  <!-- Формула продразвёрстки -->
  <text x="350" y="365" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#000">П = (В + З) × 0.75</text>
  <text x="350" y="380" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">П - продразвёрстка</text>
  <text x="350" y="395" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">В - валовой сбор</text>
  <text x="350" y="410" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">З - запасы</text>
</svg>