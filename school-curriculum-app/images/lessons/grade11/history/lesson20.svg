<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Дефинции градиентов и паттернов -->
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B0000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D3D3D3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="33%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="66%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF0000;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="1" fill="#333" />
    </pattern>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="url(#frameGrad)" stroke-width="3" rx="5" />
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#333" stroke-width="1" rx="3" />
  
  <!-- Заголовок урока -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#333">ОСВОБОЖДЕНИЕ 1944-1945</text>
  <text x="250" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">ИСТОРИЯ · 11 КЛАСС</text>
  <text x="470" y="20" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#666">Урок 24</text>
  
  <!-- Карта -->
  <g transform="translate(30, 60)">
    <!-- Карта контура -->
    <path d="M0,50 Q20,30 50,40 T100,50 Q130,70 150,90 T180,120 Q200,140 190,160 T160,190 Q140,200 100,210 T40,200 Q10,190 0,160 T0,50" fill="url(#mapGrad)" stroke="#333" stroke-width="1" />
    
    <!-- Границы -->
    <path d="M50,40 Q80,60 100,90" stroke="#333" stroke-width="1" fill="none" stroke-dasharray="3,2" />
    <path d="M100,90 Q120,110 140,140" stroke="#333" stroke-width="1" fill="none" stroke-dasharray="3,2" />
    <path d="M140,140 Q130,160 100,180" stroke="#333" stroke-width="1" fill="none" stroke-dasharray="3,2" />
    
    <!-- Точки ударов -->
    <circle cx="50" cy="40" r="4" fill="#FF0000" />
    <circle cx="100" cy="90" r="4" fill="#FF0000" />
    <circle cx="140" cy="140" r="4" fill="#FF0000" />
    <circle cx="80" cy="120" r="4" fill="#FF0000" />
    <circle cx="120" cy="70" r="4" fill="#FF0000" />
    
    <!-- Надписи на карте -->
    <text x="50" y="35" text-anchor="middle" font-size="8" fill="#333">Киев</text>
    <text x="100" y="85" text-anchor="middle" font-size="8" fill="#333">Минск</text>
    <text x="140" y="135" text-anchor="middle" font-size="8" fill="#333">Варшава</text>
    <text x="80" y="115" text-anchor="middle" font-size="8" fill="#333">Багратион</text>
    <text x="120" y="65" text-anchor="middle" font-size="8" fill="#333">Смоленск</text>
    
    <!-- Стрелки направления -->
    <path d="M50,40 L60,45 L58,43" stroke="#FF0000" stroke-width="2" fill="none" />
    <path d="M100,90 L105,100 L103,98" stroke="#FF0000" stroke-width="2" fill="none" />
    <path d="M140,140 L135,150 L133,148" stroke="#FF0000" stroke-width="2" fill="none" />
  </g>
  
  <!-- Хронологическая лента -->
  <g transform="translate(30, 250)">
    <rect x="0" y="0" width="440" height="60" fill="#F5F5DC" stroke="#8B4513" stroke-width="1" rx="3" />
    
    <!-- Даты на ленте -->
    <text x="20" y="25" font-size="10" fill="#333">1944</text>
    <text x="60" y="25" font-size="10" fill="#333">1944</text>
    <text x="100" y="25" font-size="10" fill="#333">1944</text>
    <text x="140" y="25" font-size="10" fill="#333">1945</text>
    <text x="180" y="25" font-size="10" fill="#333">1945</text>
    <text x="220" y="25" font-size="10" fill="#333">1945</text>
    
    <!-- События -->
    <text x="20" y="45" font-size="8" fill="#333">Киевская</text>
    <text x="60" y="45" font-size="8" fill="#333">Корсунь-Шевченков</text>
    <text x="100" y="45" font-size="8" fill="#333">Оп. Багратион</text>
    <text x="140" y="45" font-size="8" fill="#333">Венская</text>
    <text x="180" y="45" font-size="8" fill="#333">Берлинская</text>
    <text x="220" y="45" font-size="8" fill="#333">Пражская</text>
    
    <!-- Маркеры -->
    <rect x="15" y="15" width="10" height="10" fill="#FF0000" />
    <rect x="55" y="15" width="10" height="10" fill="#FF0000" />
    <rect x="95" y="15" width="10" height="10" fill="#FF8C00" />
    <rect x="135" y="15" width="10" height="10" fill="#FF0000" />
    <rect x="175" y="15" width="10" height="10" fill="#8B0000" />
    <rect x="215" y="15" width="10" height="10" fill="#FF0000" />
  </g>
  
  <!-- Знамя Победы -->
  <g transform="translate(380, 80)">
    <line x1="0" y1="0" x2="0" y2="80" stroke="#333" stroke-width="2" />
    <path d="M0,0 L50,10 L45,40 L0,35 Z" fill="url(#flagGrad)" stroke="#333" stroke-width="1" />
    <text x="25" y="25" text-anchor="middle" font-size="8" fill="#000" transform="rotate(10 25 25)">Знамя Победы</text>
    <text x="25" y="50" text-anchor="middle" font-size="8" fill="#000" transform="rotate(10 25 50)">Берлин, 1945</text>
  </g>
  
  <!-- График потерь -->
  <g transform="translate(30, 70)">
    <rect x="250" y="0" width="120" height="100" fill="#F0F0F0" stroke="#333" stroke-width="1" rx="2" />
    <text x="310" y="15" text-anchor="middle" font-size="10" fill="#333">Потери вермахта</text>
    
    <!-- Столбцы графика -->
    <rect x="260" y="70" width="10" height="20" fill="#FF0000" />
    <rect x="275" y="60" width="10" height="30" fill="#FF8C00" />
    <rect x="290" y="50" width="10" height="40" fill="#FFD700" />
    <rect x="305" y="40" width="10" height="50" fill="#32CD32" />
    <rect x="320" y="30" width="10" height="60" fill="#0000FF" />
    <rect x="335" y="20" width="10" height="70" fill="#8B0000" />
    
    <!-- Подписи -->
    <text x="265" y="95" font-size="7" fill="#333">Киев</text>
    <text x="280" y="95" font-size="7" fill="#333">Минск</text>
    <text x="295" y="95" font-size="7" fill="#333">Багратион</text>
    <text x="305" y="95" font-size="7" fill="#333">Варшава</text>
    <text x="315" y="95" font-size="7" fill="#333">Берлин</text>
    <text x="330" y="95" font-size="7" fill="#333">Вена</text>
  </g>
  
  <!-- Данные об операциях -->
  <g transform="translate(380, 180)">
    <rect x="0" y="0" width="100" height="100" fill="#FFFACD" stroke="#333" stroke-width="1" rx="2" />
    <text x="50" y="15" text-anchor="middle" font-size="9" fill="#333">Данные</text>
    
    <text x="5" y="30" font-size="7" fill="#333">10 ударов:</text>
    <text x="5" y="40" font-size="7" fill="#333">2.5 млн солдат</text>
    
    <text x="5" y="55" font-size="7" fill="#333">Багратион:</text>
    <text x="5" y="65" font-size="7" fill="#333">23 июня-29 авг.</text>
    
    <text x="5" y="80" font-size="7" fill="#333">Берлин:</text>
    <text x="5" y="90" font-size="7" fill="#333">16 апр.-2 мая</text>
  </g>
  
  <!-- Портреты -->
  <g transform="translate(350, 270)">
    <!-- Сталин -->
    <circle cx="0" cy="0" r="15" fill="#D3D3D3" stroke="#333" stroke-width="1" />
    <path d="M-10,-5 Q0,-10 10,-5 L10,5 Q0,10 -10,5 Z" fill="#333" />
    <text x="0" y="25" text-anchor="middle" font-size="7" fill="#333">Сталин</text>
    
    <!-- Жуков -->
    <circle cx="30" cy="0" r="15" fill="#D3D3D3" stroke="#333" stroke-width="1" />
    <path d="M20,-5 Q30,-10 40,-5 L40,5 Q30,10 20,5 Z" fill="#333" />
    <text x="30" y="25" text-anchor="middle" font-size="7" fill="#333">Жуков</text>
  </g>
  
  <!-- Формула победы -->
  <g transform="translate(30, 320)">
    <rect x="0" y="0" width="200" height="20" fill="#F5F5F5" stroke="#333" stroke-width="0.5" rx="1" />
    <text x="100" y="15" text-anchor="middle" font-size="9" fill="#333">Победа = Мужество + Дисциплина + Ударная сила</text>
  </g>
</svg>