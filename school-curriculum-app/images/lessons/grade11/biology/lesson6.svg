<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="box6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f8e9"/>
    </linearGradient>
    <linearGradient id="bear6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <filter id="shadow6" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg6)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#81C784" stroke-width="2" rx="7"/>

  <!-- Title -->
  <rect x="130" y="8" width="240" height="30" rx="15" fill="#388E3C" opacity="0.9"/>
  <text x="250" y="28" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Критерии вида</text>

  <!-- Center: Bear silhouette -->
  <ellipse cx="250" cy="168" rx="42" ry="30" fill="url(#bear6)" filter="url(#shadow6)"/>
  <!-- Bear head -->
  <circle cx="250" cy="130" r="22" fill="#8D6E63"/>
  <!-- Bear ears -->
  <circle cx="232" cy="112" r="8" fill="#6D4C41"/>
  <circle cx="268" cy="112" r="8" fill="#6D4C41"/>
  <circle cx="232" cy="112" r="4" fill="#5D4037"/>
  <circle cx="268" cy="112" r="4" fill="#5D4037"/>
  <!-- Bear eyes -->
  <circle cx="241" cy="126" r="3" fill="#3E2723"/>
  <circle cx="259" cy="126" r="3" fill="#3E2723"/>
  <circle cx="241" cy="125" r="1" fill="white"/>
  <circle cx="259" cy="125" r="1" fill="white"/>
  <!-- Bear nose -->
  <ellipse cx="250" cy="135" rx="5" ry="3" fill="#3E2723"/>
  <!-- Bear legs -->
  <rect x="222" y="193" width="10" height="14" rx="4" fill="#6D4C41"/>
  <rect x="238" y="193" width="10" height="14" rx="4" fill="#6D4C41"/>
  <rect x="258" y="193" width="10" height="14" rx="4" fill="#6D4C41"/>
  <rect x="274" y="193" width="10" height="14" rx="4" fill="#6D4C41"/>
  <!-- Label -->
  <text x="250" y="225" font-family="Arial,sans-serif" font-size="11" fill="#33691E" text-anchor="middle" font-style="italic">Ursus arctos</text>

  <!-- Connection lines from center to boxes -->
  <!-- To Morphological (top-left) -->
  <line x1="215" y1="145" x2="110" y2="80" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- To Genetic (top-right) -->
  <line x1="285" y1="145" x2="390" y2="80" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- To Physiological (left) -->
  <line x1="210" y1="175" x2="80" y2="195" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- To Ecological (right) -->
  <line x1="290" y1="175" x2="420" y2="195" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- To Geographic (bottom) -->
  <line x1="250" y1="210" x2="250" y2="262" stroke="#66BB6A" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Box 1: Морфологический (top-left) -->
  <rect x="20" y="48" width="145" height="62" rx="8" fill="url(#box6)" stroke="#43A047" stroke-width="1.5" filter="url(#shadow6)"/>
  <rect x="20" y="48" width="145" height="18" rx="8" fill="#43A047"/>
  <rect x="20" y="58" width="145" height="8" fill="#43A047"/>
  <text x="92" y="62" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Морфологический</text>
  <!-- Similar bear outlines -->
  <ellipse cx="55" cy="90" rx="14" ry="10" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <circle cx="55" cy="78" r="7" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <ellipse cx="92" cy="90" rx="14" ry="10" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <circle cx="92" cy="78" r="7" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <ellipse cx="129" cy="90" rx="14" ry="10" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <circle cx="129" cy="78" r="7" fill="none" stroke="#8D6E63" stroke-width="1.2"/>
  <text x="92" y="106" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">сходство строения</text>

  <!-- Box 2: Генетический (top-right) -->
  <rect x="335" y="48" width="145" height="62" rx="8" fill="url(#box6)" stroke="#43A047" stroke-width="1.5" filter="url(#shadow6)"/>
  <rect x="335" y="48" width="145" height="18" rx="8" fill="#43A047"/>
  <rect x="335" y="58" width="145" height="8" fill="#43A047"/>
  <text x="407" y="62" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Генетический</text>
  <!-- DNA double helix icon -->
  <path d="M370,78 Q380,85 390,78 Q400,71 410,78 Q420,85 430,78" fill="none" stroke="#1565C0" stroke-width="1.8"/>
  <path d="M370,85 Q380,78 390,85 Q400,92 410,85 Q420,78 430,85" fill="none" stroke="#E53935" stroke-width="1.8"/>
  <!-- Rungs -->
  <line x1="375" y1="79" x2="375" y2="84" stroke="#9E9E9E" stroke-width="1"/>
  <line x1="385" y1="82" x2="385" y2="85" stroke="#9E9E9E" stroke-width="1"/>
  <line x1="395" y1="79" x2="395" y2="84" stroke="#9E9E9E" stroke-width="1"/>
  <line x1="405" y1="82" x2="405" y2="85" stroke="#9E9E9E" stroke-width="1"/>
  <line x1="415" y1="79" x2="415" y2="84" stroke="#9E9E9E" stroke-width="1"/>
  <line x1="425" y1="82" x2="425" y2="85" stroke="#9E9E9E" stroke-width="1"/>
  <text x="407" y="100" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">2n = 74</text>
  <text x="407" y="108" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">кариотип вида</text>

  <!-- Box 3: Физиологический (left) -->
  <rect x="5" y="170" width="140" height="62" rx="8" fill="url(#box6)" stroke="#43A047" stroke-width="1.5" filter="url(#shadow6)"/>
  <rect x="5" y="170" width="140" height="18" rx="8" fill="#43A047"/>
  <rect x="5" y="180" width="140" height="8" fill="#43A047"/>
  <text x="75" y="184" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Физиологический</text>
  <!-- Reproduction icon - two circles with heart -->
  <circle cx="45" cy="210" r="10" fill="none" stroke="#E91E63" stroke-width="1.2"/>
  <circle cx="70" cy="210" r="10" fill="none" stroke="#E91E63" stroke-width="1.2"/>
  <text x="57" y="214" font-family="Arial,sans-serif" font-size="12" fill="#E91E63" text-anchor="middle">♥</text>
  <text x="110" y="208" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">скрещивание</text>
  <text x="110" y="218" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">плодовитость</text>
  <text x="75" y="228" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">жизнеспособность</text>

  <!-- Box 4: Экологический (right) -->
  <rect x="355" y="170" width="140" height="62" rx="8" fill="url(#box6)" stroke="#43A047" stroke-width="1.5" filter="url(#shadow6)"/>
  <rect x="355" y="170" width="140" height="18" rx="8" fill="#43A047"/>
  <rect x="355" y="180" width="140" height="8" fill="#43A047"/>
  <text x="425" y="184" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Экологический</text>
  <!-- Habitat icon - tree and ground -->
  <rect x="375" y="208" width="4" height="16" fill="#6D4C41"/>
  <ellipse cx="377" cy="203" rx="10" ry="8" fill="#4CAF50"/>
  <ellipse cx="389" cy="207" rx="8" ry="6" fill="#66BB6A"/>
  <rect x="400" y="212" width="20" height="3" fill="#8D6E63" rx="1"/>
  <path d="M440,222 Q445,210 450,222" fill="none" stroke="#42A5F5" stroke-width="1.2"/>
  <path d="M452,222 Q457,212 462,222" fill="none" stroke="#42A5F5" stroke-width="1.2"/>
  <text x="425" y="228" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">условия обитания</text>

  <!-- Box 5: Географический (bottom center) -->
  <rect x="175" y="262" width="150" height="62" rx="8" fill="url(#box6)" stroke="#43A047" stroke-width="1.5" filter="url(#shadow6)"/>
  <rect x="175" y="262" width="150" height="18" rx="8" fill="#43A047"/>
  <rect x="175" y="272" width="150" height="8" fill="#43A047"/>
  <text x="250" y="276" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Географический</text>
  <!-- Map icon -->
  <rect x="205" y="290" width="40" height="25" rx="3" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <!-- Continent shapes -->
  <ellipse cx="218" cy="298" rx="8" ry="6" fill="#81C784"/>
  <ellipse cx="235" cy="300" rx="6" ry="8" fill="#81C784"/>
  <ellipse cx="228" cy="308" rx="5" ry="3" fill="#81C784"/>
  <!-- Location pin -->
  <circle cx="225" cy="296" r="3" fill="#E53935"/>
  <path d="M225,299 L225,303" stroke="#E53935" stroke-width="1.5"/>
  <text x="280" y="298" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">ареал</text>
  <text x="280" y="308" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">обитания</text>
  <text x="280" y="318" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">вида</text>

  <!-- Subtitle note -->
  <text x="250" y="342" font-family="Arial,sans-serif" font-size="8" fill="#689F38" text-anchor="middle" font-style="italic">Ни один критерий в отдельности не является достаточным для определения вида</text>
</svg>