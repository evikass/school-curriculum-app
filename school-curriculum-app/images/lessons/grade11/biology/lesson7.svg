<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="ground7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#81C784"/>
    </linearGradient>
    <linearGradient id="sky7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
    <filter id="shadow7" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg7)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#81C784" stroke-width="2" rx="7"/>

  <!-- Title -->
  <rect x="170" y="8" width="160" height="28" rx="14" fill="#2E7D32" opacity="0.9"/>
  <text x="250" y="27" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Популяция</text>

  <!-- Landscape area -->
  <rect x="15" y="42" width="470" height="155" rx="6" fill="url(#sky7)" stroke="#A5D6A7" stroke-width="1"/>
  <!-- Ground -->
  <path d="M15,150 Q80,140 150,148 Q220,155 300,145 Q380,140 440,150 Q470,155 485,148 L485,197 L15,197 Z" fill="url(#ground7)"/>
  <!-- Trees in background -->
  <rect x="60" y="120" width="3" height="20" fill="#5D4037"/>
  <ellipse cx="61" cy="115" rx="8" ry="10" fill="#388E3C" opacity="0.7"/>
  <rect x="420" y="118" width="3" height="20" fill="#5D4037"/>
  <ellipse cx="421" cy="113" rx="8" ry="10" fill="#388E3C" opacity="0.7"/>
  <rect x="250" y="125" width="3" height="18" fill="#5D4037"/>
  <ellipse cx="251" cy="120" rx="7" ry="9" fill="#388E3C" opacity="0.6"/>

  <!-- Population A (left) -->
  <ellipse cx="95" cy="130" rx="55" ry="35" fill="#C8E6C9" fill-opacity="0.4" stroke="#43A047" stroke-width="1" stroke-dasharray="4,2"/>
  <!-- Individuals - dots -->
  <circle cx="70" cy="120" r="4" fill="#2E7D32"/>
  <circle cx="82" cy="128" r="4" fill="#388E3C"/>
  <circle cx="95" cy="118" r="4" fill="#2E7D32"/>
  <circle cx="108" cy="126" r="4" fill="#388E3C"/>
  <circle cx="120" cy="120" r="4" fill="#2E7D32"/>
  <circle cx="75" cy="138" r="4" fill="#388E3C"/>
  <circle cx="90" cy="142" r="4" fill="#2E7D32"/>
  <circle cx="105" cy="140" r="4" fill="#388E3C"/>
  <circle cx="115" cy="135" r="4" fill="#2E7D32"/>
  <circle cx="85" cy="132" r="4" fill="#43A047"/>
  <text x="95" y="175" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Популяция А</text>

  <!-- Population B (center) -->
  <ellipse cx="250" cy="130" rx="55" ry="35" fill="#C8E6C9" fill-opacity="0.4" stroke="#43A047" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="225" cy="122" r="4" fill="#2E7D32"/>
  <circle cx="238" cy="130" r="4" fill="#388E3C"/>
  <circle cx="250" cy="120" r="4" fill="#2E7D32"/>
  <circle cx="263" cy="128" r="4" fill="#388E3C"/>
  <circle cx="275" cy="122" r="4" fill="#2E7D32"/>
  <circle cx="230" cy="140" r="4" fill="#388E3C"/>
  <circle cx="245" cy="144" r="4" fill="#2E7D32"/>
  <circle cx="260" cy="142" r="4" fill="#388E3C"/>
  <circle cx="270" cy="136" r="4" fill="#2E7D32"/>
  <circle cx="240" cy="135" r="4" fill="#43A047"/>
  <text x="250" y="175" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Популяция Б</text>

  <!-- Population C (right) -->
  <ellipse cx="405" cy="130" rx="55" ry="35" fill="#C8E6C9" fill-opacity="0.4" stroke="#43A047" stroke-width="1" stroke-dasharray="4,2"/>
  <circle cx="380" cy="122" r="4" fill="#2E7D32"/>
  <circle cx="393" cy="130" r="4" fill="#388E3C"/>
  <circle cx="405" cy="120" r="4" fill="#2E7D32"/>
  <circle cx="418" cy="128" r="4" fill="#388E3C"/>
  <circle cx="430" cy="122" r="4" fill="#2E7D32"/>
  <circle cx="385" cy="140" r="4" fill="#388E3C"/>
  <circle cx="400" cy="144" r="4" fill="#2E7D32"/>
  <circle cx="415" cy="142" r="4" fill="#388E3C"/>
  <circle cx="425" cy="136" r="4" fill="#2E7D32"/>
  <circle cx="395" cy="135" r="4" fill="#43A047"/>
  <text x="405" y="175" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Популяция В</text>

  <!-- Gene flow arrows -->
  <!-- A → B -->
  <line x1="150" y1="115" x2="195" y2="115" stroke="#FF8F00" stroke-width="1.8"/>
  <polygon points="195,111 203,115 195,119" fill="#FF8F00"/>
  <line x1="195" y1="125" x2="150" y2="125" stroke="#FF8F00" stroke-width="1.8"/>
  <polygon points="150,121 142,125 150,129" fill="#FF8F00"/>
  <text x="170" y="110" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Генный</text>
  <text x="170" y="138" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">поток</text>

  <!-- B → C -->
  <line x1="305" y1="115" x2="350" y2="115" stroke="#FF8F00" stroke-width="1.8"/>
  <polygon points="350,111 358,115 350,119" fill="#FF8F00"/>
  <line x1="350" y1="125" x2="305" y2="125" stroke="#FF8F00" stroke-width="1.8"/>
  <polygon points="305,121 297,125 305,129" fill="#FF8F00"/>
  <text x="325" y="110" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">Генный</text>
  <text x="325" y="138" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">поток</text>

  <!-- Allele frequency graph (bottom) -->
  <rect x="15" y="202" width="270" height="135" rx="6" fill="white" fill-opacity="0.7" stroke="#81C784" stroke-width="1"/>
  <text x="150" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Распределение частот аллелей</text>

  <!-- Axes -->
  <line x1="40" y1="320" x2="40" y2="225" stroke="#555" stroke-width="1.2"/>
  <line x1="40" y1="320" x2="265" y2="320" stroke="#555" stroke-width="1.2"/>
  <!-- Y axis label -->
  <text x="25" y="275" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle" transform="rotate(-90,25,275)">Частота аллели</text>
  <!-- X axis label -->
  <text x="152" y="335" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Значение признака</text>

  <!-- Bell curve -->
  <path d="M45,318 Q60,316 75,312 Q90,305 105,290 Q120,270 135,255 Q150,248 152,247 Q154,248 170,255 Q185,270 200,290 Q215,305 230,312 Q245,316 260,318" fill="none" stroke="#2E7D32" stroke-width="2"/>
  <!-- Fill under curve -->
  <path d="M45,318 Q60,316 75,312 Q90,305 105,290 Q120,270 135,255 Q150,248 152,247 Q154,248 170,255 Q185,270 200,290 Q215,305 230,312 Q245,316 260,318 L260,320 L45,320 Z" fill="#66BB6A" fill-opacity="0.25"/>

  <!-- Mean line -->
  <line x1="152" y1="247" x2="152" y2="320" stroke="#E53935" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="152" y="242" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle">μ</text>

  <!-- Tick marks on X -->
  <line x1="75" y1="320" x2="75" y2="323" stroke="#555" stroke-width="0.8"/>
  <text x="75" y="328" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">-2σ</text>
  <line x1="113" y1="320" x2="113" y2="323" stroke="#555" stroke-width="0.8"/>
  <text x="113" y="328" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">-1σ</text>
  <line x1="152" y1="320" x2="152" y2="323" stroke="#555" stroke-width="0.8"/>
  <line x1="191" y1="320" x2="191" y2="323" stroke="#555" stroke-width="0.8"/>
  <text x="191" y="328" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">+1σ</text>
  <line x1="229" y1="320" x2="229" y2="323" stroke="#555" stroke-width="0.8"/>
  <text x="229" y="328" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">+2σ</text>

  <!-- Parameters panel (right) -->
  <rect x="295" y="202" width="190" height="135" rx="6" fill="white" fill-opacity="0.7" stroke="#81C784" stroke-width="1"/>
  <text x="390" y="218" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Параметры популяции</text>

  <!-- Parameter items -->
  <rect x="310" y="228" width="160" height="22" rx="4" fill="#E8F5E9"/>
  <circle cx="322" cy="239" r="6" fill="#43A047"/>
  <text x="322" y="242" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">1</text>
  <text x="340" y="242" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20">Численность</text>
  <text x="458" y="242" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="end">N особей</text>

  <rect x="310" y="256" width="160" height="22" rx="4" fill="#E8F5E9"/>
  <circle cx="322" cy="267" r="6" fill="#43A047"/>
  <text x="322" y="270" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">2</text>
  <text x="340" y="270" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20">Плотность</text>
  <text x="458" y="270" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="end">особей/м²</text>

  <rect x="310" y="284" width="160" height="22" rx="4" fill="#E8F5E9"/>
  <circle cx="322" cy="295" r="6" fill="#43A047"/>
  <text x="322" y="298" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">3</text>
  <text x="340" y="298" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20">Рождаемость</text>
  <text x="458" y="298" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="end">B = ΔN/Δt</text>

  <rect x="310" y="312" width="160" height="22" rx="4" fill="#E8F5E9"/>
  <circle cx="322" cy="323" r="6" fill="#43A047"/>
  <text x="322" y="326" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">4</text>
  <text x="340" y="326" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20">Смертность</text>
  <text x="458" y="326" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="end">D = ΔN/Δt</text>
</svg>