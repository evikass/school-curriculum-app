<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg21" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg21)" rx="8"/>
  <!-- Title -->
  <text x="250" y="24" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Среды жизни и экологические факторы</text>

  <!-- Environment 1: Наземно-воздушная -->
  <rect x="12" y="36" width="115" height="105" rx="6" fill="#B3E5FC" stroke="#0288D1" stroke-width="1"/>
  <text x="69" y="50" font-size="7.5" font-weight="bold" fill="#01579B" text-anchor="middle">Наземно-воздушная</text>
  <!-- Sky -->
  <rect x="16" y="55" width="107" height="45" fill="#81D4FA" rx="3"/>
  <!-- Sun -->
  <circle cx="105" cy="68" r="8" fill="#FDD835"/>
  <g stroke="#FDD835" stroke-width="1">
    <line x1="105" y1="56" x2="105" y2="53"/><line x1="105" y1="80" x2="105" y2="83"/>
    <line x1="93" y1="68" x2="90" y2="68"/><line x1="117" y1="68" x2="120" y2="68"/>
  </g>
  <!-- Tree -->
  <rect x="28" y="82" width="5" height="18" fill="#5D4037"/>
  <ellipse cx="30" cy="76" rx="12" ry="10" fill="#2E7D32"/>
  <!-- Bird -->
  <g transform="translate(70,72)">
    <path d="M-8,0 Q0,-6 8,0" fill="none" stroke="#37474F" stroke-width="1.5"/>
    <path d="M-5,0 Q0,-4 5,0" fill="none" stroke="#37474F" stroke-width="1"/>
    <circle cx="0" cy="2" r="2" fill="#37474F"/>
  </g>
  <!-- Ground -->
  <rect x="16" y="100" width="107" height="38" fill="#8D6E63" rx="3"/>
  <ellipse cx="50" cy="110" rx="8" ry="3" fill="#A5D6A7"/>
  <ellipse cx="85" cy="118" rx="6" ry="2" fill="#A5D6A7"/>
  <!-- Grass -->
  <g stroke="#4CAF50" stroke-width="1" fill="none">
    <path d="M40,100 Q38,92 42,88"/><path d="M44,100 Q46,93 43,89"/>
    <path d="M90,100 Q88,93 92,89"/><path d="M94,100 Q96,94 93,90"/>
  </g>

  <!-- Environment 2: Водная -->
  <rect x="132" y="36" width="115" height="105" rx="6" fill="#B3E5FC" stroke="#0288D1" stroke-width="1"/>
  <text x="189" y="50" font-size="8" font-weight="bold" fill="#01579B" text-anchor="middle">Водная</text>
  <!-- Water -->
  <rect x="136" y="55" width="107" height="82" fill="#4FC3F7" rx="3"/>
  <!-- Waves -->
  <path d="M136,70 Q150,66 164,70 Q178,74 192,70 Q206,66 220,70 Q234,74 243,70" fill="none" stroke="#29B6F6" stroke-width="1"/>
  <path d="M136,78 Q150,74 164,78 Q178,82 192,78 Q206,74 220,78 Q234,82 243,78" fill="none" stroke="#29B6F6" stroke-width="0.8"/>
  <!-- Fish -->
  <g transform="translate(175,95)">
    <ellipse cx="0" cy="0" rx="14" ry="7" fill="#FF8A65"/>
    <polygon points="14,0 22,-6 22,6" fill="#FF8A65"/>
    <circle cx="-6" cy="-2" r="1.5" fill="#1A237E"/>
    <path d="M-2,-7 Q0,-10 2,-7" fill="#E64A19" stroke="none"/>
    <line x1="-3" y1="0" x2="8" y2="0" stroke="#E64A19" stroke-width="0.5"/>
  </g>
  <!-- Seaweed -->
  <g fill="none" stroke="#1B5E20" stroke-width="2">
    <path d="M148,137 Q145,120 150,105 Q155,95 148,85"/>
    <path d="M155,137 Q158,118 152,108 Q148,98 155,88"/>
    <path d="M225,137 Q222,122 228,110 Q232,100 225,92"/>
  </g>
  <!-- Bubbles -->
  <circle cx="165" cy="85" r="2" fill="none" stroke="#E1F5FE" stroke-width="0.8"/>
  <circle cx="170" cy="78" r="1.5" fill="none" stroke="#E1F5FE" stroke-width="0.8"/>
  <circle cx="195" cy="75" r="1.8" fill="none" stroke="#E1F5FE" stroke-width="0.8"/>

  <!-- Environment 3: Почвенная -->
  <rect x="252" y="36" width="115" height="105" rx="6" fill="#D7CCC8" stroke="#5D4037" stroke-width="1"/>
  <text x="309" y="50" font-size="8" font-weight="bold" fill="#3E2723" text-anchor="middle">Почвенная</text>
  <!-- Soil layers -->
  <rect x="256" y="55" width="107" height="20" fill="#8D6E63" rx="2"/>
  <rect x="256" y="75" width="107" height="18" fill="#6D4C41" rx="2"/>
  <rect x="256" y="93" width="107" height="18" fill="#4E342E" rx="2"/>
  <rect x="256" y="111" width="107" height="26" fill="#3E2723" rx="2"/>
  <!-- Soil particles -->
  <circle cx="270" cy="62" r="2" fill="#A1887F"/><circle cx="290" cy="68" r="1.5" fill="#BCAAA4"/>
  <circle cx="340" cy="80" r="2" fill="#8D6E63"/><circle cx="310" cy="98" r="1.5" fill="#6D4C41"/>
  <!-- Roots -->
  <g stroke="#795548" stroke-width="1.5" fill="none">
    <path d="M280,55 Q278,70 275,85 Q272,95 270,110"/>
    <path d="M280,55 Q285,72 290,85 Q292,100 288,115"/>
    <path d="M340,55 Q338,68 335,80 Q332,95 330,105"/>
    <path d="M340,55 Q345,70 348,82 Q350,95 347,108"/>
  </g>
  <!-- Worm -->
  <g transform="translate(310,102)">
    <path d="M0,0 Q5,-4 10,0 Q15,4 20,0 Q25,-4 30,0" fill="none" stroke="#E8967A" stroke-width="3" stroke-linecap="round"/>
    <circle cx="30" cy="0" r="1.5" fill="#C97B63"/>
  </g>
  <!-- Another worm -->
  <g transform="translate(265,118) scale(0.7)">
    <path d="M0,0 Q5,-3 10,0 Q15,3 20,0 Q25,-3 30,0" fill="none" stroke="#E8967A" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Environment 4: Организменная -->
  <rect x="372" y="36" width="115" height="105" rx="6" fill="#F8BBD0" stroke="#C2185B" stroke-width="1"/>
  <text x="429" y="50" font-size="8" font-weight="bold" fill="#880E4F" text-anchor="middle">Организменная</text>
  <!-- Organism outline -->
  <ellipse cx="429" cy="95" rx="38" ry="30" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.5"/>
  <ellipse cx="429" cy="95" rx="30" ry="23" fill="#F8BBD0" stroke="#E91E63" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Bacteria inside -->
  <g transform="translate(415,82)">
    <ellipse cx="0" cy="0" rx="5" ry="3" fill="#E91E63" opacity="0.7"/>
    <ellipse cx="12" cy="5" rx="4" ry="2.5" fill="#E91E63" opacity="0.6"/>
    <ellipse cx="5" cy="10" rx="4.5" ry="2.5" fill="#E91E63" opacity="0.65"/>
    <ellipse cx="18" cy="-3" rx="3.5" ry="2" fill="#E91E63" opacity="0.55"/>
  </g>
  <!-- Virus -->
  <g transform="translate(435,88)">
    <circle cx="0" cy="0" r="4" fill="#AD1457" opacity="0.6"/>
    <g stroke="#AD1457" stroke-width="0.8">
      <line x1="0" y1="-4" x2="0" y2="-7"/><line x1="4" y1="0" x2="7" y2="0"/>
      <line x1="0" y1="4" x2="0" y2="7"/><line x1="-4" y1="0" x2="-7" y2="0"/>
      <line x1="3" y1="-3" x2="5" y2="-5"/><line x1="-3" y1="3" x2="-5" y2="5"/>
    </g>
  </g>
  <!-- Tapeworm hint -->
  <g transform="translate(420,100) scale(0.5)">
    <path d="M0,0 Q8,-4 16,0 Q24,4 32,0 Q40,-4 48,0" fill="none" stroke="#880E4F" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <text x="429" y="132" font-size="6" fill="#880E4F" text-anchor="middle">паразиты, симбионты</text>

  <!-- Divider -->
  <line x1="15" y1="150" x2="485" y2="150" stroke="#66BB6A" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Ecological factors section -->
  <text x="250" y="168" font-size="12" font-weight="bold" fill="#1B5E20" text-anchor="middle">Экологические факторы</text>

  <!-- Factor 1: Абиотические -->
  <rect x="20" y="180" width="148" height="155" rx="8" fill="#E1F5FE" stroke="#0277BD" stroke-width="1.5"/>
  <rect x="20" y="180" width="148" height="24" rx="8" fill="#0277BD"/>
  <rect x="20" y="196" width="148" height="8" fill="#0277BD"/>
  <text x="94" y="196" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Абиотические</text>
  <!-- Temperature icon -->
  <g transform="translate(40,218)">
    <rect x="0" y="0" width="6" height="20" rx="3" fill="#EF5350"/>
    <circle cx="3" cy="22" r="5" fill="#EF5350"/>
    <rect x="2" y="5" width="2" height="14" fill="#FFCDD2"/>
    <text x="18" y="18" font-size="7" fill="#01579B">Температура</text>
  </g>
  <!-- Light icon -->
  <g transform="translate(40,248)">
    <circle cx="8" cy="8" r="6" fill="#FDD835"/>
    <g stroke="#FDD835" stroke-width="1.5">
      <line x1="8" y1="-1" x2="8" y2="-4"/><line x1="8" y1="17" x2="8" y2="20"/>
      <line x1="-1" y1="8" x2="-4" y2="8"/><line x1="17" y1="8" x2="20" y2="8"/>
      <line x1="1" y1="1" x2="-1" y2="-1"/><line x1="15" y1="15" x2="17" y2="17"/>
    </g>
    <text x="28" y="12" font-size="7" fill="#01579B">Свет</text>
  </g>
  <!-- Water icon -->
  <g transform="translate(40,275)">
    <path d="M8,2 Q2,12 8,18 Q14,12 8,2Z" fill="#29B6F6"/>
    <text x="22" y="13" font-size="7" fill="#01579B">Влажность</text>
  </g>
  <!-- More factors -->
  <text x="34" y="308" font-size="6.5" fill="#0277BD">• Давление</text>
  <text x="34" y="318" font-size="6.5" fill="#0277BD">• Ветер</text>
  <text x="34" y="328" font-size="6.5" fill="#0277BD">• Рельеф, солёность</text>

  <!-- Factor 2: Биотические -->
  <rect x="176" y="180" width="148" height="155" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <rect x="176" y="180" width="148" height="24" rx="8" fill="#E65100"/>
  <rect x="176" y="196" width="148" height="8" fill="#E65100"/>
  <text x="250" y="196" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Биотические</text>
  <!-- Predator-prey -->
  <g transform="translate(192,218)">
    <text x="0" y="0" font-size="6.5" fill="#BF360C">Хищничество</text>
    <circle cx="5" cy="10" r="5" fill="#FF7043"/>
    <text x="14" y="13" font-size="7">→</text>
    <circle cx="28" cy="10" r="4" fill="#A5D6A7"/>
  </g>
  <!-- Competition -->
  <g transform="translate(192,245)">
    <text x="0" y="0" font-size="6.5" fill="#BF360C">Конкуренция</text>
    <path d="M5,10 L20,5 M5,10 L20,15" stroke="#FF8A65" stroke-width="1.5"/>
    <circle cx="5" cy="10" r="4" fill="#FFAB91"/>
    <circle cx="22" cy="10" r="4" fill="#FFAB91"/>
    <text x="13" y="14" font-size="7">⚡</text>
  </g>
  <!-- Symbiosis -->
  <g transform="translate(192,272)">
    <text x="0" y="0" font-size="6.5" fill="#BF360C">Симбиоз</text>
    <circle cx="8" cy="10" r="5" fill="#FFCC80"/>
    <circle cx="18" cy="10" r="5" fill="#A5D6A7"/>
    <text x="4" y="13" font-size="5" fill="#3E2723">+</text>
    <text x="15" y="13" font-size="5" fill="#3E2723">+</text>
  </g>
  <!-- More -->
  <text x="190" y="300" font-size="6.5" fill="#E65100">• Паразитизм</text>
  <text x="190" y="310" font-size="6.5" fill="#E65100">• Мутуализм</text>
  <text x="190" y="320" font-size="6.5" fill="#E65100">• Комменсализм</text>
  <text x="190" y="330" font-size="6.5" fill="#E65100">• Аменсализм</text>

  <!-- Factor 3: Антропогенные -->
  <rect x="332" y="180" width="148" height="155" rx="8" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <rect x="332" y="180" width="148" height="24" rx="8" fill="#C62828"/>
  <rect x="332" y="196" width="148" height="8" fill="#C62828"/>
  <text x="406" y="196" font-size="9" font-weight="bold" fill="white" text-anchor="middle">Антропогенные</text>
  <!-- Factory -->
  <g transform="translate(348,218)">
    <rect x="0" y="5" width="15" height="15" fill="#78909C"/>
    <rect x="3" y="0" width="4" height="8" fill="#78909C"/>
    <rect x="9" y="2" width="4" height="6" fill="#78909C"/>
    <path d="M7,0 Q10,-5 14,-2 Q18,1 22,-3" fill="none" stroke="#9E9E9E" stroke-width="2"/>
    <text x="28" y="14" font-size="6.5" fill="#B71C1C">Загрязнение</text>
  </g>
  <!-- Deforestation -->
  <g transform="translate(348,248)">
    <rect x="0" y="8" width="4" height="10" fill="#5D4037"/>
    <path d="M2,8 Q-4,-2 2,-4 Q8,-2 2,8" fill="#4CAF50"/>
    <line x1="10" y1="2" x2="10" y2="18" stroke="#F44336" stroke-width="1.5"/>
    <text x="18" y="14" font-size="6.5" fill="#B71C1C">Вырубка лесов</text>
  </g>
  <!-- Urbanization -->
  <g transform="translate(348,278)">
    <rect x="0" y="5" width="8" height="15" fill="#90A4AE"/>
    <rect x="10" y="8" width="6" height="12" fill="#90A4AE"/>
    <rect x="1" y="8" width="2" height="2" fill="#FDD835"/>
    <rect x="4" y="12" width="2" height="2" fill="#FDD835"/>
    <rect x="11" y="11" width="2" height="2" fill="#FDD835"/>
    <text x="22" y="14" font-size="6.5" fill="#B71C1C">Урбанизация</text>
  </g>
  <text x="346" y="308" font-size="6.5" fill="#C62828">• Перевыпас</text>
  <text x="346" y="318" font-size="6.5" fill="#C62828">• Мелиорация</text>
  <text x="346" y="328" font-size="6.5" fill="#C62828">• Радиация, шум</text>
</svg>