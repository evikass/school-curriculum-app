<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="bark10" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5D4037"/>
      <stop offset="20%" stop-color="#6D4C41"/>
      <stop offset="40%" stop-color="#5D4037"/>
      <stop offset="60%" stop-color="#4E342E"/>
      <stop offset="80%" stop-color="#6D4C41"/>
      <stop offset="100%" stop-color="#5D4037"/>
    </linearGradient>
    <filter id="shadow10" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg10)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#81C784" stroke-width="2" rx="7"/>

  <!-- Title -->
  <rect x="130" y="8" width="240" height="28" rx="14" fill="#2E7D32" opacity="0.9"/>
  <text x="250" y="27" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Естественный отбор</text>

  <!-- Stage 1: Initial population (Left) -->
  <rect x="10" y="44" width="155" height="190" rx="6" fill="white" fill-opacity="0.6" stroke="#66BB6A" stroke-width="1" filter="url(#shadow10)"/>
  <text x="87" y="60" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Исходная популяция</text>

  <!-- Tree bark background -->
  <rect x="18" y="68" width="138" height="90" rx="4" fill="url(#bark10)"/>
  <!-- Bark texture lines -->
  <line x1="30" y1="70" x2="28" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="50" y1="70" x2="52" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="70" y1="70" x2="68" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="90" y1="70" x2="92" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="110" y1="70" x2="108" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="130" y1="70" x2="132" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="145" y1="70" x2="144" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>

  <!-- Green beetles (visible on bark) -->
  <ellipse cx="30" cy="80" rx="5" ry="3.5" fill="#4CAF50"/>
  <ellipse cx="55" cy="95" rx="5" ry="3.5" fill="#66BB6A"/>
  <ellipse cx="40" cy="115" rx="5" ry="3.5" fill="#4CAF50"/>
  <ellipse cx="80" cy="85" rx="5" ry="3.5" fill="#66BB6A"/>
  <ellipse cx="95" cy="105" rx="5" ry="3.5" fill="#4CAF50"/>
  <ellipse cx="115" cy="80" rx="5" ry="3.5" fill="#66BB6A"/>
  <ellipse cx="70" cy="130" rx="5" ry="3.5" fill="#4CAF50"/>
  <ellipse cx="130" cy="120" rx="5" ry="3.5" fill="#66BB6A"/>

  <!-- Brown beetles (camouflaged on bark) -->
  <ellipse cx="45" cy="90" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="65" cy="108" rx="5" ry="3.5" fill="#6D4C41"/>
  <ellipse cx="85" cy="125" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="105" cy="92" rx="5" ry="3.5" fill="#6D4C41"/>
  <ellipse cx="120" cy="140" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="140" cy="100" rx="5" ry="3.5" fill="#6D4C41"/>
  <ellipse cx="35" cy="140" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="55" cy="148" rx="5" ry="3.5" fill="#6D4C41"/>

  <!-- Legend for stage 1 -->
  <circle cx="25" cy="170" r="4" fill="#4CAF50"/>
  <text x="35" y="173" font-family="Arial,sans-serif" font-size="7" fill="#555">Зелёные (8)</text>
  <circle cx="95" cy="170" r="4" fill="#795548"/>
  <text x="105" y="173" font-family="Arial,sans-serif" font-size="7" fill="#555">Коричневые (8)</text>

  <!-- Ratio bar -->
  <rect x="18" y="180" width="66" height="8" rx="2" fill="#4CAF50"/>
  <rect x="84" y="180" width="66" height="8" rx="2" fill="#795548"/>
  <text x="87" y="198" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">50% : 50%</text>

  <!-- Stage label -->
  <text x="87" y="220" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-style="italic">Изменчивость:</text>
  <text x="87" y="230" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-style="italic">разные формы</text>

  <!-- Arrow 1→2 -->
  <path d="M168,140 L195,140" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="195,136 203,140 195,144" fill="#2E7D32"/>

  <!-- Stage 2: Selection by predator (Center) -->
  <rect x="207" y="44" width="120" height="190" rx="6" fill="white" fill-opacity="0.6" stroke="#66BB6A" stroke-width="1" filter="url(#shadow10)"/>
  <text x="267" y="60" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Отбор</text>

  <!-- Tree bark background -->
  <rect x="215" y="68" width="104" height="90" rx="4" fill="url(#bark10)"/>
  <line x1="230" y1="70" x2="228" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="250" y1="70" x2="252" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="270" y1="70" x2="268" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="290" y1="70" x2="292" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="310" y1="70" x2="308" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>

  <!-- Remaining beetles (some green ones being eaten) -->
  <!-- Green beetles with X marks (eaten) -->
  <ellipse cx="235" cy="82" rx="5" ry="3.5" fill="#4CAF50" opacity="0.4"/>
  <line x1="230" y1="78" x2="240" y2="86" stroke="#D32F2F" stroke-width="1.2"/>
  <line x1="240" y1="78" x2="230" y2="86" stroke="#D32F2F" stroke-width="1.2"/>

  <ellipse cx="275" cy="95" rx="5" ry="3.5" fill="#66BB6A" opacity="0.4"/>
  <line x1="270" y1="91" x2="280" y2="99" stroke="#D32F2F" stroke-width="1.2"/>
  <line x1="280" y1="91" x2="270" y2="99" stroke="#D32F2F" stroke-width="1.2"/>

  <ellipse cx="255" cy="120" rx="5" ry="3.5" fill="#4CAF50" opacity="0.4"/>
  <line x1="250" y1="116" x2="260" y2="124" stroke="#D32F2F" stroke-width="1.2"/>
  <line x1="260" y1="116" x2="250" y2="124" stroke="#D32F2F" stroke-width="1.2"/>

  <!-- Surviving brown beetles -->
  <ellipse cx="245" cy="100" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="265" cy="110" rx="5" ry="3.5" fill="#6D4C41"/>
  <ellipse cx="285" cy="125" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="230" cy="135" rx="5" ry="3.5" fill="#6D4C41"/>
  <ellipse cx="300" cy="90" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="305" cy="115" rx="5" ry="3.5" fill="#6D4C41"/>

  <!-- Bird predator -->
  <!-- Bird body -->
  <ellipse cx="267" cy="56" rx="14" ry="8" fill="#546E7A"/>
  <!-- Bird head -->
  <circle cx="254" cy="50" r="6" fill="#607D8B"/>
  <!-- Bird beak -->
  <polygon points="248,49 240,47 248,51" fill="#FF8F00"/>
  <!-- Bird eye -->
  <circle cx="252" cy="49" r="1.5" fill="#263238"/>
  <!-- Bird wing -->
  <path d="M272,50 Q280,42 278,52 Q276,56 272,56" fill="#455A64"/>
  <!-- Bird tail -->
  <path d="M280,56 Q286,52 290,54 Q286,58 280,58" fill="#455A64"/>

  <!-- Arrow pointing to green beetle -->
  <path d="M248,58 Q240,65 235,78" stroke="#D32F2F" stroke-width="1.2" stroke-dasharray="3,2"/>
  <polygon points="234,75 233,82 239,77" fill="#D32F2F"/>

  <!-- Selection label -->
  <text x="267" y="172" font-family="Arial,sans-serif" font-size="7" fill="#D32F2F" text-anchor="middle">Зелёные заметны</text>
  <text x="267" y="182" font-family="Arial,sans-serif" font-size="7" fill="#D32F2F" text-anchor="middle">птицам → съедены</text>

  <rect x="222" y="190" width="90" height="14" rx="3" fill="#FFEBEE"/>
  <text x="267" y="200" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Дифференциальная</text>
  <text x="267" y="210" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">выживаемость</text>

  <text x="267" y="228" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-style="italic">Коричневые скрыты</text>

  <!-- Arrow 2→3 -->
  <path d="M330,140 L357,140" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="357,136 365,140 357,144" fill="#2E7D32"/>

  <!-- Stage 3: Next generation (Right) -->
  <rect x="369" y="44" width="122" height="190" rx="6" fill="white" fill-opacity="0.6" stroke="#66BB6A" stroke-width="1" filter="url(#shadow10)"/>
  <text x="430" y="60" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Следующее</text>
  <text x="430" y="70" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">поколение</text>

  <!-- Tree bark background -->
  <rect x="377" y="78" width="106" height="80" rx="4" fill="url(#bark10)"/>
  <line x1="390" y1="80" x2="388" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="405" y1="80" x2="407" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="420" y1="80" x2="418" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="435" y1="80" x2="437" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="450" y1="80" x2="448" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>
  <line x1="470" y1="80" x2="472" y2="155" stroke="#4E342E" stroke-width="0.5" opacity="0.5"/>

  <!-- Few green beetles -->
  <ellipse cx="400" cy="90" rx="5" ry="3.5" fill="#4CAF50"/>
  <ellipse cx="455" cy="110" rx="5" ry="3.5" fill="#66BB6A"/>

  <!-- Many brown beetles (more than before) -->
  <ellipse cx="390" cy="105" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="410" cy="115" rx="5" ry="3.5" fill="#6D4C41"/>
  <ellipse cx="430" cy="95" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="445" cy="125" rx="5" ry="3.5" fill="#6D4C41"/>
  <ellipse cx="465" cy="100" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="385" cy="130" rx="5" ry="3.5" fill="#6D4C41"/>
  <ellipse cx="420" cy="140" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="460" cy="140" rx="5" ry="3.5" fill="#6D4C41"/>
  <ellipse cx="440" cy="88" rx="5" ry="3.5" fill="#795548"/>
  <ellipse cx="475" cy="120" rx="5" ry="3.5" fill="#6D4C41"/>

  <!-- Legend for stage 3 -->
  <circle cx="385" cy="168" r="4" fill="#4CAF50"/>
  <text x="395" y="171" font-family="Arial,sans-serif" font-size="7" fill="#555">Зелёные (2)</text>
  <circle cx="445" cy="168" r="4" fill="#795548"/>
  <text x="455" y="171" font-family="Arial,sans-serif" font-size="7" fill="#555">Корич. (10)</text>

  <!-- Ratio bar -->
  <rect x="377" y="180" width="17" height="8" rx="2" fill="#4CAF50"/>
  <rect x="394" y="180" width="85" height="8" rx="2" fill="#795548"/>
  <text x="430" y="198" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">17% : 83%</text>

  <!-- Result label -->
  <text x="430" y="218" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-style="italic">Приспособленность:</text>
  <text x="430" y="228" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-style="italic">преобладают</text>
  <text x="430" y="238" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-style="italic">коричневые</text>

  <!-- Bottom process flow -->
  <rect x="10" y="248" width="480" height="92" rx="6" fill="white" fill-opacity="0.5" stroke="#81C784" stroke-width="1"/>

  <!-- Step 1: Изменчивость -->
  <rect x="25" y="258" width="130" height="50" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="90" y="278" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">Изменчивость</text>
  <text x="90" y="292" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Разные фенотипы в популяции</text>

  <!-- Arrow -->
  <path d="M160,283 L195,283" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="195,279 203,283 195,287" fill="#2E7D32"/>

  <!-- Step 2: Отбор -->
  <rect x="207" y="258" width="130" height="50" rx="8" fill="#FFF3E0" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="272" y="278" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Отбор</text>
  <text x="272" y="292" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Выживание приспособленных</text>

  <!-- Arrow -->
  <path d="M342,283 L377,283" stroke="#2E7D32" stroke-width="2"/>
  <polygon points="377,279 385,283 377,287" fill="#2E7D32"/>

  <!-- Step 3: Приспособленность -->
  <rect x="389" y="258" width="90" height="50" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="434" y="278" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Приспособ-</text>
  <text x="434" y="290" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">ленность</text>

  <!-- Summary -->
  <text x="250" y="328" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-style="italic">Естественный отбор сохраняет особей с полезными в данных условиях признаками</text>
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-style="italic">и устраняет менее приспособленных → направляющий фактор эволюции</text>
</svg>