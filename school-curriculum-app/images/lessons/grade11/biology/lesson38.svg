<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#EDE7F6"/><stop offset="100%" stop-color="#D1C4E9"/></linearGradient>
<marker id="arrP" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="#5E35B1"/></marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#5E35B1" stroke-width="2.5"/>
<text x="250" y="25" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#311B92" text-anchor="middle">Генетическая инженерия: методы и этапы</text>

<!-- Step 1: Restriction enzyme cutting DNA -->
<rect x="10" y="38" width="90" height="72" rx="5" fill="white" opacity="0.7" stroke="#7E57C2" stroke-width="1"/>
<text x="55" y="52" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#311B92" text-anchor="middle">1. Рестрикция</text>
<!-- DNA strand being cut -->
<line x1="20" y1="68" x2="85" y2="68" stroke="#7E57C2" stroke-width="3"/>
<line x1="20" y1="74" x2="85" y2="74" stroke="#B39DDB" stroke-width="3"/>
<!-- Scissors -->
<line x1="50" y1="62" x2="55" y2="80" stroke="#E53935" stroke-width="1.5"/>
<line x1="55" y1="62" x2="50" y2="80" stroke="#E53935" stroke-width="1.5"/>
<!-- Gap -->
<line x1="48" y1="68" x2="52" y2="68" stroke="#FFCDD2" stroke-width="1"/>
<line x1="48" y1="74" x2="52" y2="74" stroke="#FFCDD2" stroke-width="1"/>
<text x="55" y="93" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">Рестриктазы —</text>
<text x="55" y="101" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">«молекулярные ножницы»</text>
<text x="55" y="109" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">(EcoRI, HindIII)</text>

<!-- Arrow 1→2 -->
<line x1="100" y1="74" x2="108" y2="74" stroke="#5E35B1" stroke-width="1.5" marker-end="url(#arrP)"/>

<!-- Step 2: Ligation -->
<rect x="110" y="38" width="90" height="72" rx="5" fill="white" opacity="0.7" stroke="#7E57C2" stroke-width="1"/>
<text x="155" y="52" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#311B92" text-anchor="middle">2. Лигирование</text>
<!-- Gene fragment -->
<rect x="122" y="64" width="25" height="10" rx="2" fill="#7E57C2"/>
<text x="134" y="72" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">ген</text>
<!-- Plus sign -->
<text x="155" y="72" font-family="Arial,sans-serif" font-size="10" fill="#5E35B1" text-anchor="middle">+</text>
<!-- Vector opening -->
<path d="M162 64 Q175 69 162 74" fill="none" stroke="#B39DDB" stroke-width="2.5"/>
<text x="155" y="93" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">ДНК-лигаза сшивает</text>
<text x="155" y="101" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">ген с вектором</text>
<text x="155" y="109" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">(T4 ДНК-лигаза)</text>

<!-- Arrow 2→3 -->
<line x1="200" y1="74" x2="208" y2="74" stroke="#5E35B1" stroke-width="1.5" marker-end="url(#arrP)"/>

<!-- Step 3: Vector (plasmid) -->
<rect x="210" y="38" width="90" height="72" rx="5" fill="white" opacity="0.7" stroke="#7E57C2" stroke-width="1"/>
<text x="255" y="52" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#311B92" text-anchor="middle">3. Вектор</text>
<!-- Plasmid circle -->
<circle cx="255" cy="78" r="15" fill="none" stroke="#7E57C2" stroke-width="2.5"/>
<!-- Inserted gene in plasmid -->
<path d="M255 63 A15 15 0 0 1 270 78" fill="none" stroke="#E53935" stroke-width="3"/>
<text x="255" y="80" font-family="Arial,sans-serif" font-size="5" fill="#4527A0" text-anchor="middle">плазмида</text>
<text x="255" y="93" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">Вектор: плазмида,</text>
<text x="255" y="101" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">вирус, космида</text>
<text x="255" y="109" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">Переносчик гена</text>

<!-- Arrow 3→4 -->
<line x1="300" y1="74" x2="308" y2="74" stroke="#5E35B1" stroke-width="1.5" marker-end="url(#arrP)"/>

<!-- Step 4: Transformation -->
<rect x="310" y="38" width="90" height="72" rx="5" fill="white" opacity="0.7" stroke="#7E57C2" stroke-width="1"/>
<text x="355" y="52" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#311B92" text-anchor="middle">4. Трансформация</text>
<!-- Bacterium -->
<ellipse cx="355" cy="76" rx="18" ry="10" fill="#B39DDB" stroke="#7E57C2" stroke-width="1.5"/>
<!-- Plasmid inside -->
<circle cx="355" cy="76" r="5" fill="none" stroke="#E53935" stroke-width="1"/>
<!-- Arrow entering -->
<line x1="330" y1="76" x2="336" y2="76" stroke="#7E57C2" stroke-width="1" marker-end="url(#arrP)"/>
<text x="355" y="93" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">Введение вектора</text>
<text x="355" y="101" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">в клетку-хозяина</text>
<text x="355" y="109" font-family="Arial,sans-serif" font-size="6" fill="#4527A0" text-anchor="middle">(E. coli, дрожжи)</text>

<!-- Arrow 4→5 -->
<line x1="400" y1="74" x2="408" y2="74" stroke="#5E35B1" stroke-width="1.5" marker-end="url(#arrP)"/>

<!-- Step 5: GMO organism -->
<rect x="410" y="38" width="80" height="72" rx="5" fill="white" opacity="0.7" stroke="#7E57C2" stroke-width="1"/>
<text x="450" y="52" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#311B92" text-anchor="middle">5. ГМО</text>
<!-- Bacteria multiplying -->
<ellipse cx="440" cy="68" rx="10" ry="6" fill="#B39DDB" stroke="#7E57C2" stroke-width="1"/>
<ellipse cx="460" cy="72" rx="8" ry="5" fill="#CE93D8" stroke="#7E57C2" stroke-width="1"/>
<ellipse cx="448" cy="80" rx="9" ry="5" fill="#B39DDB" stroke="#7E57C2" stroke-width="1"/>
<!-- Product -->
<text x="450" y="93" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Синтез продукта</text>
<text x="450" y="101" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">инсулин, ГЧ,</text>
<text x="450" y="109" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">вакцины</text>

<!-- PCR Section -->
<rect x="10" y="120" width="480" height="100" rx="6" fill="white" opacity="0.6" stroke="#5E35B1" stroke-width="1.2"/>
<text x="250" y="138" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#311B92" text-anchor="middle">ПЦР — Полимеразная цепная реакция (К. Муллис, 1983)</text>

<!-- PCR cycle diagram -->
<!-- Cycle 1: Denaturation -->
<rect x="25" y="148" width="135" height="28" rx="4" fill="#E8EAF6" stroke="#5E35B1" stroke-width="0.8"/>
<text x="92" y="160" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#311B92" text-anchor="middle">1. Денатурация 95°C</text>
<text x="92" y="172" font-family="Arial,sans-serif" font-size="6.5" fill="#4527A0" text-anchor="middle">ДНК → две цепи (разделение)</text>

<text x="170" y="165" font-family="Arial,sans-serif" font-size="12" fill="#5E35B1" text-anchor="middle">→</text>

<!-- Cycle 2: Annealing -->
<rect x="183" y="148" width="135" height="28" rx="4" fill="#E8EAF6" stroke="#5E35B1" stroke-width="0.8"/>
<text x="250" y="160" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#311B92" text-anchor="middle">2. Отжиг праймеров 55°C</text>
<text x="250" y="172" font-family="Arial,sans-serif" font-size="6.5" fill="#4527A0" text-anchor="middle">Праймеры связываются с ДНК</text>

<text x="328" y="165" font-family="Arial,sans-serif" font-size="12" fill="#5E35B1" text-anchor="middle">→</text>

<!-- Cycle 3: Extension -->
<rect x="340" y="148" width="140" height="28" rx="4" fill="#E8EAF6" stroke="#5E35B1" stroke-width="0.8"/>
<text x="410" y="160" font-family="Arial,sans-serif" font-size="7.5" font-weight="bold" fill="#311B92" text-anchor="middle">3. Элонгация 72°C</text>
<text x="410" y="172" font-family="Arial,sans-serif" font-size="6.5" fill="#4527A0" text-anchor="middle">Taq-полимераза достраивает</text>

<!-- Amplification curve -->
<text x="250" y="192" font-family="Arial,sans-serif" font-size="7" fill="#311B92" text-anchor="middle">Результат: 2ⁿ копий ДНК за n циклов (30 циклов → 10⁹ копий!)</text>
<!-- Mini graph -->
<line x1="60" y1="215" x2="60" y2="195" stroke="#5E35B1" stroke-width="1"/>
<line x1="60" y1="215" x2="440" y2="215" stroke="#5E35B1" stroke-width="1"/>
<path d="M60 214 Q120 214 180 213 Q220 212 260 210 Q300 205 340 198 Q380 193 400 191 L440 190" fill="none" stroke="#7E57C2" stroke-width="2"/>
<text x="50" y="198" font-family="Arial,sans-serif" font-size="5.5" fill="#4527A0" text-anchor="middle">ДНК</text>
<text x="250" y="213" font-family="Arial,sans-serif" font-size="5.5" fill="#4527A0" text-anchor="middle">число циклов</text>
<text x="250" y="200" font-family="Arial,sans-serif" font-size="5.5" fill="#7E57C2" text-anchor="middle">экспоненциальный рост</text>

<!-- Key enzymes/tools -->
<rect x="10" y="230" width="480" height="72" rx="5" fill="#5E35B1" opacity="0.08" stroke="#7E57C2" stroke-width="1"/>
<text x="250" y="248" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#311B92" text-anchor="middle">Инструменты генетической инженерии</text>

<text x="25" y="265" font-family="Arial,sans-serif" font-size="7.5" fill="#4527A0">• Рестриктазы — разрезание ДНК в специфических сайтах (EcoRI: GAATTC)</text>
<text x="25" y="277" font-family="Arial,sans-serif" font-size="7.5" fill="#4527A0">• ДНК-лигаза — сшивание фрагментов ДНК (формирование фосфодиэфирных связей)</text>
<text x="25" y="289" font-family="Arial,sans-serif" font-size="7.5" fill="#4527A0">• Taq-полимераза — термостабильная ДНК-полимераза (из Thermus aquaticus)</text>
<text x="25" y="301" font-family="Arial,sans-serif" font-size="7.5" fill="#4527A0">• Праймеры — короткие олигонуклеотиды для инициации синтеза ДНК</text>

<!-- Applications -->
<rect x="10" y="310" width="480" height="28" rx="4" fill="#311B92" opacity="0.08"/>
<text x="250" y="325" font-family="Arial,sans-serif" font-size="7.5" fill="#311B92" text-anchor="middle">Применение: инсулин (1982), гормон роста, интерферон, вакцины, ГМО-растения, генная терапия</text>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="7" fill="#9575CD" text-anchor="middle">Урок 38 · Генетическая инженерия: методы</text>
</svg>