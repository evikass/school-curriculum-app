<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="25" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сельскохозяйственная биотехнология</text>

<!-- Section 1: Bt Corn -->
<rect x="10" y="38" width="115" height="120" rx="6" fill="white" opacity="0.65" stroke="#2E7D32" stroke-width="1.2"/>
<text x="67" y="55" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Bt-кукуруза</text>
<!-- Corn stalk -->
<line x1="67" y1="130" x2="67" y2="70" stroke="#4CAF50" stroke-width="3"/>
<!-- Leaves -->
<path d="M67 85 Q55 80 45 85" fill="none" stroke="#66BB6A" stroke-width="2"/>
<path d="M67 95 Q79 90 89 95" fill="none" stroke="#66BB6A" stroke-width="2"/>
<path d="M67 105 Q55 100 45 105" fill="none" stroke="#66BB6A" stroke-width="2"/>
<!-- Ear of corn -->
<ellipse cx="72" cy="95" rx="8" ry="14" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
<line x1="72" y1="82" x2="72" y2="108" stroke="#FF8F00" stroke-width="0.5"/>
<!-- Bt label -->
<rect x="42" y="115" width="50" height="12" rx="2" fill="#2E7D32"/>
<text x="67" y="124" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle">ген Cry Bt</text>
<text x="67" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">Токсин убивает</text>
<text x="67" y="148" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">вредителей</text>
<text x="67" y="156" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">(Bacillus thuringiensis)</text>

<!-- Section 2: GM Soy -->
<rect x="135" y="38" width="115" height="120" rx="6" fill="white" opacity="0.65" stroke="#2E7D32" stroke-width="1.2"/>
<text x="192" y="55" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">ГМ-соя (RR)</text>
<!-- Soy plant -->
<line x1="192" y1="130" x2="192" y2="75" stroke="#4CAF50" stroke-width="2.5"/>
<path d="M192 85 Q180 78 170 83" fill="none" stroke="#66BB6A" stroke-width="1.5"/>
<path d="M192 95 Q204 88 214 93" fill="none" stroke="#66BB6A" stroke-width="1.5"/>
<!-- Soy pods -->
<ellipse cx="180" cy="90" rx="5" ry="3" fill="#8BC34A" stroke="#33691E" stroke-width="0.5"/>
<ellipse cx="205" cy="100" rx="5" ry="3" fill="#8BC34A" stroke="#33691E" stroke-width="0.5"/>
<rect x="165" y="115" width="55" height="12" rx="2" fill="#F57F17"/>
<text x="192" y="124" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">устойчива к RoundUp</text>
<text x="192" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">EPSPS ген →</text>
<text x="192" y="148" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">толерантность</text>
<text x="192" y="156" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">к гербициду глифосату</text>

<!-- Section 3: Transgenic goat -->
<rect x="260" y="38" width="120" height="120" rx="6" fill="white" opacity="0.65" stroke="#2E7D32" stroke-width="1.2"/>
<text x="320" y="55" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Трансгенная коза</text>
<!-- Goat body -->
<ellipse cx="315" cy="100" rx="22" ry="14" fill="#E0E0E0" stroke="#757575" stroke-width="1.5"/>
<!-- Head -->
<ellipse cx="293" cy="90" rx="10" ry="8" fill="#EEEEEE" stroke="#757575" stroke-width="1"/>
<!-- Horns -->
<line x1="289" y1="82" x2="285" y2="74" stroke="#757575" stroke-width="1.5"/>
<line x1="297" y1="82" x2="301" y2="74" stroke="#757575" stroke-width="1.5"/>
<!-- Legs -->
<line x1="300" y1="112" x2="298" y2="125" stroke="#757575" stroke-width="1.5"/>
<line x1="310" y1="112" x2="312" y2="125" stroke="#757575" stroke-width="1.5"/>
<line x1="325" y1="112" x2="323" y2="125" stroke="#757575" stroke-width="1.5"/>
<line x1="335" y1="112" x2="337" y2="125" stroke="#757575" stroke-width="1.5"/>
<!-- DNA symbol on body -->
<text x="315" y="103" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">ДНК</text>
<!-- Milk bottle -->
<rect x="348" y="100" width="12" height="18" rx="2" fill="white" stroke="#90CAF9" stroke-width="1"/>
<rect x="350" y="96" width="8" height="5" rx="1" fill="#90CAF9"/>
<text x="354" y="113" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0" text-anchor="middle">молоко</text>
<text x="320" y="140" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">Человеческий ген →</text>
<text x="320" y="148" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">антитромбин III</text>
<text x="320" y="156" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">в молоке (ATryn®)</text>

<!-- Section 4: Biofertilizers & Biopesticides -->
<rect x="390" y="38" width="100" height="120" rx="6" fill="white" opacity="0.65" stroke="#2E7D32" stroke-width="1.2"/>
<text x="440" y="52" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Биоудобрения</text>
<!-- Root nodules -->
<path d="M420 70 Q430 65 440 70 Q450 65 460 70" fill="none" stroke="#795548" stroke-width="2"/>
<circle cx="425" cy="72" r="4" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="440" cy="72" r="4" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="455" cy="72" r="4" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
<text x="440" y="85" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Клубеньковые бактерии</text>
<text x="440" y="93" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">(Rhizobium) — фиксация N₂</text>

<text x="440" y="108" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Биопестициды</text>
<!-- Insect -->
<ellipse cx="440" cy="120" rx="8" ry="4" fill="#FFAB91" stroke="#E64A19" stroke-width="0.8"/>
<line x1="434" y1="118" x2="430" y2="114" stroke="#E64A19" stroke-width="0.5"/>
<line x1="446" y1="118" x2="450" y2="114" stroke="#E64A19" stroke-width="0.5"/>
<!-- X over insect -->
<line x1="434" y1="116" x2="446" y2="124" stroke="#C62828" stroke-width="1.5"/>
<line x1="446" y1="116" x2="434" y2="124" stroke="#C62828" stroke-width="1.5"/>
<text x="440" y="133" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Bt-токсин, триходерма</text>
<text x="440" y="141" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Бактериальные/грибные</text>
<text x="440" y="149" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">препараты</text>

<!-- GM crops statistics -->
<rect x="10" y="168" width="480" height="70" rx="5" fill="white" opacity="0.55" stroke="#2E7D32" stroke-width="1"/>
<text x="250" y="185" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">ГМ-культуры в мире (2023)</text>

<text x="25" y="200" font-family="Arial,sans-serif" font-size="7.5" fill="#2E7D32">• Площадь: ~190 млн га в 27 странах</text>
<text x="25" y="212" font-family="Arial,sans-serif" font-size="7.5" fill="#2E7D32">• Основные культуры: соя (50%), кукуруза (30%), хлопок (13%), рапс (5%)</text>
<text x="25" y="224" font-family="Arial,sans-serif" font-size="7.5" fill="#2E7D32">• Признаки: устойчивость к гербицидам (60%), к вредителям (20%), stacked traits (20%)</text>
<text x="25" y="236" font-family="Arial,sans-serif" font-size="7.5" fill="#2E7D32">• Лидеры: США, Бразилия, Аргентина, Индия, Канада</text>

<!-- Achievements and concerns -->
<rect x="10" y="246" width="235" height="78" rx="5" fill="#2E7D32" opacity="0.08" stroke="#388E3C" stroke-width="1"/>
<text x="127" y="262" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Достижения</text>
<text x="20" y="276" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">+ Урожайность ↑ 20–30%</text>
<text x="20" y="288" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">+ Снижение использования пестицидов</text>
<text x="20" y="300" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">+ Устойчивость к засухе, засолению</text>
<text x="20" y="312" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">+ Биофортификация (витамин A — Golden Rice)</text>

<rect x="255" y="246" width="235" height="78" rx="5" fill="#C62828" opacity="0.06" stroke="#E57373" stroke-width="1"/>
<text x="372" y="262" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#B71C1C" text-anchor="middle">Проблемы и риски</text>
<text x="265" y="276" font-family="Arial,sans-serif" font-size="7" fill="#C62828">− Аллергенность (новые белки)</text>
<text x="265" y="288" font-family="Arial,sans-serif" font-size="7" fill="#C62828">− «Суперсорняки» (горизонт. перенос генов)</text>
<text x="265" y="300" font-family="Arial,sans-serif" font-size="7" fill="#C62828">− Зависимость от корпораций (монополия)</text>
<text x="265" y="312" font-family="Arial,sans-serif" font-size="7" fill="#C62828">− Снижение биоразнообразия</text>

<text x="250" y="342" font-family="Arial,sans-serif" font-size="7" fill="#66BB6A" text-anchor="middle">Урок 42 · Сельскохозяйственная биотехнология</text>
</svg>