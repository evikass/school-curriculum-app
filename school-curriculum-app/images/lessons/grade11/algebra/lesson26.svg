<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b8cbf;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5b041;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#52be80;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec7063;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#4a6fa5" stroke-width="2" rx="10"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#6b8cbf" stroke-width="1" rx="5"/>
  
  <!-- Номер урока -->
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="14" fill="#4a6fa5" text-anchor="end" font-weight="bold">Урок 26</text>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" fill="#2c3e50" text-anchor="middle" font-weight="bold">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle" font-weight="bold">Теоремы сложения и умножения вероятностей</text>
  
  <!-- Раздел 1: Сложение вероятностей -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="220" height="120" fill="url(#grad1)" opacity="0.1" rx="5"/>
    <text x="110" y="20" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">СЛОЖЕНИЕ ВЕРОЯТНОСТЕЙ</text>
    
    <!-- Формула для несовместных событий -->
    <rect x="10" y="30" width="200" height="35" fill="white" stroke="#4a6fa5" stroke-width="1" rx="3"/>
    <text x="110" y="52" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">P(A ∪ B) = P(A) + P(B)</text>
    
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">для несовместных событий</text>
    
    <!-- Формула для совместных событий -->
    <rect x="10" y="85" width="200" height="35" fill="white" stroke="#4a6fa5" stroke-width="1" rx="3"/>
    <text x="110" y="107" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">P(A ∪ B) = P(A) + P(B) - P(A ∩ B)</text>
  </g>
  
  <!-- Раздел 2: Умножение вероятностей -->
  <g transform="translate(260, 80)">
    <rect x="0" y="0" width="220" height="120" fill="url(#grad2)" opacity="0.1" rx="5"/>
    <text x="110" y="20" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">УМНОЖЕНИЕ ВЕРОЯТНОСТЕЙ</text>
    
    <!-- Формула для независимых событий -->
    <rect x="10" y="30" width="200" height="35" fill="white" stroke="#f39c12" stroke-width="1" rx="3"/>
    <text x="110" y="52" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">P(A ∩ B) = P(A) · P(B)</text>
    
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50">для независимых событий</text>
    
    <!-- Формула для зависимых событий -->
    <rect x="10" y="85" width="200" height="35" fill="white" stroke="#f39c12" stroke-width="1" rx="3"/>
    <text x="110" y="107" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">P(A ∩ B) = P(A) · P(B|A)</text>
  </g>
  
  <!-- Визуализация: Совместные события -->
  <g transform="translate(50, 220)">
    <text x="100" y="0" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">Совместные события</text>
    
    <!-- Круг А -->
    <circle cx="60" cy="40" r="30" fill="url(#grad3)" opacity="0.7"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">A</text>
    
    <!-- Круг B -->
    <circle cx="100" cy="40" r="30" fill="url(#grad4)" opacity="0.7"/>
    <text x="100" y="45" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">B</text>
    
    <!-- Область пересечения -->
    <circle cx="80" cy="40" r="15" fill="#9b59b6" opacity="0.8"/>
    <text x="80" y="45" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">A∩B</text>
    
    <text x="80" y="85" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">События могут происходить вместе</text>
  </g>
  
  <!-- Визуализация: Несовместные события -->
  <g transform="translate(250, 220)">
    <text x="100" y="0" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">Несовместные события</text>
    
    <!-- Круг А -->
    <circle cx="60" cy="40" r="30" fill="url(#grad3)" opacity="0.7"/>
    <text x="60" y="45" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">A</text>
    
    <!-- Круг B -->
    <circle cx="120" cy="40" r="30" fill="url(#grad4)" opacity="0.7"/>
    <text x="120" y="45" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">B</text>
    
    <text x="90" y="85" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" text-anchor="middle">События не могут происходить вместе</text>
  </g>
  
  <!-- Примеры -->
  <g transform="translate(20, 305)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#2c3e50" font-weight="bold">Примеры:</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">• Бросание монеты: орел/решка (несовместные)</text>
    <text x="0" y="28" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">• Выигрыш в лотерею и погода (совместные)</text>
  </g>
  
  <!-- Дополнительные элементы декора -->
  <circle cx="20" cy="20" r="3" fill="#4a6fa5"/>
  <circle cx="480" cy="20" r="3" fill="#4a6fa5"/>
  <circle cx="20" cy="330" r="3" fill="#4a6fa5"/>
  <circle cx="480" cy="330" r="3" fill="#4a6fa5"/>
  
  <!-- Разделительная линия -->
  <line x1="50" y1="70" x2="450" y2="70" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="240" y1="80" x2="240" y2="200" stroke="#bdc3c7" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="50" y1="210" x2="450" y2="210" stroke="#bdc3c7" stroke-width="1"/>
  
  <!-- Символы операций -->
  <text x="230" y="135" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">+</text>
  <text x="230" y="155" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">×</text>
</svg>