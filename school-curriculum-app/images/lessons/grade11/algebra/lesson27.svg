<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Дефиниции градиентов -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E5BBA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5FCF80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3FA860;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2C3E50" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#3498DB" stroke-width="1" rx="3"/>
  
  <!-- Заголовок и класс -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">АЛГЕБРА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1A1A1A">Урок 27: Условная вероятность</text>
  <text x="40" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7F8C8D">№27</text>
  
  <!-- Схема вениеверсов -->
  <circle cx="80" cy="120" r="25" fill="#3498DB" opacity="0.7"/>
  <circle cx="130" cy="120" r="25" fill="#E74C3C" opacity="0.7"/>
  <circle cx="180" cy="120" r="25" fill="#F39C12" opacity="0.7"/>
  <circle cx="230" cy="120" r="25" fill="#27AE60" opacity="0.7"/>
  <circle cx="280" cy="120" r="25" fill="#9B59B6" opacity="0.7"/>
  <circle cx="330" cy="120" r="25" fill="#1ABC9C" opacity="0.7"/>
  <circle cx="380" cy="120" r="25" fill="#34495E" opacity="0.7"/>
  
  <text x="80" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#FFF">ω₁</text>
  <text x="130" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#FFF">ω₂</text>
  <text x="180" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#FFF">ω₃</text>
  <text x="230" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#FFF">ω₄</text>
  <text x="280" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#FFF">ω₅</text>
  <text x="330" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#FFF">ω₆</text>
  <text x="380" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#FFF">ω₇</text>
  
  <text x="230" y="165" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2C3E50">Пространство элементарных исходов Ω</text>
  
  <!-- Множество A -->
  <rect x="60" y="190" width="120" height="60" fill="url(#blueGrad)" opacity="0.3" rx="5"/>
  <rect x="60" y="190" width="120" height="60" fill="none" stroke="url(#blueGrad)" stroke-width="2" rx="5"/>
  <text x="120" y="225" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">A</text>
  
  <!-- Множество B -->
  <rect x="200" y="190" width="120" height="60" fill="url(#greenGrad)" opacity="0.3" rx="5"/>
  <rect x="200" y="190" width="120" height="60" fill="none" stroke="url(#greenGrad)" stroke-width="2" rx="5"/>
  <text x="260" y="225" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2C3E50">B</text>
  
  <!-- Пересечение A∩B -->
  <rect x="200" y="190" width="80" height="60" fill="url(#redGrad)" opacity="0.5" rx="5"/>
  
  <text x="230" y="270" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2C3E50">Множества A и B</text>
  
  <!-- Формула условной вероятности -->
  <rect x="340" y="190" width="140" height="80" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1" rx="5"/>
  <text x="410" y="210" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">Формула</text>
  <text x="410" y="230" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2C3E50">P(A|B) = P(A∩B) / P(B)</text>
  <text x="410" y="250" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7F8C8D">условной вероятности</text>
  
  <!-- Формула независимости -->
  <rect x="340" y="280" width="140" height="50" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1" rx="5"/>
  <text x="410" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">Независимость</text>
  <text x="410" y="320" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2C3E50">P(A∩B) = P(A)·P(B)</text>
  
  <!-- Формула Байеса -->
  <rect x="60" y="280" width="260" height="50" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1" rx="5"/>
  <text x="190" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#2C3E50">Формула Байеса</text>
  <text x="190" y="320" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2C3E50">P(A|B) = P(B|A)·P(A) / P(B)</text>
  
  <!-- Пример -->
  <rect x="60" y="100" width="140" height="80" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1" rx="5"/>
  <text x="130" y="120" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#2C3E50">Пример:</text>
  <text x="130" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2C3E50">P(A) = 0.4</text>
  <text x="130" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2C3E50">P(B) = 0.3</text>
  <text x="130" y="170" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2C3E50">P(A∩B) = 0.12</text>
  
  <!-- Свойства -->
  <circle cx="350" cy="100" r="5" fill="#3498DB"/>
  <circle cx="370" cy="100" r="5" fill="#E74C3C"/>
  <line x1="350" y1="100" x2="370" y2="100" stroke="#2C3E50" stroke-width="1"/>
  <text x="380" y="105" font-family="Arial, sans-serif" font-size="10" fill="#2C3E50">P(A|B) = 0.4</text>
  
  <!-- Дополнительные элементы для достижения 50+ -->
  <rect x="340" y="190" width="1" height="80" fill="#95A5A6"/>
  <rect x="420" y="190" width="1" height="80" fill="#95A5A6"/>
  <rect x="340" y="230" width="140" height="1" fill="#95A5A6"/>
  
  <rect x="60" y="280" width="1" height="50" fill="#95A5A6"/>
  <rect x="320" y="280" width="1" height="50" fill="#95A5A6"/>
  <rect x="60" y="305" width="260" height="1" fill="#95A5A6"/>
  
  <circle cx="90" cy="110" r="2" fill="#95A5A6"/>
  <circle cx="150" cy="110" r="2" fill="#95A5A6"/>
  <circle cx="210" cy="110" r="2" fill="#95A5A6"/>
  <circle cx="270" cy="110" r="2" fill="#95A5A6"/>
  <circle cx="330" cy="110" r="2" fill="#95A5A6"/>
  <circle cx="390" cy="110" r="2" fill="#95A5A6"/>
  
  <circle cx="90" cy="130" r="2" fill="#95A5A6"/>
  <circle cx="150" cy="130" r="2" fill="#95A5A6"/>
  <circle cx="210" cy="130" r="2" fill="#95A5A6"/>
  <circle cx="270" cy="130" r="2" fill="#95A5A6"/>
  <circle cx="330" cy="130" r="2" fill="#95A5A6"/>
  <circle cx="390" cy="130" r="2" fill="#95A5A6"/>
</svg>