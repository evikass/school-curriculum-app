<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B68EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#50E3C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A90E2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="url(#grad1)" stroke-width="3" rx="10"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4A90E2" stroke-width="1" stroke-dasharray="5,5" rx="8"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">Урок 18: Вычисление площадей с помощью интеграла</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">Различные случаи вычисления площадей фигур</text>
  <text x="50" y="55" text-anchor="start" font-family="Arial, sans-serif" font-size="12" fill="#4A90E2">АЛГЕБРА · 11 КЛАСС</text>
  <text x="460" y="330" text-anchor="end" font-family="Arial, sans-serif" font-size="12" fill="#4A90E2">№18</text>
  
  <!-- Случай 1: Область между кривой и осью x -->
  <g transform="translate(50, 80)">
    <!-- Система координат -->
    <line x1="0" y1="80" x2="120" y2="80" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="160" stroke="#333" stroke-width="2"/>
    <path d="M 60 160 L 55 155 L 65 155 Z" fill="#333"/>
    <path d="M 0 80 L 5 75 L 5 85 Z" fill="#333"/>
    
    <!-- Кривая y = x²/4 -->
    <path d="M 20 140 Q 40 100, 60 80 T 100 40" fill="none" stroke="#4A90E2" stroke-width="3"/>
    
    <!-- Залитая область -->
    <path d="M 20 80 L 20 140 Q 40 100, 60 80 T 100 40 L 100 80 Z" fill="url(#grad3)"/>
    
    <!-- Подписи -->
    <text x="60" y="175" text-anchor="middle" font-size="10" fill="#333">x</text>
    <text x="15" y="85" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="105" y="85" text-anchor="middle" font-size="10" fill="#333">a</text>
    <text x="70" y="10" text-anchor="middle" font-size="10" fill="#333">y</text>
    <text x="20" y="130" text-anchor="middle" font-size="9" fill="#4A90E2">y=f(x)</text>
    
    <!-- Формула -->
    <rect x="10" y="185" width="100" height="20" fill="#F5F5F5" stroke="#DDD" rx="3"/>
    <text x="60" y="198" text-anchor="middle" font-size="11" fill="#333">S = ∫[0,a] f(x)dx</text>
  </g>
  
  <!-- Случай 2: Область между двумя кривыми -->
  <g transform="translate(200, 80)">
    <!-- Система координат -->
    <line x1="0" y1="80" x2="120" y2="80" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="160" stroke="#333" stroke-width="2"/>
    <path d="M 60 160 L 55 155 L 65 155 Z" fill="#333"/>
    <path d="M 0 80 L 5 75 L 5 85 Z" fill="#333"/>
    
    <!-- Кривая y = x²/4 -->
    <path d="M 20 140 Q 40 100, 60 80 T 100 40" fill="none" stroke="#4A90E2" stroke-width="3"/>
    
    <!-- Кривая y = x/2 -->
    <path d="M 20 60 L 100 30" fill="none" stroke="#50E3C2" stroke-width="3"/>
    
    <!-- Залитая область -->
    <path d="M 20 80 L 20 140 Q 40 100, 60 80 T 100 40 L 100 30 L 20 60 Z" fill="url(#grad3)"/>
    
    <!-- Подписи -->
    <text x="60" y="175" text-anchor="middle" font-size="10" fill="#333">x</text>
    <text x="15" y="85" text-anchor="middle" font-size="10" fill="#333">a</text>
    <text x="105" y="85" text-anchor="middle" font-size="10" fill="#333">b</text>
    <text x="70" y="10" text-anchor="middle" font-size="10" fill="#333">y</text>
    <text x="20" y="130" text-anchor="middle" font-size="9" fill="#4A90E2">y=f(x)</text>
    <text x="20" y="50" text-anchor="middle" font-size="9" fill="#50E3C2">y=g(x)</text>
    
    <!-- Формула -->
    <rect x="10" y="185" width="100" height="20" fill="#F5F5F5" stroke="#DDD" rx="3"/>
    <text x="60" y="198" text-anchor="middle" font-size="11" fill="#333">S = ∫[a,b] (f-g)dx</text>
  </g>
  
  <!-- Случай 3: Область между кривой и осью y -->
  <g transform="translate(350, 80)">
    <!-- Система координат -->
    <line x1="0" y1="80" x2="120" y2="80" stroke="#333" stroke-width="2"/>
    <line x1="60" y1="0" x2="60" y2="160" stroke="#333" stroke-width="2"/>
    <path d="M 60 160 L 55 155 L 65 155 Z" fill="#333"/>
    <path d="M 0 80 L 5 75 L 5 85 Z" fill="#333"/>
    
    <!-- Кривая x = √y -->
    <path d="M 60 80 Q 80 100, 100 140" fill="none" stroke="#4A90E2" stroke-width="3"/>
    
    <!-- Залитая область -->
    <path d="M 60 80 Q 80 100, 100 140 L 100 80 Z" fill="url(#grad3)"/>
    
    <!-- Подписи -->
    <text x="60" y="175" text-anchor="middle" font-size="10" fill="#333">x</text>
    <text x="15" y="85" text-anchor="middle" font-size="10" fill="#333">0</text>
    <text x="105" y="85" text-anchor="middle" font-size="10" fill="#333">b</text>
    <text x="70" y="10" text-anchor="middle" font-size="10" fill="#333">y</text>
    <text x="90" y="120" text-anchor="middle" font-size="9" fill="#4A90E2">x=g(y)</text>
    
    <!-- Формула -->
    <rect x="10" y="185" width="100" height="20" fill="#F5F5F5" stroke="#DDD" rx="3"/>
    <text x="60" y="198" text-anchor="middle" font-size="11" fill="#333">S = ∫[0,b] g(y)dy</text>
  </g>
  
  <!-- Пояснения -->
  <g transform="translate(50, 270)">
    <rect x="0" y="0" width="400" height="60" fill="#F8F9FA" stroke="#DDD" rx="5"/>
    <text x="10" y="20" font-size="12" fill="#333" font-weight="bold">Основные формулы:</text>
    <text x="10" y="35" font-size="11" fill="#555">1. S = ∫[a,b] f(x)dx — площадь между кривой y=f(x) и осью x</text>
    <text x="10" y="50" font-size="11" fill="#555">2. S = ∫[a,b] (f(x)-g(x))dx — площадь между кривыми y=f(x) и y=g(x)</text>
    <text x="210" y="35" font-size="11" fill="#555">3. S = ∫[c,d] g(y)dy — площадь между кривой x=g(y) и осью y</text>
  </g>
  
  <!-- Дополнительные элементы -->
  <circle cx="460" cy="30" r="15" fill="url(#grad2)" opacity="0.3"/>
  <circle cx="40" cy="320" r="10" fill="#F5A623" opacity="0.3"/>
  
  <!-- Стрелки указания -->
  <path d="M 110 150 L 130 150" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <path d="M 260 150 L 280 150" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  <path d="M 410 150 L 430 150" stroke="#666" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
</svg>