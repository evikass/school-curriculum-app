<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2C3E50" stroke-width="2"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#3498DB" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7F8C8D">АЛГЕБРА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2C3E50">Урок 1: Область определения и множество значений</text>
  <text x="250" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#34495E">тригонометрических функций</text>
  
  <!-- Номер урока -->
  <text x="25" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E74C3C">№1</text>
  
  <!-- Система координат -->
  <g transform="translate(100, 250)">
    <!-- Ось X -->
    <line x1="0" y1="0" x2="280" y2="0" stroke="#2C3E50" stroke-width="2"/>
    <polygon points="280,0 275,-3 275,3" fill="#2C3E50"/>
    <text x="285" y="5" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">x</text>
    
    <!-- Ось Y -->
    <line x1="0" y1="0" x2="0" y2="-180" stroke="#2C3E50" stroke-width="2"/>
    <polygon points="0,-180 -3,-175 3,-175" fill="#2C3E50"/>
    <text x="5" y="-185" font-family="Arial, sans-serif" font-size="12" fill="#2C3E50">y</text>
    
    <!-- Шкала X -->
    <line x1="70" y1="-3" x2="70" y2="3" stroke="#7F8C8D" stroke-width="1"/>
    <text x="67" y="15" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">π/2</text>
    
    <line x1="140" y1="-3" x2="140" y2="3" stroke="#7F8C8D" stroke-width="1"/>
    <text x="135" y="15" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">π</text>
    
    <line x1="210" y1="-3" x2="210" y2="3" stroke="#7F8C8D" stroke-width="1"/>
    <text x="202" y="15" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">3π/2</text>
    
    <line x1="280" y1="-3" x2="280" y2="3" stroke="#7F8C8D" stroke-width="1"/>
    <text x="270" y="15" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">2π</text>
    
    <!-- Шкала Y -->
    <line x1="-3" y1="-90" x2="3" y2="-90" stroke="#7F8C8D" stroke-width="1"/>
    <text x="-25" y="-87" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">1</text>
    
    <line x1="-3" y1="90" x2="3" y2="90" stroke="#7F8C8D" stroke-width="1"/>
    <text x="-25" y="93" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">-1</text>
  </g>
  
  <!-- График синуса -->
  <path d="M 100,250 Q 135,160 170,250 T 240,250 Q 275,160 310,250 T 380,250" 
        fill="none" stroke="#3498DB" stroke-width="2" opacity="0.8"/>
  
  <!-- График косинуса -->
  <path d="M 100,250 Q 135,160 170,250 T 240,250 Q 275,160 310,250 T 380,250" 
        fill="none" stroke="#E74C3C" stroke-width="2" opacity="0.8" transform="translate(70,0)"/>
  
  <!-- График тангенса -->
  <g transform="translate(100, 250)">
    <!-- Вертикальные асимптоты -->
    <line x1="70" y1="-180" x2="70" y2="180" stroke="#9B59B6" stroke-width="1" stroke-dasharray="5,3"/>
    <line x1="210" y1="-180" x2="210" y2="180" stroke="#9B59B6" stroke-width="1" stroke-dasharray="5,3"/>
    
    <!-- Кривые тангенса -->
    <path d="M 0,0 Q 35,-90 70,-180" fill="none" stroke="#9B59B6" stroke-width="2" opacity="0.7"/>
    <path d="M 70,180 Q 105,90 140,0" fill="none" stroke="#9B59B6" stroke-width="2" opacity="0.7"/>
    <path d="M 140,0 Q 175,90 210,180" fill="none" stroke="#9B59B6" stroke-width="2" opacity="0.7"/>
    <path d="M 210,-180 Q 245,-90 280,0" fill="none" stroke="#9B59B6" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Формулы для sin(x) -->
  <g transform="translate(20, 120)">
    <rect x="0" y="0" width="80" height="60" fill="#ECF0F1" stroke="#3498DB" stroke-width="1" rx="5"/>
    <text x="40" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">sin(x)</text>
    <text x="40" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">D(f) = ℝ</text>
    <text x="40" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">E(f) = [-1;1]</text>
  </g>
  
  <!-- Формулы для cos(x) -->
  <g transform="translate(20, 190)">
    <rect x="0" y="0" width="80" height="60" fill="#ECF0F1" stroke="#E74C3C" stroke-width="1" rx="5"/>
    <text x="40" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">cos(x)</text>
    <text x="40" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">D(f) = ℝ</text>
    <text x="40" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">E(f) = [-1;1]</text>
  </g>
  
  <!-- Формулы для tg(x) -->
  <g transform="translate(400, 120)">
    <rect x="0" y="0" width="80" height="60" fill="#ECF0F1" stroke="#9B59B6" stroke-width="1" rx="5"/>
    <text x="40" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">tg(x)</text>
    <text x="40" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">D(f) = ℝ\π/2+πn</text>
    <text x="40" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">E(f) = ℝ</text>
  </g>
  
  <!-- Формулы для ctg(x) -->
  <g transform="translate(400, 190)">
    <rect x="0" y="0" width="80" height="60" fill="#ECF0F1" stroke="#1ABC9C" stroke-width="1" rx="5"/>
    <text x="40" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">ctg(x)</text>
    <text x="40" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">D(f) = ℝ\πn</text>
    <text x="40" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#34495E">E(f) = ℝ</text>
  </g>
  
  <!-- Легенда -->
  <g transform="translate(150, 280)">
    <rect x="0" y="0" width="200" height="50" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1" rx="5"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Легенда:</text>
    
    <line x1="10" y1="35" x2="30" y2="35" stroke="#3498DB" stroke-width="2"/>
    <text x="35" y="40" font-family="Arial, sans-serif" font-size="10" fill="#34495E">sin(x)</text>
    
    <line x1="60" y1="35" x2="80" y2="35" stroke="#E74C3C" stroke-width="2"/>
    <text x="85" y="40" font-family="Arial, sans-serif" font-size="10" fill="#34495E">cos(x)</text>
    
    <line x1="110" y1="35" x2="130" y2="35" stroke="#9B59B6" stroke-width="2"/>
    <text x="135" y="40" font-family="Arial, sans-serif" font-size="10" fill="#34495E">tg(x)</text>
    
    <line x1="160" y1="35" x2="180" y2="35" stroke="#1ABC9C" stroke-width="2"/>
    <text x="185" y="40" font-family="Arial, sans-serif" font-size="10" fill="#34495E">ctg(x)</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="450" cy="50" r="3" fill="#3498DB" opacity="0.5"/>
  <circle cx="460" cy="40" r="2" fill="#E74C3C" opacity="0.5"/>
  <circle cx="470" cy="55" r="2.5" fill="#9B59B6" opacity="0.5"/>
  
  <!-- Примечание об ограниченности -->
  <g transform="translate(250, 320)">
    <rect x="-100" y="-15" width="200" height="30" fill="#F1C40F" stroke="#F39C12" stroke-width="1" rx="15"/>
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">sin и cos - ограниченные функции</text>
  </g>
  
  <!-- Стрелки указания на области -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E74C3C"/>
    </marker>
  </defs>
  
  <!-- Указатель на область значений sin/cos -->
  <line x1="110" y1="160" x2="110" y2="90" stroke="#E74C3C" stroke-width="1" marker-end="url(#arrowhead)" opacity="0.7"/>
</svg>