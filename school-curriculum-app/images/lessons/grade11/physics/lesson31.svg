<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4a90e2;stop-opacity:0.1" />
    </linearGradient>
    <radialGradient id="nucleusGrad">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c92a2a;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="#0a0e27"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495e" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ecf0f1">
    Квантовая модель атома
  </text>
  
  <!-- Ядро -->
  <circle cx="250" cy="180" r="15" fill="url(#nucleusGrad)" filter="url(#glow)"/>
  <text x="250" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">p⁺</text>
  
  <!-- Орбиты и электроны -->
  <!-- n=1 -->
  <ellipse cx="250" cy="180" rx="40" ry="40" fill="none" stroke="#4a90e2" stroke-width="1.5" opacity="0.6"/>
  <circle cx="290" cy="180" r="6" fill="#4a90e2" filter="url(#glow)"/>
  <text x="290" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a90e2">n=1</text>
  <text x="290" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#95a5a6">E₁=-13.6 эВ</text>
  
  <!-- n=2 -->
  <ellipse cx="250" cy="180" rx="80" ry="80" fill="none" stroke="#4a90e2" stroke-width="1.5" opacity="0.6"/>
  <circle cx="330" cy="180" r="6" fill="#4a90e2" filter="url(#glow)"/>
  <circle cx="250" cy="100" r="6" fill="#4a90e2" filter="url(#glow)"/>
  <text x="330" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a90e2">n=2</text>
  <text x="330" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#95a5a6">E₂=-3.4 эВ</text>
  
  <!-- n=3 -->
  <ellipse cx="250" cy="180" rx="120" ry="120" fill="none" stroke="#4a90e2" stroke-width="1.5" opacity="0.6"/>
  <circle cx="370" cy="180" r="6" fill="#4a90e2" filter="url(#glow)"/>
  <circle cx="250" cy="60" r="6" fill="#4a90e2" filter="url(#glow)"/>
  <circle cx="190" cy="140" r="6" fill="#4a90e2" filter="url(#glow)"/>
  <text x="370" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4a90e2">n=3</text>
  <text x="370" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#95a5a6">E₃=-1.51 эВ</text>
  
  <!-- Квантовые числа -->
  <text x="50" y="120" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1" font-weight="bold">Квантовые числа:</text>
  <text x="50" y="140" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">n - главное (1,2,3,...)</text>
  <text x="50" y="160" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">l - орбитальное (0,1,...,n-1)</text>
  <text x="50" y="180" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">mₗ - магнитное (-l,...,0,...,l)</text>
  <text x="50" y="200" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">mₛ - спин (-1/2, +1/2)</text>
  
  <!-- Формула энергии -->
  <text x="50" y="250" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1" font-weight="bold">Энергия уровня:</text>
  <text x="50" y="270" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">Eₙ = -13.6/n² эВ</text>
  
  <!-- Формула Бора -->
  <text x="50" y="300" font-family="Arial, sans-serif" font-size="14" fill="#ecf0f1" font-weight="bold">Радиус орбиты:</text>
  <text x="50" y="320" font-family="Arial, sans-serif" font-size="12" fill="#bdc3c7">rₙ = n²·a₀, где a₀=0.529 Å</text>
  
  <!-- Обозначения -->
  <text x="420" y="120" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">Обозначения:</text>
  <circle cx="430" cy="135" r="4" fill="#ff6b6b"/>
  <text x="440" y="140" font-family="Arial, sans-serif" font-size="11" fill="#bdc3c7">протоны</text>
  <circle cx="430" cy="155" r="4" fill="#4a90e2"/>
  <text x="440" y="160" font-family="Arial, sans-serif" font-size="11" fill="#bdc3c7">электроны</text>
  
  <!-- Стрелки переходов -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c" />
    </marker>
  </defs>
  
  <!-- Переход n=3→n=2 -->
  <line x1="250" y1="60" x2="250" y2="100" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.7"/>
  <text x="260" y="85" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">ΔE=1.89 эВ</text>
  
  <!-- Переход n=2→n=1 -->
  <line x1="250" y1="100" x2="250" y2="140" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.7"/>
  <text x="260" y="125" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">ΔE=10.2 эВ</text>
  
  <!-- Уровни энергии (справа) -->
  <text x="420" y="180" font-family="Arial, sans-serif" font-size="12" fill="#ecf0f1">Уровни:</text>
  <line x1="420" y1="195" x2="440" y2="195" stroke="#4a90e2" stroke-width="2"/>
  <text x="445" y="200" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">E₁</text>
  <line x1="420" y1="215" x2="440" y2="215" stroke="#4a90e2" stroke-width="2"/>
  <text x="445" y="220" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">E₂</text>
  <line x1="420" y1="235" x2="440" y2="235" stroke="#4a90e2" stroke-width="2"/>
  <text x="445" y="240" font-family="Arial, sans-serif" font-size="10" fill="#bdc3c7">E₃</text>
</svg>