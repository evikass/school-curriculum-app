<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#831843"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f9a8d4;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#f9a8d4;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  <rect width="500" height="350" fill="url(#centerGlow)"/>
  
  <!-- Decorative circles -->
  <circle cx="250" cy="175" r="120" fill="none" stroke="#f9a8d4" stroke-width="1" stroke-dasharray="5,5" opacity="0.4"/>
  <circle cx="250" cy="175" r="80" fill="none" stroke="#f9a8d4" stroke-width="1.5" opacity="0.6"/>
  <circle cx="250" cy="175" r="40" fill="#f9a8d4" opacity="0.3"/>
  
  <!-- Lesson number in center -->
  <text x="250" y="195" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#fce7f3" text-anchor="middle">29</text>
  
  <!-- Chapter label at top -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fce7f3" text-anchor="middle" opacity="0.8">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Lesson title at bottom -->
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fce7f3" text-anchor="middle">Урок 29: Эффект Комптона. Давление света</text>
  <text x="250" y="330" font-family="Arial, sans-serif" font-size="11" fill="#f9a8d4" text-anchor="middle" opacity="0.8">Урок 29 из 35</text>
  
  <!-- Decorative elements based on chapter -->
  <ellipse cx="250" cy="175" rx="100" ry="35" fill="none" stroke="#f9a8d4" stroke-width="1.5" opacity="0.7"/><ellipse cx="250" cy="175" rx="100" ry="35" fill="none" stroke="#f9a8d4" stroke-width="1.5" opacity="0.7" transform="rotate(60 250 175)"/><ellipse cx="250" cy="175" rx="100" ry="35" fill="none" stroke="#f9a8d4" stroke-width="1.5" opacity="0.7" transform="rotate(120 250 175)"/><circle cx="250" cy="175" r="8" fill="#f9a8d4"/>
