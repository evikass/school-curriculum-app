<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Градиенты -->
    <linearGradient id="springGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="massGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="energyGrad">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:0.4" />
    </radialGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="3" rx="5" ry="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#ecf0f1" stroke-width="1" rx="3" ry="3"/>
  
  <!-- Номер урока -->
  <text x="45" y="35" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">Урок 9</text>
  
  <!-- "ФИЗИКА · 11 КЛАСС" -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="14" fill="#34495e" text-anchor="middle">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2c3e50" text-anchor="middle">Гармонические колебания. Пружинный маятник</text>
  
  <!-- Схема пружинного маятника -->
  <g transform="translate(100, 80)">
    <!-- Опора -->
    <rect x="45" y="0" width="10" height="5" fill="#34495e"/>
    <line x1="50" y1="5" x2="50" y2="10" stroke="#34495e" stroke-width="2"/>
    
    <!-- Пружина -->
    <path d="M50,10 L50,25 L55,30 L45,35 L55,40 L45,45 L55,50 L45,55 L55,60 L45,65 L55,70 L50,75 L50,140" 
          fill="none" stroke="url(#springGrad)" stroke-width="2"/>
    
    <!-- Груз -->
    <rect x="35" y="140" width="30" height="20" fill="url(#massGrad)" rx="2" ry="2"/>
    <text x="50" y="155" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">m</text>
    
    <!-- Ось координат -->
    <line x1="20" y1="90" x2="20" y2="170" stroke="#7f8c8d" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="15" y="85" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">x</text>
    
    <!-- Положения равновесия и смещения -->
    <line x1="20" y1="90" x2="80" y2="90" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="85" y="93" font-family="Arial, sans-serif" font-size="10" fill="#27ae60">x=0</text>
    
    <line x1="20" y1="140" x2="80" y2="140" stroke="#e74c3c" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="85" y="143" font-family="Arial, sans-serif" font-size="10" fill="#e74c3c">x=x₀</text>
    
    <!-- Стрелка силы -->
    <line x1="50" y1="130" x2="50" y2="100" stroke="#e67e22" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="55" y="120" font-family="Arial, sans-serif" font-size="10" fill="#e67e22">F</text>
  </g>
  
  <!-- Стрелка -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>
  
  <!-- Дифференциальное уравнение -->
  <g transform="translate(280, 100)">
    <rect x="0" y="0" width="180" height="70" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5" ry="5"/>
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle">Дифференциальное уравнение:</text>
    <text x="90" y="45" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">m·ẍ = -k·x</text>
    <text x="90" y="60" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d" text-anchor="middle">или ẍ + ω²·x = 0</text>
  </g>
  
  <!-- Решение уравнения -->
  <g transform="translate(280, 180)">
    <rect x="0" y="0" width="180" height="50" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1" rx="5" ry="5"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle">Решение:</text>
    <text x="90" y="40" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle">x(t) = A·cos(ωt + φ₀)</text>
  </g>
  
  <!-- График колебаний -->
  <g transform="translate(40, 230)">
    <rect x="0" y="0" width="200" height="80" fill="#fdf2e9" stroke="#f39c12" stroke-width="1" rx="5" ry="5"/>
    <text x="100" y="15" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">График колебаний</text>
    
    <!-- Оси -->
    <line x1="20" y1="60" x2="180" y2="60" stroke="#34495e" stroke-width="1"/>
    <line x1="20" y1="20" x2="20" y2="60" stroke="#34495e" stroke-width="1"/>
    
    <!-- Косиноида -->
    <path d="M20,40 C30,20 40,20 50,40 S70,60 80,40 S100,20 110,40 S130,60 140,40 S160,20 170,40" 
          fill="none" stroke="#3498db" stroke-width="2"/>
    
    <!-- Подписи осей -->
    <text x="100" y="75" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">t</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">x</text>
  </g>
  
  <!-- Энергии -->
  <g transform="translate(260, 230)">
    <rect x="0" y="0" width="210" height="80" fill="#ebf5fb" stroke="#3498db" stroke-width="1" rx="5" ry="5"/>
    <text x="105" y="15" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">Энергия</text>
    
    <!-- Энергия колебаний -->
    <rect x="15" y="25" width="180" height="10" fill="#ecf0f1" rx="5" ry="5"/>
    <rect x="15" y="25" width="180" height="10" fill="url(#energyGrad)" rx="5" ry="5"/>
    <text x="105" y="50" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">E = k·A²/2 = const</text>
    
    <!-- Текст энергий -->
    <text x="15" y="65" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Eₚ = k·x²/2</text>
    <text x="105" y="65" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Eₖ = m·v²/2</text>
    <text x="175" y="65" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">E = Eₚ + Eₖ</text>
  </g>
  
  <!-- Частота и период -->
  <g transform="translate(40, 320)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Частота: ν = (1/2π)·√(k/m)</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Период: T = 2π·√(m/k)</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Угловая частота: ω = √(k/m)</text>
  </g>
  
  <!-- Фазовый портрет -->
  <g transform="translate(260, 310)">
    <rect x="0" y="0" width="210" height="30" fill="#f4ecf7" stroke="#9b59b6" stroke-width="1" rx="5" ry="5"/>
    <text x="105" y="15" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">Фазовый портрет:</text>
    <text x="105" y="25" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" text-anchor="middle">Эллипс: x²/A² + v²/(A·ω)² = 1</text>
  </g>
</svg>