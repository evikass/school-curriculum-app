<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2C3E50" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495E" stroke-width="1" rx="3" stroke-dasharray="5,3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2C3E50">Урок 30: Опыты Резерфорда. Планетарная модель атома</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#7F8C8D">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Номер урока в углу -->
  <text x="460" y="330" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="end" fill="#2C3E50">Урок 30</text>
  
  <!-- Схема опыта Резерфорда -->
  <g transform="translate(30, 80)">
    <!-- Источник альфа-частиц -->
    <circle cx="30" cy="50" r="10" fill="#E74C3C"/>
    <text x="30" y="75" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2C3E50">Источник α-частиц</text>
    
    <!-- Золотая фольга -->
    <rect x="90" y="30" width="10" height="40" fill="#F39C12" opacity="0.8"/>
    <text x="95" y="80" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2C3E50">Золотая фольга</text>
    
    <!-- Атомы в фольге -->
    <g transform="translate(95, 35)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#2C3E50" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#2C3E50"/>
      <text x="15" y="5" font-family="Arial, sans-serif" font-size="8" fill="#2C3E50">Атом</text>
    </g>
    
    <g transform="translate(95, 50)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#2C3E50" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#2C3E50"/>
    </g>
    
    <g transform="translate(95, 65)">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#2C3E50" stroke-width="1"/>
      <circle cx="0" cy="0" r="2" fill="#2C3E50"/>
    </g>
    
    <!-- Экран детектора -->
    <rect x="180" y="20" width="80" height="80" fill="none" stroke="#3498DB" stroke-width="1"/>
    <text x="220" y="115" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2C3E50">Экран-детектор</text>
    
    <!-- Пучок альфа-частиц -->
    <line x1="40" y1="50" x2="90" y2="50" stroke="#E74C3C" stroke-width="2" opacity="0.6"/>
    
    <!-- Альфа-частицы, прошедшие без отклонения -->
    <line x1="100" y1="50" x2="180" y2="50" stroke="#E74C3C" stroke-width="1" opacity="0.4"/>
    <circle cx="220" cy="50" r="2" fill="#E74C3C"/>
    
    <!-- Альфа-частицы, отклоненные на небольшой угол -->
    <line x1="100" y1="50" x2="180" y2="40" stroke="#E74C3C" stroke-width="1" opacity="0.4"/>
    <circle cx="220" cy="35" r="2" fill="#E74C3C"/>
    
    <line x1="100" y1="50" x2="180" y2="60" stroke="#E74C3C" stroke-width="1" opacity="0.4"/>
    <circle cx="220" cy="65" r="2" fill="#E74C3C"/>
    
    <!-- Альфа-частицы, отраженные -->
    <line x1="100" y1="50" x2="120" y2="30" stroke="#E74C3C" stroke-width="1" opacity="0.4"/>
    <line x1="120" y1="30" x2="180" y2="15" stroke="#E74C3C" stroke-width="1" opacity="0.4"/>
    <circle cx="220" cy="10" r="2" fill="#E74C3C"/>
    
    <line x1="100" y1="50" x2="120" y2="70" stroke="#E74C3C" stroke-width="1" opacity="0.4"/>
    <line x1="120" y1="70" x2="180" y2="85" stroke="#E74C3C" stroke-width="1" opacity="0.4"/>
    <circle cx="220" cy="90" r="2" fill="#E74C3C"/>
  </g>
  
  <!-- Планетарная модель атома -->
  <g transform="translate(320, 150)">
    <!-- Ядро -->
    <circle cx="50" cy="50" r="12" fill="#E74C3C"/>
    <text x="50" y="55" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Ядро</text>
    
    <!-- Орбиты -->
    <circle cx="50" cy="50" r="25" fill="none" stroke="#3498DB" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#3498DB" stroke-width="1" stroke-dasharray="2,2"/>
    <circle cx="50" cy="50" r="55" fill="none" stroke="#3498DB" stroke-width="1" stroke-dasharray="2,2"/>
    
    <!-- Электроны -->
    <circle cx="75" cy="50" r="3" fill="#3498DB"/>
    <text x="80" y="53" font-family="Arial, sans-serif" font-size="8" fill="#3498DB">e⁻</text>
    
    <circle cx="50" cy="10" r="3" fill="#3498DB"/>
    <circle cx="50" cy="90" r="3" fill="#3498DB"/>
    
    <circle cx="20" cy="50" r="3" fill="#3498DB"/>
    <circle cx="105" cy="50" r="3" fill="#3498DB"/>
    
    <!-- Метки -->
    <text x="50" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2C3E50">Планетарная модель атома</text>
  </g>
  
  <!-- Постулаты Бора -->
  <g transform="translate(30, 220)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2C3E50">Постулаты Бора:</text>
    
    <!-- Постулат 1 -->
    <rect x="0" y="10" width="220" height="30" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1" rx="3"/>
    <text x="10" y="30" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">1. Электроны движутся по стационарным орбитам</text>
    
    <!-- Постулат 2 -->
    <rect x="0" y="45" width="220" height="30" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1" rx="3"/>
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">2. Излучение при переходе между орбитами</text>
    
    <!-- Постулат 3 -->
    <rect x="0" y="80" width="220" height="30" fill="#ECF0F1" stroke="#BDC3C7" stroke-width="1" rx="3"/>
    <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">3. M·v·r = n·ħ (квантование орбит)</text>
  </g>
  
  <!-- Формула для энергии орбиты -->
  <g transform="translate(270, 220)">
    <rect x="0" y="0" width="200" height="110" fill="#F8F9FA" stroke="#BDC3C7" stroke-width="1" rx="3"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C3E50">Энергия орбиты:</text>
    
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">E<sub>n</sub> = -13.6/n² эВ</text>
    
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">где n = 1, 2, 3, ... (главное</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#2C3E50">квантовое число)</text>
  </g>
  
  <!-- Год опыта -->
  <text x="450" y="330" font-family="Arial, sans-serif" font-size="10" fill="#7F8C8D">1911 г.</text>
  
  <!-- Условные обозначения -->
  <g transform="translate(30, 340)">
    <circle cx="10" cy="0" r="2" fill="#E74C3C"/>
    <text x="20" y="3" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">α-частица</text>
    
    <circle cx="80" cy="0" r="2" fill="#3498DB"/>
    <text x="90" y="3" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">Электрон</text>
    
    <circle cx="150" cy="0" r="2" fill="#2C3E50"/>
    <text x="160" y="3" font-family="Arial, sans-serif" font-size="9" fill="#2C3E50">Ядро</text>
  </g>
  
  <!-- Градиенты для глубины -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F39C12;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F1C40F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D68910;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="nucleusGradient">
      <stop offset="0%" style="stop-color:#E74C3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0392B;stop-opacity:1" />
    </radialGradient>
  </defs>
</svg>