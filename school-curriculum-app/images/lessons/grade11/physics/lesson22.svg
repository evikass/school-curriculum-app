<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Темный фон -->
  <rect width="500" height="350" fill="#0f172a"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#475569" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="24" font-weight="bold">Оптические приборы: Микроскоп</text>
  
  <!-- Основная ось -->
  <line x1="50" y1="250" x2="450" y2="250" stroke="#64748b" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Объектив -->
  <g id="objective">
    <ellipse cx="120" cy="250" rx="25" ry="60" fill="url(#lensGrad)" stroke="#38bdf8" stroke-width="2"/>
    <line x1="95" y1="250" x2="145" y2="250" stroke="#38bdf8" stroke-width="1"/>
    <text x="120" y="330" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14">Объектив</text>
    <text x="120" y="345" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">f₁</text>
  </g>
  
  <!-- Окуляр -->
  <g id="eyepiece">
    <ellipse cx="380" cy="250" rx="20" ry="50" fill="url(#lensGrad)" stroke="#38bdf8" stroke-width="2"/>
    <line x1="360" y1="250" x2="400" y2="250" stroke="#38bdf8" stroke-width="1"/>
    <text x="380" y="330" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14">Окуляр</text>
    <text x="380" y="345" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">f₂</text>
  </g>
  
  <!-- Труба микроскопа -->
  <rect x="145" y="230" width="235" height="40" fill="#334155" stroke="#64748b" stroke-width="1"/>
  
  <!-- Объект -->
  <g id="object">
    <line x1="60" y1="250" x2="60" y2="200" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="60" cy="200" r="3" fill="#fbbf24"/>
    <text x="60" y="190" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">AB</text>
    <text x="60" y="180" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Объект</text>
  </g>
  
  <!-- Ход лучей -->
  <!-- Луч 1 -->
  <path d="M 60,200 L 120,190 L 380,140" fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.8"/>
  <path d="M 60,200 L 120,210 L 380,360" fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Луч 2 -->
  <path d="M 60,250 L 120,250 L 380,250" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Изображение от объектива -->
  <g id="intermediate-image">
    <line x1="250" y1="250" x2="250" y2="290" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="250" cy="290" r="3" fill="#a78bfa"/>
    <text x="250" y="280" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">A'B'</text>
    <text x="250" y="305" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Промежуточное изображение</text>
  </g>
  
  <!-- Финальное изображение -->
  <g id="final-image">
    <line x1="420" y1="250" x2="420" y2="150" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="420" cy="150" r="3" fill="#60a5fa"/>
    <text x="420" y="140" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">A''B''</text>
    <text x="420" y="130" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Изображение</text>
  </g>
  
  <!-- Формула увеличения -->
  <g id="formula">
    <rect x="160" y="70" width="180" height="60" fill="#1e293b" stroke="#475569" stroke-width="1" rx="5"/>
    <text x="250" y="90" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14">Увеличение микроскопа:</text>
    <text x="250" y="115" text-anchor="middle" fill="#60a5fa" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Γ = - (L·D) / (f₁·f₂)</text>
  </g>
  
  <!-- Подписи к лучам -->
  <text x="150" y="170" text-anchor="middle" fill="#f87171" font-family="Arial, sans-serif" font-size="10">Лучи от объектива</text>
  <text x="300" y="230" text-anchor="middle" fill="#34d399" font-family="Arial, sans-serif" font-size="10">Главная оптическая ось</text>
  
  <!-- Фокусные точки -->
  <g id="focal-points">
    <circle cx="95" cy="250" r="2" fill="#f59e0b"/>
    <text x="95" y="270" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">F₁</text>
    <circle cx="145" cy="250" r="2" fill="#f59e0b"/>
    <text x="145" y="270" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">F₁'</text>
    <circle cx="360" cy="250" r="2" fill="#f59e0b"/>
    <text x="360" y="270" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">F₂</text>
    <circle cx="400" cy="250" r="2" fill="#f59e0b"/>
    <text x="400" y="270" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">F₂'</text>
  </g>
  
  <!-- Параметры -->
  <g id="parameters">
    <rect x="20" y="60" width="100" height="40" fill="#1e293b" stroke="#475569" stroke-width="1" rx="3"/>
    <text x="70" y="80" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">D = 250 мм</text>
    <text x="70" y="95" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Удаление резкости</text>
  </g>
  
  <g id="parameters2">
    <rect x="380" y="60" width="100" height="40" fill="#1e293b" stroke="#475569" stroke-width="1" rx="3"/>
    <text x="430" y="80" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="12">L = 160 мм</text>
    <text x="430" y="95" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="10">Расстояние между линзами</text>
  </g>
</svg>