<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="alphaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8787;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="betaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4dabf7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#74c0fc;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="gammaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8ce99a;stop-opacity:0.6" />
    </linearGradient>
  </defs>
  
  <!-- Фоновая рамка -->
  <rect x="10" y="10" width="480" height="330" fill="url(#bgGradient)" stroke="#868e96" stroke-width="2" rx="5" ry="5"/>
  
  <!-- Декоративная внутренняя рамка -->
  <rect x="20" y="20" width="460" height="310" fill="none" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,5" rx="3" ry="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#212529">Урок 33: Радиоактивность. Виды излучений</text>
  
  <!-- Подзаголовок -->
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#495057">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#495057">Урок 33</text>
  
  <!-- Секция: Открытие радиоактивности -->
  <text x="40" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212529">Открытие радиоактивности</text>
  
  <!-- Портрет Беккереля -->
  <circle cx="70" cy="125" r="20" fill="#dee2e6" stroke="#868e96" stroke-width="1"/>
  <text x="70" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#495057">А.Беккерель</text>
  
  <!-- Дата открытия -->
  <text x="70" y="155" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#495057">1896 г.</text>
  
  <!-- Радиоактивный элемент -->
  <rect x="120" y="115" width="30" height="30" fill="#868e96" stroke="#495057" stroke-width="1" rx="3" ry="3"/>
  <text x="135" y="135" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">U</text>
  
  <!-- Лучи от радиоактивного элемента -->
  <path d="M150 130 L180 110" stroke="#ff6b6b" stroke-width="2" opacity="0.8"/>
  <path d="M150 130 L180 130" stroke="#4dabf7" stroke-width="2" opacity="0.8"/>
  <path d="M150 130 L180 150" stroke="#51cf66" stroke-width="2" opacity="0.8"/>
  
  <!-- Фотопластинка -->
  <rect x="190" y="115" width="40" height="30" fill="white" stroke="#495057" stroke-width="1"/>
  <circle cx="200" cy="125" r="3" fill="#212529"/>
  <circle cx="210" cy="130" r="3" fill="#212529"/>
  <circle cx="220" cy="125" r="3" fill="#212529"/>
  
  <!-- Секция: α-излучение -->
  <text x="40" y="185" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212529">α-излучение</text>
  
  <!-- α-частица -->
  <circle cx="80" cy="210" r="8" fill="url(#alphaGradient)" stroke="#fa5252" stroke-width="1"/>
  <text x="80" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">α</text>
  
  <!-- Стрелка α-частицы -->
  <path d="M95 210 L130 210" stroke="url(#alphaGradient)" stroke-width="3" marker-end="url(#arrowAlpha)"/>
  
  <!-- Формула α-частицы -->
  <text x="140" y="205" font-family="Arial, sans-serif" font-size="12" fill="#495057">α-частица:</text>
  <text x="140" y="220" font-family="Arial, sans-serif" font-size="11" fill="#495057">He²⁺</text>
  
  <!-- Секция: β-излучение -->
  <text x="40" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212529">β-излучение</text>
  
  <!-- β-частица -->
  <circle cx="80" cy="275" r="6" fill="url(#betaGradient)" stroke="#339af0" stroke-width="1"/>
  <text x="80" y="279" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">β</text>
  
  <!-- Стрелка β-частицы -->
  <path d="M92 275 L130 275" stroke="url(#betaGradient)" stroke-width="3" stroke-dasharray="2,2" marker-end="url(#arrowBeta)"/>
  
  <!-- Формула β-частицы -->
  <text x="140" y="270" font-family="Arial, sans-serif" font-size="12" fill="#495057">β⁻-частица:</text>
  <text x="140" y="285" font-family="Arial, sans-serif" font-size="11" fill="#495057">e⁻</text>
  
  <!-- Секция: γ-излучение -->
  <text x="40" y="310" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212529">γ-излучение</text>
  
  <!-- γ-квант -->
  <path d="M70 320 Q80 315 90 320" stroke="url(#gammaGradient)" stroke-width="3" fill="none"/>
  <path d="M70 325 Q80 320 90 325" stroke="url(#gammaGradient)" stroke-width="3" fill="none"/>
  
  <!-- Стрелка γ-излучения -->
  <path d="M95 322 L130 322" stroke="url(#gammaGradient)" stroke-width="2" marker-end="url(#arrowGamma)"/>
  
  <!-- Формула γ-кванта -->
  <text x="140" y="317" font-family="Arial, sans-serif" font-size="12" fill="#495057">γ-квант:</text>
  <text x="140" y="332" font-family="Arial, sans-serif" font-size="11" fill="#495057">hf</text>
  
  <!-- Секция: Закон радиоактивного распада -->
  <text x="300" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#212529">Закон радиоактивного распада</text>
  
  <!-- График N(t) -->
  <rect x="300" y="105" width="180" height="120" fill="white" stroke="#495057" stroke-width="1"/>
  
  <!-- Оси графика -->
  <line x1="320" y1="205" x2="460" y2="205" stroke="#495057" stroke-width="1"/>
  <line x1="320" y1="205" x2="320" y2="125" stroke="#495057" stroke-width="1"/>
  
  <!-- Стрелки осей -->
  <path d="M460 205 L455 202 M460 205 L455 208" stroke="#495057" stroke-width="1"/>
  <path d="M320 125 L317 130 M320 125 L323 130" stroke="#495057" stroke-width="1"/>
  
  <!-- Кривая распада -->
  <path d="M330 140 Q350 145 370 155 Q390 165 410 180 Q430 195 450 210" stroke="#fa5252" stroke-width="2" fill="none"/>
  
  <!-- Подписи осей -->
  <text x="440" y="220" font-family="Arial, sans-serif" font-size="10" fill="#495057">t</text>
  <text x="310" y="120" font-family="Arial, sans-serif" font-size="10" fill="#495057">N</text>
  
  <!-- Формула закона -->
  <text x="320" y="145" font-family="Arial, sans-serif" font-size="11" fill="#495057">N = N₀e^(-λt)</text>
  
  <!-- Период полураспада -->
  <text x="320" y="165" font-family="Arial, sans-serif" font-size="11" fill="#495057">T = ln2/λ</text>
  
  <!-- Константа распада -->
  <text x="320" y="185" font-family="Arial, sans-serif" font-size="11" fill="#495057">λ = 0.693/T</text>
  
  <!-- Активность -->
  <text x="320" y="205" font-family="Arial, sans-serif" font-size="11" fill="#495057">A = λN = A₀e^(-λt)</text>
  
  <!-- Маркеры для стрелок -->
  <defs>
    <marker id="arrowAlpha" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#fa5252"/>
    </marker>
    <marker id="arrowBeta" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#339af0"/>
    </marker>
    <marker id="arrowGamma" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#51cf66"/>
    </marker>
  </defs>
  
  <!-- Таблица свойств излучений -->
  <rect x="300" y="240" width="180" height="90" fill="white" stroke="#495057" stroke-width="1"/>
  
  <!-- Заголовок таблицы -->
  <text x="390" y="260" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#212529">Свойства излучений</text>
  
  <!-- Строки таблицы -->
  <line x1="310" y1="270" x2="470" y2="270" stroke="#adb5bd" stroke-width="1"/>
  <line x1="310" y1="285" x2="470" y2="285" stroke="#adb5bd" stroke-width="1"/>
  <line x1="310" y1="300" x2="470" y2="300" stroke="#adb5bd" stroke-width="1"/>
  <line x1="310" y1="315" x2="470" y2="315" stroke="#adb5bd" stroke-width="1"/>
  
  <!-- Вертикальная линия разделения -->
  <line x1="340" y1="270" x2="340" y2="320" stroke="#adb5bd" stroke-width="1"/>
  
  <!-- Ячейки таблицы -->
  <text x="325" y="280" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#495057">α</text>
  <text x="325" y="295" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#495057">β</text>
  <text x="325" y="310" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#495057">γ</text>
  
  <text x="390" y="280" font-family="Arial, sans-serif" font-size="9" fill="#495057">He²⁺</text>
  <text x="390" y="295" font-family="Arial, sans-serif" font-size="9" fill="#495057">e⁻/e⁺</text>
  <text x="390" y="310" font-family="Arial, sans-serif" font-size="9" fill="#495057">γ-квант</text>
  
  <text x="450" y="280" font-family="Arial, sans-serif" font-size="9" fill="#495057">0.1c</text>
  <text x="450" y="295" font-family="Arial, sans-serif" font-size="9" fill="#495057">~c</text>
  <text x="450" y="310" font-family="Arial, sans-serif" font-size="9" fill="#495057">c</text>
</svg>