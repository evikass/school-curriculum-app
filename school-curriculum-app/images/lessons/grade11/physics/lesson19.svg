<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f0ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffeb3b;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#ffeb3b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffeb3b;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196f3;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#03a9f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196f3;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#1976d2" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#64b5f6" stroke-width="1" rx="3"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1565c0" font-weight="bold">ФИЗИКА · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#0d47a1" font-weight="bold">Урок 19: Световые волны</text>
  <text x="250" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1565c0">Скорость света</text>
  
  <!-- Номер урока -->
  <circle cx="460" cy="40" r="15" fill="#1976d2"/>
  <text x="460" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">19</text>
  
  <!-- Корпускулярная модель -->
  <g transform="translate(50, 100)">
    <text x="60" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0d47a1" font-weight="bold">Корпускулярная модель</text>
    
    <!-- частицы -->
    <circle cx="20" cy="20" r="4" fill="#ff5722"/>
    <circle cx="40" cy="25" r="4" fill="#ff5722"/>
    <circle cx="60" cy="15" r="4" fill="#ff5722"/>
    <circle cx="80" cy="30" r="4" fill="#ff5722"/>
    <circle cx="100" cy="20" r="4" fill="#ff5722"/>
    <circle cx="120" cy="35" r="4" fill="#ff5722"/>
    
    <line x1="0" y1="25" x2="140" y2="25" stroke="#90a4ae" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="70" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#546e7a">Прямолинейное распространение</text>
  </g>
  
  <!-- Волновая модель -->
  <g transform="translate(250, 100)">
    <text x="60" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0d47a1" font-weight="bold">Волновая модель</text>
    
    <!-- волна -->
    <path d="M 0 25 Q 15 5, 30 25 T 60 25 T 90 25 T 120 25" stroke="url(#waveGrad)" stroke-width="3" fill="none"/>
    <path d="M 0 25 Q 15 45, 30 25 T 60 25 T 90 25 T 120 25" stroke="url(#waveGrad)" stroke-width="3" fill="none"/>
    
    <!-- Длина волны -->
    <line x1="30" y1="5" x2="60" y2="5" stroke="#d32f2f" stroke-width="1.5"/>
    <text x="45" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f">λ</text>
    
    <line x1="0" y1="25" x2="140" y2="25" stroke="#90a4ae" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="70" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#546e7a">Колебательное распространение</text>
  </g>
  
  <!-- Дуализм -->
  <g transform="translate(150, 180)">
    <rect x="0" y="0" width="200" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="1" rx="5"/>
    <text x="100" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#0d47a1" font-weight="bold">Корпускулярно-волновой дуализм</text>
    <text x="100" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0">Свет обладает свойствами и частиц,</text>
    <text x="100" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1565c0">и волн</text>
  </g>
  
  <!-- Скорость света -->
  <g transform="translate(30, 260)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#0d47a1" font-weight="bold">Скорость света в вакууме:</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="16" fill="#d32f2f" font-weight="bold">c = 299 792 458 м/с</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="12" fill="#546e7a">≈ 3·10⁸ м/с</text>
    
    <!-- формула -->
    <rect x="150" y="-15" width="120" height="50" fill="#f5f5f5" stroke="#757575" stroke-width="1" rx="3"/>
    <text x="210" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#212121">c = λ·ν</text>
    <text x="210" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#757575">c - скорость света</text>
    <text x="210" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#757575">λ - длина волны</text>
    <text x="210" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#757575">ν - частота</text>
  </g>
  
  <!-- Схема измерения скорости света -->
  <g transform="translate(320, 240)">
    <!-- Источник света -->
    <circle cx="0" cy="20" r="8" fill="#ffeb3b"/>
    <text x="0" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">Источник</text>
    
    <!-- Зеркало -->
    <rect x="50" y="10" width="5" height="20" fill="#90a4ae"/>
    <line x1="52.5" y1="5" x2="52.5" y2="35" stroke="#546e7a" stroke-width="1"/>
    <text x="52.5" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">Зеркало</text>
    
    <!-- Световой луч -->
    <line x1="8" y1="20" x2="50" y2="20" stroke="url(#lightGrad)" stroke-width="3"/>
    <line x1="55" y1="20" x2="100" y2="20" stroke="url(#lightGrad)" stroke-width="3"/>
    <line x1="100" y1="20" x2="145" y2="20" stroke="url(#lightGrad)" stroke-width="3"/>
    
    <!-- Вращающийся диск -->
    <circle cx="100" cy="20" r="15" fill="none" stroke="#757575" stroke-width="2"/>
    <circle cx="100" cy="20" r="2" fill="#424242"/>
    <line x1="100" y1="20" x2="100" y2="5" stroke="#424242" stroke-width="2"/>
    <text x="100" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">Вращающийся диск</text>
    
    <!-- Приемник -->
    <rect x="140" y="15" width="10" height="10" fill="#4caf50"/>
    <text x="145" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">Приемник</text>
    
    <!-- Расстояния -->
    <line x1="0" y1="55" x2="52.5" y2="55" stroke="#9e9e9e" stroke-width="1"/>
    <text x="26.25" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#757575">L</text>
    
    <line x1="100" y1="55" x2="145" y2="55" stroke="#9e9e9e" stroke-width="1"/>
    <text x="122.5" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#757575">L</text>
    
    <text x="72.5" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#546e7a">Метод Физо</text>
  </g>
  
  <!-- Историческая справка -->
  <g transform="translate(20, 290)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#757575">1849 - Физо: 315 300 км/с</text>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="10" fill="#757575">1675 - Рёмер: 214 000 км/с</text>
    <text x="0" y="24" font-family="Arial, sans-serif" font-size="10" fill="#757575">1926 - Майкельсон: 299 796 км/с</text>
  </g>
</svg>