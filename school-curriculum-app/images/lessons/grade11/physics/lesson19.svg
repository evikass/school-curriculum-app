<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="stars" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="white" opacity="0.8"/>
      <circle cx="30" cy="25" r="0.3" fill="white" opacity="0.6"/>
      <circle cx="45" cy="15" r="0.4" fill="white" opacity="0.7"/>
      <circle cx="20" cy="40" r="0.2" fill="white" opacity="0.5"/>
    </pattern>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="#0a0a1a"/>
  <rect width="500" height="350" fill="url(#stars)" opacity="0.3"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a5568" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#718096" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#e2e8f0">Скорость света</text>
  <text x="250" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#a0aec0">Опыт Физо (1849)</text>
  
  <!-- Источник света -->
  <g id="light-source">
    <circle cx="80" cy="175" r="15" fill="#fbbf24" opacity="0.8"/>
    <circle cx="80" cy="175" r="10" fill="#fde047"/>
    <text x="80" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Источник</text>
  </g>
  
  <!-- Зубчатое колесо -->
  <g id="toothed-wheel">
    <circle cx="150" cy="175" r="25" fill="#4a5568" stroke="#718096" stroke-width="2"/>
    <!-- Зубцы -->
    <g id="teeth">
      <rect x="145" y="150" width="10" height="10" fill="#718096"/>
      <rect x="145" y="190" width="10" height="10" fill="#718096"/>
      <rect x="125" y="170" width="10" height="10" fill="#718096" transform="rotate(45 130 175)"/>
      <rect x="165" y="170" width="10" height="10" fill="#718096" transform="rotate(45 170 175)"/>
      <rect x="135" y="160" width="10" height="10" fill="#718096" transform="rotate(22.5 140 165)"/>
      <rect x="155" y="160" width="10" height="10" fill="#718096" transform="rotate(-22.5 160 165)"/>
      <rect x="135" y="190" width="10" height="10" fill="#718096" transform="rotate(-22.5 140 185)"/>
      <rect x="155" y="190" width="10" height="10" fill="#718096" transform="rotate(22.5 160 185)"/>
    </g>
    <text x="150" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Зубчатое</text>
    <text x="150" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">колесо</text>
  </g>
  
  <!-- Линза -->
  <g id="lens">
    <ellipse cx="190" cy="175" rx="8" ry="30" fill="#60a5fa" opacity="0.6"/>
    <text x="190" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Линза</text>
  </g>
  
  <!-- Световой луч -->
  <g id="light-beam">
    <line x1="95" y1="175" x2="182" y2="175" stroke="#fbbf24" stroke-width="3" opacity="0.8"/>
    <line x1="198" y1="175" x2="380" y2="175" stroke="#fbbf24" stroke-width="3" opacity="0.8"/>
    <!-- Отраженный луч -->
    <line x1="380" y1="175" x2="198" y2="175" stroke="#fbbf24" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
    <line x1="182" y1="175" x2="95" y2="175" stroke="#fbbf24" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
  </g>
  
  <!-- Зеркало -->
  <g id="mirror">
    <rect x="375" y="160" width="10" height="30" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
    <line x1="380" y1="155" x2="380" y2="195" stroke="#94a3b8" stroke-width="2"/>
    <text x="380" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">Зеркало</text>
  </g>
  
  <!-- Дистанция -->
  <g id="distance">
    <line x1="200" y1="250" x2="370" y2="250" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="200" y1="245" x2="200" y2="255" stroke="#94a3b8" stroke-width="1"/>
    <line x1="370" y1="245" x2="370" y2="255" stroke="#94a3b8" stroke-width="1"/>
    <text x="285" y="265" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e8f0">L = 8.63 км</text>
  </g>
  
  <!-- Формула скорости -->
  <g id="formula">
    <rect x="170" y="290" width="160" height="40" fill="#1e293b" stroke="#475569" stroke-width="1" rx="5"/>
    <text x="250" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0">c = 2Ln/f</text>
  </g>
  
  <!-- Пояснения -->
  <g id="annotations">
    <text x="250" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0">Свет проходит через зубцы колеса</text>
    <text x="250" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0aec0">и отражается от зеркала</text>
    
    <!-- Скорость света -->
    <text x="250" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fbbf24">c ≈ 3×10⁸ м/с</text>
  </g>
  
  <!-- Указатели вращения -->
  <g id="rotation-arrows">
    <path d="M 125 175 A 25 25 0 0 1 175 150" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
      </marker>
    </defs>
  </g>
  
  <!-- Частота вращения -->
  <text x="150" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0aec0">f = 12.67 об/с</text>
  
  <!-- Дополнительные метки -->
  <text x="285" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">→</text>
  <text x="285" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">→</text>
  <text x="285" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">→</text>
</svg>