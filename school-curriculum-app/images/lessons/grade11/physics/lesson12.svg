<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Фон -->
  <rect width="500" height="350" fill="#1a1a2e"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a4e69" stroke-width="2" rx="5"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#16213e" stroke-width="1" rx="3"/>
  
  <!-- Заголовок -->
  <text x="250" y="40" text-anchor="middle" fill="#f5f5f5" font-size="24" font-family="Arial, sans-serif" font-weight="bold">Колебательный контур</text>
  
  <!-- Контур провода -->
  <path d="M 100 150 L 100 100 L 150 100 L 150 120" fill="none" stroke="#e94560" stroke-width="3"/>
  <path d="M 150 120 L 150 180 L 100 180 L 100 200" fill="none" stroke="#e94560" stroke-width="3"/>
  <path d="M 100 200 L 100 250 L 150 250 L 150 230" fill="none" stroke="#e94560" stroke-width="3"/>
  <path d="M 150 230 L 150 200 L 200 200 L 200 180" fill="none" stroke="#e94560" stroke-width="3"/>
  <path d="M 200 180 L 200 170 L 300 170 L 300 180" fill="none" stroke="#e94560" stroke-width="3"/>
  <path d="M 300 180 L 300 190 L 400 190 L 400 200" fill="none" stroke="#e94560" stroke-width="3"/>
  <path d="M 400 200 L 400 220 L 350 220 L 350 230" fill="none" stroke="#e94560" stroke-width="3"/>
  <path d="M 350 230 L 350 250 L 400 250 L 400 200" fill="none" stroke="#e94560" stroke-width="3"/>
  
  <!-- Катушка индуктивности (L) -->
  <g id="inductance">
    <path d="M 150 120 Q 160 110, 170 120 T 190 120 T 210 120 T 230 120 T 250 120 T 270 120 T 290 120 T 300 120" 
          fill="none" stroke="#0f4c75" stroke-width="4"/>
    <path d="M 150 180 Q 160 170, 170 180 T 190 180 T 210 180 T 230 180 T 250 180 T 270 180 T 290 180 T 300 180" 
          fill="none" stroke="#0f4c75" stroke-width="4"/>
    <text x="225" y="150" text-anchor="middle" fill="#f5f5f5" font-size="20" font-weight="bold">L</text>
  </g>
  
  <!-- Конденсатор (C) -->
  <g id="capacitor">
    <line x1="390" y1="210" x2="390" y2="190" stroke="#0f4c75" stroke-width="6"/>
    <line x1="410" y1="210" x2="410" y2="190" stroke="#0f4c75" stroke-width="6"/>
    <text x="400" y="230" text-anchor="middle" fill="#f5f5f5" font-size="20" font-weight="bold">C</text>
  </g>
  
  <!-- Направления тока -->
  <g id="current-arrows">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/>
      </marker>
    </defs>
    
    <path d="M 120 110 L 140 110" fill="none" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M 120 190 L 140 190" fill="none" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M 250 175 L 270 175" fill="none" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <path d="M 320 185 L 340 185" fill="none" stroke="#ff6b6b" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="125" y="105" fill="#ff6b6b" font-size="14">i</text>
  </g>
  
  <!-- Энергия в контуре -->
  <g id="energy">
    <text x="100" y="280" fill="#f5f5f5" font-size="16">Энергия в контуре:</text>
    <text x="100" y="300" fill="#f5f5f5" font-size="14">W_L = ½LI²  (магнитная)</text>
    <text x="100" y="320" fill="#f5f5f5" font-size="14">W_C = ½CU²  (электрическая)</text>
  </g>
  
  <!-- Период колебаний -->
  <g id="period">
    <rect x="300" y="260" width="180" height="60" fill="none" stroke="#4a4e69" stroke-width="1" rx="5"/>
    <text x="390" y="285" text-anchor="middle" fill="#f5f5f5" font-size="16">Период колебаний:</text>
    <text x="390" y="305" text-anchor="middle" fill="#ffd93d" font-size="18" font-weight="bold">T = 2π√(LC)</text>
  </g>
  
  <!-- Частота колебаний -->
  <g id="frequency">
    <text x="220" y="280" fill="#f5f5f5" font-size="16">Частота:</text>
    <text x="220" y="300" fill="#ffd93d" font-size="16" font-weight="bold">f = 1/(2π√(LC))</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="50" cy="50" r="3" fill="#4a4e69" opacity="0.5"/>
  <circle cx="450" cy="50" r="3" fill="#4a4e69" opacity="0.5"/>
  <circle cx="50" cy="300" r="3" fill="#4a4e69" opacity="0.5"/>
  <circle cx="450" cy="300" r="3" fill="#4a4e69" opacity="0.5"/>
  
  <!-- Вспомогательная сетка -->
  <g opacity="0.1">
    <line x1="0" y1="100" x2="500" y2="100" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="500" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="500" y2="300" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="350" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="350" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="350" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="350" stroke="#ffffff" stroke-width="0.5"/>
  </g>
</svg>