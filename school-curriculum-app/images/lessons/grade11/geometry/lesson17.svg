<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5CB85C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449D44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0AD4E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC971F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#333" stroke-width="2" rx="5"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#666" stroke-width="1" rx="3"/>
  
  <!-- Заголовок урока -->
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">Урок 17: Объёмы призмы и пирамиды</text>
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока в углу -->
  <text x="480" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#999">Урок №17</text>
  
  <!-- Призма слева -->
  <g transform="translate(80, 80)">
    <polygon points="0,60 40,0 120,0 160,60" fill="url(#blueGrad)" stroke="#333" stroke-width="1.5"/>
    <polygon points="0,60 40,0 40,120 0,180" fill="#4A90E2" stroke="#333" stroke-width="1.5"/>
    <polygon points="40,0 120,0 120,120 40,120" fill="#6BB6FF" stroke="#333" stroke-width="1.5"/>
    <polygon points="0,180 40,120 120,120 160,180" fill="#357ABD" stroke="#333" stroke-width="1.5"/>
    <polygon points="160,60 120,0 120,120 160,180" fill="#357ABD" stroke="#333" stroke-width="1.5"/>
    
    <!-- Основание призмы -->
    <rect x="0" y="180" width="160" height="2" fill="#333"/>
    
    <!-- Подпись призмы -->
    <text x="80" y="210" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">Прямая призма</text>
    
    <!-- Размеры призмы -->
    <line x1="40" y1="-10" x2="40" y2="-5" stroke="#333" stroke-width="1"/>
    <line x1="120" y1="-10" x2="120" y2="-5" stroke="#333" stroke-width="1"/>
    <text x="80" y="-15" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">a</text>
    
    <line x1="-10" y1="60" x2="-5" y2="60" stroke="#333" stroke-width="1"/>
    <line x1="-10" y1="180" x2="-5" y2="180" stroke="#333" stroke-width="1"/>
    <text x="-20" y="120" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333" transform="rotate(-90, -20, 120)">h</text>
    
    <line x1="40" y1="125" x2="40" y2="130" stroke="#333" stroke-width="1"/>
    <line x1="120" y1="125" x2="120" y2="130" stroke="#333" stroke-width="1"/>
    <text x="80" y="140" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">b</text>
  </g>
  
  <!-- Пирамида справа -->
  <g transform="translate(280, 80)">
    <polygon points="80,0 20,120 140,120" fill="url(#greenGrad)" stroke="#333" stroke-width="1.5"/>
    <polygon points="80,0 0,180 160,180" fill="#5CB85C" stroke="#333" stroke-width="1.5"/>
    <polygon points="20,120 0,180 160,180 140,120" fill="#449D44" stroke="#333" stroke-width="1.5"/>
    
    <!-- Основание пирамиды -->
    <rect x="0" y="180" width="160" height="2" fill="#333"/>
    
    <!-- Подпись пирамиды -->
    <text x="80" y="210" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#333">Пирамида</text>
    
    <!-- Размеры пирамиды -->
    <line x1="20" y1="125" x2="20" y2="130" stroke="#333" stroke-width="1"/>
    <line x1="140" y1="125" x2="140" y2="130" stroke="#333" stroke-width="1"/>
    <text x="80" y="140" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">a</text>
    
    <line x1="-10" y1="60" x2="-5" y2="60" stroke="#333" stroke-width="1"/>
    <line x1="-10" y1="180" x2="-5" y2="180" stroke="#333" stroke-width="1"/>
    <text x="-20" y="120" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333" transform="rotate(-90, -20, 120)">h</text>
  </g>
  
  <!-- Формулы -->
  <rect x="30" y="250" width="440" height="80" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="5"/>
  
  <text x="60" y="275" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333">Формулы:</text>
  
  <text x="60" y="300" font-family="Arial, sans-serif" font-size="14" fill="#333">V<sub>призмы</sub> = S<sub>осн</sub> · h</text>
  <text x="280" y="300" font-family="Arial, sans-serif" font-size="14" fill="#333">V<sub>пирамиды</sub> = (1/3) · S<sub>осн</sub> · h</text>
  
  <text x="60" y="320" font-family="Arial, sans-serif" font-size="12" fill="#666">S<sub>осн</sub> - площадь основания</text>
  <text x="280" y="320" font-family="Arial, sans-serif" font-size="12" fill="#666">h - высота</text>
  
  <!-- График соотношения объемов -->
  <g transform="translate(150, 250)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="60" stroke="#333" stroke-width="1"/>
    
    <text x="100" y="-5" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Высота (h)</text>
    <text x="-10" y="30" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333" transform="rotate(-90, -10, 30)">Объем (V)</text>
    
    <polyline points="0,50 50,40 100,30 150,20 200,10" fill="none" stroke="url(#orangeGrad)" stroke-width="2"/>
    <text x="200" y="15" font-family="Arial, sans-serif" font-size="10" fill="#333">Призма</text>
    
    <polyline points="0,50 50,45 100,40 150,35 200,30" fill="none" stroke="#E74C3C" stroke-width="2"/>
    <text x="200" y="35" font-family="Arial, sans-serif" font-size="10" fill="#333">Пирамида</text>
    
    <!-- Шкала -->
    <text x="-5" y="55" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#666">0</text>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#666">0</text>
  </g>
  
  <!-- Доказательство -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="180" height="30" fill="#F0F0F0" stroke="#999" stroke-width="1" rx="3"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Доказательство формулы</text>
  </g>
  
  <!-- Задачи -->
  <g transform="translate(290, 60)">
    <rect x="0" y="0" width="180" height="30" fill="#F0F0F0" stroke="#999" stroke-width="1" rx="3"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Примеры задач</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="250" cy="30" r="3" fill="#4A90E2"/>
  <circle cx="245" cy="30" r="2" fill="#5CB85C"/>
  <circle cx="255" cy="30" r="2" fill="#F0AD4E"/>
  
  <!-- Ссылки на формулы -->
  <line x1="100" y1="250" x2="60" y2="285" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="380" y1="250" x2="340" y2="285" stroke="#999" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- Аннотации -->
  <text x="240" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666" transform="rotate(-90, 240, 140)">Высота фигуры</text>
  <text x="240" y="200" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Объем призмы в 3 раза больше пирамиды с тем же основанием и высотой</text>
</svg>