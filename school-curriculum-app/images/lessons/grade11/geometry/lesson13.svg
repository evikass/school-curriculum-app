<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="sphereGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6fa8dc;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#4d85bd;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3d6fa5;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="ballGradient">
      <stop offset="0%" style="stop-color:#e8f0fe;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#c5d9f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6fa8dc;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d5a6bd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4c7d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#8b4c7d" stroke-width="2" rx="5" />
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#d5a6bd" stroke-width="1" rx="3" />
  
  <!-- Надписи класса и урока -->
  <text x="25" y="30" font-family="Arial, sans-serif" font-size="11" fill="#666">ГЕОГРАФИЯ · 11 КЛАСС</text>
  <text x="470" y="30" font-family="Arial, sans-serif" font-size="12" fill="#8b4c7d" text-anchor="end">Урок 13</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#3d6fa5" text-anchor="middle">Сфера и шар</text>
  
  <!-- Основная сфера -->
  <circle cx="150" cy="180" r="80" fill="url(#sphereGradient)" stroke="#3d6fa5" stroke-width="2" />
  <ellipse cx="150" cy="180" rx="80" ry="20" fill="none" stroke="#3d6fa5" stroke-width="1" opacity="0.5" />
  
  <!-- Радиус сферы -->
  <line x1="150" y1="180" x2="230" y2="180" stroke="#8b4c7d" stroke-width="2" />
  <text x="190" y="175" font-family="Arial, sans-serif" font-size="14" fill="#8b4c7d">R</text>
  
  <!-- Сечение сферы - круг -->
  <ellipse cx="380" cy="120" rx="40" ry="40" fill="none" stroke="#d5a6bd" stroke-width="2" />
  <text x="380" y="175" font-family="Arial, sans-serif" font-size="14" fill="#8b4c7d" text-anchor="middle">Сечение</text>
  <text x="380" y="190" font-family="Arial, sans-serif" font-size="12" fill="#8b4c7d" text-anchor="middle">круг</text>
  
  <!-- Формулы -->
  <rect x="300" y="210" width="180" height="110" fill="#f5f5f5" stroke="#d5a6bd" stroke-width="1" rx="5" />
  
  <text x="310" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3d6fa5">Формулы:</text>
  <text x="310" y="250" font-family="Arial, sans-serif" font-size="12" fill="#333">Уравнение: (x-a)² + (y-b)² + (z-c)² = R²</text>
  <text x="310" y="270" font-family="Arial, sans-serif" font-size="12" fill="#333">Площадь поверхности: S = 4πR²</text>
  <text x="310" y="290" font-family="Arial, sans-serif" font-size="12" fill="#333">Объем: V = (4/3)πR³</text>
  
  <!-- Сектор сферы -->
  <path d="M 150 100 A 80 80 0 0 1 200 140 L 150 180 Z" fill="url(#ballGradient)" stroke="#3d6fa5" stroke-width="1" />
  <text x="160" y="155" font-family="Arial, sans-serif" font-size="11" fill="#333">сектор</text>
  
  <!-- Круговые параллели -->
  <ellipse cx="150" cy="180" rx="80" ry="15" fill="none" stroke="#3d6fa5" stroke-width="1" stroke-dasharray="5,3" opacity="0.7" />
  <ellipse cx="150" cy="180" rx="60" ry="11" fill="none" stroke="#3d6fa5" stroke-width="1" stroke-dasharray="5,3" opacity="0.7" />
  <ellipse cx="150" cy="180" rx="40" ry="7" fill="none" stroke="#3d6fa5" stroke-width="1" stroke-dasharray="5,3" opacity="0.7" />
  
  <!-- Меридианы -->
  <path d="M 150 100 A 80 80 0 0 1 230 180" fill="none" stroke="#3d6fa5" stroke-width="1" opacity="0.7" />
  <path d="M 150 100 A 80 80 0 0 0 70 180" fill="none" stroke="#3d6fa5" stroke-width="1" opacity="0.7" />
  
  <!-- Определения -->
  <rect x="20" y="230" width="160" height="90" fill="#f5f5f5" stroke="#d5a6bd" stroke-width="1" rx="5" />
  <text x="30" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3d6fa5">Определения:</text>
  <text x="30" y="270" font-family="Arial, sans-serif" font-size="11" fill="#333">Сфера - множество точек</text>
  <text x="30" y="285" font-family="Arial, sans-serif" font-size="11" fill="#333">в пространстве, равноудаленных</text>
  <text x="30" y="300" font-family="Arial, sans-serif" font-size="11" fill="#333">от центра</text>
  <text x="30" y="315" font-family="Arial, sans-serif" font-size="11" fill="#333">Шар - тело, ограниченное сферой</text>
  
  <!-- Точка центра -->
  <circle cx="150" cy="180" r="3" fill="#8b4c7d" />
  <text x="155" y="185" font-family="Arial, sans-serif" font-size="12" fill="#8b4c7d">O</text>
  
  <!-- Сфера с разрезом -->
  <path d="M 300 180 A 50 50 0 0 1 350 180 A 50 50 0 0 1 300 130 A 50 50 0 0 1 250 180 A 50 50 0 0 1 300 180 Z" fill="url(#sphereGradient)" stroke="#3d6fa5" stroke-width="2" />
  <path d="M 300 180 A 50 50 0 0 0 350 180 A 50 50 0 0 0 300 230 A 50 50 0 0 0 250 180 A 50 50 0 0 0 300 180 Z" fill="#e8f0fe" stroke="#3d6fa5" stroke-width="2" />
  
  <line x1="300" y1="130" x2="300" y2="230" stroke="#8b4c7d" stroke-width="1" stroke-dasharray="3,3" />
  <text x="305" y="180" font-family="Arial, sans-serif" font-size="12" fill="#8b4c7d">R</text>
  <text x="300" y="245" font-family="Arial, sans-serif" font-size="11" fill="#8b4c7d" text-anchor="middle">разрез</text>
  
  <!-- Географические параллели и меридианы на сфере -->
  <path d="M 250 180 A 50 50 0 0 1 300 130" fill="none" stroke="#d5a6bd" stroke-width="1" stroke-dasharray="2,2" />
  <path d="M 250 180 A 50 50 0 0 1 300 230" fill="none" stroke="#d5a6bd" stroke-width="1" stroke-dasharray="2,2" />
  
  <!-- Дополнительные метки -->
  <text x="250" y="275" font-family="Arial, sans-serif" font-size="11" fill="#8b4c7d">Экватор</text>
  <text x="335" y="180" font-family="Arial, sans-serif" font-size="11" fill="#8b4c7d">90°</text>
  <text x="265" y="180" font-family="Arial, sans-serif" font-size="11" fill="#8b4c7d">90°</text>
  
  <!-- Угол сектора -->
  <path d="M 150 180 L 200 140 A 80 80 0 0 1 180 120" fill="none" stroke="#8b4c7d" stroke-width="1" />
  <text x="185" y="150" font-family="Arial, sans-serif" font-size="11" fill="#8b4c7d">α</text>
  
  <!-- Дополнительные элементы для объема -->
  <rect x="20" y="50" width="180" height="60" fill="#f5f5f5" stroke="#d5a6bd" stroke-width="1" rx="5" />
  <text x="30" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#3d6fa5">Характеристики:</text>
  <text x="30" y="90" font-family="Arial, sans-serif" font-size="12" fill="#333">Диаметр: d = 2R</text>
  <text x="30" y="105" font-family="Arial, sans-serif" font-size="12" fill="#333">Длина окружности: C = 2πR</text>
  
  <!-- Дополнительная линия для визуализации -->
  <line x1="250" y1="210" x2="290" y2="250" stroke="url(#lineGradient)" stroke-width="1" stroke-dasharray="3,3" />
  <line x1="290" y1="250" x2="300" y2="260" stroke="url(#lineGradient)" stroke-width="1" />
  
  <!-- Точки на сфере -->
  <circle cx="150" cy="100" r="2" fill="#8b4c7d" />
  <circle cx="230" cy="180" r="2" fill="#8b4c7d" />
  <circle cx="150" cy="260" r="2" fill="#8b4c7d" />
  <circle cx="70" cy="180" r="2" fill="#8b4c7d" />
  
  <!-- Дополнительная подпись -->
  <text x="40" y="330" font-family="Arial, sans-serif" font-size="10" fill="#666">Математическая модель Земли</text>
</svg>