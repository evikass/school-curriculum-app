<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4d4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cc0000;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="portraitGrad">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6239;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#333" stroke-width="2" />
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="5,3" />
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#333">Урок 11: Л.Н. Андреев</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">Жизнь и творчество</text>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <circle cx="470" cy="30" r="15" fill="#333" />
  <text x="470" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white">11</text>
  
  <!-- Портрет Андреева -->
  <g transform="translate(40, 90)">
    <circle cx="40" cy="40" r="35" fill="url(#portraitGrad)" />
    <circle cx="40" cy="40" r="35" fill="none" stroke="#333" stroke-width="1" />
    <!-- Черты лица -->
    <ellipse cx="40" cy="40" rx="28" ry="30" fill="#d4a574" />
    <ellipse cx="32" cy="35" rx="4" ry="6" fill="#333" />
    <ellipse cx="48" cy="35" rx="4" ry="6" fill="#333" />
    <path d="M35,45 Q40,50 45,45" fill="none" stroke="#333" stroke-width="2" />
    <ellipse cx="40" cy="55" rx="8" ry="4" fill="#d4a574" />
    <!-- Волосы -->
    <path d="M15,25 Q10,15 15,10 Q20,5 25,8 Q30,3 35,5 Q40,0 45,5 Q50,3 55,8 Q60,5 65,10 Q70,15 65,25" fill="#333" />
    <!-- Усы -->
    <path d="M30,40 Q35,42 40,40" fill="none" stroke="#333" stroke-width="1" />
    <path d="M40,40 Q45,42 50,40" fill="none" stroke="#333" stroke-width="1" />
  </g>
  <text x="80" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#333">Леонид Андреев</text>
  <text x="80" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">1871-1919</text>
  
  <!-- Биография -->
  <g transform="translate(130, 90)">
    <rect x="0" y="0" width="150" height="140" fill="white" stroke="#333" stroke-width="1" rx="5" />
    <text x="75" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Биография</text>
    <line x1="10" y1="25" x2="140" y2="25" stroke="#ddd" stroke-width="1" />
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="11" fill="#333">1871 -出生于奥廖尔</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="11" fill="#333">1894 - 开始写作</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="11" fill="#333">1898 - 发表《巴尔加莫特的梦》</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#333">1906 - 移居芬兰</text>
    <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#333">1908 - 《红色笑声》</text>
    <text x="10" y="115" font-family="Arial, sans-serif" font-size="11" fill="#333">1919 - 逝世于芬兰</text>
  </g>
  
  <!-- Экспрессионизм -->
  <g transform="translate(300, 90)">
    <rect x="0" y="0" width="170" height="140" fill="#fff9f0" stroke="#333" stroke-width="1" rx="5" />
    <text x="85" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">Экспрессионизм</text>
    <line x1="10" y1="25" x2="160" y2="25" stroke="#ddd" stroke-width="1" />
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="11" fill="#333">• Крайние эмоции</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="11" fill="#333">• Искажение реальности</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="11" fill="#333">• Психологизм</text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="11" fill="#333">• Трагическое мироощущение</text>
    <text x="10" y="100" font-family="Arial, sans-serif" font-size="11" fill="#333">• Философские вопросы</text>
    <text x="10" y="115" font-family="Arial, sans-serif" font-size="11" fill="#333">• Символика и метафоры</text>
  </g>
  
  <!-- Жизнь Василия Фивейского -->
  <g transform="translate(40, 250)">
    <rect x="0" y="0" width="180" height="80" fill="#e6f7ff" stroke="#1890ff" stroke-width="1" rx="5" />
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1890ff">«Жизнь Василия Фивейского»</text>
    <line x1="10" y1="25" x2="170" y2="25" stroke="#91d5ff" stroke-width="1" />
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="11" fill="#333">• 1906 г.</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="11" fill="#333">• Трагедия священника</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="11" fill="#333">• Борьба с верой</text>
  </g>
  
  <!-- Красный смех -->
  <g transform="translate(240, 250)">
    <rect x="0" y="0" width="180" height="80" fill="#fff0f6" stroke="#eb2f96" stroke-width="1" rx="5" />
    <text x="90" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#eb2f96">«Красный смех»</text>
    <line x1="10" y1="25" x2="170" y2="25" stroke="#ffd6e7" stroke-width="1" />
    
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="11" fill="#333">• 1908 г.</text>
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="11" fill="#333">• Сборник рассказов</text>
    <text x="10" y="70" font-family="Arial, sans-serif" font-size="11" fill="#333">• Символ революции</text>
  </g>
  
  <!-- Декоративный элемент - смех -->
  <g transform="translate(430, 260)">
    <path d="M0,0 Q5,-5 10,0 Q15,-5 20,0 Q25,-5 30,0" fill="none" stroke="url(#redGrad)" stroke-width="2" />
    <path d="M5,5 Q10,0 15,5 Q20,0 25,5" fill="none" stroke="url(#redGrad)" stroke-width="2" />
    <circle cx="10" cy="10" r="2" fill="url(#redGrad)" />
    <circle cx="20" cy="10" r="2" fill="url(#redGrad)" />
  </g>
  
  <!-- Хронология -->
  <g transform="translate(30, 100)">
    <line x1="0" y1="220" x2="440" y2="220" stroke="#333" stroke-width="1" />
    <line x1="0" y1="215" x2="0" y2="225" stroke="#333" stroke-width="2" />
    <line x1="100" y1="215" x2="100" y2="225" stroke="#333" stroke-width="2" />
    <line x1="200" y1="215" x2="200" y2="225" stroke="#333" stroke-width="2" />
    <line x1="300" y1="215" x2="300" y2="225" stroke="#333" stroke-width="2" />
    <line x1="400" y1="215" x2="400" y2="225" stroke="#333" stroke-width="2" />
    
    <text x="0" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1871</text>
    <text x="100" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1898</text>
    <text x="200" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1906</text>
    <text x="300" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1908</text>
    <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">1919</text>
  </g>
  
  <!-- Даты ключевых событий -->
  <text x="0" y="215" font-family="Arial, sans-serif" font-size="9" fill="#666">Рождение</text>
  <text x="100" y="215" font-family="Arial, sans-serif" font-size="9" fill="#666">Дебют</text>
  <text x="200" y="215" font-family="Arial, sans-serif" font-size="9" fill="#666">«Фивейский»</text>
  <text x="300" y="215" font-family="Arial, sans-serif" font-size="9" fill="#666">«Красный смех»</text>
  <text x="400" y="215" font-family="Arial, sans-serif" font-size="9" fill="#666">Смерть</text>
  
  <!-- Ключевые цитаты -->
  <g transform="translate(240, 90)">
    <rect x="0" y="0" width="170" height="140" fill="#f0f5ff" stroke="#2f54eb" stroke-width="1" rx="5" />
    <text x="85" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2f54eb">Ключевые темы</text>
    <line x1="10" y1="25" x2="160" y2="25" stroke="#adc6ff" stroke-width="1" />
    
    <text x="10" y="45" font-family="Arial, sans-serif" font-size="11" fill="#333">• Бессилие человека</text>
    <text x="10" y="60" font-family="Arial, sans-serif" font-size="11" fill="#333">• Поиск смысла жизни</text>
    <text x="10" y="75" font-family="Arial, sans-serif" font-size="11" fill="#333">• Страх и одиночество</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="11" fill="#333">• Боль и страдание</text>
    <text x="10" y="105" font-family="Arial, sans-serif" font-size="11" fill="#333">• Смерть и загробная жизнь</text>
    <text x="10" y="120" font-family="Arial, sans-serif" font-size="11" fill="#333">• Социальная несправедливость</text>
  </g>
</svg>