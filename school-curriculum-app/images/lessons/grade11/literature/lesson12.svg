<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#8B4513" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#8B4513" stroke-width="1"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#8B0000">ЛИТЕРАТУРА · 11 КЛАСС</text>
  <text x="250" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2F4F4F">Урок 12: М.А. Булгаков</text>
  <text x="250" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#2F4F4F">Жизнь и творчество</text>
  
  <!-- Номер урока -->
  <text x="30" y="340" font-family="Arial, sans-serif" font-size="12" fill="#8B4513">№12</text>
  
  <!-- Портрет Булгакова -->
  <g transform="translate(40, 90)">
    <circle cx="40" cy="40" r="35" fill="#F5DEB3" stroke="#8B4513" stroke-width="1"/>
    <circle cx="40" cy="35" r="15" fill="#8B4513"/>
    <circle cx="32" cy="32" r="2" fill="#000"/>
    <circle cx="48" cy="32" r="2" fill="#000"/>
    <path d="M 30 42 Q 40 48 50 42" fill="none" stroke="#000" stroke-width="1"/>
    <text x="40" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#8B4513">М.А. Булгаков</text>
  </g>
  
  <!-- Биография -->
  <g transform="translate(100, 90)">
    <rect x="0" y="0" width="120" height="80" fill="#FFF8DC" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="60" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B4513">Биография</text>
    <text x="60" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">1891-1940</text>
    <text x="60" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">Киевский</text>
    <text x="60" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">медицинский</text>
    <text x="60" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">институт</text>
  </g>
  
  <!-- Белая гвардия -->
  <g transform="translate(240, 90)">
    <rect x="0" y="0" width="120" height="80" fill="#F0E68C" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="60" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B4513">«Белая гвардия»</text>
    <text x="60" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">1925</text>
    <text x="60" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">Роман о</text>
    <text x="60" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">белом движении</text>
    <text x="60" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">в Киеве</text>
  </g>
  
  <!-- Собачье сердце -->
  <g transform="translate(370, 90)">
    <rect x="0" y="0" width="110" height="80" fill="#E6E6FA" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="55" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B4513">«Собачье сердце»</text>
    <text x="55" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">1925</text>
    <text x="55" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">Сатирический</text>
    <text x="55" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">роман</text>
    <text x="55" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">о революции</text>
  </g>
  
  <!-- Мастер и Маргарита -->
  <g transform="translate(100, 190)">
    <rect x="0" y="0" width="380" height="120" fill="#F5F5DC" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="190" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#8B4513">«Мастер и Маргарита»</text>
    <text x="190" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2F4F4F">1967 (опубликован посмертно)</text>
    
    <!-- Диаграмма -->
    <circle cx="80" cy="70" r="20" fill="#8B4513"/>
    <text x="80" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFF">Мастер</text>
    
    <circle cx="160" cy="70" r="20" fill="#DC143C"/>
    <text x="160" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFF">Маргарита</text>
    
    <circle cx="240" cy="70" r="20" fill="#4B0082"/>
    <text x="240" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFF">Воланд</text>
    
    <circle cx="320" cy="70" r="20" fill="#228B22"/>
    <text x="320" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFF">Понтий</text>
    
    <!-- Связи -->
    <line x1="100" y1="70" x2="140" y2="70" stroke="#8B4513" stroke-width="2"/>
    <line x1="180" y1="70" x2="220" y2="70" stroke="#8B4513" stroke-width="2"/>
    <line x1="260" y1="70" x2="300" y2="70" stroke="#8B4513" stroke-width="2"/>
    
    <text x="190" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2F4F4F">Философско-бытовая притча о любви и творчестве</text>
  </g>
  
  <!-- Хронология -->
  <g transform="translate(40, 190)">
    <rect x="0" y="0" width="50" height="120" fill="#FFE4B5" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="25" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B4513">Хронология</text>
    <text x="25" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2F4F4F">1891</text>
    <text x="25" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2F4F4F">рождение</text>
    <text x="25" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2F4F4F">1925</text>
    <text x="25" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2F4F4F">«Белая</text>
    <text x="25" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2F4F4F">гвардия»</text>
  </g>
  
  <!-- Декоративные элементы -->
  <path d="M 50 120 Q 60 125 70 120" fill="none" stroke="#8B4513" stroke-width="1"/>
  <path d="M 220 120 Q 230 125 240 120" fill="none" stroke="#8B4513" stroke-width="1"/>
  <path d="M 350 120 Q 360 125 370 120" fill="none" stroke="#8B4513" stroke-width="1"/>
  
  <!-- Ключевые термины -->
  <g transform="translate(40, 320)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Символизм</text>
    <text x="70" y="0" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Фантастика</text>
    <text x="140" y="0" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Сатира</text>
    <text x="210" y="0" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Метафизика</text>
    <text x="280" y="0" font-family="Arial, sans-serif" font-size="9" fill="#8B4513">Постмодернизм</text>
  </g>
  
  <!-- График творчества -->
  <g transform="translate(300, 190)">
    <rect x="0" y="0" width="60" height="120" fill="#E0FFFF" stroke="#8B4513" stroke-width="1" rx="5"/>
    <text x="30" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#8B4513">Творчество</text>
    
    <!-- Простая гистограмма -->
    <rect x="10" y="80" width="10" height="20" fill="#4682B4"/>
    <text x="15" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2F4F4F">1920</text>
    
    <rect x="25" y="60" width="10" height="40" fill="#4682B4"/>
    <text x="30" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2F4F4F">1930</text>
    
    <rect x="40" y="40" width="10" height="60" fill="#4682B4"/>
    <text x="45" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#2F4F4F">1930-е</text>
  </g>
</svg>