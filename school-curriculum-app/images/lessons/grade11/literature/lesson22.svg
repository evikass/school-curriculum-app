<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#34495e" stroke-width="1" stroke-dasharray="5,3"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#2c3e50">ЛИТЕРАТУРА · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">Урок 22: Литература о Великой Отечественной войне. Проза</text>
  <text x="470" y="330" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#7f8c8d">22</text>
  
  <!-- Фон -->
  <rect x="20" y="70" width="460" height="250" fill="#ecf0f1" opacity="0.5"/>
  
  <!-- Портреты писателей -->
  <!-- Шолохов -->
  <circle cx="80" cy="120" r="30" fill="#e74c3c"/>
  <circle cx="80" cy="105" r="15" fill="#f39c12"/>
  <path d="M65 115 Q80 125 95 115 L95 130 L65 130 Z" fill="#f39c12"/>
  <text x="80" y="155" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">М. Шолохов</text>
  
  <!-- Васильев -->
  <circle cx="180" cy="120" r="30" fill="#3498db"/>
  <circle cx="180" cy="105" r="15" fill="#2980b9"/>
  <path d="M165 115 Q180 125 195 115 L195 130 L165 130 Z" fill="#2980b9"/>
  <text x="180" y="155" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">Б. Васильев</text>
  
  <!-- Быков -->
  <circle cx="280" cy="120" r="30" fill="#27ae60"/>
  <circle cx="280" cy="105" r="15" fill="#229954"/>
  <path d="M265 115 Q280 125 295 115 L295 130 L265 130 Z" fill="#229954"/>
  <text x="280" y="155" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c3e50">В. Быков</text>
  
  <!-- Книги -->
  <!-- Книга Шолохова -->
  <rect x="50" y="180" width="60" height="40" fill="#e74c3c" rx="2"/>
  <rect x="55" y="185" width="50" height="30" fill="#ecf0f1"/>
  <text x="80" y="203" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Судьба</text>
  <text x="80" y="213" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">человека</text>
  
  <!-- Книга Васильева -->
  <rect x="150" y="180" width="60" height="40" fill="#3498db" rx="2"/>
  <rect x="155" y="185" width="50" height="30" fill="#ecf0f1"/>
  <text x="180" y="203" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">А зори</text>
  <text x="180" y="213" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">тихие</text>
  
  <!-- Книга Быкова -->
  <rect x="250" y="180" width="60" height="40" fill="#27ae60" rx="2"/>
  <rect x="255" y="185" width="50" height="30" fill="#ecf0f1"/>
  <text x="280" y="203" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Сотников</text>
  <text x="280" y="213" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Облако</text>
  
  <!-- Градиент для диаграммы -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Диаграмма тем -->
  <rect x="350" y="90" width="100" height="30" fill="url(#grad1)" rx="5"/>
  <text x="400" y="109" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Человек на войне</text>
  
  <rect x="350" y="125" width="100" height="30" fill="url(#grad2)" rx="5"/>
  <text x="400" y="144" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Героизм</text>
  
  <rect x="350" y="160" width="100" height="30" fill="url(#grad3)" rx="5"/>
  <text x="400" y="179" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Трагедия</text>
  
  <!-- Даты -->
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">1956-1957</text>
  <text x="180" y="240" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">1969</text>
  <text x="280" y="240" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">1960-1970-е</text>
  
  <!-- Хронология войны -->
  <line x1="50" y1="260" x2="450" y2="260" stroke="#95a5a6" stroke-width="2"/>
  <circle cx="100" cy="260" r="5" fill="#e74c3c"/>
  <circle cx="200" cy="260" r="5" fill="#3498db"/>
  <circle cx="300" cy="260" r="5" fill="#27ae60"/>
  
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">1941</text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">1943</text>
  <text x="300" y="280" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c3e50">1945</text>
  
  <!-- Ключевые термины -->
  <text x="50" y="300" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50">Темы:</text>
  <text x="90" y="300" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">человечность</text>
  <text x="160" y="300" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">жертвенность</text>
  <text x="230" y="300" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">моральный выбор</text>
  <text x="330" y="300" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">патриотизм</text>
  
  <!-- Статистика -->
  <rect x="350" y="200" width="100" height="80" fill="white" stroke="#95a5a6" stroke-width="1"/>
  <text x="400" y="220" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c3e50">Статистика</text>
  <text x="400" y="235" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">27 млн</text>
  <text x="400" y="248" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">человек</text>
  <text x="400" y="265" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#7f8c8d">потери СССР</text>
  
  <!-- Указатели -->
  <path d="M80 150 L80 175" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowred)"/>
  <path d="M180 150 L180 175" stroke="#3498db" stroke-width="2" marker-end="url(#arrowblue)"/>
  <path d="M280 150 L280 175" stroke="#27ae60" stroke-width="2" marker-end="url(#arrowgreen)"/>
  
  <!-- Стрелки -->
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L3,5 z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowblue" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L3,5 z" fill="#3498db"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L3,5 z" fill="#27ae60"/>
    </marker>
  </defs>
  
  <!-- Дополнительные элементы -->
  <rect x="30" y="85" width="3" height="3" fill="#e74c3c"/>
  <rect x="35" y="85" width="3" height="3" fill="#e74c3c"/>
  <rect x="40" y="85" width="3" height="3" fill="#e74c3c"/>
  
  <rect x="130" y="85" width="3" height="3" fill="#3498db"/>
  <rect x="135" y="85" width="3" height="3" fill="#3498db"/>
  <rect x="140" y="85" width="3" height="3" fill="#3498db"/>
  
  <rect x="230" y="85" width="3" height="3" fill="#27ae60"/>
  <rect x="235" y="85" width="3" height="3" fill="#27ae60"/>
  <rect x="240" y="85" width="3" height="3" fill="#27ae60"/>
  
  <!-- Линии связи -->
  <path d="M130 100 Q155 80 155 100" stroke="#95a5a6" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
  <path d="M230 100 Q255 80 255 100" stroke="#95a5a6" stroke-width="1" fill="none" stroke-dasharray="2,2"/>
</svg>