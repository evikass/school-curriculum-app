<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1e8ed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="portraitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c19660;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фоновый прямоугольник -->
  <rect x="0" y="0" width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="8" rx="5" />
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="url(#frameGrad)" stroke-width="2" rx="3" />
  
  <!-- Заголовок класса -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50" font-weight="bold">ЛИТЕРАТУРА · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <text x="460" y="35" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#2c3e50" font-weight="bold">Урок 20</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="60" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#2c3e50" font-weight="bold">А.Т. Твардовский. Поэзия и поэмы</text>
  
  <!-- Портрет Твардовского -->
  <circle cx="80" cy="140" r="35" fill="url(#portraitGrad)" />
  <circle cx="75" cy="130" r="3" fill="#654321" />
  <circle cx="85" cy="130" r="3" fill="#654321" />
  <path d="M70,145 Q80,155 90,145" fill="none" stroke="#654321" stroke-width="2" />
  <path d="M60,155 Q80,165 100,155" fill="none" stroke="#654321" stroke-width="2" />
  <text x="80" y="190" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c3e50" font-weight="bold">А.Т. Твардовский</text>
  <text x="80" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#555">1910-1971</text>
  
  <!-- Биография -->
  <rect x="130" y="100" width="150" height="100" fill="white" stroke="#8b4513" stroke-width="1" rx="5" />
  <text x="205" y="120" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50" font-weight="bold">Биография</text>
  <text x="135" y="140" font-family="Arial, sans-serif" font-size="10" fill="#555">• Род. в д. Прудзинки</text>
  <text x="135" y="155" font-family="Arial, sans-serif" font-size="10" fill="#555">• Редактор «Нового мира»</text>
  <text x="135" y="170" font-family="Arial, sans-serif" font-size="10" fill="#555">• Дважды Ленинская премия</text>
  <text x="135" y="185" font-family="Arial, sans-serif" font-size="10" fill="#555">• Герой Соц. Труда</text>
  
  <!-- Страна Муравия -->
  <rect x="290" y="100" width="150" height="100" fill="white" stroke="#8b4513" stroke-width="1" rx="5" />
  <text x="365" y="120" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50" font-weight="bold">Страна Муравия</text>
  <text x="295" y="140" font-family="Arial, sans-serif" font-size="10" fill="#555">• 1940-1945</text>
  <text x="295" y="155" font-family="Arial, sans-serif" font-size="10" fill="#555">• Критика коллективизации</text>
  <text x="295" y="170" font-family="Arial, sans-serif" font-size="10" fill="#555">• Быт крестьян</text>
  <text x="295" y="185" font-family="Arial, sans-serif" font-size="10" fill="#555">• Мировоззрение</text>
  
  <!-- Василий Тёркин -->
  <rect x="130" y="220" width="150" height="100" fill="white" stroke="#8b4513" stroke-width="1" rx="5" />
  <text x="205" y="240" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50" font-weight="bold">Василий Тёркин</text>
  <text x="135" y="260" font-family="Arial, sans-serif" font-size="10" fill="#555">• 1942-1945</text>
  <text x="135" y="275" font-family="Arial, sans-serif" font-size="10" fill="#555">• Солдат-герой</text>
  <text x="135" y="290" font-family="Arial, sans-serif" font-size="10" fill="#555">• Юмор и ирония</text>
  <text x="135" y="305" font-family="Arial, sans-serif" font-size="10" fill="#555">• Народный характер</text>
  
  <!-- По праву памяти -->
  <rect x="290" y="220" width="150" height="100" fill="white" stroke="#8b4513" stroke-width="1" rx="5" />
  <text x="365" y="240" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c3e50" font-weight="bold">По праву памяти</text>
  <text x="295" y="260" font-family="Arial, sans-serif" font-size="10" fill="#555">• 1970</text>
  <text x="295" y="275" font-family="Arial, sans-serif" font-size="10" fill="#555">• Автобиографичное</text>
  <text x="295" y="290" font-family="Arial, sans-serif" font-size="10" fill="#555">• Судьба поколения</text>
  <text x="295" y="305" font-family="Arial, sans-serif" font-size="10" fill="#555">• Личная рефлексия</text>
  
  <!-- Хронологическая линия -->
  <line x1="50" y1="340" x2="450" y2="340" stroke="#8b4513" stroke-width="2" />
  <circle cx="80" cy="340" r="4" fill="#8b4513" />
  <circle cx="180" cy="340" r="4" fill="#8b4513" />
  <circle cx="280" cy="340" r="4" fill="#8b4513" />
  <circle cx="380" cy="340" r="4" fill="#8b4513" />
  
  <text x="80" y="355" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">1910</text>
  <text x="180" y="355" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">1945</text>
  <text x="280" y="355" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">1950</text>
  <text x="380" y="355" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#555">1970</text>
  
  <!-- Декоративные элементы -->
  <path d="M30,60 L35,65 L40,60" fill="none" stroke="#8b4513" stroke-width="2" />
  <path d="M460,60 L465,65 L470,60" fill="none" stroke="#8b4513" stroke-width="2" />
  
  <!-- Ключевые цитаты -->
  <text x="250" y="85" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#8b4513" font-style="italic">"Я хочу, чтобы стихи были близки и понятны каждому"</text>
  
  <!-- Схема развития творчества -->
  <rect x="40" y="80" width="15" height="15" fill="#8b4513" opacity="0.7" />
  <text x="60" y="90" font-family="Arial, sans-serif" font-size="9" fill="#555">Раннее творчество</text>
  <rect x="40" y="95" width="15" height="15" fill="#d4a574" opacity="0.7" />
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="9" fill="#555">Военные годы</text>
  <rect x="40" y="110" width="15" height="15" fill="#654321" opacity="0.7" />
  <text x="60" y="120" font-family="Arial, sans-serif" font-size="9" fill="#555">Поздний период</text>
</svg>