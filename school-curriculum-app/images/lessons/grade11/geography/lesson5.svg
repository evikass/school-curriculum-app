<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Градиенты -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c4a7c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8b448;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d49a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5cb85c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#449d44;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#2c4a7c" stroke-width="3"/>
  <rect x="15" y="15" width="470" height="330" fill="none" stroke="#4a6fa5" stroke-width="1"/>
  
  <!-- Заголовок класса -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#2c4a7c" font-weight="bold">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Номер урока -->
  <rect x="420" y="25" width="50" height="25" fill="url(#grad2)" rx="5"/>
  <text x="445" y="42" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Урок 5</text>
  
  <!-- Заголовок урока -->
  <text x="250" y="70" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#2c4a7c" font-weight="bold">Этнический состав населения</text>
  
  <!-- Карта мира с континентами -->
  <rect x="40" y="90" width="420" height="220" fill="#e8f4f8" stroke="#4a6fa5" stroke-width="1"/>
  
  <!-- Африка -->
  <ellipse cx="200" cy="200" rx="35" ry="60" fill="#d49a2e" opacity="0.8"/>
  <text x="200" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Африка</text>
  
  <!-- Европа -->
  <ellipse cx="250" cy="150" rx="25" ry="30" fill="#4a6fa5" opacity="0.8"/>
  <text x="250" y="155" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Европа</text>
  
  <!-- Азия -->
  <ellipse cx="320" cy="170" rx="50" ry="50" fill="#2c4a7c" opacity="0.8"/>
  <text x="320" y="175" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Азия</text>
  
  <!-- Северная Америка -->
  <ellipse cx="120" cy="140" rx="35" ry="40" fill="#5cb85c" opacity="0.8"/>
  <text x="120" y="145" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Сев. Америка</text>
  
  <!-- Южная Америка -->
  <ellipse cx="140" cy="220" rx="25" ry="45" fill="#5cb85c" opacity="0.8"/>
  <text x="140" y="225" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Юж. Америка</text>
  
  <!-- Австралия -->
  <ellipse cx="380" cy="250" rx="30" ry="20" fill="#e8b448" opacity="0.8"/>
  <text x="380" y="255" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">Австралия</text>
  
  <!-- Диаграмма распределения народов -->
  <rect x="50" y="90" width="80" height="15" fill="#2c4a7c"/>
  <text x="90" y="102" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Индоевропейцы 45%</text>
  
  <rect x="50" y="107" width="70" height="15" fill="#d49a2e"/>
  <text x="85" y="119" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Китайцы 20%</text>
  
  <rect x="50" y="124" width="35" height="15" fill="#5cb85c"/>
  <text x="67.5" y="136" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Африканцы 10%</text>
  
  <rect x="50" y="141" width="30" height="15" fill="#e8b448"/>
  <text x="65" y="153" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Арабы 8%</text>
  
  <rect x="50" y="158" width="25" height="15" fill="#4a6fa5"/>
  <text x="62.5" y="170" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Другие 17%</text>
  
  <!-- Легенда карты -->
  <circle cx="380" cy="100" r="5" fill="#2c4a7c"/>
  <text x="390" y="103" font-family="Arial, sans-serif" font-size="9">Население >1 млрд</text>
  
  <circle cx="380" cy="115" r="5" fill="#4a6fa5"/>
  <text x="390" y="118" font-family="Arial, sans-serif" font-size="9">Население 500-1000 млн</text>
  
  <circle cx="380" cy="130" r="5" fill="#5cb85c"/>
  <text x="390" y="133" font-family="Arial, sans-serif" font-size="9">Население 100-500 млн</text>
  
  <!-- Ключевые термины -->
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#2c4a7c" font-weight="bold">Этнос · Этническая группа · Народ · Национальный состав</text>
  
  <!-- Схема миграции народов -->
  <path d="M 100,200 Q 150,180 200,200 T 300,200" stroke="#d49a2e" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <text x="200" y="195" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#d49a2e">Великая миграция</text>
  
  <!-- Древо языковых семей -->
  <line x1="350" y1="250" x2="350" y2="280" stroke="#2c4a7c" stroke-width="2"/>
  <line x1="320" y1="280" x2="380" y2="280" stroke="#2c4a7c" stroke-width="2"/>
  <line x1="330" y1="280" x2="330" y2="300" stroke="#2c4a7c" stroke-width="1"/>
  <line x1="370" y1="280" x2="370" y2="300" stroke="#2c4a7c" stroke-width="1"/>
  
  <text x="350" y="255" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c4a7c">Языковые семьи</text>
  <text x="330" y="315" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c4a7c">Индоевропейская</text>
  <text x="370" y="315" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c4a7c">Сино-тибетская</text>
  
  <!-- График роста населения -->
  <rect x="250" y="250" width="100" height="50" fill="none" stroke="#4a6fa5" stroke-width="1"/>
  <polyline points="260,290 270,280 280,270 290,265 300,260 310,255 320,250 330,248 340,245" stroke="#5cb85c" stroke-width="2" fill="none"/>
  <text x="300" y="310" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c4a7c">Рост населения</text>
  <text x="260" y="295" font-family="Arial, sans-serif" font-size="7" fill="#2c4a7c">1950</text>
  <text x="340" y="240" font-family="Arial, sans-serif" font-size="7" fill="#2c4a7c">2020</text>
  
  <!-- Этнические символы -->
  <circle cx="100" cy="250" r="15" fill="#4a6fa5"/>
  <text x="100" y="255" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">♂</text>
  
  <circle cx="130" cy="250" r="15" fill="#d49a2e"/>
  <text x="130" y="255" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">♀</text>
  
  <circle cx="160" cy="250" r="15" fill="#5cb85c"/>
  <text x="160" y="255" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white">◈</text>
  
  <!-- Указатель на диаграмму -->
  <line x1="140" y1="230" x2="90" y2="160" stroke="#2c4a7c" stroke-width="1" marker-end="url(#arrowhead)"/>
  
  <!-- Стрелка для указателя -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2c4a7c"/>
    </marker>
  </defs>
</svg>