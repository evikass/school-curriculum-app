<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a6fa5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c4a7c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5d8c3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d6b2d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="5" y="5" width="490" height="340" fill="none" stroke="#2c4a7c" stroke-width="2" rx="10"/>
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#4a6fa5" stroke-width="1" rx="5"/>
  
  <!-- Заголовок -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#2c4a7c" font-weight="bold">ГЕОГРАФИЯ · 11 КЛАСС</text>
  <text x="250" y="55" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c4a7c">Урок 12: Итоговое обобщение</text>
  <text x="45" y="25" font-family="Arial, sans-serif" font-size="12" text-anchor="start" fill="#4a6fa5" font-weight="bold">№12</text>
  
  <!-- Карта мира (упрощенная) -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="180" height="120" fill="url(#grad1)" rx="5"/>
    <path d="M30,40 Q50,30 70,35 T110,30 Q130,35 150,40 L140,60 Q120,65 100,60 T70,65 Q50,60 30,55 Z" fill="#5d8c3d" opacity="0.8"/>
    <path d="M40,70 Q60,65 80,70 T120,65 Q140,70 160,75 L150,90 Q130,95 110,90 T80,95 Q60,90 40,85 Z" fill="#5d8c3d" opacity="0.8"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="white" font-weight="bold">Карта мира</text>
    <text x="90" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">195 стран</text>
  </g>
  
  <!-- График населения -->
  <g transform="translate(250, 80)">
    <rect x="0" y="0" width="180" height="120" fill="#f0f0f0" rx="5" stroke="#2c4a7c"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c4a7c" font-weight="bold">Динамика населения</text>
    <polyline points="20,90 50,80 80,75 110,60 140,40 170,30" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <polyline points="20,90 50,85 80,80 110,70 140,65 170,55" fill="none" stroke="#3498db" stroke-width="2"/>
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="8" fill="#2c4a7c">1950</text>
    <text x="170" y="105" font-family="Arial, sans-serif" font-size="8" fill="#2c4a7c">2023</text>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="8" fill="#e74c3c">Азия</text>
    <text x="20" y="45" font-family="Arial, sans-serif" font-size="8" fill="#3498db">Африка</text>
  </g>
  
  <!-- Диаграмма экономики -->
  <g transform="translate(50, 220)">
    <rect x="0" y="0" width="180" height="100" fill="#f9f9f9" rx="5" stroke="#2c4a7c"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c4a7c" font-weight="bold">Структура ВВП</text>
    <rect x="30" y="30" width="40" height="50" fill="url(#grad2)"/>
    <rect x="75" y="45" width="40" height="35" fill="url(#grad1)"/>
    <rect x="120" y="55" width="40" height="25" fill="url(#grad3)"/>
    <text x="50" y="90" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c4a7c">Промышленность</text>
    <text x="95" y="90" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c4a7c">Сельское хоз-во</text>
    <text x="140" y="90" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="#2c4a7c">Услуги</text>
  </g>
  
  <!-- Формула плотности населения -->
  <g transform="translate(250, 220)">
    <rect x="0" y="0" width="180" height="100" fill="#f0f0f0" rx="5" stroke="#2c4a7c"/>
    <text x="90" y="20" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2c4a7c" font-weight="bold">Плотность населения</text>
    <text x="90" y="45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#2c4a7c">P = N/S</text>
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c4a7c">где:</text>
    <text x="90" y="80" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c4a7c">P - плотность</text>
    <text x="90" y="95" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2c4a7c">N - численность</text>
  </g>
  
  <!-- Ключевые термины -->
  <g transform="translate(50, 80)">
    <circle cx="220" cy="60" r="20" fill="#e74c3c" opacity="0.3"/>
    <text x="220" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#c0392b" font-weight="bold">Глобализация</text>
  </g>
  
  <g transform="translate(250, 80)">
    <circle cx="220" cy="60" r="20" fill="#3498db" opacity="0.3"/>
    <text x="220" y="65" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#2980b9" font-weight="bold">Урбанизация</text>
  </g>
  
  <!-- Даты -->
  <text x="50" y="340" font-family="Arial, sans-serif" font-size="10" fill="#2c4a7c">2023 год</text>
  <text x="450" y="340" font-family="Arial, sans-serif" font-size="10" text-anchor="end" fill="#2c4a7c">7.9 млрд человек</text>
  
  <!-- Иконки -->
  <g transform="translate(30, 310)">
    <circle cx="10" cy="10" r="8" fill="#5d8c3d"/>
    <text x="10" y="14" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">1</text>
    <text x="25" y="14" font-family="Arial, sans-serif" font-size="9" fill="#2c4a7c">Природные ресурсы</text>
  </g>
  
  <g transform="translate(150, 310)">
    <circle cx="10" cy="10" r="8" fill="#e74c3c"/>
    <text x="10" y="14" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">2</text>
    <text x="25" y="14" font-family="Arial, sans-serif" font-size="9" fill="#2c4a7c">Климатические зоны</text>
  </g>
  
  <g transform="translate(280, 310)">
    <circle cx="10" cy="10" r="8" fill="#3498db"/>
    <text x="10" y="14" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">3</text>
    <text x="25" y="14" font-family="Arial, sans-serif" font-size="9" fill="#2c4a7c">Экономические районы</text>
  </g>
  
  <g transform="translate(420, 310)">
    <circle cx="10" cy="10" r="8" fill="#9b59b6"/>
    <text x="10" y="14" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="white">4</text>
    <text x="25" y="14" font-family="Arial, sans-serif" font-size="9" fill="#2c4a7c">Геополитика</text>
  </g>
  
  <!-- Дополнительные элементы для увеличения размера -->
  <path d="M30,140 L50,135 L70,140 L90,135 L110,140 L130,135 L150,140" fill="none" stroke="#5d8c3d" stroke-width="1" opacity="0.5"/>
  <path d="M30,150 L50,145 L70,150 L90,145 L110,150 L130,145 L150,150" fill="none" stroke="#5d8c3d" stroke-width="1" opacity="0.5"/>
  <path d="M30,160 L50,155 L70,160 L90,155 L110,160 L130,155 L150,160" fill="none" stroke="#5d8c3d" stroke-width="1" opacity="0.5"/>
  
  <path d="M230,140 L250,135 L270,140 L290,135 L310,140 L330,135 L350,140" fill="none" stroke="#3498db" stroke-width="1" opacity="0.5"/>
  <path d="M230,150 L250,145 L270,150 L290,145 L310,150 L330,145 L350,150" fill="none" stroke="#3498db" stroke-width="1" opacity="0.5"/>
  <path d="M230,160 L250,155 L270,160 L290,155 L310,160 L330,155 L350,160" fill="none" stroke="#3498db" stroke-width="1" opacity="0.5"/>
  
  <!-- Текстовые элементы для заполнения -->
  <text x="270" y="275" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c4a7c" font-style="italic">"География — это наука о пространстве"</text>
  <text x="270" y="290" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="#2c4a7c" font-style="italic">и взаимосвязях между природой и обществом</text>
</svg>