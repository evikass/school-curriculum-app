<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d6e4f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d68910;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)"/>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="3" rx="5"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#7f8c8d" stroke-width="1" rx="3"/>
  
  <!-- Номер урока -->
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="16" fill="#34495e">Урок 10</text>
  
  <!-- Заголовок -->
  <text x="250" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">ГЕОГРАФИЯ · 11 КЛАСС</text>
  <text x="250" y="75" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">Россия в современном мире</text>
  <text x="250" y="95" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#34495e">Тема: Место России в мире</text>
  
  <!-- Карта мира -->
  <g transform="translate(250, 180)">
    <circle r="70" fill="none" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
    <ellipse rx="70" ry="35" fill="url(#mapGrad)" opacity="0.7"/>
    <text x="0" y="-45" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">Карта мира</text>
    
    <!-- Указатель на Россию -->
    <line x1="-20" y1="-20" x2="-40" y2="-45" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="-20" cy="-20" r="3" fill="#e74c3c"/>
    <text x="-45" y="-50" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c">Россия</text>
    
    <!-- Указатель на США -->
    <line x1="30" y1="-25" x2="50" y2="-40" stroke="#3498db" stroke-width="2"/>
    <circle cx="30" cy="-25" r="3" fill="#3498db"/>
    <text x="55" y="-45" font-family="Arial, sans-serif" font-size="12" fill="#3498db">США</text>
    
    <!-- Указатель на Китай -->
    <line x1="50" y1="10" x2="70" y2="10" stroke="#f39c12" stroke-width="2"/>
    <circle cx="50" cy="10" r="3" fill="#f39c12"/>
    <text x="75" y="15" font-family="Arial, sans-serif" font-size="12" fill="#f39c12">Китай</text>
    
    <!-- Указатель на ЕС -->
    <line x1="-10" y1="30" x2="-30" y2="45" stroke="#2ecc71" stroke-width="2"/>
    <circle cx="-10" cy="30" r="3" fill="#2ecc71"/>
    <text x="-65" y="50" font-family="Arial, sans-serif" font-size="12" fill="#2ecc71">Европейский союз</text>
  </g>
  
  <!-- График "Доля мирового ВВП" -->
  <g transform="translate(50, 250)">
    <text x="50" y="-10" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">Доля мирового ВВП</text>
    <rect x="0" y="0" width="100" height="80" fill="none" stroke="#34495e" stroke-width="1"/>
    <rect x="0" y="40" width="100" height="40" fill="url(#chartGrad)"/>
    <rect x="0" y="55" width="100" height="25" fill="url(#chartGrad2)"/>
    <rect x="0" y="65" width="100" height="15" fill="url(#chartGrad3)"/>
    <text x="50" y="95" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">2022 год</text>
    <text x="-5" y="85" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#34495e">15%</text>
    <text x="-5" y="60" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#34495e">8%</text>
    <text x="-5" y="45" font-family="Arial, sans-serif" font-size="8" text-anchor="end" fill="#34495e">3%</text>
    <text x="50" y="50" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Россия</text>
    <text x="50" y="65" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Китай</text>
    <text x="50" y="75" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">США</text>
  </g>
  
  <!-- Диаграмма "Территория" -->
  <g transform="translate(350, 250)">
    <text x="50" y="-10" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#34495e">Территория (млн км²)</text>
    <rect x="0" y="0" width="100" height="80" fill="none" stroke="#34495e" stroke-width="1"/>
    <rect x="10" y="60" width="20" height="20" fill="#e74c3c"/>
    <rect x="35" y="30" width="20" height="50" fill="#3498db"/>
    <rect x="60" y="40" width="20" height="40" fill="#f39c12"/>
    <text x="20" y="95" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">17,1</text>
    <text x="45" y="95" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">9,8</text>
    <text x="70" y="95" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">9,5</text>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Россия</text>
    <text x="45" y="25" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">Китай</text>
    <text x="70" y="35" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="white">США</text>
  </g>
  
  <!-- Ключевые термины -->
  <g transform="translate(50, 130)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Ключевые термины:</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Геополитическое положение</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Стратегические интересы</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="10" fill="#34495e">• Международные отношения</text>
  </g>
  
  <!-- Формула расчета индекса развития -->
  <g transform="translate(250, 130)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Индекс развития человеческого потенциала</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#34495e">ИРЧП = (ЖОП + УРБ + ООЖ)/3</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">ЖОП - ожидаемая продолжительность жизни</text>
    <text x="0" y="48" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">УРБ - уровень грамотности</text>
    <text x="0" y="61" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">ООЖ - оценочный уровень образования</text>
  </g>
  
  <!-- Даты -->
  <g transform="translate(350, 130)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">Важные даты:</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1991 - распад СССР</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#34495e">1993 - новая Конституция</text>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="10" fill="#34495e">2008 - конфликт в Юж. Осетии</text>
    <text x="0" y="65" font-family="Arial, sans-serif" font-size="10" fill="#34495e">2022 - специальная военная операция</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="30" cy="340" r="3" fill="#3498db"/>
  <circle cx="470" cy="340" r="3" fill="#e74c3c"/>
  <line x1="30" y1="340" x2="470" y2="340" stroke="#95a5a6" stroke-width="1"/>
  
  <!-- Символы -->
  <g transform="translate(400, 80)">
    <path d="M0,0 L10,0 L10,10 L20,10 L20,0 L30,0 L15,-15 Z" fill="#f39c12"/>
    <text x="15" y="25" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">ВВП</text>
  </g>
  
  <g transform="translate(450, 80)">
    <circle cx="15" cy="15" r="15" fill="#2ecc71"/>
    <path d="M15,5 L15,25 M5,15 L25,15" stroke="white" stroke-width="2"/>
    <text x="15" y="35" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#34495e">Население</text>
  </g>
</svg>