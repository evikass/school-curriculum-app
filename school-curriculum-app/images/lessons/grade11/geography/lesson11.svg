<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f2ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="issueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="500" height="350" fill="url(#bgGrad)" />
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="2" rx="5" />
  <rect x="15" y="15" width="470" height="325" fill="none" stroke="#95a5a6" stroke-width="1" rx="3" />
  
  <!-- Номер урока в углу -->
  <text x="25" y="335" font-family="Arial, sans-serif" font-size="12" fill="#34495e" font-weight="bold">Урок 11</text>
  
  <!-- Заголовок -->
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="20" fill="#2c3e50" text-anchor="middle" font-weight="bold">ГЕОГРАФИЯ · 11 КЛАСС</text>
  <text x="250" y="65" font-family="Arial, sans-serif" font-size="18" fill="#34495e" text-anchor="middle" font-weight="bold">Урок 11: Глобальные проблемы человечества</text>
  
  <!-- Диаграмма вызовов -->
  <g transform="translate(50, 90)">
    <text x="100" y="0" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" text-anchor="middle" font-weight="bold">Вызовы XXI века</text>
    
    <!-- Круговая диаграмма -->
    <circle cx="100" cy="40" r="30" fill="none" stroke="#e74c3c" stroke-width="2" />
    <circle cx="100" cy="40" r="30" fill="none" stroke="#3498db" stroke-width="2" 
            stroke-dasharray="94 188" transform="rotate(-90 100 40)" />
    <circle cx="100" cy="40" r="30" fill="none" stroke="#2ecc71" stroke-width="2" 
            stroke-dasharray="63 219" transform="rotate(-90 100 40)" />
    <circle cx="100" cy="40" r="30" fill="none" stroke="#f39c12" stroke-width="2" 
            stroke-dasharray="32 250" transform="rotate(-90 100 40)" />
    
    <!-- Подписи к диаграмме -->
    <text x="140" y="30" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c">Климатические</text>
    <text x="140" y="45" font-family="Arial, sans-serif" font-size="11" fill="#3498db">Социальные</text>
    <text x="140" y="60" font-family="Arial, sans-serif" font-size="11" fill="#2ecc71">Экономические</text>
    <text x="140" y="75" font-family="Arial, sans-serif" font-size="11" fill="#f39c12">Политические</text>
    
    <!-- Индикатор угрозы -->
    <rect x="250" y="20" width="80" height="40" fill="none" stroke="#e74c3c" stroke-width="2" rx="5" />
    <text x="290" y="40" font-family="Arial, sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle" font-weight="bold">Угроза:</text>
    <text x="290" y="55" font-family="Arial, sans-serif" font-size="11" fill="#e74c3c" text-anchor="middle">Высокая</text>
  </g>
  
  <!-- График роста населения -->
  <g transform="translate(50, 180)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Рост населения мира</text>
    
    <!-- Оси -->
    <line x1="20" y1="120" x2="180" y2="120" stroke="#34495e" stroke-width="2" />
    <line x1="20" y1="120" x2="20" y2="20" stroke="#34495e" stroke-width="2" />
    
    <!-- График -->
    <polyline points="20,110 50,100 80,85 110,65 140,40 170,25" 
              fill="none" stroke="url(#chartGrad)" stroke-width="3" />
    
    <!-- Точки данных -->
    <circle cx="20" cy="110" r="3" fill="#3498db" />
    <circle cx="50" cy="100" r="3" fill="#3498db" />
    <circle cx="80" cy="85" r="3" fill="#3498db" />
    <circle cx="110" cy="65" r="3" fill="#3498db" />
    <circle cx="140" cy="40" r="3" fill="#3498db" />
    <circle cx="170" cy="25" r="3" fill="#3498db" />
    
    <!-- Подписи осей -->
    <text x="20" y="135" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">1950</text>
    <text x="50" y="135" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">1970</text>
    <text x="80" y="135" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">1990</text>
    <text x="110" y="135" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">2010</text>
    <text x="140" y="135" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">2030</text>
    <text x="170" y="135" font-family="Arial, sans-serif" font-size="10" fill="#34495e" text-anchor="middle">2050</text>
    
    <text x="10" y="115" font-family="Arial, sans-serif" font-size="9" fill="#34495e" text-anchor="end">3</text>
    <text x="10" y="90" font-family="Arial, sans-serif" font-size="9" fill="#34495e" text-anchor="end">5</text>
    <text x="10" y="65" font-family="Arial, sans-serif" font-size="9" fill="#34495e" text-anchor="end">7</text>
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="9" fill="#34495e" text-anchor="end">9</text>
    <text x="10" y="25" font-family="Arial, sans-serif" font-size="9" fill="#34495e" text-anchor="end">10</text>
    
    <text x="100" y="150" font-family="Arial, sans-serif" font-size="11" fill="#34495e" text-anchor="middle">Млрд человек</text>
  </g>
  
  <!-- Проблемы экологии -->
  <g transform="translate(300, 180)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50" font-weight="bold">Экологические проблемы</text>
    
    <!-- Индикатор температуры -->
    <rect x="0" y="10" width="180" height="20" fill="#ecf0f1" rx="10" />
    <rect x="0" y="10" width="140" height="20" fill="url(#issueGrad)" rx="10" />
    <text x="90" y="25" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">+1.5°C</text>
    
    <!-- Таблица проблем -->
    <rect x="0" y="40" width="85" height="30" fill="#e74c3c" opacity="0.8" />
    <text x="42.5" y="60" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Потепление</text>
    
    <rect x="95" y="40" width="85" height="30" fill="#e67e22" opacity="0.8" />
    <text x="137.5" y="60" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Загрязнение</text>
    
    <rect x="0" y="75" width="85" height="30" fill="#f39c12" opacity="0.8" />
    <text x="42.5" y="95" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Вымирание</text>
    
    <rect x="95" y="75" width="85" height="30" fill="#27ae60" opacity="0.8" />
    <text x="137.5" y="95" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">Дефицит</text>
  </g>
  
  <!-- Глобальная формула устойчивого развития -->
  <g transform="translate(50, 290)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Формула устойчивого развития:</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#34495e">Экономика + Экология + Социум = Будущее</text>
  </g>
  
  <!-- Ключевые термины -->
  <g transform="translate(300, 290)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="12" fill="#2c3e50" font-weight="bold">Ключевые термины:</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Глобализация | Урбанизация</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#34495e">Климатические изменения | Миграция</text>
  </g>
  
  <!-- Декоративные элементы -->
  <circle cx="470" cy="30" r="5" fill="#3498db" opacity="0.5" />
  <circle cx="455" cy="40" r="3" fill="#e74c3c" opacity="0.5" />
  <circle cx="465" cy="50" r="4" fill="#2ecc71" opacity="0.5" />
  
  <!-- Даты и события -->
  <g transform="translate(50, 140)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">2015: Парижское соглашение</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">2019: Глобальные протесты</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="10" fill="#7f8c8d">2020: Пандемия COVID-19</text>
  </g>
</svg>