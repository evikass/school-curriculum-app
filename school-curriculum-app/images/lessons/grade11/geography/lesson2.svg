<svg viewBox="0 0 500 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7e5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#feb47b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Декоративная рамка -->
  <rect x="10" y="10" width="480" height="330" fill="none" stroke="#34495e" stroke-width="2"/>
  <rect x="15" y="15" width="470" height="320" fill="none" stroke="#7f8c8d" stroke-width="1"/>
  
  <!-- Номер урока -->
  <circle cx="460" cy="30" r="15" fill="#e74c3c"/>
  <text x="460" y="36" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">2</text>
  
  <!-- ГЕОГРАФИЯ · 11 КЛАСС -->
  <text x="250" y="35" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="12" font-style="italic">ГЕОГРАФИЯ · 11 КЛАСС</text>
  
  <!-- Заголовок урока -->
  <rect x="50" y="50" width="400" height="30" fill="url(#grad1)"/>
  <text x="250" y="70" text-anchor="middle" fill="white" font-family="Arial" font-size="16" font-weight="bold">Международные отношения</text>
  
  <!-- Подзаголовок -->
  <text x="250" y="95" text-anchor="middle" fill="#34495e" font-family="Arial" font-size="14">Геополитика и организации</text>
  
  <!-- Организация Объединенных Наций -->
  <g transform="translate(250, 140)">
    <circle r="35" fill="#5dade2"/>
    <text y="5" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">ООН</text>
    <text y="-50" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">Организация Объединенных Наций</text>
    <text y="-60" text-anchor="middle" fill="#7f8c8d" font-family="Arial" font-size="9">1945 г.</text>
  </g>
  
  <!-- NATO -->
  <g transform="translate(120, 180)">
    <rect x="-25" y="-15" width="50" height="30" fill="#e74c3c" rx="5"/>
    <text y="5" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">NATO</text>
    <text y="-30" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">НАТО</text>
    <text y="-40" text-anchor="middle" fill="#7f8c8d" font-family="Arial" font-size="9">1949 г.</text>
  </g>
  
  <!-- ЕС -->
  <g transform="translate(380, 180)">
    <ellipse rx="30" ry="20" fill="#f39c12"/>
    <text y="5" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">ЕС</text>
    <text y="-35" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">Европейский Союз</text>
    <text y="-45" text-anchor="middle" fill="#7f8c8d" font-family="Arial" font-size="9">1957 г.</text>
  </g>
  
  <!-- Шанхайская организация сотрудничества -->
  <g transform="translate(250, 260)">
    <path d="M-25,-15 L25,-15 L30,0 L25,15 L-25,15 L-30,0 Z" fill="#27ae60"/>
    <text y="5" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">ШОС</text>
    <text y="-30" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">Шанхайская организация сотрудничества</text>
    <text y="-40" text-anchor="middle" fill="#7f8c8d" font-family="Arial" font-size="9">2001 г.</text>
  </g>
  
  <!-- BRICS -->
  <g transform="translate(120, 260)">
    <rect x="-20" y="-15" width="40" height="30" fill="#9b59b6" rx="15"/>
    <text y="5" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold">BRICS</text>
    <text y="-30" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">БРИКС</text>
    <text y="-40" text-anchor="middle" fill="#7f8c8d" font-family="Arial" font-size="9">2009 г.</text>
  </g>
  
  <!-- АСЕАН -->
  <g transform="translate(380, 260)">
    <polygon points="0,-20 20,-10 20,10 0,20 -20,10 -20,-10" fill="#e67e22"/>
    <text y="5" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">АСЕАН</text>
    <text y="-35" text-anchor="middle" fill="#2c3e50" font-family="Arial" font-size="11">Ассоциация государств Юго-Восточной Азии</text>
    <text y="-45" text-anchor="middle" fill="#7f8c8d" font-family="Arial" font-size="9">1967 г.</text>
  </g>
  
  <!-- Связи между организациями -->
  <line x1="250" y1="105" x2="120" y2="165" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="250" y1="105" x2="380" y2="165" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="250" y1="175" x2="120" y2="245" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="250" y1="175" x2="380" y2="245" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="250" y1="175" x2="250" y2="245" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Геополитические концепции -->
  <rect x="30" y="300" width="440" height="40" fill="url(#grad3)" rx="5"/>
  <text x="50" y="320" fill="white" font-family="Arial" font-size="10" font-weight="bold">Ключевые термины:</text>
  <text x="50" y="332" fill="white" font-family="Arial" font-size="9">Геополитика · Биполярная система · Многополярность · Глобализация · Регионализация · Суверенитет</text>
  
  <!-- График влияния -->
  <g transform="translate(50, 140)">
    <text x="0" y="-10" fill="#2c3e50" font-family="Arial" font-size="10" font-weight="bold">Влияние в мире</text>
    <rect x="0" y="0" width="40" height="20" fill="#5dade2" opacity="0.8"/>
    <text x="45" y="15" fill="#2c3e50" font-family="Arial" font-size="9">ООН</text>
    
    <rect x="0" y="25" width="30" height="20" fill="#e74c3c" opacity="0.8"/>
    <text x="35" y="40" fill="#2c3e50" font-family="Arial" font-size="9">NATO</text>
    
    <rect x="0" y="50" width="35" height="20" fill="#f39c12" opacity="0.8"/>
    <text x="40" y="65" fill="#2c3e50" font-family="Arial" font-size="9">ЕС</text>
    
    <rect x="0" y="75" width="25" height="20" fill="#27ae60" opacity="0.8"/>
    <text x="30" y="90" fill="#2c3e50" font-family="Arial" font-size="9">ШОС</text>
  </g>
  
  <!-- Формула геополитического баланса -->
  <g transform="translate(350, 140)">
    <rect x="0" y="0" width="120" height="60" fill="white" stroke="#bdc3c7" stroke-width="1" rx="3"/>
    <text x="10" y="20" fill="#2c3e50" font-family="Arial" font-size="9" font-weight="bold">Формула баланса:</text>
    <text x="10" y="35" fill="#34495e" font-family="Arial" font-size="9">B = Σ(P × E) / C</text>
    <text x="10" y="48" fill="#7f8c8d" font-family="Arial" font-size="8">B - баланс, P - власть, E - влияние, C - конфликт</text>
  </g>
  
  <!-- Дипломатические отношения -->
  <g transform="translate(200, 140)">
    <circle cx="0" cy="0" r="3" fill="#3498db"/>
    <circle cx="20" cy="10" r="3" fill="#e74c3c"/>
    <line x1="0" y1="0" x2="20" y2="10" stroke="#95a5a6" stroke-width="1"/>
    <text x="25" y="15" fill="#2c3e50" font-family="Arial" font-size="8">Дипломатия</text>
  </g>
  
  <!-- Экономические связи -->
  <g transform="translate(280, 140)">
    <circle cx="0" cy="0" r="3" fill="#3498db"/>
    <circle cx="20" cy="10" r="3" fill="#27ae60"/>
    <line x1="0" y1="0" x2="20" y2="10" stroke="#95a5a6" stroke-width="1"/>
    <text x="25" y="15" fill="#2c3e50" font-family="Arial" font-size="8">Экономика</text>
  </g>
  
  <!-- Военные альянсы -->
  <g transform="translate(240, 170)">
    <circle cx="0" cy="0" r="3" fill="#3498db"/>
    <circle cx="20" cy="10" r="3" fill="#e74c3c"/>
    <line x1="0" y1="0" x2="20" y2="10" stroke="#95a5a6" stroke-width="1"/>
    <text x="25" y="15" fill="#2c3e50" font-family="Arial" font-size="8">Военный альянс</text>
  </g>
  
  <!-- Культурные обмены -->
  <g transform="translate(260, 170)">
    <circle cx="0" cy="0" r="3" fill="#3498db"/>
    <circle cx="20" cy="10" r="3" fill="#f39c12"/>
    <line x1="0" y1="0" x2="20" y2="10" stroke="#95a5a6" stroke-width="1"/>
    <text x="25" y="15" fill="#2c3e50" font-family="Arial" font-size="8">Культура</text>
  </g>
</svg>