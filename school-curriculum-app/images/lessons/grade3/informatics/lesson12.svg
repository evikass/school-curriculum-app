<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="50%" stop-color="#FFECB3"/>
      <stop offset="100%" stop-color="#FFE082"/>
    </linearGradient>
    <linearGradient id="project12" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="star12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB300"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg12)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">🏆 Проект</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#FF8F00"/>
  
  <!-- Central project icon -->
  <g transform="translate(190, 80)">
    <rect x="0" y="0" width="120" height="100" fill="url(#project12)" rx="15">
      <animate attributeName="rx" values="15;20;15" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="35" font-family="Arial" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">МОЙ</text>
    <text x="60" y="55" font-family="Arial" font-size="12" fill="#FFF" text-anchor="middle" font-weight="bold">ПРОЕКТ</text>
    
    <!-- Stars -->
    <polygon points="30,75 33,83 42,83 35,88 38,97 30,92 22,97 25,88 18,83 27,83" fill="url(#star12)">
      <animate attributeName="opacity" values="1;0.7;1" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="90,75 93,83 102,83 95,88 98,97 90,92 82,97 85,88 78,83 87,83" fill="url(#star12)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Steps around the project -->
  <!-- Step 1: Idea -->
  <g transform="translate(30, 100)">
    <rect x="0" y="0" width="100" height="60" fill="#E3F2FD" rx="10" stroke="#2196F3" stroke-width="2">
      <animate attributeName="y" values="0;-5;0" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="50" y="20" font-family="Arial" font-size="20" text-anchor="middle">💡</text>
    <text x="50" y="38" font-family="Arial" font-size="10" fill="#1565C0" text-anchor="middle" font-weight="bold">1. Идея</text>
    <text x="50" y="52" font-family="Arial" font-size="8" fill="#1976D2" text-anchor="middle">Придумай тему</text>
  </g>
  
  <!-- Step 2: Plan -->
  <g transform="translate(370, 100)">
    <rect x="0" y="0" width="100" height="60" fill="#E8F5E9" rx="10" stroke="#4CAF50" stroke-width="2">
      <animate attributeName="y" values="0;-5;0" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="50" y="20" font-family="Arial" font-size="20" text-anchor="middle">📋</text>
    <text x="50" y="38" font-family="Arial" font-size="10" fill="#2E7D32" text-anchor="middle" font-weight="bold">2. План</text>
    <text x="50" y="52" font-family="Arial" font-size="8" fill="#388E3C" text-anchor="middle">Составь этапы</text>
  </g>
  
  <!-- Step 3: Create -->
  <g transform="translate(30, 190)">
    <rect x="0" y="0" width="100" height="60" fill="#F3E5F5" rx="10" stroke="#9C27B0" stroke-width="2">
      <animate attributeName="y" values="0;-5;0" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="50" y="20" font-family="Arial" font-size="20" text-anchor="middle">🛠️</text>
    <text x="50" y="38" font-family="Arial" font-size="10" fill="#6A1B9A" text-anchor="middle" font-weight="bold">3. Создай</text>
    <text x="50" y="52" font-family="Arial" font-size="8" fill="#7B1FA2" text-anchor="middle">Выполни работу</text>
  </g>
  
  <!-- Step 4: Present -->
  <g transform="translate(370, 190)">
    <rect x="0" y="0" width="100" height="60" fill="#FCE4EC" rx="10" stroke="#E91E63" stroke-width="2">
      <animate attributeName="y" values="0;-5;0" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="50" y="20" font-family="Arial" font-size="20" text-anchor="middle">🎤</text>
    <text x="50" y="38" font-family="Arial" font-size="10" fill="#AD1457" text-anchor="middle" font-weight="bold">4. Представь</text>
    <text x="50" y="52" font-family="Arial" font-size="8" fill="#C2185B" text-anchor="middle">Покажи всем</text>
  </g>
  
  <!-- Connecting arrows -->
  <g stroke="#FF8F00" stroke-width="2" fill="none">
    <path d="M130,130 L180,130">
      <animate attributeName="stroke-dasharray" values="0,50;50,0" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M320,130 L370,130">
      <animate attributeName="stroke-dasharray" values="0,50;50,0" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M130,220 L180,220">
      <animate attributeName="stroke-dasharray" values="0,50;50,0" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M320,220 L370,220">
      <animate attributeName="stroke-dasharray" values="0,50;50,0" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Skills panel -->
  <g transform="translate(150, 260)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="200" height="70" fill="#FFF" rx="10" stroke="#FFB300" stroke-width="2"/>
    <text x="100" y="18" fill="#E65100" text-anchor="middle" font-weight="bold">Навыки проекта:</text>
    
    <rect x="15" y="28" width="50" height="15" fill="#E3F2FD" rx="7"/>
    <text x="40" y="39" fill="#1565C0" text-anchor="middle" font-size="8">Поиск</text>
    
    <rect x="75" y="28" width="50" height="15" fill="#E8F5E9" rx="7"/>
    <text x="100" y="39" fill="#2E7D32" text-anchor="middle" font-size="8">Творчество</text>
    
    <rect x="135" y="28" width="50" height="15" fill="#F3E5F5" rx="7"/>
    <text x="160" y="39" fill="#6A1B9A" text-anchor="middle" font-size="8">Отчёт</text>
    
    <rect x="45" y="50" width="50" height="15" fill="#FCE4EC" rx="7"/>
    <text x="70" y="61" fill="#AD1457" text-anchor="middle" font-size="8">Речь</text>
    
    <rect x="105" y="50" width="50" height="15" fill="#FFF8E1" rx="7"/>
    <text x="130" y="61" fill="#E65100" text-anchor="middle" font-size="8">Работа</text>
  </g>
  
  <!-- Trophy -->
  <g transform="translate(230, 180)">
    <text x="0" y="0" font-family="Arial" font-size="30" text-anchor="middle">
      <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
      🏆
    </text>
  </g>
</svg>