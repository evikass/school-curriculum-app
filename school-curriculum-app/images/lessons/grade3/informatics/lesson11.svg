<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="slide11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg11)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1B5E20" text-anchor="middle">📊 Презентация</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#4CAF50"/>
  
  <!-- Slide thumbnails -->
  <g transform="translate(20, 70)">
    <!-- Slide 1 -->
    <rect x="0" y="0" width="120" height="80" fill="#FFF" rx="5" stroke="#4CAF50" stroke-width="2">
      <animate attributeName="stroke-width" values="2;3;2" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="60" y="25" font-family="Arial" font-size="8" fill="#2E7D32" text-anchor="middle" font-weight="bold">Слайд 1</text>
    <rect x="10" y="35" width="100" height="10" fill="#81C784" rx="2"/>
    <rect x="10" y="50" width="80" height="5" fill="#C8E6C9" rx="1"/>
    <rect x="10" y="60" width="90" height="5" fill="#C8E6C9" rx="1"/>
    <rect x="10" y="70" width="60" height="5" fill="#C8E6C9" rx="1"/>
    
    <!-- Slide 2 -->
    <rect x="130" y="0" width="120" height="80" fill="#FFF" rx="5" stroke="#81C784" stroke-width="2"/>
    <text x="190" y="25" font-family="Arial" font-size="8" fill="#388E3C" text-anchor="middle" font-weight="bold">Слайд 2</text>
    <rect x="140" y="35" width="100" height="10" fill="#66BB6A" rx="2"/>
    <circle cx="160" cy="60" r="12" fill="#A5D6A7"/>
    <rect x="180" y="50" width="50" height="20" fill="#C8E6C9" rx="2"/>
    
    <!-- Slide 3 -->
    <rect x="260" y="0" width="120" height="80" fill="#FFF" rx="5" stroke="#81C784" stroke-width="2"/>
    <text x="320" y="25" font-family="Arial" font-size="8" fill="#388E3C" text-anchor="middle" font-weight="bold">Слайд 3</text>
    <rect x="270" y="35" width="100" height="10" fill="#4CAF50" rx="2"/>
    <rect x="270" y="50" width="45" height="25" fill="#A5D6A7" rx="2"/>
    <rect x="320" y="50" width="45" height="25" fill="#81C784" rx="2"/>
  </g>
  
  <!-- Main slide preview -->
  <g transform="translate(80, 170)">
    <rect x="0" y="0" width="340" height="160" fill="#FFF" rx="8" stroke="#2E7D32" stroke-width="3" filter="drop-shadow(2px 2px 4px rgba(0,0,0,0.2))"/>
    
    <!-- Slide title -->
    <rect x="20" y="15" width="300" height="30" fill="#E8F5E9" rx="5"/>
    <text x="170" y="37" font-family="Arial" font-size="14" fill="#1B5E20" text-anchor="middle" font-weight="bold">Моя презентация</text>
    
    <!-- Content -->
    <rect x="20" y="55" width="140" height="90" fill="#C8E6C9" rx="5"/>
    <circle cx="90" cy="85" r="20" fill="#81C784">
      <animate attributeName="r" values="20;22;20" dur="2s" repeatCount="indefinite"/>
    </circle>
    <rect x="70" y="110" width="40" height="25" fill="#4CAF50" rx="3"/>
    
    <rect x="175" y="55" width="145" height="90" fill="#F1F8E9" rx="5"/>
    <text x="247" y="75" font-family="Arial" font-size="9" fill="#33691E" text-anchor="middle">• Пункт 1</text>
    <text x="247" y="90" font-family="Arial" font-size="9" fill="#33691E" text-anchor="middle">• Пункт 2</text>
    <text x="247" y="105" font-family="Arial" font-size="9" fill="#33691E" text-anchor="middle">• Пункт 3</text>
    <text x="247" y="120" font-family="Arial" font-size="9" fill="#558B2F" text-anchor="middle">• Вывод</text>
  </g>
  
  <!-- Navigation arrows -->
  <g transform="translate(430, 230)">
    <polygon points="0,20 20,0 20,40" fill="#4CAF50" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <g transform="translate(60, 230)">
    <polygon points="20,20 0,0 0,40" fill="#81C784" opacity="0.7"/>
  </g>
  
  <!-- Info panels -->
  <g transform="translate(10, 310)" font-family="Arial" font-size="8">
    <rect x="0" y="0" width="95" height="30" fill="#FFF" rx="5" stroke="#4CAF50"/>
    <text x="47" y="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Слайд</text>
    <text x="47" y="24" fill="#388E3C" text-anchor="middle">одна страница</text>
  </g>
  
  <g transform="translate(115, 310)" font-family="Arial" font-size="8">
    <rect x="0" y="0" width="95" height="30" fill="#FFF" rx="5" stroke="#66BB6A"/>
    <text x="47" y="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Анимация</text>
    <text x="47" y="24" fill="#388E3C" text-anchor="middle">движение</text>
  </g>
  
  <g transform="translate(220, 310)" font-family="Arial" font-size="8">
    <rect x="0" y="0" width="95" height="30" fill="#FFF" rx="5" stroke="#81C784"/>
    <text x="47" y="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Дизайн</text>
    <text x="47" y="24" fill="#388E3C" text-anchor="middle">оформление</text>
  </g>
  
  <g transform="translate(325, 310)" font-family="Arial" font-size="8">
    <rect x="0" y="0" width="95" height="30" fill="#FFF" rx="5" stroke="#A5D6A7"/>
    <text x="47" y="12" fill="#2E7D32" text-anchor="middle" font-weight="bold">Переход</text>
    <text x="47" y="24" fill="#388E3C" text-anchor="middle">смена слайдов</text>
  </g>
  
  <!-- Format hint -->
  <g transform="translate(430, 100)">
    <rect x="0" y="0" width="60" height="40" fill="#E8F5E9" rx="5" stroke="#4CAF50"/>
    <text x="30" y="18" font-family="Arial" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">.pptx</text>
    <text x="30" y="32" font-family="Arial" font-size="7" fill="#388E3C" text-anchor="middle">формат</text>
  </g>
</svg>