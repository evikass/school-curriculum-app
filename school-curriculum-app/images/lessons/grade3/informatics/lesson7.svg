<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FFECB3"/>
    </linearGradient>
    <linearGradient id="loop7" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFB300"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg7)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#E65100" text-anchor="middle">🔄 Циклы</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#FF8F00"/>
  
  <!-- Loop diagram -->
  <g transform="translate(50, 70)">
    <!-- Loop circle -->
    <circle cx="120" cy="100" r="80" fill="none" stroke="#FF8F00" stroke-width="4" stroke-dasharray="20,10">
      <animateTransform attributeName="transform" type="rotate" from="0 120 100" to="360 120 100" dur="8s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Steps around the circle -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 120 100" to="360 120 100" dur="8s" repeatCount="indefinite"/>
      <rect x="95" y="15" width="50" height="25" fill="#FFB300" rx="5"/>
      <text x="120" y="32" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">Шаг 1</text>
      
      <rect x="185" y="88" width="50" height="25" fill="#FFA000" rx="5"/>
      <text x="210" y="105" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">Шаг 2</text>
      
      <rect x="95" y="160" width="50" height="25" fill="#FF8F00" rx="5"/>
      <text x="120" y="177" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">Шаг 3</text>
      
      <rect x="5" y="88" width="50" height="25" fill="#FFB300" rx="5"/>
      <text x="30" y="105" font-family="Arial" font-size="9" fill="#FFF" text-anchor="middle">Шаг 4</text>
    </g>
    
    <!-- Center text -->
    <text x="120" y="95" font-family="Arial" font-size="12" fill="#E65100" text-anchor="middle" font-weight="bold">ПОВТОРИ</text>
    <text x="120" y="110" font-family="Arial" font-size="10" fill="#F57C00" text-anchor="middle">5 раз</text>
  </g>
  
  <!-- Code example -->
  <g transform="translate(280, 70)">
    <rect x="0" y="0" width="200" height="120" fill="#263238" rx="8"/>
    <rect x="0" y="0" width="200" height="25" fill="#37474F" rx="8"/>
    <rect x="0" y="20" width="200" height="5" fill="#263238"/>
    
    <circle cx="15" cy="12" r="5" fill="#F44336"/>
    <circle cx="30" cy="12" r="5" fill="#FFEB3B"/>
    <circle cx="45" cy="12" r="5" fill="#4CAF50"/>
    
    <text x="15" y="45" font-family="monospace" font-size="10" fill="#80CBC4">повторить</text>
    <text x="75" y="45" font-family="monospace" font-size="10" fill="#FFD54F">5</text>
    <text x="85" y="45" font-family="monospace" font-size="10" fill="#80CBC4">раз</text>
    
    <text x="25" y="62" font-family="monospace" font-size="10" fill="#A5D6A7">вперёд</text>
    <text x="25" y="77" font-family="monospace" font-size="10" fill="#A5D6A7">направо</text>
    <text x="25" y="92" font-family="monospace" font-size="10" fill="#A5D6A7">вперёд</text>
    <text x="25" y="107" font-family="monospace" font-size="10" fill="#A5D6A7">налево</text>
    
    <text x="15" y="45" font-family="monospace" font-size="10" fill="#80CBC4">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Square drawing example -->
  <g transform="translate(50, 230)">
    <rect x="0" y="0" width="150" height="100" fill="#FFF" rx="8" stroke="#FFB300"/>
    <text x="75" y="18" font-family="Arial" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">Квадрат:</text>
    
    <rect x="25" y="30" width="60" height="60" fill="none" stroke="#FF8F00" stroke-width="3">
      <animate attributeName="stroke-dasharray" values="0,240;240,0" dur="4s" repeatCount="indefinite"/>
    </rect>
    
    <text x="55" y="55" font-family="Arial" font-size="20" fill="#FFB300">▶</text>
  </g>
  
  <!-- Loop types -->
  <g transform="translate(220, 230)" font-family="Arial" font-size="9">
    <rect x="0" y="0" width="120" height="100" fill="#E3F2FD" rx="8" stroke="#2196F3"/>
    <text x="60" y="18" fill="#0D47A1" text-anchor="middle" font-weight="bold">Цикл со счётчиком</text>
    <text x="60" y="40" fill="#1565C0" text-anchor="middle">повторить N раз</text>
    <rect x="15" y="55" width="90" height="35" fill="#BBDEFB" rx="5"/>
    <text x="60" y="72" fill="#1976D2" text-anchor="middle">N = 1, 2, 3...</text>
    <text x="60" y="85" fill="#1976D2" text-anchor="middle">считает сам</text>
  </g>
  
  <!-- Info -->
  <g transform="translate(360, 230)">
    <rect x="0" y="0" width="120" height="100" fill="#FCE4EC" rx="8" stroke="#E91E63"/>
    <text x="60" y="18" font-family="Arial" font-size="9" fill="#880E4F" text-anchor="middle" font-weight="bold">Цикл —</text>
    <text x="60" y="35" font-family="Arial" font-size="8" fill="#AD1457" text-anchor="middle">повторение</text>
    <text x="60" y="50" font-family="Arial" font-size="8" fill="#AD1457" text-anchor="middle">действий</text>
    <text x="60" y="70" font-family="Arial" font-size="8" fill="#C2185B" text-anchor="middle">несколько раз</text>
    
    <circle cx="60" cy="85" r="10" fill="#F48FB1">
      <animate attributeName="r" values="10;12;10" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>