<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#651FFF"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg8)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#6A1B9A" text-anchor="middle">💻 Программирование</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#8E24AA" opacity="0.5"/>
  
  <!-- Computer Screen -->
  <g transform="translate(40, 70)">
    <rect x="0" y="0" width="180" height="130" fill="#455A64" rx="10"/>
    <rect x="10" y="10" width="160" height="100" fill="url(#screenGrad)" rx="5"/>
    <!-- Code lines -->
    <g font-family="monospace" font-size="8">
      <text x="20" y="30" fill="#4FC3F7">robot.forward()</text>
      <text x="20" y="45" fill="#81C784">robot.turn(90)</text>
      <text x="20" y="60" fill="#FFB74D">robot.wait(2)</text>
      <text x="20" y="75" fill="#F06292">robot.stop()</text>
      <!-- Blinking cursor -->
      <rect x="90" y="68" width="6" height="10" fill="#E1BEE7">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <!-- Screen glow -->
    <rect x="10" y="10" width="160" height="100" fill="none" stroke="#7C4DFF" stroke-width="1" rx="5">
      <animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <text x="90" y="145" font-size="10" fill="#6A1B9A" text-anchor="middle" font-family="Arial">Текстовый код</text>
  </g>
  
  <!-- Block Programming -->
  <g transform="translate(280, 60)">
    <text x="90" y="0" font-size="11" font-weight="bold" fill="#6A1B9A" text-anchor="middle" font-family="Arial">Блочное программирование</text>
    
    <!-- Start Block -->
    <g transform="translate(30, 15)">
      <polygon points="0,0 60,0 70,15 60,30 0,30" fill="#4CAF50" rx="3">
        <animate attributeName="fill" values="#4CAF50;#66BB6A;#4CAF50" dur="2s" repeatCount="indefinite"/>
      </polygon>
      <text x="35" y="20" font-size="9" fill="white" text-anchor="middle" font-family="Arial">Старт</text>
    </g>
    
    <!-- Motor Block -->
    <g transform="translate(30, 48)">
      <rect x="0" y="0" width="120" height="28" fill="url(#blockGrad)" rx="3">
        <animate attributeName="opacity" values="1;0.8;1" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <text x="60" y="12" font-size="8" fill="white" text-anchor="middle" font-family="Arial">Мотор B</text>
      <text x="60" y="22" font-size="7" fill="#B3E5FC" text-anchor="middle" font-family="Arial">Вперёд | Скорость 50</text>
    </g>
    
    <!-- Wait Block -->
    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="120" height="28" fill="#FF9800" rx="3">
        <animate attributeName="opacity" values="1;0.8;1" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      </rect>
      <text x="60" y="12" font-size="8" fill="white" text-anchor="middle" font-family="Arial">Ждать</text>
      <text x="60" y="22" font-size="7" fill="#FFE0B2" text-anchor="middle" font-family="Arial">2 секунды</text>
    </g>
    
    <!-- Turn Block -->
    <g transform="translate(30, 112)">
      <rect x="0" y="0" width="120" height="28" fill="#9C27B0" rx="3">
        <animate attributeName="opacity" values="1;0.8;1" dur="1.5s" begin="1s" repeatCount="indefinite"/>
      </rect>
      <text x="60" y="12" font-size="8" fill="white" text-anchor="middle" font-family="Arial">Повернуть</text>
      <text x="60" y="22" font-size="7" fill="#E1BEE7" text-anchor="middle" font-family="Arial">На 90° вправо</text>
    </g>
  </g>
  
  <!-- Algorithm Steps -->
  <g transform="translate(30, 200)">
    <text x="220" y="0" font-size="11" font-weight="bold" fill="#6A1B9A" text-anchor="middle" font-family="Arial">Алгоритм — последовательность действий</text>
    
    <!-- Step 1 -->
    <g transform="translate(20, 15)">
      <circle cx="20" cy="20" r="18" fill="#7C4DFF">
        <animate attributeName="r" values="18;20;18" dur="2s" repeatCount="indefinite"/>
      </circle>
      <text x="20" y="25" font-size="12" fill="white" text-anchor="middle" font-family="Arial">1</text>
      <text x="50" y="25" font-size="9" fill="#4A148C" font-family="Arial">Вперёд</text>
    </g>
    
    <!-- Arrow -->
    <path d="M100,35 L120,35" stroke="#9C27B0" stroke-width="2" fill="none" marker-end="url(#arrow)">
      <animate attributeName="stroke-dasharray" values="0,30;30,0" dur="1s" repeatCount="indefinite"/>
    </path>
    
    <!-- Step 2 -->
    <g transform="translate(130, 15)">
      <circle cx="20" cy="20" r="18" fill="#7C4DFF">
        <animate attributeName="r" values="18;20;18" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      </circle>
      <text x="20" y="25" font-size="12" fill="white" text-anchor="middle" font-family="Arial">2</text>
      <text x="50" y="25" font-size="9" fill="#4A148C" font-family="Arial">Поворот</text>
    </g>
    
    <!-- Arrow -->
    <path d="M210,35 L230,35" stroke="#9C27B0" stroke-width="2" fill="none">
      <animate attributeName="stroke-dasharray" values="0,30;30,0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Step 3 -->
    <g transform="translate(240, 15)">
      <circle cx="20" cy="20" r="18" fill="#7C4DFF">
        <animate attributeName="r" values="18;20;18" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      </circle>
      <text x="20" y="25" font-size="12" fill="white" text-anchor="middle" font-family="Arial">3</text>
      <text x="50" y="25" font-size="9" fill="#4A148C" font-family="Arial">Стоп</text>
    </g>
    
    <!-- Arrow -->
    <path d="M310,35 L330,35" stroke="#9C27B0" stroke-width="2" fill="none">
      <animate attributeName="stroke-dasharray" values="0,30;30,0" dur="1s" begin="0.8s" repeatCount="indefinite"/>
    </path>
    
    <!-- Step 4 -->
    <g transform="translate(340, 15)">
      <circle cx="20" cy="20" r="18" fill="#4CAF50">
        <animate attributeName="r" values="18;20;18" dur="2s" begin="0.9s" repeatCount="indefinite"/>
      </circle>
      <text x="20" y="25" font-size="12" fill="white" text-anchor="middle" font-family="Arial">✓</text>
      <text x="50" y="25" font-size="9" fill="#2E7D32" font-family="Arial">Готово!</text>
    </g>
  </g>
  
  <!-- Info Box -->
  <g transform="translate(30, 290)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="50" fill="#F3E5F5" rx="8" stroke="#8E24AA"/>
    <text x="220" y="18" font-size="11" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Программа — это инструкция для робота!</text>
    <text x="220" y="33" font-size="10" fill="#8E24AA" text-anchor="middle">Команды выполняются по порядку: 1 → 2 → 3 → ...</text>
    <text x="220" y="46" font-size="9" fill="#AB47BC" text-anchor="middle">Блочное программирование — собираешь программу как конструктор!</text>
  </g>
</svg>