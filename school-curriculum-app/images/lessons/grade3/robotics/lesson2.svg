<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="brick1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF5350"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <linearGradient id="brick2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="brick3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="brick4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFCA28"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg2)"/>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1565C0" text-anchor="middle">🔧 Детали конструктора</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#1976D2" opacity="0.5"/>
  
  <!-- Shelf/Table -->
  <rect x="30" y="280" width="440" height="15" fill="#8D6E63" rx="3"/>
  <rect x="30" y="295" width="440" height="40" fill="#6D4C41"/>
  
  <!-- Red Brick -->
  <g transform="translate(60, 70)">
    <rect x="0" y="0" width="80" height="50" fill="url(#brick1)" rx="5" stroke="#B71C1C" stroke-width="2">
      <animate attributeName="y" values="0;-5;0" dur="2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="20" cy="15" r="8" fill="#FFCDD2"/>
    <circle cx="40" cy="15" r="8" fill="#FFCDD2"/>
    <circle cx="60" cy="15" r="8" fill="#FFCDD2"/>
    <circle cx="30" cy="35" r="8" fill="#FFCDD2"/>
    <circle cx="50" cy="35" r="8" fill="#FFCDD2"/>
    <text x="40" y="75" font-size="10" fill="#C62828" text-anchor="middle" font-family="Arial">Брусок</text>
  </g>
  
  <!-- Blue Plate -->
  <g transform="translate(170, 80)">
    <rect x="0" y="0" width="100" height="15" fill="url(#brick2)" rx="3" stroke="#0D47A1" stroke-width="2">
      <animate attributeName="y" values="0;-3;0" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <circle cx="15" cy="7" r="5" fill="#BBDEFB"/>
    <circle cx="35" cy="7" r="5" fill="#BBDEFB"/>
    <circle cx="55" cy="7" r="5" fill="#BBDEFB"/>
    <circle cx="75" cy="7" r="5" fill="#BBDEFB"/>
    <text x="50" y="40" font-size="10" fill="#1565C0" text-anchor="middle" font-family="Arial">Пластина</text>
  </g>
  
  <!-- Green Beam -->
  <g transform="translate(310, 60)">
    <rect x="0" y="0" width="20" height="100" fill="url(#brick3)" rx="3" stroke="#1B5E20" stroke-width="2">
      <animate attributeName="x" values="0;5;0" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="10" cy="15" r="4" fill="#C8E6C9"/>
    <circle cx="10" cy="35" r="4" fill="#C8E6C9"/>
    <circle cx="10" cy="55" r="4" fill="#C8E6C9"/>
    <circle cx="10" cy="75" r="4" fill="#C8E6C9"/>
    <text x="10" y="120" font-size="10" fill="#2E7D32" text-anchor="middle" font-family="Arial">Балка</text>
  </g>
  
  <!-- Yellow Axle -->
  <g transform="translate(380, 55)">
    <rect x="0" y="0" width="8" height="90" fill="url(#brick4)" rx="4" stroke="#F57F17" stroke-width="1">
      <animate attributeName="rotate" values="0;5;0;-5;0" dur="3s" repeatCount="indefinite" additive="sum"/>
    </rect>
    <circle cx="4" cy="0" r="6" fill="#FFE082"/>
    <circle cx="4" cy="90" r="6" fill="#FFE082"/>
    <text x="4" y="115" font-size="10" fill="#F9A825" text-anchor="middle" font-family="Arial">Ось</text>
  </g>
  
  <!-- Connector Peg -->
  <g transform="translate(430, 70)">
    <ellipse cx="15" cy="0" rx="10" ry="5" fill="#78909C"/>
    <rect x="5" y="0" width="20" height="40" fill="#90A4AE" rx="2">
      <animate attributeName="height" values="40;45;40" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="15" cy="40" rx="10" ry="5" fill="#B0BEC5"/>
    <text x="15" y="65" font-size="10" fill="#546E7A" text-anchor="middle" font-family="Arial">Штифт</text>
  </g>
  
  <!-- Info Box -->
  <g transform="translate(30, 200)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="440" height="70" fill="#E3F2FD" rx="8" stroke="#1976D2"/>
    <text x="220" y="20" font-size="12" font-weight="bold" fill="#0D47A1" text-anchor="middle">Детали конструктора — основа любого робота!</text>
    <text x="220" y="38" font-size="10" fill="#1565C0" text-anchor="middle">🔹 Бруски и балки — каркас робота</text>
    <text x="220" y="52" font-size="10" fill="#1565C0" text-anchor="middle">🔹 Штифты и оси — соединяют детали</text>
    <text x="220" y="66" font-size="10" fill="#1565C0" text-anchor="middle">🔹 Пластины — основа для крепления</text>
  </g>
  
  <!-- Decorative gears -->
  <g transform="translate(20, 50)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#90CAF9" stroke-width="3" stroke-dasharray="8 4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(480, 320)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#90CAF9" stroke-width="3" stroke-dasharray="10 5">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>