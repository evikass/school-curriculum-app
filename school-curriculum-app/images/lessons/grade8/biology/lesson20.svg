<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Первая помощь при кровотечениях</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 20</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Types of Bleeding Section -->
<text x="250" y="65" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">ВИДЫ КРОВОТЕЧЕНИЙ</text>

<!-- Capillary Bleeding -->
<g transform="translate(30,75)">
  <rect x="0" y="0" width="140" height="65" fill="#fff" fill-opacity="0.7" stroke="#FF9800" stroke-width="1.2" rx="5"/>
  <text x="70" y="13" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">КАПИЛЛЯРНОЕ</text>

  <!-- Skin cross-section with capillary -->
  <rect x="15" y="18" width="110" height="30" fill="#FFECB3" stroke="#F9A825" stroke-width="0.8" rx="2"/>
  <!-- Skin surface line -->
  <line x1="15" y1="25" x2="125" y2="25" stroke="#E65100" stroke-width="1"/>

  <!-- Small dots representing slow capillary bleed -->
  <circle cx="50" cy="24" r="1.5" fill="#FF9800" opacity="0.7"/>
  <circle cx="55" cy="23" r="1" fill="#FF9800" opacity="0.6"/>
  <circle cx="60" cy="24" r="1.2" fill="#FF9800" opacity="0.5"/>
  <circle cx="52" cy="22" r="0.8" fill="#FF9800" opacity="0.4"/>
  <circle cx="58" cy="22" r="1" fill="#FF9800" opacity="0.5"/>

  <!-- Capillary inside skin -->
  <line x1="40" y1="30" x2="70" y2="30" stroke="#FF9800" stroke-width="1" opacity="0.5"/>

  <text x="70" y="56" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Медленное, капли на поверхности</text>
  <text x="70" y="63" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">Опасность минимальная</text>
</g>

<!-- Venous Bleeding -->
<g transform="translate(180,75)">
  <rect x="0" y="0" width="140" height="65" fill="#fff" fill-opacity="0.7" stroke="#283593" stroke-width="1.2" rx="5"/>
  <text x="70" y="13" font-family="Arial,sans-serif" font-size="7" fill="#283593" text-anchor="middle" font-weight="bold">ВЕНОЗНОЕ</text>

  <!-- Skin cross-section with vein -->
  <rect x="15" y="18" width="110" height="30" fill="#FFECB3" stroke="#F9A825" stroke-width="0.8" rx="2"/>
  <line x1="15" y1="25" x2="125" y2="25" stroke="#E65100" stroke-width="1"/>

  <!-- Steady dark red flow -->
  <rect x="48" y="20" width="6" height="8" fill="#5C6BC0" opacity="0.6" rx="1"/>
  <path d="M50,28 L50,35 L48,40 L52,45" stroke="#283593" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- Vein inside -->
  <ellipse cx="55" cy="35" rx="12" ry="4" fill="#C5CAE9" stroke="#283593" stroke-width="0.8" opacity="0.5"/>

  <text x="70" y="56" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Равномерное, тёмно-красная кровь</text>
  <text x="70" y="63" font-family="Arial,sans-serif" font-size="5" fill="#283593" text-anchor="middle" font-weight="bold">Опасность значительная</text>
</g>

<!-- Arterial Bleeding -->
<g transform="translate(330,75)">
  <rect x="0" y="0" width="140" height="65" fill="#fff" fill-opacity="0.7" stroke="#C62828" stroke-width="1.5" rx="5"/>
  <text x="70" y="13" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">АРТЕРИАЛЬНОЕ</text>

  <!-- Pulsing bright red stream -->
  <rect x="15" y="18" width="110" height="30" fill="#FFECB3" stroke="#F9A825" stroke-width="0.8" rx="2"/>
  <line x1="15" y1="25" x2="125" y2="25" stroke="#E65100" stroke-width="1"/>

  <!-- Spurting stream with pulse pattern -->
  <path d="M55,24 L60,18 L62,10 L58,5 L60,2" stroke="#E53935" stroke-width="2.5" fill="none" opacity="0.8"/>
  <path d="M58,24 L62,16 L65,8 L62,3" stroke="#EF5350" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Pulsing droplets -->
  <circle cx="62" cy="8" r="2" fill="#E53935" opacity="0.7"/>
  <circle cx="58" cy="4" r="1.5" fill="#E53935" opacity="0.5"/>
  <circle cx="66" cy="12" r="1.5" fill="#E53935" opacity="0.5"/>

  <!-- Artery inside -->
  <ellipse cx="55" cy="35" rx="10" ry="3" fill="#FFCDD2" stroke="#C62828" stroke-width="1" opacity="0.5"/>

  <text x="70" y="56" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Пульсирующее, ярко-алая кровь</text>
  <text x="70" y="63" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle" font-weight="bold">⚠ ОПАСНОСТЬ ДЛЯ ЖИЗНИ!</text>
</g>

<!-- First Aid Steps -->
<text x="250" y="155" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">ПЕРВАЯ ПОМОЩЬ ПРИ КАЖДОМ ВИДЕ КРОВОТЕЧЕНИЯ</text>

<!-- Capillary first aid -->
<g transform="translate(30,162)">
  <rect x="0" y="0" width="140" height="50" fill="#FFF3E0" stroke="#FF9800" stroke-width="1" rx="5"/>
  <text x="70" y="12" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Капиллярное</text>
  <text x="8" y="23" font-family="Arial,sans-serif" font-size="5.5" fill="#333">1. Промыть рану антисептиком</text>
  <text x="8" y="32" font-family="Arial,sans-serif" font-size="5.5" fill="#333">2. Наложить стерильную повязку</text>
  <text x="8" y="41" font-family="Arial,sans-serif" font-size="5.5" fill="#333">3. Прижать на 5–10 минут</text>
</g>

<!-- Venous first aid -->
<g transform="translate(180,162)">
  <rect x="0" y="0" width="140" height="50" fill="#E8EAF6" stroke="#283593" stroke-width="1" rx="5"/>
  <text x="70" y="12" font-family="Arial,sans-serif" font-size="6" fill="#283593" text-anchor="middle" font-weight="bold">Венозное</text>
  <text x="8" y="23" font-family="Arial,sans-serif" font-size="5.5" fill="#333">1. Приподнять конечность</text>
  <text x="8" y="32" font-family="Arial,sans-serif" font-size="5.5" fill="#333">2. Наложить давящую повязку</text>
  <text x="8" y="41" font-family="Arial,sans-serif" font-size="5.5" fill="#333">3. Обработать края раны</text>
</g>

<!-- Arterial first aid -->
<g transform="translate(330,162)">
  <rect x="0" y="0" width="140" height="50" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5" rx="5"/>
  <text x="70" y="12" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Артериальное</text>
  <text x="8" y="23" font-family="Arial,sans-serif" font-size="5.5" fill="#B71C1C" font-weight="bold">1. Зажать артерию пальцем!</text>
  <text x="8" y="32" font-family="Arial,sans-serif" font-size="5.5" fill="#333">2. Наложить ЖГУТ выше раны</text>
  <text x="8" y="41" font-family="Arial,sans-serif" font-size="5.5" fill="#333">3. Записать время наложения!</text>
</g>

<!-- Tourniquet Rules Panel -->
<rect x="15" y="220" width="230" height="92" fill="#fff" fill-opacity="0.8" stroke="#C62828" stroke-width="1.5" rx="5"/>
<text x="130" y="234" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">⚠ ПРАВИЛА НАЛОЖЕНИЯ ЖГУТА</text>

<!-- Arm with tourniquet diagram -->
<g transform="translate(45,265)">
  <!-- Arm outline -->
  <rect x="-20" y="-8" width="80" height="16" fill="#FFCCBC" stroke="#BF360C" stroke-width="1" rx="8"/>
  <!-- Tourniquet -->
  <rect x="10" y="-12" width="10" height="24" fill="#E53935" stroke="#B71C1C" stroke-width="1.5" rx="2"/>
  <line x1="20" y1="-12" x2="30" y2="-18" stroke="#B71C1C" stroke-width="1"/>
  <text x="35" y="-15" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" font-weight="bold">Жгут</text>
  <!-- Wound -->
  <rect x="45" y="-4" width="12" height="8" fill="#FFCDD2" stroke="#C62828" stroke-width="1" rx="2"/>
  <text x="51" y="14" font-family="Arial,sans-serif" font-size="4.5" fill="#C62828" text-anchor="middle">Рана</text>
  <!-- Above wound label -->
  <line x1="15" y1="-14" x2="15" y2="-22" stroke="#B71C1C" stroke-width="0.8"/>
  <text x="15" y="-24" font-family="Arial,sans-serif" font-size="4" fill="#B71C1C" text-anchor="middle" font-weight="bold">Выше раны</text>
</g>

<text x="145" y="290" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Летом — не более 1 часа</text>
<text x="145" y="299" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Зимой — не более 30 минут</text>
<text x="145" y="308" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" font-weight="bold">• Ослабить через 20 мин на 5 мин!</text>

<!-- Arterial Pressure Points -->
<rect x="260" y="220" width="225" height="92" fill="#fff" fill-opacity="0.8" stroke="#2E7D32" stroke-width="1" rx="5"/>
<text x="372" y="234" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">ТОЧКИ ПРИЖАТИЯ АРТЕРИЙ</text>

<!-- Simplified body outline with pressure points -->
<g transform="translate(320,248)">
  <!-- Head -->
  <circle cx="30" cy="5" r="8" fill="#FFECB3" stroke="#E65100" stroke-width="0.8"/>
  <!-- Body -->
  <rect x="20" y="13" width="20" height="25" fill="#FFECB3" stroke="#E65100" stroke-width="0.8" rx="3"/>
  <!-- Arms -->
  <line x1="20" y1="18" x2="2" y2="35" stroke="#E65100" stroke-width="2"/>
  <line x1="40" y1="18" x2="58" y2="35" stroke="#E65100" stroke-width="2"/>
  <!-- Legs -->
  <line x1="27" y1="38" x2="22" y2="58" stroke="#E65100" stroke-width="2"/>
  <line x1="33" y1="38" x2="38" y2="58" stroke="#E65100" stroke-width="2"/>

  <!-- Pressure points -->
  <circle cx="30" cy="2" r="2" fill="#C62828"/>
  <text x="42" y="5" font-family="Arial,sans-serif" font-size="4" fill="#C62828" font-weight="bold">Височная</text>

  <circle cx="12" cy="14" r="2" fill="#C62828"/>
  <text x="-5" y="14" font-family="Arial,sans-serif" font-size="4" fill="#C62828" font-weight="bold">Подключичная</text>

  <circle cx="10" cy="30" r="2" fill="#C62828"/>
  <text x="-8" y="32" font-family="Arial,sans-serif" font-size="4" fill="#C62828" font-weight="bold">Плечевая</text>

  <circle cx="5" cy="42" r="2" fill="#C62828"/>
  <text x="-10" y="44" font-family="Arial,sans-serif" font-size="4" fill="#C62828" font-weight="bold">Лучевая</text>

  <circle cx="23" cy="52" r="2" fill="#C62828"/>
  <text x="3" y="58" font-family="Arial,sans-serif" font-size="4" fill="#C62828" font-weight="bold">Бедренная</text>

  <circle cx="35" cy="58" r="2" fill="#C62828"/>
  <text x="40" y="58" font-family="Arial,sans-serif" font-size="4" fill="#C62828" font-weight="bold">Подколенная</text>
</g>

<!-- Emergency Algorithm for Arterial Bleeding -->
<rect x="15" y="313" width="470" height="14" fill="#C62828" rx="3" opacity="0.9"/>
<text x="250" y="323" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle" font-weight="bold">АЛГОРИТМ: Прижать артерию → Наложить жгут → Записать время → Вызвать скорую → Обработать рану</text>

<!-- Footer -->
<rect x="3" y="325" width="494" height="22" fill="#2E7D32" rx="0"/>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Капиллярное • Венозное • Артериальное • Жгут • Давящая повязка</text>
</svg>