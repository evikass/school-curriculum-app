<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg28" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="plate28" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrow28" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg28)" rx="12"/>
  <rect width="500" height="350" fill="none" rx="12" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Title -->
  <text x="250" y="22" font-family="Arial, sans-serif" font-size="14" fill="#1B5E20" text-anchor="middle" font-weight="bold">Гигиена питания. Предупреждение ЖКТ заболеваний</text>
  <text x="250" y="34" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 28</text>
  <line x1="15" y1="40" x2="485" y2="40" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- LEFT: Healthy Eating Plate -->
  <rect x="12" y="46" width="210" height="155" rx="6" fill="white" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="117" y="58" font-family="Arial, sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Тарелка питания</text>

  <!-- Plate outline -->
  <ellipse cx="117" cy="125" rx="85" ry="60" fill="url(#plate28)" stroke="#9E9E9E" stroke-width="1.5"/>

  <!-- 1/2 Vegetables and Fruits (green) -->
  <path d="M117 65 A60 60 0 0 1 177 125 L117 125 Z" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.8" opacity="0.8"/>
  <text x="142" y="98" font-family="Arial, sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Овощи</text>
  <text x="142" y="107" font-family="Arial, sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">и фрукты</text>
  <text x="142" y="116" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">1/2</text>

  <!-- Veggie icons -->
  <circle cx="130" cy="82" r="4" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.3"/>
  <circle cx="150" cy="78" r="3.5" fill="#FF7043" stroke="#D84315" stroke-width="0.3"/>

  <!-- 1/4 Proteins (red/pink) -->
  <path d="M177 125 A60 60 0 0 1 117 185 L117 125 Z" fill="#EF9A9A" stroke="#E53935" stroke-width="0.8" opacity="0.7"/>
  <text x="145" y="148" font-family="Arial, sans-serif" font-size="6" fill="#B71C1C" text-anchor="middle" font-weight="bold">Белки</text>
  <text x="145" y="157" font-family="Arial, sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">(мясо, рыба)</text>
  <text x="145" y="168" font-family="Arial, sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">1/4</text>

  <!-- 1/4 Carbs (amber) -->
  <path d="M117 185 A60 60 0 0 1 57 125 L117 125 Z" fill="#FFE082" stroke="#FFA000" stroke-width="0.8" opacity="0.7"/>
  <text x="90" y="148" font-family="Arial, sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Углеводы</text>
  <text x="90" y="157" font-family="Arial, sans-serif" font-size="5.5" fill="#FF8F00" text-anchor="middle">(крупы, хлеб)</text>
  <text x="90" y="168" font-family="Arial, sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">1/4</text>

  <!-- Plate divider lines -->
  <line x1="117" y1="65" x2="117" y2="185" stroke="#9E9E9E" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="57" y1="125" x2="177" y2="125" stroke="#9E9E9E" stroke-width="0.5" stroke-dasharray="2,2"/>

  <!-- Center dot -->
  <circle cx="117" cy="125" r="2" fill="#9E9E9E"/>

  <!-- RIGHT: GI Diseases -->
  <rect x="230" y="46" width="258" height="155" rx="6" fill="white" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="359" y="58" font-family="Arial, sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Заболевания ЖКТ</text>

  <!-- Simplified digestive tract -->
  <!-- Esophagus -->
  <rect x="340" y="65" width="8" height="20" rx="3" fill="#FFAB91" stroke="#E64A19" stroke-width="0.5"/>
  <text x="355" y="78" font-family="Arial, sans-serif" font-size="5" fill="#888">Пищевод</text>

  <!-- Stomach -->
  <path d="M320 85 C320 80 370 80 370 90 C370 105 365 120 355 125 C345 128 325 128 320 120 C318 112 320 95 320 85 Z" fill="#FFCDD2" stroke="#E57373" stroke-width="0.8"/>

  <!-- Gastritis marker -->
  <circle cx="345" cy="100" r="10" fill="#F44336" opacity="0.3" stroke="#D32F2F" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="345" y="103" font-family="Arial, sans-serif" font-size="5" fill="#C62828" text-anchor="middle" font-weight="bold">Гастрит</text>

  <!-- Ulcer marker -->
  <circle cx="360" cy="112" r="3" fill="#D32F2F" stroke="#B71C1C" stroke-width="0.5"/>
  <line x1="363" y1="112" x2="395" y2="104" stroke="#D32F2F" stroke-width="0.5"/>
  <text x="396" y="102" font-family="Arial, sans-serif" font-size="5.5" fill="#C62828" font-weight="bold">Язва</text>
  <text x="396" y="110" font-family="Arial, sans-serif" font-size="4.5" fill="#E57373">желудка/12-п.к.</text>

  <!-- Duodenum -->
  <path d="M340 125 Q340 135 355 135 L380 135 Q395 135 395 125 L395 118" fill="none" stroke="#FF8A65" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Small intestine -->
  <path d="M395 118 Q410 118 410 130 Q410 142 425 142 Q440 142 440 130 Q440 118 455 118 Q470 118 470 130" fill="none" stroke="#FF8A65" stroke-width="5" stroke-linecap="round" opacity="0.4"/>

  <!-- Large intestine -->
  <path d="M290 138 L290 100 L470 100" fill="none" stroke="#A1887F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>

  <!-- Appendix -->
  <path d="M290 145 L285 158 L288 155" fill="none" stroke="#A1887F" stroke-width="2" stroke-linecap="round"/>
  <circle cx="284" cy="160" r="6" fill="#FFCDD2" stroke="#E57373" stroke-width="0.8" stroke-dasharray="2,1"/>
  <text x="284" y="163" font-family="Arial, sans-serif" font-size="4.5" fill="#C62828" text-anchor="middle" font-weight="bold">Аппендицит</text>

  <!-- Dysbacteriosis -->
  <rect x="290" y="148" width="80" height="14" rx="3" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>
  <text x="330" y="158" font-family="Arial, sans-serif" font-size="5" fill="#F57F17" text-anchor="middle" font-weight="bold">Дисбактериоз</text>
  <line x1="330" y1="148" x2="330" y2="140" stroke="#FBC02D" stroke-width="0.5"/>

  <!-- Disease descriptions -->
  <rect x="240" y="170" width="240" height="28" rx="3" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.4"/>
  <text x="245" y="180" font-family="Arial, sans-serif" font-size="5.5" fill="#C62828">Гастрит — воспаление слизистой желудка</text>
  <text x="245" y="189" font-family="Arial, sans-serif" font-size="5.5" fill="#C62828">Язва — дефект стенки желудка/12-перстной кишки</text>
  <text x="245" y="196" font-family="Arial, sans-serif" font-size="5.5" fill="#C62828" opacity="0.9">Аппендицит — воспаление червеобразного отростка</text>

  <!-- BOTTOM LEFT: Hygiene Rules -->
  <rect x="12" y="207" width="235" height="90" rx="5" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="130" y="219" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Правила гигиены питания</text>

  <rect x="20" y="226" width="218" height="65" rx="4" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.4"/>

  <!-- Rule icons and text -->
  <circle cx="32" cy="237" r="6" fill="#4CAF50" opacity="0.3"/>
  <text x="32" y="240" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">✓</text>
  <text x="43" y="240" font-family="Arial, sans-serif" font-size="6.5" fill="#333">Регулярное питание (3-5 раз в день)</text>

  <circle cx="32" cy="252" r="6" fill="#4CAF50" opacity="0.3"/>
  <text x="32" y="255" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">✓</text>
  <text x="43" y="255" font-family="Arial, sans-serif" font-size="6.5" fill="#333">Тщательное пережёвывание пищи</text>

  <circle cx="32" cy="267" r="6" fill="#4CAF50" opacity="0.3"/>
  <text x="32" y="270" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">✓</text>
  <text x="43" y="270" font-family="Arial, sans-serif" font-size="6.5" fill="#333">Чистая свежая пища, мытьё рук</text>

  <circle cx="32" cy="282" r="6" fill="#4CAF50" opacity="0.3"/>
  <text x="32" y="285" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">✓</text>
  <text x="43" y="285" font-family="Arial, sans-serif" font-size="6.5" fill="#333">Не переедать, умеренные порции</text>

  <!-- BOTTOM RIGHT: Food Poisoning -->
  <rect x="255" y="207" width="233" height="90" rx="5" fill="white" opacity="0.7" stroke="#C62828" stroke-width="0.7"/>
  <text x="371" y="219" font-family="Arial, sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">Пищевое отравление</text>

  <!-- Symptoms -->
  <rect x="263" y="225" width="110" height="68" rx="3" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.4"/>
  <text x="318" y="235" font-family="Arial, sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Симптомы:</text>
  <text x="270" y="247" font-family="Arial, sans-serif" font-size="6" fill="#D32F2F">• Тошнота, рвота</text>
  <text x="270" y="257" font-family="Arial, sans-serif" font-size="6" fill="#D32F2F">• Боль в животе</text>
  <text x="270" y="267" font-family="Arial, sans-serif" font-size="6" fill="#D32F2F">• Диарея</text>
  <text x="270" y="277" font-family="Arial, sans-serif" font-size="6" fill="#D32F2F">• Повышение температуры</text>
  <text x="270" y="287" font-family="Arial, sans-serif" font-size="6" fill="#D32F2F">• Слабость, головокружение</text>

  <!-- First aid -->
  <rect x="378" y="225" width="105" height="68" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.4"/>
  <text x="430" y="235" font-family="Arial, sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Первая помощь:</text>
  <text x="384" y="247" font-family="Arial, sans-serif" font-size="6" fill="#2E7D32">1. Промыть желудок</text>
  <text x="384" y="257" font-family="Arial, sans-serif" font-size="6" fill="#2E7D32">2. Обильное питьё</text>
  <text x="384" y="267" font-family="Arial, sans-serif" font-size="6" fill="#2E7D32">3. Сорбенты (активир.</text>
  <text x="384" y="275" font-family="Arial, sans-serif" font-size="6" fill="#2E7D32">   уголь)</text>
  <text x="384" y="287" font-family="Arial, sans-serif" font-size="6" fill="#2E7D32">4. Вызвать врача!</text>

  <!-- Key warning -->
  <rect x="12" y="302" width="476" height="18" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.6"/>
  <text x="250" y="314" font-family="Arial, sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">⚠ Самолечение опасно! При болях в животе — немедленно обратитесь к врачу</text>

  <!-- Footer -->
  <rect x="0" y="335" width="500" height="15" rx="0" fill="#2E7D32"/>
  <text x="250" y="346" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Гигиена питания — основа здоровья ЖКТ | Профилактика лучше лечения</text>
</svg>