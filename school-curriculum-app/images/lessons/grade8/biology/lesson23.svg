<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="lungInhale" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCDD2"/>
      <stop offset="100%" style="stop-color:#EF9A9A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Дыхательные движения. Жизненная ёмкость лёгких</text>
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 8 класс — Урок 23</text>
  <line x1="20" y1="40" x2="480" y2="40" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>

  <!-- === LEFT: INHALATION === -->
  <rect x="12" y="48" width="155" height="175" rx="6" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="89" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Вдох</text>
  <text x="89" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">(инспирация)</text>

  <!-- Ribcage - expanded -->
  <path d="M45,85 Q89,78 133,85 L128,155 Q89,170 50,155 Z" fill="none" stroke="#8D6E63" stroke-width="1.5"/>
  <!-- Ribs up and out -->
  <path d="M50,95 Q89,88 128,95" fill="none" stroke="#A1887F" stroke-width="1"/>
  <path d="M52,108 Q89,100 126,108" fill="none" stroke="#A1887F" stroke-width="1"/>
  <path d="M53,120 Q89,113 125,120" fill="none" stroke="#A1887F" stroke-width="1"/>
  <path d="M54,132 Q89,126 124,132" fill="none" stroke="#A1887F" stroke-width="1"/>
  <path d="M55,144 Q89,138 123,144" fill="none" stroke="#A1887F" stroke-width="1"/>

  <!-- Arrow showing ribs moving up/out -->
  <path d="M38,130 L32,118" stroke="#FF6F00" stroke-width="1" fill="none"/>
  <polygon points="30,115 35,117 32,122" fill="#FF6F00"/>
  <path d="M140,130 L146,118" stroke="#FF6F00" stroke-width="1" fill="none"/>
  <polygon points="148,115 143,117 146,122" fill="#FF6F00"/>
  <text x="22" y="112" font-family="Arial,sans-serif" font-size="5" fill="#FF6F00">↑</text>
  <text x="150" y="112" font-family="Arial,sans-serif" font-size="5" fill="#FF6F00">↑</text>

  <!-- Lungs expanded -->
  <path d="M58,92 Q48,100 48,120 Q48,140 58,150 Q68,155 75,148 Q78,130 76,110 Q74,95 58,92Z" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8" opacity="0.7"/>
  <path d="M120,92 Q130,100 130,120 Q130,140 120,150 Q110,155 103,148 Q100,130 102,110 Q104,95 120,92Z" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8" opacity="0.7"/>

  <!-- Diaphragm - FLATTENED (contracted) -->
  <path d="M50,155 Q89,160 128,155" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="89" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">Диафрагма</text>
  <text x="89" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0">сокращается (уплощается)</text>

  <!-- Down arrow for diaphragm -->
  <path d="M89,162 L89,172" stroke="#1565C0" stroke-width="1" fill="none"/>
  <polygon points="86,172 92,172 89,176" fill="#1565C0"/>

  <!-- Air flow in -->
  <text x="89" y="85" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" font-weight="bold">воздух → ↓</text>

  <!-- Pressure note -->
  <text x="89" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Давление в плевре ↓</text>
  <text x="89" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Лёгкие расширяются</text>

  <!-- === RIGHT: EXHALATION === -->
  <rect x="175" y="48" width="155" height="175" rx="6" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="252" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Выдох</text>
  <text x="252" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">(экспирация)</text>

  <!-- Ribcage - compressed -->
  <path d="M52,90 Q252,83 252,90 L247,148 Q252,160 57,148 Z" fill="none" stroke="#8D6E63" stroke-width="1.5" transform="translate(-163,0)"/>
  <path d="M208,85 Q252,80 296,85 L291,142 Q252,155 213,142 Z" fill="none" stroke="#8D6E63" stroke-width="1.5"/>

  <!-- Ribs down and in -->
  <path d="M215,95 Q252,90 289,95" fill="none" stroke="#A1887F" stroke-width="1"/>
  <path d="M217,107 Q252,102 287,107" fill="none" stroke="#A1887F" stroke-width="1"/>
  <path d="M218,118 Q252,114 286,118" fill="none" stroke="#A1887F" stroke-width="1"/>
  <path d="M219,128 Q252,125 285,128" fill="none" stroke="#A1887F" stroke-width="1"/>
  <path d="M220,138 Q252,135 284,138" fill="none" stroke="#A1887F" stroke-width="1"/>

  <!-- Arrows showing ribs moving down/in -->
  <path d="M203,108 L198,120" stroke="#FF6F00" stroke-width="1" fill="none"/>
  <polygon points="196,123 201,121 198,116" fill="#FF6F00"/>
  <path d="M301,108 L306,120" stroke="#FF6F00" stroke-width="1" fill="none"/>
  <polygon points="308,123 303,121 306,116" fill="#FF6F00"/>

  <!-- Lungs compressed -->
  <path d="M222,92 Q215,98 215,115 Q215,132 222,140 Q228,143 232,138 Q234,125 233,112 Q232,95 222,92Z" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8" opacity="0.7"/>
  <path d="M282,92 Q289,98 289,115 Q289,132 282,140 Q276,143 272,138 Q270,125 271,112 Q272,95 282,92Z" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8" opacity="0.7"/>

  <!-- Diaphragm - DOMED (relaxed) -->
  <path d="M213,142 Q252,130 291,142" fill="none" stroke="#1565C0" stroke-width="2.5"/>
  <text x="252" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">Диафрагма</text>
  <text x="252" y="173" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0">расслабляется (поднимается)</text>

  <!-- Up arrow for diaphragm -->
  <path d="M252,140 L252,132" stroke="#1565C0" stroke-width="1" fill="none"/>
  <polygon points="249,132 255,132 252,128" fill="#1565C0"/>

  <!-- Air flow out -->
  <text x="252" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold">↑ воздух →</text>

  <!-- Pressure note -->
  <text x="252" y="196" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Давление в плевре ↑</text>
  <text x="252" y="204" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Лёгкие сжимаются</text>

  <!-- === SPIROMETRY GRAPH === -->
  <rect x="338" y="48" width="152" height="175" rx="6" fill="white" fill-opacity="0.8" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="414" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Лёгочные объёмы</text>

  <!-- Y axis -->
  <line x1="360" y1="70" x2="360" y2="215" stroke="#333" stroke-width="0.8"/>
  <text x="350" y="75" font-family="Arial,sans-serif" font-size="5" fill="#333">мл</text>
  <text x="355" y="80" font-family="Arial,sans-serif" font-size="5" fill="#333">4500|</text>
  <line x1="358" y1="78" x2="360" y2="78" stroke="#333" stroke-width="0.5"/>

  <!-- Stacked bar chart -->
  <!-- Остаточный объём (bottom) -->
  <rect x="375" y="190" width="50" height="25" rx="2" fill="#B0BEC5" stroke="#78909C" stroke-width="0.5"/>
  <text x="400" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#fff" font-weight="bold">1000</text>
  <text x="430" y="205" font-family="Arial,sans-serif" font-size="5.5" fill="#546E7A">Остаточный объём</text>

  <!-- РОвыд (Reserve expiratory) -->
  <rect x="375" y="152" width="50" height="38" rx="2" fill="#90CAF9" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="400" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" font-weight="bold">1500</text>
  <text x="430" y="170" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0">Резерв выдоха</text>
  <text x="430" y="177" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0">(РОвыд)</text>

  <!-- ДО (Tidal volume) -->
  <rect x="375" y="140" width="50" height="12" rx="2" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="400" y="149" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" font-weight="bold">500</text>
  <text x="430" y="149" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">Дыхательный</text>
  <text x="430" y="155" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">объём (ДО)</text>

  <!-- РОвд (Reserve inspiratory) -->
  <rect x="375" y="102" width="50" height="38" rx="2" fill="#FFCC80" stroke="#FFA726" stroke-width="0.5"/>
  <text x="400" y="125" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">1500</text>
  <text x="430" y="115" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">Резерв вдоха</text>
  <text x="430" y="122" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">(РОвд)</text>

  <!-- ЖЕЛ bracket -->
  <path d="M370,100 L367,100 L367,192 L370,192" fill="none" stroke="#C62828" stroke-width="1"/>
  <text x="364" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold" transform="rotate(-90,364,150)">ЖЕЛ ≈ 3500 мл</text>

  <!-- ЖЕЛ formula -->
  <text x="414" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold">ЖЕЛ = ДО + РОвд + РОвыд</text>

  <!-- === BOTTOM PANEL: Regulation of breathing === -->
  <rect x="12" y="230" width="478" height="98" rx="6" fill="white" fill-opacity="0.8" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="250" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Регуляция дыхания</text>
  <line x1="22" y1="248" x2="478" y2="248" stroke="#2E7D32" stroke-width="0.3"/>

  <!-- Medulla oblongata diagram -->
  <ellipse cx="80" cy="280" rx="35" ry="22" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1"/>
  <text x="80" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#4A148C" font-weight="bold">Продолговатый</text>
  <text x="80" y="286" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#4A148C" font-weight="bold">мозг</text>
  <text x="80" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Дыхательный центр</text>

  <!-- Arrow from medulla to intercostal muscles -->
  <path d="M115,275 L150,275" stroke="#7B1FA2" stroke-width="0.8" fill="none"/>
  <polygon points="152,273 156,275 152,277" fill="#7B1FA2"/>

  <!-- Intercostal muscles -->
  <rect x="155" y="262" width="80" height="28" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="195" y="274" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" font-weight="bold">Межрёберные мышцы</text>
  <text x="195" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">+ диафрагма</text>

  <!-- Arrow to result -->
  <path d="M235,276 L265,276" stroke="#F9A825" stroke-width="0.8" fill="none"/>
  <polygon points="267,274 271,276 267,278" fill="#F9A825"/>

  <!-- Result -->
  <rect x="272" y="262" width="55" height="28" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="299" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" font-weight="bold">Дыхательные</text>
  <text x="299" y="284" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" font-weight="bold">движения</text>

  <!-- CO2 feedback loop -->
  <path d="M299,290 L299,308 L80,308 L80,302" stroke="#1565C0" stroke-width="0.8" fill="none" stroke-dasharray="3,2"/>
  <polygon points="78,304 80,298 82,304" fill="#1565C0"/>
  <text x="190" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0">↑ CO₂ в крови стимулирует дыхательный центр</text>

  <!-- Chemical regulation -->
  <rect x="345" y="255" width="135" height="68" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
  <text x="412" y="267" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" font-weight="bold">Химическая регуляция</text>
  <text x="352" y="278" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• ↑ CO₂ — учащение дыхания</text>
  <text x="352" y="287" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• ↓ CO₂ — урежение дыхания</text>
  <text x="352" y="296" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Рецепторы: аорта, сонная</text>
  <text x="352" y="305" font-family="Arial,sans-serif" font-size="5.5" fill="#333">  артерия, продолговатый мозг</text>
  <text x="352" y="314" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" font-weight="bold">Влияние: гуморальное</text>

  <!-- Nervous regulation note -->
  <text x="195" y="300" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#7B1FA2" font-weight="bold">Нервная регуляция</text>
  <text x="195" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">(блуждающий нерв — выдох,</text>
  <text x="195" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">грудные сегменты — вдох)</text>

  <!-- Footer -->
  <rect x="2" y="335" width="496" height="13" rx="0 0 12 12" fill="#2E7D32"/>
  <text x="250" y="344" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">ЖЕЛ = ДО (500) + РОвд (1500) + РОвыд (1500) ≈ 3500 мл | Дыхание регулируется нервным и гуморальным путём</text>
</svg>