<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение скелета человека</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 10</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- ============ HUMAN SKELETON - Front view ============ -->
<!-- Color coding: Skull=#795548, Spine=#1565C0, Ribcage=#FF9800, Shoulder=#4CAF50, Arms=#9C27B0, Pelvis=#E91E63, Legs=#00897B -->

<g transform="translate(175,55)">

  <!-- SKULL (brown) -->
  <ellipse cx="65" cy="18" rx="20" ry="22" fill="#D7CCC8" stroke="#795548" stroke-width="1.5"/>
  <!-- Eye sockets -->
  <ellipse cx="57" cy="16" rx="5" ry="6" fill="#8D6E63" opacity="0.4"/>
  <ellipse cx="73" cy="16" rx="5" ry="6" fill="#8D6E63" opacity="0.4"/>
  <!-- Nasal opening -->
  <path d="M62,22 L65,27 L68,22" fill="none" stroke="#795548" stroke-width="0.8"/>
  <!-- Teeth line -->
  <line x1="58" y1="30" x2="72" y2="30" stroke="#795548" stroke-width="1"/>
  <!-- Mandible -->
  <path d="M50,28 Q50,38 65,40 Q80,38 80,28" fill="none" stroke="#795548" stroke-width="1"/>

  <!-- CERVICAL SPINE (blue) -->
  <line x1="65" y1="42" x2="65" y2="55" stroke="#1565C0" stroke-width="2.5"/>
  <!-- Vertebrae marks -->
  <line x1="62" y1="45" x2="68" y2="45" stroke="#0D47A1" stroke-width="0.8"/>
  <line x1="62" y1="49" x2="68" y2="49" stroke="#0D47A1" stroke-width="0.8"/>
  <line x1="62" y1="53" x2="68" y2="53" stroke="#0D47A1" stroke-width="0.8"/>

  <!-- SHOULDER GIRDLE (green) -->
  <!-- Clavicles -->
  <line x1="65" y1="57" x2="30" y2="62" stroke="#4CAF50" stroke-width="2"/>
  <line x1="65" y1="57" x2="100" y2="62" stroke="#4CAF50" stroke-width="2"/>
  <!-- Scapulae -->
  <path d="M32,62 L28,80 L42,78 Z" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1" opacity="0.6"/>
  <path d="M98,62 L102,80 L88,78 Z" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1" opacity="0.6"/>

  <!-- THORACIC SPINE (blue) -->
  <line x1="65" y1="55" x2="65" y2="110" stroke="#1565C0" stroke-width="2.5"/>

  <!-- RIBCAGE (orange) -->
  <!-- Left ribs -->
  <path d="M63,60 Q48,58 38,68 Q32,78 35,88" fill="none" stroke="#FF9800" stroke-width="1.3"/>
  <path d="M63,65 Q46,63 36,73 Q30,83 33,93" fill="none" stroke="#FF9800" stroke-width="1.3"/>
  <path d="M63,70 Q45,68 34,78 Q28,88 32,98" fill="none" stroke="#FF9800" stroke-width="1.3"/>
  <path d="M63,75 Q46,73 36,83 Q30,93 34,103" fill="none" stroke="#FF9800" stroke-width="1.3"/>
  <path d="M63,80 Q48,78 40,88 Q35,96 38,105" fill="none" stroke="#FF9800" stroke-width="1.2"/>
  <path d="M63,85 Q50,83 43,92 Q38,100 40,107" fill="none" stroke="#FF9800" stroke-width="1.1"/>
  <!-- Right ribs -->
  <path d="M67,60 Q82,58 92,68 Q98,78 95,88" fill="none" stroke="#FF9800" stroke-width="1.3"/>
  <path d="M67,65 Q84,63 94,73 Q100,83 97,93" fill="none" stroke="#FF9800" stroke-width="1.3"/>
  <path d="M67,70 Q85,68 96,78 Q102,88 98,98" fill="none" stroke="#FF9800" stroke-width="1.3"/>
  <path d="M67,75 Q84,73 94,83 Q100,93 96,103" fill="none" stroke="#FF9800" stroke-width="1.3"/>
  <path d="M67,80 Q82,78 90,88 Q95,96 92,105" fill="none" stroke="#FF9800" stroke-width="1.2"/>
  <path d="M67,85 Q80,83 87,92 Q92,100 90,107" fill="none" stroke="#FF9800" stroke-width="1.1"/>
  <!-- Sternum -->
  <line x1="65" y1="60" x2="65" y2="100" stroke="#E65100" stroke-width="2"/>

  <!-- LUMBAR SPINE (blue) -->
  <line x1="65" y1="110" x2="65" y2="135" stroke="#1565C0" stroke-width="2.5"/>
  <line x1="62" y1="115" x2="68" y2="115" stroke="#0D47A1" stroke-width="0.8"/>
  <line x1="62" y1="120" x2="68" y2="120" stroke="#0D47A1" stroke-width="0.8"/>
  <line x1="62" y1="125" x2="68" y2="125" stroke="#0D47A1" stroke-width="0.8"/>
  <line x1="62" y1="130" x2="68" y2="130" stroke="#0D47A1" stroke-width="0.8"/>
  <line x1="61" y1="135" x2="69" y2="135" stroke="#0D47A1" stroke-width="0.8"/>

  <!-- SACRUM (blue, triangular) -->
  <path d="M60,138 L65,155 L70,138 Z" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/>

  <!-- PELVIS (pink) -->
  <!-- Left hip bone -->
  <path d="M65,138 Q55,135 40,142 Q28,152 30,168 Q32,178 45,180 Q55,178 60,170 Q63,162 65,155" fill="#F8BBD0" stroke="#E91E63" stroke-width="1.2"/>
  <!-- Right hip bone -->
  <path d="M65,138 Q75,135 90,142 Q102,152 100,168 Q98,178 85,180 Q75,178 70,170 Q67,162 65,155" fill="#F8BBD0" stroke="#E91E63" stroke-width="1.2"/>
  <!-- Sacrum connection -->
  <circle cx="65" cy="162" r="4" fill="#F48FB1" stroke="#E91E63" stroke-width="0.8" opacity="0.5"/>

  <!-- LEFT ARM (purple) -->
  <!-- Humerus -->
  <line x1="28" y1="64" x2="18" y2="105" stroke="#9C27B0" stroke-width="2.5"/>
  <!-- Elbow joint -->
  <circle cx="18" cy="105" r="3" fill="#CE93D8" stroke="#9C27B0" stroke-width="0.8"/>
  <!-- Radius -->
  <line x1="18" y1="105" x2="10" y2="145" stroke="#9C27B0" stroke-width="1.8"/>
  <!-- Ulna -->
  <line x1="18" y1="105" x2="16" y2="145" stroke="#9C27B0" stroke-width="1.8"/>
  <!-- Hand -->
  <path d="M10,145 L6,155 M10,145 L9,156 M13,145 L11,156 M13,145 L14,155 M16,145 L17,154" stroke="#9C27B0" stroke-width="1"/>

  <!-- RIGHT ARM (purple) -->
  <!-- Humerus -->
  <line x1="102" y1="64" x2="112" y2="105" stroke="#9C27B0" stroke-width="2.5"/>
  <!-- Elbow joint -->
  <circle cx="112" cy="105" r="3" fill="#CE93D8" stroke="#9C27B0" stroke-width="0.8"/>
  <!-- Radius -->
  <line x1="112" y1="105" x2="120" y2="145" stroke="#9C27B0" stroke-width="1.8"/>
  <!-- Ulna -->
  <line x1="112" y1="105" x2="114" y2="145" stroke="#9C27B0" stroke-width="1.8"/>
  <!-- Hand -->
  <path d="M120,145 L124,155 M120,145 L121,156 M117,145 L119,156 M117,145 L116,155 M114,145 L113,154" stroke="#9C27B0" stroke-width="1"/>

  <!-- LEFT LEG (teal) -->
  <!-- Femur -->
  <line x1="48" y1="175" x2="40" y2="218" stroke="#00897B" stroke-width="3"/>
  <!-- Knee joint (patella) -->
  <ellipse cx="40" cy="220" rx="4" ry="5" fill="#80CBC4" stroke="#00897B" stroke-width="1"/>
  <!-- Tibia -->
  <line x1="40" y1="225" x2="36" y2="268" stroke="#00897B" stroke-width="2.2"/>
  <!-- Fibula -->
  <line x1="44" y1="225" x2="42" y2="268" stroke="#00897B" stroke-width="1.2"/>
  <!-- Foot -->
  <path d="M36,268 L30,275 L22,278 L32,278 L42,278 L48,275" fill="none" stroke="#00897B" stroke-width="1.3"/>

  <!-- RIGHT LEG (teal) -->
  <!-- Femur -->
  <line x1="82" y1="175" x2="90" y2="218" stroke="#00897B" stroke-width="3"/>
  <!-- Knee joint (patella) -->
  <ellipse cx="90" cy="220" rx="4" ry="5" fill="#80CBC4" stroke="#00897B" stroke-width="1"/>
  <!-- Tibia -->
  <line x1="90" y1="225" x2="94" y2="268" stroke="#00897B" stroke-width="2.2"/>
  <!-- Fibula -->
  <line x1="86" y1="225" x2="88" y2="268" stroke="#00897B" stroke-width="1.2"/>
  <!-- Foot -->
  <path d="M94,268 L100,275 L108,278 L98,278 L88,278 L82,275" fill="none" stroke="#00897B" stroke-width="1.3"/>
</g>

<!-- ============ LABELS with leader lines ============ -->

<!-- Череп (skull) label -->
<line x1="210" y1="68" x2="115" y2="68" stroke="#795548" stroke-width="0.7"/>
<text x="113" y="66" font-family="Arial,sans-serif" font-size="7" fill="#795548" font-weight="bold" text-anchor="end">Череп</text>
<text x="113" y="74" font-family="Arial,sans-serif" font-size="5.5" fill="#795548" text-anchor="end">(22 кости)</text>

<!-- Позвоночник label -->
<line x1="240" y1="110" x2="120" y2="105" stroke="#1565C0" stroke-width="0.7"/>
<text x="118" y="103" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold" text-anchor="end">Позвоночник</text>
<text x="118" y="111" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="end">(33-34 позвонка)</text>

<!-- Грудная клетка label -->
<line x1="220" y1="138" x2="120" y2="138" stroke="#FF9800" stroke-width="0.7"/>
<text x="118" y="136" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold" text-anchor="end">Грудная клетка</text>
<text x="118" y="144" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="end">(12 пар рёбер)</text>

<!-- Плечевой пояс label -->
<line x1="200" y1="118" x2="120" y2="80" stroke="#4CAF50" stroke-width="0.7"/>
<text x="118" y="78" font-family="Arial,sans-serif" font-size="7" fill="#388E3C" font-weight="bold" text-anchor="end">Плечевой пояс</text>
<text x="118" y="86" font-family="Arial,sans-serif" font-size="5.5" fill="#388E3C" text-anchor="end">Ключицы, лопатки</text>

<!-- Рука label -->
<line x1="195" y1="168" x2="120" y2="170" stroke="#9C27B0" stroke-width="0.7"/>
<text x="118" y="168" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0" font-weight="bold" text-anchor="end">Скелет верхней</text>
<text x="118" y="176" font-family="Arial,sans-serif" font-size="7" fill="#9C27B0" font-weight="bold" text-anchor="end">конечности</text>

<!-- Таз label -->
<line x1="260" y1="205" x2="120" y2="205" stroke="#E91E63" stroke-width="0.7"/>
<text x="118" y="203" font-family="Arial,sans-serif" font-size="7" fill="#E91E63" font-weight="bold" text-anchor="end">Тазовый пояс</text>
<text x="118" y="211" font-family="Arial,sans-serif" font-size="5.5" fill="#E91E63" text-anchor="end">Подвздошные, седалищные,</text>
<text x="118" y="218" font-family="Arial,sans-serif" font-size="5.5" fill="#E91E63" text-anchor="end">лобковые кости</text>

<!-- Нога label -->
<line x1="250" y1="265" x2="120" y2="240" stroke="#00897B" stroke-width="0.7"/>
<text x="118" y="238" font-family="Arial,sans-serif" font-size="7" fill="#00897B" font-weight="bold" text-anchor="end">Скелет нижней</text>
<text x="118" y="246" font-family="Arial,sans-serif" font-size="7" fill="#00897B" font-weight="bold" text-anchor="end">конечности</text>

<!-- ============ RIGHT SIDE PANEL: Types of bones ============ -->
<rect x="340" y="56" width="150" height="260" rx="6" fill="white" opacity="0.85" stroke="#2E7D32" stroke-width="1"/>
<text x="415" y="72" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">ТИПЫ КОСТЕЙ</text>
<line x1="348" y1="77" x2="482" y2="77" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>

<!-- Трубчатые кости -->
<g transform="translate(370,95)">
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" font-weight="bold">Трубчатые</text>
  <!-- Long bone illustration -->
  <rect x="-5" y="2" width="10" height="35" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <!-- Diaphysis (shaft) -->
  <rect x="-3" y="8" width="6" height="22" rx="2" fill="#FFE082" stroke="#F9A825" stroke-width="0.5"/>
  <!-- Epiphyses (ends) -->
  <ellipse cx="0" cy="5" rx="6" ry="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <ellipse cx="0" cy="34" rx="6" ry="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Medullary cavity -->
  <rect x="-2" y="10" width="4" height="18" rx="1" fill="#FFECB3" stroke="#F9A825" stroke-width="0.3"/>
  <!-- Labels -->
  <text x="12" y="8" font-family="Arial,sans-serif" font-size="4.5" fill="#555">Эпифиз</text>
  <text x="12" y="20" font-family="Arial,sans-serif" font-size="4.5" fill="#555">Диафиз</text>
  <text x="12" y="37" font-family="Arial,sans-serif" font-size="4.5" fill="#555">Эпифиз</text>
  <text x="0" y="48" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Плечевая, бедренная</text>
</g>

<!-- Губчатые кости -->
<g transform="translate(370,158)">
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" font-weight="bold">Губчатые</text>
  <!-- Spongy bone illustration -->
  <rect x="-8" y="2" width="16" height="14" rx="3" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.8"/>
  <!-- Trabeculae pattern -->
  <line x1="-5" y1="5" x2="5" y2="12" stroke="#E64A19" stroke-width="0.5"/>
  <line x1="-5" y1="12" x2="5" y2="5" stroke="#E64A19" stroke-width="0.5"/>
  <line x1="-2" y1="4" x2="3" y2="14" stroke="#E64A19" stroke-width="0.4"/>
  <line x1="2" y1="4" x2="-3" y2="14" stroke="#E64A19" stroke-width="0.4"/>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Позвонки, запястье</text>
</g>

<!-- Плоские кости -->
<g transform="translate(370,200)">
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" font-weight="bold">Плоские</text>
  <!-- Flat bone illustration -->
  <rect x="-14" y="2" width="28" height="10" rx="1" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Two compact layers with spongy middle -->
  <line x1="-12" y1="5" x2="12" y2="5" stroke="#1B5E20" stroke-width="0.6"/>
  <line x1="-12" y1="9" x2="12" y2="9" stroke="#1B5E20" stroke-width="0.6"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Череп, рёбра, лопатки</text>
</g>

<!-- Смешанные кости -->
<g transform="translate(370,240)">
  <text x="0" y="-5" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" font-weight="bold">Смешанные</text>
  <!-- Mixed bone illustration (irregular shape) -->
  <path d="M-6,3 Q-10,5 -8,12 Q-6,16 0,15 Q6,16 8,12 Q10,5 6,3 Q3,0 -3,0 Z" fill="#B3E5FC" stroke="#0277BD" stroke-width="0.8"/>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Позвонки, кости</text>
  <text x="0" y="33" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">основания черепа</text>
</g>

<!-- Bone composition note -->
<text x="415" y="290" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle" font-style="italic">Кость = 60% минеральные</text>
<text x="415" y="297" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle" font-style="italic">вещества + 40% органика</text>
<text x="415" y="306" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle" font-style="italic">Скелет = ~206 костей</text>

<!-- Footer bar -->
<rect x="3" y="323" width="494" height="24" rx="0" fill="#2E7D32"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Скелет — опора тела, защита органов, движение, кроветворение (красный костный мозг)</text>
</svg>