<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Уровни организации организма человека</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 6</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Central hierarchy pyramid - vertical flow from bottom to top -->
<!-- Level 1: Молекулярный (bottom) -->
<g transform="translate(155,290)">
  <rect x="0" y="-14" width="170" height="28" rx="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="85" y="-2" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">1. МОЛЕКУЛЯРНЫЙ</text>
  <!-- Small molecule icon -->
  <circle cx="-8" cy="-3" r="4" fill="#FF7043" opacity="0.7"/>
  <circle cx="-2" cy="-8" r="3" fill="#42A5F5" opacity="0.7"/>
  <circle cx="-2" cy="3" r="3" fill="#66BB6A" opacity="0.7"/>
  <line x1="-8" y1="-3" x2="-2" y2="-8" stroke="#555" stroke-width="0.8"/>
  <line x1="-8" y1="-3" x2="-2" y2="3" stroke="#555" stroke-width="0.8"/>
</g>

<!-- Arrow 1→2 -->
<line x1="240" y1="274" x2="240" y2="264" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="240,260 237,266 243,266" fill="#2E7D32"/>

<!-- Level 2: Клеточный -->
<g transform="translate(155,248)">
  <rect x="0" y="-14" width="170" height="28" rx="5" fill="#81C784" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="85" y="-2" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">2. КЛЕТОЧНЫЙ</text>
  <!-- Cell icon -->
  <ellipse cx="-12" cy="-2" rx="8" ry="5" fill="none" stroke="#1565C0" stroke-width="1"/>
  <circle cx="-12" cy="-2" r="2" fill="#1565C0" opacity="0.5"/>
</g>

<!-- Arrow 2→3 -->
<line x1="240" y1="232" x2="240" y2="222" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="240,218 237,224 243,224" fill="#2E7D32"/>

<!-- Level 3: Тканевый -->
<g transform="translate(155,206)">
  <rect x="0" y="-14" width="170" height="28" rx="5" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="85" y="-2" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">3. ТКАНЕВЫЙ</text>
  <!-- Tissue icon - cluster of cells -->
  <rect x="-20" y="-9" width="7" height="7" rx="1" fill="#FFCC80" stroke="#E65100" stroke-width="0.6"/>
  <rect x="-12" y="-9" width="7" height="7" rx="1" fill="#FFE0B2" stroke="#E65100" stroke-width="0.6"/>
  <rect x="-20" y="-1" width="7" height="7" rx="1" fill="#FFE0B2" stroke="#E65100" stroke-width="0.6"/>
  <rect x="-12" y="-1" width="7" height="7" rx="1" fill="#FFCC80" stroke="#E65100" stroke-width="0.6"/>
</g>

<!-- Arrow 3→4 -->
<line x1="240" y1="190" x2="240" y2="180" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="240,176 237,182 243,182" fill="#2E7D32"/>

<!-- Level 4: Органный -->
<g transform="translate(155,164)">
  <rect x="0" y="-14" width="170" height="28" rx="5" fill="#4CAF50" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="85" y="-2" font-family="Arial,sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">4. ОРГАННЫЙ</text>
  <!-- Organ icon - heart shape -->
  <path d="M-14,-5 C-14,-9 -10,-10 -8,-7 C-6,-10 -2,-9 -2,-5 C-2,-1 -8,3 -8,5 C-8,3 -14,-1 -14,-5Z" fill="#EF5350" stroke="#C62828" stroke-width="0.6"/>
</g>

<!-- Arrow 4→5 -->
<line x1="240" y1="148" x2="240" y2="138" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="240,134 237,140 243,140" fill="#2E7D32"/>

<!-- Level 5: Системный -->
<g transform="translate(155,122)">
  <rect x="0" y="-14" width="170" height="28" rx="5" fill="#388E3C" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="85" y="-2" font-family="Arial,sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">5. СИСТЕМНЫЙ</text>
  <!-- System icon - connected organs -->
  <circle cx="-14" cy="-3" r="3" fill="#EF9A9A" stroke="#C62828" stroke-width="0.6"/>
  <circle cx="-6" cy="-3" r="3" fill="#90CAF9" stroke="#1565C0" stroke-width="0.6"/>
  <line x1="-11" y1="-3" x2="-9" y2="-3" stroke="#555" stroke-width="0.8"/>
</g>

<!-- Arrow 5→6 -->
<line x1="240" y1="106" x2="240" y2="96" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="240,92 237,98 243,98" fill="#2E7D32"/>

<!-- Level 6: Организменный (top) -->
<g transform="translate(155,80)">
  <rect x="0" y="-14" width="170" height="28" rx="5" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.2"/>
  <text x="85" y="-2" font-family="Arial,sans-serif" font-size="8" fill="#fff" text-anchor="middle" font-weight="bold">6. ОРГАНИЗМЕННЫЙ</text>
  <!-- Person icon -->
  <circle cx="-10" cy="-5" r="3" fill="none" stroke="#fff" stroke-width="0.8"/>
  <line x1="-10" y1="-2" x2="-10" y2="4" stroke="#fff" stroke-width="0.8"/>
  <line x1="-10" y1="0" x2="-14" y2="-2" stroke="#fff" stroke-width="0.8"/>
  <line x1="-10" y1="0" x2="-6" y2="-2" stroke="#fff" stroke-width="0.8"/>
  <line x1="-10" y1="4" x2="-13" y2="8" stroke="#fff" stroke-width="0.8"/>
  <line x1="-10" y1="4" x2="-7" y2="8" stroke="#fff" stroke-width="0.8"/>
</g>

<!-- Right side panel - Examples for each level -->
<rect x="340" y="56" width="150" height="262" rx="6" fill="white" opacity="0.85" stroke="#2E7D32" stroke-width="1"/>
<text x="415" y="72" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">ПРИМЕРЫ</text>
<line x1="348" y1="77" x2="482" y2="77" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>

<!-- Level 6 example -->
<text x="350" y="91" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" font-weight="bold">Организменный:</text>
<text x="352" y="101" font-family="Arial,sans-serif" font-size="6" fill="#555">Целостный организм</text>
<text x="352" y="109" font-family="Arial,sans-serif" font-size="6" fill="#555">человека</text>

<!-- Level 5 example -->
<text x="350" y="124" font-family="Arial,sans-serif" font-size="6.5" fill="#388E3C" font-weight="bold">Системный:</text>
<text x="352" y="134" font-family="Arial,sans-serif" font-size="6" fill="#555">Сердечно-сосудистая,</text>
<text x="352" y="142" font-family="Arial,sans-serif" font-size="6" fill="#555">нервная, пищеварительная</text>

<!-- Level 4 example -->
<text x="350" y="157" font-family="Arial,sans-serif" font-size="6.5" fill="#4CAF50" font-weight="bold">Органный:</text>
<text x="352" y="167" font-family="Arial,sans-serif" font-size="6" fill="#555">Сердце, лёгкие,</text>
<text x="352" y="175" font-family="Arial,sans-serif" font-size="6" fill="#555">печень, почки</text>

<!-- Level 3 example -->
<text x="350" y="190" font-family="Arial,sans-serif" font-size="6.5" fill="#66BB6A" font-weight="bold">Тканевый:</text>
<text x="352" y="200" font-family="Arial,sans-serif" font-size="6" fill="#555">Эпителиальная, мышечная,</text>
<text x="352" y="208" font-family="Arial,sans-serif" font-size="6" fill="#555">соединительная, нервная</text>

<!-- Level 2 example -->
<text x="350" y="223" font-family="Arial,sans-serif" font-size="6.5" fill="#81C784" font-weight="bold">Клеточный:</text>
<text x="352" y="233" font-family="Arial,sans-serif" font-size="6" fill="#555">Нейрон, эритроцит,</text>
<text x="352" y="241" font-family="Arial,sans-serif" font-size="6" fill="#555">миоцит, гепатоцит</text>

<!-- Level 1 example -->
<text x="350" y="256" font-family="Arial,sans-serif" font-size="6.5" fill="#A5D6A7" font-weight="bold">Молекулярный:</text>
<text x="352" y="266" font-family="Arial,sans-serif" font-size="6" fill="#555">Белки, ДНК, липиды,</text>
<text x="352" y="274" font-family="Arial,sans-serif" font-size="6" fill="#555">углеводы, АТФ</text>

<!-- Small diagram: size increase indicator -->
<text x="350" y="293" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="start" font-style="italic">↑ Сложность возрастает</text>

<!-- Left decorative bracket -->
<path d="M145,290 C135,290 135,290 135,280 L135,85 C135,75 135,75 145,75" fill="none" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>
<text x="125" y="190" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" transform="rotate(-90,125,190)" font-style="italic">Возрастание сложности</text>

<!-- Footer bar -->
<rect x="3" y="323" width="494" height="24" rx="0" fill="#2E7D32"/>
<rect x="3" y="323" width="494" height="24" rx="0" fill="#2E7D32"/>
<text x="250" y="339" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle">Каждый уровень организации является частью более высокого уровня</text>
</svg>