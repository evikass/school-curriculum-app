<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg26" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="tooth26" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FAFAFA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="stomach26" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCDD2;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#EF9A9A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="gland26" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF9C4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFF176;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg26)" rx="12"/>
  <rect width="500" height="350" fill="none" rx="12" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Title -->
  <text x="250" y="22" font-family="Arial, sans-serif" font-size="14" fill="#1B5E20" text-anchor="middle" font-weight="bold">Пищеварение в ротовой полости и желудке</text>
  <text x="250" y="34" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 26</text>
  <line x1="15" y1="40" x2="485" y2="40" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- LEFT SECTION: Oral Cavity -->
  <rect x="12" y="46" width="230" height="170" rx="6" fill="white" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="127" y="58" font-family="Arial, sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ротовая полость</text>

  <!-- Teeth row -->
  <text x="127" y="72" font-family="Arial, sans-serif" font-size="7" fill="#333" text-anchor="middle" font-weight="bold">Зубы:</text>

  <!-- Incisors -->
  <rect x="56" y="78" width="8" height="14" rx="2" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>
  <rect x="66" y="78" width="8" height="14" rx="2" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>
  <text x="65" y="100" font-family="Arial, sans-serif" font-size="6" fill="#555" text-anchor="middle">Резцы</text>

  <!-- Canines -->
  <path d="M80 78 L86 92 L92 78 Z" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>
  <text x="86" y="100" font-family="Arial, sans-serif" font-size="6" fill="#555" text-anchor="middle">Клыки</text>

  <!-- Premolars -->
  <rect x="100" y="78" width="12" height="14" rx="3" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>
  <rect x="100" y="80" width="12" height="3" rx="1" fill="#BDBDBD"/>
  <text x="106" y="100" font-family="Arial, sans-serif" font-size="6" fill="#555" text-anchor="middle">Премоляры</text>

  <!-- Molars -->
  <rect x="120" y="76" width="16" height="18" rx="4" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>
  <rect x="122" y="78" width="5" height="5" rx="1" fill="#BDBDBD"/>
  <rect x="129" y="78" width="5" height="5" rx="1" fill="#BDBDBD"/>
  <text x="128" y="103" font-family="Arial, sans-serif" font-size="6" fill="#555" text-anchor="middle">Моляры</text>

  <!-- Lower teeth row -->
  <rect x="56" y="108" width="8" height="12" rx="2" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>
  <rect x="66" y="108" width="8" height="12" rx="2" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>
  <path d="M80 108 L86 120 L92 108 Z" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>
  <rect x="100" y="108" width="12" height="12" rx="3" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>
  <rect x="120" y="108" width="16" height="14" rx="4" fill="url(#tooth26)" stroke="#999" stroke-width="0.5"/>

  <!-- Tongue -->
  <ellipse cx="90" cy="136" rx="40" ry="14" fill="#EF9A9A" stroke="#E57373" stroke-width="0.8"/>
  <line x1="70" y1="136" x2="110" y2="136" stroke="#E57373" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="90" y="140" font-family="Arial, sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Язык</text>

  <!-- Salivary glands -->
  <ellipse cx="42" cy="122" rx="12" ry="8" fill="url(#gland26)" stroke="#F9A825" stroke-width="0.8"/>
  <text x="42" y="126" font-family="Arial, sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Околоушная</text>
  <ellipse cx="42" cy="145" rx="12" ry="8" fill="url(#gland26)" stroke="#F9A825" stroke-width="0.8"/>
  <text x="42" y="149" font-family="Arial, sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Подчелюстная</text>
  <ellipse cx="42" cy="166" rx="12" ry="8" fill="url(#gland26)" stroke="#F9A825" stroke-width="0.8"/>
  <text x="42" y="170" font-family="Arial, sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Подъязычная</text>

  <!-- Ducts from glands -->
  <line x1="54" y1="122" x2="60" y2="128" stroke="#F9A825" stroke-width="0.5"/>
  <line x1="54" y1="145" x2="60" y2="140" stroke="#F9A825" stroke-width="0.5"/>
  <line x1="54" y1="166" x2="60" y2="150" stroke="#F9A825" stroke-width="0.5"/>

  <!-- Salivary gland label -->
  <text x="42" y="183" font-family="Arial, sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Слюнные железы</text>

  <!-- Amylase reaction arrow -->
  <rect x="62" y="188" width="155" height="22" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6"/>
  <text x="140" y="198" font-family="Arial, sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Амилаза (слюна):</text>
  <text x="140" y="207" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Крахмал → Мальтоза</text>

  <!-- RIGHT SECTION: Stomach -->
  <rect x="250" y="46" width="238" height="170" rx="6" fill="white" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="369" y="58" font-family="Arial, sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Желудок</text>

  <!-- Stomach shape -->
  <path d="M310 80 C310 75 430 75 430 90 C430 120 420 170 390 190 C370 200 340 200 320 190 C290 175 310 140 310 80 Z" fill="url(#stomach26)" stroke="#C62828" stroke-width="1.2"/>

  <!-- Stomach wall layers -->
  <path d="M318 85 C318 82 422 82 422 94 C422 120 413 165 388 183 C370 192 345 192 328 183 C302 170 318 135 318 85 Z" fill="none" stroke="#E57373" stroke-width="0.6" stroke-dasharray="3,2"/>

  <!-- Stomach labels -->
  <text x="370" y="100" font-family="Arial, sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Стенки желудка</text>

  <!-- Gastric glands -->
  <circle cx="340" cy="120" r="5" fill="#FFE082" stroke="#F9A825" stroke-width="0.5"/>
  <circle cx="370" cy="130" r="5" fill="#FFE082" stroke="#F9A825" stroke-width="0.5"/>
  <circle cx="395" cy="118" r="5" fill="#FFE082" stroke="#F9A825" stroke-width="0.5"/>
  <circle cx="355" cy="145" r="5" fill="#FFE082" stroke="#F9A825" stroke-width="0.5"/>
  <circle cx="385" cy="148" r="5" fill="#FFE082" stroke="#F9A825" stroke-width="0.5"/>
  <circle cx="345" cy="160" r="5" fill="#FFE082" stroke="#F9A825" stroke-width="0.5"/>
  <text x="390" y="166" font-family="Arial, sans-serif" font-size="6" fill="#E65100">Железы</text>

  <!-- Gastric juice content -->
  <rect x="330" y="172" width="85" height="28" rx="3" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.5"/>
  <text x="372" y="183" font-family="Arial, sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Желудочный сок:</text>
  <text x="372" y="193" font-family="Arial, sans-serif" font-size="6.5" fill="#D32F2F" text-anchor="middle">HCl + Пепсин</text>

  <!-- Protein digestion -->
  <rect x="290" y="204" width="170" height="10" rx="3" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.4"/>
  <text x="375" y="212" font-family="Arial, sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Белки → Пептиды</text>

  <!-- Esophagus entrance -->
  <rect x="330" y="72" width="20" height="10" rx="3" fill="#FFAB91" stroke="#E64A19" stroke-width="0.6"/>
  <text x="340" y="80" font-family="Arial, sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">Пищевод</text>

  <!-- Pylorus exit -->
  <rect x="385" y="188" width="30" height="10" rx="3" fill="#FFAB91" stroke="#E64A19" stroke-width="0.6"/>
  <text x="400" y="196" font-family="Arial, sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">Привратник</text>

  <!-- SIDE PANEL: Tooth Structure -->
  <rect x="12" y="222" width="160" height="80" rx="5" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="92" y="234" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Строение зуба</text>

  <!-- Tooth cross-section -->
  <path d="M60 242 L60 275 Q60 290 72 290 L82 290 Q94 290 94 275 L94 242 Z" fill="url(#tooth26)" stroke="#999" stroke-width="0.8"/>
  <!-- Crown top -->
  <path d="M58 242 Q77 232 96 242 Z" fill="#FAFAFA" stroke="#999" stroke-width="0.5"/>
  <!-- Enamel layer -->
  <path d="M60 244 Q77 236 94 244 L92 248 Q77 242 62 248 Z" fill="#E0F7FA" stroke="#00ACC1" stroke-width="0.4"/>
  <text x="108" y="248" font-family="Arial, sans-serif" font-size="6" fill="#00838F" font-weight="bold">Эмаль</text>
  <!-- Dentin -->
  <path d="M64 248 Q77 244 90 248 L88 268 Q77 270 66 268 Z" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.4"/>
  <text x="108" y="262" font-family="Arial, sans-serif" font-size="6" fill="#F57F17" font-weight="bold">Дентин</text>
  <!-- Pulp -->
  <ellipse cx="77" cy="260" rx="7" ry="10" fill="#FFCDD2" stroke="#E57373" stroke-width="0.4"/>
  <text x="108" y="276" font-family="Arial, sans-serif" font-size="6" fill="#C62828" font-weight="bold">Пульпа</text>
  <!-- Root -->
  <path d="M66 268 L66 288 Q66 292 72 292 L82 292 Q88 292 88 288 L88 268" fill="none" stroke="#999" stroke-width="0.5"/>
  <!-- Cement label -->
  <text x="108" y="290" font-family="Arial, sans-serif" font-size="6" fill="#795548" font-weight="bold">Цемент</text>

  <!-- Arrow to label lines -->
  <line x1="92" y1="246" x2="106" y2="246" stroke="#00838F" stroke-width="0.4"/>
  <line x1="88" y1="260" x2="106" y2="260" stroke="#F57F17" stroke-width="0.4"/>
  <line x1="84" y1="274" x2="106" y2="274" stroke="#C62828" stroke-width="0.4"/>

  <!-- BOTTOM SECTION: Peristalsis -->
  <rect x="180" y="222" width="308" height="80" rx="5" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="334" y="234" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Перистальтика</text>

  <!-- Esophagus/tube for peristalsis -->
  <rect x="195" y="245" width="280" height="30" rx="10" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.8"/>

  <!-- Peristaltic waves -->
  <path d="M200 245 Q210 240 220 245 L220 275 Q210 280 200 275 Z" fill="#EF9A9A" stroke="#E57373" stroke-width="0.5"/>
  <path d="M240 245 Q250 235 260 245 L260 275 Q250 285 240 275 Z" fill="#EF9A9A" stroke="#E57373" stroke-width="0.5"/>
  <path d="M280 245 Q290 240 300 245 L300 275 Q290 280 280 275 Z" fill="#EF9A9A" stroke="#E57373" stroke-width="0.5"/>

  <!-- Food bolus -->
  <ellipse cx="310" cy="260" rx="14" ry="10" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="310" y="263" font-family="Arial, sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Пищевой комок</text>

  <!-- Direction arrow -->
  <path d="M330 260 L350 260" stroke="#2E7D32" stroke-width="1.2" marker-end="url(#arrow26)"/>
  <defs>
    <marker id="arrow26" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- Wave labels -->
  <text x="210" y="240" font-family="Arial, sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Сокращение</text>
  <text x="250" y="240" font-family="Arial, sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Сокращение</text>
  <text x="290" y="240" font-family="Arial, sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Сокращение</text>

  <!-- Muscle layer arrows -->
  <text x="195" y="286" font-family="Arial, sans-serif" font-size="5" fill="#888">↑ Кольцевые мышцы</text>
  <text x="195" y="295" font-family="Arial, sans-serif" font-size="5" fill="#888">↑ Продольные мышцы</text>

  <!-- Footer -->
  <rect x="0" y="335" width="500" height="15" rx="0" fill="#2E7D32"/>
  <rect x="0" y="335" width="500" height="15" rx="0" fill="#2E7D32" clip-path="inset(0 0 0 0 round 0 0 12px 12px)"/>
  <text x="250" y="346" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Пищеварение: ротовая полость → желудок | Механическая и химическая обработка пищи</text>
</svg>