<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="#f0fdfa"/>
  <rect x="4" y="4" width="792" height="492" rx="14" fill="none" stroke="#0d9488" stroke-width="2" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488">Периодический закон</text>
  <text x="400" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Структура периодической системы химических элементов</text>

  <!-- Group labels (I - VIII) across top -->
  <text x="108" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">I</text>
  <text x="168" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">II</text>
  <text x="228" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">III</text>
  <text x="288" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">IV</text>
  <text x="348" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">V</text>
  <text x="408" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">VI</text>
  <text x="468" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">VII</text>
  <text x="528" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">VIII</text>

  <!-- Period labels on the left -->
  <!-- Period 1 (small) -->
  <text x="50" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d9488">1</text>

  <!-- Period 2 (small) -->
  <text x="50" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d9488">2</text>

  <!-- Period 3 (small) -->
  <text x="50" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d9488">3</text>

  <!-- Period 4 (large) -->
  <text x="50" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d9488">4</text>

  <!-- Period 5 (large) -->
  <text x="50" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d9488">5</text>

  <!-- Period 6 (large) -->
  <text x="50" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d9488">6</text>

  <!-- Period 7 (large) -->
  <text x="50" y="344" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d9488">7</text>

  <!-- Simplified periodic table grid -->
  <!-- Row height: ~28 for small periods, ~34 for large -->
  <!-- Small periods (1-3): lighter background -->
  <!-- Period 1: H, He -->
  <rect x="82" y="88" width="52" height="26" rx="4" fill="#14b8a6" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="108" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">H</text>

  <rect x="502" y="88" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="528" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">He</text>

  <!-- Period 2: Li to Ne -->
  <rect x="82" y="122" width="52" height="26" rx="4" fill="#14b8a6" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="108" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Li</text>
  <rect x="142" y="122" width="52" height="26" rx="4" fill="#14b8a6" opacity="0.55" stroke="#0d9488" stroke-width="0.8"/>
  <text x="168" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Be</text>
  <rect x="202" y="122" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.45" stroke="#0d9488" stroke-width="0.8"/>
  <text x="228" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">B</text>
  <rect x="262" y="122" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.55" stroke="#0d9488" stroke-width="0.8"/>
  <text x="288" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">C</text>
  <rect x="322" y="122" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.65" stroke="#0d9488" stroke-width="0.8"/>
  <text x="348" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">N</text>
  <rect x="382" y="122" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="408" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">O</text>
  <rect x="442" y="122" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.8" stroke="#0d9488" stroke-width="0.8"/>
  <text x="468" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">F</text>
  <rect x="502" y="122" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="528" y="139" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Ne</text>

  <!-- Period 3: Na to Ar -->
  <rect x="82" y="156" width="52" height="26" rx="4" fill="#14b8a6" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="108" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Na</text>
  <rect x="142" y="156" width="52" height="26" rx="4" fill="#14b8a6" opacity="0.55" stroke="#0d9488" stroke-width="0.8"/>
  <text x="168" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Mg</text>
  <rect x="202" y="156" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.45" stroke="#0d9488" stroke-width="0.8"/>
  <text x="228" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Al</text>
  <rect x="262" y="156" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.55" stroke="#0d9488" stroke-width="0.8"/>
  <text x="288" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Si</text>
  <rect x="322" y="156" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.65" stroke="#0d9488" stroke-width="0.8"/>
  <text x="348" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">P</text>
  <rect x="382" y="156" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="408" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">S</text>
  <rect x="442" y="156" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.8" stroke="#0d9488" stroke-width="0.8"/>
  <text x="468" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Cl</text>
  <rect x="502" y="156" width="52" height="26" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="528" y="173" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">Ar</text>

  <!-- Bracket for small periods -->
  <rect x="66" y="85" width="5" height="72" rx="2" fill="#0d9488" opacity="0.6"/>
  <text x="40" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#0d9488" transform="rotate(-90, 40, 126)">Малые</text>

  <!-- Periods 4-7 (large) -->
  <!-- Period 4 -->
  <rect x="82" y="198" width="52" height="30" rx="4" fill="#14b8a6" opacity="0.6" stroke="#0d9488" stroke-width="0.8"/>
  <text x="108" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">K</text>
  <rect x="142" y="198" width="52" height="30" rx="4" fill="#14b8a6" opacity="0.5" stroke="#0d9488" stroke-width="0.8"/>
  <text x="168" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Ca</text>
  <!-- D-block indicator -->
  <rect x="202" y="198" width="168" height="30" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="286" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0d9488">d-элементы</text>
  <rect x="382" y="198" width="52" height="30" rx="4" fill="#2dd4bf" opacity="0.5" stroke="#0d9488" stroke-width="0.8"/>
  <text x="408" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">As</text>
  <rect x="442" y="198" width="52" height="30" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="468" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Se</text>
  <rect x="502" y="198" width="52" height="30" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="528" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Kr</text>

  <!-- Period 5 -->
  <rect x="82" y="240" width="52" height="30" rx="4" fill="#14b8a6" opacity="0.6" stroke="#0d9488" stroke-width="0.8"/>
  <text x="108" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Rb</text>
  <rect x="142" y="240" width="52" height="30" rx="4" fill="#14b8a6" opacity="0.5" stroke="#0d9488" stroke-width="0.8"/>
  <text x="168" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Sr</text>
  <rect x="202" y="240" width="168" height="30" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="286" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0d9488">d-элементы</text>
  <rect x="382" y="240" width="52" height="30" rx="4" fill="#2dd4bf" opacity="0.5" stroke="#0d9488" stroke-width="0.8"/>
  <text x="408" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Sb</text>
  <rect x="442" y="240" width="52" height="30" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="468" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Te</text>
  <rect x="502" y="240" width="52" height="30" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="528" y="259" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Xe</text>

  <!-- Period 6 -->
  <rect x="82" y="282" width="52" height="30" rx="4" fill="#14b8a6" opacity="0.6" stroke="#0d9488" stroke-width="0.8"/>
  <text x="108" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Cs</text>
  <rect x="142" y="282" width="52" height="30" rx="4" fill="#14b8a6" opacity="0.5" stroke="#0d9488" stroke-width="0.8"/>
  <text x="168" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Ba</text>
  <rect x="202" y="282" width="168" height="30" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="286" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0d9488">d, f-элементы</text>
  <rect x="382" y="282" width="52" height="30" rx="4" fill="#2dd4bf" opacity="0.5" stroke="#0d9488" stroke-width="0.8"/>
  <text x="408" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Po</text>
  <rect x="442" y="282" width="52" height="30" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="468" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">At</text>
  <rect x="502" y="282" width="52" height="30" rx="4" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.8"/>
  <text x="528" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Rn</text>

  <!-- Period 7 -->
  <rect x="82" y="324" width="52" height="30" rx="4" fill="#14b8a6" opacity="0.6" stroke="#0d9488" stroke-width="0.8"/>
  <text x="108" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">Fr</text>
  <rect x="142" y="324" width="52" height="30" rx="4" fill="#14b8a6" opacity="0.5" stroke="#0d9488" stroke-width="0.8"/>
  <text x="168" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="white">Ra</text>
  <rect x="202" y="324" width="348" height="30" rx="4" fill="#ccfbf1" stroke="#0d9488" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="376" y="343" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0d9488">d, f-элементы (незавершённый период)</text>

  <!-- Bracket for large periods -->
  <rect x="66" y="194" width="5" height="164" rx="2" fill="#14b8a6" opacity="0.6"/>
  <text x="38" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#14b8a6" transform="rotate(-90, 38, 280)">Большие</text>

  <!-- Arrow: Metals → Non-metals across period -->
  <defs>
    <marker id="arrowRight8" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- Right panel with info -->
  <rect x="580" y="80" width="200" height="180" rx="12" fill="white" stroke="#14b8a6" stroke-width="1.5" opacity="0.95"/>
  <text x="680" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Структура таблицы</text>
  <line x1="600" y1="115" x2="760" y2="115" stroke="#2dd4bf" stroke-width="1"/>

  <rect x="600" y="125" width="160" height="26" rx="6" fill="#0d9488" opacity="0.15"/>
  <text x="680" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">Малые периоды (1–3)</text>

  <rect x="600" y="158" width="160" height="26" rx="6" fill="#14b8a6" opacity="0.15"/>
  <text x="680" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">Большие периоды (4–7)</text>

  <line x1="600" y1="195" x2="760" y2="195" stroke="#2dd4bf" stroke-width="1"/>

  <text x="680" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">7 периодов</text>
  <text x="680" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e293b">8 групп</text>
  <text x="680" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">(I–VIII)</text>

  <!-- Metal → Non-metal arrow across a period -->
  <rect x="580" y="275" width="200" height="75" rx="12" fill="white" stroke="#14b8a6" stroke-width="1.5" opacity="0.95"/>
  <text x="680" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">В периоде (→):</text>
  <line x1="608" y1="320" x2="748" y2="320" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowRight8)"/>
  <text x="610" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">Металлы</text>
  <text x="710" y="340" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2dd4bf">Неметаллы</text>

  <!-- Legend -->
  <rect x="580" y="365" width="200" height="120" rx="12" fill="white" stroke="#14b8a6" stroke-width="1.5" opacity="0.95"/>
  <text x="680" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488">Легенда</text>
  <line x1="600" y1="396" x2="760" y2="396" stroke="#2dd4bf" stroke-width="1"/>

  <rect x="600" y="405" width="20" height="14" rx="3" fill="#14b8a6" opacity="0.7" stroke="#0d9488" stroke-width="0.5"/>
  <text x="630" y="416" font-family="Arial, sans-serif" font-size="11" fill="#1e293b">Металлы</text>

  <rect x="600" y="425" width="20" height="14" rx="3" fill="#2dd4bf" opacity="0.7" stroke="#0d9488" stroke-width="0.5"/>
  <text x="630" y="436" font-family="Arial, sans-serif" font-size="11" fill="#1e293b">Неметаллы</text>

  <rect x="600" y="445" width="20" height="14" rx="3" fill="#ccfbf1" stroke="#0d9488" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="630" y="456" font-family="Arial, sans-serif" font-size="11" fill="#1e293b">Переходные элементы</text>

  <rect x="600" y="465" width="20" height="14" rx="3" fill="#f0fdfa" stroke="#0d9488" stroke-width="0.5"/>
  <text x="630" y="476" font-family="Arial, sans-serif" font-size="11" fill="#1e293b">Благородные газы</text>
</svg>