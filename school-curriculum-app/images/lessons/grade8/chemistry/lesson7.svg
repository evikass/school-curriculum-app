<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="nucleusGrad7" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </radialGradient>
    <radialGradient id="electronGrad7" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="#f0fdfa"/>
  <rect x="4" y="4" width="792" height="492" rx="14" fill="none" stroke="#0d9488" stroke-width="2" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488">Строение электронной оболочки</text>
  <text x="400" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Энергетические уровни и число электронов</text>

  <!-- Atom model centered at 300, 280 -->

  <!-- Level 3 (outermost) - 18e max -->
  <circle cx="300" cy="280" r="185" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-dasharray="6,3" opacity="0.5"/>
  <circle cx="300" cy="280" r="185" fill="#2dd4bf" opacity="0.04"/>

  <!-- Level 2 - 8e max -->
  <circle cx="300" cy="280" r="120" fill="none" stroke="#14b8a6" stroke-width="2" opacity="0.6"/>
  <circle cx="300" cy="280" r="120" fill="#14b8a6" opacity="0.06"/>

  <!-- Level 1 - 2e max -->
  <circle cx="300" cy="280" r="55" fill="none" stroke="#0d9488" stroke-width="2" opacity="0.7"/>
  <circle cx="300" cy="280" r="55" fill="#0d9488" opacity="0.08"/>

  <!-- Nucleus -->
  <circle cx="300" cy="280" r="22" fill="url(#nucleusGrad7)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="300" y="285" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">+</text>

  <!-- Electrons on Level 1 (2 electrons) -->
  <circle cx="355" cy="280" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="355" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="245" cy="280" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="245" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>

  <!-- Electrons on Level 2 (8 electrons) -->
  <circle cx="420" cy="280" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="420" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="180" cy="280" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="180" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="300" cy="160" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="300" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="300" cy="400" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="300" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="385" cy="195" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="385" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="215" cy="365" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="215" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="385" cy="365" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="385" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="215" cy="195" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="215" y="199" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>

  <!-- Electrons on Level 3 (showing a few representative) -->
  <circle cx="485" cy="280" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="485" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="115" cy="280" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="115" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="300" cy="95" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="300" y="99" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>
  <circle cx="300" cy="465" r="9" fill="url(#electronGrad7)" stroke="#d97706" stroke-width="1" filter="glow7"/>
  <text x="300" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#78350f">e</text>

  <!-- Level labels with connecting lines -->
  <!-- Level 1 label -->
  <line x1="340" y1="240" x2="530" y2="140" stroke="#0d9488" stroke-width="1" opacity="0.6"/>
  <rect x="530" y="125" width="130" height="30" rx="8" fill="#0d9488" opacity="0.9"/>
  <text x="595" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">1 уровень: 2e</text>

  <!-- Level 2 label -->
  <line x1="400" y1="200" x2="530" y2="180" stroke="#14b8a6" stroke-width="1" opacity="0.6"/>
  <rect x="530" y="165" width="130" height="30" rx="8" fill="#14b8a6" opacity="0.9"/>
  <text x="595" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">2 уровень: 8e</text>

  <!-- Level 3 label -->
  <line x1="470" y1="155" x2="530" y2="220" stroke="#2dd4bf" stroke-width="1" opacity="0.6"/>
  <rect x="530" y="205" width="140" height="30" rx="8" fill="#2dd4bf" opacity="0.85"/>
  <text x="600" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">3 уровень: 18e</text>

  <!-- Formula box -->
  <rect x="540" y="270" width="230" height="90" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" opacity="0.95"/>
  <text x="655" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0d9488">Формула уровней:</text>
  <rect x="575" y="305" width="160" height="42" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="655" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0d9488">N = 2n²</text>

  <!-- Calculation examples -->
  <rect x="540" y="375" width="230" height="105" rx="12" fill="white" stroke="#14b8a6" stroke-width="1.5" opacity="0.95"/>
  <text x="655" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488">Проверка:</text>
  <text x="570" y="420" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">n=1:  N = 2×1² = </text>
  <text x="710" y="420" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488">2</text>
  <text x="570" y="442" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">n=2:  N = 2×2² = </text>
  <text x="710" y="442" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#14b8a6">8</text>
  <text x="570" y="464" font-family="Arial, sans-serif" font-size="13" fill="#1e293b">n=3:  N = 2×3² = </text>
  <text x="710" y="464" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2dd4bf">18</text>
</svg>