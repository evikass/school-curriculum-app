<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="nucleusGrad9" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </radialGradient>
    <radialGradient id="electronGrad9" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="glow9">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowR9" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="#f0fdfa"/>
  <rect x="4" y="4" width="792" height="492" rx="14" fill="none" stroke="#0d9488" stroke-width="2" opacity="0.3"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488">Характеристика элемента</text>
  <text x="400" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Чтение информации о химическом элементе</text>

  <!-- Large element card for Sulfur (S) -->
  <rect x="40" y="80" width="180" height="220" rx="16" fill="white" stroke="#14b8a6" stroke-width="2.5"/>
  <rect x="40" y="80" width="180" height="50" rx="16" fill="#0d9488"/>
  <rect x="40" y="110" width="180" height="20" fill="#0d9488"/>
  <!-- Atomic number -->
  <text x="58" y="108" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white">16</text>
  <!-- Element symbol -->
  <text x="130" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#0d9488">S</text>
  <!-- Element name -->
  <text x="130" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#1e293b">Сера</text>
  <!-- Relative atomic mass -->
  <text x="205" y="108" text-anchor="end" font-family="Arial, sans-serif" font-size="14" fill="white">32,066</text>
  <!-- Period and group info on card -->
  <text x="130" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">III период, VI группа</text>
  <text x="130" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Неметалл</text>

  <!-- Electron configuration diagram -->
  <rect x="245" y="80" width="280" height="100" rx="12" fill="white" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="385" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Схема строения атома</text>

  <!-- Nucleus symbol -->
  <circle cx="280" cy="145" r="18" fill="url(#nucleusGrad9)" stroke="#0d9488" stroke-width="1.5"/>
  <text x="280" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">+16</text>

  <!-- Energy levels with electrons: )2 )8 )6 -->
  <!-- Level 1: 2 electrons -->
  <path d="M 304 130 Q 320 110 336 130" fill="none" stroke="#0d9488" stroke-width="2"/>
  <circle cx="312" cy="118" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="328" cy="118" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <text x="320" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488">2</text>

  <!-- Level 2: 8 electrons -->
  <path d="M 350 130 Q 385 95 420 130" fill="none" stroke="#14b8a6" stroke-width="2"/>
  <circle cx="365" cy="106" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="375" cy="100" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="385" cy="98" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="395" cy="100" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="405" cy="106" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="370" cy="114" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="385" cy="116" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="400" cy="114" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <text x="385" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#14b8a6">8</text>

  <!-- Level 3: 6 electrons -->
  <path d="M 434 130 Q 470 90 506 130" fill="none" stroke="#2dd4bf" stroke-width="2"/>
  <circle cx="450" cy="100" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="462" cy="96" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="475" cy="95" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="488" cy="96" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="455" cy="108" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <circle cx="492" cy="108" r="6" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8"/>
  <text x="470" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2dd4bf">6</text>

  <!-- Atom model visualization -->
  <rect x="245" y="195" width="280" height="280" rx="12" fill="white" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="385" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Модель атома серы</text>

  <!-- Concentric orbits -->
  <circle cx="385" cy="345" r="105" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <circle cx="385" cy="345" r="68" fill="none" stroke="#14b8a6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="385" cy="345" r="32" fill="none" stroke="#0d9488" stroke-width="1.5" opacity="0.7"/>

  <!-- Nucleus -->
  <circle cx="385" cy="345" r="14" fill="url(#nucleusGrad9)" stroke="#0d9488" stroke-width="1"/>
  <text x="385" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white">+16</text>

  <!-- Electrons on Level 1 (2) -->
  <circle cx="417" cy="345" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="353" cy="345" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>

  <!-- Electrons on Level 2 (8) -->
  <circle cx="453" cy="345" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="317" cy="345" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="385" cy="277" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="385" cy="413" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="433" cy="297" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="337" cy="393" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="433" cy="393" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="337" cy="297" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>

  <!-- Electrons on Level 3 (6) -->
  <circle cx="490" cy="345" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="280" cy="345" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="385" cy="240" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="459" cy="271" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="311" cy="419" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>
  <circle cx="459" cy="419" r="7" fill="url(#electronGrad9)" stroke="#d97706" stroke-width="0.8" filter="glow9"/>

  <!-- Right panel: Key characteristics -->
  <rect x="550" y="80" width="230" height="395" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" opacity="0.95"/>
  <text x="665" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488">Характеристики</text>
  <line x1="570" y1="118" x2="760" y2="118" stroke="#2dd4bf" stroke-width="1"/>

  <!-- Z=16 -->
  <rect x="570" y="128" width="190" height="40" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="585" y="153" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">Z = 16</text>
  <text x="650" y="153" font-family="Arial, sans-serif" font-size="12" fill="#64748b">— порядковый номер</text>

  <!-- Period -->
  <rect x="570" y="178" width="190" height="40" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="585" y="203" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">III период</text>
  <text x="675" y="203" font-family="Arial, sans-serif" font-size="12" fill="#64748b">— 3 уровня</text>

  <!-- Group -->
  <rect x="570" y="228" width="190" height="40" rx="8" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="585" y="253" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488">VI группа</text>
  <text x="672" y="253" font-family="Arial, sans-serif" font-size="12" fill="#64748b">— 6e⁻</text>

  <!-- Electrons on outer level -->
  <rect x="570" y="278" width="190" height="40" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="665" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488">6e на внешнем уровне</text>

  <!-- Non-metal -->
  <rect x="570" y="328" width="190" height="40" rx="8" fill="#2dd4bf" opacity="0.2" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="665" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0d9488">Неметалл</text>

  <!-- Electron configuration summary -->
  <rect x="570" y="383" width="190" height="80" rx="8" fill="#f0fdfa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="665" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488">Распределение e⁻:</text>
  <text x="665" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488">)2 )8 )6</text>
  <text x="665" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#64748b">2 + 8 + 6 = 16e⁻</text>
</svg>