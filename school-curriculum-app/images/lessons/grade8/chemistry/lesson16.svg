<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0d9488" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" rx="16" fill="#0d9488"/>
  <rect x="0" y="30" width="800" height="30" fill="#0d9488"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f0fdfa" text-anchor="middle">Классификация химических реакций</text>

  <!-- Type 1: Соединение -->
  <rect x="20" y="80" width="370" height="190" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="80" width="370" height="40" rx="12" fill="#14b8a6"/>
  <rect x="20" y="100" width="370" height="20" fill="#14b8a6"/>
  <text x="205" y="106" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Соединение</text>

  <!-- A + B → AB diagram -->
  <rect x="50" y="140" width="60" height="45" rx="8" fill="#2dd4bf" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="80" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">A</text>

  <text x="130" y="170" font-family="Arial, sans-serif" font-size="24" fill="#0d9488" text-anchor="middle">+</text>

  <rect x="150" y="140" width="60" height="45" rx="8" fill="#2dd4bf" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="180" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">B</text>

  <!-- Arrow -->
  <line x1="225" y1="162" x2="275" y2="162" stroke="#0d9488" stroke-width="2.5"/>
  <polygon points="275,155 290,162 275,169" fill="#0d9488"/>

  <rect x="295" y="140" width="70" height="45" rx="8" fill="#14b8a6" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="330" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">AB</text>

  <text x="205" y="225" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Пример: 2Na + Cl₂ → 2NaCl</text>
  <text x="205" y="250" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">Несколько → Одно вещество</text>

  <!-- Type 2: Разложение -->
  <rect x="410" y="80" width="370" height="190" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="80" width="370" height="40" rx="12" fill="#14b8a6"/>
  <rect x="410" y="100" width="370" height="20" fill="#14b8a6"/>
  <text x="595" y="106" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Разложение</text>

  <!-- AB → A + B diagram -->
  <rect x="435" y="140" width="70" height="45" rx="8" fill="#14b8a6" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="470" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">AB</text>

  <line x1="520" y1="162" x2="555" y2="162" stroke="#0d9488" stroke-width="2.5"/>
  <polygon points="555,155 570,162 555,169" fill="#0d9488"/>

  <rect x="580" y="140" width="60" height="45" rx="8" fill="#2dd4bf" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="610" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">A</text>

  <text x="660" y="170" font-family="Arial, sans-serif" font-size="24" fill="#0d9488" text-anchor="middle">+</text>

  <rect x="680" y="140" width="60" height="45" rx="8" fill="#2dd4bf" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="710" y="168" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">B</text>

  <text x="595" y="225" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Пример: 2H₂O → 2H₂ + O₂</text>
  <text x="595" y="250" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">Одно вещество → Несколько</text>

  <!-- Type 3: Замещение -->
  <rect x="20" y="290" width="370" height="190" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="20" y="290" width="370" height="40" rx="12" fill="#0d9488"/>
  <rect x="20" y="310" width="370" height="20" fill="#0d9488"/>
  <text x="205" y="316" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Замещение</text>

  <!-- A + BC → AC + B diagram -->
  <rect x="35" y="350" width="45" height="40" rx="7" fill="#2dd4bf" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="57" y="375" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488" text-anchor="middle">A</text>

  <text x="93" y="377" font-family="Arial, sans-serif" font-size="22" fill="#0d9488" text-anchor="middle">+</text>

  <rect x="107" y="350" width="55" height="40" rx="7" fill="#2dd4bf" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="134" y="375" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488" text-anchor="middle">BC</text>

  <line x1="175" y1="370" x2="210" y2="370" stroke="#0d9488" stroke-width="2.5"/>
  <polygon points="210,363 225,370 210,377" fill="#0d9488"/>

  <rect x="230" y="350" width="55" height="40" rx="7" fill="#14b8a6" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="257" y="375" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488" text-anchor="middle">AC</text>

  <text x="300" y="377" font-family="Arial, sans-serif" font-size="22" fill="#0d9488" text-anchor="middle">+</text>

  <rect x="314" y="350" width="45" height="40" rx="7" fill="#2dd4bf" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="336" y="375" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488" text-anchor="middle">B</text>

  <text x="205" y="430" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Пример: Zn + 2HCl → ZnCl₂ + H₂</text>
  <text x="205" y="455" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">Элемент заменяет часть соединения</text>

  <!-- Type 4: Обмен -->
  <rect x="410" y="290" width="370" height="190" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="290" width="370" height="40" rx="12" fill="#0d9488"/>
  <rect x="410" y="310" width="370" height="20" fill="#0d9488"/>
  <text x="595" y="316" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Обмен</text>

  <!-- AB + CD → AD + CB diagram -->
  <rect x="425" y="350" width="55" height="40" rx="7" fill="#2dd4bf" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="452" y="375" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488" text-anchor="middle">AB</text>

  <text x="493" y="377" font-family="Arial, sans-serif" font-size="22" fill="#0d9488" text-anchor="middle">+</text>

  <rect x="507" y="350" width="55" height="40" rx="7" fill="#2dd4bf" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="534" y="375" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488" text-anchor="middle">CD</text>

  <line x1="575" y1="370" x2="605" y2="370" stroke="#0d9488" stroke-width="2.5"/>
  <polygon points="605,363 620,370 605,377" fill="#0d9488"/>

  <rect x="625" y="350" width="55" height="40" rx="7" fill="#14b8a6" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="652" y="375" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488" text-anchor="middle">AD</text>

  <text x="693" y="377" font-family="Arial, sans-serif" font-size="22" fill="#0d9488" text-anchor="middle">+</text>

  <rect x="707" y="350" width="55" height="40" rx="7" fill="#14b8a6" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <text x="734" y="375" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488" text-anchor="middle">CB</text>

  <text x="595" y="430" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Пример: NaOH + HCl → NaCl + H₂O</text>
  <text x="595" y="455" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">Обмен частями между соединениями</text>
</svg>