<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccfbf1;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="cAtom" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="oAtomB" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow4">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#0d9488" flood-opacity="0.15"/>
    </filter>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg4)" rx="12" ry="12"/>
  <rect x="2" y="2" width="796" height="496" fill="none" stroke="#0d9488" stroke-width="2" rx="12" ry="12"/>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488" text-anchor="middle">Простые и сложные вещества. Аллотропия</text>
  <line x1="100" y1="52" x2="700" y2="52" stroke="#14b8a6" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Section label: Аллотропы углерода -->
  <rect x="200" y="62" width="400" height="30" rx="8" fill="#0d9488" opacity="0.12"/>
  <text x="400" y="83" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488" text-anchor="middle">Аллотропы углерода</text>

  <!-- LEFT: Diamond (Алмаз) -->
  <rect x="30" y="100" width="240" height="240" rx="12" fill="white" fill-opacity="0.7" stroke="#14b8a6" stroke-width="2" filter="url(#shadow4)"/>
  <text x="150" y="128" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">Алмаз</text>

  <!-- Diamond tetrahedral structure -->
  <g transform="translate(60, 140)">
    <!-- Central atom -->
    <circle cx="90" cy="80" r="12" fill="url(#cAtom)" filter="url(#glow4)"/>
    <text x="90" y="84" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">C</text>

    <!-- Top atom -->
    <circle cx="90" cy="20" r="10" fill="url(#cAtom)"/>
    <text x="90" y="24" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <line x1="90" y1="30" x2="90" y2="68" stroke="#2dd4bf" stroke-width="2.5"/>

    <!-- Bottom-left atom -->
    <circle cx="30" cy="130" r="10" fill="url(#cAtom)"/>
    <text x="30" y="134" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <line x1="38" y1="124" x2="80" y2="90" stroke="#2dd4bf" stroke-width="2.5"/>

    <!-- Bottom-right atom -->
    <circle cx="150" cy="130" r="10" fill="url(#cAtom)"/>
    <text x="150" y="134" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">C</text>
    <line x1="142" y1="124" x2="100" y2="90" stroke="#2dd4bf" stroke-width="2.5"/>

    <!-- Back atom (smaller, faded) -->
    <circle cx="45" cy="50" r="8" fill="url(#cAtom)" opacity="0.5"/>
    <line x1="52" y1="56" x2="80" y2="74" stroke="#2dd4bf" stroke-width="1.5" opacity="0.4"/>

    <!-- Additional outer bonds for network effect -->
    <line x1="90" y1="10" x2="90" y2="-5" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
    <line x1="22" y1="138" x2="10" y2="155" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>
    <line x1="158" y1="138" x2="170" y2="155" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.5"/>

    <!-- Small outer atoms -->
    <circle cx="90" cy="-10" r="6" fill="url(#cAtom)" opacity="0.35"/>
    <circle cx="5" cy="160" r="6" fill="url(#cAtom)" opacity="0.35"/>
    <circle cx="175" cy="160" r="6" fill="url(#cAtom)" opacity="0.35"/>
  </g>

  <!-- Diamond properties -->
  <text x="150" y="320" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">Тетраэдрическая</text>
  <text x="150" y="336" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">кристаллическая решётка</text>
  <text x="150" y="356" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">Самый твёрдый минерал</text>
  <!-- Diamond sparkle -->
  <text x="220" y="125" font-family="Arial, sans-serif" font-size="16" fill="#2dd4bf" opacity="0.7">✦</text>

  <!-- RIGHT: Graphite (Графит) -->
  <rect x="530" y="100" width="240" height="240" rx="12" fill="white" fill-opacity="0.7" stroke="#14b8a6" stroke-width="2" filter="url(#shadow4)"/>
  <text x="650" y="128" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">Графит</text>

  <!-- Graphite layered structure -->
  <g transform="translate(545, 145)">
    <!-- Layer 1 (top) -->
    <g transform="translate(0, 0)">
      <!-- Hexagonal ring -->
      <circle cx="60" cy="15" r="8" fill="url(#cAtom)"/>
      <circle cx="85" cy="30" r="8" fill="url(#cAtom)"/>
      <circle cx="85" cy="55" r="8" fill="url(#cAtom)"/>
      <circle cx="60" cy="70" r="8" fill="url(#cAtom)"/>
      <circle cx="35" cy="55" r="8" fill="url(#cAtom)"/>
      <circle cx="35" cy="30" r="8" fill="url(#cAtom)"/>
      <!-- Bonds -->
      <line x1="68" y1="19" x2="77" y2="26" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="85" y1="38" x2="85" y2="47" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="77" y1="59" x2="68" y2="66" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="52" y1="66" x2="43" y2="59" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="35" y1="47" x2="35" y2="38" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="43" y1="26" x2="52" y2="19" stroke="#2dd4bf" stroke-width="2"/>

      <!-- Extended ring to right -->
      <circle cx="110" cy="15" r="8" fill="url(#cAtom)"/>
      <circle cx="135" cy="30" r="8" fill="url(#cAtom)"/>
      <circle cx="135" cy="55" r="8" fill="url(#cAtom)"/>
      <circle cx="110" cy="70" r="8" fill="url(#cAtom)"/>
      <line x1="93" y1="19" x2="102" y2="19" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="110" y1="23" x2="127" y2="26" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="135" y1="38" x2="135" y2="47" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="127" y1="59" x2="118" y2="66" stroke="#2dd4bf" stroke-width="2"/>
      <line x1="102" y1="70" x2="93" y2="66" stroke="#2dd4bf" stroke-width="2"/>
    </g>

    <!-- Dashed line between layers -->
    <line x1="20" y1="85" x2="140" y2="85" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="155" y="89" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">слой</text>

    <!-- Layer 2 (bottom, slightly offset) -->
    <g transform="translate(12, 95)">
      <circle cx="60" cy="15" r="8" fill="url(#cAtom)" opacity="0.7"/>
      <circle cx="85" cy="30" r="8" fill="url(#cAtom)" opacity="0.7"/>
      <circle cx="85" cy="55" r="8" fill="url(#cAtom)" opacity="0.7"/>
      <circle cx="60" cy="70" r="8" fill="url(#cAtom)" opacity="0.7"/>
      <circle cx="35" cy="55" r="8" fill="url(#cAtom)" opacity="0.7"/>
      <circle cx="35" cy="30" r="8" fill="url(#cAtom)" opacity="0.7"/>
      <line x1="68" y1="19" x2="77" y2="26" stroke="#2dd4bf" stroke-width="1.5" opacity="0.6"/>
      <line x1="85" y1="38" x2="85" y2="47" stroke="#2dd4bf" stroke-width="1.5" opacity="0.6"/>
      <line x1="77" y1="59" x2="68" y2="66" stroke="#2dd4bf" stroke-width="1.5" opacity="0.6"/>
      <line x1="52" y1="66" x2="43" y2="59" stroke="#2dd4bf" stroke-width="1.5" opacity="0.6"/>
      <line x1="35" y1="47" x2="35" y2="38" stroke="#2dd4bf" stroke-width="1.5" opacity="0.6"/>
      <line x1="43" y1="26" x2="52" y2="19" stroke="#2dd4bf" stroke-width="1.5" opacity="0.6"/>
    </g>

    <!-- Dashed line between layers -->
    <line x1="20" y1="180" x2="140" y2="180" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  </g>

  <!-- Graphite properties -->
  <text x="650" y="320" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">Слоистая структура</text>
  <text x="650" y="336" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">Слабые связи между слоями</text>
  <text x="650" y="356" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">Мягкий, проводит ток</text>

  <!-- Center: "Same element" indicator -->
  <g transform="translate(290, 170)">
    <rect x="0" y="0" width="220" height="100" rx="10" fill="#0d9488" opacity="0.08" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="110" y="25" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488" text-anchor="middle">Один и тот же элемент!</text>
    <text x="110" y="48" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0d9488" text-anchor="middle">C</text>
    <text x="110" y="70" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">Разные свойства —</text>
    <text x="110" y="85" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">разные аллотропы</text>
  </g>

  <!-- Connecting lines from center to both structures -->
  <line x1="270" y1="220" x2="240" y2="220" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="530" y1="220" x2="510" y2="220" stroke="#14b8a6" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Section: Аллотропы кислорода -->
  <rect x="100" y="370" width="600" height="110" rx="10" fill="white" fill-opacity="0.7" stroke="#14b8a6" stroke-width="1.5" filter="url(#shadow4)"/>
  <text x="400" y="395" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488" text-anchor="middle">Аллотропы кислорода</text>

  <!-- O₂ molecule -->
  <g transform="translate(160, 410)">
    <circle cx="30" cy="25" r="20" fill="url(#oAtomB)"/>
    <text x="30" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <circle cx="75" cy="25" r="20" fill="url(#oAtomB)"/>
    <text x="75" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <!-- Double bond -->
    <line x1="50" y1="21" x2="55" y2="21" stroke="#2dd4bf" stroke-width="2"/>
    <line x1="50" y1="29" x2="55" y2="29" stroke="#2dd4bf" stroke-width="2"/>
    <text x="52" y="65" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488" text-anchor="middle">O₂</text>
    <text x="52" y="82" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">Кислород</text>
  </g>

  <!-- O₃ molecule -->
  <g transform="translate(430, 405)">
    <circle cx="30" cy="30" r="20" fill="url(#oAtomB)"/>
    <text x="30" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <circle cx="80" cy="15" r="20" fill="url(#oAtomB)"/>
    <text x="80" y="20" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <circle cx="80" cy="55" r="20" fill="url(#oAtomB)"/>
    <text x="80" y="60" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <!-- Bonds -->
    <line x1="48" y1="24" x2="60" y2="19" stroke="#2dd4bf" stroke-width="2"/>
    <line x1="48" y1="38" x2="60" y2="48" stroke="#2dd4bf" stroke-width="2"/>
    <!-- Central bond angle -->
    <line x1="80" y1="35" x2="80" y2="35" stroke="#2dd4bf" stroke-width="2"/>
    <text x="55" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488" text-anchor="middle">O₃</text>
    <text x="55" y="112" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">Озон</text>
  </g>

  <!-- Arrow between O₂ and O₃ -->
  <g transform="translate(310, 430)">
    <text x="55" y="-5" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">аллотропия</text>
    <line x1="0" y1="10" x2="90" y2="10" stroke="#0d9488" stroke-width="2"/>
    <polygon points="90,4 105,10 90,16" fill="#0d9488"/>
  </g>
</svg>
