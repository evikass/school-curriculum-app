<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccfbf1;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="hBall" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="sBall" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d9488;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="oBall" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow5">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#0d9488" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg5)" rx="12" ry="12"/>
  <rect x="2" y="2" width="796" height="496" fill="none" stroke="#0d9488" stroke-width="2" rx="12" ry="12"/>

  <!-- Title -->
  <text x="400" y="38" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">Химические формулы. Относительная атомная и молекулярная масса</text>
  <line x1="50" y1="50" x2="750" y2="50" stroke="#14b8a6" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Central H₂SO₄ formula display -->
  <rect x="180" y="65" width="440" height="80" rx="12" fill="white" fill-opacity="0.8" stroke="#0d9488" stroke-width="2" filter="url(#shadow5)"/>
  <text x="400" y="82" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">Химическая формула серной кислоты</text>

  <!-- H₂SO₄ with large text -->
  <text x="265" y="130" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#0d9488" text-anchor="middle">H</text>
  <text x="295" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#14b8a6">2</text>
  <text x="330" y="130" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#0d9488" text-anchor="middle">S</text>
  <text x="370" y="130" font-family="Arial, sans-serif" font-size="44" font-weight="bold" fill="#0d9488" text-anchor="middle">O</text>
  <text x="408" y="140" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#14b8a6">4</text>

  <!-- Annotation arrows pointing to each element -->
  <!-- Arrow to H -->
  <line x1="230" y1="108" x2="155" y2="108" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <rect x="60" y="96" width="90" height="26" rx="5" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="105" y="114" font-family="Arial, sans-serif" font-size="13" fill="#0d9488" text-anchor="middle">Водород H</text>

  <!-- Arrow to S -->
  <line x1="330" y1="90" x2="330" y2="68" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <rect x="285" y="55" width="90" height="20" rx="5" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="330" y="69" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">Сера S</text>

  <!-- Arrow to O -->
  <line x1="420" y1="108" x2="500" y2="108" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrowTeal)"/>
  <rect x="505" y="96" width="110" height="26" rx="5" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="560" y="114" font-family="Arial, sans-serif" font-size="13" fill="#0d9488" text-anchor="middle">Кислород O</text>

  <!-- Molecule model of H₂SO₄ -->
  <g transform="translate(270, 165)">
    <rect x="0" y="0" width="260" height="90" rx="8" fill="white" fill-opacity="0.5" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,2"/>

    <!-- S atom center -->
    <circle cx="130" cy="40" r="22" fill="url(#sBall)"/>
    <text x="130" y="46" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">S</text>

    <!-- O atoms around S -->
    <circle cx="60" cy="20" r="16" fill="url(#oBall)"/>
    <text x="60" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <line x1="76" y1="26" x2="108" y2="34" stroke="#2dd4bf" stroke-width="2"/>

    <circle cx="200" cy="20" r="16" fill="url(#oBall)"/>
    <text x="200" y="25" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <line x1="184" y1="26" x2="152" y2="34" stroke="#2dd4bf" stroke-width="2"/>

    <circle cx="70" cy="68" r="16" fill="url(#oBall)"/>
    <text x="70" y="73" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <line x1="86" y1="62" x2="110" y2="48" stroke="#2dd4bf" stroke-width="2"/>

    <circle cx="190" cy="68" r="16" fill="url(#oBall)"/>
    <text x="190" y="73" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">O</text>
    <line x1="174" y1="62" x2="148" y2="48" stroke="#2dd4bf" stroke-width="2"/>

    <!-- H atoms on O -->
    <circle cx="30" cy="10" r="10" fill="url(#hBall)"/>
    <text x="30" y="14" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="40" y1="15" x2="45" y2="17" stroke="#2dd4bf" stroke-width="1.5"/>

    <circle cx="100" cy="80" r="10" fill="url(#hBall)"/>
    <text x="100" y="84" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">H</text>
    <line x1="90" y1="76" x2="84" y2="72" stroke="#2dd4bf" stroke-width="1.5"/>
  </g>

  <!-- Calculation section -->
  <rect x="50" y="270" width="700" height="90" rx="12" fill="white" fill-opacity="0.8" stroke="#0d9488" stroke-width="2" filter="url(#shadow5)"/>

  <text x="400" y="295" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488" text-anchor="middle">Расчёт относительной молекулярной массы</text>

  <!-- The main calculation -->
  <text x="400" y="330" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0d9488" text-anchor="middle">Mr(H₂SO₄) = 2·Ar(H) + Ar(S) + 4·Ar(O)</text>
  <text x="400" y="355" font-family="Arial, sans-serif" font-size="22" fill="#14b8a6" text-anchor="middle">= 2·1 + 32 + 4·16 = 2 + 32 + 64 = 98</text>

  <!-- Ar values reference -->
  <rect x="50" y="380" width="700" height="55" rx="10" fill="#f0fdfa" fill-opacity="0.6" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488" text-anchor="middle">Относительные атомные массы (из таблицы Д.И. Менделеева)</text>

  <g transform="translate(120, 410)">
    <rect x="0" y="0" width="110" height="22" rx="4" fill="white" stroke="#14b8a6" stroke-width="1"/>
    <text x="55" y="16" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Ar(H) = 1</text>
  </g>
  <g transform="translate(280, 410)">
    <rect x="0" y="0" width="110" height="22" rx="4" fill="white" stroke="#14b8a6" stroke-width="1"/>
    <text x="55" y="16" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Ar(S) = 32</text>
  </g>
  <g transform="translate(440, 410)">
    <rect x="0" y="0" width="110" height="22" rx="4" fill="white" stroke="#14b8a6" stroke-width="1"/>
    <text x="55" y="16" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Ar(O) = 16</text>
  </g>

  <!-- Result highlight -->
  <rect x="580" y="405" width="160" height="30" rx="8" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="1.5"/>
  <text x="660" y="426" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0d9488" text-anchor="middle">Mr = 98</text>

  <!-- Bottom note -->
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">Mr — относительная молекулярная масса (безразмерная величина)</text>
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="12" fill="#2dd4bf" text-anchor="middle">Ar — относительная атомная масса химического элемента</text>
</svg>
