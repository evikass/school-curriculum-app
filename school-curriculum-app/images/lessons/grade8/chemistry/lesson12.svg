<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow12">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow12" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0d9488"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg12)" rx="12"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488">Ковалентная полярная связь</text>
  <text x="400" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#14b8a6">Общие электронные пары смещены к более электроотрицательному атому</text>

  <!-- HCl Molecule -->
  <g transform="translate(200, 230)">
    <rect x="-140" y="-110" width="280" height="240" rx="12" fill="white" fill-opacity="0.7" stroke="#2dd4bf" stroke-width="1.5" filter="url(#shadow12)"/>
    <text x="0" y="-85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488">Молекула HCl</text>

    <!-- H atom (left) -->
    <circle cx="-50" cy="0" r="25" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
    <text x="-50" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488">H</text>

    <!-- Cl atom (right, larger) -->
    <circle cx="55" cy="0" r="35" fill="#ccfbf1" stroke="#0d9488" stroke-width="2.5"/>
    <text x="55" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488">Cl</text>

    <!-- Shared electron pair shifted toward Cl -->
    <circle cx="12" cy="-4" r="4.5" fill="#0d9488"/>
    <circle cx="22" cy="-4" r="4.5" fill="#0d9488"/>

    <!-- Bond line -->
    <line x1="-25" y1="4" x2="20" y2="4" stroke="#0d9488" stroke-width="2.5"/>

    <!-- Electron shift arrow -->
    <line x1="-5" y1="-30" x2="30" y2="-30" stroke="#0d9488" stroke-width="2" marker-end="url(#arrow12)"/>
    <text x="12" y="-38" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">смещение e⁻</text>

    <!-- delta labels -->
    <text x="-50" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#dc2626">δ+</text>
    <text x="55" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2563eb">δ−</text>

    <!-- Lone pairs on Cl -->
    <circle cx="75" cy="-25" r="2.5" fill="#2dd4bf"/>
    <circle cx="82" cy="-18" r="2.5" fill="#2dd4bf"/>
    <circle cx="82" cy="18" r="2.5" fill="#2dd4bf"/>
    <circle cx="75" cy="25" r="2.5" fill="#2dd4bf"/>
    <circle cx="35" cy="-35" r="2.5" fill="#2dd4bf"/>
    <circle cx="45" cy="-38" r="2.5" fill="#2dd4bf"/>

    <!-- EN values -->
    <text x="-50" y="-35" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">ЭО=2,1</text>
    <text x="55" y="-45" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">ЭО=3,0</text>

    <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">Электронная плотность смещена к Cl</text>
    <text x="0" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">H → Cl (разность ЭО = 0,9)</text>

    <!-- Polarity indicator -->
    <rect x="-40" y="102" width="80" height="20" rx="5" fill="#0d9488" fill-opacity="0.15"/>
    <text x="0" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0d9488">ПОЛЯРНАЯ</text>
  </g>

  <!-- H₂O Molecule -->
  <g transform="translate(580, 230)">
    <rect x="-140" y="-110" width="280" height="240" rx="12" fill="white" fill-opacity="0.7" stroke="#2dd4bf" stroke-width="1.5" filter="url(#shadow12)"/>
    <text x="0" y="-85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488">Молекула H₂O</text>

    <!-- O atom (center, larger) -->
    <circle cx="0" cy="0" r="32" fill="#ccfbf1" stroke="#0d9488" stroke-width="2.5"/>
    <text x="0" y="7" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#0d9488">O</text>

    <!-- H atom left -->
    <circle cx="-58" cy="40" r="22" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
    <text x="-58" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0d9488">H</text>

    <!-- H atom right -->
    <circle cx="58" cy="40" r="22" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
    <text x="58" y="46" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0d9488">H</text>

    <!-- Bond lines (angular 104.5°) -->
    <line x1="-30" y1="18" x2="-38" y2="30" stroke="#0d9488" stroke-width="2.5"/>
    <line x1="30" y1="18" x2="38" y2="30" stroke="#0d9488" stroke-width="2.5"/>

    <!-- Shared electron pairs shifted toward O -->
    <circle cx="-18" cy="14" r="3.5" fill="#0d9488"/>
    <circle cx="-12" cy="20" r="3.5" fill="#0d9488"/>
    <circle cx="18" cy="14" r="3.5" fill="#0d9488"/>
    <circle cx="12" cy="20" r="3.5" fill="#0d9488"/>

    <!-- Lone pairs on O -->
    <circle cx="-15" cy="-30" r="2.5" fill="#2dd4bf"/>
    <circle cx="-5" cy="-33" r="2.5" fill="#2dd4bf"/>
    <circle cx="5" cy="-33" r="2.5" fill="#2dd4bf"/>
    <circle cx="15" cy="-30" r="2.5" fill="#2dd4bf"/>

    <!-- delta labels -->
    <text x="0" y="-40" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2563eb">δ−</text>
    <text x="-58" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#dc2626">δ+</text>
    <text x="58" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#dc2626">δ+</text>

    <!-- Angle indicator -->
    <path d="M -25 25 Q 0 15 25 25" fill="none" stroke="#2dd4bf" stroke-width="1.2" stroke-dasharray="3,2"/>
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">104,5°</text>

    <!-- Electron shift arrows -->
    <line x1="-45" y1="25" x2="-25" y2="15" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrow12)"/>
    <line x1="45" y1="25" x2="25" y2="15" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arrow12)"/>

    <!-- EN labels -->
    <text x="0" y="-55" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">ЭО(O)=3,5</text>
    <text x="-58" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6">ЭО(H)=2,1</text>

    <text x="0" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">Угловая форма</text>
    <text x="0" y="117" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6">2 полярные связи O—H</text>
  </g>

  <!-- Bottom summary -->
  <rect x="40" y="430" width="720" height="55" rx="10" fill="white" fill-opacity="0.8" stroke="#2dd4bf" stroke-width="1"/>
  <text x="400" y="452" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#0d9488">Ковалентная полярная связь образуется между атомами разных неметаллов.</text>
  <text x="400" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6">Электронная плотность смещена к атому с большей электроотрицательностью (δ+ → δ−).</text>
</svg>