<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <text x="250" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#E65100">Пищевые цепи</text>
  <line x1="100" y1="40" x2="400" y2="40" stroke="#F57C00" stroke-width="1.5" opacity="0.5"/>

  <!-- Food web -->
  <g transform="translate(15,48)">
    <rect x="0" y="0" width="280" height="155" rx="6" fill="white" fill-opacity="0.6" stroke="#F57C00" stroke-width="1"/>
    <text x="140" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100">Пищевая сеть</text>

    <!-- Producers (bottom) -->
    <g transform="translate(20,120)">
      <ellipse cx="18" cy="12" rx="18" ry="12" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
      <text x="18" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Трава</text>
    </g>
    <g transform="translate(70,120)">
      <ellipse cx="18" cy="12" rx="18" ry="12" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
      <text x="18" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Кустарник</text>
    </g>
    <g transform="translate(130,120)">
      <ellipse cx="18" cy="12" rx="18" ry="12" fill="#81C784" stroke="#2E7D32" stroke-width="1"/>
      <text x="18" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Дерево</text>
    </g>

    <!-- Primary consumers -->
    <g transform="translate(25,72)">
      <ellipse cx="20" cy="12" rx="20" ry="12" fill="#FFE0B2" stroke="#F57C00" stroke-width="1"/>
      <text x="20" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Мышь</text>
    </g>
    <g transform="translate(100,72)">
      <ellipse cx="20" cy="12" rx="20" ry="12" fill="#FFCC80" stroke="#F57C00" stroke-width="1"/>
      <text x="20" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Заяц</text>
    </g>
    <g transform="translate(180,72)">
      <ellipse cx="22" cy="12" rx="22" ry="12" fill="#FFE0B2" stroke="#F57C00" stroke-width="1"/>
      <text x="22" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Насекомые</text>
    </g>

    <!-- Secondary consumers -->
    <g transform="translate(60,32)">
      <ellipse cx="20" cy="12" rx="20" ry="12" fill="#FFAB91" stroke="#E65100" stroke-width="1.2"/>
      <text x="20" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#BF360C">Змея</text>
    </g>
    <g transform="translate(140,32)">
      <ellipse cx="20" cy="12" rx="20" ry="12" fill="#FF8A65" stroke="#E65100" stroke-width="1.2"/>
      <text x="20" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#BF360C">Лиса</text>
    </g>

    <!-- Tertiary consumer -->
    <g transform="translate(200,30)">
      <ellipse cx="22" cy="12" rx="22" ry="12" fill="#EF5350" stroke="#B71C1C" stroke-width="1.2"/>
      <text x="22" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold">Орёл</text>
    </g>

    <!-- Arrows: producers → primary consumers -->
    <line x1="38" y1="120" x2="38" y2="98" stroke="#F57C00" stroke-width="0.8" marker-end="url(#arrow)"/>
    <line x1="88" y1="120" x2="70" y2="98" stroke="#F57C00" stroke-width="0.8" marker-end="url(#arrow)"/>
    <line x1="108" y1="120" x2="108" y2="98" stroke="#F57C00" stroke-width="0.8" marker-end="url(#arrow)"/>
    <line x1="148" y1="120" x2="160" y2="98" stroke="#F57C00" stroke-width="0.8" marker-end="url(#arrow)"/>
    <line x1="195" y1="120" x2="195" y2="98" stroke="#F57C00" stroke-width="0.8" marker-end="url(#arrow)"/>

    <!-- Arrows: primary → secondary consumers -->
    <line x1="40" y1="78" x2="68" y2="60" stroke="#E65100" stroke-width="0.8" marker-end="url(#arrow)"/>
    <line x1="110" y1="78" x2="90" y2="60" stroke="#E65100" stroke-width="0.8" marker-end="url(#arrow)"/>
    <line x1="115" y1="78" x2="148" y2="60" stroke="#E65100" stroke-width="0.8" marker-end="url(#arrow)"/>
    <line x1="190" y1="78" x2="170" y2="60" stroke="#E65100" stroke-width="0.8" marker-end="url(#arrow)"/>
    <line x1="200" y1="78" x2="210" y2="58" stroke="#E65100" stroke-width="0.8" marker-end="url(#arrow)"/>

    <!-- Arrows: secondary → tertiary -->
    <line x1="85" y1="50" x2="200" y2="44" stroke="#B71C1C" stroke-width="0.8" marker-end="url(#arrow)"/>
    <line x1="165" y1="50" x2="208" y2="44" stroke="#B71C1C" stroke-width="0.8" marker-end="url(#arrow)"/>

    <!-- Trophic level labels -->
    <text x="260" y="135" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32">Продуценты</text>
    <text x="260" y="88" font-family="Arial,sans-serif" font-size="6.5" fill="#F57C00">Консум. I</text>
    <text x="260" y="52" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100">Консум. II</text>
    <text x="260" y="40" font-family="Arial,sans-serif" font-size="6.5" fill="#B71C1C">Консум. III</text>
  </g>

  <!-- Ecological pyramid -->
  <g transform="translate(305,48)">
    <rect x="0" y="0" width="185" height="155" rx="6" fill="white" fill-opacity="0.6" stroke="#F57C00" stroke-width="1"/>
    <text x="92" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100">Пирамида биомассы</text>

    <!-- Pyramid levels -->
    <polygon points="92,30 152,30 142,60 102,60" fill="#EF5350" stroke="#B71C1C" stroke-width="1"/>
    <text x="122" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold">Хищники</text>

    <polygon points="82,60 162,60 148,95 96,95" fill="#FF8A65" stroke="#E65100" stroke-width="1"/>
    <text x="122" y="80" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#BF360C">Растит.-ядные</text>

    <polygon points="72,95 172,95 152,130 92,130" fill="#FFE0B2" stroke="#F57C00" stroke-width="1"/>
    <text x="122" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Растительноядные</text>

    <polygon points="62,130 182,130 162,150 82,150" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
    <text x="122" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Продуценты</text>
  </g>

  <!-- 10% rule -->
  <g transform="translate(15,212)">
    <rect x="0" y="0" width="470" height="125" rx="6" fill="white" fill-opacity="0.5" stroke="#F57C00" stroke-width="1"/>
    <text x="235" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#E65100">Правило 10% (правило Линдемана)</text>

    <!-- Energy flow diagram -->
    <g transform="translate(20,30)">
      <!-- Producer -->
      <rect x="0" y="0" width="90" height="55" rx="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
      <text x="45" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Продуценты</text>
      <text x="45" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#2E7D32">1000 кДж</text>
      <text x="45" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Солнечная энергия</text>

      <!-- Arrow -->
      <line x1="90" y1="28" x2="120" y2="28" stroke="#F57C00" stroke-width="2"/>
      <polygon points="120,24 128,28 120,32" fill="#F57C00"/>
      <text x="107" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">10%</text>

      <!-- Primary consumer -->
      <rect x="128" y="0" width="90" height="55" rx="4" fill="#FFE0B2" stroke="#F57C00" stroke-width="1"/>
      <text x="173" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">Консум. I</text>
      <text x="173" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#F57C00">100 кДж</text>
      <text x="173" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Растительноядные</text>

      <!-- Arrow -->
      <line x1="218" y1="28" x2="248" y2="28" stroke="#F57C00" stroke-width="2"/>
      <polygon points="248,24 256,28 248,32" fill="#F57C00"/>
      <text x="235" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">10%</text>

      <!-- Secondary consumer -->
      <rect x="256" y="0" width="90" height="55" rx="4" fill="#FFAB91" stroke="#E65100" stroke-width="1"/>
      <text x="301" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#BF360C">Консум. II</text>
      <text x="301" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#E65100">10 кДж</text>
      <text x="301" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#BF360C">Хищники</text>

      <!-- Arrow -->
      <line x1="346" y1="28" x2="376" y2="28" stroke="#F57C00" stroke-width="2"/>
      <polygon points="376,24 384,28 376,32" fill="#F57C00"/>
      <text x="363" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">10%</text>

      <!-- Tertiary consumer -->
      <rect x="384" y="0" width="60" height="55" rx="4" fill="#EF5350" stroke="#B71C1C" stroke-width="1"/>
      <text x="414" y="16" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="white">Консум. III</text>
      <text x="414" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">1 кДж</text>
      <text x="414" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="white">Верхние</text>
      <text x="414" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="white">хищники</text>
    </g>

    <!-- Explanation -->
    <text x="235" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#E65100">Переходит только ~10% энергии на каждый следующий уровень</text>
    <text x="235" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#BF360C">90% энергии расходуется на дыхание, движение, тепло</text>
  </g>

  <text x="480" y="340" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#F57C00" opacity="0.6">Урок 38</text>
</svg>