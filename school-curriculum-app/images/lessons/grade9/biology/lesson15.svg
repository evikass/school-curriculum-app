  <text x="412" y="132" font-size="7" fill="#2E7D32" text-anchor="middle">Идиоадапт.</text>
  <line x1="440" y1="95" x2="465" y2="120" stroke="#43A047" stroke-width="1"/>
  <text x="475" y="132" font-size="7" fill="#2E7D32" text-anchor="middle">Дегенер.</text>

