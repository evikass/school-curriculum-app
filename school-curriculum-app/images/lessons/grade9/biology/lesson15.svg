  <text x="20" y="246" font-size="6" fill="#2E7D32" text-anchor="middle">Наследств.</text>
  <line x1="55" y1="215" x2="55" y2="235" stroke="#43A047" stroke-width="1"/>
  <text x="55" y="246" font-size="6" fill="#2E7D32" text-anchor="middle">Изменч.</text>
  <line x1="70" y1="215" x2="90" y2="235" stroke="#43A047" stroke-width="1"/>
