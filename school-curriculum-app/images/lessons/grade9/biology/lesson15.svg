<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg15)" rx="8"/>

  <!-- Center - ЭВОЛЮЦИЯ -->
  <ellipse cx="250" cy="175" rx="65" ry="35" fill="#2E7D32" fill-opacity="0.2" stroke="#1B5E20" stroke-width="2.5"/>
  <text x="250" y="172" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B5E20">ЭВОЛЮЦИЯ</text>
  <text x="250" y="188" text-anchor="middle" font-size="8" fill="#2E7D32">учение Дарвина</text>

  <!-- Branch 1: Микроэволюция (top-left) -->
  <line x1="195" y1="150" x2="110" y2="80" stroke="#388E3C" stroke-width="1.5"/>
  <rect x="30" y="50" width="110" height="45" rx="20" fill="#66BB6A" fill-opacity="0.4" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="85" y="70" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Микро-</text>
  <text x="85" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">эволюция</text>
  <!-- Sub-branches -->
  <line x1="55" y1="95" x2="30" y2="120" stroke="#43A047" stroke-width="1"/>
  <text x="20" y="132" font-size="7" fill="#2E7D32" text-anchor="middle">Популяция</text>
  <line x1="85" y1="95" x2="85" y2="120" stroke="#43A047" stroke-width="1"/>
  <text x="85" y="132" font-size="7" fill="#2E7D32" text-anchor="middle">Видообразов.</text>
  <line x1="115" y1="95" x2="140" y2="120" stroke="#43A047" stroke-width="1"/>
  <text x="150" y="132" font-size="7" fill="#2E7D32" text-anchor="middle">Изоляция</text>

  <!-- Branch 2: Макроэволюция (top-right) -->
  <line x1="305" y1="150" x2="390" y2="80" stroke="#388E3C" stroke-width="1.5"/>
  <rect x="355" y="50" width="115" height="45" rx="20" fill="#66BB6A" fill-opacity="0.4" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="412" y="70" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Макро-</text>
  <text x="412" y="83" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">эволюция</text>
  <!-- Sub-branches -->
  <line x1="385" y1="95" x2="360" y2="120" stroke="#43A047" stroke-width="1"/>
  <text x="350" y="132" font-size="7" fill="#2E7D32" text-anchor="middle">Ароморфоз</text>
