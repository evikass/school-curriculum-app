  <line x1="310" y1="185" x2="400" y2="195" stroke="#388E3C" stroke-width="1.5"/>
  <rect x="380" y="175" width="110" height="40" rx="18" fill="#A5D6A7" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="435" y="192" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B5E20">Доказательства</text>
  <text x="435" y="205" text-anchor="middle" font-size="7" fill="#2E7D32">эволюции</text>
  <!-- Sub items -->
  <line x1="410" y1="215" x2="385" y2="235" stroke="#43A047" stroke-width="1"/>
  <text x="375" y="246" font-size="6" fill="#2E7D32" text-anchor="middle">Палеонтол.</text>
  <line x1="435" y1="215" x2="435" y2="235" stroke="#43A047" stroke-width="1"/>
