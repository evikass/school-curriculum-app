  <line x1="460" y1="215" x2="485" y2="235" stroke="#43A047" stroke-width="1"/>
  <text x="485" y="246" font-size="6" fill="#2E7D32" text-anchor="middle">Эмбриол.</text>
  <!-- Extra sub items -->
  <line x1="390" y1="248" x2="375" y2="265" stroke="#43A047" stroke-width="0.8"/>
  <text x="375" y="275" font-size="6" fill="#2E7D32" text-anchor="middle">Молекул.</text>
  <line x1="460" y1="248" x2="475" y2="265" stroke="#43A047" stroke-width="0.8"/>
  <text x="475" y="275" font-size="6" fill="#2E7D32" text-anchor="middle">Биогеогр.</text>

  <!-- Branch 5: Антропогенез (bottom-left) -->
  <line x1="210" y1="205" x2="140" y2="280" stroke="#388E3C" stroke-width="1.5"/>
  <rect x="75" y="270" width="105" height="38" rx="18" fill="#81C784" fill-opacity="0.4" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="127" y="287" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B5E20">Антропогенез</text>
  <text x="127" y="300" text-anchor="middle" font-size="7" fill="#2E7D32">происхождение</text>
  <!-- Sub -->
  <line x1="100" y1="308" x2="70" y2="325" stroke="#43A047" stroke-width="1"/>
  <text x="60" y="336" font-size="6" fill="#2E7D32" text-anchor="middle">Дриопитеки</text>
  <line x1="127" y1="308" x2="127" y2="325" stroke="#43A047" stroke-width="1"/>
  <text x="127" y="336" font-size="6" fill="#2E7D32" text-anchor="middle">Австралопитек</text>
  <line x1="155" y1="308" x2="185" y2="325" stroke="#43A047" stroke-width="1"/>
  <text x="195" y="336" font-size="6" fill="#2E7D32" text-anchor="middle">H.sapiens</text>

  <!-- Branch 6: Развитие жизни (bottom-right) -->
  <line x1="290" y1="205" x2="355" y2="280" stroke="#388E3C" stroke-width="1.5"/>
  <rect x="310" y="270" width="115" height="38" rx="18" fill="#81C784" fill-opacity="0.4" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="367" y="287" text-anchor="middle" font-size="9" font-weight="bold" fill="#1B5E20">Развитие</text>
  <text x="367" y="300" text-anchor="middle" font-size="7" fill="#2E7D32">жизни на Земле</text>
  <!-- Sub -->
  <line x1="340" y1="308" x2="310" y2="325" stroke="#43A047" stroke-width="1"/>
  <text x="300" y="336" font-size="6" fill="#2E7D32" text-anchor="middle">Архей-Протер.</text>
  <line x1="367" y1="308" x2="367" y2="325" stroke="#43A047" stroke-width="1"/>
  <text x="367" y="336" font-size="6" fill="#2E7D32" text-anchor="middle">Палеозой</text>
  <line x1="395" y1="308" x2="425" y2="325" stroke="#43A047" stroke-width="1"/>
  <text x="440" y="336" font-size="6" fill="#2E7D32" text-anchor="middle">Мезо-Кайнозой</text>

  <!-- Decorative circles around center -->
  <circle cx="250" cy="175" r="80" fill="none" stroke="#43A047" stroke-width="0.5" stroke-dasharray="4,3"/>
  <circle cx="250" cy="175" r="120" fill="none" stroke="#66BB6A" stroke-width="0.3" stroke-dasharray="2,4"/>
</svg>