<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#B71C1C">Мутации</text>
  <line x1="100" y1="40" x2="400" y2="40" stroke="#E53935" stroke-width="1.5" opacity="0.5"/>

  <!-- DNA double helix center -->
  <g transform="translate(80,60)">
    <!-- DNA strand left -->
    <path d="M20,10 Q40,30 20,50 Q0,70 20,90 Q40,110 20,130 Q0,150 20,170 Q40,190 20,210" fill="none" stroke="#E53935" stroke-width="3"/>
    <!-- DNA strand right -->
    <path d="M60,10 Q40,30 60,50 Q80,70 60,90 Q40,110 60,130 Q80,150 60,170 Q40,190 60,210" fill="none" stroke="#C62828" stroke-width="3"/>
    <!-- Base pairs -->
    <line x1="22" y1="20" x2="58" y2="20" stroke="#EF9A9A" stroke-width="2"/>
    <line x1="18" y1="50" x2="62" y2="50" stroke="#EF9A9A" stroke-width="2"/>
    <line x1="22" y1="80" x2="58" y2="80" stroke="#EF9A9A" stroke-width="2"/>
    <line x1="18" y1="110" x2="62" y2="110" stroke="#EF9A9A" stroke-width="2"/>
    <!-- Mutation marker - crossed out base pair -->
    <line x1="22" y1="140" x2="58" y2="140" stroke="#FF5252" stroke-width="2.5" stroke-dasharray="4,2"/>
    <line x1="18" y1="170" x2="62" y2="170" stroke="#EF9A9A" stroke-width="2"/>
    <line x1="22" y1="200" x2="58" y2="200" stroke="#EF9A9A" stroke-width="2"/>
    <!-- Mutation flash -->
    <polygon points="40,125 35,138 43,138 38,155 48,135 41,135 45,125" fill="#FF6F00" opacity="0.9"/>
    <text x="40" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#B71C1C">Генная мутация</text>
  </g>

  <!-- Chromosome mutations -->
  <g transform="translate(170,55)">
    <rect x="0" y="0" width="130" height="85" rx="6" fill="white" fill-opacity="0.6" stroke="#E53935" stroke-width="1"/>
    <text x="65" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828">Хромосомные мутации</text>
    <!-- Normal chromosome -->
    <rect x="8" y="25" width="12" height="30" rx="3" fill="#EF9A9A"/>
    <text x="14" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C">Норма</text>
    <!-- Deletion -->
    <rect x="32" y="25" width="8" height="30" rx="3" fill="#FF8A80"/>
    <text x="36" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C">Делеция</text>
    <!-- Duplication -->
    <rect x="50" y="25" width="16" height="30" rx="3" fill="#FF8A80"/>
    <rect x="50" y="35" width="16" height="10" rx="2" fill="#FF5252" opacity="0.5"/>
    <text x="58" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C">Дупликация</text>
    <!-- Inversion -->
    <rect x="74" y="25" width="12" height="30" rx="3" fill="#FF8A80"/>
    <path d="M77,28 L83,28 L80,34 Z" fill="#FF5252"/>
    <text x="80" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C">Инверсия</text>
    <!-- Translocation -->
    <rect x="98" y="25" width="12" height="20" rx="3" fill="#FF8A80"/>
    <rect x="98" y="42" width="12" height="13" rx="3" fill="#EF9A9A" stroke="#FF5252" stroke-width="1" stroke-dasharray="2,1"/>
    <text x="104" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C">Транслок.</text>
  </g>

  <!-- Genome mutations -->
  <g transform="translate(170,150)">
    <rect x="0" y="0" width="130" height="80" rx="6" fill="white" fill-opacity="0.6" stroke="#E53935" stroke-width="1"/>
    <text x="65" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828">Геномные мутации</text>
    <!-- Normal 2n -->
    <g transform="translate(10,25)">
      <ellipse cx="8" cy="8" rx="5" ry="8" fill="#EF9A9A" stroke="#E53935" stroke-width="0.8"/>
      <ellipse cx="20" cy="8" rx="5" ry="8" fill="#EF9A9A" stroke="#E53935" stroke-width="0.8"/>
      <text x="14" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C">2n</text>
    </g>
    <!-- Polyploidy 4n -->
    <g transform="translate(48,22)">
      <ellipse cx="6" cy="8" rx="4" ry="7" fill="#FF8A80" stroke="#E53935" stroke-width="0.8"/>
      <ellipse cx="16" cy="8" rx="4" ry="7" fill="#FF8A80" stroke="#E53935" stroke-width="0.8"/>
      <ellipse cx="26" cy="8" rx="4" ry="7" fill="#FF8A80" stroke="#E53935" stroke-width="0.8"/>
      <ellipse cx="36" cy="8" rx="4" ry="7" fill="#FF8A80" stroke="#E53935" stroke-width="0.8"/>
      <text x="21" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C">4n (полиплоидия)</text>
    </g>
    <!-- Aneuploidy 2n+1 -->
    <g transform="translate(10,50)">
      <ellipse cx="6" cy="6" rx="4" ry="6" fill="#FF8A80" stroke="#E53935" stroke-width="0.8"/>
      <ellipse cx="16" cy="6" rx="4" ry="6" fill="#FF8A80" stroke="#E53935" stroke-width="0.8"/>
      <ellipse cx="26" cy="6" rx="4" ry="6" fill="#FF5252" stroke="#C62828" stroke-width="1"/>
      <text x="16" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C">2n+1 (анеуплоидия)</text>
    </g>
  </g>

  <!-- Mutagens -->
  <g transform="translate(320,55)">
    <rect x="0" y="0" width="165" height="175" rx="6" fill="white" fill-opacity="0.6" stroke="#E53935" stroke-width="1"/>
    <text x="82" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#C62828">Мутагены</text>

    <!-- Radiation icon -->
    <g transform="translate(20,30)">
      <circle cx="12" cy="12" r="4" fill="#FF5252"/>
      <path d="M12,8 A6,6 0 0,1 17,5 L12,12 Z" fill="#FF5252"/>
      <path d="M16,14 A6,6 0 0,1 16,20 L12,12 Z" fill="#FF5252"/>
      <path d="M8,14 A6,6 0 0,1 8,8 L12,12 Z" fill="#FF5252"/>
      <text x="30" y="16" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C">Радиация</text>
    </g>

    <!-- Chemical icon -->
    <g transform="translate(20,65)">
      <circle cx="8" cy="8" r="6" fill="none" stroke="#FF5252" stroke-width="1.5"/>
      <circle cx="20" cy="8" r="6" fill="none" stroke="#FF5252" stroke-width="1.5"/>
      <line x1="14" y1="4" x2="14" y2="12" stroke="#FF5252" stroke-width="1.5"/>
      <text x="32" y="12" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C">Химические</text>
    </g>

    <!-- UV icon -->
    <g transform="translate(20,98)">
      <circle cx="10" cy="10" r="6" fill="#FFAB91"/>
      <line x1="10" y1="2" x2="10" y2="0" stroke="#FF6F00" stroke-width="1.5"/>
      <line x1="16" y1="4" x2="18" y2="2" stroke="#FF6F00" stroke-width="1.5"/>
      <line x1="18" y1="10" x2="20" y2="10" stroke="#FF6F00" stroke-width="1.5"/>
      <line x1="16" y1="16" x2="18" y2="18" stroke="#FF6F00" stroke-width="1.5"/>
      <text x="28" y="14" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C">УФ-излучение</text>
    </g>

    <!-- Viruses icon -->
    <g transform="translate(20,130)">
      <circle cx="10" cy="8" r="6" fill="#FF8A80" stroke="#C62828" stroke-width="1"/>
      <line x1="10" y1="14" x2="10" y2="20" stroke="#C62828" stroke-width="1"/>
      <line x1="6" y1="17" x2="14" y2="17" stroke="#C62828" stroke-width="1"/>
      <circle cx="4" cy="20" r="2" fill="#FF8A80"/>
      <circle cx="16" cy="20" r="2" fill="#FF8A80"/>
      <text x="28" y="14" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C">Вирусы</text>
    </g>
  </g>

  <!-- Properties of mutations -->
  <g transform="translate(170,240)">
    <rect x="0" y="0" width="315" height="95" rx="6" fill="white" fill-opacity="0.5" stroke="#E53935" stroke-width="1"/>
    <text x="157" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#C62828">Свойства мутаций</text>

    <circle cx="25" cy="38" r="4" fill="#FF5252"/>
    <text x="35" y="42" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C">Случайность — возникают непредсказуемо</text>

    <circle cx="25" cy="56" r="4" fill="#FF5252"/>
    <text x="35" y="60" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C">Ненаправленность — не отвечают потребностям организма</text>

    <circle cx="25" cy="74" r="4" fill="#FF5252"/>
    <text x="35" y="78" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C">Редкость — частота мутаций мала (~10⁻⁵ на ген)</text>

    <circle cx="25" cy="92" r="4" fill="#FF5252"/>
    <text x="35" y="96" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C">Наследуемость — передаются потомкам</text>
  </g>

  <!-- Lesson number -->
  <text x="480" y="340" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#E53935" opacity="0.6">Урок 31</text>
</svg>