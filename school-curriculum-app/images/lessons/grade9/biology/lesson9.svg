<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <filter id="shadow9" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow9" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,2 L8,5 L0,8Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg9)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#2E7D32" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#2E7D32"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Урок 9: Естественный отбор</text>

  <!-- Row 1: Three types side by side -->
  <!-- Стабилизирующий (left) -->
  <g filter="url(#shadow9)">
    <rect x="8" y="50" width="158" height="175" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="8" y="50" width="158" height="22" rx="8" fill="#1B5E20"/>
    <rect x="8" y="64" width="158" height="8" fill="#1B5E20"/>
    <text x="87" y="66" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Стабилизирующий</text>

    <!-- Original bell curve (gray) -->
    <g transform="translate(87,120)">
      <!-- Axes -->
      <line x1="-60" y1="55" x2="60" y2="55" stroke="#9E9E9E" stroke-width="1"/>
      <line x1="-60" y1="55" x2="-60" y2="0" stroke="#9E9E9E" stroke-width="1"/>
      <!-- Original curve -->
      <path d="M-55,52 Q-40,48 -25,35 Q-10,15 0,5 Q10,15 25,35 Q40,48 55,52" fill="#BDBDBD" fill-opacity="0.3" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="3,2"/>
      <!-- Selected curve - narrower, taller at center -->
      <path d="M-55,53 Q-45,52 -35,48 Q-20,35 -10,15 Q0,-5 10,15 Q20,35 35,48 Q45,52 55,53" fill="#4CAF50" fill-opacity="0.25" stroke="#2E7D32" stroke-width="2"/>
      <!-- Shading showing eliminated extremes -->
      <rect x="-60" y="5" width="20" height="50" fill="#EF5350" fill-opacity="0.15"/>
      <rect x="40" y="5" width="20" height="50" fill="#EF5350" fill-opacity="0.15"/>
      <text x="-50" y="35" fill="#C62828" font-size="8">✕</text>
      <text x="50" y="35" fill="#C62828" font-size="8">✕</text>
    </g>

    <!-- Arrow -->
    <text x="87" y="195" text-anchor="middle" fill="#2E7D32" font-size="7">Условия стабильны</text>
    <text x="87" y="207" text-anchor="middle" fill="#1B5E20" font-size="7" font-weight="bold">→ Сохраняется норма</text>
    <text x="87" y="218" text-anchor="middle" fill="#388E3C" font-size="7">Устраняются крайние</text>
    <text x="87" y="228" text-anchor="middle" fill="#388E3C" font-size="7">отклонения</text>
  </g>

  <!-- Движущий (center) -->
  <g filter="url(#shadow9)">
    <rect x="172" y="50" width="158" height="175" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="172" y="50" width="158" height="22" rx="8" fill="#2E7D32"/>
    <rect x="172" y="64" width="158" height="8" fill="#2E7D32"/>
    <text x="251" y="66" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Движущий</text>

    <g transform="translate(251,120)">
      <line x1="-60" y1="55" x2="60" y2="55" stroke="#9E9E9E" stroke-width="1"/>
      <line x1="-60" y1="55" x2="-60" y2="0" stroke="#9E9E9E" stroke-width="1"/>
      <!-- Original curve -->
      <path d="M-55,52 Q-40,48 -25,35 Q-10,15 0,5 Q10,15 25,35 Q40,48 55,52" fill="#BDBDBD" fill-opacity="0.3" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="3,2"/>
      <!-- Shifted curve -->
      <path d="M-25,52 Q-10,48 5,35 Q20,15 30,5 Q40,15 50,35 Q55,48 55,52" fill="#4CAF50" fill-opacity="0.25" stroke="#2E7D32" stroke-width="2"/>
      <!-- Arrow showing direction of shift -->
      <path d="M0,10 L25,10" stroke="#C62828" stroke-width="2" marker-end="url(#arrow9red)"/>
    </g>

    <defs>
      <marker id="arrow9red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M0,2 L8,5 L0,8Z" fill="#C62828"/>
      </marker>
    </defs>

    <text x="251" y="195" text-anchor="middle" fill="#2E7D32" font-size="7">Условия изменяются</text>
    <text x="251" y="207" text-anchor="middle" fill="#1B5E20" font-size="7" font-weight="bold">→ Сдвиг среднего</text>
    <text x="251" y="218" text-anchor="middle" fill="#388E3C" font-size="7">Благоприятствует одному</text>
    <text x="251" y="228" text-anchor="middle" fill="#388E3C" font-size="7">направлению изменений</text>
  </g>

  <!-- Дизруптивный (right) -->
  <g filter="url(#shadow9)">
    <rect x="336" y="50" width="156" height="175" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="336" y="50" width="156" height="22" rx="8" fill="#388E3C"/>
    <rect x="336" y="64" width="156" height="8" fill="#388E3C"/>
    <text x="414" y="66" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Дизруптивный</text>

    <g transform="translate(414,120)">
      <line x1="-60" y1="55" x2="60" y2="55" stroke="#9E9E9E" stroke-width="1"/>
      <line x1="-60" y1="55" x2="-60" y2="0" stroke="#9E9E9E" stroke-width="1"/>
      <!-- Original curve -->
      <path d="M-55,52 Q-40,48 -25,35 Q-10,15 0,5 Q10,15 25,35 Q40,48 55,52" fill="#BDBDBD" fill-opacity="0.3" stroke="#9E9E9E" stroke-width="1.5" stroke-dasharray="3,2"/>
      <!-- Two peaks - disruptive selection -->
      <path d="M-55,52 Q-48,48 -40,38 Q-32,20 -25,8 Q-18,20 -12,38 Q-8,48 -5,52 Q-2,48 2,50 Q5,52 8,48 Q14,38 22,20 Q30,8 35,20 Q40,38 48,48 Q52,52 55,53" fill="#4CAF50" fill-opacity="0.25" stroke="#2E7D32" stroke-width="2"/>
      <!-- X on eliminated center -->
      <text x="0" y="42" fill="#C62828" font-size="10">✕</text>
    </g>

    <text x="414" y="195" text-anchor="middle" fill="#2E7D32" font-size="7">Два оптимума среды</text>
    <text x="414" y="207" text-anchor="middle" fill="#1B5E20" font-size="7" font-weight="bold">→ Два направления</text>
    <text x="414" y="218" text-anchor="middle" fill="#388E3C" font-size="7">Устраняются средние</text>
    <text x="414" y="228" text-anchor="middle" fill="#388E3C" font-size="7">значения признака</text>
  </g>

  <!-- Bottom comparison section -->
  <rect x="8" y="232" width="484" height="110" rx="8" fill="white" fill-opacity="0.8" stroke="#2E7D32" stroke-width="1"/>
  <text x="250" y="250" text-anchor="middle" fill="#1B5E20" font-size="11" font-weight="bold">Сравнение форм естественного отбора</text>

  <!-- Table header -->
  <rect x="15" y="258" width="470" height="18" rx="3" fill="#C8E6C9"/>
  <text x="75" y="270" text-anchor="middle" fill="#1B5E20" font-size="8" font-weight="bold">Признак</text>
  <text x="195" y="270" text-anchor="middle" fill="#1B5E20" font-size="8" font-weight="bold">Стабилизирующий</text>
  <text x="320" y="270" text-anchor="middle" fill="#1B5E20" font-size="8" font-weight="bold">Движущий</text>
  <text x="440" y="270" text-anchor="middle" fill="#1B5E20" font-size="8" font-weight="bold">Дизруптивный</text>

  <!-- Row 1 -->
  <line x1="15" y1="280" x2="485" y2="280" stroke="#C8E6C9" stroke-width="0.5"/>
  <text x="75" y="291" text-anchor="middle" fill="#2E7D32" font-size="7">Условия среды</text>
  <text x="195" y="291" text-anchor="middle" fill="#5D4037" font-size="7">Стабильные</text>
  <text x="320" y="291" text-anchor="middle" fill="#5D4037" font-size="7">Изменяются в одном направлении</text>
  <text x="440" y="291" text-anchor="middle" fill="#5D4037" font-size="7">Два оптимума</text>

  <!-- Row 2 -->
  <line x1="15" y1="298" x2="485" y2="298" stroke="#C8E6C9" stroke-width="0.5"/>
  <text x="75" y="309" text-anchor="middle" fill="#2E7D32" font-size="7">Что сохраняется</text>
  <text x="195" y="309" text-anchor="middle" fill="#5D4037" font-size="7">Среднее значение</text>
  <text x="320" y="309" text-anchor="middle" fill="#5D4037" font-size="7">Новое отклонение</text>
  <text x="440" y="309" text-anchor="middle" fill="#5D4037" font-size="7">Крайние формы</text>

  <!-- Row 3 -->
  <line x1="15" y1="316" x2="485" y2="316" stroke="#C8E6C9" stroke-width="0.5"/>
  <text x="75" y="327" text-anchor="middle" fill="#2E7D32" font-size="7">Что устраняется</text>
  <text x="195" y="327" text-anchor="middle" fill="#5D4037" font-size="7">Крайние отклонения</text>
  <text x="320" y="327" text-anchor="middle" fill="#5D4037" font-size="7">Старая норма</text>
  <text x="440" y="327" text-anchor="middle" fill="#5D4037" font-size="7">Среднее значение</text>

  <!-- Vertical dividers -->
  <line x1="135" y1="258" x2="135" y2="335" stroke="#C8E6C9" stroke-width="0.5"/>
  <line x1="260" y1="258" x2="260" y2="335" stroke="#C8E6C9" stroke-width="0.5"/>
  <line x1="380" y1="258" x2="380" y2="335" stroke="#C8E6C9" stroke-width="0.5"/>
</svg>