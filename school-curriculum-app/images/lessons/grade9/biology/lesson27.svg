<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg27" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg27)" rx="12"/>
  <rect x="4" y="4" width="492" height="342" fill="none" stroke="#4CAF50" stroke-width="2" rx="10"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B5E20">Законы Менделя</text>
  <line x1="40" y1="36" x2="460" y2="36" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- First Law: Uniformity of F1 -->
  <rect x="10" y="42" width="155" height="145" rx="6" fill="#ffffff" fill-opacity="0.6" stroke="#66BB6A" stroke-width="1.2"/>
  <text x="88" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">I закон</text>
  <text x="88" y="70" text-anchor="middle" font-size="8" fill="#2E7D32">Единообразие F₁</text>

  <!-- Parents -->
  <text x="88" y="86" text-anchor="middle" font-size="10" fill="#1B5E20" font-weight="bold">P: AA × aa</text>
  <!-- AA circle -->
  <circle cx="55" cy="100" r="12" fill="#FFD54F" stroke="#F9A825" stroke-width="1.2"/>
  <text x="55" y="104" text-anchor="middle" font-size="8" font-weight="bold" fill="#E65100">AA</text>
  <!-- × -->
  <text x="88" y="104" text-anchor="middle" font-size="12" fill="#2E7D32">×</text>
  <!-- aa circle -->
  <circle cx="120" cy="100" r="12" fill="#A5D6A7" stroke="#388E3C" stroke-width="1.2"/>
  <text x="120" y="104" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20">aa</text>

  <!-- Arrow down -->
  <text x="88" y="122" text-anchor="middle" font-size="10" fill="#2E7D32">↓</text>

  <!-- F1 all Aa -->
  <text x="88" y="135" text-anchor="middle" font-size="10" fill="#1B5E20" font-weight="bold">F₁: все Aa</text>

  <!-- 4 Aa peas -->
  <circle cx="48" cy="152" r="10" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <text x="48" y="155" text-anchor="middle" font-size="7" fill="#E65100">Aa</text>
  <circle cx="72" cy="152" r="10" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <text x="72" y="155" text-anchor="middle" font-size="7" fill="#E65100">Aa</text>
  <circle cx="96" cy="152" r="10" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <text x="96" y="155" text-anchor="middle" font-size="7" fill="#E65100">Aa</text>
  <circle cx="120" cy="152" r="10" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <text x="120" y="155" text-anchor="middle" font-size="7" fill="#E65100">Aa</text>

  <text x="88" y="176" text-anchor="middle" font-size="8" fill="#2E7D32">100% доминантный</text>
  <text x="88" y="186" text-anchor="middle" font-size="7" fill="#388E3C" font-style="italic">признак</text>

  <!-- Second Law: 3:1 split in F2 -->
  <rect x="172" y="42" width="155" height="145" rx="6" fill="#ffffff" fill-opacity="0.6" stroke="#66BB6A" stroke-width="1.2"/>
  <text x="250" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">II закон</text>
  <text x="250" y="70" text-anchor="middle" font-size="8" fill="#2E7D32">Расщепление F₂</text>

  <text x="250" y="86" text-anchor="middle" font-size="10" fill="#1B5E20" font-weight="bold">F₁: Aa × Aa</text>

  <!-- Punnett square -->
  <rect x="212" y="92" width="76" height="52" rx="2" fill="none" stroke="#2E7D32" stroke-width="1"/>
  <line x1="250" y1="92" x2="250" y2="144" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="212" y1="118" x2="288" y2="118" stroke="#2E7D32" stroke-width="0.8"/>

  <!-- Headers -->
  <text x="231" y="102" text-anchor="middle" font-size="8" fill="#1B5E20">A</text>
  <text x="269" y="102" text-anchor="middle" font-size="8" fill="#1B5E20">a</text>
  <text x="220" y="112" text-anchor="middle" font-size="8" fill="#1B5E20">A</text>
  <text x="220" y="132" text-anchor="middle" font-size="8" fill="#1B5E20">a</text>

  <!-- Cells -->
  <text x="231" y="128" text-anchor="middle" font-size="8" font-weight="bold" fill="#E65100">AA</text>
  <text x="269" y="128" text-anchor="middle" font-size="8" font-weight="bold" fill="#E65100">Aa</text>
  <text x="231" y="142" text-anchor="middle" font-size="8" font-weight="bold" fill="#E65100">Aa</text>
  <text x="269" y="142" text-anchor="middle" font-size="8" font-weight="bold" fill="#2E7D32">aa</text>

  <!-- F2 results -->
  <text x="250" y="158" text-anchor="middle" font-size="10" fill="#1B5E20" font-weight="bold">F₂: 3 : 1</text>

  <!-- 3 yellow, 1 green -->
  <circle cx="218" cy="174" r="8" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <circle cx="238" cy="174" r="8" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <circle cx="258" cy="174" r="8" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <circle cx="278" cy="174" r="8" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.8"/>

  <text x="250" y="195" text-anchor="middle" font-size="7" fill="#388E3C" font-style="italic">по фенотипу 3:1</text>
  <text x="250" y="205" text-anchor="middle" font-size="7" fill="#388E3C" font-style="italic">по генотипу 1:2:1</text>

  <!-- Third Law: Dihybrid 9:3:3:1 -->
  <rect x="334" y="42" width="158" height="145" rx="6" fill="#ffffff" fill-opacity="0.6" stroke="#66BB6A" stroke-width="1.2"/>
  <text x="413" y="58" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">III закон</text>
  <text x="413" y="70" text-anchor="middle" font-size="8" fill="#2E7D32">Независимое наследование</text>

  <text x="413" y="86" text-anchor="middle" font-size="9" fill="#1B5E20" font-weight="bold">AaBb × AaBb</text>

  <!-- Mini Punnett 4x4 -->
  <rect x="370" y="90" width="86" height="60" rx="1" fill="none" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- grid lines -->
  <line x1="391.5" y1="90" x2="391.5" y2="150" stroke="#2E7D32" stroke-width="0.4"/>
  <line x1="413" y1="90" x2="413" y2="150" stroke="#2E7D32" stroke-width="0.4"/>
  <line x1="434.5" y1="90" x2="434.5" y2="150" stroke="#2E7D32" stroke-width="0.4"/>
  <line x1="370" y1="105" x2="456" y2="105" stroke="#2E7D32" stroke-width="0.4"/>
  <line x1="370" y1="120" x2="456" y2="120" stroke="#2E7D32" stroke-width="0.4"/>
  <line x1="370" y1="135" x2="456" y2="135" stroke="#2E7D32" stroke-width="0.4"/>

  <!-- Color cells by phenotype -->
  <!-- Row 1: 9 A_B_ yellow round -->
  <rect x="371" y="91" width="20" height="13" fill="#FFD54F" rx="1"/>
  <rect x="392" y="91" width="20" height="13" fill="#FFD54F" rx="1"/>
  <rect x="413.5" y="91" width="20" height="13" fill="#FFD54F" rx="1"/>
  <rect x="435" y="91" width="20" height="13" fill="#FFD54F" rx="1"/>
  <!-- Row 2 -->
  <rect x="371" y="106" width="20" height="13" fill="#FFD54F" rx="1"/>
  <rect x="392" y="106" width="20" height="13" fill="#FFD54F" rx="1"/>
  <rect x="413.5" y="106" width="20" height="13" fill="#FFE082" rx="1"/>
  <rect x="435" y="106" width="20" height="13" fill="#FFE082" rx="1"/>
  <!-- Row 3 -->
  <rect x="371" y="121" width="20" height="13" fill="#FFD54F" rx="1"/>
  <rect x="392" y="121" width="20" height="13" fill="#FFE082" rx="1"/>
  <rect x="413.5" y="121" width="20" height="13" fill="#A5D6A7" rx="1"/>
  <rect x="435" y="121" width="20" height="13" fill="#C8E6C9" rx="1"/>
  <!-- Row 4 -->
  <rect x="371" y="136" width="20" height="13" fill="#FFE082" rx="1"/>
  <rect x="392" y="136" width="20" height="13" fill="#C8E6C9" rx="1"/>
  <rect x="413.5" y="136" width="20" height="13" fill="#C8E6C9" rx="1"/>
  <rect x="435" y="136" width="20" height="13" fill="#81C784" rx="1"/>

  <text x="413" y="162" text-anchor="middle" font-size="10" fill="#1B5E20" font-weight="bold">9 : 3 : 3 : 1</text>
  <text x="413" y="175" text-anchor="middle" font-size="7" fill="#2E7D32">A_B_ : A_bb : aaB_ : aabb</text>
  <text x="413" y="186" text-anchor="middle" font-size="7" fill="#388E3C" font-style="italic">гены в разных хромосомах</text>

  <!-- Summary section -->
  <rect x="10" y="195" width="480" height="145" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#4CAF50" stroke-width="1.2"/>
  <text x="250" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20">Сводка законов</text>

  <!-- Law 1 summary -->
  <rect x="20" y="225" width="460" height="28" rx="4" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.8"/>
  <text x="30" y="240" font-size="10" fill="#1B5E20" font-weight="bold">I.</text>
  <text x="45" y="240" font-size="10" fill="#1B5E20">Закон единообразия гибридов первого поколения: при скрещивании гомозигот все F₁ единообразны</text>

  <!-- Law 2 summary -->
  <rect x="20" y="257" width="460" height="28" rx="4" fill="#DCEDC8" stroke="#66BB6A" stroke-width="0.8"/>
  <text x="30" y="272" font-size="10" fill="#1B5E20" font-weight="bold">II.</text>
  <text x="48" y="272" font-size="10" fill="#1B5E20">Закон расщепления: в F₂ расщепление по фенотипу 3:1, по генотипу 1:2:1</text>

  <!-- Law 3 summary -->
  <rect x="20" y="289" width="460" height="28" rx="4" fill="#F1F8E9" stroke="#66BB6A" stroke-width="0.8"/>
  <text x="30" y="304" font-size="10" fill="#1B5E20" font-weight="bold">III.</text>
  <text x="50" y="304" font-size="10" fill="#1B5E20">Закон независимого наследования: гены разных пар наследуются независимо (9:3:3:1)</text>

  <!-- Condition note -->
  <text x="250" y="332" text-anchor="middle" font-size="9" fill="#2E7D32" font-style="italic">Условие: гены находятся в разных парах гомологичных хромосом</text>
</svg>