<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
    <filter id="shadow7" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg7)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#E65100" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#E65100"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Урок 7: Изменчивость</text>

  <!-- Column 1: Мутационная -->
  <g filter="url(#shadow7)">
    <rect x="10" y="50" width="155" height="290" rx="8" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <rect x="10" y="50" width="155" height="28" rx="8" fill="#BF360C"/>
    <rect x="10" y="68" width="155" height="10" fill="#BF360C"/>
    <text x="87" y="69" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Мутационная</text>

    <!-- DNA with mutation -->
    <g transform="translate(87,115)">
      <!-- Normal DNA strand left -->
      <path d="M-40,-25 Q-25,-18 -40,-10 Q-55,-2 -40,5 Q-25,12 -40,20 Q-55,28 -40,35" fill="none" stroke="#1E88E5" stroke-width="2"/>
      <path d="M-40,-25 Q-55,-18 -40,-10 Q-25,-2 -40,5 Q-55,12 -40,20 Q-25,28 -40,35" fill="none" stroke="#C62828" stroke-width="2"/>
      <!-- Normal rungs -->
      <line x1="-48" y1="-18" x2="-32" y2="-18" stroke="#FFB74D" stroke-width="1.5"/>
      <line x1="-48" y1="-3" x2="-32" y2="-3" stroke="#81C784" stroke-width="1.5"/>
      <line x1="-48" y1="12" x2="-32" y2="12" stroke="#FFB74D" stroke-width="1.5"/>
      <line x1="-48" y1="27" x2="-32" y2="27" stroke="#81C784" stroke-width="1.5"/>
    </g>

    <!-- Arrow -->
    <path d="M87,158 L87,168" stroke="#E65100" stroke-width="2"/>
    <polygon points="87,172 83,165 91,165" fill="#E65100"/>

    <!-- Mutated DNA -->
    <g transform="translate(87,200)">
      <path d="M-40,-25 Q-25,-18 -40,-10 Q-55,-2 -40,5 Q-25,12 -40,20 Q-55,28 -40,35" fill="none" stroke="#1E88E5" stroke-width="2"/>
      <path d="M-40,-25 Q-55,-18 -40,-10 Q-25,-2 -40,5 Q-55,12 -40,20 Q-25,28 -40,35" fill="none" stroke="#C62828" stroke-width="2"/>
      <!-- Normal rungs -->
      <line x1="-48" y1="-18" x2="-32" y2="-18" stroke="#FFB74D" stroke-width="1.5"/>
      <!-- MUTATED rung - different color and broken -->
      <line x1="-50" y1="-3" x2="-35" y2="-3" stroke="#E53935" stroke-width="2.5"/>
      <circle cx="-42" cy="-3" r="4" fill="#FFEB3B" stroke="#E53935" stroke-width="1"/>
      <text x="-42" y="-1" text-anchor="middle" fill="#C62828" font-size="6" font-weight="bold">!</text>
      <line x1="-48" y1="12" x2="-32" y2="12" stroke="#81C784" stroke-width="1.5"/>
      <line x1="-48" y1="27" x2="-32" y2="27" stroke="#FFB74D" stroke-width="1.5"/>
    </g>

    <text x="87" y="250" text-anchor="middle" fill="#BF360C" font-size="8" font-weight="bold">Случайное изменение ДНК</text>
    <text x="87" y="263" text-anchor="middle" fill="#5D4037" font-size="7">• Точечные мутации</text>
    <text x="87" y="275" text-anchor="middle" fill="#5D4037" font-size="7">• Хромосомные мутации</text>
    <text x="87" y="287" text-anchor="middle" fill="#5D4037" font-size="7">• Генные мутации</text>
    <text x="87" y="302" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">Наследуется!</text>
    <text x="87" y="314" text-anchor="middle" fill="#E65100" font-size="7">Необратима</text>
    <text x="87" y="326" text-anchor="middle" fill="#E65100" font-size="7">Индивидуальна</text>
    <text x="87" y="338" text-anchor="middle" fill="#E65100" font-size="7">Ненаправленна</text>
  </g>

  <!-- Column 2: Комбинативная -->
  <g filter="url(#shadow7)">
    <rect x="172" y="50" width="155" height="290" rx="8" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <rect x="172" y="50" width="155" height="28" rx="8" fill="#F57C00"/>
    <rect x="172" y="68" width="155" height="10" fill="#F57C00"/>
    <text x="249" y="69" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Комбинативная</text>

    <!-- Crossing-over diagram -->
    <!-- Chromosome pair 1 -->
    <g transform="translate(210,100)">
      <rect x="0" y="0" width="8" height="50" rx="4" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
      <rect x="15" y="0" width="8" height="50" rx="4" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    </g>

    <!-- X-shape crossing over -->
    <g transform="translate(280,100)">
      <path d="M0,0 L20,20 M20,0 L0,20" stroke="#9C27B0" stroke-width="2"/>
      <circle cx="10" cy="10" r="6" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1"/>
      <text x="10" y="13" text-anchor="middle" fill="#4A148C" font-size="7" font-weight="bold">X</text>
    </g>

    <!-- Recombined chromosomes -->
    <g transform="translate(225,170)">
      <rect x="0" y="0" width="8" height="22" rx="4" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
      <rect x="0" y="22" width="8" height="22" rx="4" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
      <rect x="20" y="0" width="8" height="22" rx="4" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
      <rect x="20" y="22" width="8" height="22" rx="4" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
    </g>

    <!-- Arrow -->
    <path d="M249,155 L249,165" stroke="#F57C00" stroke-width="2"/>
    <polygon points="249,169 245,162 253,162" fill="#F57C00"/>

    <text x="249" y="230" text-anchor="middle" fill="#E65100" font-size="8" font-weight="bold">Новые комбинации</text>
    <text x="249" y="243" text-anchor="middle" fill="#5D4037" font-size="7">генов при:</text>
    <text x="249" y="258" fill="#5D4037" font-size="7">• Кроссинговер</text>
    <text x="249" y="270" fill="#5D4037" font-size="7">• Независимое</text>
    <text x="249" y="281" fill="#5D4037" font-size="7">  расхождение</text>
    <text x="249" y="293" fill="#5D4037" font-size="7">• Случайное</text>
    <text x="249" y="304" fill="#5D4037" font-size="7">  сочетание гамет</text>
    <text x="249" y="320" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">Наследуется!</text>
    <text x="249" y="332" text-anchor="middle" fill="#E65100" font-size="7">Новое сочетание</text>
    <text x="249" y="344" text-anchor="middle" fill="#E65100" font-size="7">старых генов</text>
  </g>

  <!-- Column 3: Модификационная -->
  <g filter="url(#shadow7)">
    <rect x="334" y="50" width="156" height="290" rx="8" fill="white" stroke="#E65100" stroke-width="1.5"/>
    <rect x="334" y="50" width="156" height="28" rx="8" fill="#FFB74D"/>
    <rect x="334" y="68" width="156" height="10" fill="#FFB74D"/>
    <text x="412" y="69" text-anchor="middle" fill="#5D4037" font-size="11" font-weight="bold">Модификационная</text>

    <!-- Bell curve / Normal distribution -->
    <g transform="translate(412,120)">
      <!-- Axes -->
      <line x1="-55" y1="40" x2="55" y2="40" stroke="#5D4037" stroke-width="1"/>
      <line x1="-55" y1="40" x2="-55" y2="-5" stroke="#5D4037" stroke-width="1"/>
      <!-- Bell curve -->
      <path d="M-50,38 Q-40,36 -30,30 Q-20,18 -10,5 Q0,-2 10,5 Q20,18 30,30 Q40,36 50,38" fill="none" stroke="#E65100" stroke-width="2.5"/>
      <path d="M-50,38 Q-40,36 -30,30 Q-20,18 -10,5 Q0,-2 10,5 Q20,18 30,30 Q40,36 50,38 L50,40 L-50,40Z" fill="#FFE0B2" fill-opacity="0.6"/>
      <!-- Labels -->
      <text x="-50" y="50" text-anchor="middle" fill="#5D4037" font-size="6">min</text>
      <text x="0" y="50" text-anchor="middle" fill="#BF360C" font-size="6">ср</text>
      <text x="50" y="50" text-anchor="middle" fill="#5D4037" font-size="6">max</text>
    </g>

    <text x="412" y="183" text-anchor="middle" fill="#E65100" font-size="8" font-weight="bold">Норма реакции</text>

    <!-- Example: leaf size variation -->
    <g transform="translate(375,195)">
      <ellipse cx="10" cy="8" rx="6" ry="10" fill="#81C784" stroke="#388E3C" stroke-width="0.8"/>
      <ellipse cx="30" cy="8" rx="9" ry="12" fill="#66BB6A" stroke="#388E3C" stroke-width="0.8"/>
      <ellipse cx="55" cy="8" rx="12" ry="14" fill="#4CAF50" stroke="#388E3C" stroke-width="0.8"/>
    </g>
    <text x="412" y="225" text-anchor="middle" fill="#5D4037" font-size="7">Размер листьев при</text>
    <text x="412" y="236" text-anchor="middle" fill="#5D4037" font-size="7">разной освещённости</text>

    <text x="412" y="260" text-anchor="middle" fill="#5D4037" font-size="7">Причина: условия среды</text>
    <text x="412" y="275" text-anchor="middle" fill="#5D4037" font-size="7">• Определена генотипом</text>
    <text x="412" y="287" text-anchor="middle" fill="#5D4037" font-size="7">• Не наследуется</text>
    <text x="412" y="299" text-anchor="middle" fill="#5D4037" font-size="7">• Массовый характер</text>
    <text x="412" y="311" text-anchor="middle" fill="#5D4037" font-size="7">• Адаптивна</text>
    <text x="412" y="326" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">НЕ наследуется!</text>
    <text x="412" y="338" text-anchor="middle" fill="#E65100" font-size="7">Изменение фенотипа</text>
  </g>
</svg>