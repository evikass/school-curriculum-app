<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="12"/>
  <text x="250" y="32" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#1B5E20">Среды жизни</text>
  <line x1="100" y1="40" x2="400" y2="40" stroke="#2E7D32" stroke-width="1.5" opacity="0.5"/>

  <!-- 4 Environment cards -->

  <!-- 1. Водная среда (top-left) -->
  <g transform="translate(15,50)">
    <rect x="0" y="0" width="230" height="120" rx="8" fill="white" fill-opacity="0.7" stroke="#1565C0" stroke-width="1.2"/>
    <!-- Water waves -->
    <path d="M10,45 Q30,38 50,45 Q70,52 90,45 Q110,38 130,45 Q150,52 170,45 Q190,38 210,45" fill="none" stroke="#42A5F5" stroke-width="1.5"/>
    <path d="M10,60 Q30,53 50,60 Q70,67 90,60 Q110,53 130,60 Q150,67 170,60 Q190,53 210,60" fill="none" stroke="#64B5F6" stroke-width="1.2"/>
    <!-- Fish -->
    <ellipse cx="70" cy="75" rx="14" ry="8" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
    <polygon points="84,75 94,68 94,82" fill="#42A5F5" stroke="#1565C0" stroke-width="0.8"/>
    <circle cx="63" cy="73" r="2" fill="#0D47A1"/>
    <!-- Seaweed -->
    <path d="M160,95 Q155,80 160,65" fill="none" stroke="#4CAF50" stroke-width="2"/>
    <path d="M170,95 Q175,82 170,68" fill="none" stroke="#66BB6A" stroke-width="2"/>
    <path d="M140,95 Q135,85 140,75" fill="none" stroke="#81C784" stroke-width="1.5"/>
    <text x="115" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0D47A1">Водная среда</text>
    <text x="115" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Плотная, мало O₂, стабильная t°</text>
    <text x="115" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">Рыбы, моллюски, водоросли</text>
  </g>

  <!-- 2. Наземно-воздушная среда (top-right) -->
  <g transform="translate(255,50)">
    <rect x="0" y="0" width="230" height="120" rx="8" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1.2"/>
    <!-- Sky -->
    <rect x="5" y="40" width="220" height="40" rx="0" fill="#BBDEFB" opacity="0.4"/>
    <!-- Sun -->
    <circle cx="190" cy="50" r="12" fill="#FFEB3B" stroke="#F9A825" stroke-width="1"/>
    <!-- Cloud -->
    <ellipse cx="60" cy="48" rx="18" ry="8" fill="white" stroke="#90CAF9" stroke-width="0.5"/>
    <ellipse cx="75" cy="45" rx="15" ry="9" fill="white" stroke="#90CAF9" stroke-width="0.5"/>
    <!-- Tree -->
    <rect x="155" y="68" width="6" height="20" fill="#795548"/>
    <ellipse cx="158" cy="60" rx="16" ry="12" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
    <!-- Bird -->
    <path d="M90,50 Q95,44 100,50" fill="none" stroke="#37474F" stroke-width="1.5"/>
    <path d="M100,50 Q105,44 110,50" fill="none" stroke="#37474F" stroke-width="1.5"/>
    <!-- Ground -->
    <rect x="5" y="80" width="220" height="8" rx="0" fill="#A5D6A7" opacity="0.5"/>
    <text x="115" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1B5E20">Наземно-воздушная</text>
    <text x="115" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Много O₂, колебания t°, свет</text>
    <text x="115" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Млекопитающие, птицы, насекомые</text>
  </g>

  <!-- 3. Почвенная среда (bottom-left) -->
  <g transform="translate(15,180)">
    <rect x="0" y="0" width="230" height="120" rx="8" fill="white" fill-opacity="0.7" stroke="#795548" stroke-width="1.2"/>
    <!-- Soil layers -->
    <rect x="5" y="35" width="220" height="55" rx="3" fill="#8D6E63" opacity="0.3"/>
    <rect x="5" y="55" width="220" height="35" rx="0" fill="#6D4C41" opacity="0.3"/>
    <!-- Worm -->
    <path d="M40,60 Q50,55 55,62 Q60,68 70,63 Q80,58 85,65" fill="none" stroke="#E57373" stroke-width="3" stroke-linecap="round"/>
    <!-- Roots -->
    <path d="M140,35 L140,70 M140,50 L125,65 M140,55 L155,68 M140,60 L130,75" fill="none" stroke="#8D6E63" stroke-width="1.5"/>
    <!-- Seed -->
    <ellipse cx="90" cy="75" rx="5" ry="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.8"/>
    <!-- Mole -->
    <ellipse cx="180" cy="60" rx="10" ry="7" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
    <circle cx="175" cy="57" r="1.5" fill="#3E2723"/>
    <text x="115" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#4E342E">Почвенная среда</text>
    <text x="115" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">Мало O₂, плотная, влажная</text>
    <text x="115" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">Бактерии, черви, кроты, грибы</text>
  </g>

  <!-- 4. Организменная среда (bottom-right) -->
  <g transform="translate(255,180)">
    <rect x="0" y="0" width="230" height="120" rx="8" fill="white" fill-opacity="0.7" stroke="#E65100" stroke-width="1.2"/>
    <!-- Host organism -->
    <ellipse cx="115" cy="60" rx="45" ry="30" fill="#FFCCBC" stroke="#E65100" stroke-width="1" opacity="0.5"/>
    <!-- Parasites inside -->
    <circle cx="90" cy="55" r="6" fill="#EF5350" stroke="#C62828" stroke-width="0.8" opacity="0.7"/>
    <circle cx="105" cy="65" r="4" fill="#FF7043" stroke="#E64A19" stroke-width="0.8" opacity="0.7"/>
    <circle cx="125" cy="55" r="5" fill="#EF5350" stroke="#C62828" stroke-width="0.8" opacity="0.7"/>
    <circle cx="135" cy="65" r="3" fill="#FF7043" stroke="#E64A19" stroke-width="0.8" opacity="0.7"/>
    <!-- Virus -->
    <g transform="translate(80,70)">
      <circle cx="5" cy="5" r="4" fill="#AB47BC" stroke="#6A1B9A" stroke-width="0.8" opacity="0.6"/>
      <line x1="5" y1="1" x2="5" y2="-3" stroke="#6A1B9A" stroke-width="0.8"/>
      <line x1="9" y1="2" x2="12" y2="-1" stroke="#6A1B9A" stroke-width="0.8"/>
      <circle cx="5" cy="-4" r="1.5" fill="#CE93D8"/>
      <circle cx="13" cy="-2" r="1.5" fill="#CE93D8"/>
    </g>
    <text x="115" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#BF360C">Организменная среда</text>
    <text x="115" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Постоянство, пища, защита</text>
    <text x="115" y="110" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Паразиты, симбионты, вирусы</text>
  </g>

  <!-- Ecological factors bar at bottom -->
  <g transform="translate(15,308)">
    <rect x="0" y="0" width="470" height="30" rx="5" fill="white" fill-opacity="0.6" stroke="#2E7D32" stroke-width="0.8"/>
    <text x="235" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Экологические факторы:</text>
    <text x="235" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32">Абиотические (свет, t°, вода) │ Биотические (конкуренция, хищничество) │ Антропогенные</text>
  </g>

  <text x="480" y="340" text-anchor="end" font-family="Arial,sans-serif" font-size="9" fill="#2E7D32" opacity="0.6">Урок 35</text>
</svg>