<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg21" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg21)" rx="12"/>
  <rect x="4" y="4" width="492" height="342" fill="none" stroke="#4CAF50" stroke-width="2" rx="10"/>

  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2E7D32">Ткани</text>
  <line x1="40" y1="42" x2="460" y2="42" stroke="#4CAF50" stroke-width="1.5"/>

  <!-- Left column: Plant tissues -->
  <rect x="20" y="52" width="220" height="280" rx="8" fill="#ffffff" fill-opacity="0.6" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="130" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Растительные ткани</text>

  <!-- Образовательная -->
  <rect x="35" y="85" width="190" height="48" rx="6" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1"/>
  <text x="130" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Образовательная</text>
  <text x="130" y="120" text-anchor="middle" font-size="9" fill="#33691E">(меристема) — деление клеток</text>
  <!-- small dividing cells icon -->
  <circle cx="52" cy="109" r="8" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="68" cy="109" r="8" fill="none" stroke="#2E7D32" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Покровная -->
  <rect x="35" y="140" width="190" height="48" rx="6" fill="#DCEDC8" stroke="#66BB6A" stroke-width="1"/>
  <text x="130" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Покровная</text>
  <text x="130" y="175" text-anchor="middle" font-size="9" fill="#33691E">эпидерма, пробка — защита</text>
  <!-- shield icon -->
  <path d="M52 148 L60 144 L68 148 L68 162 Q60 168 52 162 Z" fill="none" stroke="#2E7D32" stroke-width="1"/>

  <!-- Основная -->
  <rect x="35" y="195" width="190" height="48" rx="6" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="130" y="213" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Основная</text>
  <text x="130" y="230" text-anchor="middle" font-size="9" fill="#33691E">фотосинтез, запасание веществ</text>
  <!-- leaf icon -->
  <ellipse cx="60" cy="219" rx="10" ry="6" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="50" y1="219" x2="70" y2="219" stroke="#2E7D32" stroke-width="0.6"/>

  <!-- Проводящая -->
  <rect x="35" y="250" width="190" height="48" rx="6" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="130" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Проводящая</text>
  <text x="130" y="285" text-anchor="middle" font-size="9" fill="#33691E">ксилема ↑, флоэма ↓ — транспорт</text>
  <!-- vessel icon -->
  <line x1="52" y1="258" x2="52" y2="290" stroke="#2E7D32" stroke-width="2"/>
  <line x1="62" y1="258" x2="62" y2="290" stroke="#2E7D32" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="48,268 56,268 52,262" fill="#4CAF50"/>
  <polygon points="58,278 66,278 62,284" fill="#81C784"/>

  <!-- Mechanical tissue note -->
  <rect x="35" y="304" width="190" height="20" rx="4" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.8"/>
  <text x="130" y="318" text-anchor="middle" font-size="9" fill="#558B2F">+ Механическая — опора, прочность</text>

  <!-- Right column: Animal tissues -->
  <rect x="260" y="52" width="220" height="280" rx="8" fill="#ffffff" fill-opacity="0.6" stroke="#66BB6A" stroke-width="1.5"/>
  <text x="370" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">Животные ткани</text>

  <!-- Эпителиальная -->
  <rect x="275" y="85" width="190" height="48" rx="6" fill="#C8E6C9" stroke="#66BB6A" stroke-width="1"/>
  <text x="370" y="103" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Эпителиальная</text>
  <text x="370" y="120" text-anchor="middle" font-size="9" fill="#33691E">покров, железы — защита, секреция</text>
  <!-- epithelial cells -->
  <rect x="290" y="97" width="7" height="12" rx="1" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
  <rect x="298" y="97" width="7" height="12" rx="1" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
  <rect x="306" y="97" width="7" height="12" rx="1" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>

  <!-- Соединительная -->
  <rect x="275" y="140" width="190" height="48" rx="6" fill="#DCEDC8" stroke="#66BB6A" stroke-width="1"/>
  <text x="370" y="158" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Соединительная</text>
  <text x="370" y="175" text-anchor="middle" font-size="9" fill="#33691E">кость, кровь, хрящ — опора, трофика</text>
  <!-- bone/cell icon -->
  <ellipse cx="300" cy="159" rx="8" ry="5" fill="#B9F6CA" stroke="#2E7D32" stroke-width="0.8"/>
  <circle cx="300" cy="159" r="2" fill="#2E7D32"/>

  <!-- Мышечная -->
  <rect x="275" y="195" width="190" height="48" rx="6" fill="#F1F8E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="370" y="213" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Мышечная</text>
  <text x="370" y="230" text-anchor="middle" font-size="9" fill="#33691E">гладкая, поперечнополосатая — движение</text>
  <!-- muscle fiber icon -->
  <rect x="290" y="206" width="18" height="6" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="294" y1="206" x2="294" y2="212" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="298" y1="206" x2="298" y2="212" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="302" y1="206" x2="302" y2="212" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="306" y1="206" x2="306" y2="212" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Нервная -->
  <rect x="275" y="250" width="190" height="48" rx="6" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1"/>
  <text x="370" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Нервная</text>
  <text x="370" y="285" text-anchor="middle" font-size="9" fill="#33691E">нейроны — возбуждение, проведение</text>
  <!-- neuron icon -->
  <circle cx="296" cy="270" r="5" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="301" y1="268" x2="314" y2="263" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="301" y1="270" x2="316" y2="270" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="301" y1="272" x2="314" y2="277" stroke="#2E7D32" stroke-width="0.8"/>
  <circle cx="291" cy="270" r="3" fill="#81C784" stroke="#2E7D32" stroke-width="0.6"/>

  <!-- Common property note -->
  <rect x="275" y="304" width="190" height="20" rx="4" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.8"/>
  <text x="370" y="318" text-anchor="middle" font-size="9" fill="#558B2F">Общее: клетки + межклеточное вещество</text>
</svg>