<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg17)" rx="8"/>
  <text x="250" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#E65100">Химический состав клетки</text>
  <line x1="120" y1="36" x2="380" y2="36" stroke="#BF360C" stroke-width="1"/>

  <!-- PIE CHART - left side -->
  <!-- Center at 140,185, radius 90 -->
  <!-- Water 70% = 252° starting from top -->
  <path d="M140,95 A90,90 0 1,1 54.2,212.6 L140,185 Z" fill="#42A5F5" stroke="#0D47A1" stroke-width="1.5"/>
  <!-- Proteins 15% = 54° -->
  <path d="M54.2,212.6 A90,90 0 0,1 87.3,119.5 L140,185 Z" fill="#EF5350" stroke="#B71C1C" stroke-width="1.5"/>
  <!-- Lipids 10% = 36° -->
  <path d="M87.3,119.5 A90,90 0 0,1 122.4,97.4 L140,185 Z" fill="#FFC107" stroke="#F57F17" stroke-width="1.5"/>
  <!-- Nucleic acids 3% = 10.8° -->
  <path d="M122.4,97.4 A90,90 0 0,1 133.7,95.2 L140,185 Z" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Other 2% = 7.2° -->
  <path d="M133.7,95.2 A90,90 0 0,1 140,95 L140,185 Z" fill="#AB47BC" stroke="#6A1B9A" stroke-width="1.5"/>

  <!-- Pie labels -->
  <text x="170" y="200" font-size="10" font-weight="bold" fill="#0D47A1">Вода 70%</text>
  <text x="72" y="175" font-size="8" font-weight="bold" fill="#B71C1C">Белки</text>
  <text x="72" y="185" font-size="8" fill="#B71C1C">15%</text>
  <text x="90" y="128" font-size="8" font-weight="bold" fill="#F57F17">Липиды</text>
  <text x="95" y="138" font-size="8" fill="#F57F17">10%</text>
  <text x="118" y="102" font-size="7" fill="#2E7D32">НК 3%</text>
  <text x="135" y="102" font-size="7" fill="#6A1B9A">2%</text>

  <text x="140" y="295" text-anchor="middle" font-size="10" font-weight="bold" fill="#BF360C">Элементный состав</text>

  <!-- Element bars below pie -->
  <rect x="30" y="302" width="55" height="10" rx="2" fill="#EF5350" stroke="#B71C1C" stroke-width="0.5"/>
  <text x="57" y="310" text-anchor="middle" font-size="6" fill="white">O 65%</text>
  <rect x="90" y="302" width="28" height="10" rx="2" fill="#42A5F5" stroke="#0D47A1" stroke-width="0.5"/>
  <text x="104" y="310" text-anchor="middle" font-size="6" fill="white">C 18%</text>
  <rect x="123" y="302" width="18" height="10" rx="2" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="132" y="310" text-anchor="middle" font-size="6" fill="white">H 10%</text>
  <rect x="146" y="302" width="12" height="10" rx="2" fill="#FFC107" stroke="#F57F17" stroke-width="0.5"/>
  <text x="152" y="310" text-anchor="middle" font-size="6" fill="#3E2723">N 3%</text>
  <text x="170" y="310" font-size="6" fill="#BF360C">+ др.</text>

  <!-- RIGHT SIDE - Organic molecules -->
  <rect x="260" y="50" width="230" height="290" rx="8" fill="#FFF3E0" fill-opacity="0.5" stroke="#E65100" stroke-width="1.5"/>
  <text x="375" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Органические вещества</text>

  <!-- Carbohydrates -->
  <rect x="275" y="82" width="200" height="60" rx="6" fill="#FFCC80" fill-opacity="0.5" stroke="#E65100" stroke-width="1"/>
  <text x="285" y="97" font-size="10" font-weight="bold" fill="#BF360C">Углеводы</text>
  <text x="285" y="110" font-size="7" fill="#E65100">C, H, O | Моносахариды → Дисахариды → Полисахариды</text>
  <text x="285" y="122" font-size="7" fill="#BF360C">Энергия, строительный материал</text>
  <text x="285" y="134" font-size="7" fill="#E65100">Примеры: глюкоза, фруктоза, крахмал, целлюлоза</text>
  <!-- Glucose hexagon -->
  <polygon points="462,97 470,101 470,109 462,113 454,109 454,101" fill="none" stroke="#E65100" stroke-width="1"/>
  <text x="462" y="108" text-anchor="middle" font-size="6" fill="#E65100">C₆</text>

  <!-- Lipids -->
  <rect x="275" y="148" width="200" height="60" rx="6" fill="#FFE082" fill-opacity="0.5" stroke="#F57F17" stroke-width="1"/>
  <text x="285" y="163" font-size="10" font-weight="bold" fill="#F57F17">Липиды</text>
  <text x="285" y="176" font-size="7" fill="#F57F17">C, H, O | Жиры, фосфолипиды, стероиды</text>
  <text x="285" y="188" font-size="7" fill="#F57F17">Запас энергии, мембраны</text>
  <text x="285" y="200" font-size="7" fill="#F57F17">Примеры: триглицериды, холестерин</text>
  <!-- 3 fatty acid tails -->
  <line x1="460" y1="163" x2="470" y2="155" stroke="#F57F17" stroke-width="1"/>
  <line x1="460" y1="163" x2="472" y2="163" stroke="#F57F17" stroke-width="1"/>
  <line x1="460" y1="163" x2="470" y2="171" stroke="#F57F17" stroke-width="1"/>
  <circle cx="458" cy="163" r="4" fill="#FFE082" stroke="#F57F17" stroke-width="0.8"/>

  <!-- Proteins -->
  <rect x="275" y="214" width="200" height="60" rx="6" fill="#FFAB91" fill-opacity="0.5" stroke="#BF360C" stroke-width="1"/>
  <text x="285" y="229" font-size="10" font-weight="bold" fill="#BF360C">Белки</text>
  <text x="285" y="242" font-size="7" fill="#BF360C">C, H, O, N, S | Аминокислоты (20 видов)</text>
  <text x="285" y="254" font-size="7" fill="#BF360C">Ферменты, структура, транспорт, защита</text>
  <text x="285" y="266" font-size="7" fill="#BF360C">Структуры: первичная → вторичная → третичная</text>
  <!-- Amino acid symbol -->
  <circle cx="460" cy="229" r="7" fill="#FFAB91" stroke="#BF360C" stroke-width="1"/>
  <text x="460" y="232" text-anchor="middle" font-size="6" fill="#BF360C">АК</text>

  <!-- Nucleic acids -->
  <rect x="275" y="280" width="200" height="55" rx="6" fill="#C8E6C9" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1"/>
  <text x="285" y="295" font-size="10" font-weight="bold" fill="#2E7D32">Нуклеиновые к-ты</text>
  <text x="285" y="308" font-size="7" fill="#2E7D32">C, H, O, N, P | Нуклеотиды</text>
  <text x="285" y="320" font-size="7" fill="#2E7D32">ДНК — наследственность | РНК — синтез белка</text>
  <!-- Double helix hint -->
  <path d="M458,285 Q465,290 458,295 Q451,300 458,305 Q465,310 458,315" stroke="#2E7D32" stroke-width="1" fill="none"/>
  <path d="M465,285 Q458,290 465,295 Q472,300 465,305 Q458,310 465,315" stroke="#1B5E20" stroke-width="1" fill="none"/>
</svg>