<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg25" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
    <marker id="arrow25" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#4A148C"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg25)" rx="12"/>
  <rect x="4" y="4" width="492" height="342" fill="none" stroke="#7B1FA2" stroke-width="2" rx="10"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#4A148C">Онтогенез</text>
  <line x1="40" y1="38" x2="460" y2="38" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- Embryonic stages -->
  <rect x="15" y="45" width="470" height="130" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="250" y="63" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A148C">Эмбриональный период</text>

  <!-- Zygote -->
  <circle cx="60" cy="105" r="22" fill="#CE93D8" stroke="#6A1B9A" stroke-width="1.5"/>
  <text x="60" y="102" text-anchor="middle" font-size="8" font-weight="bold" fill="#4A148C">2n</text>
  <text x="60" y="112" text-anchor="middle" font-size="7" fill="#6A1B9A">1 кл.</text>
  <text x="60" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A148C">Зигота</text>

  <!-- Arrow -->
  <line x1="85" y1="105" x2="120" y2="105" stroke="#4A148C" stroke-width="1.5" marker-end="url(#arrow25)"/>
  <text x="102" y="98" text-anchor="middle" font-size="7" fill="#6A1B9A">дробление</text>

  <!-- Blastula -->
  <circle cx="150" cy="105" r="22" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1.5"/>
  <circle cx="150" cy="105" r="14" fill="none" stroke="#9C27B0" stroke-width="0.8" stroke-dasharray="2,2"/>
  <circle cx="146" cy="96" r="3" fill="#BA68C8" stroke="#6A1B9A" stroke-width="0.5"/>
  <circle cx="154" cy="96" r="3" fill="#BA68C8" stroke="#6A1B9A" stroke-width="0.5"/>
  <circle cx="142" cy="103" r="3" fill="#BA68C8" stroke="#6A1B9A" stroke-width="0.5"/>
  <circle cx="158" cy="103" r="3" fill="#BA68C8" stroke="#6A1B9A" stroke-width="0.5"/>
  <circle cx="146" cy="112" r="3" fill="#BA68C8" stroke="#6A1B9A" stroke-width="0.5"/>
  <circle cx="154" cy="112" r="3" fill="#BA68C8" stroke="#6A1B9A" stroke-width="0.5"/>
  <text x="150" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A148C">Бластула</text>

  <!-- Arrow -->
  <line x1="175" y1="105" x2="210" y2="105" stroke="#4A148C" stroke-width="1.5" marker-end="url(#arrow25)"/>
  <text x="192" y="98" text-anchor="middle" font-size="7" fill="#6A1B9A">гастро-</text>
  <text x="192" y="106" text-anchor="middle" font-size="7" fill="#6A1B9A">руляция</text>

  <!-- Gastrula -->
  <ellipse cx="240" cy="105" rx="22" ry="20" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1.5"/>
  <path d="M228 95 Q235 105 228 115" fill="none" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="248" y="103" text-anchor="middle" font-size="6" fill="#6A1B9A">экт-</text>
  <text x="248" y="110" text-anchor="middle" font-size="6" fill="#6A1B9A">энд-</text>
  <text x="240" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A148C">Гаструла</text>

  <!-- Arrow -->
  <line x1="265" y1="105" x2="300" y2="105" stroke="#4A148C" stroke-width="1.5" marker-end="url(#arrow25)"/>
  <text x="282" y="98" text-anchor="middle" font-size="7" fill="#6A1B9A">нейру-</text>
  <text x="282" y="106" text-anchor="middle" font-size="7" fill="#6A1B9A">ляция</text>

  <!-- Neurula -->
  <ellipse cx="330" cy="105" rx="22" ry="20" fill="#D1C4E9" stroke="#6A1B9A" stroke-width="1.5"/>
  <path d="M320 92 Q325 98 320 104 Q315 98 320 92" fill="#BA68C8" stroke="#6A1B9A" stroke-width="0.8"/>
  <line x1="320" y1="98" x2="342" y2="98" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="330" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A148C">Нейрула</text>

  <!-- Arrow -->
  <line x1="355" y1="105" x2="395" y2="105" stroke="#4A148C" stroke-width="1.5" marker-end="url(#arrow25)"/>
  <text x="375" y="98" text-anchor="middle" font-size="7" fill="#6A1B9A">органо-</text>
  <text x="375" y="106" text-anchor="middle" font-size="7" fill="#6A1B9A">генез</text>

  <!-- Organism -->
  <ellipse cx="430" cy="105" rx="22" ry="20" fill="#B39DDB" stroke="#4A148C" stroke-width="1.5"/>
  <circle cx="425" cy="100" r="3" fill="#ffffff"/>
  <circle cx="435" cy="100" r="3" fill="#ffffff"/>
  <path d="M425 110 Q430 114 435 110" fill="none" stroke="#4A148C" stroke-width="1"/>
  <text x="430" y="140" text-anchor="middle" font-size="10" font-weight="bold" fill="#4A148C">Организм</text>

  <!-- Germ layers label -->
  <text x="250" y="168" text-anchor="middle" font-size="9" fill="#6A1B9A" font-style="italic">Зародышевые листки: эктодерма, энтодерма, мезодерма → органы и ткани</text>

  <!-- Bottom section: Postembryonic development -->
  <rect x="15" y="180" width="470" height="160" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="250" y="200" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A148C">Постэмбриональный период</text>

  <!-- Direct development -->
  <rect x="25" y="210" width="220" height="120" rx="6" fill="#EDE7F6" stroke="#9C27B0" stroke-width="1"/>
  <text x="135" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A148C">Прямое развитие</text>

  <!-- egg → small organism → adult -->
  <ellipse cx="55" cy="260" rx="12" ry="10" fill="#E1BEE7" stroke="#6A1B9A" stroke-width="1"/>
  <text x="55" y="263" text-anchor="middle" font-size="7" fill="#4A148C">яйцо</text>
  <line x1="70" y1="260" x2="95" y2="260" stroke="#4A148C" stroke-width="1" marker-end="url(#arrow25)"/>
  <ellipse cx="115" cy="258" rx="14" ry="12" fill="#D1C4E9" stroke="#6A1B9A" stroke-width="1"/>
  <text x="115" y="262" text-anchor="middle" font-size="7" fill="#4A148C">детёныш</text>
  <line x1="132" y1="258" x2="160" y2="255" stroke="#4A148C" stroke-width="1" marker-end="url(#arrow25)"/>
  <ellipse cx="195" cy="252" rx="22" ry="18" fill="#B39DDB" stroke="#4A148C" stroke-width="1.2"/>
  <text x="195" y="256" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A148C">взрослый</text>
  <text x="135" y="290" text-anchor="middle" font-size="8" fill="#6A1B9A">млекопитающие, птицы,</text>
  <text x="135" y="302" text-anchor="middle" font-size="8" fill="#6A1B9A">рептилии, рыбы</text>
  <text x="135" y="318" text-anchor="middle" font-size="8" fill="#7B1FA2">Рост без изменения облика</text>

  <!-- Indirect development (butterfly) -->
  <rect x="255" y="210" width="220" height="120" rx="6" fill="#F3E5F5" stroke="#9C27B0" stroke-width="1"/>
  <text x="365" y="228" text-anchor="middle" font-size="11" font-weight="bold" fill="#4A148C">Непрямое (метаморфоз)</text>

  <!-- Butterfly metamorphosis -->
  <ellipse cx="280" cy="260" rx="10" ry="8" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <text x="280" y="263" text-anchor="middle" font-size="6" fill="#BF360C">яйцо</text>
  <line x1="292" y1="258" x2="307" y2="252" stroke="#4A148C" stroke-width="0.8" marker-end="url(#arrow25)"/>
  <!-- Caterpillar -->
  <path d="M312 252 Q318 248 324 252 Q330 248 336 252 Q342 248 348 252" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="312" cy="252" r="3" fill="#66BB6A"/>
  <text x="330" y="266" text-anchor="middle" font-size="6" fill="#2E7D32">гусеница</text>
  <line x1="350" y1="252" x2="365" y2="252" stroke="#4A148C" stroke-width="0.8" marker-end="url(#arrow25)"/>
  <!-- Chrysalis -->
  <ellipse cx="382" cy="252" rx="8" ry="14" fill="#8D6E63" stroke="#4E342E" stroke-width="1"/>
  <text x="382" y="275" text-anchor="middle" font-size="6" fill="#4E342E">куколка</text>
  <line x1="392" y1="250" x2="405" y2="248" stroke="#4A148C" stroke-width="0.8" marker-end="url(#arrow25)"/>
  <!-- Butterfly -->
  <ellipse cx="422" cy="245" rx="4" ry="8" fill="#7B1FA2" stroke="#4A148C" stroke-width="0.8"/>
  <path d="M418 243 Q410 238 414 245 Q410 252 418 247" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.5"/>
  <path d="M426 243 Q434 238 430 245 Q434 252 426 247" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.5"/>
  <text x="422" y="263" text-anchor="middle" font-size="6" fill="#4A148C">имаго</text>

  <text x="365" y="290" text-anchor="middle" font-size="8" fill="#6A1B9A">насекомые, земноводные</text>
  <text x="365" y="302" text-anchor="middle" font-size="8" fill="#6A1B9A">личинка ≠ взрослая форма</text>
  <text x="365" y="318" text-anchor="middle" font-size="8" fill="#7B1FA2">Разные места обитания и питание</text>
</svg>