<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg30" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <marker id="arrow30" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#E65100"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg30)" rx="12"/>
  <rect x="4" y="4" width="492" height="342" fill="none" stroke="#FF9800" stroke-width="2" rx="10"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#E65100">Изменчивость</text>
  <line x1="40" y1="36" x2="460" y2="36" stroke="#FF9800" stroke-width="1.5"/>

  <!-- Section 1: Modification variability - Bell curve -->
  <rect x="10" y="44" width="155" height="175" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#FFB74D" stroke-width="1.2"/>
  <text x="88" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="#BF360C">Модификационная</text>
  <text x="88" y="74" text-anchor="middle" font-size="8" fill="#E65100">фенотипическая</text>

  <!-- Bell curve / normal distribution -->
  <line x1="25" y1="168" x2="150" y2="168" stroke="#E65100" stroke-width="1"/>
  <line x1="88" y1="80" x2="88" y2="168" stroke="#E65100" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Bell curve path -->
  <path d="M30 168 Q40 167 50 165 Q60 160 70 150 Q78 138 83 120 Q86 105 88 85 Q90 105 93 120 Q98 138 106 150 Q116 160 126 165 Q136 167 146 168" fill="none" stroke="#E65100" stroke-width="2"/>

  <!-- Shading under curve -->
  <path d="M30 168 Q40 167 50 165 Q60 160 70 150 Q78 138 83 120 Q86 105 88 85 Q90 105 93 120 Q98 138 106 150 Q116 160 126 165 Q136 167 146 168 Z" fill="#FFE0B2" fill-opacity="0.6"/>

  <!-- Labels on bell curve -->
  <text x="88" y="80" text-anchor="middle" font-size="7" fill="#E65100">норма</text>
  <text x="38" y="178" text-anchor="middle" font-size="6" fill="#BF360C">min</text>
  <text x="138" y="178" text-anchor="middle" font-size="6" fill="#BF360C">max</text>

  <!-- Variation series -->
  <text x="88" y="194" text-anchor="middle" font-size="7" fill="#BF360C">Вариационный ряд:</text>
  <rect x="25" y="198" width="130" height="10" rx="2" fill="none" stroke="#FFB74D" stroke-width="0.8"/>
  <rect x="26" y="199" width="10" height="8" fill="#FFE0B2"/>
  <rect x="37" y="199" width="10" height="8" fill="#FFCC80"/>
  <rect x="48" y="199" width="10" height="8" fill="#FFB74D"/>
  <rect x="59" y="199" width="10" height="8" fill="#FFA726"/>
  <rect x="70" y="199" width="10" height="8" fill="#FF9800"/>
  <rect x="81" y="199" width="10" height="8" fill="#FB8C00"/>
  <rect x="92" y="199" width="10" height="8" fill="#F57C00"/>
  <rect x="103" y="199" width="10" height="8" fill="#EF6C00"/>
  <rect x="114" y="199" width="10" height="8" fill="#E65100"/>
  <rect x="125" y="199" width="10" height="8" fill="#BF360C"/>
  <rect x="136" y="199" width="10" height="8" fill="#8D6E63"/>

  <text x="88" y="215" text-anchor="middle" font-size="7" fill="#BF360C">Не наследуется!</text>
  <text x="88" y="225" text-anchor="middle" font-size="7" fill="#E65100">Норма реакции —</text>
  <text x="88" y="235" text-anchor="middle" font-size="7" fill="#E65100">пределы изменчивости</text>
  <text x="88" y="248" text-anchor="middle" font-size="7" fill="#BF360C" font-weight="bold">Пример: рост, вес</text>
  <text x="88" y="258" text-anchor="middle" font-size="7" fill="#BF360C">листья одного растения</text>

  <!-- Section 2: Mutational variability - DNA changes -->
  <rect x="172" y="44" width="155" height="175" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#FFB74D" stroke-width="1.2"/>
  <text x="250" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="#BF360C">Мутационная</text>
  <text x="250" y="74" text-anchor="middle" font-size="8" fill="#E65100">генотипическая</text>

  <!-- DNA double helix simplified -->
  <path d="M215 88 Q225 92 215 96 Q205 100 215 104 Q225 108 215 112 Q205 116 215 120 Q225 124 215 128" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <path d="M235 88 Q225 92 235 96 Q245 100 235 104 Q225 108 235 112 Q245 116 235 120 Q225 124 235 128" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <!-- Base pairs -->
  <line x1="218" y1="92" x2="232" y2="92" stroke="#BF360C" stroke-width="0.6"/>
  <line x1="212" y1="100" x2="238" y2="100" stroke="#BF360C" stroke-width="0.6"/>
  <line x1="218" y1="108" x2="232" y2="108" stroke="#BF360C" stroke-width="0.6"/>
  <line x1="212" y1="116" x2="238" y2="116" stroke="#BF360C" stroke-width="0.6"/>
  <line x1="218" y1="124" x2="232" y2="124" stroke="#BF360C" stroke-width="0.6"/>

  <text x="250" y="140" text-anchor="middle" font-size="8" font-weight="bold" fill="#BF360C">Типы мутаций:</text>

  <!-- Gene mutations -->
  <rect x="182" y="146" width="136" height="22" rx="4" fill="#FFE0B2" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="250" y="157" text-anchor="middle" font-size="8" fill="#BF360C">Генные: замена, вставка,</text>
  <text x="250" y="166" text-anchor="middle" font-size="8" fill="#BF360C">удаление нуклеотида</text>
  <!-- ATG → AAG -->
  <text x="192" y="156" font-size="6" fill="#E65100">ATG</text>
  <text x="210" y="156" font-size="6" fill="#E65100">→</text>
  <text x="218" y="156" font-size="6" fill="#C62828">AAG</text>

  <!-- Chromosomal mutations -->
  <rect x="182" y="172" width="136" height="22" rx="4" fill="#FFECB3" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="250" y="183" text-anchor="middle" font-size="8" fill="#BF360C">Хромосомные: делеция,</text>
  <text x="250" y="192" text-anchor="middle" font-size="8" fill="#BF360C">дупликация, инверсия, транслокация</text>

  <!-- Genomic mutations -->
  <rect x="182" y="198" width="136" height="22" rx="4" fill="#FFF8E1" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="250" y="209" text-anchor="middle" font-size="8" fill="#BF360C">Геномные: изменение числа</text>
  <text x="250" y="218" text-anchor="middle" font-size="8" fill="#BF360C">хромосом (2n+1, 3n)</text>

  <text x="250" y="234" text-anchor="middle" font-size="7" fill="#E65100">Наследуется! Внезапная,</text>
  <text x="250" y="244" text-anchor="middle" font-size="7" fill="#E65100">ненаправленная, редкая</text>
  <text x="250" y="258" text-anchor="middle" font-size="7" fill="#BF360C" font-weight="bold">Пример: синдром Дауна</text>
  <text x="250" y="268" text-anchor="middle" font-size="7" fill="#BF360C">(трисомия по 21 хр.)</text>

  <!-- Section 3: Vavilov's law -->
  <rect x="334" y="44" width="160" height="175" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#FFB74D" stroke-width="1.2"/>
  <text x="414" y="60" text-anchor="middle" font-size="10" font-weight="bold" fill="#BF360C">Закон Вавилова</text>

  <!-- Vavilov portrait simplified -->
  <circle cx="414" cy="88" r="14" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <circle cx="410" cy="86" r="1.5" fill="#3E2723"/>
  <circle cx="418" cy="86" r="1.5" fill="#3E2723"/>
  <path d="M410 92 Q414 95 418 92" fill="none" stroke="#3E2723" stroke-width="0.6"/>
  <path d="M400 82 Q400 74 414 72 Q428 74 428 82" fill="none" stroke="#4E342E" stroke-width="1.5"/>
  <text x="414" y="114" text-anchor="middle" font-size="8" fill="#E65100">Н.И. Вавилов</text>

  <text x="414" y="130" text-anchor="middle" font-size="8" fill="#BF360C" font-weight="bold">Закон гомологических</text>
  <text x="414" y="140" text-anchor="middle" font-size="8" fill="#BF360C" font-weight="bold">рядов наследственной</text>
  <text x="414" y="150" text-anchor="middle" font-size="8" fill="#BF360C" font-weight="bold">изменчивости</text>

  <!-- Parallel rows diagram -->
  <text x="350" y="168" font-size="7" fill="#E65100">Пшеница:</text>
  <rect x="395" y="160" width="8" height="8" fill="#FFD54F" rx="1"/>
  <rect x="405" y="160" width="8" height="8" fill="#A5D6A7" rx="1"/>
  <rect x="415" y="160" width="8" height="8" fill="#EF9A9A" rx="1"/>
  <rect x="425" y="160" width="8" height="8" fill="#90CAF9" rx="1"/>
  <rect x="435" y="160" width="8" height="8" fill="#CE93D8" rx="1"/>
  <rect x="445" y="160" width="8" height="8" fill="#BCAAA4" rx="1"/>

  <text x="350" y="184" font-size="7" fill="#E65100">Рожь:</text>
  <rect x="395" y="176" width="8" height="8" fill="#FFD54F" rx="1"/>
  <rect x="405" y="176" width="8" height="8" fill="#A5D6A7" rx="1"/>
  <rect x="415" y="176" width="8" height="8" fill="#EF9A9A" rx="1"/>
  <rect x="425" y="176" width="8" height="8" fill="#90CAF9" rx="1"/>
  <rect x="435" y="176" width="8" height="8" fill="#CE93D8" rx="1"/>
  <rect x="445" y="176" width="8" height="8" rx="1" fill="none" stroke="#E65100" stroke-width="0.6" stroke-dasharray="1,1"/>

  <text x="350" y="200" font-size="7" fill="#E65100">Ячмень:</text>
  <rect x="395" y="192" width="8" height="8" fill="#FFD54F" rx="1"/>
  <rect x="405" y="192" width="8" height="8" fill="#A5D6A7" rx="1"/>
  <rect x="415" y="192" width="8" height="8" fill="#EF9A9A" rx="1"/>
  <rect x="425" y="192" width="8" height="8" rx="1" fill="none" stroke="#E65100" stroke-width="0.6" stroke-dasharray="1,1"/>
  <rect x="435" y="192" width="8" height="8" rx="1" fill="none" stroke="#E65100" stroke-width="0.6" stroke-dasharray="1,1"/>
  <rect x="445" y="192" width="8" height="8" rx="1" fill="none" stroke="#E65100" stroke-width="0.6" stroke-dasharray="1,1"/>

  <text x="414" y="216" text-anchor="middle" font-size="7" fill="#E65100">■ — известная мутация</text>
  <text x="414" y="226" text-anchor="middle" font-size="7" fill="#E65100">□ — ожидаемая мутация</text>
  <text x="414" y="240" text-anchor="middle" font-size="7" fill="#BF360C">Родственные виды имеют</text>
  <text x="414" y="250" text-anchor="middle" font-size="7" fill="#BF360C">одинаковый набор мутаций</text>
  <text x="414" y="265" text-anchor="middle" font-size="7" fill="#E65100">→ предсказание мутаций</text>

  <!-- Bottom: Summary comparison -->
  <rect x="10" y="225" width="480" height="116" rx="8" fill="#ffffff" fill-opacity="0.6" stroke="#FF9800" stroke-width="1.2"/>
  <text x="250" y="244" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Сравнение типов изменчивости</text>

  <!-- Table header -->
  <rect x="20" y="252" width="120" height="18" rx="3" fill="#FF9800"/>
  <text x="80" y="265" text-anchor="middle" font-size="9" font-weight="bold" fill="#ffffff">Признак</text>
  <rect x="142" y="252" width="110" height="18" rx="3" fill="#FFE0B2" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="197" y="265" text-anchor="middle" font-size="9" font-weight="bold" fill="#BF360C">Модификационная</text>
  <rect x="254" y="252" width="110" height="18" rx="3" fill="#FFECB3" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="309" y="265" text-anchor="middle" font-size="9" font-weight="bold" fill="#BF360C">Мутационная</text>
  <rect x="366" y="252" width="114" height="18" rx="3" fill="#FFF8E1" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="423" y="265" text-anchor="middle" font-size="9" font-weight="bold" fill="#BF360C">Комбинативная</text>

  <!-- Row: Изменяется -->
  <rect x="20" y="272" width="120" height="16" rx="2" fill="#FFF3E0"/>
  <text x="80" y="283" text-anchor="middle" font-size="8" fill="#BF360C">Изменяется</text>
  <rect x="142" y="272" width="110" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="197" y="283" text-anchor="middle" font-size="8" fill="#E65100">Фенотип</text>
  <rect x="254" y="272" width="110" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="309" y="283" text-anchor="middle" font-size="8" fill="#E65100">Генотип</text>
  <rect x="366" y="272" width="114" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="423" y="283" text-anchor="middle" font-size="8" fill="#E65100">Генотип</text>

  <!-- Row: Наследуется -->
  <rect x="20" y="290" width="120" height="16" rx="2" fill="#FFF3E0"/>
  <text x="80" y="301" text-anchor="middle" font-size="8" fill="#BF360C">Наследуется</text>
  <rect x="142" y="290" width="110" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="197" y="301" text-anchor="middle" font-size="8" fill="#C62828" font-weight="bold">Нет</text>
  <rect x="254" y="290" width="110" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="309" y="301" text-anchor="middle" font-size="8" fill="#2E7D32" font-weight="bold">Да</text>
  <rect x="366" y="290" width="114" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="423" y="301" text-anchor="middle" font-size="8" fill="#2E7D32" font-weight="bold">Да</text>

  <!-- Row: Причина -->
  <rect x="20" y="308" width="120" height="16" rx="2" fill="#FFF3E0"/>
  <text x="80" y="319" text-anchor="middle" font-size="8" fill="#BF360C">Причина</text>
  <rect x="142" y="308" width="110" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="197" y="319" text-anchor="middle" font-size="7" fill="#E65100">Среда обитания</text>
  <rect x="254" y="308" width="110" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="309" y="319" text-anchor="middle" font-size="7" fill="#E65100">Мутагены</text>
  <rect x="366" y="308" width="114" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="423" y="319" text-anchor="middle" font-size="7" fill="#E65100">Рекомбинация генов</text>

  <!-- Row: Направленность -->
  <rect x="20" y="326" width="120" height="16" rx="2" fill="#FFF3E0"/>
  <text x="80" y="337" text-anchor="middle" font-size="8" fill="#BF360C">Направленность</text>
  <rect x="142" y="326" width="110" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="197" y="337" text-anchor="middle" font-size="7" fill="#E65100">Определённая</text>
  <rect x="254" y="326" width="110" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="309" y="337" text-anchor="middle" font-size="7" fill="#E65100">Ненаправленная</text>
  <rect x="366" y="326" width="114" height="16" rx="2" fill="#ffffff" fill-opacity="0.5"/>
  <text x="423" y="337" text-anchor="middle" font-size="7" fill="#E65100">Ненаправленная</text>
</svg>