<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg29" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#FFCDD2"/>
    </linearGradient>
    <marker id="arrow29" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#B71C1C"/>
    </marker>
  </defs>
  <rect width="500" height="350" fill="url(#bg29)" rx="12"/>
  <rect x="4" y="4" width="492" height="342" fill="none" stroke="#E53935" stroke-width="2" rx="10"/>

  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#B71C1C">Генетика пола</text>
  <line x1="40" y1="36" x2="460" y2="36" stroke="#E53935" stroke-width="1.5"/>

  <!-- Left: XX/XY chromosomes and sex determination -->
  <rect x="10" y="44" width="185" height="155" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#EF5350" stroke-width="1.2"/>
  <text x="103" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">Определение пола</text>

  <!-- Female XX -->
  <text x="103" y="80" text-anchor="middle" font-size="9" fill="#C62828" font-weight="bold">Женщина ♀</text>
  <rect x="70" y="85" width="14" height="32" rx="7" fill="#F48FB1" stroke="#C2185B" stroke-width="1"/>
  <rect x="88" y="85" width="14" height="32" rx="7" fill="#F48FB1" stroke="#C2185B" stroke-width="1"/>
  <text x="77" y="105" text-anchor="middle" font-size="7" fill="#880E4F">X</text>
  <text x="95" y="105" text-anchor="middle" font-size="7" fill="#880E4F">X</text>
  <text x="103" y="128" text-anchor="middle" font-size="9" fill="#C62828">XX</text>

  <!-- Male XY -->
  <text x="103" y="142" text-anchor="middle" font-size="9" fill="#1565C0" font-weight="bold">Мужчина ♂</text>
  <rect x="74" y="148" width="14" height="32" rx="7" fill="#F48FB1" stroke="#C2185B" stroke-width="1"/>
  <rect x="92" y="152" width="10" height="24" rx="5" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/>
  <text x="81" y="168" text-anchor="middle" font-size="7" fill="#880E4F">X</text>
  <text x="97" y="168" text-anchor="middle" font-size="7" fill="#0D47A1">Y</text>
  <text x="103" y="192" text-anchor="middle" font-size="9" fill="#1565C0">XY</text>

  <!-- Sex determination cross -->
  <text x="103" y="140" text-anchor="middle" font-size="8" fill="#C62828"></text>

  <!-- Right top: Sex determination ratio -->
  <rect x="205" y="44" width="155" height="155" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#EF5350" stroke-width="1.2"/>
  <text x="283" y="62" text-anchor="middle" font-size="11" font-weight="bold" fill="#B71C1C">Наследование пола</text>

  <text x="283" y="82" text-anchor="middle" font-size="10" fill="#C62828">P: XX × XY</text>

  <!-- Gametes -->
  <text x="235" y="100" text-anchor="middle" font-size="9" fill="#C62828">G:</text>
  <circle cx="258" cy="97" r="10" fill="#FCE4EC" stroke="#C2185B" stroke-width="0.8"/>
  <text x="258" y="100" text-anchor="middle" font-size="7" fill="#880E4F">X</text>
  <circle cx="280" cy="97" r="10" fill="#FCE4EC" stroke="#C2185B" stroke-width="0.8"/>
  <text x="280" y="100" text-anchor="middle" font-size="7" fill="#880E4F">X</text>

  <circle cx="295" cy="97" r="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="295" y="100" text-anchor="middle" font-size="7" fill="#0D47A1">X</text>
  <circle cx="317" cy="97" r="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="317" y="100" text-anchor="middle" font-size="7" fill="#0D47A1">Y</text>

  <!-- Punnett square -->
  <rect x="245" y="112" width="76" height="52" rx="2" fill="none" stroke="#C62828" stroke-width="1"/>
  <line x1="283" y1="112" x2="283" y2="164" stroke="#C62828" stroke-width="0.8"/>
  <line x1="245" y1="138" x2="321" y2="138" stroke="#C62828" stroke-width="0.8"/>

  <!-- Headers -->
  <text x="264" y="123" text-anchor="middle" font-size="8" fill="#0D47A1">X</text>
  <text x="302" y="123" text-anchor="middle" font-size="8" fill="#0D47A1">Y</text>
  <text x="252" y="133" text-anchor="middle" font-size="8" fill="#880E4F">X</text>
  <text x="252" y="155" text-anchor="middle" font-size="8" fill="#880E4F">X</text>

  <!-- Cells -->
  <rect x="246" y="113" width="37" height="25" fill="#FCE4EC" rx="1"/>
  <text x="264" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#880E4F">XX ♀</text>
  <rect x="284" y="113" width="36" height="25" fill="#E3F2FD" rx="1"/>
  <text x="302" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#0D47A1">XY ♂</text>
  <rect x="246" y="139" width="37" height="24" fill="#FCE4EC" rx="1"/>
  <text x="264" y="155" text-anchor="middle" font-size="9" font-weight="bold" fill="#880E4F">XX ♀</text>
  <rect x="284" y="139" width="36" height="24" fill="#E3F2FD" rx="1"/>
  <text x="302" y="155" text-anchor="middle" font-size="9" font-weight="bold" fill="#0D47A1">XY ♂</text>

  <text x="283" y="178" text-anchor="middle" font-size="10" fill="#B71C1C" font-weight="bold">1 : 1</text>
  <text x="283" y="192" text-anchor="middle" font-size="8" fill="#C62828">♀ : ♂ (50% : 50%)</text>

  <!-- Right: Sex-linked inheritance -->
  <rect x="370" y="44" width="124" height="155" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#EF5350" stroke-width="1.2"/>
  <text x="432" y="62" text-anchor="middle" font-size="10" font-weight="bold" fill="#B71C1C">Сцеплено с X</text>

  <text x="432" y="80" text-anchor="middle" font-size="8" fill="#C62828">Гены на X-хромосоме:</text>

  <!-- Color blindness -->
  <rect x="378" y="86" width="108" height="32" rx="4" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.8"/>
  <text x="432" y="100" text-anchor="middle" font-size="9" font-weight="bold" fill="#B71C1C">Дальтонизм</text>
  <text x="432" y="112" text-anchor="middle" font-size="8" fill="#C62828">Xᵈ — рецессивный</text>

  <!-- Hemophilia -->
  <rect x="378" y="122" width="108" height="32" rx="4" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.8"/>
  <text x="432" y="136" text-anchor="middle" font-size="9" font-weight="bold" fill="#B71C1C">Гемофилия</text>
  <text x="432" y="148" text-anchor="middle" font-size="8" fill="#C62828">Xʰ — рецессивный</text>

  <text x="432" y="166" text-anchor="middle" font-size="8" fill="#C62828">Мужчины: XᴬY — здоров</text>
  <text x="432" y="178" text-anchor="middle" font-size="8" fill="#C62828">XᵃY — болен</text>
  <text x="432" y="192" text-anchor="middle" font-size="8" fill="#C62828">Y не имеет аллеля!</text>

  <!-- Bottom: Pedigree chart -->
  <rect x="10" y="206" width="480" height="135" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#E53935" stroke-width="1.2"/>
  <text x="250" y="224" text-anchor="middle" font-size="12" font-weight="bold" fill="#B71C1C">Родословная — дальтонизм (Xᵈ)</text>

  <!-- Generation I -->
  <text x="30" y="248" font-size="9" fill="#C62828">I</text>
  <!-- Father: normal XᴰY -->
  <rect x="60" y="235" width="24" height="18" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <text x="72" y="248" text-anchor="middle" font-size="7" fill="#0D47A1">XᴰY</text>
  <!-- Marriage line -->
  <line x1="84" y1="244" x2="120" y2="244" stroke="#666" stroke-width="1"/>
  <line x1="102" y1="244" x2="102" y2="258" stroke="#666" stroke-width="1"/>
  <!-- Mother: carrier XᴰXᵈ -->
  <circle cx="132" cy="244" r="12" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.2"/>
  <text x="132" y="248" text-anchor="middle" font-size="6" fill="#880E4F">XᴰXᵈ</text>
  <!-- Children line -->
  <line x1="102" y1="258" x2="102" y2="272" stroke="#666" stroke-width="1"/>
  <line x1="62" y1="272" x2="202" y2="272" stroke="#666" stroke-width="1"/>

  <!-- Generation II -->
  <text x="30" y="290" font-size="9" fill="#C62828">II</text>

  <!-- Daughter 1: normal XᴰXᴰ -->
  <circle cx="62" cy="286" r="11" fill="#FCE4EC" stroke="#C2185B" stroke-width="1"/>
  <text x="62" y="290" text-anchor="middle" font-size="5.5" fill="#880E4F">XᴰXᴰ</text>
  <line x1="62" y1="272" x2="62" y2="275" stroke="#666" stroke-width="0.8"/>

  <!-- Daughter 2: carrier XᴰXᵈ -->
  <circle cx="102" cy="286" r="11" fill="#FCE4EC" stroke="#C2185B" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="102" y="290" text-anchor="middle" font-size="5.5" fill="#880E4F">XᴰXᵈ</text>
  <line x1="102" y1="272" x2="102" y2="275" stroke="#666" stroke-width="0.8"/>

  <!-- Son 1: normal XᴰY -->
  <rect x="138" y="277" width="20" height="16" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="148" y="289" text-anchor="middle" font-size="5.5" fill="#0D47A1">XᴰY</text>
  <line x1="148" y1="272" x2="148" y2="277" stroke="#666" stroke-width="0.8"/>

  <!-- Son 2: color blind XᵈY -->
  <rect x="190" y="277" width="20" height="16" rx="2" fill="#FFCDD2" stroke="#C62828" stroke-width="1.2"/>
  <text x="200" y="289" text-anchor="middle" font-size="5.5" fill="#B71C1C">XᵈY</text>
  <line x1="200" y1="272" x2="200" y2="277" stroke="#666" stroke-width="0.8"/>

  <!-- Legend -->
  <rect x="260" y="238" width="220" height="92" rx="4" fill="#FFEBEE" stroke="#EF5350" stroke-width="0.8"/>
  <text x="370" y="254" text-anchor="middle" font-size="9" font-weight="bold" fill="#B71C1C">Обозначения:</text>

  <rect x="270" y="260" width="14" height="12" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="290" y="270" font-size="8" fill="#0D47A1">♂ мужчина здоров</text>

  <rect x="270" y="276" width="14" height="12" rx="2" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <text x="290" y="286" font-size="8" fill="#B71C1C">♂ мужчина болен</text>

  <circle cx="277" cy="302" r="6" fill="#FCE4EC" stroke="#C2185B" stroke-width="0.8"/>
  <text x="290" y="306" font-size="8" fill="#880E4F">♀ женщина здорова</text>

  <circle cx="277" cy="318" r="6" fill="#FCE4EC" stroke="#C2185B" stroke-width="1" stroke-dasharray="2,1.5"/>
  <text x="290" y="322" font-size="8" fill="#880E4F">♀ женщина носитель</text>

  <text x="370" y="338" text-anchor="middle" font-size="8" fill="#C62828" font-style="italic">Болеют чаще ♂ — один рецессивный аллель достаточен</text>
</svg>