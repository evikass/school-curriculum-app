<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" rx="8" fill="url(#bg6)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#00695C">Массовая доля вещества</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 6</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- Formula highlight -->
  <rect x="14" y="54" width="472" height="55" rx="8" fill="white" fill-opacity="0.95" stroke="#00897B" stroke-width="1.5"/>
  <text x="250" y="76" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#00695C">w = m(в-ва) / m(р-ра) x 100%</text>
  <text x="160" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">m(р-ра) = m(в-ва) + m(р-ля)</text>
  <text x="350" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00897B">w — массовая доля (%)</text>
  <!-- Example 1 -->
  <rect x="14" y="118" width="230" height="110" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Задача 1</text>
  <text x="129" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">20 г сахара в 200 г воды</text>
  <line x1="24" y1="156" x2="234" y2="156" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="30" y="170" font-family="Arial,sans-serif" font-size="6" fill="#004D40">m(р-ра) = 20 + 200 = 220 г</text>
  <text x="30" y="184" font-family="Arial,sans-serif" font-size="6" fill="#004D40">w = 20/220 x 100%</text>
  <text x="30" y="198" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00695C">w = 9,1%</text>
  <!-- Visual: small beaker -->
  <rect x="175" y="158" width="50" height="55" rx="3" fill="#E0F7FA" fill-opacity="0.5" stroke="#00695C" stroke-width="1"/>
  <rect x="178" y="162" width="20" height="46" rx="2" fill="#B3E5FC" opacity="0.5"/>
  <circle cx="195" cy="180" r="3" fill="#4DB6AC" opacity="0.8"/>
  <circle cx="210" cy="190" r="3" fill="#4DB6AC" opacity="0.8"/>
  <circle cx="200" cy="200" r="3" fill="#4DB6AC" opacity="0.8"/>
  <!-- Example 2 -->
  <rect x="256" y="118" width="230" height="110" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Задача 2</text>
  <text x="371" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">10%-ный р-р из 300 г воды</text>
  <line x1="266" y1="156" x2="476" y2="156" stroke="#80CBC4" stroke-width="0.5"/>
  <text x="270" y="170" font-family="Arial,sans-serif" font-size="6" fill="#004D40">x / (x + 300) = 0,1</text>
  <text x="270" y="184" font-family="Arial,sans-serif" font-size="6" fill="#004D40">x = 0,1x + 30</text>
  <text x="270" y="198" font-family="Arial,sans-serif" font-size="6" fill="#004D40">0,9x = 30</text>
  <text x="270" y="213" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#00695C">m(соли) = 33,3 г</text>
  <!-- Example 3 -->
  <rect x="14" y="236" width="472" height="98" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="254" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Задача 3: Выпаривание</text>
  <text x="250" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">500 г 20%-ного раствора, выпарили 100 г воды</text>
  <line x1="24" y1="276" x2="476" y2="276" stroke="#80CBC4" stroke-width="0.5"/>
  <!-- Before -->
  <rect x="30" y="282" width="130" height="42" rx="4" fill="#B3E5FC" fill-opacity="0.3" stroke="#0288D1" stroke-width="0.8"/>
  <text x="95" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#01579B">До выпаривания</text>
  <text x="95" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">m(р-ра)=500 г</text>
  <text x="95" y="319" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">m(в-ва)=100 г, w=20%</text>
  <!-- Arrow -->
  <text x="195" y="305" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#00695C">=</text>
  <!-- After -->
  <rect x="220" y="282" width="130" height="42" rx="4" fill="#FFCC80" fill-opacity="0.3" stroke="#E65100" stroke-width="0.8"/>
  <text x="285" y="296" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100">После выпаривания</text>
  <text x="285" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">m(р-ра)=400 г</text>
  <text x="285" y="319" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">m(в-ва)=100 г</text>
  <!-- Result -->
  <rect x="370" y="282" width="100" height="42" rx="4" fill="#C8E6C9" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1.2"/>
  <text x="420" y="300" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32">w = 25%</text>
  <text x="420" y="316" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Доля увеличилась</text>
</svg>