<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient></defs>
  <rect width="500" height="350" rx="8" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Галогены</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 14</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <rect x="14" y="54" width="472" height="85" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Элементы VIIA группы: F, Cl, Br, I, At</text>
  <rect x="24" y="78" width="105" height="50" rx="4" fill="#FFF9C4" fill-opacity="0.4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="76" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17">F2 — газ</text>
  <text x="76" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">жёлто-зелёный</text>
  <text x="76" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">Самый активный</text>
  <rect x="138" y="78" width="105" height="50" rx="4" fill="#C8E6C9" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="190" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32">Cl2 — газ</text>
  <text x="190" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">жёлто-зелёный</text>
  <text x="190" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Хлорная вода</text>
  <rect x="252" y="78" width="105" height="50" rx="4" fill="#FFCC80" fill-opacity="0.4" stroke="#E65100" stroke-width="0.8"/>
  <text x="304" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100">Br2 — жидкость</text>
  <text x="304" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">красно-бурый</text>
  <text x="304" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Единств. жидкий неметалл</text>
  <rect x="366" y="78" width="105" height="50" rx="4" fill="#D1C4E9" fill-opacity="0.5" stroke="#4527A0" stroke-width="0.8"/>
  <text x="418" y="94" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#4527A0">I2 — твёрдый</text>
  <text x="418" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">тёмно-фиолетовый</text>
  <text x="418" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#004D40">Возгонка (сублимация)</text>
  <!-- Reactivity -->
  <rect x="14" y="148" width="230" height="95" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="164" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Химическая активность</text>
  <text x="129" y="182" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828">F2 &gt; Cl2 &gt; Br2 &gt; I2</text>
  <text x="129" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Вытеснение из раствора:</text>
  <text x="129" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Cl2 + 2KBr = 2KCl + Br2</text>
  <text x="129" y="226" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Cl2 + 2KI = 2KCl + I2</text>
  <text x="129" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Более активный вытесняет менее</text>
  <!-- HCl -->
  <rect x="256" y="148" width="230" height="95" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="164" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">HCl — хлороводород</text>
  <text x="270" y="182" font-family="Arial,sans-serif" font-size="6" fill="#004D40">H2 + Cl2 = 2HCl</text>
  <text x="270" y="196" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaCl + H2SO4(конц.) = NaHSO4 + HCl</text>
  <text x="270" y="210" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Соляная кислота — HCl(р-р)</text>
  <text x="270" y="226" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Кач. реакция: Ag+ + Cl- = AgCl (белый)</text>
  <text x="270" y="238" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Желудочный сок, производство</text>
  <!-- Qualitative test for I2 -->
  <rect x="14" y="252" width="155" height="82" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="91" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Кач. реакция на I2</text>
  <rect x="40" y="276" width="100" height="28" rx="4" fill="#4A148C" fill-opacity="0.15" stroke="#4A148C" stroke-width="0.8"/>
  <text x="90" y="294" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#4A148C">Крахмал + I2</text>
  <text x="91" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#4A148C">Синее окрашивание</text>
  <!-- Halogen uses -->
  <rect x="178" y="252" width="155" height="82" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="255" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Применение</text>
  <text x="192" y="284" font-family="Arial,sans-serif" font-size="6" fill="#004D40">F: тефлон, фреоны</text>
  <text x="192" y="298" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Cl: дезинфекция, PVC</text>
  <text x="192" y="312" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Br: фотография, лекарства</text>
  <text x="192" y="326" font-family="Arial,sans-serif" font-size="6" fill="#004D40">I: антисептика, щитовидка</text>
  <rect x="342" y="252" width="144" height="82" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="414" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Галогениды</text>
  <text x="356" y="286" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaF — против кариеса</text>
  <text x="356" y="300" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaCl — поваренная соль</text>
  <text x="356" y="314" font-family="Arial,sans-serif" font-size="6" fill="#004D40">KBr — успокоительное</text>
  <text x="356" y="328" font-family="Arial,sans-serif" font-size="6" fill="#004D40">KI — йодированная соль</text>
</svg>