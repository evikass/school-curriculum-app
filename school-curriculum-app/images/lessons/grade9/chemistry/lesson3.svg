<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" rx="8" fill="url(#bg3)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Типы химической связи</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 3</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- 4 panels for bond types -->
  <!-- Panel 1: Covalent nonpolar -->
  <rect x="14" y="54" width="230" height="105" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Ковалентная неполярная</text>
  <!-- H2 molecule -->
  <circle cx="85" cy="105" r="16" fill="#A5D6A7" fill-opacity="0.5" stroke="#00897B" stroke-width="1.5"/>
  <text x="85" y="109" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#004D40">H</text>
  <circle cx="115" cy="105" r="16" fill="#A5D6A7" fill-opacity="0.5" stroke="#00897B" stroke-width="1.5"/>
  <text x="115" y="109" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#004D40">H</text>
  <line x1="101" y1="105" x2="99" y2="105" stroke="#00695C" stroke-width="3"/>
  <text x="129" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00897B">H2, O2, N2, Cl2</text>
  <text x="195" y="105" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Общие электронные</text>
  <text x="195" y="115" font-family="Arial,sans-serif" font-size="6" fill="#004D40">пары между атомами</text>
  <text x="195" y="125" font-family="Arial,sans-serif" font-size="6" fill="#004D40">одного элемента</text>
  <!-- Panel 2: Covalent polar -->
  <rect x="256" y="54" width="230" height="105" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Ковалентная полярная</text>
  <!-- HCl molecule -->
  <circle cx="320" cy="105" r="16" fill="#A5D6A7" fill-opacity="0.5" stroke="#00897B" stroke-width="1.5"/>
  <text x="320" y="109" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#004D40">H</text>
  <circle cx="355" cy="105" r="18" fill="#EF9A9A" fill-opacity="0.5" stroke="#C62828" stroke-width="1.5"/>
  <text x="355" y="109" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C">Cl</text>
  <!-- Shifted electron pair -->
  <ellipse cx="342" cy="105" rx="4" ry="3" fill="#FF5722" opacity="0.6"/>
  <text x="371" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00897B">HCl, H2O, NH3</text>
  <text x="425" y="100" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Смещение пары</text>
  <text x="425" y="110" font-family="Arial,sans-serif" font-size="6" fill="#004D40">к более электро-</text>
  <text x="425" y="120" font-family="Arial,sans-serif" font-size="6" fill="#004D40">отрицательному</text>
  <!-- Panel 3: Ionic bond -->
  <rect x="14" y="167" width="230" height="105" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Ионная связь</text>
  <!-- NaCl -->
  <circle cx="80" cy="220" r="16" fill="#A5D6A7" fill-opacity="0.5" stroke="#00897B" stroke-width="1.5"/>
  <text x="80" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Na</text>
  <text x="80" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">+</text>
  <circle cx="120" cy="220" r="18" fill="#EF9A9A" fill-opacity="0.5" stroke="#C62828" stroke-width="1.5"/>
  <text x="120" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#B71C1C">Cl</text>
  <text x="120" y="228" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">-</text>
  <!-- Arrow showing electron transfer -->
  <line x1="96" y1="210" x2="102" y2="210" stroke="#00695C" stroke-width="1" marker-end="url(#arrowE)"/>
  <defs><marker id="arrowE" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#00695C"/></marker></defs>
  <text x="129" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00897B">NaCl, CaO, K2SO4</text>
  <text x="190" y="210" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Переход электрона</text>
  <text x="190" y="220" font-family="Arial,sans-serif" font-size="6" fill="#004D40">от металла</text>
  <text x="190" y="230" font-family="Arial,sans-serif" font-size="6" fill="#004D40">к неметаллу</text>
  <!-- Panel 4: Metallic bond -->
  <rect x="256" y="167" width="230" height="105" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Металлическая связь</text>
  <!-- Metal lattice -->
  <circle cx="310" cy="210" r="8" fill="#78909C" opacity="0.7" stroke="#455A64" stroke-width="1"/>
  <circle cx="330" cy="210" r="8" fill="#78909C" opacity="0.7" stroke="#455A64" stroke-width="1"/>
  <circle cx="350" cy="210" r="8" fill="#78909C" opacity="0.7" stroke="#455A64" stroke-width="1"/>
  <circle cx="320" cy="228" r="8" fill="#78909C" opacity="0.7" stroke="#455A64" stroke-width="1"/>
  <circle cx="340" cy="228" r="8" fill="#78909C" opacity="0.7" stroke="#455A64" stroke-width="1"/>
  <!-- Free electrons -->
  <circle cx="318" cy="218" r="2" fill="#4FC3F7"/>
  <circle cx="336" cy="215" r="2" fill="#4FC3F7"/>
  <circle cx="328" cy="234" r="2" fill="#4FC3F7"/>
  <text x="371" y="252" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#00897B">Fe, Cu, Al, Na</text>
  <text x="420" y="205" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Свободные</text>
  <text x="420" y="215" font-family="Arial,sans-serif" font-size="6" fill="#4FC3F7">электроны</text>
  <text x="420" y="225" font-family="Arial,sans-serif" font-size="6" fill="#004D40">в кристалле</text>
  <!-- Bottom: Hydrogen bond -->
  <rect x="14" y="280" width="472" height="55" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Водородная связь</text>
  <text x="140" y="318" font-family="Arial,sans-serif" font-size="7" fill="#004D40">H2O, NH3 — между молекулами</text>
  <text x="350" y="318" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">ДНК — двойная спираль</text>
  <text x="250" y="330" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Между H и электроотрицательными элементами (O, N, F)</text>
</svg>