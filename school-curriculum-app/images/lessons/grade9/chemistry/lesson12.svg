<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient></defs>
  <rect width="500" height="350" rx="8" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Железо и его соединения</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 12</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <rect x="14" y="54" width="155" height="90" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="91" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Fe — Железо</text>
  <text x="91" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Z = 26, Ar = 56</text>
  <text x="91" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Ст. ок.: +2, +3</text>
  <text x="91" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">d-элемент, VIII группа</text>
  <text x="91" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Металл средней активности</text>
  <!-- Oxides -->
  <rect x="178" y="54" width="155" height="90" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="255" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Оксиды железа</text>
  <rect x="186" y="78" width="68" height="28" rx="4" fill="#90A4AE" fill-opacity="0.3" stroke="#546E7A" stroke-width="0.8"/>
  <text x="220" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#37474F">FeO</text>
  <text x="220" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">чёрный</text>
  <rect x="260" y="78" width="68" height="28" rx="4" fill="#EF5350" fill-opacity="0.2" stroke="#C62828" stroke-width="0.8"/>
  <text x="294" y="92" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#C62828">Fe2O3</text>
  <text x="294" y="102" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">красно-бурый</text>
  <rect x="186" y="112" width="140" height="24" rx="4" fill="#4CAF50" fill-opacity="0.15" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="256" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Fe3O4 — магнитный</text>
  <!-- Hydroxides -->
  <rect x="342" y="54" width="144" height="90" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="414" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Гидроксиды</text>
  <text x="356" y="88" font-family="Arial,sans-serif" font-size="6" fill="#546E7A">Fe(OH)2 — зелёный</text>
  <text x="356" y="102" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Fe(OH)3 — бурый</text>
  <text x="356" y="118" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Fe2+ + 2OH- = Fe(OH)2</text>
  <text x="356" y="132" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Fe3+ + 3OH- = Fe(OH)3</text>
  <!-- Qualitative reactions -->
  <rect x="14" y="152" width="472" height="85" rx="8" fill="white" fill-opacity="0.95" stroke="#00897B" stroke-width="1.2"/>
  <text x="250" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Качественные реакции на ионы железа</text>
  <rect x="24" y="178" width="220" height="48" rx="4" fill="#FFF9C4" fill-opacity="0.4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="134" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17">На Fe3+ (III)</text>
  <text x="134" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">KSCN — кроваво-красное окрашивание</text>
  <text x="134" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaOH — бурый осадок Fe(OH)3</text>
  <rect x="256" y="178" width="220" height="48" rx="4" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="0.8"/>
  <text x="366" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1A237E">На Fe2+ (II)</text>
  <text x="366" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">K3[Fe(CN)6] — турнбулева синь</text>
  <text x="366" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaOH — зелёный осадок Fe(OH)2</text>
  <!-- Corrosion -->
  <rect x="14" y="245" width="230" height="90" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="261" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Коррозия железа</text>
  <text x="129" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">4Fe + 3O2 + 6H2O = 4Fe(OH)3</text>
  <text x="129" y="294" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Ржавчина — Fe2O3 x nH2O</text>
  <text x="129" y="310" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Защита: краска, цинкование</text>
  <text x="129" y="324" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Протектор: Mg, Zn (анодное покрытие)</text>
  <rect x="256" y="245" width="230" height="90" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="261" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Сплавы железа</text>
  <text x="270" y="278" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Чугун: C = 2-4%</text>
  <text x="270" y="292" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Сталь: C менее 2%</text>
  <text x="270" y="306" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Нержавейка: Fe + Cr + Ni</text>
  <text x="270" y="320" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Доменный процесс получения</text>
</svg>