<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Грибы</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 13</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Mushroom structure (large diagram) -->
  <text x="135" y="57" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Строение шляпочного гриба</text>

  <g transform="translate(25,62)">
    <!-- Cap (шляпка) -->
    <path d="M50,30 Q60,5 110,5 Q160,5 170,30 Q160,40 110,42 Q60,40 50,30" fill="#A1887F" stroke="#5D4037" stroke-width="1.5"/>
    <!-- Cap surface details -->
    <path d="M65,20 Q80,15 100,18" stroke="#8D6E63" stroke-width="0.5" fill="none"/>
    <path d="M120,16 Q140,12 155,20" stroke="#8D6E63" stroke-width="0.5" fill="none"/>

    <!-- Gills under cap (пластинки) -->
    <path d="M65,32 L70,42 M78,30 L82,42 M90,29 L93,42 M100,28 L102,42 M110,28 L112,42 M120,29 L123,42 M130,30 L133,42 M140,32 L143,42 M150,34 L152,42" stroke="#D7CCC8" stroke-width="0.5"/>

    <!-- Stem (ножка) -->
    <rect x="90" y="42" width="30" height="55" rx="5" fill="#D7CCC8" stroke="#A1887F" stroke-width="1.2"/>

    <!-- Ring on stem (кольцо) -->
    <path d="M88,55 Q110,52 132,55 Q110,58 88,55" fill="#EFEBE9" stroke="#A1887F" stroke-width="0.8"/>

    <!-- Mycelium (грибница) -->
    <path d="M90,97 Q80,105 65,108 Q55,110 45,115" stroke="#A1887F" stroke-width="1.5" fill="none"/>
    <path d="M95,97 Q90,108 80,115 Q75,120 60,125" stroke="#A1887F" stroke-width="1.2" fill="none"/>
    <path d="M105,97 Q110,108 120,112 Q130,118 140,120" stroke="#A1887F" stroke-width="1.5" fill="none"/>
    <path d="M115,97 Q125,105 135,108 Q145,112 155,118" stroke="#A1887F" stroke-width="1.2" fill="none"/>
    <path d="M100,97 Q100,110 100,120 Q100,125 100,130" stroke="#A1887F" stroke-width="1" fill="none"/>

    <!-- Labels with lines -->
    <line x1="170" y1="20" x2="200" y2="15" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="202" y="13" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Шляпка</text>
    <text x="202" y="22" font-family="Arial,sans-serif" font-size="5.5" fill="#555">спороносный слой</text>

    <line x1="120" y1="55" x2="200" y2="45" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="202" y="43" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Кольцо</text>
    <text x="202" y="52" font-family="Arial,sans-serif" font-size="5.5" fill="#555">остаток покрывала</text>

    <line x1="120" y1="70" x2="200" y2="65" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="202" y="63" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Ножка</text>
    <text x="202" y="72" font-family="Arial,sans-serif" font-size="5.5" fill="#555">опорная часть</text>

    <line x1="60" y1="115" x2="200" y2="85" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="202" y="83" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Грибница (мицелий)</text>
    <text x="202" y="92" font-family="Arial,sans-serif" font-size="5.5" fill="#555">гифы — нитевидные клетки</text>

    <line x1="75" y1="38" x2="50" y2="38" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="5" y="36" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Пластинки</text>
    <text x="5" y="44" font-family="Arial,sans-serif" font-size="5" fill="#555">(споры)</text>
  </g>

  <!-- Fungal cell structure -->
  <text x="390" y="57" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Клетка гриба</text>

  <g transform="translate(310,62)">
    <!-- Cell wall -->
    <rect x="0" y="0" width="140" height="80" rx="10" fill="none" stroke="#5D4037" stroke-width="2"/>
    <!-- Cell membrane -->
    <rect x="3" y="3" width="134" height="74" rx="8" fill="#EFEBE9" opacity="0.5" stroke="#A1887F" stroke-width="0.8"/>

    <!-- Nucleus -->
    <ellipse cx="45" cy="35" rx="18" ry="14" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
    <ellipse cx="45" cy="35" rx="7" ry="5" fill="#FF8A65"/>
    <text x="45" y="38" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#BF360C">ядро</text>

    <!-- Vacuoles -->
    <ellipse cx="100" cy="25" rx="15" ry="10" fill="#B3E5FC" opacity="0.4" stroke="#42A5F5" stroke-width="0.8"/>
    <text x="100" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#0D47A1">вакуоль</text>

    <ellipse cx="105" cy="55" rx="12" ry="8" fill="#B3E5FC" opacity="0.3" stroke="#42A5F5" stroke-width="0.6"/>

    <!-- Mitochondria -->
    <ellipse cx="70" cy="60" rx="12" ry="6" fill="#FFAB91" stroke="#D84315" stroke-width="0.6" transform="rotate(-20,70,60)"/>
    <text x="70" y="63" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#BF360C">митох.</text>

    <!-- Glycogen granules -->
    <circle cx="25" cy="60" r="3" fill="#FFF176" stroke="#FBC02D" stroke-width="0.5"/>
    <circle cx="35" cy="65" r="2.5" fill="#FFF176" stroke="#FBC02D" stroke-width="0.5"/>

    <!-- Labels -->
    <line x1="0" y1="-5" x2="0" y2="-10" stroke="#5D4037" stroke-width="0.5"/>
    <text x="30" y="-8" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">Клеточная стенка (хитин)</text>

    <line x1="25" y1="65" x2="10" y2="75" stroke="#FBC02D" stroke-width="0.5"/>
    <text x="10" y="82" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">Гликоген (запас)</text>
  </g>

  <!-- Hyphae detail -->
  <text x="390" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Гифы мицелия</text>

  <g transform="translate(310,163)">
    <!-- Septate hyphae -->
    <text x="35" y="8" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">С перегородками</text>
    <rect x="5" y="12" width="65" height="14" rx="7" fill="#D7CCC8" stroke="#A1887F" stroke-width="0.8"/>
    <line x1="22" y1="12" x2="22" y2="26" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="40" y1="12" x2="40" y2="26" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="55" y1="12" x2="55" y2="26" stroke="#8D6E63" stroke-width="0.5"/>

    <!-- Non-septate hyphae -->
    <text x="115" y="8" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Без перегородок</text>
    <rect x="80" y="12" width="65" height="14" rx="7" fill="#D7CCC8" stroke="#A1887F" stroke-width="0.8"/>
    <!-- Multiple nuclei inside -->
    <circle cx="90" cy="19" r="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.3"/>
    <circle cx="102" cy="19" r="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.3"/>
    <circle cx="115" cy="19" r="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.3"/>
    <circle cx="128" cy="19" r="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.3"/>
  </g>

  <!-- Three nutrition types -->
  <text x="250" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Типы питания грибов</text>
  <line x1="30" y1="214" x2="470" y2="214" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <!-- 1. Сапротрофы -->
  <g transform="translate(15,220)">
    <rect x="0" y="0" width="155" height="65" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
    <text x="77" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">Сапротрофы</text>
    <!-- Dead leaf -->
    <path d="M25,25 Q40,20 55,25 Q50,35 40,40 Q30,35 25,25" fill="#8D6E63" opacity="0.5" stroke="#5D4037" stroke-width="0.8"/>
    <line x1="30" y1="30" x2="45" y2="30" stroke="#5D4037" stroke-width="0.5"/>
    <!-- Mushroom on dead matter -->
    <rect x="37" y="38" width="5" height="12" fill="#D7CCC8" stroke="#A1887F" stroke-width="0.6"/>
    <path d="M30,38 Q40,32 50,38" fill="#A1887F" stroke="#5D4037" stroke-width="0.6"/>
    <!-- Arrow showing feeding -->
    <path d="M60,35 L75,35" stroke="#FF9800" stroke-width="1" marker-end="url(#arr3)"/>
    <defs><marker id="arr3" markerWidth="5" markerHeight="3" refX="5" refY="1.5" orient="auto"><path d="M0,0 L5,1.5 L0,3" fill="#FF9800"/></marker></defs>
    <!-- Fungal hyphae absorbing -->
    <path d="M80,30 Q85,25 90,32 Q95,38 100,32" stroke="#A1887F" stroke-width="1.5" fill="none"/>
    <text x="77" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Питаются мёртвыми</text>
    <text x="77" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">остатками организмов</text>
    <text x="77" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#E65100">Пример: навозник, опёнок</text>
  </g>

  <!-- 2. Паразиты -->
  <g transform="translate(180,220)">
    <rect x="0" y="0" width="155" height="65" rx="5" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.8"/>
    <text x="77" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#880E4F">Паразиты</text>
    <!-- Living tree -->
    <rect x="20" y="25" width="8" height="30" fill="#5D4037"/>
    <ellipse cx="24" cy="22" rx="12" ry="10" fill="#4CAF50"/>
    <!-- Fungus on tree (parasite) -->
    <path d="M28,30 Q38,25 42,32 Q38,38 28,35" fill="#A1887F" stroke="#5D4037" stroke-width="0.8"/>
    <!-- Hyphae penetrating -->
    <path d="M28,33 L22,33 L22,40" stroke="#E91E63" stroke-width="0.5" stroke-dasharray="1,1"/>
    <text x="77" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Питаются за счёт</text>
    <text x="77" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">живого организма</text>
    <text x="77" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#880E4F">Пример: трутовик, головня</text>
  </g>

  <!-- 3. Симбионты -->
  <g transform="translate(345,220)">
    <rect x="0" y="0" width="145" height="65" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
    <text x="72" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Симбионты</text>
    <!-- Tree with mycorrhiza -->
    <line x1="40" y1="25" x2="40" y2="42" stroke="#5D4037" stroke-width="2"/>
    <ellipse cx="40" cy="22" rx="10" ry="8" fill="#4CAF50"/>
    <!-- Fungal hyphae around roots -->
    <path d="M30,42 Q25,48 20,45 Q15,50 10,48" stroke="#A1887F" stroke-width="1.2" fill="none"/>
    <path d="M35,42 Q30,50 25,48 Q20,55 15,52" stroke="#A1887F" stroke-width="1.2" fill="none"/>
    <path d="M45,42 Q50,48 55,46 Q60,52 65,50" stroke="#A1887F" stroke-width="1.2" fill="none"/>
    <path d="M50,42 Q55,50 60,48 Q65,54 70,52" stroke="#A1887F" stroke-width="1.2" fill="none"/>
    <!-- Mutual benefit arrows -->
    <text x="80" y="35" font-family="Arial,sans-serif" font-size="4.5" fill="#4CAF50">← вода,</text>
    <text x="80" y="41" font-family="Arial,sans-serif" font-size="4.5" fill="#4CAF50">  минералы</text>
    <text x="80" y="50" font-family="Arial,sans-serif" font-size="4.5" fill="#FF9800">→ органика</text>
    <text x="72" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">Микориза</text>
  </g>

  <!-- Differences from plants and animals -->
  <text x="250" y="302" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Чем грибы отличаются от растений и животных</text>
  <line x1="30" y1="306" x2="470" y2="306" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <g transform="translate(20,312)">
    <rect x="0" y="0" width="145" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="72" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20">Растения</text>
    <text x="72" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Автотрофы, целлюлоза</text>

    <rect x="155" y="0" width="155" height="28" rx="3" fill="#EFEBE9" stroke="#795548" stroke-width="0.6"/>
    <text x="232" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#3E2723">Грибы</text>
    <text x="232" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Гетеротрофы, хитин, гликоген</text>

    <rect x="320" y="0" width="155" height="28" rx="3" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.6"/>
    <text x="397" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#880E4F">Животные</text>
    <text x="397" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Гетеротрофы, без стенки</text>
  </g>
</svg>