<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Роль бактерий</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 12</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Useful bacteria section -->
  <text x="130" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Полезные бактерии</text>
  <line x1="15" y1="62" x2="245" y2="62" stroke="#4CAF50" stroke-width="0.5"/>

  <!-- 1. Food industry -->
  <g transform="translate(15,68)">
    <rect x="0" y="0" width="110" height="55" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
    <text x="55" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100">Пищевая пром-ть</text>
    <!-- Yogurt cup -->
    <rect x="10" y="18" width="22" height="20" rx="2" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.8"/>
    <text x="21" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">йогурт</text>
    <!-- Cheese -->
    <path d="M45,38 L45,20 Q55,15 65,20 L65,38 Z" fill="#FFE082" stroke="#FFC107" stroke-width="0.8"/>
    <text x="55" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">сыр</text>
    <!-- Cabbage/sauerkraut -->
    <ellipse cx="90" cy="28" rx="12" ry="8" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.8"/>
    <text x="90" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">кваш.</text>
    <text x="55" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Молочнокислые бактерии</text>
  </g>

  <!-- 2. Medicine -->
  <g transform="translate(135,68)">
    <rect x="0" y="0" width="110" height="55" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="0.8"/>
    <text x="55" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#0D47A1">Медицина</text>
    <!-- Medicine bottle -->
    <rect x="10" y="18" width="18" height="25" rx="2" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8"/>
    <rect x="12" y="15" width="14" height="5" rx="1" fill="#90CAF9"/>
    <text x="19" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#0D47A1">АБ</text>
    <!-- Syringe simplified -->
    <rect x="40" y="22" width="30" height="8" rx="2" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
    <line x1="70" y1="26" x2="78" y2="26" stroke="#42A5F5" stroke-width="1"/>
    <line x1="35" y1="26" x2="40" y2="26" stroke="#42A5F5" stroke-width="2"/>
    <text x="55" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Антибиотики, вакцины</text>
  </g>

  <!-- 3. Agriculture / Nitrogen fixation -->
  <g transform="translate(15,130)">
    <rect x="0" y="0" width="110" height="55" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
    <text x="55" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Сельское хозяйство</text>
    <!-- Plant with root nodules -->
    <line x1="55" y1="38" x2="55" y2="20" stroke="#4CAF50" stroke-width="1.5"/>
    <ellipse cx="55" cy="17" rx="10" ry="8" fill="#66BB6A"/>
    <!-- Roots -->
    <line x1="55" y1="38" x2="40" y2="50" stroke="#795548" stroke-width="1"/>
    <line x1="55" y1="38" x2="70" y2="50" stroke="#795548" stroke-width="1"/>
    <!-- Nodules -->
    <circle cx="38" cy="46" r="4" fill="#FFCDD2" stroke="#E91E63" stroke-width="0.8"/>
    <circle cx="72" cy="46" r="4" fill="#FFCDD2" stroke="#E91E63" stroke-width="0.8"/>
    <text x="55" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Клубеньки на корнях</text>
  </g>

  <!-- 4. Industry -->
  <g transform="translate(135,130)">
    <rect x="0" y="0" width="110" height="55" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
    <text x="55" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#6A1B9A">Промышленность</text>
    <!-- Factory -->
    <rect x="20" y="22" width="30" height="25" fill="#E1BEE7" stroke="#9C27B0" stroke-width="0.8"/>
    <rect x="22" y="32" width="8" height="8" fill="#CE93D8"/>
    <rect x="35" y="28" width="8" height="8" fill="#CE93D8"/>
    <!-- Smoke/production -->
    <path d="M35,20 Q38,15 42,18 Q46,12 50,16" stroke="#9C27B0" stroke-width="0.8" fill="none"/>
    <text x="55" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Очистка, биотехнология</text>
  </g>

  <!-- Cycle of substances -->
  <text x="370" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Круговорот веществ</text>
  <line x1="260" y1="62" x2="485" y2="62" stroke="#2E7D32" stroke-width="0.5"/>

  <g transform="translate(270,70)">
    <!-- Cycle diagram -->
    <!-- Organisms -->
    <rect x="65" y="0" width="70" height="22" rx="4" fill="#4CAF50" opacity="0.8"/>
    <text x="100" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="white" font-weight="bold">Растения</text>

    <!-- Animals -->
    <rect x="145" y="50" width="70" height="22" rx="4" fill="#FF7043" opacity="0.8"/>
    <text x="180" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="white" font-weight="bold">Животные</text>

    <!-- Bacteria decomposers -->
    <rect x="5" y="50" width="70" height="22" rx="4" fill="#42A5F5" opacity="0.8"/>
    <text x="40" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">Бактерии-</text>
    <text x="40" y="67" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">редуценты</text>

    <!-- Mineral substances -->
    <ellipse cx="100" cy="88" rx="45" ry="12" fill="#8D6E63" opacity="0.3"/>
    <text x="100" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#3E2723">Минеральные вещества</text>

    <!-- Arrows -->
    <path d="M100,22 L100,28 Q130,35 165,50" stroke="#2E7D32" stroke-width="1" fill="none" marker-end="url(#arr2)"/>
    <path d="M145,60 L80,60" stroke="#2E7D32" stroke-width="1" fill="none" marker-end="url(#arr2)"/>
    <path d="M35,72 L70,82" stroke="#2E7D32" stroke-width="1" fill="none" marker-end="url(#arr2)"/>
    <path d="M100,76 L100,72 Q80,65 72,22" stroke="#2E7D32" stroke-width="1" fill="none" marker-end="url(#arr2)"/>
    <defs><marker id="arr2" markerWidth="5" markerHeight="3" refX="5" refY="1.5" orient="auto"><path d="M0,0 L5,1.5 L0,3" fill="#2E7D32"/></marker></defs>

    <!-- Arrow labels -->
    <text x="128" y="30" font-family="Arial,sans-serif" font-size="4.5" fill="#555">поедают</text>
    <text x="108" y="55" font-family="Arial,sans-serif" font-size="4.5" fill="#555">отходы, трупы</text>
    <text x="42" y="80" font-family="Arial,sans-serif" font-size="4.5" fill="#555">разлагают</text>
    <text x="55" y="48" font-family="Arial,sans-serif" font-size="4.5" fill="#555">питание</text>
  </g>

  <!-- Harmful bacteria section -->
  <text x="250" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828">Вредные бактерии (патогенные)</text>
  <line x1="30" y1="209" x2="470" y2="209" stroke="#D32F2F" stroke-width="0.5" opacity="0.5"/>

  <!-- Disease boxes -->
  <g transform="translate(15,215)">
    <rect x="0" y="0" width="90" height="42" rx="4" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.8"/>
    <text x="45" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#C62828">Дыхательные</text>
    <text x="45" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Туберкулёз</text>
    <text x="45" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Пневмония</text>
    <text x="45" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Дифтерия</text>
  </g>

  <g transform="translate(115,215)">
    <rect x="0" y="0" width="90" height="42" rx="4" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.8"/>
    <text x="45" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#C62828">Кишечные</text>
    <text x="45" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Холера</text>
    <text x="45" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Дизентерия</text>
    <text x="45" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Сальмонеллёз</text>
  </g>

  <g transform="translate(215,215)">
    <rect x="0" y="0" width="90" height="42" rx="4" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.8"/>
    <text x="45" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#C62828">Пищевые</text>
    <text x="45" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Ботулизм</text>
    <text x="45" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Столбняк</text>
    <text x="45" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Пищевые отравления</text>
  </g>

  <!-- Hygiene / Prevention -->
  <text x="390" y="225" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Профилактика</text>

  <g transform="translate(320,230)">
    <rect x="0" y="0" width="75" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="37" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">Мыть руки</text>

    <rect x="80" y="0" width="85" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="122" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">Термическая обработка</text>

    <rect x="0" y="19" width="75" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="37" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">Хранение пищи</text>

    <rect x="80" y="19" width="85" height="16" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="122" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">Вакцинация</text>
  </g>

  <!-- Bottom summary -->
  <rect x="15" y="275" width="230" height="60" rx="5" fill="#1B5E20" opacity="0.08" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="130" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Значение бактерий в природе</text>
  <text x="25" y="302" font-family="Arial,sans-serif" font-size="6" fill="#555">• Разрушают остатки организмов</text>
  <text x="25" y="312" font-family="Arial,sans-serif" font-size="6" fill="#555">• Участвуют в круговороте веществ</text>
  <text x="25" y="322" font-family="Arial,sans-serif" font-size="6" fill="#555">• Связывают азот из воздуха</text>
  <text x="25" y="332" font-family="Arial,sans-serif" font-size="6" fill="#555">• Формируют почву</text>

  <rect x="255" y="275" width="230" height="60" rx="5" fill="#C62828" opacity="0.06" stroke="#D32F2F" stroke-width="0.8"/>
  <text x="370" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828">Пищевые отравления</text>
  <text x="265" y="302" font-family="Arial,sans-serif" font-size="6" fill="#555">• Источник: заражённая пища</text>
  <text x="265" y="312" font-family="Arial,sans-serif" font-size="6" fill="#555">• Симптомы: тошнота, рвота</text>
  <text x="265" y="322" font-family="Arial,sans-serif" font-size="6" fill="#555">• Лечение: обратиться к врачу</text>
  <text x="265" y="332" font-family="Arial,sans-serif" font-size="6" fill="#555">• Профилактика: гигиена!</text>
</svg>