<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5D4037"/><stop offset="50%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Голосеменные растения</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 20</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Pine tree with cones -->
<text x="120" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сосна обыкновенная</text>

<g transform="translate(20,72)">
<!-- Trunk -->
<rect x="88" y="90" width="20" height="80" fill="url(#trunk)" rx="3"/>
<!-- Crown layers -->
<ellipse cx="98" cy="90" rx="60" ry="25" fill="#2E7D32"/>
<ellipse cx="98" cy="70" rx="48" ry="20" fill="#388E3C"/>
<ellipse cx="98" cy="52" rx="35" ry="18" fill="#43A047"/>
<ellipse cx="98" cy="35" rx="22" ry="15" fill="#4CAF50"/>
<!-- Needles texture -->
<line x1="55" y1="85" x2="48" y2="80" stroke="#1B5E20" stroke-width="0.5"/>
<line x1="140" y1="85" x2="148" y2="80" stroke="#1B5E20" stroke-width="0.5"/>
<line x1="60" y1="75" x2="52" y2="70" stroke="#1B5E20" stroke-width="0.5"/>
<line x1="135" y1="75" x2="143" y2="70" stroke="#1B5E20" stroke-width="0.5"/>

<!-- Female cone (шишка) on branch -->
<line x1="108" y1="78" x2="140" y2="65" stroke="#5D4037" stroke-width="1.5"/>
<ellipse cx="148" cy="60" rx="8" ry="14" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
<path d="M140,52 Q144,55 148,52 Q152,55 156,52" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<path d="M140,58 Q144,61 148,58 Q152,61 156,58" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<path d="M140,64 Q144,67 148,64 Q152,67 156,64" fill="none" stroke="#5D4037" stroke-width="0.8"/>
<text x="168" y="56" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">женская</text>
<text x="168" y="63" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">шишка</text>
<line x1="156" y1="60" x2="166" y2="59" stroke="#5D4037" stroke-width="0.3"/>

<!-- Male cone on branch -->
<line x1="88" y1="82" x2="55" y2="72" stroke="#5D4037" stroke-width="1.5"/>
<ellipse cx="48" cy="69" rx="5" ry="8" fill="#FFC107" stroke="#F57F17" stroke-width="0.8"/>
<text x="28" y="64" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">мужская</text>
<text x="28" y="71" font-family="Arial,sans-serif" font-size="6" fill="#F57F17">шишка</text>
<line x1="43" y1="69" x2="38" y2="67" stroke="#F57F17" stroke-width="0.3"/>

<!-- Roots -->
<path d="M90,170 Q80,178 65,182" fill="none" stroke="#5D4037" stroke-width="2.5"/>
<path d="M98,170 Q95,180 88,185" fill="none" stroke="#5D4037" stroke-width="2"/>
<path d="M105,170 Q110,180 118,185" fill="none" stroke="#5D4037" stroke-width="2"/>
<path d="M108,170 Q118,178 132,182" fill="none" stroke="#5D4037" stroke-width="2.5"/>

<!-- Needle detail -->
<line x1="55" y1="120" x2="55" y2="180" stroke="#2E7D32" stroke-width="0.5" stroke-dasharray="2,2"/>
</g>

<!-- Section 2: Needle detail (хвоинка) -->
<g transform="translate(20,225)">
<rect x="0" y="0" width="170" height="100" rx="5" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<text x="85" y="13" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Хвоинка сосны (увеличено)</text>

<!-- Needle shape -->
<path d="M30,60 Q85,25 140,60 Q85,95 30,60Z" fill="#81C784" stroke="#2E7D32" stroke-width="1.2"/>

<!-- Cross-section inset -->
<circle cx="85" cy="60" r="20" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="85" cy="60" r="15" fill="#4CAF50" opacity="0.3"/>
<circle cx="85" cy="60" r="10" fill="#388E3C" opacity="0.3"/>
<circle cx="85" cy="55" r="3" fill="#2E7D32"/>
<text x="110" y="50" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">смола</text>
<text x="110" y="57" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">канал</text>
<text x="110" y="67" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">фотосин-</text>
<text x="110" y="74" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">тез. ткань</text>
<text x="110" y="84" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">кожица</text>

<!-- Labels -->
<text x="85" y="98" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">2 хвоинки в пучке, живут 2-3 года</text>
</g>

<!-- Section 3: Conifer comparison -->
<text x="350" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сравнение хвойных</text>

<g transform="translate(210,72)">
<rect x="0" y="0" width="270" height="245" rx="5" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Header -->
<rect x="0" y="0" width="270" height="14" rx="5" fill="#2E7D32" opacity="0.15"/>
<text x="40" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Признак</text>
<text x="108" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сосна</text>
<text x="178" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Ель</text>
<text x="243" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#33691E" text-anchor="middle">Лиственница</text>

<line x1="0" y1="14" x2="270" y2="14" stroke="#C8E6C9" stroke-width="0.5"/>
<line x1="74" y1="0" x2="74" y2="245" stroke="#C8E6C9" stroke-width="0.3"/>
<line x1="143" y1="0" x2="143" y2="245" stroke="#C8E6C9" stroke-width="0.3"/>
<line x1="210" y1="0" x2="210" y2="245" stroke="#C8E6C9" stroke-width="0.3"/>

<!-- Row: Хвоинки -->
<text x="40" y="26" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Хвоинки</text>
<text x="108" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">по 2 в пучке</text>
<text x="178" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">по 1, 4-гран.</text>
<text x="243" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#33691E" text-anchor="middle">мягкие, опадают</text>
<line x1="0" y1="30" x2="270" y2="30" stroke="#E8F5E9" stroke-width="0.3"/>

<!-- Row: Крона -->
<text x="40" y="42" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Крона</text>
<text x="108" y="42" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">раскидистая</text>
<text x="178" y="42" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">конусовидная</text>
<text x="243" y="42" font-family="Arial,sans-serif" font-size="5.5" fill="#33691E" text-anchor="middle">конусовидная</text>
<line x1="0" y1="46" x2="270" y2="46" stroke="#E8F5E9" stroke-width="0.3"/>

<!-- Row: Шишки -->
<text x="40" y="58" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Шишки</text>
<text x="108" y="58" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">поникшие</text>
<text x="178" y="58" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">висячие, дл.</text>
<text x="243" y="58" font-family="Arial,sans-serif" font-size="5.5" fill="#33691E" text-anchor="middle">мелкие, прям.</text>
<line x1="0" y1="62" x2="270" y2="62" stroke="#E8F5E9" stroke-width="0.3"/>

<!-- Row: Корневая система -->
<text x="40" y="74" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Корни</text>
<text x="108" y="74" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">стержневая</text>
<text x="178" y="74" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">поверхностная</text>
<text x="243" y="74" font-family="Arial,sans-serif" font-size="5.5" fill="#33691E" text-anchor="middle">стержневая</text>
<line x1="0" y1="78" x2="270" y2="78" stroke="#E8F5E9" stroke-width="0.3"/>

<!-- Row: Требование к свету -->
<text x="40" y="90" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Свет</text>
<text x="108" y="90" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">светолюбива</text>
<text x="178" y="90" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">теневынослива</text>
<text x="243" y="90" font-family="Arial,sans-serif" font-size="5.5" fill="#33691E" text-anchor="middle">светолюбива</text>
<line x1="0" y1="94" x2="270" y2="94" stroke="#E8F5E9" stroke-width="0.3"/>

<!-- Row: Высота -->
<text x="40" y="106" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Высота</text>
<text x="108" y="106" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">до 40 м</text>
<text x="178" y="106" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">до 50 м</text>
<text x="243" y="106" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">до 50 м</text>
<line x1="0" y1="110" x2="270" y2="110" stroke="#E8F5E9" stroke-width="0.3"/>

<!-- Row: Листопадность -->
<text x="40" y="122" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Листопад</text>
<text x="108" y="122" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">вечнозелёная</text>
<text x="178" y="122" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">вечнозелёная</text>
<text x="243" y="122" font-family="Arial,sans-serif" font-size="5.5" fill="#FF9800" text-anchor="middle">листопадная!</text>
</g>

<!-- Small tree icons for each conifer -->
<!-- Pine icon -->
<g transform="translate(235,140)">
<rect x="8" y="40" width="4" height="20" fill="#5D4037"/>
<ellipse cx="10" cy="35" rx="12" ry="14" fill="#2E7D32"/>
<ellipse cx="10" cy="25" rx="8" ry="10" fill="#388E3C"/>
</g>

<!-- Spruce icon -->
<g transform="translate(305,140)">
<rect x="8" y="40" width="4" height="20" fill="#5D4037"/>
<path d="M10,10 L-5,45 L25,45Z" fill="#1B5E20"/>
<path d="M10,20 L0,40 L20,40Z" fill="#2E7D32"/>
</g>

<!-- Larch icon -->
<g transform="translate(375,140)">
<rect x="8" y="40" width="4" height="20" fill="#5D4037"/>
<path d="M10,10 L-5,45 L25,45Z" fill="#FFC107" opacity="0.7" stroke="#F57F17" stroke-width="0.5"/>
<path d="M10,20 L0,40 L20,40Z" fill="#FFD54F" opacity="0.7" stroke="#F57F17" stroke-width="0.5"/>
<text x="10" y="70" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">осень</text>
</g>

<!-- Key features of gymnosperms -->
<g transform="translate(210,210)">
<rect x="0" y="0" width="270" height="35" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="135" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Общие признаки голосеменных</text>
<text x="135" y="23" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">семена открыты (не в плоде) • нет цветков • ветроопыление</text>
<text x="135" y="32" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">хвоинки • древесный ствол • смоляные ходы • камбий</text>
</g>

<!-- Seed detail -->
<g transform="translate(210,250)">
<rect x="0" y="0" width="270" height="75" rx="4" fill="white" fill-opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>
<text x="135" y="13" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Семя сосны (с крылаткой)</text>

<!-- Seed with wing -->
<ellipse cx="60" cy="45" rx="10" ry="15" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
<path d="M50,38 Q35,30 20,25 Q15,22 10,25" fill="#A1887F" stroke="#8D6E63" stroke-width="0.5" opacity="0.7"/>
<text x="60" y="66" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">семя</text>

<text x="130" y="30" font-family="Arial,sans-serif" font-size="6" fill="#333">• Семя — зачаток нового растения</text>
<text x="130" y="40" font-family="Arial,sans-serif" font-size="6" fill="#333">• Крылатка — для переноса ветром</text>
<text x="130" y="50" font-family="Arial,sans-serif" font-size="6" fill="#333">• Эндосперм — запас питательных</text>
<text x="130" y="60" font-family="Arial,sans-serif" font-size="6" fill="#333">  веществ для зародыша</text>
<text x="130" y="70" font-family="Arial,sans-serif" font-size="6" fill="#333">• Семена не защищены плодом</text>
</g>
</svg>