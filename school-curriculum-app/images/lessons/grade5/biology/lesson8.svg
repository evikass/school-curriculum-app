<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Деление клетки</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 8</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Division sequence: Interphase -> Prophase -> Metaphase -> Anaphase -> Telophase -> 2 cells -->

  <!-- 1. Interphase -->
  <g transform="translate(20,55)">
    <text x="35" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Интерфаза</text>
    <ellipse cx="35" cy="40" rx="28" ry="22" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
    <ellipse cx="35" cy="38" rx="10" ry="8" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
    <!-- Chromatin (diffuse) -->
    <path d="M20,30 Q25,28 30,32 Q35,36 40,30 Q45,26 50,32" stroke="#7B1FA2" stroke-width="0.8" fill="none" opacity="0.6"/>
    <text x="35" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Рост клетки,</text>
    <text x="35" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">удвоение ДНК</text>
  </g>

  <!-- Arrow 1->2 -->
  <path d="M78,95 L100,95" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#arrG)"/>
  <defs><marker id="arrG" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#2E7D32"/></marker></defs>

  <!-- 2. Prophase -->
  <g transform="translate(105,55)">
    <text x="35" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Профаза</text>
    <ellipse cx="35" cy="40" rx="28" ry="22" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- Chromosomes visible -->
    <line x1="22" y1="28" x2="30" y2="38" stroke="#7B1FA2" stroke-width="2"/>
    <line x1="40" y1="28" x2="48" y2="38" stroke="#7B1FA2" stroke-width="2"/>
    <line x1="25" y1="42" x2="35" y2="52" stroke="#7B1FA2" stroke-width="2"/>
    <line x1="38" y1="42" x2="48" y2="52" stroke="#7B1FA2" stroke-width="2"/>
    <!-- Nuclear membrane dissolving -->
    <ellipse cx="35" cy="38" rx="12" ry="9" fill="none" stroke="#E65100" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="35" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Хромосомы</text>
    <text x="35" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">видны</text>
  </g>

  <!-- Arrow 2->3 -->
  <path d="M163,95 L185,95" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#arrG)"/>

  <!-- 3. Metaphase -->
  <g transform="translate(190,55)">
    <text x="35" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Метафаза</text>
    <ellipse cx="35" cy="40" rx="28" ry="22" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- Equatorial plate -->
    <line x1="35" y1="25" x2="35" y2="55" stroke="#FF9800" stroke-width="0.8" stroke-dasharray="2,1"/>
    <!-- Chromosomes lined up -->
    <line x1="30" y1="32" x2="30" y2="44" stroke="#7B1FA2" stroke-width="2"/>
    <line x1="35" y1="30" x2="35" y2="46" stroke="#7B1FA2" stroke-width="2"/>
    <line x1="40" y1="32" x2="40" y2="44" stroke="#7B1FA2" stroke-width="2"/>
    <!-- Spindle fibers -->
    <line x1="10" y1="25" x2="30" y2="38" stroke="#42A5F5" stroke-width="0.5"/>
    <line x1="10" y1="55" x2="30" y2="42" stroke="#42A5F5" stroke-width="0.5"/>
    <line x1="60" y1="25" x2="40" y2="38" stroke="#42A5F5" stroke-width="0.5"/>
    <line x1="60" y1="55" x2="40" y2="42" stroke="#42A5F5" stroke-width="0.5"/>
    <text x="35" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Хромосомы</text>
    <text x="35" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">в центре</text>
  </g>

  <!-- Arrow 3->4 -->
  <path d="M248,95 L270,95" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#arrG)"/>

  <!-- 4. Anaphase -->
  <g transform="translate(275,55)">
    <text x="35" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Анафаза</text>
    <ellipse cx="35" cy="40" rx="28" ry="22" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- Chromosomes separating to poles -->
    <line x1="18" y1="28" x2="18" y2="36" stroke="#7B1FA2" stroke-width="1.5"/>
    <line x1="22" y1="30" x2="22" y2="40" stroke="#7B1FA2" stroke-width="1.5"/>
    <line x1="48" y1="28" x2="48" y2="36" stroke="#7B1FA2" stroke-width="1.5"/>
    <line x1="52" y1="30" x2="52" y2="40" stroke="#7B1FA2" stroke-width="1.5"/>
    <!-- Spindle fibers pulling -->
    <line x1="18" y1="38" x2="35" y2="40" stroke="#42A5F5" stroke-width="0.5"/>
    <line x1="52" y1="38" x2="35" y2="40" stroke="#42A5F5" stroke-width="0.5"/>
    <text x="35" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Хромосомы</text>
    <text x="35" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">расходятся</text>
  </g>

  <!-- Arrow 4->5 -->
  <path d="M333,95 L355,95" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#arrG)"/>

  <!-- 5. Telophase -->
  <g transform="translate(360,55)">
    <text x="35" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Телофаза</text>
    <ellipse cx="35" cy="40" rx="30" ry="24" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
    <!-- Pinching in middle -->
    <path d="M35,16 Q30,40 35,64" stroke="#2E7D32" stroke-width="1" fill="none"/>
    <!-- Two nuclei forming -->
    <ellipse cx="22" cy="38" rx="8" ry="7" fill="#FFCC80" stroke="#E65100" stroke-width="0.6"/>
    <ellipse cx="48" cy="38" rx="8" ry="7" fill="#FFCC80" stroke="#E65100" stroke-width="0.6"/>
    <text x="35" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Два ядра</text>
    <text x="35" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">формируются</text>
  </g>

  <!-- Arrow 5->6 -->
  <path d="M425,95 L440,95" stroke="#2E7D32" stroke-width="1.5" fill="none" marker-end="url(#arrG)"/>

  <!-- 6. Two daughter cells -->
  <g transform="translate(445,60)">
    <ellipse cx="0" cy="35" rx="20" ry="18" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
    <ellipse cx="0" cy="33" rx="7" ry="5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>

    <ellipse cx="0" cy="72" rx="20" ry="18" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
    <ellipse cx="0" cy="70" rx="7" ry="5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>

    <text x="0" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" font-weight="bold">2 дочерние</text>
    <text x="0" y="106" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" font-weight="bold">клетки</text>
  </g>

  <!-- Chromosome detail -->
  <text x="250" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Строение хромосомы</text>
  <line x1="30" y1="172" x2="470" y2="172" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <g transform="translate(40,180)">
    <!-- Chromosome X-shape -->
    <path d="M25,5 Q20,25 15,50" stroke="#7B1FA2" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M25,5 Q30,25 35,50" stroke="#7B1FA2" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Centromere -->
    <ellipse cx="25" cy="25" rx="5" ry="3" fill="#E91E63"/>
    <text x="25" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="white">Ц</text>

    <!-- Labels -->
    <line x1="15" y1="15" x2="0" y2="10" stroke="#555" stroke-width="0.5"/>
    <text x="-5" y="10" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Хроматида</text>
    <line x1="20" y1="25" x2="5" y2="30" stroke="#555" stroke-width="0.5"/>
    <text x="-10" y="33" font-family="Arial,sans-serif" font-size="5.5" fill="#E91E63">Центромера</text>
    <line x1="18" y1="40" x2="5" y2="48" stroke="#555" stroke-width="0.5"/>
    <text x="-5" y="50" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Плечо</text>
  </g>

  <!-- DNA doubling diagram -->
  <g transform="translate(130,182)">
    <text x="80" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Удвоение ДНК (репликация)</text>

    <!-- Before -->
    <g transform="translate(0,8)">
      <text x="20" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">До:</text>
      <!-- Double helix simplified -->
      <path d="M5,5 Q15,0 25,5 Q35,10 45,5 Q55,0 65,5" stroke="#1565C0" stroke-width="1.5" fill="none"/>
      <path d="M5,10 Q15,15 25,10 Q35,5 45,10 Q55,15 65,10" stroke="#D32F2F" stroke-width="1.5" fill="none"/>
      <!-- Rungs -->
      <line x1="15" y1="3" x2="15" y2="12" stroke="#888" stroke-width="0.5"/>
      <line x1="25" y1="5" x2="25" y2="10" stroke="#888" stroke-width="0.5"/>
      <line x1="35" y1="8" x2="35" y2="7" stroke="#888" stroke-width="0.5"/>
      <line x1="45" y1="5" x2="45" y2="10" stroke="#888" stroke-width="0.5"/>
      <line x1="55" y1="3" x2="55" y2="12" stroke="#888" stroke-width="0.5"/>
    </g>

    <!-- Arrow -->
    <path d="M75,18 L95,18" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrG)"/>

    <!-- After -->
    <g transform="translate(100,5)">
      <text x="25" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">После:</text>
      <!-- Two copies -->
      <path d="M5,5 Q12,2 20,5 Q28,8 35,5" stroke="#1565C0" stroke-width="1.2" fill="none"/>
      <path d="M5,9 Q12,12 20,9 Q28,6 35,9" stroke="#D32F2F" stroke-width="1.2" fill="none"/>

      <path d="M5,22 Q12,19 20,22 Q28,25 35,22" stroke="#1565C0" stroke-width="1.2" fill="none" stroke-dasharray="2,1"/>
      <path d="M5,26 Q12,29 20,26 Q28,23 35,26" stroke="#D32F2F" stroke-width="1.2" fill="none" stroke-dasharray="2,1"/>
    </g>
  </g>

  <!-- Key facts section -->
  <g transform="translate(280,182)">
    <rect x="0" y="0" width="200" height="80" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
    <text x="100" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Ключевые факты</text>
    <text x="10" y="26" font-family="Arial,sans-serif" font-size="6" fill="#555">• Митоз — способ деления клетки</text>
    <text x="10" y="36" font-family="Arial,sans-serif" font-size="6" fill="#555">• Дочерние клетки = материнской</text>
    <text x="10" y="46" font-family="Arial,sans-serif" font-size="6" fill="#555">• Набор хромосом сохраняется</text>
    <text x="10" y="56" font-family="Arial,sans-serif" font-size="6" fill="#555">• У человека 46 хромосом</text>
    <text x="10" y="66" font-family="Arial,sans-serif" font-size="6" fill="#555">• Обеспечивает рост организма</text>
    <text x="10" y="76" font-family="Arial,sans-serif" font-size="6" fill="#555">• Заменяет старые клетки</text>
  </g>

  <!-- Mitosis phases summary -->
  <text x="250" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Фазы митоза</text>

  <g transform="translate(20,298)">
    <rect x="0" y="0" width="88" height="22" rx="3" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
    <text x="44" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#0D47A1">Профаза</text>
    <text x="44" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">спирализация</text>

    <rect x="96" y="0" width="88" height="22" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
    <text x="140" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#E65100">Метафаза</text>
    <text x="140" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">на экваторе</text>

    <rect x="192" y="0" width="88" height="22" rx="3" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.8"/>
    <text x="236" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#880E4F">Анафаза</text>
    <text x="236" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">расхождение</text>

    <rect x="288" y="0" width="88" height="22" rx="3" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
    <text x="332" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#6A1B9A">Телофаза</text>
    <text x="332" y="18" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">деление цитоплазмы</text>

    <!-- Connecting arrows -->
    <path d="M88,11 L96,11" stroke="#555" stroke-width="0.8"/>
    <path d="M184,11 L192,11" stroke="#555" stroke-width="0.8"/>
    <path d="M280,11 L288,11" stroke="#555" stroke-width="0.8"/>
  </g>

  <!-- Bottom note -->
  <rect x="20" y="330" width="460" height="14" rx="3" fill="#1B5E20" opacity="0.1"/>
  <text x="250" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Митоз обеспечивает точное распределение генетического материала между дочерними клетками</text>
</svg>