<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Увеличительные приборы</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 5</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Light Microscope - main diagram -->
  <text x="130" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Световой микроскоп</text>

  <g transform="translate(40,65)">
    <!-- Base -->
    <rect x="40" y="210" width="100" height="12" rx="4" fill="#546E7A"/>
    <text x="90" y="237" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#37474F">Окуляр</text>

    <!-- Pillar/Arm -->
    <path d="M70,30 L70,210 L110,210 L110,30 Z" fill="#78909C" rx="2"/>
    <rect x="70" y="30" width="40" height="180" fill="#78909C" rx="2"/>

    <!-- Eyepiece -->
    <rect x="78" y="10" width="24" height="25" rx="4" fill="#607D8B"/>
    <rect x="82" y="5" width="16" height="10" rx="3" fill="#455A64"/>
    <circle cx="90" cy="8" r="4" fill="#37474F"/>

    <!-- Tube -->
    <rect x="82" y="35" width="16" height="40" fill="#90A4AE"/>

    <!-- Revolving nosepiece -->
    <path d="M75,78 L105,78 L100,85 L80,85 Z" fill="#607D8B"/>

    <!-- Objectives -->
    <rect x="78" y="85" width="8" height="20" fill="#455A64" rx="1"/>
    <rect x="88" y="88" width="8" height="17" fill="#546E7A" rx="1"/>
    <rect x="98" y="85" width="8" height="20" fill="#455A64" rx="1"/>

    <!-- Stage -->
    <rect x="50" y="108" width="80" height="8" rx="2" fill="#90A4AE"/>
    <!-- Stage clips -->
    <rect x="52" y="106" width="6" height="4" fill="#B0BEC5"/>
    <rect x="122" y="106" width="6" height="4" fill="#B0BEC5"/>
    <!-- Slide on stage -->
    <rect x="65" y="108" width="50" height="4" fill="#B3E5FC" opacity="0.6" rx="1"/>

    <!-- Diaphragm -->
    <rect x="75" y="118" width="30" height="5" fill="#78909C"/>

    <!-- Condenser -->
    <rect x="80" y="124" width="20" height="12" fill="#90A4AE" rx="2"/>

    <!-- Mirror/Light -->
    <ellipse cx="90" cy="148" rx="15" ry="10" fill="#FFEE58" opacity="0.5" stroke="#F9A825" stroke-width="0.8"/>
    <text x="90" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Зеркало</text>

    <!-- Coarse focus knob -->
    <circle cx="65" cy="150" r="8" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
    <text x="45" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Винт</text>
    <text x="45" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">грубый</text>

    <!-- Fine focus knob -->
    <circle cx="115" cy="150" r="6" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
    <text x="135" y="153" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Винт</text>
    <text x="135" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">тонкий</text>

    <!-- Label lines -->
    <line x1="102" y1="15" x2="140" y2="8" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="142" y="10" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Окуляр</text>

    <line x1="98" y1="55" x2="140" y2="48" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="142" y="50" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Тубус</text>

    <line x1="106" y1="78" x2="140" y2="72" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="142" y="74" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Револьвер</text>

    <line x1="106" y1="95" x2="140" y2="92" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="142" y="94" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Объективы</text>

    <line x1="130" y1="112" x2="155" y2="108" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="157" y="110" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Предметный</text>
    <text x="157" y="118" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">столик</text>

    <line x1="100" y1="130" x2="155" y2="128" stroke="#1B5E20" stroke-width="0.5"/>
    <text x="157" y="130" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Конденсор</text>
  </g>

  <!-- Magnifying glass / Loupe -->
  <text x="370" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Ручная лупа</text>
  <g transform="translate(310,65)">
    <circle cx="55" cy="45" r="30" fill="none" stroke="#78909C" stroke-width="4"/>
    <circle cx="55" cy="45" r="26" fill="#E3F2FD" opacity="0.3"/>
    <line x1="77" y1="67" x2="100" y2="90" stroke="#78909C" stroke-width="5" stroke-linecap="round"/>

    <!-- Object under lens -->
    <circle cx="50" cy="40" r="5" fill="#81C784" opacity="0.5"/>
    <circle cx="60" cy="48" r="3" fill="#81C784" opacity="0.5"/>

    <text x="55" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#555">Увеличение:</text>
    <text x="55" y="108" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">×5 – ×20</text>
  </g>

  <!-- Comparison table -->
  <text x="250" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Сравнение приборов</text>
  <line x1="30" y1="219" x2="470" y2="219" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <!-- Table header -->
  <rect x="30" y="224" width="440" height="16" rx="2" fill="#2E7D32" opacity="0.2"/>
  <text x="80" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Прибор</text>
  <text x="200" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Увеличение</text>
  <text x="330" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Что видно</text>
  <text x="430" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Изобретение</text>

  <!-- Row 1 -->
  <line x1="30" y1="242" x2="470" y2="242" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
  <text x="80" y="253" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Ручная лупа</text>
  <text x="200" y="253" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">×5 – ×20</text>
  <text x="330" y="253" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Крупные клетки</text>
  <text x="430" y="253" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Древность</text>

  <!-- Row 2 -->
  <line x1="30" y1="259" x2="470" y2="259" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
  <text x="80" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Световой микроскоп</text>
  <text x="200" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">×100 – ×2000</text>
  <text x="330" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Клетки, бактерии</text>
  <text x="430" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">XVII в.</text>

  <!-- Row 3 -->
  <line x1="30" y1="276" x2="470" y2="276" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
  <text x="80" y="287" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Электронный микроскоп</text>
  <text x="200" y="287" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">×200000</text>
  <text x="330" y="287" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">Вирусы, молекулы</text>
  <text x="430" y="287" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#555">XX в.</text>

  <!-- Column lines -->
  <line x1="140" y1="224" x2="140" y2="292" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
  <line x1="260" y1="224" x2="260" y2="292" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
  <line x1="390" y1="224" x2="390" y2="292" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>
  <line x1="30" y1="292" x2="470" y2="292" stroke="#2E7D32" stroke-width="0.3" opacity="0.3"/>

  <!-- Work rules -->
  <text x="250" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Правила работы с микроскопом</text>

  <rect x="20" y="312" width="155" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6"/>
  <text x="97" y="322" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">1. Переносить за штатив</text>
  <text x="97" y="332" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">и основание двумя руками</text>

  <rect x="183" y="312" width="155" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6"/>
  <text x="260" y="322" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">2. Смотреть в окуляр одним</text>
  <text x="260" y="332" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">глазом, не закрывая другой</text>

  <rect x="346" y="312" width="140" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.6"/>
  <text x="416" y="322" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">3. Опускать объектив</text>
  <text x="416" y="332" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">медленно, глядя сбоку</text>
</svg>