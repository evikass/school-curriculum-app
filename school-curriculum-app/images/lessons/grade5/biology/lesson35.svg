<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" rx="10"/>
  <rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="250" y="24" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Зоология — наука о животных</text>
  <text x="250" y="37" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 5 класс — Урок 35</text>
  <line x1="30" y1="43" x2="470" y2="43" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

  <!-- Kingdom of Animals tree -->
  <text x="250" y="58" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Классификация царства Животные</text>

  <!-- Root node -->
  <rect x="195" y="62" width="110" height="20" rx="8" fill="#2E7D32" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="250" y="76" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Царство Животные</text>

  <!-- Lines to two main branches -->
  <line x1="215" y1="82" x2="120" y2="95" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="285" y1="82" x2="380" y2="95" stroke="#2E7D32" stroke-width="1.5"/>

  <!-- Беспозвоночные -->
  <rect x="55" y="92" width="130" height="20" rx="6" fill="#FF7043" stroke="#E64A19" stroke-width="1"/>
  <text x="120" y="106" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Беспозвоночные (~97%)</text>

  <!-- Позвоночные -->
  <rect x="315" y="92" width="130" height="20" rx="6" fill="#1565C0" stroke="#0D47A1" stroke-width="1"/>
  <text x="380" y="106" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Позвоночные (~3%)</text>

  <!-- Invertebrate branches -->
  <line x1="80" y1="112" x2="45" y2="125" stroke="#FF7043" stroke-width="1"/>
  <line x1="100" y1="112" x2="100" y2="125" stroke="#FF7043" stroke-width="1"/>
  <line x1="120" y1="112" x2="155" y2="125" stroke="#FF7043" stroke-width="1"/>

  <!-- Sponges -->
  <rect x="15" y="124" width="55" height="16" rx="4" fill="#FFAB91" stroke="#FF7043" stroke-width="0.5"/>
  <text x="42" y="135" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Губки</text>

  <!-- Coelenterates -->
  <rect x="75" y="124" width="55" height="16" rx="4" fill="#FFAB91" stroke="#FF7043" stroke-width="0.5"/>
  <text x="102" y="135" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Кишечнополостные</text>

  <!-- Worms -->
  <rect x="135" y="124" width="40" height="16" rx="4" fill="#FFAB91" stroke="#FF7043" stroke-width="0.5"/>
  <text x="155" y="135" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Черви</text>

  <!-- Second row of invertebrates -->
  <line x1="55" y1="140" x2="30" y2="153" stroke="#FF7043" stroke-width="0.8"/>
  <line x1="80" y1="140" x2="80" y2="153" stroke="#FF7043" stroke-width="0.8"/>
  <line x1="110" y1="140" x2="130" y2="153" stroke="#FF7043" stroke-width="0.8"/>
  <line x1="140" y1="140" x2="180" y2="153" stroke="#FF7043" stroke-width="0.8"/>

  <rect x="10" y="152" width="42" height="16" rx="4" fill="#FFAB91" stroke="#FF7043" stroke-width="0.5"/>
  <text x="31" y="163" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Моллюски</text>

  <rect x="58" y="152" width="42" height="16" rx="4" fill="#FFAB91" stroke="#FF7043" stroke-width="0.5"/>
  <text x="79" y="163" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Членистоногие</text>

  <rect x="106" y="152" width="55" height="16" rx="4" fill="#FFAB91" stroke="#FF7043" stroke-width="0.5"/>
  <text x="133" y="163" font-family="Arial,sans-serif" font-size="5.5" fill="white" text-anchor="middle">Иглокожие</text>

  <!-- Vertebrate branches -->
  <line x1="340" y1="112" x2="310" y2="125" stroke="#1565C0" stroke-width="1"/>
  <line x1="360" y1="112" x2="360" y2="125" stroke="#1565C0" stroke-width="1"/>
  <line x1="380" y1="112" x2="405" y2="125" stroke="#1565C0" stroke-width="1"/>
  <line x1="400" y1="112" x2="450" y2="125" stroke="#1565C0" stroke-width="1"/>
  <line x1="420" y1="112" x2="480" y2="125" stroke="#1565C0" stroke-width="1"/>

  <rect x="282" y="124" width="55" height="16" rx="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <text x="309" y="135" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" text-anchor="middle">Рыбы</text>

  <rect x="342" y="124" width="55" height="16" rx="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <text x="369" y="135" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" text-anchor="middle">Земноводные</text>

  <rect x="382" y="152" width="55" height="16" rx="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <text x="409" y="163" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" text-anchor="middle">Пресмыкающиеся</text>

  <rect x="432" y="124" width="55" height="16" rx="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <text x="459" y="135" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" text-anchor="middle">Птицы</text>

  <rect x="455" y="152" width="40" height="16" rx="4" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <text x="475" y="163" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" text-anchor="middle">Млекопитающие</text>

  <!-- Zoology branches -->
  <text x="250" y="192" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Разделы зоологии</text>

  <rect x="30" y="200" width="90" height="22" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="75" y="210" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Протозоология</text>
  <text x="75" y="218" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">одноклеточные</text>

  <rect x="128" y="200" width="90" height="22" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
  <text x="173" y="210" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">Гельминтология</text>
  <text x="173" y="218" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">черви-паразиты</text>

  <rect x="226" y="200" width="90" height="22" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
  <text x="271" y="210" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle" font-weight="bold">Энтомология</text>
  <text x="271" y="218" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">насекомые</text>

  <rect x="324" y="200" width="80" height="22" rx="5" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="364" y="210" font-family="Arial,sans-serif" font-size="6" fill="#4A148C" text-anchor="middle" font-weight="bold">Ихтиология</text>
  <text x="364" y="218" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">рыбы</text>

  <rect x="410" y="200" width="80" height="22" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
  <text x="450" y="210" font-family="Arial,sans-serif" font-size="6" fill="#B71C1C" text-anchor="middle" font-weight="bold">Орнитология</text>
  <text x="450" y="218" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">птицы</text>

  <rect x="30" y="228" width="90" height="22" rx="5" fill="#FFEBEE" stroke="#C62828" stroke-width="0.8"/>
  <text x="75" y="238" font-family="Arial,sans-serif" font-size="6" fill="#B71C1C" text-anchor="middle" font-weight="bold">Териология</text>
  <text x="75" y="246" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">млекопитающие</text>

  <rect x="128" y="228" width="90" height="22" rx="5" fill="#E0F7FA" stroke="#00838F" stroke-width="0.8"/>
  <text x="173" y="238" font-family="Arial,sans-serif" font-size="6" fill="#006064" text-anchor="middle" font-weight="bold">Батрахология</text>
  <text x="173" y="246" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">земноводные</text>

  <rect x="226" y="228" width="90" height="22" rx="5" fill="#EFEBE9" stroke="#5D4037" stroke-width="0.8"/>
  <text x="271" y="238" font-family="Arial,sans-serif" font-size="6" fill="#3E2723" text-anchor="middle" font-weight="bold">Герпетология</text>
  <text x="271" y="246" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">пресмыкающиеся</text>

  <rect x="324" y="228" width="80" height="22" rx="5" fill="#FBE9E7" stroke="#BF360C" stroke-width="0.8"/>
  <text x="364" y="238" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle" font-weight="bold">Акарология</text>
  <text x="364" y="246" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">клещи</text>

  <rect x="410" y="228" width="80" height="22" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="450" y="238" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Малакология</text>
  <text x="450" y="246" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">моллюски</text>

  <!-- Animal characteristics -->
  <text x="250" y="268" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Признаки животных</text>

  <rect x="30" y="275" width="440" height="60" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="0.8"/>

  <circle cx="50" cy="290" r="5" fill="#2E7D32"/>
  <text x="60" y="293" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Гетеротрофное питание (не синтезируют органику)</text>

  <circle cx="50" cy="305" r="5" fill="#2E7D32"/>
  <text x="60" y="308" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Активное перемещение (большинство)</text>

  <circle cx="50" cy="320" r="5" fill="#2E7D32"/>
  <text x="60" y="323" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Рост ограничен (определённый размер)</text>

  <circle cx="270" cy="290" r="5" fill="#E65100"/>
  <text x="280" y="293" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Клетки без клеточной стенки</text>

  <circle cx="270" cy="305" r="5" fill="#E65100"/>
  <text x="280" y="308" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Запасной углевод — гликоген</text>

  <circle cx="270" cy="320" r="5" fill="#E65100"/>
  <text x="280" y="323" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Нервная система (кроме губок)</text>
</svg>