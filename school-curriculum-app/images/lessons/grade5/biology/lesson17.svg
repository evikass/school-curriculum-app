<!-- Section 1: Plant Evolution Timeline -->
<text x="250" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Эволюция растений (хронологическая шкала)</text>

<!-- Timeline arrow -->
