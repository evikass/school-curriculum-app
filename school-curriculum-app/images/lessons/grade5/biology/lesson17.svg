<path d="M25,-12 L22,-16 L17,-20 L12,-24" fill="none" stroke="#388E3C" stroke-width="1"/>
<path d="M25,-12 L28,-16 L33,-20 L38,-24" fill="none" stroke="#388E3C" stroke-width="1"/>
