<text x="25" y="30" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">нет тканей</text>
<text x="25" y="37" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">водная среда</text>
</g>

<!-- Stage 2: Mosses (Мхи) -->
<g transform="translate(120,105)">
<rect x="15" y="-10" width="5" height="12" rx="1" fill="#4CAF50"/>
