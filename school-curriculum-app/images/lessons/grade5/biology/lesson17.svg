<text x="420" y="93" font-family="Arial,sans-serif" font-size="6" fill="#888">~130 млн</text>

<!-- Stage 1: Algae (Водоросли) -->
<g transform="translate(30,105)">
<circle cx="25" cy="0" r="6" fill="#1565C0" stroke="#0D47A1" stroke-width="1.5"/>
<circle cx="20" cy="-3" r="3" fill="#42A5F5"/>
