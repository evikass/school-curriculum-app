<text x="25" y="30" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">нет корней</text>
<text x="25" y="37" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">ризоиды</text>
</g>

<!-- Stage 3: Ferns (Папоротники) -->
<g transform="translate(225,105)">
<path d="M25,0 Q20,-10 10,-25 Q8,-30 5,-35" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round"/>
<path d="M25,0 Q22,-8 15,-18 Q12,-22 8,-28" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round"/>
