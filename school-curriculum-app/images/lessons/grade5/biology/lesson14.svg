<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Многообразие грибов</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 14</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Section 1: Cap mushrooms - Tubular vs Lamellar -->
  <text x="250" y="57" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Шляпочные грибы</text>

  <!-- Tubular mushrooms -->
  <g transform="translate(15,64)">
    <rect x="0" y="0" width="225" height="90" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
    <text x="112" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">Трубчатые грибы</text>

    <!-- Bolete mushroom (Белый гриб) -->
    <rect x="25" y="48" width="8" height="25" rx="2" fill="#D7CCC8" stroke="#A1887F" stroke-width="0.8"/>
    <path d="M10,48 Q30,28 50,48" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
    <text x="30" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Белый гриб</text>

    <!-- Tube detail (magnified) -->
    <rect x="65" y="25" width="30" height="35" rx="2" fill="none" stroke="#5D4037" stroke-width="0.8"/>
    <circle cx="72" cy="32" r="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.4"/>
    <circle cx="82" cy="32" r="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.4"/>
    <circle cx="92" cy="32" r="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.4"/>
    <circle cx="72" cy="40" r="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.4"/>
    <circle cx="82" cy="40" r="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.4"/>
    <circle cx="92" cy="40" r="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.4"/>
    <circle cx="72" cy="48" r="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.4"/>
    <circle cx="82" cy="48" r="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.4"/>
    <circle cx="92" cy="48" r="3" fill="#A1887F" stroke="#5D4037" stroke-width="0.4"/>
    <text x="80" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">Трубочки</text>

    <!-- Podberezovik -->
    <rect x="130" y="48" width="7" height="25" rx="2" fill="#BCAAA4" stroke="#795548" stroke-width="0.8"/>
    <path d="M118,48 Q135,30 152,48" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
    <text x="135" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Подберёзовик</text>

    <!-- Maslyata -->
    <rect x="180" y="48" width="6" height="22" rx="2" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
    <path d="M168,48 Q185,32 202,48" fill="#FFB74D" stroke="#E65100" stroke-width="1"/>
    <text x="185" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Маслёнок</text>
  </g>

  <!-- Lamellar mushrooms -->
  <g transform="translate(250,64)">
    <rect x="0" y="0" width="235" height="90" rx="5" fill="#E3F2FD" stroke="#2196F3" stroke-width="0.8"/>
    <text x="117" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1">Пластинчатые грибы</text>

    <!-- Russula -->
    <rect x="25" y="48" width="7" height="25" rx="2" fill="#E0E0E0" stroke="#9E9E9E" stroke-width="0.8"/>
    <path d="M10,48 Q28,28 48,48" fill="#EF5350" stroke="#C62828" stroke-width="1"/>
    <text x="30" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Сыроежка</text>

    <!-- Plate detail (magnified) -->
    <rect x="65" y="25" width="30" height="35" rx="2" fill="none" stroke="#1565C0" stroke-width="0.8"/>
    <line x1="68" y1="28" x2="68" y2="58" stroke="#90CAF9" stroke-width="1"/>
    <line x1="73" y1="28" x2="73" y2="58" stroke="#90CAF9" stroke-width="1"/>
    <line x1="78" y1="28" x2="78" y2="58" stroke="#90CAF9" stroke-width="1"/>
    <line x1="83" y1="28" x2="83" y2="58" stroke="#90CAF9" stroke-width="1"/>
    <line x1="88" y1="28" x2="88" y2="58" stroke="#90CAF9" stroke-width="1"/>
    <line x1="93" y1="28" x2="93" y2="58" stroke="#90CAF9" stroke-width="1"/>
    <text x="80" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1">Пластинки</text>

    <!-- Ryzhik -->
    <rect x="130" y="48" width="7" height="22" rx="2" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
    <path d="M118,48 Q135,30 152,48" fill="#FF9800" stroke="#E65100" stroke-width="1"/>
    <text x="135" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Рыжик</text>

    <!-- Opyata -->
    <rect x="175" y="50" width="5" height="18" rx="1" fill="#FFE082" stroke="#F9A825" stroke-width="0.6"/>
    <path d="M165,50 Q178,38 192,50" fill="#FFB74D" stroke="#E65100" stroke-width="0.8"/>
    <rect x="192" y="52" width="4" height="15" rx="1" fill="#FFE082" stroke="#F9A825" stroke-width="0.6"/>
    <path d="M184,52 Q196,42 208,52" fill="#FFB74D" stroke="#E65100" stroke-width="0.8"/>
    <text x="190" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Опята</text>
  </g>

  <!-- Edible vs Poisonous -->
  <text x="140" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Съедобные</text>
  <g transform="translate(15,175)">
    <rect x="0" y="0" width="115" height="30" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="57" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">Белый, Подберёзовик</text>
    <text x="57" y="21" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">Маслёнок, Рыжик</text>
  </g>
  <g transform="translate(140,175)">
    <rect x="0" y="0" width="115" height="30" rx="3" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.6"/>
    <text x="57" y="11" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828">Бледная поганка</text>
    <text x="57" y="21" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828">Мухомор, Поганки</text>
  </g>

  <!-- Poisonous warning -->
  <g transform="translate(30,210)">
    <rect x="0" y="0" width="230" height="25" rx="3" fill="#FFCDD2" stroke="#D32F2F" stroke-width="1"/>
    <text x="115" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828" font-weight="bold">⚠ Ядовитые грибы смертельно опасны!</text>
    <text x="115" y="20" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828">Бледная поганка — самый ядовитый гриб</text>
  </g>

  <!-- Molds section -->
  <text x="390" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Плесневые грибы</text>

  <!-- Mucor -->
  <g transform="translate(270,178)">
    <rect x="0" y="0" width="105" height="75" rx="5" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.8"/>
    <text x="52" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17">Мукор</text>
    <!-- Stalks -->
    <line x1="25" y1="60" x2="25" y2="30" stroke="#8D6E63" stroke-width="1.2"/>
    <line x1="50" y1="60" x2="50" y2="25" stroke="#8D6E63" stroke-width="1.2"/>
    <line x1="75" y1="60" x2="75" y2="32" stroke="#8D6E63" stroke-width="1.2"/>
    <!-- Sporangia (round heads) -->
    <circle cx="25" cy="27" r="6" fill="#424242" stroke="#212121" stroke-width="0.8"/>
    <circle cx="50" cy="22" r="7" fill="#424242" stroke="#212121" stroke-width="0.8"/>
    <circle cx="75" cy="29" r="6" fill="#424242" stroke="#212121" stroke-width="0.8"/>
    <!-- Spores coming out -->
    <circle cx="55" cy="14" r="1.5" fill="#757575"/>
    <circle cx="60" cy="16" r="1" fill="#757575"/>
    <circle cx="48" cy="13" r="1.2" fill="#757575"/>
    <!-- Substrate -->
    <rect x="10" y="58" width="85" height="8" rx="2" fill="#FFE082" opacity="0.5"/>
    <text x="52" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Спорангии со спорами</text>
  </g>

  <!-- Penicillium -->
  <g transform="translate(385,178)">
    <rect x="0" y="0" width="105" height="75" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
    <text x="52" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Пеницилл</text>
    <!-- Brush-like structures -->
    <line x1="30" y1="60" x2="30" y2="35" stroke="#4CAF50" stroke-width="1"/>
    <path d="M30,35 L25,28 M30,35 L30,26 M30,35 L35,28" stroke="#66BB6A" stroke-width="0.8"/>
    <path d="M25,28 L22,22 M25,28 L26,21 M30,26 L28,20 M30,26 L32,20 M35,28 L34,21 M35,28 L38,22" stroke="#81C784" stroke-width="0.6"/>
    <!-- Conidia (spore chains) -->
    <circle cx="22" cy="20" r="1.2" fill="#A5D6A7"/>
    <circle cx="26" cy="19" r="1.2" fill="#A5D6A7"/>
    <circle cx="28" cy="18" r="1.2" fill="#A5D6A7"/>
    <circle cx="32" cy="18" r="1.2" fill="#A5D6A7"/>
    <circle cx="34" cy="19" r="1.2" fill="#A5D6A7"/>
    <circle cx="38" cy="20" r="1.2" fill="#A5D6A7"/>

    <line x1="70" y1="60" x2="70" y2="35" stroke="#4CAF50" stroke-width="1"/>
    <path d="M70,35 L65,28 M70,35 L70,26 M70,35 L75,28" stroke="#66BB6A" stroke-width="0.8"/>
    <path d="M65,28 L63,22 M70,26 L68,20 M70,26 L72,20 M75,28 L77,22" stroke="#81C784" stroke-width="0.6"/>

    <rect x="10" y="58" width="85" height="8" rx="2" fill="#C8E6C9" opacity="0.5"/>
    <text x="52" y="68" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Конидии (споры)</text>
  </g>

  <!-- Yeast section -->
  <text x="135" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Дрожжи (одноклеточные грибы)</text>

  <g transform="translate(15,278)">
    <rect x="0" y="0" width="245" height="60" rx="5" fill="#FFF8E1" stroke="#FFC107" stroke-width="0.8"/>
    <!-- Yeast budding sequence -->
    <!-- Cell 1: normal -->
    <ellipse cx="30" cy="30" rx="12" ry="10" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
    <circle cx="28" cy="28" r="4" fill="#FFCC80" stroke="#FF8F00" stroke-width="0.5"/>
    <text x="30" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Клетка</text>

    <!-- Arrow -->
    <path d="M45,30 L55,30" stroke="#F9A825" stroke-width="1" fill="none" marker-end="url(#arr4)"/>
    <defs><marker id="arr4" markerWidth="5" markerHeight="3" refX="5" refY="1.5" orient="auto"><path d="M0,0 L5,1.5 L0,3" fill="#F9A825"/></marker></defs>

    <!-- Cell 2: bud forming -->
    <ellipse cx="75" cy="28" rx="12" ry="10" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
    <circle cx="73" cy="26" r="4" fill="#FFCC80" stroke="#FF8F00" stroke-width="0.5"/>
    <ellipse cx="87" cy="22" rx="7" ry="6" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
    <circle cx="86" cy="21" r="2.5" fill="#FFCC80" stroke="#FF8F00" stroke-width="0.4"/>
    <text x="80" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Почкование</text>

    <!-- Arrow -->
    <path d="M98,30 L108,30" stroke="#F9A825" stroke-width="1" fill="none" marker-end="url(#arr4)"/>

    <!-- Cell 3: bud larger -->
    <ellipse cx="130" cy="28" rx="12" ry="10" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
    <ellipse cx="144" cy="22" rx="9" ry="8" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
    <text x="137" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Рост почки</text>

    <!-- Arrow -->
    <path d="M156,30 L166,30" stroke="#F9A825" stroke-width="1" fill="none" marker-end="url(#arr4)"/>

    <!-- Cell 4: two cells -->
    <ellipse cx="185" cy="25" rx="10" ry="9" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
    <ellipse cx="200" cy="30" rx="10" ry="9" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
    <text x="192" y="48" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Две клетки</text>

    <!-- Label: budding -->
    <text x="120" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#F57F17">Вегетативное размножение — почкование</text>
  </g>

  <!-- Yeast uses -->
  <g transform="translate(270,278)">
    <rect x="0" y="0" width="210" height="60" rx="5" fill="#FFF8E1" stroke="#FFC107" stroke-width="0.8"/>
    <text x="105" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17">Применение дрожжей</text>
    <text x="10" y="26" font-family="Arial,sans-serif" font-size="6" fill="#555">🍞 Хлебопечение (сахара → CO₂ + спирт)</text>
    <text x="10" y="37" font-family="Arial,sans-serif" font-size="6" fill="#555">🍺 Пивоварение и виноделие</text>
    <text x="10" y="48" font-family="Arial,sans-serif" font-size="6" fill="#555">💊 Витамины группы B</text>
    <text x="10" y="58" font-family="Arial,sans-serif" font-size="6" fill="#555">🧬 Биотехнология и генетика</text>
  </g>
</svg>