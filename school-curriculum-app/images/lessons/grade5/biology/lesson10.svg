<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Бактерии</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 10</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Bacterial cell structure (large diagram) -->
  <text x="160" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Строение бактериальной клетки</text>

  <g transform="translate(40,65)">
    <!-- Cell body (bacillus shape) -->
    <rect x="20" y="20" width="170" height="60" rx="25" fill="#81D4FA" opacity="0.4" stroke="#0288D1" stroke-width="1.5"/>

    <!-- Cell wall -->
    <rect x="20" y="20" width="170" height="60" rx="25" fill="none" stroke="#0277BD" stroke-width="2.5"/>

    <!-- Cell membrane (inner) -->
    <rect x="24" y="24" width="162" height="52" rx="22" fill="none" stroke="#0288D1" stroke-width="0.8" stroke-dasharray="3,2"/>

    <!-- Nucleoid region -->
    <ellipse cx="90" cy="48" rx="35" ry="15" fill="#CE93D8" opacity="0.3" stroke="#7B1FA2" stroke-width="0.8" stroke-dasharray="2,1"/>
    <path d="M65,45 Q75,38 85,45 Q95,52 105,45 Q115,38 120,45" stroke="#7B1FA2" stroke-width="1" fill="none"/>
    <text x="90" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#4A148C">Нуклеоид</text>
    <text x="90" y="60" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#4A148C">(ДНК)</text>

    <!-- Ribosomes -->
    <circle cx="55" cy="38" r="2.5" fill="#FF7043"/>
    <circle cx="130" cy="40" r="2.5" fill="#FF7043"/>
    <circle cx="70" cy="62" r="2.5" fill="#FF7043"/>
    <circle cx="140" cy="58" r="2.5" fill="#FF7043"/>
    <circle cx="120" cy="65" r="2.5" fill="#FF7043"/>

    <!-- Plasmid -->
    <circle cx="150" cy="48" r="8" fill="none" stroke="#E91E63" stroke-width="1"/>
    <text x="150" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#C2185B">плазмида</text>

    <!-- Flagellum -->
    <path d="M190,50 Q200,45 210,50 Q220,55 230,50 Q240,45 250,50" stroke="#0288D1" stroke-width="1.5" fill="none"/>
    <text x="225" y="40" font-family="Arial,sans-serif" font-size="5.5" fill="#0288D1">Жгутик</text>

    <!-- Pili -->
    <line x1="40" y1="22" x2="30" y2="12" stroke="#0288D1" stroke-width="0.8"/>
    <line x1="55" y1="21" x2="48" y2="10" stroke="#0288D1" stroke-width="0.8"/>
    <line x1="75" y1="20" x2="70" y2="9" stroke="#0288D1" stroke-width="0.8"/>
    <text x="40" y="8" font-family="Arial,sans-serif" font-size="5.5" fill="#0288D1">Пили (ворсинки)</text>

    <!-- Capsule -->
    <rect x="15" y="15" width="180" height="70" rx="28" fill="none" stroke="#4FC3F7" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="200" y="75" font-family="Arial,sans-serif" font-size="5.5" fill="#0288D1">Капсула</text>

    <!-- Label lines -->
    <line x1="20" y1="45" x2="8" y2="45" stroke="#0277BD" stroke-width="0.5"/>
    <text x="5" y="42" font-family="Arial,sans-serif" font-size="5" fill="#0277BD" text-anchor="end">Клеточная</text>
    <text x="5" y="50" font-family="Arial,sans-serif" font-size="5" fill="#0277BD" text-anchor="end">стенка</text>

    <line x1="24" y1="55" x2="8" y2="60" stroke="#0288D1" stroke-width="0.5"/>
    <text x="5" y="63" font-family="Arial,sans-serif" font-size="5" fill="#0288D1" text-anchor="end">Мембрана</text>

    <line x1="55" y1="38" x2="40" y2="33" stroke="#FF7043" stroke-width="0.5"/>
    <text x="38" y="30" font-family="Arial,sans-serif" font-size="5" fill="#D84315" text-anchor="end">Рибосомы</text>
  </g>

  <!-- 4 Bacterial Shapes -->
  <text x="250" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Формы бактерий</text>
  <line x1="30" y1="172" x2="470" y2="172" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <!-- 1. Кокки (spherical) -->
  <g transform="translate(30,180)">
    <rect x="0" y="0" width="105" height="80" rx="5" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
    <text x="52" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1">Кокки</text>
    <text x="52" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">(шаровидные)</text>

    <!-- Single coccus -->
    <circle cx="20" cy="42" r="8" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>

    <!-- Diplococci -->
    <circle cx="48" cy="39" r="7" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>
    <circle cx="60" cy="39" r="7" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>

    <!-- Streptococci (chain) -->
    <circle cx="20" cy="60" r="6" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>
    <circle cx="32" cy="60" r="6" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>
    <circle cx="44" cy="60" r="6" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>
    <circle cx="56" cy="60" r="6" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>

    <!-- Staphylococci (cluster) -->
    <circle cx="82" cy="55" r="5" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>
    <circle cx="90" cy="48" r="5" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>
    <circle cx="80" cy="45" r="5" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>
    <circle cx="88" cy="58" r="5" fill="#81D4FA" stroke="#0288D1" stroke-width="1"/>

    <text x="20" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#555">микрококк</text>
    <text x="54" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#555">диплококк</text>
    <text x="38" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#555">стрептококк</text>
    <text x="86" y="69" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#555">стафилококк</text>
  </g>

  <!-- 2. Бациллы (rod-shaped) -->
  <g transform="translate(145,180)">
    <rect x="0" y="0" width="105" height="80" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
    <text x="52" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100">Бациллы</text>
    <text x="52" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">(палочковидные)</text>

    <!-- Single bacillus -->
    <rect x="10" y="35" width="30" height="14" rx="7" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>

    <!-- Diplobacillus -->
    <rect x="55" y="35" width="20" height="14" rx="7" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
    <rect x="73" y="35" width="20" height="14" rx="7" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>

    <!-- Streptobacillus (chain) -->
    <rect x="10" y="58" width="18" height="12" rx="6" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
    <rect x="28" y="58" width="18" height="12" rx="6" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
    <rect x="46" y="58" width="18" height="12" rx="6" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
    <rect x="64" y="58" width="18" height="12" rx="6" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>

    <text x="25" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#555">одиночная</text>
    <text x="74" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#555">диплобацилла</text>
    <text x="46" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#555">стрептобацилла</text>
  </g>

  <!-- 3. Вибрионы (comma-shaped) -->
  <g transform="translate(260,180)">
    <rect x="0" y="0" width="105" height="80" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
    <text x="52" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A">Вибрионы</text>
    <text x="52" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">(изогнутые)</text>

    <!-- Vibrio shapes -->
    <path d="M20,35 Q35,25 40,40 Q45,55 30,50" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1" fill-opacity="0.5"/>
    <path d="M55,35 Q70,25 75,40 Q80,55 65,50" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1" fill-opacity="0.5"/>

    <path d="M20,60 Q35,50 40,65 Q45,75 30,72" fill="#CE93D8" stroke="#7B1FA2" stroke-width="1" fill-opacity="0.5"/>

    <!-- Flagellum on one -->
    <path d="M40,40 Q50,38 55,42 Q60,46 68,44" stroke="#7B1FA2" stroke-width="0.8" fill="none"/>

    <text x="52" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Холерный вибрион</text>
  </g>

  <!-- 4. Спириллы (spiral) -->
  <g transform="translate(375,180)">
    <rect x="0" y="0" width="110" height="80" rx="5" fill="#E0F7FA" stroke="#00BCD4" stroke-width="0.8"/>
    <text x="55" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#006064">Спириллы</text>
    <text x="55" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">(спиральные)</text>

    <!-- Spirillum shapes -->
    <path d="M10,40 Q20,30 30,40 Q40,50 50,40 Q60,30 70,40 Q80,50 90,40" stroke="#00897B" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M15,60 Q25,50 35,60 Q45,70 55,60 Q65,50 75,60" stroke="#00897B" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Flagella -->
    <path d="M90,40 Q95,35 100,40 Q105,45 108,40" stroke="#00897B" stroke-width="0.8" fill="none"/>
    <path d="M10,40 Q5,35 2,40" stroke="#00897B" stroke-width="0.8" fill="none"/>

    <text x="55" y="77" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">Спирохеты</text>
  </g>

  <!-- Key features section -->
  <text x="250" y="278" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Особенности бактерий (прокариоты)</text>
  <line x1="30" y1="282" x2="470" y2="282" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <g transform="translate(20,288)">
    <rect x="0" y="0" width="115" height="45" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.7"/>
    <text x="57" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20">Нет ядра</text>
    <text x="57" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">ДНК в нуклеоиде</text>
    <text x="57" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">(кольцевая)</text>
    <text x="57" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">без оболочки</text>

    <rect x="125" y="0" width="115" height="45" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.7"/>
    <text x="182" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#E65100">Размеры</text>
    <text x="182" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">0,5 – 5 мкм</text>
    <text x="182" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">видны только в</text>
    <text x="182" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">микроскоп ×1000</text>

    <rect x="250" y="0" width="115" height="45" rx="4" fill="#E3F2FD" stroke="#2196F3" stroke-width="0.7"/>
    <text x="307" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#0D47A1">Нет органоидов</text>
    <text x="307" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Нет митохондрий,</text>
    <text x="307" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">хлоропластов,</text>
    <text x="307" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">ЭПС, комплекса Гольджи</text>

    <rect x="375" y="0" width="105" height="45" rx="4" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.7"/>
    <text x="427" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#6A1B9A">Клеточная стенка</text>
    <text x="427" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Не из целлюлозы,</text>
    <text x="427" y="31" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">а из муреина</text>
    <text x="427" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">(пептидогликана)</text>
  </g>
</svg>