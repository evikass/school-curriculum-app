<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Строение клетки</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 6</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- PLANT CELL (left) -->
  <text x="125" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20">Растительная клетка</text>

  <!-- Cell wall -->
  <rect x="20" y="65" width="210" height="180" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
  <!-- Cell membrane inside -->
  <rect x="24" y="69" width="202" height="172" rx="6" fill="#C8E6C9" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>

  <!-- Large central vacuole -->
  <rect x="50" y="110" width="130" height="100" rx="10" fill="#B3E5FC" opacity="0.4" stroke="#42A5F5" stroke-width="1"/>
  <text x="115" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">Вакуоль</text>
  <text x="115" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1">клеточный сок</text>

  <!-- Nucleus -->
  <ellipse cx="70" cy="95" rx="25" ry="20" fill="#FFCC80" stroke="#E65100" stroke-width="1.2"/>
  <ellipse cx="70" cy="95" rx="10" ry="8" fill="#FF8A65" stroke="#D84315" stroke-width="0.8"/>
  <text x="70" y="98" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#BF360C">ядрышко</text>

  <!-- Chloroplasts -->
  <ellipse cx="45" cy="145" rx="14" ry="8" fill="#4CAF50" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="45" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="white">хлоропласт</text>

  <ellipse cx="185" cy="100" rx="14" ry="8" fill="#4CAF50" stroke="#1B5E20" stroke-width="0.8" transform="rotate(-20,185,100)"/>
  <text x="185" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="white">хлоропласт</text>

  <ellipse cx="190" cy="195" rx="14" ry="8" fill="#4CAF50" stroke="#1B5E20" stroke-width="0.8" transform="rotate(15,190,195)"/>
  <text x="190" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="white">хлоропласт</text>

  <!-- Mitochondria -->
  <ellipse cx="160" cy="88" rx="12" ry="6" fill="#FFAB91" stroke="#D84315" stroke-width="0.8" transform="rotate(30,160,88)"/>
  <text x="160" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#BF360C">митох.</text>

  <!-- Cytoplasm label -->
  <text x="30" y="230" font-family="Arial,sans-serif" font-size="6" fill="#555">Цитоплазма</text>

  <!-- Labels with lines -->
  <line x1="24" y1="80" x2="10" y2="68" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="5" y="66" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">Оболочка</text>

  <line x1="30" y1="82" x2="10" y2="80" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="5" y="88" font-family="Arial,sans-serif" font-size="5.5" fill="#4CAF50">Мембрана</text>

  <line x1="95" y1="95" x2="105" y2="78" stroke="#E65100" stroke-width="0.5"/>
  <text x="107" y="78" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">Ядро</text>

  <!-- Plastids label -->
  <line x1="200" y1="100" x2="220" y2="88" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="220" y="88" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">Пластиды</text>

  <!-- ANIMAL CELL (right) -->
  <text x="375" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20">Животная клетка</text>

  <!-- Cell membrane (round shape) -->
  <ellipse cx="375" cy="155" rx="100" ry="90" fill="#FFCDD2" opacity="0.3" stroke="#D32F2F" stroke-width="2"/>

  <!-- Nucleus -->
  <ellipse cx="365" cy="140" rx="30" ry="25" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
  <ellipse cx="365" cy="140" rx="12" ry="9" fill="#FF8A65" stroke="#D84315" stroke-width="0.8"/>
  <text x="365" y="143" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#BF360C">ядрышко</text>

  <!-- Mitochondria -->
  <ellipse cx="320" cy="110" rx="14" ry="7" fill="#FFAB91" stroke="#D84315" stroke-width="0.8" transform="rotate(-25,320,110)"/>
  <text x="320" y="113" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#BF360C">митохондрия</text>

  <ellipse cx="420" cy="170" rx="14" ry="7" fill="#FFAB91" stroke="#D84315" stroke-width="0.8" transform="rotate(40,420,170)"/>

  <!-- Lysosomes -->
  <circle cx="335" cy="175" r="8" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="335" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#4A148C">лизосома</text>

  <circle cx="410" cy="120" r="6" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.8"/>

  <!-- ER (Endoplasmic reticulum) -->
  <path d="M390,130 Q400,120 395,110 Q390,100 400,90" stroke="#FFB74D" stroke-width="1.5" fill="none"/>
  <path d="M393,132 Q403,122 398,112 Q393,102 403,92" stroke="#FFB74D" stroke-width="1.5" fill="none"/>
  <text x="410" y="95" font-family="Arial,sans-serif" font-size="5" fill="#E65100">ЭПС</text>

  <!-- Golgi apparatus -->
  <path d="M300,140 Q310,135 320,140" stroke="#A5D6A7" stroke-width="2" fill="none"/>
  <path d="M300,146 Q310,141 320,146" stroke="#A5D6A7" stroke-width="2" fill="none"/>
  <path d="M300,152 Q310,147 320,152" stroke="#A5D6A7" stroke-width="2" fill="none"/>
  <text x="310" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Комплекс</text>
  <text x="310" y="169" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Гольджи</text>

  <!-- Cytoplasm -->
  <text x="375" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">Цитоплазма</text>

  <!-- Labels with lines for animal cell -->
  <line x1="395" y1="140" x2="440" y2="125" stroke="#E65100" stroke-width="0.5"/>
  <text x="442" y="127" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">Ядро</text>

  <line x1="375" y1="70" x2="375" y2="60" stroke="#D32F2F" stroke-width="0.5"/>
  <text x="375" y="66" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#D32F2F">Мембрана</text>

  <!-- Comparison section at bottom -->
  <text x="250" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Отличия растительной и животной клеток</text>
  <line x1="30" y1="275" x2="470" y2="275" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <!-- Comparison items -->
  <rect x="25" y="282" width="215" height="55" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="132" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Растительная клетка</text>
  <text x="132" y="307" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">✓ Клеточная стенка</text>
  <text x="132" y="316" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">✓ Хлоропласты (фотосинтез)</text>
  <text x="132" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">✓ Крупная вакуоль</text>
  <text x="132" y="334" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">✓ Правильная форма</text>

  <rect x="260" y="282" width="215" height="55" rx="4" fill="#FCE4EC" stroke="#E91E63" stroke-width="0.8"/>
  <text x="367" y="295" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#880E4F">Животная клетка</text>
  <text x="367" y="307" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">✗ Нет клеточной стенки</text>
  <text x="367" y="316" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">✗ Нет хлоропластов</text>
  <text x="367" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">✗ Мелкие вакуоли</text>
  <text x="367" y="334" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">✗ Неправильная форма</text>
</svg>