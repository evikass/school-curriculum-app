<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Жизнедеятельность клетки</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 7</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Metabolism diagram -->
  <text x="250" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20">Обмен веществ</text>

  <!-- Central cell -->
  <ellipse cx="250" cy="160" rx="70" ry="55" fill="#C8E6C9" opacity="0.4" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20">Клетка</text>
  <text x="250" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">обмен веществ</text>

  <!-- Assimilation (left arrow - substances entering) -->
  <g transform="translate(30,80)">
    <text x="65" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0">Ассимиляция</text>
    <text x="65" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">(пластический обмен)</text>

    <!-- Arrow pointing right to cell -->
    <path d="M40,30 L130,30" stroke="#1565C0" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <defs><marker id="arrowBlue" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#1565C0"/></marker></defs>

    <!-- Substances -->
    <rect x="10" y="18" width="30" height="14" rx="3" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
    <text x="25" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1">Пища</text>

    <rect x="10" y="35" width="30" height="14" rx="3" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
    <text x="25" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1">O₂</text>

    <rect x="10" y="52" width="30" height="14" rx="3" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
    <text x="25" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1">Вода</text>
  </g>

  <!-- Dissimilation (right arrow - substances leaving) -->
  <g transform="translate(310,80)">
    <text x="65" y="0" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#D32F2F">Диссимиляция</text>
    <text x="65" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">(энергетический обмен)</text>

    <!-- Arrow pointing right away from cell -->
    <path d="M0,30 L90,30" stroke="#D32F2F" stroke-width="2" marker-end="url(#arrowRed)"/>
    <defs><marker id="arrowRed" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#D32F2F"/></marker></defs>

    <!-- Waste products -->
    <rect x="95" y="18" width="30" height="14" rx="3" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.8"/>
    <text x="110" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#B71C1C">CO₂</text>

    <rect x="95" y="35" width="30" height="14" rx="3" fill="#FFCDD2" stroke="#EF5350" stroke-width="0.8"/>
    <text x="110" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#B71C1C">Вода</text>

    <rect x="95" y="52" width="30" height="14" rx="3" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.8"/>
    <text x="110" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#F57F17">Энергия</text>
  </g>

  <!-- ATP molecule -->
  <text x="250" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">АТФ — универсальный переносчик энергии</text>

  <g transform="translate(110,238)">
    <!-- Adenine -->
    <rect x="0" y="0" width="45" height="30" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
    <text x="22" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#0D47A1">Аденин</text>
    <text x="22" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">(азот. основание)</text>

    <!-- Ribose -->
    <rect x="55" y="0" width="40" height="30" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
    <text x="75" y="13" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#E65100">Рибоза</text>
    <text x="75" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">(углевод)</text>

    <!-- 3 Phosphates -->
    <rect x="105" y="0" width="30" height="30" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
    <text x="120" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#B71C1C">P</text>
    <text x="120" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C">~ энергия</text>

    <rect x="140" y="0" width="30" height="30" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
    <text x="155" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#B71C1C">P</text>
    <text x="155" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C">~ энергия</text>

    <rect x="175" y="0" width="30" height="30" rx="4" fill="#FFCDD2" stroke="#EF5350" stroke-width="1"/>
    <text x="190" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#C62828">P</text>

    <!-- Connection lines -->
    <line x1="45" y1="15" x2="55" y2="15" stroke="#555" stroke-width="1"/>
    <line x1="95" y1="15" x2="105" y2="15" stroke="#555" stroke-width="1"/>
    <line x1="135" y1="15" x2="140" y2="15" stroke="#555" stroke-width="1"/>
    <line x1="170" y1="15" x2="175" y2="15" stroke="#555" stroke-width="1"/>

    <!-- Wavy bonds (high-energy) -->
    <path d="M107,10 Q109,7 111,10 Q113,13 115,10" stroke="#E53935" stroke-width="0.8" fill="none"/>
    <path d="M142,10 Q144,7 146,10 Q148,13 150,10" stroke="#E53935" stroke-width="0.8" fill="none"/>
  </g>

  <!-- ATP/ADP cycle -->
  <g transform="translate(90,285)">
    <rect x="0" y="0" width="140" height="40" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
    <text x="70" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">АТФ → АДФ + P + энергия</text>
    <text x="70" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">Высвобождение энергии</text>
    <text x="70" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">для работы клетки</text>

    <rect x="155" y="0" width="140" height="40" rx="5" fill="#FFF8E1" stroke="#F9A825" stroke-width="1"/>
    <text x="225" y="14" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17">АДФ + P + энергия → АТФ</text>
    <text x="225" y="25" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">Накопление энергии</text>
    <text x="225" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">в ходе дыхания</text>
  </g>

  <!-- Key processes in cell -->
  <g transform="translate(20,235)">
    <text x="45" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20">Процессы в клетке</text>

    <rect x="0" y="15" width="90" height="16" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="45" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Биосинтез белка</text>

    <rect x="0" y="34" width="90" height="16" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="45" y="45" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Фотосинтез</text>

    <rect x="0" y="53" width="90" height="16" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.6"/>
    <text x="45" y="64" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Дыхание</text>
  </g>

  <!-- Bottom note -->
  <rect x="20" y="335" width="460" height="10" rx="3" fill="#1B5E20" opacity="0.1"/>
  <text x="250" y="343" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Обмен веществ — совокупность всех химических реакций в клетке: ассимиляция + диссимиляция</text>
</svg>