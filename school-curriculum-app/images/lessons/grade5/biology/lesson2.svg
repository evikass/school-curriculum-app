<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Методы изучения природы</text>
  <text x="250" y="35" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 5 класс — Урок 2</text>
  <line x1="30" y1="40" x2="470" y2="40" stroke="#2E7D32" stroke-width="1" opacity="0.5"/>

  <!-- Microscope -->
  <g transform="translate(30,50)">
    <text x="55" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Микроскоп</text>
    <!-- Base -->
    <rect x="20" y="115" width="70" height="8" rx="3" fill="#546E7A"/>
    <!-- Arm -->
    <rect x="50" y="40" width="10" height="78" fill="#78909C" rx="2"/>
    <!-- Stage -->
    <rect x="30" y="85" width="50" height="5" fill="#90A4AE"/>
    <!-- Objective -->
    <rect x="48" y="68" width="14" height="18" fill="#607D8B" rx="2"/>
    <circle cx="55" cy="82" r="5" fill="#455A64"/>
    <!-- Eyepiece -->
    <rect x="47" y="32" width="16" height="12" fill="#607D8B" rx="3"/>
    <circle cx="55" cy="32" r="6" fill="#455A64"/>
    <!-- Coarse focus -->
    <circle cx="42" cy="70" r="4" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
    <!-- Fine focus -->
    <circle cx="68" cy="70" r="3" fill="#78909C" stroke="#546E7A" stroke-width="1"/>
    <!-- Slide on stage -->
    <rect x="38" y="82" width="30" height="4" fill="#B3E5FC" opacity="0.7" rx="1"/>
    <text x="55" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">увеличивает</text>
    <text x="55" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">в 100-1000 раз</text>
  </g>

  <!-- Test tubes -->
  <g transform="translate(155,50)">
    <text x="50" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Лаборатория</text>
    <!-- Test tube 1 -->
    <rect x="10" y="22" width="14" height="50" rx="0" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
    <path d="M10,72 Q10,80 17,80 Q24,80 24,72" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
    <rect x="11" y="50" width="12" height="22" rx="0" fill="#4CAF50" opacity="0.5"/>
    <path d="M11,72 Q11,79 17,79 Q23,79 23,72" fill="#4CAF50" opacity="0.5"/>

    <!-- Test tube 2 -->
    <rect x="32" y="22" width="14" height="50" rx="0" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
    <path d="M32,72 Q32,80 39,80 Q46,80 46,72" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
    <rect x="33" y="40" width="12" height="32" rx="0" fill="#FF7043" opacity="0.5"/>
    <path d="M33,72 Q33,79 39,79 Q45,79 45,72" fill="#FF7043" opacity="0.5"/>

    <!-- Test tube 3 -->
    <rect x="54" y="22" width="14" height="50" rx="0" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
    <path d="M54,72 Q54,80 61,80 Q68,80 68,72" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
    <rect x="55" y="55" width="12" height="17" rx="0" fill="#42A5F5" opacity="0.5"/>
    <path d="M55,72 Q55,79 61,79 Q67,79 67,72" fill="#42A5F5" opacity="0.5"/>

    <!-- Flask -->
    <path d="M80,22 L80,45 L70,72 Q70,80 85,80 Q100,80 100,72 L90,45 L90,22 Z" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
    <path d="M72,60 Q72,79 85,79 Q98,79 98,60 Z" fill="#FFF176" opacity="0.4"/>
    <line x1="77" y1="22" x2="93" y2="22" stroke="#90A4AE" stroke-width="1.5"/>

    <!-- Labels -->
    <text x="17" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">раствор</text>
    <text x="39" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">кислота</text>
    <text x="61" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">щёлочь</text>
    <text x="85" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">колба</text>
  </g>

  <!-- Scientific Method Steps -->
  <text x="370" y="55" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Методы исследования</text>

  <rect x="300" y="62" width="140" height="18" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="370" y="74" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">1. Наблюдение</text>

  <rect x="300" y="84" width="140" height="18" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="370" y="96" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">2. Выдвижение гипотезы</text>

  <rect x="300" y="106" width="140" height="18" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="370" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">3. Эксперимент</text>

  <rect x="300" y="128" width="140" height="18" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="370" y="140" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">4. Анализ результатов</text>

  <rect x="300" y="150" width="140" height="18" rx="3" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="370" y="162" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">5. Вывод</text>

  <!-- Arrows between steps -->
  <path d="M370,80 L370,84" stroke="#2E7D32" stroke-width="1" marker-end="none"/>
  <path d="M370,102 L370,106" stroke="#2E7D32" stroke-width="1"/>
  <path d="M370,124 L370,128" stroke="#2E7D32" stroke-width="1"/>
  <path d="M370,146 L370,150" stroke="#2E7D32" stroke-width="1"/>

  <!-- Magnifying glass -->
  <g transform="translate(40,180)">
    <text x="50" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Лупа</text>
    <circle cx="45" cy="40" r="22" fill="none" stroke="#78909C" stroke-width="3"/>
    <circle cx="45" cy="40" r="19" fill="#E3F2FD" opacity="0.4"/>
    <line x1="61" y1="56" x2="80" y2="75" stroke="#78909C" stroke-width="4" stroke-linecap="round"/>
    <!-- Small detail inside lens -->
    <circle cx="40" cy="35" r="3" fill="#81C784" opacity="0.6"/>
    <circle cx="50" cy="42" r="2" fill="#81C784" opacity="0.6"/>
    <text x="45" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">увеличение</text>
    <text x="45" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#555">в 5-20 раз</text>
  </g>

  <!-- Measurement tools -->
  <g transform="translate(150,180)">
    <text x="60" y="10" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Измерение</text>
    <!-- Ruler -->
    <rect x="5" y="22" width="110" height="12" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
    <line x1="15" y1="22" x2="15" y2="30" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="25" y1="22" x2="25" y2="28" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="35" y1="22" x2="35" y2="30" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="45" y1="22" x2="45" y2="28" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="55" y1="22" x2="55" y2="30" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="65" y1="22" x2="65" y2="28" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="75" y1="22" x2="75" y2="30" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="85" y1="22" x2="85" y2="28" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="95" y1="22" x2="95" y2="30" stroke="#F9A825" stroke-width="0.5"/>
    <line x1="105" y1="22" x2="105" y2="28" stroke="#F9A825" stroke-width="0.5"/>
    <text x="15" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">1</text>
    <text x="35" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">2</text>
    <text x="55" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">3</text>
    <text x="75" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">4</text>
    <text x="95" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">5</text>
    <text x="60" y="50" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">линейка (см)</text>

    <!-- Thermometer -->
    <rect x="120" y="20" width="8" height="45" rx="3" fill="none" stroke="#E53935" stroke-width="1"/>
    <rect x="121" y="40" width="6" height="24" fill="#E53935"/>
    <circle cx="124" cy="66" r="6" fill="#E53935"/>
    <text x="131" y="28" font-family="Arial,sans-serif" font-size="5" fill="#555">50°</text>
    <text x="131" y="43" font-family="Arial,sans-serif" font-size="5" fill="#555">25°</text>
    <text x="131" y="58" font-family="Arial,sans-serif" font-size="5" fill="#555">0°</text>
    <text x="124" y="82" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#555">термометр</text>
  </g>

  <!-- Comparison / Description / Modeling -->
  <g transform="translate(300,185)">
    <text x="90" y="5" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Другие методы</text>

    <rect x="5" y="12" width="85" height="28" rx="4" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.8"/>
    <text x="47" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">Описание</text>
    <text x="47" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">характеристика</text>

    <rect x="95" y="12" width="85" height="28" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
    <text x="137" y="24" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#E65100">Сравнение</text>
    <text x="137" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">общее и отличное</text>

    <rect x="5" y="45" width="85" height="28" rx="4" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
    <text x="47" y="57" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#6A1B9A">Моделирование</text>
    <text x="47" y="67" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">создание модели</text>

    <rect x="95" y="45" width="85" height="28" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
    <text x="137" y="57" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Эксперимент</text>
    <text x="137" y="67" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#555">проверка гипотезы</text>
  </g>

  <!-- Safety rules section -->
  <text x="250" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Правила техники безопасности</text>
  <line x1="30" y1="284" x2="470" y2="284" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

  <g transform="translate(20,290)">
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="6.5" fill="#D32F2F">⚠</text>
    <text x="12" y="10" font-family="Arial,sans-serif" font-size="6" fill="#555">Не пробуй вещества на вкус</text>

    <text x="130" y="10" font-family="Arial,sans-serif" font-size="6.5" fill="#D32F2F">⚠</text>
    <text x="142" y="10" font-family="Arial,sans-serif" font-size="6" fill="#555">Нюхай вещества осторожно</text>

    <text x="275" y="10" font-family="Arial,sans-serif" font-size="6.5" fill="#D32F2F">⚠</text>
    <text x="287" y="10" font-family="Arial,sans-serif" font-size="6" fill="#555">Осторожно с огнём и стеклом</text>
  </g>

  <g transform="translate(20,305)">
    <text x="0" y="10" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">✓</text>
    <text x="12" y="10" font-family="Arial,sans-serif" font-size="6" fill="#555">Работай в спецодежде</text>

    <text x="130" y="10" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">✓</text>
    <text x="142" y="10" font-family="Arial,sans-serif" font-size="6" fill="#555">Поддерживай чистоту</text>

    <text x="275" y="10" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0">✓</text>
    <text x="287" y="10" font-family="Arial,sans-serif" font-size="6" fill="#555">Следуй указаниям учителя</text>
  </g>

  <!-- Small note about observation -->
  <rect x="20" y="325" width="460" height="16" rx="3" fill="#1B5E20" opacity="0.1"/>
  <text x="250" y="336" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Наблюдение — целенаправленное восприятие объектов природы с целью их изучения</text>
</svg>