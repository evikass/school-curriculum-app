<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgGrad6)"/>
  
  <!-- Title -->
  <text x="200" y="35" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="24" font-weight="bold" fill="#1565c0">Numbers 6-10 / Числа 6-10</text>
  
  <!-- Number 6 -->
  <g transform="translate(50, 100)">
    <circle r="30" fill="#fff" stroke="#e91e63" stroke-width="3">
      <animate attributeName="r" values="28;33;28" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#c2185b">6</text>
    <text y="50" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="12" font-weight="bold" fill="#c2185b">six</text>
    <!-- 6 dots (dice) -->
    <circle cx="-8" cy="70" r="4" fill="#c2185b"/>
    <circle cx="8" cy="70" r="4" fill="#c2185b"/>
    <circle cx="-8" cy="85" r="4" fill="#c2185b"/>
    <circle cx="8" cy="85" r="4" fill="#c2185b"/>
    <circle cx="-8" cy="100" r="4" fill="#c2185b"/>
    <circle cx="8" cy="100" r="4" fill="#c2185b"/>
  </g>
  
  <!-- Number 7 -->
  <g transform="translate(110, 100)">
    <circle r="30" fill="#fff" stroke="#9c27b0" stroke-width="3">
      <animate attributeName="r" values="28;33;28" dur="1.5s" repeatCount="indefinite" begin="0.15s"/>
    </circle>
    <text y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#7b1fa2">7</text>
    <text y="50" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="12" font-weight="bold" fill="#7b1fa2">seven</text>
    <!-- Rainbow colors representing 7 -->
    <g transform="translate(0, 85)">
      <rect x="-15" y="0" width="30" height="4" fill="#f44336" rx="2"/>
      <rect x="-15" y="5" width="30" height="4" fill="#ff9800" rx="2"/>
      <rect x="-15" y="10" width="30" height="4" fill="#ffeb3b" rx="2"/>
      <rect x="-15" y="15" width="30" height="4" fill="#4caf50" rx="2"/>
      <rect x="-15" y="20" width="30" height="4" fill="#2196f3" rx="2"/>
      <rect x="-15" y="25" width="30" height="4" fill="#3f51b5" rx="2"/>
      <rect x="-15" y="30" width="30" height="4" fill="#9c27b0" rx="2"/>
    </g>
  </g>
  
  <!-- Number 8 -->
  <g transform="translate(175, 100)">
    <circle r="30" fill="#fff" stroke="#00bcd4" stroke-width="3">
      <animate attributeName="r" values="28;33;28" dur="1.5s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <text y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#0097a7">8</text>
    <text y="50" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="12" font-weight="bold" fill="#0097a7">eight</text>
    <!-- Spider with 8 legs -->
    <g transform="translate(0, 85)">
      <ellipse cx="0" cy="5" rx="10" ry="8" fill="#5d4037"/>
      <ellipse cx="0" cy="-5" rx="7" ry="6" fill="#5d4037"/>
      <!-- 8 legs -->
      <line x1="-8" y1="0" x2="-20" y2="-10" stroke="#5d4037" stroke-width="2"/>
      <line x1="-8" y1="3" x2="-22" y2="5" stroke="#5d4037" stroke-width="2"/>
      <line x1="-8" y1="6" x2="-20" y2="15" stroke="#5d4037" stroke-width="2"/>
      <line x1="-8" y1="8" x2="-18" y2="20" stroke="#5d4037" stroke-width="2"/>
      <line x1="8" y1="0" x2="20" y2="-10" stroke="#5d4037" stroke-width="2"/>
      <line x1="8" y1="3" x2="22" y2="5" stroke="#5d4037" stroke-width="2"/>
      <line x1="8" y1="6" x2="20" y2="15" stroke="#5d4037" stroke-width="2"/>
      <line x1="8" y1="8" x2="18" y2="20" stroke="#5d4037" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Number 9 -->
  <g transform="translate(245, 100)">
    <circle r="30" fill="#fff" stroke="#ff5722" stroke-width="3">
      <animate attributeName="r" values="28;33;28" dur="1.5s" repeatCount="indefinite" begin="0.45s"/>
    </circle>
    <text y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#e64a19">9</text>
    <text y="50" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="12" font-weight="bold" fill="#e64a19">nine</text>
    <!-- 9 small circles -->
    <g transform="translate(0, 85)" fill="#e64a19">
      <circle cx="-10" cy="0" r="4"/>
      <circle cx="0" cy="0" r="4"/>
      <circle cx="10" cy="0" r="4"/>
      <circle cx="-10" cy="12" r="4"/>
      <circle cx="0" cy="12" r="4"/>
      <circle cx="10" cy="12" r="4"/>
      <circle cx="-10" cy="24" r="4"/>
      <circle cx="0" cy="24" r="4"/>
      <circle cx="10" cy="24" r="4"/>
    </g>
  </g>
  
  <!-- Number 10 -->
  <g transform="translate(320, 100)">
    <circle r="35" fill="#fff" stroke="#4caf50" stroke-width="3">
      <animate attributeName="r" values="33;38;33" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <text y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2e7d32">10</text>
    <text y="55" text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="12" font-weight="bold" fill="#2e7d32">ten</text>
    <!-- Two hands showing 10 fingers -->
    <g transform="translate(0, 80)">
      <!-- Left hand -->
      <ellipse cx="-15" cy="15" rx="12" ry="10" fill="#ffcc80"/>
      <rect x="-22" y="-5" width="4" height="14" rx="2" fill="#ffcc80"/>
      <rect x="-16" y="-10" width="4" height="19" rx="2" fill="#ffcc80"/>
      <rect x="-10" y="-10" width="4" height="19" rx="2" fill="#ffcc80"/>
      <rect x="-4" y="-8" width="4" height="17" rx="2" fill="#ffcc80"/>
      <ellipse cx="-2" cy="3" rx="4" ry="8" fill="#ffcc80"/>
      <!-- Right hand -->
      <ellipse cx="15" cy="15" rx="12" ry="10" fill="#ffcc80"/>
      <rect x="2" y="-8" width="4" height="17" rx="2" fill="#ffcc80"/>
      <rect x="8" y="-10" width="4" height="19" rx="2" fill="#ffcc80"/>
      <rect x="14" y="-10" width="4" height="19" rx="2" fill="#ffcc80"/>
      <rect x="20" y="-5" width="4" height="14" rx="2" fill="#ffcc80"/>
      <ellipse cx="22" cy="3" rx="4" ry="8" fill="#ffcc80"/>
    </g>
  </g>
  
  <!-- Counting bar at bottom -->
  <g transform="translate(200, 265)">
    <text text-anchor="middle" font-family="Comic Sans MS, cursive" font-size="14" fill="#1565c0">
      Count to 10! Считай до 10!
    </text>
  </g>
  
  <!-- Decorative stars -->
  <g fill="#ffd54f">
    <polygon points="30,50 32,56 38,56 33,60 35,66 30,63 25,66 27,60 22,56 28,56">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="370,50 372,56 378,56 373,60 375,66 370,63 365,66 367,60 362,56 368,56">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </polygon>
  </g>
</svg>