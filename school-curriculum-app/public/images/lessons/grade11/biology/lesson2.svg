<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90CAF9;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#42A5F5;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="shipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5D4037"/>
      <stop offset="100%" style="stop-color:#3E2723"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#1565C0" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D47A1">Путешествие Ч. Дарвина 1831–1836</text>
  <line x1="80" y1="38" x2="420" y2="38" stroke="#1976D2" stroke-width="1" opacity="0.4"/>

  <!-- Simplified world map area -->
  <rect x="25" y="50" width="310" height="200" rx="8" ry="8" fill="url(#ocean)" stroke="#90CAF9" stroke-width="1"/>

  <!-- South America simplified outline -->
  <path d="M160,70 Q175,72 185,80 Q195,95 190,110 Q185,130 180,150 Q175,170 170,185 Q165,200 155,210 Q150,220 145,230 Q140,240 135,245 L130,242 Q135,230 138,220 Q142,205 148,190 Q152,175 155,160 Q158,145 160,130 Q162,115 158,100 Q155,88 150,80 Q145,74 140,70 Z" 
        fill="#A5D6A7" stroke="#4CAF50" stroke-width="1.5" opacity="0.7"/>

  <!-- Africa partial outline (right edge) -->
  <path d="M290,100 Q300,95 305,105 Q310,125 308,145 Q305,165 298,180 Q292,195 285,205 L280,200 Q286,190 290,175 Q294,155 295,140 Q296,125 293,110 Z" 
        fill="#A5D6A7" stroke="#4CAF50" stroke-width="1" opacity="0.5"/>

  <!-- Europe partial -->
  <path d="M250,65 Q260,62 270,68 Q278,72 285,78 L280,82 Q272,76 265,72 Q258,68 252,70 Z" 
        fill="#A5D6A7" stroke="#4CAF50" stroke-width="1" opacity="0.5"/>

  <!-- Galapagos Islands -->
  <g transform="translate(105, 155)">
    <ellipse cx="0" cy="0" rx="8" ry="4" fill="#81C784" stroke="#388E3C" stroke-width="1"/>
    <ellipse cx="12" cy="-6" rx="6" ry="3" fill="#81C784" stroke="#388E3C" stroke-width="1"/>
    <ellipse cx="10" cy="8" rx="5" ry="3" fill="#81C784" stroke="#388E3C" stroke-width="1"/>
    <ellipse cx="-8" cy="-5" rx="4" ry="2.5" fill="#81C784" stroke="#388E3C" stroke-width="1"/>
    <text x="2" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#1B5E20" font-weight="bold">Галапагосы</text>
  </g>

  <!-- Route line - dashed -->
  <path d="M270,72 Q240,90 200,100 Q170,110 160,120 Q155,135 150,155 Q145,175 155,195 Q160,210 150,230 Q140,240 130,245" 
        stroke="#E53935" stroke-width="2" stroke-dasharray="5,3" fill="none" opacity="0.8"/>
  <!-- Route to Galapagos -->
  <path d="M160,140 Q140,148 115,155" stroke="#E53935" stroke-width="2" stroke-dasharray="5,3" fill="none" opacity="0.8"/>

  <!-- Route labels -->
  <text x="225" y="92" font-family="Arial, sans-serif" font-size="6" fill="#C62828" transform="rotate(-20,225,92)">Плимут →</text>
  <text x="130" y="238" font-family="Arial, sans-serif" font-size="6" fill="#C62828">Огненная Земля</text>

  <!-- Route arrows -->
  <polygon points="270,70 266,76 274,76" fill="#E53935" opacity="0.8"/>
  <polygon points="130,247 126,241 134,241" fill="#E53935" opacity="0.8"/>

  <!-- HMS Beagle ship -->
  <g transform="translate(235, 108)">
    <!-- Ship hull -->
    <path d="M0,15 Q5,20 35,18 Q40,15 38,10 L2,10 Z" fill="url(#shipGrad)" stroke="#3E2723" stroke-width="1"/>
    <!-- Deck -->
    <rect x="5" y="7" width="28" height="3" rx="1" fill="#795548"/>
    <!-- Mast -->
    <line x1="18" y1="7" x2="18" y2="-18" stroke="#5D4037" stroke-width="1.5"/>
    <!-- Sail -->
    <path d="M19,-16 Q28,-8 20,-2 L19,-2 Z" fill="#ECEFF1" stroke="#90A4AE" stroke-width="0.5" opacity="0.9"/>
    <!-- Second sail -->
    <path d="M18,-14 Q10,-8 17,-2 L18,-2 Z" fill="#CFD8DC" stroke="#90A4AE" stroke-width="0.5" opacity="0.8"/>
    <!-- Flag -->
    <rect x="18" y="-20" width="8" height="5" fill="#1565C0" opacity="0.8"/>
    <!-- Windows -->
    <circle cx="12" cy="13" r="1.2" fill="#FFECB3"/>
    <circle cx="18" cy="13" r="1.2" fill="#FFECB3"/>
    <circle cx="24" cy="13" r="1.2" fill="#FFECB3"/>
  </g>
  <text x="255" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3E2723" font-weight="bold">«Бигль»</text>

  <!-- Finch silhouettes panel -->
  <rect x="345" y="50" width="145" height="200" rx="8" ry="8" fill="#ffffff" fill-opacity="0.8" stroke="#1976D2" stroke-width="1" filter="url(#shadow2)"/>
  <text x="417" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#0D47A1">Вьюрки Дарвина</text>
  <line x1="360" y1="73" x2="475" y2="73" stroke="#1976D2" stroke-width="0.5" opacity="0.4"/>

  <!-- Finch 1 - Large ground finch -->
  <g transform="translate(365, 82)">
    <ellipse cx="18" cy="12" rx="10" ry="7" fill="#5D4037" opacity="0.7"/>
    <circle cx="28" cy="9" r="5" fill="#5D4037" opacity="0.7"/>
    <!-- Large thick beak -->
    <path d="M32,8 L42,5 L40,10 L32,11 Z" fill="#FF8F00" stroke="#E65100" stroke-width="0.5"/>
    <line x1="8" y1="14" x2="6" y2="22" stroke="#5D4037" stroke-width="1"/>
    <line x1="12" y1="14" x2="14" y2="22" stroke="#5D4037" stroke-width="1"/>
    <text x="18" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#37474F">Крупный</text>
    <text x="18" y="39" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#37474F">земляной</text>
  </g>

  <!-- Finch 2 - Cactus finch -->
  <g transform="translate(365, 126)">
    <ellipse cx="18" cy="12" rx="9" ry="6.5" fill="#6D4C41" opacity="0.7"/>
    <circle cx="27" cy="9" r="5" fill="#6D4C41" opacity="0.7"/>
    <!-- Pointed beak -->
    <path d="M31,8 L44,6 L31,10 Z" fill="#FF8F00" stroke="#E65100" stroke-width="0.5"/>
    <line x1="9" y1="14" x2="7" y2="22" stroke="#6D4C41" stroke-width="1"/>
    <line x1="13" y1="14" x2="15" y2="22" stroke="#6D4C41" stroke-width="1"/>
    <text x="18" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#37474F">Кактусовый</text>
  </g>

  <!-- Finch 3 - Warbler finch -->
  <g transform="translate(365, 168)">
    <ellipse cx="18" cy="12" rx="8" ry="5.5" fill="#795548" opacity="0.7"/>
    <circle cx="25" cy="9" r="4.5" fill="#795548" opacity="0.7"/>
    <!-- Small thin beak -->
    <path d="M29,8 L38,6 L29,9 Z" fill="#FF8F00" stroke="#E65100" stroke-width="0.5"/>
    <line x1="10" y1="14" x2="8" y2="21" stroke="#795548" stroke-width="1"/>
    <line x1="14" y1="14" x2="16" y2="21" stroke="#795548" stroke-width="1"/>
    <text x="18" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#37474F">Тростниковый</text>
  </g>

  <!-- Finch 4 - Woodpecker finch -->
  <g transform="translate(365, 208)">
    <ellipse cx="18" cy="10" rx="9" ry="6" fill="#4E342E" opacity="0.7"/>
    <circle cx="27" cy="7" r="4.5" fill="#4E342E" opacity="0.7"/>
    <!-- Medium chisel beak -->
    <path d="M30,6 L40,4 L38,9 L30,8 Z" fill="#FF8F00" stroke="#E65100" stroke-width="0.5"/>
    <line x1="9" y1="12" x2="7" y2="20" stroke="#4E342E" stroke-width="1"/>
    <line x1="13" y1="12" x2="15" y2="20" stroke="#4E342E" stroke-width="1"/>
    <text x="18" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="5.5" fill="#37474F">Дятловый</text>
  </g>

  <!-- Key insight box -->
  <rect x="25" y="260" width="310" height="48" rx="8" ry="8" fill="#ffffff" fill-opacity="0.85" stroke="#1976D2" stroke-width="1" filter="url(#shadow2)"/>
  <text x="180" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="bold" fill="#0D47A1">Ключевое наблюдение:</text>
  <text x="180" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#1565C0">Форма клюва вьюрков адаптирована к источнику пищи</text>
  <text x="180" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" fill="#1565C0">→ Естественный отбор как механизм эволюции</text>

  <!-- Darwin quote -->
  <rect x="345" y="260" width="145" height="48" rx="8" ry="8" fill="#ffffff" fill-opacity="0.85" stroke="#1976D2" stroke-width="1" filter="url(#shadow2)"/>
  <text x="417" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#0D47A1">Чарльз Дарвин</text>
  <text x="417" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#1565C0" font-style="italic">«Происхождение видов»</text>
  <text x="417" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#1565C0">1859 г.</text>

  <!-- Bottom wave decoration -->
  <path d="M0,335 Q25,328 50,335 Q75,342 100,335 Q125,328 150,335 Q175,342 200,335 Q225,328 250,335 Q275,342 300,335 Q325,328 350,335 Q375,342 400,335 Q425,328 450,335 Q475,342 500,335" stroke="#90CAF9" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>