<text x="250" y="120" font-family="Arial,sans-serif" font-size="6" fill="#66BB6A" text-anchor="middle">определяют →</text>
<text x="250" y="230" font-family="Arial,sans-serif" font-size="6" fill="#66BB6A" text-anchor="middle">← входят в →</text>

