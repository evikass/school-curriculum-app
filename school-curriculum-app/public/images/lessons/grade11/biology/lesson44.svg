<line x1="200" y1="180" x2="95" y2="180" stroke="#2E7D32" stroke-width="1.8"/>
<rect x="10" y="155" width="95" height="55" rx="8" fill="white" opacity="0.8" stroke="#43A047" stroke-width="1.5"/>
