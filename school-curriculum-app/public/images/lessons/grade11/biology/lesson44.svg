<text x="440" y="194" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Консументы →</text>
<text x="440" y="204" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Редуценты</text>

