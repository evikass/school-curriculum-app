<text x="110" y="297" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Вторичная (после наруш.)</text>
<text x="110" y="307" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Климаксное сообщество</text>

