<text x="377" y="297" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Круговорот веществ</text>
<text x="377" y="307" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle">Поток энергии, ноосфера</text>

