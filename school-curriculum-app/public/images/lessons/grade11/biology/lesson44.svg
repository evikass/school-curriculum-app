<line x1="285" y1="198" x2="370" y2="270" stroke="#2E7D32" stroke-width="1.8"/>
<rect x="310" y="258" width="135" height="55" rx="8" fill="white" opacity="0.8" stroke="#43A047" stroke-width="1.5"/>
