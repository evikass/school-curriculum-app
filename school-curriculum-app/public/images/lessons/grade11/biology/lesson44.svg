<line x1="295" y1="158" x2="390" y2="85" stroke="#2E7D32" stroke-width="1.8"/>
<rect x="340" y="55" width="130" height="50" rx="8" fill="white" opacity="0.8" stroke="#43A047" stroke-width="1.5"/>
