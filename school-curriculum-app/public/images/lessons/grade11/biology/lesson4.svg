<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <filter id="shadow4" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#2E7D32" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="embryoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C8E6C9"/>
      <stop offset="100%" style="stop-color:#A5D6A7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" ry="12" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="250" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Доказательства эволюции</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2E7D32">Эмбриологические и сравнительно-анатомические</text>
  <line x1="60" y1="46" x2="440" y2="46" stroke="#4CAF50" stroke-width="1" opacity="0.3"/>

  <!-- =================== LEFT SECTION: Embryology =================== -->
  <rect x="15" y="52" width="235" height="245" rx="8" ry="8" fill="#ffffff" fill-opacity="0.85" stroke="#66BB6A" stroke-width="1" filter="url(#shadow4)"/>
  <text x="132" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1B5E20">Закон зародышевого сходства</text>
  <text x="132" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#388E3C" font-style="italic">К. Бэр, 1828</text>

  <!-- Stage labels -->
  <text x="60" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Ранняя</text>
  <text x="60" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#2E7D32">стадия</text>
  <text x="132" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Средняя</text>
  <text x="132" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#2E7D32">стадия</text>
  <text x="210" y="97" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Поздняя</text>
  <text x="210" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#2E7D32">стадия</text>

  <!-- Row 1: Fish (Рыба) -->
  <text x="30" y="128" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Рыба</text>

  <!-- Fish early embryo - generic round -->
  <g transform="translate(50, 115)">
    <ellipse cx="10" cy="10" rx="10" ry="12" fill="url(#embryoGrad)" stroke="#4CAF50" stroke-width="1"/>
    <circle cx="8" cy="8" r="2" fill="#2E7D32"/>
    <path d="M6,12 Q10,18 14,12" stroke="#388E3C" stroke-width="0.8" fill="none"/>
    <!-- Tail bud -->
    <ellipse cx="20" cy="12" rx="4" ry="3" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.6"/>
  </g>

  <!-- Fish middle embryo -->
  <g transform="translate(120, 113)">
    <ellipse cx="12" cy="12" rx="11" ry="13" fill="url(#embryoGrad)" stroke="#4CAF50" stroke-width="1"/>
    <circle cx="9" cy="9" r="2.5" fill="#2E7D32"/>
    <path d="M7,13 Q12,19 17,13" stroke="#388E3C" stroke-width="0.8" fill="none"/>
    <!-- Gill slits -->
    <line x1="5" y1="14" x2="8" y2="14" stroke="#2E7D32" stroke-width="0.5"/>
    <line x1="5" y1="16" x2="8" y2="16" stroke="#2E7D32" stroke-width="0.5"/>
    <!-- Tail developing -->
    <path d="M22,8 Q28,5 26,12 Q28,18 22,16" fill="#81C784" stroke="#4CAF50" stroke-width="0.8"/>
  </g>

  <!-- Fish late embryo - recognizable fish -->
  <g transform="translate(192, 113)">
    <ellipse cx="14" cy="12" rx="12" ry="8" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1"/>
    <circle cx="8" cy="10" r="2" fill="#1B5E20"/>
    <!-- Gill lines -->
    <line x1="4" y1="12" x2="8" y2="12" stroke="#2E7D32" stroke-width="0.5"/>
    <line x1="4" y1="14" x2="8" y2="14" stroke="#2E7D32" stroke-width="0.5"/>
    <!-- Tail -->
    <path d="M25,6 Q32,2 30,12 Q32,22 25,18" fill="#81C784" stroke="#4CAF50" stroke-width="0.8"/>
    <!-- Fin -->
    <path d="M10,4 L14,0 L16,4" fill="#81C784" stroke="#4CAF50" stroke-width="0.5" opacity="0.7"/>
  </g>

  <!-- Row 2: Salamander (Тритон) -->
  <text x="30" y="168" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Тритон</text>

  <!-- Salamander early embryo - looks similar to fish -->
  <g transform="translate(50, 155)">
    <ellipse cx="10" cy="10" rx="10" ry="12" fill="url(#embryoGrad)" stroke="#4CAF50" stroke-width="1"/>
    <circle cx="8" cy="8" r="2" fill="#2E7D32"/>
    <path d="M6,12 Q10,18 14,12" stroke="#388E3C" stroke-width="0.8" fill="none"/>
    <ellipse cx="20" cy="12" rx="4" ry="3" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.6"/>
  </g>

  <!-- Salamander middle embryo -->
  <g transform="translate(120, 152)">
    <ellipse cx="12" cy="12" rx="11" ry="13" fill="url(#embryoGrad)" stroke="#4CAF50" stroke-width="1"/>
    <circle cx="9" cy="9" r="2.5" fill="#2E7D32"/>
    <path d="M7,13 Q12,19 17,13" stroke="#388E3C" stroke-width="0.8" fill="none"/>
    <!-- Gill slits -->
    <line x1="5" y1="14" x2="8" y2="14" stroke="#2E7D32" stroke-width="0.5"/>
    <line x1="5" y1="16" x2="8" y2="16" stroke="#2E7D32" stroke-width="0.5"/>
    <!-- Limb buds -->
    <ellipse cx="5" cy="20" rx="4" ry="2" fill="#81C784" stroke="#4CAF50" stroke-width="0.6"/>
    <ellipse cx="19" cy="20" rx="4" ry="2" fill="#81C784" stroke="#4CAF50" stroke-width="0.6"/>
    <!-- Tail -->
    <path d="M22,10 Q26,6 28,12" stroke="#4CAF50" stroke-width="1" fill="none"/>
  </g>

  <!-- Salamander late embryo - recognizable salamander -->
  <g transform="translate(192, 152)">
    <ellipse cx="12" cy="10" rx="10" ry="7" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1"/>
    <circle cx="7" cy="8" r="2" fill="#1B5E20"/>
    <!-- Legs -->
    <line x1="6" y1="15" x2="2" y2="22" stroke="#4CAF50" stroke-width="1.2"/>
    <line x1="6" y1="15" x2="4" y2="23" stroke="#4CAF50" stroke-width="0.6"/>
    <line x1="18" y1="15" x2="22" y2="22" stroke="#4CAF50" stroke-width="1.2"/>
    <line x1="18" y1="15" x2="20" y2="23" stroke="#4CAF50" stroke-width="0.6"/>
    <!-- Long tail -->
    <path d="M22,8 Q30,4 34,10 Q36,14 32,18" stroke="#4CAF50" stroke-width="1" fill="#81C784" fill-opacity="0.5"/>
    <!-- External gills -->
    <path d="M3,10 L0,6" stroke="#66BB6A" stroke-width="0.8"/>
    <path d="M4,11 L0,9" stroke="#66BB6A" stroke-width="0.8"/>
  </g>

  <!-- Row 3: Human (Человек) -->
  <text x="30" y="208" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" font-weight="bold">Человек</text>

  <!-- Human early embryo - looks similar -->
  <g transform="translate(50, 195)">
    <ellipse cx="10" cy="10" rx="10" ry="12" fill="url(#embryoGrad)" stroke="#4CAF50" stroke-width="1"/>
    <circle cx="8" cy="8" r="2" fill="#2E7D32"/>
    <path d="M6,12 Q10,18 14,12" stroke="#388E3C" stroke-width="0.8" fill="none"/>
    <ellipse cx="20" cy="12" rx="4" ry="3" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.6"/>
  </g>

  <!-- Human middle embryo -->
  <g transform="translate(120, 192)">
    <ellipse cx="12" cy="12" rx="11" ry="13" fill="url(#embryoGrad)" stroke="#4CAF50" stroke-width="1"/>
    <circle cx="9" cy="8" r="2.5" fill="#2E7D32"/>
    <path d="M7,12 Q12,18 17,12" stroke="#388E3C" stroke-width="0.8" fill="none"/>
    <!-- Gill slits (pharyngeal arches) -->
    <line x1="5" y1="14" x2="8" y2="14" stroke="#2E7D32" stroke-width="0.5"/>
    <line x1="5" y1="16" x2="8" y2="16" stroke="#2E7D32" stroke-width="0.5"/>
    <!-- Limb buds -->
    <ellipse cx="3" cy="18" rx="4" ry="2" fill="#81C784" stroke="#4CAF50" stroke-width="0.6"/>
    <ellipse cx="21" cy="18" rx="4" ry="2" fill="#81C784" stroke="#4CAF50" stroke-width="0.6"/>
    <!-- Head larger -->
    <ellipse cx="12" cy="6" rx="8" ry="6" fill="url(#embryoGrad)" stroke="#4CAF50" stroke-width="0.8"/>
  </g>

  <!-- Human late embryo - recognizable human -->
  <g transform="translate(192, 192)">
    <ellipse cx="12" cy="8" rx="8" ry="8" fill="url(#embryoGrad)" stroke="#4CAF50" stroke-width="1"/>
    <circle cx="9" cy="6" r="1.5" fill="#1B5E20"/>
    <!-- Body -->
    <ellipse cx="12" cy="18" rx="7" ry="9" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.8"/>
    <!-- Arms -->
    <path d="M5,14 L0,20" stroke="#4CAF50" stroke-width="1.2"/>
    <path d="M19,14 L24,20" stroke="#4CAF50" stroke-width="1.2"/>
    <!-- Legs -->
    <path d="M8,25 L5,32" stroke="#4CAF50" stroke-width="1.2"/>
    <path d="M16,25 L19,32" stroke="#4CAF50" stroke-width="1.2"/>
  </g>

  <!-- Bracket showing similarity at early stage -->
  <path d="M50,112 L48,112 L48,220 L50,220" stroke="#E53935" stroke-width="1.5" fill="none"/>
  <text x="44" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#E53935" transform="rotate(-90,44,170)">Сходство!</text>

  <!-- Similarity indicator arrow -->
  <path d="M50,165 Q42,165 42,165" stroke="#E53935" stroke-width="0.8" fill="none"/>

  <!-- Bottom note for embryology -->
  <text x="132" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#2E7D32" font-style="italic">На ранних стадиях зародыши</text>
  <text x="132" y="258" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#2E7D32" font-style="italic">позвоночных сходны между собой</text>
  <text x="132" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#388E3C">Жаберные щели → у рыб: жабры</text>
  <text x="132" y="282" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#388E3C">У человека: евстахиева труба</text>

  <!-- =================== RIGHT SECTION: Homologous Organs =================== -->
  <rect x="260" y="52" width="225" height="245" rx="8" ry="8" fill="#ffffff" fill-opacity="0.85" stroke="#66BB6A" stroke-width="1" filter="url(#shadow4)"/>
  <text x="372" y="70" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1B5E20">Гомологичные органы</text>
  <text x="372" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#388E3C">Общее происхождение, разные функции</text>

  <!-- Bone color coding legend -->
  <rect x="275" y="90" width="10" height="6" rx="1" fill="#E53935"/>
  <text x="288" y="96" font-family="Arial, sans-serif" font-size="6" fill="#37474F">Плечевая</text>
  <rect x="335" y="90" width="10" height="6" rx="1" fill="#1565C0"/>
  <text x="348" y="96" font-family="Arial, sans-serif" font-size="6" fill="#37474F">Лучевая/Локтевая</text>
  <rect x="415" y="90" width="10" height="6" rx="1" fill="#2E7D32"/>
  <text x="428" y="96" font-family="Arial, sans-serif" font-size="6" fill="#37474F">Кисть</text>

  <!-- Human Arm (Рука) -->
  <g transform="translate(280, 105)">
    <text x="20" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Рука</text>
    <text x="20" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#388E3C">Человек</text>
    <!-- Humerus -->
    <rect x="16" y="14" width="8" height="35" rx="3" fill="#E53935" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
    <!-- Radius and Ulna -->
    <rect x="11" y="50" width="5" height="30" rx="2" fill="#1565C0" opacity="0.7" stroke="#0D47A1" stroke-width="0.5"/>
    <rect x="20" y="50" width="5" height="30" rx="2" fill="#1565C0" opacity="0.7" stroke="#0D47A1" stroke-width="0.5"/>
    <!-- Hand -->
    <rect x="9" y="80" width="18" height="12" rx="2" fill="#2E7D32" opacity="0.6" stroke="#1B5E20" stroke-width="0.5"/>
    <!-- Fingers -->
    <rect x="9" y="92" width="3" height="12" rx="1" fill="#2E7D32" opacity="0.5"/>
    <rect x="13" y="92" width="3" height="14" rx="1" fill="#2E7D32" opacity="0.5"/>
    <rect x="17" y="92" width="3" height="13" rx="1" fill="#2E7D32" opacity="0.5"/>
    <rect x="21" y="92" width="3" height="11" rx="1" fill="#2E7D32" opacity="0.5"/>
    <!-- Thumb -->
    <rect x="5" y="82" width="3" height="10" rx="1" fill="#2E7D32" opacity="0.5" transform="rotate(-20,6,82)"/>

    <!-- Labels -->
    <text x="30" y="30" font-family="Arial, sans-serif" font-size="5" fill="#C62828">Плечо</text>
    <text x="30" y="65" font-family="Arial, sans-serif" font-size="5" fill="#0D47A1">Предплечье</text>
    <text x="30" y="90" font-family="Arial, sans-serif" font-size="5" fill="#1B5E20">Кисть</text>
  </g>

  <!-- Bat Wing (Крыло) -->
  <g transform="translate(355, 105)">
    <text x="22" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Крыло</text>
    <text x="22" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#388E3C">Летучая мышь</text>
    <!-- Humerus -->
    <rect x="18" y="14" width="7" height="30" rx="3" fill="#E53935" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
    <!-- Radius and Ulna (elongated) -->
    <rect x="12" y="45" width="5" height="42" rx="2" fill="#1565C0" opacity="0.7" stroke="#0D47A1" stroke-width="0.5"/>
    <rect x="22" y="45" width="5" height="40" rx="2" fill="#1565C0" opacity="0.7" stroke="#0D47A1" stroke-width="0.5"/>
    <!-- Hand (elongated fingers with membrane) -->
    <rect x="10" y="87" width="18" height="6" rx="2" fill="#2E7D32" opacity="0.5" stroke="#1B5E20" stroke-width="0.5"/>
    <!-- Membrane wing -->
    <path d="M14,93 L4,130 L38,130 L32,93" fill="#81C784" fill-opacity="0.3" stroke="#4CAF50" stroke-width="0.8"/>
    <!-- Long finger bones in membrane -->
    <line x1="14" y1="93" x2="6" y2="128" stroke="#2E7D32" stroke-width="1.2"/>
    <line x1="20" y1="93" x2="18" y2="128" stroke="#2E7D32" stroke-width="1.2"/>
    <line x1="26" y1="93" x2="30" y2="128" stroke="#2E7D32" stroke-width="1.2"/>
    <line x1="32" y1="93" x2="38" y2="128" stroke="#2E7D32" stroke-width="1.2"/>
    <!-- Thumb (small claw) -->
    <rect x="6" y="85" width="3" height="8" rx="1" fill="#2E7D32" opacity="0.6"/>
  </g>

  <!-- Whale Flipper (Ласт) -->
  <g transform="translate(430, 105)">
    <text x="18" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1B5E20">Ласт</text>
    <text x="18" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#388E3C">Кит</text>
    <!-- Humerus (short thick) -->
    <rect x="14" y="14" width="10" height="22" rx="4" fill="#E53935" opacity="0.7" stroke="#C62828" stroke-width="0.5"/>
    <!-- Radius and Ulna (short wide) -->
    <rect x="8" y="37" width="8" height="20" rx="3" fill="#1565C0" opacity="0.7" stroke="#0D47A1" stroke-width="0.5"/>
    <rect x="20" y="37" width="8" height="20" rx="3" fill="#1565C0" opacity="0.7" stroke="#0D47A1" stroke-width="0.5"/>
    <!-- Flipper hand (flattened) -->
    <ellipse cx="18" cy="75" rx="18" ry="14" fill="#2E7D32" opacity="0.5" stroke="#1B5E20" stroke-width="0.8"/>
    <!-- Finger bones inside flipper -->
    <line x1="6" y1="68" x2="2" y2="82" stroke="#2E7D32" stroke-width="1" opacity="0.7"/>
    <line x1="11" y1="66" x2="8" y2="82" stroke="#2E7D32" stroke-width="1" opacity="0.7"/>
    <line x1="16" y1="64" x2="15" y2="82" stroke="#2E7D32" stroke-width="1" opacity="0.7"/>
    <line x1="21" y1="64" x2="22" y2="82" stroke="#2E7D32" stroke-width="1" opacity="0.7"/>
    <line x1="26" y1="66" x2="28" y2="82" stroke="#2E7D32" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- Connecting bracket showing homology -->
  <path d="M290,250 L290,255 L460,255 L460,250" stroke="#E65100" stroke-width="1.5" fill="none"/>
  <text x="375" y="266" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#E65100" font-weight="bold">Общий план строения → Общий предок</text>

  <!-- Bottom info -->
  <rect x="260" y="275" width="225" height="20" rx="4" ry="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <text x="372" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" fill="#2E7D32">Гомология ≠ Аналогия</text>

  <!-- Bottom bar -->
  <rect x="15" y="305" width="470" height="35" rx="6" ry="6" fill="#ffffff" fill-opacity="0.8" stroke="#66BB6A" stroke-width="1"/>
  <text x="250" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="7.5" font-weight="bold" fill="#1B5E20">Биогенетический закон (Геккель): «Онтогенез — краткое повторение филогенеза»</text>
  <text x="250" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="6.5" fill="#388E3C">Зародыши сходны на ранних стадиях → общность происхождения | Гомологичные органы → дивергенция</text>
</svg>