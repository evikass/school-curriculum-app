<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
<marker id="arrB2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,6 2.5,0 5" fill="#1565C0"/></marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<text x="250" y="25" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#0D47A1" text-anchor="middle">Медицинская биотехнология</text>

<!-- Section 1: Gene therapy -->
<rect x="10" y="38" width="155" height="130" rx="6" fill="white" opacity="0.7" stroke="#1565C0" stroke-width="1.2"/>
<text x="87" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle">Генная терапия</text>

<!-- Vector entering cell -->
<!-- Cell membrane -->
<ellipse cx="87" cy="90" rx="30" ry="22" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
<!-- Nucleus -->
<circle cx="87" cy="90" r="12" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/>
<text x="87" y="92" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">ядро</text>
<!-- Vector (virus) approaching -->
<polygon points="45,80 35,76 35,84" fill="#E53935" stroke="#C62828" stroke-width="0.8"/>
<line x1="35" y1="80" x2="25" y2="80" stroke="#E53935" stroke-width="1.5"/>
<text x="30" y="72" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">вектор</text>
<!-- DNA going into nucleus -->
<path d="M55 82 Q65 85 72 88" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-dasharray="2,1"/>
<text x="87" y="120" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle">Вектор (вирус) доставляет</text>
<text x="87" y="130" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle">нормальный ген в клетку</text>
<text x="87" y="140" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle">→ замена дефектного гена</text>
<text x="87" y="155" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">ex vivo (вне организма) / in vivo</text>
<text x="87" y="163" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">Пример: лечение SCID, ADA</text>

<!-- Section 2: Vaccines -->
<rect x="175" y="38" width="155" height="130" rx="6" fill="white" opacity="0.7" stroke="#1565C0" stroke-width="1.2"/>
<text x="252" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle">Вакцины нового поколения</text>

<!-- Syringe icon -->
<rect x="235" y="65" width="8" height="35" rx="2" fill="#90CAF9" stroke="#1565C0" stroke-width="1"/>
<rect x="232" y="60" width="14" height="7" rx="1" fill="#78909C"/>
<line x1="239" y1="100" x2="239" y2="110" stroke="#1565C0" stroke-width="1.5"/>
<text x="239" y="115" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">игла</text>

<!-- DNA vaccine -->
<rect x="255" y="68" width="65" height="20" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
<text x="287" y="78" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">ДНК-вакцина</text>
<text x="287" y="86" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">плазмида с геном Ag</text>

<!-- mRNA vaccine -->
<rect x="255" y="92" width="65" height="20" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8"/>
<text x="287" y="102" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#BF360C" text-anchor="middle">мРНК-вакцина</text>
<text x="287" y="110" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">мРНК → белок Ag</text>

<!-- Recombinant vaccine -->
<rect x="255" y="116" width="65" height="20" rx="3" fill="#EDE7F6" stroke="#5E35B1" stroke-width="0.8"/>
<text x="287" y="126" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#311B92" text-anchor="middle">Рекомбинантная</text>
<text x="287" y="134" font-family="Arial,sans-serif" font-size="5" fill="#5E35B1" text-anchor="middle">HBsAg (гепатит B)</text>
<text x="252" y="158" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">COVID-19: Pfizer/Moderna (мРНК)</text>
<text x="252" y="166" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">Спутник V (аденовирусный вектор)</text>

<!-- Section 3: PCR in medicine -->
<rect x="340" y="38" width="150" height="130" rx="6" fill="white" opacity="0.7" stroke="#1565C0" stroke-width="1.2"/>
<text x="415" y="55" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle">ПЦР-диагностика</text>

<!-- PCR machine simplified -->
<rect x="385" y="65" width="55" height="35" rx="4" fill="#78909C" stroke="#37474F" stroke-width="1.5"/>
<rect x="390" y="68" width="18" height="12" rx="1" fill="#4FC3F7"/>
<text x="399" y="76" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">95°</text>
<rect x="412" y="68" width="18" height="12" rx="1" fill="#81C784"/>
<text x="421" y="76" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">72°</text>
<!-- Display -->
<rect x="390" y="84" width="45" height="10" rx="1" fill="#263238"/>
<text x="412" y="92" font-family="Arial,sans-serif" font-size="5" fill="#4FC3F7" text-anchor="middle">cycl: 30/30</text>

<text x="415" y="115" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle">Выявление патогенов:</text>
<text x="415" y="125" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">• ВИЧ, гепатит B/C</text>
<text x="415" y="134" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">• SARS-CoV-2 (COVID-19)</text>
<text x="415" y="143" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">• Туберкулёз, хламидиоз</text>
<text x="415" y="155" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">• Генетические мутации</text>
<text x="415" y="163" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">• Установление родства (ДНК)</text>

<!-- Section 4: Diagnostics -->
<rect x="10" y="178" width="155" height="85" rx="5" fill="white" opacity="0.6" stroke="#1565C0" stroke-width="1"/>
<text x="87" y="195" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle">Диагностика</text>

<!-- Test strip -->
<rect x="35" y="205" width="60" height="8" rx="2" fill="white" stroke="#78909C" stroke-width="1"/>
<rect x="55" y="205" width="8" height="8" rx="1" fill="#E53935"/>
<rect x="75" y="205" width="8" height="8" rx="1" fill="#4CAF50"/>
<text x="65" y="225" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" text-anchor="middle">ИХЛА — иммунохроматография</text>

<!-- ELISA plate -->
<rect x="35" y="232" width="40" height="20" rx="1" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.8"/>
<rect x="37" y="234" width="5" height="5" fill="#4CAF50"/>
<rect x="44" y="234" width="5" height="5" fill="#FFC107"/>
<rect x="51" y="234" width="5" height="5" fill="#4CAF50"/>
<rect x="58" y="234" width="5" height="5" fill="#E0E0E0"/>
<rect x="37" y="241" width="5" height="5" fill="#E0E0E0"/>
<rect x="44" y="241" width="5" height="5" fill="#4CAF50"/>
<rect x="51" y="241" width="5" height="5" fill="#FFC107"/>
<rect x="58" y="241" width="5" height="5" fill="#4CAF50"/>
<text x="95" y="242" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">ИФА (ELISA)</text>
<text x="95" y="250" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">антитела + Аг</text>

<!-- Biochips -->
<rect x="105" y="232" width="50" height="20" rx="2" fill="#E8EAF6" stroke="#283593" stroke-width="0.8"/>
<rect x="108" y="235" width="3" height="3" fill="#5C6BC0"/>
<rect x="113" y="235" width="3" height="3" fill="#7986CB"/>
<rect x="118" y="235" width="3" height="3" fill="#5C6BC0"/>
<rect x="123" y="235" width="3" height="3" fill="#9FA8DA"/>
<rect x="128" y="235" width="3" height="3" fill="#5C6BC0"/>
<rect x="108" y="241" width="3" height="3" fill="#9FA8DA"/>
<rect x="113" y="241" width="3" height="3" fill="#5C6BC0"/>
<rect x="118" y="241" width="3" height="3" fill="#7986CB"/>
<text x="130" y="250" font-family="Arial,sans-serif" font-size="5" fill="#283593" text-anchor="middle">биочипы</text>

<!-- Section 5: Other applications -->
<rect x="175" y="178" width="315" height="85" rx="5" fill="white" opacity="0.6" stroke="#1565C0" stroke-width="1"/>
<text x="332" y="195" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle">Другие достижения медицинской биотехнологии</text>

<text x="185" y="210" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">• Рекомбинантный инсулин (Humulin, 1982) — первый ГМ-препарат</text>
<text x="185" y="222" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">• Гормон роста (соматотропин) — лечение карликовости</text>
<text x="185" y="234" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">• Интерферон — противовирусный и противоопухолевый препарат</text>
<text x="185" y="246" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">• Фактор свёртывания VIII — лечение гемофилии</text>
<text x="185" y="258" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1">• Моноклональные антитела — терапия рака (ритуксимаб, трастузумаб)</text>

<!-- Ethical issues -->
<rect x="10" y="272" width="480" height="58" rx="5" fill="#1565C0" opacity="0.08" stroke="#1565C0" stroke-width="1"/>
<text x="250" y="288" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1" text-anchor="middle">Этические и социальные вопросы</text>
<text x="25" y="302" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">• Безопасность генной терапии (риск插入ного мутагенеза, иммунный ответ на вектор)</text>
<text x="25" y="314" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">• Доступность дорогих биопрепаратов, патенты на гены, генетическая дискриминация</text>
<text x="25" y="326" font-family="Arial,sans-serif" font-size="7" fill="#1565C0">• Редактирование генома (CRISPR-Cas9) — терапия vs. «дизайнерские» дети</text>
<text x="250" y="342" font-family="Arial,sans-serif" font-size="7" fill="#64B5F6" text-anchor="middle">Урок 41 · Медицинская биотехнология</text>
</svg>