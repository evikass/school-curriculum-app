<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs><linearGradient id="bg20" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
  <rect width="400" height="300" fill="url(#bg20)"/>
  <text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Автоколебания</text>
  <!-- System diagram -->
  <rect x="50" y="40" width="120" height="40" rx="8" fill="#55efc4" opacity="0.2" stroke="#55efc4" stroke-width="1.5"/>
  <text x="110" y="65" text-anchor="middle" fill="#55efc4" font-size="10">Колеб. система</text>
  <rect x="230" y="40" width="120" height="40" rx="8" fill="#ff7675" opacity="0.2" stroke="#ff7675" stroke-width="1.5"/>
  <text x="290" y="65" text-anchor="middle" fill="#ff7675" font-size="10">Источник энергии</text>
  <rect x="140" y="110" width="120" height="35" rx="8" fill="#ffd700" opacity="0.2" stroke="#ffd700" stroke-width="1.5"/>
  <text x="200" y="132" text-anchor="middle" fill="#ffd700" font-size="10">Клапан</text>
  <!-- Arrows showing feedback -->
  <line x1="110" y1="80" x2="170" y2="110" stroke="#55efc4" stroke-width="1.5"/>
  <polygon points="168,107 175,112 167,114" fill="#55efc4"/>
  <line x1="230" y1="110" x2="290" y2="80" stroke="#ff7675" stroke-width="1.5"/>
  <polygon points="287,83 295,78 292,87" fill="#ff7675"/>
  <!-- Feedback arrow from system to valve -->
  <path d="M70,80 L70,127 L140,127" fill="none" stroke="#a29bfe" stroke-width="1.5"/>
  <polygon points="137,124 145,127 137,130" fill="#a29bfe"/>
  <text x="50" y="110" fill="#a29bfe" font-size="8">Обратная</text>
  <text x="50" y="120" fill="#a29bfe" font-size="8">связь</text>
  <!-- Pendulum clock example -->
  <text x="110" y="175" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Маятниковые часы</text>
  <!-- Clock mechanism -->
  <line x1="60" y1="195" x2="100" y2="250" stroke="#dfe6e9" stroke-width="1.5"/>
  <circle cx="100" cy="250" r="8" fill="#74b9ff"/>
  <!-- Escapement wheel -->
  <circle cx="55" cy="220" r="15" fill="none" stroke="#ffd700" stroke-width="1.5"/>
  <line x1="55" y1="205" x2="55" y2="210" stroke="#ffd700" stroke-width="1"/>
  <line x1="55" y1="230" x2="55" y2="235" stroke="#ffd700" stroke-width="1"/>
  <line x1="40" y1="220" x2="45" y2="220" stroke="#ffd700" stroke-width="1"/>
  <line x1="65" y1="220" x2="70" y2="220" stroke="#ffd700" stroke-width="1"/>
  <text x="55" y="245" text-anchor="middle" fill="#ffd700" font-size="7">храповик</text>
  <!-- Weight -->
  <rect x="120" y="220" width="20" height="25" rx="2" fill="#636e72"/>
  <line x1="130" y1="220" x2="130" y2="195" stroke="#636e72" stroke-width="1"/>
  <text x="130" y="258" text-anchor="middle" fill="#636e72" font-size="7">гиря</text>
  <!-- Electric bell -->
  <text x="300" y="175" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Электр. звонок</text>
  <!-- Bell body -->
  <path d="M270,230 Q270,200 300,195 Q330,200 330,230 Z" fill="none" stroke="#ffd700" stroke-width="1.5"/>
  <text x="300" y="225" text-anchor="middle" fill="#ffd700" font-size="10">~</text>
  <!-- Hammer -->
  <line x1="260" y1="215" x2="270" y2="215" stroke="#dfe6e9" stroke-width="2"/>
  <circle cx="257" cy="215" r="3" fill="#ff7675"/>
  <!-- Electromagnet -->
  <rect x="240" y="235" width="30" height="15" rx="3" fill="#74b9ff" opacity="0.4" stroke="#74b9ff" stroke-width="1"/>
  <text x="255" y="246" text-anchor="middle" fill="#74b9ff" font-size="7">EM</text>
  <!-- Contact -->
  <line x1="255" y1="250" x2="255" y2="265" stroke="#ff7675" stroke-width="1"/>
  <line x1="255" y1="265" x2="280" y2="265" stroke="#ff7675" stroke-width="1"/>
  <text x="267" y="278" text-anchor="middle" fill="#636e72" font-size="7">контакт</text>
  <!-- Key point -->
  <text x="200" y="290" text-anchor="middle" fill="#55efc4" font-size="10">Система сама поддерживает незатухающие колебания</text>
</svg>