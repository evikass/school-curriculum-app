<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Глаз и оптические приборы</text>
<!-- Eye diagram -->
<ellipse cx="120" cy="100" rx="50" ry="35" fill="#2d3436" stroke="#74b9ff" stroke-width="1.5"/>
<circle cx="100" cy="100" r="8" fill="#55efc4" opacity="0.5" stroke="#55efc4" stroke-width="1"/>
<text x="100" y="103" text-anchor="middle" fill="#2d3436" font-size="6">зрачок</text>
<ellipse cx="108" cy="100" rx="8" ry="6" fill="none" stroke="#74b9ff" stroke-width="1.5"/>
<text x="108" y="80" fill="#74b9ff" font-size="7">хрусталик</text>
<line x1="145" y1="100" x2="160" y2="100" stroke="#ff7675" stroke-width="2"/>
<text x="153" y="90" fill="#ff7675" font-size="7">сетчатка</text>
<text x="120" y="150" text-anchor="middle" fill="#636e72" font-size="7">Глаз: F~17мм, аккомодация</text>
<!-- Vision defects -->
<text x="300" y="48" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Дефекты зрения</text>
<!-- Myopia -->
<rect x="220" y="55" width="80" height="50" rx="5" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1"/>
<text x="260" y="72" text-anchor="middle" fill="#ff7675" font-size="8" font-weight="bold">Близорукость</text>
<path d="M235,82 Q250,90 260,82 Q270,75 285,82" fill="none" stroke="#ffd700" stroke-width="1"/>
<circle cx="260" cy="78" r="2" fill="#ff7675"/>
<text x="260" y="100" text-anchor="middle" fill="#636e72" font-size="7">линза: D &lt; 0</text>
<!-- Hyperopia -->
<rect x="310" y="55" width="80" height="50" rx="5" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1"/>
<text x="350" y="72" text-anchor="middle" fill="#55efc4" font-size="8" font-weight="bold">Дальнозоркость</text>
<path d="M325,85 Q340,78 350,85 Q360,92 375,85" fill="none" stroke="#ffd700" stroke-width="1"/>
<circle cx="350" cy="88" r="2" fill="#55efc4"/>
<text x="350" y="100" text-anchor="middle" fill="#636e72" font-size="7">линза: D &gt; 0</text>
<!-- Instruments -->
<rect x="20" y="165" width="360" height="125" rx="8" fill="#2d3436" opacity="0.6"/>
<text x="200" y="185" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Оптические приборы</text>
<text x="100" y="205" fill="#55efc4" font-size="9" font-weight="bold">Лупа</text>
<text x="100" y="218" fill="#636e72" font-size="7">1 линза, d &lt; F</text>
<text x="100" y="230" fill="#636e72" font-size="7">увеличение до 25x</text>
<text x="250" y="205" fill="#74b9ff" font-size="9" font-weight="bold">Микроскоп</text>
<text x="250" y="218" fill="#636e72" font-size="7">объектив + окуляр</text>
<text x="250" y="230" fill="#636e72" font-size="7">увеличение до 2000x</text>
<text x="100" y="255" fill="#ff7675" font-size="9" font-weight="bold">Телескоп-рефрактор</text>
<text x="100" y="268" fill="#636e72" font-size="7">линза + окуляр</text>
<text x="250" y="255" fill="#a29bfe" font-size="9" font-weight="bold">Телескоп-рефлектор</text>
<text x="250" y="268" fill="#636e72" font-size="7">зеркало + окуляр</text>
<text x="200" y="285" text-anchor="middle" fill="#ffd700" font-size="8">Г = F_об/F_ок (телескоп)</text>
</svg>