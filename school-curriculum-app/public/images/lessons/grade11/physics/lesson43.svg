<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Состав ядра</text>
<!-- Nucleus model -->
<circle cx="120" cy="90" r="40" fill="#2d3436" opacity="0.5" stroke="#636e72" stroke-width="1"/>
<circle cx="105" cy="80" r="7" fill="#ff7675" stroke="#fab1a0" stroke-width="1"/>
<text x="105" y="83" text-anchor="middle" fill="#fff" font-size="7">p+</text>
<circle cx="125" cy="75" r="7" fill="#ff7675" stroke="#fab1a0" stroke-width="1"/>
<text x="125" y="78" text-anchor="middle" fill="#fff" font-size="7">p+</text>
<circle cx="140" cy="88" r="7" fill="#74b9ff" stroke="#a29bfe" stroke-width="1"/>
<text x="140" y="91" text-anchor="middle" fill="#fff" font-size="6">n</text>
<circle cx="110" cy="100" r="7" fill="#74b9ff" stroke="#a29bfe" stroke-width="1"/>
<text x="110" y="103" text-anchor="middle" fill="#fff" font-size="6">n</text>
<circle cx="130" cy="100" r="7" fill="#ff7675" stroke="#fab1a0" stroke-width="1"/>
<text x="130" y="103" text-anchor="middle" fill="#fff" font-size="7">p+</text>
<circle cx="115" cy="112" r="7" fill="#74b9ff" stroke="#a29bfe" stroke-width="1"/>
<text x="115" y="115" text-anchor="middle" fill="#fff" font-size="6">n</text>
<!-- Electron cloud -->
<ellipse cx="120" cy="90" rx="65" ry="50" fill="none" stroke="#55efc4" stroke-width="0.5" stroke-dasharray="3,3"/>
<circle cx="180" cy="70" r="3" fill="#55efc4"/>
<text x="188" y="68" fill="#55efc4" font-size="7">e-</text>
<!-- Notation -->
<text x="300" y="55" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Обозначение</text>
<text x="300" y="90" text-anchor="middle" fill="#55efc4" font-size="24" font-weight="bold">A</text>
<text x="300" y="90" text-anchor="start" fill="#ff7675" font-size="14">Z</text>
<text x="300" y="95" text-anchor="middle" fill="#dfe6e9" font-size="18" font-weight="bold">X</text>
<text x="300" y="120" text-anchor="middle" fill="#636e72" font-size="8">A = Z + N (нуклоны)</text>
<!-- Isotopes -->
<text x="200" y="155" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Изотопы водорода</text>
<rect x="20" y="165" width="110" height="50" rx="5" fill="#55efc4" opacity="0.1" stroke="#55efc4" stroke-width="1"/>
<text x="75" y="182" text-anchor="middle" fill="#55efc4" font-size="9" font-weight="bold">Протий H-1</text>
<text x="75" y="198" text-anchor="middle" fill="#dfe6e9" font-size="7">Z=1, N=0</text>
<rect x="145" y="165" width="110" height="50" rx="5" fill="#74b9ff" opacity="0.1" stroke="#74b9ff" stroke-width="1"/>
<text x="200" y="182" text-anchor="middle" fill="#74b9ff" font-size="9" font-weight="bold">Дейтерий H-2</text>
<text x="200" y="198" text-anchor="middle" fill="#dfe6e9" font-size="7">Z=1, N=1</text>
<rect x="270" y="165" width="110" height="50" rx="5" fill="#ff7675" opacity="0.1" stroke="#ff7675" stroke-width="1"/>
<text x="325" y="182" text-anchor="middle" fill="#ff7675" font-size="9" font-weight="bold">Тритий H-3</text>
<text x="325" y="198" text-anchor="middle" fill="#dfe6e9" font-size="7">Z=1, N=2</text>
<!-- Binding energy -->
<text x="200" y="235" text-anchor="middle" fill="#ffeaa7" font-size="10" font-weight="bold">Энергия связи</text>
<text x="200" y="255" text-anchor="middle" fill="#55efc4" font-size="14" font-weight="bold">E_св = dm * c2</text>
<text x="200" y="275" text-anchor="middle" fill="#636e72" font-size="8">dm = Zm_p + Nm_n - M_ядра (дефект массы)</text>
<text x="200" y="290" text-anchor="middle" fill="#ff7675" font-size="8">Макс. E_св/A у Fe-56 (8,8 МэВ/нуклон)</text>
</svg>