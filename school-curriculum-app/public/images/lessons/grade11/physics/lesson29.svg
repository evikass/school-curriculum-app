<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#0d1b2a"/><stop offset="100%" style="stop-color:#1b263b"/></linearGradient></defs>
<rect width="400" height="300" fill="url(#bg)"/>
<text x="200" y="22" text-anchor="middle" fill="#ffeaa7" font-size="12" font-weight="bold">Отражение и преломление света</text>
<!-- Surface -->
<line x1="30" y1="130" x2="370" y2="130" stroke="#636e72" stroke-width="2"/>
<text x="200" y="145" text-anchor="middle" fill="#636e72" font-size="8">граница сред</text>
<text x="200" y="120" text-anchor="middle" fill="#74b9ff" font-size="9">n1 (воздух)</text>
<text x="200" y="160" text-anchor="middle" fill="#55efc4" font-size="9">n2 (стекло, n2 > n1)</text>
<!-- Normal -->
<line x1="200" y1="50" x2="200" y2="220" stroke="#dfe6e9" stroke-width="0.5" stroke-dasharray="3,3"/>
<text x="210" y="55" fill="#dfe6e9" font-size="7">нормаль</text>
<!-- Incident ray -->
<line x1="120" y1="50" x2="200" y2="130" stroke="#ffd700" stroke-width="2"/>
<polygon points="195,125 200,130 193,130" fill="#ffd700"/>
<text x="140" y="70" fill="#ffd700" font-size="9">падающий</text>
<!-- Reflected ray -->
<line x1="200" y1="130" x2="280" y2="50" stroke="#ff7675" stroke-width="2"/>
<polygon points="277,55 280,50 283,57" fill="#ff7675"/>
<text x="260" y="70" fill="#ff7675" font-size="9">отражённый</text>
<!-- Refracted ray -->
<line x1="200" y1="130" x2="230" y2="210" stroke="#55efc4" stroke-width="2"/>
<polygon points="227,205 230,210 233,203" fill="#55efc4"/>
<text x="248" y="200" fill="#55efc4" font-size="9">преломлённый</text>
<!-- Angles -->
<path d="M200,100 Q190,100 190,110" fill="none" stroke="#ffd700" stroke-width="1"/>
<text x="178" y="100" fill="#ffd700" font-size="8">a</text>
<path d="M200,100 Q210,100 210,110" fill="none" stroke="#ff7675" stroke-width="1"/>
<text x="218" y="100" fill="#ff7675" font-size="8">a</text>
<path d="M200,160 Q205,155 210,160" fill="none" stroke="#55efc4" stroke-width="1"/>
<text x="218" y="170" fill="#55efc4" font-size="8">b</text>
<!-- Formulas -->
<rect x="20" y="230" width="175" height="60" rx="8" fill="#2d3436" opacity="0.7"/>
<text x="107" y="250" text-anchor="middle" fill="#ff7675" font-size="10" font-weight="bold">Закон отражения</text>
<text x="107" y="270" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">a_пад = a_отр</text>
<rect x="205" y="230" width="175" height="60" rx="8" fill="#2d3436" opacity="0.7"/>
<text x="292" y="250" text-anchor="middle" fill="#55efc4" font-size="10" font-weight="bold">Закон преломления</text>
<text x="292" y="270" text-anchor="middle" fill="#74b9ff" font-size="11" font-weight="bold">n1*sin(a)=n2*sin(b)</text>
</svg>