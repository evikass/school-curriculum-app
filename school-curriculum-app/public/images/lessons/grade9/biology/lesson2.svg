<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg2)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#E65100" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#E65100"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Урок 2: Развитие биологии</text>

  <!-- Timeline line -->
  <line x1="40" y1="170" x2="460" y2="170" stroke="#BF360C" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow at end -->
  <polygon points="460,170 450,164 450,176" fill="#BF360C"/>

  <!-- Timeline markers -->
  <!-- Аристотель ~384-322 до н.э. -->
  <g filter="url(#shadow2)">
    <circle cx="90" cy="170" r="8" fill="#FF8F00" stroke="#E65100" stroke-width="2"/>
    <line x1="90" y1="130" x2="90" y2="162" stroke="#E65100" stroke-width="1.5"/>
    <!-- Bust silhouette -->
    <ellipse cx="90" cy="88" rx="14" ry="17" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
    <path d="M76,105 Q76,82 90,78 Q104,82 104,105" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
    <circle cx="85" cy="90" r="1.5" fill="#5D4037"/>
    <circle cx="95" cy="90" r="1.5" fill="#5D4037"/>
    <path d="M85,96 Q90,99 95,96" fill="none" stroke="#5D4037" stroke-width="1"/>
    <!-- Laurel wreath hint -->
    <path d="M78,82 Q72,75 76,68" fill="none" stroke="#558B2F" stroke-width="1.5"/>
    <path d="M102,82 Q108,75 104,68" fill="none" stroke="#558B2F" stroke-width="1.5"/>
    <ellipse cx="75" cy="73" rx="4" ry="6" fill="#7CB342" transform="rotate(-20,75,73)"/>
    <ellipse cx="105" cy="73" rx="4" ry="6" fill="#7CB342" transform="rotate(20,105,73)"/>
  </g>
  <text x="90" y="122" text-anchor="middle" fill="#BF360C" font-size="12" font-weight="bold">Аристотель</text>
  <text x="90" y="190" text-anchor="middle" fill="#E65100" font-size="9">384-322 до н.э.</text>
  <text x="90" y="203" text-anchor="middle" fill="#BF360C" font-size="8">Классификация</text>
  <text x="90" y="214" text-anchor="middle" fill="#BF360C" font-size="8">животных</text>

  <!-- Линней 1707-1778 -->
  <g filter="url(#shadow2)">
    <circle cx="200" cy="170" r="8" fill="#FF8F00" stroke="#E65100" stroke-width="2"/>
    <line x1="200" y1="130" x2="200" y2="162" stroke="#E65100" stroke-width="1.5"/>
    <!-- Bust silhouette -->
    <ellipse cx="200" cy="88" rx="14" ry="17" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
    <path d="M186,105 Q186,82 200,78 Q214,82 214,105" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
    <circle cx="195" cy="90" r="1.5" fill="#5D4037"/>
    <circle cx="205" cy="90" r="1.5" fill="#5D4037"/>
    <path d="M195,96 Q200,99 205,96" fill="none" stroke="#5D4037" stroke-width="1"/>
    <!-- Wig/period hair -->
    <path d="M186,82 Q186,72 200,70 Q214,72 214,82" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  </g>
  <text x="200" y="122" text-anchor="middle" fill="#BF360C" font-size="12" font-weight="bold">Линней</text>
  <text x="200" y="190" text-anchor="middle" fill="#E65100" font-size="9">1707-1778</text>
  <text x="200" y="203" text-anchor="middle" fill="#BF360C" font-size="8">Бинарная</text>
  <text x="200" y="214" text-anchor="middle" fill="#BF360C" font-size="8">номенклатура</text>

  <!-- Ламарк 1744-1829 -->
  <g filter="url(#shadow2)">
    <circle cx="310" cy="170" r="8" fill="#FF8F00" stroke="#E65100" stroke-width="2"/>
    <line x1="310" y1="130" x2="310" y2="162" stroke="#E65100" stroke-width="1.5"/>
    <!-- Bust silhouette -->
    <ellipse cx="310" cy="88" rx="14" ry="17" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
    <path d="M296,105 Q296,82 310,78 Q324,82 324,105" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
    <circle cx="305" cy="90" r="1.5" fill="#5D4037"/>
    <circle cx="315" cy="90" r="1.5" fill="#5D4037"/>
    <path d="M305,96 Q310,99 315,96" fill="none" stroke="#5D4037" stroke-width="1"/>
    <!-- Period hair -->
    <path d="M296,82 Q296,72 310,70 Q324,72 324,82" fill="#BCAAA4" stroke="#5D4037" stroke-width="0.8"/>
  </g>
  <text x="310" y="122" text-anchor="middle" fill="#BF360C" font-size="12" font-weight="bold">Ламарк</text>
  <text x="310" y="190" text-anchor="middle" fill="#E65100" font-size="9">1744-1829</text>
  <text x="310" y="203" text-anchor="middle" fill="#BF360C" font-size="8">Теория эволюции</text>
  <text x="310" y="214" text-anchor="middle" fill="#BF360C" font-size="8">(упражнение органов)</text>

  <!-- Дарвин 1809-1882 -->
  <g filter="url(#shadow2)">
    <circle cx="420" cy="170" r="8" fill="#FF8F00" stroke="#E65100" stroke-width="2"/>
    <line x1="420" y1="130" x2="420" y2="162" stroke="#E65100" stroke-width="1.5"/>
    <!-- Bust silhouette - beard for Darwin -->
    <ellipse cx="420" cy="85" rx="14" ry="15" fill="#FFCC80" stroke="#E65100" stroke-width="1.5"/>
    <path d="M406,100 Q406,82 420,78 Q434,82 434,100" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
    <circle cx="415" cy="87" r="1.5" fill="#5D4037"/>
    <circle cx="425" cy="87" r="1.5" fill="#5D4037"/>
    <!-- Darwin's distinctive beard -->
    <path d="M410,95 Q410,108 420,110 Q430,108 430,95" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
    <!-- Bald/top hair -->
    <path d="M406,80 Q406,72 420,70 Q434,72 434,80" fill="#BCAAA4" stroke="#5D4037" stroke-width="0.8"/>
  </g>
  <text x="420" y="122" text-anchor="middle" fill="#BF360C" font-size="12" font-weight="bold">Дарвин</text>
  <text x="420" y="190" text-anchor="middle" fill="#E65100" font-size="9">1809-1882</text>
  <text x="420" y="203" text-anchor="middle" fill="#BF360C" font-size="8">Естественный</text>
  <text x="420" y="214" text-anchor="middle" fill="#BF360C" font-size="8">отбор</text>

  <!-- Progress arrow label -->
  <text x="250" y="245" text-anchor="middle" fill="#BF360C" font-size="10" font-style="italic">Развитие биологических знаний →</text>

  <!-- Bottom info box -->
  <rect x="30" y="260" width="440" height="75" rx="8" fill="white" fill-opacity="0.7" stroke="#E65100" stroke-width="1"/>
  <text x="250" y="280" text-anchor="middle" fill="#BF360C" font-size="10" font-weight="bold">Ключевые этапы развития биологии</text>
  <text x="50" y="298" fill="#5D4037" font-size="9">• Описательный период — наблюдение и классификация (Аристотель, Линней)</text>
  <text x="50" y="312" fill="#5D4037" font-size="9">• Эволюционный период — идея изменяемости видов (Ламарк)</text>
  <text x="50" y="326" fill="#5D4037" font-size="9">• Дарвинизм — научная теория эволюции на основе естественного отбора</text>
</svg>