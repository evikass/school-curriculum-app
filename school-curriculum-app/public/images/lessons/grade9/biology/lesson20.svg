<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE7F6"/>
      <stop offset="100%" stop-color="#D1C4E9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg20)" rx="8"/>
  <text x="250" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="#4A148C">Деление клетки</text>
  <line x1="140" y1="30" x2="360" y2="30" stroke="#6A1B9A" stroke-width="1"/>

  <!-- MITOSIS SECTION -->
  <text x="250" y="46" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A148C">Митоз — соматическое деление (2n → 2n)</text>

  <!-- Phase 1: Профаза -->
  <rect x="10" y="55" width="115" height="115" rx="6" fill="#D1C4E9" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="67" y="70" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Профаза</text>
  <!-- Cell -->
  <ellipse cx="67" cy="110" rx="30" ry="28" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <!-- Chromosomes condensing -->
  <line x1="55" y1="98" x2="62" y2="108" stroke="#E53935" stroke-width="2.5"/>
  <line x1="72" y1="95" x2="78" y2="105" stroke="#1E88E5" stroke-width="2.5"/>
  <line x1="60" y1="112" x2="55" y2="122" stroke="#E53935" stroke-width="2.5"/>
  <line x1="75" y1="112" x2="80" y2="122" stroke="#1E88E5" stroke-width="2.5"/>
  <!-- Nuclear envelope dissolving -->
  <ellipse cx="67" cy="108" rx="22" ry="18" fill="none" stroke="#9C27B0" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="67" y="150" text-anchor="middle" font-size="6" fill="#4A148C">Хромосомы</text>
  <text x="67" y="158" text-anchor="middle" font-size="6" fill="#4A148C">уплотняются</text>
  <text x="67" y="166" text-anchor="middle" font-size="6" fill="#4A148C">Яд. оболочка ↓</text>

  <!-- Arrow -->
  <line x1="128" y1="110" x2="135" y2="110" stroke="#7B1FA2" stroke-width="2"/>
  <polygon points="135,110 130,106 130,114" fill="#7B1FA2"/>

  <!-- Phase 2: Метафаза -->
  <rect x="138" y="55" width="115" height="115" rx="6" fill="#D1C4E9" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="195" y="70" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Метафаза</text>
  <ellipse cx="195" cy="110" rx="30" ry="28" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <!-- Equatorial plate -->
  <line x1="192" y1="92" x2="192" y2="128" stroke="#9C27B0" stroke-width="0.8" stroke-dasharray="2,1"/>
  <!-- Chromosomes at equator -->
  <line x1="185" y1="98" x2="190" y2="108" stroke="#E53935" stroke-width="2.5"/>
  <line x1="190" y1="108" x2="185" y2="118" stroke="#E53935" stroke-width="2.5"/>
  <line x1="199" y1="98" x2="194" y2="108" stroke="#1E88E5" stroke-width="2.5"/>
  <line x1="194" y1="108" x2="199" y2="118" stroke="#1E88E5" stroke-width="2.5"/>
  <!-- Spindle fibers -->
  <line x1="178" y1="95" x2="188" y2="103" stroke="#9C27B0" stroke-width="0.5" stroke-dasharray="1,1"/>
  <line x1="212" y1="95" x2="202" y2="103" stroke="#9C27B0" stroke-width="0.5" stroke-dasharray="1,1"/>
  <line x1="178" y1="125" x2="188" y2="117" stroke="#9C27B0" stroke-width="0.5" stroke-dasharray="1,1"/>
  <line x1="212" y1="125" x2="202" y2="117" stroke="#9C27B0" stroke-width="0.5" stroke-dasharray="1,1"/>
  <text x="195" y="150" text-anchor="middle" font-size="6" fill="#4A148C">Хромосомы на</text>
  <text x="195" y="158" text-anchor="middle" font-size="6" fill="#4A148C">экваторе</text>
  <text x="195" y="166" text-anchor="middle" font-size="6" fill="#4A148C">Веретено деления</text>

  <!-- Arrow -->
  <line x1="256" y1="110" x2="263" y2="110" stroke="#7B1FA2" stroke-width="2"/>
  <polygon points="263,110 258,106 258,114" fill="#7B1FA2"/>

  <!-- Phase 3: Анафаза -->
  <rect x="266" y="55" width="115" height="115" rx="6" fill="#D1C4E9" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="323" y="70" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Анафаза</text>
  <ellipse cx="323" cy="110" rx="30" ry="28" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <!-- Chromatids separating -->
  <line x1="310" y1="93" x2="307" y2="103" stroke="#E53935" stroke-width="2.5"/>
  <line x1="307" y1="103" x2="304" y2="113" stroke="#E53935" stroke-width="2.5"/>
  <line x1="310" y1="113" x2="307" y2="123" stroke="#E53935" stroke-width="2.5"/>
  <line x1="336" y1="93" x2="339" y2="103" stroke="#1E88E5" stroke-width="2.5"/>
  <line x1="339" y1="103" x2="342" y2="113" stroke="#1E88E5" stroke-width="2.5"/>
  <line x1="336" y1="113" x2="339" y2="123" stroke="#1E88E5" stroke-width="2.5"/>
  <!-- Spindle -->
  <line x1="323" y1="92" x2="308" y2="100" stroke="#9C27B0" stroke-width="0.5" stroke-dasharray="1,1"/>
  <line x1="323" y1="92" x2="338" y2="100" stroke="#9C27B0" stroke-width="0.5" stroke-dasharray="1,1"/>
  <line x1="323" y1="128" x2="308" y2="118" stroke="#9C27B0" stroke-width="0.5" stroke-dasharray="1,1"/>
  <line x1="323" y1="128" x2="338" y2="118" stroke="#9C27B0" stroke-width="0.5" stroke-dasharray="1,1"/>
  <text x="323" y="150" text-anchor="middle" font-size="6" fill="#4A148C">Хроматиды</text>
  <text x="323" y="158" text-anchor="middle" font-size="6" fill="#4A148C">расходятся</text>
  <text x="323" y="166" text-anchor="middle" font-size="6" fill="#4A148C">к полюсам</text>

  <!-- Arrow -->
  <line x1="384" y1="110" x2="391" y2="110" stroke="#7B1FA2" stroke-width="2"/>
  <polygon points="391,110 386,106 386,114" fill="#7B1FA2"/>

  <!-- Phase 4: Телофаза -->
  <rect x="394" y="55" width="98" height="115" rx="6" fill="#D1C4E9" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="443" y="70" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Телофаза</text>
  <!-- Two new cells forming -->
  <ellipse cx="430" cy="110" rx="22" ry="26" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <ellipse cx="456" cy="110" rx="22" ry="26" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <!-- Nuclei reforming -->
  <ellipse cx="430" cy="108" rx="10" ry="8" fill="none" stroke="#9C27B0" stroke-width="0.8"/>
  <ellipse cx="456" cy="108" rx="10" ry="8" fill="none" stroke="#9C27B0" stroke-width="0.8"/>
  <!-- Chromosomes decondensing -->
  <circle cx="428" cy="107" r="2" fill="#E53935"/>
  <circle cx="432" cy="110" r="2" fill="#E53935"/>
  <circle cx="454" cy="107" r="2" fill="#1E88E5"/>
  <circle cx="458" cy="110" r="2" fill="#1E88E5"/>
  <text x="443" y="150" text-anchor="middle" font-size="6" fill="#4A148C">2 дочерние</text>
  <text x="443" y="158" text-anchor="middle" font-size="6" fill="#4A148C">клетки 2n</text>
  <text x="443" y="166" text-anchor="middle" font-size="6" fill="#4A148C">Ядра восстан.</text>

  <!-- MEIOSIS SECTION -->
  <rect x="10" y="180" width="480" height="162" rx="8" fill="#F3E5F5" fill-opacity="0.4" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="250" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A148C">Мейоз — редукционное деление (2n → n)</text>

  <!-- Meiosis I -->
  <text x="130" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="#6A1B9A">Мейоз I (редукционный)</text>
  
  <!-- Before -->
  <ellipse cx="35" cy="248" rx="18" ry="16" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <line x1="28" y1="240" x2="32" y2="248" stroke="#E53935" stroke-width="2"/>
  <line x1="38" y1="240" x2="42" y2="248" stroke="#1E88E5" stroke-width="2"/>
  <text x="35" y="272" text-anchor="middle" font-size="7" fill="#4A148C">2n4c</text>

  <text x="58" y="248" font-size="12" fill="#7B1FA2">→</text>

  <!-- After Meiosis I - 2 cells -->
  <ellipse cx="85" cy="240" rx="14" ry="14" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <line x1="80" y1="234" x2="83" y2="240" stroke="#E53935" stroke-width="2"/>
  <line x1="87" y1="234" x2="90" y2="240" stroke="#E53935" stroke-width="2"/>
  <ellipse cx="85" cy="262" rx="14" ry="14" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <line x1="80" y1="256" x2="83" y2="262" stroke="#1E88E5" stroke-width="2"/>
  <line x1="87" y1="256" x2="90" y2="262" stroke="#1E88E5" stroke-width="2"/>
  <text x="85" y="284" text-anchor="middle" font-size="7" fill="#4A148C">n2c</text>

  <text x="108" y="248" font-size="12" fill="#7B1FA2">→</text>

  <!-- Meiosis II -->
  <text x="185" y="215" text-anchor="middle" font-size="9" font-weight="bold" fill="#6A1B9A">Мейоз II (эквационный)</text>

  <!-- After Meiosis II - 4 cells -->
  <ellipse cx="135" cy="232" rx="12" ry="12" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <line x1="132" y1="228" x2="135" y2="234" stroke="#E53935" stroke-width="1.5"/>
  <ellipse cx="155" cy="232" rx="12" ry="12" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <line x1="152" y1="228" x2="155" y2="234" stroke="#E53935" stroke-width="1.5"/>
  <ellipse cx="135" cy="260" rx="12" ry="12" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <line x1="132" y1="256" x2="135" y2="262" stroke="#1E88E5" stroke-width="1.5"/>
  <ellipse cx="155" cy="260" rx="12" ry="12" fill="#E8EAF6" fill-opacity="0.5" stroke="#3F51B5" stroke-width="1"/>
  <line x1="152" y1="256" x2="155" y2="262" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="145" y="284" text-anchor="middle" font-size="7" fill="#4A148C">nc × 4</text>

  <!-- Comparison table -->
  <rect x="225" y="218" width="255" height="118" rx="5" fill="#EDE7F6" fill-opacity="0.5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="352" y="233" text-anchor="middle" font-size="9" font-weight="bold" fill="#4A148C">Сравнение митоза и мейоза</text>
  <line x1="230" y1="238" x2="475" y2="238" stroke="#9C27B0" stroke-width="0.5"/>

  <text x="280" y="250" font-size="7" font-weight="bold" fill="#4A148C">Признак</text>
  <text x="370" y="250" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A148C">Митоз</text>
  <text x="445" y="250" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A148C">Мейоз</text>
  <line x1="230" y1="254" x2="475" y2="254" stroke="#CE93D8" stroke-width="0.5"/>

  <text x="280" y="265" font-size="6.5" fill="#424242">Делений</text>
  <text x="370" y="265" text-anchor="middle" font-size="6.5" fill="#1B5E20">1</text>
  <text x="445" y="265" text-anchor="middle" font-size="6.5" fill="#C62828">2</text>

  <text x="280" y="276" font-size="6.5" fill="#424242">Дочерних клеток</text>
  <text x="370" y="276" text-anchor="middle" font-size="6.5" fill="#1B5E20">2</text>
  <text x="445" y="276" text-anchor="middle" font-size="6.5" fill="#C62828">4</text>

  <text x="280" y="287" font-size="6.5" fill="#424242">Набор хромосом</text>
  <text x="370" y="287" text-anchor="middle" font-size="6.5" fill="#1B5E20">2n → 2n</text>
  <text x="445" y="287" text-anchor="middle" font-size="6.5" fill="#C62828">2n → n</text>

  <text x="280" y="298" font-size="6.5" fill="#424242">Кроссинговер</text>
  <text x="370" y="298" text-anchor="middle" font-size="6.5" fill="#1B5E20">Нет</text>
  <text x="445" y="298" text-anchor="middle" font-size="6.5" fill="#C62828">Да (профаза I)</text>

  <text x="280" y="309" font-size="6.5" fill="#424242">Значение</text>
  <text x="370" y="309" text-anchor="middle" font-size="6.5" fill="#1B5E20">Рост, регенер.</text>
  <text x="445" y="309" text-anchor="middle" font-size="6.5" fill="#C62828">Гаметы, рекомб.</text>

  <text x="280" y="320" font-size="6.5" fill="#424242">Где происходит</text>
  <text x="370" y="320" text-anchor="middle" font-size="6.5" fill="#1B5E20">Соматич. клетки</text>
  <text x="445" y="320" text-anchor="middle" font-size="6.5" fill="#C62828">Половые клетки</text>

  <!-- Legend for chromosome colors -->
  <text x="35" y="300" font-size="6" fill="#4A148C">— материнская</text>
  <line x1="15" y1="298" x2="30" y2="298" stroke="#E53935" stroke-width="2"/>
  <text x="35" y="310" font-size="6" fill="#4A148C">— отцовская</text>
  <line x1="15" y1="308" x2="30" y2="308" stroke="#1E88E5" stroke-width="2"/>

  <text x="100" y="334" text-anchor="middle" font-size="7" font-style="italic" fill="#6A1B9A">Мейоз обеспечивает генетическое разнообразие</text>
</svg>