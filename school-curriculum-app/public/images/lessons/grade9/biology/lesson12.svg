<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg12)" rx="8"/>
  <text x="250" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B5E20">Макроэволюция</text>
  <text x="250" y="44" text-anchor="middle" font-size="10" fill="#2E7D32">Направления эволюционного процесса</text>
  <line x1="100" y1="50" x2="400" y2="50" stroke="#2E7D32" stroke-width="1"/>

  <!-- Ароморфоз -->
  <rect x="15" y="60" width="150" height="280" rx="8" fill="#C8E6C9" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="90" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">Ароморфоз</text>
  <text x="90" y="95" text-anchor="middle" font-size="8" fill="#2E7D32">Крупные изменения,</text>
  <text x="90" y="106" text-anchor="middle" font-size="8" fill="#2E7D32">повышающие организацию</text>

  <!-- Up arrow -->
  <polygon points="90,120 75,145 105,145" fill="#2E7D32"/>
  <rect x="82" y="145" width="16" height="40" fill="#2E7D32"/>

  <!-- Fish -->
  <ellipse cx="90" cy="210" rx="25" ry="12" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
  <polygon points="65,210 55,200 55,220" fill="#42A5F5" stroke="#1565C0" stroke-width="1"/>
  <circle cx="100" cy="208" r="2" fill="#0D47A1"/>
  <text x="90" y="230" text-anchor="middle" font-size="8" fill="#1565C0">Рыба</text>

  <!-- Arrow -->
  <polygon points="90,240 80,255 100,255" fill="#2E7D32"/>
  <rect x="85" y="255" width="10" height="15" fill="#2E7D32"/>

  <!-- Amphibian -->
  <ellipse cx="90" cy="285" rx="18" ry="10" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
  <line x1="72" y1="285" x2="65" y2="295" stroke="#2E7D32" stroke-width="1.5"/>
  <line x1="108" y1="285" x2="115" y2="295" stroke="#2E7D32" stroke-width="1.5"/>
  <circle cx="96" cy="283" r="1.5" fill="#1B5E20"/>
  <text x="90" y="303" text-anchor="middle" font-size="8" fill="#2E7D32">Земноводное</text>

  <!-- Mammal at top of arrow -->
  <ellipse cx="90" cy="155" rx="15" ry="12" fill="#8D6E63" stroke="#4E342E" stroke-width="1"/>
  <ellipse cx="80" cy="148" rx="5" ry="4" fill="#8D6E63" stroke="#4E342E" stroke-width="1"/>
  <ellipse cx="100" cy="148" rx="5" ry="4" fill="#8D6E63" stroke="#4E342E" stroke-width="1"/>
  <line x1="78" y1="165" x2="72" y2="175" stroke="#4E342E" stroke-width="1.5"/>
  <line x1="102" y1="165" x2="108" y2="175" stroke="#4E342E" stroke-width="1.5"/>
  <text x="90" y="182" text-anchor="middle" font-size="8" fill="#4E342E">Млекопитающее</text>

  <text x="90" y="325" text-anchor="middle" font-size="7" fill="#1B5E20">Пример: появление</text>
  <text x="90" y="335" text-anchor="middle" font-size="7" fill="#1B5E20">лёгких, теплокровности</text>

  <!-- Идиоадаптация -->
  <rect x="175" y="60" width="150" height="280" rx="8" fill="#C8E6C9" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">Идиоадаптация</text>
  <text x="250" y="95" text-anchor="middle" font-size="8" fill="#2E7D32">Приспособления без</text>
  <text x="250" y="106" text-anchor="middle" font-size="8" fill="#2E7D32">повышения организации</text>

  <!-- Side branch trunk -->
  <line x1="250" y1="115" x2="250" y2="155" stroke="#2E7D32" stroke-width="2"/>

  <!-- Branch points -->
  <circle cx="250" cy="155" r="4" fill="#43A047"/>

  <!-- Branch 1 - small beak -->
  <line x1="250" y1="155" x2="195" y2="185" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="185" cy="195" rx="10" ry="8" fill="#FFA726" stroke="#E65100" stroke-width="1"/>
  <ellipse cx="179" cy="192" rx="4" ry="2" fill="#E65100"/>
  <circle cx="188" cy="193" r="1" fill="#000"/>
  <text x="185" y="210" text-anchor="middle" font-size="7" fill="#E65100">Мелкий клюв</text>
  <text x="185" y="220" text-anchor="middle" font-size="6" fill="#E65100">(насекомые)</text>

  <!-- Branch 2 - medium beak -->
  <line x1="250" y1="155" x2="250" y2="185" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="250" cy="195" rx="10" ry="8" fill="#FFA726" stroke="#E65100" stroke-width="1"/>
  <polygon points="244,192 232,188 244,195" fill="#E65100"/>
  <circle cx="253" cy="193" r="1" fill="#000"/>
  <text x="250" y="210" text-anchor="middle" font-size="7" fill="#E65100">Средний клюв</text>
  <text x="250" y="220" text-anchor="middle" font-size="6" fill="#E65100">(семена)</text>

  <!-- Branch 3 - large beak -->
  <line x1="250" y1="155" x2="305" y2="185" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="315" cy="195" rx="10" ry="8" fill="#FFA726" stroke="#E65100" stroke-width="1"/>
  <polygon points="309,192 293,186 309,196" fill="#E65100"/>
  <circle cx="318" cy="193" r="1" fill="#000"/>
  <text x="315" y="210" text-anchor="middle" font-size="7" fill="#E65100">Крупный клюв</text>
  <text x="315" y="220" text-anchor="middle" font-size="6" fill="#E65100">(орехи)</text>

  <!-- Galapagos finches label -->
  <text x="250" y="240" text-anchor="middle" font-size="8" font-style="italic" fill="#1B5E20">Вьюрки Дарвина</text>

  <!-- More examples -->
  <text x="250" y="260" text-anchor="middle" font-size="7" fill="#2E7D32">Покровительственная</text>
  <text x="250" y="272" text-anchor="middle" font-size="7" fill="#2E7D32">окраска, мимикрия,</text>
  <text x="250" y="284" text-anchor="middle" font-size="7" fill="#2E7D32">разные формы листьев</text>

  <!-- Decorative leaves -->
  <ellipse cx="195" cy="305" rx="12" ry="5" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5" transform="rotate(-30,195,305)"/>
  <ellipse cx="250" cy="310" rx="15" ry="5" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <ellipse cx="305" cy="305" rx="10" ry="5" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5" transform="rotate(30,305,305)"/>
  <text x="195" y="325" text-anchor="middle" font-size="6" fill="#2E7D32">игла</text>
  <text x="250" y="325" text-anchor="middle" font-size="6" fill="#2E7D32">пластина</text>
  <text x="305" y="325" text-anchor="middle" font-size="6" fill="#2E7D32">лопасть</text>

  <!-- Дегенерация -->
  <rect x="335" y="60" width="150" height="280" rx="8" fill="#C8E6C9" fill-opacity="0.5" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="410" y="80" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">Дегенерация</text>
  <text x="410" y="95" text-anchor="middle" font-size="8" fill="#2E7D32">Упрощение строения,</text>
  <text x="410" y="106" text-anchor="middle" font-size="8" fill="#2E7D32">утрата органов</text>

  <!-- Down arrow -->
  <polygon points="410,120 395,140 425,140" fill="#C62828"/>
  <rect x="402" y="140" width="16" height="40" fill="#C62828"/>

  <!-- Free-living worm -->
  <ellipse cx="410" cy="130" rx="22" ry="9" fill="#8D6E63" stroke="#4E342E" stroke-width="1"/>
  <circle cx="428" cy="128" r="2" fill="#000"/>
  <line x1="432" y1="127" x2="438" y2="125" stroke="#4E342E" stroke-width="0.8"/>
  <line x1="432" y1="130" x2="438" y2="131" stroke="#4E342E" stroke-width="0.8"/>
  <text x="410" y="118" text-anchor="middle" font-size="7" fill="#4E342E">Свободноживущий</text>

  <!-- Simplified parasite -->
  <rect x="393" y="195" rx="3" ry="8" width="34" height="12" fill="#CE93D8" stroke="#6A1B9A" stroke-width="1"/>
  <circle cx="427" cy="199" r="5" fill="#CE93D8" stroke="#6A1B9A" stroke-width="1"/>
  <circle cx="429" cy="198" r="1" fill="#000"/>
  <text x="410" y="218" text-anchor="middle" font-size="7" fill="#6A1B9A">Паразит</text>
  <text x="410" y="230" text-anchor="middle" font-size="6" fill="#6A1B9A">(утрачены:</text>
  <text x="410" y="240" text-anchor="middle" font-size="6" fill="#6A1B9A">пищеварение,</text>
  <text x="410" y="250" text-anchor="middle" font-size="6" fill="#6A1B9A">органы чувств)</text>

  <!-- Tapeworm -->
  <rect x="380" y="265" width="60" height="8" rx="2" fill="#CE93D8" stroke="#6A1B9A" stroke-width="0.8"/>
  <rect x="380" y="273" width="55" height="8" rx="2" fill="#CE93D8" stroke="#6A1B9A" stroke-width="0.8"/>
  <rect x="380" y="281" width="50" height="8" rx="2" fill="#CE93D8" stroke="#6A1B9A" stroke-width="0.8"/>
  <rect x="380" y="289" width="45" height="8" rx="2" fill="#CE93D8" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="410" y="308" text-anchor="middle" font-size="7" fill="#6A1B9A">Ленточный червь</text>
  <text x="410" y="320" text-anchor="middle" font-size="6" fill="#1B5E20">Примеры: бычий цепень,</text>
  <text x="410" y="332" text-anchor="middle" font-size="6" fill="#1B5E20">внутренние паразиты</text>
</svg>