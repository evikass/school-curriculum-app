<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <filter id="shadow5" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg5)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#2E7D32" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#2E7D32"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Урок 5: Критерии вида</text>

  <!-- Central hexagon - ВИД -->
  <g filter="url(#shadow5)">
    <polygon points="250,135 290,155 290,195 250,215 210,195 210,155" fill="#1B5E20" stroke="#4CAF50" stroke-width="2"/>
    <text x="250" y="172" text-anchor="middle" fill="white" font-size="18" font-weight="bold">ВИД</text>
    <text x="250" y="190" text-anchor="middle" fill="#A5D6A7" font-size="8">Species</text>
  </g>

  <!-- Connecting lines from center to each criterion -->
  <!-- To Морфологический (top-left) -->
  <line x1="220" y1="148" x2="110" y2="80" stroke="#43A047" stroke-width="2"/>
  <!-- To Генетический (top-right) -->
  <line x1="280" y1="148" x2="390" y2="80" stroke="#43A047" stroke-width="2"/>
  <!-- To Физиологический (left) -->
  <line x1="210" y1="175" x2="95" y2="195" stroke="#43A047" stroke-width="2"/>
  <!-- To Экологический (right) -->
  <line x1="290" y1="175" x2="405" y2="195" stroke="#43A047" stroke-width="2"/>
  <!-- To Географический (bottom) -->
  <line x1="250" y1="215" x2="250" y2="265" stroke="#43A047" stroke-width="2"/>

  <!-- Морфологический (top-left) -->
  <g filter="url(#shadow5)">
    <rect x="25" y="48" width="160" height="55" rx="8" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <rect x="25" y="48" width="160" height="18" rx="8" fill="#388E3C"/>
    <rect x="25" y="58" width="160" height="8" fill="#388E3C"/>
    <text x="105" y="61" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Морфологический</text>
    <!-- Two similar shapes icon -->
    <ellipse cx="60" cy="85" rx="10" ry="7" fill="#81C784" stroke="#388E3C" stroke-width="0.8"/>
    <ellipse cx="85" cy="85" rx="10" ry="7" fill="#81C784" stroke="#388E3C" stroke-width="0.8"/>
    <text x="130" y="83" fill="#1B5E20" font-size="7">Внешнее и</text>
    <text x="130" y="93" fill="#1B5E20" font-size="7">внутреннее строение</text>
  </g>

  <!-- Генетический (top-right) -->
  <g filter="url(#shadow5)">
    <rect x="315" y="48" width="160" height="55" rx="8" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <rect x="315" y="48" width="160" height="18" rx="8" fill="#388E3C"/>
    <rect x="315" y="58" width="160" height="8" fill="#388E3C"/>
    <text x="395" y="61" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Генетический</text>
    <!-- Chromosomes icon -->
    <path d="M345,78 Q348,75 348,82 Q348,89 345,86" fill="none" stroke="#E53935" stroke-width="2"/>
    <path d="M352,78 Q349,75 349,82 Q349,89 352,86" fill="none" stroke="#1E88E5" stroke-width="2"/>
    <text x="380" y="83" fill="#1B5E20" font-size="7">2n = одинаковый</text>
    <text x="380" y="93" fill="#1B5E20" font-size="7">набор хромосом</text>
  </g>

  <!-- Физиологический (left) -->
  <g filter="url(#shadow5)">
    <rect x="10" y="172" width="165" height="55" rx="8" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <rect x="10" y="172" width="165" height="18" rx="8" fill="#388E3C"/>
    <rect x="10" y="182" width="165" height="8" fill="#388E3C"/>
    <text x="92" y="185" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Физиологический</text>
    <!-- Heart/pulse icon -->
    <path d="M40,202 Q40,196 45,196 Q50,196 50,202 Q50,210 40,216 Q30,210 30,202 Q30,196 35,196 Q40,196 40,202Z" fill="#EF5350" stroke="#C62828" stroke-width="0.8"/>
    <text x="70" y="205" fill="#1B5E20" font-size="7">Процессы</text>
    <text x="70" y="215" fill="#1B5E20" font-size="7">жизнедеятельности</text>
  </g>

  <!-- Экологический (right) -->
  <g filter="url(#shadow5)">
    <rect x="325" y="172" width="165" height="55" rx="8" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <rect x="325" y="172" width="165" height="18" rx="8" fill="#388E3C"/>
    <rect x="325" y="182" width="165" height="8" fill="#388E3C"/>
    <text x="407" y="185" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Экологический</text>
    <!-- Habitat icon -->
    <path d="M355,200 L355,216 L375,216 L375,200 L368,194 L362,194Z" fill="#66BB6A" stroke="#388E3C" stroke-width="0.8"/>
    <line x1="365" y1="208" x2="365" y2="200" stroke="#388E3C" stroke-width="1"/>
    <circle cx="368" cy="198" r="3" fill="#81C784"/>
    <text x="395" y="205" fill="#1B5E20" font-size="7">Местообитание</text>
    <text x="395" y="215" fill="#1B5E20" font-size="7">и экологическая ниша</text>
  </g>

  <!-- Географический (bottom-center) -->
  <g filter="url(#shadow5)">
    <rect x="170" y="258" width="160" height="55" rx="8" fill="white" stroke="#43A047" stroke-width="1.5"/>
    <rect x="170" y="258" width="160" height="18" rx="8" fill="#388E3C"/>
    <rect x="170" y="268" width="160" height="8" fill="#388E3C"/>
    <text x="250" y="271" text-anchor="middle" fill="white" font-size="9" font-weight="bold">Географический</text>
    <!-- Map icon -->
    <ellipse cx="210" cy="295" rx="12" ry="8" fill="#A5D6A7" stroke="#388E3C" stroke-width="0.8"/>
    <circle cx="210" cy="294" r="2" fill="#C62828"/>
    <text x="240" y="292" fill="#1B5E20" font-size="7">Ареал — область</text>
    <text x="240" y="302" fill="#1B5E20" font-size="7">распространения</text>
  </g>

  <!-- Bottom note -->
  <rect x="20" y="322" width="460" height="22" rx="6" fill="#1B5E20" fill-opacity="0.1" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="250" y="337" text-anchor="middle" fill="#1B5E20" font-size="9" font-weight="bold">⚠ Ни один критерий в отдельности не определяет вид — только их совокупность!</text>
</svg>