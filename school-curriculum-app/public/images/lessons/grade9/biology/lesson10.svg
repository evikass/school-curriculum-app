<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <filter id="shadow10" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg10)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#2E7D32" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#2E7D32"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Урок 10: Приспособленность</text>

  <!-- Panel 1: Покровительственная окраска (top-left) -->
  <g filter="url(#shadow10)">
    <rect x="10" y="50" width="237" height="142" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="10" y="50" width="237" height="22" rx="8" fill="#1B5E20"/>
    <rect x="10" y="64" width="237" height="8" fill="#1B5E20"/>
    <text x="128" y="66" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Покровительственная окраска</text>

    <!-- Tree bark background -->
    <rect x="20" y="78" width="100" height="105" rx="4" fill="#795548"/>
    <!-- Bark texture lines -->
    <line x1="30" y1="78" x2="28" y2="183" stroke="#6D4C41" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="78" x2="52" y2="183" stroke="#5D4037" stroke-width="0.8" opacity="0.4"/>
    <line x1="75" y1="78" x2="73" y2="183" stroke="#6D4C41" stroke-width="1" opacity="0.5"/>
    <line x1="95" y1="78" x2="97" y2="183" stroke="#5D4037" stroke-width="0.8" opacity="0.4"/>
    <!-- Bark patches -->
    <rect x="35" y="90" width="15" height="8" rx="2" fill="#6D4C41" opacity="0.5"/>
    <rect x="60" y="120" width="20" height="10" rx="2" fill="#5D4037" opacity="0.4"/>
    <rect x="80" y="150" width="12" height="8" rx="2" fill="#6D4C41" opacity="0.5"/>

    <!-- Moth on bark (cryptic) -->
    <g transform="translate(65,130)">
      <!-- Wings - bark colored -->
      <path d="M-2,0 Q-18,-5 -15,8 Q-12,15 -2,10Z" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
      <path d="M2,0 Q18,-5 15,8 Q12,15 2,10Z" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
      <!-- Wing pattern mimicking bark -->
      <line x1="-10" y1="2" x2="-6" y2="8" stroke="#6D4C41" stroke-width="0.5"/>
      <line x1="6" y1="2" x2="10" y2="8" stroke="#6D4C41" stroke-width="0.5"/>
      <!-- Body -->
      <ellipse cx="0" cy="5" rx="2.5" ry="8" fill="#5D4037"/>
    </g>

    <text x="175" y="95" fill="#1B5E20" font-size="8" font-weight="bold">Мотылёк на коре</text>
    <text x="175" y="108" fill="#2E7D32" font-size="7">Окраска сливается</text>
    <text x="175" y="119" fill="#2E7D32" font-size="7">с фоном среды</text>
    <text x="175" y="135" fill="#388E3C" font-size="7">Примеры:</text>
    <text x="175" y="147" fill="#5D4037" font-size="7">• Пёстрый мотылёк</text>
    <text x="175" y="158" fill="#5D4037" font-size="7">• Белый заяц зимой</text>
    <text x="175" y="169" fill="#5D4037" font-size="7">• Камбала на дне</text>
    <text x="175" y="183" fill="#C62828" font-size="7" font-style="italic">Маскировка от хищников</text>
  </g>

  <!-- Panel 2: Мимикрия (top-right) -->
  <g filter="url(#shadow10)">
    <rect x="253" y="50" width="237" height="142" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="253" y="50" width="237" height="22" rx="8" fill="#1B5E20"/>
    <rect x="253" y="64" width="237" height="8" fill="#1B5E20"/>
    <text x="371" y="66" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Мимикрия</text>

    <!-- Bee (model) -->
    <g transform="translate(305,110)">
      <text x="0" y="-20" text-anchor="middle" fill="#1B5E20" font-size="7" font-weight="bold">Пчела (модель)</text>
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="12" ry="7" fill="#FFC107"/>
      <!-- Stripes -->
      <rect x="-6" y="-7" width="4" height="14" fill="#212121" rx="1"/>
      <rect x="2" y="-7" width="4" height="14" fill="#212121" rx="1"/>
      <!-- Head -->
      <circle cx="-14" cy="0" r="4" fill="#212121"/>
      <!-- Eyes -->
      <circle cx="-15" cy="-1.5" r="1.5" fill="#212121"/>
      <!-- Wings -->
      <ellipse cx="-2" cy="-10" rx="10" ry="5" fill="#E3F2FD" fill-opacity="0.6" stroke="#90CAF9" stroke-width="0.5"/>
      <ellipse cx="4" cy="-8" rx="8" ry="4" fill="#E3F2FD" fill-opacity="0.5" stroke="#90CAF9" stroke-width="0.5"/>
      <!-- Stinger -->
      <path d="M12,0 L18,0" stroke="#C62828" stroke-width="1.5"/>
      <circle cx="18" cy="0" r="1" fill="#C62828"/>
    </g>

    <!-- Arrow = -->
    <text x="345" y="112" fill="#2E7D32" font-size="14" font-weight="bold">=</text>

    <!-- Hoverfly (mimic) -->
    <g transform="translate(390,110)">
      <text x="0" y="-20" text-anchor="middle" fill="#C62828" font-size="7" font-weight="bold">Журчалка (имитатор)</text>
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="10" ry="6" fill="#FFC107"/>
      <!-- Stripes - mimicking bee -->
      <rect x="-5" y="-6" width="3" height="12" fill="#212121" rx="1"/>
      <rect x="1" y="-6" width="3" height="12" fill="#212121" rx="1"/>
      <!-- Head -->
      <circle cx="-11" cy="0" r="3.5" fill="#4E342E"/>
      <!-- Eyes - big fly eyes -->
      <circle cx="-12" cy="-2" r="2.5" fill="#C62828"/>
      <!-- Wings -->
      <ellipse cx="-1" cy="-9" rx="9" ry="4.5" fill="#E3F2FD" fill-opacity="0.6" stroke="#90CAF9" stroke-width="0.5"/>
      <ellipse cx="3" cy="-7" rx="7" ry="3.5" fill="#E3F2FD" fill-opacity="0.5" stroke="#90CAF9" stroke-width="0.5"/>
      <!-- No stinger! -->
      <text x="10" y="2" fill="#C62828" font-size="6">✕</text>
    </g>

    <text x="371" y="145" text-anchor="middle" fill="#2E7D32" font-size="7">Безопасный вид копирует</text>
    <text x="371" y="156" text-anchor="middle" fill="#2E7D32" font-size="7">окраску опасного</text>
    <text x="371" y="170" fill="#388E3C" font-size="7">Примеры:</text>
    <text x="371" y="181" fill="#5D4037" font-size="7">• Журчалка ↔ Пчела</text>
    <text x="371" y="192" fill="#5D4037" font-size="7">• Неядовитый уж ↔ Кобра</text>
  </g>

  <!-- Panel 3: Предупреждающая окраска (bottom-left) -->
  <g filter="url(#shadow10)">
    <rect x="10" y="200" width="237" height="142" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="10" y="200" width="237" height="22" rx="8" fill="#1B5E20"/>
    <rect x="10" y="214" width="237" height="8" fill="#1B5E20"/>
    <text x="128" y="216" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Предупреждающая окраска</text>

    <!-- Poison dart frog -->
    <g transform="translate(80,270)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="16" ry="11" fill="#FFD600"/>
      <!-- Bright pattern spots -->
      <circle cx="-6" cy="-3" r="4" fill="#1B5E20"/>
      <circle cx="5" cy="-2" r="3.5" fill="#1B5E20"/>
      <circle cx="-2" cy="5" r="3" fill="#1B5E20"/>
      <circle cx="8" cy="4" r="2.5" fill="#1B5E20"/>
      <!-- Head -->
      <ellipse cx="-16" cy="-2" rx="7" ry="6" fill="#FFD600"/>
      <circle cx="-5" cy="-3" r="1.5" fill="#1B5E20"/>
      <circle cx="2" cy="-3" r="1.5" fill="#1B5E20"/>
      <!-- Eyes -->
      <circle cx="-19" cy="-5" r="2.5" fill="#1B5E20"/>
      <circle cx="-19" cy="-5" r="1.5" fill="#212121"/>
      <circle cx="-14" cy="-5" r="2.5" fill="#1B5E20"/>
      <circle cx="-14" cy="-5" r="1.5" fill="#212121"/>
      <!-- Legs -->
      <line x1="-10" y1="10" x2="-14" y2="18" stroke="#FFD600" stroke-width="3"/>
      <line x1="-3" y1="10" x2="-6" y2="18" stroke="#FFD600" stroke-width="3"/>
      <line x1="5" y1="10" x2="8" y2="18" stroke="#FFD600" stroke-width="3"/>
      <line x1="12" y1="10" x2="16" y2="18" stroke="#FFD600" stroke-width="3"/>
    </g>

    <!-- Warning symbol -->
    <g transform="translate(145,245)">
      <polygon points="0,-12 11,8 -11,8" fill="#FFD600" stroke="#E65100" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" fill="#E65100" font-size="12" font-weight="bold">!</text>
    </g>

    <text x="195" y="248" fill="#1B5E20" font-size="8" font-weight="bold">Яркая = Опасно!</text>
    <text x="195" y="261" fill="#2E7D32" font-size="7">Яркая окраска предупреждает:</text>
    <text x="195" y="272" fill="#2E7D32" font-size="7">«Я ядовит(а)!»</text>
    <text x="195" y="288" fill="#388E3C" font-size="7">Примеры:</text>
    <text x="195" y="299" fill="#5D4037" font-size="7">• Древолаз-латук</text>
    <text x="195" y="310" fill="#5D4037" font-size="7">• Шмель (чёрно-жёлтый)</text>
    <text x="195" y="321" fill="#5D4037" font-size="7">• Божья коровка</text>
    <text x="195" y="335" fill="#C62828" font-size="7" font-style="italic">Заметная и запоминающаяся</text>
  </g>

  <!-- Panel 4: Поведенческая (bottom-right) -->
  <g filter="url(#shadow10)">
    <rect x="253" y="200" width="237" height="142" rx="8" fill="white" stroke="#2E7D32" stroke-width="1.5"/>
    <rect x="253" y="200" width="237" height="22" rx="8" fill="#1B5E20"/>
    <rect x="253" y="214" width="237" height="8" fill="#1B5E20"/>
    <text x="371" y="216" text-anchor="middle" fill="white" font-size="10" font-weight="bold">Поведенческая</text>

    <!-- Migration scene - V-shape birds flying -->
    <g transform="translate(350,260)">
      <!-- Sky background -->
      <rect x="-50" y="-30" width="100" height="50" rx="4" fill="#B3E5FC" opacity="0.4"/>
      <!-- Birds in V formation -->
      <g fill="#37474F">
        <!-- Lead bird -->
        <path d="M0,-20 L-5,-15 L0,-17 L5,-15Z"/>
        <!-- Left wing birds -->
        <path d="M-8,-14 L-13,-9 L-8,-11 L-3,-9Z"/>
        <path d="M-16,-8 L-21,-3 L-16,-5 L-11,-3Z"/>
        <!-- Right wing birds -->
        <path d="M8,-14 L13,-9 L8,-11 L3,-9Z"/>
        <path d="M16,-8 L21,-3 L16,-5 L11,-3Z"/>
      </g>
      <!-- Dashed path showing migration -->
      <path d="M-40,5 Q-20,-5 0,-20 Q20,-5 40,5" fill="none" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="2,2"/>
    </g>

    <text x="371" y="285" text-anchor="middle" fill="#1B5E20" font-size="8" font-weight="bold">Миграция птиц</text>
    <text x="371" y="298" text-anchor="middle" fill="#2E7D32" font-size="7">Поведение помогает выжить</text>
    <text x="371" y="312" fill="#388E3C" font-size="7">Примеры:</text>
    <text x="371" y="323" fill="#5D4037" font-size="7">• Перелёт птиц на юг</text>
    <text x="371" y="334" fill="#5D4037" font-size="7">• Спячка медведя</text>
    <text x="371" y="345" fill="#5D4037" font-size="7">• Стайная защита</text>
  </g>

  <!-- Center connecting label -->
  <rect x="175" y="194" width="150" height="12" rx="6" fill="#2E7D32"/>
  <text x="250" y="203" text-anchor="middle" fill="white" font-size="7" font-weight="bold">Результат естественного отбора →</text>
</svg>