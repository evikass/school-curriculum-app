<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg11)" rx="8"/>
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1B5E20">Микроэволюция</text>
  <line x1="150" y1="38" x2="350" y2="38" stroke="#2E7D32" stroke-width="1.5"/>

  <!-- Population 1 - mixed colored dots -->
  <rect x="20" y="55" width="140" height="120" rx="10" fill="#A5D6A7" fill-opacity="0.5" stroke="#388E3C" stroke-width="1.5"/>
  <text x="90" y="72" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">Популяция</text>
  <!-- Mixed dots - various colors -->
  <circle cx="50" cy="95" r="6" fill="#E53935"/><circle cx="70" cy="105" r="5" fill="#1E88E5"/>
  <circle cx="90" cy="90" r="6" fill="#43A047"/><circle cx="110" cy="100" r="5" fill="#E53935"/>
  <circle cx="55" cy="120" r="5" fill="#1E88E5"/><circle cx="80" cy="115" r="6" fill="#E53935"/>
  <circle cx="105" cy="118" r="5" fill="#43A047"/><circle cx="130" cy="95" r="6" fill="#1E88E5"/>
  <circle cx="65" cy="140" r="5" fill="#43A047"/><circle cx="90" cy="135" r="6" fill="#1E88E5"/>
  <circle cx="115" cy="140" r="5" fill="#E53935"/><circle cx="135" cy="125" r="6" fill="#43A047"/>
  <circle cx="45" cy="145" r="5" fill="#E53935"/><circle cx="125" cy="145" r="5" fill="#1E88E5"/>
  <circle cx="75" cy="148" r="5" fill="#43A047"/><circle cx="100" cy="150" r="5" fill="#E53935"/>
  <text x="90" y="170" text-anchor="middle" font-size="9" fill="#2E7D32">Разнообразие</text>

  <!-- Arrow to barrier -->
  <line x1="165" y1="115" x2="190" y2="115" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowG)"/>
  <defs><marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6Z" fill="#2E7D32"/></marker></defs>

  <!-- Isolating barrier -->
  <rect x="195" y="55" width="30" height="120" rx="4" fill="#795548" fill-opacity="0.3" stroke="#5D4037" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="210" y="125" text-anchor="middle" font-size="8" fill="#3E2723" transform="rotate(-90,210,125)">Изоляция</text>
  <line x1="210" y1="58" x2="210" y2="172" stroke="#5D4037" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Species A - red dots only -->
  <rect x="240" y="55" width="115" height="55" rx="8" fill="#FFCDD2" fill-opacity="0.5" stroke="#C62828" stroke-width="1.5"/>
  <text x="297" y="72" text-anchor="middle" font-size="10" font-weight="bold" fill="#B71C1C">Вид А</text>
  <circle cx="265" cy="88" r="5" fill="#E53935"/><circle cx="285" cy="92" r="5" fill="#E53935"/>
  <circle cx="305" cy="88" r="5" fill="#E53935"/><circle cx="325" cy="92" r="5" fill="#E53935"/>
  <circle cx="275" cy="100" r="5" fill="#E53935"/><circle cx="310" cy="100" r="5" fill="#E53935"/>

  <!-- Species B - blue dots only -->
  <rect x="240" y="120" width="115" height="55" rx="8" fill="#BBDEFB" fill-opacity="0.5" stroke="#1565C0" stroke-width="1.5"/>
  <text x="297" y="137" text-anchor="middle" font-size="10" font-weight="bold" fill="#0D47A1">Вид Б</text>
  <circle cx="265" cy="153" r="5" fill="#1E88E5"/><circle cx="285" cy="157" r="5" fill="#1E88E5"/>
  <circle cx="305" cy="153" r="5" fill="#1E88E5"/><circle cx="325" cy="157" r="5" fill="#1E88E5"/>
  <circle cx="275" cy="165" r="5" fill="#1E88E5"/><circle cx="310" cy="165" r="5" fill="#1E88E5"/>

  <!-- Arrow from species to new species label -->
  <text x="375" y="95" font-size="10" fill="#B71C1C">⟶ Новый вид</text>
  <text x="375" y="155" font-size="10" fill="#0D47A1">⟶ Новый вид</text>

  <!-- Factors box -->
  <rect x="15" y="195" width="470" height="145" rx="8" fill="#C8E6C9" fill-opacity="0.7" stroke="#388E3C" stroke-width="1.5"/>
  <text x="250" y="215" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20">Факторы микроэволюции</text>

  <!-- Factor 1 -->
  <rect x="30" y="225" width="135" height="55" rx="6" fill="#66BB6A" fill-opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
  <text x="97" y="242" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Наследственность</text>
  <text x="97" y="256" text-anchor="middle" font-size="8" fill="#2E7D32">передача признаков</text>
  <text x="97" y="268" text-anchor="middle" font-size="8" fill="#2E7D32">от родителей к потомкам</text>

  <!-- Factor 2 -->
  <rect x="180" y="225" width="135" height="55" rx="6" fill="#66BB6A" fill-opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
  <text x="247" y="242" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Изменчивость</text>
  <text x="247" y="256" text-anchor="middle" font-size="8" fill="#2E7D32">мутационная и</text>
  <text x="247" y="268" text-anchor="middle" font-size="8" fill="#2E7D32">комбинативная</text>

  <!-- Factor 3 -->
  <rect x="330" y="225" width="140" height="55" rx="6" fill="#66BB6A" fill-opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
  <text x="400" y="242" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Естественный отбор</text>
  <text x="400" y="256" text-anchor="middle" font-size="8" fill="#2E7D32">сохранение</text>
  <text x="400" y="268" text-anchor="middle" font-size="8" fill="#2E7D32">приспособленных</text>

  <!-- Factor 4 -->
  <rect x="30" y="290" width="135" height="40" rx="6" fill="#66BB6A" fill-opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
  <text x="97" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Борьба за существ.</text>
  <text x="97" y="322" text-anchor="middle" font-size="8" fill="#2E7D32">внутривидовая, межвидовая</text>

  <!-- Factor 5 -->
  <rect x="180" y="290" width="135" height="40" rx="6" fill="#66BB6A" fill-opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
  <text x="247" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Дрейф генов</text>
  <text x="247" y="322" text-anchor="middle" font-size="8" fill="#2E7D32">случайные изменения</text>

  <!-- Factor 6 -->
  <rect x="330" y="290" width="140" height="40" rx="6" fill="#66BB6A" fill-opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
  <text x="400" y="308" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">Изоляция</text>
  <text x="400" y="322" text-anchor="middle" font-size="8" fill="#2E7D32">географ., экологич.</text>
</svg>