<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg22" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg22)" rx="12"/>
  <rect x="4" y="4" width="492" height="342" fill="none" stroke="#FF9800" stroke-width="2" rx="10"/>

  <!-- Title -->
  <text x="250" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#E65100">Органы</text>
  <line x1="40" y1="42" x2="460" y2="42" stroke="#FF9800" stroke-width="1.5"/>

  <!-- Left: Plant organs -->
  <rect x="20" y="52" width="220" height="280" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="130" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Органы растения</text>

  <!-- Root -->
  <rect x="35" y="82" width="190" height="50" rx="6" fill="#FFE0B2" stroke="#FFB74D" stroke-width="1"/>
  <text x="130" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Корень</text>
  <text x="130" y="118" text-anchor="middle" font-size="9" fill="#BF360C">всасывание, закрепление в почве</text>
  <!-- root icon -->
  <line x1="55" y1="90" x2="55" y2="125" stroke="#795548" stroke-width="2.5"/>
  <line x1="55" y1="110" x2="48" y2="120" stroke="#795548" stroke-width="1"/>
  <line x1="55" y1="115" x2="62" y2="125" stroke="#795548" stroke-width="1"/>
  <line x1="55" y1="100" x2="44" y2="108" stroke="#795548" stroke-width="0.8"/>

  <!-- Stem -->
  <rect x="35" y="138" width="190" height="50" rx="6" fill="#FFECB3" stroke="#FFB74D" stroke-width="1"/>
  <text x="130" y="156" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Стебель</text>
  <text x="130" y="174" text-anchor="middle" font-size="9" fill="#BF360C">проводимость, опора, рост</text>
  <!-- stem icon -->
  <line x1="55" y1="145" x2="55" y2="180" stroke="#4CAF50" stroke-width="2.5"/>
  <ellipse cx="48" cy="155" rx="5" ry="3" fill="#81C784" stroke="#388E3C" stroke-width="0.6"/>

  <!-- Leaf -->
  <rect x="35" y="194" width="190" height="50" rx="6" fill="#FFF8E1" stroke="#FFB74D" stroke-width="1"/>
  <text x="130" y="212" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Лист</text>
  <text x="130" y="230" text-anchor="middle" font-size="9" fill="#BF360C">фотосинтез, газообмен, испарение</text>
  <!-- leaf icon -->
  <ellipse cx="55" cy="214" rx="12" ry="7" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="43" y1="214" x2="67" y2="214" stroke="#2E7D32" stroke-width="0.6"/>
  <line x1="50" y1="210" x2="53" y2="214" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="56" y1="210" x2="58" y2="214" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Flower -->
  <rect x="35" y="250" width="190" height="50" rx="6" fill="#FFE0B2" stroke="#FFB74D" stroke-width="1"/>
  <text x="130" y="268" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Цветок</text>
  <text x="130" y="286" text-anchor="middle" font-size="9" fill="#BF360C">репродуктивный орган, семена</text>
  <!-- flower icon -->
  <circle cx="55" cy="270" r="5" fill="#FFF176" stroke="#F9A825" stroke-width="0.8"/>
  <ellipse cx="55" cy="262" rx="3" ry="5" fill="#EF9A9A" stroke="#E53935" stroke-width="0.5"/>
  <ellipse cx="55" cy="278" rx="3" ry="5" fill="#EF9A9A" stroke="#E53935" stroke-width="0.5"/>
  <ellipse cx="47" cy="270" rx="5" ry="3" fill="#EF9A9A" stroke="#E53935" stroke-width="0.5"/>
  <ellipse cx="63" cy="270" rx="5" ry="3" fill="#EF9A9A" stroke="#E53935" stroke-width="0.5"/>

  <!-- Vegetative vs Generative -->
  <rect x="35" y="306" width="90" height="18" rx="4" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.8"/>
  <text x="80" y="318" text-anchor="middle" font-size="8" fill="#2E7D32">Вегетативные</text>
  <rect x="133" y="306" width="90" height="18" rx="4" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.8"/>
  <text x="178" y="318" text-anchor="middle" font-size="8" fill="#C62828">Генеративные</text>

  <!-- Right: Animal organ systems -->
  <rect x="260" y="52" width="220" height="280" rx="8" fill="#ffffff" fill-opacity="0.5" stroke="#FFB74D" stroke-width="1.5"/>
  <text x="370" y="74" text-anchor="middle" font-size="14" font-weight="bold" fill="#E65100">Системы органов животного</text>

  <!-- Digestive system -->
  <rect x="275" y="82" width="190" height="68" rx="6" fill="#FFE0B2" stroke="#FFB74D" stroke-width="1"/>
  <text x="370" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Пищеварительная</text>
  <text x="370" y="116" text-anchor="middle" font-size="9" fill="#BF360C">ротовая полость → пищевод →</text>
  <text x="370" y="130" text-anchor="middle" font-size="9" fill="#BF360C">желудок → кишечник → ферменты</text>
  <!-- digestive tract icon -->
  <path d="M292 95 Q292 105 296 105 Q300 105 300 112 Q300 118 304 118 Q308 118 308 125 Q308 132 312 138" fill="none" stroke="#795548" stroke-width="1.5"/>
  <ellipse cx="308" cy="130" rx="6" ry="8" fill="none" stroke="#795548" stroke-width="1"/>

  <!-- Circulatory system -->
  <rect x="275" y="158" width="190" height="68" rx="6" fill="#FFECB3" stroke="#FFB74D" stroke-width="1"/>
  <text x="370" y="176" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Кровеносная</text>
  <text x="370" y="192" text-anchor="middle" font-size="9" fill="#BF360C">сердце → артерии → капилляры →</text>
  <text x="370" y="206" text-anchor="middle" font-size="9" fill="#BF360C">вены → транспорт O₂ и питательных</text>
  <!-- heart icon -->
  <path d="M298 175 C298 170 305 168 305 173 C305 168 312 170 312 175 C312 182 305 188 305 188 C305 188 298 182 298 175Z" fill="#EF5350" stroke="#C62828" stroke-width="0.8"/>

  <!-- Nervous system -->
  <rect x="275" y="234" width="190" height="68" rx="6" fill="#FFF8E1" stroke="#FFB74D" stroke-width="1"/>
  <text x="370" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#BF360C">Нервная</text>
  <text x="370" y="268" text-anchor="middle" font-size="9" fill="#BF360C">головной мозг → спинной мозг →</text>
  <text x="370" y="282" text-anchor="middle" font-size="9" fill="#BF360C">нервы → регуляция организма</text>
  <!-- brain icon -->
  <path d="M293 260 Q293 252 300 250 Q307 248 310 252 Q313 248 317 252 Q320 256 317 260 Q310 268 305 270 Q298 268 293 260Z" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.8"/>
  <line x1="305" y1="270" x2="305" y2="290" stroke="#7B1FA2" stroke-width="1.5"/>

  <!-- Systems note -->
  <rect x="275" y="310" width="190" height="18" rx="4" fill="#FFE0B2" stroke="#FFB74D" stroke-width="0.8"/>
  <text x="370" y="322" text-anchor="middle" font-size="8" fill="#BF360C">Система органов = взаимосвязанные органы</text>
</svg>