<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" font-family="Arial,sans-serif">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFEBEE"/>
      <stop offset="100%" style="stop-color:#FFCDD2"/>
    </linearGradient>
    <filter id="shadow8" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg8)" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="42" fill="#C62828" rx="8"/>
  <rect x="0" y="20" width="500" height="22" fill="#C62828"/>
  <text x="250" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Урок 8: Борьба за существование</text>

  <!-- Section 1: Внутривидовая (top) -->
  <g filter="url(#shadow8)">
    <rect x="10" y="50" width="480" height="90" rx="8" fill="white" stroke="#C62828" stroke-width="1.5"/>
    <rect x="10" y="50" width="480" height="22" rx="8" fill="#D32F2F"/>
    <rect x="10" y="62" width="480" height="10" fill="#D32F2F"/>
    <text x="250" y="66" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Внутривидовая борьба</text>

    <!-- Two wolves facing each other -->
    <!-- Wolf 1 (left) -->
    <g transform="translate(120,95)">
      <!-- Body -->
      <ellipse cx="0" cy="0" rx="20" ry="10" fill="#8D6E63"/>
      <!-- Head -->
      <ellipse cx="-18" cy="-5" rx="8" ry="6" fill="#A1887F"/>
      <!-- Snout -->
      <path d="M-26,-6 L-30,-4 L-26,-2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5"/>
      <!-- Eye -->
      <circle cx="-21" cy="-7" r="1.5" fill="#FFC107"/>
      <circle cx="-21" cy="-7" r="0.7" fill="#212121"/>
      <!-- Ear -->
      <path d="M-20,-11 L-17,-16 L-14,-11" fill="#A1887F"/>
      <!-- Tail -->
      <path d="M18,-2 Q28,-10 25,-15" fill="none" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
      <!-- Legs -->
      <line x1="-10" y1="8" x2="-12" y2="18" stroke="#6D4C41" stroke-width="2"/>
      <line x1="-2" y1="8" x2="-4" y2="18" stroke="#6D4C41" stroke-width="2"/>
      <line x1="8" y1="8" x2="6" y2="18" stroke="#6D4C41" stroke-width="2"/>
      <line x1="15" y1="8" x2="13" y2="18" stroke="#6D4C41" stroke-width="2"/>
      <!-- Bared teeth -->
      <line x1="-27" y1="-3" x2="-25" y2="-1" stroke="white" stroke-width="0.8"/>
      <line x1="-25" y1="-3" x2="-23" y2="-1" stroke="white" stroke-width="0.8"/>
    </g>

    <!-- VS symbol -->
    <g transform="translate(200,95)">
      <circle cx="0" cy="0" r="10" fill="#C62828"/>
      <text x="0" y="4" text-anchor="middle" fill="white" font-size="9" font-weight="bold">VS</text>
    </g>

    <!-- Wolf 2 (right, mirror) -->
    <g transform="translate(280,95) scale(-1,1)">
      <ellipse cx="0" cy="0" rx="20" ry="10" fill="#795548"/>
      <ellipse cx="-18" cy="-5" rx="8" ry="6" fill="#8D6E63"/>
      <path d="M-26,-6 L-30,-4 L-26,-2" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
      <circle cx="-21" cy="-7" r="1.5" fill="#FFC107"/>
      <circle cx="-21" cy="-7" r="0.7" fill="#212121"/>
      <path d="M-20,-11 L-17,-16 L-14,-11" fill="#8D6E63"/>
      <path d="M18,-2 Q28,-10 25,-15" fill="none" stroke="#795548" stroke-width="3" stroke-linecap="round"/>
      <line x1="-10" y1="8" x2="-12" y2="18" stroke="#5D4037" stroke-width="2"/>
      <line x1="-2" y1="8" x2="-4" y2="18" stroke="#5D4037" stroke-width="2"/>
      <line x1="8" y1="8" x2="6" y2="18" stroke="#5D4037" stroke-width="2"/>
      <line x1="15" y1="8" x2="13" y2="18" stroke="#5D4037" stroke-width="2"/>
      <line x1="-27" y1="-3" x2="-25" y2="-1" stroke="white" stroke-width="0.8"/>
      <line x1="-25" y1="-3" x2="-23" y2="-1" stroke="white" stroke-width="0.8"/>
    </g>

    <text x="420" y="90" fill="#B71C1C" font-size="8">Особи одного вида</text>
    <text x="420" y="101" fill="#B71C1C" font-size="8">борются за:</text>
    <text x="420" y="114" fill="#5D4037" font-size="7">• Пищу</text>
    <text x="420" y="124" fill="#5D4037" font-size="7">• Территорию</text>
    <text x="420" y="134" fill="#5D4037" font-size="7">• Партнёра</text>
  </g>

  <!-- Section 2: Межвидовая (middle) -->
  <g filter="url(#shadow8)">
    <rect x="10" y="148" width="480" height="90" rx="8" fill="white" stroke="#C62828" stroke-width="1.5"/>
    <rect x="10" y="148" width="480" height="22" rx="8" fill="#E53935"/>
    <rect x="10" y="160" width="480" height="10" fill="#E53935"/>
    <text x="250" y="164" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Межвидовая борьба</text>

    <!-- Fox (predator) -->
    <g transform="translate(100,195)">
      <ellipse cx="0" cy="0" rx="18" ry="9" fill="#FF8A65"/>
      <ellipse cx="-16" cy="-4" rx="7" ry="5" fill="#FFAB91"/>
      <!-- Big ears - fox -->
      <path d="M-18,-9 L-22,-18 L-14,-9" fill="#FFAB91"/>
      <path d="M-12,-9 L-10,-18 L-6,-9" fill="#FFAB91"/>
      <path d="M-18,-9 L-21,-15 L-15,-9" fill="#FFCCBC"/>
      <path d="M-12,-9 L-11,-15 L-8,-9" fill="#FFCCBC"/>
      <!-- Snout -->
      <path d="M-23,-3 L-28,-1 L-23,1" fill="#FF8A65"/>
      <circle cx="-20" cy="-5" r="1.2" fill="#212121"/>
      <!-- Tail -->
      <path d="M16,-3 Q28,-12 26,-18 Q30,-15 28,-5" fill="#FF8A65" stroke="#E64A19" stroke-width="0.5"/>
      <path d="M26,-18 Q24,-14 26,-10" fill="white" opacity="0.6"/>
      <!-- Legs -->
      <line x1="-8" y1="7" x2="-10" y2="16" stroke="#E64A19" stroke-width="2"/>
      <line x1="0" y1="7" x2="-2" y2="16" stroke="#E64A19" stroke-width="2"/>
      <line x1="8" y1="7" x2="6" y2="16" stroke="#E64A19" stroke-width="2"/>
      <line x1="14" y1="7" x2="12" y2="16" stroke="#E64A19" stroke-width="2"/>
    </g>

    <!-- Arrow -->
    <path d="M155,192 L195,190" stroke="#C62828" stroke-width="2" stroke-dasharray="3,2"/>
    <polygon points="195,190 189,186 189,194" fill="#C62828"/>

    <!-- Rabbit (prey) -->
    <g transform="translate(235,200)">
      <ellipse cx="0" cy="0" rx="14" ry="10" fill="#BCAAA4"/>
      <ellipse cx="10" cy="-3" rx="7" ry="5.5" fill="#D7CCC8"/>
      <!-- Long ears -->
      <ellipse cx="8" cy="-18" rx="3" ry="9" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.5"/>
      <ellipse cx="14" cy="-17" rx="3" ry="8.5" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.5"/>
      <ellipse cx="8" cy="-18" rx="1.5" ry="7" fill="#FFCDD2"/>
      <ellipse cx="14" cy="-17" rx="1.5" ry="6.5" fill="#FFCDD2"/>
      <!-- Eye -->
      <circle cx="14" cy="-4" r="2" fill="#4E342E"/>
      <circle cx="14.5" cy="-4.5" r="0.7" fill="white"/>
      <!-- Nose -->
      <circle cx="17" cy="-1" r="1" fill="#EF9A9A"/>
      <!-- Tail -->
      <circle cx="-14" cy="-3" r="4" fill="white" stroke="#BCAAA4" stroke-width="0.5"/>
      <!-- Legs -->
      <ellipse cx="-6" cy="9" rx="3" ry="5" fill="#BCAAA4"/>
      <ellipse cx="6" cy="9" rx="3" ry="5" fill="#BCAAA4"/>
    </g>

    <text x="370" y="188" fill="#B71C1C" font-size="8">Особи разных видов</text>
    <text x="370" y="199" fill="#B71C1C" font-size="8">конкурируют за:</text>
    <text x="370" y="212" fill="#5D4037" font-size="7">• Пищу (хищник-жертва)</text>
    <text x="370" y="224" fill="#5D4037" font-size="7">• Ресурсы среды</text>
    <text x="370" y="236" fill="#5D4037" font-size="7">• Симбиоз / Паразитизм</text>
  </g>

  <!-- Section 3: С условиями (bottom) -->
  <g filter="url(#shadow8)">
    <rect x="10" y="246" width="480" height="94" rx="8" fill="white" stroke="#C62828" stroke-width="1.5"/>
    <rect x="10" y="246" width="480" height="22" rx="8" fill="#EF5350"/>
    <rect x="10" y="258" width="480" height="10" fill="#EF5350"/>
    <text x="250" y="262" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Борьба с неблагоприятными условиями</text>

    <!-- Snow scene -->
    <rect x="20" y="272" width="200" height="60" rx="4" fill="#E3F2FD"/>

    <!-- Snowflakes -->
    <text x="35" y="285" fill="#90CAF9" font-size="8">❄</text>
    <text x="60" y="295" fill="#90CAF9" font-size="6">❄</text>
    <text x="85" y="280" fill="#90CAF9" font-size="7">❄</text>
    <text x="110" y="290" fill="#90CAF9" font-size="5">❄</text>
    <text x="170" y="283" fill="#90CAF9" font-size="8">❄</text>
    <text x="195" y="295" fill="#90CAF9" font-size="6">❄</text>

    <!-- Plant struggling in snow -->
    <g transform="translate(100,310)">
      <!-- Stem -->
      <line x1="0" y1="0" x2="0" y2="-20" stroke="#4CAF50" stroke-width="2"/>
      <!-- Wilted leaves -->
      <path d="M0,-8 Q-12,-5 -15,2" fill="#81C784" stroke="#4CAF50" stroke-width="0.5" opacity="0.7"/>
      <path d="M0,-14 Q10,-11 14,-5" fill="#81C784" stroke="#4CAF50" stroke-width="0.5" opacity="0.7"/>
      <!-- Small struggling flower -->
      <circle cx="0" cy="-22" r="3" fill="#FFC107" stroke="#FF8F00" stroke-width="0.5"/>
    </g>
    <!-- Snow on ground -->
    <ellipse cx="100" cy="322" rx="30" ry="5" fill="white" opacity="0.8"/>

    <!-- Pine tree - adapted -->
    <g transform="translate(180,300)">
      <rect x="-2" y="10" width="4" height="15" fill="#5D4037"/>
      <polygon points="0,-15 -12,0 12,0" fill="#2E7D32"/>
      <polygon points="0,-8 -10,5 10,5" fill="#388E3C"/>
      <!-- Snow on branches -->
      <ellipse cx="0" cy="-14" rx="4" ry="2" fill="white" opacity="0.7"/>
    </g>

    <text x="310" y="285" fill="#B71C1C" font-size="8">Борьба с факторами</text>
    <text x="310" y="296" fill="#B71C1C" font-size="8">неживой природы:</text>
    <text x="310" y="310" fill="#5D4037" font-size="7">• Холод, жара, засуха</text>
    <text x="310" y="322" fill="#5D4037" font-size="7">• Недостаток влаги</text>
    <text x="310" y="334" fill="#5D4037" font-size="7">• Избыток/недостаток света</text>
  </g>
</svg>