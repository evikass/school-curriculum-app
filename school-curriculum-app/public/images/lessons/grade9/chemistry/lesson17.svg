<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient></defs>
  <rect width="500" height="350" rx="8" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#00695C">Азот и его соединения</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 17</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <rect x="14" y="54" width="155" height="80" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="91" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">N2 — Азот</text>
  <text x="91" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Z = 7, Ar = 14</text>
  <text x="91" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">78% в воздухе</text>
  <text x="91" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Тройная связь N=N</text>
  <text x="91" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Очень прочная молекула</text>
  <!-- NH3 -->
  <rect x="178" y="54" width="155" height="80" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="255" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">NH3 — Аммиак</text>
  <text x="255" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">N2 + 3H2 = 2NH3 (Габер)</text>
  <text x="255" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Бесцветный, резкий запах</text>
  <text x="255" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NH3 + H2O = NH3 x H2O</text>
  <text x="255" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Донор протонов (основание)</text>
  <!-- Nitrogen oxides -->
  <rect x="342" y="54" width="144" height="80" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="414" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Оксиды азота</text>
  <text x="356" y="86" font-family="Arial,sans-serif" font-size="5" fill="#004D40">N2O — веселящий газ</text>
  <text x="356" y="98" font-family="Arial,sans-serif" font-size="5" fill="#FF7043">NO — бесцветный</text>
  <text x="356" y="110" font-family="Arial,sans-serif" font-size="5" fill="#C62828">NO2 — бурый (токсичный)</text>
  <text x="356" y="122" font-family="Arial,sans-serif" font-size="5" fill="#004D40">N2O5 — твёрдый</text>
  <!-- HNO3 -->
  <rect x="14" y="142" width="472" height="90" rx="8" fill="white" fill-opacity="0.95" stroke="#00897B" stroke-width="1.2"/>
  <text x="250" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#00695C">HNO3 — Азотная кислота</text>
  <text x="150" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Сильная кислота, сильный окислитель</text>
  <text x="150" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">С металлами: разбавл. = NO</text>
  <text x="150" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Концентрир. = NO2</text>
  <text x="350" y="178" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">3Cu + 8HNO3(разб.) =</text>
  <text x="350" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">  3Cu(NO3)2 + 2NO + 4H2O</text>
  <text x="350" y="206" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Не выделяет H2 с металлами!</text>
  <text x="250" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Царская водка: HNO3 + 3HCl (растворяет Au, Pt)</text>
  <!-- Nitrates -->
  <rect x="14" y="240" width="230" height="95" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Нитраты</text>
  <text x="129" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Соли азотной кислоты</text>
  <text x="129" y="286" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">KNO3 — селитра</text>
  <text x="129" y="300" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Все нитраты растворимы</text>
  <text x="129" y="314" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Кач. реакция: HNO3 + Cu = бурый NO2</text>
  <text x="129" y="328" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Удобрения, взрывчатка</text>
  <rect x="256" y="240" width="230" height="95" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Аммониевые соли</text>
  <text x="270" y="272" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NH4Cl — нашатырь</text>
  <text x="270" y="286" font-family="Arial,sans-serif" font-size="6" fill="#004D40">(NH4)2SO4 — удобрение</text>
  <text x="270" y="300" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Кач. реакция: NH4+ + OH- =</text>
  <text x="270" y="314" font-family="Arial,sans-serif" font-size="6" fill="#004D40">  NH3 + H2O (запах аммиака)</text>
  <text x="270" y="328" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Разлагаются при нагревании</text>
</svg>