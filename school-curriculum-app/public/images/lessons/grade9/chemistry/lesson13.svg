<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E0F2F1"/><stop offset="100%" stop-color="#B2DFDB"/></linearGradient></defs>
  <rect width="500" height="350" rx="8" fill="url(#bg)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#00695C">Общая характеристика неметаллов</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 13</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <rect x="14" y="54" width="230" height="120" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="129" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Неметаллы в таблице</text>
  <text x="129" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Расположены справа и сверху</text>
  <text x="129" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">22 неметалла из 118 элементов</text>
  <text x="129" y="114" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">4-8 электронов на внешнем уровне</text>
  <text x="129" y="128" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Принимают электроны (окислители)</text>
  <text x="129" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">ЭО увеличивается справа налево</text>
  <text x="129" y="156" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">ЭО: F &gt; O &gt; N &gt; Cl &gt; Br &gt; I &gt; S &gt; C</text>
  <rect x="256" y="54" width="230" height="120" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1.2"/>
  <text x="371" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Свойства неметаллов</text>
  <text x="270" y="88" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Разнообразие агрегатных состояний</text>
  <text x="270" y="102" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Нет металлического блеска</text>
  <text x="270" y="116" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Хрупкие (твёрдые), летучие (газы)</text>
  <text x="270" y="130" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Не проводят ток (искл.: графит)</text>
  <text x="270" y="144" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Образуют кислые оксиды</text>
  <text x="270" y="158" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Образуют кислоты с водой</text>
  <!-- Hydrogen compounds -->
  <rect x="14" y="182" width="472" height="70" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Летучие водородные соединения</text>
  <text x="80" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">IV: CH4</text>
  <text x="160" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">V: NH3</text>
  <text x="240" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">VI: H2O, H2S</text>
  <text x="340" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">VII: HCl, HF</text>
  <text x="440" y="218" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">VIII: —</text>
  <text x="250" y="238" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Прочность и устойчивость растут в периоде слева направо</text>
  <!-- Allotropy -->
  <rect x="14" y="260" width="230" height="75" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="129" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Аллотропия</text>
  <text x="129" y="292" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">O: O2 и O3 (озон)</text>
  <text x="129" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">C: алмаз, графит, фуллерен</text>
  <text x="129" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">S: ромбическая, моноклинная</text>
  <rect x="256" y="260" width="230" height="75" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="371" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Оксиды неметаллов</text>
  <text x="270" y="292" font-family="Arial,sans-serif" font-size="6" fill="#004D40">CO2, SO2, SO3, N2O5, P2O5</text>
  <text x="270" y="306" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Кислотные оксиды:</text>
  <text x="270" y="320" font-family="Arial,sans-serif" font-size="6" fill="#004D40">SO3 + H2O = H2SO4</text>
</svg>