<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0F2F1"/>
      <stop offset="100%" stop-color="#B2DFDB"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" rx="8" fill="url(#bg7)"/>
  <rect x="3" y="3" width="494" height="344" rx="6" fill="none" stroke="#00695C" stroke-width="2.5" opacity="0.7"/>
  <text x="250" y="26" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#00695C">Электролитическая диссоциация</text>
  <text x="250" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#607D8B">Химия 9 класс — Урок 7</text>
  <line x1="20" y1="47" x2="480" y2="47" stroke="#00695C" stroke-width="0.8" opacity="0.3"/>
  <!-- Theory box -->
  <rect x="14" y="54" width="472" height="42" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#00695C">Теория С. Аррениуса (1887): Электролиты распадаются на ионы при растворении</text>
  <text x="250" y="86" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Диссоциация — обратимый процесс: NaCl = Na+ + Cl-</text>
  <!-- Dissociation of Acids -->
  <rect x="14" y="104" width="152" height="120" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <rect x="24" y="110" width="132" height="18" rx="4" fill="#EF9A9A" fill-opacity="0.4"/>
  <text x="90" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Кислоты</text>
  <text x="90" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">H+ + анион</text>
  <text x="24" y="160" font-family="Arial,sans-serif" font-size="6" fill="#004D40">HCl = H+ + Cl-</text>
  <text x="24" y="174" font-family="Arial,sans-serif" font-size="6" fill="#004D40">H2SO4 = 2H+ + SO4(2-)</text>
  <text x="24" y="188" font-family="Arial,sans-serif" font-size="6" fill="#004D40">H3PO4 (ступенчато)</text>
  <text x="24" y="200" font-family="Arial,sans-serif" font-size="6" fill="#00897B">Дают H+ в раствор</text>
  <text x="24" y="214" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">(ион гидроксония H3O+)</text>
  <!-- Dissociation of Bases -->
  <rect x="174" y="104" width="152" height="120" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <rect x="184" y="110" width="132" height="18" rx="4" fill="#90CAF9" fill-opacity="0.4"/>
  <text x="250" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1">Основания (щёлочи)</text>
  <text x="250" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Me(n+) + OH-</text>
  <text x="184" y="160" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaOH = Na+ + OH-</text>
  <text x="184" y="174" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Ca(OH)2 = Ca2+ + 2OH-</text>
  <text x="184" y="188" font-family="Arial,sans-serif" font-size="6" fill="#004D40">KOH = K+ + OH-</text>
  <text x="184" y="200" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1">Дают OH- в раствор</text>
  <text x="184" y="214" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Растворимые основания</text>
  <!-- Dissociation of Salts -->
  <rect x="334" y="104" width="152" height="120" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <rect x="344" y="110" width="132" height="18" rx="4" fill="#C8E6C9" fill-opacity="0.4"/>
  <text x="410" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32">Соли</text>
  <text x="410" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#004D40">Me(n+) + анион</text>
  <text x="344" y="160" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaCl = Na+ + Cl-</text>
  <text x="344" y="174" font-family="Arial,sans-serif" font-size="6" fill="#004D40">K2SO4 = 2K+ + SO4(2-)</text>
  <text x="344" y="188" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Ca(NO3)2 = Ca2+ + 2NO3-</text>
  <text x="344" y="200" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Диссоциируют полностью</text>
  <text x="344" y="214" font-family="Arial,sans-serif" font-size="5" fill="#607D8B">Сильные электролиты</text>
  <!-- Degree of dissociation -->
  <rect x="14" y="232" width="472" height="105" rx="8" fill="white" fill-opacity="0.9" stroke="#00897B" stroke-width="1"/>
  <text x="250" y="250" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#00695C">Степень диссоциации: a = N(дисс.) / N(общ.)</text>
  <!-- Strong -->
  <rect x="24" y="260" width="145" height="65" rx="6" fill="#C8E6C9" fill-opacity="0.4" stroke="#2E7D32" stroke-width="1"/>
  <text x="96" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32">Сильные (a ~ 100%)</text>
  <text x="96" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">HCl, H2SO4, HNO3</text>
  <text x="96" y="304" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaOH, KOH</text>
  <text x="96" y="317" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NaCl, K2SO4</text>
  <!-- Medium -->
  <rect x="178" y="260" width="145" height="65" rx="6" fill="#FFF9C4" fill-opacity="0.4" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#F57F17">Средние (a = 30-70%)</text>
  <text x="250" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">H3PO4</text>
  <text x="250" y="304" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">H2SO3</text>
  <text x="250" y="317" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">Диссоциируют ступенчато</text>
  <!-- Weak -->
  <rect x="332" y="260" width="145" height="65" rx="6" fill="#FFCDD2" fill-opacity="0.4" stroke="#C62828" stroke-width="1"/>
  <text x="404" y="276" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828">Слабые (a менее 30%)</text>
  <text x="404" y="291" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">H2CO3, H2S</text>
  <text x="404" y="304" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">NH3 x H2O</text>
  <text x="404" y="317" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#004D40">CH3COOH</text>
</svg>