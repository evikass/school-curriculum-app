<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFECB3;stop-opacity:1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg11)"/>
  
  <!-- Title -->
  <rect x="100" y="10" width="300" height="45" rx="10" fill="#FFF" stroke="#FF9800" stroke-width="2"/>
  <text x="250" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#E65100" text-anchor="middle">🏆 Итоговый урок</text>
  
  <!-- Trophy/medal -->
  <g transform="translate(200, 70)">
    <!-- Medal -->
    <circle cx="50" cy="50" r="45" fill="#FFD54F" stroke="#FF8F00" stroke-width="3">
      <animate attributeName="r" values="45;47;45" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="50" r="35" fill="#FFC107"/>
    <!-- Star -->
    <polygon points="50,20 55,38 74,38 59,50 65,68 50,56 35,68 41,50 26,38 45,38" fill="#FF8F00"/>
    <!-- Ribbon -->
    <rect x="35" y="95" width="12" height="30" fill="#E91E63"/>
    <rect x="53" y="95" width="12" height="30" fill="#E91E63"/>
    <!-- Text -->
    <text x="50" y="58" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#FFF" text-anchor="middle">ЗНАТОК</text>
  </g>
  
  <!-- Safety categories summary -->
  <!-- Road safety -->
  <g transform="translate(20, 150)">
    <rect x="0" y="0" width="110" height="80" fill="#E3F2FD" rx="8" stroke="#2196F3" stroke-width="2"/>
    <text x="55" y="18" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#0D47A1" text-anchor="middle">🚦 ДОРОГА</text>
    <text x="55" y="35" font-family="Arial, sans-serif" font-size="8" fill="#1565C0" text-anchor="middle">• Светофор</text>
    <text x="55" y="48" font-family="Arial, sans-serif" font-size="8" fill="#1976D2" text-anchor="middle">• Переход</text>
    <text x="55" y="61" font-family="Arial, sans-serif" font-size="8" fill="#1E88E5" text-anchor="middle">• Маршрут</text>
    <circle cx="95" cy="65" r="10" fill="#4CAF50"/>
    <text x="95" y="69" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">✓</text>
  </g>
  
  <!-- Home safety -->
  <g transform="translate(140, 150)">
    <rect x="0" y="0" width="110" height="80" fill="#FFEBEE" rx="8" stroke="#F44336" stroke-width="2"/>
    <text x="55" y="18" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#B71C1C" text-anchor="middle">🏠 ДОМ</text>
    <text x="55" y="35" font-family="Arial, sans-serif" font-size="8" fill="#C62828" text-anchor="middle">• Электричество</text>
    <text x="55" y="48" font-family="Arial, sans-serif" font-size="8" fill="#D32F2F" text-anchor="middle">• Огонь</text>
    <text x="55" y="61" font-family="Arial, sans-serif" font-size="8" fill="#E53935" text-anchor="middle">• Вода</text>
    <circle cx="95" cy="65" r="10" fill="#4CAF50"/>
    <text x="95" y="69" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">✓</text>
  </g>
  
  <!-- Stranger safety -->
  <g transform="translate(260, 150)">
    <rect x="0" y="0" width="110" height="80" fill="#F3E5F5" rx="8" stroke="#9C27B0" stroke-width="2"/>
    <text x="55" y="18" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#6A1B9A" text-anchor="middle">🚫 ЛЮДИ</text>
    <text x="55" y="35" font-family="Arial, sans-serif" font-size="8" fill="#7B1FA2" text-anchor="middle">• Незнакомцы</text>
    <text x="55" y="48" font-family="Arial, sans-serif" font-size="8" fill="#8E24AA" text-anchor="middle">• Обман</text>
    <text x="55" y="61" font-family="Arial, sans-serif" font-size="8" fill="#9C27B0" text-anchor="middle">• Дверь</text>
    <circle cx="95" cy="65" r="10" fill="#4CAF50"/>
    <text x="95" y="69" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">✓</text>
  </g>
  
  <!-- Emergency -->
  <g transform="translate(380, 150)">
    <rect x="0" y="0" width="100" height="80" fill="#E8F5E9" rx="8" stroke="#4CAF50" stroke-width="2"/>
    <text x="50" y="18" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">📞 ЭКСТРЕН</text>
    <text x="50" y="35" font-family="Arial, sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">• 112</text>
    <text x="50" y="48" font-family="Arial, sans-serif" font-size="8" fill="#388E3C" text-anchor="middle">• 101, 102, 103</text>
    <text x="50" y="61" font-family="Arial, sans-serif" font-size="8" fill="#43A047" text-anchor="middle">• Помощь</text>
    <circle cx="85" cy="65" r="10" fill="#4CAF50"/>
    <text x="85" y="69" font-family="Arial, sans-serif" font-size="10" fill="#FFF" text-anchor="middle">✓</text>
  </g>
  
  <!-- Quiz question mark -->
  <g transform="translate(30, 70)">
    <circle cx="30" cy="30" r="28" fill="#FF9800" stroke="#E65100" stroke-width="2">
      <animate attributeName="r" values="28;30;28" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="42" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FFF" text-anchor="middle">?</text>
  </g>
  
  <!-- Stars for decoration -->
  <polygon points="470,80 473,90 483,90 475,97 478,107 470,101 462,107 465,97 457,90 467,90" fill="#FFC107">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="30,280 32,287 40,287 34,292 36,299 30,295 24,299 26,292 20,287 28,287" fill="#FFC107">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </polygon>
  
  <!-- Final message -->
  <rect x="50" y="250" width="400" height="80" rx="10" fill="#FFF" stroke="#FF9800" stroke-width="2"/>
  <text x="250" y="275" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#E65100" text-anchor="middle">🎉 Поздравляем! Ты изучил все правила безопасности!</text>
  <text x="250" y="295" font-family="Arial, sans-serif" font-size="11" fill="#F57C00" text-anchor="middle">Теперь ты знаешь, как:</text>
  <text x="250" y="315" font-family="Arial, sans-serif" font-size="10" fill="#FF9800" text-anchor="middle">✓ Переходить дорогу  ✓ Быть осторожным дома  ✓ Не разговаривать с незнакомцами  ✓ Звонить в экстренные службы</text>
  
  <!-- Confetti -->
  <circle cx="50" cy="50" r="4" fill="#E91E63">
    <animate attributeName="cy" values="50;60;50" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="60" r="3" fill="#2196F3">
    <animate attributeName="cy" values="60;70;60" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <rect x="100" y="55" width="5" height="5" fill="#4CAF50" transform="rotate(45, 102, 57)">
    <animate attributeName="y" values="55;65;55" dur="0.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="380" y="50" width="5" height="5" fill="#FF9800" transform="rotate(45, 382, 52)">
    <animate attributeName="y" values="50;60;50" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>