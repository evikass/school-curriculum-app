<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="lit6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B3E5FC;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#81D4FA;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#lit6)"/>
  <rect width="500" height="350" fill="#FFF8E1" opacity="0.4"/>
  
  <!-- Sun -->
  <circle cx="420" cy="50" r="28" fill="#FFD54F" opacity="0.7">
    <animate attributeName="r" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#01579B" text-anchor="middle">🎭 И.А. Крылов</text>
  <rect x="80" y="42" width="340" height="2" rx="1" fill="#03A9F4" opacity="0.5"/>
  
  <!-- Ground -->
  <ellipse cx="250" cy="320" rx="260" ry="45" fill="#81D4FA" opacity="0.5"/>
  
  <!-- Crow and Fox -->
  <g transform="translate(50, 80)">
    <!-- Tree -->
    <rect x="100" y="80" width="20" height="100" fill="#795548"/>
    <ellipse cx="110" cy="60" rx="60" ry="50" fill="#4CAF50"/>
    
    <!-- Crow -->
    <g transform="translate(90, 30)">
      <ellipse cx="20" cy="20" rx="15" ry="12" fill="#37474F"/>
      <circle cx="10" cy="15" r="10" fill="#37474F"/>
      <polygon points="0,15 -10,18 0,20" fill="#FF9800"/>
      <circle cx="5" cy="13" r="2" fill="#FFF"/>
      <circle cx="5" cy="13" r="1" fill="#333"/>
      <ellipse cx="20" cy="30" rx="8" ry="4" fill="#FFD54F">
        <animate attributeName="ry" values="4;6;4" dur="2s" repeatCount="indefinite"/>
      </ellipse>
    </g>
    
    <!-- Fox below -->
    <g transform="translate(180, 130)">
      <ellipse cx="30" cy="40" rx="25" ry="18" fill="#FF7043"/>
      <circle cx="15" cy="25" r="15" fill="#FF7043"/>
      <polygon points="5,15 10,0 20,15" fill="#FF7043"/>
      <polygon points="20,15 25,0 35,15" fill="#FF7043"/>
      <circle cx="8" cy="22" r="3" fill="#FFF"/>
      <circle cx="8" cy="22" r="1.5" fill="#333"/>
      <ellipse cx="15" cy="32" rx="4" ry="2" fill="#333"/>
    </g>
  </g>
  
  <!-- Info -->
  <g transform="translate(280, 80)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="170" height="100" fill="#E1F5FE" rx="8" stroke="#03A9F4"/>
    <text x="85" y="22" font-size="12" font-weight="bold" fill="#01579B" text-anchor="middle">Баснописец России</text>
    <text x="85" y="45" font-size="10" fill="#0277BD" text-anchor="middle">Более 200 басен</text>
    <text x="85" y="65" font-size="9" fill="#0288D1" text-anchor="middle">«Ворона и Лисица»</text>
    <text x="85" y="80" font-size="9" fill="#0288D1" text-anchor="middle">«Стрекоза и Муравей»</text>
    <text x="85" y="95" font-size="9" fill="#0288D1" text-anchor="middle">«Квартет»</text>
  </g>
  
  <!-- Moral -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="400" height="55" fill="#FFF8E1" rx="8" stroke="#FFC107"/>
    <text x="200" y="18" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#E65100" text-anchor="middle">Мораль басни «Ворона и Лисица»</text>
    <text x="200" y="35" font-family="Arial, sans-serif" font-size="10" fill="#F57C00" text-anchor="middle">«Уж сколько раз твердили миру,</text>
    <text x="200" y="48" font-family="Arial, sans-serif" font-size="10" fill="#FF9800" text-anchor="middle">Что лесть гнусна, вредна...»</text>
  </g>
  
  <!-- Flowers -->
  <circle cx="25" cy="310" r="5" fill="#E91E63"/>
  <circle cx="475" cy="310" r="5" fill="#E91E63"/>
</svg>