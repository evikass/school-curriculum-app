<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5"/>
      <stop offset="100%" stop-color="#E1BEE7"/>
    </linearGradient>
    <linearGradient id="friendGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9C27B0"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg6)"/>
  
  <!-- Decorative circles -->
  <circle cx="50" cy="300" r="30" fill="#CE93D8" opacity="0.3">
    <animate attributeName="r" values="28;35;28" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="280" r="25" fill="#BA68C8" opacity="0.3">
    <animate attributeName="r" values="23;30;23" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="250" y="35" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#7B1FA2" text-anchor="middle">👫 Дружба</text>
  <rect x="150" y="42" width="200" height="2" rx="1" fill="#9C27B0" opacity="0.6"/>
  
  <!-- Sun -->
  <circle cx="450" cy="50" r="22" fill="#FFD54F">
    <animate attributeName="r" values="20;25;20" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Two friends holding hands -->
  <g transform="translate(120, 80)">
    <!-- Friend 1 -->
    <g>
      <circle cx="40" cy="30" r="22" fill="#FFCC80"/>
      <ellipse cx="40" cy="22" rx="18" ry="10" fill="#5D4037"/>
      <circle cx="34" cy="28" r="3" fill="#5D4037"/>
      <circle cx="46" cy="28" r="3" fill="#5D4037"/>
      <path d="M32,38 Q40,46 48,38" stroke="#E65100" stroke-width="2" fill="none"/>
      <rect x="20" y="52" width="40" height="50" rx="10" fill="#E91E63"/>
      <rect x="22" y="102" width="16" height="35" rx="5" fill="#1976D2"/>
      <rect x="42" y="102" width="16" height="35" rx="5" fill="#1976D2"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;5,0;0,0" dur="2s" repeatCount="indefinite"/>
    </g>
    
    <!-- Holding hands -->
    <ellipse cx="90" cy="90" rx="15" ry="10" fill="#FFCC80">
      <animate attributeName="cy" values="90;88;90" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
    
    <!-- Friend 2 -->
    <g transform="translate(100, 0)">
      <circle cx="40" cy="30" r="22" fill="#FFCC80"/>
      <ellipse cx="40" cy="22" rx="18" ry="10" fill="#FFCC80"/>
      <circle cx="34" cy="28" r="3" fill="#5D4037"/>
      <circle cx="46" cy="28" r="3" fill="#5D4037"/>
      <path d="M32,38 Q40,46 48,38" stroke="#E65100" stroke-width="2" fill="none"/>
      <rect x="20" y="52" width="40" height="50" rx="10" fill="#2196F3"/>
      <rect x="22" y="102" width="16" height="35" rx="5" fill="#4CAF50"/>
      <rect x="42" y="102" width="16" height="35" rx="5" fill="#4CAF50"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;-5,0;0,0" dur="2s" repeatCount="indefinite"/>
    </g>
  </g>
  
  <!-- Friendship heart between them -->
  <g transform="translate(220, 60)">
    <path d="M15,8 C15,3 10,0 7,0 C4,0 0,4 0,8 C0,15 15,25 15,25 C15,25 30,15 30,8 C30,4 26,0 23,0 C20,0 15,3 15,8" fill="#E91E63">
      <animate attributeName="transform" type="scale" values="1;1.2;1" dur="1.5s" repeatCount="indefinite" additive="sum"/>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="1.5s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Friendship qualities -->
  <g transform="translate(320, 80)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="160" height="130" fill="#FFF" rx="10" stroke="#9C27B0"/>
    <text x="80" y="25" font-size="12" font-weight="bold" fill="#7B1FA2" text-anchor="middle">Настоящий друг</text>
    <text x="15" y="50" font-size="10" fill="#8E24AA">💜 Помогает в беде</text>
    <text x="15" y="70" font-size="10" fill="#8E24AA">💜 Делиться радостью</text>
    <text x="15" y="90" font-size="10" fill="#8E24AA">💜 Хранит секреты</text>
    <text x="15" y="110" font-size="10" fill="#8E24AA">💜 Не предаёт</text>
    <text x="15" y="130" font-size="10" fill="#8E24AA">💜 Понимает без слов</text>
  </g>
  
  <!-- Friendship hands -->
  <g transform="translate(30, 220)">
    <ellipse cx="30" cy="20" rx="25" ry="18" fill="#FFCC80" stroke="#E65100" stroke-width="2"/>
    <ellipse cx="70" cy="20" rx="25" ry="18" fill="#FFCC80" stroke="#E65100" stroke-width="2"/>
    <path d="M45,15 L55,15 M45,25 L55,25" stroke="#E65100" stroke-width="3"/>
    <text x="50" y="60" font-family="Arial, sans-serif" font-size="12" fill="#7B1FA2" text-anchor="middle">Дружба</text>
  </g>
  
  <!-- Lesson box -->
  <g transform="translate(120, 280)">
    <rect x="0" y="0" width="380" height="55" fill="#F3E5F5" rx="8" stroke="#9C27B0"/>
    <text x="190" y="20" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6A1B9A" text-anchor="middle">💡 «Не имей сто рублей, а имей сто друзей»</text>
    <text x="190" y="40" font-family="Arial, sans-serif" font-size="10" fill="#7B1FA2" text-anchor="middle">Друга найти трудно, потерять — легко. Береги дружбу!</text>
  </g>
  
  <!-- Stars -->
  <text x="20" y="80" font-size="14">✨</text>
  <text x="480" cy="150" font-size="12">⭐</text>
  <text x="100" y="320" font-size="16">🌟</text>
</svg>