<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="chr1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5C6BC0"/><stop offset="100%" stop-color="#3949AB"/></linearGradient>
<linearGradient id="chr2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EF5350"/><stop offset="100%" stop-color="#C62828"/></linearGradient>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2E7D32"/><stop offset="100%" stop-color="#43A047"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<rect x="10" y="8" width="480" height="28" rx="5" fill="url(#bar)" opacity="0.9"/>
<text x="250" y="27" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Сцепленное наследование генов · Биология 10 класс — Урок 41</text>

<!-- Title -->
<text x="250" y="55" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#1B5E20" text-anchor="middle">Гены на одной хромосоме наследуются вместе (закон Моргана)</text>

<!-- Parent chromosomes with linked genes -->
<text x="70" y="78" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3949AB" text-anchor="middle">Хромосома 1</text>
<rect x="55" y="82" width="30" height="90" rx="10" fill="url(#chr1)" stroke="#283593" stroke-width="1.5"/>
<text x="70" y="102" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">A</text>
<text x="70" y="148" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">B</text>

<text x="130" y="78" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Хромосома 2</text>
<rect x="115" y="82" width="30" height="90" rx="10" fill="url(#chr2)" stroke="#B71C1C" stroke-width="1.5"/>
<text x="130" y="102" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">a</text>
<text x="130" y="148" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">b</text>

<!-- Arrow to gametes -->
<text x="190" y="127" font-family="Arial,sans-serif" font-size="18" fill="#555" text-anchor="middle">→</text>

<!-- Non-crossover gametes -->
<rect x="205" y="85" width="55" height="28" rx="6" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
<text x="232" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#3949AB" text-anchor="middle">AB</text>
<rect x="205" y="135" width="55" height="28" rx="6" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
<text x="232" y="154" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">ab</text>

<text x="232" y="80" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">Некроссоверные</text>

<!-- Crossing over section -->
<text x="370" y="78" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Кроссинговер</text>

<!-- Crossing over diagram -->
<line x1="340" y1="100" x2="400" y2="148" stroke="#3949AB" stroke-width="3" opacity="0.7"/>
<line x1="400" y1="100" x2="340" y2="148" stroke="#C62828" stroke-width="3" opacity="0.7"/>
<text x="345" y="96" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3949AB" text-anchor="middle">A</text>
<text x="395" y="96" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">a</text>
<text x="345" y="164" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#C62828" text-anchor="middle">b</text>
<text x="395" y="164" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#3949AB" text-anchor="middle">B</text>
<!-- X at crossover point -->
<circle cx="370" cy="124" r="8" fill="none" stroke="#E65100" stroke-width="1.5" stroke-dasharray="2,2"/>

<!-- Recombinant gametes -->
<text x="440" y="80" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle">Рекомбинантные</text>
<rect x="415" y="85" width="50" height="28" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
<text x="440" y="104" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">Ab</text>
<rect x="415" y="135" width="50" height="28" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
<text x="440" y="154" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100" text-anchor="middle">aB</text>

<!-- Separator -->
<line x1="15" y1="178" x2="485" y2="178" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="4,3"/>

<!-- Morgan's experiment -->
<text x="250" y="196" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#1B5E20" text-anchor="middle">Опыты Т. Моргана на дрозофилах</text>

<!-- Drosophila wild type -->
<ellipse cx="55" cy="225" rx="18" ry="10" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
<circle cx="42" cy="222" r="5" fill="#4E342E" stroke="#3E2723" stroke-width="0.5"/>
<line x1="35" y1="218" x2="28" y2="210" stroke="#3E2723" stroke-width="0.8"/>
<line x1="35" y1="222" x2="27" y2="222" stroke="#3E2723" stroke-width="0.8"/>
<text x="55" y="248" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">Серое тело,</text>
<text x="55" y="257" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">норм. крылья</text>
<text x="55" y="268" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#3949AB" text-anchor="middle">AABB</text>

<!-- × -->
<text x="100" y="228" font-family="Arial,sans-serif" font-size="16" fill="#555" text-anchor="middle">×</text>

<!-- Drosophila mutant -->
<ellipse cx="145" cy="225" rx="18" ry="10" fill="#212121" stroke="#000" stroke-width="1"/>
<circle cx="132" cy="222" r="5" fill="#111" stroke="#000" stroke-width="0.5"/>
<line x1="155" y1="215" x2="162" y2="212" stroke="#333" stroke-width="0.8"/>
<line x1="158" y1="218" x2="166" y2="218" stroke="#333" stroke-width="0.8"/>
<text x="145" y="248" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">Чёрное тело,</text>
<text x="145" y="257" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">зачаточ. крылья</text>
<text x="145" y="268" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">aabb</text>

<!-- F1 arrow -->
<text x="200" y="228" font-family="Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle">→</text>

<!-- F1 result -->
<rect x="215" y="210" width="80" height="35" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
<text x="255" y="225" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">F₁: AaBb</text>
<text x="255" y="238" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">Серое, норм.</text>

<!-- Test cross arrow -->
<text x="310" y="228" font-family="Arial,sans-serif" font-size="10" fill="#555" text-anchor="middle">× aabb →</text>

<!-- F2 results -->
<rect x="360" y="195" width="55" height="22" rx="4" fill="#E8EAF6" stroke="#3949AB" stroke-width="1"/>
<text x="387" y="210" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#3949AB" text-anchor="middle">AaBb 41.5%</text>

<rect x="360" y="220" width="55" height="22" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
<text x="387" y="235" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">aabb 41.5%</text>

<rect x="420" y="195" width="55" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
<text x="447" y="210" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">Aabb 8.5%</text>

<rect x="420" y="220" width="55" height="22" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
<text x="447" y="235" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">aaBb 8.5%</text>

<!-- Key concepts -->
<line x1="15" y1="278" x2="485" y2="278" stroke="#2E7D32" stroke-width="0.8" stroke-dasharray="4,3"/>

<rect x="15" y="285" width="230" height="55" rx="5" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
<text x="130" y="300" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Группа сцепления</text>
<text x="130" y="312" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">= все гены одной хромосомы</text>
<text x="130" y="324" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">У человека 23 группы сцепления</text>
<text x="130" y="336" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">(по числу пар хромосом)</text>

<rect x="255" y="285" width="230" height="55" rx="5" fill="white" fill-opacity="0.7" stroke="#E65100" stroke-width="1"/>
<text x="370" y="300" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E65100" text-anchor="middle">Расстояние между генами</text>
<text x="370" y="312" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">= частота кроссинговера (%)</text>
<text x="370" y="324" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">1 морганида = 1% кроссинговера</text>
<text x="370" y="336" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">Чем дальше гены, тем чаще кроссинговер</text>
</svg>