<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg52" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <filter id="glow52"><feGaussianBlur stdDeviation="1" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="500" height="350" fill="url(#bg52)"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#5c6bc0" stroke-width="2" rx="6"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="492" height="36" fill="#283593" rx="4"/>
  <text x="250" y="27" text-anchor="middle" fill="#e8eaf6" font-size="12" font-weight="bold" font-family="Arial">Основные закономерности эволюции — Биология 10 класс — Урок 52</text>

  <!-- Law 1: Irreversibility -->
  <rect x="8" y="48" width="155" height="52" fill="#1a1a3e" stroke="#7986cb" stroke-width="1" rx="4"/>
  <circle cx="22" cy="60" r="8" fill="#3f51b5"/>
  <text x="22" y="63" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold" font-family="Arial">1</text>
  <text x="36" y="62" fill="#c5cae9" font-size="8" font-weight="bold" font-family="Arial">Необратимость</text>
  <text x="16" y="76" fill="#9fa8da" font-size="6" font-family="Arial">Эволюция не идёт вспять.</text>
  <text x="16" y="86" fill="#9fa8da" font-size="6" font-family="Arial">Возврат к предковому</text>
  <text x="16" y="94" fill="#9fa8da" font-size="6" font-family="Arial">состоянию невозможен.</text>
  <!-- One-way arrow -->
  <line x1="120" y1="72" x2="150" y2="72" stroke="#7986cb" stroke-width="1.5" marker-end="url(#arr52)"/>
  <line x1="150" y1="72" x2="120" y2="72" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="135" y="68" text-anchor="middle" fill="#ef5350" font-size="6" font-family="Arial">✗</text>

  <!-- Law 2: Progressiveness -->
  <rect x="170" y="48" width="155" height="52" fill="#1a1a3e" stroke="#7986cb" stroke-width="1" rx="4"/>
  <circle cx="184" cy="60" r="8" fill="#3f51b5"/>
  <text x="184" y="63" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold" font-family="Arial">2</text>
  <text x="198" y="62" fill="#c5cae9" font-size="8" font-weight="bold" font-family="Arial">Прогрессивность</text>
  <text x="178" y="76" fill="#9fa8da" font-size="6" font-family="Arial">Нарастание сложности</text>
  <text x="178" y="86" fill="#9fa8da" font-size="6" font-family="Arial">организации во времени.</text>
  <!-- Ascending steps -->
  <rect x="290" y="85" width="12" height="8" fill="#5c6bc0" rx="1"/>
  <rect x="303" y="78" width="12" height="15" fill="#5c6bc0" rx="1"/>
  <rect x="316" y="70" width="12" height="23" fill="#5c6bc0" rx="1"/>

  <!-- Law 3: Adaptive nature -->
  <rect x="332" y="48" width="160" height="52" fill="#1a1a3e" stroke="#7986cb" stroke-width="1" rx="4"/>
  <circle cx="346" cy="60" r="8" fill="#3f51b5"/>
  <text x="346" y="63" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold" font-family="Arial">3</text>
  <text x="360" y="62" fill="#c5cae9" font-size="8" font-weight="bold" font-family="Arial">Приспособительный характер</text>
  <text x="340" y="76" fill="#9fa8da" font-size="6" font-family="Arial">Все изменения адаптивны,</text>
  <text x="340" y="86" fill="#9fa8da" font-size="6" font-family="Arial">целесообразны в данных</text>
  <text x="340" y="94" fill="#9fa8da" font-size="6" font-family="Arial">условиях среды.</text>

  <!-- Law 4: Divergence -->
  <rect x="8" y="108" width="150" height="55" fill="#0d2a0d" stroke="#66bb6a" stroke-width="1" rx="4"/>
  <circle cx="22" cy="120" r="8" fill="#2e7d32"/>
  <text x="22" y="123" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold" font-family="Arial">4</text>
  <text x="36" y="122" fill="#a5d6a7" font-size="8" font-weight="bold" font-family="Arial">Дивергенция</text>
  <text x="16" y="136" fill="#81c784" font-size="6" font-family="Arial">Расхождение признаков</text>
  <text x="16" y="146" fill="#81c784" font-size="6" font-family="Arial">от общего предка</text>
  <!-- Divergence tree -->
  <line x1="100" y1="155" x2="100" y2="138" stroke="#66bb6a" stroke-width="1.5"/>
  <line x1="100" y1="138" x2="80" y2="118" stroke="#66bb6a" stroke-width="1"/>
  <line x1="100" y1="138" x2="120" y2="118" stroke="#66bb6a" stroke-width="1"/>
  <line x1="80" y1="118" x2="70" y2="112" stroke="#66bb6a" stroke-width="0.8"/>
  <line x1="80" y1="118" x2="90" y2="112" stroke="#66bb6a" stroke-width="0.8"/>
  <line x1="120" y1="118" x2="110" y2="112" stroke="#66bb6a" stroke-width="0.8"/>
  <line x1="120" y1="118" x2="130" y2="112" stroke="#66bb6a" stroke-width="0.8"/>
  <circle cx="70" cy="111" r="2" fill="#81c784"/>
  <circle cx="90" cy="111" r="2" fill="#81c784"/>
  <circle cx="110" cy="111" r="2" fill="#81c784"/>
  <circle cx="130" cy="111" r="2" fill="#81c784"/>

  <!-- Law 5: Convergence -->
  <rect x="165" y="108" width="327" height="55" fill="#2a0d0d" stroke="#ef5350" stroke-width="1" rx="4"/>
  <circle cx="179" cy="120" r="8" fill="#c62828"/>
  <text x="179" y="123" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold" font-family="Arial">5</text>
  <text x="193" y="122" fill="#ef9a9a" font-size="8" font-weight="bold" font-family="Arial">Конвергенция — схождение признаков у неродственных организмов</text>

  <!-- Convergence diagram: similar body shapes -->
  <!-- Fish (shark) -->
  <path d="M195,148 Q210,135 240,140 Q270,135 285,148 Q270,155 240,152 Q210,155 195,148 Z" fill="#546e7a" stroke="#37474f" stroke-width="0.8"/>
  <path d="M280,148 L290,140 L290,156 Z" fill="#546e7a" stroke="#37474f" stroke-width="0.5"/>
  <path d="M240,138 L245,130 L250,138" fill="#546e7a" stroke="#37474f" stroke-width="0.5"/>
  <circle cx="205" cy="145" r="2" fill="#263238"/>
  <text x="240" y="165" text-anchor="middle" fill="#90a4ae" font-size="6" font-family="Arial">Акула (рыба)</text>

  <!-- Dolphin (mammal) -->
  <path d="M305,148 Q320,135 350,140 Q380,135 395,148 Q380,155 350,152 Q320,155 305,148 Z" fill="#78909c" stroke="#546e7a" stroke-width="0.8"/>
  <path d="M390,148 L400,140 L400,156 Z" fill="#78909c" stroke="#546e7a" stroke-width="0.5"/>
  <path d="M350,138 L355,130 L360,138" fill="#78909c" stroke="#546e7a" stroke-width="0.5"/>
  <circle cx="315" cy="145" r="2" fill="#263238"/>
  <path d="M308,147 L305,148 L308,149" stroke="#546e7a" stroke-width="0.5" fill="none"/>
  <text x="350" y="165" text-anchor="middle" fill="#90a4ae" font-size="6" font-family="Arial">Дельфин (млекоп.)</text>

  <!-- Ichthyosaur (reptile) -->
  <path d="M415,148 Q430,135 460,140 Q480,135 488,148 Q480,155 460,152 Q430,155 415,148 Z" fill="#607d8b" stroke="#455a64" stroke-width="0.8"/>
  <path d="M485,148 L492,140 L492,156 Z" fill="#607d8b" stroke="#455a64" stroke-width="0.5"/>
  <path d="M460,138 L465,130 L470,138" fill="#607d8b" stroke="#455a64" stroke-width="0.5"/>
  <circle cx="425" cy="145" r="2" fill="#263238"/>
  <text x="452" y="165" text-anchor="middle" fill="#90a4ae" font-size="6" font-family="Arial">Ихтиозавр (рептилия)</text>

  <!-- Bracket showing similar shape -->
  <text x="340" y="178" text-anchor="middle" fill="#ef5350" font-size="7" font-weight="bold" font-family="Arial">↓ Обтекаемая форма тела — результат конвергенции ↓</text>

  <!-- Parallel evolution diagram -->
  <rect x="8" y="172" width="484" height="80" fill="#0d1a2a" stroke="#42a5f5" stroke-width="1" rx="4"/>
  <text x="250" y="186" text-anchor="middle" fill="#bbdefb" font-size="8" font-weight="bold" font-family="Arial">Сравнение дивергенции и конвергенции</text>

  <!-- Divergence side -->
  <text x="120" y="200" text-anchor="middle" fill="#81c784" font-size="7" font-weight="bold" font-family="Arial">Дивергенция</text>
  <line x1="120" y1="240" x2="120" y2="210" stroke="#66bb6a" stroke-width="2"/>
  <line x1="120" y1="210" x2="60" y2="195" stroke="#66bb6a" stroke-width="1.5"/>
  <line x1="120" y1="210" x2="180" y2="195" stroke="#66bb6a" stroke-width="1.5"/>
  <text x="50" y="205" text-anchor="middle" fill="#a5d6a7" font-size="5.5" font-family="Arial">Птицы</text>
  <text x="190" y="205" text-anchor="middle" fill="#a5d6a7" font-size="5.5" font-family="Arial">Рептилии</text>
  <circle cx="120" cy="243" r="3" fill="#4caf50"/>
  <text x="120" y="252" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Общий предок</text>

  <!-- Convergence side -->
  <text x="370" y="200" text-anchor="middle" fill="#ef9a9a" font-size="7" font-weight="bold" font-family="Arial">Конвергенция</text>
  <line x1="310" y1="243" x2="310" y2="210" stroke="#ef5350" stroke-width="1.5"/>
  <line x1="430" y1="243" x2="430" y2="210" stroke="#ef5350" stroke-width="1.5"/>
  <line x1="310" y1="210" x2="340" y2="195" stroke="#ef5350" stroke-width="1.5"/>
  <line x1="430" y1="210" x2="400" y2="195" stroke="#ef5350" stroke-width="1.5"/>
  <circle cx="340" cy="193" r="5" fill="none" stroke="#ef5350" stroke-width="1"/>
  <text x="340" y="195" text-anchor="middle" fill="#ef5350" font-size="5" font-family="Arial">≈</text>
  <text x="300" y="252" text-anchor="middle" fill="#ef9a9a" font-size="5" font-family="Arial">Млекопитающие</text>
  <text x="440" y="252" text-anchor="middle" fill="#ef9a9a" font-size="5" font-family="Arial">Рыбы</text>
  <text x="370" y="195" text-anchor="middle" fill="#ef5350" font-size="5" font-family="Arial">Сходные признаки</text>

  <!-- Parallelism -->
  <rect x="8" y="258" width="484" height="36" fill="#1a1a2e" stroke="#ab47bc" stroke-width="1" rx="4"/>
  <text x="250" y="272" text-anchor="middle" fill="#ce93d8" font-size="7" font-weight="bold" font-family="Arial">Параллелизм — независимое развитие сходных признаков у родственных групп</text>
  <text x="250" y="285" text-anchor="middle" fill="#ba68c8" font-size="6" font-family="Arial">Пример: сумчатые и плацентарные млекопитающие (сумчатая крыса ↔ обыкновенная крыса, сумчатый волк ↔ волк)</text>

  <!-- Bottom summary -->
  <rect x="8" y="300" width="484" height="42" fill="#0d0d2a" stroke="#3f51b5" stroke-width="1" rx="4"/>
  <text x="250" y="315" text-anchor="middle" fill="#c5cae9" font-size="8" font-weight="bold" font-family="Arial">Правило А.Н. Северцова:</text>
  <text x="250" y="328" text-anchor="middle" fill="#9fa8da" font-size="6.5" font-family="Arial">Эволюция идёт по пути ароморфозов, идиоадаптаций и дегенераций —交替но сменяя друг друга</text>
  <text x="250" y="338" text-anchor="middle" fill="#7986cb" font-size="6" font-family="Arial">Макроэволюция = микроэволюция (одни и те же механизмы, разный масштаб)</text>

  <defs><marker id="arr52" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7986cb"/></marker></defs>
</svg>