<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#1B5E20" text-anchor="middle">Макро- и микроэлементы клетки</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 3</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Pie chart showing element composition -->
<g transform="translate(120,155)">
  <!-- O 65% slice -->
  <path d="M0,0 L60,0 A60,60 0 1,1 -18,-57 Z" fill="#1565C0" opacity="0.7" stroke="white" stroke-width="1"/>
  <text x="-15" y="25" font-family="Arial,sans-serif" font-size="8" fill="white" font-weight="bold" text-anchor="middle">O 65%</text>
  <!-- C 18% slice -->
  <path d="M0,0 L-18,-57 A60,60 0 0,1 30,-52 Z" fill="#2E7D32" opacity="0.7" stroke="white" stroke-width="1"/>
  <text x="8" y="-42" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold" text-anchor="middle">C 18%</text>
  <!-- H 10% slice -->
  <path d="M0,0 L30,-52 A60,60 0 0,1 58,-17 Z" fill="#FF9800" opacity="0.7" stroke="white" stroke-width="1"/>
  <text x="38" y="-28" font-family="Arial,sans-serif" font-size="7" fill="white" font-weight="bold" text-anchor="middle">H</text>
  <!-- N 3% slice -->
  <path d="M0,0 L58,-17 A60,60 0 0,1 60,0 Z" fill="#9C27B0" opacity="0.7" stroke="white" stroke-width="1"/>
  <text x="45" y="-5" font-family="Arial,sans-serif" font-size="6" fill="white" font-weight="bold">N</text>
  <!-- Others 4% -->
  <path d="M0,0 L60,0 A60,60 0 0,1 58,-17 Z" fill="#795548" opacity="0.5" stroke="white" stroke-width="1"/>

  <text x="0" y="80" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Состав клетки</text>
  <text x="0" y="90" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="middle">Органогены: O, C, H, N = 98%</text>
</g>

<!-- Macro elements panel -->
<g transform="translate(275,70)">
  <rect x="0" y="0" width="200" height="120" rx="5" fill="white" opacity="0.9" stroke="#1565C0" stroke-width="1.2"/>
  <rect x="0" y="0" width="200" height="18" rx="5" fill="#1565C0" opacity="0.85"/>
  <rect x="0" y="12" width="200" height="6" fill="#1565C0" opacity="0.85"/>
  <text x="100" y="13" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">МАКРОЭЛЕМЕНТЫ (&gt;0,01%)</text>

  <text x="10" y="30" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" font-weight="bold">Органогены:</text>
  <circle cx="15" cy="41" r="6" fill="#1565C0" opacity="0.2" stroke="#1565C0" stroke-width="0.8"/>
  <text x="15" y="44" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">O</text>
  <text x="28" y="44" font-family="Arial,sans-serif" font-size="6" fill="#333">— вода, орг. вещества</text>

  <circle cx="15" cy="55" r="6" fill="#2E7D32" opacity="0.2" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="15" y="58" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">C</text>
  <text x="28" y="58" font-family="Arial,sans-serif" font-size="6" fill="#333">— основа орг. молекул</text>

  <circle cx="15" cy="69" r="6" fill="#FF9800" opacity="0.2" stroke="#FF9800" stroke-width="0.8"/>
  <text x="15" y="72" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">H</text>
  <text x="28" y="72" font-family="Arial,sans-serif" font-size="6" fill="#333">— вода, орг. вещества</text>

  <circle cx="15" cy="83" r="6" fill="#9C27B0" opacity="0.2" stroke="#9C27B0" stroke-width="0.8"/>
  <text x="15" y="86" font-family="Arial,sans-serif" font-size="6" fill="#9C27B0" text-anchor="middle" font-weight="bold">N</text>
  <text x="28" y="86" font-family="Arial,sans-serif" font-size="6" fill="#333">— белки, ДНК, РНК</text>

  <line x1="5" y1="93" x2="195" y2="93" stroke="#ccc" stroke-width="0.5"/>
  <text x="10" y="102" font-family="Arial,sans-serif" font-size="6" fill="#555">P — АТФ, ДНК, мембраны</text>
  <text x="10" y="111" font-family="Arial,sans-serif" font-size="6" fill="#555">S — белки (цистеин), CoA</text>
  <text x="105" y="102" font-family="Arial,sans-serif" font-size="6" fill="#555">K — нерв. импульсы</text>
  <text x="105" y="111" font-family="Arial,sans-serif" font-size="6" fill="#555">Ca — кости, свёрт. крови</text>
</g>

<!-- Micro elements panel -->
<g transform="translate(275,200)">
  <rect x="0" y="0" width="200" height="80" rx="5" fill="white" opacity="0.9" stroke="#E65100" stroke-width="1.2"/>
  <rect x="0" y="0" width="200" height="18" rx="5" fill="#E65100" opacity="0.85"/>
  <rect x="0" y="12" width="200" height="6" fill="#E65100" opacity="0.85"/>
  <text x="100" y="13" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">МИКРОЭЛЕМЕНТЫ (0,001–0,01%)</text>

  <g transform="translate(10,28)">
    <circle cx="5" cy="0" r="5" fill="#00BCD4" opacity="0.3" stroke="#00838F" stroke-width="0.8"/>
    <text x="5" y="3" font-family="Arial,sans-serif" font-size="6" fill="#00838F" text-anchor="middle" font-weight="bold">I</text>
    <text x="16" y="3" font-family="Arial,sans-serif" font-size="6" fill="#333">— гормоны щит. железы</text>
  </g>
  <g transform="translate(10,42)">
    <circle cx="5" cy="0" r="5" fill="#795548" opacity="0.3" stroke="#4E342E" stroke-width="0.8"/>
    <text x="5" y="3" font-family="Arial,sans-serif" font-size="6" fill="#4E342E" text-anchor="middle" font-weight="bold">Fe</text>
    <text x="18" y="3" font-family="Arial,sans-serif" font-size="6" fill="#333">— гемоглобин, дых. цепь</text>
  </g>
  <g transform="translate(10,56)">
    <circle cx="5" cy="0" r="5" fill="#9C27B0" opacity="0.3" stroke="#6A1B9A" stroke-width="0.8"/>
    <text x="5" y="3" font-family="Arial,sans-serif" font-size="5" fill="#6A1B9A" text-anchor="middle" font-weight="bold">Zn</text>
    <text x="16" y="3" font-family="Arial,sans-serif" font-size="6" fill="#333">— 300+ ферментов</text>
  </g>
  <g transform="translate(105,28)">
    <circle cx="5" cy="0" r="5" fill="#F44336" opacity="0.3" stroke="#B71C1C" stroke-width="0.8"/>
    <text x="5" y="3" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle" font-weight="bold">Cu</text>
    <text x="16" y="3" font-family="Arial,sans-serif" font-size="6" fill="#333">— кроветворение</text>
  </g>
  <g transform="translate(105,42)">
    <circle cx="5" cy="0" r="5" fill="#4CAF50" opacity="0.3" stroke="#1B5E20" stroke-width="0.8"/>
    <text x="5" y="3" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Co</text>
    <text x="16" y="3" font-family="Arial,sans-serif" font-size="6" fill="#333">— витамин B12</text>
  </g>
  <g transform="translate(105,56)">
    <circle cx="5" cy="0" r="5" fill="#607D8B" opacity="0.3" stroke="#37474F" stroke-width="0.8"/>
    <text x="5" y="3" font-family="Arial,sans-serif" font-size="5" fill="#37474F" text-anchor="middle" font-weight="bold">F</text>
    <text x="16" y="3" font-family="Arial,sans-serif" font-size="6" fill="#333">— эмаль зубов</text>
  </g>
</g>

<!-- Disease connections at bottom -->
<g transform="translate(30,290)">
  <rect x="0" y="0" width="440" height="38" rx="5" fill="white" opacity="0.85" stroke="#C62828" stroke-width="0.8"/>
  <text x="220" y="12" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Заболевания при дефиците микроэлементов:</text>

  <g transform="translate(30,26)">
    <circle cx="0" cy="0" r="4" fill="#00BCD4" opacity="0.5"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle" font-weight="bold">I</text>
    <text x="8" y="3" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Эндемический зоб</text>
  </g>
  <g transform="translate(150,26)">
    <circle cx="0" cy="0" r="4" fill="#795548" opacity="0.5"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="4" fill="white" text-anchor="middle" font-weight="bold">Fe</text>
    <text x="8" y="3" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Анемия</text>
  </g>
  <g transform="translate(250,26)">
    <circle cx="0" cy="0" r="4" fill="#607D8B" opacity="0.5"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="4" fill="white" text-anchor="middle" font-weight="bold">F</text>
    <text x="8" y="3" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Кариес</text>
  </g>
  <g transform="translate(340,26)">
    <circle cx="0" cy="0" r="4" fill="#9C27B0" opacity="0.5"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="4" fill="white" text-anchor="middle" font-weight="bold">Zn</text>
    <text x="8" y="3" font-family="Arial,sans-serif" font-size="6" fill="#C62828">Иммунодефицит</text>
  </g>
</g>

<rect x="10" y="332" width="480" height="14" rx="4" fill="#2E7D32" opacity="0.85"/>
<text x="250" y="343" font-family="Arial,sans-serif" font-size="9" text-anchor="middle" fill="white" font-weight="bold">Биология 10 класс — Урок 3</text>
</svg>