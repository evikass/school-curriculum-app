<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
  <linearGradient id="enzGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#66BB6A"/><stop offset="100%" stop-color="#388E3C"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<!-- Title bar -->
<rect x="3" y="3" width="494" height="38" rx="8" fill="#2E7D32"/>
<rect x="3" y="30" width="494" height="11" fill="#2E7D32"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Ферменты: свойства и механизм действия</text>
<text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">Биология 10 класс — Урок 22</text>

<!-- LEFT: Enzyme specificity (lock and key) -->
<text x="125" y="70" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Специфичность фермента</text>

<!-- Enzyme shape -->
<path d="M70,95 Q60,95 55,105 Q50,120 60,130 Q70,135 85,130 Q95,125 95,110 Q95,95 80,95 Z" fill="url(#enzGrad)" stroke="#1B5E20" stroke-width="2"/>
<!-- Active site (indent) -->
<path d="M68,105 Q75,115 82,105" fill="#C8E6C9" stroke="#1B5E20" stroke-width="1.5"/>
<text x="75" y="125" font-family="Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle">Фермент</text>

<!-- Matching substrate (triangle) -->
<polygon points="35,100 50,118 20,118" fill="#FFB74D" stroke="#E65100" stroke-width="1.5"/>
<text x="35" y="115" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle">S₁</text>
<!-- Check mark -->
<text x="55" y="108" font-family="Arial,sans-serif" font-size="12" fill="#2E7D32">✓</text>

<!-- Non-matching substrates -->
<rect x="100" y="100" width="14" height="14" rx="2" fill="#EF9A9A" stroke="#C62828" stroke-width="1"/>
<text x="107" y="111" font-family="Arial,sans-serif" font-size="6" fill="#B71C1C" text-anchor="middle">S₂</text>
<text x="107" y="98" font-family="Arial,sans-serif" font-size="10" fill="#C62828">✗</text>

<circle cx="118" cy="115" r="7" fill="#CE93D8" stroke="#6A1B9A" stroke-width="1"/>
<text x="118" y="118" font-family="Arial,sans-serif" font-size="6" fill="#4A148C" text-anchor="middle">S₃</text>
<text x="130" y="113" font-family="Arial,sans-serif" font-size="10" fill="#C62828">✗</text>

<!-- Lock-and-key model -->
<text x="75" y="148" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Модель «ключ-замок»</text>

<!-- Enzyme-substrate complex -->
<path d="M55,165 Q50,165 48,175 Q45,188 55,195 Q65,200 78,195 Q88,188 85,175 Q83,165 73,165 Z" fill="url(#enzGrad)" stroke="#1B5E20" stroke-width="1.5"/>
<path d="M58,175 Q67,183 76,175" fill="#FFB74D" stroke="#E65100" stroke-width="1"/>
<polygon points="65,168 73,182 57,182" fill="#FFB74D" stroke="#E65100" stroke-width="1"/>
<text x="67" y="178" font-family="Arial,sans-serif" font-size="6" fill="#BF360C" text-anchor="middle">S</text>
<text x="67" y="206" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle">Комплекс ЕС</text>

<!-- Arrow down to products -->
<line x1="67" y1="210" x2="67" y2="225" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#arrowG2)"/>
<defs><marker id="arrowG2" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#2E7D32"/></marker></defs>

<!-- Products -->
<circle cx="55" cy="238" r="8" fill="#4FC3F7" stroke="#0277BD" stroke-width="1"/>
<text x="55" y="241" font-family="Arial,sans-serif" font-size="6" fill="#01579B" text-anchor="middle">P₁</text>
<circle cx="80" cy="238" r="8" fill="#4FC3F7" stroke="#0277BD" stroke-width="1"/>
<text x="80" y="241" font-family="Arial,sans-serif" font-size="6" fill="#01579B" text-anchor="middle">P₂</text>
<text x="67" y="258" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle">Продукты</text>

<!-- RIGHT: Energy graph -->
<text x="340" y="70" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Энергетический профиль реакции</text>

<!-- Graph axes -->
<line x1="210" y1="85" x2="210" y2="230" stroke="#37474F" stroke-width="1.5"/>
<line x1="210" y1="230" x2="470" y2="230" stroke="#37474F" stroke-width="1.5"/>
<text x="205" y="90" font-family="Arial,sans-serif" font-size="8" fill="#37474F" text-anchor="end">E</text>
<text x="470" y="242" font-family="Arial,sans-serif" font-size="8" fill="#37474F" text-anchor="end">Ход реакции</text>

<!-- Without enzyme - high hill -->
<path d="M225,210 Q260,210 280,100 Q300,80 320,100 Q340,210 370,215" stroke="#E53935" stroke-width="2.5" fill="none"/>
<text x="300" y="93" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">Без фермента</text>
<!-- Activation energy label (no enzyme) -->
<line x1="290" y1="100" x2="290" y2="210" stroke="#E53935" stroke-width="1" stroke-dasharray="3,2"/>
<text x="287" y="160" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="end">Ea₁</text>
<!-- Arrow for Ea -->
<line x1="283" y1="105" x2="283" y2="205" stroke="#E53935" stroke-width="1" marker-end="url(#arrR)"/>
<defs><marker id="arrR" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 Z" fill="#E53935"/></marker></defs>

<!-- With enzyme - lower hill -->
<path d="M225,210 Q255,210 275,165 Q295,145 315,165 Q335,210 370,215" stroke="#2E7D32" stroke-width="2.5" fill="none"/>
<text x="310" y="142" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">С ферментом</text>
<!-- Activation energy label (with enzyme) -->
<line x1="268" y1="155" x2="268" y2="210" stroke="#2E7D32" stroke-width="1" stroke-dasharray="3,2"/>
<text x="265" y="185" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="end">Ea₂</text>

<!-- Reactant and product levels -->
<text x="222" y="218" font-family="Arial,sans-serif" font-size="7" fill="#37474F">Субстрат</text>
<text x="360" y="222" font-family="Arial,sans-serif" font-size="7" fill="#37474F">Продукт</text>

<!-- BOTTOM: Factors affecting enzyme activity -->
<text x="250" y="272" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#2E7D32" text-anchor="middle">Факторы, влияющие на активность фермента</text>

<!-- Temperature curve -->
<rect x="20" y="280" width="225" height="60" rx="6" fill="#fff" stroke="#4CAF50" stroke-width="1" opacity="0.7"/>
<text x="132" y="293" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Температура</text>
<path d="M35,330 Q70,330 100,298 Q115,290 130,298 Q160,330 230,335" stroke="#E53935" stroke-width="2" fill="none"/>
<text x="130" y="286" font-family="Arial,sans-serif" font-size="7" fill="#E53935" text-anchor="middle">Оптимум ~37°C</text>
<line x1="115" y1="288" x2="115" y2="296" stroke="#E53935" stroke-width="0.8" stroke-dasharray="2,1"/>

<!-- pH curve -->
<rect x="255" y="280" width="225" height="60" rx="6" fill="#fff" stroke="#4CAF50" stroke-width="1" opacity="0.7"/>
<text x="367" y="293" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">pH среды</text>
<path d="M270,332 Q300,332 330,298 Q350,290 370,298 Q400,332 465,334" stroke="#1565C0" stroke-width="2" fill="none"/>
<text x="350" y="286" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle">Оптимум pH 7</text>
<line x1="350" y1="288" x2="350" y2="296" stroke="#1565C0" stroke-width="0.8" stroke-dasharray="2,1"/>
</svg>