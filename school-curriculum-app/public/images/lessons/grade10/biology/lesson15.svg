<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#0D47A1" text-anchor="middle">Транспорт веществ через мембрану</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 15</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#1565C0" stroke-width="1" opacity="0.3"/>

<!-- Diffusion -->
<g transform="translate(85,145)">
  <rect x="-65" y="-65" width="130" height="140" rx="6" fill="white" opacity="0.92" stroke="#4CAF50" stroke-width="1.2"/>
  <rect x="-65" y="-65" width="130" height="20" rx="6" fill="#4CAF50" opacity="0.85"/>
  <rect x="-65" y="-53" width="130" height="8" fill="#4CAF50" opacity="0.85"/>
  <text x="0" y="-50" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ДИФФУЗИЯ</text>

  <!-- Membrane barrier -->
  <rect x="-50" y="-20" width="100" height="6" rx="2" fill="#9C27B0" opacity="0.3" stroke="#7B1FA2" stroke-width="0.8"/>

  <!-- High concentration (left/above) -->
  <circle cx="-35" cy="-35" r="4" fill="#2196F3" opacity="0.7"/>
  <circle cx="-20" cy="-30" r="4" fill="#2196F3" opacity="0.7"/>
  <circle cx="-40" cy="-25" r="4" fill="#2196F3" opacity="0.7"/>
  <circle cx="-25" cy="-40" r="4" fill="#2196F3" opacity="0.7"/>
  <circle cx="-10" cy="-38" r="4" fill="#2196F3" opacity="0.7"/>
  <circle cx="-35" cy="-40" r="4" fill="#2196F3" opacity="0.7"/>

  <!-- Low concentration (right/below) -->
  <circle cx="25" cy="-35" r="4" fill="#2196F3" opacity="0.3"/>
  <circle cx="40" cy="-30" r="4" fill="#2196F3" opacity="0.3"/>

  <!-- Arrows showing movement -->
  <path d="M-15,-35 L5,-35" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
  <polygon points="5,-35 0,-38 0,-32" fill="#4CAF50"/>

  <!-- O2, CO2 labels -->
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">O2, CO2</text>

  <!-- Below membrane -->
  <circle cx="-30" cy="0" r="4" fill="#2196F3" opacity="0.3"/>
  <circle cx="20" cy="5" r="4" fill="#2196F3" opacity="0.4"/>
  <circle cx="35" cy="0" r="4" fill="#2196F3" opacity="0.4"/>
  <circle cx="45" cy="8" r="4" fill="#2196F3" opacity="0.5"/>

  <text x="0" y="30" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Пассивный</text>
  <text x="0" y="40" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Без затрат энергии</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">По градиенту концентрации</text>
  <text x="0" y="65" font-family="Arial,sans-serif" font-size="6" fill="#2196F3" text-anchor="middle" font-weight="bold">Без транспорта = 0 АТФ</text>
</g>

<!-- Osmosis -->
<g transform="translate(250,145)">
  <rect x="-65" y="-65" width="130" height="140" rx="6" fill="white" opacity="0.92" stroke="#2196F3" stroke-width="1.2"/>
  <rect x="-65" y="-65" width="130" height="20" rx="6" fill="#2196F3" opacity="0.85"/>
  <rect x="-65" y="-53" width="130" height="8" fill="#2196F3" opacity="0.85"/>
  <text x="0" y="-50" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="bold">ОСМОС</text>

  <!-- Semi-permeable membrane -->
  <rect x="-50" y="-10" width="100" height="8" rx="2" fill="#9C27B0" opacity="0.3" stroke="#7B1FA2" stroke-width="1"/>
  <!-- Pores in membrane -->
  <circle cx="-30" cy="-6" r="3" fill="white" stroke="#7B1FA2" stroke-width="0.5"/>
  <circle cx="-10" cy="-6" r="3" fill="white" stroke="#7B1FA2" stroke-width="0.5"/>
  <circle cx="10" cy="-6" r="3" fill="white" stroke="#7B1FA2" stroke-width="0.5"/>
  <circle cx="30" cy="-6" r="3" fill="white" stroke="#7B1FA2" stroke-width="0.5"/>

  <!-- Water molecules (small blue dots) moving through pores -->
  <circle cx="-30" cy="-18" r="2.5" fill="#42A5F5" opacity="0.6"/>
  <circle cx="-15" cy="-20" r="2.5" fill="#42A5F5" opacity="0.6"/>
  <circle cx="5" cy="-22" r="2.5" fill="#42A5F5" opacity="0.6"/>
  <circle cx="20" cy="-18" r="2.5" fill="#42A5F5" opacity="0.6"/>
  <!-- Water passing through -->
  <circle cx="-10" cy="-6" r="2" fill="#42A5F5" opacity="0.8"/>
  <circle cx="10" cy="-6" r="2" fill="#42A5F5" opacity="0.8"/>

  <!-- Below: water accumulated -->
  <circle cx="-35" cy="8" r="2.5" fill="#42A5F5" opacity="0.7"/>
  <circle cx="-20" cy="5" r="2.5" fill="#42A5F5" opacity="0.7"/>
  <circle cx="-5" cy="8" r="2.5" fill="#42A5F5" opacity="0.7"/>
  <circle cx="10" cy="5" r="2.5" fill="#42A5F5" opacity="0.7"/>
  <circle cx="25" cy="8" r="2.5" fill="#42A5F5" opacity="0.7"/>
  <circle cx="40" cy="5" r="2.5" fill="#42A5F5" opacity="0.7"/>

  <!-- Arrow -->
  <path d="M0,-22 L0,-14" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="0,-14 -3,-18 3,-18" fill="#1565C0"/>

  <!-- Solute (larger, can't pass) -->
  <circle cx="-25" cy="-35" r="5" fill="#F44336" opacity="0.5" stroke="#C62828" stroke-width="0.8"/>
  <circle cx="10" cy="-30" r="5" fill="#F44336" opacity="0.5" stroke="#C62828" stroke-width="0.8"/>
  <text x="0" y="-42" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Растворённые вещества</text>

  <text x="0" y="30" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">Пассивный</text>
  <text x="0" y="40" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Движение воды через</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">полупроницаемую мембрану</text>
  <text x="0" y="65" font-family="Arial,sans-serif" font-size="6" fill="#2196F3" text-anchor="middle" font-weight="bold">Вода → к раствору</text>
</g>

<!-- Active transport -->
<g transform="translate(415,145)">
  <rect x="-65" y="-65" width="130" height="140" rx="6" fill="white" opacity="0.92" stroke="#F44336" stroke-width="1.2"/>
  <rect x="-65" y="-65" width="130" height="20" rx="6" fill="#F44336" opacity="0.85"/>
  <rect x="-65" y="-53" width="130" height="8" fill="#F44336" opacity="0.85"/>
  <text x="0" y="-50" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">АКТИВНЫЙ ТРАНСПОРТ</text>

  <!-- Protein pump -->
  <ellipse cx="0" cy="-5" rx="25" ry="20" fill="#FF9800" opacity="0.3" stroke="#E65100" stroke-width="1.5"/>
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Белок-</text>
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">насос</text>

  <!-- Na/K pump -->
  <text x="0" y="-35" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Na+/K+-насос</text>

  <!-- Na+ going out -->
  <circle cx="-20" cy="-25" r="4" fill="#1565C0" opacity="0.5"/>
  <text x="-20" y="-22" font-family="Arial,sans-serif" font-size="4" fill="white" text-anchor="middle">Na</text>
  <path d="M-20,-30 L-20,-42" fill="none" stroke="#1565C0" stroke-width="1.5"/>
  <polygon points="-20,-42 -23,-37 -17,-37" fill="#1565C0"/>

  <!-- K+ going in -->
  <circle cx="20" cy="15" r="4" fill="#2E7D32" opacity="0.5"/>
  <text x="20" y="18" font-family="Arial,sans-serif" font-size="4" fill="white" text-anchor="middle">K</text>
  <path d="M20,20 L20,10" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="20,10 17,15 23,15" fill="#2E7D32"/>

  <!-- ATP energy -->
  <circle cx="30" cy="5" r="8" fill="#F57F17" opacity="0.3" stroke="#E65100" stroke-width="1"/>
  <text x="30" y="8" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">АТФ</text>

  <text x="0" y="30" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Против градиента</text>
  <text x="0" y="40" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">С затратами энергии</text>
  <text x="0" y="50" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Белок-насос + АТФ</text>
  <text x="0" y="65" font-family="Arial,sans-serif" font-size="6" fill="#F44336" text-anchor="middle" font-weight="bold">Затраты = 1 АТФ</text>
</g>

<!-- Summary comparison at bottom -->
<g transform="translate(30,295)">
  <rect x="0" y="0" width="440" height="38" rx="5" fill="white" opacity="0.9" stroke="#1565C0" stroke-width="0.8"/>
  <text x="220" y="13" font-family="Arial,sans-serif" font-size="8" fill="#0D47A1" text-anchor="middle" font-weight="bold">Виды транспорта</text>
  <text x="73" y="27" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">Пассивный: диффузия, осмос, облегчённая диффузия — БЕЗ энергии</text>
  <text x="73" y="36" font-family="Arial,sans-serif" font-size="6" fill="#F44336">Активный: Na/K-насос, эндоцитоз, экзоцитоз — С ЭНЕРГИЕЙ АТФ</text>
</g>

<rect x="10" y="338" width="480" height="6" rx="3" fill="#1565C0" opacity="0.85"/>
</svg>