<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFEBEE"/><stop offset="100%" stop-color="#FFCDD2"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#C62828" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#B71C1C" text-anchor="middle">Лизосомы и митохондрии</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 17</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#C62828" stroke-width="1" opacity="0.3"/>

<!-- Lysosome -->
<g transform="translate(130,160)">
  <rect x="-105" y="-80" width="210" height="175" rx="6" fill="white" opacity="0.92" stroke="#C62828" stroke-width="1.2"/>
  <text x="0" y="-62" font-family="Arial,sans-serif" font-size="11" fill="#B71C1C" text-anchor="middle" font-weight="bold">ЛИЗОСОМА</text>
  <line x1="-85" y1="-56" x2="85" y2="-56" stroke="#C62828" stroke-width="0.5"/>

  <!-- Lysosome body -->
  <circle cx="0" cy="0" r="35" fill="#EF5350" opacity="0.15" stroke="#C62828" stroke-width="2"/>
  <circle cx="0" cy="0" r="32" fill="#FFCDD2" opacity="0.3"/>

  <!-- Enzymes inside (small shapes) -->
  <circle cx="-10" cy="-10" r="4" fill="#F44336" opacity="0.5" stroke="#C62828" stroke-width="0.5"/>
  <circle cx="8" cy="-5" r="3" fill="#FF9800" opacity="0.5" stroke="#E65100" stroke-width="0.5"/>
  <circle cx="-5" cy="8" r="3.5" fill="#9C27B0" opacity="0.5" stroke="#7B1FA2" stroke-width="0.5"/>
  <circle cx="12" cy="10" r="3" fill="#4CAF50" opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
  <circle cx="-15" cy="5" r="2.5" fill="#2196F3" opacity="0.5" stroke="#1565C0" stroke-width="0.5"/>
  <text x="0" y="-18" font-family="Arial,sans-serif" font-size="6" fill="#B71C1C" text-anchor="middle" font-weight="bold">Ферменты</text>
  <text x="0" y="-10" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle">pH ~ 5</text>

  <!-- Phagocytosis process -->
  <g transform="translate(0,50)">
    <!-- Large particle being engulfed -->
    <circle cx="45" cy="-15" r="12" fill="#FF9800" opacity="0.4" stroke="#E65100" stroke-width="1"/>
    <text x="45" y="-12" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Частица</text>

    <!-- Arrow: phagosome + lysosome -->
    <path d="M30,-10 L15,-10" fill="none" stroke="#795548" stroke-width="1"/>
    <polygon points="15,-10 19,-13 19,-7" fill="#795548"/>

    <!-- Digestion result -->
    <text x="-25" y="-5" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" font-weight="bold">Простые</text>
    <text x="-25" y="3" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" font-weight="bold">вещества</text>
  </g>

  <text x="0" y="85" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Фагоцитоз → пищеварительная вакуоль → лизосома</text>
</g>

<!-- Mitochondria -->
<g transform="translate(370,160)">
  <rect x="-105" y="-80" width="210" height="175" rx="6" fill="white" opacity="0.92" stroke="#E65100" stroke-width="1.2"/>
  <text x="0" y="-62" font-family="Arial,sans-serif" font-size="11" fill="#BF360C" text-anchor="middle" font-weight="bold">МИТОХОНДРИЯ</text>
  <line x1="-85" y1="-56" x2="85" y2="-56" stroke="#E65100" stroke-width="0.5"/>

  <!-- Mitochondria shape -->
  <ellipse cx="0" cy="0" rx="55" ry="28" fill="#FF9800" opacity="0.15" stroke="#E65100" stroke-width="2"/>

  <!-- Outer membrane -->
  <ellipse cx="0" cy="0" rx="55" ry="28" fill="none" stroke="#E65100" stroke-width="1.5"/>
  <!-- Inner membrane with cristae -->
  <ellipse cx="0" cy="0" rx="48" ry="22" fill="none" stroke="#BF360C" stroke-width="1" stroke-dasharray="2,1"/>

  <!-- Cristae (folds of inner membrane) -->
  <path d="M-30,-18 Q-25,-5 -30,8" fill="none" stroke="#BF360C" stroke-width="1.5"/>
  <path d="M-10,-20 Q-5,-5 -10,10" fill="none" stroke="#BF360C" stroke-width="1.5"/>
  <path d="M10,-18 Q15,-5 10,8" fill="none" stroke="#BF360C" stroke-width="1.5"/>
  <path d="M30,-15 Q35,-3 30,8" fill="none" stroke="#BF360C" stroke-width="1.5"/>

  <!-- Matrix -->
  <text x="0" y="2" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="middle" font-weight="bold">Матрикс</text>
  <text x="0" y="12" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">Цикл Кребса</text>

  <!-- Labels -->
  <text x="-62" y="-18" font-family="Arial,sans-serif" font-size="5" fill="#E65100">Наружная</text>
  <text x="-62" y="-12" font-family="Arial,sans-serif" font-size="5" fill="#E65100">мембрана</text>
  <text x="42" y="-18" font-family="Arial,sans-serif" font-size="5" fill="#BF360C">Внутренняя</text>
  <text x="42" y="-12" font-family="Arial,sans-serif" font-size="5" fill="#BF360C">мембрана</text>
  <text x="-65" y="15" font-family="Arial,sans-serif" font-size="5" fill="#BF360C">Кристы</text>

  <!-- Own DNA and ribosomes -->
  <g transform="translate(0,25)">
    <ellipse cx="-15" cy="0" rx="5" ry="3" fill="#1565C0" opacity="0.3" stroke="#0D47A1" stroke-width="0.5"/>
    <text x="-15" y="10" font-family="Arial,sans-serif" font-size="5" fill="#0D47A1" text-anchor="middle">мтДНК</text>
    <circle cx="15" cy="0" r="2" fill="#9C27B0" opacity="0.5"/>
    <text x="15" y="10" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2" text-anchor="middle">70S риб.</text>
  </g>

  <text x="0" y="60" font-family="Arial,sans-serif" font-size="7" fill="#BF360C" text-anchor="middle" font-weight="bold">«Энергетическая станция»</text>
  <text x="0" y="70" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Клеточное дыхание → АТФ</text>
  <text x="0" y="80" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">Две мембраны | Собственная ДНК | Рибосомы 70S</text>
</g>

<!-- Comparison at bottom -->
<g transform="translate(30,305)">
  <rect x="0" y="0" width="440" height="28" rx="5" fill="white" opacity="0.9" stroke="#C62828" stroke-width="0.8"/>
  <text x="110" y="14" font-family="Arial,sans-serif" font-size="7" fill="#C62828" font-weight="bold">Лизосомы: внутриклеточное пищеварение, автолиз</text>
  <text x="330" y="14" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">Митохондрии: АТФ, клеточное дыхание</text>
  <text x="220" y="24" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2">Оба: одна мембрана (лизосома) vs две мембраны (митохондрия)</text>
</g>

<rect x="10" y="336" width="480" height="8" rx="4" fill="#C62828" opacity="0.85"/>
</svg>