<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
  <linearGradient id="assim" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#4CAF50"/></linearGradient>
  <linearGradient id="dissim" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF8A65"/><stop offset="100%" stop-color="#E53935"/></linearGradient>
  <linearGradient id="organism" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#90CAF9"/><stop offset="100%" stop-color="#42A5F5"/></linearGradient>
  <marker id="arrowG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#4CAF50"/></marker>
  <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#E53935"/></marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<!-- Title bar -->
<rect x="3" y="3" width="494" height="38" rx="8" fill="#2E7D32"/>
<rect x="3" y="30" width="494" height="11" fill="#2E7D32"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Обмен веществ и энергии — основные понятия</text>
<text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">Биология 10 класс — Урок 21</text>

<!-- Central organism box -->
<rect x="185" y="128" width="130" height="55" rx="15" fill="url(#organism)" stroke="#1565C0" stroke-width="2"/>
<text x="250" y="152" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">ОРГАНИЗМ</text>
<text x="250" y="167" font-family="Arial,sans-serif" font-size="9" fill="#E3F2FD" text-anchor="middle">Обмен веществ</text>

<!-- Assimilation (left side) -->
<rect x="15" y="62" width="155" height="255" rx="12" fill="url(#assim)" opacity="0.2" stroke="#4CAF50" stroke-width="1.5"/>
<text x="92" y="80" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32" text-anchor="middle">АССИМИЛЯЦИЯ</text>
<text x="92" y="95" font-family="Arial,sans-serif" font-size="9" fill="#388E3C" text-anchor="middle">(пластический обмен)</text>

<!-- Anabolism label -->
<rect x="25" y="105" width="135" height="22" rx="6" fill="#4CAF50" opacity="0.3"/>
<text x="92" y="120" font-family="Arial,sans-serif" font-size="10" fill="#1B5E20" text-anchor="middle">Анаболизм — синтез</text>

<!-- Synthesis items -->
<rect x="25" y="133" width="140" height="28" rx="6" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1"/>
<text x="95" y="145" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle">Простые → Сложные</text>
<text x="95" y="156" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">аминокислоты → белки</text>

<rect x="25" y="166" width="140" height="28" rx="6" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1"/>
<text x="95" y="178" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle">Глюкоза → Крахмал</text>
<text x="95" y="189" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">нуклеотиды → ДНК</text>

<rect x="25" y="199" width="140" height="28" rx="6" fill="#A5D6A7" stroke="#4CAF50" stroke-width="1"/>
<text x="95" y="211" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle">CO₂ + H₂O → C₆H₁₂O₆</text>
<text x="95" y="222" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">мономеры → полимеры</text>

<!-- Energy consumed -->
<rect x="25" y="232" width="140" height="22" rx="6" fill="#FFECB3" stroke="#F9A825" stroke-width="1"/>
<text x="95" y="247" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle">⚡ Потребляет энергию</text>

<!-- Arrow: environment → organism (left) -->
<path d="M130,270 L185,165" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arrowG)"/>
<text x="128" y="252" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">Пища, O₂</text>
<text x="123" y="262" font-family="Arial,sans-serif" font-size="8" fill="#2E7D32" text-anchor="middle">H₂O, минералы</text>

<!-- Photosynthesis mini-icon -->
<circle cx="45" cy="282" r="18" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
<text x="45" y="280" font-family="Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle">CO₂+H₂O</text>
<text x="45" y="290" font-family="Arial,sans-serif" font-size="7" fill="#C8E6C9" text-anchor="middle">→ C₆H₁₂O₆</text>
<text x="45" y="308" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle">Фотосинтез</text>

<!-- Dissimilation (right side) -->
<rect x="330" y="62" width="155" height="255" rx="12" fill="url(#dissim)" opacity="0.2" stroke="#E53935" stroke-width="1.5"/>
<text x="407" y="80" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#C62828" text-anchor="middle">ДИССИМИЛЯЦИЯ</text>
<text x="407" y="95" font-family="Arial,sans-serif" font-size="9" fill="#D32F2F" text-anchor="middle">(энергетический обмен)</text>

<!-- Catabolism label -->
<rect x="340" y="105" width="135" height="22" rx="6" fill="#E53935" opacity="0.3"/>
<text x="407" y="120" font-family="Arial,sans-serif" font-size="10" fill="#B71C1C" text-anchor="middle">Катаболизм — распад</text>

<!-- Breakdown items -->
<rect x="340" y="133" width="140" height="28" rx="6" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
<text x="410" y="145" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C" text-anchor="middle">Сложные → Простые</text>
<text x="410" y="156" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">белки → аминокислоты</text>

<rect x="340" y="166" width="140" height="28" rx="6" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
<text x="410" y="178" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C" text-anchor="middle">Крахмал → Глюкоза</text>
<text x="410" y="189" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">жиры → глицерин+ЖК</text>

<rect x="340" y="199" width="140" height="28" rx="6" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
<text x="410" y="211" font-family="Arial,sans-serif" font-size="9" fill="#B71C1C" text-anchor="middle">C₆H₁₂O₆ → CO₂+H₂O</text>
<text x="410" y="222" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">полимеры → мономеры</text>

<!-- Energy released -->
<rect x="340" y="232" width="140" height="22" rx="6" fill="#FFECB3" stroke="#F9A825" stroke-width="1"/>
<text x="410" y="247" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle">⚡ Выделяет энергию</text>

<!-- Arrow: organism → environment (right) -->
<path d="M315,165 L370,270" stroke="#E53935" stroke-width="2" fill="none" marker-end="url(#arrowR)"/>
<text x="365" y="252" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">CO₂, H₂O</text>
<text x="360" y="262" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle">NH₃, мочевина</text>

<!-- Cellular respiration mini-icon -->
<circle cx="455" cy="282" r="18" fill="#EF5350" stroke="#C62828" stroke-width="1.5"/>
<text x="455" y="280" font-family="Arial,sans-serif" font-size="7" fill="#fff" text-anchor="middle">C₆H₁₂O₆</text>
<text x="455" y="290" font-family="Arial,sans-serif" font-size="7" fill="#FFCDD2" text-anchor="middle">→CO₂+H₂O</text>
<text x="455" y="308" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle">Дыхание</text>

<!-- Central cycle arrows connecting organism to both sides -->
<path d="M185,150 Q160,120 130,110" stroke="#4CAF50" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
<path d="M315,150 Q340,120 370,110" stroke="#E53935" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

<!-- Unity arrow between assimilation and dissimilation -->
<path d="M92,260 Q92,285 120,295 Q160,310 200,310 Q250,310 290,310 Q330,310 370,295 Q398,285 407,260" stroke="#795548" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrowR)"/>
<text x="250" y="298" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle">Единство противоположностей</text>

<!-- Equation at bottom -->
<rect x="100" y="320" width="300" height="22" rx="8" fill="#37474F" opacity="0.85"/>
<text x="250" y="335" font-family="Arial,sans-serif" font-size="10" fill="#FFEB3B" text-anchor="middle">C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + энергия(АТФ)</text>
</svg>