<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
<linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0D47A1"/><stop offset="100%" stop-color="#1565C0"/></linearGradient>
<linearGradient id="xFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E91E63"/><stop offset="100%" stop-color="#AD1457"/></linearGradient>
<linearGradient id="yFill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#42A5F5"/><stop offset="100%" stop-color="#1565C0"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#0D47A1" stroke-width="2.5"/>
<rect x="10" y="8" width="480" height="28" rx="5" fill="url(#bar)" opacity="0.9"/>
<text x="250" y="27" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Наследование признаков, сцеплённых с полом · Биология 10 — Урок 43</text>

<!-- X-linked inheritance title -->
<text x="250" y="52" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#0D47A1" text-anchor="middle">Наследование, сцеплённое с X-хромосомой</text>

<!-- Color blindness cross -->
<rect x="10" y="60" width="480" height="128" rx="5" fill="white" fill-opacity="0.6" stroke="#0D47A1" stroke-width="1"/>
<text x="250" y="75" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1" text-anchor="middle">Дальтонизм (X^D — норма, X^d — дальтонизм)</text>

<!-- Parent cross -->
<text x="70" y="98" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#E91E63" text-anchor="middle">Мать-носитель</text>
<!-- X^D X^d -->
<ellipse cx="55" cy="112" rx="12" ry="18" fill="url(#xFill)" stroke="#880E4F" stroke-width="1"/>
<text x="55" y="116" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">D</text>
<ellipse cx="85" cy="112" rx="12" ry="18" fill="#FFCDD2" stroke="#E91E63" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="85" y="116" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">d</text>
<text x="70" y="140" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">X^D X^d</text>

<text x="130" y="115" font-family="Arial,sans-serif" font-size="16" fill="#555" text-anchor="middle">×</text>

<text x="190" y="98" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1565C0" text-anchor="middle">Отец здоров</text>
<!-- X^D Y -->
<ellipse cx="175" cy="112" rx="12" ry="18" fill="url(#xFill)" stroke="#880E4F" stroke-width="1"/>
<text x="175" y="116" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">D</text>
<rect x="192" y="98" width="8" height="28" rx="3" fill="url(#yFill)" stroke="#0D47A1" stroke-width="1"/>
<text x="190" y="140" font-family="Arial,sans-serif" font-size="8" fill="#333" text-anchor="middle">X^D Y</text>

<!-- Punnett square -->
<rect x="245" y="88" width="45" height="16" rx="2" fill="#E8EAF6"/>
<rect x="290" y="88" width="45" height="16" rx="2" fill="#E8EAF6"/>
<text x="267" y="100" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E91E63" text-anchor="middle">X^D</text>
<text x="312" y="100" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0" text-anchor="middle">Y</text>

<rect x="220" y="104" width="25" height="16" rx="2" fill="#E8EAF6"/>
<rect x="220" y="120" width="25" height="16" rx="2" fill="#E8EAF6"/>
<text x="232" y="116" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E91E63" text-anchor="middle">X^D</text>
<text x="232" y="132" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">X^d</text>

<!-- Punnett cells -->
<rect x="245" y="104" width="45" height="16" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="267" y="116" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">X^DX^D ♀</text>

<rect x="290" y="104" width="45" height="16" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="312" y="116" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">X^DY ♂</text>

<rect x="245" y="120" width="45" height="16" rx="2" fill="#FFF9C4" stroke="#F57F17" stroke-width="0.5"/>
<text x="267" y="132" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">X^DX^d ♀</text>

<rect x="290" y="120" width="45" height="16" rx="2" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<text x="312" y="132" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828" text-anchor="middle">X^dY ♂</text>

<!-- Children results -->
<text x="400" y="95" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1" text-anchor="middle">Потомство:</text>
<rect x="360" y="100" width="120" height="14" rx="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="420" y="111" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">25% X^DX^D — здоровая девочка</text>
<rect x="360" y="115" width="120" height="14" rx="3" fill="#FFF9C4" stroke="#F57F17" stroke-width="0.5"/>
<text x="420" y="126" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">25% X^DX^d — девочка-носитель</text>
<rect x="360" y="130" width="120" height="14" rx="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="420" y="141" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle">25% X^DY — здоровый мальчик</text>
<rect x="360" y="145" width="120" height="14" rx="3" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<text x="420" y="156" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828" text-anchor="middle">25% X^dY — дальтоник мальчик</text>
<!-- Color vision icons -->
<circle cx="352" cy="107" r="4" fill="#4CAF50"/>
<circle cx="352" cy="122" r="4" fill="#FFC107" stroke="#F57F17" stroke-width="0.5"/>
<circle cx="352" cy="137" r="4" fill="#4CAF50"/>
<circle cx="352" cy="152" r="4" fill="#F44336"/>

<!-- Hemophilia section -->
<line x1="10" y1="193" x2="490" y2="193" stroke="#0D47A1" stroke-width="0.8" stroke-dasharray="4,3"/>
<rect x="10" y="198" width="235" height="95" rx="5" fill="white" fill-opacity="0.7" stroke="#C62828" stroke-width="1"/>
<text x="127" y="213" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">Гемофилия (X^H — норма, X^h — гемофилия)</text>

<!-- Royal family tree simplified -->
<text x="30" y="230" font-family="Arial,sans-serif" font-size="8" fill="#333">Виктория X^HX^h</text>
<circle cx="25" cy="240" r="8" fill="none" stroke="#E91E63" stroke-width="1.5"/>
<line x1="25" y1="248" x2="25" y2="260" stroke="#333" stroke-width="0.8"/>
<line x1="25" y1="260" x2="55" y2="260" stroke="#333" stroke-width="0.8"/>
<line x1="55" y1="248" x2="55" y2="260" stroke="#333" stroke-width="0.8"/>
<rect x="47" y="240" width="16" height="16" fill="none" stroke="#1565C0" stroke-width="1.5"/>

<line x1="40" y1="260" x2="40" y2="275" stroke="#333" stroke-width="0.8"/>
<line x1="10" y1="275" x2="70" y2="275" stroke="#333" stroke-width="0.8"/>

<circle cx="15" cy="283" r="6" fill="none" stroke="#E91E63" stroke-width="1"/>
<circle cx="30" cy="283" r="6" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
<rect x="43" y="277" width="12" height="12" fill="none" stroke="#1565C0" stroke-width="1"/>
<rect x="58" y="277" width="12" height="12" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>

<text x="15" y="296" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">X^HX^H</text>
<text x="30" y="296" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">X^HX^h</text>
<text x="49" y="296" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">X^HY</text>
<text x="64" y="296" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">X^hY</text>

<!-- Legend -->
<circle cx="90" cy="240" r="5" fill="none" stroke="#E91E63" stroke-width="1.5"/>
<text x="100" y="243" font-family="Arial,sans-serif" font-size="7" fill="#333">♀ женщина</text>
<rect x="85" y="250" width="10" height="10" fill="none" stroke="#1565C0" stroke-width="1.5"/>
<text x="100" y="259" font-family="Arial,sans-serif" font-size="7" fill="#333">♂ мужчина</text>
<circle cx="90" cy="272" r="5" fill="#FFCDD2" stroke="#C62828" stroke-width="1"/>
<text x="100" y="275" font-family="Arial,sans-serif" font-size="7" fill="#C62828">больной / носитель</text>
<text x="127" y="290" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">«Царская болезнь» —</text>
<text x="127" y="300" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">гемофилия в семьях Европы</text>

<!-- Key principle box -->
<rect x="255" y="198" width="235" height="95" rx="5" fill="white" fill-opacity="0.7" stroke="#0D47A1" stroke-width="1.5"/>
<text x="372" y="213" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#0D47A1" text-anchor="middle">Почему мужчины болеют чаще?</text>

<!-- Male X^dY diagram -->
<text x="300" y="235" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1565C0" text-anchor="middle">♂ Мужчина</text>
<ellipse cx="285" cy="255" rx="12" ry="18" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>
<text x="285" y="259" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">d</text>
<rect x="300" y="241" width="8" height="28" rx="3" fill="url(#yFill)" stroke="#0D47A1" stroke-width="1"/>
<text x="293" y="280" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle">X^d Y — БОЛЕН</text>
<text x="293" y="290" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Нет второго X</text>

<!-- Female X^DX^d diagram -->
<text x="410" y="235" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E91E63" text-anchor="middle">♀ Женщина</text>
<ellipse cx="395" cy="255" rx="12" ry="18" fill="url(#xFill)" stroke="#880E4F" stroke-width="1"/>
<text x="395" y="259" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="white" text-anchor="middle">D</text>
<ellipse cx="425" cy="255" rx="12" ry="18" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5" stroke-dasharray="3,2"/>
<text x="425" y="259" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#C62828" text-anchor="middle">d</text>
<text x="410" y="280" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle">X^D X^d — носитель</text>
<text x="410" y="290" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Доминантный D маскирует d</text>

<!-- Bottom summary -->
<rect x="10" y="300" width="480" height="42" rx="5" fill="#E3F2FD" stroke="#0D47A1" stroke-width="1"/>
<text x="250" y="316" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1" text-anchor="middle">Ключевой принцип: рецессивные признаки, сцеплённые с X-хромосомой,</text>
<text x="250" y="328" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#0D47A1" text-anchor="middle">проявляются у мужчин чаще, т.к. у них только одна X-хромосома (нет доминантной аллели)</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="7" fill="#555" text-anchor="middle">Мужчина не может передать X-сцеплённый признак сыну (передаёт сыну только Y-хромосому)</text>
</svg>