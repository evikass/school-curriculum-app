<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FFF8E1"/><stop offset="100%" stop-color="#FFECB3"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#F57F17" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#E65100" text-anchor="middle">АТФ — универсальный энергетический аккумулятор</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 10 класс — Урок 12</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#F57F17" stroke-width="1" opacity="0.3"/>

<!-- ATP structure -->
<g transform="translate(160,160)">
  <rect x="-120" y="-75" width="240" height="165" rx="6" fill="white" opacity="0.92" stroke="#F57F17" stroke-width="1.2"/>
  <text x="0" y="-58" font-family="Arial,sans-serif" font-size="10" fill="#E65100" text-anchor="middle" font-weight="bold">СТРОЕНИЕ АТФ</text>
  <line x1="-100" y1="-52" x2="100" y2="-52" stroke="#F57F17" stroke-width="0.5"/>

  <!-- Adenine -->
  <rect x="-95" y="-40" width="55" height="40" rx="4" fill="#9C27B0" opacity="0.2" stroke="#7B1FA2" stroke-width="1.2"/>
  <text x="-68" y="-22" font-family="Arial,sans-serif" font-size="7" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Аденин</text>
  <text x="-68" y="-12" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">Азотистое</text>
  <text x="-68" y="-4" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2" text-anchor="middle">основание</text>

  <!-- Ribose -->
  <polygon points="-28,-35 -15,-40 -5,-35 -5,-15 -28,-15" fill="#FF9800" opacity="0.2" stroke="#E65100" stroke-width="1.2"/>
  <text x="-16" y="-22" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">Рибоза</text>
  <text x="-16" y="-12" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">C5H10O4</text>

  <!-- Three phosphates -->
  <rect x="5" y="-40" width="28" height="35" rx="4" fill="#F44336" opacity="0.25" stroke="#C62828" stroke-width="1.5"/>
  <text x="19" y="-20" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">P</text>
  <text x="19" y="-10" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">I</text>

  <rect x="38" y="-40" width="28" height="35" rx="4" fill="#F44336" opacity="0.3" stroke="#C62828" stroke-width="1.5"/>
  <text x="52" y="-20" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">P</text>
  <text x="52" y="-10" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">II</text>

  <rect x="71" y="-40" width="28" height="35" rx="4" fill="#F44336" opacity="0.35" stroke="#C62828" stroke-width="1.5"/>
  <text x="85" y="-20" font-family="Arial,sans-serif" font-size="8" fill="#C62828" text-anchor="middle" font-weight="bold">P</text>
  <text x="85" y="-10" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">III</text>

  <!-- High-energy bonds (~) -->
  <text x="33" y="-8" font-family="Arial,sans-serif" font-size="12" fill="#F57F17" font-weight="bold">~</text>
  <text x="66" y="-8" font-family="Arial,sans-serif" font-size="12" fill="#F57F17" font-weight="bold">~</text>

  <!-- Energy release arrows -->
  <g transform="translate(52,10)">
    <line x1="0" y1="0" x2="-25" y2="20" stroke="#F57F17" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="25" y2="20" stroke="#F57F17" stroke-width="1.5"/>
    <!-- ADP + P -->
    <text x="-25" y="32" font-family="Arial,sans-serif" font-size="8" fill="#E65100" font-weight="bold">АДФ</text>
    <text x="25" y="32" font-family="Arial,sans-serif" font-size="8" fill="#C62828" font-weight="bold">+ P</text>
    <!-- Energy -->
    <text x="0" y="45" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle" font-weight="bold">+ 40 кДж</text>
  </g>

  <!-- Full formula -->
  <text x="0" y="78" font-family="Arial,sans-serif" font-size="7" fill="#E65100" text-anchor="middle" font-weight="bold">АТФ = Аденин + Рибоза + 3 фосфата</text>
  <text x="0" y="88" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Макроэргические связи (~) — связи с запасом энергии</text>
</g>

<!-- ATP/ADP cycle -->
<g transform="translate(395,150)">
  <rect x="-65" y="-60" width="130" height="130" rx="6" fill="white" opacity="0.92" stroke="#F57F17" stroke-width="1"/>
  <text x="0" y="-44" font-family="Arial,sans-serif" font-size="9" fill="#E65100" text-anchor="middle" font-weight="bold">ЦИКЛ АТФ</text>
  <line x1="-50" y1="-38" x2="50" y2="-38" stroke="#F57F17" stroke-width="0.5"/>

  <!-- ATP circle -->
  <circle cx="0" cy="-15" r="18" fill="#F57F17" opacity="0.2" stroke="#F57F17" stroke-width="1.5"/>
  <text x="0" y="-12" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">АТФ</text>
  <text x="0" y="-2" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">3 фосфата</text>

  <!-- ADP circle -->
  <circle cx="0" cy="40" r="18" fill="#FF9800" opacity="0.2" stroke="#FF9800" stroke-width="1.5"/>
  <text x="0" y="43" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">АДФ</text>
  <text x="0" y="53" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">2 фосфата</text>

  <!-- Arrows -->
  <path d="M-12,5 L-12,20" fill="none" stroke="#C62828" stroke-width="1.5"/>
  <polygon points="-12,20 -15,14 -9,14" fill="#C62828"/>
  <text x="-28" y="15" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">- энергия</text>

  <path d="M12,20 L12,5" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
  <polygon points="12,5 9,11 15,11" fill="#2E7D32"/>
  <text x="30" y="15" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">+ энергия</text>
</g>

<!-- Vitamins and coenzymes at bottom -->
<g transform="translate(30,280)">
  <rect x="0" y="0" width="440" height="48" rx="5" fill="white" opacity="0.9" stroke="#F57F17" stroke-width="0.8"/>
  <text x="220" y="14" font-family="Arial,sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">Другие органические соединения клетки</text>
  <text x="110" y="28" font-family="Arial,sans-serif" font-size="6" fill="#7B1FA2">Витамины: кофакторы ферментов (B1, B6, C, D...)</text>
  <text x="330" y="28" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Коэнзимы: CoA, НАД, ФАД — переносчики</text>
  <text x="220" y="40" font-family="Arial,sans-serif" font-size="6" fill="#1565C0">В клетке ~0,1% АТФ, но за сутки синтезируется объём, равный массе тела!</text>
</g>

<rect x="10" y="334" width="480" height="10" rx="4" fill="#F57F17" opacity="0.85"/>
<text x="250" y="343" font-family="Arial,sans-serif" font-size="7" text-anchor="middle" fill="white" font-weight="bold">АТФ — Аденозинтрифосфорная кислота — универсальный источник энергии клетки</text>
</svg>