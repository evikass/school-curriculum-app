<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#BBDEFB"/></linearGradient>
  <linearGradient id="investGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EF9A9A"/><stop offset="100%" stop-color="#E53935"/></linearGradient>
  <linearGradient id="payGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A5D6A7"/><stop offset="100%" stop-color="#43A047"/></linearGradient>
  <marker id="arrD" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#37474F"/></marker>
  <marker id="arrB3" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 Z" fill="#1565C0"/></marker>
  <marker id="arrGr" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><path d="M0,0 L5,2 L0,4 Z" fill="#2E7D32"/></marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#1565C0" stroke-width="2.5"/>
<!-- Title bar -->
<rect x="3" y="3" width="494" height="38" rx="8" fill="#1565C0"/>
<rect x="3" y="30" width="494" height="11" fill="#1565C0"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">Гликолиз</text>
<text x="250" y="50" font-family="Arial,sans-serif" font-size="10" fill="#0D47A1" text-anchor="middle">Биология 10 класс — Урок 24</text>

<!-- Location label -->
<rect x="140" y="55" width="220" height="18" rx="4" fill="#42A5F5" opacity="0.3"/>
<text x="250" y="68" font-family="Arial,sans-serif" font-size="9" fill="#0D47A1" text-anchor="middle">Цитоплазма — анаэробный процесс (без O₂)</text>

<!-- Glucose molecule (top center) -->
<rect x="170" y="78" width="160" height="35" rx="12" fill="#FFD54F" stroke="#F57F17" stroke-width="2"/>
<text x="250" y="95" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#E65100" text-anchor="middle">C₆H₁₂O₆</text>
<text x="250" y="108" font-family="Arial,sans-serif" font-size="8" fill="#F57F17" text-anchor="middle">Глюкоза (6С)</text>

<!-- Hexagon glucose icon -->
<polygon points="250,82 258,86 258,94 250,98 242,94 242,86" fill="none" stroke="#F57F17" stroke-width="0.8" opacity="0.5"/>

<!-- Arrow down splitting -->
<path d="M220,115 L140,135" stroke="#37474F" stroke-width="2" marker-end="url(#arrD)"/>
<path d="M280,115 L360,135" stroke="#37474F" stroke-width="2" marker-end="url(#arrD)"/>

<!-- LEFT: Energy Investment Phase -->
<rect x="15" y="130" width="225" height="120" rx="10" fill="url(#investGrad)" opacity="0.15" stroke="#E53935" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="127" y="148" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828" text-anchor="middle">ФАЗА ЗАТРАТЫ ЭНЕРГИИ</text>

<!-- Steps -->
<rect x="25" y="155" width="205" height="20" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
<text x="127" y="169" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle">Глюкоза → Глюкозо-6-фосфат (−1 АТФ)</text>

<rect x="25" y="180" width="205" height="20" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
<text x="127" y="194" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle">Фруктозо-6-ф → Фруктозо-1,6-бФ (−1 АТФ)</text>

<rect x="25" y="205" width="205" height="20" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
<text x="127" y="219" font-family="Arial,sans-serif" font-size="8" fill="#B71C1C" text-anchor="middle">Альдолаза: расщепление → 2 ГАФ (С₃)</text>

<!-- ATP cost box -->
<rect x="35" y="230" width="80" height="16" rx="4" fill="#E53935"/>
<text x="75" y="242" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">−2 АТФ</text>

<!-- RIGHT: Energy Payoff Phase -->
<rect x="260" y="130" width="225" height="120" rx="10" fill="url(#payGrad)" opacity="0.15" stroke="#43A047" stroke-width="1.5" stroke-dasharray="5,3"/>
<text x="372" y="148" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#2E7D32" text-anchor="middle">ФАЗА ВЫДЕЛЕНИЯ ЭНЕРГИИ</text>

<!-- Steps -->
<rect x="270" y="155" width="205" height="20" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
<text x="372" y="169" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle">ГАФ → 1,3-БФГ (дегидрирование +2 NADH)</text>

<rect x="270" y="180" width="205" height="20" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
<text x="372" y="194" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle">1,3-БФГ → 3-Фосфоглицерат (+2 АТФ)</text>

<rect x="270" y="205" width="205" height="20" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
<text x="372" y="219" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle">ФЕП → Пируват (субстратное Ф +2 АТФ)</text>

<!-- ATP gain box -->
<rect x="320" y="230" width="80" height="16" rx="4" fill="#43A047"/>
<text x="360" y="242" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">+4 АТФ</text>

<!-- NADH label -->
<rect x="420" y="230" width="65" height="16" rx="4" fill="#7B1FA2"/>
<text x="452" y="242" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#fff" text-anchor="middle">+2 NADH</text>

<!-- Arrow down to Pyruvate -->
<path d="M220,255 L220,272" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrD)"/>
<path d="M280,255 L280,272" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrD)"/>

<!-- Pyruvate molecules -->
<rect x="140" y="275" width="120" height="28" rx="8" fill="#FF8A65" stroke="#BF360C" stroke-width="1.5"/>
<text x="200" y="289" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">Пируват (C₃H₄O₃)</text>

<rect x="270" y="275" width="120" height="28" rx="8" fill="#FF8A65" stroke="#BF360C" stroke-width="1.5"/>
<text x="330" y="289" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#fff" text-anchor="middle">Пируват (C₃H₄O₃)</text>

<!-- Net equation box -->
<rect x="50" y="310" width="400" height="30" rx="8" fill="#1565C0"/>
<text x="250" y="324" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#FFEB3B" text-anchor="middle">C₆H₁₂O₆ → 2 C₃H₄O₃ + 2 АТФ + 2 NADH</text>
<text x="250" y="336" font-family="Arial,sans-serif" font-size="8" fill="#90CAF9" text-anchor="middle">Чистый выход: 2 АТФ (4 произведено − 2 затрачено)</text>
</svg>