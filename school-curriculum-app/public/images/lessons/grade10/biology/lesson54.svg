<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg54" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d47a1"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg54)"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#42a5f5" stroke-width="2" rx="6"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="492" height="36" fill="#1565c0" rx="4"/>
  <text x="250" y="27" text-anchor="middle" fill="#e3f2fd" font-size="12" font-weight="bold" font-family="Arial">Система органического мира — Биология 10 класс — Урок 54</text>

  <!-- Classification hierarchy on left -->
  <text x="70" y="54" text-anchor="middle" fill="#90caf9" font-size="8" font-weight="bold" font-family="Arial">Иерархия таксонов</text>
  
  <rect x="10" y="60" width="120" height="16" fill="#0d47a1" stroke="#42a5f5" stroke-width="0.8" rx="2"/>
  <text x="70" y="72" text-anchor="middle" fill="#e3f2fd" font-size="7" font-weight="bold" font-family="Arial">Домен (Империя)</text>
  
  <rect x="17" y="80" width="106" height="16" fill="#1565c0" stroke="#42a5f5" stroke-width="0.8" rx="2"/>
  <text x="70" y="92" text-anchor="middle" fill="#bbdefb" font-size="7" font-weight="bold" font-family="Arial">Царство</text>
  
  <rect x="24" y="100" width="92" height="16" fill="#1976d2" stroke="#42a5f5" stroke-width="0.8" rx="2"/>
  <text x="70" y="112" text-anchor="middle" fill="#bbdefb" font-size="7" font-weight="bold" font-family="Arial">Тип / Отдел</text>
  
  <rect x="31" y="120" width="78" height="16" fill="#1e88e5" stroke="#42a5f5" stroke-width="0.8" rx="2"/>
  <text x="70" y="132" text-anchor="middle" fill="#bbdefb" font-size="7" font-weight="bold" font-family="Arial">Класс</text>
  
  <rect x="38" y="140" width="64" height="16" fill="#2196f3" stroke="#42a5f5" stroke-width="0.8" rx="2"/>
  <text x="70" y="152" text-anchor="middle" fill="#e3f2fd" font-size="7" font-weight="bold" font-family="Arial">Отряд</text>
  
  <rect x="45" y="160" width="50" height="16" fill="#42a5f5" stroke="#42a5f5" stroke-width="0.8" rx="2"/>
  <text x="70" y="172" text-anchor="middle" fill="#0d47a1" font-size="7" font-weight="bold" font-family="Arial">Семейство</text>
  
  <rect x="52" y="180" width="36" height="16" fill="#64b5f6" stroke="#42a5f5" stroke-width="0.8" rx="2"/>
  <text x="70" y="192" text-anchor="middle" fill="#0d47a1" font-size="7" font-weight="bold" font-family="Arial">Род</text>
  
  <rect x="55" y="200" width="30" height="16" fill="#90caf9" stroke="#42a5f5" stroke-width="0.8" rx="2"/>
  <text x="70" y="212" text-anchor="middle" fill="#0d47a1" font-size="7" font-weight="bold" font-family="Arial">Вид</text>

  <!-- Arrow showing hierarchy direction -->
  <text x="135" y="100" fill="#64b5f6" font-size="18" font-family="Arial">→</text>
  <text x="148" y="95" fill="#90caf9" font-size="5" font-family="Arial">Крупнее</text>
  <text x="148" y="208" fill="#90caf9" font-size="5" font-family="Arial">Мельче</text>

  <!-- Example: Human classification -->
  <rect x="155" y="58" width="335" height="160" fill="#0a1628" stroke="#1e88e5" stroke-width="1" rx="4"/>
  <text x="322" y="72" text-anchor="middle" fill="#90caf9" font-size="7" font-weight="bold" font-family="Arial">Пример классификации человека</text>
  <text x="165" y="86" fill="#42a5f5" font-size="6" font-family="Arial">Домен:</text><text x="220" y="86" fill="#e3f2fd" font-size="6" font-family="Arial">Эукариоты</text>
  <text x="165" y="98" fill="#42a5f5" font-size="6" font-family="Arial">Царство:</text><text x="220" y="98" fill="#e3f2fd" font-size="6" font-family="Arial">Животные (Animalia)</text>
  <text x="165" y="110" fill="#42a5f5" font-size="6" font-family="Arial">Тип:</text><text x="220" y="110" fill="#e3f2fd" font-size="6" font-family="Arial">Хордовые (Chordata)</text>
  <text x="165" y="122" fill="#42a5f5" font-size="6" font-family="Arial">Класс:</text><text x="220" y="122" fill="#e3f2fd" font-size="6" font-family="Arial">Млекопитающие (Mammalia)</text>
  <text x="165" y="134" fill="#42a5f5" font-size="6" font-family="Arial">Отряд:</text><text x="220" y="134" fill="#e3f2fd" font-size="6" font-family="Arial">Приматы (Primates)</text>
  <text x="165" y="146" fill="#42a5f5" font-size="6" font-family="Arial">Семейство:</text><text x="220" y="146" fill="#e3f2fd" font-size="6" font-family="Arial">Гоминиды (Hominidae)</text>
  <text x="165" y="158" fill="#42a5f5" font-size="6" font-family="Arial">Род:</text><text x="220" y="158" fill="#e3f2fd" font-size="6" font-family="Arial">Человек (Homo)</text>
  <text x="165" y="170" fill="#42a5f5" font-size="6" font-family="Arial">Вид:</text><text x="220" y="170" fill="#ffeb3b" font-size="6" font-weight="bold" font-family="Arial">Человек разумный (Homo sapiens)</text>

  <!-- Binomial nomenclature note -->
  <rect x="165" y="180" width="320" height="28" fill="#1a237e" stroke="#5c6bc0" stroke-width="0.5" rx="2"/>
  <text x="325" y="192" text-anchor="middle" fill="#c5cae9" font-size="6" font-family="Arial">Бинарная номенклатура (К. Линней):</text>
  <text x="325" y="202" text-anchor="middle" fill="#ffeb3b" font-size="6" font-style="italic" font-family="Arial">Homo sapiens = Род + видовой эпитет</text>

  <!-- 5 Kingdoms section -->
  <text x="250" y="232" text-anchor="middle" fill="#90caf9" font-size="9" font-weight="bold" font-family="Arial">Пять царств живой природы</text>

  <!-- Kingdom 1: Bacteria -->
  <rect x="8" y="240" width="94" height="100" fill="#1a0d0d" stroke="#ef5350" stroke-width="1" rx="4"/>
  <rect x="8" y="240" width="94" height="14" fill="#c62828" rx="4"/>
  <text x="55" y="251" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold" font-family="Arial">Бактерии</text>
  <!-- Bacteria shapes -->
  <ellipse cx="35" cy="270" rx="8" ry="4" fill="#ef9a9a" stroke="#e57373" stroke-width="0.5"/>
  <circle cx="60" cy="268" r="4" fill="#ef9a9a" stroke="#e57373" stroke-width="0.5"/>
  <path d="M75,268 Q80,264 85,268 Q90,272 95,268" stroke="#e57373" stroke-width="1.5" fill="none"/>
  <text x="55" y="286" text-anchor="middle" fill="#ef9a9a" font-size="5" font-family="Arial">Прокариоты</text>
  <text x="55" y="294" text-anchor="middle" fill="#e57373" font-size="5" font-family="Arial">Нет ядра</text>
  <text x="55" y="302" text-anchor="middle" fill="#e57373" font-size="5" font-family="Arial">Одноклеточные</text>
  <text x="55" y="310" text-anchor="middle" fill="#e57373" font-size="5" font-family="Arial">Гетеротрофы/</text>
  <text x="55" y="318" text-anchor="middle" fill="#e57373" font-size="5" font-family="Arial">автотрофы</text>
  <text x="55" y="330" text-anchor="middle" fill="#ffcdd2" font-size="5" font-style="italic" font-family="Arial">Сапротрофы</text>

  <!-- Kingdom 2: Protista -->
  <rect x="108" y="240" width="94" height="100" fill="#0d1a0d" stroke="#66bb6a" stroke-width="1" rx="4"/>
  <rect x="108" y="240" width="94" height="14" fill="#2e7d32" rx="4"/>
  <text x="155" y="251" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold" font-family="Arial">Протисты</text>
  <!-- Amoeba shape -->
  <path d="M140,272 Q148,262 158,268 Q168,264 165,274 Q172,280 164,284 Q160,292 150,286 Q142,290 138,282 Q132,278 140,272 Z" fill="#a5d6a7" stroke="#66bb6a" stroke-width="0.5"/>
  <circle cx="150" cy="276" r="3" fill="#2e7d32"/>
  <text x="155" y="300" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">Эукариоты</text>
  <text x="155" y="308" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Есть ядро</text>
  <text x="155" y="316" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Одноклеточные</text>
  <text x="155" y="324" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Амёба, инфузория</text>
  <text x="155" y="334" text-anchor="middle" fill="#c8e6c9" font-size="5" font-style="italic" font-family="Arial">Водоросли</text>

  <!-- Kingdom 3: Fungi -->
  <rect x="208" y="240" width="94" height="100" fill="#1a1a0d" stroke="#ffa726" stroke-width="1" rx="4"/>
  <rect x="208" y="240" width="94" height="14" fill="#e65100" rx="4"/>
  <text x="255" y="251" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold" font-family="Arial">Грибы</text>
  <!-- Mushroom -->
  <path d="M245,285 L245,295" stroke="#bcaaa4" stroke-width="2"/>
  <path d="M235,285 Q255,265 275,285 Z" fill="#ffcc80" stroke="#ffa726" stroke-width="0.5"/>
  <circle cx="248" cy="278" r="1.5" fill="#fff9c4"/>
  <circle cx="258" cy="275" r="1" fill="#fff9c4"/>
  <circle cx="265" cy="280" r="1.2" fill="#fff9c4"/>
  <text x="255" y="302" text-anchor="middle" fill="#ffe0b2" font-size="5" font-family="Arial">Эукариоты</text>
  <text x="255" y="310" text-anchor="middle" fill="#ffcc80" font-size="5" font-family="Arial">Хитин в клет. стенке</text>
  <text x="255" y="318" text-anchor="middle" fill="#ffcc80" font-size="5" font-family="Arial">Гетеротрофы</text>
  <text x="255" y="326" text-anchor="middle" fill="#ffcc80" font-size="5" font-family="Arial">Сапротрофы</text>
  <text x="255" y="334" text-anchor="middle" fill="#fff176" font-size="5" font-style="italic" font-family="Arial">Мицелий + гифы</text>

  <!-- Kingdom 4: Plantae -->
  <rect x="308" y="240" width="94" height="100" fill="#0d1a0d" stroke="#4caf50" stroke-width="1.5" rx="4"/>
  <rect x="308" y="240" width="94" height="14" fill="#1b5e20" rx="4"/>
  <text x="355" y="251" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold" font-family="Arial">Растения</text>
  <!-- Plant -->
  <line x1="355" y1="285" x2="355" y2="270" stroke="#4caf50" stroke-width="1.5"/>
  <ellipse cx="345" cy="270" rx="6" ry="4" fill="#66bb6a"/>
  <ellipse cx="365" cy="272" rx="6" ry="4" fill="#66bb6a"/>
  <ellipse cx="355" cy="265" rx="5" ry="4" fill="#81c784"/>
  <circle cx="355" cy="262" r="2" fill="#ffeb3b"/>
  <text x="355" y="296" text-anchor="middle" fill="#a5d6a7" font-size="5" font-family="Arial">Эукариоты</text>
  <text x="355" y="304" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Целлюлоза в ст.</text>
  <text x="355" y="312" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Автотрофы</text>
  <text x="355" y="320" text-anchor="middle" fill="#81c784" font-size="5" font-family="Arial">Фотосинтез</text>
  <text x="355" y="330" text-anchor="middle" fill="#c8e6c9" font-size="5" font-style="italic" font-family="Arial">Моховидные →</text>
  <text x="355" y="338" text-anchor="middle" fill="#c8e6c9" font-size="5" font-style="italic" font-family="Arial">Покрытосеменные</text>

  <!-- Kingdom 5: Animalia -->
  <rect x="408" y="240" width="84" height="100" fill="#1a0d1a" stroke="#ab47bc" stroke-width="1.5" rx="4"/>
  <rect x="408" y="240" width="84" height="14" fill="#6a1b9a" rx="4"/>
  <text x="450" y="251" text-anchor="middle" fill="#fff" font-size="7" font-weight="bold" font-family="Arial">Животные</text>
  <!-- Animal (bug shape) -->
  <ellipse cx="450" cy="274" rx="8" ry="5" fill="#ce93d8" stroke="#ab47bc" stroke-width="0.5"/>
  <circle cx="443" cy="273" r="4" fill="#e1bee7" stroke="#ab47bc" stroke-width="0.5"/>
  <circle cx="441" cy="272" r="1" fill="#4a148c"/>
  <line x1="444" y1="270" x2="440" y2="264" stroke="#ab47bc" stroke-width="0.5"/>
  <line x1="447" y1="270" x2="446" y2="263" stroke="#ab47bc" stroke-width="0.5"/>
  <text x="450" y="294" text-anchor="middle" fill="#e1bee7" font-size="5" font-family="Arial">Эукариоты</text>
  <text x="450" y="302" text-anchor="middle" fill="#ce93d8" font-size="5" font-family="Arial">Нет клет. стенки</text>
  <text x="450" y="310" text-anchor="middle" fill="#ce93d8" font-size="5" font-family="Arial">Гетеротрофы</text>
  <text x="450" y="318" text-anchor="middle" fill="#ce93d8" font-size="5" font-family="Arial">Активное движение</text>
  <text x="450" y="330" text-anchor="middle" fill="#f3e5f5" font-size="5" font-style="italic" font-family="Arial">Простейшие →</text>
  <text x="450" y="338" text-anchor="middle" fill="#f3e5f5" font-size="5" font-style="italic" font-family="Arial">Хордовые</text>

  <!-- Viruses note -->
  <rect x="10" y="222" width="130" height="14" fill="#1a0a0a" stroke="#78909c" stroke-width="0.5" rx="2"/>
  <text x="75" y="232" text-anchor="middle" fill="#b0bec5" font-size="5" font-family="Arial">* Вирусы — неклеточная форма, не царство</text>
</svg>