<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg31" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <radialGradient id="cellG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </radialGradient>
    <linearGradient id="spindleG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7e57c2"/>
      <stop offset="100%" stop-color="#b39ddb"/>
    </linearGradient>
  </defs>
  <rect width="500" height="350" fill="url(#bg31)" rx="8"/>
  <rect x="2" y="2" width="496" height="346" fill="none" stroke="#2e7d32" stroke-width="2" rx="8"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="500" height="38" fill="#2e7d32" rx="8"/>
  <rect x="0" y="20" width="500" height="18" fill="#2e7d32"/>
  <text x="250" y="26" text-anchor="middle" fill="white" font-size="14" font-weight="bold" font-family="Arial">Деление клетки: митоз</text>
  <text x="490" y="14" text-anchor="end" fill="#c8e6c9" font-size="8" font-family="Arial">Биология 10 класс — Урок 31</text>
  <!-- Prophase -->
  <ellipse cx="70" cy="120" rx="48" ry="40" fill="url(#cellG)" stroke="#558b2f" stroke-width="1.5"/>
  <ellipse cx="70" cy="115" rx="22" ry="18" fill="none" stroke="#ff8f00" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="55" y1="108" x2="62" y2="122" stroke="#d32f2f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="105" x2="65" y2="119" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="73" y1="108" x2="80" y2="122" stroke="#d32f2f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76" y1="105" x2="83" y2="119" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <text x="70" y="175" text-anchor="middle" fill="#1b5e20" font-size="10" font-weight="bold" font-family="Arial">Профаза</text>
  <text x="70" y="187" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">Хромосомы</text>
  <text x="70" y="196" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">конденсируются</text>
  <!-- Arrow -->
  <line x1="120" y1="120" x2="138" y2="120" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <defs><marker id="arrowG" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2e7d32"/></marker></defs>
  <!-- Metaphase -->
  <ellipse cx="185" cy="120" rx="48" ry="40" fill="url(#cellG)" stroke="#558b2f" stroke-width="1.5"/>
  <line x1="185" y1="85" x2="185" y2="155" stroke="url(#spindleG)" stroke-width="0.7" stroke-dasharray="2,1"/>
  <line x1="185" y1="85" x2="185" y2="155" stroke="url(#spindleG)" stroke-width="0.5" opacity="0.5" transform="rotate(-8,185,120)"/>
  <line x1="185" y1="85" x2="185" y2="155" stroke="url(#spindleG)" stroke-width="0.5" opacity="0.5" transform="rotate(8,185,120)"/>
  <!-- Chromosomes at equator -->
  <line x1="178" y1="113" x2="178" y2="127" stroke="#d32f2f" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="113" x2="180" y2="127" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
  <line x1="189" y1="113" x2="189" y2="127" stroke="#d32f2f" stroke-width="3" stroke-linecap="round"/>
  <line x1="191" y1="113" x2="191" y2="127" stroke="#1565c0" stroke-width="3" stroke-linecap="round"/>
  <!-- Spindle poles -->
  <circle cx="185" cy="84" r="4" fill="#7e57c2" opacity="0.7"/>
  <circle cx="185" cy="156" r="4" fill="#7e57c2" opacity="0.7"/>
  <text x="185" y="175" text-anchor="middle" fill="#1b5e20" font-size="10" font-weight="bold" font-family="Arial">Метафаза</text>
  <text x="185" y="187" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">Хромосомы на</text>
  <text x="185" y="196" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">экваторе клетки</text>
  <!-- Arrow -->
  <line x1="235" y1="120" x2="253" y2="120" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <!-- Anaphase -->
  <ellipse cx="300" cy="120" rx="48" ry="40" fill="url(#cellG)" stroke="#558b2f" stroke-width="1.5"/>
  <!-- Spindle fibers -->
  <line x1="300" y1="88" x2="285" y2="102" stroke="#7e57c2" stroke-width="0.7" stroke-dasharray="2,1"/>
  <line x1="300" y1="88" x2="315" y2="102" stroke="#7e57c2" stroke-width="0.7" stroke-dasharray="2,1"/>
  <line x1="300" y1="152" x2="285" y2="138" stroke="#7e57c2" stroke-width="0.7" stroke-dasharray="2,1"/>
  <line x1="300" y1="152" x2="315" y2="138" stroke="#7e57c2" stroke-width="0.7" stroke-dasharray="2,1"/>
  <!-- Chromatids moving to poles -->
  <line x1="280" y1="97" x2="280" y2="107" stroke="#d32f2f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="283" y1="97" x2="283" y2="107" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="316" y1="97" x2="316" y2="107" stroke="#d32f2f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="319" y1="97" x2="319" y2="107" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="280" y1="133" x2="280" y2="143" stroke="#d32f2f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="283" y1="133" x2="283" y2="143" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="316" y1="133" x2="316" y2="143" stroke="#d32f2f" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="319" y1="133" x2="319" y2="143" stroke="#1565c0" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="300" cy="87" r="3.5" fill="#7e57c2" opacity="0.7"/>
  <circle cx="300" cy="153" r="3.5" fill="#7e57c2" opacity="0.7"/>
  <text x="300" y="175" text-anchor="middle" fill="#1b5e20" font-size="10" font-weight="bold" font-family="Arial">Анафаза</text>
  <text x="300" y="187" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">Хроматиды</text>
  <text x="300" y="196" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">расходятся к полюсам</text>
  <!-- Arrow -->
  <line x1="350" y1="120" x2="368" y2="120" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <!-- Telophase -->
  <ellipse cx="420" cy="110" rx="32" ry="34" fill="url(#cellG)" stroke="#558b2f" stroke-width="1.2"/>
  <ellipse cx="468" cy="130" rx="32" ry="34" fill="url(#cellG)" stroke="#558b2f" stroke-width="1.2"/>
  <!-- Pinching -->
  <path d="M440,80 Q444,120 440,160" fill="none" stroke="#558b2f" stroke-width="1.2"/>
  <path d="M448,80 Q444,120 448,160" fill="none" stroke="#558b2f" stroke-width="1.2"/>
  <!-- Nuclei reforming -->
  <ellipse cx="420" cy="108" rx="14" ry="11" fill="none" stroke="#ff8f00" stroke-width="1" stroke-dasharray="2,1"/>
  <ellipse cx="468" cy="128" rx="14" ry="11" fill="none" stroke="#ff8f00" stroke-width="1" stroke-dasharray="2,1"/>
  <line x1="415" y1="103" x2="415" y2="113" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="417" y1="103" x2="417" y2="113" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <line x1="423" y1="103" x2="423" y2="113" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="425" y1="103" x2="425" y2="113" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <line x1="463" y1="123" x2="463" y2="133" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="465" y1="123" x2="465" y2="133" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <line x1="471" y1="123" x2="471" y2="133" stroke="#d32f2f" stroke-width="2" stroke-linecap="round"/>
  <line x1="473" y1="123" x2="473" y2="133" stroke="#1565c0" stroke-width="2" stroke-linecap="round"/>
  <text x="444" y="175" text-anchor="middle" fill="#1b5e20" font-size="10" font-weight="bold" font-family="Arial">Телофаза</text>
  <text x="444" y="187" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">Два ядра</text>
  <text x="444" y="196" text-anchor="middle" fill="#4e342e" font-size="7" font-family="Arial">образуются</text>
  <!-- Bottom section: Summary -->
  <rect x="20" y="210" width="460" height="65" fill="white" fill-opacity="0.6" rx="6" stroke="#2e7d32" stroke-width="1"/>
  <text x="250" y="228" text-anchor="middle" fill="#1b5e20" font-size="11" font-weight="bold" font-family="Arial">Результат митоза: 2n → 2n</text>
  <text x="250" y="244" text-anchor="middle" fill="#4e342e" font-size="9" font-family="Arial">Из одной диплоидной клетки образуются две идентичные диплоидные клетки</text>
  <!-- Parent cell -->
  <ellipse cx="90" cy="270" rx="28" ry="22" fill="url(#cellG)" stroke="#558b2f" stroke-width="1.5"/>
  <text x="90" y="274" text-anchor="middle" fill="#d32f2f" font-size="8" font-weight="bold" font-family="Arial">2n</text>
  <text x="90" y="298" text-anchor="middle" fill="#1b5e20" font-size="8" font-family="Arial">Материнская</text>
  <!-- Arrow down splitting -->
  <line x1="75" y1="293" x2="55" y2="308" stroke="#2e7d32" stroke-width="1.2"/>
  <line x1="105" y1="293" x2="125" y2="308" stroke="#2e7d32" stroke-width="1.2"/>
  <!-- Daughter cells -->
  <ellipse cx="55" cy="330" rx="22" ry="17" fill="url(#cellG)" stroke="#558b2f" stroke-width="1.2"/>
  <text x="55" y="334" text-anchor="middle" fill="#d32f2f" font-size="7" font-weight="bold" font-family="Arial">2n</text>
  <ellipse cx="125" cy="330" rx="22" ry="17" fill="url(#cellG)" stroke="#558b2f" stroke-width="1.2"/>
  <text x="125" y="334" text-anchor="middle" fill="#d32f2f" font-size="7" font-weight="bold" font-family="Arial">2n</text>
  <text x="90" y="348" text-anchor="middle" fill="#1b5e20" font-size="7" font-family="Arial">Дочерние клетки</text>
  <!-- Key info -->
  <rect x="170" y="282" width="310" height="55" fill="white" fill-opacity="0.5" rx="4" stroke="#7e57c2" stroke-width="0.8"/>
  <text x="175" y="296" fill="#4a148c" font-size="9" font-weight="bold" font-family="Arial">Ключевые особенности:</text>
  <text x="175" y="310" fill="#4e342e" font-size="8" font-family="Arial">• Веретено деления (нити) из центриолей</text>
  <text x="175" y="322" fill="#4e342e" font-size="8" font-family="Arial">• Соматические (телесные) клетки</text>
  <text x="175" y="334" fill="#4e342e" font-size="8" font-family="Arial">• Генетически идентичные копии</text>
  <!-- Legend -->
  <rect x="20" y="80" width="8" height="4" fill="#d32f2f" rx="1"/>
  <text x="30" y="84" fill="#4e342e" font-size="7" font-family="Arial">Материнская хромосома</text>
  <rect x="20" y="88" width="8" height="4" fill="#1565c0" rx="1"/>
  <text x="30" y="92" fill="#4e342e" font-size="7" font-family="Arial">Отцовская хромосома</text>
  <rect x="20" y="96" width="8" height="4" fill="#7e57c2" rx="1"/>
  <text x="30" y="100" fill="#4e342e" font-size="7" font-family="Arial">Нити веретена деления</text>
</svg>