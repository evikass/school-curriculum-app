<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad19" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow19" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0d9488" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad19)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" rx="16" fill="#0d9488"/>
  <rect x="0" y="30" width="800" height="30" fill="#0d9488"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f0fdfa" text-anchor="middle">Закон Авогадро. Моль</text>

  <!-- Central concept: 1 моль = 6,02·10²³ -->
  <rect x="175" y="75" width="450" height="70" rx="14" fill="white" stroke="#0d9488" stroke-width="2.5" filter="url(#shadow19)"/>
  <text x="400" y="102" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#0d9488" text-anchor="middle">1 моль = 6,02·10²³</text>
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="16" fill="#14b8a6" text-anchor="middle">частиц (число Авогадро Nₐ)</text>

  <!-- Formulas section -->
  <rect x="20" y="160" width="760" height="90" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow19)"/>
  <rect x="20" y="160" width="760" height="34" rx="12" fill="#14b8a6"/>
  <rect x="20" y="180" width="760" height="14" fill="#14b8a6"/>
  <text x="400" y="183" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Формулы для расчёта количества вещества</text>

  <!-- Three formula boxes -->
  <rect x="40" y="205" width="225" height="36" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="152" y="229" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0d9488" text-anchor="middle">n = m / M</text>

  <rect x="288" y="205" width="225" height="36" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="400" y="229" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0d9488" text-anchor="middle">n = V / 22,4</text>

  <rect x="535" y="205" width="225" height="36" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="647" y="229" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0d9488" text-anchor="middle">n = N / Nₐ</text>

  <!-- Three example boxes -->
  <!-- Box 1: 1 моль H₂O = 18 г -->
  <rect x="20" y="270" width="240" height="210" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow19)"/>
  <rect x="20" y="270" width="240" height="38" rx="12" fill="#0d9488"/>
  <rect x="20" y="290" width="240" height="18" fill="#0d9488"/>
  <text x="140" y="295" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">1 моль H₂O</text>

  <!-- Water molecule icon -->
  <circle cx="140" cy="350" r="22" fill="#2dd4bf" opacity="0.4" stroke="#0d9488" stroke-width="2"/>
  <circle cx="115" cy="370" r="14" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <circle cx="165" cy="370" r="14" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <text x="140" y="355" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d9488" text-anchor="middle">O</text>
  <text x="115" y="375" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488" text-anchor="middle">H</text>
  <text x="165" y="375" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d9488" text-anchor="middle">H</text>

  <text x="140" y="410" font-family="Arial, sans-serif" font-size="16" fill="#0d9488" text-anchor="middle">M(H₂O) = 18 г/моль</text>
  <rect x="45" y="425" width="190" height="36" rx="8" fill="#14b8a6"/>
  <text x="140" y="449" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white" text-anchor="middle">1 моль = 18 г</text>

  <!-- Box 2: 1 моль O₂ = 22,4 л -->
  <rect x="280" y="270" width="240" height="210" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow19)"/>
  <rect x="280" y="270" width="240" height="38" rx="12" fill="#0d9488"/>
  <rect x="280" y="290" width="240" height="18" fill="#0d9488"/>
  <text x="400" y="295" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">1 моль O₂ (н.у.)</text>

  <!-- Gas volume icon -->
  <rect x="340" y="325" width="120" height="55" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488" text-anchor="middle">O₂</text>
  <text x="400" y="370" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">газ</text>

  <text x="400" y="410" font-family="Arial, sans-serif" font-size="16" fill="#0d9488" text-anchor="middle">Vₘ = 22,4 л/моль</text>
  <rect x="305" y="425" width="190" height="36" rx="8" fill="#14b8a6"/>
  <text x="400" y="449" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white" text-anchor="middle">1 моль = 22,4 л</text>

  <!-- Box 3: 1 моль Na = 23 г -->
  <rect x="540" y="270" width="240" height="210" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow19)"/>
  <rect x="540" y="270" width="240" height="38" rx="12" fill="#0d9488"/>
  <rect x="540" y="290" width="240" height="18" fill="#0d9488"/>
  <text x="660" y="295" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">1 моль Na</text>

  <!-- Solid metal icon -->
  <rect x="625" y="325" width="70" height="55" rx="6" fill="#2dd4bf" opacity="0.4" stroke="#0d9488" stroke-width="2"/>
  <text x="660" y="358" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488" text-anchor="middle">Na</text>

  <text x="660" y="410" font-family="Arial, sans-serif" font-size="16" fill="#0d9488" text-anchor="middle">M(Na) = 23 г/моль</text>
  <rect x="565" y="425" width="190" height="36" rx="8" fill="#14b8a6"/>
  <text x="660" y="449" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="white" text-anchor="middle">1 моль = 23 г</text>
</svg>