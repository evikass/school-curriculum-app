<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGrad18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <filter id="shadow18" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0d9488" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="16" fill="url(#bgGrad18)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="60" rx="16" fill="#0d9488"/>
  <rect x="0" y="30" width="800" height="30" fill="#0d9488"/>
  <text x="400" y="42" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f0fdfa" text-anchor="middle">Скорость химических реакций</text>

  <!-- Factor 1: Природа -->
  <rect x="20" y="80" width="145" height="150" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow18)"/>
  <rect x="20" y="80" width="145" height="40" rx="12" fill="#14b8a6"/>
  <rect x="20" y="100" width="145" height="20" fill="#14b8a6"/>
  <text x="92" y="106" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Природа</text>

  <!-- Nature icon: two different shaped molecules -->
  <circle cx="60" cy="170" r="18" fill="#2dd4bf" opacity="0.4" stroke="#0d9488" stroke-width="1.5"/>
  <circle cx="48" cy="158" r="8" fill="#14b8a6" opacity="0.5" stroke="#0d9488" stroke-width="1"/>
  <rect x="100" y="155" width="28" height="28" rx="4" fill="#2dd4bf" opacity="0.4" stroke="#0d9488" stroke-width="1.5"/>

  <text x="92" y="210" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">Свойства</text>
  <text x="92" y="223" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">веществ</text>

  <!-- Factor 2: Концентрация -->
  <rect x="178" y="80" width="145" height="150" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow18)"/>
  <rect x="178" y="80" width="145" height="40" rx="12" fill="#14b8a6"/>
  <rect x="178" y="100" width="145" height="20" fill="#14b8a6"/>
  <text x="250" y="106" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Концентрация</text>

  <!-- Concentration icon: many dots vs few dots -->
  <circle cx="218" cy="155" r="4" fill="#0d9488"/>
  <circle cx="228" cy="170" r="4" fill="#0d9488"/>
  <circle cx="238" cy="158" r="4" fill="#0d9488"/>
  <circle cx="248" cy="175" r="4" fill="#0d9488"/>
  <circle cx="223" cy="180" r="4" fill="#0d9488"/>
  <circle cx="233" cy="163" r="4" fill="#0d9488"/>
  <circle cx="243" cy="182" r="4" fill="#0d9488"/>
  <circle cx="213" cy="168" r="4" fill="#0d9488"/>

  <text x="250" y="210" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">Больше =</text>
  <text x="250" y="223" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">быстрее</text>

  <!-- Factor 3: Температура -->
  <rect x="336" y="80" width="145" height="150" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow18)"/>
  <rect x="336" y="80" width="145" height="40" rx="12" fill="#0d9488"/>
  <rect x="336" y="100" width="145" height="20" fill="#0d9488"/>
  <text x="408" y="106" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Температура</text>

  <!-- Temperature icon: thermometer -->
  <rect x="400" y="140" width="16" height="50" rx="8" fill="#2dd4bf" opacity="0.4" stroke="#0d9488" stroke-width="1.5"/>
  <circle cx="408" cy="196" r="10" fill="#0d9488" opacity="0.3" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="403" y="165" width="10" height="30" rx="5" fill="#0d9488" opacity="0.6"/>
  <text x="408" y="135" font-family="Arial, sans-serif" font-size="16" fill="#dc2626" text-anchor="middle">↑t°</text>

  <text x="408" y="222" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">Нагревание</text>

  <!-- Factor 4: Поверхность -->
  <rect x="494" y="80" width="145" height="150" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow18)"/>
  <rect x="494" y="80" width="145" height="40" rx="12" fill="#14b8a6"/>
  <rect x="494" y="100" width="145" height="20" fill="#14b8a6"/>
  <text x="566" y="106" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Поверхность</text>

  <!-- Surface icon: big block vs small pieces -->
  <rect x="518" y="148" width="28" height="28" rx="2" fill="#2dd4bf" opacity="0.4" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="568" y="148" width="12" height="12" rx="1" fill="#2dd4bf" opacity="0.6" stroke="#0d9488" stroke-width="1"/>
  <rect x="583" y="148" width="12" height="12" rx="1" fill="#2dd4bf" opacity="0.6" stroke="#0d9488" stroke-width="1"/>
  <rect x="568" y="163" width="12" height="12" rx="1" fill="#2dd4bf" opacity="0.6" stroke="#0d9488" stroke-width="1"/>
  <rect x="583" y="163" width="12" height="12" rx="1" fill="#2dd4bf" opacity="0.6" stroke="#0d9488" stroke-width="1"/>
  <text x="532" y="190" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">&lt;</text>
  <text x="576" y="190" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">&gt;</text>

  <text x="566" y="210" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">Дробление</text>
  <text x="566" y="223" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">увеличивает</text>

  <!-- Factor 5: Катализатор -->
  <rect x="652" y="80" width="128" height="150" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow18)"/>
  <rect x="652" y="80" width="128" height="40" rx="12" fill="#0d9488"/>
  <rect x="652" y="100" width="128" height="20" fill="#0d9488"/>
  <text x="716" y="106" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Катализатор</text>

  <!-- Catalyst icon: lightning bolt -->
  <polygon points="716,135 705,170 714,170 708,200 725,160 716,160 724,135" fill="#2dd4bf" stroke="#0d9488" stroke-width="1.5"/>

  <text x="716" y="215" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">Ускоряет</text>
  <text x="716" y="228" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">реакцию</text>

  <!-- Van't Hoff rule box -->
  <rect x="40" y="260" width="720" height="100" rx="12" fill="white" stroke="#0d9488" stroke-width="2.5" filter="url(#shadow18)"/>
  <rect x="40" y="260" width="720" height="38" rx="12" fill="#0d9488"/>
  <rect x="40" y="280" width="720" height="18" fill="#0d9488"/>
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f0fdfa" text-anchor="middle">Правило Вант-Гоффа</text>

  <!-- Temperature bar -->
  <rect x="80" y="315" width="300" height="22" rx="11" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
  <!-- Filled portion -->
  <rect x="80" y="315" width="150" height="22" rx="11" fill="#14b8a6"/>
  <rect x="215" y="315" width="15" height="22" fill="#14b8a6"/>
  <!-- Temperature markers -->
  <text x="120" y="331" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">t°C</text>
  <text x="250" y="331" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">t+10°C</text>

  <!-- Arrow showing speed increase -->
  <text x="420" y="332" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#0d9488" text-anchor="middle">→</text>
  <rect x="455" y="313" width="110" height="28" rx="14" fill="#14b8a6"/>
  <text x="510" y="332" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">×2–4</text>

  <text x="680" y="332" font-family="Arial, sans-serif" font-size="13" fill="#0d9488" text-anchor="middle">скорость</text>

  <!-- Speed graph -->
  <rect x="40" y="380" width="720" height="105" rx="12" fill="white" stroke="#14b8a6" stroke-width="2" filter="url(#shadow18)"/>
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0d9488" text-anchor="middle">Зависимость скорости от температуры</text>

  <!-- Axes -->
  <line x1="90" y1="470" x2="710" y2="470" stroke="#14b8a6" stroke-width="1.5"/>
  <line x1="90" y1="470" x2="90" y2="410" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="55" y="440" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">v</text>
  <text x="710" y="485" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">t°C</text>

  <!-- Curve -->
  <path d="M90,468 Q150,465 200,460 Q300,448 400,435 Q500,420 580,415 Q650,412 700,410" fill="none" stroke="#0d9488" stroke-width="2.5"/>

  <!-- Markers on curve -->
  <circle cx="200" cy="460" r="4" fill="#14b8a6"/>
  <circle cx="400" cy="435" r="4" fill="#14b8a6"/>
  <circle cx="580" cy="415" r="4" fill="#14b8a6"/>

  <text x="200" y="457" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">t₁</text>
  <text x="400" y="432" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">t₁+10</text>
  <text x="580" y="412" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">t₁+20</text>
</svg>