<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ccfbf1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ccfbf1;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#14b8a6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#0d9488" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)" rx="12" ry="12"/>
  <rect x="2" y="2" width="796" height="496" fill="none" stroke="#0d9488" stroke-width="2" rx="12" ry="12"/>

  <!-- Title -->
  <text x="400" y="45" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0d9488" text-anchor="middle">Физические и химические явления</text>
  <line x1="150" y1="58" x2="650" y2="58" stroke="#14b8a6" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- LEFT PANEL: Physical phenomenon -->
  <rect x="30" y="75" width="360" height="390" rx="12" ry="12" fill="white" fill-opacity="0.7" stroke="#14b8a6" stroke-width="2" filter="url(#shadow2)"/>

  <!-- Physical label -->
  <rect x="70" y="90" width="280" height="36" rx="8" ry="8" fill="#0d9488" opacity="0.15"/>
  <text x="210" y="115" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">Физическое явление</text>

  <!-- Ice cube -->
  <g transform="translate(90, 150)">
    <!-- Ice block -->
    <rect x="0" y="20" width="70" height="60" rx="4" fill="url(#iceGrad)" stroke="#14b8a6" stroke-width="2"/>
    <!-- Ice shine -->
    <rect x="8" y="28" width="20" height="10" rx="3" fill="white" opacity="0.6"/>
    <rect x="8" y="44" width="12" height="6" rx="2" fill="white" opacity="0.4"/>
    <!-- Ice label -->
    <text x="35" y="100" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Лёд</text>
  </g>

  <!-- Arrow: ice to water -->
  <g transform="translate(190, 165)">
    <line x1="0" y1="25" x2="60" y2="25" stroke="#0d9488" stroke-width="3"/>
    <polygon points="60,18 75,25 60,32" fill="#0d9488"/>
    <text x="37" y="10" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle">нагревание</text>
  </g>

  <!-- Water puddle -->
  <g transform="translate(280, 155)">
    <!-- Water -->
    <ellipse cx="50" cy="55" rx="50" ry="22" fill="#2dd4bf" opacity="0.4" stroke="#14b8a6" stroke-width="1.5"/>
    <!-- Water shine -->
    <ellipse cx="40" cy="50" rx="15" ry="5" fill="white" opacity="0.5"/>
    <!-- Water label -->
    <text x="50" y="100" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Вода</text>
  </g>

  <!-- Description for physical -->
  <text x="210" y="310" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Состав вещества не меняется</text>
  <text x="210" y="335" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">Меняется только агрегатное</text>
  <text x="210" y="355" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">состояние</text>

  <!-- Examples list -->
  <rect x="60" y="375" width="300" height="30" rx="6" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="1"/>
  <text x="210" y="396" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">Примеры: плавление, кипение, замерзание</text>

  <!-- Small icons: melting, boiling -->
  <g transform="translate(80, 380)">
    <circle cx="8" cy="8" r="7" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1"/>
    <text x="8" y="12" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">❄</text>
  </g>
  <g transform="translate(340, 380)">
    <circle cx="8" cy="8" r="7" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1"/>
    <text x="8" y="12" font-family="Arial, sans-serif" font-size="10" fill="#0d9488" text-anchor="middle">💧</text>
  </g>

  <!-- Divider -->
  <line x1="400" y1="85" x2="400" y2="455" stroke="#14b8a6" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- VS circle -->
  <circle cx="400" cy="270" r="22" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="2"/>
  <text x="400" y="277" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0d9488" text-anchor="middle">VS</text>

  <!-- RIGHT PANEL: Chemical reaction -->
  <rect x="410" y="75" width="360" height="390" rx="12" ry="12" fill="white" fill-opacity="0.7" stroke="#14b8a6" stroke-width="2" filter="url(#shadow2)"/>

  <!-- Chemical label -->
  <rect x="450" y="90" width="280" height="36" rx="8" ry="8" fill="#0d9488" opacity="0.15"/>
  <text x="590" y="115" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#0d9488" text-anchor="middle">Химическая реакция</text>

  <!-- Candle with flame -->
  <g transform="translate(480, 140)">
    <!-- Candle body -->
    <rect x="20" y="60" width="40" height="80" rx="4" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1.5"/>
    <!-- Candle wax drip -->
    <ellipse cx="40" cy="60" rx="22" ry="5" fill="#ccfbf1" stroke="#14b8a6" stroke-width="1"/>
    <!-- Wick -->
    <line x1="40" y1="60" x2="40" y2="42" stroke="#0d9488" stroke-width="2"/>
    <!-- Flame outer -->
    <ellipse cx="40" cy="30" rx="14" ry="22" fill="#2dd4bf" opacity="0.5" filter="url(#glow2)"/>
    <!-- Flame inner -->
    <ellipse cx="40" cy="33" rx="8" ry="14" fill="#14b8a6" opacity="0.7"/>
    <!-- Flame core -->
    <ellipse cx="40" cy="38" rx="4" ry="8" fill="#f0fdfa" opacity="0.8"/>
    <!-- Heat lines -->
    <line x1="20" y1="10" x2="15" y2="0" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="10" x2="65" y2="0" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
    <line x1="40" y1="5" x2="40" y2="-5" stroke="#2dd4bf" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Arrow showing transformation -->
  <g transform="translate(580, 200)">
    <line x1="0" y1="25" x2="55" y2="25" stroke="#0d9488" stroke-width="3"/>
    <polygon points="55,18 70,25 55,32" fill="#0d9488"/>
    <text x="35" y="10" font-family="Arial, sans-serif" font-size="11" fill="#14b8a6" text-anchor="middle">горение</text>
  </g>

  <!-- Smoke/CO2 + H2O products -->
  <g transform="translate(660, 170)">
    <!-- Smoke wisps -->
    <ellipse cx="25" cy="20" rx="18" ry="10" fill="#14b8a6" opacity="0.25"/>
    <ellipse cx="30" cy="35" rx="14" ry="8" fill="#14b8a6" opacity="0.2"/>
    <ellipse cx="20" cy="45" rx="10" ry="6" fill="#14b8a6" opacity="0.15"/>
    <text x="25" y="70" font-family="Arial, sans-serif" font-size="11" fill="#0d9488" text-anchor="middle">CO₂ + H₂O</text>
  </g>

  <!-- Description for chemical -->
  <text x="590" y="310" font-family="Arial, sans-serif" font-size="14" fill="#0d9488" text-anchor="middle">Образуются новые вещества</text>
  <text x="590" y="335" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">Состав и свойства</text>
  <text x="590" y="355" font-family="Arial, sans-serif" font-size="13" fill="#14b8a6" text-anchor="middle">меняются</text>

  <!-- Examples list -->
  <rect x="440" y="375" width="300" height="30" rx="6" fill="#f0fdfa" stroke="#2dd4bf" stroke-width="1"/>
  <text x="590" y="396" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">Примеры: горение, ржавление, гниение</text>

  <!-- Signs of chemical reaction -->
  <text x="590" y="440" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">Признаки: изменение цвета, выделение</text>
  <text x="590" y="457" font-family="Arial, sans-serif" font-size="12" fill="#0d9488" text-anchor="middle">газа, образование осадка, теплоты</text>
</svg>
