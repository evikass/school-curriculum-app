  <text x="98" y="278" font-family="Arial,sans-serif" font-size="5" fill="#333">Ca — кости, зубы</text>
  <text x="98" y="286" font-family="Arial,sans-serif" font-size="5" fill="#333">Fe — гемоглобин</text>
  <text x="98" y="294" font-family="Arial,sans-serif" font-size="5" fill="#333">I — щитовидная</text>
  <text x="98" y="302" font-family="Arial,sans-serif" font-size="5" fill="#333">P — АТФ, ДНК</text>
  <text x="98" y="310" font-family="Arial,sans-serif" font-size="5" fill="#333">Na, K — нервная</text>
  <text x="98" y="318" font-family="Arial,sans-serif" font-size="5" fill="#333">  система</text>

  <!-- Vitamins -->
  <rect x="168" y="253" width="62" height="68" rx="4" fill="#F3E5F5" stroke="#AB47BC" stroke-width="0.5"/>
  <text x="199" y="265" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#6A1B9A" font-weight="bold">Витамины</text>
  <text x="173" y="278" font-family="Arial,sans-serif" font-size="5" fill="#333">A — зрение</text>
  <text x="173" y="286" font-family="Arial,sans-serif" font-size="5" fill="#333">B₁ — нервная</text>
  <text x="173" y="294" font-family="Arial,sans-serif" font-size="5" fill="#333">C — иммунитет</text>
  <text x="173" y="302" font-family="Arial,sans-serif" font-size="5" fill="#333">D — кости (Ca)</text>
  <text x="173" y="310" font-family="Arial,sans-serif" font-size="5" fill="#333">E — антиокс.</text>
  <text x="173" y="318" font-family="Arial,sans-serif" font-size="5" fill="#333">K — свёрт. крови</text>

  <!-- ============================================ -->
  <!-- === BOTTOM: Caloric values comparison === -->
  <!-- ============================================ -->
  <rect x="244" y="230" width="244" height="98" rx="6" fill="white" fill-opacity="0.85" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="366" y="244" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Энергетическая ценность</text>
  <line x1="254" y1="248" x2="478" y2="248" stroke="#2E7D32" stroke-width="0.3"/>

  <!-- Bar chart: caloric comparison -->
  <!-- Y axis -->
  <line x1="270" y1="258" x2="270" y2="318" stroke="#333" stroke-width="0.5"/>
  <text x="266" y="263" font-family="Arial,sans-serif" font-size="4.5" fill="#666">40</text>
  <text x="266" y="278" font-family="Arial,sans-serif" font-size="4.5" fill="#666">30</text>
  <text x="266" y="293" font-family="Arial,sans-serif" font-size="4.5" fill="#666">20</text>
  <text x="266" y="308" font-family="Arial,sans-serif" font-size="4.5" fill="#666">10</text>
  <line x1="268" y1="260" x2="272" y2="260" stroke="#333" stroke-width="0.3"/>
  <line x1="268" y1="275" x2="272" y2="275" stroke="#333" stroke-width="0.3"/>
  <line x1="268" y1="290" x2="272" y2="290" stroke="#333" stroke-width="0.3"/>
  <line x1="268" y1="305" x2="272" y2="305" stroke="#333" stroke-width="0.3"/>
  <text x="258" y="324" font-family="Arial,sans-serif" font-size="4.5" fill="#666">кДж/г</text>

  <!-- Protein bar (17.2 kJ) -->
  <rect x="290" y="274.2" width="40" height="43.8" rx="2" fill="#EF5350" stroke="#C62828" stroke-width="0.5" opacity="0.8"/>
  <text x="310" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#fff" font-weight="bold">17,2</text>
  <text x="310" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#fff">кДж/г</text>
  <text x="310" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold">Белки</text>

  <!-- Fat bar (38.9 kJ) -->
  <rect x="350" y="258.5" width="40" height="59.5" rx="2" fill="#FF9800" stroke="#E65100" stroke-width="0.5" opacity="0.8"/>
  <text x="370" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#fff" font-weight="bold">38,9</text>
  <text x="370" y="293" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#fff">кДж/г</text>
  <text x="370" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Жиры</text>

  <!-- Carb bar (17.2 kJ) -->
  <rect x="410" y="274.2" width="40" height="43.8" rx="2" fill="#42A5F5" stroke="#1565C0" stroke-width="0.5" opacity="0.8"/>
  <text x="430" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#fff" font-weight="bold">17,2</text>
  <text x="430" y="298" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#fff">кДж/г</text>
  <text x="430" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">Углеводы</text>

  <!-- Daily norm note -->
  <text x="366" y="322" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#666">Суточная норма: Б ~80г, Ж ~80г, У ~400г ≈ 11 700 кДж</text>

  <!-- Footer -->
  <rect x="2" y="335" width="496" height="13" rx="0 0 12 12" fill="#2E7D32"/>
  <text x="250" y="344" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="white">Белки: 17,2 кДж/г | Жиры: 38,9 кДж/г (макс. энергия) | Углеводы: 17,2 кДж/г | Вода + минералы + витамины — без энергии</text>
</svg>