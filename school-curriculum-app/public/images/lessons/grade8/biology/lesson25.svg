  <text x="53" y="265" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#0D47A1" font-weight="bold">Вода</text>
  <text x="53" y="275" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">60-70%</text>
  <text x="53" y="285" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">массы тела</text>
