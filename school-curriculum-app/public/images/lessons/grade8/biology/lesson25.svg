  <rect x="352" y="220" width="120" height="14" rx="3" fill="#1565C0" opacity="0.15"/>
  <text x="411" y="230" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#1565C0" font-weight="bold">17,2 кДж/г (4,1 ккал/г)</text>

