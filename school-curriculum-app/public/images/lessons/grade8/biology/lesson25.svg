  <path d="M53,290 Q47,298 53,305 Q59,298 53,290Z" fill="#42A5F5" stroke="#1565C0" stroke-width="0.5"/>
  <text x="53" y="300" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" fill="#fff">H₂O</text>
  <text x="53" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">Растворитель,</text>
  <text x="53" y="322" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">транспорт, t°</text>

