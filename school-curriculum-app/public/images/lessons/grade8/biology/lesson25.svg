<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20">Пищевые продукты и питательные вещества</text>
  <text x="250" y="34" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#666">Биология 8 класс — Урок 25</text>
  <line x1="20" y1="40" x2="480" y2="40" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>

  <!-- ============================================ -->
  <!-- === PROTEINS (Белки) — Left panel === -->
  <!-- ============================================ -->
  <rect x="12" y="48" width="155" height="175" rx="6" fill="white" fill-opacity="0.85" stroke="#C62828" stroke-width="1"/>
  <text x="89" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#C62828">Белки</text>
  <text x="89" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">(протеины)</text>

  <!-- Amino acid chain diagram -->
  <!-- Amino acid 1 -->
  <rect x="22" y="80" width="28" height="16" rx="3" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <text x="36" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">АК₁</text>
  <!-- Peptide bond -->
  <line x1="50" y1="88" x2="56" y2="88" stroke="#333" stroke-width="1.5"/>
  <text x="53" y="85" font-family="Arial,sans-serif" font-size="4" fill="#333">—</text>
  <!-- Amino acid 2 -->
  <rect x="56" y="80" width="28" height="16" rx="3" fill="#EF9A9A" stroke="#C62828" stroke-width="0.8"/>
  <text x="70" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#C62828">АК₂</text>
  <!-- Peptide bond -->
  <line x1="84" y1="88" x2="90" y2="88" stroke="#333" stroke-width="1.5"/>
  <!-- Amino acid 3 -->
  <rect x="90" y="80" width="28" height="16" rx="3" fill="#E57373" stroke="#C62828" stroke-width="0.8"/>
  <text x="104" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#fff">АК₃</text>
  <!-- Peptide bond -->
  <line x1="118" y1="88" x2="124" y2="88" stroke="#333" stroke-width="1.5"/>
  <!-- Amino acid 4 -->
  <rect x="124" y="80" width="28" height="16" rx="3" fill="#EF5350" stroke="#C62828" stroke-width="0.8"/>
  <text x="138" y="91" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#fff">АКₙ</text>

  <!-- Peptide bond label -->
  <text x="53" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#333">пептидная связь</text>

  <!-- Amino acid structure hint -->
  <text x="89" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">Аминокислота:</text>
  <text x="89" y="123" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold">NH₂—CH(R)—COOH</text>
  <text x="89" y="131" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#666">20 аминокислот, 8 — незаменимые</text>

  <!-- Sources -->
  <rect x="20" y="137" width="140" height="35" rx="3" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.5"/>
  <text x="90" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#C62828" font-weight="bold">Источники:</text>
  <text x="26" y="157" font-family="Arial,sans-serif" font-size="5.5" fill="#333">🥩 Мясо  🐟 Рыба  🥚 Яйца</text>
  <text x="26" y="165" font-family="Arial,sans-serif" font-size="5.5" fill="#333">🫘 Бобовые  🥛 Молоко  🧀 Сыр</text>

  <!-- Functions -->
  <text x="89" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Функции: строительная,</text>
  <text x="89" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">ферментативная, защитная,</text>
  <text x="89" y="197" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">транспортная, энергетическая</text>

  <!-- Caloric value -->
  <rect x="30" y="202" width="120" height="14" rx="3" fill="#C62828" opacity="0.15"/>
  <text x="89" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828" font-weight="bold">17,2 кДж/г (4,1 ккал/г)</text>

  <!-- ============================================ -->
  <!-- === FATS (Жиры) — Center panel === -->
  <!-- ============================================ -->
  <rect x="173" y="48" width="155" height="175" rx="6" fill="white" fill-opacity="0.85" stroke="#E65100" stroke-width="1"/>
  <text x="250" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#E65100">Жиры</text>
  <text x="250" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">(липиды)</text>

  <!-- Triglyceride structure -->
  <!-- Glycerol backbone -->
  <rect x="210" y="80" width="35" height="14" rx="3" fill="#FFE0B2" stroke="#E65100" stroke-width="0.8"/>
  <text x="227" y="90" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#E65100">Глицерин</text>

  <!-- Fatty acid chains -->
  <line x1="215" y1="94" x2="210" y2="105" stroke="#E65100" stroke-width="1"/>
  <line x1="227" y1="94" x2="227" y2="105" stroke="#E65100" stroke-width="1"/>
  <line x1="240" y1="94" x2="244" y2="105" stroke="#E65100" stroke-width="1"/>

  <!-- Fatty acid 1 (saturated - straight) -->
  <rect x="195" y="105" width="30" height="14" rx="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
  <text x="210" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100">ЖК₁ нас.</text>
  <!-- Zigzag chain -->
  <path d="M198,119 L201,123 L204,119 L207,123 L210,119 L213,123 L216,119 L219,123 L222,119" fill="none" stroke="#E65100" stroke-width="0.6"/>

  <!-- Fatty acid 2 (saturated - straight) -->
  <rect x="225" y="105" width="30" height="14" rx="2" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
  <text x="240" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100">ЖК₂ нас.</text>
  <path d="M228,119 L231,123 L234,119 L237,123 L240,119 L243,123 L246,119 L249,123 L252,119" fill="none" stroke="#E65100" stroke-width="0.6"/>

  <!-- Fatty acid 3 (unsaturated - bent) -->
  <rect x="255" y="105" width="30" height="14" rx="2" fill="#FFE082" stroke="#F9A825" stroke-width="0.5"/>
  <text x="270" y="115" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100">ЖК₃ ненас.</text>
  <path d="M258,119 L261,123 L264,119 Q268,115 272,119 L275,123 L278,119" fill="none" stroke="#F9A825" stroke-width="0.6"/>

  <!-- Formula -->
  <text x="250" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">Триглицерид = глицерин + 3 ЖК</text>
  <text x="250" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#E65100">Насыщенные (твёрдые) vs ненасыщенные (жидкие)</text>

  <!-- Sources -->
  <rect x="181" y="148" width="140" height="35" rx="3" fill="#FFF3E0" stroke="#FFCC80" stroke-width="0.5"/>
  <text x="251" y="159" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#E65100" font-weight="bold">Источники:</text>
  <text x="187" y="168" font-family="Arial,sans-serif" font-size="5.5" fill="#333">🧈 Сливочное масло  🫒 Растит. масло</text>
  <text x="187" y="176" font-family="Arial,sans-serif" font-size="5.5" fill="#333">🥜 Орехи  🥑 Авокадо  🐟 Жирная рыба</text>

  <!-- Functions -->
  <text x="250" y="194" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Функции: энергетическая (запас),</text>
  <text x="250" y="201" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">теплоизоляция, защитная,</text>
  <text x="250" y="208" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">строительная (мембраны)</text>

  <!-- Caloric value -->
  <rect x="191" y="212" width="120" height="14" rx="3" fill="#E65100" opacity="0.15"/>
  <text x="250" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100" font-weight="bold">38,9 кДж/г (9,3 ккал/г)</text>

  <!-- ============================================ -->
  <!-- === CARBOHYDRATES (Углеводы) — Right panel === -->
  <!-- ============================================ -->
  <rect x="334" y="48" width="155" height="175" rx="6" fill="white" fill-opacity="0.85" stroke="#1565C0" stroke-width="1"/>
  <text x="411" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1565C0">Углеводы</text>
  <text x="411" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#666">(сахариды)</text>

  <!-- Glucose molecule (hexagon) -->
  <polygon points="411,80 425,87 425,101 411,108 397,101 397,87" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <text x="411" y="95" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" font-weight="bold">C₆H₁₂O₆</text>
  <text x="411" y="116" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">Глюкоза</text>

  <!-- Classification -->
  <text x="411" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">Простые (моно- и дисахариды):</text>
  <text x="411" y="133" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Глюкоза, фруктоза, сахароза</text>
  <text x="411" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#666">Сложные (полисахариды):</text>
  <text x="411" y="149" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Крахмал, гликоген, клетчатка</text>

  <!-- Monosaccharide chain -->
  <circle cx="362" cy="158" r="5" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="367" y1="158" x2="374" y2="158" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="379" cy="158" r="5" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  <line x1="384" y1="158" x2="391" y2="158" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="396" cy="158" r="5" fill="#64B5F6" stroke="#1565C0" stroke-width="0.5"/>
  <text x="416" y="161" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">→ ... →</text>
  <rect x="438" y="152" width="40" height="12" rx="2" fill="#42A5F5" stroke="#1565C0" stroke-width="0.5"/>
  <text x="458" y="160" text-anchor="middle" font-family="Arial,sans-serif" font-size="4.5" fill="#fff">Полимер</text>

  <!-- Sources -->
  <rect x="342" y="168" width="140" height="35" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="0.5"/>
  <text x="412" y="179" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" font-weight="bold">Источники:</text>
  <text x="348" y="188" font-family="Arial,sans-serif" font-size="5.5" fill="#333">🍞 Хлеб  🍚 Рис  🥔 Картофель</text>
  <text x="348" y="196" font-family="Arial,sans-serif" font-size="5.5" fill="#333">🍎 Фрукты  🍬 Сахар  🍝 Макароны</text>

  <!-- Functions -->
  <text x="411" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Функции: энергетическая (осн.),</text>
  <text x="411" y="217" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#333">запасающая (гликоген),</text>

