  <!-- === SIDE PANEL: Other nutrients === -->
  <!-- ============================================ -->
  <rect x="12" y="230" width="225" height="98" rx="6" fill="white" fill-opacity="0.85" stroke="#2E7D32" stroke-width="0.8"/>
