<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Кровеносные сосуды. Круги кровообращения</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 18</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Systemic (Great) Circulation Circle -->
<g transform="translate(10,55)">
  <text x="120" y="0" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">БОЛЬШОЙ КРУГ КРОВООБРАЩЕНИЯ</text>

  <!-- Heart icon (simplified) -->
  <g transform="translate(120,35)">
    <path d="M0,8 C-12,-5 -22,-5 -22,5 C-22,15 0,28 0,28 C0,28 22,15 22,5 C22,-5 12,-5 0,8 Z" fill="#E57373" stroke="#B71C1C" stroke-width="1.5"/>
    <text x="0" y="20" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle" font-weight="bold">Сердце</text>
  </g>

  <!-- Left ventricle label -->
  <text x="120" y="72" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle">Левый желудочек</text>

  <!-- Aorta (red, outgoing) -->
  <path d="M142,50 L190,40 L210,55" stroke="#C62828" stroke-width="3" fill="none"/>
  <polygon points="210,55 204,48 208,55" fill="#C62828"/>
  <text x="185" y="35" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" font-weight="bold">Аорта</text>

  <!-- Arteries to body -->
  <path d="M210,55 L220,85 L205,115" stroke="#E53935" stroke-width="2" fill="none"/>
  <path d="M220,85 L235,110" stroke="#E53935" stroke-width="2" fill="none"/>

  <!-- Body/organs -->
  <ellipse cx="220" cy="100" rx="30" ry="22" fill="#FFECB3" stroke="#F9A825" stroke-width="1" opacity="0.7"/>
  <text x="220" y="97" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle" font-weight="bold">Органы</text>
  <text x="220" y="105" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle" font-weight="bold">тела</text>

  <!-- Gas exchange arrows -->
  <text x="197" y="115" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">O₂→</text>
  <text x="234" y="115" font-family="Arial,sans-serif" font-size="5" fill="#7B1FA2">←CO₂</text>

  <!-- Veins back (blue) -->
  <path d="M205,120 L190,145 L165,160" stroke="#283593" stroke-width="2" fill="none"/>
  <path d="M235,120 L220,150 L190,160" stroke="#283593" stroke-width="2" fill="none"/>

  <!-- Vena cava -->
  <path d="M165,160 L130,165 L100,155" stroke="#283593" stroke-width="3" fill="none"/>
  <text x="85" y="150" font-family="Arial,sans-serif" font-size="5.5" fill="#283593" font-weight="bold">Полая вена</text>

  <!-- Right atrium -->
  <text x="120" y="175" font-family="Arial,sans-serif" font-size="5" fill="#283593" text-anchor="middle">Правое предсердие</text>
</g>

<!-- Pulmonary (Small) Circulation Circle -->
<g transform="translate(260,55)">
  <text x="115" y="0" font-family="Arial,sans-serif" font-size="7" fill="#1565C0" text-anchor="middle" font-weight="bold">МАЛЫЙ КРУГ КРОВООБРАЩЕНИЯ</text>

  <!-- Heart icon -->
  <g transform="translate(115,35)">
    <path d="M0,8 C-12,-5 -22,-5 -22,5 C-22,15 0,28 0,28 C0,28 22,15 22,5 C22,-5 12,-5 0,8 Z" fill="#9FA8DA" stroke="#283593" stroke-width="1.5"/>
    <text x="0" y="20" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle" font-weight="bold">Сердце</text>
  </g>

  <text x="115" y="72" font-family="Arial,sans-serif" font-size="5" fill="#283593" text-anchor="middle">Правый желудочек</text>

  <!-- Pulmonary artery (blue, outgoing) -->
  <path d="M95,48 L60,40 L40,55" stroke="#283593" stroke-width="2.5" fill="none"/>
  <polygon points="40,55 44,48 46,56" fill="#283593"/>
  <text x="42" y="33" font-family="Arial,sans-serif" font-size="5.5" fill="#283593" font-weight="bold">Лёгочная артерия</text>

  <!-- Lungs -->
  <g transform="translate(55,85)">
    <ellipse cx="-15" cy="0" rx="20" ry="18" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" opacity="0.7"/>
    <ellipse cx="15" cy="0" rx="20" ry="18" fill="#BBDEFB" stroke="#1565C0" stroke-width="1" opacity="0.7"/>
    <text x="-15" y="3" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" text-anchor="middle" font-weight="bold">Лёгкое</text>
    <text x="15" y="3" font-family="Arial,sans-serif" font-size="5.5" fill="#0D47A1" text-anchor="middle" font-weight="bold">Лёгкое</text>
  </g>

  <!-- Gas exchange -->
  <text x="32" y="98" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">CO₂→</text>
  <text x="80" y="98" font-family="Arial,sans-serif" font-size="5" fill="#C62828">←O₂</text>

  <!-- Pulmonary veins (red, returning) -->
  <path d="M60,105 L80,140 L110,155" stroke="#C62828" stroke-width="2.5" fill="none"/>
  <text x="105" y="148" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" font-weight="bold">Лёгочные вены</text>

  <text x="115" y="175" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle">Левое предсердие</text>
</g>

<!-- Blood vessel cross-sections -->
<g transform="translate(15,245)">
  <text x="155" y="0" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">СТРОЕНИЕ СОСУДОВ (поперечный срез)</text>

  <!-- Artery -->
  <g transform="translate(50,30)">
    <circle cx="0" cy="0" r="25" fill="#FFCDD2" stroke="#C62828" stroke-width="4"/>
    <circle cx="0" cy="0" r="20" fill="#FFCDD2" stroke="#E57373" stroke-width="2"/>
    <circle cx="0" cy="0" r="13" fill="#EF9A9A"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" text-anchor="middle" font-weight="bold">Просвет</text>
    <text x="0" y="35" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Артерия</text>
    <text x="0" y="43" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Толстая стенка</text>
    <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Малый просвет</text>
  </g>

  <!-- Vein -->
  <g transform="translate(155,30)">
    <circle cx="0" cy="0" r="25" fill="#C5CAE9" stroke="#283593" stroke-width="2"/>
    <circle cx="0" cy="0" r="22" fill="#C5CAE9" stroke="#5C6BC0" stroke-width="1"/>
    <circle cx="0" cy="0" r="19" fill="#9FA8DA"/>
    <!-- Valve -->
    <path d="M-5,-19 L0,-14 L5,-19" fill="#5C6BC0" stroke="#283593" stroke-width="0.8"/>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="5" fill="#1A237E" text-anchor="middle" font-weight="bold">Просвет</text>
    <text x="0" y="35" font-family="Arial,sans-serif" font-size="6" fill="#283593" text-anchor="middle" font-weight="bold">Вена</text>
    <text x="0" y="43" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Тонкая стенка, клапаны</text>
    <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Большой просвет</text>
  </g>

  <!-- Capillary -->
  <g transform="translate(260,30)">
    <circle cx="0" cy="0" r="22" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
    <circle cx="0" cy="0" r="19" fill="#C8E6C9"/>
    <!-- Single cell wall indicated -->
    <text x="0" y="-22" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32" text-anchor="middle">1 слой клеток</text>
    <text x="0" y="3" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle" font-weight="bold">Просвет</text>
    <text x="0" y="35" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Капилляр</text>
    <text x="0" y="43" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Один слой эндотелия</text>
    <text x="0" y="50" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Обмен веществ</text>
  </g>
</g>

<!-- Blood pressure info -->
<rect x="335" y="248" width="150" height="62" fill="#fff" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1" rx="5"/>
<text x="410" y="261" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">АРТЕРИАЛЬНОЕ ДАВЛЕНИЕ</text>
<text x="342" y="274" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Норма: 120/80 мм рт. ст.</text>
<text x="342" y="283" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• 120 — систолическое (макс.)</text>
<text x="342" y="292" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• 80 — диастолическое (мин.)</text>
<text x="342" y="301" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Пульс — ритмичные толчки</text>
<text x="342" y="310" font-family="Arial,sans-serif" font-size="5.5" fill="#333">  стенок артерий (60–80/мин)</text>

<!-- Footer -->
<rect x="3" y="325" width="494" height="22" fill="#2E7D32" rx="0"/>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Артерии • Вены • Капилляры • Большой и малый круги • Давление</text>
</svg>