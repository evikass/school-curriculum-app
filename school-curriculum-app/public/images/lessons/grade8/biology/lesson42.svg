<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="outerEar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFCCBC"/>
      <stop offset="100%" stop-color="#FF8A65"/>
    </linearGradient>
    <linearGradient id="middleEar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <linearGradient id="innerEar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D1C4E9"/>
      <stop offset="100%" stop-color="#9575CD"/>
    </linearGradient>
    <linearGradient id="cochleaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E1BEE7"/>
      <stop offset="100%" stop-color="#AB47BC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial">Слуховой анализатор. Строение и работа уха</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 42</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== SECTION HEADERS ===== -->
  <!-- Outer ear section bg -->
  <rect x="15" y="48" width="145" height="210" rx="5" fill="url(#outerEar)" fill-opacity="0.25" stroke="#E64A19" stroke-width="0.8"/>
  <text x="87" y="60" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#BF360C" font-family="Arial">НАРУЖНОЕ УХО</text>

  <!-- Middle ear section bg -->
  <rect x="165" y="48" width="130" height="210" rx="5" fill="url(#middleEar)" fill-opacity="0.25" stroke="#E65100" stroke-width="0.8"/>
  <text x="230" y="60" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#E65100" font-family="Arial">СРЕДНЕЕ УХО</text>

  <!-- Inner ear section bg -->
  <rect x="300" y="48" width="185" height="210" rx="5" fill="url(#innerEar)" fill-opacity="0.25" stroke="#6A1B9A" stroke-width="0.8"/>
  <text x="392" y="60" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#4A148C" font-family="Arial">ВНУТРЕННЕЕ УХО</text>

  <!-- ===== OUTER EAR ===== -->
  <!-- Auricle (ушная раковина) -->
  <path d="M 50 80 Q 35 100 38 140 Q 40 170 55 190 Q 65 200 75 195 Q 85 180 85 160 Q 88 130 80 100 Q 70 80 50 80 Z" fill="#FFCCBC" stroke="#D84315" stroke-width="1.2"/>
  <path d="M 55 90 Q 47 108 48 135 Q 50 160 58 175 Q 62 180 66 175 Q 72 155 70 130 Q 68 105 55 90 Z" fill="#FFAB91" stroke="#BF360C" stroke-width="0.5"/>
  <!-- Ear canal -->
  <rect x="80" y="125" width="60" height="22" rx="8" fill="#FFAB91" stroke="#D84315" stroke-width="1"/>
  <path d="M 80 130 Q 85 136 80 142" fill="none" stroke="#BF360C" stroke-width="0.5"/>
  <path d="M 80 128 Q 100 134 80 144" fill="none" stroke="#BF360C" stroke-width="0.5"/>
  
  <!-- Labels outer ear -->
  <text x="60" y="210" text-anchor="middle" font-size="7" font-weight="bold" fill="#BF360C" font-family="Arial">Ушная</text>
  <text x="60" y="219" text-anchor="middle" font-size="7" font-weight="bold" fill="#BF360C" font-family="Arial">раковина</text>
  <text x="110" y="160" text-anchor="middle" font-size="6" font-weight="bold" fill="#D84315" font-family="Arial">Наружный</text>
  <text x="110" y="168" text-anchor="middle" font-size="6" font-weight="bold" fill="#D84315" font-family="Arial">слуховой проход</text>
  
  <!-- Eardrum (барабанная перепонка) -->
  <line x1="140" y1="120" x2="140" y2="155" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
  <text x="145" y="118" font-size="6.5" font-weight="bold" fill="#4E342E" font-family="Arial">Барабанная</text>
  <text x="145" y="126" font-size="6.5" font-weight="bold" fill="#4E342E" font-family="Arial">перепонка</text>

  <!-- Sound waves -->
  <path d="M 18 130 Q 22 136 18 142 Q 14 148 18 154" fill="none" stroke="#FF5722" stroke-width="0.8"/>
  <path d="M 24 128 Q 28 136 24 142 Q 20 148 24 154" fill="none" stroke="#FF5722" stroke-width="0.8"/>
  <path d="M 30 130 Q 34 136 30 142 Q 26 148 30 154" fill="none" stroke="#FF5722" stroke-width="0.6"/>

  <!-- ===== MIDDLE EAR ===== -->
  <!-- Malleus (молоточек) -->
  <path d="M 148 130 L 155 125 L 165 128 L 168 135 L 165 140 L 155 138 L 148 135 Z" fill="#FFE0B2" stroke="#E65100" stroke-width="1"/>
  <circle cx="150" cy="132" r="4" fill="#FFB74D" stroke="#E65100" stroke-width="0.8"/>
  <text x="155" y="115" text-anchor="middle" font-size="6" font-weight="bold" fill="#E65100" font-family="Arial">Молоточек</text>
  
  <!-- Incus (наковальня) -->
  <path d="M 170 130 L 178 126 L 185 128 L 188 133 L 185 138 L 178 140 L 170 137 Z" fill="#FFCC80" stroke="#E65100" stroke-width="1"/>
  <text x="180" y="150" text-anchor="middle" font-size="6" font-weight="bold" fill="#E65100" font-family="Arial">Наковальня</text>
  
  <!-- Stapes (стремечко) -->
  <path d="M 192 130 L 196 128 L 202 130 L 204 133 L 202 136 L 196 138 L 192 136 Z" fill="#FFB74D" stroke="#E65100" stroke-width="1"/>
  <line x1="204" y1="133" x2="212" y2="133" stroke="#E65100" stroke-width="1.2"/>
  <text x="200" y="115" text-anchor="middle" font-size="6" font-weight="bold" fill="#E65100" font-family="Arial">Стремечко</text>
  
  <!-- Oval window -->
  <ellipse cx="215" cy="133" rx="5" ry="8" fill="#D1C4E9" stroke="#6A1B9A" stroke-width="1"/>
  <text x="215" y="150" text-anchor="middle" font-size="5.5" fill="#4A148C" font-family="Arial">Овальное</text>
  <text x="215" y="158" text-anchor="middle" font-size="5.5" fill="#4A148C" font-family="Arial">окно</text>
  
  <!-- Eustachian tube (евстахиева труба) -->
  <path d="M 168 145 L 168 180 Q 168 195 178 200 L 195 210" fill="none" stroke="#8D6E63" stroke-width="2" stroke-linecap="round"/>
  <text x="180" y="215" text-anchor="middle" font-size="6" font-weight="bold" fill="#5D4037" font-family="Arial">Евстахиева</text>
  <text x="180" y="223" text-anchor="middle" font-size="6" font-weight="bold" fill="#5D4037" font-family="Arial">труба</text>
  <text x="180" y="232" text-anchor="middle" font-size="5" fill="#795548" font-family="Arial">→ носоглотка</text>
  
  <!-- Middle ear cavity -->
  <rect x="148" y="165" width="60" height="25" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="178" y="180" text-anchor="middle" font-size="5" fill="#E65100" font-family="Arial">Барабанная полость</text>

  <!-- ===== INNER EAR ===== -->
  <!-- Cochlea (улитка) - spiral -->
  <path d="M 218 140 Q 235 115 260 120 Q 285 125 290 150 Q 295 175 270 185 Q 245 195 225 175 Q 210 160 218 145 Q 225 130 245 130 Q 265 130 270 148 Q 275 165 258 170 Q 245 172 240 162 Q 238 152 248 148" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <circle cx="248" cy="148" r="3" fill="#AB47BC"/>
  
  <text x="265" y="112" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A148C" font-family="Arial">Улитка</text>
  <text x="280" y="180" font-size="5.5" fill="#6A1B9A" font-family="Arial">Кортиев</text>
  <text x="280" y="188" font-size="5.5" fill="#6A1B9A" font-family="Arial">орган</text>
  <!-- Hair cells indicator -->
  <line x1="260" y1="162" x2="278" y2="170" stroke="#6A1B9A" stroke-width="0.5"/>
  <text x="280" y="196" font-size="5" fill="#6A1B9A" font-family="Arial">(волосковые</text>
  <text x="280" y="203" font-size="5" fill="#6A1B9A" font-family="Arial">клетки)</text>
  
  <!-- Semicircular canals (полукружные каналы) -->
  <path d="M 330 90 Q 350 70 370 85 Q 385 100 370 115 Q 355 125 340 110 Q 330 100 330 90 Z" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <path d="M 380 85 Q 400 65 420 80 Q 435 95 420 115 Q 405 125 390 110 Q 380 100 380 85 Z" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <path d="M 355 70 Q 370 50 390 55 Q 405 65 400 85" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  
  <text x="385" y="140" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A148C" font-family="Arial">Полукружные</text>
  <text x="385" y="149" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A148C" font-family="Arial">каналы</text>
  
  <!-- Vestibule -->
  <ellipse cx="345" cy="130" rx="12" ry="8" fill="#D1C4E9" stroke="#7B1FA2" stroke-width="1"/>
  <text x="345" y="148" text-anchor="middle" font-size="5.5" fill="#6A1B9A" font-family="Arial">Преддверие</text>
  
  <!-- Auditory nerve -->
  <path d="M 310 155 L 340 175 L 380 185 L 430 190" fill="none" stroke="#F9A825" stroke-width="2"/>
  <path d="M 350 100 L 370 140 L 390 170 L 430 188" fill="none" stroke="#F9A825" stroke-width="1.5"/>
  <text x="445" y="185" font-size="6.5" font-weight="bold" fill="#F57F17" font-family="Arial">Слуховой</text>
  <text x="445" y="194" font-size="6.5" font-weight="bold" fill="#F57F17" font-family="Arial">нерв</text>
  
  <!-- Vestibular nerve -->
  <text x="445" y="205" font-size="6" fill="#795548" font-family="Arial">Преддверный</text>
  <text x="445" y="213" font-size="6" fill="#795548" font-family="Arial">нерв</text>

  <!-- ===== SOUND PATHWAY (bottom) ===== -->
  <rect x="15" y="262" width="470" height="30" rx="4" fill="white" fill-opacity="0.8" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="250" y="273" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial">Путь звукового сигнала</text>
  
  <text x="28" y="285" font-size="5.5" fill="#D84315" font-family="Arial">Звуковые</text>
  <text x="28" y="291" font-size="5.5" fill="#D84315" font-family="Arial">волны</text>
  <polygon points="62,285 67,288 62,291" fill="#E65100"/>
  
  <text x="72" y="288" font-size="5.5" fill="#E65100" font-family="Arial">Бараб. перепонка</text>
  <polygon points="138,285 143,288 138,291" fill="#E65100"/>
  
  <text x="148" y="288" font-size="5.5" fill="#E65100" font-family="Arial">Слуховые косточки</text>
  <polygon points="218,285 223,288 218,291" fill="#6A1B9A"/>
  
  <text x="228" y="288" font-size="5.5" fill="#6A1B9A" font-family="Arial">Овальное окно</text>
  <polygon points="290,285 295,288 290,291" fill="#6A1B9A"/>
  
  <text x="300" y="288" font-size="5.5" fill="#6A1B9A" font-family="Arial">Жидкость улитки</text>
  <polygon points="365,285 370,288 365,291" fill="#6A1B9A"/>
  
  <text x="375" y="288" font-size="5.5" fill="#6A1B9A" font-family="Arial">Волосковые клетки</text>
  <polygon points="440,285 445,288 440,291" fill="#F57F17"/>
  
  <text x="450" y="288" font-size="5.5" fill="#F57F17" font-family="Arial">→ Мозг</text>

  <!-- ===== VESTIBULAR PANEL (bottom-right) ===== -->
  <rect x="320" y="296" width="165" height="35" rx="5" fill="#F3E5F5" fill-opacity="0.6" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="402" y="308" text-anchor="middle" font-size="7" font-weight="bold" fill="#4A148C" font-family="Arial">Вестибулярный аппарат</text>
  <text x="402" y="317" text-anchor="middle" font-size="5.5" fill="#6A1B9A" font-family="Arial">Полукружные каналы → равновесие</text>
  <text x="402" y="325" text-anchor="middle" font-size="5.5" fill="#6A1B9A" font-family="Arial">Отолитовый аппарат → положение тела</text>

  <!-- ===== ANALYZER STRUCTURE (bottom-left) ===== -->
  <rect x="15" y="296" width="140" height="35" rx="5" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="85" y="308" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#1B5E20" font-family="Arial">Усиление сигнала</text>
  <text x="85" y="317" text-anchor="middle" font-size="5.5" fill="#555" font-family="Arial">Барабанная перепонка: 17×</text>
  <text x="85" y="325" text-anchor="middle" font-size="5.5" fill="#555" font-family="Arial">Слуховые косточки: 22×</text>

  <!-- Middle section info -->
  <rect x="162" y="296" width="150" height="35" rx="5" fill="white" fill-opacity="0.7" stroke="#FF8F00" stroke-width="0.8"/>
  <text x="237" y="308" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#E65100" font-family="Arial">Частоты слуха</text>
  <text x="237" y="317" text-anchor="middle" font-size="5.5" fill="#555" font-family="Arial">Диапазон: 20 Гц — 20 000 Гц</text>
  <text x="237" y="325" text-anchor="middle" font-size="5.5" fill="#555" font-family="Arial">Наибольшая чувствительность: 1-4 кГц</text>

  <!-- Footer bar -->
  <rect x="0" y="338" width="500" height="12" rx="0" fill="#2E7D32"/>
  <text x="250" y="347" text-anchor="middle" font-size="7" fill="white" font-family="Arial">Слуховой анализатор: рецепторы улитки → слуховой нерв → височная доля коры</text>
</svg>