<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="innateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BBDEFB"/>
      <stop offset="100%" stop-color="#64B5F6"/>
    </linearGradient>
    <linearGradient id="acquiredGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE0B2"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial">Врождённые и приобретённые формы поведения</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 45</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== LEFT: INNATE BEHAVIOR ===== -->
  <rect x="15" y="48" width="230" height="135" rx="5" fill="url(#innateGrad)" fill-opacity="0.25" stroke="#1565C0" stroke-width="0.8"/>
  <text x="130" y="60" text-anchor="middle" font-size="8" font-weight="bold" fill="#0D47A1" font-family="Arial">ВРОЖДЁННОЕ (безусловные рефлексы)</text>
  
  <!-- Reflex types boxes -->
  <rect x="22" y="66" width="105" height="24" rx="3" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.6"/>
  <text x="74" y="76" text-anchor="middle" font-size="6" font-weight="bold" fill="#0D47A1" font-family="Arial">Пищевой</text>
  <text x="74" y="84" text-anchor="middle" font-size="5" fill="#1565C0" font-family="Arial">слюноотделение, глотание</text>
  
  <rect x="132" y="66" width="105" height="24" rx="3" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.6"/>
  <text x="184" y="76" text-anchor="middle" font-size="6" font-weight="bold" fill="#0D47A1" font-family="Arial">Оборонительный</text>
  <text x="184" y="84" text-anchor="middle" font-size="5" fill="#1565C0" font-family="Arial">отдёргивание руки</text>
  
  <rect x="22" y="94" width="105" height="24" rx="3" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.6"/>
  <text x="74" y="104" text-anchor="middle" font-size="6" font-weight="bold" fill="#0D47A1" font-family="Arial">Ориентировочный</text>
  <text x="74" y="112" text-anchor="middle" font-size="5" fill="#1565C0" font-family="Arial">поворот головы на звук</text>
  
  <rect x="132" y="94" width="105" height="24" rx="3" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.6"/>
  <text x="184" y="104" text-anchor="middle" font-size="6" font-weight="bold" fill="#0D47A1" font-family="Arial">Половой</text>
  <text x="184" y="112" text-anchor="middle" font-size="5" fill="#1565C0" font-family="Arial">инстинкт размножения</text>

  <!-- Reflex arc diagram -->
  <rect x="22" y="122" width="215" height="55" rx="3" fill="white" fill-opacity="0.8" stroke="#1565C0" stroke-width="0.6"/>
  <text x="130" y="132" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#0D47A1" font-family="Arial">Рефлекторная дуга</text>
  
  <!-- Arc components -->
  <rect x="28" y="138" width="38" height="18" rx="8" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="47" y="150" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#1B5E20" font-family="Arial">Рецептор</text>
  
  <polygon points="69,147 74,144 74,150" fill="#1565C0"/>
  
  <rect x="77" y="138" width="38" height="18" rx="8" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="96" y="150" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#F57F17" font-family="Arial">Нейрон</text>
  
  <polygon points="118,147 123,144 123,150" fill="#1565C0"/>
  
  <rect x="126" y="138" width="48" height="18" rx="8" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8"/>
  <text x="150" y="150" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#C62828" font-family="Arial">Спинной мозг</text>
  
  <polygon points="177,147 182,144 182,150" fill="#1565C0"/>
  
  <rect x="185" y="138" width="46" height="18" rx="8" fill="#FFE0B2" stroke="#E65100" stroke-width="0.8"/>
  <text x="208" y="150" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#E65100" font-family="Arial">Эффектор</text>
  
  <!-- Labels below arc -->
  <text x="47" y="164" text-anchor="middle" font-size="4.5" fill="#555" font-family="Arial">раздражитель</text>
  <text x="96" y="164" text-anchor="middle" font-size="4.5" fill="#555" font-family="Arial">чувствительный</text>
  <text x="150" y="164" text-anchor="middle" font-size="4.5" fill="#555" font-family="Arial">нервный центр</text>
  <text x="208" y="164" text-anchor="middle" font-size="4.5" fill="#555" font-family="Arial">мышца/железа</text>
  
  <!-- Arc flow label -->
  <text x="47" y="173" text-anchor="middle" font-size="4.5" fill="#555" font-family="Arial">(5 звеньев)</text>

  <!-- ===== RIGHT: ACQUIRED BEHAVIOR ===== -->
  <rect x="250" y="48" width="235" height="135" rx="5" fill="url(#acquiredGrad)" fill-opacity="0.25" stroke="#E65100" stroke-width="0.8"/>
  <text x="367" y="60" text-anchor="middle" font-size="8" font-weight="bold" fill="#BF360C" font-family="Arial">ПРИОБРЕТЁННОЕ (условные рефлексы)</text>
  
  <!-- Pavlov's experiment -->
  <rect x="257" y="66" width="220" height="55" rx="3" fill="white" fill-opacity="0.8" stroke="#E65100" stroke-width="0.6"/>
  <text x="367" y="76" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#E65100" font-family="Arial">Опыт И.П. Павлова</text>
  
  <!-- Bell icon -->
  <path d="M 278 84 Q 278 80 282 80 Q 286 80 286 84 L 286 90 L 278 90 Z" fill="#FFB74D" stroke="#E65100" stroke-width="0.8"/>
  <line x1="282" y1="90" x2="280" y2="93" stroke="#E65100" stroke-width="1"/>
  <line x1="282" y1="90" x2="284" y2="93" stroke="#E65100" stroke-width="1"/>
  <text x="282" y="100" text-anchor="middle" font-size="5" fill="#E65100" font-family="Arial">Звонок</text>
  <text x="282" y="106" text-anchor="middle" font-size="4.5" fill="#888" font-family="Arial">(нейтральный)</text>
  
  <!-- Plus sign -->
  <text x="310" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#333" font-family="Arial">+</text>
  
  <!-- Food icon -->
  <rect x="320" y="82" rx="2" width="16" height="12" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="328" y="100" text-anchor="middle" font-size="5" fill="#2E7D32" font-family="Arial">Еда</text>
  <text x="328" y="106" text-anchor="middle" font-size="4.5" fill="#888" font-family="Arial">(безусловн.)</text>
  
  <!-- Arrow -->
  <polygon points="348,88 356,85 356,91" fill="#E65100"/>
  
  <!-- Result -->
  <rect x="358" y="80" width="60" height="18" rx="3" fill="#FFCDD2" stroke="#C62828" stroke-width="0.6"/>
  <text x="388" y="92" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#C62828" font-family="Arial">Слюна</text>
  
  <!-- Phase 2: After conditioning -->
  <text x="367" y="113" text-anchor="middle" font-size="5" fill="#E65100" font-family="Arial">После выработки: Звонок → Слюноотделение</text>
  <text x="367" y="120" text-anchor="middle" font-size="5" fill="#BF360C" font-family="Arial">(условный стимул → условная реакция)</text>
  
  <!-- Properties of conditioned reflexes -->
  <rect x="257" y="124" width="220" height="55" rx="3" fill="white" fill-opacity="0.7" stroke="#E65100" stroke-width="0.5"/>
  <text x="367" y="134" text-anchor="middle" font-size="6" font-weight="bold" fill="#BF360C" font-family="Arial">Свойства условных рефлексов</text>
  <text x="263" y="144" font-size="5.5" fill="#333" font-family="Arial">• Приобретаются при жизни, индивидуальны</text>
  <text x="263" y="152" font-size="5.5" fill="#333" font-family="Arial">• Образуются на основе безусловных</text>
  <text x="263" y="160" font-size="5.5" fill="#333" font-family="Arial">• Нуждаются в подкреплении, иначе угасают</text>
  <text x="263" y="168" font-size="5.5" fill="#333" font-family="Arial">• Замыкание в коре больших полушарий</text>

  <!-- ===== COMPARISON TABLE (center) ===== -->
  <rect x="15" y="188" width="470" height="82" rx="5" fill="white" fill-opacity="0.85" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="250" y="200" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#1B5E20" font-family="Arial">Сравнение: Инстинкты vs Условные рефлексы</text>
  <line x1="15" y1="204" x2="485" y2="204" stroke="#2E7D32" stroke-width="0.4"/>
  
  <!-- Table headers -->
  <text x="100" y="213" text-anchor="middle" font-size="6" font-weight="bold" fill="#0D47A1" font-family="Arial">Признак</text>
  <text x="255" y="213" text-anchor="middle" font-size="6" font-weight="bold" fill="#0D47A1" font-family="Arial">Безусловные рефлексы</text>
  <text x="415" y="213" text-anchor="middle" font-size="6" font-weight="bold" fill="#BF360C" font-family="Arial">Условные рефлексы</text>
  <line x1="15" y1="216" x2="485" y2="216" stroke="#2E7D32" stroke-width="0.3"/>
  
  <!-- Table rows -->
  <text x="25" y="225" font-size="5.5" fill="#333" font-family="Arial">Происхождение</text>
  <text x="170" y="225" font-size="5.5" fill="#333" font-family="Arial">Врождённые</text>
  <text x="330" y="225" font-size="5.5" fill="#333" font-family="Arial">Приобретённые при жизни</text>
  
  <line x1="15" y1="228" x2="485" y2="228" stroke="#2E7D32" stroke-width="0.2"/>
  <text x="25" y="235" font-size="5.5" fill="#333" font-family="Arial">Наследование</text>
  <text x="170" y="235" font-size="5.5" fill="#333" font-family="Arial">Передаются по наследству</text>
  <text x="330" y="235" font-size="5.5" fill="#333" font-family="Arial">Не передаются по наследству</text>
  
  <line x1="15" y1="238" x2="485" y2="238" stroke="#2E7D32" stroke-width="0.2"/>
  <text x="25" y="245" font-size="5.5" fill="#333" font-family="Arial">Нервный центр</text>
  <text x="170" y="245" font-size="5.5" fill="#333" font-family="Arial">Спинной мозг, ствол мозга</text>
  <text x="330" y="245" font-size="5.5" fill="#333" font-family="Arial">Кора больших полушарий</text>
  
  <line x1="15" y1="248" x2="485" y2="248" stroke="#2E7D32" stroke-width="0.2"/>
  <text x="25" y="255" font-size="5.5" fill="#333" font-family="Arial">Постоянство</text>
  <text x="170" y="255" font-size="5.5" fill="#333" font-family="Arial">Постоянные, не угасают</text>
  <text x="330" y="255" font-size="5.5" fill="#333" font-family="Arial">Временные, могут угасать</text>
  
  <line x1="15" y1="258" x2="485" y2="258" stroke="#2E7D32" stroke-width="0.2"/>
  <text x="25" y="265" font-size="5.5" fill="#333" font-family="Arial">Вид поведения</text>
  <text x="170" y="265" font-size="5.5" fill="#333" font-family="Arial">Одинаковое у всех особей вида</text>
  <text x="330" y="265" font-size="5.5" fill="#333" font-family="Arial">Индивидуальное, приспособительное</text>

  <!-- Column dividers -->
  <line x1="155" y1="205" x2="155" y2="268" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="315" y1="205" x2="315" y2="268" stroke="#2E7D32" stroke-width="0.3"/>

  <!-- ===== INHIBITION PANEL (bottom) ===== -->
  <rect x="15" y="275" width="470" height="58" rx="5" fill="white" fill-opacity="0.8" stroke="#7B1FA2" stroke-width="0.8"/>
  <text x="250" y="287" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#4A148C" font-family="Arial">Торможение условных рефлексов</text>
  
  <!-- External inhibition -->
  <rect x="22" y="292" width="220" height="35" rx="4" fill="#E8EAF6" fill-opacity="0.5" stroke="#3949AB" stroke-width="0.5"/>
  <text x="132" y="303" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#1A237E" font-family="Arial">Внешнее торможение</text>
  <text x="132" y="312" text-anchor="middle" font-size="5.5" fill="#3949AB" font-family="Arial">Новый сильный раздражитель подавляет</text>
  <text x="132" y="320" text-anchor="middle" font-size="5.5" fill="#3949AB" font-family="Arial">условный рефлекс (резкий звук → внимание)</text>
  
  <!-- Internal inhibition -->
  <rect x="250" y="292" width="228" height="35" rx="4" fill="#FCE4EC" fill-opacity="0.5" stroke="#AD1457" stroke-width="0.5"/>
  <text x="364" y="303" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#880E4F" font-family="Arial">Внутреннее (угасательное) торможение</text>
  <text x="364" y="312" text-anchor="middle" font-size="5.5" fill="#AD1457" font-family="Arial">Условный рефлекс угасает без подкрепления</text>
  <text x="364" y="320" text-anchor="middle" font-size="5.5" fill="#AD1457" font-family="Arial">(звонок без еды → слюна больше не выделяется)</text>

  <!-- Footer bar -->
  <rect x="0" y="338" width="500" height="12" rx="0" fill="#2E7D32"/>
  <text x="250" y="347" text-anchor="middle" font-size="7" fill="white" font-family="Arial">Безусловные рефлексы — врождённые | Условные рефлексы — приобретённые при жизни</text>
</svg>