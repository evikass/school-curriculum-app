<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение и виды костей. Рост костей</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 11</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Main illustration: Cross-section of long bone (Трубчатая кость) -->
<g transform="translate(170,195)">
  <!-- Bone outline - long bone shape -->
  <!-- Diaphysis (shaft) - main cylinder -->
  <rect x="-18" y="-70" width="36" height="120" rx="2" fill="#FFF8E1" stroke="#795548" stroke-width="1.5"/>
  <!-- Proximal epiphysis (top) -->
  <ellipse cx="0" cy="-75" rx="30" ry="20" fill="#FFF8E1" stroke="#795548" stroke-width="1.5"/>
  <!-- Distal epiphysis (bottom) -->
  <ellipse cx="0" cy="55" rx="28" ry="18" fill="#FFF8E1" stroke="#795548" stroke-width="1.5"/>

  <!-- Periosteum (Надкостница) - outer layer -->
  <rect x="-20" y="-70" width="40" height="120" rx="2" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="2,1"/>
  <ellipse cx="0" cy="-75" rx="32" ry="22" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="2,1"/>
  <ellipse cx="0" cy="55" rx="30" ry="20" fill="none" stroke="#E65100" stroke-width="1" stroke-dasharray="2,1"/>

  <!-- Compact bone (Компактное вещество) in shaft -->
  <rect x="-14" y="-68" width="28" height="116" rx="1" fill="#FFECB3" stroke="#A1887F" stroke-width="0.5"/>

  <!-- Spongy bone (Губчатое вещество) in epiphyses -->
  <!-- Top epiphysis spongy -->
  <g opacity="0.6">
    <line x1="-15" y1="-80" x2="-5" y2="-70" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="-10" y1="-85" x2="0" y2="-72" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="0" y1="-88" x2="8" y2="-75" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="10" y1="-82" x2="15" y2="-70" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="-20" y1="-75" x2="-8" y2="-68" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="18" y1="-72" x2="10" y2="-65" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="-12" y1="-70" x2="5" y2="-65" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="-5" y1="-78" x2="12" y2="-68" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="5" y1="-82" x2="-3" y2="-70" stroke="#8D6E63" stroke-width="0.5"/>
  </g>
  <!-- Bottom epiphysis spongy -->
  <g opacity="0.6">
    <line x1="-14" y1="45" x2="-3" y2="55" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="-8" y1="40" x2="5" y2="52" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="3" y1="38" x2="14" y2="50" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="-18" y1="50" x2="-5" y2="58" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="15" y1="48" x2="5" y2="60" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="-10" y1="55" x2="8" y2="62" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="0" y1="42" x2="10" y2="55" stroke="#8D6E63" stroke-width="0.5"/>
  </g>

  <!-- Medullary cavity (Костномозговая полость) -->
  <rect x="-8" y="-55" width="16" height="90" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Yellow marrow -->
  <ellipse cx="0" cy="-20" rx="6" ry="20" fill="#FFD54F" opacity="0.5"/>
  <!-- Red marrow in epiphyses -->
  <ellipse cx="0" cy="-78" rx="12" ry="8" fill="#EF9A9A" opacity="0.4"/>
  <ellipse cx="0" cy="52" rx="10" ry="7" fill="#EF9A9A" opacity="0.4"/>

  <!-- Epiphyseal plate (зона роста) -->
  <rect x="-14" y="-65" width="28" height="4" rx="1" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <rect x="-14" y="42" width="28" height="4" rx="1" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>

  <!-- Labels with lines -->
  <!-- Надкостница -->
  <line x1="22" y1="-40" x2="50" y2="-40" stroke="#E65100" stroke-width="0.7"/>
  <text x="52" y="-38" font-family="Arial,sans-serif" font-size="7" fill="#E65100" font-weight="bold">Надкостница</text>

  <!-- Компактное вещество -->
  <line x1="15" y1="-10" x2="50" y2="-15" stroke="#795548" stroke-width="0.7"/>
  <text x="52" y="-13" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" font-weight="bold">Компактное</text>
  <text x="52" y="-5" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" font-weight="bold">вещество</text>

  <!-- Костномозговая полость -->
  <line x1="8" y1="-20" x2="50" y2="5" stroke="#F9A825" stroke-width="0.7"/>
  <text x="52" y="7" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" font-weight="bold">Костномозговая</text>
  <text x="52" y="15" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" font-weight="bold">полость</text>

  <!-- Губчатое вещество -->
  <line x1="15" y1="-75" x2="50" y2="-65" stroke="#8D6E63" stroke-width="0.7"/>
  <text x="52" y="-63" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" font-weight="bold">Губчатое</text>
  <text x="52" y="-55" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" font-weight="bold">вещество</text>

  <!-- Диафиз -->
  <line x1="-20" y1="-40" x2="-55" y2="-50" stroke="#37474F" stroke-width="0.7"/>
  <text x="-95" y="-48" font-family="Arial,sans-serif" font-size="7" fill="#37474F" font-weight="bold">Диафиз</text>

  <!-- Эпифиз (top) -->
  <line x1="-20" y1="-82" x2="-55" y2="-88" stroke="#37474F" stroke-width="0.7"/>
  <text x="-80" y="-86" font-family="Arial,sans-serif" font-size="7" fill="#37474F" font-weight="bold">Эпифиз</text>

  <!-- Эпифиз (bottom) -->
  <line x1="-20" y1="60" x2="-55" y2="65" stroke="#37474F" stroke-width="0.7"/>
  <text x="-80" y="67" font-family="Arial,sans-serif" font-size="7" fill="#37474F" font-weight="bold">Эпифиз</text>

  <!-- Метафиз -->
  <line x1="-15" y1="-62" x2="-55" y2="-70" stroke="#37474F" stroke-width="0.7"/>
  <text x="-85" y="-68" font-family="Arial,sans-serif" font-size="7" fill="#37474F" font-weight="bold">Метафиз</text>

  <!-- Зона роста label -->
  <line x1="14" y1="-63" x2="50" y2="-46" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="52" y="-44" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Зона роста</text>

  <!-- Жёлтый мозг -->
  <text x="-6" y="-18" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">Жёлтый</text>
  <text x="-5" y="-12" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">мозг</text>

  <!-- Красный мозг -->
  <text x="-8" y="-76" font-family="Arial,sans-serif" font-size="4.5" fill="#C62828">Красный</text>
  <text x="-7" y="-71" font-family="Arial,sans-serif" font-size="4.5" fill="#C62828">мозг</text>
</g>

<!-- Osteon detail (inset) -->
<g transform="translate(100,100)">
  <rect x="-38" y="-30" width="76" height="60" rx="4" fill="white" opacity="0.9" stroke="#795548" stroke-width="1"/>
  <text x="0" y="-20" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle" font-weight="bold">Остеон</text>
  <!-- Concentric rings -->
  <circle cx="0" cy="8" r="20" fill="none" stroke="#A1887F" stroke-width="1"/>
  <circle cx="0" cy="8" r="15" fill="none" stroke="#A1887F" stroke-width="1"/>
  <circle cx="0" cy="8" r="10" fill="none" stroke="#A1887F" stroke-width="1"/>
  <circle cx="0" cy="8" r="5" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <!-- Lacunae dots -->
  <circle cx="12" cy="0" r="1.5" fill="#5D4037"/>
  <circle cx="-12" cy="16" r="1.5" fill="#5D4037"/>
  <circle cx="17" cy="12" r="1.5" fill="#5D4037"/>
  <circle cx="-8" cy="-5" r="1.5" fill="#5D4037"/>
  <circle cx="5" cy="20" r="1.5" fill="#5D4037"/>
  <circle cx="-17" cy="2" r="1.5" fill="#5D4037"/>
  <text x="0" y="11" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle">Канал</text>
  <text x="0" y="16" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle">Гаверса</text>
  <text x="0" y="28" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">Лакуны • Канальцы</text>
</g>

<!-- Side panel: 4 bone types -->
<g transform="translate(380,105)">
  <rect x="-55" y="-45" width="110" height="175" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <rect x="-55" y="-45" width="110" height="18" rx="5" fill="#2E7D32" opacity="0.85"/>
  <rect x="-55" y="-33" width="110" height="6" fill="#2E7D32" opacity="0.85"/>
  <text x="0" y="-31" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Виды костей</text>

  <!-- 1. Трубчатые (Long bones) -->
  <g transform="translate(0,-15)">
    <rect x="-45" y="-4" width="90" height="32" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
    <!-- Mini long bone -->
    <ellipse cx="-28" cy="10" rx="8" ry="5" fill="#FFF8E1" stroke="#795548" stroke-width="0.8"/>
    <rect x="-32" y="5" width="8" height="10" fill="#FFF8E1" stroke="#795548" stroke-width="0.8"/>
    <ellipse cx="-28" cy="16" rx="7" ry="4" fill="#FFF8E1" stroke="#795548" stroke-width="0.8"/>
    <text x="10" y="7" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Трубчатые</text>
    <text x="10" y="15" font-family="Arial,sans-serif" font-size="5" fill="#555">Плечевая, бедренная</text>
    <text x="10" y="22" font-family="Arial,sans-serif" font-size="5" fill="#555">Длинные, цилиндр.</text>
  </g>

  <!-- 2. Губчатые (Spongy bones) -->
  <g transform="translate(0,28)">
    <rect x="-45" y="-4" width="90" height="32" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
    <!-- Mini spongy bone -->
    <rect x="-35" y="2" width="14" height="18" rx="3" fill="#FFF8E1" stroke="#795548" stroke-width="0.8"/>
    <line x1="-34" y1="6" x2="-23" y2="10" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="-33" y1="12" x2="-22" y2="8" stroke="#8D6E63" stroke-width="0.5"/>
    <line x1="-34" y1="16" x2="-23" y2="14" stroke="#8D6E63" stroke-width="0.5"/>
    <text x="10" y="7" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Губчатые</text>
    <text x="10" y="15" font-family="Arial,sans-serif" font-size="5" fill="#555">Позвонки, запястья</text>
    <text x="10" y="22" font-family="Arial,sans-serif" font-size="5" fill="#555">Короткие, пористые</text>
  </g>

  <!-- 3. Плоские (Flat bones) -->
  <g transform="translate(0,71)">
    <rect x="-45" y="-4" width="90" height="32" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
    <!-- Mini flat bone -->
    <ellipse cx="-28" cy="11" rx="12" ry="8" fill="#FFF8E1" stroke="#795548" stroke-width="0.8"/>
    <line x1="-38" y1="11" x2="-18" y2="11" stroke="#8D6E63" stroke-width="0.5"/>
    <text x="10" y="7" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Плоские</text>
    <text x="10" y="15" font-family="Arial,sans-serif" font-size="5" fill="#555">Череп, рёбра, лопатка</text>
    <text x="10" y="22" font-family="Arial,sans-serif" font-size="5" fill="#555">Тонкие, широкие</text>
  </g>

  <!-- 4. Смешанные (Mixed bones) -->
  <g transform="translate(0,114)">
    <rect x="-45" y="-4" width="90" height="32" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
    <!-- Mini mixed bone -->
    <path d="M-35,5 Q-30,2 -25,5 Q-20,8 -22,14 Q-25,18 -30,16 Q-35,14 -35,5Z" fill="#FFF8E1" stroke="#795548" stroke-width="0.8"/>
    <text x="10" y="7" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" font-weight="bold">Смешанные</text>
    <text x="10" y="15" font-family="Arial,sans-serif" font-size="5" fill="#555">Позвонки, клиновидная</text>
    <text x="10" y="22" font-family="Arial,sans-serif" font-size="5" fill="#555">Сложная форма</text>
  </g>
</g>

<!-- Bottom panel: Bone growth zones -->
<g transform="translate(30,295)">
  <rect x="0" y="0" width="280" height="42" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <text x="140" y="13" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Рост кости (эпифизарная пластинка)</text>
  <line x1="10" y1="18" x2="270" y2="18" stroke="#A5D6A7" stroke-width="0.5"/>

  <!-- Growth zone sequence -->
  <g transform="translate(30,30)">
    <rect x="-20" y="-5" width="38" height="12" rx="2" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.5"/>
    <text x="-1" y="4" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">Покоя</text>
  </g>
  <g transform="translate(82,30)">
    <rect x="-22" y="-5" width="42" height="12" rx="2" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
    <text x="-1" y="4" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">Размножения</text>
  </g>
  <g transform="translate(145,30)">
    <rect x="-24" y="-5" width="46" height="12" rx="2" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
    <text x="-1" y="4" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">Преобразования</text>
  </g>
  <g transform="translate(215,30)">
    <rect x="-20" y="-5" width="38" height="12" rx="2" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
    <text x="-1" y="4" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">Окостенения</text>
  </g>

  <!-- Arrow -->
  <line x1="48" y1="30" x2="60" y2="30" stroke="#2E7D32" stroke-width="1" marker-end="none"/>
  <line x1="104" y1="30" x2="121" y2="30" stroke="#2E7D32" stroke-width="1"/>
  <line x1="170" y1="30" x2="193" y2="30" stroke="#2E7D32" stroke-width="1"/>
</g>

<!-- Key info box -->
<g transform="translate(320,295)">
  <rect x="0" y="0" width="155" height="42" rx="5" fill="white" opacity="0.92" stroke="#2E7D32" stroke-width="1"/>
  <text x="78" y="13" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Ключевые факты</text>
  <line x1="8" y1="18" x2="147" y2="18" stroke="#A5D6A7" stroke-width="0.5"/>
  <text x="78" y="28" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Рост в длину — эпифизарная зона</text>
  <text x="78" y="37" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Рост в толщину — надкостница</text>
</g>

<rect x="10" y="340" width="480" height="8" rx="4" fill="#2E7D32" opacity="0.85"/>
</svg>