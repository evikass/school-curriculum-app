<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="cortexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF9A9A"/>
      <stop offset="100%" style="stop-color:#E57373"/>
    </linearGradient>
    <linearGradient id="medullaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CE93D8"/>
      <stop offset="100%" style="stop-color:#BA68C8"/>
    </linearGradient>
    <linearGradient id="pelvisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF9C4"/>
      <stop offset="100%" style="stop-color:#FFF176"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial">Строение и работа почек</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 33</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- KIDNEY CROSS-SECTION (left side) -->
  <text x="120" y="58" text-anchor="middle" font-size="8" font-weight="bold" fill="#C62828" font-family="Arial">ПОПЕРЕЧНЫЙ СРЕЗ ПОЧКИ</text>

  <!-- Kidney bean shape -->
  <path d="M60,75 Q30,120 35,180 Q40,240 90,260 Q120,268 140,250 Q165,230 160,180 Q155,120 130,80 Q110,62 60,75 Z" fill="#FFCDD2" stroke="#C62828" stroke-width="1.5"/>

  <!-- Cortex (outer layer) -->
  <path d="M65,82 Q42,120 46,178 Q50,232 92,252 Q115,258 133,244 Q155,226 152,180 Q148,125 125,88 Q108,72 65,82 Z" fill="url(#cortexGrad)" stroke="#C62828" stroke-width="0" opacity="0.6"/>

  <!-- Medulla (inner) with pyramids -->
  <path d="M75,100 Q58,135 60,178 Q62,218 95,238 Q110,244 125,232 Q145,216 142,178 Q139,140 120,108 Q105,92 75,100 Z" fill="url(#medullaGrad)" stroke="#7B1FA2" stroke-width="0.5" opacity="0.6"/>

  <!-- Renal pyramids -->
  <path d="M80,115 L95,200 L72,200 Z" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.5" opacity="0.8"/>
  <path d="M100,110 L115,200 L92,200 Z" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.5" opacity="0.8"/>
  <path d="M118,118 L128,200 L108,200 Z" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.5" opacity="0.8"/>

  <!-- Renal pelvis -->
  <path d="M70,210 Q95,220 130,215 Q140,230 135,248 Q100,270 65,255 Q55,240 70,210 Z" fill="url(#pelvisGrad)" stroke="#F9A825" stroke-width="1" opacity="0.8"/>

  <!-- Ureter -->
  <rect x="92" y="258" width="12" height="30" rx="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <path d="M98,288 L98,300" stroke="#F9A825" stroke-width="1" stroke-dasharray="2,1"/>

  <!-- Labels for kidney cross-section -->
  <text x="135" y="96" font-size="6" font-weight="bold" fill="#C62828" font-family="Arial">Корковое</text>
  <text x="135" y="104" font-size="6" font-weight="bold" fill="#C62828" font-family="Arial">вещество</text>
  <line x1="132" y1="98" x2="125" y2="98" stroke="#C62828" stroke-width="0.5"/>

  <text x="140" y="160" font-size="6" font-weight="bold" fill="#7B1FA2" font-family="Arial">Мозговое</text>
  <text x="140" y="168" font-size="6" font-weight="bold" fill="#7B1FA2" font-family="Arial">вещество</text>
  <text x="140" y="178" font-size="5" fill="#7B1FA2" font-family="Arial">(пирамиды)</text>

  <text x="55" y="242" font-size="6" font-weight="bold" fill="#F57F17" font-family="Arial">Почечная</text>
  <text x="55" y="250" font-size="6" font-weight="bold" fill="#F57F17" font-family="Arial">лоханка</text>

  <text x="108" y="290" font-size="6" font-weight="bold" fill="#F57F17" font-family="Arial">Мочеточник</text>

  <!-- Blood vessels -->
  <line x1="60" y1="75" x2="50" y2="65" stroke="#C62828" stroke-width="1.5"/>
  <text x="18" y="64" font-size="5.5" font-weight="bold" fill="#C62828" font-family="Arial">Почечная артерия</text>
  <line x1="55" y1="80" x2="42" y2="73" stroke="#1565C0" stroke-width="1.2"/>
  <text x="10" y="78" font-size="5.5" font-weight="bold" fill="#1565C0" font-family="Arial">Почечная вена</text>

  <!-- NEPHRON DIAGRAM (right side) -->
  <rect x="185" y="50" width="300" height="200" rx="5" fill="#FFFFFF" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>
  <text x="335" y="64" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial">НЕФРОН — структурно-функциональная единица</text>

  <!-- Bowman's capsule -->
  <ellipse cx="240" cy="105" rx="28" ry="22" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <ellipse cx="240" cy="105" rx="22" ry="16" fill="none" stroke="#C62828" stroke-width="0.5"/>
  <!-- Glomerulus inside -->
  <path d="M228,98 Q235,90 242,98 Q249,106 240,108 Q231,106 234,98" fill="#E53935" stroke="#C62828" stroke-width="0.6"/>
  <path d="M236,100 Q242,94 248,100 Q244,106 238,104" fill="#EF5350" stroke="#C62828" stroke-width="0.4"/>
  <path d="M232,104 Q238,98 244,104" fill="none" stroke="#C62828" stroke-width="0.5"/>

  <!-- Labels for Bowman's capsule -->
  <text x="240" y="80" text-anchor="middle" font-size="6" font-weight="bold" fill="#C62828" font-family="Arial">Почечное тельце</text>
  <text x="240" y="87" text-anchor="middle" font-size="5" fill="#C62828" font-family="Arial">(капсула Боумена + клубочек)</text>
  <!-- Afferent/efferent arterioles -->
  <line x1="210" y1="105" x2="195" y2="105" stroke="#C62828" stroke-width="1"/>
  <text x="188" y="103" font-size="5" fill="#C62828" font-family="Arial">Приносящая</text>
  <text x="188" y="110" font-size="5" fill="#C62828" font-family="Arial">артериола</text>
  <line x1="268" y1="100" x2="280" y2="95" stroke="#C62828" stroke-width="0.8"/>
  <text x="275" y="90" font-size="5" fill="#C62828" font-family="Arial">Выносящая</text>
  <text x="275" y="97" font-size="5" fill="#C62828" font-family="Arial">артериола</text>

  <!-- Proximal tubule -->
  <path d="M268,115 Q290,118 295,130 Q298,140 285,145 Q270,148 275,155 Q280,162 290,160" fill="none" stroke="#7B1FA2" stroke-width="2"/>
  <text x="300" y="135" font-size="6" font-weight="bold" fill="#7B1FA2" font-family="Arial">Извитой</text>
  <text x="300" y="143" font-size="6" font-weight="bold" fill="#7B1FA2" font-family="Arial">каналец I</text>

  <!-- Henle's loop -->
  <path d="M290,160 Q295,175 290,195 Q285,215 270,225 Q255,235 250,220 Q245,205 248,190" fill="none" stroke="#1565C0" stroke-width="2"/>
  <!-- Loop labels -->
  <text x="295" y="190" font-size="6" font-weight="bold" fill="#1565C0" font-family="Arial">Петля</text>
  <text x="295" y="198" font-size="6" font-weight="bold" fill="#1565C0" font-family="Arial">Генле</text>
  <!-- Descending limb -->
  <text x="255" y="215" font-size="5" fill="#1565C0" font-family="Arial">Нисходящая</text>
  <!-- Ascending limb -->
  <text x="255" y="225" font-size="5" fill="#1565C0" font-family="Arial">Восходящая</text>

  <!-- Distal tubule -->
  <path d="M248,185 Q240,178 235,170 Q230,162 240,158 Q250,155 245,148" fill="none" stroke="#00897B" stroke-width="2"/>
  <text x="210" y="168" font-size="6" font-weight="bold" fill="#00897B" font-family="Arial">Дистальный</text>
  <text x="210" y="176" font-size="6" font-weight="bold" fill="#00897B" font-family="Arial">каналец</text>

  <!-- Collecting duct -->
  <path d="M245,148 Q240,140 238,130 Q235,120 232,130 Q230,140 228,145 Q225,155 220,162 Q215,170 210,180 Q205,195 200,210 Q195,225 190,240" fill="none" stroke="#F57F17" stroke-width="2.5"/>
  <text x="188" y="180" font-size="6" font-weight="bold" fill="#F57F17" font-family="Arial">Собирательная</text>
  <text x="188" y="188" font-size="6" font-weight="bold" fill="#F57F17" font-family="Arial">трубка</text>
  <text x="188" y="245" font-size="5" fill="#F57F17" font-family="Arial">→ Моча</text>

  <!-- Process labels at bottom right -->
  <rect x="340" y="80" width="140" height="160" rx="4" fill="#FAFAFA" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="410" y="95" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial">ПРОЦЕССЫ В НЕФРОНЕ</text>
  <line x1="350" y1="100" x2="470" y2="100" stroke="#2E7D32" stroke-width="0.4"/>

  <!-- Filtration -->
  <rect x="348" y="106" width="124" height="35" rx="3" fill="#FFEBEE" stroke="#C62828" stroke-width="0.5"/>
  <text x="410" y="118" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#C62828" font-family="Arial">1. ФИЛЬТРАЦИЯ</text>
  <text x="410" y="128" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Клубочек → Капсула Боумена</text>
  <text x="410" y="137" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Образование первичной мочи (~150 л/сут)</text>

  <!-- Reabsorption -->
  <rect x="348" y="146" width="124" height="40" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="410" y="158" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#2E7D32" font-family="Arial">2. РЕАБСОРБЦИЯ</text>
  <text x="410" y="168" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Канальцы → Кровь</text>
  <text x="410" y="177" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Возврат воды, глюкозы, аминокислот</text>
  <text x="410" y="184" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Вторичная моча (~1.5 л/сут)</text>

  <!-- Secretion -->
  <rect x="348" y="190" width="124" height="30" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
  <text x="410" y="202" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#1565C0" font-family="Arial">3. СЕКРЕЦИЯ</text>
  <text x="410" y="212" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Кровь → Канальцы (ионы, лекарств.)</text>

  <!-- Kidney key stats -->
  <rect x="15" y="300" width="470" height="20" rx="3" fill="#FFFFFF" stroke="#2E7D32" stroke-width="0.5" opacity="0.8"/>
  <text x="250" y="314" text-anchor="middle" font-size="6" fill="#333" font-family="Arial">Масса почки: ~150 г | Нефронов: ~1 млн | Кровоток: 1.2 л/мин | Первичная моча: 150 л/сут → Вторичная: 1.5 л/сут</text>

  <!-- Footer -->
  <rect x="0" y="330" width="500" height="20" rx="0" fill="#2E7D32"/>
  <text x="250" y="343" text-anchor="middle" font-size="8" fill="white" font-family="Arial">Почка — главный орган выделения | Нефрон — функциональная единица почки</text>
</svg>