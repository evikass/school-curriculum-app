<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="venousBlood" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5C6BC0"/><stop offset="100%" stop-color="#283593"/></linearGradient>
<linearGradient id="arterialBlood" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#EF5350"/><stop offset="100%" stop-color="#B71C1C"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Строение и работа сердца</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 17</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Heart cross-section (anatomical orientation: right side on viewer's left) -->
<g transform="translate(160,190)">
  <!-- Heart outer wall (myocardium) -->
  <path d="M0,-75 C-30,-80 -80,-55 -80,-15 C-80,20 -50,55 0,80 C50,55 80,20 80,-15 C80,-55 30,-80 0,-75 Z" fill="#FFCDD2" stroke="#C62828" stroke-width="2"/>

  <!-- Septum (divider) -->
  <line x1="0" y1="-55" x2="0" y2="60" stroke="#C62828" stroke-width="2.5"/>

  <!-- Right atrium (venous - blue) -->
  <path d="M-5,-50 C-20,-55 -60,-40 -60,-15 C-60,0 -40,10 -5,-5 Z" fill="#9FA8DA" stroke="#283593" stroke-width="1.5"/>
  <text x="-35" y="-22" font-family="Arial,sans-serif" font-size="5.5" fill="#1A237E" text-anchor="middle" font-weight="bold">Правое</text>
  <text x="-35" y="-15" font-family="Arial,sans-serif" font-size="5.5" fill="#1A237E" text-anchor="middle" font-weight="bold">предсердие</text>

  <!-- Right ventricle (venous - blue) -->
  <path d="M-5,5 C-30,0 -65,15 -65,40 C-65,55 -35,60 -5,50 Z" fill="#7986CB" stroke="#283593" stroke-width="1.5"/>
  <text x="-38" y="32" font-family="Arial,sans-serif" font-size="5.5" fill="#1A237E" text-anchor="middle" font-weight="bold">Правый</text>
  <text x="-38" y="39" font-family="Arial,sans-serif" font-size="5.5" fill="#1A237E" text-anchor="middle" font-weight="bold">желудочек</text>

  <!-- Left atrium (arterial - red) -->
  <path d="M5,-50 C20,-55 60,-40 60,-15 C60,0 40,10 5,-5 Z" fill="#EF9A9A" stroke="#B71C1C" stroke-width="1.5"/>
  <text x="35" y="-22" font-family="Arial,sans-serif" font-size="5.5" fill="#B71C1C" text-anchor="middle" font-weight="bold">Левое</text>
  <text x="35" y="-15" font-family="Arial,sans-serif" font-size="5.5" fill="#B71C1C" text-anchor="middle" font-weight="bold">предсердие</text>

  <!-- Left ventricle (arterial - red, thicker wall) -->
  <path d="M5,5 C25,0 60,10 60,35 C60,55 35,65 5,55 Z" fill="#E57373" stroke="#B71C1C" stroke-width="1.5"/>
  <text x="35" y="32" font-family="Arial,sans-serif" font-size="5.5" fill="#B71C1C" text-anchor="middle" font-weight="bold">Левый</text>
  <text x="35" y="39" font-family="Arial,sans-serif" font-size="5.5" fill="#B71C1C" text-anchor="middle" font-weight="bold">желудочек</text>

  <!-- Tricuspid valve (right AV) -->
  <path d="M-8,0 L-20,-8 L-15,0 L-20,8 Z" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="-30" y="-10" font-family="Arial,sans-serif" font-size="4.5" fill="#F57F17" font-weight="bold">Трёхстворч.</text>

  <!-- Mitral valve (left AV) -->
  <path d="M8,0 L20,-8 L15,0 L20,8 Z" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="14" y="-10" font-family="Arial,sans-serif" font-size="4.5" fill="#F57F17" font-weight="bold">Двустворч.</text>

  <!-- Semilunar valves -->
  <path d="M-50,-48 L-45,-42 L-40,-48" fill="none" stroke="#F9A825" stroke-width="1.2"/>
  <text x="-45" y="-52" font-family="Arial,sans-serif" font-size="4" fill="#F57F17" font-weight="bold">Полулунные</text>
  <path d="M40,-48 L45,-42 L50,-48" fill="none" stroke="#F9A825" stroke-width="1.2"/>

  <!-- Vena cava (incoming to right atrium) -->
  <path d="M-55,-70 L-55,-50" stroke="#283593" stroke-width="4" fill="none"/>
  <text x="-72" y="-56" font-family="Arial,sans-serif" font-size="5" fill="#283593" font-weight="bold">Полая вена</text>
  <path d="M-30,-75 L-35,-60" stroke="#283593" stroke-width="3" fill="none"/>
  <text x="-14" y="-72" font-family="Arial,sans-serif" font-size="4.5" fill="#283593" font-weight="bold">Верхн.</text>

  <!-- Pulmonary artery (outgoing from right ventricle) -->
  <path d="M-30,-65 L-25,-50" stroke="#283593" stroke-width="3.5" fill="none"/>
  <text x="-60" y="-65" font-family="Arial,sans-serif" font-size="5" fill="#283593" font-weight="bold">Лёгочная артерия</text>

  <!-- Pulmonary veins (incoming to left atrium) -->
  <path d="M40,-70 L40,-50" stroke="#B71C1C" stroke-width="3" fill="none"/>
  <text x="58" y="-65" font-family="Arial,sans-serif" font-size="5" fill="#B71C1C" font-weight="bold">Лёгочные вены</text>

  <!-- Aorta (outgoing from left ventricle) -->
  <path d="M55,-68 L50,-50" stroke="#B71C1C" stroke-width="4" fill="none"/>
  <text x="72" y="-56" font-family="Arial,sans-serif" font-size="6" fill="#B71C1C" font-weight="bold">Аорта</text>

  <!-- Blood flow arrows - venous (blue) -->
  <path d="M-55,-58 L-45,-45" stroke="#283593" stroke-width="1.5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M-35,-10 L-35,5" stroke="#283593" stroke-width="1.5" fill="none"/>
  <polygon points="-35,5 -38,0 -32,0" fill="#283593"/>
  <path d="M-40,45 L-25,55" stroke="#283593" stroke-width="1.5" fill="none"/>
  <polygon points="-25,55 -32,52 -28,47" fill="#283593"/>

  <!-- Blood flow arrows - arterial (red) -->
  <path d="M40,-55 L35,-45" stroke="#B71C1C" stroke-width="1.5" fill="none"/>
  <polygon points="35,-45 32,-50 38,-48" fill="#B71C1C"/>
  <path d="M35,-10 L35,5" stroke="#B71C1C" stroke-width="1.5" fill="none"/>
  <polygon points="35,5 32,0 38,0" fill="#B71C1C"/>
  <path d="M40,45 L55,60" stroke="#B71C1C" stroke-width="1.5" fill="none"/>
  <polygon points="55,60 48,57 52,52" fill="#B71C1C"/>
</g>

<!-- Cardiac cycle phases -->
<g transform="translate(310,60)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Сердечный цикл (0,8 сек)</text>

  <!-- Phase 1 -->
  <rect x="0" y="8" width="160" height="22" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8" rx="3"/>
  <text x="5" y="18" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" font-weight="bold">1. Систола предсердий</text>
  <text x="5" y="26" font-family="Arial,sans-serif" font-size="5" fill="#333">~0,1 сек — кровь → в желудочки</text>

  <!-- Phase 2 -->
  <rect x="0" y="34" width="160" height="22" fill="#FFCDD2" stroke="#C62828" stroke-width="0.8" rx="3"/>
  <text x="5" y="44" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" font-weight="bold">2. Систола желудочков</text>
  <text x="5" y="52" font-family="Arial,sans-serif" font-size="5" fill="#333">~0,3 сек — кровь → в артерии</text>

  <!-- Phase 3 -->
  <rect x="0" y="60" width="160" height="22" fill="#BBDEFB" stroke="#1565C0" stroke-width="0.8" rx="3"/>
  <text x="5" y="70" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" font-weight="bold">3. Диастола (расслабление)</text>
  <text x="5" y="78" font-family="Arial,sans-serif" font-size="5" fill="#333">~0,4 сек — сердце заполняется</text>
</g>

<!-- Conduction system -->
<g transform="translate(310,150)">
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" font-weight="bold">Проводящая система сердца</text>

  <!-- SA node -->
  <ellipse cx="30" cy="15" rx="20" ry="8" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
  <text x="30" y="18" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">СА-узел</text>
  <text x="58" y="18" font-family="Arial,sans-serif" font-size="4.5" fill="#333">(водитель ритма)</text>

  <!-- Arrow down -->
  <line x1="30" y1="23" x2="30" y2="33" stroke="#F9A825" stroke-width="1.2"/>
  <polygon points="30,33 27,28 33,28" fill="#F9A825"/>

  <!-- AV node -->
  <ellipse cx="30" cy="42" rx="18" ry="7" fill="#FFE082" stroke="#F9A825" stroke-width="1"/>
  <text x="30" y="45" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">АВ-узел</text>

  <!-- Arrow down -->
  <line x1="30" y1="49" x2="30" y2="57" stroke="#F9A825" stroke-width="1.2"/>
  <polygon points="30,57 27,52 33,52" fill="#F9A825"/>

  <!-- Bundle of His -->
  <rect x="18" y="58" width="24" height="10" fill="#FFE082" stroke="#F9A825" stroke-width="1" rx="3"/>
  <text x="30" y="66" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" text-anchor="middle" font-weight="bold">Пучок Гиса</text>

  <!-- Branches -->
  <line x1="22" y1="68" x2="12" y2="78" stroke="#F9A825" stroke-width="1"/>
  <line x1="38" y1="68" x2="48" y2="78" stroke="#F9A825" stroke-width="1"/>

  <!-- Purkinje fibers -->
  <g transform="translate(0,78)">
    <path d="M5,0 Q8,6 3,12" stroke="#F9A825" stroke-width="0.8" fill="none"/>
    <path d="M12,2 Q15,8 10,14" stroke="#F9A825" stroke-width="0.8" fill="none"/>
    <path d="M45,2 Q42,8 47,14" stroke="#F9A825" stroke-width="0.8" fill="none"/>
    <path d="M52,0 Q49,6 54,12" stroke="#F9A825" stroke-width="0.8" fill="none"/>
    <text x="8" y="18" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" font-weight="bold">Волокна</text>
    <text x="8" y="24" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" font-weight="bold">Пуркинье</text>
    <text x="40" y="18" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" font-weight="bold">Волокна</text>
    <text x="40" y="24" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" font-weight="bold">Пуркинье</text>
  </g>
</g>

<!-- Key info panel -->
<rect x="310" y="260" width="175" height="55" fill="#fff" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1" rx="5"/>
<text x="397" y="273" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">КЛЮЧЕВЫЕ ФАКТЫ</text>
<text x="317" y="284" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Масса сердца ~300 г, размер ≈ кулак</text>
<text x="317" y="293" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Левый желудочек толще (большой круг)</text>
<text x="317" y="302" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• ЧСС в покое: 60–80 уд/мин</text>
<text x="317" y="311" font-family="Arial,sans-serif" font-size="5.5" fill="#333">• Автоматия — способность к саморегуляции</text>

<!-- Legend for blood flow -->
<g transform="translate(20,290)">
  <rect x="0" y="0" width="140" height="30" fill="#fff" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1" rx="5"/>
  <rect x="8" y="8" width="12" height="8" fill="#7986CB" stroke="#283593" stroke-width="0.5" rx="2"/>
  <text x="25" y="15" font-family="Arial,sans-serif" font-size="6" fill="#283593" font-weight="bold">Венозная кровь</text>
  <rect x="8" y="20" width="12" height="8" fill="#E57373" stroke="#B71C1C" stroke-width="0.5" rx="2"/>
  <text x="25" y="27" font-family="Arial,sans-serif" font-size="6" fill="#B71C1C" font-weight="bold">Артериальная кровь</text>
</g>

<!-- Footer -->
<rect x="3" y="325" width="494" height="22" fill="#2E7D32" rx="0"/>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Камеры сердца • Клапаны • Сердечный цикл • Проводящая система</text>
</svg>