<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="cerebrumGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <linearGradient id="brainstemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <linearGradient id="cerebellumGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CE93D8"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>
    <linearGradient id="thalamusGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="hypothalamusGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF176"/>
      <stop offset="100%" stop-color="#F9A825"/>
    </linearGradient>
    <linearGradient id="basalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F48FB1"/>
      <stop offset="100%" stop-color="#C2185B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial">Головной мозг: ствол и подкорковые структуры</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 37</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== BRAIN SAGITTAL SECTION (left/center) ===== -->
  <!-- Cerebrum (large mass) -->
  <path d="M60,120 Q60,55 140,50 Q200,46 240,55 Q280,65 290,90 Q295,105 285,130 Q275,155 250,170 L200,185 L140,185 Q90,180 70,160 Z" fill="url(#cerebrumGrad)" stroke="#BF360C" stroke-width="1.2"/>
  <!-- Cerebrum wrinkles -->
  <path d="M90,80 Q130,70 160,82" fill="none" stroke="#BF360C" stroke-width="0.5" opacity="0.5"/>
  <path d="M100,100 Q140,90 180,100" fill="none" stroke="#BF360C" stroke-width="0.5" opacity="0.5"/>
  <path d="M110,120 Q150,110 200,118" fill="none" stroke="#BF360C" stroke-width="0.5" opacity="0.5"/>
  <path d="M120,140 Q170,130 220,138" fill="none" stroke="#BF360C" stroke-width="0.5" opacity="0.5"/>
  <text x="170" y="108" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="Arial">Большие</text>
  <text x="170" y="117" text-anchor="middle" font-size="7" font-weight="bold" fill="white" font-family="Arial">полушария</text>

  <!-- Corpus callosum -->
  <path d="M100,150 Q170,140 240,150" fill="none" stroke="#FFCC80" stroke-width="2.5"/>
  <text x="170" y="164" text-anchor="middle" font-size="5" fill="#E65100" font-family="Arial">Мозолистое тело</text>

  <!-- Thalamus -->
  <ellipse cx="185" cy="178" rx="25" ry="14" fill="url(#thalamusGrad)" stroke="#0D47A1" stroke-width="0.8"/>
  <text x="185" y="181" text-anchor="middle" font-size="6" font-weight="bold" fill="white" font-family="Arial">Таламус</text>

  <!-- Hypothalamus -->
  <ellipse cx="205" cy="198" rx="18" ry="10" fill="url(#hypothalamusGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <text x="205" y="200" text-anchor="middle" font-size="5" font-weight="bold" fill="#333" font-family="Arial">Гипоталамус</text>

  <!-- Pituitary -->
  <ellipse cx="218" cy="213" rx="6" ry="8" fill="#FF8A65" stroke="#BF360C" stroke-width="0.8"/>
  <text x="232" y="216" font-size="5" fill="#BF360C" font-family="Arial">Гипофиз</text>

  <!-- Basal ganglia -->
  <ellipse cx="145" cy="170" rx="15" ry="10" fill="url(#basalGrad)" stroke="#880E4F" stroke-width="0.8"/>
  <text x="145" y="173" text-anchor="middle" font-size="5" font-weight="bold" fill="white" font-family="Arial">Базальные</text>
  <text x="145" y="179" text-anchor="middle" font-size="5" font-weight="bold" fill="white" font-family="Arial">ганглии</text>

  <!-- Midbrain -->
  <rect x="195" y="218" width="30" height="14" rx="4" fill="url(#brainstemGrad)" stroke="#1B5E20" stroke-width="0.8"/>
  <text x="210" y="228" text-anchor="middle" font-size="5.5" font-weight="bold" fill="white" font-family="Arial">Средний</text>
  <text x="210" y="233" text-anchor="middle" font-size="5.5" font-weight="bold" fill="white" font-family="Arial">мозг</text>

  <!-- Pons -->
  <rect x="188" y="234" width="44" height="16" rx="6" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="210" y="245" text-anchor="middle" font-size="6" font-weight="bold" fill="#1B5E20" font-family="Arial">Мост</text>

  <!-- Medulla oblongata -->
  <path d="M195,250 Q210,250 220,255 Q225,265 220,285 L200,285 Q195,265 195,250 Z" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="208" y="270" text-anchor="middle" font-size="5" font-weight="bold" fill="white" font-family="Arial">Продолговатый</text>
  <text x="208" y="277" text-anchor="middle" font-size="5" font-weight="bold" fill="white" font-family="Arial">мозг</text>

  <!-- Spinal cord connection -->
  <path d="M207,285 L205,305" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
  <text x="185" y="302" font-size="5" fill="#2E7D32" font-family="Arial">Спинной мозг</text>

  <!-- Cerebellum -->
  <path d="M230,200 Q270,195 285,210 Q295,225 285,250 Q275,270 255,270 Q235,270 225,255 Q218,240 225,220 Z" fill="url(#cerebellumGrad)" stroke="#4A148C" stroke-width="1"/>
  <!-- Cerebellum folia -->
  <path d="M235,215 Q260,212 280,218" fill="none" stroke="#4A148C" stroke-width="0.4" opacity="0.6"/>
  <path d="M232,225 Q258,222 282,228" fill="none" stroke="#4A148C" stroke-width="0.4" opacity="0.6"/>
  <path d="M230,235 Q255,232 280,238" fill="none" stroke="#4A148C" stroke-width="0.4" opacity="0.6"/>
  <path d="M228,245 Q252,242 278,248" fill="none" stroke="#4A148C" stroke-width="0.4" opacity="0.6"/>
  <path d="M230,255 Q250,252 272,258" fill="none" stroke="#4A148C" stroke-width="0.4" opacity="0.6"/>
  <text x="258" y="240" text-anchor="middle" font-size="6.5" font-weight="bold" fill="white" font-family="Arial">Мозжечок</text>

  <!-- ===== FUNCTION LABELS (right side) ===== -->
  <rect x="310" y="50" width="180" height="235" rx="6" fill="white" fill-opacity="0.6" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="400" y="64" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#1B5E20" font-family="Arial">Функции структур</text>

  <!-- Medulla functions -->
  <rect x="318" y="72" width="165" height="32" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <rect x="318" y="72" width="4" height="32" rx="2" fill="#4CAF50"/>
  <text x="330" y="82" font-size="6.5" font-weight="bold" fill="#1B5E20" font-family="Arial">Продолговатый мозг:</text>
  <text x="330" y="91" font-size="5.5" fill="#333" font-family="Arial">Дыхание, кровообращение, пищеварение</text>
  <text x="330" y="99" font-size="5.5" fill="#333" font-family="Arial">Рвотный, кашлевой, чихательный рефлексы</text>

  <!-- Pons functions -->
  <rect x="318" y="108" width="165" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <rect x="318" y="108" width="4" height="28" rx="2" fill="#81C784"/>
  <text x="330" y="118" font-size="6.5" font-weight="bold" fill="#1B5E20" font-family="Arial">Мост:</text>
  <text x="330" y="127" font-size="5.5" fill="#333" font-family="Arial">Связь полушарий с мозжечком</text>
  <text x="330" y="134" font-size="5.5" fill="#333" font-family="Arial">Регуляция сна и бодрствования</text>

  <!-- Midbrain functions -->
  <rect x="318" y="140" width="165" height="28" rx="3" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
  <rect x="318" y="140" width="4" height="28" rx="2" fill="#A5D6A7"/>
  <text x="330" y="150" font-size="6.5" font-weight="bold" fill="#1B5E20" font-family="Arial">Средний мозг:</text>
  <text x="330" y="159" font-size="5.5" fill="#333" font-family="Arial">Ориентировочные рефлексы</text>
  <text x="330" y="166" font-size="5.5" fill="#333" font-family="Arial">Двигательные реакции на звук/свет</text>

  <!-- Cerebellum functions -->
  <rect x="318" y="172" width="165" height="28" rx="3" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="0.5"/>
  <rect x="318" y="172" width="4" height="28" rx="2" fill="#CE93D8"/>
  <text x="330" y="182" font-size="6.5" font-weight="bold" fill="#4A148C" font-family="Arial">Мозжечок:</text>
  <text x="330" y="191" font-size="5.5" fill="#333" font-family="Arial">Координация движений и равновесие</text>
  <text x="330" y="198" font-size="5.5" fill="#333" font-family="Arial">Точность и плавность моторики</text>

  <!-- Thalamus functions -->
  <rect x="318" y="204" width="165" height="28" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
  <rect x="318" y="204" width="4" height="28" rx="2" fill="#90CAF9"/>
  <text x="330" y="214" font-size="6.5" font-weight="bold" fill="#0D47A1" font-family="Arial">Таламус:</text>
  <text x="330" y="223" font-size="5.5" fill="#333" font-family="Arial">Переключение сенсорных сигналов</text>
  <text x="330" y="230" font-size="5.5" fill="#333" font-family="Arial">Фильтрация информации к коре</text>

  <!-- Hypothalamus functions -->
  <rect x="318" y="236" width="165" height="28" rx="3" fill="#FFFDE7" stroke="#F9A825" stroke-width="0.5"/>
  <rect x="318" y="236" width="4" height="28" rx="2" fill="#FFF176"/>
  <text x="330" y="246" font-size="6.5" font-weight="bold" fill="#F57F17" font-family="Arial">Гипоталамус:</text>
  <text x="330" y="255" font-size="5.5" fill="#333" font-family="Arial">Нейроэндокринный центр</text>
  <text x="330" y="262" font-size="5.5" fill="#333" font-family="Arial">Терморегуляция, голод, жажда, сон</text>

  <!-- Basal ganglia functions -->
  <rect x="318" y="268" width="165" height="14" rx="3" fill="#FCE4EC" stroke="#C2185B" stroke-width="0.5"/>
  <rect x="318" y="268" width="4" height="14" rx="2" fill="#F48FB1"/>
  <text x="330" y="278" font-size="6.5" font-weight="bold" fill="#880E4F" font-family="Arial">Базальные ганглии: управление движениями</text>

  <!-- Brainstem vital centers note -->
  <rect x="15" y="295" width="290" height="22" rx="4" fill="white" fill-opacity="0.7" stroke="#E64A19" stroke-width="0.8"/>
  <text x="160" y="308" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#BF360C" font-family="Arial">⚠ Ствол мозга содержит жизненно важные центры — повреждение смертельно!</text>

  <!-- Legend -->
  <rect x="310" y="292" width="180" height="25" rx="4" fill="white" fill-opacity="0.6" stroke="#666" stroke-width="0.5"/>
  <rect x="318" y="300" width="8" height="8" rx="1" fill="#66BB6A"/>
  <text x="330" y="307" font-size="5.5" fill="#333" font-family="Arial">Ствол мозга</text>
  <rect x="383" y="300" width="8" height="8" rx="1" fill="#CE93D8"/>
  <text x="395" y="307" font-size="5.5" fill="#333" font-family="Arial">Мозжечок</text>
  <rect x="440" y="300" width="8" height="8" rx="1" fill="#90CAF9"/>
  <text x="452" y="307" font-size="5.5" fill="#333" font-family="Arial">Подкорка</text>

  <!-- Footer bar -->
  <rect x="2" y="325" width="496" height="23" rx="0 0 12 12" fill="#2E7D32"/>
  <text x="250" y="340" text-anchor="middle" font-size="8" fill="white" font-family="Arial">Ствол мозга — эволюционно древнейший отдел, регулирующий жизненно важные функции</text>
</svg>