<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="hotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFCDD2"/>
      <stop offset="100%" style="stop-color:#EF9A9A"/>
    </linearGradient>
    <linearGradient id="coldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#BBDEFB"/>
      <stop offset="100%" style="stop-color:#90CAF9"/>
    </linearGradient>
    <linearGradient id="thermoGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="30%" style="stop-color:#42A5F5"/>
      <stop offset="60%" style="stop-color:#FFEE58"/>
      <stop offset="85%" style="stop-color:#FF9800"/>
      <stop offset="100%" style="stop-color:#F44336"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial">Терморегуляция. Закаливание. Гигиена кожи</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 32</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- Central body outline for thermoregulation -->
  <!-- Human silhouette (simplified) -->
  <ellipse cx="160" cy="95" rx="14" ry="16" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.8"/>
  <rect x="147" y="111" width="26" height="45" rx="6" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.8"/>
  <rect x="130" y="117" width="17" height="8" rx="3" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.5"/>
  <rect x="173" y="117" width="17" height="8" rx="3" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.5"/>
  <rect x="150" y="156" width="10" height="35" rx="3" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.5"/>
  <rect x="163" y="156" width="10" height="35" rx="3" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.5"/>
  <text x="160" y="205" text-anchor="middle" font-size="6" font-weight="bold" fill="#BF360C" font-family="Arial">Тело</text>

  <!-- Heat production arrows (left side) -->
  <rect x="15" y="55" width="105" height="85" rx="5" fill="url(#hotGrad)" stroke="#C62828" stroke-width="0.8" opacity="0.8"/>
  <text x="67" y="70" text-anchor="middle" font-size="7" font-weight="bold" fill="#B71C1C" font-family="Arial">ТЕПЛООБРАЗОВАНИЕ</text>
  <line x1="25" y1="75" x2="110" y2="75" stroke="#C62828" stroke-width="0.4"/>
  <text x="30" y="86" font-size="6" fill="#C62828" font-family="Arial">⚡ Мышечная дрожь</text>
  <text x="30" y="97" font-size="6" fill="#C62828" font-family="Arial">⚡ Окислительные</text>
  <text x="35" y="106" font-size="5.5" fill="#C62828" font-family="Arial">процессы в клетках</text>
  <text x="30" y="117" font-size="6" fill="#C62828" font-family="Arial">⚡ Печень, мышцы</text>
  <!-- Arrow from heat production to body -->
  <path d="M120,97 L142,97" fill="none" stroke="#C62828" stroke-width="1.2" marker-end="url(#arrowRed)"/>
  <defs>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#C62828"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- Heat loss arrows (right side) -->
  <rect x="200" y="55" width="115" height="85" rx="5" fill="url(#coldGrad)" stroke="#1565C0" stroke-width="0.8" opacity="0.8"/>
  <text x="257" y="70" text-anchor="middle" font-size="7" font-weight="bold" fill="#0D47A1" font-family="Arial">ТЕПЛООТДАЧА</text>
  <line x1="210" y1="75" x2="305" y2="75" stroke="#1565C0" stroke-width="0.4"/>
  <text x="210" y="86" font-size="6" fill="#0D47A1" font-family="Arial">❄ Расширение сосудов</text>
  <text x="215" y="95" font-size="5.5" fill="#0D47A1" font-family="Arial">кожи</text>
  <text x="210" y="106" font-size="6" fill="#0D47A1" font-family="Arial">❄ Потоотделение</text>
  <text x="210" y="117" font-size="6" fill="#0D47A1" font-family="Arial">❄ Дыхание</text>
  <text x="210" y="128" font-size="6" fill="#0D47A1" font-family="Arial">❄ Теплопроводность</text>
  <!-- Arrow from body to heat loss -->
  <path d="M178,97 L200,97" fill="none" stroke="#1565C0" stroke-width="1.2" marker-end="url(#arrowBlue)"/>

  <!-- Thermometer -->
  <rect x="350" y="55" width="20" height="120" rx="10" fill="white" stroke="#455A64" stroke-width="1"/>
  <rect x="353" y="58" width="14" height="110" rx="7" fill="url(#thermoGrad)"/>
  <circle cx="360" cy="185" r="14" fill="#F44336" stroke="#C62828" stroke-width="1"/>
  <circle cx="360" cy="185" r="10" fill="#E53935"/>
  <!-- Temperature markings -->
  <line x1="370" y1="65" x2="376" y2="65" stroke="#455A64" stroke-width="0.5"/>
  <text x="378" y="68" font-size="5" fill="#455A64" font-family="Arial">42°C</text>
  <line x1="370" y1="90" x2="376" y2="90" stroke="#455A64" stroke-width="0.5"/>
  <text x="378" y="93" font-size="5" fill="#455A64" font-family="Arial">39°C</text>
  <!-- 36.6 mark - highlighted -->
  <line x1="370" y1="120" x2="378" y2="120" stroke="#2E7D32" stroke-width="1"/>
  <text x="380" y="123" font-size="6" font-weight="bold" fill="#2E7D32" font-family="Arial">36.6°C</text>
  <rect x="369" y="118" width="30" height="8" fill="none" stroke="#2E7D32" stroke-width="0.5" rx="2"/>
  <line x1="370" y1="148" x2="376" y2="148" stroke="#455A64" stroke-width="0.5"/>
  <text x="378" y="151" font-size="5" fill="#455A64" font-family="Arial">34°C</text>
  <!-- Mercury level indicator at 36.6 -->
  <line x1="353" y1="120" x2="367" y2="120" stroke="#2E7D32" stroke-width="0.8"/>

  <!-- Thermoregulation center label -->
  <text x="360" y="210" text-anchor="middle" font-size="6" font-weight="bold" fill="#1B5E20" font-family="Arial">Центр терморегуляции</text>
  <text x="360" y="219" text-anchor="middle" font-size="5.5" fill="#1B5E20" font-family="Arial">(гипоталамус)</text>

  <!-- Balance arrow diagram -->
  <text x="160" y="230" text-anchor="middle" font-size="6" fill="#333" font-family="Arial">Теплообразование = Теплоотдача</text>
  <text x="160" y="240" text-anchor="middle" font-size="5.5" fill="#666" font-family="Arial">⇒ Постоянная t° тела</text>

  <!-- Side panel - Закаливание -->
  <rect x="325" y="230" width="165" height="68" rx="5" fill="#FFFFFF" stroke="#2E7D32" stroke-width="0.8" opacity="0.9"/>
  <text x="407" y="245" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial">ЗАКАЛИВАНИЕ</text>
  <line x1="335" y1="250" x2="480" y2="250" stroke="#2E7D32" stroke-width="0.4"/>
  <!-- Stages -->
  <text x="335" y="262" font-size="5.5" fill="#333" font-family="Arial">1️⃣ Воздушные ванны</text>
  <path d="M420,260 L430,260" stroke="#2E7D32" stroke-width="0.8" marker-end="url(#arrowGreen)"/>
  <text x="335" y="273" font-size="5.5" fill="#333" font-family="Arial">2️⃣ Обтирания водой</text>
  <path d="M420,271 L430,271" stroke="#2E7D32" stroke-width="0.8" marker-end="url(#arrowGreen)"/>
  <text x="335" y="284" font-size="5.5" fill="#333" font-family="Arial">3️⃣ Обливания / душ</text>
  <path d="M425,282 L435,282" stroke="#2E7D32" stroke-width="0.8" marker-end="url(#arrowGreen)"/>
  <text x="335" y="295" font-size="5.5" fill="#333" font-family="Arial">4️⃣ Купание в открытом водоёме</text>

  <!-- Bottom panel - Hygiene -->
  <rect x="15" y="250" width="300" height="68" rx="5" fill="#FFFFFF" stroke="#2E7D32" stroke-width="0.8" opacity="0.9"/>
  <text x="165" y="265" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial">ГИГИЕНА КОЖИ И ЗАЩИТА ОТ СОЛНЦА</text>
  <line x1="25" y1="270" x2="305" y2="270" stroke="#2E7D32" stroke-width="0.4"/>
  <text x="25" y="282" font-size="5.5" fill="#333" font-family="Arial">• Ежедневное мытьё, смена нательного белья</text>
  <text x="25" y="292" font-size="5.5" fill="#333" font-family="Arial">• Уход за волосами (1-2 раза в неделю)</text>
  <text x="25" y="302" font-size="5.5" fill="#333" font-family="Arial">• Защита от UV: крем SPF, головной убор, ограничение времени</text>
  <text x="25" y="312" font-size="5.5" fill="#333" font-family="Arial">• Ожог: холодная вода + пендецин, не прокалывать пузыри</text>

  <!-- UV protection icon -->
  <circle cx="308" cy="237" r="10" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="308" y="240" text-anchor="middle" font-size="8" fill="#F57F17" font-family="Arial">☀</text>
  <text x="308" y="222" text-anchor="middle" font-size="5" fill="#F57F17" font-family="Arial">UV</text>

  <!-- Footer -->
  <rect x="0" y="330" width="500" height="20" rx="0" fill="#2E7D32"/>
  <text x="250" y="343" text-anchor="middle" font-size="8" fill="white" font-family="Arial">Терморегуляция — поддержание постоянной температуры тела | Гипоталамус — центр регуляции</text>
</svg>