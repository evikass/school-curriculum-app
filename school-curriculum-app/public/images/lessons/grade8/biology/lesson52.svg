<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Развитие человека. Наследственные заболевания</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 52</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Embryonic development timeline -->
<rect x="15" y="56" width="476" height="80" fill="white" fill-opacity="0.7" rx="6" stroke="#A5D6A7" stroke-width="1"/>
<text x="253" y="68" font-family="Arial,sans-serif" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Эмбриональное развитие (онтогенез)</text>
<line x1="25" y1="72" x2="481" y2="72" stroke="#A5D6A7" stroke-width="0.5"/>

<!-- Timeline arrow -->
<line x1="30" y1="95" x2="475" y2="95" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="475,95 471,92 471,98" fill="#2E7D32"/>

<!-- Stage 1: Zygote -->
<circle cx="45" cy="95" r="8" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<text x="45" y="98" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle" font-weight="bold">2n</text>
<text x="45" y="85" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Зигота</text>
<text x="45" y="110" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">1 день</text>

<!-- Stage 2: Cleavage -->
<circle cx="110" cy="95" r="9" fill="#81C784" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="107" cy="92" r="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.4"/>
<circle cx="113" cy="92" r="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.4"/>
<circle cx="107" cy="98" r="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.4"/>
<circle cx="113" cy="98" r="3" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.4"/>
<text x="110" y="85" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Дробление</text>
<text x="110" y="110" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">3–5 дней</text>

<!-- Stage 3: Blastula -->
<circle cx="175" cy="95" r="10" fill="#66BB6A" fill-opacity="0.3" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="175" cy="95" r="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
<text x="175" y="85" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Бластула</text>
<text x="175" y="110" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">5–7 дней</text>

<!-- Stage 4: Gastrula -->
<ellipse cx="240" cy="95" rx="11" ry="9" fill="#4CAF50" fill-opacity="0.3" stroke="#2E7D32" stroke-width="0.8"/>
<path d="M235,90 C237,95 235,100 240,100 C245,100 243,95 245,90" fill="#81C784" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="240" y="85" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Гаструла</text>
<text x="240" y="110" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">2 нед.</text>
<!-- Germ layers label -->
<text x="240" y="118" font-family="Arial,sans-serif" font-size="4" fill="#555" text-anchor="middle">3 зарод. листка</text>

<!-- Stage 5: Organogenesis -->
<ellipse cx="315" cy="95" rx="13" ry="9" fill="#388E3C" fill-opacity="0.3" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="312" cy="93" r="3" fill="#2E7D32" fill-opacity="0.3"/>
<path d="M305,95 C308,98 312,100 318,98" fill="none" stroke="#1B5E20" stroke-width="0.5"/>
<text x="315" y="85" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Органогенез</text>
<text x="315" y="110" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">3–8 нед.</text>

<!-- Stage 6: Fetus -->
<ellipse cx="400" cy="95" rx="15" ry="10" fill="#2E7D32" fill-opacity="0.2" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="397" cy="90" r="4" fill="#A5D6A7" fill-opacity="0.5" stroke="#2E7D32" stroke-width="0.5"/>
<text x="400" y="85" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Плод</text>
<text x="400" y="110" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">9–40 нед.</text>

<!-- Trimester labels -->
<rect x="280" y="114" width="55" height="10" fill="#E3F2FD" rx="2" stroke="#1565C0" stroke-width="0.4"/>
<text x="307" y="121" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0" text-anchor="middle">1 триместр</text>
<rect x="340" y="114" width="55" height="10" fill="#FFF3E0" rx="2" stroke="#E65100" stroke-width="0.4"/>
<text x="367" y="121" font-family="Arial,sans-serif" font-size="4.5" fill="#E65100" text-anchor="middle">2 триместр</text>
<rect x="400" y="114" width="55" height="10" fill="#FCE4EC" rx="2" stroke="#C2185B" stroke-width="0.4"/>
<text x="427" y="121" font-family="Arial,sans-serif" font-size="4.5" fill="#C2185B" text-anchor="middle">3 триместр</text>
<text x="307" y="131" font-family="Arial,sans-serif" font-size="4" fill="#1565C0" text-anchor="middle">закладка органов</text>
<text x="367" y="131" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle">рост плода</text>
<text x="427" y="131" font-family="Arial,sans-serif" font-size="4" fill="#C2185B" text-anchor="middle">созревание</text>

<!-- Postnatal development -->
<rect x="15" y="140" width="476" height="44" fill="white" fill-opacity="0.7" rx="6" stroke="#A5D6A7" stroke-width="1"/>
<text x="253" y="152" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Постнатальное развитие</text>
<line x1="25" y1="156" x2="481" y2="156" stroke="#A5D6A7" stroke-width="0.5"/>

<!-- Development stages as icons -->
<line x1="40" y1="172" x2="460" y2="172" stroke="#2E7D32" stroke-width="1"/>
<polygon points="460,172 456,169 456,175" fill="#2E7D32"/>

<!-- Newborn -->
<g transform="translate(48,165)">
  <ellipse cx="0" cy="0" rx="4" ry="5" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5"/>
  <ellipse cx="0" cy="8" rx="5" ry="3" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5"/>
  <text x="0" y="17" font-family="Arial,sans-serif" font-size="4" fill="#555" text-anchor="middle">Новорожд.</text>
  <text x="0" y="21" font-family="Arial,sans-serif" font-size="3.5" fill="#888" text-anchor="middle">0–1 мес</text>
</g>

<!-- Infant -->
<g transform="translate(120,163)">
  <ellipse cx="0" cy="0" rx="4" ry="5" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5"/>
  <rect x="-4" y="5" width="8" height="6" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5" rx="2"/>
  <text x="0" y="19" font-family="Arial,sans-serif" font-size="4" fill="#555" text-anchor="middle">Младенец</text>
  <text x="0" y="23" font-family="Arial,sans-serif" font-size="3.5" fill="#888" text-anchor="middle">1–12 мес</text>
</g>

<!-- Child -->
<g transform="translate(200,162)">
  <ellipse cx="0" cy="0" rx="3.5" ry="4" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5"/>
  <rect x="-5" y="4" width="10" height="8" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5" rx="1"/>
  <text x="0" y="19" font-family="Arial,sans-serif" font-size="4" fill="#555" text-anchor="middle">Ребёнок</text>
  <text x="0" y="23" font-family="Arial,sans-serif" font-size="3.5" fill="#888" text-anchor="middle">1–11 лет</text>
</g>

<!-- Teenager -->
<g transform="translate(290,160)">
  <ellipse cx="0" cy="0" rx="3.5" ry="4.5" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5"/>
  <rect x="-6" y="5" width="12" height="10" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5" rx="1"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="4" fill="#555" text-anchor="middle">Подросток</text>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="3.5" fill="#888" text-anchor="middle">12–18 лет</text>
</g>

<!-- Adult -->
<g transform="translate(390,158)">
  <ellipse cx="0" cy="0" rx="4" ry="5" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5"/>
  <rect x="-7" y="5" width="14" height="14" fill="#FFCCBC" stroke="#8D6E63" stroke-width="0.5" rx="1"/>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="4" fill="#555" text-anchor="middle">Взрослый</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="3.5" fill="#888" text-anchor="middle">18+ лет</text>
</g>

<!-- Hereditary diseases - Gene diseases -->
<rect x="15" y="190" width="232" height="100" fill="white" fill-opacity="0.7" rx="6" stroke="#EF5350" stroke-width="1"/>
<text x="131" y="204" font-family="Arial,sans-serif" font-size="7.5" fill="#C62828" text-anchor="middle" font-weight="bold">Наследственные заболевания</text>
<line x1="25" y1="208" x2="237" y2="208" stroke="#EF9A9A" stroke-width="0.5"/>

<!-- Gene diseases -->
<text x="25" y="218" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828" font-weight="bold">Генные (мутации генов):</text>

<!-- Color blindness -->
<rect x="25" y="222" width="8" height="8" fill="#F44336" fill-opacity="0.2" rx="1" stroke="#F44336" stroke-width="0.4"/>
<circle cx="29" cy="226" r="2.5" fill="#4CAF50" fill-opacity="0.4"/>
<circle cx="29" cy="226" r="1.5" fill="#F44336" fill-opacity="0.6"/>
<text x="38" y="228" font-family="Arial,sans-serif" font-size="5.5" fill="#555" font-weight="bold">Дальтонизм</text>
<text x="38" y="234" font-family="Arial,sans-serif" font-size="4.5" fill="#888">X-сцепленный, нарушение цветового зрения</text>

<!-- Hemophilia -->
<rect x="25" y="237" width="8" height="8" fill="#E53935" fill-opacity="0.2" rx="1" stroke="#E53935" stroke-width="0.4"/>
<text x="31" y="243" font-family="Arial,sans-serif" font-size="4" fill="#E53935" text-anchor="middle" font-weight="bold">H</text>
<text x="38" y="243" font-family="Arial,sans-serif" font-size="5.5" fill="#555" font-weight="bold">Гемофилия</text>
<text x="38" y="249" font-family="Arial,sans-serif" font-size="4.5" fill="#888">X-сцепленный, нарушение свёртывания крови</text>

<!-- Phenylketonuria -->
<rect x="25" y="253" width="8" height="8" fill="#FF9800" fill-opacity="0.2" rx="1" stroke="#FF9800" stroke-width="0.4"/>
<text x="29" y="259" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle" font-weight="bold">P</text>
<text x="38" y="259" font-family="Arial,sans-serif" font-size="5.5" fill="#555" font-weight="bold">Фенилкетонурия</text>
<text x="38" y="265" font-family="Arial,sans-serif" font-size="4.5" fill="#888">Аутосомно-рецессивный, нарушен обмен аминокислот</text>

<!-- Chromosome diseases -->
<text x="25" y="276" font-family="Arial,sans-serif" font-size="6.5" fill="#C62828" font-weight="bold">Хромосомные (нарушение числа):</text>
<text x="25" y="285" font-family="Arial,sans-serif" font-size="5.5" fill="#555">• Синдром Дауна — трисомия 21 (47,XX/XY,+21)</text>

<!-- Chromosome disorders continued in right panel -->
<rect x="255" y="190" width="236" height="100" fill="white" fill-opacity="0.7" rx="6" stroke="#EF5350" stroke-width="1"/>
<text x="373" y="204" font-family="Arial,sans-serif" font-size="7" fill="#C62828" text-anchor="middle" font-weight="bold">Хромосомные синдромы</text>
<line x1="265" y1="208" x2="481" y2="208" stroke="#EF9A9A" stroke-width="0.5"/>

<!-- Down syndrome karyotype icon -->
<g transform="translate(275,215)">
  <!-- Simplified chromosome pairs -->
  <g fill="#7986CB" stroke="#3F51B5" stroke-width="0.3">
    <rect x="0" y="0" width="3" height="8" rx="1"/><rect x="4" y="0" width="3" height="8" rx="1"/>
    <rect x="9" y="0" width="3" height="8" rx="1"/><rect x="13" y="0" width="3" height="8" rx="1"/>
    <rect x="18" y="0" width="3" height="8" rx="1"/><rect x="22" y="0" width="3" height="8" rx="1"/>
    <!-- Trisomy 21 - three chromosomes -->
    <rect x="0" y="11" width="3" height="8" rx="1" fill="#E53935" stroke="#B71C1C" stroke-width="0.3"/>
    <rect x="4" y="11" width="3" height="8" rx="1" fill="#E53935" stroke="#B71C1C" stroke-width="0.3"/>
    <rect x="8" y="11" width="3" height="8" rx="1" fill="#E53935" stroke="#B71C1C" stroke-width="0.3"/>
  </g>
  <text x="15" y="30" font-family="Arial,sans-serif" font-size="5" fill="#C62828" text-anchor="middle" font-weight="bold">21 хромосома ×3</text>
</g>

<text x="310" y="220" font-family="Arial,sans-serif" font-size="5.5" fill="#555" font-weight="bold">Синдром Дауна (трисомия 21)</text>
<text x="310" y="228" font-family="Arial,sans-serif" font-size="4.5" fill="#888">Умственная отсталость, плоский профиль лица</text>
<text x="310" y="234" font-family="Arial,sans-serif" font-size="4.5" fill="#888">Частота: ~1 на 700 рождений</text>

<!-- Klinefelter -->
<text x="265" y="248" font-family="Arial,sans-serif" font-size="5.5" fill="#555" font-weight="bold">Синдром Клайнфельтера (47,XXY)</text>
<text x="265" y="256" font-family="Arial,sans-serif" font-size="4.5" fill="#888">Только мужчины, женские признаки, бесплодие</text>

<!-- Turner -->
<text x="265" y="268" font-family="Arial,sans-serif" font-size="5.5" fill="#555" font-weight="bold">Синдром Тернера (45,X0)</text>
<text x="265" y="276" font-family="Arial,sans-serif" font-size="4.5" fill="#888">Только женщины, низкий рост, недоразвитие яичников</text>

<!-- Genetic counseling panel -->
<rect x="15" y="295" width="476" height="20" fill="white" fill-opacity="0.7" rx="4" stroke="#66BB6A" stroke-width="1"/>
<text x="253" y="309" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Медико-генетическое консультирование: анализ родословной, пренатальная диагностика (УЗИ, амниоцентез), ДНК-тестирование</text>

<!-- Footer bar -->
<rect x="3" y="318" width="494" height="29" rx="0" fill="#2E7D32"/>
<rect x="3" y="340" width="494" height="7" rx="0 0 8 8" fill="#2E7D32"/>
<text x="250" y="336" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Онтогенез — индивидуальное развитие от зиготы до смерти | Критические периоды: 3–8 нед. эмбриогенеза</text>
</svg>