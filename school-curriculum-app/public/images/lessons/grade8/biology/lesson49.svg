<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="glucUp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FF8A65"/><stop offset="100%" stop-color="#E53935"/></linearGradient>
<linearGradient id="glucDown" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#81C784"/><stop offset="100%" stop-color="#2E7D32"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Гормоны и их роль в регуляции организма</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 49</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Major hormones by gland - Left panel -->
<rect x="15" y="56" width="235" height="175" fill="white" fill-opacity="0.7" rx="6" stroke="#A5D6A7" stroke-width="1"/>
<text x="132" y="70" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Основные гормоны</text>
<line x1="25" y1="75" x2="240" y2="75" stroke="#A5D6A7" stroke-width="0.5"/>

<!-- Pituitary -->
<rect x="22" y="80" width="10" height="10" fill="#7B1FA2" rx="2"/>
<text x="36" y="88" font-family="Arial,sans-serif" font-size="6.5" fill="#7B1FA2" font-weight="bold">Гипофиз:</text>
<text x="36" y="97" font-family="Arial,sans-serif" font-size="5.5" fill="#555">ГР (гормон роста), ТТГ, АКТГ</text>
<text x="36" y="105" font-family="Arial,sans-serif" font-size="5.5" fill="#555">ЛГ, ФСГ, пролактин</text>

<!-- Thyroid -->
<rect x="22" y="112" width="10" height="10" fill="#FF9800" rx="2"/>
<text x="36" y="120" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100" font-weight="bold">Щитовидная железа:</text>
<text x="36" y="129" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Тироксин (T₄), Трийодтиронин (T₃)</text>
<text x="36" y="137" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Кальцитонин (↓ Ca²⁺ в крови)</text>

<!-- Adrenals -->
<rect x="22" y="144" width="10" height="10" fill="#F44336" rx="2"/>
<text x="36" y="152" font-family="Arial,sans-serif" font-size="6.5" fill="#B71C1C" font-weight="bold">Надпочечники:</text>
<text x="36" y="161" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Адреналин (стресс), Кортизол</text>
<text x="36" y="169" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Альдостерон (Na⁺/K⁺ баланс)</text>

<!-- Pancreas -->
<rect x="22" y="176" width="10" height="10" fill="#4CAF50" rx="2"/>
<text x="36" y="184" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" font-weight="bold">Поджелудочная железа:</text>
<text x="36" y="193" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Инсулин (↓ глюкоза)</text>
<text x="36" y="201" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Глюкагон (↑ глюкоза)</text>

<!-- Gonads -->
<rect x="22" y="208" width="10" height="10" fill="#E91E63" rx="2"/>
<text x="36" y="216" font-family="Arial,sans-serif" font-size="6.5" fill="#880E4F" font-weight="bold">Половые железы:</text>
<text x="36" y="225" font-family="Arial,sans-serif" font-size="5.5" fill="#555">Тестостерон, Эстрогены, Прогестерон</text>

<!-- Right side: Blood glucose regulation diagram -->
<rect x="258" y="56" width="232" height="175" fill="white" fill-opacity="0.7" rx="6" stroke="#A5D6A7" stroke-width="1"/>
<text x="374" y="70" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Регуляция глюкозы в крови</text>
<line x1="268" y1="75" x2="480" y2="75" stroke="#A5D6A7" stroke-width="0.5"/>

<!-- Central glucose indicator -->
<circle cx="374" cy="140" r="22" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
<text x="374" y="137" font-family="Arial,sans-serif" font-size="7" fill="#F57F17" text-anchor="middle" font-weight="bold">Глюкоза</text>
<text x="374" y="147" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">крови</text>

<!-- HIGH glucose path (left, red) -->
<rect x="268" y="92" width="80" height="22" fill="#FFCDD2" rx="4" stroke="#E53935" stroke-width="0.8"/>
<text x="308" y="105" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">↑ Глюкоза</text>

<line x1="308" y1="114" x2="354" y2="128" stroke="#E53935" stroke-width="1" marker-end="none"/>
<polygon points="354,128 350,122 356,123" fill="#E53935"/>

<!-- Insulin release -->
<rect x="273" y="165" width="70" height="28" fill="#C8E6C9" rx="4" stroke="#2E7D32" stroke-width="0.8"/>
<text x="308" y="177" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Инсулин</text>
<text x="308" y="186" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">(β-клетки)</text>

<line x1="352" y1="140" x2="345" y2="165" stroke="#2E7D32" stroke-width="1"/>
<polygon points="345,165 342,158 348,159" fill="#2E7D32"/>
<text x="340" y="155" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" font-weight="bold">выделение</text>

<!-- Cell uptake -->
<rect x="268" y="200" width="80" height="22" fill="#E8F5E9" rx="4" stroke="#2E7D32" stroke-width="0.8"/>
<text x="308" y="210" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Клетки поглощают</text>
<text x="308" y="218" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">глюкозу</text>

<line x1="308" y1="193" x2="308" y2="200" stroke="#2E7D32" stroke-width="1"/>
<polygon points="308,200 305,195 311,195" fill="#2E7D32"/>

<!-- LOW glucose path (right, blue) -->
<rect x="400" y="92" width="80" height="22" fill="#BBDEFB" rx="4" stroke="#1565C0" stroke-width="0.8"/>
<text x="440" y="105" font-family="Arial,sans-serif" font-size="6" fill="#0D47A1" text-anchor="middle" font-weight="bold">↓ Глюкоза</text>

<line x1="400" y1="114" x2="394" y2="128" stroke="#1565C0" stroke-width="1"/>
<polygon points="394,128 391,122 397,123" fill="#1565C0"/>

<!-- Glucagon release -->
<rect x="405" y="165" width="70" height="28" fill="#FFE0B2" rx="4" stroke="#E65100" stroke-width="0.8"/>
<text x="440" y="177" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle" font-weight="bold">Глюкагон</text>
<text x="440" y="186" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">(α-клетки)</text>

<line x1="396" y1="140" x2="403" y2="165" stroke="#E65100" stroke-width="1"/>
<polygon points="403,165 400,158 406,159" fill="#E65100"/>
<text x="400" y="155" font-family="Arial,sans-serif" font-size="5" fill="#E65100" font-weight="bold">выделение</text>

<!-- Glycogen breakdown -->
<rect x="400" y="200" width="80" height="22" fill="#FFF3E0" rx="4" stroke="#E65100" stroke-width="0.8"/>
<text x="440" y="210" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle" font-weight="bold">Гликоген →</text>
<text x="440" y="218" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">глюкозу</text>

<line x1="440" y1="193" x2="440" y2="200" stroke="#E65100" stroke-width="1"/>
<polygon points="440,200 437,195 443,195" fill="#E65100"/>

<!-- Bottom: Feedback mechanism -->
<rect x="15" y="236" width="475" height="68" fill="white" fill-opacity="0.7" rx="6" stroke="#66BB6A" stroke-width="1"/>
<text x="252" y="250" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Механизм обратной связи (негативная обратная связь)</text>
<line x1="25" y1="255" x2="480" y2="255" stroke="#A5D6A7" stroke-width="0.5"/>

<!-- Feedback loop diagram -->
<rect x="30" y="262" width="80" height="18" fill="#E3F2FD" rx="3" stroke="#1565C0" stroke-width="0.6"/>
<text x="70" y="274" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle" font-weight="bold">Гипоталамус</text>

<line x1="110" y1="271" x2="130" y2="271" stroke="#555" stroke-width="0.8"/>
<polygon points="130,271 126,268 126,274" fill="#555"/>

<rect x="130" y="262" width="70" height="18" fill="#F3E5F5" rx="3" stroke="#7B1FA2" stroke-width="0.6"/>
<text x="165" y="274" font-family="Arial,sans-serif" font-size="5.5" fill="#7B1FA2" text-anchor="middle" font-weight="bold">Гипофиз</text>

<line x1="200" y1="271" x2="220" y2="271" stroke="#555" stroke-width="0.8"/>
<polygon points="220,271 216,268 216,274" fill="#555"/>

<rect x="220" y="262" width="90" height="18" fill="#FFF3E0" rx="3" stroke="#E65100" stroke-width="0.6"/>
<text x="265" y="274" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle" font-weight="bold">Железа (гормон)</text>

<line x1="310" y1="271" x2="330" y2="271" stroke="#555" stroke-width="0.8"/>
<polygon points="330,271 326,268 326,274" fill="#555"/>

<rect x="330" y="262" width="80" height="18" fill="#E8F5E9" rx="3" stroke="#2E7D32" stroke-width="0.6"/>
<text x="370" y="274" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle" font-weight="bold">Орган-мишень</text>

<!-- Feedback arrow going back -->
<path d="M370,280 L370,293 L70,293 L70,280" fill="none" stroke="#C62828" stroke-width="0.8" stroke-dasharray="3,1"/>
<polygon points="70,280 67,286 73,286" fill="#C62828"/>
<text x="220" y="299" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle" font-weight="bold">− Обратная связь (торможение при достаточном уровне гормона)</text>

<!-- Footer bar -->
<rect x="3" y="310" width="494" height="37" rx="0" fill="#2E7D32"/>
<rect x="3" y="340" width="494" height="7" rx="0 0 8 8" fill="#2E7D32"/>
<text x="250" y="328" font-family="Arial,sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Гормоны — биологически активные вещества, регулирующие функции организма</text>
<text x="250" y="340" font-family="Arial,sans-serif" font-size="7" fill="#C8E6C9" text-anchor="middle">Норма глюкозы крови: 3.3–5.5 ммоль/л (натощак)</text>
</svg>