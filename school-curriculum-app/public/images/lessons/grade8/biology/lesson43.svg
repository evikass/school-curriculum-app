<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="smellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8EAF6"/>
      <stop offset="100%" stop-color="#9FA8DA"/>
    </linearGradient>
    <linearGradient id="tasteGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFCC80"/>
    </linearGradient>
    <linearGradient id="touchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCE4EC"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial">Органы обоняния, вкуса и осязания</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial">Биология 8 класс — Урок 43</text>
  <line x1="15" y1="42" x2="485" y2="42" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- ===== SECTION 1: OLFACTION (обоняние) - top left ===== -->
  <rect x="15" y="48" width="155" height="185" rx="5" fill="url(#smellGrad)" fill-opacity="0.3" stroke="#3949AB" stroke-width="0.8"/>
  <text x="92" y="60" text-anchor="middle" font-size="8" font-weight="bold" fill="#1A237E" font-family="Arial">ОБОНЯНИЕ</text>

  <!-- Nasal cavity outline -->
  <path d="M 45 70 Q 40 80 38 110 Q 36 140 45 160 Q 55 175 70 180 Q 85 182 95 175 Q 100 170 100 160 Q 98 130 95 110 Q 90 85 80 70 Z" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.2"/>
  
  <!-- Nasal cavity interior -->
  <path d="M 55 90 Q 50 110 52 130 Q 55 150 65 160 Q 75 168 85 160 Q 90 150 88 130 Q 85 110 78 90 Z" fill="#C5CAE9" stroke="#3949AB" stroke-width="0.5"/>
  
  <!-- Olfactory epithelium (top area) -->
  <path d="M 50 80 Q 55 70 70 68 Q 80 67 85 72 Q 90 78 88 85" fill="#7986CB" stroke="#283593" stroke-width="1"/>
  
  <!-- Olfactory receptors (small dots) -->
  <circle cx="58" cy="78" r="1.5" fill="#1A237E"/>
  <circle cx="64" cy="74" r="1.5" fill="#1A237E"/>
  <circle cx="70" cy="72" r="1.5" fill="#1A237E"/>
  <circle cx="76" cy="73" r="1.5" fill="#1A237E"/>
  <circle cx="82" cy="76" r="1.5" fill="#1A237E"/>
  
  <!-- Olfactory nerve fibers going up -->
  <line x1="60" y1="76" x2="58" y2="68" stroke="#1A237E" stroke-width="0.5"/>
  <line x1="66" y1="72" x2="65" y2="64" stroke="#1A237E" stroke-width="0.5"/>
  <line x1="72" y1="70" x2="72" y2="62" stroke="#1A237E" stroke-width="0.5"/>
  <line x1="78" y1="71" x2="78" y2="63" stroke="#1A237E" stroke-width="0.5"/>
  
  <!-- Olfactory bulb -->
  <ellipse cx="68" cy="58" rx="22" ry="7" fill="#5C6BC0" stroke="#283593" stroke-width="1"/>
  <text x="68" y="61" text-anchor="middle" font-size="5" fill="white" font-family="Arial">Обонятельная луковица</text>
  
  <!-- Air flow arrows -->
  <path d="M 30 120 Q 40 115 50 120" fill="none" stroke="#7986CB" stroke-width="0.8"/>
  <polygon points="50,118 54,120 50,122" fill="#7986CB"/>
  <path d="M 30 140 Q 40 135 50 140" fill="none" stroke="#7986CB" stroke-width="0.8"/>
  <polygon points="50,138 54,140 50,142" fill="#7986CB"/>
  <text x="25" y="132" text-anchor="middle" font-size="5" fill="#3949AB" font-family="Arial">воздух</text>
  
  <!-- Labels -->
  <line x1="95" y1="78" x2="115" y2="70" stroke="#3949AB" stroke-width="0.5"/>
  <text x="116" y="68" font-size="6" font-weight="bold" fill="#1A237E" font-family="Arial">Обонятельный</text>
  <text x="116" y="76" font-size="6" font-weight="bold" fill="#1A237E" font-family="Arial">эпителий</text>
  
  <text x="92" y="175" text-anchor="middle" font-size="5.5" fill="#283593" font-family="Arial">Носовая полость</text>
  
  <!-- Olfactory info box -->
  <rect x="22" y="190" width="140" height="38" rx="3" fill="white" fill-opacity="0.8" stroke="#3949AB" stroke-width="0.5"/>
  <text x="92" y="200" text-anchor="middle" font-size="5.5" fill="#1A237E" font-family="Arial">≈10 млн обонятельных клеток</text>
  <text x="92" y="208" text-anchor="middle" font-size="5.5" fill="#1A237E" font-family="Arial">Человек различает &gt;10 000 запахов</text>
  <text x="92" y="216" text-anchor="middle" font-size="5.5" fill="#1A237E" font-family="Arial">Рецепторы → обонятельный нерв</text>
  <text x="92" y="224" text-anchor="middle" font-size="5.5" fill="#1A237E" font-family="Arial">→ височная доля коры</text>

  <!-- ===== SECTION 2: TASTE (вкус) - top center ===== -->
  <rect x="175" y="48" width="155" height="185" rx="5" fill="url(#tasteGrad)" fill-opacity="0.3" stroke="#E65100" stroke-width="0.8"/>
  <text x="252" y="60" text-anchor="middle" font-size="8" font-weight="bold" fill="#BF360C" font-family="Arial">ВКУС</text>

  <!-- Tongue outline -->
  <path d="M 220 80 Q 210 90 208 110 Q 206 135 215 155 Q 225 170 252 180 Q 280 170 290 155 Q 298 135 296 110 Q 294 90 285 80 Q 270 72 252 72 Q 235 72 220 80 Z" fill="#FFAB91" stroke="#D84315" stroke-width="1.2"/>
  
  <!-- Papillae dots on tongue -->
  <circle cx="235" cy="95" r="2" fill="#FF7043" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="245" cy="92" r="2" fill="#FF7043" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="255" cy="90" r="2" fill="#FF7043" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="265" cy="93" r="2" fill="#FF7043" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="275" cy="97" r="2" fill="#FF7043" stroke="#BF360C" stroke-width="0.3"/>
  <!-- Side papillae -->
  <circle cx="218" cy="115" r="2" fill="#FF8A65" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="216" cy="130" r="2" fill="#FF8A65" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="286" cy="115" r="2" fill="#FF8A65" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="288" cy="130" r="2" fill="#FF8A65" stroke="#BF360C" stroke-width="0.3"/>
  <!-- Root papillae -->
  <circle cx="235" cy="155" r="2.5" fill="#E64A19" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="245" cy="158" r="2.5" fill="#E64A19" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="255" cy="160" r="2.5" fill="#E64A19" stroke="#BF360C" stroke-width="0.3"/>
  <circle cx="265" cy="158" r="2.5" fill="#E64A19" stroke="#BF360C" stroke-width="0.3"/>
  
  <!-- Taste zones with labels -->
  <!-- Sweet - tip -->
  <line x1="252" y1="88" x2="252" y2="75" stroke="#4CAF50" stroke-width="0.6"/>
  <text x="252" y="73" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#2E7D32" font-family="Arial">Сладкий</text>
  
  <!-- Salty - sides -->
  <line x1="215" y1="120" x2="190" y2="115" stroke="#2196F3" stroke-width="0.6"/>
  <text x="188" y="113" text-anchor="end" font-size="5.5" font-weight="bold" fill="#1565C0" font-family="Arial">Солёный</text>
  <line x1="288" y1="120" x2="316" y2="115" stroke="#2196F3" stroke-width="0.6"/>
  <text x="318" y="113" font-size="5.5" font-weight="bold" fill="#1565C0" font-family="Arial">Солёный</text>
  
  <!-- Sour - sides -->
  <line x1="216" y1="135" x2="190" y2="135" stroke="#FFC107" stroke-width="0.6"/>
  <text x="188" y="133" text-anchor="end" font-size="5.5" font-weight="bold" fill="#F57F17" font-family="Arial">Кислый</text>
  <line x1="288" y1="135" x2="316" y2="135" stroke="#FFC107" stroke-width="0.6"/>
  <text x="318" y="133" font-size="5.5" font-weight="bold" fill="#F57F17" font-family="Arial">Кислый</text>
  
  <!-- Bitter - root -->
  <line x1="252" y1="165" x2="252" y2="185" stroke="#F44336" stroke-width="0.6"/>
  <text x="252" y="192" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#C62828" font-family="Arial">Горький</text>
  
  <!-- Papillae types -->
  <rect x="182" y="200" width="140" height="28" rx="3" fill="white" fill-opacity="0.8" stroke="#E65100" stroke-width="0.5"/>
  <text x="252" y="210" text-anchor="middle" font-size="5.5" fill="#BF360C" font-family="Arial">Сосочки: грибовидные, листовидные,</text>
  <text x="252" y="218" text-anchor="middle" font-size="5.5" fill="#BF360C" font-family="Arial">желобоватые (вкусовые луковицы)</text>
  <text x="252" y="226" text-anchor="middle" font-size="5.5" fill="#BF360C" font-family="Arial">≈10 000 вкусовых рецепторов</text>

  <!-- ===== SECTION 3: TOUCH (осязание) - top right ===== -->
  <rect x="335" y="48" width="150" height="185" rx="5" fill="url(#touchGrad)" fill-opacity="0.3" stroke="#AD1457" stroke-width="0.8"/>
  <text x="410" y="60" text-anchor="middle" font-size="8" font-weight="bold" fill="#880E4F" font-family="Arial">ОСЯЗАНИЕ</text>

  <!-- Skin cross-section -->
  <!-- Epidermis -->
  <rect x="355" y="68" width="110" height="18" rx="2" fill="#FFCCBC" stroke="#D84315" stroke-width="0.8"/>
  <text x="410" y="80" text-anchor="middle" font-size="5" fill="#BF360C" font-family="Arial">Эпидермис</text>
  
  <!-- Dermis -->
  <rect x="355" y="86" width="110" height="65" rx="2" fill="#FFAB91" stroke="#D84315" stroke-width="0.8"/>
  <text x="410" y="96" text-anchor="middle" font-size="5" fill="#BF360C" font-family="Arial">Дерма</text>
  
  <!-- Subcutaneous tissue -->
  <rect x="355" y="151" width="110" height="25" rx="2" fill="#FFE0B2" stroke="#E65100" stroke-width="0.8"/>
  <text x="410" y="167" text-anchor="middle" font-size="5" fill="#E65100" font-family="Arial">Подкожная клетчатка</text>

  <!-- Receptors in skin -->
  <!-- Meissner's corpuscles (прикосновение) - in dermis near epidermis -->
  <ellipse cx="375" cy="92" rx="6" ry="4" fill="#E91E63" stroke="#880E4F" stroke-width="0.8"/>
  <line x1="375" y1="88" x2="375" y2="72" stroke="#E91E63" stroke-width="0.5"/>
  
  <!-- Pacinian corpuscles (давление) - deep in dermis -->
  <ellipse cx="420" cy="130" rx="8" ry="6" fill="#9C27B0" stroke="#4A148C" stroke-width="0.8"/>
  <ellipse cx="420" cy="130" rx="5" ry="3.5" fill="#CE93D8"/>
  <ellipse cx="420" cy="130" rx="2.5" ry="1.5" fill="#E1BEE7"/>
  
  <!-- Free nerve endings (боль) - in epidermis -->
  <path d="M 395 70 L 393 75 L 397 78 L 395 82" fill="none" stroke="#F44336" stroke-width="0.8"/>
  <path d="M 400 70 L 398 74 L 402 77 L 400 81" fill="none" stroke="#F44336" stroke-width="0.8"/>
  
  <!-- Ruffini endings (тепло) -->
  <ellipse cx="440" cy="100" rx="7" ry="3" fill="#FF5722" stroke="#BF360C" stroke-width="0.8"/>
  
  <!-- Krause end bulbs (холод) -->
  <ellipse cx="370" cy="110" rx="5" ry="4" fill="#2196F3" stroke="#0D47A1" stroke-width="0.8"/>
  <circle cx="370" cy="110" r="2" fill="#90CAF9"/>
  
  <!-- Nerve fiber paths -->
  <path d="M 355 165 L 350 175 L 350 195" fill="none" stroke="#AD1457" stroke-width="1"/>
  <path d="M 465 165 L 470 175 L 470 195" fill="none" stroke="#AD1457" stroke-width="1"/>
  
  <!-- Receptor labels with lines -->
  <line x1="375" y1="88" x2="355" y2="70" stroke="#E91E63" stroke-width="0.4"/>
  <text x="353" y="66" font-size="4.5" fill="#880E4F" font-family="Arial">Мейснера</text>
  
  <line x1="420" y1="124" x2="448" y2="112" stroke="#9C27B0" stroke-width="0.4"/>
  <text x="448" y="110" font-size="4.5" fill="#4A148C" font-family="Arial">Пачини</text>
  
  <line x1="400" y1="70" x2="440" y2="63" stroke="#F44336" stroke-width="0.4"/>
  <text x="441" y="61" font-size="4.5" fill="#C62828" font-family="Arial">Своб.нерв.ок.</text>
  
  <line x1="440" y1="97" x2="462" y2="93" stroke="#FF5722" stroke-width="0.4"/>
  <text x="462" y="92" font-size="4.5" fill="#BF360C" font-family="Arial">Руффини</text>
  
  <line x1="370" y1="106" x2="345" y2="100" stroke="#2196F3" stroke-width="0.4"/>
  <text x="344" y="98" font-size="4.5" fill="#0D47A1" font-family="Arial">Краузе</text>

  <!-- Receptor legend -->
  <rect x="340" y="190" width="142" height="38" rx="3" fill="white" fill-opacity="0.8" stroke="#AD1457" stroke-width="0.5"/>
  <text x="345" y="200" font-size="5" fill="#E91E63" font-family="Arial">● Мейснера — прикосновение</text>
  <text x="345" y="208" font-size="5" fill="#9C27B0" font-family="Arial">● Пачини — давление</text>
  <text x="345" y="216" font-size="5" fill="#F44336" font-family="Arial">● Своб.окончания — боль</text>
  <text x="345" y="224" font-size="5" fill="#FF5722" font-family="Arial">● Руффини — тепло / Краузе — холод</text>

  <!-- ===== ANALYZER STRUCTURE PANEL (bottom center) ===== -->
  <rect x="15" y="238" width="470" height="48" rx="5" fill="white" fill-opacity="0.8" stroke="#2E7D32" stroke-width="1"/>
  <text x="250" y="250" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial">Строение анализатора</text>
  
  <!-- Analyzer chain -->
  <rect x="30" y="256" width="130" height="22" rx="10" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="95" y="270" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial">Рецептор</text>
  
  <polygon points="165,267 175,262 175,272" fill="#2E7D32"/>
  
  <rect x="180" y="256" width="140" height="22" rx="10" fill="#FFF9C4" stroke="#F9A825" stroke-width="1"/>
  <text x="250" y="270" text-anchor="middle" font-size="7" font-weight="bold" fill="#F57F17" font-family="Arial">Проводящий путь</text>
  
  <polygon points="325,267 335,262 335,272" fill="#2E7D32"/>
  
  <rect x="340" y="256" width="130" height="22" rx="10" fill="#BBDEFB" stroke="#1565C0" stroke-width="1"/>
  <text x="405" y="270" text-anchor="middle" font-size="7" font-weight="bold" fill="#0D47A1" font-family="Arial">Корковый центр</text>

  <!-- Specific analyzers -->
  <text x="95" y="283" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Обонятельные клетки</text>
  <text x="95" y="289" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Вкусовые сосочки</text>
  <text x="95" y="295" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Тактильные тельца</text>
  
  <text x="250" y="283" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Чувствительные нейроны</text>
  <text x="250" y="289" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">→ спинной мозг/ствол</text>
  <text x="250" y="295" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">→ таламус</text>
  
  <text x="405" y="283" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Обонятельная кора</text>
  <text x="405" y="289" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Вкусовая кора</text>
  <text x="405" y="295" text-anchor="middle" font-size="5" fill="#555" font-family="Arial">Соматосенсорная кора</text>

  <!-- ===== ADDITIONAL INFO ===== -->
  <rect x="15" y="308" width="230" height="25" rx="4" fill="white" fill-opacity="0.7" stroke="#3949AB" stroke-width="0.5"/>
  <text x="130" y="319" text-anchor="middle" font-size="5.5" fill="#1A237E" font-family="Arial">Обоняние и вкус тесно связаны (арома = запах + вкус)</text>
  <text x="130" y="327" text-anchor="middle" font-size="5.5" fill="#1A237E" font-family="Arial">При насморке пища кажется безвкусной</text>
  
  <rect x="255" y="308" width="230" height="25" rx="4" fill="white" fill-opacity="0.7" stroke="#AD1457" stroke-width="0.5"/>
  <text x="370" y="319" text-anchor="middle" font-size="5.5" fill="#880E4F" font-family="Arial">Кожа — самый большой орган чувств</text>
  <text x="370" y="327" text-anchor="middle" font-size="5.5" fill="#880E4F" font-family="Arial">Больше всего рецепторов на кончиках пальцев</text>

  <!-- Footer bar -->
  <rect x="0" y="338" width="500" height="12" rx="0" fill="#2E7D32"/>
  <text x="250" y="347" text-anchor="middle" font-size="7" fill="white" font-family="Arial">Анализаторы: рецепторы → чувствительные нейроны → корковые центры → ощущение</text>
</svg>