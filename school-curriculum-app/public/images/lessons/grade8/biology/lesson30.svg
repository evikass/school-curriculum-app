<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bg30" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="scale30" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A5D6A7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrow30" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" fill="url(#bg30)" rx="12"/>
  <rect width="500" height="350" fill="none" rx="12" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Title -->
  <text x="250" y="22" font-family="Arial, sans-serif" font-size="14" fill="#1B5E20" text-anchor="middle" font-weight="bold">Нормы питания. Энергетический баланс</text>
  <text x="250" y="34" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 8 класс — Урок 30</text>
  <line x1="15" y1="40" x2="485" y2="40" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- CENTRAL: Energy Balance Scale -->
  <rect x="12" y="46" width="305" height="160" rx="6" fill="white" opacity="0.45" stroke="#4CAF50" stroke-width="0.8"/>
  <text x="164" y="58" font-family="Arial, sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Энергетический баланс</text>

  <!-- Scale fulcrum -->
  <polygon points="164,115 155,130 173,130" fill="url(#scale30)" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="164" y1="100" x2="164" y2="115" stroke="#2E7D32" stroke-width="1.5"/>
  <!-- Base -->
  <rect x="140" y="130" width="48" height="6" rx="2" fill="#2E7D32"/>

  <!-- Balance beam (slightly tilted) -->
  <line x1="60" y1="97" x2="268" y2="103" stroke="#388E3C" stroke-width="2.5" stroke-linecap="round"/>

  <!-- LEFT PAN: Energy Intake -->
  <path d="M35 97 L35 100 Q35 108 60 108 Q85 108 85 100 L85 97" fill="none" stroke="#388E3C" stroke-width="1"/>
  <line x1="35" y1="97" x2="60" y2="97" stroke="#388E3C" stroke-width="0.8"/>
  <line x1="85" y1="97" x2="60" y2="97" stroke="#388E3C" stroke-width="0.8"/>
  <line x1="60" y1="97" x2="60" y2="91" stroke="#388E3C" stroke-width="0.8"/>

  <rect x="35" y="108" width="50" height="16" rx="2" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.5"/>
  <text x="60" y="118" font-family="Arial, sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Поступление</text>

  <!-- Food items in left pan -->
  <rect x="38" y="78" width="12" height="10" rx="2" fill="#FFE082" stroke="#FFA000" stroke-width="0.4"/>
  <text x="44" y="86" font-family="Arial, sans-serif" font-size="4" fill="#E65100" text-anchor="middle">Хлеб</text>
  <rect x="52" y="76" width="12" height="10" rx="2" fill="#EF9A9A" stroke="#E53935" stroke-width="0.4"/>
  <text x="58" y="84" font-family="Arial, sans-serif" font-size="4" fill="#C62828" text-anchor="middle">Мясо</text>
  <rect x="66" y="78" width="12" height="10" rx="2" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.4"/>
  <text x="72" y="86" font-family="Arial, sans-serif" font-size="4" fill="#2E7D32" text-anchor="middle">Овощи</text>

  <!-- RIGHT PAN: Energy Expenditure -->
  <path d="M240 103 L240 106 Q240 114 265 114 Q290 114 290 106 L290 103" fill="none" stroke="#388E3C" stroke-width="1"/>
  <line x1="240" y1="103" x2="265" y2="103" stroke="#388E3C" stroke-width="0.8"/>
  <line x1="290" y1="103" x2="265" y2="103" stroke="#388E3C" stroke-width="0.8"/>
  <line x1="265" y1="103" x2="265" y2="97" stroke="#388E3C" stroke-width="0.8"/>

  <rect x="233" y="114" width="64" height="16" rx="2" fill="#E3F2FD" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="265" y="124" font-family="Arial, sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">Расход энергии</text>

  <!-- Expenditure pie chart -->
  <circle cx="265" cy="86" r="16" fill="white" stroke="#90CAF9" stroke-width="0.5"/>
  <!-- Basal metabolism ~60% -->
  <path d="M265 70 A16 16 0 1 1 249 84 Z" fill="#42A5F5" opacity="0.7"/>
  <!-- Physical activity ~30% -->
  <path d="M249 84 A16 16 0 0 1 260 71 Z" fill="#FF9800" opacity="0.7"/>
  <!-- Digestion ~10% -->
  <path d="M260 71 A16 16 0 0 1 265 70 Z" fill="#66BB6A" opacity="0.7"/>

  <text x="261" y="88" font-family="Arial, sans-serif" font-size="5" fill="white" text-anchor="middle" font-weight="bold">60%</text>
  <text x="253" y="78" font-family="Arial, sans-serif" font-size="4" fill="white" text-anchor="middle" font-weight="bold">30%</text>
  <text x="264" y="72" font-family="Arial, sans-serif" font-size="3.5" fill="#1B5E20" text-anchor="middle">10%</text>

  <!-- Pie legend -->
  <rect x="96" y="140" width="210" height="58" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.4"/>
  <rect x="102" y="148" width="8" height="6" rx="1" fill="#42A5F5" opacity="0.7"/>
  <text x="114" y="154" font-family="Arial, sans-serif" font-size="6" fill="#1565C0">Основной обмен (~60%) — работа органов в покое</text>
  <rect x="102" y="160" width="8" height="6" rx="1" fill="#FF9800" opacity="0.7"/>
  <text x="114" y="166" font-family="Arial, sans-serif" font-size="6" fill="#E65100">Физическая активность (~30%) — движение, труд</text>
  <rect x="102" y="172" width="8" height="6" rx="1" fill="#66BB6A" opacity="0.7"/>
  <text x="114" y="178" font-family="Arial, sans-serif" font-size="6" fill="#2E7D32">Пищеварение (~10%) — усвоение пищи</text>
  <text x="200" y="192" font-family="Arial, sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Поступление = Расход → стабильный вес</text>

  <!-- RIGHT: Three Body Types -->
  <rect x="324" y="46" width="164" height="160" rx="5" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="406" y="58" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Типы массы тела</text>

  <!-- Underweight -->
  <rect x="334" y="66" width="48" height="132" rx="3" fill="#E3F2FD" stroke="#90CAF9" stroke-width="0.5"/>
  <!-- Thin body silhouette -->
  <ellipse cx="358" cy="82" rx="8" ry="9" fill="#BBDEFB" stroke="#64B5F6" stroke-width="0.6"/>
  <rect x="353" y="91" width="10" height="28" rx="3" fill="#BBDEFB" stroke="#64B5F6" stroke-width="0.6"/>
  <rect x="348" y="95" width="6" height="20" rx="2" fill="#BBDEFB" stroke="#64B5F6" stroke-width="0.5" transform="rotate(-15,348,95)"/>
  <rect x="362" y="95" width="6" height="20" rx="2" fill="#BBDEFB" stroke="#64B5F6" stroke-width="0.5" transform="rotate(15,368,95)"/>
  <rect x="352" y="119" width="5" height="22" rx="2" fill="#BBDEFB" stroke="#64B5F6" stroke-width="0.5"/>
  <rect x="359" y="119" width="5" height="22" rx="2" fill="#BBDEFB" stroke="#64B5F6" stroke-width="0.5"/>
  <text x="358" y="150" font-family="Arial, sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle" font-weight="bold">Недостаток</text>
  <text x="358" y="158" font-family="Arial, sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">ИМТ &lt; 18.5</text>
  <text x="358" y="167" font-family="Arial, sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">Дефицит</text>
  <text x="358" y="175" font-family="Arial, sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">массы</text>
  <text x="358" y="190" font-family="Arial, sans-serif" font-size="4.5" fill="#888" text-anchor="middle">↑ Риск инфекций</text>

  <!-- Normal -->
  <rect x="384" y="66" width="48" height="132" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
  <!-- Normal body silhouette -->
  <ellipse cx="408" cy="82" rx="9" ry="9" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.6"/>
  <rect x="402" y="91" width="12" height="30" rx="4" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.6"/>
  <rect x="395" y="95" width="7" height="22" rx="2" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.5" transform="rotate(-10,395,95)"/>
  <rect x="414" y="95" width="7" height="22" rx="2" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.5" transform="rotate(10,421,95)"/>
  <rect x="401" y="121" width="6" height="24" rx="2" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.5"/>
  <rect x="409" y="121" width="6" height="24" rx="2" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.5"/>
  <text x="408" y="150" font-family="Arial, sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Норма</text>
  <text x="408" y="158" font-family="Arial, sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">ИМТ 18.5-25</text>
  <text x="408" y="167" font-family="Arial, sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">Здоровый</text>
  <text x="408" y="175" font-family="Arial, sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">вес</text>
  <text x="408" y="190" font-family="Arial, sans-serif" font-size="4.5" fill="#2E7D32" text-anchor="middle">✓ Оптимально</text>

  <!-- Overweight -->
  <rect x="434" y="66" width="48" height="132" rx="3" fill="#FFF3E0" stroke="#FFB74D" stroke-width="0.5"/>
  <!-- Heavy body silhouette -->
  <ellipse cx="458" cy="82" rx="10" ry="9" fill="#FFE0B2" stroke="#FFA726" stroke-width="0.6"/>
  <rect x="446" y="91" width="24" height="32" rx="8" fill="#FFE0B2" stroke="#FFA726" stroke-width="0.6"/>
  <rect x="439" y="95" width="8" height="20" rx="3" fill="#FFE0B2" stroke="#FFA726" stroke-width="0.5" transform="rotate(-8,439,95)"/>
  <rect x="470" y="95" width="8" height="20" rx="3" fill="#FFE0B2" stroke="#FFA726" stroke-width="0.5" transform="rotate(8,478,95)"/>
  <rect x="449" y="123" width="8" height="24" rx="3" fill="#FFE0B2" stroke="#FFA726" stroke-width="0.5"/>
  <rect x="459" y="123" width="8" height="24" rx="3" fill="#FFE0B2" stroke="#FFA726" stroke-width="0.5"/>
  <text x="458" y="150" font-family="Arial, sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle" font-weight="bold">Избыток</text>
  <text x="458" y="158" font-family="Arial, sans-serif" font-size="5" fill="#E65100" text-anchor="middle">ИМТ &gt; 25</text>
  <text x="458" y="167" font-family="Arial, sans-serif" font-size="5" fill="#E65100" text-anchor="middle">Избыточная</text>
  <text x="458" y="175" font-family="Arial, sans-serif" font-size="5" fill="#E65100" text-anchor="middle">масса</text>
  <text x="458" y="190" font-family="Arial, sans-serif" font-size="4.5" fill="#888" text-anchor="middle">↑ Риск диабета</text>

  <!-- BOTTOM LEFT: Daily Caloric Needs -->
  <rect x="12" y="212" width="235" height="80" rx="5" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="130" y="224" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Суточная потребность (ккал)</text>

  <!-- Table -->
  <rect x="20" y="230" width="219" height="55" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.4"/>
  <!-- Header -->
  <rect x="20" y="230" width="219" height="10" rx="3" fill="#2E7D32" opacity="0.15"/>
  <text x="82" y="238" font-family="Arial, sans-serif" font-size="5.5" fill="#1B5E20" font-weight="bold" text-anchor="middle">Категория</text>
  <text x="175" y="238" font-family="Arial, sans-serif" font-size="5.5" fill="#1B5E20" font-weight="bold" text-anchor="middle">Энергия (ккал)</text>

  <line x1="140" y1="230" x2="140" y2="285" stroke="#A5D6A7" stroke-width="0.3"/>

  <text x="82" y="249" font-family="Arial, sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Подростки 13-15 лет</text>
  <text x="175" y="249" font-family="Arial, sans-serif" font-size="5.5" fill="#333" text-anchor="middle">2200-2500</text>

  <text x="82" y="259" font-family="Arial, sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Подростки 16-17 лет</text>
  <text x="175" y="259" font-family="Arial, sans-serif" font-size="5.5" fill="#333" text-anchor="middle">2500-2900</text>

  <text x="82" y="269" font-family="Arial, sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Взрослые (малоподв.)</text>
  <text x="175" y="269" font-family="Arial, sans-serif" font-size="5.5" fill="#333" text-anchor="middle">2000-2200</text>

  <text x="82" y="279" font-family="Arial, sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Взрослые (активные)</text>
  <text x="175" y="279" font-family="Arial, sans-serif" font-size="5.5" fill="#333" text-anchor="middle">2800-3200</text>

  <!-- BOTTOM RIGHT: BMI Panel -->
  <rect x="255" y="212" width="233" height="80" rx="5" fill="white" opacity="0.7" stroke="#2E7D32" stroke-width="0.7"/>
  <text x="371" y="224" font-family="Arial, sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Индекс массы тела (ИМТ)</text>

  <!-- BMI Formula -->
  <rect x="263" y="230" width="218" height="18" rx="3" fill="#FFF8E1" stroke="#FFB74D" stroke-width="0.5"/>
  <text x="372" y="242" font-family="Arial, sans-serif" font-size="8" fill="#E65100" text-anchor="middle" font-weight="bold">ИМТ = масса(кг) / рост²(м²)</text>

  <!-- BMI Categories -->
  <rect x="263" y="252" width="52" height="10" rx="2" fill="#BBDEFB" stroke="#64B5F6" stroke-width="0.4"/>
  <text x="289" y="260" font-family="Arial, sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">&lt;18.5 Дефицит</text>

  <rect x="318" y="252" width="70" height="10" rx="2" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.4"/>
  <text x="353" y="260" font-family="Arial, sans-serif" font-size="5.5" fill="#1B5E20" text-anchor="middle">18.5-25 Норма</text>

  <rect x="391" y="252" width="45" height="10" rx="2" fill="#FFE0B2" stroke="#FFA726" stroke-width="0.4"/>
  <text x="413" y="260" font-family="Arial, sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">25-30 Лишн.</text>

  <rect x="439" y="252" width="42" height="10" rx="2" fill="#FFCDD2" stroke="#EF9A9A" stroke-width="0.4"/>
  <text x="460" y="260" font-family="Arial, sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">&gt;30 Ожир.</text>

  <!-- Example calculation -->
  <rect x="263" y="266" width="218" height="22" rx="3" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.4"/>
  <text x="372" y="276" font-family="Arial, sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Пример: масса=55 кг, рост=1.65 м</text>
  <text x="372" y="285" font-family="Arial, sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">ИМТ = 55 / (1.65 × 1.65) = 55 / 2.72 = 20.2 — Норма ✓</text>

  <!-- Key note -->
  <rect x="12" y="298" width="476" height="18" rx="4" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.5"/>
  <text x="250" y="310" font-family="Arial, sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="middle" font-weight="bold">Энергетический баланс = Поступление энергии − Расход энергии | Баланс = 0 → стабильный вес</text>

  <!-- Footer -->
  <rect x="0" y="335" width="500" height="15" rx="0" fill="#2E7D32"/>
  <text x="250" y="346" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="bold">Нормы питания зависят от возраста, пола и активности | ИМТ — показатель здоровья</text>
</svg>