<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Роль бактерий в природе и жизни человека</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial, sans-serif">Биология 7 класс — Урок 5</text>
  <line x1="15" y1="41" x2="485" y2="41" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- ============ BENEFICIAL ROLES (LEFT SIDE) ============ -->
  <text x="130" y="56" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Полезные бактерии</text>

  <!-- Редуценты (Decomposers) -->
  <rect x="15" y="62" width="120" height="50" rx="5" fill="white" stroke="#2E7D32" stroke-width="0.8" opacity="0.92"/>
  <!-- Decomposition cycle icon -->
  <circle cx="48" cy="80" r="10" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M42,76 Q48,72 54,76" fill="none" stroke="#2E7D32" stroke-width="0.8"/>
  <polygon points="54,74 56,78 52,77" fill="#2E7D32"/>
  <path d="M54,84 Q48,88 42,84" fill="none" stroke="#795548" stroke-width="0.8"/>
  <polygon points="42,86 40,82 44,83" fill="#795548"/>
  <text x="48" y="85" text-anchor="middle" font-size="5" fill="#2E7D32" font-family="Arial, sans-serif">♻</text>
  <text x="92" y="76" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#2E7D32" font-family="Arial, sans-serif">Редуценты</text>
  <text x="92" y="85" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Разложение органики</text>
  <text x="92" y="93" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Круговорот веществ</text>
  <text x="92" y="101" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Органика → CO₂ + H₂O</text>

  <!-- Азотфиксация (Nitrogen fixation) -->
  <rect x="15" y="118" width="120" height="50" rx="5" fill="white" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
  <!-- Root nodules icon -->
  <path d="M35,145 Q40,128 48,130 Q56,132 52,145" fill="#81C784" stroke="#2E7D32" stroke-width="0.8"/>
  <path d="M45,130 L45,120 M50,132 L55,122" stroke="#795548" stroke-width="0.8"/>
  <circle cx="42" cy="138" r="3" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
  <circle cx="48" cy="140" r="3" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
  <circle cx="47" cy="134" r="2.5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
  <text x="92" y="132" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#1565C0" font-family="Arial, sans-serif">Азотфиксация</text>
  <text x="92" y="141" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Клубеньки бобовых</text>
  <text x="92" y="149" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">N₂ → NH₃</text>
  <text x="92" y="157" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Ризобии, азотобактер</text>

  <!-- Молочнокислые (Lactic acid bacteria) -->
  <rect x="15" y="174" width="120" height="50" rx="5" fill="white" stroke="#F57F17" stroke-width="0.8" opacity="0.92"/>
  <!-- Yogurt/cheese icon -->
  <rect x="32" y="190" width="14" height="16" rx="2" fill="#FFF9C4" stroke="#F57F17" stroke-width="0.7"/>
  <rect x="34" y="186" width="10" height="5" rx="2" fill="#FFF9C4" stroke="#F57F17" stroke-width="0.5"/>
  <text x="39" y="202" text-anchor="middle" font-size="5" fill="#F57F17" font-family="Arial, sans-serif">🧀</text>
  <text x="92" y="188" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#F57F17" font-family="Arial, sans-serif">Молочнокислые</text>
  <text x="92" y="197" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Йогурт, кефир, сыр</text>
  <text x="92" y="205" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Квашение, силос</text>
  <text x="92" y="213" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Лактобациллы</text>

  <!-- Антибиотики (Antibiotics) -->
  <rect x="15" y="230" width="120" height="50" rx="5" fill="white" stroke="#C62828" stroke-width="0.8" opacity="0.92"/>
  <!-- Penicillium icon -->
  <line x1="42" y1="248" x2="42" y2="235" stroke="#66BB6A" stroke-width="1.2"/>
  <path d="M38,238 Q42,234 46,238" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
  <circle cx="38" cy="240" r="2" fill="#81C784" stroke="#2E7D32" stroke-width="0.3"/>
  <circle cx="46" cy="240" r="2" fill="#81C784" stroke="#2E7D32" stroke-width="0.3"/>
  <line x1="48" y1="248" x2="48" y2="238" stroke="#66BB6A" stroke-width="0.8"/>
  <path d="M45,241 Q48,238 51,241" fill="none" stroke="#66BB6A" stroke-width="0.6"/>
  <text x="92" y="244" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#C62828" font-family="Arial, sans-serif">Антибиотики</text>
  <text x="92" y="253" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Пенициллин (гриб, но</text>
  <text x="92" y="261" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">стрептомицин — бактерии</text>
  <text x="92" y="269" text-anchor="middle" font-size="5" fill="#555" font-family="Arial, sans-serif">Streptomyces)</text>

  <!-- ============ HARMFUL BACTERIA (RIGHT TOP) ============ -->
  <rect x="310" y="62" width="178" height="72" rx="6" fill="white" stroke="#C62828" stroke-width="1" opacity="0.92"/>
  <text x="399" y="76" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#C62828" font-family="Arial, sans-serif">Вредные бактерии (Патогены)</text>
  <line x1="320" y1="80" x2="478" y2="80" stroke="#C62828" stroke-width="0.5" opacity="0.4"/>

  <!-- Disease icons -->
  <circle cx="335" cy="94" r="6" fill="#FFCDD2" stroke="#C62828" stroke-width="0.7"/>
  <text x="335" y="97" text-anchor="middle" font-size="6" fill="#C62828" font-family="Arial, sans-serif">🦠</text>
  <text x="348" y="94" font-size="5.5" fill="#333" font-family="Arial, sans-serif">Туберкулёз</text>
  <text x="348" y="102" font-size="4.5" fill="#888" font-family="Arial, sans-serif">Mycobacterium</text>

  <circle cx="335" cy="112" r="6" fill="#FFCDD2" stroke="#C62828" stroke-width="0.7"/>
  <text x="335" y="115" text-anchor="middle" font-size="6" fill="#C62828" font-family="Arial, sans-serif">⚠</text>
  <text x="348" y="112" font-size="5.5" fill="#333" font-family="Arial, sans-serif">Холера</text>
  <text x="348" y="120" font-size="4.5" fill="#888" font-family="Arial, sans-serif">Vibrio cholerae</text>

  <circle cx="420" cy="94" r="6" fill="#FFCDD2" stroke="#C62828" stroke-width="0.7"/>
  <text x="420" y="97" text-anchor="middle" font-size="6" fill="#C62828" font-family="Arial, sans-serif">⚠</text>
  <text x="433" y="94" font-size="5.5" fill="#333" font-family="Arial, sans-serif">Столбняк</text>
  <text x="433" y="102" font-size="4.5" fill="#888" font-family="Arial, sans-serif">Clostridium tetani</text>

  <circle cx="420" cy="112" r="6" fill="#FFCDD2" stroke="#C62828" stroke-width="0.7"/>
  <text x="420" y="115" text-anchor="middle" font-size="6" fill="#C62828" font-family="Arial, sans-serif">⚠</text>
  <text x="433" y="112" font-size="5.5" fill="#333" font-family="Arial, sans-serif">Сальмонеллёз</text>
  <text x="433" y="120" font-size="4.5" fill="#888" font-family="Arial, sans-serif">Salmonella</text>

  <!-- ============ NITROGEN CYCLE DIAGRAM (CENTER-RIGHT) ============ -->
  <rect x="145" y="62" width="158" height="72" rx="6" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.92"/>
  <text x="224" y="76" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Круговорот азота</text>
  <line x1="155" y1="80" x2="293" y2="80" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>

  <!-- N2 at top -->
  <rect x="204" y="84" width="40" height="14" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.7"/>
  <text x="224" y="94" text-anchor="middle" font-size="7" font-weight="bold" fill="#1565C0" font-family="Arial, sans-serif">N₂</text>
  <text x="224" y="102" text-anchor="middle" font-size="4.5" fill="#888" font-family="Arial, sans-serif">Атмосфера</text>

  <!-- Arrow down: N2 → NH3 -->
  <line x1="210" y1="100" x2="185" y2="110" stroke="#1565C0" stroke-width="0.8"/>
  <polygon points="185,110 182,106 187,107" fill="#1565C0"/>
  <text x="188" y="107" font-size="4" fill="#1565C0" font-family="Arial, sans-serif">Фиксация</text>

  <!-- NH3 -->
  <rect x="163" y="112" width="36" height="12" rx="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="181" y="121" text-anchor="middle" font-size="6" font-weight="bold" fill="#2E7D32" font-family="Arial, sans-serif">NH₃</text>

  <!-- Arrow: NH3 → NO2 -->
  <line x1="199" y1="118" x2="215" y2="118" stroke="#F57F17" stroke-width="0.7"/>
  <polygon points="215,116 219,118 215,120" fill="#F57F17"/>

  <!-- NO2 -->
  <rect x="219" y="112" width="36" height="12" rx="3" fill="#FFF9C4" stroke="#F57F17" stroke-width="0.6"/>
  <text x="237" y="121" text-anchor="middle" font-size="6" font-weight="bold" fill="#F57F17" font-family="Arial, sans-serif">NO₂⁻</text>

  <!-- Arrow: NO2 → NO3 -->
  <line x1="255" y1="118" x2="271" y2="118" stroke="#FF9800" stroke-width="0.7"/>
  <polygon points="271,116 275,118 271,120" fill="#FF9800"/>

  <!-- NO3 -->
  <rect x="275" y="112" width="24" height="12" rx="3" fill="#FFE0B2" stroke="#E65100" stroke-width="0.6"/>
  <text x="287" y="121" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#E65100" font-family="Arial, sans-serif">NO₃⁻</text>

  <!-- Arrow down from NO3 to Plants -->
  <line x1="287" y1="124" x2="287" y2="128" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="287" y="132" text-anchor="middle" font-size="4.5" fill="#2E7D32" font-family="Arial, sans-serif">Растения</text>

  <!-- Arrow from Plants to Animals -->
  <line x1="280" y1="133" x2="248" y2="133" stroke="#795548" stroke-width="0.6"/>
  <text x="260" y="131" font-size="4.5" fill="#795548" font-family="Arial, sans-serif">Животные</text>

  <!-- Denitrification arrow back -->
  <path d="M163,125 Q155,130 165,132" fill="none" stroke="#C62828" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="155" y="130" font-size="3.5" fill="#C62828" font-family="Arial, sans-serif">Дени-</text>
  <text x="155" y="134" font-size="3.5" fill="#C62828" font-family="Arial, sans-serif">триф.</text>

  <!-- ============ NITROGEN CYCLE DETAILED (BOTTOM) ============ -->
  <rect x="145" y="142" width="345" height="60" rx="6" fill="white" stroke="#2E7D32" stroke-width="0.8" opacity="0.92"/>
  <text x="318" y="155" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Подробный круговорот азота в природе</text>
  <line x1="155" y1="159" x2="480" y2="159" stroke="#2E7D32" stroke-width="0.3" opacity="0.4"/>

  <!-- Flow: N2 → NH3 → NO2 → NO3 → Plants → Animals → Decomposition → N2 -->
  <rect x="155" y="164" width="40" height="16" rx="3" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.6"/>
  <text x="175" y="175" text-anchor="middle" font-size="6" font-weight="bold" fill="#1565C0" font-family="Arial, sans-serif">N₂</text>

  <line x1="195" y1="172" x2="203" y2="172" stroke="#1565C0" stroke-width="0.8"/>
  <polygon points="203,170 207,172 203,174" fill="#1565C0"/>
  <text x="200" y="168" font-size="4" fill="#1565C0" font-family="Arial, sans-serif">Азот-</text>
  <text x="200" y="164" font-size="4" fill="#1565C0" font-family="Arial, sans-serif">фиксация</text>

  <rect x="207" y="164" width="36" height="16" rx="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="225" y="175" text-anchor="middle" font-size="6" font-weight="bold" fill="#2E7D32" font-family="Arial, sans-serif">NH₃</text>

  <line x1="243" y1="172" x2="251" y2="172" stroke="#F57F17" stroke-width="0.8"/>
  <polygon points="251,170 255,172 251,174" fill="#F57F17"/>
  <text x="249" y="168" font-size="4" fill="#F57F17" font-family="Arial, sans-serif">Нитри-</text>
  <text x="249" y="164" font-size="4" fill="#F57F17" font-family="Arial, sans-serif">фикация</text>

  <rect x="255" y="164" width="36" height="16" rx="3" fill="#FFF9C4" stroke="#F57F17" stroke-width="0.6"/>
  <text x="273" y="175" text-anchor="middle" font-size="6" font-weight="bold" fill="#F57F17" font-family="Arial, sans-serif">NO₂⁻</text>

  <line x1="291" y1="172" x2="299" y2="172" stroke="#FF9800" stroke-width="0.8"/>
  <polygon points="299,170 303,172 299,174" fill="#FF9800"/>

  <rect x="303" y="164" width="32" height="16" rx="3" fill="#FFE0B2" stroke="#E65100" stroke-width="0.6"/>
  <text x="319" y="175" text-anchor="middle" font-size="6" font-weight="bold" fill="#E65100" font-family="Arial, sans-serif">NO₃⁻</text>

  <line x1="335" y1="172" x2="343" y2="172" stroke="#2E7D32" stroke-width="0.8"/>
  <polygon points="343,170 347,172 343,174" fill="#2E7D32"/>

  <rect x="347" y="164" width="40" height="16" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.6"/>
  <text x="367" y="175" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#2E7D32" font-family="Arial, sans-serif">Растения</text>

  <line x1="387" y1="172" x2="395" y2="172" stroke="#795548" stroke-width="0.8"/>
  <polygon points="395,170 399,172 395,174" fill="#795548"/>

  <rect x="399" y="164" width="42" height="16" rx="3" fill="#FCE4EC" stroke="#C62828" stroke-width="0.6"/>
  <text x="420" y="175" text-anchor="middle" font-size="5.5" font-weight="bold" fill="#C62828" font-family="Arial, sans-serif">Животные</text>

  <!-- Return arrow -->
  <path d="M420,180 L420,192 L175,192 L175,180" fill="none" stroke="#795548" stroke-width="0.8"/>
  <polygon points="175,182 173,178 177,178" fill="#795548"/>
  <text x="297" y="197" text-anchor="middle" font-size="4.5" fill="#795548" font-family="Arial, sans-serif">Редуценты: разложение → NH₃ (аммонификация)</text>

  <!-- ============ ADDITIONAL INFO (BOTTOM LEFT) ============ -->
  <rect x="145" y="208" width="345" height="50" rx="6" fill="white" stroke="#66BB6A" stroke-width="0.7" opacity="0.85"/>
  <text x="318" y="220" text-anchor="middle" font-size="7" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Бактерии в жизни человека</text>
  <line x1="155" y1="224" x2="480" y2="224" stroke="#2E7D32" stroke-width="0.3" opacity="0.4"/>

  <text x="155" y="234" font-size="5.5" fill="#2E7D32" font-family="Arial, sans-serif">&#x2714; Кишечная микрофлора — пищеварение, иммунитет</text>
  <text x="155" y="243" font-size="5.5" fill="#2E7D32" font-family="Arial, sans-serif">&#x2714; Производство витаминов (K, B₁₂) кишечными бактериями</text>
  <text x="340" y="234" font-size="5.5" fill="#2E7D32" font-family="Arial, sans-serif">&#x2714; Очистка сточных вод</text>
  <text x="340" y="243" font-size="5.5" fill="#2E7D32" font-family="Arial, sans-serif">&#x2714; Биоремедиация (очистка почвы)</text>
  <text x="155" y="253" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">&#x2716; Пищевые отравления, инфекции, порча продуктов</text>
  <text x="340" y="253" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">&#x2716; Биологическое оружие (сибирская язва)</text>

  <!-- ============ KEY CONCEPTS (BOTTOM) ============ -->
  <rect x="15" y="286" width="470" height="30" rx="5" fill="white" stroke="#66BB6A" stroke-width="0.7" opacity="0.85"/>
  <text x="250" y="298" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Главный вывод: Бактерии — необходимая часть биосферы</text>
  <text x="250" y="308" text-anchor="middle" font-size="6" fill="#333" font-family="Arial, sans-serif">Полезная роль преобладает: круговорот веществ, азотфиксация, симбиоз, биотехнологии | Патогены — меньшинство</text>

  <!-- Footer -->
  <rect x="0" y="325" width="500" height="25" rx="0" fill="#2E7D32"/>
  <rect x="0" y="325" width="500" height="12" rx="0" fill="#2E7D32"/>
  <rect x="0" y="337" width="500" height="13" rx="0 0 12 12" fill="#2E7D32"/>
  <text x="250" y="342" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="Arial, sans-serif">Урок 5: Роль бактерий в природе и жизни человека</text>
</svg>