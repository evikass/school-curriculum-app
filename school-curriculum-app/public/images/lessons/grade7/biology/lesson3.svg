<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#BBDEFB"/>
      <stop offset="100%" style="stop-color:#90CAF9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="500" height="350" rx="12" ry="12" fill="url(#bg)" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Title -->
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Строение и жизнедеятельность бактерий</text>
  <text x="250" y="35" text-anchor="middle" font-size="9" fill="#666" font-family="Arial, sans-serif">Биология 7 класс — Урок 3</text>
  <line x1="15" y1="41" x2="485" y2="41" stroke="#2E7D32" stroke-width="0.8" opacity="0.5"/>

  <!-- ============ 4 BACTERIAL SHAPES ============ -->
  <text x="250" y="55" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Формы бактерий</text>

  <!-- Кокки (spheres) -->
  <rect x="15" y="60" width="115" height="48" rx="5" fill="white" stroke="#1565C0" stroke-width="0.8" opacity="0.92"/>
  <circle cx="45" cy="80" r="7" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="59" cy="80" r="7" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="73" cy="80" r="7" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="52" cy="90" r="7" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <circle cx="66" cy="90" r="7" fill="#90CAF9" stroke="#1565C0" stroke-width="0.8"/>
  <text x="98" y="78" text-anchor="middle" font-size="7" font-weight="bold" fill="#1565C0" font-family="Arial, sans-serif">Кокки</text>
  <text x="98" y="88" text-anchor="middle" font-size="5.5" fill="#555" font-family="Arial, sans-serif">Шарообразные</text>
  <text x="98" y="97" text-anchor="middle" font-size="5" fill="#888" font-family="Arial, sans-serif">(стафилококк,</text>
  <text x="98" y="105" text-anchor="middle" font-size="5" fill="#888" font-family="Arial, sans-serif">стрептококк)</text>

  <!-- Бациллы (rods) -->
  <rect x="138" y="60" width="115" height="48" rx="5" fill="white" stroke="#2E7D32" stroke-width="0.8" opacity="0.92"/>
  <rect x="150" y="73" width="22" height="9" rx="4.5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <rect x="150" y="87" width="22" height="9" rx="4.5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <rect x="178" y="80" width="22" height="9" rx="4.5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="225" y="78" text-anchor="middle" font-size="7" font-weight="bold" fill="#2E7D32" font-family="Arial, sans-serif">Бациллы</text>
  <text x="225" y="88" text-anchor="middle" font-size="5.5" fill="#555" font-family="Arial, sans-serif">Палочковидные</text>
  <text x="225" y="97" text-anchor="middle" font-size="5" fill="#888" font-family="Arial, sans-serif">(кишечная</text>
  <text x="225" y="105" text-anchor="middle" font-size="5" fill="#888" font-family="Arial, sans-serif">палочка)</text>

  <!-- Вибрионы (comma) -->
  <rect x="261" y="60" width="115" height="48" rx="5" fill="white" stroke="#E65100" stroke-width="0.8" opacity="0.92"/>
  <path d="M280,82 Q280,72 290,72 Q298,72 298,82 Q298,90 290,92" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <path d="M302,85 Q302,75 312,75 Q320,75 320,85 Q320,93 312,95" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
  <text x="352" y="78" text-anchor="middle" font-size="7" font-weight="bold" fill="#E65100" font-family="Arial, sans-serif">Вибрионы</text>
  <text x="352" y="88" text-anchor="middle" font-size="5.5" fill="#555" font-family="Arial, sans-serif">Запятой</text>
  <text x="352" y="97" text-anchor="middle" font-size="5" fill="#888" font-family="Arial, sans-serif">(холерный</text>
  <text x="352" y="105" text-anchor="middle" font-size="5" fill="#888" font-family="Arial, sans-serif">вибрион)</text>

  <!-- Спирохеты (spiral) -->
  <rect x="384" y="60" width="105" height="48" rx="5" fill="white" stroke="#6A1B9A" stroke-width="0.8" opacity="0.92"/>
  <path d="M400,76 Q408,70 412,76 Q416,82 424,76 Q428,70 436,76 Q440,82 448,76" fill="none" stroke="#AB47BC" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M400,90 Q408,84 412,90 Q416,96 424,90 Q428,84 436,90 Q440,96 448,90" fill="none" stroke="#CE93D8" stroke-width="2" stroke-linecap="round"/>
  <text x="460" y="85" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#6A1B9A" font-family="Arial, sans-serif">Спиро-</text>
  <text x="460" y="94" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#6A1B9A" font-family="Arial, sans-serif">хеты</text>
  <text x="460" y="105" text-anchor="middle" font-size="5" fill="#888" font-family="Arial, sans-serif">(боррелия)</text>

  <!-- ============ BACTERIAL CELL STRUCTURE ============ -->
  <text x="175" y="122" text-anchor="middle" font-size="8" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Строение бактериальной клетки</text>

  <!-- Cell body (large oval) -->
  <ellipse cx="175" cy="200" rx="72" ry="48" fill="url(#cellGrad)" stroke="#1565C0" stroke-width="1.5"/>

  <!-- Capsule (outer layer) -->
  <ellipse cx="175" cy="200" rx="80" ry="55" fill="none" stroke="#0D47A1" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.6"/>

  <!-- Cell wall (inner border) -->
  <ellipse cx="175" cy="200" rx="68" ry="44" fill="none" stroke="#1565C0" stroke-width="1.8"/>

  <!-- Cell membrane -->
  <ellipse cx="175" cy="200" rx="62" ry="39" fill="none" stroke="#42A5F5" stroke-width="1" stroke-dasharray="2,1"/>

  <!-- Nucleoid (irregular region) -->
  <path d="M155,185 Q165,175 180,180 Q195,185 190,200 Q185,210 170,208 Q155,205 155,185 Z" fill="#7986CB" stroke="#303F9F" stroke-width="0.8" opacity="0.7"/>
  <text x="173" y="196" text-anchor="middle" font-size="5" font-weight="bold" fill="#1A237E" font-family="Arial, sans-serif">Нуклеоид</text>

  <!-- Ribosomes (small dots) -->
  <circle cx="145" cy="195" r="2.5" fill="#FF7043" stroke="#BF360C" stroke-width="0.4"/>
  <circle cx="155" cy="210" r="2.5" fill="#FF7043" stroke="#BF360C" stroke-width="0.4"/>
  <circle cx="200" cy="190" r="2.5" fill="#FF7043" stroke="#BF360C" stroke-width="0.4"/>
  <circle cx="195" cy="215" r="2.5" fill="#FF7043" stroke="#BF360C" stroke-width="0.4"/>
  <circle cx="140" cy="208" r="2.5" fill="#FF7043" stroke="#BF360C" stroke-width="0.4"/>
  <circle cx="205" cy="205" r="2.5" fill="#FF7043" stroke="#BF360C" stroke-width="0.4"/>

  <!-- Plasmid (small circle) -->
  <circle cx="150" cy="188" r="5" fill="none" stroke="#FF9800" stroke-width="1"/>
  <text x="150" y="189.5" text-anchor="middle" font-size="3.5" fill="#E65100" font-family="Arial, sans-serif">P</text>

  <!-- Flagellum (wavy tail) -->
  <path d="M247,200 Q255,192 260,200 Q265,208 272,200 Q277,192 284,200 Q289,208 296,200" fill="none" stroke="#1565C0" stroke-width="1.2"/>

  <!-- Pili (short hairs) -->
  <line x1="108" y1="188" x2="100" y2="182" stroke="#5C6BC0" stroke-width="0.8"/>
  <line x1="106" y1="198" x2="97" y2="196" stroke="#5C6BC0" stroke-width="0.8"/>
  <line x1="110" y1="210" x2="102" y2="215" stroke="#5C6BC0" stroke-width="0.8"/>
  <line x1="115" y1="220" x2="108" y2="227" stroke="#5C6BC0" stroke-width="0.8"/>

  <!-- Labels with lines -->
  <!-- Capsule label -->
  <line x1="240" y1="155" x2="218" y2="162" stroke="#0D47A1" stroke-width="0.5"/>
  <text x="242" y="153" font-size="6" font-weight="bold" fill="#0D47A1" font-family="Arial, sans-serif">Капсула</text>

  <!-- Cell wall label -->
  <line x1="248" y1="170" x2="230" y2="176" stroke="#1565C0" stroke-width="0.5"/>
  <text x="250" y="172" font-size="6" font-weight="bold" fill="#1565C0" font-family="Arial, sans-serif">Клеточная стенка</text>

  <!-- Membrane label -->
  <line x1="248" y1="186" x2="228" y2="190" stroke="#42A5F5" stroke-width="0.5"/>
  <text x="250" y="188" font-size="6" font-weight="bold" fill="#42A5F5" font-family="Arial, sans-serif">Мембрана</text>

  <!-- Ribosomes label -->
  <line x1="210" y1="215" x2="200" y2="215" stroke="#BF360C" stroke-width="0.5"/>
  <text x="212" y="217" font-size="6" font-weight="bold" fill="#BF360C" font-family="Arial, sans-serif">Рибосомы</text>

  <!-- Plasmid label -->
  <line x1="140" y1="230" x2="148" y2="215" stroke="#E65100" stroke-width="0.5"/>
  <text x="118" y="237" font-size="6" font-weight="bold" fill="#E65100" font-family="Arial, sans-serif">Плазмида</text>

  <!-- Flagellum label -->
  <text x="278" y="192" font-size="6" font-weight="bold" fill="#1565C0" font-family="Arial, sans-serif">Жгутик</text>
  <line x1="276" y1="194" x2="270" y2="198" stroke="#1565C0" stroke-width="0.5"/>

  <!-- Pili label -->
  <text x="85" y="180" font-size="6" font-weight="bold" fill="#5C6BC0" font-family="Arial, sans-serif">Пили</text>

  <!-- ============ PROKARYOTE VS EUKARYOTE COMPARISON ============ -->
  <rect x="320" y="118" width="170" height="165" rx="6" fill="white" stroke="#2E7D32" stroke-width="1" opacity="0.92"/>
  <text x="405" y="132" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Прокариоты vs Эукариоты</text>
  <line x1="330" y1="136" x2="480" y2="136" stroke="#2E7D32" stroke-width="0.5" opacity="0.4"/>

  <!-- Table header -->
  <rect x="330" y="139" width="75" height="14" rx="2" fill="#C62828" opacity="0.15"/>
  <text x="367" y="149" text-anchor="middle" font-size="6" font-weight="bold" fill="#C62828" font-family="Arial, sans-serif">Прокариоты</text>
  <rect x="407" y="139" width="75" height="14" rx="2" fill="#1565C0" opacity="0.15"/>
  <text x="444" y="149" text-anchor="middle" font-size="6" font-weight="bold" fill="#1565C0" font-family="Arial, sans-serif">Эукариоты</text>

  <!-- Comparison rows -->
  <text x="330" y="163" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">Ядра нет</text>
  <text x="407" y="163" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">Ядро есть</text>

  <line x1="330" y1="167" x2="480" y2="167" stroke="#ddd" stroke-width="0.3"/>

  <text x="330" y="175" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">Нуклеоид (ДНК)</text>
  <text x="407" y="175" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">Ядерная ДНК</text>

  <line x1="330" y1="179" x2="480" y2="179" stroke="#ddd" stroke-width="0.3"/>

  <text x="330" y="187" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">70S рибосомы</text>
  <text x="407" y="187" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">80S рибосомы</text>

  <line x1="330" y1="191" x2="480" y2="191" stroke="#ddd" stroke-width="0.3"/>

  <text x="330" y="199" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">Нет митохондрий</text>
  <text x="407" y="199" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">Митохондрии есть</text>

  <line x1="330" y1="203" x2="480" y2="203" stroke="#ddd" stroke-width="0.3"/>

  <text x="330" y="211" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">Нет ЭПС</text>
  <text x="407" y="211" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">ЭПС развита</text>

  <line x1="330" y1="215" x2="480" y2="215" stroke="#ddd" stroke-width="0.3"/>

  <text x="330" y="223" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">Размер 0.5–5 мкм</text>
  <text x="407" y="223" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">Размер 10–100 мкм</text>

  <line x1="330" y1="227" x2="480" y2="227" stroke="#ddd" stroke-width="0.3"/>

  <text x="330" y="235" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">1 кольцевая ДНК</text>
  <text x="407" y="235" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">Несколько хромосом</text>

  <line x1="330" y1="239" x2="480" y2="239" stroke="#ddd" stroke-width="0.3"/>

  <text x="330" y="247" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">Плазмиды есть</text>
  <text x="407" y="247" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">Плазмид нет</text>

  <line x1="330" y1="251" x2="480" y2="251" stroke="#ddd" stroke-width="0.3"/>

  <text x="330" y="259" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">Деление надвое</text>
  <text x="407" y="259" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">Митоз / мейоз</text>

  <line x1="330" y1="263" x2="480" y2="263" stroke="#ddd" stroke-width="0.3"/>

  <text x="330" y="271" font-size="5.5" fill="#C62828" font-family="Arial, sans-serif">Муреиновая стенка</text>
  <text x="407" y="271" font-size="5.5" fill="#1565C0" font-family="Arial, sans-serif">Хитин/целлюлоза</text>

  <!-- ============ BOTTOM INFO ============ -->
  <rect x="15" y="288" width="470" height="28" rx="5" fill="white" stroke="#66BB6A" stroke-width="0.7" opacity="0.85"/>
  <text x="250" y="300" text-anchor="middle" font-size="6.5" font-weight="bold" fill="#1B5E20" font-family="Arial, sans-serif">Бактерии — прокариоты: нет оформленного ядра, мембранных органоидов</text>
  <text x="250" y="311" text-anchor="middle" font-size="6" fill="#333" font-family="Arial, sans-serif">Размеры: 0.5–5 мкм | Обитают везде: почва, вода, воздух, организмы | Аэробы и анаэробы</text>

  <!-- Footer -->
  <rect x="0" y="325" width="500" height="25" rx="0" fill="#2E7D32"/>
  <rect x="0" y="325" width="500" height="12" rx="0" fill="#2E7D32"/>
  <rect x="0" y="337" width="500" height="13" rx="0 0 12 12" fill="#2E7D32"/>
  <text x="250" y="342" text-anchor="middle" font-size="8" font-weight="bold" fill="white" font-family="Arial, sans-serif">Урок 3: Строение и жизнедеятельность бактерий</text>
</svg>