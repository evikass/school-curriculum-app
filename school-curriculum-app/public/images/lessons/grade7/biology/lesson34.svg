<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="26" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32" text-anchor="middle">Опыление</text>
<text x="250" y="40" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 7 класс — Урок 34</text>
<line x1="30" y1="46" x2="470" y2="46" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- ====== SELF vs CROSS POLLINATION (top section) ====== -->
<text x="140" y="62" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Самоопыление</text>
<text x="370" y="62" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Перекрёстное опыление</text>

<!-- Vertical divider -->
<line x1="250" y1="52" x2="250" y2="128" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Self-pollination flower -->
<g transform="translate(60,68)">
  <!-- Single flower -->
  <line x1="80" y1="55" x2="80" y2="68" stroke="#388E3C" stroke-width="2"/>
  <ellipse cx="80" cy="50" rx="6" ry="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
  <!-- Petals -->
  <path d="M72,44 Q68,35 75,32 Q80,36 78,42" fill="#F48FB1" stroke="#C2185B" stroke-width="0.5"/>
  <path d="M88,44 Q92,35 85,32 Q80,36 82,42" fill="#F48FB1" stroke="#C2185B" stroke-width="0.5"/>
  <path d="M76,40 Q72,30 80,28 Q85,32 80,40" fill="#F48FB1" stroke="#C2185B" stroke-width="0.5"/>
  <!-- Stamen bending toward stigma (selfing) -->
  <line x1="76" y1="42" x2="80" y2="35" stroke="#FFB300" stroke-width="0.8"/>
  <ellipse cx="80" cy="33" rx="2.5" ry="3.5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
  <!-- Stigma -->
  <path d="M78,30 Q80,26 82,30" fill="#9C27B0" stroke="#6A1B9A" stroke-width="0.8"/>
  <!-- Arrow showing pollen falling on own stigma -->
  <path d="M80,37 L80,31" stroke="#FF6F00" stroke-width="0.8" stroke-dasharray="2,1"/>
  <polygon points="78,31 82,31 80,28" fill="#FF6F00"/>
  <text x="80" y="78" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Пыльца на своё рыльце</text>
  <text x="80" y="86" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Горох, пшеница</text>
</g>

<!-- Cross-pollination flowers -->
<g transform="translate(270,68)">
  <!-- Flower 1 (left) -->
  <line x1="45" y1="55" x2="45" y2="68" stroke="#388E3C" stroke-width="2"/>
  <ellipse cx="45" cy="50" rx="6" ry="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
  <path d="M37,44 Q33,35 40,32 Q45,36 43,42" fill="#F48FB1" stroke="#C2185B" stroke-width="0.5"/>
  <path d="M53,44 Q57,35 50,32 Q45,36 47,42" fill="#F48FB1" stroke="#C2185B" stroke-width="0.5"/>
  <path d="M41,40 Q37,30 45,28 Q50,32 45,40" fill="#F48FB1" stroke="#C2185B" stroke-width="0.5"/>
  <!-- Stamens with pollen -->
  <line x1="42" y1="42" x2="40" y2="35" stroke="#FFB300" stroke-width="0.8"/>
  <ellipse cx="39" cy="33" rx="2.5" ry="3.5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
  <line x1="48" y1="42" x2="50" y2="35" stroke="#FFB300" stroke-width="0.8"/>
  <ellipse cx="51" cy="33" rx="2.5" ry="3.5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>

  <!-- Flower 2 (right) -->
  <line x1="120" y1="55" x2="120" y2="68" stroke="#388E3C" stroke-width="2"/>
  <ellipse cx="120" cy="50" rx="6" ry="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.6"/>
  <path d="M112,44 Q108,35 115,32 Q120,36 118,42" fill="#CE93D8" stroke="#6A1B9A" stroke-width="0.5"/>
  <path d="M128,44 Q132,35 125,32 Q120,36 122,42" fill="#CE93D8" stroke="#6A1B9A" stroke-width="0.5"/>
  <path d="M116,40 Q112,30 120,28 Q125,32 120,40" fill="#CE93D8" stroke="#6A1B9A" stroke-width="0.5"/>
  <!-- Stigma (receiving) -->
  <path d="M118,30 Q120,26 122,30" fill="#9C27B0" stroke="#6A1B9A" stroke-width="0.8"/>

  <!-- Arrow showing pollen transfer between flowers -->
  <path d="M54,33 Q82,15 116,29" fill="none" stroke="#FF6F00" stroke-width="1.2" stroke-dasharray="3,2"/>
  <polygon points="114,27 118,30 115,32" fill="#FF6F00"/>
  <!-- Pollen grains along path -->
  <circle cx="70" cy="22" r="1.5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
  <circle cx="85" cy="19" r="1.5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
  <circle cx="100" cy="22" r="1.5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>

  <text x="82" y="80" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Пыльца на рыльце другого цветка</text>
  <text x="82" y="88" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Яблоня, клевер</text>
</g>

<!-- Separator line -->
<line x1="30" y1="155" x2="470" y2="155" stroke="#2E7D32" stroke-width="1" opacity="0.25"/>

<!-- ====== POLLINATION TYPES (main section) ====== -->
<text x="250" y="168" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Типы перекрёстного опыления</text>

<!-- === Анемофилия (Wind pollination) — left === -->
<g transform="translate(15,175)">
  <rect x="0" y="0" width="150" height="105" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8" opacity="0.4"/>
  <text x="75" y="14" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#E65100" text-anchor="middle">Анемофилия (ветер)</text>

  <!-- Birch catkin -->
  <line x1="40" y1="80" x2="40" y2="25" stroke="#795548" stroke-width="1.5"/>
  <!-- Pendulous catkin -->
  <ellipse cx="40" cy="50" rx="5" ry="18" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Small flowers on catkin -->
  <circle cx="38" cy="38" r="1.5" fill="#BCAAA4" stroke="#795548" stroke-width="0.3"/>
  <circle cx="42" cy="43" r="1.5" fill="#BCAAA4" stroke="#795548" stroke-width="0.3"/>
  <circle cx="38" cy="48" r="1.5" fill="#BCAAA4" stroke="#795548" stroke-width="0.3"/>
  <circle cx="42" cy="53" r="1.5" fill="#BCAAA4" stroke="#795548" stroke-width="0.3"/>
  <circle cx="38" cy="58" r="1.5" fill="#BCAAA4" stroke="#795548" stroke-width="0.3"/>

  <!-- Wind arrows -->
  <path d="M60,35 L90,32" stroke="#90CAF9" stroke-width="1" opacity="0.8"/>
  <path d="M60,45 L95,42" stroke="#90CAF9" stroke-width="1" opacity="0.8"/>
  <path d="M60,55 L90,52" stroke="#90CAF9" stroke-width="1" opacity="0.8"/>
  <!-- Pollen grains blown -->
  <circle cx="95" cy="30" r="1.8" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
  <circle cx="100" cy="40" r="1.8" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
  <circle cx="92" cy="50" r="1.8" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
  <circle cx="105" cy="35" r="1.5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>
  <circle cx="110" cy="45" r="1.5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>

  <!-- Features list -->
  <text x="75" y="78" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Мелкие цветки, много пыльцы</text>
  <text x="75" y="86" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Нет нектара и ярких лепестков</text>
  <text x="75" y="96" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Берёза, злаки, ольха</text>
</g>

<!-- === Энтомофилия (Insect pollination) — center === -->
<g transform="translate(175,175)">
  <rect x="0" y="0" width="150" height="105" rx="4" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="0.8" opacity="0.4"/>
  <text x="75" y="14" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#6A1B9A" text-anchor="middle">Энтомофилия (насекомые)</text>

  <!-- Showy flower -->
  <line x1="55" y1="75" x2="55" y2="90" stroke="#388E3C" stroke-width="1.5"/>
  <ellipse cx="55" cy="70" rx="5" ry="4" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Bright petals -->
  <path d="M45,64 Q35,50 42,40 Q52,45 50,58" fill="#E91E63" stroke="#C2185B" stroke-width="0.6"/>
  <path d="M65,64 Q75,50 68,40 Q58,45 60,58" fill="#E91E63" stroke="#C2185B" stroke-width="0.6"/>
  <path d="M50,60 Q38,42 48,32 Q55,42 55,55" fill="#E91E63" stroke="#C2185B" stroke-width="0.6"/>
  <path d="M60,60 Q72,42 62,32 Q55,42 55,55" fill="#E91E63" stroke="#C2185B" stroke-width="0.6"/>
  <!-- Center with nectar -->
  <circle cx="55" cy="52" r="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
  <text x="55" y="54" font-family="Arial,sans-serif" font-size="4" fill="#E65100" text-anchor="middle">nectar</text>

  <!-- Bee -->
  <ellipse cx="100" cy="38" rx="8" ry="5" fill="#FFD54F" stroke="#F9A825" stroke-width="0.8"/>
  <line x1="93" y1="36" x2="107" y2="36" stroke="#333" stroke-width="0.8"/>
  <line x1="93" y1="40" x2="107" y2="40" stroke="#333" stroke-width="0.8"/>
  <!-- Wings -->
  <ellipse cx="97" cy="33" rx="6" ry="3" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.3" opacity="0.7"/>
  <ellipse cx="103" cy="33" rx="6" ry="3" fill="#B3E5FC" stroke="#0288D1" stroke-width="0.3" opacity="0.7"/>
  <!-- Antennae -->
  <line x1="108" y1="37" x2="115" y2="32" stroke="#333" stroke-width="0.5"/>
  <line x1="108" y1="39" x2="116" y2="35" stroke="#333" stroke-width="0.5"/>
  <!-- Arrow showing bee approaching -->
  <path d="M90,42 L70,50" stroke="#6A1B9A" stroke-width="0.8" stroke-dasharray="2,1"/>

  <!-- Features list -->
  <text x="75" y="78" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Яркие цветки, нектар, аромат</text>
  <text x="75" y="86" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Липкая пыльца, липкое рыльце</text>
  <text x="75" y="96" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Яблоня, клевер, шиповник</text>
</g>

<!-- === Орнитофилия (Bird pollination) — right === -->
<g transform="translate(335,175)">
  <rect x="0" y="0" width="150" height="105" rx="4" fill="#FFEBEE" stroke="#B71C1C" stroke-width="0.8" opacity="0.4"/>
  <text x="75" y="14" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#B71C1C" text-anchor="middle">Орнитофилия (птицы)</text>

  <!-- Tubular red flower -->
  <line x1="55" y1="75" x2="55" y2="90" stroke="#388E3C" stroke-width="1.5"/>
  <!-- Tubular corolla -->
  <path d="M50,72 L48,40 Q48,28 55,25 Q62,28 62,40 L60,72" fill="#F44336" stroke="#C62828" stroke-width="0.8"/>
  <!-- Petal lobes -->
  <path d="M48,28 Q42,20 38,22 Q42,26 48,30" fill="#EF5350" stroke="#C62828" stroke-width="0.5"/>
  <path d="M62,28 Q68,20 72,22 Q68,26 62,30" fill="#EF5350" stroke="#C62828" stroke-width="0.5"/>
  <path d="M52,26 Q50,16 53,13 Q56,16 55,25" fill="#EF5350" stroke="#C62828" stroke-width="0.5"/>
  <path d="M58,26 Q60,16 57,13 Q54,16 55,25" fill="#EF5350" stroke="#C62828" stroke-width="0.5"/>
  <!-- Nectar at base -->
  <ellipse cx="55" cy="68" rx="4" ry="2" fill="#FFD54F" stroke="#F9A825" stroke-width="0.3"/>

  <!-- Hummingbird silhouette -->
  <ellipse cx="95" cy="40" rx="7" ry="4" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Head -->
  <circle cx="104" cy="38" r="3" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Beak (long) -->
  <line x1="107" y1="37" x2="62" y2="30" stroke="#795548" stroke-width="1"/>
  <!-- Wings -->
  <path d="M90,38 Q82,25 78,22" fill="none" stroke="#388E3C" stroke-width="1"/>
  <path d="M90,42 Q82,50 78,55" fill="none" stroke="#388E3C" stroke-width="1"/>
  <!-- Tail -->
  <path d="M88,42 Q80,48 75,50" fill="none" stroke="#388E3C" stroke-width="0.8"/>

  <!-- Features list -->
  <text x="75" y="78" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Красные трубчатые цветки</text>
  <text x="75" y="86" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Много нектара, нет запаха</text>
  <text x="75" y="96" font-family="Arial,sans-serif" font-size="5" fill="#888" text-anchor="middle">Эвкалипт, фуксия (тропики)</text>
</g>

<!-- ====== Bottom section: Artificial pollination + adaptations summary ====== -->
<line x1="30" y1="290" x2="470" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.25"/>

<g transform="translate(15,295)">
  <rect x="0" y="0" width="470" height="32" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5" opacity="0.7"/>
  <text x="235" y="11" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Искусственное опыление в сельском хозяйстве</text>
  <text x="235" y="22" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Перенос пыльцы вручную или кисточкой для повышения урожайности (томат, огурец в теплицах)</text>
  <text x="235" y="30" font-family="Arial,sans-serif" font-size="5" fill="#555" text-anchor="middle">Самоопыление → однообразие потомства | Перекрёстное → разнообразие, лучшая приспособленность</text>
</g>

<!-- Decorative elements -->
<path d="M470,325 Q475,315 485,318 Q490,322 483,328 Q476,332 470,325Z" fill="#66BB6A" opacity="0.4"/>
<path d="M15,325 Q10,315 5,318 Q0,322 7,328 Q14,332 15,325Z" fill="#66BB6A" opacity="0.4"/>
</svg>