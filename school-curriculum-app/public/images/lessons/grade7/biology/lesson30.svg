<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="26" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32" text-anchor="middle">Стебель. Внутреннее строение</text>
<text x="250" y="40" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 7 класс — Урок 30</text>
<line x1="30" y1="46" x2="470" y2="46" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- STEM CROSS-SECTION (main diagram) -->
<text x="155" y="62" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Поперечный срез стебля</text>

<g transform="translate(20,68)">
<!-- Outer bark - Пробка (cork) -->
<circle cx="130" cy="80" r="72" fill="#8D6E63" stroke="#5D4037" stroke-width="1.5"/>
<!-- Phloem - Луб -->
<circle cx="130" cy="80" r="62" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1"/>
<!-- Cambium - Камбий -->
<circle cx="130" cy="80" r="50" fill="#FFF176" stroke="#F9A825" stroke-width="1.5"/>
<!-- Xylem - Древесина -->
<circle cx="130" cy="80" r="46" fill="#BCAAA4" stroke="#8D6E63" stroke-width="1"/>
<!-- Pith - Сердцевина -->
<circle cx="130" cy="80" r="20" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>

<!-- Annual rings inside xylem -->
<circle cx="130" cy="80" r="42" fill="none" stroke="#795548" stroke-width="0.5"/>
<circle cx="130" cy="80" r="37" fill="none" stroke="#795548" stroke-width="0.5"/>
<circle cx="130" cy="80" r="32" fill="none" stroke="#795548" stroke-width="0.5"/>
<circle cx="130" cy="80" r="27" fill="none" stroke="#795548" stroke-width="0.5"/>

<!-- Vascular bundle detail (sector) -->
<!-- Phloem fibers -->
<rect x="162" y="60" width="3" height="5" rx="0.5" fill="#2E7D32" opacity="0.6"/>
<rect x="162" y="70" width="3" height="5" rx="0.5" fill="#2E7D32" opacity="0.6"/>
<rect x="162" y="80" width="3" height="5" rx="0.5" fill="#2E7D32" opacity="0.6"/>
<!-- Sieve tubes -->
<circle cx="168" cy="63" r="2" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.5"/>
<circle cx="168" cy="73" r="2" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.5"/>
<circle cx="168" cy="83" r="2" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.5"/>

<!-- Xylem vessels -->
<circle cx="186" cy="62" r="3.5" fill="#D7CCC8" stroke="#795548" stroke-width="0.8"/>
<circle cx="186" cy="72" r="3" fill="#D7CCC8" stroke="#795548" stroke-width="0.8"/>
<circle cx="191" cy="80" r="2.5" fill="#D7CCC8" stroke="#795548" stroke-width="0.8"/>
<circle cx="182" cy="85" r="2.5" fill="#D7CCC8" stroke="#795548" stroke-width="0.8"/>

<!-- LABELS with leader lines -->
<!-- Пробка -->
<line x1="195" y1="20" x2="170" y2="25" stroke="#5D4037" stroke-width="0.7"/>
<text x="197" y="18" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" font-weight="bold">Пробка</text>
<text x="197" y="26" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(защита)</text>

<!-- Кора label -->
<line x1="215" y1="40" x2="185" y2="38" stroke="#5D4037" stroke-width="0.7"/>
<text x="217" y="38" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" font-weight="bold">Кора</text>
<text x="217" y="46" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(пробка + луб)</text>

<!-- Луб -->
<line x1="210" y1="60" x2="178" y2="62" stroke="#2E7D32" stroke-width="0.7"/>
<text x="212" y="58" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" font-weight="bold">Луб</text>
<text x="212" y="66" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(флоэма)</text>

<!-- Камбий -->
<line x1="210" y1="82" x2="178" y2="78" stroke="#F9A825" stroke-width="0.7"/>
<text x="212" y="80" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" font-weight="bold">Камбий</text>
<text x="212" y="88" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(образовательная)</text>

<!-- Древесина -->
<line x1="210" y1="105" x2="175" y2="98" stroke="#795548" stroke-width="0.7"/>
<text x="212" y="103" font-family="Arial,sans-serif" font-size="7" fill="#795548" font-weight="bold">Древесина</text>
<text x="212" y="111" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(ксилема)</text>

<!-- Сердцевина -->
<line x1="160" y1="135" x2="140" y2="100" stroke="#F9A825" stroke-width="0.7"/>
<text x="162" y="133" font-family="Arial,sans-serif" font-size="7" fill="#F9A825" font-weight="bold">Сердцевина</text>
<text x="162" y="141" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(запас веществ)</text>

<!-- Годичные кольца label -->
<text x="108" y="68" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">годичные</text>
<text x="108" y="74" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">кольца</text>
</g>

<!-- PHLOEM DETAIL -->
<text x="420" y="62" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Луб (флоэма)</text>

<g transform="translate(355,68)">
<rect x="0" y="0" width="120" height="52" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>

<!-- Sieve tube element -->
<rect x="10" y="6" width="22" height="38" rx="2" fill="#C8E6C9" stroke="#4CAF50" stroke-width="1"/>
<!-- Sieve plate -->
<line x1="10" y1="22" x2="32" y2="22" stroke="#2E7D32" stroke-width="1.5"/>
<circle cx="17" cy="22" r="1.5" fill="#2E7D32"/>
<circle cx="25" cy="22" r="1.5" fill="#2E7D32"/>
<!-- Companion cell -->
<rect x="36" y="6" width="12" height="38" rx="2" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
<circle cx="42" cy="15" r="2" fill="#4CAF50" opacity="0.5"/>
<circle cx="42" cy="30" r="2" fill="#4CAF50" opacity="0.5"/>

<!-- Phloem fibers -->
<rect x="56" y="6" width="4" height="38" rx="1" fill="#2E7D32" opacity="0.7"/>
<rect x="63" y="6" width="4" height="38" rx="1" fill="#2E7D32" opacity="0.7"/>

<!-- Labels -->
<text x="21" y="50" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">ситовидная</text>
<text x="42" y="50" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">клетка-</text>
<text x="60" y="50" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">лубяные</text>
<text x="21" y="56" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">трубка</text>
<text x="42" y="56" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">спутница</text>
<text x="60" y="56" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">волокна</text>

<!-- Arrow showing flow direction -->
<path d="M80,8 L80,42" stroke="#1565C0" stroke-width="1.5" fill="none" marker-end="url(#ar30d)"/>
<text x="100" y="20" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">органич.</text>
<text x="100" y="27" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">вещества</text>
<text x="100" y="34" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">ВНИЗ ↓</text>
<defs><marker id="ar30d" markerWidth="5" markerHeight="4" refX="2.5" refY="4" orient="auto"><path d="M0,0 L5,0 L2.5,4Z" fill="#1565C0"/></marker></defs>
</g>

<!-- XYLEM DETAIL -->
<text x="420" y="135" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Древесина (ксилема)</text>

<g transform="translate(355,140)">
<rect x="0" y="0" width="120" height="52" rx="4" fill="#EFEBE9" stroke="#795548" stroke-width="0.8"/>

<!-- Vessel (large) -->
<rect x="8" y="6" width="16" height="38" rx="2" fill="#D7CCC8" stroke="#795548" stroke-width="1"/>
<line x1="10" y1="16" x2="22" y2="16" stroke="#795548" stroke-width="0.5" stroke-dasharray="1"/>
<line x1="10" y1="26" x2="22" y2="26" stroke="#795548" stroke-width="0.5" stroke-dasharray="1"/>
<line x1="10" y1="36" x2="22" y2="36" stroke="#795548" stroke-width="0.5" stroke-dasharray="1"/>

<!-- Tracheid -->
<rect x="30" y="6" width="10" height="38" rx="2" fill="#BCAAA4" stroke="#795548" stroke-width="0.8"/>
<line x1="32" y1="14" x2="38" y2="14" stroke="#795548" stroke-width="0.3"/>
<line x1="32" y1="22" x2="38" y2="22" stroke="#795548" stroke-width="0.3"/>
<line x1="32" y1="30" x2="38" y2="30" stroke="#795548" stroke-width="0.3"/>
<line x1="32" y1="38" x2="38" y2="38" stroke="#795548" stroke-width="0.3"/>

<!-- Wood fibers -->
<rect x="46" y="6" width="4" height="38" rx="1" fill="#795548" opacity="0.6"/>
<rect x="53" y="6" width="4" height="38" rx="1" fill="#795548" opacity="0.6"/>
<rect x="60" y="6" width="4" height="38" rx="1" fill="#795548" opacity="0.6"/>

<!-- Labels -->
<text x="16" y="50" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">сосуд</text>
<text x="35" y="50" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">трахеида</text>
<text x="55" y="50" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">волокна</text>

<!-- Arrow showing flow direction -->
<path d="M78,42 L78,8" stroke="#E65100" stroke-width="1.5" fill="none" marker-end="url(#ar30u)"/>
<text x="98" y="20" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">вода и</text>
<text x="98" y="27" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">минералы</text>
<text x="98" y="34" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">ВВЕРХ ↑</text>
<defs><marker id="ar30u" markerWidth="5" markerHeight="4" refX="2.5" refY="0" orient="auto"><path d="M0,4 L5,4 L2.5,0Z" fill="#E65100"/></marker></defs>
</g>

<!-- ANNUAL RINGS DETAIL -->
<text x="250" y="210" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="#1B5E20" text-anchor="middle">Годичные кольца</text>

<g transform="translate(30,218)">
<rect x="0" y="0" width="210" height="90" rx="4" fill="#EFEBE9" stroke="#795548" stroke-width="0.8"/>

<!-- Ring cross-section (sector view) -->
<!-- Outer bark -->
<path d="M105,10 Q140,10 155,30 Q165,50 155,70 Q140,85 105,85 Q70,85 55,70 Q45,50 55,30 Q70,10 105,10" fill="#8D6E63" stroke="#5D4037" stroke-width="0.5" opacity="0.3"/>

<!-- Spring wood (light, large cells) -->
<rect x="65" y="18" width="8" height="65" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.5" rx="1"/>
<!-- Autumn wood (dark, small cells) -->
<rect x="73" y="18" width="4" height="65" fill="#795548" stroke="#5D4037" stroke-width="0.5" rx="0.5"/>

<rect x="80" y="18" width="8" height="65" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.5" rx="1"/>
<rect x="88" y="18" width="4" height="65" fill="#795548" stroke="#5D4037" stroke-width="0.5" rx="0.5"/>

<rect x="95" y="18" width="8" height="65" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.5" rx="1"/>
<rect x="103" y="18" width="4" height="65" fill="#795548" stroke="#5D4037" stroke-width="0.5" rx="0.5"/>

<rect x="110" y="18" width="8" height="65" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.5" rx="1"/>
<rect x="118" y="18" width="4" height="65" fill="#795548" stroke="#5D4037" stroke-width="0.5" rx="0.5"/>

<rect x="125" y="18" width="8" height="65" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.5" rx="1"/>
<rect x="133" y="18" width="4" height="65" fill="#795548" stroke="#5D4037" stroke-width="0.5" rx="0.5"/>

<!-- Pith in center -->
<rect x="58" y="30" width="7" height="40" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.3"/>

<!-- Cell size detail -->
<!-- Spring wood cells (large) -->
<g transform="translate(168,20)">
<rect x="0" y="0" width="28" height="28" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.5"/>
<text x="14" y="10" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle" font-weight="bold">Весна</text>
<!-- Large cells -->
<rect x="3" y="12" width="10" height="8" rx="1" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
<rect x="15" y="12" width="10" height="8" rx="1" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.5"/>
<text x="14" y="26" font-family="Arial,sans-serif" font-size="4" fill="#666" text-anchor="middle">крупные клетки</text>
</g>

<!-- Autumn wood cells (small) -->
<g transform="translate(168,52)">
<rect x="0" y="0" width="28" height="28" rx="2" fill="#FFF3E0" stroke="#E65100" stroke-width="0.5"/>
<text x="14" y="10" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">Осень</text>
<!-- Small cells -->
<rect x="3" y="12" width="5" height="5" rx="0.5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
<rect x="9" y="12" width="5" height="5" rx="0.5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
<rect x="15" y="12" width="5" height="5" rx="0.5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
<rect x="21" y="12" width="5" height="5" rx="0.5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
<rect x="3" y="18" width="5" height="5" rx="0.5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
<rect x="9" y="18" width="5" height="5" rx="0.5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
<rect x="15" y="18" width="5" height="5" rx="0.5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
<rect x="21" y="18" width="5" height="5" rx="0.5" fill="#FFCC80" stroke="#E65100" stroke-width="0.5"/>
<text x="14" y="26" font-family="Arial,sans-serif" font-size="4" fill="#666" text-anchor="middle">мелкие клетки</text>
</g>

<!-- Brace for "one year" -->
<path d="M65,86 L65,90 L137,90 L137,86" stroke="#2E7D32" stroke-width="0.8" fill="none"/>
<text x="101" y="98" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">= 1 год</text>
</g>

<!-- TRANSPORT SUMMARY -->
<text x="395" y="210" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Транспорт веществ</text>

<g transform="translate(300,218)">
<rect x="0" y="0" width="170" height="90" rx="4" fill="white" stroke="#2E7D32" stroke-width="0.8" opacity="0.8"/>

<!-- Stem section -->
<rect x="65" y="8" width="40" height="70" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
<text x="85" y="50" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle">Стебель</text>

<!-- Xylem (left side of stem) -->
<rect x="68" y="12" width="10" height="62" fill="#BCAAA4" stroke="#795548" stroke-width="0.5" rx="2"/>
<text x="73" y="42" font-family="Arial,sans-serif" font-size="4.5" fill="#5D4037" text-anchor="middle" transform="rotate(-90,73,42)">ксилема</text>

<!-- Phloem (right side of stem) -->
<rect x="92" y="12" width="10" height="62" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.5" rx="2"/>
<text x="97" y="42" font-family="Arial,sans-serif" font-size="4.5" fill="#2E7D32" text-anchor="middle" transform="rotate(-90,97,42)">флоэма</text>

<!-- Up arrow (xylem) -->
<path d="M55,75 L55,12" stroke="#E65100" stroke-width="2" fill="none" marker-end="url(#ar30up)"/>
<text x="40" y="40" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">H₂O</text>
<text x="40" y="47" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle" font-weight="bold">+ мин.</text>
<text x="40" y="54" font-family="Arial,sans-serif" font-size="5" fill="#E65100" text-anchor="middle">↑ вверх</text>

<!-- Down arrow (phloem) -->
<path d="M115,12 L115,75" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#ar30dn)"/>
<text x="132" y="40" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle" font-weight="bold">Орган.</text>
<text x="132" y="47" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle" font-weight="bold">вещества</text>
<text x="132" y="54" font-family="Arial,sans-serif" font-size="5" fill="#1565C0" text-anchor="middle">↓ вниз</text>

<!-- Labels at ends -->
<text x="55" y="84" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">Корень</text>
<text x="55" y="7" font-family="Arial,sans-serif" font-size="5" fill="#4CAF50" text-anchor="middle">Лист</text>

<defs>
<marker id="ar30up" markerWidth="6" markerHeight="5" refX="3" refY="0" orient="auto"><path d="M0,5 L6,5 L3,0Z" fill="#E65100"/></marker>
<marker id="ar30dn" markerWidth="6" markerHeight="5" refX="3" refY="5" orient="auto"><path d="M0,0 L6,0 L3,5Z" fill="#1565C0"/></marker>
</defs>
</g>

<!-- Cambium note -->
<g transform="translate(20,320)">
<rect x="0" y="0" width="260" height="20" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
<text x="130" y="13" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100" text-anchor="middle" font-weight="bold">Камбий: делится → флоэма (наружу) + ксилема (внутрь)</text>
</g>
</svg>