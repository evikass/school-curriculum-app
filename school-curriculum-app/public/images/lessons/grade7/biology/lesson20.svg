<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/></marker>
<marker id="arrB" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#1565C0"/></marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Общая характеристика голосеменных</text>
<text x="250" y="44" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 7 класс — Урок 20</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Section 1: Pine Tree Silhouette -->
<text x="80" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сосна обыкновенная</text>
<rect x="10" y="72" width="145" height="165" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<g transform="translate(80,215)">
  <!-- Trunk -->
  <rect x="-5" y="0" width="10" height="20" fill="#795548" stroke="#5D4037" stroke-width="0.8"/>
  <text x="12" y="14" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">Ствол</text>
  <line x1="5" y1="12" x2="10" y2="12" stroke="#5D4037" stroke-width="0.4"/>
  
  <!-- Roots -->
  <path d="M-5,20 Q-12,22 -16,20" stroke="#795548" stroke-width="1.5" fill="none"/>
  <path d="M5,20 Q12,22 16,20" stroke="#795548" stroke-width="1.5" fill="none"/>
  <path d="M0,20 Q0,24 0,22" stroke="#795548" stroke-width="1" fill="none"/>
  
  <!-- Crown layers (whorls) -->
  <polygon points="0,-70 -18,-45 18,-45" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
  <polygon points="0,-58 -22,-32 22,-32" fill="#43A047" stroke="#2E7D32" stroke-width="0.8"/>
  <polygon points="0,-44 -26,-18 26,-18" fill="#388E3C" stroke="#2E7D32" stroke-width="0.8"/>
  <polygon points="0,-30 -28,-2 28,-2" fill="#2E7D32" stroke="#1B5E20" stroke-width="0.8"/>
  
  <!-- Branch labels -->
  <text x="35" y="-40" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Ветви</text>
  <line x1="18" y1="-42" x2="32" y2="-40" stroke="#2E7D32" stroke-width="0.4"/>
  
  <text x="35" y="-18" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Хвоя</text>
  <line x1="22" y1="-16" x2="32" y2="-18" stroke="#2E7D32" stroke-width="0.4"/>
  
  <!-- Cones on branches -->
  <ellipse cx="20" cy="-10" rx="4" ry="6" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <text x="32" y="0" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">Шишки</text>
  <line x1="24" y1="-7" x2="30" y2="-2" stroke="#5D4037" stroke-width="0.4"/>
  
  <ellipse cx="-18" cy="-35" rx="3" ry="5" fill="#A1887F" stroke="#795548" stroke-width="0.6"/>
</g>

<!-- Section 2: Needle Cross-Section -->
<text x="260" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Срез хвоинки</text>
<rect x="165" y="72" width="190" height="165" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<g transform="translate(260,155)">
  <!-- Outer shape - triangle needle cross-section -->
  <polygon points="0,-40 -35,25 35,25" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  
  <!-- Epidermis (outer thick layer) -->
  <polygon points="0,-37 -33,23 33,23" fill="none" stroke="#4CAF50" stroke-width="3"/>
  <text x="42" y="10" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Эпидерма</text>
  <line x1="33" y1="10" x2="40" y2="10" stroke="#2E7D32" stroke-width="0.4"/>
  
  <!-- Hypodermis -->
  <polygon points="0,-32 -28,19 28,19" fill="#C8E6C9" stroke="#81C784" stroke-width="0.5"/>
  
  <!-- Mesophyll (main tissue with resin canals) -->
  <polygon points="0,-28 -24,16 24,16" fill="#A5D6A7" stroke="none"/>
  
  <!-- Resin canals -->
  <circle cx="-12" cy="5" r="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="-12" y="7" font-family="Arial,sans-serif" font-size="3.5" fill="#F57F17" text-anchor="middle">См</text>
  
  <circle cx="12" cy="5" r="4" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <text x="12" y="7" font-family="Arial,sans-serif" font-size="3.5" fill="#F57F17" text-anchor="middle">См</text>
  
  <text x="42" y="22" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">Смоляные</text>
  <text x="42" y="28" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">ходы</text>
  <line x1="16" y1="5" x2="40" y2="20" stroke="#F57F17" stroke-width="0.4"/>
  
  <!-- Stomata on surface -->
  <ellipse cx="-28" cy="10" rx="3" ry="1.5" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="-30" y1="10" x2="-26" y2="10" stroke="#1B5E20" stroke-width="0.4"/>
  <ellipse cx="28" cy="10" rx="3" ry="1.5" fill="#81C784" stroke="#2E7D32" stroke-width="0.5"/>
  <line x1="26" y1="10" x2="30" y2="10" stroke="#1B5E20" stroke-width="0.4"/>
  <text x="-44" y="10" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Устьица</text>
  <line x1="-35" y1="10" x2="-32" y2="10" stroke="#2E7D32" stroke-width="0.4"/>
  
  <!-- Endodermis ring -->
  <ellipse cx="0" cy="0" rx="12" ry="15" fill="none" stroke="#FF8F00" stroke-width="1" stroke-dasharray="2,1"/>
  
  <!-- Central vascular bundle -->
  <ellipse cx="0" cy="0" rx="6" ry="8" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.8"/>
  <!-- Xylem -->
  <ellipse cx="0" cy="-2" rx="3" ry="4" fill="#EF9A9A" stroke="#C62828" stroke-width="0.5"/>
  <!-- Phloem -->
  <ellipse cx="0" cy="3" rx="3" ry="3" fill="#90CAF9" stroke="#1565C0" stroke-width="0.5"/>
  
  <text x="0" y="-20" font-family="Arial,sans-serif" font-size="5" fill="#333" text-anchor="middle">Мезофилл</text>
  <text x="0" y="-10" font-family="Arial,sans-serif" font-size="4" fill="#BF360C" text-anchor="middle">Провод. пучок</text>
</g>

<!-- Section 3: Pine Life Cycle (2-year) -->
<text x="410" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Жизненный цикл сосны</text>
<rect x="365" y="72" width="125" height="165" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<g transform="translate(427,90)">
  <!-- Year 1 -->
  <text x="0" y="0" font-family="Arial,sans-serif" font-size="6" fill="#1565C0" text-anchor="middle" font-weight="bold">1-й год</text>
  
  <!-- Male (pollen) cones -->
  <g transform="translate(-25,15)">
    <ellipse cx="0" cy="0" rx="5" ry="8" fill="#FFE082" stroke="#F9A825" stroke-width="0.8"/>
    <text x="0" y="14" font-family="Arial,sans-serif" font-size="4.5" fill="#333" text-anchor="middle">♂ пыльцевые</text>
    <text x="0" y="19" font-family="Arial,sans-serif" font-size="4.5" fill="#333" text-anchor="middle">шишки</text>
  </g>
  
  <!-- Female (seed) cones -->
  <g transform="translate(25,15)">
    <ellipse cx="0" cy="0" rx="6" ry="9" fill="#CE93D8" stroke="#7B1FA2" stroke-width="0.8"/>
    <text x="0" y="14" font-family="Arial,sans-serif" font-size="4.5" fill="#333" text-anchor="middle">♀ семенные</text>
    <text x="0" y="19" font-family="Arial,sans-serif" font-size="4.5" fill="#333" text-anchor="middle">шишки</text>
  </g>
  
  <!-- Arrow: pollination -->
  <path d="M-15,12 L10,12" stroke="#1565C0" stroke-width="0.8" fill="none" marker-end="url(#arrB)"/>
  <text x="-2" y="10" font-family="Arial,sans-serif" font-size="4" fill="#1565C0">пыльца</text>
  
  <!-- Pollination event -->
  <rect x="-20" y="38" width="42" height="14" rx="2" fill="#E3F2FD" stroke="#1565C0" stroke-width="0.5"/>
  <text x="1" y="47" font-family="Arial,sans-serif" font-size="4.5" fill="#1565C0" text-anchor="middle">Опыление</text>
  <path d="M0,35 L1,38" stroke="#1565C0" stroke-width="0.5"/>
  
  <!-- Fertilization (delayed!) -->
  <path d="M1,52 L1,60" stroke="#C62828" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
  <text x="20" y="58" font-family="Arial,sans-serif" font-size="4" fill="#C62828">через 12-14</text>
  <text x="20" y="63" font-family="Arial,sans-serif" font-size="4" fill="#C62828">мес.!</text>
  
  <!-- Year 2 -->
  <text x="0" y="76" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">2-й год</text>
  
  <rect x="-25" y="80" width="52" height="14" rx="2" fill="#FFEBEE" stroke="#C62828" stroke-width="0.5"/>
  <text x="1" y="89" font-family="Arial,sans-serif" font-size="4.5" fill="#C62828" text-anchor="middle">Оплодотворение</text>
  
  <!-- Seed maturation -->
  <path d="M1,94 L1,102" stroke="#2E7D32" stroke-width="0.8" fill="none" marker-end="url(#arr)"/>
  
  <rect x="-20" y="105" width="45" height="14" rx="2" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
  <text x="3" y="114" font-family="Arial,sans-serif" font-size="4.5" fill="#2E7D32" text-anchor="middle">Созревание</text>
  <text x="3" y="119" font-family="Arial,sans-serif" font-size="4.5" fill="#2E7D32" text-anchor="middle">семян</text>
  
  <!-- Mature cone -->
  <g transform="translate(1,130)">
    <ellipse cx="0" cy="0" rx="8" ry="10" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
    <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#6D4C41" stroke-width="0.5"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#6D4C41" stroke-width="0.5"/>
    <line x1="-6" y1="4" x2="6" y2="4" stroke="#6D4C41" stroke-width="0.5"/>
    <text x="0" y="16" font-family="Arial,sans-serif" font-size="4.5" fill="#333" text-anchor="middle">Зрелая шишка</text>
  </g>
</g>

<!-- Section 4: Seed vs Spore Comparison + Tracheids -->
<text x="175" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Семя vs Спора</text>
<rect x="10" y="254" width="335" height="88" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Spore panel -->
<rect x="18" y="260" width="155" height="76" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
<text x="95" y="273" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">Спора</text>
<g transform="translate(40,290)">
  <circle cx="0" cy="0" r="6" fill="#FFE0B2" stroke="#FF9800" stroke-width="0.8"/>
  <circle cx="0" cy="0" r="3" fill="#FFCC80" stroke="#FB8C00" stroke-width="0.5"/>
</g>
<text x="55" y="287" font-family="Arial,sans-serif" font-size="5.5" fill="#333">1 клетка</text>
<text x="55" y="296" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Без запаса питательных веществ</text>
<text x="55" y="305" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Гаплоидная (n)</text>
<text x="55" y="314" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Вода нужна для оплодотворения</text>
<text x="55" y="323" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Не защищена</text>

<!-- Seed panel -->
<rect x="182" y="260" width="155" height="76" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
<text x="260" y="273" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Семя</text>
<g transform="translate(205,290)">
  <ellipse cx="0" cy="0" rx="8" ry="6" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <ellipse cx="0" cy="-1" rx="4" ry="3" fill="#81C784" stroke="#1B5E20" stroke-width="0.5"/>
  <text x="0" y="1" font-family="Arial,sans-serif" font-size="3" fill="#1B5E20" text-anchor="middle">зарод</text>
</g>
<text x="220" y="287" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Много клеток</text>
<text x="220" y="296" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Запас пит. веществ (эндосперм)</text>
<text x="220" y="305" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Диплоидная (2n) зародыш</text>
<text x="220" y="314" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Вода НЕ нужна для оплодотв.</text>
<text x="220" y="323" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Защищена семенной кожурой</text>

<!-- Tracheids & Resin Canals panel -->
<text x="425" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Трахеиды и смоляные ходы</text>
<rect x="355" y="254" width="135" height="88" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Tracheid -->
<g transform="translate(395,290)">
  <!-- Elongated cell with pits -->
  <rect x="-5" y="-18" width="10" height="36" rx="4" fill="#FFCCBC" stroke="#BF360C" stroke-width="0.8"/>
  <!-- Pits (bordered pits) -->
  <ellipse cx="0" cy="-10" rx="3" ry="2" fill="none" stroke="#D84315" stroke-width="0.6"/>
  <ellipse cx="0" cy="-10" rx="1.5" ry="1" fill="#FFAB91" stroke="#BF360C" stroke-width="0.3"/>
  <ellipse cx="0" cy="0" rx="3" ry="2" fill="none" stroke="#D84315" stroke-width="0.6"/>
  <ellipse cx="0" cy="0" rx="1.5" ry="1" fill="#FFAB91" stroke="#BF360C" stroke-width="0.3"/>
  <ellipse cx="0" cy="10" rx="3" ry="2" fill="none" stroke="#D84315" stroke-width="0.6"/>
  <ellipse cx="0" cy="10" rx="1.5" ry="1" fill="#FFAB91" stroke="#BF360C" stroke-width="0.3"/>
  
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="5" fill="#BF360C" text-anchor="middle">Трахеида</text>
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">окаймлённые поры</text>
</g>

<!-- Resin canal -->
<g transform="translate(455,290)">
  <!-- Canal tube -->
  <ellipse cx="0" cy="-15" rx="8" ry="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <ellipse cx="0" cy="0" rx="8" ry="8" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <ellipse cx="0" cy="15" rx="8" ry="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
  <!-- Epithelial cells around canal -->
  <circle cx="-5" cy="-18" r="2" fill="#FFE082" stroke="#FF8F00" stroke-width="0.4"/>
  <circle cx="5" cy="-18" r="2" fill="#FFE082" stroke="#FF8F00" stroke-width="0.4"/>
  <circle cx="-7" cy="0" r="2" fill="#FFE082" stroke="#FF8F00" stroke-width="0.4"/>
  <circle cx="7" cy="0" r="2" fill="#FFE082" stroke="#FF8F00" stroke-width="0.4"/>
  <circle cx="-5" cy="18" r="2" fill="#FFE082" stroke="#FF8F00" stroke-width="0.4"/>
  <circle cx="5" cy="18" r="2" fill="#FFE082" stroke="#FF8F00" stroke-width="0.4"/>
  <!-- Resin drops -->
  <circle cx="0" cy="-15" r="2" fill="#FDD835" stroke="#F9A825" stroke-width="0.3"/>
  <circle cx="0" cy="0" r="3" fill="#FDD835" stroke="#F9A825" stroke-width="0.3"/>
  <circle cx="0" cy="15" r="2" fill="#FDD835" stroke="#F9A825" stroke-width="0.3"/>
  
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">Смоляной ход</text>
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="4" fill="#888" text-anchor="middle">живица (смола)</text>
</g>
</svg>