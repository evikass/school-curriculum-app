<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2E7D32"/></marker>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#2E7D32" text-anchor="middle">Папоротники, хвощи и плауны</text>
<text x="250" y="44" font-family="Arial,sans-serif" font-size="10" fill="#888" text-anchor="middle">Биология 7 класс — Урок 17</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- Section 1: Fern (Папоротник) -->
<text x="90" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Папоротник</text>
<rect x="10" y="72" width="170" height="175" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Fern fronds (вайи) -->
<g transform="translate(70,140)">
  <!-- Central rachis -->
  <path d="M0,60 Q5,30 0,-50" stroke="#2E7D32" stroke-width="2" fill="none"/>
  <!-- Fiddlehead (улитка) at top -->
  <path d="M0,-50 Q8,-55 5,-60 Q0,-65 -5,-60 Q-10,-55 -5,-50" stroke="#4CAF50" stroke-width="1.5" fill="#81C784"/>
  <text x="18" y="-55" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Улитка</text>
  <line x1="10" y1="-55" x2="16" y2="-55" stroke="#2E7D32" stroke-width="0.5"/>
  
  <!-- Left pinnae -->
  <path d="M-2,45 Q-20,40 -30,35" stroke="#4CAF50" stroke-width="1" fill="none"/>
  <path d="M-30,35 Q-25,30 -35,25" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  <path d="M-30,35 Q-35,32 -38,30" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  
  <path d="M-3,30 Q-25,25 -35,20" stroke="#4CAF50" stroke-width="1" fill="none"/>
  <path d="M-35,20 Q-30,15 -40,12" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  <path d="M-35,20 Q-40,17 -43,15" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  
  <path d="M-3,15 Q-22,10 -32,5" stroke="#4CAF50" stroke-width="1" fill="none"/>
  <path d="M-32,5 Q-28,0 -36,-3" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  
  <path d="M-2,0 Q-18,-5 -28,-10" stroke="#4CAF50" stroke-width="1" fill="none"/>
  <path d="M-2,-15 Q-15,-20 -22,-25" stroke="#4CAF50" stroke-width="0.8" fill="none"/>
  <path d="M-1,-30 Q-10,-35 -15,-38" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  
  <!-- Right pinnae -->
  <path d="M2,45 Q20,40 30,35" stroke="#4CAF50" stroke-width="1" fill="none"/>
  <path d="M30,35 Q25,30 35,25" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  
  <path d="M3,30 Q25,25 35,20" stroke="#4CAF50" stroke-width="1" fill="none"/>
  <path d="M35,20 Q30,15 40,12" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  
  <path d="M3,15 Q22,10 32,5" stroke="#4CAF50" stroke-width="1" fill="none"/>
  <path d="M2,0 Q18,-5 28,-10" stroke="#4CAF50" stroke-width="1" fill="none"/>
  <path d="M2,-15 Q15,-20 22,-25" stroke="#4CAF50" stroke-width="0.8" fill="none"/>
  <path d="M1,-30 Q10,-35 15,-38" stroke="#4CAF50" stroke-width="0.6" fill="none"/>
  
  <!-- Rhizome underground -->
  <ellipse cx="0" cy="70" rx="30" ry="8" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <text x="0" y="73" font-family="Arial,sans-serif" font-size="5" fill="white" text-anchor="middle">Корневище</text>
  
  <!-- Adventitious roots -->
  <path d="M-15,78 Q-20,88 -22,95" stroke="#A1887F" stroke-width="1" fill="none"/>
  <path d="M0,78 Q0,90 0,97" stroke="#A1887F" stroke-width="1" fill="none"/>
  <path d="M15,78 Q20,88 22,95" stroke="#A1887F" stroke-width="1" fill="none"/>
  <text x="0" y="100" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">Придат. корни</text>
</g>

<!-- Labels -->
<text x="45" y="83" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">Вайи (листья)</text>
<line x1="70" y1="85" x2="55" y2="100" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Sorus detail -->
<g transform="translate(160,105)">
  <text x="0" y="-8" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сорус</text>
  <!-- Leaf underside fragment -->
  <ellipse cx="0" cy="8" rx="18" ry="8" fill="#81C784" stroke="#4CAF50" stroke-width="0.8"/>
  <!-- Sori clusters -->
  <circle cx="-8" cy="5" r="3" fill="#8B4513" stroke="#5D2906" stroke-width="0.5"/>
  <circle cx="0" cy="3" r="3.5" fill="#8B4513" stroke="#5D2906" stroke-width="0.5"/>
  <circle cx="8" cy="5" r="3" fill="#8B4513" stroke="#5D2906" stroke-width="0.5"/>
  <circle cx="-4" cy="10" r="2.5" fill="#8B4513" stroke="#5D2906" stroke-width="0.5"/>
  <circle cx="5" cy="10" r="2.5" fill="#8B4513" stroke="#5D2906" stroke-width="0.5"/>
  
  <!-- Sporangia detail callout -->
  <line x1="10" y1="3" x2="28" y2="-5" stroke="#666" stroke-width="0.5" stroke-dasharray="2,1"/>
  <circle cx="33" cy="-7" r="5" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.8"/>
  <circle cx="33" cy="-7" r="2" fill="#8B4513" stroke="#5D2906" stroke-width="0.5"/>
  <!-- Annulus -->
  <path d="M30,-10 A5,5 0 0,1 36,-4" stroke="#FF9800" stroke-width="0.8" fill="none"/>
  <text x="33" y="5" font-family="Arial,sans-serif" font-size="4.5" fill="#333" text-anchor="middle">Спорангий</text>
</g>

<!-- Section 2: Horsetail (Хвощ) -->
<text x="280" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Хвощ</text>
<rect x="190" y="72" width="145" height="175" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<g transform="translate(245,155)">
  <!-- Jointed stem segments -->
  <rect x="-3" y="30" width="6" height="18" rx="2" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
  <rect x="-4" y="28" width="8" height="4" rx="1" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  
  <rect x="-3" y="12" width="6" height="18" rx="2" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
  <rect x="-4" y="10" width="8" height="4" rx="1" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  
  <rect x="-2.5" y="-6" width="5" height="18" rx="2" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
  <rect x="-3.5" y="-8" width="7" height="4" rx="1" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  
  <rect x="-2" y="-24" width="4" height="16" rx="2" fill="#66BB6A" stroke="#2E7D32" stroke-width="1"/>
  
  <!-- Whorled leaves at joints -->
  <line x1="-4" y1="28" x2="-18" y2="22" stroke="#81C784" stroke-width="0.8"/>
  <line x1="-4" y1="28" x2="-15" y2="32" stroke="#81C784" stroke-width="0.8"/>
  <line x1="4" y1="28" x2="18" y2="22" stroke="#81C784" stroke-width="0.8"/>
  <line x1="4" y1="28" x2="15" y2="32" stroke="#81C784" stroke-width="0.8"/>
  <line x1="0" y1="28" x2="0" y2="20" stroke="#81C784" stroke-width="0.6"/>
  
  <line x1="-4" y1="10" x2="-16" y2="5" stroke="#81C784" stroke-width="0.8"/>
  <line x1="-4" y1="10" x2="-14" y2="14" stroke="#81C784" stroke-width="0.8"/>
  <line x1="4" y1="10" x2="16" y2="5" stroke="#81C784" stroke-width="0.8"/>
  <line x1="4" y1="10" x2="14" y2="14" stroke="#81C784" stroke-width="0.8"/>
  
  <line x1="-3.5" y1="-8" x2="-13" y2="-12" stroke="#81C784" stroke-width="0.7"/>
  <line x1="3.5" y1="-8" x2="13" y2="-12" stroke="#81C784" stroke-width="0.7"/>
  
  <!-- Strobilus at top -->
  <ellipse cx="0" cy="-34" rx="6" ry="10" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <line x1="-5" y1="-30" x2="5" y2="-30" stroke="#6D4C41" stroke-width="0.5"/>
  <line x1="-5" y1="-34" x2="5" y2="-34" stroke="#6D4C41" stroke-width="0.5"/>
  <line x1="-5" y1="-38" x2="5" y2="-38" stroke="#6D4C41" stroke-width="0.5"/>
  
  <!-- Sporangia dots on strobilus -->
  <circle cx="-3" cy="-32" r="1" fill="#4E342E"/>
  <circle cx="3" cy="-32" r="1" fill="#4E342E"/>
  <circle cx="-3" cy="-36" r="1" fill="#4E342E"/>
  <circle cx="3" cy="-36" r="1" fill="#4E342E"/>
  
  <!-- Labels -->
  <text x="20" y="-34" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">Стробил</text>
  <line x1="6" y1="-34" x2="18" y2="-34" stroke="#5D4037" stroke-width="0.4"/>
  <text x="22" y="10" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Мутовки</text>
  <text x="22" y="28" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">Междоузлия</text>
  
  <!-- Underground rhizome -->
  <ellipse cx="0" cy="55" rx="20" ry="5" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-15,55 Q-20,62 -18,68" stroke="#A1887F" stroke-width="0.8" fill="none"/>
  <path d="M15,55 Q20,62 18,68" stroke="#A1887F" stroke-width="0.8" fill="none"/>
</g>

<!-- Section 3: Clubmoss (Плаун) -->
<text x="420" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Плаун</text>
<rect x="345" y="72" width="145" height="175" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>

<g transform="translate(415,175)">
  <!-- Creeping stem -->
  <path d="M-55,15 Q-30,10 0,12 Q30,14 55,10" stroke="#2E7D32" stroke-width="2.5" fill="none"/>
  
  <!-- Upright branches -->
  <path d="M-30,10 Q-28,-5 -25,-20" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  <path d="M10,13 Q12,-2 15,-18" stroke="#2E7D32" stroke-width="1.5" fill="none"/>
  
  <!-- Small leaf-like appendages along stem -->
  <line x1="-45" y1="12" x2="-50" y2="6" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="-40" y1="11" x2="-44" y2="5" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="-20" y1="10" x2="-24" y2="4" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="-10" y1="12" x2="-14" y2="6" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="0" y1="12" x2="-4" y2="6" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="20" y1="13" x2="16" y2="7" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="30" y1="12" x2="26" y2="6" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="40" y1="11" x2="36" y2="5" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="50" y1="10" x2="46" y2="4" stroke="#4CAF50" stroke-width="0.6"/>
  
  <!-- Leaves on upper side too -->
  <line x1="-45" y1="12" x2="-50" y2="18" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="-35" y1="11" x2="-40" y2="17" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="-5" y1="12" x2="-10" y2="18" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="25" y1="13" x2="20" y2="19" stroke="#4CAF50" stroke-width="0.6"/>
  <line x1="45" y1="11" x2="40" y2="17" stroke="#4CAF50" stroke-width="0.6"/>
  
  <!-- Strobili on upright branches -->
  <ellipse cx="-25" cy="-25" rx="4" ry="8" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <line x1="-28" y1="-22" x2="-22" y2="-22" stroke="#6D4C41" stroke-width="0.4"/>
  <line x1="-28" y1="-26" x2="-22" y2="-26" stroke="#6D4C41" stroke-width="0.4"/>
  <line x1="-28" y1="-30" x2="-22" y2="-30" stroke="#6D4C41" stroke-width="0.4"/>
  
  <ellipse cx="15" cy="-23" rx="4" ry="8" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <line x1="12" y1="-20" x2="18" y2="-20" stroke="#6D4C41" stroke-width="0.4"/>
  <line x1="12" y1="-24" x2="18" y2="-24" stroke="#6D4C41" stroke-width="0.4"/>
  <line x1="12" y1="-28" x2="18" y2="-28" stroke="#6D4C41" stroke-width="0.4"/>
  
  <!-- Labels -->
  <text x="-25" y="-37" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">Стробилы</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Ползучий стебель</text>
  
  <!-- Roots from stem -->
  <path d="M-35,17 Q-38,24 -40,28" stroke="#A1887F" stroke-width="0.6" fill="none"/>
  <path d="M5,17 Q3,24 1,28" stroke="#A1887F" stroke-width="0.6" fill="none"/>
  <path d="M35,15 Q38,22 40,26" stroke="#A1887F" stroke-width="0.6" fill="none"/>
</g>

<!-- Bottom summary panel -->
<rect x="10" y="255" width="480" height="85" fill="white" fill-opacity="0.5" rx="5" stroke="#A5D6A7" stroke-width="0.8"/>
<text x="250" y="270" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Общие признаки высших споровых</text>

<!-- Feature list -->
<g transform="translate(25,280)">
  <circle cx="0" cy="0" r="3" fill="#4CAF50"/>
  <text x="8" y="3" font-family="Arial,sans-serif" font-size="7" fill="#333">Органы: стебель, листья, корни (у папоротников и хвощей)</text>
</g>
<g transform="translate(25,295)">
  <circle cx="0" cy="0" r="3" fill="#4CAF50"/>
  <text x="8" y="3" font-family="Arial,sans-serif" font-size="7" fill="#333">Размножение: споры (в спорангиях)</text>
</g>
<g transform="translate(25,310)">
  <circle cx="0" cy="0" r="3" fill="#4CAF50"/>
  <text x="8" y="3" font-family="Arial,sans-serif" font-size="7" fill="#333">Жизненный цикл: чередование поколений (спорофит + гаметофит)</text>
</g>
<g transform="translate(25,325)">
  <circle cx="0" cy="0" r="3" fill="#4CAF50"/>
  <text x="8" y="3" font-family="Arial,sans-serif" font-size="7" fill="#333">Вода необходима для оплодотворения</text>
</g>
</svg>