<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="soil" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="26" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#2E7D32" text-anchor="middle">Видоизменения побегов</text>
<text x="250" y="40" font-family="Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">Биология 7 класс — Урок 32</text>
<line x1="30" y1="46" x2="470" y2="46" stroke="#2E7D32" stroke-width="1.5" opacity="0.25"/>

<!-- ====== ROW 1: Underground modifications ====== -->
<text x="250" y="60" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Подземные видоизменения</text>

<!-- === Корневище (Rhizome) — top-left === -->
<g transform="translate(15,65)">
  <text x="55" y="0" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Корневище</text>
  <!-- Soil line -->
  <line x1="0" y1="20" x2="115" y2="20" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Horizontal rhizome -->
  <path d="M5,35 Q30,28 55,33 Q80,38 108,32" fill="none" stroke="#A1887F" stroke-width="8" stroke-linecap="round"/>
  <path d="M5,35 Q30,28 55,33 Q80,38 108,32" fill="none" stroke="#8D6E63" stroke-width="6" stroke-linecap="round"/>
  <!-- Nodes on rhizome -->
  <circle cx="25" cy="31" r="3" fill="#6D4C41" stroke="#4E342E" stroke-width="0.5"/>
  <circle cx="55" cy="33" r="3" fill="#6D4C41" stroke="#4E342E" stroke-width="0.5"/>
  <circle cx="85" cy="35" r="3" fill="#6D4C41" stroke="#4E342E" stroke-width="0.5"/>
  <!-- Scale leaves (редуцированные листья) -->
  <path d="M22,28 L25,22 L28,28" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
  <path d="M52,30 L55,24 L58,30" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
  <path d="M82,32 L85,26 L88,32" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5"/>
  <!-- Roots going down -->
  <line x1="25" y1="38" x2="20" y2="55" stroke="#D7CCC8" stroke-width="0.8"/>
  <line x1="55" y1="39" x2="50" y2="56" stroke="#D7CCC8" stroke-width="0.8"/>
  <line x1="85" y1="40" x2="90" y2="57" stroke="#D7CCC8" stroke-width="0.8"/>
  <!-- Shoot going up from node -->
  <line x1="55" y1="30" x2="55" y2="15" stroke="#66BB6A" stroke-width="1.5"/>
  <path d="M50,15 Q55,8 60,15" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Label -->
  <text x="55" y="70" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Пырей, ландыш</text>
</g>

<!-- === Клубень (Tuber) — top-center-left === -->
<g transform="translate(140,65)">
  <text x="50" y="0" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Клубень</text>
  <!-- Soil line -->
  <line x1="0" y1="20" x2="100" y2="20" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Mother plant stem -->
  <line x1="50" y1="15" x2="50" y2="-5" stroke="#66BB6A" stroke-width="2"/>
  <path d="M45,-5 Q50,-12 55,-5" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Stolon -->
  <path d="M50,30 Q55,38 60,45" fill="none" stroke="#A5D6A7" stroke-width="1.5"/>
  <!-- Tuber (potato shape) -->
  <ellipse cx="65" cy="50" rx="20" ry="14" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1.2"/>
  <!-- "Eyes" (buds) on tuber -->
  <circle cx="55" cy="46" r="2.5" fill="#BCAAA4" stroke="#6D4C41" stroke-width="0.8"/>
  <circle cx="72" cy="48" r="2.5" fill="#BCAAA4" stroke="#6D4C41" stroke-width="0.8"/>
  <circle cx="62" cy="56" r="2.5" fill="#BCAAA4" stroke="#6D4C41" stroke-width="0.8"/>
  <!-- Small eyebrows over eyes -->
  <path d="M53,44 L57,43" stroke="#6D4C41" stroke-width="0.5"/>
  <path d="M70,46 L74,45" stroke="#6D4C41" stroke-width="0.5"/>
  <path d="M60,54 L64,53" stroke="#6D4C41" stroke-width="0.5"/>
  <!-- Roots from stem base -->
  <line x1="45" y1="30" x2="38" y2="45" stroke="#D7CCC8" stroke-width="0.8"/>
  <line x1="48" y1="32" x2="42" y2="48" stroke="#D7CCC8" stroke-width="0.8"/>
  <!-- Labels -->
  <line x1="88" y1="48" x2="98" y2="40" stroke="#555" stroke-width="0.5"/>
  <text x="100" y="38" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Глазки</text>
  <text x="100" y="45" font-family="Arial,sans-serif" font-size="5.5" fill="#333">(почки)</text>
  <line x1="55" y1="35" x2="40" y2="30" stroke="#555" stroke-width="0.5"/>
  <text x="20" y="28" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Столон</text>
  <text x="55" y="75" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Картофель</text>
</g>

<!-- === Луковица (Bulb) — top-center-right === -->
<g transform="translate(260,65)">
  <text x="45" y="0" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Луковица</text>
  <!-- Soil line -->
  <line x1="0" y1="20" x2="95" y2="20" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Cross-section of bulb -->
  <!-- Outer dry scale -->
  <path d="M30,55 Q25,25 45,18 Q65,25 60,55" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1" opacity="0.8"/>
  <!-- Fleshy scales (чешуи) -->
  <path d="M32,52 Q28,28 45,22 Q62,28 58,52" fill="#F5F5DC" stroke="#A5D6A7" stroke-width="0.8"/>
  <path d="M35,48 Q32,32 45,26 Q58,32 55,48" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.7"/>
  <path d="M38,44 Q36,35 45,30 Q54,35 52,44" fill="#C8E6C9" stroke="#66BB6A" stroke-width="0.6"/>
  <!-- Central bud (почка) -->
  <ellipse cx="45" cy="35" rx="5" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Stem plate (донце) -->
  <line x1="28" y1="55" x2="62" y2="55" stroke="#6D4C41" stroke-width="2.5"/>
  <!-- Roots from base -->
  <line x1="35" y1="57" x2="32" y2="68" stroke="#D7CCC8" stroke-width="0.7"/>
  <line x1="45" y1="57" x2="45" y2="70" stroke="#D7CCC8" stroke-width="0.7"/>
  <line x1="55" y1="57" x2="58" y2="68" stroke="#D7CCC8" stroke-width="0.7"/>
  <!-- Green shoot emerging -->
  <line x1="45" y1="27" x2="45" y2="8" stroke="#66BB6A" stroke-width="1.5"/>
  <path d="M42,8 Q45,2 48,8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Labels -->
  <line x1="62" y1="35" x2="78" y2="28" stroke="#555" stroke-width="0.5"/>
  <text x="80" y="27" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Чешуи</text>
  <line x1="50" y1="30" x2="78" y2="18" stroke="#555" stroke-width="0.5"/>
  <text x="80" y="17" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Почка</text>
  <line x1="62" y1="55" x2="78" y2="55" stroke="#555" stroke-width="0.5"/>
  <text x="80" y="54" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Донце</text>
  <text x="45" y="80" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Лук репчатый</text>
</g>

<!-- === Клубнелуковица (Corm) — top-right === -->
<g transform="translate(380,65)">
  <text x="45" y="0" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Клубнелуковица</text>
  <!-- Soil line -->
  <line x1="0" y1="20" x2="95" y2="20" stroke="#8D6E63" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Corm body (solid, not layered like bulb) -->
  <ellipse cx="45" cy="42" rx="18" ry="16" fill="#D7CCC8" stroke="#8D6E63" stroke-width="1.2"/>
  <!-- Thin dry tunic -->
  <path d="M27,42 Q25,22 45,18 Q65,22 63,42" fill="none" stroke="#BCAAA4" stroke-width="1.5"/>
  <!-- Bud on top -->
  <ellipse cx="45" cy="28" rx="5" ry="7" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <!-- Old corm remnant below -->
  <ellipse cx="45" cy="58" rx="12" ry="5" fill="#BCAAA4" stroke="#8D6E63" stroke-width="0.5" opacity="0.6"/>
  <!-- Roots -->
  <line x1="35" y1="56" x2="30" y2="68" stroke="#D7CCC8" stroke-width="0.7"/>
  <line x1="45" y1="58" x2="45" y2="70" stroke="#D7CCC8" stroke-width="0.7"/>
  <line x1="55" y1="56" x2="60" y2="68" stroke="#D7CCC8" stroke-width="0.7"/>
  <!-- Shoot going up -->
  <line x1="45" y1="22" x2="45" y2="8" stroke="#66BB6A" stroke-width="1.5"/>
  <path d="M42,8 Q45,2 48,8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Labels -->
  <line x1="64" y1="38" x2="78" y2="32" stroke="#555" stroke-width="0.5"/>
  <text x="80" y="31" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Запасающая</text>
  <text x="80" y="38" font-family="Arial,sans-serif" font-size="5.5" fill="#333">стеблевая часть</text>
  <text x="45" y="80" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Шафран, гладиолус</text>
</g>

<!-- Separator line -->
<line x1="30" y1="152" x2="470" y2="152" stroke="#2E7D32" stroke-width="1" opacity="0.25"/>

<!-- ====== ROW 2: Above-ground modifications ====== -->
<text x="250" y="166" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Надземные видоизменения</text>

<!-- === Усы (Runners/Stolons) — bottom-left === -->
<g transform="translate(15,175)">
  <text x="70" y="0" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Усы (столоны)</text>
  <!-- Mother plant -->
  <ellipse cx="25" cy="35" rx="12" ry="8" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="25" y1="27" x2="25" y2="18" stroke="#388E3C" stroke-width="1.5"/>
  <path d="M20,18 Q25,12 30,18" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Runner stem -->
  <path d="M37,35 Q55,30 70,35 Q85,40 100,35" fill="none" stroke="#388E3C" stroke-width="1.5"/>
  <!-- Node points -->
  <circle cx="55" cy="32" r="2" fill="#2E7D32"/>
  <circle cx="80" cy="38" r="2" fill="#2E7D32"/>
  <!-- Daughter plant at end -->
  <ellipse cx="105" cy="33" rx="10" ry="7" fill="#66BB6A" stroke="#2E7D32" stroke-width="0.8"/>
  <line x1="105" y1="26" x2="105" y2="18" stroke="#388E3C" stroke-width="1.5"/>
  <path d="M100,18 Q105,12 110,18" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.5"/>
  <!-- Roots from daughter plant -->
  <line x1="102" y1="40" x2="98" y2="50" stroke="#D7CCC8" stroke-width="0.6"/>
  <line x1="108" y1="40" x2="112" y2="50" stroke="#D7CCC8" stroke-width="0.6"/>
  <!-- Label -->
  <text x="65" y="60" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Земляника</text>
</g>

<!-- === Колючки (Thorns/Spines) — bottom-center-left === -->
<g transform="translate(140,175)">
  <text x="50" y="0" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Колючки</text>
  <!-- Branch -->
  <line x1="10" y1="55" x2="90" y2="25" stroke="#795548" stroke-width="3" stroke-linecap="round"/>
  <!-- Thorns (modified stems - pointed, with vascular tissue) -->
  <path d="M25,48 L18,32 L22,46" fill="#6D4C41" stroke="#4E342E" stroke-width="0.8"/>
  <path d="M45,38 L38,20 L42,36" fill="#6D4C41" stroke="#4E342E" stroke-width="0.8"/>
  <path d="M65,30 L58,12 L62,28" fill="#6D4C41" stroke="#4E342E" stroke-width="0.8"/>
  <!-- Small leaf remnant at thorn base -->
  <ellipse cx="24" cy="50" rx="4" ry="2" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.4" transform="rotate(-20,24,50)"/>
  <ellipse cx="44" cy="40" rx="4" ry="2" fill="#A5D6A7" stroke="#2E7D32" stroke-width="0.4" transform="rotate(-20,44,40)"/>
  <!-- Label -->
  <text x="50" y="70" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Боярышник, дикая слива</text>
</g>

<!-- === Усики (Tendrils) — bottom-center-right === -->
<g transform="translate(270,175)">
  <text x="50" y="0" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Усики</text>
  <!-- Stem -->
  <line x1="15" y1="55" x2="85" y2="20" stroke="#66BB6A" stroke-width="2.5"/>
  <!-- Leaf -->
  <path d="M50,33 Q55,22 65,25 Q68,30 60,37Z" fill="#81C784" stroke="#2E7D32" stroke-width="0.6"/>
  <!-- Tendril (coiled) - modified leaf/stem -->
  <path d="M65,27 Q80,20 85,15 Q90,10 82,8 Q74,6 78,14 Q82,22 88,18" fill="none" stroke="#4CAF50" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Second tendril -->
  <path d="M40,40 Q25,32 22,25 Q20,18 28,20 Q35,22 30,28 Q25,34 18,32" fill="none" stroke="#4CAF50" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Support structure -->
  <line x1="88" y1="8" x2="88" y2="60" stroke="#9E9E9E" stroke-width="1.5"/>
  <!-- Tendril wrapping around support -->
  <path d="M82,8 Q88,6 88,10" fill="none" stroke="#4CAF50" stroke-width="1"/>
  <!-- Label -->
  <text x="50" y="70" font-family="Arial,sans-serif" font-size="5.5" fill="#555" text-anchor="middle">Горох, виноград</text>
</g>

<!-- === Comparison note — bottom-right === -->
<g transform="translate(390,175)">
  <text x="45" y="0" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сравнение</text>
  <rect x="2" y="8" width="90" height="60" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5" opacity="0.6"/>
  <!-- Bulb vs Corm comparison -->
  <text x="8" y="20" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Луковица:</text>
  <text x="8" y="28" font-family="Arial,sans-serif" font-size="5" fill="#555">— чешуи (листья)</text>
  <text x="8" y="35" font-family="Arial,sans-serif" font-size="5" fill="#555">— донце (стебель)</text>
  <text x="8" y="44" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Клубнелуковица:</text>
  <text x="8" y="52" font-family="Arial,sans-serif" font-size="5" fill="#555">— цельный стебель</text>
  <text x="8" y="59" font-family="Arial,sans-serif" font-size="5" fill="#555">— чешуи сухие</text>
</g>

<!-- Bottom summary bar -->
<g transform="translate(15,280)">
  <rect x="0" y="0" width="470" height="32" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5" opacity="0.7"/>
  <text x="235" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Функции видоизменённых побегов</text>
  <text x="235" y="23" font-family="Arial,sans-serif" font-size="6" fill="#333" text-anchor="middle">Запасание питательных веществ • Вегетативное размножение • Защита • Укрепление и лазание</text>
</g>

<!-- Decorative elements -->
<path d="M470,325 Q475,315 485,318 Q490,322 483,328 Q476,332 470,325Z" fill="#66BB6A" opacity="0.4"/>
<path d="M15,325 Q10,315 5,318 Q0,322 7,328 Q14,332 15,325Z" fill="#66BB6A" opacity="0.4"/>
</svg>