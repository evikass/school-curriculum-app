<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="treeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E20;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#4CAF50;stop-opacity:0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="350" rx="6" fill="url(#bgGrad)" stroke="#2E7D32" stroke-width="2.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="500" height="32" rx="6" fill="url(#headerGrad)"/>
  <rect x="0" y="16" width="500" height="16" fill="url(#headerGrad)"/>
  <text x="250" y="22" font-family="Arial,sans-serif" font-size="12.5" fill="white" text-anchor="middle" font-weight="bold">Классификация растений. Систематика</text>

  <!-- === TAXONOMIC HIERARCHY (left) === -->
  <rect x="8" y="38" width="168" height="165" rx="5" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
  <text x="92" y="52" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Иерархия таксонов</text>

  <!-- Pyramid-like hierarchy with example: Земляника -->
  <!-- Царство (widest) -->
  <rect x="18" y="58" width="148" height="16" rx="3" fill="#1B5E20" opacity="0.9"/>
  <text x="92" y="69" font-family="Arial,sans-serif" font-size="7.5" fill="white" text-anchor="middle" font-weight="bold">Царство</text>
  <text x="92" y="69" font-family="Arial,sans-serif" font-size="6" fill="white" text-anchor="middle" dx="55">Растения</text>

  <!-- Отдел -->
  <rect x="28" y="78" width="128" height="16" rx="3" fill="#2E7D32" opacity="0.85"/>
  <text x="92" y="89" font-family="Arial,sans-serif" font-size="7.5" fill="white" text-anchor="middle" font-weight="bold">Отдел</text>
  <text x="130" y="89" font-family="Arial,sans-serif" font-size="6" fill="white">Цветковые</text>

  <!-- Класс -->
  <rect x="38" y="98" width="108" height="16" rx="3" fill="#388E3C" opacity="0.8"/>
  <text x="92" y="109" font-family="Arial,sans-serif" font-size="7.5" fill="white" text-anchor="middle" font-weight="bold">Класс</text>
  <text x="125" y="109" font-family="Arial,sans-serif" font-size="6" fill="white">Двудольные</text>

  <!-- Порядок -->
  <rect x="48" y="118" width="88" height="16" rx="3" fill="#43A047" opacity="0.8"/>
  <text x="92" y="129" font-family="Arial,sans-serif" font-size="7.5" fill="white" text-anchor="middle" font-weight="bold">Порядок</text>
  <text x="118" y="129" font-family="Arial,sans-serif" font-size="5.5" fill="white">Розоцветные</text>

  <!-- Семейство -->
  <rect x="53" y="138" width="78" height="16" rx="3" fill="#4CAF50" opacity="0.8"/>
  <text x="92" y="149" font-family="Arial,sans-serif" font-size="7" fill="white" text-anchor="middle" font-weight="bold">Семейство</text>
  <text x="118" y="149" font-family="Arial,sans-serif" font-size="5.5" fill="white">Розовые</text>

  <!-- Род -->
  <rect x="60" y="158" width="64" height="16" rx="3" fill="#66BB6A" opacity="0.85"/>
  <text x="92" y="169" font-family="Arial,sans-serif" font-size="7.5" fill="white" text-anchor="middle" font-weight="bold">Род</text>
  <text x="110" y="169" font-family="Arial,sans-serif" font-size="6" fill="white">Земляника</text>

  <!-- Вид (narrowest) -->
  <rect x="64" y="178" width="56" height="16" rx="3" fill="#81C784" opacity="0.9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="92" y="189" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Вид</text>

  <!-- Arrow indicating narrowing -->
  <text x="10" y="100" font-family="Arial,sans-serif" font-size="14" fill="#2E7D32" opacity="0.4">⟵</text>
  <text x="4" y="112" font-family="Arial,sans-serif" font-size="5" fill="#666">шире</text>
  <text x="145" y="182" font-family="Arial,sans-serif" font-size="5" fill="#666">⟶ уже</text>

  <!-- Species name at bottom -->
  <text x="92" y="200" font-family="Arial,sans-serif" font-size="7.5" fill="#1B5E20" text-anchor="middle" font-style="italic">Fragaria vesca</text>

  <!-- === SPECIES CONCEPT (bottom-left) === -->
  <rect x="8" y="210" width="168" height="132" rx="5" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
  <text x="92" y="224" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Понятие вида</text>

  <!-- Population icon -->
  <circle cx="30" cy="244" r="4" fill="#4CAF50" opacity="0.6"/>
  <circle cx="38" cy="240" r="4" fill="#66BB6A" opacity="0.6"/>
  <circle cx="34" cy="250" r="4" fill="#81C784" opacity="0.6"/>
  <circle cx="42" cy="248" r="4" fill="#4CAF50" opacity="0.5"/>
  <text x="52" y="245" font-family="Arial,sans-serif" font-size="7" fill="#333">Популяция —</text>
  <text x="52" y="254" font-family="Arial,sans-serif" font-size="6.5" fill="#555">группа особей одного вида,</text>
  <text x="52" y="262" font-family="Arial,sans-serif" font-size="6.5" fill="#555">обитающих на одной территории</text>

  <!-- Criteria -->
  <text x="18" y="278" font-family="Arial,sans-serif" font-size="7.5" fill="#1B5E20" font-weight="bold">Критерии вида:</text>

  <rect x="18" y="283" width="8" height="8" rx="1" fill="#E53935" opacity="0.6"/>
  <text x="30" y="290" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Морфологический</text>
  <text x="30" y="298" font-family="Arial,sans-serif" font-size="5.5" fill="#888">сходство строения</text>

  <rect x="18" y="303" width="8" height="8" rx="1" fill="#1565C0" opacity="0.6"/>
  <text x="30" y="310" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Генетический</text>
  <text x="30" y="318" font-family="Arial,sans-serif" font-size="5.5" fill="#888">одинаковый набор хромосом</text>

  <rect x="18" y="323" width="8" height="8" rx="1" fill="#FF8F00" opacity="0.6"/>
  <text x="30" y="330" font-family="Arial,sans-serif" font-size="6.5" fill="#333">Экологический</text>
  <text x="88" y="330" font-family="Arial,sans-serif" font-size="5.5" fill="#888">+ географич., физиологич.</text>

  <!-- === PHYLOGENETIC TREE (center-right) === -->
  <rect x="182" y="38" width="310" height="170" rx="5" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
  <text x="337" y="52" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Филогенетическое древо растений</text>

  <!-- Main trunk -->
  <line x1="337" y1="195" x2="337" y2="70" stroke="#1B5E20" stroke-width="2.5"/>

  <!-- Branch splits -->
  <!-- Base: Общие предки -->
  <circle cx="337" cy="190" r="3" fill="#1B5E20"/>

  <!-- Split 1: Водоросли -->
  <line x1="337" y1="180" x2="210" y2="168" stroke="#1B5E20" stroke-width="1.5"/>
  <rect x="188" y="160" width="44" height="16" rx="3" fill="#00ACC1" opacity="0.3" stroke="#00695C" stroke-width="0.8"/>
  <text x="210" y="171" font-family="Arial,sans-serif" font-size="7" fill="#00695C" text-anchor="middle" font-weight="bold">Водоросли</text>

  <!-- Split 2: Мхи -->
  <line x1="337" y1="165" x2="260" y2="148" stroke="#1B5E20" stroke-width="1.5"/>
  <rect x="240" y="140" width="40" height="16" rx="3" fill="#4CAF50" opacity="0.3" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="260" y="151" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" font-weight="bold">Мхи</text>

  <!-- Split 3: Папоротники -->
  <line x1="337" y1="145" x2="320" y2="128" stroke="#1B5E20" stroke-width="1.5"/>
  <rect x="288" y="120" width="64" height="16" rx="3" fill="#66BB6A" opacity="0.3" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="320" y="131" font-family="Arial,sans-serif" font-size="6.5" fill="#2E7D32" text-anchor="middle" font-weight="bold">Папоротники</text>

  <!-- Split 4: Голосеменные -->
  <line x1="337" y1="120" x2="400" y2="105" stroke="#1B5E20" stroke-width="1.5"/>
  <rect x="370" y="97" width="70" height="16" rx="3" fill="#8BC34A" opacity="0.3" stroke="#558B2F" stroke-width="0.8"/>
  <text x="405" y="108" font-family="Arial,sans-serif" font-size="6.5" fill="#558B2F" text-anchor="middle" font-weight="bold">Голосеменные</text>

  <!-- Split 5: Покрытосеменные -->
  <line x1="337" y1="95" x2="440" y2="78" stroke="#1B5E20" stroke-width="2"/>
  <rect x="398" y="66" width="88" height="18" rx="4" fill="#2E7D32" opacity="0.3" stroke="#1B5E20" stroke-width="1"/>
  <text x="442" y="78" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20" text-anchor="middle" font-weight="bold">Покрытосеменные</text>

  <!-- Sub-branches for Покрытосеменные -->
  <line x1="442" y1="84" x2="420" y2="90" stroke="#2E7D32" stroke-width="1"/>
  <line x1="442" y1="84" x2="465" y2="90" stroke="#2E7D32" stroke-width="1"/>
  <text x="420" y="98" font-family="Arial,sans-serif" font-size="6" fill="#388E3C" text-anchor="middle">Однодольные</text>
  <text x="465" y="98" font-family="Arial,sans-serif" font-size="6" fill="#388E3C" text-anchor="middle">Двудольные</text>

  <!-- Timeline arrow on left -->
  <line x1="190" y1="192" x2="190" y2="65" stroke="#666" stroke-width="0.8" marker-end="url(#arrowhead)"/>
  <text x="186" y="130" font-family="Arial,sans-serif" font-size="6" fill="#666" text-anchor="end" transform="rotate(-90,186,130)">Время →</text>

  <!-- Key innovations on tree -->
  <text x="225" y="167" font-family="Arial,sans-serif" font-size="5" fill="#888">→ фотосинтез</text>
  <text x="272" y="145" font-family="Arial,sans-serif" font-size="5" fill="#888">→ стебель, листья</text>
  <text x="325" y="118" font-family="Arial,sans-serif" font-size="5" fill="#888">→ сосуды</text>
  <text x="370" y="100" font-family="Arial,sans-serif" font-size="5" fill="#888">→ семена</text>
  <text x="393" y="88" font-family="Arial,sans-serif" font-size="5" fill="#888">→ цветок, плод</text>

  <!-- === CLASSIFICATION EVOLUTION (bottom-center-right) === -->
  <rect x="182" y="210" width="310" height="132" rx="5" fill="white" fill-opacity="0.7" stroke="#2E7D32" stroke-width="1"/>
  <text x="337" y="224" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Эволюция систем классификации</text>

  <!-- Timeline arrow -->
  <line x1="200" y1="244" x2="472" y2="244" stroke="#2E7D32" stroke-width="1.2"/>
  <polygon points="472,244 467,241 467,247" fill="#2E7D32"/>
  <text x="476" y="247" font-family="Arial,sans-serif" font-size="6" fill="#666">время</text>

  <!-- Morphological classification -->
  <rect x="200" y="250" width="80" height="82" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="1"/>
  <text x="240" y="263" font-family="Arial,sans-serif" font-size="7.5" fill="#2E7D32" text-anchor="middle" font-weight="bold">Морфологи-</text>
  <text x="240" y="273" font-family="Arial,sans-serif" font-size="7.5" fill="#2E7D32" text-anchor="middle" font-weight="bold">ческая</text>

  <text x="240" y="286" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Линней, XVIII в.</text>
  <text x="240" y="296" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">По внешнему</text>
  <text x="240" y="305" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">сходству органов</text>
  <!-- Leaf icon -->
  <ellipse cx="240" cy="320" rx="8" ry="5" fill="#4CAF50" opacity="0.3"/>
  <line x1="232" y1="320" x2="248" y2="320" stroke="#2E7D32" stroke-width="0.5"/>

  <!-- Anatomical classification -->
  <rect x="295" y="250" width="80" height="82" rx="4" fill="#FFF3E0" stroke="#FF9800" stroke-width="1"/>
  <text x="335" y="263" font-family="Arial,sans-serif" font-size="7.5" fill="#E65100" text-anchor="middle" font-weight="bold">Анатомиче-</text>
  <text x="335" y="273" font-family="Arial,sans-serif" font-size="7.5" fill="#E65100" text-anchor="middle" font-weight="bold">ская</text>

  <text x="335" y="286" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">XIX–XX вв.</text>
  <text x="335" y="296" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Строение клеток,</text>
  <text x="335" y="305" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">тканей, органов</text>
  <!-- Cell icon -->
  <circle cx="335" cy="320" r="7" fill="#FF9800" opacity="0.2" stroke="#E65100" stroke-width="0.5"/>
  <circle cx="335" cy="319" r="2.5" fill="#FF9800" opacity="0.3"/>

  <!-- Molecular classification (APG) -->
  <rect x="390" y="250" width="95" height="82" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1"/>
  <text x="437" y="263" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle" font-weight="bold">Молекулярная</text>
  <text x="437" y="273" font-family="Arial,sans-serif" font-size="7.5" fill="#0D47A1" text-anchor="middle" font-weight="bold">(APG)</text>

  <text x="437" y="286" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">1998 → APG IV 2016</text>
  <text x="437" y="296" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">Данные ДНК</text>
  <text x="437" y="305" font-family="Arial,sans-serif" font-size="6" fill="#555" text-anchor="middle">(гены rbcL, matK)</text>
  <!-- DNA icon -->
  <path d="M430,312 Q437,316 444,312 Q437,320 430,316" fill="none" stroke="#1565C0" stroke-width="0.8"/>
  <path d="M430,316 Q437,320 444,316 Q437,324 430,320" fill="none" stroke="#1565C0" stroke-width="0.8"/>
  <line x1="432" y1="313" x2="432" y2="319" stroke="#1565C0" stroke-width="0.4"/>
  <line x1="437" y1="314" x2="437" y2="320" stroke="#1565C0" stroke-width="0.4"/>
  <line x1="442" y1="313" x2="442" y2="319" stroke="#1565C0" stroke-width="0.4"/>

  <!-- Progress arrows between stages -->
  <path d="M282,290 L293,290" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>
  <path d="M377,290 L388,290" fill="none" stroke="#2E7D32" stroke-width="1" marker-end="url(#arrowG)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowG" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <polygon points="0,0 6,2 0,4" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- Bottom label -->
  <text x="250" y="340" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32" text-anchor="middle" opacity="0.6">Биология 7 класс — Урок 37</text>
</svg>