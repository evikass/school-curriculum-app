<text x="30" y="68" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Подосиновик</text>
</g>

<!-- Пластинчатые label -->
<text x="215" y="82" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#5D4037" text-anchor="middle">Пластинчатые</text>

<!-- Сыроежка -->
<g transform="translate(180,90)">
<ellipse cx="32" cy="18" rx="26" ry="14" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
<rect x="27" y="32" width="10" height="32" rx="2" fill="#EFEBE9" stroke="#8D6E63" stroke-width="0.8"/>
<!-- Gills -->
<line x1="18" y1="28" x2="26" y2="42" stroke="#C8E6C9" stroke-width="0.5"/>
<line x1="23" y1="28" x2="28" y2="44" stroke="#C8E6C9" stroke-width="0.5"/>
<line x1="28" y1="28" x2="30" y2="44" stroke="#C8E6C9" stroke-width="0.5"/>
<line x1="36" y1="28" x2="34" y2="44" stroke="#C8E6C9" stroke-width="0.5"/>
<line x1="41" y1="28" x2="38" y2="42" stroke="#C8E6C9" stroke-width="0.5"/>
<line x1="46" y1="28" x2="40" y2="38" stroke="#C8E6C9" stroke-width="0.5"/>
<text x="32" y="76" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Сыроежка</text>
</g>

<!-- Вешенка -->
<g transform="translate(240,100)">
<path d="M5,25 Q15,5 35,0 Q45,5 40,20 Q35,30 25,30 Q15,30 5,25Z" fill="#EFEBE9" stroke="#8D6E63" stroke-width="0.8"/>
<rect x="22" y="28" width="6" height="22" rx="1" fill="#EFEBE9" stroke="#8D6E63" stroke-width="0.7"/>
<text x="22" y="60" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Вешенка</text>
</g>

<!-- Divider line -->
<line x1="30" y1="175" x2="470" y2="175" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

<!-- Edible vs Poisonous -->
<g transform="translate(20,180)">
<rect x="0" y="0" width="130" height="55" rx="4" fill="#E8F5E9" opacity="0.5" stroke="#4CAF50" stroke-width="0.8"/>
<text x="65" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">Съедобные</text>
<text x="8" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">✓ Белый, Подберёзовик</text>
<text x="8" y="34" font-family="Arial,sans-serif" font-size="6" fill="#333">✓ Шампиньон, Опёнок</text>
<text x="8" y="44" font-family="Arial,sans-serif" font-size="6" fill="#333">✓ Лисичка, Рыжик</text>
<text x="8" y="54" font-family="Arial,sans-serif" font-size="5.5" fill="#666">Перед употреблением —</text>
<text x="8" y="62" font-family="Arial,sans-serif" font-size="5.5" fill="#666">обязательная термообработка!</text>
</g>

<g transform="translate(155,180)">
<rect x="0" y="0" width="130" height="55" rx="4" fill="#FFEBEE" opacity="0.5" stroke="#F44336" stroke-width="0.8"/>
<text x="65" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#C62828" text-anchor="middle">Ядовитые</text>
<text x="8" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">✗ Бледная поганка</text>
<text x="8" y="34" font-family="Arial,sans-serif" font-size="6" fill="#333">✗ Мухомор красный</text>
<text x="8" y="44" font-family="Arial,sans-serif" font-size="6" fill="#333">✗ Ложный опёнок</text>
<text x="8" y="54" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828">Смертельно опасны!</text>
</g>

<!-- Мухомор illustration -->
<g transform="translate(200,85)">
<ellipse cx="65" cy="50" rx="22" ry="14" fill="url(#capRed)" stroke="#B71C1C" stroke-width="0.8"/>
