<text x="65" y="67" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">почва, лес</text>
<text x="125" y="67" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">субстрат</text>
<text x="175" y="67" font-family="Arial,sans-serif" font-size="5.5" fill="#F57F17">сахарная</text>
<text x="5" y="77" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Значение</text>
<text x="65" y="77" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">пища</text>
<text x="125" y="77" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">антибиотики</text>
<text x="175" y="77" font-family="Arial,sans-serif" font-size="5.5" fill="#F57F17">хлеб, пиво</text>
</g>

<!-- Tube vs Plate detail -->
<g transform="translate(20,245)">
