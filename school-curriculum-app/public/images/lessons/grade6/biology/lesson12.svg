<ellipse cx="30" cy="30" rx="10" ry="8" fill="#FFECB3" stroke="#F9A825" stroke-width="1"/>
<!-- Bud 1 -->
<ellipse cx="42" cy="25" rx="7" ry="5.5" fill="#FFECB3" stroke="#F9A825" stroke-width="0.8"/>
