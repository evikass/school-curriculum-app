<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="capBrown" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
<linearGradient id="capRed" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#E53935"/><stop offset="100%" stop-color="#B71C1C"/></linearGradient>
<linearGradient id="capYellow" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFEE58"/><stop offset="100%" stop-color="#F9A825"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Многообразие грибов: шляпочные, плесневые, дрожжи</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 12</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Шляпочные грибы -->
<text x="145" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Шляпочные грибы</text>

<!-- Трубчатые label -->
<text x="72" y="82" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#5D4037" text-anchor="middle">Трубчатые</text>

<!-- White mushroom (Боровик/Белый) -->
<g transform="translate(35,90)">
<ellipse cx="37" cy="18" rx="30" ry="16" fill="url(#capBrown)" stroke="#4E342E" stroke-width="1"/>
<rect x="31" y="34" width="12" height="35" rx="3" fill="#EFEBE9" stroke="#8D6E63" stroke-width="0.8"/>
