<circle cx="24" cy="22" r="1.2" fill="#1B5E20" opacity="0.5"/>
<circle cx="28" cy="20" r="1" fill="#1B5E20" opacity="0.5"/>
<circle cx="30" cy="24" r="1.2" fill="#1B5E20" opacity="0.5"/>
<circle cx="25" cy="26" r="1" fill="#1B5E20" opacity="0.5"/>
<circle cx="30" cy="28" r="0.8" fill="#1B5E20" opacity="0.5"/>
<!-- Columella -->
<ellipse cx="27" cy="24" rx="4" ry="3" fill="#2E7D32" opacity="0.3"/>
<text x="27" y="56" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32" text-anchor="middle">спорангий</text>
<line x1="27" y1="34" x2="27" y2="53" stroke="#2E7D32" stroke-width="0.3" stroke-dasharray="1,1"/>
<text x="27" y="85" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">белая плесень</text>
</g>

<!-- Пенициллиум -->
<g transform="translate(375,78)">
<rect x="0" y="0" width="65" height="88" rx="4" fill="white" opacity="0.4" stroke="#9E9E9E" stroke-width="0.5"/>
<text x="32" y="10" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#616161" text-anchor="middle">Пенициллиум</text>
<!-- Substrate -->
<rect x="5" y="72" width="55" height="10" rx="2" fill="#FFCC80" opacity="0.5"/>
<!-- Conidiophore -->
<line x1="32" y1="72" x2="32" y2="35" stroke="#1976D2" stroke-width="1"/>
<!-- Brush-like conidial head -->
<path d="M32,35 Q25,28 20,22" fill="none" stroke="#1976D2" stroke-width="0.8"/>
<path d="M32,35 Q28,25 25,18" fill="none" stroke="#1976D2" stroke-width="0.8"/>
<path d="M32,35 Q32,24 32,16" fill="none" stroke="#1976D2" stroke-width="0.8"/>
<path d="M32,35 Q36,25 39,18" fill="none" stroke="#1976D2" stroke-width="0.8"/>
<path d="M32,35 Q39,28 44,22" fill="none" stroke="#1976D2" stroke-width="0.8"/>
<!-- Conidia chains -->
<circle cx="19" cy="20" r="1.5" fill="#42A5F5" opacity="0.7"/>
<circle cx="17" cy="22" r="1.3" fill="#42A5F5" opacity="0.6"/>
<circle cx="24" cy="15" r="1.5" fill="#42A5F5" opacity="0.7"/>
<circle cx="22" cy="17" r="1.3" fill="#42A5F5" opacity="0.6"/>
<circle cx="32" cy="13" r="1.5" fill="#42A5F5" opacity="0.7"/>
<circle cx="32" cy="11" r="1.3" fill="#42A5F5" opacity="0.6"/>
<circle cx="40" cy="15" r="1.5" fill="#42A5F5" opacity="0.7"/>
<circle cx="42" cy="17" r="1.3" fill="#42A5F5" opacity="0.6"/>
<circle cx="45" cy="20" r="1.5" fill="#42A5F5" opacity="0.7"/>
<circle cx="47" cy="22" r="1.3" fill="#42A5F5" opacity="0.6"/>
<text x="32" y="55" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">конидии</text>
<text x="32" y="85" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">зелёная плесень</text>
</g>

<!-- Section 3: Дрожжи -->
<text x="440" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Дрожжи</text>

<g transform="translate(410,78)">
<rect x="0" y="0" width="80" height="88" rx="4" fill="white" opacity="0.4" stroke="#9E9E9E" stroke-width="0.5"/>
