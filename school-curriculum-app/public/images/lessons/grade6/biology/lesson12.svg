<ellipse cx="55" cy="50" rx="9" ry="7" fill="#FFECB3" stroke="#F9A825" stroke-width="1"/>
<ellipse cx="65" cy="44" rx="6" ry="5" fill="#FFECB3" stroke="#F9A825" stroke-width="0.8"/>
<!-- Single cell -->
<ellipse cx="25" cy="55" rx="8" ry="6.5" fill="#FFECB3" stroke="#F9A825" stroke-width="1"/>
<!-- Nuclei -->
<ellipse cx="28" cy="29" rx="3" ry="2.5" fill="#F57F17" opacity="0.3"/>
<ellipse cx="54" cy="49" rx="2.5" ry="2" fill="#F57F17" opacity="0.3"/>
<ellipse cx="24" cy="54" rx="2.5" ry="2" fill="#F57F17" opacity="0.3"/>
<!-- Bud scar -->
<circle cx="38" cy="34" r="1.5" fill="none" stroke="#F9A825" stroke-width="0.5"/>
<!-- Labels -->
<text x="40" y="70" font-family="Arial,sans-serif" font-size="6" fill="#F57F17" text-anchor="middle">почкование</text>
<text x="40" y="82" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Saccharomyces</text>
</g>

<!-- Bottom section: Comparison -->
