<circle cx="55" cy="43" r="3.5" fill="white" opacity="0.8"/>
<circle cx="70" cy="40" r="4" fill="white" opacity="0.8"/>
<circle cx="62" cy="48" r="3" fill="white" opacity="0.8"/>
<circle cx="78" cy="46" r="2.5" fill="white" opacity="0.7"/>
<rect x="60" y="64" width="10" height="30" rx="2" fill="#EFEBE9" stroke="#8D6E63" stroke-width="0.7"/>
<!-- Ring -->
<ellipse cx="65" cy="78" rx="8" ry="2.5" fill="#D7CCC8" stroke="#8D6E63" stroke-width="0.5"/>
<!-- Gills -->
<line x1="50" y1="58" x2="58" y2="72" stroke="#FFCDD2" stroke-width="0.4"/>
<line x1="55" y1="58" x2="61" y2="74" stroke="#FFCDD2" stroke-width="0.4"/>
<line x1="60" y1="58" x2="63" y2="74" stroke="#FFCDD2" stroke-width="0.4"/>
<line x1="70" y1="58" x2="67" y2="74" stroke="#FFCDD2" stroke-width="0.4"/>
<line x1="75" y1="58" x2="72" y2="72" stroke="#FFCDD2" stroke-width="0.4"/>
<line x1="80" y1="58" x2="75" y2="68" stroke="#FFCDD2" stroke-width="0.4"/>
<text x="65" y="102" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle">Мухомор</text>
</g>

<!-- Section 2: Плесневые грибы -->
<text x="370" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Плесневые грибы</text>

<!-- Мукор -->
<g transform="translate(310,78)">
<rect x="0" y="0" width="55" height="88" rx="4" fill="white" opacity="0.4" stroke="#9E9E9E" stroke-width="0.5"/>
<text x="27" y="10" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#616161" text-anchor="middle">Мукор</text>
<!-- Substrate -->
<rect x="5" y="72" width="45" height="10" rx="2" fill="#FFCC80" opacity="0.5"/>
<!-- Sporangiophore -->
<line x1="27" y1="72" x2="27" y2="30" stroke="#4CAF50" stroke-width="1.2"/>
<!-- Sporangium -->
<circle cx="27" cy="24" r="10" fill="#4CAF50" opacity="0.3" stroke="#2E7D32" stroke-width="1"/>
