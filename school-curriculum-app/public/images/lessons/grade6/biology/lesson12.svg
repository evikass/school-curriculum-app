<rect x="15" y="30" width="44" height="6" rx="2" fill="#FFCC80" opacity="0.5" stroke="#E65100" stroke-width="0.5"/>
<!-- Small tubes visible -->
<circle cx="22" cy="33" r="1" fill="#E65100" opacity="0.4"/>
<circle cx="27" cy="33" r="1" fill="#E65100" opacity="0.4"/>
<circle cx="32" cy="33" r="1" fill="#E65100" opacity="0.4"/>
<circle cx="37" cy="33" r="1" fill="#E65100" opacity="0.4"/>
<circle cx="42" cy="33" r="1" fill="#E65100" opacity="0.4"/>
<circle cx="47" cy="33" r="1" fill="#E65100" opacity="0.4"/>
<circle cx="52" cy="33" r="1" fill="#E65100" opacity="0.4"/>
<text x="37" y="80" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Белый гриб</text>
</g>

<!-- Подосиновик -->
<g transform="translate(100,95)">
<ellipse cx="30" cy="16" rx="25" ry="14" fill="#E53935" opacity="0.8" stroke="#B71C1C" stroke-width="0.8"/>
