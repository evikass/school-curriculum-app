<text x="175" y="37" font-family="Arial,sans-serif" font-size="5.5" fill="#F57F17">однокл.</text>
<text x="5" y="47" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Размнож.</text>
<text x="65" y="47" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">споры</text>
<text x="125" y="47" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">споры/конидии</text>
<text x="175" y="47" font-family="Arial,sans-serif" font-size="5.5" fill="#F57F17">почкование</text>
<text x="5" y="57" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Плодовое тело</text>
<text x="65" y="57" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">есть</text>
<text x="125" y="57" font-family="Arial,sans-serif" font-size="5.5" fill="#2E7D32">нет</text>
<text x="175" y="57" font-family="Arial,sans-serif" font-size="5.5" fill="#F57F17">нет</text>
