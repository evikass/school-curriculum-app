<rect x="260" y="170" width="100" height="65" rx="5" fill="#FFF9C4" opacity="0.5" stroke="#F9A825" stroke-width="0.8"/>
<text x="310" y="182" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17" text-anchor="middle">Световая фаза</text>
