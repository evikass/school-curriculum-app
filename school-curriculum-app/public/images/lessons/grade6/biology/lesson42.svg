<text x="310" y="198" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">H₂O → H⁺ + e⁻</text>
<text x="310" y="207" font-family="Arial,sans-serif" font-size="5" fill="#1565C0">O₂ ↑ (выделение)</text>
<text x="310" y="216" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">ATP + NADPH</text>
<text x="310" y="225" font-family="Arial,sans-serif" font-size="4.5" fill="#666">на тилакоидах гран</text>
<text x="310" y="232" font-family="Arial,sans-serif" font-size="4.5" fill="#666">фотолиз воды</text>

<!-- Dark phase box -->
<rect x="375" y="170" width="100" height="65" rx="5" fill="#C8E6C9" opacity="0.5" stroke="#2E7D32" stroke-width="0.8"/>
<text x="425" y="182" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Тёмная фаза</text>
<!-- CO2 icon -->
<text x="400" y="200" font-family="Arial,sans-serif" font-size="6" fill="#546E7A">CO₂</text>
<text x="425" y="200" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">→ C₆H₁₂O₆</text>
<text x="425" y="210" font-family="Arial,sans-serif" font-size="5" fill="#F57F17">исп. ATP + NADPH</text>
<text x="425" y="219" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20">глюкоза (сахар)</text>
<text x="425" y="228" font-family="Arial,sans-serif" font-size="4.5" fill="#666">в строме хлоропласта</text>
<text x="425" y="236" font-family="Arial,sans-serif" font-size="4.5" fill="#666">цикл Кальвина</text>

<!-- Arrow from light to dark phase -->
<path d="M360,202 L375,202" stroke="#2E7D32" stroke-width="1.2" fill="none"/>
<polygon points="375,200 380,202 375,204" fill="#2E7D32"/>
<text x="368" y="198" font-family="Arial,sans-serif" font-size="4" fill="#2E7D32">ATP</text>

<!-- SECTION 5: Cosmic role -->
<text x="250" y="250" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Космическая роль фотосинтеза</text>
<rect x="15" y="255" width="470" height="40" rx="4" fill="#FFF" opacity="0.3"/>
<text x="250" y="267" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">1. Образование O₂ в атмосфере   2. Создание органических веществ   3. Поглощение CO₂</text>
<text x="250" y="278" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">4. Преобразование энергии Солнца   5. Поддержание жизни на Земле</text>
<text x="250" y="290" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Хлорофилл похож на гемоглобин (вместо Mg — Fe). Открытия: Ван Гельмонт, Пристли, Ингенхауз, Сенебье, Тимирязев</text>

<!-- Summary -->
<text x="250" y="310" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Ограничивающие факторы: свет, CO₂, температура, вода</text>
<rect x="60" y="315" width="380" height="18" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.5"/>
<text x="250" y="327" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Фотосинтез — единственный процесс, создающий органические вещества из неорганических с использованием энергии света</text>
</svg>