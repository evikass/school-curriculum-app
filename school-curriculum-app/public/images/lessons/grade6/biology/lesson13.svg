<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="rootGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Роль грибов в природе и жизни человека</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 13</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Mycorrhiza diagram (left) -->
<text x="125" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Микориза — симбиоз гриба и корня</text>

<!-- Tree trunk -->
<rect x="95" y="75" width="30" height="30" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
<path d="M100,75 Q110,65 120,75" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.8"/>
<path d="M95,80 Q85,70 90,78" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.6"/>
<path d="M125,80 Q135,72 130,80" fill="#4CAF50" stroke="#2E7D32" stroke-width="0.6"/>

<!-- Main root -->
<path d="M110,105 Q100,130 90,155 Q85,170 80,190" fill="none" stroke="#8D6E63" stroke-width="5" stroke-linecap="round"/>
<!-- Lateral root -->
<path d="M95,140 Q75,150 60,165" fill="none" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
<!-- Root tip -->
<path d="M80,190 Q78,200 82,208" fill="none" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>

<!-- Fungal hyphae wrapping around root (ectomycorrhiza) -->
<path d="M72,140 Q78,132 85,140 Q92,148 98,140" fill="none" stroke="#FF9800" stroke-width="1.5"/>
<path d="M75,148 Q82,140 88,148 Q94,156 100,148" fill="none" stroke="#FF9800" stroke-width="1.3"/>
<path d="M78,156 Q85,148 92,156" fill="none" stroke="#FF9800" stroke-width="1.2"/>
<path d="M65,160 Q72,152 78,160 Q84,168 90,160" fill="none" stroke="#FF9800" stroke-width="1.2"/>
<path d="M70,168 Q78,160 85,168 Q92,176 98,168" fill="none" stroke="#FF9800" stroke-width="1"/>

<!-- External hyphae network -->
<path d="M55,162 Q45,155 38,165 Q30,175 35,185" fill="none" stroke="#FF9800" stroke-width="0.8"/>
<path d="M50,170 Q40,180 35,190" fill="none" stroke="#FF9800" stroke-width="0.8"/>
<path d="M38,165 Q28,160 22,170" fill="none" stroke="#FFB74D" stroke-width="0.6"/>
<path d="M35,185 Q28,195 22,190" fill="none" stroke="#FFB74D" stroke-width="0.6"/>

<!-- Arrows showing exchange -->
<text x="50" y="120" font-family="Arial,sans-serif" font-size="6" fill="#8D6E63">минеральные</text>
<text x="50" y="128" font-family="Arial,sans-serif" font-size="6" fill="#8D6E63">вещества →</text>
<path d="M68,130 L80,138" fill="none" stroke="#8D6E63" stroke-width="0.8" marker-end="url(#arrowBrown)"/>

<text x="120" y="120" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">← органические</text>
<text x="120" y="128" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">вещества</text>
<path d="M118,130 L105,138" fill="none" stroke="#2E7D32" stroke-width="0.8"/>

<!-- Labels -->
<text x="55" y="145" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">гифы гриба</text>
<text x="105" y="200" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">корень дерева</text>

<!-- Ectomycorrhiza vs Endomycorrhiza note -->
<g transform="translate(15,215)">
<rect x="0" y="0" width="120" height="35" rx="3" fill="white" opacity="0.5" stroke="#FF9800" stroke-width="0.5"/>
<text x="60" y="10" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#E65100" text-anchor="middle">Типы микоризы</text>
<text x="5" y="20" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Эктотрофная — гифы снаружи</text>
<text x="5" y="28" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Эндотрофная — гифы внутри</text>
</g>

<!-- Section 2: Decomposer cycle (top right) -->
<text x="330" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Редуценты — круговорот веществ</text>

<g transform="translate(255,78)">
<!-- Dead tree/leaf -->
<path d="M20,20 Q35,10 50,18 Q55,30 45,40 Q30,48 20,38 Q12,28 20,20Z" fill="#8D6E63" opacity="0.5" stroke="#5D4037" stroke-width="0.8"/>
<path d="M30,22 Q32,18 35,22" fill="none" stroke="#5D4037" stroke-width="0.5"/>
<!-- Fungi on dead matter -->
<ellipse cx="35" cy="18" rx="8" ry="5" fill="#A5D6A7" opacity="0.6" stroke="#4CAF50" stroke-width="0.6"/>
<rect x="33" y="23" width="4" height="8" rx="1" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.5"/>

<!-- Arrow down -->
<path d="M35,45 L35,55" fill="none" stroke="#2E7D32" stroke-width="1.2"/>
<polygon points="32,55 38,55 35,60" fill="#2E7D32"/>

<!-- Decomposition products -->
<text x="35" y="72" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">CO₂ + H₂O</text>
<text x="35" y="80" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">минеральные соли</text>

<!-- Arrow to soil -->
<path d="M35,82 L35,92" fill="none" stroke="#795548" stroke-width="1"/>
<polygon points="32,92 38,92 35,97" fill="#795548"/>

<!-- Soil -->
<rect x="10" y="97" width="50" height="12" rx="2" fill="#8D6E63" opacity="0.3" stroke="#5D4037" stroke-width="0.5"/>
<text x="35" y="106" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">почва</text>

<!-- Arrow back up -->
<path d="M65,103 Q80,90 80,65 Q80,40 60,28" fill="none" stroke="#4CAF50" stroke-width="0.8" stroke-dasharray="3,2"/>
<polygon points="62,30 58,26 64,27" fill="#4CAF50"/>

<!-- Plant -->
<path d="M82,103 Q82,85 78,75 Q75,65 72,55" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<ellipse cx="72" cy="50" rx="8" ry="5" fill="#81C784" stroke="#4CAF50" stroke-width="0.6"/>
<text x="85" y="70" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32">растение</text>
</g>

<!-- Section 3: Food industry (middle right) -->
<text x="390" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Пищевая промышленность</text>

<g transform="translate(350,78)">
<!-- Bread -->
<rect x="0" y="5" width="35" height="22" rx="6" fill="#FFCC80" stroke="#E65100" stroke-width="0.8"/>
<path d="M3,15 Q17,0 32,15" fill="#FFE0B2" stroke="#E65100" stroke-width="0.5"/>
<text x="17" y="35" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100" text-anchor="middle">Хлеб</text>
<text x="17" y="42" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(дрожжи)</text>

<!-- Cheese -->
<rect x="45" y="8" width="25" height="18" rx="2" fill="#FFF9C4" stroke="#F9A825" stroke-width="0.8"/>
<circle cx="52" cy="15" r="2" fill="#F9A825" opacity="0.4"/>
<circle cx="60" cy="18" r="1.5" fill="#F9A825" opacity="0.4"/>
<text x="57" y="35" font-family="Arial,sans-serif" font-size="5.5" fill="#F9A825" text-anchor="middle">Сыр</text>
<text x="57" y="42" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(грибы)</text>

<!-- Beer/wine -->
<path d="M90,10 L95,10 Q100,10 100,15 L100,22 Q100,27 95,27 L90,27 Q85,27 85,22 L85,15 Q85,10 90,10Z" fill="#FFECB3" stroke="#F57F17" stroke-width="0.7"/>
<rect x="87" y="5" width="6" height="5" rx="1" fill="#8D6E63" stroke="#5D4037" stroke-width="0.4"/>
<text x="92" y="35" font-family="Arial,sans-serif" font-size="5.5" fill="#F57F17" text-anchor="middle">Пиво/вино</text>
<text x="92" y="42" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(брожение)</text>
</g>

<!-- Section 4: Penicillium antibiotic (bottom center) -->
<text x="250" y="178" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Пенициллин — первый антибиотик</text>

<g transform="translate(150,188)">
<!-- Petri dish -->
<ellipse cx="65" cy="50" rx="65" ry="35" fill="white" opacity="0.4" stroke="#BDBDBD" stroke-width="1.5"/>
<ellipse cx="65" cy="50" rx="60" ry="32" fill="#FFF3E0" opacity="0.3"/>

<!-- Bacteria lawn (yellowish) -->
<ellipse cx="65" cy="50" rx="45" ry="22" fill="#FFECB3" opacity="0.3"/>

<!-- Penicillium colony (green-blue) -->
<circle cx="65" cy="50" r="12" fill="#42A5F5" opacity="0.3" stroke="#1976D2" stroke-width="0.8"/>
<circle cx="65" cy="50" r="8" fill="#66BB6A" opacity="0.4" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Inhibition zone (clear area around colony) -->
<circle cx="65" cy="50" r="20" fill="none" stroke="#F44336" stroke-width="0.8" stroke-dasharray="3,2"/>

<!-- Bacteria dots (killed ones faded) -->
<circle cx="45" cy="42" r="1.5" fill="#FFB74D" opacity="0.3"/>
<circle cx="85" cy="55" r="1.5" fill="#FFB74D" opacity="0.3"/>
<circle cx="50" cy="62" r="1.5" fill="#FFB74D" opacity="0.3"/>
<circle cx="80" cy="40" r="1.5" fill="#FFB74D" opacity="0.3"/>
<!-- Live bacteria (outside zone) -->
<circle cx="35" cy="35" r="1.5" fill="#FF9800"/>
<circle cx="95" cy="65" r="1.5" fill="#FF9800"/>
<circle cx="30" cy="55" r="1.5" fill="#FF9800"/>
<circle cx="100" cy="42" r="1.5" fill="#FF9800"/>
<circle cx="40" cy="68" r="1.5" fill="#FF9800"/>
<circle cx="90" cy="35" r="1.5" fill="#FF9800"/>

<!-- Labels -->
<text x="65" y="48" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">Пенициллиум</text>
<text x="65" y="54" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">(гриб)</text>
<text x="65" y="78" font-family="Arial,sans-serif" font-size="5" fill="#F44336" text-anchor="middle">зона подавления бактерий</text>
</g>

<!-- Fleming note -->
<g transform="translate(290,195)">
<rect x="0" y="0" width="170" height="42" rx="4" fill="white" opacity="0.5" stroke="#1976D2" stroke-width="0.5"/>
<text x="85" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1565C0" text-anchor="middle">Александр Флеминг, 1928</text>
<text x="5" y="24" font-family="Arial,sans-serif" font-size="5.5" fill="#333">Открыл пенициллин случайно:</text>
<text x="5" y="33" font-family="Arial,sans-serif" font-size="5.5" fill="#333">спора плесени попала в чашку</text>
<text x="5" y="42" font-family="Arial,sans-serif" font-size="5.5" fill="#333">с бактериями → они погибли</text>
</g>

<!-- Section 5: Summary of roles -->
<g transform="translate(15,260)">
<rect x="0" y="0" width="470" height="72" rx="5" fill="white" opacity="0.5" stroke="#2E7D32" stroke-width="0.6"/>
<text x="235" y="14" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20" text-anchor="middle">Значение грибов</text>
<line x1="10" y1="18" x2="460" y2="18" stroke="#2E7D32" stroke-width="0.3"/>

<!-- In Nature -->
<text x="75" y="30" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#2E7D32" text-anchor="middle">В природе</text>
<text x="75" y="40" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Редуценты: разлагают</text>
<text x="75" y="48" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">органические остатки</text>
<text x="75" y="56" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Микориза: помогают</text>
<text x="75" y="64" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">растениям питаться</text>

<!-- In food -->
<text x="205" y="30" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#E65100" text-anchor="middle">В питании</text>
<text x="205" y="40" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Съедобные грибы</text>
<text x="205" y="48" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Хлебопечение (дрожжи)</text>
<text x="205" y="56" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Сыроварение</text>
<text x="205" y="64" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Пивоварение, виноделие</text>

<!-- In medicine -->
<text x="340" y="30" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1565C0" text-anchor="middle">В медицине</text>
<text x="340" y="40" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Антибиотики (пенициллин)</text>
<text x="340" y="48" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Иммуносупрессоры</text>
<text x="340" y="56" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Витамины (B2, B12)</text>
<text x="340" y="64" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">• Препараты из гриба</text>
</g>

<!-- Warning about poisonous mushrooms -->
<g transform="translate(15,250)">
</g>
</svg>