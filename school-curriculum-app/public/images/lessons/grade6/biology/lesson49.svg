<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="groundG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Природные сообщества — биоценозы и биогеоценозы</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 49</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- SECTION 1: Forest biogeocenosis layers (ярусы) -->
<text x="130" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Ярусы лесного биогеоценоза</text>

<!-- Sky -->
<rect x="10" y="70" width="240" height="170" rx="4" fill="#E3F2FD" opacity="0.2"/>

<!-- Layer 1: Trees (Деревья) - top -->
<rect x="10" y="70" width="240" height="34" rx="0" fill="none" stroke="#1B5E20" stroke-width="0.3" stroke-dasharray="2,1"/>
<text x="22" y="80" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20">I ярус — Деревья</text>
<!-- Tree -->
<rect x="100" y="80" width="6" height="20" rx="1" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
<ellipse cx="103" cy="78" rx="14" ry="10" fill="#388E3C" stroke="#1B5E20" stroke-width="0.5"/>
<rect x="180" y="82" width="5" height="18" rx="1" fill="#795548" stroke="#5D4037" stroke-width="0.5"/>
<ellipse cx="182" cy="80" rx="12" ry="8" fill="#43A047" stroke="#2E7D32" stroke-width="0.5"/>

<!-- Layer 2: Shrubs (Кустарники) -->
<rect x="10" y="104" width="240" height="28" rx="0" fill="none" stroke="#388E3C" stroke-width="0.3" stroke-dasharray="2,1"/>
<text x="22" y="114" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#388E3C">II ярус — Кустарники</text>
<!-- Shrubs -->
<ellipse cx="70" cy="118" rx="12" ry="8" fill="#66BB6A" stroke="#388E3C" stroke-width="0.5"/>
<ellipse cx="150" cy="116" rx="10" ry="7" fill="#81C784" stroke="#4CAF50" stroke-width="0.5"/>

<!-- Layer 3: Herbs (Травы) -->
<rect x="10" y="132" width="240" height="24" rx="0" fill="none" stroke="#66BB6A" stroke-width="0.3" stroke-dasharray="2,1"/>
<text x="22" y="142" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#4CAF50">III ярус — Травы</text>
<!-- Grass -->
<line x1="80" y1="155" x2="80" y2="142" stroke="#81C784" stroke-width="0.8"/>
<line x1="85" y1="155" x2="85" y2="144" stroke="#A5D6A7" stroke-width="0.8"/>
<line x1="120" y1="155" x2="120" y2="140" stroke="#81C784" stroke-width="0.8"/>
<line x1="125" y1="155" x2="123" y2="142" stroke="#A5D6A7" stroke-width="0.8"/>
<line x1="200" y1="155" x2="200" y2="143" stroke="#81C784" stroke-width="0.8"/>
<line x1="205" y1="155" x2="203" y2="141" stroke="#A5D6A7" stroke-width="0.8"/>

<!-- Layer 4: Mosses (Мхи) -->
<rect x="10" y="156" width="240" height="18" rx="0" fill="none" stroke="#A5D6A7" stroke-width="0.3" stroke-dasharray="2,1"/>
<text x="22" y="168" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#81C784">IV ярус — Мхи</text>
<!-- Moss patches -->
<ellipse cx="90" cy="170" rx="10" ry="3" fill="#A5D6A7" stroke="#81C784" stroke-width="0.3"/>
<ellipse cx="160" cy="170" rx="8" ry="3" fill="#C8E6C9" stroke="#A5D6A7" stroke-width="0.3"/>

<!-- Layer 5: Litter (Подстилка) -->
<rect x="10" y="174" width="240" height="14" rx="0" fill="url(#groundG)" opacity="0.3"/>
<text x="22" y="184" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#5D4037">V ярус — Подстилка</text>
<!-- Leaf litter -->
<path d="M80,182 Q85,178 90,182" stroke="#8D6E63" stroke-width="0.5" fill="#BCAAA4" opacity="0.5"/>
<path d="M140,180 Q145,176 150,180" stroke="#8D6E63" stroke-width="0.5" fill="#BCAAA4" opacity="0.5"/>
<path d="M200,181 Q205,177 210,181" stroke="#8D6E63" stroke-width="0.5" fill="#BCAAA4" opacity="0.5"/>

<!-- Soil (underground) -->
<rect x="10" y="188" width="240" height="52" rx="0" fill="url(#groundG)" opacity="0.25"/>
<text x="22" y="200" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#5D4037">Почва</text>
<text x="22" y="210" font-family="Arial,sans-serif" font-size="5" fill="#795548">корни, грибы, бактерии</text>
<text x="22" y="220" font-family="Arial,sans-serif" font-size="5" fill="#795548">дождевые черви, личинки</text>

<!-- Section 2: Trophic levels -->
<text x="385" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#2E7D32" text-anchor="middle">Трофические уровни</text>

<!-- Ecological pyramid -->
<!-- Producers (bottom) -->
<polygon points="290,240 480,240 460,215 310,215" fill="#81C784" stroke="#388E3C" stroke-width="0.8"/>
<text x="385" y="232" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Продуценты (растения)</text>

<!-- Consumers I -->
<polygon points="310,215 460,215 445,192 325,192" fill="#FFB74D" stroke="#E65100" stroke-width="0.8"/>
<text x="385" y="207" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#BF360C" text-anchor="middle">Консументы I (травоядные)</text>

<!-- Consumers II -->
<polygon points="325,192 445,192 432,170 338,170" fill="#EF5350" stroke="#C62828" stroke-width="0.8"/>
<text x="385" y="184" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#FFF" text-anchor="middle">Консументы II (хищники)</text>

<!-- Consumers III (optional) -->
<polygon points="338,170 432,170 420,150 350,150" fill="#AB47BC" stroke="#6A1B9A" stroke-width="0.8"/>
<text x="385" y="163" font-family="Arial,sans-serif" font-size="5.5" font-weight="bold" fill="#FFF" text-anchor="middle">Консументы III</text>

<!-- Decomposers (side) -->
<rect x="290" y="242" width="190" height="12" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.6"/>
<text x="385" y="251" font-family="Arial,sans-serif" font-size="5.5" font-weight="bold" fill="#FFF" text-anchor="middle">Редуценты (бактерии, грибы)</text>

<!-- Arrows -->
<path d="M385,213 L385,215" stroke="#E65100" stroke-width="0.5"/>
<path d="M385,190 L385,192" stroke="#C62828" stroke-width="0.5"/>

<!-- Energy labels -->
<text x="480" y="230" font-family="Arial,sans-serif" font-size="4.5" fill="#666">1000 кДж</text>
<text x="480" y="205" font-family="Arial,sans-serif" font-size="4.5" fill="#666">100 кДж</text>
<text x="480" y="182" font-family="Arial,sans-serif" font-size="4.5" fill="#666">10 кДж</text>
<text x="480" y="160" font-family="Arial,sans-serif" font-size="4.5" fill="#666">1 кДж</text>

<!-- SECTION 3: Biocenosis vs Biogeocenosis definition -->
<text x="250" y="267" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Биоценоз vs Биогеоценоз</text>

<rect x="15" y="272" width="225" height="30" rx="3" fill="#FFF" opacity="0.3" stroke="#2E7D32" stroke-width="0.5"/>
<text x="127" y="282" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#2E7D32" text-anchor="middle">Биоценоз (Мёбиус, 1877)</text>
<text x="127" y="291" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">сообщество организмов (без среды)</text>
<text x="127" y="299" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">биоценоз = фитоценоз + зооценоз + микробоценоз</text>

<rect x="255" y="272" width="230" height="30" rx="3" fill="#FFF" opacity="0.3" stroke="#1B5E20" stroke-width="0.5"/>
<text x="370" y="282" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="#1B5E20" text-anchor="middle">Биогеоценоз (Сукачёв, 1942)</text>
<text x="370" y="291" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">биоценоз + экотоп (среда обитания)</text>
<text x="370" y="299" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">биогеоценоз = биоценоз + экотоп</text>

<!-- SECTION 4: Succession -->
<text x="250" y="314" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#2E7D32" text-anchor="middle">Сукцессия (смена сообществ)</text>

<!-- Succession stages -->
<rect x="10" y="319" width="480" height="22" rx="3" fill="#FFF" opacity="0.3" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Bare rock -->
<rect x="15" y="322" width="50" height="16" rx="2" fill="#9E9E9E" opacity="0.4"/>
<text x="40" y="332" font-family="Arial,sans-serif" font-size="5" fill="#616161" text-anchor="middle">скала</text>
<path d="M67,330 L77,330" stroke="#2E7D32" stroke-width="0.6" fill="none"/>
<polygon points="77,328 80,330 77,332" fill="#2E7D32"/>

<!-- Lichens -->
<rect x="80" y="322" width="55" height="16" rx="2" fill="#BCAAA4" opacity="0.3"/>
<text x="107" y="332" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">лишайники</text>
<path d="M137,330 L147,330" stroke="#2E7D32" stroke-width="0.6" fill="none"/>
<polygon points="147,328 150,330 147,332" fill="#2E7D32"/>

<!-- Mosses -->
<rect x="150" y="322" width="50" height="16" rx="2" fill="#C8E6C9" opacity="0.4"/>
<text x="175" y="332" font-family="Arial,sans-serif" font-size="5" fill="#388E3C" text-anchor="middle">мхи</text>
<path d="M202,330 L212,330" stroke="#2E7D32" stroke-width="0.6" fill="none"/>
<polygon points="212,328 215,330 212,332" fill="#2E7D32"/>

<!-- Grasses -->
<rect x="215" y="322" width="55" height="16" rx="2" fill="#A5D6A7" opacity="0.4"/>
<text x="242" y="332" font-family="Arial,sans-serif" font-size="5" fill="#2E7D32" text-anchor="middle">травы</text>
<path d="M272,330 L282,330" stroke="#2E7D32" stroke-width="0.6" fill="none"/>
<polygon points="282,328 285,330 282,332" fill="#2E7D32"/>

<!-- Shrubs -->
<rect x="285" y="322" width="55" height="16" rx="2" fill="#81C784" opacity="0.4"/>
<text x="312" y="332" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">кустарники</text>
<path d="M342,330 L352,330" stroke="#2E7D32" stroke-width="0.6" fill="none"/>
<polygon points="352,328 355,330 352,332" fill="#2E7D32"/>

<!-- Forest -->
<rect x="355" y="322" width="55" height="16" rx="2" fill="#388E3C" opacity="0.4"/>
<text x="382" y="332" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">лес</text>
<path d="M412,330 L422,330" stroke="#2E7D32" stroke-width="0.6" fill="none"/>
<polygon points="422,328 425,330 422,332" fill="#2E7D32"/>

<!-- Climax -->
<rect x="425" y="322" width="60" height="16" rx="2" fill="#1B5E20" opacity="0.3"/>
<text x="455" y="332" font-family="Arial,sans-serif" font-size="5" fill="#1B5E20" text-anchor="middle">климакс</text>
</svg>