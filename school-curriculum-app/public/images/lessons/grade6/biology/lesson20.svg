<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Хвощи и плауны</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 20</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Хвощ полевой -->
<text x="80" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Хвощ полевой</text>

<!-- Spring shoot (весенний побег) -->
<g transform="translate(15,75)">
<text x="35" y="0" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#8D6E63" text-anchor="middle">Весенний побег</text>

<!-- Stem -->
<rect x="32" y="15" width="6" height="85" rx="2" fill="#BE9C7D" stroke="#8D6E63" stroke-width="0.8"/>
<!-- Nodes -->
<line x1="32" y1="35" x2="38" y2="35" stroke="#6D4C41" stroke-width="0.8"/>
<line x1="32" y1="55" x2="38" y2="55" stroke="#6D4C41" stroke-width="0.8"/>
<line x1="32" y1="75" x2="38" y2="75" stroke="#6D4C41" stroke-width="0.8"/>

<!-- Strobilus (spore cone) on top -->
<ellipse cx="35" cy="10" rx="8" ry="8" fill="#8D6E63" opacity="0.6" stroke="#5D4037" stroke-width="0.8"/>
<!-- Sporangia pattern -->
<rect x="28" y="6" width="14" height="3" rx="1" fill="#5D4037" opacity="0.3"/>
<rect x="28" y="11" width="14" height="3" rx="1" fill="#5D4037" opacity="0.3"/>
<!-- Spores releasing -->
<circle cx="45" cy="5" r="1" fill="#FF9800" opacity="0.5"/>
<circle cx="48" cy="8" r="0.8" fill="#FF9800" opacity="0.4"/>
<circle cx="25" cy="4" r="1" fill="#FF9800" opacity="0.5"/>
<circle cx="22" cy="7" r="0.8" fill="#FF9800" opacity="0.4"/>

<!-- No chlorophyll - pale color note -->
<text x="35" y="110" font-family="Arial,sans-serif" font-size="5.5" fill="#8D6E63" text-anchor="middle">бесцветный,</text>
<text x="35" y="118" font-family="Arial,sans-serif" font-size="5.5" fill="#8D6E63" text-anchor="middle">без хлорофилла</text>

<!-- Strobilus label -->
<text x="55" y="8" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">стробил</text>
<text x="55" y="15" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">(спороносный</text>
<text x="55" y="22" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">колосок)</text>

<!-- Node label -->
<text x="48" y="38" font-family="Arial,sans-serif" font-size="5.5" fill="#6D4C41">узел</text>
<text x="48" y="58" font-family="Arial,sans-serif" font-size="5.5" fill="#6D4C41">узел</text>

<!-- Elaters on spores (споры с пружинками) -->
<g transform="translate(0,70)">
<circle cx="55" cy="15" r="3" fill="#FF9800" opacity="0.4" stroke="#E65100" stroke-width="0.4"/>
<path d="M58,15 Q62,12 60,8 Q58,5 62,3" fill="none" stroke="#E65100" stroke-width="0.5"/>
<text x="70" y="12" font-family="Arial,sans-serif" font-size="5" fill="#E65100">споры с</text>
<text x="70" y="19" font-family="Arial,sans-serif" font-size="5" fill="#E65100">элатерами</text>
<text x="70" y="26" font-family="Arial,sans-serif" font-size="4.5" fill="#666">(пружинками</text>
<text x="70" y="32" font-family="Arial,sans-serif" font-size="4.5" fill="#666">для расселения)</text>
</g>
</g>

<!-- Summer shoot (летний побег) -->
<g transform="translate(100,75)">
<text x="35" y="0" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#4CAF50" text-anchor="middle">Летний побег</text>

<!-- Main stem -->
<rect x="32" y="15" width="6" height="100" rx="2" fill="#81C784" stroke="#4CAF50" stroke-width="0.8"/>
<!-- Nodes with whorled branches -->
<line x1="32" y1="30" x2="38" y2="30" stroke="#388E3C" stroke-width="0.8"/>
<line x1="32" y1="50" x2="38" y2="50" stroke="#388E3C" stroke-width="0.8"/>
<line x1="32" y1="70" x2="38" y2="70" stroke="#388E3C" stroke-width="0.8"/>
<line x1="32" y1="90" x2="38" y2="90" stroke="#388E3C" stroke-width="0.8"/>

<!-- Branch whorls -->
<g transform="translate(0,0)">
<path d="M32,30 Q20,25 12,30" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M32,30 Q20,28 15,35" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
<path d="M38,30 Q50,25 58,30" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M38,30 Q50,28 55,35" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
<!-- Sub-branches -->
<path d="M12,30 Q8,27 5,30" fill="none" stroke="#81C784" stroke-width="0.5"/>
<path d="M58,30 Q62,27 65,30" fill="none" stroke="#81C784" stroke-width="0.5"/>
</g>
<g transform="translate(0,20)">
<path d="M32,30 Q20,25 12,30" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M32,30 Q20,28 15,35" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
<path d="M38,30 Q50,25 58,30" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M38,30 Q50,28 55,35" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
</g>
<g transform="translate(0,40)">
<path d="M32,30 Q20,25 12,30" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M38,30 Q50,25 58,30" fill="none" stroke="#66BB6A" stroke-width="1"/>
</g>
<g transform="translate(0,60)">
<path d="M32,30 Q20,25 12,30" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
<path d="M38,30 Q50,25 58,30" fill="none" stroke="#66BB6A" stroke-width="0.8"/>
</g>

<!-- Pointed tip -->
<path d="M35,15 Q33,10 35,5 Q37,10 35,15" fill="#81C784" stroke="#4CAF50" stroke-width="0.5"/>

<text x="35" y="125" font-family="Arial,sans-serif" font-size="5.5" fill="#4CAF50" text-anchor="middle">зелёный,</text>
<text x="35" y="133" font-family="Arial,sans-serif" font-size="5.5" fill="#4CAF50" text-anchor="middle">фотосинтезирующий</text>
<text x="35" y="141" font-family="Arial,sans-serif" font-size="5.5" fill="#4CAF50" text-anchor="middle">мутовки ветвей</text>

<!-- Silica note -->
<text x="70" y="50" font-family="Arial,sans-serif" font-size="5" fill="#9E9E9E">SiO₂ в стенках</text>
<text x="70" y="57" font-family="Arial,sans-serif" font-size="5" fill="#9E9E9E">(жёсткий стебель)</text>
</g>

<!-- Section 2: Плаун -->
<text x="265" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Плаун</text>

