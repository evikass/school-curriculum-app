<!-- Roots -->
<path d="M30,60 Q28,68 25,72" fill="none" stroke="#A1887F" stroke-width="0.8"/>
<path d="M80,62 Q78,70 75,74" fill="none" stroke="#A1887F" stroke-width="0.8"/>
<path d="M140,53 Q138,60 135,64" fill="none" stroke="#A1887F" stroke-width="0.8"/>

<!-- Labels -->
<text x="85" y="80" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50" text-anchor="middle">ползучий стебель</text>
<text x="40" y="15" font-family="Arial,sans-serif" font-size="5.5" fill="#5D4037">стробилы</text>
<text x="160" y="78" font-family="Arial,sans-serif" font-size="5.5" fill="#4CAF50">мелкие листья</text>

<!-- Lycopodium name -->
<text x="90" y="92" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">Плаун булавовидный</text>
</g>

<!-- Section 3: Ancient giants -->
<text x="410" y="67" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Древние гиганты</text>

<g transform="translate(350,75)">
<!-- Calamites -->
<rect x="10" y="20" width="10" height="70" rx="2" fill="#6D4C41" opacity="0.5" stroke="#4E342E" stroke-width="0.5"/>
<line x1="10" y1="35" x2="20" y2="35" stroke="#4E342E" stroke-width="0.5"/>
