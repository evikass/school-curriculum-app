<path d="M62,55 L66,52 L70,55 L66,58Z" fill="#795548" opacity="0.3"/>
<!-- Crown -->
<path d="M66,10 Q50,5 42,15" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.5"/>
<path d="M66,10 Q82,5 90,15" fill="none" stroke="#4CAF50" stroke-width="1.5" opacity="0.5"/>
<path d="M66,10 Q55,0 48,8" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.4"/>
<path d="M66,10 Q77,0 84,8" fill="none" stroke="#66BB6A" stroke-width="1" opacity="0.4"/>
<text x="66" y="5" font-family="Arial,sans-serif" font-size="5" fill="#5D4037" text-anchor="middle">Лепидодендрон</text>
<text x="66" y="100" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">(предок плаунов)</text>
<text x="66" y="108" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">до 30 м высотой</text>
</g>

<!-- Section 4: Comparison table -->
<text x="250" y="200" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Сравнение: мхи, папоротники, хвощи, плауны</text>

