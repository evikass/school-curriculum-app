<path d="M110,56 L108,51 L112,53 L110,56Z" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.3"/>
<path d="M120,55 L118,50 L122,52 L120,55Z" fill="#66BB6A" stroke="#4CAF50" stroke-width="0.3"/>
