<line x1="0" y1="50" x2="470" y2="50" stroke="#E0E0E0" stroke-width="0.3"/>
<text x="50" y="46" font-family="Arial,sans-serif" font-size="5.5" fill="#333" text-anchor="middle">Стебель</text>
