<text x="15" y="108" font-family="Arial,sans-serif" font-size="4.5" fill="#666" text-anchor="middle">до 20 м высотой</text>

<!-- Lepidodendron -->
<rect x="60" y="10" width="12" height="80" rx="3" fill="#5D4037" opacity="0.5" stroke="#3E2723" stroke-width="0.5"/>
