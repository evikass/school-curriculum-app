<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="bark" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5D4037"/><stop offset="50%" stop-color="#795548"/><stop offset="100%" stop-color="#5D4037"/></linearGradient>
<linearGradient id="wood" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#D7CCC8"/><stop offset="100%" stop-color="#BCAAA4"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Голосеменные растения, их строение</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 22</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- PINE TREE (left side) -->
<text x="100" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Сосна обыкновенная</text>

<!-- Roots -->
<g transform="translate(100,280)">
  <path d="M0,0 Q-30,15 -45,30" fill="none" stroke="#5D4037" stroke-width="3"/>
  <path d="M0,0 Q30,15 45,30" fill="none" stroke="#5D4037" stroke-width="3"/>
  <path d="M0,0 Q-15,18 -20,35" fill="none" stroke="#5D4037" stroke-width="2"/>
  <path d="M0,0 Q15,18 20,35" fill="none" stroke="#5D4037" stroke-width="2"/>
  <path d="M0,0 Q0,20 0,35" fill="none" stroke="#5D4037" stroke-width="2"/>
  <text x="0" y="45" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="middle">Корень</text>
  <!-- Mycorrhiza label -->
  <text x="-50" y="38" font-family="Arial,sans-serif" font-size="5" fill="#795548">Микориза</text>
  <circle cx="-45" cy="28" r="2" fill="#A1887F"/>
  <circle cx="-42" cy="32" r="1.5" fill="#A1887F"/>
</g>

<!-- Trunk -->
<rect x="92" y="95" width="16" height="185" fill="url(#bark)" rx="3"/>
<text x="78" y="190" font-family="Arial,sans-serif" font-size="7" fill="#5D4037" text-anchor="end">Ствол</text>
<line x1="82" y1="188" x2="92" y2="188" stroke="#5D4037" stroke-width="0.5" stroke-dasharray="2,1"/>

<!-- Bark texture lines -->
<line x1="93" y1="110" x2="107" y2="112" stroke="#4E342E" stroke-width="0.5"/>
<line x1="93" y1="130" x2="107" y2="128" stroke="#4E342E" stroke-width="0.5"/>
<line x1="93" y1="150" x2="107" y2="152" stroke="#4E342E" stroke-width="0.5"/>
<line x1="93" y1="170" x2="107" y2="168" stroke="#4E342E" stroke-width="0.5"/>
<line x1="93" y1="210" x2="107" y2="212" stroke="#4E342E" stroke-width="0.5"/>
<line x1="93" y1="240" x2="107" y2="238" stroke="#4E342E" stroke-width="0.5"/>

<!-- Branches and crown -->
<!-- Branch right lower -->
<path d="M108,160 Q130,150 145,140" fill="none" stroke="#5D4037" stroke-width="2"/>
<ellipse cx="150" cy="135" rx="20" ry="12" fill="#2E7D32" opacity="0.8"/>
<!-- Branch left lower -->
<path d="M92,170 Q70,160 55,150" fill="none" stroke="#5D4037" stroke-width="2"/>
<ellipse cx="50" cy="145" rx="20" ry="12" fill="#388E3C" opacity="0.7"/>
<!-- Branch right middle -->
<path d="M108,130 Q125,118 140,108" fill="none" stroke="#5D4037" stroke-width="2"/>
<ellipse cx="145" cy="103" rx="18" ry="10" fill="#2E7D32" opacity="0.8"/>
<!-- Branch left middle -->
<path d="M92,125 Q75,115 60,105" fill="none" stroke="#5D4037" stroke-width="2"/>
<ellipse cx="55" cy="100" rx="18" ry="10" fill="#388E3C" opacity="0.7"/>
<!-- Branch right upper -->
<path d="M108,105 Q120,95 130,85" fill="none" stroke="#5D4037" stroke-width="1.5"/>
<ellipse cx="135" cy="80" rx="15" ry="9" fill="#2E7D32" opacity="0.8"/>
<!-- Branch left upper -->
<path d="M92,100 Q80,90 70,82" fill="none" stroke="#5D4037" stroke-width="1.5"/>
<ellipse cx="65" cy="78" rx="15" ry="9" fill="#388E3C" opacity="0.7"/>
<!-- Top -->
<ellipse cx="100" cy="82" rx="12" ry="8" fill="#2E7D32" opacity="0.9"/>

<!-- Labels for tree parts -->
<text x="165" y="138" font-family="Arial,sans-serif" font-size="7" fill="#1B5E20">Ветви</text>
<line x1="162" y1="136" x2="155" y2="133" stroke="#1B5E20" stroke-width="0.5"/>

<!-- Needle detail (top right area) -->
<g transform="translate(175,85)">
  <line x1="0" y1="0" x2="0" y2="20" stroke="#2E7D32" stroke-width="2"/>
  <line x1="3" y1="0" x2="3" y2="20" stroke="#2E7D32" stroke-width="2"/>
  <text x="8" y="12" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">Хвоинки</text>
  <text x="8" y="20" font-family="Arial,sans-serif" font-size="5" fill="#666">(по 2 в пучке)</text>
</g>

<!-- Female cone on tree -->
<g transform="translate(130,108)">
  <ellipse cx="0" cy="0" rx="6" ry="10" fill="#8D6E63" stroke="#5D4037" stroke-width="0.8"/>
  <line x1="-5" y1="-3" x2="5" y2="-3" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="-5" y1="0" x2="5" y2="0" stroke="#5D4037" stroke-width="0.5"/>
  <line x1="-5" y1="3" x2="5" y2="3" stroke="#5D4037" stroke-width="0.5"/>
  <text x="10" y="3" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">Шишка ♀</text>
</g>

<!-- STEM CROSS-SECTION (center) -->
<text x="290" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Поперечный срез ствола</text>

<!-- Outer bark -->
<circle cx="290" cy="160" r="65" fill="#5D4037" stroke="#4E342E" stroke-width="1"/>
<text x="290" y="99" font-family="Arial,sans-serif" font-size="6" fill="#FFF" text-anchor="middle">Корка</text>

<!-- Inner bark (phloem) -->
<circle cx="290" cy="160" r="55" fill="#A5D6A7" stroke="#66BB6A" stroke-width="0.5"/>
<text x="290" y="110" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">Луб (флоэма)</text>

<!-- Cambium -->
<circle cx="290" cy="160" r="50" fill="none" stroke="#FF9800" stroke-width="1.5"/>
<text x="345" y="122" font-family="Arial,sans-serif" font-size="5" fill="#E65100">Камбий</text>

<!-- Wood (xylem) with rings -->
<circle cx="290" cy="160" r="48" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="0.5"/>
<!-- Growth rings -->
<circle cx="290" cy="160" r="42" fill="none" stroke="#A1887F" stroke-width="0.5"/>
<circle cx="290" cy="160" r="36" fill="none" stroke="#A1887F" stroke-width="0.5"/>
<circle cx="290" cy="160" r="30" fill="none" stroke="#A1887F" stroke-width="0.5"/>
<circle cx="290" cy="160" r="24" fill="none" stroke="#A1887F" stroke-width="0.5"/>
<circle cx="290" cy="160" r="18" fill="none" stroke="#A1887F" stroke-width="0.5"/>
<text x="290" y="155" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">Древесина</text>
<text x="290" y="164" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">(ксилема)</text>
<text x="290" y="173" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">Годичные кольца</text>

<!-- Resin canals -->
<circle cx="270" cy="140" r="2.5" fill="#FFC107" stroke="#FF8F00" stroke-width="0.5"/>
<circle cx="305" cy="145" r="2.5" fill="#FFC107" stroke="#FF8F00" stroke-width="0.5"/>
<circle cx="275" cy="175" r="2.5" fill="#FFC107" stroke="#FF8F00" stroke-width="0.5"/>
<circle cx="310" cy="170" r="2.5" fill="#FFC107" stroke="#FF8F00" stroke-width="0.5"/>
<text x="330" y="142" font-family="Arial,sans-serif" font-size="5" fill="#E65100">Смоляные</text>
<text x="330" y="149" font-family="Arial,sans-serif" font-size="5" fill="#E65100">ходы</text>

<!-- Pith -->
<circle cx="290" cy="160" r="10" fill="#FFF9C4" stroke="#FBC02D" stroke-width="0.5"/>
<text x="290" y="163" font-family="Arial,sans-serif" font-size="5" fill="#795548" text-anchor="middle">Сердцевина</text>

<!-- MALE AND FEMALE CONES (right bottom) -->
<text x="420" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Шишки</text>

<!-- Male cone -->
<g transform="translate(390,110)">
  <ellipse cx="0" cy="0" rx="5" ry="14" fill="#FFEB3B" stroke="#F9A825" stroke-width="0.8"/>
  <line x1="-4" y1="-6" x2="4" y2="-6" stroke="#F9A825" stroke-width="0.4"/>
  <line x1="-4" y1="-2" x2="4" y2="-2" stroke="#F9A825" stroke-width="0.4"/>
  <line x1="-4" y1="2" x2="4" y2="2" stroke="#F9A825" stroke-width="0.4"/>
  <line x1="-4" y1="6" x2="4" y2="6" stroke="#F9A825" stroke-width="0.4"/>
  <!-- Pollen -->
  <circle cx="-6" cy="-10" r="1" fill="#FFD54F" opacity="0.8"/>
  <circle cx="7" cy="-8" r="1" fill="#FFD54F" opacity="0.8"/>
  <circle cx="-7" cy="-5" r="1" fill="#FFD54F" opacity="0.7"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="7" fill="#795548" text-anchor="middle">Мужская</text>
  <text x="0" y="30" font-family="Arial,sans-serif" font-size="6" fill="#795548" text-anchor="middle">(пыльца)</text>
</g>

<!-- Female cone -->
<g transform="translate(450,108)">
  <ellipse cx="0" cy="0" rx="10" ry="18" fill="#8D6E63" stroke="#5D4037" stroke-width="1"/>
  <!-- Scales -->
  <path d="M-9,-12 Q0,-15 9,-12" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-10,-6 Q0,-9 10,-6" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-10,0 Q0,-3 10,0" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-10,6 Q0,3 10,6" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <path d="M-9,12 Q0,9 9,12" fill="none" stroke="#5D4037" stroke-width="0.8"/>
  <!-- Seed -->
  <ellipse cx="3" cy="-2" rx="2" ry="3" fill="#FFD54F" stroke="#F9A825" stroke-width="0.5"/>
  <text x="0" y="26" font-family="Arial,sans-serif" font-size="7" fill="#795548" text-anchor="middle">Женская</text>
  <text x="0" y="34" font-family="Arial,sans-serif" font-size="6" fill="#795548" text-anchor="middle">(семяпочка)</text>
</g>

<!-- Wind pollination arrow -->
<path d="M370,95 Q380,85 390,90" fill="none" stroke="#0288D1" stroke-width="1" stroke-dasharray="3,2"/>
<text x="370" y="83" font-family="Arial,sans-serif" font-size="5" fill="#0288D1">Ветер</text>

<!-- Key characteristics (bottom) -->
<text x="250" y="245" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Признаки голосеменных</text>
<line x1="130" y1="249" x2="370" y2="249" stroke="#2E7D32" stroke-width="0.5" opacity="0.3"/>

<g transform="translate(50,260)">
  <circle cx="5" cy="0" r="4" fill="#2E7D32" opacity="0.3"/>
  <text x="5" y="3" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">1</text>
  <text x="14" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Семена открыты (без плода)</text>
</g>
<g transform="translate(50,278)">
  <circle cx="5" cy="0" r="4" fill="#2E7D32" opacity="0.3"/>
  <text x="5" y="3" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">2</text>
  <text x="14" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Листья — хвоинки или чешуи</text>
</g>
<g transform="translate(50,296)">
  <circle cx="5" cy="0" r="4" fill="#2E7D32" opacity="0.3"/>
  <text x="5" y="3" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">3</text>
  <text x="14" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Опыление ветром (анемофилия)</text>
</g>
<g transform="translate(270,260)">
  <circle cx="5" cy="0" r="4" fill="#2E7D32" opacity="0.3"/>
  <text x="5" y="3" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">4</text>
  <text x="14" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Камбий → вторичный рост</text>
</g>
<g transform="translate(270,278)">
  <circle cx="5" cy="0" r="4" fill="#2E7D32" opacity="0.3"/>
  <text x="5" y="3" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">5</text>
  <text x="14" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Смоляные ходы в древесине</text>
</g>
<g transform="translate(270,296)">
  <circle cx="5" cy="0" r="4" fill="#2E7D32" opacity="0.3"/>
  <text x="5" y="3" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle">6</text>
  <text x="14" y="3" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">Нет цветков и плодов</text>
</g>

<!-- Comparison note -->
<text x="250" y="325" font-family="Arial,sans-serif" font-size="7" fill="#795548" text-anchor="middle">Голосеменные → от споровых к покрытосеменным (эволюционный шаг)</text>
</svg>