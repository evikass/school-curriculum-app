<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="bactGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFECB3"/><stop offset="100%" stop-color="#FFB300"/></linearGradient>
<linearGradient id="curveGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4CAF50"/><stop offset="40%" stop-color="#2E7D32"/><stop offset="70%" stop-color="#FF9800"/><stop offset="100%" stop-color="#F44336"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Размножение и распространение бактерий</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 9</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Binary fission sequence (top half) -->
<text x="250" y="68" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Деление бактерий (бинарное деление)</text>

<!-- Stage 1: Single bacterium -->
<g transform="translate(55,110)">
  <ellipse cx="0" cy="0" rx="22" ry="10" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1.2"/>
  <!-- Nucleoid -->
  <path d="M-8,-3 C-3,-7 5,-5 8,-2 C10,1 5,4 0,3 C-5,2 -10,0 -8,-3" fill="#1565C0" opacity="0.3"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">1</text>
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">исходная</text>
  <text x="0" y="39" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">клетка</text>
</g>

<!-- Arrow 1 -->
<path d="M82,110 L98,110" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="100,110 95,106 95,114" fill="#2E7D32"/>

<!-- Stage 2: Dividing bacterium -->
<g transform="translate(140,110)">
  <ellipse cx="-8" cy="0" rx="16" ry="10" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1.2"/>
  <ellipse cx="8" cy="0" rx="16" ry="10" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1.2"/>
  <!-- Pinching in the middle -->
  <path d="M0,-10 C-2,-5 -2,5 0,10" fill="none" stroke="#F57F17" stroke-width="1.5"/>
  <!-- Nucleoids separating -->
  <path d="M-10,-3 C-7,-5 -4,-4 -3,-2" fill="#1565C0" opacity="0.25"/>
  <path d="M3,-2 C5,-5 8,-4 10,-3" fill="#1565C0" opacity="0.25"/>
  <text x="0" y="22" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">2</text>
  <text x="0" y="32" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">деление</text>
</g>

<!-- Arrow 2 -->
<path d="M170,110 L186,110" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="188,110 183,106 183,114" fill="#2E7D32"/>

<!-- Stage 3: Two bacteria -->
<g transform="translate(230,110)">
  <ellipse cx="-12" cy="0" rx="18" ry="9" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1.2"/>
  <path d="M-16,-3 C-12,-6 -6,-5 -4,-2" fill="#1565C0" opacity="0.25"/>
  <ellipse cx="12" cy="0" rx="18" ry="9" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1.2"/>
  <path d="M8,-2 C10,-5 16,-6 18,-3" fill="#1565C0" opacity="0.25"/>
  <text x="0" y="18" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">2</text>
  <text x="0" y="28" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">две клетки</text>
</g>

<!-- Arrow 3 -->
<path d="M258,110 L274,110" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="276,110 271,106 271,114" fill="#2E7D32"/>

<!-- Stage 4: Four bacteria -->
<g transform="translate(335,110)">
  <ellipse cx="-18" cy="-10" rx="14" ry="7" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1"/>
  <ellipse cx="18" cy="-10" rx="14" ry="7" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1"/>
  <ellipse cx="-18" cy="10" rx="14" ry="7" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1"/>
  <ellipse cx="18" cy="10" rx="14" ry="7" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="1"/>
  <text x="0" y="25" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">4</text>
  <text x="0" y="35" font-family="Arial,sans-serif" font-size="5.5" fill="#666" text-anchor="middle">четыре</text>
</g>

<!-- Arrow 4 -->
<path d="M365,110 L381,110" fill="none" stroke="#2E7D32" stroke-width="1.5"/>
<polygon points="383,110 378,106 378,114" fill="#2E7D32"/>

<!-- Stage 5: Eight bacteria (cluster) -->
<g transform="translate(435,110)">
  <ellipse cx="-10" cy="-14" rx="10" ry="5" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <ellipse cx="10" cy="-14" rx="10" ry="5" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <ellipse cx="-16" cy="-4" rx="10" ry="5" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <ellipse cx="0" cy="-4" rx="10" ry="5" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <ellipse cx="16" cy="-4" rx="10" ry="5" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <ellipse cx="-10" cy="6" rx="10" ry="5" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <ellipse cx="10" cy="6" rx="10" ry="5" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <ellipse cx="0" cy="15" rx="10" ry="5" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <text x="0" y="28" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">8</text>
</g>

<!-- Growth curve (bottom half) -->
<text x="250" y="160" font-family="Arial,sans-serif" font-size="9" fill="#1B5E20" text-anchor="middle" font-weight="bold">Кривая роста бактерий</text>

<!-- Axes -->
<line x1="50" y1="310" x2="50" y2="170" stroke="#333" stroke-width="1.2"/>
<line x1="50" y1="310" x2="460" y2="310" stroke="#333" stroke-width="1.2"/>
<!-- Arrow tips -->
<polygon points="50,168 47,175 53,175" fill="#333"/>
<polygon points="462,310 455,307 455,313" fill="#333"/>

<!-- Axis labels -->
<text x="40" y="175" font-family="Arial,sans-serif" font-size="7" fill="#333" text-anchor="end">N</text>
<text x="465" y="315" font-family="Arial,sans-serif" font-size="7" fill="#333">Время</text>

<!-- Grid lines -->
<line x1="50" y1="260" x2="460" y2="260" stroke="#CCC" stroke-width="0.3"/>
<line x1="50" y1="210" x2="460" y2="210" stroke="#CCC" stroke-width="0.3"/>

<!-- Growth curve path -->
<path d="M50,305 C70,305 90,303 110,300 C130,295 140,285 150,260 C160,230 170,200 190,185 C210,175 240,172 270,172 C300,172 330,175 360,180 C390,195 410,230 430,270 C440,290 450,300 460,305" fill="none" stroke="url(#curveGrad)" stroke-width="2.5"/>

<!-- Phase labels with brackets -->
<!-- Лаг-фаза -->
<rect x="55" y="313" width="80" height="15" rx="2" fill="#4CAF50" opacity="0.15"/>
<line x1="55" y1="310" x2="55" y2="313" stroke="#4CAF50" stroke-width="0.5"/>
<line x1="135" y1="310" x2="135" y2="313" stroke="#4CAF50" stroke-width="0.5"/>
<line x1="55" y1="313" x2="135" y2="313" stroke="#4CAF50" stroke-width="0.8"/>
<text x="95" y="324" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle" font-weight="bold">Лаг-фаза</text>

<!-- Лог-фаза -->
<rect x="140" y="313" width="90" height="15" rx="2" fill="#2E7D32" opacity="0.15"/>
<line x1="140" y1="310" x2="140" y2="313" stroke="#2E7D32" stroke-width="0.5"/>
<line x1="230" y1="310" x2="230" y2="313" stroke="#2E7D32" stroke-width="0.5"/>
<line x1="140" y1="313" x2="230" y2="313" stroke="#2E7D32" stroke-width="0.8"/>
<text x="185" y="324" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20" text-anchor="middle" font-weight="bold">Лог-фаза</text>

<!-- Стационарная -->
<rect x="235" y="313" width="110" height="15" rx="2" fill="#FF9800" opacity="0.15"/>
<line x1="235" y1="310" x2="235" y2="313" stroke="#FF9800" stroke-width="0.5"/>
<line x1="345" y1="310" x2="345" y2="313" stroke="#FF9800" stroke-width="0.5"/>
<line x1="235" y1="313" x2="345" y2="313" stroke="#FF9800" stroke-width="0.8"/>
<text x="290" y="324" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle" font-weight="bold">Стационарная</text>

<!-- Отмирания -->
<rect x="350" y="313" width="100" height="15" rx="2" fill="#F44336" opacity="0.15"/>
<line x1="350" y1="310" x2="350" y2="313" stroke="#F44336" stroke-width="0.5"/>
<line x1="450" y1="310" x2="450" y2="313" stroke="#F44336" stroke-width="0.5"/>
<line x1="350" y1="313" x2="450" y2="313" stroke="#F44336" stroke-width="0.8"/>
<text x="400" y="324" font-family="Arial,sans-serif" font-size="6" fill="#C62828" text-anchor="middle" font-weight="bold">Отмирания</text>

<!-- Spore formation (small diagram at top right) -->
<text x="395" y="68" font-family="Arial,sans-serif" font-size="8" fill="#1B5E20" text-anchor="middle" font-weight="bold">Образование споры</text>
<g transform="translate(395,90)">
  <!-- Vegetative cell -->
  <ellipse cx="-30" cy="0" rx="12" ry="6" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <text x="-30" y="14" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Клетка</text>
  <!-- Arrow -->
  <path d="M-16,0 L-5,0" fill="none" stroke="#333" stroke-width="0.8"/>
  <polygon points="-3,0 -7,-3 -7,3" fill="#333"/>
  <!-- Sporulating cell -->
  <ellipse cx="12" cy="0" rx="12" ry="7" fill="url(#bactGrad)" stroke="#F57F17" stroke-width="0.8"/>
  <ellipse cx="14" cy="0" rx="5" ry="5" fill="#5D4037" opacity="0.6" stroke="#3E2723" stroke-width="0.8"/>
  <text x="12" y="14" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Спора</text>
  <!-- Arrow -->
  <path d="M26,0 L37,0" fill="none" stroke="#333" stroke-width="0.8"/>
  <polygon points="39,0 35,-3 35,3" fill="#333"/>
  <!-- Free spore -->
  <ellipse cx="50" cy="0" rx="7" ry="7" fill="#5D4037" opacity="0.5" stroke="#3E2723" stroke-width="1"/>
  <text x="50" y="14" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">Спора</text>
</g>

<!-- Speed note -->
<rect x="15" y="145" width="180" height="18" rx="3" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.6"/>
<text x="105" y="157" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">⚡ Каждые 20 мин → 1 → 2 → 4 → 8 → 16...</text>
</svg>