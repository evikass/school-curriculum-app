<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="epidG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A5D6A7"/><stop offset="100%" stop-color="#81C784"/></linearGradient>
<linearGradient id="cortG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#C8E6C9"/><stop offset="100%" stop-color="#A5D6A7"/></linearGradient>
<linearGradient id="phloG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFCC80"/><stop offset="100%" stop-color="#FFA726"/></linearGradient>
<linearGradient id="cambG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF9C4"/><stop offset="100%" stop-color="#FFEE58"/></linearGradient>
<linearGradient id="xylG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A1887F"/><stop offset="100%" stop-color="#8D6E63"/></linearGradient>
<linearGradient id="pithG" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF9C4"/><stop offset="100%" stop-color="#FFF176"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Стебель, его строение и функции</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 35</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- SECTION 1: Dicot stem cross-section (left/center) -->
<text x="160" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Срез стебля двудольного</text>

<!-- Outer circle - Epidermis -->
<circle cx="160" cy="180" r="105" fill="url(#epidG)" stroke="#388E3C" stroke-width="2"/>
<!-- Cortex layer -->
<circle cx="160" cy="180" r="95" fill="url(#cortG)" stroke="none"/>
<!-- Phloem ring -->
<circle cx="160" cy="180" r="72" fill="url(#phloG)" stroke="#E65100" stroke-width="0.8"/>
<!-- Cambium ring -->
<circle cx="160" cy="180" r="62" fill="url(#cambG)" stroke="#F9A825" stroke-width="1"/>
<!-- Xylem ring -->
<circle cx="160" cy="180" r="52" fill="url(#xylG)" stroke="#5D4037" stroke-width="0.8"/>
<!-- Pith center -->
<circle cx="160" cy="180" r="30" fill="url(#pithG)" stroke="#FBC02D" stroke-width="0.5"/>

<!-- Pith cells -->
<circle cx="150" cy="172" r="5" fill="none" stroke="#F9A825" stroke-width="0.4"/>
<circle cx="165" cy="175" r="5" fill="none" stroke="#F9A825" stroke-width="0.4"/>
<circle cx="155" cy="188" r="5" fill="none" stroke="#F9A825" stroke-width="0.4"/>
<circle cx="170" cy="185" r="5" fill="none" stroke="#F9A825" stroke-width="0.4"/>
<circle cx="145" cy="185" r="4" fill="none" stroke="#F9A825" stroke-width="0.4"/>

<!-- Xylem vessels (in xylem ring) - several vascular bundles -->
<!-- Bundle 1 (top) -->
<rect x="155" y="128" width="4" height="8" rx="1" fill="#6D4C41" stroke="#4E342E" stroke-width="0.5"/>
<rect x="162" y="129" width="3" height="7" rx="1" fill="#8D6E63" stroke="#5D4037" stroke-width="0.3"/>
<!-- Bundle 2 (right) -->
<rect x="210" y="175" width="8" height="4" rx="1" fill="#6D4C41" stroke="#4E342E" stroke-width="0.5"/>
<rect x="211" y="182" width="7" height="3" rx="1" fill="#8D6E63" stroke="#5D4037" stroke-width="0.3"/>
<!-- Bundle 3 (bottom) -->
<rect x="158" y="222" width="4" height="8" rx="1" fill="#6D4C41" stroke="#4E342E" stroke-width="0.5"/>
<rect x="165" y="224" width="3" height="7" rx="1" fill="#8D6E63" stroke="#5D4037" stroke-width="0.3"/>
<!-- Bundle 4 (left) -->
<rect x="100" y="178" width="8" height="4" rx="1" fill="#6D4C41" stroke="#4E342E" stroke-width="0.5"/>
<rect x="101" y="171" width="7" height="3" rx="1" fill="#8D6E63" stroke="#5D4037" stroke-width="0.3"/>

<!-- Phloem fibers and sieve tubes -->
<line x1="147" y1="110" x2="147" y2="118" stroke="#E65100" stroke-width="0.6"/>
<line x1="153" y1="112" x2="153" y2="120" stroke="#E65100" stroke-width="0.6"/>
<line x1="200" y1="130" x2="210" y2="128" stroke="#E65100" stroke-width="0.6"/>
<line x1="205" y1="135" x2="215" y2="133" stroke="#E65100" stroke-width="0.6"/>

<!-- Cortex parenchyma cells -->
<circle cx="110" cy="120" r="5" fill="#C8E6C9" stroke="#81C784" stroke-width="0.4"/>
<circle cx="125" cy="110" r="5" fill="#C8E6C9" stroke="#81C784" stroke-width="0.4"/>
<circle cx="200" cy="110" r="5" fill="#C8E6C9" stroke="#81C784" stroke-width="0.4"/>
<circle cx="215" cy="125" r="5" fill="#C8E6C9" stroke="#81C784" stroke-width="0.4"/>
<circle cx="100" cy="190" r="5" fill="#C8E6C9" stroke="#81C784" stroke-width="0.4"/>
<circle cx="220" cy="190" r="5" fill="#C8E6C9" stroke="#81C784" stroke-width="0.4"/>

<!-- Labels with lines -->
<line x1="160" y1="75" x2="160" y2="80" stroke="#666" stroke-width="0.6"/>
<text x="160" y="73" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20" text-anchor="middle">эпидерма</text>

<line x1="90" y1="110" x2="80" y2="100" stroke="#666" stroke-width="0.5"/>
<text x="48" y="98" font-family="Arial,sans-serif" font-size="6.5" fill="#1B5E20">кора</text>
<text x="48" y="106" font-family="Arial,sans-serif" font-size="5.5" fill="#666">(хлоренхима)</text>

<line x1="90" y1="145" x2="55" y2="140" stroke="#666" stroke-width="0.5"/>
<text x="53" y="138" font-family="Arial,sans-serif" font-size="6.5" fill="#E65100" text-anchor="end">луб (флоэма)</text>
<text x="53" y="146" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="end">↓ органика</text>

<line x1="98" y1="165" x2="45" y2="165" stroke="#666" stroke-width="0.5"/>
<text x="43" y="163" font-family="Arial,sans-serif" font-size="6.5" fill="#F9A825" text-anchor="end">камбий</text>
<text x="43" y="171" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="end">(образовательная)</text>

<line x1="108" y1="180" x2="45" y2="190" stroke="#666" stroke-width="0.5"/>
<text x="43" y="188" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037" text-anchor="end">древесина</text>
<text x="43" y="196" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037" text-anchor="end">(ксилема)</text>
<text x="43" y="204" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="end">↑ вода + минералы</text>

<line x1="135" y1="200" x2="45" y2="222" stroke="#666" stroke-width="0.5"/>
<text x="43" y="220" font-family="Arial,sans-serif" font-size="6.5" fill="#F9A825" text-anchor="end">сердцевина</text>

<!-- Transport arrows on the side -->
<!-- Upward arrow (xylem) -->
<rect x="50" y="240" width="20" height="50" rx="3" fill="none" stroke="#5D4037" stroke-width="1"/>
<path d="M60,285 L60,245" fill="none" stroke="#1565C0" stroke-width="1.5"/>
<polygon points="60,242 57,248 63,248" fill="#1565C0"/>
<text x="60" y="240" font-family="Arial,sans-serif" font-size="5.5" fill="#1565C0" text-anchor="middle">вода↑</text>
<!-- Downward arrow (phloem) -->
<rect x="75" y="240" width="20" height="50" rx="3" fill="none" stroke="#E65100" stroke-width="1"/>
<path d="M85,245 L85,285" fill="none" stroke="#FF6D00" stroke-width="1.5"/>
<polygon points="85,288 82,282 88,282" fill="#FF6D00"/>
<text x="85" y="298" font-family="Arial,sans-serif" font-size="5.5" fill="#FF6D00" text-anchor="middle">орг. в-ва↓</text>

<!-- SECTION 2: Annual rings (top right) -->
<text x="400" y="66" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Годичные кольца</text>

<!-- Tree trunk cross-section with rings -->
<circle cx="400" cy="130" r="52" fill="url(#xylG)" stroke="#5D4037" stroke-width="1.5"/>
<circle cx="400" cy="130" r="44" fill="#A1887F" stroke="#8D6E63" stroke-width="0.5"/>
<circle cx="400" cy="130" r="38" fill="#BCAAA4" stroke="#A1887F" stroke-width="0.5"/>
<circle cx="400" cy="130" r="32" fill="#A1887F" stroke="#8D6E63" stroke-width="0.5"/>
<circle cx="400" cy="130" r="26" fill="#BCAAA4" stroke="#A1887F" stroke-width="0.5"/>
<circle cx="400" cy="130" r="20" fill="#A1887F" stroke="#8D6E63" stroke-width="0.5"/>
<circle cx="400" cy="130" r="14" fill="#BCAAA4" stroke="#A1887F" stroke-width="0.5"/>
<circle cx="400" cy="130" r="8" fill="url(#pithG)" stroke="#F9A825" stroke-width="0.5"/>

<!-- Spring wood (lighter) and summer wood (darker) labels -->
<line x1="444" y1="98" x2="440" y2="102" stroke="#666" stroke-width="0.5"/>
<text x="448" y="97" font-family="Arial,sans-serif" font-size="5" fill="#666">ранняя</text>
<text x="448" y="104" font-family="Arial,sans-serif" font-size="5" fill="#666">древесина</text>
<line x1="440" y1="115" x2="436" y2="118" stroke="#666" stroke-width="0.5"/>
<text x="448" y="113" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">поздняя</text>
<text x="448" y="120" font-family="Arial,sans-serif" font-size="5" fill="#5D4037">древесина</text>

<!-- Pith label -->
<text x="400" y="132" font-family="Arial,sans-serif" font-size="5" fill="#F57F17" text-anchor="middle">сердц.</text>

<!-- Ring count -->
<path d="M440,88 L435,94" fill="none" stroke="#1B5E20" stroke-width="0.5"/>
<text x="445" y="87" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">7 колец =</text>
<text x="445" y="94" font-family="Arial,sans-serif" font-size="5.5" fill="#1B5E20">~7 лет</text>

<!-- Bark label outside -->
<text x="400" y="185" font-family="Arial,sans-serif" font-size="6" fill="#5D4037" text-anchor="middle">кора (луб + пробка)</text>

<!-- SECTION 3: Monocot stem (bottom right) -->
<text x="400" y="210" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Стебель однодольного</text>

<!-- Monocot stem cross-section -->
<circle cx="400" cy="280" r="55" fill="#C8E6C9" stroke="#388E3C" stroke-width="1.5"/>
<!-- Scattered vascular bundles -->
<!-- Bundle 1 -->
<ellipse cx="380" cy="260" rx="8" ry="12" fill="url(#xylG)" stroke="#5D4037" stroke-width="0.8" transform="rotate(-15,380,260)"/>
<ellipse cx="383" cy="255" rx="5" ry="4" fill="url(#phloG)" stroke="#E65100" stroke-width="0.5"/>
<!-- Bundle 2 -->
<ellipse cx="415" cy="265" rx="7" ry="11" fill="url(#xylG)" stroke="#5D4037" stroke-width="0.8" transform="rotate(20,415,265)"/>
<ellipse cx="413" cy="260" rx="5" ry="3.5" fill="url(#phloG)" stroke="#E65100" stroke-width="0.5"/>
<!-- Bundle 3 -->
<ellipse cx="390" cy="295" rx="8" ry="10" fill="url(#xylG)" stroke="#5D4037" stroke-width="0.8" transform="rotate(-10,390,295)"/>
<ellipse cx="393" cy="290" rx="5" ry="3.5" fill="url(#phloG)" stroke="#E65100" stroke-width="0.5"/>
<!-- Bundle 4 -->
<ellipse cx="420" cy="290" rx="7" ry="9" fill="url(#xylG)" stroke="#5D4037" stroke-width="0.8" transform="rotate(15,420,290)"/>
<ellipse cx="418" cy="285" rx="4.5" ry="3" fill="url(#phloG)" stroke="#E65100" stroke-width="0.5"/>
<!-- Bundle 5 (center) -->
<ellipse cx="400" cy="278" rx="7" ry="10" fill="url(#xylG)" stroke="#5D4037" stroke-width="0.8"/>
<ellipse cx="402" cy="273" rx="5" ry="3.5" fill="url(#phloG)" stroke="#E65100" stroke-width="0.5"/>
<!-- More small bundles -->
<ellipse cx="365" cy="282" rx="6" ry="8" fill="url(#xylG)" stroke="#5D4037" stroke-width="0.6" transform="rotate(-25,365,282)"/>
<ellipse cx="430" cy="278" rx="6" ry="8" fill="url(#xylG)" stroke="#5D4037" stroke-width="0.6" transform="rotate(10,430,278)"/>

<!-- Key labels -->
<text x="345" y="245" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">рассеянные</text>
<text x="345" y="253" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">проводящие</text>
<text x="345" y="261" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">пучки</text>

<text x="400" y="340" font-family="Arial,sans-serif" font-size="5.5" fill="#C62828" text-anchor="middle">!! Нет камбия — нет годичных колец</text>

<!-- Comparison note -->
<rect x="50" y="305" width="200" height="38" rx="3" fill="#FFF9C4" opacity="0.5" stroke="#F9A825" stroke-width="0.5"/>
<text x="55" y="316" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">Двудольные: камбий → вторичный рост</text>
<text x="55" y="324" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">→ годичные кольца → рост в толщину</text>
<text x="55" y="332" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">Однодольные: нет камбия → стебель</text>
<text x="55" y="340" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">не утолщается (злаки, лилии)</text>
</svg>
