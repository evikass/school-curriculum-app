<text x="400" y="197" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#F57F17" text-anchor="middle">Формула цветка</text>
<text x="320" y="210" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">Ч₅ Л₅ Т∞ П₁ — вишня</text>
<text x="320" y="222" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">Ч — чашелистики</text>
<text x="320" y="232" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">Л — лепестки (венчик)</text>
<text x="320" y="242" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">Т — тычинки  П — пестики</text>
<text x="320" y="252" font-family="Arial,sans-serif" font-size="6.5" fill="#5D4037">∞ — число неопределённо</text>

