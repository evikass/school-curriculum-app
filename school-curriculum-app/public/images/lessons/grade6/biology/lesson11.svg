<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#E8F5E9"/><stop offset="100%" stop-color="#C8E6C9"/></linearGradient>
<linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8D6E63"/><stop offset="100%" stop-color="#6D4C41"/></linearGradient>
<linearGradient id="stemGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#EFEBE9"/><stop offset="50%" stop-color="#D7CCC8"/><stop offset="100%" stop-color="#EFEBE9"/></linearGradient>
<linearGradient id="mycelGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A5D6A7"/><stop offset="100%" stop-color="#66BB6A"/></linearGradient>
<linearGradient id="cellGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFCC80"/><stop offset="100%" stop-color="#FF9800"/></linearGradient>
</defs>
<rect width="500" height="350" fill="url(#bg)" rx="10"/>
<rect x="3" y="3" width="494" height="344" rx="8" fill="none" stroke="#2E7D32" stroke-width="2.5"/>
<text x="250" y="28" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#1B5E20" text-anchor="middle">Грибы, их строение и жизнедеятельность</text>
<text x="250" y="43" font-family="Arial,sans-serif" font-size="9" fill="#666" text-anchor="middle">Биология 6 класс — Урок 11</text>
<line x1="30" y1="50" x2="470" y2="50" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

<!-- Section 1: Mushroom fruiting body (left) -->
<text x="120" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Плодовое тело гриба</text>

<!-- Ground line -->
<path d="M20,275 Q60,270 120,275 Q180,280 220,273" fill="none" stroke="#795548" stroke-width="1.5"/>
<rect x="20" y="275" width="200" height="70" fill="#8D6E63" opacity="0.15" rx="2"/>

<!-- Mushroom cap -->
<ellipse cx="120" cy="135" rx="65" ry="38" fill="url(#capGrad)" stroke="#5D4037" stroke-width="1.5"/>
<!-- Cap spots -->
<circle cx="95" cy="125" r="5" fill="#A1887F" opacity="0.6"/>
<circle cx="140" cy="120" r="6" fill="#A1887F" opacity="0.6"/>
<circle cx="118" cy="118" r="4" fill="#A1887F" opacity="0.5"/>
<!-- Gill lines under cap -->
<line x1="80" y1="148" x2="100" y2="165" stroke="#BCAAA4" stroke-width="0.7"/>
<line x1="90" y1="148" x2="105" y2="168" stroke="#BCAAA4" stroke-width="0.7"/>
<line x1="100" y1="148" x2="110" y2="170" stroke="#BCAAA4" stroke-width="0.7"/>
<line x1="110" y1="148" x2="115" y2="170" stroke="#BCAAA4" stroke-width="0.7"/>
<line x1="120" y1="148" x2="120" y2="170" stroke="#BCAAA4" stroke-width="0.7"/>
<line x1="130" y1="148" x2="125" y2="170" stroke="#BCAAA4" stroke-width="0.7"/>
<line x1="140" y1="148" x2="135" y2="168" stroke="#BCAAA4" stroke-width="0.7"/>
<line x1="150" y1="148" x2="145" y2="165" stroke="#BCAAA4" stroke-width="0.7"/>
<line x1="160" y1="148" x2="155" y2="162" stroke="#BCAAA4" stroke-width="0.7"/>

<!-- Stem/ножка -->
<rect x="108" y="170" width="24" height="105" rx="4" fill="url(#stemGrad)" stroke="#8D6E63" stroke-width="1.2"/>
<!-- Ring on stem -->
<ellipse cx="120" cy="200" rx="16" ry="4" fill="#D7CCC8" stroke="#8D6E63" stroke-width="0.8"/>

<!-- Mycelium/грибница -->
<g opacity="0.8">
<path d="M30,290 Q50,280 70,290 Q90,300 110,285" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<path d="M50,295 Q70,285 90,295 Q110,305 130,290" fill="none" stroke="#4CAF50" stroke-width="1.5"/>
<path d="M40,300 Q60,290 80,300 Q100,310 120,295" fill="none" stroke="#4CAF50" stroke-width="1.3"/>
<path d="M60,305 Q80,295 100,305 Q120,315 150,300" fill="none" stroke="#4CAF50" stroke-width="1.2"/>
<path d="M70,292 Q85,283 100,292 Q115,300 132,288" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M45,308 Q65,298 85,308 Q105,316 125,302" fill="none" stroke="#66BB6A" stroke-width="1"/>
<path d="M80,286 Q95,278 110,286 Q125,293 140,282" fill="none" stroke="#81C784" stroke-width="0.8"/>
<path d="M90,298 Q105,290 120,298" fill="none" stroke="#81C784" stroke-width="0.8"/>
</g>

<!-- Labels for mushroom -->
<text x="185" y="108" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">шляпка</text>
<line x1="155" y1="110" x2="183" y2="108" stroke="#5D4037" stroke-width="0.5"/>
<text x="185" y="125" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">пластинки</text>
<line x1="155" y1="155" x2="183" y2="125" stroke="#5D4037" stroke-width="0.5"/>
<text x="145" y="200" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">ножка</text>
<line x1="132" y1="200" x2="143" y2="200" stroke="#5D4037" stroke-width="0.5"/>
<text x="145" y="213" font-family="Arial,sans-serif" font-size="7" fill="#5D4037">кольцо</text>
<line x1="136" y1="205" x2="143" y2="213" stroke="#5D4037" stroke-width="0.5"/>
<text x="145" y="290" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">грибница</text>
<line x1="140" y1="290" x2="143" y2="290" stroke="#2E7D32" stroke-width="0.5"/>
<text x="145" y="302" font-family="Arial,sans-serif" font-size="7" fill="#2E7D32">(мицелий)</text>
<text x="50" y="325" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">гифы</text>

<!-- Section 2: Fungal cell (top right) -->
<text x="370" y="68" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Клетка гриба</text>

<!-- Cell wall -->
<rect x="310" y="78" width="120" height="75" rx="15" fill="none" stroke="#795548" stroke-width="2.5"/>
<!-- Cell interior -->
<rect x="313" y="81" width="114" height="69" rx="13" fill="#FFF3E0" opacity="0.5"/>
<!-- Chitin wall label -->
<text x="395" y="90" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">хитиновая</text>
<text x="395" y="98" font-family="Arial,sans-serif" font-size="6" fill="#5D4037">клеточная стенка</text>

<!-- Nucleus -->
<ellipse cx="355" cy="115" rx="22" ry="16" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.2"/>
<ellipse cx="358" cy="113" rx="8" ry="6" fill="#1B5E20" opacity="0.4"/>
<text x="340" y="118" font-family="Arial,sans-serif" font-size="6" fill="#1B5E20">ядро</text>

<!-- Vacuole -->
<ellipse cx="400" cy="120" rx="18" ry="12" fill="#E1F5FE" opacity="0.6" stroke="#0288D1" stroke-width="0.8"/>
<text x="400" y="123" font-family="Arial,sans-serif" font-size="5.5" fill="#0288D1" text-anchor="middle">вакуоль</text>

<!-- Glycogen granules -->
<circle cx="330" cy="138" r="3" fill="#FFB74D" stroke="#E65100" stroke-width="0.5"/>
<circle cx="338" cy="142" r="2.5" fill="#FFB74D" stroke="#E65100" stroke-width="0.5"/>
<circle cx="325" cy="145" r="2" fill="#FFB74D" stroke="#E65100" stroke-width="0.5"/>
<circle cx="340" cy="148" r="2.5" fill="#FFB74D" stroke="#E65100" stroke-width="0.5"/>
<text x="345" y="152" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">гликоген</text>

<!-- Mitochondria -->
<ellipse cx="390" cy="140" rx="12" ry="5" fill="#FFCC80" opacity="0.6" stroke="#E65100" stroke-width="0.7" transform="rotate(-15,390,140)"/>
<text x="405" y="143" font-family="Arial,sans-serif" font-size="5.5" fill="#E65100">митохондрия</text>

<!-- Ribosomes -->
<circle cx="370" cy="135" r="1.5" fill="#9C27B0"/>
<circle cx="375" cy="130" r="1.5" fill="#9C27B0"/>
<circle cx="380" cy="137" r="1.5" fill="#9C27B0"/>

<!-- Section 3: Three nutrition types (bottom right) -->
<text x="370" y="178" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1B5E20" text-anchor="middle">Типы питания грибов</text>

<!-- Saprotrophic -->
<g transform="translate(270,195)">
<rect x="0" y="0" width="70" height="55" rx="5" fill="#E8F5E9" stroke="#4CAF50" stroke-width="0.8"/>
<!-- Dead leaf -->
<path d="M15,15 Q25,10 35,15 Q40,25 35,35 Q25,40 15,35 Q10,25 15,15Z" fill="#8D6E63" opacity="0.5" stroke="#5D4037" stroke-width="0.7"/>
<!-- Small mushroom on leaf -->
<ellipse cx="25" cy="20" rx="8" ry="4" fill="#A5D6A7" stroke="#4CAF50" stroke-width="0.5"/>
<rect x="23" y="24" width="4" height="8" rx="1" fill="#C8E6C9" stroke="#4CAF50" stroke-width="0.5"/>
<text x="35" y="48" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32" text-anchor="middle">сапротрофный</text>
<text x="35" y="56" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(мёртвые остатки)</text>
</g>

<!-- Parasitic -->
<g transform="translate(345,195)">
<rect x="0" y="0" width="70" height="55" rx="5" fill="#FFF3E0" stroke="#FF9800" stroke-width="0.8"/>
<!-- Tree trunk -->
<rect x="28" y="10" width="14" height="30" rx="2" fill="#8D6E63" stroke="#5D4037" stroke-width="0.7"/>
<!-- Parasitic hyphae penetrating -->
<path d="M35,10 Q30,5 25,10" fill="none" stroke="#F44336" stroke-width="1"/>
<path d="M32,10 Q30,2 22,8" fill="none" stroke="#F44336" stroke-width="0.8"/>
<!-- Haustoria -->
<circle cx="30" cy="22" r="3" fill="#F44336" opacity="0.4"/>
<circle cx="37" cy="28" r="2.5" fill="#F44336" opacity="0.4"/>
<text x="35" y="48" font-family="Arial,sans-serif" font-size="6" fill="#E65100" text-anchor="middle">паразитический</text>
<text x="35" y="56" font-family="Arial,sans-serif" font-size="5" fill="#666" text-anchor="middle">(живой организм)</text>
</g>

<!-- Symbiotic -->
<g transform="translate(270,260)">
<rect x="0" y="0" width="145" height="55" rx="5" fill="#F3E5F5" stroke="#9C27B0" stroke-width="0.8"/>
<!-- Tree root -->
<path d="M20,30 Q40,20 60,30 Q80,35 100,25" fill="none" stroke="#8D6E63" stroke-width="3" stroke-linecap="round"/>
<!-- Fungal threads wrapping root -->
<path d="M30,22 Q40,28 50,20 Q60,15 70,25 Q80,30 90,20" fill="none" stroke="#4CAF50" stroke-width="1.2"/>
<path d="M25,35 Q40,28 55,35 Q70,40 85,30 Q95,25 105,30" fill="none" stroke="#4CAF50" stroke-width="1.2"/>
<!-- Mutual arrows -->
<text x="55" y="14" font-family="Arial,sans-serif" font-size="6" fill="#8D6E63">корень</text>
<text x="80" y="46" font-family="Arial,sans-serif" font-size="6" fill="#4CAF50">гифы гриба</text>
<text x="72" y="54" font-family="Arial,sans-serif" font-size="6" fill="#9C27B0" text-anchor="middle">симбиоз (микориза)</text>
</g>

<!-- Hyphae detail (bottom left) -->
<text x="55" y="68" font-family="Arial,sans-serif" font-size="8" font-weight="bold" fill="#1B5E20">Гифы</text>
<g transform="translate(20,72)">
<!-- Branching hyphae -->
<path d="M0,30 Q20,20 40,25 Q55,28 70,20 Q85,15 100,22" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
<path d="M40,25 Q45,15 55,10" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round"/>
<path d="M70,20 Q75,10 85,8" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round"/>
<path d="M55,10 Q65,8 75,5" fill="none" stroke="#66BB6A" stroke-width="1" stroke-linecap="round"/>
<path d="M20,23 Q25,15 35,12" fill="none" stroke="#66BB6A" stroke-width="1" stroke-linecap="round"/>
<!-- Septa -->
<line x1="30" y1="22" x2="30" y2="28" stroke="#2E7D32" stroke-width="0.5"/>
<line x1="55" y1="22" x2="55" y2="26" stroke="#2E7D32" stroke-width="0.5"/>
<line x1="80" y1="16" x2="80" y2="22" stroke="#2E7D32" stroke-width="0.5"/>
<!-- Nuclei in cells -->
<circle cx="42" cy="25" r="2.5" fill="#1B5E20" opacity="0.4"/>
<circle cx="67" cy="22" r="2.5" fill="#1B5E20" opacity="0.4"/>
<circle cx="90" cy="21" r="2.5" fill="#1B5E20" opacity="0.4"/>
<text x="105" y="26" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">перегородки</text>
<text x="105" y="34" font-family="Arial,sans-serif" font-size="6" fill="#2E7D32">(септы)</text>
</g>

<!-- Key differences note -->
<g transform="translate(20,170)">
<rect x="0" y="0" width="190" height="55" rx="5" fill="white" opacity="0.6" stroke="#2E7D32" stroke-width="0.5"/>
<text x="95" y="12" font-family="Arial,sans-serif" font-size="7" font-weight="bold" fill="#1B5E20" text-anchor="middle">Отличия грибов от растений и животных</text>
<text x="8" y="24" font-family="Arial,sans-serif" font-size="6" fill="#333">• Запасное вещество — гликоген (как у животных)</text>
<text x="8" y="34" font-family="Arial,sans-serif" font-size="6" fill="#333">• Клеточная стенка из хитина (не целлюлоза)</text>
<text x="8" y="44" font-family="Arial,sans-serif" font-size="6" fill="#333">• Гетеротрофное питание (не фотосинтез)</text>
<text x="8" y="54" font-family="Arial,sans-serif" font-size="6" fill="#333">• Неограниченный рост (как у растений)</text>
</g>
</svg>